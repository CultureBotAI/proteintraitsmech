identifier: CDD:cd14018
label: "Catalytic domain of the Serine/Threonine protein kinase, Pten INduced Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. PINK1 contains an N-terminal mitochondrial targeting sequence, a catalytic domain, and a C-terminal regulatory region. It plays an important role in maintaining mitochondrial homeostasis. It protects cells against oxidative stress-induced apoptosis by phosphorylating the chaperone TNFR-associated protein 1 (TRAP1), also called Hsp75. Phosphorylated TRAP1 prevents cytochrome c release and peroxide-induced apoptosis. PINK1 interacts with Omi/HtrA2, a serine protease, and Parkin, an E3 ubiquitin ligase, in different pathways to promote mitochondrial health. The parkin gene is the most commonly mutated gene in autosomal recessive familial parkinsonism. Mutations within the catalytic domain of PINK1 are also associated with Parkinson's disease. The PINK1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine protein kinase, Pten INduced Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. PINK1 contains an N-terminal mitochondrial targeting sequence, a catalytic domain, and a C-terminal regulatory region. It plays an important role in maintaining mitochondrial homeostasis. It protects cells against oxidative stress-induced apoptosis by phosphorylating the chaperone TNFR-associated protein 1 (TRAP1), also called Hsp75. Phosphorylated TRAP1 prevents cytochrome c release and peroxide-induced apoptosis. PINK1 interacts with Omi/HtrA2, a serine protease, and Parkin, an E3 ubiquitin ligase, in different pathways to promote mitochondrial health. The parkin gene is the most commonly mutated gene in autosomal recessive familial parkinsonism. Mutations within the catalytic domain of PINK1 are also associated with Parkinson's disease. The PINK1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14018); members share this curated model.
