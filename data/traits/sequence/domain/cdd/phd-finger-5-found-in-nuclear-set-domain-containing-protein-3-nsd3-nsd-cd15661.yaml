identifier: CDD:cd15661
label: "PHD finger 5 found in nuclear SET domain-containing protein 3 (NSD3). NSD3, also termed histone-lysine N-methyltransferase NSD3, or protein whistle, or WHSC1-like 1 isoform 9 with methyltransferase activity to lysine, or Wolf-Hirschhorn syndrome candidate 1-like protein 1 (WHSC1-like protein 1, or WHSC1L1), is a lysine methyltransferase encoded by gene NSD3, which is amplified in human breast cancer cell lines. Moreover, translocation resulting in NUP98 fusion to NSD3 leads to the development of acute myeloid leukemia. NSD3 contains a catalytic suppressor of variegation, enhancer of zeste and trithorax (SET) domain, two proline-tryptophan-tryptophan-prolin motif (PWWP) domains, five plant-homeodomain (PHD) zinc fingers, and an NSD-specific Cys-His rich domain (Cys5HisCysHis). The SET domain is responsible for histone methyltransferase activity. The PWWP and PHD fingers are involved in protein-protein interactions. This model corresponds to the fifth PHD finger."
definition: >-
  PHD finger 5 found in nuclear SET domain-containing protein 3 (NSD3). NSD3, also termed histone-lysine N-methyltransferase NSD3, or protein whistle, or WHSC1-like 1 isoform 9 with methyltransferase activity to lysine, or Wolf-Hirschhorn syndrome candidate 1-like protein 1 (WHSC1-like protein 1, or WHSC1L1), is a lysine methyltransferase encoded by gene NSD3, which is amplified in human breast cancer cell lines. Moreover, translocation resulting in NUP98 fusion to NSD3 leads to the development of acute myeloid leukemia. NSD3 contains a catalytic suppressor of variegation, enhancer of zeste and trithorax (SET) domain, two proline-tryptophan-tryptophan-prolin motif (PWWP) domains, five plant-homeodomain (PHD) zinc fingers, and an NSD-specific Cys-His rich domain (Cys5HisCysHis). The SET domain is responsible for histone methyltransferase activity. The PWWP and PHD fingers are involved in protein-protein interactions. This model corresponds to the fifth PHD finger. — an NCBI CDD conserved domain (cd15661); members share this curated model.
