identifier: CDD:cd22742
label: "Bubble protein family. This family includes Penicillium brevicompactum bubble protein and similar proteins. Bubble protein (BP) is a small cysteine-rich protein that is a member of the growing class of defensins, and may act as a toxin. Studies show that P. brevicompactum BP inhibits growth of the yeast Saccharomyces cerevisiae in a dose-dependent manner, thus exhibiting anti-fungal effects. BP may recognize a molecule or part of a molecule with a negatively charged surface potential. It is a globular all-beta protein with a disulfide-bound Knottins fold, which contains a beta-hairpin with two adjacent disulfides."
definition: >-
  Bubble protein family. This family includes Penicillium brevicompactum bubble protein and similar proteins. Bubble protein (BP) is a small cysteine-rich protein that is a member of the growing class of defensins, and may act as a toxin. Studies show that P. brevicompactum BP inhibits growth of the yeast Saccharomyces cerevisiae in a dose-dependent manner, thus exhibiting anti-fungal effects. BP may recognize a molecule or part of a molecule with a negatively charged surface potential. It is a globular all-beta protein with a disulfide-bound Knottins fold, which contains a beta-hairpin with two adjacent disulfides. — an NCBI CDD conserved domain (cd22742); members share this curated model.
