identifier: CDD:cd18240
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 10 (KLHL10). KLHL10 is a substrate-specific adaptor of a CUL3-based E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins specifically in the testis during spermatogenesis. Haploinsufficiency of Klhl10 causes infertility in male mice. KLHL10 contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 10 (KLHL10). KLHL10 is a substrate-specific adaptor of a CUL3-based E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins specifically in the testis during spermatogenesis. Haploinsufficiency of Klhl10 causes infertility in male mice. KLHL10 contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18240); members share this curated model.
