identifier: CDD:cd21150
label: "PUA RNA-binding domain of the SAM-dependent methyltransferase NSun6 and similar proteins. The RNA-binding PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain was detected in a number of proteins involved in RNA metabolism. Members of this subfamily contain PUA domains that co-occur with SAM-dependent methyltransferase domains and may play roles as cytosine-C(5)-methyltransferases specific for tRNAs or rRNAs. Nsun6 binding to its tRNA substrates requires the presence of a 3'-CCA sequence, which is precisely recognized primarily through interactions with residues from the PUA domain, where the molecular surface of the PUA domain snugly fits onto each nucleotide residue of the CCA end. Human RNA:m5C methyltransferase NSun6 (hNSun6) plays a major role in bone metastasis and could be a valuable therapeutic target for bone metastasis and therapy-resistant tumors."
definition: >-
  PUA RNA-binding domain of the SAM-dependent methyltransferase NSun6 and similar proteins. The RNA-binding PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain was detected in a number of proteins involved in RNA metabolism. Members of this subfamily contain PUA domains that co-occur with SAM-dependent methyltransferase domains and may play roles as cytosine-C(5)-methyltransferases specific for tRNAs or rRNAs. Nsun6 binding to its tRNA substrates requires the presence of a 3'-CCA sequence, which is precisely recognized primarily through interactions with residues from the PUA domain, where the molecular surface of the PUA domain snugly fits onto each nucleotide residue of the CCA end. Human RNA:m5C methyltransferase NSun6 (hNSun6) plays a major role in bone metastasis and could be a valuable therapeutic target for bone metastasis and therapy-resistant tumors. — an NCBI CDD conserved domain (cd21150); members share this curated model.
