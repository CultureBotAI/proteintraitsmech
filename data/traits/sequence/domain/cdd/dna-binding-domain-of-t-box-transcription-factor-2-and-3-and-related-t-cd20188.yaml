identifier: CDD:cd20188
label: "DNA-binding domain of T-box transcription factor 2 and 3, and related T-box proteins. This subfamily includes the T-box transcription factors TBX2 and TBX3 and similar proteins. TBX2 is an oncogenic transcription factor implicated in developmental processes, including coordinating cell fate, patterning and morphogenesis of a wide range of tissues and organs. It is overexpressed in several cancers, including melanoma and breast, and plays a key role during cardiac development. TBX2 is a negative regulator of promyelocytic leukemia protein (PML) function in cellular senescence, and it interacts with HP1 to recruit a repression complex to EGR1-responsive promoters to drive the proliferation of breast cancer cells. TBX3 has also been implicated in oncogenesis in breast cancer and melanoma. The tbx3 gene is downregulated by PML. TBX3 directly represses TBX2 under the control of the PRC2 complex in skeletal muscle and rhabdomyosarcoma. Also included in this family is the Drosophila melanogaster optomotor-blind protein (Omb, also known as lethal(1)optomotor-blind, or L(1)omb, or protein bifid) which controls many developmental processes such as wing, eye, and abdominal tergites and optic lobes, and induces epithelial cell migration and extrusion in vivo. This subfamily belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is brachyury (also known as TBXT, or T). T-box family members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns."
definition: >-
  DNA-binding domain of T-box transcription factor 2 and 3, and related T-box proteins. This subfamily includes the T-box transcription factors TBX2 and TBX3 and similar proteins. TBX2 is an oncogenic transcription factor implicated in developmental processes, including coordinating cell fate, patterning and morphogenesis of a wide range of tissues and organs. It is overexpressed in several cancers, including melanoma and breast, and plays a key role during cardiac development. TBX2 is a negative regulator of promyelocytic leukemia protein (PML) function in cellular senescence, and it interacts with HP1 to recruit a repression complex to EGR1-responsive promoters to drive the proliferation of breast cancer cells. TBX3 has also been implicated in oncogenesis in breast cancer and melanoma. The tbx3 gene is downregulated by PML. TBX3 directly represses TBX2 under the control of the PRC2 complex in skeletal muscle and rhabdomyosarcoma. Also included in this family is the Drosophila melanogaster optomotor-blind protein (Omb, also known as lethal(1)optomotor-blind, or L(1)omb, or protein bifid) which controls many developmental processes such as wing, eye, and abdominal tergites and optic lobes, and induces epithelial cell migration and extrusion in vivo. This subfamily belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is brachyury (also known as TBXT, or T). T-box family members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns. — an NCBI CDD conserved domain (cd20188); members share this curated model.
