identifier: CDD:cd22269
label: "double-psi beta-barrel fold of EG45-like domain-containing proteins. This family contains plant EG45-like domain-containing proteins which show sequence similarity to expansins, and similar proteins. Citrus jambhiri EG45-like domain-containing protein was identified as a protein associated with citrus blight (CB), and is also called blight-associated protein p12 (CjBAp12) or plant natriuretic peptide (PNP). CjBAp12 does not display cell wall loosening activity of expansins. Arabidopsis thaliana EG45-like domain-containing protein 2, also called plant natriuretic peptide A (AtPNP-A), is a systemically mobile natriuretic peptide immunoanalog, recognized by antibodies against vertebrate atrial natriuretic peptides (ANPs), that functions in cell volume regulation. Thus, it has an important and systemic role in plant growth and homeostasis. Due to their similarity to the N-terminal domain of expansin and to endolytic peptidoglycan transglycosylase RlpA, EG45-like domain-containing proteins may adopt a double-psi beta-barrel fold."
definition: >-
  double-psi beta-barrel fold of EG45-like domain-containing proteins. This family contains plant EG45-like domain-containing proteins which show sequence similarity to expansins, and similar proteins. Citrus jambhiri EG45-like domain-containing protein was identified as a protein associated with citrus blight (CB), and is also called blight-associated protein p12 (CjBAp12) or plant natriuretic peptide (PNP). CjBAp12 does not display cell wall loosening activity of expansins. Arabidopsis thaliana EG45-like domain-containing protein 2, also called plant natriuretic peptide A (AtPNP-A), is a systemically mobile natriuretic peptide immunoanalog, recognized by antibodies against vertebrate atrial natriuretic peptides (ANPs), that functions in cell volume regulation. Thus, it has an important and systemic role in plant growth and homeostasis. Due to their similarity to the N-terminal domain of expansin and to endolytic peptidoglycan transglycosylase RlpA, EG45-like domain-containing proteins may adopt a double-psi beta-barrel fold. — an NCBI CDD conserved domain (cd22269); members share this curated model.
