identifier: CDD:cd06269
label: PBP1_glutamate_receptors-like
definition: >-
  ligand-binding domain of family C G-protein couples receptors (GPCRs), membrane bound guanylyl cyclases such as natriuretic peptide receptors (NPRs), and N-terminal leucine/isoleucine/valine-binding protein (LIVBP)-like domain of ionotropic glutamate receptors. This CD represents the ligand-binding domain of the family C G-protein couples receptors (GPCRs), membrane bound guanylyl cyclases such as the family of natriuretic peptide receptors (NPRs), and the N-terminal leucine-isoleucine-valine binding protein (LIVBP)-like domain of the ionotropic glutamate receptors, all of which are structurally similar and related to the periplasmic-binding fold type 1 family. The family C GPCRs consists of metabotropic glutamate receptor (mGluR), a calcium-sensing receptor (CaSR), gamma-aminobutyric acid receptor (GABAbR), the promiscuous L-alpha-amino acid receptor GPR6A, families of taste and pheromone receptors, and orphan receptors. Truncated splicing variants of the orphan receptors are not included in this CD. The family C GPCRs are activated by endogenous agonists such as amino acids, ions, and sugar based molecules. Their amino terminal ligand-binding region is homologous to the bacterial leucine-isoleucine-valine binding protein (LIVBP) and a leucine binding protein (LBP). The ionotropic glutamate receptors (iGluRs) have an integral ion channel and are subdivided into three major groups based on their pharmacology and structural similarities: NMDA receptors, AMPA receptors, and kainate receptors. The family of membrane bound guanylyl cyclases is further divided into three subfamilies: the ANP receptor (GC-A)/C-type natriuretic peptide receptor (GC-B), the heat-stable enterotoxin receptor (GC-C)/sensory organ specific membrane GCs such as retinal receptors (GC-E, GC-F), and olfactory receptors (GC-D and GC-G)
