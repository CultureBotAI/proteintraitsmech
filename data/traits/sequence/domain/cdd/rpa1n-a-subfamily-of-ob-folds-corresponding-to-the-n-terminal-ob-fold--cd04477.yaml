identifier: CDD:cd04477
label: "RPA1N: A subfamily of OB folds corresponding to the N-terminal OB-fold domain of human RPA1 (also called RPA70). RPA1 is the large subunit of Replication protein A (RPA). RPA is a nuclear ssDNA-binding protein (SSB) which appears to be involved in all aspects of DNA metabolism including replication, recombination, and repair. RPA also mediates specific interactions of various nuclear proteins. In animals, plants, and fungi, RPA is a heterotrimer with subunits of 70KDa (RPA1), 32kDa (RPA2), and 14 KDa (RPA3). RPA1N is known to specifically interact with the p53 tumor suppressor, DNA polymerase alpha, and transcription factors. In addition to RPA1N, RPA1 contains three other OB folds: ssDNA-binding domain (DBD)-A, DBD-B, and DBD-C."
definition: >-
  RPA1N: A subfamily of OB folds corresponding to the N-terminal OB-fold domain of human RPA1 (also called RPA70). RPA1 is the large subunit of Replication protein A (RPA). RPA is a nuclear ssDNA-binding protein (SSB) which appears to be involved in all aspects of DNA metabolism including replication, recombination, and repair. RPA also mediates specific interactions of various nuclear proteins. In animals, plants, and fungi, RPA is a heterotrimer with subunits of 70KDa (RPA1), 32kDa (RPA2), and 14 KDa (RPA3). RPA1N is known to specifically interact with the p53 tumor suppressor, DNA polymerase alpha, and transcription factors. In addition to RPA1N, RPA1 contains three other OB folds: ssDNA-binding domain (DBD)-A, DBD-B, and DBD-C. — an NCBI CDD conserved domain (cd04477); members share this curated model.
