identifier: CDD:cd16343
label: "Low molecular weight protein tyrosine phosphatase. Low molecular weight protein tyrosine phosphatases (LMW-PTP) are a family of  small soluble single-domain enzymes that are characterized by a highly conserved active site motif (V/I)CXGNXCRS and share no sequence similarity with other types of protein tyrosine phosphatases (PTPs). LMW-PTPs play important roles in many biological processes and are widely distributed in prokaryotes and eukaryotes."
definition: >-
