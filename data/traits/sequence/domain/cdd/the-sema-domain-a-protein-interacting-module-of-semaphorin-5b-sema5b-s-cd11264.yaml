identifier: CDD:cd11264
label: "The Sema domain, a protein interacting module, of semaphorin 5B (Sema5B). Sema5B is expressed in regions of the basal telencephalon in rat. Sema5B is an inhibitory cue for corticofugal axons and acts as a source of repulsion for the appropriate guidance of cortical axons away from structures such as the ventricular zone as they navigate toward and within subcortical regions. In addition to its role as a guidance cue, Sema5B regulates the development and maintenance of synapse size and number in hippocampal neurons. In addition, the sema domain of Sema5B can be cleaved of the whole protein and exerts its function in regulation of synapse morphology. Sema5B belongs to the class 5 semaphorin family of proteins, which are transmembrane glycoproteins characterized by unique thrombospondin specific repeats in the extracellular region of the protein. Semaphorins are regulatory molecules involved in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of semaphorin 5B (Sema5B). Sema5B is expressed in regions of the basal telencephalon in rat. Sema5B is an inhibitory cue for corticofugal axons and acts as a source of repulsion for the appropriate guidance of cortical axons away from structures such as the ventricular zone as they navigate toward and within subcortical regions. In addition to its role as a guidance cue, Sema5B regulates the development and maintenance of synapse size and number in hippocampal neurons. In addition, the sema domain of Sema5B can be cleaved of the whole protein and exerts its function in regulation of synapse morphology. Sema5B belongs to the class 5 semaphorin family of proteins, which are transmembrane glycoproteins characterized by unique thrombospondin specific repeats in the extracellular region of the protein. Semaphorins are regulatory molecules involved in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module. — an NCBI CDD conserved domain (cd11264); members share this curated model.
