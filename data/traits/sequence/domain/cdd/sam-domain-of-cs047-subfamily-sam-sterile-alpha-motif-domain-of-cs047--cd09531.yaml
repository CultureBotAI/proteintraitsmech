identifier: CDD:cd09531
label: "SAM domain of CS047 subfamily. SAM (sterile alpha motif) domain of CS047 subfamily is a putative protein-protein interaction domain. Proteins of this subfamily have a SAM domain at the N-terminus. SAM is a widespread domain in signaling and regulatory proteins. In many cases SAM mediates homodimerization/oligomerization. The exact function of proteins belonging to this group is unknown."
definition: >-
  SAM domain of CS047 subfamily. SAM (sterile alpha motif) domain of CS047 subfamily is a putative protein-protein interaction domain. Proteins of this subfamily have a SAM domain at the N-terminus. SAM is a widespread domain in signaling and regulatory proteins. In many cases SAM mediates homodimerization/oligomerization. The exact function of proteins belonging to this group is unknown. — an NCBI CDD conserved domain (cd09531); members share this curated model.
