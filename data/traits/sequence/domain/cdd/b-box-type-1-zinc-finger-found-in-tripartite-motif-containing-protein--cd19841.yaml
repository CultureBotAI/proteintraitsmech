label: Bbox1_TRIM44
definition: >-
  B-box-type 1 zinc finger found in tripartite motif-containing protein 44 (TRIM44) and similar proteins. TRIM44, also termed protein DIPB, functions as a critical regulator in tumor metastasis and progression. TRIM44 belongs to an unclassified TRIM (tripartite motif) family of proteins that do not have RING fingers and thus lack the characteristic tripartite (RING (R), B-box, and coiled coil (CC)) RBCC motif. The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif; this family contains a modified motif, C5H3
