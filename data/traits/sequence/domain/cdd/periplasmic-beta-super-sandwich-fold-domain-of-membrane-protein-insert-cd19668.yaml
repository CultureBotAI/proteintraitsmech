identifier: CDD:cd19668
label: "periplasmic beta-super sandwich fold domain of membrane protein insertase YidC from Thermotoga maritima and similar domains. This subfamily is composed of Thermotoga maritima YidC (TmYidC) and similar proteins. Membrane protein insertase YidC, also called foldase YidC or membrane integrase YidC, facilitates proper folding, insertion, and assembly of inner membrane proteins and complexes. Depending on the nature of the substrate, YidC functions in a Sec-independent (YidC only) or a Sec-dependent manner as part of a complex containing YidC, the SecYEG channel, and SecDFYajC. YidC belongs to the YidC/Oxa1/Alb3 protein family of insertases that contain a core domain of five transmembrane (TM) segments that is essential to insertase function. In addition to this core transmembrane domain, YidC from Gram-negative bacteria contain an extra transmembrane segment (TM1) at the N-terminus and a large periplasmic domain, located between TM1 and TM2, that adopts a beta-super sandwich fold that is found in sugar-binding proteins such as galactose mutarotase. This periplasmic domain may have a role in protein assembly: a region of YidC that binds to SecF maps to one edge of the beta-super sandwich. The periplasmic domain of TmYidC shows no amino acid sequence identity with that of the prototypical Escherichia coli YidC (EcYidC), yet they adopt a similar fold. However, the periplasmic domain of TmYidC displays shorter beta strands and some differences in connectivity, compared to EcYidC."
definition: >-
  periplasmic beta-super sandwich fold domain of membrane protein insertase YidC from Thermotoga maritima and similar domains. This subfamily is composed of Thermotoga maritima YidC (TmYidC) and similar proteins. Membrane protein insertase YidC, also called foldase YidC or membrane integrase YidC, facilitates proper folding, insertion, and assembly of inner membrane proteins and complexes. Depending on the nature of the substrate, YidC functions in a Sec-independent (YidC only) or a Sec-dependent manner as part of a complex containing YidC, the SecYEG channel, and SecDFYajC. YidC belongs to the YidC/Oxa1/Alb3 protein family of insertases that contain a core domain of five transmembrane (TM) segments that is essential to insertase function. In addition to this core transmembrane domain, YidC from Gram-negative bacteria contain an extra transmembrane segment (TM1) at the N-terminus and a large periplasmic domain, located between TM1 and TM2, that adopts a beta-super sandwich fold that is found in sugar-binding proteins such as galactose mutarotase. This periplasmic domain may have a role in protein assembly: a region of YidC that binds to SecF maps to one edge of the beta-super sandwich. The periplasmic domain of TmYidC shows no amino acid sequence identity with that of the prototypical Escherichia coli YidC (EcYidC), yet they adopt a similar fold. However, the periplasmic domain of TmYidC displays shorter beta strands and some differences in connectivity, compared to EcYidC. — an NCBI CDD conserved domain (cd19668); members share this curated model.
