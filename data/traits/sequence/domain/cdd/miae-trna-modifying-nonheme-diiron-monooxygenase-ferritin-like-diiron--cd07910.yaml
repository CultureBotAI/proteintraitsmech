identifier: CDD:cd07910
label: "MiaE tRNA-modifying nonheme diiron monooxygenase, ferritin-like diiron-binding domain. MiaE is a nonheme diiron monooxygenase that catalyzes the posttranscriptional allylic hydroxylation of a modified nucleoside in tRNA called 2-methylthio-N-6-isopentenyl adenosine (ms2i6A).  ms2i6A is found at position 37, next to the anticodon at the 3' position in almost all eukaryotic and bacterial tRNA's that read codons beginning with uridine. The miaE gene is absent in Escherichia coli, a finding consistent with the absence of the hydroxylated derivative of ms2i6A in this species."
definition: >-
  MiaE tRNA-modifying nonheme diiron monooxygenase, ferritin-like diiron-binding domain. MiaE is a nonheme diiron monooxygenase that catalyzes the posttranscriptional allylic hydroxylation of a modified nucleoside in tRNA called 2-methylthio-N-6-isopentenyl adenosine (ms2i6A). ms2i6A is found at position 37, next to the anticodon at the 3' position in almost all eukaryotic and bacterial tRNA's that read codons beginning with uridine. The miaE gene is absent in Escherichia coli, a finding consistent with the absence of the hydroxylated derivative of ms2i6A in this species. — an NCBI CDD conserved domain (cd07910); members share this curated model.
