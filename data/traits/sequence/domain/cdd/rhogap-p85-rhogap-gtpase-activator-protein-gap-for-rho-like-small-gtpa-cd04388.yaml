identifier: CDD:cd04388
label: "RhoGAP_p85: RhoGAP (GTPase-activator protein [GAP] for Rho-like small GTPases) domain present in the p85 isoforms of the regulatory subunit of the class IA PI3K (phosphatidylinositol 3'-kinase). This domain is also called Bcr (breakpoint cluster region protein) homology (BH) domain. Class IA PI3Ks are heterodimers, containing a regulatory subunit (p85) and a catalytic subunit (p110) and are activated by growth factor receptor tyrosine kinases (RTKs); this activation is mediated by the p85 subunit. p85 isoforms, alpha and beta, contain a C-terminal p110-binding domain flanked by two SH2 domains, an N-terminal SH3 domain, and a RhoGAP domain flanked by two proline-rich regions. Small GTPases cluster into distinct families, and all act as molecular switches, active in their GTP-bound form but inactive when GDP-bound. The Rho family of GTPases activates effectors involved in a wide variety of developmental processes, including regulation of cytoskeleton formation, cell proliferation and the JNK signaling pathway. GTPases generally have a low intrinsic GTPase hydrolytic activity but there are family-specific groups of GAPs that enhance the rate of GTP hydrolysis by several orders of magnitude."
definition: >-
  RhoGAP_p85: RhoGAP (GTPase-activator protein [GAP] for Rho-like small GTPases) domain present in the p85 isoforms of the regulatory subunit of the class IA PI3K (phosphatidylinositol 3'-kinase). This domain is also called Bcr (breakpoint cluster region protein) homology (BH) domain. Class IA PI3Ks are heterodimers, containing a regulatory subunit (p85) and a catalytic subunit (p110) and are activated by growth factor receptor tyrosine kinases (RTKs); this activation is mediated by the p85 subunit. p85 isoforms, alpha and beta, contain a C-terminal p110-binding domain flanked by two SH2 domains, an N-terminal SH3 domain, and a RhoGAP domain flanked by two proline-rich regions. Small GTPases cluster into distinct families, and all act as molecular switches, active in their GTP-bound form but inactive when GDP-bound. The Rho family of GTPases activates effectors involved in a wide variety of developmental processes, including regulation of cytoskeleton formation, cell proliferation and the JNK signaling pathway. GTPases generally have a low intrinsic GTPase hydrolytic activity but there are family-specific groups of GAPs that enhance the rate of GTP hydrolysis by several orders of magnitude. — an NCBI CDD conserved domain (cd04388); members share this curated model.
