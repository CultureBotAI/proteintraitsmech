identifier: CDD:cd21037
label: "N-terminal domain of mixed lineage kinase domain-like protein (MLKL) and similar proteins. MLKL is a pseudokinase that does not have protein kinase activity and plays a key role in tumor necrosis factor (TNF)-induced necroptosis, a programmed cell death process. The model corresponds to the MLKL N-terminal region that reveals a four-helix bundle with an additional helix at the top which is likely key for MLKL function. The N-terminal domain binds directly to phospholipids and induces membrane permeabilization."
definition: >-
  N-terminal domain of mixed lineage kinase domain-like protein (MLKL) and similar proteins. MLKL is a pseudokinase that does not have protein kinase activity and plays a key role in tumor necrosis factor (TNF)-induced necroptosis, a programmed cell death process. The model corresponds to the MLKL N-terminal region that reveals a four-helix bundle with an additional helix at the top which is likely key for MLKL function. The N-terminal domain binds directly to phospholipids and induces membrane permeabilization. — an NCBI CDD conserved domain (cd21037); members share this curated model.
