identifier: CDD:cd17321
label: "Methylenomycin A resistance protein (also called MMR peptide) and similar multidrug resistance (MDR) transporters of the Major Facilitator Superfamily. This family is composed of bacterial, fungal, and archaeal multidrug resistance (MDR) transporters including several proteins from Bacilli such as methylenomycin A resistance protein (also called MMR peptide), tetracycline resistance protein (TetB), and lincomycin resistance protein LmrB, as well as fungal proteins such as vacuolar basic amino acid transporters, which are involved in the transport into vacuoles of the basic amino acids histidine, lysine, and arginine in Saccharomyces cerevisiae, and aminotriazole/azole resistance proteins. MDR transporters are drug/H+ antiporters (DHA) that mediate the efflux of a variety of drugs and toxic compounds, and confer resistance to these compounds. For example, MMR confers resistance to the epoxide antibiotic methylenomycin while TetB resistance to tetracycline by an active tetracycline efflux. MMR-like MDR transporters belong to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Methylenomycin A resistance protein (also called MMR peptide) and similar multidrug resistance (MDR) transporters of the Major Facilitator Superfamily. This family is composed of bacterial, fungal, and archaeal multidrug resistance (MDR) transporters including several proteins from Bacilli such as methylenomycin A resistance protein (also called MMR peptide), tetracycline resistance protein (TetB), and lincomycin resistance protein LmrB, as well as fungal proteins such as vacuolar basic amino acid transporters, which are involved in the transport into vacuoles of the basic amino acids histidine, lysine, and arginine in Saccharomyces cerevisiae, and aminotriazole/azole resistance proteins. MDR transporters are drug/H+ antiporters (DHA) that mediate the efflux of a variety of drugs and toxic compounds, and confer resistance to these compounds. For example, MMR confers resistance to the epoxide antibiotic methylenomycin while TetB resistance to tetracycline by an active tetracycline efflux. MMR-like MDR transporters belong to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17321); members share this curated model.
