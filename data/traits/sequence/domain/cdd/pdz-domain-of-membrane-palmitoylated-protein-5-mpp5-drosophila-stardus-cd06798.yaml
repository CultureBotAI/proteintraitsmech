identifier: CDD:cd06798
label: "PDZ domain of membrane palmitoylated protein 5 (MPP5), Drosophila Stardust, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of MPP5, Drosophila Stardust, and related domains. MPP5 (also known as MAGUK p55 subfamily member 1, protein associated with Lin-7 1 or PALS1) and Drosophila Stardust are membrane-associated guanylate kinase (MAGUK)-like proteins that serve as signaling and scaffolding proteins, linking different proteins critical to the formation and maintenance of tight junctions (TJ) and apical-basal polarity. Apical-basal polarity determinants cluster in complexes; in particular, the Crumbs complex (Crb, MPP5, and PATJ) and the PAR/aPKC-complex (PAR-3, PAR-6, aPKC) determine the apical plasma membrane domain. Within the Crumbs complex, Crb is stabilized in the plasma membrane by MPP5, which in turn recruits PATJ and Lin-7 to the complex. MPP5 also links the Crumbs complex with the PAR/aPKC-complex. The Drosophila homolog of the Crumbs complex is the (CRB)-Stardust (Sdt)-Discs Lost (Dlt) complex. MPP5 also acts as an interaction partner for SARS-CoV envelope protein E, which results in delayed formation of TJs and dysregulation of cell polarity. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This MPP5-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
