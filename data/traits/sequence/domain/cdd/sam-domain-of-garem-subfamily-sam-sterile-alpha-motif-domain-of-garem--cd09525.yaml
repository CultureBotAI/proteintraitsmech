identifier: CDD:cd09525
label: "SAM domain of GAREM subfamily. SAM (sterile alpha motif) domain of GAREM (Grb2-associated and regulator of Erk/MARK) protein subfamily (also known as FAM59A) is a putative protein-protein interaction domain. SAM domain is a widespread domain in signaling proteins. Proteins of this group have SAM at the C-terminus. Human GAREM protein is known to play a role in regulation of the EGF (Epidermal Growth Factor) receptor and of Gab or insulin preceptor substrate-1 family proteins. Grb2 (Growth factor receptor-bound) protein was identified as a binding partner of human GAREM. Proline-rich motifs and phosphorylation of two conserved tyrosines in GAREM are important for the interaction with the SH3 domains of Grb2 protein; however these motifs and residues do not belong to the SAM domain."
definition: >-
  SAM domain of GAREM subfamily. SAM (sterile alpha motif) domain of GAREM (Grb2-associated and regulator of Erk/MARK) protein subfamily (also known as FAM59A) is a putative protein-protein interaction domain. SAM domain is a widespread domain in signaling proteins. Proteins of this group have SAM at the C-terminus. Human GAREM protein is known to play a role in regulation of the EGF (Epidermal Growth Factor) receptor and of Gab or insulin preceptor substrate-1 family proteins. Grb2 (Growth factor receptor-bound) protein was identified as a binding partner of human GAREM. Proline-rich motifs and phosphorylation of two conserved tyrosines in GAREM are important for the interaction with the SH3 domains of Grb2 protein; however these motifs and residues do not belong to the SAM domain. — an NCBI CDD conserved domain (cd09525); members share this curated model.
