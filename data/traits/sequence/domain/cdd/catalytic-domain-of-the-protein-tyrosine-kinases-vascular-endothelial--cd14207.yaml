identifier: CDD:cd14207
label: "Catalytic domain of the Protein Tyrosine Kinases, Vascular Endothelial Growth Factor Receptors. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. VEGFR1 (or Flt1) binds VEGFA, VEGFB, and placenta growth factor (PLGF). It regulates monocyte and macrophage migration, vascular permeability, haematopoiesis, and the recruitment of haematopietic progenitor cells from the bone marrow. VEGFR1 is a member of the VEGFR subfamily of proteins, which are receptor PTKs (RTKs) containing an extracellular ligand-binding region with seven immunoglobulin (Ig)-like domains, a transmembrane segment, and an intracellular catalytic domain. The binding of VEGFRs to their ligands, the VEGFs, leads to receptor dimerization, activation, and intracellular signaling. The VEGFR1 subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Protein Tyrosine Kinases, Vascular Endothelial Growth Factor Receptors. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. VEGFR1 (or Flt1) binds VEGFA, VEGFB, and placenta growth factor (PLGF). It regulates monocyte and macrophage migration, vascular permeability, haematopoiesis, and the recruitment of haematopietic progenitor cells from the bone marrow. VEGFR1 is a member of the VEGFR subfamily of proteins, which are receptor PTKs (RTKs) containing an extracellular ligand-binding region with seven immunoglobulin (Ig)-like domains, a transmembrane segment, and an intracellular catalytic domain. The binding of VEGFRs to their ligands, the VEGFs, leads to receptor dimerization, activation, and intracellular signaling. The VEGFR1 subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14207); members share this curated model.
