identifier: CDD:cd18256
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in intracisternal A particle-promoted polypeptide (IPP). IPP, also called Kelch-like protein 27 (KLHL27) or actin-binding protein IPP, is an actin-binding protein that may play a role in organizing the actin cytoskeleton. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in intracisternal A particle-promoted polypeptide (IPP). IPP, also called Kelch-like protein 27 (KLHL27) or actin-binding protein IPP, is an actin-binding protein that may play a role in organizing the actin cytoskeleton. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18256); members share this curated model.
