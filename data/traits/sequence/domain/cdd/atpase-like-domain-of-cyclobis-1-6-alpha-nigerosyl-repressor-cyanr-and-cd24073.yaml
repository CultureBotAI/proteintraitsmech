label: "ATPase-like domain of cyclobis-(1-6)-alpha-nigerosyl repressor (CYANR) and similar proteins. CYANR acts as transcriptional repressor of cyclobis-(1-6)-alpha-nigerosyl (CNN) degrading enzymes. Members of this subfamily belong to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities."
