identifier: CDD:cd09952
label: "LAGLIDADG endonuclease. Homing endonucleases are highly specific DNA endonucleases, encoded within mobile introns or inteins, that induce targeted recombination, double-strand repair and gene conversion of their cognate target sites. -------------- Homing endonucleases are catalysts of genespecific transpositions in which mobile intervening sequences are duplicated into homologous host alleles. ---------------Endonucleases that contain a single LAGLIDADG motif per polypeptide chain form homodimers that recognize palindromic DNA target sites and their pseudopalindromic variants. The enzymes with two motifs form pseudo-symmetric monomers capable of recognizing asymmetric DNA target sites.-------------- -"
definition: >-
  LAGLIDADG endonuclease. Homing endonucleases are highly specific DNA endonucleases, encoded within mobile introns or inteins, that induce targeted recombination, double-strand repair and gene conversion of their cognate target sites. -------------- Homing endonucleases are catalysts of genespecific transpositions in which mobile intervening sequences are duplicated into homologous host alleles. ---------------Endonucleases that contain a single LAGLIDADG motif per polypeptide chain form homodimers that recognize palindromic DNA target sites and their pseudopalindromic variants. The enzymes with two motifs form pseudo-symmetric monomers capable of recognizing asymmetric DNA target sites.-------------- - — an NCBI CDD conserved domain (cd09952); members share this curated model.
