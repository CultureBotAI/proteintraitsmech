identifier: CDD:cd11548
label: "Alpha 1,6-fucosyltransferase similar to Bradyrhizobium NodZ. Bradyrhizobium NodZ is an alpha 1,6-fucosyltransferase involved in the biosynthesis of the nodulation factor, a lipo-chitooligosaccharide formed by three-to-six beta-1,4-linked N-acetyl-d-glucosamine (GlcNAc) residues and a fatty acid acyl group attached to the nitrogen atom at the non-reducing end. NodZ transfers L-fucose from the GDP-beta-L-fucose donor to the reducing residue of the chitin oligosaccharide backbone, before the attachment of a fatty acid group. O-fucosyltransferase-like proteins are GDP-fucose dependent enzymes with similarities to the family 1 glycosyltransferases (GT1). They are soluble ER proteins that may be proteolytically cleaved from a membrane-associated preprotein, and are involved in the O-fucosylation of protein substrates, the core fucosylation of growth factor receptors, and other processes."
definition: >-
  Alpha 1,6-fucosyltransferase similar to Bradyrhizobium NodZ. Bradyrhizobium NodZ is an alpha 1,6-fucosyltransferase involved in the biosynthesis of the nodulation factor, a lipo-chitooligosaccharide formed by three-to-six beta-1,4-linked N-acetyl-d-glucosamine (GlcNAc) residues and a fatty acid acyl group attached to the nitrogen atom at the non-reducing end. NodZ transfers L-fucose from the GDP-beta-L-fucose donor to the reducing residue of the chitin oligosaccharide backbone, before the attachment of a fatty acid group. O-fucosyltransferase-like proteins are GDP-fucose dependent enzymes with similarities to the family 1 glycosyltransferases (GT1). They are soluble ER proteins that may be proteolytically cleaved from a membrane-associated preprotein, and are involved in the O-fucosylation of protein substrates, the core fucosylation of growth factor receptors, and other processes. — an NCBI CDD conserved domain (cd11548); members share this curated model.
