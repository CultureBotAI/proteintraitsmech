identifier: CDD:cd10962
label: "Catalytic NodB homology domain of uncharacterized bacterial glycosyl transferase, group 2-like family proteins. This family includes many uncharacterized bacterial proteins containing an N-terminal GH18 (glycosyl hydrolase, family 18) domain, a middle NodB-like homology domain, and a C-terminal GT2-like (glycosyl transferase group 2) domain. Although their biological function is unknown, members in this family contain a middle NodB homology domain that is similar to the catalytic domain of Streptococcus pneumoniae polysaccharide deacetylase PgdA (SpPgdA), an extracellular metal-dependent polysaccharide deacetylase with de-N-acetylase activity toward a hexamer of chitooligosaccharide N-acetylglucosamine, but not shorter chitooligosaccharides or a synthetic peptidoglycan tetrasaccharide. Like SpPgdA, this family is a member of the carbohydrate esterase 4 (CE4) superfamily. The presence of three domains suggests that members of this family may be multifunctional."
definition: >-
  Catalytic NodB homology domain of uncharacterized bacterial glycosyl transferase, group 2-like family proteins. This family includes many uncharacterized bacterial proteins containing an N-terminal GH18 (glycosyl hydrolase, family 18) domain, a middle NodB-like homology domain, and a C-terminal GT2-like (glycosyl transferase group 2) domain. Although their biological function is unknown, members in this family contain a middle NodB homology domain that is similar to the catalytic domain of Streptococcus pneumoniae polysaccharide deacetylase PgdA (SpPgdA), an extracellular metal-dependent polysaccharide deacetylase with de-N-acetylase activity toward a hexamer of chitooligosaccharide N-acetylglucosamine, but not shorter chitooligosaccharides or a synthetic peptidoglycan tetrasaccharide. Like SpPgdA, this family is a member of the carbohydrate esterase 4 (CE4) superfamily. The presence of three domains suggests that members of this family may be multifunctional. — an NCBI CDD conserved domain (cd10962); members share this curated model.
