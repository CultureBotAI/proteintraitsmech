identifier: CDD:cd08083
label: ATP-G_like3
definition: >-
  ATP-grasp domain like-3. This family appears to have the sequence similarity with the ATP-grasp domain. Enzymes related to ATP-grasp superfamily catalyze an ATP-dependent ligation of a carboxyl group carbon of one substrate with an amino or imino group nitrogen of the second one via the formation of an acylphosphate intermediate. Catalytic center requires the presence of one or more metal ions as a physiological cofactor. ATP-grasp superfamily members also share a conserved Mg-ATP-binding pocket which is covered by a flexible loop that is believed to undergo a conformational change on substrate binding. Phylogeny shows a lineage specific expansion in pezizomycotina clade. NikS and PvsA enzymes, essential in nikkomycin and vibrioferrin biosynthetic pathways respectively, are also part of this family
