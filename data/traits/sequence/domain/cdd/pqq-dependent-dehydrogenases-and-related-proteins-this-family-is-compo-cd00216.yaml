identifier: CDD:cd00216
label: "PQQ-dependent dehydrogenases and related proteins. This family is composed of dehydrogenases with pyrroloquinoline quinone (PQQ) as a cofactor, such as ethanol, methanol, and membrane-bound glucose dehydrogenases. The alignment model contains an 8-bladed beta-propeller, and the family also includes distantly related proteins which are not enzymatically active and do not bind PQQ."
definition: >-
  PQQ-dependent dehydrogenases and related proteins. This family is composed of dehydrogenases with pyrroloquinoline quinone (PQQ) as a cofactor, such as ethanol, methanol, and membrane-bound glucose dehydrogenases. The alignment model contains an 8-bladed beta-propeller, and the family also includes distantly related proteins which are not enzymatically active and do not bind PQQ. — an NCBI CDD conserved domain (cd00216); members share this curated model.
