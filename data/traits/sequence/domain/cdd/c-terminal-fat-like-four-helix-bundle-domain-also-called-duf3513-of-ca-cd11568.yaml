identifier: CDD:cd11568
label: "C-terminal FAT-like Four helix bundle domain, also called DUF3513, of CAS (Crk-Associated Substrate) scaffolding protein family member 4; a protein interaction module. CASS4, also called HEPL (HEF1-EFS-p130Cas-like), localizes to focal adhesions and plays a role in regulating FAK activity, focal adhesion integrity, and cell spreading. It is most abundant in blood cells and lung tissue, and is also found in high levels in leukemia and ovarian cell lines. CAS proteins function as molecular scaffolds to regulate protein complexes that are involved in many cellular processes. They share a common domain structure containing protein interaction modules that enable their scaffolding function, including an N-terminal SH3 domain, an unstructured substrate domain that contains many YxxP motifs, a serine-rich four-helix bundle, and a FAT-like C-terminal domain, which binds to the C-terminal domain of NSPs (novel SH2-containing proteins) to form multidomain signaling modules that mediate cell migration and invasion."
definition: >-
  C-terminal FAT-like Four helix bundle domain, also called DUF3513, of CAS (Crk-Associated Substrate) scaffolding protein family member 4; a protein interaction module. CASS4, also called HEPL (HEF1-EFS-p130Cas-like), localizes to focal adhesions and plays a role in regulating FAK activity, focal adhesion integrity, and cell spreading. It is most abundant in blood cells and lung tissue, and is also found in high levels in leukemia and ovarian cell lines. CAS proteins function as molecular scaffolds to regulate protein complexes that are involved in many cellular processes. They share a common domain structure containing protein interaction modules that enable their scaffolding function, including an N-terminal SH3 domain, an unstructured substrate domain that contains many YxxP motifs, a serine-rich four-helix bundle, and a FAT-like C-terminal domain, which binds to the C-terminal domain of NSPs (novel SH2-containing proteins) to form multidomain signaling modules that mediate cell migration and invasion. — an NCBI CDD conserved domain (cd11568); members share this curated model.
