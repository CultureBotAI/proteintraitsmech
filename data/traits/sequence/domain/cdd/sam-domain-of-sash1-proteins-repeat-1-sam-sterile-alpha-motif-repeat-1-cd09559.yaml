identifier: CDD:cd09559
label: "SAM domain of SASH1 proteins, repeat 1. SAM (sterile alpha motif) repeat 1 of SASH1 proteins is a predicted protein-protein interaction domain. Members of this subfamily are putative adaptor proteins. They appear to mediate signal transduction. SASH1 can bind 14-3-3 proteins in response to IGF1/phosphatidylinositol 3-kinase signaling. SASH1 was found upregulated in different tissues including thymus, placenta, lungs and downregulated in some breast tumors, liver metastases and colon cancers, relative to corresponding normal tissues. SASH1 is a potential candidate for a tumor suppressor gene in breast cancers. At the same time, downregulation of SASH1 in colon cancer is associated with metastasis and a poor prognosis."
definition: >-
  SAM domain of SASH1 proteins, repeat 1. SAM (sterile alpha motif) repeat 1 of SASH1 proteins is a predicted protein-protein interaction domain. Members of this subfamily are putative adaptor proteins. They appear to mediate signal transduction. SASH1 can bind 14-3-3 proteins in response to IGF1/phosphatidylinositol 3-kinase signaling. SASH1 was found upregulated in different tissues including thymus, placenta, lungs and downregulated in some breast tumors, liver metastases and colon cancers, relative to corresponding normal tissues. SASH1 is a potential candidate for a tumor suppressor gene in breast cancers. At the same time, downregulation of SASH1 in colon cancer is associated with metastasis and a poor prognosis. — an NCBI CDD conserved domain (cd09559); members share this curated model.
