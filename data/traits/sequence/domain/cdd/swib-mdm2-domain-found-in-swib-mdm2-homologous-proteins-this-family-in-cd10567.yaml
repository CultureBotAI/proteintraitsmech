identifier: CDD:cd10567
label: "SWIB/MDM2 domain found in SWIB/MDM2 homologous proteins. This family includes Schizosaccharomyces pombe upstream activation factor subunit spp27, Saccharomyces cerevisiae upstream activation factor subunit UAF30, Chlamydiae DNA topoisomerase/SWIB domain fusion protein, Arabidopsis thaliana zinc finger CCCH domain-containing proteins, AtC3H19 and AtC3H44, and similar proteins. S. pombe spp27, also termed upstream activation factor 27 KDa subunit (p27), or upstream activation factor 30 KDa subunit (p30), or upstream activation factor subunit uaf30, is a component of the UAF (upstream activation factor) complex which interacts with the upstream element of the RNA polymerase I promoter and forms a stable preinitiation complex. S. cerevisiae UAF30, also termed upstream activation factor 30 KDa subunit (p30), is a non-essential component of the UAF. It seems to play a role in silencing transcription by RNA polymerase II. The SWIB domain found in Chlamydiae DNA topoisomerase may play a role in chromatin condensation-decondensation, which is characteristic of the chlamydial developmental cycle and not found in any other types of bacteria.  AtC3H19, also termed protein needed for RDR2-independent DNA methylation (NERD), is a plant-specific GW repeat- and PHD finger-containing protein that plays a central role in integrating RNA silencing and chromatin signals in 21 nt small-interfering RNA (siRNA)-dependent DNA methylation on the cytosine pathway, leading to transcriptional gene silencing of specific sequences. This family also includes many uncharacterized proteins containing two copies of SWIB/MDM2 domain."
definition: >-
  SWIB/MDM2 domain found in SWIB/MDM2 homologous proteins. This family includes Schizosaccharomyces pombe upstream activation factor subunit spp27, Saccharomyces cerevisiae upstream activation factor subunit UAF30, Chlamydiae DNA topoisomerase/SWIB domain fusion protein, Arabidopsis thaliana zinc finger CCCH domain-containing proteins, AtC3H19 and AtC3H44, and similar proteins. S. pombe spp27, also termed upstream activation factor 27 KDa subunit (p27), or upstream activation factor 30 KDa subunit (p30), or upstream activation factor subunit uaf30, is a component of the UAF (upstream activation factor) complex which interacts with the upstream element of the RNA polymerase I promoter and forms a stable preinitiation complex. S. cerevisiae UAF30, also termed upstream activation factor 30 KDa subunit (p30), is a non-essential component of the UAF. It seems to play a role in silencing transcription by RNA polymerase II. The SWIB domain found in Chlamydiae DNA topoisomerase may play a role in chromatin condensation-decondensation, which is characteristic of the chlamydial developmental cycle and not found in any other types of bacteria. AtC3H19, also termed protein needed for RDR2-independent DNA methylation (NERD), is a plant-specific GW repeat- and PHD finger-containing protein that plays a central role in integrating RNA silencing and chromatin signals in 21 nt small-interfering RNA (siRNA)-dependent DNA methylation on the cytosine pathway, leading to transcriptional gene silencing of specific sequences. This family also includes many uncharacterized proteins containing two copies of SWIB/MDM2 domain. — an NCBI CDD conserved domain (cd10567); members share this curated model.
