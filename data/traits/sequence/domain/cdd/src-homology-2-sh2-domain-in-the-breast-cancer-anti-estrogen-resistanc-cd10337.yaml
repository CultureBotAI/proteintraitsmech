identifier: CDD:cd10337
label: "Src homology 2 (SH2) domain in the Breast Cancer Anti-estrogen Resistance protein 3. BCAR3 is part of a growing family of guanine nucleotide exchange factors is responsible for activation of Ras-family GTPases, including Sos1 and 2, GRF1 and 2, CalDAG-GEF/GRP1-4, C3G, cAMP-GEF/Epac 1 and 2, PDZ-GEFs, MR-GEF, RalGDS family members, RalGPS, RasGEF, Smg GDS, and phospholipase C(epsilon). 12102558  21262352  BCAR3 binds to the carboxy-terminus of BCAR1/p130Cas, a focal adhesion adapter protein.  Over expression of BCAR1 (p130Cas) and BCAR3 induces estrogen independent growth in normally estrogen-dependent cell lines. They have been linked to resistance to anti-estrogens in breast cancer, Rac activation, and cell motility, though the BCAR3/p130Cas complex is not required for this activity in BCAR3.  Many BCAR3-mediated signaling events in epithelial and mesenchymal cells are independent of p130Cas association. Structurally these proteins contain a single SH2 domain upstream of their RasGEF domain, which is responsible for the ability of BCAR3 to enhance p130Cas over-expression-induced migration. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain in the Breast Cancer Anti-estrogen Resistance protein 3. BCAR3 is part of a growing family of guanine nucleotide exchange factors is responsible for activation of Ras-family GTPases, including Sos1 and 2, GRF1 and 2, CalDAG-GEF/GRP1-4, C3G, cAMP-GEF/Epac 1 and 2, PDZ-GEFs, MR-GEF, RalGDS family members, RalGPS, RasGEF, Smg GDS, and phospholipase C(epsilon). 12102558 21262352 BCAR3 binds to the carboxy-terminus of BCAR1/p130Cas, a focal adhesion adapter protein. Over expression of BCAR1 (p130Cas) and BCAR3 induces estrogen independent growth in normally estrogen-dependent cell lines. They have been linked to resistance to anti-estrogens in breast cancer, Rac activation, and cell motility, though the BCAR3/p130Cas complex is not required for this activity in BCAR3. Many BCAR3-mediated signaling events in epithelial and mesenchymal cells are independent of p130Cas association. Structurally these proteins contain a single SH2 domain upstream of their RasGEF domain, which is responsible for the ability of BCAR3 to enhance p130Cas over-expression-induced migration. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10337); members share this curated model.
