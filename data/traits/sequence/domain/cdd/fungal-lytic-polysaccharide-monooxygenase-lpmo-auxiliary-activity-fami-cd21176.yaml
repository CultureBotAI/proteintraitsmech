identifier: CDD:cd21176
label: "fungal lytic polysaccharide monooxygenase (LPMO) auxiliary activity family protein. Proteins in this fungal family of copper-binding proteins may not function as lytic polysaccharide monooxygenases (LPMOs) or in specific binding of chitin and/or cellulose. A family member found in the ectomycorrhizal fungus Laccaria bicolor has been found to be located at the interface between tree rootlet cells and fungal hyphae. It does not perform oxidative cleavage of polysaccharides. Members of this family are related to LPMOs but have diverged to biological functions other than polysaccharide degradation."
definition: >-
  fungal lytic polysaccharide monooxygenase (LPMO) auxiliary activity family protein. Proteins in this fungal family of copper-binding proteins may not function as lytic polysaccharide monooxygenases (LPMOs) or in specific binding of chitin and/or cellulose. A family member found in the ectomycorrhizal fungus Laccaria bicolor has been found to be located at the interface between tree rootlet cells and fungal hyphae. It does not perform oxidative cleavage of polysaccharides. Members of this family are related to LPMOs but have diverged to biological functions other than polysaccharide degradation. — an NCBI CDD conserved domain (cd21176); members share this curated model.
