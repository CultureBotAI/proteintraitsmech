identifier: CDD:cd20564
label: "second cyclin box found in cyclin-A2 (CCNA2) and similar proteins. CCNA2 controls both the G1/S and the G2/M transition phases of the cell cycle. It is significantly overexpressed in various cancer types, and can be used as a prognostic biomarker for estrogen receptor positive (ER+) breast cancer and tamoxifen resistance. CCNA2 contains two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain."
definition: >-
  second cyclin box found in cyclin-A2 (CCNA2) and similar proteins. CCNA2 controls both the G1/S and the G2/M transition phases of the cell cycle. It is significantly overexpressed in various cancer types, and can be used as a prognostic biomarker for estrogen receptor positive (ER+) breast cancer and tamoxifen resistance. CCNA2 contains two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20564); members share this curated model.
