identifier: CDD:cd12880
label: "SPRY domain-containing protein 7. This family contains SPRY domain-containing protein 7 (also known as SPRY domain-containing protein 7 or CLL deletion region gene 6 protein homolog or CLLD6 or chronic lymphocytic leukemia deletion region gene 6 protein homolog). In humans, CLLD6 is highly expressed in heart, skeletal muscle, and testis as well as cancer cell lines. It also has cross-species conservation, suggesting that it is likely to carry out important cellular processes."
definition: >-
