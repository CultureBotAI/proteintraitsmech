identifier: CDD:cd18511
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 5 (KLHL5). KLHL5 shares high identity and similarity with the Drosophila kelch protein, a component of ring canals. It contains a BTB domain and kelch repeat domains, characteristics of a kelch family protein. It is abundantly expressed in ovary, adrenal gland, and thymus."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 5 (KLHL5). KLHL5 shares high identity and similarity with the Drosophila kelch protein, a component of ring canals. It contains a BTB domain and kelch repeat domains, characteristics of a kelch family protein. It is abundantly expressed in ovary, adrenal gland, and thymus. — an NCBI CDD conserved domain (cd18511); members share this curated model.
