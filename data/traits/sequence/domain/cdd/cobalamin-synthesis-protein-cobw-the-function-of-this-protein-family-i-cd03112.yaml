identifier: CDD:cd03112
label: "cobalamin synthesis protein CobW. The function of this protein family is unknown. The amino acid sequence of YjiA protein in E. coli contains several conserved motifs that characterizes it as a P-loop GTPase. YijA gene is among the genes significantly induced in response to DNA-damage caused by mitomycin. YijA gene is a homologue of the CobW gene which encodes the cobalamin synthesis protein/P47K."
definition: >-
  cobalamin synthesis protein CobW. The function of this protein family is unknown. The amino acid sequence of YjiA protein in E. coli contains several conserved motifs that characterizes it as a P-loop GTPase. YijA gene is among the genes significantly induced in response to DNA-damage caused by mitomycin. YijA gene is a homologue of the CobW gene which encodes the cobalamin synthesis protein/P47K. — an NCBI CDD conserved domain (cd03112); members share this curated model.
