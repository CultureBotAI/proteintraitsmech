identifier: CDD:cd14023
label: "Pseudokinase domain of Tribbles Homolog 1. The pseudokinase domain shows similarity to protein kinases but lacks crucial residues for catalytic activity. TRB1 interacts directly with the mitogen activated protein kinase (MAPK) kinase MKK4, an activator of JNK. It regulates vascular smooth muscle cell proliferation and chemotaxis through the JNK signaling pathway. It is found to be down-regulated in human acute myeloid leukaemia (AML) and may play a role in the pathogenesis of the disease. It has also been identified as a potential biomarker for antibody-mediated allograft failure. TRB1 is one of three Tribbles Homolog (TRB) proteins present in vertebrates that are encoded by three separate genes. TRB proteins interact with many proteins involved in signalling pathways. They play scaffold-like regulatory functions and affect many cellular processes such as mitosis, apoptosis, and gene expression. The TRB1 subfamily is part of a larger superfamily that includes the catalytic domains of serine/threonine kinases, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Pseudokinase domain of Tribbles Homolog 1. The pseudokinase domain shows similarity to protein kinases but lacks crucial residues for catalytic activity. TRB1 interacts directly with the mitogen activated protein kinase (MAPK) kinase MKK4, an activator of JNK. It regulates vascular smooth muscle cell proliferation and chemotaxis through the JNK signaling pathway. It is found to be down-regulated in human acute myeloid leukaemia (AML) and may play a role in the pathogenesis of the disease. It has also been identified as a potential biomarker for antibody-mediated allograft failure. TRB1 is one of three Tribbles Homolog (TRB) proteins present in vertebrates that are encoded by three separate genes. TRB proteins interact with many proteins involved in signalling pathways. They play scaffold-like regulatory functions and affect many cellular processes such as mitosis, apoptosis, and gene expression. The TRB1 subfamily is part of a larger superfamily that includes the catalytic domains of serine/threonine kinases, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14023); members share this curated model.
