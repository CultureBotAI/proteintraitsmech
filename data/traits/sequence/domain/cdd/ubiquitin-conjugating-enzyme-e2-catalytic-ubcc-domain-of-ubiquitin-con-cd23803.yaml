identifier: CDD:cd23803
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 R1-R2 and related proteins. The E2R subfamily includes mammalian ubiquitin-conjugating enzymes E2 R1 (UBE2R1/UBCH3/CDC34, EC 2.3.2.23 and EC 2.3.2.24), and E2 R2 (UBE2R2/UBC3B/CDC34B, EC 2.3.2.23), which accept ubiquitin from the E1 complex and catalyzes its covalent attachment to other proteins. In vitro, UBE2R1 catalyzes 'Lys-48'-linked polyubiquitination. It also involved in the degradation of beta-catenin. In vitro, UBE2R2 catalyzes monoubiquitination and 'Lys-48'-linked polyubiquitination. It may be involved in the degradation of katenin."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 R1-R2 and related proteins. The E2R subfamily includes mammalian ubiquitin-conjugating enzymes E2 R1 (UBE2R1/UBCH3/CDC34, EC 2.3.2.23 and EC 2.3.2.24), and E2 R2 (UBE2R2/UBC3B/CDC34B, EC 2.3.2.23), which accept ubiquitin from the E1 complex and catalyzes its covalent attachment to other proteins. In vitro, UBE2R1 catalyzes 'Lys-48'-linked polyubiquitination. It also involved in the degradation of beta-catenin. In vitro, UBE2R2 catalyzes monoubiquitination and 'Lys-48'-linked polyubiquitination. It may be involved in the degradation of katenin. — an NCBI CDD conserved domain (cd23803); members share this curated model.
