identifier: CDD:cd22329
label: "Restriction endonuclease HincII and similar endonucleases. Type II restriction endonuclease HincII cleaves double-stranded DNA 5'-GTY|RAC-3' (| denotes the cleavage site, Y stands for C or T, R stand for A or G ) creating blunt ends. It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Restriction endonuclease HincII and similar endonucleases. Type II restriction endonuclease HincII cleaves double-stranded DNA 5'-GTY|RAC-3' (| denotes the cleavage site, Y stands for C or T, R stand for A or G ) creating blunt ends. It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22329); members share this curated model.
