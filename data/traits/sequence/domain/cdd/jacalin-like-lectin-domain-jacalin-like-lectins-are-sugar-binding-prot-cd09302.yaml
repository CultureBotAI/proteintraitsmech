identifier: CDD:cd09302
label: "Jacalin-like lectin domain. Jacalin-like lectins are sugar-binding protein domains mostly found in plants. They adopt a beta-prism topology consistent with a circularly permuted three-fold repeat of a structural motif. Proteins containing this domain may bind mono- or oligosaccharides with high specificity. The domain can occur in tandem-repeat arrangements with up to six copies, and in architectures combined with a variety of other functional domains. Taxonomic distribution is not restricted to plants, the domain is also found in various mammalian proteins, for example."
definition: >-
  Jacalin-like lectin domain. Jacalin-like lectins are sugar-binding protein domains mostly found in plants. They adopt a beta-prism topology consistent with a circularly permuted three-fold repeat of a structural motif. Proteins containing this domain may bind mono- or oligosaccharides with high specificity. The domain can occur in tandem-repeat arrangements with up to six copies, and in architectures combined with a variety of other functional domains. Taxonomic distribution is not restricted to plants, the domain is also found in various mammalian proteins, for example. — an NCBI CDD conserved domain (cd09302); members share this curated model.
