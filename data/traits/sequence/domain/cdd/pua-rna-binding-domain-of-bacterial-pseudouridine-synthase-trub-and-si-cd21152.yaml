identifier: CDD:cd21152
label: "PUA RNA-binding domain of bacterial pseudouridine synthase TruB and similar proteins. The RNA-binding PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain was detected in a number of proteins involved in RNA metabolism. Members of this bacterial subfamily of pseudouridine synthases, including TruB and similar proteins, are modules that assist in the binding and positioning (guide and/or substrate) of RNA to the pseudouridine synthase complex. Pseudouridine synthases are enzymes that are responsible for post-translational modifications of RNAs by specifically isomerizing uracil residues. The pseudouridine synthase TruB (also called tRNA pseudouridylate synthase B or Psi55 synthase) is responsible for synthesis of pseudouridine from uracil-55 in the psi GC loop of elongator tRNAs."
definition: >-
  PUA RNA-binding domain of bacterial pseudouridine synthase TruB and similar proteins. The RNA-binding PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain was detected in a number of proteins involved in RNA metabolism. Members of this bacterial subfamily of pseudouridine synthases, including TruB and similar proteins, are modules that assist in the binding and positioning (guide and/or substrate) of RNA to the pseudouridine synthase complex. Pseudouridine synthases are enzymes that are responsible for post-translational modifications of RNAs by specifically isomerizing uracil residues. The pseudouridine synthase TruB (also called tRNA pseudouridylate synthase B or Psi55 synthase) is responsible for synthesis of pseudouridine from uracil-55 in the psi GC loop of elongator tRNAs. — an NCBI CDD conserved domain (cd21152); members share this curated model.
