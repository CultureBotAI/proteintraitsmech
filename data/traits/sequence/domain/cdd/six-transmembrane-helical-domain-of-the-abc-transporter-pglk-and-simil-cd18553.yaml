identifier: CDD:cd18553
label: "Six-transmembrane helical domain of the ABC transporter PglK and similar proteins. This group represents the transmembrane (TM) domain of an active lipid-linked oligosaccharides flippase PglK (protein glycosylation K), which is a homodimeric ABC transporter that flips a lipid-linked oligosaccharide that serves as a glycan donor in N-linked protein glycosylation. Pglk mediates the ATP-dependent translocation of the undecaprenylpyrophosphate-linked heptasaccharide intermediate across the cell membrane; this is an essential step during the N-linked protein glycosylation pathway. This TM subunit exhibits the ATP-binding cassette (ABC) exporter fold, which is characterized by 6 TM helices per subunit (domain), or a total of 12 TM helices for the complete transporter. The ABC exporters are found in both prokaryotes and eukaryotes, where they mediate the cellular secretion of toxic compounds, a various type of lipids and polypeptides. Bacterial ABC exporters are typically expressed as half-transporters that contain one transmembrane domain (TMD) fused to a nucleotide-binding domain (NBD), which dimerize to form the full transporter."
definition: >-
  Six-transmembrane helical domain of the ABC transporter PglK and similar proteins. This group represents the transmembrane (TM) domain of an active lipid-linked oligosaccharides flippase PglK (protein glycosylation K), which is a homodimeric ABC transporter that flips a lipid-linked oligosaccharide that serves as a glycan donor in N-linked protein glycosylation. Pglk mediates the ATP-dependent translocation of the undecaprenylpyrophosphate-linked heptasaccharide intermediate across the cell membrane; this is an essential step during the N-linked protein glycosylation pathway. This TM subunit exhibits the ATP-binding cassette (ABC) exporter fold, which is characterized by 6 TM helices per subunit (domain), or a total of 12 TM helices for the complete transporter. The ABC exporters are found in both prokaryotes and eukaryotes, where they mediate the cellular secretion of toxic compounds, a various type of lipids and polypeptides. Bacterial ABC exporters are typically expressed as half-transporters that contain one transmembrane domain (TMD) fused to a nucleotide-binding domain (NBD), which dimerize to form the full transporter. — an NCBI CDD conserved domain (cd18553); members share this curated model.
