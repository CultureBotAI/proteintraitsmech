identifier: CDD:cd11242
label: "The Sema domain, a protein interacting module, of class 6 semaphorins (Sema6). Class 6 semaphorins (Sema6s) are membrane associated semaphorins. There are 6 subfamilies named 6A to 6D. Sema6s bind to plexin As in a neuropilin independent fashion. Sema6-plexin A signaling plays important roles in lamina-specific axon projections. Interactions between plexin A2, plexin A4, and Sema6A control lamina-restricted projection of hippocampal mossy fibers. Interactions between Sema6C, Sema6D and plexin A1 shape the stereotypic trajectories of sensory axons in the spinal cord. In addition to axon targeting, Sema6D-plexin A1 interactions influence a wide range of other biological processes. During cardiac development, Sema6D attracts or repels endothelial cells in the cardiac tube depending on the expression patterns of specific coreceptors in addition to plexin A1. Furthermore, Sema6D binds a receptor complex comprising of plexin A1, Trem2 (triggering receptor expressed on myeloid cells 2), and DAP12 on dendritic cells and osteoclasts to mediate T-cell-DC interactions and to control bone development, respectively.  The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues.  It serves as a receptor-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of class 6 semaphorins (Sema6). Class 6 semaphorins (Sema6s) are membrane associated semaphorins. There are 6 subfamilies named 6A to 6D. Sema6s bind to plexin As in a neuropilin independent fashion. Sema6-plexin A signaling plays important roles in lamina-specific axon projections. Interactions between plexin A2, plexin A4, and Sema6A control lamina-restricted projection of hippocampal mossy fibers. Interactions between Sema6C, Sema6D and plexin A1 shape the stereotypic trajectories of sensory axons in the spinal cord. In addition to axon targeting, Sema6D-plexin A1 interactions influence a wide range of other biological processes. During cardiac development, Sema6D attracts or repels endothelial cells in the cardiac tube depending on the expression patterns of specific coreceptors in addition to plexin A1. Furthermore, Sema6D binds a receptor complex comprising of plexin A1, Trem2 (triggering receptor expressed on myeloid cells 2), and DAP12 on dendritic cells and osteoclasts to mediate T-cell-DC interactions and to control bone development, respectively. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module. — an NCBI CDD conserved domain (cd11242); members share this curated model.
