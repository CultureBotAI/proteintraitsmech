identifier: CDD:cd12147
label: Cep3_C
definition: >-
  C-terminal domain of the Cep3, a subunit of the yeast centromere-binding factor 3. Cep3, together with Skp1, Ctf13, and Ndc10, forms the yeast centromere-binding factor 3 (CBF3) which initiates kinetochore assembly by binding to the CDEIII locus of centromeric DNA. Cep3 is comprised of two domains, the N-terminal DNA-binding module, a Zn2Cys6-cluster, C-terminal domain, which dimerizes and is believed to be involved in the recruitment of the Skp1-Ctf1 heterodimer
