identifier: CDD:cd05152
label: "Macrolide 2'-Phosphotransferase. MPH2' catalyzes the transfer of the gamma-phosphoryl group from ATP to the 2'-hydroxyl of macrolide antibiotics such as erythromycin, clarithromycin, and azithromycin, among others. Macrolides penetrate the bacterial cell and bind to ribosomes, where it interrupts protein elongation, leading ultimately to the demise of the bacterium. Phosphorylation of macrolides leads to their inactivation. Based on substrate specificity and amino acid sequence, MPH2' is divided into types I and II, encoded by mphA and mphB genes, respectively. MPH2'I inactivates 14-membered ring macrolides while MPH2'II inactivates both 14- and 16-membered ring macrolides. Enzymatic inactivation of macrolides has been reported as a mechanism for bacterial resistance in clinical samples. MPH2' is part of a larger superfamily that includes the catalytic domains of other kinases, such as the typical serine/threonine/tyrosine protein kinases (PKs), RIO kinases, actin-fragmin kinase (AFK), and phosphoinositide 3-kinase (PI3K)."
definition: >-
  Macrolide 2'-Phosphotransferase. MPH2' catalyzes the transfer of the gamma-phosphoryl group from ATP to the 2'-hydroxyl of macrolide antibiotics such as erythromycin, clarithromycin, and azithromycin, among others. Macrolides penetrate the bacterial cell and bind to ribosomes, where it interrupts protein elongation, leading ultimately to the demise of the bacterium. Phosphorylation of macrolides leads to their inactivation. Based on substrate specificity and amino acid sequence, MPH2' is divided into types I and II, encoded by mphA and mphB genes, respectively. MPH2'I inactivates 14-membered ring macrolides while MPH2'II inactivates both 14- and 16-membered ring macrolides. Enzymatic inactivation of macrolides has been reported as a mechanism for bacterial resistance in clinical samples. MPH2' is part of a larger superfamily that includes the catalytic domains of other kinases, such as the typical serine/threonine/tyrosine protein kinases (PKs), RIO kinases, actin-fragmin kinase (AFK), and phosphoinositide 3-kinase (PI3K). — an NCBI CDD conserved domain (cd05152); members share this curated model.
