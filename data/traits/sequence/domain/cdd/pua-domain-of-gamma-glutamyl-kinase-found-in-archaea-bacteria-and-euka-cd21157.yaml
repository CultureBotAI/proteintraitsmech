identifier: CDD:cd21157
label: "PUA domain of gamma-glutamyl kinase, found in archaea, bacteria, and eukarya. Gamma glutamyl kinase (G5K) is an enzyme essential for the biosynthesis of L-proline; it catalyzes the transfer of a phosphate group to glutamate. The resulting glutamate 5-phosphate cyclizes spontaneously to form 5-oxoproline. The PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain functions as an RNA binding domain in many other proteins; however, its role in G5K is not understood. It might play a role in modulating the enzymatic properties of bacterial G5Ks."
definition: >-
  PUA domain of gamma-glutamyl kinase, found in archaea, bacteria, and eukarya. Gamma glutamyl kinase (G5K) is an enzyme essential for the biosynthesis of L-proline; it catalyzes the transfer of a phosphate group to glutamate. The resulting glutamate 5-phosphate cyclizes spontaneously to form 5-oxoproline. The PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain functions as an RNA binding domain in many other proteins; however, its role in G5K is not understood. It might play a role in modulating the enzymatic properties of bacterial G5Ks. — an NCBI CDD conserved domain (cd21157); members share this curated model.
