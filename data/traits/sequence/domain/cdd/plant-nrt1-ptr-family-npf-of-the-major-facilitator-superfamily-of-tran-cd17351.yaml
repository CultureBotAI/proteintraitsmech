identifier: CDD:cd17351
label: "Plant NRT1/PTR family (NPF) of the Major Facilitator Superfamily of transporters. The plant Nitrate transporter/Peptide transporter (NRT1/PTR) family (NPF) is related to the POT (proton-coupled oligopeptide transporter), Peptide transporter (PepT/PTR), or Solute Carrier 15 (SLC15) family in animals. In contrast to related animal and bacterial counterparts, the plant proteins transport a wide variety of substrates including nitrate, peptides, amino acids, dicarboxylates, glucosinolates, as well as the plant hormones indole-3-acetic acid (IAA) and abscisic acid (ABA). A recent study identified eight subfamilies within this family, named NPF1-NPF8. NPF belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Plant NRT1/PTR family (NPF) of the Major Facilitator Superfamily of transporters. The plant Nitrate transporter/Peptide transporter (NRT1/PTR) family (NPF) is related to the POT (proton-coupled oligopeptide transporter), Peptide transporter (PepT/PTR), or Solute Carrier 15 (SLC15) family in animals. In contrast to related animal and bacterial counterparts, the plant proteins transport a wide variety of substrates including nitrate, peptides, amino acids, dicarboxylates, glucosinolates, as well as the plant hormones indole-3-acetic acid (IAA) and abscisic acid (ABA). A recent study identified eight subfamilies within this family, named NPF1-NPF8. NPF belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17351); members share this curated model.
