identifier: CDD:cd19577
label: "serpin family J, Ixodes ricinus serpin-2 (IRS-2). The serpin family J clade contains serpins from the Chelicerates. This model includes serpins from the Japanese horseshoe crab, mites, ticks, and spiders. The Limulus intracellular coagulation inhibitor, designated LICI, was isolated from hemocytes of the Japanese horseshoe crab. It blocks the amidolytic activities of Limulus lipopolysaccharide-sensitive serine protease, factor C and also inhibits human alpha-thrombin, rat salivary kallikrein, bovine plasmin, and trypsin but not Limulus clotting enzyme, Limulus factor B, bovine factor Xa, human factor XIa, human tissue plasminogen activator, human urokinase, chymotrypsin, elastase, and papain. Glycosaminoglycans such as heparin and heparan sulfate had no effect on the inhibitory activity. The castor bean tick, Ixodes ricinus serpin-2 (IRS-2) whose structure has been solved, unlike that of the LICI, is found in the saliva of the tick and primarily targets 2 proinflammatory serine proteases: cathepsin G and mast cell chymase, and in higher molar excess, thrombin. It also blocks cathepsin G- and thrombin-induced platelet aggregation. Thus it has a dual role and can interfere with both inflammation and wound healing during tick feeding. In general, SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
definition: >-
  serpin family J, Ixodes ricinus serpin-2 (IRS-2). The serpin family J clade contains serpins from the Chelicerates. This model includes serpins from the Japanese horseshoe crab, mites, ticks, and spiders. The Limulus intracellular coagulation inhibitor, designated LICI, was isolated from hemocytes of the Japanese horseshoe crab. It blocks the amidolytic activities of Limulus lipopolysaccharide-sensitive serine protease, factor C and also inhibits human alpha-thrombin, rat salivary kallikrein, bovine plasmin, and trypsin but not Limulus clotting enzyme, Limulus factor B, bovine factor Xa, human factor XIa, human tissue plasminogen activator, human urokinase, chymotrypsin, elastase, and papain. Glycosaminoglycans such as heparin and heparan sulfate had no effect on the inhibitory activity. The castor bean tick, Ixodes ricinus serpin-2 (IRS-2) whose structure has been solved, unlike that of the LICI, is found in the saliva of the tick and primarily targets 2 proinflammatory serine proteases: cathepsin G and mast cell chymase, and in higher molar excess, thrombin. It also blocks cathepsin G- and thrombin-induced platelet aggregation. Thus it has a dual role and can interfere with both inflammation and wound healing during tick feeding. In general, SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans. — an NCBI CDD conserved domain (cd19577); members share this curated model.
