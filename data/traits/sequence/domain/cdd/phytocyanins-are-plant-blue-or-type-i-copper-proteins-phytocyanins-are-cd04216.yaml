identifier: CDD:cd04216
label: "Phytocyanins are plant blue or type I copper proteins. Phytocyanins are plant blue or type I copper proteins. They are involved in electron transfer reactions with the Cu center transitioning between the oxidized Cu(II) form and the reduced Cu(I) form. Phytocyanins are classified into four groups: stellacyanin, plantacyanin, uclacyanin and early nodulin groups. Stellacyanin appears to be associated with the plant cell wall; it may be involved in oxidative reactions to build polymeric material making up the cell wall. Plantacyanin is shown to play a role in reproduction in Arabidopsis. Plantacyanins may also be stress-related proteins and may be involved in plant defense responses. The early nodulin-like protein (OsENODL1) from Oryza sativa is expressed specifically at the late developmental stage of the seeds."
