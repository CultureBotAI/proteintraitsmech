identifier: CDD:cd23373
label: "soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in alpha-amylase/subtilisin inhibitor (ASI) and similar proteins. This subfamily includes rice ASI (RASI) and barley ASI (BASI). RASI can inhibit alpha-amylase from larvae of the red flour beetle (Tribolium castaneum) and subtilisin from Bacillus subtilis. BASI is a bifunctional protein that can simultaneously inhibit alpha-amylase isozyme (AMY2) and serine proteases of the subtilisin family. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in alpha-amylase/subtilisin inhibitor (ASI) and similar proteins. This subfamily includes rice ASI (RASI) and barley ASI (BASI). RASI can inhibit alpha-amylase from larvae of the red flour beetle (Tribolium castaneum) and subtilisin from Bacillus subtilis. BASI is a bifunctional protein that can simultaneously inhibit alpha-amylase isozyme (AMY2) and serine proteases of the subtilisin family. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23373); members share this curated model.
