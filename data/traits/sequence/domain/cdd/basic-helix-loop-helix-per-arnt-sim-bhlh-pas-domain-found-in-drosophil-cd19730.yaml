label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in Drosophila melanogaster protein spineless and similar proteins. Spineless is a bHLH-PAS transcription factor that plays an important role in fly morphogenesis. It is both necessary and sufficient for the formation of the ommatidial mosaic."
