identifier: CDD:cd10831
label: "PDZ domain of peripheral plasma membrane protein CASK, Caenorhabditis Lin-2, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of CASK, Caenorhabditis elegans Lin-2, and related domains. CASK and Lin-2 are membrane-associated guanylate kinase (MAGUK)-like proteins. CASK (also known as Calcium/calmodulin-dependent protein kinase, CAKI, and Camguk) has a role in synaptic transmembrane protein anchoring and ion channel trafficking. CASK may regulate transmembrane proteins that bind calcium, calmodulin, or nucleotides; it regulates the Drosophila ether a go-go (eag) potassium channel, and also regulates autophosphorylation of CaMKII. CASK binding partners include the transcription factor TBR1, and cell-surface proteins, including amyloid precursor protein, neurexins, and syndecans. Lin-2, as a component of the CLin-10-Lin-2-Lin-7 complex, plays a role in controlling the basolateral localization of the EGF receptor Let-23; this complex also associates with the neuron-specific motor protein KIF17 to transport vesicles containing N-methyl-D-aspartate (NMDA) receptor 2B along microtubules. CASK may also function in targeting or scaffolding of the protein parkin which is selectively truncated by a Parkinson's disease-causing mutation; the C-terminus of parkin functions as a class II PDZ-binding motif that binds CASK. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This MPP6-MPP2-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
