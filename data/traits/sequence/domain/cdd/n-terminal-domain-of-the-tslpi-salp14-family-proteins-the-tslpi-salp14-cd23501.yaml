identifier: CDD:cd23501
label: "N-terminal domain of the TSLPI/Salp14 family proteins. The TSLPI/Salp14 protein family includes several tick proteins, such as tick salivary lectin pathway inhibitor (TSLPI), the tick factor Xa (FXa) inhibitor Salp14, the fibrinolysis modulator Ixonnexin, as well as tick salivary protein BSAP1 (BaSO4-adsorbing protein 1). They all act as lectin pathway inhibitors. Those with an additional lysine-rich C terminus possess anticoagulant activity similar to the human natural anticoagulant tissue factor (TF) pathway inhibitor alpha (TFPIalpha) C terminus. BSAP1 is a distant homolog of the TSLPI/Salp14 family. The protein core region of BSAP1 adopts a noncanonical epidermal growth factor (EGF)-like domain fold, which is a novel motif for tick salivary proteins. The C-terminal region of BSAP1 has no homology with other TSLPI/Salp14 proteins. This model corresponds to the N-terminal domain of TSLPI/Salp14 family proteins."
definition: >-
  N-terminal domain of the TSLPI/Salp14 family proteins. The TSLPI/Salp14 protein family includes several tick proteins, such as tick salivary lectin pathway inhibitor (TSLPI), the tick factor Xa (FXa) inhibitor Salp14, the fibrinolysis modulator Ixonnexin, as well as tick salivary protein BSAP1 (BaSO4-adsorbing protein 1). They all act as lectin pathway inhibitors. Those with an additional lysine-rich C terminus possess anticoagulant activity similar to the human natural anticoagulant tissue factor (TF) pathway inhibitor alpha (TFPIalpha) C terminus. BSAP1 is a distant homolog of the TSLPI/Salp14 family. The protein core region of BSAP1 adopts a noncanonical epidermal growth factor (EGF)-like domain fold, which is a novel motif for tick salivary proteins. The C-terminal region of BSAP1 has no homology with other TSLPI/Salp14 proteins. This model corresponds to the N-terminal domain of TSLPI/Salp14 family proteins. — an NCBI CDD conserved domain (cd23501); members share this curated model.
