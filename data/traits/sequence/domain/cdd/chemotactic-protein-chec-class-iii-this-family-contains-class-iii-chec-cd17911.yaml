identifier: CDD:cd17911
label: "chemotactic protein CheC, Class III. This family contains class III CheC proteins, present chiefly in the archaeal class Halobacteria. Sequence analysis shows that class III CheC proteins are structurally and functionally similar to class I CheCs, and not to CheX, despite the fact that both class III CheCs and CheX lack the first of the two phosphatase active sites of class I CheCs, and retain the second active site. Mutation analysis shows that the second active site is more important for function that the first one, suggesting that class III proteins arose by loss of the unnecessary first active site through mutational shift. All chemotactic archaea have a CheC homologue."
definition: >-
  chemotactic protein CheC, Class III. This family contains class III CheC proteins, present chiefly in the archaeal class Halobacteria. Sequence analysis shows that class III CheC proteins are structurally and functionally similar to class I CheCs, and not to CheX, despite the fact that both class III CheCs and CheX lack the first of the two phosphatase active sites of class I CheCs, and retain the second active site. Mutation analysis shows that the second active site is more important for function that the first one, suggesting that class III proteins arose by loss of the unnecessary first active site through mutational shift. All chemotactic archaea have a CheC homologue. — an NCBI CDD conserved domain (cd17911); members share this curated model.
