identifier: CDD:cd14257
label: "X module of the carbohydrate-binding protein CttA and similar proteins. This model represents a putative carbohydrate-binding domain conserved in Ruminococcus, which sits N-terminal to a dockerin repeat; the protein may be a component of the Ruminococcus cellulosome system. This X module does not share similarities with other known X modules from cellulolytic bacteria and may have a structural role."
definition: >-
  X module of the carbohydrate-binding protein CttA and similar proteins. This model represents a putative carbohydrate-binding domain conserved in Ruminococcus, which sits N-terminal to a dockerin repeat; the protein may be a component of the Ruminococcus cellulosome system. This X module does not share similarities with other known X modules from cellulolytic bacteria and may have a structural role. — an NCBI CDD conserved domain (cd14257); members share this curated model.
