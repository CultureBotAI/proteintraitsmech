identifier: CDD:cd19793
label: "B-box-type 2 zinc finger  found in tripartite motif-containing protein 65 (TRIM65), B box and SPRY domain-containing protein (BSPRY) and similar proteins. The family includes TRIM65 and BSPRY. TRIM65 is an E3 ubiquitin-protein ligase that interacts with the innate immune receptor MDA5 enhancing its ability to stimulate interferon-beta signaling. It functions as a potential oncogenic protein that negatively regulates p53 through ubiquitination, providing insight into development of novel approaches targeting TRIM65 for non-small cell lung carcinoma (NSCLC) treatment, and also overcoming chemotherapy resistance. Moreover, TRIM65 negatively regulates microRNA-driven suppression of mRNA translation by targeting TNRC6 proteins for ubiquitination and degradation. BSPRY is a regulatory protein for maintaining calcium homeostasis. It may regulate epithelial calcium transport by inhibiting TRPV5 activity. The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif."
definition: >-
  B-box-type 2 zinc finger found in tripartite motif-containing protein 65 (TRIM65), B box and SPRY domain-containing protein (BSPRY) and similar proteins. The family includes TRIM65 and BSPRY. TRIM65 is an E3 ubiquitin-protein ligase that interacts with the innate immune receptor MDA5 enhancing its ability to stimulate interferon-beta signaling. It functions as a potential oncogenic protein that negatively regulates p53 through ubiquitination, providing insight into development of novel approaches targeting TRIM65 for non-small cell lung carcinoma (NSCLC) treatment, and also overcoming chemotherapy resistance. Moreover, TRIM65 negatively regulates microRNA-driven suppression of mRNA translation by targeting TNRC6 proteins for ubiquitination and degradation. BSPRY is a regulatory protein for maintaining calcium homeostasis. It may regulate epithelial calcium transport by inhibiting TRPV5 activity. The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif. — an NCBI CDD conserved domain (cd19793); members share this curated model.
