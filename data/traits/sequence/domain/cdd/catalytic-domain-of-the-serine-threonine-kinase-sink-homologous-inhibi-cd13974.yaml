identifier: CDD:cd13974
label: "Catalytic domain of the Serine/Threonine kinase, SINK-homologous inhibitory kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. SHIK, also referred to as STK40 or LYK4, is a cytoplasmic and nuclear protein that is involved in the negative regulation of NF-kappaB- and p53-mediated transcription. It was identified as a protein related to SINK, a p65-interacting protein that inhibits p65 phosphorylation by the catalytic subunit of PKA, thereby inhibiting transcriptional competence of NF-kappaB. The SHIK subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, SINK-homologous inhibitory kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. SHIK, also referred to as STK40 or LYK4, is a cytoplasmic and nuclear protein that is involved in the negative regulation of NF-kappaB- and p53-mediated transcription. It was identified as a protein related to SINK, a p65-interacting protein that inhibits p65 phosphorylation by the catalytic subunit of PKA, thereby inhibiting transcriptional competence of NF-kappaB. The SHIK subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd13974); members share this curated model.
