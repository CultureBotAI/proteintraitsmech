identifier: CDD:cd23572
label: "second extracellular domain (ECD) found in phospholipase A2 inhibitor and Ly6/PLAUR domain-containing protein (PINLYP) and similar proteins. PINLYP is a cytotoxic necrotizing factor (CNF)-like-inhibitor family protein which is the paralog of Ly6/PLAUR domain-containing protein 8 (LYPD8), a highly glycosylated glycosylphosphatidylinositol-anchored secreted protein that mediates segregation of intestinal bacteria and epithelial cells in the colon to preserve intestinal homeostasis. PINLYP contains two extracellular domains (ECDs) that belong to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). This model corresponds to the second ECD."
definition: >-
  second extracellular domain (ECD) found in phospholipase A2 inhibitor and Ly6/PLAUR domain-containing protein (PINLYP) and similar proteins. PINLYP is a cytotoxic necrotizing factor (CNF)-like-inhibitor family protein which is the paralog of Ly6/PLAUR domain-containing protein 8 (LYPD8), a highly glycosylated glycosylphosphatidylinositol-anchored secreted protein that mediates segregation of intestinal bacteria and epithelial cells in the colon to preserve intestinal homeostasis. PINLYP contains two extracellular domains (ECDs) that belong to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). This model corresponds to the second ECD. — an NCBI CDD conserved domain (cd23572); members share this curated model.
