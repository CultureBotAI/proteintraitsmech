label: "GH1_SsGH1_like. SsGH1 is a GH1 (glycosyl hydrolase family 1) aryl-beta-D-glucosidase found in Solfalobus solfataricus that hydrolyzes________________________  The SsGH1-like family of aryl-beta-D-glucosidases includes SsGH1 from Solfolobus solfataricus, Bgl1 from Sphingomonas paucimobilis, Gly-Thermosphaera from Thermosphaera aggregans, and BGPh from Pyrococcus horikoshii.  This domain exists in eukaryotes, prokaryotes, and archaea."
definition: >-
  GH1_SsGH1_like. SsGH1 is a GH1 (glycosyl hydrolase family 1) aryl-beta-D-glucosidase found in Solfalobus solfataricus that hydrolyzes________________________ The SsGH1-like family of aryl-beta-D-glucosidases includes SsGH1 from Solfolobus solfataricus, Bgl1 from Sphingomonas paucimobilis, Gly-Thermosphaera from Thermosphaera aggregans, and BGPh from Pyrococcus horikoshii. This domain exists in eukaryotes, prokaryotes, and archaea. — an NCBI CDD conserved domain (cd02711); members share this curated model.
