identifier: CDD:cd05713
label: "Immunoglobulin (Ig)-like domain of myelin oligodendrocyte glycoprotein (MOG). The members here are composed of the immunoglobulin (Ig)-like domain of myelin oligodendrocyte glycoprotein (MOG). MOG, a minor component of the myelin sheath, is an important CNS-specific autoantigen, linked to the pathogenesis of multiple sclerosis (MS) and experimental autoimmune encephalomyelitis (EAE). It is a transmembrane protein having an extracellular Ig domain. MOG is expressed in the CNS on the outermost lamellae of the myelin sheath, and on the surface of oligodendrocytes, and may participate in the completion, compaction, and/or maintenance of myelin. This group also includes butyrophilin (BTN). BTN is the most abundant protein in bovine milk-fat globule membrane (MFGM)."
definition: >-
  Immunoglobulin (Ig)-like domain of myelin oligodendrocyte glycoprotein (MOG). The members here are composed of the immunoglobulin (Ig)-like domain of myelin oligodendrocyte glycoprotein (MOG). MOG, a minor component of the myelin sheath, is an important CNS-specific autoantigen, linked to the pathogenesis of multiple sclerosis (MS) and experimental autoimmune encephalomyelitis (EAE). It is a transmembrane protein having an extracellular Ig domain. MOG is expressed in the CNS on the outermost lamellae of the myelin sheath, and on the surface of oligodendrocytes, and may participate in the completion, compaction, and/or maintenance of myelin. This group also includes butyrophilin (BTN). BTN is the most abundant protein in bovine milk-fat globule membrane (MFGM). — an NCBI CDD conserved domain (cd05713); members share this curated model.
