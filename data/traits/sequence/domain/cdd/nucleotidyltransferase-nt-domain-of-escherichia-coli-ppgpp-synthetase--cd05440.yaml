identifier: CDD:cd05440
label: "Nucleotidyltransferase (NT) domain of  Escherichia coli ppGpp synthetase/hydrolase (SpoT) and related proteins. NT_EcSpoT _like: A subgroup, of the catalytic domain found in proteins similar to Escherichia coli ppGpp synthetase/hydrolase (SpoT). Bacterial Rel-Spo family enzymes produce an intracellular signaling alarmone guanosine 5prime, 3prime-polyphosphate [(p)ppGpp] that triggers the stringent response, enabling bacteria to survive extended periods of nutrient limitation. (p)ppGpp is synthesized in E. coli, by SpoT under conditions of carbon limitation and in a ribosome-independent fashion. SpoT is a bifunctional enzyme, which has the functionality in addition to synthesizing (p)ppGpp, to degrade it by a manganese-dependent (p)ppGpp pyrophosphohydrolase activity; in vivo the degradation activity of SpoT is more abundant than its synthetic activity. E.coli also produces another Rel-Spo enzyme RelA that  synthesizes (p)ppGpp RelA in response to amino-acid starvation and in association with ribosomes. However, RelA is not found in this subgroup. In this subgroup an N-terminal HD domain and C-terminal metal dependent phophohydrolase domain (TGS) are found in association with this catalytic domain, some also have a C-terminal ACT regulatory domain. Proteins in this subgroup belong to the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. Two of the three catalytic carboxylates are found in Rel-Spo enzymes, missing is the second carboxylate of the DXD motif. Evidence supports a single-cation synthetase mechanism."
definition: >-
  Nucleotidyltransferase (NT) domain of Escherichia coli ppGpp synthetase/hydrolase (SpoT) and related proteins. NT_EcSpoT _like: A subgroup, of the catalytic domain found in proteins similar to Escherichia coli ppGpp synthetase/hydrolase (SpoT). Bacterial Rel-Spo family enzymes produce an intracellular signaling alarmone guanosine 5prime, 3prime-polyphosphate [(p)ppGpp] that triggers the stringent response, enabling bacteria to survive extended periods of nutrient limitation. (p)ppGpp is synthesized in E. coli, by SpoT under conditions of carbon limitation and in a ribosome-independent fashion. SpoT is a bifunctional enzyme, which has the functionality in addition to synthesizing (p)ppGpp, to degrade it by a manganese-dependent (p)ppGpp pyrophosphohydrolase activity; in vivo the degradation activity of SpoT is more abundant than its synthetic activity. E.coli also produces another Rel-Spo enzyme RelA that synthesizes (p)ppGpp RelA in response to amino-acid starvation and in association with ribosomes. However, RelA is not found in this subgroup. In this subgroup an N-terminal HD domain and C-terminal metal dependent phophohydrolase domain (TGS) are found in association with this catalytic domain, some also have a C-terminal ACT regulatory domain. Proteins in this subgroup belong to the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. Two of the three catalytic carboxylates are found in Rel-Spo enzymes, missing is the second carboxylate of the DXD motif. Evidence supports a single-cation synthetase mechanism. — an NCBI CDD conserved domain (cd05440); members share this curated model.
