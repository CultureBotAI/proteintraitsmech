identifier: CDD:cd01123
label: "recombinase Rad51, DMC1, and archaeal RadA. This group of recombinases includes the eukaryotic proteins RAD51, RAD55/57 and the meiosis-specific protein DMC1, and the archaeal protein RadA. They are closely related to the bacterial RecA group. Rad51 proteins catalyze a similar recombination reaction as RecA, using ATP-dependent DNA binding activity and a DNA-dependent ATPase. However, this reaction is less efficient and requires accessory proteins such as RAD55/57 ."
definition: >-
  recombinase Rad51, DMC1, and archaeal RadA. This group of recombinases includes the eukaryotic proteins RAD51, RAD55/57 and the meiosis-specific protein DMC1, and the archaeal protein RadA. They are closely related to the bacterial RecA group. Rad51 proteins catalyze a similar recombination reaction as RecA, using ATP-dependent DNA binding activity and a DNA-dependent ATPase. However, this reaction is less efficient and requires accessory proteins such as RAD55/57 . — an NCBI CDD conserved domain (cd01123); members share this curated model.
