identifier: CDD:cd16971
label: "Alpha-kinase domain of channel kinase 1, also called transient receptor potential cation channel subfamily M member 7. Channel kinase 1 (ChaK1), also called transient receptor potential cation channel subfamily M member 7 (TRMP7) or long transient receptor potential channel 7 (LTrpC7), is a fusion protein containing a transmembrane ion pore or channel and a C-terminal alpha-kinase domain, both of which are functional. It is ubiquitously expressed and is a cation-selective channel that preferentially permeates Zn2+, Mg2+, and Ca2+ ions. It is a central regulator of Mg2+ and Ca2+ homeostasis. TRPM7 plays a role in cancer proliferation, stroke, hydrogen peroxide dependent neurodegeneration, and heavy metal toxicity. Alpha-kinase is an atypical protein kinase catalytic domain with no detectable similarity to conventional protein serine/threonine kinases. The alpha-kinase family was named after the unique mode of substrate recognition by its initial members, the Dictyostelium heavy chain kinases, which targeted protein sequences that adopt an alpha-helical conformation. More recently, alpha-kinases were found to also target residues in non-helical regions."
definition: >-
  Alpha-kinase domain of channel kinase 1, also called transient receptor potential cation channel subfamily M member 7. Channel kinase 1 (ChaK1), also called transient receptor potential cation channel subfamily M member 7 (TRMP7) or long transient receptor potential channel 7 (LTrpC7), is a fusion protein containing a transmembrane ion pore or channel and a C-terminal alpha-kinase domain, both of which are functional. It is ubiquitously expressed and is a cation-selective channel that preferentially permeates Zn2+, Mg2+, and Ca2+ ions. It is a central regulator of Mg2+ and Ca2+ homeostasis. TRPM7 plays a role in cancer proliferation, stroke, hydrogen peroxide dependent neurodegeneration, and heavy metal toxicity. Alpha-kinase is an atypical protein kinase catalytic domain with no detectable similarity to conventional protein serine/threonine kinases. The alpha-kinase family was named after the unique mode of substrate recognition by its initial members, the Dictyostelium heavy chain kinases, which targeted protein sequences that adopt an alpha-helical conformation. More recently, alpha-kinases were found to also target residues in non-helical regions. — an NCBI CDD conserved domain (cd16971); members share this curated model.
