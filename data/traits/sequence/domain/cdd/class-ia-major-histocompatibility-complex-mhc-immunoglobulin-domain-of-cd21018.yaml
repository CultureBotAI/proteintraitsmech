identifier: CDD:cd21018
label: "Class Ia major histocompatibility complex (MHC) immunoglobulin domain of human leukocyte antigen (HLA) H2Db and H2Ld; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the Class Ia major histocompatibility complex (MHC) immunoglobulin domain of human leukocyte antigen (HLA) H2Db and H2Ld.  H-2Ld complexed with peptide QL9 (or p2Ca) and complexed with influenza virus peptide NP366-374 (ASNEN-METM), respectively are high-affinity alloantigens for the 2C T cell receptor (TCR). The a1-a2 super domains of H-2Ld, H-2Db, and H-2Kb closely superimpose. Class I MHC proteins bind antigenic peptide fragments and present them to CD8+ T lymphocytes. Class I molecules consist of a transmembrane alpha chain and a small chain called the beta-2-microglobulin. The alpha chain contains three extracellular domains, two of which fold together to form the peptide-binding cleft (alpha1 and alpha2), and one which has an Ig fold (alpha3).  Peptide binding to class I molecules occurs in the endoplasmic reticulum (ER) and involves both chaperones and dedicated factors to assist in peptide loading.  Class I MHC molecules are expressed on most nucleated cells."
definition: >-
  Class Ia major histocompatibility complex (MHC) immunoglobulin domain of human leukocyte antigen (HLA) H2Db and H2Ld; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the Class Ia major histocompatibility complex (MHC) immunoglobulin domain of human leukocyte antigen (HLA) H2Db and H2Ld. H-2Ld complexed with peptide QL9 (or p2Ca) and complexed with influenza virus peptide NP366-374 (ASNEN-METM), respectively are high-affinity alloantigens for the 2C T cell receptor (TCR). The a1-a2 super domains of H-2Ld, H-2Db, and H-2Kb closely superimpose. Class I MHC proteins bind antigenic peptide fragments and present them to CD8+ T lymphocytes. Class I molecules consist of a transmembrane alpha chain and a small chain called the beta-2-microglobulin. The alpha chain contains three extracellular domains, two of which fold together to form the peptide-binding cleft (alpha1 and alpha2), and one which has an Ig fold (alpha3). Peptide binding to class I molecules occurs in the endoplasmic reticulum (ER) and involves both chaperones and dedicated factors to assist in peptide loading. Class I MHC molecules are expressed on most nucleated cells. — an NCBI CDD conserved domain (cd21018); members share this curated model.
