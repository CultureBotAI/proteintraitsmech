identifier: CDD:cd17973
label: "DEXH-box helicase domain of DEAH-box helicase 15. DEAH-box helicase 15 (DHX15) is a pre-mRNA processing factor involved in disassembly of spliceosomes after the release of mature mRNA. DHX15 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of DEAH-box helicase 15. DEAH-box helicase 15 (DHX15) is a pre-mRNA processing factor involved in disassembly of spliceosomes after the release of mature mRNA. DHX15 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17973); members share this curated model.
