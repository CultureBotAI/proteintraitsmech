identifier: CDD:cd10921
label: "Putative catalytic domain of uncharacterized protein MJ0505 from Methanocaldococcus jannaschii and similar proteins. This family contains an uncharacterized protein MJ0505 from Methanocaldococcus jannaschii and its prokaryotic homologs. Although their biochemical properties remain to be determined, members in this family is composed of a seven-stranded barrel with a detectable sequence similarity to the six-stranded barrel rhizobial NodB-like proteins, which remove N-linked or O-linked acetyl groups of cell wall polysaccharides and belong to a larger carbohydrate esterase 4 (CE4) superfamily."
definition: >-
  Putative catalytic domain of uncharacterized protein MJ0505 from Methanocaldococcus jannaschii and similar proteins. This family contains an uncharacterized protein MJ0505 from Methanocaldococcus jannaschii and its prokaryotic homologs. Although their biochemical properties remain to be determined, members in this family is composed of a seven-stranded barrel with a detectable sequence similarity to the six-stranded barrel rhizobial NodB-like proteins, which remove N-linked or O-linked acetyl groups of cell wall polysaccharides and belong to a larger carbohydrate esterase 4 (CE4) superfamily. — an NCBI CDD conserved domain (cd10921); members share this curated model.
