identifier: CDD:cd01630
label: "haloacid dehalogenase-like (HAD) hydrolase, similar to Escherichia coli 3-deoxy-D-manno-octulosonate 8-phosphate (KDO 8-P) phosphatase KdsC, and rainbow trout N-acylneuraminate cytidylyltransferase. KDO 8-P phosphatase catalyzes the hydrolysis of KDO 8-P to KDO (3-deoxy-D-manno-octulosonate) and inorganic phosphate and is the last enzyme in the KDO biosynthetic pathway. KDO is an 8-carbon sugar that links the lipid A and polysaccharide moieties of the lipopolysaccharide region in Gram-negative bacteria. An interruption in KDO biosynthesis leads to the accumulation of lipid A precursors and subsequent arrest in cell growth. The KDO biosynthesis pathway involves five sequential enzymatic reactions. This family also includes rainbow trout CMP-sialic acid synthetase which effectively converts both deaminoneuraminic acid (KDN, 2-keto-3-deoxy-D-glycero-D-galacto-nononic acid) and N-acetylneuraminic acid (Neu5Ac) to CMP-KDN and CMP-Neu5Ac, respectively. This family belongs to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases."
definition: >-
  haloacid dehalogenase-like (HAD) hydrolase, similar to Escherichia coli 3-deoxy-D-manno-octulosonate 8-phosphate (KDO 8-P) phosphatase KdsC, and rainbow trout N-acylneuraminate cytidylyltransferase. KDO 8-P phosphatase catalyzes the hydrolysis of KDO 8-P to KDO (3-deoxy-D-manno-octulosonate) and inorganic phosphate and is the last enzyme in the KDO biosynthetic pathway. KDO is an 8-carbon sugar that links the lipid A and polysaccharide moieties of the lipopolysaccharide region in Gram-negative bacteria. An interruption in KDO biosynthesis leads to the accumulation of lipid A precursors and subsequent arrest in cell growth. The KDO biosynthesis pathway involves five sequential enzymatic reactions. This family also includes rainbow trout CMP-sialic acid synthetase which effectively converts both deaminoneuraminic acid (KDN, 2-keto-3-deoxy-D-glycero-D-galacto-nononic acid) and N-acetylneuraminic acid (Neu5Ac) to CMP-KDN and CMP-Neu5Ac, respectively. This family belongs to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases. — an NCBI CDD conserved domain (cd01630); members share this curated model.
