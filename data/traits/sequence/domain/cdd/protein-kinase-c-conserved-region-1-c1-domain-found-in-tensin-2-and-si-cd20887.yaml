identifier: CDD:cd20887
label: "protein kinase C conserved region 1 (C1 domain) found in tensin-2 and similar proteins. Tensin-2 (TNS2), also called C1 domain-containing phosphatase and tensin (C1-TEN), or tensin-like C1 domain-containing phosphatase (TENC1), is an essential component for the maintenance of glomerular basement membrane (GBM) structures. It regulates cell motility and proliferation. It may have phosphatase activity. TNS2 reduces AKT1 phosphorylation, lowers AKT1 kinase activity, and interferes with AKT1 signaling. It contains an N-terminal region with a zinc finger (C1 domain), a protein tyrosine phosphatase (PTP)-like domain and a protein kinase 2 (C2) domain, and a C-terminal region with SH2 and pTyr binding (PTB) domains. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in tensin-2 and similar proteins. Tensin-2 (TNS2), also called C1 domain-containing phosphatase and tensin (C1-TEN), or tensin-like C1 domain-containing phosphatase (TENC1), is an essential component for the maintenance of glomerular basement membrane (GBM) structures. It regulates cell motility and proliferation. It may have phosphatase activity. TNS2 reduces AKT1 phosphorylation, lowers AKT1 kinase activity, and interferes with AKT1 signaling. It contains an N-terminal region with a zinc finger (C1 domain), a protein tyrosine phosphatase (PTP)-like domain and a protein kinase 2 (C2) domain, and a C-terminal region with SH2 and pTyr binding (PTB) domains. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20887); members share this curated model.
