identifier: CDD:cd15743
label: "FYVE domain found in FYVE, RhoGEF and PH domain-containing protein 6 (FGD6) and similar proteins. FGD6, also termed zinc finger FYVE domain-containing protein 24 is a putative Cdc42-specific guanine nucleotide exchange factor (GEF) whose biological function remains unclear. It is a homologue of FGD1 and contains a DBL homology (DH) domain and pleckstrin homology (PH) domain in the middle region, a FYVE domain, and another PH domain in the C-terminus, but lacks the N-terminal proline-rich domain (PRD) found in FGD1. Moreover, the FYVE domain of FGD6 is a canonical FYVE domain, which has been found in many proteins involved in membrane trafficking and phosphoinositide metabolism, and has been defined by three signature sequences: an N-terminal WxxD motif (x for any residue), the central basic R(R/K)HHCR patch, and a C-terminal RVC motif, which form a compact phosphatidylinositol 3-phosphate (PtdIns3P or PI3P)-binding site."
definition: >-
  FYVE domain found in FYVE, RhoGEF and PH domain-containing protein 6 (FGD6) and similar proteins. FGD6, also termed zinc finger FYVE domain-containing protein 24 is a putative Cdc42-specific guanine nucleotide exchange factor (GEF) whose biological function remains unclear. It is a homologue of FGD1 and contains a DBL homology (DH) domain and pleckstrin homology (PH) domain in the middle region, a FYVE domain, and another PH domain in the C-terminus, but lacks the N-terminal proline-rich domain (PRD) found in FGD1. Moreover, the FYVE domain of FGD6 is a canonical FYVE domain, which has been found in many proteins involved in membrane trafficking and phosphoinositide metabolism, and has been defined by three signature sequences: an N-terminal WxxD motif (x for any residue), the central basic R(R/K)HHCR patch, and a C-terminal RVC motif, which form a compact phosphatidylinositol 3-phosphate (PtdIns3P or PI3P)-binding site. — an NCBI CDD conserved domain (cd15743); members share this curated model.
