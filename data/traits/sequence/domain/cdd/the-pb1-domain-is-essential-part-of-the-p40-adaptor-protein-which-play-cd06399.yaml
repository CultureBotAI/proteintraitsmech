identifier: CDD:cd06399
label: "The PB1 domain is essential part of the p40 adaptor protein which plays an important role in activating phagocyte NADPH oxidase during phagocytosis. The PB1 domain is a modular domain mediating specific protein-protein interaction which play a role in many critical cell processes , such as osteoclastogenesis, angiogenesis, early cardiovascular development and cell polarity. A canonical PB1-PB1 interaction, which involves heterodimerization of two PB1 domain, is required for the formation of macromolecular signaling complexes ensuring specificity and fidelity during cellular signaling. The interaction between two PB1 domain depends on the type of PB1. There are three types of PB1 domains: type I which contains an OPCA motif, acidic aminoacid cluster, type II which contains a basic cluster, and type I/II which contains both an OPCA motif and a basic cluster. The PB1 domain of p40 represents a type I PB1 domain which interacts with the PB1 domain of oxidase activator p67 which belong to type II PB1 domain. Interactions of PB1 domains with other protein domains have been described as noncanonical PB1-interactions. The PB1 domain module is conserved in amoebas, fungi, animals, and plants."
definition: >-
  The PB1 domain is essential part of the p40 adaptor protein which plays an important role in activating phagocyte NADPH oxidase during phagocytosis. The PB1 domain is a modular domain mediating specific protein-protein interaction which play a role in many critical cell processes , such as osteoclastogenesis, angiogenesis, early cardiovascular development and cell polarity. A canonical PB1-PB1 interaction, which involves heterodimerization of two PB1 domain, is required for the formation of macromolecular signaling complexes ensuring specificity and fidelity during cellular signaling. The interaction between two PB1 domain depends on the type of PB1. There are three types of PB1 domains: type I which contains an OPCA motif, acidic aminoacid cluster, type II which contains a basic cluster, and type I/II which contains both an OPCA motif and a basic cluster. The PB1 domain of p40 represents a type I PB1 domain which interacts with the PB1 domain of oxidase activator p67 which belong to type II PB1 domain. Interactions of PB1 domains with other protein domains have been described as noncanonical PB1-interactions. The PB1 domain module is conserved in amoebas, fungi, animals, and plants. — an NCBI CDD conserved domain (cd06399); members share this curated model.
