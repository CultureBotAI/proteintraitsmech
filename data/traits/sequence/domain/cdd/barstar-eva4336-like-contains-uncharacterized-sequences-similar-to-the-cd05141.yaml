identifier: CDD:cd05141
label: "Barstar_evA4336-like contains uncharacterized sequences similar to the uncharacterized, predicted RNAase inhibitor evA4336 found in Azoarcus sp. EvN1. This is a subfamily of the Barstar family of RNAase inhibitors. Barstar is an intracellular inhibitor of barnase, an extracellular ribonuclease of Bacillus amyloliquefaciens. Barstar binds tightly to the barnase active site and sterically blocks it thus inhibiting its potentially lethal RNase activity inside the cell.  Barstar also binds and inhibits a ribonuclease called RNase Sa (produced by Streptomyces aureofaciens) which belongs to the same enzyme family as does barnase."
definition: >-
  Barstar_evA4336-like contains uncharacterized sequences similar to the uncharacterized, predicted RNAase inhibitor evA4336 found in Azoarcus sp. EvN1. This is a subfamily of the Barstar family of RNAase inhibitors. Barstar is an intracellular inhibitor of barnase, an extracellular ribonuclease of Bacillus amyloliquefaciens. Barstar binds tightly to the barnase active site and sterically blocks it thus inhibiting its potentially lethal RNase activity inside the cell. Barstar also binds and inhibits a ribonuclease called RNase Sa (produced by Streptomyces aureofaciens) which belongs to the same enzyme family as does barnase. — an NCBI CDD conserved domain (cd05141); members share this curated model.
