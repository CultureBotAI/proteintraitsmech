label: Cas8c_I-C
definition: >-
  CRISPR/Cas system-associated protein Cas8c. CRISPR (Clustered Regularly Interspaced Short Palindromic Repeats) and associated Cas proteins comprise a system for heritable host defense by prokaryotic cells against phage and other foreign DNA; Zn-finger domain containing protein, distant homologs of Cas8 proteins; signature gene for I-C subtype; also known as Csd1 family
