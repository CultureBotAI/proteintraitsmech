identifier: CDD:cd17928
label: "DEXD-box helicase domain of SecA. SecA is a part of the Sec translocase that transports the vast majority of bacterial and ER-exported proteins. SecA binds both the signal sequence and the mature domain of the preprotein emerging from the ribosome. SecA belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXD-box helicase domain of SecA. SecA is a part of the Sec translocase that transports the vast majority of bacterial and ER-exported proteins. SecA binds both the signal sequence and the mature domain of the preprotein emerging from the ribosome. SecA belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17928); members share this curated model.
