identifier: CDD:cd11521
label: "Na(+)-dependent neurotransmitter transporter 4; solute-binding domain. NTT4 (also called XT1) transports the neutral amino acids, proline, glycine, leucine, and alanine, and may play an important role in synaptic transmission. Human NTT4 is encoded by the SLC6A17 gene. NTT4 is specifically expressed in the nervous system, in synaptic vesicles of glutamatergic and GABAergic neurons. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
definition: >-
  Na(+)-dependent neurotransmitter transporter 4; solute-binding domain. NTT4 (also called XT1) transports the neutral amino acids, proline, glycine, leucine, and alanine, and may play an important role in synaptic transmission. Human NTT4 is encoded by the SLC6A17 gene. NTT4 is specifically expressed in the nervous system, in synaptic vesicles of glutamatergic and GABAergic neurons. This subgroup belongs to the solute carrier 6 (SLC6) transporter family. — an NCBI CDD conserved domain (cd11521); members share this curated model.
