identifier: CDD:cd14529
label: "bacterial protein tyrosine and dual-specificity phosphatases related to Pseudomonas aeruginosa TpbA. This subfamily contains bacterial protein tyrosine phosphatases (PTPs) and dual-specificity phosphatases (DUSPs) related to Pseudomonas aeruginosa TpbA, a DUSP that negatively regulates biofilm formation by converting extracellular quorum sensing signals and to Mycobacterium tuberculosis PtpB, a PTP virulence factor that attenuates host immune defenses by interfering with signal transduction pathways in macrophages. PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides, while DUSPs function as  protein-serine/threonine phosphatases (EC 3.1.3.16) and PTPs."
definition: >-
  bacterial protein tyrosine and dual-specificity phosphatases related to Pseudomonas aeruginosa TpbA. This subfamily contains bacterial protein tyrosine phosphatases (PTPs) and dual-specificity phosphatases (DUSPs) related to Pseudomonas aeruginosa TpbA, a DUSP that negatively regulates biofilm formation by converting extracellular quorum sensing signals and to Mycobacterium tuberculosis PtpB, a PTP virulence factor that attenuates host immune defenses by interfering with signal transduction pathways in macrophages. PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides, while DUSPs function as protein-serine/threonine phosphatases (EC 3.1.3.16) and PTPs. — an NCBI CDD conserved domain (cd14529); members share this curated model.
