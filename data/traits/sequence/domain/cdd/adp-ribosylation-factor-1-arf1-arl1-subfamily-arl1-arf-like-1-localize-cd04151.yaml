identifier: CDD:cd04151
label: "ADP ribosylation factor 1 (Arf1). Arl1 subfamily. Arl1 (Arf-like 1) localizes to the Golgi complex, where it is believed to recruit effector proteins to the trans-Golgi network. Like most members of the Arf family, Arl1 is myristoylated at its N-terminal helix and mutation of the myristoylation site disrupts Golgi targeting. In humans, the Golgi-localized proteins golgin-97 and golgin-245 have been identified as Arl1 effectors. Golgins are large coiled-coil proteins found in the Golgi, and these golgins contain a C-terminal GRIP domain, which is the site of Arl1 binding. Additional Arl1 effectors include the GARP (Golgi-associated retrograde protein)/VFT (Vps53) vesicle-tethering complex and Arfaptin 2. Arl1 is not required for exocytosis, but appears necessary for trafficking from the endosomes to the Golgi. In Drosophila zygotes, mutation of Arl1 is lethal, and in the host-bloodstream form of Trypanosoma brucei, Arl1 is essential for viability."
definition: >-
  ADP ribosylation factor 1 (Arf1). Arl1 subfamily. Arl1 (Arf-like 1) localizes to the Golgi complex, where it is believed to recruit effector proteins to the trans-Golgi network. Like most members of the Arf family, Arl1 is myristoylated at its N-terminal helix and mutation of the myristoylation site disrupts Golgi targeting. In humans, the Golgi-localized proteins golgin-97 and golgin-245 have been identified as Arl1 effectors. Golgins are large coiled-coil proteins found in the Golgi, and these golgins contain a C-terminal GRIP domain, which is the site of Arl1 binding. Additional Arl1 effectors include the GARP (Golgi-associated retrograde protein)/VFT (Vps53) vesicle-tethering complex and Arfaptin 2. Arl1 is not required for exocytosis, but appears necessary for trafficking from the endosomes to the Golgi. In Drosophila zygotes, mutation of Arl1 is lethal, and in the host-bloodstream form of Trypanosoma brucei, Arl1 is essential for viability. — an NCBI CDD conserved domain (cd04151); members share this curated model.
