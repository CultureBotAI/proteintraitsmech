identifier: CDD:cd02136
label: "nitroreductase similar to Mycobacterium smegmatis NfnB. Members of this family utilize FMN as a cofactor and catalyze reduction of a variety of nitroaromatic compounds, including nitrofurans, nitrobenzens, nitrophenol, nitrobenzoate and quinones by using either NADH or NADPH as a source of reducing equivalents in an obligatory two-election transfer mechanism. The enzyme is typically a homodimer. Mycobacterium smegmatis nitroreductase NfnB plays a role in resistance to benzothiazinone."
definition: >-
  nitroreductase similar to Mycobacterium smegmatis NfnB. Members of this family utilize FMN as a cofactor and catalyze reduction of a variety of nitroaromatic compounds, including nitrofurans, nitrobenzens, nitrophenol, nitrobenzoate and quinones by using either NADH or NADPH as a source of reducing equivalents in an obligatory two-election transfer mechanism. The enzyme is typically a homodimer. Mycobacterium smegmatis nitroreductase NfnB plays a role in resistance to benzothiazinone. — an NCBI CDD conserved domain (cd02136); members share this curated model.
