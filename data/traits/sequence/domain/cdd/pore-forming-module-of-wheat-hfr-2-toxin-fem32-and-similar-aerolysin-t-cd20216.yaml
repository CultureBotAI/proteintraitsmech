identifier: CDD:cd20216
label: "pore-forming module of wheat HFR-2 toxin, FEM32, and similar aerolysin-type beta-barrel pore-forming proteins. HFR-2 is a wheat cytolytic toxin which may normally function in defense against certain insects or pathogens. The Hfr-2 gene is upregulated in virulent Hessian fly larval feedingdouble dagger. The HFR-2 protein may insert in plant cell membranes at the feeding sites and by forming pores provide water, ions and other small nutritive molecules to the developing larvae. This group also contains FEM32, a flower-specific lectin-like protein from the dioecious plant Rumex acetosa, which alters flower development and induces male sterility in transgenic tobacco. It has been suggested that the FEM32 gene activates some form of programmed cell death (PCD), a process that could be mediated by the action of its lectin domains for binding to specific glycoproteins on the cell membrane and facilitated by the formation of pore structures in the membranes and the subsequent leakage of the cytosolic content through its pore-forming aerolysin domain. Most proteins belonging to this group have N-terminal agglutatin (also known as amaranthin) lectin domains; most have two agglutatin domains, in combination with one aerolysin domain. Members of this group belong to the aerolysin family of beta-pore-forming proteins (beta-PFPs). PFPs are generally secreted as water-soluble monomers, which upon binding to target lipid membranes, oligomerize and form transmembrane pores harmful to cells. Beta-PFPs form pores by transmembrane beta-barrels. Aerolysin-type beta-PFPs are believed to use an amphipathic beta-hairpin to form the beta-barrel, are found in all kingdoms of life and many are bacterial toxins. In addition to having a role in microbial infection, they have potential as biotechnological sensors and delivery systems. They share a similar monomeric architecture, with a variable membrane-binding domain and a structurally conserved pore-forming region. A significant portion of the monomeric subunit structure is re-organized to form the pore. Oligomers formed by members of the aerolysin family include: hepta- (aerolysin), octa- (Dln1), and nonameric oligomers (lysenin and monalysin)."
definition: >-
  pore-forming module of wheat HFR-2 toxin, FEM32, and similar aerolysin-type beta-barrel pore-forming proteins. HFR-2 is a wheat cytolytic toxin which may normally function in defense against certain insects or pathogens. The Hfr-2 gene is upregulated in virulent Hessian fly larval feedingdouble dagger. The HFR-2 protein may insert in plant cell membranes at the feeding sites and by forming pores provide water, ions and other small nutritive molecules to the developing larvae. This group also contains FEM32, a flower-specific lectin-like protein from the dioecious plant Rumex acetosa, which alters flower development and induces male sterility in transgenic tobacco. It has been suggested that the FEM32 gene activates some form of programmed cell death (PCD), a process that could be mediated by the action of its lectin domains for binding to specific glycoproteins on the cell membrane and facilitated by the formation of pore structures in the membranes and the subsequent leakage of the cytosolic content through its pore-forming aerolysin domain. Most proteins belonging to this group have N-terminal agglutatin (also known as amaranthin) lectin domains; most have two agglutatin domains, in combination with one aerolysin domain. Members of this group belong to the aerolysin family of beta-pore-forming proteins (beta-PFPs). PFPs are generally secreted as water-soluble monomers, which upon binding to target lipid membranes, oligomerize and form transmembrane pores harmful to cells. Beta-PFPs form pores by transmembrane beta-barrels. Aerolysin-type beta-PFPs are believed to use an amphipathic beta-hairpin to form the beta-barrel, are found in all kingdoms of life and many are bacterial toxins. In addition to having a role in microbial infection, they have potential as biotechnological sensors and delivery systems. They share a similar monomeric architecture, with a variable membrane-binding domain and a structurally conserved pore-forming region. A significant portion of the monomeric subunit structure is re-organized to form the pore. Oligomers formed by members of the aerolysin family include: hepta- (aerolysin), octa- (Dln1), and nonameric oligomers (lysenin and monalysin). — an NCBI CDD conserved domain (cd20216); members share this curated model.
