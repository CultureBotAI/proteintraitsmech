identifier: CDD:cd13760
label: "transforming growth factor beta (TGF-beta) like domain found in bone morphogenetic protein 2 (BMP-2), 4 (BMP-4) and similar proteins. The family includes BMP2 and BMP4 (also known as BMP2B), both of which induce cartilage and bone formation. BMP-2 stimulates the differentiation of myoblasts into osteoblasts via the EIF2AK3-EIF2A- ATF4 pathway. BMP-4 acts in mesoderm induction, tooth development, limb formation and fracture repair."
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in bone morphogenetic protein 2 (BMP-2), 4 (BMP-4) and similar proteins. The family includes BMP2 and BMP4 (also known as BMP2B), both of which induce cartilage and bone formation. BMP-2 stimulates the differentiation of myoblasts into osteoblasts via the EIF2AK3-EIF2A- ATF4 pathway. BMP-4 acts in mesoderm induction, tooth development, limb formation and fracture repair. — an NCBI CDD conserved domain (cd13760); members share this curated model.
