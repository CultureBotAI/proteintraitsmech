identifier: CDD:cd16887
label: "YEATS domain family, chromatin reader proteins. The YEATS family is named for several family members: 'YNK7', 'ENL', 'AF-9', and 'TFIIF small subunit', and also contains the GAS41 protein, YEATS2, Drosophila D12, and others.  DNA regulation by chromatin through histone post-translational modification and other mechanisms involves complexes with write, eraser and reader functions. YEATS domains act as readers of the chromatin state and stimulates transcriptional activity through preferential interactions with crotonylated lysines on histones."
definition: >-
  YEATS domain family, chromatin reader proteins. The YEATS family is named for several family members: 'YNK7', 'ENL', 'AF-9', and 'TFIIF small subunit', and also contains the GAS41 protein, YEATS2, Drosophila D12, and others. DNA regulation by chromatin through histone post-translational modification and other mechanisms involves complexes with write, eraser and reader functions. YEATS domains act as readers of the chromatin state and stimulates transcriptional activity through preferential interactions with crotonylated lysines on histones. — an NCBI CDD conserved domain (cd16887); members share this curated model.
