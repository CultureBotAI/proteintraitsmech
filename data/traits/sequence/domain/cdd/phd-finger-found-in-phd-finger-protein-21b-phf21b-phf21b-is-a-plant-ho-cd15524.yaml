identifier: CDD:cd15524
label: "PHD finger found in PHD finger protein 21B (PHF21B). PHF21B is a plant homeodomain (PHD) finger-containing protein whose biological function remains unclear. It shows high sequence similarity with PHF21A, which is associated with LSD1, a lysine (K)-specific histone demethylase and inhibits LSD1-mediated histone demethylation in vitro. PHD fingers can recognize the unmodified and modified histone H3 tail, and some have been found to interact with non-histone proteins."
definition: >-
  PHD finger found in PHD finger protein 21B (PHF21B). PHF21B is a plant homeodomain (PHD) finger-containing protein whose biological function remains unclear. It shows high sequence similarity with PHF21A, which is associated with LSD1, a lysine (K)-specific histone demethylase and inhibits LSD1-mediated histone demethylation in vitro. PHD fingers can recognize the unmodified and modified histone H3 tail, and some have been found to interact with non-histone proteins. — an NCBI CDD conserved domain (cd15524); members share this curated model.
