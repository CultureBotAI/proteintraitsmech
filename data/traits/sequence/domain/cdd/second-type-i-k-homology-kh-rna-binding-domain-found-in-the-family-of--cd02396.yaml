identifier: CDD:cd02396
label: "second type I K homology (KH) RNA-binding domain found in the family of poly(C)-binding proteins (PCBPs). The PCBP family, also known as hnRNP E family, comprises four members, PCBP1-4, which are RNA-binding proteins that interact in a sequence-specific manner with single-stranded poly(C) sequences. They are mainly involved in various posttranscriptional regulations, including mRNA stabilization or translational activation/silencing. Besides, PCBPs may share iron chaperone activity. PCBPs contain three K-homology (KH) RNA-binding domains. The model corresponds to the second one."
definition: >-
  second type I K homology (KH) RNA-binding domain found in the family of poly(C)-binding proteins (PCBPs). The PCBP family, also known as hnRNP E family, comprises four members, PCBP1-4, which are RNA-binding proteins that interact in a sequence-specific manner with single-stranded poly(C) sequences. They are mainly involved in various posttranscriptional regulations, including mRNA stabilization or translational activation/silencing. Besides, PCBPs may share iron chaperone activity. PCBPs contain three K-homology (KH) RNA-binding domains. The model corresponds to the second one. — an NCBI CDD conserved domain (cd02396); members share this curated model.
