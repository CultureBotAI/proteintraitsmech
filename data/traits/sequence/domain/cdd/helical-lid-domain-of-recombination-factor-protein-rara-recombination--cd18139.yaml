identifier: CDD:cd18139
label: "helical lid domain of recombination factor protein RarA. Recombination factor RarA (Replication associated recombination gene/protein A, also known as MgsA (Maintenance of genome stability A) or Mgs1 in yeast and WRNIP1 in mammals) is a member of the clamp-loader clade of the AAA+ superfamily. It functions as a tetramer. RarA co-localize with the replication fork throughout the cell cycle and may play a role in the rescue of stalled replication forks."
definition: >-
  helical lid domain of recombination factor protein RarA. Recombination factor RarA (Replication associated recombination gene/protein A, also known as MgsA (Maintenance of genome stability A) or Mgs1 in yeast and WRNIP1 in mammals) is a member of the clamp-loader clade of the AAA+ superfamily. It functions as a tetramer. RarA co-localize with the replication fork throughout the cell cycle and may play a role in the rescue of stalled replication forks. — an NCBI CDD conserved domain (cd18139); members share this curated model.
