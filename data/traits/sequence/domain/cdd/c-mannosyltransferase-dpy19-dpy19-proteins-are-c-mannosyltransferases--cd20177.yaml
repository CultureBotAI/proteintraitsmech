identifier: CDD:cd20177
label: "C-mannosyltransferase Dpy19. Dpy19 proteins are C-mannosyltransferases that mediate C-mannosylation of tryptophan residues on target proteins. C-mannosylation is the attachment of alpha-mannose to the indole C2 carbon of the first tryptophan residue in the consensus amino acid sequence Trp-Xaa-Xaa-Trp/Cys through a C-C bond. This reaction takes place in the endoplasmic reticulum (ER) lumen. Dpy19 is a transmembrane domain family whose name is derived from the Caenorhabditis elegans Dumpy mutant."
definition: >-
  C-mannosyltransferase Dpy19. Dpy19 proteins are C-mannosyltransferases that mediate C-mannosylation of tryptophan residues on target proteins. C-mannosylation is the attachment of alpha-mannose to the indole C2 carbon of the first tryptophan residue in the consensus amino acid sequence Trp-Xaa-Xaa-Trp/Cys through a C-C bond. This reaction takes place in the endoplasmic reticulum (ER) lumen. Dpy19 is a transmembrane domain family whose name is derived from the Caenorhabditis elegans Dumpy mutant. — an NCBI CDD conserved domain (cd20177); members share this curated model.
