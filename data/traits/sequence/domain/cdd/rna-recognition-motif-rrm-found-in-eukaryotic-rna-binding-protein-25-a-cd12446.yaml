identifier: CDD:cd12446
label: "RNA recognition motif (RRM) found in eukaryotic RNA-binding protein 25 and similar proteins. This subfamily corresponds to the RRM of RBM25, also termed Arg/Glu/Asp-rich protein of 120 kDa (RED120), or protein S164, or RNA-binding region-containing protein 7, an evolutionary-conserved splicing coactivator SRm160 (SR-related nuclear matrix protein of 160 kDa, )-interacting protein. RBM25 belongs to a family of RNA-binding proteins containing a well conserved RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), at the N-terminus, a RE/RD-rich (ER) central region, and a C-terminal proline-tryptophan-isoleucine (PWI) motif. It localizes to the nuclear speckles and associates with multiple splicing components, including splicing cofactors SRm160/300, U snRNAs, assembled splicing complexes, and spliced mRNAs. It may play an important role in pre-mRNA processing by coupling splicing with mRNA 3'-end formation. Additional research indicates that RBM25 is one of the RNA-binding regulators that direct the alternative splicing of apoptotic factors. It can activate proapoptotic Bcl-xS 5'ss by binding to the exonic splicing enhancer, CGGGCA, and stabilize the pre-mRNA-U1 snRNP through interaction with hLuc7A, a U1 snRNP-associated factor."
definition: >-
  RNA recognition motif (RRM) found in eukaryotic RNA-binding protein 25 and similar proteins. This subfamily corresponds to the RRM of RBM25, also termed Arg/Glu/Asp-rich protein of 120 kDa (RED120), or protein S164, or RNA-binding region-containing protein 7, an evolutionary-conserved splicing coactivator SRm160 (SR-related nuclear matrix protein of 160 kDa, )-interacting protein. RBM25 belongs to a family of RNA-binding proteins containing a well conserved RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), at the N-terminus, a RE/RD-rich (ER) central region, and a C-terminal proline-tryptophan-isoleucine (PWI) motif. It localizes to the nuclear speckles and associates with multiple splicing components, including splicing cofactors SRm160/300, U snRNAs, assembled splicing complexes, and spliced mRNAs. It may play an important role in pre-mRNA processing by coupling splicing with mRNA 3'-end formation. Additional research indicates that RBM25 is one of the RNA-binding regulators that direct the alternative splicing of apoptotic factors. It can activate proapoptotic Bcl-xS 5'ss by binding to the exonic splicing enhancer, CGGGCA, and stabilize the pre-mRNA-U1 snRNP through interaction with hLuc7A, a U1 snRNP-associated factor. — an NCBI CDD conserved domain (cd12446); members share this curated model.
