identifier: CDD:cd22356
label: "N-terminal catalytic domain of type II restriction enzyme Sau3AI and similar endonucleases. Sau3AI is a type II restriction enzyme that recognizes the 5'-|GATC-3' sequence in double-strand DNA (| denotes the cleavage site). The N-terminal domain modeled here conveys the catalytic activity, it belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  N-terminal catalytic domain of type II restriction enzyme Sau3AI and similar endonucleases. Sau3AI is a type II restriction enzyme that recognizes the 5'-|GATC-3' sequence in double-strand DNA (| denotes the cleavage site). The N-terminal domain modeled here conveys the catalytic activity, it belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22356); members share this curated model.
