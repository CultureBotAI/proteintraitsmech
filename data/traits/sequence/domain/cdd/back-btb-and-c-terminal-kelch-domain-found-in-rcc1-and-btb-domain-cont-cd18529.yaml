label: "BACK (BTB and C-terminal Kelch) domain found in RCC1 and BTB domain-containing protein 2 (RCBTB2). RCBTB2, also called chromosome condensation 1-like (CHC1-L), or RCC1-like G exchanging factor, or regulator of chromosome condensation and BTB domain-containing protein 2, is a chromosome condensation regulator-like guanine nucleotide exchange factor (GEF) protein for the Ras-related GTPase Ran."
