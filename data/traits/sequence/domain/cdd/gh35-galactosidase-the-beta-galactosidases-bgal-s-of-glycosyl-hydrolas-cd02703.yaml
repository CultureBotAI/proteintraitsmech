identifier: CDD:cd02703
label: GH35_galactosidase
definition: >-
  GH35_galactosidase. The beta-galactosidases (BGAL's) of glycosyl hydrolase family 35 (GH35) catalyze the hydrolysis of beta(1-3) and beta(1-4) galactosyl bonds in oligosaccharides as well as the inverse reaction of enzymatic condensation and transglycosylation. This CD represents the catalytic TIM barrel domain, one of five domains that make up this enzyme. Beta-galactosidases are found in four carbohydrate-active enzymes (CAZY) families, GH1, GH2, GH35 and GH42, all of which belong to Clan GH-A. Enzymes from this clan use a two-step, double-displacement mechanism in which a covalent glycosyl-enzyme intermediate is formed and hydrolyzed via an oxocarbenium ion-like transition state. The active site contains two key residues, the catalytic nucleophile, which attacks the sugar anomeric center and becomes covalently attached to the galactosyl moiety, and the acid/base residue which protonates the departing aglycone oxygen in the first step and deprotonates the attacking water molecule in the second step. Mammalian beta-galactosidase is a lysosomal enzyme that cleaves the terminal galactose from gangliosides, glycoproteins, and glycosaminoglycans and whose deficiency causes the genetic diseases GM-1 gangliosidosis and Morquio disease type B
