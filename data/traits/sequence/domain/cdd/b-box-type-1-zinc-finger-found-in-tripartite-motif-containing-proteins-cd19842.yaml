identifier: CDD:cd19842
label: "B-box-type 1 zinc finger found in tripartite motif-containing proteins, TRIM25, TRIM47 and similar proteins. The family includes tripartite motif-containing proteins, TRIM25 and TRIM47, both of which belong to the C-IV subclass of TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a RING finger, Bbox1 and Bbox2, and a coiled coil region, as well as a SPRY/B30.2 domain positioned C-terminal to the RBCC domain. The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif. TRIM25, also termed estrogen-responsive finger protein (EFP), or ubiquitin/ISG15-conjugating enzyme TRIM25, or zinc finger protein 147 (ZNF147), or E3 ubiquitin/ISG15 ligase TRIM25, is induced by estrogen and is particularly abundant in placenta and uterus. It has been implicated in cell proliferation, protein modification, and the retinoic acid inducible gene I (RIG-I)-mediated antiviral signaling pathway. It functions as an E3-ubiquitin ligase able to transfer ubiquitin and ISG15 to target proteins. TRIM47, also known as gene overexpressed in astrocytoma protein (GOA) or RING finger protein 100 (RNF100), plays an important role in the process of dedifferentiation that is associated with astrocytoma tumorigenesis."
definition: >-
  B-box-type 1 zinc finger found in tripartite motif-containing proteins, TRIM25, TRIM47 and similar proteins. The family includes tripartite motif-containing proteins, TRIM25 and TRIM47, both of which belong to the C-IV subclass of TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a RING finger, Bbox1 and Bbox2, and a coiled coil region, as well as a SPRY/B30.2 domain positioned C-terminal to the RBCC domain. The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif. TRIM25, also termed estrogen-responsive finger protein (EFP), or ubiquitin/ISG15-conjugating enzyme TRIM25, or zinc finger protein 147 (ZNF147), or E3 ubiquitin/ISG15 ligase TRIM25, is induced by estrogen and is particularly abundant in placenta and uterus. It has been implicated in cell proliferation, protein modification, and the retinoic acid inducible gene I (RIG-I)-mediated antiviral signaling pathway. It functions as an E3-ubiquitin ligase able to transfer ubiquitin and ISG15 to target proteins. TRIM47, also known as gene overexpressed in astrocytoma protein (GOA) or RING finger protein 100 (RNF100), plays an important role in the process of dedifferentiation that is associated with astrocytoma tumorigenesis. — an NCBI CDD conserved domain (cd19842); members share this curated model.
