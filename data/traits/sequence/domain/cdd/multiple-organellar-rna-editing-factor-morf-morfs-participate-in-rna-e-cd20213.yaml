identifier: CDD:cd20213
label: MORF
definition: >-
  Multiple Organellar RNA editing Factor (MORF). MORFs participate in RNA editing of cytidine-to-uridine conversion by interacting with the PLS type pentatricopeptide repeat (PPR) protein in the plastids and mitochondria of flowering plant. The PPR proteins find cytidine targets around the editing sites, and the MORF proteins regulate the RNA-binding activity of the PPR proteins. MORF is also called DAG-like (DAL) and/or RNA editing factor interacting proteins (RIP)
