identifier: CDD:cd14354
label: "UBA domain found in ubiquitin carboxyl-terminal hydrolase 25 (UBP25) and similar proteins. UBP25, also called deubiquitinating enzyme 25, USP on chromosome 21, ubiquitin thioesterase 25, or ubiquitin-specific-processing protease 25, belongs to the deubiquitinating enzyme (DUB) family that specifically hydrolyzes ubiquitin chains on ubiquitin-conjugated proteins. USP25 has one muscular isoform and two ubiquitous isoforms. The longer muscular isoform can bind to muscle-restricted cytoskeletal and sarcomeric proteins, such as myosin binding protein C1 (MyBPC1), actin alpha-1 (ACTA1) and filamin C (FLNC), and further prevent their degradation. USP25 harbors three potential ubiquitin-binding domains (UBDs), one ubiquitin-associated (UBA) domain and two ubiquitin-interacting motifs (UIMs) in the N-terminal region. Its C-terminal tyrosine-rich region is responsible for the binding of the second SH2 domain of SYK, a non-receptor tyrosine kinase that specifically phosphorylates USP25 and alters its cellular levels."
definition: >-
  UBA domain found in ubiquitin carboxyl-terminal hydrolase 25 (UBP25) and similar proteins. UBP25, also called deubiquitinating enzyme 25, USP on chromosome 21, ubiquitin thioesterase 25, or ubiquitin-specific-processing protease 25, belongs to the deubiquitinating enzyme (DUB) family that specifically hydrolyzes ubiquitin chains on ubiquitin-conjugated proteins. USP25 has one muscular isoform and two ubiquitous isoforms. The longer muscular isoform can bind to muscle-restricted cytoskeletal and sarcomeric proteins, such as myosin binding protein C1 (MyBPC1), actin alpha-1 (ACTA1) and filamin C (FLNC), and further prevent their degradation. USP25 harbors three potential ubiquitin-binding domains (UBDs), one ubiquitin-associated (UBA) domain and two ubiquitin-interacting motifs (UIMs) in the N-terminal region. Its C-terminal tyrosine-rich region is responsible for the binding of the second SH2 domain of SYK, a non-receptor tyrosine kinase that specifically phosphorylates USP25 and alters its cellular levels. — an NCBI CDD conserved domain (cd14354); members share this curated model.
