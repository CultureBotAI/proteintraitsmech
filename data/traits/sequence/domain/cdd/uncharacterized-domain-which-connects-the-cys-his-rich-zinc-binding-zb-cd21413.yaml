identifier: CDD:cd21413
label: "uncharacterized domain which connects the Cys/His rich zinc-binding (ZBD) and linker to the first helicase domain of tornidovirus SF1 helicase and related proteins. Helicases catalyze NTP-dependent unwinding of nucleic acid duplexes into single strands and are classified based on the arrangement of conserved motifs into six superfamilies. Helicases in this family belong to helicase superfamily 1 (SF1) and include tornidovirus helicases such as Breda virus serotype 1 (BoTV-1) SF1 helicase encoded on ORF1b. They are related to the SF1 family nidoviral replication helicases which include Severe Acute Respiratory Syndrome coronavirus (SARS) non-structural protein 13 (SARS-Nsp13), a component of the viral RNA synthesis replication and transcription complex (RTC). SARS-Nsp13 is a multidomain protein; its other domains include an N-terminal Cys/His rich zinc-binding domain (ZBD) and a SF1 helicase core. The location of the uncharacterized domain represented in this tornidovirus group resembles that of the 1B domain in SARS-Nsp13 helicase; it connects the zinc-binding domain (ZBD) and linker to the first helicase domain."
definition: >-
  uncharacterized domain which connects the Cys/His rich zinc-binding (ZBD) and linker to the first helicase domain of tornidovirus SF1 helicase and related proteins. Helicases catalyze NTP-dependent unwinding of nucleic acid duplexes into single strands and are classified based on the arrangement of conserved motifs into six superfamilies. Helicases in this family belong to helicase superfamily 1 (SF1) and include tornidovirus helicases such as Breda virus serotype 1 (BoTV-1) SF1 helicase encoded on ORF1b. They are related to the SF1 family nidoviral replication helicases which include Severe Acute Respiratory Syndrome coronavirus (SARS) non-structural protein 13 (SARS-Nsp13), a component of the viral RNA synthesis replication and transcription complex (RTC). SARS-Nsp13 is a multidomain protein; its other domains include an N-terminal Cys/His rich zinc-binding domain (ZBD) and a SF1 helicase core. The location of the uncharacterized domain represented in this tornidovirus group resembles that of the 1B domain in SARS-Nsp13 helicase; it connects the zinc-binding domain (ZBD) and linker to the first helicase domain. — an NCBI CDD conserved domain (cd21413); members share this curated model.
