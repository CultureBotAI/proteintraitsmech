identifier: CDD:cd22435
label: "first type I K homology (KH) RNA-binding domain found in the family of neuro-oncological ventral antigen (Nova). The family includes two related neuronal RNA-binding proteins, Nova-1 and Nova-2. Nova-1, also called onconeural ventral antigen 1, or paraneoplastic Ri antigen, or ventral neuron-specific protein 1, may regulate RNA splicing or metabolism in a specific subset of developing neurons. It interacts with RNA containing repeats of the YCAY sequence. It is a brain-enriched splicing factor regulating neuronal alternative splicing. Nova-1 is involved in neurological disorders and carcinogenesis.  Nova-2, also called astrocytic NOVA1-like RNA-binding protein, is a neuronal RNA-binding protein expressed in a broader central nervous system (CNS) distribution than Nova-1. It functions in neuronal RNA metabolism. NOVA family proteins contain three K-homology (KH) RNA-binding domains. The model corresponds to the first one."
definition: >-
  first type I K homology (KH) RNA-binding domain found in the family of neuro-oncological ventral antigen (Nova). The family includes two related neuronal RNA-binding proteins, Nova-1 and Nova-2. Nova-1, also called onconeural ventral antigen 1, or paraneoplastic Ri antigen, or ventral neuron-specific protein 1, may regulate RNA splicing or metabolism in a specific subset of developing neurons. It interacts with RNA containing repeats of the YCAY sequence. It is a brain-enriched splicing factor regulating neuronal alternative splicing. Nova-1 is involved in neurological disorders and carcinogenesis. Nova-2, also called astrocytic NOVA1-like RNA-binding protein, is a neuronal RNA-binding protein expressed in a broader central nervous system (CNS) distribution than Nova-1. It functions in neuronal RNA metabolism. NOVA family proteins contain three K-homology (KH) RNA-binding domains. The model corresponds to the first one. — an NCBI CDD conserved domain (cd22435); members share this curated model.
