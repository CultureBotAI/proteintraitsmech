identifier: CDD:cd19878
label: "double-stranded RNA binding motif of Arabidopsis thaliana double-stranded RNA-binding proteins (AtDRBs)and similar proteins. This family includes a group of Arabidopsis thaliana double-stranded RNA-binding proteins (AtDRB1-5). They bind double-stranded RNA (dsRNA) and may be involved in RNA-mediated silencing. Members of this family contain two to three double-stranded RNA binding motifs (DSRMs). DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  double-stranded RNA binding motif of Arabidopsis thaliana double-stranded RNA-binding proteins (AtDRBs)and similar proteins. This family includes a group of Arabidopsis thaliana double-stranded RNA-binding proteins (AtDRB1-5). They bind double-stranded RNA (dsRNA) and may be involved in RNA-mediated silencing. Members of this family contain two to three double-stranded RNA binding motifs (DSRMs). DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19878); members share this curated model.
