identifier: CDD:cd13891
label: "The third Cupredoxin domain of bacterial laccases including CotA, a bacterial endospore coat component. CotA protein is an abundant component of the outer coat layer in bacterial endospore coat and is required for spore resistance against hydrogen peroxide and UV light. CotA belongs to the laccase-like multicopper oxidase (MCO) family, which are able to couple oxidation of substrates with reduction of dioxygen to water. MCOs are capable of oxidizing a vast range of substrates, varying from aromatic compounds to inorganic compounds such as metals. Although the members of this family have diverse functions, majority of them have three cupredoxin domain repeats. The copper ions are bound in several sites: Type 1, Type 2, and/or Type 3. The ensemble of types 2 and 3 copper is called a trinuclear cluster. MCOs oxidize their substrate by accepting electrons at a mononuclear copper center and transferring them to the active site trinuclear copper center. The cupredoxin domain 3 of 3-domain MCOs contains the Type 1 (T1) copper binding site and part the trinuclear copper binding site, which is located at the interface of domains 1 and 3."
definition: >-
  The third Cupredoxin domain of bacterial laccases including CotA, a bacterial endospore coat component. CotA protein is an abundant component of the outer coat layer in bacterial endospore coat and is required for spore resistance against hydrogen peroxide and UV light. CotA belongs to the laccase-like multicopper oxidase (MCO) family, which are able to couple oxidation of substrates with reduction of dioxygen to water. MCOs are capable of oxidizing a vast range of substrates, varying from aromatic compounds to inorganic compounds such as metals. Although the members of this family have diverse functions, majority of them have three cupredoxin domain repeats. The copper ions are bound in several sites: Type 1, Type 2, and/or Type 3. The ensemble of types 2 and 3 copper is called a trinuclear cluster. MCOs oxidize their substrate by accepting electrons at a mononuclear copper center and transferring them to the active site trinuclear copper center. The cupredoxin domain 3 of 3-domain MCOs contains the Type 1 (T1) copper binding site and part the trinuclear copper binding site, which is located at the interface of domains 1 and 3. — an NCBI CDD conserved domain (cd13891); members share this curated model.
