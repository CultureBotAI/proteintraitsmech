label: "N-terminal domain found in Bacteroides fragilis Nctc 9343 BF2867 and related proteins. Two structurally similar domains with low sequence similarity in a tandem repeat arrangement form a protein that may have a role in cell adhesion. This family overlaps with DUF3988."
