label: "TA2 is a subdomain of the transcriptional activation domain (TAD) of RelA. RelA (also known as p65) is part of NF-?B family of inducible transcription factors which has a major role in immune response. RelA comprises two specific domains, the N-terminal sequence-specific DNA-binding RHD domain and the C-terminal the transcription influential abilities TAD domain. Mutational analyses of RelA C-terminal region have demonstrated the strong transactivation potential of TAD that is divided into two functional parts, the TAD1 and the TAD2. NF-?B family is comprised of five members, namely, RelA, RelB, c-Rel, p50, and p52. Heterologous transactivation domains are found in p65, c-Rel, and RelB, therefore dimers that contain any of them can activate transcription. The RelA is the only ubiquitously expressed mammalian NF?B protein which contains TAD, and its vital importance is confirmed by experiments showing that lack of RelA subunit is lethal to such embryos."
definition: >-
  TA2 is a subdomain of the transcriptional activation domain (TAD) of RelA. RelA (also known as p65) is part of NF-?B family of inducible transcription factors which has a major role in immune response. RelA comprises two specific domains, the N-terminal sequence-specific DNA-binding RHD domain and the C-terminal the transcription influential abilities TAD domain. Mutational analyses of RelA C-terminal region have demonstrated the strong transactivation potential of TAD that is divided into two functional parts, the TAD1 and the TAD2. NF-?B family is comprised of five members, namely, RelA, RelB, c-Rel, p50, and p52. Heterologous transactivation domains are found in p65, c-Rel, and RelB, therefore dimers that contain any of them can activate transcription. The RelA is the only ubiquitously expressed mammalian NF?B protein which contains TAD, and its vital importance is confirmed by experiments showing that lack of RelA subunit is lethal to such embryos. — an NCBI CDD conserved domain (cd19850); members share this curated model.
