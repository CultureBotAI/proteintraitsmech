label: "Saccharomyces cerevisiae D-arabinose dehydrogenase [NAD(P)+] heavy chain (Ara1p) and similar proteins. Saccharomyces cerevisiae Ara1p (EC 1.1.1.117), also called D-arabinose 1-dehydrogenase (NAD(P)(+)), is a founding members of aldo-keto reductase family 3 member C1 (AKR3C1). It catalyzes the oxidation of D-arabinose, L-xylose, L-fucose, and L-galactose in the presence of NADP(+)."
definition: >-
