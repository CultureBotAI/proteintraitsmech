identifier: CDD:cd16051
label: TNFSF7
definition: >-
  Tumor necrosis factor ligand superfamily member 7 (TNFSF7), also known as CD70 or CD27L. This family contains TNFSF7 (also known as CD70, CD27L, or CD27LG), a co-stimulatory molecule involved in the immune response as well as in cancer development and progression. Expression of TNFSF7/CD70 is restricted to activated T- and B-lymphocytes and mature dendritic cells. CD70's binding to its cognate receptor TNFRSF7 (also known as CD27, T14, S152, Tp55, LPFS2) is involved in survival, proliferation, and lymphocyte differentiation. Ligation of CD70 on B-cells to CD27 on T-cells triggers activation of PI3K/Akt and MEK/extracellular-signal-regulated kinases (ERK)/MAPK. As a surface antigen it induces proliferation of co-stimulated T-cells, enhances the generation of cytolytic T-cells, and contributes to T-cell activation. CD70 also plays a role in regulating B-cell activation, cytotoxic function of natural killer cells, and immunoglobulin synthesis. CD70 is not expressed in non-lymphoid normal tissue but is overexpressed in tumor cells of various types of lymphomas and invasive carcinomas. This high expression may induce cytotoxic effects in B- and T-cells, induce lymphocyte apoptosis, and promote escape from the immune system, making CD70 a potentially attractive therapeutic target. CD70 is also overexpressed in CD4+ T cells from patients with autoimmune diseases, such as systemic lupus erythematosus (SLE), subacute cutaneous lupus erythematosus (SCLE) and primary Sjogren's syndrome (pSS); this is possibly due to demethylation of its promoter regulatory elements. TNFSF7 (and TNFSF9) deletions are recurrent genetic lesions in multiple types of human lymphomas, including diffuse large B-cell and Burkitt lymphomas. Although CD70 is required for the activation of the antiviral adaptive response, it has a regulatory role in early cytokine responses to viruses such as MCMV, possibly through maintenance of regulatory T (Treg) cell survival and function
