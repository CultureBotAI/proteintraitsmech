identifier: CDD:cd17236
label: "ubiquitin-like (Ubl) domain found in microtubule associate protein 1 light chain 3C (MAPLC3C). Autophagy is an essential intracellular process that targets large protein complexes, bacterial pathogens, and organelles for degradation. MAP1LC3C belongs to the MAP1LC3 (short name LC3) family proteins. MAP1LC3 has a ubiquitin-like (Ubl) fold that belongs to the autophagy-related 8 (ATG8) protein family. A Ubl conjugation of MAP1LC3 by the phospholipid phosphatidylethanolamine (PE) is an essential process for the formation of autophagosomes. MAP1LC3 is cleaved by cysteine protease ATG4 and then conjugated with PE by E1-like enzyme ATG7 and ATG3, a E2-like enzyme. The Ubl conversion of MAP1LC3 is known as a marker of autophagy-induction. ATG8 proteins are ubiquitously expressed, although some subfamily members are expressed at increased levels in certain tissues, e.g. MAP1LC3C is transcribed at lower levels than other members of MAP1LC3 subfamily and expressed predominantly in the lung."
definition: >-
  ubiquitin-like (Ubl) domain found in microtubule associate protein 1 light chain 3C (MAPLC3C). Autophagy is an essential intracellular process that targets large protein complexes, bacterial pathogens, and organelles for degradation. MAP1LC3C belongs to the MAP1LC3 (short name LC3) family proteins. MAP1LC3 has a ubiquitin-like (Ubl) fold that belongs to the autophagy-related 8 (ATG8) protein family. A Ubl conjugation of MAP1LC3 by the phospholipid phosphatidylethanolamine (PE) is an essential process for the formation of autophagosomes. MAP1LC3 is cleaved by cysteine protease ATG4 and then conjugated with PE by E1-like enzyme ATG7 and ATG3, a E2-like enzyme. The Ubl conversion of MAP1LC3 is known as a marker of autophagy-induction. ATG8 proteins are ubiquitously expressed, although some subfamily members are expressed at increased levels in certain tissues, e.g. MAP1LC3C is transcribed at lower levels than other members of MAP1LC3 subfamily and expressed predominantly in the lung. — an NCBI CDD conserved domain (cd17236); members share this curated model.
