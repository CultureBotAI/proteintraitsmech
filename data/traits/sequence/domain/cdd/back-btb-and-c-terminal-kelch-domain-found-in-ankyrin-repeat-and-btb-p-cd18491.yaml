identifier: CDD:cd18491
label: BACK_ABTB2_like
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in ankyrin repeat and BTB/POZ domain-containing protein 2 (ABTB2) and similar proteins. ABTB2, also called Bood POZ containing gene type 2 (BPOZ-2), is a scaffold protein that controls the degradation of many biological proteins involved in a range of functions from embryonic development to tumor progression. It may be involved in the initiation of hepatocyte growth. It inhibits the aggregation of alpha-synuclein, with implications in Parkinson's disease. ABTB2 functions as an adaptor protein for the E3 ubiquitin ligase scaffold protein Cullin-3. It directly binds to eukaryotic elongation factor 1A1 (eEF1A1) to promote eEF1A1 ubiquitylation and degradation and prevent translation. It is also involved in the growth suppressive effect of the phosphatase and tensin homologue (PTEN). This subfamily also includes BTB/POZ domain-containing protein 11 (BTBD11), whose function is unclear
