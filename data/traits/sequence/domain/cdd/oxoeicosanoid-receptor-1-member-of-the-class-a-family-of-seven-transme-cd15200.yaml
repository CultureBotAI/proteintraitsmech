identifier: CDD:cd15200
label: "oxoeicosanoid receptor 1, member of the class A family of seven-transmembrane G protein-coupled receptors. OXER1, also called GPR170, is a receptor for eicosanoids and polyunsaturated fatty acids such as 5-oxo-6E,8Z,11Z,14Z-eicosatetraenoic acid (5-OXO-ETE), 5(S)-hydroperoxy-6E,8Z,11Z,14Z-eicosatetraenoic acid (5(S)-HPETE) and arachidonic acid. OXER1 is a member of the class A family of seven-transmembrane G-protein coupled receptors and appears to be coupled to the G(i/o) protein. The receptor is expressed in various tissues except brain. Phylogenetic analysis showed that GPR31 and OXER1 are the most closely related receptors to the hydroxycarboxylic acid receptor family (HCARs). OXER1, like GPR31, activates the ERK1/2 (MAPK3/MAPK1) pathway of intracellular signaling, but unlike GPR31, does cause increase in the cytosolic calcium level."
definition: >-
  oxoeicosanoid receptor 1, member of the class A family of seven-transmembrane G protein-coupled receptors. OXER1, also called GPR170, is a receptor for eicosanoids and polyunsaturated fatty acids such as 5-oxo-6E,8Z,11Z,14Z-eicosatetraenoic acid (5-OXO-ETE), 5(S)-hydroperoxy-6E,8Z,11Z,14Z-eicosatetraenoic acid (5(S)-HPETE) and arachidonic acid. OXER1 is a member of the class A family of seven-transmembrane G-protein coupled receptors and appears to be coupled to the G(i/o) protein. The receptor is expressed in various tissues except brain. Phylogenetic analysis showed that GPR31 and OXER1 are the most closely related receptors to the hydroxycarboxylic acid receptor family (HCARs). OXER1, like GPR31, activates the ERK1/2 (MAPK3/MAPK1) pathway of intracellular signaling, but unlike GPR31, does cause increase in the cytosolic calcium level. — an NCBI CDD conserved domain (cd15200); members share this curated model.
