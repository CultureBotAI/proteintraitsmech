identifier: CDD:cd06625
label: "Catalytic domain of Mitogen-Activated Protein (MAP)/Extracellular signal-Regulated Kinase (ERK) Kinase Kinase 3-like Serine/Threonine Kinases. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. This subfamily is composed of MEKK3, MEKK2, and related proteins; all contain an N-terminal PB1 domain, which mediates oligomerization, and a C-terminal catalytic domain. MEKK2 and MEKK3 are MAPK kinase kinases (MAPKKKs or MKKK) that activate MEK5 (also called MKK5), which activates ERK5. The ERK5 cascade plays roles in promoting cell proliferation, differentiation, neuronal survival, and neuroprotection. MEKK3 plays an essential role in embryonic angiogenesis and early heart development. MEKK2 and MEKK3 can also activate the MAPKs, c-Jun N-terminal kinase (JNK) and p38, through their respective MAPKKs. The MEKK3-like subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of Mitogen-Activated Protein (MAP)/Extracellular signal-Regulated Kinase (ERK) Kinase Kinase 3-like Serine/Threonine Kinases. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. This subfamily is composed of MEKK3, MEKK2, and related proteins; all contain an N-terminal PB1 domain, which mediates oligomerization, and a C-terminal catalytic domain. MEKK2 and MEKK3 are MAPK kinase kinases (MAPKKKs or MKKK) that activate MEK5 (also called MKK5), which activates ERK5. The ERK5 cascade plays roles in promoting cell proliferation, differentiation, neuronal survival, and neuroprotection. MEKK3 plays an essential role in embryonic angiogenesis and early heart development. MEKK2 and MEKK3 can also activate the MAPKs, c-Jun N-terminal kinase (JNK) and p38, through their respective MAPKKs. The MEKK3-like subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd06625); members share this curated model.
