identifier: CDD:cd12903
label: "PRY/SPRY domain containing protein 4 (SPRYD4). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain and is encoded by the SPRYD4 gene. SPRYD4 (SPRY containing domain 4) is ubiquitously expressed in many human tissues, most strongly in kidney, bladder, brain, thymus and stomach. Subcellular localization demonstrates that SPRYD4 protein is localized in the nucleus when overexpressed in COS-7 green monkey cell. It has remained uncharacterized thus far."
definition: >-
  PRY/SPRY domain containing protein 4 (SPRYD4). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain and is encoded by the SPRYD4 gene. SPRYD4 (SPRY containing domain 4) is ubiquitously expressed in many human tissues, most strongly in kidney, bladder, brain, thymus and stomach. Subcellular localization demonstrates that SPRYD4 protein is localized in the nucleus when overexpressed in COS-7 green monkey cell. It has remained uncharacterized thus far. — an NCBI CDD conserved domain (cd12903); members share this curated model.
