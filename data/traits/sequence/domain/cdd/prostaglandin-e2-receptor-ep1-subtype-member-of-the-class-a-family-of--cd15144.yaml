identifier: CDD:cd15144
label: "prostaglandin E2 receptor EP1 subtype, member of the class A family of seven-transmembrane G protein-coupled receptors. Prostaglandin E2 receptor EP1, also called prostanoid EP1 receptor, is one of four receptor subtypes whose endogenous physiological ligand is prostaglandin E2 (PGE2). Each of these subtypes (EP1-EP4) have unique but overlapping tissue distributions that activate different intracellular signaling pathways. It has been shown that stimulation of the EP1 receptor by PGE2 causes smooth muscle contraction and increased intracellular Ca2+ levels; however, it is still unclear whether EP1 receptor is exclusively coupled to G(q/11), which leading to activation of phospholipase C and phosphatidylinositol hydrolysis. Prostanoids are the cyclooxygenase (COX) metabolites of arachidonic acid, which include the prostaglandins (PGD2, PGE2, PGF2alpha), prostacyclin (PGI2), and thromboxane A2 (TxA2). These five major bioactive prostanoids acts as mediators or modulators in a wide range of physiological and pathophysiological processes within the kidney and play important roles in inflammation, platelet aggregation, and vasoconstriction/relaxation, among many others. They act locally by preferentially interacting with G protein-coupled receptors designated DP, EP. FP, IP, and TP, respectively. The phylogenetic tree suggests that the prostanoid receptors can be grouped into two major branches: G(s)-coupled (DP1, EP2, EP4, and IP) and G(i)- (EP3) or G(q)-coupled (EP1, FP, and TP), forming three clusters."
definition: >-
  prostaglandin E2 receptor EP1 subtype, member of the class A family of seven-transmembrane G protein-coupled receptors. Prostaglandin E2 receptor EP1, also called prostanoid EP1 receptor, is one of four receptor subtypes whose endogenous physiological ligand is prostaglandin E2 (PGE2). Each of these subtypes (EP1-EP4) have unique but overlapping tissue distributions that activate different intracellular signaling pathways. It has been shown that stimulation of the EP1 receptor by PGE2 causes smooth muscle contraction and increased intracellular Ca2+ levels; however, it is still unclear whether EP1 receptor is exclusively coupled to G(q/11), which leading to activation of phospholipase C and phosphatidylinositol hydrolysis. Prostanoids are the cyclooxygenase (COX) metabolites of arachidonic acid, which include the prostaglandins (PGD2, PGE2, PGF2alpha), prostacyclin (PGI2), and thromboxane A2 (TxA2). These five major bioactive prostanoids acts as mediators or modulators in a wide range of physiological and pathophysiological processes within the kidney and play important roles in inflammation, platelet aggregation, and vasoconstriction/relaxation, among many others. They act locally by preferentially interacting with G protein-coupled receptors designated DP, EP. FP, IP, and TP, respectively. The phylogenetic tree suggests that the prostanoid receptors can be grouped into two major branches: G(s)-coupled (DP1, EP2, EP4, and IP) and G(i)- (EP3) or G(q)-coupled (EP1, FP, and TP), forming three clusters. — an NCBI CDD conserved domain (cd15144); members share this curated model.
