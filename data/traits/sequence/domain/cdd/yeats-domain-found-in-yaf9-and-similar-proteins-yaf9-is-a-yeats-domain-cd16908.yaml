identifier: CDD:cd16908
label: "YEATS domain found in Yaf9 and similar proteins. Yaf9 is a YEATS domain family protein essential in the function the NuA4 histone acetyltransferase complex and the SWR1-C ATP-dependent chromatin remodeling complex. Yaf9 shares structural similarity with histone chaperone Asf1, both exhibit histone H3 and H4 binding in vitro, and evidence supports both play a role in the same histone acetylation mechanism.  DNA regulation by chromatin thru histone post-translational modification and other mechanism involves complexes with write, eraser and reader functions. YEATS domains act as readers of the chromatin state, and stimulate transcriptional activity, thru preferential interactions with crotonylated lysines on histones.  The YEATS family is named for several family members: `YNK7', `ENL', `AF-9', and `TFIIF small subunit', and also contains the GAS41 protein."
definition: >-
  YEATS domain found in Yaf9 and similar proteins. Yaf9 is a YEATS domain family protein essential in the function the NuA4 histone acetyltransferase complex and the SWR1-C ATP-dependent chromatin remodeling complex. Yaf9 shares structural similarity with histone chaperone Asf1, both exhibit histone H3 and H4 binding in vitro, and evidence supports both play a role in the same histone acetylation mechanism. DNA regulation by chromatin thru histone post-translational modification and other mechanism involves complexes with write, eraser and reader functions. YEATS domains act as readers of the chromatin state, and stimulate transcriptional activity, thru preferential interactions with crotonylated lysines on histones. The YEATS family is named for several family members: `YNK7', `ENL', `AF-9', and `TFIIF small subunit', and also contains the GAS41 protein. — an NCBI CDD conserved domain (cd16908); members share this curated model.
