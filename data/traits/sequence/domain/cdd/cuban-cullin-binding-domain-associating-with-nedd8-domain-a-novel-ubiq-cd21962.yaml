identifier: CDD:cd21962
label: UBD_CUBAN_KHNYN
definition: >-
  CUBAN (Cullin?Binding domain Associating with NEDD8) domain, a novel ubiquitin-binding domain (UBD), found in protein KHNYN and similar proteins. KHNYN, also called KH and NYN domain-containing protein, is a novel cofactor for zinc finger antiviral protein (ZAP) to target CpG-containing retroviral RNA for degradation. The model corresponds to CUBAN (Cullin?Binding domain Associating with NEDD8) domain of KHNYN, which binds to neddylated cullins and shows a clear preference for NEDD8 over monomeric ubiquitin. CUBAN is a novel ubiquitin-binding domain (UBD), which is not evolutionary related to coupling of ubiquitin conjugation to endoplasmic-reticulum (ER) degradation (CUE) domains
