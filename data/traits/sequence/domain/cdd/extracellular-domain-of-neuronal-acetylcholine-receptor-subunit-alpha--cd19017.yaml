identifier: CDD:cd19017
label: "extracellular domain of neuronal acetylcholine receptor subunit alpha 4 (CHRNA4). This subfamily contains the extracellular domain of nicotinic acetylcholine receptor subunit alpha 4 (alpha4), encoded by the CHRNA4 gene. Alpha4 forms a functional nAChR by interacting with either nAChR beta2 or beta4 subunits. Alpha4beta2, the major heteropentameric nAChR in the brain, exists in two isoforms, (alpha4)3(beta2)2 and (alpha4)2(beta2)3, with the latter believed to constitute the majority of alpha4beta2 nAChR in the cortex. Both isoforms contain two canonical alpha4:beta2 ACh-binding sites with either low or high ACh sensitivity. This protein is an integral membrane receptor subunit that can interact with either nAChR beta-2 or nAChR beta-4 to form a functional receptor. Mutations in this gene (CHRNA4) cause nocturnal frontal lobe epilepsy type 1. Polymorphisms in this gene may provide protection against nicotine addiction."
definition: >-
  extracellular domain of neuronal acetylcholine receptor subunit alpha 4 (CHRNA4). This subfamily contains the extracellular domain of nicotinic acetylcholine receptor subunit alpha 4 (alpha4), encoded by the CHRNA4 gene. Alpha4 forms a functional nAChR by interacting with either nAChR beta2 or beta4 subunits. Alpha4beta2, the major heteropentameric nAChR in the brain, exists in two isoforms, (alpha4)3(beta2)2 and (alpha4)2(beta2)3, with the latter believed to constitute the majority of alpha4beta2 nAChR in the cortex. Both isoforms contain two canonical alpha4:beta2 ACh-binding sites with either low or high ACh sensitivity. This protein is an integral membrane receptor subunit that can interact with either nAChR beta-2 or nAChR beta-4 to form a functional receptor. Mutations in this gene (CHRNA4) cause nocturnal frontal lobe epilepsy type 1. Polymorphisms in this gene may provide protection against nicotine addiction. — an NCBI CDD conserved domain (cd19017); members share this curated model.
