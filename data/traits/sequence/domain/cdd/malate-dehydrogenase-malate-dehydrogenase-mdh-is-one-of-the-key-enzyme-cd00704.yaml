identifier: CDD:cd00704
label: "Malate dehydrogenase. Malate dehydrogenase (MDH) is one of the key enzymes in the citric acid cycle, facilitating both the conversion of malate to oxaloacetate and replenishing levels of oxalacetate by reductive carboxylation of pyruvate. MDHs belong to the NAD-dependent, lactate dehydrogenase (LDH)-like, 2-hydroxycarboxylate dehydrogenase family, which also includes the GH4 family of glycoside hydrolases. They are part of the NAD(P)-binding Rossmann fold superfamily, which includes a wide variety of protein families including the NAD(P)-binding domains of alcohol dehydrogenases, tyrosine-dependent oxidoreductases, glyceraldehyde-3-phosphate dehydrogenases, formate/glycerate dehydrogenases, siroheme synthases, 6-phosphogluconate dehydrogenases, aminoacid dehydrogenases, repressor rex, and NAD-binding potassium channel domains, among others."
definition: >-
  Malate dehydrogenase. Malate dehydrogenase (MDH) is one of the key enzymes in the citric acid cycle, facilitating both the conversion of malate to oxaloacetate and replenishing levels of oxalacetate by reductive carboxylation of pyruvate. MDHs belong to the NAD-dependent, lactate dehydrogenase (LDH)-like, 2-hydroxycarboxylate dehydrogenase family, which also includes the GH4 family of glycoside hydrolases. They are part of the NAD(P)-binding Rossmann fold superfamily, which includes a wide variety of protein families including the NAD(P)-binding domains of alcohol dehydrogenases, tyrosine-dependent oxidoreductases, glyceraldehyde-3-phosphate dehydrogenases, formate/glycerate dehydrogenases, siroheme synthases, 6-phosphogluconate dehydrogenases, aminoacid dehydrogenases, repressor rex, and NAD-binding potassium channel domains, among others. — an NCBI CDD conserved domain (cd00704); members share this curated model.
