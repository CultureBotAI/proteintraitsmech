identifier: CDD:cd02724
label: GH5_beta_Mannanase
definition: >-
  GH5_beta_Mannanase. beta-Mannanases hydrolyse the O-glycosidic bonds in mannan, a hemicellulose constituent of plants. These enzymes have potential use in pulp and paper production and are of significant biotechnological interest
