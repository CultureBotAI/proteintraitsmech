identifier: CDD:cd18161
label: "phosphoacceptor receiver (REC) domain of hybrid sensor histidine kinase/response regulators similar to Pseudomonas savastanoi blue-light-activated histidine kinase. Typically, two-component regulatory systems (TCSs) consist of a sensor (histidine kinase) that responds to specific input(s) by modifying the output of a cognate response regulator (RR). TCSs allow organisms to sense and respond to changes in environmental conditions. Hybrid sensor histidine kinase (HK)/response regulators contain all the elements of a classical TCS in a single polypeptide chain. Pseudomonas savastanoi blue-light-activated histidine kinase is a photosensitive HK and RR that is involved in increased bacterial virulence upon exposure to light. RRs share the common phosphoacceptor REC domain and different effector/output domains such as DNA, RNA, ligand-binding, protein-binding, or enzymatic domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of hybrid sensor histidine kinase/response regulators similar to Pseudomonas savastanoi blue-light-activated histidine kinase. Typically, two-component regulatory systems (TCSs) consist of a sensor (histidine kinase) that responds to specific input(s) by modifying the output of a cognate response regulator (RR). TCSs allow organisms to sense and respond to changes in environmental conditions. Hybrid sensor histidine kinase (HK)/response regulators contain all the elements of a classical TCS in a single polypeptide chain. Pseudomonas savastanoi blue-light-activated histidine kinase is a photosensitive HK and RR that is involved in increased bacterial virulence upon exposure to light. RRs share the common phosphoacceptor REC domain and different effector/output domains such as DNA, RNA, ligand-binding, protein-binding, or enzymatic domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd18161); members share this curated model.
