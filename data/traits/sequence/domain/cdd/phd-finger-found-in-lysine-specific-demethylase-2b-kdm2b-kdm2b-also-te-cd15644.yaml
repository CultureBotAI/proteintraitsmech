identifier: CDD:cd15644
label: "PHD finger found in Lysine-specific demethylase 2B (KDM2B). KDM2B, also termed Ndy1, or CXXC-type zinc finger protein 2, or F-box and leucine-rich (LRR) repeat protein 10 (FBXL10), or F-box protein FBL10, or JmjC domain-containing histone demethylation protein 1B (Jhdm1b), or Jumonji domain-containing EMSY-interactor methyltransferase motif protein (Protein JEMMA), or [Histone-H3]-lysine-36 demethylase 1B, is a ubiquitously expressed histone H3 lysine 4 (H3K4me2) or histone H3 lysine 36 (H3K36me2) demethylase that functions as a regulator of chemokine expression, cellular morphology, and the metabolome of fibroblasts. It regulates the differentiation of Mesenchymal Stem Cells (MSCs) and has been implicated in cell cycle regulation by de-repressing cyclin-dependent kinase inhibitor 2B (CDKN2B or p15INK4B). It also plays a role in recruiting polycomb repressive complex 1 (PRC1) to CpG islands (CGIs) of developmental genes and regulates lysine 119 monoubiquitylation on H2A (H2AK119ub1) in embryonic stem cells (ESCs). Moreover, it acts as an oncogene that plays a critical role in leukemia development and maintenance. KDM2B consists of two Jumonji C (JmjC) domains, and FBXHA and FBXHB domains. A CXXC zinc-finger domain, followed by a plant homeodomain (PHD) finger, is located within the FBXHA domain, and an F-box domain, followed by an antagonist of mitotic exit network protein 1 (AMN1) domain, is located within the FBXHB domain."
definition: >-
  PHD finger found in Lysine-specific demethylase 2B (KDM2B). KDM2B, also termed Ndy1, or CXXC-type zinc finger protein 2, or F-box and leucine-rich (LRR) repeat protein 10 (FBXL10), or F-box protein FBL10, or JmjC domain-containing histone demethylation protein 1B (Jhdm1b), or Jumonji domain-containing EMSY-interactor methyltransferase motif protein (Protein JEMMA), or [Histone-H3]-lysine-36 demethylase 1B, is a ubiquitously expressed histone H3 lysine 4 (H3K4me2) or histone H3 lysine 36 (H3K36me2) demethylase that functions as a regulator of chemokine expression, cellular morphology, and the metabolome of fibroblasts. It regulates the differentiation of Mesenchymal Stem Cells (MSCs) and has been implicated in cell cycle regulation by de-repressing cyclin-dependent kinase inhibitor 2B (CDKN2B or p15INK4B). It also plays a role in recruiting polycomb repressive complex 1 (PRC1) to CpG islands (CGIs) of developmental genes and regulates lysine 119 monoubiquitylation on H2A (H2AK119ub1) in embryonic stem cells (ESCs). Moreover, it acts as an oncogene that plays a critical role in leukemia development and maintenance. KDM2B consists of two Jumonji C (JmjC) domains, and FBXHA and FBXHB domains. A CXXC zinc-finger domain, followed by a plant homeodomain (PHD) finger, is located within the FBXHA domain, and an F-box domain, followed by an antagonist of mitotic exit network protein 1 (AMN1) domain, is located within the FBXHB domain. — an NCBI CDD conserved domain (cd15644); members share this curated model.
