identifier: CDD:cd23817
label: "RWD domain of RWD domain-containing protein 4 (RWDD4) and related proteins. RWDD4, also called protein FAM28A, is a target of the tumor suppressor MicroRNA (MiR)-506 in bladder cancer cells. Downregulation of RWDD4 suppresses bladder cancer cell proliferation, migration and invasion. RWDD4 has also been identified as a modifier of metastasis in human prostate cancer."
definition: >-
  RWD domain of RWD domain-containing protein 4 (RWDD4) and related proteins. RWDD4, also called protein FAM28A, is a target of the tumor suppressor MicroRNA (MiR)-506 in bladder cancer cells. Downregulation of RWDD4 suppresses bladder cancer cell proliferation, migration and invasion. RWDD4 has also been identified as a modifier of metastasis in human prostate cancer. — an NCBI CDD conserved domain (cd23817); members share this curated model.
