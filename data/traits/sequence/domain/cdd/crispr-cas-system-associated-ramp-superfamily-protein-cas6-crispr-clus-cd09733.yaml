label: "CRISPR/Cas system-associated RAMP superfamily protein Cas6. CRISPR (Clustered Regularly Interspaced Short Palindromic Repeats) and associated Cas proteins comprise a system for heritable host defense by prokaryotic cells against phage and other foreign DNA; Cas6 is an endoribonuclease that generates crRNAs, predicted subunit of Cascade complex; RAMP superfamily protein; Possesses double RRM/ferredoxin fold; also known as AF0072 family"
definition: >-
  CRISPR/Cas system-associated RAMP superfamily protein Cas6. CRISPR (Clustered Regularly Interspaced Short Palindromic Repeats) and associated Cas proteins comprise a system for heritable host defense by prokaryotic cells against phage and other foreign DNA; Cas6 is an endoribonuclease that generates crRNAs, predicted subunit of Cascade complex; RAMP superfamily protein; Possesses double RRM/ferredoxin fold; also known as AF0072 family — an NCBI CDD conserved domain (cd09733); members share this curated model.
