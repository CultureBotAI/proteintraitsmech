identifier: CDD:cd22679
label: "forkhead associated (FHA) domain found in sarcolemmal membrane-associated protein (SLMAP) and similar proteins. SLMAP, also called sarcolemmal-associated protein (SLAP), is a tail-anchored protein involved in fundamental cellular processes, such as myoblast fusion, cell cycle progression, and chromosomal inheritance. It is a cardiac membrane protein that plays an important role in E-C coupling and the adrenergic response of the heart. Overexpression of the SLMAP gene has been associated with diabetes and endothelial dysfunction of macro- and micro-blood vessels. SLMAP contains an N-terminal FHA domain, which is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in sarcolemmal membrane-associated protein (SLMAP) and similar proteins. SLMAP, also called sarcolemmal-associated protein (SLAP), is a tail-anchored protein involved in fundamental cellular processes, such as myoblast fusion, cell cycle progression, and chromosomal inheritance. It is a cardiac membrane protein that plays an important role in E-C coupling and the adrenergic response of the heart. Overexpression of the SLMAP gene has been associated with diabetes and endothelial dysfunction of macro- and micro-blood vessels. SLMAP contains an N-terminal FHA domain, which is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22679); members share this curated model.
