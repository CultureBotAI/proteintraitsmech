identifier: CDD:cd21448
label: "dynein light chain (DLC)-like domain found in the dynein light chain Tctex-type 1 (DYNLT1) subfamily and similar proteins. The dynein light chain Tctex-type 1 (DYNLT1) subfamily includes two isoforms, DYNLT1 and DYNLT3, which contribute to the differential regulation of dynein cargo binding. They are non-catalytic accessory components of the cytoplasmic dynein 1 complex that are thought to be involved in linking dynein to cargos and to adapter proteins that regulate dynein function. The dynein complex contains either DYNLT1 or DYNLT3, but not both. The family also includes Schizosaccharomyces pombe dynein light chain Tctex-type (SpDlc1), Saccharomyces cerevisiae topoisomerase I damage affected protein 2 (TDA2) and similar proteins. SpDlc1 belongs to the 14-kDa Tctex-1 dynein light chain family. It acts as a non-catalytic accessory component of a dynein complex. It is required for regular oscillatory nuclear movement and efficient recombination during meiotic prophase in fission yeast. TDA2 is a novel protein of the endocytic machinery necessary for normal internalization of native cargo in yeast. It works independently of the dynein motor complex and microtubules."
