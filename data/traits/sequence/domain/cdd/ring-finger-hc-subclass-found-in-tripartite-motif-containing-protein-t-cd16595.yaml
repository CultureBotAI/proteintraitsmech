identifier: CDD:cd16595
label: "RING finger, HC subclass, found in tripartite motif-containing protein TRIM17 and similar proteins. TRIM17, also known as RING finger protein 16 (RNF16) or testis RING finger protein (Terf), is a crucial E3 ubiquitin ligase that is necessary and sufficient for neuronal apoptosis and contributes to Mcl-1 ubiquitination in cerebellar granule neurons (CGNs). It interacts in a SUMO-dependent manner with nuclear factor of activated T cell NFATc3 transcription factor, and thus inhibits the activity of NFATc3 by preventing its nuclear localization. In contrast, it binds to and inhibits NFATc4 transcription factor in a SUMO-independent manner. Moreover, TRIM17 stimulates degradation of kinetochore protein ZW10 interacting protein (ZWINT), a known component of the kinetochore complex required for the mitotic spindle checkpoint, and negatively regulates cell proliferation. TRIM17 belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain."
definition: >-
  RING finger, HC subclass, found in tripartite motif-containing protein TRIM17 and similar proteins. TRIM17, also known as RING finger protein 16 (RNF16) or testis RING finger protein (Terf), is a crucial E3 ubiquitin ligase that is necessary and sufficient for neuronal apoptosis and contributes to Mcl-1 ubiquitination in cerebellar granule neurons (CGNs). It interacts in a SUMO-dependent manner with nuclear factor of activated T cell NFATc3 transcription factor, and thus inhibits the activity of NFATc3 by preventing its nuclear localization. In contrast, it binds to and inhibits NFATc4 transcription factor in a SUMO-independent manner. Moreover, TRIM17 stimulates degradation of kinetochore protein ZW10 interacting protein (ZWINT), a known component of the kinetochore complex required for the mitotic spindle checkpoint, and negatively regulates cell proliferation. TRIM17 belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain. — an NCBI CDD conserved domain (cd16595); members share this curated model.
