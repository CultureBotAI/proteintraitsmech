identifier: CDD:cd21553
label: VEFS-box_EMF2-like
definition: >-
  VEFS (VRN2-EMF2-FIS2-Su(z)12) box found in Arabidopsis thaliana Polycomb group protein EMBRYONIC FLOWER 2 (EMF2) and similar proteins. This subfamily includes a group of proteins similar to Arabidopsis thaliana Polycomb group (PcG) proteins, EMF2, Polycomb group protein FERTILIZATION-INDEPENDENT SEED 2 (FIS2), and Polycomb group protein VERNALIZATION 2 (VRN2). EMF2 is involved in flowering processes by repressing unknown target genes and preventing reproductive development. It participates in PcG protein complex-mediated (probably in complex with EMF1) silencing of the flower homeotic genes AGAMOUS (AG), PISTILLATA (PI), and APETALA3 (AP3), as well as of some regulatory genes such as ABSCISIC ACID INSENSITIVE3 (ABI3), LONG VEGETATIVE PHASE1 (LOV1), and FLOWERING LOCUS C (FLC) during vegetative development, by mediating trimethylation of histone 3 lysine 27 on the AG chromatin (H3K27me3). FIS2 is required to prevent the proliferation of the central cell by repressing unknown target genes before fertilization. It regulates the anteroposterior organization of the endosperm. VRN2 plays a central role in vernalization by maintaining repressed the homeotic gene FLC, a floral repressor, after cold treatment. PcG proteins act by forming multiprotein complexes, which are required to maintain the transcriptionally repressive state of homeotic genes throughout development. Members of this family contain a VEFS (VRN2-EMF2-FIS2-Su(z)12) box
