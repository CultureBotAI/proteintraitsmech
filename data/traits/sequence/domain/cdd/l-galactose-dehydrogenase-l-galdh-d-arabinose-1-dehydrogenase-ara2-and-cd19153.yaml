identifier: CDD:cd19153
label: "L-galactose dehydrogenase (L-galDH), D-arabinose 1-dehydrogenase (ARA2) and similar proteins. L-galDH (EC 1.1.1.316), also called L-galactose 1-dehydrogenase, catalyzes the oxidation of L-galactose to L-galactono-1,4-lactone in the presence of NAD(+). It uses NAD(+) as a hydrogen acceptor much more efficiently than NADP(+). ARA2 (EC1.1.1.116), also called NAD(+)-specific D-arabinose dehydrogenase, catalyzes the the oxidation of D-arabinose to D-arabinono-1,4-lactone in the presence of NAD(+)."
definition: >-
  L-galactose dehydrogenase (L-galDH), D-arabinose 1-dehydrogenase (ARA2) and similar proteins. L-galDH (EC 1.1.1.316), also called L-galactose 1-dehydrogenase, catalyzes the oxidation of L-galactose to L-galactono-1,4-lactone in the presence of NAD(+). It uses NAD(+) as a hydrogen acceptor much more efficiently than NADP(+). ARA2 (EC1.1.1.116), also called NAD(+)-specific D-arabinose dehydrogenase, catalyzes the the oxidation of D-arabinose to D-arabinono-1,4-lactone in the presence of NAD(+). — an NCBI CDD conserved domain (cd19153); members share this curated model.
