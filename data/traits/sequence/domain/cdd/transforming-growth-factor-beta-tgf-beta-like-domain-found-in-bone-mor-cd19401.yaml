identifier: CDD:cd19401
label: TGF_beta_BMP10
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in bone morphogenetic protein 10 (BMP-10) and similar proteins. BMP-10 is required for maintaining the proliferative activity of embryonic cardiomyocytes by preventing premature activation of the negative cell cycle regulator CDKN1C/p57KIP and maintaining the required expression levels of cardiogenic factors such as MEF2C and NKX2-5. It inhibits endothelial cell migration and growth. It may reduce cell migration and cell matrix adhesion in breast cancer cell lines
