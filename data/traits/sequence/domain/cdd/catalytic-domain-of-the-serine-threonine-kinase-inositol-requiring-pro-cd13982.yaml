identifier: CDD:cd13982
label: "Catalytic domain of the Serine/Threonine kinase, Inositol-requiring protein 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. IRE1, also called Endoplasmic reticulum (ER)-to-nucleus signaling protein (or ERN), is an ER-localized type I transmembrane protein with kinase and endoribonuclease domains in the cytoplasmic side. It acts as an ER stress sensor and is the oldest and most conserved component of the unfolded protein response (UPR) in eukaryotes. The UPR is activated when protein misfolding is detected in the ER in order to decrease the synthesis of new proteins and increase the capacity of the ER to cope with the stress. During ER stress, IRE1 dimerizes and forms oligomers, allowing the kinase domain to undergo trans-autophosphorylation. This leads to a conformational change that stimulates its endoribonuclease activity and results in the cleavage of its mRNA substrate, HAC1 in yeast and XBP1 in metazoans, promoting a splicing event that enables translation into a transcription factor which activates the UPR. Mammals contain two IRE1 proteins, IRE1alpha (or ERN1) and IRE1beta (or ERN2). The Ire1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, Inositol-requiring protein 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. IRE1, also called Endoplasmic reticulum (ER)-to-nucleus signaling protein (or ERN), is an ER-localized type I transmembrane protein with kinase and endoribonuclease domains in the cytoplasmic side. It acts as an ER stress sensor and is the oldest and most conserved component of the unfolded protein response (UPR) in eukaryotes. The UPR is activated when protein misfolding is detected in the ER in order to decrease the synthesis of new proteins and increase the capacity of the ER to cope with the stress. During ER stress, IRE1 dimerizes and forms oligomers, allowing the kinase domain to undergo trans-autophosphorylation. This leads to a conformational change that stimulates its endoribonuclease activity and results in the cleavage of its mRNA substrate, HAC1 in yeast and XBP1 in metazoans, promoting a splicing event that enables translation into a transcription factor which activates the UPR. Mammals contain two IRE1 proteins, IRE1alpha (or ERN1) and IRE1beta (or ERN2). The Ire1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd13982); members share this curated model.
