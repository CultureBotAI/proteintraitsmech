identifier: CDD:cd10369
label: "Src homology 2 (SH2) domain found in the Fyn-related kinase (Frk). Frk is a member of the Src non-receptor type tyrosine kinase family of proteins. The Frk subfamily is composed of Frk/Rak and Iyk/Bsk/Gst. It is expressed primarily epithelial cells.  Frk is a nuclear protein and may function during G1 and S phase of the cell cycle and suppress growth. Unlike the other Src members it lacks a glycine at position 2 of SH4 which is important for addition of a myristic acid moiety that is involved in targeting Src PTKs to cellular membranes. FRK and SHB exert similar effects when overexpressed in rat phaeochromocytoma (PC12) and beta-cells, where both induce PC12 cell differentiation and beta-cell proliferation. Under conditions that cause beta-cell degeneration these proteins augment beta-cell apoptosis. The FRK-SHB responses involve FAK and insulin receptor substrates (IRS) -1 and -2. Frk has been demonstrated to interact with retinoblastoma protein. Frk regulates PTEN protein stability by phosphorylating PTEN, which in turn prevents PTEN degradation. Frk also plays a role in regulation of embryonal pancreatic beta cell formation. Frk has a unique N-terminal domain, an SH3 domain, an SH2 domain, a kinase domain and a regulatory tail, as do the other members of the family.  Like the other members of the Src family the SH2 domain in addition to binding the target, also plays an autoinhibitory role by binding to its activation loop. The tryosine involved is at the same site as the tyrosine involved in the autophosphorylation of Src. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in the Fyn-related kinase (Frk). Frk is a member of the Src non-receptor type tyrosine kinase family of proteins. The Frk subfamily is composed of Frk/Rak and Iyk/Bsk/Gst. It is expressed primarily epithelial cells. Frk is a nuclear protein and may function during G1 and S phase of the cell cycle and suppress growth. Unlike the other Src members it lacks a glycine at position 2 of SH4 which is important for addition of a myristic acid moiety that is involved in targeting Src PTKs to cellular membranes. FRK and SHB exert similar effects when overexpressed in rat phaeochromocytoma (PC12) and beta-cells, where both induce PC12 cell differentiation and beta-cell proliferation. Under conditions that cause beta-cell degeneration these proteins augment beta-cell apoptosis. The FRK-SHB responses involve FAK and insulin receptor substrates (IRS) -1 and -2. Frk has been demonstrated to interact with retinoblastoma protein. Frk regulates PTEN protein stability by phosphorylating PTEN, which in turn prevents PTEN degradation. Frk also plays a role in regulation of embryonal pancreatic beta cell formation. Frk has a unique N-terminal domain, an SH3 domain, an SH2 domain, a kinase domain and a regulatory tail, as do the other members of the family. Like the other members of the Src family the SH2 domain in addition to binding the target, also plays an autoinhibitory role by binding to its activation loop. The tryosine involved is at the same site as the tyrosine involved in the autophosphorylation of Src. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10369); members share this curated model.
