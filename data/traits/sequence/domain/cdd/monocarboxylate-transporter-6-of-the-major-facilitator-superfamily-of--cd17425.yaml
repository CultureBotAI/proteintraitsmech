identifier: CDD:cd17425
label: "Monocarboxylate transporter 6 of the Major Facilitator Superfamily of transporters. Monocarboxylate transporter 6 (MCT6) is also called Solute carrier family 16 member 5 (SLC16A5). MCT6 has been shown to transport bumetanide, nateglinide, probenecid, and prostaglandin F2a, but not L-lactic acid, in a pH- and membrane potential-dependent manner. It may be involved in the disposition and absorption of various drugs. MCT6 is expressed in the kidney, muscle, brain, heart, pancreas, prostate, lung, and placenta. It belongs to the Monocarboxylate transporter (MCT) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Monocarboxylate transporter 6 of the Major Facilitator Superfamily of transporters. Monocarboxylate transporter 6 (MCT6) is also called Solute carrier family 16 member 5 (SLC16A5). MCT6 has been shown to transport bumetanide, nateglinide, probenecid, and prostaglandin F2a, but not L-lactic acid, in a pH- and membrane potential-dependent manner. It may be involved in the disposition and absorption of various drugs. MCT6 is expressed in the kidney, muscle, brain, heart, pancreas, prostate, lung, and placenta. It belongs to the Monocarboxylate transporter (MCT) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17425); members share this curated model.
