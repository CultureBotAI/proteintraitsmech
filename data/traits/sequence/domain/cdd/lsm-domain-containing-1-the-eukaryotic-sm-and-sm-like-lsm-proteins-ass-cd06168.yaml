identifier: CDD:cd06168
label: "LSM domain containing 1. The eukaryotic Sm and Sm-like (LSm) proteins associate with RNA to form the core domain of the ribonucleoprotein particles involved in a variety of RNA processing events including pre-mRNA splicing, telomere replication, and mRNA degradation. Members of this family share a highly conserved Sm fold containing an N-terminal helix followed by a strongly bent five-stranded antiparallel beta-sheet. LSMD1 proteins have a single Sm-like domain structure. Sm-like proteins exist in archaea as well as prokaryotes, forming heptameric and hexameric ring structures similar to those found in eukaryotes."
definition: >-
  LSM domain containing 1. The eukaryotic Sm and Sm-like (LSm) proteins associate with RNA to form the core domain of the ribonucleoprotein particles involved in a variety of RNA processing events including pre-mRNA splicing, telomere replication, and mRNA degradation. Members of this family share a highly conserved Sm fold containing an N-terminal helix followed by a strongly bent five-stranded antiparallel beta-sheet. LSMD1 proteins have a single Sm-like domain structure. Sm-like proteins exist in archaea as well as prokaryotes, forming heptameric and hexameric ring structures similar to those found in eukaryotes. — an NCBI CDD conserved domain (cd06168); members share this curated model.
