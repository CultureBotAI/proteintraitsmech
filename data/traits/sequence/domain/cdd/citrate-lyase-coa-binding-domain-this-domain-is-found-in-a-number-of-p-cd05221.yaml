identifier: CDD:cd05221
label: "citrate lyase CoA binding domain. This domain is found in a number of proteins including succinyl CoA synthetases, malate and ATP-citrate ligases. It has a Rossmann fold that binds the ADP component of CoA. ATP:citrate lyase, found in eukaryotic cytoplasm, preferentially catalyzes citrate cleavage: oxaloacetate + acetyl-CoA + Pi = Citrate + CoA + ATP."
definition: >-
  citrate lyase CoA binding domain. This domain is found in a number of proteins including succinyl CoA synthetases, malate and ATP-citrate ligases. It has a Rossmann fold that binds the ADP component of CoA. ATP:citrate lyase, found in eukaryotic cytoplasm, preferentially catalyzes citrate cleavage: oxaloacetate + acetyl-CoA + Pi = Citrate + CoA + ATP. — an NCBI CDD conserved domain (cd05221); members share this curated model.
