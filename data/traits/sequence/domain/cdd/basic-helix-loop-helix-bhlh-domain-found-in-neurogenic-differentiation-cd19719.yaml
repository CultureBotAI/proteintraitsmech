identifier: CDD:cd19719
label: "basic helix-loop-helix (bHLH) domain found in neurogenic differentiation factor 1 (NeuroD1) and similar proteins. NeuroD1, also termed Class A basic helix-loop-helix protein 3 (bHLHa3), is a neuronal bHLH transcription factor involved in the development and maintenance of the endocrine pancreas and neuronal elements. It acts as an essential regulator of glutamatergic neuronal differentiation. Loss of NeuroD1 causes ataxia, cerebellar hypoplasia, sensorineural deafness, and severe retinal dystrophy in mice."
definition: >-
  basic helix-loop-helix (bHLH) domain found in neurogenic differentiation factor 1 (NeuroD1) and similar proteins. NeuroD1, also termed Class A basic helix-loop-helix protein 3 (bHLHa3), is a neuronal bHLH transcription factor involved in the development and maintenance of the endocrine pancreas and neuronal elements. It acts as an essential regulator of glutamatergic neuronal differentiation. Loss of NeuroD1 causes ataxia, cerebellar hypoplasia, sensorineural deafness, and severe retinal dystrophy in mice. — an NCBI CDD conserved domain (cd19719); members share this curated model.
