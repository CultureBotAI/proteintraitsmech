identifier: CDD:cd02234
label: "Bradyrhizobium japonicum BLR7677 and related proteins, cupin domain. This family includes bacterial and fungal proteins homologous to BLR7677, a Bradyrhizobium japonicum protein of unknown function. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
