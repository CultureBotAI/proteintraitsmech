identifier: CDD:cd17755
label: "DNA replication licensing factor Mcm4. Mcm4 is a helicase that play an important role in replication. It is part of the heterohexameric ring-shaped Mcm2-7 complex, which is part of the replicative helicase that unwinds parental double-stranded DNA at a replication fork to provide single-stranded DNA templates for the replicative polymerases."
definition: >-
  DNA replication licensing factor Mcm4. Mcm4 is a helicase that play an important role in replication. It is part of the heterohexameric ring-shaped Mcm2-7 complex, which is part of the replicative helicase that unwinds parental double-stranded DNA at a replication fork to provide single-stranded DNA templates for the replicative polymerases. — an NCBI CDD conserved domain (cd17755); members share this curated model.
