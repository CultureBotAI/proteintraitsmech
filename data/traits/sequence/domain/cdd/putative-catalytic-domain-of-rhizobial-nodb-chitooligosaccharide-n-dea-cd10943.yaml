identifier: CDD:cd10943
label: "Putative catalytic domain of rhizobial NodB chitooligosaccharide N-deacetylase and its bacterial homologs. This family corresponds to rhizobial NodB chitooligosaccharide N-deacetylase (EC 3.5.1.-), encoded by nodB gene from the nodulation (nod) gene cluster that is responsible for the biosynthesis of bacterial nodulation signals, termed Nod factors. NodB is involved in de-N-acetylating the nonreducing N-acetylglucosamine residue of chitooligosaccharides to allow for the attachment of the fatty acyl group by the acyltransferase NodA. The monosaccharide N-acetylglucosamine cannot be deacetylated by NodB. NodB is composed of a 6-stranded barrel catalytic domain with detectable sequence similarity to the 7-stranded barrel homology domain of polysaccharide deacetylase (DCA)-like proteins in the larger carbohydrate esterase 4 (CE4) superfamily."
definition: >-
