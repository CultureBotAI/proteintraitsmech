identifier: CDD:cd18079
label: "S-adenosylmethionine synthetase. S-adenosylmethionine synthetase (EC 2.5.1.6), also known as methionine adenosyltransferase, catalyzes the formation of S-adenosylmethionine (AdoMet) from methionine and ATP in two steps, the formation of AdoMet and hydrolysis of the tripolyphosphate, which occurs prior to release of the product from the enzyme, which consists of three structural domains that have a similar alpha+beta fold."
definition: >-
  S-adenosylmethionine synthetase. S-adenosylmethionine synthetase (EC 2.5.1.6), also known as methionine adenosyltransferase, catalyzes the formation of S-adenosylmethionine (AdoMet) from methionine and ATP in two steps, the formation of AdoMet and hydrolysis of the tripolyphosphate, which occurs prior to release of the product from the enzyme, which consists of three structural domains that have a similar alpha+beta fold. — an NCBI CDD conserved domain (cd18079); members share this curated model.
