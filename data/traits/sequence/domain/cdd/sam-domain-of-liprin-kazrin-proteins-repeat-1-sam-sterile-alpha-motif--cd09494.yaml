identifier: CDD:cd09494
label: "SAM domain of liprin/kazrin proteins repeat 1. SAM (sterile alpha motif) domain repeat 1 of liprin/kazrin proteins is a protein-protein interaction domain. The long form of liprin/kazrin proteins contains three copies (repeats) of the SAM domain. Liprin-alpha may form heterodimers with liprin-beta through their SAM domains. Liprins were originally identified as LAR (leukocyte common antigen-related) transmembrane protein-tyrosine phosphatase-interacting proteins. They participate in mammary gland development and in axon guidance. In particular, liprin-alpha is involved in formation of the presynaptic active zone; liprin-beta is involved in the maintenance of lymphatic vessel integrity. Kazrins are involved in interplay between desmosomes and adherens junctions; additionally they play a role in regulation of intercellular differentiation, junction assembly, and cytoskeletal organization."
definition: >-
