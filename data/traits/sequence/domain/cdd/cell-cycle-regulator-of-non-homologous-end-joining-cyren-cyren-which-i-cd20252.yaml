identifier: CDD:cd20252
label: CYREN
definition: >-
  Cell cYcle REgulator of Non-homologous end joining (CYREN). CYREN which is also called modulator of retrovirus infection (MRI) belongs to a short open reading frames encoded polypeptides with biological function. CYREN has a conserved N-terminal Ku-binding motif (KBM) and a C-terminal XLF-like motif (XLM). CYREN interacts with many DNA damage response (DDR) proteins such as Ku70/80 heterodimer and forms large multimeric complexes and localizes to DNA double-strand breaks and retains DDR factors
