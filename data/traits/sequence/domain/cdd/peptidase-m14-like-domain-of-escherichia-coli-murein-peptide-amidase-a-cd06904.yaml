identifier: CDD:cd06904
label: "Peptidase M14-like domain of Escherichia coli Murein Peptide Amidase A and related proteins. Peptidase M14-like domain of Escherichia coli Murein Peptide Amidase A (MpaA) and related proteins. MpaA is a member of the M14 family of metallocarboxypeptidases (MCPs), however it has an exceptional type of activity, it hydrolyzes the gamma-D-glutamyl-meso-diaminopimelic acid (gamma-D-Glu-Dap) bond in murein peptides. MpaA is specific for cleavage of the gamma-D-Glu-Dap bond of free murein tripeptide; it may also cleave murein tetrapeptide. MpaA has a different substrate specificity and cellular role than endopeptidase I, ENP1 (ENP1 does not belong to this group). MpaA works on free murein peptide in the recycling pathway."
definition: >-
  Peptidase M14-like domain of Escherichia coli Murein Peptide Amidase A and related proteins. Peptidase M14-like domain of Escherichia coli Murein Peptide Amidase A (MpaA) and related proteins. MpaA is a member of the M14 family of metallocarboxypeptidases (MCPs), however it has an exceptional type of activity, it hydrolyzes the gamma-D-glutamyl-meso-diaminopimelic acid (gamma-D-Glu-Dap) bond in murein peptides. MpaA is specific for cleavage of the gamma-D-Glu-Dap bond of free murein tripeptide; it may also cleave murein tetrapeptide. MpaA has a different substrate specificity and cellular role than endopeptidase I, ENP1 (ENP1 does not belong to this group). MpaA works on free murein peptide in the recycling pathway. — an NCBI CDD conserved domain (cd06904); members share this curated model.
