identifier: CDD:cd11251
label: "The Sema domain, a protein interacting module, of semaphorin 3C (Sema3C). Sema3C is a secreted semaphorin expressed in and adjacent to cardiac neural crest cells, and causes impaired migration of neural crest cells to the developing cardiac outflow tract, resulting in the interruption of the aortic arch and persistent truncus arteriosus. It has been proposed that Sema3C acts as a guidance molecule, regulating migration of neural crest cells that express semaphorin receptors such as plexin A2. Sema3C may also participate in tumor progression. The cleavage of Sema3C induced by ADAMTS1 promotes the migration of breast cancer cells. Sema3C is a member of the class 3 semaphorin family of secreted proteins. Semaphorins are regulatory molecules in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of semaphorin 3C (Sema3C). Sema3C is a secreted semaphorin expressed in and adjacent to cardiac neural crest cells, and causes impaired migration of neural crest cells to the developing cardiac outflow tract, resulting in the interruption of the aortic arch and persistent truncus arteriosus. It has been proposed that Sema3C acts as a guidance molecule, regulating migration of neural crest cells that express semaphorin receptors such as plexin A2. Sema3C may also participate in tumor progression. The cleavage of Sema3C induced by ADAMTS1 promotes the migration of breast cancer cells. Sema3C is a member of the class 3 semaphorin family of secreted proteins. Semaphorins are regulatory molecules in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module. — an NCBI CDD conserved domain (cd11251); members share this curated model.
