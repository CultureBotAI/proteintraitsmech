identifier: CDD:cd15981
label: "neuropeptide FF receptor 1, member of the class A family of seven-transmembrane G protein-coupled receptors. Neuropeptide FF (NPFF) is a mammalian octapeptide that belongs to a family of neuropeptides containing an RF-amide motif at their C-terminus that have been implicated in a wide range of physiological functions in the brain including pain sensitivity, insulin release, food intake, memory, blood pressure, and opioid-induced tolerance and hyperalgesia. The effects of these peptides are mediated through neuropeptide FF1 and FF2 receptors (NPFF1-R and NPFF2-R) which are predominantly expressed in the brain. NPFF induces pro-nociceptive effects, mainly through the NPFF1-R, and anti-nociceptive effects, mainly through the NPFF2-R. NPFF has been shown to inhibit adenylate cyclase via the Gi protein coupled to NPFF1-R."
