label: "LamB/YcsF family of  lactam utilization protein. The LamB/YbgL family includes the Aspergillus nidulans protein LamB, and its homologs from all three kingdoms of life. The lamb gene locates at the lam locus of Aspergillus nidulans, consisting of two divergently transcribed genes, lamA and lamB, needed for the utilization of lactams such as 2-pyrrolidinone. Both genes are under the control of the positive regulatory gene amdR and are subject to carbon and nitrogen metabolite repression. Although the exact molecular function of LamB is unknown, it might be required for conversion of exogenous 2-pyrrolidinone to endogenous GABA"
definition: >-
  LamB/YcsF family of lactam utilization protein. The LamB/YbgL family includes the Aspergillus nidulans protein LamB, and its homologs from all three kingdoms of life. The lamb gene locates at the lam locus of Aspergillus nidulans, consisting of two divergently transcribed genes, lamA and lamB, needed for the utilization of lactams such as 2-pyrrolidinone. Both genes are under the control of the positive regulatory gene amdR and are subject to carbon and nitrogen metabolite repression. Although the exact molecular function of LamB is unknown, it might be required for conversion of exogenous 2-pyrrolidinone to endogenous GABA — an NCBI CDD conserved domain (cd10787); members share this curated model.
