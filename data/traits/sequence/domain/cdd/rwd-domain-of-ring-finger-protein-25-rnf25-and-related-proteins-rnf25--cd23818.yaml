identifier: CDD:cd23818
label: "RWD domain of RING finger protein 25 (RNF25) and related proteins. RNF25 (EC 2.3.2.27), also known as AO7, is a putative E3 ubiquitin-protein ligase that was initially identified as an interacting protein of the E2 ubiquitin-conjugating enzyme, Ubc5B. It is ubiquitously expressed in various tissues and is predominantly localized in the nucleus. RNF25 activates nuclear factor (NF)-kappaB-dependent gene expression upon stimulation with interleukin-1 beta (IL-1beta), or tumor necrosis factor (TNF), or overexpression of NF-kappaB-inducing kinase. It interacts with the p65 transactivation domain (TAD) and modulates its transcriptional activity."
definition: >-
