identifier: CDD:cd20259
label: pgc
definition: >-
  polar granule component. Polar granule component (pgc) is implicated in primordial germ cell specification in Drosophila, which require transcriptional quiescence and three genes: pgc, nano (nos) and germ cell less (gcl), that act to down-regulate Pol II transcription. The microprotein pgc inhibits transcription elongation factor b (P-TEFb), which phosphorylates the C-terminal domain of the largest Pol II subunit
