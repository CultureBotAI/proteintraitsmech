identifier: CDD:cd19544
label: "Dual Epimerization/Condensation (E/C) domains of nonribosomal peptide synthetases (NRPSs). Dual function Epimerization/Condensation (E/C) domains have both an epimerization and a DCL condensation activity. Dual E/C domains first epimerize the substrate amino acid to produce a D-configuration, then catalyze the condensation between the D-aminoacyl/peptidyl-PCP donor and a L-aminoacyl-PCP acceptor. They are D-specific for the peptidyl donor and L-specific for the aminoacyl acceptor ((D)C(L)); this is in contrast with the standard LCL domains which catalyze peptide bond formation between two L-amino acids, and the restriction of ribosomes to use only L-amino acids. These Dual E/C domains contain an extended His-motif (HHx(N)GD) near the N-terminus of the domain in addition to the standard Condensation (C) domain active site motif (HHxxxD). C domains of nonribosomal peptide synthetases (NRPSs) catalyze peptide bond formation within (usually) large multi-modular enzymatic complexes. NRPS can use a large variety of acyl monomers (approximately 500 different possible monomer substrates as opposed to the 20 standard amino acids in ribosomal protein synthesis) to construct bioactive secondary metabolites of 2 to 18 units long (with various activities such as antibiotic, antifungal, antitumor and immunosuppression). There are various subtypes of C-domains, these include the DCL-type, LCL-type, starter C-domains which acylate the first amino acid with a beta-hydroxy carboxylic acid, and heterocyclization (Cyc) domains which catalyze both peptide bond formation and cyclization of Cys, Ser, or Thr residues. Typically, an NRPS module consists of an adenylation domain, a peptidyl carrier protein (PCP) domain (also known as thiolation (T) domain) and a C-domain. NRPS modules may also include specialized domains such as the terminal-module thioesterase (Te) domain that releases the product via hydrolysis or macrocyclization and any of various C-domain family members such as the epimerization (E) domain, the ester-bond forming C-domain, dual E/C domains, and the X-domain."
definition: >-
  Dual Epimerization/Condensation (E/C) domains of nonribosomal peptide synthetases (NRPSs). Dual function Epimerization/Condensation (E/C) domains have both an epimerization and a DCL condensation activity. Dual E/C domains first epimerize the substrate amino acid to produce a D-configuration, then catalyze the condensation between the D-aminoacyl/peptidyl-PCP donor and a L-aminoacyl-PCP acceptor. They are D-specific for the peptidyl donor and L-specific for the aminoacyl acceptor ((D)C(L)); this is in contrast with the standard LCL domains which catalyze peptide bond formation between two L-amino acids, and the restriction of ribosomes to use only L-amino acids. These Dual E/C domains contain an extended His-motif (HHx(N)GD) near the N-terminus of the domain in addition to the standard Condensation (C) domain active site motif (HHxxxD). C domains of nonribosomal peptide synthetases (NRPSs) catalyze peptide bond formation within (usually) large multi-modular enzymatic complexes. NRPS can use a large variety of acyl monomers (approximately 500 different possible monomer substrates as opposed to the 20 standard amino acids in ribosomal protein synthesis) to construct bioactive secondary metabolites of 2 to 18 units long (with various activities such as antibiotic, antifungal, antitumor and immunosuppression). There are various subtypes of C-domains, these include the DCL-type, LCL-type, starter C-domains which acylate the first amino acid with a beta-hydroxy carboxylic acid, and heterocyclization (Cyc) domains which catalyze both peptide bond formation and cyclization of Cys, Ser, or Thr residues. Typically, an NRPS module consists of an adenylation domain, a peptidyl carrier protein (PCP) domain (also known as thiolation (T) domain) and a C-domain. NRPS modules may also include specialized domains such as the terminal-module thioesterase (Te) domain that releases the product via hydrolysis or macrocyclization and any of various C-domain family members such as the epimerization (E) domain, the ester-bond forming C-domain, dual E/C domains, and the X-domain. — an NCBI CDD conserved domain (cd19544); members share this curated model.
