label: CMAS
definition: >-
  Cyclopropane-fatty-acyl-phospholipid synthase. Cyclopropane-fatty-acyl-phospholipid synthase (CMAS). This family consist of Cyclopropane-fatty-acyl-phospholipid synthase or CFA synthase EC:2.1.1.79 this enzyme catalyse the reaction: S-adenosyl-L-methionine + phospholipid olefinic fatty acid <=> S-adenosyl-L-homocysteine + phospholipid cyclopropane fatty acid
