  Peptidase M14-like domain of human Nna1/AGTPBP-1, AGBL2 -5, and related proteins. Subgroup of the Peptidase M14-like domain of Nna-1 (Nervous system Nuclear protein induced by Axotomy), also known as ATP/GTP binding protein (AGTPBP-1) and cytosolic carboxypeptidase (CCP), and related proteins. The Peptidase M14 family of metallocarboxypeptidases are zinc-binding carboxypeptidases (CPs) which hydrolyze single, C-terminal amino acids from polypeptide chains, and have a recognition site for the free C-terminal carboxyl group, which is a key determinant of specificity. This eukaryotic subgroup includes the human Nna1/AGTPBP-1 and AGBL -2, -3, -4, and -5, and the mouse Nna1/CCP-1 and CCP -2 through -6. Nna1-like proteins are active metallopeptidases that are thought to act on cytosolic proteins such as alpha-tubulin, to remove a C-terminal tyrosine. Nna1 is widely expressed in the developing and adult nervous systems, including cerebellar Purkinje and granule neurons, miral cells of the olfactory bulb and retinal photoreceptors. Nna1 is also induced in axotomized motor neurons. Mutations in Nna1 cause Purkinje cell degeneration (pcd). The Nna1 CP domain is required to prevent the retinal photoreceptor loss and cerebellar ataxia phenotypes of pcd mice, and a functional zinc-binding domain is needed for Nna-1 to support neuron survival in these mice. Nna1-like proteins from the different phyla are highly diverse, but they all contain a unique N-terminal conserved domain right before the CP domain. It has been suggested that this N-terminal domain might act as a folding domain. — an NCBI CDD conserved domain (cd06235); members share this curated model.
