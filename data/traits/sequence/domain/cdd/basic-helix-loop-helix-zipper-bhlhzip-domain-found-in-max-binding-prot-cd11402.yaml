identifier: CDD:cd11402
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in Max-binding protein Mnt and similar proteins. Mnt, also termed Class D basic helix-loop-helix protein 3 (bHLHd3), or Myc antagonist MNT, or protein ROX, is a bHLHZip transcriptional repressor that binds DNA as a heterodimer with MAX. It binds to the canonical E box sequence 5'-CACGTG-3' and, with higher affinity, to 5'-CACGCG-3'. Mnt has an important role as an antagonist and regulator of Myc activities and it is a potential tumor suppressor. Mnt is ubiquitously expressed. Mnt-deficient mice shown to exhibit early postnatal lethality."
definition: >-
  basic Helix-Loop-Helix-zipper (bHLHzip) domain found in Max-binding protein Mnt and similar proteins. Mnt, also termed Class D basic helix-loop-helix protein 3 (bHLHd3), or Myc antagonist MNT, or protein ROX, is a bHLHZip transcriptional repressor that binds DNA as a heterodimer with MAX. It binds to the canonical E box sequence 5'-CACGTG-3' and, with higher affinity, to 5'-CACGCG-3'. Mnt has an important role as an antagonist and regulator of Myc activities and it is a potential tumor suppressor. Mnt is ubiquitously expressed. Mnt-deficient mice shown to exhibit early postnatal lethality. — an NCBI CDD conserved domain (cd11402); members share this curated model.
