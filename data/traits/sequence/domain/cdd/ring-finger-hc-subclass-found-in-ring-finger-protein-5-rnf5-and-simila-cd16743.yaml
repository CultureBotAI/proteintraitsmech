identifier: CDD:cd16743
label: "RING finger, HC subclass, found in RING finger protein 5 (RNF5) and similar proteins. RNF5, also known as protein G16 or Ram1, is an E3 ubiquitin-protein ligase anchored to the outer membrane of the endoplasmic reticulum (ER). It acts at early stages of cystic fibrosis (CF) transmembrane conductance regulator (CFTR) biosynthesis and functions as a target for therapeutic modalities to antagonize mutant CFTR proteins in CF patients carrying the F508del allele. It also regulates the turnover of specific G protein-coupled receptors by ubiquitinating JNK-associated membrane protein (JAMP) and preventing proteasome recruitment. RNF5 limits basal levels of autophagy and influences susceptibility to bacterial infection through the regulation of ATG4B stability. It is also involved in the degradation of Pendrin, a transmembrane chloride/anion exchanger highly expressed in thyroid, kidney, and inner ear. RNF5 plays an important role in cell adhesion and migration. It can modulate cell migration by ubiquitinating paxillin. Furthermore, RNF5 interacts with virus-induced signaling adaptor (VISA) at mitochondria in a viral infection-dependent manner, and further targets VISA at K362 and K461 for K48-linked ubiquitination and degradation after viral infection. It also negatively regulates virus-triggered signaling by targeting MITA, also known as STING, for ubiquitination and degradation at the mitochondria. In addition, RNF5 determines breast cancer response to ER stress-inducing chemotherapies through the regulation of the L-glutamine carrier proteins SLC1A5 and SLC38A2 (SLC1A5/38A2). It also has been implicated in muscle organization and in recognition and processing of misfolded proteins. RNF5 contains a C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in RING finger protein 5 (RNF5) and similar proteins. RNF5, also known as protein G16 or Ram1, is an E3 ubiquitin-protein ligase anchored to the outer membrane of the endoplasmic reticulum (ER). It acts at early stages of cystic fibrosis (CF) transmembrane conductance regulator (CFTR) biosynthesis and functions as a target for therapeutic modalities to antagonize mutant CFTR proteins in CF patients carrying the F508del allele. It also regulates the turnover of specific G protein-coupled receptors by ubiquitinating JNK-associated membrane protein (JAMP) and preventing proteasome recruitment. RNF5 limits basal levels of autophagy and influences susceptibility to bacterial infection through the regulation of ATG4B stability. It is also involved in the degradation of Pendrin, a transmembrane chloride/anion exchanger highly expressed in thyroid, kidney, and inner ear. RNF5 plays an important role in cell adhesion and migration. It can modulate cell migration by ubiquitinating paxillin. Furthermore, RNF5 interacts with virus-induced signaling adaptor (VISA) at mitochondria in a viral infection-dependent manner, and further targets VISA at K362 and K461 for K48-linked ubiquitination and degradation after viral infection. It also negatively regulates virus-triggered signaling by targeting MITA, also known as STING, for ubiquitination and degradation at the mitochondria. In addition, RNF5 determines breast cancer response to ER stress-inducing chemotherapies through the regulation of the L-glutamine carrier proteins SLC1A5 and SLC38A2 (SLC1A5/38A2). It also has been implicated in muscle organization and in recognition and processing of misfolded proteins. RNF5 contains a C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd16743); members share this curated model.
