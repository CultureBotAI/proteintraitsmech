identifier: CDD:cd14607
label: "catalytic domain of tyrosine-protein phosphatase non-receptor type 2. Tyrosine-protein phosphatase non-receptor type 2 (PTPN2), also called T-cell protein-tyrosine phosphatase (TCPTP), belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPN2, a tumor suppressor, dephosphorylates and inactivates EGFRs, Src family kinases, Janus-activated kinases (JAKs)-1 and -3, and signal transducer and activators of transcription (STATs)-1, -3 and -5, in a cell type and context-dependent manner. It is deleted in 6% of all T-cell acute lymphoblastic leukemias and is associated with constitutive JAK1/STAT5 signaling and tumorigenesis."
