identifier: CDD:cd10439
label: "GIY-YIG domain of uncharacterized bacterial protein structurally related to COG3410. This family contains a group of uncharacterized bacterial proteins. Although their function roles have not been recognized, these proteins contain a putative GIY-YIG domain in their N-terminus. Moreover, a  conserved domain COG3410 with unknown function has been found in the C-terminus of most family members."
definition: >-
  GIY-YIG domain of uncharacterized bacterial protein structurally related to COG3410. This family contains a group of uncharacterized bacterial proteins. Although their function roles have not been recognized, these proteins contain a putative GIY-YIG domain in their N-terminus. Moreover, a conserved domain COG3410 with unknown function has been found in the C-terminus of most family members. — an NCBI CDD conserved domain (cd10439); members share this curated model.
