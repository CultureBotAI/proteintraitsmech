identifier: CDD:cd10033
label: "uncharacterized family of the uracil-DNA glycosylase superfamily. Uracil-DNA glycosylases (UDGs) initiate repair of uracils in DNA. Uracil may arise from mis-incorporation of dUMP residues by DNA polymerase or via deamination of cytosine. Uracil in DNA mispaired with guanine is one of the major pro-mutagenic events, causing G:C->A:T mutations; thus, UDG is an essential enzyme for maintaining the integrity of genetic information. UDGs have been classified into various families on the basis of their substrate specificity, conserved motifs, and structural similarities. Although these families demonstrate different substrate specificities, often the function of one enzyme can be complemented by the other. UDG family 1 is the most efficient uracil-DNA glycosylase (UDG, also known as UNG) and shows a specificity for uracil in DNA. UDG family 2 includes thymine DNA glycosylase which removes uracil and thymine from G:U and G:T mismatches, and mismatch-specific uracil DNA glycosylase (MUG) which in Escherichia coli is highly specific to G:U mismatches but also repairs G:T mismatches at high enzyme concentration. UDG family 3 includes Human SMUG1 which can remove uracil and its oxidized pyrimidine derivatives from, single-stranded DNA and double-stranded DNA with a preference for single-stranded DNA. Pedobacter heparinus SMUG2, which is UDG family 3 SMUG1-like, displays catalytic activities towards DNA containing uracil or hypoxanthine/xanthine. UDG family 4 includes Thermotoga maritima TTUDGA, a robust UDG which like family 1, acts on double-stranded and single-stranded uracil-containing DNA. UDG family 5 (UDGb) includes Thermus thermophilus HB8 TTUDGB which acts on double-stranded uracil-containing DNA; it is a hypoxanthine DNA glycosylase acting on double-stranded hypoxanthine-containing DNA except for the C/I base pair, as well as a xanthine DNA glycosylase which acts on both double-stranded and single-stranded xanthine-containing DNA. UDG family 6 hypoxanthine-DNA glycosylase lacks any detectable UDG activity; it excises hypoxanthine. Other UDG families include one represented by Bradyrhizobium diazoefficiens Blr0248 which prefers single-stranded DNA and removes uracil, 5-hydroxymethyl-uracil or xanthine from it."
definition: >-
  uncharacterized family of the uracil-DNA glycosylase superfamily. Uracil-DNA glycosylases (UDGs) initiate repair of uracils in DNA. Uracil may arise from mis-incorporation of dUMP residues by DNA polymerase or via deamination of cytosine. Uracil in DNA mispaired with guanine is one of the major pro-mutagenic events, causing G:C->A:T mutations; thus, UDG is an essential enzyme for maintaining the integrity of genetic information. UDGs have been classified into various families on the basis of their substrate specificity, conserved motifs, and structural similarities. Although these families demonstrate different substrate specificities, often the function of one enzyme can be complemented by the other. UDG family 1 is the most efficient uracil-DNA glycosylase (UDG, also known as UNG) and shows a specificity for uracil in DNA. UDG family 2 includes thymine DNA glycosylase which removes uracil and thymine from G:U and G:T mismatches, and mismatch-specific uracil DNA glycosylase (MUG) which in Escherichia coli is highly specific to G:U mismatches but also repairs G:T mismatches at high enzyme concentration. UDG family 3 includes Human SMUG1 which can remove uracil and its oxidized pyrimidine derivatives from, single-stranded DNA and double-stranded DNA with a preference for single-stranded DNA. Pedobacter heparinus SMUG2, which is UDG family 3 SMUG1-like, displays catalytic activities towards DNA containing uracil or hypoxanthine/xanthine. UDG family 4 includes Thermotoga maritima TTUDGA, a robust UDG which like family 1, acts on double-stranded and single-stranded uracil-containing DNA. UDG family 5 (UDGb) includes Thermus thermophilus HB8 TTUDGB which acts on double-stranded uracil-containing DNA; it is a hypoxanthine DNA glycosylase acting on double-stranded hypoxanthine-containing DNA except for the C/I base pair, as well as a xanthine DNA glycosylase which acts on both double-stranded and single-stranded xanthine-containing DNA. UDG family 6 hypoxanthine-DNA glycosylase lacks any detectable UDG activity; it excises hypoxanthine. Other UDG families include one represented by Bradyrhizobium diazoefficiens Blr0248 which prefers single-stranded DNA and removes uracil, 5-hydroxymethyl-uracil or xanthine from it. — an NCBI CDD conserved domain (cd10033); members share this curated model.
