identifier: CDD:cd13606
label: "Bacterial substrate-binding protein ProX of ABC-type osmoregulated transporter and its related proteins; the type 2 periplasmic-binding protein fold. This group includes periplasmic substrate-binding component of ABC transport systems from gram-negative and -positive bacteria that are involved in uptake of osmoprotectants (also termed compatible solutes) such as betaine, choline, proline betaine, carnitine, and L-proline. To counteract the efflux of water, many microorganisms accumulate the compatible solutes for a sustained adjustment to high osmolarity surroundings. This substrate-binding domain belongs to the type 2 periplasmic binding fold protein superfamily (PBP2). The PBP2 proteins are typically comprised of two globular subdomains connected by a flexible hinge and bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap."
definition: >-
  Bacterial substrate-binding protein ProX of ABC-type osmoregulated transporter and its related proteins; the type 2 periplasmic-binding protein fold. This group includes periplasmic substrate-binding component of ABC transport systems from gram-negative and -positive bacteria that are involved in uptake of osmoprotectants (also termed compatible solutes) such as betaine, choline, proline betaine, carnitine, and L-proline. To counteract the efflux of water, many microorganisms accumulate the compatible solutes for a sustained adjustment to high osmolarity surroundings. This substrate-binding domain belongs to the type 2 periplasmic binding fold protein superfamily (PBP2). The PBP2 proteins are typically comprised of two globular subdomains connected by a flexible hinge and bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. — an NCBI CDD conserved domain (cd13606); members share this curated model.
