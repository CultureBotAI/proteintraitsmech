identifier: CDD:cd09433
label: "The fourth LIM domain of Four and a half LIM domains protein 2 (FHL2). The fourth LIM domain of Four and a half LIM domains protein 2 (FHL2):  FHL2 is one of the best studied FHL proteins. FHL2 expression is most abundant in the heart, and in brain, liver and lung to a lesser extent. FHL2 participates in a wide range of cellular processes, such as transcriptional regulation, signal transduction, and cell survival by binding to various protein partners. FHL2 has shown to interact with more than 50 different proteins, including receptors, structural proteins, transcription factors and cofactors, signal transducers, splicing factors, DNA replication and repair enzymes, and metabolic enzymes. Although FHL2 is abundantly expressed in heart, the fhl2 null mice are viable and had no detectable abnormal cardiac phenotype. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to s upport the assembly of multimeric protein complexes."
definition: >-
  The fourth LIM domain of Four and a half LIM domains protein 2 (FHL2). The fourth LIM domain of Four and a half LIM domains protein 2 (FHL2): FHL2 is one of the best studied FHL proteins. FHL2 expression is most abundant in the heart, and in brain, liver and lung to a lesser extent. FHL2 participates in a wide range of cellular processes, such as transcriptional regulation, signal transduction, and cell survival by binding to various protein partners. FHL2 has shown to interact with more than 50 different proteins, including receptors, structural proteins, transcription factors and cofactors, signal transducers, splicing factors, DNA replication and repair enzymes, and metabolic enzymes. Although FHL2 is abundantly expressed in heart, the fhl2 null mice are viable and had no detectable abnormal cardiac phenotype. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to s upport the assembly of multimeric protein complexes. — an NCBI CDD conserved domain (cd09433); members share this curated model.
