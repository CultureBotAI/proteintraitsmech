identifier: CDD:cd02201
label: "Filamenting temperature sensitive mutant Z, type 1. FtsZ is a GTPase that is similar to the eukaryotic tubulins and is essential for cell division in prokaryotes.  FtsZ is capable of polymerizing in a GTP-driven process into structures similar to those formed by tubulin. FtsZ forms a ring-shaped septum at the site of bacterial cell division, which is required for constriction of cell membrane and cell envelope to yield two daughter cells."
definition: >-
  Filamenting temperature sensitive mutant Z, type 1. FtsZ is a GTPase that is similar to the eukaryotic tubulins and is essential for cell division in prokaryotes. FtsZ is capable of polymerizing in a GTP-driven process into structures similar to those formed by tubulin. FtsZ forms a ring-shaped septum at the site of bacterial cell division, which is required for constriction of cell membrane and cell envelope to yield two daughter cells. — an NCBI CDD conserved domain (cd02201); members share this curated model.
