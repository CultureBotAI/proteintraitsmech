identifier: CDD:cd13168
label: "uncharacterized protein LOC417372 Phosphotyrosine-binding (PTB) PH-like fold. The function of LOC417372 and its related proteins are unknown to date. Members here contain a N-terminal RUN domain, followed by a PDZ domain, and a C-terminal PTB domain. The RUN domain is involved in Ras-like GTPase signaling. The PDZ domain (also called DHR/Dlg homologous region or GLGF after its conserved sequence motif) binds C-terminal polypeptides, internal (non-C-terminal) polypeptides, and lipids. PTB domains have a common PH-like fold and are found in various eukaryotic signaling molecules. This domain was initially shown to binds peptides with a NPXY motif with differing requirements for phosphorylation of the tyrosine, although more recent studies have found that some types of PTB domains can bind to peptides lack tyrosine residues altogether. In contrast to SH2 domains, which recognize phosphotyrosine and adjacent carboxy-terminal residues, PTB-domain binding specificity is conferred by residues amino-terminal to the phosphotyrosine. PTB domains are classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains. This cd is part of the Dab-like subgroup."
definition: >-
  uncharacterized protein LOC417372 Phosphotyrosine-binding (PTB) PH-like fold. The function of LOC417372 and its related proteins are unknown to date. Members here contain a N-terminal RUN domain, followed by a PDZ domain, and a C-terminal PTB domain. The RUN domain is involved in Ras-like GTPase signaling. The PDZ domain (also called DHR/Dlg homologous region or GLGF after its conserved sequence motif) binds C-terminal polypeptides, internal (non-C-terminal) polypeptides, and lipids. PTB domains have a common PH-like fold and are found in various eukaryotic signaling molecules. This domain was initially shown to binds peptides with a NPXY motif with differing requirements for phosphorylation of the tyrosine, although more recent studies have found that some types of PTB domains can bind to peptides lack tyrosine residues altogether. In contrast to SH2 domains, which recognize phosphotyrosine and adjacent carboxy-terminal residues, PTB-domain binding specificity is conferred by residues amino-terminal to the phosphotyrosine. PTB domains are classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains. This cd is part of the Dab-like subgroup. — an NCBI CDD conserved domain (cd13168); members share this curated model.
