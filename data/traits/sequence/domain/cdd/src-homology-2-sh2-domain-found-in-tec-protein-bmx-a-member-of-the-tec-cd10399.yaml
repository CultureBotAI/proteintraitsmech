identifier: CDD:cd10399
label: "Src homology 2 (SH2) domain found  in Tec protein, Bmx. A member of the Tec protein tyrosine kinase Bmx is expressed in the endothelium of large arteries, fetal endocardium, adult endocardium of the left ventricle, bone marrow, lung, testis, granulocytes, myeloid cell lines, and prostate cell lines. Bmx is involved in the regulation of Rho and serum response factor (SRF). Bmx has been shown to interact with PAK1, PTK2, PTPN21, and RUFY1. Most of the Tec family members have a PH domain (Txk and the short (type 1) splice variant of Drosophila Btk29A are exceptions), a Tec homology (TH) domain, a SH3 domain, a SH2 domain, and a protein kinase catalytic domain.  The TH domain consists of a Zn2+-binding Btk motif and a proline-rich region. The Btk motif is found in Tec kinases, Ras GAP, and IGBP.  It is crucial for the function of Tec PH domains. It is not present in Txk and the type 1 splice form of the Drosophila homolog.  The proline-rich regions are highly conserved for the most part with the exception of Bmx whose residues surrounding the PXXP motif are not conserved (TH-like) and Btk29A  which is entirely unique with large numbers of glycine residues (TH-extended). Tec family members all lack a C-terminal tyrosine having an autoinhibitory function in its phosphorylated state. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in Tec protein, Bmx. A member of the Tec protein tyrosine kinase Bmx is expressed in the endothelium of large arteries, fetal endocardium, adult endocardium of the left ventricle, bone marrow, lung, testis, granulocytes, myeloid cell lines, and prostate cell lines. Bmx is involved in the regulation of Rho and serum response factor (SRF). Bmx has been shown to interact with PAK1, PTK2, PTPN21, and RUFY1. Most of the Tec family members have a PH domain (Txk and the short (type 1) splice variant of Drosophila Btk29A are exceptions), a Tec homology (TH) domain, a SH3 domain, a SH2 domain, and a protein kinase catalytic domain. The TH domain consists of a Zn2+-binding Btk motif and a proline-rich region. The Btk motif is found in Tec kinases, Ras GAP, and IGBP. It is crucial for the function of Tec PH domains. It is not present in Txk and the type 1 splice form of the Drosophila homolog. The proline-rich regions are highly conserved for the most part with the exception of Bmx whose residues surrounding the PXXP motif are not conserved (TH-like) and Btk29A which is entirely unique with large numbers of glycine residues (TH-extended). Tec family members all lack a C-terminal tyrosine having an autoinhibitory function in its phosphorylated state. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10399); members share this curated model.
