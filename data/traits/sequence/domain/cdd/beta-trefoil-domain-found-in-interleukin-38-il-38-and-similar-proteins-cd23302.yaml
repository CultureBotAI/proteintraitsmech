identifier: CDD:cd23302
label: "beta-trefoil domain found in interleukin-38 (IL-38) and similar proteins. IL-38, also called interleukin-1 family member 10, or IL-1F10, or family of interleukin 1-theta, or FIL1 theta, or interleukin-1 HY2, or IL-1HY2, or interleukin-1 theta, or IL-1 theta, acts as cytokine with immunomodulatory activity. Alone, it does not induce cytokine production, but reduces IL22 and IL17A production by T-cells in response to heat-killed Candida albicans. It also reduces IL36G-induced production of IL8 by peripheral blood mononuclear cells. It increases IL6 production by dendritic cells stimulated by bacterial lipopolysaccharides (LPS). IL-38 contains a beta-trefoil domain, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  beta-trefoil domain found in interleukin-38 (IL-38) and similar proteins. IL-38, also called interleukin-1 family member 10, or IL-1F10, or family of interleukin 1-theta, or FIL1 theta, or interleukin-1 HY2, or IL-1HY2, or interleukin-1 theta, or IL-1 theta, acts as cytokine with immunomodulatory activity. Alone, it does not induce cytokine production, but reduces IL22 and IL17A production by T-cells in response to heat-killed Candida albicans. It also reduces IL36G-induced production of IL8 by peripheral blood mononuclear cells. It increases IL6 production by dendritic cells stimulated by bacterial lipopolysaccharides (LPS). IL-38 contains a beta-trefoil domain, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23302); members share this curated model.
