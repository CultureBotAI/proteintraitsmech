identifier: CDD:cd13160
label: "Low Density Lipoprotein Receptor Adaptor Protein 1 (LDLRAP1) in insects and similar proteins Phosphotyrosine-binding (PTB) PH-like fold. The null mutations in the LDL receptor adaptor protein 1 (LDLRAP1) gene, which serves as an adaptor for LDLR endocytosis in the liver, causes autosomal recessive hypercholesterolemia (ARH). LDLRAP1 contains a single PTB domain. PTB domains have a common PH-like fold and are found in various eukaryotic signaling molecules. This domain was initially shown to binds peptides with a NPXY motif with differing requirements for phosphorylation of the tyrosine, although more recent studies have found that some types of PTB domains can bind to peptides lack tyrosine residues altogether. In contrast to SH2 domains, which recognize phosphotyrosine and adjacent carboxy-terminal residues, PTB-domain binding specificity is conferred by residues amino-terminal to the phosphotyrosine. PTB domains are classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains. This cd contains insects, ticks, sea urchins, and nematodes."
definition: >-
  Low Density Lipoprotein Receptor Adaptor Protein 1 (LDLRAP1) in insects and similar proteins Phosphotyrosine-binding (PTB) PH-like fold. The null mutations in the LDL receptor adaptor protein 1 (LDLRAP1) gene, which serves as an adaptor for LDLR endocytosis in the liver, causes autosomal recessive hypercholesterolemia (ARH). LDLRAP1 contains a single PTB domain. PTB domains have a common PH-like fold and are found in various eukaryotic signaling molecules. This domain was initially shown to binds peptides with a NPXY motif with differing requirements for phosphorylation of the tyrosine, although more recent studies have found that some types of PTB domains can bind to peptides lack tyrosine residues altogether. In contrast to SH2 domains, which recognize phosphotyrosine and adjacent carboxy-terminal residues, PTB-domain binding specificity is conferred by residues amino-terminal to the phosphotyrosine. PTB domains are classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains. This cd contains insects, ticks, sea urchins, and nematodes. — an NCBI CDD conserved domain (cd13160); members share this curated model.
