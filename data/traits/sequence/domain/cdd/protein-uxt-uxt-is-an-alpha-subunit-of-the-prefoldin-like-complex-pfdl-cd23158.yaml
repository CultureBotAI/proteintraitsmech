identifier: CDD:cd23158
label: "protein UXT. UXT is an alpha subunit of the prefoldin-like complex (PFDL). PFDL is involved in the cytoplasmic assembly of RNA polymerase I and can interact with other chaperone complexes, like R2TP, to form the PAQosome. UXT has an important role in the activation of the NF-kappaB pathway. UXT is also a component of the centrosome and is associated with gamma-tubulin. Prefoldin is a hexameric molecular chaperone complex, found in both eukaryotes and archaea, that binds and stabilizes newly synthesized polypeptides allowing them to fold correctly. The complex contains two alpha and four beta subunits, the two subunits being evolutionarily related."
definition: >-
  protein UXT. UXT is an alpha subunit of the prefoldin-like complex (PFDL). PFDL is involved in the cytoplasmic assembly of RNA polymerase I and can interact with other chaperone complexes, like R2TP, to form the PAQosome. UXT has an important role in the activation of the NF-kappaB pathway. UXT is also a component of the centrosome and is associated with gamma-tubulin. Prefoldin is a hexameric molecular chaperone complex, found in both eukaryotes and archaea, that binds and stabilizes newly synthesized polypeptides allowing them to fold correctly. The complex contains two alpha and four beta subunits, the two subunits being evolutionarily related. — an NCBI CDD conserved domain (cd23158); members share this curated model.
