identifier: CDD:cd01777
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in sorting nexin protein 27 (SNX27). SNX27 is a member of the family of cytoplasmic sorting nexin adaptor proteins that regulate endosomal trafficking of cell surface proteins. In addition to a PX (Phox homology) domain that regulates its endosomal localization, SNX27 has a unique PDZ (Psd-95/Dlg/ZO1) domain and an atypical FERM (4.1, ezrin, radixin, moesin) domain that both function to bind short peptide sequence motifs in the cytoplasmic domains of the cargo receptors. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in sorting nexin protein 27 (SNX27). SNX27 is a member of the family of cytoplasmic sorting nexin adaptor proteins that regulate endosomal trafficking of cell surface proteins. In addition to a PX (Phox homology) domain that regulates its endosomal localization, SNX27 has a unique PDZ (Psd-95/Dlg/ZO1) domain and an atypical FERM (4.1, ezrin, radixin, moesin) domain that both function to bind short peptide sequence motifs in the cytoplasmic domains of the cargo receptors. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd01777); members share this curated model.
