identifier: CDD:cd09235
label: "Middle V-domain of mammalian Alix and related domains are dimerization and protein interaction modules. This family contains the middle V-shaped (V) domain of mammalian Alix (apoptosis-linked gene-2 interacting protein X) and related domains. It belongs to the V_Alix_like superfamily which includes the V-domains of Bro1 and Rim20 (also known as PalA) from Saccharomyces cerevisiae, mammalian His-Domain type N23 protein tyrosine phosphatase (HD-PTP, also known as PTPN23), and related domains. Alix, also known as apoptosis-linked gene-2 interacting protein 1 (AIP1), is part of the ESCRT (Endosomal Sorting Complexes Required for Transport) system, and participates in membrane remodeling processes, including the budding of enveloped viruses, vesicle budding inside late endosomal multivesicular bodies (MVBs), the abscission reactions of mammalian cell division, and in apoptosis. The Alix V-domain is a dimerization domain, and contains a binding site, partially conserved in the V_Alix_like superfamily, for the retroviral late assembly (L) domain YPXnL motif. In addition to the V-domain, Alix also has an N-terminal Bro1-like domain, which binds components of the ESCRT-III complex, in particular CHMP4. The Bro1-like domain of Alix can also bind to human immunodeficiency virus type 1 (HIV-1) nucleocapsid. Alix also has a C-terminal proline-rich region (PRR) that binds multiple partners including Tsg101 (tumor susceptibility gene 101, a component of ESCRT-1), and the apoptotic protein ALG-2."
definition: >-
  Middle V-domain of mammalian Alix and related domains are dimerization and protein interaction modules. This family contains the middle V-shaped (V) domain of mammalian Alix (apoptosis-linked gene-2 interacting protein X) and related domains. It belongs to the V_Alix_like superfamily which includes the V-domains of Bro1 and Rim20 (also known as PalA) from Saccharomyces cerevisiae, mammalian His-Domain type N23 protein tyrosine phosphatase (HD-PTP, also known as PTPN23), and related domains. Alix, also known as apoptosis-linked gene-2 interacting protein 1 (AIP1), is part of the ESCRT (Endosomal Sorting Complexes Required for Transport) system, and participates in membrane remodeling processes, including the budding of enveloped viruses, vesicle budding inside late endosomal multivesicular bodies (MVBs), the abscission reactions of mammalian cell division, and in apoptosis. The Alix V-domain is a dimerization domain, and contains a binding site, partially conserved in the V_Alix_like superfamily, for the retroviral late assembly (L) domain YPXnL motif. In addition to the V-domain, Alix also has an N-terminal Bro1-like domain, which binds components of the ESCRT-III complex, in particular CHMP4. The Bro1-like domain of Alix can also bind to human immunodeficiency virus type 1 (HIV-1) nucleocapsid. Alix also has a C-terminal proline-rich region (PRR) that binds multiple partners including Tsg101 (tumor susceptibility gene 101, a component of ESCRT-1), and the apoptotic protein ALG-2. — an NCBI CDD conserved domain (cd09235); members share this curated model.
