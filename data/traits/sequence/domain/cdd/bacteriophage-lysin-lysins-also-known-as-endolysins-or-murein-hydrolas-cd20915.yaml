identifier: CDD:cd20915
label: "bacteriophage lysin. Lysins, also known as endolysins or murein hydrolases, are hydrolytic enzymes produced by bacteriophages in order to cleave the host's cell wall during the final stage of the lytic cycle. They are able to target one of the five bonds in peptidoglycan (murein), the main component of bacterial cell walls, which allows the release of progeny virions from the lysed cell. Not all bacteriophages synthesize lysins: some small single-stranded DNA and RNA phages produce membrane proteins that activate the host's autolytic mechanisms such as autolysins. Lysins are being used as antibacterial agents due to their high effectiveness and specificity in comparison with antibiotics, which are susceptible to bacterial resistance"
definition: >-
  bacteriophage lysin. Lysins, also known as endolysins or murein hydrolases, are hydrolytic enzymes produced by bacteriophages in order to cleave the host's cell wall during the final stage of the lytic cycle. They are able to target one of the five bonds in peptidoglycan (murein), the main component of bacterial cell walls, which allows the release of progeny virions from the lysed cell. Not all bacteriophages synthesize lysins: some small single-stranded DNA and RNA phages produce membrane proteins that activate the host's autolytic mechanisms such as autolysins. Lysins are being used as antibacterial agents due to their high effectiveness and specificity in comparison with antibiotics, which are susceptible to bacterial resistance — an NCBI CDD conserved domain (cd20915); members share this curated model.
