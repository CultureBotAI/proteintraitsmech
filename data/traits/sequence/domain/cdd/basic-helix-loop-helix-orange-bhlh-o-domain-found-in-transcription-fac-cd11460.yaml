identifier: CDD:cd11460
label: "basic helix-loop-helix-orange (bHLH-O) domain found in transcription factor HES-6 and similar proteins. HES-6, also termed Class B basic helix-loop-helix protein 41 (bHLHb41), or hairy and enhancer of split 6, or C-HAIRY1, is a bHLH-O transcription factor that is expressed in developing muscle and involved in angiogenesis, myogenesis, neural differentiation and neurogenesis. HES-6 antagonizes Notch signaling but is not regulated by Notch signaling. It is a transcription co-factor associated with stem cell characteristics in neural tissue. It may act as an inhibitor of Hes-1 during neuronal development and forms a heterodimer with HES-1 to prevent its association with transcriptional co-repressors. The overexpression of HES-6 has been reported in metastatic cancers of different origins. HES-6 is one mammalian counterpart of the Hairy and Enhancer of split proteins that play a critical role in many physiological processes including cellular differentiation, cell cycle arrest, apoptosis and self-renewal ability."
definition: >-
  basic helix-loop-helix-orange (bHLH-O) domain found in transcription factor HES-6 and similar proteins. HES-6, also termed Class B basic helix-loop-helix protein 41 (bHLHb41), or hairy and enhancer of split 6, or C-HAIRY1, is a bHLH-O transcription factor that is expressed in developing muscle and involved in angiogenesis, myogenesis, neural differentiation and neurogenesis. HES-6 antagonizes Notch signaling but is not regulated by Notch signaling. It is a transcription co-factor associated with stem cell characteristics in neural tissue. It may act as an inhibitor of Hes-1 during neuronal development and forms a heterodimer with HES-1 to prevent its association with transcriptional co-repressors. The overexpression of HES-6 has been reported in metastatic cancers of different origins. HES-6 is one mammalian counterpart of the Hairy and Enhancer of split proteins that play a critical role in many physiological processes including cellular differentiation, cell cycle arrest, apoptosis and self-renewal ability. — an NCBI CDD conserved domain (cd11460); members share this curated model.
