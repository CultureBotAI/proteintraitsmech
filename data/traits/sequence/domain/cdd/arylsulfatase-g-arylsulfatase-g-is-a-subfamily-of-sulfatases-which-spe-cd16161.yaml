identifier: CDD:cd16161
label: "arylsulfatase G. Arylsulfatase G is a subfamily of sulfatases which specifically hydrolyze sulfate esters in a wide variety of substrates such as glycosaminoglycans, steroid sulfates, or sulfolipids. ARSG has arylsulfatase activity toward different pseudosubstrates like p-nitrocatechol sulfate and 4-methylumbelliferyl sulfate. An active site Cys is post-translationally converted to the critical active site C(alpha)-formylglycine. ARSG mRNA expression was found to be tissue-specific with highest expression in liver, kidney, and pancreas, suggesting a metabolic role of ARSG that might be associated with a non-classified lysosomal storage disorder."
definition: >-
