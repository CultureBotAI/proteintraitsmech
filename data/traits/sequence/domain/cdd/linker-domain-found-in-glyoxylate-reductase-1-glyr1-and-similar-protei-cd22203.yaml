identifier: CDD:cd22203
label: "linker domain found in glyoxylate reductase 1 (GLYR1) and similar proteins. GLYR1, also called 3-hydroxyisobutyrate dehydrogenase-like protein, or cytokine-like nuclear factor N-PAC, or nuclear protein NP60, or nuclear protein of 60 kDa, or nucleosome-destabilizing factor (NDF), is a nucleosome-destabilizing factor that is recruited to genes during transcriptional activation. It acts as a histone-lysine-specific demethylase LSD2/KDM1b-specific cofactor that positively regulates H3K4me2- and H3K4me1-specific histone demethylase activity of LSD2. The model corresponds to the linker domain of GLYR1, which contains an AT-hook motif and is responsible for the binding of LSD2."
definition: >-
  linker domain found in glyoxylate reductase 1 (GLYR1) and similar proteins. GLYR1, also called 3-hydroxyisobutyrate dehydrogenase-like protein, or cytokine-like nuclear factor N-PAC, or nuclear protein NP60, or nuclear protein of 60 kDa, or nucleosome-destabilizing factor (NDF), is a nucleosome-destabilizing factor that is recruited to genes during transcriptional activation. It acts as a histone-lysine-specific demethylase LSD2/KDM1b-specific cofactor that positively regulates H3K4me2- and H3K4me1-specific histone demethylase activity of LSD2. The model corresponds to the linker domain of GLYR1, which contains an AT-hook motif and is responsible for the binding of LSD2. — an NCBI CDD conserved domain (cd22203); members share this curated model.
