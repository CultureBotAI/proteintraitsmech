identifier: CDD:cd23650
label: "Calmodulin binding site 1 (CBS1) found in Drosophila melanogaster transient receptor potential protein (TRP) and similar proteins. TRP is a light-sensitive calcium channel that is required for inositide-mediated Ca(2+) entry in the retina during phospholipase C (PLC)-mediated phototransduction. TRP and another retinal-specific protein, TRPL, act together in the light response, and are activated by fatty acids and metabolic stress. TRP is also required for olfactory adaptation and may be involved in olfactory system development. The TRP tail contains two calmodulin (CaM) binding sites (called CBS1 and CBS2), which binds to the CaM N-lobe and C-lobe, respectively. The model corresponds to CaM binding site 1."
definition: >-
  Calmodulin binding site 1 (CBS1) found in Drosophila melanogaster transient receptor potential protein (TRP) and similar proteins. TRP is a light-sensitive calcium channel that is required for inositide-mediated Ca(2+) entry in the retina during phospholipase C (PLC)-mediated phototransduction. TRP and another retinal-specific protein, TRPL, act together in the light response, and are activated by fatty acids and metabolic stress. TRP is also required for olfactory adaptation and may be involved in olfactory system development. The TRP tail contains two calmodulin (CaM) binding sites (called CBS1 and CBS2), which binds to the CaM N-lobe and C-lobe, respectively. The model corresponds to CaM binding site 1. — an NCBI CDD conserved domain (cd23650); members share this curated model.
