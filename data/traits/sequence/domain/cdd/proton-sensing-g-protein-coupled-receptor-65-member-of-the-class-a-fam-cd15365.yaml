identifier: CDD:cd15365
label: "proton-sensing G protein-coupled receptor 65, member of the class A family of seven-transmembrane G protein-coupled receptors. The T cell death associated gene-8 receptor (TDAG8, also known as GPR65) is a member of the proton-sensing G-protein-coupled receptor (GPCR) family which also includes the G2 accumulation receptor (G2A, also known as GPR132), ovarian cancer G-protein receptor 1 (OGR-1, GPR68), and G-protein-coupled receptor 4 (GPR4). Proton-sensing G-protein coupled receptors sense pH of 7.6 to 6.0 and mediates a variety of biological activities in neutral and mildly acidic pH conditions, whereas the acid-sensing ionotropic ion channels typically sense strong acidic pH. Activation of TDAG8 by extracellular acidosis increases the cAMP production, stimulates Rho, and induces stress fiber formation. TDAG8 has also been shown to regulate the extracellular acidosis-induced inhibition of pro-inflammatory cytokine production in peritoneal macrophages."
definition: >-
  proton-sensing G protein-coupled receptor 65, member of the class A family of seven-transmembrane G protein-coupled receptors. The T cell death associated gene-8 receptor (TDAG8, also known as GPR65) is a member of the proton-sensing G-protein-coupled receptor (GPCR) family which also includes the G2 accumulation receptor (G2A, also known as GPR132), ovarian cancer G-protein receptor 1 (OGR-1, GPR68), and G-protein-coupled receptor 4 (GPR4). Proton-sensing G-protein coupled receptors sense pH of 7.6 to 6.0 and mediates a variety of biological activities in neutral and mildly acidic pH conditions, whereas the acid-sensing ionotropic ion channels typically sense strong acidic pH. Activation of TDAG8 by extracellular acidosis increases the cAMP production, stimulates Rho, and induces stress fiber formation. TDAG8 has also been shown to regulate the extracellular acidosis-induced inhibition of pro-inflammatory cytokine production in peritoneal macrophages. — an NCBI CDD conserved domain (cd15365); members share this curated model.
