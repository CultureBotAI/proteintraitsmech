identifier: CDD:cd11269
label: "The Sema domain, a protein interacting module, of semaphorin 6D (Sema6D). Sema6D is expressed predominantly in the nervous system during embryogenesis and it uses Plexin-A1 as a receptor. It displays repellent activity for dorsal root ganglion axons. Sema6D also acts as a regulator of late phase primary immune responses. In addition, Sema6D is overexpressed in gastric carcinoma, indicating that it may have an important role in the occurrence and development of the cancer. Sema6D is a member of the class 6 semaphorin family of proteins, which are membrane associated semaphorins. Semaphorins are regulatory molecules involved in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of semaphorin 6D (Sema6D). Sema6D is expressed predominantly in the nervous system during embryogenesis and it uses Plexin-A1 as a receptor. It displays repellent activity for dorsal root ganglion axons. Sema6D also acts as a regulator of late phase primary immune responses. In addition, Sema6D is overexpressed in gastric carcinoma, indicating that it may have an important role in the occurrence and development of the cancer. Sema6D is a member of the class 6 semaphorin family of proteins, which are membrane associated semaphorins. Semaphorins are regulatory molecules involved in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module. — an NCBI CDD conserved domain (cd11269); members share this curated model.
