identifier: CDD:cd07980
label: TFIIF_beta
definition: >-
  Transcription initiation factor IIF, beta subunit. The TFIIF-beta subunit, also called RNA Polymerase II-associating Protein 30 (RAP30), forms a heteromeric complex of RAP30/74 (TFIIF, beta/gamma) that is involved in both initiation and elongation of RNA chains by RNA polymerase II. Accurate transcription in vivo requires at least six general transcription initiation factors, in addition to RNA polymerase II. TFIIF-beta binds directly to RNA polymerase II and helps bring polymerase into a pre-initiation complex
