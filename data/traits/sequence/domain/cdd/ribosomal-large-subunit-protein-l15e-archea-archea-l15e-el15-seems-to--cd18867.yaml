identifier: CDD:cd18867
label: "Ribosomal large subunit protein L15e, archea. Archea L15e (eL15) seems to function by stabilizing the fold of the 23S rRNA in the large ribosomal subunit.  Translation of mRNA into proteins by the ribosome is universally conserved in all cellular life. Archaeal ribosomes have an intermediate complexity compared with bacterial and eukaryotic ones, sharing several additional components of the translation machinery with eukaryotes that are absent in bacteria."
definition: >-
  Ribosomal large subunit protein L15e, archea. Archea L15e (eL15) seems to function by stabilizing the fold of the 23S rRNA in the large ribosomal subunit. Translation of mRNA into proteins by the ribosome is universally conserved in all cellular life. Archaeal ribosomes have an intermediate complexity compared with bacterial and eukaryotic ones, sharing several additional components of the translation machinery with eukaryotes that are absent in bacteria. — an NCBI CDD conserved domain (cd18867); members share this curated model.
