identifier: CDD:cd00554
label: MECDP_synthase
definition: >-
  MECDP_synthase (2-C-methyl-D-erythritol-2,4-cyclodiphosphate synthase), encoded by the ispF gene, catalyzes the formation of 2-C-methyl-D-erythritol 2,4-cyclodiphosphate (MEC) in the non-mevalonate deoxyxylulose (DOXP) pathway for isoprenoid biosynthesis. This pathway is present in bacteria, plants and some protozoa but is distinct from that used by mammals and Archaea. MECDP_synthase forms a homotrimer, carrying three active sites, each of which is formed in a cleft between pairs of subunits
