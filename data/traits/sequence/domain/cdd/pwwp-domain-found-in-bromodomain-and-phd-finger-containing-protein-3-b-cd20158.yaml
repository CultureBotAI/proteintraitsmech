identifier: CDD:cd20158
label: "PWWP domain found in bromodomain and PHD finger-containing protein 3 (BRPF3). BRPF3 is a homolog of BRPF1 and BRPF2. It is a scaffold protein that forms a novel monocytic leukemic zinc finger protein (MOZ)/MOZ-related factor (MORF) H3 histone acetyltransferase (HAT) complex with other regulatory subunits. BRPF3 contains a plant homeodomain (PHD) finger followed by a non-canonical extended PHD (ePHD) finger, C2HC5HC2H, a bromodomain, and a proline-tryptophan-tryptophan-proline (PWWP) domain. The PHD finger binds to lysine 4 of histone H3 (K4H3), the bromodomain interacts with acetylated lysines on N-terminal tails of histones and other proteins, and the PWWP domain shows histone-binding and chromatin association properties."
definition: >-
  PWWP domain found in bromodomain and PHD finger-containing protein 3 (BRPF3). BRPF3 is a homolog of BRPF1 and BRPF2. It is a scaffold protein that forms a novel monocytic leukemic zinc finger protein (MOZ)/MOZ-related factor (MORF) H3 histone acetyltransferase (HAT) complex with other regulatory subunits. BRPF3 contains a plant homeodomain (PHD) finger followed by a non-canonical extended PHD (ePHD) finger, C2HC5HC2H, a bromodomain, and a proline-tryptophan-tryptophan-proline (PWWP) domain. The PHD finger binds to lysine 4 of histone H3 (K4H3), the bromodomain interacts with acetylated lysines on N-terminal tails of histones and other proteins, and the PWWP domain shows histone-binding and chromatin association properties. — an NCBI CDD conserved domain (cd20158); members share this curated model.
