identifier: CDD:cd20429
label: "third Tudor domain found in Tudor domain-containing protein 7 (TDRD7) and similar proteins. TDRD7, also called PCTAIRE2-binding protein, or Tudor repeat associator with PCTAIRE-2 (Trap), is a component of specific cytoplasmic RNA granules involved in post-transcriptional regulation of specific genes: probably acts by binding to specific mRNAs and regulating their translation. It is required for lens transparency during lens development, by regulating translation of genes such as CRYBB3 and HSPB1 in the developing lens. It is also essential for dynamic ribonucleoprotein (RNP) remodeling of chromatoid bodies during spermatogenesis. TDRD7 contains three Tudor domains. The model corresponds to the third one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  third Tudor domain found in Tudor domain-containing protein 7 (TDRD7) and similar proteins. TDRD7, also called PCTAIRE2-binding protein, or Tudor repeat associator with PCTAIRE-2 (Trap), is a component of specific cytoplasmic RNA granules involved in post-transcriptional regulation of specific genes: probably acts by binding to specific mRNAs and regulating their translation. It is required for lens transparency during lens development, by regulating translation of genes such as CRYBB3 and HSPB1 in the developing lens. It is also essential for dynamic ribonucleoprotein (RNP) remodeling of chromatoid bodies during spermatogenesis. TDRD7 contains three Tudor domains. The model corresponds to the third one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20429); members share this curated model.
