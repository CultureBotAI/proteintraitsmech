identifier: CDD:cd02495
label: "carboxy-S-adenosyl-L-methionine synthase. Carboxy-S-adenosyl-L-methionine synthase (Cx-SAM synthase) catalyzes the conversion of S-adenosyl-L-methionine (SAM) to carboxy-S-adenosyl-L-methionine (Cx-SAM) and plays a role in the  role in tRNA modification, together with CmoB., S-adenosylmethionine-dependent methyltransferases (SAM or AdoMet-MTase), class I;  AdoMet-MTases are enzymes that use S-adenosyl-L-methionine (SAM or AdoMet) as a substrate for methyltransfer, creating the product S-adenosyl-L-homocysteine (AdoHcy). There are at least five structurally distinct families of AdoMet-MTases, class I being the largest and most diverse. Within this class enzymes can be classified by different substrate specificity (small molecules, lipids, nucleic acids, etc) and different target atoms for methylation (nitrogen, oxygen, carbon, sulfur,etc)."
definition: >-
  carboxy-S-adenosyl-L-methionine synthase. Carboxy-S-adenosyl-L-methionine synthase (Cx-SAM synthase) catalyzes the conversion of S-adenosyl-L-methionine (SAM) to carboxy-S-adenosyl-L-methionine (Cx-SAM) and plays a role in the role in tRNA modification, together with CmoB., S-adenosylmethionine-dependent methyltransferases (SAM or AdoMet-MTase), class I; AdoMet-MTases are enzymes that use S-adenosyl-L-methionine (SAM or AdoMet) as a substrate for methyltransfer, creating the product S-adenosyl-L-homocysteine (AdoHcy). There are at least five structurally distinct families of AdoMet-MTases, class I being the largest and most diverse. Within this class enzymes can be classified by different substrate specificity (small molecules, lipids, nucleic acids, etc) and different target atoms for methylation (nitrogen, oxygen, carbon, sulfur,etc). — an NCBI CDD conserved domain (cd02495); members share this curated model.
