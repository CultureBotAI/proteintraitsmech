label: "akirin. Akirins are small, highly conserved eumetazoan nuclear proteins that play a role in immune response and tumorigenesis. It is believed that they act as a connector between a variety of transcription factors and major chromatin remodeling complexes. In vertebrates, there are two orthologs, Akirin1 and Akirin2."
