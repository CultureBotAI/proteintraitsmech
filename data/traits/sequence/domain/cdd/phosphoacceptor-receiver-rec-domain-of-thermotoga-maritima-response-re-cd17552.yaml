identifier: CDD:cd17552
label: "phosphoacceptor receiver (REC) domain of Thermotoga maritima response regulator RR468 and similar domains. Thermotoga maritima RR468 (encoded by gene TM0468) is the cognate response regulator (RR) of the class I histidine kinase HK853 (product of gene TM0853). HK853/RR468 comprise a two-component system (TCS) that couples environmental stimuli to adaptive responses. This subfamily also includes Fremyella diplosiphon complementary adaptation response regulator homolog RcaF, a small RR that is involved in four-step phosphorelays of the complementary chromatic adaptation (CCA) system that occurs in many cyanobacteria. Both RR468 and RcaF are stand-alone RRs containing only a REC domain with no output/effector domain. The REC domain itself functions as an effector domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of Thermotoga maritima response regulator RR468 and similar domains. Thermotoga maritima RR468 (encoded by gene TM0468) is the cognate response regulator (RR) of the class I histidine kinase HK853 (product of gene TM0853). HK853/RR468 comprise a two-component system (TCS) that couples environmental stimuli to adaptive responses. This subfamily also includes Fremyella diplosiphon complementary adaptation response regulator homolog RcaF, a small RR that is involved in four-step phosphorelays of the complementary chromatic adaptation (CCA) system that occurs in many cyanobacteria. Both RR468 and RcaF are stand-alone RRs containing only a REC domain with no output/effector domain. The REC domain itself functions as an effector domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17552); members share this curated model.
