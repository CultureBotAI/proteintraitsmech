identifier: CDD:cd12258
label: "RNA recognition motif 2 (RRM2) found in vertebrate RNA-binding protein 26 (RBM26) and similar proteins. This subfamily corresponds to the RRM2 of RBM26, also known as cutaneous T-cell lymphoma (CTCL) tumor antigen se70-2, which represents a cutaneous lymphoma (CL)-associated antigen. RBM26 contains two RNA recognition motifs (RRMs), also known as RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). The RRMs may play some functional roles in RNA-binding or protein-protein interactions."
definition: >-
  RNA recognition motif 2 (RRM2) found in vertebrate RNA-binding protein 26 (RBM26) and similar proteins. This subfamily corresponds to the RRM2 of RBM26, also known as cutaneous T-cell lymphoma (CTCL) tumor antigen se70-2, which represents a cutaneous lymphoma (CL)-associated antigen. RBM26 contains two RNA recognition motifs (RRMs), also known as RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). The RRMs may play some functional roles in RNA-binding or protein-protein interactions. — an NCBI CDD conserved domain (cd12258); members share this curated model.
