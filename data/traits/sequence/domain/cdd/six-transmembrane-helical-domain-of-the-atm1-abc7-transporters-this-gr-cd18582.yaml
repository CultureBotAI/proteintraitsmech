identifier: CDD:cd18582
label: "Six-transmembrane helical domain of the Atm1/ABC7 transporters. This group represents the Atm1/ABCB7 subfamily of ATP Binding Cassette (ABC) transporters that are involved in transition metal homeostasis and detoxification processes. Yeast ATM1 and human ABCB7 (ABC transporter subfamily B, member 7), which are involved in the assembly of cytosolic iron-sulfur (Fe/S) cluster-containing proteins by mediating export of Fe/S cluster precursors from mitochondria. In eukaryotes, the Atm1/ABCB7 is present in the inner membrane of mitochondria and is required for the formation of cytosolic iron sulfur cluster containing proteins; mutations of ABCB7 gene result in mitochondrial iron accumulation and are responsible for X-linked sideroblastic anemia."
definition: >-
