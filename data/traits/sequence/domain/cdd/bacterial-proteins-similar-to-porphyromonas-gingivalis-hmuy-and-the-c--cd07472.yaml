identifier: CDD:cd07472
label: "Bacterial proteins similar to Porphyromonas gingivalis HmuY and the C-terminal domain of PARMER_03218. HmuY is a hemophore that scavenges heme from infected hosts and delivers it to the outer membrane receptor HmuR. Related but uncharacterized proteins do not appear to share the specific heme-binding site. The C-terminal domain of PARMER_03128, an uncharacterized protein from Parabacteroides merdae, plus related proteins from Bacteroidetes, appear to be a distantly related family and have been included in this model."
definition: >-
  Bacterial proteins similar to Porphyromonas gingivalis HmuY and the C-terminal domain of PARMER_03218. HmuY is a hemophore that scavenges heme from infected hosts and delivers it to the outer membrane receptor HmuR. Related but uncharacterized proteins do not appear to share the specific heme-binding site. The C-terminal domain of PARMER_03128, an uncharacterized protein from Parabacteroides merdae, plus related proteins from Bacteroidetes, appear to be a distantly related family and have been included in this model. — an NCBI CDD conserved domain (cd07472); members share this curated model.
