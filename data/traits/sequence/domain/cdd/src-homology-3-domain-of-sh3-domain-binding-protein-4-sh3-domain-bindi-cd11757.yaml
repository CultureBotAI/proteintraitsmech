identifier: CDD:cd11757
label: "Src Homology 3 domain of SH3 domain-binding protein 4. SH3 domain-binding protein 4 (SH3BP4) is also called transferrin receptor trafficking protein (TTP). SH3BP4 is an endocytic accessory protein that interacts with endocytic proteins including clathrin and dynamin, and regulates the internalization of the transferrin receptor (TfR). SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of SH3 domain-binding protein 4. SH3 domain-binding protein 4 (SH3BP4) is also called transferrin receptor trafficking protein (TTP). SH3BP4 is an endocytic accessory protein that interacts with endocytic proteins including clathrin and dynamin, and regulates the internalization of the transferrin receptor (TfR). SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11757); members share this curated model.
