identifier: CDD:cd09006
label: "purine nucleoside phosphorylases similar to Escherichia coli PNP-I (DeoD) and Trichomonas vaginalis PNP. Escherichia coli purine nucleoside phosphorylase (PNP)-I (or DeoD) accepts both 6-oxo and 6-amino purine nucleosides as substrates. Trichomonas vaginalis PNP has broad substrate specificity, having phosphorolytic catalytic activity with adenosine, inosine, and guanosine (with adenosine as the preferred substrate). This subfamily belongs to the nucleoside phosphorylase-I (NP-I) family, whose members accept a range of purine nucleosides as well as the pyrimidine nucleoside uridine. The NP-1 family  includes phosphorolytic nucleosidases, such as purine nucleoside phosphorylase (PNPs, EC. 2.4.2.1), uridine phosphorylase (UP, EC 2.4.2.3), and 5'-deoxy-5'-methylthioadenosine phosphorylase (MTAP, EC 2.4.2.28), and hydrolytic nucleosidases, such as AMP nucleosidase (AMN, EC 3.2.2.4), and 5'-methylthioadenosine/S-adenosylhomocysteine (MTA/SAH) nucleosidase (MTAN, EC 3.2.2.16). The NP-I family is distinct from nucleoside phosphorylase-II, which belongs to a different structural family."
definition: >-
  purine nucleoside phosphorylases similar to Escherichia coli PNP-I (DeoD) and Trichomonas vaginalis PNP. Escherichia coli purine nucleoside phosphorylase (PNP)-I (or DeoD) accepts both 6-oxo and 6-amino purine nucleosides as substrates. Trichomonas vaginalis PNP has broad substrate specificity, having phosphorolytic catalytic activity with adenosine, inosine, and guanosine (with adenosine as the preferred substrate). This subfamily belongs to the nucleoside phosphorylase-I (NP-I) family, whose members accept a range of purine nucleosides as well as the pyrimidine nucleoside uridine. The NP-1 family includes phosphorolytic nucleosidases, such as purine nucleoside phosphorylase (PNPs, EC. 2.4.2.1), uridine phosphorylase (UP, EC 2.4.2.3), and 5'-deoxy-5'-methylthioadenosine phosphorylase (MTAP, EC 2.4.2.28), and hydrolytic nucleosidases, such as AMP nucleosidase (AMN, EC 3.2.2.4), and 5'-methylthioadenosine/S-adenosylhomocysteine (MTA/SAH) nucleosidase (MTAN, EC 3.2.2.16). The NP-I family is distinct from nucleoside phosphorylase-II, which belongs to a different structural family. — an NCBI CDD conserved domain (cd09006); members share this curated model.
