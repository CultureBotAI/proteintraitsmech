identifier: CDD:cd23970
label: "alpha-N-acetylneuraminide alpha-2,8-sialyltransferase 3. Alpha-N-acetylneuraminide alpha-2,8-sialyltransferase 3 synthesizes polysialic acid and has been shown to autopolysialylate. ST8Sia3 utilizes the Siaalpha2,3Galbeta1,4GlcNAc structure on N-glycans of glycoproteins and glycolipids as acceptor substrates. ST8Sia family members are alpha-N-acetylneuraminidealpha-2,8-sialyltransferases that catalyze an alpha-2,8-linkage between sialic acidand the terminal sialic acid residues of glycochains, by transfering sialic acidfrom CMP-Sia and they belong to glycosyltransferase family 29 (GT29)."
definition: >-
  alpha-N-acetylneuraminide alpha-2,8-sialyltransferase 3. Alpha-N-acetylneuraminide alpha-2,8-sialyltransferase 3 synthesizes polysialic acid and has been shown to autopolysialylate. ST8Sia3 utilizes the Siaalpha2,3Galbeta1,4GlcNAc structure on N-glycans of glycoproteins and glycolipids as acceptor substrates. ST8Sia family members are alpha-N-acetylneuraminidealpha-2,8-sialyltransferases that catalyze an alpha-2,8-linkage between sialic acidand the terminal sialic acid residues of glycochains, by transfering sialic acidfrom CMP-Sia and they belong to glycosyltransferase family 29 (GT29). — an NCBI CDD conserved domain (cd23970); members share this curated model.
