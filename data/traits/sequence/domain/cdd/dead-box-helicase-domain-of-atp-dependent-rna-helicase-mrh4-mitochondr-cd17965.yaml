identifier: CDD:cd17965
label: "DEAD-box helicase domain of ATP-dependent RNA helicase MRH4. Mitochondrial RNA helicase 4 (MRH4) plays an essential role during the late stages of mitochondrial ribosome or mitoribosome assembly by promoting remodeling of the 21S rRNA-protein interactions. MRH4 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of ATP-dependent RNA helicase MRH4. Mitochondrial RNA helicase 4 (MRH4) plays an essential role during the late stages of mitochondrial ribosome or mitoribosome assembly by promoting remodeling of the 21S rRNA-protein interactions. MRH4 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17965); members share this curated model.
