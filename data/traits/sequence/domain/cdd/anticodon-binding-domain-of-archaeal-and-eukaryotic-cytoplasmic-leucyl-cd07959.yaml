identifier: CDD:cd07959
label: "Anticodon-binding domain of archaeal and eukaryotic cytoplasmic leucyl tRNA synthetases. This domain is found in leucyl tRNA synthetases (LeuRS), which belong to the class Ia aminoacyl tRNA synthetases. It lies C-terminal to the catalytic core domain. In contrast to other class Ia enzymes, the anticodon is not used as an identity element in LeuRS (with exceptions such as Saccharomyces cerevisiae and some other eukaryotes). No anticodon-binding site can be defined for this family, which includes archaeal and eukaryotic cytoplasmic members. LeuRS catalyzes the transfer of leucine to the 3'-end of its tRNA."
definition: >-
  Anticodon-binding domain of archaeal and eukaryotic cytoplasmic leucyl tRNA synthetases. This domain is found in leucyl tRNA synthetases (LeuRS), which belong to the class Ia aminoacyl tRNA synthetases. It lies C-terminal to the catalytic core domain. In contrast to other class Ia enzymes, the anticodon is not used as an identity element in LeuRS (with exceptions such as Saccharomyces cerevisiae and some other eukaryotes). No anticodon-binding site can be defined for this family, which includes archaeal and eukaryotic cytoplasmic members. LeuRS catalyzes the transfer of leucine to the 3'-end of its tRNA. — an NCBI CDD conserved domain (cd07959); members share this curated model.
