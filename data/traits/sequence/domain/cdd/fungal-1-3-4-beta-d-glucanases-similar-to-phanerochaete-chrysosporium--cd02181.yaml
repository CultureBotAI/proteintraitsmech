identifier: CDD:cd02181
label: "fungal 1,3(4)-beta-D-glucanases, similar to Phanerochaete chrysosporium laminarinase 16A. Group of fungal 1,3(4)-beta-D-glucanases, similar to Phanerochaete chrysosporium laminarinase 16A. Lam16A belongs to the 'nonspecific' 1,3(4)-beta-glucanase subfamily, although beta-1,6 branching and beta-1,4 bonds specifically define where Lam16A hydrolyzes its substrates, like curdlan (beta-1,3-glucan), lichenin (beta-1,3-1,4-mixed linkage glucan), and laminarin (beta-1,6-branched-1,3-glucan)."
definition: >-
