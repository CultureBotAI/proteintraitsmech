identifier: CDD:cd22680
label: "forkhead associated (FHA) domain found in Sulfolobus Acidocaldarius FHA domain-containing protein ArnA and similar proteins. ArnA is an FHA domain-containing protein from Sulfolobus acidocaldarius that was shown to strongly interact with ArnB, a von Willebrand domain-containing protein. They act synergistically and negatively to modulate motility. ArnA is involved in regulating archaella expression in S. acidocaldarius. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in Sulfolobus Acidocaldarius FHA domain-containing protein ArnA and similar proteins. ArnA is an FHA domain-containing protein from Sulfolobus acidocaldarius that was shown to strongly interact with ArnB, a von Willebrand domain-containing protein. They act synergistically and negatively to modulate motility. ArnA is involved in regulating archaella expression in S. acidocaldarius. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22680); members share this curated model.
