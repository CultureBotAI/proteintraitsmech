label: "Pseudomonas putida vanillin dehydrogenase-like. Vanillin dehydrogenase (Vdh, VaniDH) involved in the metabolism of ferulic acid and other related  sequences are included in this CD.  The E. coli vanillin dehydrogenase (LigV) preferred NAD+ to NADP+  and exhibited a broad substrate preference, including vanillin,  benzaldehyde, protocatechualdehyde, m-anisaldehyde, and p-hydroxybenzaldehyde."
definition: >-
  Pseudomonas putida vanillin dehydrogenase-like. Vanillin dehydrogenase (Vdh, VaniDH) involved in the metabolism of ferulic acid and other related sequences are included in this CD. The E. coli vanillin dehydrogenase (LigV) preferred NAD+ to NADP+ and exhibited a broad substrate preference, including vanillin, benzaldehyde, protocatechualdehyde, m-anisaldehyde, and p-hydroxybenzaldehyde. — an NCBI CDD conserved domain (cd07150); members share this curated model.
