identifier: CDD:cd22313
label: "endonuclease BsaWI and similar endonucleases. The type II restriction endonuclease BsaWI recognizes a degenerated sequence 5'-W|CCGGW-3', where W stands for A or T and  '|' denotes the cleavage site. It belongs to a family of restriction endonucleases that recognize a conserved CCGG tetranucleotide in their target and form homodimers or homotetramers, requiring binding of one, two or three DNA targets for optimal catalytic activity. They are part of a yet larger superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many other restriction endonucleases, such as EcoRI, BamHI, and FokI."
