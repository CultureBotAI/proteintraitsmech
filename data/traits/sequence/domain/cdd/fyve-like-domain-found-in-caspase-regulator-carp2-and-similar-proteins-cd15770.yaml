identifier: CDD:cd15770
label: "FYVE-like domain found in caspase regulator CARP2 and similar proteins. CARP2, also termed E3 ubiquitin-protein ligase rififylin, or caspases-8 and -10-associated RING finger protein 2, or FYVE-RING finger protein Sakura (Fring), or RING finger and FYVE-like domain-containing protein 1, or RING finger protein 189, or RING finger protein 34-like, is a novel caspase regulator containing a FYVE-type zinc finger domain. It regulates the p53 signaling pathway through degrading 14-3-3 sigma and stabilizing MDM2. CARP2 does not localize to membranes in the cell and is involved in the negative regulation of apoptosis, specifically targeting two initiator caspases, caspase 8 and caspase 10, which are distinguished from other FYVE-type proteins. Moreover, CARP2 has an altered sequence in the basic ligand binding patch and lack the WxxD (x for any residue) motif that is conserved only in phosphoinositide binding FYVE domains. Thus it belongs to a family of unique FYVE-type domains called FYVE-like domains. In addition to the N-terminal FYVE-like domain, CARP2 harbors a C-terminal RING domain."
definition: >-
  FYVE-like domain found in caspase regulator CARP2 and similar proteins. CARP2, also termed E3 ubiquitin-protein ligase rififylin, or caspases-8 and -10-associated RING finger protein 2, or FYVE-RING finger protein Sakura (Fring), or RING finger and FYVE-like domain-containing protein 1, or RING finger protein 189, or RING finger protein 34-like, is a novel caspase regulator containing a FYVE-type zinc finger domain. It regulates the p53 signaling pathway through degrading 14-3-3 sigma and stabilizing MDM2. CARP2 does not localize to membranes in the cell and is involved in the negative regulation of apoptosis, specifically targeting two initiator caspases, caspase 8 and caspase 10, which are distinguished from other FYVE-type proteins. Moreover, CARP2 has an altered sequence in the basic ligand binding patch and lack the WxxD (x for any residue) motif that is conserved only in phosphoinositide binding FYVE domains. Thus it belongs to a family of unique FYVE-type domains called FYVE-like domains. In addition to the N-terminal FYVE-like domain, CARP2 harbors a C-terminal RING domain. — an NCBI CDD conserved domain (cd15770); members share this curated model.
