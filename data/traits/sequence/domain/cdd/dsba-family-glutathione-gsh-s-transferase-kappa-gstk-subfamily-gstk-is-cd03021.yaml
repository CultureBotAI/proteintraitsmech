identifier: CDD:cd03021
label: "DsbA family, Glutathione (GSH) S-transferase Kappa (GSTK) subfamily; GSTK is a member of the GST family of enzymes which catalyzes the transfer of the thiol of GSH to electrophilic substrates. It is specifically located in the mitochondria and peroxisomes, unlike other members of the canonical GST family, which are mainly cytosolic. The biological substrates of GSTK are not yet known. It is presumed to have a protective role during respiration when large amounts of reactive oxygen species are generated. GSTK has the same general fold as DsbA, consisting of a thioredoxin domain interrupted by an alpha-helical domain and its biological unit is a homodimer. GSTK is closely related to the bacterial enzyme, 2-hydroxychromene-2-carboxylate (HCCA) isomerase. It shows little sequence similarity to the other members of the GST family."
definition: >-
