identifier: CDD:cd17565
label: "phosphoacceptor receiver (REC) domain of transcriptional regulatory protein GlnL and similar proteins. Bacillus subtilis GlnL is part of the GlnK-GlnL (formerly YcbA-YcbB) two-component system that positively regulates the expression of the glsA-glnT (formerly ybgJ-ybgH) operon in response to glutamine. It contains a REC domain and a DNA-binding output domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of transcriptional regulatory protein GlnL and similar proteins. Bacillus subtilis GlnL is part of the GlnK-GlnL (formerly YcbA-YcbB) two-component system that positively regulates the expression of the glsA-glnT (formerly ybgJ-ybgH) operon in response to glutamine. It contains a REC domain and a DNA-binding output domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17565); members share this curated model.
