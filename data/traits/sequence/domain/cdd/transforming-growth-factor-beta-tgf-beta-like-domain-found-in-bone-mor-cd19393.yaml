identifier: CDD:cd19393
label: TGF_beta_BMP3
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in bone morphogenetic protein 3 (BMP-3) and similar proteins. BMP-3, also termed BMP-3A, or osteogenin, negatively regulates bone density. It antagonizes the ability of certain osteogenic BMPs to induce osteoprogenitor differentitation and ossification
