identifier: CDD:cd08824
label: "LOTUS is an uncharacterized small globular domain found in Limkain b1, Oskar and Tudor-containing proteins 5 and 7. LOTUS is an uncharacterized small globular domain found in Limkain b1, Oskar and Tudor-containing proteins 5 and 7. The LOTUS containing proteins are germline-specific and are found in the nuage/polar granules of germ cells. Tudor-containing protein 5 and 7 belong to the evolutionary conserved Tudor domain-containing protein (TDRD) family involved in germ cell development. In mice, TDRD5 and TDRD7 are components of the intermitochondrial cements (IMCs) and the chromatoid bodies (CBs), which are cytoplasmic ribonucleoprotein granules involved in RNA processing for spermatogenesis. Oskar protein is a critical component of the pole plasm in the Drosophila oocyte, which is required for germ cell formation. Limkain b1 is a novel human autoantigen, localized to a subset of ABCD3 and PXF marked peroxisomes. Limkain b1 may be a relatively common target of human autoantibodies reactive to cytoplasmic vesicle-like structures. Limkain b1 contains multiple copies of LOTUS domains and a conserved RNA recognition motif. The exact molecular function of LOTUS domain remains to be characterized. Its occurrence in proteins associated with RNA metabolism suggests that it might be involved in RNA binding function. The presence of several basic residues and RNA fold recognition motifs support this hypothesis. The RNA binding function might be the first step of regulating mRNA translation or localization."
