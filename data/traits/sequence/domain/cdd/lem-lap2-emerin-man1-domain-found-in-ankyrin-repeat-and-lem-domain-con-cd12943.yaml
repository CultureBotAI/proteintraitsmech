identifier: CDD:cd12943
label: "LEM (Lap2/Emerin/Man1) domain found in ankyrin repeat and LEM domain-containing protein 1 (ANKL1). The family includes ANKL1, also termed ankyrin repeat domain-containing protein 41 (ANKRD41), or LEM-domain containing protein 3 (LEM3), and similar proteins. Although their biological roles remain unclear, the family members contain an N-terminal ankyrin repeat region, LEM domain and C-terminal GIY-YIG nuclease domain. The ankyrin repeats are unique motifs mediating protein-protein interactions. The LEM domain, mainly found in inner nuclear membrane proteins, may be involved in protein- or DNA-binding."
definition: >-
  LEM (Lap2/Emerin/Man1) domain found in ankyrin repeat and LEM domain-containing protein 1 (ANKL1). The family includes ANKL1, also termed ankyrin repeat domain-containing protein 41 (ANKRD41), or LEM-domain containing protein 3 (LEM3), and similar proteins. Although their biological roles remain unclear, the family members contain an N-terminal ankyrin repeat region, LEM domain and C-terminal GIY-YIG nuclease domain. The ankyrin repeats are unique motifs mediating protein-protein interactions. The LEM domain, mainly found in inner nuclear membrane proteins, may be involved in protein- or DNA-binding. — an NCBI CDD conserved domain (cd12943); members share this curated model.
