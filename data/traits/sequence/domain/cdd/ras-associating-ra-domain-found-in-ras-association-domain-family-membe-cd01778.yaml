identifier: CDD:cd01778
label: "Ras-associating (RA) domain found in Ras-association domain family members, RASSF1, RASSF3, and RASSF5. The RASSF family of proteins shares a conserved RalGDS/AF6 Ras association (RA) domain which is located either at the C-terminus (RASSF1-6, the classical group) or at the N-terminus (RASSF7-10). RASSF1-6 contains a conserved SARAH (Salvador/RASSF/Hpo) motif adjacent to the RA domain that functions in scaffolding and regulatory interactions. The RA domain of the classical RASSF proteins has a beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. Classical RASSF members interact either directly or indirectly with activated Ras. Ras proteins are small GTPases that are involved in cellular signal transduction. The classical RASSF proteins seem to modulate some of the growth inhibitory responses mediated by Ras and may serve as tumor suppressor genes. This family contains RASSF1, RASSF3, and RASSF5."
definition: >-
  Ras-associating (RA) domain found in Ras-association domain family members, RASSF1, RASSF3, and RASSF5. The RASSF family of proteins shares a conserved RalGDS/AF6 Ras association (RA) domain which is located either at the C-terminus (RASSF1-6, the classical group) or at the N-terminus (RASSF7-10). RASSF1-6 contains a conserved SARAH (Salvador/RASSF/Hpo) motif adjacent to the RA domain that functions in scaffolding and regulatory interactions. The RA domain of the classical RASSF proteins has a beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. Classical RASSF members interact either directly or indirectly with activated Ras. Ras proteins are small GTPases that are involved in cellular signal transduction. The classical RASSF proteins seem to modulate some of the growth inhibitory responses mediated by Ras and may serve as tumor suppressor genes. This family contains RASSF1, RASSF3, and RASSF5. — an NCBI CDD conserved domain (cd01778); members share this curated model.
