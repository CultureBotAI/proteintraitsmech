identifier: CDD:cd16481
label: "RING finger, H2 subclass, found in Tetratricopeptide repeat protein 3 (TTC3) and similar proteins. TTC3, also known as protein DCRR1, TPR repeat protein D, TPR repeat protein 3, or RING finger protein 105 (RNF105), is an E3 ubiquitin-protein ligase encoded by a gene within the Down syndrome (DS) critical region on chromosome 21. It affects differentiation and Golgi compactness in neurons through specific actin-regulating pathways. It inhibits the neuronal-like differentiation of pheocromocytoma cells by activating RhoA and by binding to Citron proteins. TTC3 is an Akt-specific E3 ligase that binds to phosphorylated Akt and facilitates its ubiquitination and degradation within the nucleus. It contains four N-terminal TPR motifs, a potential coiled-coil region and a Citron binding region in the central part, and a C-terminal C3H2C2-type RING-H2 finger."
definition: >-
  RING finger, H2 subclass, found in Tetratricopeptide repeat protein 3 (TTC3) and similar proteins. TTC3, also known as protein DCRR1, TPR repeat protein D, TPR repeat protein 3, or RING finger protein 105 (RNF105), is an E3 ubiquitin-protein ligase encoded by a gene within the Down syndrome (DS) critical region on chromosome 21. It affects differentiation and Golgi compactness in neurons through specific actin-regulating pathways. It inhibits the neuronal-like differentiation of pheocromocytoma cells by activating RhoA and by binding to Citron proteins. TTC3 is an Akt-specific E3 ligase that binds to phosphorylated Akt and facilitates its ubiquitination and degradation within the nucleus. It contains four N-terminal TPR motifs, a potential coiled-coil region and a Citron binding region in the central part, and a C-terminal C3H2C2-type RING-H2 finger. — an NCBI CDD conserved domain (cd16481); members share this curated model.
