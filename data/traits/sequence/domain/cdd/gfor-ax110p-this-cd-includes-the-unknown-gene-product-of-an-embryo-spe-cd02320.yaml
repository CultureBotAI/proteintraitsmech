identifier: CDD:cd02320
label: GFOR-AX110P
definition: >-
  GFOR-AX110P. This CD includes the unknown gene product of an embryo-specific cDNA clone of Daucus carota, AX110P, and other related putative oxidoreductases. These proteins share sequence similarity with a class of oxidoreductases that have been implicated in interconversions between hydroxyl and carbonyl groups, such as glucose-fructose oxidoreductase which oxidizes glucose to gluconolactone and reduces fructose to sorbitol in Zymomonas mobilis. Members of the GFOR_AX110P CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the glucose-fructose oxidoreductase (GFOR) family of proteins
