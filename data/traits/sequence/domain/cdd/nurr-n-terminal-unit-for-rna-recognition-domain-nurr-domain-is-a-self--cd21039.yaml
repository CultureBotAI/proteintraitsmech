identifier: CDD:cd21039
label: "NURR (N-terminal unit for RNA recognition) domain. NURR domain is a self-folding globular RNA-binding domain with an all alpha-helix architecture with a highly conserved negatively charged surface area. It also contains a large hydrophobic cavity and a positively charged surface area as potential epitopes for inter-molecular interactions. NURR domain has been found in Drosophila melanogaster Syncrip and vertebrates heterogeneous nuclear ribonucleoproteins hnRNPR and hnRNPQ."
definition: >-
  NURR (N-terminal unit for RNA recognition) domain. NURR domain is a self-folding globular RNA-binding domain with an all alpha-helix architecture with a highly conserved negatively charged surface area. It also contains a large hydrophobic cavity and a positively charged surface area as potential epitopes for inter-molecular interactions. NURR domain has been found in Drosophila melanogaster Syncrip and vertebrates heterogeneous nuclear ribonucleoproteins hnRNPR and hnRNPQ. — an NCBI CDD conserved domain (cd21039); members share this curated model.
