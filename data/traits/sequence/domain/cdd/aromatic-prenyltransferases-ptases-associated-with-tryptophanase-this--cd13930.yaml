identifier: CDD:cd13930
label: "Aromatic Prenyltransferases (PTases) associated with tryptophanase. This group of bacterial and fungal proteins shows homology to the DMATS/CymD family of ABBA prenyltransferases, which prenylates indole, tyrosine, and xanthone derivatives. Some of the members, mostly fungal proteins, are associated with tryptophanase-like domains (Tnase) which catalyzes the degradation of L-tryptophan to yield indole, pyruvate and ammonia, or the degradation of L-tyrosine to yield phenol, pyruvate and ammonia. This suggest that these otherwise uncharacterized proteins may exhibit multiple functions."
definition: >-
  Aromatic Prenyltransferases (PTases) associated with tryptophanase. This group of bacterial and fungal proteins shows homology to the DMATS/CymD family of ABBA prenyltransferases, which prenylates indole, tyrosine, and xanthone derivatives. Some of the members, mostly fungal proteins, are associated with tryptophanase-like domains (Tnase) which catalyzes the degradation of L-tryptophan to yield indole, pyruvate and ammonia, or the degradation of L-tyrosine to yield phenol, pyruvate and ammonia. This suggest that these otherwise uncharacterized proteins may exhibit multiple functions. — an NCBI CDD conserved domain (cd13930); members share this curated model.
