identifier: CDD:cd20748
label: "N-terminal domain of nigritoxin, a bacterial toxin for crustaceans and insects. This family contains the N-terminal domain of nigritoxin expressed in Vibrio nigripulchritudo, a bacterial pathogen affecting shrimp. Nigritoxin is lethal for organisms within the Tetraconata and non-toxin to other animals. It shows significant sequence identity with antifeeding prophage 18 (Afp18), a partially characterized toxin found in the entomopathogenic bacteria Serratia entomophila and in the fish pathogen Yersinia ruckeri, suggesting that nigritoxin may display toxicity against organisms beyond the known target, Litopenaeus stylirostris shrimp. Structure studies show that nigritoxin represents an entirely unique protein fold, indicating that Afp18 and nigritoxin do not possess the same biological functions. Nigritoxin is comprised of three domains: N-terminal, C-terminal and central domains. This N-terminal domain is essential for cellular translocation and likely encodes specificity for Tetraconata. The N-terminal domain mediates toxin internalization by target cells."
definition: >-
  N-terminal domain of nigritoxin, a bacterial toxin for crustaceans and insects. This family contains the N-terminal domain of nigritoxin expressed in Vibrio nigripulchritudo, a bacterial pathogen affecting shrimp. Nigritoxin is lethal for organisms within the Tetraconata and non-toxin to other animals. It shows significant sequence identity with antifeeding prophage 18 (Afp18), a partially characterized toxin found in the entomopathogenic bacteria Serratia entomophila and in the fish pathogen Yersinia ruckeri, suggesting that nigritoxin may display toxicity against organisms beyond the known target, Litopenaeus stylirostris shrimp. Structure studies show that nigritoxin represents an entirely unique protein fold, indicating that Afp18 and nigritoxin do not possess the same biological functions. Nigritoxin is comprised of three domains: N-terminal, C-terminal and central domains. This N-terminal domain is essential for cellular translocation and likely encodes specificity for Tetraconata. The N-terminal domain mediates toxin internalization by target cells. — an NCBI CDD conserved domain (cd20748); members share this curated model.
