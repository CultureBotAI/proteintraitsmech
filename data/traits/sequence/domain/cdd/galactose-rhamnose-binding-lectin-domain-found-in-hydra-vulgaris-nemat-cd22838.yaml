identifier: CDD:cd22838
label: "galactose/rhamnose binding lectin domain found in Hydra vulgaris nematogalectin and similar proteins. Nematogalectin, also called nemgal, is a nematocyst protein with an N-terminal GlyXY domain and a galactose/rhamnose binding lectin domain. There are two nematogalectins, A and B, in Hydra, and they are the products of alternative splicing. They are major components of the nematocyst tubule. Nematogalectin functions as a trimer that could bind to multiple chondroitin glycosaminoglycan molecules and stabilize the chondroitin proteoglycan layer."
definition: >-
  galactose/rhamnose binding lectin domain found in Hydra vulgaris nematogalectin and similar proteins. Nematogalectin, also called nemgal, is a nematocyst protein with an N-terminal GlyXY domain and a galactose/rhamnose binding lectin domain. There are two nematogalectins, A and B, in Hydra, and they are the products of alternative splicing. They are major components of the nematocyst tubule. Nematogalectin functions as a trimer that could bind to multiple chondroitin glycosaminoglycan molecules and stabilize the chondroitin proteoglycan layer. — an NCBI CDD conserved domain (cd22838); members share this curated model.
