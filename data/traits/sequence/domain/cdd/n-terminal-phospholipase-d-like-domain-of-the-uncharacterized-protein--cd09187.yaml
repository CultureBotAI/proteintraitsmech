identifier: CDD:cd09187
label: "N-terminal phospholipase D-like domain of the uncharacterized protein Family with sequence similarity 83G. N-terminal phospholipase D (PLD)-like domain of the uncharacterized protein, Family with sequence similarity 83G (FAM83G). Since the N-terminal PLD-like domain of FAM83 proteins shows only trace similarity to the PLD catalytic domain and lacks the functionally important histidine residue, FAM83 proteins may share a similar three-dimensional fold with PLD enzymes, but are most unlikely to carry PLD activity. The N-terminus of FAM83G shows high homology to other FAM83 family members, indicating that FAM83G might have arisen early in vertebrate evolution by duplication of a gene in the FAM83 family."
definition: >-
