identifier: CDD:cd15532
label: "PHD finger 2 found in class II Chromodomain-Helicase-DNA binding (CHD) proteins. Class II CHD proteins includes chromodomain-helicase-DNA-binding protein CHD3, CHD4, and CHD5, which are nuclear and ubiquitously expressed chromatin remodelling ATPases generally associated with histone deacetylases (HDACs). They are involved in DNA Double Strand Break (DSB) signaling, DSB repair and/or p53-dependent pathways such as apoptosis and senescence, as well as in the maintenance of genomic stability, and/or cancer prevention. They function as subunits of the Nucleosome Remodelling and Deacetylase (NuRD) complex, which is generally associated with gene repression, heterochromatin formation, and overall chromatin compaction. In contrast to the class I CHD enzymes (CHD1 and CHD2), class II CHD proteins lack identifiable DNA-binding domains, but possess a C-terminal coiled-coil region. Moreover, in addition to the tandem chromodomains and a helicase domain, they all harbor tandem plant homeodomain (PHD) zinc fingers involved in the recognition of methylated histone tails. This model corresponds to the second PHD finger."
definition: >-
  PHD finger 2 found in class II Chromodomain-Helicase-DNA binding (CHD) proteins. Class II CHD proteins includes chromodomain-helicase-DNA-binding protein CHD3, CHD4, and CHD5, which are nuclear and ubiquitously expressed chromatin remodelling ATPases generally associated with histone deacetylases (HDACs). They are involved in DNA Double Strand Break (DSB) signaling, DSB repair and/or p53-dependent pathways such as apoptosis and senescence, as well as in the maintenance of genomic stability, and/or cancer prevention. They function as subunits of the Nucleosome Remodelling and Deacetylase (NuRD) complex, which is generally associated with gene repression, heterochromatin formation, and overall chromatin compaction. In contrast to the class I CHD enzymes (CHD1 and CHD2), class II CHD proteins lack identifiable DNA-binding domains, but possess a C-terminal coiled-coil region. Moreover, in addition to the tandem chromodomains and a helicase domain, they all harbor tandem plant homeodomain (PHD) zinc fingers involved in the recognition of methylated histone tails. This model corresponds to the second PHD finger. — an NCBI CDD conserved domain (cd15532); members share this curated model.
