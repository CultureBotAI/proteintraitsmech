identifier: CDD:cd02149
label: "nitroreductase similar to Escherichia coli NfsB. NAD(P)H:FMN oxidoreductase family. This domain catalyzes the reduction of flavin, nitrocompound, quinones and azo compounds using NADH or NADPH as an electron donor. The enzyme is a homodimer, and each monomer binds a FMN as co-factor. This family includes FRase I in Vibrio fischeri, wihich reduces FMN into FMNH2 as part of the bioluminescent reaction. The family also includes oxygen-insensitive nitroreductases that use NADH or NADPH as an electron donor in the ping pong bi bi mechanism. This type of nitroreductase can be used in cancer chemotherapy to activate a range of prodrugs."
definition: >-
  nitroreductase similar to Escherichia coli NfsB. NAD(P)H:FMN oxidoreductase family. This domain catalyzes the reduction of flavin, nitrocompound, quinones and azo compounds using NADH or NADPH as an electron donor. The enzyme is a homodimer, and each monomer binds a FMN as co-factor. This family includes FRase I in Vibrio fischeri, wihich reduces FMN into FMNH2 as part of the bioluminescent reaction. The family also includes oxygen-insensitive nitroreductases that use NADH or NADPH as an electron donor in the ping pong bi bi mechanism. This type of nitroreductase can be used in cancer chemotherapy to activate a range of prodrugs. — an NCBI CDD conserved domain (cd02149); members share this curated model.
