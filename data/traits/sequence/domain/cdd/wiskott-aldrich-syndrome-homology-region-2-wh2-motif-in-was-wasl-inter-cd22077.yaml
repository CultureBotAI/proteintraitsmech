identifier: CDD:cd22077
label: "Wiskott Aldrich syndrome homology region 2 (WH2 motif) in WAS/WASL-interacting protein (WIP) family members 2 and 3. WASF2 (WAS protein family, member 2), This family contains the Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2) in WAS/WASL-interacting protein family (WIPF, also known as WASP-interacting protein or WIP) members 2 (WIPF2; also known as WIRE/WICH) and 3 (WIPF3). WIPF2 may be an important regulator of the actin cytoskeleton. It binds to N-WASP, regulating actin dynamics close to the plasma membrane; N-WASP in turn controls the second phase insulin secretion through the regulation of the Arp2/3 complex. Pathogenic properties of Shigella flexneri, a causative agent of intestinal infections worldwide, rely on its ability to invade the human colon where it spreads from cell to cell; WIPF2 has been shown to promote this via its contribution to the efficiency of actin-based motility in the cytosol and the resolution of the membrane protrusions into vacuoles. WIPF3, along with LIPA (lysosomal acid lipase A), are expressed in microphages and are involved in pathological abdominal aortic aneurysm (AAA), a serious condition of the aorta."
definition: >-
