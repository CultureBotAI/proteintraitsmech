identifier: CDD:cd21335
label: "first calponin homology (CH) domain found in alpha-parvin. Alpha-parvin, also called actopaxin, calponin-like integrin-linked kinase-binding protein (CH-ILKBP), or matrix-remodeling-associated protein 2, plays a role in sarcomere organization and in smooth muscle cell contraction. It is required for normal development of the embryonic cardiovascular system, and for normal septation of the heart outflow tract. It is also involved in the reorganization of the actin cytoskeleton, the formation of lamellipodia and ciliogenesis, as well as in the establishement of cell polarity, cell adhesion, cell spreading, and directed cell migration. Alpha-parvin contains two copies of the CH domain. This model corresponds to the first CH domain. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  first calponin homology (CH) domain found in alpha-parvin. Alpha-parvin, also called actopaxin, calponin-like integrin-linked kinase-binding protein (CH-ILKBP), or matrix-remodeling-associated protein 2, plays a role in sarcomere organization and in smooth muscle cell contraction. It is required for normal development of the embryonic cardiovascular system, and for normal septation of the heart outflow tract. It is also involved in the reorganization of the actin cytoskeleton, the formation of lamellipodia and ciliogenesis, as well as in the establishement of cell polarity, cell adhesion, cell spreading, and directed cell migration. Alpha-parvin contains two copies of the CH domain. This model corresponds to the first CH domain. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21335); members share this curated model.
