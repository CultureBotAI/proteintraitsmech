label: "CCC1-related family of proteins. CCC1_like: This protein family includes the proteins related to CCC1, a yeast vacuole transmembrane protein responsible for the iron and manganese transport from the cytosol into vacuole. It also includes the proteins similar to nodulin-21, a plant nodule-specific protein that may be involved in symbiotic nitrogen fixation."
