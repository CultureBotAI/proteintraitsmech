identifier: CDD:cd04438
label: "DEP (Dishevelled, Egl-10, and Pleckstrin) domain found in dishevelled-like proteins.  Dishevelled-like proteins play a key role in the transduction of the Wnt signal from the cell surface to the nucleus, which in turn is an important regulatory pathway for cellular development and growth. They contain an N-terminal DIX domain, a central PDZ domain, and a C-terminal DEP domain."
definition: >-
  DEP (Dishevelled, Egl-10, and Pleckstrin) domain found in dishevelled-like proteins. Dishevelled-like proteins play a key role in the transduction of the Wnt signal from the cell surface to the nucleus, which in turn is an important regulatory pathway for cellular development and growth. They contain an N-terminal DIX domain, a central PDZ domain, and a C-terminal DEP domain. — an NCBI CDD conserved domain (cd04438); members share this curated model.
