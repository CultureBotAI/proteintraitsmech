identifier: CDD:cd16815
label: "RING finger, HC subclass, found in RING finger protein 40 (RNF40). RNF40, also known as BRE1B or 95 kDa retinoblastoma-associated protein (RBP95), was identified as a novel leucine zipper retinoblastoma protein (pRb)-associated protein that may function as a regulation factor in RNA polymerase II-mediated transcription and/or transcriptional processing. RNF40 also functions as an E3 ubiquitin-protein ligase that forms a heterodimeric complex with BRE1B, also known as RNF40, to facilitate the K120 monoubiquitination of histone H2B (H2Bub1), a DNA damage-induced histone modification that is crucial for recruitment of the chromatin remodeler SNF2h to DNA double-strand break (DSB) damage sites. It cooperates with SUPT16H to induce dynamic changes in chromatin structure during DSB repair. RNF40 contains a C3HC4-type RING-HC finger at the C-terminus."
definition: >-
  RING finger, HC subclass, found in RING finger protein 40 (RNF40). RNF40, also known as BRE1B or 95 kDa retinoblastoma-associated protein (RBP95), was identified as a novel leucine zipper retinoblastoma protein (pRb)-associated protein that may function as a regulation factor in RNA polymerase II-mediated transcription and/or transcriptional processing. RNF40 also functions as an E3 ubiquitin-protein ligase that forms a heterodimeric complex with BRE1B, also known as RNF40, to facilitate the K120 monoubiquitination of histone H2B (H2Bub1), a DNA damage-induced histone modification that is crucial for recruitment of the chromatin remodeler SNF2h to DNA double-strand break (DSB) damage sites. It cooperates with SUPT16H to induce dynamic changes in chromatin structure during DSB repair. RNF40 contains a C3HC4-type RING-HC finger at the C-terminus. — an NCBI CDD conserved domain (cd16815); members share this curated model.
