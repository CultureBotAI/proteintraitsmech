identifier: CDD:cd21277
label: "calponin homology (CH) domain found in LIM domain only protein 7. LIM domain only protein 7 (LMO-7), also called F-box only protein 20, or LOMP, is a transcription regulator for expression of many Emery-Dreifuss muscular dystrophy (EDMD)-relevant genes. It binds to alpha-actinin and AF6/afadin at adherens junctions for epithelial cell-cell adhesion. It contains a single copy of the CH domain at the N-terminus. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  calponin homology (CH) domain found in LIM domain only protein 7. LIM domain only protein 7 (LMO-7), also called F-box only protein 20, or LOMP, is a transcription regulator for expression of many Emery-Dreifuss muscular dystrophy (EDMD)-relevant genes. It binds to alpha-actinin and AF6/afadin at adherens junctions for epithelial cell-cell adhesion. It contains a single copy of the CH domain at the N-terminus. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21277); members share this curated model.
