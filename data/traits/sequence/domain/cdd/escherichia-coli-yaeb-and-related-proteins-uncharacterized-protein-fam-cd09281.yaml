identifier: CDD:cd09281
label: "Escherichia coli YaeB and related proteins. Uncharacterized protein family UPF0066.  This domain includes Escherichia coli YeaB, Archeoglobus fulgidus AF0241, and Agrobacterium tumefaciens VirR.  Proteins with this domain are probable S-adenosylmethionine-dependent methyltransferases but they have not been functionally characterized and the substrate is unknown."
definition: >-
  Escherichia coli YaeB and related proteins. Uncharacterized protein family UPF0066. This domain includes Escherichia coli YeaB, Archeoglobus fulgidus AF0241, and Agrobacterium tumefaciens VirR. Proteins with this domain are probable S-adenosylmethionine-dependent methyltransferases but they have not been functionally characterized and the substrate is unknown. — an NCBI CDD conserved domain (cd09281); members share this curated model.
