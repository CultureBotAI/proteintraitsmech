identifier: CDD:cd06719
label: "second and fourth PDZ domains (PDZ2 and 4) of Saccharomyces cerevisiae pro-apoptotic serine protease Nma111p and related domains. Second and fourth PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens 1)) domains of the HtrA-type protease Saccharomyces cerevisiae Nma11p (also known as Ynm3p), and related domains. Nma111p is a nuclear serine protease which mediates apoptosis through proteolysis of the apoptotic inhibitor Bir1p. Nma111p is composed of two protease domains and four PDZ domains; its N-terminal half is comprised of a protease domain, followed by two PDZ domains, and its C-terminal half has a similar domain arrangement. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminus of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands (A-F) and two alpha-helices (alpha-helix 1 and 2), arranged as beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. One permutation places beta-strand A at the C-terminus, another permutation places both beta-strands A and B at the C-terminus. This Nma111p-like family PDZ2 and PDZ4 domains show similarity to permuted PDZ domains."
definition: >-
  second and fourth PDZ domains (PDZ2 and 4) of Saccharomyces cerevisiae pro-apoptotic serine protease Nma111p and related domains. Second and fourth PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens 1)) domains of the HtrA-type protease Saccharomyces cerevisiae Nma11p (also known as Ynm3p), and related domains. Nma111p is a nuclear serine protease which mediates apoptosis through proteolysis of the apoptotic inhibitor Bir1p. Nma111p is composed of two protease domains and four PDZ domains; its N-terminal half is comprised of a protease domain, followed by two PDZ domains, and its C-terminal half has a similar domain arrangement. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminus of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands (A-F) and two alpha-helices (alpha-helix 1 and 2), arranged as beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. One permutation places beta-strand A at the C-terminus, another permutation places both beta-strands A and B at the C-terminus. This Nma111p-like family PDZ2 and PDZ4 domains show similarity to permuted PDZ domains. — an NCBI CDD conserved domain (cd06719); members share this curated model.
