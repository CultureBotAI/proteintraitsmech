identifier: CDD:cd13058
label: "Laminin G domain of Slit1. The slit protein family consists of three members, which are all expressed in the ventral midline of the neural tube. They contain  N-terminal leucine rich repeats, EGF repeats, a lamG domain and a cysteine rich C terminus. Slit proteins have been shown to repel axons and neurons. Slit and its receptor Roundabout (Robo) regulate axon pathfinding at the ventral midline of the neural tube. The exact role of the C-terminal domains is unclear. Slit1 and slit2 act as chemorepellent factors for axon guidance. In general, proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold."
