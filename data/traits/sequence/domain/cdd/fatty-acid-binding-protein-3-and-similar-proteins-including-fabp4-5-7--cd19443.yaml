identifier: CDD:cd19443
label: "fatty acid-binding protein 3 and similar proteins including FABP4, -5, -7, -8, -9, -11, and -12. This FABP3-like subfamily includes FABP3, -4, -5, -7, -8, -9, -11, -12, and similar proteins and belongs to the intracellular fatty acid-binding protein (FABP) family, members of which are small proteins that bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
definition: >-
