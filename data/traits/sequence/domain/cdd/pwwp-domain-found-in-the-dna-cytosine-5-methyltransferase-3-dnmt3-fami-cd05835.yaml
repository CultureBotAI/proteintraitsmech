identifier: CDD:cd05835
label: "PWWP domain found in the DNA (cytosine-5)-methyltransferase 3 (DNMT3) family. The DNMT3 family includes DNMT3A and DNMT3B, which are required for genome-wide de novo methylation and is essential for the establishment of DNA methylation patterns during development. DNMT3A, also called DNA methyltransferase HsaIIIA, DNA MTase HsaIIIA, or M.HsaIIIA, modifies DNA in a non-processive manner and also methylates non-CpG sites. It may preferentially methylate DNA linker between 2 nucleosomal cores and is inhibited by histone H1. DNMT3A is recruited to trimethylated 'Lys-36' of histone H3 (H3K36me3) sites. DNMT3B, also called DNA methyltransferase HsaIIIB, DNA MTase HsaIIIB, or M.HsaIIIB, may preferentially methylate nucleosomal DNA within the nucleosome core region. DNMT3B may function as a transcriptional co-repressor by associating with CBX4 and independently of DNA methylation. Members of this family contains a PWWP domain that is responsible for establishing DNA methylation patterns during embryogenesis and gametogenesis. In tumorigenesis, DNA methylation by DNMT3B is known to play a role in the inactivation of tumor suppressor genes.  In addition, a point mutation in the PWWP domain of DNMT3B has been identified in patients with ICF (immunodeficiency, centromeric instability, and facial anomalie) syndrome , a rare autosomal recessive disorder characterized by hypomethylation of classical satellite DNA."
definition: >-
  PWWP domain found in the DNA (cytosine-5)-methyltransferase 3 (DNMT3) family. The DNMT3 family includes DNMT3A and DNMT3B, which are required for genome-wide de novo methylation and is essential for the establishment of DNA methylation patterns during development. DNMT3A, also called DNA methyltransferase HsaIIIA, DNA MTase HsaIIIA, or M.HsaIIIA, modifies DNA in a non-processive manner and also methylates non-CpG sites. It may preferentially methylate DNA linker between 2 nucleosomal cores and is inhibited by histone H1. DNMT3A is recruited to trimethylated 'Lys-36' of histone H3 (H3K36me3) sites. DNMT3B, also called DNA methyltransferase HsaIIIB, DNA MTase HsaIIIB, or M.HsaIIIB, may preferentially methylate nucleosomal DNA within the nucleosome core region. DNMT3B may function as a transcriptional co-repressor by associating with CBX4 and independently of DNA methylation. Members of this family contains a PWWP domain that is responsible for establishing DNA methylation patterns during embryogenesis and gametogenesis. In tumorigenesis, DNA methylation by DNMT3B is known to play a role in the inactivation of tumor suppressor genes. In addition, a point mutation in the PWWP domain of DNMT3B has been identified in patients with ICF (immunodeficiency, centromeric instability, and facial anomalie) syndrome , a rare autosomal recessive disorder characterized by hypomethylation of classical satellite DNA. — an NCBI CDD conserved domain (cd05835); members share this curated model.
