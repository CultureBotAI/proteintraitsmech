identifier: CDD:cd17036
label: "T110839 is structurally similar to type III secretion system chaperones and YbjN family proteins. This family includes protein T110839 from Synechococcus elongatus that is structurally similar to type III secretion system (T3SS) chaperones (T3SC) that bind effector proteins, and is homologous to YbjN, a putative sensory transduction regulator protein found in Proteobacteria."
definition: >-
  T110839 is structurally similar to type III secretion system chaperones and YbjN family proteins. This family includes protein T110839 from Synechococcus elongatus that is structurally similar to type III secretion system (T3SS) chaperones (T3SC) that bind effector proteins, and is homologous to YbjN, a putative sensory transduction regulator protein found in Proteobacteria. — an NCBI CDD conserved domain (cd17036); members share this curated model.
