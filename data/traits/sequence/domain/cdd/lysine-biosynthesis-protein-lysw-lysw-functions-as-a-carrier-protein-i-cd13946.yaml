identifier: CDD:cd13946
label: LysW
definition: >-
  Lysine biosynthesis protein LysW. LysW functions as a carrier protein in the biosynthesis pathway of lysine. The C-terminal glutamate sidechain of LysW attaches to the amino group of alpha-aminoadipate (AAA); this peptide bond formation is catalyzed by the ligase LysX. AAA remains associated with LysW throughout its biosynthetic conversion to lysine. LysW also acts to protect the amino group of glutamate in arginine biosynthesis
