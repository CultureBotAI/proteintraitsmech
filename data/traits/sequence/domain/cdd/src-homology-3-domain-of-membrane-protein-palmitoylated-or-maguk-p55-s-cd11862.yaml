identifier: CDD:cd11862
label: "Src Homology 3 domain of Membrane Protein, Palmitoylated (or MAGUK p55 subfamily member) proteins. The MPP/p55 subfamily of MAGUK (membrane-associated guanylate kinase) proteins includes at least eight vertebrate members (MPP1-7 and CASK), four Drosophila proteins (Stardust, Varicose, CASK and Skiff), and other similar proteins; they all contain one each of the core of three domains characteristic of MAGUK proteins: PDZ, SH3, and guanylate kinase (GuK). In addition, most members except for MPP1 contain N-terminal L27 domains and some also contain a Hook (Protein 4.1 Binding) motif in between the SH3 and GuK domains. CASK has an additional calmodulin-dependent kinase (CaMK)-like domain at the N-terminus. Members of this subfamily are scaffolding proteins that play important roles in regulating and establishing cell polarity, cell adhesion, and synaptic targeting and transmission, among others. The GuK domain in MAGUK proteins is enzymatically inactive; instead, the domain mediates protein-protein interactions and associates intramolecularly with the SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Membrane Protein, Palmitoylated (or MAGUK p55 subfamily member) proteins. The MPP/p55 subfamily of MAGUK (membrane-associated guanylate kinase) proteins includes at least eight vertebrate members (MPP1-7 and CASK), four Drosophila proteins (Stardust, Varicose, CASK and Skiff), and other similar proteins; they all contain one each of the core of three domains characteristic of MAGUK proteins: PDZ, SH3, and guanylate kinase (GuK). In addition, most members except for MPP1 contain N-terminal L27 domains and some also contain a Hook (Protein 4.1 Binding) motif in between the SH3 and GuK domains. CASK has an additional calmodulin-dependent kinase (CaMK)-like domain at the N-terminus. Members of this subfamily are scaffolding proteins that play important roles in regulating and establishing cell polarity, cell adhesion, and synaptic targeting and transmission, among others. The GuK domain in MAGUK proteins is enzymatically inactive; instead, the domain mediates protein-protein interactions and associates intramolecularly with the SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11862); members share this curated model.
