identifier: CDD:cd17426
label: "Monocarboxylate transporter 1 of the Major Facilitator Superfamily of transporters. Monocarboxylate transporter 1 (MCT1) is also called Solute carrier family 16 member 1 (SLC16A1). It is a proton-coupled transporter that facilitates the transport across the plasma membrane of monocarboxylates such as lactate, pyruvate, branched-chain oxo acids derived from leucine, valine and isoleucine, and ketone bodies such as acetoacetate, beta-hydroxybutyrate and acetate. It is widely expressed in many tissues its main function is to transport lactate into the cell. MCT1 deficiency has been identified as a cause of profound ketoacidosis, a potentially lethal condition caused by the imbalance between hepatic production and extrahepatic utilization of ketone bodies. This suggests that MCT1-mediated ketone-body transport is crucial in maintaining acid-base balance. MCT1 belongs to the Monocarboxylate transporter (MCT) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Monocarboxylate transporter 1 of the Major Facilitator Superfamily of transporters. Monocarboxylate transporter 1 (MCT1) is also called Solute carrier family 16 member 1 (SLC16A1). It is a proton-coupled transporter that facilitates the transport across the plasma membrane of monocarboxylates such as lactate, pyruvate, branched-chain oxo acids derived from leucine, valine and isoleucine, and ketone bodies such as acetoacetate, beta-hydroxybutyrate and acetate. It is widely expressed in many tissues its main function is to transport lactate into the cell. MCT1 deficiency has been identified as a cause of profound ketoacidosis, a potentially lethal condition caused by the imbalance between hepatic production and extrahepatic utilization of ketone bodies. This suggests that MCT1-mediated ketone-body transport is crucial in maintaining acid-base balance. MCT1 belongs to the Monocarboxylate transporter (MCT) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17426); members share this curated model.
