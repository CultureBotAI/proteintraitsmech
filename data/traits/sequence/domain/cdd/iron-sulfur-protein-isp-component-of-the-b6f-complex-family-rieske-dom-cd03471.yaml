identifier: CDD:cd03471
label: "Iron-sulfur protein (ISP) component of the b6f complex family, Rieske domain; The Rieske domain is a [2Fe-2S] cluster binding domain involved in electron transfer. The cytochrome b6f complex from Mastigocladus laminosus, a thermophilic cyanobacterium, contains four large subunits, including cytochrome f, cytochrome b6, the Rieske ISP, and subunit IV; as well as four small hydrophobic subunits, PetG, PetL, PetM, and PetN. Rieske ISP, one of the large subunits of the cytochrome bc-type complexes, is involved in respiratory and photosynthetic electron transfer. The core of the chloroplast b6f complex is similar to the analogous respiratory cytochrome bc(1) complex, but the domain arrangement outside the core and the complement of prosthetic groups are strikingly different."
definition: >-
  Iron-sulfur protein (ISP) component of the b6f complex family, Rieske domain; The Rieske domain is a [2Fe-2S] cluster binding domain involved in electron transfer. The cytochrome b6f complex from Mastigocladus laminosus, a thermophilic cyanobacterium, contains four large subunits, including cytochrome f, cytochrome b6, the Rieske ISP, and subunit IV; as well as four small hydrophobic subunits, PetG, PetL, PetM, and PetN. Rieske ISP, one of the large subunits of the cytochrome bc-type complexes, is involved in respiratory and photosynthetic electron transfer. The core of the chloroplast b6f complex is similar to the analogous respiratory cytochrome bc(1) complex, but the domain arrangement outside the core and the complement of prosthetic groups are strikingly different. — an NCBI CDD conserved domain (cd03471); members share this curated model.
