identifier: CDD:cd19692
label: "basic helix-loop-helix (bHLH) domain found in DNA-binding protein inhibitor ID2 and similar proteins. ID2, also termed Class B basic helix-loop-helix protein 26 (bHLHb26), or inhibitor of DNA binding 2, or inhibitor of differentiation 2, is a dominant negative helix-loop-helix (dnHLH) transcriptional regulator (lacking a basic DNA binding domain) which negatively regulates the bHLH transcription factors by forming heterodimers and inhibiting their DNA binding and transcriptional activity. It has been implicated in the regulation of cell proliferation and differentiation in myogenesis, neurogenesis, and/or hematopoiesis."
definition: >-
  basic helix-loop-helix (bHLH) domain found in DNA-binding protein inhibitor ID2 and similar proteins. ID2, also termed Class B basic helix-loop-helix protein 26 (bHLHb26), or inhibitor of DNA binding 2, or inhibitor of differentiation 2, is a dominant negative helix-loop-helix (dnHLH) transcriptional regulator (lacking a basic DNA binding domain) which negatively regulates the bHLH transcription factors by forming heterodimers and inhibiting their DNA binding and transcriptional activity. It has been implicated in the regulation of cell proliferation and differentiation in myogenesis, neurogenesis, and/or hematopoiesis. — an NCBI CDD conserved domain (cd19692); members share this curated model.
