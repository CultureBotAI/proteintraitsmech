identifier: CDD:cd11997
label: "Src homology 3 domain of Protein kinase C and Casein kinase Substrate in Neurons 3 (PACSIN3). PACSIN 3 or Syndapin III (Synaptic dynamin-associated protein III) is expressed ubiquitously and regulates glucose uptake in adipocytes through its role in GLUT1 trafficking. It also modulates the subcellular localization and stimulus-specific function of the cation channel TRPV4. PACSINs act as regulators of cytoskeletal and membrane dynamics. Vetebrates harbor three isoforms with distinct expression patterns and specific functions. PACSINs contain an N-terminal F-BAR domain and a C-terminal SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
