identifier: CDD:cd11559
label: "C-terminal W2 domain of eukaryotic translation initiation factor 4 gamma 1 and similar proteins. eIF4G1 is a component of the multi-subunit eukaryotic translation initiation factor 4F, which facilitates recruitment of the mRNA to the ribosome, a rate-limiting step during translation initiation. This C-terminal domain, whose structure resembles that of a set of concatenated HEAT repeats, has been associated with binding to/recruiting the kinase Mnk1, which phosphorylates eIF4E."
definition: >-
  C-terminal W2 domain of eukaryotic translation initiation factor 4 gamma 1 and similar proteins. eIF4G1 is a component of the multi-subunit eukaryotic translation initiation factor 4F, which facilitates recruitment of the mRNA to the ribosome, a rate-limiting step during translation initiation. This C-terminal domain, whose structure resembles that of a set of concatenated HEAT repeats, has been associated with binding to/recruiting the kinase Mnk1, which phosphorylates eIF4E. — an NCBI CDD conserved domain (cd11559); members share this curated model.
