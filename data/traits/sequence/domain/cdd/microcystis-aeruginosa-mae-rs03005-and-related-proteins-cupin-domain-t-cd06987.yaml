label: "Microcystis aeruginosa MAE_RS03005 and related proteins, cupin domain. This family includes bacterial and some eukaryotic proteins homologous to MAE_RS03005, a Microcystis aeruginosa protein of unknown function. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  Microcystis aeruginosa MAE_RS03005 and related proteins, cupin domain. This family includes bacterial and some eukaryotic proteins homologous to MAE_RS03005, a Microcystis aeruginosa protein of unknown function. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd06987); members share this curated model.
