identifier: CDD:cd10958
label: "Catalytic NodB homology domain of uncharacterized chitin deacetylases and hypothetical proteins. This family includes some uncharacterized chitin deacetylases and hypothetical proteins, mainly from eukaryotes. Although their biological function is unknown, members in this family show high sequence homology to the catalytic NodB homology domain of Colletotrichum lindemuthianum chitin deacetylase (endo-chitin de-N-acetylase, ClCDA, EC 3.5.1.41), which catalyzes the hydrolysis of N-acetamido groups of N-acetyl-D-glucosamine residues in chitin, converting it to chitosan in fungal cell walls. Like ClCDA, this family is a member the carbohydrate esterase 4 (CE4) superfamily."
definition: >-
  Catalytic NodB homology domain of uncharacterized chitin deacetylases and hypothetical proteins. This family includes some uncharacterized chitin deacetylases and hypothetical proteins, mainly from eukaryotes. Although their biological function is unknown, members in this family show high sequence homology to the catalytic NodB homology domain of Colletotrichum lindemuthianum chitin deacetylase (endo-chitin de-N-acetylase, ClCDA, EC 3.5.1.41), which catalyzes the hydrolysis of N-acetamido groups of N-acetyl-D-glucosamine residues in chitin, converting it to chitosan in fungal cell walls. Like ClCDA, this family is a member the carbohydrate esterase 4 (CE4) superfamily. — an NCBI CDD conserved domain (cd10958); members share this curated model.
