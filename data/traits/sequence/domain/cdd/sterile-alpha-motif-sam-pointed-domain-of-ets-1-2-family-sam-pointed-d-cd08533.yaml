identifier: CDD:cd08533
label: "Sterile alpha motif (SAM)/Pointed domain of ETS-1,2 family. SAM Pointed domain of ETS-1,2 family of transcriptional activators is a protein-protein interaction domain. It carries a kinase docking site and mediates interaction between ETS transcriptional activators and protein kinases. This group of transcriptional factors is involved in the Ras/MAP kinase signaling pathway. MAP kinases phosphorylate the transcription factors.  Phosphorylated factors then recruit coactivators and enhance transactivation. Members of this group play a role in regulation of different embryonic developmental processes. ETS-1,2 transcriptional activators are proto-oncogenes involved in malignant transformation and tumor progression. They are potential molecular targets for selective cancer therapy."
