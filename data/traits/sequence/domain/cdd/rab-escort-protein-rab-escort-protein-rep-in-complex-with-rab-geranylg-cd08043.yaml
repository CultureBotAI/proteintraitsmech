identifier: CDD:cd08043
label: REP
definition: >-
  Rab escort protein. Rab escort protein (REP), in complex with Rab geranylgeranyl transferase (RabGGTase), geranylgeranylates Rab GTPase, a step that is required for targeting of Rab GTPase, a key regulator of intracellular vesicular transport, to the membrane. Deletion of the human REP homolog, the choroideremia gene CHM, leads to loss of vision
