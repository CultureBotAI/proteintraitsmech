identifier: CDD:cd19754
label: "Globin domain of fungal flavohemoglobin. FlavoHbs function primarily as nitric oxide dioxygenases (NODs, EC 1.14.12.17), converting NO and O2 to inert NO3- (nitrate). They have an N-terminal globin domain and a C-terminal ferredoxin reductase-like NAD- and FAD-binding domain, and use the reducing power of cellular NAD(P)H to drive regeneration of the ferrous heme. They protect from nitrosative stress (the broad range of cellular toxicities caused by NO), and modulate NO signaling pathways. NO scavenging by flavoHb attenuates the expression of the nitrosative stress response, affects the swarming behavior of Escherichia coli, and maintains squid-Vibrio fischeri and Medicago truncatula-Sinorhizobium meliloti symbioses. FlavoHb expression affects Aspergillus nidulans sexual development and mycotoxin production, and Dictyostelium discoideum development."
definition: >-
  Globin domain of fungal flavohemoglobin. FlavoHbs function primarily as nitric oxide dioxygenases (NODs, EC 1.14.12.17), converting NO and O2 to inert NO3- (nitrate). They have an N-terminal globin domain and a C-terminal ferredoxin reductase-like NAD- and FAD-binding domain, and use the reducing power of cellular NAD(P)H to drive regeneration of the ferrous heme. They protect from nitrosative stress (the broad range of cellular toxicities caused by NO), and modulate NO signaling pathways. NO scavenging by flavoHb attenuates the expression of the nitrosative stress response, affects the swarming behavior of Escherichia coli, and maintains squid-Vibrio fischeri and Medicago truncatula-Sinorhizobium meliloti symbioses. FlavoHb expression affects Aspergillus nidulans sexual development and mycotoxin production, and Dictyostelium discoideum development. — an NCBI CDD conserved domain (cd19754); members share this curated model.
