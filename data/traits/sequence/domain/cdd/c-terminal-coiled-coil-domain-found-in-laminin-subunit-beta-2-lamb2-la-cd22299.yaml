identifier: CDD:cd22299
label: "C-terminal coiled-coil domain found in laminin subunit beta-2 (LAMB2). LAMB2 is also called laminin B1s chain, laminin-11 subunit beta, laminin-14 subunit beta, laminin-15 subunit beta, laminin-3 subunit beta, laminin-4 subunit beta, laminin-7 subunit beta, laminin-9 subunit beta, S-laminin subunit beta, or S-LAM beta (LAMS). It is an important component of the interphotoreceptor matrix and plays a role in rod morphogenesis. It may also have an important function in the sarcolemmal basement membrane. Mutations of the LAMB2 gene mainly cause Pierson syndrome (microcoria-congenital nephrosis syndrome). LAMB2 is a component of laminin, a complex glycoprotein consisting of three different polypeptide chains (alpha, beta, gamma). Binding to cells via a high affinity receptor, laminin is thought to mediate the attachment, migration, and organization of cells into tissues during embryonic development by interacting with other extracellular matrix components. This model corresponds to the C-terminal coiled-coil domain of LAMB2, which may be involved in the integrin binding activity."
definition: >-
  C-terminal coiled-coil domain found in laminin subunit beta-2 (LAMB2). LAMB2 is also called laminin B1s chain, laminin-11 subunit beta, laminin-14 subunit beta, laminin-15 subunit beta, laminin-3 subunit beta, laminin-4 subunit beta, laminin-7 subunit beta, laminin-9 subunit beta, S-laminin subunit beta, or S-LAM beta (LAMS). It is an important component of the interphotoreceptor matrix and plays a role in rod morphogenesis. It may also have an important function in the sarcolemmal basement membrane. Mutations of the LAMB2 gene mainly cause Pierson syndrome (microcoria-congenital nephrosis syndrome). LAMB2 is a component of laminin, a complex glycoprotein consisting of three different polypeptide chains (alpha, beta, gamma). Binding to cells via a high affinity receptor, laminin is thought to mediate the attachment, migration, and organization of cells into tissues during embryonic development by interacting with other extracellular matrix components. This model corresponds to the C-terminal coiled-coil domain of LAMB2, which may be involved in the integrin binding activity. — an NCBI CDD conserved domain (cd22299); members share this curated model.
