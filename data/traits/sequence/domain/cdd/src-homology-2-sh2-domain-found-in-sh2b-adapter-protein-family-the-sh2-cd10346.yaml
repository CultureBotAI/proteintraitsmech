identifier: CDD:cd10346
label: "Src homology 2 (SH2) domain found in SH2B adapter protein family. The SH2B adapter protein family  has 3 members:  SH2B1 (SH2-B, PSM), SH2B2 (APS), and SH2B3 (Lnk). SH2B family members contain a pleckstrin homology domain, at least one dimerization domain, and a C-terminal SH2 domain which binds to phosphorylated tyrosines in a variety of tyrosine kinases.  SH2B1 and SH2B2  function in signaling pathways found downstream of growth hormone receptor and receptor tyrosine kinases, including the insulin, insulin-like growth factor-I (IGF-I), platelet-derived growth factor (PDGF), nerve growth factor, hepatocyte growth factor, and fibroblast growth factor receptors. SH2B2beta, a new isoform of SH2B2, is an endogenous inhibitor of SH2B1 and/or SH2B2 (SH2B2alpha), negatively regulating insulin signaling and/or JAK2-mediated cellular responses. SH2B3 negatively regulates lymphopoiesis and early hematopoiesis. The lnk-deficiency results in enhanced production of B cells, and expansion as well as enhanced function of hematopoietic stem cells (HSCs), demonstrating negative regulatory functions of Sh2b3/Lnk in cytokine signaling. Sh2b3/Lnk also functions in responses controlled by cell adhesion and in crosstalk between integrin- and cytokine-mediated signaling. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in SH2B adapter protein family. The SH2B adapter protein family has 3 members: SH2B1 (SH2-B, PSM), SH2B2 (APS), and SH2B3 (Lnk). SH2B family members contain a pleckstrin homology domain, at least one dimerization domain, and a C-terminal SH2 domain which binds to phosphorylated tyrosines in a variety of tyrosine kinases. SH2B1 and SH2B2 function in signaling pathways found downstream of growth hormone receptor and receptor tyrosine kinases, including the insulin, insulin-like growth factor-I (IGF-I), platelet-derived growth factor (PDGF), nerve growth factor, hepatocyte growth factor, and fibroblast growth factor receptors. SH2B2beta, a new isoform of SH2B2, is an endogenous inhibitor of SH2B1 and/or SH2B2 (SH2B2alpha), negatively regulating insulin signaling and/or JAK2-mediated cellular responses. SH2B3 negatively regulates lymphopoiesis and early hematopoiesis. The lnk-deficiency results in enhanced production of B cells, and expansion as well as enhanced function of hematopoietic stem cells (HSCs), demonstrating negative regulatory functions of Sh2b3/Lnk in cytokine signaling. Sh2b3/Lnk also functions in responses controlled by cell adhesion and in crosstalk between integrin- and cytokine-mediated signaling. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10346); members share this curated model.
