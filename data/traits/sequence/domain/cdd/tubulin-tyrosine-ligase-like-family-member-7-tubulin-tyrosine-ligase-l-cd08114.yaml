identifier: CDD:cd08114
label: ATP-G_TTLL7
definition: >-
  Tubulin tyrosine ligase-like family, member 7. Tubulin tyrosine ligase-like family, member 7 (TTLL7) is a member of Tubulin-tyrosine ligase (TTL, EC 6.3.2.25) family. TTL catalyses the posttranslational addition of a tyrosine to the carboxy-terminal end of detyrosinated alpha-tubulin in the presense of ATP. TTL requires K and Mg ions for catalysis and uses detyrosinated alpha-tubulin as a substrate. It plays a key role in microtubules assembly. Based on the sequence and functional similarities with glutathione synthetase (GSHase), biotin carboxylase (BC), D-ala D-ala ligase (DD-ligase), and succinyl-CoA synthetase (SCS) families it is concluded that TTL belongs to ATP-grasp superfamily. Human tubulin tyrosine ligase-like 7 gene (TTLL7) maps to chromosome region 1p31.1. TTLL7 is a mammalian beta-tubulin polyglutamylase which is predominantly expressed in nervous system
