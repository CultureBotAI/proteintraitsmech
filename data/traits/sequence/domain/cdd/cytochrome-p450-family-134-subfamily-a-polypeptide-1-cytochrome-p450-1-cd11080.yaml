identifier: CDD:cd11080
label: "cytochrome P450 family 134, subfamily A, polypeptide 1. Cytochrome P450 134A1 (CYP134A1, EC 1.14.15.13), also called pulcherriminic acid synthase or cyclo-L-leucyl-L-leucyl dipeptide oxidase or cytochrome P450 CYPX, catalyzes the oxidation of cyclo(L-Leu-L-Leu) (cLL) to yield pulcherriminic acid which forms the red pigment pulcherrimin via a non-enzymatic spontaneous reaction with Fe(3+). It belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
