identifier: CDD:cd21869
label: P53_TAD
definition: >-
  The Transactivation Domain (TAD) of the p53 Protein. The p53 is a tumor suppressor with discrete domains that participate in sequence-specific DNA binding, tetramerization, and transcriptional activation. p53 transcription activator protein contains N-terminal transactivation domains (TAD), a proline-rich domain (P-rich), a sequence-specific DNA binding domain (DBD), a linker domain, tetramerization domain (TD), and a lysine-rich, basic C-terminal regulatory (REG) domain. The p53 TAD domain can be divided into two subdomains,TAD1 and TAD2, and both subdomains independently have transcriptional activation functions which their specific hydrophobic residues within these TADs are critical for thier function. P53 TAD is rich in acidic amino acid residues and is a member of acidic activation domains (AADs) which interact with a variety of target proteins that bind to specific sites on DNA. P53 TAD structure is inherently devoid of tertiary structre, as are most AADs and that short p53 TAD fragments are able to form "induced" helices upon binding to target proteins. p53 knockin mice with mutation at either or both of the two TADs have revealed that both TAD1 and TAD2 participate in tumor suppression, however, TAD1 is critical for responses to acute DNA damage. The factors that bind TADs such as general transcription factors, chromatin modifiers, and negative regulators are affecting p53 activities. TADs posttranslational modifications such as phosphorylation regulate TAD activity
