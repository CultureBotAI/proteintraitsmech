identifier: CDD:cd15329
label: "serotonin receptor subtype 7, member of the class A family of seven-transmembrane G protein-coupled receptors. The 5-HT7 receptor, one of 14 mammalian serotonin receptors, is a member of the class A of GPCRs and is activated by the neurotransmitter serotonin (5-hydroxytryptamine, 5-HT).  5-HT7 receptor mainly couples to Gs protein, which positively stimulates adenylate cyclase, leading to increased intracellular cAMP formation and calcium influx. 5-HT7 receptor is expressed in various human tissues, mainly in the brain, the lower gastrointestinal tract and in vital blood vessels including the coronary artery. In the CNS, serotonin is involved in the regulation of appetite, mood, sleep, cognition, learning and memory, as well as implicated in neurologic disorders such as migraine, schizophrenia, and depression."
definition: >-
