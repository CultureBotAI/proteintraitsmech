identifier: CDD:cd20270
label: "LYR (leucine-tyrosine-arginine) motif found in mitochondrial succinate dehydrogenase assembly factor 3 (SDHAF3) and similar proteins. SDHAF3, also called SDH assembly factor 3, or LYR motif-containing protein 10 (LYRM10), plays an essential role in the assembly of succinate dehydrogenase (SDH), an enzyme complex (also referred to as respiratory complex II) that is a component of both the tricarboxylic acid (TCA) cycle and the mitochondrial electron transport chain, and which couples the oxidation of succinate to fumarate with the reduction of ubiquinone (coenzyme Q) to ubiquinol. It promotes maturation of the iron-sulfur protein subunit SDHB of the SDH catalytic dimer, protecting it from the deleterious effects of oxidants. SDHAF3 may act together with SDHAF1. Its mutations may be associated with idiopathic SDH-associated diseases. SDHAF3 belongs to the Complex1_LYR-like superfamily that consists of proteins of diverse functions that are exclusively found in eukaryotes and contain the conserved tripeptide 'LYR' close to the N-terminus."
definition: >-
  LYR (leucine-tyrosine-arginine) motif found in mitochondrial succinate dehydrogenase assembly factor 3 (SDHAF3) and similar proteins. SDHAF3, also called SDH assembly factor 3, or LYR motif-containing protein 10 (LYRM10), plays an essential role in the assembly of succinate dehydrogenase (SDH), an enzyme complex (also referred to as respiratory complex II) that is a component of both the tricarboxylic acid (TCA) cycle and the mitochondrial electron transport chain, and which couples the oxidation of succinate to fumarate with the reduction of ubiquinone (coenzyme Q) to ubiquinol. It promotes maturation of the iron-sulfur protein subunit SDHB of the SDH catalytic dimer, protecting it from the deleterious effects of oxidants. SDHAF3 may act together with SDHAF1. Its mutations may be associated with idiopathic SDH-associated diseases. SDHAF3 belongs to the Complex1_LYR-like superfamily that consists of proteins of diverse functions that are exclusively found in eukaryotes and contain the conserved tripeptide 'LYR' close to the N-terminus. — an NCBI CDD conserved domain (cd20270); members share this curated model.
