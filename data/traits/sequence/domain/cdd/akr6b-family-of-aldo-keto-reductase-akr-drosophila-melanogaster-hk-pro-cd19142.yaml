label: "AKR6B family of aldo-keto reductase (AKR). Drosophila melanogaster Hk protein is a founding member of aldo-keto reductase family 6 member B1 (AKR6B1). Hk protein, also called hyperkinetic, is a beta subunit of Shaker (Sh) K+ channels and shows high sequence homology to aldoketoreductase."
definition: >-
  AKR6B family of aldo-keto reductase (AKR). Drosophila melanogaster Hk protein is a founding member of aldo-keto reductase family 6 member B1 (AKR6B1). Hk protein, also called hyperkinetic, is a beta subunit of Shaker (Sh) K+ channels and shows high sequence homology to aldoketoreductase. — an NCBI CDD conserved domain (cd19142); members share this curated model.
