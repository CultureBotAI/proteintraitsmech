identifier: CDD:cd19629
label: beta14_PaFadL
definition: >-
  FadL from Pseudomonas aeruginosa and related sequences. Pseudomonas aeruginosa FadL (PaFadL) has 20% sequence identity to E. coli FadL (EcFadL). Despite this PaFadL is structurally similar to EcFadL, with the exception of a number of extracellular loops. Like EcFadL, PaFadL has a pronounced lateral opening in the barrel wall suggesting that the lateral opening is conserved in FadL family members. Detergents bound in the lumen and lateral opening suggest a potential substrate passageway that has a substantial affinity for long-chain fatty acid substrates. Despite the structural similarity to EcFadL, PaFadL has very low activity for LCFA transport, confirming that FadL channels are substrate specific. A general, lateral diffusion mechanism for the uptake of hydrophobic substrates by the FadL outer membrane (OM) protein family involves hydrophobic substrates diffusing via a long hydrophobic passageway laterally into the outer leaflet of the OM, via a lateral opening in the barrel wall. From the outer leaflet the substrate can move to the inner leaflet of the OM and diffuse into the periplasm. The hydrophobic substrates bypass the hydrophilic LPS layer of the OM without having to move through an aqueous channel
