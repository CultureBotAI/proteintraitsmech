identifier: CDD:cd15469
label: "Hemagglutinin-neuraminidase (HN) of parainfluenza virus 5, Newcastle disease virus, and related paramyxoviridiae. The hemagglutinin-neuraminidase (HN) found in this family of viruses has a variety of functions during viral infection; it participates in virus attachment to host cells, cleaves sialic acid off host oligosaccharides, and has a stimulating effect on membrane fusion during the entry of the virus into the host cell. This model characterizes the global ectodomain of HN. Hemagglutinin-neuraminidase ectodomains of these viruses attaches the virion to sialic acid receptors on host cells; the neuraminidase cleaves sialic acid moieties from host cell molecules as well as virus particles, this removal may happen in the trans Golgi network."
definition: >-
  Hemagglutinin-neuraminidase (HN) of parainfluenza virus 5, Newcastle disease virus, and related paramyxoviridiae. The hemagglutinin-neuraminidase (HN) found in this family of viruses has a variety of functions during viral infection; it participates in virus attachment to host cells, cleaves sialic acid off host oligosaccharides, and has a stimulating effect on membrane fusion during the entry of the virus into the host cell. This model characterizes the global ectodomain of HN. Hemagglutinin-neuraminidase ectodomains of these viruses attaches the virion to sialic acid receptors on host cells; the neuraminidase cleaves sialic acid moieties from host cell molecules as well as virus particles, this removal may happen in the trans Golgi network. — an NCBI CDD conserved domain (cd15469); members share this curated model.
