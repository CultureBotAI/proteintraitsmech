identifier: CDD:cd17510
label: "Uncharacterized protein is structurally similar to type III secretion system chaperones and YbjN family proteins. This family includes an uncharacterized protein from Methanothermobacter Thermautotrophicus that is structurally similar to type III secretion system (T3SS) chaperones (T3SC) that bind effector proteins, and is homologous to YbjN, a putative sensory transduction regulator protein found in Proteobacteria."
definition: >-
  Uncharacterized protein is structurally similar to type III secretion system chaperones and YbjN family proteins. This family includes an uncharacterized protein from Methanothermobacter Thermautotrophicus that is structurally similar to type III secretion system (T3SS) chaperones (T3SC) that bind effector proteins, and is homologous to YbjN, a putative sensory transduction regulator protein found in Proteobacteria. — an NCBI CDD conserved domain (cd17510); members share this curated model.
