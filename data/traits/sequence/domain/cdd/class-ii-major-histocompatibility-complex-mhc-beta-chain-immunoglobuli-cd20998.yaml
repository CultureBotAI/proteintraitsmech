identifier: CDD:cd20998
label: "Class II major histocompatibility complex (MHC) beta chain immunoglobulin domain of histocompatibility antigen (HLA) I-E; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the Class II major histocompatibility complex (MHC) beta chain immunoglobulin domain of histocompatibility antigen (HLA) I-E. Three genetically distinct isotypes of class II MHC molecules are found in humans (HLA-DR, HLA-DQ, and HLA-DP), and two in mice (I-E and I-A).  I-A and I-E molecules have the same basic features insofar as peptide loading and presentation, although each interacts with distinctly different sets of peptides. They also differ in that there is a relatively high incidence of deletion of the I-E gene in both inbred strains of mice as well as wild mice and the lack of the reverse situation i.e. the deletion of I-A genes.  A detailed structural understanding of the similarities and differences between I-A and the paralogous I-E could help illuminate the respective roles these molecules play in peptide presentation and T cell activation. Mouse I-Ag7 has a genetic susceptibility to autoimmune diabetes due to its small, uncharged amino acid residue at position 57 of their beta chain which results in the absence of a salt bridge between beta 57 and Arg alpha 76, which is adjacent to the P9 pocket of the peptide-binding groove. MHC class II molecules play a key role in the initiation of the antigen-specific immune reponse. These molecules have been shown to be expressed constitutively on the cell surface of professional antigen-presenting cells (APCs), including B-lymphocytes, monocytes, and macrophages in both humans and mice. The expression of these molecules has been shown to be induced in nonprofessional APCs such as keratinocyctes, and they are expressed on the surface of activated human T cells and on T cells from other species. The MHC II molecules present antigenic peptides to CD4(+) T-lymphocytes. These peptides derive mostly from proteolytic processing via the endocytic pathway, of antigens internalized by the APC. These peptides bind to the MHC class II molecules in the endosome before they are transported to the cell surface. MHC class II molecules are heterodimers, comprised of two similarly-sized membrane-spanning chains, alpha and beta. Each chain had two globular domains (N- and C-terminal), and a membrane-anchoring transmembrane segment. The two chains form a compact four-domain structure. The peptide-binding site is a cleft in the structure."
definition: >-
  Class II major histocompatibility complex (MHC) beta chain immunoglobulin domain of histocompatibility antigen (HLA) I-E; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the Class II major histocompatibility complex (MHC) beta chain immunoglobulin domain of histocompatibility antigen (HLA) I-E. Three genetically distinct isotypes of class II MHC molecules are found in humans (HLA-DR, HLA-DQ, and HLA-DP), and two in mice (I-E and I-A). I-A and I-E molecules have the same basic features insofar as peptide loading and presentation, although each interacts with distinctly different sets of peptides. They also differ in that there is a relatively high incidence of deletion of the I-E gene in both inbred strains of mice as well as wild mice and the lack of the reverse situation i.e. the deletion of I-A genes. A detailed structural understanding of the similarities and differences between I-A and the paralogous I-E could help illuminate the respective roles these molecules play in peptide presentation and T cell activation. Mouse I-Ag7 has a genetic susceptibility to autoimmune diabetes due to its small, uncharged amino acid residue at position 57 of their beta chain which results in the absence of a salt bridge between beta 57 and Arg alpha 76, which is adjacent to the P9 pocket of the peptide-binding groove. MHC class II molecules play a key role in the initiation of the antigen-specific immune reponse. These molecules have been shown to be expressed constitutively on the cell surface of professional antigen-presenting cells (APCs), including B-lymphocytes, monocytes, and macrophages in both humans and mice. The expression of these molecules has been shown to be induced in nonprofessional APCs such as keratinocyctes, and they are expressed on the surface of activated human T cells and on T cells from other species. The MHC II molecules present antigenic peptides to CD4(+) T-lymphocytes. These peptides derive mostly from proteolytic processing via the endocytic pathway, of antigens internalized by the APC. These peptides bind to the MHC class II molecules in the endosome before they are transported to the cell surface. MHC class II molecules are heterodimers, comprised of two similarly-sized membrane-spanning chains, alpha and beta. Each chain had two globular domains (N- and C-terminal), and a membrane-anchoring transmembrane segment. The two chains form a compact four-domain structure. The peptide-binding site is a cleft in the structure. — an NCBI CDD conserved domain (cd20998); members share this curated model.
