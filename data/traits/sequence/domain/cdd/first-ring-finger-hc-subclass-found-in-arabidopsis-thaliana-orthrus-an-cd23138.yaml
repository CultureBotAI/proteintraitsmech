identifier: CDD:cd23138
label: "first RING finger, HC subclass, found in Arabidopsis thaliana ORTHRUS and similar proteins. This subfamily includes Arabidopsis thaliana ORTHRUS 1-5. They are E3 ubiquitin-protein ligases that may participate in CpG methylation-dependent transcriptional regulation and/or epigenetic transcriptional silencing. ORTHRUS 1 mediates ubiquitination with the E2 ubiquitin-conjugating enzymes UBC11, UBC8 and UBC8 homologs (e.g. UBC10, UBC11, UBC28 and UBC29) but not with UBC27, UBC30, UBC32, UBC34 and UBC36. ORTHRUS 2 and 5 mediate ubiquitination with the E2 ubiquitin-conjugating enzyme UBC11. ORTHRUS 1 and 2 promote methylation-mediated gene silencing leading, for example, to early flowering. They can bind to CpG, CpNpG, and CpNpN DNA motifs, with a strong preference for methylated forms, and with highest affinity for CpG substrates. Members of this subfamily contain two typical C3HC4-type RING-HC fingers. This model corresponds to the first one."
definition: >-
  first RING finger, HC subclass, found in Arabidopsis thaliana ORTHRUS and similar proteins. This subfamily includes Arabidopsis thaliana ORTHRUS 1-5. They are E3 ubiquitin-protein ligases that may participate in CpG methylation-dependent transcriptional regulation and/or epigenetic transcriptional silencing. ORTHRUS 1 mediates ubiquitination with the E2 ubiquitin-conjugating enzymes UBC11, UBC8 and UBC8 homologs (e.g. UBC10, UBC11, UBC28 and UBC29) but not with UBC27, UBC30, UBC32, UBC34 and UBC36. ORTHRUS 2 and 5 mediate ubiquitination with the E2 ubiquitin-conjugating enzyme UBC11. ORTHRUS 1 and 2 promote methylation-mediated gene silencing leading, for example, to early flowering. They can bind to CpG, CpNpG, and CpNpN DNA motifs, with a strong preference for methylated forms, and with highest affinity for CpG substrates. Members of this subfamily contain two typical C3HC4-type RING-HC fingers. This model corresponds to the first one. — an NCBI CDD conserved domain (cd23138); members share this curated model.
