identifier: CDD:cd21046
label: "limiting CO2-inducible proteins B/C beta carbonyic anhydrases. The family includes limiting CO2-inducible B protein (LCIB), limiting CO2-inducible C protein (LCIC) from Chlamydomonas reinhardtii, and their homologs from Phaeodactylum tricornutum (LCIB1-4), all of which structurally resemble beta-CAs with striking similarities in overall fold, zinc-binding motif, and especially putative active site architecture. However, only three of the six homologs are functional carbonic anhydrases (CAs). LCIB-LCIC complex plays an important role in the microalgal CO2-concentrating mechanisms (CCMs)."
definition: >-
  limiting CO2-inducible proteins B/C beta carbonyic anhydrases. The family includes limiting CO2-inducible B protein (LCIB), limiting CO2-inducible C protein (LCIC) from Chlamydomonas reinhardtii, and their homologs from Phaeodactylum tricornutum (LCIB1-4), all of which structurally resemble beta-CAs with striking similarities in overall fold, zinc-binding motif, and especially putative active site architecture. However, only three of the six homologs are functional carbonic anhydrases (CAs). LCIB-LCIC complex plays an important role in the microalgal CO2-concentrating mechanisms (CCMs). — an NCBI CDD conserved domain (cd21046); members share this curated model.
