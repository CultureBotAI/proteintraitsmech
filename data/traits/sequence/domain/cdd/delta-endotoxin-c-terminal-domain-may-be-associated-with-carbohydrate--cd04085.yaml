identifier: CDD:cd04085
label: "delta-endotoxin C-terminal domain may be associated with carbohydrate binding functionality. Delta-endotoxin C-terminal domain (delta endotoxin domain III) is part of the activated region of delta endotoxins, which are insecticidal toxins produced during sporulation by Bacillus species of bacteria. The activated endotoxin binds to the gut epithelium and causes cell lysis leading to death. This activated region of the delta endotoxin is composed of three structural domains. The N-terminal helical domain (I) is involved in membrane insertion and pore formation, while the second and third domains (II and III) are involved in receptor binding. Domain III structurally resembles the carbohydrate binding domain 6 (CBM6) and it is possible that insect specificity is determined by protein-protein or protein-carbohydrate interactions mediated by both domains II and III of the toxin. Delta-endotoxins are of great interest for development of new bioinsecticides and in the control of mosquitoes."
