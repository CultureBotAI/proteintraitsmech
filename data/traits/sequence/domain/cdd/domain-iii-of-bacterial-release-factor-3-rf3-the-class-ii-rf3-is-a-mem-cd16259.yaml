identifier: CDD:cd16259
label: "Domain III of bacterial Release Factor 3 (RF3). The class II RF3 is a member of one of two release factor (RF) classes required for the termination of protein synthesis by the ribosome. RF3 is a GTPase that removes class I RFs (RF1 or RF2) from the ribosome after release of the nascent polypeptide. RF3 in the GDP state binds to the ribosomal class I RF complex, followed by an exchange of GDP for GTP and release of the class I RF. Sequence comparison of class II release factors with elongation factors shows that prokaryotic RF3 is more similar to EF-G whereas eukaryotic eRF3 is more similar to eEF1A, implying that their precise function may differ."
definition: >-
  Domain III of bacterial Release Factor 3 (RF3). The class II RF3 is a member of one of two release factor (RF) classes required for the termination of protein synthesis by the ribosome. RF3 is a GTPase that removes class I RFs (RF1 or RF2) from the ribosome after release of the nascent polypeptide. RF3 in the GDP state binds to the ribosomal class I RF complex, followed by an exchange of GDP for GTP and release of the class I RF. Sequence comparison of class II release factors with elongation factors shows that prokaryotic RF3 is more similar to EF-G whereas eukaryotic eRF3 is more similar to eEF1A, implying that their precise function may differ. — an NCBI CDD conserved domain (cd16259); members share this curated model.
