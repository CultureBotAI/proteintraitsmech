identifier: CDD:cd12455
label: "RNA recognition motif (RRM)-like Smg4_UPF3 domain in yeast up-frameshift suppressor 3 (Upf3p), Caenorhabditis elegans SMG-4, their human orthologs Upf3A and Upf3B, and similar proteins. This subfamily corresponds to the RRM-like Smg4_UPF3 domain found in yeast up-frameshift suppressor 3 (Upf3p), Caenorhabditis elegans SMG-4, their human orthologs Upf3A and Upf3B, and similar proteins. Upf3p, also termed nonsense-mediated mRNA decay protein 3, or Sua6p, a surveillance factor encoded by UPF3 gene from Saccharomyces cerevisiae. It is required for nonsense-mediated mRNA decay (NMD) in yeast. Upf3p is primarily cytoplasmic but accumulates inside the nucleus. Its nuclear import is mediated by the Srp1p (importin-alpha)/beta heterodimer while its nuclear export is mediated by a leucine-rich nuclear export sequence (NES-A), but not the Crm1p exportin. C. elegans SMG-4 is a nuclear shuttling protein that shuttles between the cytoplasm and nucleus through nuclear import and export signals similar to that of the yeast Upf3p. It is regulated by phosphorylation. Human orthologs of yeast Upf3p and C. elegans SMG-4 include Upf3A and Upf3B, which derive from two genes, UPF3A and X-linked UPF3B, respectively. Both, Upf3A (Up-frameshift suppressor 3 homolog A, also termed regulator of nonsense transcripts 3A, or nonsense mRNA reducing factor 3A) and Upf3B (Up-frameshift suppressor 3 homolog B on chromosome X, also termed regulator of nonsense transcripts 3B, or nonsense mRNA reducing factor 3B), are nucleocytoplasmic shuttling proteins. They associate selectively with spliced beta-globin mRNA in vivo, and tethering of any human Upf protein to the 3'UTR of beta-globin mRNA prevents NMD. The function of the Upf proteins in identifying and targeting nonsense mRNAs for rapid decay is conserved among eukaryotes. Besides, all Upf proteins in this family contain a conserved Smg4_UPF3 domain with some similarity to an RNA recognition motif (RRM), indicating that they may be RNA binding proteins."
definition: >-
  RNA recognition motif (RRM)-like Smg4_UPF3 domain in yeast up-frameshift suppressor 3 (Upf3p), Caenorhabditis elegans SMG-4, their human orthologs Upf3A and Upf3B, and similar proteins. This subfamily corresponds to the RRM-like Smg4_UPF3 domain found in yeast up-frameshift suppressor 3 (Upf3p), Caenorhabditis elegans SMG-4, their human orthologs Upf3A and Upf3B, and similar proteins. Upf3p, also termed nonsense-mediated mRNA decay protein 3, or Sua6p, a surveillance factor encoded by UPF3 gene from Saccharomyces cerevisiae. It is required for nonsense-mediated mRNA decay (NMD) in yeast. Upf3p is primarily cytoplasmic but accumulates inside the nucleus. Its nuclear import is mediated by the Srp1p (importin-alpha)/beta heterodimer while its nuclear export is mediated by a leucine-rich nuclear export sequence (NES-A), but not the Crm1p exportin. C. elegans SMG-4 is a nuclear shuttling protein that shuttles between the cytoplasm and nucleus through nuclear import and export signals similar to that of the yeast Upf3p. It is regulated by phosphorylation. Human orthologs of yeast Upf3p and C. elegans SMG-4 include Upf3A and Upf3B, which derive from two genes, UPF3A and X-linked UPF3B, respectively. Both, Upf3A (Up-frameshift suppressor 3 homolog A, also termed regulator of nonsense transcripts 3A, or nonsense mRNA reducing factor 3A) and Upf3B (Up-frameshift suppressor 3 homolog B on chromosome X, also termed regulator of nonsense transcripts 3B, or nonsense mRNA reducing factor 3B), are nucleocytoplasmic shuttling proteins. They associate selectively with spliced beta-globin mRNA in vivo, and tethering of any human Upf protein to the 3'UTR of beta-globin mRNA prevents NMD. The function of the Upf proteins in identifying and targeting nonsense mRNAs for rapid decay is conserved among eukaryotes. Besides, all Upf proteins in this family contain a conserved Smg4_UPF3 domain with some similarity to an RNA recognition motif (RRM), indicating that they may be RNA binding proteins. — an NCBI CDD conserved domain (cd12455); members share this curated model.
