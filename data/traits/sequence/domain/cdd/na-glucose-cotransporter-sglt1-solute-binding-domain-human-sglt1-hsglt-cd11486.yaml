identifier: CDD:cd11486
label: "Na(+)/glucose cotransporter SGLT1;solute binding domain. Human SGLT1 (hSGLT1) is a high-affinity/low-capacity glucose transporter, which can also transport galactose. In the transport mechanism, two Na+ ions first bind to the extracellular side of the transporter and induce a conformational change in the glucose binding site. This results in an increased affinity for glucose. A second conformational change in the transporter follows, bringing the Na+ and glucose binding sites to the inner surface of the membrane. Glucose is then released, followed by the Na+ ions. In the process, hSGLT1 is also able to transport water and urea and may be a major pathway for transport of these across the intestinal brush-border membrane. hSGLT1 is encoded by the SLC5A1 gene and expressed mostly in the intestine, but also in the trachea, kidney, heart, brain, testis, and prostate. The WHO/UNICEF oral rehydration solution (ORS) for the treatment of secretory diarrhea contains salt and glucose. The glucose, along with sodium ions, is transported by hSGLT1 and water is either co-transported along with these or follows by osmosis. Mutations in SGLT1 are associated with intestinal glucose galactose malabsorption (GGM). Up-regulation of intestinal SGLT1 may protect against enteric infections. SGLT1 is expressed in colorectal, head and neck, and prostate tumors. Epidermal growth factor receptor (EGFR) functions in cell survival by stabilizing SGLT1, and thereby maintaining intracellular glucose levels. SGLT1 is predicted to have 14 membrane-spanning regions. This subgroup belongs to the solute carrier 5 (SLC5)transporter family."
definition: >-
  Na(+)/glucose cotransporter SGLT1;solute binding domain. Human SGLT1 (hSGLT1) is a high-affinity/low-capacity glucose transporter, which can also transport galactose. In the transport mechanism, two Na+ ions first bind to the extracellular side of the transporter and induce a conformational change in the glucose binding site. This results in an increased affinity for glucose. A second conformational change in the transporter follows, bringing the Na+ and glucose binding sites to the inner surface of the membrane. Glucose is then released, followed by the Na+ ions. In the process, hSGLT1 is also able to transport water and urea and may be a major pathway for transport of these across the intestinal brush-border membrane. hSGLT1 is encoded by the SLC5A1 gene and expressed mostly in the intestine, but also in the trachea, kidney, heart, brain, testis, and prostate. The WHO/UNICEF oral rehydration solution (ORS) for the treatment of secretory diarrhea contains salt and glucose. The glucose, along with sodium ions, is transported by hSGLT1 and water is either co-transported along with these or follows by osmosis. Mutations in SGLT1 are associated with intestinal glucose galactose malabsorption (GGM). Up-regulation of intestinal SGLT1 may protect against enteric infections. SGLT1 is expressed in colorectal, head and neck, and prostate tumors. Epidermal growth factor receptor (EGFR) functions in cell survival by stabilizing SGLT1, and thereby maintaining intracellular glucose levels. SGLT1 is predicted to have 14 membrane-spanning regions. This subgroup belongs to the solute carrier 5 (SLC5)transporter family. — an NCBI CDD conserved domain (cd11486); members share this curated model.
