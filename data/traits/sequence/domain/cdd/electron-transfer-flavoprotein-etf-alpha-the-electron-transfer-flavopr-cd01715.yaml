identifier: CDD:cd01715
label: "electron transfer flavoprotein (ETF) alpha. The electron transfer flavoprotein (ETF) serves as a specific electron acceptor for various mitochondrial dehydrogenases. ETF transfers electrons to the main respiratory chain via ETF-ubiquinone oxidoreductase. ETF is a heterodimer, consisting of an alpha and a beta subunit, which binds one molecule of FAD per dimer. A similar system also exists in some bacteria. The homologous pair of proteins (FixA/FixB) are essential for nitrogen fixation. The alpha subunit of ETF is structurally related to the bacterial nitrogen fixation protein fixB which could play a role in a redox process and feed electrons to ferredoxin."
definition: >-
  electron transfer flavoprotein (ETF) alpha. The electron transfer flavoprotein (ETF) serves as a specific electron acceptor for various mitochondrial dehydrogenases. ETF transfers electrons to the main respiratory chain via ETF-ubiquinone oxidoreductase. ETF is a heterodimer, consisting of an alpha and a beta subunit, which binds one molecule of FAD per dimer. A similar system also exists in some bacteria. The homologous pair of proteins (FixA/FixB) are essential for nitrogen fixation. The alpha subunit of ETF is structurally related to the bacterial nitrogen fixation protein fixB which could play a role in a redox process and feed electrons to ferredoxin. — an NCBI CDD conserved domain (cd01715); members share this curated model.
