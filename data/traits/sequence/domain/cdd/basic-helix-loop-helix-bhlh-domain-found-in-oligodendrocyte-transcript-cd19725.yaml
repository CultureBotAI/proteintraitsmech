identifier: CDD:cd19725
label: "basic helix-loop-helix (bHLH) domain found in oligodendrocyte transcription factors, Oligo2, Oligo3 and similar proteins. The family includes two bHLH transcription factors, Oligo2 and Oligo3. Oligo2, also termed Class B basic helix-loop-helix protein 1 (bHLHb1), or Class E basic helix-loop-helix protein 19 (bHLHe19), or protein kinase C-binding protein 2, or protein kinase C-binding protein RACK17, is required for oligodendrocyte and motor neuron specification in the spinal cord, as well as for the development of somatic motor neurons in the hindbrain. It cooperates with OLIG1 to establish the MN progenitors (pMN) domain of the embryonic neural tube. Oligo3, also termed Class B basic helix-loop-helix protein 7 (bHLHb7), or Class E basic helix-loop-helix protein 20 (bHLHe20), is expressed in the ventricular zone of the dorsal alar plate of the hindbrain and involved in regulating the development of dorsal and ventral spinal cord. It may determine the distinct specification program of class A neurons in the dorsal part of the spinal cord and suppress specification of class B neurons."
definition: >-
  basic helix-loop-helix (bHLH) domain found in oligodendrocyte transcription factors, Oligo2, Oligo3 and similar proteins. The family includes two bHLH transcription factors, Oligo2 and Oligo3. Oligo2, also termed Class B basic helix-loop-helix protein 1 (bHLHb1), or Class E basic helix-loop-helix protein 19 (bHLHe19), or protein kinase C-binding protein 2, or protein kinase C-binding protein RACK17, is required for oligodendrocyte and motor neuron specification in the spinal cord, as well as for the development of somatic motor neurons in the hindbrain. It cooperates with OLIG1 to establish the MN progenitors (pMN) domain of the embryonic neural tube. Oligo3, also termed Class B basic helix-loop-helix protein 7 (bHLHb7), or Class E basic helix-loop-helix protein 20 (bHLHe20), is expressed in the ventricular zone of the dorsal alar plate of the hindbrain and involved in regulating the development of dorsal and ventral spinal cord. It may determine the distinct specification program of class A neurons in the dorsal part of the spinal cord and suppress specification of class B neurons. — an NCBI CDD conserved domain (cd19725); members share this curated model.
