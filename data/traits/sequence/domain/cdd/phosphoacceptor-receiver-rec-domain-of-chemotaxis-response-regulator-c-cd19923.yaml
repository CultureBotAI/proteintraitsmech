identifier: CDD:cd19923
label: "phosphoacceptor receiver (REC) domain of chemotaxis response regulator CheY3 and similar CheY family proteins. CheY family chemotaxis response regulators (RRs) comprise about 17%  of bacterial RRs and almost half of all RRs in archaea. This subfamily contains Vibrio cholerae CheY3, Escherichia coli CheY, and similar CheY family RRs. CheY proteins control bacterial motility and participate in signaling phosphorelays and in protein-protein interactions. CheY RRs contain only the REC domain with no output/effector domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of chemotaxis response regulator CheY3 and similar CheY family proteins. CheY family chemotaxis response regulators (RRs) comprise about 17% of bacterial RRs and almost half of all RRs in archaea. This subfamily contains Vibrio cholerae CheY3, Escherichia coli CheY, and similar CheY family RRs. CheY proteins control bacterial motility and participate in signaling phosphorelays and in protein-protein interactions. CheY RRs contain only the REC domain with no output/effector domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd19923); members share this curated model.
