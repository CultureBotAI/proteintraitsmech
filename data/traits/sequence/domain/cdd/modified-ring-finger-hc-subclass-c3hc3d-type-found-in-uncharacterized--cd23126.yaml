identifier: CDD:cd23126
label: "Modified RING finger, HC subclass (C3HC3D-type), found in uncharacterized proteins similar to tumor necrosis factor (TNF) receptor-associated factor 4 (TRAF4). This subfamily corresponds to a group of uncharacterized proteins that shows high sequence similarity with tumor necrosis factor (TNF) receptor-associated factor 4 (TRAF4). TRAF4, also known as cysteine-rich domain associated with RING and Traf domains protein 1, or metastatic lymph node gene 62 protein (MLN 62), or RING finger protein 83 (RNF83), is a member of TRAF protein family, which mainly function in the immune system, where they mediate signaling through tumor necrosis factor receptors (TNFRs) and interleukin-1/Toll-like receptors (IL-1/TLRs). It also plays a critical role in the nervous system, as well as in carcinogenesis. Like TRAF4, members of this subfamily contain a modified C3HC3D-type RING-HC finger."
definition: >-
  Modified RING finger, HC subclass (C3HC3D-type), found in uncharacterized proteins similar to tumor necrosis factor (TNF) receptor-associated factor 4 (TRAF4). This subfamily corresponds to a group of uncharacterized proteins that shows high sequence similarity with tumor necrosis factor (TNF) receptor-associated factor 4 (TRAF4). TRAF4, also known as cysteine-rich domain associated with RING and Traf domains protein 1, or metastatic lymph node gene 62 protein (MLN 62), or RING finger protein 83 (RNF83), is a member of TRAF protein family, which mainly function in the immune system, where they mediate signaling through tumor necrosis factor receptors (TNFRs) and interleukin-1/Toll-like receptors (IL-1/TLRs). It also plays a critical role in the nervous system, as well as in carcinogenesis. Like TRAF4, members of this subfamily contain a modified C3HC3D-type RING-HC finger. — an NCBI CDD conserved domain (cd23126); members share this curated model.
