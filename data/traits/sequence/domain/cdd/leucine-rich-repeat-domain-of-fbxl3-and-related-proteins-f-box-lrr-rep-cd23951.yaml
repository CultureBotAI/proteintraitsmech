identifier: CDD:cd23951
label: "Leucine-rich repeat domain of FBXL3 and related proteins. F-box/LRR-repeat proteins are part of Skp1-Cul1-F-box-protein (SCF) ubiquitin ligase complexes. They contain an F-Box, which binds to the core complex component SKP and a leucine-rich repeat (LRR) domain which gives substrate binding specificity. FBXL3 (F-box and leucine rich repeat protein 3) and FBXL21 have been shown to bind CRY1 repressors and are involved in regulation of circadian clock."
definition: >-
  Leucine-rich repeat domain of FBXL3 and related proteins. F-box/LRR-repeat proteins are part of Skp1-Cul1-F-box-protein (SCF) ubiquitin ligase complexes. They contain an F-Box, which binds to the core complex component SKP and a leucine-rich repeat (LRR) domain which gives substrate binding specificity. FBXL3 (F-box and leucine rich repeat protein 3) and FBXL21 have been shown to bind CRY1 repressors and are involved in regulation of circadian clock. — an NCBI CDD conserved domain (cd23951); members share this curated model.
