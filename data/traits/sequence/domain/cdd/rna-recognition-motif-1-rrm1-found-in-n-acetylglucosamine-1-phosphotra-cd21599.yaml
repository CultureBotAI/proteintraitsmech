identifier: CDD:cd21599
label: "RNA recognition motif 1 (RRM1) found in N-acetylglucosamine-1-phosphotransferase subunits alpha/beta (GNPTAB) and similar proteins. GNPTAB, also termed GlcNAc-1-phosphotransferase subunits alpha/beta, or stealth protein GNPTAB, or UDP-N-acetylglucosamine-1-phosphotransferase subunits alpha/beta, catalyzes the formation of mannose 6-phosphate (M6P) markers on high mannose type oligosaccharides in the Golgi apparatus. M6P residues are required to bind to the M6P receptors (MPR), which mediate the vesicular transport of lysosomal enzymes to the endosomal/prelysosomal compartment. The model corresponds to the RNA recognition motif 1 (RRM1) of GNPTAB. Its functional significance remains to be investigated."
definition: >-
  RNA recognition motif 1 (RRM1) found in N-acetylglucosamine-1-phosphotransferase subunits alpha/beta (GNPTAB) and similar proteins. GNPTAB, also termed GlcNAc-1-phosphotransferase subunits alpha/beta, or stealth protein GNPTAB, or UDP-N-acetylglucosamine-1-phosphotransferase subunits alpha/beta, catalyzes the formation of mannose 6-phosphate (M6P) markers on high mannose type oligosaccharides in the Golgi apparatus. M6P residues are required to bind to the M6P receptors (MPR), which mediate the vesicular transport of lysosomal enzymes to the endosomal/prelysosomal compartment. The model corresponds to the RNA recognition motif 1 (RRM1) of GNPTAB. Its functional significance remains to be investigated. — an NCBI CDD conserved domain (cd21599); members share this curated model.
