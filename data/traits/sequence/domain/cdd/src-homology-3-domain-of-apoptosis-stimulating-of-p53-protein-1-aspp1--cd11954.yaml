identifier: CDD:cd11954
label: "Src Homology 3 domain of Apoptosis Stimulating of p53 protein 1. ASPP1, like ASPP2, activates the apoptotic function of the p53 family of tumor suppressors (p53, p63, and p73). In addition, it functions in the cytoplasm to regulate the nuclear localization of the transcriptional cofactors YAP and TAZ by inihibiting their phosphorylation; YAP and TAZ are important regulators of cell expansion, differentiation, migration, and invasion. ASPP1 is downregulated in breast tumors expressing wild-type p53. It contains a proline-rich region, four ankyrin (ANK) repeats, and an SH3 domain at its C-terminal half. The SH3 domain and the ANK repeats of ASPP1 contribute to the p53 binding site; they bind to the DNA binding domain of p53. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Apoptosis Stimulating of p53 protein 1. ASPP1, like ASPP2, activates the apoptotic function of the p53 family of tumor suppressors (p53, p63, and p73). In addition, it functions in the cytoplasm to regulate the nuclear localization of the transcriptional cofactors YAP and TAZ by inihibiting their phosphorylation; YAP and TAZ are important regulators of cell expansion, differentiation, migration, and invasion. ASPP1 is downregulated in breast tumors expressing wild-type p53. It contains a proline-rich region, four ankyrin (ANK) repeats, and an SH3 domain at its C-terminal half. The SH3 domain and the ANK repeats of ASPP1 contribute to the p53 binding site; they bind to the DNA binding domain of p53. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11954); members share this curated model.
