identifier: CDD:cd14764
label: "Sensor single-domain globins; uncharacterized subgroup. This subfamily of sensor single-domain globins, belongs to a family that includes GCSs (globin-coupled-sensors) and single-domain protoglobins (Pgbs). For GCSs, an N-terminal heme-bound oxygen-sensing/binding globin domain is coupled to a C-terminal functional/signaling domain. The first signal O2 binds to/dissociates from the heme in its sensor domain inducing a conformational change in that domain and ultimately in the signaling domain. It has been demonstrated that the Pgbs and other single domain globins can function as sensors, when coupled to an appropriate regulatory domain."
definition: >-
  Sensor single-domain globins; uncharacterized subgroup. This subfamily of sensor single-domain globins, belongs to a family that includes GCSs (globin-coupled-sensors) and single-domain protoglobins (Pgbs). For GCSs, an N-terminal heme-bound oxygen-sensing/binding globin domain is coupled to a C-terminal functional/signaling domain. The first signal O2 binds to/dissociates from the heme in its sensor domain inducing a conformational change in that domain and ultimately in the signaling domain. It has been demonstrated that the Pgbs and other single domain globins can function as sensors, when coupled to an appropriate regulatory domain. — an NCBI CDD conserved domain (cd14764); members share this curated model.
