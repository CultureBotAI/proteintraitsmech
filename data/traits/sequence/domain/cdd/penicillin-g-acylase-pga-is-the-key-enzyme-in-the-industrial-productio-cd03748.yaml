identifier: CDD:cd03748
label: "Penicillin G acylase (PGA) is the key enzyme in the industrial production of beta-lactam antibiotics. PGA hydrolyzes the side chain of penicillin G and related beta-lactam antibiotics releasing 6-amino penicillanic acid (6-APA), a building block in the production of semisynthetic penicillins.  PGA is widely distributed among microorganisms, including bacteria, yeast and filamentous fungi but it's in vivo role remains unclear."
definition: >-
  Penicillin G acylase (PGA) is the key enzyme in the industrial production of beta-lactam antibiotics. PGA hydrolyzes the side chain of penicillin G and related beta-lactam antibiotics releasing 6-amino penicillanic acid (6-APA), a building block in the production of semisynthetic penicillins. PGA is widely distributed among microorganisms, including bacteria, yeast and filamentous fungi but it's in vivo role remains unclear. — an NCBI CDD conserved domain (cd03748); members share this curated model.
