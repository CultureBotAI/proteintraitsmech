identifier: CDD:cd16555
label: "RING finger, HC subclass, found in RING finger protein 182 (RNF182) and similar proteins. RNF182 is a brain-enriched E3 ubiquitin-protein ligase that stimulates E2-dependent polyubiquitination in vitro. It is upregulated in Alzheimer\"s disease (AD) brains and neuronal cells exposed to injurious insults. It interacts with ATP6V0C and promotes its degradation by the ubiquitin-proteosome pathway, suggesting a very specific role in controlling the turnover of an essential component of the neurotransmitter release machinery. RNF182 contains an N-terminal C3HC4-type RING-HC finger, and a C-terminal transmembrane domain."
definition: >-
  RING finger, HC subclass, found in RING finger protein 182 (RNF182) and similar proteins. RNF182 is a brain-enriched E3 ubiquitin-protein ligase that stimulates E2-dependent polyubiquitination in vitro. It is upregulated in Alzheimer"s disease (AD) brains and neuronal cells exposed to injurious insults. It interacts with ATP6V0C and promotes its degradation by the ubiquitin-proteosome pathway, suggesting a very specific role in controlling the turnover of an essential component of the neurotransmitter release machinery. RNF182 contains an N-terminal C3HC4-type RING-HC finger, and a C-terminal transmembrane domain. — an NCBI CDD conserved domain (cd16555); members share this curated model.
