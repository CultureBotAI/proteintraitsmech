identifier: CDD:cd18903
label: Ribosomal_S8
definition: >-
  Ribosomal small subunit protein S8, bacteria and eukaryotic mitochondria and chloroplast. The small subunit S8 of the bacterial ribosome including the S8 from bacteria as well as from eukaryotic mitochondria and chloroplast. Bacterial 70S ribosome is formed by the small 30S and large 50S subunits. The 30S subunit is composed of 16S rRNA and about 21 proteins. Ribosome is a highly organized dynamic complex. The complex formed between bacterial ribosomal protein S8 and 16S rRNA is highly conserved and the same conserved secondary structure element is found in the bacterial spc operon that the translation of genes encoded by the spc operon, including those of S8 and several other ribosomal proteins, is repressed by the binding of r-protein S8 at this site. Mitochondrial and chloroplastic ribosomes synthesize proteins that are involved in oxidative phosphorylation (ATP generation) and photosynthesis. uS8 is one of the fourteen mitochondrial ribosomal proteins that is known to have significant sequence homology with their bacterial counterpart
