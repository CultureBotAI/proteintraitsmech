identifier: CDD:cd11243
label: "The Sema domain, a protein interacting module, of semaphorin 7A (Sema7A, also called CD108). Sema7A plays regulatory roles in both immune and nervous systems. Unlike other semaphorins, which act as repulsive guidance cues, Sema7A enhances central and peripheral axon growth and is required for proper axon tract formation during embryonic development. Sema7A also plays a critical role in the negative regulation of T cell activation and function. Sema7A is a membrane-anchored member of the semaphorin family of proteins. Semaphorins are regulatory molecules in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of semaphorin 7A (Sema7A, also called CD108). Sema7A plays regulatory roles in both immune and nervous systems. Unlike other semaphorins, which act as repulsive guidance cues, Sema7A enhances central and peripheral axon growth and is required for proper axon tract formation during embryonic development. Sema7A also plays a critical role in the negative regulation of T cell activation and function. Sema7A is a membrane-anchored member of the semaphorin family of proteins. Semaphorins are regulatory molecules in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module. — an NCBI CDD conserved domain (cd11243); members share this curated model.
