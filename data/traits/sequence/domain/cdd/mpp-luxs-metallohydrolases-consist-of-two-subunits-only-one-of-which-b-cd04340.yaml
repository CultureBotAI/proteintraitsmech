identifier: CDD:cd04340
label: "MPP/LuxS_metallohydrolases consist of two subunits, only one of which, Beta, harbors the proteolytic active site. Each of the subunits, Alpha and Beta, is a result of fusion of two homologous domains. Each of these two domains is in turn homologous to LuxS. The peptidases coordinate a metal ion, at least in many cases, if not all, it is Zinc. They function in a variety of pathways, including mitochondrial and chloroplast presequence cleavage, quorum sensing in bacteria, hemoglobin catabolism in P. falciparum, insulin degradation, alpha-factor production in yeast, and others.  This CD contains an alignment of the N-terminal of the two fused domains. It is from both Alpha and Beta subunits."
definition: >-
  MPP/LuxS_metallohydrolases consist of two subunits, only one of which, Beta, harbors the proteolytic active site. Each of the subunits, Alpha and Beta, is a result of fusion of two homologous domains. Each of these two domains is in turn homologous to LuxS. The peptidases coordinate a metal ion, at least in many cases, if not all, it is Zinc. They function in a variety of pathways, including mitochondrial and chloroplast presequence cleavage, quorum sensing in bacteria, hemoglobin catabolism in P. falciparum, insulin degradation, alpha-factor production in yeast, and others. This CD contains an alignment of the N-terminal of the two fused domains. It is from both Alpha and Beta subunits. — an NCBI CDD conserved domain (cd04340); members share this curated model.
