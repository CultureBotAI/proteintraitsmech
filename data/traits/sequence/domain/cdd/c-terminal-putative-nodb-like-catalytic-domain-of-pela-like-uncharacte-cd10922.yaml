identifier: CDD:cd10922
label: "C-terminal Putative NodB-like catalytic domain of PelA-like uncharacterized hypothetical proteins found in bacteria. This family is represented by a protein PelA of unknown function that is encoded by a gene in the pelA-G gene cluster for pellicle production and biofilm formation in Pseudomonas aeruginosa. PelA and most of the family members contain a domain of unknown function, DUF297, in the N-terminus and a C-terminal domain that shows high sequence similarity to the catalytic domain of the six-stranded barrel rhizobial NodB-like proteins, which remove N-linked or O-linked acetyl groups from cell wall polysaccharides and belong to the larger carbohydrate esterase 4 (CE4) superfamily."
definition: >-
  C-terminal Putative NodB-like catalytic domain of PelA-like uncharacterized hypothetical proteins found in bacteria. This family is represented by a protein PelA of unknown function that is encoded by a gene in the pelA-G gene cluster for pellicle production and biofilm formation in Pseudomonas aeruginosa. PelA and most of the family members contain a domain of unknown function, DUF297, in the N-terminus and a C-terminal domain that shows high sequence similarity to the catalytic domain of the six-stranded barrel rhizobial NodB-like proteins, which remove N-linked or O-linked acetyl groups from cell wall polysaccharides and belong to the larger carbohydrate esterase 4 (CE4) superfamily. — an NCBI CDD conserved domain (cd10922); members share this curated model.
