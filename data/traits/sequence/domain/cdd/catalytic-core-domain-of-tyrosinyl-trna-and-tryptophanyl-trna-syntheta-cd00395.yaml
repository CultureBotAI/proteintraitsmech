identifier: CDD:cd00395
label: "catalytic core domain of tyrosinyl-tRNA and tryptophanyl-tRNA synthetase. Tyrosinyl-tRNA synthetase (TyrRS)/Tryptophanyl-tRNA synthetase (TrpRS) catalytic core domain. These enzymes attach Tyr or Trp, respectively, to the appropriate tRNA. These class I enzymes are homodimers, which aminoacylate the 2'-OH of the nucleotide at the 3' of the appropriate tRNA. The core domain is based on the Rossman fold and is responsible for the ATP-dependent formation of the enzyme bound aminoacyl-adenylate. It contains the class I characteristic HIGH and KMSKS motifs, which are involved in ATP binding."
definition: >-
  catalytic core domain of tyrosinyl-tRNA and tryptophanyl-tRNA synthetase. Tyrosinyl-tRNA synthetase (TyrRS)/Tryptophanyl-tRNA synthetase (TrpRS) catalytic core domain. These enzymes attach Tyr or Trp, respectively, to the appropriate tRNA. These class I enzymes are homodimers, which aminoacylate the 2'-OH of the nucleotide at the 3' of the appropriate tRNA. The core domain is based on the Rossman fold and is responsible for the ATP-dependent formation of the enzyme bound aminoacyl-adenylate. It contains the class I characteristic HIGH and KMSKS motifs, which are involved in ATP binding. — an NCBI CDD conserved domain (cd00395); members share this curated model.
