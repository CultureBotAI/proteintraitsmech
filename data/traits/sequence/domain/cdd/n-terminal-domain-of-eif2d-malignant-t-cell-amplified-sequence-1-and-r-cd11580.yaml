identifier: CDD:cd11580
label: "N-terminal domain of eIF2D, malignant T cell-amplified sequence 1 and related proteins. This N-terminal domain of various proteins co-occurs with a PUA domain. Members of this family are: (1) MCTS-1 (malignant T cell-amplified sequence 1) or MCT-1 (multiple copies T cell malignancies), which may play roles in the regulation of the cell cycle, (2) the eukayotic translation initiation factor 2D, and (3) an uncharacterized archaeal family."
definition: >-
  N-terminal domain of eIF2D, malignant T cell-amplified sequence 1 and related proteins. This N-terminal domain of various proteins co-occurs with a PUA domain. Members of this family are: (1) MCTS-1 (malignant T cell-amplified sequence 1) or MCT-1 (multiple copies T cell malignancies), which may play roles in the regulation of the cell cycle, (2) the eukayotic translation initiation factor 2D, and (3) an uncharacterized archaeal family. — an NCBI CDD conserved domain (cd11580); members share this curated model.
