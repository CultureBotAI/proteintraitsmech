identifier: CDD:cd09557
label: "SAM domain of Smaug subfamily. SAM (sterile alpha motif) domain of Smaug proteins is an RNA recognition domain. It binds a specific RNA motif known as Smaug recognition element (SRE). Among members of this group are invertebrate Smaug (Smg) proteins and vertebrate Smaug1 and Smaug2 proteins. They are involved in post-transcriptional control during early embryogenesis in animals. In Drosophila, Smaug protein is a translational repressor of mRNA of Nanos (Nos) protein. Gradient of Nanos is required for proper abdominal segmentation. SAM domain interacts specifically with the Nanos mRNA regulatory regions. Moreover, Smaug protein is involved in regulation of specific maternal transcripts degradation in Drosophila early embryo via recruitment of the CCR4/POP2/NOT deadenylase."
definition: >-
  SAM domain of Smaug subfamily. SAM (sterile alpha motif) domain of Smaug proteins is an RNA recognition domain. It binds a specific RNA motif known as Smaug recognition element (SRE). Among members of this group are invertebrate Smaug (Smg) proteins and vertebrate Smaug1 and Smaug2 proteins. They are involved in post-transcriptional control during early embryogenesis in animals. In Drosophila, Smaug protein is a translational repressor of mRNA of Nanos (Nos) protein. Gradient of Nanos is required for proper abdominal segmentation. SAM domain interacts specifically with the Nanos mRNA regulatory regions. Moreover, Smaug protein is involved in regulation of specific maternal transcripts degradation in Drosophila early embryo via recruitment of the CCR4/POP2/NOT deadenylase. — an NCBI CDD conserved domain (cd09557); members share this curated model.
