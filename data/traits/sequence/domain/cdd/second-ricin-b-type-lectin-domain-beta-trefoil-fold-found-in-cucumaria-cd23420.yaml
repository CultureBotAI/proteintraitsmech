identifier: CDD:cd23420
label: "second ricin B-type lectin domain, beta-trefoil fold, found in Cucumaria echinata Ca2+-dependent hemolytic lectin CEL-III and similar proteins. CEL-III is a Ca2+-dependent and galactose-specific lectin that exhibits hemolytic and hemagglutinating activities. It functions as an oligomer that forms an ion-permeable pore in the cell membrane. CEL-III consists of three domains: two N-terminal ricin B-type lectin domains, and a C-terminal pore-forming domain. The ricin B-type lectin domains show a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (called alpha, beta, and gamma, respectively) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may contain a potential sugar-binding site. The model corresponds to the second ricin B-type lectin domain."
definition: >-
  second ricin B-type lectin domain, beta-trefoil fold, found in Cucumaria echinata Ca2+-dependent hemolytic lectin CEL-III and similar proteins. CEL-III is a Ca2+-dependent and galactose-specific lectin that exhibits hemolytic and hemagglutinating activities. It functions as an oligomer that forms an ion-permeable pore in the cell membrane. CEL-III consists of three domains: two N-terminal ricin B-type lectin domains, and a C-terminal pore-forming domain. The ricin B-type lectin domains show a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (called alpha, beta, and gamma, respectively) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may contain a potential sugar-binding site. The model corresponds to the second ricin B-type lectin domain. — an NCBI CDD conserved domain (cd23420); members share this curated model.
