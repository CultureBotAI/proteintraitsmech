identifier: CDD:cd08383
label: "C2 domain (first repeat) of Ras GTPase activating proteins (GAPs). RasGAPs suppress Ras function by enhancing the GTPase activity of Ras proteins resulting in the inactive GDP-bound form of Ras.  In this way it can control cellular proliferation and differentiation.  The proteins here all contain either a single C2 domain or two tandem C2 domains,  a Ras-GAP domain, and a pleckstrin homology (PH)-like domain. C2 domains fold into an 8-standed beta-sandwich that can adopt 2 structural arrangements: Type I and Type II, distinguished by a circular permutation involving their N- and C-terminal beta strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances including bind phospholipids, inositol polyphosphates, and intracellular proteins.  Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1.  However, there are a few exceptions to this including RIM isoforms and some splice variants of piccolo/aczonin and intersectin which only have a single C2 domain.  C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions. Members here have a type-I topology."
definition: >-
  C2 domain (first repeat) of Ras GTPase activating proteins (GAPs). RasGAPs suppress Ras function by enhancing the GTPase activity of Ras proteins resulting in the inactive GDP-bound form of Ras. In this way it can control cellular proliferation and differentiation. The proteins here all contain either a single C2 domain or two tandem C2 domains, a Ras-GAP domain, and a pleckstrin homology (PH)-like domain. C2 domains fold into an 8-standed beta-sandwich that can adopt 2 structural arrangements: Type I and Type II, distinguished by a circular permutation involving their N- and C-terminal beta strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances including bind phospholipids, inositol polyphosphates, and intracellular proteins. Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1. However, there are a few exceptions to this including RIM isoforms and some splice variants of piccolo/aczonin and intersectin which only have a single C2 domain. C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions. Members here have a type-I topology. — an NCBI CDD conserved domain (cd08383); members share this curated model.
