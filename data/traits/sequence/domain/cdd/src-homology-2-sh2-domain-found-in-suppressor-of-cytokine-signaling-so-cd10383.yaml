identifier: CDD:cd10383
label: "Src homology 2 (SH2) domain found in  suppressor of cytokine signaling (SOCS) proteins. SH2 domain found in SOCS proteins. SOCS was first recognized as a group of cytokine-inducible SH2 (CIS) domain proteins comprising eight family members in human (CIS and SOCS1-SOCS7).  In addition to the SH2 domain, SOCS proteins have a variable N-terminal domain and a conserved SOCS box in the C-terminal domain. SOCS proteins bind to a substrate via their SH2 domain. The prototypical members, CIS and SOCS1-SOCS3, have been shown to regulate growth hormone signaling in vitro and in a classic negative feedback response compete for binding at phosphotyrosine sites in JAK kinase and receptor pathways to displace effector proteins and target bound receptors for proteasomal degradation. Loss of SOCS activity results in excessive cytokine signaling associated with a variety of hematopoietic, autoimmune, and inflammatory diseases and certain cancers. Members (SOCS4-SOCS7) were identified by their conserved SOCS box, an adapter motif of 3 helices that associates substrate binding domains, such as the SOCS SH2 domain, ankryin, and WD40 with ubiquitin ligase components. These show limited cytokine induction. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in suppressor of cytokine signaling (SOCS) proteins. SH2 domain found in SOCS proteins. SOCS was first recognized as a group of cytokine-inducible SH2 (CIS) domain proteins comprising eight family members in human (CIS and SOCS1-SOCS7). In addition to the SH2 domain, SOCS proteins have a variable N-terminal domain and a conserved SOCS box in the C-terminal domain. SOCS proteins bind to a substrate via their SH2 domain. The prototypical members, CIS and SOCS1-SOCS3, have been shown to regulate growth hormone signaling in vitro and in a classic negative feedback response compete for binding at phosphotyrosine sites in JAK kinase and receptor pathways to displace effector proteins and target bound receptors for proteasomal degradation. Loss of SOCS activity results in excessive cytokine signaling associated with a variety of hematopoietic, autoimmune, and inflammatory diseases and certain cancers. Members (SOCS4-SOCS7) were identified by their conserved SOCS box, an adapter motif of 3 helices that associates substrate binding domains, such as the SOCS SH2 domain, ankryin, and WD40 with ubiquitin ligase components. These show limited cytokine induction. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10383); members share this curated model.
