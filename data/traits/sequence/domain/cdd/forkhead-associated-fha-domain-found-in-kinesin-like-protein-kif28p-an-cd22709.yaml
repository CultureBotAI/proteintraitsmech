identifier: CDD:cd22709
label: "forkhead associated (FHA) domain found in kinesin-like protein KIF28P and similar proteins. KIF28P, also called kinesin-like protein 6 (KLP6), is a microtubule-dependent motor protein required for mitochondrion morphology and transport of mitochondria in neuronal cells. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine."
definition: >-
