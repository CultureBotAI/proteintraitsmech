identifier: CDD:cd20441
label: "sixth Tudor domain found in Tudor domain-containing protein 15 (TDRD15) and similar proteins. TDRD15 is an uncharacterized Tudor domain-containing protein that contains seven Tudor domains. This model corresponds to the sixth one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  sixth Tudor domain found in Tudor domain-containing protein 15 (TDRD15) and similar proteins. TDRD15 is an uncharacterized Tudor domain-containing protein that contains seven Tudor domains. This model corresponds to the sixth one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20441); members share this curated model.
