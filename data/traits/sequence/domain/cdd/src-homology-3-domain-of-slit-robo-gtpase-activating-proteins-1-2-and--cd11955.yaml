identifier: CDD:cd11955
label: "Src homology 3 domain of Slit-Robo GTPase Activating Proteins 1, 2, and 3. srGAP1, also called Rho GTPase-Activating Protein 13 (ARHGAP13), is a Cdc42- and RhoA-specific GAP and is expressed later in the development of central nervous system tissues. srGAP2 is expressed in zones of neuronal differentiation. It plays a role in the regeneration of neurons and axons. srGAP3, also called MEGAP (MEntal disorder associated GTPase-Activating Protein), is a Rho GAP with activity towards Rac1 and Cdc42. It impacts cell migration by regulating actin and microtubule cytoskeletal dynamics. The association between srGAP3 haploinsufficiency and mental retardation is under debate. srGAPs are Rho GAPs that interact with Robo1, the transmembrane receptor of Slit proteins. Slit proteins are secreted proteins that control axon guidance and the migration of neurons and leukocytes. srGAPs contain an N-terminal F-BAR domain, a Rho GAP domain, and a C-terminal SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of Slit-Robo GTPase Activating Proteins 1, 2, and 3. srGAP1, also called Rho GTPase-Activating Protein 13 (ARHGAP13), is a Cdc42- and RhoA-specific GAP and is expressed later in the development of central nervous system tissues. srGAP2 is expressed in zones of neuronal differentiation. It plays a role in the regeneration of neurons and axons. srGAP3, also called MEGAP (MEntal disorder associated GTPase-Activating Protein), is a Rho GAP with activity towards Rac1 and Cdc42. It impacts cell migration by regulating actin and microtubule cytoskeletal dynamics. The association between srGAP3 haploinsufficiency and mental retardation is under debate. srGAPs are Rho GAPs that interact with Robo1, the transmembrane receptor of Slit proteins. Slit proteins are secreted proteins that control axon guidance and the migration of neurons and leukocytes. srGAPs contain an N-terminal F-BAR domain, a Rho GAP domain, and a C-terminal SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11955); members share this curated model.
