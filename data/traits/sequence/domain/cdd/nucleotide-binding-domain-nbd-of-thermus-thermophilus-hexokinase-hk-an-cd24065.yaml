identifier: CDD:cd24065
label: "nucleotide-binding domain (NBD) of Thermus thermophilus hexokinase (HK) and similar proteins. HK (EC 2.7.1.1) possesses the ability to transfer an inorganic phosphate group from ATP to a substrate. It catalyzes the ATP-dependent phosphorylation of aldo- and keto-hexose sugars to the hexose-6-phosphate (H6P). Thermus thermophilus HK possesses significant enzymatic activity against glucose and mannose. However, it shows little catalytic capacity for galactose and fructose. Members of this subfamily belong to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities."
definition: >-
  nucleotide-binding domain (NBD) of Thermus thermophilus hexokinase (HK) and similar proteins. HK (EC 2.7.1.1) possesses the ability to transfer an inorganic phosphate group from ATP to a substrate. It catalyzes the ATP-dependent phosphorylation of aldo- and keto-hexose sugars to the hexose-6-phosphate (H6P). Thermus thermophilus HK possesses significant enzymatic activity against glucose and mannose. However, it shows little catalytic capacity for galactose and fructose. Members of this subfamily belong to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities. — an NCBI CDD conserved domain (cd24065); members share this curated model.
