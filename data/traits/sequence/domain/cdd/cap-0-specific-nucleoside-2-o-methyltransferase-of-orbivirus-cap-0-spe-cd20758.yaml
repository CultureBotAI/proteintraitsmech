identifier: CDD:cd20758
label: capping_2-OMTase_Orbivirus
definition: >-
  Cap-0 specific (nucleoside-2'-O-)-methyltransferase of orbivirus. Cap-0 specific (nucleoside-2'-O-)-methyltransferase (2'OMTase) catalyzes the methylation of Cap-0 (m7GpppNp) at the 2'-hydroxyl of the ribose of the first nucleotide, using S-adenosyl-L-methionine (AdoMet) as the methyl donor. This reaction is the fourth and last step in mRNA capping, the creation of the stabilizing five-prime cap (5' cap) on mRNA. Orbiviruses, which comprise a family of dsRNA viruses, cap their mRNAs. The 2'OMTase activity is located in the multifunctional capping enzyme, VP4
