identifier: CDD:cd21207
label: "calponin homology (CH) domain found in Drosophila melanogaster muscle-specific protein 20 (dMP20) and similar domains. This subfamily contains Drosophila melanogaster muscle-specific protein 20 (dMP20), Echinococcus granulosus myophilin, Dictyostelium discoideum Rac guanine nucleotide exchange factor B (also called Trix), and similar proteins. dMP20 is present only in the synchronous muscles of D. melanogaster. It may be involved in the system linking the nerve impulse with the contraction or the relaxation process. Trix is involved in the regulation of the late steps of the endocytic pathway. dMP20 contains a single copy of the CH domain, while Trix (triple CH-domain array exchange factor) contains three, two type 3 CH domains which are included in this model, and one type 1 CH domain that is not included in this subfamily, but is part of the superfamily. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  calponin homology (CH) domain found in Drosophila melanogaster muscle-specific protein 20 (dMP20) and similar domains. This subfamily contains Drosophila melanogaster muscle-specific protein 20 (dMP20), Echinococcus granulosus myophilin, Dictyostelium discoideum Rac guanine nucleotide exchange factor B (also called Trix), and similar proteins. dMP20 is present only in the synchronous muscles of D. melanogaster. It may be involved in the system linking the nerve impulse with the contraction or the relaxation process. Trix is involved in the regulation of the late steps of the endocytic pathway. dMP20 contains a single copy of the CH domain, while Trix (triple CH-domain array exchange factor) contains three, two type 3 CH domains which are included in this model, and one type 1 CH domain that is not included in this subfamily, but is part of the superfamily. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21207); members share this curated model.
