identifier: CDD:cd17144
label: "Dublecortin-like domain 2 found in doublecortin-like kinase 2 (DCLK2). DCLK2 is a member of doublecortin (DCX) protein family that functions as a microtubule-associated protein (MAP), and contains two conserved tubulin binding domains, which typically occur in double tandem. The DCX domain has a stable ubiquitin-like tertiary fold. Ubiquitin (Ub) is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair. In addition to microtubule binding domains, DCLK encodes a serine/threonine kinase-domain that is similar to Ca/calmodulin-dependent (Cam) protein kinases. DCLK2 members regulate cyclic AMP signaling. Unlike DCX, the DCLK has varying levels of expression throughout embryonic and adult life."
definition: >-
  Dublecortin-like domain 2 found in doublecortin-like kinase 2 (DCLK2). DCLK2 is a member of doublecortin (DCX) protein family that functions as a microtubule-associated protein (MAP), and contains two conserved tubulin binding domains, which typically occur in double tandem. The DCX domain has a stable ubiquitin-like tertiary fold. Ubiquitin (Ub) is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair. In addition to microtubule binding domains, DCLK encodes a serine/threonine kinase-domain that is similar to Ca/calmodulin-dependent (Cam) protein kinases. DCLK2 members regulate cyclic AMP signaling. Unlike DCX, the DCLK has varying levels of expression throughout embryonic and adult life. — an NCBI CDD conserved domain (cd17144); members share this curated model.
