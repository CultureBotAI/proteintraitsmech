identifier: CDD:cd16723
label: "RING finger, HC subclass, found in RNA-binding protein MEX3D. MEX3D, also known as RING finger and KH domain-containing protein 1 (RKHD1), RING finger protein 193 (RNF193), or TINO, is an RNA-binding phosphoprotein that controls the stability of the transcripts coding for the anti-apoptotic protein BCL-2, and negatively regulates BCL-2 in HeLa cells. MEX3D contains two K homology (KH) domains that provide RNA-binding capacity, and a C-terminal C3HC4-type RING-HC finger. Like other MEX-3 family proteins, MEX3D shuttles between the nucleus and the cytoplasm via the CRM1-dependent export pathway."
definition: >-
  RING finger, HC subclass, found in RNA-binding protein MEX3D. MEX3D, also known as RING finger and KH domain-containing protein 1 (RKHD1), RING finger protein 193 (RNF193), or TINO, is an RNA-binding phosphoprotein that controls the stability of the transcripts coding for the anti-apoptotic protein BCL-2, and negatively regulates BCL-2 in HeLa cells. MEX3D contains two K homology (KH) domains that provide RNA-binding capacity, and a C-terminal C3HC4-type RING-HC finger. Like other MEX-3 family proteins, MEX3D shuttles between the nucleus and the cytoplasm via the CRM1-dependent export pathway. — an NCBI CDD conserved domain (cd16723); members share this curated model.
