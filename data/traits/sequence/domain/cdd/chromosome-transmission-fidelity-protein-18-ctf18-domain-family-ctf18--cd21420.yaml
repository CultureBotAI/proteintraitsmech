identifier: CDD:cd21420
label: "chromosome transmission fidelity protein 18 (CTF18) domain family. CTF18, also called CHL12, is a chromosome cohesion factor involved in sister chromatid cohesion and fidelity of chromosome transmission. It is required for the DNA replication block checkpoint. CTF18 is a component of one of the cell nuclear antigen loader complexes, CTF18-replication factor C (CTF18-RFC), which consists of CTF18, CTF8, DCC1, RFC2, RFC3, RFC4 and RFC5. The CTF18-RFC complex binds to single-stranded and primed DNAs and has weak ATPase activity that is stimulated by the presence of primed DNA, replication protein A (RPA) and by proliferating cell nuclear antigen (PCNA). The CTF18-RFC complex catalyzes the ATP-dependent loading of PCNA onto primed and gapped DNA. It also interacts with and stimulates DNA polymerase POLH. Dissociation of RFC from the clamp leaves the clamp encircling DNA."
definition: >-
  chromosome transmission fidelity protein 18 (CTF18) domain family. CTF18, also called CHL12, is a chromosome cohesion factor involved in sister chromatid cohesion and fidelity of chromosome transmission. It is required for the DNA replication block checkpoint. CTF18 is a component of one of the cell nuclear antigen loader complexes, CTF18-replication factor C (CTF18-RFC), which consists of CTF18, CTF8, DCC1, RFC2, RFC3, RFC4 and RFC5. The CTF18-RFC complex binds to single-stranded and primed DNAs and has weak ATPase activity that is stimulated by the presence of primed DNA, replication protein A (RPA) and by proliferating cell nuclear antigen (PCNA). The CTF18-RFC complex catalyzes the ATP-dependent loading of PCNA onto primed and gapped DNA. It also interacts with and stimulates DNA polymerase POLH. Dissociation of RFC from the clamp leaves the clamp encircling DNA. — an NCBI CDD conserved domain (cd21420); members share this curated model.
