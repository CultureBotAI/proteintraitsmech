identifier: CDD:cd20733
label: "Polymorphic Nuclease effector (PoNe) co-occurring with an N-terminal PAAR domain. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contain members with PoNe domains that typically co-occur with N-terminal domains such as proline-alanine-alanine-arginine (PAAR) repeat domains that form a sharp conical extension on VgrG spikes, which is a trimeric protein complex of the bacterial type VI secretion system (T6SS)."
definition: >-
  Polymorphic Nuclease effector (PoNe) co-occurring with an N-terminal PAAR domain. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contain members with PoNe domains that typically co-occur with N-terminal domains such as proline-alanine-alanine-arginine (PAAR) repeat domains that form a sharp conical extension on VgrG spikes, which is a trimeric protein complex of the bacterial type VI secretion system (T6SS). — an NCBI CDD conserved domain (cd20733); members share this curated model.
