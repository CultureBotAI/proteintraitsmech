identifier: CDD:cd08926
label: "Animal Myoglobins. Myoglobin (Mb) is a monomeric pentacoordinate heme-bound globin protein whose expression has long been considered limited to cardiomyocytes and striated skeletal muscle cell, however it has recently been found localized in a wide variety of tissues including smooth muscle cells. As a physiological catalyst, it can modulate reactive oxygen species levels, facilitate oxygen diffusion within the cell, and scavenge or generate NO depending on oxygen tensions within the cell. Through its NO dioxygenase and nitrite reductase activities, Mb regulates mitochondrial function in energy-demanding tissues."
definition: >-
  Animal Myoglobins. Myoglobin (Mb) is a monomeric pentacoordinate heme-bound globin protein whose expression has long been considered limited to cardiomyocytes and striated skeletal muscle cell, however it has recently been found localized in a wide variety of tissues including smooth muscle cells. As a physiological catalyst, it can modulate reactive oxygen species levels, facilitate oxygen diffusion within the cell, and scavenge or generate NO depending on oxygen tensions within the cell. Through its NO dioxygenase and nitrite reductase activities, Mb regulates mitochondrial function in energy-demanding tissues. — an NCBI CDD conserved domain (cd08926); members share this curated model.
