identifier: CDD:cd15754
label: "FYVE domain found in protein containing both PH and FYVE domains 1 (phafin-1) and similar proteins. Phafin-1, also termed lysosome-associated apoptosis-inducing protein containing PH (pleckstrin homology) and FYVE domains (LAPF), or pleckstrin homology domain-containing family F member 1 (PKHF1), or PH domain-containing family F member 1, or apoptosis-inducing protein, or PH and FYVE domain-containing protein 1, or zinc finger FYVE domain-containing protein 15, is a representative of a novel family of PH and FYVE domain-containing proteins called phafins. It is a ubiquitously expressed pro-apoptotic protein via translocating to lysosomes, facilitating apoptosis induction through a lysosomal-mitochondrial apoptotic pathway."
definition: >-
  FYVE domain found in protein containing both PH and FYVE domains 1 (phafin-1) and similar proteins. Phafin-1, also termed lysosome-associated apoptosis-inducing protein containing PH (pleckstrin homology) and FYVE domains (LAPF), or pleckstrin homology domain-containing family F member 1 (PKHF1), or PH domain-containing family F member 1, or apoptosis-inducing protein, or PH and FYVE domain-containing protein 1, or zinc finger FYVE domain-containing protein 15, is a representative of a novel family of PH and FYVE domain-containing proteins called phafins. It is a ubiquitously expressed pro-apoptotic protein via translocating to lysosomes, facilitating apoptosis induction through a lysosomal-mitochondrial apoptotic pathway. — an NCBI CDD conserved domain (cd15754); members share this curated model.
