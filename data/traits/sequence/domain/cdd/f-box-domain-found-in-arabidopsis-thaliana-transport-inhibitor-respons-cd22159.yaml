identifier: CDD:cd22159
label: "F-box domain found in Arabidopsis thaliana transport inhibitor response 1 protein (TIR1), coronatine-insensitive protein 1 (COI1) and similar proteins. TIR1, also called F-box/LRR-repeat protein 1 (FBL1), is part of an SCF (SKP1-cullin-F-box) protein ligase complex that promotes the ubiquitin-dependent proteolysis of a family of transcriptional regulators known as Aux/IAAs in an auxin-dependent manner. TIR1 is an auxin receptor that plays a potential role in plant hormone signaling. COI1, also called F-box/LRR-repeat protein 2 (FBL2), is the substrate-recruiting module of an SCF ubiquitin E3 ligase complex. It mediates jasmonate signalling by promoting hormone-dependent ubiquitylation and degradation of transcriptional repressor JASMONATE ZIM-domain (JAZ) family proteins. This subfamily also includes Arabidopsis thaliana EIN3-binding F-box protein 1 (EBF1). EBF1, also called F-box/LRR-repeat protein 6 (FBL6), is a component of the SCF(EBF1) E3 ubiquitin ligase complex, which may mediate the ubiquitination and subsequent proteasomal degradation of target proteins (probably including EIN3 and EIL1). The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Arabidopsis thaliana transport inhibitor response 1 protein (TIR1), coronatine-insensitive protein 1 (COI1) and similar proteins. TIR1, also called F-box/LRR-repeat protein 1 (FBL1), is part of an SCF (SKP1-cullin-F-box) protein ligase complex that promotes the ubiquitin-dependent proteolysis of a family of transcriptional regulators known as Aux/IAAs in an auxin-dependent manner. TIR1 is an auxin receptor that plays a potential role in plant hormone signaling. COI1, also called F-box/LRR-repeat protein 2 (FBL2), is the substrate-recruiting module of an SCF ubiquitin E3 ligase complex. It mediates jasmonate signalling by promoting hormone-dependent ubiquitylation and degradation of transcriptional repressor JASMONATE ZIM-domain (JAZ) family proteins. This subfamily also includes Arabidopsis thaliana EIN3-binding F-box protein 1 (EBF1). EBF1, also called F-box/LRR-repeat protein 6 (FBL6), is a component of the SCF(EBF1) E3 ubiquitin ligase complex, which may mediate the ubiquitination and subsequent proteasomal degradation of target proteins (probably including EIN3 and EIL1). The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22159); members share this curated model.
