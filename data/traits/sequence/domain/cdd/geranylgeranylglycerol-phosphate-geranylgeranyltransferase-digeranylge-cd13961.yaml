identifier: CDD:cd13961
label: "Geranylgeranylglycerol-phosphate geranylgeranyltransferase. Digeranylgeranylglyceryl phosphate synthase (DGGGPS) transfers a geranylgeranyl group from geranylgeranyl diphosphate to (S)-3-O-geranylgeranylglyceryl phosphate to form (S)-2,3-di-O-geranylgeranylglyceryl phosphate, as part of the isoprenoid ether lipid biosynthesis. Prenyltransferases (PTs) catalyze the regioselective transfer of prenyl moieties onto a wide variety of substrates and play an important role in many biosynthetic pathways."
definition: >-
