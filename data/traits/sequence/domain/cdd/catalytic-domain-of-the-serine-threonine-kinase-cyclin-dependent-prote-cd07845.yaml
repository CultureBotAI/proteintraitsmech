identifier: CDD:cd07845
label: "Catalytic domain of the Serine/Threonine Kinase, Cyclin-Dependent protein Kinase 10. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. CDK10, also called PISSLRE, is essential for cell growth and proliferation, and acts through the G2/M phase of the cell cycle. CDK10 has also been identified as an important factor in endocrine therapy resistance in breast cancer. CDK10 silencing increases the transcription of c-RAF and the activation of the p42/p44 MAPK pathway, which leads to antiestrogen resistance. Patients who express low levels of CDK10 relapse early on tamoxifen. CDKs belong to a large family of STKs that are regulated by their cognate cyclins. Together, they are involved in the control of cell-cycle progression, transcription, and neuronal function. The CDK10 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Cyclin-Dependent protein Kinase 10. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. CDK10, also called PISSLRE, is essential for cell growth and proliferation, and acts through the G2/M phase of the cell cycle. CDK10 has also been identified as an important factor in endocrine therapy resistance in breast cancer. CDK10 silencing increases the transcription of c-RAF and the activation of the p42/p44 MAPK pathway, which leads to antiestrogen resistance. Patients who express low levels of CDK10 relapse early on tamoxifen. CDKs belong to a large family of STKs that are regulated by their cognate cyclins. Together, they are involved in the control of cell-cycle progression, transcription, and neuronal function. The CDK10 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd07845); members share this curated model.
