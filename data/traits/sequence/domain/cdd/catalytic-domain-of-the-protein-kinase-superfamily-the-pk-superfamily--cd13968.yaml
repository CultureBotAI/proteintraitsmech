identifier: CDD:cd13968
label: "Catalytic domain of the Protein Kinase superfamily. The PK superfamily contains the large family of typical PKs that includes serine/threonine kinases (STKs), protein tyrosine kinases (PTKs), and dual-specificity PKs that phosphorylate both serine/threonine and tyrosine residues of target proteins, as well as pseudokinases that lack crucial residues for catalytic activity and/or ATP binding. It also includes phosphoinositide 3-kinases (PI3Ks), aminoglycoside 3'-phosphotransferases (APHs), choline kinase (ChoK), Actin-Fragmin Kinase (AFK), and the atypical RIO and Abc1p-like protein kinases. These proteins catalyze the transfer of the gamma-phosphoryl group from ATP to their target substrates; these include serine/threonine/tyrosine residues in proteins for typical or atypical PKs, the 3-hydroxyl of the inositol ring of D-myo-phosphatidylinositol (PtdIns) or its derivatives for PI3Ks, the 4-hydroxyl of PtdIns for PI4Ks, and other small molecule substrates for APH/ChoK and similar proteins such as aminoglycosides, macrolides, choline, ethanolamine, and homoserine."
definition: >-
  Catalytic domain of the Protein Kinase superfamily. The PK superfamily contains the large family of typical PKs that includes serine/threonine kinases (STKs), protein tyrosine kinases (PTKs), and dual-specificity PKs that phosphorylate both serine/threonine and tyrosine residues of target proteins, as well as pseudokinases that lack crucial residues for catalytic activity and/or ATP binding. It also includes phosphoinositide 3-kinases (PI3Ks), aminoglycoside 3'-phosphotransferases (APHs), choline kinase (ChoK), Actin-Fragmin Kinase (AFK), and the atypical RIO and Abc1p-like protein kinases. These proteins catalyze the transfer of the gamma-phosphoryl group from ATP to their target substrates; these include serine/threonine/tyrosine residues in proteins for typical or atypical PKs, the 3-hydroxyl of the inositol ring of D-myo-phosphatidylinositol (PtdIns) or its derivatives for PI3Ks, the 4-hydroxyl of PtdIns for PI4Ks, and other small molecule substrates for APH/ChoK and similar proteins such as aminoglycosides, macrolides, choline, ethanolamine, and homoserine. — an NCBI CDD conserved domain (cd13968); members share this curated model.
