identifier: CDD:cd21182
label: "Tudor domain found in survival motor neuron protein (SMN), motor neuron-related-splicing factor 30 (SPF30), and similar proteins. This group contains SMN, SPF30, Tudor domain-containing protein 3 (TDRD3), DNA excision repair protein ERCC-6-like 2 (ERCC6L2), and similar proteins. SMN, also called component of gems 1, or Gemin-1, is part of a multimeric SMN complex that includes spliceosomal Sm core proteins and plays a catalyst role in the assembly of small nuclear ribonucleoproteins (snRNPs), the building blocks of the spliceosome. SPF30, also called 30 kDa splicing factor SMNrp, SMN-related protein, or survival motor neuron domain-containing protein 1 (SMNDC1), is an essential pre-mRNA splicing factor required for assembly of the U4/U5/U6 tri-small nuclear ribonucleoprotein into the spliceosome. TDRD3 is a scaffolding protein that specifically recognizes and binds dimethylarginine-containing proteins. ERCC6L2, also called DNA repair and recombination protein RAD26-like (RAD26L), may be involved in early DNA damage response. It regulates RNA Pol II-mediated transcription via its interaction with DNA-dependent protein kinase (DNA-PK) to resolve R loops and minimize transcription-associated genome instability. Members of this group contain a single Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor domain found in survival motor neuron protein (SMN), motor neuron-related-splicing factor 30 (SPF30), and similar proteins. This group contains SMN, SPF30, Tudor domain-containing protein 3 (TDRD3), DNA excision repair protein ERCC-6-like 2 (ERCC6L2), and similar proteins. SMN, also called component of gems 1, or Gemin-1, is part of a multimeric SMN complex that includes spliceosomal Sm core proteins and plays a catalyst role in the assembly of small nuclear ribonucleoproteins (snRNPs), the building blocks of the spliceosome. SPF30, also called 30 kDa splicing factor SMNrp, SMN-related protein, or survival motor neuron domain-containing protein 1 (SMNDC1), is an essential pre-mRNA splicing factor required for assembly of the U4/U5/U6 tri-small nuclear ribonucleoprotein into the spliceosome. TDRD3 is a scaffolding protein that specifically recognizes and binds dimethylarginine-containing proteins. ERCC6L2, also called DNA repair and recombination protein RAD26-like (RAD26L), may be involved in early DNA damage response. It regulates RNA Pol II-mediated transcription via its interaction with DNA-dependent protein kinase (DNA-PK) to resolve R loops and minimize transcription-associated genome instability. Members of this group contain a single Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd21182); members share this curated model.
