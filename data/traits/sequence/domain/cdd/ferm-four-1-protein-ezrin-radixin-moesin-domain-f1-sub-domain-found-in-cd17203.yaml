identifier: CDD:cd17203
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in erythrocyte membrane protein band 4.1-like protein 3 (EPB41L3) and similar proteins. EPB41L3, also termed 4.1B, or differentially expressed in adenocarcinoma of the lung protein 1 (DAL-1), belongs to the skeletal protein 4.1 family that is involved in cellular processes such as cell adhesion, migration and signaling. EPB41L3 is a tumor suppressor that has been implicated in a variety of meningiomas and carcinomas. EPB41L3 contains a FERM domain, a spectrin and actin binding (SAB) domain, and a C-terminal domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in erythrocyte membrane protein band 4.1-like protein 3 (EPB41L3) and similar proteins. EPB41L3, also termed 4.1B, or differentially expressed in adenocarcinoma of the lung protein 1 (DAL-1), belongs to the skeletal protein 4.1 family that is involved in cellular processes such as cell adhesion, migration and signaling. EPB41L3 is a tumor suppressor that has been implicated in a variety of meningiomas and carcinomas. EPB41L3 contains a FERM domain, a spectrin and actin binding (SAB) domain, and a C-terminal domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17203); members share this curated model.
