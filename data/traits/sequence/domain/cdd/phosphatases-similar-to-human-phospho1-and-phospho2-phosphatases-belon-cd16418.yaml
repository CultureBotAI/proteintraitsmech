identifier: CDD:cd16418
label: "phosphatases, similar to human PHOSPHO1 and PHOSPHO2 phosphatases; belongs to the haloacid dehalogenase-like superfamily. This family includes phosphatases with different substrate specificities. Human PHOSPHO1 is a phosphoethanolamine/phosphocholine phosphatase associated with high levels of expression at mineralizing regions of bone and cartilage and is thought to be involved in the generation of inorganic phosphate for bone mineralization. Human PHOSPHO2 is a putative phosphatase which shows high specific activity toward pyridoxal-5-phosphate; PHODPHO2 is not specific to bone but is expressed in a wide range of soft tissues. These belong to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase (C-Cl bond hydrolysis), azetidine hydrolase (C-N bond hydrolysis); phosphonoacetaldehyde hydrolase (C-P bond hydrolysis), phosphoserine phosphatase and phosphomannomutase (CO-P bond hydrolysis), P-type ATPases (PO-P bond hydrolysis) and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases."
definition: >-
  phosphatases, similar to human PHOSPHO1 and PHOSPHO2 phosphatases; belongs to the haloacid dehalogenase-like superfamily. This family includes phosphatases with different substrate specificities. Human PHOSPHO1 is a phosphoethanolamine/phosphocholine phosphatase associated with high levels of expression at mineralizing regions of bone and cartilage and is thought to be involved in the generation of inorganic phosphate for bone mineralization. Human PHOSPHO2 is a putative phosphatase which shows high specific activity toward pyridoxal-5-phosphate; PHODPHO2 is not specific to bone but is expressed in a wide range of soft tissues. These belong to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase (C-Cl bond hydrolysis), azetidine hydrolase (C-N bond hydrolysis); phosphonoacetaldehyde hydrolase (C-P bond hydrolysis), phosphoserine phosphatase and phosphomannomutase (CO-P bond hydrolysis), P-type ATPases (PO-P bond hydrolysis) and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases. — an NCBI CDD conserved domain (cd16418); members share this curated model.
