identifier: CDD:cd22590
label: "central coiled-coil domain of McIdas (or multicilin). McIdas (also called Idas or multicilin), together with geminin coiled-coil domain-containing protein 1 (GemC1) and geminin, controls both the cell cycle and differentiation decisions in cells. Idas binds to geminin and is implicated in DNA replication control. It also functions as an early regulator of multiciliogenesis. GemC1 and McIdas specify the multiciliate cell fate by forming complexes with the E2F4/5 transcription factors, resulting in centriole amplification and cilia formation. Idas belongs to the geminin family of proteins that also includes geminin and GemC1. They share a homologous central coiled-coil domain that mediates homo- and heterodimerization with other family members; this ability is likely to be important for modulating their function in cycling and differentiating cells. This model represents the central coiled-coil domain of McIdas."
definition: >-
  central coiled-coil domain of McIdas (or multicilin). McIdas (also called Idas or multicilin), together with geminin coiled-coil domain-containing protein 1 (GemC1) and geminin, controls both the cell cycle and differentiation decisions in cells. Idas binds to geminin and is implicated in DNA replication control. It also functions as an early regulator of multiciliogenesis. GemC1 and McIdas specify the multiciliate cell fate by forming complexes with the E2F4/5 transcription factors, resulting in centriole amplification and cilia formation. Idas belongs to the geminin family of proteins that also includes geminin and GemC1. They share a homologous central coiled-coil domain that mediates homo- and heterodimerization with other family members; this ability is likely to be important for modulating their function in cycling and differentiating cells. This model represents the central coiled-coil domain of McIdas. — an NCBI CDD conserved domain (cd22590); members share this curated model.
