identifier: CDD:cd04212
label: "The cupredoxin domain of Ubiquinol oxidase subunit II. Ubiquinol oxidase, the terminal oxidase in the respiratory chains of aerobic bacteria, is a multi-chain transmembrane protein located in the cell membrane.  It catalyzes the reduction of O2 and simultaneously pumps protons across the membrane. The number of subunits in ubiquinol oxidase varies from two to five.  Although subunit II of ubiquinol oxidase lacks the binuclear CuA site found in cytochrome c oxidases, the structure is conserved."
definition: >-
  The cupredoxin domain of Ubiquinol oxidase subunit II. Ubiquinol oxidase, the terminal oxidase in the respiratory chains of aerobic bacteria, is a multi-chain transmembrane protein located in the cell membrane. It catalyzes the reduction of O2 and simultaneously pumps protons across the membrane. The number of subunits in ubiquinol oxidase varies from two to five. Although subunit II of ubiquinol oxidase lacks the binuclear CuA site found in cytochrome c oxidases, the structure is conserved. — an NCBI CDD conserved domain (cd04212); members share this curated model.
