identifier: CDD:cd16445
label: "tumor necrosis factor ligand superfamily member 13B-like, also known as BAFF and APRIL-like molecule (BALM). This family contains the TNFSF13/TNFSF13B-like protein referred to as BAFF-APRIL-like molecule (BALM), and is unique to teleosts. BAFF and APRIL have been characterized in teleosts; a rainbow trout protein has been shown to have similarities to both BAFF (TNFSF13B) and APRIL (TNFSF13) and shares sequence identity to a protein identified in the three-spined stickleback (Gasterosteus aculeatus), thus referred to as BAFF-APRIL-like molecule or BALM. It has also been identified in tetraodon, fugu and zebrafish and may be an ancient precursor or have emerged from a teleost-specific duplication. The highest constitutive expression of BALM has been observed in the spleen, peripheral blood leucocytes, anterior and posterior kidney, suggesting a potential immunological role, and to a lesser extent in the gill, heart, skin, liver and intestinal tissues."
