identifier: CDD:cd16342
label: "Fusidic acid resistance protein (FusC/FusB). The fusidic acid resistance protein FusC (FusB) mediates resistance to the antibiotic fusidic acid. Its C-terminal domain, which contains a zinc-binding site, interacts with EF-G with high affinity, promoting the dissociation of stalled ribosome#EF-G#GDP complexes that form in the presence of fusidic acid, thus allowing the ribosomes to resume translation."
definition: >-
  Fusidic acid resistance protein (FusC/FusB). The fusidic acid resistance protein FusC (FusB) mediates resistance to the antibiotic fusidic acid. Its C-terminal domain, which contains a zinc-binding site, interacts with EF-G with high affinity, promoting the dissociation of stalled ribosome#EF-G#GDP complexes that form in the presence of fusidic acid, thus allowing the ribosomes to resume translation. — an NCBI CDD conserved domain (cd16342); members share this curated model.
