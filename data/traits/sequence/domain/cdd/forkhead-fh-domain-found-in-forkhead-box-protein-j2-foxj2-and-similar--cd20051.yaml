identifier: CDD:cd20051
label: FH_FOXJ2
definition: >-
  Forkhead (FH) domain found in Forkhead box protein J2 (FOXJ2) and similar proteins. FOXJ2, also called Fork head homologous X (FHX), plays an important role in tumorigenesis, progression, and metastasis of certain cancers. It acts as a transcriptional activator that can bind to two different type of DNA binding sites. It is specifically expressed in meiotic spermatocytes in adult mouse testes and appears to promote meiotic progression during spermatogenesis. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'
