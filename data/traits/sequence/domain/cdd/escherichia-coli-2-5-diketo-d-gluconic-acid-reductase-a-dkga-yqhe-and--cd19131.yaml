identifier: CDD:cd19131
label: "Escherichia coli 2,5-diketo-D-gluconic acid reductase A (DkgA/YqhE) and similar proteins. Escherichia coli DkgA/YqhE is a founding member of aldo-keto reductase family 5 member C2 (AKR5C2). DkgA/YqhE (EC 1.1.1.274), also called 2,5-DKG reductase A, or 2,5-DKGR A, or 25DKGR-A, or AKR5C, catalyzes the reduction of 2,5-diketo-D-gluconic acid (25DKG) to 2-keto-L-gulonic acid (2KLG). It is also capable of stereoselective -keto ester reductions on ethyl acetoacetate and other 2-substituted derivatives."
definition: >-
