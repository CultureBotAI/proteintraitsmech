identifier: CDD:cd21781
label: "Mob-binding domain found in nuclear Dbf2-related kinase 2 (NDR2). NDR2, also called serine/threonine-protein kinase 38-like (STK38L), plays a role in proper centrosome duplication. In addition, it is involved in regulating neuronal growth and differentiation, as well as in facilitating neurite outgrowth. NDR2 is also implicated in fear conditioning as it contributes to the coupling of neuronal morphological changes with fear-memory consolidation. NDR2 belongs to the NDR/LATS family of kinases that bind to highly conserved Mob (Mps One binder) coactivators, forming regulatory complexes that control a diverse set of in vivo effector proteins, and are essential and evolutionarily conserved components of \"Hippo\" signaling pathways. Mob association creates a novel binding pocket that participates in the formation of the active state of NDR/LATS kinases. NDR kinases contain a regulatory domain located N-terminal to the serine/threonine kinase domain (called the N-terminal regulatory (NTR) domain) and an insert within the catalytic domain that contains an auto-inhibitory sequence. This model corresponds to the NTR or Mob-binding domain of NDR2 serine/threonine protein kinase."
definition: >-
  Mob-binding domain found in nuclear Dbf2-related kinase 2 (NDR2). NDR2, also called serine/threonine-protein kinase 38-like (STK38L), plays a role in proper centrosome duplication. In addition, it is involved in regulating neuronal growth and differentiation, as well as in facilitating neurite outgrowth. NDR2 is also implicated in fear conditioning as it contributes to the coupling of neuronal morphological changes with fear-memory consolidation. NDR2 belongs to the NDR/LATS family of kinases that bind to highly conserved Mob (Mps One binder) coactivators, forming regulatory complexes that control a diverse set of in vivo effector proteins, and are essential and evolutionarily conserved components of "Hippo" signaling pathways. Mob association creates a novel binding pocket that participates in the formation of the active state of NDR/LATS kinases. NDR kinases contain a regulatory domain located N-terminal to the serine/threonine kinase domain (called the N-terminal regulatory (NTR) domain) and an insert within the catalytic domain that contains an auto-inhibitory sequence. This model corresponds to the NTR or Mob-binding domain of NDR2 serine/threonine protein kinase. — an NCBI CDD conserved domain (cd21781); members share this curated model.
