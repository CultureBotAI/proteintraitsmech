identifier: CDD:cd15625
label: "PHD finger found in transcriptional intermediary factor 1 delta (TIF1delta). TIF1delta, also termed tripartite motif-containing protein 66 (TRIM66), is a novel heterochromatin protein 1 (HP1)-interacting member of the transcriptional intermediary factor1 (TIF1) family expressed by elongating spermatids. Like other TIF1 proteins, TIF1delta displays a potent trichostatin A (TSA)-sensitive repression function; TSA is a specific inhibitor of histone deacetylases. Moreover, TIF1delta plays an important role in heterochromatin-mediated gene silencing during postmeiotic phases of spermatogenesis. It functions as a negative regulator of postmeiotic genes acting through HP1 isotype gamma (HP1gamma) complex formation and centromere association. TIF1delta contains an N-terminal RBCC (RING finger, B-box zinc-fingers, coiled-coil), a plant homeodomain (PHD) finger, followed by a bromodomain in the C-terminal region."
definition: >-
  PHD finger found in transcriptional intermediary factor 1 delta (TIF1delta). TIF1delta, also termed tripartite motif-containing protein 66 (TRIM66), is a novel heterochromatin protein 1 (HP1)-interacting member of the transcriptional intermediary factor1 (TIF1) family expressed by elongating spermatids. Like other TIF1 proteins, TIF1delta displays a potent trichostatin A (TSA)-sensitive repression function; TSA is a specific inhibitor of histone deacetylases. Moreover, TIF1delta plays an important role in heterochromatin-mediated gene silencing during postmeiotic phases of spermatogenesis. It functions as a negative regulator of postmeiotic genes acting through HP1 isotype gamma (HP1gamma) complex formation and centromere association. TIF1delta contains an N-terminal RBCC (RING finger, B-box zinc-fingers, coiled-coil), a plant homeodomain (PHD) finger, followed by a bromodomain in the C-terminal region. — an NCBI CDD conserved domain (cd15625); members share this curated model.
