identifier: CDD:cd15749
label: "FYVE-related domain found in FYVE domain-containing protein 19 (ZFY19) and similar proteins. ZFY19, also termed mixed lineage leukemia (MLL) partner containing FYVE domain, is encoded by a novel gene, MLL partner containing FYVE domain (MPFYVE). The FYVE domain of ZFY19 resembles FYVE-related domains that are structurally similar to the canonical FYVE domains but lack the three signature sequences: an N-terminal WxxD motif (x for any residue), the central basic R(R/K)HHCRxCG patch, and a C-terminal RVC motif. The biological function of ZFY19 remains unclear."
definition: >-
  FYVE-related domain found in FYVE domain-containing protein 19 (ZFY19) and similar proteins. ZFY19, also termed mixed lineage leukemia (MLL) partner containing FYVE domain, is encoded by a novel gene, MLL partner containing FYVE domain (MPFYVE). The FYVE domain of ZFY19 resembles FYVE-related domains that are structurally similar to the canonical FYVE domains but lack the three signature sequences: an N-terminal WxxD motif (x for any residue), the central basic R(R/K)HHCRxCG patch, and a C-terminal RVC motif. The biological function of ZFY19 remains unclear. — an NCBI CDD conserved domain (cd15749); members share this curated model.
