identifier: CDD:cd23363
label: "soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in the soybean Kunitz trypsin inhibitor (SKTI) subfamily. SKTI is extracted from soybean (Glycine max L.) seeds. It shows inhibition of trypsin and possesses insect resistance and anti-tumor properties. This subfamily includes KTI1-3. KTI1 and KTI2 probably do not possess trypsin inhibitor activity. KTI3, also called trypsin inhibitor A, is responsible for most of the Kunitz trypsin inhibitor activity and protein found in soybean seeds. Members of this subfamily contain a soybean trypsin inhibitor (STI)-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
