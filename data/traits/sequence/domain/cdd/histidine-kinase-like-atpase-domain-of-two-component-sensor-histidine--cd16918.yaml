identifier: CDD:cd16918
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli GlnL (synonyms NtrB and NRII). This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs), similar to Escherichia coli GlnL/NtrB/NRII HK of the two-component regulatory system (TCS) GlnL/GlnG (NtrB-NtrC, or NRII-NRI), which regulates the transcription of genes encoding metabolic enzymes and permeases in response to carbon and nitrogen status in E. coli and related bacteria. Also included in this family are Rhodobacter capsulatus NtrB, Azospirillum brasilense NtrB, Vibrio alginolyticus NtrB, Rhizobium leguminosarum biovar phaseoli NtrB, and Herbaspirillum seropedicae NtrB.  Escherichia coli GlnL/NtrB/NRII is both a kinase and a phosphatase, catalyzing the phosphorylation and dephosphorylation of GlnG/NtrC/NRI. The kinase and phosphatase activities of GlnL/NtrB/NRII are regulated by the PII signal transduction protein, which on binding to GlnL/NtrB/NRII, inhibits the kinase activity of GlnL/NtrB/NRII and activates the GlnL/NtrB/NRII phosphatase activity. Proteins having this HATPase domain also have a histidine kinase dimerization and phosphoacceptor domain (HisKA); some also contain PAS sensor domain(s)."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli GlnL (synonyms NtrB and NRII). This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs), similar to Escherichia coli GlnL/NtrB/NRII HK of the two-component regulatory system (TCS) GlnL/GlnG (NtrB-NtrC, or NRII-NRI), which regulates the transcription of genes encoding metabolic enzymes and permeases in response to carbon and nitrogen status in E. coli and related bacteria. Also included in this family are Rhodobacter capsulatus NtrB, Azospirillum brasilense NtrB, Vibrio alginolyticus NtrB, Rhizobium leguminosarum biovar phaseoli NtrB, and Herbaspirillum seropedicae NtrB. Escherichia coli GlnL/NtrB/NRII is both a kinase and a phosphatase, catalyzing the phosphorylation and dephosphorylation of GlnG/NtrC/NRI. The kinase and phosphatase activities of GlnL/NtrB/NRII are regulated by the PII signal transduction protein, which on binding to GlnL/NtrB/NRII, inhibits the kinase activity of GlnL/NtrB/NRII and activates the GlnL/NtrB/NRII phosphatase activity. Proteins having this HATPase domain also have a histidine kinase dimerization and phosphoacceptor domain (HisKA); some also contain PAS sensor domain(s). — an NCBI CDD conserved domain (cd16918); members share this curated model.
