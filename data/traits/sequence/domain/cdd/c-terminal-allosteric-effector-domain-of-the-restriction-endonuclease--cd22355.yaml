identifier: CDD:cd22355
label: "C-terminal allosteric effector domain of the restriction endonuclease Sau3AI. Sau3AI is a type II restriction enzyme that recognizes the 5'-|GATC-3' sequence in double-strand DNA (| denotes the cleavage site). The C-terminal domain modeled here does not have catalytic activity, it functions as an allosteric effector domain that assists in DNA binding and cleavage. It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methy-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  C-terminal allosteric effector domain of the restriction endonuclease Sau3AI. Sau3AI is a type II restriction enzyme that recognizes the 5'-|GATC-3' sequence in double-strand DNA (| denotes the cleavage site). The C-terminal domain modeled here does not have catalytic activity, it functions as an allosteric effector domain that assists in DNA binding and cleavage. It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methy-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22355); members share this curated model.
