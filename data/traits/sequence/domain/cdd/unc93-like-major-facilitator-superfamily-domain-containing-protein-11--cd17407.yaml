identifier: CDD:cd17407
label: "UNC93-like Major facilitator superfamily domain-containing protein 11. This group is composed of UNC93-like protein MFSD11 (also called major facilitator superfamily domain-containing protein 11 or protein ET) and similar proteins, most of which are uncharacterized. MFSD11 is ubiquitously expressed in the periphery and the central nervous system of mice, where it is expressed in excitatory and inhibitory mouse brain neurons. Its expression is affected by altered energy homeostasis, suggesting plausible involvement in the energy regulation. MFSD11 belongs to the Unc-93 family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  UNC93-like Major facilitator superfamily domain-containing protein 11. This group is composed of UNC93-like protein MFSD11 (also called major facilitator superfamily domain-containing protein 11 or protein ET) and similar proteins, most of which are uncharacterized. MFSD11 is ubiquitously expressed in the periphery and the central nervous system of mice, where it is expressed in excitatory and inhibitory mouse brain neurons. Its expression is affected by altered energy homeostasis, suggesting plausible involvement in the energy regulation. MFSD11 belongs to the Unc-93 family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17407); members share this curated model.
