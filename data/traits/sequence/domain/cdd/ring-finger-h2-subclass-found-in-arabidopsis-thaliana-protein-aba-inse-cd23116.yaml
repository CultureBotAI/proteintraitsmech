identifier: CDD:cd23116
label: "RING finger, H2 subclass, found in Arabidopsis thaliana protein ABA INSENSITIVE RING PROTEIN 1 (AIRP1) and similar proteins. This subfamily includes Arabidopsis thaliana AIRP1 and RING-H2 finger B1a (RHB1A). AIRP1, also known as RING-type E3 ubiquitin transferase AIRP1, possesses E3 ubiquitin-protein ligase activity in vitro when associated with the E2 enzyme UBC8. It plays combinatory roles with AIRP2 in the positive regulation of the abscisic acid-mediated drought stress response. RHB1A is a probable E3 ubiquitin-protein ligase. Members of this subfamily contain a C3H2C3-type RING-H2 finger."
definition: >-
  RING finger, H2 subclass, found in Arabidopsis thaliana protein ABA INSENSITIVE RING PROTEIN 1 (AIRP1) and similar proteins. This subfamily includes Arabidopsis thaliana AIRP1 and RING-H2 finger B1a (RHB1A). AIRP1, also known as RING-type E3 ubiquitin transferase AIRP1, possesses E3 ubiquitin-protein ligase activity in vitro when associated with the E2 enzyme UBC8. It plays combinatory roles with AIRP2 in the positive regulation of the abscisic acid-mediated drought stress response. RHB1A is a probable E3 ubiquitin-protein ligase. Members of this subfamily contain a C3H2C3-type RING-H2 finger. — an NCBI CDD conserved domain (cd23116); members share this curated model.
