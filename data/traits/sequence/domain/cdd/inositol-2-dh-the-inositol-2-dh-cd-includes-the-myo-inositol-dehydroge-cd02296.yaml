identifier: CDD:cd02296
label: "Inositol-2-DH. The Inositol-2-DH CD includes the myo-inositol dehydrogenases Bacillus subtilis IolG and Sinorhizobium meliloti IdhA, and the S. meliloti mocA gene product essential for rhizopine degradation, as well as, strI of the Streptomyces griseus streptomycin biosynthetic gene cluster. The StrI protein is predicted to catalyze one of numerous steps dependent on dehydrogenases or epimerases in the biosynthesis of hexose-derived moieties of streptomycin. Members of the inositol-2-DH CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the glucose-fructose oxidoreductase superfamily of proteins."
definition: >-
  Inositol-2-DH. The Inositol-2-DH CD includes the myo-inositol dehydrogenases Bacillus subtilis IolG and Sinorhizobium meliloti IdhA, and the S. meliloti mocA gene product essential for rhizopine degradation, as well as, strI of the Streptomyces griseus streptomycin biosynthetic gene cluster. The StrI protein is predicted to catalyze one of numerous steps dependent on dehydrogenases or epimerases in the biosynthesis of hexose-derived moieties of streptomycin. Members of the inositol-2-DH CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the glucose-fructose oxidoreductase superfamily of proteins. — an NCBI CDD conserved domain (cd02296); members share this curated model.
