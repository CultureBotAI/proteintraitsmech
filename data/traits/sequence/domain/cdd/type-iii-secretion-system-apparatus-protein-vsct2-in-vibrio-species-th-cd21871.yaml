identifier: CDD:cd21871
label: VscT2
definition: >-
  type III secretion system apparatus protein VscT2 in Vibrio species. This model contains Vibrio type III secretion system (T3SS) apparatus protein VscT2. Vibrios, which include over 100 species, are ubiquitous in marine and estuarine environments, and many species such as Vibrio cholerae, V. parahaemolyticus and V. mimicus, are pathogens for humans. VscT2 co-occurs with vscS2, vscN2, vscC2 and vscR2 which are all essential for T3SS secretion
