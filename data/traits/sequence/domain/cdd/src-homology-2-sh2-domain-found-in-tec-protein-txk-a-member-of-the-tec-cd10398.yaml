identifier: CDD:cd10398
label: "Src homology 2 (SH2) domain found  in Tec protein, Txk. A member of the Tec protein tyrosine kinase Txk is expressed in thymus, spleen, lymph node, T lymphocytes, NK cells, mast cell lines, and myeloid cell line. Txk plays a role in TCR signal transduction, T cell development, and selection which is analogous to the function of Itk. Txk has been shown to interact with IFN-gamma. Unlike most of the Tec family members Txk lacks a  PH domain. Instead Txk has a unique region containing a palmitoylated cysteine string which has a similar membrane tethering function as the PH domain. Txk also has a zinc-binding motif, a SH3 domain, a SH2 domain, and a protein kinase catalytic domain. The TH domain consists of a Zn2+-binding Btk motif and a proline-rich region. The Btk motif is found in Tec kinases, Ras GAP, and IGBP and crucial to the function of the PH domain. It is not present in Txk which is not surprising since it lacks a PH domain. The type 1 splice form of the Drosophila homolog also lacks both the PH domain and the Btk motif. The proline-rich regions are highly conserved for the most part with the exception of Bmx whose residues surrounding the PXXP motif are not conserved (TH-like) and Btk29A  which is entirely unique with large numbers of glycine residues (TH-extended).  Tec family members all lack a C-terminal tyrosine having an autoinhibitory function in its phosphorylated state. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in Tec protein, Txk. A member of the Tec protein tyrosine kinase Txk is expressed in thymus, spleen, lymph node, T lymphocytes, NK cells, mast cell lines, and myeloid cell line. Txk plays a role in TCR signal transduction, T cell development, and selection which is analogous to the function of Itk. Txk has been shown to interact with IFN-gamma. Unlike most of the Tec family members Txk lacks a PH domain. Instead Txk has a unique region containing a palmitoylated cysteine string which has a similar membrane tethering function as the PH domain. Txk also has a zinc-binding motif, a SH3 domain, a SH2 domain, and a protein kinase catalytic domain. The TH domain consists of a Zn2+-binding Btk motif and a proline-rich region. The Btk motif is found in Tec kinases, Ras GAP, and IGBP and crucial to the function of the PH domain. It is not present in Txk which is not surprising since it lacks a PH domain. The type 1 splice form of the Drosophila homolog also lacks both the PH domain and the Btk motif. The proline-rich regions are highly conserved for the most part with the exception of Bmx whose residues surrounding the PXXP motif are not conserved (TH-like) and Btk29A which is entirely unique with large numbers of glycine residues (TH-extended). Tec family members all lack a C-terminal tyrosine having an autoinhibitory function in its phosphorylated state. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10398); members share this curated model.
