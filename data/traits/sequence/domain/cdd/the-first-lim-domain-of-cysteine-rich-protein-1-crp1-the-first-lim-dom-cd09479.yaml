identifier: CDD:cd09479
label: "The first LIM domain of Cysteine Rich Protein 1 (CRP1). The first LIM domain of Cysteine Rich Protein 1 (CRP1): Cysteine-rich proteins (CRPs) are characterized by the presence of two LIM domains linked to a short glycine-rich repeats (GRRs). The CRP family members include CRP1, CRP2, CRP3/MLP and TLP. CRP1, CRP2 and CRP3 share a conserved nuclear targeting signal (K/R-K/R-Y-G-P-K), which supports the fact that these proteins function not only in the cytoplasm but also in the nucleus. CRPs control regulatory pathways during cellular differentiation, and involve in complex transcription circuits, and the organization as well as the arrangement of the myofibrillar/cytoskeletal network. CRP1 can associate with the actin cytoskeleton and are capable of interacting with alpha-actinin and zyxin. CRP1 was shown to regulate actin filament bundling by interaction with alpha-actinin and direct binding to actin filaments. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes."
definition: >-
  The first LIM domain of Cysteine Rich Protein 1 (CRP1). The first LIM domain of Cysteine Rich Protein 1 (CRP1): Cysteine-rich proteins (CRPs) are characterized by the presence of two LIM domains linked to a short glycine-rich repeats (GRRs). The CRP family members include CRP1, CRP2, CRP3/MLP and TLP. CRP1, CRP2 and CRP3 share a conserved nuclear targeting signal (K/R-K/R-Y-G-P-K), which supports the fact that these proteins function not only in the cytoplasm but also in the nucleus. CRPs control regulatory pathways during cellular differentiation, and involve in complex transcription circuits, and the organization as well as the arrangement of the myofibrillar/cytoskeletal network. CRP1 can associate with the actin cytoskeleton and are capable of interacting with alpha-actinin and zyxin. CRP1 was shown to regulate actin filament bundling by interaction with alpha-actinin and direct binding to actin filaments. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes. — an NCBI CDD conserved domain (cd09479); members share this curated model.
