identifier: CDD:cd17100
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in tyrosine-protein phosphatase non-receptor type 3 (PTPN3) and similar proteins. This family includes two tyrosine-protein phosphatase non-receptors, PTPN3 and PTPN4, both of which belong to the non-transmembrane FERM-containing protein-tyrosine phosphatase (PTP) subfamily characterized by a conserved N-terminal FERM domain, a PDZ domain, and a C-terminal PTP catalytic domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in tyrosine-protein phosphatase non-receptor type 3 (PTPN3) and similar proteins. This family includes two tyrosine-protein phosphatase non-receptors, PTPN3 and PTPN4, both of which belong to the non-transmembrane FERM-containing protein-tyrosine phosphatase (PTP) subfamily characterized by a conserved N-terminal FERM domain, a PDZ domain, and a C-terminal PTP catalytic domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17100); members share this curated model.
