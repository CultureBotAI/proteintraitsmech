identifier: CDD:cd12511
label: "RNA recognition motif 2 (RRM2) found in RNA-binding protein RBM12, RBM12B and similar proteins. This subfamily corresponds to the RRM2 of RBM12 and RBM12B. RBM12, also termed SH3/WW domain anchor protein in the nucleus (SWAN), is ubiquitously expressed. It contains five distinct RNA binding motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), two proline-rich regions, and several putative transmembrane domains. RBM12B shows high sequence semilarity with RBM12. It contains five distinct RRMs as well. The biological roles of both RBM12 and RBM12B remain unclear."
definition: >-
  RNA recognition motif 2 (RRM2) found in RNA-binding protein RBM12, RBM12B and similar proteins. This subfamily corresponds to the RRM2 of RBM12 and RBM12B. RBM12, also termed SH3/WW domain anchor protein in the nucleus (SWAN), is ubiquitously expressed. It contains five distinct RNA binding motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), two proline-rich regions, and several putative transmembrane domains. RBM12B shows high sequence semilarity with RBM12. It contains five distinct RRMs as well. The biological roles of both RBM12 and RBM12B remain unclear. — an NCBI CDD conserved domain (cd12511); members share this curated model.
