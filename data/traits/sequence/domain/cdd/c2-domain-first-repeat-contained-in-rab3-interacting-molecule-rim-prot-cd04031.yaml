identifier: CDD:cd04031
label: "C2 domain first repeat contained in Rab3-interacting molecule (RIM) proteins. RIMs are believed to organize specialized sites of the plasma membrane called active zones.  They also play a role in controlling neurotransmitter release, plasticity processes, as well as memory and learning.  RIM contains an N-terminal zinc finger domain, a PDZ domain, and two C-terminal C2 domains (C2A, C2B).  C2 domains fold into an 8-standed beta-sandwich that can adopt 2 structural arrangements: Type I and Type II, distinguished by a circular permutation involving their N- and C-terminal beta strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances including bind phospholipids, inositol polyphosphates, and intracellular proteins.  Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1.  However, there are a few exceptions to this including RIM isoforms and some splice variants of piccolo/aczonin and intersectin which only have a single C2 domain.  C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions. Members here have a type-I topology and do not bind Ca2+."
definition: >-
  C2 domain first repeat contained in Rab3-interacting molecule (RIM) proteins. RIMs are believed to organize specialized sites of the plasma membrane called active zones. They also play a role in controlling neurotransmitter release, plasticity processes, as well as memory and learning. RIM contains an N-terminal zinc finger domain, a PDZ domain, and two C-terminal C2 domains (C2A, C2B). C2 domains fold into an 8-standed beta-sandwich that can adopt 2 structural arrangements: Type I and Type II, distinguished by a circular permutation involving their N- and C-terminal beta strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances including bind phospholipids, inositol polyphosphates, and intracellular proteins. Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1. However, there are a few exceptions to this including RIM isoforms and some splice variants of piccolo/aczonin and intersectin which only have a single C2 domain. C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions. Members here have a type-I topology and do not bind Ca2+. — an NCBI CDD conserved domain (cd04031); members share this curated model.
