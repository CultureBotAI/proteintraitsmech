identifier: CDD:cd24014
label: "nucleotide-binding domain (NBD) of Methanopyrus kandleri sugar kinase Mk0840 and similar proteins. The family includes uncharacterized Methanopyrus kandleri sugar kinase Mk0840 that shows high similarity to bacterial anhydro-N-acetylmuramic acid kinase, which is involved in murein recycling. This family belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains."
definition: >-
  nucleotide-binding domain (NBD) of Methanopyrus kandleri sugar kinase Mk0840 and similar proteins. The family includes uncharacterized Methanopyrus kandleri sugar kinase Mk0840 that shows high similarity to bacterial anhydro-N-acetylmuramic acid kinase, which is involved in murein recycling. This family belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains. — an NCBI CDD conserved domain (cd24014); members share this curated model.
