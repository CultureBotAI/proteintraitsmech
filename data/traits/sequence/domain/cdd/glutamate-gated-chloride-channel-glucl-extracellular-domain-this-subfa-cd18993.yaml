identifier: CDD:cd18993
label: "glutamate-gated chloride channel (GluCl) extracellular domain. This subfamily contains extracellular domain of glutamate-gated chloride channel (GluCl) found only in protostomia, but are closely related to mammalian glycine receptors. They have several roles in these invertebrates, including controlling locomotion and feeding, and mediating sensory inputs into behavior. Comparison of the GluCl gene families between organisms shows that insect gene family is relatively simple, while that found in nematodes tends to be larger and more diverse. Glutamate is an inhibitory neurotransmitter that shapes the responses of projection neurons to olfactory stimuli in the Drosophila. GluCls are targeted by the macrocyclic lactone family of anthelmintics and pesticides in arthropods and nematodes, thus making the GluCls of considerable medical and economic importance. In Drosophila melanogaster, GluCl mediates sensitivity to the antiparasitic agents ivermectin and nodulisporic acid, suggesting that their drug target is the same throughout the Ecdysozoa."
definition: >-
  glutamate-gated chloride channel (GluCl) extracellular domain. This subfamily contains extracellular domain of glutamate-gated chloride channel (GluCl) found only in protostomia, but are closely related to mammalian glycine receptors. They have several roles in these invertebrates, including controlling locomotion and feeding, and mediating sensory inputs into behavior. Comparison of the GluCl gene families between organisms shows that insect gene family is relatively simple, while that found in nematodes tends to be larger and more diverse. Glutamate is an inhibitory neurotransmitter that shapes the responses of projection neurons to olfactory stimuli in the Drosophila. GluCls are targeted by the macrocyclic lactone family of anthelmintics and pesticides in arthropods and nematodes, thus making the GluCls of considerable medical and economic importance. In Drosophila melanogaster, GluCl mediates sensitivity to the antiparasitic agents ivermectin and nodulisporic acid, suggesting that their drug target is the same throughout the Ecdysozoa. — an NCBI CDD conserved domain (cd18993); members share this curated model.
