identifier: CDD:cd15700
label: "Extended PHD finger (ePHD) found in retinoic acid-induced protein 1 (RAI1). The extended plant homeodomain (ePHD) zinc finger is characterized as Cys2HisCys5HisCys2His. This model corresponds to the C-terminal ePHD/ADD (ATRX-DNMT3-DNMT3L) domain of RAI1. RAI1, a homolog of stromelysin-1 PDGF (platelet-derived growth factor)-responsive element-binding protein (SPBP, also termed TCF-20), is a chromatin-binding protein implicated in the regulation of gene expression. It is strongly enriched on chromatin in interphase HeLa cells, and displays low nuclear mobility, and has been implicated in Smith-Magenis syndrome, Potocki-Lupski syndrome, and non-syndromic autism. RAI1 contains a region with homology to the novel nucleosome-binding region SPBP and an ePHD/ADD domain with ability to bind nucleosomes."
definition: >-
  Extended PHD finger (ePHD) found in retinoic acid-induced protein 1 (RAI1). The extended plant homeodomain (ePHD) zinc finger is characterized as Cys2HisCys5HisCys2His. This model corresponds to the C-terminal ePHD/ADD (ATRX-DNMT3-DNMT3L) domain of RAI1. RAI1, a homolog of stromelysin-1 PDGF (platelet-derived growth factor)-responsive element-binding protein (SPBP, also termed TCF-20), is a chromatin-binding protein implicated in the regulation of gene expression. It is strongly enriched on chromatin in interphase HeLa cells, and displays low nuclear mobility, and has been implicated in Smith-Magenis syndrome, Potocki-Lupski syndrome, and non-syndromic autism. RAI1 contains a region with homology to the novel nucleosome-binding region SPBP and an ePHD/ADD domain with ability to bind nucleosomes. — an NCBI CDD conserved domain (cd15700); members share this curated model.
