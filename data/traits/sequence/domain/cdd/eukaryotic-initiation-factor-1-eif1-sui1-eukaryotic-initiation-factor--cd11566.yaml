identifier: CDD:cd11566
label: eIF1_SUI1
definition: >-
  Eukaryotic initiation factor 1. eIF1/SUI1 (eukaryotic initiation factor 1) plays an important role in accurate initiator codon recognition during translation initiation. eIF1 interacts with 18S rRNA in the 40S ribosomal subunit during eukaryotic translation initiation. Point mutations in the yeast eIF1 implicate the protein in maintaining accurate start-site selection but its mechanism of action is unknown
