identifier: CDD:cd22955
label: TOS6
definition: >-
  GPI-anchored protein TOS6. TOS6 is a glycosylphosphatidyl inositol (GPI)-anchored protein. The GPI-anchor is attached to the protein in the endoplasmic reticulum and serves to target the protein to the cell surface. The function of TOS6 is not known, but Saccharomyces cerevisiae Delta tos6 strains show significantly higher beta-glucosidase (BGL)-activity while maintaining wild type growth
