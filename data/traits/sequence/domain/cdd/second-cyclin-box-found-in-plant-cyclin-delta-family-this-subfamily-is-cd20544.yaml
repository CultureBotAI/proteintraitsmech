identifier: CDD:cd20544
label: "second cyclin box found in plant cyclin-delta family. This subfamily is composed of plant delta family cyclins, including a group of G1/S-specific D-type cyclins from Arabidopsis thaliana which may activate the cell cycle in the root apical meristem (RAM) and promote embryonic root (radicle) protrusion. Members of this family contain two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain."
definition: >-
  second cyclin box found in plant cyclin-delta family. This subfamily is composed of plant delta family cyclins, including a group of G1/S-specific D-type cyclins from Arabidopsis thaliana which may activate the cell cycle in the root apical meristem (RAM) and promote embryonic root (radicle) protrusion. Members of this family contain two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20544); members share this curated model.
