identifier: CDD:cd15807
label: "C-terminal domain of Melanoma differentiation-associated protein 5, a cytoplasmic viral RNA receptor. Melanoma differentiation-associated protein 5 (MDA5) is also called Interferon-induced helicase C domain-containing protein 1 (IFIH1) or RIG-I-like receptor 2 (RLR-2). It  is one of three members of the RLR family. RLRs are cytoplasmic RNA receptors that recognize non-self RNA and act as molecular sensors to detect viral pathogens. It has been shown to detect viruses from the Picornaviridae and Caliciviridae families. RLRs are characterized by a central DExD/H-box helicase domain and a C-terminal domain, both of which are responsible for binding viral RNA. The helicase domain catalyzes the unwinding of double stranded RNA in an ATP-dependent manner. RIG-I and MDA5 also contain two N-terminal caspase activation and recruitment domains (CARDs), which initiate downstream signaling upon viral RNA sensing."
definition: >-
  C-terminal domain of Melanoma differentiation-associated protein 5, a cytoplasmic viral RNA receptor. Melanoma differentiation-associated protein 5 (MDA5) is also called Interferon-induced helicase C domain-containing protein 1 (IFIH1) or RIG-I-like receptor 2 (RLR-2). It is one of three members of the RLR family. RLRs are cytoplasmic RNA receptors that recognize non-self RNA and act as molecular sensors to detect viral pathogens. It has been shown to detect viruses from the Picornaviridae and Caliciviridae families. RLRs are characterized by a central DExD/H-box helicase domain and a C-terminal domain, both of which are responsible for binding viral RNA. The helicase domain catalyzes the unwinding of double stranded RNA in an ATP-dependent manner. RIG-I and MDA5 also contain two N-terminal caspase activation and recruitment domains (CARDs), which initiate downstream signaling upon viral RNA sensing. — an NCBI CDD conserved domain (cd15807); members share this curated model.
