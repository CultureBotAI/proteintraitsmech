identifier: CDD:cd07501
label: "eukaryotic hypothetical phosphotyrosine phosphatase MDP-1 and related phosphatases, similar to Bacillus cereus phosphonoacetaldehyde hydrolase and Streptomyces FkbH. This family includes eukaryotic magnesium-dependent phosphatase-1 (MDP-1) which is most likely a phosphotyrosine phosphatase catalyzing the dephosphorylation of tyrosine-phosphorylated proteins, Bacillus cereus phosphonoacetaldehyde hydrolase (phosphonatase)which catalyzes the hydrolysis of phosphonoacetaldehyde to acetaldehyde and phosphate using Mg(II) as cofactor, and sequences annotated as FkbH including BafAIV an FkbH-like protein from Streptomyces griseus encoded in ORF12 of the bafilomycin synthesis gene cluster. This family belongs to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases."
definition: >-
  eukaryotic hypothetical phosphotyrosine phosphatase MDP-1 and related phosphatases, similar to Bacillus cereus phosphonoacetaldehyde hydrolase and Streptomyces FkbH. This family includes eukaryotic magnesium-dependent phosphatase-1 (MDP-1) which is most likely a phosphotyrosine phosphatase catalyzing the dephosphorylation of tyrosine-phosphorylated proteins, Bacillus cereus phosphonoacetaldehyde hydrolase (phosphonatase)which catalyzes the hydrolysis of phosphonoacetaldehyde to acetaldehyde and phosphate using Mg(II) as cofactor, and sequences annotated as FkbH including BafAIV an FkbH-like protein from Streptomyces griseus encoded in ORF12 of the bafilomycin synthesis gene cluster. This family belongs to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases. — an NCBI CDD conserved domain (cd07501); members share this curated model.
