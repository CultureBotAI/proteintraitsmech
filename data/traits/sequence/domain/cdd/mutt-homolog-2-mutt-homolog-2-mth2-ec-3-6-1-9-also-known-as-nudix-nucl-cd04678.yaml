identifier: CDD:cd04678
label: "MutT homolog 2. MutT Homolog 2 (MTH2; EC 3.6.1.9), also known as NUDIX (nucleoside diphosphate-linked moiety X)) motif 15/Nudt15, may catalyze the hydrolysis of nucleoside diphosphates, triphosphates including dGTP, dTTP, dCTP, their oxidized forms like 8-oxo-dGTP, and prodrug thiopurine derivatives 6-thio-dGTP and 6-thio-GTP. MTH2 may also play a role in DNA synthesis and cell cycle progression by stabilizing PCNA. Members of the NUDIX hydrolase superfamily catalyze the hydrolysis of NUcleoside DIphosphates linked to other moieties, X. Enzymes belonging to this superfamily require a divalent cation, such as Mg2+ or Mn2+, for their activity and contain a highly conserved 23-residue NUDIX motif (GX5EX7REUXEEXGU, where U = I, L or V), which functions as a metal binding and catalytic site. Substrates of NUDIX hydrolases include intact and oxidatively damaged nucleoside triphosphates, dinucleoside polyphosphates, nucleotide-sugars and dinucleotide enzymes. These substrates are metabolites or cell signaling molecules that require regulation during different stages of the cell cycle or during periods of stress. In general, the role of the NUDIX hydrolase is to sanitize the nucleotide pools and to maintain cell viability, thereby serving as surveillance & \"house-cleaning\" enzymes. Substrate specificity is used to define families within the superfamily. Differences in substrate specificity are determined by the N-terminal extension or by residues in variable loop regions. Mechanistically, substrate hydrolysis occurs by a nucleophilic substitution reaction, with variation in the numbers and roles of divalent cations required."
