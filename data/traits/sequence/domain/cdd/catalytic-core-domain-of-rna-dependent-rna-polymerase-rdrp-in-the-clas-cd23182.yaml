identifier: CDD:cd23182
label: "catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the class Alsuviricetes of positive-sense single-stranded RNA [(+)ssRNA] viruses. This group contains the catalytic core domain of RdRp of RNA viruses belonging to the class Alsuviricetes, phylum: Kitrinoviricota.  Alsuviricetes is a class of [(+)ssRNA] viruses which infect eukaryotes. The name of the group is a syllabic abbreviation of \"alpha supergroup\" with the suffix -viricetes indicating a virus class. The class Alsuviricetes includes three orders: Hepelivirales, Martellivirales, and Tymovirales. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
definition: >-
  catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the class Alsuviricetes of positive-sense single-stranded RNA [(+)ssRNA] viruses. This group contains the catalytic core domain of RdRp of RNA viruses belonging to the class Alsuviricetes, phylum: Kitrinoviricota. Alsuviricetes is a class of [(+)ssRNA] viruses which infect eukaryotes. The name of the group is a syllabic abbreviation of "alpha supergroup" with the suffix -viricetes indicating a virus class. The class Alsuviricetes includes three orders: Hepelivirales, Martellivirales, and Tymovirales. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides. — an NCBI CDD conserved domain (cd23182); members share this curated model.
