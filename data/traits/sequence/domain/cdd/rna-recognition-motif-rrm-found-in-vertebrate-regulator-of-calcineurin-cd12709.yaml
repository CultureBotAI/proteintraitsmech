identifier: CDD:cd12709
label: "RNA recognition motif (RRM) found in vertebrate regulator of calcineurin 2 (RCAN2). This subgroup corresponds to the RRM of RCAN2, also termed calcipressin-2, or Down syndrome candidate region 1-like 1 (DSCR1L1), or myocyte-enriched calcineurin-interacting protein 2 (MCIP2), or thyroid hormone-responsive protein ZAKI-4, encoded by a novel thyroid hormone-responsive gene ZAKI-4 that is abundantly expressed in human brain, heart and muscles. RCAN2 binds to the catalytic subunit of Ca2+/calmodulin-dependent phosphatase calcineurin (also termed PP2B or PP3C), calcineurin A, and inhibits its phosphatase activity through its C-terminal region. RCAN2 consists of an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), a highly conserved SP repeat domain containing the phosphorylation site by GSK-3, a well-known PxIxIT motif responsible for docking many substrates to calcineurin, and an unrecognized C-terminal TxxP motif of unknown function."
definition: >-
  RNA recognition motif (RRM) found in vertebrate regulator of calcineurin 2 (RCAN2). This subgroup corresponds to the RRM of RCAN2, also termed calcipressin-2, or Down syndrome candidate region 1-like 1 (DSCR1L1), or myocyte-enriched calcineurin-interacting protein 2 (MCIP2), or thyroid hormone-responsive protein ZAKI-4, encoded by a novel thyroid hormone-responsive gene ZAKI-4 that is abundantly expressed in human brain, heart and muscles. RCAN2 binds to the catalytic subunit of Ca2+/calmodulin-dependent phosphatase calcineurin (also termed PP2B or PP3C), calcineurin A, and inhibits its phosphatase activity through its C-terminal region. RCAN2 consists of an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), a highly conserved SP repeat domain containing the phosphorylation site by GSK-3, a well-known PxIxIT motif responsible for docking many substrates to calcineurin, and an unrecognized C-terminal TxxP motif of unknown function. — an NCBI CDD conserved domain (cd12709); members share this curated model.
