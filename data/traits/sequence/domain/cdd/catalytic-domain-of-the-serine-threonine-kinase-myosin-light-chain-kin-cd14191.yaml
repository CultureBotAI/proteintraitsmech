identifier: CDD:cd14191
label: "Catalytic domain of the Serine/Threonine Kinase, Myosin Light Chain Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MLCK1 (or MYLK1) phosphorylates myosin regulatory light chain and controls the contraction of smooth muscles. The MLCK1 gene expresses three transcripts in a cell-specific manner: a short MLCK1 which contains three immunoglobulin (Ig)-like and one fibronectin type III (FN3) domains, PEVK and actin-binding regions, and a kinase domain near the C-terminus followed by a regulatory segment containing an autoinhibitory Ca2+/calmodulin binding site; a long MLCK1 containing six additional Ig-like domains at the N-terminus compared to the short MLCK1; and the C-terminal Ig module which results in the expression of telokin in phasic smooth muscles, leading to Ca2+ desensitization by cyclic nucleotides of smooth muscle force. MLCK1 is also responsible for myosin regulatory light chain phosphorylation in nonmuscle cells and may play a role in regulating myosin II ATPase activity. The MLCK1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Myosin Light Chain Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MLCK1 (or MYLK1) phosphorylates myosin regulatory light chain and controls the contraction of smooth muscles. The MLCK1 gene expresses three transcripts in a cell-specific manner: a short MLCK1 which contains three immunoglobulin (Ig)-like and one fibronectin type III (FN3) domains, PEVK and actin-binding regions, and a kinase domain near the C-terminus followed by a regulatory segment containing an autoinhibitory Ca2+/calmodulin binding site; a long MLCK1 containing six additional Ig-like domains at the N-terminus compared to the short MLCK1; and the C-terminal Ig module which results in the expression of telokin in phasic smooth muscles, leading to Ca2+ desensitization by cyclic nucleotides of smooth muscle force. MLCK1 is also responsible for myosin regulatory light chain phosphorylation in nonmuscle cells and may play a role in regulating myosin II ATPase activity. The MLCK1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14191); members share this curated model.
