identifier: CDD:cd10830
label: "PDZ domain of membrane palmitoylated protein1 (MPP1), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of MPP1, and related domains. MPP1 (also known as MAGUK p55 subfamily member 1, erythrocyte membrane protein p55, EMP55) is a membrane-associated guanylate kinase (MAGUK)-like protein which forms a complex with protein 4.1 and glycophorin C (GPC) at the cytoplasmic face of the plasma membrane; this complex is essential for cytoskeleton-membrane linkage in erythrocytes and many non-erythroid cells, and participates in the determination of membrane stability and cell shape. MPP1, by interacting with various scaffold proteins and cytoskeletal proteins in the postsynaptic density, also plays an important role in organizing synaptic and non-synaptic structures. MPP1 is also a component of the Crumbs protein complex in the mammalian retina and may link the Usher protein network and the Crumbs protein complex. The MPP1 PDZ domain binding partners include GPC, ABCC4, and CADM1/Necl-2/SynCAM1. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This MPP1-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
