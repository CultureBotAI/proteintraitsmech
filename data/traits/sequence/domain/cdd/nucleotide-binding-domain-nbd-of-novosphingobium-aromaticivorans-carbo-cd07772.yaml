identifier: CDD:cd07772
label: "nucleotide-binding domain (NBD) of Novosphingobium aromaticivorans carbohydrate kinase and similar proteins. This subfamily corresponds to a group of uncharacterized bacterial proteins with similarity to carbohydrate kinase from Novosphingobium aromaticivorans (NaCK). These proteins may catalyze the transfer of a phosphate group from ATP to their carbohydrate substrates. They belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain."
definition: >-
  nucleotide-binding domain (NBD) of Novosphingobium aromaticivorans carbohydrate kinase and similar proteins. This subfamily corresponds to a group of uncharacterized bacterial proteins with similarity to carbohydrate kinase from Novosphingobium aromaticivorans (NaCK). These proteins may catalyze the transfer of a phosphate group from ATP to their carbohydrate substrates. They belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain. — an NCBI CDD conserved domain (cd07772); members share this curated model.
