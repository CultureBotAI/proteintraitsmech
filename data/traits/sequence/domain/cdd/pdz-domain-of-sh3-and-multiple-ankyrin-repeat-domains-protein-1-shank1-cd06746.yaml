identifier: CDD:cd06746
label: "PDZ domain of SH3 and multiple ankyrin repeat domains protein 1 (SHANK1), SHANK2, SHANK3, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of SHANK1, SHANK2, SHANK3, and related domains. SHANK family proteins, SHANK1 (also known as somatostatin receptor-interacting protein, SSTR-interacting protein, SSTRIP), SHANK2 (also known as cortactin-binding protein 1, proline-rich synapse-associated protein 1), and SHANK3 (proline-rich synapse-associated protein 2) are synaptic scaffolding proteins which are highly enriched in the post-synaptic densities of excitatory synapses. They have been implicated in synaptic transmission, synapse formation, synaptic plasticity, and cytoskeletal remodeling, and are regulators of Cav1 calcium current and CREB target expression. Many protein ligands have been identified for the Shank PDZ domain, such as GKAP (also known as SAPAP), betaPIX (a guanine nucleotide exchange factor used by Rho GTPase family members Rac1 and Cdc42), alpha-latrotoxin, neuroligin, group I metabotropic glutamate receptors (mGluRs), and L-type calcium channels. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This SHANK-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged as beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta- strand F."
