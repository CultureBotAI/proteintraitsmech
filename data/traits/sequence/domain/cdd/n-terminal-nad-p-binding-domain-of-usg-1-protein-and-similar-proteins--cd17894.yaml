identifier: CDD:cd17894
label: "N-terminal NAD(P)-binding domain of USG-1 protein and similar proteins. The family includes Escherichia coli USG-1 protein, Pseudomonas aeruginosa USG-1 homolog proteins and similar proteins. Although their biological function remains unknown, they are homologs to aspartate beta-semialdehyde dehydrogenase (ASADH) which contains an N-terminal Rossmann fold NAD(P) binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like domain. However, USG-1 proteins lack the conserved active site residues of the ASADH protein C-terminal domain."
definition: >-
  N-terminal NAD(P)-binding domain of USG-1 protein and similar proteins. The family includes Escherichia coli USG-1 protein, Pseudomonas aeruginosa USG-1 homolog proteins and similar proteins. Although their biological function remains unknown, they are homologs to aspartate beta-semialdehyde dehydrogenase (ASADH) which contains an N-terminal Rossmann fold NAD(P) binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like domain. However, USG-1 proteins lack the conserved active site residues of the ASADH protein C-terminal domain. — an NCBI CDD conserved domain (cd17894); members share this curated model.
