identifier: CDD:cd22151
label: "F-box domain found in Arabidopsis thaliana F-box protein GID2 and similar proteins. AtGID2, also called protein SLEEPY 1, is an essential component of the SCF-type E3 ligase complex, SCF(GID2), a complex that positively regulates the gibberellin signaling pathway. Upon gibberellin treatment, the SCF(GID2) complex mediates the ubiquitination and subsequent degradation of DELLA proteins (GAI, RGA and RGL2), some repressors of the gibberellin pathway, leading to the activation of the pathway. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Arabidopsis thaliana F-box protein GID2 and similar proteins. AtGID2, also called protein SLEEPY 1, is an essential component of the SCF-type E3 ligase complex, SCF(GID2), a complex that positively regulates the gibberellin signaling pathway. Upon gibberellin treatment, the SCF(GID2) complex mediates the ubiquitination and subsequent degradation of DELLA proteins (GAI, RGA and RGL2), some repressors of the gibberellin pathway, leading to the activation of the pathway. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22151); members share this curated model.
