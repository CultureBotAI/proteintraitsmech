identifier: CDD:cd22699
label: FHA_PLM2-like
definition: >-
  forkhead associated (FHA) domain found in Saccharomyces cerevisiae plasmid maintenance protein 2 (PLM2) and similar proteins. This subfamily includes two homologs PLM2 and TOS4 (also called target of SBF protein 4), which are predicted to be chromatin-associated proteins. They bind to the promoters of genes with functions important for the G1/S (start) transition. PLM2 targets primarily genes involved in DNA synthesis and repair, chromosome segregation, nuclear division, and transcription. TOS4 targets primarily genes involved in pheromone response, polarized growth, and transcription. The FHA domain is a small phosphopeptide recognition module
