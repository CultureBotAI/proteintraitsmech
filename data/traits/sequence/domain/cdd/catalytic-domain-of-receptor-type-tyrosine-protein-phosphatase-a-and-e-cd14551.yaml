identifier: CDD:cd14551
label: "catalytic domain of receptor-type tyrosine-protein phosphatase A and E, repeat 1. Receptor-type tyrosine-protein phosphatase A (PTPRA) and E (PTPRE) belong to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPRA and PTPRE share several functions including regulation of Src family kinases and voltage-gated potassium (Kv) channels. They both contain a small extracellular domain, a transmembrane segment, and an intracellular region containing two tandem catalytic PTP domains. This model represents the first catalytic PTP domain (repeat 1)."
definition: >-
