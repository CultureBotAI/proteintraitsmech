identifier: CDD:cd10963
label: "Putative catalytic NodB homology domain of uncharacterized protein RC0012 from Rickettsia conorii and its bacterial homologs. This family contains an uncharacterized protein RC0012 from Rickettsia conorii and its bacterial homologs. Although their biochemical properties remain to be determined, members in this family seems to be composed of a seven-stranded barrel with detectable sequence similarity to the six-stranded barrel rhizobial NodB-like proteins, which remove N-linked or O-linked acetyl groups from cell wall polysaccharides and belong to the larger carbohydrate esterase 4 (CE4) superfamily."
definition: >-
  Putative catalytic NodB homology domain of uncharacterized protein RC0012 from Rickettsia conorii and its bacterial homologs. This family contains an uncharacterized protein RC0012 from Rickettsia conorii and its bacterial homologs. Although their biochemical properties remain to be determined, members in this family seems to be composed of a seven-stranded barrel with detectable sequence similarity to the six-stranded barrel rhizobial NodB-like proteins, which remove N-linked or O-linked acetyl groups from cell wall polysaccharides and belong to the larger carbohydrate esterase 4 (CE4) superfamily. — an NCBI CDD conserved domain (cd10963); members share this curated model.
