label: "C-terminal domain of U4/U6 small nuclear ribonucleoprotein Prp3. Prp3 is an essential U4/U6 di-snRNP-associated protein which plays a role in pre-mRNA splicing. It may be involved in U4/U6 reassembly after splicing. The C-terminal domain of Prp3 is a single-stranded RNA-binding domain."
definition: >-
  C-terminal domain of U4/U6 small nuclear ribonucleoprotein Prp3. Prp3 is an essential U4/U6 di-snRNP-associated protein which plays a role in pre-mRNA splicing. It may be involved in U4/U6 reassembly after splicing. The C-terminal domain of Prp3 is a single-stranded RNA-binding domain. — an NCBI CDD conserved domain (cd24162); members share this curated model.
