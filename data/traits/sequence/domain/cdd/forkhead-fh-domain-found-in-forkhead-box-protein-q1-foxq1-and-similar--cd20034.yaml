identifier: CDD:cd20034
label: "Forkhead (FH) domain found in Forkhead box protein Q1 (FOXQ1) and similar proteins. FOXQ1, also called HNF-3/Forkhead-like protein 1 (HFH-1), or hepatocyte nuclear factor 3 Forkhead homolog 1, plays a role in hair follicle differentiation. It has also been reported to promote epithelial differentiation, inhibit smooth muscle differentiation, activate T cells and autoimmunity, and control mucin gene expression and granule content in stomach surface mucous cells. FOXQ1 is significantly associated with the pathogenesis of various tumor types including gastric, breast, colorectal, pancreatic, bladder and ovarian cancer, and glioma. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein Q1 (FOXQ1) and similar proteins. FOXQ1, also called HNF-3/Forkhead-like protein 1 (HFH-1), or hepatocyte nuclear factor 3 Forkhead homolog 1, plays a role in hair follicle differentiation. It has also been reported to promote epithelial differentiation, inhibit smooth muscle differentiation, activate T cells and autoimmunity, and control mucin gene expression and granule content in stomach surface mucous cells. FOXQ1 is significantly associated with the pathogenesis of various tumor types including gastric, breast, colorectal, pancreatic, bladder and ovarian cancer, and glioma. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20034); members share this curated model.
