identifier: CDD:cd16067
label: "Tumor necrosis factor ligand superfamily member 15 (TNFSF15), also known as TNF-like ligand 1A (TL1A) or vascular endothelial growth inhibitor (VEGI). This family contains TNFSF15 (also known as TNF-like ligand 1A or TL1A, TNF ligand-related molecule 1, vascular endothelial growth inhibitor or VEGI) which binds its cognate receptor TNFRSF25 (also known as death receptor 3 (DR3) or death domain receptor 3 (DDR3)) as well as the decoy receptor TNFRSF6B (also known as decoy receptor 3 (DcR3), M68 or TR6). TNFSF15/TL1A is abundantly expressed in endothelial cells, but not in either B or T cells. It exerts pleiotropic effects on cell proliferation, activation, and differentiation of immune cells, including helper T (Th) cells and regulatory T (Treg) cells. Polymorphisms of the TNFSF15 gene that encodes TL1A are associated with the pathogenesis of irritable bowel syndrome (IBS), leprosy, as well as autoimmune diseases, including inflammatory bowel disease (IBD), rheumatoid arthritis (RA), primary biliary cirrhosis (PBC), allergic asthma, experimental autoimmune encephalomyelitis and type 1 diabetes. Since TL1A/DR3/DcR3 expression is increased in serum as well as inflamed tissues, modulation of TL1A-DR3 interaction may be a potential therapeutic target. TL1A can suppress endothelial cell proliferation, angiopoiesis, and tumor growth, making it a promising candidate for cancer treatment."
definition: >-
  Tumor necrosis factor ligand superfamily member 15 (TNFSF15), also known as TNF-like ligand 1A (TL1A) or vascular endothelial growth inhibitor (VEGI). This family contains TNFSF15 (also known as TNF-like ligand 1A or TL1A, TNF ligand-related molecule 1, vascular endothelial growth inhibitor or VEGI) which binds its cognate receptor TNFRSF25 (also known as death receptor 3 (DR3) or death domain receptor 3 (DDR3)) as well as the decoy receptor TNFRSF6B (also known as decoy receptor 3 (DcR3), M68 or TR6). TNFSF15/TL1A is abundantly expressed in endothelial cells, but not in either B or T cells. It exerts pleiotropic effects on cell proliferation, activation, and differentiation of immune cells, including helper T (Th) cells and regulatory T (Treg) cells. Polymorphisms of the TNFSF15 gene that encodes TL1A are associated with the pathogenesis of irritable bowel syndrome (IBS), leprosy, as well as autoimmune diseases, including inflammatory bowel disease (IBD), rheumatoid arthritis (RA), primary biliary cirrhosis (PBC), allergic asthma, experimental autoimmune encephalomyelitis and type 1 diabetes. Since TL1A/DR3/DcR3 expression is increased in serum as well as inflamed tissues, modulation of TL1A-DR3 interaction may be a potential therapeutic target. TL1A can suppress endothelial cell proliferation, angiopoiesis, and tumor growth, making it a promising candidate for cancer treatment. — an NCBI CDD conserved domain (cd16067); members share this curated model.
