identifier: CDD:cd09631
label: "DOMON-like domain of copper-dependent monooxygenases and related proteins. This diverse family characterizes DOMON domains found in dopamine beta-hydroxylase (DBH), monooxygenase X (MOX), and various other proteins, some of which contain DOMON domains exclusively; the family is not restricted to eukaryotes. DBH is a membrane-bound enzyme that converts dopamine to L-norepinephrine, and plays a central role in the metabolism of catecholamine neurotransmitters.  DOMON domains were initially thought to confer protein-protein interactions. They were subsequently found as a heme-binding motif in cellobiose dehydrogenase, an extracellular fungal oxidoreductase that degrades both lignin and cellulose, and in ethylbenzene dehydrogenase, an enzyme that aids in the anaerobic degradation of hydrocarbons. The domain interacts with sugars in the type 9 carbohydrate binding modules (CBM9), which are present in a variety of glycosyl hydrolases, and it can also be found at the N-terminus of sensor histidine kinases."
definition: >-
