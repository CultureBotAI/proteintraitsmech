identifier: CDD:cd15505
label: "PHD finger found in the inhibitor of growth (ING) protein family. The ING family includes a group of tumor suppressors, ING1-5, which act as readers and writers of the histone epigenetic code, affecting DNA damage response, chromatin remodeling, cellular senescence, differentiation, cell cycle regulation and apoptosis. They may have a general role in mediating the cellular response to genotoxic stress through binding to and regulating the activities of histone acetyltransferase (HAT) and histone deacetylase (HDAC) chromatin remodeling complexes. All ING proteins contain an N-terminal ING domain and a C-terminal plant homeodomain (PHD) finger."
definition: >-
  PHD finger found in the inhibitor of growth (ING) protein family. The ING family includes a group of tumor suppressors, ING1-5, which act as readers and writers of the histone epigenetic code, affecting DNA damage response, chromatin remodeling, cellular senescence, differentiation, cell cycle regulation and apoptosis. They may have a general role in mediating the cellular response to genotoxic stress through binding to and regulating the activities of histone acetyltransferase (HAT) and histone deacetylase (HDAC) chromatin remodeling complexes. All ING proteins contain an N-terminal ING domain and a C-terminal plant homeodomain (PHD) finger. — an NCBI CDD conserved domain (cd15505); members share this curated model.
