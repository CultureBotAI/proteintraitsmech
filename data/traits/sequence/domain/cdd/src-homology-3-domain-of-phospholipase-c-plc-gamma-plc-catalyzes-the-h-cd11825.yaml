identifier: CDD:cd11825
label: "Src homology 3 domain of Phospholipase C (PLC) gamma. PLC catalyzes the hydrolysis of phosphatidylinositol (4,5)-bisphosphate [PtdIns(4,5)P2] to produce Ins(1,4,5)P3 and diacylglycerol (DAG) in response to various receptors. Ins(1,4,5)P3 initiates the calcium signaling cascade while DAG functions as an activator of PKC. PLCgamma catalyzes this reaction in tyrosine kinase-dependent signaling pathways. It is activated and recruited to its substrate at the membrane. Vertebrates contain two forms of PLCgamma, PLCgamma1, which is widely expressed, and PLCgamma2, which is primarily found in haematopoietic cells. PLCgamma contains a Pleckstrin homology (PH) domain followed by an elongation factor (EF) domain, two catalytic regions of PLC domains that flank two tandem SH2 domains, followed by a SH3 domain and C2 domain. The SH3 domain of PLCgamma1 directly interacts with dynamin-1 and can serve as a guanine nucleotide exchange factor (GEF). It also interacts with Cbl, inhibiting its phosphorylation and activity. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of Phospholipase C (PLC) gamma. PLC catalyzes the hydrolysis of phosphatidylinositol (4,5)-bisphosphate [PtdIns(4,5)P2] to produce Ins(1,4,5)P3 and diacylglycerol (DAG) in response to various receptors. Ins(1,4,5)P3 initiates the calcium signaling cascade while DAG functions as an activator of PKC. PLCgamma catalyzes this reaction in tyrosine kinase-dependent signaling pathways. It is activated and recruited to its substrate at the membrane. Vertebrates contain two forms of PLCgamma, PLCgamma1, which is widely expressed, and PLCgamma2, which is primarily found in haematopoietic cells. PLCgamma contains a Pleckstrin homology (PH) domain followed by an elongation factor (EF) domain, two catalytic regions of PLC domains that flank two tandem SH2 domains, followed by a SH3 domain and C2 domain. The SH3 domain of PLCgamma1 directly interacts with dynamin-1 and can serve as a guanine nucleotide exchange factor (GEF). It also interacts with Cbl, inhibiting its phosphorylation and activity. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11825); members share this curated model.
