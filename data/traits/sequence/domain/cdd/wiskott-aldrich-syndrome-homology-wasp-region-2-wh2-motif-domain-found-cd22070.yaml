identifier: CDD:cd22070
label: "Wiskott-Aldrich Syndrome Homology (WASP) region 2 (WH2 motif) domain found in Actin cytoskeleton-regulatory complex protein Pan1, and similar proteins. This family contains the Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2) found in actin cytoskeleton-regulatory complex protein Pan1, and similar proteins. Pan1 actin cytoskeleton-regulatory complex is a multi-domain scaffold that is required for the internalization of endosomes during actin-coupled endocytosis. It links the site of endocytosis to the cell membrane-associated actin cytoskeleton. Pan1 mediates uptake of external molecules and vacuolar degradation of plasma membrane proteins, may play a role in the proper organization of the cell membrane-associated actin cytoskeleton, and promotes its destabilization."
definition: >-
  Wiskott-Aldrich Syndrome Homology (WASP) region 2 (WH2 motif) domain found in Actin cytoskeleton-regulatory complex protein Pan1, and similar proteins. This family contains the Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2) found in actin cytoskeleton-regulatory complex protein Pan1, and similar proteins. Pan1 actin cytoskeleton-regulatory complex is a multi-domain scaffold that is required for the internalization of endosomes during actin-coupled endocytosis. It links the site of endocytosis to the cell membrane-associated actin cytoskeleton. Pan1 mediates uptake of external molecules and vacuolar degradation of plasma membrane proteins, may play a role in the proper organization of the cell membrane-associated actin cytoskeleton, and promotes its destabilization. — an NCBI CDD conserved domain (cd22070); members share this curated model.
