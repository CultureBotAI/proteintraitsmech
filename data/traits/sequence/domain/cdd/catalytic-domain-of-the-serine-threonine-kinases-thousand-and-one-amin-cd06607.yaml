identifier: CDD:cd06607
label: "Catalytic domain of the Serine/Threonine Kinases, Thousand-and-One Amino acids proteins. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. TAO proteins possess mitogen-activated protein kinase (MAPK) kinase kinase activity. They activate the MAPKs, p38 and c-Jun N-terminal kinase (JNK), by phosphorylating and activating the respective MAP/ERK kinases (MEKs, also known as MKKs or MAPKKs), MEK3/MEK6 and MKK4/MKK7. MAPK signaling cascades are important in mediating cellular responses to extracellular signals. Vertebrates contain three TAO subfamily members, named TAO1, TAO2, and TAO3. The TAO subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinases, Thousand-and-One Amino acids proteins. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. TAO proteins possess mitogen-activated protein kinase (MAPK) kinase kinase activity. They activate the MAPKs, p38 and c-Jun N-terminal kinase (JNK), by phosphorylating and activating the respective MAP/ERK kinases (MEKs, also known as MKKs or MAPKKs), MEK3/MEK6 and MKK4/MKK7. MAPK signaling cascades are important in mediating cellular responses to extracellular signals. Vertebrates contain three TAO subfamily members, named TAO1, TAO2, and TAO3. The TAO subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd06607); members share this curated model.
