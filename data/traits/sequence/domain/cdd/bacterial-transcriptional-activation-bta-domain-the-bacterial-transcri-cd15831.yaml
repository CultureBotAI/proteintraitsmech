identifier: CDD:cd15831
label: "Bacterial Transcriptional Activation (BTA) domain. The Bacterial Transcriptional Activation (BTA) domain is present in the putative transcriptional regulator Mycobacterium EmbR and the related Streptomyces antibiotic regulatory protein (SARP) family of transcription factors, which includes DnrI and AfsR, among others. Members of this family contain an N-terminal DNA-binding domain, followed by the BTA domain, and many have diverse domains at the C-terminus. EmbR contains an C-terminal forkhead-associated (FHA) domain, which mediates binding to threonine-phosphorylated sites in a sequence-specific manner. The BTA domain of EmbR contains three Tetratricopeptide repeats (TPRs) and two C-terminal helices. The TPR motif typically contains 34 amino acids, and 5 or 6 tandem repeats of the motif generate a right-handed helical structure with an amphipathic channel that is thought to accommodate an alpha-helix of a target protein."
definition: >-
  Bacterial Transcriptional Activation (BTA) domain. The Bacterial Transcriptional Activation (BTA) domain is present in the putative transcriptional regulator Mycobacterium EmbR and the related Streptomyces antibiotic regulatory protein (SARP) family of transcription factors, which includes DnrI and AfsR, among others. Members of this family contain an N-terminal DNA-binding domain, followed by the BTA domain, and many have diverse domains at the C-terminus. EmbR contains an C-terminal forkhead-associated (FHA) domain, which mediates binding to threonine-phosphorylated sites in a sequence-specific manner. The BTA domain of EmbR contains three Tetratricopeptide repeats (TPRs) and two C-terminal helices. The TPR motif typically contains 34 amino acids, and 5 or 6 tandem repeats of the motif generate a right-handed helical structure with an amphipathic channel that is thought to accommodate an alpha-helix of a target protein. — an NCBI CDD conserved domain (cd15831); members share this curated model.
