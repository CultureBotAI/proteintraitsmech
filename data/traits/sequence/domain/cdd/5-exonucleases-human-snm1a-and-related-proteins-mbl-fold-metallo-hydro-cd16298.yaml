identifier: CDD:cd16298
label: "5'-exonucleases human SNM1A and related proteins; MBL-fold metallo-hydrolase domain. Includes human SNM1A (SNM1 homolog A, also known as DNA cross-link repair 1A protein) which is a 5'-exonuclease and functions in interstrand cross-links (ICL) repair. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions."
definition: >-
  5'-exonucleases human SNM1A and related proteins; MBL-fold metallo-hydrolase domain. Includes human SNM1A (SNM1 homolog A, also known as DNA cross-link repair 1A protein) which is a 5'-exonuclease and functions in interstrand cross-links (ICL) repair. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions. — an NCBI CDD conserved domain (cd16298); members share this curated model.
