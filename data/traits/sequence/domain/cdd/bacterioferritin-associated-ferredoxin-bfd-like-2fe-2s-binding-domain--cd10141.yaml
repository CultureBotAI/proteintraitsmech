identifier: CDD:cd10141
label: "bacterioferritin-associated ferredoxin (BFD)-like [2Fe-2S]-binding domain of Archaeoglobus fulgidus CopZ, and similar proteins. Archaeoglobus fulgidus CopZ is a fusion of a redox-active domain (containing a mononuclear metal center and an [2Fe-2S] cluster) with a CXXC-containing copper-binding domain.  It is a soluble Cu+ chaperone which delivers cytoplasmic Cu+ to the transmembrane metal-binding sites in the Cu+-ATPase CopA; CopA couples the hydrolysis of ATP to the efflux of cytoplasmic Cu+. In addition to CopZ, the BFD-like [2Fe-2S]-binding domain is found in a variety of other proteins including bacterioferritin-associated ferredoxin (BFD), and the large subunit of NADH-dependent nitrite reductase. It comprises a helix-turn-helix fold, and binds an [2Fe-2S] cluster via 4 highly-conserved Cys residues, found in loops between the alpha-helices. For the class of proteins having a BFD-like [2Fe-2S]-binding domain, the Cys residues are organized in a unique C-X2-C-X31-35-C-X2-9-C-arrangement. [2Fe-2S] clusters are sulfide-linked diiron centers, a primary role for which is electron transport."
definition: >-
  bacterioferritin-associated ferredoxin (BFD)-like [2Fe-2S]-binding domain of Archaeoglobus fulgidus CopZ, and similar proteins. Archaeoglobus fulgidus CopZ is a fusion of a redox-active domain (containing a mononuclear metal center and an [2Fe-2S] cluster) with a CXXC-containing copper-binding domain. It is a soluble Cu+ chaperone which delivers cytoplasmic Cu+ to the transmembrane metal-binding sites in the Cu+-ATPase CopA; CopA couples the hydrolysis of ATP to the efflux of cytoplasmic Cu+. In addition to CopZ, the BFD-like [2Fe-2S]-binding domain is found in a variety of other proteins including bacterioferritin-associated ferredoxin (BFD), and the large subunit of NADH-dependent nitrite reductase. It comprises a helix-turn-helix fold, and binds an [2Fe-2S] cluster via 4 highly-conserved Cys residues, found in loops between the alpha-helices. For the class of proteins having a BFD-like [2Fe-2S]-binding domain, the Cys residues are organized in a unique C-X2-C-X31-35-C-X2-9-C-arrangement. [2Fe-2S] clusters are sulfide-linked diiron centers, a primary role for which is electron transport. — an NCBI CDD conserved domain (cd10141); members share this curated model.
