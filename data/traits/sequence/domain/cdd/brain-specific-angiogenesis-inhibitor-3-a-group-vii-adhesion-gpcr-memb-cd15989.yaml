identifier: CDD:cd15989
label: "brain-specific angiogenesis inhibitor 3, a group VII adhesion GPCR, member of the class B2 family of seven-transmembrane G protein-coupled receptors. Brain-specific angiogenesis inhibitors (BAI1-3) constitute the group VII of cell-adhesion receptors that have been implicated in vascularization of glioblastomas. They belong to the B2 subfamily of class B GPCRs, are predominantly expressed in the brain, and are only present in vertebrates. Three BAIs, like all adhesion receptors, are characterized by the presence of large N-terminal extracellular domains containing multiple adhesion motifs, which play critical roles in cell-cell adhesion and cell-matrix interactions, that are coupled to a class B seven-transmembrane domain. For example, BAI1 N-terminus contain an integrin-binding RGD (Arg-Gly-Asp) motif  in addition to five thrombospondin type 1 repeats (TSRs), which are known to regulate the anti-angiogenic activity of thrombospondin-1,  whereas BAI2 and BAI3 have four TSRs, but do not possess RGD motifs. The TSRs are functionally involved in cell attachment, activation of latent TGF-beta, inhibition of angiogenesis and endothelial cell migration. The TSRs of BAI1 mediates direct binding to phosphatidylserine, which enables both recognition and internalization of apoptotic cells by phagocytes. Thus, BAI1 functions as a phosphatidylserine receptor that forms a trimeric complex with ELMO and Dock180, leading to activation of Rac-GTPase which promotes the binding and phagocytosis of apoptotic cells. BAI3 can also interact with the ELMO-Dock180 complex to activate the Rac pathway and can also bind to secreted C1ql proteins of the C1Q complement family via its N-terminal TSRs. BAI3 and its ligands C1QL1 are highly expressed during synaptogenesis and are involved in synapse specificity. Moreover, BAI2 acts as a transcription repressor to regulate vascular endothelial growth factor (VEGF) expression through interaction with GA-binding protein gamma (GABP). The N-terminal extracellular domains of all three BAIs also contain an evolutionarily conserved GPCR-autoproteolysis inducing (GAIN) domain, which undergoes autoproteolytic processing at the GPCR proteolysis site (GPS) motif to generate N- and C-terminal fragments (NTF and CTF), a putative hormone-binding domain (HBD), and multiple N-glycosylation sites. The C-terminus of each BAI subtype ends with a conserved Gln-Thr-Glu-Val (QTEV) motif known to interact with PDZ domain-containing proteins, but only BAI1 possesses a proline-rich region, which may be involved in protein-protein interactions."
definition: >-
  brain-specific angiogenesis inhibitor 3, a group VII adhesion GPCR, member of the class B2 family of seven-transmembrane G protein-coupled receptors. Brain-specific angiogenesis inhibitors (BAI1-3) constitute the group VII of cell-adhesion receptors that have been implicated in vascularization of glioblastomas. They belong to the B2 subfamily of class B GPCRs, are predominantly expressed in the brain, and are only present in vertebrates. Three BAIs, like all adhesion receptors, are characterized by the presence of large N-terminal extracellular domains containing multiple adhesion motifs, which play critical roles in cell-cell adhesion and cell-matrix interactions, that are coupled to a class B seven-transmembrane domain. For example, BAI1 N-terminus contain an integrin-binding RGD (Arg-Gly-Asp) motif in addition to five thrombospondin type 1 repeats (TSRs), which are known to regulate the anti-angiogenic activity of thrombospondin-1, whereas BAI2 and BAI3 have four TSRs, but do not possess RGD motifs. The TSRs are functionally involved in cell attachment, activation of latent TGF-beta, inhibition of angiogenesis and endothelial cell migration. The TSRs of BAI1 mediates direct binding to phosphatidylserine, which enables both recognition and internalization of apoptotic cells by phagocytes. Thus, BAI1 functions as a phosphatidylserine receptor that forms a trimeric complex with ELMO and Dock180, leading to activation of Rac-GTPase which promotes the binding and phagocytosis of apoptotic cells. BAI3 can also interact with the ELMO-Dock180 complex to activate the Rac pathway and can also bind to secreted C1ql proteins of the C1Q complement family via its N-terminal TSRs. BAI3 and its ligands C1QL1 are highly expressed during synaptogenesis and are involved in synapse specificity. Moreover, BAI2 acts as a transcription repressor to regulate vascular endothelial growth factor (VEGF) expression through interaction with GA-binding protein gamma (GABP). The N-terminal extracellular domains of all three BAIs also contain an evolutionarily conserved GPCR-autoproteolysis inducing (GAIN) domain, which undergoes autoproteolytic processing at the GPCR proteolysis site (GPS) motif to generate N- and C-terminal fragments (NTF and CTF), a putative hormone-binding domain (HBD), and multiple N-glycosylation sites. The C-terminus of each BAI subtype ends with a conserved Gln-Thr-Glu-Val (QTEV) motif known to interact with PDZ domain-containing proteins, but only BAI1 possesses a proline-rich region, which may be involved in protein-protein interactions. — an NCBI CDD conserved domain (cd15989); members share this curated model.
