identifier: CDD:cd20469
label: "Tudor domain found in trinucleotide repeat-containing gene 18 protein (TNRC18) and similar proteins. TNRC18, also called long CAG trinucleotide repeat-containing gene 79 protein (CAGL79), is a protein that in humans is encoded by the TNRC18 gene. Its biological function remains unclear. TNRC18 contains one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
