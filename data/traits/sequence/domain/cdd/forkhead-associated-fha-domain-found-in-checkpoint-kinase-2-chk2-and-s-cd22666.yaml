identifier: CDD:cd22666
label: "forkhead associated (FHA) domain found in checkpoint kinase 2 (Chk2) and similar proteins. Chk2, also called Hucds1, Cds1 homolog, or serine/threonine-protein kinase Chk2, plays an important role in cellular responses to DNA double-strand breaks and related lesions. It is phosphorylated and activated by ATM kinase, resulting in its dissociation from sites of damage to phosphorylate downstream targets such as BRCA1, p53, cell cycle transcription factor E2F1, the promyelocytic leukemia protein (PML) involved in apoptosis, and CDC25 phosphatases, among others. Mutations in Chk2 is linked to a variety of cancers including familial breast cancer, myelodysplastic syndromes, prostate cancer, lung cancer, and osteosarcomas. Chk2 contains an N-terminal SQ/TQ cluster domain (SCD), a central forkhead-associated (FHA) domain, and a C-terminal catalytic kinase domain. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in checkpoint kinase 2 (Chk2) and similar proteins. Chk2, also called Hucds1, Cds1 homolog, or serine/threonine-protein kinase Chk2, plays an important role in cellular responses to DNA double-strand breaks and related lesions. It is phosphorylated and activated by ATM kinase, resulting in its dissociation from sites of damage to phosphorylate downstream targets such as BRCA1, p53, cell cycle transcription factor E2F1, the promyelocytic leukemia protein (PML) involved in apoptosis, and CDC25 phosphatases, among others. Mutations in Chk2 is linked to a variety of cancers including familial breast cancer, myelodysplastic syndromes, prostate cancer, lung cancer, and osteosarcomas. Chk2 contains an N-terminal SQ/TQ cluster domain (SCD), a central forkhead-associated (FHA) domain, and a C-terminal catalytic kinase domain. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22666); members share this curated model.
