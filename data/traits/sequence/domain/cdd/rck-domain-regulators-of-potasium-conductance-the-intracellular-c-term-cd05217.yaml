label: Rck_domain_K_channel
definition: >-
  RCK domain (Regulators of potasium conductance ) The intracellular C-terminal domain of E. coli K+ channel regulates the conductance of K+. The RCK domain has a Rossmann-fold topology common in many NAD binding proteins, but often lack the GxGxxG glycine motif associated with nucleotide binding and don'tbind NAD. The RCK domains are homologous to the intracellular component of the TrkA K+ transporters
