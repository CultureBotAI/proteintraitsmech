identifier: CDD:cd17541
label: "phosphoacceptor receiver (REC) domain of chemotaxis response regulator protein-glutamate methylesterase CheB and similar chemotaxis proteins. Methylesterase CheB is a chemotaxis response regulator with an N-terminal REC domain and a C-terminal methylesterase domain. Chemotaxis is a behavior known in motile bacteria that directs their movement in response to chemical gradients. CheB is a phosphorylation-activated response regulator involved in the reversible modification of bacterial chemotaxis receptors. It catalyzes the demethylation of specific methylglutamate residues introduced into the chemoreceptors (methyl-accepting chemotaxis proteins) by CheR. The CheB REC domain packs against the active site of the C-terminal domain and inhibits methylesterase activity by directly restricting access to the active site. Also included in this family is chemotaxis response regulator CheY, which contains a stand-alone REC domain, and an uncharacterized subfamily composed of proteins containing an N-terminal REC domain and a C-terminal CheY-P phosphatase (CheC) domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of chemotaxis response regulator protein-glutamate methylesterase CheB and similar chemotaxis proteins. Methylesterase CheB is a chemotaxis response regulator with an N-terminal REC domain and a C-terminal methylesterase domain. Chemotaxis is a behavior known in motile bacteria that directs their movement in response to chemical gradients. CheB is a phosphorylation-activated response regulator involved in the reversible modification of bacterial chemotaxis receptors. It catalyzes the demethylation of specific methylglutamate residues introduced into the chemoreceptors (methyl-accepting chemotaxis proteins) by CheR. The CheB REC domain packs against the active site of the C-terminal domain and inhibits methylesterase activity by directly restricting access to the active site. Also included in this family is chemotaxis response regulator CheY, which contains a stand-alone REC domain, and an uncharacterized subfamily composed of proteins containing an N-terminal REC domain and a C-terminal CheY-P phosphatase (CheC) domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17541); members share this curated model.
