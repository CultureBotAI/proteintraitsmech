identifier: CDD:cd08112
label: ATP-G_TTLL5
definition: >-
  Tubulin tyrosine ligase-like family, member 5. Tubulin tyrosine ligase-like family, member 5 (TTLL5) is a member of Tubulin-tyrosine ligase (TTL, EC 6.3.2.25) family. TTL catalyses the posttranslational addition of a tyrosine to the carboxy-terminal end of detyrosinated alpha-tubulin in the presense of ATP. TTL requires K and Mg ions for catalysis and uses detyrosinated alpha-tubulin as a substrate. It plays a key role in microtubules assembly. Based on the sequence and functional similarities with glutathione synthetase (GSHase), biotin carboxylase (BC), D-ala D-ala ligase (DD-ligase), and succinyl-CoA synthetase (SCS) families it is concluded that TTL belongs to ATP-grasp superfamily. Human tubulin tyrosine ligase-like 5 gene (TTLL5) maps to chromosome region 4q24.3 and encodes for a 1281 amino acid protein. RNA interference (RNAi) depletion of C55A6.2 (a TTLL5 type) in Caenorhabditis elegans, causes embryonic lethality and sterility
