identifier: CDD:cd24048
label: "nucleotide-binding domain (NBD) of cell division protein FtsA and similar proteins. FtsA is an essential cell division protein that assists in the assembly of the Z ring. It may serve as the principal membrane anchor for the Z ring. It is also required for the recruitment to the septal ring of the downstream cell division proteins FtsK, FtsQ, FtsL, FtsI and FtsN. FtsA binds ATP. FtsA interacts with FtsZ. This interaction plays an essential role in cell division."
definition: >-
  nucleotide-binding domain (NBD) of cell division protein FtsA and similar proteins. FtsA is an essential cell division protein that assists in the assembly of the Z ring. It may serve as the principal membrane anchor for the Z ring. It is also required for the recruitment to the septal ring of the downstream cell division proteins FtsK, FtsQ, FtsL, FtsI and FtsN. FtsA binds ATP. FtsA interacts with FtsZ. This interaction plays an essential role in cell division. — an NCBI CDD conserved domain (cd24048); members share this curated model.
