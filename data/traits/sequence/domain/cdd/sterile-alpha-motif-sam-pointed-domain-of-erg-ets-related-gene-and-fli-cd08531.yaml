identifier: CDD:cd08531
label: "Sterile alpha motif (SAM)/Pointed domain of ERG (Ets related gene) and FLI-1 (Friend leukemia integration 1) transcription factors. SAM Pointed domain of ERG/FLI-1 subfamily of ETS transcriptional regulators is a putative protein-protein interaction domain. The ERG and FLI regulators are involved in endothelial cell differentiation, bone morphogenesis and neural crest development. They are proto-oncogenes implicated in cancer development such as myeloid leukemia, Ewing's sarcoma and erythroleukemia. Members of this subfamily are potential targets for cancer therapy."
definition: >-
  Sterile alpha motif (SAM)/Pointed domain of ERG (Ets related gene) and FLI-1 (Friend leukemia integration 1) transcription factors. SAM Pointed domain of ERG/FLI-1 subfamily of ETS transcriptional regulators is a putative protein-protein interaction domain. The ERG and FLI regulators are involved in endothelial cell differentiation, bone morphogenesis and neural crest development. They are proto-oncogenes implicated in cancer development such as myeloid leukemia, Ewing's sarcoma and erythroleukemia. Members of this subfamily are potential targets for cancer therapy. — an NCBI CDD conserved domain (cd08531); members share this curated model.
