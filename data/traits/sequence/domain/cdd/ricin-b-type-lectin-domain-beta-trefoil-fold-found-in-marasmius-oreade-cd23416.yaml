identifier: CDD:cd23416
label: "ricin B-type lectin domain, beta-trefoil fold, found in Marasmius oreades agglutinin (MOA) and similar proteins. The family includes Marasmius oreades agglutinin (MOA) and Polyporus squamosus Ricin B-related lectin (PSL). MOA is a lectin isolated from fruiting bodies of the mushroom M. oreades. It specifically binds non-reducing terminal Galalpha(1,3)Gal carbohydrates, such as that which occurs in the xenotransplantation epitope Galalpha(1,3)Galbeta(1,4)GlcNAc and the branched blood group B determinant Galalpha(1,3)[Fucalpha(1,2)]Gal. Polyporus squamosus Ricin B-related lectin (PSL) is a lectin specific for glycans terminating with the sequence Neu5Acalpha2-6Galbeta. Like MOA, PSL is a calcium-dependent cysteine protease. Both MOA and PSL contain an N-terminal ricin B-type lectin domain and a C-terminal agglutinin domain. The ricin B-type lectin domain is a beta-trefoil domain, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Marasmius oreades agglutinin (MOA) and similar proteins. The family includes Marasmius oreades agglutinin (MOA) and Polyporus squamosus Ricin B-related lectin (PSL). MOA is a lectin isolated from fruiting bodies of the mushroom M. oreades. It specifically binds non-reducing terminal Galalpha(1,3)Gal carbohydrates, such as that which occurs in the xenotransplantation epitope Galalpha(1,3)Galbeta(1,4)GlcNAc and the branched blood group B determinant Galalpha(1,3)[Fucalpha(1,2)]Gal. Polyporus squamosus Ricin B-related lectin (PSL) is a lectin specific for glycans terminating with the sequence Neu5Acalpha2-6Galbeta. Like MOA, PSL is a calcium-dependent cysteine protease. Both MOA and PSL contain an N-terminal ricin B-type lectin domain and a C-terminal agglutinin domain. The ricin B-type lectin domain is a beta-trefoil domain, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket. — an NCBI CDD conserved domain (cd23416); members share this curated model.
