identifier: CDD:cd13016
label: LamG_FACIT
definition: >-
  Thrombospondin N (TSPN)-like domain of FACIT protein family. The FACIT protein family (fibril-associated collagens with interrupted triple helices) of collagens is characterized by containing more than one triple helical domain seperated by a non-triple-helical segment. They do not multimerize to fibers and don't undergo proteolytic processing. Most members are located on the surface of collagen fibers and mediate the interactions with other matrix proteins. The subfamily includes collagen IX, XII, XIV,XVI,XIX,XX, XXI,and XXII
