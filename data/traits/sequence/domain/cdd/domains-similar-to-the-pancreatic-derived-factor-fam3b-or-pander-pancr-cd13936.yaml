identifier: CDD:cd13936
label: "Domains similar to the Pancreatic-derived factor. FAM3B or PANDER (PANcreatic DERived factor) has been identifed as a regulator of glucose homeostasis and beta cell function. The protein is expressed in the endocrine pancreas and co-secreted with insulin in response to glucose, particularly under conditions of insulin resistance. The protein had initially been predicted to be a member of the four-helical cytokine family, hence the FAM3B designation. This wider family contains FAM3B and FAM4C, N-terminal domains of N-acetylglucosaminyltransferases, and domains in poorly characterized proteins that have been associated with deafness and the progression of cancer."
definition: >-
  Domains similar to the Pancreatic-derived factor. FAM3B or PANDER (PANcreatic DERived factor) has been identifed as a regulator of glucose homeostasis and beta cell function. The protein is expressed in the endocrine pancreas and co-secreted with insulin in response to glucose, particularly under conditions of insulin resistance. The protein had initially been predicted to be a member of the four-helical cytokine family, hence the FAM3B designation. This wider family contains FAM3B and FAM4C, N-terminal domains of N-acetylglucosaminyltransferases, and domains in poorly characterized proteins that have been associated with deafness and the progression of cancer. — an NCBI CDD conserved domain (cd13936); members share this curated model.
