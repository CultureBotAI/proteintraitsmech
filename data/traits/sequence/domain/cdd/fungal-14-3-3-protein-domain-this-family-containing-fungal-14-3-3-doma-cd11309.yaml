identifier: CDD:cd11309
label: "Fungal 14-3-3 protein domain. This family containing fungal 14-3-3 domains includes the yeasts Saccharomyces cerevisiae (BMH1 and BMH2) and Schizosaccharomyces pombe (rad24 and rad25) isoforms. They possess distinctively variant C-terminal segments that differentiate them from the mammalian isoforms; the C-terminus is longer and BMH1/2 isoforms contain polyglutamine (polyQ) sequences of unknown function. The C-terminal segments of yeast 14-3-3 isoforms may thus behave in a different manner compared to the higher eukaryote isoforms. Yeast 14-3-3 proteins bind to numerous proteins involved in a variety of yeast cellular processes making them excellent model organisms for elucidating the function of the 14-3-3 protein family.  BMH1 and BMH2 are positive regulators of rapamycin-sensitive signaling via TOR kinases while they play an inhibitory role in Rtg3p-dependent transcription involved in retrograde signaling. 14-3-3 domains are an essential part of 14-3-3 proteins, a ubiquitous class of regulatory, phosphoserine/threonine-binding proteins found in all eukaryotic cells, including yeast, protozoa and mammalian cells."
definition: >-
  Fungal 14-3-3 protein domain. This family containing fungal 14-3-3 domains includes the yeasts Saccharomyces cerevisiae (BMH1 and BMH2) and Schizosaccharomyces pombe (rad24 and rad25) isoforms. They possess distinctively variant C-terminal segments that differentiate them from the mammalian isoforms; the C-terminus is longer and BMH1/2 isoforms contain polyglutamine (polyQ) sequences of unknown function. The C-terminal segments of yeast 14-3-3 isoforms may thus behave in a different manner compared to the higher eukaryote isoforms. Yeast 14-3-3 proteins bind to numerous proteins involved in a variety of yeast cellular processes making them excellent model organisms for elucidating the function of the 14-3-3 protein family. BMH1 and BMH2 are positive regulators of rapamycin-sensitive signaling via TOR kinases while they play an inhibitory role in Rtg3p-dependent transcription involved in retrograde signaling. 14-3-3 domains are an essential part of 14-3-3 proteins, a ubiquitous class of regulatory, phosphoserine/threonine-binding proteins found in all eukaryotic cells, including yeast, protozoa and mammalian cells. — an NCBI CDD conserved domain (cd11309); members share this curated model.
