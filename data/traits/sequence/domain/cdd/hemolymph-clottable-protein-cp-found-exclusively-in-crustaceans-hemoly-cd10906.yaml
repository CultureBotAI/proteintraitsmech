identifier: CDD:cd10906
label: CP_crustacea
definition: >-
  hemolymph clottable protein (CP) found exclusively in crustaceans. Hemolymph clottable protein (CP). Vitellogenin like proteins that function as part of the immune system in decopods and maxillopods. It has been shown that clots form at wound sites through polymerization of CP by hemocyte transglutaminase
