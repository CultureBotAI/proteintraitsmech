identifier: CDD:cd20488
label: peptidase_C58-like
definition: >-
  C58 peptidase domain and and similar domains. This family contains C58 peptidases and similar proteins. C58 family peptidases are endopeptidases that also act as transamidases, attaching a lipid moiety to the newly exposed N-terminus of the substrate. These include the Pseudomonas avirulence (Avr) protein AvrPphB and the homologous protein from Yersinia known as YopT; both are involved in bacterial pathogenesis. These proteins have a papain-like fold and a distinct substrate-binding site. Also included is a cysteine-protease-like domain in Photorhabdus asymbiotica toxin PaTox that enhances cytotoxic effects of the toxin, and therefore is essential for full PaTox activity. The C58 cysteine protease domain is also found in Vibrio vulnificus biotype 3 multifunctional autoprocessing RTX toxin. It usually contains the characteristic Cys, His, Asp residues in the active site. Some members may lack this cataytic triad
