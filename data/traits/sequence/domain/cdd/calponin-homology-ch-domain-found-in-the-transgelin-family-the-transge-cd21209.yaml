identifier: CDD:cd21209
label: "calponin homology (CH) domain found in the transgelin family. The transgelin (TAGLN) family includes transgelin, transgelin-2 and transgelin-3. Transgelin, also called 22 kDa actin-binding protein, protein WS3-10, or smooth muscle protein 22-alpha (SM22-alpha), acts as an actin cross-linking/gelling protein that may be involved in calcium interactions and in regulating contractile properties of the cell. Transgelin-2, also called epididymis tissue protein Li 7e, or SM22-alpha homolog, acts as an actin-binding protein that induces actin gelation and regulates actin cytoskeleton. It may participate in the development and progression of multiple cancers. Transgelin-3, also called neuronal protein 22 (NP22), or neuronal protein NP25, may have a role in alcohol-related adaptations and may mediate regulatory signal transduction pathways in neurons. Members of this family contain a single copy of the CH domain. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  calponin homology (CH) domain found in the transgelin family. The transgelin (TAGLN) family includes transgelin, transgelin-2 and transgelin-3. Transgelin, also called 22 kDa actin-binding protein, protein WS3-10, or smooth muscle protein 22-alpha (SM22-alpha), acts as an actin cross-linking/gelling protein that may be involved in calcium interactions and in regulating contractile properties of the cell. Transgelin-2, also called epididymis tissue protein Li 7e, or SM22-alpha homolog, acts as an actin-binding protein that induces actin gelation and regulates actin cytoskeleton. It may participate in the development and progression of multiple cancers. Transgelin-3, also called neuronal protein 22 (NP22), or neuronal protein NP25, may have a role in alcohol-related adaptations and may mediate regulatory signal transduction pathways in neurons. Members of this family contain a single copy of the CH domain. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21209); members share this curated model.
