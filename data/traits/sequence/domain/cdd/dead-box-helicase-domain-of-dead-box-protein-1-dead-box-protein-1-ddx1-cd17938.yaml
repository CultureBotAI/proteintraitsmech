identifier: CDD:cd17938
label: "DEAD-box helicase domain of DEAD box protein 1. DEAD box protein 1 (DDX1) acts as an ATP-dependent RNA helicase, able to unwind both RNA-RNA and RNA-DNA duplexes. It possesses 5' single-stranded RNA overhang nuclease activity as well as ATPase activity on various RNA, but not DNA polynucleotides. DDX1 may play a role in RNA clearance at DNA double-strand breaks (DSBs), thereby facilitating the template-guided repair of transcriptionally active regions of the genome. It may also be involved in 3'-end cleavage and polyadenylation of pre-mRNAs. DDX1 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of DEAD box protein 1. DEAD box protein 1 (DDX1) acts as an ATP-dependent RNA helicase, able to unwind both RNA-RNA and RNA-DNA duplexes. It possesses 5' single-stranded RNA overhang nuclease activity as well as ATPase activity on various RNA, but not DNA polynucleotides. DDX1 may play a role in RNA clearance at DNA double-strand breaks (DSBs), thereby facilitating the template-guided repair of transcriptionally active regions of the genome. It may also be involved in 3'-end cleavage and polyadenylation of pre-mRNAs. DDX1 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17938); members share this curated model.
