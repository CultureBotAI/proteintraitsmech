identifier: CDD:cd18237
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 7 (KLHL7). KLHL7 is a component of a Cul3-based E3 ubiquitin ligase complex and is involved in the ubiquitination of target proteins for proteasome-mediated degradation. Mutations in KLHL7 causes autosomal-dominant retinitis pigmentosa. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 7 (KLHL7). KLHL7 is a component of a Cul3-based E3 ubiquitin ligase complex and is involved in the ubiquitination of target proteins for proteasome-mediated degradation. Mutations in KLHL7 causes autosomal-dominant retinitis pigmentosa. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18237); members share this curated model.
