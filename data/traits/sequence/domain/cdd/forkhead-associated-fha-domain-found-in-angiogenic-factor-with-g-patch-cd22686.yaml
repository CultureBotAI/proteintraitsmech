identifier: CDD:cd22686
label: "forkhead associated (FHA) domain found in angiogenic factor with G patch and FHA domains 1 (AGGF1) and similar proteins. AGGF1, also called angiogenic factor VG5Q, or G patch domain-containing protein 7 (GPATC7), or vasculogenesis gene on 5q protein, is an angiogenic factor involved in vascular development, angiogenesis, specification of hemangioblasts, and differentiation of veins. It promotes angiogenesis and the proliferation of endothelial cells. It inhibits inflammatory effect and preserve vascular integrity in non-nervous system diseases. Mutated AGGF1 causes susceptibility to Klippel-Trenaunay syndrome, a vascular disorder. Increased AGGF1 expression is associated with tumor angiogenesis. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in angiogenic factor with G patch and FHA domains 1 (AGGF1) and similar proteins. AGGF1, also called angiogenic factor VG5Q, or G patch domain-containing protein 7 (GPATC7), or vasculogenesis gene on 5q protein, is an angiogenic factor involved in vascular development, angiogenesis, specification of hemangioblasts, and differentiation of veins. It promotes angiogenesis and the proliferation of endothelial cells. It inhibits inflammatory effect and preserve vascular integrity in non-nervous system diseases. Mutated AGGF1 causes susceptibility to Klippel-Trenaunay syndrome, a vascular disorder. Increased AGGF1 expression is associated with tumor angiogenesis. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22686); members share this curated model.
