identifier: CDD:cd07503
label: "histidinol phosphate phosphatase and related phosphatases. This family includes the N-terminal domain of the Escherichia coli bifunctional enzyme histidinol-phosphate phosphatase/imidazole-glycerol-phosphate dehydratase, HisB. The N-terminal histidinol-phosphate phosphatase domain catalyzes the dephosphorylation of histidinol phosphate, the eight step of L-histidine biosynthesis. This family also includes Escherichia coli GmhB phosphatase which is highly specific for D-glycero-D-manno-heptose-1,7-bisphosphate, it removes the C(7)phosphate and not the C(1)phosphate, and this is the third essential step of lipopolysaccharide heptose biosynthesis. This family belongs to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases."
definition: >-
  histidinol phosphate phosphatase and related phosphatases. This family includes the N-terminal domain of the Escherichia coli bifunctional enzyme histidinol-phosphate phosphatase/imidazole-glycerol-phosphate dehydratase, HisB. The N-terminal histidinol-phosphate phosphatase domain catalyzes the dephosphorylation of histidinol phosphate, the eight step of L-histidine biosynthesis. This family also includes Escherichia coli GmhB phosphatase which is highly specific for D-glycero-D-manno-heptose-1,7-bisphosphate, it removes the C(7)phosphate and not the C(1)phosphate, and this is the third essential step of lipopolysaccharide heptose biosynthesis. This family belongs to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases. — an NCBI CDD conserved domain (cd07503); members share this curated model.
