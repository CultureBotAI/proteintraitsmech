identifier: CDD:cd20197
label: "DNA-binding domain of Xenopus VegT and related T-box proteins. VegT, (also known as Antipodean, Brat and Xombi), is a T-box transcription factor required in early Xenopus embryos for the formation of both, the mesoderm and endoderm germ layers. This subfamily belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is Brachyury (also known as TBXT, or T). T-box family members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns."
definition: >-
