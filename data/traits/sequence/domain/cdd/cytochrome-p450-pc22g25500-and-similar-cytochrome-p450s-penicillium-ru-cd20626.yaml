identifier: CDD:cd20626
label: "cytochrome P450 Pc22g25500 and similar cytochrome P450s. Penicillium rubens Pc22g25500 is a putative cytochrome P450 of unknown function. Cytochrome P450 (P450, CYP) is a large superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. Their monooxygenase activity relies on the reductive scission of molecular oxygen bound to the P450 heme iron, and the delivery of two electrons to the heme iron during the catalytic cycle."
definition: >-
  cytochrome P450 Pc22g25500 and similar cytochrome P450s. Penicillium rubens Pc22g25500 is a putative cytochrome P450 of unknown function. Cytochrome P450 (P450, CYP) is a large superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. Their monooxygenase activity relies on the reductive scission of molecular oxygen bound to the P450 heme iron, and the delivery of two electrons to the heme iron during the catalytic cycle. — an NCBI CDD conserved domain (cd20626); members share this curated model.
