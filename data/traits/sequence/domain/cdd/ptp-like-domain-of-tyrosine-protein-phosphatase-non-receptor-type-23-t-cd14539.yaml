identifier: CDD:cd14539
label: "PTP-like domain of tyrosine-protein phosphatase non-receptor type 23. Tyrosine-protein phosphatase non-receptor type 23 (PTPN23), also called His domain-containing protein tyrosine phosphatase (HD-PTP) or protein tyrosine phosphatase TD14 (PTP-TD14), is a catalytically inactive member of the tyrosine-specific protein tyrosine phosphatase (PTP) family. Human PTPN23 may be involved in the regulation of small nuclear ribonucleoprotein assembly and pre-mRNA splicing by modifying the survival motor neuron (SMN) complex. It plays a role in ciliogenesis and is part of endosomal sorting complex required for transport (ESCRT) pathways. PTPN23 contains five domains: a BRO1-like domain that plays a role in endosomal sorting; a V-domain that interacts with Lys63-linked polyubiquitinated substrates; a central proline-rich region that might recruit SH3-containing proteins; a PTP-like domain; and a proteolytic degradation-targeting motif, also known as a PEST sequence."
definition: >-
