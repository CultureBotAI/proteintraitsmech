label: "SET domain found in SET domain-containing protein 6 (SETD6) and similar proteins. SETD6 is a lysine N-methyltransferase that monomethylates 'Lys-310' of the RELA subunit of NF-kappa-B complex, leading to down-regulate NF-kappa-B transcription factor activity. It also monomethylates 'Lys-8' of H2AZ (H2AZK8me1)."
definition: >-
