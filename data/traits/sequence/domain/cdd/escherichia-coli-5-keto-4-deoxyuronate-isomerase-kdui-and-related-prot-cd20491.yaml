identifier: CDD:cd20491
label: "Escherichia coli 5-keto-4-deoxyuronate isomerase (KduI) and related proteins, C-terminal cupin domain. 5-keto-4-deoxyuronate isomerase (KduI; EC 5.3.1.17), also called 5-dehydro-4-deoxy-D-glucuronate isomerase or 4-deoxy-L-threo-5-hexosulose-uronate ketol-isomerase, catalyzes the interconversion of 5-keto-4-deoxyuronate and 2,5-diketo-3-dexoygluconate in the breakdown of pectin. KduI is a bicupin; this model describes the C-terminal cupin domain. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  Escherichia coli 5-keto-4-deoxyuronate isomerase (KduI) and related proteins, C-terminal cupin domain. 5-keto-4-deoxyuronate isomerase (KduI; EC 5.3.1.17), also called 5-dehydro-4-deoxy-D-glucuronate isomerase or 4-deoxy-L-threo-5-hexosulose-uronate ketol-isomerase, catalyzes the interconversion of 5-keto-4-deoxyuronate and 2,5-diketo-3-dexoygluconate in the breakdown of pectin. KduI is a bicupin; this model describes the C-terminal cupin domain. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd20491); members share this curated model.
