identifier: CDD:cd21677
label: "synaptotagmin-like mitochondrial-lipid-binding protein (SMP) domain found in the synaptotagmin family, mostly plants. The synaptotagmin family includes Arabidopsis thaliana synaptotagmins (AtSYT1-5) and similar proteins. AtSYT1, also called NTMC2T1.1, or synaptotagmin A (SYTA), plays an important role in maintaining plasma membrane integrity during freezing and osmotic stresses. It may function in membrane resealing during calcium-dependent freezing tolerance. It regulates endocytosis and endosome recycling at the plasma membrane and cell-to-cell trafficking of cabbage leaf curl virus (CaLCuV) and tobacco mosaic virus (TMV) movement proteins via plasmodesmata. AtSYT2, also called NTMC2T1.2, or synaptotagmin B (SYTB), may play an important role in regulating an unconventional protein trafficking from the cytosol to the extracellular matrix. AtSYT3 (also called NTMC2T1.3, or synaptotagmin C, or SYTC), AtSYT4 (also called NTMC2T2.2, or synaptotagmin D, or SYTD) and AtSYT5 (also called NTMC2T2.1, or synaptotagmin E, or SYTE) may also be involved in membrane trafficking. This model corresponds to the SMP domain of SYT family proteins, which may be implicated in lipid transport."
definition: >-
  synaptotagmin-like mitochondrial-lipid-binding protein (SMP) domain found in the synaptotagmin family, mostly plants. The synaptotagmin family includes Arabidopsis thaliana synaptotagmins (AtSYT1-5) and similar proteins. AtSYT1, also called NTMC2T1.1, or synaptotagmin A (SYTA), plays an important role in maintaining plasma membrane integrity during freezing and osmotic stresses. It may function in membrane resealing during calcium-dependent freezing tolerance. It regulates endocytosis and endosome recycling at the plasma membrane and cell-to-cell trafficking of cabbage leaf curl virus (CaLCuV) and tobacco mosaic virus (TMV) movement proteins via plasmodesmata. AtSYT2, also called NTMC2T1.2, or synaptotagmin B (SYTB), may play an important role in regulating an unconventional protein trafficking from the cytosol to the extracellular matrix. AtSYT3 (also called NTMC2T1.3, or synaptotagmin C, or SYTC), AtSYT4 (also called NTMC2T2.2, or synaptotagmin D, or SYTD) and AtSYT5 (also called NTMC2T2.1, or synaptotagmin E, or SYTE) may also be involved in membrane trafficking. This model corresponds to the SMP domain of SYT family proteins, which may be implicated in lipid transport. — an NCBI CDD conserved domain (cd21677); members share this curated model.
