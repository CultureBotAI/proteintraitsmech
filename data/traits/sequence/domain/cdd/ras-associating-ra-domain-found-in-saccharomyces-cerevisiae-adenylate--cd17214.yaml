identifier: CDD:cd17214
label: "Ras-associating (RA) domain found in Saccharomyces cerevisiae adenylate cyclase and similar proteins. CYR1, also termed ATP pyrophosphate-lyase, or adenylyl cyclase, is a fungal adenylate cyclase that regulates developmental processes such as hyphal growth, biofilm formation, and phenotypic switching. CYR1 plays essential roles in regulation of cellular metabolism by catalyzing the synthesis of a second messenger, cAMP. It acts as a scaffold protein keeping Ras2 available for its regulatory factors, the Ira proteins. CYR1 has at least four domains, including an N-terminal adenylate cyclase G-alpha binding domain, a Ras-associating (RA) domain, a middle leucine-rich repeat region, and a catalytic domain. The RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin; ubiquitin is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair. The RA domain of CYR1 post-translationally modifies a small GTPase called Ras, which is involved in cellular signal transduction. CYR1 activity is stimulated directly by regulatory proteins (Ras1 and Gpa2), peptidoglycan fragments and carbon dioxide."
definition: >-
  Ras-associating (RA) domain found in Saccharomyces cerevisiae adenylate cyclase and similar proteins. CYR1, also termed ATP pyrophosphate-lyase, or adenylyl cyclase, is a fungal adenylate cyclase that regulates developmental processes such as hyphal growth, biofilm formation, and phenotypic switching. CYR1 plays essential roles in regulation of cellular metabolism by catalyzing the synthesis of a second messenger, cAMP. It acts as a scaffold protein keeping Ras2 available for its regulatory factors, the Ira proteins. CYR1 has at least four domains, including an N-terminal adenylate cyclase G-alpha binding domain, a Ras-associating (RA) domain, a middle leucine-rich repeat region, and a catalytic domain. The RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin; ubiquitin is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair. The RA domain of CYR1 post-translationally modifies a small GTPase called Ras, which is involved in cellular signal transduction. CYR1 activity is stimulated directly by regulatory proteins (Ras1 and Gpa2), peptidoglycan fragments and carbon dioxide. — an NCBI CDD conserved domain (cd17214); members share this curated model.
