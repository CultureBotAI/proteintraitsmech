identifier: CDD:cd08078
label: ATP-G_cp_like1
definition: >-
  ATP-grasp domain of circularly permuted members like-1. ATP-grasp domain of proteins that display a rare gene permutation which results into a circular shift of the consereved secondary structure. In spite of the circular perputation, the resulting protein forms a very similar active site, as a result, members of this family display same catalytic mechanism as other members of the superfamily. It has been suggested that this rare gene permutation must have occurred before the evolution of eukaryotes. The C-terminal region of this subfamily corresponds to the domain of unknown function 407 (DUF407)
