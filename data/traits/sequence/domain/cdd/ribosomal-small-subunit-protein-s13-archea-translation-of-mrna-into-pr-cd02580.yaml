identifier: CDD:cd02580
label: "Ribosomal small subunit protein S13, archea. Translation of mRNA into proteins by the ribosome is universally conserved in all cellular life. Archaeal ribosomes have an intermediate complexity compared with bacterial and eukaryotic ones, sharing several additional components of the translation machinery with eukaryotes that are absent in bacteria. uS13 is an important part of the translation process which is universally present in the small subunit of prokaryotic (S13) and eukaryotic (S18) ribosomes. uS13 is involved in forming bridges between small and large ribosomal subunits which is highly conserved in all domains of life."
definition: >-
  Ribosomal small subunit protein S13, archea. Translation of mRNA into proteins by the ribosome is universally conserved in all cellular life. Archaeal ribosomes have an intermediate complexity compared with bacterial and eukaryotic ones, sharing several additional components of the translation machinery with eukaryotes that are absent in bacteria. uS13 is an important part of the translation process which is universally present in the small subunit of prokaryotic (S13) and eukaryotic (S18) ribosomes. uS13 is involved in forming bridges between small and large ribosomal subunits which is highly conserved in all domains of life. — an NCBI CDD conserved domain (cd02580); members share this curated model.
