identifier: CDD:cd22695
label: "forkhead associated (FHA) domain found in Saccharomyces cerevisiae vacuolar protein sorting-associated protein 64 (VPS64) and similar proteins. This subfamily includes VPS64 (also called factor arrest protein 9 or FAR9) and factor arrest protein 10 (FAR10), which participate in the control of the re-entry into the cell cycle following pheromone treatment. VPS64 is also involved in vacuolar protein sorting. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in Saccharomyces cerevisiae vacuolar protein sorting-associated protein 64 (VPS64) and similar proteins. This subfamily includes VPS64 (also called factor arrest protein 9 or FAR9) and factor arrest protein 10 (FAR10), which participate in the control of the re-entry into the cell cycle following pheromone treatment. VPS64 is also involved in vacuolar protein sorting. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22695); members share this curated model.
