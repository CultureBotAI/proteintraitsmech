identifier: CDD:cd00972
label: RsmA
definition: >-
  16S rRNA (adenine(1518)-N(6)/adenine(1519)-N(6))-dimethyltransferase. RsmA dimethylates two adjacent adenosines (A1518 and A1519) in the loop of a conserved hairpin near the 3'-end of 16S rRNA in the 30S particle and may play a critical role in biogenesis of 30S subunits
