identifier: CDD:cd00526
label: Ribosomal_L37e
definition: >-
  Ribosomal_L37e. Ribosomal protein L37e. This family includes ribosomal protein L37 from eukaryotes and archaea. L37e contains a zinc finger motif which binds zinc, forming a small, central globular region with N- and C-terminal extensions or tails that penetrate the body of the ribosome particle. The tertiary structure of L37e is determined almost entirely by entirely its interactions with ribosomal RNA
