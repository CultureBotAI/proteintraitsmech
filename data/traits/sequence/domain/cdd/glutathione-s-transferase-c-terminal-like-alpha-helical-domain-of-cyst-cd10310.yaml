identifier: CDD:cd10310
label: "Glutathione S-transferase C-terminal-like, alpha helical domain of Cysteinyl-tRNA synthetase from higher eukaryotes. Glutathione S-transferase (GST) C-terminal domain family, Cysteinyl-tRNA synthetase (CysRS) subfamily; This model characterizes the GST_C-like domain found in the N-terminal region of CysRS from higher eukaryotes. Aminoacyl-tRNA synthetases (aaRSs) comprise a family of enzymes that catalyze the coupling of amino acids with their matching tRNAs. This involves the formation of an aminoacyl adenylate using ATP, followed by the transfer of the activated amino acid to the 3'-adenosine moiety of the tRNA. AaRSs may also be involved in translational and transcriptional regulation, as well as in tRNA processing. The GST_C-like domain of CysRS from higher eukaryotes is likely involved in protein-protein interactions, to mediate the formation of the multi-aaRS complex that acts as a molecular hub to coordinate protein synthesis. CysRSs from prokaryotes and lower eukaryotes do not appear to contain this GST_C-like domain."
definition: >-
  Glutathione S-transferase C-terminal-like, alpha helical domain of Cysteinyl-tRNA synthetase from higher eukaryotes. Glutathione S-transferase (GST) C-terminal domain family, Cysteinyl-tRNA synthetase (CysRS) subfamily; This model characterizes the GST_C-like domain found in the N-terminal region of CysRS from higher eukaryotes. Aminoacyl-tRNA synthetases (aaRSs) comprise a family of enzymes that catalyze the coupling of amino acids with their matching tRNAs. This involves the formation of an aminoacyl adenylate using ATP, followed by the transfer of the activated amino acid to the 3'-adenosine moiety of the tRNA. AaRSs may also be involved in translational and transcriptional regulation, as well as in tRNA processing. The GST_C-like domain of CysRS from higher eukaryotes is likely involved in protein-protein interactions, to mediate the formation of the multi-aaRS complex that acts as a molecular hub to coordinate protein synthesis. CysRSs from prokaryotes and lower eukaryotes do not appear to contain this GST_C-like domain. — an NCBI CDD conserved domain (cd10310); members share this curated model.
