identifier: CDD:cd11401
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in the Mad family. Members of the Mad family (Mad1, Mxi, Mad3, and Mad4) bear the bHLHzip domain (also known as basic-helix-loop-helix-leucine-zipper or bHLH-LZ domain), which mediates heterodimerization to Max and the sequence-specific DNA binding ability to E-box DNA. Mad family proteins can repress transcription at the E-box through their interaction with co-repressors. Mad family proteins antagonize Myc function in transactivation and transformation and they are growth/tumor suppressors. The developmental phenotypes of the individual Mad family member knockout mice are relatively mild- all these mice have been shown to be viable and normal."
definition: >-
