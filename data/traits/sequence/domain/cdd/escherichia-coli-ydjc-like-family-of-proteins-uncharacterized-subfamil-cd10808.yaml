identifier: CDD:cd10808
label: "Escherichia coli YdjC-like family of  proteins. Uncharacterized  subfamily of YdjC-like family of proteins. Included in this subfamily is the uncharacterized Escherichia coli protein YdjC (also known as ChbG), encoded by the chb (N,N'-diacetylchitobiose, also called [GlcNAc]2) or cel operon, which encodes enzymes involved in growth on an N,N'-diacetylchitobiose carbon source. The molecular function of this subfamily is unclear."
definition: >-
  Escherichia coli YdjC-like family of proteins. Uncharacterized subfamily of YdjC-like family of proteins. Included in this subfamily is the uncharacterized Escherichia coli protein YdjC (also known as ChbG), encoded by the chb (N,N'-diacetylchitobiose, also called [GlcNAc]2) or cel operon, which encodes enzymes involved in growth on an N,N'-diacetylchitobiose carbon source. The molecular function of this subfamily is unclear. — an NCBI CDD conserved domain (cd10808); members share this curated model.
