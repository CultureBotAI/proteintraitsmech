identifier: CDD:cd16111
label: "Doublecortin-like domain found in doublecortin-like kinase 3 (DCLK3). DCLK3 is a member of doublecortin (DCX) protein family. It functions as a microtubule-associated protein (MAP). DCLK3 contains only one N-terminal doublecortin domain (DCX), unlike DCLK1 and DCLK2 which each have two conserved DCX domains. The DCX domain has a stable ubiquitin-like tertiary fold. Ubiquitin (Ub) is a protein modifier in eukaryotes that is involved in various cellular processes, including transcriptional regulation, cell cycle control, and DNA repair. In addition to microtubule binding domains, DCLK3 has a serine/threonine kinase domain that is similar to Ca/calmodulin-dependent (Cam) protein kinases."
definition: >-
  Doublecortin-like domain found in doublecortin-like kinase 3 (DCLK3). DCLK3 is a member of doublecortin (DCX) protein family. It functions as a microtubule-associated protein (MAP). DCLK3 contains only one N-terminal doublecortin domain (DCX), unlike DCLK1 and DCLK2 which each have two conserved DCX domains. The DCX domain has a stable ubiquitin-like tertiary fold. Ubiquitin (Ub) is a protein modifier in eukaryotes that is involved in various cellular processes, including transcriptional regulation, cell cycle control, and DNA repair. In addition to microtubule binding domains, DCLK3 has a serine/threonine kinase domain that is similar to Ca/calmodulin-dependent (Cam) protein kinases. — an NCBI CDD conserved domain (cd16111); members share this curated model.
