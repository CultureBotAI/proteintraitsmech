identifier: CDD:cd11459
label: "basic helix-loop-helix-orange (bHLH-O) domain found in hairy and enhancer of split HES-1, HES-4  and similar proteins. The family includes two bHLH-O transcriptional repressors, HES-1 and HES-4. HES-1, also termed Class B basic helix-loop-helix protein 39 (bHLHb39), or hairy homolog, or hairy-like protein (HL), plays an essential role in development of both compartment and boundary cells of the central nervous system. It regulates the maintenance of neural stem/progenitor cells by inhibiting proneural gene expression via Notch signaling. HES-4, also termed Class B basic helix-loop-helix protein 42 (bHLHb42), or bHLH factor Hes4, antagonizes the function of Twist-1 to regulate lineage commitment of bone marrow stromal/stem cells (BMSC). Epigenetic dysregulation of HES-4 is associated with striatal degeneration in postmortem Huntington brains. Both HES-1 and HES-4 are mammalian counterparts of the Hairy and Enhancer of split proteins that play a critical role in many physiological processes including cellular differentiation, cell cycle arrest, apoptosis and self-renewal ability."
definition: >-
  basic helix-loop-helix-orange (bHLH-O) domain found in hairy and enhancer of split HES-1, HES-4 and similar proteins. The family includes two bHLH-O transcriptional repressors, HES-1 and HES-4. HES-1, also termed Class B basic helix-loop-helix protein 39 (bHLHb39), or hairy homolog, or hairy-like protein (HL), plays an essential role in development of both compartment and boundary cells of the central nervous system. It regulates the maintenance of neural stem/progenitor cells by inhibiting proneural gene expression via Notch signaling. HES-4, also termed Class B basic helix-loop-helix protein 42 (bHLHb42), or bHLH factor Hes4, antagonizes the function of Twist-1 to regulate lineage commitment of bone marrow stromal/stem cells (BMSC). Epigenetic dysregulation of HES-4 is associated with striatal degeneration in postmortem Huntington brains. Both HES-1 and HES-4 are mammalian counterparts of the Hairy and Enhancer of split proteins that play a critical role in many physiological processes including cellular differentiation, cell cycle arrest, apoptosis and self-renewal ability. — an NCBI CDD conserved domain (cd11459); members share this curated model.
