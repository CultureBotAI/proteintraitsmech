identifier: CDD:cd10447
label: "GIY-YIG domain of uncharacterized hypothetical protein found in bacteria and archaea. The family includes a group of uncharacterized hypothetical proteins, mainly found in bacteria and a few found in archaea, with a GIY-YIG domain that shows statistically significant similarity to the N-terminal catalytic domains of GIY-YIG family of intron-encoded homing endonuclease I-TevI and catalytic GIY-YIG domain of nucleotide excision repair endonuclease UvrC."
definition: >-
  GIY-YIG domain of uncharacterized hypothetical protein found in bacteria and archaea. The family includes a group of uncharacterized hypothetical proteins, mainly found in bacteria and a few found in archaea, with a GIY-YIG domain that shows statistically significant similarity to the N-terminal catalytic domains of GIY-YIG family of intron-encoded homing endonuclease I-TevI and catalytic GIY-YIG domain of nucleotide excision repair endonuclease UvrC. — an NCBI CDD conserved domain (cd10447); members share this curated model.
