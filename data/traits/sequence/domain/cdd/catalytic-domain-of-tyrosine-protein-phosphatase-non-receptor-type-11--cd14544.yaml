identifier: CDD:cd14544
label: "catalytic domain of tyrosine-protein phosphatase non-receptor type 11 and type 6. Tyrosine-protein phosphatase non-receptor type 11 (PTPN11) and type 6 (PTPN6) belong to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPN11 and PTPN6, are also called SH2 domain-containing tyrosine phosphatase 2 (SHP2) and 1 (SHP1), respectively. They contain two tandem SH2 domains: a catalytic PTP domain, and a C-terminal tail with regulatory properties. Although structurally similar, they have different localization and different roles in signal transduction. PTPN11/SHP2 is expressed ubiquitously and plays a positive role in cell signaling, leading to cell activation, while PTPN6/SHP1 expression is restricted mainly to hematopoietic and epithelial cells and functions as a negative regulator of signaling events."
