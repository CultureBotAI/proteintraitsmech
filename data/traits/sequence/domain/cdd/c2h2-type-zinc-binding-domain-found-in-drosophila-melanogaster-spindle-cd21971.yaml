identifier: CDD:cd21971
label: "C2H2-type zinc binding domain found in Drosophila melanogaster Spindle-F (Spn-F) and similar proteins. spn-F is the central mediator of IK2 kinase-dependent dendrite pruning in drosophila sensory neurons. It acts downstream of IKK-related kinase Ik2 in the same pathway for dendrite pruning. Spn-F is a coil-coiled protein containing a C2H2-type zinc binding domain."
definition: >-
  C2H2-type zinc binding domain found in Drosophila melanogaster Spindle-F (Spn-F) and similar proteins. spn-F is the central mediator of IK2 kinase-dependent dendrite pruning in drosophila sensory neurons. It acts downstream of IKK-related kinase Ik2 in the same pathway for dendrite pruning. Spn-F is a coil-coiled protein containing a C2H2-type zinc binding domain. — an NCBI CDD conserved domain (cd21971); members share this curated model.
