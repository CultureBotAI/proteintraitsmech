identifier: CDD:cd09555
label: "SAM domain of EPH-B6 subfamily of tyrosine kinase receptors. SAM (sterile alpha motif) domain of EPH-B6 subfamily of receptor tyrosine kinases is a C-terminal potential protein-protein interaction domain. This domain is located in the cytoplasmic region of EPH-B6 receptors and appears to mediate cell-cell initiated signal transduction. Receptors of this type are highly expressed in embryo and adult nervous system, in thymus and also in T-cells. They are involved in regulation of cell adhesion and migration. (EPH-B6 receptor is unusual; it fails to show catalytic activity due to alteration in kinase domain). EPH-B6 may be considered as a biomarker in some types of tumors; EPH-B6 activates MAP kinase signaling in lung adenocarcinoma, suppresses metastasis formation in non-small cell lung cancer, and slows invasiveness in some breast cancer cell lines."
