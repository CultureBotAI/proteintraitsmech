identifier: CDD:cd16072
label: "Ectodysplasin A. This TNF-like family contains ectodysplasin (also known as ED1, HED, EDA1, EDA2, HED1, ODT1, XHED, ECTD1, XLHED, ED1-A1, ED1-A2, EDA-A1, EDA-A2, STHAGX1). EDA binds the ectodysplasin A receptor (EDAR, also known as DL, ED3, ED5, ED1R, EDA3, HRM1, EDA1R, ECTD10A, ECTD10B, EDA-A1R), and can activate the nuclear factor-kappaB, JNK, and caspase-independent cell death pathways. It is required for the development of hair, teeth, and other ectodermal derivatives. Loss-of-function mutations in this gene as well as in its receptor (EDAR) and in ectodysplasin A receptor-associated death domain (EDARADD), result in autosomal dominant and recessive forms of hypohidrotic ectodermal dysplasia (HED); thus the EDA-EDAR-EDARADD axis is unique since naturally occurring mutations in ligand, receptor, and adaptor protein give rise to the same phenotypic disease. HED is a rare congenital genodermatosis characterized by abnormal development of sweat glands, teeth, nails and hair. Patients present defects in the development of ectoderm-derived structures resulting in sparse hair, too few teeth (oligodontia), the absence or reduction in the ability to sweat as well as problems with mucous and saliva and the production and formation of pigment cells."
definition: >-
  Ectodysplasin A. This TNF-like family contains ectodysplasin (also known as ED1, HED, EDA1, EDA2, HED1, ODT1, XHED, ECTD1, XLHED, ED1-A1, ED1-A2, EDA-A1, EDA-A2, STHAGX1). EDA binds the ectodysplasin A receptor (EDAR, also known as DL, ED3, ED5, ED1R, EDA3, HRM1, EDA1R, ECTD10A, ECTD10B, EDA-A1R), and can activate the nuclear factor-kappaB, JNK, and caspase-independent cell death pathways. It is required for the development of hair, teeth, and other ectodermal derivatives. Loss-of-function mutations in this gene as well as in its receptor (EDAR) and in ectodysplasin A receptor-associated death domain (EDARADD), result in autosomal dominant and recessive forms of hypohidrotic ectodermal dysplasia (HED); thus the EDA-EDAR-EDARADD axis is unique since naturally occurring mutations in ligand, receptor, and adaptor protein give rise to the same phenotypic disease. HED is a rare congenital genodermatosis characterized by abnormal development of sweat glands, teeth, nails and hair. Patients present defects in the development of ectoderm-derived structures resulting in sparse hair, too few teeth (oligodontia), the absence or reduction in the ability to sweat as well as problems with mucous and saliva and the production and formation of pigment cells. — an NCBI CDD conserved domain (cd16072); members share this curated model.
