identifier: CDD:cd23513
label: "Kinetoplastid RNA Editing Protein A4 (KREPA4). The KREPA4 (TbMP24) protein is a crucial component of the KREPA RNA editing catalytic complex (RECC) in parasitic protozoans. Kinetoplastid RNA editing (KRE) proteins occur as pairs or sets of related proteins in multiple complexes. This complex is composed of six components (KREPA1-6), which share a conserved C-terminal region containing an oligonucleotide-binding (OB)-fold-like domain. KREPA4 OB-fold domain plays a crucial role in the stable integration of KREPA4 into the editosomes, which are responsible for RNA editing in these parasites. KREPA4 is an RNA binding protein, and it is thought to be specific for the guide RNA (gRNA) Utail. KREPA4 interacts with KREPA6 via the alpha-helix region of its OB-fold, and the entire OB-fold is required for its integration into the functional editosome via additional protein-protein interactions. KREPA4 is also essential for the stability of the 20S editosome."
definition: >-
  Kinetoplastid RNA Editing Protein A4 (KREPA4). The KREPA4 (TbMP24) protein is a crucial component of the KREPA RNA editing catalytic complex (RECC) in parasitic protozoans. Kinetoplastid RNA editing (KRE) proteins occur as pairs or sets of related proteins in multiple complexes. This complex is composed of six components (KREPA1-6), which share a conserved C-terminal region containing an oligonucleotide-binding (OB)-fold-like domain. KREPA4 OB-fold domain plays a crucial role in the stable integration of KREPA4 into the editosomes, which are responsible for RNA editing in these parasites. KREPA4 is an RNA binding protein, and it is thought to be specific for the guide RNA (gRNA) Utail. KREPA4 interacts with KREPA6 via the alpha-helix region of its OB-fold, and the entire OB-fold is required for its integration into the functional editosome via additional protein-protein interactions. KREPA4 is also essential for the stability of the 20S editosome. — an NCBI CDD conserved domain (cd23513); members share this curated model.
