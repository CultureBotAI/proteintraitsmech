identifier: CDD:cd14520
label: "dual specificity phosphatase domain of dual specificity protein phosphatase 12 and similar proteins. Dual specificity protein phosphatase 12 (DUSP12), also called YVH1, functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). It deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. DUSP12 is an atypical DUSP; it contains the catalytic dual specificity phosphatase domain but lacks the N-terminal Cdc25/rhodanese-like domain that is present in typical DUSPs or MKPs. It targets p38 MAPK to regulate macrophage response to bacterial infection. It also ameliorates cardiac hypertrophy in response to pressure overload through c-Jun N-terminal kinase (JNK) inhibition. DUSP12 has been identified as a modulator of cell cycle progression, a function independent of phosphatase activity and mediated by its C-terminal zinc-binding domain."
definition: >-
  dual specificity phosphatase domain of dual specificity protein phosphatase 12 and similar proteins. Dual specificity protein phosphatase 12 (DUSP12), also called YVH1, functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). It deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. DUSP12 is an atypical DUSP; it contains the catalytic dual specificity phosphatase domain but lacks the N-terminal Cdc25/rhodanese-like domain that is present in typical DUSPs or MKPs. It targets p38 MAPK to regulate macrophage response to bacterial infection. It also ameliorates cardiac hypertrophy in response to pressure overload through c-Jun N-terminal kinase (JNK) inhibition. DUSP12 has been identified as a modulator of cell cycle progression, a function independent of phosphatase activity and mediated by its C-terminal zinc-binding domain. — an NCBI CDD conserved domain (cd14520); members share this curated model.
