identifier: CDD:cd20707
label: MIX_III
definition: >-
  Marker for type sIX effectors domain, clan III. This subfamily contains the MIX (Marker for type sIX effectors) III clan (MIX III) domain. MIX is a marker of type VI secretion system (T6SS) effectors carrying polymorphic C-terminal toxins. No MIX III clan members have been detected in Vibrionaceae. Predicted activity of the C-terminal toxin domains of MIX III effectors is mainly pore-forming. Studies have shown that many members of the MIX III clan neighbor transposable elements. Notably, many toxins identified as T6SS effectors do not contain a recognizable delivery domain or signal, suggesting that additional delivery domains may exist
