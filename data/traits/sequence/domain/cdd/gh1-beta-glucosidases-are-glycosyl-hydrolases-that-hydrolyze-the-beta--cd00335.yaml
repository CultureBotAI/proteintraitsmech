identifier: CDD:cd00335
label: "GH1. Beta-glucosidases are glycosyl hydrolases that hydrolyze the beta-O-glycosidic bond at the anomeric carbon of a glucose moiety at the nonreducing end of a carbohydrate or glycoside molecule.  These enzymes are present in essentially all living organisms and have been implicated in many roles including biomass conversion in microorganisms, and activation of plant defense compounds, phytohormones, lignin precursors, aromatic volatiles, and metabolic intermediates by releasing glucose blocking groups from the inactive glucosides. To achieve specificity for these various functions, beta-glucosidases must bind to a wide variety of aglycones, in addition to the glucose of the substrate.  The beta-glucosidases that have been characterized to date fall predominantly in glycosyl hydrolase families 1 and 3 (GH1 and GH3), with GH1 enzymes being more numerous in plants.  GH1 contains a wide range of beta-glycosidases, including beta-galactosidases, beta-mannosidases, phospho-beta-galactosidases, phospho-beta-glucosidases,  myrosinases, and thioglucosidases, in addition to beta-glucosidases. Most GH1 enzymes also show significant beta-galactosidase activity."
definition: >-
  GH1. Beta-glucosidases are glycosyl hydrolases that hydrolyze the beta-O-glycosidic bond at the anomeric carbon of a glucose moiety at the nonreducing end of a carbohydrate or glycoside molecule. These enzymes are present in essentially all living organisms and have been implicated in many roles including biomass conversion in microorganisms, and activation of plant defense compounds, phytohormones, lignin precursors, aromatic volatiles, and metabolic intermediates by releasing glucose blocking groups from the inactive glucosides. To achieve specificity for these various functions, beta-glucosidases must bind to a wide variety of aglycones, in addition to the glucose of the substrate. The beta-glucosidases that have been characterized to date fall predominantly in glycosyl hydrolase families 1 and 3 (GH1 and GH3), with GH1 enzymes being more numerous in plants. GH1 contains a wide range of beta-glycosidases, including beta-galactosidases, beta-mannosidases, phospho-beta-galactosidases, phospho-beta-glucosidases, myrosinases, and thioglucosidases, in addition to beta-glucosidases. Most GH1 enzymes also show significant beta-galactosidase activity. — an NCBI CDD conserved domain (cd00335); members share this curated model.
