identifier: CDD:cd19061
label: "transmembrane domain of beta subunits of glycine receptor (GlyR). This family contains transmembrane (TM) domain of the beta subunit of glycine receptor (GlyR or GLR) of the amino acid neurotransmitter glycine, encoded by GLRB gene. The transmembrane region consists of four transmembrane-spanning alpha-helical segments (M1-M4) that are linked by loops. The intracellular loop that links M1 and M2 determines the ion selectivity of the channel. These subunits form heteropentamers with a combination of alpha and beta subunits, either a 2alpha-3beta or 3alpha-2beta stoichiometry. While the alpha subunits contain binding sites for agonists and antagonists and are responsible for ion channel formation, the beta subunit displays structural and regulatory functions, such as GlyR clustering in synaptic locations by interaction between intracellular loop domains with the scaffolding protein gephyrin, and control of pharmacologic responses to agonist or allosteric modulators due in part to the presence of interfaces alpha/beta and beta/beta. GLRB gene mutations are associated with the neurological disorder hyperekplexia, a rare neurological disorder characterized by neonatal hypertonia and exaggerated startle responses to unexpected stimuli, as well as agoraphobic cognitions."
definition: >-
  transmembrane domain of beta subunits of glycine receptor (GlyR). This family contains transmembrane (TM) domain of the beta subunit of glycine receptor (GlyR or GLR) of the amino acid neurotransmitter glycine, encoded by GLRB gene. The transmembrane region consists of four transmembrane-spanning alpha-helical segments (M1-M4) that are linked by loops. The intracellular loop that links M1 and M2 determines the ion selectivity of the channel. These subunits form heteropentamers with a combination of alpha and beta subunits, either a 2alpha-3beta or 3alpha-2beta stoichiometry. While the alpha subunits contain binding sites for agonists and antagonists and are responsible for ion channel formation, the beta subunit displays structural and regulatory functions, such as GlyR clustering in synaptic locations by interaction between intracellular loop domains with the scaffolding protein gephyrin, and control of pharmacologic responses to agonist or allosteric modulators due in part to the presence of interfaces alpha/beta and beta/beta. GLRB gene mutations are associated with the neurological disorder hyperekplexia, a rare neurological disorder characterized by neonatal hypertonia and exaggerated startle responses to unexpected stimuli, as well as agoraphobic cognitions. — an NCBI CDD conserved domain (cd19061); members share this curated model.
