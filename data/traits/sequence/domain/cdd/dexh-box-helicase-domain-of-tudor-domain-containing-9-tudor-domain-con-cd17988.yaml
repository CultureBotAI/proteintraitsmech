identifier: CDD:cd17988
label: "DEXH-box helicase domain of tudor domain containing 9. Tudor domain containing 9 (TDRD9, also known as HIG-1or NET54 or C14orf75) is a part of the  nuclear PIWI-interacting RNA (piRNA) pathway essential for transposon silencing and male fertility TDRD9 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of tudor domain containing 9. Tudor domain containing 9 (TDRD9, also known as HIG-1or NET54 or C14orf75) is a part of the nuclear PIWI-interacting RNA (piRNA) pathway essential for transposon silencing and male fertility TDRD9 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17988); members share this curated model.
