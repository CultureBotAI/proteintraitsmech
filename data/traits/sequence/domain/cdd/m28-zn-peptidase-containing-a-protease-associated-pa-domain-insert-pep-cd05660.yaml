identifier: CDD:cd05660
label: "M28 Zn-peptidase containing a protease-associated (PA) domain insert. Peptidase family M28 (also called aminopeptidase Y family), uncharacterized subfamily. The M28 family contains aminopeptidases as well as carboxypeptidases. They have co-catalytic zinc ions; each zinc ion is tetrahedrally co-ordinated, with three amino acid ligands plus activated water; one aspartate residue binds both metal ions. This subfamily is composed of uncharacterized proteins containing a protease-associated (PA) domain insert which may participate in substrate binding and/or promote conformational changes, influencing the stability and accessibility of the site to substrate."
definition: >-
  M28 Zn-peptidase containing a protease-associated (PA) domain insert. Peptidase family M28 (also called aminopeptidase Y family), uncharacterized subfamily. The M28 family contains aminopeptidases as well as carboxypeptidases. They have co-catalytic zinc ions; each zinc ion is tetrahedrally co-ordinated, with three amino acid ligands plus activated water; one aspartate residue binds both metal ions. This subfamily is composed of uncharacterized proteins containing a protease-associated (PA) domain insert which may participate in substrate binding and/or promote conformational changes, influencing the stability and accessibility of the site to substrate. — an NCBI CDD conserved domain (cd05660); members share this curated model.
