identifier: CDD:cd17684
label: "RUN domain found in RUN domain-containing protein 3 (RUNDC3) and similar proteins. RUNDC3 contains two isoforms, RUNDC3A and RUNDC3B. RUNDC3A, also called Rap2-interacting protein 8 (RPIP8), may act as an effector of Rap2A GTPase in neuronal cells. RUNDC3B, also called Rap2-binding protein 9, or Rap2-interacting protein 9 (RPIP-9), contains a RUN domain in its N-terminal region that mediates interaction with Rap2, an important component of the Mitogen-Activated Protein Kinase (MAPK) cascade, which regulates cellular proliferation and differentiation. It also contains characteristic binding sites for MAPK intermediates. Both RUNDC3A and RUNDC3B contain a RUN domain."
definition: >-
  RUN domain found in RUN domain-containing protein 3 (RUNDC3) and similar proteins. RUNDC3 contains two isoforms, RUNDC3A and RUNDC3B. RUNDC3A, also called Rap2-interacting protein 8 (RPIP8), may act as an effector of Rap2A GTPase in neuronal cells. RUNDC3B, also called Rap2-binding protein 9, or Rap2-interacting protein 9 (RPIP-9), contains a RUN domain in its N-terminal region that mediates interaction with Rap2, an important component of the Mitogen-Activated Protein Kinase (MAPK) cascade, which regulates cellular proliferation and differentiation. It also contains characteristic binding sites for MAPK intermediates. Both RUNDC3A and RUNDC3B contain a RUN domain. — an NCBI CDD conserved domain (cd17684); members share this curated model.
