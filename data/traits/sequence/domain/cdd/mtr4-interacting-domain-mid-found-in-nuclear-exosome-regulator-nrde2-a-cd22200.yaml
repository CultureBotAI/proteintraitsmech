identifier: CDD:cd22200
label: "MTR4-interacting domain (MID) found in nuclear exosome regulator NRDE2 and similar proteins. NRDE2 is a protein of the nuclear speckles that regulates RNA degradation and export from the nucleus through its interaction with MTREX, an essential factor directing various RNAs to exosomal degradation. NRDE2 negatively regulates exosome functions by inhibiting the RNA helicase MTR4 recruitment and exosome interaction. This model corresponds to the N-terminal MTR4-interacting domain (MID) of NRDE2."
definition: >-
  MTR4-interacting domain (MID) found in nuclear exosome regulator NRDE2 and similar proteins. NRDE2 is a protein of the nuclear speckles that regulates RNA degradation and export from the nucleus through its interaction with MTREX, an essential factor directing various RNAs to exosomal degradation. NRDE2 negatively regulates exosome functions by inhibiting the RNA helicase MTR4 recruitment and exosome interaction. This model corresponds to the N-terminal MTR4-interacting domain (MID) of NRDE2. — an NCBI CDD conserved domain (cd22200); members share this curated model.
