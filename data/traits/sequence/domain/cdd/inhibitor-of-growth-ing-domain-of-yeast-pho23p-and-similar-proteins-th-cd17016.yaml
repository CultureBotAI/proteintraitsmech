identifier: CDD:cd17016
label: "Inhibitor of growth (ING) domain of yeast Pho23p and similar proteins. This family is composed of Saccharomyces cerevisiae transcriptional regulatory protein PHO23 (Pho23p), Schizosaccharomyces pombe chromatin modification-related protein png2 (also called ING1 homolog 2), and similar proteins. Pho23p is part of Rpd3/Sin3 histone deacetylase (HDAC) complex. It is required for the normal function of Rpd3 in the silencing of rDNA, telomeric, and mating-type loci. Pho23p inhibits p53-dependent transcription. The related mammalian ING proteins act as readers and writers of the histone epigenetic code, affecting DNA damage response, chromatin remodeling, cellular senescence, differentiation, cell cycle regulation and apoptosis. They may have a general role in mediating the cellular response to genotoxic stress through binding to and regulating the activities of histone acetyltransferase (HAT) and histone deacetylase (HDAC) chromatin remodeling complexes. All ING proteins contain an N-terminal leucine zipper-like (LZL) motif-containing ING domain that binds unmodified H3 tails, and a well-characterized C-terminal plant homeodomain (PHD)-type zinc-finger domain, binding with lysine 4-tri-methylated histone H3 (H3K4me3). Although these two regions can bind histones independently, together they increase the apparent association of the ING for the H3 tail."
definition: >-
  Inhibitor of growth (ING) domain of yeast Pho23p and similar proteins. This family is composed of Saccharomyces cerevisiae transcriptional regulatory protein PHO23 (Pho23p), Schizosaccharomyces pombe chromatin modification-related protein png2 (also called ING1 homolog 2), and similar proteins. Pho23p is part of Rpd3/Sin3 histone deacetylase (HDAC) complex. It is required for the normal function of Rpd3 in the silencing of rDNA, telomeric, and mating-type loci. Pho23p inhibits p53-dependent transcription. The related mammalian ING proteins act as readers and writers of the histone epigenetic code, affecting DNA damage response, chromatin remodeling, cellular senescence, differentiation, cell cycle regulation and apoptosis. They may have a general role in mediating the cellular response to genotoxic stress through binding to and regulating the activities of histone acetyltransferase (HAT) and histone deacetylase (HDAC) chromatin remodeling complexes. All ING proteins contain an N-terminal leucine zipper-like (LZL) motif-containing ING domain that binds unmodified H3 tails, and a well-characterized C-terminal plant homeodomain (PHD)-type zinc-finger domain, binding with lysine 4-tri-methylated histone H3 (H3K4me3). Although these two regions can bind histones independently, together they increase the apparent association of the ING for the H3 tail. — an NCBI CDD conserved domain (cd17016); members share this curated model.
