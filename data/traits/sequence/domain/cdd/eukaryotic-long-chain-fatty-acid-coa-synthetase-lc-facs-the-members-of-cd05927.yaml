identifier: CDD:cd05927
label: "Eukaryotic long-chain fatty acid CoA synthetase (LC-FACS). The members of this family are eukaryotic fatty acid CoA synthetases that activate fatty acids with chain lengths of 12 to 20. LC-FACS catalyzes the formation of fatty acyl-CoA in a two-step reaction: the formation of a fatty acyl-AMP molecule as an intermediate, and the formation of a fatty acyl-CoA. This is a required step before free fatty acids can participate in most catabolic and anabolic reactions. Organisms tend to have multiple isoforms of LC-FACS genes with multiple splice variants. For example, nine genes are found in Arabidopsis and six genes are expressed in mammalian cells."
definition: >-
  Eukaryotic long-chain fatty acid CoA synthetase (LC-FACS). The members of this family are eukaryotic fatty acid CoA synthetases that activate fatty acids with chain lengths of 12 to 20. LC-FACS catalyzes the formation of fatty acyl-CoA in a two-step reaction: the formation of a fatty acyl-AMP molecule as an intermediate, and the formation of a fatty acyl-CoA. This is a required step before free fatty acids can participate in most catabolic and anabolic reactions. Organisms tend to have multiple isoforms of LC-FACS genes with multiple splice variants. For example, nine genes are found in Arabidopsis and six genes are expressed in mammalian cells. — an NCBI CDD conserved domain (cd05927); members share this curated model.
