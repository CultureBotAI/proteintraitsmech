identifier: CDD:cd09513
label: "SAM domain of BAR subfamily. SAM (sterile alpha motif) domain of BAR (Bifunctional Apoptosis Regulator) subfamily is a protein-protein interaction domain. In addition to the SAM domain, this type of regulator has a RING finger domain. Proteins of this subfamily are involved in the apoptosis signal network. Their overexpression in human neuronal cells significantly protects cells from a broad range of cell death stimuli.  SAM domain can interact with Caspase8, Bcl-2 and Bcl-X resulting in suppression of Bax-induced cell death."
definition: >-
  SAM domain of BAR subfamily. SAM (sterile alpha motif) domain of BAR (Bifunctional Apoptosis Regulator) subfamily is a protein-protein interaction domain. In addition to the SAM domain, this type of regulator has a RING finger domain. Proteins of this subfamily are involved in the apoptosis signal network. Their overexpression in human neuronal cells significantly protects cells from a broad range of cell death stimuli. SAM domain can interact with Caspase8, Bcl-2 and Bcl-X resulting in suppression of Bax-induced cell death. — an NCBI CDD conserved domain (cd09513); members share this curated model.
