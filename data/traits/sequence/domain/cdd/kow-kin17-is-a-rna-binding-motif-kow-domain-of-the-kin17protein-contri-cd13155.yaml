identifier: CDD:cd13155
label: "KOW_Kin17 is a RNA-binding motif. KOW domain of the KIN17protein contributes to the RNA-binding properties of the whole protein. KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4. KIN17 is conserved from yeast to human that ubiquitously expressed at low levels in mammals tissue and have functions in DNA replication, DNA repair and cell cycle control."
definition: >-
  KOW_Kin17 is a RNA-binding motif. KOW domain of the KIN17protein contributes to the RNA-binding properties of the whole protein. KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4. KIN17 is conserved from yeast to human that ubiquitously expressed at low levels in mammals tissue and have functions in DNA replication, DNA repair and cell cycle control. — an NCBI CDD conserved domain (cd13155); members share this curated model.
