identifier: CDD:cd10612
label: glu_deC_a_subfamily1
definition: >-
  Pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily: Glutamate decarboxylase-like. Glutamate decarboxylase type a subfamily 1. This family belongs to pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily (fold I). Based on sequence identity there are two distinct types of histidine and glutamate decarboxylases (types a and b). The major groups in this CD corresponds to glutamate decarboxylase type a (GDC_a). GDC_a catalyzes the decarboxylation of glutamate
