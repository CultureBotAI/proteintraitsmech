identifier: CDD:cd04939
label: "PA2301 is an uncharacterized Pseudomonas aeruginosa protein with a YbaK-like domain of unknown function.  The YbaK-like domain family includes the INS amino acid-editing domain of  the bacterial class II prolyl tRNA synthetase (ProRS), and it's trans-acting homologs, YbaK, and ProX.  The primary function of INS is to hydrolyze mischarged cysteinyl-tRNA(Pro)'s, thus helping ensure the fidelity of translation.  Organisms whose ProRS lacks the INS domain express a single-domain INS homolog such as YbaK, ProX, or PrdX which supplies the function of INS in trans."
definition: >-
  PA2301 is an uncharacterized Pseudomonas aeruginosa protein with a YbaK-like domain of unknown function. The YbaK-like domain family includes the INS amino acid-editing domain of the bacterial class II prolyl tRNA synthetase (ProRS), and it's trans-acting homologs, YbaK, and ProX. The primary function of INS is to hydrolyze mischarged cysteinyl-tRNA(Pro)'s, thus helping ensure the fidelity of translation. Organisms whose ProRS lacks the INS domain express a single-domain INS homolog such as YbaK, ProX, or PrdX which supplies the function of INS in trans. — an NCBI CDD conserved domain (cd04939); members share this curated model.
