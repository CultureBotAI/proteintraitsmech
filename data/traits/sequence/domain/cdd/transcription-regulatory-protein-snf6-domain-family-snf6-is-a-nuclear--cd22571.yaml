identifier: CDD:cd22571
label: SNF6
definition: >-
  transcription regulatory protein SNF6 domain family. SNF6 is a nuclear protein involved in transcriptional activation in Saccharomyces cerevisiae. It is a component of SWI/SNF complex, an ATP-dependent chromatin remodeling complex, which is required for the positive and negative regulation of gene expression of a large number of genes. It changes chromatin structure by altering DNA-histone contacts within a nucleosome, leading eventually to a change in nucleosome position, thus facilitating or repressing binding of gene-specific transcription factors
