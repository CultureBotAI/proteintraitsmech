identifier: CDD:cd23023
label: "zinc finger HIT (zf-HIT) found in Box C/D snoRNA protein 1 (BCD1) and similar proteins. The zf-HIT domain-containing family includes BCD1 and its yeast counterpart Bcd1p, both of which have been characterized as assembly factors for box C/D snoRNPs. BCD1, also known as serologically defined breast cancer antigen NY-BR-75 or zinc finger HIT domain-containing protein 6 (ZNHIT6), is required for the accumulation, processing, transport, and biogenesis of box C/D snoRNAs, specifically U3 and U8, in the nucleoplasm. Bcd1p is essential for cellular viability in Saccharomyces cerevisiae and contributes to the specific stability of box C/D snoRNAs. Members of this family contain a zf-HIT domain, characterized by a fold in \"treble-clef\" through interleaved CCCC and CCHC ZnF motifs that both bind a zinc atom. The zf-HIT domain of Bcd1p is necessary but not sufficient for yeast growth, and although it lacks direct RNA-binding capacity, it helps Bcd1p maintain steady-state levels of box C/D snoRNAs. Additionally, the zf-HIT domain of Bcd1p is functionally interchangeable with that of Hit1p, another box C/D snoRNP assembly factor belonging to the zf-HIT family."
definition: >-
  zinc finger HIT (zf-HIT) found in Box C/D snoRNA protein 1 (BCD1) and similar proteins. The zf-HIT domain-containing family includes BCD1 and its yeast counterpart Bcd1p, both of which have been characterized as assembly factors for box C/D snoRNPs. BCD1, also known as serologically defined breast cancer antigen NY-BR-75 or zinc finger HIT domain-containing protein 6 (ZNHIT6), is required for the accumulation, processing, transport, and biogenesis of box C/D snoRNAs, specifically U3 and U8, in the nucleoplasm. Bcd1p is essential for cellular viability in Saccharomyces cerevisiae and contributes to the specific stability of box C/D snoRNAs. Members of this family contain a zf-HIT domain, characterized by a fold in "treble-clef" through interleaved CCCC and CCHC ZnF motifs that both bind a zinc atom. The zf-HIT domain of Bcd1p is necessary but not sufficient for yeast growth, and although it lacks direct RNA-binding capacity, it helps Bcd1p maintain steady-state levels of box C/D snoRNAs. Additionally, the zf-HIT domain of Bcd1p is functionally interchangeable with that of Hit1p, another box C/D snoRNP assembly factor belonging to the zf-HIT family. — an NCBI CDD conserved domain (cd23023); members share this curated model.
