label: "C-terminal domain of KaiC family protein; uncharacterized subfamily. KaiC is a circadian clock protein, most studied in cyanobacteria.  KaiC, an autokinase, autophosphatase, and ATPase, is part of the core oscillator, composed of three proteins: KaiA, KaiB, and KaiC. The circadian oscillation is regulated via KaiC phosphorylation."
definition: >-
  C-terminal domain of KaiC family protein; uncharacterized subfamily. KaiC is a circadian clock protein, most studied in cyanobacteria. KaiC, an autokinase, autophosphatase, and ATPase, is part of the core oscillator, composed of three proteins: KaiA, KaiB, and KaiC. The circadian oscillation is regulated via KaiC phosphorylation. — an NCBI CDD conserved domain (cd19487); members share this curated model.
