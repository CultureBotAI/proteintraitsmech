identifier: CDD:cd20205
label: "DNA-binding domain of T-box brain protein 2 and related T-box proteins. TBR2 (also known as Eomesodermin, Eomes, or T-brain-2) is a member of the T-box family of transcription factors and is associated with neurogenesis, cardiogenesis and tumor immune response. This subfamily belongs to the T-box family of transcription factors which plays a multitude of diverse functions throughout development. The founding member of the T-box family is Brachyury (also known as TBXT, or T). T-box family members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns."
