identifier: CDD:cd17317
label: "Solute carrier 22 (SLC22) family of organic cation/anion/zwitterion transporters of the Major Facilitator Superfamily. The Solute carrier 22 (SLC22) family of organic cation/anion/zwitterion transporters includes organic cation transporters (OCTs), organic zwitterion/cation transporters (OCTNs), and organic anion transporters (OATs). SLC22 transporters interact with a variety of compounds that include drugs of abuse, environmental toxins, opioid analgesics, antidepressant and anxiolytic agents, and neurotransmitters and their metabolites. The SLC22 family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Solute carrier 22 (SLC22) family of organic cation/anion/zwitterion transporters of the Major Facilitator Superfamily. The Solute carrier 22 (SLC22) family of organic cation/anion/zwitterion transporters includes organic cation transporters (OCTs), organic zwitterion/cation transporters (OCTNs), and organic anion transporters (OATs). SLC22 transporters interact with a variety of compounds that include drugs of abuse, environmental toxins, opioid analgesics, antidepressant and anxiolytic agents, and neurotransmitters and their metabolites. The SLC22 family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17317); members share this curated model.
