identifier: CDD:cd21040
label: PAT1_CTD
definition: >-
  C-terminal domain of DNA topoisomerase 2-associated protein PAT1 and similar proteins. The family includes yeast PAT1 and its homologs. PAT1, also called decapping activator and translational repressor PAT1, or topoisomerase II-associated protein PAT1, or mRNA turnover protein 1, is the activator of decapping that functions as a general and active mechanism of translational repression and required for P-body formation. Human protein PAT1 homolog 1, also called PAT1-like protein 1 (PATL1), or protein PAT1 homolog b (Pat1b), is RNA-binding protein involved in deadenylation-dependent decapping of mRNAs, leading to the degradation of mRNAs. It acts as a scaffold protein that connects deadenylation and decapping machinery. Human protein PAT1 homolog 2, also called PAT1-like protein 2 (PATL2), or protein PAT1 homolog a (Pat1a), is an RNA-binding protein that acts as a translational repressor. Arabidopsis protein PAT1 homolog (AtPAT1) and protein PAT1 homolog 1 (also called AtPAT1H1, or protein ROOT STEM CELL DEFECTIVE 2, or RSD2), are activators of mRNA decapping. AtPAT1 is involved in disease resistance in response to biotrophic and necrotrophic pathogens. AtPAT1H1 is involved in the regulation of root stem cell niche identity. The model corresponds to C-terminal domain of PAT1. It displays a strongly conserved surface responsible for the direct interaction with Lsm2 and Lsm3 proteins from the Lsm1-7 complex, which binds to the 3? end of oligoadenylated mRNAs. It also important for Dcp2 and Xrn1 binding in yeast and human as well as for yeast Edc3 and human EDC4 recruitment
