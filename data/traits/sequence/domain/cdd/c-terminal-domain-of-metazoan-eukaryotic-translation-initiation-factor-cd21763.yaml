identifier: CDD:cd21763
label: "C-terminal domain of metazoan eukaryotic translation initiation factor 2-alpha kinase 4 (EIF2AK4) and similar proteins. EIF2AK4 (EC2.7.11.1), also called eIF-2-alpha kinase GCN2, or GCN2-like protein, is a metabolic-stress sensing protein kinase that phosphorylates the alpha subunit of eukaryotic translation initiation factor 2 (eIF-2-alpha/EIF2S1) on 'Ser-52' in response to low amino acid availability. It plays a role as an activator of the integrated stress response (ISR) required for adaptation to amino acid starvation. The model corresponds to the C-terminal domain (CTD) of metazoan EIF2AK4, which shares little sequence similarity with the yeast counterpart. In addition, although both CTDs are responsible for their structure dimerization and bind single- and double-stranded RNA, mammalian EIF2AK4 does not appear to stably associate with the ribosome, whereas yeast EIF2AK4 does."
definition: >-
  C-terminal domain of metazoan eukaryotic translation initiation factor 2-alpha kinase 4 (EIF2AK4) and similar proteins. EIF2AK4 (EC2.7.11.1), also called eIF-2-alpha kinase GCN2, or GCN2-like protein, is a metabolic-stress sensing protein kinase that phosphorylates the alpha subunit of eukaryotic translation initiation factor 2 (eIF-2-alpha/EIF2S1) on 'Ser-52' in response to low amino acid availability. It plays a role as an activator of the integrated stress response (ISR) required for adaptation to amino acid starvation. The model corresponds to the C-terminal domain (CTD) of metazoan EIF2AK4, which shares little sequence similarity with the yeast counterpart. In addition, although both CTDs are responsible for their structure dimerization and bind single- and double-stranded RNA, mammalian EIF2AK4 does not appear to stably associate with the ribosome, whereas yeast EIF2AK4 does. — an NCBI CDD conserved domain (cd21763); members share this curated model.
