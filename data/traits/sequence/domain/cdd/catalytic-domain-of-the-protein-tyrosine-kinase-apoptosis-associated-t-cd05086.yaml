identifier: CDD:cd05086
label: "Catalytic domain of the Protein Tyrosine Kinase, Apoptosis-associated tyrosine kinase 2. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Aatyk2 is a member of the Aatyk subfamily of proteins, which are receptor kinases containing a transmembrane segment and a long C-terminal cytoplasmic tail with a catalytic domain. Aatyk2 is also called lemur tyrosine kinase 2 (Lmtk2) or brain-enriched kinase (Brek). It is expressed at high levels in early postnatal brain, and has been shown to play a role in nerve growth factor (NGF) signaling. Studies with knockout mice reveal that Aatyk2 is essential for late stage spermatogenesis. Although it is classified as a PTK based on sequence similarity and the phylogenetic tree, Aatyk2 has been functionally characterized as a serine/threonine kinase. The Aatyk2 subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Protein Tyrosine Kinase, Apoptosis-associated tyrosine kinase 2. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Aatyk2 is a member of the Aatyk subfamily of proteins, which are receptor kinases containing a transmembrane segment and a long C-terminal cytoplasmic tail with a catalytic domain. Aatyk2 is also called lemur tyrosine kinase 2 (Lmtk2) or brain-enriched kinase (Brek). It is expressed at high levels in early postnatal brain, and has been shown to play a role in nerve growth factor (NGF) signaling. Studies with knockout mice reveal that Aatyk2 is essential for late stage spermatogenesis. Although it is classified as a PTK based on sequence similarity and the phylogenetic tree, Aatyk2 has been functionally characterized as a serine/threonine kinase. The Aatyk2 subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05086); members share this curated model.
