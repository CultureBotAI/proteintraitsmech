identifier: CDD:cd21085
label: "N-terminal winged helix DNA-binding domain found in PHD finger protein 10 (PHF10) and similar proteins. PHF10, also termed BRG1-associated factor 45a (BAF45a), or XAP135, is involved in transcription activity regulation by chromatin remodeling. It is a component of the neural progenitors-specific chromatin remodeling complex (npBAF complex) and plays a role in the proliferation of neural progenitors. The model corresponds to the N-terminal winged helix DNA-binding domain of PHF10, which is structurally related to the SKI/SNO/DAC domain that is found in a number of metazoan chromatin-associated proteins."
definition: >-
  N-terminal winged helix DNA-binding domain found in PHD finger protein 10 (PHF10) and similar proteins. PHF10, also termed BRG1-associated factor 45a (BAF45a), or XAP135, is involved in transcription activity regulation by chromatin remodeling. It is a component of the neural progenitors-specific chromatin remodeling complex (npBAF complex) and plays a role in the proliferation of neural progenitors. The model corresponds to the N-terminal winged helix DNA-binding domain of PHF10, which is structurally related to the SKI/SNO/DAC domain that is found in a number of metazoan chromatin-associated proteins. — an NCBI CDD conserved domain (cd21085); members share this curated model.
