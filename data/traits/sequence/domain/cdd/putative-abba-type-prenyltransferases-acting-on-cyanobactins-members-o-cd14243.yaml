identifier: CDD:cd14243
label: "Putative ABBA-type prenyltransferases acting on cyanobactins. Members of this family are found in gene clusters responsible for the production and posttranslational modification of cyanobactins, small ribosomal cyclic peptides produced by cyanobacteria. The AcyF_like proteins are structurally similar to the ABBA-type aromatic prenyltransferases, and may be responsible for the reverse- and forward-O-prenylation of tyrosine, serine, and theronine in cyanobactins. ABBA-type aromatic prenyltransferases (PTases) are a subgroup of prenyltransferases that are characterized by an unusual type of beta/alpha fold with antiparallel beta strands. They lack the (N/D)DxxD motif which is characteristic for many other prenyltransferases."
definition: >-
  Putative ABBA-type prenyltransferases acting on cyanobactins. Members of this family are found in gene clusters responsible for the production and posttranslational modification of cyanobactins, small ribosomal cyclic peptides produced by cyanobacteria. The AcyF_like proteins are structurally similar to the ABBA-type aromatic prenyltransferases, and may be responsible for the reverse- and forward-O-prenylation of tyrosine, serine, and theronine in cyanobactins. ABBA-type aromatic prenyltransferases (PTases) are a subgroup of prenyltransferases that are characterized by an unusual type of beta/alpha fold with antiparallel beta strands. They lack the (N/D)DxxD motif which is characteristic for many other prenyltransferases. — an NCBI CDD conserved domain (cd14243); members share this curated model.
