identifier: CDD:cd20212
label: NTF2L_NXF1
definition: >-
  Nuclear Transfer Factor2-like (NTF2L) domain of NXF1. Nuclear export of mRNA trough the nuclear pore complex (NPC) is achieved by interactions of NXF1/NTX1 (also called TAP/p15 which is the metazoan homolog of Mex67/Mtr2) heterodimer with NPC phenylalanine-glycine (FG-) repeats. NXF1 is a modular protein comprised of four domains: an N-terminal RNA recognition motif (RRM), a leucine-rich repeat (LRR), a nuclear transport factor 2-like domain (NTF2L) and a ubiquitin-associated (UBA) domain. NXF1/NXT1 forms heterodimer through their NTF2L domain and binds to NPC FG repeats during nuclear export. This interaction is enabling the complex and its associated cargo to overcome the NPC barrier
