identifier: CDD:cd10768
label: "3-Dhs Dehydratase Asbf-like subfamily. 3-Dhs Dehydratase Asbf is a member of the Xylose-isomerase-like superfamily. AsbF catalyzes dehydration of 3-dehydroshikimate (3-DHS) to 3,4-dihydroxybenzoic acid (3,4-DHBA). AsbF is a gene in the Bacillus anthracis asb operon. This cluster is believed to be an important virulence factor in anthrax infection and in other related pathogenic bacteria."
definition: >-
