identifier: CDD:cd16435
label: "biotin-lipoate ligase family. This family includes biotin protein ligase (BPL), lipoate-protein ligase A (LplA) and octanoyl-[acyl carrier protein]-protein acyltransferase (LipB). Biotin is covalently attached at the active site of certain enzymes that transfer carbon dioxide from bicarbonate to organic acids to form cellular metabolites. Biotin protein ligase (BPL) is the enzyme responsible for attaching biotin to a specific lysine at the active site of biotin enzymes. Biotin attachment is a two step reaction that results in the formation of an amide linkage between the carboxyl group of biotin and the epsilon-amino group of the modified lysine. Lipoate-protein ligase A (LplA) catalyses the formation of an amide linkage between lipoic acid and a specific lysine residue in lipoate dependent enzymes."
definition: >-
  biotin-lipoate ligase family. This family includes biotin protein ligase (BPL), lipoate-protein ligase A (LplA) and octanoyl-[acyl carrier protein]-protein acyltransferase (LipB). Biotin is covalently attached at the active site of certain enzymes that transfer carbon dioxide from bicarbonate to organic acids to form cellular metabolites. Biotin protein ligase (BPL) is the enzyme responsible for attaching biotin to a specific lysine at the active site of biotin enzymes. Biotin attachment is a two step reaction that results in the formation of an amide linkage between the carboxyl group of biotin and the epsilon-amino group of the modified lysine. Lipoate-protein ligase A (LplA) catalyses the formation of an amide linkage between lipoic acid and a specific lysine residue in lipoate dependent enzymes. — an NCBI CDD conserved domain (cd16435); members share this curated model.
