identifier: CDD:cd21278
label: "calponin homology (CH) domain found in LIM and calponin homology domains-containing protein 1. LIM and calponin homology domains-containing protein 1 (LIMCH1) acts as an actin stress fiber-associated protein that activates the non-muscle myosin IIa complex by promoting the phosphorylation of its regulatory subunit MRLC/MYL9. It positively regulates actin stress fiber assembly and stabilizes focal adhesions, and therefore negatively regulates cell spreading and cell migration. LIMCH1 contains a single copy of the CH domain at the N-terminus. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  calponin homology (CH) domain found in LIM and calponin homology domains-containing protein 1. LIM and calponin homology domains-containing protein 1 (LIMCH1) acts as an actin stress fiber-associated protein that activates the non-muscle myosin IIa complex by promoting the phosphorylation of its regulatory subunit MRLC/MYL9. It positively regulates actin stress fiber assembly and stabilizes focal adhesions, and therefore negatively regulates cell spreading and cell migration. LIMCH1 contains a single copy of the CH domain at the N-terminus. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21278); members share this curated model.
