identifier: CDD:cd05583
label: "N-terminal catalytic domain of the Serine/Threonine Kinase, Mitogen and stress-activated kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MSKs contain an N-terminal kinase domain (NTD) from the AGC family and a C-terminal kinase domain (CTD) from the CAMK family. MSKs are activated by two major signaling cascades, the Ras-MAPK and p38 stress kinase pathways, in response to various stimuli such as growth factors, hormones, neurotransmitters, cellular stress, and pro-inflammatory cytokines. This triggers phosphorylation in the activation loop (A-loop) of the CTD of MSK. The active CTD phosphorylates the hydrophobic motif (HM) in the C-terminal extension of NTD, which facilitates the phosphorylation of the A-loop and activates the NTD, which in turn phosphorylates downstream targets. MSKs are predominantly nuclear proteins. They are widely expressed in many tissues including heart, brain, lung, liver, kidney, and pancreas. There are two isoforms of MSK, called MSK1 and MSK2. The MSK subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  N-terminal catalytic domain of the Serine/Threonine Kinase, Mitogen and stress-activated kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MSKs contain an N-terminal kinase domain (NTD) from the AGC family and a C-terminal kinase domain (CTD) from the CAMK family. MSKs are activated by two major signaling cascades, the Ras-MAPK and p38 stress kinase pathways, in response to various stimuli such as growth factors, hormones, neurotransmitters, cellular stress, and pro-inflammatory cytokines. This triggers phosphorylation in the activation loop (A-loop) of the CTD of MSK. The active CTD phosphorylates the hydrophobic motif (HM) in the C-terminal extension of NTD, which facilitates the phosphorylation of the A-loop and activates the NTD, which in turn phosphorylates downstream targets. MSKs are predominantly nuclear proteins. They are widely expressed in many tissues including heart, brain, lung, liver, kidney, and pancreas. There are two isoforms of MSK, called MSK1 and MSK2. The MSK subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05583); members share this curated model.
