identifier: CDD:cd17021
label: T3SC_IA_SicP-like
definition: >-
  Class IA type III secretion system chaperone protein, similar to Salmonella enterica chaperone protein SicP. This family includes type III secretion system (T3SS) chaperone proteins similar to Salmonella enterica SicP and similar proteins. In S. enterica, many of its serovars being serious human pathogens, the T3SS allows injection of the effector SptP, a virulence protein that is involved in bacterial invasion into a host cell. Chaperone SicP forms a complex with SptP at an early stage of the effector protein secretion process in order to avoid premature degradation; also, the complex is dissociated at a late stage to secrete only SptP with the help of the ATPase InvC which is part of the related T3SS injectisome
