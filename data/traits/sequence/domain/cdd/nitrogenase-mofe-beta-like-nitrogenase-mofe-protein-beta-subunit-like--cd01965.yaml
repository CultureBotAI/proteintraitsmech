identifier: CDD:cd01965
label: "Nitrogenase_MoFe_beta_like: Nitrogenase MoFe protein, beta subunit_like. The nitrogenase enzyme catalyzes the ATP-dependent reduction of dinitrogen (N2) to ammonia.  This group contains the beta subunits of component 1 of the three known genetically distinct types of nitrogenase systems: a molybdenum-dependent  nitrogenase (Mo-nitrogenase), a vanadium-dependent nitrogenase (V-nitrogenase), and an iron-only nitrogenase (Fe-nitrogenase). These nitrogenase systems consist of component 1 (MoFe protein, VFe protein or, FeFe protein respectively) and, component 2 (Fe protein). The most widespread and best characterized of these systems is the Mo-nitrogenase. MoFe is an alpha2beta2 tetramer, the alternative nitrogenases are alpha2beta2delta2 hexamers having  alpha and beta subunits similar to the alpha and beta subunits of MoFe. For MoFe, each alphabeta pair contains one P-cluster (at the alphabeta interface) and, one molecule of iron molybdenum cofactor (FeMoco) contained within the alpha subunit. The Fe protein contains, a single [4Fe-4S] cluster from which electrons are transferred  to the P-cluster of the MoFe and in turn, to FeMoCo, the site of substrate reduction. The V-nitrogenase requires an iron-vanadium cofactor (FeVco), the iron only-nitrogenase an iron only cofactor (FeFeco). These cofactors are analogous to the FeMoco. The V-nitrogenase has P clusters identical to those of  MoFe. In addition to N2, nitrogenase also catalyzes the reduction of a variety of other substrates such as acetylene  The V-nitrogenase differs from the Mo-nitrogenase in that it produces free hydrazine, as a minor product during N2-reduction and, ethane as a minor product during acetylene reduction"
definition: >-
  Nitrogenase_MoFe_beta_like: Nitrogenase MoFe protein, beta subunit_like. The nitrogenase enzyme catalyzes the ATP-dependent reduction of dinitrogen (N2) to ammonia. This group contains the beta subunits of component 1 of the three known genetically distinct types of nitrogenase systems: a molybdenum-dependent nitrogenase (Mo-nitrogenase), a vanadium-dependent nitrogenase (V-nitrogenase), and an iron-only nitrogenase (Fe-nitrogenase). These nitrogenase systems consist of component 1 (MoFe protein, VFe protein or, FeFe protein respectively) and, component 2 (Fe protein). The most widespread and best characterized of these systems is the Mo-nitrogenase. MoFe is an alpha2beta2 tetramer, the alternative nitrogenases are alpha2beta2delta2 hexamers having alpha and beta subunits similar to the alpha and beta subunits of MoFe. For MoFe, each alphabeta pair contains one P-cluster (at the alphabeta interface) and, one molecule of iron molybdenum cofactor (FeMoco) contained within the alpha subunit. The Fe protein contains, a single [4Fe-4S] cluster from which electrons are transferred to the P-cluster of the MoFe and in turn, to FeMoCo, the site of substrate reduction. The V-nitrogenase requires an iron-vanadium cofactor (FeVco), the iron only-nitrogenase an iron only cofactor (FeFeco). These cofactors are analogous to the FeMoco. The V-nitrogenase has P clusters identical to those of MoFe. In addition to N2, nitrogenase also catalyzes the reduction of a variety of other substrates such as acetylene The V-nitrogenase differs from the Mo-nitrogenase in that it produces free hydrazine, as a minor product during N2-reduction and, ethane as a minor product during acetylene reduction — an NCBI CDD conserved domain (cd01965); members share this curated model.
