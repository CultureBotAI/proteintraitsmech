identifier: CDD:cd08751
label: "Regulator of G protein signaling domain (RGS) found in G protein-coupled receptor kinase 6 (GRK6). The RGS domain is an essential part of the GRK6 (G protein-coupled receptor kinase 6) protein which plays an important role in the regulating of dopamine, opioids, M3 muscarinic, and chemokine receptor signaling. GRK6 is a member of the GRK kinase family which includes three major subfamilies: the GRK4 subfamily (GRK4, GRK5 and GRK6), the rhodopsin kinase or visual GRK subfamily (GRK1 and GRK7), and the beta-adrenergic receptor kinases subfamily (GRK2/GRK3).  The RGS domain of the GRKs has very little sequence similarity with the canonical RGS domain of the RGS proteins and therefore is often refered to as the RH (RGS Homology) domain. The RH domain of GRK6 does not have structural determinants that are required for binding G-alpha subunit, in contrast to GRK2 and many other RGS proteins. GRK6 is an important target for treatment of addiction and Parkinson disease. RGS proteins regulate many aspects of embryonic development such as glial differentiation, embryonic axis formation, skeletal and muscle development, cell migration during early embryogenesis, as well as apoptosis, cell proliferation, and modulation of cardiac development."
definition: >-
  Regulator of G protein signaling domain (RGS) found in G protein-coupled receptor kinase 6 (GRK6). The RGS domain is an essential part of the GRK6 (G protein-coupled receptor kinase 6) protein which plays an important role in the regulating of dopamine, opioids, M3 muscarinic, and chemokine receptor signaling. GRK6 is a member of the GRK kinase family which includes three major subfamilies: the GRK4 subfamily (GRK4, GRK5 and GRK6), the rhodopsin kinase or visual GRK subfamily (GRK1 and GRK7), and the beta-adrenergic receptor kinases subfamily (GRK2/GRK3). The RGS domain of the GRKs has very little sequence similarity with the canonical RGS domain of the RGS proteins and therefore is often refered to as the RH (RGS Homology) domain. The RH domain of GRK6 does not have structural determinants that are required for binding G-alpha subunit, in contrast to GRK2 and many other RGS proteins. GRK6 is an important target for treatment of addiction and Parkinson disease. RGS proteins regulate many aspects of embryonic development such as glial differentiation, embryonic axis formation, skeletal and muscle development, cell migration during early embryogenesis, as well as apoptosis, cell proliferation, and modulation of cardiac development. — an NCBI CDD conserved domain (cd08751); members share this curated model.
