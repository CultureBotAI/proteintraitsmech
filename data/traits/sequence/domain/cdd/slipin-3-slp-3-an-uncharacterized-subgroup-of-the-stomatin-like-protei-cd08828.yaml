identifier: CDD:cd08828
label: "Slipin-3 (SLP-3), an uncharacterized subgroup of the stomatin-like proteins (slipins) family; belonging to the SPFH (stomatin, prohibitin, flotillin, and HflK/C) superfamily. This model summarizes a subgroup of the stomatin-like protein family (SLPs or slipins) that is found in vertebrates. The conserved domain common to the SPFH superfamily has also been referred to as the Band 7 domain. Individual proteins of the SPFH superfamily may cluster to form membrane microdomains which may in turn recruit multiprotein complexes. Members of this slipin subgroup remain uncharacterized, except for Caenorhabditis elegans UNC-1. Mutations in the unc-1 gene result in abnormal motion and altered patterns of sensitivity to volatile anesthetics."
definition: >-
  Slipin-3 (SLP-3), an uncharacterized subgroup of the stomatin-like proteins (slipins) family; belonging to the SPFH (stomatin, prohibitin, flotillin, and HflK/C) superfamily. This model summarizes a subgroup of the stomatin-like protein family (SLPs or slipins) that is found in vertebrates. The conserved domain common to the SPFH superfamily has also been referred to as the Band 7 domain. Individual proteins of the SPFH superfamily may cluster to form membrane microdomains which may in turn recruit multiprotein complexes. Members of this slipin subgroup remain uncharacterized, except for Caenorhabditis elegans UNC-1. Mutations in the unc-1 gene result in abnormal motion and altered patterns of sensitivity to volatile anesthetics. — an NCBI CDD conserved domain (cd08828); members share this curated model.
