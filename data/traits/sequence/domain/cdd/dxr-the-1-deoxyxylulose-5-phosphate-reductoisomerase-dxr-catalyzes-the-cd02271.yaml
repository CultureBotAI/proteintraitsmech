identifier: CDD:cd02271
label: "DXR. The 1-deoxyxylulose 5-phosphate reductoisomerase (DXR) catalyzes the conversion of 1-deoxy-d-xylulose 5-phosphate (DXP) into 2-C-methyl-d-erythritol 4-phosphate (MEP). This transformation is a two-step process involving a rearrangement of DXP into the putative intermediate 2-C-methyl-d-erythrose 4-phosphate followed by a NADPH-dependent reduction of the latter aldehyde. The reduction step requires the presence of a divalent cation such as Mg2+, Mn2+, or Co2+. DXR is the second enzyme in the methylerythritol phosphate pathway to isoprenoids, an alternate biosynthetic route present in many bacteria, algae, plants, and the malarial parasite Plasmodium falciparum. DXR enzymes are homodimeric with monomer molecular weights of 42-45 kDa. In plants, the gene product typically has a plastidial targeting sequence that is, in most cases, subsequently cleaved to provide the active enzyme. DXR has three distinct domains: an N-terminal Rossmann fold NADPH binding (NADB) domain; a central connecting domain with similarity to the C-terminal domain of glyceraldehyde-3-phosphate dehydrogenase (G3PDH); and a unique C-terminal helical domain. DXR enzymes are members of the NADB_G3PDH superfamily of proteins."
definition: >-
  DXR. The 1-deoxyxylulose 5-phosphate reductoisomerase (DXR) catalyzes the conversion of 1-deoxy-d-xylulose 5-phosphate (DXP) into 2-C-methyl-d-erythritol 4-phosphate (MEP). This transformation is a two-step process involving a rearrangement of DXP into the putative intermediate 2-C-methyl-d-erythrose 4-phosphate followed by a NADPH-dependent reduction of the latter aldehyde. The reduction step requires the presence of a divalent cation such as Mg2+, Mn2+, or Co2+. DXR is the second enzyme in the methylerythritol phosphate pathway to isoprenoids, an alternate biosynthetic route present in many bacteria, algae, plants, and the malarial parasite Plasmodium falciparum. DXR enzymes are homodimeric with monomer molecular weights of 42-45 kDa. In plants, the gene product typically has a plastidial targeting sequence that is, in most cases, subsequently cleaved to provide the active enzyme. DXR has three distinct domains: an N-terminal Rossmann fold NADPH binding (NADB) domain; a central connecting domain with similarity to the C-terminal domain of glyceraldehyde-3-phosphate dehydrogenase (G3PDH); and a unique C-terminal helical domain. DXR enzymes are members of the NADB_G3PDH superfamily of proteins. — an NCBI CDD conserved domain (cd02271); members share this curated model.
