identifier: CDD:cd21045
label: ZMIZ1_NTD
definition: >-
  N-terminal tetratricopeptide repeat domain found in zinc finger MIZ domain-containing protein 1 (Zmiz1). Zmiz1, also termed PIAS-like protein Zimp10, or retinoic acid-induced protein 17 (RAI17), acts as transcriptional coactivator that increases ligand-dependent transcriptional activity of androgen receptor and promotes androgen receptor sumoylation. Zmiz1 is a direct Notch1 cofactor that heterogeneously regulates Notch target genes. Zmiz1 directly interacts with the RAM1 domain of Notch1 through this N-terminal tetratricopeptide repeat (TPR) domain. Furthermore, it has been shown that Zmiz1 and Notch1 cooperatively recruit each other to chromatin through direct interaction via the N-terminal TPR domain resulting in a slight increase in activating histone marks and decrease of repressive histone marks. Functional analysis indicates that the N-terminal domain of Zmiz1 is important for driving Myc transcription and proliferation indirectly
