identifier: CDD:cd22033
label: "high mobility group (HMG)-box found in sex determining region Y (SRY)-box 30 (SOX30) and similar proteins. SOX-30 is a crucial transcription factor that controls the transition from a late meiotic to a post-meiotic gene expression program and subsequent round spermatid development. It specially prevents Wnt-signaling to suppress metastasis. SOX-30 binds to the DNA sequence 5'-ACAAT-3' and shows a preference for guanine residues surrounding this core motif. SOX-30 is the only member of the group H of SRY-related high-mobility group (HMG) box (Sox) transcription factors."
definition: >-
  high mobility group (HMG)-box found in sex determining region Y (SRY)-box 30 (SOX30) and similar proteins. SOX-30 is a crucial transcription factor that controls the transition from a late meiotic to a post-meiotic gene expression program and subsequent round spermatid development. It specially prevents Wnt-signaling to suppress metastasis. SOX-30 binds to the DNA sequence 5'-ACAAT-3' and shows a preference for guanine residues surrounding this core motif. SOX-30 is the only member of the group H of SRY-related high-mobility group (HMG) box (Sox) transcription factors. — an NCBI CDD conserved domain (cd22033); members share this curated model.
