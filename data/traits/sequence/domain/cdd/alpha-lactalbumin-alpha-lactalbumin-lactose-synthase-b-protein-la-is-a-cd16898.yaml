identifier: CDD:cd16898
label: "alpha lactalbumin. alpha-lactalbumin (lactose synthase B protein, LA) is a calcium-binding metalloprotein that is expressed exclusively in the mammary gland during lactation. LA is the regulatory subunit of the enzyme lactose synthase. The association of LA with the catalytic component of lactose synthase, galactosyltransferase, alters the acceptor substrate specificity of this glycosyltransferase, facilitating biosynthesis of lactose."
definition: >-
  alpha lactalbumin. alpha-lactalbumin (lactose synthase B protein, LA) is a calcium-binding metalloprotein that is expressed exclusively in the mammary gland during lactation. LA is the regulatory subunit of the enzyme lactose synthase. The association of LA with the catalytic component of lactose synthase, galactosyltransferase, alters the acceptor substrate specificity of this glycosyltransferase, facilitating biosynthesis of lactose. — an NCBI CDD conserved domain (cd16898); members share this curated model.
