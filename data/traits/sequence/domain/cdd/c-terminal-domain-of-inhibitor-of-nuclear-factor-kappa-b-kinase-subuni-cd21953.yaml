identifier: CDD:cd21953
label: "C-terminal domain of inhibitor of nuclear factor kappa-B kinase subunit epsilon. Inhibitor of nuclear factor kappa-B kinase subunit epsilon (IKK-E) (EC 2.7.11.10) is also called I-kappa-B kinase epsilon, IKK-epsilon, IkBKE, inducible I kappa-B kinase, or IKK-I. It is an interferon regulatory factor-activating kinase that is a non-canonical member of the IKK family. It is involved in cellular innate immunity by inducing type I interferons. It is induced by the activation of nuclear factor-kappaB (NF-kappaB). IKK-E has also been implicated in antiviral immune response in higher vertebrates. It acts as a crucial pro-survival factor in human T cell leukemia virus type 1 (HTLV-1)-transformed T lymphocytes. Moreover, IKK-E plays an essential role in tumor initiation and progression. It inhibits protein kinase C (PKC) to promote Fascin-dependent actin bundling. IKK-E contains an N-terminal protein kinase domain followed by a ubiquitin-like (Ubl) domain, a coiled-coil domain 1 (CCD1), and a C-terminal elongated helical domain. This model corresponds to the C-terminal elongated helical domain of IKK-E that shows high sequence similarity with the C-terminal domain of TBK1, which is responsible for binding to its adaptor proteins, optineurin (OPTN) and NAP1."
definition: >-
  C-terminal domain of inhibitor of nuclear factor kappa-B kinase subunit epsilon. Inhibitor of nuclear factor kappa-B kinase subunit epsilon (IKK-E) (EC 2.7.11.10) is also called I-kappa-B kinase epsilon, IKK-epsilon, IkBKE, inducible I kappa-B kinase, or IKK-I. It is an interferon regulatory factor-activating kinase that is a non-canonical member of the IKK family. It is involved in cellular innate immunity by inducing type I interferons. It is induced by the activation of nuclear factor-kappaB (NF-kappaB). IKK-E has also been implicated in antiviral immune response in higher vertebrates. It acts as a crucial pro-survival factor in human T cell leukemia virus type 1 (HTLV-1)-transformed T lymphocytes. Moreover, IKK-E plays an essential role in tumor initiation and progression. It inhibits protein kinase C (PKC) to promote Fascin-dependent actin bundling. IKK-E contains an N-terminal protein kinase domain followed by a ubiquitin-like (Ubl) domain, a coiled-coil domain 1 (CCD1), and a C-terminal elongated helical domain. This model corresponds to the C-terminal elongated helical domain of IKK-E that shows high sequence similarity with the C-terminal domain of TBK1, which is responsible for binding to its adaptor proteins, optineurin (OPTN) and NAP1. — an NCBI CDD conserved domain (cd21953); members share this curated model.
