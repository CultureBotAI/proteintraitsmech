identifier: CDD:cd09256
label: "Mu-homology domain (MHD) of a adaptor protein (AP) encoded by mu-2 related death-inducing gene, MuD (also known as MUDENG). This family corresponds to the MHD found in a protein encoded by MuD (also known as Adapter-related protein complex 5 subunit mu-1), which is distantly related to the C-terminal domain of the mu2 subunit of AP complexes that participates in clathrin-mediated endocytosis. MuD is evolutionary conserved from mammals to amphibians. It is able to induce cell death by itself and plays an important role in cell death in various tissues."
definition: >-
  Mu-homology domain (MHD) of a adaptor protein (AP) encoded by mu-2 related death-inducing gene, MuD (also known as MUDENG). This family corresponds to the MHD found in a protein encoded by MuD (also known as Adapter-related protein complex 5 subunit mu-1), which is distantly related to the C-terminal domain of the mu2 subunit of AP complexes that participates in clathrin-mediated endocytosis. MuD is evolutionary conserved from mammals to amphibians. It is able to induce cell death by itself and plays an important role in cell death in various tissues. — an NCBI CDD conserved domain (cd09256); members share this curated model.
