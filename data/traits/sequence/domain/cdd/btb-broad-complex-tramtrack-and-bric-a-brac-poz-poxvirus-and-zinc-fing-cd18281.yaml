identifier: CDD:cd18281
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB/POZ domain-containing proteins, BTBD1 and BTBD2. This family includes BTB/POZ domain-containing proteins BTBD1 and BTBD2, both of which are BTB-domain-containing Kelch-like proteins that interact with DNA topoisomerase 1 (Topo1), a key enzyme of cell survival. BTBD1 and BTBD2 colocalize to cytoplasmic bodies with the RBCC/tripartite motif protein, TRIM5delta. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB/POZ domain-containing proteins, BTBD1 and BTBD2. This family includes BTB/POZ domain-containing proteins BTBD1 and BTBD2, both of which are BTB-domain-containing Kelch-like proteins that interact with DNA topoisomerase 1 (Topo1), a key enzyme of cell survival. BTBD1 and BTBD2 colocalize to cytoplasmic bodies with the RBCC/tripartite motif protein, TRIM5delta. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18281); members share this curated model.
