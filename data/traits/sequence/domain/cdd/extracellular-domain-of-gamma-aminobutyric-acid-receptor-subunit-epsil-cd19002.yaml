identifier: CDD:cd19002
label: "extracellular domain of gamma-aminobutyric acid receptor subunit epsilon (GABRE). This family contains extracellular domain of epsilon subunit of type-A gamma-aminobutyric acid receptor (GABAAR), a protein that is encoded by the GABRE gene in humans. GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Upon gamma-aminobutyric acid (GABA) binding to the ligand binding site on the ECD, Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. The epsilon subunits form heteropentamers with other GABAAR subunits, possibly with alpha3, beta4, and theta subunits since their genes are clustered on the same human chromosome. Various combinations of alpha3-, theta-, and epsilon-subunits may be assembled at a regional and developmental level in the brain. Brainstem expression of epsilon subunit-containing GABAA receptors is upregulated during pregnancy, particularly in the ventral respiratory neurons, thus protecting breathing, despite increased neurosteroid levels during pregnancy."
definition: >-
