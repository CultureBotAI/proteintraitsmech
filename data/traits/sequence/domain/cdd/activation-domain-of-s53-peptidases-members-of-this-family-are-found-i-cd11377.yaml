identifier: CDD:cd11377
label: "Activation domain of S53 peptidases. Members of this family are found in various subtilase propeptides, such as  pro-kumamolysin and tripeptidyl peptidase I, and adopt a ferredoxin-like fold, with an alpha+beta sandwich. Cleavage of the domain results in activation of the peptidase."
definition: >-
  Activation domain of S53 peptidases. Members of this family are found in various subtilase propeptides, such as pro-kumamolysin and tripeptidyl peptidase I, and adopt a ferredoxin-like fold, with an alpha+beta sandwich. Cleavage of the domain results in activation of the peptidase. — an NCBI CDD conserved domain (cd11377); members share this curated model.
