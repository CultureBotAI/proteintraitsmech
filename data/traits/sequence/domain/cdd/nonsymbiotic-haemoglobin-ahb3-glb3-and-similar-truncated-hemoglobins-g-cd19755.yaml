identifier: CDD:cd19755
label: TrHb2_AtGlb3-like_O
definition: >-
  nonsymbiotic haemoglobin Ahb3 (GLB3) and similar truncated hemoglobins, group 2 (O). The M- and S families exhibit the canonical secondary structure of hemoglobins, a 3-over-3 alpha-helical sandwich structure (3/3 Mb-fold), built by eight alpha-helical segments. Truncated hemoglobins (TrHbs, 2/2Hb, or 2/2 globins) or the T family globins adopt a 2-on-2 alpha-helical sandwich structure, resulting from extensive and complex modifications of the canonical 3-on-3 alpha-helical sandwich that are distributed throughout the whole protein molecule. TrHbs are classified into three main groups based on their structural properties and named after Mycobacterium sp. genes glbN, glbO, and glbP: TrHb1s (N), TrHb2s (O) and TrHb3s (P). This subfamily includes the dimeric Arabidopsis thaliana TrHb2 AtGLB3. GLB3 is likely to have a function distinct from other plant globins: it exhibits a low O2 affinity, an unusual concentration-independent binding of O2 and CO, and does not respond to any of the treatments that induce plant 3-on-3 globins
