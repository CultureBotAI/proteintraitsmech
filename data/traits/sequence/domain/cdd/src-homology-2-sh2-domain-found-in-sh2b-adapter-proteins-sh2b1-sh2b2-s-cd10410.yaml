identifier: CDD:cd10410
label: "Src homology 2 (SH2) domain found in SH2B adapter proteins (SH2B1, SH2B2, SH2B3). SH2B1 (SH2-B, PSM), like other members of the SH2B adapter protein family, contains a pleckstrin homology domain, at least one dimerization domain, and a C-terminal SH2 domain which binds to phosphorylated tyrosines in a variety of tyrosine kinases.  SH2B1 and SH2B2  function in signaling pathways found downstream of growth hormone receptor and receptor tyrosine kinases, including the insulin, insulin-like growth factor-I (IGF-I), platelet-derived growth factor (PDGF), nerve growth factor, hepatocyte growth factor, and fibroblast growth factor receptors. SH2B2beta, a new isoform of SH2B2, is an endogenous inhibitor of SH2B1 and/or SH2B2 (SH2B2alpha), negatively regulating insulin signaling and/or JAK2-mediated cellular responses. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in SH2B adapter proteins (SH2B1, SH2B2, SH2B3). SH2B1 (SH2-B, PSM), like other members of the SH2B adapter protein family, contains a pleckstrin homology domain, at least one dimerization domain, and a C-terminal SH2 domain which binds to phosphorylated tyrosines in a variety of tyrosine kinases. SH2B1 and SH2B2 function in signaling pathways found downstream of growth hormone receptor and receptor tyrosine kinases, including the insulin, insulin-like growth factor-I (IGF-I), platelet-derived growth factor (PDGF), nerve growth factor, hepatocyte growth factor, and fibroblast growth factor receptors. SH2B2beta, a new isoform of SH2B2, is an endogenous inhibitor of SH2B1 and/or SH2B2 (SH2B2alpha), negatively regulating insulin signaling and/or JAK2-mediated cellular responses. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10410); members share this curated model.
