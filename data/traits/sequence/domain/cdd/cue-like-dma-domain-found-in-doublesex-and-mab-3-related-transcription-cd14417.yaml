identifier: CDD:cd14417
label: "CUE-like DMA domain found in doublesex- and mab-3-related transcription factor A1 (DMRTA1) and similar proteins. DMRTA1 is encoded by gene DMRT1, a vertebrate equivalent of the Drosophila melanogaster master sex regulator gene, doublesex. In D. melanogaster, doublesex controls the terminal switch of the pathway leading to sex fate choice. DMRT1 may function as regulator of sex differentiation in vertebrate. Especially, it is required for testis differentiation, but is not involved in the gonadal sex fate choice."
definition: >-
  CUE-like DMA domain found in doublesex- and mab-3-related transcription factor A1 (DMRTA1) and similar proteins. DMRTA1 is encoded by gene DMRT1, a vertebrate equivalent of the Drosophila melanogaster master sex regulator gene, doublesex. In D. melanogaster, doublesex controls the terminal switch of the pathway leading to sex fate choice. DMRT1 may function as regulator of sex differentiation in vertebrate. Especially, it is required for testis differentiation, but is not involved in the gonadal sex fate choice. — an NCBI CDD conserved domain (cd14417); members share this curated model.
