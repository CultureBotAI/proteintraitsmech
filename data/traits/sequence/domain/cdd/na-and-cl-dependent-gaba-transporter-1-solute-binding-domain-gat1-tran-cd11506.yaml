identifier: CDD:cd11506
label: "Na(+)- and Cl(-)-dependent GABA transporter 1; solute-binding domain. GAT1 transports gamma-aminobutyric acid (GABA). GABA is the main inhibitory neurotransmitter within the mammalian CNS. Human GAT1 is encoded by the SLC6A1 gene. GAT1 is expressed in brain and peripheral nervous system. The antiepileptic drug, Tiagabine, inhibits GAT1. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
definition: >-
  Na(+)- and Cl(-)-dependent GABA transporter 1; solute-binding domain. GAT1 transports gamma-aminobutyric acid (GABA). GABA is the main inhibitory neurotransmitter within the mammalian CNS. Human GAT1 is encoded by the SLC6A1 gene. GAT1 is expressed in brain and peripheral nervous system. The antiepileptic drug, Tiagabine, inhibits GAT1. This subgroup belongs to the solute carrier 6 (SLC6) transporter family. — an NCBI CDD conserved domain (cd11506); members share this curated model.
