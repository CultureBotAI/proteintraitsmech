identifier: CDD:cd23426
label: "ricin B-type lectin domain, beta-trefoil fold, found in Sclerotinia sclerotiorum agglutinin (SSA) and similar proteins. SSA acts as a lectin that primarily recognizes glycans with a non-reducing terminal N-acetylgalactosamine (GalNAc), with a preference for the alpha-over the beta-anomer. It can also bind non-reducing terminal galactose (Gal) residues but with a lower affinity. SSA strongly interacts with glycolipid type glycans with terminal non-reducing Gal or GalNAc but fails to bind sialylated or fucosylated forms of the same glycans. It also strongly interacts with galactosylated N-glycans, displaying highest affinity for alpha-1-3 branched mono-antennary N-glycans but also binding to multi-antennary glycans. SSA is a homodimeric protein. The monomer contains a ricin B-type lectin domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a putative sugar-binding pocket."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Sclerotinia sclerotiorum agglutinin (SSA) and similar proteins. SSA acts as a lectin that primarily recognizes glycans with a non-reducing terminal N-acetylgalactosamine (GalNAc), with a preference for the alpha-over the beta-anomer. It can also bind non-reducing terminal galactose (Gal) residues but with a lower affinity. SSA strongly interacts with glycolipid type glycans with terminal non-reducing Gal or GalNAc but fails to bind sialylated or fucosylated forms of the same glycans. It also strongly interacts with galactosylated N-glycans, displaying highest affinity for alpha-1-3 branched mono-antennary N-glycans but also binding to multi-antennary glycans. SSA is a homodimeric protein. The monomer contains a ricin B-type lectin domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a putative sugar-binding pocket. — an NCBI CDD conserved domain (cd23426); members share this curated model.
