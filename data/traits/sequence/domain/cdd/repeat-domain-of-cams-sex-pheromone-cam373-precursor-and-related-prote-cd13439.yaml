identifier: CDD:cd13439
label: "Repeat domain of CamS sex pheromone cAM373 precursor and related proteins. This  family includes CamS, from which Staphylococcus aureus sex pheromone staph-cAM373 is processed. The protein contains two structurally similar repeats in a tandem arrangement. The heptapeptide cAM373 is a Streptococcus faecalis pheromone, secreted by recipient cells, which induces a mating response in donor cells that contain particular conjugative plasmids. cAM373 is also excreted by Staphylococcus aureus. The family also contains sex hormone precursors from other bacteria and an uncharacterized protein with a single repeat from Desulfovibrio piger, which is structurally similar and might be homologous."
definition: >-
  Repeat domain of CamS sex pheromone cAM373 precursor and related proteins. This family includes CamS, from which Staphylococcus aureus sex pheromone staph-cAM373 is processed. The protein contains two structurally similar repeats in a tandem arrangement. The heptapeptide cAM373 is a Streptococcus faecalis pheromone, secreted by recipient cells, which induces a mating response in donor cells that contain particular conjugative plasmids. cAM373 is also excreted by Staphylococcus aureus. The family also contains sex hormone precursors from other bacteria and an uncharacterized protein with a single repeat from Desulfovibrio piger, which is structurally similar and might be homologous. — an NCBI CDD conserved domain (cd13439); members share this curated model.
