identifier: CDD:cd10322
label: "Solute carrier 5 family, sodium/glucose transporters and related proteins; solute-binding domain. This family represents the solute-binding domain of SLC5 proteins (also called the sodium/glucose cotransporter family or solute sodium symporter family) that co-transport Na+ with sugars, amino acids, inorganic ions or vitamins. Family members include: the human glucose (SGLT1, 2, 4, 5), chiro-inositol (SGLT5), myo-inositol (SMIT), choline (CHT), iodide (NIS), multivitamin (SMVT), and monocarboxylate (SMCT) cotransporters, as well as Vibrio parahaemolyticus glucose/galactose (vSGLT), and Escherichia coli proline (PutP) and pantothenate (PutF) cotransporters. Vibrio parahaemolyticus Na(+)/galactose cotransporter (vSGLT) has 13 transmembrane helices (TMs): TM-1, an inverted topology repeat: TMs1-5 and TMs6-10, and TMs 11-12 (TMs numbered to conform to the solute carrier 6 family Aquifex aeolicus LeuT). One member of this family, human SGLT3, has been characterized as a glucose sensor and not a transporter. Members of this family are important in human physiology and disease."
definition: >-
  Solute carrier 5 family, sodium/glucose transporters and related proteins; solute-binding domain. This family represents the solute-binding domain of SLC5 proteins (also called the sodium/glucose cotransporter family or solute sodium symporter family) that co-transport Na+ with sugars, amino acids, inorganic ions or vitamins. Family members include: the human glucose (SGLT1, 2, 4, 5), chiro-inositol (SGLT5), myo-inositol (SMIT), choline (CHT), iodide (NIS), multivitamin (SMVT), and monocarboxylate (SMCT) cotransporters, as well as Vibrio parahaemolyticus glucose/galactose (vSGLT), and Escherichia coli proline (PutP) and pantothenate (PutF) cotransporters. Vibrio parahaemolyticus Na(+)/galactose cotransporter (vSGLT) has 13 transmembrane helices (TMs): TM-1, an inverted topology repeat: TMs1-5 and TMs6-10, and TMs 11-12 (TMs numbered to conform to the solute carrier 6 family Aquifex aeolicus LeuT). One member of this family, human SGLT3, has been characterized as a glucose sensor and not a transporter. Members of this family are important in human physiology and disease. — an NCBI CDD conserved domain (cd10322); members share this curated model.
