identifier: CDD:cd06386
label: "ligand-binding domain of type C natriuretic peptide receptor. Ligand-binding domain of type C natriuretic peptide receptor (NPR-C). NPR-C is found in atrial, mesentery, placenta, lung, kidney, venous tissue, aortic smooth muscle, and aortic endothelial cells. The affinity of NPR-C for natriuretic peptides is ANP>CNP>BNP. The extracellular domain of NPR-C is about 30% identical to NPR-A and NPR-B. However, unlike the cyclase-linked receptors, it contains only 37 intracellular amino acids and no guanylyl cyclase activity. Major function of NPR-C is to clear natriuretic peptides from the circulation or extracellular surroundings through constitutive receptor-mediated internalization and degradation."
definition: >-
  ligand-binding domain of type C natriuretic peptide receptor. Ligand-binding domain of type C natriuretic peptide receptor (NPR-C). NPR-C is found in atrial, mesentery, placenta, lung, kidney, venous tissue, aortic smooth muscle, and aortic endothelial cells. The affinity of NPR-C for natriuretic peptides is ANP>CNP>BNP. The extracellular domain of NPR-C is about 30% identical to NPR-A and NPR-B. However, unlike the cyclase-linked receptors, it contains only 37 intracellular amino acids and no guanylyl cyclase activity. Major function of NPR-C is to clear natriuretic peptides from the circulation or extracellular surroundings through constitutive receptor-mediated internalization and degradation. — an NCBI CDD conserved domain (cd06386); members share this curated model.
