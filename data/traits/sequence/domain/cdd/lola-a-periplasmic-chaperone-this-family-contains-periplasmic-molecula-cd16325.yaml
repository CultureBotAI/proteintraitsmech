identifier: CDD:cd16325
label: "LolA, a periplasmic chaperone. This family contains periplasmic molecular chaperone LolA which binds to outer-membrane specific lipoproteins and transports them from inner membrane to outer membrane (OM) through LolB, a lipoprotein anchored to outer membranes. There are five Lol proteins (LolA, LolB, LolC, LolD, and LolE) involved in the sorting and membrane localization of lipoprotein and are highly conserved in Gram-negative bacteria. LolA accepts OM-specific lipoproteins that are released from the inner membrane by the LolCDE complex and transfers them to the OM receptor LolB. Studies have shown that hydrophobic surface patches large enough to accommodate acyl chains of the OM lipoproteins and the structural flexibility of LolA are important factors for its role as a periplasmic chaperone."
definition: >-
  LolA, a periplasmic chaperone. This family contains periplasmic molecular chaperone LolA which binds to outer-membrane specific lipoproteins and transports them from inner membrane to outer membrane (OM) through LolB, a lipoprotein anchored to outer membranes. There are five Lol proteins (LolA, LolB, LolC, LolD, and LolE) involved in the sorting and membrane localization of lipoprotein and are highly conserved in Gram-negative bacteria. LolA accepts OM-specific lipoproteins that are released from the inner membrane by the LolCDE complex and transfers them to the OM receptor LolB. Studies have shown that hydrophobic surface patches large enough to accommodate acyl chains of the OM lipoproteins and the structural flexibility of LolA are important factors for its role as a periplasmic chaperone. — an NCBI CDD conserved domain (cd16325); members share this curated model.
