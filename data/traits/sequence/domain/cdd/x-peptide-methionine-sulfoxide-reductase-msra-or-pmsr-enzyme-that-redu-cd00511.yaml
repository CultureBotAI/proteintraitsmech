identifier: CDD:cd00511
label: "x. Peptide methionine sulfoxide reductase (MsrA or PMSR).  Enzyme that reduces oxidized methionine (methionine sulfoxide) back to methionine both in proteins and in free Met(O) residues.  In addition to its role as a \"repair\" enzyme, it may be involved in bacterial adherence and regulation of protein activity."
definition: >-
  x. Peptide methionine sulfoxide reductase (MsrA or PMSR). Enzyme that reduces oxidized methionine (methionine sulfoxide) back to methionine both in proteins and in free Met(O) residues. In addition to its role as a "repair" enzyme, it may be involved in bacterial adherence and regulation of protein activity. — an NCBI CDD conserved domain (cd00511); members share this curated model.
