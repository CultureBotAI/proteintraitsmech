identifier: CDD:cd14985
label: "angiotesin receptor family and its related G protein-coupled receptors, member of the class A family of seven-transmembrane G protein-coupled receptors. This group includes the angiotensin receptors, the bradykinin receptors, apelin receptor as well as putative G-protein coupled receptors (GPR15 and GPR25). Angiotensin II (Ang II), the main effector in the renin-angiotensin system, plays a crucial role in the regulation of cardiovascular homeostasis through its type 1 (AT1) and type 2 (AT2) receptors.  Ang II contributes to cardiovascular diseases such as hypertension and atherosclerosis via AT1R activation. Ang II increases blood pressure through Gq-mediated activation of phospholipase C, resulting in phosphoinositide (PI) hydrolysis and increased intracellular calcium levels. Through the AT2 receptor, Ang II counteracts the vasoconstrictor action of AT1R and thereby induces vasodilation, sodium excretion, and reduction of blood pressure. Bradykinins (BK) are pro-inflammatory peptides that mediate various vascular and pain responses to tissue injury through its B1 and B2 receptors. Apelin (APJ) receptor binds the endogenous peptide ligands, apelin and Toddler/Elabela. APJ is an adipocyte-derived hormone that is ubiquitously expressed throughout the human body, and Toddler/Elabela is a short secretory peptide that is required for normal cardiac development in zebrafish. Activation of APJ receptor plays key roles in diverse physiological processes including vasoconstriction and vasodilation, cardiac muscle contractility, angiogenesis, and regulation of water balance and food intake. Orphan receptors, GPR15 and GPR25, share strong sequence homology to the angiotensin II type AT1 and AT2 receptors."
definition: >-
  angiotesin receptor family and its related G protein-coupled receptors, member of the class A family of seven-transmembrane G protein-coupled receptors. This group includes the angiotensin receptors, the bradykinin receptors, apelin receptor as well as putative G-protein coupled receptors (GPR15 and GPR25). Angiotensin II (Ang II), the main effector in the renin-angiotensin system, plays a crucial role in the regulation of cardiovascular homeostasis through its type 1 (AT1) and type 2 (AT2) receptors. Ang II contributes to cardiovascular diseases such as hypertension and atherosclerosis via AT1R activation. Ang II increases blood pressure through Gq-mediated activation of phospholipase C, resulting in phosphoinositide (PI) hydrolysis and increased intracellular calcium levels. Through the AT2 receptor, Ang II counteracts the vasoconstrictor action of AT1R and thereby induces vasodilation, sodium excretion, and reduction of blood pressure. Bradykinins (BK) are pro-inflammatory peptides that mediate various vascular and pain responses to tissue injury through its B1 and B2 receptors. Apelin (APJ) receptor binds the endogenous peptide ligands, apelin and Toddler/Elabela. APJ is an adipocyte-derived hormone that is ubiquitously expressed throughout the human body, and Toddler/Elabela is a short secretory peptide that is required for normal cardiac development in zebrafish. Activation of APJ receptor plays key roles in diverse physiological processes including vasoconstriction and vasodilation, cardiac muscle contractility, angiogenesis, and regulation of water balance and food intake. Orphan receptors, GPR15 and GPR25, share strong sequence homology to the angiotensin II type AT1 and AT2 receptors. — an NCBI CDD conserved domain (cd14985); members share this curated model.
