identifier: CDD:cd01759
label: "PLAT/LH2 domain of pancreatic triglyceride lipase.  Lipases hydrolyze phospholipids and triglycerides to generate fatty acids for energy production or for storage and to release inositol phosphates that act as second messengers. The central role of triglyceride lipases is in energy production. The proposed function of PLAT/LH2 domains is to mediate interaction with lipids or membrane bound proteins."
