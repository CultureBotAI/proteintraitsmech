identifier: CDD:cd11806
label: "Src homology 3 domain of Protein arginine N-methyltransferase 2. PRMT2, also called HRMT1L1, belongs to the arginine methyltransferase protein family. It functions as a coactivator to both estrogen receptor alpha (ER-alpha) and androgen receptor (AR), presumably through arginine methylation. The ER-alpha transcription factor is involved in cell proliferation, differentiation, morphogenesis, and apoptosis, and is also implicated in the development and progression of breast cancer. PRMT2 and its variants are upregulated in breast cancer cells and may be involved in modulating the ER-alpha signaling pathway during formation of breast cancer. PRMT2 also plays a role in regulating the function of E2F transcription factors, which are critical cell cycle regulators, by binding to the retinoblastoma gene product (RB). It contains an N-terminal SH3 domain and an AdoMet binding domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of Protein arginine N-methyltransferase 2. PRMT2, also called HRMT1L1, belongs to the arginine methyltransferase protein family. It functions as a coactivator to both estrogen receptor alpha (ER-alpha) and androgen receptor (AR), presumably through arginine methylation. The ER-alpha transcription factor is involved in cell proliferation, differentiation, morphogenesis, and apoptosis, and is also implicated in the development and progression of breast cancer. PRMT2 and its variants are upregulated in breast cancer cells and may be involved in modulating the ER-alpha signaling pathway during formation of breast cancer. PRMT2 also plays a role in regulating the function of E2F transcription factors, which are critical cell cycle regulators, by binding to the retinoblastoma gene product (RB). It contains an N-terminal SH3 domain and an AdoMet binding domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11806); members share this curated model.
