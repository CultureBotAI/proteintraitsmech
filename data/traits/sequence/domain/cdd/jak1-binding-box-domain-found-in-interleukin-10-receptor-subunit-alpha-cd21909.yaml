identifier: CDD:cd21909
label: JAK1bd_box_IL10RA
definition: >-
  JAK1 binding box domain found in interleukin-10 receptor subunit alpha (IL10RA) and similar proteins. IL10RA, also called IL-10 receptor subunit alpha, IL-10R subunit alpha, IL-10RA, CDw210a, interleukin-10 receptor subunit 1, IL-10R subunit 1, or IL-10R1, is a cell surface receptor for the cytokine IL10 that participates in IL10-mediated anti-inflammatory functions, limiting excessive tissue disruption caused by inflammation. This model corresponds to IL10RA box domain which consists of box1 and box2
