identifier: CDD:cd21273
label: "calponin homology (CH) domain found in leucine-rich repeat and calponin homology domain-containing protein 4. Leucine-rich repeat and calponin homology domain-containing protein 4 (LRCH4), also called leucine-rich repeat neuronal protein 4, or leucine-rich neuronal protein, acts as a novel Toll-like receptor (TLR) accessory protein that regulates the innate immune response. LRCH4 contains a single copy of the CH domain at the C-terminus. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  calponin homology (CH) domain found in leucine-rich repeat and calponin homology domain-containing protein 4. Leucine-rich repeat and calponin homology domain-containing protein 4 (LRCH4), also called leucine-rich repeat neuronal protein 4, or leucine-rich neuronal protein, acts as a novel Toll-like receptor (TLR) accessory protein that regulates the innate immune response. LRCH4 contains a single copy of the CH domain at the C-terminus. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21273); members share this curated model.
