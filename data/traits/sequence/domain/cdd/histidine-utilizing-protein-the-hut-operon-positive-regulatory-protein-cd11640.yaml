identifier: CDD:cd11640
label: HutP
definition: >-
  Histidine Utilizing Protein, the hut operon positive regulatory protein. The HutP protein family regulates the expression of 'hut' structural genes in Bacillus and other bacteria. It forms an anti-termination complex, which recognizes three UAG triplet units, separated by four non-conserved nucleotides on the RNA terminator region. In an L-histidine and Mg2+ dependent manner, HutP binds to the nascent hut mRNA leader transcript, and the ensuing anti-termination complex inhibits formation of a stem-loop terminator, clearing the way for transcription of the hut structural genes
