identifier: CDD:cd11019
label: "Early nodulin-like protein (OsENODL1) and similar proteins. This family includes early nodulin-like protein (OsENODL1) from Oryza sativa and similar proteins. It belongs to the phytocyanin family of blue copper proteins, a ubiquitous family of plant cupredoxins. Phytocyanin is involved in electron transfer reactions with the Cu center transitioning between the oxidized Cu(II) form and the reduced Cu(I) form. OsENODL1 expression occurs specifically at the late developmental stage of the seeds. Members of this subgroup appear to have lost the T1 copper binding site."
definition: >-
  Early nodulin-like protein (OsENODL1) and similar proteins. This family includes early nodulin-like protein (OsENODL1) from Oryza sativa and similar proteins. It belongs to the phytocyanin family of blue copper proteins, a ubiquitous family of plant cupredoxins. Phytocyanin is involved in electron transfer reactions with the Cu center transitioning between the oxidized Cu(II) form and the reduced Cu(I) form. OsENODL1 expression occurs specifically at the late developmental stage of the seeds. Members of this subgroup appear to have lost the T1 copper binding site. — an NCBI CDD conserved domain (cd11019); members share this curated model.
