label: Threonine_aldolase_subfamily_a
definition: >-
  AAT_I. Threonine aldolase subfamily a: This family belongs to pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily (fold I). This CD corresponds to members of threonine aldolase Low-specificity. L-TA catalyzes the cleavage of L-threonine into glycine and acetaldehyde. Members of this subgroup are predominantly present in bacteria
