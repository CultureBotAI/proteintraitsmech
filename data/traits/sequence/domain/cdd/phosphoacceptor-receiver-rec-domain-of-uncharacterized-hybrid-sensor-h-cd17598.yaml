identifier: CDD:cd17598
label: "phosphoacceptor receiver (REC) domain of uncharacterized hybrid sensor histidine kinase/response regulators. Typically, two-component regulatory systems (TCSs) consist of a sensor (histidine kinase) that responds to specific input(s) by modifying the output of a cognate response regulator (RR). TCSs allow organisms to sense and respond to changes in environmental conditions. Hybrid sensor histidine kinase/response regulators contain all the elements of a classical TCS in a single polypeptide chain. RRs share the common phosphoacceptor REC domain and different effector/output domains such as DNA, RNA, ligand-binding, protein-binding, or enzymatic domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
