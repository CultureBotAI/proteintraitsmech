identifier: CDD:cd19868
label: "second double-stranded RNA binding motif of DiGeorge syndrome critical region 8 (DGCR8) and similar proteins. DGCR8 is a component of the microprocessor complex that acts as an RNA- and heme-binding protein that is involved in the initial step of microRNA (miRNA) biogenesis. Within the microprocessor complex, DGCR8 functions as a molecular anchor necessary for the recognition of pri-miRNA at dsRNA-ssRNA junction and directs DROSHA to cleave 11bp away from the junction to release hairpin-shaped pre-miRNAs that are subsequently cut by the cytoplasmic DICER to generate mature miRNAs. DGCR8 contains two double-stranded RNA binding motifs (DSRMs). This model describes the second motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  second double-stranded RNA binding motif of DiGeorge syndrome critical region 8 (DGCR8) and similar proteins. DGCR8 is a component of the microprocessor complex that acts as an RNA- and heme-binding protein that is involved in the initial step of microRNA (miRNA) biogenesis. Within the microprocessor complex, DGCR8 functions as a molecular anchor necessary for the recognition of pri-miRNA at dsRNA-ssRNA junction and directs DROSHA to cleave 11bp away from the junction to release hairpin-shaped pre-miRNAs that are subsequently cut by the cytoplasmic DICER to generate mature miRNAs. DGCR8 contains two double-stranded RNA binding motifs (DSRMs). This model describes the second motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19868); members share this curated model.
