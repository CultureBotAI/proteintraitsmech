identifier: CDD:cd02287
label: "OR_MviM. Putative OxidoReductase (virulence factor MviM homolog) and related proteins; these proteins share sequence similarity with a class of oxidoreductases that have been implicated in interconversions between hydroxyl and carbonyl groups, such as glucose-fructose oxidoreductase which oxidizes glucose to gluconolactone and reduces fructose to sorbitol in Zymomonas mobilis. Members of the OR_MviM CD contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the glucose-fructose oxidoreductase superfamily of proteins."
definition: >-
  OR_MviM. Putative OxidoReductase (virulence factor MviM homolog) and related proteins; these proteins share sequence similarity with a class of oxidoreductases that have been implicated in interconversions between hydroxyl and carbonyl groups, such as glucose-fructose oxidoreductase which oxidizes glucose to gluconolactone and reduces fructose to sorbitol in Zymomonas mobilis. Members of the OR_MviM CD contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the glucose-fructose oxidoreductase superfamily of proteins. — an NCBI CDD conserved domain (cd02287); members share this curated model.
