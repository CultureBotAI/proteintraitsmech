identifier: CDD:cd17692
label: "RUN2 domain found in DENN domain-containing protein 5A (DENND5A) and similar proteins. DENND5A, also called Rab6-interacting protein 1 (Rab6IP1), is present predominantly in developing neuronal tissue, and functions in membrane trafficking at a crossroads between the Golgi and the endosomal system. It is composed of an N-terminal DENN (Differentially Expressed in Normal and Neoplastic cells) domain followed by two RUN (RPIP8 [RaP2-interacting protein 8], UNC-14, and NESCA [new molecule containing SH3 at the carboxyl terminus]) domains flanking a PLAT (Polycystin-1, Lipoxygenase, Alpha-Toxin) domain. This model represents the second RUN domain of DENND5A."
definition: >-
  RUN2 domain found in DENN domain-containing protein 5A (DENND5A) and similar proteins. DENND5A, also called Rab6-interacting protein 1 (Rab6IP1), is present predominantly in developing neuronal tissue, and functions in membrane trafficking at a crossroads between the Golgi and the endosomal system. It is composed of an N-terminal DENN (Differentially Expressed in Normal and Neoplastic cells) domain followed by two RUN (RPIP8 [RaP2-interacting protein 8], UNC-14, and NESCA [new molecule containing SH3 at the carboxyl terminus]) domains flanking a PLAT (Polycystin-1, Lipoxygenase, Alpha-Toxin) domain. This model represents the second RUN domain of DENND5A. — an NCBI CDD conserved domain (cd17692); members share this curated model.
