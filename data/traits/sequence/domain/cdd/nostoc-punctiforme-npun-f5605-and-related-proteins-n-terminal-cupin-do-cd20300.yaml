label: cupin_npun_f5605-like_N
definition: >-
  Nostoc punctiforme npun_f5605 and related proteins, N-terminal cupin domain. This family includes proteins homologous to Nostoc punctiforme putative dioxygenase npun_f5605, a protein of unknown function. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization
