identifier: CDD:cd19772
label: "B-box-type 2 zinc finger  found in tripartite motif-containing protein 21 (TRIM21) and similar proteins. TRIM21, also known as 52 kDa Ro protein, 52 kDa ribonucleoprotein autoantigen Ro/SS-A, Ro(SS-A), RING finger protein 81 (RNF81), or Sjoegren's syndrome type A antigen (SS-A), is a ubiquitously expressed E3 ubiquitin-protein ligase and a high affinity antibody receptor uniquely expressed in the cytosol of mammalian cells. As a cytosolic Fc receptor, TRIM21 binds the Fc of virus-associated antibodies and targets the complex in the cytosol for proteasomal degradation in a process known as antibody-dependent intracellular neutralization (ADIN), and provides an intracellular immune response to protect host defense against pathogen infection. It shows remarkably broad isotype specificity as it does not only bind IgG, but also IgM and IgA. Moreover, TRIM21 promotes the cytosolic DNA sensor cGAS and the cytosolic RNA sensor RIG-I sensing of viral genomes during infection by antibody-opsonized virus. It stimulates inflammatory signaling and activates innate transcription factors, such as nuclear factor-kappaB (NF-kappaB). TRIM21 also plays an essential role in p62-regulated redox homeostasis, suggesting a viable target for treating pathological conditions resulting from oxidative damage. Furthermore, TRIM21 may have implications for various autoimmune diseases associated uncontrolled antiviral signaling through the regulation of Nmi-IFI35 complex-mediated inhibition of innate antiviral response. TRIM21 belongs to the C-IV subclass of TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a RING finger, Bbox2, and a coiled coil region, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain. The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif."
