identifier: CDD:cd20776
label: MRJP_yellow
definition: >-
  Major royal jelly protein, yellow gene product and similar proteins. Royal jelly is the food of queen bee larvae, and is responsible for the high reproductive ability of the queen. Major royal jelly proteins make up around 90% of larval jelly proteins. This family also contains the sequence-related yellow protein of drosophila which controls pigmentation of the adult cuticle and larval mouth parts
