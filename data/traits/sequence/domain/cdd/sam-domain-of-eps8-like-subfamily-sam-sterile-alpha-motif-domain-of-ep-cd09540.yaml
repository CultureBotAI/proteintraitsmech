identifier: CDD:cd09540
label: "SAM domain of EPS8-like subfamily. SAM (sterile alpha motif) domain of EPS8-like subfamily is a putative protein-protein interaction domain. This subfamily includes epidermal growth factor receptor kinase substrate 8 proteins (EPS8) and epidermal growth factor receptor kinase substrate 8-like (EPSL8) 1, 2, 3 proteins with the SAM domain located in the C-terminal effector region. This region is responsible for intracellular protein localization and is involved in small GTPases (such as Rac and Rab5) activation/inhibition. Proteins belonging to this group participate in coordination and integration of multiple signaling pathways; in particular, they play a role in the control of actin dynamics and in receptor endocytosis. They can form complexes with other proteins; for example, in the actin signaling network they interact with SOS1 and E3b1 (Abl1) proteins as well as with CRIB (via SH3 domains) during the actin filament formation, and in the receptor endocytosis their partner is RN-tre protein."
definition: >-
  SAM domain of EPS8-like subfamily. SAM (sterile alpha motif) domain of EPS8-like subfamily is a putative protein-protein interaction domain. This subfamily includes epidermal growth factor receptor kinase substrate 8 proteins (EPS8) and epidermal growth factor receptor kinase substrate 8-like (EPSL8) 1, 2, 3 proteins with the SAM domain located in the C-terminal effector region. This region is responsible for intracellular protein localization and is involved in small GTPases (such as Rac and Rab5) activation/inhibition. Proteins belonging to this group participate in coordination and integration of multiple signaling pathways; in particular, they play a role in the control of actin dynamics and in receptor endocytosis. They can form complexes with other proteins; for example, in the actin signaling network they interact with SOS1 and E3b1 (Abl1) proteins as well as with CRIB (via SH3 domains) during the actin filament formation, and in the receptor endocytosis their partner is RN-tre protein. — an NCBI CDD conserved domain (cd09540); members share this curated model.
