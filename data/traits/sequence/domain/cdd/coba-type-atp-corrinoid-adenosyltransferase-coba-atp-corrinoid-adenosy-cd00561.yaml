label: "CobA-type ATP:corrinoid adenosyltransferase. CobA-ATP:corrinoid adenosyltransferase is one of three sequence and structurally unrelated groups of ATP:corrinoid adenosyltransferase, PduO and EutT being the other two. CobA has been shown to be involved in cobalamin (vitamin B12) biosynthesis and scavenging of incomplete corrinoids. This enzyme is a homodimer,  which catalyzes the adenosylation reaction: ATP + cob(I)alamin + H2O"
definition: >-
  CobA-type ATP:corrinoid adenosyltransferase. CobA-ATP:corrinoid adenosyltransferase is one of three sequence and structurally unrelated groups of ATP:corrinoid adenosyltransferase, PduO and EutT being the other two. CobA has been shown to be involved in cobalamin (vitamin B12) biosynthesis and scavenging of incomplete corrinoids. This enzyme is a homodimer, which catalyzes the adenosylation reaction: ATP + cob(I)alamin + H2O — an NCBI CDD conserved domain (cd00561); members share this curated model.
