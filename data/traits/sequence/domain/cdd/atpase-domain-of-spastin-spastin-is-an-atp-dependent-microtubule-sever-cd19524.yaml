identifier: CDD:cd19524
label: "ATPase domain of spastin. Spastin is an ATP-dependent microtubule-severing protein involved in microtubule dynamics; it specifically recognizes and cuts microtubules that are polyglutamylated. This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
definition: >-
  ATPase domain of spastin. Spastin is an ATP-dependent microtubule-severing protein involved in microtubule dynamics; it specifically recognizes and cuts microtubules that are polyglutamylated. This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion. — an NCBI CDD conserved domain (cd19524); members share this curated model.
