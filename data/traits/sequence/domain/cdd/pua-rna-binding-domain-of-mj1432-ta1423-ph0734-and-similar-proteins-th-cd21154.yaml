identifier: CDD:cd21154
label: "PUA RNA-binding domain of MJ1432, TA1423, PH0734, and similar proteins. The RNA-binding PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain was detected in a number of proteins involved in RNA metabolism. Members of this mostly archaeal family have not been characterized functionally; they may bind to RNA. This family includes Pyrococcus horikoshii PH0734 where the N-terminal domain may modulate the binding target of the C-terminal PUA domain using its characteristic electropositive surface."
definition: >-
  PUA RNA-binding domain of MJ1432, TA1423, PH0734, and similar proteins. The RNA-binding PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain was detected in a number of proteins involved in RNA metabolism. Members of this mostly archaeal family have not been characterized functionally; they may bind to RNA. This family includes Pyrococcus horikoshii PH0734 where the N-terminal domain may modulate the binding target of the C-terminal PUA domain using its characteristic electropositive surface. — an NCBI CDD conserved domain (cd21154); members share this curated model.
