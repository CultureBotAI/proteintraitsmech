identifier: CDD:cd05746
label: "Fourth immunoglobulin (Ig)-like domain of peroxidasin. The members here are composed of the fourth immunoglobulin (Ig)-like domain in peroxidasin. Peroxidasin has a peroxidase domain and interacting extracellular motifs containing four Ig-like domains. It has been suggested that peroxidasin is secreted, and has functions related to the stabilization of the extracellular matrix. It may play a part in various other important processes such as removal and destruction of cells which have undergone programmed cell death and protection of the organism against non-self."
definition: >-
  Fourth immunoglobulin (Ig)-like domain of peroxidasin. The members here are composed of the fourth immunoglobulin (Ig)-like domain in peroxidasin. Peroxidasin has a peroxidase domain and interacting extracellular motifs containing four Ig-like domains. It has been suggested that peroxidasin is secreted, and has functions related to the stabilization of the extracellular matrix. It may play a part in various other important processes such as removal and destruction of cells which have undergone programmed cell death and protection of the organism against non-self. — an NCBI CDD conserved domain (cd05746); members share this curated model.
