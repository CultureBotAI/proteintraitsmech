identifier: CDD:cd08752
label: "Regulator of G protein signaling domain (RGS) found in G protein-coupled receptor kinase 5 (GRK5). The RGS domain is an essential part of the GRK5 (G protein-coupled receptor kinase 5) protein, a membrane-associated serine/threonine protein kinases which phosphorylates G protein-coupled receptors (GPCRs) upon agonist stimulation. This phosphorylation initiates beta-arrestin-mediated receptor desensitization, internalization, and signaling events. GRK5 is a member of the GRK kinase family which include three major subfamilies: the GRK4 subfamily (GRK4, GRK5 and GRK6), the rhodopsin kinase or visual GRK subfamily (GRK1 and GRK7), and the beta-adrenergic receptor kinases subfamily (GRK2/GRK3).  The RGS domain of the GRKs has very little sequence similarity with the canonical RGS domain of the RGS proteins and therefore is often refered to as the RH (RGS Homology) domain. RGS proteins regulate many aspects of embryonic development such as glial differentiation, embryonic axis formation, skeletal and muscle development, cell migration during early embryogenesis, as well as apoptosis, cell proliferation, and modulation of cardiac development."
definition: >-
  Regulator of G protein signaling domain (RGS) found in G protein-coupled receptor kinase 5 (GRK5). The RGS domain is an essential part of the GRK5 (G protein-coupled receptor kinase 5) protein, a membrane-associated serine/threonine protein kinases which phosphorylates G protein-coupled receptors (GPCRs) upon agonist stimulation. This phosphorylation initiates beta-arrestin-mediated receptor desensitization, internalization, and signaling events. GRK5 is a member of the GRK kinase family which include three major subfamilies: the GRK4 subfamily (GRK4, GRK5 and GRK6), the rhodopsin kinase or visual GRK subfamily (GRK1 and GRK7), and the beta-adrenergic receptor kinases subfamily (GRK2/GRK3). The RGS domain of the GRKs has very little sequence similarity with the canonical RGS domain of the RGS proteins and therefore is often refered to as the RH (RGS Homology) domain. RGS proteins regulate many aspects of embryonic development such as glial differentiation, embryonic axis formation, skeletal and muscle development, cell migration during early embryogenesis, as well as apoptosis, cell proliferation, and modulation of cardiac development. — an NCBI CDD conserved domain (cd08752); members share this curated model.
