identifier: CDD:cd10926
label: "Putative catalytic domain of uncharacterized bacterial proteins from the carbohydrate esterase 4 superfamily. This family corresponds to a group of uncharacterized bacterial proteins with high sequence similarity to the catalytic domain of the six-stranded barrel rhizobial NodB-like proteins, which remove N-linked or O-linked acetyl groups from cell wall polysaccharides and belong to the larger carbohydrate esterase 4 (CE4) superfamily."
definition: >-
  Putative catalytic domain of uncharacterized bacterial proteins from the carbohydrate esterase 4 superfamily. This family corresponds to a group of uncharacterized bacterial proteins with high sequence similarity to the catalytic domain of the six-stranded barrel rhizobial NodB-like proteins, which remove N-linked or O-linked acetyl groups from cell wall polysaccharides and belong to the larger carbohydrate esterase 4 (CE4) superfamily. — an NCBI CDD conserved domain (cd10926); members share this curated model.
