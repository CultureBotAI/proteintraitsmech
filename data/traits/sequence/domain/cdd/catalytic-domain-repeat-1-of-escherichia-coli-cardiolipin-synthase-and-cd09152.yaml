identifier: CDD:cd09152
label: "Catalytic domain, repeat 1, of Escherichia coli cardiolipin synthase and similar proteins. Catalytic domain, repeat 1, of Escherichia coli cardiolipin (CL) synthase and similar proteins. Escherichia coli CL synthase (EcCLS), specified by the cls gene, is the prototype of this family. EcCLS is a multi-pass membrane protein that catalyzes reversible phosphatidyl group transfer between two phosphatidylglycerol molecules to form cardiolipin (CL) and glycerol. The monomer of EcCLS consists of two catalytic domains. Each catalytic domain contains one copy of the conserved HKD motif (H-x-K-x(4)-D, where x represents any amino acid residue) that characterizes the phospholipase D (PLD) superfamily. Two HKD motifs from two domains form a single active site involved in phosphatidyl group transfer. EcCLS can be stimulated by phosphate and inhibited by CL, the product of the reaction, and by phosphatidate. Phosphate stimulation may be unique to enzymes with CL synthase activity belonging to the PLD superfamily. Like other PLD enzymes, EcCLS utilizes a common two-step ping-pong catalytic mechanism involving an enzyme-substrate intermediate to cleave phosphodiester bonds. The two histidine residues from the two HKD motifs play key roles in the catalysis. Upon substrate binding, a histidine residue from one HKD motif could function as the nucleophile, attacking the phosphodiester bond to create a covalent phosphohistidine intermediate, while the other histidine residue from the second HKD motif could serve as a general acid, stabilizing the leaving group."
