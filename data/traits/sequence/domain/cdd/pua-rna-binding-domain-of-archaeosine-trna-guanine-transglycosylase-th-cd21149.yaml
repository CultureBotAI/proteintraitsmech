identifier: CDD:cd21149
label: "PUA RNA-binding domain of archaeosine tRNA-guanine transglycosylase. The RNA-binding PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain was detected in a number of proteins involved in RNA metabolism. Members of this archaeosine tRNA-guanine transglycosylase (TGT) family are responsible for the exchange of a guanine residue in archaeal tRNAs with a preQ0 base (7-cyano-7-deazaguanine), which constitutes the initial step in archaeosine biosynthesis. Archaeosine is a modified RNA base specific to archaea (7-formamidino-7deazaguanosine), found at position 15 in tRNAs. It has been shown that the PUA domain of archaeosine TGT is not required for its specificity for position 15."
definition: >-
  PUA RNA-binding domain of archaeosine tRNA-guanine transglycosylase. The RNA-binding PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain was detected in a number of proteins involved in RNA metabolism. Members of this archaeosine tRNA-guanine transglycosylase (TGT) family are responsible for the exchange of a guanine residue in archaeal tRNAs with a preQ0 base (7-cyano-7-deazaguanine), which constitutes the initial step in archaeosine biosynthesis. Archaeosine is a modified RNA base specific to archaea (7-formamidino-7deazaguanosine), found at position 15 in tRNAs. It has been shown that the PUA domain of archaeosine TGT is not required for its specificity for position 15. — an NCBI CDD conserved domain (cd21149); members share this curated model.
