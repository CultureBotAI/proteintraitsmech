identifier: CDD:cd14396
label: "UBA domain found in Xenopus tropicalis baculoviral IAP repeat-containing protein BIRC7, BIRC71A and similar proteins. X. tropicalis BIRC7, also called E3 ubiquitin-protein ligase EIAP, embryonic/Egg IAP (xEIAP/XLX), inhibitor of apoptosis (IAP)-like protein, XIAP homolog XLX, is a weak apoptosis inhibitor that exhibits caspase inhibition and autoubiquitylation. It is uniquely modified by MAPK- and Cdc2/Cyclin B-dependent phosphorylation during oocyte maturation. Its caspase-dependent cleavage is altered when it is phosphorylated. X. tropicalis BIRC7 contains two N-terminal baculoviral IAP repeats (BIRs) and a C-terminal RING domain. Based on sequence homology, it also harbors a ubiquitin-associated (UBA) domain which is not detected in human BIRC7."
definition: >-
