identifier: CDD:cd02281
label: "N-terminal NAD(P)-binding domain of aspartate-beta-semialdehyde dehydrogenase (ASADH) and N-acetyl-gamma-glutamyl-phosphate reductase (AGPR). Aspartate-beta-semialdehyde dehydrogenase (ASADH, EC 1.2.1.11), also called ASA dehydrogenase (ASD), or aspartate-beta-semialdehyde dehydrogenase, catalyzes the second step of the aspartate biosynthetic pathway, an essential enzyme found in bacteria, fungi, and higher plants. ASADH catalyses the formation of L-aspartate-beta-semialdehyde (ASA) by the reductive dephosphorylation of L-beta-aspartyl phosphate (BAP), utilizing the reducing power of NADPH. ASA can either be further reduced to homoserine, which leads to methionine, threonine, or isoleucine, or it can be condensed with pyruvate and cyclized into dihydrodipicolinate, and then converted into diaminopimelate, a component of bacterial cell walls, and finally decarboxylated to produce lysine. N-acetyl-gamma-glutamyl-phosphate reductase (AGPR, EC 1.2.1.38), also called N-acetyl-glutamate semialdehyde dehydrogenase, or NAGSA dehydrogenase, reversibly catalyses the NADPH-dependent reduction of N-acetyl-gamma-glutamyl phosphate; the third step of arginine biosynthesis. ASADH and AGPR proteins contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like domain."
definition: >-
  N-terminal NAD(P)-binding domain of aspartate-beta-semialdehyde dehydrogenase (ASADH) and N-acetyl-gamma-glutamyl-phosphate reductase (AGPR). Aspartate-beta-semialdehyde dehydrogenase (ASADH, EC 1.2.1.11), also called ASA dehydrogenase (ASD), or aspartate-beta-semialdehyde dehydrogenase, catalyzes the second step of the aspartate biosynthetic pathway, an essential enzyme found in bacteria, fungi, and higher plants. ASADH catalyses the formation of L-aspartate-beta-semialdehyde (ASA) by the reductive dephosphorylation of L-beta-aspartyl phosphate (BAP), utilizing the reducing power of NADPH. ASA can either be further reduced to homoserine, which leads to methionine, threonine, or isoleucine, or it can be condensed with pyruvate and cyclized into dihydrodipicolinate, and then converted into diaminopimelate, a component of bacterial cell walls, and finally decarboxylated to produce lysine. N-acetyl-gamma-glutamyl-phosphate reductase (AGPR, EC 1.2.1.38), also called N-acetyl-glutamate semialdehyde dehydrogenase, or NAGSA dehydrogenase, reversibly catalyses the NADPH-dependent reduction of N-acetyl-gamma-glutamyl phosphate; the third step of arginine biosynthesis. ASADH and AGPR proteins contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like domain. — an NCBI CDD conserved domain (cd02281); members share this curated model.
