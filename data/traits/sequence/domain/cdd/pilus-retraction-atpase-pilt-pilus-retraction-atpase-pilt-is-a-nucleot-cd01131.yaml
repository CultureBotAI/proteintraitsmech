label: "Pilus retraction ATPase PilT. Pilus retraction ATPase PilT is a nucleotide-binding protein responsible for the retraction of type IV pili, likely by pili disassembly. This retraction provides the force required for travel of bacteria in low water environments by a mechanism known as twitching motility."
definition: >-
