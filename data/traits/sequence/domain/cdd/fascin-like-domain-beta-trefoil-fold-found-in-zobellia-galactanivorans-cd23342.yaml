identifier: CDD:cd23342
label: "fascin-like domain, beta-trefoil fold, found in Zobellia galactanivorans beta-porphyranase A (PorA) and similar proteins. PorA (EC 3.2.1.178) cleaves the sulfated polysaccharide porphyran at the (1->4) linkages between beta-D-galactopyranose and alpha-L-galactopyranose-6-sulfate, forming mostly the disaccharide alpha-L-galactopyranose-6-sulfate-(1->3)-beta-D-galactose. It is inactive on the non-sulfated agarose portion of the porphyran backbone and displays a strict requirement for C6-sulfate in the -2 and +1-binding subsites. Members of this subfamily contain a fascin-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  fascin-like domain, beta-trefoil fold, found in Zobellia galactanivorans beta-porphyranase A (PorA) and similar proteins. PorA (EC 3.2.1.178) cleaves the sulfated polysaccharide porphyran at the (1->4) linkages between beta-D-galactopyranose and alpha-L-galactopyranose-6-sulfate, forming mostly the disaccharide alpha-L-galactopyranose-6-sulfate-(1->3)-beta-D-galactose. It is inactive on the non-sulfated agarose portion of the porphyran backbone and displays a strict requirement for C6-sulfate in the -2 and +1-binding subsites. Members of this subfamily contain a fascin-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23342); members share this curated model.
