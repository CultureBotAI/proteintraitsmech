identifier: CDD:cd15711
label: "Extended PHD finger 2 found in PHD finger protein 6 (PHF6). The extended plant homeodomain (ePHD) zinc finger is characterized as Cys2HisCys5HisCys2His. PHF6 contains two non-canonical ePHD fingers, this model corresponds to the second ePHD finger. PHF6, also termed the X-linked mental retardation disorder Borjeson-Forssman-Lehmann syndrome-associated protein, is a nucleolus, ribosomal RNA promoter-associated protein that regulates cell cycle progression by suppressing ribosomal RNA synthesis. It has been implicated in cell cycle control, genomic maintenance, and tumor suppression. PHF6 shows transcriptional repression activity through directly interacting with the nucleosome remodeling and deacetylation complex component RBBP4."
definition: >-
  Extended PHD finger 2 found in PHD finger protein 6 (PHF6). The extended plant homeodomain (ePHD) zinc finger is characterized as Cys2HisCys5HisCys2His. PHF6 contains two non-canonical ePHD fingers, this model corresponds to the second ePHD finger. PHF6, also termed the X-linked mental retardation disorder Borjeson-Forssman-Lehmann syndrome-associated protein, is a nucleolus, ribosomal RNA promoter-associated protein that regulates cell cycle progression by suppressing ribosomal RNA synthesis. It has been implicated in cell cycle control, genomic maintenance, and tumor suppression. PHF6 shows transcriptional repression activity through directly interacting with the nucleosome remodeling and deacetylation complex component RBBP4. — an NCBI CDD conserved domain (cd15711); members share this curated model.
