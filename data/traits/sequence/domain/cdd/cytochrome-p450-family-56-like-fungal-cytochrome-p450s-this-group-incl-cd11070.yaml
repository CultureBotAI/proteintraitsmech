identifier: CDD:cd11070
label: "cytochrome P450 family 56-like fungal cytochrome P450s. This group includes Saccharomyces cerevisiae cytochrome P450 56, also called cytochrome P450-DIT2, and similar fungal proteins. CYP56 is involved in spore wall maturation and is thought to catalyze the oxidation of tyrosine residues in the formation of LL-dityrosine-containing precursors of the spore wall. The CYP56-like subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
