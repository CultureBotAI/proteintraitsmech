identifier: CDD:cd07287
label: "The phosphoinositide binding Phox Homology domain of RPK118-like proteins. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions such as cell signaling, vesicular trafficking, protein sorting, and lipid modification, among others. Members of this subfamily bear similarity to human RPK118, which contains an N-terminal PX domain, a Microtubule Interacting and Trafficking (MIT) domain, and a kinase domain. RPK118 binds sphingosine kinase, a key enzyme in the synthesis of sphingosine 1-phosphate (SPP), a lipid messenger involved in many cellular events. RPK118 may be involved in transmitting SPP-mediated signaling. It also binds the antioxidant peroxiredoxin-3 (PRDX3) and may be involved in the transport of PRDX3 from the cytoplasm to its site of function in the mitochondria. Members of this subfamily also show similarity to sorting nexin 15 (SNX15), which contains PX and MIT domains but does not contain a kinase domain. SNXs make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNX15 plays a role in protein trafficking processes in the endocytic pathway and the trans-Golgi network. The PX domain of SNX15 interacts with the PDGF receptor and is responsible for the membrane association of the protein."
definition: >-
  The phosphoinositide binding Phox Homology domain of RPK118-like proteins. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions such as cell signaling, vesicular trafficking, protein sorting, and lipid modification, among others. Members of this subfamily bear similarity to human RPK118, which contains an N-terminal PX domain, a Microtubule Interacting and Trafficking (MIT) domain, and a kinase domain. RPK118 binds sphingosine kinase, a key enzyme in the synthesis of sphingosine 1-phosphate (SPP), a lipid messenger involved in many cellular events. RPK118 may be involved in transmitting SPP-mediated signaling. It also binds the antioxidant peroxiredoxin-3 (PRDX3) and may be involved in the transport of PRDX3 from the cytoplasm to its site of function in the mitochondria. Members of this subfamily also show similarity to sorting nexin 15 (SNX15), which contains PX and MIT domains but does not contain a kinase domain. SNXs make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNX15 plays a role in protein trafficking processes in the endocytic pathway and the trans-Golgi network. The PX domain of SNX15 interacts with the PDGF receptor and is responsible for the membrane association of the protein. — an NCBI CDD conserved domain (cd07287); members share this curated model.
