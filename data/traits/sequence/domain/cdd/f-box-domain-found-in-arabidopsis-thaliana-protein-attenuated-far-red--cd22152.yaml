identifier: CDD:cd22152
label: "F-box domain found in Arabidopsis thaliana protein ATTENUATED FAR-RED RESPONSE (AtAFR) and similar proteins. AtAFR, also called SKP1-interacting partner 29 (AtSKIP29), or F-box protein AFR, is a component of SCF (SKP1/ASK-cullin-F-box protein) E3 ubiquitin ligase complexes, which may mediate the ubiquitination and subsequent proteasomal degradation of target proteins. It is part of the phyA-mediated signaling transduction pathway leading to the regulation of gene expression and hypocotyl elongation in response to red and far-red light exposure. This subfamily also includes many other Arabidopsis thaliana SKP1-interacting partner proteins. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Arabidopsis thaliana protein ATTENUATED FAR-RED RESPONSE (AtAFR) and similar proteins. AtAFR, also called SKP1-interacting partner 29 (AtSKIP29), or F-box protein AFR, is a component of SCF (SKP1/ASK-cullin-F-box protein) E3 ubiquitin ligase complexes, which may mediate the ubiquitination and subsequent proteasomal degradation of target proteins. It is part of the phyA-mediated signaling transduction pathway leading to the regulation of gene expression and hypocotyl elongation in response to red and far-red light exposure. This subfamily also includes many other Arabidopsis thaliana SKP1-interacting partner proteins. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22152); members share this curated model.
