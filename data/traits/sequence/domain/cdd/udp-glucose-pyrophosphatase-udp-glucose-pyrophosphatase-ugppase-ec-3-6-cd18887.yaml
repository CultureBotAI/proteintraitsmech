identifier: CDD:cd18887
label: "UDP-glucose pyrophosphatase. UDP-glucose pyrophosphatase (UGPPase) (EC 3.6.1.45; also known as NUDIX (nucleoside diphosphate-linked moiety X)) motif 14; Nudt14) hydrolyzes the pyrophosphate of the nucleoside diphosphate sugar to generate glucose-1-P and UMP. In mammals, UDP-glucose is the glucosyl donor for the synthesis of the storage polysaccharide glycogen. UGPPase, as a regulator of UDP-glucose, could play a regulatory role, but it has been shown to prefer ADP-ribose over UDP-glucose. Like other members of the NUDIX hydrolase superfamily, it requires a divalent cation, such as Mg2+, for its activity. It also contains a highly conserved 23-residue NUDIX motif (GX5EX7REUXEEXGU, where U = I, L or V) which functions as a metal binding site/catalytic site."
definition: >-
  UDP-glucose pyrophosphatase. UDP-glucose pyrophosphatase (UGPPase) (EC 3.6.1.45; also known as NUDIX (nucleoside diphosphate-linked moiety X)) motif 14; Nudt14) hydrolyzes the pyrophosphate of the nucleoside diphosphate sugar to generate glucose-1-P and UMP. In mammals, UDP-glucose is the glucosyl donor for the synthesis of the storage polysaccharide glycogen. UGPPase, as a regulator of UDP-glucose, could play a regulatory role, but it has been shown to prefer ADP-ribose over UDP-glucose. Like other members of the NUDIX hydrolase superfamily, it requires a divalent cation, such as Mg2+, for its activity. It also contains a highly conserved 23-residue NUDIX motif (GX5EX7REUXEEXGU, where U = I, L or V) which functions as a metal binding site/catalytic site. — an NCBI CDD conserved domain (cd18887); members share this curated model.
