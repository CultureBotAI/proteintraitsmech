identifier: CDD:cd11499
label: "Na(+)- and Cl(-)-dependent glycine transporter GlyT2; solute-binding domain. GlyT2 (also called NET1) is a membrane-bound transporter that re-uptakes glycine from the synaptic cleft. Human GlyT2 is encoded by the SLC6A5 gene. GlyT2 is expressed in brain and spinal cord. GlyT2 may play a role in pain, and in spasticity. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
definition: >-
  Na(+)- and Cl(-)-dependent glycine transporter GlyT2; solute-binding domain. GlyT2 (also called NET1) is a membrane-bound transporter that re-uptakes glycine from the synaptic cleft. Human GlyT2 is encoded by the SLC6A5 gene. GlyT2 is expressed in brain and spinal cord. GlyT2 may play a role in pain, and in spasticity. This subgroup belongs to the solute carrier 6 (SLC6) transporter family. — an NCBI CDD conserved domain (cd11499); members share this curated model.
