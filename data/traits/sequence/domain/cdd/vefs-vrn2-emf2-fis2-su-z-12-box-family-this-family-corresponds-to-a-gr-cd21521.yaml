identifier: CDD:cd21521
label: "VEFS (VRN2-EMF2-FIS2-Su(z)12) box family. This family corresponds to a group of polycomb cluster proteins which control HOX gene transcription, as they function in heterochromatin-mediated repression. They are characterized by containing a VEFS-box in the C-terminal region, which is an acidic cluster and a tryptophan/methionine-rich sequence, the acidic-W/M domain. Some of these sequences are associated with a zinc-finger domain about 100 residues towards the N-terminus. Members include suppressor of zeste 12 protein (SUZ12) from vertebrates, plants, insects and fungi, as well as Polycomb group protein EMBRYONIC FLOWER 2 (EMF2), Polycomb group protein FERTILIZATION-INDEPENDENT SEED 2 (FIS2), and Polycomb group protein VERNALIZATION 2 (VRN2) from plants."
definition: >-
  VEFS (VRN2-EMF2-FIS2-Su(z)12) box family. This family corresponds to a group of polycomb cluster proteins which control HOX gene transcription, as they function in heterochromatin-mediated repression. They are characterized by containing a VEFS-box in the C-terminal region, which is an acidic cluster and a tryptophan/methionine-rich sequence, the acidic-W/M domain. Some of these sequences are associated with a zinc-finger domain about 100 residues towards the N-terminus. Members include suppressor of zeste 12 protein (SUZ12) from vertebrates, plants, insects and fungi, as well as Polycomb group protein EMBRYONIC FLOWER 2 (EMF2), Polycomb group protein FERTILIZATION-INDEPENDENT SEED 2 (FIS2), and Polycomb group protein VERNALIZATION 2 (VRN2) from plants. — an NCBI CDD conserved domain (cd21521); members share this curated model.
