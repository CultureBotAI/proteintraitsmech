identifier: CDD:cd18219
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kaiso. Kaiso, also called zinc finger and BTB domain-containing protein 33 (ZBTB33), is a DNA methylation-dependent transcriptional repressor that binds to methylated CpG dinucleotides in the consensus sequence 5'-CGCG-3'. It also binds to the non-methylated consensus sequence 5'-CTGCNA-3', also known as the consensus kaiso binding site (KBS). It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kaiso. Kaiso, also called zinc finger and BTB domain-containing protein 33 (ZBTB33), is a DNA methylation-dependent transcriptional repressor that binds to methylated CpG dinucleotides in the consensus sequence 5'-CGCG-3'. It also binds to the non-methylated consensus sequence 5'-CTGCNA-3', also known as the consensus kaiso binding site (KBS). It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18219); members share this curated model.
