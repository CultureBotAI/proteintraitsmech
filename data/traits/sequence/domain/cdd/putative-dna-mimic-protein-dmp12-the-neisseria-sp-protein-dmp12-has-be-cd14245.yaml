identifier: CDD:cd14245
label: "Putative DNA mimic protein DMP12. The Neisseria sp. protein DMP12 has been shown to interact with the bacterial histone-like protein HU and may do so by acting as a DNA mimic. It is likely to play a regulatory role, but not via direct competition for binding of HU, which is involved in maintenance of the bacterial nucleoid structure."
definition: >-
  Putative DNA mimic protein DMP12. The Neisseria sp. protein DMP12 has been shown to interact with the bacterial histone-like protein HU and may do so by acting as a DNA mimic. It is likely to play a regulatory role, but not via direct competition for binding of HU, which is involved in maintenance of the bacterial nucleoid structure. — an NCBI CDD conserved domain (cd14245); members share this curated model.
