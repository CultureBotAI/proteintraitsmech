identifier: CDD:cd23435
label: "ricin B-type lectin domain, beta-trefoil fold, found in the polypeptide N-acetylgalactosaminyltransferase 3 (GALNT3)-like subfamily. The GALNT3-like subfamily includes GALNT3, GALNT4, GALNT6 and GALNT12. They act as GalNAc transferases (EC 2.4.1.41) that catalyze the initial reaction in O-linked oligosaccharide biosynthesis, the transfer of an N-acetyl-D-galactosamine residue to a serine or threonine residue on the protein receptor. GALNT3 has activity toward HIV envelope glycoprotein gp120, EA2, Muc2 and Muc5. It probably glycosylates fibronectin in vivo as well as FGF23. It plays a central role in phosphate homeostasis. GALNT4 shows highest activity towards Muc7, EA2 and Muc2, with a lower activity compared to GALNT2. It glycosylates 'Thr-57' of SELPLG. GALNT6 may participate in the synthesis of oncofetal fibronectin. It has activity toward Muc1a, Muc2, EA2 and fibronectin peptides. GALNT12 has activity toward non-glycosylated peptides such as Muc5AC, Muc1a and EA2, and no detectable activity with non-glycosylated Muc2 and Muc7. It displays enzymatic activity toward the Gal-NAc-Muc5AC glycopeptide, but no detectable activity to mono-GalNAc-glycosylated Muc1a, Muc2, Muc7 and EA2. It may play an important role in the initial step of mucin-type oligosaccharide biosynthesis in digestive organs. Members of this family comprise a glycosyltransferase region and a ricin B-type lectin domain. The glycosyltransferase region contains two conserved domains, domain A (also called GT1 motif) and domain B (also called Gal/GalNAc-T motif). This model corresponds to the ricin B-type lectin domain with a beta-trefoil fold, which are characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ricin B-type lectin domain binds to GalNAc and contributes to the glycopeptide specificity."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in the polypeptide N-acetylgalactosaminyltransferase 3 (GALNT3)-like subfamily. The GALNT3-like subfamily includes GALNT3, GALNT4, GALNT6 and GALNT12. They act as GalNAc transferases (EC 2.4.1.41) that catalyze the initial reaction in O-linked oligosaccharide biosynthesis, the transfer of an N-acetyl-D-galactosamine residue to a serine or threonine residue on the protein receptor. GALNT3 has activity toward HIV envelope glycoprotein gp120, EA2, Muc2 and Muc5. It probably glycosylates fibronectin in vivo as well as FGF23. It plays a central role in phosphate homeostasis. GALNT4 shows highest activity towards Muc7, EA2 and Muc2, with a lower activity compared to GALNT2. It glycosylates 'Thr-57' of SELPLG. GALNT6 may participate in the synthesis of oncofetal fibronectin. It has activity toward Muc1a, Muc2, EA2 and fibronectin peptides. GALNT12 has activity toward non-glycosylated peptides such as Muc5AC, Muc1a and EA2, and no detectable activity with non-glycosylated Muc2 and Muc7. It displays enzymatic activity toward the Gal-NAc-Muc5AC glycopeptide, but no detectable activity to mono-GalNAc-glycosylated Muc1a, Muc2, Muc7 and EA2. It may play an important role in the initial step of mucin-type oligosaccharide biosynthesis in digestive organs. Members of this family comprise a glycosyltransferase region and a ricin B-type lectin domain. The glycosyltransferase region contains two conserved domains, domain A (also called GT1 motif) and domain B (also called Gal/GalNAc-T motif). This model corresponds to the ricin B-type lectin domain with a beta-trefoil fold, which are characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ricin B-type lectin domain binds to GalNAc and contributes to the glycopeptide specificity. — an NCBI CDD conserved domain (cd23435); members share this curated model.
