identifier: CDD:cd16192
label: "Penta-EF hand, calcium binding motifs, found in calpain-9 (CAPN9). CAPN9, also termed digestive tract-specific calpain, or new calpain 4 (nCL-4), or protein CG36, is a calpain large subunit predominantly expressed in gastrointestinal tract. It plays a physiological role in the suppression of tumorigenesis. It acts as an important biomolecule link for the regression of colorectal cancer via intracellular calcium homeostasis. CAPN9 may also play a critical role in lumen formation. Moreover, CAPN9, together with CAPN8, forms an active protease complex, G-calpain, in which both proteins are essential for stability and activity. The G-Calpain has been implicated in gastric mucosal defense. Furthermore, down-regulation of calpain 9 has been linked to hypertensive heart and kidney disease in salt-sensitive Dahl rats. CAPN9 contains a short N-terminal anchor helix, followed by a calpain cysteine protease (CysPc) domain, a C2-domain-like (C2L) domain, and a C-terminal Ca2+-binding penta-EF-hand (PEF) domain."
definition: >-
  Penta-EF hand, calcium binding motifs, found in calpain-9 (CAPN9). CAPN9, also termed digestive tract-specific calpain, or new calpain 4 (nCL-4), or protein CG36, is a calpain large subunit predominantly expressed in gastrointestinal tract. It plays a physiological role in the suppression of tumorigenesis. It acts as an important biomolecule link for the regression of colorectal cancer via intracellular calcium homeostasis. CAPN9 may also play a critical role in lumen formation. Moreover, CAPN9, together with CAPN8, forms an active protease complex, G-calpain, in which both proteins are essential for stability and activity. The G-Calpain has been implicated in gastric mucosal defense. Furthermore, down-regulation of calpain 9 has been linked to hypertensive heart and kidney disease in salt-sensitive Dahl rats. CAPN9 contains a short N-terminal anchor helix, followed by a calpain cysteine protease (CysPc) domain, a C2-domain-like (C2L) domain, and a C-terminal Ca2+-binding penta-EF-hand (PEF) domain. — an NCBI CDD conserved domain (cd16192); members share this curated model.
