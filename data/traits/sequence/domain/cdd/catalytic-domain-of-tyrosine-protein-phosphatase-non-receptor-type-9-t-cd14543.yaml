identifier: CDD:cd14543
label: "catalytic domain of tyrosine-protein phosphatase non-receptor type 9. Tyrosine-protein phosphatase non-receptor type 9 (PTPN9), also called protein-tyrosine phosphatase MEG2, belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPN9 plays an important role in promoting intracellular secretary vesicle fusion in hematopoietic cells and promotes the dephosphorylation of ErbB2 and EGFR in breast cancer cells, leading to impaired activation of STAT5 and STAT3. It also directly dephosphorylates STAT3 at the Tyr705 residue, resulting in its inactivation. PTPN9 has been found to be dysregulated in various human cancers, including breast, colorectal, and gastric cancer."
