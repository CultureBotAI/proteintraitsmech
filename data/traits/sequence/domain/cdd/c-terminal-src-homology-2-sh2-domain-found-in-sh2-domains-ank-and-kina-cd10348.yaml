identifier: CDD:cd10348
label: "C-terminal Src homology 2 (SH2) domain found in SH2 domains, ANK, and kinase domain (shark) proteins. These non-receptor protein-tyrosine kinases contain two SH2 domains, five ankyrin (ANK)-like repeats, and a potential tyrosine phosphorylation site in its carboxyl-terminal tail which resembles the phosphorylation site in members of the src family. Like, mammalian non-receptor protein-tyrosine kinases, ZAP-70 and syk proteins, they do not have SH3 domains. However, the presence of ANK makes these unique among protein-tyrosine kinases. Both tyrosine kinases and ANK repeats have been shown to transduce developmental signals, and SH2 domains are known to participate intimately in tyrosine kinase signaling. These tyrosine kinases are believed to be involved in epithelial cell polarity. The members of this family include the shark (SH2 domains, ANK, and kinase domain) gene in Drosophila and yellow fever mosquitos, as well as the hydra protein HTK16.  Drosophila Shark is proposed to transduce intracellularly the Crumbs, a protein necessary for proper organization of ectodermal epithelia, intercellular signal. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  C-terminal Src homology 2 (SH2) domain found in SH2 domains, ANK, and kinase domain (shark) proteins. These non-receptor protein-tyrosine kinases contain two SH2 domains, five ankyrin (ANK)-like repeats, and a potential tyrosine phosphorylation site in its carboxyl-terminal tail which resembles the phosphorylation site in members of the src family. Like, mammalian non-receptor protein-tyrosine kinases, ZAP-70 and syk proteins, they do not have SH3 domains. However, the presence of ANK makes these unique among protein-tyrosine kinases. Both tyrosine kinases and ANK repeats have been shown to transduce developmental signals, and SH2 domains are known to participate intimately in tyrosine kinase signaling. These tyrosine kinases are believed to be involved in epithelial cell polarity. The members of this family include the shark (SH2 domains, ANK, and kinase domain) gene in Drosophila and yellow fever mosquitos, as well as the hydra protein HTK16. Drosophila Shark is proposed to transduce intracellularly the Crumbs, a protein necessary for proper organization of ectodermal epithelia, intercellular signal. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10348); members share this curated model.
