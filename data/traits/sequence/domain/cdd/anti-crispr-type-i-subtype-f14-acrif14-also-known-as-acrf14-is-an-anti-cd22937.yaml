identifier: CDD:cd22937
label: "Anti-CRISPR type I subtype F14. AcrIF14 (also known as AcrF14) is an anti-CRISPR (Acr) protein that inhibits type I-F CRISPR-Cas surveillance complex (the Csy complex). AcrIF14 was discovered via the guilt-by association (GBA) method, and subsequently confirmed by functional assays to inhibit the type I-F CRISPR-Cas system. GBA is based on the strong co-occurrence and clustering of acr and anti-CRISPR associated (aca) genes through proximity and homology searches. AcrIF14 binds to the Csy complex to block the hybridization of target DNA to the CRISPR RNA (crRNA). Among the 14 AcrIF proteins, at least nine (AcrIF1, AcrIF2, AcrIF4, AcrIF6, AcrIF7, AcrIF8, AcrIF9, AcrIF10 and AcrIF14) stably bind to the Csy complex to inhibit recruitment of either target DNA or nuclease, suggesting direct association with the Csy complex is a major means for inhibition among AcrIF proteins. AcrIF14 also endows the Csy complex with the ability to interact with non-sequence specific dsDNA as AcrIF9 does. However, from structure and biochemical studies, the electropositive patches within the N-terminal domain of AcrIF14 and the PAM recognition loop of the Cas8f subunit of the Csy are essential for the non-sequence-specific dsDNA binding to the Csy-AcrIF14 complex, this is different from the mechanism of AcrIF9. The type I-F Csy complex is a crRNA-guided surveillance complex composed of a crRNA and nine Cas proteins (one Cas8f, one Cas5f, one Cas6f, and six Cas7f), which recruits a nuclease-helicase protein Cas3 for target degradation. CRISPR-Cas immune systems are used by certain prokaryotes and archaea to resist the invasion of foreign nucleic acids such as phages or plasmids. Anti-CRISPRs are small proteins which are the natural inhibitors for CRISPR-Cas systems; encoded on bacterial and archaeal viruses, they allow the virus to evade host CRISPR-Cas systems. The CRISPR-Cas-mediated adaptive immune response can be divided into three steps, including the acquisition of spacer derived from invading nucleic acids, crRNA processing, and target degradation. Theoretically, Acr proteins could suppress any step to disrupt the CRISPR-Cas system. Acr proteins are diverse with no common sequence or structural motif, and they inhibit a wide range of CRISPR-Cas systems with various inhibition mechanisms. CRISPR-Cas systems are divided into two classes (1 and 2) and six types (class 1: types I, III and IV; class 2: types II, V and VI). Class 1 systems utilize RNA-guided complexes consisting of multiple Cas proteins as the effector proteins to recognize and cleave target DNA. For Type I CRISPR-Cas systems which are the most widespread in nature, the Cas protein composition of the employed CRISPR ribonucleoprotein (crRNP) complexes differs between seven subtypes (A to F, G). Acr families are named for their type and subtype which are numbered sequentially as they are discovered."
definition: >-
  Anti-CRISPR type I subtype F14. AcrIF14 (also known as AcrF14) is an anti-CRISPR (Acr) protein that inhibits type I-F CRISPR-Cas surveillance complex (the Csy complex). AcrIF14 was discovered via the guilt-by association (GBA) method, and subsequently confirmed by functional assays to inhibit the type I-F CRISPR-Cas system. GBA is based on the strong co-occurrence and clustering of acr and anti-CRISPR associated (aca) genes through proximity and homology searches. AcrIF14 binds to the Csy complex to block the hybridization of target DNA to the CRISPR RNA (crRNA). Among the 14 AcrIF proteins, at least nine (AcrIF1, AcrIF2, AcrIF4, AcrIF6, AcrIF7, AcrIF8, AcrIF9, AcrIF10 and AcrIF14) stably bind to the Csy complex to inhibit recruitment of either target DNA or nuclease, suggesting direct association with the Csy complex is a major means for inhibition among AcrIF proteins. AcrIF14 also endows the Csy complex with the ability to interact with non-sequence specific dsDNA as AcrIF9 does. However, from structure and biochemical studies, the electropositive patches within the N-terminal domain of AcrIF14 and the PAM recognition loop of the Cas8f subunit of the Csy are essential for the non-sequence-specific dsDNA binding to the Csy-AcrIF14 complex, this is different from the mechanism of AcrIF9. The type I-F Csy complex is a crRNA-guided surveillance complex composed of a crRNA and nine Cas proteins (one Cas8f, one Cas5f, one Cas6f, and six Cas7f), which recruits a nuclease-helicase protein Cas3 for target degradation. CRISPR-Cas immune systems are used by certain prokaryotes and archaea to resist the invasion of foreign nucleic acids such as phages or plasmids. Anti-CRISPRs are small proteins which are the natural inhibitors for CRISPR-Cas systems; encoded on bacterial and archaeal viruses, they allow the virus to evade host CRISPR-Cas systems. The CRISPR-Cas-mediated adaptive immune response can be divided into three steps, including the acquisition of spacer derived from invading nucleic acids, crRNA processing, and target degradation. Theoretically, Acr proteins could suppress any step to disrupt the CRISPR-Cas system. Acr proteins are diverse with no common sequence or structural motif, and they inhibit a wide range of CRISPR-Cas systems with various inhibition mechanisms. CRISPR-Cas systems are divided into two classes (1 and 2) and six types (class 1: types I, III and IV; class 2: types II, V and VI). Class 1 systems utilize RNA-guided complexes consisting of multiple Cas proteins as the effector proteins to recognize and cleave target DNA. For Type I CRISPR-Cas systems which are the most widespread in nature, the Cas protein composition of the employed CRISPR ribonucleoprotein (crRNP) complexes differs between seven subtypes (A to F, G). Acr families are named for their type and subtype which are numbered sequentially as they are discovered. — an NCBI CDD conserved domain (cd22937); members share this curated model.
