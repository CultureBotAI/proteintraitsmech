identifier: CDD:cd05035
label: "Catalytic Domain of TAM (Tyro3, Axl, Mer) Protein Tyrosine Kinases. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. The TAM subfamily consists of Tyro3 (or Sky), Axl, Mer (or Mertk), and similar proteins. TAM subfamily members are receptor tyr kinases (RTKs) containing an extracellular ligand-binding region with two immunoglobulin-like domains followed by two fibronectin type III repeats, a transmembrane segment, and an intracellular catalytic domain. Binding to their ligands, Gas6 and protein S, leads to receptor dimerization, autophosphorylation, activation, and intracellular signaling. TAM proteins are implicated in a variety of cellular effects including survival, proliferation, migration, and phagocytosis. They are also associated with several types of cancer as well as inflammatory, autoimmune, vascular, and kidney diseases. The TAM subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic Domain of TAM (Tyro3, Axl, Mer) Protein Tyrosine Kinases. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. The TAM subfamily consists of Tyro3 (or Sky), Axl, Mer (or Mertk), and similar proteins. TAM subfamily members are receptor tyr kinases (RTKs) containing an extracellular ligand-binding region with two immunoglobulin-like domains followed by two fibronectin type III repeats, a transmembrane segment, and an intracellular catalytic domain. Binding to their ligands, Gas6 and protein S, leads to receptor dimerization, autophosphorylation, activation, and intracellular signaling. TAM proteins are implicated in a variety of cellular effects including survival, proliferation, migration, and phagocytosis. They are also associated with several types of cancer as well as inflammatory, autoimmune, vascular, and kidney diseases. The TAM subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05035); members share this curated model.
