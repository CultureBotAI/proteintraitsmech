identifier: CDD:cd11718
label: "THUMP domain associated with SPOUT RNA Methylases. Members of this archaeal protein family are characterized by containing an N-terminal THUMP domain and a C-terminal SPOUT RNA methyltransferase domain. No functional information is available The THUMP domain is named after thiouridine synthases, methylases and PSUSs. The domain consists of about 110 amino acid residues. It is predicted to be an RNA-binding domain and probably functions by delivering a variety of RNA modification enzymes to their targets."
definition: >-
