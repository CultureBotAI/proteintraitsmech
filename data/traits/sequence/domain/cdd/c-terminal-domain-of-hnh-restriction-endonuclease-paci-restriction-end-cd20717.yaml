identifier: CDD:cd20717
label: "C-terminal domain of HNH restriction endonuclease PacI. Restriction endonuclease (REases) is a tool in bacteria and archaea for defense against invasion of foreign DNA. REases vary in sequence, structure, oligomeric composition, substrate-specificity, and enzymatic behavior which typically recognize target sequences in duplex DNA ranging from four to eight specific base pairs in length. HNH REases PacI has two subunits that forms an extended homodimer. C-terminal subunit is containing a zinc-bound HNH motifs surrounding a beta/beta/alpha-metal catalytic site. PacI homodimerize and recognizes the symmetric eight base pair duplex DNA sequence (5'-TTAATTAA-3') and generate product fragments containing 2-base, 3'-overhangs."
definition: >-
  C-terminal domain of HNH restriction endonuclease PacI. Restriction endonuclease (REases) is a tool in bacteria and archaea for defense against invasion of foreign DNA. REases vary in sequence, structure, oligomeric composition, substrate-specificity, and enzymatic behavior which typically recognize target sequences in duplex DNA ranging from four to eight specific base pairs in length. HNH REases PacI has two subunits that forms an extended homodimer. C-terminal subunit is containing a zinc-bound HNH motifs surrounding a beta/beta/alpha-metal catalytic site. PacI homodimerize and recognizes the symmetric eight base pair duplex DNA sequence (5'-TTAATTAA-3') and generate product fragments containing 2-base, 3'-overhangs. — an NCBI CDD conserved domain (cd20717); members share this curated model.
