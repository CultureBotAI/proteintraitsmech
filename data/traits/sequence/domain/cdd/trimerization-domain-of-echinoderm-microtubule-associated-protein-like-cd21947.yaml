identifier: CDD:cd21947
label: "trimerization domain of echinoderm microtubule-associated protein-like 1. Echinoderm microtubule-associated protein-like 1 (EMAP-1), also called EMAL1, EMAPL, or EMAPL1, modulates the assembly and organization of the microtubule cytoskeleton, and probably plays a role in regulating the orientation of the mitotic spindle and the orientation of the plane of cell division. It is required for normal proliferation of neuronal progenitor cells in the developing brain and for normal brain development. This model corresponds to a conserved region located at the N-terminus of EMAP-1, which shows high sequence similarity with the N-terminal trimerization domain of EMAP-4 and EMAP-2."
definition: >-
  trimerization domain of echinoderm microtubule-associated protein-like 1. Echinoderm microtubule-associated protein-like 1 (EMAP-1), also called EMAL1, EMAPL, or EMAPL1, modulates the assembly and organization of the microtubule cytoskeleton, and probably plays a role in regulating the orientation of the mitotic spindle and the orientation of the plane of cell division. It is required for normal proliferation of neuronal progenitor cells in the developing brain and for normal brain development. This model corresponds to a conserved region located at the N-terminus of EMAP-1, which shows high sequence similarity with the N-terminal trimerization domain of EMAP-4 and EMAP-2. — an NCBI CDD conserved domain (cd21947); members share this curated model.
