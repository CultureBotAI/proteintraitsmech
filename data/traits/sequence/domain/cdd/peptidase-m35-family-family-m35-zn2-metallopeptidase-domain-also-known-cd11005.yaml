identifier: CDD:cd11005
label: "Peptidase M35 family. Family M35 Zn2+-metallopeptidase domain, also known as the deuterolysin family, contains fungal as well as bacterial metalloendopeptidases that include deuterolysin (EC2.4.24.39), peptidyl-Lys metalloendopeptidase (MEP), penicillolysin, as well as uncharacterized sequences. Typically, members of this family of extracellular peptidases contain a unique zinc-binding motif (the aspzincin motif), defined by the HExxH + D motif where an aspartic acid is the third zinc ligand and is found in a GTXDXXYG motif C-terminal to the His zinc ligands. Deuterolysins are highly active towards basic nuclear proteins such as histones and protamines, with a preference for a Lys or Arg residue in the P1' subsite. MEPs specifically cleave peptidyl-lysine bonds (-X-Lys-) in proteins and peptides. Penicillolysin, a thermolabile protease from Penicillium citrinum, strongly hydrolyzes nuclear proteins such as clupeine, salmine and histone. Many members of the M35 peptidases display unusual thermostabilities."
definition: >-
  Peptidase M35 family. Family M35 Zn2+-metallopeptidase domain, also known as the deuterolysin family, contains fungal as well as bacterial metalloendopeptidases that include deuterolysin (EC2.4.24.39), peptidyl-Lys metalloendopeptidase (MEP), penicillolysin, as well as uncharacterized sequences. Typically, members of this family of extracellular peptidases contain a unique zinc-binding motif (the aspzincin motif), defined by the HExxH + D motif where an aspartic acid is the third zinc ligand and is found in a GTXDXXYG motif C-terminal to the His zinc ligands. Deuterolysins are highly active towards basic nuclear proteins such as histones and protamines, with a preference for a Lys or Arg residue in the P1' subsite. MEPs specifically cleave peptidyl-lysine bonds (-X-Lys-) in proteins and peptides. Penicillolysin, a thermolabile protease from Penicillium citrinum, strongly hydrolyzes nuclear proteins such as clupeine, salmine and histone. Many members of the M35 peptidases display unusual thermostabilities. — an NCBI CDD conserved domain (cd11005); members share this curated model.
