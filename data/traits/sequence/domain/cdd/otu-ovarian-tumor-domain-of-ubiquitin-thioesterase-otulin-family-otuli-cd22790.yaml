identifier: CDD:cd22790
label: "OTU (ovarian tumor) domain of ubiquitin thioesterase otulin family. Otulin family includes otulin and otulinl. Otulin, also called FAM105B, deubiquitinating enzyme otulin, OTU domain-containing deubiquitinase with linear linkage specificity, or ubiquitin thioesterase Gumby, is a deubiquitinase (DUB)/ubiquitin thioesterase (EC 3.4.19.12) that specifically removes linear ('Met-1'-linked) polyubiquitin chains to substrates and acts as a regulator of angiogenesis and innate immune response. It acts as a key negative regulator of inflammation by restricting spontaneous inflammation and maintaining immune homeostasis. Otulinl, also called FAM105A, is an OTU-class pseudo-deubiquitinase with a disrupted catalytic triad and undetectable cleavage activity for any diubiquitin linkage. It may play a role in endoplasmic reticulum (ER)-organelle communication. Otulin and otulinl belong to the OTU family of cysteine proteases that use a conserved cysteine and histidine, and in some cases an aspartate, as the catalytic dyad (or triad)."
definition: >-
  OTU (ovarian tumor) domain of ubiquitin thioesterase otulin family. Otulin family includes otulin and otulinl. Otulin, also called FAM105B, deubiquitinating enzyme otulin, OTU domain-containing deubiquitinase with linear linkage specificity, or ubiquitin thioesterase Gumby, is a deubiquitinase (DUB)/ubiquitin thioesterase (EC 3.4.19.12) that specifically removes linear ('Met-1'-linked) polyubiquitin chains to substrates and acts as a regulator of angiogenesis and innate immune response. It acts as a key negative regulator of inflammation by restricting spontaneous inflammation and maintaining immune homeostasis. Otulinl, also called FAM105A, is an OTU-class pseudo-deubiquitinase with a disrupted catalytic triad and undetectable cleavage activity for any diubiquitin linkage. It may play a role in endoplasmic reticulum (ER)-organelle communication. Otulin and otulinl belong to the OTU family of cysteine proteases that use a conserved cysteine and histidine, and in some cases an aspartate, as the catalytic dyad (or triad). — an NCBI CDD conserved domain (cd22790); members share this curated model.
