identifier: CDD:cd20059
label: "Forkhead (FH) domain found in Forkhead box protein N3 (FOXN3). FOXN3, also called checkpoint suppressor 1 (CHES1), acts as a transcriptional repressor that may be involved in DNA damage-inducible cell cycle arrests (checkpoints). It displays transcriptional inhibitory activity, and is involved in cell cycle regulation and tumorigenesis.  Alterations in FOXN3 are found in of a variety of cancers including melanoma, osteosarcoma, and hepatocellular carcinoma. FOXN3 also regulates hepatic glucose utilization/metabolism by regulating gluconeogenic substrate selection. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein N3 (FOXN3). FOXN3, also called checkpoint suppressor 1 (CHES1), acts as a transcriptional repressor that may be involved in DNA damage-inducible cell cycle arrests (checkpoints). It displays transcriptional inhibitory activity, and is involved in cell cycle regulation and tumorigenesis. Alterations in FOXN3 are found in of a variety of cancers including melanoma, osteosarcoma, and hepatocellular carcinoma. FOXN3 also regulates hepatic glucose utilization/metabolism by regulating gluconeogenic substrate selection. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20059); members share this curated model.
