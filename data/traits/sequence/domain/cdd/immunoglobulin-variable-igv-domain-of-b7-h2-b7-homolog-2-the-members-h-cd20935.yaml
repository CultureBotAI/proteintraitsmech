identifier: CDD:cd20935
label: "Immunoglobulin Variable (IgV) domain of B7-H2 (B7 homolog 2). The members here are composed of the immunoglobulin variable (IgV) domain of B7-H2 (B7 homolog 2 also known as ICOSL (inducible T cell costimulator ligand) or CD275). B7-H2 is a ligand for the T-cell-specific cell surface receptor ICOS and acts as a costimulatory signal for T-cell proliferation and cytokine secretion. The interaction of ICOS with ICOSL (B7-H2) regulates T cell activation and expansion, is involved in T cell dependent B cell activation, and T-helper cell differentiation. It is a member of the B7 family of immune regulatory proteins and shares homology with other B7 ligands, such as B7-1, B7-2, B7-H1 (PD-L1), PD-L2, and B7-H3. The extracellular domains of B7 proteins contain two Ig-like domains and all members have short cytoplasmic domains. These ligands are typically expressed on antigen presenting cells (such as macrophages, B cells and dendritic cells) and have the ability to regulate T-cell proliferation and function. Tumor cells are also capable of expressing the B7 family members in order to evade immune surveillance."
definition: >-
  Immunoglobulin Variable (IgV) domain of B7-H2 (B7 homolog 2). The members here are composed of the immunoglobulin variable (IgV) domain of B7-H2 (B7 homolog 2 also known as ICOSL (inducible T cell costimulator ligand) or CD275). B7-H2 is a ligand for the T-cell-specific cell surface receptor ICOS and acts as a costimulatory signal for T-cell proliferation and cytokine secretion. The interaction of ICOS with ICOSL (B7-H2) regulates T cell activation and expansion, is involved in T cell dependent B cell activation, and T-helper cell differentiation. It is a member of the B7 family of immune regulatory proteins and shares homology with other B7 ligands, such as B7-1, B7-2, B7-H1 (PD-L1), PD-L2, and B7-H3. The extracellular domains of B7 proteins contain two Ig-like domains and all members have short cytoplasmic domains. These ligands are typically expressed on antigen presenting cells (such as macrophages, B cells and dendritic cells) and have the ability to regulate T-cell proliferation and function. Tumor cells are also capable of expressing the B7 family members in order to evade immune surveillance. — an NCBI CDD conserved domain (cd20935); members share this curated model.
