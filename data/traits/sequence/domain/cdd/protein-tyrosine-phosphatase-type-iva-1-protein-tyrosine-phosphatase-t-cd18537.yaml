identifier: CDD:cd18537
label: "protein tyrosine phosphatase type IVA 1. Protein tyrosine phosphatase type IVA 1 (PTP-IVa1), also known as protein-tyrosine phosphatase of regenerating liver 1 (PRL-1), stimulates progression from G1 into S phase during mitosis and enhances cell proliferation, cell motility and invasive activity, and promotes cancer metastasis. It may play a role in the development and maintenance of differentiating epithelial tissues. PRL-1 promotes cell growth and migration by activating both the ERK1/2 and RhoA pathways. It is a member of the PTP-IVa/PRL family of small, prenylated phosphatases that are the most oncogenic of all PTPs. PRLs associate with magnesium transporters of the cyclin M (CNNM) family, which results in increased intracellular magnesium levels that promote oncogenic transformation."
definition: >-
