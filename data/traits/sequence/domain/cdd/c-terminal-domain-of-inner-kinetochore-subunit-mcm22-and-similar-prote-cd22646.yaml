identifier: CDD:cd22646
label: "C-terminal domain of inner kinetochore subunit MCM22 and similar proteins. MCM22, also called CENP-K homolog, or constitutive centromere-associated network protein MCM22, or minichromosome maintenance protein 22, is a component of the kinetochore, a multiprotein complex that assembles on centromeric DNA and attaches chromosomes to spindle microtubules, mediating chromosome segregation and sister chromatid segregation during meiosis and mitosis. It is a component of the inner kinetochore constitutive centromere-associated network (CCAN), which serves as a structural platform for outer kinetochore assembly. The model corresponds to the C-terminal domain of MCM22, which interacts with another three kinetochore subunits: CNN1, MCM16 and CTF3."
definition: >-
  C-terminal domain of inner kinetochore subunit MCM22 and similar proteins. MCM22, also called CENP-K homolog, or constitutive centromere-associated network protein MCM22, or minichromosome maintenance protein 22, is a component of the kinetochore, a multiprotein complex that assembles on centromeric DNA and attaches chromosomes to spindle microtubules, mediating chromosome segregation and sister chromatid segregation during meiosis and mitosis. It is a component of the inner kinetochore constitutive centromere-associated network (CCAN), which serves as a structural platform for outer kinetochore assembly. The model corresponds to the C-terminal domain of MCM22, which interacts with another three kinetochore subunits: CNN1, MCM16 and CTF3. — an NCBI CDD conserved domain (cd22646); members share this curated model.
