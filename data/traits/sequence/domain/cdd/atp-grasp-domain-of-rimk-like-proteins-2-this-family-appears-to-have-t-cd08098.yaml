identifier: CDD:cd08098
label: ATP-G_RimK_like2
definition: >-
  ATP-grasp domain of RimK-like proteins-2. This family appears to have the sequence similarity with the ATP-grasp domain. Enzymes related to ATP-grasp superfamily catalyze an ATP-dependent ligation of a carboxyl group carbon of one substrate with an amino or imino group nitrogen of the second one via the formation of an acylphosphate intermediate. Catalytic center requires the presence of one or more metal ions as a physiological cofactor. ATP-grasp superfamily members also share a conserved Mg-ATP-binding domain that is believed to undergo a conformational change on substrate binding
