label: GH51_alpha_AraF_like
definition: >-
  GH51_alpha_AraF_like. Alpha-L-arabinofuranosidase-like protein, catalytic TIM barrel domain. This domain is present in a protein that is similar to alpha-L-arabinofuranosidase (alpha-AraF). This protein has an additional domain of unknown function located N-terminal to the catalytic TIM barrel domain that is absent in alpha-AraF
