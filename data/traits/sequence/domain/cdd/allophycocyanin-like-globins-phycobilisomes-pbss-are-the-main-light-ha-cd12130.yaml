identifier: CDD:cd12130
label: "Allophycocyanin-like globins. phycobilisomes (PBSs) are the main light-harvesting complex in cyanobacteria and red algae. In general, they consist of a central core and surrounding rods and function to harvest and channel light energy toward the photosynthetic reaction centers within the membrane. They are comprised of phycobiliproteins/chromophorylated proteins (PBPs) maintained together by linker polypeptides. PBPs have different numbers of chromophores, and the basic monomer component (alpha/beta heterodimers) can further oligomerize to ring-shaped trimers (heterohexamers) and hexamers (heterododecamers). Stacked PBP hexamers form both the core and the rods of the PBS; the core is mainly made up by allophycocyanin (APC) while the rods can be composed of the PBPs phycoerythrin (PE), phycocyanin (PC) and phycoerythrocyanin (PEC). This subfamily contains allophycocyanin-like proteins (Apls), which have conserved the residues critical for chromophore interactions, but may not maintain the proper alpha-beta subunit interactions and tertiary structure of phycobiliproteins. Indeed AplA isolated from Fremyella diplosiphon was not detected in phycobilisomes. As the genes encoding Apls cluster with light-responsive regulatory components, Apls may have photoresponsive regulatory role(s)."
definition: >-
  Allophycocyanin-like globins. phycobilisomes (PBSs) are the main light-harvesting complex in cyanobacteria and red algae. In general, they consist of a central core and surrounding rods and function to harvest and channel light energy toward the photosynthetic reaction centers within the membrane. They are comprised of phycobiliproteins/chromophorylated proteins (PBPs) maintained together by linker polypeptides. PBPs have different numbers of chromophores, and the basic monomer component (alpha/beta heterodimers) can further oligomerize to ring-shaped trimers (heterohexamers) and hexamers (heterododecamers). Stacked PBP hexamers form both the core and the rods of the PBS; the core is mainly made up by allophycocyanin (APC) while the rods can be composed of the PBPs phycoerythrin (PE), phycocyanin (PC) and phycoerythrocyanin (PEC). This subfamily contains allophycocyanin-like proteins (Apls), which have conserved the residues critical for chromophore interactions, but may not maintain the proper alpha-beta subunit interactions and tertiary structure of phycobiliproteins. Indeed AplA isolated from Fremyella diplosiphon was not detected in phycobilisomes. As the genes encoding Apls cluster with light-responsive regulatory components, Apls may have photoresponsive regulatory role(s). — an NCBI CDD conserved domain (cd12130); members share this curated model.
