identifier: CDD:cd12742
label: "RNA recognition motif 3 (RRM3) found in epithelial splicing regulatory protein ESRP1, ESRP2 and similar proteins. This subgroup corresponds to the RRM3 of ESRP1 (also termed RBM35A) and ESRP2 (also termed RBM35B). These are epithelial-specific RNA binding proteins that promote splicing of the epithelial variant of the fibroblast growth factor receptor 2 (FGFR2), ENAH (also termed hMena), CD44 and CTNND1 (also termed p120-Catenin) transcripts. They are highly conserved paralogs and specifically bind to GU-rich binding site. ESRP1 and ESRP2 contain three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains)."
definition: >-
  RNA recognition motif 3 (RRM3) found in epithelial splicing regulatory protein ESRP1, ESRP2 and similar proteins. This subgroup corresponds to the RRM3 of ESRP1 (also termed RBM35A) and ESRP2 (also termed RBM35B). These are epithelial-specific RNA binding proteins that promote splicing of the epithelial variant of the fibroblast growth factor receptor 2 (FGFR2), ENAH (also termed hMena), CD44 and CTNND1 (also termed p120-Catenin) transcripts. They are highly conserved paralogs and specifically bind to GU-rich binding site. ESRP1 and ESRP2 contain three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). — an NCBI CDD conserved domain (cd12742); members share this curated model.
