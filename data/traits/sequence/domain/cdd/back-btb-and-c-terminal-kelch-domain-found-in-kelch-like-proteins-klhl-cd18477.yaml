identifier: CDD:cd18477
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like proteins, KLHL40 and KLHL41. The family includes Kelch-like proteins, KLHL40 and KLHL41. KLHL40 is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex that acts as a key regulator of skeletal muscle development. KLHL41 is a novel kelch related protein that is involved in pseudopod elongation in transformed cells."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like proteins, KLHL40 and KLHL41. The family includes Kelch-like proteins, KLHL40 and KLHL41. KLHL40 is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex that acts as a key regulator of skeletal muscle development. KLHL41 is a novel kelch related protein that is involved in pseudopod elongation in transformed cells. — an NCBI CDD conserved domain (cd18477); members share this curated model.
