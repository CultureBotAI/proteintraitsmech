identifier: CDD:cd19900
label: "double-stranded RNA binding motif of APOBEC1 complementation factor (A1CF) and similar proteins. A1CF (also known as APOBEC1-stimulating protein) is an essential component of the apolipoprotein B mRNA editing enzyme complex which is responsible for the posttranscriptional editing of a CAA codon for Gln to a UAA codon for stop in APOB mRNA. A1CF binds to APOB mRNA and is probably responsible for docking the catalytic subunit, APOBEC1, to the mRNA to allow it to deaminate its target cytosine. It contains three RNA recognition motifs (RRMs) and a C-terminal double-stranded RNA binding motif (DSRM) that is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  double-stranded RNA binding motif of APOBEC1 complementation factor (A1CF) and similar proteins. A1CF (also known as APOBEC1-stimulating protein) is an essential component of the apolipoprotein B mRNA editing enzyme complex which is responsible for the posttranscriptional editing of a CAA codon for Gln to a UAA codon for stop in APOB mRNA. A1CF binds to APOB mRNA and is probably responsible for docking the catalytic subunit, APOBEC1, to the mRNA to allow it to deaminate its target cytosine. It contains three RNA recognition motifs (RRMs) and a C-terminal double-stranded RNA binding motif (DSRM) that is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19900); members share this curated model.
