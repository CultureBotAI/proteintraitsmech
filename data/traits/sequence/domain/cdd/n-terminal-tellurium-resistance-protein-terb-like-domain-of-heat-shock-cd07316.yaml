identifier: CDD:cd07316
label: "N-terminal tellurium resistance protein terB-like domain of heat shock DnaJ-like proteins. Tellurium resistance terB-like domain of the DnaJ-like DjlA proteins. This family represents the terB-like domain of DjlA-like proteins, a subgroup of heat shock DnaJ-like proteins.  Escherichia coli DjlA is a type III membrane protein with a small N-terminal transmembrane region and DnaJ-like domain on the extreme C-terminus.  Overproduction has been shown to activate the RcsC pathway, which regulates the production of the capsular exopolysaccharide colanic acid.  The specific function of this domain is unknown."
definition: >-
  N-terminal tellurium resistance protein terB-like domain of heat shock DnaJ-like proteins. Tellurium resistance terB-like domain of the DnaJ-like DjlA proteins. This family represents the terB-like domain of DjlA-like proteins, a subgroup of heat shock DnaJ-like proteins. Escherichia coli DjlA is a type III membrane protein with a small N-terminal transmembrane region and DnaJ-like domain on the extreme C-terminus. Overproduction has been shown to activate the RcsC pathway, which regulates the production of the capsular exopolysaccharide colanic acid. The specific function of this domain is unknown. — an NCBI CDD conserved domain (cd07316); members share this curated model.
