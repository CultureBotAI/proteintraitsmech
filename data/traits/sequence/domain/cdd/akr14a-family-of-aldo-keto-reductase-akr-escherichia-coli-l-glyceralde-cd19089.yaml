identifier: CDD:cd19089
label: "AKR14A family of aldo-keto reductase (AKR). Escherichia coli L-glyceraldehyde 3-phosphate reductase (GPR/YghZ), also called GAP reductase, is a founding member of aldo-keto reductase family 14 member A1 (AKR14A1). It catalyzes the stereospecific, NADPH-dependent reduction of L-glyceraldehyde 3-phosphate (L-GAP). It is also involved in the stress response as a methylglyoxal reductase which converts the toxic metabolite methylglyoxal to acetol in vitro and in vivo. Salmonella enterica AKR is a founding member of aldo-keto reductase family 14 member A2 (AKR14A2). It catalyzes the conversion of 3-hydroxybutanal (3-HB) to 1,3-butanediol (1,3-BDO) by using NADPH as a cofactor."
definition: >-
  AKR14A family of aldo-keto reductase (AKR). Escherichia coli L-glyceraldehyde 3-phosphate reductase (GPR/YghZ), also called GAP reductase, is a founding member of aldo-keto reductase family 14 member A1 (AKR14A1). It catalyzes the stereospecific, NADPH-dependent reduction of L-glyceraldehyde 3-phosphate (L-GAP). It is also involved in the stress response as a methylglyoxal reductase which converts the toxic metabolite methylglyoxal to acetol in vitro and in vivo. Salmonella enterica AKR is a founding member of aldo-keto reductase family 14 member A2 (AKR14A2). It catalyzes the conversion of 3-hydroxybutanal (3-HB) to 1,3-butanediol (1,3-BDO) by using NADPH as a cofactor. — an NCBI CDD conserved domain (cd19089); members share this curated model.
