identifier: CDD:cd18204
label: BTB_POZ_ZBTB14
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 14 (ZBTB14). ZBTB14 is also called zinc finger protein 161 (Zfp-161), zinc finger protein 478, zinc finger protein 5 (ZF5), or Zfp-5. It is a novel transcriptional activator of the dopamine transporter, binding it's promoter at the consensus sequence 5'-CCTGCACAGTTCACGGA-3'. It also binds to 5'-d(GCC)(n)-3' trinucleotide repeats in promoter regions and acts as a repressor of the FMR1 gene. ZBTB14 acts as a transcriptional repressor of MYC and thymidine kinase promoters. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids
