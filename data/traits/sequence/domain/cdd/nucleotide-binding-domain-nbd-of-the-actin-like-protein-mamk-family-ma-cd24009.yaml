identifier: CDD:cd24009
label: "nucleotide-binding domain (NBD) of the actin-like protein MamK family. MamK, also called magnetosome cytoskeleton protein MamK, is a protein with ATPase activity which forms dynamic cytoplasmic filaments (probably with paralog MamK-like) that may organize magnetosomes into long chains running parallel to the long axis of the cell. Turnover of MamK filaments is probably promoted by MamK-like (e.g.. MamJ and/or LimJ), which provides a monomer pool. MamK forms twisted filaments in the presence of ATP or GTP. It serves to close gaps between magnetosomes in the chain. Interaction with MCP10 is involved in controlling the response to magnetic fields, possibly by controlling flagellar rotation. The MamK family belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains."
definition: >-
  nucleotide-binding domain (NBD) of the actin-like protein MamK family. MamK, also called magnetosome cytoskeleton protein MamK, is a protein with ATPase activity which forms dynamic cytoplasmic filaments (probably with paralog MamK-like) that may organize magnetosomes into long chains running parallel to the long axis of the cell. Turnover of MamK filaments is probably promoted by MamK-like (e.g.. MamJ and/or LimJ), which provides a monomer pool. MamK forms twisted filaments in the presence of ATP or GTP. It serves to close gaps between magnetosomes in the chain. Interaction with MCP10 is involved in controlling the response to magnetic fields, possibly by controlling flagellar rotation. The MamK family belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains. — an NCBI CDD conserved domain (cd24009); members share this curated model.
