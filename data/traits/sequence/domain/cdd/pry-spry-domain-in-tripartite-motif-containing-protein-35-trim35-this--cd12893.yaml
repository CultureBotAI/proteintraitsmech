identifier: CDD:cd12893
label: "PRY/SPRY domain in tripartite motif-containing protein 35 (TRIM35). This PRY/SPRY domain is found at the C-terminus of the overall domain architecture of tripartite motif 35, TRIM35 (also known as hemopoietic lineage switch protein), which includes a RING finger domain (RING) and a B-box motif (BBOX). TRIM35 may play a role as a tumor suppressor and is implicated in the cell death mechanism."
definition: >-
  PRY/SPRY domain in tripartite motif-containing protein 35 (TRIM35). This PRY/SPRY domain is found at the C-terminus of the overall domain architecture of tripartite motif 35, TRIM35 (also known as hemopoietic lineage switch protein), which includes a RING finger domain (RING) and a B-box motif (BBOX). TRIM35 may play a role as a tumor suppressor and is implicated in the cell death mechanism. — an NCBI CDD conserved domain (cd12893); members share this curated model.
