identifier: CDD:cd10031
label: "Uracil DNA glycosylase family 5, includes Thermotoga maritima TTUDGB and similar proteins. Uracil DNA glycosylase family 5 includes Thermus thermophilus HB8 TTUDGB (also called UDGb) which is not only a UDG acting on double-stranded uracil-containing DNA, but also a hypoxanthine DNA glycosylase acting on double-stranded hypoxanthine-containing DNA (except for the C/I base pair), as well as a xanthine DNA glycosylase acting on both, double-stranded and single-stranded xanthine-containing DNA.  TTUDGB also excises thymine from G:T mismatched DNA, and removes analogs of uracil from DNA, including 5-hydroxymethyluracil (hmU) and 5-fluorouracil (fU). This subfamily also contains Bradyrhizobium diazoefficiens family 5 homolog Blr5068 (UdgB) which has been found to efficiently excise uracil from ssDNA and dsDNA. Uracil-DNA glycosylases (UDGs) initiate repair of uracils in DNA. Similar to family 4 UDGs, members of this family possess four conserved cysteine residues required to coordinate the [4Fe-4S] iron-sulfur cluster. Uracil in DNA can arise as a result of mis-incorporation of dUMP residues by DNA polymerase or via deamination of cytosine. Uracil in DNA mispaired with guanine is one of the major pro-mutagenic events, causing G:C->A:T mutations. Thus, UDG is an essential enzyme for maintaining the integrity of genetic information. UDGs have been classified into various families on the basis of their substrate specificity, conserved motifs, and structural similarities. Although these families demonstrate different substrate specificities, often the function of one enzyme can be complemented by the other."
definition: >-
  Uracil DNA glycosylase family 5, includes Thermotoga maritima TTUDGB and similar proteins. Uracil DNA glycosylase family 5 includes Thermus thermophilus HB8 TTUDGB (also called UDGb) which is not only a UDG acting on double-stranded uracil-containing DNA, but also a hypoxanthine DNA glycosylase acting on double-stranded hypoxanthine-containing DNA (except for the C/I base pair), as well as a xanthine DNA glycosylase acting on both, double-stranded and single-stranded xanthine-containing DNA. TTUDGB also excises thymine from G:T mismatched DNA, and removes analogs of uracil from DNA, including 5-hydroxymethyluracil (hmU) and 5-fluorouracil (fU). This subfamily also contains Bradyrhizobium diazoefficiens family 5 homolog Blr5068 (UdgB) which has been found to efficiently excise uracil from ssDNA and dsDNA. Uracil-DNA glycosylases (UDGs) initiate repair of uracils in DNA. Similar to family 4 UDGs, members of this family possess four conserved cysteine residues required to coordinate the [4Fe-4S] iron-sulfur cluster. Uracil in DNA can arise as a result of mis-incorporation of dUMP residues by DNA polymerase or via deamination of cytosine. Uracil in DNA mispaired with guanine is one of the major pro-mutagenic events, causing G:C->A:T mutations. Thus, UDG is an essential enzyme for maintaining the integrity of genetic information. UDGs have been classified into various families on the basis of their substrate specificity, conserved motifs, and structural similarities. Although these families demonstrate different substrate specificities, often the function of one enzyme can be complemented by the other. — an NCBI CDD conserved domain (cd10031); members share this curated model.
