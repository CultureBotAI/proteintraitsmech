identifier: CDD:cd06176
label: "Bacteriochlorophyll delivery (BCD) family, also called PucC family, of the Major Facilitator Superfamily. The bacteriochlorophyll delivery (BCD) family, also called PucC family, is composed of the PucC protein and related proteins including LhaA (also called ORF477 and F1696) and bacteriochlorophyll synthase 44.5 kDa chain (also called ORF428). These proteins are found in photosynthetic organisms. Rhodobacter capsulatus LhaA and PucC are implicated in light-harvesting complex 1 and 2 (LH1 and LH2) assembly. PucC may function to shepherd or sequester LH2 alpha and beta proteins to facilitate proper assembly, as well as deliver bacteriochlorophyll a to nascent LH2 complexes. The BCD family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Bacteriochlorophyll delivery (BCD) family, also called PucC family, of the Major Facilitator Superfamily. The bacteriochlorophyll delivery (BCD) family, also called PucC family, is composed of the PucC protein and related proteins including LhaA (also called ORF477 and F1696) and bacteriochlorophyll synthase 44.5 kDa chain (also called ORF428). These proteins are found in photosynthetic organisms. Rhodobacter capsulatus LhaA and PucC are implicated in light-harvesting complex 1 and 2 (LH1 and LH2) assembly. PucC may function to shepherd or sequester LH2 alpha and beta proteins to facilitate proper assembly, as well as deliver bacteriochlorophyll a to nascent LH2 complexes. The BCD family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd06176); members share this curated model.
