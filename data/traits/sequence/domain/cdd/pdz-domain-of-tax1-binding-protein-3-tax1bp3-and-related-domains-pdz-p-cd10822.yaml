identifier: CDD:cd10822
label: "PDZ domain of tax1-binding protein 3 (TAX1BP3), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of TAX1BP3, and related domains. TAX1BP3 (also known as glutaminase-interacting protein 3, tax interaction protein 1, TIP-1, tax-interacting protein 1) may regulate a number of protein-protein interactions by competing for PDZ domain binding sites. TAX1BP3 binds beta-catenin and may act as an inhibitor of the Wnt signaling pathway. It competes with LIN7A (also known as Lin-7A or LIN-7A) for inward rectifier potassium channel 4 (KCNJ4) binding, and thereby promotes KCNJ4 internalization. It may play a role in the Rho signaling pathway, and in the activation of CDC42 by the viral protein HPV16 E6. Binding partners of the TAX1BP3 PDZ domain include beta-catenin, KCNJ4, glutaminase liver isoform (GLS2), rho guanine nucleotide exchange factor 16 (ARHGEF16), rhotekin, and CDK5 regulatory subunit-associated protein 3 (also known as LAPZ). PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This TAX1BP3-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
