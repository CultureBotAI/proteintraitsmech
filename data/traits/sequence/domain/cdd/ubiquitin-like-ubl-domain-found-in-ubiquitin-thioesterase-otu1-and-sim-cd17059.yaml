identifier: CDD:cd17059
label: "ubiquitin-like (Ubl) domain found in ubiquitin thioesterase OTU1 and similar proteins. OTU1 (EC 3.4.19.12), also termed YOD1, or DUBA-8, or HIV-1-induced protease 7 (HIN-7), or OTU domain-containing protein 2 (OTUD2), is a p97-associated deubiquitinylase that functions as a key player in endoplasmic reticulum-associated degradation (ERAD). Its deubiquitinylase activity is also required for negatively regulating cholera toxin A1 (CTA1) retro-translocation. OTU1 contains a conserved ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold, a C2H2-type zinc finger, and an OTU domain."
definition: >-
