identifier: CDD:cd04435
label: "DEP (Dishevelled, Egl-10, and Pleckstrin) domain found in fungal RhoGEF (GDP/GTP exchange factor) Rom2-like proteins. Rom2-like proteins share a common domain architecture, containing, beside the RhoGEF domain, a DEP, a PH (pleckstrin homology) and a CNH domain. Rom2, a yeast GEF for Rho1 and Rho2, is involved in mediating stress response via the Ras-cAMP pathway and also plays a role in mediating resistance to sphingolipid disturbances."
definition: >-
  DEP (Dishevelled, Egl-10, and Pleckstrin) domain found in fungal RhoGEF (GDP/GTP exchange factor) Rom2-like proteins. Rom2-like proteins share a common domain architecture, containing, beside the RhoGEF domain, a DEP, a PH (pleckstrin homology) and a CNH domain. Rom2, a yeast GEF for Rho1 and Rho2, is involved in mediating stress response via the Ras-cAMP pathway and also plays a role in mediating resistance to sphingolipid disturbances. — an NCBI CDD conserved domain (cd04435); members share this curated model.
