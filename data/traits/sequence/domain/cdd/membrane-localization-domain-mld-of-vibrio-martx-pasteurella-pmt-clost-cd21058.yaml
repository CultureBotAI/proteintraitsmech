identifier: CDD:cd21058
label: "membrane localization domain (MLD) of Vibrio MARTX, Pasteurella PMT, clostridial glycosylating cytotoxins, toxin effectors BteA (Bordetella T3SS effector A) and related proteins. This family includes membrane localization domains (MLDs) for toxin effectors such as the Rho-inactivation domain of Vibrio MARTX, Pasteurella mitogenic toxin (PMT), where it has been termed PMT C1 domain, and clostridial glycosylating cytotoxins including Clostridium difficile toxins A (TcdA) and B (TcdB), Clostridium novyi alpha-toxin (TcnA), and Clostridium sordellii lethal toxin (TcsL). It also includes the MLD located in the N-terminal minimal membrane-binding fragment of BteA, a type III secretion system (T3SS) effector protein from Bordetella pertussis, the causative agent of whooping cough."
definition: >-
  membrane localization domain (MLD) of Vibrio MARTX, Pasteurella PMT, clostridial glycosylating cytotoxins, toxin effectors BteA (Bordetella T3SS effector A) and related proteins. This family includes membrane localization domains (MLDs) for toxin effectors such as the Rho-inactivation domain of Vibrio MARTX, Pasteurella mitogenic toxin (PMT), where it has been termed PMT C1 domain, and clostridial glycosylating cytotoxins including Clostridium difficile toxins A (TcdA) and B (TcdB), Clostridium novyi alpha-toxin (TcnA), and Clostridium sordellii lethal toxin (TcsL). It also includes the MLD located in the N-terminal minimal membrane-binding fragment of BteA, a type III secretion system (T3SS) effector protein from Bordetella pertussis, the causative agent of whooping cough. — an NCBI CDD conserved domain (cd21058); members share this curated model.
