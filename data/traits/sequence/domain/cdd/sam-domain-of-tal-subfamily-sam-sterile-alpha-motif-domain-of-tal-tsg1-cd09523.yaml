identifier: CDD:cd09523
label: "SAM domain of TAL subfamily. SAM (sterile alpha motif) domain of TAL (Tsg101-associated ligase) proteins, also known as LRSAM1 (Leucine-rich repeat and sterile alpha motif-containing) proteins, is a putative protein-protein interaction domain. Proteins of this subfamily participate in the regulation of retrovirus budding and receptor endocytosis. They show E3 ubiquitin ligase activity. Human TAL protein interacts with Tsg101 and TAL's C-terminal ring finger domain is essential for the multiple monoubiquitylation of Tsg101."
definition: >-
  SAM domain of TAL subfamily. SAM (sterile alpha motif) domain of TAL (Tsg101-associated ligase) proteins, also known as LRSAM1 (Leucine-rich repeat and sterile alpha motif-containing) proteins, is a putative protein-protein interaction domain. Proteins of this subfamily participate in the regulation of retrovirus budding and receptor endocytosis. They show E3 ubiquitin ligase activity. Human TAL protein interacts with Tsg101 and TAL's C-terminal ring finger domain is essential for the multiple monoubiquitylation of Tsg101. — an NCBI CDD conserved domain (cd09523); members share this curated model.
