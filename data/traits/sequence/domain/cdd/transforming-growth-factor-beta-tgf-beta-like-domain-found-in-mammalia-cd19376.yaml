identifier: CDD:cd19376
label: TGF_beta_GDF15
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in mammalian growth/differentiation factor 15 (GDF-15) and similar proteins. GDF-15, also termed macrophage inhibitory cytokine 1 (MIC-1), or NSAID-activated gene 1 protein (NAG-1), or NSAID-regulated gene 1 protein (NRG-1), or placental TGF-beta, or placental bone morphogenetic protein, or prostate differentiation factor, regulates food intake, energy expenditure and body weight in response to metabolic and toxin-induced stresses
