identifier: CDD:cd12091
label: "Insert domain of FANCM and related proteins. FANCM and related proteins, like Mph1 and Fml1, are DNA junction-specific helicases/translocases that bind to and process perturbed replication forks and intermediates of homologous recombination. FANCM contains an N-terminal superfamily 2 helicase (SF2) domain, although FANCM, in contrast to other members of this family, does not exhibit DNA helicase activity. The SF2 helicase domain is comprised of 3 structural domains, the 2 generally conserved helicase domains and a helical domain inserted between the two domains. FANCM is a component of the Fanconi anaemia (FA) core complex. FA is a rare genetic disease in humans that is associated with progressive bone marrow failure, a variety of developmental abnormalities, and a high incidence of cancer. A key role of this complex is to monoubiquitination of FANCD2 and FANCI during S-phase and in response to DNA damage. The role of FANCM during this process seems to be the recruitment of the complex to chromatin."
definition: >-
  Insert domain of FANCM and related proteins. FANCM and related proteins, like Mph1 and Fml1, are DNA junction-specific helicases/translocases that bind to and process perturbed replication forks and intermediates of homologous recombination. FANCM contains an N-terminal superfamily 2 helicase (SF2) domain, although FANCM, in contrast to other members of this family, does not exhibit DNA helicase activity. The SF2 helicase domain is comprised of 3 structural domains, the 2 generally conserved helicase domains and a helical domain inserted between the two domains. FANCM is a component of the Fanconi anaemia (FA) core complex. FA is a rare genetic disease in humans that is associated with progressive bone marrow failure, a variety of developmental abnormalities, and a high incidence of cancer. A key role of this complex is to monoubiquitination of FANCD2 and FANCI during S-phase and in response to DNA damage. The role of FANCM during this process seems to be the recruitment of the complex to chromatin. — an NCBI CDD conserved domain (cd12091); members share this curated model.
