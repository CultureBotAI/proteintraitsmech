identifier: CDD:cd16939
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Salmonella typhimurium RstB. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) such as Salmonella typhimurium RstB HK of the RstA-RstB two-component regulatory system (TCS), which regulates expression of the constituents participating in pyrimidine metabolism and iron acquisition, and may be required for regulation of Salmonella motility and invasion. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA), and a HAMP sensor domain."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Salmonella typhimurium RstB. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) such as Salmonella typhimurium RstB HK of the RstA-RstB two-component regulatory system (TCS), which regulates expression of the constituents participating in pyrimidine metabolism and iron acquisition, and may be required for regulation of Salmonella motility and invasion. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA), and a HAMP sensor domain. — an NCBI CDD conserved domain (cd16939); members share this curated model.
