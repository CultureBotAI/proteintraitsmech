identifier: CDD:cd22924
label: "histone-fold domain found in chromatin accessibility complex protein 1 (CHRAC-1) and similar proteins. CHRAC-1, also called chromatin accessibility complex 15 kDa protein, or CHRAC-15, or DNA polymerase epsilon subunit p15, forms a complex with DNA polymerase epsilon subunit POLE3 and binds naked DNA, which is then incorporated into chromatin, aided by the nucleosome remodeling activity of ISWI/SNF2H and ACF1. Together with POLE3, ACF1 and ISWI/SNF2H proteins, CHRAC-1 forms the ISWI chromatin-remodeling complex, CHRAC. This subfamily also includes Drosophila melanogaster chromatin accessibility complex 16kD protein (CHRAC-16), which is a histone-like protein that promotes nucleosome sliding of ATP-dependent nucleosome remodeling complexes. It is part of the CHRAC, composed of CHRAC-14, CHRAC-16, ACF and ISWI, which uses energy/ATP to increase the general accessibility of DNA in chromatin. It forms a heterodimer with CHRAC-14, binds DNA, and facilitates nucleosome sliding by ACF. It is required for oogenesis."
definition: >-
  histone-fold domain found in chromatin accessibility complex protein 1 (CHRAC-1) and similar proteins. CHRAC-1, also called chromatin accessibility complex 15 kDa protein, or CHRAC-15, or DNA polymerase epsilon subunit p15, forms a complex with DNA polymerase epsilon subunit POLE3 and binds naked DNA, which is then incorporated into chromatin, aided by the nucleosome remodeling activity of ISWI/SNF2H and ACF1. Together with POLE3, ACF1 and ISWI/SNF2H proteins, CHRAC-1 forms the ISWI chromatin-remodeling complex, CHRAC. This subfamily also includes Drosophila melanogaster chromatin accessibility complex 16kD protein (CHRAC-16), which is a histone-like protein that promotes nucleosome sliding of ATP-dependent nucleosome remodeling complexes. It is part of the CHRAC, composed of CHRAC-14, CHRAC-16, ACF and ISWI, which uses energy/ATP to increase the general accessibility of DNA in chromatin. It forms a heterodimer with CHRAC-14, binds DNA, and facilitates nucleosome sliding by ACF. It is required for oogenesis. — an NCBI CDD conserved domain (cd22924); members share this curated model.
