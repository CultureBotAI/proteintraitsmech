identifier: CDD:cd07244
label: "fosfomycin resistant protein subfamily FosA. This subfamily family contains FosA, a fosfomycin resistant protein. FosA is a Mn(II) and K(+)-dependent glutathione transferase. Fosfomycin inhibits the enzyme UDP-N-acetylglucosamine-3-enolpyruvyltransferase (MurA), which catalyzes the first committed step in bacterial cell wall biosynthesis. FosA, catalyzes the addition of glutathione to the antibiotic fosfomycin, (1R,2S)-epoxypropylphosphonic acid, making it inactive. FosA is a Mn(II) dependent enzyme. It is evolutionarily related to glyoxalase I and type I extradiol dioxygenases."
definition: >-
  fosfomycin resistant protein subfamily FosA. This subfamily family contains FosA, a fosfomycin resistant protein. FosA is a Mn(II) and K(+)-dependent glutathione transferase. Fosfomycin inhibits the enzyme UDP-N-acetylglucosamine-3-enolpyruvyltransferase (MurA), which catalyzes the first committed step in bacterial cell wall biosynthesis. FosA, catalyzes the addition of glutathione to the antibiotic fosfomycin, (1R,2S)-epoxypropylphosphonic acid, making it inactive. FosA is a Mn(II) dependent enzyme. It is evolutionarily related to glyoxalase I and type I extradiol dioxygenases. — an NCBI CDD conserved domain (cd07244); members share this curated model.
