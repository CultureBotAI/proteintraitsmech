identifier: CDD:cd17029
label: "Class IA type III secretion system chaperone protein, similar to Yersinia SycE. This family includes type III secretion system (T3SS) chaperone proteins similar to Yersinia SycE and its homolog Pseudomonas aeruginosa SpcS. Involvement of Yersinia chaperone SycE (also known as YerA) in promoting translocation of Yersinia outer protein E (YopE), a selective activator of mammalian Rho-family GTPases, into host macrophages is essential to Yersinia pathogenesis. In P. aeruginosa, which is an opportunistic pathogen that harbors multiple virulence factors that widely manipulate host cell signaling and immune response, the effector toxin proteins of T3SS are ExoT, ExoS, ExoU and ExoY. Chaperone SpcS (formerly known as Orf1) binds to ExoT as well as its homolog, ExoS, both known to be the actual virulence determinants due to the presence of bifunctional GTPase-activating (GAP) and ADP-ribosyltransferase (ADPRT) domains which are essential for inhibition of bacterial internalization and epithelial cell migration by altering the actin cytoskeleton."
definition: >-
