identifier: CDD:cd09983
label: "The seventh LOTUS domain on Limkain b1(LKAP). The seventh LOTUS domain on Limkain b1(LKAP): Limkain b1 is  a novel human autoantigen, localized to a subset of ABCD3 and PXF marked peroxisomes. Limkain b1 may be a relatively common target of human autoantibodies reactive to cytoplasmic vesicle-like structures. The protein contains multiple copies of LOTUS domains and a conserved RNA recognition motif.  The exact molecular function of LOTUS domain remains to be identified. Its occurrence in proteins associated with RNA metabolism suggests that it might be involved in RNA binding function. The presence of several basic residues and RNA fold recognition motifs support this hypothesis. The RNA binding function might be the first step of regulating mRNA translation or localization."
definition: >-
