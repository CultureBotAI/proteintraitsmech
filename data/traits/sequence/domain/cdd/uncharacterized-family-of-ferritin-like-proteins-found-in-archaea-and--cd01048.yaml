identifier: CDD:cd01048
label: "Uncharacterized family of ferritin-like proteins found in archaea and bacteria. Ferritin-like domain found in archaea and bacteria, subgroup 2 (Ferritin_like_AB2).  This uncharacterized domain is a member of a broad superfamily of ferritin-like diiron-carboxylate proteins whose function is unknown. The conserved residues of a diiron center are present within the putative active site."
definition: >-
