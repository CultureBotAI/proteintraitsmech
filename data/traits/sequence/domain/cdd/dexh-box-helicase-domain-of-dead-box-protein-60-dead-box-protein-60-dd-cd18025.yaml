identifier: CDD:cd18025
label: "DEXH-box helicase domain of DEAD box protein 60. DEAD box protein 60 (DDX60) is an IFN-inducible cytoplasmic helicase that plays a role in RIG-I-mediated type I interferon (IFN) nuclease-mediated viral RNA degradation. DDX60 belongs to the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of DEAD box protein 60. DEAD box protein 60 (DDX60) is an IFN-inducible cytoplasmic helicase that plays a role in RIG-I-mediated type I interferon (IFN) nuclease-mediated viral RNA degradation. DDX60 belongs to the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd18025); members share this curated model.
