identifier: CDD:cd10600
label: OAT_BAP-AT
definition: >-
  Pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily: Beta-alanine-pyruvate aminotransferase. Beta-alanine-pyruvate aminotransferase family (BAP_AT). This family belongs to pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily (fold I). BAP_AT is a PLP dependent enzyme that catalyzes the transamination reaction of omega-amino acids such as beta-alanine, beta-aminoisobutyrate, and gamma-aminobutyrate, amino acids that are not protein constituents. This enzyme is found in all three forms of life
