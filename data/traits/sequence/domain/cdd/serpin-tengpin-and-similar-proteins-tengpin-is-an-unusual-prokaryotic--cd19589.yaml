identifier: CDD:cd19589
label: "serpin tengpin and similar proteins. Tengpin is an unusual prokaryotic serpin from the extremophile Thermoanaerobacter tengcongensis. In addition to the serpin domain, tengpin contains an N-terminal region that functions to trap the serpin domain in the native metastable state and prevent the spontaneous transition to the latent conformation. SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
definition: >-
  serpin tengpin and similar proteins. Tengpin is an unusual prokaryotic serpin from the extremophile Thermoanaerobacter tengcongensis. In addition to the serpin domain, tengpin contains an N-terminal region that functions to trap the serpin domain in the native metastable state and prevent the spontaneous transition to the latent conformation. SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans. — an NCBI CDD conserved domain (cd19589); members share this curated model.
