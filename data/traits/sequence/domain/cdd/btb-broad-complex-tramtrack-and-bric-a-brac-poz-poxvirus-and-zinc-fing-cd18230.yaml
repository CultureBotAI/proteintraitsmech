identifier: CDD:cd18230
label: BTB_POZ_ZBTB46
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 46 (ZBTB46). ZBTB46 is also called BTB-ZF protein expressed in effector lymphocytes (BZEL), BTB/POZ domain-containing protein 4 (BTBD4), or zinc finger protein 340 (ZNF340). It is a conventional dendritic cell (cDC) lineage specific transcription factor that acts as a negative regulator required to prevent activation of classical dendritic cells in the steady state. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids
