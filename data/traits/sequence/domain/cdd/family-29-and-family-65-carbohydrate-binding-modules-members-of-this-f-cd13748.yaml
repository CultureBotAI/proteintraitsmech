label: "family 29 and family 65 carbohydrate binding modules. Members of this family bind to polysaccharides that are components of plant cell walls. CBM29 is present in cell-wall degrading multi-enzyme complexes from the anaerobic fungus Piromyces equi, CBM65 can be found in endoglucanases expressed by Eubacterium cellulosolvens and has a preference for xyloglucans."
definition: >-
