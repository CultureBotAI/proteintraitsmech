identifier: CDD:cd22125
label: "F-box domain found in F-box/LRR-repeat protein 14 (FBXL14) and similar proteins. FBXL14, also called F-box and leucine-rich repeat protein 14, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin-protein ligase complex, which acts by mediating ubiquitination and subsequent degradation of SNAIL1. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box/LRR-repeat protein 14 (FBXL14) and similar proteins. FBXL14, also called F-box and leucine-rich repeat protein 14, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin-protein ligase complex, which acts by mediating ubiquitination and subsequent degradation of SNAIL1. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22125); members share this curated model.
