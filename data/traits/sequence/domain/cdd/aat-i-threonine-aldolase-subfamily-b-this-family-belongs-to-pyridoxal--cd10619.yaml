label: threonine_aldolase_subfamily_b
definition: >-
  AAT_I. Threonine aldolase subfamily b: This family belongs to pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily (fold I). This CD corresponds to members of threonine aldolase Low-specificity. L-TA catalyzes the cleavage of L-threonine into glycine and acetaldehyde. Members of this subgroup are present in all three forms of life
