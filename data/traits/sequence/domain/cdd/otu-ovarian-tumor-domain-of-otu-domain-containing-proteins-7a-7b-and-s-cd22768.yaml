identifier: CDD:cd22768
label: "OTU (ovarian tumor) domain of OTU domain-containing proteins 7A, 7B, and similar proteins. This subfamily consists of OTU domain-containing protein 7A (OTUD7A), OTUD7B, and similar proteins. OTUD7A and OTUD7B are deubiquitinases (DUBs)/ubiquitin thioesterases (EC 3.4.19.12) that specifically target Lys11-linked polyubiquitin. OTUD7A, also called zinc finger protein Cezanne 2, has been identified as a critical gene for brain function. It localizes to dendritic and spine compartments in cortical neurons, and its reduced levels contributed to dendritic spine and dendrite outgrowth deficits. OTUD7B, also called zinc finger protein Cezanne, functions as a negative regulator of the non-canonical NF-kappaB pathway by mediating the deubiquitination of TRAF3, an inhibitor of the NF-kappaB pathway, resulting in preventing TRAF3 proteolysis and over-activation of non-canonical NF-kappaB. OTUD7 proteins belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad. They are classified as family C64 cysteine proteases by MEROPS."
definition: >-
  OTU (ovarian tumor) domain of OTU domain-containing proteins 7A, 7B, and similar proteins. This subfamily consists of OTU domain-containing protein 7A (OTUD7A), OTUD7B, and similar proteins. OTUD7A and OTUD7B are deubiquitinases (DUBs)/ubiquitin thioesterases (EC 3.4.19.12) that specifically target Lys11-linked polyubiquitin. OTUD7A, also called zinc finger protein Cezanne 2, has been identified as a critical gene for brain function. It localizes to dendritic and spine compartments in cortical neurons, and its reduced levels contributed to dendritic spine and dendrite outgrowth deficits. OTUD7B, also called zinc finger protein Cezanne, functions as a negative regulator of the non-canonical NF-kappaB pathway by mediating the deubiquitination of TRAF3, an inhibitor of the NF-kappaB pathway, resulting in preventing TRAF3 proteolysis and over-activation of non-canonical NF-kappaB. OTUD7 proteins belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad. They are classified as family C64 cysteine proteases by MEROPS. — an NCBI CDD conserved domain (cd22768); members share this curated model.
