identifier: CDD:cd13640
label: "Substrate binding domain of ABC-type choline transport system; the type 2 periplasmic binding protein fold. This subfamily is part of a high affinity multicomponent binding-protein-dependent transport system specific to choline and acetylcholine for osmoregulation. The periplasmic substrate-binding domain, which is often fused to the permease component of the ATP-binding cassette transporter complex, is involved in uptake of osmoprotectants (also termed compatible solutes) such as choline and betaines. Choline is necessary for the biosynthesis of glycine betaine. Many microorganisms accumulate these compatible solutes in response to high osmolarity to offset the loss of cell water. In the case of the Sinorhizobium meliloti choline uptake system ChoVWX, ChoV is the nucleotide-binding domain that provides energy for the transport process via ATP hydrolysis, ChoW is the integral transmembrane protein that forms the substrate translaocation pathway, and ChoX is the substrate-binding domain. ChoX belongs to the type 2 periplasmic binding fold protein superfamily (PBP2). The PBP2 proteins are typically comprised of two globular subdomains connected by a flexible hinge and bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap."
definition: >-
  Substrate binding domain of ABC-type choline transport system; the type 2 periplasmic binding protein fold. This subfamily is part of a high affinity multicomponent binding-protein-dependent transport system specific to choline and acetylcholine for osmoregulation. The periplasmic substrate-binding domain, which is often fused to the permease component of the ATP-binding cassette transporter complex, is involved in uptake of osmoprotectants (also termed compatible solutes) such as choline and betaines. Choline is necessary for the biosynthesis of glycine betaine. Many microorganisms accumulate these compatible solutes in response to high osmolarity to offset the loss of cell water. In the case of the Sinorhizobium meliloti choline uptake system ChoVWX, ChoV is the nucleotide-binding domain that provides energy for the transport process via ATP hydrolysis, ChoW is the integral transmembrane protein that forms the substrate translaocation pathway, and ChoX is the substrate-binding domain. ChoX belongs to the type 2 periplasmic binding fold protein superfamily (PBP2). The PBP2 proteins are typically comprised of two globular subdomains connected by a flexible hinge and bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. — an NCBI CDD conserved domain (cd13640); members share this curated model.
