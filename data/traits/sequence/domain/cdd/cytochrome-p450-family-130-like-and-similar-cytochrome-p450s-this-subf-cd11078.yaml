identifier: CDD:cd11078
label: "cytochrome P450 family 130-like and similar cytochrome P450s. This subfamily includes Mycobacterium tuberculosis cytochrome P450 130 (CYP130), Rhodococcus erythropolis CYP116, and similar bacterial proteins. CYP130 catalyzes the N-demethylation of dextromethorphan, and has also shown a natural propensity to bind primary arylamines. CYP116 is involved in the degradation of thiocarbamate herbicides. The CYP130-like subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
