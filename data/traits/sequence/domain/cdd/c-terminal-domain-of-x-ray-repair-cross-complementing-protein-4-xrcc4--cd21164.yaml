identifier: CDD:cd21164
label: XRCC4_C
definition: >-
  C terminal domain of X-ray repair cross-complementing protein 4 (XRCC4). XRCC4 is stabilized DNA ligase IV (LIG4), participate in LIG4 activation, and to help tether the broken DSB (DNA double-strand break) ends together. For simple DNA DSBs, the DNA ends can likely be rejoined by LIG4 alone. However, if either one or both of the ends requires processing, then the entire complement of NHEJ (non-homologous end joining) factors is utilized in a three-step process which in the final step the XRCC4:LIG4 complex ligates the processed broken ends back together. The loss of XRCC4 expression by itself led to increased sensitivity to DNA damaging agents as well as an increased dependence on microhomology-mediated DNA repair whether in the context of DSB repair or during V(D)J recombination. polymorphisms within the XRCC4 gene have been identified as causing susceptibility to cancers including bladder, breast, prostate, hepatocellular carcinoma, lymphoma and multiple myeloma. XRCC4 deficiency causes microcephalic primordial dwarfism and a neurological phenotype without immunodeficiency. XRCC4 protein consists of an N-terminal globular head domain and two ~100 amino acids coiled-coil alpha-helical regions, which mediates a stable interaction between two XRCC4 monomers. Interaction of the XRCC4 homodimer with LIG4 ensures the stability of the LIG4 protein and stimulation of its activity including promoting its re-adenylation. The critical nature of this interaction is illustrated by the high degree of C-terminal evolutionary sequence conservation in XRCC4 across its primary binding site to the linker between the tandemly arranged BRCA1 C-terminal related (BRCT) domains at the C-terminus of DNA ligase IV
