identifier: CDD:cd07550
label: "P-type heavy metal-transporting ATPase; uncharacterized subfamily. Uncharacterized subfamily of the heavy metal-transporting ATPases (Type IB ATPases) which transport heavy metal ions (Cu(+), Cu(2+), Zn(2+), Cd(2+), Co(2+), etc.) across biological membranes. The characteristic N-terminal heavy metal associated (HMA) domain of this group is essential for the binding of metal ions. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle."
definition: >-
