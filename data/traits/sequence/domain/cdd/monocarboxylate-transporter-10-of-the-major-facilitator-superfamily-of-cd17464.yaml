identifier: CDD:cd17464
label: "Monocarboxylate transporter 10 of the Major Facilitator Superfamily of transporters. Monocarboxylate transporter 10 (MCT10) is also called Solute carrier family 16 member 10 (SLC16A10). In addition, human MCT10 is also called T-type amino acid transporter 1 (TAT1). MCT10 is a sodium-independent transporter that mediates the uptake or efflux of aromatic acids such as Phe, Tyr, and Trp, as well as L-3,4-di-hydroxy-phenylalanine. It is also a thyroid hormone transporter with preference for triiodothyronine (T3). MCT10 is expressed in intestine, kidney, liver, muscle, and placenta, and appears predominantly localized in the basolateral membrane. It belongs to the Monocarboxylate transporter (MCT) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Monocarboxylate transporter 10 of the Major Facilitator Superfamily of transporters. Monocarboxylate transporter 10 (MCT10) is also called Solute carrier family 16 member 10 (SLC16A10). In addition, human MCT10 is also called T-type amino acid transporter 1 (TAT1). MCT10 is a sodium-independent transporter that mediates the uptake or efflux of aromatic acids such as Phe, Tyr, and Trp, as well as L-3,4-di-hydroxy-phenylalanine. It is also a thyroid hormone transporter with preference for triiodothyronine (T3). MCT10 is expressed in intestine, kidney, liver, muscle, and placenta, and appears predominantly localized in the basolateral membrane. It belongs to the Monocarboxylate transporter (MCT) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17464); members share this curated model.
