identifier: CDD:cd18093
label: "SAM-dependent tRNA methylase related to TrmJ. tRNA methyltransferase TrmJ catalyzes the methyl transfer from S-adenosyl-L-methionine (AdoMet) to the 2'-OH at position 32 in both tRNASer1 and tRNAGln2. It is part of the SpoU family of MTases, a subfamily of the SPOUT methyltransferase superfamily. The SPOUT methyltransferase superfamily is a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot."
definition: >-
  SAM-dependent tRNA methylase related to TrmJ. tRNA methyltransferase TrmJ catalyzes the methyl transfer from S-adenosyl-L-methionine (AdoMet) to the 2'-OH at position 32 in both tRNASer1 and tRNAGln2. It is part of the SpoU family of MTases, a subfamily of the SPOUT methyltransferase superfamily. The SPOUT methyltransferase superfamily is a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot. — an NCBI CDD conserved domain (cd18093); members share this curated model.
