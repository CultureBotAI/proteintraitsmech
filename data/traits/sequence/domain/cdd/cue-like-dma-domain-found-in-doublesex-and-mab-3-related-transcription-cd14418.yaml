identifier: CDD:cd14418
label: CUE_DMA_DMRTA2
definition: >-
  CUE-like DMA domain found in doublesex- and mab-3-related transcription factor A2 (DMRTA2). DMRTA2, also called Doublesex- and mab-3-related transcription factor 5 (DMRT5), is encoded by gene DMRT2. In the zebrafish, DMRT2 is involved in somite development. DMRTA2 may act as an activator of cyclin-dependent kinase inhibitor 2C (cdkn2c) during spermatogenesis. It may also play significant roles in embryonic neurogenesis
