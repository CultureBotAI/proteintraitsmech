identifier: CDD:cd16934
label: "Histidine kinase-like ATPase domain of the anti sigma-B factor Bacillus subtilis serine/threonine-protein kinase RsbT, and related domains. This family includes the histidine kinase-like ATPase (HATPase) domain of Bacillus subtilis serine/threonine-protein kinase RsbT, a component of the stressosome signaling complex of Bacillus subtilis. The stressosome is formed from multiple copies of three proteins, a sensor protein RsbR, a scaffold protein RsbS, and RsbT, and responds to environmental changes by initiating a protein partner switching cascade. Stress perception increases the phosphorylation of RsbR and RsbS, by RsbT. Subsequent dissociation of RsbT from the stressosome activates the sigma-B cascade, leading to the release of the alternative sigma factor, sigma-B."
definition: >-
  Histidine kinase-like ATPase domain of the anti sigma-B factor Bacillus subtilis serine/threonine-protein kinase RsbT, and related domains. This family includes the histidine kinase-like ATPase (HATPase) domain of Bacillus subtilis serine/threonine-protein kinase RsbT, a component of the stressosome signaling complex of Bacillus subtilis. The stressosome is formed from multiple copies of three proteins, a sensor protein RsbR, a scaffold protein RsbS, and RsbT, and responds to environmental changes by initiating a protein partner switching cascade. Stress perception increases the phosphorylation of RsbR and RsbS, by RsbT. Subsequent dissociation of RsbT from the stressosome activates the sigma-B cascade, leading to the release of the alternative sigma factor, sigma-B. — an NCBI CDD conserved domain (cd16934); members share this curated model.
