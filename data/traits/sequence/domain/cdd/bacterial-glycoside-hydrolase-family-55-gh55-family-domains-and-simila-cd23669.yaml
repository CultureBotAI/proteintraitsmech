identifier: CDD:cd23669
label: GH55_SacteLam55A-like
definition: >-
  bacterial glycoside hydrolase family 55 (GH55) family domains and similar proteins. This family includes bacterial glycoside hydrolase family 55 (GH55) proteins, which contains both endo- (EC 3.2.1.39) and exo-beta-1,3-glucanases (EC 3.2.1.58), and hydrolyze beta-1,3-glucan bonds via inversion of stereochemistry at the anomeric carbon. Included in this family is Streptomyces sp. SirexAA-E (SacteLam55A), a secreted protein encoded by SACTE_4363. Structural studies reveal an extended substrate-binding cleft with six or more subsites for sugar binding formed at the interface of two right handed beta-helical domains. They also give insight into residues that enforce an exolytic reaction, interactions that potentially support a processive hydrolysis of the bound oligosaccharide, and the ability of the enzyme to accommodate substrates with beta-1,6 branching. Mutation studies support a critical glutamate as a catalytic acid and a proton relay network that activates water to serve as the catalytic base. Also included in this family are Saccharophagus degradans Gly5M, a novel protein identified as a beta-1,3-endoglucanase (EC 3.2.1.39) and bacterial beta-1,6-glucanase (EC 3.2.1.75) in GH5, and Corallococcus sp. strain EGB LamC, identified as a novel member of the GH16 family
