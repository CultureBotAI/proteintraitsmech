label: "lytic polysaccharide monooxygenase auxiliary activity protein. Many proteins in this superfamily are copper-dependent lytic polysaccharide monooxygenases (LPMOs) and include lytic polysaccharide monooxygenase auxiliary activity families 9 (AA9) and 10 (AA10). The substrate-binding surface of this family is a flat beta-sandwich fold."
