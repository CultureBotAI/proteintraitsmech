identifier: CDD:cd22721
label: "forkhead associated (FHA) domain found in Corynebacterium glutamicum oxoglutarate dehydrogenase inhibitor (OdhI) and similar proteins. OdhI is an essential component of the PknG signaling pathway. It regulates glutamate production under biotin non-limiting conditions. It can inhibit the activity of 2-oxoglutarate dehydrogenase only when it is unphosphorylated. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in Corynebacterium glutamicum oxoglutarate dehydrogenase inhibitor (OdhI) and similar proteins. OdhI is an essential component of the PknG signaling pathway. It regulates glutamate production under biotin non-limiting conditions. It can inhibit the activity of 2-oxoglutarate dehydrogenase only when it is unphosphorylated. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22721); members share this curated model.
