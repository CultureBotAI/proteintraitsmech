identifier: CDD:cd16568
label: "RING finger, HC subclass, found in Saccharomyces cerevisiae POB3/SPT16 histone-associated protein 1 (ScPSH1) and similar proteins. ScPSH1 is a Cse4-specific E3 ubiquitin ligase that interacts with the kinetochore protein Pat1 and targets the degradation of budding yeast centromeric histone H3 variant, CENP-ACse4, which is essential for faithful chromosome segregation. ScPSH1 contains a C3HC4-type RING-HC finger and a DNA directed RNA polymerase domain."
definition: >-
  RING finger, HC subclass, found in Saccharomyces cerevisiae POB3/SPT16 histone-associated protein 1 (ScPSH1) and similar proteins. ScPSH1 is a Cse4-specific E3 ubiquitin ligase that interacts with the kinetochore protein Pat1 and targets the degradation of budding yeast centromeric histone H3 variant, CENP-ACse4, which is essential for faithful chromosome segregation. ScPSH1 contains a C3HC4-type RING-HC finger and a DNA directed RNA polymerase domain. — an NCBI CDD conserved domain (cd16568); members share this curated model.
