identifier: CDD:cd16764
label: "RING finger, HC subclass, found in transcription inknown asiary factor 1-alpha (TIF1-alpha). TIF1-alpha, also known as tripartite motif-containing protein 24 (TRIM24), E3 ubiquitin-protein ligase TRIM24, or RING finger protein 82, belongs to the C-VI subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a plant homeodomain (PHD), and a bromodomain (Bromo) positioned C-terminal to the RBCC domain. It interacts specifically and in a ligand-dependent manner with the ligand binding domain (LBD) of several nuclear receptors (NRs), including retinoid X (RXR), retinoic acid (RAR), vitamin D3 (VDR), estrogen (ER), and progesterone (PR) receptors. It also associates with heterochromatin-associated factors HP1alpha, MOD1 (HP1beta), and MOD2 (HP1gamma), as well as the vertebrate Kruppel-type (C2H2) zinc finger proteins that contain the transcriptional silencing domain KRAB. TIF1-alpha is a ligand-dependent co-repressor of RAR that interacts with multiple nuclear receptors in vitro via an LXXLL motif and further acts as a gatekeeper of liver carcinogenesis. It also functions as an E3-ubiquitin ligase targeting p53, and is broadly associated with chromatin silencing. Moreover, it is a chromatin regulator that recognizes specific, combinatorial histone modifications through its C-terminal PHD-Bromo region. In addition, it interacts with chromatin and estrogen receptor to activate estrogen-dependent genes associated with cellular proliferation and tumor development."
