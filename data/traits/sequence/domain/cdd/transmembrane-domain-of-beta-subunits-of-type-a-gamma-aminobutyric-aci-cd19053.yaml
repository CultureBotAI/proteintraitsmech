identifier: CDD:cd19053
label: "transmembrane domain of beta subunits of type-A gamma-aminobutyric acid receptor (GABAAR). This family contains transmembrane (TM) domain of the beta subunit of type-A beta-aminobutyric acid receptor (GABAAR), which includes beta1-beta4 in vertebrates. The transmembrane region consists of four transmembrane-spanning alpha-helical segments (M1-M4) that are linked by loops. The intracellular loop that links M1 and M2 determines the ion selectivity of the channel. GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. Mutations or genetic variations of the genes encoding beta2 (GABRB2) and beta3 (GABRB3) have been associated with human epilepsy, both with and without febrile seizures. Mutations in GABRB2, and GABRB3 have been associated with infantile spasms and Lennox-Gastaut syndrome. A de novo missense mutation of GABRB2 causes early myoclonic encephalopathy, a disease with a devastating prognosis, characterized by neonatal onset of seizures. Another de novo heterozygous missense variant in exon 4 of GABRB2 is associated with intellectual disability and epilepsy. Mutations in the GABRB1 gene encoding beta1 promote alcohol consumption through increased tonic inhibition."
definition: >-
  transmembrane domain of beta subunits of type-A gamma-aminobutyric acid receptor (GABAAR). This family contains transmembrane (TM) domain of the beta subunit of type-A beta-aminobutyric acid receptor (GABAAR), which includes beta1-beta4 in vertebrates. The transmembrane region consists of four transmembrane-spanning alpha-helical segments (M1-M4) that are linked by loops. The intracellular loop that links M1 and M2 determines the ion selectivity of the channel. GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. Mutations or genetic variations of the genes encoding beta2 (GABRB2) and beta3 (GABRB3) have been associated with human epilepsy, both with and without febrile seizures. Mutations in GABRB2, and GABRB3 have been associated with infantile spasms and Lennox-Gastaut syndrome. A de novo missense mutation of GABRB2 causes early myoclonic encephalopathy, a disease with a devastating prognosis, characterized by neonatal onset of seizures. Another de novo heterozygous missense variant in exon 4 of GABRB2 is associated with intellectual disability and epilepsy. Mutations in the GABRB1 gene encoding beta1 promote alcohol consumption through increased tonic inhibition. — an NCBI CDD conserved domain (cd19053); members share this curated model.
