identifier: CDD:cd08157
label: "Fungal catalases similar to yeast catalases A and T. Catalase is a ubiquitous enzyme found in both prokaryotes and eukaryotes, which is involved in the protection of cells from the toxic effects of peroxides. It catalyzes the conversion of hydrogen peroxide to water and molecular oxygen. Catalases also utilize hydrogen peroxide to oxidize various substrates such as alcohol or phenols. This family of fungal catalases has a relatively small subunit size, and binds a protoheme IX (heme b) group buried deep inside the structure. Fungal catalases also bind NADPH as a second redox-active cofactor. They form tetramers; in eukaryotic cells, catalases are typically located in peroxisomes. Saccharomyces cerevisiae catalase T is found in the cytoplasm, though."
definition: >-
  Fungal catalases similar to yeast catalases A and T. Catalase is a ubiquitous enzyme found in both prokaryotes and eukaryotes, which is involved in the protection of cells from the toxic effects of peroxides. It catalyzes the conversion of hydrogen peroxide to water and molecular oxygen. Catalases also utilize hydrogen peroxide to oxidize various substrates such as alcohol or phenols. This family of fungal catalases has a relatively small subunit size, and binds a protoheme IX (heme b) group buried deep inside the structure. Fungal catalases also bind NADPH as a second redox-active cofactor. They form tetramers; in eukaryotic cells, catalases are typically located in peroxisomes. Saccharomyces cerevisiae catalase T is found in the cytoplasm, though. — an NCBI CDD conserved domain (cd08157); members share this curated model.
