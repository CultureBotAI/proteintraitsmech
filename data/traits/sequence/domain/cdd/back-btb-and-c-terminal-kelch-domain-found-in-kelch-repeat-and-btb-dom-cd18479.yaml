identifier: CDD:cd18479
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch repeat and BTB domain-containing protein 2 (KBTBD2). KBTBD2, also called BTB and kelch domain-containing protein 1 (BKLHD1), plays an essential role in the regulating the insulin-signaling pathway. It is a BTB-Kelch family substrate recognition subunit of the Cullin-3-based E3 ubiquitin ligase, which targets p85alpha, the regulatory subunit of the phosphoinositol-3-kinase (PI3K) heterodimer, causing p85alpha ubiquitination and proteasome-mediated degradation."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch repeat and BTB domain-containing protein 2 (KBTBD2). KBTBD2, also called BTB and kelch domain-containing protein 1 (BKLHD1), plays an essential role in the regulating the insulin-signaling pathway. It is a BTB-Kelch family substrate recognition subunit of the Cullin-3-based E3 ubiquitin ligase, which targets p85alpha, the regulatory subunit of the phosphoinositol-3-kinase (PI3K) heterodimer, causing p85alpha ubiquitination and proteasome-mediated degradation. — an NCBI CDD conserved domain (cd18479); members share this curated model.
