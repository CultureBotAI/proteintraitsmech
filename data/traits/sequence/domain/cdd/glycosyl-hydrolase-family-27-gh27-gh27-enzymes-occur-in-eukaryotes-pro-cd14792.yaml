identifier: CDD:cd14792
label: "glycosyl hydrolase family 27 (GH27). GH27 enzymes occur in eukaryotes, prokaryotes, and archaea with a wide range of hydrolytic activities, including alpha-glucosidase (glucoamylase and sucrase-isomaltase), alpha-N-acetylgalactosaminidase, and 3-alpha-isomalto-dextranase. All GH27 enzymes cleave a terminal carbohydrate moiety from a substrate that varies considerably in size, depending on the enzyme, and may be either a starch or a glycoprotein. GH27 members are retaining enzymes that cleave their substrates via an acid/base-catalyzed, double-displacement mechanism involving a covalent glycosyl-enzyme intermediate. Two aspartic acid residues have been identified as the catalytic nucleophile and the acid/base, respectively."
definition: >-
