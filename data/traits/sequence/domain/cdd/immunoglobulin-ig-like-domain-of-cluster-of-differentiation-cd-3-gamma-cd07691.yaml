identifier: CDD:cd07691
label: "Immunoglobulin (Ig)-like domain of Cluster of Differentiation (CD) 3 gamma and delta chains; member of the C1-set of IgSF domains. The members here are composed of immunoglobulin (Ig)-like domain of Cluster of Differentiation (CD) 3 gamma and delta chains. CD3 is a T cell surface receptor that is associated with alpha/beta T cell receptors (TCRs). The CD3 complex consists of one gamma, one delta, two epsilon, and two zeta chains. The CD3 subunits form heterodimers as gamma/epsilon, delta/epsilon, and zeta/zeta. The gamma, delta, and epsilon chains each contain an extracellular Ig domain, whereas the extracellular domains of the zeta chains are very small and have unknown structure. The CD3 domain participates in intracellular signaling once the TCR has bound an MHC/antigen complex."
definition: >-
  Immunoglobulin (Ig)-like domain of Cluster of Differentiation (CD) 3 gamma and delta chains; member of the C1-set of IgSF domains. The members here are composed of immunoglobulin (Ig)-like domain of Cluster of Differentiation (CD) 3 gamma and delta chains. CD3 is a T cell surface receptor that is associated with alpha/beta T cell receptors (TCRs). The CD3 complex consists of one gamma, one delta, two epsilon, and two zeta chains. The CD3 subunits form heterodimers as gamma/epsilon, delta/epsilon, and zeta/zeta. The gamma, delta, and epsilon chains each contain an extracellular Ig domain, whereas the extracellular domains of the zeta chains are very small and have unknown structure. The CD3 domain participates in intracellular signaling once the TCR has bound an MHC/antigen complex. — an NCBI CDD conserved domain (cd07691); members share this curated model.
