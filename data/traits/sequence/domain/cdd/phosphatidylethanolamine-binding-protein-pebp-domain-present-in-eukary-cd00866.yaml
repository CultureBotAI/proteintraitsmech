identifier: CDD:cd00866
label: "PhosphatidylEthanolamine-Binding Protein (PEBP) domain present in eukaryotes. PhosphatidylEthanolamine-Binding Proteins (PEBPs) are represented in all three major phylogenetic divisions (eukaryotes, bacteria, archaea).  The members in this subgroup are present in eukaryotes.  Members here include those in plants such as Arabidopsis thaliana FLOWERING LOCUS (FT) and TERMINAL FLOWER1 (FT1) which function as a promoter and a repressor of the floral transitions, respectively as well as the mammalian Raf kinase inhibitory protein (RKIP) which inhibits MAP kinase (Raf-MEK-ERK), G protein-coupled receptor (GPCR) kinase and NFkappaB signaling cascades. Although their overall structures are similar, the members of the PEBP family have very different substrates and oligomerization states (monomer/dimer/tetramer)."
definition: >-
  PhosphatidylEthanolamine-Binding Protein (PEBP) domain present in eukaryotes. PhosphatidylEthanolamine-Binding Proteins (PEBPs) are represented in all three major phylogenetic divisions (eukaryotes, bacteria, archaea). The members in this subgroup are present in eukaryotes. Members here include those in plants such as Arabidopsis thaliana FLOWERING LOCUS (FT) and TERMINAL FLOWER1 (FT1) which function as a promoter and a repressor of the floral transitions, respectively as well as the mammalian Raf kinase inhibitory protein (RKIP) which inhibits MAP kinase (Raf-MEK-ERK), G protein-coupled receptor (GPCR) kinase and NFkappaB signaling cascades. Although their overall structures are similar, the members of the PEBP family have very different substrates and oligomerization states (monomer/dimer/tetramer). — an NCBI CDD conserved domain (cd00866); members share this curated model.
