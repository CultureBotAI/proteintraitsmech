identifier: CDD:cd21995
label: "high mobility group (HMG)-box found in the TOX high mobility group box family. The TOX family includes four members: TOX, TOX2, TOX3 and TOX4. TOX, also called thymus high mobility group box protein TOX, is a transcriptional regulator with a major role in neural stem cell commitment and corticogenesis as well as in lymphoid cell development and lymphoid tissue organogenesis. It binds to GC-rich DNA sequences in the proximity of transcription start sites and may alter chromatin structure, modifying access of transcription factors to DNA. TOX2, also called granulosa cell HMG box protein 1 (GCX-1), is a putative transcriptional activator involved in the hypothalamic-pituitary-gonadal system. TOX3, also called CAG trinucleotide repeat-containing gene F9 protein (CAGF9), or trinucleotide repeat-containing gene 9 protein (TNRC9), is a transcriptional coactivator of the p300/CBP-mediated transcription complex. It activates transactivation through cAMP response element (CRE) sites. It protects against cell death by inducing anti-apoptotic and repressing pro-apoptotic transcripts. TOX4, also called epidermal Langerhans cell protein LCP1, is a component of the PTW/PP1 phosphatase complex, which plays a role in the control of chromatin structure and cell cycle progression during the transition from mitosis into interphase. All family members contain one HMG-box domain."
definition: >-
  high mobility group (HMG)-box found in the TOX high mobility group box family. The TOX family includes four members: TOX, TOX2, TOX3 and TOX4. TOX, also called thymus high mobility group box protein TOX, is a transcriptional regulator with a major role in neural stem cell commitment and corticogenesis as well as in lymphoid cell development and lymphoid tissue organogenesis. It binds to GC-rich DNA sequences in the proximity of transcription start sites and may alter chromatin structure, modifying access of transcription factors to DNA. TOX2, also called granulosa cell HMG box protein 1 (GCX-1), is a putative transcriptional activator involved in the hypothalamic-pituitary-gonadal system. TOX3, also called CAG trinucleotide repeat-containing gene F9 protein (CAGF9), or trinucleotide repeat-containing gene 9 protein (TNRC9), is a transcriptional coactivator of the p300/CBP-mediated transcription complex. It activates transactivation through cAMP response element (CRE) sites. It protects against cell death by inducing anti-apoptotic and repressing pro-apoptotic transcripts. TOX4, also called epidermal Langerhans cell protein LCP1, is a component of the PTW/PP1 phosphatase complex, which plays a role in the control of chromatin structure and cell cycle progression during the transition from mitosis into interphase. All family members contain one HMG-box domain. — an NCBI CDD conserved domain (cd21995); members share this curated model.
