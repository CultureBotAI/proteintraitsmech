identifier: CDD:cd16889
label: "chitinase-like domain. This family includes proteins such as chitinases, chitosanase, pesticin, and endolysin, which are involved in the degradation of 1,4-N-acetyl D-glucosamine linkages in chitin polymers and related activities. Chitinases are enzymes that catalyze the hydrolysis of the beta-1,4-N-acetyl-D-glucosamine linkages in chitin polymers. Chitosanase enzymes hydrolyze chitosan, a biopolymer of beta (1,4)-linked-D-glucosamine (GlcN) residues produced by partial or full deacetylation of chitin. Pesticin (Pst) is a anti-bacterial toxin produced by Yersinia pestis that acts through uptake by the target related bacteria and the hydrolysis of peptidoglycan in the periplasm. The dsDNA phages of eubacteria use endolysins or muralytic enzymes in conjunction with hollin, a small membrane protein, to degrade the peptidoglycan found in bacterial cell walls. Similarly, bacteria produce autolysins to facilitate the biosynthesis of its cell wall heteropolymer peptidoglycan and cell division."
definition: >-
  chitinase-like domain. This family includes proteins such as chitinases, chitosanase, pesticin, and endolysin, which are involved in the degradation of 1,4-N-acetyl D-glucosamine linkages in chitin polymers and related activities. Chitinases are enzymes that catalyze the hydrolysis of the beta-1,4-N-acetyl-D-glucosamine linkages in chitin polymers. Chitosanase enzymes hydrolyze chitosan, a biopolymer of beta (1,4)-linked-D-glucosamine (GlcN) residues produced by partial or full deacetylation of chitin. Pesticin (Pst) is a anti-bacterial toxin produced by Yersinia pestis that acts through uptake by the target related bacteria and the hydrolysis of peptidoglycan in the periplasm. The dsDNA phages of eubacteria use endolysins or muralytic enzymes in conjunction with hollin, a small membrane protein, to degrade the peptidoglycan found in bacterial cell walls. Similarly, bacteria produce autolysins to facilitate the biosynthesis of its cell wall heteropolymer peptidoglycan and cell division. — an NCBI CDD conserved domain (cd16889); members share this curated model.
