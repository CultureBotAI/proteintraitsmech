identifier: CDD:cd11418
label: "basic helix-loop-helix (bHLH) domain found in achaete-scute complex-like (ASCL) family. The achaete-scute complex-like (ASCL, also known as achaete-scute complex homolog or ASH) family of bHLH transcription factors, ASCL1-5, have been implicated in cell fate specification and differentiation.  They are critical for proper development of the nervous system. The deregulation of ASCL plays a key role in psychiatric and neurological disorders.  ASCL-1, also termed Class A basic helix-loop-helix protein 46 (bHLHa46), or achaete-scute homolog 1 (ASH-1), or mammalian achaete-scute homolog 1 (Mash1), is a neural-specific bHLH transcription factor that is expressed in subsets of neural progenitors in both the central and peripheral nervous system. It plays a key role in neuronal differentiation and specification in the nervous system. ASCL-2, also termed achaete-scute homolog 2 (ASH-2), or Class A basic helix-loop-helix protein 45 (bHLHa45), or mammalian achaete-scute homolog 2 (Mash2), is a bHLH transcription factor that is involved in Schwann cell differentiation and control of proliferation in adult peripheral nerves. ASCL-3, also termed Class A basic helix-loop-helix protein 42 (bHLHa42), or bHLH transcriptional regulator Sgn-1, or achaete-scute homolog 3 (ASH-3), is a bHLH transcription factor specifically localized in the duct cells of the salivary glands. It may act as transcriptional repressor that inhibits myogenesis. The family also includes Drosophila melanogaster achaete-scute complex (AS-C) proteins, which consists of lethal of scute (also known as achaete-scute complex protein T3 or AST3), scute (also known as achaete-scute complex protein T4 or AST4), achaete (also known as achaete-scute complex protein T5 or AST5), and asense (also known as achaete-scute complex protein T8 or AST8). They are involved in the determination of the neuronal precursors in the peripheral nervous system and the central nervous system, as well as in sex determination and dosage compensation."
definition: >-
  basic helix-loop-helix (bHLH) domain found in achaete-scute complex-like (ASCL) family. The achaete-scute complex-like (ASCL, also known as achaete-scute complex homolog or ASH) family of bHLH transcription factors, ASCL1-5, have been implicated in cell fate specification and differentiation. They are critical for proper development of the nervous system. The deregulation of ASCL plays a key role in psychiatric and neurological disorders. ASCL-1, also termed Class A basic helix-loop-helix protein 46 (bHLHa46), or achaete-scute homolog 1 (ASH-1), or mammalian achaete-scute homolog 1 (Mash1), is a neural-specific bHLH transcription factor that is expressed in subsets of neural progenitors in both the central and peripheral nervous system. It plays a key role in neuronal differentiation and specification in the nervous system. ASCL-2, also termed achaete-scute homolog 2 (ASH-2), or Class A basic helix-loop-helix protein 45 (bHLHa45), or mammalian achaete-scute homolog 2 (Mash2), is a bHLH transcription factor that is involved in Schwann cell differentiation and control of proliferation in adult peripheral nerves. ASCL-3, also termed Class A basic helix-loop-helix protein 42 (bHLHa42), or bHLH transcriptional regulator Sgn-1, or achaete-scute homolog 3 (ASH-3), is a bHLH transcription factor specifically localized in the duct cells of the salivary glands. It may act as transcriptional repressor that inhibits myogenesis. The family also includes Drosophila melanogaster achaete-scute complex (AS-C) proteins, which consists of lethal of scute (also known as achaete-scute complex protein T3 or AST3), scute (also known as achaete-scute complex protein T4 or AST4), achaete (also known as achaete-scute complex protein T5 or AST5), and asense (also known as achaete-scute complex protein T8 or AST8). They are involved in the determination of the neuronal precursors in the peripheral nervous system and the central nervous system, as well as in sex determination and dosage compensation. — an NCBI CDD conserved domain (cd11418); members share this curated model.
