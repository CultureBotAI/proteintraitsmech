  Putative catalytic domain, repeat 1, of Escherichia coli uncharacterized protein ymdC and similar proteins. Putative catalytic domain, repeat 1, of Escherichia coli uncharacterized protein ymdC and similar proteins. In Escherichia coli, there are two genes, f413 (ybhO) and o493 (ymdC), which are homologous to gene cls that encodes the Escherichia coli cardiolipin (CL) synthase. The prototype of this subfamily is an uncharacterized protein ymdC specified by the o493 (ymdC) gene. Although the functional characterization of ymdC and similar proteins remains unknown, members of this subfamily show high sequence homology to bacterial CL synthases, which catalyze the reversible phosphatidyl group transfer between two phosphatidylglycerol molecules to form CL and glycerol. Moreover, ymdC and its similar proteins contain two HKD motifs (H-x-K-x(4)-D, where x represents any amino acid residue) that characteriszes the phospholipase D (PLD) superfamily. The two motifs may be part of the active site and may be involved in phosphatidyl group transfer. — an NCBI CDD conserved domain (cd09111); members share this curated model.
