identifier: CDD:cd21431
label: "Mediator complex subunit 9 (Med9) C-terminal domain family. Med9 is a member of the Middle module transcriptional mediator complex which has a species-specific amino-terminal and a well-conserved carboxy-terminal half. Med9 carboxy-terminal has a fundamental function involved in direct binding to other Med proteins and the assembly of Med9 into the Middle module. Med9 amino terminal plays a regulatory role in transcriptional regulation. Mediator co-activator complex plays an essential role in regulation of RNA polymerase II transcription in all eukaryotes."
definition: >-
  Mediator complex subunit 9 (Med9) C-terminal domain family. Med9 is a member of the Middle module transcriptional mediator complex which has a species-specific amino-terminal and a well-conserved carboxy-terminal half. Med9 carboxy-terminal has a fundamental function involved in direct binding to other Med proteins and the assembly of Med9 into the Middle module. Med9 amino terminal plays a regulatory role in transcriptional regulation. Mediator co-activator complex plays an essential role in regulation of RNA polymerase II transcription in all eukaryotes. — an NCBI CDD conserved domain (cd21431); members share this curated model.
