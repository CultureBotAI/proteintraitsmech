identifier: CDD:cd19807
label: "B-box-type 1 zinc finger found in tripartite motif-containing proteins, TRIM36, TRIM46 and similar proteins. The family includes tripartite motif-containing proteins, TRIM36 and TRIM46, both of which belong to the C-I subclass of TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a RING finger, Bbox1 and Bbox2, and a coiled coil region, as well as a COS (carboxyl-terminal subgroup one signature) box, a fibronectin type III (FN3) domain, and a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain. The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif. TRIM36, the human ortholog of mouse Haprin, also known as RING finger protein 98 (RNF98) or zinc-binding protein Rbcc728, is an E3 ubiquitin-protein ligase expressed in the germ plasm. It has been implicated in acrosome reaction, fertilization, and embryogenesis, as well as in carcinogenesis. TRIM36 functions upstream of Wnt/beta-catenin activation, and plays a role in controlling the stability of proteins regulating microtubule polymerization during cortical rotation, and subsequent dorsal axis formation. It is also potentially associated with chromosome segregation by interacting with the kinetochore protein centromere protein-H (CENP-H), and colocalizing with the microtubule protein alpha-tubulin. Its overexpression may cause chromosomal instability and carcinogenesis. It is, thus, a novel regulator affecting cell cycle progression. Moreover, TRIM36 plays a critical role in the arrangement of somites during embryogenesis. TRIM46, also known as gene Y protein (GeneY) or tripartite, fibronectin type-III and C-terminal SPRY motif protein (TRIFIC), is a microtubule-associated protein that specifically localizes to the proximal axon, partly overlaps with the axon initial segment (AIS) at later stages, and organizes uniform microtubule orientation in axons. It controls neuronal polarity and axon specification by driving the formation of parallel microtubule arrays."
definition: >-
  B-box-type 1 zinc finger found in tripartite motif-containing proteins, TRIM36, TRIM46 and similar proteins. The family includes tripartite motif-containing proteins, TRIM36 and TRIM46, both of which belong to the C-I subclass of TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a RING finger, Bbox1 and Bbox2, and a coiled coil region, as well as a COS (carboxyl-terminal subgroup one signature) box, a fibronectin type III (FN3) domain, and a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain. The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif. TRIM36, the human ortholog of mouse Haprin, also known as RING finger protein 98 (RNF98) or zinc-binding protein Rbcc728, is an E3 ubiquitin-protein ligase expressed in the germ plasm. It has been implicated in acrosome reaction, fertilization, and embryogenesis, as well as in carcinogenesis. TRIM36 functions upstream of Wnt/beta-catenin activation, and plays a role in controlling the stability of proteins regulating microtubule polymerization during cortical rotation, and subsequent dorsal axis formation. It is also potentially associated with chromosome segregation by interacting with the kinetochore protein centromere protein-H (CENP-H), and colocalizing with the microtubule protein alpha-tubulin. Its overexpression may cause chromosomal instability and carcinogenesis. It is, thus, a novel regulator affecting cell cycle progression. Moreover, TRIM36 plays a critical role in the arrangement of somites during embryogenesis. TRIM46, also known as gene Y protein (GeneY) or tripartite, fibronectin type-III and C-terminal SPRY motif protein (TRIFIC), is a microtubule-associated protein that specifically localizes to the proximal axon, partly overlaps with the axon initial segment (AIS) at later stages, and organizes uniform microtubule orientation in axons. It controls neuronal polarity and axon specification by driving the formation of parallel microtubule arrays. — an NCBI CDD conserved domain (cd19807); members share this curated model.
