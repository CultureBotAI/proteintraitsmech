identifier: CDD:cd21421
label: FLASH_cc
definition: >-
  N-terminal coiled-coil domain of FLICE-associated huge protein (FLASH) family. FLASH, also called CASP8-associated protein 2, is required to regulate the proteolytic cascade that ends in the death of the cell. It participates in TNF-alpha-induced blockade of glucocorticoid receptor (GR) transactivation at the nuclear receptor coactivator level, upstream and independently of NF-kappa-B. FLASH also plays an essential role in histone gene transcription and progression through S phase. The model corresponds to FLASH N-terminal coiled-coil domain, which may mediate functionally important protein-protein interactions
