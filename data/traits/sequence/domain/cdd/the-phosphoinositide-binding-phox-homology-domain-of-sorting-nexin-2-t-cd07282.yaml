identifier: CDD:cd07282
label: "The phosphoinositide binding Phox Homology domain of Sorting Nexin 2. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions. Sorting nexins (SNXs) make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway. SNX2 is a component of the retromer complex, a membrane coat multimeric complex required for endosomal retrieval of lysosomal hydrolase receptors to the Golgi. The retromer consists of a cargo-recognition subcomplex and a subcomplex formed by a dimer of sorting nexins (SNX1 and/or SNX2), which ensures efficient cargo sorting by facilitating proper membrane localization of the cargo-recognition subcomplex. Similar to SNX1, SNX2 contains a Bin/Amphiphysin/Rvs (BAR) domain, which detects membrane curvature, C-terminal to the PX domain. The PX domain of SNX2 preferentially binds phosphatidylinositol-3-phosphate (PI3P), but not PI(3,4,5)P3. Studies on mice deficient with SNX1 and/or SNX2 suggest that they provide an essential function in embryogenesis and are functionally redundant."
definition: >-
  The phosphoinositide binding Phox Homology domain of Sorting Nexin 2. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions. Sorting nexins (SNXs) make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway. SNX2 is a component of the retromer complex, a membrane coat multimeric complex required for endosomal retrieval of lysosomal hydrolase receptors to the Golgi. The retromer consists of a cargo-recognition subcomplex and a subcomplex formed by a dimer of sorting nexins (SNX1 and/or SNX2), which ensures efficient cargo sorting by facilitating proper membrane localization of the cargo-recognition subcomplex. Similar to SNX1, SNX2 contains a Bin/Amphiphysin/Rvs (BAR) domain, which detects membrane curvature, C-terminal to the PX domain. The PX domain of SNX2 preferentially binds phosphatidylinositol-3-phosphate (PI3P), but not PI(3,4,5)P3. Studies on mice deficient with SNX1 and/or SNX2 suggest that they provide an essential function in embryogenesis and are functionally redundant. — an NCBI CDD conserved domain (cd07282); members share this curated model.
