identifier: CDD:cd23670
label: "C-terminal region of mitochondrial 3' processome (MPsome) subunit 1. MPSS1 is a subunit of the mitochondrial 3' processome (MPsome) which is involved in 3'-5' trimming of messenger RNA (mRNA) precursors, in U-tailing of ribosomal RNA (rRNA) and some mRNAs, and in 3'-5' trimming and U-tailing of guide RNAs (gRNAs), during kinetoplast RNA processing. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode gRNAs involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species. MPsome subunits include KDSS1 3'-5' exonuclease, RET1 terminal uridyltransferase (TUTase), and several subunits of as yet undefined functions (MPSS1-MPSS6). The maxicircle and minicircle RNAs are transcribed as 3' extended precursors and processed by MPsome-dependent 3'-5' degradation, and in the case of rRNAs and gRNAs, also 3' uridylated. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. 12 of the 18 maxicircle genes are present as cryptogenes whose transcripts require U-insertion/deletion editing, mediated by gRNAs, to restore a protein-coding capacity. The MPsome catalyzes the primary uridylation of about 800 nt gRNA precursor transcripts, their processive degradation to a mature size of 40-60 nt, and secondary U-tail addition. This domain model spans the C-terminal region of MPSS1 and related proteins. MPSS1 is predicted (AlphaFold) to be a predominantly alpha helical protein with a C-terminal region containing helical hairpin motifs that structurally resemble HEAT repeats."
definition: >-
  C-terminal region of mitochondrial 3' processome (MPsome) subunit 1. MPSS1 is a subunit of the mitochondrial 3' processome (MPsome) which is involved in 3'-5' trimming of messenger RNA (mRNA) precursors, in U-tailing of ribosomal RNA (rRNA) and some mRNAs, and in 3'-5' trimming and U-tailing of guide RNAs (gRNAs), during kinetoplast RNA processing. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode gRNAs involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species. MPsome subunits include KDSS1 3'-5' exonuclease, RET1 terminal uridyltransferase (TUTase), and several subunits of as yet undefined functions (MPSS1-MPSS6). The maxicircle and minicircle RNAs are transcribed as 3' extended precursors and processed by MPsome-dependent 3'-5' degradation, and in the case of rRNAs and gRNAs, also 3' uridylated. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. 12 of the 18 maxicircle genes are present as cryptogenes whose transcripts require U-insertion/deletion editing, mediated by gRNAs, to restore a protein-coding capacity. The MPsome catalyzes the primary uridylation of about 800 nt gRNA precursor transcripts, their processive degradation to a mature size of 40-60 nt, and secondary U-tail addition. This domain model spans the C-terminal region of MPSS1 and related proteins. MPSS1 is predicted (AlphaFold) to be a predominantly alpha helical protein with a C-terminal region containing helical hairpin motifs that structurally resemble HEAT repeats. — an NCBI CDD conserved domain (cd23670); members share this curated model.
