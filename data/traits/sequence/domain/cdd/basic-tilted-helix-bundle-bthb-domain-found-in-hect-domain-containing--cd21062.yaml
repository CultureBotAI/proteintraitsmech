identifier: CDD:cd21062
label: "basic tilted helix bundle (BTHB) domain found in HECT domain-containing protein 1 (HectD1) and similar proteins. HectD1, also called E3 ligase for inhibin receptor (EULIR), is a Hect-type E3 ubiquitin transferase which accepts ubiquitin from an E2 ubiquitin-conjugating enzyme in the form of a thioester and then directly transfers the ubiquitin to targeted substrates. HectD1 is required for development of head mesenchyme and neural tube closure."
definition: >-
  basic tilted helix bundle (BTHB) domain found in HECT domain-containing protein 1 (HectD1) and similar proteins. HectD1, also called E3 ligase for inhibin receptor (EULIR), is a Hect-type E3 ubiquitin transferase which accepts ubiquitin from an E2 ubiquitin-conjugating enzyme in the form of a thioester and then directly transfers the ubiquitin to targeted substrates. HectD1 is required for development of head mesenchyme and neural tube closure. — an NCBI CDD conserved domain (cd21062); members share this curated model.
