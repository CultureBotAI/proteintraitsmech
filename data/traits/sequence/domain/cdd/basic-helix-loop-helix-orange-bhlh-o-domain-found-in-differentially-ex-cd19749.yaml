identifier: CDD:cd19749
label: "basic helix-loop-helix-orange (bHLH-O) domain found in differentially expressed in chondrocytes protein 1 (DEC1) and similar proteins. DEC1, also termed Class E basic helix-loop-helix protein 40 (bHLHe40), or Class B basic helix-loop-helix protein 2 (bHLHb2), or enhancer-of-split and hairy-related protein 2 (SHARP-2), or stimulated by retinoic acid gene 13 protein (STRA13), is a bHLH-O transcriptional repressor involved in the regulation of the circadian rhythm by negatively regulating the activity of the clock genes and clock-controlled genes."
definition: >-
  basic helix-loop-helix-orange (bHLH-O) domain found in differentially expressed in chondrocytes protein 1 (DEC1) and similar proteins. DEC1, also termed Class E basic helix-loop-helix protein 40 (bHLHe40), or Class B basic helix-loop-helix protein 2 (bHLHb2), or enhancer-of-split and hairy-related protein 2 (SHARP-2), or stimulated by retinoic acid gene 13 protein (STRA13), is a bHLH-O transcriptional repressor involved in the regulation of the circadian rhythm by negatively regulating the activity of the clock genes and clock-controlled genes. — an NCBI CDD conserved domain (cd19749); members share this curated model.
