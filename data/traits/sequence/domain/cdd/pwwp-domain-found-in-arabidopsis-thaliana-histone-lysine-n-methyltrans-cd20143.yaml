identifier: CDD:cd20143
label: "PWWP domain found in Arabidopsis thaliana histone-lysine N-methyltransferase trithorax-like protein ATX3, ATX4, ATX5, and similar proteins. The family includes A. thaliana ATX3 (also called protein SET domain group 14, or trithorax-homolog protein 3), ATX4 (also called protein SET domain group 16, or trithorax-homolog protein 4) and ATX5 (also called protein SET domain group 29, or trithorax-homolog protein 5), which belong to the histone-lysine methyltransferase family. They show distinct phylogenetic origins from the family of ATX1 and ATX2. They are multi-domain containing protein that consists of an N-terminal PWWP domain, a canonical plant homeodomain (PHD) domain, a non-canonical extended PHD (ePHD) domain, and a C-terminal SET domain. The PWWP domain specifically recognizes DNA and histone methylated lysines."
definition: >-
