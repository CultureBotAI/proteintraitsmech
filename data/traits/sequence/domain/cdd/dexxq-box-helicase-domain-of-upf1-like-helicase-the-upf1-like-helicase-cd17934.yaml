identifier: CDD:cd17934
label: "DEXXQ-box helicase domain of Upf1-like helicase. The Upf1-like helicase family includes UPF1, HELZ, Mov10L1, Aquarius, IGHMBP2 (SMUBP2), coronavirus Nsp13, and similar proteins. They belong to the  DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXXQ-box helicase domain of Upf1-like helicase. The Upf1-like helicase family includes UPF1, HELZ, Mov10L1, Aquarius, IGHMBP2 (SMUBP2), coronavirus Nsp13, and similar proteins. They belong to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17934); members share this curated model.
