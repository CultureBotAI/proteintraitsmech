identifier: CDD:cd06768
label: "PDZ domains of the Na+/H+ exchange regulatory cofactor (NHERF) family (NHERF1-4), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of the Na+/H+ exchange regulatory cofactor (NHERF) family of multi-PDZ-domain-containing scaffolding proteins (NHERF1-4), and related domains. The NHERF family includes NHERF1 (also known as EBP50), NHERF2 (also known as E3KARP; TKA-1; SIP-1), NHERF3 (also known as CAP70; CLAMP; Napi-Cap-1; PDZD1) and NHERF4 (also known as IKEPP; PDZK2; Napi-Cap-2). NHERF1 and NHERF2 have tandem PDZ domains (PDZ1-2); NHERF3 and NHERF4 have four PDZ domains (PDZ1-4). NHERFs are involved in the regulation of multiple receptors or transporters, such as type II sodium-phosphate cotransporter (Npt2a), purinergic P2Y1 receptor P2Y1R, the beta2-adrenergic receptor (beta2-AR), parathyroid hormone receptor type 1 (PTHR), the lysophosphatidic acid receptors (LPARs), sodium-hydrogen exchanger 3 (NHE3), and cystic fibrosis transmembrane conductance regulator (CFTR). NHERF-PDZ1 domain interaction partners include Npt2a, purinergic P2Y1 receptor, beta2-AR, CFTR, PTHR, NH3, G-protein-coupled receptor kinase 6 (GRK6A), platelet-derived growth factor receptor (PDGFR), B1 subunit of the H+ATPase, cholesterol, receptor for activated C-kinase RACK1, aquaporin 9, among others. The NHERF PDZ2 domain interacts with fewer proteins: NHERF1 PDZ2 binds Npt2a, PTHR, beta-catenin, aquaporin 9, and RACK1; NHERF2 PDZ2 binds LPA2, P2Y1R, and NHE3, cGMP-dependent protein kinase type II (cGKII). NHERF4 PDZ1 and PDZ4 bind the epithelial Ca(2+) channels TRPV5 and TRPV6. NHERF2/NHERF3 heterodimerization is mediated by PDZ domains of NHERF2 and the C-terminal PDZ domain recognition motif of NHERF3. NHERF4 regulates several transporters mediating influx of xenobiotics and nutrients in the small intestine. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This NHERF-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  PDZ domains of the Na+/H+ exchange regulatory cofactor (NHERF) family (NHERF1-4), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of the Na+/H+ exchange regulatory cofactor (NHERF) family of multi-PDZ-domain-containing scaffolding proteins (NHERF1-4), and related domains. The NHERF family includes NHERF1 (also known as EBP50), NHERF2 (also known as E3KARP; TKA-1; SIP-1), NHERF3 (also known as CAP70; CLAMP; Napi-Cap-1; PDZD1) and NHERF4 (also known as IKEPP; PDZK2; Napi-Cap-2). NHERF1 and NHERF2 have tandem PDZ domains (PDZ1-2); NHERF3 and NHERF4 have four PDZ domains (PDZ1-4). NHERFs are involved in the regulation of multiple receptors or transporters, such as type II sodium-phosphate cotransporter (Npt2a), purinergic P2Y1 receptor P2Y1R, the beta2-adrenergic receptor (beta2-AR), parathyroid hormone receptor type 1 (PTHR), the lysophosphatidic acid receptors (LPARs), sodium-hydrogen exchanger 3 (NHE3), and cystic fibrosis transmembrane conductance regulator (CFTR). NHERF-PDZ1 domain interaction partners include Npt2a, purinergic P2Y1 receptor, beta2-AR, CFTR, PTHR, NH3, G-protein-coupled receptor kinase 6 (GRK6A), platelet-derived growth factor receptor (PDGFR), B1 subunit of the H+ATPase, cholesterol, receptor for activated C-kinase RACK1, aquaporin 9, among others. The NHERF PDZ2 domain interacts with fewer proteins: NHERF1 PDZ2 binds Npt2a, PTHR, beta-catenin, aquaporin 9, and RACK1; NHERF2 PDZ2 binds LPA2, P2Y1R, and NHE3, cGMP-dependent protein kinase type II (cGKII). NHERF4 PDZ1 and PDZ4 bind the epithelial Ca(2+) channels TRPV5 and TRPV6. NHERF2/NHERF3 heterodimerization is mediated by PDZ domains of NHERF2 and the C-terminal PDZ domain recognition motif of NHERF3. NHERF4 regulates several transporters mediating influx of xenobiotics and nutrients in the small intestine. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This NHERF-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd06768); members share this curated model.
