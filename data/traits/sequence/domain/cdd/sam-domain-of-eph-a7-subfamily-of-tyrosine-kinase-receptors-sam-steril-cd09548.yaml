identifier: CDD:cd09548
label: "SAM domain of EPH-A7 subfamily of tyrosine kinase receptors. SAM (sterile alpha motif) domain of EPH-A7 subfamily of receptor tyrosine kinases is a C-terminal potential protein-protein interaction domain. This domain is located in the cytoplasmic region of EPH-A7 receptors and appears to mediate cell-cell initiated signal transduction. EphA7 was found expressed in human embryonic stem (ES) cells, neural tissues, kidney vasculature. EphA7 knockout mice show decrease in cortical progenitor cell death at mid-neurogenesis and significant increase in cortical size. EphA7 may be involved in the pathogenesis and development of different cancers; in particular, EphA7 was found upregulated in glioblastoma and downregulated in colorectal cancer and gastric cancer.  Thus, it is a potential molecular marker and/or therapy target for these types of cancers."
