identifier: CDD:cd01660
label: "ba3-like heme-copper oxidase subunit I.  The ba3 family of heme-copper oxidases are transmembrane protein complexes in the respiratory chains of prokaryotes and some archaea which catalyze the reduction of O2 and simultaneously pump protons across the membrane.  It has been proposed that Archaea acquired heme-copper oxidases through gene transfer from Gram-positive bacteria.  The ba3 family contains oxidases that lack the conserved residues that form the D- and K-pathways in CcO and ubiquinol oxidase. Instead they contain a potential alternative K-pathway.  Additional proton channels have been proposed for this family of oxidases but none have been identified definitively.  For general information on the heme-copper oxidase superfamily, please see cd00919."
definition: >-
  ba3-like heme-copper oxidase subunit I. The ba3 family of heme-copper oxidases are transmembrane protein complexes in the respiratory chains of prokaryotes and some archaea which catalyze the reduction of O2 and simultaneously pump protons across the membrane. It has been proposed that Archaea acquired heme-copper oxidases through gene transfer from Gram-positive bacteria. The ba3 family contains oxidases that lack the conserved residues that form the D- and K-pathways in CcO and ubiquinol oxidase. Instead they contain a potential alternative K-pathway. Additional proton channels have been proposed for this family of oxidases but none have been identified definitively. For general information on the heme-copper oxidase superfamily, please see cd00919. — an NCBI CDD conserved domain (cd01660); members share this curated model.
