identifier: CDD:cd19951
label: "bacterioferritin-associated ferredoxin (BFD)-like [2Fe-2S]-binding domain of uncharacterized proteins having a C-terminal Ni,Fe-hydrogenase I small subunit (HyaA) family domain. The BFD-like [2Fe-2S]-binding domain is found in a variety of other proteins including bacterioferritin-associated ferredoxin (BFD), the large subunit of NADH-dependent nitrite reductase, and Cu+ chaperone CopZ. It comprises a helix-turn-helix fold, and binds an [2Fe-2S] cluster via 4 highly-conserved Cys residues, found in loops between the alpha-helices. For the class of proteins having a BFD-like [2Fe-2S]-binding domain, the Cys residues are organized in a unique C-X2-C-X31-35-C-X2-9-C-arrangement. [2Fe-2S] clusters are sulfide-linked diiron centers, a primary role for which is electron transport."
definition: >-
  bacterioferritin-associated ferredoxin (BFD)-like [2Fe-2S]-binding domain of uncharacterized proteins having a C-terminal Ni,Fe-hydrogenase I small subunit (HyaA) family domain. The BFD-like [2Fe-2S]-binding domain is found in a variety of other proteins including bacterioferritin-associated ferredoxin (BFD), the large subunit of NADH-dependent nitrite reductase, and Cu+ chaperone CopZ. It comprises a helix-turn-helix fold, and binds an [2Fe-2S] cluster via 4 highly-conserved Cys residues, found in loops between the alpha-helices. For the class of proteins having a BFD-like [2Fe-2S]-binding domain, the Cys residues are organized in a unique C-X2-C-X31-35-C-X2-9-C-arrangement. [2Fe-2S] clusters are sulfide-linked diiron centers, a primary role for which is electron transport. — an NCBI CDD conserved domain (cd19951); members share this curated model.
