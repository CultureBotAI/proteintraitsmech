identifier: CDD:cd18476
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 38 (KLHL38). KLHL38 belongs to the KLHL family. Its function remains unclear. The klhl38 gene has recently been identified as a possible diapause (a temporary arrest of development during early ontogeny) gene, as it is significantly up-regulated during diapause. It may also be involved in chicken preadipocyte differentiation."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 38 (KLHL38). KLHL38 belongs to the KLHL family. Its function remains unclear. The klhl38 gene has recently been identified as a possible diapause (a temporary arrest of development during early ontogeny) gene, as it is significantly up-regulated during diapause. It may also be involved in chicken preadipocyte differentiation. — an NCBI CDD conserved domain (cd18476); members share this curated model.
