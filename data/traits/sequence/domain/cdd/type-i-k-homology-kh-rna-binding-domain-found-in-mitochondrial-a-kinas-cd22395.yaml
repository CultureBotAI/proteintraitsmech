identifier: CDD:cd22395
label: "type I K homology (KH) RNA-binding domain found in mitochondrial A-kinase anchor protein 1 (AKAP1) and similar proteins. AKAP1, also called A-kinase anchor protein 149 kDa, or AKAP 149, or dual specificity A-kinase-anchoring protein 1, or D-AKAP-1, or protein kinase A-anchoring protein 1 (PRKA1), or spermatid A-kinase anchor protein 84, or S-AKAP84, is a novel developmentally regulated A kinase anchor protein of male germ cells. It binds to type I and II regulatory subunits of protein kinase A and anchors them to the cytoplasmic face of the mitochondrial outer membrane."
definition: >-
  type I K homology (KH) RNA-binding domain found in mitochondrial A-kinase anchor protein 1 (AKAP1) and similar proteins. AKAP1, also called A-kinase anchor protein 149 kDa, or AKAP 149, or dual specificity A-kinase-anchoring protein 1, or D-AKAP-1, or protein kinase A-anchoring protein 1 (PRKA1), or spermatid A-kinase anchor protein 84, or S-AKAP84, is a novel developmentally regulated A kinase anchor protein of male germ cells. It binds to type I and II regulatory subunits of protein kinase A and anchors them to the cytoplasmic face of the mitochondrial outer membrane. — an NCBI CDD conserved domain (cd22395); members share this curated model.
