identifier: CDD:cd18233
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 49 (ZBTB49). ZBTB49, also called zinc finger protein 509 (ZNF509), is a transcription factor that inhibits cell proliferation by activating either CDKN1A/p21 transcription or RB1 transcription. There are four ZNF509 isoforms generated by alternative splicing. Short ZNF509 (ZNF509S1, -S2 and -S3) isoforms contain one or two out of the seven zinc-fingers contained in long ZNF509 (ZNF509L). ZBTB49 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 49 (ZBTB49). ZBTB49, also called zinc finger protein 509 (ZNF509), is a transcription factor that inhibits cell proliferation by activating either CDKN1A/p21 transcription or RB1 transcription. There are four ZNF509 isoforms generated by alternative splicing. Short ZNF509 (ZNF509S1, -S2 and -S3) isoforms contain one or two out of the seven zinc-fingers contained in long ZNF509 (ZNF509L). ZBTB49 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18233); members share this curated model.
