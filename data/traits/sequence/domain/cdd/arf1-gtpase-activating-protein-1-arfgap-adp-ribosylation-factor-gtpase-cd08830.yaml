identifier: CDD:cd08830
label: "Arf1 GTPase-activating protein 1. ArfGAP (ADP Ribosylation Factor GTPase Activating Protein) domain is a part of ArfGap1-like proteins that play a crucial role in controlling of membrane trafficking, particularly in the formation of COPI (coat protein complex I)-coated vesicles on Golgi membranes. The ArfGAP1 protein subfamily consists of three members: ArfGAP1 (Gcs1p in yeast), ArfGAP2 and ArfGAP3 (both are homologs of yeast Glo3p). ArfGAP2/3 are closely related, but with little similarity to ArfGAP1, except the catalytic ArfGAP domain. They promote hydrolysis of GTP bound to the small G protein ADP-ribosylation factor 1 (Arf1), which leads to the dissociation of coat proteins from Golgi-derived membranes and vesicles. Dissociation of the coat proteins is required for the fusion of these vesicles with target compartments. Thus, the GAP catalytic activity plays a key role in the formation of COPI vesicles from Golgi membrane. In contrast to ArfGAP1, which displays membrane curvature-dependent ArfGAP activity, ArfGAP2 and ArfGAP3 activities are dependent on coatomer (the core COPI complex) which required for efficient recruitment of ArfGAP2 and ArfGAP3 to the Golgi membrane. Accordingly, ArfGAP2/3 has been implicated in coatomer-mediated protein transport between the Golgi complex and the endoplasmic reticulum. Unlike ArfGAP1, which is controlled by membrane curvature through its amphipathic lipid packing sensor (ALPS) motifs, ArfGAP2/3 do not possess ALPS motif."
definition: >-
  Arf1 GTPase-activating protein 1. ArfGAP (ADP Ribosylation Factor GTPase Activating Protein) domain is a part of ArfGap1-like proteins that play a crucial role in controlling of membrane trafficking, particularly in the formation of COPI (coat protein complex I)-coated vesicles on Golgi membranes. The ArfGAP1 protein subfamily consists of three members: ArfGAP1 (Gcs1p in yeast), ArfGAP2 and ArfGAP3 (both are homologs of yeast Glo3p). ArfGAP2/3 are closely related, but with little similarity to ArfGAP1, except the catalytic ArfGAP domain. They promote hydrolysis of GTP bound to the small G protein ADP-ribosylation factor 1 (Arf1), which leads to the dissociation of coat proteins from Golgi-derived membranes and vesicles. Dissociation of the coat proteins is required for the fusion of these vesicles with target compartments. Thus, the GAP catalytic activity plays a key role in the formation of COPI vesicles from Golgi membrane. In contrast to ArfGAP1, which displays membrane curvature-dependent ArfGAP activity, ArfGAP2 and ArfGAP3 activities are dependent on coatomer (the core COPI complex) which required for efficient recruitment of ArfGAP2 and ArfGAP3 to the Golgi membrane. Accordingly, ArfGAP2/3 has been implicated in coatomer-mediated protein transport between the Golgi complex and the endoplasmic reticulum. Unlike ArfGAP1, which is controlled by membrane curvature through its amphipathic lipid packing sensor (ALPS) motifs, ArfGAP2/3 do not possess ALPS motif. — an NCBI CDD conserved domain (cd08830); members share this curated model.
