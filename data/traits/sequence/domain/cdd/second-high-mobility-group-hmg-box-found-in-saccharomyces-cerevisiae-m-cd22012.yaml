identifier: CDD:cd22012
label: "second high mobility group (HMG)-box found in Saccharomyces cerevisiae mitochondrial ARS-binding factor 2 (ABF2), intrastrand cross-link recognition protein (Ixr1) and similar proteins. ABF2 is a close relative of the nuclear, chromosomal high-mobility group protein HMG1 in yeast mitochondria. It specifically binds to the autonomously replicating sequence 1 (ARS1). It might play a positive role in gene expression and replication. Ixr1, also called structure-specific recognition protein (SSRP), is a homolog of the yeast mitochondrial regulator ABF2. It binds to platinated DNA and confers sensitivity to the anticancer drug cisplatin. Both ABF2 and Ixr1 contain two HMG-box domains. This model corresponds to the second one."
definition: >-
  second high mobility group (HMG)-box found in Saccharomyces cerevisiae mitochondrial ARS-binding factor 2 (ABF2), intrastrand cross-link recognition protein (Ixr1) and similar proteins. ABF2 is a close relative of the nuclear, chromosomal high-mobility group protein HMG1 in yeast mitochondria. It specifically binds to the autonomously replicating sequence 1 (ARS1). It might play a positive role in gene expression and replication. Ixr1, also called structure-specific recognition protein (SSRP), is a homolog of the yeast mitochondrial regulator ABF2. It binds to platinated DNA and confers sensitivity to the anticancer drug cisplatin. Both ABF2 and Ixr1 contain two HMG-box domains. This model corresponds to the second one. — an NCBI CDD conserved domain (cd22012); members share this curated model.
