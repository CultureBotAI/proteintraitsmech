identifier: CDD:cd14793
label: "Domains similar to DUF302 and the N-terminal domains found in some bacterial RNAses. DUF302 is an uncharacterized domain with widespread phylogenetic distribution. It appears homologous to the N-terminal domains of RNAse H3 and the Escherichia coli toxin RnlA."
definition: >-
  Domains similar to DUF302 and the N-terminal domains found in some bacterial RNAses. DUF302 is an uncharacterized domain with widespread phylogenetic distribution. It appears homologous to the N-terminal domains of RNAse H3 and the Escherichia coli toxin RnlA. — an NCBI CDD conserved domain (cd14793); members share this curated model.
