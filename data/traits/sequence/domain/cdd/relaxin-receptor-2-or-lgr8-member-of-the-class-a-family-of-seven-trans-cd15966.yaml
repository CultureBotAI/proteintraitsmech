identifier: CDD:cd15966
label: "relaxin receptor 2 (or LGR8), member of the class A family of seven-transmembrane G protein-coupled receptors. Relaxin is a member of the insulin superfamily that has diverse actions in both reproductive and non-reproductive tissues. The relaxin-like peptide family includes relaxin-1, relaxin-2, and the insulin-like (INSL) peptides such as INSL3, INSL4, INSL5 and INSL6. The relaxin family peptides share high structural similarity, but low sequence similarity, and exert their physiological functions by activating a group of four G protein-coupled receptors, RXFP1-4. INSL3 is the endogenous ligand for RXFP2, which couples to the G(s) protein to increase intracellular cAMP levels, but also to the GoB protein to decrease cAMP formation. RXFP2 (or LGR8) is expressed in various tissues including the brain, kidney, muscle, testis, thyroid, uterus, and peripheral blood cells, among others."
definition: >-
  relaxin receptor 2 (or LGR8), member of the class A family of seven-transmembrane G protein-coupled receptors. Relaxin is a member of the insulin superfamily that has diverse actions in both reproductive and non-reproductive tissues. The relaxin-like peptide family includes relaxin-1, relaxin-2, and the insulin-like (INSL) peptides such as INSL3, INSL4, INSL5 and INSL6. The relaxin family peptides share high structural similarity, but low sequence similarity, and exert their physiological functions by activating a group of four G protein-coupled receptors, RXFP1-4. INSL3 is the endogenous ligand for RXFP2, which couples to the G(s) protein to increase intracellular cAMP levels, but also to the GoB protein to decrease cAMP formation. RXFP2 (or LGR8) is expressed in various tissues including the brain, kidney, muscle, testis, thyroid, uterus, and peripheral blood cells, among others. — an NCBI CDD conserved domain (cd15966); members share this curated model.
