identifier: CDD:cd13436
label: "Stomatin-like protein 1 (SLP-1), a subgroup of the stomatin-like proteins (slipins) family; belonging to the SPFH (stomatin, prohibitin, flotillin, and HflK/C) superfamily. This model summarizes a subgroup of the stomatin-like protein family (SLPs or slipins) that is found in animals. The conserved domain common to the SPFH superfamily has also been referred to as the Band 7 domain. Individual proteins of the SPFH superfamily may cluster to form membrane microdomains which may in turn recruit multiprotein complexes. The family contains human SLP-1, which has been found to be expressed in the brain, and Caenorhabditis elegans UNC-24, which is a lipid raft-associated protein required for normal locomotion. It may mediate the correct localization of UNC-1. Mutations in the unc-24 gene result in abnormal motion and altered patterns of sensitivity to volatile anesthetics."
definition: >-
  Stomatin-like protein 1 (SLP-1), a subgroup of the stomatin-like proteins (slipins) family; belonging to the SPFH (stomatin, prohibitin, flotillin, and HflK/C) superfamily. This model summarizes a subgroup of the stomatin-like protein family (SLPs or slipins) that is found in animals. The conserved domain common to the SPFH superfamily has also been referred to as the Band 7 domain. Individual proteins of the SPFH superfamily may cluster to form membrane microdomains which may in turn recruit multiprotein complexes. The family contains human SLP-1, which has been found to be expressed in the brain, and Caenorhabditis elegans UNC-24, which is a lipid raft-associated protein required for normal locomotion. It may mediate the correct localization of UNC-1. Mutations in the unc-24 gene result in abnormal motion and altered patterns of sensitivity to volatile anesthetics. — an NCBI CDD conserved domain (cd13436); members share this curated model.
