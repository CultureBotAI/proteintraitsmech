identifier: CDD:cd14043
label: "Pseudokinase domain of the membrane Guanylate Cyclase receptor, GC-2D. The pseudokinase domain shows similarity to protein kinases but lacks crucial residues for catalytic activity and/or ATP binding. GC-2D is allso called Retinal Guanylyl Cyclase 1 (RETGC-1) or Rod Outer Segment membrane Guanylate Cyclase (ROS-GC). It is found in the photoreceptors of the retina where it anchors the reciprocal feedback loop between calcium and cGMP, which regulates the dark, light, and recovery phases in phototransduction. It is also found in other sensory neurons and may be a universal transduction component that plays a role in the perception of all senses. Membrane (or particulate) GCs consist of an extracellular ligand-binding domain, a single transmembrane region, and an intracellular tail that contains a PK-like domain, an amphiphatic region and a catalytic GC domain that catalyzes the conversion of GTP into cGMP and pyrophosphate. Membrane GCs act as receptors that transduce an extracellular signal to the intracellular production of cGMP, which has been implicated in many processes including cell proliferation, phototransduction, and muscle contractility, through its downstream effectors such as PKG. The PK-like domain of GCs functions as a negative regulator of the catalytic GC domain and may also act as a docking site for interacting proteins such as GC-activating proteins. The GC-2D subfamily is part of a larger superfamily that includes the catalytic domains of protein serine/threonine kinases, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Pseudokinase domain of the membrane Guanylate Cyclase receptor, GC-2D. The pseudokinase domain shows similarity to protein kinases but lacks crucial residues for catalytic activity and/or ATP binding. GC-2D is allso called Retinal Guanylyl Cyclase 1 (RETGC-1) or Rod Outer Segment membrane Guanylate Cyclase (ROS-GC). It is found in the photoreceptors of the retina where it anchors the reciprocal feedback loop between calcium and cGMP, which regulates the dark, light, and recovery phases in phototransduction. It is also found in other sensory neurons and may be a universal transduction component that plays a role in the perception of all senses. Membrane (or particulate) GCs consist of an extracellular ligand-binding domain, a single transmembrane region, and an intracellular tail that contains a PK-like domain, an amphiphatic region and a catalytic GC domain that catalyzes the conversion of GTP into cGMP and pyrophosphate. Membrane GCs act as receptors that transduce an extracellular signal to the intracellular production of cGMP, which has been implicated in many processes including cell proliferation, phototransduction, and muscle contractility, through its downstream effectors such as PKG. The PK-like domain of GCs functions as a negative regulator of the catalytic GC domain and may also act as a docking site for interacting proteins such as GC-activating proteins. The GC-2D subfamily is part of a larger superfamily that includes the catalytic domains of protein serine/threonine kinases, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14043); members share this curated model.
