identifier: CDD:cd13859
label: "The first cupredoxin domain of bacterial two domain multicopper oxidase McoN and similar proteins. This family includes bacterial two domain multicopper oxidases (2dMCOs) represented by the McoN from Nitrosomonas europaea. McoN is a trimeric type C blue copper oxidase. Each subunit houses a type 1 copper site in domain 1 and a type 2/type 3 trinuclear copper cluster at the subunit-subunit interface. The 2dMCO is proposed to be a key intermediate in the evolution of three domain MCOs. Its biological function has not been characterized. Multicopper oxidases couple oxidation of substrates with reduction of dioxygen to water. These MCOs are capable of oxidizing a vast range of substrates, varying from aromatic to inorganic compounds such as metals."
definition: >-
  The first cupredoxin domain of bacterial two domain multicopper oxidase McoN and similar proteins. This family includes bacterial two domain multicopper oxidases (2dMCOs) represented by the McoN from Nitrosomonas europaea. McoN is a trimeric type C blue copper oxidase. Each subunit houses a type 1 copper site in domain 1 and a type 2/type 3 trinuclear copper cluster at the subunit-subunit interface. The 2dMCO is proposed to be a key intermediate in the evolution of three domain MCOs. Its biological function has not been characterized. Multicopper oxidases couple oxidation of substrates with reduction of dioxygen to water. These MCOs are capable of oxidizing a vast range of substrates, varying from aromatic to inorganic compounds such as metals. — an NCBI CDD conserved domain (cd13859); members share this curated model.
