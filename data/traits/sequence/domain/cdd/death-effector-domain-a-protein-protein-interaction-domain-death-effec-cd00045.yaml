identifier: CDD:cd00045
label: "Death Effector Domain: a protein-protein interaction domain. Death Effector Domains comprise a subfamily of the Death Domain (DD) superfamily. DED-containing proteins include Fas-Associated via Death Domain (FADD), Astrocyte phosphoprotein PEA-15, the initiator caspases (caspase-8 and -10), and FLICE-inhibitory protein (FLIP), among others. These proteins are prominent components of the programmed cell death (apoptosis) pathway. Some members also have non-apoptotic functions such as regulation of insulin signaling (DEDD and PEA15) and cell cycle progression (DEDD). DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including PYRIN and CARD (Caspase activation and recruitment domain). They serve as adaptors in signaling pathways and they can recruit other proteins into signaling complexes."
definition: >-
  Death Effector Domain: a protein-protein interaction domain. Death Effector Domains comprise a subfamily of the Death Domain (DD) superfamily. DED-containing proteins include Fas-Associated via Death Domain (FADD), Astrocyte phosphoprotein PEA-15, the initiator caspases (caspase-8 and -10), and FLICE-inhibitory protein (FLIP), among others. These proteins are prominent components of the programmed cell death (apoptosis) pathway. Some members also have non-apoptotic functions such as regulation of insulin signaling (DEDD and PEA15) and cell cycle progression (DEDD). DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including PYRIN and CARD (Caspase activation and recruitment domain). They serve as adaptors in signaling pathways and they can recruit other proteins into signaling complexes. — an NCBI CDD conserved domain (cd00045); members share this curated model.
