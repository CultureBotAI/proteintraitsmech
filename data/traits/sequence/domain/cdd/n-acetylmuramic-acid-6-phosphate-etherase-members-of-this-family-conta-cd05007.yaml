identifier: CDD:cd05007
label: "N-acetylmuramic acid 6-phosphate etherase. Members of this family contain the SIS (Sugar ISomerase) domain. The SIS domain is found in many phosphosugar isomerases and phosphosugar binding proteins. The bacterial cell wall sugar N-acetylmuramic acid carries a unique D-lactyl ether substituent at the C3 position. The etherase catalyzes the cleavage of the lactyl ether bond of N-acetylmuramic acid 6-phosphate."
definition: >-
  N-acetylmuramic acid 6-phosphate etherase. Members of this family contain the SIS (Sugar ISomerase) domain. The SIS domain is found in many phosphosugar isomerases and phosphosugar binding proteins. The bacterial cell wall sugar N-acetylmuramic acid carries a unique D-lactyl ether substituent at the C3 position. The etherase catalyzes the cleavage of the lactyl ether bond of N-acetylmuramic acid 6-phosphate. — an NCBI CDD conserved domain (cd05007); members share this curated model.
