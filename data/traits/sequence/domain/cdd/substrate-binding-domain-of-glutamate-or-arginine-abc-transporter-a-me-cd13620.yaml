identifier: CDD:cd13620
label: "Substrate binding domain of glutamate or arginine ABC transporter, a member of the type 2 periplasmic binding fold protein superfamily. This family comprises of the periplasmic-binding protein component (GltS) of an ABC transporter specific for glutamate or arginine from Lactococcus lactis, as well as its closely related proteins. The GltS domain belongs to the type 2 periplasmic binding protein fold superfamily (PBP2), whose many  members are involved in chemotaxis and uptake of nutrients and other small molecules from the extracellular space as a primary receptor. The PBP2 proteins are typically comprised of two globular subdomains connected by a flexible hinge and bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. After binding their specific ligand with high affinity, they can interact with a cognate membrane transport complex comprised of two integral membrane domains and two receptor cytoplasmically-located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis"
definition: >-
  Substrate binding domain of glutamate or arginine ABC transporter, a member of the type 2 periplasmic binding fold protein superfamily. This family comprises of the periplasmic-binding protein component (GltS) of an ABC transporter specific for glutamate or arginine from Lactococcus lactis, as well as its closely related proteins. The GltS domain belongs to the type 2 periplasmic binding protein fold superfamily (PBP2), whose many members are involved in chemotaxis and uptake of nutrients and other small molecules from the extracellular space as a primary receptor. The PBP2 proteins are typically comprised of two globular subdomains connected by a flexible hinge and bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. After binding their specific ligand with high affinity, they can interact with a cognate membrane transport complex comprised of two integral membrane domains and two receptor cytoplasmically-located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis — an NCBI CDD conserved domain (cd13620); members share this curated model.
