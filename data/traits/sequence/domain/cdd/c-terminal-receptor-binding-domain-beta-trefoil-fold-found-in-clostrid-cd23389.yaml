identifier: CDD:cd23389
label: "C-terminal receptor binding domain, beta-trefoil fold, found in Clostridium botulinum neurotoxin type B (BoNT/B) and similar proteins. BoNT/B, also called bontoxilysin-B, is botulinum toxin that causes flaccid paralysis by inhibiting neurotransmitter (acetylcholine) release from the presynaptic membranes of nerve terminals of eukaryotic host skeletal and autonomic nervous system, with frequent heart or respiratory failure. There are two co-receptors of BoNT/B precursor, complex polysialylated gangliosides found on neural tissue and specific membrane-anchored proteins found in synaptic vesicles (e.g. synaptotagmin I and II). BoNT/B comprises three domains which are involved in catalysis (LC), translocation (HCT), and host receptor binding (HCR). The HCR domain is responsible for the highly specific targeting of the neurotoxin to neuronal cell membranes. It is a proven target for anti-BoNT antibody and vaccine development. This model corresponds to C-terminal HCR domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  C-terminal receptor binding domain, beta-trefoil fold, found in Clostridium botulinum neurotoxin type B (BoNT/B) and similar proteins. BoNT/B, also called bontoxilysin-B, is botulinum toxin that causes flaccid paralysis by inhibiting neurotransmitter (acetylcholine) release from the presynaptic membranes of nerve terminals of eukaryotic host skeletal and autonomic nervous system, with frequent heart or respiratory failure. There are two co-receptors of BoNT/B precursor, complex polysialylated gangliosides found on neural tissue and specific membrane-anchored proteins found in synaptic vesicles (e.g. synaptotagmin I and II). BoNT/B comprises three domains which are involved in catalysis (LC), translocation (HCT), and host receptor binding (HCR). The HCR domain is responsible for the highly specific targeting of the neurotoxin to neuronal cell membranes. It is a proven target for anti-BoNT antibody and vaccine development. This model corresponds to C-terminal HCR domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23389); members share this curated model.
