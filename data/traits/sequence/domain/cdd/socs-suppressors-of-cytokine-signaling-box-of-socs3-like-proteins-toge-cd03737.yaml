identifier: CDD:cd03737
label: "SOCS (suppressors of cytokine signaling) box of SOCS3-like proteins. Together with CIS1, the CIS/SOCS family of proteins is characterized by the presence of a C-terminal SOCS box and a central SH2 domain. SOCS3, like CIS1 and SOCS1, is involved in the down-regulation of the JAK/STAT pathway.  SOCS3 inhibits JAK activity indirectly through recruitment to the cytokine receptors. SOCS3 has been shown to play an essential role in placental development and a non-essential role in embryo development. The general function of the SOCS box is the recruitment of the ubiquitin-transferase system. The SOCS box interacts with Elongins B and C, Cullin-5 or Cullin-2, Rbx-1, and E2. Therefore, SOCS-box-containing proteins probably function as E3 ubiquitin ligases and mediate the degradation of proteins associated through their N-terminal regions."
