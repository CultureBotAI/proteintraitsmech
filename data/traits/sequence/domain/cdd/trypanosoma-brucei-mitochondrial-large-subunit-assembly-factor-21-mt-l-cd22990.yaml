identifier: CDD:cd22990
label: "Trypanosoma brucei mitochondrial large subunit assembly factor 21 (mt-LAF21), and related proteins. mt-LAF21 is a Trypanosoma brucei mitochondrial large subunit (mt-LSU) assembly factor (mt-LAF) that plays a role in stabilizing partially mature 12S ribosomal RNA (rRNA) during the assembly process of the mt-LSU. Mitochondrial ribosomes (mitoribosomes) are ribonucleoprotein complexes and consist of a large (mt-LSU) and small subunit (mt-SSU). They differ markedly in composition and architecture from their bacterial counterparts and between different eukaryotic lineages, and their biogenesis involves exchange of assembly factors by ribosomal proteins. An investigation of native assembly intermediates of the mt-LSU from T. brucei identified 28 assembly factors, some of which are homologous to bacterial and eukaryotic ribosome assembly factors. mt-LAF21 is one of nine assembly factors identified as specific to an assembly intermediate referred to as state A, and which stabilizes the 12S rRNA in an immature conformation. Knockdown of mt-LAF21 protein levels in T. brucei cells by tetracycline-inducible RNAi results in a specific reduction of the mt-12S rRNA steady-state level, but not of the SSU mt-9S rRNA, suggesting that mt-LAF21 is required for mt-LSU, but not mt-SSU, maturation. Knockdown of LAF12 also results in a lower growth rate of cells, presumably due to retarded mt-LSU assembly. Mitochondrial biogenesis is biomedically important since mutations in mitoribosomal proteins, rRNAs, and assembly factors have been linked to a heterogeneous group of human multisystemic oxidative phosphorylation (OXPHOS) diseases and cancer development and progression."
