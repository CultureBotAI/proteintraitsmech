identifier: CDD:cd22158
label: "F-box domain found in Arabidopsis thaliana F-box protein FBW2 (AtFBW2) and similar proteins. AtFBW2, also called SKP1-interacting partner 18 (SKIP18), is an F-box protein that contains four tandem WD-40 repeats. It is a component of SCF (SPK1/ASK-cullin-F-box protein) E3 ubiquitin ligase complexes, which may mediate the ubiquitination and subsequent proteasomal degradation of target proteins. It interacts with CUL1, CUL2 and SPK1B/ASK2. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Arabidopsis thaliana F-box protein FBW2 (AtFBW2) and similar proteins. AtFBW2, also called SKP1-interacting partner 18 (SKIP18), is an F-box protein that contains four tandem WD-40 repeats. It is a component of SCF (SPK1/ASK-cullin-F-box protein) E3 ubiquitin ligase complexes, which may mediate the ubiquitination and subsequent proteasomal degradation of target proteins. It interacts with CUL1, CUL2 and SPK1B/ASK2. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22158); members share this curated model.
