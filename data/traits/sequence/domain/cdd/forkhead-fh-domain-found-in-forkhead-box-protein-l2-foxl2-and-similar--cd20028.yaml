identifier: CDD:cd20028
label: FH_FOXL2
definition: >-
  Forkhead (FH) domain found in Forkhead box protein L2 (FOXL2) and similar proteins. FOXL2 is a transcriptional regulator that is essential for ovary differentiation and maintenance, and repression of the genetic program for somatic testis determination. Mutations in the FOXL2 gene cause blepharophimosis-ptosis-epicanthus inversus syndrome (BPES) types I and II, a rare genetic disorder. In BPES type I, a complex eyelid malformation is associated with premature ovarian failure (POF), whereas in BPES type II, the eyelid defect occurs as an isolated entity. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'
