identifier: CDD:cd19925
label: "phosphoacceptor receiver (REC) domain of citrate family two-component system response regulators. This family includes Lactobacillus paracasei MaeR, Escherichia coli DcuR and DpiA, Klebsiella pneumoniae CitB, as well as Bacillus DctR, MalR, and CitT. These are all response regulators of two-component systems (TCSs) from the citrate family, and are involved in the transcriptional regulation of genes associated with L-malate catabolism (MaeRK), citrate-specific fermentation (DpiAB, CitAB), plasmid inheritance (DpiAB), anaerobic fumarate respiratory system (DcuRS), and malate transport/utilization (MalKR). REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of citrate family two-component system response regulators. This family includes Lactobacillus paracasei MaeR, Escherichia coli DcuR and DpiA, Klebsiella pneumoniae CitB, as well as Bacillus DctR, MalR, and CitT. These are all response regulators of two-component systems (TCSs) from the citrate family, and are involved in the transcriptional regulation of genes associated with L-malate catabolism (MaeRK), citrate-specific fermentation (DpiAB, CitAB), plasmid inheritance (DpiAB), anaerobic fumarate respiratory system (DcuRS), and malate transport/utilization (MalKR). REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd19925); members share this curated model.
