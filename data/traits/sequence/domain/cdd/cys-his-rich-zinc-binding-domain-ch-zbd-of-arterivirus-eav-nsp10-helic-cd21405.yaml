identifier: CDD:cd21405
label: "Cys/His rich zinc-binding domain (CH/ZBD) of arterivirus EAV Nsp10 helicase and related proteins. Helicases catalyze NTP-dependent unwinding of nucleic acid duplexes into single strands and are classified based on the arrangement of conserved motifs into six superfamilies. Members of this arterivirus group belong to helicase superfamily 1 (SF1) and include helicases such Equine arteritis virus (EAV) Nsp10 helicase encoded on ORF1b. The CH/ZBD has 3 zinc-finger (ZnF1-3) motifs. Members of this group belong to a family of nindoviral replication helicases which include includes Severe Acute Respiratory Syndrome coronavirus (SARS-CoV) non-structural protein 13 (SARS-Nsp13), a component of the viral RNA synthesis replication and transcription complex (RTC). The SARS-Nsp13 CH/ZBD is indispensable for helicase activity and interacts with SARS-Nsp12, the RNA-dependent RNA polymerase. SARS-Nsp12 can enhance the helicase activity of SARS-Nsp13."
definition: >-
  Cys/His rich zinc-binding domain (CH/ZBD) of arterivirus EAV Nsp10 helicase and related proteins. Helicases catalyze NTP-dependent unwinding of nucleic acid duplexes into single strands and are classified based on the arrangement of conserved motifs into six superfamilies. Members of this arterivirus group belong to helicase superfamily 1 (SF1) and include helicases such Equine arteritis virus (EAV) Nsp10 helicase encoded on ORF1b. The CH/ZBD has 3 zinc-finger (ZnF1-3) motifs. Members of this group belong to a family of nindoviral replication helicases which include includes Severe Acute Respiratory Syndrome coronavirus (SARS-CoV) non-structural protein 13 (SARS-Nsp13), a component of the viral RNA synthesis replication and transcription complex (RTC). The SARS-Nsp13 CH/ZBD is indispensable for helicase activity and interacts with SARS-Nsp12, the RNA-dependent RNA polymerase. SARS-Nsp12 can enhance the helicase activity of SARS-Nsp13. — an NCBI CDD conserved domain (cd21405); members share this curated model.
