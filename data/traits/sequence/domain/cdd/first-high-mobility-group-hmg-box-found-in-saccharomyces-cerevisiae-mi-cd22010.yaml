identifier: CDD:cd22010
label: "first high mobility group (HMG)-box found in Saccharomyces cerevisiae mitochondrial ARS-binding factor 2 (ABF2) and similar proteins. ABF2 is a close relative of the nuclear, chromosomal high-mobility group protein HMG1 in yeast mitochondria. It specifically binds to the autonomously replicating sequence 1 (ARS1). It might play a positive role in gene expression and replication. ABF2 contains two HMG-box domains. This model corresponds to the first one."
definition: >-
  first high mobility group (HMG)-box found in Saccharomyces cerevisiae mitochondrial ARS-binding factor 2 (ABF2) and similar proteins. ABF2 is a close relative of the nuclear, chromosomal high-mobility group protein HMG1 in yeast mitochondria. It specifically binds to the autonomously replicating sequence 1 (ARS1). It might play a positive role in gene expression and replication. ABF2 contains two HMG-box domains. This model corresponds to the first one. — an NCBI CDD conserved domain (cd22010); members share this curated model.
