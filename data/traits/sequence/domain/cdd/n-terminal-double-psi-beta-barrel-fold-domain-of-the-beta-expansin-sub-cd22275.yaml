identifier: CDD:cd22275
label: "N-terminal double-psi beta-barrel fold domain of the beta-expansin subfamily. Beta-expansins (EXPB, expansin-B) have cell wall loosening activity and are involved in cell expansion and other developmental events during which cell wall modification occurs. They also affect environmental stress responses. The EXPB subfamily is known in the allergen literature as group-1 grass pollen allergens. EXPB of Bermuda, Johnson, and Para grass pollens, is a major cross-reactive allergen for allergic rhinitis patients in subtropical climate. EXPB1 induces extension and stress relaxation of grass cell walls. Wheat TaEXPB7-B is a beta-expansin gene involved in low-temperature stress and abscisic acid responses. Beta-expansins belong to the expansin family of proteins that contain an N-terminal domain (D1) homologous to the catalytic domain of glycoside hydrolase family 45 (GH45) proteins but with no hydrolytic activity, and a C-terminal domain (D2) homologous to group-2 grass pollen allergens. This model represents the N-terminal domain of beta-expansins, which adopts a double-psi beta-barrel (DPBB) fold."
definition: >-
  N-terminal double-psi beta-barrel fold domain of the beta-expansin subfamily. Beta-expansins (EXPB, expansin-B) have cell wall loosening activity and are involved in cell expansion and other developmental events during which cell wall modification occurs. They also affect environmental stress responses. The EXPB subfamily is known in the allergen literature as group-1 grass pollen allergens. EXPB of Bermuda, Johnson, and Para grass pollens, is a major cross-reactive allergen for allergic rhinitis patients in subtropical climate. EXPB1 induces extension and stress relaxation of grass cell walls. Wheat TaEXPB7-B is a beta-expansin gene involved in low-temperature stress and abscisic acid responses. Beta-expansins belong to the expansin family of proteins that contain an N-terminal domain (D1) homologous to the catalytic domain of glycoside hydrolase family 45 (GH45) proteins but with no hydrolytic activity, and a C-terminal domain (D2) homologous to group-2 grass pollen allergens. This model represents the N-terminal domain of beta-expansins, which adopts a double-psi beta-barrel (DPBB) fold. — an NCBI CDD conserved domain (cd22275); members share this curated model.
