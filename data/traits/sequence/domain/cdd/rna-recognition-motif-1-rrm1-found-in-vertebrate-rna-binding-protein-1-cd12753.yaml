identifier: CDD:cd12753
label: "RNA recognition motif 1 (RRM1) found in vertebrate RNA-binding protein 10 (RBM10). This subgroup corresponds to the RRM1 of RBM10, also termed G patch domain-containing protein 9, or RNA-binding protein S1-1 (S1-1), a paralog of putative tumor suppressor RNA-binding protein 5 (RBM5 or LUCA15 or H37). It may play an important role in mRNA generation, processing and degradation in several cell types. The rat homolog of human RBM10 is protein S1-1, a hypothetical RNA binding protein with poly(G) and poly(U) binding capabilities. RBM10 is structurally related to RBM5 and RNA-binding protein 6 (RBM6 or NY-LU-12 or g16 or DEF-3). It contains two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), two C2H2-type zinc fingers, and a G-patch/D111 domain."
definition: >-
  RNA recognition motif 1 (RRM1) found in vertebrate RNA-binding protein 10 (RBM10). This subgroup corresponds to the RRM1 of RBM10, also termed G patch domain-containing protein 9, or RNA-binding protein S1-1 (S1-1), a paralog of putative tumor suppressor RNA-binding protein 5 (RBM5 or LUCA15 or H37). It may play an important role in mRNA generation, processing and degradation in several cell types. The rat homolog of human RBM10 is protein S1-1, a hypothetical RNA binding protein with poly(G) and poly(U) binding capabilities. RBM10 is structurally related to RBM5 and RNA-binding protein 6 (RBM6 or NY-LU-12 or g16 or DEF-3). It contains two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), two C2H2-type zinc fingers, and a G-patch/D111 domain. — an NCBI CDD conserved domain (cd12753); members share this curated model.
