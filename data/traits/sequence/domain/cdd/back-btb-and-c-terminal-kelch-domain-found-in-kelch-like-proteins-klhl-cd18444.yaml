identifier: CDD:cd18444
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like proteins KLHL1, KLHL4 and KLHL5. This subfamily contains Kelch-like proteins: KLHL1, KLHL4 and KLHL5, all of which share high identity and similarity with the Drosophila kelch protein, a component of ring canals. Members of this subfamily contain a BTB domain and kelch repeat domains, characteristics of a kelch family protein. KLHL1 is a neuronal actin-binding protein that modulates voltage-gated CaV2.1 (P/Q-type) and CaV3.2 (alpha1H T-type) calcium channels."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like proteins KLHL1, KLHL4 and KLHL5. This subfamily contains Kelch-like proteins: KLHL1, KLHL4 and KLHL5, all of which share high identity and similarity with the Drosophila kelch protein, a component of ring canals. Members of this subfamily contain a BTB domain and kelch repeat domains, characteristics of a kelch family protein. KLHL1 is a neuronal actin-binding protein that modulates voltage-gated CaV2.1 (P/Q-type) and CaV3.2 (alpha1H T-type) calcium channels. — an NCBI CDD conserved domain (cd18444); members share this curated model.
