identifier: CDD:cd12737
label: "RNA recognition motif 1 (RRM1) found in epithelial splicing regulatory protein 2 (ESRP2) and similar proteins. This subgroup corresponds to the RRM1 of ESRP2, also termed RNA-binding motif protein 35B (RBM35B), which has been identified as an epithelial cell type-specific regulator of fibroblast growth factor receptor 2 (FGFR2) splicing. It is required for expression of epithelial FGFR2-IIIb and the regulation of CD44, CTNND1 (also termed p120-Catenin) and ENAH (also termed hMena) splicing. It enhances epithelial-specific exons of CD44 and ENAH, silences mesenchymal exons of CTNND1, or both within FGFR2. ESRP2 contains three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains)."
definition: >-
  RNA recognition motif 1 (RRM1) found in epithelial splicing regulatory protein 2 (ESRP2) and similar proteins. This subgroup corresponds to the RRM1 of ESRP2, also termed RNA-binding motif protein 35B (RBM35B), which has been identified as an epithelial cell type-specific regulator of fibroblast growth factor receptor 2 (FGFR2) splicing. It is required for expression of epithelial FGFR2-IIIb and the regulation of CD44, CTNND1 (also termed p120-Catenin) and ENAH (also termed hMena) splicing. It enhances epithelial-specific exons of CD44 and ENAH, silences mesenchymal exons of CTNND1, or both within FGFR2. ESRP2 contains three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). — an NCBI CDD conserved domain (cd12737); members share this curated model.
