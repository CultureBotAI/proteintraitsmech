identifier: CDD:cd14610
label: "PTP-like domain of receptor-type tyrosine-protein phosphatase N2. Receptor-type tyrosine-protein phosphatase N2 (PTPRN2 or R-PTP-N2), also called islet cell autoantigen-related protein (IAR), ICAAR, phogrin, or IA-2beta, belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). It consists of a large ectodomain that contains a RESP18HD (regulated endocrine-specific protein 18 homology domain), followed by a transmembrane segment, and a single, catalytically-impaired, PTP domain. It is mainly expressed in neuropeptidergic neurons and peptide-secreting endocrine cells, including insulin-producing pancreatic beta-cells. It may function as a phosphatidylinositol phosphatase to regulate insulin secretion. It is also required for normal accumulation of the neurotransmitters norepinephrine, dopamine and serotonin in the brain."
