identifier: CDD:cd17961
label: "DEAD-box helicase domain of DEAD box protein 56. DDX56 is a helicase required for assembly of infectious West Nile virus particles. New research suggests that DDX56 relocalizes to the site of virus assembly during WNV infection and that its interaction with WNV capsid in the cytoplasm may occur transiently during virion morphogenesis. DDX56 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of DEAD box protein 56. DDX56 is a helicase required for assembly of infectious West Nile virus particles. New research suggests that DDX56 relocalizes to the site of virus assembly during WNV infection and that its interaction with WNV capsid in the cytoplasm may occur transiently during virion morphogenesis. DDX56 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17961); members share this curated model.
