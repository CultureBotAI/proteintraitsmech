identifier: CDD:cd23763
label: "ATPase-like domain of the ROK (Repressor, ORF, Kinase) domain family. The ROK family corresponds to a group of proteins including sugar kinases, transcriptional repressors, and yet uncharacterized open reading frames. ROK family sugar kinases phosphorylate a range of structurally distinct hexoses including the key carbon source D-glucose, various glucose epimers, and several acetylated hexosamines. The sugar kinases include N-acetyl-D-glucosamine kinase (NAGK; EC 2.7.1.59), polyphosphate glucokinase (PPGK; EC 2.7.1.63/EC 2.7.1.2), glucokinase (GLK; EC 2.7.1.2), fructokinase (FRK; EC 2.7.1.4), hexokinase (HK; EC 2.7.1.1), D-allose kinase (AlsK; EC 2.7.1.55), bifunctional UDP-N-acetylglucosamine 2-epimerase/N-acetylmannosamine kinase (GNE; EC 3.2.1.183/EC 2.7.1.60), N-acetylmannosamine kinase (NanK; EC 2.7.1.60), beta-glucoside kinase (BglK; EC 2.7.1.85), and N-acetylglucosamine kinase (EC 2.7.1.59). The family also contains the repressor proteins, such as N-acetylglucosamine repressor (NagC), xylose repressor (XylR), cyclobis-(1-6)-alpha-nigerosyl repressor (CYANR) and protein Mlc. ROK kinases harbor a conserved N-terminal ATP binding motif of sequence DxGxT, while ROK repressors possess a N-terminal extension that contains a canonical helix-turn-helix DNA binding motif. The ROK family proteins belong to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains."
definition: >-
  ATPase-like domain of the ROK (Repressor, ORF, Kinase) domain family. The ROK family corresponds to a group of proteins including sugar kinases, transcriptional repressors, and yet uncharacterized open reading frames. ROK family sugar kinases phosphorylate a range of structurally distinct hexoses including the key carbon source D-glucose, various glucose epimers, and several acetylated hexosamines. The sugar kinases include N-acetyl-D-glucosamine kinase (NAGK; EC 2.7.1.59), polyphosphate glucokinase (PPGK; EC 2.7.1.63/EC 2.7.1.2), glucokinase (GLK; EC 2.7.1.2), fructokinase (FRK; EC 2.7.1.4), hexokinase (HK; EC 2.7.1.1), D-allose kinase (AlsK; EC 2.7.1.55), bifunctional UDP-N-acetylglucosamine 2-epimerase/N-acetylmannosamine kinase (GNE; EC 3.2.1.183/EC 2.7.1.60), N-acetylmannosamine kinase (NanK; EC 2.7.1.60), beta-glucoside kinase (BglK; EC 2.7.1.85), and N-acetylglucosamine kinase (EC 2.7.1.59). The family also contains the repressor proteins, such as N-acetylglucosamine repressor (NagC), xylose repressor (XylR), cyclobis-(1-6)-alpha-nigerosyl repressor (CYANR) and protein Mlc. ROK kinases harbor a conserved N-terminal ATP binding motif of sequence DxGxT, while ROK repressors possess a N-terminal extension that contains a canonical helix-turn-helix DNA binding motif. The ROK family proteins belong to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains. — an NCBI CDD conserved domain (cd23763); members share this curated model.
