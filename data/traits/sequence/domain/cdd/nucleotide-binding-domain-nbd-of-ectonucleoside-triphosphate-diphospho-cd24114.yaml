identifier: CDD:cd24114
label: "nucleotide-binding domain (NBD) of ectonucleoside triphosphate diphosphohydrolase 5 (NTPDase5) and similar proteins. NTPDase5 (EC 3.6.1.6), also called nucleoside diphosphate phosphatase ENTPD5, CD39 antigen-like 4 (CD39L4), ER-UDPase, guanosine-diphosphatase ENTPD5, GDPase ENTPD5, inosine diphosphate phosphatase ENTPD5, nucleoside diphosphatase, uridine-diphosphatase ENTPD5, or UDPase ENTPD5, hydrolyzes nucleoside diphosphates with a preference for GDP, IDP and UDP compared to ADP and CDP."
definition: >-
  nucleotide-binding domain (NBD) of ectonucleoside triphosphate diphosphohydrolase 5 (NTPDase5) and similar proteins. NTPDase5 (EC 3.6.1.6), also called nucleoside diphosphate phosphatase ENTPD5, CD39 antigen-like 4 (CD39L4), ER-UDPase, guanosine-diphosphatase ENTPD5, GDPase ENTPD5, inosine diphosphate phosphatase ENTPD5, nucleoside diphosphatase, uridine-diphosphatase ENTPD5, or UDPase ENTPD5, hydrolyzes nucleoside diphosphates with a preference for GDP, IDP and UDP compared to ADP and CDP. — an NCBI CDD conserved domain (cd24114); members share this curated model.
