label: prolyl_aminopeptidase
definition: >-
  x. Bacterial family of proposed prolyl aminopeptidases. No specific information is available to further characterize the function of this protein. This subfamily appears to contain only bacterial members at the time of curation. Search on PubMed for prolyl aminopeptidase yields PMID 19200026, which will hopefully point to other useful papers
