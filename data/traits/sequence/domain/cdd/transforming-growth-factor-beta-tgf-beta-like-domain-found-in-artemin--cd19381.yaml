identifier: CDD:cd19381
label: "transforming growth factor beta (TGF-beta) like domain found in Artemin and similar proteins. Artemin, also termed Enovin, or Neublastin, is a member of the glial cell-line-derived neurotrophic factor (GDNF) family with growth promoting activity on neuronal cells. It acts as the ligand for the GFR-alpha-3-RET receptor complex but can also activate the GFR-alpha-1-RET receptor complex. It supports peripheral and central neurons and signals through the GFR-alpha-3-RET receptor complex."
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in Artemin and similar proteins. Artemin, also termed Enovin, or Neublastin, is a member of the glial cell-line-derived neurotrophic factor (GDNF) family with growth promoting activity on neuronal cells. It acts as the ligand for the GFR-alpha-3-RET receptor complex but can also activate the GFR-alpha-1-RET receptor complex. It supports peripheral and central neurons and signals through the GFR-alpha-3-RET receptor complex. — an NCBI CDD conserved domain (cd19381); members share this curated model.
