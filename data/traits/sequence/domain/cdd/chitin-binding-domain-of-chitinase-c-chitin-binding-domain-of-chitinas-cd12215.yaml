identifier: CDD:cd12215
label: "Chitin-binding domain of chitinase C. Chitin-binding domain of chitinase C (ChiC) of Streptomyces griseus and related proteins. Chitinase C is a family 19 chitinase, and consists of a N-terminal chitin binding domain and a C-terminal chitin-catalytic domain that effects degradation. Chitinases function in invertebrates in the degradation of old exoskeletons, in fungi to utilize chitin in cell walls, and in bacteria which use chitin as an energy source. ChiC contains the characteristic chitin-binding aromatic residues."
definition: >-
  Chitin-binding domain of chitinase C. Chitin-binding domain of chitinase C (ChiC) of Streptomyces griseus and related proteins. Chitinase C is a family 19 chitinase, and consists of a N-terminal chitin binding domain and a C-terminal chitin-catalytic domain that effects degradation. Chitinases function in invertebrates in the degradation of old exoskeletons, in fungi to utilize chitin in cell walls, and in bacteria which use chitin as an energy source. ChiC contains the characteristic chitin-binding aromatic residues. — an NCBI CDD conserved domain (cd12215); members share this curated model.
