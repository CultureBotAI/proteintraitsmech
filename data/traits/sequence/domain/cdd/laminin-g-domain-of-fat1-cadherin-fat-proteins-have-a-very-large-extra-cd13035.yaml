identifier: CDD:cd13035
label: "Laminin G domain of FAT1 cadherin. FAT proteins have a very large extracellular region, which is in most cases comprised of 34 cadherin repeats, one or two laminin G domains and several epidermal growth factor (EGF) motifs and are involved in regulating cell-cell interactions. According to sequence similarity they can be subdivided into 2 subfamilies: Drosphila FAT-like/eukaryotic FAT1,2,3  and  Drosophila FAT/eukaryotic FAT-J.  Members of the FAT-like subfamily contain a single LamG repeat. FAT1 regulates actin dynamics and cell-cell contacts during the formation of the slit junctions in early development. In general, proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold."
definition: >-
  Laminin G domain of FAT1 cadherin. FAT proteins have a very large extracellular region, which is in most cases comprised of 34 cadherin repeats, one or two laminin G domains and several epidermal growth factor (EGF) motifs and are involved in regulating cell-cell interactions. According to sequence similarity they can be subdivided into 2 subfamilies: Drosphila FAT-like/eukaryotic FAT1,2,3 and Drosophila FAT/eukaryotic FAT-J. Members of the FAT-like subfamily contain a single LamG repeat. FAT1 regulates actin dynamics and cell-cell contacts during the formation of the slit junctions in early development. In general, proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold. — an NCBI CDD conserved domain (cd13035); members share this curated model.
