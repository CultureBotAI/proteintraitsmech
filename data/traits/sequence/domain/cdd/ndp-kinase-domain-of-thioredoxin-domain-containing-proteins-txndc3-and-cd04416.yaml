identifier: CDD:cd04416
label: "NDP kinase domain of thioredoxin domain-containing proteins  (TXNDC3 and TXNDC6): Txl-2 (TXNDC6) and Sptrx-2 (TXNDC3) are fusion proteins of Group II N-terminal thioredoxin domains followed by one or three NDP kinase domains, respectively. Sptrx-2, which has a tissue specific distribution in human testis, has been considered as a member of the nm23 family (nm23-H8) and exhibits a high homology with sea urchin IC1 (intermediate chain-1) protein, a component of the sperm axonemal outer dynein arm complex. Txl-2 is mainly represented in close association with microtubules within tissues with cilia and flagella such as seminiferous epithelium (spermatids) and lung airway epithelium, suggesting possible role in control of microtubule stability and maintenance."
