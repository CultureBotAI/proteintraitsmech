identifier: CDD:cd07963
label: "Anticodon-binding domain of cysteinyl tRNA synthetases. This domain is found in cysteinyl tRNA synthetases (CysRS), which belong to the class Ia aminoacyl tRNA synthetases. It lies C-terminal to the catalytic core domain, and recognizes and specifically binds to the tRNA anticodon. CysRS catalyzes the transfer of cysteine to the 3'-end of its tRNA."
definition: >-
  Anticodon-binding domain of cysteinyl tRNA synthetases. This domain is found in cysteinyl tRNA synthetases (CysRS), which belong to the class Ia aminoacyl tRNA synthetases. It lies C-terminal to the catalytic core domain, and recognizes and specifically binds to the tRNA anticodon. CysRS catalyzes the transfer of cysteine to the 3'-end of its tRNA. — an NCBI CDD conserved domain (cd07963); members share this curated model.
