identifier: CDD:cd17157
label: "Doublecortin-like domain 2 found in doublecortin domain-containing protein 5 (DCDC5). DCDC5 is a member of doublecortin (DCX) family. It is a microtubule-associated protein (MAP) with stable double tandem DCX repeats of ubiquitin-like tertiary fold. Ubiquitin (Ub) is a protein modifier in eukaryotes that is involved in various cellular processes, including transcriptional regulation, cell cycle control, and DNA repair. Microtubules are key components of the cytoskeleton that are involved in cell movement, shape determination, division and transport. DCDC5 is expressed during mitosis and involved in coordinating late cytokinesis. DCDC5 interacts with cytoplasmic dynein and Rab8, as well as with the Rab8 nucleotide exchange factor Rabin8."
definition: >-
  Doublecortin-like domain 2 found in doublecortin domain-containing protein 5 (DCDC5). DCDC5 is a member of doublecortin (DCX) family. It is a microtubule-associated protein (MAP) with stable double tandem DCX repeats of ubiquitin-like tertiary fold. Ubiquitin (Ub) is a protein modifier in eukaryotes that is involved in various cellular processes, including transcriptional regulation, cell cycle control, and DNA repair. Microtubules are key components of the cytoskeleton that are involved in cell movement, shape determination, division and transport. DCDC5 is expressed during mitosis and involved in coordinating late cytokinesis. DCDC5 interacts with cytoplasmic dynein and Rab8, as well as with the Rab8 nucleotide exchange factor Rabin8. — an NCBI CDD conserved domain (cd17157); members share this curated model.
