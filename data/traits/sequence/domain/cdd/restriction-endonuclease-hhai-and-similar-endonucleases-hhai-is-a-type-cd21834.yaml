identifier: CDD:cd21834
label: "Restriction endonuclease HhaI and similar endonucleases. HhaI is a type II restriction endonuclease that recognizes the symmetric sequence 5'-GCG|C-3' (| denotes the cleavage site) and produces fragments with 2-base, 3'-overhangs. It domain belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and HindIII."
definition: >-
  Restriction endonuclease HhaI and similar endonucleases. HhaI is a type II restriction endonuclease that recognizes the symmetric sequence 5'-GCG|C-3' (| denotes the cleavage site) and produces fragments with 2-base, 3'-overhangs. It domain belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and HindIII. — an NCBI CDD conserved domain (cd21834); members share this curated model.
