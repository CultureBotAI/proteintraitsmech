identifier: CDD:cd23710
label: mL85
definition: >-
  Trypanosoma brucei ribosomal protein mL85 and similar proteins. Ribosomal protein mL85 is a component of mitoribosomal large subunit (mtLSU) in Trypanosoma brucei mitochondrial ribosome (mitoribosome), which is composed of 127 mitoribosomal proteins and contains very small rRNAs. The family also includes Leishmania major ribosomal protein mL85
