identifier: CDD:cd23205
label: "catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the family Carmotetraviridae of positive-sense single-stranded RNA [(+)ssRNA] viruses, and related Erinaceus virus H14. This group contains the catalytic core domain of RdRp of RNA viruses belonging to the family Carmotetraviridae, and related Erinaceus virus H14, order Tolivirales. Carmotetraviridae includes only one genus, Alphacarmotetravirus, which has one species: Providence virus. Lepidopteran insects serve as the natural host. Recent studies indicated that Providence virus, a non-enveloped insect RNA virus, isolated from a lepidopteran midgut cell line can establish a productive infection in plants as well as in animal cells. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
definition: >-
  catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the family Carmotetraviridae of positive-sense single-stranded RNA [(+)ssRNA] viruses, and related Erinaceus virus H14. This group contains the catalytic core domain of RdRp of RNA viruses belonging to the family Carmotetraviridae, and related Erinaceus virus H14, order Tolivirales. Carmotetraviridae includes only one genus, Alphacarmotetravirus, which has one species: Providence virus. Lepidopteran insects serve as the natural host. Recent studies indicated that Providence virus, a non-enveloped insect RNA virus, isolated from a lepidopteran midgut cell line can establish a productive infection in plants as well as in animal cells. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides. — an NCBI CDD conserved domain (cd23205); members share this curated model.
