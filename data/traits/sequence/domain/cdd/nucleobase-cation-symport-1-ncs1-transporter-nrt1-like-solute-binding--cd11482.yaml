identifier: CDD:cd11482
label: "nucleobase-cation-symport-1 (NCS1) transporter NRT1-like; solute-binding domain. This fungal NCS1 subfamily includes various Saccharomyces cerevisiae transporters: nicotinamide riboside transporter 1 (Nrt1p, also called Thi71p), Dal4p (allantoin permease), Fui1p (uridine permease), Fur4p (uracil permease), and Thi7p (thiamine transporter). NCS1s are essential components of salvage pathways for nucleobases and related metabolites. NCS1s belong to a superfamily which also contains the solute carrier 5 family sodium/glucose transporters, and solute carrier 6 family neurotransmitter transporters."
definition: >-
  nucleobase-cation-symport-1 (NCS1) transporter NRT1-like; solute-binding domain. This fungal NCS1 subfamily includes various Saccharomyces cerevisiae transporters: nicotinamide riboside transporter 1 (Nrt1p, also called Thi71p), Dal4p (allantoin permease), Fui1p (uridine permease), Fur4p (uracil permease), and Thi7p (thiamine transporter). NCS1s are essential components of salvage pathways for nucleobases and related metabolites. NCS1s belong to a superfamily which also contains the solute carrier 5 family sodium/glucose transporters, and solute carrier 6 family neurotransmitter transporters. — an NCBI CDD conserved domain (cd11482); members share this curated model.
