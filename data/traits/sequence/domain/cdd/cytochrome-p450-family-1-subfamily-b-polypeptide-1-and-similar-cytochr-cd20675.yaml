identifier: CDD:cd20675
label: "cytochrome P450 family 1, subfamily B, polypeptide 1 and similar cytochrome P450s. Cytochrome P450 1B1 (CYP1B1) is expressed in liver and extrahepatic tissues where it carries out the metabolism of numerous xenobiotics, including metabolic activation of polycyclic aromatic hydrocarbons. It is also important in regulating endogenous metabolic pathways, including the metabolism of steroid hormones, fatty acids, melatonin, and vitamins. CYP1B1 is overexpressed in a wide variety of tumors and is associated with angiogenesis. It is also associated with adipogenesis, obesity, hypertension, and atherosclerosis. It is therefore a target for the treatment of metabolic diseases and cancer. Also included in this subfamily are CYP1C proteins from fish, birds and amphibians. The CYP1B1-like subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 family 1, subfamily B, polypeptide 1 and similar cytochrome P450s. Cytochrome P450 1B1 (CYP1B1) is expressed in liver and extrahepatic tissues where it carries out the metabolism of numerous xenobiotics, including metabolic activation of polycyclic aromatic hydrocarbons. It is also important in regulating endogenous metabolic pathways, including the metabolism of steroid hormones, fatty acids, melatonin, and vitamins. CYP1B1 is overexpressed in a wide variety of tumors and is associated with angiogenesis. It is also associated with adipogenesis, obesity, hypertension, and atherosclerosis. It is therefore a target for the treatment of metabolic diseases and cancer. Also included in this subfamily are CYP1C proteins from fish, birds and amphibians. The CYP1B1-like subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd20675); members share this curated model.
