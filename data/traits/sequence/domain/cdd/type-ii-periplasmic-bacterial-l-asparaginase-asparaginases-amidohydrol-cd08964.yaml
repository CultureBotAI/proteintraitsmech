identifier: CDD:cd08964
label: "Type II (periplasmic) bacterial L-asparaginase. Asparaginases (amidohydrolases, E.C. 3.5.1.1) are enzymes that catalyze the hydrolysis of asparagine to aspartic acid and ammonia. In bacteria, there are two classes of amidohydrolases. This model represents type II L-asparaginases, which tend to be highly specific for asparagine and localized to the periplasm. They are potent antileukemic agents and have been used in the treatment of acute lymphoblastic leukemia (ALL), but not without severe side effects. Tumor cells appear to have a heightened dependence on exogenous L-aspartate, and depleting their surroundings of L-aspartate may starve cancerous ALL cells. Type II L-asparaginase acts as a tetramer, which is actually a dimer of two tightly bound dimers. A conserved threonine residue is thought to supply the nucleophile hydroxy-group that attacks the amide bond. Many bacterial L-asparaginases have both L-asparagine and L-glutamine hydrolysis activities, to a different degree, and some of them are annotated as asparaginase/glutaminase."
definition: >-
  Type II (periplasmic) bacterial L-asparaginase. Asparaginases (amidohydrolases, E.C. 3.5.1.1) are enzymes that catalyze the hydrolysis of asparagine to aspartic acid and ammonia. In bacteria, there are two classes of amidohydrolases. This model represents type II L-asparaginases, which tend to be highly specific for asparagine and localized to the periplasm. They are potent antileukemic agents and have been used in the treatment of acute lymphoblastic leukemia (ALL), but not without severe side effects. Tumor cells appear to have a heightened dependence on exogenous L-aspartate, and depleting their surroundings of L-aspartate may starve cancerous ALL cells. Type II L-asparaginase acts as a tetramer, which is actually a dimer of two tightly bound dimers. A conserved threonine residue is thought to supply the nucleophile hydroxy-group that attacks the amide bond. Many bacterial L-asparaginases have both L-asparagine and L-glutamine hydrolysis activities, to a different degree, and some of them are annotated as asparaginase/glutaminase. — an NCBI CDD conserved domain (cd08964); members share this curated model.
