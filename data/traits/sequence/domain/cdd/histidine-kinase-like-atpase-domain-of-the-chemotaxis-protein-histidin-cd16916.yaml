identifier: CDD:cd16916
label: "Histidine kinase-like ATPase domain of the chemotaxis protein histidine kinase CheA, and some hybrid sensor histidine kinases. This family includes the cytoplasmic histidine kinase (HK) CheA, a transmembrane receptor which, together with cytoplasmic adaptor protein (CheW), forms the lattice at the core of the chemosensory array that controls the cellular chemotaxis of motile bacteria and archaea. CheA forms a two-component signal transduction system (TCS) with the response regulator CheY. Proteins having this CheA-like HATPase domain generally also have a histidine-phosphotransfer domain, a histidine kinase homodimeric domain, and a regulatory domain; some are hybrid sensor histidine kinases as they contain a REC signal receiver domain."
definition: >-
  Histidine kinase-like ATPase domain of the chemotaxis protein histidine kinase CheA, and some hybrid sensor histidine kinases. This family includes the cytoplasmic histidine kinase (HK) CheA, a transmembrane receptor which, together with cytoplasmic adaptor protein (CheW), forms the lattice at the core of the chemosensory array that controls the cellular chemotaxis of motile bacteria and archaea. CheA forms a two-component signal transduction system (TCS) with the response regulator CheY. Proteins having this CheA-like HATPase domain generally also have a histidine-phosphotransfer domain, a histidine kinase homodimeric domain, and a regulatory domain; some are hybrid sensor histidine kinases as they contain a REC signal receiver domain. — an NCBI CDD conserved domain (cd16916); members share this curated model.
