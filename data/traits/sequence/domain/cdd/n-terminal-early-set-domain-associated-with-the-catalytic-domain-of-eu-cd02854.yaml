identifier: CDD:cd02854
label: "N-terminal Early set domain associated with the catalytic domain of eukaryotic glycogen branching enzyme (also called 1,4 alpha glucan branching enzyme). This subfamily is composed of predominantly eukaryotic 1,4 alpha glucan branching enzymes, also called glycogen branching enzymes or starch binding enzymes in plants. E or \"early\" set domains are associated with the catalytic domain of the 1,4 alpha glucan branching enzymes at the N-terminal end. These enzymes catalyze the formation of alpha-1,6 branch points in either glycogen or starch by cleavage of the alpha-1,4 glucosidic linkage, yielding a non-reducing end oligosaccharide chain, as well as the subsequent attachment of short glucosyl chains to the alpha-1,6 position. Starch is composed of two types of glucan polymer: amylose and amylopectin. Amylose is mainly composed of linear chains of alpha-1,4 linked glucose residues and amylopectin consists of shorter alpha-1,4 linked chains connected by alpha-1,6 linkages. Amylopectin is synthesized from linear chains by starch branching enzyme. The N-terminal domains of the branching enzyme proteins may be related to the immunoglobulin and/or fibronectin type III superfamilies. These domains are associated with different types of catalytic domains at either the N-terminal or C-terminal end and may be involved in homodimeric/tetrameric/dodecameric interactions. Members of this family include members of the alpha amylase family, sialidase, galactose oxidase, cellulase, cellulose, hyaluronate lyase, chitobiase, and chitinase, among others."
definition: >-
  N-terminal Early set domain associated with the catalytic domain of eukaryotic glycogen branching enzyme (also called 1,4 alpha glucan branching enzyme). This subfamily is composed of predominantly eukaryotic 1,4 alpha glucan branching enzymes, also called glycogen branching enzymes or starch binding enzymes in plants. E or "early" set domains are associated with the catalytic domain of the 1,4 alpha glucan branching enzymes at the N-terminal end. These enzymes catalyze the formation of alpha-1,6 branch points in either glycogen or starch by cleavage of the alpha-1,4 glucosidic linkage, yielding a non-reducing end oligosaccharide chain, as well as the subsequent attachment of short glucosyl chains to the alpha-1,6 position. Starch is composed of two types of glucan polymer: amylose and amylopectin. Amylose is mainly composed of linear chains of alpha-1,4 linked glucose residues and amylopectin consists of shorter alpha-1,4 linked chains connected by alpha-1,6 linkages. Amylopectin is synthesized from linear chains by starch branching enzyme. The N-terminal domains of the branching enzyme proteins may be related to the immunoglobulin and/or fibronectin type III superfamilies. These domains are associated with different types of catalytic domains at either the N-terminal or C-terminal end and may be involved in homodimeric/tetrameric/dodecameric interactions. Members of this family include members of the alpha amylase family, sialidase, galactose oxidase, cellulase, cellulose, hyaluronate lyase, chitobiase, and chitinase, among others. — an NCBI CDD conserved domain (cd02854); members share this curated model.
