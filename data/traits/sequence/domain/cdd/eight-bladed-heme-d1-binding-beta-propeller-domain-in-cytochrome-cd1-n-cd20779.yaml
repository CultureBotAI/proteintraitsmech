identifier: CDD:cd20779
label: "eight-bladed heme d1-binding beta-propeller domain in cytochrome cd1 nitrate reductase NirS. Cytochrome cd1 nitrite reductase NiR is a key denitrification enzyme that catalyzes the conversion of nitrite to nitric oxide in the nitrogen cycle. The crystal structure of the oxidized enzyme shows that the d1 heme iron of the active site is ligated by His/Tyr side chains, and the c heme iron is ligated by a His/His ligand pair.  Nitrite reductase from Pseudomonas aeruginosa is a dimer of two identical subunits of 60 kDa, each containing one c and one d1 heme group. The c heme is the electron accepting pole of the molecule and is reduced in vitro by either azurin or cytochrome c551. The d1 heme is the site where nitrite, and oxygen reduction occur. The two types of heme are located in separate domains whose arrangement suggests a mechanism requiring domain movement during catalysis."
definition: >-
  eight-bladed heme d1-binding beta-propeller domain in cytochrome cd1 nitrate reductase NirS. Cytochrome cd1 nitrite reductase NiR is a key denitrification enzyme that catalyzes the conversion of nitrite to nitric oxide in the nitrogen cycle. The crystal structure of the oxidized enzyme shows that the d1 heme iron of the active site is ligated by His/Tyr side chains, and the c heme iron is ligated by a His/His ligand pair. Nitrite reductase from Pseudomonas aeruginosa is a dimer of two identical subunits of 60 kDa, each containing one c and one d1 heme group. The c heme is the electron accepting pole of the molecule and is reduced in vitro by either azurin or cytochrome c551. The d1 heme is the site where nitrite, and oxygen reduction occur. The two types of heme are located in separate domains whose arrangement suggests a mechanism requiring domain movement during catalysis. — an NCBI CDD conserved domain (cd20779); members share this curated model.
