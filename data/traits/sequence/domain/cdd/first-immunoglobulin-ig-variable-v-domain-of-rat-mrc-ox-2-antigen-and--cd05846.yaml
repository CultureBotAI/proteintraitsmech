identifier: CDD:cd05846
label: "First immunoglobulin (Ig) variable (V) domain of rat MRC OX-2 antigen, and similar domains. The members here are composed of the first immunoglobulin (Ig) domain of rat MRC OX-2 antigen (also known as CD200) and similar proteins. MRC OX-2 is a membrane glycoprotein expressed in a variety of lymphoid and non-lymphoid cells in rats. It has a similar broad distribution pattern in humans. MRC OX-2 may regulate myeloid cell activity. The protein has an extracellular portion containing two Ig-like domains, a transmembrane portion, and a cytoplasmic portion."
definition: >-
  First immunoglobulin (Ig) variable (V) domain of rat MRC OX-2 antigen, and similar domains. The members here are composed of the first immunoglobulin (Ig) domain of rat MRC OX-2 antigen (also known as CD200) and similar proteins. MRC OX-2 is a membrane glycoprotein expressed in a variety of lymphoid and non-lymphoid cells in rats. It has a similar broad distribution pattern in humans. MRC OX-2 may regulate myeloid cell activity. The protein has an extracellular portion containing two Ig-like domains, a transmembrane portion, and a cytoplasmic portion. — an NCBI CDD conserved domain (cd05846); members share this curated model.
