label: "nucleotide-binding domain (NBD) of the second repeat of Aquifex aeolicus hypothetical protein O66634 and similar proteins. The family includes a group of uncharacterized proteins similar to Aquifex aeolicus hypothetical protein O66634, which contains two copies of the BcrAD/BadFG-like domain, suggesting that the family may structurally dimerize. The model corresponds to the second copy of the BcrAD/BadFG-like domain."
definition: >-
  nucleotide-binding domain (NBD) of the second repeat of Aquifex aeolicus hypothetical protein O66634 and similar proteins. The family includes a group of uncharacterized proteins similar to Aquifex aeolicus hypothetical protein O66634, which contains two copies of the BcrAD/BadFG-like domain, suggesting that the family may structurally dimerize. The model corresponds to the second copy of the BcrAD/BadFG-like domain. — an NCBI CDD conserved domain (cd24035); members share this curated model.
