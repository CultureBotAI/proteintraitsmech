identifier: CDD:cd08835
label: "ArfGAP domain of ACAP (ArfGAP with Coiled-coil, ANK repeat and PH domains) proteins. ArfGAP domain is an essential part of ACAP proteins that play important role in endocytosis, actin remodeling and receptor tyrosine kinase-dependent cell movement. ACAP subfamily of ArfGAPs are composed of coiled coils (BAR, Bin-Amphiphysin-Rvs), PH, ArfGAP and ANK repeats domains. ACAP1 (centaurin beta1) and ACAP2 centaurin beta2) have a GAP (GTPase-activating protein) activity preferentially toward Arf6, which regulates endocytic recycling. Both ACAP1/2 are activated by are activated by the phosphoinositides, PI(4,5)P2 and PI(3,5)P2. ACAP1 binds specifically with recycling cargo proteins such as transferrin receptor (TfR) and cellubrevin. Thus, ACAP1 promotes cargo sorting to enhance TfR recycling from the recycling endosome. In addition, phosphorylation of ACAP by Akt, a serine/threonine protein kinase, regulates the recycling of integrin beta1 to control cell migration. In contrast, ACAP2 does not exhibit a similar interaction with the recycling cargo proteins. It has been shown that ACAP2 functions both as an effector of Ras-related protein Rab35 and as an Arf6-GTPase-activating protein (GAP) during neurite outgrowth of PC12 cells. In addition, ACAP2, together with Rab35, regulates phagocytosis in mammalian macrophages. ACAP3 also positively regulates neurite outgrowth through its GAP activity specific to Arf6 in mouse hippocampal neurons."
definition: >-
  ArfGAP domain of ACAP (ArfGAP with Coiled-coil, ANK repeat and PH domains) proteins. ArfGAP domain is an essential part of ACAP proteins that play important role in endocytosis, actin remodeling and receptor tyrosine kinase-dependent cell movement. ACAP subfamily of ArfGAPs are composed of coiled coils (BAR, Bin-Amphiphysin-Rvs), PH, ArfGAP and ANK repeats domains. ACAP1 (centaurin beta1) and ACAP2 centaurin beta2) have a GAP (GTPase-activating protein) activity preferentially toward Arf6, which regulates endocytic recycling. Both ACAP1/2 are activated by are activated by the phosphoinositides, PI(4,5)P2 and PI(3,5)P2. ACAP1 binds specifically with recycling cargo proteins such as transferrin receptor (TfR) and cellubrevin. Thus, ACAP1 promotes cargo sorting to enhance TfR recycling from the recycling endosome. In addition, phosphorylation of ACAP by Akt, a serine/threonine protein kinase, regulates the recycling of integrin beta1 to control cell migration. In contrast, ACAP2 does not exhibit a similar interaction with the recycling cargo proteins. It has been shown that ACAP2 functions both as an effector of Ras-related protein Rab35 and as an Arf6-GTPase-activating protein (GAP) during neurite outgrowth of PC12 cells. In addition, ACAP2, together with Rab35, regulates phagocytosis in mammalian macrophages. ACAP3 also positively regulates neurite outgrowth through its GAP activity specific to Arf6 in mouse hippocampal neurons. — an NCBI CDD conserved domain (cd08835); members share this curated model.
