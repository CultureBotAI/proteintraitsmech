identifier: CDD:cd06551
label: "Lysophospholipid acyltransferases (LPLATs) of glycerophospholipid biosynthesis. Lysophospholipid acyltransferase (LPLAT) superfamily members are acyltransferases of de novo and remodeling pathways of glycerophospholipid biosynthesis. These proteins catalyze the incorporation of an acyl group from either acylCoAs or acyl-acyl carrier proteins (acylACPs) into acceptors such as glycerol 3-phosphate, dihydroxyacetone phosphate or lyso-phosphatidic acid. Included in this superfamily are LPLATs such as glycerol-3-phosphate 1-acyltransferase (GPAT, PlsB), 1-acyl-sn-glycerol-3-phosphate acyltransferase (AGPAT, PlsC), lysophosphatidylcholine acyltransferase 1 (LPCAT-1), lysophosphatidylethanolamine acyltransferase (LPEAT, also known as, MBOAT2, membrane-bound O-acyltransferase domain-containing protein 2), lipid A biosynthesis lauroyl/myristoyl acyltransferase, 2-acylglycerol O-acyltransferase (MGAT), dihydroxyacetone phosphate acyltransferase (DHAPAT, also known as 1 glycerol-3-phosphate O-acyltransferase 1) and Tafazzin (the protein product of the Barth syndrome (TAZ) gene)."
definition: >-
  Lysophospholipid acyltransferases (LPLATs) of glycerophospholipid biosynthesis. Lysophospholipid acyltransferase (LPLAT) superfamily members are acyltransferases of de novo and remodeling pathways of glycerophospholipid biosynthesis. These proteins catalyze the incorporation of an acyl group from either acylCoAs or acyl-acyl carrier proteins (acylACPs) into acceptors such as glycerol 3-phosphate, dihydroxyacetone phosphate or lyso-phosphatidic acid. Included in this superfamily are LPLATs such as glycerol-3-phosphate 1-acyltransferase (GPAT, PlsB), 1-acyl-sn-glycerol-3-phosphate acyltransferase (AGPAT, PlsC), lysophosphatidylcholine acyltransferase 1 (LPCAT-1), lysophosphatidylethanolamine acyltransferase (LPEAT, also known as, MBOAT2, membrane-bound O-acyltransferase domain-containing protein 2), lipid A biosynthesis lauroyl/myristoyl acyltransferase, 2-acylglycerol O-acyltransferase (MGAT), dihydroxyacetone phosphate acyltransferase (DHAPAT, also known as 1 glycerol-3-phosphate O-acyltransferase 1) and Tafazzin (the protein product of the Barth syndrome (TAZ) gene). — an NCBI CDD conserved domain (cd06551); members share this curated model.
