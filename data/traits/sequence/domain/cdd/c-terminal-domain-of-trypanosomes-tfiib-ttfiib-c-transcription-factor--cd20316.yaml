label: "C-terminal domain of trypanosomes TFIIB (tTFIIB_C). Transcription factor IIB (TFIIB) in the pathogenic trypanosome is required for spliced leader (SL) RNA gene transcription and cell viability.Tthe production of mRNA depends on the synthesis of the SL RNA in trypanosomes. tTFIIB primary sequence is highly diverged from TFIIB of eukaryotes."
definition: >-
