identifier: CDD:cd07600
label: "The Bin/Amphiphysin/Rvs (BAR) domain of Saccharomyces cerevisiae Golgi vesicle protein of 36 kDa and similar proteins. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions including organelle biogenesis, membrane trafficking or remodeling, and cell division and migration. Proteomic analysis shows that Golgi vesicle protein of 36 kDa (Gvp36) may be involved in vesicular trafficking and nutritional adaptation. A Saccharomyces cerevisiae strain deficient in Gvp36 shows defects in growth, in actin cytoskeleton polarization, in endocytosis, in vacuolar biogenesis, and in the cell cycle. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions."
definition: >-
