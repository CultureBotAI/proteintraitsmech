identifier: CDD:cd11002
label: RNAP_ECF_Sig70
definition: >-
  RNAP sigma factor 70 ECF subfamily. This subfamily consists largely of the ECF (Extra-cytoplasmic function) sigma factor subfamily of Sigma 70, found primarily in Pseudomonas aeruginosa. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. A variety of regions on domain 2 are responsible for DNA promoter binding specificty at the -10 promoter recognition site and other functions in transcription initiation with aided by the entire sigma factor
