identifier: CDD:cd21378
label: "eukaryotic translation initiation factor 3 subunit E. Eukaryotic translation initiation factor 3 subunit E (eIF3E, also called INT6) is a subunit of eIF3, the largest initiation factor. eIF3 is involved in many steps of initiation, including ribosomal recruitment, attachment to mRNA, and scanning. The mammalian eIF3 complex has 13 subunits. Six subunits, including subunit E, contain PCI domains (N-terminal helical repeats and a winged helix domain or WHD) that mediates PCI polymerization. Mammalian eIF3e subunit interacts with eIF3C, eIF3D, eIF3L, and eIF3A subunits, as well as eIF4G and HERC2. It exhibits tumor suppressive or oncogenic functions depending on its expression level and/or tumor type; for example, decreased expression may cause breast cancer or non-small cell lung carcinoma while overexpression is correlated with colon cancer and glioblastoma. Decreased expression of eIF3E may also enable epithelial-mesenchymal transition (EMT), which is involved in adenomyosis by promoting cell invasion, and fibrogenesis by activating the TGF-beta1 signaling pathway."
definition: >-
  eukaryotic translation initiation factor 3 subunit E. Eukaryotic translation initiation factor 3 subunit E (eIF3E, also called INT6) is a subunit of eIF3, the largest initiation factor. eIF3 is involved in many steps of initiation, including ribosomal recruitment, attachment to mRNA, and scanning. The mammalian eIF3 complex has 13 subunits. Six subunits, including subunit E, contain PCI domains (N-terminal helical repeats and a winged helix domain or WHD) that mediates PCI polymerization. Mammalian eIF3e subunit interacts with eIF3C, eIF3D, eIF3L, and eIF3A subunits, as well as eIF4G and HERC2. It exhibits tumor suppressive or oncogenic functions depending on its expression level and/or tumor type; for example, decreased expression may cause breast cancer or non-small cell lung carcinoma while overexpression is correlated with colon cancer and glioblastoma. Decreased expression of eIF3E may also enable epithelial-mesenchymal transition (EMT), which is involved in adenomyosis by promoting cell invasion, and fibrogenesis by activating the TGF-beta1 signaling pathway. — an NCBI CDD conserved domain (cd21378); members share this curated model.
