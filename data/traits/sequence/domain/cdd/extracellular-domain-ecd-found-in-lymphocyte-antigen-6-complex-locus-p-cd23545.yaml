identifier: CDD:cd23545
label: "extracellular domain (ECD) found in lymphocyte antigen 6 complex locus protein G5c (Ly6G5c) and similar proteins. Ly6G5c is a glycosylated, potentially secreted protein which could act as ligand for other cell-surface receptors and could thus potentially have a role in cell signaling. Ly6G5c may have a role in hematopoietic cell differentiation. It contains an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in lymphocyte antigen 6 complex locus protein G5c (Ly6G5c) and similar proteins. Ly6G5c is a glycosylated, potentially secreted protein which could act as ligand for other cell-surface receptors and could thus potentially have a role in cell signaling. Ly6G5c may have a role in hematopoietic cell differentiation. It contains an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23545); members share this curated model.
