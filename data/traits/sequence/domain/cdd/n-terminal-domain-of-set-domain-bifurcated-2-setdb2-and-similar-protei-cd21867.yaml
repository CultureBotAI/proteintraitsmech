identifier: CDD:cd21867
label: SETDB2_NTD
definition: >-
  N-terminal domain of SET domain bifurcated 2 (SETDB2) and similar proteins. SETDB2, also called chronic lymphocytic leukemia deletion region gene 8 protein (CLLD8), or lysine N-methyltransferase 1F (KMT1F), is a histone-lysine N-methyltransferase involved in left-right axis specification in early development and mitosis. It specifically trimethylates 'Lys-9' of histone H3 (H3K9me3). The model corresponds to N-terminal domain of SETDB2
