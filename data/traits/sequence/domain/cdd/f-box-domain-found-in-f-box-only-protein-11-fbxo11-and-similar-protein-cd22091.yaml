identifier: CDD:cd22091
label: "F-box domain found in F-box only protein 11 (FBXO11) and similar proteins. FBXO11, also called FBX11, protein arginine N-methyltransferase 9 (PRMT9), or vitiligo-associated protein 1 (VIT-1), is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins, such as DTL/CDT2, BCL6 and PRDM1/BLIMP1. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 11 (FBXO11) and similar proteins. FBXO11, also called FBX11, protein arginine N-methyltransferase 9 (PRMT9), or vitiligo-associated protein 1 (VIT-1), is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins, such as DTL/CDT2, BCL6 and PRDM1/BLIMP1. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22091); members share this curated model.
