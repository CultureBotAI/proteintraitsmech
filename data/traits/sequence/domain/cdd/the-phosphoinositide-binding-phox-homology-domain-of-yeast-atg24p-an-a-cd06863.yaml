identifier: CDD:cd06863
label: "The phosphoinositide binding Phox Homology domain of yeast Atg24p, an autophagic degradation protein. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions. The yeast Atg24p is a sorting nexin (SNX) which is involved in membrane fusion events at the vacuolar surface during pexophagy. This is facilitated via binding of Atg24p to phosphatidylinositol 3-phosphate (PI3P) through its PX domain. SNXs make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway."
