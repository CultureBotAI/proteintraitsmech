identifier: CDD:cd16536
label: "RING finger, HC subclass, found in RING finger protein 10 (RNF10) and similar proteins. RNF10 is an E3 ubiquitin-protein ligase that interacts with mesenchyme Homeobox 2 (MEOX2) transcription factor, a regulator of the proliferation, differentiation and migration of vascular smooth muscle cells and cardiomyocytes; it enhances Meox2 activation of the p21 promoter. It also regulates the expression of myelin-associated glycoprotein (MAG) genes and is required for myelin production in Schwann cells of the peripheral nervous system. Moreover, RNF10 regulates retinoic acid-induced neuronal differentiation and the cell cycle exit of P19 embryonic carcinoma cells. RNF10 contains a C3HC4-type RING-HC finger and three putative nuclear localization signals."
definition: >-
  RING finger, HC subclass, found in RING finger protein 10 (RNF10) and similar proteins. RNF10 is an E3 ubiquitin-protein ligase that interacts with mesenchyme Homeobox 2 (MEOX2) transcription factor, a regulator of the proliferation, differentiation and migration of vascular smooth muscle cells and cardiomyocytes; it enhances Meox2 activation of the p21 promoter. It also regulates the expression of myelin-associated glycoprotein (MAG) genes and is required for myelin production in Schwann cells of the peripheral nervous system. Moreover, RNF10 regulates retinoic acid-induced neuronal differentiation and the cell cycle exit of P19 embryonic carcinoma cells. RNF10 contains a C3HC4-type RING-HC finger and three putative nuclear localization signals. — an NCBI CDD conserved domain (cd16536); members share this curated model.
