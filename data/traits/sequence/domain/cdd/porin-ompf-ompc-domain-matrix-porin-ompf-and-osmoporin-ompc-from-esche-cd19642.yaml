identifier: CDD:cd19642
label: "Porin OmpF/OmpC domain. Matrix porin OmpF and osmoporin OmpC from Escherichia coli are differentially expressed depending on environmental conditions. OmpF and OmpC differ in their uptake of nutrients with OmpF having an advantage for the uptake of glucose and OmpC favoring histidine as nitrogen source. The OmpC structure suggests that it is not its smaller pore size, but electrostatic pore potential and particular atomic details of the pore linings are the critical parameters that physiologically distinguish OmpC from OmpF. Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane.  They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances.  Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface."
definition: >-
  Porin OmpF/OmpC domain. Matrix porin OmpF and osmoporin OmpC from Escherichia coli are differentially expressed depending on environmental conditions. OmpF and OmpC differ in their uptake of nutrients with OmpF having an advantage for the uptake of glucose and OmpC favoring histidine as nitrogen source. The OmpC structure suggests that it is not its smaller pore size, but electrostatic pore potential and particular atomic details of the pore linings are the critical parameters that physiologically distinguish OmpC from OmpF. Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane. They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances. Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface. — an NCBI CDD conserved domain (cd19642); members share this curated model.
