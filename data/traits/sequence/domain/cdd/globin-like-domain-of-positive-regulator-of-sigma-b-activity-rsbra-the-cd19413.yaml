identifier: CDD:cd19413
label: "globin-like domain of positive regulator of sigma-B activity (RsbRA). The globin-like domain of Bacillus subtilis RsbRA is a non-heme globin presumed to channel sensory input to the C-terminal sulfate transporter/anti-sigma factor antagonist (STAT) domain. RsbRA is a component of the sigma B-activating stressosome, and a regulator of the RNA polymerase sigma factor subunit sigma (B)."
definition: >-
  globin-like domain of positive regulator of sigma-B activity (RsbRA). The globin-like domain of Bacillus subtilis RsbRA is a non-heme globin presumed to channel sensory input to the C-terminal sulfate transporter/anti-sigma factor antagonist (STAT) domain. RsbRA is a component of the sigma B-activating stressosome, and a regulator of the RNA polymerase sigma factor subunit sigma (B). — an NCBI CDD conserved domain (cd19413); members share this curated model.
