identifier: CDD:cd21430
label: PEX21_P7BD
definition: >-
  Pex7p-binding domain (Pex7pBD) found in peroxisomal membrane protein peroxin-21 (Pex21p) and similar proteins. Pex21p is involved in peroxisome biogenesis and the import of peroxisomal matrix proteins that contain the peroxisomal targeting sequence PTS2. It is required for peroxisomal targeting of Pex7 and growth on oleate. It also acts as an activator of the seryl-tRNA synthetase SES1 by increasing its binding to tRNA. The model corresponds to the Pex7p-binding domain (Pex7pBD) at the C-terminus of Pex21p. It is essential for the interaction with Pex7p and the import of PTS2-cargos into peroxisomes
