identifier: CDD:cd17074
label: "ubiquitin-like (Ubl) domain found in Mycobacterium tuberculosis CysO and similar proteins. CysO, also termed 9.5 kDa culture filtrate antigen cfp10A, together with CysM (Cysteine synthase M), forms a protein complex CysM-CysO that represents a new cysteine biosynthetic pathway in Mycobacterium tuberculosis. The replacement of the acetyl group of O-acetylserine by CysO thiocarboxylate to generate a protein-bound cysteine is catalyzed by CysM in a pyridoxal 5?-phosphate (PLP)-dependent manner. The family also includes QbsE that functions as the sulfide donor for the biosynthesis of thioquinolobactin in Pseudomonas fluorescens. A JAMM motif protein QbsD catalyzes removal of the carboxy-terminal dipeptide from QbsE. Both CysO and QbsE are similar to prokaryotic sulfur carrier proteins such as ThiS and MoaD, containing the beta-grasp ubiquitin-like fold."
definition: >-
  ubiquitin-like (Ubl) domain found in Mycobacterium tuberculosis CysO and similar proteins. CysO, also termed 9.5 kDa culture filtrate antigen cfp10A, together with CysM (Cysteine synthase M), forms a protein complex CysM-CysO that represents a new cysteine biosynthetic pathway in Mycobacterium tuberculosis. The replacement of the acetyl group of O-acetylserine by CysO thiocarboxylate to generate a protein-bound cysteine is catalyzed by CysM in a pyridoxal 5?-phosphate (PLP)-dependent manner. The family also includes QbsE that functions as the sulfide donor for the biosynthesis of thioquinolobactin in Pseudomonas fluorescens. A JAMM motif protein QbsD catalyzes removal of the carboxy-terminal dipeptide from QbsE. Both CysO and QbsE are similar to prokaryotic sulfur carrier proteins such as ThiS and MoaD, containing the beta-grasp ubiquitin-like fold. — an NCBI CDD conserved domain (cd17074); members share this curated model.
