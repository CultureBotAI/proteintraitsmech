identifier: CDD:cd00372
label: Ribosomal_uS8
definition: >-
  Ribosomal small subunit protein uS8. uS8 is an important part of the translation process which is universally present in the small subunit of prokaryotic (S8) and eukaryotic (S15, S22) ribosomes. The ribosome small subunit is one of the two subunits of ribosome organelles that use mRNA as a template for protein synthesis in a process called translation. The small subunits of bacteria and eukaryotes have the same shape of head, body, platform, beak, and shoulder. Ribosomal protein uS8 is a primary rRNA binding protein that plays an important role in 30S ribosomal subunit assembly
