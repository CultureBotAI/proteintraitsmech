identifier: CDD:cd23453
label: "ricin B-type lectin domain, beta-trefoil fold, found in vacuolar protein sorting-associated protein 13D (VPS13D) and similar proteins. VPS13D is a ubiquitin-binding protein that is required for the regulation of mitochondrial size and clearance. It promotes mitochondrial clearance by mitochondrial autophagy (mitophagy), also possibly by positively regulating mitochondrial fission. Mitophagy plays an important role in regulating cell health and mitochondrial size and homeostasis. Mutations in VPS13D lead to a new recessive ataxia with spasticity and mitochondrial defects. VPS13D contains a ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in vacuolar protein sorting-associated protein 13D (VPS13D) and similar proteins. VPS13D is a ubiquitin-binding protein that is required for the regulation of mitochondrial size and clearance. It promotes mitochondrial clearance by mitochondrial autophagy (mitophagy), also possibly by positively regulating mitochondrial fission. Mitophagy plays an important role in regulating cell health and mitochondrial size and homeostasis. Mutations in VPS13D lead to a new recessive ataxia with spasticity and mitochondrial defects. VPS13D contains a ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site. — an NCBI CDD conserved domain (cd23453); members share this curated model.
