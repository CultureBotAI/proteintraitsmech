identifier: CDD:cd19891
label: "second double-stranded RNA binding motif of protein activator of the interferon-induced protein kinase (PRKRA) and similar proteins. PRKRA (also known as interferon-inducible double-stranded RNA-dependent protein kinase activator A, PKR-associated protein X (RAX), PKR-associating protein X, protein kinase, interferon-inducible double-stranded RNA-dependent activator, PACT, or HSD14) is a cellular activator for double-stranded RNA-dependent protein kinase during stress signaling. PRKRA contains three double-stranded RNA binding motifs (DSRMs). This model describes the second motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  second double-stranded RNA binding motif of protein activator of the interferon-induced protein kinase (PRKRA) and similar proteins. PRKRA (also known as interferon-inducible double-stranded RNA-dependent protein kinase activator A, PKR-associated protein X (RAX), PKR-associating protein X, protein kinase, interferon-inducible double-stranded RNA-dependent activator, PACT, or HSD14) is a cellular activator for double-stranded RNA-dependent protein kinase during stress signaling. PRKRA contains three double-stranded RNA binding motifs (DSRMs). This model describes the second motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19891); members share this curated model.
