identifier: CDD:cd13442
label: "C-terminal (CT) toxin domain of the contact-dependent growth inhibition (CDI) system of Burkholderia pseudomallei 1026b, and related proteins. CDI toxins are expressed by gram-negative bacteria as part of a mechanism to inhibit the growth of neighboring cells. This model represents the C-terminal (CT) toxin domain of CdiA effector proteins. CdiA secretion is dependent on the outer membrane protein CdiB. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered via the C-terminal domain. A wide variety of C-terminal toxin domains appear to exist; this particular example from Burkholderia pseudomallei 1026b and other bacteria appears to function as a Mg2+-dependent RNAse cleaving tRNA, most likely in the aminoacyl acceptor stem. This CdiA-Ct is structurally similar to another CDI toxin domain from B. pseudomallei E479 which is unrelated in sequence but has a similar nuclease domain, and shares similar fold and active-site architecture; it contains a core alpha/beta-fold that is characteristic of PD(D/E)XK superfamily nucleases."
definition: >-
  C-terminal (CT) toxin domain of the contact-dependent growth inhibition (CDI) system of Burkholderia pseudomallei 1026b, and related proteins. CDI toxins are expressed by gram-negative bacteria as part of a mechanism to inhibit the growth of neighboring cells. This model represents the C-terminal (CT) toxin domain of CdiA effector proteins. CdiA secretion is dependent on the outer membrane protein CdiB. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered via the C-terminal domain. A wide variety of C-terminal toxin domains appear to exist; this particular example from Burkholderia pseudomallei 1026b and other bacteria appears to function as a Mg2+-dependent RNAse cleaving tRNA, most likely in the aminoacyl acceptor stem. This CdiA-Ct is structurally similar to another CDI toxin domain from B. pseudomallei E479 which is unrelated in sequence but has a similar nuclease domain, and shares similar fold and active-site architecture; it contains a core alpha/beta-fold that is characteristic of PD(D/E)XK superfamily nucleases. — an NCBI CDD conserved domain (cd13442); members share this curated model.
