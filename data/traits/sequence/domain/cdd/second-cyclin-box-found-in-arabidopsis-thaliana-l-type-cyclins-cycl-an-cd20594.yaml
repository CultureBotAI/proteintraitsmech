identifier: CDD:cd20594
label: "second cyclin box found in Arabidopsis thaliana L-type cyclins (CycL) and similar proteins. Cyclin-L1-1 (CycL1), also called arginine-rich cyclin 1 (AtRCY1), or protein MODIFIER OF SNC1 12, is the cognate cyclin for cyclin-dependent kinase G1 (CDKG1). It is involved in regulation of DNA methylation and transcriptional silencing. It is required for synapsis and male meiosis, and for the proper splicing of specific resistance (R) genes. L-type cyclins contain two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain."
definition: >-
  second cyclin box found in Arabidopsis thaliana L-type cyclins (CycL) and similar proteins. Cyclin-L1-1 (CycL1), also called arginine-rich cyclin 1 (AtRCY1), or protein MODIFIER OF SNC1 12, is the cognate cyclin for cyclin-dependent kinase G1 (CDKG1). It is involved in regulation of DNA methylation and transcriptional silencing. It is required for synapsis and male meiosis, and for the proper splicing of specific resistance (R) genes. L-type cyclins contain two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20594); members share this curated model.
