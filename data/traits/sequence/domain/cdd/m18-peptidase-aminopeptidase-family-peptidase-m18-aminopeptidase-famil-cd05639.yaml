identifier: CDD:cd05639
label: "M18 peptidase aminopeptidase family. Peptidase M18 aminopeptidase family is widely distributed in bacteria and eukaryotes, but only the yeast aminopeptidase I and mammalian aspartyl aminopeptidase have been characterized to date. Yeast aminopeptidase I is active only in its dodecameric form with broad substrate specificity, acting on N-terminal leucine and most other amino acids. In contrast, the mammalian aspartyl aminopeptidase is highly selective for hydrolysis of N-terminal Asp or Glu residues from peptides. These enzymes have two catalytic zinc ions at the active site."
definition: >-
  M18 peptidase aminopeptidase family. Peptidase M18 aminopeptidase family is widely distributed in bacteria and eukaryotes, but only the yeast aminopeptidase I and mammalian aspartyl aminopeptidase have been characterized to date. Yeast aminopeptidase I is active only in its dodecameric form with broad substrate specificity, acting on N-terminal leucine and most other amino acids. In contrast, the mammalian aspartyl aminopeptidase is highly selective for hydrolysis of N-terminal Asp or Glu residues from peptides. These enzymes have two catalytic zinc ions at the active site. — an NCBI CDD conserved domain (cd05639); members share this curated model.
