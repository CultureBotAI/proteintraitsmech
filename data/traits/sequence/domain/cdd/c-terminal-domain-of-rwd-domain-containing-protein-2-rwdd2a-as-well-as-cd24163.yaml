identifier: CDD:cd24163
label: RWDD2_C
definition: >-
  C-terminal domain of RWD domain-containing protein 2. RWDD2A, as well as RWDD2B, are small proteins that contain an N-terminal RWD domain and a C-terminal domain of unknown function. The C-terminal domain is predicted (by AlphaFold) to adopt a fold similar to the C-terminal domain of Prp3, an essential U4/U6 di-snRNP-associated protein which plays a role in pre-mRNA splicing. The Prp3 C-terminal domain is a single-stranded RNA-binding domain
