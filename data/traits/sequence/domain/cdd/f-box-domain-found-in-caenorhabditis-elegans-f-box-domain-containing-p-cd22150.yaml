identifier: CDD:cd22150
label: "F-box domain found in Caenorhabditis elegans F-box domain-containing proteins (CeFBXA) and similar proteins. The family includes a group of uncharacterized Caenorhabditis elegans F-box domain-containing proteins. They may be components of SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complexes which mediate the ubiquitination and subsequent proteasomal degradation of target proteins. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Caenorhabditis elegans F-box domain-containing proteins (CeFBXA) and similar proteins. The family includes a group of uncharacterized Caenorhabditis elegans F-box domain-containing proteins. They may be components of SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complexes which mediate the ubiquitination and subsequent proteasomal degradation of target proteins. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22150); members share this curated model.
