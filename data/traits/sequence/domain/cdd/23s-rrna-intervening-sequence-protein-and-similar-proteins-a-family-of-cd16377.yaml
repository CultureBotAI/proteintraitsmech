identifier: CDD:cd16377
label: 23S_rRNA_IVP_like
definition: >-
  23S rRNA-intervening sequence protein and similar proteins. A family of functionally uncharacterized bacterial proteins, some of which are encoded by an atypically large intervening sequence present within some 23S rRNA genes. The distantly related bAvd protein, which also forms a homopentamer of four-helix bundles, has been suggested to interact with nucleic acids and a reverse transcriptase
