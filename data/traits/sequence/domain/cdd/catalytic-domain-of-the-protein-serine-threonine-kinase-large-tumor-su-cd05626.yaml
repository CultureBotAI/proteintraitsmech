identifier: CDD:cd05626
label: "Catalytic domain of the Protein Serine/Threonine Kinase, Large Tumor Suppressor 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. LATS2 is an essential mitotic regulator responsible for coordinating accurate cytokinesis completion and governing the stabilization of other mitotic regulators. It is also critical in the maintenance of proper chromosome number, genomic stability, mitotic fidelity, and the integrity of centrosome duplication. Downregulation of LATS2 is associated with poor prognosis in acute lymphoblastic leukemia and breast cancer. The LATS2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Protein Serine/Threonine Kinase, Large Tumor Suppressor 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. LATS2 is an essential mitotic regulator responsible for coordinating accurate cytokinesis completion and governing the stabilization of other mitotic regulators. It is also critical in the maintenance of proper chromosome number, genomic stability, mitotic fidelity, and the integrity of centrosome duplication. Downregulation of LATS2 is associated with poor prognosis in acute lymphoblastic leukemia and breast cancer. The LATS2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05626); members share this curated model.
