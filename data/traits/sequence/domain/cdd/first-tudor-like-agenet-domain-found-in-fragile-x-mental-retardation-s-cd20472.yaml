identifier: CDD:cd20472
label: "first Tudor-like Agenet domain found in fragile X mental retardation syndrome-related protein 1 (FXR1) and similar proteins. FXR1 is an RNA binding protein that interacts with the functionally similar proteins FMR1 and FXR2. It shuttles between the nucleus and cytoplasm and associates with polyribosomes, predominantly with the 60S ribosomal subunit. FXR1 contains two copies of the Tudor-like Agenet domain. The model corresponds to the first one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  first Tudor-like Agenet domain found in fragile X mental retardation syndrome-related protein 1 (FXR1) and similar proteins. FXR1 is an RNA binding protein that interacts with the functionally similar proteins FMR1 and FXR2. It shuttles between the nucleus and cytoplasm and associates with polyribosomes, predominantly with the 60S ribosomal subunit. FXR1 contains two copies of the Tudor-like Agenet domain. The model corresponds to the first one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20472); members share this curated model.
