identifier: CDD:cd22314
label: "Restriction endonuclease Bse634I and similar endonucleases. Bacillus stearothermophilus restriction endonuclease Bse634I recognizes the nucleotide sequence R|CCGGY (R = A or G, Y = T or C, with | designating the cleavage site)  and is an isoschisomer of Citrobacter freundii restriction endonuclease Cfr10I; it is active as a homotetramer and belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Restriction endonuclease Bse634I and similar endonucleases. Bacillus stearothermophilus restriction endonuclease Bse634I recognizes the nucleotide sequence R|CCGGY (R = A or G, Y = T or C, with | designating the cleavage site) and is an isoschisomer of Citrobacter freundii restriction endonuclease Cfr10I; it is active as a homotetramer and belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22314); members share this curated model.
