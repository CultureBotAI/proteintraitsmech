identifier: CDD:cd18367
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing proteins, KCTD8, KCTD12, KCTD16 and similar proteins. This subfamily of KCTD proteins includes KCTD8, KCTD12 (also called predominantly fetal expressed T1 domain/Pfetin), and KCTD16. They act as auxiliary subunits of GABAB receptors associated with mood disorders. KCTD8 interacts as a tetramer with GABRB1 and GABRB2. KCTD12 regulates agonist potency and kinetics of GABAB receptor signaling. It promotes tumorigenesis by facilitating CDC25B/CDK1/Aurora A-dependent G2/M transition. KCTD16 interacts with amyloid beta precursor protein (APP), a type I transmembrane protein involved in a variety of cellular processes such as cell adhesion, and axon guidance. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing proteins, KCTD8, KCTD12, KCTD16 and similar proteins. This subfamily of KCTD proteins includes KCTD8, KCTD12 (also called predominantly fetal expressed T1 domain/Pfetin), and KCTD16. They act as auxiliary subunits of GABAB receptors associated with mood disorders. KCTD8 interacts as a tetramer with GABRB1 and GABRB2. KCTD12 regulates agonist potency and kinetics of GABAB receptor signaling. It promotes tumorigenesis by facilitating CDC25B/CDK1/Aurora A-dependent G2/M transition. KCTD16 interacts with amyloid beta precursor protein (APP), a type I transmembrane protein involved in a variety of cellular processes such as cell adhesion, and axon guidance. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. — an NCBI CDD conserved domain (cd18367); members share this curated model.
