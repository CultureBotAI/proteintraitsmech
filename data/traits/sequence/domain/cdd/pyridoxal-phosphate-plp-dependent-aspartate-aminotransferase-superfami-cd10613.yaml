identifier: CDD:cd10613
label: Dopa
definition: >-
  Pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily: Glutamate decarboxylase-like. Glutamate decarboxylase type a subfamily 2. This family belongs to pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily (fold I). Based on sequence identity there are two distinct types of histidine and glutamate decarboxylases (types a and b). The major groups in this CD corresponds to DOPA/tyrosine decarboxylase (DDC) and histidine decarboxylase type a (HDC_a). HDC_a catalyzes the decarboxylation of histidine. All members in this CD are eukaryotic and bacterial in origin
