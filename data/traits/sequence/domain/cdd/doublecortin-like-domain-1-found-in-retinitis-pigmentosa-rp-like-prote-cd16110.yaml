identifier: CDD:cd16110
label: "Doublecortin-like domain 1 found in retinitis pigmentosa (RP)-like protein. RP-like protein family is part of doublecortin (DCX) family. It has double tandem DCX repeats that are associated with retinitis pigmentosa. DCX is a microtubule-associated protein (MAP) with a stable ubiquitin-like tertiary fold. Microtubules are key components of cytoskeleton that are involved in cell movement, shape determination, division and transport.  RP-like proteins are colocalized to the photoreceptor and share a function in outer segment disc morphogenesis."
definition: >-
  Doublecortin-like domain 1 found in retinitis pigmentosa (RP)-like protein. RP-like protein family is part of doublecortin (DCX) family. It has double tandem DCX repeats that are associated with retinitis pigmentosa. DCX is a microtubule-associated protein (MAP) with a stable ubiquitin-like tertiary fold. Microtubules are key components of cytoskeleton that are involved in cell movement, shape determination, division and transport. RP-like proteins are colocalized to the photoreceptor and share a function in outer segment disc morphogenesis. — an NCBI CDD conserved domain (cd16110); members share this curated model.
