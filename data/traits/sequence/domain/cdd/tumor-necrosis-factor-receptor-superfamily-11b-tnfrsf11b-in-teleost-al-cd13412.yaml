identifier: CDD:cd13412
label: "Tumor necrosis factor receptor superfamily 11B (TNFRSF11B) in teleost; also known as Osteoprotegerin (OPG). This subfamily of TNFRSF11B (also known as Osteoprotegerin, OPG, TR1, OCIF) is found in teleosts. It is a secreted glycoprotein that regulates bone resorption. It binds to two ligands, RANKL (receptor activator of nuclear factor kappaB ligand, also known as osteoprotegerin ligand, OPGL, TRANCE, TNF-related activation induced cytokine), a critical cytokine for osteoclast differentiation, and TRAIL (TNF-related apoptosis-inducing ligand), involved in immune surveillance. Therefore, acting as a decoy receptor for RANKL and TRAIL, OPG inhibits the regulatory effects of nuclear factor-kappaB on inflammation, skeletal, and vascular systems, and prevents TRAIL-induced apoptosis. Studies in mice counterparts suggest that this protein and its ligand also play a role in lymph-node organogenesis and vascular calcification. Circulating OPG levels have emerged as independent biomarkers of cardiovascular disease (CVD) in patients with acute or chronic heart disease. OPG has also been implicated in various inflammations and linked to diabetes and poor glycemic control. Alternatively spliced transcript variants of this gene have been reported, although their full length nature has not been determined. Genetic analysis of the Japanese rice fish medaka (Oryzias latipes) has shown that entire networks for bone formation are conserved between teleosts and mammals; enabling medaka to be used as a genetic model to monitor bone homeostasis in vivo."
definition: >-
  Tumor necrosis factor receptor superfamily 11B (TNFRSF11B) in teleost; also known as Osteoprotegerin (OPG). This subfamily of TNFRSF11B (also known as Osteoprotegerin, OPG, TR1, OCIF) is found in teleosts. It is a secreted glycoprotein that regulates bone resorption. It binds to two ligands, RANKL (receptor activator of nuclear factor kappaB ligand, also known as osteoprotegerin ligand, OPGL, TRANCE, TNF-related activation induced cytokine), a critical cytokine for osteoclast differentiation, and TRAIL (TNF-related apoptosis-inducing ligand), involved in immune surveillance. Therefore, acting as a decoy receptor for RANKL and TRAIL, OPG inhibits the regulatory effects of nuclear factor-kappaB on inflammation, skeletal, and vascular systems, and prevents TRAIL-induced apoptosis. Studies in mice counterparts suggest that this protein and its ligand also play a role in lymph-node organogenesis and vascular calcification. Circulating OPG levels have emerged as independent biomarkers of cardiovascular disease (CVD) in patients with acute or chronic heart disease. OPG has also been implicated in various inflammations and linked to diabetes and poor glycemic control. Alternatively spliced transcript variants of this gene have been reported, although their full length nature has not been determined. Genetic analysis of the Japanese rice fish medaka (Oryzias latipes) has shown that entire networks for bone formation are conserved between teleosts and mammals; enabling medaka to be used as a genetic model to monitor bone homeostasis in vivo. — an NCBI CDD conserved domain (cd13412); members share this curated model.
