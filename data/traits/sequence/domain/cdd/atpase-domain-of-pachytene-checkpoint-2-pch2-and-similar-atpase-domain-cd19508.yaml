identifier: CDD:cd19508
label: "ATPase domain of Pachytene checkpoint 2 (Pch2) and similar ATPase domains. Pch2 (known as Thyroid hormone receptor interactor 13 (TRIP13) and 16E1BP) is a key regulator of specific chromosomal events, like the control of G2/prophase processes such as DNA break formation and recombination, checkpoint signaling, and chromosome synapsis. This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion"
definition: >-
  ATPase domain of Pachytene checkpoint 2 (Pch2) and similar ATPase domains. Pch2 (known as Thyroid hormone receptor interactor 13 (TRIP13) and 16E1BP) is a key regulator of specific chromosomal events, like the control of G2/prophase processes such as DNA break formation and recombination, checkpoint signaling, and chromosome synapsis. This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion — an NCBI CDD conserved domain (cd19508); members share this curated model.
