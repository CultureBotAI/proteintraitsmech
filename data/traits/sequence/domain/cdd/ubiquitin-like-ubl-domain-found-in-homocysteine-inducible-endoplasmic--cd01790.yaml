identifier: CDD:cd01790
label: "ubiquitin-like (Ubl) domain found in homocysteine-inducible endoplasmic reticulum stress protein HERP. HERP is an endoplasmic reticulum (ER) integral membrane protein containing an N-terminal ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold. The Ubl domain is required for the degradation of HERP itself as well as for HERP-mediated anti-apoptotic effects. HERP is induced by the ER stress response pathway and is involved in improving the balance of folding capacity and protein loads in the ER. There are two types of HERP, HERP1 and HERP2, which are encoded by the HERPUD1 and HERPUD2 genes, respectively."
definition: >-
  ubiquitin-like (Ubl) domain found in homocysteine-inducible endoplasmic reticulum stress protein HERP. HERP is an endoplasmic reticulum (ER) integral membrane protein containing an N-terminal ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold. The Ubl domain is required for the degradation of HERP itself as well as for HERP-mediated anti-apoptotic effects. HERP is induced by the ER stress response pathway and is involved in improving the balance of folding capacity and protein loads in the ER. There are two types of HERP, HERP1 and HERP2, which are encoded by the HERPUD1 and HERPUD2 genes, respectively. — an NCBI CDD conserved domain (cd01790); members share this curated model.
