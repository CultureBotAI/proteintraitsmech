identifier: CDD:cd20035
label: FH_FOXQ2-like
definition: >-
  Forkhead (FH) domain found in Forkhead box protein Q2 (FOXQ2) and similar proteins. FOXQ2 is the neurogenic ectoderm specification transcription factor that controls aboral development in cnidarians and anterior identity in bilaterians. It plays essential roles in epidermal development and central brain patterning. The foxQ2 gene is absent in placental mammals. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'
