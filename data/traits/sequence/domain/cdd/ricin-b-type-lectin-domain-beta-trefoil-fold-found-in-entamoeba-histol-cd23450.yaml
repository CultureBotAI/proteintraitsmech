identifier: CDD:cd23450
label: beta-trefoil_Ricin_EntTref
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Entamoeba histolytica lectin (EntTref) and similar proteins. EntTref is a ricin B-like lectin with a beta-trefoil fold that is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Only its alpha subdomain harbors a sugar-binding pocket. Its beta and gamma subdomains lack the carbohydrate-binding ability because of the absence of stacking interactions and other residues forming specific hydrogen bonds with the sugar atoms as in the alpha subdomain. EntTref binds to rhamnose, galactose and galactose-linked sugars
