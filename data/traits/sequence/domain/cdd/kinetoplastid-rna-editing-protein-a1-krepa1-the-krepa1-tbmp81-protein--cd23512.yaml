identifier: CDD:cd23512
label: "Kinetoplastid RNA Editing Protein A1 (KREPA1). The KREPA1 (TbMP81) protein is a crucial component of the parasitic protozoan's KREPA RNA editing complex. Kinetoplastid RNA editing (KRE) proteins occur as pairs or sets of related proteins in multiple complexes. KREPA complex is composed of six components (KREPA1-6), which share a conserved C-terminal region containing an oligonucleotide-binding (OB)-fold-like domain. KREPAs are responsible for the site-specific insertion and deletion of U nucleotides in the kinetoplastid mitochondria pre-messenger RNA. Apart from the conserved C-terminal OB-fold domain, KREPA1, KREPA2, and KREPA3 contain two conserved C2H2 zinc-finger domains. However, the C-terminal zinc-finger domain in KREPA1 has additional amino acids. KREPA1 is involved in the insertion sub-complex of editing activities and interacts with KREPA6 of the 20S editosome core complex. When KREPA1 is down-regulated, insertion editing is preferentially inhibited."
definition: >-
  Kinetoplastid RNA Editing Protein A1 (KREPA1). The KREPA1 (TbMP81) protein is a crucial component of the parasitic protozoan's KREPA RNA editing complex. Kinetoplastid RNA editing (KRE) proteins occur as pairs or sets of related proteins in multiple complexes. KREPA complex is composed of six components (KREPA1-6), which share a conserved C-terminal region containing an oligonucleotide-binding (OB)-fold-like domain. KREPAs are responsible for the site-specific insertion and deletion of U nucleotides in the kinetoplastid mitochondria pre-messenger RNA. Apart from the conserved C-terminal OB-fold domain, KREPA1, KREPA2, and KREPA3 contain two conserved C2H2 zinc-finger domains. However, the C-terminal zinc-finger domain in KREPA1 has additional amino acids. KREPA1 is involved in the insertion sub-complex of editing activities and interacts with KREPA6 of the 20S editosome core complex. When KREPA1 is down-regulated, insertion editing is preferentially inhibited. — an NCBI CDD conserved domain (cd23512); members share this curated model.
