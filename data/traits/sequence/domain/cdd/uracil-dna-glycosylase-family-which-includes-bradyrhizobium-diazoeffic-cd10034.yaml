identifier: CDD:cd10034
label: "Uracil DNA glycosylase family which includes Bradyrhizobium diazoefficiens Blr0248 (BdiUng) and similar proteins. Bradyrhizobium diazoefficiens (previously B. japonicum) Blr0248 uracil-DNA glycosylase (BdiUng) has broad substrate specificity, preferring single-stranded DNA and removing uracil, 5-hydroxymethyl-uracil or xanthine from it. BdiUng is impervious to inhibition by AP DNA, and Ugi protein that specifically inhibits conventional family 1 UDGs. Uracil-DNA glycosylases (UDGs) initiate repair of uracils in DNA. Uracil in DNA can arise as a result of mis-incorporation of dUMP residues by DNA polymerase or via deamination of cytosine. Uracil in DNA mispaired with guanine is one of the major pro-mutagenic events, causing G:C->A:T mutations. Thus, UDG is an essential enzyme for maintaining the integrity of genetic information. UDGs have been classified into various families on the basis of their substrate specificity, conserved motifs, and structural similarities. Although these families demonstrate different substrate specificities, often the function of one enzyme can be complemented by the other."
definition: >-
  Uracil DNA glycosylase family which includes Bradyrhizobium diazoefficiens Blr0248 (BdiUng) and similar proteins. Bradyrhizobium diazoefficiens (previously B. japonicum) Blr0248 uracil-DNA glycosylase (BdiUng) has broad substrate specificity, preferring single-stranded DNA and removing uracil, 5-hydroxymethyl-uracil or xanthine from it. BdiUng is impervious to inhibition by AP DNA, and Ugi protein that specifically inhibits conventional family 1 UDGs. Uracil-DNA glycosylases (UDGs) initiate repair of uracils in DNA. Uracil in DNA can arise as a result of mis-incorporation of dUMP residues by DNA polymerase or via deamination of cytosine. Uracil in DNA mispaired with guanine is one of the major pro-mutagenic events, causing G:C->A:T mutations. Thus, UDG is an essential enzyme for maintaining the integrity of genetic information. UDGs have been classified into various families on the basis of their substrate specificity, conserved motifs, and structural similarities. Although these families demonstrate different substrate specificities, often the function of one enzyme can be complemented by the other. — an NCBI CDD conserved domain (cd10034); members share this curated model.
