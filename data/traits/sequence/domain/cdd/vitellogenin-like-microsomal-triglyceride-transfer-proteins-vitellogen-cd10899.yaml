identifier: CDD:cd10899
label: Vitellogenin_like_MTT
definition: >-
  Vitellogenin-like microsomal triglyceride transfer proteins. Vitellogenin_like; This family contains Microsomal triglyceride transfer protein large subunit. The 97KD microsomal triglyceride transfer protein subunit forms a heterodimer with the ubiquitous endoplasmic reticulum enzyme protein disulfide isomerase (PDI). The complex is resident in the endoplasmic reticulum and catalyzes the transfer of lipids between phospholipid surfaces. Mutation of MTT is associated with abetalipoproteinemia in humans
