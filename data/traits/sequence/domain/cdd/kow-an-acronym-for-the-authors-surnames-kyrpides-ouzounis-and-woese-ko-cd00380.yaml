identifier: CDD:cd00380
label: "KOW: an acronym for the authors' surnames (Kyrpides, Ouzounis and Woese). KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4. The KOW motif contains an invariants glycine residue and comprises alternating blocks of hydrophilic and hydrophobic residues."
definition: >-
  KOW: an acronym for the authors' surnames (Kyrpides, Ouzounis and Woese). KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4. The KOW motif contains an invariants glycine residue and comprises alternating blocks of hydrophilic and hydrophobic residues. — an NCBI CDD conserved domain (cd00380); members share this curated model.
