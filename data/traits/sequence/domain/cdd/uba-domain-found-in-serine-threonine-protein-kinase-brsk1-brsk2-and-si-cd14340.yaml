identifier: CDD:cd14340
label: "UBA domain found in serine/threonine-protein kinase BRSK1, BRSK2 and similar proteins. The family includes brain-specific kinases BRSK1 and BRSK2. They are AMP-activated protein kinase (AMPK)-related kinases that are highly expressed in mammalian forebrain and crucial for establishing neuronal polarity.BRSK1, also called brain-selective kinase 1, brain-specific serine/threonine-protein kinase 1, BR serine/threonine-protein kinase 1, serine/threonine-protein kinase SAD-B, or synapses of Amphids Defective homolog 1 (SAD1 homolog), is associated with synaptic vesicles and is tightly associated with the presynaptic cytomatrix in nerve terminals. It can regulate neurotransmitter release presynaptically. BRSK2, also called brain-selective kinase 2, brain-specific serine/threonine-protein kinase 2, BR serine/threonine-protein kinase 2, serine/threonine-protein kinase 29, or serine/threonine-protein kinase SAD-A is an AMP-activated protein kinase (AMPK)-related kinase exclusively expressed in brain and pancreas. It plays an essential role in neuronal polarization. It interacts with CDK-related protein kinase PCTAIRE1, a kinase involved in neurite outgrowth and neurotransmitter release, and further negatively regulates glucose-stimulated insulin secretion (GSIS) in pancreatic beta-cells through activation of p21-activated kinase-1 (PAK1). BRSK2 also regulates cell-cycle progression controlled by APC/C(Cdh1) through the ubiquitin-proteasome pathway. Moreover, BRSK2 is regulated by endoplasmic reticulum (ER) stress in protein level and involved in ER stress-induced apoptosis. Both BRSK1 and BRSK2 contain an N-terminal protein kinase catalytic domain followed by an ubiquitin-associated (UBA) domain."
definition: >-
  UBA domain found in serine/threonine-protein kinase BRSK1, BRSK2 and similar proteins. The family includes brain-specific kinases BRSK1 and BRSK2. They are AMP-activated protein kinase (AMPK)-related kinases that are highly expressed in mammalian forebrain and crucial for establishing neuronal polarity.BRSK1, also called brain-selective kinase 1, brain-specific serine/threonine-protein kinase 1, BR serine/threonine-protein kinase 1, serine/threonine-protein kinase SAD-B, or synapses of Amphids Defective homolog 1 (SAD1 homolog), is associated with synaptic vesicles and is tightly associated with the presynaptic cytomatrix in nerve terminals. It can regulate neurotransmitter release presynaptically. BRSK2, also called brain-selective kinase 2, brain-specific serine/threonine-protein kinase 2, BR serine/threonine-protein kinase 2, serine/threonine-protein kinase 29, or serine/threonine-protein kinase SAD-A is an AMP-activated protein kinase (AMPK)-related kinase exclusively expressed in brain and pancreas. It plays an essential role in neuronal polarization. It interacts with CDK-related protein kinase PCTAIRE1, a kinase involved in neurite outgrowth and neurotransmitter release, and further negatively regulates glucose-stimulated insulin secretion (GSIS) in pancreatic beta-cells through activation of p21-activated kinase-1 (PAK1). BRSK2 also regulates cell-cycle progression controlled by APC/C(Cdh1) through the ubiquitin-proteasome pathway. Moreover, BRSK2 is regulated by endoplasmic reticulum (ER) stress in protein level and involved in ER stress-induced apoptosis. Both BRSK1 and BRSK2 contain an N-terminal protein kinase catalytic domain followed by an ubiquitin-associated (UBA) domain. — an NCBI CDD conserved domain (cd14340); members share this curated model.
