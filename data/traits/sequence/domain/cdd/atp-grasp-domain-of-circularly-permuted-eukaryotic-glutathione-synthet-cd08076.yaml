identifier: CDD:cd08076
label: "ATP-grasp domain of circularly permuted eukaryotic glutathione synthetase. ATP-grasp domain of human glutathione synthetase (hGS, EC: 6.3.2.3) which catalyzes the production of glutathione (GSH) from glycine and gamma-glutamylcysteine in the presence of ATP. Mg ions are utilized as a cofactor. Sequence-structure comparision reveals a rare gene permutation that results into a circular shift in the core structure hGS with respect to other members of ATP-grasp superfamily. Mutation in human glutathione synthase gene (GSS) results into glutathione synthase deficiency which is associated with progressive retinal dystrophy of the rod-cone type, affecting the central retina with advanced macular edema in adulthood. The hGS protein occurs as a homodimer and is 474 amino acids in length with a subunit molecular mass of 52,352 Da."
definition: >-
