identifier: CDD:cd14311
label: "UBA domain of yeast ubiquitin-conjugating enzyme E2 1 (UBC1) and similar proteins. UBC1, also called ubiquitin-conjugating enzyme E2-24 kDa, or ubiquitin-protein ligase, is the yeast homolog of mammalian ubiquitin-conjugating enzyme E2 K (UBE2K or E2-25K). UBC1 and UBE2K are unique class II E2 conjugating enzymes, both of which contain a C-terminal ubiquitin-associated (UBA) domain in addition to an N-terminal catalytic ubiquitin-conjugating enzyme E2 (UBCc) domain. The yeast UBC1 plays an important role in the degradation of short-lived proteins especially during the G0-G1 transition accompanying spore germination."
definition: >-
  UBA domain of yeast ubiquitin-conjugating enzyme E2 1 (UBC1) and similar proteins. UBC1, also called ubiquitin-conjugating enzyme E2-24 kDa, or ubiquitin-protein ligase, is the yeast homolog of mammalian ubiquitin-conjugating enzyme E2 K (UBE2K or E2-25K). UBC1 and UBE2K are unique class II E2 conjugating enzymes, both of which contain a C-terminal ubiquitin-associated (UBA) domain in addition to an N-terminal catalytic ubiquitin-conjugating enzyme E2 (UBCc) domain. The yeast UBC1 plays an important role in the degradation of short-lived proteins especially during the G0-G1 transition accompanying spore germination. — an NCBI CDD conserved domain (cd14311); members share this curated model.
