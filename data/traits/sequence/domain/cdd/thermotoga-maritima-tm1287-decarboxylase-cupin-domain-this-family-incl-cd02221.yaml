identifier: CDD:cd02221
label: "Thermotoga maritima TM1287 decarboxylase, cupin domain. This family includes bacterial proteins homologous to TM1287 decarboxylase, a Thermotoga maritima manganese-containing cupin thought to catalyze the conversion of oxalate to formate and carbon dioxide, due to its similarity to oxalate decarboxylase (OXDC) from Bacillus subtilis. TM1287 shows a cupin fold with a conserved \"jelly roll-like\" beta-barrel fold and forms a homodimer."
definition: >-
  Thermotoga maritima TM1287 decarboxylase, cupin domain. This family includes bacterial proteins homologous to TM1287 decarboxylase, a Thermotoga maritima manganese-containing cupin thought to catalyze the conversion of oxalate to formate and carbon dioxide, due to its similarity to oxalate decarboxylase (OXDC) from Bacillus subtilis. TM1287 shows a cupin fold with a conserved "jelly roll-like" beta-barrel fold and forms a homodimer. — an NCBI CDD conserved domain (cd02221); members share this curated model.
