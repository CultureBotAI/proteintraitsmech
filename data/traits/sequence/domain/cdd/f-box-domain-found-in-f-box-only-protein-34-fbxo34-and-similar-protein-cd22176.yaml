identifier: CDD:cd22176
label: "F-box domain found in F-box only protein 34 (FBXO34) and similar proteins. FBXO34, also called FBX34, likely functions as the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 34 (FBXO34) and similar proteins. FBXO34, also called FBX34, likely functions as the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22176); members share this curated model.
