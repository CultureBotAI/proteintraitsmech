label: YchN_like_DsrE
definition: >-
  DsrE (DsrE/YheN/TusD) intracellular sulfur oxidation protein, contains a YchN-like fold. DsrE is a subunit of the bacterial DsrEFH complex involved in sulfur oxidation. This family includes Escherichia coli TusD (YheN)
