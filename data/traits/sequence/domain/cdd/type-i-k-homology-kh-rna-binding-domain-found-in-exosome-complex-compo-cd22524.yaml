identifier: CDD:cd22524
label: "type I K homology (KH) RNA-binding domain found in exosome complex component Rrp4 mainly from archaea. The subfamily corresponds to ribosomal RNA-processing protein 4 (Rrp4) mainly from archaea. It is a non-catalytic component of the exosome, which is a phosphorolytic 3'-5' exoribonuclease complex involved in RNA degradation and processing. Rrp4 increases the RNA binding and the efficiency of RNA degradation and confers strong poly(A) specificity to the exosome."
definition: >-
  type I K homology (KH) RNA-binding domain found in exosome complex component Rrp4 mainly from archaea. The subfamily corresponds to ribosomal RNA-processing protein 4 (Rrp4) mainly from archaea. It is a non-catalytic component of the exosome, which is a phosphorolytic 3'-5' exoribonuclease complex involved in RNA degradation and processing. Rrp4 increases the RNA binding and the efficiency of RNA degradation and confers strong poly(A) specificity to the exosome. — an NCBI CDD conserved domain (cd22524); members share this curated model.
