identifier: CDD:cd16385
label: IcmL
definition: >-
  inner membrane protein IcmL/DotI. This family contains the periplasmic domain of the inner membrane protein DotI of the Dot/Icm (defect in organelle trafficking/intracellular multiplication) type IVB secretion system, including its ortholog in the conjugation system of plasmid R64, TraM, and similar proteins. These domains share striking structural similarity to the type IV secretion system (T4ASS) component VirB8 suggesting DotI/TraM to be its functional counterpart. DotI is essential for intracellular growth of Legionella pneumophila (causing agent of Legionnaires' disease) within mammalian and protozoan cells; it translocates numerous effector proteins into its eukaryotic host
