identifier: CDD:cd17882
label: "Ribosomal protein L39-like (L39-L). Ribosomal Protein L39-L is a homolog of ribosomal protein L39 that is normally expressed in the human testis and derepressed in multiple cancer cells. Ribosomal protein L39 binds the large ribosomal subunit in the region surrounding the distal end of the polypeptide exit tunnel. The ribosome is a large complex catalyst responsible for the synthesis of new proteins. Ribosomal features at the exit of the tunnel can play a role in the regulation of nascent chain exit and ion flux."
definition: >-
  Ribosomal protein L39-like (L39-L). Ribosomal Protein L39-L is a homolog of ribosomal protein L39 that is normally expressed in the human testis and derepressed in multiple cancer cells. Ribosomal protein L39 binds the large ribosomal subunit in the region surrounding the distal end of the polypeptide exit tunnel. The ribosome is a large complex catalyst responsible for the synthesis of new proteins. Ribosomal features at the exit of the tunnel can play a role in the regulation of nascent chain exit and ion flux. — an NCBI CDD conserved domain (cd17882); members share this curated model.
