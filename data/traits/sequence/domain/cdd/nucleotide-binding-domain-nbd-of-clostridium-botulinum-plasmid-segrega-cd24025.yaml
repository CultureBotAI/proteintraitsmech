identifier: CDD:cd24025
label: "nucleotide-binding domain (NBD) of Clostridium botulinum plasmid segregation protein ParM and similar proteins from the ParM domain family. The family corresponds to a group of uncharacterized proteins similar to Clostridium botulinum pCBH plasmid segregation protein ParM, an actin-like polymerizing motor. pCBH ParM filament structure is far more complex in comparison to the known filament structures of actin, MreB, and other ParMs. It is bipolar and stiff and like microtubules. The 15 polymerizing strands are likely to exert greater combined force relative to typical two-stranded actin-like filaments."
definition: >-
  nucleotide-binding domain (NBD) of Clostridium botulinum plasmid segregation protein ParM and similar proteins from the ParM domain family. The family corresponds to a group of uncharacterized proteins similar to Clostridium botulinum pCBH plasmid segregation protein ParM, an actin-like polymerizing motor. pCBH ParM filament structure is far more complex in comparison to the known filament structures of actin, MreB, and other ParMs. It is bipolar and stiff and like microtubules. The 15 polymerizing strands are likely to exert greater combined force relative to typical two-stranded actin-like filaments. — an NCBI CDD conserved domain (cd24025); members share this curated model.
