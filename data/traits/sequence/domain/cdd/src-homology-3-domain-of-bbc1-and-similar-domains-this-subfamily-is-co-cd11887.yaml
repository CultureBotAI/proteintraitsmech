identifier: CDD:cd11887
label: "Src Homology 3 domain of Bbc1 and similar domains. This subfamily is composed of Saccharomyces cerevisiae Bbc1p, also called Mti1p (Myosin tail region-interacting protein), and similar proteins. Bbc1p interacts with and regulates type I myosins in yeast, Myo3p and Myo5p, which are involved in actin cytoskeletal reorganization. It also binds and inhibits Las17, a WASp family protein that functions as an activator of the Arp2/3 complex. Bbc1p contains an N-terminal SH3 domain. SH3 domains bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs; they play a role in the regulation of enzymes by intramolecular interactions, changing the subcellular localization of signal pathway components and mediate multiprotein complex assemblies."
definition: >-
