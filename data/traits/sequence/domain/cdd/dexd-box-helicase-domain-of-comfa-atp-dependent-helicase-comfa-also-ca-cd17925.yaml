identifier: CDD:cd17925
label: "DEXD-box helicase domain of ComFA. ATP-dependent helicase ComFA (also called ComF operon protein 1) is part of the complex mediating the binding and uptake of single-stranded DNA. ComFA is required for DNA uptake but not for binding. It belongs to the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXD-box helicase domain of ComFA. ATP-dependent helicase ComFA (also called ComF operon protein 1) is part of the complex mediating the binding and uptake of single-stranded DNA. ComFA is required for DNA uptake but not for binding. It belongs to the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17925); members share this curated model.
