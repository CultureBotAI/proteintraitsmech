identifier: CDD:cd08702
label: "C-terminal subdomain of the formyltransferase domain on ArnA, which modifies lipid A with 4-amino-4-deoxy-l-arabinose. Domain found in ArnA with similarity to the C-terminal domain of Formyltransferase. ArnA is a bifunctional enzyme required for the modification of lipid A with 4-amino-4-deoxy-l-arabinose (Ara4N) that leads to resistance to cationic antimicrobial peptides (CAMPs) and clinical antimicrobials such as polymyxin. The C-terminal domain of ArnA is a dehydrogenase domain that catalyzes the oxidative decarboxylation of UDP-glucuronic acid (UDP-GlcUA) to UDP-4-keto-arabinose (UDP-Ara4O) and the N-terminal domain is a formyltransferase domain that catalyzes the addition of a formyl group to UDP-4-amino-4-deoxy-L-arabinose (UDP-L-Ara4N) to form UDP-L-4-formamido-arabinose (UDP-L-Ara4FN). This domain family represents the C-terminal subdomain of the formyltransferase domain, downstream of the N-terminal subdomain containing the catalytic center. ArnA forms a hexameric structure (a dimer of trimers), in which the dehydrogenase domains are arranged at the center with the transformylase domains on the outside of the complex."
definition: >-
  C-terminal subdomain of the formyltransferase domain on ArnA, which modifies lipid A with 4-amino-4-deoxy-l-arabinose. Domain found in ArnA with similarity to the C-terminal domain of Formyltransferase. ArnA is a bifunctional enzyme required for the modification of lipid A with 4-amino-4-deoxy-l-arabinose (Ara4N) that leads to resistance to cationic antimicrobial peptides (CAMPs) and clinical antimicrobials such as polymyxin. The C-terminal domain of ArnA is a dehydrogenase domain that catalyzes the oxidative decarboxylation of UDP-glucuronic acid (UDP-GlcUA) to UDP-4-keto-arabinose (UDP-Ara4O) and the N-terminal domain is a formyltransferase domain that catalyzes the addition of a formyl group to UDP-4-amino-4-deoxy-L-arabinose (UDP-L-Ara4N) to form UDP-L-4-formamido-arabinose (UDP-L-Ara4FN). This domain family represents the C-terminal subdomain of the formyltransferase domain, downstream of the N-terminal subdomain containing the catalytic center. ArnA forms a hexameric structure (a dimer of trimers), in which the dehydrogenase domains are arranged at the center with the transformylase domains on the outside of the complex. — an NCBI CDD conserved domain (cd08702); members share this curated model.
