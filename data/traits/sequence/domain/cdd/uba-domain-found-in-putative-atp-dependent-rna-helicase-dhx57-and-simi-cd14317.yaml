identifier: CDD:cd14317
label: "UBA domain found in putative ATP-dependent RNA helicase DHX57 and similar proteins. DHX57, also called DEAH box protein 57, is a multi-domain protein with an N-terminal ubiquitin-association (UBA) domain, a Zinc finger domain, a RWD domain, a DEAD-like helicase domain and two C-terminal helicase associated domains. Although the precise biological function of DHX57 remains unclear, it may function as a putative ATP-dependent RNA helicase."
definition: >-
  UBA domain found in putative ATP-dependent RNA helicase DHX57 and similar proteins. DHX57, also called DEAH box protein 57, is a multi-domain protein with an N-terminal ubiquitin-association (UBA) domain, a Zinc finger domain, a RWD domain, a DEAD-like helicase domain and two C-terminal helicase associated domains. Although the precise biological function of DHX57 remains unclear, it may function as a putative ATP-dependent RNA helicase. — an NCBI CDD conserved domain (cd14317); members share this curated model.
