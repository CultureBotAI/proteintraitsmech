label: "basic helix-loop-helix-orange (bHLH-O) domain found in Drosophila melanogaster protein clockwork orange (Cwo) and similar proteins. Cwo is a bHLH-O transcriptional regulator involved in the regulation of Drosophila circadian rhythms. It functions as both an activator and a repressor of clock gene expression."
