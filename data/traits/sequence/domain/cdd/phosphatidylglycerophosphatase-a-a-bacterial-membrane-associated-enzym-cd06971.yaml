identifier: CDD:cd06971
label: "Phosphatidylglycerophosphatase A; a bacterial membrane-associated enzyme involved in lipid metabolism. Phosphatidylglycerophosphatase A domain represents a family of bacterial membrane-associated enzymes involved in lipid metabolism. The prototype of this CD is a putative Phosphatidylglycerophosphatase A (PGPase A) from Listeria monocytogenes. PGPase A (EC: 3.1.3.27), encoded by the gene pgpA, specifically catalyzes the formation of phosphatidylglycerol from phosphatidyl glycerophosphate (PGP). It requires Mg2+ for activity and is inhibited by sulfhydryl agents and freezing/thawing. PGPase B encoded from pgpB is not included in this family, which also acts on phosphatidic acid (PA) and lysophosphatidic acid (LPA). Aside from PGPase A and B, evidence shows that there is another PGPase existing in E. coli. Thus, PGPase A is not essential for PGPase activity in E. coli."
definition: >-
  Phosphatidylglycerophosphatase A; a bacterial membrane-associated enzyme involved in lipid metabolism. Phosphatidylglycerophosphatase A domain represents a family of bacterial membrane-associated enzymes involved in lipid metabolism. The prototype of this CD is a putative Phosphatidylglycerophosphatase A (PGPase A) from Listeria monocytogenes. PGPase A (EC: 3.1.3.27), encoded by the gene pgpA, specifically catalyzes the formation of phosphatidylglycerol from phosphatidyl glycerophosphate (PGP). It requires Mg2+ for activity and is inhibited by sulfhydryl agents and freezing/thawing. PGPase B encoded from pgpB is not included in this family, which also acts on phosphatidic acid (PA) and lysophosphatidic acid (LPA). Aside from PGPase A and B, evidence shows that there is another PGPase existing in E. coli. Thus, PGPase A is not essential for PGPase activity in E. coli. — an NCBI CDD conserved domain (cd06971); members share this curated model.
