label: TFP_LU_ECD_C9orf57
definition: >-
  extracellular domain (ECD) found in Homo sapiens uncharacterized protein C9orf57 and similar proteins. C9orf57 contains an extracellular domain (ECD) that belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)
