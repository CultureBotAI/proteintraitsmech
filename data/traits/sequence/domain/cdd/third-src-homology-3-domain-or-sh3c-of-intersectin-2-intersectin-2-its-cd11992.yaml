identifier: CDD:cd11992
label: "Third Src homology 3 domain (or SH3C) of Intersectin-2. Intersectin-2 (ITSN2) is an adaptor protein that functions in exo- and endocytosis, actin cytoskeletal reorganization, and signal transduction. It plays a role in clathrin-coated pit (CCP) formation. It binds to many proteins through its multidomain structure and facilitate the assembly of multimeric complexes. ITSN2 also functions as a specific GEF for Cdc42 activation in epithelial morphogenesis, and is required in mitotic spindle orientation. It exists in alternatively spliced short and long isoforms. The short isoform contains two Eps15 homology domains (EH1 and EH2), a coiled-coil region and five SH3 domains (SH3A-E), while the long isoform, in addition, contains RhoGEF (also called Dbl-homologous or DH), Pleckstrin homology (PH) and C2 domains. The third SH3 domain (SH3C) of ITSN2 has been shown to bind the K15 protein of Kaposi's sarcoma-associated herpesvirus. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Third Src homology 3 domain (or SH3C) of Intersectin-2. Intersectin-2 (ITSN2) is an adaptor protein that functions in exo- and endocytosis, actin cytoskeletal reorganization, and signal transduction. It plays a role in clathrin-coated pit (CCP) formation. It binds to many proteins through its multidomain structure and facilitate the assembly of multimeric complexes. ITSN2 also functions as a specific GEF for Cdc42 activation in epithelial morphogenesis, and is required in mitotic spindle orientation. It exists in alternatively spliced short and long isoforms. The short isoform contains two Eps15 homology domains (EH1 and EH2), a coiled-coil region and five SH3 domains (SH3A-E), while the long isoform, in addition, contains RhoGEF (also called Dbl-homologous or DH), Pleckstrin homology (PH) and C2 domains. The third SH3 domain (SH3C) of ITSN2 has been shown to bind the K15 protein of Kaposi's sarcoma-associated herpesvirus. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11992); members share this curated model.
