identifier: CDD:cd11497
label: "Na(+)- and Cl(-)-dependent monoamine transporters, SERT, NET, DAT1 and related proteins; solute binding domain. This subgroup represents the solute-binding domain of transmembrane transporters that transport monoamine neurotransmitters from synaptic spaces into presynaptic neurons. Members include: NET which transports norepinephrine, SERT which transports serotonin, and DAT1 which transports dopamine. These transporters may play a role in diseases including depression, anxiety disorders, attention-deficit hyperactivity disorder, and in the control of human behavior and emotional states. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
definition: >-
  Na(+)- and Cl(-)-dependent monoamine transporters, SERT, NET, DAT1 and related proteins; solute binding domain. This subgroup represents the solute-binding domain of transmembrane transporters that transport monoamine neurotransmitters from synaptic spaces into presynaptic neurons. Members include: NET which transports norepinephrine, SERT which transports serotonin, and DAT1 which transports dopamine. These transporters may play a role in diseases including depression, anxiety disorders, attention-deficit hyperactivity disorder, and in the control of human behavior and emotional states. This subgroup belongs to the solute carrier 6 (SLC6) transporter family. — an NCBI CDD conserved domain (cd11497); members share this curated model.
