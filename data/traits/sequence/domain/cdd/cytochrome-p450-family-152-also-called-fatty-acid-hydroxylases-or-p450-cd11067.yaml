identifier: CDD:cd11067
label: "cytochrome P450 family 152, also called fatty acid hydroxylases or P450 peroxygenases. The cytochrome P450 152 (CYP152) family enzymes act as peroxygenases, converting fatty acids through oxidative decarboxylation, yielding terminal alkenes, and via alpha- and beta-hydroxylation to yield hydroxy-fatty acids. Included in this family are Bacillus subtilis CYP152A1, also called cytochrome P450BsBeta, that catalyzes the alpha- and beta-hydroxylation of long-chain fatty acids such as myristic acid in the presence of hydrogen peroxide, and Sphingomonas paucimobilis CYP152B1, also called cytochrome P450(SPalpha), that hydroxylates fatty acids with high alpha-regioselectivity. The CYP152 family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 family 152, also called fatty acid hydroxylases or P450 peroxygenases. The cytochrome P450 152 (CYP152) family enzymes act as peroxygenases, converting fatty acids through oxidative decarboxylation, yielding terminal alkenes, and via alpha- and beta-hydroxylation to yield hydroxy-fatty acids. Included in this family are Bacillus subtilis CYP152A1, also called cytochrome P450BsBeta, that catalyzes the alpha- and beta-hydroxylation of long-chain fatty acids such as myristic acid in the presence of hydrogen peroxide, and Sphingomonas paucimobilis CYP152B1, also called cytochrome P450(SPalpha), that hydroxylates fatty acids with high alpha-regioselectivity. The CYP152 family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd11067); members share this curated model.
