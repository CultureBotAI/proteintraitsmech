identifier: CDD:cd02058
label: "serpin family B, Myeloid and Erythroid Nuclear Termination stage-specific protein (MENT) and similar proteins. Gallus gallus Myeloid and Erythroid Nuclear Termination stage-specific protein (MENT) is a nonhistone heterochromatin-associated serpin that is an effective inhibitor of cathepsin L as well as the papain-like cysteine proteases cathepsins K, L, and V in vitro. It's reactive center loop, which is essential for chromatin bridging, is able to mediate formation of a loop-sheet oligomer. It also contains an M-loop which contains two critical functional motifs: a classical nuclear localization signal (NLS) that is required for nuclear import and an AT-hook motif that is involved in chromatin and DNA binding. MENT belongs to the clade B of the serpin superfamily. In general, SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants can cause blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
definition: >-
  serpin family B, Myeloid and Erythroid Nuclear Termination stage-specific protein (MENT) and similar proteins. Gallus gallus Myeloid and Erythroid Nuclear Termination stage-specific protein (MENT) is a nonhistone heterochromatin-associated serpin that is an effective inhibitor of cathepsin L as well as the papain-like cysteine proteases cathepsins K, L, and V in vitro. It's reactive center loop, which is essential for chromatin bridging, is able to mediate formation of a loop-sheet oligomer. It also contains an M-loop which contains two critical functional motifs: a classical nuclear localization signal (NLS) that is required for nuclear import and an AT-hook motif that is involved in chromatin and DNA binding. MENT belongs to the clade B of the serpin superfamily. In general, SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants can cause blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans. — an NCBI CDD conserved domain (cd02058); members share this curated model.
