identifier: CDD:cd22140
label: F-box_D3-like
definition: >-
  F-box domain found in Oryza sativa F-box/LRR-repeat Max2 homolog (D3) and similar proteins. D3 is the ortholog of Arabidopsis MORE AXILLARY GROWTH2 (MAX2) and DWARF14 (AtD14) in rice. These proteins are essential signaling components to regulate strigolactone (SL)-repressed plant branching. In rice shoot branching inhibition, the SL-metabolizing alpha/beta hydrolase D14 interacts with the F-box protein D3 to ubiquitinate and degrade the transcription repressor D53. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression
