identifier: CDD:cd23547
label: TFP_LU_ECD_Ly6G6d
definition: >-
  extracellular domain (ECD) found in lymphocyte antigen 6 complex locus protein G6d (Ly6G6d) and similar proteins. Ly6G6d (also called protein Ly6-D, or megakaryocyte-enhanced gene transcript 1 protein) is a glycosylated, GPI-anchored, cell surface molecule, located on filopodia, which could act as cell receptor with potential roles in signaling or cell-cell interactions. Ly6G6d contains an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)
