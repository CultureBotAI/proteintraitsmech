identifier: CDD:cd08085
label: "ATP-grasp domain of purine biosynthetic pathway enzymes: PurK and PurT. ATP-grasp domain of N5-carboxyaminoimidazole ribonucleotide (NCAIR) synthetase (PurK) and glycinamide ribonucleotide (GAR) transformylase (PurT transformylase). PurK and PurT are structurally homologous enzymes that catalyze two different steps in purine biosynthetic pathway. They both belong to the ATP-grasp superfamily and catalyze the coupling of an amino group of one substrate to the carboxylate group of the other by utilizing an acylphosphate intermediate. The substrate binding sites for both enzymes are similar. Both subfamilies have a disordered loop which gets stabilized upon binding with nucleotide."
definition: >-
  ATP-grasp domain of purine biosynthetic pathway enzymes: PurK and PurT. ATP-grasp domain of N5-carboxyaminoimidazole ribonucleotide (NCAIR) synthetase (PurK) and glycinamide ribonucleotide (GAR) transformylase (PurT transformylase). PurK and PurT are structurally homologous enzymes that catalyze two different steps in purine biosynthetic pathway. They both belong to the ATP-grasp superfamily and catalyze the coupling of an amino group of one substrate to the carboxylate group of the other by utilizing an acylphosphate intermediate. The substrate binding sites for both enzymes are similar. Both subfamilies have a disordered loop which gets stabilized upon binding with nucleotide. — an NCBI CDD conserved domain (cd08085); members share this curated model.
