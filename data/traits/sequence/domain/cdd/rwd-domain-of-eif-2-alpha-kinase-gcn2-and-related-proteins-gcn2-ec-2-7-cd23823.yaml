identifier: CDD:cd23823
label: "RWD domain of eIF-2-alpha kinase GCN2 and related proteins. GCN2 (EC 2.7.11.1), also called eukaryotic translation initiation factor 2-alpha kinase 4 (EIF2AK4), acts as a metabolic-stress sensing protein kinase that phosphorylates the alpha subunit of eukaryotic translation initiation factor 2 (EIF2S1/eIF-2-alpha) in response to low amino acid availability. It also plays a role in modulating the adaptive immune response to yellow fever virus infection and promotes dendritic cells to initiate autophagy and antigene presentation to both CD4(+) and CD8(+) T-cells under amino acid starvation."
definition: >-
