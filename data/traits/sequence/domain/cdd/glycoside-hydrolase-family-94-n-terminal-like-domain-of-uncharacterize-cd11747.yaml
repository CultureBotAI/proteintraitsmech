identifier: CDD:cd11747
label: "Glycoside hydrolase family 94 N-terminal-like domain of uncharacterized function. The glycoside hydrolase family 94 (previously known as glycosyltransferase family 36) includes cellobiose phosphorylase and many other members. Their N-terminal domain is involved in oligomerization and may play a role in catalysis, but it is separate from the catalytic domain. This GH64N domain also occurs as a standalone domain in distantly related proteins of unknown function, as represented by this model, which also includes N-terminal GH94N-like domains of bacterial rhamnosidases and as found at the C-terminus of polygalacturonases."
definition: >-
  Glycoside hydrolase family 94 N-terminal-like domain of uncharacterized function. The glycoside hydrolase family 94 (previously known as glycosyltransferase family 36) includes cellobiose phosphorylase and many other members. Their N-terminal domain is involved in oligomerization and may play a role in catalysis, but it is separate from the catalytic domain. This GH64N domain also occurs as a standalone domain in distantly related proteins of unknown function, as represented by this model, which also includes N-terminal GH94N-like domains of bacterial rhamnosidases and as found at the C-terminus of polygalacturonases. — an NCBI CDD conserved domain (cd11747); members share this curated model.
