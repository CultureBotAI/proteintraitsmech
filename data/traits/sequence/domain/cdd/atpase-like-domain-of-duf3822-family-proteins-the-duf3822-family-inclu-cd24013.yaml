identifier: CDD:cd24013
label: "ATPase-like domain of DUF3822 family proteins. The DUF3822 family includes a group of uncharacterized bacterial proteins similar to Bacteroides thetaiotaomicron BT_3980, a protein with an actin-like ATPase fold and unknown function. They belong to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains."
definition: >-
  ATPase-like domain of DUF3822 family proteins. The DUF3822 family includes a group of uncharacterized bacterial proteins similar to Bacteroides thetaiotaomicron BT_3980, a protein with an actin-like ATPase fold and unknown function. They belong to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains. — an NCBI CDD conserved domain (cd24013); members share this curated model.
