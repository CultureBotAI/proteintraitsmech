identifier: CDD:cd14643
label: "dual specificity phosphatase domain of dual specificity protein phosphatase 7. Dual specificity protein phosphatase 7 (DUSP7), also called mitogen-activated protein kinase (MAPK) phosphatase X (MKP-X) or dual specificity protein phosphatase PYST2, functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). Like other MKPs, it deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. It belongs to the class II subfamily and is an ERK-selective cytoplasmic MKP. DUSP7 has been shown as an essential regulator of multiple steps in oocyte meiosis. Due to alternative promoter usage, the PYST2 gene gives rise to two isoforms, PYST2-S and PYST2-L. PYST2-L is over-expressed in leukocytes derived from AML and ALL patients as well as in some solid tumors and lymphoblastoid cell lines; it plays a role in cell-crowding. It contains an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, and a C-terminal catalytic dual specificity phosphatase domain."
definition: >-
  dual specificity phosphatase domain of dual specificity protein phosphatase 7. Dual specificity protein phosphatase 7 (DUSP7), also called mitogen-activated protein kinase (MAPK) phosphatase X (MKP-X) or dual specificity protein phosphatase PYST2, functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). Like other MKPs, it deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. It belongs to the class II subfamily and is an ERK-selective cytoplasmic MKP. DUSP7 has been shown as an essential regulator of multiple steps in oocyte meiosis. Due to alternative promoter usage, the PYST2 gene gives rise to two isoforms, PYST2-S and PYST2-L. PYST2-L is over-expressed in leukocytes derived from AML and ALL patients as well as in some solid tumors and lymphoblastoid cell lines; it plays a role in cell-crowding. It contains an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, and a C-terminal catalytic dual specificity phosphatase domain. — an NCBI CDD conserved domain (cd14643); members share this curated model.
