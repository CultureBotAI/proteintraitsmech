identifier: CDD:cd00476
label: "5-aminoimidazole-4-(N-succinylcarboxamide) ribonucleotide (SAICAR) synthase. SAICAR synthetase (the PurC gene product) catalyzes the seventh step of the de novo biosynthesis of purine nucleotides (also reported as eighth step). It converts 5-aminoimidazole-4-carboxyribonucleotide (CAIR), ATP, and L-aspartate into 5-aminoimidazole-4-(N-succinylcarboxamide) ribonucleotide (SAICAR), ADP, and phosphate."
definition: >-
  5-aminoimidazole-4-(N-succinylcarboxamide) ribonucleotide (SAICAR) synthase. SAICAR synthetase (the PurC gene product) catalyzes the seventh step of the de novo biosynthesis of purine nucleotides (also reported as eighth step). It converts 5-aminoimidazole-4-carboxyribonucleotide (CAIR), ATP, and L-aspartate into 5-aminoimidazole-4-(N-succinylcarboxamide) ribonucleotide (SAICAR), ADP, and phosphate. — an NCBI CDD conserved domain (cd00476); members share this curated model.
