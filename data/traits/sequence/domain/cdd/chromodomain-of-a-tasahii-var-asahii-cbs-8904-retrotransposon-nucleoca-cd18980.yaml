identifier: CDD:cd18980
label: "chromodomain of a Tasahii var. asahii CBS 8904 retrotransposon nucleocapsid protein, and similar proteins. This subgroup includes the CHROMO (CHRromatin Organization Modifier) domain found in Trichosporon asahii var. asahii CBS 8904 retrotransposon nucleocapsid protein, and similar proteins. The chromodomain is implicated in the binding, of the proteins in which it is found, to methylated histone tails and maybe RNA. A chromodomain may occur as a single instance, in a tandem arrangement, or followed by a related chromo shadow domain."
definition: >-
  chromodomain of a Tasahii var. asahii CBS 8904 retrotransposon nucleocapsid protein, and similar proteins. This subgroup includes the CHROMO (CHRromatin Organization Modifier) domain found in Trichosporon asahii var. asahii CBS 8904 retrotransposon nucleocapsid protein, and similar proteins. The chromodomain is implicated in the binding, of the proteins in which it is found, to methylated histone tails and maybe RNA. A chromodomain may occur as a single instance, in a tandem arrangement, or followed by a related chromo shadow domain. — an NCBI CDD conserved domain (cd18980); members share this curated model.
