identifier: CDD:cd19819
label: "first B-box-type 1 zinc finger found in zinc finger FYVE domain-containing protein 1 (ZFYVE1) and similar proteins. ZFYVE1 also termed double FYVE-containing protein 1 (DFCP1), or SR3, or tandem FYVE fingers-1, is a novel tandem FYVE domain containing protein that binds phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) with high specificity over other phosphoinositides. The subcellular distribution of exogenously-expressed ZFYVE1 to Golgi, endoplasmic reticulum (ER) and vesicular is governed in part by its FYVE domains but unaffected by Wortmannin, a PI3-kinase inhibitor. ZFYVE1 harbors two B-box motifs, both of which show high sequence similarity with B-Box-type 1 zinc finger found in tripartite motif-containing proteins (TRIMs). The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif."
definition: >-
  first B-box-type 1 zinc finger found in zinc finger FYVE domain-containing protein 1 (ZFYVE1) and similar proteins. ZFYVE1 also termed double FYVE-containing protein 1 (DFCP1), or SR3, or tandem FYVE fingers-1, is a novel tandem FYVE domain containing protein that binds phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) with high specificity over other phosphoinositides. The subcellular distribution of exogenously-expressed ZFYVE1 to Golgi, endoplasmic reticulum (ER) and vesicular is governed in part by its FYVE domains but unaffected by Wortmannin, a PI3-kinase inhibitor. ZFYVE1 harbors two B-box motifs, both of which show high sequence similarity with B-Box-type 1 zinc finger found in tripartite motif-containing proteins (TRIMs). The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif. — an NCBI CDD conserved domain (cd19819); members share this curated model.
