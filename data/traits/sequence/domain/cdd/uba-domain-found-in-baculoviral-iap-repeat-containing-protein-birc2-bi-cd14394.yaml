identifier: CDD:cd14394
label: "UBA domain found in baculoviral IAP repeat-containing protein BIRC2, BIRC3 and similar proteins. The subfamily includes cellular inhibitor of apoptosis protein 1 (c-IAP1) and c-IAP2. c-IAPs function as ubiquitin E3 ligases that mediate the ubiquitination of the substrates involved in apoptosis, nuclear factor-kappaB (NF-kappaB)signaling, and oncogenesis. Unlike other apoptosis proteins (IAPs), such as XIAP, c-IAPs exhibit minimal binding to caspases and may not play an important role in the inhibition of these proteases. c-IAP1, also called baculoviral IAP repeat-containing protein BIRC2, IAP-2, RING finger protein 48, or TNFR2-TRAF-signaling complex protein 2, is a potent regulator of the tumor necrosis factor (TNF) receptor family and NF-kappaB signaling pathways in the cytoplasm. It can also regulate E2F1 transcription factor-mediated control of cyclin transcription in the nucleus. c-IAP2, also called BIRC3, IAP-1, apoptosis inhibitor 2 (API2), or IAP homolog C, also influences ubiquitin-dependent pathways that modulate innate immune signalling by activation of NF-kappaB. c-IAPs contain three N-terminal baculoviral IAP repeat (BIR) domains that enable interactions with proteins, a ubiquitin-association (UBA) domain that is responsible for the binding of binds polyubiquitin (polyUb), a caspase activation and recruitment domain (CARD) that serves as a protein interaction surface, and a RING domain at the carboxyl terminus that is required for ubiquitin ligase activity."
definition: >-
  UBA domain found in baculoviral IAP repeat-containing protein BIRC2, BIRC3 and similar proteins. The subfamily includes cellular inhibitor of apoptosis protein 1 (c-IAP1) and c-IAP2. c-IAPs function as ubiquitin E3 ligases that mediate the ubiquitination of the substrates involved in apoptosis, nuclear factor-kappaB (NF-kappaB)signaling, and oncogenesis. Unlike other apoptosis proteins (IAPs), such as XIAP, c-IAPs exhibit minimal binding to caspases and may not play an important role in the inhibition of these proteases. c-IAP1, also called baculoviral IAP repeat-containing protein BIRC2, IAP-2, RING finger protein 48, or TNFR2-TRAF-signaling complex protein 2, is a potent regulator of the tumor necrosis factor (TNF) receptor family and NF-kappaB signaling pathways in the cytoplasm. It can also regulate E2F1 transcription factor-mediated control of cyclin transcription in the nucleus. c-IAP2, also called BIRC3, IAP-1, apoptosis inhibitor 2 (API2), or IAP homolog C, also influences ubiquitin-dependent pathways that modulate innate immune signalling by activation of NF-kappaB. c-IAPs contain three N-terminal baculoviral IAP repeat (BIR) domains that enable interactions with proteins, a ubiquitin-association (UBA) domain that is responsible for the binding of binds polyubiquitin (polyUb), a caspase activation and recruitment domain (CARD) that serves as a protein interaction surface, and a RING domain at the carboxyl terminus that is required for ubiquitin ligase activity. — an NCBI CDD conserved domain (cd14394); members share this curated model.
