identifier: CDD:cd21906
label: "second beta-defensin domain found in gallinacin-11 (Gal-11). Gal-11, also called beta-defensin 11, or vitelline membrane outer layer protein 2 or vitelline membrane outer layer protein II (VMO-II or VMOII), is an antimicrobial peptide of the chicken egg. It is one of four major proteins in vitelline membranes, along with ovomucin, lysozyme, and VMO-1. Gal-11 has bactericidal activity toward both Gram-positive and Gram-negative bacteria. Gal-11 is a compact fold composed of 2 packed beta-defensin domains with the motifs CX6CX5CX9CX6CC and CX6CX6CX7CX6CC, respectively; this model corresponds to the second one."
definition: >-
  second beta-defensin domain found in gallinacin-11 (Gal-11). Gal-11, also called beta-defensin 11, or vitelline membrane outer layer protein 2 or vitelline membrane outer layer protein II (VMO-II or VMOII), is an antimicrobial peptide of the chicken egg. It is one of four major proteins in vitelline membranes, along with ovomucin, lysozyme, and VMO-1. Gal-11 has bactericidal activity toward both Gram-positive and Gram-negative bacteria. Gal-11 is a compact fold composed of 2 packed beta-defensin domains with the motifs CX6CX5CX9CX6CC and CX6CX6CX7CX6CC, respectively; this model corresponds to the second one. — an NCBI CDD conserved domain (cd21906); members share this curated model.
