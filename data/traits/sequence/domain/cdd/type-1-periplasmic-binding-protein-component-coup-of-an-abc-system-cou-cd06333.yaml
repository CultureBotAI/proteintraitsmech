identifier: CDD:cd06333
label: "type 1 periplasmic binding-protein component (CouP) of an ABC system (CouPSTU; RPA1789, RPA1791-1793), involved in active transport of lignin-derived aromatic substrates, and its close homologs. This group includes RPA1789 (CouP) from Rhodopseudomonas palustris and its close homologs in other bacteria. RPA1789 (CouP) is the periplasmic binding-protein component of an ABC system (CouPSTU; RPA1789, RPA1791-1793) that is involved in the active transport of lignin-derived aromatic substrates. Members of this group has high sequence similarity to members of the family of hydrophobic amino acid transporters (HAAT), such as leucine-isoleucine-valine binding protein (LIVBP)."
definition: >-
