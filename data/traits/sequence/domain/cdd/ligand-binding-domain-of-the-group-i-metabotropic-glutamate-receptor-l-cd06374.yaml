identifier: CDD:cd06374
label: "ligand binding domain of the group I metabotropic glutamate receptor. Ligand binding domain of the group I metabotropic glutamate receptor, a family containing mGlu1R and mGlu5R, all of which stimulate phospholipase C (PLC) hydrolysis. The metabotropic glutamate receptor is a member of the family C of G-protein-coupled receptors that transduce extracellular signals into G-protein activation and ultimately into intracellular responses. The mGluRs are classified into three groups which comprise eight subtypes."
definition: >-
