identifier: CDD:cd00409
label: Acylphosphatase
definition: >-
  Acylphosphatase (ACP). One of the smallest enzymes known. The enzyme catalyzes the hydrolysis of acylphosphates, compounds containing a carboxylphosphate bond such as 1,3-bisphosphoglycerate, carbamoylphosphate, succinylphosphate, acetylphosphate and beta-aspartylphosphate. These molecules play very important metabolic and physiological roles as intermediates in glycolysis, the tricarboxylic acid cycle, pyrimidine and urea biosynthesis and in the activity of membrane ion pumps. Some proteins like hydrogenase maturation factor contain inactive form of ACP. ACP is present in all three forms of cellular life
