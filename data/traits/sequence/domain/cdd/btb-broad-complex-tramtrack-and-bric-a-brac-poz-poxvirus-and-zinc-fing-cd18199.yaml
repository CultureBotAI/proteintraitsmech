identifier: CDD:cd18199
label: BTB_POZ_ZBTB8
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 8 (ZBTB8). There are two ZBTB8 isoforms: ZBTB8A and ZBTB8B. ZBTB8A is a novel proto-oncoprotein that stimulates cell proliferation. ZBTB8B may be involved in transcriptional regulation. They both contain a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids
