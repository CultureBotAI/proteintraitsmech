identifier: CDD:cd13764
label: "transforming growth factor beta (TGF-beta) like domain found in embryonic growth/differentiation factor 1 (GDF1), factor 3 (GDF3) and similar proteins. The family includes GDF-1 and GDF-3. GDF1 may mediate cell differentiation events during embryonic development. GDF3 is a growth factor involved in early embryonic development and adipose-tissue homeostasis. The family also contains protein DVR-1, also termed vegetal hemisphere VG1 protein (VG-1), which serves to facilitate the differentiation of either mesoderm or endoderm either as a cofactor in an instructive signal or by providing permissive environment."
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in embryonic growth/differentiation factor 1 (GDF1), factor 3 (GDF3) and similar proteins. The family includes GDF-1 and GDF-3. GDF1 may mediate cell differentiation events during embryonic development. GDF3 is a growth factor involved in early embryonic development and adipose-tissue homeostasis. The family also contains protein DVR-1, also termed vegetal hemisphere VG1 protein (VG-1), which serves to facilitate the differentiation of either mesoderm or endoderm either as a cofactor in an instructive signal or by providing permissive environment. — an NCBI CDD conserved domain (cd13764); members share this curated model.
