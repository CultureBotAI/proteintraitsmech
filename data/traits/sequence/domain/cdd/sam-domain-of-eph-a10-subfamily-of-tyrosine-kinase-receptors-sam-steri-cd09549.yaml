identifier: CDD:cd09549
label: "SAM domain of EPH-A10 subfamily of tyrosine kinase receptors. SAM (sterile alpha motif) domain of EPH-A10 subfamily of receptor tyrosine kinases is a C-terminal potential protein-protein interaction domain. This domain is located in the cytoplasmic region of EPH-A10 receptors and appears to mediate cell-cell initiated signal transduction. It was found preferentially expressed in the testis. EphA10 may be involved in the pathogenesis and development of prostate carcinoma and lymphocytic leukemia. It is a potential molecular marker and/or therapy target for these types of cancers."
definition: >-
