identifier: CDD:cd18915
label: "basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana protein LONESOME HIGHWAY (LHW) and similar proteins. The family includes several bHLH transcription factors from Arabidopsis thaliana, such as LHW, and EMB1444. LHW, also termed AtbHLH156, or bHLH delta, is a bHLH transcription activator that regulates root development and promotes the production of stele cells in roots. It coordinately controls the number of all vascular cell types by regulating the size of the pool of cells from which they arise. EMB1444, also termed AtbHLH169, or lonesome highway-like protein 1, or protein embryo defective 1444, may regulate root development."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana protein LONESOME HIGHWAY (LHW) and similar proteins. The family includes several bHLH transcription factors from Arabidopsis thaliana, such as LHW, and EMB1444. LHW, also termed AtbHLH156, or bHLH delta, is a bHLH transcription activator that regulates root development and promotes the production of stele cells in roots. It coordinately controls the number of all vascular cell types by regulating the size of the pool of cells from which they arise. EMB1444, also termed AtbHLH169, or lonesome highway-like protein 1, or protein embryo defective 1444, may regulate root development. — an NCBI CDD conserved domain (cd18915); members share this curated model.
