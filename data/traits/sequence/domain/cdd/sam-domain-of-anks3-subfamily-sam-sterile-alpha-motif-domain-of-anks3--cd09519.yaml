identifier: CDD:cd09519
label: "SAM domain of ANKS3 subfamily. SAM (sterile alpha motif) domain of ANKS3 subfamily is a potential protein-protein interaction domain. Proteins of this subfamily have N-terminal ankyrin repeats and a C-terminal SAM domain. SAM is a widespread domain in signaling proteins. In many cases it mediates homo-dimerization/oligomerization."
definition: >-
  SAM domain of ANKS3 subfamily. SAM (sterile alpha motif) domain of ANKS3 subfamily is a potential protein-protein interaction domain. Proteins of this subfamily have N-terminal ankyrin repeats and a C-terminal SAM domain. SAM is a widespread domain in signaling proteins. In many cases it mediates homo-dimerization/oligomerization. — an NCBI CDD conserved domain (cd09519); members share this curated model.
