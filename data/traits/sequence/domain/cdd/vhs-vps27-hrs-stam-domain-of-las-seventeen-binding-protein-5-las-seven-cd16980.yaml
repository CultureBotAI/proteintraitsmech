identifier: CDD:cd16980
label: "VHS (Vps27/Hrs/STAM) domain of LAS seventeen-binding protein 5. LAS seventeen-binding protein 5 (LAS17-binding protein 5, Lsb5, or Lsb5p) localizes to the plasma membrane and plays a role in endocytosis in yeast. It interacts with actin regulators Sla1p and Las17p, ubiquitin, and Arf3p, coupling actin dynamics to membrane trafficking processes. Lsb5p contains an N-terminal VHS domain and a GAT (GGA and TOM) domain. The VHS domain has a superhelical structure similar to the structure of ARM (Armadillo) repeats. It is a right-handed superhelix of eight alpha helices. The VHS domain has been found in a number of proteins, some of which have been implicated in intracellular trafficking and sorting."
definition: >-
  VHS (Vps27/Hrs/STAM) domain of LAS seventeen-binding protein 5. LAS seventeen-binding protein 5 (LAS17-binding protein 5, Lsb5, or Lsb5p) localizes to the plasma membrane and plays a role in endocytosis in yeast. It interacts with actin regulators Sla1p and Las17p, ubiquitin, and Arf3p, coupling actin dynamics to membrane trafficking processes. Lsb5p contains an N-terminal VHS domain and a GAT (GGA and TOM) domain. The VHS domain has a superhelical structure similar to the structure of ARM (Armadillo) repeats. It is a right-handed superhelix of eight alpha helices. The VHS domain has been found in a number of proteins, some of which have been implicated in intracellular trafficking and sorting. — an NCBI CDD conserved domain (cd16980); members share this curated model.
