identifier: CDD:cd18816
label: "CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain of cysteine-rich secretory protein LCCL domain-containing 2. Cysteine-rich secretory protein LCCL domain-containing 2 (CRISPLD2) is also called cysteine-rich secretory protein 11 (CRSIP-11), LCCL domain-containing cysteine-rich secretory protein 2 (LCRISP2), or CAP and LCCL domain containing protein 2 (CAPLD2). It plays a role in the etiology of NSCLP (non-syndromic cleft lip with or without cleft palate). It is required for neural crest cell migration and cell viability during craniofacial development. The CRISPLD2 gene has been identified a glucocorticoid responsive gene that modulates cytokine function in airway smooth muscle cells. The wider family of CAP domain containing proteins includes plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins (CRISPs), and allergen 5 from vespid venom, among others."
definition: >-
  CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain of cysteine-rich secretory protein LCCL domain-containing 2. Cysteine-rich secretory protein LCCL domain-containing 2 (CRISPLD2) is also called cysteine-rich secretory protein 11 (CRSIP-11), LCCL domain-containing cysteine-rich secretory protein 2 (LCRISP2), or CAP and LCCL domain containing protein 2 (CAPLD2). It plays a role in the etiology of NSCLP (non-syndromic cleft lip with or without cleft palate). It is required for neural crest cell migration and cell viability during craniofacial development. The CRISPLD2 gene has been identified a glucocorticoid responsive gene that modulates cytokine function in airway smooth muscle cells. The wider family of CAP domain containing proteins includes plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins (CRISPs), and allergen 5 from vespid venom, among others. — an NCBI CDD conserved domain (cd18816); members share this curated model.
