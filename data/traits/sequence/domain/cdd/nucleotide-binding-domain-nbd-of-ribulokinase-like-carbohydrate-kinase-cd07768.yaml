identifier: CDD:cd07768
label: "nucleotide-binding domain (NBD) of ribulokinase-like carbohydrate kinases. The RBK family includes bacterial RBK, vertebrate D-ribulokinase FGGY (also known as FGGY carbohydrate kinase domain-containing protein), Saccharomyces cerevisiae D-ribulokinase YDR109C, and Yersinia Pseudotuberculosis uncharacterized carbohydrate kinase that has been named glyerol/xylulose kinase. RBK (EC 2.7.1.16; also known as L-ribulokinase) catalyzes the MgATP-dependent phosphorylation of L(or D)-ribulose to produce L(or D)-ribulose 5-phosphate and ADP, which is the second step in arabinose catabolism. It also phosphorylates a variety of other sugar substrates including ribitol and arabitol. D-ribulokinase (EC 2.7.1.47) catalyzes ATP-dependent phosphorylation of D-ribulose at C-5 to form D-ribulose 5-phosphate. It is postulated to function in a metabolite repair mechanism by preventing toxic accumulation of free D-ribulose formed by non-specific phosphatase activities. Alternatively, D-ribulokinase may play a role in regulating D-ribulose 5-phosphate recycling in the pentose phosphate pathway. Members of this subfamily belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain."
definition: >-
  nucleotide-binding domain (NBD) of ribulokinase-like carbohydrate kinases. The RBK family includes bacterial RBK, vertebrate D-ribulokinase FGGY (also known as FGGY carbohydrate kinase domain-containing protein), Saccharomyces cerevisiae D-ribulokinase YDR109C, and Yersinia Pseudotuberculosis uncharacterized carbohydrate kinase that has been named glyerol/xylulose kinase. RBK (EC 2.7.1.16; also known as L-ribulokinase) catalyzes the MgATP-dependent phosphorylation of L(or D)-ribulose to produce L(or D)-ribulose 5-phosphate and ADP, which is the second step in arabinose catabolism. It also phosphorylates a variety of other sugar substrates including ribitol and arabitol. D-ribulokinase (EC 2.7.1.47) catalyzes ATP-dependent phosphorylation of D-ribulose at C-5 to form D-ribulose 5-phosphate. It is postulated to function in a metabolite repair mechanism by preventing toxic accumulation of free D-ribulose formed by non-specific phosphatase activities. Alternatively, D-ribulokinase may play a role in regulating D-ribulose 5-phosphate recycling in the pentose phosphate pathway. Members of this subfamily belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain. — an NCBI CDD conserved domain (cd07768); members share this curated model.
