identifier: CDD:cd17048
label: Ubl_UBL3
definition: >-
  ubiquitin-like (Ubl) domain found in ubiquitin-like protein 3 (UBL3) and similar proteins. UBL3, also termed membrane-anchored ubiquitin-fold protein (MUB), or protein HCG-1, belongs to a newly described MUB protein family with structural homology with ubiquitin. MUB proteins have a beta-grasp ubiquitin-like (Ubl) domain with longer N- and C-termini and extended loops. The Ubl domain contains a C-terminal CAAX-box, a canonical motif for protein prenylation, which is modified through protein lipidation with a hydrophobic membrane anchor. The lipidation and membrane localization inhibit attachment of MUBs to target proteins
