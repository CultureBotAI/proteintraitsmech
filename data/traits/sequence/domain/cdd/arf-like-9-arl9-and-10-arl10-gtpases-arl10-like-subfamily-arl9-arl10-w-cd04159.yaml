label: "Arf-like 9 (Arl9) and 10 (Arl10) GTPases. Arl10-like subfamily. Arl9/Arl10 was identified from a human cancer-derived EST dataset. No functional information about the subfamily is available at the current time, but crystal structures of human Arl10b and Arl10c have been solved."
definition: >-
  Arf-like 9 (Arl9) and 10 (Arl10) GTPases. Arl10-like subfamily. Arl9/Arl10 was identified from a human cancer-derived EST dataset. No functional information about the subfamily is available at the current time, but crystal structures of human Arl10b and Arl10c have been solved. — an NCBI CDD conserved domain (cd04159); members share this curated model.
