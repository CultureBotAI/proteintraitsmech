identifier: CDD:cd23127
label: "RING finger, HC subclass, found in Arabidopsis thaliana protein BENZOIC ACID HYPERSENSITIVE 1 (BAH1) and similar proteins. This subfamily includes Arabidopsis thaliana BAH1 and BAH1-like.  BAH1, also known as protein NITROGEN LIMITATION ADAPTATION (NLA), or RING-type E3 ubiquitin transferase BAH1, acts as an E3 ubiquitin-protein ligase that mediates E2-dependent protein ubiquitination. It plays a role in salicylic acid-mediated negative feedback regulation of salicylic acid (SA) accumulation. It may be involved in the overall regulation of SA, benzoic acid and phenylpropanoid biosynthesis. It controls the adaptability to nitrogen limitation by channeling the phenylpropanoid metabolic flux to the induced anthocyanin synthesis. BAH1-like, also known as RING finger protein 178, or RING-type E3 ubiquitin transferase BAH1-like, is a probable E3 ubiquitin-protein ligase. Members of this subfamily contain a typical C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in Arabidopsis thaliana protein BENZOIC ACID HYPERSENSITIVE 1 (BAH1) and similar proteins. This subfamily includes Arabidopsis thaliana BAH1 and BAH1-like. BAH1, also known as protein NITROGEN LIMITATION ADAPTATION (NLA), or RING-type E3 ubiquitin transferase BAH1, acts as an E3 ubiquitin-protein ligase that mediates E2-dependent protein ubiquitination. It plays a role in salicylic acid-mediated negative feedback regulation of salicylic acid (SA) accumulation. It may be involved in the overall regulation of SA, benzoic acid and phenylpropanoid biosynthesis. It controls the adaptability to nitrogen limitation by channeling the phenylpropanoid metabolic flux to the induced anthocyanin synthesis. BAH1-like, also known as RING finger protein 178, or RING-type E3 ubiquitin transferase BAH1-like, is a probable E3 ubiquitin-protein ligase. Members of this subfamily contain a typical C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd23127); members share this curated model.
