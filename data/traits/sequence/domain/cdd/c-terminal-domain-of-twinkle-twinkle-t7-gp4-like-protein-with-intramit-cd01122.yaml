identifier: CDD:cd01122
label: "C-terminal domain of Twinkle. Twinkle ( T7 gp4-like protein with intramitochondrial nucleoid localization, also known as C10orf2, PEO1, SCA8, ATXN8, IOSCA, PEOA3 or SANDO) is a homohexameric DNA helicases which unwinds short stretches of double-stranded DNA in the 5' to 3' direction and, along with mitochondrial single-stranded DNA binding protein and mtDNA polymerase gamma, is thought to play a key role in mtDNA replication. Mutations in the human gene cause infantile onset spinocerebellar ataxia (IOSCA) and progressive external ophthalmoplegia (PEO) and are also associated with several mitochondrial depletion syndromes. This group also contains viral GP4-like and related bacterial helicases."
definition: >-
  C-terminal domain of Twinkle. Twinkle ( T7 gp4-like protein with intramitochondrial nucleoid localization, also known as C10orf2, PEO1, SCA8, ATXN8, IOSCA, PEOA3 or SANDO) is a homohexameric DNA helicases which unwinds short stretches of double-stranded DNA in the 5' to 3' direction and, along with mitochondrial single-stranded DNA binding protein and mtDNA polymerase gamma, is thought to play a key role in mtDNA replication. Mutations in the human gene cause infantile onset spinocerebellar ataxia (IOSCA) and progressive external ophthalmoplegia (PEO) and are also associated with several mitochondrial depletion syndromes. This group also contains viral GP4-like and related bacterial helicases. — an NCBI CDD conserved domain (cd01122); members share this curated model.
