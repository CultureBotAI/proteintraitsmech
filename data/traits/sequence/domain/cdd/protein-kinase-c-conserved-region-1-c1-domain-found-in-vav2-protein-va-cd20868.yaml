identifier: CDD:cd20868
label: "protein kinase C conserved region 1 (C1 domain) found in VAV2 protein. VAV2 is widely expressed and functions as a guanine nucleotide exchange factor (GEF) for RhoA, RhoB and RhoG and also activates Rac1 and Cdc42. It is implicated in many cellular and physiological functions including blood pressure control, eye development, neurite outgrowth and branching, EGFR endocytosis and degradation, and cell cluster morphology, among others. It has been reported to associate with Nek3. VAV proteins contain several domains that enable their function: N-terminal calponin homology (CH), acidic, RhoGEF (also called Dbl-homologous or DH), Pleckstrin Homology (PH), C1 (zinc finger), SH2, and two SH3 domains. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in VAV2 protein. VAV2 is widely expressed and functions as a guanine nucleotide exchange factor (GEF) for RhoA, RhoB and RhoG and also activates Rac1 and Cdc42. It is implicated in many cellular and physiological functions including blood pressure control, eye development, neurite outgrowth and branching, EGFR endocytosis and degradation, and cell cluster morphology, among others. It has been reported to associate with Nek3. VAV proteins contain several domains that enable their function: N-terminal calponin homology (CH), acidic, RhoGEF (also called Dbl-homologous or DH), Pleckstrin Homology (PH), C1 (zinc finger), SH2, and two SH3 domains. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20868); members share this curated model.
