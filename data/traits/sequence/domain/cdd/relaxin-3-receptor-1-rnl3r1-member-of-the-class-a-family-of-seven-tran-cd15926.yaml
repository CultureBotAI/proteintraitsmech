identifier: CDD:cd15926
label: "relaxin 3 receptor 1 (RNL3R1), member of the class A family of seven-transmembrane G protein-coupled receptors. The G protein-coupled receptor RNL3R1 is also known as GPCR135, relaxin family peptide receptor 3 (RXFP3), and somatostatin- and angiotensin-like peptide receptor (SALPR). RNL3/relaxin-3, a member of the insulin superfamily, is an endogenous neuropeptide ligand for RNL3R1. RNL3R1 is predominantly expressed in brain regions and implicated in stress, anxiety, and feeding, and metabolism. RNL3R1 signals through G(i) protein and inhibit adenylate cyclase, thereby inhibit cAMP accumulation, and also activates Erk1/2 signaling pathway."
definition: >-
  relaxin 3 receptor 1 (RNL3R1), member of the class A family of seven-transmembrane G protein-coupled receptors. The G protein-coupled receptor RNL3R1 is also known as GPCR135, relaxin family peptide receptor 3 (RXFP3), and somatostatin- and angiotensin-like peptide receptor (SALPR). RNL3/relaxin-3, a member of the insulin superfamily, is an endogenous neuropeptide ligand for RNL3R1. RNL3R1 is predominantly expressed in brain regions and implicated in stress, anxiety, and feeding, and metabolism. RNL3R1 signals through G(i) protein and inhibit adenylate cyclase, thereby inhibit cAMP accumulation, and also activates Erk1/2 signaling pathway. — an NCBI CDD conserved domain (cd15926); members share this curated model.
