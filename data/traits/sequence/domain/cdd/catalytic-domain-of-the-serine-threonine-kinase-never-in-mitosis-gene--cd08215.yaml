identifier: CDD:cd08215
label: "Catalytic domain of the Serine/Threonine Kinase, Never In Mitosis gene A (NIMA)-related kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The Nek family is composed of 11 different mammalian members (Nek1-11) with similarity to the catalytic domain of Aspergillus nidulans NIMA kinase, the founding member of the Nek family, which was identified in a screen for cell cycle mutants that were prevented from entering mitosis. Neks contain a conserved N-terminal catalytic domain and a more divergent C-terminal regulatory region of various sizes and structures. They are involved in the regulation of downstream processes following the activation of Cdc2, and many of their functions are cell cycle-related. They play critical roles in microtubule dynamics during ciliogenesis and mitosis. The Nek family is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Never In Mitosis gene A (NIMA)-related kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The Nek family is composed of 11 different mammalian members (Nek1-11) with similarity to the catalytic domain of Aspergillus nidulans NIMA kinase, the founding member of the Nek family, which was identified in a screen for cell cycle mutants that were prevented from entering mitosis. Neks contain a conserved N-terminal catalytic domain and a more divergent C-terminal regulatory region of various sizes and structures. They are involved in the regulation of downstream processes following the activation of Cdc2, and many of their functions are cell cycle-related. They play critical roles in microtubule dynamics during ciliogenesis and mitosis. The Nek family is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd08215); members share this curated model.
