identifier: CDD:cd23832
label: "C-terminal double-RWD domain of Fanconi anemia group L protein (FANCL) and related proteins. FANCL, also called E3 ubiquitin-protein ligase FANCL, Fanconi anemia-associated polypeptide of 43 kDa (FAAP43), or RING-type E3 ubiquitin transferase FANCL, is an E3 ubiquitin-protein ligase component of the Fanconi anemia (FA) core complex which functions in the repair of interstrand crosslinks (ICLs), a toxic form of DNA damage. FANCL, works in conjunction with the E2 conjugating enzyme UBE2T (FANCT) to add a single ubiquitin to specific lysine residues on FANCD2 and FANCI. The mono-ubiquitinated FANCI-FANCD2 complex is thought to recruit downstream DNA-repair proteins for ICL processing. FANCL is composed of an N-terminal E2-like fold (ELF) domain, a novel double-RWD (DRWD) domain, and a C-terminal RING domain predicted to facilitate E2 binding. The DRWD domain is responsible for substrate binding. The model corresponds to the C-terminal DRWD domain (DRWD-C)."
definition: >-
  C-terminal double-RWD domain of Fanconi anemia group L protein (FANCL) and related proteins. FANCL, also called E3 ubiquitin-protein ligase FANCL, Fanconi anemia-associated polypeptide of 43 kDa (FAAP43), or RING-type E3 ubiquitin transferase FANCL, is an E3 ubiquitin-protein ligase component of the Fanconi anemia (FA) core complex which functions in the repair of interstrand crosslinks (ICLs), a toxic form of DNA damage. FANCL, works in conjunction with the E2 conjugating enzyme UBE2T (FANCT) to add a single ubiquitin to specific lysine residues on FANCD2 and FANCI. The mono-ubiquitinated FANCI-FANCD2 complex is thought to recruit downstream DNA-repair proteins for ICL processing. FANCL is composed of an N-terminal E2-like fold (ELF) domain, a novel double-RWD (DRWD) domain, and a C-terminal RING domain predicted to facilitate E2 binding. The DRWD domain is responsible for substrate binding. The model corresponds to the C-terminal DRWD domain (DRWD-C). — an NCBI CDD conserved domain (cd23832); members share this curated model.
