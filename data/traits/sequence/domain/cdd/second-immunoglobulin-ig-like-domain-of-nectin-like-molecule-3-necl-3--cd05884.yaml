identifier: CDD:cd05884
label: "Second immunoglobulin (Ig)-like domain of nectin-like molecule-3 (Necl-3); member of the I-set of Ig superfamily domains. The members here are composed of the second immunoglobulin (Ig)-like domain of nectin-like molecule-3 (Necl-3; also known as cell adhesion molecule 2 (CADM2)). Nectin-like molecules have similar domain structures to those of nectins. At least five nectin-like molecules have been identified (Necl-1 through Necl-5). These have an extracellular region containing three Ig-like domains, one transmembrane region, and one cytoplasmic region. Necl-3 has been shown to accumulate in tissues of the central and peripheral nervous system where it is expressed in ependymal cells and myelinated axons.  It is observed at the interface between the axon shaft and the myelin sheath. Ig domains are likely to participate in ligand binding and recognition."
definition: >-
