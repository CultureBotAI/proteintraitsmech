identifier: CDD:cd18229
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 45 (ZBTB45). ZBTB45, also called zinc finger protein 499 (ZNF499), may act as a transcriptional regulator that is essential for proper glial differentiation of neural and oligodendrocyte progenitor cells. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 45 (ZBTB45). ZBTB45, also called zinc finger protein 499 (ZNF499), may act as a transcriptional regulator that is essential for proper glial differentiation of neural and oligodendrocyte progenitor cells. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18229); members share this curated model.
