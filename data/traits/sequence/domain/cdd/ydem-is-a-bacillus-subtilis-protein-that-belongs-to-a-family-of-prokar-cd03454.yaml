label: "YdeM is a Bacillus subtilis protein that belongs to a family of prokaryotic proteins of unkown function.  YdeM has sequence similarity to the hot-dog fold of (R)-specific enoyl-CoA hydratase.   Other enzymes with this fold include the peroxisomal Hydratase-Dehydrogenase-Epimerase (HDE) protein, and the fatty acid synthase beta subunit."
definition: >-
  YdeM is a Bacillus subtilis protein that belongs to a family of prokaryotic proteins of unkown function. YdeM has sequence similarity to the hot-dog fold of (R)-specific enoyl-CoA hydratase. Other enzymes with this fold include the peroxisomal Hydratase-Dehydrogenase-Epimerase (HDE) protein, and the fatty acid synthase beta subunit. — an NCBI CDD conserved domain (cd03454); members share this curated model.
