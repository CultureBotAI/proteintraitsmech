identifier: CDD:cd20295
label: "monomeric dehydratase Pac13 and related proteins, cupin domain. This family includes a small monomeric dehydratase Pac13 that mediates the formation of the 3'-deoxynucleotide of pacidamycins, which are uradyl peptide antibiotics (UPAs). Pac13 is involved in the formation of the unique 3'-deoxyuridine moiety found in these UPAs; it catalyzes the dehydration of uridine-5'-aldehyde. The similarity of the 3'-deoxy pacidamycin moiety with synthetic anti-retrovirals, offers a potential opportunity for the utilization of Pac13 in the biocatalytic generation of antiviral compounds. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  monomeric dehydratase Pac13 and related proteins, cupin domain. This family includes a small monomeric dehydratase Pac13 that mediates the formation of the 3'-deoxynucleotide of pacidamycins, which are uradyl peptide antibiotics (UPAs). Pac13 is involved in the formation of the unique 3'-deoxyuridine moiety found in these UPAs; it catalyzes the dehydration of uridine-5'-aldehyde. The similarity of the 3'-deoxy pacidamycin moiety with synthetic anti-retrovirals, offers a potential opportunity for the utilization of Pac13 in the biocatalytic generation of antiviral compounds. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd20295); members share this curated model.
