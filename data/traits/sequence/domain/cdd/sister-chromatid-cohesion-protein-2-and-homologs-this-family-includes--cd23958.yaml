identifier: CDD:cd23958
label: "Sister chromatid cohesion protein 2 and homologs. This family includes Sister chromatid cohesion protein 2 (Scc2) and its homolog (Scc2 homolog, also called Nipped-B-like protein or NIPBL). Scc2/NIPBL and Scc4 form a complex that is responsible for loading the cohesin protein onto sister chromatids during mitosis and meiosis. Cohesin is a ring-shaped protein complex that encircles the sister chromatids and helps to hold them together until they are ready to be separated during cell division. In addition to its role in chromosome segregation, cohesin also plays important roles in other cellular processes such as transcription, chromosome condensation, and DNA repair."
definition: >-
  Sister chromatid cohesion protein 2 and homologs. This family includes Sister chromatid cohesion protein 2 (Scc2) and its homolog (Scc2 homolog, also called Nipped-B-like protein or NIPBL). Scc2/NIPBL and Scc4 form a complex that is responsible for loading the cohesin protein onto sister chromatids during mitosis and meiosis. Cohesin is a ring-shaped protein complex that encircles the sister chromatids and helps to hold them together until they are ready to be separated during cell division. In addition to its role in chromosome segregation, cohesin also plays important roles in other cellular processes such as transcription, chromosome condensation, and DNA repair. — an NCBI CDD conserved domain (cd23958); members share this curated model.
