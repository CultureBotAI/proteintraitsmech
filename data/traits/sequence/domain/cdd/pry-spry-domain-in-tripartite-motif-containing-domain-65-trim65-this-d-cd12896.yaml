identifier: CDD:cd12896
label: "PRY/SPRY domain in tripartite motif-containing domain 65 (TRIM65). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM65 proteins (composed of RING/B-box/coiled-coil core and also known as RBCC proteins). The SPRY/PRY combination is a possible component of immune defense. This protein family has not been characterized."
definition: >-
  PRY/SPRY domain in tripartite motif-containing domain 65 (TRIM65). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM65 proteins (composed of RING/B-box/coiled-coil core and also known as RBCC proteins). The SPRY/PRY combination is a possible component of immune defense. This protein family has not been characterized. — an NCBI CDD conserved domain (cd12896); members share this curated model.
