identifier: CDD:cd19783
label: "B-box-type 2 zinc finger  found in tripartite motif-containing proteins TRIM43, TRIM48, TRIM49, TRIM51, TRIM64, TRIM77 and similar proteins. The family includes a group of closely related uncharacterized tripartite motif-containing proteins, TRIM43, TRIM43B, TRIM48/RNF101, TRIM49/RNF18, TRIM49B, TRIM49C/TRIM49L2, TRIM49D/TRIM49L, TRIM51/SPRYD5, TRIM64, TRIM64B, TRIM64C, and TRIM77, whose biological functions remain unclear. TRIM49, also known as testis-specific RING-finger protein, has moderate similarity with SS-A/Ro52 antigen, suggesting it may be one of target proteins of autoantibodies in the sera of patients with these autoimmune disorders. All family members (except for TRIM51) belong to the C-IV subclass of TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a RING finger, Bbox2, and a coiled coil region, as well as a SPRY/B30.2 domain positioned C-terminal to the RBCC domain. TRIM51 belongs to unclassified TRIM (tripartite motif) family of proteins that do not have RING fingers. The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif."
definition: >-
  B-box-type 2 zinc finger found in tripartite motif-containing proteins TRIM43, TRIM48, TRIM49, TRIM51, TRIM64, TRIM77 and similar proteins. The family includes a group of closely related uncharacterized tripartite motif-containing proteins, TRIM43, TRIM43B, TRIM48/RNF101, TRIM49/RNF18, TRIM49B, TRIM49C/TRIM49L2, TRIM49D/TRIM49L, TRIM51/SPRYD5, TRIM64, TRIM64B, TRIM64C, and TRIM77, whose biological functions remain unclear. TRIM49, also known as testis-specific RING-finger protein, has moderate similarity with SS-A/Ro52 antigen, suggesting it may be one of target proteins of autoantibodies in the sera of patients with these autoimmune disorders. All family members (except for TRIM51) belong to the C-IV subclass of TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a RING finger, Bbox2, and a coiled coil region, as well as a SPRY/B30.2 domain positioned C-terminal to the RBCC domain. TRIM51 belongs to unclassified TRIM (tripartite motif) family of proteins that do not have RING fingers. The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif. — an NCBI CDD conserved domain (cd19783); members share this curated model.
