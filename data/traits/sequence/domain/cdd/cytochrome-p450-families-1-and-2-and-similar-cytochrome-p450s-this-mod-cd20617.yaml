identifier: CDD:cd20617
label: "cytochrome P450 families 1 and 2, and similar cytochrome P450s. This model includes cytochrome P450 families 1 (CYP1) and 2 (CYP2), CYP17A1, and CYP21 in vertebrates, as well as insect and crustacean CYPs similar to CYP15A1 and CYP306A1. CYP1 and CYP2 enzymes are involved in the metabolism of endogenous and exogenous compounds such as hormones, xenobiotics, and drugs. CYP17A1 catalyzes the conversion of pregnenolone and progesterone to their 17-alpha-hydroxylated products, while CYP21 catalyzes the 21-hydroxylation of steroids such as progesterone and 17-alpha-hydroxyprogesterone (17-alpha-OH-progesterone) to form 11-deoxycorticosterone and 11-deoxycortisol, respectively. Members of this group belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
