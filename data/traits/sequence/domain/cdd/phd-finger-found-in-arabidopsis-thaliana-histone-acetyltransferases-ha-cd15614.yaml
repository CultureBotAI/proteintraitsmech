identifier: CDD:cd15614
label: "PHD finger found in Arabidopsis thaliana histone acetyltransferases (HATs) HAC and similar proteins. This family includes A. thaliana HACs (HAC1/2/4/5/12), which are histone acetyltransferases of the p300/CREB-binding protein (CBP) co-activator family. CBP-type HAT proteins are also found in animals, but absent in fungi. The domain architecture of CBP-type HAT proteins differs between plants and animals. Members in this family contain an N-terminal partially conserved KIX domain, a Zf-TAZ domain, a Cysteine rich CBP-type HAT domain that harbors a plant homeodomain (PHD) finger, a Zf-ZZ domain, and a Zf-TAZ domain. PHD fingers can recognize the unmodified and modified histone H3 tail, and some have been found to interact with non-histone proteins."
