identifier: CDD:cd20317
label: "FXYD domain-containing ion transport regulator 1. FXYD domain-containing ion transport regulator 1 (FXYD1), also known as phospholemman (PLM), or sodium/potassium-transporting ATPase subunit FXYD1, associates with and regulates the activity of the sodium/potassium-transporting ATPase (NKA) which transports Na+ out of the cell and K+ into the cell. It is a plasma membrane substrate for several kinases, including protein kinase A, protein kinase C, NIMA kinase, and myotonic dystrophy kinase. It is thought to form an ion channel or regulate ion channel activity. Transcript variants with different 5' UTR sequences have been described in the literature."
definition: >-
