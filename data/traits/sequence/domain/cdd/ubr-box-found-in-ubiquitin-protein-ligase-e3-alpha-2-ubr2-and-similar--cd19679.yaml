identifier: CDD:cd19679
label: "UBR-box found in ubiquitin-protein ligase E3-alpha-2 (UBR2) and similar proteins. UBR2 (EC 2.3.2.27), also called ubiquitin-protein ligase E3-alpha-II (E3alpha-II), or N-recognin-2, is a RING-type E3 ubiquitin ligase of the Arg/N-end rule degradation pathway. It recognizes and binds to proteins bearing specific N-terminal residues that are destabilizing according to the N-end rule, leading to their ubiquitination and subsequent degradation. UBR2 is associated with chromatin and controls chromatin dynamics and gene expression in both germ cells and somatic cells. It plays an important role in spermatogenesis."
definition: >-
  UBR-box found in ubiquitin-protein ligase E3-alpha-2 (UBR2) and similar proteins. UBR2 (EC 2.3.2.27), also called ubiquitin-protein ligase E3-alpha-II (E3alpha-II), or N-recognin-2, is a RING-type E3 ubiquitin ligase of the Arg/N-end rule degradation pathway. It recognizes and binds to proteins bearing specific N-terminal residues that are destabilizing according to the N-end rule, leading to their ubiquitination and subsequent degradation. UBR2 is associated with chromatin and controls chromatin dynamics and gene expression in both germ cells and somatic cells. It plays an important role in spermatogenesis. — an NCBI CDD conserved domain (cd19679); members share this curated model.
