identifier: CDD:cd19372
label: "Uracil DNA glycosylase family 1 subfamily, includes Vaccinia virus protein D4 and similar proteins. Vaccinia virus (VAVC) protein D4 uracil-DNA glycosylase, is a subunit of the VACV DNA polymerase holoenzyme, and a more distant member of uracil DNA glycosylase (UDG) family 1. D4, in addition to excising uracil residues from DNA, is part of a heterodimeric processivity factor which potentiates the DNA polymerase activity. UDG catalyzes the removal of uracil from DNA to initiate the DNA base excision repair pathway. Uracil in DNA can arise as a result of mis-incorporation of dUMP residues by DNA polymerase or deamination of cytosine. Uracil mispaired with guanine in DNA is one of the major pro-mutagenic events, causing G:C->A:T mutations. Thus, UDG is an essential enzyme for maintaining the integrity of genetic information. UDGs have been classified into various families on the basis of their substrate specificity, conserved motifs, and structural similarities. Although these families demonstrate different substrate specificities, often the function of one enzyme can be complemented by the other."
definition: >-
  Uracil DNA glycosylase family 1 subfamily, includes Vaccinia virus protein D4 and similar proteins. Vaccinia virus (VAVC) protein D4 uracil-DNA glycosylase, is a subunit of the VACV DNA polymerase holoenzyme, and a more distant member of uracil DNA glycosylase (UDG) family 1. D4, in addition to excising uracil residues from DNA, is part of a heterodimeric processivity factor which potentiates the DNA polymerase activity. UDG catalyzes the removal of uracil from DNA to initiate the DNA base excision repair pathway. Uracil in DNA can arise as a result of mis-incorporation of dUMP residues by DNA polymerase or deamination of cytosine. Uracil mispaired with guanine in DNA is one of the major pro-mutagenic events, causing G:C->A:T mutations. Thus, UDG is an essential enzyme for maintaining the integrity of genetic information. UDGs have been classified into various families on the basis of their substrate specificity, conserved motifs, and structural similarities. Although these families demonstrate different substrate specificities, often the function of one enzyme can be complemented by the other. — an NCBI CDD conserved domain (cd19372); members share this curated model.
