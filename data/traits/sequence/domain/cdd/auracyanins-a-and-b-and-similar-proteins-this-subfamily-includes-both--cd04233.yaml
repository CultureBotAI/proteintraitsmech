identifier: CDD:cd04233
label: "Auracyanins A and B and similar proteins. This subfamily includes both auracyanins A and B from the photosynthetic bacterium Chloroflexus aurantiacus and similar proteins. Auracyanins A and B are very  similar blue copper proteins with 38% sequence identity and are homologous to the bacterial redox protein Azurin. However, auracyanin A is expressed only when C. aurantiacus cells are grown in light, whereas auracyanin B is expressed in both dark and light conditions. Thus, auracyanin A may function as a redox partner in photosynthesis, while auracyanin B may function in aerobic respiration."
definition: >-
  Auracyanins A and B and similar proteins. This subfamily includes both auracyanins A and B from the photosynthetic bacterium Chloroflexus aurantiacus and similar proteins. Auracyanins A and B are very similar blue copper proteins with 38% sequence identity and are homologous to the bacterial redox protein Azurin. However, auracyanin A is expressed only when C. aurantiacus cells are grown in light, whereas auracyanin B is expressed in both dark and light conditions. Thus, auracyanin A may function as a redox partner in photosynthesis, while auracyanin B may function in aerobic respiration. — an NCBI CDD conserved domain (cd04233); members share this curated model.
