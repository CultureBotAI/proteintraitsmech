identifier: CDD:cd02064
label: "FAD synthetase, N-terminal domain of the bifunctional enzyme. FAD synthetase_N.  N-terminal domain of the bifunctional riboflavin biosynthesis protein riboflavin kinase/FAD synthetase. These enzymes have both ATP:riboflavin 5'-phosphotransferase and ATP:FMN-adenylyltransferase activities.  The N-terminal domain is believed to play a role in the adenylylation reaction of FAD synthetases. The C-terminal domain is thought to have kinase activity.  FAD synthetase is present among all kingdoms of life.  However, the bifunctional enzyme is not found in mammals, which use separate enzymes for FMN and FAD formation."
definition: >-
  FAD synthetase, N-terminal domain of the bifunctional enzyme. FAD synthetase_N. N-terminal domain of the bifunctional riboflavin biosynthesis protein riboflavin kinase/FAD synthetase. These enzymes have both ATP:riboflavin 5'-phosphotransferase and ATP:FMN-adenylyltransferase activities. The N-terminal domain is believed to play a role in the adenylylation reaction of FAD synthetases. The C-terminal domain is thought to have kinase activity. FAD synthetase is present among all kingdoms of life. However, the bifunctional enzyme is not found in mammals, which use separate enzymes for FMN and FAD formation. — an NCBI CDD conserved domain (cd02064); members share this curated model.
