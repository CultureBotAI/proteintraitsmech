identifier: CDD:cd14078
label: "Catalytic domain of the Serine/Threonine Kinase, Maternal Embryonic Leucine zipper Kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MELK is a cell cycle dependent protein which functions in cytokinesis, cell cycle, apoptosis, cell proliferation, and mRNA processing. It is found upregulated in many types of cancer cells, playing an indispensable role in cancer cell survival. It makes an attractive target in the design of inhibitors for use in the treatment of a wide range of human cancer. The MELK subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Maternal Embryonic Leucine zipper Kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MELK is a cell cycle dependent protein which functions in cytokinesis, cell cycle, apoptosis, cell proliferation, and mRNA processing. It is found upregulated in many types of cancer cells, playing an indispensable role in cancer cell survival. It makes an attractive target in the design of inhibitors for use in the treatment of a wide range of human cancer. The MELK subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14078); members share this curated model.
