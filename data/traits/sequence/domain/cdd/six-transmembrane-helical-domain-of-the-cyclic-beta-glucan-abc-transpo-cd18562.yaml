identifier: CDD:cd18562
label: "Six-transmembrane helical domain of the cyclic beta-glucan ABC transporter NdvA, and similar proteins. This group represents the six-transmembrane domain of NdvA, an ATP-dependent exporter of cyclic beta glucans, and similar proteins. NdvA is required for nodulation of legume roots and is involved in beta-(1,2)-glucan export to the periplasm. NdvA mutants in Brucella abortus and Sinorhizobium meliloti have been shown to exhibit decreased virulence in mice and inhibit intracellular multiplication in HeLa cells. These results suggest that cyclic beta-(1,2)-glucan is required to transport into the periplasmatic space to function as a virulence factor. Bacterial exporters are typically formed by dimers of TMD-NBD half-transporters. Thus, most bacterial ABC transporters are formed of two identical TMDs and two identical NBDs."
definition: >-
  Six-transmembrane helical domain of the cyclic beta-glucan ABC transporter NdvA, and similar proteins. This group represents the six-transmembrane domain of NdvA, an ATP-dependent exporter of cyclic beta glucans, and similar proteins. NdvA is required for nodulation of legume roots and is involved in beta-(1,2)-glucan export to the periplasm. NdvA mutants in Brucella abortus and Sinorhizobium meliloti have been shown to exhibit decreased virulence in mice and inhibit intracellular multiplication in HeLa cells. These results suggest that cyclic beta-(1,2)-glucan is required to transport into the periplasmatic space to function as a virulence factor. Bacterial exporters are typically formed by dimers of TMD-NBD half-transporters. Thus, most bacterial ABC transporters are formed of two identical TMDs and two identical NBDs. — an NCBI CDD conserved domain (cd18562); members share this curated model.
