identifier: CDD:cd15451
label: "metabotropic glutamate receptor 7 in group 3, member of the class C family of seven-transmembrane G protein-coupled receptors. The receptors in group 3 include mGluRs 4, 6, 7, and 8. They are homodimeric class C G-protein coupled receptors which are activated by glutamate, the major excitatory neurotransmitter of the CNS. mGluRs are involved in regulating neuronal excitability and synaptic transmission via intracellular activation of second messenger signaling pathways. While the ionotropic glutamate receptor subtypes (AMPA, NMDA, and kainite) mediate fast excitatory postsynaptic transmission, mGluRs are known to mediate slower excitatory postsynaptic responses and to be involved in synaptic plasticity in the mammalian brain. In addition to seven-transmembrane helices, the class C GPCRs are characterized by a large N-terminal extracellular Venus flytrap-like domain, which is composed of two adjacent lobes separated by a cleft which binds an endogenous ligand. Moreover, they exist as either homo- or heterodimers, which are essential for their function. For instance, mGluRs form homodimers via interactions between the N-terminal Venus flytrap domains and the intermolecular disulphide bonds between cysteine residues located in the cysteine-rich domain (CRD). At least eight different subtypes of metabotropic receptors (mGluR1-8) have been identified and further classified into three groups based on their sequence homology, pharmacological properties, and signaling pathways. Group 1 (mGluR1 and mGluR5) receptors are predominantly located postsynaptically on neurons and are involved in long-term synaptic plasticity in the brain, including long-term potentiation (LTP) in the hippocampus and long-term depression (LTD) in the cerebellum. They are coupled to G(q/11) proteins, thereby activating phospholipase C to generate inositol-1,4,5-triphosphate (IP3) and diacyglycerol (DAG), which in turn lead to Ca2+ release and protein kinase C activation, respectively. Group 1 mGluR expression is shown to be strongly upregulated in animal models of epilepsy, brain injury, inflammatory, and neuropathic pain, as well as in patients with amyotrophic lateral sclerosis or multiple sclerosis. Group 2 (mGluR2 and mGluR3) and 3 (mGluR4, mGluR6, mGluR7, and mGluR8) receptors are predominantly localized presynaptically in the active region of neurotransmitter release. They are coupled to G(i/o) proteins, which leads to inhibition of adenylate cyclase activity and cAMP formation, and consequently to a decrease in protein kinase A (PKA) activity. Ultimately, activation of these receptors leads to inhibition of neurotransmitter release such as glutamate and GABA via inhibition of Ca2+ channels and activation of K+ channels. Furthermore, while activation of Group 1 mGluRs increases NMDA (N-methyl-D-aspartate) receptor activity and risk of neurotoxicity, Group 2 and 3 mGluRs decrease NMDA receptor activity and prevent neurotoxicity."
definition: >-
  metabotropic glutamate receptor 7 in group 3, member of the class C family of seven-transmembrane G protein-coupled receptors. The receptors in group 3 include mGluRs 4, 6, 7, and 8. They are homodimeric class C G-protein coupled receptors which are activated by glutamate, the major excitatory neurotransmitter of the CNS. mGluRs are involved in regulating neuronal excitability and synaptic transmission via intracellular activation of second messenger signaling pathways. While the ionotropic glutamate receptor subtypes (AMPA, NMDA, and kainite) mediate fast excitatory postsynaptic transmission, mGluRs are known to mediate slower excitatory postsynaptic responses and to be involved in synaptic plasticity in the mammalian brain. In addition to seven-transmembrane helices, the class C GPCRs are characterized by a large N-terminal extracellular Venus flytrap-like domain, which is composed of two adjacent lobes separated by a cleft which binds an endogenous ligand. Moreover, they exist as either homo- or heterodimers, which are essential for their function. For instance, mGluRs form homodimers via interactions between the N-terminal Venus flytrap domains and the intermolecular disulphide bonds between cysteine residues located in the cysteine-rich domain (CRD). At least eight different subtypes of metabotropic receptors (mGluR1-8) have been identified and further classified into three groups based on their sequence homology, pharmacological properties, and signaling pathways. Group 1 (mGluR1 and mGluR5) receptors are predominantly located postsynaptically on neurons and are involved in long-term synaptic plasticity in the brain, including long-term potentiation (LTP) in the hippocampus and long-term depression (LTD) in the cerebellum. They are coupled to G(q/11) proteins, thereby activating phospholipase C to generate inositol-1,4,5-triphosphate (IP3) and diacyglycerol (DAG), which in turn lead to Ca2+ release and protein kinase C activation, respectively. Group 1 mGluR expression is shown to be strongly upregulated in animal models of epilepsy, brain injury, inflammatory, and neuropathic pain, as well as in patients with amyotrophic lateral sclerosis or multiple sclerosis. Group 2 (mGluR2 and mGluR3) and 3 (mGluR4, mGluR6, mGluR7, and mGluR8) receptors are predominantly localized presynaptically in the active region of neurotransmitter release. They are coupled to G(i/o) proteins, which leads to inhibition of adenylate cyclase activity and cAMP formation, and consequently to a decrease in protein kinase A (PKA) activity. Ultimately, activation of these receptors leads to inhibition of neurotransmitter release such as glutamate and GABA via inhibition of Ca2+ channels and activation of K+ channels. Furthermore, while activation of Group 1 mGluRs increases NMDA (N-methyl-D-aspartate) receptor activity and risk of neurotoxicity, Group 2 and 3 mGluRs decrease NMDA receptor activity and prevent neurotoxicity. — an NCBI CDD conserved domain (cd15451); members share this curated model.
