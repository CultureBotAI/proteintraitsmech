identifier: CDD:cd00043
label: "Cyclin box fold superfamily. The cyclin box is a protein binding domain that functions in cell-cycle and transcriptional control. It is about 100 amino acids in length, composed of five helices, and is present in cyclins, transcription initiation factor IIB (TFIIB), and retinoblastoma tumour suppressor protein (Rb). Cyclins consist of 8 classes of cell cycle regulators that function as regulatory subunits of cyclin-dependent kinases (CDKs), which are serine/threonine kinases. The catalytic activities of CDKs are modulated not only by their interactions with cyclins but also by CDK inhibitors (CKIs). CDKs, cyclins and CKIs play key roles in transcription, epigenetic regulation, metabolism, stem cell self-renewal, neuronal functions, and spermatogenesis. TFIIB is a transcription factor that binds the TATA box. Members in this superfamily contain one or two copies of the cyclin box."
definition: >-
  Cyclin box fold superfamily. The cyclin box is a protein binding domain that functions in cell-cycle and transcriptional control. It is about 100 amino acids in length, composed of five helices, and is present in cyclins, transcription initiation factor IIB (TFIIB), and retinoblastoma tumour suppressor protein (Rb). Cyclins consist of 8 classes of cell cycle regulators that function as regulatory subunits of cyclin-dependent kinases (CDKs), which are serine/threonine kinases. The catalytic activities of CDKs are modulated not only by their interactions with cyclins but also by CDK inhibitors (CKIs). CDKs, cyclins and CKIs play key roles in transcription, epigenetic regulation, metabolism, stem cell self-renewal, neuronal functions, and spermatogenesis. TFIIB is a transcription factor that binds the TATA box. Members in this superfamily contain one or two copies of the cyclin box. — an NCBI CDD conserved domain (cd00043); members share this curated model.
