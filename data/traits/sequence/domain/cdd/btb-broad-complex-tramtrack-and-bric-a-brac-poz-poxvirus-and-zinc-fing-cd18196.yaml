identifier: CDD:cd18196
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 5 (ZBTB5). ZBTB5 is a POZ domain Kruppel-like zinc finger (POK) family transcription repressor of cell cycle arrest gene p21 and a potential proto-oncogene stimulating cell proliferation. ZBTB5 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 5 (ZBTB5). ZBTB5 is a POZ domain Kruppel-like zinc finger (POK) family transcription repressor of cell cycle arrest gene p21 and a potential proto-oncogene stimulating cell proliferation. ZBTB5 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18196); members share this curated model.
