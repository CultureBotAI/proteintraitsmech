identifier: CDD:cd19662
label: beta18b_OccD5_OpdI
definition: >-
  Outer membrane Carboxylate Channel D5 protein domain. OccD5 (known previously as OpdI) has an unknown function and its substrate is unknown. Pseudomonas sp. and other closely related soil organisms almost exclusively use specific porins for uptake throught their outer membrane, in contrast to other gram-negative organisms such as Escherichia coli which possess a large number of general porins and few specific ones. These specific porins that have channels with binding sites for related classes of molecules that facilitate uptake under nutrient deficient conditions. There are 19 members of the Occ or OprD (Outer Membrane Protein D) family of porins in Pseudomonas aeruginosa that fall into the OprD (OccD1a/OprD, OccD6/OprQ, OccD7/OpdB, OccD2/OpdC, OccD5/OpdI, OccD8/OpdJ, OccD3/OpdP, and OccD4b/OpdT) or the OpdK (OccK8/OprE, OccK7/OpdD, OccK2/OpdF, OccK9/OpdG, OccK5/OpdH, OccK1/OpdK, OccK4/OpdL, OccK10/OpdN, OccK3/OpdO, OccK6/OpdQ, and OccK11/OpdR) phylogenetic subgroup. There are different number of OprD homologs in other bacteria such as Azotobacter, Burkholderia, Shigella, and Salmonella
