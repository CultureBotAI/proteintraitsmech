identifier: CDD:cd06979
label: "Streptomyces resistomycificus RemF cyclase and related proteins, cupin domain. RemF cyclase is a manganese-containing polyketide cyclase present in bacteria that is involved in the biosynthesis of resistomycin, the aromatic pentacyclic metabolite in Streptomyces resistomycificus. Structure of this enzyme shows a cupin fold with a conserved \"jelly roll-like\" beta-barrel fold that forms a homodimer. It contains an unusual octahedral zinc-binding site in a large hydrophobic pocket that may represent the active site. The zinc ion, coordinated to four histidine side chains and two water molecules, could act as a Lewis acid in the aldol condensation reaction catalyzed by RemF, reminiscent of class II aldolases."
definition: >-
  Streptomyces resistomycificus RemF cyclase and related proteins, cupin domain. RemF cyclase is a manganese-containing polyketide cyclase present in bacteria that is involved in the biosynthesis of resistomycin, the aromatic pentacyclic metabolite in Streptomyces resistomycificus. Structure of this enzyme shows a cupin fold with a conserved "jelly roll-like" beta-barrel fold that forms a homodimer. It contains an unusual octahedral zinc-binding site in a large hydrophobic pocket that may represent the active site. The zinc ion, coordinated to four histidine side chains and two water molecules, could act as a Lewis acid in the aldol condensation reaction catalyzed by RemF, reminiscent of class II aldolases. — an NCBI CDD conserved domain (cd06979); members share this curated model.
