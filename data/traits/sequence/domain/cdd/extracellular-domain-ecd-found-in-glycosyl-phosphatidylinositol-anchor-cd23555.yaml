identifier: CDD:cd23555
label: "extracellular domain (ECD) found in glycosyl-phosphatidylinositol-anchored molecule-like protein (GML) and similar proteins. GML may play a role in the apoptotic pathway or cell-cycle regulation induced by p53/TP53 after DNA damage. It contains an extracellular domain (ECD) that belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in glycosyl-phosphatidylinositol-anchored molecule-like protein (GML) and similar proteins. GML may play a role in the apoptotic pathway or cell-cycle regulation induced by p53/TP53 after DNA damage. It contains an extracellular domain (ECD) that belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23555); members share this curated model.
