identifier: CDD:cd14307
label: "UBA domain found in yeast UBA domain-containing protein RUP1p and similar proteins. RUP1p is a ubiquitin-associated (UBA) domain-containing protein encoded by a nonessential yeast gene RUP1. It can mediate the association of Rsp5 and Ubp2. The N-terminal UBA domain is responsible for antagonizing Rsp5 function, as well as bridging the Rsp5-Ubp2 interaction. No other characterized functional domains or motifs are found in RUP1p."
definition: >-
  UBA domain found in yeast UBA domain-containing protein RUP1p and similar proteins. RUP1p is a ubiquitin-associated (UBA) domain-containing protein encoded by a nonessential yeast gene RUP1. It can mediate the association of Rsp5 and Ubp2. The N-terminal UBA domain is responsible for antagonizing Rsp5 function, as well as bridging the Rsp5-Ubp2 interaction. No other characterized functional domains or motifs are found in RUP1p. — an NCBI CDD conserved domain (cd14307); members share this curated model.
