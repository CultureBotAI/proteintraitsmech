identifier: CDD:cd00999
label: "The solute binding domain of ArtJ protein, a member of the type 2 periplasmic binding fold protein superfamily. An arginine-binding protein found in Chlamydiae trachomatis (CT-ArtJ) and pneumoniae (CPn-ArtJ) and its closely related proteins. CT- and CPn-ArtJ are shown to have different immunogenic properties despite a high sequence similarity. The ArtJ proteins display the type 2 periplasmic binding fold organized in two alpha-beta domains with arginine-binding region at their interface."
definition: >-
  The solute binding domain of ArtJ protein, a member of the type 2 periplasmic binding fold protein superfamily. An arginine-binding protein found in Chlamydiae trachomatis (CT-ArtJ) and pneumoniae (CPn-ArtJ) and its closely related proteins. CT- and CPn-ArtJ are shown to have different immunogenic properties despite a high sequence similarity. The ArtJ proteins display the type 2 periplasmic binding fold organized in two alpha-beta domains with arginine-binding region at their interface. — an NCBI CDD conserved domain (cd00999); members share this curated model.
