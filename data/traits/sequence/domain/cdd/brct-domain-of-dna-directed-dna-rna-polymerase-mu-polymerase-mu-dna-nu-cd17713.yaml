identifier: CDD:cd17713
label: "BRCT domain of DNA-directed DNA/RNA polymerase mu (polymerase mu), DNA nucleotidylexotransferase and similar proteins. The family includes DNA-directed DNA/RNA polymerase mu (polymerase mu) and DNA nucleotidylexotransferase. Polymerase mu (EC 2.7.7.7), also termed Pol mu, or terminal transferase, is a Gap-filling polymerase involved in repair of DNA double-strand breaks by non-homologous end joining (NHEJ). It participates in immunoglobulin (Ig) light chain gene rearrangement in V(D)J recombination. DNA nucleotidylexotransferase (EC 2.7.7.31), also termed terminal addition enzyme, or terminal deoxynucleotidyltransferase, or terminal transferase, is a template-independent DNA polymerase which catalyzes the random addition of deoxynucleoside 5'-triphosphate to the 3'-end of a DNA initiator. It is the addition of nucleotides at the junction (N region) of rearranged Ig heavy chain and T-cell receptor gene segments during the maturation of B- and T-cells. All family members contains a BRCT domain."
definition: >-
  BRCT domain of DNA-directed DNA/RNA polymerase mu (polymerase mu), DNA nucleotidylexotransferase and similar proteins. The family includes DNA-directed DNA/RNA polymerase mu (polymerase mu) and DNA nucleotidylexotransferase. Polymerase mu (EC 2.7.7.7), also termed Pol mu, or terminal transferase, is a Gap-filling polymerase involved in repair of DNA double-strand breaks by non-homologous end joining (NHEJ). It participates in immunoglobulin (Ig) light chain gene rearrangement in V(D)J recombination. DNA nucleotidylexotransferase (EC 2.7.7.31), also termed terminal addition enzyme, or terminal deoxynucleotidyltransferase, or terminal transferase, is a template-independent DNA polymerase which catalyzes the random addition of deoxynucleoside 5'-triphosphate to the 3'-end of a DNA initiator. It is the addition of nucleotides at the junction (N region) of rearranged Ig heavy chain and T-cell receptor gene segments during the maturation of B- and T-cells. All family members contains a BRCT domain. — an NCBI CDD conserved domain (cd17713); members share this curated model.
