identifier: CDD:cd18646
label: "chromodomain of chromobox homolog 7. CHRomatin Organization Modifier (chromo) domain of chromobox homolog 7 (CBX7), a component of the PcG repressive complex PRC1, one of the two classes of PRCs. PcG proteins form large multiprotein complexes (PcG bodies) which are involved in the stable repression of genes involved in development, signaling or cancer via chromatin-based epigenetic modifications. Mammalian PRC1 includes canonical (cPRC1) and non-canonical complexes; cPRC1, contains four core subunits including one CBX protein (CBX2, CBX4, and CBX6-CBX8) that binds H3K27me3. CBX family members have different affinity for H3K27me3, with CBX7 having the highest binding capability. The human CBX proteins show distinct nuclear localizations and contribute differently to transcriptional repression. Some CBX proteins of the PRC1 complex have been implicated in transcriptional activation as well as in PRC1-independent roles in embryonic stem cells and in somatic cells. CBX proteins may act as an oncogene or tumor suppressor in a cell-type-dependent manner, for example CBX8 promotes proliferation while suppressing metastasis, in colorectal carcinoma progression. CBX7 has been shown to function as a tumor suppressor in lung carcinoma and an oncogene in gastric cancer and lymphoma."
