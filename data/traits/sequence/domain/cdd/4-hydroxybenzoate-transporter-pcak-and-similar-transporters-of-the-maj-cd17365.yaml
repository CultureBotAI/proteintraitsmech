identifier: CDD:cd17365
label: "4-hydroxybenzoate transporter PcaK and similar transporters of the Major Facilitator Superfamily. This aromatic acid:H(+) symporter subfamily includes Acinetobacter sp. 4-hydroxybenzoate transporter PcaK, Pseudomonas putida gallate transporter (GalT), Corynebacterium glutamicum gentisate transporter (GenK), Nocardioides sp. 1-hydroxy-2-naphthoate transporter (PhdT), Escherichia coli 3-(3-hydroxy-phenyl)propionate (3HPP) transporter (MhpT), and similar proteins. These transporters are involved in the uptake across the cytoplasmic membrane of specific aromatic compounds such as 4-hydroxybenzoate, gallate, gentisate (2,5-dihydroxybenzoate), 1-hydroxy-2-naphthoate, and 3HPP, respectively. The PcaK-like aromatic acid:H(+) symporter subfamily belongs to the Metazoan Synaptic Vesicle Glycoprotein 2 (SV2) and related small molecule transporter family (SV2-like) of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  4-hydroxybenzoate transporter PcaK and similar transporters of the Major Facilitator Superfamily. This aromatic acid:H(+) symporter subfamily includes Acinetobacter sp. 4-hydroxybenzoate transporter PcaK, Pseudomonas putida gallate transporter (GalT), Corynebacterium glutamicum gentisate transporter (GenK), Nocardioides sp. 1-hydroxy-2-naphthoate transporter (PhdT), Escherichia coli 3-(3-hydroxy-phenyl)propionate (3HPP) transporter (MhpT), and similar proteins. These transporters are involved in the uptake across the cytoplasmic membrane of specific aromatic compounds such as 4-hydroxybenzoate, gallate, gentisate (2,5-dihydroxybenzoate), 1-hydroxy-2-naphthoate, and 3HPP, respectively. The PcaK-like aromatic acid:H(+) symporter subfamily belongs to the Metazoan Synaptic Vesicle Glycoprotein 2 (SV2) and related small molecule transporter family (SV2-like) of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17365); members share this curated model.
