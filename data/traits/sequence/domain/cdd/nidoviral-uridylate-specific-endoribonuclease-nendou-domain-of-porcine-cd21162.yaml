identifier: CDD:cd21162
label: "Nidoviral uridylate-specific endoribonuclease (NendoU) domain of Porcine torovirus (PToV) endoribonuclease and related proteins. Nidovirus endoribonucleases (NendoUs) are uridylate-specific endoribonucleases, which release a cleavage product containing a 2',3'-cyclic phosphate at the 3' terminal end. The Porcine torovirus (PToV) strain PToV-NPL/2013 NendoU domain is located at the N-terminus of the ORF1ab replicase polyprotein, between regions annotated as Nonstructural proteins 11 (Nsp11) and 13 (Nsp13). This subfamily belongs to a family which includes Nsp15 from coronaviruses and Nsp11 from arteriviruses, which may participate in the viral replication process and in the evasion of the host immune system. These vary in their requirement for Mn2+. Coronavirus Nsp15 generally form functional hexamers, with the exception of Porcine DeltaCoronavirus (PDCoV) Nsp15 which exists as a dimer and a monomer in solution. Arterivirus (Porcine Reproductive and Respiratory Syndrome virus) PRRSV Nsp11 is a dimer. NendoUs are distantly related to Xenopus laevis Mn(2+)-dependent uridylate-specific endoribonuclease (XendoU) which is involved in the processing of intron-encoded box C/D U16 small, nucleolar RNA."
definition: >-
  Nidoviral uridylate-specific endoribonuclease (NendoU) domain of Porcine torovirus (PToV) endoribonuclease and related proteins. Nidovirus endoribonucleases (NendoUs) are uridylate-specific endoribonucleases, which release a cleavage product containing a 2',3'-cyclic phosphate at the 3' terminal end. The Porcine torovirus (PToV) strain PToV-NPL/2013 NendoU domain is located at the N-terminus of the ORF1ab replicase polyprotein, between regions annotated as Nonstructural proteins 11 (Nsp11) and 13 (Nsp13). This subfamily belongs to a family which includes Nsp15 from coronaviruses and Nsp11 from arteriviruses, which may participate in the viral replication process and in the evasion of the host immune system. These vary in their requirement for Mn2+. Coronavirus Nsp15 generally form functional hexamers, with the exception of Porcine DeltaCoronavirus (PDCoV) Nsp15 which exists as a dimer and a monomer in solution. Arterivirus (Porcine Reproductive and Respiratory Syndrome virus) PRRSV Nsp11 is a dimer. NendoUs are distantly related to Xenopus laevis Mn(2+)-dependent uridylate-specific endoribonuclease (XendoU) which is involved in the processing of intron-encoded box C/D U16 small, nucleolar RNA. — an NCBI CDD conserved domain (cd21162); members share this curated model.
