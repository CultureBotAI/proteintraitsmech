identifier: CDD:cd23073
label: "PDZ domain of microtubule-associated serine-threonine (MAST) protein kinase 1. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of MAST family kinase MAST1, and related domains. MAST1 belongs to the MAST family kinases, which include MAST1-4. These MAST proteins contain a DUF1908 domain, a serine/threonine kinase domain, a AGC-kinase C-terminal domain, and a PDZ domain; MAST family member MASTL is a shorter protein lacking the PDZ domain. MAST1 functions as a scaffold protein to link the dystrophin/utrophin network with microfilaments via syntrophin, and it has been identified as a main driver of cisplatin resistance in human cancers. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This MAST1 family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F"
definition: >-
  PDZ domain of microtubule-associated serine-threonine (MAST) protein kinase 1. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of MAST family kinase MAST1, and related domains. MAST1 belongs to the MAST family kinases, which include MAST1-4. These MAST proteins contain a DUF1908 domain, a serine/threonine kinase domain, a AGC-kinase C-terminal domain, and a PDZ domain; MAST family member MASTL is a shorter protein lacking the PDZ domain. MAST1 functions as a scaffold protein to link the dystrophin/utrophin network with microfilaments via syntrophin, and it has been identified as a main driver of cisplatin resistance in human cancers. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This MAST1 family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F — an NCBI CDD conserved domain (cd23073); members share this curated model.
