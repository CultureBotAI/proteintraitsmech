identifier: CDD:cd23443
label: "first ricin B-type lectin domain, beta-trefoil fold, found in type II ribosome-inactivating proteins (RIPs). Type II ribosome-inactivating proteins (RIPs) inhibit translation in eukaryotes by irreversibly inactivating the 28S rRNA and preventing the binding of elongation factor II to the ribosome. They consist of a catalytic A-chain which has rRNA N-glycosidase activity and a lectin B-chain containing two ricin B-type lectin domains with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The lectin chain facilitates the internalization of the catalytic chain on binding to the cell surface. The two chains are connected by a disulfide bridge. This model corresponds to the first ricin B-type lectin domain. Members of this subfamily includes Ricinus communis ricin, bitter gourd (Momordica charantia) seed lectin (BGSL), snake gourd (Trichosanthes anguina) seed lectin (SGSL), Sambucus ebulus ebulin I, Sambucus nigra nigrin b (also known as agglutinin V or SNAV), SNAI (also known as agglutinin I), SNAI' and SNAIf, Abrus precatorius abrin (ABR) and agglutinin-I (AAG), and Viscum album beta-galactoside-specific lectins 1-4 (also known as mistletoe lectins or MLs)."
definition: >-
  first ricin B-type lectin domain, beta-trefoil fold, found in type II ribosome-inactivating proteins (RIPs). Type II ribosome-inactivating proteins (RIPs) inhibit translation in eukaryotes by irreversibly inactivating the 28S rRNA and preventing the binding of elongation factor II to the ribosome. They consist of a catalytic A-chain which has rRNA N-glycosidase activity and a lectin B-chain containing two ricin B-type lectin domains with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The lectin chain facilitates the internalization of the catalytic chain on binding to the cell surface. The two chains are connected by a disulfide bridge. This model corresponds to the first ricin B-type lectin domain. Members of this subfamily includes Ricinus communis ricin, bitter gourd (Momordica charantia) seed lectin (BGSL), snake gourd (Trichosanthes anguina) seed lectin (SGSL), Sambucus ebulus ebulin I, Sambucus nigra nigrin b (also known as agglutinin V or SNAV), SNAI (also known as agglutinin I), SNAI' and SNAIf, Abrus precatorius abrin (ABR) and agglutinin-I (AAG), and Viscum album beta-galactoside-specific lectins 1-4 (also known as mistletoe lectins or MLs). — an NCBI CDD conserved domain (cd23443); members share this curated model.
