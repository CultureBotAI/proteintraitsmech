identifier: CDD:cd09015
label: "Ureohydrolase superfamily includes arginase, formiminoglutamase, agmatinase and proclavaminate amidinohydrolase (PAH). This family, also known as arginase-like amidino hydrolase family, includes Mn-dependent enzymes: arginase (Arg, EC 3.5.3.1), formimidoylglutamase (HutG, EC 3.5.3.8 ), agmatinase (SpeB, EC 3.5.3.11), guanidinobutyrase (Gbh, EC=3.5.3.7), proclavaminate amidinohydrolase (PAH, EC 3.5.3.22) and related proteins. These enzymes catalyze hydrolysis of amide bond. They are involved in control of cellular levels of arginine and ornithine (both involved in protein biosynthesis, and production of creatine, polyamines, proline and nitric acid), in histidine and arginine degradation, and in clavulanic acid biosynthesis."
definition: >-
  Ureohydrolase superfamily includes arginase, formiminoglutamase, agmatinase and proclavaminate amidinohydrolase (PAH). This family, also known as arginase-like amidino hydrolase family, includes Mn-dependent enzymes: arginase (Arg, EC 3.5.3.1), formimidoylglutamase (HutG, EC 3.5.3.8 ), agmatinase (SpeB, EC 3.5.3.11), guanidinobutyrase (Gbh, EC=3.5.3.7), proclavaminate amidinohydrolase (PAH, EC 3.5.3.22) and related proteins. These enzymes catalyze hydrolysis of amide bond. They are involved in control of cellular levels of arginine and ornithine (both involved in protein biosynthesis, and production of creatine, polyamines, proline and nitric acid), in histidine and arginine degradation, and in clavulanic acid biosynthesis. — an NCBI CDD conserved domain (cd09015); members share this curated model.
