identifier: CDD:cd02989
label: "Phosducin (Phd)-like family, Thioredoxin (TRX) domain containing protein 9 (TxnDC9) subfamily; composed of predominantly uncharacterized eukaryotic proteins, containing a TRX-like domain without the redox active CXXC motif. The gene name for the human protein is TxnDC9. The two characterized members are described as Phd-like proteins, PLP1 of Saccharomyces cerevisiae and PhLP3 of Dictyostelium discoideum. Gene disruption experiments show that both PLP1 and PhLP3 are non-essential proteins. Unlike Phd and most Phd-like proteins, members of this group do not contain the Phd N-terminal helical domain which is implicated in binding to the G protein betagamma subunit."
definition: >-
  Phosducin (Phd)-like family, Thioredoxin (TRX) domain containing protein 9 (TxnDC9) subfamily; composed of predominantly uncharacterized eukaryotic proteins, containing a TRX-like domain without the redox active CXXC motif. The gene name for the human protein is TxnDC9. The two characterized members are described as Phd-like proteins, PLP1 of Saccharomyces cerevisiae and PhLP3 of Dictyostelium discoideum. Gene disruption experiments show that both PLP1 and PhLP3 are non-essential proteins. Unlike Phd and most Phd-like proteins, members of this group do not contain the Phd N-terminal helical domain which is implicated in binding to the G protein betagamma subunit. — an NCBI CDD conserved domain (cd02989); members share this curated model.
