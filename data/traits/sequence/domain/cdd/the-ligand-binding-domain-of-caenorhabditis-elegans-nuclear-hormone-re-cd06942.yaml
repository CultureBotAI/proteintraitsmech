identifier: CDD:cd06942
label: "The ligand binding domain of Caenorhabditis elegans nuclear hormone receptor Sex-1 protein. The ligand binding domain (LBD) of Caenorhabditis elegans nuclear hormone receptor Sex-1 protein like: Sex-1 protein of C. elegans is a transcription factor belonging to the nuclear receptor superfamily. Sex-1 plays pivotal role in sex fate of C. elegans by regulating the transcription of the sex-determination gene xol-1, which specifies male (XO) fate when active and hermaphrodite (XX) fate when inactive. The Sex-1 protein directly represses xol-1 transcription by binding to its promoter. However, the active ligand for Sex-1 protein has not yet been identified. Like other members of the nuclear receptor (NR) superfamily of ligand-activated transcription factors, Sex-1 like receptors have a central well conserved DNA binding domain (DBD), a variable N-terminal domain, a non-conserved hinge and a C-terminal ligand binding domain (LBD)."
