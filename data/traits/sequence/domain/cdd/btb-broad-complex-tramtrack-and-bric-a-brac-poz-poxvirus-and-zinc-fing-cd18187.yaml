identifier: CDD:cd18187
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in voltage-gated potassium (Kv) channels and potassium channel tetramerization domain-containing (KCTD) proteins. This family includes two protein groups: voltage-gated potassium (Kv) channels and potassium channel tetramerization domain-containing (KCTD) proteins. Kv channels are membrane proteins with fundamental physiological roles. They are responsible for a variety of electrical phenomena, such as the repolarization of the action potential, spike frequency adaptation, synaptic repolarization, and smooth muscle contraction. KCTD proteins play crucial roles in a variety of fundamental biological processes, such as protein ubiquitination and degradation, suppression of proliferation or transcription, cytoskeleton regulation, tetramerization and gating of ion channels, and others. All family members contain the BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in voltage-gated potassium (Kv) channels and potassium channel tetramerization domain-containing (KCTD) proteins. This family includes two protein groups: voltage-gated potassium (Kv) channels and potassium channel tetramerization domain-containing (KCTD) proteins. Kv channels are membrane proteins with fundamental physiological roles. They are responsible for a variety of electrical phenomena, such as the repolarization of the action potential, spike frequency adaptation, synaptic repolarization, and smooth muscle contraction. KCTD proteins play crucial roles in a variety of fundamental biological processes, such as protein ubiquitination and degradation, suppression of proliferation or transcription, cytoskeleton regulation, tetramerization and gating of ion channels, and others. All family members contain the BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. — an NCBI CDD conserved domain (cd18187); members share this curated model.
