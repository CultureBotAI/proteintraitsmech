identifier: CDD:cd13765
label: "transforming growth factor beta (TGF-beta) like domain found in anti-dorsalizing morphogenetic protein (ADMP) and similar proteins. ADMP is a bone morphogenetic protein (BMP)-like transforming growth factor beta ligand, functions in the trunk organizer to antagonize head formation, thereby regulating organizer patterning. It negatively affects the formation of the organizer, although it is robustly expressed within the organizer itself. The organizer-promoting signal of ADMP is mediated by the activin A type I receptor, ACVR1 (also known as activin receptor-like kinase-2, ALK2)."
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in anti-dorsalizing morphogenetic protein (ADMP) and similar proteins. ADMP is a bone morphogenetic protein (BMP)-like transforming growth factor beta ligand, functions in the trunk organizer to antagonize head formation, thereby regulating organizer patterning. It negatively affects the formation of the organizer, although it is robustly expressed within the organizer itself. The organizer-promoting signal of ADMP is mediated by the activin A type I receptor, ACVR1 (also known as activin receptor-like kinase-2, ALK2). — an NCBI CDD conserved domain (cd13765); members share this curated model.
