identifier: CDD:cd17297
label: "proteins similar to alpha-acetolactate dehydrogenase. The structure of this domain displays an alpha-beta-beta-alpha four layer topology, with an H(x)H(x)nH motif (x could be any residue, n could be 9 or 10) that coordinates a zinc ion. The proteins are homologous to bacterial alpha-acetolactate decarboxylase (AldB, E.C. 4.1.1.5), which converts acetolactate into acetoin."
definition: >-
  proteins similar to alpha-acetolactate dehydrogenase. The structure of this domain displays an alpha-beta-beta-alpha four layer topology, with an H(x)H(x)nH motif (x could be any residue, n could be 9 or 10) that coordinates a zinc ion. The proteins are homologous to bacterial alpha-acetolactate decarboxylase (AldB, E.C. 4.1.1.5), which converts acetolactate into acetoin. — an NCBI CDD conserved domain (cd17297); members share this curated model.
