identifier: CDD:cd17950
label: "DEAD-box helicase domain of DEAD box protein 39. DDX39A is involved in pre-mRNA splicing and is required for the export of mRNA out of the nucleus. DDX39B is an essential splicing factor required for association of U2 small nuclear ribonucleoprotein with pre-mRNA, and it also plays an important role in mRNA export from the nucleus to the cytoplasm. Diseases associated with DDX39A (also called UAP56-Related Helicase, 49 kDa) include gastrointestinal stromal tumor and inflammatory bowel disease 6, while diseases associated with DDX39B (also called 56 kDa U2AF65-Associated Protein) include Plasmodium vivax malaria. DDX39 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of DEAD box protein 39. DDX39A is involved in pre-mRNA splicing and is required for the export of mRNA out of the nucleus. DDX39B is an essential splicing factor required for association of U2 small nuclear ribonucleoprotein with pre-mRNA, and it also plays an important role in mRNA export from the nucleus to the cytoplasm. Diseases associated with DDX39A (also called UAP56-Related Helicase, 49 kDa) include gastrointestinal stromal tumor and inflammatory bowel disease 6, while diseases associated with DDX39B (also called 56 kDa U2AF65-Associated Protein) include Plasmodium vivax malaria. DDX39 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17950); members share this curated model.
