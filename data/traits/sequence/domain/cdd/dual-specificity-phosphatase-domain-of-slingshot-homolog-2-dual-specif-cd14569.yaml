identifier: CDD:cd14569
label: "dual specificity phosphatase domain of slingshot homolog 2. Dual specificity protein phosphatase slingshot homolog 2 (SSH2), also called SSH-like protein 2, is part of the slingshot (SSH) family, whose members specifically dephosphorylate and reactivate Ser-3-phosphorylated cofilin (P-cofilin), an actin-binding protein that plays an essential role in actin filament dynamics. SSH2 has been identified as a target of protein kinase D1 that regulates cofilin phosphorylation and remodeling of the actin cytoskeleton during neutrophil chemotaxis. There are at least two human SSH2 isoforms reported: hSSH-2L (long) and hSSH-2. As SSH family phosphatases, they contain an N-terminal, SSH family-specific non-catalytic (SSH-N) domain, followed by a short domain with similarity to the C-terminal domain of the chromatin-associated protein DEK, and a dual specificity phosphatase catalytic domain. In addition, hSSH-2L contains a long C-terminal tail while hSSH-2 does not."
definition: >-
  dual specificity phosphatase domain of slingshot homolog 2. Dual specificity protein phosphatase slingshot homolog 2 (SSH2), also called SSH-like protein 2, is part of the slingshot (SSH) family, whose members specifically dephosphorylate and reactivate Ser-3-phosphorylated cofilin (P-cofilin), an actin-binding protein that plays an essential role in actin filament dynamics. SSH2 has been identified as a target of protein kinase D1 that regulates cofilin phosphorylation and remodeling of the actin cytoskeleton during neutrophil chemotaxis. There are at least two human SSH2 isoforms reported: hSSH-2L (long) and hSSH-2. As SSH family phosphatases, they contain an N-terminal, SSH family-specific non-catalytic (SSH-N) domain, followed by a short domain with similarity to the C-terminal domain of the chromatin-associated protein DEK, and a dual specificity phosphatase catalytic domain. In addition, hSSH-2L contains a long C-terminal tail while hSSH-2 does not. — an NCBI CDD conserved domain (cd14569); members share this curated model.
