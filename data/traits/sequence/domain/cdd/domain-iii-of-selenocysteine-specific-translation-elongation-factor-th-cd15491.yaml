identifier: CDD:cd15491
label: "Domain III of selenocysteine-specific translation elongation factor. This family represents domain III of bacterial selenocysteine (Sec)-specific elongation factor (EFSec), homologous to domain III of EF-Tu. SelB is a specialized translation elongation factor responsible for the co-translational incorporation of selenocysteine into proteins by recoding of a UGA stop codon in the presence of a downstream mRNA hairpin loop, called Sec insertion sequence (SECIS) element."
definition: >-
  Domain III of selenocysteine-specific translation elongation factor. This family represents domain III of bacterial selenocysteine (Sec)-specific elongation factor (EFSec), homologous to domain III of EF-Tu. SelB is a specialized translation elongation factor responsible for the co-translational incorporation of selenocysteine into proteins by recoding of a UGA stop codon in the presence of a downstream mRNA hairpin loop, called Sec insertion sequence (SECIS) element. — an NCBI CDD conserved domain (cd15491); members share this curated model.
