identifier: CDD:cd14611
label: "catalytic domain of receptor-type tyrosine-protein phosphatase R. Receptor-type tyrosine-protein phosphatase-like R (PTPRR or R-PTP-R), also called protein-tyrosine phosphatase PCPTP1, belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPRR is a kinase interaction motif (KIM)-PTP, characterized by the presence of a 16-amino-acid KIM that binds specifically to members of the MAPK (mitogen-activated protein kinase) family. The human and mouse PTPRR gene produces multiple neuronal protein isoforms of varying sizes (in human, PTPPBS-alpha, beta, gamma and delta). All isoforms contain the KIM motif and the catalytic PTP domain. PTPRR-deficient mice show significant defects in fine motor coordination and balance skills that are reminiscent of a mild ataxia."
