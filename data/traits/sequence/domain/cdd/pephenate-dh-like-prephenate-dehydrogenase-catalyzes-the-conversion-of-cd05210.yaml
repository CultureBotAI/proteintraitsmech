identifier: CDD:cd05210
label: "Pephenate_dh_like. Prephenate dehydrogenase catalyzes the conversion of prephenate + NAD+ to 4-hydroxyphenylpyruvate + CO2 + NADH + H+ in the phenylalanine/tyrosine/tryptophan biosyntheis pathway. Prephenate dehydrogenase is in the 6-phosphogluconate dehydrogenase N_terminus like family. The NAD binding domain of 6-phosphogluconate dehydrogenase adopts a Rossman fold.  6-PGDH catalyzes the oxidative decarboxylation of 6-phosphogluconate to ribulose 5-phosphate with NADP+ as an electron acceptor, as part of the pentose phosphate pathway.  6-PGDH is a homodimer in which monomers act independently. 6-PGDH has about a 1000-fold greater Km for NADP+ vs. NAD+."
definition: >-
  Pephenate_dh_like. Prephenate dehydrogenase catalyzes the conversion of prephenate + NAD+ to 4-hydroxyphenylpyruvate + CO2 + NADH + H+ in the phenylalanine/tyrosine/tryptophan biosyntheis pathway. Prephenate dehydrogenase is in the 6-phosphogluconate dehydrogenase N_terminus like family. The NAD binding domain of 6-phosphogluconate dehydrogenase adopts a Rossman fold. 6-PGDH catalyzes the oxidative decarboxylation of 6-phosphogluconate to ribulose 5-phosphate with NADP+ as an electron acceptor, as part of the pentose phosphate pathway. 6-PGDH is a homodimer in which monomers act independently. 6-PGDH has about a 1000-fold greater Km for NADP+ vs. NAD+. — an NCBI CDD conserved domain (cd05210); members share this curated model.
