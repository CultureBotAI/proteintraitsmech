identifier: CDD:cd12800
label: "Sol i 2, a major allergen from fire ant venom. Sol i 2, one of four known potent allergens from the venom of red imported fire ant, is a powerful trigger of anaphylaxis. It causes production of IgE antibody in many individuals stung by fire ants. The closest structure homolog of Sol I 2 is the sequence-unrelated odorant binding protein and pheromone binding protein LUSH of the fruit fly Drosophila, suggesting a possible similar biological function."
definition: >-
  Sol i 2, a major allergen from fire ant venom. Sol i 2, one of four known potent allergens from the venom of red imported fire ant, is a powerful trigger of anaphylaxis. It causes production of IgE antibody in many individuals stung by fire ants. The closest structure homolog of Sol I 2 is the sequence-unrelated odorant binding protein and pheromone binding protein LUSH of the fruit fly Drosophila, suggesting a possible similar biological function. — an NCBI CDD conserved domain (cd12800); members share this curated model.
