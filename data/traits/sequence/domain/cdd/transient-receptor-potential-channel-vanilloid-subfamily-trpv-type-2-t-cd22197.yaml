identifier: CDD:cd22197
label: "Transient Receptor Potential channel, Vanilloid subfamily (TRPV), type 2. TRPV2 is closely related to TRPV1, sharing high sequence identity (>50%), but TRPV2 shows a higher temperature threshold and sensitivity for activation than TRPV1. TRPV2 can be stimulated by ligands or lipids, and is involved in osmosensation and mechanosensation. TRPV2 is expressed in both neuronal and non-neuronal tissues, and it has been implicated in diverse physiological and pathophysiological processes, including cardiac-structure maintenance, innate immunity, and cancer. TRPV2 belongs to the vanilloid TRP subfamily (TRPV), named after the founding member vanilloid receptor 1 (TRPV1). The structure of TRPV shows the typical topology features of all Transient Receptor Potential (TRP) ion channel family members, such as six transmembrane regions, a short hydrophobic stretch between transmembrane segments 5 and 6 and large intracellular N- and C-terminal domains."
definition: >-
  Transient Receptor Potential channel, Vanilloid subfamily (TRPV), type 2. TRPV2 is closely related to TRPV1, sharing high sequence identity (>50%), but TRPV2 shows a higher temperature threshold and sensitivity for activation than TRPV1. TRPV2 can be stimulated by ligands or lipids, and is involved in osmosensation and mechanosensation. TRPV2 is expressed in both neuronal and non-neuronal tissues, and it has been implicated in diverse physiological and pathophysiological processes, including cardiac-structure maintenance, innate immunity, and cancer. TRPV2 belongs to the vanilloid TRP subfamily (TRPV), named after the founding member vanilloid receptor 1 (TRPV1). The structure of TRPV shows the typical topology features of all Transient Receptor Potential (TRP) ion channel family members, such as six transmembrane regions, a short hydrophobic stretch between transmembrane segments 5 and 6 and large intracellular N- and C-terminal domains. — an NCBI CDD conserved domain (cd22197); members share this curated model.
