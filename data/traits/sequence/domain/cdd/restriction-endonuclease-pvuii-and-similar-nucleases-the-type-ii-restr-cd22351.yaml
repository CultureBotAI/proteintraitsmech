identifier: CDD:cd22351
label: "Restriction endonuclease PvuII and similar nucleases. The type II restriction endonuclease PvuII recognizes and cleaves the DNA sequence 5'-CAG|CTG-3' leaving blunt ends (| denotes the cleavage site). It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Restriction endonuclease PvuII and similar nucleases. The type II restriction endonuclease PvuII recognizes and cleaves the DNA sequence 5'-CAG|CTG-3' leaving blunt ends (| denotes the cleavage site). It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22351); members share this curated model.
