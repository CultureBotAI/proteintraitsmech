identifier: CDD:cd23806
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 U and related proteins. The E2U subfamily includes mammalian ubiquitin-conjugating enzymes E2 U (UBE2U/, EC 2.3.2.23) and similar proteins. They are ubiquitin-conjugating enzymes that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 U and related proteins. The E2U subfamily includes mammalian ubiquitin-conjugating enzymes E2 U (UBE2U/, EC 2.3.2.23) and similar proteins. They are ubiquitin-conjugating enzymes that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. — an NCBI CDD conserved domain (cd23806); members share this curated model.
