identifier: CDD:cd09876
label: "VapC-like PIN domain of eukaryotic ribosome assembly factor Nob1 and archaeal UPF0129 protein Ta0041-like homologs. PIN (PilT N terminus) domain of the Saccharomyces cerevisiae ribosome assembly factor, Nob1 (Nin one binding) protein, the Thermoplasma acidophilum DSM 1728, UPF0129 protein Ta0041, and similar eukaryotic and archaeal homologs are included in this family. The Nob1 PIN domain binds the single-stranded cleavage site D at the 3-prime end of 18S rRNA. Recombinant Nob1 binds as a tetramer to pre-18S rRNA fragments containing cleavage site D and believed to cleave at this site. This subgroup belongs to the VapC (virulence-associated protein C)-like family of the PIN domain nuclease superfamily. VapC is the PIN-domain ribonuclease toxin from prokaryotic VapBC toxin-antitoxin (TA) systems. VapB is a transcription factor-like protein antitoxin acting as an inhibitor. Other members of the VapC-like nuclease family include FitB toxin of the FitAB TA system, eukaryotic ribonucleases such as Smg6, ribosome assembly factor NOB1, exosome subunit Rrp44 endoribonuclease and rRNA-processing protein Fcf1. The structural properties of the PIN domain indicate its active center, consisting of three highly conserved catalytic residues which coordinate metal ions; in some members, additional metal coordinating residues can be found while some others lack several of these key catalytic residues. The PIN active site is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons. Matelska et al. recently classified PIN-like domains into distinct groups; this subgroup includes some sequences belonging to one of these, PIN_6."
definition: >-
  VapC-like PIN domain of eukaryotic ribosome assembly factor Nob1 and archaeal UPF0129 protein Ta0041-like homologs. PIN (PilT N terminus) domain of the Saccharomyces cerevisiae ribosome assembly factor, Nob1 (Nin one binding) protein, the Thermoplasma acidophilum DSM 1728, UPF0129 protein Ta0041, and similar eukaryotic and archaeal homologs are included in this family. The Nob1 PIN domain binds the single-stranded cleavage site D at the 3-prime end of 18S rRNA. Recombinant Nob1 binds as a tetramer to pre-18S rRNA fragments containing cleavage site D and believed to cleave at this site. This subgroup belongs to the VapC (virulence-associated protein C)-like family of the PIN domain nuclease superfamily. VapC is the PIN-domain ribonuclease toxin from prokaryotic VapBC toxin-antitoxin (TA) systems. VapB is a transcription factor-like protein antitoxin acting as an inhibitor. Other members of the VapC-like nuclease family include FitB toxin of the FitAB TA system, eukaryotic ribonucleases such as Smg6, ribosome assembly factor NOB1, exosome subunit Rrp44 endoribonuclease and rRNA-processing protein Fcf1. The structural properties of the PIN domain indicate its active center, consisting of three highly conserved catalytic residues which coordinate metal ions; in some members, additional metal coordinating residues can be found while some others lack several of these key catalytic residues. The PIN active site is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons. Matelska et al. recently classified PIN-like domains into distinct groups; this subgroup includes some sequences belonging to one of these, PIN_6. — an NCBI CDD conserved domain (cd09876); members share this curated model.
