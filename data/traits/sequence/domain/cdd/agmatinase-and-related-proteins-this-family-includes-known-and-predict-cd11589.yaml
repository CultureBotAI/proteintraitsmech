identifier: CDD:cd11589
label: "Agmatinase and related proteins. This family includes known and predicted bacterial agmatinase (agmatine ureohydrolase; AUH; SpeB; EC=3.5.3.11), a binuclear manganese metalloenzyme, belonging to the ureohydrolase superfamily. It is a key enzyme in the synthesis of polyamine putrescine; it catalyzes hydrolysis of agmatine to yield urea and putrescine, the precursor for biosynthesis of higher polyamines, spermidine, and spermine. Agmatinase from Deinococcus radiodurans shows approximately 33% of sequence identity to human mitochondrial agmatinase. An analysis of the evolutionary relationship among ureohydrolase superfamily enzymes indicates the pathway involving arginine decarboxylase and agmatinase evolved earlier than the arginase pathway of polyamine."
definition: >-
  Agmatinase and related proteins. This family includes known and predicted bacterial agmatinase (agmatine ureohydrolase; AUH; SpeB; EC=3.5.3.11), a binuclear manganese metalloenzyme, belonging to the ureohydrolase superfamily. It is a key enzyme in the synthesis of polyamine putrescine; it catalyzes hydrolysis of agmatine to yield urea and putrescine, the precursor for biosynthesis of higher polyamines, spermidine, and spermine. Agmatinase from Deinococcus radiodurans shows approximately 33% of sequence identity to human mitochondrial agmatinase. An analysis of the evolutionary relationship among ureohydrolase superfamily enzymes indicates the pathway involving arginine decarboxylase and agmatinase evolved earlier than the arginase pathway of polyamine. — an NCBI CDD conserved domain (cd11589); members share this curated model.
