identifier: CDD:cd07609
label: "The Bin/Amphiphysin/Rvs (BAR) domain of fungal Snf1p-interacting protein 3. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions including organelle biogenesis, membrane trafficking or remodeling, and cell division and migration. This group is composed of mostly uncharacterized fungal proteins with similarity to Saccharomyces cerevisiae Snf1p-interacting protein 3 (SIP3). These proteins contain an N-terminal BAR domain followed by a Pleckstrin Homology (PH) domain. SIP3 interacts with SNF1 protein kinase and activates transcription when anchored to DNA. It may function in the SNF1 pathway. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions."
definition: >-
  The Bin/Amphiphysin/Rvs (BAR) domain of fungal Snf1p-interacting protein 3. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions including organelle biogenesis, membrane trafficking or remodeling, and cell division and migration. This group is composed of mostly uncharacterized fungal proteins with similarity to Saccharomyces cerevisiae Snf1p-interacting protein 3 (SIP3). These proteins contain an N-terminal BAR domain followed by a Pleckstrin Homology (PH) domain. SIP3 interacts with SNF1 protein kinase and activates transcription when anchored to DNA. It may function in the SNF1 pathway. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions. — an NCBI CDD conserved domain (cd07609); members share this curated model.
