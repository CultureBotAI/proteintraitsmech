identifier: CDD:cd11033
label: "cytochrome P450 family 142 and similar cytochrome P450s. This family is composed of cytochrome P450s (CYPs) with similarity to Streptomyces sp. P450sky (also called CYP163B3), Sphingopyxis macrogoltabida P450pyr hydroxylase, Novosphingobium aromaticivorans CYP108D1, Pseudomonas sp. cytochrome P450-Terp (P450terp), and Amycolatopsis balhimycina P450 OxyD, as well as several Mycobacterium proteins CYP124, CYP125, CYP126, and CYP142. P450sky is involved in the hydroxylation of three beta-hydroxylated amino acid precursors required for the biosynthesis of the cyclic depsipeptide skyllamycin. P450pyr hydroxylase is an active and selective catalyst for the regio- and stereo-selective hydroxylation at non-activated carbon atoms with a broad substrate range. P450terp catalyzes the hydroxylation of alpha-terpineol as part of its catabolic assimilation. OxyD is involved in beta-hydroxytyrosine formation during vancomycin biosynthesis. CYP124 is a methyl-branched lipid omega-hydroxylase while CYP142 is a cholesterol 27-oxidase with likely roles in host response modulation and cholesterol metabolism. This family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 family 142 and similar cytochrome P450s. This family is composed of cytochrome P450s (CYPs) with similarity to Streptomyces sp. P450sky (also called CYP163B3), Sphingopyxis macrogoltabida P450pyr hydroxylase, Novosphingobium aromaticivorans CYP108D1, Pseudomonas sp. cytochrome P450-Terp (P450terp), and Amycolatopsis balhimycina P450 OxyD, as well as several Mycobacterium proteins CYP124, CYP125, CYP126, and CYP142. P450sky is involved in the hydroxylation of three beta-hydroxylated amino acid precursors required for the biosynthesis of the cyclic depsipeptide skyllamycin. P450pyr hydroxylase is an active and selective catalyst for the regio- and stereo-selective hydroxylation at non-activated carbon atoms with a broad substrate range. P450terp catalyzes the hydroxylation of alpha-terpineol as part of its catabolic assimilation. OxyD is involved in beta-hydroxytyrosine formation during vancomycin biosynthesis. CYP124 is a methyl-branched lipid omega-hydroxylase while CYP142 is a cholesterol 27-oxidase with likely roles in host response modulation and cholesterol metabolism. This family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd11033); members share this curated model.
