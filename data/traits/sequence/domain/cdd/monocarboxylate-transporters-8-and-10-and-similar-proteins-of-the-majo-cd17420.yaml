identifier: CDD:cd17420
label: "Monocarboxylate transporters 8 and 10, and similar proteins of the Major Facilitator Superfamily of transporters. Monocarboxylate transporters 8 (MCT8) and 10 (MCT10) are transporters which stimulate the cellular uptake of thyroid hormones such as thyroxine (T4), triiodothyronine (T3), reverse triiodothyronine (rT3) and diidothyronine (T2). MCT has a preference for T3 and is also a sodium-independent transporter that mediates the uptake or efflux of aromatic acids such as Phe, Tyr, and Trp, as well as L-3,4-di-hydroxy-phenylalanine. MCT8/10 and similar proteins belong to the Monocarboxylate transporter (MCT) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Monocarboxylate transporters 8 and 10, and similar proteins of the Major Facilitator Superfamily of transporters. Monocarboxylate transporters 8 (MCT8) and 10 (MCT10) are transporters which stimulate the cellular uptake of thyroid hormones such as thyroxine (T4), triiodothyronine (T3), reverse triiodothyronine (rT3) and diidothyronine (T2). MCT has a preference for T3 and is also a sodium-independent transporter that mediates the uptake or efflux of aromatic acids such as Phe, Tyr, and Trp, as well as L-3,4-di-hydroxy-phenylalanine. MCT8/10 and similar proteins belong to the Monocarboxylate transporter (MCT) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17420); members share this curated model.
