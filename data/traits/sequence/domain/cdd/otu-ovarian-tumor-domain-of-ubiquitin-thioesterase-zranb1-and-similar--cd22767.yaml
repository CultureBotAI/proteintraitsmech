identifier: CDD:cd22767
label: "OTU (ovarian tumor) domain of Ubiquitin thioesterase ZRANB1 and similar proteins. ZRANB1 is also called TRAF-binding domain-containing protein, Trabid, or zinc finger Ran-binding domain-containing protein 1. It is a deubiquitinase (DUB)/ubiquitin thioesterase (EC 3.4.19.12) that specifically hydrolyzes 'Lys-29'-linked and 'Lys-33'-linked diubiquitin; it also cleaves 'Lys-63'-linked chains with less efficiency. ZRANB1 binds, deubiquitinates, and stabilizes EZH2, which is the catalytic component of the Polycomb repressive complex 2 (PRC2) that silences gene transcription by methylating histone H3 at lysine 27 and is mutated or highly expressed in many types of cancer, including lymphoma, melanoma, prostate cancer, ovarian cancer, and breast cancer. Drosophila Trabid interacts with TGF-beta Activating Kinase 1 (TAK1), which triggers both immunity and apoptosis, resulting in reduced immune signaling output and K63-linked ubiquitination. ZRANB1 belongs to the OTU family of cysteine proteases that use a conserved cysteine and histidine, and in most cases an aspartate, as the catalytic triad. ZRANB1 does not contain the conserved aspartate, and uses cysteine and histidine as a catalytic dyad. It is classified as a family C64 cysteine protease by MEROPS."
definition: >-
  OTU (ovarian tumor) domain of Ubiquitin thioesterase ZRANB1 and similar proteins. ZRANB1 is also called TRAF-binding domain-containing protein, Trabid, or zinc finger Ran-binding domain-containing protein 1. It is a deubiquitinase (DUB)/ubiquitin thioesterase (EC 3.4.19.12) that specifically hydrolyzes 'Lys-29'-linked and 'Lys-33'-linked diubiquitin; it also cleaves 'Lys-63'-linked chains with less efficiency. ZRANB1 binds, deubiquitinates, and stabilizes EZH2, which is the catalytic component of the Polycomb repressive complex 2 (PRC2) that silences gene transcription by methylating histone H3 at lysine 27 and is mutated or highly expressed in many types of cancer, including lymphoma, melanoma, prostate cancer, ovarian cancer, and breast cancer. Drosophila Trabid interacts with TGF-beta Activating Kinase 1 (TAK1), which triggers both immunity and apoptosis, resulting in reduced immune signaling output and K63-linked ubiquitination. ZRANB1 belongs to the OTU family of cysteine proteases that use a conserved cysteine and histidine, and in most cases an aspartate, as the catalytic triad. ZRANB1 does not contain the conserved aspartate, and uses cysteine and histidine as a catalytic dyad. It is classified as a family C64 cysteine protease by MEROPS. — an NCBI CDD conserved domain (cd22767); members share this curated model.
