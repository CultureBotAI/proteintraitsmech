identifier: CDD:cd21036
label: "winged helix domain found in crossover junction endonuclease MUS81 and similar proteins. MUS81 is a crossover junction endonuclease that interacts with EME1 (essential meiotic structure-specific endonuclease 1) and EME2, to form a DNA structure-specific endonuclease with substrate preference for branched DNA structures with a 5'-end at the branch nick. The MUS80-EME1 endonuclease maintains genomic integrity in metazoans by cleaving branched DNA structures that can form during mitosis and fission yeast meiosis, and during processing of damaged replication folks. This model corresponds to the winged helix (WH) domain of MUS81, which is responsible for DNA binding. It comprises four helices and two beta strands."
definition: >-
  winged helix domain found in crossover junction endonuclease MUS81 and similar proteins. MUS81 is a crossover junction endonuclease that interacts with EME1 (essential meiotic structure-specific endonuclease 1) and EME2, to form a DNA structure-specific endonuclease with substrate preference for branched DNA structures with a 5'-end at the branch nick. The MUS80-EME1 endonuclease maintains genomic integrity in metazoans by cleaving branched DNA structures that can form during mitosis and fission yeast meiosis, and during processing of damaged replication folks. This model corresponds to the winged helix (WH) domain of MUS81, which is responsible for DNA binding. It comprises four helices and two beta strands. — an NCBI CDD conserved domain (cd21036); members share this curated model.
