identifier: CDD:cd16899
label: "C-type invertebrate lysozyme. C-type lysozyme proteins of invertebrates, including digestive lysozymes 1 and 2 from Musca domestica, which aid in the use of bacteria as a food source. These lysozymes have high expression in the gut and optimal lytic activity at a lower pH. Other lysozymes in this subfamily have immunological roles. e.g. Anopheles gambiae has eight lysozymes, most of which seem to have immunological roles, those some may function as digestive enzymes in larvae. C-type lysozyme (chicken or conventional type;  1, 4-beta-N-acetylmuramidase) has bacteriolytic properties through the hydolysis of beta-1,4, glyocosidic linkages  between N-acetylmuramic acid and N-acetyl-D-glucosamine residues in a peptidoglycan, as well as between N-acetyl-D-glucosamine residues in chitodextrins."
definition: >-
  C-type invertebrate lysozyme. C-type lysozyme proteins of invertebrates, including digestive lysozymes 1 and 2 from Musca domestica, which aid in the use of bacteria as a food source. These lysozymes have high expression in the gut and optimal lytic activity at a lower pH. Other lysozymes in this subfamily have immunological roles. e.g. Anopheles gambiae has eight lysozymes, most of which seem to have immunological roles, those some may function as digestive enzymes in larvae. C-type lysozyme (chicken or conventional type; 1, 4-beta-N-acetylmuramidase) has bacteriolytic properties through the hydolysis of beta-1,4, glyocosidic linkages between N-acetylmuramic acid and N-acetyl-D-glucosamine residues in a peptidoglycan, as well as between N-acetyl-D-glucosamine residues in chitodextrins. — an NCBI CDD conserved domain (cd16899); members share this curated model.
