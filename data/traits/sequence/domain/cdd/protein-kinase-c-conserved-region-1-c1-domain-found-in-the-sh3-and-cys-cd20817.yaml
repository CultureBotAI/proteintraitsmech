identifier: CDD:cd20817
label: "protein kinase C conserved region 1 (C1 domain) found in the SH3 and cysteine-rich domain-containing protein (Stac) family. Stac proteins are putative adaptor proteins that are important for neuronal function. There are three mammalian members (Stac1, Stac2 and Stac3) of this family. Stac1 and Stac3 contain two SH3 domains while Stac2 contains a single SH3 domain at the C-terminus. Stac1 and Stac2 have been found to be expressed differently in mature dorsal root ganglia (DRG) neurons. Stac1 is mainly expressed in peptidergic neurons while Stac2 is found in a subset of nonpeptidergic and all trkB+ neurons. Stac proteins contain a cysteine-rich C1 domain and one or two SH3 domains at the C-terminus. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in the SH3 and cysteine-rich domain-containing protein (Stac) family. Stac proteins are putative adaptor proteins that are important for neuronal function. There are three mammalian members (Stac1, Stac2 and Stac3) of this family. Stac1 and Stac3 contain two SH3 domains while Stac2 contains a single SH3 domain at the C-terminus. Stac1 and Stac2 have been found to be expressed differently in mature dorsal root ganglia (DRG) neurons. Stac1 is mainly expressed in peptidergic neurons while Stac2 is found in a subset of nonpeptidergic and all trkB+ neurons. Stac proteins contain a cysteine-rich C1 domain and one or two SH3 domains at the C-terminus. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20817); members share this curated model.
