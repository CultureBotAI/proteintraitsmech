label: "Escherichia coli WbuB and similar proteins. This family is most closely related to the GT1 family of glycosyltransferases. WbuB in E. coli is involved in the biosynthesis of the O26 O-antigen.  It has been proposed to function as an N-acetyl-L-fucosamine (L-FucNAc) transferase."
definition: >-
  Escherichia coli WbuB and similar proteins. This family is most closely related to the GT1 family of glycosyltransferases. WbuB in E. coli is involved in the biosynthesis of the O26 O-antigen. It has been proposed to function as an N-acetyl-L-fucosamine (L-FucNAc) transferase. — an NCBI CDD conserved domain (cd03794); members share this curated model.
