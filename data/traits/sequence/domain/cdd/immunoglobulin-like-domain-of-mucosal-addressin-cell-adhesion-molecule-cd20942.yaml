identifier: CDD:cd20942
label: "Immunoglobulin-like domain of Mucosal addressin cell-adhesion molecule (MAdCAM-1); member of the I-set of IgSF domains. The members here include the immunoglobulin-like domain of Mucosal addressin cell-adhesion molecule (MAdCAM-1). MadCAM-1 is an endothelial cell adhesion molecule that interacts preferentially with the leukocyte beta7 integrin LPAM-1 (alpha4beta7), L-selectin, and VLA-4 (alpha4beta1) on myeloid cells to direct leukocytes into mucosal and inflamed tissues. MadCAM-1 is expressed primarily on HEV of Peyer's patches and on venules in small intestinal lamina propria, on the marginal sinus of the spleen, and on HEV of embryonic lymph nodes. It is a member of the immunoglobulin superfamily (IgSF), which is a heterogenous group of proteins, built on a common fold comprised of a sandwich of two beta sheets. The two sheets are linked together by a conserved disulfide bond between B strand and F strand. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. The first Ig-like domain of MAdCAM-1 is a member of the I-set IgSF domains, having A-B-E-D strands in one beta-sheet and A'-G-F-C-C' in the other. Like the V-set Ig domains, the A strand of the I-set is discontinuous, but lacks a C\" strand."
definition: >-
  Immunoglobulin-like domain of Mucosal addressin cell-adhesion molecule (MAdCAM-1); member of the I-set of IgSF domains. The members here include the immunoglobulin-like domain of Mucosal addressin cell-adhesion molecule (MAdCAM-1). MadCAM-1 is an endothelial cell adhesion molecule that interacts preferentially with the leukocyte beta7 integrin LPAM-1 (alpha4beta7), L-selectin, and VLA-4 (alpha4beta1) on myeloid cells to direct leukocytes into mucosal and inflamed tissues. MadCAM-1 is expressed primarily on HEV of Peyer's patches and on venules in small intestinal lamina propria, on the marginal sinus of the spleen, and on HEV of embryonic lymph nodes. It is a member of the immunoglobulin superfamily (IgSF), which is a heterogenous group of proteins, built on a common fold comprised of a sandwich of two beta sheets. The two sheets are linked together by a conserved disulfide bond between B strand and F strand. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. The first Ig-like domain of MAdCAM-1 is a member of the I-set IgSF domains, having A-B-E-D strands in one beta-sheet and A'-G-F-C-C' in the other. Like the V-set Ig domains, the A strand of the I-set is discontinuous, but lacks a C" strand. — an NCBI CDD conserved domain (cd20942); members share this curated model.
