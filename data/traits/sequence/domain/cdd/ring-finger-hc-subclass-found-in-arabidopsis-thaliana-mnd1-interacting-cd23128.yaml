identifier: CDD:cd23128
label: "RING finger, HC subclass, found in Arabidopsis thaliana MND1-interacting protein 1 (MIP1) and similar proteins. This subfamily includes Arabidopsis thaliana MIP1, RING finger protein 4 (RF4) and RING finger protein 298 (RF298). MIP1 interacts with MND1, HOP2 and XRI1. RF4 and RF298 are putative E3 ubiquitin-protein ligase that may mediate E2-dependent protein ubiquitination. Members of this subfamily contain a typical C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in Arabidopsis thaliana MND1-interacting protein 1 (MIP1) and similar proteins. This subfamily includes Arabidopsis thaliana MIP1, RING finger protein 4 (RF4) and RING finger protein 298 (RF298). MIP1 interacts with MND1, HOP2 and XRI1. RF4 and RF298 are putative E3 ubiquitin-protein ligase that may mediate E2-dependent protein ubiquitination. Members of this subfamily contain a typical C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd23128); members share this curated model.
