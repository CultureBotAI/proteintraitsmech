identifier: CDD:cd02226
label: "Bacillus subtilis YdbB and related proteins, cupin domain. This family includes bacterial proteins homologous to YdbB, a Bacillus subtilis protein of unknown function. It also includes protein Nmb1881 From Neisseria meningitidis, also of unknown function. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
