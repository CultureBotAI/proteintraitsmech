identifier: CDD:cd01601
label: "Short chain 3-hydroxyacyl-CoA dehydrogenase, NAD binding domain. SCHAD is a soluble dimeric enzmye that catalyzes the NAD+ dependent oxidation of  L-3-hyxylacyl-CoA to a keto group in fatty acid metabolism. The fatty acid beta-oxidation multienzyme complex of Pseudomanas fragi has 3 predominant enzymatic activities.  The middle domain corresponds to L-3-hydroxyacyl-CoA dehydrogenase and binds NAD."
definition: >-
  Short chain 3-hydroxyacyl-CoA dehydrogenase, NAD binding domain. SCHAD is a soluble dimeric enzmye that catalyzes the NAD+ dependent oxidation of L-3-hyxylacyl-CoA to a keto group in fatty acid metabolism. The fatty acid beta-oxidation multienzyme complex of Pseudomanas fragi has 3 predominant enzymatic activities. The middle domain corresponds to L-3-hydroxyacyl-CoA dehydrogenase and binds NAD. — an NCBI CDD conserved domain (cd01601); members share this curated model.
