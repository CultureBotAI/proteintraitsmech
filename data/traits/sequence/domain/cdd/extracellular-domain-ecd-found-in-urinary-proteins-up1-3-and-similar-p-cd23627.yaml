identifier: CDD:cd23627
label: "extracellular domain (ECD) found in urinary proteins (UP1-3) and similar proteins. The family includes UP1 (also called liver regeneration-related protein LRRG05), UP2 and UP3, which are secreted proteins containing an extracellular domain (ECD) that belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in urinary proteins (UP1-3) and similar proteins. The family includes UP1 (also called liver regeneration-related protein LRRG05), UP2 and UP3, which are secreted proteins containing an extracellular domain (ECD) that belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23627); members share this curated model.
