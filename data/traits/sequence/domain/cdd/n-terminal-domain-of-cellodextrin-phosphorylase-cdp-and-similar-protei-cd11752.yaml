identifier: CDD:cd11752
label: GH94N_CDP_like
definition: >-
  N-terminal domain of cellodextrin phosphorylase (CDP) and similar proteins. The glycoside hydrolase family 94 (previously known as glycosyltransferase family 36) includes cellodextrin phosphorylase (EC:2.4.1.49), also known as 1,4-beta-D-oligo-D-glucan:phosphate alpha-D-glucosyltransferase or CepB. This N-terminal domain is involved in oligomerization and may play a role in catalysis, but it is separate from the catalytic domain [an (alpha/alpha)(6) barrel]. Cellodextrin phosphorylase catalyzes the reversible and phosphate dependent removal of a single alpha-D-glucose-1-phosphate unit from a (1,4-beta-D-glucosyl) oligomer
