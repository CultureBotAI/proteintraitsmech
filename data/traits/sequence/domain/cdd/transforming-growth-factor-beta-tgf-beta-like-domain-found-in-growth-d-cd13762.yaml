identifier: CDD:cd13762
label: TGF_beta_GDP9_9B_like
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in growth/differentiation factor 9 (GDF-9), growth/differentiation factor 9B (GDF-9B) and similar proteins. The family includes GDF-9B (also known as BMP15) and GDF9. GDF-9B acts as oocyte-specific growth/differentiation factor that stimulates folliculogenesis and granulosa cell (GC) growth. GDF-9 is required for ovarian folliculogenesis. It promotes primordial follicle development and stimulates granulosa cell proliferation
