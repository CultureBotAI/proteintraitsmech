identifier: CDD:cd21988
label: "high mobility group (HMG)-box found in HMG box-containing protein 1 (HBP1) and similar proteins. HBP1, also called HMG box transcription factor 1, or high mobility group box transcription factor 1, is a transcriptional repressor that binds to the promoter region of target genes. It plays a role in the regulation of the cell cycle and the Wnt pathway. HBP1 binds preferentially to the sequence 5'-TTCATTCATTCA-3'."
definition: >-
  high mobility group (HMG)-box found in HMG box-containing protein 1 (HBP1) and similar proteins. HBP1, also called HMG box transcription factor 1, or high mobility group box transcription factor 1, is a transcriptional repressor that binds to the promoter region of target genes. It plays a role in the regulation of the cell cycle and the Wnt pathway. HBP1 binds preferentially to the sequence 5'-TTCATTCATTCA-3'. — an NCBI CDD conserved domain (cd21988); members share this curated model.
