identifier: CDD:cd16944
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Azorhizobium caulinodans NtrY. This family includes the histidine kinase-like ATPase (HATPase) domains of various histidine kinases (HKs) of two-component signal transduction systems (TCSs) such as Azorhizobium caulinodans ORS571 NtrY of the NtrY-NtrX TCS, which is involved in nitrogen fixation and metabolism. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA) and a HAMP sensor domain; some also have PAS sensor domains."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Azorhizobium caulinodans NtrY. This family includes the histidine kinase-like ATPase (HATPase) domains of various histidine kinases (HKs) of two-component signal transduction systems (TCSs) such as Azorhizobium caulinodans ORS571 NtrY of the NtrY-NtrX TCS, which is involved in nitrogen fixation and metabolism. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA) and a HAMP sensor domain; some also have PAS sensor domains. — an NCBI CDD conserved domain (cd16944); members share this curated model.
