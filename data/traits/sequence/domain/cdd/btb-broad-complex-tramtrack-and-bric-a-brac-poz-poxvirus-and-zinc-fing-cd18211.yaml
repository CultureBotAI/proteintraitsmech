identifier: CDD:cd18211
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in glial cell line-derived neurotrophic factor-inducible zinc finger protein 1 (GZF1). GZF1 is also called GDNF-inducible zinc finger protein 1, zinc finger and BTB domain-containing protein 23 (ZBTB23), or zinc finger protein 336 (ZNF336). It is a sequence-specific transcriptional repressor that binds the GZF1 responsive element (GRE), with the consensus sequence of 5'-TGCGCN[TG][CA]TATA-3'. It may play a role in renal branching morphogenesis. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in glial cell line-derived neurotrophic factor-inducible zinc finger protein 1 (GZF1). GZF1 is also called GDNF-inducible zinc finger protein 1, zinc finger and BTB domain-containing protein 23 (ZBTB23), or zinc finger protein 336 (ZNF336). It is a sequence-specific transcriptional repressor that binds the GZF1 responsive element (GRE), with the consensus sequence of 5'-TGCGCN[TG][CA]TATA-3'. It may play a role in renal branching morphogenesis. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18211); members share this curated model.
