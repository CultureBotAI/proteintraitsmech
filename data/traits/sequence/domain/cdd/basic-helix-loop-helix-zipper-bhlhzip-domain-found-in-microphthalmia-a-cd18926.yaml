identifier: CDD:cd18926
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in microphthalmia-associated transcription factor (MITF) and similar proteins. MITF, also termed Class E basic helix-loop-helix protein 32 (bHLHe32), is a bHLHzip transcription factor that is involved in neural crest melanocytes development as well as the pigmented retinal epithelium. It regulates the expression of genes with essential roles in cell differentiation, proliferation and survival. It binds to M-boxes (5'-TCATGTG-3') and symmetrical DNA sequences (E-boxes) (5'-CACGTG-3') found in the promoters of target genes, such as BCL2 and tyrosinase (TYR)."
definition: >-
  basic Helix-Loop-Helix-zipper (bHLHzip) domain found in microphthalmia-associated transcription factor (MITF) and similar proteins. MITF, also termed Class E basic helix-loop-helix protein 32 (bHLHe32), is a bHLHzip transcription factor that is involved in neural crest melanocytes development as well as the pigmented retinal epithelium. It regulates the expression of genes with essential roles in cell differentiation, proliferation and survival. It binds to M-boxes (5'-TCATGTG-3') and symmetrical DNA sequences (E-boxes) (5'-CACGTG-3') found in the promoters of target genes, such as BCL2 and tyrosinase (TYR). — an NCBI CDD conserved domain (cd18926); members share this curated model.
