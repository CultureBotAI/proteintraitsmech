identifier: CDD:cd20262
label: Complex1_LYR_LYRM2
definition: >-
  LYR (leucine-tyrosine-arginine) motif found in LYR motif-containing protein 2 (LYRM2) and similar proteins. LYRM2 is an uncharacterized LYR motif-containing protein that belongs to the Complex1_LYR-like superfamily which consists of proteins of diverse functions that are exclusively found in eukaryotes; these proteins contain the conserved tripeptide 'LYR' close to the N-terminus
