identifier: CDD:cd19639
label: "Porin OmpH domain. OmpH from the deep-sea bacterium Photobacterium SS9 is similar to a number of porin proteins, including significant similarity to porin protein P2 from Haemophilus influenzae. Porin OmpH is thought to be responsive to changes in the pressure regime of the deep-sea bacterium. Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane.  They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances.  Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface."
definition: >-
  Porin OmpH domain. OmpH from the deep-sea bacterium Photobacterium SS9 is similar to a number of porin proteins, including significant similarity to porin protein P2 from Haemophilus influenzae. Porin OmpH is thought to be responsive to changes in the pressure regime of the deep-sea bacterium. Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane. They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances. Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface. — an NCBI CDD conserved domain (cd19639); members share this curated model.
