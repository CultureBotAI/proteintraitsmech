identifier: CDD:cd15673
label: "Extended PHD finger found in PHD finger protein 6 (PHF6) and PHD finger protein 11 (PHF11). The extended plant homeodomain (ePHD) zinc finger is characterized as Cys2HisCys5HisCys2His. This model includes the two ePHD fingers of PFH6 and the single ePHD finger of PFH11. PHF6, also termed the X-linked mental retardation disorder Borjeson-Forssman-Lehmann syndrome-associated protein, is a nucleolus, ribosomal RNA promoter-associated protein that regulates cell cycle progression by suppressing ribosomal RNA synthesis. It has been implicated in cell cycle control, genomic maintenance, and tumor suppression. PHF6 shows transcriptional repression activity through directly interacting with the nucleosome remodeling and deacetylation complex component RBBP4. PHF6 contains two non-canonical ePHD fingers. PHF11, also termed BRCA1 C-terminus-associated protein, or renal carcinoma antigen NY-REN-34, is a transcriptional co-activator of the Th1 effector cytokine genes, interleukin-2 (IL2) and interferon-gamma (IFNG), co-operating with nuclear factor kappa B (NF-kappaB). It is involved in T-cell activation and viability. Polymorphisms within PHF11 are associated with total IgE, allergic asthma and eczema."
definition: >-
  Extended PHD finger found in PHD finger protein 6 (PHF6) and PHD finger protein 11 (PHF11). The extended plant homeodomain (ePHD) zinc finger is characterized as Cys2HisCys5HisCys2His. This model includes the two ePHD fingers of PFH6 and the single ePHD finger of PFH11. PHF6, also termed the X-linked mental retardation disorder Borjeson-Forssman-Lehmann syndrome-associated protein, is a nucleolus, ribosomal RNA promoter-associated protein that regulates cell cycle progression by suppressing ribosomal RNA synthesis. It has been implicated in cell cycle control, genomic maintenance, and tumor suppression. PHF6 shows transcriptional repression activity through directly interacting with the nucleosome remodeling and deacetylation complex component RBBP4. PHF6 contains two non-canonical ePHD fingers. PHF11, also termed BRCA1 C-terminus-associated protein, or renal carcinoma antigen NY-REN-34, is a transcriptional co-activator of the Th1 effector cytokine genes, interleukin-2 (IL2) and interferon-gamma (IFNG), co-operating with nuclear factor kappa B (NF-kappaB). It is involved in T-cell activation and viability. Polymorphisms within PHF11 are associated with total IgE, allergic asthma and eczema. — an NCBI CDD conserved domain (cd15673); members share this curated model.
