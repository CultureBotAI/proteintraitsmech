s the receptor-binding domain (RBD). While the RBDs of MHV and HCoV-OC43 are located at the NTD, most CoVs use the C-domain to bind their receptors. Although a protein receptor has not yet been identified for HKU1, antibodies against the C-domain, but not those against the NTD, blocked HKU1 infection of cells, suggesting that the S1 C-domain is the primary HKU1 receptor-binding site. Due to the key role of the S protein RBD in viral attachment, it is the major target for antibody-mediated neutralization. This model corresponds to the S1 subunit C-domain that serves as the RBD for most CoVs. — an NCBI CDD conserved domain (cd21478); members share this curated model.
