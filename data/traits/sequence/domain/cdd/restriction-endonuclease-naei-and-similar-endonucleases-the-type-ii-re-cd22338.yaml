identifier: CDD:cd22338
label: NaeI-like
definition: >-
  Restriction endonuclease NaeI and similar endonucleases. The type II restriction endonuclease NaeI recognizes and cleaves the DNA motif GCC|GGC (| denotes the cleavage site) and forms a covalent bond with the cleaved substrate. The enzyme binds two DNA recognition sites and only cleaves one DNA sequence. It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI
