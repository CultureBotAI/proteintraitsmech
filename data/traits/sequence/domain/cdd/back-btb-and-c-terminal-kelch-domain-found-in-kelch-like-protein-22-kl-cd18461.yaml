identifier: CDD:cd18461
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 22 (KLHL22). KLHL22 is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex required for chromosome alignment and localization of Polo-like kinase 1 (PLK1) at kinetochores. The BCR(KLHL22) ubiquitin ligase complex mediates monoubiquitination of PLK1, leading to PLK1 dissociation from phosphoreceptor proteins and subsequent removal from kinetochores, allowing silencing of the spindle assembly checkpoint (SAC) and chromosome segregation."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 22 (KLHL22). KLHL22 is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex required for chromosome alignment and localization of Polo-like kinase 1 (PLK1) at kinetochores. The BCR(KLHL22) ubiquitin ligase complex mediates monoubiquitination of PLK1, leading to PLK1 dissociation from phosphoreceptor proteins and subsequent removal from kinetochores, allowing silencing of the spindle assembly checkpoint (SAC) and chromosome segregation. — an NCBI CDD conserved domain (cd18461); members share this curated model.
