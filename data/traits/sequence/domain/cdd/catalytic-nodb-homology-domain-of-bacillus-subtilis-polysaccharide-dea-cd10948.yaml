identifier: CDD:cd10948
label: "Catalytic NodB homology domain of Bacillus subtilis polysaccharide deacetylase PdaA, and its bacterial homologs. The Bacillus subtilis genome contains six polysaccharide deacetylase gene homologs: pdaA, pdaB (previously known as ybaN), yheN, yjeA, yxkH and ylxY. This family is represented by Bacillus subtilis pdaA gene encoding polysaccharide deacetylase BsPdaA, which is a member of the carbohydrate esterase 4 (CE4) superfamily. BsPdaA deacetylates peptidoglycan N-acetylmuramic acid (MurNAc) residues to facilitate the formation of muramic delta-lactam, which is required for recognition of germination lytic enzymes. BsPdaA deficiency leads to the absence of muramic delta-lactam residues in the spore cortex. Like other CE4 esterases, BsPdaA consists of a single catalytic NodB homology domain that appears to adopt a deformed (beta/alpha)8 barrel fold with a putative substrate binding groove harboring the majority of the conserved residues. It utilizes a general acid/base catalytic mechanism involving a tetrahedral transition intermediate, where a water molecule functions as the nucleophile tightly associated to the zinc cofactor."
definition: >-
  Catalytic NodB homology domain of Bacillus subtilis polysaccharide deacetylase PdaA, and its bacterial homologs. The Bacillus subtilis genome contains six polysaccharide deacetylase gene homologs: pdaA, pdaB (previously known as ybaN), yheN, yjeA, yxkH and ylxY. This family is represented by Bacillus subtilis pdaA gene encoding polysaccharide deacetylase BsPdaA, which is a member of the carbohydrate esterase 4 (CE4) superfamily. BsPdaA deacetylates peptidoglycan N-acetylmuramic acid (MurNAc) residues to facilitate the formation of muramic delta-lactam, which is required for recognition of germination lytic enzymes. BsPdaA deficiency leads to the absence of muramic delta-lactam residues in the spore cortex. Like other CE4 esterases, BsPdaA consists of a single catalytic NodB homology domain that appears to adopt a deformed (beta/alpha)8 barrel fold with a putative substrate binding groove harboring the majority of the conserved residues. It utilizes a general acid/base catalytic mechanism involving a tetrahedral transition intermediate, where a water molecule functions as the nucleophile tightly associated to the zinc cofactor. — an NCBI CDD conserved domain (cd10948); members share this curated model.
