identifier: CDD:cd17586
label: "phosphoacceptor receiver (REC) domain of PFxFATGY motif single-domain (stand-alone) response regulators. This subfamily is composed of stand-alone response regulators (RRs) containing the PFxFATG[G/Y] motif; RRs with such a motif are also called ''FAT GUY'' response regulators. Included in this subfamily are Sphingomonas melonis SdrG, Sinorhizobium meliloti Sma0114, and Erythrobacter litoralis EL_LovR. SdrG is involved in the control of the general stress response. Sma0114 is part of the Sma0113/Sma0114 two-component system (TCS) that is involved in catabolite repression and polyhydroxy butyrate synthesis. EL_LovR is involved in a light-regulated TCS. PFxFATG[G/Y] RRs are typically associated with histidine-tryptophan-glutamate (HWE) histidine kinases that constitute a subclass of the larger histidine kinase superfamily characterized by an altered ATP binding site, which lacks the F-box that is normally an integral component of the ATP lid. The PFxFATG[G/Y] motif is involved in conformational changes after phosphorylation that results in the activation of the RR. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of PFxFATGY motif single-domain (stand-alone) response regulators. This subfamily is composed of stand-alone response regulators (RRs) containing the PFxFATG[G/Y] motif; RRs with such a motif are also called ''FAT GUY'' response regulators. Included in this subfamily are Sphingomonas melonis SdrG, Sinorhizobium meliloti Sma0114, and Erythrobacter litoralis EL_LovR. SdrG is involved in the control of the general stress response. Sma0114 is part of the Sma0113/Sma0114 two-component system (TCS) that is involved in catabolite repression and polyhydroxy butyrate synthesis. EL_LovR is involved in a light-regulated TCS. PFxFATG[G/Y] RRs are typically associated with histidine-tryptophan-glutamate (HWE) histidine kinases that constitute a subclass of the larger histidine kinase superfamily characterized by an altered ATP binding site, which lacks the F-box that is normally an integral component of the ATP lid. The PFxFATG[G/Y] motif is involved in conformational changes after phosphorylation that results in the activation of the RR. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17586); members share this curated model.
