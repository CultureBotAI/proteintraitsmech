identifier: CDD:cd02059
label: "serpin family B member 14, ovalbumin. The chicken protein ovalbumin (OVA3), a storage protein from egg white, lacking a loop insertion mechanism and therefore protease inhibitory activity, is a historical member of the serpin superfamily and the founding member of the subgroup known as ov-serpins (ovalbumin-related serpins). It has several modifications, including N-terminal acetylation, phosphorylation, and glycosylation. Ovalbumin is secreted from the cell, targeted by an internal signal sequence, rather than the N-terminal signal sequence commonly found in other secreted proteins. The ovalbumin family of serpins (ov-serpins) is a family of closely related proteins, whose members can be secreted (ovalbumin), cytosolic (leukocyte elastase inhibitor, LEI), or targeted to both compartments (plasminogen activator inhibitor 2, PAI-2). It also characterized by N- and C-terminal extensions, the absence of a signal peptide, and a Ser rather than an Asn residue at the penultimate position. The ov-serpins corresponds to clade B of the serpin superfamily. In general, SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants can cause blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
definition: >-
  serpin family B member 14, ovalbumin. The chicken protein ovalbumin (OVA3), a storage protein from egg white, lacking a loop insertion mechanism and therefore protease inhibitory activity, is a historical member of the serpin superfamily and the founding member of the subgroup known as ov-serpins (ovalbumin-related serpins). It has several modifications, including N-terminal acetylation, phosphorylation, and glycosylation. Ovalbumin is secreted from the cell, targeted by an internal signal sequence, rather than the N-terminal signal sequence commonly found in other secreted proteins. The ovalbumin family of serpins (ov-serpins) is a family of closely related proteins, whose members can be secreted (ovalbumin), cytosolic (leukocyte elastase inhibitor, LEI), or targeted to both compartments (plasminogen activator inhibitor 2, PAI-2). It also characterized by N- and C-terminal extensions, the absence of a signal peptide, and a Ser rather than an Asn residue at the penultimate position. The ov-serpins corresponds to clade B of the serpin superfamily. In general, SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants can cause blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans. — an NCBI CDD conserved domain (cd02059); members share this curated model.
