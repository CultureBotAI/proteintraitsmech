identifier: CDD:cd19745
label: bHLH_TS_ASCL3
definition: >-
  basic helix-loop-helix (bHLH) domain found in achaete-scute-like protein 3 (ASCL-3) and similar proteins. ASCL-3, also termed Class A basic helix-loop-helix protein 42 (bHLHa42), or bHLH transcriptional regulator Sgn-1, or achaete-scute homolog 3 (ASH-3), is a bHLH transcription factor specifically localized in the duct cells of the salivary glands. It may act as transcriptional repressor that inhibits myogenesis
