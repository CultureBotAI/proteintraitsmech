identifier: CDD:cd17103
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM domain-containing proteins FRMD4A, FRMD4B, and similar proteins. This family includes FERM domain-containing proteins FRMD4A and FRMD4B, both of which contain a FERM domain that is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). FRMD4A is a cytohesin adaptor involved in cell structure, transport and signaling. It promotes the growth of cancer cells in tongue, head and neck squamous cell carcinomas. FRMD4B, also termed GRP1-binding protein GRSP1, interacts with the coil-coil domain of ARF exchange factor GRP1 to form the Grsp1-Grp1 complex that co-localizes with cortical actin rich regions in response to stimulation of CHO-T cells with insulin or epidermal growth factor (EGF)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM domain-containing proteins FRMD4A, FRMD4B, and similar proteins. This family includes FERM domain-containing proteins FRMD4A and FRMD4B, both of which contain a FERM domain that is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). FRMD4A is a cytohesin adaptor involved in cell structure, transport and signaling. It promotes the growth of cancer cells in tongue, head and neck squamous cell carcinomas. FRMD4B, also termed GRP1-binding protein GRSP1, interacts with the coil-coil domain of ARF exchange factor GRP1 to form the Grsp1-Grp1 complex that co-localizes with cortical actin rich regions in response to stimulation of CHO-T cells with insulin or epidermal growth factor (EGF). — an NCBI CDD conserved domain (cd17103); members share this curated model.
