identifier: CDD:cd11732
label: "nucleotide-binding domain (NBD) of the 105/110 kDa heat shock protein family. The 105/110 kDa heat shock proteins family includes the human proteins, HSPA4 (also known as 70-kDa heat shock protein 4; APG-2; HS24/P52; hsp70 RY; HSPH2), HSPA4L (also known as 70-kDa heat shock protein 4-like; APG-1; HSPH3; OSP94), and HSPH1 (also known as heat shock 105kDa/110kDa protein 1; HSP105; HSP105A; HSP105B; NY-CO-25), Saccharomyces cerevisiae Sse1p, Sse2p and a sea urchin sperm receptor. They all belong to the heat shock protein 70 (HSP70) family of chaperones that assist in protein folding and assembly and can direct incompetent \"client\" proteins towards degradation. Typically, HSP70s have a nucleotide-binding domain (NBD) and a substrate-binding domain (SBD). The nucleotide sits in a deep cleft formed between the two lobes of the NBD. The two subdomains of each lobe change conformation between ATP-bound, ADP-bound, and nucleotide-free states. ATP binding opens up the substrate-binding site; substrate-binding increases the rate of ATP hydrolysis. HSP70 chaperone activity is regulated by various co-chaperones: J-domain proteins and nucleotide exchange factors (NEFs)."
definition: >-
  nucleotide-binding domain (NBD) of the 105/110 kDa heat shock protein family. The 105/110 kDa heat shock proteins family includes the human proteins, HSPA4 (also known as 70-kDa heat shock protein 4; APG-2; HS24/P52; hsp70 RY; HSPH2), HSPA4L (also known as 70-kDa heat shock protein 4-like; APG-1; HSPH3; OSP94), and HSPH1 (also known as heat shock 105kDa/110kDa protein 1; HSP105; HSP105A; HSP105B; NY-CO-25), Saccharomyces cerevisiae Sse1p, Sse2p and a sea urchin sperm receptor. They all belong to the heat shock protein 70 (HSP70) family of chaperones that assist in protein folding and assembly and can direct incompetent "client" proteins towards degradation. Typically, HSP70s have a nucleotide-binding domain (NBD) and a substrate-binding domain (SBD). The nucleotide sits in a deep cleft formed between the two lobes of the NBD. The two subdomains of each lobe change conformation between ATP-bound, ADP-bound, and nucleotide-free states. ATP binding opens up the substrate-binding site; substrate-binding increases the rate of ATP hydrolysis. HSP70 chaperone activity is regulated by various co-chaperones: J-domain proteins and nucleotide exchange factors (NEFs). — an NCBI CDD conserved domain (cd11732); members share this curated model.
