identifier: CDD:cd20643
label: "cytochrome P450 family 11, subfamily A, polypeptide 1, also called cholesterol side-chain cleavage enzyme. Cytochrome P450 11A1 (CYP11A1, EC 1.14.15.6) is also called cholesterol side-chain cleavage enzyme, cholesterol desmolase, or cytochrome P450(scc). It catalyzes the side-chain cleavage reaction of cholesterol to form pregnenolone, the precursor of all steroid hormones. Missense or nonsense mutations of the CYP11A1 gene cause mild to severe early-onset adrenal failure depending on the severity of the enzyme dysfunction/deficiency. CYP11A1 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
