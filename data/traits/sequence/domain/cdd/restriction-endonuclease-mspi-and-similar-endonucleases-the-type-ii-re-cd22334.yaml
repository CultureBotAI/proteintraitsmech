identifier: CDD:cd22334
label: MspI-like
definition: >-
  Restriction endonuclease MspI and similar endonucleases. The type II restriction endonuclease MspI It recognizes and cleaves the palindromic tetranucleotide sequence 5'-C|CGG (| denotes the cleavage site) leaving 2 base 5' overhangs. It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI
