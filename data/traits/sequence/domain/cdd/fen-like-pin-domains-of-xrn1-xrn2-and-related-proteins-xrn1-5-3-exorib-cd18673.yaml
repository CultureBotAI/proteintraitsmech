identifier: CDD:cd18673
label: "FEN-like PIN domains of XRN1, XRN2, and related proteins. XRN1 (5'-3' exoribonuclease 1, also known as SEP1) is a processive 5'-3' exoribonuclease that degrades the body of transcripts in the major pathway of RNA decay; XRN2 (5'-3' exoribonuclease 2) is predominantly localized in the nucleus and recognizes single-stranded RNAs with a 5'-terminal monophosphate to degrade them possessively to mononucleotides. XRN2 has a critical function to process maturation of 5.8S and 25S/28S rRNAs as well as degradation of some spacer fragments that are excised during rRNA maturation. Both XRN1 and XRN2 preferentially cleave 5'-monophosphorylated RNA. XRN2 is also known as Rat1p in yeast. This subfamily belongs to the structure-specific, 5' nuclease family (FEN-like) that catalyzes hydrolysis of DNA duplex-containing nucleic acid structures during DNA replication, repair, and recombination. Canonical members of the FEN-like family possess a PIN domain with a two-helical structure insert (also known as the helical arch, helical clamp or I domain) of variable length (approximately 16 to 800 residues), the helical arch/clamp region is involved in DNA binding. The PIN domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its putative active center, consisting of invariant acidic amino acid residues (putative metal-binding residues), is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons."
definition: >-
  FEN-like PIN domains of XRN1, XRN2, and related proteins. XRN1 (5'-3' exoribonuclease 1, also known as SEP1) is a processive 5'-3' exoribonuclease that degrades the body of transcripts in the major pathway of RNA decay; XRN2 (5'-3' exoribonuclease 2) is predominantly localized in the nucleus and recognizes single-stranded RNAs with a 5'-terminal monophosphate to degrade them possessively to mononucleotides. XRN2 has a critical function to process maturation of 5.8S and 25S/28S rRNAs as well as degradation of some spacer fragments that are excised during rRNA maturation. Both XRN1 and XRN2 preferentially cleave 5'-monophosphorylated RNA. XRN2 is also known as Rat1p in yeast. This subfamily belongs to the structure-specific, 5' nuclease family (FEN-like) that catalyzes hydrolysis of DNA duplex-containing nucleic acid structures during DNA replication, repair, and recombination. Canonical members of the FEN-like family possess a PIN domain with a two-helical structure insert (also known as the helical arch, helical clamp or I domain) of variable length (approximately 16 to 800 residues), the helical arch/clamp region is involved in DNA binding. The PIN domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its putative active center, consisting of invariant acidic amino acid residues (putative metal-binding residues), is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons. — an NCBI CDD conserved domain (cd18673); members share this curated model.
