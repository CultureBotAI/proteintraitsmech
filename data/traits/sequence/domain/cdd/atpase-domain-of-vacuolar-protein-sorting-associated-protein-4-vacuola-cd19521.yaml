identifier: CDD:cd19521
label: "ATPase domain of vacuolar protein sorting-associated protein 4. Vacuolar protein sorting-associated protein 4 (Vps4) is believed to be involved in intracellular protein transport out of a prevacuolar endosomal compartment. This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
definition: >-
  ATPase domain of vacuolar protein sorting-associated protein 4. Vacuolar protein sorting-associated protein 4 (Vps4) is believed to be involved in intracellular protein transport out of a prevacuolar endosomal compartment. This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion. — an NCBI CDD conserved domain (cd19521); members share this curated model.
