identifier: CDD:cd20763
label: "Proteins similar to the major royal jelly protein of honeybees. This family includes mostly bacterial proteins, all of which appear uncharacterized, but are sequence-similar to the major royal jelly protein, the food of queen bee larvae which is responsible for the high reproductive ability of the queen bee, and to the Drosophila yellow gene product, which is responsible for pigmentation of  the adult cuticle and mouth parts of the larvae. This family appears to conserve a ligand binding and/or active site and may have catalytic activity, similar to many other members of the N6P (nucleophilic attack 6-bladed beta-propeller) superfamily"
definition: >-
  Proteins similar to the major royal jelly protein of honeybees. This family includes mostly bacterial proteins, all of which appear uncharacterized, but are sequence-similar to the major royal jelly protein, the food of queen bee larvae which is responsible for the high reproductive ability of the queen bee, and to the Drosophila yellow gene product, which is responsible for pigmentation of the adult cuticle and mouth parts of the larvae. This family appears to conserve a ligand binding and/or active site and may have catalytic activity, similar to many other members of the N6P (nucleophilic attack 6-bladed beta-propeller) superfamily — an NCBI CDD conserved domain (cd20763); members share this curated model.
