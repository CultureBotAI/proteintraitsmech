identifier: CDD:cd17706
label: "MCM helicase family. MCM helicases are a family of helicases that play an important role in replication and homologous recombination repair. The heterohexameric ring-shaped Mcm2-7 complex is part of the replicative helicase that unwinds parental double-stranded DNA at a replication fork to provide single-stranded DNA templates for the replicative polymerases. Mcm8 and Mcm9, form a complex required for homologous recombination (HR) repair induced by DNA interstrand crosslinks (ICLs)."
definition: >-
  MCM helicase family. MCM helicases are a family of helicases that play an important role in replication and homologous recombination repair. The heterohexameric ring-shaped Mcm2-7 complex is part of the replicative helicase that unwinds parental double-stranded DNA at a replication fork to provide single-stranded DNA templates for the replicative polymerases. Mcm8 and Mcm9, form a complex required for homologous recombination (HR) repair induced by DNA interstrand crosslinks (ICLs). — an NCBI CDD conserved domain (cd17706); members share this curated model.
