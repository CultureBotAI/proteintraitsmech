identifier: CDD:cd09448
label: "This family represents the LIM domain of CLP36. This family represents the LIM domain of CLP36.  CLP36 has also been named as CLIM1, Elfin, or PDLIM1. CLP36 contains a C-terminal LIM domain and an N-terminal PDZ domain. CLP36 is highly expressed in heart and is present in many other tissues including lung, liver, spleen, and blood. CLP36 has been implicated in many processes including hypoxia and regulation of actin stress fibers. CLP36 co-localizes with alpha-actinin-2 at the Z-lines in myocardium. In addition, CLP36 binds to alpha-actinin-1 and alpha-actinin-4, and associates with F-actin filaments and stress fibers. CLP36 might be involved in not only the function of sarcomeres in muscle cells, but also in actin stress fiber-mediated cellular processes, such as cell shape, migration, polarit, and cytokinesis in non-muscle cells. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes."
definition: >-
  This family represents the LIM domain of CLP36. This family represents the LIM domain of CLP36. CLP36 has also been named as CLIM1, Elfin, or PDLIM1. CLP36 contains a C-terminal LIM domain and an N-terminal PDZ domain. CLP36 is highly expressed in heart and is present in many other tissues including lung, liver, spleen, and blood. CLP36 has been implicated in many processes including hypoxia and regulation of actin stress fibers. CLP36 co-localizes with alpha-actinin-2 at the Z-lines in myocardium. In addition, CLP36 binds to alpha-actinin-1 and alpha-actinin-4, and associates with F-actin filaments and stress fibers. CLP36 might be involved in not only the function of sarcomeres in muscle cells, but also in actin stress fiber-mediated cellular processes, such as cell shape, migration, polarit, and cytokinesis in non-muscle cells. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes. — an NCBI CDD conserved domain (cd09448); members share this curated model.
