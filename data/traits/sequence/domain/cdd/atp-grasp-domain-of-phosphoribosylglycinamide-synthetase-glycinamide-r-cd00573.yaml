identifier: CDD:cd00573
label: ATP-G_PurD_or_GARS
definition: >-
  ATP-grasp domain of phosphoribosylglycinamide synthetase. Glycinamide ribonucleotide synthetase (GAR-syn, GARS, or PurD, EC: 6.3.4.13) catalyzes the conversion of phosphoribosylamine (PAR) to glycinamide ribonucleotide (GAR) in the presence of glycine and ATP. GAR-syn requires Mg2+ for catalytic activity. It consists of 4 domains; N-terminal domain, A & B domains, and C-terminal domain. The A and B domains together form the ATP-grasp domain which is responsible for the catalytic activity of the enzyme. The N and C domains are responsible for the substrate specificity, and are also referred as GARS-N and GARS-C domains. Conserved domain analysis shows that GARS-C domain always co-occurs with the ATP-grasp domain. The active form of Escherichia coli GAR-syn is a monomer of 46 kDa that utilizes glycine as a carboxylate substrate, and 5-ribosylamine as an amine or thiol substrate. There are a total of four enzymes from purine biosynthetic pathway (PurD, PurT, PurK, PurP) that belong to the ATP-grasp superfamily
