identifier: CDD:cd23140
label: "RING finger, HC subclass, found in Arabidopsis thaliana protein KEEP ON GOING (KEG) and similar proteins. KEG, also called RING-type E3 ubiquitin transferase KEG, is a RING E3 ubiquitin-protein ligase that mediates E2-dependent protein ubiquitination. It is essential for Arabidopsis growth and development. It acts as a negative regulator of abscisic acid signaling. It is required for ABSCISIC ACID-INSENSITIVE5 (ABI5) degradation, by mediating its ubiquitination. Together with EDR1, KEG may regulate endocytic trafficking and/or the formation of signaling complexes on trans-Golgi network (TGN)/ early endosome (EE) vesicles during stress responses. KEG is a multidomain protein that includes a C3HC4-type RING-HC finger, a kinase domain, ankyrin repeats, and 12 HERC2-like (for HECT and RCC1-like) repeats."
definition: >-
  RING finger, HC subclass, found in Arabidopsis thaliana protein KEEP ON GOING (KEG) and similar proteins. KEG, also called RING-type E3 ubiquitin transferase KEG, is a RING E3 ubiquitin-protein ligase that mediates E2-dependent protein ubiquitination. It is essential for Arabidopsis growth and development. It acts as a negative regulator of abscisic acid signaling. It is required for ABSCISIC ACID-INSENSITIVE5 (ABI5) degradation, by mediating its ubiquitination. Together with EDR1, KEG may regulate endocytic trafficking and/or the formation of signaling complexes on trans-Golgi network (TGN)/ early endosome (EE) vesicles during stress responses. KEG is a multidomain protein that includes a C3HC4-type RING-HC finger, a kinase domain, ankyrin repeats, and 12 HERC2-like (for HECT and RCC1-like) repeats. — an NCBI CDD conserved domain (cd23140); members share this curated model.
