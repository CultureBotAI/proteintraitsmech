identifier: CDD:cd14663
label: "Catalytic domain of the Serine/Threonine Kinases, Sucrose nonfermenting 1-related protein kinase subfamily 3. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The SnRKs form three different subfamilies designated SnRK1-3. SnRK3 is represented in this cd. The SnRK3 group contains members also known as CBL-interacting protein kinase, salt overly sensitive 2, SOS3-interacting proteins and protein kinase S. These kinases interact with calcium-binding proteins such as SOS3, SCaBPs, and CBL proteins, and are involved in responses to salt stress and in sugar and ABA signaling. The SnRKs belong to a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinases, Sucrose nonfermenting 1-related protein kinase subfamily 3. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The SnRKs form three different subfamilies designated SnRK1-3. SnRK3 is represented in this cd. The SnRK3 group contains members also known as CBL-interacting protein kinase, salt overly sensitive 2, SOS3-interacting proteins and protein kinase S. These kinases interact with calcium-binding proteins such as SOS3, SCaBPs, and CBL proteins, and are involved in responses to salt stress and in sugar and ABA signaling. The SnRKs belong to a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14663); members share this curated model.
