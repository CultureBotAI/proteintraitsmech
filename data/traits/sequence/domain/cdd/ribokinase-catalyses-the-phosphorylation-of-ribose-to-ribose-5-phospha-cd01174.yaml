identifier: CDD:cd01174
label: "Ribokinase catalyses the phosphorylation of ribose to ribose-5-phosphate using ATP. This reaction is the first step in the ribose metabolism. It traps ribose within the cell after uptake and also prepares the sugar for use in the synthesis of nucleotides and histidine, and for entry into the pentose phosphate pathway. Ribokinase is dimeric in solution."
definition: >-
  Ribokinase catalyses the phosphorylation of ribose to ribose-5-phosphate using ATP. This reaction is the first step in the ribose metabolism. It traps ribose within the cell after uptake and also prepares the sugar for use in the synthesis of nucleotides and histidine, and for entry into the pentose phosphate pathway. Ribokinase is dimeric in solution. — an NCBI CDD conserved domain (cd01174); members share this curated model.
