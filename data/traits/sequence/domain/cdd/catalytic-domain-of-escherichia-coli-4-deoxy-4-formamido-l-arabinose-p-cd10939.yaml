identifier: CDD:cd10939
label: "Catalytic domain of Escherichia coli 4-deoxy-4-formamido-L-arabinose-phosphoundecaprenol deformylase ArnD and other bacterial homologs. This family is represented by Escherichia coli 4-deoxy-4-formamido-L-arabinose-phosphoundecaprenol deformylase ArnD (EC 3.5.1.n3). ArnD plays an important role in the biosynthesis of undecaprenyl phosphate alpha-4-amino-4-deoxy-L-arabinose (alpha-L-Ara4N). It catalyzes the deformylation of 4-deoxy-4-formamido-L-arabinose-phosphoundecaprenol to 4-amino-4-deoxy-L-arabinose-phosphoundecaprenol. The ArnD-dependent deformylation likely occurs on the inner leaflet of the inner membrane. This family also includes many uncharacterized bacterial polysaccharide deacetylases. All family members show high sequence homology to the catalytic domain of bacterial PuuE (purine utilization E) allantoinases and Helicobacter pylori peptidoglycan deacetylase (HpPgdA), and are classified within the larger carbohydrate esterase 4 (CE4) superfamily."
definition: >-
  Catalytic domain of Escherichia coli 4-deoxy-4-formamido-L-arabinose-phosphoundecaprenol deformylase ArnD and other bacterial homologs. This family is represented by Escherichia coli 4-deoxy-4-formamido-L-arabinose-phosphoundecaprenol deformylase ArnD (EC 3.5.1.n3). ArnD plays an important role in the biosynthesis of undecaprenyl phosphate alpha-4-amino-4-deoxy-L-arabinose (alpha-L-Ara4N). It catalyzes the deformylation of 4-deoxy-4-formamido-L-arabinose-phosphoundecaprenol to 4-amino-4-deoxy-L-arabinose-phosphoundecaprenol. The ArnD-dependent deformylation likely occurs on the inner leaflet of the inner membrane. This family also includes many uncharacterized bacterial polysaccharide deacetylases. All family members show high sequence homology to the catalytic domain of bacterial PuuE (purine utilization E) allantoinases and Helicobacter pylori peptidoglycan deacetylase (HpPgdA), and are classified within the larger carbohydrate esterase 4 (CE4) superfamily. — an NCBI CDD conserved domain (cd10939); members share this curated model.
