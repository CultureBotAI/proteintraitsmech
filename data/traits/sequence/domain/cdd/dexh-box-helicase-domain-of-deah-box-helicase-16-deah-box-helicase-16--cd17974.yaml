identifier: CDD:cd17974
label: "DEXH-box helicase domain of DEAH-box helicase 16. DEAH-box helicase 16 (DHX16) is probably involved in pre-mRNA splicing. DHX16 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of DEAH-box helicase 16. DEAH-box helicase 16 (DHX16) is probably involved in pre-mRNA splicing. DHX16 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17974); members share this curated model.
