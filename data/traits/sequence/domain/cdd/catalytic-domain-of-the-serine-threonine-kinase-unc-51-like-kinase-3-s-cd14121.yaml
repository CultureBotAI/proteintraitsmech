identifier: CDD:cd14121
label: "Catalytic domain of the Serine/Threonine kinase, Unc-51-like kinase 3. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The ATG1/ULK complex is conserved from yeast to humans and it plays a critical role in the initiation of autophagy, the intracellular system that leads to the lysosomal degradation of cellular components and their recycling into basic metabolic units. ULK3 mRNA is up-regulated in fibroblasts after Ras-induced senescence, and its overexpression induces both autophagy and senescence in a fibroblast cell line. ULK3, through its kinase activity, positively regulates Gli proteins, mediators of the Sonic hedgehog (Shh) signaling pathway that is implicated in tissue homeostasis maintenance and neurogenesis. It is inhibited by binding to Suppressor of Fused (Sufu). The ULK3 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, Unc-51-like kinase 3. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The ATG1/ULK complex is conserved from yeast to humans and it plays a critical role in the initiation of autophagy, the intracellular system that leads to the lysosomal degradation of cellular components and their recycling into basic metabolic units. ULK3 mRNA is up-regulated in fibroblasts after Ras-induced senescence, and its overexpression induces both autophagy and senescence in a fibroblast cell line. ULK3, through its kinase activity, positively regulates Gli proteins, mediators of the Sonic hedgehog (Shh) signaling pathway that is implicated in tissue homeostasis maintenance and neurogenesis. It is inhibited by binding to Suppressor of Fused (Sufu). The ULK3 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14121); members share this curated model.
