identifier: CDD:cd18129
label: "C-terminal domain of USG-1 protein and similar proteins. The family includes Escherichia coli USG-1 protein, Pseudomonas aeruginosa USG-1 homolog proteins and similar proteins. Although its biological function remains unknown, it is found to be homologous to aspartate beta-semialdehyde dehydrogenase (ASADH) which contains an N-terminal Rossmann fold NAD(P) binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like domain. However, USG-1 proteins lack the conserved active site residues of the ASADH protein C-terminal domain."
definition: >-
  C-terminal domain of USG-1 protein and similar proteins. The family includes Escherichia coli USG-1 protein, Pseudomonas aeruginosa USG-1 homolog proteins and similar proteins. Although its biological function remains unknown, it is found to be homologous to aspartate beta-semialdehyde dehydrogenase (ASADH) which contains an N-terminal Rossmann fold NAD(P) binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like domain. However, USG-1 proteins lack the conserved active site residues of the ASADH protein C-terminal domain. — an NCBI CDD conserved domain (cd18129); members share this curated model.
