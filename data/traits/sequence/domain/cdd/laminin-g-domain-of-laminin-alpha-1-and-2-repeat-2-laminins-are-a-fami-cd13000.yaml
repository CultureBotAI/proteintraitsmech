identifier: CDD:cd13000
label: "LamG_laminin_alpha1,2_2"
definition: >-
  Laminin G domain of laminin alpha-1 and -2, repeat 2;. Laminins are a family of heterotrimeric (alpha, beta, gamma) glycoproteins with diverse and crucial functions in basement membrane assembly and function. The three chains form an alpha-helical coiled-coil that builds the long arm of a cross-shaped molecule with each short arm only composed of one chain. The five different isoforms of alpha, together with 3 beta and 3 gamma isoforms, combine to 15 different laminin isoforms, which can be distingushed by their expresssion pattern and function. The alpha chains are unique in that they contain at five C-terminial tandem repeats of laminin G-like (LamG) domains. Generally, repeats 1-3 are involved in integrin interaction, and repeats 4 and 5 in interaction with alpha-dystroglycan and/or syndecan. Laminin G-like domains are usually Ca2+ mediated receptors that can have binding sites for steroids, beta1 integrins, heparin, sulfatides, fibulin-1, and alpha-dystroglycans. Proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold
