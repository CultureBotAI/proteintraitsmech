identifier: CDD:cd16569
label: "RING finger, HC subclass, found in SNF2 histone-linker PHD finger RING finger helicase (SHPRH) and similar proteins. SHPRH is a yeast RAD5 homolog found in mammals. It functions as an E3 ubiquitin-protein ligase that associates with proliferating cell nuclear antigen (PCNA), RAD18, and the ubiquitin-conjugating enzyme UBC13 (E2), and suppresses genomic instability by proliferating methyl methanesulfonate (MMS)-induced PCNA polyubiquitination. SHPRH contains a SWI/SNF helicase domain that is divided into N- and C-terminal parts by an insertion of a linker histone domain (H15), a PHD-finger, and a C3HC4-type RING-HC finger involved in the poly-ubiquitination of PCNA. This subfamily also includes tripartite motif-containing protein 15 (TRIM15). TRIM15, also known as RING finger protein 93 (RNF93), zinc finger protein 178 (ZNF178), or zinc finger protein B7 (ZNFB7), is a focal adhesion protein that regulates focal adhesion disassembly. It localizes to focal contacts in a myosin-II-independent manner by an interaction between its coiled-coil domain and the LD2 motif of paxillin. TRIM15 can also associate with coronin 1B, cortactin, filamin binding LIM protein1, and vasodilator-stimulated phosphoprotein, which are involved in actin cytoskeleton dynamics. As an additional component of the integrin adhesome, it regulates focal adhesion turnover and cell migration. TRIM15 belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a SPRY/B30.2 domain positioned C-terminal to the RBCC domain."
definition: >-
  RING finger, HC subclass, found in SNF2 histone-linker PHD finger RING finger helicase (SHPRH) and similar proteins. SHPRH is a yeast RAD5 homolog found in mammals. It functions as an E3 ubiquitin-protein ligase that associates with proliferating cell nuclear antigen (PCNA), RAD18, and the ubiquitin-conjugating enzyme UBC13 (E2), and suppresses genomic instability by proliferating methyl methanesulfonate (MMS)-induced PCNA polyubiquitination. SHPRH contains a SWI/SNF helicase domain that is divided into N- and C-terminal parts by an insertion of a linker histone domain (H15), a PHD-finger, and a C3HC4-type RING-HC finger involved in the poly-ubiquitination of PCNA. This subfamily also includes tripartite motif-containing protein 15 (TRIM15). TRIM15, also known as RING finger protein 93 (RNF93), zinc finger protein 178 (ZNF178), or zinc finger protein B7 (ZNFB7), is a focal adhesion protein that regulates focal adhesion disassembly. It localizes to focal contacts in a myosin-II-independent manner by an interaction between its coiled-coil domain and the LD2 motif of paxillin. TRIM15 can also associate with coronin 1B, cortactin, filamin binding LIM protein1, and vasodilator-stimulated phosphoprotein, which are involved in actin cytoskeleton dynamics. As an additional component of the integrin adhesome, it regulates focal adhesion turnover and cell migration. TRIM15 belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a SPRY/B30.2 domain positioned C-terminal to the RBCC domain. — an NCBI CDD conserved domain (cd16569); members share this curated model.
