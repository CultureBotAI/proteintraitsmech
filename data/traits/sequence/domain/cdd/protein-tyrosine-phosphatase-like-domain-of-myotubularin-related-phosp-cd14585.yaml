identifier: CDD:cd14585
label: "protein tyrosine phosphatase-like domain of myotubularin related phosphoinositide phosphatase 6. Myotubularin related phosphoinositide phosphatase 6 is enzymatically active and contains a C-terminal coiled-coil domain and an N-terminal PH-GRAM domain. In general, myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. They dephosphorylate the D-3 position of phosphatidylinositol 3-phosphate [PI(3)P] and phosphatidylinositol 3,5-bisphosphate [PI(3,5)P2], generating phosphatidylinositol and phosphatidylinositol 5-phosphate [PI(5)P], respectively. MTMR6 forms a complex with catalytically inactive MTMR9 and preferentially dephosphorylates PtdIns(3,5)P(2); the MTMR6/R9 complex serves to inhibit stress-induced apoptosis."
definition: >-
  protein tyrosine phosphatase-like domain of myotubularin related phosphoinositide phosphatase 6. Myotubularin related phosphoinositide phosphatase 6 is enzymatically active and contains a C-terminal coiled-coil domain and an N-terminal PH-GRAM domain. In general, myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. They dephosphorylate the D-3 position of phosphatidylinositol 3-phosphate [PI(3)P] and phosphatidylinositol 3,5-bisphosphate [PI(3,5)P2], generating phosphatidylinositol and phosphatidylinositol 5-phosphate [PI(5)P], respectively. MTMR6 forms a complex with catalytically inactive MTMR9 and preferentially dephosphorylates PtdIns(3,5)P(2); the MTMR6/R9 complex serves to inhibit stress-induced apoptosis. — an NCBI CDD conserved domain (cd14585); members share this curated model.
