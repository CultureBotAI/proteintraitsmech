identifier: CDD:cd12944
label: "LEM (Lap2/Emerin/Man1) domain found in ankyrin repeat and LEM domain-containing protein 2 (ANKL2). The family includes ANKL2 and similar proteins. Although their biological roles remain unclear, the family members share an N-terminal LEM domain and an ankyrin repeat region. The LEM domain, mainly found in inner nuclear membrane proteins, may be involved in protein- or DNA-binding. The ankyrin repeats are unique motifs mediating protein-protein interactions."
definition: >-
  LEM (Lap2/Emerin/Man1) domain found in ankyrin repeat and LEM domain-containing protein 2 (ANKL2). The family includes ANKL2 and similar proteins. Although their biological roles remain unclear, the family members share an N-terminal LEM domain and an ankyrin repeat region. The LEM domain, mainly found in inner nuclear membrane proteins, may be involved in protein- or DNA-binding. The ankyrin repeats are unique motifs mediating protein-protein interactions. — an NCBI CDD conserved domain (cd12944); members share this curated model.
