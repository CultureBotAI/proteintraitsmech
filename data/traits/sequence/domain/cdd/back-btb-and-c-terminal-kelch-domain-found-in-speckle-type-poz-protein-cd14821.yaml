identifier: CDD:cd14821
label: "BACK (BTB and C-terminal Kelch) domain found in speckle-type POZ protein (SPOP) and similar proteins. This family includes speckle-type POZ protein (SPOP), speckle-type POZ protein-like (SPOPL), TD and POZ domain-containing proteins (TDPOZ), Drosophila melanogaster protein roadkill, and similar proteins. Both SPOP and SPOPL serve as adaptors of cullin-RING-based BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex that mediates the ubiquitination and proteasomal degradation of target proteins. TDPOZ is a family of bipartite animal and plant proteins that contain a tumor necrosis factor receptor-associated factor (TRAF) domain (TD) and a POZ/BTB domain. TDPOZ proteins may be nuclear scaffold proteins involved in transcription regulation in early development and other cellular processes. Drosophila melanogaster protein roadkill, also termed Hh-induced MATH and BTB domain-containing protein (HIB), is a hedgehog-induced BTB protein that modulates hedgehog signaling by degrading Ci/Gli transcription factor."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in speckle-type POZ protein (SPOP) and similar proteins. This family includes speckle-type POZ protein (SPOP), speckle-type POZ protein-like (SPOPL), TD and POZ domain-containing proteins (TDPOZ), Drosophila melanogaster protein roadkill, and similar proteins. Both SPOP and SPOPL serve as adaptors of cullin-RING-based BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex that mediates the ubiquitination and proteasomal degradation of target proteins. TDPOZ is a family of bipartite animal and plant proteins that contain a tumor necrosis factor receptor-associated factor (TRAF) domain (TD) and a POZ/BTB domain. TDPOZ proteins may be nuclear scaffold proteins involved in transcription regulation in early development and other cellular processes. Drosophila melanogaster protein roadkill, also termed Hh-induced MATH and BTB domain-containing protein (HIB), is a hedgehog-induced BTB protein that modulates hedgehog signaling by degrading Ci/Gli transcription factor. — an NCBI CDD conserved domain (cd14821); members share this curated model.
