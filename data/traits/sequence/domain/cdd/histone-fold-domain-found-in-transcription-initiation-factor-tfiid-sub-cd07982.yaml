identifier: CDD:cd07982
label: HFD_TAF10
definition: >-
  histone-fold domain found in transcription initiation factor TFIID subunit 10 (TAF10) and similar proteins. TAF10, also called TATA Binding Protein (TBP) associated factor 10, STAF28, transcription initiation factor TFIID 30 kDa subunit, TAF(II)30, TAFII-30, or TAFII30, is a TBP-associated factor (TAF). TAFs are components of the transcription factor IID (TFIID) complex, PCAF histone acetylase complex, and TBP-free TAFII complex (TFTC). TIIFD is a multimeric protein complex that plays a central role in mediating promoter responses to various activators and repressors. TFIID and PCAF are composed of TATA binding protein (TBP) and several TAFs. TBP is not part of TFTC. TAF10 regulates genes that are important for cell cycle progression and cell morphology. A lack of TAF10 leads to cell cycle arrest and cell death by apoptosis in mice
