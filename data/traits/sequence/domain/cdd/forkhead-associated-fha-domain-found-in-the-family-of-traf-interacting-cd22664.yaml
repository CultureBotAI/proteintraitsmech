identifier: CDD:cd22664
label: "forkhead associated (FHA) domain found in the family of TRAF-interacting protein with FHA domain-containing protein A (TIFA). The TIFA family includes TIFA and TIFA-like protein, TIFAB. TIFA, also called putative MAPK-activating protein PM14, putative NF-kappa-B-activating protein 20, or TRAF2-binding protein (T2BP), is an adapter molecule that plays a key role in the activation of proinflammatory NF-kappa-B signaling following detection of bacterial pathogen-associated molecular pattern metabolites (PAMPs). It promotes activation of an innate immune response by inducing the oligomerization and polyubiquitination of TRAF6, which leads to the activation of TAK1 and IKK through a proteasome-independent mechanism. TIFA-dependent innate immune response is triggered by ADP-D-glycero-beta-D-manno-heptose (ADP-heptose), a potent PAMP present in all Gram-negative and some Gram-positive bacteria: ADP-heptose is recognized by ALPK1, which phosphorylates TIFA at Thr-9, leading to TIFA homooligomerization and subsequent activation of proinflammatory NF-kappa-B signaling. TIFAB, also called TIFA-like protein, inhibits TIFA-mediated TRAF6 activation possibly by inducing a conformational change in TIFA. It regulates USP15-mediated p53 signaling during stressed and malignant hematopoiesis. Both TIFA and TIFAB harbor a conserved FHA domain, which is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in the family of TRAF-interacting protein with FHA domain-containing protein A (TIFA). The TIFA family includes TIFA and TIFA-like protein, TIFAB. TIFA, also called putative MAPK-activating protein PM14, putative NF-kappa-B-activating protein 20, or TRAF2-binding protein (T2BP), is an adapter molecule that plays a key role in the activation of proinflammatory NF-kappa-B signaling following detection of bacterial pathogen-associated molecular pattern metabolites (PAMPs). It promotes activation of an innate immune response by inducing the oligomerization and polyubiquitination of TRAF6, which leads to the activation of TAK1 and IKK through a proteasome-independent mechanism. TIFA-dependent innate immune response is triggered by ADP-D-glycero-beta-D-manno-heptose (ADP-heptose), a potent PAMP present in all Gram-negative and some Gram-positive bacteria: ADP-heptose is recognized by ALPK1, which phosphorylates TIFA at Thr-9, leading to TIFA homooligomerization and subsequent activation of proinflammatory NF-kappa-B signaling. TIFAB, also called TIFA-like protein, inhibits TIFA-mediated TRAF6 activation possibly by inducing a conformational change in TIFA. It regulates USP15-mediated p53 signaling during stressed and malignant hematopoiesis. Both TIFA and TIFAB harbor a conserved FHA domain, which is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22664); members share this curated model.
