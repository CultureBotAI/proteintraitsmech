identifier: CDD:cd17945
label: "DEAD-box helicase domain of DEAD box protein 23. DDX23 (also called U5 snRNP 100kD protein and PRP28 homolog) is involved in pre-mRNA splicing and its phosphorylated form (by SRPK2) is required for spliceosomal B complex formation. Diseases associated with DDX23 include distal hereditary motor neuropathy, type II. DDX23 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of DEAD box protein 23. DDX23 (also called U5 snRNP 100kD protein and PRP28 homolog) is involved in pre-mRNA splicing and its phosphorylated form (by SRPK2) is required for spliceosomal B complex formation. Diseases associated with DDX23 include distal hereditary motor neuropathy, type II. DDX23 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17945); members share this curated model.
