identifier: CDD:cd01938
label: "ADP-dependent glucokinase (ADPGK) and phosphofructokinase (ADPPFK). ADPGK and ADPPFK are proteins that rely on ADP rather than ATP to donate a phosphoryl group.  They are found in certain hyperthermophilic archaea and in higher eukaryotes.  A functional ADPGK has been characterized in mouse and is assumed to be desirable during ischemia/hypoxia.  ADPGK and ADPPFK contain a large and a small domain with the binding site located in a groove between the domains. Partial domain closing is seen when ADP is bound, and further domain closing is observed when glucose is also bound.  The oligomerization state apparently varies depending on the species, with some existing as monomers, some as dimers, and some as tetramers."
definition: >-
  ADP-dependent glucokinase (ADPGK) and phosphofructokinase (ADPPFK). ADPGK and ADPPFK are proteins that rely on ADP rather than ATP to donate a phosphoryl group. They are found in certain hyperthermophilic archaea and in higher eukaryotes. A functional ADPGK has been characterized in mouse and is assumed to be desirable during ischemia/hypoxia. ADPGK and ADPPFK contain a large and a small domain with the binding site located in a groove between the domains. Partial domain closing is seen when ADP is bound, and further domain closing is observed when glucose is also bound. The oligomerization state apparently varies depending on the species, with some existing as monomers, some as dimers, and some as tetramers. — an NCBI CDD conserved domain (cd01938); members share this curated model.
