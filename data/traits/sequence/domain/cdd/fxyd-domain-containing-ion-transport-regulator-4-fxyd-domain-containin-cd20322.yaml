identifier: CDD:cd20322
label: "FXYD domain-containing ion transport regulator 4. FXYD domain-containing ion transport regulator 4 (FXYD4), also known as CHIF (channel-inducing factor or corticosteroid hormone-induced factor), evokes K+ conductance in oocytes and is localized in the distal parts of the nephron and in the colon. CHIF, a putative K channel regulator, is regulated by aldosterone in the colon and by K+ intake in the kidney."
definition: >-
  FXYD domain-containing ion transport regulator 4. FXYD domain-containing ion transport regulator 4 (FXYD4), also known as CHIF (channel-inducing factor or corticosteroid hormone-induced factor), evokes K+ conductance in oocytes and is localized in the distal parts of the nephron and in the colon. CHIF, a putative K channel regulator, is regulated by aldosterone in the colon and by K+ intake in the kidney. — an NCBI CDD conserved domain (cd20322); members share this curated model.
