identifier: CDD:cd02314
label: "N-terminal NAD(P)-binding domain of Vibrio cholerae aspartate beta-semialdehyde dehydrogenase 1 (ASADH1) and similar proteins. The family corresponds to a branch of bacterial ASADH enzymes mainly found from proteobacteria, such as Escherichia coli, Haemophilus influenzae, Pseudomonas aeruginosa and Vibrio cholerae. The first isoform of ASADH in Vibrio cholerae is one of the prototypes of this family. They have similar overall folds and domain organizations but sharing less sequence homology with fungal and archaeal ASADHs. ASADH (EC 1.2.1.11), also called ASA dehydrogenase (ASD), or aspartate-beta-semialdehyde dehydrogenase, catalyzes the NADPH-dependent formation of L-aspartate-semialdehyde (ASA) by the reductive dephosphorylation of L-aspartyl-4-phosphate, which is the second step of the aspartate biosynthetic pathway. ASA can either be further reduced to homoserine, which leads to methionine, threonine, or isoleucine, or it can be condensed with pyruvate and cyclized into dihydrodipicolinate, and then converted into diaminopimelate, a component of bacterial cell walls, and finally decarboxylated to produce lysine. ASADH contains an N-terminal Rossmann fold NAD(P) binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like catalytic domain."
definition: >-
  N-terminal NAD(P)-binding domain of Vibrio cholerae aspartate beta-semialdehyde dehydrogenase 1 (ASADH1) and similar proteins. The family corresponds to a branch of bacterial ASADH enzymes mainly found from proteobacteria, such as Escherichia coli, Haemophilus influenzae, Pseudomonas aeruginosa and Vibrio cholerae. The first isoform of ASADH in Vibrio cholerae is one of the prototypes of this family. They have similar overall folds and domain organizations but sharing less sequence homology with fungal and archaeal ASADHs. ASADH (EC 1.2.1.11), also called ASA dehydrogenase (ASD), or aspartate-beta-semialdehyde dehydrogenase, catalyzes the NADPH-dependent formation of L-aspartate-semialdehyde (ASA) by the reductive dephosphorylation of L-aspartyl-4-phosphate, which is the second step of the aspartate biosynthetic pathway. ASA can either be further reduced to homoserine, which leads to methionine, threonine, or isoleucine, or it can be condensed with pyruvate and cyclized into dihydrodipicolinate, and then converted into diaminopimelate, a component of bacterial cell walls, and finally decarboxylated to produce lysine. ASADH contains an N-terminal Rossmann fold NAD(P) binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like catalytic domain. — an NCBI CDD conserved domain (cd02314); members share this curated model.
