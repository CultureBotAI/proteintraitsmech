identifier: CDD:cd22731
label: "forkhead associated (FHA) domain found in StAR-related lipid transfer protein 9 (StARD9). StARD9, also called START domain-containing protein 9, or kinesin-like protein KIF16A, is a microtubule-dependent motor protein required for spindle pole assembly during mitosis. It is required to stabilize the pericentriolar material (PCM). The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine."
definition: >-
  forkhead associated (FHA) domain found in StAR-related lipid transfer protein 9 (StARD9). StARD9, also called START domain-containing protein 9, or kinesin-like protein KIF16A, is a microtubule-dependent motor protein required for spindle pole assembly during mitosis. It is required to stabilize the pericentriolar material (PCM). The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine. — an NCBI CDD conserved domain (cd22731); members share this curated model.
