identifier: CDD:cd03071
label: "PDIb' family, NRX subgroup, redox inactive TRX-like domain b'; composed of vertebrate nucleoredoxins (NRX). NRX is a 400-amino acid nuclear protein with one redox active TRX domain followed by one redox inactive TRX-like domain homologous to the b' domain of PDI. In vitro studies show that NRX has thiol oxidoreductase activity and that it may be involved in the redox regulation of transcription, in a manner different from that of TRX or glutaredoxin. NRX enhances the activation of NF-kB by TNFalpha, as well as PMA-1 induced AP-1 and FK-induced CREB activation. Mouse NRX transcripts are expressed in all adult tissues but is restricted to the nervous system and limb buds in embryos. The mouse NRX gene is implicated in streptozotocin-induced diabetes. Similar to PDI, the b' domain of NRX is likely involved in substrate recognition."
