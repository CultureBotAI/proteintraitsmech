identifier: CDD:cd21585
label: "N-terminal domain of Kruppel-like factor 7. Kruppel-like factor 7 (KLF7; also known as Krueppel-like factor 7, or ubiquitous Kruppel-like factor/UKLF) is a protein which, in humans, is encoded by the KLF7 gene. KLF7 is involved in regulation of the development and function of the nervous system and adipose tissue, type 2 diabetes, blood diseases, as well as pluripotent cell maintenance. It functions as a transcriptional activator. It belongs to a family of proteins, called the Specificity Protein (SP)/KLF family, characterized by a C-terminal DNA-binding domain of 81 amino acids consisting of three Kruppel-like C2H2 zinc fingers. These factors bind to a loose consensus motif, namely NNRCRCCYY (where N is any nucleotide; R is A/G, and Y is C/T), such as the recurring motifs in GC and GT boxes (5'-GGGGCGGGG-3' and 5-GGTGTGGGG-3') that are present in promoters and more distal regulatory elements of mammalian genes. Members of the KLF family can act as activators or repressors of transcription depending on cell and promoter context. KLFs regulate various cellular functions, such as proliferation, differentiation, and apoptosis, as well as the development and homeostasis of several types of tissue. In addition to the C-terminal DNA-binding domain, each KLF also has a unique N-terminal activation/repression domain that confers specificity and allows it to bind specifically to a certain partner, leading to distinct activities in vivo. This model represents the N-terminal domain of KLF7."
definition: >-
  N-terminal domain of Kruppel-like factor 7. Kruppel-like factor 7 (KLF7; also known as Krueppel-like factor 7, or ubiquitous Kruppel-like factor/UKLF) is a protein which, in humans, is encoded by the KLF7 gene. KLF7 is involved in regulation of the development and function of the nervous system and adipose tissue, type 2 diabetes, blood diseases, as well as pluripotent cell maintenance. It functions as a transcriptional activator. It belongs to a family of proteins, called the Specificity Protein (SP)/KLF family, characterized by a C-terminal DNA-binding domain of 81 amino acids consisting of three Kruppel-like C2H2 zinc fingers. These factors bind to a loose consensus motif, namely NNRCRCCYY (where N is any nucleotide; R is A/G, and Y is C/T), such as the recurring motifs in GC and GT boxes (5'-GGGGCGGGG-3' and 5-GGTGTGGGG-3') that are present in promoters and more distal regulatory elements of mammalian genes. Members of the KLF family can act as activators or repressors of transcription depending on cell and promoter context. KLFs regulate various cellular functions, such as proliferation, differentiation, and apoptosis, as well as the development and homeostasis of several types of tissue. In addition to the C-terminal DNA-binding domain, each KLF also has a unique N-terminal activation/repression domain that confers specificity and allows it to bind specifically to a certain partner, leading to distinct activities in vivo. This model represents the N-terminal domain of KLF7. — an NCBI CDD conserved domain (cd21585); members share this curated model.
