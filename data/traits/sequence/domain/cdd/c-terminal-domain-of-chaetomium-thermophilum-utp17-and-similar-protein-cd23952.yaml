identifier: CDD:cd23952
label: Utp17_CTD
definition: >-
  C-terminal domain of Chaetomium thermophilum Utp17 and similar proteins. Utp17 is a double-propeller protein that acts as a component of the UTP-A complex, which consists of seven structural proteins (Utp4, Utp5, Utp8, Utp10, Utp9, Utp15, and Utp17). UTP-A, together with UTP-B (including Utp1, Utp6, Utp12, Utp13, Utp18, and Utp21) and U3 small nucleolar ribonucleoprotein (snoRNP, including U3 snoRNA, Nop1, Nop58, Nop56, Snu13, and Rrp9), forms a subset of 5' ETS-associated factors existing as pre-assembled subcomplexes in the 90S pre-ribosome (also referred to as the SSU processome), an early assembly intermediate formed during eukaryotic ribosome synthesis. UTP-A chaperones the nascent 5'-ETS as it emerges from the transcribing RNA polymerase I. The model corresponds to the C-terminal alpha-helical domain of Utp17, which is responsible for the binding of the N-terminal domain of Utp10
