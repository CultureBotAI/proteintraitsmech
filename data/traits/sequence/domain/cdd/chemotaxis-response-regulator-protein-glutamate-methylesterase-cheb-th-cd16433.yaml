identifier: CDD:cd16433
label: "Chemotaxis response regulator protein-glutamate methylesterase, CheB. This family contains the methylesterase CheB (EC 3.1.1.61; also known as CheB methylesterase, chemotaxis-specific methylesterase, methyl-accepting chemotaxis protein methyl-esterase, or protein methyl-esterase) domain, a phosphorylation-activated response regulator involved in reversible modification of bacterial chemotaxis receptors. Signaling output of the chemotaxis receptors is modulated by CheB and methyltransferase CheR by controlling the level of receptor methylation. cheR and cheB have a strong preference to occur in the same operon, and a subgroup contains multidomain proteins with CheB-CheR fusions. Reversible methylation of transmembrane chemoreceptors plays an important role in ligand-dependent signaling and cellular adaptation in bacterial chemotaxis. Phosphorylated CheB catalyzes deamidation of specific glutamine residues in the cytoplasmic region of the chemoreceptors and demethylation of specific methyl glutamate residues introduced into the chemoreceptors by CheR."
definition: >-
  Chemotaxis response regulator protein-glutamate methylesterase, CheB. This family contains the methylesterase CheB (EC 3.1.1.61; also known as CheB methylesterase, chemotaxis-specific methylesterase, methyl-accepting chemotaxis protein methyl-esterase, or protein methyl-esterase) domain, a phosphorylation-activated response regulator involved in reversible modification of bacterial chemotaxis receptors. Signaling output of the chemotaxis receptors is modulated by CheB and methyltransferase CheR by controlling the level of receptor methylation. cheR and cheB have a strong preference to occur in the same operon, and a subgroup contains multidomain proteins with CheB-CheR fusions. Reversible methylation of transmembrane chemoreceptors plays an important role in ligand-dependent signaling and cellular adaptation in bacterial chemotaxis. Phosphorylated CheB catalyzes deamidation of specific glutamine residues in the cytoplasmic region of the chemoreceptors and demethylation of specific methyl glutamate residues introduced into the chemoreceptors by CheR. — an NCBI CDD conserved domain (cd16433); members share this curated model.
