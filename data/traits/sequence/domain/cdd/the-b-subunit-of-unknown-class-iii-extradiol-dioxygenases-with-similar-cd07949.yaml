identifier: CDD:cd07949
label: "The B subunit of unknown Class III extradiol dioxygenases with similarity to Protocatechuate 4,5-dioxygenase. This subfamily is composed of proteins of unknown function with similarity to the B subunit of Protocatechuate 4,5-dioxygenase (LigAB). LigAB belongs to the class III extradiol dioxygenase family, a group of enzymes which use a non-heme Fe(II) to cleave aromatic rings between a hydroxylated carbon and an adjacent non-hydroxylated carbon. Dioxygenases play key roles in the degradation of aromatic compounds. LigAB-like enzymes are usually composed of two subunits, designated A and B, which form a tetramer composed of two copies of each subunit. This model represents the catalytic subunit, B."
definition: >-
  The B subunit of unknown Class III extradiol dioxygenases with similarity to Protocatechuate 4,5-dioxygenase. This subfamily is composed of proteins of unknown function with similarity to the B subunit of Protocatechuate 4,5-dioxygenase (LigAB). LigAB belongs to the class III extradiol dioxygenase family, a group of enzymes which use a non-heme Fe(II) to cleave aromatic rings between a hydroxylated carbon and an adjacent non-hydroxylated carbon. Dioxygenases play key roles in the degradation of aromatic compounds. LigAB-like enzymes are usually composed of two subunits, designated A and B, which form a tetramer composed of two copies of each subunit. This model represents the catalytic subunit, B. — an NCBI CDD conserved domain (cd07949); members share this curated model.
