identifier: CDD:cd20711
label: beta-jelly_roll_fold_PL-7_13_14_18_20_28_36-like
definition: >-
  polysaccharide lysases having a beta-jelly roll fold structure; includes CAZy families PL-7, -13, -14, -18, -20, -28 and -36. Polysaccharide lyases (PLs) which belong to Carbohydrate-Active Enzyme (CAZy) families PL-7, -13, -14, -18, -20, -28, and -36 have a beta-jelly roll fold structure, i.e. have two antiparallel beta-sheets, with a deep cleft region where the substrate binds and catalytic reactions occur. Polysaccharide lyases (EC 4.2.2.-) use a general acid-base beta-elimination mechanism to cleave uronic acid (such as glucuronic acid or iduronic acid)-containing polysaccharide chains by breaking the O-C4 bond to the uronic acid, the product carries a 4,5-unsaturated sugar at the newly formed non-reducing end
