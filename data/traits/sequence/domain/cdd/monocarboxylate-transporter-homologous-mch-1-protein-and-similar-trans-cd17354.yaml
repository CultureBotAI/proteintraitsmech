identifier: CDD:cd17354
label: "Monocarboxylate transporter-homologous (Mch) 1 protein and similar transporters of the Major Facilitator Superfamily of transporters. Yeast monocarboxylate transporter-homologous (Mch) proteins are putative transporters that do not transport monocarboxylic acids across the plasma membrane, and may play roles distinct from their mammalian counterparts. Their function has not been determined. The Mch1p-like group belongs to the Monocarboxylate transporter -like (MCT-like) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Monocarboxylate transporter-homologous (Mch) 1 protein and similar transporters of the Major Facilitator Superfamily of transporters. Yeast monocarboxylate transporter-homologous (Mch) proteins are putative transporters that do not transport monocarboxylic acids across the plasma membrane, and may play roles distinct from their mammalian counterparts. Their function has not been determined. The Mch1p-like group belongs to the Monocarboxylate transporter -like (MCT-like) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17354); members share this curated model.
