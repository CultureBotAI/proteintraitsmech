identifier: CDD:cd22092
label: "F-box domain found in F-box only protein 13 (FBXO13) and similar proteins. FBXO13, also called FBX13, F-box/LRR-repeat protein 17 (FBL17), or F-box and leucine-rich repeat protein 17 (FBXL17), is the substrate-recognition component of SCF(FBXL17) E3 ubiquitin ligase complex, a key component of a quality control pathway required to ensure functional dimerization of BTB domain-containing proteins (dimerization quality control, DQC). The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 13 (FBXO13) and similar proteins. FBXO13, also called FBX13, F-box/LRR-repeat protein 17 (FBL17), or F-box and leucine-rich repeat protein 17 (FBXL17), is the substrate-recognition component of SCF(FBXL17) E3 ubiquitin ligase complex, a key component of a quality control pathway required to ensure functional dimerization of BTB domain-containing proteins (dimerization quality control, DQC). The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22092); members share this curated model.
