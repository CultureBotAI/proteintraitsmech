identifier: CDD:cd05132
label: "Ras-GTPase Activating Domain of GAPA. GAPA is an IQGAP-related protein and is predicted to bind to small GTPases, which are yet to be identified. IQGAP proteins are integral components of cytoskeletal regulation. Results from truncated GAPAs indicated that almost the entire region of GAPA homologous to IQGAP is required for cytokinesis in Dictyostelium. More members of the IQGAP family are emerging, and evidence suggests that there are both similarities and differences in their function."
definition: >-
  Ras-GTPase Activating Domain of GAPA. GAPA is an IQGAP-related protein and is predicted to bind to small GTPases, which are yet to be identified. IQGAP proteins are integral components of cytoskeletal regulation. Results from truncated GAPAs indicated that almost the entire region of GAPA homologous to IQGAP is required for cytokinesis in Dictyostelium. More members of the IQGAP family are emerging, and evidence suggests that there are both similarities and differences in their function. — an NCBI CDD conserved domain (cd05132); members share this curated model.
