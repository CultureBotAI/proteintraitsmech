identifier: CDD:cd22687
label: "forkhead associated (FHA) domain found in microspherule protein 1 (MCRS1) and similar proteins. MCRS1, also called 58 kDa microspherule protein (MSP58), cell cycle-regulated factor p78, or INO80 complex subunit J, is a nuclear RNA-binding protein that interacts with fragile X mental retardation protein in polyribosomal ribonucleoparticles (mRNPs) from neurons. It is a cell-cycle-dependent protein that acts as an inhibitor of TERT telomerase activity. It associates with LPTS/PinX1 and reduces the telomere length. It modulates the transcription repressor activity of DAXX by recruiting it to the nucleolus. As part of the NSL complex, MCRS1 may be involved in acetylation of nucleosomal histone H4 on several lysine residues. MCRS1 is also a putative regulatory component of the chromatin remodeling INO80 complex, which is involved in transcriptional regulation, DNA replication, and probably DNA repair. MCRS1 contains an FHA domain at its C-terminus. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in microspherule protein 1 (MCRS1) and similar proteins. MCRS1, also called 58 kDa microspherule protein (MSP58), cell cycle-regulated factor p78, or INO80 complex subunit J, is a nuclear RNA-binding protein that interacts with fragile X mental retardation protein in polyribosomal ribonucleoparticles (mRNPs) from neurons. It is a cell-cycle-dependent protein that acts as an inhibitor of TERT telomerase activity. It associates with LPTS/PinX1 and reduces the telomere length. It modulates the transcription repressor activity of DAXX by recruiting it to the nucleolus. As part of the NSL complex, MCRS1 may be involved in acetylation of nucleosomal histone H4 on several lysine residues. MCRS1 is also a putative regulatory component of the chromatin remodeling INO80 complex, which is involved in transcriptional regulation, DNA replication, and probably DNA repair. MCRS1 contains an FHA domain at its C-terminus. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22687); members share this curated model.
