identifier: CDD:cd09516
label: "SAM domain of sec23ip-like subfamily. SAM (sterile alpha motif) domain of Sec23ip-like (Sec23 interacting protein) subfamily is a potential protein-protein interaction domain. This group of proteins includes Sec23ip and DDHD2 proteins. All of them contain at least two domains: a SAM domain and a predicted metal-binding domain. For mammalian DDHD2 members of this group, phospholipase activity has been demonstrated. Sec23ip proteins of this group interact with Sec23 proteins via an N-terminal proline-rich region. Members of this subfamily are involved in organization of ER/Golgi intermediate compartment."
definition: >-
  SAM domain of sec23ip-like subfamily. SAM (sterile alpha motif) domain of Sec23ip-like (Sec23 interacting protein) subfamily is a potential protein-protein interaction domain. This group of proteins includes Sec23ip and DDHD2 proteins. All of them contain at least two domains: a SAM domain and a predicted metal-binding domain. For mammalian DDHD2 members of this group, phospholipase activity has been demonstrated. Sec23ip proteins of this group interact with Sec23 proteins via an N-terminal proline-rich region. Members of this subfamily are involved in organization of ER/Golgi intermediate compartment. — an NCBI CDD conserved domain (cd09516); members share this curated model.
