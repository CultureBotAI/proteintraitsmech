identifier: CDD:cd09552
label: "SAM domain of EPH-B2 subfamily of tyrosine kinase receptors. SAM (sterile alpha motif) domain of EPH-B2 subfamily of receptor tyrosine kinases is a C-terminal potential protein-protein interaction domain. This domain is located in the cytoplasmic region of EPH-B2 receptors and appears to mediate cell-cell initiated signal transduction. SAM domains of this subfamily form homodimers/oligomers (in head-to-head/tail-to-tail orientation); apparently such clustering is necessary for signaling. EPH-B2 receptor is involved in regulation of synaptic function; it is needed for normal vestibular function, proper formation of anterior commissure, control of cell positioning, and ordered migration in the intestinal epithelium. EPH-B2 plays a tumor suppressor role in colorectal cancer. It was found  to be downregulated in gastric cancer and thus may be a negative biomarker for it."
definition: >-
