identifier: CDD:cd18097
label: "SAM-dependent rRNA or tRNA methylase related to SpoU. RNA 2'-O ribose methyltransferase catalyzes the methyltransfer from S-adenosyl-L-methionine (AdoMet) to the 2'-OH group of ribose in tRNA or rRNA. It is part of the SpoU family of MTases, a subfamily of the SPOUT methyltransferase superfamily. The SPOUT methyltransferase superfamily is a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot."
definition: >-
  SAM-dependent rRNA or tRNA methylase related to SpoU. RNA 2'-O ribose methyltransferase catalyzes the methyltransfer from S-adenosyl-L-methionine (AdoMet) to the 2'-OH group of ribose in tRNA or rRNA. It is part of the SpoU family of MTases, a subfamily of the SPOUT methyltransferase superfamily. The SPOUT methyltransferase superfamily is a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot. — an NCBI CDD conserved domain (cd18097); members share this curated model.
