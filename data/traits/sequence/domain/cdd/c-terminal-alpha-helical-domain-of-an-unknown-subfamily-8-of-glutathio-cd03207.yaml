identifier: CDD:cd03207
label: "C-terminal, alpha helical domain of an unknown subfamily 8 of Glutathione S-transferases. Glutathione S-transferase (GST) C-terminal domain family, unknown subfamily 8; composed of Agrobacterium tumefaciens GST and other uncharacterized bacterial proteins with similarity to GSTs. GSTs are cytosolic dimeric proteins involved in cellular detoxification by catalyzing the conjugation of glutathione (GSH) with a wide range of endogenous and xenobiotic alkylating agents, including carcinogens, therapeutic drugs, environmental toxins, and products of oxidative stress. GSTs also show GSH peroxidase activity and are involved in the synthesis of prostaglandins and leukotrienes. The GST fold contains an N-terminal thioredoxin-fold domain and a C-terminal alpha helical domain, with an active site located in a cleft between the two domains. GSH binds to the N-terminal domain while the hydrophobic substrate occupies a pocket in the C-terminal domain. The three-dimensional structure of Agrobacterium tumefaciens GST has been determined but there is no information on its functional characterization."
definition: >-
  C-terminal, alpha helical domain of an unknown subfamily 8 of Glutathione S-transferases. Glutathione S-transferase (GST) C-terminal domain family, unknown subfamily 8; composed of Agrobacterium tumefaciens GST and other uncharacterized bacterial proteins with similarity to GSTs. GSTs are cytosolic dimeric proteins involved in cellular detoxification by catalyzing the conjugation of glutathione (GSH) with a wide range of endogenous and xenobiotic alkylating agents, including carcinogens, therapeutic drugs, environmental toxins, and products of oxidative stress. GSTs also show GSH peroxidase activity and are involved in the synthesis of prostaglandins and leukotrienes. The GST fold contains an N-terminal thioredoxin-fold domain and a C-terminal alpha helical domain, with an active site located in a cleft between the two domains. GSH binds to the N-terminal domain while the hydrophobic substrate occupies a pocket in the C-terminal domain. The three-dimensional structure of Agrobacterium tumefaciens GST has been determined but there is no information on its functional characterization. — an NCBI CDD conserved domain (cd03207); members share this curated model.
