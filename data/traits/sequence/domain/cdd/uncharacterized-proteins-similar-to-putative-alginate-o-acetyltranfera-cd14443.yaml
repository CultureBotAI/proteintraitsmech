identifier: CDD:cd14443
label: "Uncharacterized proteins similar to putative alginate O-acetyltranferase. The alginate biosynthesis protein AlgX appears to be directly involved in the O-acetylation of alginate, an exopolysaccharide that is associated with the formation of persistent biofilms, such as those by mucoid strains of Pseudomonas aeruginosa that affect patients suffering from cystic fibrosis. Its N-terminal catalytic domain resembles SGNH hydrolases, though with a permuted topology. The active site matches that of the SGNH hydrolases, is well conserved, and has been verified experimentally. Some members of this uncharacterized family, which resembles AlgX_N, have been annotated as twin-arginine translocation signal, although they share little or no similarity with experimentally characterized proteins that bear the same name."
definition: >-
  Uncharacterized proteins similar to putative alginate O-acetyltranferase. The alginate biosynthesis protein AlgX appears to be directly involved in the O-acetylation of alginate, an exopolysaccharide that is associated with the formation of persistent biofilms, such as those by mucoid strains of Pseudomonas aeruginosa that affect patients suffering from cystic fibrosis. Its N-terminal catalytic domain resembles SGNH hydrolases, though with a permuted topology. The active site matches that of the SGNH hydrolases, is well conserved, and has been verified experimentally. Some members of this uncharacterized family, which resembles AlgX_N, have been annotated as twin-arginine translocation signal, although they share little or no similarity with experimentally characterized proteins that bear the same name. — an NCBI CDD conserved domain (cd14443); members share this curated model.
