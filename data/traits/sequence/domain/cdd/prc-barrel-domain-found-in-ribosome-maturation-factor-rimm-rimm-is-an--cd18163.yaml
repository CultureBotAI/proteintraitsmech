identifier: CDD:cd18163
label: PRC_RimM
definition: >-
  PRC-barrel domain found in ribosome maturation factor RimM. RimM is an accessory protein needed during the final step in the assembly of 30S ribosomal subunit, possibly for assembly of the head region (the 16S rRNA 3' domain). It is also essential for efficient processing of 16S rRNA. It probably interacts with ribosomal protein S19 and 16S rRNA
