identifier: CDD:cd22181
label: "F-box domain found in F-box/LRR-repeat protein 11 (FBXL11) and similar proteins. FBXL11, also called lysine-specific demethylase 2A (KDM2A), CXXC-type zinc finger protein (CXXC8), F-box and leucine-rich repeat protein 11, F-box protein FBL7, F-box protein Lilina, JmjC domain-containing histone demethylation protein 1A (JHDM1A), or [Histone-H3]-lysine-36 demethylase 1A, is a histone H3 lysine 36 (H3K36) demethylase that regulates epithelial mesenchymal transition (EMT) and the metastasis of ovarian cancer. It plays an essential role in embryonic development and homeostasis by regulating cell proliferation and survival. FBXL11 may also recognize and bind to some phosphorylated proteins and promote their ubiquitination and degradation. It associates with centromeres and represses transcription of small non-coding RNAs that are encoded by the clusters of satellite repeats at the centromere. It is required to sustain centromeric integrity and genomic stability, particularly during mitosis. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
