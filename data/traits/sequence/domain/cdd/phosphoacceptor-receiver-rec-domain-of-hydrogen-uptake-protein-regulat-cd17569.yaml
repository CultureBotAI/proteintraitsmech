identifier: CDD:cd17569
label: "phosphoacceptor receiver (REC) domain of hydrogen uptake protein regulator (HupR) and similar domains. This family is composed of mostly uncharacterized response regulators with similarity to the REC domains of response regulator components of two-component systems that regulates hydrogenase activity, including HupR and HoxA. HupR is part of the HupT/HupR system that controls the synthesis of the membrane-bound [NiFe]hydrogenase, HupSL, of the photosynthetic bacterium Rhodobacter capsulatus. It contains an N-terminal REC domain, a central sigma-54 interaction domain that lacks ATPase activity, and a C-terminal DNA-binding domain. Members of this family contain a REC domain and various output domains including the cyclase homology domain (CHD) and the c-di-GMP phosphodiesterase domains, HD-GYP and EAL. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of hydrogen uptake protein regulator (HupR) and similar domains. This family is composed of mostly uncharacterized response regulators with similarity to the REC domains of response regulator components of two-component systems that regulates hydrogenase activity, including HupR and HoxA. HupR is part of the HupT/HupR system that controls the synthesis of the membrane-bound [NiFe]hydrogenase, HupSL, of the photosynthetic bacterium Rhodobacter capsulatus. It contains an N-terminal REC domain, a central sigma-54 interaction domain that lacks ATPase activity, and a C-terminal DNA-binding domain. Members of this family contain a REC domain and various output domains including the cyclase homology domain (CHD) and the c-di-GMP phosphodiesterase domains, HD-GYP and EAL. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17569); members share this curated model.
