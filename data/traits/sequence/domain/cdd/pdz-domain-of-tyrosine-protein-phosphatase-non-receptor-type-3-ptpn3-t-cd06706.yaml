identifier: CDD:cd06706
label: "PDZ domain of tyrosine-protein phosphatase non-receptor type 3 (PTPN3), tyrosine-protein phosphatase non-receptor type 4 (PTNP4), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of PTPN3, PTPN4 and related domains. PTPN3 (also known as protein-tyrosine phosphatase H1, PTP-H1) has a tumor-suppressive or a tumor-promoting role in many cancers. It serves as a specific phosphatase for the MAP kinase p38gamma; the two interact via their PDZ domains and cooperate to promote Ras-induced oncogenesis. Interaction partners of the PTPN3 PDZ domain include p38gamma and human papillomavirus E6 oncoprotein. PTPN4 (also known as protein-tyrosine phosphatase MEG1) plays a role in immunity, learning, synaptic plasticity or cell homeostasis. p38gamma is also an interaction partner of the PTPN4 PDZ domain: PTPN4 regulates neuronal cell homeostasis by protecting neurons against apoptosis; binding of the C terminus of p38gamma to the PDZ domain of PTPN4, antagonizes the catalytic autoinhibition of PTPN4, leading to cell apoptosis. Other interaction partners of the PTPN4 PDZ domain include glutamate receptor subunit GluN2A, and RABV strain G protein, among others. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This PTPN3-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  PDZ domain of tyrosine-protein phosphatase non-receptor type 3 (PTPN3), tyrosine-protein phosphatase non-receptor type 4 (PTNP4), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of PTPN3, PTPN4 and related domains. PTPN3 (also known as protein-tyrosine phosphatase H1, PTP-H1) has a tumor-suppressive or a tumor-promoting role in many cancers. It serves as a specific phosphatase for the MAP kinase p38gamma; the two interact via their PDZ domains and cooperate to promote Ras-induced oncogenesis. Interaction partners of the PTPN3 PDZ domain include p38gamma and human papillomavirus E6 oncoprotein. PTPN4 (also known as protein-tyrosine phosphatase MEG1) plays a role in immunity, learning, synaptic plasticity or cell homeostasis. p38gamma is also an interaction partner of the PTPN4 PDZ domain: PTPN4 regulates neuronal cell homeostasis by protecting neurons against apoptosis; binding of the C terminus of p38gamma to the PDZ domain of PTPN4, antagonizes the catalytic autoinhibition of PTPN4, leading to cell apoptosis. Other interaction partners of the PTPN4 PDZ domain include glutamate receptor subunit GluN2A, and RABV strain G protein, among others. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This PTPN3-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd06706); members share this curated model.
