identifier: CDD:cd22153
label: "F-box domain found in Arabidopsis thaliana TUBBY-like proteins (AtTLPs) and similar proteins. The TUBBY-like protein gene family of Arabidopsis has 11 members, AtTLP1-11. They have conserved C-terminal tubby domains. All AtTLP members except AtTLP8 also contain a conserved F-box domain. AtTLPs are involved in responses to stress. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Arabidopsis thaliana TUBBY-like proteins (AtTLPs) and similar proteins. The TUBBY-like protein gene family of Arabidopsis has 11 members, AtTLP1-11. They have conserved C-terminal tubby domains. All AtTLP members except AtTLP8 also contain a conserved F-box domain. AtTLPs are involved in responses to stress. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22153); members share this curated model.
