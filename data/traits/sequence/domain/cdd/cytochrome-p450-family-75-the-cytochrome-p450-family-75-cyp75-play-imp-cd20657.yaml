identifier: CDD:cd20657
label: "cytochrome P450 family 75. The cytochrome P450 family 75 (CYP75) play important roles in the biosynthesis of colored class of flavonoids, anthocyanins, which confer a diverse range of colors to flowers from orange to red to violet and blue. The number of hydroxyl groups on the B-ring of anthocyanidins, the chromophores and precursors of anthocyanins, impact the anthocyanin color - the more the bluer. The hydroxylation pattern is determined by CYP75 proteins: flavonoid 3'-hydroxylase (F3'H, EC 1.14.14.82) and and flavonoid 3',5'-hydroxylase (F3'5'H, EC 1.14.14.81), which belong to CYP75B and CYP75A subfamilies, respectively. Both enzymes have broad substrate specificity and catalyze the hydroxylation of flavanones, dihydroflavonols, flavonols and flavones. F3'H catalyzes the 3'-hydroxylation of the flavonoid B-ring to the 3',4'-hydroxylated state. F3'5'H catalysis leads to trihydroxylated delphinidin-based anthocyanins that tend to have violet/blue colours. CYP75 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 family 75. The cytochrome P450 family 75 (CYP75) play important roles in the biosynthesis of colored class of flavonoids, anthocyanins, which confer a diverse range of colors to flowers from orange to red to violet and blue. The number of hydroxyl groups on the B-ring of anthocyanidins, the chromophores and precursors of anthocyanins, impact the anthocyanin color - the more the bluer. The hydroxylation pattern is determined by CYP75 proteins: flavonoid 3'-hydroxylase (F3'H, EC 1.14.14.82) and and flavonoid 3',5'-hydroxylase (F3'5'H, EC 1.14.14.81), which belong to CYP75B and CYP75A subfamilies, respectively. Both enzymes have broad substrate specificity and catalyze the hydroxylation of flavanones, dihydroflavonols, flavonols and flavones. F3'H catalyzes the 3'-hydroxylation of the flavonoid B-ring to the 3',4'-hydroxylated state. F3'5'H catalysis leads to trihydroxylated delphinidin-based anthocyanins that tend to have violet/blue colours. CYP75 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd20657); members share this curated model.
