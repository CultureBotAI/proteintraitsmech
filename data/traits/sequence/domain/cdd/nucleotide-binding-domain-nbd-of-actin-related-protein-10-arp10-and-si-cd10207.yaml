identifier: CDD:cd10207
label: "nucleotide-binding domain (NBD) of actin-related protein 10 (Arp10) and similar proteins. Arp10, also known as actin-related protein 11 (Arp11), is a subunit of the cargo-binding portion of the dynein activator, dynactin. It, together with dynactin4 (p62), -5(p25), and -6(p27), forms a heterotetrameric complex located at the pointed end of Arp1. Arp1 forms a mini-filament of uniform size, with proteins bound along its length and at both ends. Human Arp10 is encoded by the ACTR10 gene."
definition: >-
  nucleotide-binding domain (NBD) of actin-related protein 10 (Arp10) and similar proteins. Arp10, also known as actin-related protein 11 (Arp11), is a subunit of the cargo-binding portion of the dynein activator, dynactin. It, together with dynactin4 (p62), -5(p25), and -6(p27), forms a heterotetrameric complex located at the pointed end of Arp1. Arp1 forms a mini-filament of uniform size, with proteins bound along its length and at both ends. Human Arp10 is encoded by the ACTR10 gene. — an NCBI CDD conserved domain (cd10207); members share this curated model.
