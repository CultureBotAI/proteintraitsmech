label: AdoMet_MTases_MTr1
definition: >-
  Cap-specific mRNA (nucleoside-2'-O-)-methyltransferase 1. Cap-specific mRNA (nucleoside-2'-O-)-methyltransferase 1 methylates the ribose of the first nucleotide of a m(7)GpppG-capped mRNA to produce m(7)GpppNmp (cap1), an important step in the creation of stable and mature messenger RNA
