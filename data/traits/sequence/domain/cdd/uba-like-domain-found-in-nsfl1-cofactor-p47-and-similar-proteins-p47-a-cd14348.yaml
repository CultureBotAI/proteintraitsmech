identifier: CDD:cd14348
label: "UBA-like domain found in NSFL1 cofactor p47 and similar proteins. p47, also called UBX domain-containing protein 2C, is a major cofactor of the cytosolic AAA ATPase p97. It is required for the p97-regulated membrane reassembly of the endoplasmic reticulum (ER), the nuclear envelope and the Golgi apparatus. p47, together with p97, forms the p97-p47 complex that plays an important role in regulation of membrane fusion events. p47 contains an N-terminal ubiquitin-associated (UBA)-like domain, a central SEP (named after shp1, eyc and p47) domain, and a ubiquitin-like (UBX) domain. UBA-like domain is responsible for forming a highly stable complex with ubiquitin. SEP domain and UBX domain may involve in p47 trimerization or forms a stable complex with the p97 N-terminal domain."
definition: >-
  UBA-like domain found in NSFL1 cofactor p47 and similar proteins. p47, also called UBX domain-containing protein 2C, is a major cofactor of the cytosolic AAA ATPase p97. It is required for the p97-regulated membrane reassembly of the endoplasmic reticulum (ER), the nuclear envelope and the Golgi apparatus. p47, together with p97, forms the p97-p47 complex that plays an important role in regulation of membrane fusion events. p47 contains an N-terminal ubiquitin-associated (UBA)-like domain, a central SEP (named after shp1, eyc and p47) domain, and a ubiquitin-like (UBX) domain. UBA-like domain is responsible for forming a highly stable complex with ubiquitin. SEP domain and UBX domain may involve in p47 trimerization or forms a stable complex with the p97 N-terminal domain. — an NCBI CDD conserved domain (cd14348); members share this curated model.
