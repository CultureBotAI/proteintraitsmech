identifier: CDD:cd17899
label: CheZ
definition: >-
  bacterial chemotaxis phosphatase CheZ. This family represents the bacterial chemotaxis phosphatase, CheZ, which is generally found in proteobacteria; other types of bacteria such as those of the genus Thermotoga and Bacillus do not have CheZ but instead encode phosphatases of the CheC/CheX/FliY (CXY) family. CheZ forms a dimer characterized by a long four-helix bundle, composed of two helices from each monomer. CheZ dephosphorylates CheY in a reaction that is essential to maintain a continuous chemotactic response to environmental changes. In Escherichia coli, the phosphatase CheZ decreases the CheY-P lifetime from ~20 s to ~200 milliseconds. It is thought that a conserved Glutamine residue in CheZ orientates a water molecule for nucleophilic attack at the CheY active site
