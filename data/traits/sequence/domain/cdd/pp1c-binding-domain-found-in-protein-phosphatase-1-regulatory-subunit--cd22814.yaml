identifier: CDD:cd22814
label: "PP1C binding domain found in protein phosphatase 1 regulatory subunit 3B (PPP1R3B). PPP1R3B, also called hepatic glycogen-targeting protein phosphatase 1 (PP1) regulatory subunit GL, protein phosphatase 1 regulatory subunit 4, PP1 subunit R4, or protein phosphatase 1 subunit GL, acts as a glycogen-targeting subunit for PP1. It facilitates interaction of the PP1 with enzymes of the glycogen metabolism and regulates its activity. PPP1R3B suppresses the rate at which PP1 dephosphorylates (inactivates) glycogen phosphorylase and enhances the rate at which it activates glycogen synthase and therefore limits glycogen breakdown. Its activity is inhibited by glycogen phosphorylase liver form (PYGL), resulting in inhibition of the glycogen synthase and glycogen phosphorylase phosphatase activities of PP1. It can dramatically increase basal and insulin-stimulated glycogen synthesis upon overexpression in hepatocytes. PPP1R3B interacts with glycogen, the PPP1CC catalytic subunit of PP1, and PYGL. It associates with glycogen particles. This model corresponds to the protein phosphatase 1 catalytic subunit (PP1C) binding domain of PPP1R3B, which contains a RVxF PP1C-binding motif that mediates interactions with PP1C."
definition: >-
  PP1C binding domain found in protein phosphatase 1 regulatory subunit 3B (PPP1R3B). PPP1R3B, also called hepatic glycogen-targeting protein phosphatase 1 (PP1) regulatory subunit GL, protein phosphatase 1 regulatory subunit 4, PP1 subunit R4, or protein phosphatase 1 subunit GL, acts as a glycogen-targeting subunit for PP1. It facilitates interaction of the PP1 with enzymes of the glycogen metabolism and regulates its activity. PPP1R3B suppresses the rate at which PP1 dephosphorylates (inactivates) glycogen phosphorylase and enhances the rate at which it activates glycogen synthase and therefore limits glycogen breakdown. Its activity is inhibited by glycogen phosphorylase liver form (PYGL), resulting in inhibition of the glycogen synthase and glycogen phosphorylase phosphatase activities of PP1. It can dramatically increase basal and insulin-stimulated glycogen synthesis upon overexpression in hepatocytes. PPP1R3B interacts with glycogen, the PPP1CC catalytic subunit of PP1, and PYGL. It associates with glycogen particles. This model corresponds to the protein phosphatase 1 catalytic subunit (PP1C) binding domain of PPP1R3B, which contains a RVxF PP1C-binding motif that mediates interactions with PP1C. — an NCBI CDD conserved domain (cd22814); members share this curated model.
