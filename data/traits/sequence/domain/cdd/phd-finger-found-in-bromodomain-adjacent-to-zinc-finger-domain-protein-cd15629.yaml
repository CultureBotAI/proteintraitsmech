identifier: CDD:cd15629
label: "PHD finger found in bromodomain adjacent to zinc finger domain protein 2A (BAZ2A). BAZ2A, also termed transcription termination factor I-interacting protein 5 (TTF-I-interacting protein 5, or Tip5), or WALp3, is an epigenetic regulator. It has been implicated in epigenetic rRNA gene silencing, as the large subunit of the SNF2h-containing chromatin-remodeling complex NoRC that induces nucleosome sliding in an ATP- and histone H4 tail-dependent fashion. BAZ2A has also been shown to be broadly overexpressed in prostate cancer, to regulate numerous protein-coding genes and to cooperate with EZH2 (enhancer of zeste homolog 2) to maintain epigenetic silencing at genes repressed in prostate cancer metastasis. Its  overexpression is tightly associated with a prostate cancer subtype displaying CpG island methylator phenotype (CIMP) in tumors and with prostate cancer recurrence in patients. It contains a TAM (TIP5/ARBP/MBD) domain, a DDT domain, four AT-hooks, BAZ 1 and BAZ 2 motifs, a WAKZ (WSTF/Acf1/KIAA0314/ZK783.4) motif, a plant homeodomain (PHD) finger, and a bromodomain."
definition: >-
  PHD finger found in bromodomain adjacent to zinc finger domain protein 2A (BAZ2A). BAZ2A, also termed transcription termination factor I-interacting protein 5 (TTF-I-interacting protein 5, or Tip5), or WALp3, is an epigenetic regulator. It has been implicated in epigenetic rRNA gene silencing, as the large subunit of the SNF2h-containing chromatin-remodeling complex NoRC that induces nucleosome sliding in an ATP- and histone H4 tail-dependent fashion. BAZ2A has also been shown to be broadly overexpressed in prostate cancer, to regulate numerous protein-coding genes and to cooperate with EZH2 (enhancer of zeste homolog 2) to maintain epigenetic silencing at genes repressed in prostate cancer metastasis. Its overexpression is tightly associated with a prostate cancer subtype displaying CpG island methylator phenotype (CIMP) in tumors and with prostate cancer recurrence in patients. It contains a TAM (TIP5/ARBP/MBD) domain, a DDT domain, four AT-hooks, BAZ 1 and BAZ 2 motifs, a WAKZ (WSTF/Acf1/KIAA0314/ZK783.4) motif, a plant homeodomain (PHD) finger, and a bromodomain. — an NCBI CDD conserved domain (cd15629); members share this curated model.
