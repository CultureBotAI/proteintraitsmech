identifier: CDD:cd16997
label: "VHS (Vps27/Hrs/STAM) domain of TOM1-like protein 1. TOM1-like protein 1 (Tom1L1) is also called Src-activating and signaling molecule protein (Srcasm). It is a member of the Tom1 (Target of myb1) subfamily, characterized by the presence of a VHS (Vps27p/Hrs/Stam) domain in the N-terminal portion followed by a GAT (GGA and Tom) domain. They are novel regulators for post-Golgi trafficking and signaling. Tom1L1 has been implicated in multivesicular body (MVB) formation, viral egress from the cell, and cytokinesis. Its amplification enhances the metastatic progression of ERBB2-positive breast cancers. The VHS domain has a superhelical structure similar to the structure of the ARM repeats and is present at the very N-termini of proteins. It is a right-handed superhelix of eight alpha helices. The VHS domain has been found in a number of proteins, some of which have been implicated in intracellular trafficking and sorting."
definition: >-
  VHS (Vps27/Hrs/STAM) domain of TOM1-like protein 1. TOM1-like protein 1 (Tom1L1) is also called Src-activating and signaling molecule protein (Srcasm). It is a member of the Tom1 (Target of myb1) subfamily, characterized by the presence of a VHS (Vps27p/Hrs/Stam) domain in the N-terminal portion followed by a GAT (GGA and Tom) domain. They are novel regulators for post-Golgi trafficking and signaling. Tom1L1 has been implicated in multivesicular body (MVB) formation, viral egress from the cell, and cytokinesis. Its amplification enhances the metastatic progression of ERBB2-positive breast cancers. The VHS domain has a superhelical structure similar to the structure of the ARM repeats and is present at the very N-termini of proteins. It is a right-handed superhelix of eight alpha helices. The VHS domain has been found in a number of proteins, some of which have been implicated in intracellular trafficking and sorting. — an NCBI CDD conserved domain (cd16997); members share this curated model.
