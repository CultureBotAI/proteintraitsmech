identifier: CDD:cd22877
label: "C-terminal domain of Saccharomyces cerevisiae structural ATP-dependent DNA helicase Srs2 and similar proteins. Srs2, also called RADH, or HPR5, is an ATP-dependent DNA helicase involved in DNA repair at least for UV-induced lesions. The polarity of the helicase activity was determined to be 3' to 5'. The model corresponds to Srs2 C-terminal domain, which harbors tandem receptor motifs that interact independently with proliferating cell nuclear antigen (PCNA) and SUMO; both motifs are required to specifically recognize SUMO-PCNA."
definition: >-
  C-terminal domain of Saccharomyces cerevisiae structural ATP-dependent DNA helicase Srs2 and similar proteins. Srs2, also called RADH, or HPR5, is an ATP-dependent DNA helicase involved in DNA repair at least for UV-induced lesions. The polarity of the helicase activity was determined to be 3' to 5'. The model corresponds to Srs2 C-terminal domain, which harbors tandem receptor motifs that interact independently with proliferating cell nuclear antigen (PCNA) and SUMO; both motifs are required to specifically recognize SUMO-PCNA. — an NCBI CDD conserved domain (cd22877); members share this curated model.
