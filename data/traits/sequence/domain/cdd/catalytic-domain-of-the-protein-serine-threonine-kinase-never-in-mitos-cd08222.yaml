identifier: CDD:cd08222
label: "Catalytic domain of the Protein Serine/Threonine Kinase, Never In Mitosis gene A (NIMA)-related kinase 11. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. Nek11 is involved, through direct phosphorylation, in regulating the degradation of Cdc25A (Cell Division Cycle 25 homolog A), which plays a role in cell cycle progression and in activating cyclin dependent kinases. Nek11 is activated by CHK1 (CHeckpoint Kinase 1) and may be involved in the G2/M checkpoint. Nek11 may also play a role in the S-phase checkpoint as well as in DNA replication and genotoxic stress responses. It is one in a family of 11 different Neks (Nek1-11) that are involved in cell cycle control. The Nek family is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Protein Serine/Threonine Kinase, Never In Mitosis gene A (NIMA)-related kinase 11. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. Nek11 is involved, through direct phosphorylation, in regulating the degradation of Cdc25A (Cell Division Cycle 25 homolog A), which plays a role in cell cycle progression and in activating cyclin dependent kinases. Nek11 is activated by CHK1 (CHeckpoint Kinase 1) and may be involved in the G2/M checkpoint. Nek11 may also play a role in the S-phase checkpoint as well as in DNA replication and genotoxic stress responses. It is one in a family of 11 different Neks (Nek1-11) that are involved in cell cycle control. The Nek family is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd08222); members share this curated model.
