identifier: CDD:cd19152
label: "AKR15A family of aldo-keto reductase. The AKR15 family includes Microbacterium luteolum pyridoxal 4-dehydrogenase (PLD), Pseudomonas sp. D-threo-aldose 1-dehydrogenase (FDH), and similar proteins. PLD (EC1.1.1.107) catalyzes irreversible oxidation of pyridoxal. FDH(EC1.1.1.122), also called (2S,3R)-aldose dehydrogenase, or L-fucose dehydrogenase, catalyzes the oxidation of L-fucose to L-fuconolactone in the presence of NADP(+). It is also active against L-galactose, and to a much lesser degree, D-arabinose. FDH (EC1.1.1.122), also called (2S,3R)-aldose dehydrogenase, or L-fucose dehydrogenase, catalyzes the oxidation of L-fucose to L-fuconolactone in the presence of NADP(+). It is also active against L-galactose, and to a much lesser degree, D-arabinose."
definition: >-
  AKR15A family of aldo-keto reductase. The AKR15 family includes Microbacterium luteolum pyridoxal 4-dehydrogenase (PLD), Pseudomonas sp. D-threo-aldose 1-dehydrogenase (FDH), and similar proteins. PLD (EC1.1.1.107) catalyzes irreversible oxidation of pyridoxal. FDH(EC1.1.1.122), also called (2S,3R)-aldose dehydrogenase, or L-fucose dehydrogenase, catalyzes the oxidation of L-fucose to L-fuconolactone in the presence of NADP(+). It is also active against L-galactose, and to a much lesser degree, D-arabinose. FDH (EC1.1.1.122), also called (2S,3R)-aldose dehydrogenase, or L-fucose dehydrogenase, catalyzes the oxidation of L-fucose to L-fuconolactone in the presence of NADP(+). It is also active against L-galactose, and to a much lesser degree, D-arabinose. — an NCBI CDD conserved domain (cd19152); members share this curated model.
