identifier: CDD:cd23174
label: "catalytic core domain of RNA-dependent RNA polymerase (RdRp) chronic bee paralysis virus (CBPV) and related positive-sense single-stranded RNA [(+)ssRNA] viruses. This group contains the catalytic core domain of RdRp of the chronic bee paralysis virus (CBPV) and related (+)ssRNA viruses. The CBPV is the causative agent of severe, usually fatal, paralysis in adult honey bees. CBPV has not been assigned to any group or class of viruses because it has a unique genome organization and virion morphology. However, analyses of the nucleic acid sequence showed similarities between the RdRp of CBPV and the RdRps of Tombusviruses, Nodaviruses, Lake Sinai virus 1 and 2 as well as the Anopheline associated C virus (AACV). CBPV was one of the first viruses in honey bees to be described and isolated as it causes characteristic signs of disease in adult honey bees. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
definition: >-
  catalytic core domain of RNA-dependent RNA polymerase (RdRp) chronic bee paralysis virus (CBPV) and related positive-sense single-stranded RNA [(+)ssRNA] viruses. This group contains the catalytic core domain of RdRp of the chronic bee paralysis virus (CBPV) and related (+)ssRNA viruses. The CBPV is the causative agent of severe, usually fatal, paralysis in adult honey bees. CBPV has not been assigned to any group or class of viruses because it has a unique genome organization and virion morphology. However, analyses of the nucleic acid sequence showed similarities between the RdRp of CBPV and the RdRps of Tombusviruses, Nodaviruses, Lake Sinai virus 1 and 2 as well as the Anopheline associated C virus (AACV). CBPV was one of the first viruses in honey bees to be described and isolated as it causes characteristic signs of disease in adult honey bees. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides. — an NCBI CDD conserved domain (cd23174); members share this curated model.
