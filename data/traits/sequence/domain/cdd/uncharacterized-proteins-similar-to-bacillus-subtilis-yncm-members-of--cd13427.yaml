identifier: CDD:cd13427
label: "Uncharacterized proteins similar to Bacillus subtilis YncM. Members of this family share close structural similarity with peptidases of the Peptidase_G1 family and may be homologous. They do not appear to share the peptidases' active site, though a bound sulfate ion in the single available structure suggests a functional site at a matching location."
definition: >-
  Uncharacterized proteins similar to Bacillus subtilis YncM. Members of this family share close structural similarity with peptidases of the Peptidase_G1 family and may be homologous. They do not appear to share the peptidases' active site, though a bound sulfate ion in the single available structure suggests a functional site at a matching location. — an NCBI CDD conserved domain (cd13427); members share this curated model.
