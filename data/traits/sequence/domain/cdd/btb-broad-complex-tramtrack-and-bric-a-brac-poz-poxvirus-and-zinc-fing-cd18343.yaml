identifier: CDD:cd18343
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in speckle-type POZ protein-like (SPOPL). SPOPL, also called HIB homolog 2 or Roadkill homolog 2, is a component of a cullin-RING-based BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complexes that mediate the ubiquitination and subsequent proteasomal degradation of target proteins. The complexes may contain homodimeric SPOPL or the heterodimers formed by speckle-type POZ protein (SPOP) and SPOPL, which are less efficient than ubiquitin ligase complexes containing only SPOP. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in speckle-type POZ protein-like (SPOPL). SPOPL, also called HIB homolog 2 or Roadkill homolog 2, is a component of a cullin-RING-based BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complexes that mediate the ubiquitination and subsequent proteasomal degradation of target proteins. The complexes may contain homodimeric SPOPL or the heterodimers formed by speckle-type POZ protein (SPOP) and SPOPL, which are less efficient than ubiquitin ligase complexes containing only SPOP. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18343); members share this curated model.
