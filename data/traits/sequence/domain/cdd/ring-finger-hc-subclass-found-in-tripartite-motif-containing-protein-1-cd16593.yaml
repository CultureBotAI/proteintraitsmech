identifier: CDD:cd16593
label: "RING finger, HC subclass, found in tripartite motif-containing protein 10 (TRIM10) and similar proteins. TRIM10, also known as B30-RING finger protein (RFB30), RING finger protein 9 (RNF9), or hematopoietic RING finger 1 (HERF1), is a novel hematopoiesis-specific RING finger protein required for terminal differentiation of erythroid cells. TRIM10 belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain."
definition: >-
