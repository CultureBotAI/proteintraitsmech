identifier: CDD:cd13443
label: "Inhibitor of the contact-dependent growth inhibition (CDI) system of Burkholderia pseudomallei 1026b, and related proteins. CDI toxins are expressed by gram-negative bacteria as part of a mechanism to inhibit the growth of neighboring cells. This model represents the inhibitor of the CdiA effector protein from Burkholderia pseudomallei 1026b (which is a tRNAse). CdiA secretion is dependent on the outer membrane protein CdiB. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered. The inhibitors are intracellular proteins that inactivate the toxin/effector protein."
definition: >-
  Inhibitor of the contact-dependent growth inhibition (CDI) system of Burkholderia pseudomallei 1026b, and related proteins. CDI toxins are expressed by gram-negative bacteria as part of a mechanism to inhibit the growth of neighboring cells. This model represents the inhibitor of the CdiA effector protein from Burkholderia pseudomallei 1026b (which is a tRNAse). CdiA secretion is dependent on the outer membrane protein CdiB. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered. The inhibitors are intracellular proteins that inactivate the toxin/effector protein. — an NCBI CDD conserved domain (cd13443); members share this curated model.
