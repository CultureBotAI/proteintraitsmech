identifier: CDD:cd23334
label: "first fascin-like domain, beta-trefoil fold, found in the fascin subfamily. The fascin family includes fascin1-3 and Drosophila melanogaster protein singed. Fascin, also called fascin-1, 55 kDa actin-bundling protein, singed-like protein, or p55, is an actin-binding protein that contains 2 major actin binding sites. It is involved in the organization of actin filament bundles and the formation of microspikes, membrane ruffles, and stress fibers. It plays an important role for the formation of a diverse set of cell protrusions, such as filopodia, and for cell motility and migration. It mediates reorganization of the actin cytoskeleton and axon growth cone collapse in response to nerve growth factor (NGF). Fascin-2, also called retinal fascin, is a photoreceptor-specific paralog of the actin-bundling protein fascin. It may play a pivotal role in photoreceptor cell-specific events, such as disk morphogenesis. Fascin-3, also called testis fascin, is a novel paralog of the actin-bundling protein fascin expressed specifically in the elongate spermatid head. Protein singed acts as an actin-bundling protein that may have a role in the asymmetric organization and/or movement of cytoplasmic components. It has a role in somatic cells during the formation of adult bristles and hairs, and in the female germline during oogenesis. Members of this subfamily are composed of four fascin beta-trefoil domains, which are characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The model corresponds to the first fascin-like beta-trefoil domain."
definition: >-
  first fascin-like domain, beta-trefoil fold, found in the fascin subfamily. The fascin family includes fascin1-3 and Drosophila melanogaster protein singed. Fascin, also called fascin-1, 55 kDa actin-bundling protein, singed-like protein, or p55, is an actin-binding protein that contains 2 major actin binding sites. It is involved in the organization of actin filament bundles and the formation of microspikes, membrane ruffles, and stress fibers. It plays an important role for the formation of a diverse set of cell protrusions, such as filopodia, and for cell motility and migration. It mediates reorganization of the actin cytoskeleton and axon growth cone collapse in response to nerve growth factor (NGF). Fascin-2, also called retinal fascin, is a photoreceptor-specific paralog of the actin-bundling protein fascin. It may play a pivotal role in photoreceptor cell-specific events, such as disk morphogenesis. Fascin-3, also called testis fascin, is a novel paralog of the actin-bundling protein fascin expressed specifically in the elongate spermatid head. Protein singed acts as an actin-bundling protein that may have a role in the asymmetric organization and/or movement of cytoplasmic components. It has a role in somatic cells during the formation of adult bristles and hairs, and in the female germline during oogenesis. Members of this subfamily are composed of four fascin beta-trefoil domains, which are characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The model corresponds to the first fascin-like beta-trefoil domain. — an NCBI CDD conserved domain (cd23334); members share this curated model.
