identifier: CDD:cd10284
label: "Somatotropin/prolactin hormone family. The somatotropin/prolactin hormone family includes growth hormones 1 and 2, prolactin, prolactin 2, and other members that play vital roles in a variety of processes, including growth control. They are long-chain class-I helical cytokines, most of which are secreted by the pituitary gland, and are active as monomers, binding to cellular receptors with EpoR-like ligand binding domains."
definition: >-
  Somatotropin/prolactin hormone family. The somatotropin/prolactin hormone family includes growth hormones 1 and 2, prolactin, prolactin 2, and other members that play vital roles in a variety of processes, including growth control. They are long-chain class-I helical cytokines, most of which are secreted by the pituitary gland, and are active as monomers, binding to cellular receptors with EpoR-like ligand binding domains. — an NCBI CDD conserved domain (cd10284); members share this curated model.
