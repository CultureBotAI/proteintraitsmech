identifier: CDD:cd11391
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain family. bHLH-PAS domain has been found in a large group of bHLH transcription regulators that are involved in gene expression responding to environmental change and controlling aspects of neural development, including proteins from aryl hydrocarbon receptor nuclear translocator (ARNT) family, hypoxia-inducible factor (HIF) family, aryl hydrocarbon receptor (AhR) family, neuronal PAS domain-containing protein (NPAS) family, Circadian locomotor output cycles protein kaput (CLOCK)-like family, and single-minded (SIM) family. bHLH-PAS transcriptional regulatory factors have a bHLH DNA-binding domain followed by two PAS domains and a C-terminal activation or repression domain.  bHLH-PAS family members can be divided into class I and class II based on their dimerization partner. bHLH-PAS class I factors include AhR, HIF and SIM. The best characterized bHLH-PAS Class II protein is the ubiquitous ARNT. Some members of bHLH-PAS family act as transcriptional coactivators (such as NCoA) that lack the ability to dimerize and bind DNA."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain family. bHLH-PAS domain has been found in a large group of bHLH transcription regulators that are involved in gene expression responding to environmental change and controlling aspects of neural development, including proteins from aryl hydrocarbon receptor nuclear translocator (ARNT) family, hypoxia-inducible factor (HIF) family, aryl hydrocarbon receptor (AhR) family, neuronal PAS domain-containing protein (NPAS) family, Circadian locomotor output cycles protein kaput (CLOCK)-like family, and single-minded (SIM) family. bHLH-PAS transcriptional regulatory factors have a bHLH DNA-binding domain followed by two PAS domains and a C-terminal activation or repression domain. bHLH-PAS family members can be divided into class I and class II based on their dimerization partner. bHLH-PAS class I factors include AhR, HIF and SIM. The best characterized bHLH-PAS Class II protein is the ubiquitous ARNT. Some members of bHLH-PAS family act as transcriptional coactivators (such as NCoA) that lack the ability to dimerize and bind DNA. — an NCBI CDD conserved domain (cd11391); members share this curated model.
