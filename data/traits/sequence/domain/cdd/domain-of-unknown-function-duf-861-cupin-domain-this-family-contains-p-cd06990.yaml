identifier: CDD:cd06990
label: "domain of unknown function DUF 861, cupin domain. This family contains proteins which seem to be specific to bacteria and some fungi. The function of this family is unknown but contains a cupin domain without a metal binding site. Cupins are a functionally diverse superfamily originally discovered based on the highly conserved motif found in germin and germin-like proteins. This conserved motif forms a beta-barrel fold found in all of the cupins, giving rise to the name cupin (cupa is the Latin term for small barrel)."
definition: >-
  domain of unknown function DUF 861, cupin domain. This family contains proteins which seem to be specific to bacteria and some fungi. The function of this family is unknown but contains a cupin domain without a metal binding site. Cupins are a functionally diverse superfamily originally discovered based on the highly conserved motif found in germin and germin-like proteins. This conserved motif forms a beta-barrel fold found in all of the cupins, giving rise to the name cupin (cupa is the Latin term for small barrel). — an NCBI CDD conserved domain (cd06990); members share this curated model.
