identifier: CDD:cd23122
label: "RING finger, H2 subclass, found in Arabidopsis thaliana RING-H2 zinc finger protein RHF2A and similar proteins. RHF2A is an E3 ubiquitin-protein ligase involved in the positive regulation of the gametogenesis progression. It is required for the degradation of KRP6, a cyclin-dependent kinase inhibitor which accumulates during meiosis and blocks the progression of subsequent mitoses during gametophytes development. It functions in association with RHF1A. Members of this subfamily contain a C3H2C3-type RING-H2 finger."
definition: >-
  RING finger, H2 subclass, found in Arabidopsis thaliana RING-H2 zinc finger protein RHF2A and similar proteins. RHF2A is an E3 ubiquitin-protein ligase involved in the positive regulation of the gametogenesis progression. It is required for the degradation of KRP6, a cyclin-dependent kinase inhibitor which accumulates during meiosis and blocks the progression of subsequent mitoses during gametophytes development. It functions in association with RHF1A. Members of this subfamily contain a C3H2C3-type RING-H2 finger. — an NCBI CDD conserved domain (cd23122); members share this curated model.
