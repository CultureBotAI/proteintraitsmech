identifier: CDD:cd09582
label: "SAM domain of Scm-like-3MBT3,4 proteins of Polycomb group. SAM (sterile alpha motif) domain of Scm-like-3MBT3,4 (Sex comb on midleg, Malignant brain tumor) subfamily proteins (also known as L3mbtl3,4 proteins)  is a putative protein-protein interaction domain.  Proteins of this subfamily are predicted transcriptional regulators belonging to Polycomb group. The majority of them are multidomain proteins: in addition to the C-terminal SAM domain, they contain three MBT repeats and Zn finger domain. Murine L3mbtl3 protein of this subfamily is essential for maturation of myeloid progenitor cells during differentiation. Human L3mbtl4 is a potential tumor suppressor gene in breast cancer, while deregulation of L3MBTL3 is associated with neuroblastoma."
definition: >-
  SAM domain of Scm-like-3MBT3,4 proteins of Polycomb group. SAM (sterile alpha motif) domain of Scm-like-3MBT3,4 (Sex comb on midleg, Malignant brain tumor) subfamily proteins (also known as L3mbtl3,4 proteins) is a putative protein-protein interaction domain. Proteins of this subfamily are predicted transcriptional regulators belonging to Polycomb group. The majority of them are multidomain proteins: in addition to the C-terminal SAM domain, they contain three MBT repeats and Zn finger domain. Murine L3mbtl3 protein of this subfamily is essential for maturation of myeloid progenitor cells during differentiation. Human L3mbtl4 is a potential tumor suppressor gene in breast cancer, while deregulation of L3MBTL3 is associated with neuroblastoma. — an NCBI CDD conserved domain (cd09582); members share this curated model.
