identifier: CDD:cd22978
label: "dimerization/docking (D/D) domain found in adenylate kinase isoenzyme 5 (AK5) and similar proteins. AK5 (EC 2.7.4.3/EC 2.7.4.6), also called ATP-AMP transphosphorylase 5, acts as a nucleoside monophosphate (NMP) kinase that catalyzes the reversible transfer of the terminal phosphate group between nucleoside triphosphates and monophosphates. It is active on AMP and dAMP with ATP as a donor. When GTP is used as phosphate donor, the enzyme phosphorylates AMP, CMP, and to a small extent dCMP. It also displays broad nucleoside diphosphate kinase activity. AK5 contains an N-terminal domain that shows high sequence similarity to the dimerization/docking (D/D) domains of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1."
definition: >-
  dimerization/docking (D/D) domain found in adenylate kinase isoenzyme 5 (AK5) and similar proteins. AK5 (EC 2.7.4.3/EC 2.7.4.6), also called ATP-AMP transphosphorylase 5, acts as a nucleoside monophosphate (NMP) kinase that catalyzes the reversible transfer of the terminal phosphate group between nucleoside triphosphates and monophosphates. It is active on AMP and dAMP with ATP as a donor. When GTP is used as phosphate donor, the enzyme phosphorylates AMP, CMP, and to a small extent dCMP. It also displays broad nucleoside diphosphate kinase activity. AK5 contains an N-terminal domain that shows high sequence similarity to the dimerization/docking (D/D) domains of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1. — an NCBI CDD conserved domain (cd22978); members share this curated model.
