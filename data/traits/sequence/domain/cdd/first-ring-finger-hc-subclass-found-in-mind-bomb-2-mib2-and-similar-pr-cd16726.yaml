identifier: CDD:cd16726
label: "first RING finger, HC subclass, found in mind bomb 2 (MIB2) and similar proteins. MIB2, also known as novel zinc finger protein (Novelzin), putative NF-kappa-B-activating protein 002N, skeletrophin, or zinc finger ZZ type with ankyrin repeat domain protein 1, is a large, multi-domain E3 ubiquitin-protein ligase that promotes ubiquitination of the cytoplasmic tails of Notch ligands. It promotes Delta ubiquitylation and endocytosis in Notch activation. Overexpression of MIB2 activates NF-kappaB and interferon-stimulated response element (ISRE) reporter activity. Moreover, MIB2 acts as a novel component of the activated B-cell CLL/lymphoma 10 (BCL10) complex and controls BCL10-dependent NF-kappaB activation. It also functions as a founder myoblast-specific protein that regulates myoblast fusion and muscle stability. MIB2 contains an MZM region with two Mib-Herc2 domains flanking a ZZ zinc finger, a REP region including two tandem Mib repeats, an ANK region that spans ankyrin repeats, and a RNG region consisting of two C3HC4-type RING-HC fingers. This model corresponds to the first RING-HC finger."
definition: >-
  first RING finger, HC subclass, found in mind bomb 2 (MIB2) and similar proteins. MIB2, also known as novel zinc finger protein (Novelzin), putative NF-kappa-B-activating protein 002N, skeletrophin, or zinc finger ZZ type with ankyrin repeat domain protein 1, is a large, multi-domain E3 ubiquitin-protein ligase that promotes ubiquitination of the cytoplasmic tails of Notch ligands. It promotes Delta ubiquitylation and endocytosis in Notch activation. Overexpression of MIB2 activates NF-kappaB and interferon-stimulated response element (ISRE) reporter activity. Moreover, MIB2 acts as a novel component of the activated B-cell CLL/lymphoma 10 (BCL10) complex and controls BCL10-dependent NF-kappaB activation. It also functions as a founder myoblast-specific protein that regulates myoblast fusion and muscle stability. MIB2 contains an MZM region with two Mib-Herc2 domains flanking a ZZ zinc finger, a REP region including two tandem Mib repeats, an ANK region that spans ankyrin repeats, and a RNG region consisting of two C3HC4-type RING-HC fingers. This model corresponds to the first RING-HC finger. — an NCBI CDD conserved domain (cd16726); members share this curated model.
