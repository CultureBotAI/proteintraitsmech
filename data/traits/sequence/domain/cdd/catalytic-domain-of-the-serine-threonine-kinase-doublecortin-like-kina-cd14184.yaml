identifier: CDD:cd14184
label: "Catalytic domain of the Serine/Threonine Kinase, Doublecortin-like kinase 2 (also called Doublecortin-like and CAM kinase-like 2). STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DCKL2 (or DCAMKL2) belongs to the doublecortin (DCX) family of proteins which are involved in neuronal migration, neurogenesis, and eye receptor development, among others. Family members typically contain tandem doublecortin (DCX) domains at the N-terminus; DCX domains can bind microtubules and serve as protein-interaction platforms. In addition, DCKL2 contains a serine, threonine, and proline rich domain (SP) and a C-terminal kinase domain with similarity to CAMKs. DCKL2 has been shown to interact with tubulin, JIP1/2, JNK, neurabin 2, and actin. It is associated with the terminal segments of axons and dendrites, and may function as a phosphorylation-dependent switch to control microtubule dynamics in neuronal growth cones. The DCKL2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Doublecortin-like kinase 2 (also called Doublecortin-like and CAM kinase-like 2). STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DCKL2 (or DCAMKL2) belongs to the doublecortin (DCX) family of proteins which are involved in neuronal migration, neurogenesis, and eye receptor development, among others. Family members typically contain tandem doublecortin (DCX) domains at the N-terminus; DCX domains can bind microtubules and serve as protein-interaction platforms. In addition, DCKL2 contains a serine, threonine, and proline rich domain (SP) and a C-terminal kinase domain with similarity to CAMKs. DCKL2 has been shown to interact with tubulin, JIP1/2, JNK, neurabin 2, and actin. It is associated with the terminal segments of axons and dendrites, and may function as a phosphorylation-dependent switch to control microtubule dynamics in neuronal growth cones. The DCKL2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14184); members share this curated model.
