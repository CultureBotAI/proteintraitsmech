identifier: CDD:cd16938
label: "Histidine kinase-like ATPase domain of Arabidopsis thaliana ETR2, ERS2, and EIN4, and related domains. This family includes the histidine kinase-like ATPase domains (HATPase) of three out of the five receptors that recognize the plant hormone ethylene in Arabidopsis thaliana. These three proteins have been classified as belonging to subfamily 2: ETR2, ERS2, and EIN4. They lack most of the motifs characteristic of histidine kinases, and EIN4 is the only one in this group containing the conserved histidine that is phosphorylated in two-component and phosphorelay systems. This family also includes the HATPase domains of Escherichia coli RcsD phosphotransferase which is a component of the Rcs-signaling system, a complex multistep phosphorelay involving five proteins, and is involved in many transcriptional networks such as cell division, biofilm formation, and virulence, among others. Also included is Schizosaccharomyces pombe Mak3 (Phk1) which participates in a multi-step two-component related system which regulates H2O2-induced activation of the Sty1 stress-activated protein kinase pathway. Most proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA), and a GAF sensor domain; most are hybrid sensor histidine kinases as they also contain a REC signal receiver domain."
definition: >-
  Histidine kinase-like ATPase domain of Arabidopsis thaliana ETR2, ERS2, and EIN4, and related domains. This family includes the histidine kinase-like ATPase domains (HATPase) of three out of the five receptors that recognize the plant hormone ethylene in Arabidopsis thaliana. These three proteins have been classified as belonging to subfamily 2: ETR2, ERS2, and EIN4. They lack most of the motifs characteristic of histidine kinases, and EIN4 is the only one in this group containing the conserved histidine that is phosphorylated in two-component and phosphorelay systems. This family also includes the HATPase domains of Escherichia coli RcsD phosphotransferase which is a component of the Rcs-signaling system, a complex multistep phosphorelay involving five proteins, and is involved in many transcriptional networks such as cell division, biofilm formation, and virulence, among others. Also included is Schizosaccharomyces pombe Mak3 (Phk1) which participates in a multi-step two-component related system which regulates H2O2-induced activation of the Sty1 stress-activated protein kinase pathway. Most proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA), and a GAF sensor domain; most are hybrid sensor histidine kinases as they also contain a REC signal receiver domain. — an NCBI CDD conserved domain (cd16938); members share this curated model.
