identifier: CDD:cd17168
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM and PDZ domain-containing protein 1 (FRMPD1). FRMPD1, also termed FERM domain-containing protein 2, is an activator of G-protein signaling 3 (AGS3)-binding protein that regulates the subcellular location of AGS3 and its interaction with G-proteins. It also binds to the tetratricopeptide repeat (TPR) motif-containing adaptor protein LGN. FRMPD1 contains a PDZ domain and a FERM domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. The family corresponds to the F1 sub-domain of the FERM domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM and PDZ domain-containing protein 1 (FRMPD1). FRMPD1, also termed FERM domain-containing protein 2, is an activator of G-protein signaling 3 (AGS3)-binding protein that regulates the subcellular location of AGS3 and its interaction with G-proteins. It also binds to the tetratricopeptide repeat (TPR) motif-containing adaptor protein LGN. FRMPD1 contains a PDZ domain and a FERM domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. The family corresponds to the F1 sub-domain of the FERM domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17168); members share this curated model.
