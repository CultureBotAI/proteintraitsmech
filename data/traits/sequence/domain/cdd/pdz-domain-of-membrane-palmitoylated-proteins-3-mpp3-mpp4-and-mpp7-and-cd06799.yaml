identifier: CDD:cd06799
label: "PDZ domain of membrane palmitoylated proteins 3 (MPP3), MPP4, and MPP7, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of MPP3, MPP4, and MPP7, and related domains. MPP3 (also known as MAGUK p55 subfamily member 3, erythrocyte membrane protein p55, or EMP55), MPP4 (also known as MAGUK p55 subfamily member 4 or Discs large homolog 6), and MPP7 (also known as MAGUK p55 subfamily member 7) are membrane-associated guanylate kinase (MAGUK)-like proteins. MPP3 is part of a cell adhesion protein complex including tumor suppressor CADM1 and actin-binding protein 4.1B. Participation in the Crumbs cell polarity complex has also been demonstrated for MPP7 in epithelial cells, and for MPP3 and MPP4 in the retina. MPP4 is needed for proper localization of plasma membrane calcium ATPases and maintenance of calcium homeostasis at the rod photoreceptor synaptic terminals. Binding partners of the MPP3 PDZ domain include nectin-3, serotonin 5-hydroxytryptamine, 5-HT(2C) receptor, and a cell adhesion protein, TSLC1 (tumor suppressor in lung cancer 1); fragments of MPP4 having the PDZ domain bind CRB (PDZ-SH3-GUK) and GABA transporter GAT1 (PDZ-SH3). PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This MPP1-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
