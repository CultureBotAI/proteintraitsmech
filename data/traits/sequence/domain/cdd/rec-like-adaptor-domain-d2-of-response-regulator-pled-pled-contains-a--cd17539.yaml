identifier: CDD:cd17539
label: "REC-like adaptor domain (D2) of response regulator PleD. PleD contains a REC domain (D1) with the phosphorylatable aspartate, a pseudo receiver (psREC)-like adaptor domain (D2), and the enzymatic diguanylate cyclase (DGC) domain, also called the GGDEF domain according to a conserved sequence motif, as its output domain. The GGDEF-containing PleD response regulators are global regulators of cell metabolism in some important human pathogens. This model describes the REC-like adaptor domain D2 of PleD, which is an inactive domain."
definition: >-
  REC-like adaptor domain (D2) of response regulator PleD. PleD contains a REC domain (D1) with the phosphorylatable aspartate, a pseudo receiver (psREC)-like adaptor domain (D2), and the enzymatic diguanylate cyclase (DGC) domain, also called the GGDEF domain according to a conserved sequence motif, as its output domain. The GGDEF-containing PleD response regulators are global regulators of cell metabolism in some important human pathogens. This model describes the REC-like adaptor domain D2 of PleD, which is an inactive domain. — an NCBI CDD conserved domain (cd17539); members share this curated model.
