identifier: CDD:cd20065
label: FH_FOXP2
definition: >-
  Forkhead (FH) domain found in Forkhead box protein P2 (FOXP2). FOXP2, also called CAG repeat protein 44, or Trinucleotide repeat-containing gene 10 protein, is a transcriptional repressor that may play a role in the specification and differentiation of lung epithelium. It may also play a role in developing neural, gastrointestinal, and cardiovascular tissues. An arginine-to-histidine missense mutation (R553H) in the FOXP2 Forkhead domain has been linked to a severe speech and language disorder. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'
