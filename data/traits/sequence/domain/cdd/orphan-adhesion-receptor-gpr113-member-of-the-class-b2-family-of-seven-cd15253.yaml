identifier: CDD:cd15253
label: "orphan adhesion receptor GPR113, member of the class B2 family of seven-transmembrane G protein-coupled receptors. GPR113 is an orphan receptor that belongs to group VI adhesion-GPCRs along with GPR110, GPR111, GPR115, and GPR116. The adhesion receptors are characterized by the presence of large N-terminal extracellular domains containing multiple adhesion motifs, which play critical roles in ligand recognition as well as cell-cell adhesion and cell-matrix interactions, linked by a stalk region to a class B seven-transmembrane domain. GPR113 contains a hormone binding domain and one EGF (epidermal grown factor) domain, and is primarily expressed in a subset of taste receptor cells. In addition, almost all adhesion receptors, except GPR123, contain an evolutionarily conserved GPCR-autoproteolysis inducing (GAIN) domain that undergoes autoproteolytic processing at the GPCR proteolysis site (GPS) motif located immediately N-terminal to the first transmembrane region, to generate N- and C-terminal fragments (NTF and CTF), which may serve important biological functions. However, several adhesion GPCRs, including GPR 111, GPR115, and CELSR1, are predicted to be non-cleavable at the GAIN domain because of the lack of a consensus catalytic triad sequence (His-Leu-Ser/Thr) within their GPS."
