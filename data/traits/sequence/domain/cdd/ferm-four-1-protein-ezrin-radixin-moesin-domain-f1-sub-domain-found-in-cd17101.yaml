identifier: CDD:cd17101
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in tyrosine-protein phosphatase non-receptor type 13 (PTPN13) and similar proteins. This family includes tyrosine-protein phosphatase non-receptor type 13 (PTPN13), FERM and PDZ domain-containing protein 2 (FRMPD2), and FERM domain-containing proteins FRMD1 and FRMD6. All family members contain a FERM domain that is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in tyrosine-protein phosphatase non-receptor type 13 (PTPN13) and similar proteins. This family includes tyrosine-protein phosphatase non-receptor type 13 (PTPN13), FERM and PDZ domain-containing protein 2 (FRMPD2), and FERM domain-containing proteins FRMD1 and FRMD6. All family members contain a FERM domain that is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17101); members share this curated model.
