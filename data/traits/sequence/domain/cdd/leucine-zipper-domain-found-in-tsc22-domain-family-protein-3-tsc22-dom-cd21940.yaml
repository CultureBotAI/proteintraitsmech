identifier: CDD:cd21940
label: "leucine zipper domain found in TSC22 domain family protein 3. TSC22 domain family protein 3 (TSC22D3) is also called DSIP-immunoreactive peptide, protein DIP, delta sleep-inducing peptide immunoreactor, glucocorticoid-induced leucine zipper protein (GILZ), TSC-22-like protein, or TSC-22-related protein (TSC-22R). It protects T-cells from IL2 deprivation-induced apoptosis through the inhibition of FOXO3A transcriptional activity that leads to the down-regulation of the pro-apoptotic factor BCL2L11. In macrophages, it plays a role in the anti-inflammatory and immunosuppressive effects of glucocorticoids and IL10. In T-cells, it inhibits anti-CD3-induced NFKB1 nuclear translocation. TSC22D3 contains a leucine zipper motif, a Pro/Glu rich domain, and three potential phosphorylation sites. This model corresponds to the leucine zipper (ZIP) domain. Its first helix is not basic and does not contain the consensus sequence, NXX(A)(A)XX(C/S)R, found in most basic region/leucine zipper (bZIP) proteins. Thus, the DNA-binding capability of the ZIP domain is not obvious. Similar to bZIP, ZIP forms homo- and heterodimers, resulting in many dimers that may have different effects on transcription."
definition: >-
  leucine zipper domain found in TSC22 domain family protein 3. TSC22 domain family protein 3 (TSC22D3) is also called DSIP-immunoreactive peptide, protein DIP, delta sleep-inducing peptide immunoreactor, glucocorticoid-induced leucine zipper protein (GILZ), TSC-22-like protein, or TSC-22-related protein (TSC-22R). It protects T-cells from IL2 deprivation-induced apoptosis through the inhibition of FOXO3A transcriptional activity that leads to the down-regulation of the pro-apoptotic factor BCL2L11. In macrophages, it plays a role in the anti-inflammatory and immunosuppressive effects of glucocorticoids and IL10. In T-cells, it inhibits anti-CD3-induced NFKB1 nuclear translocation. TSC22D3 contains a leucine zipper motif, a Pro/Glu rich domain, and three potential phosphorylation sites. This model corresponds to the leucine zipper (ZIP) domain. Its first helix is not basic and does not contain the consensus sequence, NXX(A)(A)XX(C/S)R, found in most basic region/leucine zipper (bZIP) proteins. Thus, the DNA-binding capability of the ZIP domain is not obvious. Similar to bZIP, ZIP forms homo- and heterodimers, resulting in many dimers that may have different effects on transcription. — an NCBI CDD conserved domain (cd21940); members share this curated model.
