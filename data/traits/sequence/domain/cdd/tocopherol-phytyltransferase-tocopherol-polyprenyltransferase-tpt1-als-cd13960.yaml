identifier: CDD:cd13960
label: "Tocopherol phytyltransferase. Tocopherol polyprenyltransferase (TPT1), also known as homogentisate phytyltransferase 1 (HPT1), tocopherol phytyltransferase, or VTE2, catalyzes the first step in the biosynthesis of the tocopherol forms of vitamin E, which involves the prenylation of homogentisate using phytyl diphosphate (PDP) as the prenyl donor. Prenyltransferases (PTs) catalyze the regioselective transfer of prenyl moieties onto a wide variety of substrates and play an important role in many biosynthetic pathways."
definition: >-
