identifier: CDD:cd11941
label: "Second C-terminal Src homology 3 domain of Rho guanine nucleotide exchange factor 37. ARHGEF37 contains a RhoGEF [or Dbl homology (DH)] domain followed by a Bin/Amphiphysin/Rvs (BAR) domain, and two C-terminal SH3 domains. Its specific function is unknown. Its domain architecture is similar to the C-terminal half of DNMBP or Tuba, a cdc42-specific GEF that provides a functional link between dynamin, Rho GTPase signaling, and actin dynamics, and plays an important role in regulating cell junction configuration. GEFs activate small GTPases by exchanging bound GDP for free GTP. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
