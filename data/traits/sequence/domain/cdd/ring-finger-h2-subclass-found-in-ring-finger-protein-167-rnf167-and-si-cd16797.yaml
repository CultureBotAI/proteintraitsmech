identifier: CDD:cd16797
label: "RING finger, H2 subclass, found in RING finger protein 167 (RNF167) and similar proteins. RNF167, also known as RING105, is an endosomal/lysosomal E3 ubiquitin-protein ligase involved in alpha-amino-3-hydroxy-5-methyl-4-isoxazolepropionic acid receptor (AMPAR) ubiquitination. It ubiquitinates AMPA-type glutamate receptor subunit GluA2 and regulates its surface expression, and thus acts as a selective regulator of AMPAR-mediated neurotransmission. It acts as an endosomal membrane protein which ubiquitylates vesicle-associated membrane protein 3 (VAMP3) and regulates endosomal trafficking. Moreover, RNF167 plays a role in the regulation of TSSC5 (tumor-suppressing subchromosomal transferable fragment cDNA, also known as ORCTL2/IMPT1/BWR1A/SLC22A1L), which can function in concert with the ubiquitin-conjugating enzyme UbcH6. RNF167 is widely conserved in metazoans and contains an N-terminal signal peptide, a protease-associated (PA) domain, two transmembrane domains (TM1 and TM2), and a C-terminal C3H2C3-type RING-H2 finger domain followed by a putative PEST sequence."
definition: >-
  RING finger, H2 subclass, found in RING finger protein 167 (RNF167) and similar proteins. RNF167, also known as RING105, is an endosomal/lysosomal E3 ubiquitin-protein ligase involved in alpha-amino-3-hydroxy-5-methyl-4-isoxazolepropionic acid receptor (AMPAR) ubiquitination. It ubiquitinates AMPA-type glutamate receptor subunit GluA2 and regulates its surface expression, and thus acts as a selective regulator of AMPAR-mediated neurotransmission. It acts as an endosomal membrane protein which ubiquitylates vesicle-associated membrane protein 3 (VAMP3) and regulates endosomal trafficking. Moreover, RNF167 plays a role in the regulation of TSSC5 (tumor-suppressing subchromosomal transferable fragment cDNA, also known as ORCTL2/IMPT1/BWR1A/SLC22A1L), which can function in concert with the ubiquitin-conjugating enzyme UbcH6. RNF167 is widely conserved in metazoans and contains an N-terminal signal peptide, a protease-associated (PA) domain, two transmembrane domains (TM1 and TM2), and a C-terminal C3H2C3-type RING-H2 finger domain followed by a putative PEST sequence. — an NCBI CDD conserved domain (cd16797); members share this curated model.
