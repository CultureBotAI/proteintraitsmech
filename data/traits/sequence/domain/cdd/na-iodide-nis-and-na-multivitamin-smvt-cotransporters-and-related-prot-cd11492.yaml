identifier: CDD:cd11492
label: "Na(+)/iodide (NIS) and Na(+)/multivitamin (SMVT) cotransporters, and related proteins; solute binding domain. NIS (encoded by the SLC5A5 gene) transports I-, and other anions including ClO4-, SCN-, and Br-. SMVT (encoded by the SLC5A6 gene) transports biotin, pantothenic acid and lipoate. This subfamily also includes SMCT1 and -2. SMCT1(encoded by the SLC5A8 gene) is a high-affinity transporter of various monocarboxylates including lactate and pyruvate, short-chain fatty acids, ketone bodies, nicotinate and its structural analogs, pyroglutamate, benzoate and its derivatives, and iodide. SMCT2 (encoded by the SLC5A12 gene) is a low-affinity transporter for short-chain fatty acids, lactate, pyruvate, and nicotinate. This subgroup belongs to the solute carrier 5 (SLC5) transporter family."
definition: >-
  Na(+)/iodide (NIS) and Na(+)/multivitamin (SMVT) cotransporters, and related proteins; solute binding domain. NIS (encoded by the SLC5A5 gene) transports I-, and other anions including ClO4-, SCN-, and Br-. SMVT (encoded by the SLC5A6 gene) transports biotin, pantothenic acid and lipoate. This subfamily also includes SMCT1 and -2. SMCT1(encoded by the SLC5A8 gene) is a high-affinity transporter of various monocarboxylates including lactate and pyruvate, short-chain fatty acids, ketone bodies, nicotinate and its structural analogs, pyroglutamate, benzoate and its derivatives, and iodide. SMCT2 (encoded by the SLC5A12 gene) is a low-affinity transporter for short-chain fatty acids, lactate, pyruvate, and nicotinate. This subgroup belongs to the solute carrier 5 (SLC5) transporter family. — an NCBI CDD conserved domain (cd11492); members share this curated model.
