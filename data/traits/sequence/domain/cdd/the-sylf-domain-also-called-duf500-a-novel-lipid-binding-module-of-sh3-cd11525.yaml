identifier: CDD:cd11525
label: "The SYLF domain (also called DUF500), a novel lipid-binding module, of SH3 domain containing Ysc84-like 1 (SH3YL1) and similar proteins. This subfamily is composed of yeast Ysc84 (also called LAS17-binding protein 4, Lsb4p) and Lsb3p proteins, vertebrate SH3YL1 (SH3 domain containing Ysc84-like 1), and similar proteins. They contain an N-terminal SYLF domain (also called DUF500) and a C-terminal SH3 domain. SH3YL1 localizes to the plasma membrane and is required for dorsal ruffle formation. Ysc84p localizes to actin patches and plays an important role in actin polymerization during endocytosis. A study of the yeast SH3 domain interactome predicts that Lsb3p and Lsb4p may function as molecular hubs for the assembly of endocytic complexes. The SYLF domain of SH3YL1 binds phosphoinositides with high affinity, while the N-terminal SYLF domains of both Ysc84p and Lsb3p have been shown to bind and bundle actin filaments, as well as bind liposomes with high affinity."
definition: >-
  The SYLF domain (also called DUF500), a novel lipid-binding module, of SH3 domain containing Ysc84-like 1 (SH3YL1) and similar proteins. This subfamily is composed of yeast Ysc84 (also called LAS17-binding protein 4, Lsb4p) and Lsb3p proteins, vertebrate SH3YL1 (SH3 domain containing Ysc84-like 1), and similar proteins. They contain an N-terminal SYLF domain (also called DUF500) and a C-terminal SH3 domain. SH3YL1 localizes to the plasma membrane and is required for dorsal ruffle formation. Ysc84p localizes to actin patches and plays an important role in actin polymerization during endocytosis. A study of the yeast SH3 domain interactome predicts that Lsb3p and Lsb4p may function as molecular hubs for the assembly of endocytic complexes. The SYLF domain of SH3YL1 binds phosphoinositides with high affinity, while the N-terminal SYLF domains of both Ysc84p and Lsb3p have been shown to bind and bundle actin filaments, as well as bind liposomes with high affinity. — an NCBI CDD conserved domain (cd11525); members share this curated model.
