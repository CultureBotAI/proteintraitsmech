identifier: CDD:cd11444
label: "basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana ILI1-BINDING BHLH 1 (IBH1) and similar proteins. The family includes several bHLH transcription factors from Arabidopsis thaliana, such as IBH1, UPBEAT1, PAR1 and PAR2. IBH1, also termed bHLH zeta, or AtbHLH158, is an atypical and probable non DNA-binding bHLH transcription factor that acts as transcriptional repressor that negatively regulates cell and organ elongation in response to gibberellin (GA) and brassinosteroid (BR) signaling. IBH1 forms heterodimer with BHLH49, thus inhibiting DNA binding of BHLH49, which is a transcriptional activator that regulates the expression of a subset of genes involved in cell expansion by binding to the G-box motif. UPBEAT1, also termed AtbHLH151, or EN 146, is a bHLH transcription factor that modulates the balance between cellular proliferation and differentiation in root growth. It does not act through cytokinin and auxin signaling, but by repressing peroxidase expression in the elongation zone. PAR1 (also termed AtbHLH165, or protein helix-loop-helix 1, or protein phytochrome rapidly regulated 1) and PAR2 (also termed AtbHLH166, or protein helix-loop-helix 2, or protein phytochrome rapidly regulated 2) are two atypical bHLH transcription factors that act as negative regulators of a variety of shade avoidance syndrome (SAS) responses, including seedling elongation and photosynthetic pigment accumulation. They act as direct transcriptional repressor of two auxin-responsive genes, SAUR15 and SAUR68. They may function in integrating shade and hormone transcriptional networks in response to light and auxin changes."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana ILI1-BINDING BHLH 1 (IBH1) and similar proteins. The family includes several bHLH transcription factors from Arabidopsis thaliana, such as IBH1, UPBEAT1, PAR1 and PAR2. IBH1, also termed bHLH zeta, or AtbHLH158, is an atypical and probable non DNA-binding bHLH transcription factor that acts as transcriptional repressor that negatively regulates cell and organ elongation in response to gibberellin (GA) and brassinosteroid (BR) signaling. IBH1 forms heterodimer with BHLH49, thus inhibiting DNA binding of BHLH49, which is a transcriptional activator that regulates the expression of a subset of genes involved in cell expansion by binding to the G-box motif. UPBEAT1, also termed AtbHLH151, or EN 146, is a bHLH transcription factor that modulates the balance between cellular proliferation and differentiation in root growth. It does not act through cytokinin and auxin signaling, but by repressing peroxidase expression in the elongation zone. PAR1 (also termed AtbHLH165, or protein helix-loop-helix 1, or protein phytochrome rapidly regulated 1) and PAR2 (also termed AtbHLH166, or protein helix-loop-helix 2, or protein phytochrome rapidly regulated 2) are two atypical bHLH transcription factors that act as negative regulators of a variety of shade avoidance syndrome (SAS) responses, including seedling elongation and photosynthetic pigment accumulation. They act as direct transcriptional repressor of two auxin-responsive genes, SAUR15 and SAUR68. They may function in integrating shade and hormone transcriptional networks in response to light and auxin changes. — an NCBI CDD conserved domain (cd11444); members share this curated model.
