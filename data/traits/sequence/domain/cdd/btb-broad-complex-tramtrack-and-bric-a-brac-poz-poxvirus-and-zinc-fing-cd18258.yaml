identifier: CDD:cd18258
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 29 (KLHL29). KLHL29 is also called Kelch repeat and BTB domain-containing protein 9 (KBTBD9). A novel fusion transcript NR5A2-KLHL29FT, resulting from transchromosomal insertion, may influence the origin or progression of colon cancer.  KLHL29 contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 29 (KLHL29). KLHL29 is also called Kelch repeat and BTB domain-containing protein 9 (KBTBD9). A novel fusion transcript NR5A2-KLHL29FT, resulting from transchromosomal insertion, may influence the origin or progression of colon cancer. KLHL29 contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18258); members share this curated model.
