identifier: CDD:cd22462
label: "fifth type I K homology (KH) RNA-binding domain found in Arabidopsis thaliana KH domain-containing protein HEN4 and similar protein. HEN4, also called protein HUA ENHANCER 4, plays a role in floral reproductive organ identity in the third whorl and floral determinacy specification by specifically promoting the processing of AGAMOUS (AG) pre-mRNA. It functions in association with HUA1 and HUA2. HEN4 contains five K-homology (KH) RNA-binding domains. The model corresponds to the KH5 domain of HEN4."
definition: >-
  fifth type I K homology (KH) RNA-binding domain found in Arabidopsis thaliana KH domain-containing protein HEN4 and similar protein. HEN4, also called protein HUA ENHANCER 4, plays a role in floral reproductive organ identity in the third whorl and floral determinacy specification by specifically promoting the processing of AGAMOUS (AG) pre-mRNA. It functions in association with HUA1 and HUA2. HEN4 contains five K-homology (KH) RNA-binding domains. The model corresponds to the KH5 domain of HEN4. — an NCBI CDD conserved domain (cd22462); members share this curated model.
