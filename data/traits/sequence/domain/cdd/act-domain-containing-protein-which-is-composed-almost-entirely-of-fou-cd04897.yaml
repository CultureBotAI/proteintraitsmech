identifier: CDD:cd04897
label: "ACT domain-containing protein which is composed almost entirely of four ACT domain repeats (the \"ACR\" protein). This CD includes the third ACT domain, of a novel type of ACT domain-containing protein which is composed almost entirely of four ACT domain repeats (the \"ACR\" protein). ACR proteins, found only in Arabidopsis and Oryza, as yet, are proposed to function as novel regulatory or sensor proteins in plants. Nine ACR gene products have been described (ACR1-8 in Arabidopsis and OsARC1-9 in Oryza) and are represented in this CD. Members of this CD belong to the superfamily of ACT regulatory domains."
definition: >-
  ACT domain-containing protein which is composed almost entirely of four ACT domain repeats (the "ACR" protein). This CD includes the third ACT domain, of a novel type of ACT domain-containing protein which is composed almost entirely of four ACT domain repeats (the "ACR" protein). ACR proteins, found only in Arabidopsis and Oryza, as yet, are proposed to function as novel regulatory or sensor proteins in plants. Nine ACR gene products have been described (ACR1-8 in Arabidopsis and OsARC1-9 in Oryza) and are represented in this CD. Members of this CD belong to the superfamily of ACT regulatory domains. — an NCBI CDD conserved domain (cd04897); members share this curated model.
