identifier: CDD:cd16964
label: "putative pre-16S rRNA nuclease YqgF and RuvX family. Escherichia coli YqgF has been shown to act as a pre-16S rRNA nuclease, presumably as a monomer. It is involved in the processing of pre-16S rRNA during ribosome maturation. The RuvX gene product from Mycobacterium tuberculosis was shown to act, in a dimeric form, as a Holliday junction resolvase (HJR). HJRs endonucleases specifically resolve Holliday junction DNA intermediates during homologous recombination. Holliday junctions are formed by the reciprocal exchange of strands between two DNA duplexes. HJRs occur in archaea, bacteria, and in the mitochondria of certain fungi; they may form homodimers and display structural similarity to RNase H and Hsp70."
definition: >-
  putative pre-16S rRNA nuclease YqgF and RuvX family. Escherichia coli YqgF has been shown to act as a pre-16S rRNA nuclease, presumably as a monomer. It is involved in the processing of pre-16S rRNA during ribosome maturation. The RuvX gene product from Mycobacterium tuberculosis was shown to act, in a dimeric form, as a Holliday junction resolvase (HJR). HJRs endonucleases specifically resolve Holliday junction DNA intermediates during homologous recombination. Holliday junctions are formed by the reciprocal exchange of strands between two DNA duplexes. HJRs occur in archaea, bacteria, and in the mitochondria of certain fungi; they may form homodimers and display structural similarity to RNase H and Hsp70. — an NCBI CDD conserved domain (cd16964); members share this curated model.
