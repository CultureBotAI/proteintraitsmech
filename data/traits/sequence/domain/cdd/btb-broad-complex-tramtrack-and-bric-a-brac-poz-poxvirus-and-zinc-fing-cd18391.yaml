identifier: CDD:cd18391
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 17 (KCTD17). KCTD17 is a BTB/POZ domain-containing protein that functions as a substrate-adaptor for cullin3-RING ubiquitin ligases that polyubiquitylates trichoplein, a protein involved in ciliogenesis down-regulation. It is a positive regulator of ciliogenesis, playing a crucial role in the initial steps of axoneme extension. A missense mutation in KCTD17 causes autosomal dominant myoclonus-dystonia (M-D). The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. The KCTD17 BTB domains form pentamers."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 17 (KCTD17). KCTD17 is a BTB/POZ domain-containing protein that functions as a substrate-adaptor for cullin3-RING ubiquitin ligases that polyubiquitylates trichoplein, a protein involved in ciliogenesis down-regulation. It is a positive regulator of ciliogenesis, playing a crucial role in the initial steps of axoneme extension. A missense mutation in KCTD17 causes autosomal dominant myoclonus-dystonia (M-D). The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. The KCTD17 BTB domains form pentamers. — an NCBI CDD conserved domain (cd18391); members share this curated model.
