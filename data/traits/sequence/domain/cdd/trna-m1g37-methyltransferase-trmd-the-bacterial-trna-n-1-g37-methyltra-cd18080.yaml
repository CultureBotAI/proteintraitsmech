identifier: CDD:cd18080
label: "tRNA-M1G37-methyltransferase TrmD. The bacterial tRNA-(N(1)G37) methyltransferase (TrmD) catalyzes the transfer of a methyl group from S-adenosyl-L-methionine (AdoMet) to the N1 position of G37 in the anticodon loop of a subset of tRNA that contains a G at position 36.  The presence of the modification prevents Watson-Crick base-pairing of this guanosine with cytosine in mRNA and translational frame-shifting. This family of proteins contains members of the SPOUT methyltransferases. The SPOUT methyltransferase superfamily is a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot."
definition: >-
  tRNA-M1G37-methyltransferase TrmD. The bacterial tRNA-(N(1)G37) methyltransferase (TrmD) catalyzes the transfer of a methyl group from S-adenosyl-L-methionine (AdoMet) to the N1 position of G37 in the anticodon loop of a subset of tRNA that contains a G at position 36. The presence of the modification prevents Watson-Crick base-pairing of this guanosine with cytosine in mRNA and translational frame-shifting. This family of proteins contains members of the SPOUT methyltransferases. The SPOUT methyltransferase superfamily is a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot. — an NCBI CDD conserved domain (cd18080); members share this curated model.
