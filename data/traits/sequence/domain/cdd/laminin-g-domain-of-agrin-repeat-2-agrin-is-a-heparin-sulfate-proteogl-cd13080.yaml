identifier: CDD:cd13080
label: "Laminin G domain of agrin, repeat 2;. Agrin is a heparin sulfate proteoglycan (HPG), important for the acetylcholine receptor (AChR) aggregation at the neuromuscular junction (NMJ). Agrin's protein core contains nine KAZAL type protease inhibitor, three LamG and four epidermal growth factor (EGF) domains. Agrin exists in several isoforms, being generated by two N-terminal alternative start sites and two or three C-terminal alternative splice sites. N- and C-terminus also contain multiple N- and O-glycolylation sites. The C-terminus is important for its biological function, like inducing phosphorylation of the its receptor tyrosine kinase, muscle specific tyrosine kinase or MuSK. In general, proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold."
definition: >-
  Laminin G domain of agrin, repeat 2;. Agrin is a heparin sulfate proteoglycan (HPG), important for the acetylcholine receptor (AChR) aggregation at the neuromuscular junction (NMJ). Agrin's protein core contains nine KAZAL type protease inhibitor, three LamG and four epidermal growth factor (EGF) domains. Agrin exists in several isoforms, being generated by two N-terminal alternative start sites and two or three C-terminal alternative splice sites. N- and C-terminus also contain multiple N- and O-glycolylation sites. The C-terminus is important for its biological function, like inducing phosphorylation of the its receptor tyrosine kinase, muscle specific tyrosine kinase or MuSK. In general, proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold. — an NCBI CDD conserved domain (cd13080); members share this curated model.
