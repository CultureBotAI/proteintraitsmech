identifier: CDD:cd15504
label: "PHD finger found in Arabidopsis thaliana pathogenesis-related homeodomain protein (PRHA) and similar proteins. PRHA is a homeodomain protein encoded by a single-copy Arabidopsis thaliana homeobox gene, prha. It shows the capacity to bind to TAATTG core sequence elements but requires additional adjacent bases for high-affinity binding. PRHA contains a plant homeodomain (PHD) finger, a homeodomain, peptide repeats and a putative leucine zipper dimerization domain."
definition: >-
  PHD finger found in Arabidopsis thaliana pathogenesis-related homeodomain protein (PRHA) and similar proteins. PRHA is a homeodomain protein encoded by a single-copy Arabidopsis thaliana homeobox gene, prha. It shows the capacity to bind to TAATTG core sequence elements but requires additional adjacent bases for high-affinity binding. PRHA contains a plant homeodomain (PHD) finger, a homeodomain, peptide repeats and a putative leucine zipper dimerization domain. — an NCBI CDD conserved domain (cd15504); members share this curated model.
