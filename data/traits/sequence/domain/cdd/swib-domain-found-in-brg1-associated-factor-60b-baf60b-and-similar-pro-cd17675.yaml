identifier: CDD:cd17675
label: SWIB_BAF60B
definition: >-
  SWIB domain found in BRG1-associated factor 60B (BAF60B) and similar proteins. BAF60B, also termed SWI/SNF-related matrix-associated actin-dependent regulator of chromatin subfamily D member 2 (SMARCD2), or 60 kDa BRG-1/Brm-associated factor subunit B, is a component of the BAF complex. It is involved in transcriptional activation and repression of select genes by chromatin remodeling. It plays a role in the ATM-p53 pathway in sensing chromatin opening by facilitating ATM recruitment to the SWI/SNF complex, as well as ATM activation. It also regulates transcriptional networks controlling differentiation of neutrophil granulocytes. Thus, it acts as a key factor controlling myelopoiesis and is a potential tumor suppressor in leukemia
