identifier: CDD:cd04131
label: "Rho family GTPase subfamily Rnd includes Rnd1/Rho6, Rnd2/Rho7, and Rnd3/RhoE/Rho8. The Rnd subfamily contains Rnd1/Rho6, Rnd2/Rho7, and Rnd3/RhoE/Rho8. These novel Rho family proteins have substantial structural differences compared to other Rho members, including N- and C-terminal extensions relative to other Rhos. Rnd3/RhoE is farnesylated at the C-terminal prenylation site, unlike most other Rho proteins that are geranylgeranylated. In addition, Rnd members are unable to hydrolyze GTP and are resistant to GAP activity. They are believed to exist only in the GTP-bound conformation, and are antagonists of RhoA activity. Most Rho proteins contain a lipid modification site at the C-terminus, with a typical sequence motif CaaX, where a = an aliphatic amino acid and X = any amino acid. Lipid binding is essential for membrane attachment, a key feature of most Rho proteins. Due to the presence of truncated sequences in this CD, the lipid modification site is not available for annotation."
definition: >-
  Rho family GTPase subfamily Rnd includes Rnd1/Rho6, Rnd2/Rho7, and Rnd3/RhoE/Rho8. The Rnd subfamily contains Rnd1/Rho6, Rnd2/Rho7, and Rnd3/RhoE/Rho8. These novel Rho family proteins have substantial structural differences compared to other Rho members, including N- and C-terminal extensions relative to other Rhos. Rnd3/RhoE is farnesylated at the C-terminal prenylation site, unlike most other Rho proteins that are geranylgeranylated. In addition, Rnd members are unable to hydrolyze GTP and are resistant to GAP activity. They are believed to exist only in the GTP-bound conformation, and are antagonists of RhoA activity. Most Rho proteins contain a lipid modification site at the C-terminus, with a typical sequence motif CaaX, where a = an aliphatic amino acid and X = any amino acid. Lipid binding is essential for membrane attachment, a key feature of most Rho proteins. Due to the presence of truncated sequences in this CD, the lipid modification site is not available for annotation. — an NCBI CDD conserved domain (cd04131); members share this curated model.
