identifier: CDD:cd23745
label: "RNA-editing substrate-binding complex subunit 17 (RESC17) and RESC18 and related proteins; uncharacterized subgroup. RESC17 (PAMC3) AND RESC18 (PAMC4) are components of the RNA-editing substrate-binding complex (RESC), consisting of about 20-components, that is involved in kinetoplast RNA processing. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode guide RNAs (gRNAs) involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. 12 of the 18 maxicircle genes are present as cryptogenes whose transcripts require U-insertion/deletion editing, mediated by gRNAs, to restore a protein-coding capacity. RESC interacts with two other complexes, the RNA-editing helicase 2 complex (REH2C) and RNA-editing catalytic complex (RECC) to form an assembly (editosome/holoenzyme) that carries out U-insertion/deletion mRNA editing. RESC17 and RESC18 show some sequence similarity and are both predicted (AlphaFold) to contain four domains; their corresponding C-terminal domains 3 and 4 are structurally similar and superimposable. Domain 3 adopts a helical fold and shows similarity to helix-turn-helix DNA-binding motifs, while domain 4 adopts a 5-stranded beta sheet structure surrounded by helices. Domain 4, the largest domain and predicted with the highest confidence of the four domains, shows structural similarity to many proteins belonging to different domain superfamilies including class I SAM-dependent methyltransferases and electron transfer flavoprotein (ETF) alpha belonging to the adenine nucleotide alpha hydrolase superfamily. Both RESC17 and RESC18 contain two N-terminal domains that adopt partial winged helix or helix-turn-helix folds, but are not directly superimposable to each other. These domains have structural similarities to various RNA- or DNA-binding domains."
definition: >-
  RNA-editing substrate-binding complex subunit 17 (RESC17) and RESC18 and related proteins; uncharacterized subgroup. RESC17 (PAMC3) AND RESC18 (PAMC4) are components of the RNA-editing substrate-binding complex (RESC), consisting of about 20-components, that is involved in kinetoplast RNA processing. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode guide RNAs (gRNAs) involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. 12 of the 18 maxicircle genes are present as cryptogenes whose transcripts require U-insertion/deletion editing, mediated by gRNAs, to restore a protein-coding capacity. RESC interacts with two other complexes, the RNA-editing helicase 2 complex (REH2C) and RNA-editing catalytic complex (RECC) to form an assembly (editosome/holoenzyme) that carries out U-insertion/deletion mRNA editing. RESC17 and RESC18 show some sequence similarity and are both predicted (AlphaFold) to contain four domains; their corresponding C-terminal domains 3 and 4 are structurally similar and superimposable. Domain 3 adopts a helical fold and shows similarity to helix-turn-helix DNA-binding motifs, while domain 4 adopts a 5-stranded beta sheet structure surrounded by helices. Domain 4, the largest domain and predicted with the highest confidence of the four domains, shows structural similarity to many proteins belonging to different domain superfamilies including class I SAM-dependent methyltransferases and electron transfer flavoprotein (ETF) alpha belonging to the adenine nucleotide alpha hydrolase superfamily. Both RESC17 and RESC18 contain two N-terminal domains that adopt partial winged helix or helix-turn-helix folds, but are not directly superimposable to each other. These domains have structural similarities to various RNA- or DNA-binding domains. — an NCBI CDD conserved domain (cd23745); members share this curated model.
