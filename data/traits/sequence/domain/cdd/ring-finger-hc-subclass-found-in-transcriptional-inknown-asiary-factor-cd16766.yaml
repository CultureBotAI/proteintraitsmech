identifier: CDD:cd16766
label: "RING finger, HC subclass, found in transcriptional inknown asiary factor 1 gamma (TIF1gamma). TIF1gamma, also known as tripartite motif-containing 33 (TRIM33), ectodermin, RFG7, or PTC7, belongs to the C-VI subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a plant homeodomain (PHD), and a bromodomain (Bromo) positioned C-terminal to the RBCC domain. It is an E3-ubiquitin ligase that functions as a regulator of transforming growth factor beta (TGFbeta) signaling, inhibiting the Smad4-mediated TGFbeta response by interaction with Smad2/3 or ubiquitylation of Smad4. Moreover, TIF1gamma is an important regulator of transcription during hematopoiesis, as well as a key actor of tumorigenesis. Like other TIF1 proteins, TIF1gamma also contains an intrinsic transcriptional silencing function. It can control erythroid cell fate by regulating transcription elongation. It can bind to the anaphase-promoting complex/cyclosome (APC/C) and promotes mitosis."
