identifier: CDD:cd19278
label: TrmA
definition: >-
  tRNA/tmRNA (uracil-C(5))-methyltransferase. tRNA/tmRNA (uracil-C(5))-methyltransferase TrmA is a dual-specificity methyltransferase that catalyzes the formation of 5-methyluridine at position 54 (m5U54) in all tRNAs and at position 341 (m5U341) in tmRNA (transfer-mRNA)
