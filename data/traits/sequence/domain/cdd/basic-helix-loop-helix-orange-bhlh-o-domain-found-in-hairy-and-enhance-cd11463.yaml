identifier: CDD:cd11463
label: "basic helix-loop-helix-orange (bHLH-O) domain found in hairy and enhancer of split 2 (HES-2) and similar proteins. HES-2, also termed Class B basic helix-loop-helix protein 40 (bHLHb40), is a bHLH-O transcriptional repressor of genes that require a bHLH protein for their transcription. It acts as a negative regulator through interaction with both E-box and N-box sequences. HES-2 is one mammalian counterpart of the Hairy and Enhancer of split proteins that play a critical role in many physiological processes including cellular differentiation, cell cycle arrest, apoptosis and self-renewal ability."
definition: >-
  basic helix-loop-helix-orange (bHLH-O) domain found in hairy and enhancer of split 2 (HES-2) and similar proteins. HES-2, also termed Class B basic helix-loop-helix protein 40 (bHLHb40), is a bHLH-O transcriptional repressor of genes that require a bHLH protein for their transcription. It acts as a negative regulator through interaction with both E-box and N-box sequences. HES-2 is one mammalian counterpart of the Hairy and Enhancer of split proteins that play a critical role in many physiological processes including cellular differentiation, cell cycle arrest, apoptosis and self-renewal ability. — an NCBI CDD conserved domain (cd11463); members share this curated model.
