identifier: CDD:cd10844
label: "second double-stranded RNA binding motif of the RISC-loading complex subunit TARBP2 and similar proteins. TARBP2 (also known as TAR RNA-binding protein 2, or trans-activation-responsive RNA-binding protein (TRBP)) participates in the formation of the RNA-induced silencing complex (RISC). It is part of the RISC-loading complex (RLC), together with dicer1 and eif2c2/ago2, and is required to process precursor miRNAs. TARBP2 contains three double-stranded RNA binding motifs (DSRMs). This model describes the second motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  second double-stranded RNA binding motif of the RISC-loading complex subunit TARBP2 and similar proteins. TARBP2 (also known as TAR RNA-binding protein 2, or trans-activation-responsive RNA-binding protein (TRBP)) participates in the formation of the RNA-induced silencing complex (RISC). It is part of the RISC-loading complex (RLC), together with dicer1 and eif2c2/ago2, and is required to process precursor miRNAs. TARBP2 contains three double-stranded RNA binding motifs (DSRMs). This model describes the second motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd10844); members share this curated model.
