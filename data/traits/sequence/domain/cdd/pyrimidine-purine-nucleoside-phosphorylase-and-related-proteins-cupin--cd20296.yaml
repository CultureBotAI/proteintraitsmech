identifier: CDD:cd20296
label: "pyrimidine/purine nucleoside phosphorylase and related proteins, cupin domain. This family includes cupin domain proteins that are homologous to pyrimidine/purine nucleoside phosphorylase PpnP. Purine and pyrimidine nucleoside phosphorylases are key enzymes of the nucleoside salvage pathway; they catalyze the reversible phosphorolytic cleavage of the glycosidic bond of purine and pyrimidine nucleosides. Nucleoside phosphorylases are of medical interest since phosphorylases can be used in activating prodrugs; high-molecular mass purine nucleoside phosphorylases may be used in gene therapy of some solid tumors and their inhibitors could be selective immunosuppressive, anticancer, and antiparasitic agents. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  pyrimidine/purine nucleoside phosphorylase and related proteins, cupin domain. This family includes cupin domain proteins that are homologous to pyrimidine/purine nucleoside phosphorylase PpnP. Purine and pyrimidine nucleoside phosphorylases are key enzymes of the nucleoside salvage pathway; they catalyze the reversible phosphorolytic cleavage of the glycosidic bond of purine and pyrimidine nucleosides. Nucleoside phosphorylases are of medical interest since phosphorylases can be used in activating prodrugs; high-molecular mass purine nucleoside phosphorylases may be used in gene therapy of some solid tumors and their inhibitors could be selective immunosuppressive, anticancer, and antiparasitic agents. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd20296); members share this curated model.
