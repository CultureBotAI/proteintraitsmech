identifier: CDD:cd21996
label: "high mobility group (HMG)-box found in the transcription factor 7 (TCF-7)-like family. The TCF7-like family includes TCF-7, TCF7-like 1 (TF7L1), lymphoid enhancer-binding factor 1 (LEF-1), and similar proteins. TCF-7, also called T-cell-specific transcription factor 1, or T-cell factor 1 (TCF-1), is a T lymphocyte-specific transcriptional activator involved in T-cell lymphocyte differentiation. It is necessary for the survival of CD4(+) CD8(+) immature thymocytes. It binds to the T-lymphocyte-specific enhancer element (5'-WWCAAAG-3') found in the promoter of the CD3E gene. TF7L1, also called HMG box transcription factor 3 (TCF-3), participates in the Wnt signaling pathway. It binds to DNA and acts as a repressor in the absence of CTNNB1, and as an activator in its presence. TF7L2, also called HMG box transcription factor 4, or T-cell-specific transcription factor 4, or T-cell factor 4, or TCF-4, participates in the Wnt signaling pathway and modulates MYC expression by binding to its promoter in a sequence-specific manner. It acts as a repressor in the absence of CTNNB1, and it activates transcription from promoters with several copies of the TCF motif 5'-CCTTTGATC-3' in the presence of CTNNB1. LEF-1, also called T cell-specific transcription factor 1-alpha (TCF1-alpha), is a transcription factor that binds DNA in a sequence-specific manner. It may participate in the Wnt signaling pathway. All family members contain one HMG-box domain."
definition: >-
  high mobility group (HMG)-box found in the transcription factor 7 (TCF-7)-like family. The TCF7-like family includes TCF-7, TCF7-like 1 (TF7L1), lymphoid enhancer-binding factor 1 (LEF-1), and similar proteins. TCF-7, also called T-cell-specific transcription factor 1, or T-cell factor 1 (TCF-1), is a T lymphocyte-specific transcriptional activator involved in T-cell lymphocyte differentiation. It is necessary for the survival of CD4(+) CD8(+) immature thymocytes. It binds to the T-lymphocyte-specific enhancer element (5'-WWCAAAG-3') found in the promoter of the CD3E gene. TF7L1, also called HMG box transcription factor 3 (TCF-3), participates in the Wnt signaling pathway. It binds to DNA and acts as a repressor in the absence of CTNNB1, and as an activator in its presence. TF7L2, also called HMG box transcription factor 4, or T-cell-specific transcription factor 4, or T-cell factor 4, or TCF-4, participates in the Wnt signaling pathway and modulates MYC expression by binding to its promoter in a sequence-specific manner. It acts as a repressor in the absence of CTNNB1, and it activates transcription from promoters with several copies of the TCF motif 5'-CCTTTGATC-3' in the presence of CTNNB1. LEF-1, also called T cell-specific transcription factor 1-alpha (TCF1-alpha), is a transcription factor that binds DNA in a sequence-specific manner. It may participate in the Wnt signaling pathway. All family members contain one HMG-box domain. — an NCBI CDD conserved domain (cd21996); members share this curated model.
