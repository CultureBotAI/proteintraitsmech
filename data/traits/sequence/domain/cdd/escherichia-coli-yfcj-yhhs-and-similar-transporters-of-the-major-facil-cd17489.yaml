identifier: CDD:cd17489
label: "Escherichia coli YfcJ, YhhS, and similar transporters of the Major Facilitator Superfamily. This subfamily is composed of Escherichia coli membrane proteins, YfcJ and YhhS, Bacillus subtilis uncharacterized MFS-type transporter YwoG, and similar proteins. YfcJ and YhhS are putative arabinose efflux transporters. YhhS has been implicated glyphosate resistance. YfcJ-like arabinose efflux transporters belong to the bacterial MdtG-like and eukaryotic solute carrier 18 (SLC18) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
