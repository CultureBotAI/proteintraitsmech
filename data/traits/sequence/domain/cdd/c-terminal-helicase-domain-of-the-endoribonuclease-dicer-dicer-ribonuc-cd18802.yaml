identifier: CDD:cd18802
label: "C-terminal helicase domain of the endoribonuclease Dicer. Dicer ribonucleases cleave double-stranded RNA (dsRNA) precursors to generate microRNAs (miRNAs) and small interfering RNAs (siRNAs). In concert with Argonautes, these small RNAs bind complementary mRNAs to down-regulate their expression. miRNAs are processed by Dicer from small hairpins, while siRNAs are typically processed from longer dsRNA, from endogenous sources, or exogenous sources such as viral replication intermediates. Some organisms, such as Homo sapiens and Caenorhabditis elegans, encode one Dicer that generates miRNAs and siRNAs, but other organisms have multiple dicers with specialized functions. Dicer exists throughout eukaryotes, and a subset has an N-terminal helicase domain of the RIG-I-like receptor (RLR) subgroup. RLRs often function in innate immunity and Dicer helicase domains sometimes show differences in activity that correlate with roles in immunity. Dicer helicase domains are DEAD-like helicases belonging to superfamily (SF)2, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. Similar to SF1 helicases, SF2 helicases do not form toroidal structures like SF3-6 helicases. Their helicase core consists of two similar protein domains that resemble the fold of the recombination protein RecA. This model describes the C-terminal domain, also called HelicC."
definition: >-
  C-terminal helicase domain of the endoribonuclease Dicer. Dicer ribonucleases cleave double-stranded RNA (dsRNA) precursors to generate microRNAs (miRNAs) and small interfering RNAs (siRNAs). In concert with Argonautes, these small RNAs bind complementary mRNAs to down-regulate their expression. miRNAs are processed by Dicer from small hairpins, while siRNAs are typically processed from longer dsRNA, from endogenous sources, or exogenous sources such as viral replication intermediates. Some organisms, such as Homo sapiens and Caenorhabditis elegans, encode one Dicer that generates miRNAs and siRNAs, but other organisms have multiple dicers with specialized functions. Dicer exists throughout eukaryotes, and a subset has an N-terminal helicase domain of the RIG-I-like receptor (RLR) subgroup. RLRs often function in innate immunity and Dicer helicase domains sometimes show differences in activity that correlate with roles in immunity. Dicer helicase domains are DEAD-like helicases belonging to superfamily (SF)2, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. Similar to SF1 helicases, SF2 helicases do not form toroidal structures like SF3-6 helicases. Their helicase core consists of two similar protein domains that resemble the fold of the recombination protein RecA. This model describes the C-terminal domain, also called HelicC. — an NCBI CDD conserved domain (cd18802); members share this curated model.
