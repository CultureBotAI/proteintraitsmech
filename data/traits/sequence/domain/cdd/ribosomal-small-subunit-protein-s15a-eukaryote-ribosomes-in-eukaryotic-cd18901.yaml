identifier: CDD:cd18901
label: "Ribosomal small subunit protein S15A, eukaryote. Ribosomes in eukaryotic organisms are cytosolic particles composed of different ribosomal RNAs (28S, 18S, 5.8S, and 5S), and approximately 80 ribosomal proteins (r-proteins) that are associated with the messenger and transfer RNAs, which together catalyze the synthesis of Proteins. This domain represents the small subunit uS8 (S15A or S22) of the eukaryotic ribosome. Euckaryotic S15A ribosomal protein plays a pivotal role in the assembly of the central domain and binds rRNA."
definition: >-
  Ribosomal small subunit protein S15A, eukaryote. Ribosomes in eukaryotic organisms are cytosolic particles composed of different ribosomal RNAs (28S, 18S, 5.8S, and 5S), and approximately 80 ribosomal proteins (r-proteins) that are associated with the messenger and transfer RNAs, which together catalyze the synthesis of Proteins. This domain represents the small subunit uS8 (S15A or S22) of the eukaryotic ribosome. Euckaryotic S15A ribosomal protein plays a pivotal role in the assembly of the central domain and binds rRNA. — an NCBI CDD conserved domain (cd18901); members share this curated model.
