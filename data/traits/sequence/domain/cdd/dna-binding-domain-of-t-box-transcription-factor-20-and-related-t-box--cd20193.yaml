identifier: CDD:cd20193
label: "DNA-binding domain of T-box transcription factor 20 and related T-box proteins. TBX20 is a T-box transcriptional factor which functions in embryonic development and its deficiency is associated with congenital heart disease. It acts both as a transcriptional activator and a repressor required for cardiac development, and has key roles in maintaining the functional and structural phenotypes in the adult heart. The TBX20-cardiac transcription factor CASZ1 protein complex is protective against dilated cardiomyopathy and is essential for maintaining cardiac homeostasis. TBX20 has also been shown to regulate angiogenesis through the PROK2-PROKR1 (prokineticin receptor 1) pathway and is involved in both, pathological and developmental, angiogenesis. This subfamily belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is Brachyury (also known as TBXT, or T). T-box family members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns."
definition: >-
  DNA-binding domain of T-box transcription factor 20 and related T-box proteins. TBX20 is a T-box transcriptional factor which functions in embryonic development and its deficiency is associated with congenital heart disease. It acts both as a transcriptional activator and a repressor required for cardiac development, and has key roles in maintaining the functional and structural phenotypes in the adult heart. The TBX20-cardiac transcription factor CASZ1 protein complex is protective against dilated cardiomyopathy and is essential for maintaining cardiac homeostasis. TBX20 has also been shown to regulate angiogenesis through the PROK2-PROKR1 (prokineticin receptor 1) pathway and is involved in both, pathological and developmental, angiogenesis. This subfamily belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is Brachyury (also known as TBXT, or T). T-box family members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns. — an NCBI CDD conserved domain (cd20193); members share this curated model.
