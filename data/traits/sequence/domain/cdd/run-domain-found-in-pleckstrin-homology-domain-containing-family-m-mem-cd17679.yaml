identifier: CDD:cd17679
label: "RUN domain found in pleckstrin homology domain-containing family M member 1 (PLEKHM1) and similar proteins. PLEKHM1, also called PH domain-containing family M member 1, or 162 kDa adapter protein (AP162), may act as a multivalent adapter protein that regulates Rab7-dependent and HOPS complex-dependent fusion events in the endolysosomal system and couples autophagic and the endocytic trafficking pathways. This model represents the RUN domain of PLEKHM1."
definition: >-
  RUN domain found in pleckstrin homology domain-containing family M member 1 (PLEKHM1) and similar proteins. PLEKHM1, also called PH domain-containing family M member 1, or 162 kDa adapter protein (AP162), may act as a multivalent adapter protein that regulates Rab7-dependent and HOPS complex-dependent fusion events in the endolysosomal system and couples autophagic and the endocytic trafficking pathways. This model represents the RUN domain of PLEKHM1. — an NCBI CDD conserved domain (cd17679); members share this curated model.
