identifier: CDD:cd02581
label: "Ribosomal small subunit protein S13, bacteria and eukaryotic mitochondria and chloroplast. The small subunit S13 of the bacterial ribosome including the S13 from bacteria as well as from eukaryotic mitochondria and chloroplast.  Bacterial 70S ribosome is formed by the small 30S and large 50S subunits. The 30S subunit is composed of 16S rRNA and about 21 proteins. Ribosome is a highly organized dynamic complex. Prokaryotic uS13 plays a key role in ribosome function including subunit joining during initiation, and maintaining the pretranslocation state during translation.  In the prokaryotes, uS13 partners with Helix 38 of the large ribosomal subunit and uL5 to form the bridges between small and large ribosomal subunits. Mitochondrial and chloroplastic ribosomes synthesize proteins that are involved in oxidative phosphorylation (ATP generation) and photosynthesis. uS13 is one of the fourteen mitochondrial ribosomal proteins that is known to have significant sequence homology with their bacterial counterpart."
definition: >-
  Ribosomal small subunit protein S13, bacteria and eukaryotic mitochondria and chloroplast. The small subunit S13 of the bacterial ribosome including the S13 from bacteria as well as from eukaryotic mitochondria and chloroplast. Bacterial 70S ribosome is formed by the small 30S and large 50S subunits. The 30S subunit is composed of 16S rRNA and about 21 proteins. Ribosome is a highly organized dynamic complex. Prokaryotic uS13 plays a key role in ribosome function including subunit joining during initiation, and maintaining the pretranslocation state during translation. In the prokaryotes, uS13 partners with Helix 38 of the large ribosomal subunit and uL5 to form the bridges between small and large ribosomal subunits. Mitochondrial and chloroplastic ribosomes synthesize proteins that are involved in oxidative phosphorylation (ATP generation) and photosynthesis. uS13 is one of the fourteen mitochondrial ribosomal proteins that is known to have significant sequence homology with their bacterial counterpart. — an NCBI CDD conserved domain (cd02581); members share this curated model.
