identifier: CDD:cd09596
label: "Peptidase M36 family, also known as fungalysin family. The M36 peptidase family, also known as fungalysin (elastinolytic metalloproteinase) family, includes endopeptidases from pathogenic fungi. Fungalysin can hydrolyze extracellular matrix proteins such as elastin and keratin, with a preference for cleavage on the amino side of hydrophobic residues with bulky side-chains. This family is similar to the M4 (thermolysin) family due to the presence of the HEXXH motif in the active site residues, as well as its fold prediction. Some of these enzymes also contain a protease-associated (PA) domain insert. The eukaryotic M36 and bacterial M4 families of metalloproteases also share a conserved domain in their propeptides called FTP (fungalysin/thermolysin propeptide). Aspergillus fumigatus causes the pulmonary disease aspergillosis by invading the lungs of immuno-compromised animals; it secretes fungalysin that possibly breaks down proteinaceous structural barriers. A solid lesion known as an aspergilloma can grow in a lung cavity, particularly following recovery from tuberculosis. Fungalysins are also found as multiple copies in the human and animal pathogenic fungi such as Microsporum canis, Trichophyton rubrum and T. mentagrophytes, which cause cutaneous infections."
definition: >-
  Peptidase M36 family, also known as fungalysin family. The M36 peptidase family, also known as fungalysin (elastinolytic metalloproteinase) family, includes endopeptidases from pathogenic fungi. Fungalysin can hydrolyze extracellular matrix proteins such as elastin and keratin, with a preference for cleavage on the amino side of hydrophobic residues with bulky side-chains. This family is similar to the M4 (thermolysin) family due to the presence of the HEXXH motif in the active site residues, as well as its fold prediction. Some of these enzymes also contain a protease-associated (PA) domain insert. The eukaryotic M36 and bacterial M4 families of metalloproteases also share a conserved domain in their propeptides called FTP (fungalysin/thermolysin propeptide). Aspergillus fumigatus causes the pulmonary disease aspergillosis by invading the lungs of immuno-compromised animals; it secretes fungalysin that possibly breaks down proteinaceous structural barriers. A solid lesion known as an aspergilloma can grow in a lung cavity, particularly following recovery from tuberculosis. Fungalysins are also found as multiple copies in the human and animal pathogenic fungi such as Microsporum canis, Trichophyton rubrum and T. mentagrophytes, which cause cutaneous infections. — an NCBI CDD conserved domain (cd09596); members share this curated model.
