identifier: CDD:cd13931
label: "Aromatic Prenyltransferases (PTases) of the CloQ/NphB family. Members of the CloQ/NphB family of ABBA prenyltransferases catalyze the prenylation of phenols, naphthalenes, and phenazines. This family of fungal and bacterial proteins includes dihydrophenazine-1-carboxylate dimethylallyltransferase PpzP, the aromatic prenyltransferase from the clorobiocin biosynthetic pathway CloQ, and related proteins. CloQ catalyzes the attachment of a dimethylallyl moiety to 4-hydroxyphenylpyruvate, part of the biosynthetic pathway of the Streptomyces roseochromogenes antibiotic clorobiocin. PpzP, as well as EpzP, are important for the biosynthesis of endophenazines; they catalyze the prenylation of 5,10-dihydrophenazine-1-carboxylic acid (dhPCA). Streptomyces NphB catalyzes the addition of a 10-carbon geranyl group to  small organic aromatic substrates and is involved in the biosynthesis of the antioxidant naphterpin. Prenyltransferases (PTs) catalyze the regioselective transfer of prenyl moieties onto aromatic substrates in biosynthetic pathways of microbial secondary metabolites."
definition: >-
  Aromatic Prenyltransferases (PTases) of the CloQ/NphB family. Members of the CloQ/NphB family of ABBA prenyltransferases catalyze the prenylation of phenols, naphthalenes, and phenazines. This family of fungal and bacterial proteins includes dihydrophenazine-1-carboxylate dimethylallyltransferase PpzP, the aromatic prenyltransferase from the clorobiocin biosynthetic pathway CloQ, and related proteins. CloQ catalyzes the attachment of a dimethylallyl moiety to 4-hydroxyphenylpyruvate, part of the biosynthetic pathway of the Streptomyces roseochromogenes antibiotic clorobiocin. PpzP, as well as EpzP, are important for the biosynthesis of endophenazines; they catalyze the prenylation of 5,10-dihydrophenazine-1-carboxylic acid (dhPCA). Streptomyces NphB catalyzes the addition of a 10-carbon geranyl group to small organic aromatic substrates and is involved in the biosynthesis of the antioxidant naphterpin. Prenyltransferases (PTs) catalyze the regioselective transfer of prenyl moieties onto aromatic substrates in biosynthetic pathways of microbial secondary metabolites. — an NCBI CDD conserved domain (cd13931); members share this curated model.
