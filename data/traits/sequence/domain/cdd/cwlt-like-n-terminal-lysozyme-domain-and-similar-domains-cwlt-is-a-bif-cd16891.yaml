identifier: CDD:cd16891
label: "CwlT-like N-terminal lysozyme domain and similar domains. CwlT is a bifunctional cell wall hydrolase containing an N-terminal lysozyme domain and a C-terminal NlpC/P60 endopeptidase domain (gamma-d-D-glutamyl-L-diamino acid endopeptidase), and has been implicated in the spread of transposons. Proteins similar to this family include the soluble and insoluble membrane-bound LTs in bacteria, the LTs in bacteriophage lambda, as well as the eukaryotic \"goose-type\" lysozymes (goose egg-white lysozyme; GEWL)."
definition: >-
  CwlT-like N-terminal lysozyme domain and similar domains. CwlT is a bifunctional cell wall hydrolase containing an N-terminal lysozyme domain and a C-terminal NlpC/P60 endopeptidase domain (gamma-d-D-glutamyl-L-diamino acid endopeptidase), and has been implicated in the spread of transposons. Proteins similar to this family include the soluble and insoluble membrane-bound LTs in bacteria, the LTs in bacteriophage lambda, as well as the eukaryotic "goose-type" lysozymes (goose egg-white lysozyme; GEWL). — an NCBI CDD conserved domain (cd16891); members share this curated model.
