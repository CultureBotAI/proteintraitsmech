identifier: CDD:cd18589
label: "Six-transmembrane helical domain 1 (6-TMD1) of the ABC transporter associated with antigen processing 1 (TAP1). This group represents the 6-TM subunit of the ABC transporter associated with antigen processing (TAP), which is essential to cellular immunity against viral infection. TAP is involved in the transport of antigens from the cytoplasm to the endoplasmic reticulum(ER) for association with MHC class I molecules, which play a central role in the adaptive immune response to viruses and cancers by presenting antigenic peptides to CD8+ cytotoxic T lymphocytes (CTLs). It also acts as a molecular scaffold for the assembly of the MHC I peptide-loading complex in the ER membrane. Newly synthesized MHC class I molecules associate with TAP via tapasin, which is one component of the peptide-loading complex. TAP is a heterodimer formed by two distinct subunits, TAP1 (ABCB2) and TAP2 (ABCB3), each half-transporter comprises one transmembrane domain (TMD) and one nucleotide domain (NBD). Two 6-helical core TMDs contain the peptide-binding pocket and translocation channel, while the NBDs bind and hydrolyze ATP to power peptide translocation."
definition: >-
  Six-transmembrane helical domain 1 (6-TMD1) of the ABC transporter associated with antigen processing 1 (TAP1). This group represents the 6-TM subunit of the ABC transporter associated with antigen processing (TAP), which is essential to cellular immunity against viral infection. TAP is involved in the transport of antigens from the cytoplasm to the endoplasmic reticulum(ER) for association with MHC class I molecules, which play a central role in the adaptive immune response to viruses and cancers by presenting antigenic peptides to CD8+ cytotoxic T lymphocytes (CTLs). It also acts as a molecular scaffold for the assembly of the MHC I peptide-loading complex in the ER membrane. Newly synthesized MHC class I molecules associate with TAP via tapasin, which is one component of the peptide-loading complex. TAP is a heterodimer formed by two distinct subunits, TAP1 (ABCB2) and TAP2 (ABCB3), each half-transporter comprises one transmembrane domain (TMD) and one nucleotide domain (NBD). Two 6-helical core TMDs contain the peptide-binding pocket and translocation channel, while the NBDs bind and hydrolyze ATP to power peptide translocation. — an NCBI CDD conserved domain (cd18589); members share this curated model.
