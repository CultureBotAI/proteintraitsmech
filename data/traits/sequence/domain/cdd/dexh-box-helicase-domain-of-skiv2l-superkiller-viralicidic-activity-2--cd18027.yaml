identifier: CDD:cd18027
label: "DEXH-box helicase domain of SKIV2L. Superkiller viralicidic activity 2-like (SKIV2L, also called SKI2 or DHX13) plays a role in a number of cellular processes involving alteration of RNA secondary structure such as translation initiation, nuclear and mitochondrial splicing, and ribosome and spliceosome assembly. SKIV2L belongs to the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of SKIV2L. Superkiller viralicidic activity 2-like (SKIV2L, also called SKI2 or DHX13) plays a role in a number of cellular processes involving alteration of RNA secondary structure such as translation initiation, nuclear and mitochondrial splicing, and ribosome and spliceosome assembly. SKIV2L belongs to the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd18027); members share this curated model.
