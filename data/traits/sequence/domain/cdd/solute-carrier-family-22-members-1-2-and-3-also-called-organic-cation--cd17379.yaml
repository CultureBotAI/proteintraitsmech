identifier: CDD:cd17379
label: "Solute carrier family 22 members 1, 2, and 3 (also called Organic cation transporters 1, 2, and 3) of the Major Facilitator Superfamily of transporters. This sufamily includes solute carrier family 22 member 1 (SLC22A1, also called organic cation transporter 1 or OCT1), SLC22A2 (or OCT2), SLC22A3 (or OCT3), and similar proteins. OCT1-3 have similar basic functional properties: they are able to translocate a variety of structurally different organic cations in both directions across the plasma membrane; to translocate organic cations independently from sodium, chloride or proton gradients; and to function as electrogenic uniporters for cations or as electroneutral cation exchangers. They show overlapping but distinct substrate and inhibitor specificities, and different tissue expression pattern. In humans, OCT1 is strongly expressed in the liver, OCT2 is highly expressed in the kidney where it is localized at the basolateral membrane of renal proximal tubules, and OCT3 is most strongly expressed in skeletal muscle. OCTs are broad-specificity transporters that play a critical role in the excretion and distribution of endogeneous organic cations and for the uptake, elimination and distribution of cationic drugs, toxins, and environmental waste products. The SLC22A1-3 subfamily belongs to the Solute carrier 22 (SLC22) family of organic cation/anion/zwitterion transporters of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Solute carrier family 22 members 1, 2, and 3 (also called Organic cation transporters 1, 2, and 3) of the Major Facilitator Superfamily of transporters. This sufamily includes solute carrier family 22 member 1 (SLC22A1, also called organic cation transporter 1 or OCT1), SLC22A2 (or OCT2), SLC22A3 (or OCT3), and similar proteins. OCT1-3 have similar basic functional properties: they are able to translocate a variety of structurally different organic cations in both directions across the plasma membrane; to translocate organic cations independently from sodium, chloride or proton gradients; and to function as electrogenic uniporters for cations or as electroneutral cation exchangers. They show overlapping but distinct substrate and inhibitor specificities, and different tissue expression pattern. In humans, OCT1 is strongly expressed in the liver, OCT2 is highly expressed in the kidney where it is localized at the basolateral membrane of renal proximal tubules, and OCT3 is most strongly expressed in skeletal muscle. OCTs are broad-specificity transporters that play a critical role in the excretion and distribution of endogeneous organic cations and for the uptake, elimination and distribution of cationic drugs, toxins, and environmental waste products. The SLC22A1-3 subfamily belongs to the Solute carrier 22 (SLC22) family of organic cation/anion/zwitterion transporters of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17379); members share this curated model.
