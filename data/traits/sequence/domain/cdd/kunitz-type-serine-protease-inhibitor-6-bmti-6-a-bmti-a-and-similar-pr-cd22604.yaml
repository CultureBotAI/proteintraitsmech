identifier: CDD:cd22604
label: "Kunitz-type serine protease inhibitor 6 (BmTI-6), A (BmTI-A), and similar proteins. This group includes Kunitz-type serine protease inhibitors 6 (BmTI-6) and A (BmTI-A), both of which inhibit bovine trypsin, bovine chymotrypsin, human plasmin, human plasma kallikrein and human neutrophil elastase, but not bovine thrombin, human factor Xa or porcine pancreatic kallikrein. They may play a role in blocking blood coagulation during the larvae fixation on cattle. This subfamily also includes Rhipicephalus microplus protease inhibitor carrapatin. These proteins are similar to Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor) that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  Kunitz-type serine protease inhibitor 6 (BmTI-6), A (BmTI-A), and similar proteins. This group includes Kunitz-type serine protease inhibitors 6 (BmTI-6) and A (BmTI-A), both of which inhibit bovine trypsin, bovine chymotrypsin, human plasmin, human plasma kallikrein and human neutrophil elastase, but not bovine thrombin, human factor Xa or porcine pancreatic kallikrein. They may play a role in blocking blood coagulation during the larvae fixation on cattle. This subfamily also includes Rhipicephalus microplus protease inhibitor carrapatin. These proteins are similar to Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor) that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22604); members share this curated model.
