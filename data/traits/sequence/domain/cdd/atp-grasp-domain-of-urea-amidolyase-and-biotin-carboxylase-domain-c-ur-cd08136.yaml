identifier: CDD:cd08136
label: "ATP-grasp domain of urea amidolyase, and biotin carboxylase domain C. Urea carboxylase (UCA, EC 6.3.4.6), or urea amidolyase, catalyzes the ATP-dependent hydrolysis of urea to ammonia and carbonic acid with allophanate as an intermediate. The overall reaction consists of two independent enzymatic reactions: carboxylation of urea (by urea amidolyase) to form allophanate, and hydrolysis of allophanate (by allophanate hydrolase) to NH3 and CO2. UCA domain resembles the biotin carboxylase (BC) domain from other biotin-dependent carboxylases. In yeast both activities are present on a single polypeptide, whereas, in algae they are present on two separate polypeptides. DUR1,2 protein from Saccharomyces cerevisiae belong to this family."
definition: >-
  ATP-grasp domain of urea amidolyase, and biotin carboxylase domain C. Urea carboxylase (UCA, EC 6.3.4.6), or urea amidolyase, catalyzes the ATP-dependent hydrolysis of urea to ammonia and carbonic acid with allophanate as an intermediate. The overall reaction consists of two independent enzymatic reactions: carboxylation of urea (by urea amidolyase) to form allophanate, and hydrolysis of allophanate (by allophanate hydrolase) to NH3 and CO2. UCA domain resembles the biotin carboxylase (BC) domain from other biotin-dependent carboxylases. In yeast both activities are present on a single polypeptide, whereas, in algae they are present on two separate polypeptides. DUR1,2 protein from Saccharomyces cerevisiae belong to this family. — an NCBI CDD conserved domain (cd08136); members share this curated model.
