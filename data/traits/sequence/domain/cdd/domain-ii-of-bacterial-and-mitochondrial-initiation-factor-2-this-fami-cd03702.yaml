identifier: CDD:cd03702
label: "Domain II of bacterial and mitochondrial Initiation Factor 2. This family represents domain II of bacterial Initiation Factor 2 (IF2) and its eukaryotic mitochondrial homolog mtIF2. IF2, the largest initiation factor, is an essential GTP binding protein. In E. coli, three natural forms of IF2 exist in the cell, IF2alpha, IF2beta1, and IF2beta2.  Bacterial IF-2 is structurally and functionally related to eukaryotic mitochondrial mtIF-2."
definition: >-
  Domain II of bacterial and mitochondrial Initiation Factor 2. This family represents domain II of bacterial Initiation Factor 2 (IF2) and its eukaryotic mitochondrial homolog mtIF2. IF2, the largest initiation factor, is an essential GTP binding protein. In E. coli, three natural forms of IF2 exist in the cell, IF2alpha, IF2beta1, and IF2beta2. Bacterial IF-2 is structurally and functionally related to eukaryotic mitochondrial mtIF-2. — an NCBI CDD conserved domain (cd03702); members share this curated model.
