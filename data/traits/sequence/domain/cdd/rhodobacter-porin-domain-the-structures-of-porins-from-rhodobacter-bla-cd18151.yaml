identifier: CDD:cd18151
label: "Rhodobacter Porin domain. The structures of porins from Rhodobacter blasticus and Rhodobacter capsulatus have revealed that they are 16-stranded beta barrel proteins which contain pore eyelets that regulate which molecules are allowed to pass through.  Like the Escherichia coli porins, they are homotrimers. Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane.  They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances.  Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface. The porin members here are alphaproteobacteria."
definition: >-
  Rhodobacter Porin domain. The structures of porins from Rhodobacter blasticus and Rhodobacter capsulatus have revealed that they are 16-stranded beta barrel proteins which contain pore eyelets that regulate which molecules are allowed to pass through. Like the Escherichia coli porins, they are homotrimers. Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane. They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances. Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface. The porin members here are alphaproteobacteria. — an NCBI CDD conserved domain (cd18151); members share this curated model.
