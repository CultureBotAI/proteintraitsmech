identifier: CDD:cd16583
label: "RING finger, HC subclass, found in tripartite motif-containing protein 40 (TRIM40) and similar proteins. TRIM40, also known as probable E3 NEDD8-protein ligase or RING finger protein 35 (RNF35), is highly expressed in the gastrointestinal tract including the stomach, small intestine, and large intestine. It enhances neddylation of inhibitor of nuclear factor kappaB kinase subunit gamma (IKKgamma), inhibits the activity of nuclear factor-kappaB (NF-kappaB)-mediated transcription, and thus prevents inflammation-associated carcinogenesis in the gastrointestinal tract. TRIM40 belongs to the C-V subclass of the TRIM (tripartite motif) family of proteins that are defined by an N-terminal RBCC (RING, Bbox, and coiled coil) domain, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as an uncharacterized region positioned C-terminal to the RBCC domain."
definition: >-
  RING finger, HC subclass, found in tripartite motif-containing protein 40 (TRIM40) and similar proteins. TRIM40, also known as probable E3 NEDD8-protein ligase or RING finger protein 35 (RNF35), is highly expressed in the gastrointestinal tract including the stomach, small intestine, and large intestine. It enhances neddylation of inhibitor of nuclear factor kappaB kinase subunit gamma (IKKgamma), inhibits the activity of nuclear factor-kappaB (NF-kappaB)-mediated transcription, and thus prevents inflammation-associated carcinogenesis in the gastrointestinal tract. TRIM40 belongs to the C-V subclass of the TRIM (tripartite motif) family of proteins that are defined by an N-terminal RBCC (RING, Bbox, and coiled coil) domain, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as an uncharacterized region positioned C-terminal to the RBCC domain. — an NCBI CDD conserved domain (cd16583); members share this curated model.
