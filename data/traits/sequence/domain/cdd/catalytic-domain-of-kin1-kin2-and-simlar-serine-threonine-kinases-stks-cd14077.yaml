identifier: CDD:cd14077
label: "Catalytic domain of Kin1, Kin2, and simlar Serine/Threonine Kinases. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. This subfamily is composed of yeast Kin1, Kin2, and similar proteins. Fission yeast Kin1 is a membrane-associated kinase that is involved in regulating cell surface cohesiveness during interphase. It also plays a role during mitosis, linking actomyosin ring assembly with septum synthesis and membrane closure to ensure separation of daughter cells. Budding yeast Kin1 and Kin2 act downstream of the Rab-GTPase Sec4 and are associated with the exocytic apparatus; they play roles in the secretory pathway. The Kin1/2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of Kin1, Kin2, and simlar Serine/Threonine Kinases. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. This subfamily is composed of yeast Kin1, Kin2, and similar proteins. Fission yeast Kin1 is a membrane-associated kinase that is involved in regulating cell surface cohesiveness during interphase. It also plays a role during mitosis, linking actomyosin ring assembly with septum synthesis and membrane closure to ensure separation of daughter cells. Budding yeast Kin1 and Kin2 act downstream of the Rab-GTPase Sec4 and are associated with the exocytic apparatus; they play roles in the secretory pathway. The Kin1/2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14077); members share this curated model.
