identifier: CDD:cd16470
label: "RING finger, H2 subclass, found in RING finger protein 25 (RNF25) and similar proteins. RNF25, also known as AO7, is a putative E3 ubiquitin-protein ligase that was initially identified as an interacting protein of the E2 ubiquitin-conjugating enzyme, Ubc5B. It is ubiquitously expressed in various tissues and predominantly localized in the nucleus. RNF25 activates the nuclear factor (NF)-kappaB-dependent gene expression upon stimulation with Interleukin-1 beta (IL-1beta), or tumor necrosis factor (TNF), or overexpression of NF-kappaB-inducing kinase. It interacts with the p65 transactivation domain (TAD) and modulates its transcriptional activity. RNF25 contains an N-terminal RWD domain, a C3H2C3-type RING-H2 finger, and a C-terminal Pro-rich region. Both the RING-H2 finger and the C-terminal regions of RNF25 are necessary for transcriptional activation."
definition: >-
  RING finger, H2 subclass, found in RING finger protein 25 (RNF25) and similar proteins. RNF25, also known as AO7, is a putative E3 ubiquitin-protein ligase that was initially identified as an interacting protein of the E2 ubiquitin-conjugating enzyme, Ubc5B. It is ubiquitously expressed in various tissues and predominantly localized in the nucleus. RNF25 activates the nuclear factor (NF)-kappaB-dependent gene expression upon stimulation with Interleukin-1 beta (IL-1beta), or tumor necrosis factor (TNF), or overexpression of NF-kappaB-inducing kinase. It interacts with the p65 transactivation domain (TAD) and modulates its transcriptional activity. RNF25 contains an N-terminal RWD domain, a C3H2C3-type RING-H2 finger, and a C-terminal Pro-rich region. Both the RING-H2 finger and the C-terminal regions of RNF25 are necessary for transcriptional activation. — an NCBI CDD conserved domain (cd16470); members share this curated model.
