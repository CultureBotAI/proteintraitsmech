identifier: CDD:cd21863
label: "FERM-binding domain (FBD) found in DDB1- and CUL4-associated factor 1 (DCAF1) and similar proteins. DCAF1, also called HIV-1 Vpr-binding protein (VprBP), or serine/threonine-protein kinase VPRBP, or Vpr-interacting protein, acts both as a substrate recognition component of E3 ubiquitin-protein ligase complexes and as an atypical serine/threonine-protein kinase, playing key roles in various processes such as cell cycle, telomerase regulation and histone modification. It is a probable substrate-specific adapter of a DCX (DDB1-CUL4-X-box) E3 ubiquitin-protein ligase complex, named CUL4A-RBX1-DDB1-DCAF1/VPRBP complex, which mediates ubiquitination and proteasome-dependent degradation of proteins such as NF2. It is also involved in the turnover of methylated proteins: recognizes and binds methylated proteins via its chromo domain, leading to ubiquitination of target proteins by the RBX1-DDB1-DCAF1/VPRBP complex. The model corresponds to FERM-binding domain (FBD) located at the extreme C-terminal end of DCAF1."
definition: >-
  FERM-binding domain (FBD) found in DDB1- and CUL4-associated factor 1 (DCAF1) and similar proteins. DCAF1, also called HIV-1 Vpr-binding protein (VprBP), or serine/threonine-protein kinase VPRBP, or Vpr-interacting protein, acts both as a substrate recognition component of E3 ubiquitin-protein ligase complexes and as an atypical serine/threonine-protein kinase, playing key roles in various processes such as cell cycle, telomerase regulation and histone modification. It is a probable substrate-specific adapter of a DCX (DDB1-CUL4-X-box) E3 ubiquitin-protein ligase complex, named CUL4A-RBX1-DDB1-DCAF1/VPRBP complex, which mediates ubiquitination and proteasome-dependent degradation of proteins such as NF2. It is also involved in the turnover of methylated proteins: recognizes and binds methylated proteins via its chromo domain, leading to ubiquitination of target proteins by the RBX1-DDB1-DCAF1/VPRBP complex. The model corresponds to FERM-binding domain (FBD) located at the extreme C-terminal end of DCAF1. — an NCBI CDD conserved domain (cd21863); members share this curated model.
