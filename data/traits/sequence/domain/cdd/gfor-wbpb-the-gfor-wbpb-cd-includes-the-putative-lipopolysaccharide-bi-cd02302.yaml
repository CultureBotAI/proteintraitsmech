identifier: CDD:cd02302
label: "GFOR_WbpB. The GFOR_WbpB CD includes the putative lipopolysaccharide biosynthesis protein WbpB of Helicobacter hepaticus (ATCC 51449) and other related predicted oxidoreductases. These proteins share sequence similarity with a class of oxidoreductases that have been implicated in interconversions between hydroxyl and carbonyl groups, such as glucose-fructose oxidoreductase (GFOR) which oxidizes glucose to gluconolactone and reduces fructose to sorbitol in Zymomonas mobilis. Members of this CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the GFOR superfamily of proteins."
definition: >-
  GFOR_WbpB. The GFOR_WbpB CD includes the putative lipopolysaccharide biosynthesis protein WbpB of Helicobacter hepaticus (ATCC 51449) and other related predicted oxidoreductases. These proteins share sequence similarity with a class of oxidoreductases that have been implicated in interconversions between hydroxyl and carbonyl groups, such as glucose-fructose oxidoreductase (GFOR) which oxidizes glucose to gluconolactone and reduces fructose to sorbitol in Zymomonas mobilis. Members of this CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the GFOR superfamily of proteins. — an NCBI CDD conserved domain (cd02302); members share this curated model.
