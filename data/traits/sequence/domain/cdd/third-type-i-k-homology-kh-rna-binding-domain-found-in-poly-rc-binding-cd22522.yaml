identifier: CDD:cd22522
label: "third type I K homology (KH) RNA-binding domain found in poly(rC)-binding protein 3 (PCBP3) and similar proteins. PCBP3, also called alpha-CP3, or PCBP3-overlapping transcript, or PCBP3-overlapping transcript 1, or heterogeneous nuclear ribonucleoprotein E3, or hnRNP E3, is a single-stranded nucleic acid binding protein that binds preferentially to oligo dC. It can function as a repressor dependent on binding to single-strand and double-stranded poly(C) sequences. PCBP3 contains three K-homology (KH) RNA-binding domains. The model corresponds to the third one."
definition: >-
  third type I K homology (KH) RNA-binding domain found in poly(rC)-binding protein 3 (PCBP3) and similar proteins. PCBP3, also called alpha-CP3, or PCBP3-overlapping transcript, or PCBP3-overlapping transcript 1, or heterogeneous nuclear ribonucleoprotein E3, or hnRNP E3, is a single-stranded nucleic acid binding protein that binds preferentially to oligo dC. It can function as a repressor dependent on binding to single-strand and double-stranded poly(C) sequences. PCBP3 contains three K-homology (KH) RNA-binding domains. The model corresponds to the third one. — an NCBI CDD conserved domain (cd22522); members share this curated model.
