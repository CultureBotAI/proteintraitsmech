identifier: CDD:cd10824
label: "circularly permuted PDZ domains of Escherichia coli Regulator of sigma-E protease (RseP), Bacillus subtilis YlbL protease, and related domains. Permuted PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of ResP (also known as Site-2 protease RseP, and YaeL), Bacillus subtilis YlbL, and related domains, including archaeal and chloroplast PDZ domains. RseP participates in the regulation of an extracytoplasmic stress response through the cleavage of membrane-spanning anti-stress-response transcription factor (anti-sigmaE) protein RseA. YlbL is an S16 protease which participates with another unrelated S41 protease (CtpA) in a dual protease mechanism that promotes DNA damage checkpoint recovery. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. This RseP-YlbL family PDZ domain is a circularly permuted PDZ domain which places both beta-strands A and B at the C-terminus. Another permutation exists in the PDZ superfamily which places beta-strand A at the C-terminus."
definition: >-
  circularly permuted PDZ domains of Escherichia coli Regulator of sigma-E protease (RseP), Bacillus subtilis YlbL protease, and related domains. Permuted PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of ResP (also known as Site-2 protease RseP, and YaeL), Bacillus subtilis YlbL, and related domains, including archaeal and chloroplast PDZ domains. RseP participates in the regulation of an extracytoplasmic stress response through the cleavage of membrane-spanning anti-stress-response transcription factor (anti-sigmaE) protein RseA. YlbL is an S16 protease which participates with another unrelated S41 protease (CtpA) in a dual protease mechanism that promotes DNA damage checkpoint recovery. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. This RseP-YlbL family PDZ domain is a circularly permuted PDZ domain which places both beta-strands A and B at the C-terminus. Another permutation exists in the PDZ superfamily which places beta-strand A at the C-terminus. — an NCBI CDD conserved domain (cd10824); members share this curated model.
