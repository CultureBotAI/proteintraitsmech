identifier: CDD:cd19274
label: "archaeal tRNA (guanine(37)-N1)-methyltransferase. archaeal tRNA (guanine(37)-N1)-methyltransferase Trm5 (EC 2.1.1.228) specifically methylates the N1 position of guanosine-37 in various tRNAs, the first step in the biosynthesis of wybutosine (yW), a modified base adjacent to the anticodon of tRNAs and required for accurate decoding."
definition: >-
  archaeal tRNA (guanine(37)-N1)-methyltransferase. archaeal tRNA (guanine(37)-N1)-methyltransferase Trm5 (EC 2.1.1.228) specifically methylates the N1 position of guanosine-37 in various tRNAs, the first step in the biosynthesis of wybutosine (yW), a modified base adjacent to the anticodon of tRNAs and required for accurate decoding. — an NCBI CDD conserved domain (cd19274); members share this curated model.
