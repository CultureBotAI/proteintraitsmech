identifier: CDD:cd00434
label: "Ribosomal small subunit protein S16, bacteria and eukaryotic mitochondria and chloroplast. The small subunit S16 of the bacterial ribosome including the S16 from bacteria as well as from eukaryotic mitochondria and chloroplast. The ribosomal protein S16 is essential for the viability of Escherichia coli and plays an important role in the assembly of the small ribosomal subunit.  S16 is a DNA-binding protein that binds cruciform DNA with magnesium-dependent DNA endonuclease activity. Mitochondrial and chloroplastic ribosomes synthesize proteins that are involved in oxidative phosphorylation (ATP generation) and photosynthesis. bS16 is one of the fourteen mitochondrial ribosomal proteins that is known to have significant sequence homology with their bacterial counterpart."
definition: >-
  Ribosomal small subunit protein S16, bacteria and eukaryotic mitochondria and chloroplast. The small subunit S16 of the bacterial ribosome including the S16 from bacteria as well as from eukaryotic mitochondria and chloroplast. The ribosomal protein S16 is essential for the viability of Escherichia coli and plays an important role in the assembly of the small ribosomal subunit. S16 is a DNA-binding protein that binds cruciform DNA with magnesium-dependent DNA endonuclease activity. Mitochondrial and chloroplastic ribosomes synthesize proteins that are involved in oxidative phosphorylation (ATP generation) and photosynthesis. bS16 is one of the fourteen mitochondrial ribosomal proteins that is known to have significant sequence homology with their bacterial counterpart. — an NCBI CDD conserved domain (cd00434); members share this curated model.
