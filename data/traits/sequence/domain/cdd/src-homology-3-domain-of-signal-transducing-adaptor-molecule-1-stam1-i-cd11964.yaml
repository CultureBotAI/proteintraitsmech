identifier: CDD:cd11964
label: "Src homology 3 domain of Signal Transducing Adaptor Molecule 1. STAM1 is part of the endosomal sorting complex required for transport (ESCRT-0) and is involved in sorting ubiquitinated cargo proteins from the endosome. It may also be involved in the regulation of IL2 and GM-CSF mediated signaling, and has been implicated in neural cell survival. STAMs were discovered as proteins that are highly phosphorylated following cytokine and growth factor stimulation. They function in cytokine signaling and surface receptor degradation, as well as regulate Golgi morphology. They associate with many proteins including Jak2 and Jak3 tyrosine kinases, Hrs, AMSH, and UBPY. STAM adaptor proteins contain VHS (Vps27, Hrs, STAM homology), ubiquitin interacting (UIM), and SH3 domains. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of Signal Transducing Adaptor Molecule 1. STAM1 is part of the endosomal sorting complex required for transport (ESCRT-0) and is involved in sorting ubiquitinated cargo proteins from the endosome. It may also be involved in the regulation of IL2 and GM-CSF mediated signaling, and has been implicated in neural cell survival. STAMs were discovered as proteins that are highly phosphorylated following cytokine and growth factor stimulation. They function in cytokine signaling and surface receptor degradation, as well as regulate Golgi morphology. They associate with many proteins including Jak2 and Jak3 tyrosine kinases, Hrs, AMSH, and UBPY. STAM adaptor proteins contain VHS (Vps27, Hrs, STAM homology), ubiquitin interacting (UIM), and SH3 domains. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11964); members share this curated model.
