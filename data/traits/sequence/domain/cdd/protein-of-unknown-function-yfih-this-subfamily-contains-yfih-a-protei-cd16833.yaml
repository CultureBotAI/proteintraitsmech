identifier: CDD:cd16833
label: "protein of unknown function YfiH. This subfamily contains YfiH, a protein of unknown function from Shigella flexneri, E. coli, and many similar proteins which collectively are often called DUF152. The structure of YfiH reveals a distant homology to Rho-activating toxins cytotoxic necrotizing factor 1 (CNF1) as well as chemotaxis protein CheD that stimulates methylation of methyl-accepting chemotaxis proteins (MCPs), all having an invariant Cys-His pair forming a catalytic dyad, and is required by the CNF-1 toxins for deamidation activity."
definition: >-
  protein of unknown function YfiH. This subfamily contains YfiH, a protein of unknown function from Shigella flexneri, E. coli, and many similar proteins which collectively are often called DUF152. The structure of YfiH reveals a distant homology to Rho-activating toxins cytotoxic necrotizing factor 1 (CNF1) as well as chemotaxis protein CheD that stimulates methylation of methyl-accepting chemotaxis proteins (MCPs), all having an invariant Cys-His pair forming a catalytic dyad, and is required by the CNF-1 toxins for deamidation activity. — an NCBI CDD conserved domain (cd16833); members share this curated model.
