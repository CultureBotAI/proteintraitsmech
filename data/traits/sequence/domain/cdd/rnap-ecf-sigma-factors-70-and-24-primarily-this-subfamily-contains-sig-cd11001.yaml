identifier: CDD:cd11001
label: RNAP_ECFsig70_ECFsig24
definition: >-
  RNAP ECF sigma factors 70 and 24. Primarily, this subfamily contains Sigma 24 ECF (extra-cytoplasmic function) sigma factors, but there were some Sigma 70 ECF sigma factors. These sigma factors are very important in E.coli, but can be found in a variety of other organisms too, as indicated by this subfamily of the Sigma 70 region 2 family. The are responsibel for binding to the beta components of the core RNAP so that transcription of a DNA template that passes through a transcription channel created by the RNAP holoenzyme can be transcribed into an mRNA transcript. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. A variety of regions on domain 2 are responsible for DNA promoter binding specificty at the -10 promoter recognition site and other functions in transcription initiation with aided by the entire sigma factor
