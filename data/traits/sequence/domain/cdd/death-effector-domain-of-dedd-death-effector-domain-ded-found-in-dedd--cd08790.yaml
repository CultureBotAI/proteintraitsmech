identifier: CDD:cd08790
label: "Death Effector Domain of DEDD. Death Effector Domain (DED) found in DEDD. DEDD has been shown to block mitotic progression by inhibiting Cdk1 and to be involved in regulating the insulin signaling cascade. DEDD can bind to itself, to DEDD2, and to the two tandem DED-containing caspases, caspase-8 and -10. In general, DEDs comprise a subfamily of the Death Domain (DD) superfamily. DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including PYRIN and CARD (Caspase activation and recruitment domain). They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes."
