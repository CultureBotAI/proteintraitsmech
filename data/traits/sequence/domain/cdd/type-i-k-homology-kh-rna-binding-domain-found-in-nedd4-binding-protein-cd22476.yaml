identifier: CDD:cd22476
label: "type I K homology (KH) RNA-binding domain found in NEDD4-binding protein 1 (N4BP1) and similar proteins. N4BP1 interacts with and is a substrate of NEDD4 ubiquitin ligase (neural precursor cell expressed, developmentally downregulated 4, E3 ubiquitin protein ligase). It is also an inhibitor of the E3 ubiquitin-protein ligase ITCH, a NEDD4 structurally related E3. N4BP1 acts by interacting with the second WW domain of ITCH, leading to compete with ITCH's substrates and impairing ubiquitination of substrates."
definition: >-
  type I K homology (KH) RNA-binding domain found in NEDD4-binding protein 1 (N4BP1) and similar proteins. N4BP1 interacts with and is a substrate of NEDD4 ubiquitin ligase (neural precursor cell expressed, developmentally downregulated 4, E3 ubiquitin protein ligase). It is also an inhibitor of the E3 ubiquitin-protein ligase ITCH, a NEDD4 structurally related E3. N4BP1 acts by interacting with the second WW domain of ITCH, leading to compete with ITCH's substrates and impairing ubiquitination of substrates. — an NCBI CDD conserved domain (cd22476); members share this curated model.
