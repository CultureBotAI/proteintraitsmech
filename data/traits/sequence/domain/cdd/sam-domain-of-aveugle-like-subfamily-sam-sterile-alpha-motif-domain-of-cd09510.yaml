identifier: CDD:cd09510
label: "SAM domain of aveugle-like subfamily. SAM (sterile alpha motif) domain of SAM_aveugle-like subfamily is a protein-protein interaction domain. In Drosophila, the aveugle (AVE) protein (also known as HYP (Hyphen)) is involved in normal photoreceptor differentiation, and required for epidermal growth factor receptor (EGFR) signaling between ras and raf genes during eye development and wing vein formation. SAM domain of the HYP(AVE) protein interacts with SAM domain of CNK, the multidomain scaffold protein connector enhancer of kinase suppressor of ras. CNK/HYP(AVE) complex interacts with KSR (kinase suppressor of Ras) protein. This interaction leads to stimulation of Ras-dependent Raf activation. This subfamily also includes vertebrate AVE homologs - Samd10 and Samd12 proteins. Their exact function is unknown, but they may play a role in signal transduction during embryogenesis."
definition: >-
