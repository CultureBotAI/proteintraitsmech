identifier: CDD:cd21205
label: "calponin homology (CH) domain found in the leucine-rich repeat and calponin homology domain-containing protein family. The leucine-rich repeat and calponin homology domain-containing protein (LRCH) family includes LRCH1-4. LRCH1, also called calponin homology domain-containing protein 1, or neuronal protein 81 (NP81), acts as a negative regulator of GTPase Cdc42 by sequestering Cdc42-guanine exchange factor DOCK8. LRCH2 may play a role in the organization of the cytoskeleton. LRCH3 is part of the DISP complex and may regulate the association of septins with actin and thereby regulate the actin cytoskeleton. LRCH4, also called leucine-rich repeat neuronal protein 4, or leucine-rich neuronal protein, acts as a novel Toll-like receptor (TLR) accessory protein that regulates the innate immune response. Members of this family contain a single copy of the CH domain at the C-terminus. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  calponin homology (CH) domain found in the leucine-rich repeat and calponin homology domain-containing protein family. The leucine-rich repeat and calponin homology domain-containing protein (LRCH) family includes LRCH1-4. LRCH1, also called calponin homology domain-containing protein 1, or neuronal protein 81 (NP81), acts as a negative regulator of GTPase Cdc42 by sequestering Cdc42-guanine exchange factor DOCK8. LRCH2 may play a role in the organization of the cytoskeleton. LRCH3 is part of the DISP complex and may regulate the association of septins with actin and thereby regulate the actin cytoskeleton. LRCH4, also called leucine-rich repeat neuronal protein 4, or leucine-rich neuronal protein, acts as a novel Toll-like receptor (TLR) accessory protein that regulates the innate immune response. Members of this family contain a single copy of the CH domain at the C-terminus. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21205); members share this curated model.
