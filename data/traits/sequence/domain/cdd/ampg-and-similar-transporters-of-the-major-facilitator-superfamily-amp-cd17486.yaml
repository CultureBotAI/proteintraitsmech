identifier: CDD:cd17486
label: "AmpG and similar transporters of the Major Facilitator Superfamily. AmpG acts as an inner membrane permease in the beta-lactamase induction system and in peptidoglycan recycling. It transports meuropeptide from the periplasm into the cytosol in gram-negative bacteria, which is essential for the induction of the ampC encoding beta-lactamase. The AmpG family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  AmpG and similar transporters of the Major Facilitator Superfamily. AmpG acts as an inner membrane permease in the beta-lactamase induction system and in peptidoglycan recycling. It transports meuropeptide from the periplasm into the cytosol in gram-negative bacteria, which is essential for the induction of the ampC encoding beta-lactamase. The AmpG family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17486); members share this curated model.
