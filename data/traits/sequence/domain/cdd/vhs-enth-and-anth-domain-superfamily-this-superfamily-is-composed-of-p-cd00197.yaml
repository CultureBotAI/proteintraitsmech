identifier: CDD:cd00197
label: "VHS, ENTH and ANTH domain superfamily. This superfamily is composed of proteins containing a VHS, CID, ENTH, or ANTH domain. The VHS domain is present in Vps27 (Vacuolar Protein Sorting), Hrs (Hepatocyte growth factor-regulated tyrosine kinase substrate) and STAM (Signal Transducing Adaptor Molecule). It is located at the N-termini of proteins involved in intracellular membrane trafficking. The CTD-Interacting Domain (CID) is present in several RNA-processing factors and binds tightly to the carboxy-terminal domain (CTD) of RNA polymerase II (RNAP II or Pol II). The epsin N-terminal homology (ENTH) domain is an evolutionarily conserved protein module found primarily in proteins that participate in clathrin-mediated endocytosis. A set of proteins previously designated as harboring an ENTH domain in fact contains a highly similar, yet unique module referred to as an AP180 N-Terminal Homology (ANTH) domain. VHS, ENTH, and ANTH domains are structurally similar and are composed of a superhelix of eight alpha helices. ENTH and ANTH (E/ANTH) domains bind both inositol phospholipids and proteins and contribute to the nucleation and formation of clathrin coats on membranes. ENTH domains also function in the development of membrane curvature through lipid remodeling during the formation of clathrin-coated vesicles. E/ANTH domain-bearing proteins have recently been shown to function with adaptor protein-1 and GGA adaptors at the Trans-Golgi Network, which suggests that E/ANTH domains are universal components of the machinery for clathrin-mediated membrane budding."
definition: >-
  VHS, ENTH and ANTH domain superfamily. This superfamily is composed of proteins containing a VHS, CID, ENTH, or ANTH domain. The VHS domain is present in Vps27 (Vacuolar Protein Sorting), Hrs (Hepatocyte growth factor-regulated tyrosine kinase substrate) and STAM (Signal Transducing Adaptor Molecule). It is located at the N-termini of proteins involved in intracellular membrane trafficking. The CTD-Interacting Domain (CID) is present in several RNA-processing factors and binds tightly to the carboxy-terminal domain (CTD) of RNA polymerase II (RNAP II or Pol II). The epsin N-terminal homology (ENTH) domain is an evolutionarily conserved protein module found primarily in proteins that participate in clathrin-mediated endocytosis. A set of proteins previously designated as harboring an ENTH domain in fact contains a highly similar, yet unique module referred to as an AP180 N-Terminal Homology (ANTH) domain. VHS, ENTH, and ANTH domains are structurally similar and are composed of a superhelix of eight alpha helices. ENTH and ANTH (E/ANTH) domains bind both inositol phospholipids and proteins and contribute to the nucleation and formation of clathrin coats on membranes. ENTH domains also function in the development of membrane curvature through lipid remodeling during the formation of clathrin-coated vesicles. E/ANTH domain-bearing proteins have recently been shown to function with adaptor protein-1 and GGA adaptors at the Trans-Golgi Network, which suggests that E/ANTH domains are universal components of the machinery for clathrin-mediated membrane budding. — an NCBI CDD conserved domain (cd00197); members share this curated model.
