identifier: CDD:cd20243
label: NoBody
definition: >-
  Negative regulator of P-body association. Negative regulator of P-body association, also called P-body dissociating protein or protein NoBody (non-annotated P-body dissociating polypeptide), is a microprotein that interacts with mRNA decapping proteins, which remove the 5' cap from mRNAs to promote 5'-to-3' decay. It localizes to P-bodies, which are mRNA-decay-associated RNA-protein granules. NoBody promotes dispersal of P-body components and is likely to play a role in the mRNA decapping process. Decapping proteins participate in mRNA turnover and nonsense-mediated decay (NMD)
