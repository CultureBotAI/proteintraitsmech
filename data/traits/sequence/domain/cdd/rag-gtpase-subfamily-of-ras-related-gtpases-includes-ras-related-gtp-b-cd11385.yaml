identifier: CDD:cd11385
label: "Rag GTPase, subfamily of Ras-related GTPases, includes Ras-related GTP-binding proteins C and D. RagC and RagD are closely related Rag GTPases (ras-related GTP-binding protein C and D) that constitute a unique subgroup of the Ras superfamily, and are functional homologs of Saccharomyces cerevisiae Gtr2. These domains form heterodimers with RagA or RagB, and similarly, Gtr2 dimerizes with Gtr1 in order to function. They play an essential role in regulating amino acid-induced target of rapamycin complex 1 (TORC1) kinase signaling, exocytic cargo sorting at endosomes, and epigenetic control of gene expression. In response to amino acids, the Rag GTPases guide the TORC1 complex to activate the platform containing Rheb proto-oncogene by driving the relocalization of mTORC1 from discrete locations in the cytoplasm to a late endosomal and/or lysosomal compartment that is Rheb-enriched and contains Rab-7."
definition: >-
  Rag GTPase, subfamily of Ras-related GTPases, includes Ras-related GTP-binding proteins C and D. RagC and RagD are closely related Rag GTPases (ras-related GTP-binding protein C and D) that constitute a unique subgroup of the Ras superfamily, and are functional homologs of Saccharomyces cerevisiae Gtr2. These domains form heterodimers with RagA or RagB, and similarly, Gtr2 dimerizes with Gtr1 in order to function. They play an essential role in regulating amino acid-induced target of rapamycin complex 1 (TORC1) kinase signaling, exocytic cargo sorting at endosomes, and epigenetic control of gene expression. In response to amino acids, the Rag GTPases guide the TORC1 complex to activate the platform containing Rheb proto-oncogene by driving the relocalization of mTORC1 from discrete locations in the cytoplasm to a late endosomal and/or lysosomal compartment that is Rheb-enriched and contains Rab-7. — an NCBI CDD conserved domain (cd11385); members share this curated model.
