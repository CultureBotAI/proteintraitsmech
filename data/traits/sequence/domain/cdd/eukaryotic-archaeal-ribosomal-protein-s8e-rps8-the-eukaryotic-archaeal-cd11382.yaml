definition: >-
  Eukaryotic/archaeal ribosomal protein S8e (RPS8). The eukaryotic/archaeal ribosomal protein S8 is a component of the small (40S in eukaryotes, 30S in archaea) ribosomal subunits and interacts tightly with 18S rRNA (16S rRNA in archaea, presumably). — an NCBI CDD conserved domain (cd11382); members share this curated model.
