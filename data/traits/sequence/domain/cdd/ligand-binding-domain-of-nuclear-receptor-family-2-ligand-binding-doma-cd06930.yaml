identifier: CDD:cd06930
label: "Ligand-binding domain of nuclear receptor family 2. Ligand-binding domain (LBD) of nuclear receptor (NR) family 2:  This is one of the major subfamily of nuclear receptors, including some well known nuclear receptors such as glucocorticoid receptor (GR), mineralocorticoid receptor (MR), estrogen receptor (ER), progesterone receptor (PR), and androgen receptor (AR), other related receptors. Nuclear receptors form a superfamily of ligand-activated transcription regulators, which regulate various physiological functions, from development, reproduction, to homeostasis and metabolism in animals (metazoans). The family contains not only receptors for known ligands but also orphan receptors for which ligands do not exist or have not been identified. NRs share a common structural organization with a central well conserved DNA binding domain (DBD), a variable N-terminal domain, a non-conserved hinge and a C-terminal ligand binding domain (LBD)."
