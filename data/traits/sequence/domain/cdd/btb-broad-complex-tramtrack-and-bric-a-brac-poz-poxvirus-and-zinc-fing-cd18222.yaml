identifier: CDD:cd18222
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 37 (ZBTB37). ZBTB37 may be involved in transcriptional regulation. It is differentially expressed in aryl hydrocarbon receptor (AhR)-KO mice compared with WT mice, and may potentially contribute to the aging phenotype of AhR-KO mice. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 37 (ZBTB37). ZBTB37 may be involved in transcriptional regulation. It is differentially expressed in aryl hydrocarbon receptor (AhR)-KO mice compared with WT mice, and may potentially contribute to the aging phenotype of AhR-KO mice. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18222); members share this curated model.
