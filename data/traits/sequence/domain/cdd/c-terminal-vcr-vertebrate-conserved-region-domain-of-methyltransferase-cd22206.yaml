identifier: CDD:cd22206
label: METTL16_VCR
definition: >-
  C-terminal VCR (vertebrate conserved region) domain of methyltransferase-like protein 16 (METTL16) and similar protein. METTL16, also called RNA N6-adenosine-methyltransferase METTL16, or methyltransferase 10 domain-containing protein, or N6-adenosine-methyltransferase METTL16, or U6 small nuclear RNA (adenine-(43)-N(6))-methyltransferase, is RNA N6-methyltransferase that methylates adenosine residues at the N(6) position of a subset of RNAs and is involved in S-adenosyl-L-methionine homeostasis by regulating expression of MAT2A transcripts. It is important for the 5?-splice site recognition by U6 snRNA during pre-mRNA splicing. METTL16 consists of the N-terminal methyltransferase domain (MTD) and the C-terminal vertebrate conserved region (VCR). The model corresponds to the VCR domain that is important for the METTL16-U6 snRNA interaction
