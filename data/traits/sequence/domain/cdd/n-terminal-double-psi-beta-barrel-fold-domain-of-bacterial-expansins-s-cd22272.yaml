identifier: CDD:cd22272
label: "N-terminal double-psi beta-barrel fold domain of bacterial expansins similar to Bacillus subtilis EXLX1. This subfamily is composed of bacterial expansins including Bacillus subtilis EXLX1, also called expansin-YoaJ. Similar to plant expansins, EXLX1 contains an N-terminal domain (D1) homologous to the catalytic domain of glycoside hydrolase family 45 (GH45) proteins but with no hydrolytic activity, and a C-terminal domain (D2) homologous to group-2 grass pollen allergens. It strongly binds to crystalline cellulose via D2, and weakly binds soluble cellooligosaccharides. Bacterial expansins, which are present in some plant pathogens, have the ability to loosen plant cell walls, but with weaker activity compared to plant expansins. They may have a role in plant-bacterial interactions. This model represents the N-terminal domain of EXLX1 and similar bacterial expansins, which adopts a double-psi beta-barrel (DPBB) fold."
definition: >-
  N-terminal double-psi beta-barrel fold domain of bacterial expansins similar to Bacillus subtilis EXLX1. This subfamily is composed of bacterial expansins including Bacillus subtilis EXLX1, also called expansin-YoaJ. Similar to plant expansins, EXLX1 contains an N-terminal domain (D1) homologous to the catalytic domain of glycoside hydrolase family 45 (GH45) proteins but with no hydrolytic activity, and a C-terminal domain (D2) homologous to group-2 grass pollen allergens. It strongly binds to crystalline cellulose via D2, and weakly binds soluble cellooligosaccharides. Bacterial expansins, which are present in some plant pathogens, have the ability to loosen plant cell walls, but with weaker activity compared to plant expansins. They may have a role in plant-bacterial interactions. This model represents the N-terminal domain of EXLX1 and similar bacterial expansins, which adopts a double-psi beta-barrel (DPBB) fold. — an NCBI CDD conserved domain (cd22272); members share this curated model.
