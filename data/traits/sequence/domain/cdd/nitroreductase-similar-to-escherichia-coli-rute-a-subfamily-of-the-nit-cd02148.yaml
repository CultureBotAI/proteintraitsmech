identifier: CDD:cd02148
label: "nitroreductase similar to Escherichia coli RutE. A subfamily of the nitroreductase family containing uncharacterized proteins that are similar to nitroreductase. Nitroreductase catalyzes the reduction of nitroaromatic compounds such as nitrotoluenes, nitrofurans and nitroimidazoles. This process requires NAD(P)H as electron donor in an obligatory two-electron transfer and uses FMN as cofactor. The enzyme is typically a homodimer. RutE is involved in the utilization of uracil as the sole nitrogen source; it appears to have the same function as YdfG, which reduces malonic semialdehyde to 3-hydroxypropionic acid."
definition: >-
  nitroreductase similar to Escherichia coli RutE. A subfamily of the nitroreductase family containing uncharacterized proteins that are similar to nitroreductase. Nitroreductase catalyzes the reduction of nitroaromatic compounds such as nitrotoluenes, nitrofurans and nitroimidazoles. This process requires NAD(P)H as electron donor in an obligatory two-electron transfer and uses FMN as cofactor. The enzyme is typically a homodimer. RutE is involved in the utilization of uracil as the sole nitrogen source; it appears to have the same function as YdfG, which reduces malonic semialdehyde to 3-hydroxypropionic acid. — an NCBI CDD conserved domain (cd02148); members share this curated model.
