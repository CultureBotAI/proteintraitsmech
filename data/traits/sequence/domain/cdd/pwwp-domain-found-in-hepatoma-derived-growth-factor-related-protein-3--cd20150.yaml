identifier: CDD:cd20150
label: "PWWP domain found in Hepatoma-derived growth factor-related protein 3 (HDGFL3). HDGFL3, also called HDGF-related protein 3 (HRP-3), is the only hepatoma-derived growth factor (HDGF)-related protein (HRP) family member whose expression is almost restricted to the nervous tissue. It enhances DNA synthesis and may play a role in cell proliferation. It contains a PWWP domain, which is necessary for DNA binding."
definition: >-
  PWWP domain found in Hepatoma-derived growth factor-related protein 3 (HDGFL3). HDGFL3, also called HDGF-related protein 3 (HRP-3), is the only hepatoma-derived growth factor (HDGF)-related protein (HRP) family member whose expression is almost restricted to the nervous tissue. It enhances DNA synthesis and may play a role in cell proliferation. It contains a PWWP domain, which is necessary for DNA binding. — an NCBI CDD conserved domain (cd20150); members share this curated model.
