identifier: CDD:cd10823
label: "circularly permuted PDZ domains of uncharacterized archaeal proteins related to Escherichia coli Regulator of sigma-E protease (RseP) and Bacillus subtilis YlbL protease. Permuted PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of uncharacterized archaeal proteins related to Escherichia coli ResP (also known as Site-2 protease RseP, and YaeL) and Bacillus subtilis YlbL protease. RseP participates in the regulation of an extracytoplasmic stress response through the cleavage of membrane-spanning anti-stress-response transcription factor (anti-sigmaE) protein RseA. YlbL is an S16 protease which participates with another unrelated S41 protease (CtpA) in a dual protease mechanism that promotes DNA damage checkpoint recovery. PDZ domains usually bind in sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. This RseP-YlbL archaeal family PDZ domain is a circularly permuted PDZ domain which places both beta-strands A and B at the C-terminus. Another permutation exists in the PDZ superfamily which places beta-strand A at the C-terminus."
definition: >-
  circularly permuted PDZ domains of uncharacterized archaeal proteins related to Escherichia coli Regulator of sigma-E protease (RseP) and Bacillus subtilis YlbL protease. Permuted PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of uncharacterized archaeal proteins related to Escherichia coli ResP (also known as Site-2 protease RseP, and YaeL) and Bacillus subtilis YlbL protease. RseP participates in the regulation of an extracytoplasmic stress response through the cleavage of membrane-spanning anti-stress-response transcription factor (anti-sigmaE) protein RseA. YlbL is an S16 protease which participates with another unrelated S41 protease (CtpA) in a dual protease mechanism that promotes DNA damage checkpoint recovery. PDZ domains usually bind in sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. This RseP-YlbL archaeal family PDZ domain is a circularly permuted PDZ domain which places both beta-strands A and B at the C-terminus. Another permutation exists in the PDZ superfamily which places beta-strand A at the C-terminus. — an NCBI CDD conserved domain (cd10823); members share this curated model.
