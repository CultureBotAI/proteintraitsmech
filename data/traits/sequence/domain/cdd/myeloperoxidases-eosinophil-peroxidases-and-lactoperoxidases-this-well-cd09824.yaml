identifier: CDD:cd09824
label: "Myeloperoxidases, eosinophil peroxidases, and lactoperoxidases. This well conserved family of animal heme peroxidases contains members with somewhat diverse functions. Myeloperoxidases are lysosomal proteins found in azurophilic granules of neutrophils and the lysosomes of monocytes. They are involved in the formation of microbicidal agents upon activation of activated neutrophils (neutrophils undergoing respiratory bursts as a result of phagocytosis), by catalyzing the conversion of hydrogen peroxide to hypochlorous acid. As a heme protein, myeloperoxidase is responsible for the greenish tint of pus, which is rich in neutrophils. Eosinophil peroxidases are haloperoxidases as well, preferring bromide over chloride. Expressed by eosinophil granulocytes, they are involved in attacking multicellular parasites and play roles in various inflammatory diseases such as asthma. The haloperoxidase lactoperoxidase is secreted from mucosal glands and provides antibacterial activity by oxidizing a variety of substrates such as bromide or chloride in the presence of hydrogen peroxide."
definition: >-
  Myeloperoxidases, eosinophil peroxidases, and lactoperoxidases. This well conserved family of animal heme peroxidases contains members with somewhat diverse functions. Myeloperoxidases are lysosomal proteins found in azurophilic granules of neutrophils and the lysosomes of monocytes. They are involved in the formation of microbicidal agents upon activation of activated neutrophils (neutrophils undergoing respiratory bursts as a result of phagocytosis), by catalyzing the conversion of hydrogen peroxide to hypochlorous acid. As a heme protein, myeloperoxidase is responsible for the greenish tint of pus, which is rich in neutrophils. Eosinophil peroxidases are haloperoxidases as well, preferring bromide over chloride. Expressed by eosinophil granulocytes, they are involved in attacking multicellular parasites and play roles in various inflammatory diseases such as asthma. The haloperoxidase lactoperoxidase is secreted from mucosal glands and provides antibacterial activity by oxidizing a variety of substrates such as bromide or chloride in the presence of hydrogen peroxide. — an NCBI CDD conserved domain (cd09824); members share this curated model.
