identifier: CDD:cd20039
label: FH_FOXA2
definition: >-
  Forkhead (FH) domain found in Forkhead box protein A2 (FOXA2) and similar proteins. FOXA2, also called hepatocyte nuclear factor 3-beta (HNF-3-beta or HNF-3B) or transcription factor 3B (TCF-3B), acts as a core transcription factor that controls cell differentiation. It is a key transcriptional regulator that maintains airway mucus homeostasis. It may also have an important role in bone metabolism. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'
