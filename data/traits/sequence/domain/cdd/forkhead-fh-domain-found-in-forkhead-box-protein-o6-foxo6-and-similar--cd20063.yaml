identifier: CDD:cd20063
label: "Forkhead (FH) domain found in Forkhead box protein O6 (FOXO6) and similar proteins. FOXO6 acts as a transcriptional activator that may play an important role on tumor invasion, metastasis and prognosis. The FH domain is a winged helix DNA-binding domain. All FOXOs bind to the consensus sequence 5'-GTAAACAA-3', known as the DAF-16 family member-binding element, which includes the core sequence 5'-(A/C)AA(C/T)A-3' recognized by all FOX family members."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein O6 (FOXO6) and similar proteins. FOXO6 acts as a transcriptional activator that may play an important role on tumor invasion, metastasis and prognosis. The FH domain is a winged helix DNA-binding domain. All FOXOs bind to the consensus sequence 5'-GTAAACAA-3', known as the DAF-16 family member-binding element, which includes the core sequence 5'-(A/C)AA(C/T)A-3' recognized by all FOX family members. — an NCBI CDD conserved domain (cd20063); members share this curated model.
