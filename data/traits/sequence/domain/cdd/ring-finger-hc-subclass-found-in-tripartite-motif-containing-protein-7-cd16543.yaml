identifier: CDD:cd16543
label: "RING finger, HC subclass, found in tripartite motif-containing protein 77 (TRIM77) and similar proteins. TRIM77 belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including two consecutive zinc-binding domains, a C3HC4-type RING-HC finger and Bbox2, as well as a SPRY/B30.2 domain positioned C-terminal to the RBCC domain."
definition: >-
  RING finger, HC subclass, found in tripartite motif-containing protein 77 (TRIM77) and similar proteins. TRIM77 belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including two consecutive zinc-binding domains, a C3HC4-type RING-HC finger and Bbox2, as well as a SPRY/B30.2 domain positioned C-terminal to the RBCC domain. — an NCBI CDD conserved domain (cd16543); members share this curated model.
