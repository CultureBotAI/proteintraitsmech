identifier: CDD:cd22647
label: CTF3_NTD_HEAT
definition: >-
  N-terminal HEAT repeat domain of inner kinetochore subunit CTF3 and similar proteins. CTF3 (also called CENP-I homolog, chromosome loss protein 3, chromosome transmission fidelity protein 3, or constitutive centromere-associated network protein CTF3) is a component of the central kinetochore, which mediates the attachment of the centromere to the mitotic spindle by forming essential interactions between the microtubule-associated outer kinetochore proteins and the centromere-associated inner kinetochore proteins. It is required for establishing bipolar spindle-microtubule attachments and proper chromosome segregation. The kinetochore is a multiprotein complex that assembles on centromeric DNA and attaches chromosomes to spindle microtubules, mediating chromosome segregation and sister chromatid segregation during meiosis and mitosis. CTF3 is a component of the inner kinetochore constitutive centromere-associated network (CCAN), which serves as a structural platform for outer kinetochore assembly. This model corresponds to the N-terminal HEAT repeat domain of CTF3, which interacts with another four kinetochore subunits, WIP1, CNN1, MCM16 and MCM22
