identifier: CDD:cd21155
label: "PUA RNA-binding domain of malignant T cell-amplified sequence 1 and related proteins. The RNA-binding PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain was detected in a number of proteins involved in RNA metabolism. Members of this eukaryotic family, labelled MCT-1 (malignant T cell-amplified sequence 1) or MCTS-1 (multiple copies T-cell lymphoma-1), contain a single PUA domain. They may play roles in the regulation of the cell cycle; human MCT-1 has been characterized for its oncogenic potential. MCT-1/MCTS1 expression is a new poor-prognosis marker in patients with aggressive breast cancers, and thus the MCT-1 pathway is a novel and promising therapeutic target for triple-negative breast cancer (TNBC)."
definition: >-
  PUA RNA-binding domain of malignant T cell-amplified sequence 1 and related proteins. The RNA-binding PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain was detected in a number of proteins involved in RNA metabolism. Members of this eukaryotic family, labelled MCT-1 (malignant T cell-amplified sequence 1) or MCTS-1 (multiple copies T-cell lymphoma-1), contain a single PUA domain. They may play roles in the regulation of the cell cycle; human MCT-1 has been characterized for its oncogenic potential. MCT-1/MCTS1 expression is a new poor-prognosis marker in patients with aggressive breast cancers, and thus the MCT-1 pathway is a novel and promising therapeutic target for triple-negative breast cancer (TNBC). — an NCBI CDD conserved domain (cd21155); members share this curated model.
