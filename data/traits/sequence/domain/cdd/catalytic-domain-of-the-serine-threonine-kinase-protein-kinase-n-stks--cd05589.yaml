identifier: CDD:cd05589
label: "Catalytic domain of the Serine/Threonine Kinase, Protein Kinase N. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. PKN has a C-terminal catalytic domain that is highly homologous to PKCs. Its unique N-terminal regulatory region contains antiparallel coiled-coil (ACC) domains. In mammals, there are three PKN isoforms from different genes (designated PKN-alpha, beta, and gamma), which show different enzymatic properties, tissue distribution, and varied functions. PKN can be activated by the small GTPase Rho, and by fatty acids such as arachidonic and linoleic acids. It is involved in many biological processes including cytokeletal regulation, cell adhesion, vesicle transport, glucose transport, regulation of meiotic maturation and embryonic cell cycles, signaling to the nucleus, and tumorigenesis. The PKN subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Protein Kinase N. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. PKN has a C-terminal catalytic domain that is highly homologous to PKCs. Its unique N-terminal regulatory region contains antiparallel coiled-coil (ACC) domains. In mammals, there are three PKN isoforms from different genes (designated PKN-alpha, beta, and gamma), which show different enzymatic properties, tissue distribution, and varied functions. PKN can be activated by the small GTPase Rho, and by fatty acids such as arachidonic and linoleic acids. It is involved in many biological processes including cytokeletal regulation, cell adhesion, vesicle transport, glucose transport, regulation of meiotic maturation and embryonic cell cycles, signaling to the nucleus, and tumorigenesis. The PKN subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05589); members share this curated model.
