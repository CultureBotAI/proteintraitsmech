identifier: CDD:cd03399
label: "Flotillin or reggie family; SPFH (stomatin, prohibitin, flotillin, and HflK/C) superfamily. The flotillin (reggie) like proteins are lipid raft-associated. Individual proteins of this SPFH family may cluster to form membrane microdomains which may in turn recruit multiprotein complexes. In addition, microdomains formed from flotillin proteins may be dynamic units with their own regulatory functions. Flotillins have been implicated in signal transduction, vesicle trafficking, cytoskeleton rearrangement and interact with a variety of proteins. They may play a role in the progression of prion disease, in the pathogenesis of neurodegenerative diseases such as Parkinson's and Alzheimer's disease and in cancer invasion, and metastasis."
definition: >-
