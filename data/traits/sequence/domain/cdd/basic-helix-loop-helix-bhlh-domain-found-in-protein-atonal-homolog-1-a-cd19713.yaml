identifier: CDD:cd19713
label: "basic helix-loop-helix (bHLH) domain found in protein atonal homolog 1 (ATOH1) and similar proteins. ATOH1, also termed Class A basic helix-loop-helix protein 14 (bHLHa14), or helix-loop-helix protein hATH-1 (hATH1), or Math1, or Cath1, is a proneural bHLH transcription factor that is essential for inner ear hair cell differentiation. It dimerizes with E47 and activates E-box (CANNTG) dependent transcription. ATOH1 is a mammalian homolog of the Drosophila melanogaster gene atonal and mouse atonal homolog 1 (Math1)."
definition: >-
  basic helix-loop-helix (bHLH) domain found in protein atonal homolog 1 (ATOH1) and similar proteins. ATOH1, also termed Class A basic helix-loop-helix protein 14 (bHLHa14), or helix-loop-helix protein hATH-1 (hATH1), or Math1, or Cath1, is a proneural bHLH transcription factor that is essential for inner ear hair cell differentiation. It dimerizes with E47 and activates E-box (CANNTG) dependent transcription. ATOH1 is a mammalian homolog of the Drosophila melanogaster gene atonal and mouse atonal homolog 1 (Math1). — an NCBI CDD conserved domain (cd19713); members share this curated model.
