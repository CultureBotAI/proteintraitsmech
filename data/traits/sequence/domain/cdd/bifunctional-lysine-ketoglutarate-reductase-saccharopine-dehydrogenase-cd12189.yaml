identifier: CDD:cd12189
label: "bifunctional lysine ketoglutarate reductase /saccharopine dehydrogenase enzyme. Bifunctional lysine ketoglutarate reductase /saccharopine dehydrogenase protein is a pair of enzymes linked on a single polypeptide chain that catalyze the initial, consecutive steps of lysine degradation. These proteins are related to the 2-domain saccharopine dehydrogenases. Along with formate dehydrogenase and similar enzymes, SDH consists paired domains resembling Rossmann folds in which the NAD-binding domain is inserted within the linear sequence of the catalytic domain. In this bifunctional enzyme, the LKR domain is N-terminal of the SDH domain. These proteins have a close match to the active site motif of SDHs, and an NAD-binding site motif that is a partial match to that found in SDH and other FDH-related proteins."
