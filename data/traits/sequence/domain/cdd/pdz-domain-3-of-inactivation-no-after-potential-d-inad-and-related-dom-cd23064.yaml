identifier: CDD:cd23064
label: "PDZ domain 3 of inactivation-no-after-potential D (INAD), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 3 of INAD, and related domains. INAD assembles key enzymes of the Drosophila compound eye photo-transduction pathway into a supramolecular complex, supporting efficient and fast light signaling. It contains 5 PDZ domains arranged in tandem (PDZ1-PDZ5) which independently bind various proteins. INAD PDZ2 binds eye-specific protein kinase C, INAD PDZ3 binds transient receptor potential (TRP) channel, and INAD PDZ4,5 tandem binds NORPA (phospholipase Cbeta, PLCbeta). Mutations of the inaD gene that lead to disruption of each of these interactions impair fly photo signal transduction. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This INAD-like family PDZ3 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  PDZ domain 3 of inactivation-no-after-potential D (INAD), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 3 of INAD, and related domains. INAD assembles key enzymes of the Drosophila compound eye photo-transduction pathway into a supramolecular complex, supporting efficient and fast light signaling. It contains 5 PDZ domains arranged in tandem (PDZ1-PDZ5) which independently bind various proteins. INAD PDZ2 binds eye-specific protein kinase C, INAD PDZ3 binds transient receptor potential (TRP) channel, and INAD PDZ4,5 tandem binds NORPA (phospholipase Cbeta, PLCbeta). Mutations of the inaD gene that lead to disruption of each of these interactions impair fly photo signal transduction. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This INAD-like family PDZ3 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd23064); members share this curated model.
