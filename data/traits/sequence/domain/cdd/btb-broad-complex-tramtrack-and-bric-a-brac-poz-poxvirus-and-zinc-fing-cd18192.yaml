identifier: CDD:cd18192
label: BTB_POZ_ZBTB1
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 1 (ZBTB1). ZBTB1 acts as a transcriptional repressor that represses cAMP-responsive element (CRE)-mediated transcriptional activation. It also has a role in translesion DNA synthesis, and is essential for lymphocyte development. ZBTB1 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids
