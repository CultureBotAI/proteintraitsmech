identifier: CDD:cd13999
label: "Catalytic domain of Mitogen-Activated Protein Kinase (MAPK) Kinase Kinase-like Serine/Threonine kinases. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. This subfamily is composed mainly of MAP3Ks and similar proteins, including TGF-beta Activated Kinase-1 (TAK1, also called MAP3K7), MAP3K12, MAP3K13, Mixed lineage kinase (MLK), MLK-Like mitogen-activated protein Triple Kinase (MLTK), and Raf (Rapidly Accelerated Fibrosarcoma) kinases. MAP3Ks (MKKKs or MAPKKKs) phosphorylate and activate MAPK kinases (MAPKKs or MKKs or MAP2Ks), which in turn phosphorylate and activate MAPKs during signaling cascades that are important in mediating cellular responses to extracellular signals. Also included in this subfamily is the pseudokinase Kinase Suppressor of Ras (KSR), which is a scaffold protein that functions downstream of Ras and upstream of Raf in the Extracellular signal-Regulated Kinase (ERK) pathway."
definition: >-
  Catalytic domain of Mitogen-Activated Protein Kinase (MAPK) Kinase Kinase-like Serine/Threonine kinases. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. This subfamily is composed mainly of MAP3Ks and similar proteins, including TGF-beta Activated Kinase-1 (TAK1, also called MAP3K7), MAP3K12, MAP3K13, Mixed lineage kinase (MLK), MLK-Like mitogen-activated protein Triple Kinase (MLTK), and Raf (Rapidly Accelerated Fibrosarcoma) kinases. MAP3Ks (MKKKs or MAPKKKs) phosphorylate and activate MAPK kinases (MAPKKs or MKKs or MAP2Ks), which in turn phosphorylate and activate MAPKs during signaling cascades that are important in mediating cellular responses to extracellular signals. Also included in this subfamily is the pseudokinase Kinase Suppressor of Ras (KSR), which is a scaffold protein that functions downstream of Ras and upstream of Raf in the Extracellular signal-Regulated Kinase (ERK) pathway. — an NCBI CDD conserved domain (cd13999); members share this curated model.
