identifier: CDD:cd05207
label: F420_oxidored_like
definition: >-
  F420H2:NADP+ oxidoreductase like. F420H2:NADP+ oxidoreductase catalyzes the reaction F420H2 + NADP+ to F420 + NADPH + H+. Oxidoreduction occurs by hydride trqansfer to and from C5 of 5'-deazaflavin. This enzyme has a ROssmann fold and is related to the 6-phosphogluconate dehydrogenase family
