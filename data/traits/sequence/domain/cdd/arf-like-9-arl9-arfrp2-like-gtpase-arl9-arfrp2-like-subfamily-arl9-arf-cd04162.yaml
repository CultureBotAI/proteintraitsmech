label: "Arf-like 9 (Arl9)/Arfrp2-like GTPase. Arl9/Arfrp2-like subfamily. Arl9 (Arf-like 9) was first identified as part of the Human Cancer Genome Project. It maps to chromosome 4q12 and is sometimes referred to as Arfrp2 (Arf-related protein 2). This is a novel subfamily identified in human cancers that is uncharacterized to date."
definition: >-
  Arf-like 9 (Arl9)/Arfrp2-like GTPase. Arl9/Arfrp2-like subfamily. Arl9 (Arf-like 9) was first identified as part of the Human Cancer Genome Project. It maps to chromosome 4q12 and is sometimes referred to as Arfrp2 (Arf-related protein 2). This is a novel subfamily identified in human cancers that is uncharacterized to date. — an NCBI CDD conserved domain (cd04162); members share this curated model.
