identifier: CDD:cd08087
label: "ATP grasp domain of PurP like enzymes. This family is homologous to the ATP-grasp superfamily. Based on the sequence and structural comparison with other ATP-grasp members it appears that this family has a catalytic mechanism similar to the other members of ATP-grasp superfamily. FAICAR synthetase (PurP) family appears to be the closest homologue of this family."
definition: >-
  ATP grasp domain of PurP like enzymes. This family is homologous to the ATP-grasp superfamily. Based on the sequence and structural comparison with other ATP-grasp members it appears that this family has a catalytic mechanism similar to the other members of ATP-grasp superfamily. FAICAR synthetase (PurP) family appears to be the closest homologue of this family. — an NCBI CDD conserved domain (cd08087); members share this curated model.
