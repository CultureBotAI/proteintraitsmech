label: "high mobility group (HMG)-box found in sex determining region Y (SRY)-box 12 (SOX12) and similar proteins. SOX-12, also called SOX-22, is a transcription factor essential for embryonic development and cell fate determination. It binds to the sequence 5'-AACAAT-3'. SOX-12 belongs to the group C of SRY-related high-mobility group (HMG) box (Sox) transcription factors."
