RIM (tripartite motif) family of proteins are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a RING finger, Bbox1 and Bbox2, and a coiled coil domain. The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif. — an NCBI CDD conserved domain (cd19802); members share this curated model.
