identifier: CDD:cd19802
label: "B-box-type 1 zinc finger found in tripartite motif-containing proteins, TRIM8, TRIM16, TRIM25, TRIM29, TRIM44, TRIM47 and similar proteins. This family includes a group of tripartite motif-containing proteins, including TRIM8, TRIM16, TRIM25, TRIM29, TRIM44 and TRIM47. TRIM8, also known as glioblastoma-expressed RING finger protein (GERP) or RING finger protein 27 (RNF27), is a probable E3 ubiquitin-protein ligase that may promote proteasomal degradation of suppressor of cytokine signaling 1 (SOCS1) and further regulate interferon-gamma signaling. It functions as a new p53 modulator that stabilizes p53, impairing its association with MDM2 and inducing the reduction of cell proliferation. TRIM16, also termed estrogen-responsive B box protein (EBBP), may play a role in the regulation of keratinocyte differentiation. It may also act as a tumor suppressor by affecting cell proliferation and migration or tumorigenicity in carcinogenesis. TRIM25, also termed estrogen-responsive finger protein (EFP), or ubiquitin/ISG15-conjugating enzyme TRIM25, or zinc finger protein 147 (ZNF147), or E3 ubiquitin/ISG15 ligase TRIM25, is induced by estrogen and is particularly abundant in placenta and uterus. It has been implicated in cell proliferation, protein modification, and the retinoic acid inducible gene I (RIG-I)-mediated antiviral signaling pathway. It functions as an E3-ubiquitin ligase able to transfer ubiquitin and ISG15 to target proteins. TRIM29, also termed ataxia telangiectasia group D-associated protein (ATDC), plays a crucial role in the regulation of macrophage activation in response to viral or bacterial infections within the respiratory tract. TRIM44, also termed protein DIPB, functions as a critical regulator in tumor metastasis and progression. TRIM47, also known as gene overexpressed in astrocytoma protein (GOA) or RING finger protein 100 (RNF100), plays an important role in the process of dedifferentiation that is associated with astrocytoma tumorigenesis. The TRIM (tripartite motif) family of proteins are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a RING finger, Bbox1 and Bbox2, and a coiled coil domain. The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif."
