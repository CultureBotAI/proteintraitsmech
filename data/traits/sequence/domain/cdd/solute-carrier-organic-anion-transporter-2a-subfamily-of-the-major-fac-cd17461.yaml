identifier: CDD:cd17461
label: "Solute carrier organic anion transporter 2A subfamily of the Major Facilitator Superfamily of transporters. The Solute carrier organic anion transporter 2A (SLCO2A), also called Organic anion-transporting polypeptide 2A (OATP2A), subfamily has one mammalian member, OATP2A1 (encoded by SLCO2A1), which is also called prostaglandin transporter. It is a lactate/prostaglandin anion exchanger that mediates the release of newly synthesized prostaglandins (PGD2, PGE1, PGE2, PGF2A and PGI2) from cells, the transepithelial transport of prostaglandins, and the clearance of prostaglandins from the circulation. Mutations in SLCO2A1 can cause primary hypertrophic osteoarthropathy (PHO), a rare multi-organic disease characterized by digital clubbing, pachydermia and periosteal reaction. The SLCO2A/OATP2A subfamily belongs to the Solute carrier organic anion transporter [SLCO, also called organic anion transporting polypeptides (OATPs) or Solute carrier family 21] family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Solute carrier organic anion transporter 2A subfamily of the Major Facilitator Superfamily of transporters. The Solute carrier organic anion transporter 2A (SLCO2A), also called Organic anion-transporting polypeptide 2A (OATP2A), subfamily has one mammalian member, OATP2A1 (encoded by SLCO2A1), which is also called prostaglandin transporter. It is a lactate/prostaglandin anion exchanger that mediates the release of newly synthesized prostaglandins (PGD2, PGE1, PGE2, PGF2A and PGI2) from cells, the transepithelial transport of prostaglandins, and the clearance of prostaglandins from the circulation. Mutations in SLCO2A1 can cause primary hypertrophic osteoarthropathy (PHO), a rare multi-organic disease characterized by digital clubbing, pachydermia and periosteal reaction. The SLCO2A/OATP2A subfamily belongs to the Solute carrier organic anion transporter [SLCO, also called organic anion transporting polypeptides (OATPs) or Solute carrier family 21] family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17461); members share this curated model.
