identifier: CDD:cd15742
label: "FYVE-like domain found in FYVE, RhoGEF and PH domain-containing protein 5 (FGD5) and similar proteins. FGD5, also termed zinc finger FYVE domain-containing protein 23, is an endothelial cell (EC)-specific guanine nucleotide exchange factor (GEF) that regulates endothelial adhesion, survival, and angiogenesis by modulating phosphatidylinositol 3-kinase signaling. It functions as a novel genetic regulator of vascular pruning by activation of endothelial cell-targeted apoptosis. FGD5 is a homologue of FGD1 and contains a DBL homology (DH) domain, a pleckstrin homology (PH) domain, a FYVE domain, and another PH domain in the C-terminus, but lacks the N-terminal proline-rich domain (PRD) found in FGD1. The FYVE domain of FGD5 resembles a FYVE-like domain that is different from the canonical FYVE domains, since it lacks one of the three conserved signature motifs (the WxxD motif) that are involved in phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) binding and exhibits altered lipid binding specificities."
definition: >-
  FYVE-like domain found in FYVE, RhoGEF and PH domain-containing protein 5 (FGD5) and similar proteins. FGD5, also termed zinc finger FYVE domain-containing protein 23, is an endothelial cell (EC)-specific guanine nucleotide exchange factor (GEF) that regulates endothelial adhesion, survival, and angiogenesis by modulating phosphatidylinositol 3-kinase signaling. It functions as a novel genetic regulator of vascular pruning by activation of endothelial cell-targeted apoptosis. FGD5 is a homologue of FGD1 and contains a DBL homology (DH) domain, a pleckstrin homology (PH) domain, a FYVE domain, and another PH domain in the C-terminus, but lacks the N-terminal proline-rich domain (PRD) found in FGD1. The FYVE domain of FGD5 resembles a FYVE-like domain that is different from the canonical FYVE domains, since it lacks one of the three conserved signature motifs (the WxxD motif) that are involved in phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) binding and exhibits altered lipid binding specificities. — an NCBI CDD conserved domain (cd15742); members share this curated model.
