identifier: CDD:cd18831
label: "Glycosyl hydrolase family 43 protein such as Aspergillus niger endo-alpha-L-arabinanase (AbnA). This glycosyl hydrolase family 43 (GH43) subgroup includes characterized enzymes with endo-alpha-L-arabinanase (ABN; EC 3.2.1.99) activities such as Aspergillus niger AbnA, Aspergillus niveus AbnA, and Chrysosporium lucknowense Abn1. It belongs to the GH43_Arb43a subgroup of the glycosyl hydrolase clan F (according to carbohydrate-active enzymes database (CAZY)) which includes family 43 (GH43) and 62 (GH62) families. GH43_Arb43a subgroup includes mostly enzymes with alpha-L-arabinofuranosidase (ABF; EC 3.2.1.55) and endo-alpha-L-arabinanase activities. These are inverting enzymes (i.e. they invert the stereochemistry of the anomeric carbon atom of the substrate) that have an aspartate as the catalytic general base, a glutamate as the catalytic general acid and another aspartate that is responsible for pKa modulation and orienting the catalytic acid. The GH43 ABN enzymes hydrolyze alpha-1,5-L-arabinofuranoside linkages while the ABF enzymes cleave arabinose side chains so that the combined actions of these two enzymes reduce arabinan to L-arabinose and/or arabinooligosaccharides. The GH43_Arb43a  subgroup includes many enzymes such as Bacillus subtilis arabinanase Abn2, that hydrolyzes sugar beet arabinan (branched), linear alpha-1,5-L-arabinan and pectin, and are different from other arabinases; they are organized into two different domains with a divalent metal cluster close to the catalytic residues to guarantee the correct protonation state of the catalytic residues and consequently the enzyme activity. These arabinan-degrading enzymes are important in the food industry for efficient production of L-arabinose from agricultural waste; L-arabinose is often used as a bioactive sweetener.  A common structural feature of GH43 enzymes is a 5-bladed beta-propeller domain that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller."
definition: >-
  Glycosyl hydrolase family 43 protein such as Aspergillus niger endo-alpha-L-arabinanase (AbnA). This glycosyl hydrolase family 43 (GH43) subgroup includes characterized enzymes with endo-alpha-L-arabinanase (ABN; EC 3.2.1.99) activities such as Aspergillus niger AbnA, Aspergillus niveus AbnA, and Chrysosporium lucknowense Abn1. It belongs to the GH43_Arb43a subgroup of the glycosyl hydrolase clan F (according to carbohydrate-active enzymes database (CAZY)) which includes family 43 (GH43) and 62 (GH62) families. GH43_Arb43a subgroup includes mostly enzymes with alpha-L-arabinofuranosidase (ABF; EC 3.2.1.55) and endo-alpha-L-arabinanase activities. These are inverting enzymes (i.e. they invert the stereochemistry of the anomeric carbon atom of the substrate) that have an aspartate as the catalytic general base, a glutamate as the catalytic general acid and another aspartate that is responsible for pKa modulation and orienting the catalytic acid. The GH43 ABN enzymes hydrolyze alpha-1,5-L-arabinofuranoside linkages while the ABF enzymes cleave arabinose side chains so that the combined actions of these two enzymes reduce arabinan to L-arabinose and/or arabinooligosaccharides. The GH43_Arb43a subgroup includes many enzymes such as Bacillus subtilis arabinanase Abn2, that hydrolyzes sugar beet arabinan (branched), linear alpha-1,5-L-arabinan and pectin, and are different from other arabinases; they are organized into two different domains with a divalent metal cluster close to the catalytic residues to guarantee the correct protonation state of the catalytic residues and consequently the enzyme activity. These arabinan-degrading enzymes are important in the food industry for efficient production of L-arabinose from agricultural waste; L-arabinose is often used as a bioactive sweetener. A common structural feature of GH43 enzymes is a 5-bladed beta-propeller domain that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller. — an NCBI CDD conserved domain (cd18831); members share this curated model.
