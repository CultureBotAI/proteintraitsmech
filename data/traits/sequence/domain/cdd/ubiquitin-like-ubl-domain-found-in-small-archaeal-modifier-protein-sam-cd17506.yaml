identifier: CDD:cd17506
label: "ubiquitin-like (Ubl) domain found in small archaeal modifier protein (SAMP2). Ubiquitin-like small archaeal modifier protein 2 (SAMP2) shows a beta-grasp fold of Ub, suggesting that this archaeal Ubl molecule is more closely related to eukaryotic Ub and Ubls than to its prokaryotic counterpart. Several Ub-like structural features such as an N-terminal single lysine residue and di-glycine motif at the C-terminus, spatially isolated, implicate formation of a poly-SAMPylated chainpoly-SAMPylation. SAMP2 can form covalent conjugates with its protein targets through an isopeptide linkage via their C-terminal diglycine motif in a streamlined archaeal E1-dependent pathway. It also forms homo-conjugates through the intermolecular isopeptide bond between the C-terminal Gly and the Lys58 side chain, a feature that likely resembles polyubiquitination. SAMP2 is involved in sulfur transfer during tRNA thiolation much like Urm1. This family also includes uncharacterized proteins such as Methanothermococcus thermolithotrophicus Mth1743, Pyrococcus furiosus PF1061 and others, all closely related to proteins MoaD."
definition: >-
  ubiquitin-like (Ubl) domain found in small archaeal modifier protein (SAMP2). Ubiquitin-like small archaeal modifier protein 2 (SAMP2) shows a beta-grasp fold of Ub, suggesting that this archaeal Ubl molecule is more closely related to eukaryotic Ub and Ubls than to its prokaryotic counterpart. Several Ub-like structural features such as an N-terminal single lysine residue and di-glycine motif at the C-terminus, spatially isolated, implicate formation of a poly-SAMPylated chainpoly-SAMPylation. SAMP2 can form covalent conjugates with its protein targets through an isopeptide linkage via their C-terminal diglycine motif in a streamlined archaeal E1-dependent pathway. It also forms homo-conjugates through the intermolecular isopeptide bond between the C-terminal Gly and the Lys58 side chain, a feature that likely resembles polyubiquitination. SAMP2 is involved in sulfur transfer during tRNA thiolation much like Urm1. This family also includes uncharacterized proteins such as Methanothermococcus thermolithotrophicus Mth1743, Pyrococcus furiosus PF1061 and others, all closely related to proteins MoaD. — an NCBI CDD conserved domain (cd17506); members share this curated model.
