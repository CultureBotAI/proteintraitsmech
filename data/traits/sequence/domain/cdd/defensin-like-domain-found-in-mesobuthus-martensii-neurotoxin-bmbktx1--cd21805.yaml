identifier: CDD:cd21805
label: "defensin-like domain found in Mesobuthus martensii neurotoxin BmBKTx1 and similar proteins. BmBKTx1, also called potassium channel toxin alpha-KTx 19.1, or BmK37, is a selective inhibitor of high conductance calcium-activated potassium channels KCa1.1/KCNMA1. It belongs to a family of short-chain alpha-KTx toxins of the potassium channel (also called alpha-KTx19) and may be insect specific. This subfamily also includes Arabidopsis thaliana defensin-like protein 32 (AtDEF32). Its biological function remains unclear. This model corresponds to the defensin-like (DEFL) domain of BmBKTx1 and AtDEF32, which adopts a typical structure characterized by cysteine-stabilized alpha/beta scaffold."
definition: >-
  defensin-like domain found in Mesobuthus martensii neurotoxin BmBKTx1 and similar proteins. BmBKTx1, also called potassium channel toxin alpha-KTx 19.1, or BmK37, is a selective inhibitor of high conductance calcium-activated potassium channels KCa1.1/KCNMA1. It belongs to a family of short-chain alpha-KTx toxins of the potassium channel (also called alpha-KTx19) and may be insect specific. This subfamily also includes Arabidopsis thaliana defensin-like protein 32 (AtDEF32). Its biological function remains unclear. This model corresponds to the defensin-like (DEFL) domain of BmBKTx1 and AtDEF32, which adopts a typical structure characterized by cysteine-stabilized alpha/beta scaffold. — an NCBI CDD conserved domain (cd21805); members share this curated model.
