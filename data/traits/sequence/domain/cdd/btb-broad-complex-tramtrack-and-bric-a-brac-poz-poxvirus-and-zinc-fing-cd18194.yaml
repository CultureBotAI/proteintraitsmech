identifier: CDD:cd18194
label: BTB_POZ_ZBTB3-like
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing proteins, ZBTB3, ZBTB18, ZBTB42 and similar proteins. The family includes zinc finger and BTB domain-containing proteins, ZBTB3, ZBTB18 and ZBTB42. ZBTB3 is a transcription factor essential for cancer cell growth via the regulation of the reactive oxygen species (ROS) detoxification pathway. ZBTB18 is a sequence-specific transrepressor associated with heterochromatin. ZBTB42 is a transcriptional repressor that specifically binds DNA and probably acts by recruiting chromatin remodeling multiprotein complexes. Members of this family contain a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids
