identifier: CDD:cd11907
label: "Src Homology 3 domain of TXK, also called Resting lymphocyte kinase (Rlk). TXK is a cytoplasmic (or nonreceptor) tyr kinase containing Src homology protein interaction domains (SH3, SH2) N-terminal to the catalytic tyr kinase domain. It also contains an N-terminal cysteine-rich region. Rlk is expressed in T-cells and mast cell lines, and is a key component of T-cell receptor (TCR) signaling. It is important in TCR-stimulated proliferation, IL-2 production and phospholipase C-gamma1 activation. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
