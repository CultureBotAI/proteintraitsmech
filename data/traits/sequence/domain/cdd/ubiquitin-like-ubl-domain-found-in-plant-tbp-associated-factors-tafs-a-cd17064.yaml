identifier: CDD:cd17064
label: "ubiquitin-like (Ubl) domain found in plant TBP-associated factors (TAFs) and similar proteins. TAFs, also termed transcription initiation factor TFIID subunits, or TAFII250 subunits, are components of the TFIID complex, a multisubunit protein complex involved in promoter recognition and essential for mediating regulation of RNA polymerase transcription. TAFs is the core scaffold of the TFIID complex, which is comprised of the TATA binding protein (TBP) and 12-15 TAFs. TAFs contain a ubiquitin-like (Ubl) domain and a Bromo domain."
definition: >-
  ubiquitin-like (Ubl) domain found in plant TBP-associated factors (TAFs) and similar proteins. TAFs, also termed transcription initiation factor TFIID subunits, or TAFII250 subunits, are components of the TFIID complex, a multisubunit protein complex involved in promoter recognition and essential for mediating regulation of RNA polymerase transcription. TAFs is the core scaffold of the TFIID complex, which is comprised of the TATA binding protein (TBP) and 12-15 TAFs. TAFs contain a ubiquitin-like (Ubl) domain and a Bromo domain. — an NCBI CDD conserved domain (cd17064); members share this curated model.
