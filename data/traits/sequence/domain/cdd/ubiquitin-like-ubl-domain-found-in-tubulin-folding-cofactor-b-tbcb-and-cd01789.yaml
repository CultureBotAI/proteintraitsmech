identifier: CDD:cd01789
label: "ubiquitin-like (Ubl) domain found in tubulin-folding cofactor B (TBCB) and similar proteins. TBCB, also termed cytoskeleton-associated protein 1, or cytoskeleton-associated protein CKAPI, or tubulin-specific chaperone B, is one of protein cofactors A through E that is required for the folding of tubulins prior to their incorporation into microtubules and heterodimer assembly. TBCB comprises an N-terminal ubiquitin-like (Ubl) domain and a C-terminal cytoskeleton-associated protein with glycine-rich segment (CAP-Gly) domain. The Ubl domain of TBCB is essential for proper folding and assembly of tubulin alpha. It has a beta-grasp Ubl fold, a common structure involved in protein-protein interactions. Ubiquitin (Ub) is a protein modifier in eukaryotes that is involved in various cellular processes, including transcriptional regulation, cell cycle control, and DNA repair. TBC-A through E are necessary for the biogenesis of microtubules and for cell viability."
definition: >-
  ubiquitin-like (Ubl) domain found in tubulin-folding cofactor B (TBCB) and similar proteins. TBCB, also termed cytoskeleton-associated protein 1, or cytoskeleton-associated protein CKAPI, or tubulin-specific chaperone B, is one of protein cofactors A through E that is required for the folding of tubulins prior to their incorporation into microtubules and heterodimer assembly. TBCB comprises an N-terminal ubiquitin-like (Ubl) domain and a C-terminal cytoskeleton-associated protein with glycine-rich segment (CAP-Gly) domain. The Ubl domain of TBCB is essential for proper folding and assembly of tubulin alpha. It has a beta-grasp Ubl fold, a common structure involved in protein-protein interactions. Ubiquitin (Ub) is a protein modifier in eukaryotes that is involved in various cellular processes, including transcriptional regulation, cell cycle control, and DNA repair. TBC-A through E are necessary for the biogenesis of microtubules and for cell viability. — an NCBI CDD conserved domain (cd01789); members share this curated model.
