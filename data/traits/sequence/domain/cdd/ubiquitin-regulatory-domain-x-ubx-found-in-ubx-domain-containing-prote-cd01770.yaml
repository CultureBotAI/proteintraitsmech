identifier: CDD:cd01770
label: "Ubiquitin regulatory domain X (UBX) found in UBX domain-containing proteins UBXN2A, UBXN2B, NSFL1C/UBXN2C, and similar proteins. This family includes UBX domain-containing proteins UBXN2A, UBXN2B, and NSFL1C/UBXN2C, which contain a SEP (Saccharomyces cerevisiae Shp1, Drosophila melanogaster eyes closed gene (eyc), and vertebrate p47) domain, and a ubiquitin regulatory domain X (UBX) with a beta-grasp ubiquitin-like fold at the C-terminus. UBX domain participates broadly in the regulation of protein degradation. UBXN2A, UBXN2B, and UBXN2C function as the adaptor proteins of p97 (also known as VCP or Cdc48), which is a homohexameric AAA ATPase (ATPase associated with a variety of activities) involved in a variety of functions ranging from cell-cycle regulation to membrane fusion and protein degradation."
definition: >-
  Ubiquitin regulatory domain X (UBX) found in UBX domain-containing proteins UBXN2A, UBXN2B, NSFL1C/UBXN2C, and similar proteins. This family includes UBX domain-containing proteins UBXN2A, UBXN2B, and NSFL1C/UBXN2C, which contain a SEP (Saccharomyces cerevisiae Shp1, Drosophila melanogaster eyes closed gene (eyc), and vertebrate p47) domain, and a ubiquitin regulatory domain X (UBX) with a beta-grasp ubiquitin-like fold at the C-terminus. UBX domain participates broadly in the regulation of protein degradation. UBXN2A, UBXN2B, and UBXN2C function as the adaptor proteins of p97 (also known as VCP or Cdc48), which is a homohexameric AAA ATPase (ATPase associated with a variety of activities) involved in a variety of functions ranging from cell-cycle regulation to membrane fusion and protein degradation. — an NCBI CDD conserved domain (cd01770); members share this curated model.
