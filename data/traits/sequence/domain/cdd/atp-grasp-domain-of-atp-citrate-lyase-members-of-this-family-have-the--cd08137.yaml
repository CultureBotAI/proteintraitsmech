identifier: CDD:cd08137
label: "ATP-grasp domain of ATP-citrate lyase. Members of this family have the ATP-grasp domain at the N-terminal end of ATP citrate lyase (ACL). ACL (EC 4.1.3.8) catalyzes the cleavage of citrate into acetyl-CoA and oxaloacetate in the presence of ATP and Coenzyme A. Members of this family are homologous to succinyl CoA synthetase. Plant ACL is a heteromeric enzyme with two subunits ACLA and ACLB. Human ACL is a tetramer of identical subunits. In mammalian cells, histone acetylation is dependent on ATP-citrate lyase (ACL). ACLY from humans, and ACLA-1, ACLA-2, and ACLA-3 from Arabidopsis thaliana belong to this subfamily."
definition: >-
  ATP-grasp domain of ATP-citrate lyase. Members of this family have the ATP-grasp domain at the N-terminal end of ATP citrate lyase (ACL). ACL (EC 4.1.3.8) catalyzes the cleavage of citrate into acetyl-CoA and oxaloacetate in the presence of ATP and Coenzyme A. Members of this family are homologous to succinyl CoA synthetase. Plant ACL is a heteromeric enzyme with two subunits ACLA and ACLB. Human ACL is a tetramer of identical subunits. In mammalian cells, histone acetylation is dependent on ATP-citrate lyase (ACL). ACLY from humans, and ACLA-1, ACLA-2, and ACLA-3 from Arabidopsis thaliana belong to this subfamily. — an NCBI CDD conserved domain (cd08137); members share this curated model.
