identifier: CDD:cd17687
label: "RUN domain found in small G protein signaling modulators, SGSM1, SGSM2, and similar proteins. SGSM1, also called RUN and TBC1 domain-containing protein 2 (RUTBC2), interacts with numerous Rab family members, functioning as Rab effector for some, and as GTPase activator for others. It is a Rab9A effector and GTPase-activating protein for Rab36, and links Rab9A function to Rab36 function in the endosomal system. SGSM2, also called RUN and TBC1 domain-containing protein 1 (RUTBC1), is a GTPase-activating protein for Rab32/38, and regulates melanogenic enzyme trafficking in melanocytes. It also acts as a Rab9A effector that activates GTP hydrolysis by Rab32 and Rab33B proteins. This model contains the RUN domain of SGSM1 and SGSM2."
definition: >-
  RUN domain found in small G protein signaling modulators, SGSM1, SGSM2, and similar proteins. SGSM1, also called RUN and TBC1 domain-containing protein 2 (RUTBC2), interacts with numerous Rab family members, functioning as Rab effector for some, and as GTPase activator for others. It is a Rab9A effector and GTPase-activating protein for Rab36, and links Rab9A function to Rab36 function in the endosomal system. SGSM2, also called RUN and TBC1 domain-containing protein 1 (RUTBC1), is a GTPase-activating protein for Rab32/38, and regulates melanogenic enzyme trafficking in melanocytes. It also acts as a Rab9A effector that activates GTP hydrolysis by Rab32 and Rab33B proteins. This model contains the RUN domain of SGSM1 and SGSM2. — an NCBI CDD conserved domain (cd17687); members share this curated model.
