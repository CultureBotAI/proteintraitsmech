identifier: CDD:cd05388
label: "N-terminal domain of cobyrinic acid a,c-diamide synthase. Cobyrinic acid a,c-diamide synthase (CobB, CbiA). Biosynthesis of cobalamin (vitamin B12) requires more than two dozen different enzymes. CobB catalyzes the ATP-dependent amidation of the two carboxylate groups at positions a and c of cobyrinic acid, via the formation of a phosphorylated intermediate, using glutamine or ammonia as the nitrogen source. CobB is comprised of two protein domains: the C-terminal glutaminase domain and the N-terminal ATP-binding domain. The glutaminase domain catalyzes the hydrolysis of glutamine to glutamate and ammonia. It belongs to the triad class of glutamine amidotransferases. This classification is based on the N-terminal domain which catalyzes the ultimate synthesis of the diamide product by using energy from the hydrolysis of ATP and ammonia transferred from the C-terminal domain."
