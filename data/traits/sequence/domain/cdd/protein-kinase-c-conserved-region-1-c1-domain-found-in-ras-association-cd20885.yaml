identifier: CDD:cd20885
label: "protein kinase C conserved region 1 (C1 domain) found in Ras association domain-containing protein 1 (RASSF1) and similar proteins. RASSF1 is a member of a family of RAS effectors, of which there are currently 8 members (RASSF1-8), all containing a Ras-association (RA) domain of the Ral-GDS/AF6 type. RASSF1 has eight transcripts (A-H) arising from alternative splicing and differential promoter usage. RASSF1A and 1C are the most extensively studied RASSF1 with both localized to microtubules and involved in regulation of growth and migration. RASSF1 is a potential tumor suppressor that is required for death receptor-dependent apoptosis. It contains a C1 domain, which is descibed in this model. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in Ras association domain-containing protein 1 (RASSF1) and similar proteins. RASSF1 is a member of a family of RAS effectors, of which there are currently 8 members (RASSF1-8), all containing a Ras-association (RA) domain of the Ral-GDS/AF6 type. RASSF1 has eight transcripts (A-H) arising from alternative splicing and differential promoter usage. RASSF1A and 1C are the most extensively studied RASSF1 with both localized to microtubules and involved in regulation of growth and migration. RASSF1 is a potential tumor suppressor that is required for death receptor-dependent apoptosis. It contains a C1 domain, which is descibed in this model. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20885); members share this curated model.
