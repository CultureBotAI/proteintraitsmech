identifier: CDD:cd12960
label: Spider_toxin
definition: >-
  Spider neurotoxins including agatoxin, purotoxin and ctenitoxin. This domain family contains spider toxins that include the omega-Aga-IVB, a P-type calcium channel antagonist from venom of the funnel web spider, Agelenopsis aperta, as well as purotoxin-1 (PT1), a spider peptide venom of the Central Asian spider Geolycosa sp., which specifically exerts inhibitory action on P2X3 purinoreceptors at nanomolar concentrations. These spider toxins, which are ion channel blockers, share a common structural motif composed of a triple-stranded antiparallel beta-sheet, stabilized by internal disulfide bonds known as cystine knots
