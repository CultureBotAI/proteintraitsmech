identifier: CDD:cd04933
label: "ACT domains located C-terminal to the catalytic domain of a monofunctional, lysine-sensitive, plant aspartate kinase 1 (AK1). This CD includes the first of two ACT domains located C-terminal to the catalytic domain of a monofunctional, lysine-sensitive, plant aspartate kinase 1 (AK1), which can be synergistically inhibited by S-adenosylmethionine. This isoenzyme is found in higher plants, Arabidopsis thaliana (AT) and Zea mays, and also in Chlorophyta. Like the Escherichia coli AKIII (LysC), Arabidopsis AK1 binds two feedback allosteric inhibitor lysine molecules at the dimer interface located between the ACT1 domain of two subunits. A loop in common is involved in the binding of both Lys and S-adenosylmethionine providing an explanation for the synergistic inhibition by these effectors. Members of this CD belong to the superfamily of ACT regulatory domains."
definition: >-
  ACT domains located C-terminal to the catalytic domain of a monofunctional, lysine-sensitive, plant aspartate kinase 1 (AK1). This CD includes the first of two ACT domains located C-terminal to the catalytic domain of a monofunctional, lysine-sensitive, plant aspartate kinase 1 (AK1), which can be synergistically inhibited by S-adenosylmethionine. This isoenzyme is found in higher plants, Arabidopsis thaliana (AT) and Zea mays, and also in Chlorophyta. Like the Escherichia coli AKIII (LysC), Arabidopsis AK1 binds two feedback allosteric inhibitor lysine molecules at the dimer interface located between the ACT1 domain of two subunits. A loop in common is involved in the binding of both Lys and S-adenosylmethionine providing an explanation for the synergistic inhibition by these effectors. Members of this CD belong to the superfamily of ACT regulatory domains. — an NCBI CDD conserved domain (cd04933); members share this curated model.
