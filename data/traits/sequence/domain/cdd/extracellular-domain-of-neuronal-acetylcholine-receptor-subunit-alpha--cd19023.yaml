  extracellular domain of neuronal acetylcholine receptor subunit alpha 10 (CHRNA10). This subfamily contains the extracellular domain of nicotinic acetylcholine receptor subunit alpha 10 (alpha10), encoded by the CHRNA10 gene. This protein is involved in cochlea hair cell development and is also expressed in the outer hair cells (OHCs) of the adult cochlea as well as in keratinocytes, the pituitary gland, B-cells, and T-cells. Unlike alpha9 nAChR subunits, alpha10 subunits do not generate functional channels when expressed heterologously, suggesting that alpha10 might serve as a structural subunit, much like a beta subunit of heteromeric receptors, providing only complementary components to the agonist binding site. Mammalian alpha10 subunits can form functional heteromeric alpha9alpha10 receptors, an atypical heteromeric receptor since it is composed only of alpha subunits compared to nAChRs typically assembled from alpha and beta subunits. A stoichiometry of (alpha9)2(alpha10)3 has been determined for the rat recombinant receptor. The alpha9alpha10 nAChR is an important therapeutic target for pain; selective block of alpha9alpha10 nicotinic acetylcholine receptors by the conotoxin RgIA has been shown to be analgesic in an animal model of nerve injury pain, and accelerates recovery of nerve function after injury, possibly through immune/inflammatory-mediated mechanisms. — an NCBI CDD conserved domain (cd19023); members share this curated model.
