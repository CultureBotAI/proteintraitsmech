identifier: CDD:cd14138
label: "Catalytic domain of the Protein Tyrosine Kinase, Wee1a. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. This subfamily is composed of human Wee1a, Xenopus laevis Wee1b (XeWee1b) and similar vertebrate proteins. Members of this subfamily show a wide expression pattern. XeWee1b functions after the first zygotic cell divisions. It is expressed in all tissues and is also present after the gastrulation stage of embryos. Wee1 is a cell cycle checkpoint kinase that helps keep the cyclin-dependent kinase CDK1 in an inactive state through phosphorylation of an N-terminal tyr (Y15) residue. During the late G2 phase, CDK1 is activated and mitotic entry is promoted by the removal of this inhibitory phosphorylation by the phosphatase Cdc25. Although Wee1 is functionally a tyr kinase, it is more closely related to serine/threonine kinases (STKs). It contains a catalytic kinase domain sandwiched in between N- and C-terminal regulatory domains. It is regulated by phosphorylation and degradation, and its expression levels are also controlled by circadian clock proteins. The Wee1a subfamily is part of a larger superfamily that includes the catalytic domains of STKs, other PTKs, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Protein Tyrosine Kinase, Wee1a. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. This subfamily is composed of human Wee1a, Xenopus laevis Wee1b (XeWee1b) and similar vertebrate proteins. Members of this subfamily show a wide expression pattern. XeWee1b functions after the first zygotic cell divisions. It is expressed in all tissues and is also present after the gastrulation stage of embryos. Wee1 is a cell cycle checkpoint kinase that helps keep the cyclin-dependent kinase CDK1 in an inactive state through phosphorylation of an N-terminal tyr (Y15) residue. During the late G2 phase, CDK1 is activated and mitotic entry is promoted by the removal of this inhibitory phosphorylation by the phosphatase Cdc25. Although Wee1 is functionally a tyr kinase, it is more closely related to serine/threonine kinases (STKs). It contains a catalytic kinase domain sandwiched in between N- and C-terminal regulatory domains. It is regulated by phosphorylation and degradation, and its expression levels are also controlled by circadian clock proteins. The Wee1a subfamily is part of a larger superfamily that includes the catalytic domains of STKs, other PTKs, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14138); members share this curated model.
