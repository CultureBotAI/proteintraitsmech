identifier: CDD:cd14606
label: "catalytic domain of tyrosine-protein phosphatase non-receptor type 6. Tyrosine-protein phosphatase non-receptor type 6 (PTPN6), also called SH2 domain-containing protein-tyrosine phosphatase 1 (SHP1 or SHP-1), belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPN6 expression is restricted mainly to hematopoietic and epithelial cells. It is an important regulator of hematopoietic cells, downregulating pathways that promote cell growth, survival, adhesion, and activation. It regulates glucose homeostasis by modulating insulin signalling in the liver and muscle, and it also negatively regulates bone resorption, affecting both the formation and the function of osteoclasts. PTPN6 contains two tandem SH2 domains, a catalytic PTP domain, and a C-terminal tail with regulatory properties."
