identifier: CDD:cd17987
label: "DEXH-box helicase domain of YTH domain containing 2. YTH domain containing 2 (YTHDC2) regulates mRNA translation and stability via binding to N6-methyladenosine, a modified RNA nucleotide enriched in the stop codons and 3' UTRs of eukaryotic messenger RNAs. YTHDC2 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of YTH domain containing 2. YTH domain containing 2 (YTHDC2) regulates mRNA translation and stability via binding to N6-methyladenosine, a modified RNA nucleotide enriched in the stop codons and 3' UTRs of eukaryotic messenger RNAs. YTHDC2 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17987); members share this curated model.
