identifier: CDD:cd10355
label: "Src homology 2 domain found in dual adaptor for phosphotyrosine and 3-phosphoinositides ( DAPP1)/B lymphocyte adaptor molecule of 32 kDa (Bam32)-like proteins. DAPP1/Bam32 contains a putative myristoylation site at its N-terminus, followed by a SH2 domain, and a pleckstrin homology (PH) domain at its C-terminus. DAPP1 could potentially be recruited to the cell membrane by any of these domains. Its putative myristoylation site could facilitate the interaction of DAPP1 with the lipid bilayer. Its SH2 domain may also interact with phosphotyrosine residues on membrane-associated proteins such as activated tyrosine kinase receptors. And finally its PH domain exhibits a high-affinity interaction with the PtdIns(3,4,5)P(3) PtdIns(3,4)P(2) second messengers produced at the cell membrane following the activation of PI 3-kinases. DAPP1 is thought to interact with both tyrosine phosphorylated proteins and 3-phosphoinositides and therefore may play a role in regulating the location and/or activity of such proteins(s) in response to agonists that elevate PtdIns(3,4,5)P(3) and PtdIns(3,4)P(2). This protein is likely to play an important role in triggering signal transduction pathways that lie downstream from receptor tyrosine kinases and PI 3-kinase. It is likely that DAPP1 functions as an adaptor to recruit other proteins to the plasma membrane in response to extracellular signals. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 domain found in dual adaptor for phosphotyrosine and 3-phosphoinositides ( DAPP1)/B lymphocyte adaptor molecule of 32 kDa (Bam32)-like proteins. DAPP1/Bam32 contains a putative myristoylation site at its N-terminus, followed by a SH2 domain, and a pleckstrin homology (PH) domain at its C-terminus. DAPP1 could potentially be recruited to the cell membrane by any of these domains. Its putative myristoylation site could facilitate the interaction of DAPP1 with the lipid bilayer. Its SH2 domain may also interact with phosphotyrosine residues on membrane-associated proteins such as activated tyrosine kinase receptors. And finally its PH domain exhibits a high-affinity interaction with the PtdIns(3,4,5)P(3) PtdIns(3,4)P(2) second messengers produced at the cell membrane following the activation of PI 3-kinases. DAPP1 is thought to interact with both tyrosine phosphorylated proteins and 3-phosphoinositides and therefore may play a role in regulating the location and/or activity of such proteins(s) in response to agonists that elevate PtdIns(3,4,5)P(3) and PtdIns(3,4)P(2). This protein is likely to play an important role in triggering signal transduction pathways that lie downstream from receptor tyrosine kinases and PI 3-kinase. It is likely that DAPP1 functions as an adaptor to recruit other proteins to the plasma membrane in response to extracellular signals. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10355); members share this curated model.
