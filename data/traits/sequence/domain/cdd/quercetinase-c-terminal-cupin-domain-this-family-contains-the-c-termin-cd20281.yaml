identifier: CDD:cd20281
label: "quercetinase, C-terminal cupin domain. This family contains the C-terminal domain of quercetinase (also known as quercetin 2,3-dioxygenase, 2,3QD, QDO and YxaG; EC 1.13.11.24), a mononuclear copper-dependent dioxygenase that catalyzes the cleavage of the flavonol quercetin (5,7,3',4'-tetrahydroxyflavonol) heterocyclic ring to produce 2-protocatechuoyl-phloroglucinol carboxylic acid and carbon monoxide. This family includes Aspergillus japonicus quercetin 2,3-dioxygenase (QDO), a homodimer that shows oxygenase activity with Cu2+. The dioxygen binds to the metal ion of the Cu-QDO-quercetin complex, yielding a Cu2+-superoxo quercetin radical intermediate, which forms a Cu2+-alkylperoxo complex that evolves into an endoperoxide intermediate that decomposes to the product. Quercetinase is a bicupin with two tandem cupin beta-barrel domains, only the C-terminal domain is included in this alignment. The pirins, which also belong to the cupin domain family, have been shown to catalyze a reaction involving quercetin and may have a function similar to that of quercetinase."
definition: >-
  quercetinase, C-terminal cupin domain. This family contains the C-terminal domain of quercetinase (also known as quercetin 2,3-dioxygenase, 2,3QD, QDO and YxaG; EC 1.13.11.24), a mononuclear copper-dependent dioxygenase that catalyzes the cleavage of the flavonol quercetin (5,7,3',4'-tetrahydroxyflavonol) heterocyclic ring to produce 2-protocatechuoyl-phloroglucinol carboxylic acid and carbon monoxide. This family includes Aspergillus japonicus quercetin 2,3-dioxygenase (QDO), a homodimer that shows oxygenase activity with Cu2+. The dioxygen binds to the metal ion of the Cu-QDO-quercetin complex, yielding a Cu2+-superoxo quercetin radical intermediate, which forms a Cu2+-alkylperoxo complex that evolves into an endoperoxide intermediate that decomposes to the product. Quercetinase is a bicupin with two tandem cupin beta-barrel domains, only the C-terminal domain is included in this alignment. The pirins, which also belong to the cupin domain family, have been shown to catalyze a reaction involving quercetin and may have a function similar to that of quercetinase. — an NCBI CDD conserved domain (cd20281); members share this curated model.
