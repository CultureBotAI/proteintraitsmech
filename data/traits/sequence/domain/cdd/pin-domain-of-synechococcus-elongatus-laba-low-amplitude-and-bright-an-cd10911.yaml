identifier: CDD:cd10911
label: "PIN domain of Synechococcus elongatus LabA (low-amplitude and bright) and related proteins. This subfamily contains Synechococcus elongatus PCC 7942 LabA which participates in cyanobacterial circadian timing, it is required for negative feedback regulation of the autokinase/autophosphatase KaiC, a central component of the circadian clock system, and appears to be necessary for KaiC-dependent repression of gene expression. This subfamily belongs to the LabA-like domain family which includes the N-terminal domain of limkain b1, a human autoantigen localized to a subset of ABCD3 and PXF marked peroxisomes. Also included in the LabA-like domain family are human ZNF451, uncharacterized Bacillus subtilis YqxD, uncharacterized Escherichia coli YaiI, and the N-terminal domain of a well-conserved group of mainly bacterial proteins with no defined function, which contain a C-terminal LabA_like_C domain. Curiously Pseudomonas putida S16 NicB , which is described as a putative NADH-dependent hydroxylase involved in the microbial degradation of nicotine also falls into the LabA-like family. The PIN (PilT N terminus) domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its active center, consisting of three highly conserved catalytic residues which coordinate metal ions; in some members, additional metal coordinating residues can be found while some others lack several of these key catalytic residues. The PIN active site is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons."
definition: >-
  PIN domain of Synechococcus elongatus LabA (low-amplitude and bright) and related proteins. This subfamily contains Synechococcus elongatus PCC 7942 LabA which participates in cyanobacterial circadian timing, it is required for negative feedback regulation of the autokinase/autophosphatase KaiC, a central component of the circadian clock system, and appears to be necessary for KaiC-dependent repression of gene expression. This subfamily belongs to the LabA-like domain family which includes the N-terminal domain of limkain b1, a human autoantigen localized to a subset of ABCD3 and PXF marked peroxisomes. Also included in the LabA-like domain family are human ZNF451, uncharacterized Bacillus subtilis YqxD, uncharacterized Escherichia coli YaiI, and the N-terminal domain of a well-conserved group of mainly bacterial proteins with no defined function, which contain a C-terminal LabA_like_C domain. Curiously Pseudomonas putida S16 NicB , which is described as a putative NADH-dependent hydroxylase involved in the microbial degradation of nicotine also falls into the LabA-like family. The PIN (PilT N terminus) domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its active center, consisting of three highly conserved catalytic residues which coordinate metal ions; in some members, additional metal coordinating residues can be found while some others lack several of these key catalytic residues. The PIN active site is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons. — an NCBI CDD conserved domain (cd10911); members share this curated model.
