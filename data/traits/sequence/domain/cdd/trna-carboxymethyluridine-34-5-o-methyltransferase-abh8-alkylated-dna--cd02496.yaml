identifier: CDD:cd02496
label: AdoMet_MTase_I_ALKBH8
definition: >-
  tRNA (carboxymethyluridine(34)-5-O)-methyltransferase ABH8. Alkylated DNA repair protein alkB homolog 8; S-adenosyl-L-methionine-dependent tRNA methyltransferase ABH8; tRNA (carboxymethyluridine(34)-5-O)-methyltransferase ABH8 catalyzes the methylation of 5-carboxymethyl uridine to 5-methylcarboxymethyl uridine at the wobble position of the anticodon loop in tRNA via its methyltransferase domain;;S-adenosylmethionine-dependent methyltransferases (SAM or AdoMet-MTase), class I; AdoMet-MTases are enzymes that use S-adenosyl-L-methionine (SAM or AdoMet) as a substrate for methyltransfer, creating the product S-adenosyl-L-homocysteine (AdoHcy). There are at least five structurally distinct families of AdoMet-MTases, class I being the largest and most diverse. Within this class enzymes can be classified by different substrate specificity (small molecules, lipids, nucleic acids, etc) and different target atoms for methylation (nitrogen, oxygen, carbon, sulfur,etc)
