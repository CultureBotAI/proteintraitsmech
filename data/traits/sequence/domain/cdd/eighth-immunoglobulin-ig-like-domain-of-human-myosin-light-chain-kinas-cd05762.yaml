identifier: CDD:cd05762
label: "Eighth immunoglobulin (Ig)-like domain of human myosin light-chain kinase (MLCK) and similar protein; member of the I-set of IgSF domains. The members here are composed of the eighth immunoglobulin (Ig)-like domain of human myosin light-chain kinase (MLCK) and similar proteins. Myosin light-chain kinase (MLCK) is a key regulator of different forms of cell motility involving actin and myosin II.  Agonist stimulation of smooth muscle cells increases cytosolic Ca2+ which binds calmodulin.  This Ca2+-calmodulin complex in turn binds to and activates MLCK. Activated MLCK leads to the phosphorylation of the 20 kDa myosin regulatory light chain (RLC) of myosin II and the stimulation of actin-activated myosin MgATPase activity. MLCK is widely present in vertebrate tissues; it phosphorylates the 20 kDa RLC of both smooth and nonmuscle myosin II. Phosphorylation leads to the activation of the myosin motor domain and altered structural properties of myosin II. In smooth muscle MLCK it is involved in initiating contraction. In nonmuscle cells, MLCK may participate in cell division and cell motility; it has been suggested MLCK plays a role in cardiomyocyte differentiation and contraction through regulation of nonmuscle myosin II."
definition: >-
  Eighth immunoglobulin (Ig)-like domain of human myosin light-chain kinase (MLCK) and similar protein; member of the I-set of IgSF domains. The members here are composed of the eighth immunoglobulin (Ig)-like domain of human myosin light-chain kinase (MLCK) and similar proteins. Myosin light-chain kinase (MLCK) is a key regulator of different forms of cell motility involving actin and myosin II. Agonist stimulation of smooth muscle cells increases cytosolic Ca2+ which binds calmodulin. This Ca2+-calmodulin complex in turn binds to and activates MLCK. Activated MLCK leads to the phosphorylation of the 20 kDa myosin regulatory light chain (RLC) of myosin II and the stimulation of actin-activated myosin MgATPase activity. MLCK is widely present in vertebrate tissues; it phosphorylates the 20 kDa RLC of both smooth and nonmuscle myosin II. Phosphorylation leads to the activation of the myosin motor domain and altered structural properties of myosin II. In smooth muscle MLCK it is involved in initiating contraction. In nonmuscle cells, MLCK may participate in cell division and cell motility; it has been suggested MLCK plays a role in cardiomyocyte differentiation and contraction through regulation of nonmuscle myosin II. — an NCBI CDD conserved domain (cd05762); members share this curated model.
