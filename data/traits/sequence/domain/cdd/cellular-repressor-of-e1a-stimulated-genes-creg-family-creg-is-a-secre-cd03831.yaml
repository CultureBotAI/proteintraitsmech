identifier: CDD:cd03831
label: "Cellular repressor of E1A-stimulated genes (CREG) family. CREG is a secreted glycoprotein. It enhances cell differentiation and reduces cell proliferation. CREG binds to the cation-independent mannose six-phosphate (M6P)/insulin-like growth factor II receptor (IGF2R). This receptor is required for CREG-mediated cellular growth suppression. Although CREG is a structural homolog of FMN-binding oxidase, it does not bind this cofactor and has been adapted during evolution to perform other functions besides FMN-dependent oxidation."
definition: >-
  Cellular repressor of E1A-stimulated genes (CREG) family. CREG is a secreted glycoprotein. It enhances cell differentiation and reduces cell proliferation. CREG binds to the cation-independent mannose six-phosphate (M6P)/insulin-like growth factor II receptor (IGF2R). This receptor is required for CREG-mediated cellular growth suppression. Although CREG is a structural homolog of FMN-binding oxidase, it does not bind this cofactor and has been adapted during evolution to perform other functions besides FMN-dependent oxidation. — an NCBI CDD conserved domain (cd03831); members share this curated model.
