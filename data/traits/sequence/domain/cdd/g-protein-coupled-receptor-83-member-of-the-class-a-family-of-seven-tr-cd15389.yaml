identifier: CDD:cd15389
label: "G protein-coupled receptor 83, member of the class A family of seven-transmembrane G protein-coupled receptors. GPR83, also known as GPR72, is widely expressed in the brain, including hypothalamic nuclei which is involved in regulating energy balance and food intake. The hypothalamic expression of GPR83 is tightly regulated in response to nutrient availability and is decreased in obese mice. A recent study suggests that GPR83 has a critical role in the regulation of systemic energy metabolism via ghrelin-dependent and ghrelin-independent mechanisms. GPR83 shares a significant amino acid sequence identity with the tachykinin receptors, however its endogenous ligand is unknown."
definition: >-
  G protein-coupled receptor 83, member of the class A family of seven-transmembrane G protein-coupled receptors. GPR83, also known as GPR72, is widely expressed in the brain, including hypothalamic nuclei which is involved in regulating energy balance and food intake. The hypothalamic expression of GPR83 is tightly regulated in response to nutrient availability and is decreased in obese mice. A recent study suggests that GPR83 has a critical role in the regulation of systemic energy metabolism via ghrelin-dependent and ghrelin-independent mechanisms. GPR83 shares a significant amino acid sequence identity with the tachykinin receptors, however its endogenous ligand is unknown. — an NCBI CDD conserved domain (cd15389); members share this curated model.
