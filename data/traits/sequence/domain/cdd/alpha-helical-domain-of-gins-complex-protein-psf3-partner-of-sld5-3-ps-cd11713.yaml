identifier: CDD:cd11713
label: "Alpha-helical domain of GINS complex protein Psf3 (partner of Sld5 3). Psf3 is a component of GINS, a tetrameric protein complex. Psf3 expression is up regulated in malignant colon cancer and it might be involved in cancer cell proliferation. GINS is a complex of four subunits (Sld5, Psf1, Psf2 and Psf3) that is involved in both initiation and elongation stages of eukaryotic chromosome replication. Besides being essential for the maintenance of genomic integrity, GINS plays a central role in coordinating DNA replication with cell cycle checkpoints and is involved in cell growth. The eukaryotic GINS subunits are homologous and homologs are also found in the archaea; the complex is not found in bacteria. The four subunits of the complex consist of two domains each, termed the alpha-helical (A) and beta-strand (B) domains. The A and B domains of Sld5/Psf1 are permuted with respect to Psf1/Psf3."
definition: >-
  Alpha-helical domain of GINS complex protein Psf3 (partner of Sld5 3). Psf3 is a component of GINS, a tetrameric protein complex. Psf3 expression is up regulated in malignant colon cancer and it might be involved in cancer cell proliferation. GINS is a complex of four subunits (Sld5, Psf1, Psf2 and Psf3) that is involved in both initiation and elongation stages of eukaryotic chromosome replication. Besides being essential for the maintenance of genomic integrity, GINS plays a central role in coordinating DNA replication with cell cycle checkpoints and is involved in cell growth. The eukaryotic GINS subunits are homologous and homologs are also found in the archaea; the complex is not found in bacteria. The four subunits of the complex consist of two domains each, termed the alpha-helical (A) and beta-strand (B) domains. The A and B domains of Sld5/Psf1 are permuted with respect to Psf1/Psf3. — an NCBI CDD conserved domain (cd11713); members share this curated model.
