identifier: CDD:cd16304
label: "Bacillus cereus Beta-lactamase 2 and related metallo-beta-lactamases, subclass B1; MBL-fold metallo-hydrolase domain. Bacillus cereus Beta-lactamase 2, also called BcII. MBLs (class B of the Ambler beta-lactamase classification) have been divided into three subclasses B1, B2 and B3, based on sequence/structural relationships and substrates, with the B1 and B2 MBLs being most closely related to each other. BcII is a chromosome-encoded B1 MBL. B1 enzymes are most active with two zinc ions bound in the active site, and have a broad-spectrum substrate profile."
definition: >-
  Bacillus cereus Beta-lactamase 2 and related metallo-beta-lactamases, subclass B1; MBL-fold metallo-hydrolase domain. Bacillus cereus Beta-lactamase 2, also called BcII. MBLs (class B of the Ambler beta-lactamase classification) have been divided into three subclasses B1, B2 and B3, based on sequence/structural relationships and substrates, with the B1 and B2 MBLs being most closely related to each other. BcII is a chromosome-encoded B1 MBL. B1 enzymes are most active with two zinc ions bound in the active site, and have a broad-spectrum substrate profile. — an NCBI CDD conserved domain (cd16304); members share this curated model.
