identifier: CDD:cd18223
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 38 (ZBTB38). ZBTB38, also termed CIBZ, is a transcriptional regulator with bimodal DNA-binding specificity. It binds with a higher affinity to methylated CpG dinucleotides in the consensus sequence 5'-CGCG-3', as well as E-box elements (5'-CACGTG-3'). It can also bind specifically to a single methyl-CpG pair. ZBTB38 represses transcription in a methyl-CpG-dependent manner. It is a negative regulator of endoplasmic reticulum stress-associated apoptosis. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 38 (ZBTB38). ZBTB38, also termed CIBZ, is a transcriptional regulator with bimodal DNA-binding specificity. It binds with a higher affinity to methylated CpG dinucleotides in the consensus sequence 5'-CGCG-3', as well as E-box elements (5'-CACGTG-3'). It can also bind specifically to a single methyl-CpG pair. ZBTB38 represses transcription in a methyl-CpG-dependent manner. It is a negative regulator of endoplasmic reticulum stress-associated apoptosis. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18223); members share this curated model.
