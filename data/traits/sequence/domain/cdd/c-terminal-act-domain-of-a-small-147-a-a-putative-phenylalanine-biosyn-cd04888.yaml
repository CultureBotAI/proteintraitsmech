identifier: CDD:cd04888
label: "C-terminal ACT domain of a small (~147 a.a.) putative phenylalanine biosynthetic pathway protein described in Bacillus subtilis (BS) PheB (PheB-BS) and related domains. This CD includes the C-terminal ACT domain of a small (~147 a.a.) putative phenylalanine biosynthetic pathway protein described in Bacillus subtilis (BS) PheB (PheB-BS) and other related ACT domains. In B. subtilis, the upstream gene of pheB, pheA encodes prephenate dehydratase (PDT). The presumed product of the pheB gene is chorismate mutase (CM). The deduced product of the B. subtilis pheB gene, however, has no significant homology to the CM portion of the bifunctional CM-PDT of Escherichia coli. The presence of an ACT domain lends support to the prediction that these proteins function as a phenylalanine-binding regulatory protein. Members of this CD belong to the superfamily of ACT regulatory domains."
definition: >-
  C-terminal ACT domain of a small (~147 a.a.) putative phenylalanine biosynthetic pathway protein described in Bacillus subtilis (BS) PheB (PheB-BS) and related domains. This CD includes the C-terminal ACT domain of a small (~147 a.a.) putative phenylalanine biosynthetic pathway protein described in Bacillus subtilis (BS) PheB (PheB-BS) and other related ACT domains. In B. subtilis, the upstream gene of pheB, pheA encodes prephenate dehydratase (PDT). The presumed product of the pheB gene is chorismate mutase (CM). The deduced product of the B. subtilis pheB gene, however, has no significant homology to the CM portion of the bifunctional CM-PDT of Escherichia coli. The presence of an ACT domain lends support to the prediction that these proteins function as a phenylalanine-binding regulatory protein. Members of this CD belong to the superfamily of ACT regulatory domains. — an NCBI CDD conserved domain (cd04888); members share this curated model.
