identifier: CDD:cd11973
label: "Src homology 3 domain of APC-Stimulated guanine nucleotide Exchange Factor. ASEF, also called ARHGEF4, exists in an autoinhibited form and is activated upon binding of the tumor suppressor APC (adenomatous polyposis coli). GEFs activate small GTPases by exchanging bound GDP for free GTP. ASEF can activate Rac1 or Cdc42. Truncated ASEF, which is found in colorectal cancers, is constitutively active and has been shown to promote angiogenesis and cancer cell migration. ASEF contains a SH3 domain followed by RhoGEF (also called Dbl-homologous or DH) and Pleckstrin Homology (PH) domains. In its autoinhibited form, the SH3 domain of ASEF forms an extensive interface with the DH and PH domains, blocking the Rac binding site. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of APC-Stimulated guanine nucleotide Exchange Factor. ASEF, also called ARHGEF4, exists in an autoinhibited form and is activated upon binding of the tumor suppressor APC (adenomatous polyposis coli). GEFs activate small GTPases by exchanging bound GDP for free GTP. ASEF can activate Rac1 or Cdc42. Truncated ASEF, which is found in colorectal cancers, is constitutively active and has been shown to promote angiogenesis and cancer cell migration. ASEF contains a SH3 domain followed by RhoGEF (also called Dbl-homologous or DH) and Pleckstrin Homology (PH) domains. In its autoinhibited form, the SH3 domain of ASEF forms an extensive interface with the DH and PH domains, blocking the Rac binding site. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11973); members share this curated model.
