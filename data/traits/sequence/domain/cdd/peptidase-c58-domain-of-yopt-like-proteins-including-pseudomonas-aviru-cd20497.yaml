identifier: CDD:cd20497
label: C58_YopT-like
definition: >-
  peptidase C58 domain of YopT-like proteins, including Pseudomonas avirulence AvrPphB. This subfamily includes the C58 peptidase domain of the Pseudomonas avirulence (Avr) protein AvrPphB which is homologous to Yersinia effector known as YopT; both are involved in bacterial pathogenesis. These proteins have a papain-like fold and a distinct substrate-binding site. The proteolytic activity of AvrPphB is essential for autoproteolytic cleavage of an AvrPphB precursor as well as for eliciting the hypersensitive response in plants. Also included is the Ralstonia solanacearum type III effector protein RipT, a YopT-like cysteine protease. All of these proteolytic activities are dependent upon the invariant C/H/D residues conserved in the C58/YopT family peptidase domain
