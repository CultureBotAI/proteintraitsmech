identifier: CDD:cd05627
label: "Catalytic domain of the Serine/Threonine Kinase, Nuclear Dbf2-Related kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. NDR2 (also called STK38-like) plays a role in proper centrosome duplication. In addition, it is involved in regulating neuronal growth and differentiation, as well as in facilitating neurite outgrowth. NDR2 is also implicated in fear conditioning as it contributes to the coupling of neuronal morphological changes with fear-memory consolidation. NDR kinase contains an N-terminal regulatory (NTR) domain and an insert within the catalytic domain that contains an auto-inhibitory sequence. Like many other AGC kinases, NDR kinase requires phosphorylation at two sites, the activation loop (A-loop) and the hydrophobic motif (HM), for activity. The NDR2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Nuclear Dbf2-Related kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. NDR2 (also called STK38-like) plays a role in proper centrosome duplication. In addition, it is involved in regulating neuronal growth and differentiation, as well as in facilitating neurite outgrowth. NDR2 is also implicated in fear conditioning as it contributes to the coupling of neuronal morphological changes with fear-memory consolidation. NDR kinase contains an N-terminal regulatory (NTR) domain and an insert within the catalytic domain that contains an auto-inhibitory sequence. Like many other AGC kinases, NDR kinase requires phosphorylation at two sites, the activation loop (A-loop) and the hydrophobic motif (HM), for activity. The NDR2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05627); members share this curated model.
