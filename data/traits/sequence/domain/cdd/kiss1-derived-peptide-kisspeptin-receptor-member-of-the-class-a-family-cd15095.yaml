identifier: CDD:cd15095
label: "KiSS1-derived peptide (kisspeptin) receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. The G protein-coupled KiSS1-derived peptide receptor (GPR54 or kisspeptin receptor) binds the peptide hormone kisspeptin (previously known as metastin), which encoded by the metastasis suppressor gene (KISS1) expressed in various endocrine and reproductive tissues. The KiSS1 receptor is coupled to G proteins of the G(q/11) family, which lead to activation of phospholipase C and increase of intracellular calcium. This signaling cascade plays an important role in reproduction by regulating the secretion of gonadotropin-releasing hormone."
definition: >-
  KiSS1-derived peptide (kisspeptin) receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. The G protein-coupled KiSS1-derived peptide receptor (GPR54 or kisspeptin receptor) binds the peptide hormone kisspeptin (previously known as metastin), which encoded by the metastasis suppressor gene (KISS1) expressed in various endocrine and reproductive tissues. The KiSS1 receptor is coupled to G proteins of the G(q/11) family, which lead to activation of phospholipase C and increase of intracellular calcium. This signaling cascade plays an important role in reproduction by regulating the secretion of gonadotropin-releasing hormone. — an NCBI CDD conserved domain (cd15095); members share this curated model.
