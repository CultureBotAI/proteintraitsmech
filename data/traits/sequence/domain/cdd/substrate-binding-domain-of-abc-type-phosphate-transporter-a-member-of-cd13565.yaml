identifier: CDD:cd13565
label: "Substrate binding domain of ABC-type phosphate transporter, a member of the type 2 periplasmic-binding fold superfamily. This subfamily contians phosphate binding domain found in PstS proteins that serve as initial receptors in the ABC transport of phosphate in eubacteria and archaea. After binding the ligand, PstS interacts with a cognate membrane transport complex comprised of two integral membrane domains and two cytoplasmically located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis. The PstS proteins belong to the PBPII superfamily of periplasmic binding proteins that differ in size and ligand specificity, but have similar tertiary structures consisting of two globular subdomains connected by a flexible hinge. They have been shown to bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap."
definition: >-
  Substrate binding domain of ABC-type phosphate transporter, a member of the type 2 periplasmic-binding fold superfamily. This subfamily contians phosphate binding domain found in PstS proteins that serve as initial receptors in the ABC transport of phosphate in eubacteria and archaea. After binding the ligand, PstS interacts with a cognate membrane transport complex comprised of two integral membrane domains and two cytoplasmically located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis. The PstS proteins belong to the PBPII superfamily of periplasmic binding proteins that differ in size and ligand specificity, but have similar tertiary structures consisting of two globular subdomains connected by a flexible hinge. They have been shown to bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. — an NCBI CDD conserved domain (cd13565); members share this curated model.
