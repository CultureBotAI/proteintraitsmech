identifier: CDD:cd16321
label: "C-terminal subdomain of transcriptional regulator MraZ. This family contains the C-terminal domain of proteins of unknown function (UPF0040), implicated in a cellular function of bacterial cell division. It includes protein MraZ which is present in almost all bacteria and appears to be essential for survival. It is found in gene clusters associated with the cellular function of cell division and cell wall biosynthesis, including mraW, ftsI, murE, murF, ftsW and murG. Members of this family contain two tandem copies of the domain; the crystal structure of a member of this family (MPN314) reveals that the two subdomains are related by a pseudo two-fold axis, with each subdomain containing a highly conserved DXXXR sequence motif in close proximity to each other, suggested to form the functional site."
definition: >-
  C-terminal subdomain of transcriptional regulator MraZ. This family contains the C-terminal domain of proteins of unknown function (UPF0040), implicated in a cellular function of bacterial cell division. It includes protein MraZ which is present in almost all bacteria and appears to be essential for survival. It is found in gene clusters associated with the cellular function of cell division and cell wall biosynthesis, including mraW, ftsI, murE, murF, ftsW and murG. Members of this family contain two tandem copies of the domain; the crystal structure of a member of this family (MPN314) reveals that the two subdomains are related by a pseudo two-fold axis, with each subdomain containing a highly conserved DXXXR sequence motif in close proximity to each other, suggested to form the functional site. — an NCBI CDD conserved domain (cd16321); members share this curated model.
