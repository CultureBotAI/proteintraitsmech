identifier: CDD:cd16327
label: "RseB, a sensor in periplasmic stress. This family contains the periplasmic protein RseB (also known as MucB or Mucb/RseB) which exerts a crucial role in modulating the stability of RseA, the transmembrane anti-sigma-factor that is degraded during sigma-E-dependent transcription caused by bacterial envelope stress. RseB binds to RseA and inhibits its sequential cleavage, thereby functioning as a negative modulator of this response. The protein is composed of two domains, the larger N-terminal domain resembling an unclosed beta-barrel that is remarkably similar structurally to LolA and LolB, proteins capable of binding the lipid anchor of lipoproteins, suggesting that RseA acts as a sensor of periplasmic stress with a dual functionality, detecting mislocalized lipoproteins as well as propagating the signal to induce the sigma-E-response."
