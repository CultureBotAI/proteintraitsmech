identifier: CDD:cd21893
label: "C-terminal SARAH domain found in Ras-association domain-containing protein 2 (RASSF2). RASSF2 is one of six related proteins, the classical RASSF proteins (RASSF1-6), that contain a conserved RalGDS/AF6 Ras association (RA) domain located towards the C-terminus. It acts as a potential tumor suppressor that may promote apoptosis and cell cycle arrest. It is a KRAS-specific effector protein. It stabilizes STK3/MST2 by protecting it from proteasomal degradation. The RASSF2 gene is transcribed into two major isoforms (A and C). RASSF2 is structurally related to RASSF1A but unlike RASSF1A, it is primarily a nuclear protein. RASSF2 contains the RA and SARAH (Salvador-RassF-Hippo) domains. The RA domain of the classical RASSF proteins  has a beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. RA domains mediate interactions with Ras and other small GTPases, and SARAH domains mediate protein-protein interactions crucial in the pathways that induce cell cycle arrest and apoptosis. This model corresponds to the SARAH domain of RASSF2."
definition: >-
  C-terminal SARAH domain found in Ras-association domain-containing protein 2 (RASSF2). RASSF2 is one of six related proteins, the classical RASSF proteins (RASSF1-6), that contain a conserved RalGDS/AF6 Ras association (RA) domain located towards the C-terminus. It acts as a potential tumor suppressor that may promote apoptosis and cell cycle arrest. It is a KRAS-specific effector protein. It stabilizes STK3/MST2 by protecting it from proteasomal degradation. The RASSF2 gene is transcribed into two major isoforms (A and C). RASSF2 is structurally related to RASSF1A but unlike RASSF1A, it is primarily a nuclear protein. RASSF2 contains the RA and SARAH (Salvador-RassF-Hippo) domains. The RA domain of the classical RASSF proteins has a beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. RA domains mediate interactions with Ras and other small GTPases, and SARAH domains mediate protein-protein interactions crucial in the pathways that induce cell cycle arrest and apoptosis. This model corresponds to the SARAH domain of RASSF2. — an NCBI CDD conserved domain (cd21893); members share this curated model.
