identifier: CDD:cd09931
label: "C-terminal Src homology 2 (C-SH2) domain found in SH2 domain Phosphatases (SHP) proteins. The SH2 domain phosphatases (SHP-1, SHP-2/Syp, Drosophila corkscrew (csw), and Caenorhabditis elegans Protein Tyrosine Phosphatase (Ptp-2)) are cytoplasmic signaling enzymes. They are both targeted and regulated by interactions of their SH2 domains with phosphotyrosine docking sites. These proteins contain two SH2 domains (N-SH2, C-SH2) followed by a tyrosine phosphatase (PTP) domain, and a C-terminal extension. Shp1 and Shp2 have two tyrosyl phosphorylation sites in their C-tails, which are phosphorylated differentially by receptor and nonreceptor PTKs. Csw retains the proximal tyrosine and Ptp-2 lacks both sites.  Shp-binding proteins include receptors, scaffolding adapters, and inhibitory receptors. Some of these bind both Shp1 and Shp2 while others bind only one. Most proteins that bind a Shp SH2 domain contain one or more immuno-receptor tyrosine-based inhibitory motifs (ITIMs): [SIVL]xpYxx[IVL].  Shp1 N-SH2 domain blocks the catalytic domain and keeps the enzyme in the inactive conformation, and is thus believed to regulate the phosphatase activity of SHP-1. Its C-SH2 domain is thought to be involved in searching for phosphotyrosine activators.  The SHP2 N-SH2 domain is a conformational switch; it either binds and inhibits the phosphatase, or it binds phosphoproteins and activates the enzyme. The C-SH2 domain contributes binding energy and specificity, but it does not have a direct role in activation. Csw SH2 domain function is essential, but either SH2 domain can fulfill this requirement. The role of the csw SH2 domains during Sevenless receptor tyrosine kinase (SEV) signaling is to bind Daughter of Sevenless rather than activated SEV. Ptp-2 acts in oocytes downstream of sheath/oocyte gap junctions to promote major sperm protein (MSP)-induced MAP Kinase (MPK-1) phosphorylation. Ptp-2 functions in the oocyte cytoplasm, not at the cell surface to inhibit multiple RasGAPs, resulting in sustained Ras activation. It is thought that MSP triggers PTP-2/Ras activation and ROS production to stimulate MPK-1 activity essential for oocyte maturation and that secreted MSP domains and Cu/Zn superoxide dismutases function antagonistically to control ROS and MAPK signaling. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  C-terminal Src homology 2 (C-SH2) domain found in SH2 domain Phosphatases (SHP) proteins. The SH2 domain phosphatases (SHP-1, SHP-2/Syp, Drosophila corkscrew (csw), and Caenorhabditis elegans Protein Tyrosine Phosphatase (Ptp-2)) are cytoplasmic signaling enzymes. They are both targeted and regulated by interactions of their SH2 domains with phosphotyrosine docking sites. These proteins contain two SH2 domains (N-SH2, C-SH2) followed by a tyrosine phosphatase (PTP) domain, and a C-terminal extension. Shp1 and Shp2 have two tyrosyl phosphorylation sites in their C-tails, which are phosphorylated differentially by receptor and nonreceptor PTKs. Csw retains the proximal tyrosine and Ptp-2 lacks both sites. Shp-binding proteins include receptors, scaffolding adapters, and inhibitory receptors. Some of these bind both Shp1 and Shp2 while others bind only one. Most proteins that bind a Shp SH2 domain contain one or more immuno-receptor tyrosine-based inhibitory motifs (ITIMs): [SIVL]xpYxx[IVL]. Shp1 N-SH2 domain blocks the catalytic domain and keeps the enzyme in the inactive conformation, and is thus believed to regulate the phosphatase activity of SHP-1. Its C-SH2 domain is thought to be involved in searching for phosphotyrosine activators. The SHP2 N-SH2 domain is a conformational switch; it either binds and inhibits the phosphatase, or it binds phosphoproteins and activates the enzyme. The C-SH2 domain contributes binding energy and specificity, but it does not have a direct role in activation. Csw SH2 domain function is essential, but either SH2 domain can fulfill this requirement. The role of the csw SH2 domains during Sevenless receptor tyrosine kinase (SEV) signaling is to bind Daughter of Sevenless rather than activated SEV. Ptp-2 acts in oocytes downstream of sheath/oocyte gap junctions to promote major sperm protein (MSP)-induced MAP Kinase (MPK-1) phosphorylation. Ptp-2 functions in the oocyte cytoplasm, not at the cell surface to inhibit multiple RasGAPs, resulting in sustained Ras activation. It is thought that MSP triggers PTP-2/Ras activation and ROS production to stimulate MPK-1 activity essential for oocyte maturation and that secreted MSP domains and Cu/Zn superoxide dismutases function antagonistically to control ROS and MAPK signaling. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd09931); members share this curated model.
