identifier: CDD:cd19412
label: pMMO-AMO_C
definition: >-
  subunit C of particulate methane monooxygenase (pMMO, also known as membrane-bound MMO) from methanotrophic bacteria, and of ammonia monooxygenase (AMO) from ammonia-oxidizing bacteria, and related proteins. This family contains subunit C of particulate methane monooxygenase (pMMO; EC 1.14.18.3), an integral membrane metalloenzyme that catalyzes the conversion of methane to methanol. MMO is the first enzyme in the metabolic pathway of methanotrophic bacteria. It also contains subunit C of AMO (EC 1.14.99.39) from ammonia-oxidizing bacteria such as Nitrosomonas europaea (AmoC1-AmoC3). AMO catalyzes the conversion of ammonia to hydroxylamine. pMMO, along with soluble MMO (sMMO; EC 1.14.13.25), and the related enzyme AMO are the only known enzymes capable of methane hydroxylation. pMMO is composed of three subunits, PmoB (B or alpha), PmoA (A or beta), and PmoC (C or gamma), each containing membrane-spanning helices, with three copies each of the subunits forming a cylindrical A3B3C3 oligomer with a hole in the center. This subunit of pMMO has a metal-binding site that is exposed to the center of the pMMO oligomer, the metal being zinc or copper. Although biochemical and mutagenesis data indicate that the active site is located at the dicopper site in subunit B, the metal-binding site in this transmembrane subunit C may also be functionally relevant since all ligands are conserved and best enzymatic activity is obtained from intact pMMO containing all three subunits. Zinc inhibition studies of several respiratory complexes in Methylococcus capsulatus and Methylosinus trichosporium suggest that zinc might inhibit proton transfer in pMMO by either replacing active site copper ions or another copper site that is involved in reducing the active site. Nitrosomonas europaea AMO is composed of three subunits; AmoA, AmoB, and AmoC; it has two nearly identical copies of AmoC encoded by duplicate amoCAB operons and a more divergent AmoC encoded by a monocistronic amoC. The significantly shorter related C subunit of AMO from ammonia-oxidizing archaea are not included in this model
