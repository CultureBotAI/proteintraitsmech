label: "sensor domain of Anaeromyxobacter dehalogenans histidine kinase Adeh_2942. This model contains the periplasmic sensor domain of Anaeromyxobacter dehalogenans histidine kinase Adeh_2942, which has closest similarity to histidine kinase HK9 from Rhodopseudomonas palustris of an unknown function. Its structure reveals a four-helical bundle, similar to other members in this family. The response regulator of this prototypical two-component system has yet to be identified."
definition: >-
  sensor domain of Anaeromyxobacter dehalogenans histidine kinase Adeh_2942. This model contains the periplasmic sensor domain of Anaeromyxobacter dehalogenans histidine kinase Adeh_2942, which has closest similarity to histidine kinase HK9 from Rhodopseudomonas palustris of an unknown function. Its structure reveals a four-helical bundle, similar to other members in this family. The response regulator of this prototypical two-component system has yet to be identified. — an NCBI CDD conserved domain (cd22898); members share this curated model.
