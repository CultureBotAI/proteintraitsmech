identifier: CDD:cd16230
label: "EF-hand, calcium binding motif, found in reticulocalbin-3 (RCN-3). RCN-3, also termed EF-hand calcium-binding protein RLP49, is a putative six EF-hand Ca2+-binding protein that contains five RXXR (X is any amino acid) motifs and a C-terminal ER retrieval signal His-Asp-Glu-Leu (HDEL) tetrapeptide. The RXXR motif represents the target sequence of subtilisin-like proprotein convertases (SPCs). RCN-3 is specifically bound to the paired basic amino-acid-cleaving enzyme-4 (PACE4) precursor protein and plays an important role in the biosynthesis of PACE4."
definition: >-
  EF-hand, calcium binding motif, found in reticulocalbin-3 (RCN-3). RCN-3, also termed EF-hand calcium-binding protein RLP49, is a putative six EF-hand Ca2+-binding protein that contains five RXXR (X is any amino acid) motifs and a C-terminal ER retrieval signal His-Asp-Glu-Leu (HDEL) tetrapeptide. The RXXR motif represents the target sequence of subtilisin-like proprotein convertases (SPCs). RCN-3 is specifically bound to the paired basic amino-acid-cleaving enzyme-4 (PACE4) precursor protein and plays an important role in the biosynthesis of PACE4. — an NCBI CDD conserved domain (cd16230); members share this curated model.
