identifier: CDD:cd14277
label: "UBA domain found in ubiquitin-associated protein 2 (UBAP-2) like proteins. The family contains some uncharacterized ubiquitin-associated proteins, including UBAP-2 and its homolog, UBAP2-like [UBP2L, also called protein NICE-4 (for newly identified cDNA from the epidermal differentiation complex EDC)], both of which contain an N-terminal ubiquitin-associated (UBA) domain along with a highly conserved, but function unknown domain (DUF3697)."
definition: >-
  UBA domain found in ubiquitin-associated protein 2 (UBAP-2) like proteins. The family contains some uncharacterized ubiquitin-associated proteins, including UBAP-2 and its homolog, UBAP2-like [UBP2L, also called protein NICE-4 (for newly identified cDNA from the epidermal differentiation complex EDC)], both of which contain an N-terminal ubiquitin-associated (UBA) domain along with a highly conserved, but function unknown domain (DUF3697). — an NCBI CDD conserved domain (cd14277); members share this curated model.
