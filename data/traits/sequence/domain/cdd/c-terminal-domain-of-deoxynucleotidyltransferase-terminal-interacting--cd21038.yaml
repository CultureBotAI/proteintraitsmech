identifier: CDD:cd21038
label: DNTTIP1_CTD
definition: >-
  C-terminal domain of deoxynucleotidyltransferase terminal-interacting protein 1 (DNTTIP1) and similar proteins. DNTTIP1, also termed terminal deoxynucleotidyltransferase-interacting factor 1 (TdIF1), or TdT-interacting factor 1, increases DNTT terminal deoxynucleotidyltransferase activity (in vitro). It also acts as a transcriptional regulator that binds the consensus sequence 5'-GNTGCATG-3' following an AT-tract. DNTTIP1 associates with RAB20 promoter and positively regulates its transcription. It binds both DNA and nucleosomes. DNTTIP1 may recruit HDAC1 complexes to nucleosomes or naked DNA. The model corresponds to the C-terminal domain of DNTTIP1, which has a structure related to the SKI/SNO/DAC domain, despite lacking obvious sequence homology
