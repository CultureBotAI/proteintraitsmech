identifier: CDD:cd12885
label: "SPRY domain in Ran binding proteins, SSH4, HECT E3 and SPRYD3. This family includes SPRY domains found in Ran binding proteins (RBP or RanBPM) 9 and 10, SSH4 (suppressor of SHR3 null mutation protein 4), SPRY domain-containing protein 3 (SPRYD3) as well as HECT, a C-terminal catalytic domain of a subclass of ubiquitin-protein ligase (E3). RanBP9 and RanBP10 act as androgen receptor (AR) coactivators. Both consist of the N-terminal proline- and glutamine-rich regions, the SPRY domain, and LisH-CTLH and CRA motifs. The SPRY domain in SSH4 may be involved in cargo recognition, either directly or by combination with other adaptors, possibly leading to a higher selectivity. SPRYD3 is highly expressed in most tissues in humans, possibly involved in important cellular processes. HECT E3 mediates the direct transfer of ubiquitin from E2 to substrate."
definition: >-
  SPRY domain in Ran binding proteins, SSH4, HECT E3 and SPRYD3. This family includes SPRY domains found in Ran binding proteins (RBP or RanBPM) 9 and 10, SSH4 (suppressor of SHR3 null mutation protein 4), SPRY domain-containing protein 3 (SPRYD3) as well as HECT, a C-terminal catalytic domain of a subclass of ubiquitin-protein ligase (E3). RanBP9 and RanBP10 act as androgen receptor (AR) coactivators. Both consist of the N-terminal proline- and glutamine-rich regions, the SPRY domain, and LisH-CTLH and CRA motifs. The SPRY domain in SSH4 may be involved in cargo recognition, either directly or by combination with other adaptors, possibly leading to a higher selectivity. SPRYD3 is highly expressed in most tissues in humans, possibly involved in important cellular processes. HECT E3 mediates the direct transfer of ubiquitin from E2 to substrate. — an NCBI CDD conserved domain (cd12885); members share this curated model.
