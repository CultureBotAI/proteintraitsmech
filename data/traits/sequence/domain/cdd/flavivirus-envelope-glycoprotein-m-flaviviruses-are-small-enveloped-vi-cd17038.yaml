identifier: CDD:cd17038
label: "Flavivirus envelope glycoprotein M. Flaviviruses are small enveloped viruses with a membrane-anchored envelope comprised of 3 proteins called C, M and E. The envelope glycoprotein M is translated as a precursor, called prM. The precursor portion of the protein is the signal peptide for the protein's entry into the membrane. prM is cleaved to form M by the proprotein convertase furin in a late-stage cleavage event. Associated with this cleavage is a change in the infectivity and fusion activity of the virus."
definition: >-
  Flavivirus envelope glycoprotein M. Flaviviruses are small enveloped viruses with a membrane-anchored envelope comprised of 3 proteins called C, M and E. The envelope glycoprotein M is translated as a precursor, called prM. The precursor portion of the protein is the signal peptide for the protein's entry into the membrane. prM is cleaved to form M by the proprotein convertase furin in a late-stage cleavage event. Associated with this cleavage is a change in the infectivity and fusion activity of the virus. — an NCBI CDD conserved domain (cd17038); members share this curated model.
