identifier: CDD:cd19499
label: "Chaperone protein ClpB/Hsp104 subfamily. Bacterial Caseinolytic peptidase B (ClpB) and eukaryotic Heat shock protein 104 (Hsp104) are ATP-dependent molecular chaperones and essential proteins of the heat-shock response. ClpB/Hsp104 ATPases, in concert with the DnaK/Hsp70 chaperone system, disaggregate and reactivate aggregated proteins. This RecA-like_ClpB_Hsp104_like subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
definition: >-
  Chaperone protein ClpB/Hsp104 subfamily. Bacterial Caseinolytic peptidase B (ClpB) and eukaryotic Heat shock protein 104 (Hsp104) are ATP-dependent molecular chaperones and essential proteins of the heat-shock response. ClpB/Hsp104 ATPases, in concert with the DnaK/Hsp70 chaperone system, disaggregate and reactivate aggregated proteins. This RecA-like_ClpB_Hsp104_like subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion. — an NCBI CDD conserved domain (cd19499); members share this curated model.
