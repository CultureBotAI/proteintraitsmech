identifier: CDD:cd08857
label: "ArfGAP domain of AGFG1 (ArfGAP domain and FG repeat-containing protein 1). The ArfGAP domain and FG repeat-containing proteins (AFGF) subfamily of Arf GTPase-activating proteins consists of the two structurally-related members: AGFG1 and AGFG2. AGFG1 (alias: HIV-1 Rev binding protein, HRB; Rev interacting protein, RIP; Rev/Rex activating domain-binding protein, RAB) and AGFG2 are involved in the maintenance and spread of immunodeficiency virus type 1 (HIV-1) infection. The ArfGAP domain of AGFG1 is related to nucleoporins, which is a class of proteins that mediate nucleocytoplasmic transport. AGFG1 plays a role in the Rev export pathway, which mediates the nucleocytoplasmic transfer of proteins and RNAs, possibly together by the nuclear export receptor CRM1. In humans, the presence of the FG repeat motifs (11 in AGFG1 and 7 in AGFG2) are thought to be required for these proteins to act as HIV-1 Rev cofactors. Hence, AGFG1 promotes movement of Rev-responsive element-containing RNAs from the nuclear periphery to the cytoplasm, which is an essential step for HIV-1 replication."
definition: >-
  ArfGAP domain of AGFG1 (ArfGAP domain and FG repeat-containing protein 1). The ArfGAP domain and FG repeat-containing proteins (AFGF) subfamily of Arf GTPase-activating proteins consists of the two structurally-related members: AGFG1 and AGFG2. AGFG1 (alias: HIV-1 Rev binding protein, HRB; Rev interacting protein, RIP; Rev/Rex activating domain-binding protein, RAB) and AGFG2 are involved in the maintenance and spread of immunodeficiency virus type 1 (HIV-1) infection. The ArfGAP domain of AGFG1 is related to nucleoporins, which is a class of proteins that mediate nucleocytoplasmic transport. AGFG1 plays a role in the Rev export pathway, which mediates the nucleocytoplasmic transfer of proteins and RNAs, possibly together by the nuclear export receptor CRM1. In humans, the presence of the FG repeat motifs (11 in AGFG1 and 7 in AGFG2) are thought to be required for these proteins to act as HIV-1 Rev cofactors. Hence, AGFG1 promotes movement of Rev-responsive element-containing RNAs from the nuclear periphery to the cytoplasm, which is an essential step for HIV-1 replication. — an NCBI CDD conserved domain (cd08857); members share this curated model.
