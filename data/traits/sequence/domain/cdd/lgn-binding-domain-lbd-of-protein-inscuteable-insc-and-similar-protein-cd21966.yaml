identifier: CDD:cd21966
label: "LGN-binding domain (LBD) of protein Inscuteable (INSC) and similar proteins. Inscuteable (INSC) functions as an adapter protein linking the Par polarity complex (composed of Par3, Par6 and protein kinase C iota) to the Gpsm1/Gpsm2 complex, and is involved in cell polarity and spindle orientation during mitosis. Par3 interacts with INSC which binds directly to Pins (partner of Insc, homolog of vertebrate LGN/Gpsm2 and AGS3/Gpsm1). Pins then associates with the heterotrimeric G proteins and NuMA, which interacts directly with the cell spindle to control the orientation of the spindle and the division plane of mitotic cells. INSC may regulate cell proliferation and differentiation in the developing nervous system, may play a role in the asymmetric division of fibroblasts, and may also participate in the process of stratification of the squamous epithelium. This model corresponds to the Leu-Gly-Asn Repeat-Enriched Protein (LGN)-binding domain (LBD) of INSC. It interacts with the tetratricopeptide repeat (TPR) motifs of LGN, also called G-protein-signaling modulator 2 (Gpsm2)."
definition: >-
  LGN-binding domain (LBD) of protein Inscuteable (INSC) and similar proteins. Inscuteable (INSC) functions as an adapter protein linking the Par polarity complex (composed of Par3, Par6 and protein kinase C iota) to the Gpsm1/Gpsm2 complex, and is involved in cell polarity and spindle orientation during mitosis. Par3 interacts with INSC which binds directly to Pins (partner of Insc, homolog of vertebrate LGN/Gpsm2 and AGS3/Gpsm1). Pins then associates with the heterotrimeric G proteins and NuMA, which interacts directly with the cell spindle to control the orientation of the spindle and the division plane of mitotic cells. INSC may regulate cell proliferation and differentiation in the developing nervous system, may play a role in the asymmetric division of fibroblasts, and may also participate in the process of stratification of the squamous epithelium. This model corresponds to the Leu-Gly-Asn Repeat-Enriched Protein (LGN)-binding domain (LBD) of INSC. It interacts with the tetratricopeptide repeat (TPR) motifs of LGN, also called G-protein-signaling modulator 2 (Gpsm2). — an NCBI CDD conserved domain (cd21966); members share this curated model.
