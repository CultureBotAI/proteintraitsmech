identifier: CDD:cd22034
label: "high mobility group (HMG)-box found in sex-determining region Y protein (SRY) and similar proteins. SRY, also called testis-determining factor, is a transcriptional regulator that controls a genetic switch in male development. It promotes DNA bending and is also involved in pre-mRNA splicing. The SRY HMG box recognizes DNA by partial intercalation in the minor groove. It binds to the DNA consensus sequence 5'-[AT]AACAA[AT]-3'. SRY is the only member of group A SRY-related high-mobility group (HMG) box (Sox) transcription factors."
definition: >-
  high mobility group (HMG)-box found in sex-determining region Y protein (SRY) and similar proteins. SRY, also called testis-determining factor, is a transcriptional regulator that controls a genetic switch in male development. It promotes DNA bending and is also involved in pre-mRNA splicing. The SRY HMG box recognizes DNA by partial intercalation in the minor groove. It binds to the DNA consensus sequence 5'-[AT]AACAA[AT]-3'. SRY is the only member of group A SRY-related high-mobility group (HMG) box (Sox) transcription factors. — an NCBI CDD conserved domain (cd22034); members share this curated model.
