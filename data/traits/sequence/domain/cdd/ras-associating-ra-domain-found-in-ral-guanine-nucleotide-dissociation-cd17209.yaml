identifier: CDD:cd17209
label: "Ras-associating (RA) domain found in Ral guanine nucleotide dissociation stimulator (RalGDS) and similar proteins. RalGDS, also termed Ral guanine nucleotide exchange factor (RalGEF), is a guanine exchange factor (GEF) for the Ral family of small GTPases. It is the prototype of RalGDS family proteins that are involved in Ras and Ral signaling pathways as downstream effector proteins. RalGDS stimulates the dissociation of GDP from the Ras-related RalA and RalB GTPases which allows GTP binding and activation of the GTPases. It interacts and acts as an effector molecule for R-Ras, H-Ras, K-Ras, and Rap. Moreover, RalGDS functions as a novel interacting partner for Rab7-interacting lysosomal protein (RILP), a key regulator for late endosomal/lysosomal trafficking. RILP suppresses invasion of breast cancer cells by inhibiting the GEF activity for RalA of RalGDS. RalGDS also plays a vital role in the regulation of Ral-dependent Weibel-Palade bodies (WPB) exocytosis from endothelial cells. In addition, RalGDS couples growth factor signaling to Akt activation by promoting PDK1-induced Akt phosphorylation.  Members in this family have similar domain structure: a central CDC25 homology domain with an upstream Ras Exchange motif (REM), and a C-terminal Ras-associating (RA) domain. The RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin; ubiquitin is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair."
definition: >-
  Ras-associating (RA) domain found in Ral guanine nucleotide dissociation stimulator (RalGDS) and similar proteins. RalGDS, also termed Ral guanine nucleotide exchange factor (RalGEF), is a guanine exchange factor (GEF) for the Ral family of small GTPases. It is the prototype of RalGDS family proteins that are involved in Ras and Ral signaling pathways as downstream effector proteins. RalGDS stimulates the dissociation of GDP from the Ras-related RalA and RalB GTPases which allows GTP binding and activation of the GTPases. It interacts and acts as an effector molecule for R-Ras, H-Ras, K-Ras, and Rap. Moreover, RalGDS functions as a novel interacting partner for Rab7-interacting lysosomal protein (RILP), a key regulator for late endosomal/lysosomal trafficking. RILP suppresses invasion of breast cancer cells by inhibiting the GEF activity for RalA of RalGDS. RalGDS also plays a vital role in the regulation of Ral-dependent Weibel-Palade bodies (WPB) exocytosis from endothelial cells. In addition, RalGDS couples growth factor signaling to Akt activation by promoting PDK1-induced Akt phosphorylation. Members in this family have similar domain structure: a central CDC25 homology domain with an upstream Ras Exchange motif (REM), and a C-terminal Ras-associating (RA) domain. The RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin; ubiquitin is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair. — an NCBI CDD conserved domain (cd17209); members share this curated model.
