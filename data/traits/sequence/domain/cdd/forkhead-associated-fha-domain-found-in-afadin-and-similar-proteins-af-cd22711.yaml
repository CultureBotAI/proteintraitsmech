identifier: CDD:cd22711
label: "forkhead associated (FHA) domain found in afadin and similar proteins. Afadin, also called ALL1-fused gene from chromosome 6 protein, protein AF-6, Afadin adherens junction formation factor, or MLLT4, is a nectin- and actin-filament-binding protein that connects nectin to the actin cytoskeleton. It is essential for the organization of adherens junctions. It may play a key role in the organization of epithelial structures of the embryonic ectoderm. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine."
definition: >-
