identifier: CDD:cd21268
label: "calponin homology (CH) domain found in GAS2-like protein 1 (GAS2L1), GAS2L2, and similar proteins. This subfamily includes GAS2L1 (also called GAS2-related protein on chromosome 22 or growth arrest-specific protein 2-like 1) and GAS2L2 (also called GAS2-related protein on chromosome 17 or growth arrest-specific protein 2-like 2). They may be involved in the cross-linking of microtubules and microfilaments. Members of this subfamily contain a single copy of the CH domain at the N-terminus. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  calponin homology (CH) domain found in GAS2-like protein 1 (GAS2L1), GAS2L2, and similar proteins. This subfamily includes GAS2L1 (also called GAS2-related protein on chromosome 22 or growth arrest-specific protein 2-like 1) and GAS2L2 (also called GAS2-related protein on chromosome 17 or growth arrest-specific protein 2-like 2). They may be involved in the cross-linking of microtubules and microfilaments. Members of this subfamily contain a single copy of the CH domain at the N-terminus. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21268); members share this curated model.
