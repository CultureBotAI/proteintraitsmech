identifier: CDD:cd17923
label: "DEAH-box helicase domain of Hrq1 and similar proteins. Yeast Hrq1, similar to RecQ4, plays a role in DNA inter-strand crosslink (ICL) repair and in telomere maintenance. Hrq1 lacks the Sld2-like domain found in RecQ4. Hrq1 belongs to the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEAH-box helicase domain of Hrq1 and similar proteins. Yeast Hrq1, similar to RecQ4, plays a role in DNA inter-strand crosslink (ICL) repair and in telomere maintenance. Hrq1 lacks the Sld2-like domain found in RecQ4. Hrq1 belongs to the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17923); members share this curated model.
