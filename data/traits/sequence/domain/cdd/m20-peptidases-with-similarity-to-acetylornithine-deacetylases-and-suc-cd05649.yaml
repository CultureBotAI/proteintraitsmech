identifier: CDD:cd05649
label: "M20 Peptidases with similarity to acetylornithine deacetylases and succinyl-diaminopimelate desuccinylases. Peptidase M20 family, uncharacterized protein subfamily with similarity to acetylornithine deacetylase/succinyl-diaminopimelate desuccinylase (ArgE/DapE) subfamily. This group includes the hypothetical protein ygeY from Escherichia coli, a putative deacetylase, but many in this subfamily are classified as unassigned peptidases. ArgE/DapE enzymes catalyze analogous reactions and share a common activator, the metal ion (usually Co2+ or Zn2+). ArgE catalyzes a broad range of substrates, including N-acetylornithine, alpha-N-acetylmethionine and alpha-N-formylmethionine, while DapE catalyzes the hydrolysis of N-succinyl-L,L-diaminopimelate (L,L-SDAP) to L,L-diaminopimelate and succinate. Proteins in this subfamily are mostly bacterial and archaeal, and have been inferred by homology as being related to both ArgE and DapE."
definition: >-
  M20 Peptidases with similarity to acetylornithine deacetylases and succinyl-diaminopimelate desuccinylases. Peptidase M20 family, uncharacterized protein subfamily with similarity to acetylornithine deacetylase/succinyl-diaminopimelate desuccinylase (ArgE/DapE) subfamily. This group includes the hypothetical protein ygeY from Escherichia coli, a putative deacetylase, but many in this subfamily are classified as unassigned peptidases. ArgE/DapE enzymes catalyze analogous reactions and share a common activator, the metal ion (usually Co2+ or Zn2+). ArgE catalyzes a broad range of substrates, including N-acetylornithine, alpha-N-acetylmethionine and alpha-N-formylmethionine, while DapE catalyzes the hydrolysis of N-succinyl-L,L-diaminopimelate (L,L-SDAP) to L,L-diaminopimelate and succinate. Proteins in this subfamily are mostly bacterial and archaeal, and have been inferred by homology as being related to both ArgE and DapE. — an NCBI CDD conserved domain (cd05649); members share this curated model.
