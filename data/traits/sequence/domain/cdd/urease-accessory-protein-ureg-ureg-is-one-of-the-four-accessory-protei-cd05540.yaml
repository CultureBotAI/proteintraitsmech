identifier: CDD:cd05540
label: "urease accessory protein UreG. UreG is one of the four accessory proteins of urease. Urease is an enzyme which catalyzes the decomposition of urea to form ammonia and carbon dioxide. Bacterial urease is a trimer of three subunits which are encoded by genes ureA, ureB, and ureC. Up to four accessory proteins (ureD, ureE, ureF, and ureG) are required for urease catalytical function. UreG may play an important role in nickel incorporation of the urease metallocenter. UreG is a member of the Fer4_NifH superfamily which contains an ATP-binding domain. Proteins in this superfamily use the energy from hydrolysis of NTP to transfer electron or ion."
definition: >-
  urease accessory protein UreG. UreG is one of the four accessory proteins of urease. Urease is an enzyme which catalyzes the decomposition of urea to form ammonia and carbon dioxide. Bacterial urease is a trimer of three subunits which are encoded by genes ureA, ureB, and ureC. Up to four accessory proteins (ureD, ureE, ureF, and ureG) are required for urease catalytical function. UreG may play an important role in nickel incorporation of the urease metallocenter. UreG is a member of the Fer4_NifH superfamily which contains an ATP-binding domain. Proteins in this superfamily use the energy from hydrolysis of NTP to transfer electron or ion. — an NCBI CDD conserved domain (cd05540); members share this curated model.
