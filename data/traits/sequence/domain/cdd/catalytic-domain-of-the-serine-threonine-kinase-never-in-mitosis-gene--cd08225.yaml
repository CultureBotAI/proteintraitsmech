identifier: CDD:cd08225
label: "Catalytic domain of the Serine/Threonine Kinase, Never In Mitosis gene A (NIMA)-related kinase 5. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. Neks are involved in the regulation of downstream processes following the activation of Cdc2, and many of their functions are cell cycle-related. They play critical roles in microtubule dynamics during ciliogenesis and mitosis. The specific function of Nek5 is unknown. Nek5 is one in a family of 11 different Neks (Nek1-11). The Nek family is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
