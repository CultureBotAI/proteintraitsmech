identifier: CDD:cd11816
label: "Third Src homology 3 domain of ADAM-binding protein Eve-1. Eve-1, also called SH3 domain-containing protein 19 (SH3D19) or EEN-binding protein (EBP), exists in multiple alternatively spliced isoforms. The longest isoform contains five SH3 domain in the C-terminal region and seven proline-rich motifs in the N-terminal region. It is abundantly expressed in skeletal muscle and heart, and may be involved in regulating the activity of ADAMs (A disintegrin and metalloproteases). Eve-1 interacts with EEN, an endophilin involved in endocytosis and may be the target of the MLL-EEN fusion protein that is implicated in leukemogenesis. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Third Src homology 3 domain of ADAM-binding protein Eve-1. Eve-1, also called SH3 domain-containing protein 19 (SH3D19) or EEN-binding protein (EBP), exists in multiple alternatively spliced isoforms. The longest isoform contains five SH3 domain in the C-terminal region and seven proline-rich motifs in the N-terminal region. It is abundantly expressed in skeletal muscle and heart, and may be involved in regulating the activity of ADAMs (A disintegrin and metalloproteases). Eve-1 interacts with EEN, an endophilin involved in endocytosis and may be the target of the MLL-EEN fusion protein that is implicated in leukemogenesis. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11816); members share this curated model.
