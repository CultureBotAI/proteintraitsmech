identifier: CDD:cd18273
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch repeat and BTB domain-containing proteins KBTBD6 and KBTBD7. KBTBD6 and KBTBD7 are substrate adaptors of a cullin-3 RING ubiquitin ligase complex that mediates ubiquitylation and proteasomal degradation of T-lymphoma and metastasis gene 1 (TIAM1), a RAC1-specific guanine exchange factor (GEF), by cooperating with gamma-aminobutyric acid receptor-associated proteins (GABARAP). KBTBD7 may also act as a new transcriptional activator in mitogen-activated protein kinase (MAPK) signaling. They both contain a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch repeat and BTB domain-containing proteins KBTBD6 and KBTBD7. KBTBD6 and KBTBD7 are substrate adaptors of a cullin-3 RING ubiquitin ligase complex that mediates ubiquitylation and proteasomal degradation of T-lymphoma and metastasis gene 1 (TIAM1), a RAC1-specific guanine exchange factor (GEF), by cooperating with gamma-aminobutyric acid receptor-associated proteins (GABARAP). KBTBD7 may also act as a new transcriptional activator in mitogen-activated protein kinase (MAPK) signaling. They both contain a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18273); members share this curated model.
