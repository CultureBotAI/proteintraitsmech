identifier: CDD:cd23495
label: "first ricin B-type lectin domain, beta-trefoil fold, found in Clostridium botulinum hemagglutinating protein HA33 and similar proteins. HA33, also called HA1, is a hemagglutinin (HA) 33 kDa subcomponent, which is associated with the large botulinum neurotoxin secreted complexes and plays a critical role in toxin protection, internalization, and possibly activation. HA33 is involved with internalization of the toxin into the bloodstream by binding to oligosaccharides lining the intestine. HA33 contains two ricin B-type lectin domains with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a potential sugar binding site. The model corresponds to the first ricin B-type lectin domain."
definition: >-
  first ricin B-type lectin domain, beta-trefoil fold, found in Clostridium botulinum hemagglutinating protein HA33 and similar proteins. HA33, also called HA1, is a hemagglutinin (HA) 33 kDa subcomponent, which is associated with the large botulinum neurotoxin secreted complexes and plays a critical role in toxin protection, internalization, and possibly activation. HA33 is involved with internalization of the toxin into the bloodstream by binding to oligosaccharides lining the intestine. HA33 contains two ricin B-type lectin domains with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a potential sugar binding site. The model corresponds to the first ricin B-type lectin domain. — an NCBI CDD conserved domain (cd23495); members share this curated model.
