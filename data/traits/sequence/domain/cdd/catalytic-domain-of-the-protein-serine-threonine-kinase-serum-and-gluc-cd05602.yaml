identifier: CDD:cd05602
label: "Catalytic domain of the Protein Serine/Threonine Kinase, Serum- and Glucocorticoid-induced Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. SGK1 is ubiquitously expressed and is under transcriptional control of numerous stimuli including cell stress (cell shrinkage), serum, hormones (gluco- and mineralocorticoids), gonadotropins, growth factors, interleukin-6, and other cytokines. It plays roles in sodium retention and potassium elimination in the kidney, nutrient transport, salt sensitivity, memory consolidation, and cardiac repolarization. A common SGK1 variant is associated with increased blood pressure and body weight. SGK1 may also contribute to tumor growth, neurodegeneration, fibrosing disease, and ischemia. The SGK1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Protein Serine/Threonine Kinase, Serum- and Glucocorticoid-induced Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. SGK1 is ubiquitously expressed and is under transcriptional control of numerous stimuli including cell stress (cell shrinkage), serum, hormones (gluco- and mineralocorticoids), gonadotropins, growth factors, interleukin-6, and other cytokines. It plays roles in sodium retention and potassium elimination in the kidney, nutrient transport, salt sensitivity, memory consolidation, and cardiac repolarization. A common SGK1 variant is associated with increased blood pressure and body weight. SGK1 may also contribute to tumor growth, neurodegeneration, fibrosing disease, and ischemia. The SGK1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05602); members share this curated model.
