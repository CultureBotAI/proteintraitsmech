identifier: CDD:cd22109
label: "F-box domain found in F-box only protein 41 (FBXO41) and similar proteins. FBXO41, also called FBX41, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It acts as a novel central nervous system (CNS)-specific F-box protein that localizes to the centrosome and the cytoplasm of neurons and promotes neuronal migration. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 41 (FBXO41) and similar proteins. FBXO41, also called FBX41, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It acts as a novel central nervous system (CNS)-specific F-box protein that localizes to the centrosome and the cytoplasm of neurons and promotes neuronal migration. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22109); members share this curated model.
