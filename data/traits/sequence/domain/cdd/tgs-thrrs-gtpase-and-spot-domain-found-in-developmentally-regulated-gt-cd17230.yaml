identifier: CDD:cd17230
label: "TGS (ThrRS, GTPase and SpoT) domain found in developmentally regulated GTP binding protein 1 (DRG-1). DRG-1 is a potassium-dependent GTPase that belongs to the DRG family GTP-binding proteins. It plays an important role in regulating cell growth. It functions as a potential oncogene in lung adenocarcinoma and promotes tumor progression via spindle checkpoint signaling regulation. It also plays an important role in melanoma cell growth and transformation, indicating a novel role in CD4(+) T cell-mediated immunotherapy in melanoma. In addition, DRG-1 is regulated by ZC3H15 (zinc finger CCCH-type containing 15, also known as Lerepo4), and displays a high temperature optimum of activity at 42C, suggesting the ability of being active under possible heat stress conditions. DRG-1 contains a domain of characteristic Obg-type G-motifs that may be the core of GTPase activity, as well as this C-terminal TGS (ThrRS, GTPase and SpoT) domain that has a predominantly beta-grasp ubiquitin-like fold and may be related to RNA binding."
definition: >-
  TGS (ThrRS, GTPase and SpoT) domain found in developmentally regulated GTP binding protein 1 (DRG-1). DRG-1 is a potassium-dependent GTPase that belongs to the DRG family GTP-binding proteins. It plays an important role in regulating cell growth. It functions as a potential oncogene in lung adenocarcinoma and promotes tumor progression via spindle checkpoint signaling regulation. It also plays an important role in melanoma cell growth and transformation, indicating a novel role in CD4(+) T cell-mediated immunotherapy in melanoma. In addition, DRG-1 is regulated by ZC3H15 (zinc finger CCCH-type containing 15, also known as Lerepo4), and displays a high temperature optimum of activity at 42C, suggesting the ability of being active under possible heat stress conditions. DRG-1 contains a domain of characteristic Obg-type G-motifs that may be the core of GTPase activity, as well as this C-terminal TGS (ThrRS, GTPase and SpoT) domain that has a predominantly beta-grasp ubiquitin-like fold and may be related to RNA binding. — an NCBI CDD conserved domain (cd17230); members share this curated model.
