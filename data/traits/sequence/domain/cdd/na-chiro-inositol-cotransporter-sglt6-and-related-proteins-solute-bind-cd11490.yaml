identifier: CDD:cd11490
label: "Na(+)/chiro-inositol cotransporter SGLT6 and related proteins; solute-binding domain. Human SGLT6 (also called KST1, SMIT2) is a chiro-inositol transporter, which also transports myo-inositol. It is encoded by the SLC5A11 gene. Xenopus Na1-glucose cotransporter type 1 (SGLT-1)-like protein is predicted to contain 14 membrane-spanning regions. This subgroup belongs to the solute carrier 5 (SLC5) transporter family."
definition: >-
  Na(+)/chiro-inositol cotransporter SGLT6 and related proteins; solute-binding domain. Human SGLT6 (also called KST1, SMIT2) is a chiro-inositol transporter, which also transports myo-inositol. It is encoded by the SLC5A11 gene. Xenopus Na1-glucose cotransporter type 1 (SGLT-1)-like protein is predicted to contain 14 membrane-spanning regions. This subgroup belongs to the solute carrier 5 (SLC5) transporter family. — an NCBI CDD conserved domain (cd11490); members share this curated model.
