identifier: CDD:cd18908
label: "basic helix-loop-helix (bHLH) domain found in the spermatogenesis- and oogenesis-specific basic helix-loop-helix-containing protein (SOHLH) family. The SOHLH family includes two bHLH transcription factors, SOHLH1 and SOHLH2. They are specifically in spermatogonia and oocytes and essential for early spermatogonial and oocyte differentiation."
