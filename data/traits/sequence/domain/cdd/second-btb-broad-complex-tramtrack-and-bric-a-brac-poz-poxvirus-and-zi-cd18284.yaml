identifier: CDD:cd18284
label: BTB2_POZ_BTBD7
definition: >-
  second BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB/POZ domain-containing protein 7 (BTBD7). BTBD7 is a crucial regulator that is essential for region-specific epithelial cell dynamics and branching morphogenesis. It has been implicated in various cancers. BTBD7 contains two BTB domains. This model corresponds to the second domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids
