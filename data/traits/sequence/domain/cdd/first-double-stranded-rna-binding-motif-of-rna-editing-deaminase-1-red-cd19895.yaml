identifier: CDD:cd19895
label: "first double-stranded RNA binding motif of RNA-editing deaminase 1 (RED1) and similar proteins. RED1 (EC 3.5.4.37; also known as double-stranded RNA-specific editase 1, RNA-editing enzyme 1, dsRNA adenosine deaminase, ADARB1, ADAR2, or DRADA2) catalyzes the hydrolytic deamination of adenosine to inosine in double-stranded RNA (dsRNA), referred to as A-to-I RNA editing. It contains two double-stranded RNA binding motifs (DSRMs) and a C-terminal RNA-specific adenosine-deaminase (editase) domain. This model describes the first DSRM. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  first double-stranded RNA binding motif of RNA-editing deaminase 1 (RED1) and similar proteins. RED1 (EC 3.5.4.37; also known as double-stranded RNA-specific editase 1, RNA-editing enzyme 1, dsRNA adenosine deaminase, ADARB1, ADAR2, or DRADA2) catalyzes the hydrolytic deamination of adenosine to inosine in double-stranded RNA (dsRNA), referred to as A-to-I RNA editing. It contains two double-stranded RNA binding motifs (DSRMs) and a C-terminal RNA-specific adenosine-deaminase (editase) domain. This model describes the first DSRM. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19895); members share this curated model.
