identifier: CDD:cd10814
label: "N-terminal catalytic domain of SPGH38, a putative alpha-mannosidase of Streptococcus pyogenes, and its prokaryotic homologs; glycoside hydrolase family 38 (GH38). The subfamily is represented by SpGH38 of Streptococcus pyogenes,  which has been assigned as a putative alpha-mannosidase, and is encoded by ORF spy1604. SpGH38 appears to exist as an elongated dimer and display alpha-1,3 mannosidase activity. It is active on disaccharides and some aryl glycosides. SpGH38 can also effectively deglycosylate human N-glycans in vitro. A divalent metal ion, such as a zinc ion, is required for its activity. SpGH38 is inhibited by swainsonine. The absence of any secretion signal peptide suggests that SpGH38 may be intracellular."
definition: >-
  N-terminal catalytic domain of SPGH38, a putative alpha-mannosidase of Streptococcus pyogenes, and its prokaryotic homologs; glycoside hydrolase family 38 (GH38). The subfamily is represented by SpGH38 of Streptococcus pyogenes, which has been assigned as a putative alpha-mannosidase, and is encoded by ORF spy1604. SpGH38 appears to exist as an elongated dimer and display alpha-1,3 mannosidase activity. It is active on disaccharides and some aryl glycosides. SpGH38 can also effectively deglycosylate human N-glycans in vitro. A divalent metal ion, such as a zinc ion, is required for its activity. SpGH38 is inhibited by swainsonine. The absence of any secretion signal peptide suggests that SpGH38 may be intracellular. — an NCBI CDD conserved domain (cd10814); members share this curated model.
