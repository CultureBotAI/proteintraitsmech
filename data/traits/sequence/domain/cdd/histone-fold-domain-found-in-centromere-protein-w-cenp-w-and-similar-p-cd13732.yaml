identifier: CDD:cd13732
label: "histone-fold domain found in centromere protein W (CENP-W) and similar proteins. CENP-W, also called cancer-up-regulated gene 2 protein (CUG2), is a component of the CENPA-NAC (nucleosome-associated) complex, which plays a central role in the assembly of kinetochore proteins, mitotic progression and chromosome segregation. The CENPA-NAC complex recruits the CENPA-CAD (nucleosome distal) complex and may be involved in incorporation of newly synthesized CENP-A into centromeres. CENP-W is also part of a nucleosome-associated complex that binds specifically to histone H3-containing nucleosomes at the centromere, as opposed to nucleosomes containing CENP-A. Moreover, CENP-W forms a heterodimer with CENP-T. This dimer co-assembles with CENP-S-CENP-X heterodimers at centromeres to form the tetrameric CENP-T-W-S-X complex, which is a subcomplex of the large constitutive centromere-associated network (CCAN, also known as the interphase centromere complex or ICEN). The heterotetrameric CENP-T-W-S-X complex binds and supercoils DNA and plays an important role in kinetochore assembly. CENP-W has a fundamental role in kinetochore assembly and function. It is one of the inner kinetochore proteins, with most further proteins binding downstream. It is required for normal chromosome organization and normal progress through mitosis."
definition: >-
  histone-fold domain found in centromere protein W (CENP-W) and similar proteins. CENP-W, also called cancer-up-regulated gene 2 protein (CUG2), is a component of the CENPA-NAC (nucleosome-associated) complex, which plays a central role in the assembly of kinetochore proteins, mitotic progression and chromosome segregation. The CENPA-NAC complex recruits the CENPA-CAD (nucleosome distal) complex and may be involved in incorporation of newly synthesized CENP-A into centromeres. CENP-W is also part of a nucleosome-associated complex that binds specifically to histone H3-containing nucleosomes at the centromere, as opposed to nucleosomes containing CENP-A. Moreover, CENP-W forms a heterodimer with CENP-T. This dimer co-assembles with CENP-S-CENP-X heterodimers at centromeres to form the tetrameric CENP-T-W-S-X complex, which is a subcomplex of the large constitutive centromere-associated network (CCAN, also known as the interphase centromere complex or ICEN). The heterotetrameric CENP-T-W-S-X complex binds and supercoils DNA and plays an important role in kinetochore assembly. CENP-W has a fundamental role in kinetochore assembly and function. It is one of the inner kinetochore proteins, with most further proteins binding downstream. It is required for normal chromosome organization and normal progress through mitosis. — an NCBI CDD conserved domain (cd13732); members share this curated model.
