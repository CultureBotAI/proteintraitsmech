identifier: CDD:cd09325
label: "C4-dicarboxylate transporters of the Tellurite-resistance/Dicarboxylate Transporter (TDT) family. This subfamily contains bacterial C4-dicarboxylate transporters, which is part of the Tellurite-resistance/Dicarboxylate Transporter (TDT) family. It includes Tellurite resistance protein tehA; the tehA gene encodes an integral membrane protein that has been shown to have efflux activity of quaternary ammonium compounds. TehA protein of Escherichia coli functions as a tellurite-resistance uptake permease."
definition: >-
  C4-dicarboxylate transporters of the Tellurite-resistance/Dicarboxylate Transporter (TDT) family. This subfamily contains bacterial C4-dicarboxylate transporters, which is part of the Tellurite-resistance/Dicarboxylate Transporter (TDT) family. It includes Tellurite resistance protein tehA; the tehA gene encodes an integral membrane protein that has been shown to have efflux activity of quaternary ammonium compounds. TehA protein of Escherichia coli functions as a tellurite-resistance uptake permease. — an NCBI CDD conserved domain (cd09325); members share this curated model.
