identifier: CDD:cd21857
label: "Tom1-binding domain (TBD) of toll-interacting protein (Tollip) and similar proteins. Tollip is a component of the signaling pathway of IL-1 and Toll-like receptors. It inhibits cell activation by microbial products. It also inhibits IRAK1 phosphorylation and kinase activity. It recruits IRAK1 to the IL-1 receptor complex. Tollip connects the ubiquitin pathway to autophagy by functioning as a ubiquitin-ATG8 family adapter and thus mediating autophagic clearance of ubiquitin conjugates. The Tollip-dependent selective autophagy pathway plays an important role in clearance of cytotoxic polyQ proteins aggregates. The model corresponds to Tom1-binding domain (TBD) located at the N-terminus of Tollip."
definition: >-
  Tom1-binding domain (TBD) of toll-interacting protein (Tollip) and similar proteins. Tollip is a component of the signaling pathway of IL-1 and Toll-like receptors. It inhibits cell activation by microbial products. It also inhibits IRAK1 phosphorylation and kinase activity. It recruits IRAK1 to the IL-1 receptor complex. Tollip connects the ubiquitin pathway to autophagy by functioning as a ubiquitin-ATG8 family adapter and thus mediating autophagic clearance of ubiquitin conjugates. The Tollip-dependent selective autophagy pathway plays an important role in clearance of cytotoxic polyQ proteins aggregates. The model corresponds to Tom1-binding domain (TBD) located at the N-terminus of Tollip. — an NCBI CDD conserved domain (cd21857); members share this curated model.
