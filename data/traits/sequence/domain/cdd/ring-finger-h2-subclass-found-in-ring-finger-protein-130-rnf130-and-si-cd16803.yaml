identifier: CDD:cd16803
label: "RING finger, H2 subclass, found in RING finger protein 130 (RNF130) and similar proteins. RNF130, also known as Goliath homolog (H-Goliath), is a paralog of RNF128, also known as gene related to anergy in lymphocytes protein (GRAIL). It is a transmembrane E3 ubiquitin-protein ligase expressed in leukocytes. It has a self-ubiquitination property, and controls the development of T cell clonal anergy by ubiquitination. RNF130 contains an N-terminal signal peptide, a protease-associated (PA) domain, a transmembrane (TM) domain and a C-terminal C3H2C3-type RING-H2 finger domain followed by a putative PEST sequence."
definition: >-
  RING finger, H2 subclass, found in RING finger protein 130 (RNF130) and similar proteins. RNF130, also known as Goliath homolog (H-Goliath), is a paralog of RNF128, also known as gene related to anergy in lymphocytes protein (GRAIL). It is a transmembrane E3 ubiquitin-protein ligase expressed in leukocytes. It has a self-ubiquitination property, and controls the development of T cell clonal anergy by ubiquitination. RNF130 contains an N-terminal signal peptide, a protease-associated (PA) domain, a transmembrane (TM) domain and a C-terminal C3H2C3-type RING-H2 finger domain followed by a putative PEST sequence. — an NCBI CDD conserved domain (cd16803); members share this curated model.
