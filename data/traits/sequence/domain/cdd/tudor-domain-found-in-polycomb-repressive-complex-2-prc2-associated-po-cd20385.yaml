identifier: CDD:cd20385
label: "Tudor domain found in polycomb repressive complex 2 (PRC2)-associated polycomb-like (PCL) family proteins. The PCL family includes PHD finger protein1 (PHF1) and its homologs, metal-response element-binding transcription factor 2 (MTF2/PCL2) and PHF19/PCL3, which are accessory components of the Polycomb repressive complex 2 (PRC2) core complex. Members contain an N-terminal Tudor domain followed by two PHD domains, and a C-terminal MTF2 domain. PCL proteins specifically recognize tri-methylated H3K36 (H3K36me3) through their N-terminal Tudor domains. The interaction between their Tudor domains and H3K36me3 is critical for both the targeting and spreading of PRC2 into active chromatin regions and for the maintenance of optimal repression of poised developmental genes where PCL proteins, H3K36me3, and H3K27me3 coexist. Moreover, unlike other PHD domain-containing proteins, the first PHD domains of PCL proteins do not display histone H3K4 binding affinity and they do not affect the binding of the Tudor domain to histones."
definition: >-
  Tudor domain found in polycomb repressive complex 2 (PRC2)-associated polycomb-like (PCL) family proteins. The PCL family includes PHD finger protein1 (PHF1) and its homologs, metal-response element-binding transcription factor 2 (MTF2/PCL2) and PHF19/PCL3, which are accessory components of the Polycomb repressive complex 2 (PRC2) core complex. Members contain an N-terminal Tudor domain followed by two PHD domains, and a C-terminal MTF2 domain. PCL proteins specifically recognize tri-methylated H3K36 (H3K36me3) through their N-terminal Tudor domains. The interaction between their Tudor domains and H3K36me3 is critical for both the targeting and spreading of PRC2 into active chromatin regions and for the maintenance of optimal repression of poised developmental genes where PCL proteins, H3K36me3, and H3K27me3 coexist. Moreover, unlike other PHD domain-containing proteins, the first PHD domains of PCL proteins do not display histone H3K4 binding affinity and they do not affect the binding of the Tudor domain to histones. — an NCBI CDD conserved domain (cd20385); members share this curated model.
