identifier: CDD:cd22234
label: "ribbon-helix-helix domain of mobilization protein MobB and similar proteins. This subfamily includes Pseudomonas syringae mobilization protein MobB, and mostly archaeal uncharacterized CopG family proteins. These proteins have a typical ribbon-helix-helix (RHH), similar to plasmid-encoded transcriptional repressor CopG, the protein that is encoded by the promiscuous streptococcal plasmid pMV158 and is involved in the control of plasmid copy number."
definition: >-
  ribbon-helix-helix domain of mobilization protein MobB and similar proteins. This subfamily includes Pseudomonas syringae mobilization protein MobB, and mostly archaeal uncharacterized CopG family proteins. These proteins have a typical ribbon-helix-helix (RHH), similar to plasmid-encoded transcriptional repressor CopG, the protein that is encoded by the promiscuous streptococcal plasmid pMV158 and is involved in the control of plasmid copy number. — an NCBI CDD conserved domain (cd22234); members share this curated model.
