identifier: CDD:cd14346
label: "UBA-like domain found in Saccharomyces cerevisiae UBX domain-containing protein 5 (Ubx5) and similar proteins. Ubx5 is a ubiquitin regulatory X (UBX) domain-containing protein encoded by the open reading frame (ORF) YDR330W in yeast. As the yeast ortholog of mammalian UBXD7, Ubx5 functions as the cofactor of AAA+ ATPase p97, also known as VCP or Cdc48. It binds only to the active, NEDD8- or Rub1-modified form of cullins. Ubx5 contains the ubiquitin-associated (UBA), ubiquitin-associating (UAS), ubiquitin regulatory X (UBX) and ubiquitin-interacting motif (UIM) domains and its UIM domain is required to promote UV-dependent degradation of polyubiquitinated Rpb1."
definition: >-
  UBA-like domain found in Saccharomyces cerevisiae UBX domain-containing protein 5 (Ubx5) and similar proteins. Ubx5 is a ubiquitin regulatory X (UBX) domain-containing protein encoded by the open reading frame (ORF) YDR330W in yeast. As the yeast ortholog of mammalian UBXD7, Ubx5 functions as the cofactor of AAA+ ATPase p97, also known as VCP or Cdc48. It binds only to the active, NEDD8- or Rub1-modified form of cullins. Ubx5 contains the ubiquitin-associated (UBA), ubiquitin-associating (UAS), ubiquitin regulatory X (UBX) and ubiquitin-interacting motif (UIM) domains and its UIM domain is required to promote UV-dependent degradation of polyubiquitinated Rpb1. — an NCBI CDD conserved domain (cd14346); members share this curated model.
