identifier: CDD:cd22889
label: "NADH:Ubiquinone Oxidoreductase, NDUFA3 subunit and related proteins. This family includes the NDUFA3 subunit of NADH:ubiquinone oxidoreductase (Respiratory complex I), which is a redox-driven proton pump that plays an important role in creating the electrochemical gradient that powers mitochondrial adenosine triphosphate synthesis. Complex I catalyzes the transfer of two electrons from NADH to ubiquinone in a reaction that is associated with proton translocation across the membrane (NADH + ubiquinone = NAD(+) + ubiquinol). Subunit NDUFA3 is a single-pass membrane protein and is considered an accessory subunit. This family also includes N9IM, the homologous subunit from fungi, as well as some plant homologs."
definition: >-
