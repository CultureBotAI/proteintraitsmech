identifier: CDD:cd13612
label: "Substrate-binding protein ProWX of ABC-type osmoregulated transporter and its related proteins; the type 2 periplasmic-binding protein fold. Osmoprotectant binding lipoprotein ProWX of Helicobacter pylori is predicted to be involved in uptake of compatible solutes such as choline, L-proline and glycine betaine, but the relative substrate preference is not known. To counteract the efflux of water, microorganisms accumulate the compatible solutes for a sustained adjustment to high osmolarity surroundings. ProWX belongs to the type 2 periplasmic binding fold protein superfamily (PBP2). The PBP2 proteins are typically comprised of two globular subdomains connected by a flexible hinge and bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap."
definition: >-
  Substrate-binding protein ProWX of ABC-type osmoregulated transporter and its related proteins; the type 2 periplasmic-binding protein fold. Osmoprotectant binding lipoprotein ProWX of Helicobacter pylori is predicted to be involved in uptake of compatible solutes such as choline, L-proline and glycine betaine, but the relative substrate preference is not known. To counteract the efflux of water, microorganisms accumulate the compatible solutes for a sustained adjustment to high osmolarity surroundings. ProWX belongs to the type 2 periplasmic binding fold protein superfamily (PBP2). The PBP2 proteins are typically comprised of two globular subdomains connected by a flexible hinge and bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. — an NCBI CDD conserved domain (cd13612); members share this curated model.
