label: "RuvA_N. RuvA_N   RuvA is part of the RuvABC resolvasome which catalyzes the resolution of Holliday junctions that arise during genetic recombination and DNA repair.  The N-terminal domain of RuvA has an OB-fold structure similar to those of the RNA polymerase subunit RBP8 and the cold shock protein Bc-Csp. This domain binds Holliday junction DNA (along with domain II) and other RuvA proteins that form the RuvA homotetramer."
definition: >-
  RuvA_N. RuvA_N RuvA is part of the RuvABC resolvasome which catalyzes the resolution of Holliday junctions that arise during genetic recombination and DNA repair. The N-terminal domain of RuvA has an OB-fold structure similar to those of the RNA polymerase subunit RBP8 and the cold shock protein Bc-Csp. This domain binds Holliday junction DNA (along with domain II) and other RuvA proteins that form the RuvA homotetramer. — an NCBI CDD conserved domain (cd00658); members share this curated model.
