identifier: CDD:cd16473
label: "RING finger, H2 subclass, found in RING finger protein 103 (RNF103) and similar proteins. RNF103, also known as KF-1 or zinc finger protein 103 homolog (Zfp-103), is an endoplasmic reticulum (ER)-resident E3 ubiquitin-protein ligase that is widely expressed in many different organs, including brain, heart, kidney, spleen, and lung. It is involved in the ER-associated degradation (ERAD) pathway by interacting with components of the ERAD pathway, including Derlin-1 and VCP. RNF103 contains several hydrophobic regions at its N-terminal and middle regions, as well as a C-terminal C3H2C3-type RING-H2 finger."
definition: >-
  RING finger, H2 subclass, found in RING finger protein 103 (RNF103) and similar proteins. RNF103, also known as KF-1 or zinc finger protein 103 homolog (Zfp-103), is an endoplasmic reticulum (ER)-resident E3 ubiquitin-protein ligase that is widely expressed in many different organs, including brain, heart, kidney, spleen, and lung. It is involved in the ER-associated degradation (ERAD) pathway by interacting with components of the ERAD pathway, including Derlin-1 and VCP. RNF103 contains several hydrophobic regions at its N-terminal and middle regions, as well as a C-terminal C3H2C3-type RING-H2 finger. — an NCBI CDD conserved domain (cd16473); members share this curated model.
