identifier: CDD:cd08092
label: "ATP-grasp domain of cyanophycin synthetase. The N-terminal domain of cyanophycin synthetase (CS) is similar to the nucleotide-binding domain of the ATP-grasp superfamily. Cyanophycin synthetase (CS) catalyzes the synthesis of cyanophycin from arginine and aspartate in the presence of ATP. CS from Acinetobacter calcoaceticus has two different ATP-binding sites and therefore two active sites; one that is responsible for the addition of arginine has a higher affinity for ATP than the one that is responsible for the addition of aspartate. Polymerization of cyanophycin is dependent on the presence of ATP, Mg, and K ions. Active form exists as a homodimer. Cyanobacterial cyanophycin synthetase (CphA) belongs to this family. Cyanophycin synthetase exhibits similarities to both D-ala-D-ala ligase and other members of ATP-grasp superfamily. Some members of GCN5-related N-acetyltransferases (GNAT) and glutathione biosynthesis bifunctional (gshAB) proteins are homologous to this CS."
definition: >-
  ATP-grasp domain of cyanophycin synthetase. The N-terminal domain of cyanophycin synthetase (CS) is similar to the nucleotide-binding domain of the ATP-grasp superfamily. Cyanophycin synthetase (CS) catalyzes the synthesis of cyanophycin from arginine and aspartate in the presence of ATP. CS from Acinetobacter calcoaceticus has two different ATP-binding sites and therefore two active sites; one that is responsible for the addition of arginine has a higher affinity for ATP than the one that is responsible for the addition of aspartate. Polymerization of cyanophycin is dependent on the presence of ATP, Mg, and K ions. Active form exists as a homodimer. Cyanobacterial cyanophycin synthetase (CphA) belongs to this family. Cyanophycin synthetase exhibits similarities to both D-ala-D-ala ligase and other members of ATP-grasp superfamily. Some members of GCN5-related N-acetyltransferases (GNAT) and glutathione biosynthesis bifunctional (gshAB) proteins are homologous to this CS. — an NCBI CDD conserved domain (cd08092); members share this curated model.
