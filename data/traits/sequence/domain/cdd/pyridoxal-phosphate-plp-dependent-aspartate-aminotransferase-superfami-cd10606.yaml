identifier: CDD:cd10606
label: "Pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily: Acetylornithine aminotransferase-like. Acetylornithine aminotransferase family. This family belongs to pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily (fold I). The major groups in this CD corresponds to ornithine aminotransferase (OAT), acetylornithine aminotransferase (ACOAT) and gamma-amino-N-butyrate aminotransferase (GABA). OAT catalyzes the transamination of L-ornithine with 2-oxoglutarate. ACOATcatalyzes the transamination of N-2-acetyl-L-ornithine with 2-oxoglutarate. OAT is more substrate specific, while ACOATis not. GABA catalyzes the reversible transfer of the gamma-amino group of gamma-aminobutyrate to alpha-ketoglutarate to yield succinic semialdehyde and L-glutamate."
definition: >-
  Pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily: Acetylornithine aminotransferase-like. Acetylornithine aminotransferase family. This family belongs to pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily (fold I). The major groups in this CD corresponds to ornithine aminotransferase (OAT), acetylornithine aminotransferase (ACOAT) and gamma-amino-N-butyrate aminotransferase (GABA). OAT catalyzes the transamination of L-ornithine with 2-oxoglutarate. ACOATcatalyzes the transamination of N-2-acetyl-L-ornithine with 2-oxoglutarate. OAT is more substrate specific, while ACOATis not. GABA catalyzes the reversible transfer of the gamma-amino group of gamma-aminobutyrate to alpha-ketoglutarate to yield succinic semialdehyde and L-glutamate. — an NCBI CDD conserved domain (cd10606); members share this curated model.
