identifier: CDD:cd18263
label: "second BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 33 (KLHL33). KLHL33 contains BTB domains and kelch repeats, characteristics of a kelch family protein. Its function remains unclear. KLHL33 gene expression in normal and tumor tissue suggest a significant association with prostate cancer risk. KLHL33 contains two BTB domains. This model corresponds to the second BTB domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  second BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 33 (KLHL33). KLHL33 contains BTB domains and kelch repeats, characteristics of a kelch family protein. Its function remains unclear. KLHL33 gene expression in normal and tumor tissue suggest a significant association with prostate cancer risk. KLHL33 contains two BTB domains. This model corresponds to the second BTB domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18263); members share this curated model.
