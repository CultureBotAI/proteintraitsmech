identifier: CDD:cd08592
label: "Catalytic domain of metazoan phosphoinositide-specific phospholipase C-gamma. This family corresponds to the catalytic domain present in metazoan phosphoinositide-specific phospholipase C (PI-PLC, EC 3.1.4.11)-gamma isozymes. PI-PLC is a signaling enzyme that hydrolyzes the membrane phospholipids phosphatidylinositol-4,5-bisphosphate (PIP2)  to generate two important second messengers in eukaryotic signal transduction cascades,  inositol 1,4,5-trisphosphate (InsP3) and diacylglycerol (DAG). InsP3 triggers inflow of calcium from intracellular stores, while DAG, together with calcium, activates protein kinase C, which goes on to phosphorylate other molecules, leading to altered cellular activity. Calcium is required for the catalysis. PI-PLC-gamma represents a class of mammalian PI-PLC that has an N-terminal pleckstrin homology (PH) domain, an array of EF hands, a PLC catalytic core domain, and a C2 domain.The PLC catalytic core domain is a TIM barrel with two highly conserved regions (X and Y) split by a highly degenerate linker sequence. Unique to PI-PLC-gamma, a second PH domain, two SH2 (Src homology 2) regions, and one SH3 (Src homology 3) region is present within this linker region. There are two PI-PLC-gamma isozymes (1-2). They are activated by receptor and non-receptor tyrosine kinases due to the presence of two SH2 and a single SH3 domain within the linker region.  Aside from the two PI-PLC-gamma isozymes identified in mammals, some eukaryotic PI-PLC-gamma homologs have been classified with this subfamily."
definition: >-
  Catalytic domain of metazoan phosphoinositide-specific phospholipase C-gamma. This family corresponds to the catalytic domain present in metazoan phosphoinositide-specific phospholipase C (PI-PLC, EC 3.1.4.11)-gamma isozymes. PI-PLC is a signaling enzyme that hydrolyzes the membrane phospholipids phosphatidylinositol-4,5-bisphosphate (PIP2) to generate two important second messengers in eukaryotic signal transduction cascades, inositol 1,4,5-trisphosphate (InsP3) and diacylglycerol (DAG). InsP3 triggers inflow of calcium from intracellular stores, while DAG, together with calcium, activates protein kinase C, which goes on to phosphorylate other molecules, leading to altered cellular activity. Calcium is required for the catalysis. PI-PLC-gamma represents a class of mammalian PI-PLC that has an N-terminal pleckstrin homology (PH) domain, an array of EF hands, a PLC catalytic core domain, and a C2 domain.The PLC catalytic core domain is a TIM barrel with two highly conserved regions (X and Y) split by a highly degenerate linker sequence. Unique to PI-PLC-gamma, a second PH domain, two SH2 (Src homology 2) regions, and one SH3 (Src homology 3) region is present within this linker region. There are two PI-PLC-gamma isozymes (1-2). They are activated by receptor and non-receptor tyrosine kinases due to the presence of two SH2 and a single SH3 domain within the linker region. Aside from the two PI-PLC-gamma isozymes identified in mammals, some eukaryotic PI-PLC-gamma homologs have been classified with this subfamily. — an NCBI CDD conserved domain (cd08592); members share this curated model.
