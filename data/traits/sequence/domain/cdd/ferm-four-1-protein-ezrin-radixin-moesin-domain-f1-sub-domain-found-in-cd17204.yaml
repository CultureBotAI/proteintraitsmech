identifier: CDD:cd17204
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in erythrocyte band 4.1-like protein 4B (EPB41L4B). EPB41L4B, also termed FERM-containing protein CG1, or expressed in high metastatic cells (Ehm2), or Lulu2, is a member of the band 4.1/Nbl4 (novel band 4.1-like protein 4) group of the FERM protein superfamily. It contains a FERM domain that is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). EPB41L4B is a positive regulator of keratinocyte adhesion and motility, suggesting a role in wound healing. It also promotes cancer metastasis in melanoma, prostate cancer and breast cancer."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in erythrocyte band 4.1-like protein 4B (EPB41L4B). EPB41L4B, also termed FERM-containing protein CG1, or expressed in high metastatic cells (Ehm2), or Lulu2, is a member of the band 4.1/Nbl4 (novel band 4.1-like protein 4) group of the FERM protein superfamily. It contains a FERM domain that is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). EPB41L4B is a positive regulator of keratinocyte adhesion and motility, suggesting a role in wound healing. It also promotes cancer metastasis in melanoma, prostate cancer and breast cancer. — an NCBI CDD conserved domain (cd17204); members share this curated model.
