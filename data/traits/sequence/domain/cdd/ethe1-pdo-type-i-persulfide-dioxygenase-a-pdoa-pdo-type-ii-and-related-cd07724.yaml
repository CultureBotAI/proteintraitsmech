identifier: CDD:cd07724
label: "ETHE1 (PDO type I), persulfide dioxygenase A (PDOA, PDO type II) and related proteins; MBL-fold metallo-hydrolase domain. Persulfide dioxygenase (PDO, also known as sulfur dioxygenase, SDO, EC 1.13.11.18) is a non-heme iron-dependent oxygenase which catalyzes the oxidation of glutathione persulfide to glutathione and persulfite in the mitochondria. Mutations in ethe1 (the human PDO gene) are responsible for a rare autosomal recessive metabolic disorder called ethylmalonic encephalopathy. Arabidopsis thaliana ETHE1 is essential for embryo and endosperm development. Bacterial ETHE1-type PDOs are also called Type 1 PDOs. Type II PDOs (also called PDOAs), are mainly proteobacterial. These enzymes belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions."
definition: >-
  ETHE1 (PDO type I), persulfide dioxygenase A (PDOA, PDO type II) and related proteins; MBL-fold metallo-hydrolase domain. Persulfide dioxygenase (PDO, also known as sulfur dioxygenase, SDO, EC 1.13.11.18) is a non-heme iron-dependent oxygenase which catalyzes the oxidation of glutathione persulfide to glutathione and persulfite in the mitochondria. Mutations in ethe1 (the human PDO gene) are responsible for a rare autosomal recessive metabolic disorder called ethylmalonic encephalopathy. Arabidopsis thaliana ETHE1 is essential for embryo and endosperm development. Bacterial ETHE1-type PDOs are also called Type 1 PDOs. Type II PDOs (also called PDOAs), are mainly proteobacterial. These enzymes belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions. — an NCBI CDD conserved domain (cd07724); members share this curated model.
