identifier: CDD:cd00254
label: "lytic transglycosylase(LT)-like domain. Members include the soluble and insoluble membrane-bound LTs in bacteria and LTs in bacteriophage lambda. LTs catalyze the cleavage of the beta-1,4-glycosidic bond between N-acetylmuramic acid (MurNAc) and N-acetyl-D-glucosamine (GlcNAc), as do \"goose-type\" lysozymes. However, in addition to this, they also make a new glycosidic bond with the C6 hydroxyl group of the same muramic acid residue."
definition: >-
  lytic transglycosylase(LT)-like domain. Members include the soluble and insoluble membrane-bound LTs in bacteria and LTs in bacteriophage lambda. LTs catalyze the cleavage of the beta-1,4-glycosidic bond between N-acetylmuramic acid (MurNAc) and N-acetyl-D-glucosamine (GlcNAc), as do "goose-type" lysozymes. However, in addition to this, they also make a new glycosidic bond with the C6 hydroxyl group of the same muramic acid residue. — an NCBI CDD conserved domain (cd00254); members share this curated model.
