identifier: CDD:cd01812
label: "ubiquitin-like (Ubl) domain found in BAG family molecular chaperone regulator 1 (BAG1) and similar proteins. BAG1, also termed Bcl-2-associated athanogene 1, or HAP, is a multifunctional protein involved in a variety of cellular functions such as apoptosis, transcription, and proliferative pathways, as well as in cell signaling and differentiation. It delivers chaperone-recognized unfolded substrates to the proteasome for degradation. BAG1 functions as a co-chaperone for Hsp70/Hsc70 to increase Hsp70 foldase activity. It also suppresses apoptosis and enhances neuronal differentiation. As an anti-apoptotic factor, BAG1 interacts with tau and regulates its proteasomal degradation. It also binds to BCR-ABL with a high affinity, and directly routes immature BCR-ABL for proteasomal degradation. It acts as a potential therapeutic target in Parkinson's disease. It also modulates huntingtin toxicity, aggregation, degradation, and subcellular distribution, suggesting a role in Huntington's disease. There are at least four isoforms of Bag1 protein that are formed by alternative initiation of translation within a common mRNA. BAG1 contains an N-terminal ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold, and a C-terminal BAG domain."
definition: >-
  ubiquitin-like (Ubl) domain found in BAG family molecular chaperone regulator 1 (BAG1) and similar proteins. BAG1, also termed Bcl-2-associated athanogene 1, or HAP, is a multifunctional protein involved in a variety of cellular functions such as apoptosis, transcription, and proliferative pathways, as well as in cell signaling and differentiation. It delivers chaperone-recognized unfolded substrates to the proteasome for degradation. BAG1 functions as a co-chaperone for Hsp70/Hsc70 to increase Hsp70 foldase activity. It also suppresses apoptosis and enhances neuronal differentiation. As an anti-apoptotic factor, BAG1 interacts with tau and regulates its proteasomal degradation. It also binds to BCR-ABL with a high affinity, and directly routes immature BCR-ABL for proteasomal degradation. It acts as a potential therapeutic target in Parkinson's disease. It also modulates huntingtin toxicity, aggregation, degradation, and subcellular distribution, suggesting a role in Huntington's disease. There are at least four isoforms of Bag1 protein that are formed by alternative initiation of translation within a common mRNA. BAG1 contains an N-terminal ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold, and a C-terminal BAG domain. — an NCBI CDD conserved domain (cd01812); members share this curated model.
