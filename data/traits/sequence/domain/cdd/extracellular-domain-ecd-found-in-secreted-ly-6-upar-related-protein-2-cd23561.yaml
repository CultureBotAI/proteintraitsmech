identifier: CDD:cd23561
label: "extracellular domain (ECD) found in Secreted Ly-6/uPAR-related protein 2 (SLURP-2) and similar proteins. SLURP-2 (also called Lynx1, or secreted Ly-6/uPAR domain-containing protein 2, or secreted LY6/PLAUR domain-containing protein 2) binds and may modulate the functional properties of nicotinic and muscarinic acetylcholine receptors. It may regulate keratinocytes proliferation, differentiation, and apoptosis. In vitro SLURP-2 moderately inhibits ACh-evoked currents of alpha-3:beta-2-containing nAChRs and strongly inhibits alpha-4:beta-2-containing nAChRs, modulates alpha-7-containing nAChRs, and inhibits nicotine-induced signaling probably implicating alpha-3:beta-4-containing nAChRs. It may act on alpha-3:beta-2 and alpha-7 nAChRs in an orthosteric, and on mAChRs, such as CHRM1 and CHRM3, in an allosteric manner. SLURP-2 contains an extracellular domain (ECD) that belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
