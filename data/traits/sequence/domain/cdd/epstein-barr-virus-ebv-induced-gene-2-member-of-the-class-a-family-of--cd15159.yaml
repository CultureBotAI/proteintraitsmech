identifier: CDD:cd15159
label: "Epstein-Barr virus (EBV)-induced gene 2, member of the class A family of seven-transmembrane G protein-coupled receptors. Epstein-Barr virus-induced G-protein coupled receptor 2 (EBI2), also called GPR183, is activated by 7alpha, 25-dihydroxyxcholesterol (7alpha, 25-OHC), an oxysterol. EBI2 was originally identified as one of major genes induced in the Burkitt's lymphoma cell line BL41by EBV infection. EBI2 is involved in regulating B cell migration and responses, and is also implicated in human diseases such as type I diabetes, multiple sclerosis, and cancers."
definition: >-
  Epstein-Barr virus (EBV)-induced gene 2, member of the class A family of seven-transmembrane G protein-coupled receptors. Epstein-Barr virus-induced G-protein coupled receptor 2 (EBI2), also called GPR183, is activated by 7alpha, 25-dihydroxyxcholesterol (7alpha, 25-OHC), an oxysterol. EBI2 was originally identified as one of major genes induced in the Burkitt's lymphoma cell line BL41by EBV infection. EBI2 is involved in regulating B cell migration and responses, and is also implicated in human diseases such as type I diabetes, multiple sclerosis, and cancers. — an NCBI CDD conserved domain (cd15159); members share this curated model.
