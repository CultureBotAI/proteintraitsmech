identifier: CDD:cd04597
label: "Two tandem repeats of the cystathionine beta-synthase (CBS pair) domains associated with  family II inorganic pyrophosphatase. This cd contains two tandem repeats of the cystathionine beta-synthase (CBS pair) domains associated with a subgroup of family II inorganic pyrophosphatases (PPases) that also contain a DRTGG domain. The homolog from Clostridium has been shown to be inhibited by AMP and activated by a novel effector, diadenosine 5',5-P1,P4-tetraphosphate (AP(4)A), which has been shown to bind to the CBS domain. The CBS domain, named after human CBS, is a small domain originally identified in cystathionine beta-synthase and is subsequently found in a wide range of different proteins. CBS domains usually occur in tandem repeats. They associate to form a so-called Bateman domain or a CBS pair based on crystallographic studies in bacteria.  The CBS pair was used as a basis for this cd hierarchy since the human CBS proteins can adopt the typical core structure and form an intramolecular CBS pair.  The interface between the two CBS domains forms a cleft that is a potential ligand binding site. The CBS pair coexists with a variety of other functional domains and this has been used to help in its classification here."
definition: >-
  Two tandem repeats of the cystathionine beta-synthase (CBS pair) domains associated with family II inorganic pyrophosphatase. This cd contains two tandem repeats of the cystathionine beta-synthase (CBS pair) domains associated with a subgroup of family II inorganic pyrophosphatases (PPases) that also contain a DRTGG domain. The homolog from Clostridium has been shown to be inhibited by AMP and activated by a novel effector, diadenosine 5',5-P1,P4-tetraphosphate (AP(4)A), which has been shown to bind to the CBS domain. The CBS domain, named after human CBS, is a small domain originally identified in cystathionine beta-synthase and is subsequently found in a wide range of different proteins. CBS domains usually occur in tandem repeats. They associate to form a so-called Bateman domain or a CBS pair based on crystallographic studies in bacteria. The CBS pair was used as a basis for this cd hierarchy since the human CBS proteins can adopt the typical core structure and form an intramolecular CBS pair. The interface between the two CBS domains forms a cleft that is a potential ligand binding site. The CBS pair coexists with a variety of other functional domains and this has been used to help in its classification here. — an NCBI CDD conserved domain (cd04597); members share this curated model.
