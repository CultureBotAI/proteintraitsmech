identifier: CDD:cd23516
label: "Class I hydrophobin similar to Neurospora crassa eas. Class I hydrophobins are a unique family of fungal proteins that form a polymeric, water-repellent monolayer on the surface of structures such as spores and fruiting bodies. They form amyloid-like rodlets which have an underlying cross-beta amyloid structure. This group includes the rodlet protein of Neurospora crassa (gene eas), which is the main component of the hydrophobic sheath covering the surface of fungal spores. The surface hydrophobicity is important for processes such as association of hyphae in reproductive structures, dispersal of aerial spores, and adhesion of pathogens to host structures."
definition: >-
  Class I hydrophobin similar to Neurospora crassa eas. Class I hydrophobins are a unique family of fungal proteins that form a polymeric, water-repellent monolayer on the surface of structures such as spores and fruiting bodies. They form amyloid-like rodlets which have an underlying cross-beta amyloid structure. This group includes the rodlet protein of Neurospora crassa (gene eas), which is the main component of the hydrophobic sheath covering the surface of fungal spores. The surface hydrophobicity is important for processes such as association of hyphae in reproductive structures, dispersal of aerial spores, and adhesion of pathogens to host structures. — an NCBI CDD conserved domain (cd23516); members share this curated model.
