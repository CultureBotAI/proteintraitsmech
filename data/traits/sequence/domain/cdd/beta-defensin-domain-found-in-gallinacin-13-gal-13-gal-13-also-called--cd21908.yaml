label: BDD_Gal13
definition: >-
  beta-defensin domain found in gallinacin-13 (Gal-13). Gal-13, also called beta-defensin 13, has bactericidal activity against Escherichia coli, Listeria monocytogenes, Salmonella typhimurium and Streptococcus pyogenes but not against Staphylococcus aureus. Gal-13 contains only one beta-defensin domain
