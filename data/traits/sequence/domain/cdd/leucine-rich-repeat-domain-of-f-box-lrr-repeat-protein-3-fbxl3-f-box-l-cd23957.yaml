identifier: CDD:cd23957
label: "Leucine-rich repeat domain of F-box/LRR-repeat protein 3. FBXL3 (F-box/LRR-repeat protein 3), together with SKP1 (S-phase-kinase-associated protein-1) and cullin subunit CUL1, forms a Skp1-Cul1-F-box-protein (SCF) ubiquitin ligase complex that ubiquitinates CRY repressor proteins and mediates their degradation. FBXL21 also ubiquitinates the cryptochromes (CRYs) but counteracts FBXL3. This plays an important role in regulating oscillation of the circadian clock."
definition: >-
  Leucine-rich repeat domain of F-box/LRR-repeat protein 3. FBXL3 (F-box/LRR-repeat protein 3), together with SKP1 (S-phase-kinase-associated protein-1) and cullin subunit CUL1, forms a Skp1-Cul1-F-box-protein (SCF) ubiquitin ligase complex that ubiquitinates CRY repressor proteins and mediates their degradation. FBXL21 also ubiquitinates the cryptochromes (CRYs) but counteracts FBXL3. This plays an important role in regulating oscillation of the circadian clock. — an NCBI CDD conserved domain (cd23957); members share this curated model.
