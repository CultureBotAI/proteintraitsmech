identifier: CDD:cd17066
label: "ubiquitin-like (Ubl) domain found in Kip1 ubiquitination-promoting complex protein 2 (KPC2) and similar proteins. KPC2, also termed ubiquitin-associated domain-containing protein 1 or UBA domain containing 1 (UBAC1), or glialblastoma cell differentiation-related protein 1 (GBDR1), is one of two subunits of Kip1 ubiquitination-promoting complex (KPC), a novel E3 ubiquitin-protein ligase that also contains KPC1 subunit and regulates the ubiquitin-dependent degradation of the cyclin-dependent kinase (CDK) inhibitor p27 at G1 phase. KPC2 contains an ubiquitin-like (Ubl) domain and two ubiquitin-associated (UBA) domains."
definition: >-
  ubiquitin-like (Ubl) domain found in Kip1 ubiquitination-promoting complex protein 2 (KPC2) and similar proteins. KPC2, also termed ubiquitin-associated domain-containing protein 1 or UBA domain containing 1 (UBAC1), or glialblastoma cell differentiation-related protein 1 (GBDR1), is one of two subunits of Kip1 ubiquitination-promoting complex (KPC), a novel E3 ubiquitin-protein ligase that also contains KPC1 subunit and regulates the ubiquitin-dependent degradation of the cyclin-dependent kinase (CDK) inhibitor p27 at G1 phase. KPC2 contains an ubiquitin-like (Ubl) domain and two ubiquitin-associated (UBA) domains. — an NCBI CDD conserved domain (cd17066); members share this curated model.
