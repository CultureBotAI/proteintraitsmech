identifier: CDD:cd05892
label: "C-terminal immunoglobulin (Ig)-like domain of myotilin; member of the I-set of Ig superfamily (IgSF) domains. The members here are composed of the C-terminal immunoglobulin (Ig)-like domain of myotilin. Mytolin belongs to the palladin-myotilin-myopalladin family. Proteins belonging to the latter family contain multiple Ig-like domains and function as scaffolds, modulating the actin cytoskeleton. Myotilin is most abundant in skeletal and cardiac muscle and is involved in maintaining sarcomere integrity. It binds to alpha-actinin, filamin, and actin. Mutations in myotilin lead to muscle disorders. This group belongs to the I-set of IgSF domains, having A-B-E-D strands in one beta-sheet and A'-G-F-C-C' in the other. Like the V-set Ig domains, members of the I-set have a discontinuous A strand, but lack a C\" strand."
definition: >-
  C-terminal immunoglobulin (Ig)-like domain of myotilin; member of the I-set of Ig superfamily (IgSF) domains. The members here are composed of the C-terminal immunoglobulin (Ig)-like domain of myotilin. Mytolin belongs to the palladin-myotilin-myopalladin family. Proteins belonging to the latter family contain multiple Ig-like domains and function as scaffolds, modulating the actin cytoskeleton. Myotilin is most abundant in skeletal and cardiac muscle and is involved in maintaining sarcomere integrity. It binds to alpha-actinin, filamin, and actin. Mutations in myotilin lead to muscle disorders. This group belongs to the I-set of IgSF domains, having A-B-E-D strands in one beta-sheet and A'-G-F-C-C' in the other. Like the V-set Ig domains, members of the I-set have a discontinuous A strand, but lack a C" strand. — an NCBI CDD conserved domain (cd05892); members share this curated model.
