identifier: CDD:cd21161
label: "Nidoviral uridylate-specific endoribonuclease (NendoU) domain of coronavirus Nonstructural Protein 15 (Nsp15) and related proteins. Nidovirus endoribonucleases (NendoUs) are uridylate-specific endoribonucleases, which release a cleavage product containing a 2',3'-cyclic phosphate at the 3' terminal end. NendoUs include Nsp15 from coronaviruses and Nsp11 from arteriviruses, both of which may participate in the viral replication process and in the evasion of the host immune system. Except for turkey coronavirus (TCoV) Nsp15, Mn2+ is generally essential for the catalytic activity of coronavirus Nsp15. Coronavirus Nsp15 from Severe Acute Respiratory Syndrome Coronavirus (SARS-CoV), human Coronavirus 229E (HCoV229E), and murine hepatitis virus (MHV) form a functional hexamer while Porcine DeltaCoronavirus (PDCoV) Nsp15 has been shown to exist as a dimer and a monomer in solution. NendoUs are distantly related to Xenopus laevis Mn(2+)-dependent uridylate-specific endoribonuclease (XendoU) which is involved in the processing of intron-encoded box C/D U16 small, nucleolar RNA."
definition: >-
  Nidoviral uridylate-specific endoribonuclease (NendoU) domain of coronavirus Nonstructural Protein 15 (Nsp15) and related proteins. Nidovirus endoribonucleases (NendoUs) are uridylate-specific endoribonucleases, which release a cleavage product containing a 2',3'-cyclic phosphate at the 3' terminal end. NendoUs include Nsp15 from coronaviruses and Nsp11 from arteriviruses, both of which may participate in the viral replication process and in the evasion of the host immune system. Except for turkey coronavirus (TCoV) Nsp15, Mn2+ is generally essential for the catalytic activity of coronavirus Nsp15. Coronavirus Nsp15 from Severe Acute Respiratory Syndrome Coronavirus (SARS-CoV), human Coronavirus 229E (HCoV229E), and murine hepatitis virus (MHV) form a functional hexamer while Porcine DeltaCoronavirus (PDCoV) Nsp15 has been shown to exist as a dimer and a monomer in solution. NendoUs are distantly related to Xenopus laevis Mn(2+)-dependent uridylate-specific endoribonuclease (XendoU) which is involved in the processing of intron-encoded box C/D U16 small, nucleolar RNA. — an NCBI CDD conserved domain (cd21161); members share this curated model.
