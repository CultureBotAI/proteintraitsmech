identifier: CDD:cd11827
label: "Src homology 3 domain of Myosins Ie, If, and similar proteins. Myosins Ie (MyoIe) and If (MyoIf) are nonmuscle, unconventional, long tailed, class I myosins containing an N-terminal motor domain and a myosin tail with TH1, TH2, and SH3 domains. MyoIe interacts with the endocytic proteins, dynamin and synaptojanin-1, through its SH3 domain; it may play a role in clathrin-dependent endocytosis. In the kidney, MyoIe is critical for podocyte function and normal glomerular filtration. Mutations in MyoIe is associated with focal segmental glomerulosclerosis, a disease characterized by massive proteinuria and progression to end-stage kidney disease. MyoIf is predominantly expressed in the immune system; it plays a role in immune cell motility and innate immunity. Mutations in MyoIf may be associated with the loss of hearing. The MyoIf gene has also been found to be fused to the MLL (Mixed lineage leukemia) gene in infant acute myeloid leukemias (AML). SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
