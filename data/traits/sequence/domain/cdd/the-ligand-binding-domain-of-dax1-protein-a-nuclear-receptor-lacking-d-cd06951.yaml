identifier: CDD:cd06951
label: "The ligand binding domain of DAX1 protein, a nuclear receptor lacking DNA binding domain. The ligand binding domain of DAX1-like proteins: This orphan nuclear receptor family includes  DAX1 (dosage-sensitive sex reversal adrenal hypoplasia congenita critical region on chromosome X gene 1) and the Small Heterodimer Partner (SHP). Both receptors have a typical ligand binding domain, but lack the DNA binding domain, typical to almost all of the nuclear receptors. They function as a transcriptional coregulator by directly interacting with other nuclear receptors. DAX1 and SHP can form heterodimers with each other, as well as with many other nuclear receptors. In addition, DAX1 can also form homodimers. DAX1 plays an important role in the normal development of several hormone-producing tissues.  SHP has shown to regulate a variety of target genes."
definition: >-
  The ligand binding domain of DAX1 protein, a nuclear receptor lacking DNA binding domain. The ligand binding domain of DAX1-like proteins: This orphan nuclear receptor family includes DAX1 (dosage-sensitive sex reversal adrenal hypoplasia congenita critical region on chromosome X gene 1) and the Small Heterodimer Partner (SHP). Both receptors have a typical ligand binding domain, but lack the DNA binding domain, typical to almost all of the nuclear receptors. They function as a transcriptional coregulator by directly interacting with other nuclear receptors. DAX1 and SHP can form heterodimers with each other, as well as with many other nuclear receptors. In addition, DAX1 can also form homodimers. DAX1 plays an important role in the normal development of several hormone-producing tissues. SHP has shown to regulate a variety of target genes. — an NCBI CDD conserved domain (cd06951); members share this curated model.
