identifier: CDD:cd05740
label: "Immunoglobulin (Ig)-like domain of human carcinoembryonic antigen (CEA) related cell adhesion molecule (CEACAM) domains 2, 4, and 6, and similar domains. The members here are composed of the second, fourth, and sixth immunoglobulin (Ig)-like domains in human carcinoembryonic antigen (CEA) related cell adhesion molecule (CEACAM) protein subfamily. The CEA family is a group of anchored or secreted glycoproteins expressed by epithelial cells, leukocytes, endothelial cells, and placenta. The CEA family is divided into the CEACAM and pregnancy-specific glycoprotein (PSG) subfamilies. This group represents the CEACAM subfamily. CEACAM1 has many important cellular functions; it is a cell adhesion molecule and a signaling molecule that regulates the growth of tumor cells, an angiogenic factor, and a receptor for bacterial and viral pathogens, including mouse hepatitis virus (MHV). In mice, four isoforms of CEACAM1 generated by alternative splicing have either two [D1, D4] or four [D1-D4] Ig-like domains on the cell surface."
definition: >-
  Immunoglobulin (Ig)-like domain of human carcinoembryonic antigen (CEA) related cell adhesion molecule (CEACAM) domains 2, 4, and 6, and similar domains. The members here are composed of the second, fourth, and sixth immunoglobulin (Ig)-like domains in human carcinoembryonic antigen (CEA) related cell adhesion molecule (CEACAM) protein subfamily. The CEA family is a group of anchored or secreted glycoproteins expressed by epithelial cells, leukocytes, endothelial cells, and placenta. The CEA family is divided into the CEACAM and pregnancy-specific glycoprotein (PSG) subfamilies. This group represents the CEACAM subfamily. CEACAM1 has many important cellular functions; it is a cell adhesion molecule and a signaling molecule that regulates the growth of tumor cells, an angiogenic factor, and a receptor for bacterial and viral pathogens, including mouse hepatitis virus (MHV). In mice, four isoforms of CEACAM1 generated by alternative splicing have either two [D1, D4] or four [D1-D4] Ig-like domains on the cell surface. — an NCBI CDD conserved domain (cd05740); members share this curated model.
