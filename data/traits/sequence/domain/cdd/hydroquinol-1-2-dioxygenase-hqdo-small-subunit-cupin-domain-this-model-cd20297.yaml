identifier: CDD:cd20297
label: "hydroquinol 1,2-dioxygenase (HQDO) small subunit, cupin domain. This model describes the small (or alpha) subunit of hydroquinone 1,2-dioxygenase (HQDO), which adopts a cupin domain fold. HQDO is a heterotetramer of two alpha and two beta subunits of 19kDa and 38kDa, respectively, and is a Fe(II) ring cleaving dioxygenase that is a key enzyme in the hydroquinone pathway of para-nitrophenol degradation, where it catalyzes the ring cleavage of hydroquinone to gamma-hydroxymuconic semialdehyde. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  hydroquinol 1,2-dioxygenase (HQDO) small subunit, cupin domain. This model describes the small (or alpha) subunit of hydroquinone 1,2-dioxygenase (HQDO), which adopts a cupin domain fold. HQDO is a heterotetramer of two alpha and two beta subunits of 19kDa and 38kDa, respectively, and is a Fe(II) ring cleaving dioxygenase that is a key enzyme in the hydroquinone pathway of para-nitrophenol degradation, where it catalyzes the ring cleavage of hydroquinone to gamma-hydroxymuconic semialdehyde. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd20297); members share this curated model.
