identifier: CDD:cd23499
label: "first ricin B-type lectin domain, beta-trefoil fold, found in Shewanella algae sphingolipid ceramide N-deacylase (SCDase) and similar proteins. SCDase (EC 3.5.1.69) is an enzyme which hydrolyzes the N-acyl linkage between fatty acid and sphingosine in ceramide of various glycosphingolipids and sphingomyelin. Shewanella algae SCDase contains two ricin B-type lectin domains at its C-terminus. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket. The model corresponds to the first lectin domain."
definition: >-
  first ricin B-type lectin domain, beta-trefoil fold, found in Shewanella algae sphingolipid ceramide N-deacylase (SCDase) and similar proteins. SCDase (EC 3.5.1.69) is an enzyme which hydrolyzes the N-acyl linkage between fatty acid and sphingosine in ceramide of various glycosphingolipids and sphingomyelin. Shewanella algae SCDase contains two ricin B-type lectin domains at its C-terminus. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket. The model corresponds to the first lectin domain. — an NCBI CDD conserved domain (cd23499); members share this curated model.
