identifier: CDD:cd08993
label: "Glycosyl hydrolase family 130. This subfamily contains glycosyl hydrolase family 130 (GH130) proteins, as classified by the carbohydrate-active enzymes database (CAZY), are phosphorylases and hydrolases for beta-mannosides, and include beta-1,4-mannosylglucose phosphorylase (EC 2.4.1.281), beta-1,4-mannooligosaccharide phosphorylase (EC 2.4.1.319), among others that have yet to be characterized. They possess 5-bladed beta-propeller domains similar to families 32, 43, 62, 68, 117 (GH32, GH43, GH62, GH68, GH117). GH130 enzymes are involved in the bacterial utilization of mannans or N-linked glycans. Beta-1,4-mannosylglucose phosphorylase is involved in degradation of beta-1,4-D-mannosyl-N-acetyl-D-glucosamine linkages in the core of N-glycans; it produces alpha-mannose 1-phosphate and glucose from 4-O-beta-D-mannosyl-D-glucose and inorganic phosphate, using a critical catalytic Asp as a proton donor. This family includes Ruminococcus albus 4-O-beta-D-mannosyl-D-glucose phosphorylase (RaMP1) and beta-(1,4)-mannooligosaccharide phosphorylase (RaMP2), enzymes that phosphorolyze beta-mannosidic linkages at the non-reducing ends of their substrates, and have substantially diverse substrate specificity that are determined by three loop regions."
definition: >-
  Glycosyl hydrolase family 130. This subfamily contains glycosyl hydrolase family 130 (GH130) proteins, as classified by the carbohydrate-active enzymes database (CAZY), are phosphorylases and hydrolases for beta-mannosides, and include beta-1,4-mannosylglucose phosphorylase (EC 2.4.1.281), beta-1,4-mannooligosaccharide phosphorylase (EC 2.4.1.319), among others that have yet to be characterized. They possess 5-bladed beta-propeller domains similar to families 32, 43, 62, 68, 117 (GH32, GH43, GH62, GH68, GH117). GH130 enzymes are involved in the bacterial utilization of mannans or N-linked glycans. Beta-1,4-mannosylglucose phosphorylase is involved in degradation of beta-1,4-D-mannosyl-N-acetyl-D-glucosamine linkages in the core of N-glycans; it produces alpha-mannose 1-phosphate and glucose from 4-O-beta-D-mannosyl-D-glucose and inorganic phosphate, using a critical catalytic Asp as a proton donor. This family includes Ruminococcus albus 4-O-beta-D-mannosyl-D-glucose phosphorylase (RaMP1) and beta-(1,4)-mannooligosaccharide phosphorylase (RaMP2), enzymes that phosphorolyze beta-mannosidic linkages at the non-reducing ends of their substrates, and have substantially diverse substrate specificity that are determined by three loop regions. — an NCBI CDD conserved domain (cd08993); members share this curated model.
