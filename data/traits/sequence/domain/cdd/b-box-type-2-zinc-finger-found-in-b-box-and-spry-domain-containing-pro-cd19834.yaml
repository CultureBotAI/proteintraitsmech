identifier: CDD:cd19834
label: "B-box-type 2 zinc finger  found in B box and SPRY domain-containing protein (BSPRY) and similar proteins. BSPRY is a regulatory protein for maintaining calcium homeostasis. It may regulate epithelial calcium transport by inhibiting TRPV5 activity. BSPRY is composed of a B-box, an alpha-helical coiled coil and a SPRY domain. The B-box motif shows high sequence similarity with B-Box-type zinc finger 2 found in tripartite motif-containing proteins (TRIMs). The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif."
definition: >-
  B-box-type 2 zinc finger found in B box and SPRY domain-containing protein (BSPRY) and similar proteins. BSPRY is a regulatory protein for maintaining calcium homeostasis. It may regulate epithelial calcium transport by inhibiting TRPV5 activity. BSPRY is composed of a B-box, an alpha-helical coiled coil and a SPRY domain. The B-box motif shows high sequence similarity with B-Box-type zinc finger 2 found in tripartite motif-containing proteins (TRIMs). The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif. — an NCBI CDD conserved domain (cd19834); members share this curated model.
