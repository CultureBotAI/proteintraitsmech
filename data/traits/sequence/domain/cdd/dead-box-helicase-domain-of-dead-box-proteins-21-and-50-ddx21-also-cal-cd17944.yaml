identifier: CDD:cd17944
label: "DEAD-box helicase domain of DEAD box proteins 21 and 50. DDX21 (also called Gu-Alpha and nucleolar RNA helicase 2) is an RNA helicase that acts as a sensor of the transcriptional status of both RNA polymerase (Pol) I and II.  It promotes ribosomal RNA (rRNA) processing and transcription from polymerase II (Pol II) and binds various RNAs, such as rRNAs, snoRNAs, 7SK and, at lower extent, mRNAs. DDX50 (also called Gu-Beta, Nucleolar Protein Gu2, and malignant cell derived RNA helicase).  DDX21 and DDX50 have similar genomic structures and are in tandem orientation on chromosome 10, suggesting that the two genes arose by gene duplication in evolution. Diseases associated with DDX21 include stomach disease and cerebral creatine deficiency syndrome 3.  Diseases associated with DDX50 include rectal disease.  Both are members of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. Their name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP- binding region."
definition: >-
  DEAD-box helicase domain of DEAD box proteins 21 and 50. DDX21 (also called Gu-Alpha and nucleolar RNA helicase 2) is an RNA helicase that acts as a sensor of the transcriptional status of both RNA polymerase (Pol) I and II. It promotes ribosomal RNA (rRNA) processing and transcription from polymerase II (Pol II) and binds various RNAs, such as rRNAs, snoRNAs, 7SK and, at lower extent, mRNAs. DDX50 (also called Gu-Beta, Nucleolar Protein Gu2, and malignant cell derived RNA helicase). DDX21 and DDX50 have similar genomic structures and are in tandem orientation on chromosome 10, suggesting that the two genes arose by gene duplication in evolution. Diseases associated with DDX21 include stomach disease and cerebral creatine deficiency syndrome 3. Diseases associated with DDX50 include rectal disease. Both are members of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. Their name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP- binding region. — an NCBI CDD conserved domain (cd17944); members share this curated model.
