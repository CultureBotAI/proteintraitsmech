identifier: CDD:cd15640
label: "PHD finger found in lysine-specific demethylase 7 (KDM7). KDM7, also termed JmjC domain-containing histone demethylation protein 1D (JHDM1D), or KIAA1718, is a dual histone demethylase that catalyzes demethylation of monomethylated and dimethylated H3K9 (H3K9me2/me1) and H3K27 (H3K27me2/me1), which functions as an eraser of silencing marks on chromatin during brain development. It also plays a tumor-suppressive role by regulating angiogenesis. KDM7 contains a plant homeodomain (PHD) that binds Lys4-trimethylated histone 3 (H3K4me3) and a jumonji domain that demethylates either H3K9me2 or H3K27me2."
definition: >-
