identifier: CDD:cd16029
label: "N-acetylgalactosamine 4-sulfatase, also called arylsulftase B. Sulfatases catalyze the hydrolysis of sulfuric acid esters from a wide variety of substrates. N-acetylgalactosamine 4-sulfatase catalyzes the removal of the sulfate ester group from position 4 of an N-acetylgalactosamine sugar at the non-reducing terminus of the polysaccharide in the degradative pathways of the glycosaminoglycans dermatan sulfate and chondroitin-4-sulfate. N-acetylgalactosamine 4-sulfatase is a lysosomal enzyme."
definition: >-
  N-acetylgalactosamine 4-sulfatase, also called arylsulftase B. Sulfatases catalyze the hydrolysis of sulfuric acid esters from a wide variety of substrates. N-acetylgalactosamine 4-sulfatase catalyzes the removal of the sulfate ester group from position 4 of an N-acetylgalactosamine sugar at the non-reducing terminus of the polysaccharide in the degradative pathways of the glycosaminoglycans dermatan sulfate and chondroitin-4-sulfate. N-acetylgalactosamine 4-sulfatase is a lysosomal enzyme. — an NCBI CDD conserved domain (cd16029); members share this curated model.
