identifier: CDD:cd07519
label: "hydrolase domain of the bifunctional HAD hydrolase/UbiA family prenyltransferase proteins and related domains; belongs to the haloacid dehalogenase-like superfamily. This family includes bifunctional enzymes that have both an N-terminal HAD hydrolase domain and a C-terminal UbiA family prenyltransferase domain. The haloacid dehalogenase-like (HAD) hydrolases are a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members include 2-L-haloalkanoic acid dehalogenase (C-Cl bond hydrolysis), azetidine hydrolase (C-N bond hydrolysis); phosphonoacetaldehyde hydrolase (C-P bond hydrolysis), phosphoserine phosphatase and phosphomannomutase (CO-P bond hydrolysis), P-type ATPases (PO-P bond hydrolysis) and many others. Members are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases. Many characterized members of the UbiA prenyltransferase family are aromatic prenyltransferases (PTases) and play an important role in the biosynthesis of heme, chlorophyll, vitamin E, and vitamin K. PTases catalyze the regioselective transfer of prenyl moieties onto a wide variety of substrates and play an important role in many biosynthetic pathways."
definition: >-
  hydrolase domain of the bifunctional HAD hydrolase/UbiA family prenyltransferase proteins and related domains; belongs to the haloacid dehalogenase-like superfamily. This family includes bifunctional enzymes that have both an N-terminal HAD hydrolase domain and a C-terminal UbiA family prenyltransferase domain. The haloacid dehalogenase-like (HAD) hydrolases are a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members include 2-L-haloalkanoic acid dehalogenase (C-Cl bond hydrolysis), azetidine hydrolase (C-N bond hydrolysis); phosphonoacetaldehyde hydrolase (C-P bond hydrolysis), phosphoserine phosphatase and phosphomannomutase (CO-P bond hydrolysis), P-type ATPases (PO-P bond hydrolysis) and many others. Members are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases. Many characterized members of the UbiA prenyltransferase family are aromatic prenyltransferases (PTases) and play an important role in the biosynthesis of heme, chlorophyll, vitamin E, and vitamin K. PTases catalyze the regioselective transfer of prenyl moieties onto a wide variety of substrates and play an important role in many biosynthetic pathways. — an NCBI CDD conserved domain (cd07519); members share this curated model.
