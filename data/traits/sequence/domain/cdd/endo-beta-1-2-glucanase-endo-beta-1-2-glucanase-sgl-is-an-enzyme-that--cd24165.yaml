identifier: CDD:cd24165
label: TfSGL-like
definition: >-
  endo-beta-1,2-glucanase. Endo-beta-1,2-Glucanase (SGL) is an enzyme that hydrolyzes beta-1,2-glucans. SGLs play an important role in some bacteria, but this model represents a group of eukaryotic SGLs, first identified and characterized in Talaromyces funiculosus (TfSGL), a soil fungus. TfSGL hydrolyzes reducing-end-modified beta-1,2-gluco-oligosaccharides to release a sophoroside with the modified moiety. This group is classified into a new family of glycoside hydrolases, GH162
