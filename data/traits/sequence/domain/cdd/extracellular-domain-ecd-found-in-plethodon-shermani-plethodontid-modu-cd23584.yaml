identifier: CDD:cd23584
label: "extracellular domain (ECD) found in Plethodon shermani plethodontid modulating factor (PMF) and similar proteins. PMF is a hypervariable salamander courtship pheromone that belongs to three-finger protein (TFP) superfamily. It affects female receptivity when delivered to the female's nares during courtship.  PMF contains an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in Plethodon shermani plethodontid modulating factor (PMF) and similar proteins. PMF is a hypervariable salamander courtship pheromone that belongs to three-finger protein (TFP) superfamily. It affects female receptivity when delivered to the female's nares during courtship. PMF contains an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23584); members share this curated model.
