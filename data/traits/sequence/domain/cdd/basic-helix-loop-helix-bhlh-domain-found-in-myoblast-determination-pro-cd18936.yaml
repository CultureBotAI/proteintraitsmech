identifier: CDD:cd18936
label: "basic helix-loop-helix (bHLH) domain found in myoblast determination protein 1 (MYOD1) and similar proteins. MYOD1, also termed Class C basic helix-loop-helix protein 1 (bHLHc1), or myogenic factor 3 (Myf-3), is a bHLH transcriptional activator that promotes transcription of muscle-specific target genes and plays a role in muscle differentiation. Together with Myf-5 and MYOG, MYOD1 co-occupies muscle-specific gene promoter core region during myogenesis."
definition: >-
  basic helix-loop-helix (bHLH) domain found in myoblast determination protein 1 (MYOD1) and similar proteins. MYOD1, also termed Class C basic helix-loop-helix protein 1 (bHLHc1), or myogenic factor 3 (Myf-3), is a bHLH transcriptional activator that promotes transcription of muscle-specific target genes and plays a role in muscle differentiation. Together with Myf-5 and MYOG, MYOD1 co-occupies muscle-specific gene promoter core region during myogenesis. — an NCBI CDD conserved domain (cd18936); members share this curated model.
