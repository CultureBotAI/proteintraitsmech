identifier: CDD:cd22641
label: "Bizionia argentinensis C24 protein and similar proteins. C24 is a putative receptor-binding tip-like protein from Bizionia argentinensis JUB59. It may interact with lipopolysaccharide and membrane receptors. The C24 trimer binds a unique Mg2+ ion and shares structural similarity with the bacteriophage T4 long tail fiber receptor-binding tip, which adopts an overall rocket shape. However, there are marked differences in its domain organization, size and sequence identity. The C24 polypeptide chain contains four distinct domains: a globular proximal shoulder domain, a globular collar domain, an elongated, intertwined metal-binding needle domain and a globular receptor-binding-like unique distal head domain. This is a multi-domain model which includes all these four domains of C24 protein."
definition: >-
  Bizionia argentinensis C24 protein and similar proteins. C24 is a putative receptor-binding tip-like protein from Bizionia argentinensis JUB59. It may interact with lipopolysaccharide and membrane receptors. The C24 trimer binds a unique Mg2+ ion and shares structural similarity with the bacteriophage T4 long tail fiber receptor-binding tip, which adopts an overall rocket shape. However, there are marked differences in its domain organization, size and sequence identity. The C24 polypeptide chain contains four distinct domains: a globular proximal shoulder domain, a globular collar domain, an elongated, intertwined metal-binding needle domain and a globular receptor-binding-like unique distal head domain. This is a multi-domain model which includes all these four domains of C24 protein. — an NCBI CDD conserved domain (cd22641); members share this curated model.
