identifier: CDD:cd11669
label: "Hypothetical protein TTHB210, a sigma(E)-regulated gene product found in Thermus thermophilus, and similar proteins. TTHB210 is an uncharacterized protein found in Thermus thermophilus, and is controlled by the sigma(E) /anti-sigma(E) regulatory system. It is one of the five proteins of the extracytoplasmic function (ECF) sigma factor sigma(E)-regulated gene products whose physiological function have not been determined. Its crystallographic structure reveals a novel homodecamer although it is a dimer in solution."
definition: >-
  Hypothetical protein TTHB210, a sigma(E)-regulated gene product found in Thermus thermophilus, and similar proteins. TTHB210 is an uncharacterized protein found in Thermus thermophilus, and is controlled by the sigma(E) /anti-sigma(E) regulatory system. It is one of the five proteins of the extracytoplasmic function (ECF) sigma factor sigma(E)-regulated gene products whose physiological function have not been determined. Its crystallographic structure reveals a novel homodecamer although it is a dimer in solution. — an NCBI CDD conserved domain (cd11669); members share this curated model.
