identifier: CDD:cd07055
label: BMC_like_2
definition: >-
  Bacterial Micro-Compartment (BMC)-like domain 2. BMC like 2 domains exist in cyanobacteria, proteobacteria, and actinobacteria and are homologs of carboxysome shell proteins. They might be encoded from putative organelles involved in unknown metabolic process. Although it has been suggested that these carboxysome shell protein homologs form hexamers and further assemble into the flat facets of the polyhedral bacterial organelles shell at present no experimental evidence exists to directly support this view
