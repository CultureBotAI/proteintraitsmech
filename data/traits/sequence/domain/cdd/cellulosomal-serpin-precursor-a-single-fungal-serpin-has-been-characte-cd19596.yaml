identifier: CDD:cd19596
label: "cellulosomal serpin precursor. A single fungal serpin has been characterized to date: celpin from Piromyces spp. strain E2. Piromyces is a genus of anaerobic fungi found in the gut of ruminants and is important for digesting plant material. Celpin is predicted to be inhibitory and contains two N-terminal dockerin domains in addition to its serpin domain. Dockerins are commonly found in proteins that localise to the fungal cellulosome, a large extracellular multiprotein complex that breaks down cellulose.[21] It is therefore suggested that celpin may protect the cellulosome against plant proteases. Certain bacterial serpins similarly localize to the cellulosome.[186] SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
definition: >-
  cellulosomal serpin precursor. A single fungal serpin has been characterized to date: celpin from Piromyces spp. strain E2. Piromyces is a genus of anaerobic fungi found in the gut of ruminants and is important for digesting plant material. Celpin is predicted to be inhibitory and contains two N-terminal dockerin domains in addition to its serpin domain. Dockerins are commonly found in proteins that localise to the fungal cellulosome, a large extracellular multiprotein complex that breaks down cellulose.[21] It is therefore suggested that celpin may protect the cellulosome against plant proteases. Certain bacterial serpins similarly localize to the cellulosome.[186] SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans. — an NCBI CDD conserved domain (cd19596); members share this curated model.
