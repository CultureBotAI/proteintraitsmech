identifier: CDD:cd18322
label: "BTB (Broad-Complex, Tramtrack and Bric a brac) /POZ (poxvirus and zinc finger) domain found in S-phase kinase-associated protein 1 (SKP1) and similar proteins. SKP1 is also called cyclin-A/CDK2-associated protein p19 (p19A), organ of Corti protein 2 (OCP-2), organ of Corti protein II (OCP-II), RNA polymerase II elongation factor-like protein, transcription elongation factor B polypeptide 1-like, or p19skp1. It is an essential component of the SCF (SKP1-CUL1-F-box protein) ubiquitin ligase complex, which mediates the ubiquitination of proteins involved in cell cycle progression, signal transduction and transcription. SKP1 serves as an adaptor protein that links the F-box protein to CUL1. SKP1 and CUL1 are invariant components of all SCF complexes, while  F-box proteins are variable substrate binding modules that determine specificity. SKP1 belongs to the BTB/POZ domain family; the domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac) /POZ (poxvirus and zinc finger) domain found in S-phase kinase-associated protein 1 (SKP1) and similar proteins. SKP1 is also called cyclin-A/CDK2-associated protein p19 (p19A), organ of Corti protein 2 (OCP-2), organ of Corti protein II (OCP-II), RNA polymerase II elongation factor-like protein, transcription elongation factor B polypeptide 1-like, or p19skp1. It is an essential component of the SCF (SKP1-CUL1-F-box protein) ubiquitin ligase complex, which mediates the ubiquitination of proteins involved in cell cycle progression, signal transduction and transcription. SKP1 serves as an adaptor protein that links the F-box protein to CUL1. SKP1 and CUL1 are invariant components of all SCF complexes, while F-box proteins are variable substrate binding modules that determine specificity. SKP1 belongs to the BTB/POZ domain family; the domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18322); members share this curated model.
