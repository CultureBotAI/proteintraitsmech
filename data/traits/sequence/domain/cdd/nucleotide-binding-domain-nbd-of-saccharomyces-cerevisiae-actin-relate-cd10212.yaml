identifier: CDD:cd10212
label: "nucleotide-binding domain (NBD) of Saccharomyces cerevisiae actin-related protein7 (Arp7) and similar proteins. Saccharomyces cerevisiae Arp7, also called actin-like protein 7, is a component of the chromatin structure remodeling complex (RSC), which is involved in transcription regulation and nucleosome positioning. It is also part of the SWI/SNF complex, an ATP-dependent chromatin remodeling complex, which is required for the positive and negative regulation of gene expression of many genes. Arp7 forms a stable heterodimer with Arp9 protein in both the RSC and SWI/SNF chromatin-remodeling complexes. It has been suggested that this dimer functions as a module with DNA bending proteins, to achieve correct architecture and facilitate complex-complex interactions. Fission yeast SWI/SNF and RSC complexes do not contain Arp7 and Arp8, but instead contain Arp9 and Arp42."
definition: >-
  nucleotide-binding domain (NBD) of Saccharomyces cerevisiae actin-related protein7 (Arp7) and similar proteins. Saccharomyces cerevisiae Arp7, also called actin-like protein 7, is a component of the chromatin structure remodeling complex (RSC), which is involved in transcription regulation and nucleosome positioning. It is also part of the SWI/SNF complex, an ATP-dependent chromatin remodeling complex, which is required for the positive and negative regulation of gene expression of many genes. Arp7 forms a stable heterodimer with Arp9 protein in both the RSC and SWI/SNF chromatin-remodeling complexes. It has been suggested that this dimer functions as a module with DNA bending proteins, to achieve correct architecture and facilitate complex-complex interactions. Fission yeast SWI/SNF and RSC complexes do not contain Arp7 and Arp8, but instead contain Arp9 and Arp42. — an NCBI CDD conserved domain (cd10212); members share this curated model.
