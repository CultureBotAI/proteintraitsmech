identifier: CDD:cd05889
label: "First immunoglobulin variable (IgV) domain of DNAX accessory molecule 1, and similar domains. The members here are composed of the first immunoglobulin (Ig) domain of DNAX accessory molecule 1 (DNAM-1, also known as CD226). DNAM-1 is a transmembrane protein having two Ig-like domains. It is an adhesion molecule which plays a part in tumor-directed cytotoxicity and adhesion in natural killer (NK) cells and T lymphocytes. It has been shown to regulate the NK cell killing of several tumor types, including myeloma cells and ovarian carcinoma cells. DNAM-1 interacts specifically with poliovirus receptor (PVR; CD155) and nectin -2 (CD211), other members of the Ig superfamily. DNAM-1 is expressed in most peripheral T cells, NK cells, monocytes and a subset of B lymphocytes."
definition: >-
  First immunoglobulin variable (IgV) domain of DNAX accessory molecule 1, and similar domains. The members here are composed of the first immunoglobulin (Ig) domain of DNAX accessory molecule 1 (DNAM-1, also known as CD226). DNAM-1 is a transmembrane protein having two Ig-like domains. It is an adhesion molecule which plays a part in tumor-directed cytotoxicity and adhesion in natural killer (NK) cells and T lymphocytes. It has been shown to regulate the NK cell killing of several tumor types, including myeloma cells and ovarian carcinoma cells. DNAM-1 interacts specifically with poliovirus receptor (PVR; CD155) and nectin -2 (CD211), other members of the Ig superfamily. DNAM-1 is expressed in most peripheral T cells, NK cells, monocytes and a subset of B lymphocytes. — an NCBI CDD conserved domain (cd05889); members share this curated model.
