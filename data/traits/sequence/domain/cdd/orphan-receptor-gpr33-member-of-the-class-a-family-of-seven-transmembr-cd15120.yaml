identifier: CDD:cd15120
label: "orphan receptor GPR33, member of the class A family of seven-transmembrane G protein-coupled receptors. G-protein coupled receptor GPR33, an orphan member of the chemokine-like receptor family, was originally identified as a pseudogene in humans as well as in several apes and rodent species. Although the intact GPR33 allele is still present in a small fraction of the human population, the human GPR33 contains a premature stop codon. The amino acid sequence of GPR33 shares a high degree of sequence identity with the members of the chemokine and chemoattractant receptors that control leukocyte chemotaxis. The human GPR33 is expressed in spleen, lung, heart, kidney, pancreas, thymus, gonads, and leukocytes."
definition: >-
  orphan receptor GPR33, member of the class A family of seven-transmembrane G protein-coupled receptors. G-protein coupled receptor GPR33, an orphan member of the chemokine-like receptor family, was originally identified as a pseudogene in humans as well as in several apes and rodent species. Although the intact GPR33 allele is still present in a small fraction of the human population, the human GPR33 contains a premature stop codon. The amino acid sequence of GPR33 shares a high degree of sequence identity with the members of the chemokine and chemoattractant receptors that control leukocyte chemotaxis. The human GPR33 is expressed in spleen, lung, heart, kidney, pancreas, thymus, gonads, and leukocytes. — an NCBI CDD conserved domain (cd15120); members share this curated model.
