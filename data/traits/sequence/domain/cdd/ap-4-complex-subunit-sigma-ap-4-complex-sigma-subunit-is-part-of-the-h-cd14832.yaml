identifier: CDD:cd14832
label: "AP-4 complex subunit sigma. AP-4 complex sigma subunit is part of the heterotetrameric adaptor protein (AP)-1 complex which consists of one large epsilon-, one beta-, one mu-, and one sigma-subunit. AP complexes link the cytosolic domains of the cargo proteins to the protein coat that induces vesicle budding in the donor compartment during vesicle transport. AP-4 does not bind the coat protein clathrin, it is associated with nonclathrin coats. Its phospholipid binding partner is unknown and it is localized in the trans-Golgi network (TGN). The sigma subunit is comprised of a single longin domain and plays a role in binding dileucine-based sorting signals."
definition: >-
  AP-4 complex subunit sigma. AP-4 complex sigma subunit is part of the heterotetrameric adaptor protein (AP)-1 complex which consists of one large epsilon-, one beta-, one mu-, and one sigma-subunit. AP complexes link the cytosolic domains of the cargo proteins to the protein coat that induces vesicle budding in the donor compartment during vesicle transport. AP-4 does not bind the coat protein clathrin, it is associated with nonclathrin coats. Its phospholipid binding partner is unknown and it is localized in the trans-Golgi network (TGN). The sigma subunit is comprised of a single longin domain and plays a role in binding dileucine-based sorting signals. — an NCBI CDD conserved domain (cd14832); members share this curated model.
