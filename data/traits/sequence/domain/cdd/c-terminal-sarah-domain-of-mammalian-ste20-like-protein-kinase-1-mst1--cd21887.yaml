identifier: CDD:cd21887
label: "C-terminal SARAH domain of mammalian STE20-like protein kinase 1 (MST1). MST1, also called serine/threonine-protein kinase 4, MST-1, STE20-like kinase MST1, or serine/threonine-protein kinase (STK) Krs-2, is a STE20 family stress-activated, pro-apoptotic STK which, following caspase-cleavage, enters the nucleus and induces chromatin condensation followed by internucleosomal DNA fragmentation. It is a key component of the Hippo signaling pathway which plays a pivotal role in organ size control and tumor suppression by restricting proliferation and promoting apoptosis. This model corresponds to the C-terminal SARAH (Salvador-RassF-Hippo) domain, which mediates homodimerization of MST1. The MST1 SARAH domain also interacts with Rassf1 and Rassf5 by forming a heterodimer which mediates the apoptosis process."
definition: >-
