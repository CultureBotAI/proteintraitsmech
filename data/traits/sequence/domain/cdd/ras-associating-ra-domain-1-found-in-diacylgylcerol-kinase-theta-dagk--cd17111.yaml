identifier: CDD:cd17111
label: "Ras-associating (RA) domain 1 found in diacylgylcerol kinase theta (DAGK-theta) and similar proteins. DAGK phosphorylates the second messenger diacylglycerol to phosphatidic acid as part of a protein kinase C pathway. DAGK-theta is characterized as a type V DAGK that has three cysteine-rich domains (all other isoforms have two), a proline/glycine-rich domain at its N-terminal, and a proposed Ras-associating (RA) domain. RA domain-containing proteins function by interacting with Ras proteins directly or indirectly and are involved in several different functions ranging from tumor suppression to being oncoproteins. Ras proteins are small GTPases that are involved in cellular signal transduction. The RA domain has a beta-grasp ubiquitin-like (Ubl) fold with low sequence similarity to ubiquitin (Ub). Ub is a protein modifier in eukaryotes that is involved in various cellular processes, including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes. Ten mammalian isoforms of DAGK have been identified to date which are organized into five categories based on the domain architecture. DAGK-theta also contains a pleckstrin homology (PH) domain. The subcellular localization and the activity of DAGK-theta are regulated in a complex (stimulation- and cell type-dependent) manner. This family corresponds to the first RA domain of DAGK-theta."
definition: >-
  Ras-associating (RA) domain 1 found in diacylgylcerol kinase theta (DAGK-theta) and similar proteins. DAGK phosphorylates the second messenger diacylglycerol to phosphatidic acid as part of a protein kinase C pathway. DAGK-theta is characterized as a type V DAGK that has three cysteine-rich domains (all other isoforms have two), a proline/glycine-rich domain at its N-terminal, and a proposed Ras-associating (RA) domain. RA domain-containing proteins function by interacting with Ras proteins directly or indirectly and are involved in several different functions ranging from tumor suppression to being oncoproteins. Ras proteins are small GTPases that are involved in cellular signal transduction. The RA domain has a beta-grasp ubiquitin-like (Ubl) fold with low sequence similarity to ubiquitin (Ub). Ub is a protein modifier in eukaryotes that is involved in various cellular processes, including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes. Ten mammalian isoforms of DAGK have been identified to date which are organized into five categories based on the domain architecture. DAGK-theta also contains a pleckstrin homology (PH) domain. The subcellular localization and the activity of DAGK-theta are regulated in a complex (stimulation- and cell type-dependent) manner. This family corresponds to the first RA domain of DAGK-theta. — an NCBI CDD conserved domain (cd17111); members share this curated model.
