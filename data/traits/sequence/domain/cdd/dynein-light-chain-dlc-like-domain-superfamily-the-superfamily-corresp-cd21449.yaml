identifier: CDD:cd21449
label: DLC-like_SF
definition: >-
  dynein light chain (DLC)-like domain superfamily. The superfamily corresponds to a class of proteins containing a dynein light chain (DLC)-like domain with anti-parallel beta-sheet packed against an alpha-helical hairpin. DLC-like domain-containing proteins includes cytoplasmic dynein light chain DYNLL1 and DYNLL2, axonemal dynein light chain 4 (DNAL4), tegumental-allergen-like proteins (TALs), dynein light chain Tctex-type DYNLT1 and DYNLT3, as well as Tctex1 domain-containing proteins (TCTEX1D). Both DYNLL1 and DYNLL2 are non-catalytic accessory components of the cytoplasmic dynein 1 complex that are thought to be involved in linking dynein to cargos and to adapter proteins that regulate dynein function. DNAL4 is a force generating protein of respiratory cilia. TALs may be involved in the transport of vesicles within the tegumental cytoplasm, probably within dynein motor complexes. DYNLT1 and DYNLT3, which contribute to the differential regulation of dynein cargo binding. They are non-catalytic accessory components of the cytoplasmic dynein 1 complex, which contains either DYNLT1 or DYNLT3, but not both. TCTEX1D family includes TCTEX1D1-4. TCTEX1D1 is a genetic modifier of disease progression in Duchenne muscular dystrophy (DMD). TCTEX1D2 is required for proper retrograde ciliary transport. TCTEX1D3 may be an accessory component of axonemal dynein and cytoplasmic dynein 1. TCTEX1D4 is a novel protein phosphatase 1 (PPP1) interactor
