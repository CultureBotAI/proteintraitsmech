identifier: CDD:cd10234
label: "nucleotide-binding domain (NBD) of Escherichia coli chaperone protein DnaK and similar proteins. This subfamily includes Escherichia coli chaperone protein DnaK (also known as heat shock 70 kDa protein/HSP70), human mitochondrial heat shock 70 kDa protein HSPA9 (also known as mitochondrial stress-70 protein; mortalin; 75 kDa glucose-regulated protein/GRP-75; HSPA9B; MOT; peptide-binding protein 74/PBP74), Saccharomyces cerevisiae stress-seventy subfamily C proteins, Ssc1p (also called import motor subunit, mitochondrial; endonuclease SceI 75 kDa subunit; mtHSP70; ENS1; endonuclease SceI 75 kDa subunit) and Ssc3p (also called extracellular mutant protein 10/Ecm10), and Saccharomyces cerevisiae Stress-seventy subfamily Q protein 1/Ssq1p (also called Ssc2p; Ssh1p; mtHSP70 homolog). They all belong to the heat shock protein 70 (HSP70) family of chaperones that assist in protein folding and assembly, and can direct incompetent \"client\" proteins towards degradation. Typically, HSP70s have a nucleotide-binding domain (NBD) and a substrate-binding domain (SBD). The nucleotide sits in a deep cleft formed between the two lobes of the NBD. The two subdomains of each lobe change conformation between ATP-bound, ADP-bound, and nucleotide-free states. ATP binding opens up the substrate-binding site; substrate-binding increases the rate of ATP hydrolysis. Hsp70 chaperone activity is regulated by various co-chaperones: J-domain proteins and nucleotide exchange factors (NEFs); for Escherichia coli DnaK, these are the DnaJ and GrpE, respectively."
definition: >-
  nucleotide-binding domain (NBD) of Escherichia coli chaperone protein DnaK and similar proteins. This subfamily includes Escherichia coli chaperone protein DnaK (also known as heat shock 70 kDa protein/HSP70), human mitochondrial heat shock 70 kDa protein HSPA9 (also known as mitochondrial stress-70 protein; mortalin; 75 kDa glucose-regulated protein/GRP-75; HSPA9B; MOT; peptide-binding protein 74/PBP74), Saccharomyces cerevisiae stress-seventy subfamily C proteins, Ssc1p (also called import motor subunit, mitochondrial; endonuclease SceI 75 kDa subunit; mtHSP70; ENS1; endonuclease SceI 75 kDa subunit) and Ssc3p (also called extracellular mutant protein 10/Ecm10), and Saccharomyces cerevisiae Stress-seventy subfamily Q protein 1/Ssq1p (also called Ssc2p; Ssh1p; mtHSP70 homolog). They all belong to the heat shock protein 70 (HSP70) family of chaperones that assist in protein folding and assembly, and can direct incompetent "client" proteins towards degradation. Typically, HSP70s have a nucleotide-binding domain (NBD) and a substrate-binding domain (SBD). The nucleotide sits in a deep cleft formed between the two lobes of the NBD. The two subdomains of each lobe change conformation between ATP-bound, ADP-bound, and nucleotide-free states. ATP binding opens up the substrate-binding site; substrate-binding increases the rate of ATP hydrolysis. Hsp70 chaperone activity is regulated by various co-chaperones: J-domain proteins and nucleotide exchange factors (NEFs); for Escherichia coli DnaK, these are the DnaJ and GrpE, respectively. — an NCBI CDD conserved domain (cd10234); members share this curated model.
