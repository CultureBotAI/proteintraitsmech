identifier: CDD:cd00693
label: "Horseradish peroxidase and related secretory plant peroxidases. Secretory peroxidases belong to class III of the plant heme-dependent peroxidase superfamily. All members of the superfamily share a heme prosthetic group and catalyze a multistep oxidative reaction involving hydrogen peroxide as the electron acceptor. Class III peroxidases are found in the extracellular space or in the vacuole in plants where they have been implicated in hydrogen peroxide detoxification, auxin catabolism and lignin biosynthesis, and stress response. Class III peroxidases contain four conserved disulphide bridges and two conserved calcium binding sites."
definition: >-
  Horseradish peroxidase and related secretory plant peroxidases. Secretory peroxidases belong to class III of the plant heme-dependent peroxidase superfamily. All members of the superfamily share a heme prosthetic group and catalyze a multistep oxidative reaction involving hydrogen peroxide as the electron acceptor. Class III peroxidases are found in the extracellular space or in the vacuole in plants where they have been implicated in hydrogen peroxide detoxification, auxin catabolism and lignin biosynthesis, and stress response. Class III peroxidases contain four conserved disulphide bridges and two conserved calcium binding sites. — an NCBI CDD conserved domain (cd00693); members share this curated model.
