identifier: CDD:cd20931
label: "Third immunoglobulin domain of interleukin-1 receptor accessory protein (IL1RAP). The members here are composed of the third immunoglobulin Ig interleukin-1 receptor accessory protein (IL1RAP). The interleukin 1 receptor accessory protein (IL-1RAP), also known as IL-1R3, is a coreceptor of type 1 interleukin 1 receptor (IL-1R1) and is required for transmission of IL-1 signaling. The activated IL-1 receptor complex, which consists of IL-1R1 and IL-1RAP, induces multiple cellular responses including NF-kappa-B activation, IL-2 secretion, and IL-2 promoter activation. Signaling involves the recruitment of adapter molecules such as TOLLIP, MYD88, and IRAK1 or IRAK2 via the respective Toll/IL-1 receptor (TIR) domains of the receptor/coreceptor subunits. Moreover, IL1RAP is known to be the accessory co-receptor that activates signal transduction upon IL-36 binding to IL-36R. IL-36 cytokines, which are a subfamily of the IL-1 superfamily, bind to the IL-36 receptor (IL-36R) and use IL1RAP as a co-receptor."
definition: >-
  Third immunoglobulin domain of interleukin-1 receptor accessory protein (IL1RAP). The members here are composed of the third immunoglobulin Ig interleukin-1 receptor accessory protein (IL1RAP). The interleukin 1 receptor accessory protein (IL-1RAP), also known as IL-1R3, is a coreceptor of type 1 interleukin 1 receptor (IL-1R1) and is required for transmission of IL-1 signaling. The activated IL-1 receptor complex, which consists of IL-1R1 and IL-1RAP, induces multiple cellular responses including NF-kappa-B activation, IL-2 secretion, and IL-2 promoter activation. Signaling involves the recruitment of adapter molecules such as TOLLIP, MYD88, and IRAK1 or IRAK2 via the respective Toll/IL-1 receptor (TIR) domains of the receptor/coreceptor subunits. Moreover, IL1RAP is known to be the accessory co-receptor that activates signal transduction upon IL-36 binding to IL-36R. IL-36 cytokines, which are a subfamily of the IL-1 superfamily, bind to the IL-36 receptor (IL-36R) and use IL1RAP as a co-receptor. — an NCBI CDD conserved domain (cd20931); members share this curated model.
