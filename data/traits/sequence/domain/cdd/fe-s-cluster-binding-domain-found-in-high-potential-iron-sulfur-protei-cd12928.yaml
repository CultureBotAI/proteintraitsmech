identifier: CDD:cd12928
label: "Fe-S cluster binding domain found in high-potential iron-sulfur proteins (HiPIPs), 4-hydroxyphenylacetate decarboxylase (4-Hpd) small subunit, and similar proteins. HiPIPs are a specific class of high-redox potential 4Fe-4S ferredoxins that functions in anaerobic electron transport in most purple and in some other photosynthetic bacteria and in at least one genus (Paracoccus) of halophilic, denitrifying bacteria. The HiPIPs are small proteins which show significant variation in their sequences, their sizes, and in their oxidation-reduction potentials. They have been characterized by a [4Fe-4S] cluster bound by four conserved cysteine residues. 4-Hpd (EC 4.1.1.83), also termed p-hydroxyphenylacetate decarboxylase (p-Hpd), is the prototype of a new class of Fe-S cluster-dependent glycyl radical enzymes (Fe-S GREs) proposed to work together with 4-hydroxyphenylacetate decarboxylase activating enzyme (4Hpd-AE), and use a glycyl/thiyl radical dyad to catalyze the last reaction in the fermentative production of p-cresol from tyrosine in several facultative and obligately anaerobic bacteria. 4-Hpd forms a hetero-octamer consisting of 4 large (HpdB) subunits and 4 small (HpdC) subunits. It contains two [4Fe-4S] clusters coordinated by an extra small subunit of unknown function."
definition: >-
  Fe-S cluster binding domain found in high-potential iron-sulfur proteins (HiPIPs), 4-hydroxyphenylacetate decarboxylase (4-Hpd) small subunit, and similar proteins. HiPIPs are a specific class of high-redox potential 4Fe-4S ferredoxins that functions in anaerobic electron transport in most purple and in some other photosynthetic bacteria and in at least one genus (Paracoccus) of halophilic, denitrifying bacteria. The HiPIPs are small proteins which show significant variation in their sequences, their sizes, and in their oxidation-reduction potentials. They have been characterized by a [4Fe-4S] cluster bound by four conserved cysteine residues. 4-Hpd (EC 4.1.1.83), also termed p-hydroxyphenylacetate decarboxylase (p-Hpd), is the prototype of a new class of Fe-S cluster-dependent glycyl radical enzymes (Fe-S GREs) proposed to work together with 4-hydroxyphenylacetate decarboxylase activating enzyme (4Hpd-AE), and use a glycyl/thiyl radical dyad to catalyze the last reaction in the fermentative production of p-cresol from tyrosine in several facultative and obligately anaerobic bacteria. 4-Hpd forms a hetero-octamer consisting of 4 large (HpdB) subunits and 4 small (HpdC) subunits. It contains two [4Fe-4S] clusters coordinated by an extra small subunit of unknown function. — an NCBI CDD conserved domain (cd12928); members share this curated model.
