identifier: CDD:cd06172
label: MFS_LacY
definition: >-
  LacY proton/sugar symporter family of the Major Facilitator Superfamily of transporters. LacY proton/sugar family (also called LacY/RafB family) symporters are integral membrane proteins responsible for the transport of specific beta-glucosides into the cell accompanied by the import of a proton. Members include lactose permease (LacY), raffinose permease (RafB), and sucrose permease, which facilitate the transport of beta-galactosides, raffinose, and sucrose, respectively. The prototypical member, LacY, contains 12 transmembrane helices connected by hydrophilic loops with both N and C termini on the cytoplasmic face. The LacY/RafB permease family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement
