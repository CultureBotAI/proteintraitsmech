identifier: CDD:cd16772
label: "RING finger, HC subclass, found in RING finger protein unkempt-like (UNKL) and similar proteins. UNKL, also known as zinc finger CCCH domain-containing protein 5-like, is a putative E3 ubiquitin-protein ligase that may participate in a protein complex showing an E3 ligase activity regulated by RAC1. It shows high sequence similarity with RING finger protein unkempt (UNK), which is a metazoan-specific zinc finger protein enriched in embryonic brains, and may play a broad regulatory role during the formation of the central nervous system (CNS). UNKL contains several CCCH-type zinc fingers at the N-terminus, and a C3HC4-type RING-HC finger at its C-terminus."
definition: >-
