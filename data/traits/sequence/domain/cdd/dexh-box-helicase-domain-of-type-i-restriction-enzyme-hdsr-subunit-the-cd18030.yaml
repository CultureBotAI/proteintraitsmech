identifier: CDD:cd18030
label: "DEXH-box helicase domain of type I restriction enzyme HdsR subunit. The HdsR motor subunit of type I restriction-modification enzymes contains the DNA cleavage and ATP-dependent DNA translocation activities of the heteromeric complex. It is a member of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of type I restriction enzyme HdsR subunit. The HdsR motor subunit of type I restriction-modification enzymes contains the DNA cleavage and ATP-dependent DNA translocation activities of the heteromeric complex. It is a member of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd18030); members share this curated model.
