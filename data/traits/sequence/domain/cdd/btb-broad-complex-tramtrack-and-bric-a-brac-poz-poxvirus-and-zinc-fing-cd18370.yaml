identifier: CDD:cd18370
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein KCTD11. KCTD11 may function as an antagonist of the Hedgehog pathway of cell proliferation and differentiation by affecting the nuclear transfer of transcription factor GLI1, thus maintaining cerebellar granule cells in the undifferentiated state. It is a probable substrate-specific adapter for a BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex towards HDAC1. It contains a BTB/POZ domain; in some cases the domain may be truncated. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. Variants of the human/mouse KCTD11 appear to contain truncated BTB/POZ domains."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein KCTD11. KCTD11 may function as an antagonist of the Hedgehog pathway of cell proliferation and differentiation by affecting the nuclear transfer of transcription factor GLI1, thus maintaining cerebellar granule cells in the undifferentiated state. It is a probable substrate-specific adapter for a BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex towards HDAC1. It contains a BTB/POZ domain; in some cases the domain may be truncated. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. Variants of the human/mouse KCTD11 appear to contain truncated BTB/POZ domains. — an NCBI CDD conserved domain (cd18370); members share this curated model.
