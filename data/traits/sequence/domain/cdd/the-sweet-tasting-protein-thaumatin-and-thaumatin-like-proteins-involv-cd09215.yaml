identifier: CDD:cd09215
label: "the sweet-tasting protein, thaumatin, and thaumatin-like proteins involved in host defense. This family is represented by the sweet-tasting protein thaumatin from the African berry Thaumatococcus daniellii and thaumatin-like proteins (TLPs) involved in host defense and a wide range of developmental processes in fungi, plants, and animals. Plant TLPs are classified as pathogenesis-related (PR) protein family 5 (PR5), their expression is induced by environmental stresses such as pathogen/pest attack, drought and cold. TLPs included in this family are such proteins as zeamatin, found in high concentrations in cereal seeds; osmotin, a salt-induced protein in osmotically stressed plants; and PpAZ44, a propylene-induced TLP in abscission of young fruit. Several members of the plant TLP family have been reported as food allergens from fruits (i.e., cherry, Pru av 2; bell pepper, Cap a1; tomatoes, Lyc e NP24) and pollen allergens from conifers (i.e., mountain cedar, Jun a 3; Arizona cypress, Cup a3; Japanese cedar, Cry j3). Thaumatin and TLPs are three-domain, crescent-fold structures with either an electronegative, electropositive, or neutral cleft occurring between domains I and II. It has been proposed that the antifungal activity of plant PR5 proteins relies on the strong electronegative character of this cleft. Some TLPs hydrolyze the beta-1,3-glucans of the type commonly found in fungal walls. Most TLPs contain 16 conserved Cys residues. A deletion within the third domain (domain II) of the Triticum aestivum thaumatin-like xylanase inhibitor is observed, thus, only 10 conserved Cys residues are present within this smaller TLP and similar homologs."
definition: >-
  the sweet-tasting protein, thaumatin, and thaumatin-like proteins involved in host defense. This family is represented by the sweet-tasting protein thaumatin from the African berry Thaumatococcus daniellii and thaumatin-like proteins (TLPs) involved in host defense and a wide range of developmental processes in fungi, plants, and animals. Plant TLPs are classified as pathogenesis-related (PR) protein family 5 (PR5), their expression is induced by environmental stresses such as pathogen/pest attack, drought and cold. TLPs included in this family are such proteins as zeamatin, found in high concentrations in cereal seeds; osmotin, a salt-induced protein in osmotically stressed plants; and PpAZ44, a propylene-induced TLP in abscission of young fruit. Several members of the plant TLP family have been reported as food allergens from fruits (i.e., cherry, Pru av 2; bell pepper, Cap a1; tomatoes, Lyc e NP24) and pollen allergens from conifers (i.e., mountain cedar, Jun a 3; Arizona cypress, Cup a3; Japanese cedar, Cry j3). Thaumatin and TLPs are three-domain, crescent-fold structures with either an electronegative, electropositive, or neutral cleft occurring between domains I and II. It has been proposed that the antifungal activity of plant PR5 proteins relies on the strong electronegative character of this cleft. Some TLPs hydrolyze the beta-1,3-glucans of the type commonly found in fungal walls. Most TLPs contain 16 conserved Cys residues. A deletion within the third domain (domain II) of the Triticum aestivum thaumatin-like xylanase inhibitor is observed, thus, only 10 conserved Cys residues are present within this smaller TLP and similar homologs. — an NCBI CDD conserved domain (cd09215); members share this curated model.
