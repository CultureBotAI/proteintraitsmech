identifier: CDD:cd20374
label: "Protection Of Telomeres Protein 1 (POT1) C-terminal region. POT1 is part of shelterin, a hexameric nucleoprotein complex (comprising TRF1, TRF2, TIN2, RAP1, POT1 and TPP1 in humans) that protects telomeres, the physical ends of chromosomes. Shelterin protects against these ends being recognized as double-stranded DNA breaks, as well as against degradation of the telomeric overhang by endonucleases. It also helps control access of telomerase to the telomeric overhang, thereby affecting telomore length. This C-terminal region has an OB-fold domain and a holiday junction resolvase (HJR) domain which make dimer contacts with TPP1."
definition: >-
  Protection Of Telomeres Protein 1 (POT1) C-terminal region. POT1 is part of shelterin, a hexameric nucleoprotein complex (comprising TRF1, TRF2, TIN2, RAP1, POT1 and TPP1 in humans) that protects telomeres, the physical ends of chromosomes. Shelterin protects against these ends being recognized as double-stranded DNA breaks, as well as against degradation of the telomeric overhang by endonucleases. It also helps control access of telomerase to the telomeric overhang, thereby affecting telomore length. This C-terminal region has an OB-fold domain and a holiday junction resolvase (HJR) domain which make dimer contacts with TPP1. — an NCBI CDD conserved domain (cd20374); members share this curated model.
