identifier: CDD:cd13429
label: "UreI/AmiS family, subgroup 2. Putative transporters related to proton-gated urea channel and putative amide transporters. This subfamily includes putative UreI proton-gated urea channels and putative amide transporters (AmiS of the amidase gene cluster). Helicobacter pylori UreI (HpUreI), a proton-gated inner membrane urea channel opens in acidic pH to allow urea influx to the cytoplasm. There urea is metabolized, producing NH3 and Co2, leading to buffering of the periplasm. This action is essential for the survival of H. pylori in the stomach, and has been identified as a mechanism that could be clinically targeted to prevent various illnesses associated with infection by H. pylori. UreI and the related amide channels (AmiS) appear to function as hexamers, and have 6 predicted transmembrane segments. UreI has also been shown have a lipid \"plug\" in the center of the hexamer. Urea enters at the periplasmic opening of UreI and must pass 2 constriction sites, one on each side of a conserved Glu (Glu 177, H. pylori numbering), to reach the cytoplasm. Urea/thiourea selectivity is diminished by mutation of a conserved Trp to Ala or Phe in constriction site 2 (cytoplasmic). Channel functionality is greatly diminished by mutation of a conserved Trp in constriction site 1 (periplasmic) and a conserved Tyr in constriction site 2, and to a lesser extent a conserved Phe in site 1. In the cytoplasm, urease hydrolyzes urea to form ammonia and carbamate, which decomposes to carbonic acid. UreI is fully open at pH 5.0 to facilitate urea influx, but closes at neutral pH, preventing over-alkalization. Glu 177 (H. pylori numbering) is present in urea channel proteins, but absent in the related amide channels, suggesting that it plays a role in urea specificity."
definition: >-
  UreI/AmiS family, subgroup 2. Putative transporters related to proton-gated urea channel and putative amide transporters. This subfamily includes putative UreI proton-gated urea channels and putative amide transporters (AmiS of the amidase gene cluster). Helicobacter pylori UreI (HpUreI), a proton-gated inner membrane urea channel opens in acidic pH to allow urea influx to the cytoplasm. There urea is metabolized, producing NH3 and Co2, leading to buffering of the periplasm. This action is essential for the survival of H. pylori in the stomach, and has been identified as a mechanism that could be clinically targeted to prevent various illnesses associated with infection by H. pylori. UreI and the related amide channels (AmiS) appear to function as hexamers, and have 6 predicted transmembrane segments. UreI has also been shown have a lipid "plug" in the center of the hexamer. Urea enters at the periplasmic opening of UreI and must pass 2 constriction sites, one on each side of a conserved Glu (Glu 177, H. pylori numbering), to reach the cytoplasm. Urea/thiourea selectivity is diminished by mutation of a conserved Trp to Ala or Phe in constriction site 2 (cytoplasmic). Channel functionality is greatly diminished by mutation of a conserved Trp in constriction site 1 (periplasmic) and a conserved Tyr in constriction site 2, and to a lesser extent a conserved Phe in site 1. In the cytoplasm, urease hydrolyzes urea to form ammonia and carbamate, which decomposes to carbonic acid. UreI is fully open at pH 5.0 to facilitate urea influx, but closes at neutral pH, preventing over-alkalization. Glu 177 (H. pylori numbering) is present in urea channel proteins, but absent in the related amide channels, suggesting that it plays a role in urea specificity. — an NCBI CDD conserved domain (cd13429); members share this curated model.
