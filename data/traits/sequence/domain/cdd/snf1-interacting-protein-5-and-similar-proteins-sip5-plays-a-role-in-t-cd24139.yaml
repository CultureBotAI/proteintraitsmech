identifier: CDD:cd24139
label: SIP5-like
definition: >-
  SNF1-interacting protein 5 and similar proteins. Sip5 plays a role in the regulation of SNF1 kinase. It may negatively regulate SNF1 kinase under glucose-limiting conditions, by promoting the interaction of the REG1/GLC7 phosphatase complex with the kinase. It interacts directly with SNF1 kinase and the Reg1 component of the phosphatase complex. Sip5 also physically interacts with the N-terminus of Std1, an accessory subunit of the SNF1 kinase protein complex, in the absence of glucose. This prevents aggregation of Std1 and keeps it bound to SNF1, the catalytic subunit, keeping the SNF1 complex in an active state. Upon addition of glucose, Vhs1 kinase phosphorylates Sip5, inhibiting its binding to Std1. Once Sip5 is released, the N-terminal asparagine-rich part of Std1 aggregates, and Std1 exits the nucleus and localizes to cytoplasmic granules. SNF1 kinase is inactive in this state
