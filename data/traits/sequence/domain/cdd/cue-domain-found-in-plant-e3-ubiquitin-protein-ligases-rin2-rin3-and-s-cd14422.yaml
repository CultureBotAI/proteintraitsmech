identifier: CDD:cd14422
label: "CUE domain found in plant E3 ubiquitin protein ligases RIN2, RIN3 and similar proteins. RIN2 and RIN3 are two closely related RPM1-interacting proteins conserved in higher eukaryotes. They are orthologs of the mammalian autocrine motility factor receptor (AMFR), a cytokine receptor localized in both plasma membrane caveolae and the endoplasmic reticulum (ER). RIN2 and RIN3 have been identified as membrane-bound RING-finger type ubiquitin ligases with six apparent transmembrane domains, a RING-finger domain and a CUE domain. They act as positive regulators of RPM1- and RPS2-dependent hypersensitive response (HR)."
definition: >-
  CUE domain found in plant E3 ubiquitin protein ligases RIN2, RIN3 and similar proteins. RIN2 and RIN3 are two closely related RPM1-interacting proteins conserved in higher eukaryotes. They are orthologs of the mammalian autocrine motility factor receptor (AMFR), a cytokine receptor localized in both plasma membrane caveolae and the endoplasmic reticulum (ER). RIN2 and RIN3 have been identified as membrane-bound RING-finger type ubiquitin ligases with six apparent transmembrane domains, a RING-finger domain and a CUE domain. They act as positive regulators of RPM1- and RPS2-dependent hypersensitive response (HR). — an NCBI CDD conserved domain (cd14422); members share this curated model.
