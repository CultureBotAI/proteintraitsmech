identifier: CDD:cd20353
label: "Rcat domain found in RING finger protein 216 (RNF216). RNF216, also called Triad domain-containing protein 3 (Triad3A), ubiquitin-conjugating enzyme 7-interacting protein 1, or zinc finger protein inhibiting NF-kappa-B (ZIN), is an RBR-type E3 ubiquitin-protein ligase that interacts with several components of the Toll-like receptor (TLR) signaling and promotes their proteolytic degradation. It negatively regulates the RIG-I RNA sensing pathway through Lys48-linked, ubiquitin-mediated degradation of the tumor necrosis factor receptor-associated factor 3 (TRAF3) adapter following RNA virus infection. It also controls ubiquitination and proteasomal degradation of receptor-interacting protein 1 (RIP1), a serine/threonine protein kinase that is critically involved in tumor necrosis factor receptor-1 (TNF-R1)-induced NF-kappa B activation, following disruption of Hsp90 binding. Moreover, RNF216 is involved in inflammatory diseases by strongly inhibiting autophagy in macrophages. It interacts with and ubiquitinates BECN1, a key regulator in autophagy, thereby contributing to BECN1 degradation. It regulates synaptic strength by ubiquitination of Arc, resulting in its rapid proteasomal degradation. It is also a key negative regulator of sustained 2DL4/KIR2DL4 (killer cell Ig-like receptor with two Ig-like domains and a long cytoplasmic domain 4)-mediated NF-kappaB signaling from internalized 2DL4, which functions by promoting ubiquitylation and degradation of endocytosed receptor from early endosomes. Furthermore, RNF216 interacts with human immunodeficiency virus type 1 (HIV-1) virion infectivity factor (Vif) protein, which is essential for the productive infection of primary human CD4 T lymphocytes and macrophages. Mutations in RNF216 may result in Gordon Holmes syndrome, a condition defined by hypogonadotropic hypogonadism and cerebellar ataxia, as well as in autosomal recessive Huntington-like disorder. RNF216 contains an RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. The family corresponds to the Rcat domain of RNF216 that is essential for RBR E3 ligase activity and adopts the same fold as the BRcat domain."
definition: >-
  Rcat domain found in RING finger protein 216 (RNF216). RNF216, also called Triad domain-containing protein 3 (Triad3A), ubiquitin-conjugating enzyme 7-interacting protein 1, or zinc finger protein inhibiting NF-kappa-B (ZIN), is an RBR-type E3 ubiquitin-protein ligase that interacts with several components of the Toll-like receptor (TLR) signaling and promotes their proteolytic degradation. It negatively regulates the RIG-I RNA sensing pathway through Lys48-linked, ubiquitin-mediated degradation of the tumor necrosis factor receptor-associated factor 3 (TRAF3) adapter following RNA virus infection. It also controls ubiquitination and proteasomal degradation of receptor-interacting protein 1 (RIP1), a serine/threonine protein kinase that is critically involved in tumor necrosis factor receptor-1 (TNF-R1)-induced NF-kappa B activation, following disruption of Hsp90 binding. Moreover, RNF216 is involved in inflammatory diseases by strongly inhibiting autophagy in macrophages. It interacts with and ubiquitinates BECN1, a key regulator in autophagy, thereby contributing to BECN1 degradation. It regulates synaptic strength by ubiquitination of Arc, resulting in its rapid proteasomal degradation. It is also a key negative regulator of sustained 2DL4/KIR2DL4 (killer cell Ig-like receptor with two Ig-like domains and a long cytoplasmic domain 4)-mediated NF-kappaB signaling from internalized 2DL4, which functions by promoting ubiquitylation and degradation of endocytosed receptor from early endosomes. Furthermore, RNF216 interacts with human immunodeficiency virus type 1 (HIV-1) virion infectivity factor (Vif) protein, which is essential for the productive infection of primary human CD4 T lymphocytes and macrophages. Mutations in RNF216 may result in Gordon Holmes syndrome, a condition defined by hypogonadotropic hypogonadism and cerebellar ataxia, as well as in autosomal recessive Huntington-like disorder. RNF216 contains an RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. The family corresponds to the Rcat domain of RNF216 that is essential for RBR E3 ligase activity and adopts the same fold as the BRcat domain. — an NCBI CDD conserved domain (cd20353); members share this curated model.
