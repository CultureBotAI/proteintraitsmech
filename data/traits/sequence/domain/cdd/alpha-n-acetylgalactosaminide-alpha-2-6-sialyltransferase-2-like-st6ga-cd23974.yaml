identifier: CDD:cd23974
label: "alpha-N-acetylgalactosaminide alpha-2,6-sialyltransferase 2-like. ST6GalNAc family members are alpha-N-acetylgalactosaminide alpha-2,6-sialyltransferases that catalyze an alpha-2,6-linkage between sialic acid and the N-acetylgalactosamine residues of glycochains through an 2,6-linkage, by transfering sialic acid from CMP-Sia. The ST6GalNac family belongs to glycosyltransferase family 29 (GT29)."
definition: >-
  alpha-N-acetylgalactosaminide alpha-2,6-sialyltransferase 2-like. ST6GalNAc family members are alpha-N-acetylgalactosaminide alpha-2,6-sialyltransferases that catalyze an alpha-2,6-linkage between sialic acid and the N-acetylgalactosamine residues of glycochains through an 2,6-linkage, by transfering sialic acid from CMP-Sia. The ST6GalNac family belongs to glycosyltransferase family 29 (GT29). — an NCBI CDD conserved domain (cd23974); members share this curated model.
