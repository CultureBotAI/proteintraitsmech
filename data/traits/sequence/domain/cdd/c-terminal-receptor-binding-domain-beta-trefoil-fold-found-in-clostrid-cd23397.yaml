identifier: CDD:cd23397
label: "C-terminal receptor binding domain, beta-trefoil fold, found in Clostridium tetani tetanus toxin (TeNT) and similar proteins. TeNT (EC 3.4.24.68), also called tentoxylysin, is tetanus toxin that inhibits neurotransmission of inhibitory interneurons, causing spastic paralysis in the tetanus disease. It binds to peripheral neuronal synapses. It is internalized and moves by retrograde transport up the axon into the spinal cord where it can move between postsynaptic and presynaptic neurons. It inhibits neurotransmitter release by acting as a zinc endopeptidase that catalyzes the hydrolysis of the '76-Gln-|-Phe-77' bond of vesicle-associated membrane protein-2 (also known as synaptobrevin-2). TeNT comprises three domains which are involved in catalysis (LC), translocation (HCT), and host receptor binding (HCR). This model corresponds to C-terminal HCR domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  C-terminal receptor binding domain, beta-trefoil fold, found in Clostridium tetani tetanus toxin (TeNT) and similar proteins. TeNT (EC 3.4.24.68), also called tentoxylysin, is tetanus toxin that inhibits neurotransmission of inhibitory interneurons, causing spastic paralysis in the tetanus disease. It binds to peripheral neuronal synapses. It is internalized and moves by retrograde transport up the axon into the spinal cord where it can move between postsynaptic and presynaptic neurons. It inhibits neurotransmitter release by acting as a zinc endopeptidase that catalyzes the hydrolysis of the '76-Gln-|-Phe-77' bond of vesicle-associated membrane protein-2 (also known as synaptobrevin-2). TeNT comprises three domains which are involved in catalysis (LC), translocation (HCT), and host receptor binding (HCR). This model corresponds to C-terminal HCR domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23397); members share this curated model.
