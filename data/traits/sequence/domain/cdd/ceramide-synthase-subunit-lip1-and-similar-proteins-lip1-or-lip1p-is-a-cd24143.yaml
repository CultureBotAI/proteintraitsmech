identifier: CDD:cd24143
label: LIP1-like
definition: >-
  ceramide synthase subunit LIP1 and similar proteins. Lip1 (or Lip1p) is an essential regulatory subunit of ceramide synthase (CerS), a multicomponent enzyme complex that also contains two catalytic subunits, Lag1 and Lac1. CerS catalyzes the synthesis of ceramides, which play a crucial role as basic building blocks of sphingolipids and as signalling molecules mediating the fate of the cell. Lip1 comprises a single-span ER membrane protein and its essential function is contained in the transmembrane or luminal part of the protein
