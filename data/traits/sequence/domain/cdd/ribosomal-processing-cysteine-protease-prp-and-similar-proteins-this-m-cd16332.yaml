identifier: CDD:cd16332
label: Prp-like
definition: >-
  ribosomal-processing cysteine protease Prp and similar proteins. This model represents a family of cysteine proteases that include members found to cleave the N-terminus extension of ribosomal subunit L27 in eubacteria. Proteins in this family are distinguished by a pair of invariant histidine and cysteine residues with conserved spacing that form the classic catalytic dyad of a cysteine protease. Dependence of Staphylococcus aureus on L27 cleavage by Prp makes the enzyme a target for antibiotic development
