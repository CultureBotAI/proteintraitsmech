identifier: CDD:cd17705
label: TRP
definition: >-
  Transient receptor potential (TRP) ion channel. This family of proteins are transient receptor potential (TRP) ion channels. They are essential for cellular viability and are involved in cell growth and cell wall synthesis. The genes for these proteins are homologous to polycystic kidney disease related ion channel genes
