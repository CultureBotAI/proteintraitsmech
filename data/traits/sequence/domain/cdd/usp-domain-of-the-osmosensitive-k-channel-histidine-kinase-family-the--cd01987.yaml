identifier: CDD:cd01987
label: "USP domain of the osmosensitive K+ channel histidine kinase family. The KdpDE two component system is widespread in bacteria and archaea; it controls potassium homeostasis and virulence by regulating the transcription of multiple genes, including a kdpFABC operon, which encodes a high-affinity P-type ATPase transporter. The KdpD histidine kinase (HK, EC:2.7.13.3) contain an N-terminal sensory cytoplasmic region (NTR) composed of KdpD' and universal stress protein (USP) domains, a canonical transmembrane domain, and a cytoplasmic C-terminal region with a transmitter GAF domain and an EnvZ-like catalytic HK domain. Proteins containing the USP domain are induced by many environmental stressors such as nutrient starvation, drought, extreme temperatures, high salinity, and the presence of uncouplers, antibiotics, and metals. It enhances the rate of cell survival during prolonged exposure to such conditions, and may provide a general \"stress endurance\" activity."
definition: >-
  USP domain of the osmosensitive K+ channel histidine kinase family. The KdpDE two component system is widespread in bacteria and archaea; it controls potassium homeostasis and virulence by regulating the transcription of multiple genes, including a kdpFABC operon, which encodes a high-affinity P-type ATPase transporter. The KdpD histidine kinase (HK, EC:2.7.13.3) contain an N-terminal sensory cytoplasmic region (NTR) composed of KdpD' and universal stress protein (USP) domains, a canonical transmembrane domain, and a cytoplasmic C-terminal region with a transmitter GAF domain and an EnvZ-like catalytic HK domain. Proteins containing the USP domain are induced by many environmental stressors such as nutrient starvation, drought, extreme temperatures, high salinity, and the presence of uncouplers, antibiotics, and metals. It enhances the rate of cell survival during prolonged exposure to such conditions, and may provide a general "stress endurance" activity. — an NCBI CDD conserved domain (cd01987); members share this curated model.
