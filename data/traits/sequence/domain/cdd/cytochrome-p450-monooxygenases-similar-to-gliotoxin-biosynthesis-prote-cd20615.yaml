identifier: CDD:cd20615
label: "cytochrome P450 monooxygenases similar to gliotoxin biosynthesis protein C. This subfamily is composed of cytochrome P450 monooxygenases that are part of gene clusters involved in the biosynthesis of various compounds such as mycotoxins and alkaloids, including Aspergillus fumigatus gliotoxin biosynthesis protein (GliC), Penicillium rubens roquefortine/meleagrin synthesis protein R (RoqR), Aspergillus oryzae aspirochlorine biosynthesis protein C (AclC), Aspergillus terreus bimodular acetylaranotin synthesis protein ataTC, Kluyveromyces lactis pulcherrimin biosynthesis cluster protein 2 (PUL2), and Aspergillus nidulans aspyridones biosynthesis protein B (ApdB). The GliC-like subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
