identifier: CDD:cd21012
label: "H-2 class I histocompatibility complex TLA (thymus leukemia antigen); member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the major histocompatibility complex (MHC) H-2 class I histocompatibility complex TLA (thymus leukemia antigen). The murine MHC class I histocompatibility TLA (Thymus leukemia antigen), which is encoded in the T region by T3 and T18 genes, is expressed mainly by intestinal epithelial cells and thymocytes.  The murine TLAs are class I, beta-2-microglobulin-associated glycoproteins. The TLA function is not defined by antigen presentation, but rather by its relatively high affinity binding to CD8-alpha-alpha compared with CD8-alpha-beta. The existence of a human homolog for murine TLA remains unresolved. This group is a member of the C1-set Ig domains, which have one beta sheet that is formed by strands A, B,  E, and D and the other strands by G, F, C, and C'."
definition: >-
  H-2 class I histocompatibility complex TLA (thymus leukemia antigen); member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the major histocompatibility complex (MHC) H-2 class I histocompatibility complex TLA (thymus leukemia antigen). The murine MHC class I histocompatibility TLA (Thymus leukemia antigen), which is encoded in the T region by T3 and T18 genes, is expressed mainly by intestinal epithelial cells and thymocytes. The murine TLAs are class I, beta-2-microglobulin-associated glycoproteins. The TLA function is not defined by antigen presentation, but rather by its relatively high affinity binding to CD8-alpha-alpha compared with CD8-alpha-beta. The existence of a human homolog for murine TLA remains unresolved. This group is a member of the C1-set Ig domains, which have one beta sheet that is formed by strands A, B, E, and D and the other strands by G, F, C, and C'. — an NCBI CDD conserved domain (cd21012); members share this curated model.
