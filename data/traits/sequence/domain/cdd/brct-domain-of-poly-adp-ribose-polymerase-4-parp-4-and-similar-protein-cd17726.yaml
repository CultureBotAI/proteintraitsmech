identifier: CDD:cd17726
label: "BRCT domain of poly [ADP-ribose] polymerase 4 (PARP-4) and similar proteins. PARP-4, also termed 193 kDa vault protein, or ADP-ribosyltransferase diphtheria toxin-like 4 (ARTD4), or PARP-related/IalphaI-related H5/proline-rich (PH5P), or vault poly(ADP-ribose) polymerase (VPARP), shows poly(ADP-ribosyl)ation activity that catalyzes the formation of ADP-ribose polymers in response to DNA damage. PARP-4 is a component of the vault ribonucleoprotein particle, at least composed of MVP, PARP4 and one or more vault RNAs (vRNAs). The Trp-X-X-X-Cys/Ser signature motif of the BRCT family is not conserved in this group."
definition: >-
  BRCT domain of poly [ADP-ribose] polymerase 4 (PARP-4) and similar proteins. PARP-4, also termed 193 kDa vault protein, or ADP-ribosyltransferase diphtheria toxin-like 4 (ARTD4), or PARP-related/IalphaI-related H5/proline-rich (PH5P), or vault poly(ADP-ribose) polymerase (VPARP), shows poly(ADP-ribosyl)ation activity that catalyzes the formation of ADP-ribose polymers in response to DNA damage. PARP-4 is a component of the vault ribonucleoprotein particle, at least composed of MVP, PARP4 and one or more vault RNAs (vRNAs). The Trp-X-X-X-Cys/Ser signature motif of the BRCT family is not conserved in this group. — an NCBI CDD conserved domain (cd17726); members share this curated model.
