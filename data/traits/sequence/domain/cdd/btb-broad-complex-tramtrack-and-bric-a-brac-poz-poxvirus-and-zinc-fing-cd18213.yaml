identifier: CDD:cd18213
label: BTB_POZ_ZBTB25_ZNF46_KUP
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 25 (ZBTB25). ZBTB25, also called zinc finger protein 46 (ZNF46) or zinc finger protein KUP, is a transcription repressor that facilitates viral RNA transcription and replication. It interacts with viral RNA-dependent RNA polymerase (RdRp) proteins and modulates their transcription activity. It also functions as a viral RNA-binding protein, binding preferentially to the U-rich sequence within 5' UTR of vRNA. ZBTB25 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids
