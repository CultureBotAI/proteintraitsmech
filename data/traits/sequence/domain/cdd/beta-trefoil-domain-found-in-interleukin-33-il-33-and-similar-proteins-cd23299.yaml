identifier: CDD:cd23299
label: "beta-trefoil domain found in interleukin-33 (IL-33) and similar proteins. IL-33, also called interleukin-1 family member 11, or IL-1F11, or nuclear factor from high endothelial venules (NF-HEV), acts as cytokine that binds to and signals through the IL1RL1/ST2 receptor which in turn activates NF-kappa-B and MAPK signaling pathways in target cells. It is involved in the maturation of Th2 cells inducing the secretion of T-helper type 2-associated cytokines. It is also involved in activation of mast cells, basophils, eosinophils, and natural killer cells. It acts as a chemoattractant for Th2 cells, and may function as an 'alarmin', that amplifies immune responses during tissue injury.  IL-33 contains a beta-trefoil domain, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  beta-trefoil domain found in interleukin-33 (IL-33) and similar proteins. IL-33, also called interleukin-1 family member 11, or IL-1F11, or nuclear factor from high endothelial venules (NF-HEV), acts as cytokine that binds to and signals through the IL1RL1/ST2 receptor which in turn activates NF-kappa-B and MAPK signaling pathways in target cells. It is involved in the maturation of Th2 cells inducing the secretion of T-helper type 2-associated cytokines. It is also involved in activation of mast cells, basophils, eosinophils, and natural killer cells. It acts as a chemoattractant for Th2 cells, and may function as an 'alarmin', that amplifies immune responses during tissue injury. IL-33 contains a beta-trefoil domain, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23299); members share this curated model.
