identifier: CDD:cd19889
label: "first double-stranded RNA binding motif of protein activator of the interferon-induced protein kinase (PRKRA) and similar proteins. PRKRA (also known as interferon-inducible double-stranded RNA-dependent protein kinase activator A, PKR-associated protein X (RAX), PKR-associating protein X, protein kinase, interferon-inducible double-stranded RNA-dependent activator, PACT, or HSD14) is a cellular activator for double-stranded RNA-dependent protein kinase during stress signaling. PRKRA contains three double-stranded RNA binding motifs (DSRMs). This model describes the first motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  first double-stranded RNA binding motif of protein activator of the interferon-induced protein kinase (PRKRA) and similar proteins. PRKRA (also known as interferon-inducible double-stranded RNA-dependent protein kinase activator A, PKR-associated protein X (RAX), PKR-associating protein X, protein kinase, interferon-inducible double-stranded RNA-dependent activator, PACT, or HSD14) is a cellular activator for double-stranded RNA-dependent protein kinase during stress signaling. PRKRA contains three double-stranded RNA binding motifs (DSRMs). This model describes the first motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19889); members share this curated model.
