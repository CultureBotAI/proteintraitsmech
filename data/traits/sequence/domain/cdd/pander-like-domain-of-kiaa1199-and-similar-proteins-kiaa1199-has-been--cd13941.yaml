identifier: CDD:cd13941
label: "PANDER-like domain of KIAA1199 and similar proteins. KIAA1199 has been characterized as a protein associated with poor survival when upregulated in human cancer, as well as with nonsyndromic loss of hearing when mutated. It contains a C-terminal domain similar to the Pancreatic-derived factor PANDER; the function of this PANDER-like domain has not been characterized."
definition: >-
  PANDER-like domain of KIAA1199 and similar proteins. KIAA1199 has been characterized as a protein associated with poor survival when upregulated in human cancer, as well as with nonsyndromic loss of hearing when mutated. It contains a C-terminal domain similar to the Pancreatic-derived factor PANDER; the function of this PANDER-like domain has not been characterized. — an NCBI CDD conserved domain (cd13941); members share this curated model.
