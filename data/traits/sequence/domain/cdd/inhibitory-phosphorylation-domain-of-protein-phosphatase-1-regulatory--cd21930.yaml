identifier: CDD:cd21930
label: "inhibitory phosphorylation domain of protein phosphatase 1 regulatory subunit 12 (PPP1R12) family. The PPP1R12 family includes PPP1R12A/MYPT1, PPP1R12B/MYPT2, and PPP1R12C. PPP1R12A/MYPT1, also called myosin phosphatase target subunit 1, or protein phosphatase myosin-binding subunit, is a substrate for the asparaginyl hydroxylase factor inhibiting hypoxia-inducible factor (FIH). It acts as a key regulator of protein phosphatase 1C (PPP1C). It mediates binding to myosin. As part of the PPP1C complex, PPP1R12A/MYPT1 is involved in dephosphorylation of PLK1. It is capable of inhibiting HIF1A inhibitor (HIF1AN)-dependent suppression of HIF1A activity. PPP1R12B/MYPT2, also called myosin phosphatase target subunit 2, is the targeting subunit of smooth-muscle myosin phosphatase that regulates myosin phosphatase activity and augments Ca(2+) sensitivity of the contractile apparatus. PPP1R12C, also called protein phosphatase 1 myosin-binding subunit of 85 kDa (MBS85), protein phosphatase 1 myosin-binding subunit p85, or LENG3, regulates myosin phosphatase activity. All family members contain an inhibitory phosphorylation domain."
definition: >-
  inhibitory phosphorylation domain of protein phosphatase 1 regulatory subunit 12 (PPP1R12) family. The PPP1R12 family includes PPP1R12A/MYPT1, PPP1R12B/MYPT2, and PPP1R12C. PPP1R12A/MYPT1, also called myosin phosphatase target subunit 1, or protein phosphatase myosin-binding subunit, is a substrate for the asparaginyl hydroxylase factor inhibiting hypoxia-inducible factor (FIH). It acts as a key regulator of protein phosphatase 1C (PPP1C). It mediates binding to myosin. As part of the PPP1C complex, PPP1R12A/MYPT1 is involved in dephosphorylation of PLK1. It is capable of inhibiting HIF1A inhibitor (HIF1AN)-dependent suppression of HIF1A activity. PPP1R12B/MYPT2, also called myosin phosphatase target subunit 2, is the targeting subunit of smooth-muscle myosin phosphatase that regulates myosin phosphatase activity and augments Ca(2+) sensitivity of the contractile apparatus. PPP1R12C, also called protein phosphatase 1 myosin-binding subunit of 85 kDa (MBS85), protein phosphatase 1 myosin-binding subunit p85, or LENG3, regulates myosin phosphatase activity. All family members contain an inhibitory phosphorylation domain. — an NCBI CDD conserved domain (cd21930); members share this curated model.
