identifier: CDD:cd21976
label: "accessory protein ORF9c (also referred to as ORF14) from Severe acute respiratory syndrome-associated coronavirus and related coronaviruses. This model represents the accessory protein 9c (ORF9c, also referred to as ORF14/protein 14) from Sarbecoviruses including Severe acute respiratory syndrome-associated coronavirus (SARS-CoV), SARS-CoV2 (also called 2019 novel CoV or 2019-nCoV), and Bat SARS-like coronaviruses. There are five essential genes in CoVs that result in the following gene products: Spike (S) protein, Membrane (M) glycoprotein, Nucleocapsid (N), Envelope (E) protein, and replicase/protease polyproteins (ORF1ab); all are required to produce a structurally complete viral particle. In addition, CoV genomes also contain ORFs coding for accessory proteins that are specific for certain CoV lineages or for a particular CoV. In general, CoV accessory proteins are considered to be dispensable for viral replication; however, several accessory proteins have been shown to exhibit functions in virus-host interactions during CoV infection. ORF9c/protein 14 is a product of an alternative open reading frame (ORF) within the N gene from SARS coronavirus. A study of the SARS-CoV2-human protein-protein interaction network (including cloning, tagging and expressing SARS-CoV2 proteins in human cells followed by affinity-purification mass spectrometry) uncovered ORF9c/protein 14 interactions, including those with Sigma receptors (implicated in lipid remodeling and ER stress response), mitochondrial electron transport (ECSIT, ACAD9, NDUFAF1, NDUFB9 ), GPI-anchor biosynthesis (GPAA1, GIPS), and with innate immune signaling proteins (NLRX1, F2RL1, NDFIP2). A preliminary study, using a computational and knowledge-based approach to investigate the interplay between host and SARS-CoV2 in various signaling pathways, supports that SARS-CoV2 ORF9c protein may perturb host antiviral inflammatory cytokine and interferon production pathways (DOI:10.1101/2020.05.06.050260). There are slight differences in the genome organization of SARS-CoV2 in different studies; not all SARS-CoV2 isolates are reported as having ORF9c/protein 14."
definition: >-
  accessory protein ORF9c (also referred to as ORF14) from Severe acute respiratory syndrome-associated coronavirus and related coronaviruses. This model represents the accessory protein 9c (ORF9c, also referred to as ORF14/protein 14) from Sarbecoviruses including Severe acute respiratory syndrome-associated coronavirus (SARS-CoV), SARS-CoV2 (also called 2019 novel CoV or 2019-nCoV), and Bat SARS-like coronaviruses. There are five essential genes in CoVs that result in the following gene products: Spike (S) protein, Membrane (M) glycoprotein, Nucleocapsid (N), Envelope (E) protein, and replicase/protease polyproteins (ORF1ab); all are required to produce a structurally complete viral particle. In addition, CoV genomes also contain ORFs coding for accessory proteins that are specific for certain CoV lineages or for a particular CoV. In general, CoV accessory proteins are considered to be dispensable for viral replication; however, several accessory proteins have been shown to exhibit functions in virus-host interactions during CoV infection. ORF9c/protein 14 is a product of an alternative open reading frame (ORF) within the N gene from SARS coronavirus. A study of the SARS-CoV2-human protein-protein interaction network (including cloning, tagging and expressing SARS-CoV2 proteins in human cells followed by affinity-purification mass spectrometry) uncovered ORF9c/protein 14 interactions, including those with Sigma receptors (implicated in lipid remodeling and ER stress response), mitochondrial electron transport (ECSIT, ACAD9, NDUFAF1, NDUFB9 ), GPI-anchor biosynthesis (GPAA1, GIPS), and with innate immune signaling proteins (NLRX1, F2RL1, NDFIP2). A preliminary study, using a computational and knowledge-based approach to investigate the interplay between host and SARS-CoV2 in various signaling pathways, supports that SARS-CoV2 ORF9c protein may perturb host antiviral inflammatory cytokine and interferon production pathways (DOI:10.1101/2020.05.06.050260). There are slight differences in the genome organization of SARS-CoV2 in different studies; not all SARS-CoV2 isolates are reported as having ORF9c/protein 14. — an NCBI CDD conserved domain (cd21976); members share this curated model.
