identifier: CDD:cd22336
label: MunI-like
definition: >-
  restriction endonuclease MunI and similar proteins. MunI ( E.C. 3.1.21.4) is a type II restriction enzyme that catalyzes the hydrolysis of DNA, recognizing the palindromic hexanucleotide sequence CAATTG (with the cleavage site after C-1), and is very similar to EcoRI. They belong to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI
