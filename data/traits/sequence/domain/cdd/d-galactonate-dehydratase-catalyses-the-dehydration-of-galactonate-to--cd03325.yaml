identifier: CDD:cd03325
label: "D-galactonate dehydratase catalyses the dehydration of galactonate to 2-keto-3-deoxygalactonate (KDGal), as part of the D-galactonate nonphosphorolytic catabolic Entner-Doudoroff pathway. D-galactonate dehydratase belongs to the enolase superfamily of enzymes, characterized by the presence of an enolate anion intermediate which is generated by abstraction of the alpha-proton of the carboxylate substrate by an active site residue and is stabilized by coordination to the essential Mg2+ ion."
definition: >-
  D-galactonate dehydratase catalyses the dehydration of galactonate to 2-keto-3-deoxygalactonate (KDGal), as part of the D-galactonate nonphosphorolytic catabolic Entner-Doudoroff pathway. D-galactonate dehydratase belongs to the enolase superfamily of enzymes, characterized by the presence of an enolate anion intermediate which is generated by abstraction of the alpha-proton of the carboxylate substrate by an active site residue and is stabilized by coordination to the essential Mg2+ ion. — an NCBI CDD conserved domain (cd03325); members share this curated model.
