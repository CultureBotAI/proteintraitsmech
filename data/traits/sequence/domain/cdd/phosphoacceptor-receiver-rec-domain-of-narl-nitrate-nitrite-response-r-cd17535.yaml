identifier: CDD:cd17535
label: "phosphoacceptor receiver (REC) domain of NarL (Nitrate/Nitrite response regulator L) family response regulators. The NarL family is one of the more abundant families of DNA-binding response regulators (RRs). Members of the NarL family contain a REC domain and a helix-turn-helix (HTH) DNA-binding output domain, with a majority of members containing a LuxR-type HTH domain. They function as transcriptional regulators. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of NarL (Nitrate/Nitrite response regulator L) family response regulators. The NarL family is one of the more abundant families of DNA-binding response regulators (RRs). Members of the NarL family contain a REC domain and a helix-turn-helix (HTH) DNA-binding output domain, with a majority of members containing a LuxR-type HTH domain. They function as transcriptional regulators. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17535); members share this curated model.
