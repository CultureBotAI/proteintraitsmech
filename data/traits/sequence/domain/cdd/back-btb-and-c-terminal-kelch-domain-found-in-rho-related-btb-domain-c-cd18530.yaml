identifier: CDD:cd18530
label: "BACK (BTB and C-terminal Kelch) domain found in Rho-related BTB domain-containing protein 1 (RhoBTB1). RhoBTB1 is an atypical member of the Rho GTPase family of signaling proteins, which is characterized by containing a carboxyl terminal extension that harbors two BTB domains and a BACK domain and is capable of assembling cullin 3-dependent ubiquitin ligase complexes. It functions as a tumor suppressor that regulates the integrity of the Golgi complex through the methyltransferase METTL7B. RhoBTB1 also acts an adaptor of the Cullin-3-dependent E3 ubiquitin ligase complex."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Rho-related BTB domain-containing protein 1 (RhoBTB1). RhoBTB1 is an atypical member of the Rho GTPase family of signaling proteins, which is characterized by containing a carboxyl terminal extension that harbors two BTB domains and a BACK domain and is capable of assembling cullin 3-dependent ubiquitin ligase complexes. It functions as a tumor suppressor that regulates the integrity of the Golgi complex through the methyltransferase METTL7B. RhoBTB1 also acts an adaptor of the Cullin-3-dependent E3 ubiquitin ligase complex. — an NCBI CDD conserved domain (cd18530); members share this curated model.
