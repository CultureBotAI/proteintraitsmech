identifier: CDD:cd15811
label: "PRY/SPRY domain of tripartite motif-binding protein 11 (TRIM11), also known as RING finger protein 92 (RNF92). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM11, also known as RING finger protein 92 (RNF92) or BIA1. TRIM11 domains are composed of RING/B-box/coiled-coil core and also known as RBCC proteins. It localizes to the nucleus and the cytoplasm; it is overexpressed in high-grade gliomas and promotes proliferation, invasion, migration and glial tumor growth. TRIM11 increases expression of dopamine beta-hydroxylase gene by interacting with the homeodomain transcription factor, PHOX2B, via the B30.2/SPRY domain, thus playing a potential role in the specification of noradrenergic (NA) neuron phenotype. It has also been shown that TRIM11 plays a critical role in the clearance of mutant PHOX2B, which causes congenital central hypoventilation syndrome, via the proteasome. TRIM11 binds a key component of the activator-mediated cofactor complex (ARC105), and destabilizes it, through the ubiquitin-proteasome system; ARC105 mediates chromatin-directed transcription activation and is a key regulatory factor for transforming growth factor beta (TGFbeta) signaling."
definition: >-
