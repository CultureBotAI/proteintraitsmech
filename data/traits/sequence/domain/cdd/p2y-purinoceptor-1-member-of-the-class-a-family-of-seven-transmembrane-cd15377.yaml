identifier: CDD:cd15377
label: "P2Y purinoceptor 1, member of the class A family of seven-transmembrane G protein-coupled receptors. P2Y1 belongs to the P2Y receptor family of purinergic G-protein coupled receptors. This family is composed of eight subtypes, which are activated by naturally occurring extracellular nucleotides such as ATP, ADP, UTP, UDP, and UDP-glucose. These eight receptors are ubiquitous in human tissues and can be further classified into two subfamilies based on sequence homology and second messenger coupling: a subfamily of five P2Y1-like receptors (P2Y1, P2Y2, P2Y4, P2Y6, and P2Y11Rs) that are coupled to G(q) protein to activate phospholipase C (PLC) and a second subfamily of three P2Y12-like receptors (P2Y12, P2YR13, and P2Y14Rs) that are coupled to G(i) protein to inhibit adenylate cyclase. Several cloned subtypes, such as P2Y3, P2Y5, and P2Y7-10, are not functional mammalian nucleotide receptors. The native agonists for P2Y receptors are: ATP (P2Y2, P2Y12), ADP (P2Y1, P2Y12, and P2Y13), UTP (P2Y2, P2Y4), UDP (P2Y6, P2Y14), and UDP-glucose (P2Y14)."
definition: >-
