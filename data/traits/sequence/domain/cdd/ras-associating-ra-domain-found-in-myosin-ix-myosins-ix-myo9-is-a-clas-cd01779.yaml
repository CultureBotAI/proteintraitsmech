identifier: CDD:cd01779
label: "Ras-associating (RA) domain found in Myosin-IX. Myosins IX (Myo9) is a class of unique motor proteins with a common structure of an N-terminal extension preceding a myosin head homologous to the Ras-association (RA) domain, a head (motor) domain, a neck with IQ motifs that bind light chains and a C-terminal tail containing a Rho-GTPase activating protein (RhoGAP) domain. The RA domain is located at its head domain and has the beta-grasp ubiquitin-like fold with unknown function. There are two genes for myosins IX in humans, IXa and IXb, that are different in their expression and localization. IXa is expressed abundantly in brain and testis and IXb is expressed abundantly in tissues of the immune system."
definition: >-
