identifier: CDD:cd17456
label: "Feline leukemia virus subgroup C receptor-related protein 2 of the Major Facilitator Superfamily of transporters. Feline leukemia virus subgroup C receptor-related protein 2 (FLVCR2) is also called calcium-chelate transporter (CCT). It functions as a heme importer as well as a transporter for a calcium-chelator complex that is important for growth and calcium metabolism. Mutations in the FLVCR2 gene cause Proliferative vasculopathy and hydranencephaly-hydrocephaly syndrome (PVHH), also known as Fowler syndrome, a rare autosomal recessive disorder characterized by glomerular vasculopathy in the central nervous system, severe hydrocephaly, hypokinesia and arthrogryphosis. FLVCR2 belongs to the Solute carrier 49 (SLC49) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Feline leukemia virus subgroup C receptor-related protein 2 of the Major Facilitator Superfamily of transporters. Feline leukemia virus subgroup C receptor-related protein 2 (FLVCR2) is also called calcium-chelate transporter (CCT). It functions as a heme importer as well as a transporter for a calcium-chelator complex that is important for growth and calcium metabolism. Mutations in the FLVCR2 gene cause Proliferative vasculopathy and hydranencephaly-hydrocephaly syndrome (PVHH), also known as Fowler syndrome, a rare autosomal recessive disorder characterized by glomerular vasculopathy in the central nervous system, severe hydrocephaly, hypokinesia and arthrogryphosis. FLVCR2 belongs to the Solute carrier 49 (SLC49) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17456); members share this curated model.
