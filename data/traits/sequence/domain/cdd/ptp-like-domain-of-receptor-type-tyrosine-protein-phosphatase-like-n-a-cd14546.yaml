identifier: CDD:cd14546
label: "PTP-like domain of receptor-type tyrosine-protein phosphatase-like N and N2. Receptor-type tyrosine-protein phosphatase-like N (PTPRN) and N2 (PTPRN2) belong to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). They consist of a large ectodomain that contains a RESP18HD (regulated endocrine-specific protein 18 homology domain), followed by a transmembrane segment, and a single, catalytically-impaired, PTP domain. They are mainly expressed in neuropeptidergic neurons and peptide-secreting endocrine cells, including insulin-producing pancreatic beta-cells, and are involved in involved in the generation, cargo storage, traffic, exocytosis and recycling of insulin secretory granules, as well as in beta-cell proliferation. They also are major autoantigens in type 1 diabetes and are involved in the regulation of insulin secretion."
definition: >-
