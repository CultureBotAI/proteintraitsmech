identifier: CDD:cd23068
label: "PDZ domain of Drosophila melanogaster PDZ and LIM domain protein Zasp52 (also known as Zasp), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of Drosophila melanogaster Zasp52 and related domains. Drosophila melanogaster Zasp52 (also known as Z band alternatively spliced PDZ-motif protein or Zasp) colocalizes with integrins at myotendinous junctions and with alpha-actinin at Z-disks and is required for muscle attachment as well as Z-disk assembly and maintenance. The Zasp52 actin-binding site includes the extended PDZ domain and the ZM region. The Zasp52-PDZ domain is required for myofibril assembly. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This Zasp52-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  PDZ domain of Drosophila melanogaster PDZ and LIM domain protein Zasp52 (also known as Zasp), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of Drosophila melanogaster Zasp52 and related domains. Drosophila melanogaster Zasp52 (also known as Z band alternatively spliced PDZ-motif protein or Zasp) colocalizes with integrins at myotendinous junctions and with alpha-actinin at Z-disks and is required for muscle attachment as well as Z-disk assembly and maintenance. The Zasp52 actin-binding site includes the extended PDZ domain and the ZM region. The Zasp52-PDZ domain is required for myofibril assembly. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This Zasp52-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd23068); members share this curated model.
