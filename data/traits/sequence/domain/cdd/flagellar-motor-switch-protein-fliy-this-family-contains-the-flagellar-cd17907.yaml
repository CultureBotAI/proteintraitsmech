identifier: CDD:cd17907
label: "flagellar motor switch protein FliY. This family contains the flagellar rotor protein FliY, a highly conserved and essential member of the CheC phosphatase family, that distinguishes flagellar architecture and function in different types of bacteria. Unlike CheC and CheX, FliY is localized in the flagellar switch complex, which also contains the stator-coupling protein FliG and the target of CheY-P, FliM, all present in many copies, and together corresponding structurally to the C-ring of the flagellar basal body. FliY structure resembles that of the rotor protein FliM but contains two active centers for CheY dephosphorylation. In bacteria such as Thermotogae and Bacilli, FliY is fused to FliN. It incorporates properties of the FliM/FliN rotor proteins and the CheC/CheX phosphatases to serve multiple functions in the flagellar switch. FliY seems to act on CheY-P constitutively, as compared to CheC and CheX that appear to be primarily involved in restoring normal CheY-P levels."
definition: >-
  flagellar motor switch protein FliY. This family contains the flagellar rotor protein FliY, a highly conserved and essential member of the CheC phosphatase family, that distinguishes flagellar architecture and function in different types of bacteria. Unlike CheC and CheX, FliY is localized in the flagellar switch complex, which also contains the stator-coupling protein FliG and the target of CheY-P, FliM, all present in many copies, and together corresponding structurally to the C-ring of the flagellar basal body. FliY structure resembles that of the rotor protein FliM but contains two active centers for CheY dephosphorylation. In bacteria such as Thermotogae and Bacilli, FliY is fused to FliN. It incorporates properties of the FliM/FliN rotor proteins and the CheC/CheX phosphatases to serve multiple functions in the flagellar switch. FliY seems to act on CheY-P constitutively, as compared to CheC and CheX that appear to be primarily involved in restoring normal CheY-P levels. — an NCBI CDD conserved domain (cd17907); members share this curated model.
