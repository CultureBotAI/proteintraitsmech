identifier: CDD:cd13943
label: RNA_pol_Rpb1_6
definition: >-
  RNA polymerase Rpb1, domain 6. RNA polymerases catalyze the DNA dependent polymerisation of RNA. Prokaryotes contain a single RNA polymerase compared to three in eukaryotes (not including mitochondrial. and chloroplast polymerases). This domain, domain 6, represents a mobile module of the RNA polymerase. Domain 6 forms part of the shelf module. This family appears to be specific to the largest subunit of RNA polymerase II
