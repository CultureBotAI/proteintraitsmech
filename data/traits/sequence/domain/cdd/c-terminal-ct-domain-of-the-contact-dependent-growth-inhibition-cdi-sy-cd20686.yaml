identifier: CDD:cd20686
label: "C-terminal (CT) domain of the contact-dependent growth inhibition (CDI) system (CdiA-CT) protein CdiA of Escherichia coli STEC_O31, and similar proteins. CDI toxins are expressed by gram-negative bacteria as part of a mechanism to inhibit the growth of neighboring cells. CdiA secretion is dependent on the outer membrane protein CdiB. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered via the C-terminal domain. A wide variety of C-terminal toxin domains appear to exist; this particular model contains the C-terminal (CT) domain of Escherichia coli STEC_O31 CdiA and similar domains. The function of this CdiA-CT is as yet unknown, but its C-terminal end is similar to EndoU domain-containing protein which may act as a nuclease toxin that cleaves RNAs in competitor cells. CDI(+) bacteria also produce a CDI immunity protein (CdiI) to specifically neutralize the CdiA-CT toxins to prevent auto-inhibition. This CdiA-CT binds its cognate CdiI with high affinity."
definition: >-
  C-terminal (CT) domain of the contact-dependent growth inhibition (CDI) system (CdiA-CT) protein CdiA of Escherichia coli STEC_O31, and similar proteins. CDI toxins are expressed by gram-negative bacteria as part of a mechanism to inhibit the growth of neighboring cells. CdiA secretion is dependent on the outer membrane protein CdiB. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered via the C-terminal domain. A wide variety of C-terminal toxin domains appear to exist; this particular model contains the C-terminal (CT) domain of Escherichia coli STEC_O31 CdiA and similar domains. The function of this CdiA-CT is as yet unknown, but its C-terminal end is similar to EndoU domain-containing protein which may act as a nuclease toxin that cleaves RNAs in competitor cells. CDI(+) bacteria also produce a CDI immunity protein (CdiI) to specifically neutralize the CdiA-CT toxins to prevent auto-inhibition. This CdiA-CT binds its cognate CdiI with high affinity. — an NCBI CDD conserved domain (cd20686); members share this curated model.
