identifier: CDD:cd16647
label: "Modified RING finger, HC subclass (C3HC5-type), found in neuralized-like protein NEURL1A, NEURL1B, and similar proteins. This subfamily includes Drosophila neuralized (D-neu) protein, and its two mammalian homologs, NEURL1A and NEURL1B. D-neu is a regulator of the developmentally important Notch signaling pathway. NEURL1A, also known as NEURL1, NEU, neuralized 1, or RING finger protein 67 (RNF67), is a mammalian homolog of D-neu. It functions as an E3 ubiquitin-protein ligase that directly interacts with and monoubiquitinates cytoplasmic polyadenylation element-binding protein 3 (CPEB3), an RNA binding protein and a translational regulator of local protein synthesis, which facilitates hippocampal plasticity and hippocampal-dependent memory storage. It also acts as a potential tumor suppressor that causes apoptosis and downregulates Notch target genes in medulloblastoma. NEURL1B, also known as neuralized-2 (NEUR2) or neuralized-like protein 3, is another mammalian homolog of D-neu protein. It functions as an E3 ubiquitin-protein ligase that interacts with and ubiquitinates Delta. Thus, it plays a role in the endocytic pathways for Notch signaling by working cooperatively with another E3 ligase, Mind bomb-1 (Mib1), in Delta endocytosis to hepatocyte growth factor-regulated tyrosine kinase substrate (Hrs)-positive vesicles. Members of this subfamily contain two neuralized homology regions (NHRs) responsible for Neural-ligand interactions and a modified C3HC5-type RING-HC finger required for ubiquitin ligase activity. The C3HC5-type RING-HC finger is distinguished from typical C3HC4-type RING-HC finger due to the existence of the additional cysteine residue in the middle portion of the RING finger domain."
definition: >-
  Modified RING finger, HC subclass (C3HC5-type), found in neuralized-like protein NEURL1A, NEURL1B, and similar proteins. This subfamily includes Drosophila neuralized (D-neu) protein, and its two mammalian homologs, NEURL1A and NEURL1B. D-neu is a regulator of the developmentally important Notch signaling pathway. NEURL1A, also known as NEURL1, NEU, neuralized 1, or RING finger protein 67 (RNF67), is a mammalian homolog of D-neu. It functions as an E3 ubiquitin-protein ligase that directly interacts with and monoubiquitinates cytoplasmic polyadenylation element-binding protein 3 (CPEB3), an RNA binding protein and a translational regulator of local protein synthesis, which facilitates hippocampal plasticity and hippocampal-dependent memory storage. It also acts as a potential tumor suppressor that causes apoptosis and downregulates Notch target genes in medulloblastoma. NEURL1B, also known as neuralized-2 (NEUR2) or neuralized-like protein 3, is another mammalian homolog of D-neu protein. It functions as an E3 ubiquitin-protein ligase that interacts with and ubiquitinates Delta. Thus, it plays a role in the endocytic pathways for Notch signaling by working cooperatively with another E3 ligase, Mind bomb-1 (Mib1), in Delta endocytosis to hepatocyte growth factor-regulated tyrosine kinase substrate (Hrs)-positive vesicles. Members of this subfamily contain two neuralized homology regions (NHRs) responsible for Neural-ligand interactions and a modified C3HC5-type RING-HC finger required for ubiquitin ligase activity. The C3HC5-type RING-HC finger is distinguished from typical C3HC4-type RING-HC finger due to the existence of the additional cysteine residue in the middle portion of the RING finger domain. — an NCBI CDD conserved domain (cd16647); members share this curated model.
