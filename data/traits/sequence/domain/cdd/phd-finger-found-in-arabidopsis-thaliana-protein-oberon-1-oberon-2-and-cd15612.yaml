identifier: CDD:cd15612
label: "PHD finger found in Arabidopsis thaliana protein OBERON 1, OBERON 2, and similar proteins mainly found in plants. Included in this family are OBERON 1 (OBE1, or potyvirus VPg-interacting protein 2) and OBERON 2 (OBE2, or potyvirus VPg-interacting protein 1), which have been involved in the maintenance and/or establishment of the meristems in Arabidopsis. They interact with potyvirus VPg-interacting proteins (PVIP1 and 2) and act as central regulators in auxin-mediated control of development. Both OBE1and OBE2 contain a plant homeodomain (PHD) finger. PHD fingers can recognize the unmodified and modified histone H3 tail, and some have been found to interact with non-histone proteins."
definition: >-
  PHD finger found in Arabidopsis thaliana protein OBERON 1, OBERON 2, and similar proteins mainly found in plants. Included in this family are OBERON 1 (OBE1, or potyvirus VPg-interacting protein 2) and OBERON 2 (OBE2, or potyvirus VPg-interacting protein 1), which have been involved in the maintenance and/or establishment of the meristems in Arabidopsis. They interact with potyvirus VPg-interacting proteins (PVIP1 and 2) and act as central regulators in auxin-mediated control of development. Both OBE1and OBE2 contain a plant homeodomain (PHD) finger. PHD fingers can recognize the unmodified and modified histone H3 tail, and some have been found to interact with non-histone proteins. — an NCBI CDD conserved domain (cd15612); members share this curated model.
