identifier: CDD:cd21270
label: "calponin homology (CH) domain found in leucine-rich repeat and calponin homology domain-containing protein 1. Leucine-rich repeat and calponin homology domain-containing protein 1 (LRCH1), also called calponin homology domain-containing protein 1, or neuronal protein 81 (NP81), acts as a negative regulator of GTPase CDC42 by sequestering CDC42-guanine exchange factor DOCK8. LRCH1 contains a single copy of the CH domain at the C-terminus. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  calponin homology (CH) domain found in leucine-rich repeat and calponin homology domain-containing protein 1. Leucine-rich repeat and calponin homology domain-containing protein 1 (LRCH1), also called calponin homology domain-containing protein 1, or neuronal protein 81 (NP81), acts as a negative regulator of GTPase CDC42 by sequestering CDC42-guanine exchange factor DOCK8. LRCH1 contains a single copy of the CH domain at the C-terminus. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21270); members share this curated model.
