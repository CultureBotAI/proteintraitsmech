identifier: CDD:cd12007
label: "Src homology 3 domain of Yes Protein Tyrosine Kinase. Yes (or c-Yes) is a member of the Src subfamily of proteins, which are cytoplasmic (or non-receptor) PTKs. c-Yes kinase is the cellular homolog of the oncogenic protein (v-Yes) encoded by the Yamaguchi 73 and Esh sarcoma viruses. It displays functional overlap with other Src subfamily members, particularly Src. It also shows some unique functions such as binding to occludins, transmembrane proteins that regulate extracellular interactions in tight junctions. Yes also associates with a number of proteins in different cell types that Src does not interact with, like JAK2 and gp130 in pre-adipocytes, and Pyk2 in treated pulmonary vein endothelial cells. Although the biological function of Yes remains unclear, it appears to have a role in regulating cell-cell interactions and vesicle trafficking in polarized cells. Src kinases contain an N-terminal SH4 domain with a myristoylation site, followed by SH3 and SH2 domains, a tyr kinase domain, and a regulatory C-terminal region containing a conserved tyr. They are activated by autophosphorylation at the tyr kinase domain, but are negatively regulated by phosphorylation at the C-terminal tyr by Csk (C-terminal Src Kinase). The SH3 domain of Src kinases contributes to substrate recruitment by binding adaptor proteins/substrates, and regulation of kinase activity through an intramolecular interaction. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of Yes Protein Tyrosine Kinase. Yes (or c-Yes) is a member of the Src subfamily of proteins, which are cytoplasmic (or non-receptor) PTKs. c-Yes kinase is the cellular homolog of the oncogenic protein (v-Yes) encoded by the Yamaguchi 73 and Esh sarcoma viruses. It displays functional overlap with other Src subfamily members, particularly Src. It also shows some unique functions such as binding to occludins, transmembrane proteins that regulate extracellular interactions in tight junctions. Yes also associates with a number of proteins in different cell types that Src does not interact with, like JAK2 and gp130 in pre-adipocytes, and Pyk2 in treated pulmonary vein endothelial cells. Although the biological function of Yes remains unclear, it appears to have a role in regulating cell-cell interactions and vesicle trafficking in polarized cells. Src kinases contain an N-terminal SH4 domain with a myristoylation site, followed by SH3 and SH2 domains, a tyr kinase domain, and a regulatory C-terminal region containing a conserved tyr. They are activated by autophosphorylation at the tyr kinase domain, but are negatively regulated by phosphorylation at the C-terminal tyr by Csk (C-terminal Src Kinase). The SH3 domain of Src kinases contributes to substrate recruitment by binding adaptor proteins/substrates, and regulation of kinase activity through an intramolecular interaction. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12007); members share this curated model.
