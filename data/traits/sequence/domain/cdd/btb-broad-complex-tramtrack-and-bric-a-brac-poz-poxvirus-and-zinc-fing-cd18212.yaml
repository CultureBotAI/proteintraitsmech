identifier: CDD:cd18212
label: BTB_POZ_ZBTB24_ZNF450
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 24 (ZBTB24). ZBTB24, also called zinc finger protein 450, functions as a transcription factor essentially involved in B-cell functions in humans. The loss-of-function mutations in ZBTB24 can cause ICF2 (immunodeficiency, centromeric instability and facial anomalies syndrome 2) with immunological characteristics of greatly reduced serum antibodies and circulating memory B cells. ZBTB24 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids
