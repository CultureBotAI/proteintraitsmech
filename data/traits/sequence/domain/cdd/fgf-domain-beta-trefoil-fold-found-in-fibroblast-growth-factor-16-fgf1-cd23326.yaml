identifier: CDD:cd23326
label: "FGF domain, beta-trefoil fold, found in fibroblast growth factor 16 (FGF16) and similar proteins. FGF16 plays an important role in the regulation of embryonic development, cell proliferation, and cell differentiation. It is required for normal cardiomyocyte proliferation and heart development. FGF16 interacts with fibroblast growth factor receptors, FGFR1 and FGFR2. FGF16 contains a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  FGF domain, beta-trefoil fold, found in fibroblast growth factor 16 (FGF16) and similar proteins. FGF16 plays an important role in the regulation of embryonic development, cell proliferation, and cell differentiation. It is required for normal cardiomyocyte proliferation and heart development. FGF16 interacts with fibroblast growth factor receptors, FGFR1 and FGFR2. FGF16 contains a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23326); members share this curated model.
