label: "nuclease domain of type ISB restriction-modification enzyme LlaBIII and similar nuclease domains. This N-terminal nuclease domain belongs to a superfamily of PDDEXK nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  nuclease domain of type ISB restriction-modification enzyme LlaBIII and similar nuclease domains. This N-terminal nuclease domain belongs to a superfamily of PDDEXK nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22333); members share this curated model.
