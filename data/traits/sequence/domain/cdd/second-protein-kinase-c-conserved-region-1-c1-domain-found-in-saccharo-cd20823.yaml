identifier: CDD:cd20823
label: "second protein kinase C conserved region 1 (C1 domain) found in Saccharomyces cerevisiae protein kinase C-like 1 (ScPKC1) and similar proteins. ScPKC1 is required for cell growth and for the G2 to M transition of the cell division cycle. It mediates a protein kinase cascade, activating BCK1 which itself activates MKK1/MKK2. The family also includes Schizosaccharomyces pombe PKC1 and PKC2, which are involved in the control of cell shape and act as targets of the inhibitor staurosporine. Members of this family contain two copies of C1 domain. This model corresponds to the second one. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  second protein kinase C conserved region 1 (C1 domain) found in Saccharomyces cerevisiae protein kinase C-like 1 (ScPKC1) and similar proteins. ScPKC1 is required for cell growth and for the G2 to M transition of the cell division cycle. It mediates a protein kinase cascade, activating BCK1 which itself activates MKK1/MKK2. The family also includes Schizosaccharomyces pombe PKC1 and PKC2, which are involved in the control of cell shape and act as targets of the inhibitor staurosporine. Members of this family contain two copies of C1 domain. This model corresponds to the second one. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20823); members share this curated model.
