identifier: CDD:cd08659
label: "Peptidase M20 acetylornithine deacetylase/succinyl-diaminopimelate desuccinylase (ArgE/DapE)-like. Peptidase M20 acetylornithine deacetylase/succinyl-diaminopimelate desuccinylase (ArgE/DapE) like family of enzymes catalyze analogous reactions and share a common activator, the metal ion (usually Co2+ or Zn2+). ArgE catalyzes a broad range of substrates, including N-acetylornithine, alpha-N-acetylmethionine and alpha-N-formylmethionine, while DapE catalyzes the hydrolysis of N-succinyl-L,L-diaminopimelate (L,L-SDAP) to L,L-diaminopimelate and succinate. Proteins in this family are mostly bacterial and have been inferred by homology as being related to both ArgE and DapE. This family also includes N-acetyl-L-citrulline deacetylase (ACDase; acetylcitrulline deacetylase), a unique, novel enzyme found in Xanthomonas campestris, a plant pathogen, in which N-acetyl-L-ornithine is the substrate for transcarbamoylation reaction, and the product is N-acetyl-L-citrulline. Thus, in the arginine biosynthesis pathway, ACDase subsequently catalyzes the hydrolysis of N-acetyl-L-citrulline to acetate and L-citrulline."
definition: >-
  Peptidase M20 acetylornithine deacetylase/succinyl-diaminopimelate desuccinylase (ArgE/DapE)-like. Peptidase M20 acetylornithine deacetylase/succinyl-diaminopimelate desuccinylase (ArgE/DapE) like family of enzymes catalyze analogous reactions and share a common activator, the metal ion (usually Co2+ or Zn2+). ArgE catalyzes a broad range of substrates, including N-acetylornithine, alpha-N-acetylmethionine and alpha-N-formylmethionine, while DapE catalyzes the hydrolysis of N-succinyl-L,L-diaminopimelate (L,L-SDAP) to L,L-diaminopimelate and succinate. Proteins in this family are mostly bacterial and have been inferred by homology as being related to both ArgE and DapE. This family also includes N-acetyl-L-citrulline deacetylase (ACDase; acetylcitrulline deacetylase), a unique, novel enzyme found in Xanthomonas campestris, a plant pathogen, in which N-acetyl-L-ornithine is the substrate for transcarbamoylation reaction, and the product is N-acetyl-L-citrulline. Thus, in the arginine biosynthesis pathway, ACDase subsequently catalyzes the hydrolysis of N-acetyl-L-citrulline to acetate and L-citrulline. — an NCBI CDD conserved domain (cd08659); members share this curated model.
