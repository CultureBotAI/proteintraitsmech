identifier: CDD:cd11976
label: "C-terminal (or second) Src homology 3 domain of VAV1 protein. VAV1 is expressed predominantly in the hematopoietic system and it plays an important role in the development and activation of B and T cells. It is activated by tyrosine phosphorylation to function as a guanine nucleotide exchange factor (GEF) for Rho GTPases following cell surface receptor activation, triggering various effects such as cytoskeletal reorganization, transcription regulation, cell cycle progression, and calcium mobilization. It also serves as a scaffold protein and has been shown to interact with Ku70, Socs1, Janus kinase 2, SIAH2, S100B, Abl gene, ZAP-70, SLP76, and Syk, among others. VAV proteins contain several domains that enable their function: N-terminal calponin homology (CH), acidic, RhoGEF (also called Dbl-homologous or DH), Pleckstrin Homology (PH), C1 (zinc finger), SH2, and two SH3 domains. The C-terminal SH3 domain of Vav1 interacts with a wide variety of proteins including cytoskeletal regulators (zyxin), RNA-binding proteins (Sam68), transcriptional regulators, viral proteins, and dynamin 2. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  C-terminal (or second) Src homology 3 domain of VAV1 protein. VAV1 is expressed predominantly in the hematopoietic system and it plays an important role in the development and activation of B and T cells. It is activated by tyrosine phosphorylation to function as a guanine nucleotide exchange factor (GEF) for Rho GTPases following cell surface receptor activation, triggering various effects such as cytoskeletal reorganization, transcription regulation, cell cycle progression, and calcium mobilization. It also serves as a scaffold protein and has been shown to interact with Ku70, Socs1, Janus kinase 2, SIAH2, S100B, Abl gene, ZAP-70, SLP76, and Syk, among others. VAV proteins contain several domains that enable their function: N-terminal calponin homology (CH), acidic, RhoGEF (also called Dbl-homologous or DH), Pleckstrin Homology (PH), C1 (zinc finger), SH2, and two SH3 domains. The C-terminal SH3 domain of Vav1 interacts with a wide variety of proteins including cytoskeletal regulators (zyxin), RNA-binding proteins (Sam68), transcriptional regulators, viral proteins, and dynamin 2. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11976); members share this curated model.
