identifier: CDD:cd11014
label: Mavicyanin
definition: >-
  Mavicyanin is a subclass of phytocyanins, a plant blue copper protein. Mavicyanin is a glycosylated protein isolated from Cucurbita pepo medullosa (zucchini) peelings. It belongs to the phytocyanin family of blue copper proteins, a ubiquitous family of plant cupredoxins. Mavicyanin is involved in electron transfer reactions with the Cu center transitioning between the oxidized Cu(II) form and the reduced Cu(I) form. The copper is tetrahedrally coordinated by a cysteine, 2 histidines, and a glutamine residue, like in the case of stellacyanin. The biological roles of mavicyanin have not been elucidated yet
