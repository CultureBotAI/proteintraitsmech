identifier: CDD:cd24078
label: "nucleotide-binding domain (NBD) of N-acetyl-D-glucosamine kinase (NAGK) and similar proteins. NAGK (EC 2.7.1.59), also called N-acetylglucosamine kinase, or GlcNAc kinase, converts endogenous N-acetylglucosamine (GlcNAc), a major component of complex carbohydrates, from lysosomal degradation or nutritional sources into GlcNAc 6-phosphate. It is involved in the N-glycolylneuraminic acid (Neu5Gc) degradation pathway. NAGK also has ManNAc kinase activity. Members in this family are mainly from metazoa."
definition: >-
  nucleotide-binding domain (NBD) of N-acetyl-D-glucosamine kinase (NAGK) and similar proteins. NAGK (EC 2.7.1.59), also called N-acetylglucosamine kinase, or GlcNAc kinase, converts endogenous N-acetylglucosamine (GlcNAc), a major component of complex carbohydrates, from lysosomal degradation or nutritional sources into GlcNAc 6-phosphate. It is involved in the N-glycolylneuraminic acid (Neu5Gc) degradation pathway. NAGK also has ManNAc kinase activity. Members in this family are mainly from metazoa. — an NCBI CDD conserved domain (cd24078); members share this curated model.
