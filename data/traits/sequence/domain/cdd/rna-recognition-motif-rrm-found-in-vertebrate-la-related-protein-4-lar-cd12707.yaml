identifier: CDD:cd12707
label: RRM_LARP4
definition: >-
  RNA recognition motif (RRM) found in vertebrate La-related protein 4 (LARP4). This subgroup corresponds to the RRM of LARP4, a cytoplasmic factor that can bind poly(A) RNA and interact with poly(A) binding protein (PABP). It may play a role in promoting translation by stabilizing mRNA. LARP4 is structurally related to the La autoantigen. Like other La-related proteins (LARPs) family members, LARP4 contains a La motif (LAM) and an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain)
