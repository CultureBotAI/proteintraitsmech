identifier: CDD:cd21453
label: DLC-like_DNAL4
definition: >-
  dynein light chain (DLC)-like domain found in axonemal dynein light chain 4 (DNAL4) and similar proteins. Axonemal dynein light chain 4 (DNAL4) is a force generating protein of respiratory cilia. It produces force towards the minus ends of microtubules. The model corresponds to the dynein light chain (DLC)-like domain of DNAL4
