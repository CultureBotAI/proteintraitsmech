identifier: CDD:cd08048
label: "histone-fold domain found in transcription initiation factor TFIID subunit 11 (TAF11) and similar proteins. TAF11, also called TATA Binding Protein (TBP) associated factor 11, TFIID subunit p30-beta, or transcription initiation factor TFIID 28 kDa subunit (TAF(II)28, TAFII-28, TAFII28), is a component of the TFIID complex that is composed of TATA binding protein (TBP) and a number of TBP-associated factors (TAFs). TFIID is one of the general transcription factors required for accurate and regulated initiation by RNA polymerase II. It plays a central role in mediating promoter responses to various activators and repressors. TAF11 interacts with the ligand binding domains of the nuclear receptors for vitamin D3 and thyroid hormone. TAF11 also directly interacts with TFIIA, acting as a bridging factor that stabilizes the TFIIA-TBP-DNA complex."
definition: >-
