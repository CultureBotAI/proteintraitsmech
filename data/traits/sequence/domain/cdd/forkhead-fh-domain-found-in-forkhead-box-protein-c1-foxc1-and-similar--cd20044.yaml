identifier: CDD:cd20044
label: FH_FOXC1
definition: >-
  Forkhead (FH) domain found in Forkhead box protein C1 (FOXC1) and similar proteins. FOXC1, also called Forkhead-related protein FKHL7, or Forkhead-related transcription factor 3 (FREAC-3), is a DNA-binding transcriptional factor that plays a role in a broad range of cellular and developmental processes such as the development of the eyes, bones, cardiovascular system, kidneys, and skin. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'
