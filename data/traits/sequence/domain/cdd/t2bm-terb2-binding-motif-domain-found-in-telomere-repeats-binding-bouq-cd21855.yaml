identifier: CDD:cd21855
label: "T2BM (TERB2-binding motif) domain found in telomere repeats-binding bouquet formation protein 1 (TERB1) and similar proteins. TERB1, also called coiled-coil domain-containing protein 79 (CCDC79), is a meiosis-specific telomere associated protein involved in meiotic telomere attachment to the nucleus inner membrane, a crucial step for homologous pairing and synapsis. It is a component of the MAJIN-TERB1-TERB2 complex, which promotes telomere cap exchange by mediating attachment of telomeric DNA to the inner nuclear membrane and replacement of the protective cap of telomeric chromosomes: in early meiosis, the MAJIN-TERB1-TERB2 complex associates with telomeric DNA and the shelterin/telosome complex. During prophase, the complex matures and promotes release of the shelterin/telosome complex from telomeric DNA. In the MAJIN-TERB1-TERB2 complex, TERB1 probably mediates association with the shelterin/telosome complex via interaction with TERF1, promoting priming telomeric DNA attachment'. It promotes telomere association with the nuclear envelope and deposition of the SUN-KASH/LINC complex. It also recruits cohesin to telomeres to develop structural rigidity. The model corresponds to T2BM (TERB2-binding motif) domain of TERB1."
definition: >-
  T2BM (TERB2-binding motif) domain found in telomere repeats-binding bouquet formation protein 1 (TERB1) and similar proteins. TERB1, also called coiled-coil domain-containing protein 79 (CCDC79), is a meiosis-specific telomere associated protein involved in meiotic telomere attachment to the nucleus inner membrane, a crucial step for homologous pairing and synapsis. It is a component of the MAJIN-TERB1-TERB2 complex, which promotes telomere cap exchange by mediating attachment of telomeric DNA to the inner nuclear membrane and replacement of the protective cap of telomeric chromosomes: in early meiosis, the MAJIN-TERB1-TERB2 complex associates with telomeric DNA and the shelterin/telosome complex. During prophase, the complex matures and promotes release of the shelterin/telosome complex from telomeric DNA. In the MAJIN-TERB1-TERB2 complex, TERB1 probably mediates association with the shelterin/telosome complex via interaction with TERF1, promoting priming telomeric DNA attachment'. It promotes telomere association with the nuclear envelope and deposition of the SUN-KASH/LINC complex. It also recruits cohesin to telomeres to develop structural rigidity. The model corresponds to T2BM (TERB2-binding motif) domain of TERB1. — an NCBI CDD conserved domain (cd21855); members share this curated model.
