identifier: CDD:cd05087
label: "Catalytic domain of the Protein Tyrosine Kinases, Apoptosis-associated tyrosine kinase 1. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Aatyk1 (or simply Aatyk) is also called lemur tyrosine kinase 1 (Lmtk1). It is a cytoplasmic (or nonreceptor) kinase containing a long C-terminal region. The expression of Aatyk1  is upregulated during growth arrest and apoptosis in myeloid cells. Aatyk1 has been implicated in neural differentiation, and is a regulator of the Na-K-2Cl cotransporter, a membrane protein involved in cell proliferation and survival, epithelial transport, and blood pressure control. The Aatyk1 subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Protein Tyrosine Kinases, Apoptosis-associated tyrosine kinase 1. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Aatyk1 (or simply Aatyk) is also called lemur tyrosine kinase 1 (Lmtk1). It is a cytoplasmic (or nonreceptor) kinase containing a long C-terminal region. The expression of Aatyk1 is upregulated during growth arrest and apoptosis in myeloid cells. Aatyk1 has been implicated in neural differentiation, and is a regulator of the Na-K-2Cl cotransporter, a membrane protein involved in cell proliferation and survival, epithelial transport, and blood pressure control. The Aatyk1 subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05087); members share this curated model.
