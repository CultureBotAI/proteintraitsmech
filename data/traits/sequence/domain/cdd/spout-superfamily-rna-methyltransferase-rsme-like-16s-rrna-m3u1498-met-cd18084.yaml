identifier: CDD:cd18084
label: "SPOUT superfamily RNA methyltransferase RsmE-like. 16S rRNA m3U1498 methyltransferase RsmE modifies nucleotides during ribosomal RNA maturation in a site-specific manner. The Escherichia coli member is specific for U1498 methylation. RsmE is a member of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot."
definition: >-
  SPOUT superfamily RNA methyltransferase RsmE-like. 16S rRNA m3U1498 methyltransferase RsmE modifies nucleotides during ribosomal RNA maturation in a site-specific manner. The Escherichia coli member is specific for U1498 methylation. RsmE is a member of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot. — an NCBI CDD conserved domain (cd18084); members share this curated model.
