identifier: CDD:cd20759
label: "Cap-0 specific (nucleoside-2'-O-)-methyltransferase of phytoreovirus. Cap-0 specific (nucleoside-2'-O-)-methyltransferase (2'OMTase) catalyzes the methylation of Cap-0 (m7GpppNp) at the 2'-hydroxyl of the ribose of the first nucleotide, using S-adenosyl-L-methionine (AdoMet) as the methyl donor. This reaction is the fourth and last step in mRNA capping, the creation of the stabilizing five-prime cap (5' cap) on mRNA. Phytoreoviruses, which comprise a family of dsRNA viruses, cap their mRNAs. The 2'OMTase activity is located in the mRNA capping enzyme P5."
definition: >-
  Cap-0 specific (nucleoside-2'-O-)-methyltransferase of phytoreovirus. Cap-0 specific (nucleoside-2'-O-)-methyltransferase (2'OMTase) catalyzes the methylation of Cap-0 (m7GpppNp) at the 2'-hydroxyl of the ribose of the first nucleotide, using S-adenosyl-L-methionine (AdoMet) as the methyl donor. This reaction is the fourth and last step in mRNA capping, the creation of the stabilizing five-prime cap (5' cap) on mRNA. Phytoreoviruses, which comprise a family of dsRNA viruses, cap their mRNAs. The 2'OMTase activity is located in the mRNA capping enzyme P5. — an NCBI CDD conserved domain (cd20759); members share this curated model.
