identifier: CDD:cd07715
label: "MBL-fold metallo-hydrolase domain of Myxococcus xanthus TaR3 and related proteins; MBL-fold metallo-hydrolase domain. Myxococcus xanthus Tar3 may function as an ammonium regulator/effector protein involved in biosynthesis of the antibiotic TA. Some are members of this subgroup are annotated as ribonucleases. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions."
