identifier: CDD:cd17194
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in tyrosine-protein phosphatase non-receptor type 4 (PTPN4). PTPN4, also termed protein-tyrosine phosphatase MEG1 (MEG) or PTPase-MEG1, belongs to the non-transmembrane FERM-containing protein-tyrosine phosphatase (PTP) subfamily characterized by a conserved N-terminal FERM domain, a PDZ domain, and a C-terminal PTP catalytic domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). PTPN4 protects cells against apoptosis. It associates with the mitogen-activated protein kinase p38gamma (also known as MAPK12) to form a PTPN4-p38gamma complex that promotes cellular signaling, preventing cell death induction. It also inhibits tyrosine phosphorylation and subsequent cytoplasm translocation of TRIF-related adaptor molecule (TRAM, also known as TICAM2), resulting in the disturbance of TRAM-TRIF interaction. Moreover, PTPN4 negatively regulates cell proliferation and motility through dephosphorylation of CrkI."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in tyrosine-protein phosphatase non-receptor type 4 (PTPN4). PTPN4, also termed protein-tyrosine phosphatase MEG1 (MEG) or PTPase-MEG1, belongs to the non-transmembrane FERM-containing protein-tyrosine phosphatase (PTP) subfamily characterized by a conserved N-terminal FERM domain, a PDZ domain, and a C-terminal PTP catalytic domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). PTPN4 protects cells against apoptosis. It associates with the mitogen-activated protein kinase p38gamma (also known as MAPK12) to form a PTPN4-p38gamma complex that promotes cellular signaling, preventing cell death induction. It also inhibits tyrosine phosphorylation and subsequent cytoplasm translocation of TRIF-related adaptor molecule (TRAM, also known as TICAM2), resulting in the disturbance of TRAM-TRIF interaction. Moreover, PTPN4 negatively regulates cell proliferation and motility through dephosphorylation of CrkI. — an NCBI CDD conserved domain (cd17194); members share this curated model.
