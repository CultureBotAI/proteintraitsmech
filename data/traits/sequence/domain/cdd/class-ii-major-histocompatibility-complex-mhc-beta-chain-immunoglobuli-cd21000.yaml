identifier: CDD:cd21000
label: "Class II major histocompatibility complex (MHC) beta chain immunoglobulin domain of histocompatibility antigen (HLA) DR; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the Class II major histocompatibility complex (MHC) beta chain immunoglobulin domain of histocompatibility antigen (HLA) DR. HLA-DR is an MHC class II cell surface receptor encoded by the human leukocyte antigen complex on chromosome 6 region 6p21.31. HLA-DR is also involved in several autoimmune conditions, disease susceptibility, and disease resistance including seronegative-rheumatoid arthritis, penicillamine-induced myasthenia, schizophrenia, Goodpasture syndrome, systemic lupus erythematosus, Alzheimers, tuberculoid leprosy, and Hashimoto's thyroiditis. HLA-DR molecules are upregulated in response to signaling.  HLA-DR is an alphabeta heterodimer cell surface receptor, each subunit of which contains two extracellular domains, a membrane-spanning domain, and a cytoplasmic tail. Both alpha and beta chains are anchored in the membrane. The DR beta chain is encoded by 4 loci, however no more than 3 functional loci are present in a single individual, and no more than two on a single chromosome. Sometimes an individual may only possess 2 copies of the same locus, DRB1*. The HLA-DRB1 locus is ubiquitous and encodes a very large number of functionally variable gene products (HLA-DR1 to HLA-DR17). The HLA-DRB3 locus encodes the HLA-DR52 specificity, is moderately variable and is variably associated with certain HLA-DRB1 types. The HLA-DRB4 locus encodes the HLA-DR53 specificity, has some variation, and is associated with certain HLA-DRB1 types. The HLA-DRB5 locus encodes the HLA-DR51 specificity, which is typically invariable, and is linked to the HLA-DR2 types. Three genetically distinct isotypes of class II MHC molecules are found in humans (HLA-DR, HLA-DQ, and HLA-DP), and two in mice (I-E and I-A). MHC class II molecules play a key role in the initiation of the antigen-specific immune reponse. These molecules have been shown to be expressed constitutively on the cell surface of professional antigen-presenting cells (APCs), including B-lymphocytes, monocytes, and macrophages in both humans and mice. The expression of these molecules has been shown to be induced in nonprofessional APCs such as keratinocyctes, and they are expressed on the surface of activated human T cells and on T cells from other species. The MHC II molecules present antigenic peptides to CD4(+) T-lymphocytes. These peptides derive mostly from proteolytic processing via the endocytic pathway, of antigens internalized by the APC. These peptides bind to the MHC class II molecules in the endosome before they are transported to the cell surface. MHC class II molecules are heterodimers, comprised of two similarly-sized membrane-spanning chains, alpha and beta. Each chain had two globular domains (N- and C-terminal), and a membrane-anchoring transmembrane segment. The two chains form a compact four-domain structure. The peptide-binding site is a cleft in the structure."
definition: >-
  Class II major histocompatibility complex (MHC) beta chain immunoglobulin domain of histocompatibility antigen (HLA) DR; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the Class II major histocompatibility complex (MHC) beta chain immunoglobulin domain of histocompatibility antigen (HLA) DR. HLA-DR is an MHC class II cell surface receptor encoded by the human leukocyte antigen complex on chromosome 6 region 6p21.31. HLA-DR is also involved in several autoimmune conditions, disease susceptibility, and disease resistance including seronegative-rheumatoid arthritis, penicillamine-induced myasthenia, schizophrenia, Goodpasture syndrome, systemic lupus erythematosus, Alzheimers, tuberculoid leprosy, and Hashimoto's thyroiditis. HLA-DR molecules are upregulated in response to signaling. HLA-DR is an alphabeta heterodimer cell surface receptor, each subunit of which contains two extracellular domains, a membrane-spanning domain, and a cytoplasmic tail. Both alpha and beta chains are anchored in the membrane. The DR beta chain is encoded by 4 loci, however no more than 3 functional loci are present in a single individual, and no more than two on a single chromosome. Sometimes an individual may only possess 2 copies of the same locus, DRB1*. The HLA-DRB1 locus is ubiquitous and encodes a very large number of functionally variable gene products (HLA-DR1 to HLA-DR17). The HLA-DRB3 locus encodes the HLA-DR52 specificity, is moderately variable and is variably associated with certain HLA-DRB1 types. The HLA-DRB4 locus encodes the HLA-DR53 specificity, has some variation, and is associated with certain HLA-DRB1 types. The HLA-DRB5 locus encodes the HLA-DR51 specificity, which is typically invariable, and is linked to the HLA-DR2 types. Three genetically distinct isotypes of class II MHC molecules are found in humans (HLA-DR, HLA-DQ, and HLA-DP), and two in mice (I-E and I-A). MHC class II molecules play a key role in the initiation of the antigen-specific immune reponse. These molecules have been shown to be expressed constitutively on the cell surface of professional antigen-presenting cells (APCs), including B-lymphocytes, monocytes, and macrophages in both humans and mice. The expression of these molecules has been shown to be induced in nonprofessional APCs such as keratinocyctes, and they are expressed on the surface of activated human T cells and on T cells from other species. The MHC II molecules present antigenic peptides to CD4(+) T-lymphocytes. These peptides derive mostly from proteolytic processing via the endocytic pathway, of antigens internalized by the APC. These peptides bind to the MHC class II molecules in the endosome before they are transported to the cell surface. MHC class II molecules are heterodimers, comprised of two similarly-sized membrane-spanning chains, alpha and beta. Each chain had two globular domains (N- and C-terminal), and a membrane-anchoring transmembrane segment. The two chains form a compact four-domain structure. The peptide-binding site is a cleft in the structure. — an NCBI CDD conserved domain (cd21000); members share this curated model.
