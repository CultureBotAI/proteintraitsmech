identifier: CDD:cd19784
label: "B-box-type 2 zinc finger  found in tripartite motif-containing protein 44 (TRIM44) and similar proteins. TRIM44, also termed protein DIPB, functions as a critical regulator in tumor metastasis and progression. TRIM44 belongs to an unclassified TRIM (tripartite motif) family of proteins that do not have RING fingers and thus lack the characteristic tripartite (RING (R), B-box, and coiled coil (CC)) RBCC motif. It contains a Bbox2 domain. The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif."
definition: >-
  B-box-type 2 zinc finger found in tripartite motif-containing protein 44 (TRIM44) and similar proteins. TRIM44, also termed protein DIPB, functions as a critical regulator in tumor metastasis and progression. TRIM44 belongs to an unclassified TRIM (tripartite motif) family of proteins that do not have RING fingers and thus lack the characteristic tripartite (RING (R), B-box, and coiled coil (CC)) RBCC motif. It contains a Bbox2 domain. The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif. — an NCBI CDD conserved domain (cd19784); members share this curated model.
