identifier: CDD:cd23696
label: PsbW
definition: >-
  Chaetoceros gracilis photosystem II reaction center protein W (PsbW) and similar proteins. The centric diatom Chaetoceros gracilis photosystem II (PSII)- fucoxanthin (Fx) chlorophyll (Chl) a/c-binding protein (FCPII) supercomplex contains 35 protein subunits, as well as several pigments and cofactors. It catalyzes light-induced electron transfer and water-splitting reactions. PsbW is a component of the PSII core that contains 17 membrane-spanning subunits (D1, CP47, CP43, D2, PsbE, PsbF, PsbH, PsbI, PsbJ, PsbK, PsbL, PsbM, PsbT, PsbW, PsbX, ycf12, and PsbZ)
definition_source: NCBI CDD
trait_axis: SEQUENCE
trait_category: SEQ_DOMAIN
term_kind: CLASS
