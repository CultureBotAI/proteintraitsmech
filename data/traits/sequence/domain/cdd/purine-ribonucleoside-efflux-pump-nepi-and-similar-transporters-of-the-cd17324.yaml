identifier: CDD:cd17324
label: "Purine ribonucleoside efflux pump NepI and similar transporters of the Major Facilitator Superfamily. This family is composed of purine efflux pumps such as Escherichia coli NepI and Bacillus subtilis PbuE, sugar efflux transporters such as Corynebacterium glutamicum arabinose efflux permease, multidrug resistance (MDR) transporters such as Streptomyces lividans chloramphenicol resistance protein (CmlR), and similar proteins. NepI and PbuE are involved in the efflux of purine ribonucleosides such as guanosine, adenosine and inosine, as well as purine bases like guanine, adenine, and hypoxanthine, and purine base analogs. They play a role in the maintenance of cellular purine base pools, as well as in protecting the cells and conferring resistance against toxic purine base analogs such as 6-mercaptopurine. MDR transporters are drug/H+ antiporters (DHA) that mediate the efflux of a variety of drugs and toxic compounds, and confer resistance to these compounds. The NepI-like family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Purine ribonucleoside efflux pump NepI and similar transporters of the Major Facilitator Superfamily. This family is composed of purine efflux pumps such as Escherichia coli NepI and Bacillus subtilis PbuE, sugar efflux transporters such as Corynebacterium glutamicum arabinose efflux permease, multidrug resistance (MDR) transporters such as Streptomyces lividans chloramphenicol resistance protein (CmlR), and similar proteins. NepI and PbuE are involved in the efflux of purine ribonucleosides such as guanosine, adenosine and inosine, as well as purine bases like guanine, adenine, and hypoxanthine, and purine base analogs. They play a role in the maintenance of cellular purine base pools, as well as in protecting the cells and conferring resistance against toxic purine base analogs such as 6-mercaptopurine. MDR transporters are drug/H+ antiporters (DHA) that mediate the efflux of a variety of drugs and toxic compounds, and confer resistance to these compounds. The NepI-like family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17324); members share this curated model.
