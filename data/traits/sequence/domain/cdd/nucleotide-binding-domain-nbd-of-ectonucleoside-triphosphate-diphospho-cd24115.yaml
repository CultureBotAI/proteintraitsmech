identifier: CDD:cd24115
label: "nucleotide-binding domain (NBD) of ectonucleoside triphosphate diphosphohydrolase 6 (NTPDase6) and similar proteins. NTPDase6 (EC 3.6.1.6), also called CD39 antigen-like 2 (CD39L2), catalyzes the hydrolysis of nucleoside triphosphates and diphosphates in a calcium- or magnesium-dependent manner. It has a strong preference for nucleoside diphosphates, preferentially hydrolyzes GDP, IDP, and UDP, with slower hydrolysis of CDP, ITP, GTP, CTP, ADP, and UTP and virtually no hydrolysis of ATP. The membrane bound form might support glycosylation reactions in the Golgi apparatus and, when released from cells, might catalyze the hydrolysis of extracellular nucleotides."
definition: >-
  nucleotide-binding domain (NBD) of ectonucleoside triphosphate diphosphohydrolase 6 (NTPDase6) and similar proteins. NTPDase6 (EC 3.6.1.6), also called CD39 antigen-like 2 (CD39L2), catalyzes the hydrolysis of nucleoside triphosphates and diphosphates in a calcium- or magnesium-dependent manner. It has a strong preference for nucleoside diphosphates, preferentially hydrolyzes GDP, IDP, and UDP, with slower hydrolysis of CDP, ITP, GTP, CTP, ADP, and UTP and virtually no hydrolysis of ATP. The membrane bound form might support glycosylation reactions in the Golgi apparatus and, when released from cells, might catalyze the hydrolysis of extracellular nucleotides. — an NCBI CDD conserved domain (cd24115); members share this curated model.
