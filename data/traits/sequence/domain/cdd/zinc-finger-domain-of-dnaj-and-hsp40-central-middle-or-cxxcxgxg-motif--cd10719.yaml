identifier: CDD:cd10719
label: "Zinc finger domain of DnaJ and HSP40. Central/middle or CxxCxGxG-motif containing domain of DnaJ/Hsp40 (heat shock protein 40). DnaJ proteins are highly conserved and play crucial roles in protein translation, folding, unfolding, translocation, and degradation. They act primarily by stimulating the ATPase activity of Hsp70s, an important chaperonin family. Hsp40 proteins are characterized by the presence of an N-terminal J domain, which mediates the interaction with Hsp70. This central domain contains four repeats of a CxxCxGxG motif and binds to two Zinc ions. It has been implicated in substrate binding."
definition: >-
  Zinc finger domain of DnaJ and HSP40. Central/middle or CxxCxGxG-motif containing domain of DnaJ/Hsp40 (heat shock protein 40). DnaJ proteins are highly conserved and play crucial roles in protein translation, folding, unfolding, translocation, and degradation. They act primarily by stimulating the ATPase activity of Hsp70s, an important chaperonin family. Hsp40 proteins are characterized by the presence of an N-terminal J domain, which mediates the interaction with Hsp70. This central domain contains four repeats of a CxxCxGxG motif and binds to two Zinc ions. It has been implicated in substrate binding. — an NCBI CDD conserved domain (cd10719); members share this curated model.
