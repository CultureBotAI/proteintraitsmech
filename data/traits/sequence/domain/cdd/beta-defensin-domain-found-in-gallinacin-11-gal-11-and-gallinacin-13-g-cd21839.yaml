identifier: CDD:cd21839
label: "beta-defensin domain found in gallinacin-11 (Gal-11) and gallinacin-13 (Gal-13). The family includes the beta-defensin domains of gallinacin 11 (Gal-11) and Gal-13. Gal-11, also called beta-defensin 11, or vitelline membrane outer layer protein 2 or vitelline membrane outer layer protein II (VMO-II or VMOII), is an antimicrobial peptide found in chicken egg. It is one of four major proteins in vitelline membranes, along with ovomucin, lysozyme, and VMO-1. Gal-11 has bactericidal activity toward both Gram-positive and Gram-negative bacteria. It is a compact fold composed of 2 packed beta-defensin domains, with the beta-defensin#related motifs, CX6CX5CX9CX6CC and CX6CX6CX7CX6CC, respectively. Gal-13, also called beta-defensin 13, has bactericidal activity against Escherichia coli, Listeria monocytogenes, Salmonella typhimurium and Streptococcus pyogenes but not against Staphylococcus aureus. Gal-13 contains only one beta-defensin domain."
definition: >-
  beta-defensin domain found in gallinacin-11 (Gal-11) and gallinacin-13 (Gal-13). The family includes the beta-defensin domains of gallinacin 11 (Gal-11) and Gal-13. Gal-11, also called beta-defensin 11, or vitelline membrane outer layer protein 2 or vitelline membrane outer layer protein II (VMO-II or VMOII), is an antimicrobial peptide found in chicken egg. It is one of four major proteins in vitelline membranes, along with ovomucin, lysozyme, and VMO-1. Gal-11 has bactericidal activity toward both Gram-positive and Gram-negative bacteria. It is a compact fold composed of 2 packed beta-defensin domains, with the beta-defensin#related motifs, CX6CX5CX9CX6CC and CX6CX6CX7CX6CC, respectively. Gal-13, also called beta-defensin 13, has bactericidal activity against Escherichia coli, Listeria monocytogenes, Salmonella typhimurium and Streptococcus pyogenes but not against Staphylococcus aureus. Gal-13 contains only one beta-defensin domain. — an NCBI CDD conserved domain (cd21839); members share this curated model.
