identifier: CDD:cd22906
label: "histone-fold domain found in Dr1-associated protein 1 (DRAP1) and similar proteins. DRAP1, also called Dr1-associated corepressor or negative cofactor 2-alpha (NC2-alpha), acts as a corepressor for Dr1 (down-regulator of transcription 1)-mediated repression of transcription. It forms a heterodimer with Dr1. The association of the Dr1/DRAP1 heterodimer with TBP results in a functional repression of both activated and basal transcription of class II genes. DRAP1 can bind to DNA on its own. It also binds TATA-binding protein-associated factor 172 (BTAF1)."
definition: >-
  histone-fold domain found in Dr1-associated protein 1 (DRAP1) and similar proteins. DRAP1, also called Dr1-associated corepressor or negative cofactor 2-alpha (NC2-alpha), acts as a corepressor for Dr1 (down-regulator of transcription 1)-mediated repression of transcription. It forms a heterodimer with Dr1. The association of the Dr1/DRAP1 heterodimer with TBP results in a functional repression of both activated and basal transcription of class II genes. DRAP1 can bind to DNA on its own. It also binds TATA-binding protein-associated factor 172 (BTAF1). — an NCBI CDD conserved domain (cd22906); members share this curated model.
