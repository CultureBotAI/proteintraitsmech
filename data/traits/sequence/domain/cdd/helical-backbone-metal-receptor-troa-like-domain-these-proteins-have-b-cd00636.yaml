identifier: CDD:cd00636
label: "Helical backbone metal receptor (TroA-like domain). These proteins have been shown to function in the ABC transport of ferric siderophores and metal ions such as Mn2+, Fe3+, Cu2+ and/or Zn2+.  Their ligand binding site is formed in the interface between two globular domains linked by a single helix.  Many of these proteins also possess a low complexity region containing a metal-binding histidine-rich motif (repetitive HDH sequence).  The TroA-like proteins differ in their fold and ligand-binding mechanism from the PBPI and PBPII proteins, but are structurally similar, however, to the beta-subunit of the nitrogenase molybdenum-iron protein MoFe.   Most TroA-like proteins are encoded by ABC-type operons and appear to function as periplasmic components of ABC transporters in metal ion uptake."
definition: >-
  Helical backbone metal receptor (TroA-like domain). These proteins have been shown to function in the ABC transport of ferric siderophores and metal ions such as Mn2+, Fe3+, Cu2+ and/or Zn2+. Their ligand binding site is formed in the interface between two globular domains linked by a single helix. Many of these proteins also possess a low complexity region containing a metal-binding histidine-rich motif (repetitive HDH sequence). The TroA-like proteins differ in their fold and ligand-binding mechanism from the PBPI and PBPII proteins, but are structurally similar, however, to the beta-subunit of the nitrogenase molybdenum-iron protein MoFe. Most TroA-like proteins are encoded by ABC-type operons and appear to function as periplasmic components of ABC transporters in metal ion uptake. — an NCBI CDD conserved domain (cd00636); members share this curated model.
