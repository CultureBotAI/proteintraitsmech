identifier: CDD:cd18920
label: "basic helix-loop-helix-orange (bHLH-O) domain found in hairy/enhancer-of-split related with YRPW motif protein 2 (HEY2) and similar proteins. HEY2, also termed cardiovascular helix-loop-helix factor 1 (CHF-1), or Class B basic helix-loop-helix protein 32 (bHLHb32), or HES-related repressor protein 2, or hairy and enhancer of split-related protein 2 (HESR-2), or hairy-related transcription factor 2 (HRT-2), or protein gridlock homolog, is a bHLH-O transcriptional repressor expressed preferentially in the developing and adult cardiovascular system. As a downstream effector of Notch signaling, HEY2 may be required for cardiovascular development.  It also plays an important role in neurologic development, as well as in the progression of human cancers."
definition: >-
  basic helix-loop-helix-orange (bHLH-O) domain found in hairy/enhancer-of-split related with YRPW motif protein 2 (HEY2) and similar proteins. HEY2, also termed cardiovascular helix-loop-helix factor 1 (CHF-1), or Class B basic helix-loop-helix protein 32 (bHLHb32), or HES-related repressor protein 2, or hairy and enhancer of split-related protein 2 (HESR-2), or hairy-related transcription factor 2 (HRT-2), or protein gridlock homolog, is a bHLH-O transcriptional repressor expressed preferentially in the developing and adult cardiovascular system. As a downstream effector of Notch signaling, HEY2 may be required for cardiovascular development. It also plays an important role in neurologic development, as well as in the progression of human cancers. — an NCBI CDD conserved domain (cd18920); members share this curated model.
