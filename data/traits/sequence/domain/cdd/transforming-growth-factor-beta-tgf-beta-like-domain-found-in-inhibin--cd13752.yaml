identifier: CDD:cd13752
label: TGF_beta_INHB
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in inhibin beta A chain (INHBA), B chain (INHBB), C chain (INHBC), E chain (INHBE) and similar proteins. The family includes inhibin beta A chain (INHBA), B chain (INHBB), C chain (INHBC), and E chain (INHBE). INHBA, also termed activin beta-A chain, or erythroid differentiation protein (EDF), is a component of inhibin A, activin A, or activin AB. Inhibins and activins inhibit and activate, respectively, the secretion of follitropin by the pituitary gland. INHBB, also termed activin beta-B chain, is a component of inhibin B, activin A, or activin AB. Inhibins and activins inhibit and activate, respectively, the secretion of follitropin by the pituitary gland. INHBC, also termed activin beta-C chain, might play important roles in carcinogenesis. It may function as a negative regulator of liver growth. INHBE, also termed activin beta-E chain, is a possible insulin resistance-associated hepatokine with hepatic gene expression that positively correlated with insulin resistance and body mass index in humans. It also acts as a possible new marker for drug-induced endoplasmic reticulum stress
