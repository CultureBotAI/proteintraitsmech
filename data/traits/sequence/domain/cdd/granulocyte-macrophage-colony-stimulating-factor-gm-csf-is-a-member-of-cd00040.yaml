label: "Granulocyte Macrophage Colony Stimulating Factor (GM-CSF) is a member of the large family of polypeptide growth factors called cytokines. It stimulates a wide variety of hematopoietic and nonhematopoietic cell types via binding to members of the cytokine receptor family, mainly the GM-CSF receptor."
