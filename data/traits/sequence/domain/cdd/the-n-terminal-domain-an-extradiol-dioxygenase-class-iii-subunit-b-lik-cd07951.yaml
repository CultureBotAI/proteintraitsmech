identifier: CDD:cd07951
label: "The N-terminal domain, an extradiol dioxygenase class III subunit B-like domain, of unknown proteins containing a C-terminal AMMECR1 domain. This subfamily is composed of uncharacterized proteins containing an N-terminal domain with similarity to the catalytic B subunit of class III extradiol dioxygenases and a C-terminal AMMECR1-like domain. This model represents the N-terminal domain. Class III extradiol dioxygenases use a non-heme Fe(II) to cleave aromatic rings between a hydroxylated carbon and an adjacent non-hydroxylated carbon, however, proteins in this subfamily do not contain a potential metal binding site and may not exhibit class III extradiol dioxygenase-like activity. The AMMECR1 protein was proposed to be a regulatory factor that is potentially involved in the development of AMME contiguous gene deletion syndrome."
definition: >-
  The N-terminal domain, an extradiol dioxygenase class III subunit B-like domain, of unknown proteins containing a C-terminal AMMECR1 domain. This subfamily is composed of uncharacterized proteins containing an N-terminal domain with similarity to the catalytic B subunit of class III extradiol dioxygenases and a C-terminal AMMECR1-like domain. This model represents the N-terminal domain. Class III extradiol dioxygenases use a non-heme Fe(II) to cleave aromatic rings between a hydroxylated carbon and an adjacent non-hydroxylated carbon, however, proteins in this subfamily do not contain a potential metal binding site and may not exhibit class III extradiol dioxygenase-like activity. The AMMECR1 protein was proposed to be a regulatory factor that is potentially involved in the development of AMME contiguous gene deletion syndrome. — an NCBI CDD conserved domain (cd07951); members share this curated model.
