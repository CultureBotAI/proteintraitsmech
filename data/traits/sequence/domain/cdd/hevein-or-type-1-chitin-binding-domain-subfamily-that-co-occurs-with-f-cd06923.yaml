identifier: CDD:cd06923
label: "Hevein or Type 1 chitin binding domain subfamily that co-occurs with family 16 glycosyl hydrolases. This subfamily includes Saccharomyces cerevisiae Utr2p, also known as Crh2p, which participates in the cross-linking of chitin to beta(1-3)- and beta(1-6) glucan in the cell wall,  and S. cerevisiae Crr1p, a putative transglycosidase which is needed for proper spore wall assembly. ChtBD1 is a lectin domain found in proteins from plants and fungi that bind N-acetylglucosamine, plant endochitinases, wound-induced proteins, and the alpha subunit of Kluyveromyces lactis killer toxin. This domain is involved in the recognition and/or binding of chitin subunits; it typically occurs N-terminal to glycosyl hydrolase domains in chitinases, together with other carbohydrate-binding domains, or by itself in tandem-repeat arrangements."
definition: >-
  Hevein or Type 1 chitin binding domain subfamily that co-occurs with family 16 glycosyl hydrolases. This subfamily includes Saccharomyces cerevisiae Utr2p, also known as Crh2p, which participates in the cross-linking of chitin to beta(1-3)- and beta(1-6) glucan in the cell wall, and S. cerevisiae Crr1p, a putative transglycosidase which is needed for proper spore wall assembly. ChtBD1 is a lectin domain found in proteins from plants and fungi that bind N-acetylglucosamine, plant endochitinases, wound-induced proteins, and the alpha subunit of Kluyveromyces lactis killer toxin. This domain is involved in the recognition and/or binding of chitin subunits; it typically occurs N-terminal to glycosyl hydrolase domains in chitinases, together with other carbohydrate-binding domains, or by itself in tandem-repeat arrangements. — an NCBI CDD conserved domain (cd06923); members share this curated model.
