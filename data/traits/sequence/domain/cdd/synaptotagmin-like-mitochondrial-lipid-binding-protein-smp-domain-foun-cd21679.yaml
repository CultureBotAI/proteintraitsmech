identifier: CDD:cd21679
label: "synaptotagmin-like mitochondrial-lipid-binding protein (SMP) domain found in extended synaptotagmin-1 (E-Syt1) and similar proteins. Extended synaptotagmin-1 (E-Syt1), also called membrane-bound C2 domain-containing protein (MBC2), binds glycerophospholipids in a barrel-like domain and may play a role in cellular lipid transport. It also binds calcium via the C2 domains and translocates to sites of contact between the endoplasmic reticulum and the cell membrane in response to increased cytosolic calcium levels. E-Syt1 tethers the endoplasmic reticulum to the cell membrane and promotes the formation of appositions between the endoplasmic reticulum and the cell membrane. E-Syt1 consists of an N-terminal endoplasmic reticulum (ER)-membrane anchor, a central SMP-domain, and five C-terminal cytoplasmic C2-domains. The ER-membrane anchor and C2 domains are required for tethering, and the SMP domain may be implicated in lipid transport. This model corresponds to the SMP domain."
definition: >-
  synaptotagmin-like mitochondrial-lipid-binding protein (SMP) domain found in extended synaptotagmin-1 (E-Syt1) and similar proteins. Extended synaptotagmin-1 (E-Syt1), also called membrane-bound C2 domain-containing protein (MBC2), binds glycerophospholipids in a barrel-like domain and may play a role in cellular lipid transport. It also binds calcium via the C2 domains and translocates to sites of contact between the endoplasmic reticulum and the cell membrane in response to increased cytosolic calcium levels. E-Syt1 tethers the endoplasmic reticulum to the cell membrane and promotes the formation of appositions between the endoplasmic reticulum and the cell membrane. E-Syt1 consists of an N-terminal endoplasmic reticulum (ER)-membrane anchor, a central SMP-domain, and five C-terminal cytoplasmic C2-domains. The ER-membrane anchor and C2 domains are required for tethering, and the SMP domain may be implicated in lipid transport. This model corresponds to the SMP domain. — an NCBI CDD conserved domain (cd21679); members share this curated model.
