identifier: CDD:cd16680
label: "RING finger, H2 subclass, found in RING finger protein 44 (RNF44) and similar proteins. RNF44 is an uncharacterized RING finger protein that shows high sequence similarity with RNF38, which is a nuclear E3 ubiquitin protein ligase that plays a role in regulating p53. RNF44 contains a coiled-coil motif, a KIL motif (Lys-X2-Ile/Leu-X2-Ile/Leu, X can be any amino acid), and a C3H2C2-type RING-H2 finger."
definition: >-
  RING finger, H2 subclass, found in RING finger protein 44 (RNF44) and similar proteins. RNF44 is an uncharacterized RING finger protein that shows high sequence similarity with RNF38, which is a nuclear E3 ubiquitin protein ligase that plays a role in regulating p53. RNF44 contains a coiled-coil motif, a KIL motif (Lys-X2-Ile/Leu-X2-Ile/Leu, X can be any amino acid), and a C3H2C2-type RING-H2 finger. — an NCBI CDD conserved domain (cd16680); members share this curated model.
