identifier: CDD:cd19281
label: AdoMet_MTases_MTr2
definition: >-
  Cap-specific mRNA (nucleoside-2'-O-)-methyltransferase 2. Cap-specific mRNA (nucleoside-2'-O-)-methyltransferase 2 methylates the ribose of the second nucleotide of a m(7)GpppG-capped mRNA to produce m(7)GpppRmpNm (cap2),an important steps in the creation of stable and mature messenger RNA . It is also capable of methylating capped small nuclear RNA (snRNA). It recognizes a guanosine cap on RNA independently of its N(7) methylation status
