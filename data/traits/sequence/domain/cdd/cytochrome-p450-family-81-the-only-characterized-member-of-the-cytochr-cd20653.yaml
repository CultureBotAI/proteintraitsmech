identifier: CDD:cd20653
label: "cytochrome P450 family 81. The only characterized member of the cytochrome P450 family 81 (CYP81 or Cyp81) is CYP81E1, also called isoflavone 2'-hydroxylase, that catalyzes the hydroxylation of isoflavones, daidzein, and formononetin, to yield 2'-hydroxyisoflavones, 2'-hydroxydaidzein, and 2'-hydroxyformononetin, respectively. It is involved in the biosynthesis of isoflavonoid-derived antimicrobial compounds of legumes. CYP81 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
