identifier: CDD:cd02706
label: GH42_galactosidase_N
definition: >-
  GH42_galactosidase_N. Beta-galactosidase-like enzyme, N-terminal glycosyl hydrolase family 42 (GH42) TIM barrel catalytic domain. Beta-galactosidases are found in four carbohydrate-active enzymes (CAZY) families, GH1, GH2, GH35 and GH42, all of which belong to Clan GH-A. Enzymes from this clan use a two-step, double-displacement mechanism in which a covalent glycosyl-enzyme intermediate is formed and hydrolyzed via an oxocarbenium ion-like transition state. The active site contains two key residues, the catalytic nucleophile, which attacks the sugar anomeric center and becomes covalently attached to the galactosyl moiety, and the acid/base residue which protonates the departing aglycone oxygen in the first step and deprotonates the attacking water molecule in the second step. Some GH42 beta-galactosidases are thought to degrade a pectic plant polysachharide called arabinogalactan hydrolase, type I. GH42 beta-galactosidases, such as YesZ and LacA, form homotrimers with an active site on each subunit that is located inside a large central tunnel
