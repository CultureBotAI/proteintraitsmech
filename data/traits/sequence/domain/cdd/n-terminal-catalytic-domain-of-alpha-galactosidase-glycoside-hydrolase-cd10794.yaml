identifier: CDD:cd10794
label: "N-terminal catalytic domain of alpha-galactosidase; glycoside hydrolase family 57 (GH57). Alpha-galactosidases (GalA, EC 3.2.1.22) catalyze the hydrolysis of alpha-1,6-linked galactose residues from oligosaccharides and polymeric galactomannans. Based on sequence similarity, the majority of eukaryotic and bacterial GalAs have been classified into glycoside hydrolase family GH27, GH36, and GH4, respectively. This subfamily is represented by a novel type of GalA from Pyrococcus furiosus (PfGalA), which belongs to the GH57 family. PfGalA is an extremely thermo-active and thermostable GalA that functions as a bacterial-like GalA, however, without the capacity to hydrolyze polysaccharides. It specifically catalyzes the hydrolysis of para-nitrophenyl-alpha-galactopyranoside, and to some extent that of melibiose and raffinose. PfGalA has a pH optimum between 5.0-5.5."
definition: >-
  N-terminal catalytic domain of alpha-galactosidase; glycoside hydrolase family 57 (GH57). Alpha-galactosidases (GalA, EC 3.2.1.22) catalyze the hydrolysis of alpha-1,6-linked galactose residues from oligosaccharides and polymeric galactomannans. Based on sequence similarity, the majority of eukaryotic and bacterial GalAs have been classified into glycoside hydrolase family GH27, GH36, and GH4, respectively. This subfamily is represented by a novel type of GalA from Pyrococcus furiosus (PfGalA), which belongs to the GH57 family. PfGalA is an extremely thermo-active and thermostable GalA that functions as a bacterial-like GalA, however, without the capacity to hydrolyze polysaccharides. It specifically catalyzes the hydrolysis of para-nitrophenyl-alpha-galactopyranoside, and to some extent that of melibiose and raffinose. PfGalA has a pH optimum between 5.0-5.5. — an NCBI CDD conserved domain (cd10794); members share this curated model.
