identifier: CDD:cd23136
label: "RING finger, HC subclass, found in Saccharomyces cerevisiae ubiquitin ligase for SUMO conjugates protein 1 (ULS1) and similar proteins. ULS1, also called role in silencing protein 1, is an ATP-dependent helicase involved in mating type switching and in silencing interference through its interaction with the silencing regulator SIR4. It cooperates with UBC4 and UBC5 to mediate ubiquitination of SUMO conjugates. ULS1 contains a typical C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in Saccharomyces cerevisiae ubiquitin ligase for SUMO conjugates protein 1 (ULS1) and similar proteins. ULS1, also called role in silencing protein 1, is an ATP-dependent helicase involved in mating type switching and in silencing interference through its interaction with the silencing regulator SIR4. It cooperates with UBC4 and UBC5 to mediate ubiquitination of SUMO conjugates. ULS1 contains a typical C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd23136); members share this curated model.
