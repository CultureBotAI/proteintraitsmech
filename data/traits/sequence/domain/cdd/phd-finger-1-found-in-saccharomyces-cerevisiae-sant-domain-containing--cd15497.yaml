identifier: CDD:cd15497
label: "PHD finger 1 found in Saccharomyces cerevisiae SANT domain-containing protein 2 (Snt2p) and similar proteins. Snt2p is a yeast protein that may function in multiple stress pathways. It coordinates the transcriptional response to hydrogen peroxide-mediated oxidative stress through interaction with Ecm5 and the Rpd3 deacetylase. Snt2p contains a bromo adjacent homology (BAH) domain, two canonical Cys4HisCys3 plant homeodomain (PHD) fingers, a non-canonical extended PHD (ePHD) finger, Cys2HisCys5HisCys2His, and a SANT (SWI3, ADA2, N-CoR and TFIIIB) DNA-binding domain; this model corresponds to the first canonical Cys4HisCys3 PHD finger."
definition: >-
  PHD finger 1 found in Saccharomyces cerevisiae SANT domain-containing protein 2 (Snt2p) and similar proteins. Snt2p is a yeast protein that may function in multiple stress pathways. It coordinates the transcriptional response to hydrogen peroxide-mediated oxidative stress through interaction with Ecm5 and the Rpd3 deacetylase. Snt2p contains a bromo adjacent homology (BAH) domain, two canonical Cys4HisCys3 plant homeodomain (PHD) fingers, a non-canonical extended PHD (ePHD) finger, Cys2HisCys5HisCys2His, and a SANT (SWI3, ADA2, N-CoR and TFIIIB) DNA-binding domain; this model corresponds to the first canonical Cys4HisCys3 PHD finger. — an NCBI CDD conserved domain (cd15497); members share this curated model.
