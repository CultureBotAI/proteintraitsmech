label: "SPRY domain 2 (SPRY2) of ryanodine receptor (RyR). This SPRY domain (SPRY2) is the second of three structural repeats in all three isoforms of the ryanodine receptor (RyR), which are the major Ca2+ release channels in the membranes of sarcoplasmic reticulum (SR). There are three RyR genes in mammals; the skeletal RyR1, the cardiac RyR2 and the brain RyR3. The three SPRY domains are located in the N-terminal part of the cytoplasmic region of the RyRs, The SPRY2 domain has been shown to bind to the dihydropryidine receptor (DHPR) II-III loop and the ASI region of RyR1"
definition: >-
  SPRY domain 2 (SPRY2) of ryanodine receptor (RyR). This SPRY domain (SPRY2) is the second of three structural repeats in all three isoforms of the ryanodine receptor (RyR), which are the major Ca2+ release channels in the membranes of sarcoplasmic reticulum (SR). There are three RyR genes in mammals; the skeletal RyR1, the cardiac RyR2 and the brain RyR3. The three SPRY domains are located in the N-terminal part of the cytoplasmic region of the RyRs, The SPRY2 domain has been shown to bind to the dihydropryidine receptor (DHPR) II-III loop and the ASI region of RyR1 — an NCBI CDD conserved domain (cd12878); members share this curated model.
