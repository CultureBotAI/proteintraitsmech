identifier: CDD:cd23425
label: "ricin B-type lectin domain, beta-trefoil fold, found in alpha-galactosidase A (AglA) and similar proteins. AglA (EC 3.2.1.22), also called melibiase A, hydrolyzes a variety of simple alpha-D-galactosides as well as more complex molecules such as oligosaccharides and polysaccharides. It belongs to the glycosyl hydrolase 27 (GH27) family. AglA contains an N-terminal GH27 catalytic domain, an alpha galactosidase C-terminal beta sandwich domain in the middle region, and a carbohydrate-binding domain at the C-terminus. The carbohydrate-binding domain is also known as a ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may contain a potential sugar-binding pocket."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in alpha-galactosidase A (AglA) and similar proteins. AglA (EC 3.2.1.22), also called melibiase A, hydrolyzes a variety of simple alpha-D-galactosides as well as more complex molecules such as oligosaccharides and polysaccharides. It belongs to the glycosyl hydrolase 27 (GH27) family. AglA contains an N-terminal GH27 catalytic domain, an alpha galactosidase C-terminal beta sandwich domain in the middle region, and a carbohydrate-binding domain at the C-terminus. The carbohydrate-binding domain is also known as a ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may contain a potential sugar-binding pocket. — an NCBI CDD conserved domain (cd23425); members share this curated model.
