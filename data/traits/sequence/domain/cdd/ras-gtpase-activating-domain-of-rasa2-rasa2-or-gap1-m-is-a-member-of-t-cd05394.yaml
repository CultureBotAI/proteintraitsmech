identifier: CDD:cd05394
label: "Ras-GTPase Activating Domain of RASA2. RASA2 (or GAP1(m)) is a member of the GAP1 family of Ras GTPase-activating proteins that includes GAP1_IP4BP (or RASA3), CAPRI, and RASAL. In vitro, RASA2 has been shown to bind inositol 1,3,4,5-tetrakisphosphate (IP4), the water soluble inositol head group of the lipid second messenger phosphatidylinositol 3,4,5-trisphosphate (PIP3). In vivo studies also demonstrated that RASA2 binds PIP3, and it is recruited to the plasma membrane following agonist stimulation of PI 3-kinase. Furthermore, the membrane translocation is a consequence of the ability of its pleckstrin homology (PH) domain to bind PIP3."
definition: >-
