identifier: CDD:cd06090
label: "KOW motif of eukaryotic Ribosomal Protein L27. RPL27e has a KOW motif at its N terminal. KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4."
definition: >-
  KOW motif of eukaryotic Ribosomal Protein L27. RPL27e has a KOW motif at its N terminal. KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4. — an NCBI CDD conserved domain (cd06090); members share this curated model.
