identifier: CDD:cd23539
label: "extracellular domain (ECD) found in Ciona intestinalis globin CinHb4 and similar proteins. Four distinct globin genes have been identified in the Ciona genome. CinHb4 is encoded by the fourth globin gene. It shows an unusual extension at its N-terminus, which reveals a conserved region with similarity to the extracellular domain (ECD) of the TGF-beta receptor type I/II protein family involved in signal transduction. The functional relevance of these matches is currently unknown. The ECD belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in Ciona intestinalis globin CinHb4 and similar proteins. Four distinct globin genes have been identified in the Ciona genome. CinHb4 is encoded by the fourth globin gene. It shows an unusual extension at its N-terminus, which reveals a conserved region with similarity to the extracellular domain (ECD) of the TGF-beta receptor type I/II protein family involved in signal transduction. The functional relevance of these matches is currently unknown. The ECD belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23539); members share this curated model.
