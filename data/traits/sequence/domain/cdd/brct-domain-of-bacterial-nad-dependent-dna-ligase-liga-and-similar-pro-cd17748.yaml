identifier: CDD:cd17748
label: "BRCT domain of bacterial NAD-dependent DNA ligase (LigA) and similar proteins. LigA, also called NAD(+)-dependent polydeoxyribonucleotide synthase, catalyzes the formation of phosphodiester linkages between 5'-phosphoryl and 3'-hydroxyl groups in double-stranded DNA using NAD as a coenzyme and as the energy source for the reaction. It is essential for DNA replication and repair of damaged DNA. The Trp-X-X-X-Cys/Ser signature motif of the BRCT family is not conserved in this family."
definition: >-
  BRCT domain of bacterial NAD-dependent DNA ligase (LigA) and similar proteins. LigA, also called NAD(+)-dependent polydeoxyribonucleotide synthase, catalyzes the formation of phosphodiester linkages between 5'-phosphoryl and 3'-hydroxyl groups in double-stranded DNA using NAD as a coenzyme and as the energy source for the reaction. It is essential for DNA replication and repair of damaged DNA. The Trp-X-X-X-Cys/Ser signature motif of the BRCT family is not conserved in this family. — an NCBI CDD conserved domain (cd17748); members share this curated model.
