identifier: CDD:cd21942
label: "LGN tetratricopeptide repeat-binding domain found in FERM and PDZ domain-containing protein 1. FERM and PDZ domain-containing protein 1 (FRMPD1), also called FERM domain-containing protein 2 (FRMD2), stabilizes membrane-bound GPSM1, and thereby promotes its interaction with GNAI1. It also acts as a regulatory binding partner of Activator of G-protein Signaling 3 (AGS3). This model corresponds to a conserved region in FRMPD1 that binds to tetratricopeptide (TPR) repeats present in the N-terminal domain of adaptor protein LGN. LGN plays a crucial role in mitotic spindle orientation and cell polarization via interaction with multiple targets including FRMPD1."
definition: >-
  LGN tetratricopeptide repeat-binding domain found in FERM and PDZ domain-containing protein 1. FERM and PDZ domain-containing protein 1 (FRMPD1), also called FERM domain-containing protein 2 (FRMD2), stabilizes membrane-bound GPSM1, and thereby promotes its interaction with GNAI1. It also acts as a regulatory binding partner of Activator of G-protein Signaling 3 (AGS3). This model corresponds to a conserved region in FRMPD1 that binds to tetratricopeptide (TPR) repeats present in the N-terminal domain of adaptor protein LGN. LGN plays a crucial role in mitotic spindle orientation and cell polarization via interaction with multiple targets including FRMPD1. — an NCBI CDD conserved domain (cd21942); members share this curated model.
