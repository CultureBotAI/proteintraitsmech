identifier: CDD:cd23709
label: "C-terminal domain of Spinacia oleracea chloroplastic PSRP5, and similar proteins. In spinach chlororibosome, four plastid-specific ribosomal proteins (PSRPs), PSRP1-4, were found to be associated with the small subunit (SSU) and two (PSRP5 and PSRP6) with the large subunit (LSU). PSRP5, also known as cL37, together with PSRP3 (cS23) and PSRP4 (bTHXc), is essential for plastid translation activity. This model corresponds to PSRP5 C-terminal domain, which consists of a short C-terminal alpha-helix connected by a linker to a long central alpha-helix. It is responsible for the binding of ribosomal RNA (rRNA)."
definition: >-
  C-terminal domain of Spinacia oleracea chloroplastic PSRP5, and similar proteins. In spinach chlororibosome, four plastid-specific ribosomal proteins (PSRPs), PSRP1-4, were found to be associated with the small subunit (SSU) and two (PSRP5 and PSRP6) with the large subunit (LSU). PSRP5, also known as cL37, together with PSRP3 (cS23) and PSRP4 (bTHXc), is essential for plastid translation activity. This model corresponds to PSRP5 C-terminal domain, which consists of a short C-terminal alpha-helix connected by a linker to a long central alpha-helix. It is responsible for the binding of ribosomal RNA (rRNA). — an NCBI CDD conserved domain (cd23709); members share this curated model.
