identifier: CDD:cd07437
label: "Polymerase and Histidinol Phosphatase domain of Ycdx like. PHP Ycdx-like is a stand alone PHP domain similar to Ycdx E. coli protein with an unknown physiological role. The PHP (also called histidinol phosphatase-2/HIS2) domain is associated with several types of DNA polymerases, such as PolIIIA and family X DNA polymerases, stand alone histidinol phosphate phosphatases (HisPPases), and a number of uncharacterized protein families. The PHP domain has four conserved sequence motifs and contains an invariant histidine that is involved in metal ion coordination. It has also been shown that the PHP domain functions in DNA repair. The PHP structures have a distorted (beta/alpha)7 barrel fold with a trinuclear metal site on the C-terminal side of the barrel. YcdX may be involved in swarming."
definition: >-
  Polymerase and Histidinol Phosphatase domain of Ycdx like. PHP Ycdx-like is a stand alone PHP domain similar to Ycdx E. coli protein with an unknown physiological role. The PHP (also called histidinol phosphatase-2/HIS2) domain is associated with several types of DNA polymerases, such as PolIIIA and family X DNA polymerases, stand alone histidinol phosphate phosphatases (HisPPases), and a number of uncharacterized protein families. The PHP domain has four conserved sequence motifs and contains an invariant histidine that is involved in metal ion coordination. It has also been shown that the PHP domain functions in DNA repair. The PHP structures have a distorted (beta/alpha)7 barrel fold with a trinuclear metal site on the C-terminal side of the barrel. YcdX may be involved in swarming. — an NCBI CDD conserved domain (cd07437); members share this curated model.
