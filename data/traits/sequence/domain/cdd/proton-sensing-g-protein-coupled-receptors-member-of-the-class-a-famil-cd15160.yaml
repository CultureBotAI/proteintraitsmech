identifier: CDD:cd15160
label: "proton-sensing G protein-coupled receptors, member of the class A family of seven-transmembrane G protein-coupled receptors. Proton/pH-sensing G-protein coupled receptors sense pH of 7.6 to 6.0.  They mediate a variety of biological activities in neutral and mildly acidic pH conditions, whereas the acid-sensing ionotropic ion channels typically sense strong acidic pH. The proton/pH-sensing receptor family includes the G2 accumulation receptor (G2A, also known as GPR132), the T cell death associated gene-8 (TDAG8, GPR65) receptor, ovarian cancer G-protein receptor 1 (OGR-1, GPR68), and G-protein-coupled receptor 4 (GPR4)."
definition: >-
  proton-sensing G protein-coupled receptors, member of the class A family of seven-transmembrane G protein-coupled receptors. Proton/pH-sensing G-protein coupled receptors sense pH of 7.6 to 6.0. They mediate a variety of biological activities in neutral and mildly acidic pH conditions, whereas the acid-sensing ionotropic ion channels typically sense strong acidic pH. The proton/pH-sensing receptor family includes the G2 accumulation receptor (G2A, also known as GPR132), the T cell death associated gene-8 (TDAG8, GPR65) receptor, ovarian cancer G-protein receptor 1 (OGR-1, GPR68), and G-protein-coupled receptor 4 (GPR4). — an NCBI CDD conserved domain (cd15160); members share this curated model.
