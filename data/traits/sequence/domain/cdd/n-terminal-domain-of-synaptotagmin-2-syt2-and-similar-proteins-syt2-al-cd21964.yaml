identifier: CDD:cd21964
label: "N-terminal domain of synaptotagmin-2 (Syt2) and similar proteins. Syt2, also called synaptotagmin II (SytII), exhibits calcium-dependent phospholipid and inositol polyphosphate binding properties. It may have a regulatory role in the membrane interactions during trafficking of synaptic vesicles at the active zone of the synapse. It plays a role in dendrite formation by melanocytes. The model corresponds to N-terminal domain of Syt2, which is a recognition domain responsible for the binding of botulinum neurotoxin B (BoNT B)."
definition: >-
  N-terminal domain of synaptotagmin-2 (Syt2) and similar proteins. Syt2, also called synaptotagmin II (SytII), exhibits calcium-dependent phospholipid and inositol polyphosphate binding properties. It may have a regulatory role in the membrane interactions during trafficking of synaptic vesicles at the active zone of the synapse. It plays a role in dendrite formation by melanocytes. The model corresponds to N-terminal domain of Syt2, which is a recognition domain responsible for the binding of botulinum neurotoxin B (BoNT B). — an NCBI CDD conserved domain (cd21964); members share this curated model.
