identifier: CDD:cd02579
label: "Ribosomal small subunit protein S18, eukaryote. Eukaryotic ribosome is formed by the small 40S and large 60S subunits. The 40S subunit is composed of 18S rRNA and approximately 30 proteins. This domain represents the small subunit uS13 (S18) of the eukaryotic ribosome.  The small ribosomal subunit and large ribosomal subunit are connected by intersubunit bridges. In eukaryotes uS13 (S18) and uS19 interact with one aother and uL5 to participate in the intersubunit bridges."
definition: >-
  Ribosomal small subunit protein S18, eukaryote. Eukaryotic ribosome is formed by the small 40S and large 60S subunits. The 40S subunit is composed of 18S rRNA and approximately 30 proteins. This domain represents the small subunit uS13 (S18) of the eukaryotic ribosome. The small ribosomal subunit and large ribosomal subunit are connected by intersubunit bridges. In eukaryotes uS13 (S18) and uS19 interact with one aother and uL5 to participate in the intersubunit bridges. — an NCBI CDD conserved domain (cd02579); members share this curated model.
