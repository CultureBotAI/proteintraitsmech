identifier: CDD:cd20020
label: "Forkhead (FH) domain found in the Forkhead box protein F (FOXF) subfamily. The FOXF subfamily includes two winged helix transcription factors, FOXF1 and FOXF2, both of which are probable transcription activators for a number of lung-specific genes. FOXF1 mutations in sporadic and familial cases of alveolar capillary dysplasia with misaligned pulmonary veins (ACD/MPV) suggest its involvement in ACD/MPV and lung organogenesis. FOXF2 is involved in programming organogenesis and regulating epithelial-to-mesenchymal transition (EMT) and cell proliferation. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in the Forkhead box protein F (FOXF) subfamily. The FOXF subfamily includes two winged helix transcription factors, FOXF1 and FOXF2, both of which are probable transcription activators for a number of lung-specific genes. FOXF1 mutations in sporadic and familial cases of alveolar capillary dysplasia with misaligned pulmonary veins (ACD/MPV) suggest its involvement in ACD/MPV and lung organogenesis. FOXF2 is involved in programming organogenesis and regulating epithelial-to-mesenchymal transition (EMT) and cell proliferation. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20020); members share this curated model.
