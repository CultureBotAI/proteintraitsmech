identifier: CDD:cd23380
label: "soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Populus sp. wound-responsive protein GWIN3 and similar proteins. GWIN3 may play a role in wound response. It shows high sequence similarity with sweet potato sporamins and legume Kunitz trypsin inhibitors. It remains unclear if GWIN3 is a trypsin inhibitor, but proteinase inhibitor function would be consistent with its wound-regulated behavior. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Populus sp. wound-responsive protein GWIN3 and similar proteins. GWIN3 may play a role in wound response. It shows high sequence similarity with sweet potato sporamins and legume Kunitz trypsin inhibitors. It remains unclear if GWIN3 is a trypsin inhibitor, but proteinase inhibitor function would be consistent with its wound-regulated behavior. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23380); members share this curated model.
