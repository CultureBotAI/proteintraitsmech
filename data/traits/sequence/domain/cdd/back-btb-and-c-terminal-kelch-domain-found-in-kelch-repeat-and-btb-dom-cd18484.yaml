identifier: CDD:cd18484
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch repeat and BTB domain-containing protein 11 (KBTBD11). KBTBD11, also termed chronic myelogenous leukemia-associated protein (CMLAP), or Kelch domain-containing protein 7B, or KLHDC7C, is a BTB-Kelch family protein. Its function remains unclear. A novel polymorphism rs11777210 in KBTBD11 is significantly associated with colorectal cancer risk; KBTBD11 may function as a tumor suppressor. KBTBD11 hypomethylation may also be a potential target for differentiating between the mostly fatal TCF3-HLF and curable TCF3-PBX1 pediatric acute lymphoblastic leukemia subtypes."
definition: >-
