identifier: CDD:cd18552
label: "Six-transmembrane helical domain of the bacterial ABC lipid flippase MsbA and similar proteins. The bacterial lipid flippase MsbA is found in Gram-negative bacteria and transports lipid A and lipopolysaccharide (LPS) from the cytoplasmic leaflet to the periplasmic leaflet of the inner membrane. MsbA is also a polyspecific transporter capable of transporting a broad spectrum of drug molecules. Additionally, MsbA exhibits significant sequence similarity to mammalian multidrug resistance (MDR) proteins such as human MDR protein 1 (MDR1) and LmrA from Lactococcus lactis. This subgroup also contains a putative transporter Brevibacillus brevis TycD; the location of the tycD gene within the Tyc (tyrocidine) biosynthesis operon suggests that TycD may play a role in the secretion of the cyclic decapeptide antibiotic tyrocidine. This transmembrane (TM) subunit possesses the ATP-binding cassette (ABC) exporter fold, which is characterized by 6 TM helices per subunit (domain), or a total of 12 TM helices for the complete transporter. The ABC exporters are found in both prokaryotes and eukaryotes, where they mediate the cellular secretion of toxic compounds, a various type of lipids and polypeptides. ABC transporters typically consist of two transmembrane domains (TMDs) and two nucleotide-binding domains (NBDs). The sequences and structures of the TMDs are quite varied between the different type of transporters, suggesting significant structural diversity of the translocated substrates, while NBDs are conserved among all ABC transporters. The two NBDs together bind and hydrolyze ATP, thereby providing the driving force for transport, while the TMDs participate in substrate recognition and translocation across the lipid membrane by alternating between inward- and outward-facing conformations. Moreover, some ABC genes are organized as half-transporters, which must form either homodimers or heterodimers to form a functional transporter. The ABC exporters play a role in multidrug resistance to antibiotics and anticancer agents, and mutations in these proteins have been shown to cause severe human diseases such as cystic fibrosis."
definition: >-
  Six-transmembrane helical domain of the bacterial ABC lipid flippase MsbA and similar proteins. The bacterial lipid flippase MsbA is found in Gram-negative bacteria and transports lipid A and lipopolysaccharide (LPS) from the cytoplasmic leaflet to the periplasmic leaflet of the inner membrane. MsbA is also a polyspecific transporter capable of transporting a broad spectrum of drug molecules. Additionally, MsbA exhibits significant sequence similarity to mammalian multidrug resistance (MDR) proteins such as human MDR protein 1 (MDR1) and LmrA from Lactococcus lactis. This subgroup also contains a putative transporter Brevibacillus brevis TycD; the location of the tycD gene within the Tyc (tyrocidine) biosynthesis operon suggests that TycD may play a role in the secretion of the cyclic decapeptide antibiotic tyrocidine. This transmembrane (TM) subunit possesses the ATP-binding cassette (ABC) exporter fold, which is characterized by 6 TM helices per subunit (domain), or a total of 12 TM helices for the complete transporter. The ABC exporters are found in both prokaryotes and eukaryotes, where they mediate the cellular secretion of toxic compounds, a various type of lipids and polypeptides. ABC transporters typically consist of two transmembrane domains (TMDs) and two nucleotide-binding domains (NBDs). The sequences and structures of the TMDs are quite varied between the different type of transporters, suggesting significant structural diversity of the translocated substrates, while NBDs are conserved among all ABC transporters. The two NBDs together bind and hydrolyze ATP, thereby providing the driving force for transport, while the TMDs participate in substrate recognition and translocation across the lipid membrane by alternating between inward- and outward-facing conformations. Moreover, some ABC genes are organized as half-transporters, which must form either homodimers or heterodimers to form a functional transporter. The ABC exporters play a role in multidrug resistance to antibiotics and anticancer agents, and mutations in these proteins have been shown to cause severe human diseases such as cystic fibrosis. — an NCBI CDD conserved domain (cd18552); members share this curated model.
