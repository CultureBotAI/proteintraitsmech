identifier: CDD:cd11241
label: "The Sema domain, a protein interacting module, of semaphorin 5 (Sema5). Class 5 semaphorins are transmembrane glycoproteins characterized by unique thrombospondin specific repeats in the extracellular region of the protein. There are three subfamilies in class 5 semaphorins, namely 5A, 5B and 5C. Sema5A and Sema5B function as guidance cues for optic and corticofugal nerve development, respectively. Sema5A-induced cell migration requires Met signaling. Sema5C is an early development gene and may play a role in odor-guided behavior. Sema5A is also implicated in cancer. In a screening model for metastasis, the Drosophila Sema5A ortholog, Dsema-5C, has been found to be required in tumorigenicity and metastasis. Sema5A is highly expressed in human pancreatic cancer cells and is associated with tumor growth, invasion and metastasis. Semaphorins are regulatory molecules involved in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues.  It serves as a receptor-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of semaphorin 5 (Sema5). Class 5 semaphorins are transmembrane glycoproteins characterized by unique thrombospondin specific repeats in the extracellular region of the protein. There are three subfamilies in class 5 semaphorins, namely 5A, 5B and 5C. Sema5A and Sema5B function as guidance cues for optic and corticofugal nerve development, respectively. Sema5A-induced cell migration requires Met signaling. Sema5C is an early development gene and may play a role in odor-guided behavior. Sema5A is also implicated in cancer. In a screening model for metastasis, the Drosophila Sema5A ortholog, Dsema-5C, has been found to be required in tumorigenicity and metastasis. Sema5A is highly expressed in human pancreatic cancer cells and is associated with tumor growth, invasion and metastasis. Semaphorins are regulatory molecules involved in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module. — an NCBI CDD conserved domain (cd11241); members share this curated model.
