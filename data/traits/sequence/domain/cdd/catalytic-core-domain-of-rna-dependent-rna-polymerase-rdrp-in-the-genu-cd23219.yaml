identifier: CDD:cd23219
label: "catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the genus Kunsagivirus of positive-sense single-stranded RNA [(+)ssRNA] viruses, within the family Picornaviridae. This group contains the catalytic core domain of the RdRp of RNA viruses belonging to the Kunsagivirus genus within the family Picornaviridae, order Picornavirales. The Kunsagivirus contains viruses with (+)ssRNA genomes that produce nonenveloped virions. Kunsagivirus is a new picornavirus genus containing a three species. Viral RNA of kunsagivirus A1 was detected in feces of an apparently healthy European roller (Coracias garrulus), of kunsagivirus B1 (bat kunsagivirus) in feces of the fruit bat Eidolon helvum, and of kunsagivirus C1 (bakunsavirus) in wild baboons (Papio cynocephalus). RdRps catalyze RNA template-dependent formation of phosphodiester bonds between ribonucleotides in the presence of divalent metal ions. The initiation of synthesis occurs at the 3'-end of the template in a VPg-dependent manner, and proceeds in the direction of 5'-3'. The active sites of RdRps are highly conserved in different species of picornaviruses. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
definition: >-
  catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the genus Kunsagivirus of positive-sense single-stranded RNA [(+)ssRNA] viruses, within the family Picornaviridae. This group contains the catalytic core domain of the RdRp of RNA viruses belonging to the Kunsagivirus genus within the family Picornaviridae, order Picornavirales. The Kunsagivirus contains viruses with (+)ssRNA genomes that produce nonenveloped virions. Kunsagivirus is a new picornavirus genus containing a three species. Viral RNA of kunsagivirus A1 was detected in feces of an apparently healthy European roller (Coracias garrulus), of kunsagivirus B1 (bat kunsagivirus) in feces of the fruit bat Eidolon helvum, and of kunsagivirus C1 (bakunsavirus) in wild baboons (Papio cynocephalus). RdRps catalyze RNA template-dependent formation of phosphodiester bonds between ribonucleotides in the presence of divalent metal ions. The initiation of synthesis occurs at the 3'-end of the template in a VPg-dependent manner, and proceeds in the direction of 5'-3'. The active sites of RdRps are highly conserved in different species of picornaviruses. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides. — an NCBI CDD conserved domain (cd23219); members share this curated model.
