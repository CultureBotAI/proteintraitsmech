identifier: CDD:cd05827
label: "Sortase domain found in class C sortases. Class C sortases are membrane-bound cysteine transpeptidases broadly distributed in Gram-positive bacteria (mainly present in Firmicutes and Actinobacteria). They function as pilin polymerases responsible for the assembly of pili, which are multi-subunit hair-like fibres that extend from the cell surface to promote microbial adhesion and biofilm formation. First, one or more class C sortases form the long thin shaft of the pilus through linking together pilin subunits via isopeptide bonds. The base of the pilus is then anchored to the cell wall by a housekeeping sortase or, in some cases, the class C sortase itself. Depending upon the organism both the number and type of sortase enzymes involved varies, and in some cases, accessory factors appear to be needed. In three-component spaA pilus from Corynebacterium diphtheriae, the prototypical class C sortase (named Cd-SrtA) catalyzes polymerization of the SpaA-type pilus, consisting of the shaft pilin SpaA, tip pilin SpaC and minor pilin SpaB. The pilus shaft is then attached to the cell wall by a housekeeping class E sortase, Cd-SrtF. In the absence of Cd-SrtF, Cd-SrtA attaches the pilus to the cell wall, albeit at a reduced rate. Cd-SrtA can recognize two distinct sorting signals (LPLTG in SpaA and SpaC, and LAFTG in SpaB) and it can employ lysine residues that originate from different proteins (either Lys190 within the pilin motif of SpaA or Lys139 in SpaB). However, Cd-SrtA cannot be able to polymerize the major pilin subunit SpaH, even though it contains LPLTG motif. In two-component pili of prototypical Bacillus cereus, the class C sortase (named Bc-SrtD) cleaves related sorting signals within a major pilin protein BcpA (LPVTG) and a minor tip pilin BcpB (IPNTG), and catalyzes a transpeptidation that joins the threonine residues in each signal to the side-chain of Lys162 in BcpA (located within a pilin motif). Unlike the SpaA pilus in C. diphtheriae, in B. cereus Bc-SrtD is unable to covalently attach the pilus to the cell wall without the help of the housekeeping sortase."
definition: >-
  Sortase domain found in class C sortases. Class C sortases are membrane-bound cysteine transpeptidases broadly distributed in Gram-positive bacteria (mainly present in Firmicutes and Actinobacteria). They function as pilin polymerases responsible for the assembly of pili, which are multi-subunit hair-like fibres that extend from the cell surface to promote microbial adhesion and biofilm formation. First, one or more class C sortases form the long thin shaft of the pilus through linking together pilin subunits via isopeptide bonds. The base of the pilus is then anchored to the cell wall by a housekeeping sortase or, in some cases, the class C sortase itself. Depending upon the organism both the number and type of sortase enzymes involved varies, and in some cases, accessory factors appear to be needed. In three-component spaA pilus from Corynebacterium diphtheriae, the prototypical class C sortase (named Cd-SrtA) catalyzes polymerization of the SpaA-type pilus, consisting of the shaft pilin SpaA, tip pilin SpaC and minor pilin SpaB. The pilus shaft is then attached to the cell wall by a housekeeping class E sortase, Cd-SrtF. In the absence of Cd-SrtF, Cd-SrtA attaches the pilus to the cell wall, albeit at a reduced rate. Cd-SrtA can recognize two distinct sorting signals (LPLTG in SpaA and SpaC, and LAFTG in SpaB) and it can employ lysine residues that originate from different proteins (either Lys190 within the pilin motif of SpaA or Lys139 in SpaB). However, Cd-SrtA cannot be able to polymerize the major pilin subunit SpaH, even though it contains LPLTG motif. In two-component pili of prototypical Bacillus cereus, the class C sortase (named Bc-SrtD) cleaves related sorting signals within a major pilin protein BcpA (LPVTG) and a minor tip pilin BcpB (IPNTG), and catalyzes a transpeptidation that joins the threonine residues in each signal to the side-chain of Lys162 in BcpA (located within a pilin motif). Unlike the SpaA pilus in C. diphtheriae, in B. cereus Bc-SrtD is unable to covalently attach the pilus to the cell wall without the help of the housekeeping sortase. — an NCBI CDD conserved domain (cd05827); members share this curated model.
