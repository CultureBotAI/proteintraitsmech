identifier: CDD:cd18274
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch repeat and BTB domain-containing protein 8 (KBTBD8). KBTBD8, also called T-cell activation kelch repeat protein (TA-KRP), is a BTB-kelch family protein that is located in the Golgi apparatus and translocates to the spindle apparatus during mitosis. It acts as a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex that acts as a regulator of neural crest specification. The BCR(KBTBD8) complex monoubiquitylates NOLC1 and its paralog TCOF1, the mutation of which underlies the neurocristopathy Treacher Collins syndrome. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch repeat and BTB domain-containing protein 8 (KBTBD8). KBTBD8, also called T-cell activation kelch repeat protein (TA-KRP), is a BTB-kelch family protein that is located in the Golgi apparatus and translocates to the spindle apparatus during mitosis. It acts as a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex that acts as a regulator of neural crest specification. The BCR(KBTBD8) complex monoubiquitylates NOLC1 and its paralog TCOF1, the mutation of which underlies the neurocristopathy Treacher Collins syndrome. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18274); members share this curated model.
