identifier: CDD:cd18533
label: "fungal protein tyrosine phosphatases. This subfamily contains Saccharomyces cerevisiae protein-tyrosine phosphatases 1 (PTP1) and 2 (PTP2), Schizosaccharomyces pombe PTP1, PTP2, and PTP3, and similar fungal proteins. PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides; they regulate phosphotyrosine levels in signal transduction pathways. PTP2, together with PTP3, is the major phosphatase that dephosphorylates and inactivates the MAP kinase HOG1 and also modulates its subcellular localization."
definition: >-
  fungal protein tyrosine phosphatases. This subfamily contains Saccharomyces cerevisiae protein-tyrosine phosphatases 1 (PTP1) and 2 (PTP2), Schizosaccharomyces pombe PTP1, PTP2, and PTP3, and similar fungal proteins. PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides; they regulate phosphotyrosine levels in signal transduction pathways. PTP2, together with PTP3, is the major phosphatase that dephosphorylates and inactivates the MAP kinase HOG1 and also modulates its subcellular localization. — an NCBI CDD conserved domain (cd18533); members share this curated model.
