identifier: CDD:cd10344
label: "Src homology 2 domain found in Src-like adaptor proteins. SLAP belongs to the subfamily of adapter proteins that negatively regulate cellular signaling initiated by tyrosine kinases. It has a myristylated N-terminus, SH3 and SH2 domains with high homology to Src family tyrosine kinases, and a unique C-terminal tail, which is important for c-Cbl binding. SLAP negatively regulates platelet-derived growth factor (PDGF)-induced mitogenesis in fibroblasts and regulates F-actin assembly for dorsal ruffles formation. c-Cbl mediated SLAP inhibition towards actin remodeling. Moreover, SLAP enhanced PDGF-induced c-Cbl phosphorylation by SFK. In contrast, SLAP mitogenic inhibition was not mediated by c-Cbl, but it rather involved a competitive mechanism with SFK for PDGF-receptor (PDGFR) association and mitogenic signaling. Accordingly, phosphorylation of the Src mitogenic substrates Stat3 and Shc were reduced by SLAP. Thus, we concluded that SLAP regulates PDGFR signaling by two independent mechanisms: a competitive mechanism for PDGF-induced Src mitogenic signaling and a non-competitive mechanism for dorsal ruffles formation mediated by c-Cbl. SLAP is a hematopoietic adaptor containing Src homology (SH)3 and SH2 motifs and a unique carboxy terminus. Unlike c-Src, SLAP lacks a tyrosine kinase domain. Unlike c-Src, SLAP does not impact resorptive function of mature osteoclasts but induces their early apoptosis. SLAP negatively regulates differentiation of osteoclasts and proliferation of their precursors. Conversely, SLAP decreases osteoclast death by inhibiting activation of caspase 3. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 domain found in Src-like adaptor proteins. SLAP belongs to the subfamily of adapter proteins that negatively regulate cellular signaling initiated by tyrosine kinases. It has a myristylated N-terminus, SH3 and SH2 domains with high homology to Src family tyrosine kinases, and a unique C-terminal tail, which is important for c-Cbl binding. SLAP negatively regulates platelet-derived growth factor (PDGF)-induced mitogenesis in fibroblasts and regulates F-actin assembly for dorsal ruffles formation. c-Cbl mediated SLAP inhibition towards actin remodeling. Moreover, SLAP enhanced PDGF-induced c-Cbl phosphorylation by SFK. In contrast, SLAP mitogenic inhibition was not mediated by c-Cbl, but it rather involved a competitive mechanism with SFK for PDGF-receptor (PDGFR) association and mitogenic signaling. Accordingly, phosphorylation of the Src mitogenic substrates Stat3 and Shc were reduced by SLAP. Thus, we concluded that SLAP regulates PDGFR signaling by two independent mechanisms: a competitive mechanism for PDGF-induced Src mitogenic signaling and a non-competitive mechanism for dorsal ruffles formation mediated by c-Cbl. SLAP is a hematopoietic adaptor containing Src homology (SH)3 and SH2 motifs and a unique carboxy terminus. Unlike c-Src, SLAP lacks a tyrosine kinase domain. Unlike c-Src, SLAP does not impact resorptive function of mature osteoclasts but induces their early apoptosis. SLAP negatively regulates differentiation of osteoclasts and proliferation of their precursors. Conversely, SLAP decreases osteoclast death by inhibiting activation of caspase 3. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10344); members share this curated model.
