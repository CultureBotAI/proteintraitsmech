identifier: CDD:cd02414
label: KH-II_Jag
definition: >-
  type II K-homology (KH) RNA-binding domain found in protein Jag and similar proteins. Protein Jag, also called SpoIIIJ-associated protein, is associated with SpoIIIJ and is necessary for the third stage of sporulation. Members of this family are mainly from bacteria and contain only one canonical type II K-homology (KH) domain that has the signature motif GXXG (where X represents any amino acid)
