identifier: CDD:cd05632
label: "Catalytic domain of the Serine/Threonine Kinase, G protein-coupled Receptor Kinase 5. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. GRK5 is widely expressed in many tissues. It associates with the membrane though an N-terminal PIP2 binding domain and also binds phospholipids via its C-terminus. GRK5 deficiency is associated with early Alzheimer's disease in humans and mouse models. GRK5 also plays a crucial role in the pathogenesis of sporadic Parkinson's disease. It participates in the regulation and desensitization of PDGFRbeta, a receptor tyrosine kinase involved in a variety of downstream cellular effects including cell growth, chemotaxis, apoptosis, and angiogenesis. GRK5 also regulates Toll-like receptor 4, which is involved in innate and adaptive immunity. GRKs phosphorylate and regulate G protein-coupled receptors (GPCRs), the largest superfamily of cell surface receptors which regulate some part of nearly all physiological functions. Phosphorylated GPCRs bind to arrestins, which prevents further G protein signaling despite the presence of activating ligand. The GRK5 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, G protein-coupled Receptor Kinase 5. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. GRK5 is widely expressed in many tissues. It associates with the membrane though an N-terminal PIP2 binding domain and also binds phospholipids via its C-terminus. GRK5 deficiency is associated with early Alzheimer's disease in humans and mouse models. GRK5 also plays a crucial role in the pathogenesis of sporadic Parkinson's disease. It participates in the regulation and desensitization of PDGFRbeta, a receptor tyrosine kinase involved in a variety of downstream cellular effects including cell growth, chemotaxis, apoptosis, and angiogenesis. GRK5 also regulates Toll-like receptor 4, which is involved in innate and adaptive immunity. GRKs phosphorylate and regulate G protein-coupled receptors (GPCRs), the largest superfamily of cell surface receptors which regulate some part of nearly all physiological functions. Phosphorylated GPCRs bind to arrestins, which prevents further G protein signaling despite the presence of activating ligand. The GRK5 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05632); members share this curated model.
