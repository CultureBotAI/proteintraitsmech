identifier: CDD:cd01809
label: "ubiquitin-like (Ubl) domain found in BCL2-associated athanogene 6 (BAG6) and similar proteins. BAG6, also termed large proline-rich protein BAG6, or BAG family molecular chaperone regulator 6, or HLA-B-associated transcript 3 (Bat3), or protein Scythe, or protein G3, is a nucleo-cytoplasmic shuttling chaperone protein that is highly conserved in eukaryotes. It functions in two distinct biological pathways, ubiquitin-mediated protein degradation of defective polypeptides and tail-anchored transmembrane protein biogenesis in mammals. BAG6 is a component of the heterotrimeric BAG6 sortase complex composed of BAG6, transmembrane recognition complex 35 (TRC35) and ubiquitin-like protein 4A (UBL4A). The BAG6 complex together with the cochaperone small, glutamine-rich, tetratricopeptide repeat-containing, protein alpha (SGTA) plays a role in the biogenesis of tail-anchored membrane proteins and subsequently shown to regulate the ubiquitination and proteasomal degradation of mislocalized proteins. Moreover, BAG6 acts as an apoptotic regulator that binds reaper, a potent apoptotic inducer. BAG6/reaper is thought to signal apoptosis, in part through regulating the folding and activity of apoptotic signaling molecules. It is also likely a key regulator of the molecular chaperone Heat Shock Protein A2 (HSPA2) stability/function in human germ cells. Furthermore, aspartyl protease-mediated cleavage of BAG6 is necessary for autophagy and fungal resistance in plants. BAG6 contains a ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold, which provides a platform for discriminating substrates with shorter hydrophobicity stretches as a signal for defective proteins."
