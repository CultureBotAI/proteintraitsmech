identifier: CDD:cd22316
label: "nicking endonuclease Nt.BspD6I and similar endonucleases. Heterodimeric type II restriction endonuclease nicking endonuclease BspD6I recognizes a pseudosymmetric DNA sequence (5'-GAGTC) and cuts both strands outside the recognition motif 4 nucleotides downstream. It forms the large subunit in a heterodimeric arrangement. This catalytic domain/subunit belongs to a superfamily of PDDEXK nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
