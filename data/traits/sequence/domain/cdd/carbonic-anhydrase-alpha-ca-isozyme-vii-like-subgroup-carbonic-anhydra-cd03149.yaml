identifier: CDD:cd03149
label: "Carbonic anhydrase alpha, CA isozyme VII_like subgroup.  Carbonic anhydrases (CAs) are zinc-containing enzymes that catalyze the reversible hydration of carbon dioxide in a two-step mechanism: a nucleophilic attack of a zinc-bound hydroxide ion on carbon dioxide, followed by the regeneration of the active site by ionization of the zinc-bound water molecule and removal of a proton from the active site. They are ubiquitous enzymes involved in fundamental processes like photosynthesis, respiration, pH homeostasis and ion transport. Most alpha CAs are monomeric enzymes. The zinc ion is complexed by three histidines. This vertebrate subgroup comprises isozyme VII. CA VII is the most active cytosolic enzyme after CA II, and may be highly expressed in the brain. Human CA VII may be a target of antiepileptic sulfonamides/sulfamates."
definition: >-
  Carbonic anhydrase alpha, CA isozyme VII_like subgroup. Carbonic anhydrases (CAs) are zinc-containing enzymes that catalyze the reversible hydration of carbon dioxide in a two-step mechanism: a nucleophilic attack of a zinc-bound hydroxide ion on carbon dioxide, followed by the regeneration of the active site by ionization of the zinc-bound water molecule and removal of a proton from the active site. They are ubiquitous enzymes involved in fundamental processes like photosynthesis, respiration, pH homeostasis and ion transport. Most alpha CAs are monomeric enzymes. The zinc ion is complexed by three histidines. This vertebrate subgroup comprises isozyme VII. CA VII is the most active cytosolic enzyme after CA II, and may be highly expressed in the brain. Human CA VII may be a target of antiepileptic sulfonamides/sulfamates. — an NCBI CDD conserved domain (cd03149); members share this curated model.
