identifier: CDD:cd23618
label: "extracellular domain (ECD) found in Drosophila melanogaster Wishful thinking (Wit) and similar proteins. Wit is the Drosophila homolog to the mammalian bone morphogenetic protein (BMP) type II receptor, BMPRII. It is essential for nervous system development in Drosophila. It is necessary for BMP signaling and required for eggshell patterning. Wit contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in Drosophila melanogaster Wishful thinking (Wit) and similar proteins. Wit is the Drosophila homolog to the mammalian bone morphogenetic protein (BMP) type II receptor, BMPRII. It is essential for nervous system development in Drosophila. It is necessary for BMP signaling and required for eggshell patterning. Wit contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23618); members share this curated model.
