identifier: CDD:cd18248
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like ECH-associated protein 1 (KEAP1). KEAP1, also called cytosolic inhibitor of Nrf2 (INrf2) or Kelch-like protein 19 (KLHL19), is a redox-regulated substrate adaptor protein for a Cullin3-dependent ubiquitin ligase complex that targets NFE2L2/NRF2 for ubiquitination and degradation by the proteasome, thus resulting in the suppression of its transcriptional activity and the repression of antioxidant response element-mediated detoxifying enzyme gene expression. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like ECH-associated protein 1 (KEAP1). KEAP1, also called cytosolic inhibitor of Nrf2 (INrf2) or Kelch-like protein 19 (KLHL19), is a redox-regulated substrate adaptor protein for a Cullin3-dependent ubiquitin ligase complex that targets NFE2L2/NRF2 for ubiquitination and degradation by the proteasome, thus resulting in the suppression of its transcriptional activity and the repression of antioxidant response element-mediated detoxifying enzyme gene expression. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18248); members share this curated model.
