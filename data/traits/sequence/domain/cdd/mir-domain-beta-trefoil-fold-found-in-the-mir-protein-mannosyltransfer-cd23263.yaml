identifier: CDD:cd23263
label: "MIR domain, beta-trefoil fold, found in the MIR (protein mannosyltransferase, IP3R and RyR) superfamily. The MIR superfamily includes dolichyl-phosphate-mannose-protein mannosyltransferases (PMTs), inositol 1,4,5-trisphosphate receptors (ITPRs/IP3R), ryanodine receptors (RyRs), and stromal cell-derived factor 2 (SDF-2)-like proteins. They all contain a MIR domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The MIR domain may have a ligand transferase function."
definition: >-
  MIR domain, beta-trefoil fold, found in the MIR (protein mannosyltransferase, IP3R and RyR) superfamily. The MIR superfamily includes dolichyl-phosphate-mannose-protein mannosyltransferases (PMTs), inositol 1,4,5-trisphosphate receptors (ITPRs/IP3R), ryanodine receptors (RyRs), and stromal cell-derived factor 2 (SDF-2)-like proteins. They all contain a MIR domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The MIR domain may have a ligand transferase function. — an NCBI CDD conserved domain (cd23263); members share this curated model.
