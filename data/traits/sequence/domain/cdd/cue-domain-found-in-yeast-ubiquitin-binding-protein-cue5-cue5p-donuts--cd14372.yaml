identifier: CDD:cd14372
label: "CUE domain found in yeast ubiquitin-binding protein CUE5 (Cue5p), donuts protein 1 (DON1p) and similar proteins. Cue5p, also called coupling of ubiquitin conjugation to ER degradation protein 5, is encoded by the open reading frame (ORF) Yor042. It contains a CUE domain which exhibits weak ubiquitin binding properties. Donuts protein 1 (DON1p) is encoded by the ORF YDR273w. It localizes specifically to the prospore membrane and is expressed exclusively during meiosis. DON1p may function as a unique marker to investigate the defects associated with the impaired function of the meiotic plaque in the mpc- mutants."
definition: >-
  CUE domain found in yeast ubiquitin-binding protein CUE5 (Cue5p), donuts protein 1 (DON1p) and similar proteins. Cue5p, also called coupling of ubiquitin conjugation to ER degradation protein 5, is encoded by the open reading frame (ORF) Yor042. It contains a CUE domain which exhibits weak ubiquitin binding properties. Donuts protein 1 (DON1p) is encoded by the ORF YDR273w. It localizes specifically to the prospore membrane and is expressed exclusively during meiosis. DON1p may function as a unique marker to investigate the defects associated with the impaired function of the meiotic plaque in the mpc- mutants. — an NCBI CDD conserved domain (cd14372); members share this curated model.
