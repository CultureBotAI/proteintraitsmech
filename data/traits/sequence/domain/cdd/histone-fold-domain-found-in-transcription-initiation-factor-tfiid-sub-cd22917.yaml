identifier: CDD:cd22917
label: "histone-fold domain found in transcription initiation factor TFIID subunit 6 (TAF6) and similar proteins. This subfamily includes TAF6 and TAF6-like RNA polymerase II p300/CBP-associated factor-associated factor 65 kDa subunit 6L (TAF6L). TAF6, also called TATA Binding Protein (TBP) associated factor 6, RNA polymerase II TBP-associated factor subunit E, transcription initiation factor TFIID 70 kDa subunit (TAF(II)70, TAFII-70, TAFII70), or transcription initiation factor TFIID 80 kDa subunit, (TAF(II)80, TAFII-80, TAFII80), is a TBP-associated factor (TAF). TAFs are components of the transcription factor IID (TFIID) complex, PCAF histone acetylase complex, and TBP-free TAFII complex (TFTC). TIIFD is a multimeric protein complex that plays a central role in mediating promoter responses to various activators and repressors. TFIID and PCAF are composed of TATA binding protein (TBP) and several TAFs. TBP is not part of TFTC. TAF6L, also called PCAF-associated factor 65-alpha (PAF65-alpha), is a component of the PCAF complex, which can efficiently acetylate histones in a nucleosomal context. The PCAF complex is composed of several TAFs and PCAF-associated factors (PAFs). It might be the human version of the yeast SAGA complex. With TAF5L, TAF6L acts as an epigenetic regulator essential for somatic reprogramming. It also regulates target genes through H3K9ac deposition and MYC recruitment, which trigger the MYC regulatory network to orchestrate gene expression programs to control embryonic stem cell state."
definition: >-
  histone-fold domain found in transcription initiation factor TFIID subunit 6 (TAF6) and similar proteins. This subfamily includes TAF6 and TAF6-like RNA polymerase II p300/CBP-associated factor-associated factor 65 kDa subunit 6L (TAF6L). TAF6, also called TATA Binding Protein (TBP) associated factor 6, RNA polymerase II TBP-associated factor subunit E, transcription initiation factor TFIID 70 kDa subunit (TAF(II)70, TAFII-70, TAFII70), or transcription initiation factor TFIID 80 kDa subunit, (TAF(II)80, TAFII-80, TAFII80), is a TBP-associated factor (TAF). TAFs are components of the transcription factor IID (TFIID) complex, PCAF histone acetylase complex, and TBP-free TAFII complex (TFTC). TIIFD is a multimeric protein complex that plays a central role in mediating promoter responses to various activators and repressors. TFIID and PCAF are composed of TATA binding protein (TBP) and several TAFs. TBP is not part of TFTC. TAF6L, also called PCAF-associated factor 65-alpha (PAF65-alpha), is a component of the PCAF complex, which can efficiently acetylate histones in a nucleosomal context. The PCAF complex is composed of several TAFs and PCAF-associated factors (PAFs). It might be the human version of the yeast SAGA complex. With TAF5L, TAF6L acts as an epigenetic regulator essential for somatic reprogramming. It also regulates target genes through H3K9ac deposition and MYC recruitment, which trigger the MYC regulatory network to orchestrate gene expression programs to control embryonic stem cell state. — an NCBI CDD conserved domain (cd22917); members share this curated model.
