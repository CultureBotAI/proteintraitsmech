identifier: CDD:cd02138
label: "nitroreductase similar to Burkholderia pseudomallei TdsD. A subfamily of the nitroreductase family containing uncharacterized proteins that are similar to Burkholderia pseudomallei TdsD, may be involved in the processing of organosulfur compounds. Nitroreductase catalyzes the reduction of nitroaromatic compounds such as nitrotoluenes, nitrofurans and nitroimidazoles. This process requires NAD(P)H as electron donor in an obligatory two-electron transfer and uses FMN as cofactor.  The enzyme is typically a homodimer."
definition: >-
  nitroreductase similar to Burkholderia pseudomallei TdsD. A subfamily of the nitroreductase family containing uncharacterized proteins that are similar to Burkholderia pseudomallei TdsD, may be involved in the processing of organosulfur compounds. Nitroreductase catalyzes the reduction of nitroaromatic compounds such as nitrotoluenes, nitrofurans and nitroimidazoles. This process requires NAD(P)H as electron donor in an obligatory two-electron transfer and uses FMN as cofactor. The enzyme is typically a homodimer. — an NCBI CDD conserved domain (cd02138); members share this curated model.
