identifier: CDD:cd12217
label: "Stu0660-like CRISPR/Cas system-associated protein Csn2. Csn2 is a Nmeni subtype-specific Cas protein, which may function in the adaptation process which mediates the incorporation of foreign nucleic acids into the microbial host genome. Csn 2 may interact directly with double-stranded DNA. This family of Csn2 proteins includes Stu0660, the proteins are larger than other (canonical) Csn2 proteins as they have an additional alpha-helical C-terminal domain. CRISPR (Clustered Regularly Interspaced Short Palindromic Repeats) and associated Cas proteins comprise a system for heritable host defense by prokaryotic cells against phage and other foreign DNA. Csn2 has been predicted to be a functional analog of Cas4 based on anti-correlated phyletic patterns; also known as SPy1049 family."
definition: >-
  Stu0660-like CRISPR/Cas system-associated protein Csn2. Csn2 is a Nmeni subtype-specific Cas protein, which may function in the adaptation process which mediates the incorporation of foreign nucleic acids into the microbial host genome. Csn 2 may interact directly with double-stranded DNA. This family of Csn2 proteins includes Stu0660, the proteins are larger than other (canonical) Csn2 proteins as they have an additional alpha-helical C-terminal domain. CRISPR (Clustered Regularly Interspaced Short Palindromic Repeats) and associated Cas proteins comprise a system for heritable host defense by prokaryotic cells against phage and other foreign DNA. Csn2 has been predicted to be a functional analog of Cas4 based on anti-correlated phyletic patterns; also known as SPy1049 family. — an NCBI CDD conserved domain (cd12217); members share this curated model.
