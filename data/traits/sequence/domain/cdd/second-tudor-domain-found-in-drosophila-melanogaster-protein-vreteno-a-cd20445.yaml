identifier: CDD:cd20445
label: "second Tudor domain found in Drosophila melanogaster protein vreteno and similar proteins. Vreteno is a gonad-specific protein essential for germline development to repress transposable elements and preventing their mobilization, which is essential for germline integrity. It acts via the piRNA metabolic process in both germline and somatic gonadal tissues by mediating the repression of transposable elements during meiosis. Vreteno contains two Tudor domains. The model corresponds to the second one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  second Tudor domain found in Drosophila melanogaster protein vreteno and similar proteins. Vreteno is a gonad-specific protein essential for germline development to repress transposable elements and preventing their mobilization, which is essential for germline integrity. It acts via the piRNA metabolic process in both germline and somatic gonadal tissues by mediating the repression of transposable elements during meiosis. Vreteno contains two Tudor domains. The model corresponds to the second one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20445); members share this curated model.
