identifier: CDD:cd01009
label: "The solute binding domain of YfhD proteins, a member of the type 2 periplasmic binding fold protein superfamily. This subfamily includes the solute binding domain YfhD_N. These domains are found in the YfhD proteins that are predicted to function as lytic transglycosylases that cleave the glycosidic bond between N-acetylmuramic acid and N-acetylglucosamin in peptidoglycan, while the YfhD_N domain might act as an auxiliary or regulatory subunit. In addition to periplasmic solute binding domain, they have an SLT domain, typically found in soluble lytic transglycosylases, and a C-terminal low complexity domain.   The YfhD proteins might have been recruited to create localized cell wall openings required for transport of large substrates such as DNA. They belong to the PBP2 superfamily of periplasmic binding proteins that differ in size and ligand specificity, but have similar tertiary structures consisting of two globular subdomains connected by a flexible hinge. They have been shown to bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap."
definition: >-
  The solute binding domain of YfhD proteins, a member of the type 2 periplasmic binding fold protein superfamily. This subfamily includes the solute binding domain YfhD_N. These domains are found in the YfhD proteins that are predicted to function as lytic transglycosylases that cleave the glycosidic bond between N-acetylmuramic acid and N-acetylglucosamin in peptidoglycan, while the YfhD_N domain might act as an auxiliary or regulatory subunit. In addition to periplasmic solute binding domain, they have an SLT domain, typically found in soluble lytic transglycosylases, and a C-terminal low complexity domain. The YfhD proteins might have been recruited to create localized cell wall openings required for transport of large substrates such as DNA. They belong to the PBP2 superfamily of periplasmic binding proteins that differ in size and ligand specificity, but have similar tertiary structures consisting of two globular subdomains connected by a flexible hinge. They have been shown to bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. — an NCBI CDD conserved domain (cd01009); members share this curated model.
