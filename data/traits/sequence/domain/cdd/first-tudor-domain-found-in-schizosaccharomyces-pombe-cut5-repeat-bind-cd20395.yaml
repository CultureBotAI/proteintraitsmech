identifier: CDD:cd20395
label: "first Tudor domain found in Schizosaccharomyces pombe Cut5-repeat binding protein 2 (Crb2) and similar proteins. Crb2, also called RAD9 protein homolog, or checkpoint mediator protein crb2, is a DNA repair protein essential for cell cycle arrest at the G1 and G2 stages following DNA damage by X-, and UV-irradiation, or inactivation of DNA ligase. Crb2 contains two Tudor domains. The model corresponds to the first one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  first Tudor domain found in Schizosaccharomyces pombe Cut5-repeat binding protein 2 (Crb2) and similar proteins. Crb2, also called RAD9 protein homolog, or checkpoint mediator protein crb2, is a DNA repair protein essential for cell cycle arrest at the G1 and G2 stages following DNA damage by X-, and UV-irradiation, or inactivation of DNA ligase. Crb2 contains two Tudor domains. The model corresponds to the first one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20395); members share this curated model.
