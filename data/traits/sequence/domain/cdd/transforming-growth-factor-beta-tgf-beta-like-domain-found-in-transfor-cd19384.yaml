label: "transforming growth factor beta (TGF-beta) like domain found in transforming growth factor beta-1 (TGF-beta-1) and similar proteins. TGF-beta-1 is a polypeptide member of the transforming growth factor beta superfamily of cytokines. It is a secreted protein that performs many cellular functions, including the control of cell growth, cell proliferation, cell differentiation, and apoptosis."
