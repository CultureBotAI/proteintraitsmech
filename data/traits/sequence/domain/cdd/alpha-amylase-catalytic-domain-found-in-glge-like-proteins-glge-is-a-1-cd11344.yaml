identifier: CDD:cd11344
label: "Alpha amylase catalytic domain found in GlgE-like proteins. GlgE is a (1,4)-a-D-glucan:phosphate a-D-maltosyltransferase, involved in a-glucan biosynthesis in bacteria. It is also an anti-tuberculosis drug target. GlgE isoform I from Streptomyces coelicolor has the same catalytic and very similar kinetic properties to GlgE from Mycobacterium tuberculosis. GlgE from Streptomyces coelicolor forms a homodimer with each subunit comprising five domains (A, B, C, N, and S) and 2 inserts. Domain A is a catalytic alpha-amylase-type domain that along with domain N, which has a beta-sandwich fold and forms the core of the dimer interface, binds cyclodextrins. Domain A, B, and the 2 inserts define a well conserved donor pocket that binds maltose. Cyclodextrins competitively inhibit the binding of maltooligosaccharides to the S. coelicolor enzyme, indicating that the hydrophobic patch overlaps with the acceptor binding site. This is not the case in M. tuberculosis GlgE because cyclodextrins do not inhibit this enzyme, despite acceptor length specificity being conserved. Domain C is hypothesized to help stabilize domain A and could be involved in substrate binding. Domain S is a helix bundle that is inserted within the N domain and it plays a role in the dimer interface and interacts directly with domain B. The Alpha-amylase family comprises the largest family of glycoside hydrolases (GH), with the majority of enzymes acting on starch, glycogen, and related oligo- and polysaccharides. These proteins catalyze the transformation of alpha-1,4 and alpha-1,6 glucosidic linkages with retention of the anomeric center. The protein is described as having 3 domains: A, B, C. A is a (beta/alpha) 8-barrel; B is a loop between the beta 3 strand and alpha 3 helix of A; C is the C-terminal extension characterized by a Greek key. The majority of the enzymes have an active site cleft found between domains A and B where a triad of catalytic residues (Asp, Glu and Asp) performs catalysis. Other members of this family have lost the catalytic activity as in the case of the human 4F2hc, or only have 2 residues that serve as the catalytic nucleophile and the acid/base, such as Thermus A4 beta-galactosidase with 2 Glu residues (GH42) and human alpha-galactosidase with 2 Asp residues (GH31). The family members are quite extensive and include: alpha amylase, maltosyltransferase, cyclodextrin glycotransferase, maltogenic amylase, neopullulanase, isoamylase, 1,4-alpha-D-glucan maltotetrahydrolase, 4-alpha-glucotransferase, oligo-1,6-glucosidase, amylosucrase, sucrose phosphorylase, and amylomaltase."
definition: >-
  Alpha amylase catalytic domain found in GlgE-like proteins. GlgE is a (1,4)-a-D-glucan:phosphate a-D-maltosyltransferase, involved in a-glucan biosynthesis in bacteria. It is also an anti-tuberculosis drug target. GlgE isoform I from Streptomyces coelicolor has the same catalytic and very similar kinetic properties to GlgE from Mycobacterium tuberculosis. GlgE from Streptomyces coelicolor forms a homodimer with each subunit comprising five domains (A, B, C, N, and S) and 2 inserts. Domain A is a catalytic alpha-amylase-type domain that along with domain N, which has a beta-sandwich fold and forms the core of the dimer interface, binds cyclodextrins. Domain A, B, and the 2 inserts define a well conserved donor pocket that binds maltose. Cyclodextrins competitively inhibit the binding of maltooligosaccharides to the S. coelicolor enzyme, indicating that the hydrophobic patch overlaps with the acceptor binding site. This is not the case in M. tuberculosis GlgE because cyclodextrins do not inhibit this enzyme, despite acceptor length specificity being conserved. Domain C is hypothesized to help stabilize domain A and could be involved in substrate binding. Domain S is a helix bundle that is inserted within the N domain and it plays a role in the dimer interface and interacts directly with domain B. The Alpha-amylase family comprises the largest family of glycoside hydrolases (GH), with the majority of enzymes acting on starch, glycogen, and related oligo- and polysaccharides. These proteins catalyze the transformation of alpha-1,4 and alpha-1,6 glucosidic linkages with retention of the anomeric center. The protein is described as having 3 domains: A, B, C. A is a (beta/alpha) 8-barrel; B is a loop between the beta 3 strand and alpha 3 helix of A; C is the C-terminal extension characterized by a Greek key. The majority of the enzymes have an active site cleft found between domains A and B where a triad of catalytic residues (Asp, Glu and Asp) performs catalysis. Other members of this family have lost the catalytic activity as in the case of the human 4F2hc, or only have 2 residues that serve as the catalytic nucleophile and the acid/base, such as Thermus A4 beta-galactosidase with 2 Glu residues (GH42) and human alpha-galactosidase with 2 Asp residues (GH31). The family members are quite extensive and include: alpha amylase, maltosyltransferase, cyclodextrin glycotransferase, maltogenic amylase, neopullulanase, isoamylase, 1,4-alpha-D-glucan maltotetrahydrolase, 4-alpha-glucotransferase, oligo-1,6-glucosidase, amylosucrase, sucrose phosphorylase, and amylomaltase. — an NCBI CDD conserved domain (cd11344); members share this curated model.
