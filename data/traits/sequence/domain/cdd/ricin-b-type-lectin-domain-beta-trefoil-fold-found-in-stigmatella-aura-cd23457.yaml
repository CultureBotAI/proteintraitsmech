identifier: CDD:cd23457
label: "ricin B-type lectin domain, beta-trefoil fold, found in Stigmatella aurantiaca alpha-L-arabinofuranosidase (SaAF) and similar proteins. Alpha-L-arabinofuranosidase (EC 3.2.1.55), also called non-reducing end alpha-L-arabinofuranosidase, or arabinosidase, catalyzes the hydrolysis of terminal non-reducing alpha-L-arabinofuranoside residues in alpha-L-arabinosides. It acts on alpha-L-arabinofuranosides, alpha-L-arabinans containing (1,3)- and/or (1,5)-linkages, arabinoxylans and arabinogalactans. Members of this subfamily contain a ricin B-type lectin domain that adopts a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Stigmatella aurantiaca alpha-L-arabinofuranosidase (SaAF) and similar proteins. Alpha-L-arabinofuranosidase (EC 3.2.1.55), also called non-reducing end alpha-L-arabinofuranosidase, or arabinosidase, catalyzes the hydrolysis of terminal non-reducing alpha-L-arabinofuranoside residues in alpha-L-arabinosides. It acts on alpha-L-arabinofuranosides, alpha-L-arabinans containing (1,3)- and/or (1,5)-linkages, arabinoxylans and arabinogalactans. Members of this subfamily contain a ricin B-type lectin domain that adopts a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site. — an NCBI CDD conserved domain (cd23457); members share this curated model.
