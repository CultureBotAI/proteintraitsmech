identifier: CDD:cd07009
label: "Bradyrhizobium japonicum BLL0285 and related proteins, cupin domain. This family includes bacterial proteins homologous to BLL0285, a Bradyrhizobium japonicum protein of unknown function. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
