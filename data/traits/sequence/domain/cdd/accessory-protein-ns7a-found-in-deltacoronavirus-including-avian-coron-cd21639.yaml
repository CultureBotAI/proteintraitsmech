identifier: CDD:cd21639
label: NS7a_deltaCoV_HKU30-like
definition: >-
  accessory protein NS7a found in deltacoronavirus, including avian coronavirus HKU30 and related coronaviruses. This group includes the accessory protein NS7a from Quail deltacoronavirus (QdCoV) UAE-HKU30 and sparrow deltacoronavirus (SpCoV-HKU17) within the Buldecovirus subgenus of deltacoronaviruses. There are five essential genes in CoVs that result in the following gene products: Spike (S) protein, Membrane (M) glycoprotein, Nucleocapsid (N), Envelope (E) protein, and replicase/protease polyproteins (ORF1ab); all are required to produce a structurally complete viral particle. In addition, CoV genomes also contain ORFs coding for accessory proteins that are specific for certain CoV lineages or for a particular CoV. In general, CoV accessory proteins are considered to be dispensable for viral replication; however, several accessory proteins have been shown to exhibit functions in virus-host interactions during CoV infection. In deltaCoVs, several avian species encode accessory protein NS7a, which is homologous to Porcine coronavirus (PDCoV) HKU15 accessory proteins NS7 and NS7a. PDCoV NS7a is a 100 amino-acid polypeptide identical to the C-terminus of NS7; it remains unclear whether their functions are redundant. The PDCoV NS7 protein is extensively distributed in the mitochondria and may be involved in various cellular processes such as cytoskeleton networks and cell communication, metabolism, and protein biosynthesis. NS7a proteins in this subfamily have yet to be characterized. Phylogenetic analysis revealed that QdCoV UAE-HKU30 belongs to the same CoV species as porcine deltacoronavirus (PdCoV) HKU15 and sparrow deltacoronavirus (SpdCoV) HKU17 within Buldecovirus subgenus, suggesting transmission between avian and swine hosts
