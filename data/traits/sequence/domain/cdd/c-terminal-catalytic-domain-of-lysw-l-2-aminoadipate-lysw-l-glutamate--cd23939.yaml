identifier: CDD:cd23939
label: "C-terminal catalytic domain of [LysW]-L-2-aminoadipate/[LysW]-L-glutamate phosphate reductase (LysY) and similar proteins. [LysW]-L-2-aminoadipate/[LysW]-L-glutamate phosphate reductase (LysY; EC 1.2.1.103/EC 1.2.1.106) is involved in both, the arginine and lysine, biosynthetic pathways. LysY interacts with LysW. It may form a ternary complex with LysW and LysZ. Several bacteria and archaea utilize the amino group-carrier protein, LysW, for lysine biosynthesis from alpha-aminoadipate (AAA). In some cases, such as Sulfolobus, LysW is also used to protect the amino group of glutamate in arginine biosynthesis. After LysW modification, AAA and glutamate are converted to lysine and ornithine, respectively, by a single set of enzymes with dual functions. LysY is the third enzyme in lysine biosynthesis from AAA. LysY shows high sequence identity and functional similarities with ArgC, and they are considered to have evolved from a common ancestor."
definition: >-
  C-terminal catalytic domain of [LysW]-L-2-aminoadipate/[LysW]-L-glutamate phosphate reductase (LysY) and similar proteins. [LysW]-L-2-aminoadipate/[LysW]-L-glutamate phosphate reductase (LysY; EC 1.2.1.103/EC 1.2.1.106) is involved in both, the arginine and lysine, biosynthetic pathways. LysY interacts with LysW. It may form a ternary complex with LysW and LysZ. Several bacteria and archaea utilize the amino group-carrier protein, LysW, for lysine biosynthesis from alpha-aminoadipate (AAA). In some cases, such as Sulfolobus, LysW is also used to protect the amino group of glutamate in arginine biosynthesis. After LysW modification, AAA and glutamate are converted to lysine and ornithine, respectively, by a single set of enzymes with dual functions. LysY is the third enzyme in lysine biosynthesis from AAA. LysY shows high sequence identity and functional similarities with ArgC, and they are considered to have evolved from a common ancestor. — an NCBI CDD conserved domain (cd23939); members share this curated model.
