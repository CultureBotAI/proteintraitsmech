identifier: CDD:cd16515
label: "RING finger, HC subclass, found in leucine-rich repeat and sterile alpha motif-containing protein 1 (LRSAM1) and similar proteins. LRSAM1, also known as Tsg101-associated ligase (TAL), or RIFLE, is an E3 ubiquitin-protein ligase that physically associates with, and selectively ubiquitylates, Tsg101, an E2-like molecule that regulates vesicular trafficking processes in yeast and mammals. It regulates a Tsg101-associated complex responsible for the sorting of cargo into cytoplasm-containing vesicles that bud at the multivesicular body and at the plasma membrane. LRSAM1 is a multidomain protein containing an N-terminal leucine-rich repeat (LRR), followed by several recognizable motifs, including an ezrin-radixin-moezin (ERM) domain, a coiled-coil (CC) region, a SAM domain, and a C-terminal C3HC4-type RING-HC finger domain."
definition: >-
  RING finger, HC subclass, found in leucine-rich repeat and sterile alpha motif-containing protein 1 (LRSAM1) and similar proteins. LRSAM1, also known as Tsg101-associated ligase (TAL), or RIFLE, is an E3 ubiquitin-protein ligase that physically associates with, and selectively ubiquitylates, Tsg101, an E2-like molecule that regulates vesicular trafficking processes in yeast and mammals. It regulates a Tsg101-associated complex responsible for the sorting of cargo into cytoplasm-containing vesicles that bud at the multivesicular body and at the plasma membrane. LRSAM1 is a multidomain protein containing an N-terminal leucine-rich repeat (LRR), followed by several recognizable motifs, including an ezrin-radixin-moezin (ERM) domain, a coiled-coil (CC) region, a SAM domain, and a C-terminal C3HC4-type RING-HC finger domain. — an NCBI CDD conserved domain (cd16515); members share this curated model.
