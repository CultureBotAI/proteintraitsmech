identifier: CDD:cd12840
label: "Antirepressor CarS. CarS, an antirepressor present in Cystobacterineae, recognizes repressors to turn on the photo-inducible promoter P(B). In the dark, access to the P(B) promoter is blocked by the repressor CarA. Blue light causes expression of CarS, leading the way to the CarA-CarS interaction which dismantles the CarA-operator complex, resulting in the derepression of the P(B) promoter. A parallel pathway for regulating P(B) involves the interaction of CarS with the repressor CarH, which shares the domain architecture of CarA. CarH and CarA contain an N-terminal, MerR-type winged-helix DNA-binding domain that recognizes CarS. CarS adopts an SH3-like fold with loop length variations and acts as an operator DNA mimic."
definition: >-
  Antirepressor CarS. CarS, an antirepressor present in Cystobacterineae, recognizes repressors to turn on the photo-inducible promoter P(B). In the dark, access to the P(B) promoter is blocked by the repressor CarA. Blue light causes expression of CarS, leading the way to the CarA-CarS interaction which dismantles the CarA-operator complex, resulting in the derepression of the P(B) promoter. A parallel pathway for regulating P(B) involves the interaction of CarS with the repressor CarH, which shares the domain architecture of CarA. CarH and CarA contain an N-terminal, MerR-type winged-helix DNA-binding domain that recognizes CarS. CarS adopts an SH3-like fold with loop length variations and acts as an operator DNA mimic. — an NCBI CDD conserved domain (cd12840); members share this curated model.
