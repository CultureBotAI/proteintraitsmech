identifier: CDD:cd22359
label: "Sugar fermentation stimulation protein A and similar proteins. Sugar fermentation stimulation protein A may bind to DNA in a non-specific manner and may act as a regulatory factor involved in the metabolism of sugars such as maltose. However, it contains a well-conserved PDDEXK nuclease active site and may have hydrolytic activity towards an unknown target. The putative catalytic domain belongs to a superfamily of PDDEXK nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. The N-terminus of SfsA resembles a DNA-binding OB-fold domain."
definition: >-
  Sugar fermentation stimulation protein A and similar proteins. Sugar fermentation stimulation protein A may bind to DNA in a non-specific manner and may act as a regulatory factor involved in the metabolism of sugars such as maltose. However, it contains a well-conserved PDDEXK nuclease active site and may have hydrolytic activity towards an unknown target. The putative catalytic domain belongs to a superfamily of PDDEXK nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. The N-terminus of SfsA resembles a DNA-binding OB-fold domain. — an NCBI CDD conserved domain (cd22359); members share this curated model.
