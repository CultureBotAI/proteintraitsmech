identifier: CDD:cd20967
label: "Domain C2 of human cardiac Myosin Binding Protein C and similar domains; a member of the I-set of IgSF domains. The members here are composed of the immunoglobulin (Ig)  Domain C2 of human cardiac Myosin Binding Protein C (MyBP-C) and similar domains. MyBP-C is a thick filament protein involved in the regulation of muscle contraction. Mutations in cardiac MyBP-C gene are the second most frequent cause of hypertrophic cardiomyopathy. MyBP-C binds to myosin with two binding sites, one at its C-terminus and another at its N-terminus. The N-terminal binding site, consisting of immunoglobulin (lg) domains C1 and C2 connected by a flexible linker, interacts with the S2 segment of myosin in a phosphorylation-regulated manner.  The C1 and C2 Ig domains can bind to and activate or inhibit the thin filament. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. Unlike the V-set, one of the distinctive features of I-set domains is the lack of a C\" strand. The structures of the Ig domains of MyBP-C lack this strand and thus belong to the I-set of Ig superfamily domains. I-set domains are found in several cell adhesion molecules (such as VCAM, ICAM, and MADCAM), and are also present in numerous other diverse protein families, including several tyrosine-protein kinase receptors."
definition: >-
  Domain C2 of human cardiac Myosin Binding Protein C and similar domains; a member of the I-set of IgSF domains. The members here are composed of the immunoglobulin (Ig) Domain C2 of human cardiac Myosin Binding Protein C (MyBP-C) and similar domains. MyBP-C is a thick filament protein involved in the regulation of muscle contraction. Mutations in cardiac MyBP-C gene are the second most frequent cause of hypertrophic cardiomyopathy. MyBP-C binds to myosin with two binding sites, one at its C-terminus and another at its N-terminus. The N-terminal binding site, consisting of immunoglobulin (lg) domains C1 and C2 connected by a flexible linker, interacts with the S2 segment of myosin in a phosphorylation-regulated manner. The C1 and C2 Ig domains can bind to and activate or inhibit the thin filament. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. Unlike the V-set, one of the distinctive features of I-set domains is the lack of a C" strand. The structures of the Ig domains of MyBP-C lack this strand and thus belong to the I-set of Ig superfamily domains. I-set domains are found in several cell adhesion molecules (such as VCAM, ICAM, and MADCAM), and are also present in numerous other diverse protein families, including several tyrosine-protein kinase receptors. — an NCBI CDD conserved domain (cd20967); members share this curated model.
