identifier: CDD:cd15692
label: "PHD finger 1 found in D4, zinc and double PHD fingers family 3 (DPF3). DPF3, also termed BRG1-associated factor 45C (BAF45C), or zinc finger protein cer-d4, is encoded by a neuro-specific gene, cer-d4. It functions as a new epigenetic key factor for heart and muscle development and may be involved in the transcription regulation of neuro-specific gene clusters. It interacts with the BAF chromatin remodeling complex and binds methylated and acetylated lysine residues of histone 3 and 4. DPF3 contains a nuclear localization signal in the N-terminal region, a Cys2His2 (C2H2) zinc finger or Kruppel-type zinc-finger and a sequence of negatively charged amino acids in the central region, and a cysteine/histidine-rich region that is composed of two adjacent plant homeodomain (PHD) fingers (d4-domain) in the C-terminal part of the molecule. This model corresponds to the first PHD finger."
definition: >-
  PHD finger 1 found in D4, zinc and double PHD fingers family 3 (DPF3). DPF3, also termed BRG1-associated factor 45C (BAF45C), or zinc finger protein cer-d4, is encoded by a neuro-specific gene, cer-d4. It functions as a new epigenetic key factor for heart and muscle development and may be involved in the transcription regulation of neuro-specific gene clusters. It interacts with the BAF chromatin remodeling complex and binds methylated and acetylated lysine residues of histone 3 and 4. DPF3 contains a nuclear localization signal in the N-terminal region, a Cys2His2 (C2H2) zinc finger or Kruppel-type zinc-finger and a sequence of negatively charged amino acids in the central region, and a cysteine/histidine-rich region that is composed of two adjacent plant homeodomain (PHD) fingers (d4-domain) in the C-terminal part of the molecule. This model corresponds to the first PHD finger. — an NCBI CDD conserved domain (cd15692); members share this curated model.
