identifier: CDD:cd01034
label: "ClC chloride channel family. These protein sequences, closely related to the ClC Eric family, are putative halogen ion (Cl-, Br- and I-) transport proteins found in eubacteria. They belong to the ClC superfamily of chloride ion channels, which share a unique double-barreled architecture and voltage-dependent gating mechanism.  This superfamily lacks any structural or sequence similarity to other known ion channels and exhibit unique properties of ion permeation and gating.  The voltage-dependent gating is conferred by the permeating anion itself, acting as the gating charge."
definition: >-
  ClC chloride channel family. These protein sequences, closely related to the ClC Eric family, are putative halogen ion (Cl-, Br- and I-) transport proteins found in eubacteria. They belong to the ClC superfamily of chloride ion channels, which share a unique double-barreled architecture and voltage-dependent gating mechanism. This superfamily lacks any structural or sequence similarity to other known ion channels and exhibit unique properties of ion permeation and gating. The voltage-dependent gating is conferred by the permeating anion itself, acting as the gating charge. — an NCBI CDD conserved domain (cd01034); members share this curated model.
