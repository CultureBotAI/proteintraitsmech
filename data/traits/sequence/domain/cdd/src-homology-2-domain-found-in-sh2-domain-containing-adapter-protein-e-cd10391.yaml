identifier: CDD:cd10391
label: "Src homology 2 domain found in SH2 domain-containing adapter protein E (SHE). SHE is expressed in heart, lung, brain, and skeletal muscle. SHE contains two pTry protein binding domains, protein interaction domain (PID) and a SH2 domain, followed by a glycine-proline rich region, all of which are N-terminal to the phosphotyrosine binding (PTB) domain. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 domain found in SH2 domain-containing adapter protein E (SHE). SHE is expressed in heart, lung, brain, and skeletal muscle. SHE contains two pTry protein binding domains, protein interaction domain (PID) and a SH2 domain, followed by a glycine-proline rich region, all of which are N-terminal to the phosphotyrosine binding (PTB) domain. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10391); members share this curated model.
