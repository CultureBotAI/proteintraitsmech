identifier: CDD:cd02635
label: GARS_N
definition: >-
  Phosphoribosylglycinamide synthetase, N domain. Phosphoribosylglycinamide synthetase, N domain. Phosphoribosylglycinamide synthetase catalyses the second step in the de novo biosynthesis of purine. The reaction catalysed by Phosphoribosylglycinamide synthetase is the ATP- dependent addition of 5-phosphoribosylamine to glycine to form 5'phosphoribosylglycinamide. This domain is related to the N-terminal domain of biotin carboxylase/carbamoyl phosphate synthetase (see pfam00289)
