identifier: CDD:cd23236
label: "RNA-dependent RNA polymerase (RdRp) in the genus Tombusvirus of positive-sense single-stranded RNA [(+)ssRNA] viruses, within Procedovirinae subfamily; and related RdRps. This group contains the RdRp of RNA viruses belonging to the Tombusvirus genus within the subfamily Procedovirinae, family Tombusviridae, order Tolivirales. Tombusvirus is a genus of plant viruses. There are 17 species in the Tombusvirus genus: Artichoke mottled crinkle virus, Carnation Italian ringspot virus, Cucumber Bulgarian virus, Cucumber necrosis virus, Cymbidium ringspot virus, Eggplant mottled crinkle virus, Grapevine Algerian latent virus, Havel River virus, Lato River virus, Limonium flower distortion virus, Moroccan pepper virus, Neckar River virus, Pelargonium leaf curl virus, Pelargonium necrotic spot virus, Petunia asteroid mosaic virus, Sikte waterborne virus, and Tomato bushy stunt virus. Symptoms associated with this genus include mosaic. The name of the genus comes from Tomato bushy stunt virus. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
definition: >-
  RNA-dependent RNA polymerase (RdRp) in the genus Tombusvirus of positive-sense single-stranded RNA [(+)ssRNA] viruses, within Procedovirinae subfamily; and related RdRps. This group contains the RdRp of RNA viruses belonging to the Tombusvirus genus within the subfamily Procedovirinae, family Tombusviridae, order Tolivirales. Tombusvirus is a genus of plant viruses. There are 17 species in the Tombusvirus genus: Artichoke mottled crinkle virus, Carnation Italian ringspot virus, Cucumber Bulgarian virus, Cucumber necrosis virus, Cymbidium ringspot virus, Eggplant mottled crinkle virus, Grapevine Algerian latent virus, Havel River virus, Lato River virus, Limonium flower distortion virus, Moroccan pepper virus, Neckar River virus, Pelargonium leaf curl virus, Pelargonium necrotic spot virus, Petunia asteroid mosaic virus, Sikte waterborne virus, and Tomato bushy stunt virus. Symptoms associated with this genus include mosaic. The name of the genus comes from Tomato bushy stunt virus. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides. — an NCBI CDD conserved domain (cd23236); members share this curated model.
