label: "RWD domain of RWD domain-containing protein 1 (RWDD1) and related proteins. RWDD1, also called DRG family-regulatory protein 2 (DFRP2), or PTD013, interacts with DRG2 and protects DRG2 from proteolytic degradation. It is an androgen receptor-interacting protein that functions as a coactivator of androgen-dependent transcription."
definition: >-
  RWD domain of RWD domain-containing protein 1 (RWDD1) and related proteins. RWDD1, also called DRG family-regulatory protein 2 (DFRP2), or PTD013, interacts with DRG2 and protects DRG2 from proteolytic degradation. It is an androgen receptor-interacting protein that functions as a coactivator of androgen-dependent transcription. — an NCBI CDD conserved domain (cd23816); members share this curated model.
