identifier: CDD:cd08074
label: "ATP-grasp domain of circularly permuted members. ATP-grasp domain of proteins that display a rare gene permutation which results into a circular shift of the consereved secondary structure. In spite of the circular permutation, the resulting protein forms a very similar active site. As a result, members of this family display same catalytic mechanism as other members of the superfamily. It has been suggested that this rare gene permutation must have occurred before the evolution of eukaryotes. ATP and Mg ions are required for catalytic activity. Active site is covered by a characteristic flexible loop (more than one in some cases) that forms a 'lid' over the active site. Some representative members of this family includes human glutathione synthetase (hGS), Escherichia coli glutathionylspermidine synthetase (EcGSPS), and L. major trypanothione synthetase-amidase (LmTSA)."
definition: >-
