identifier: CDD:cd09511
label: "SAM domain of CNK1,2,3-suppressor subfamily. SAM (sterile alpha motif) domain of CNK (connector enhancer of kinase suppressor of ras (Ksr)) subfamily is a protein-protein interaction domain. CNK proteins are multidomain scaffold proteins containing a few protein-protein interaction domains and are required for connecting Rho and Ras signaling pathways. In Drosophila, the SAM domain of CNK is known to interact with the SAM domain of the aveugle protein, forming a heterodimer. Mutation of the SAM domain in human CNK1 abolishes the ability to cooperate with the Ras effector, supporting the idea that this interaction is necessary for proper Ras signal transduction."
definition: >-
  SAM domain of CNK1,2,3-suppressor subfamily. SAM (sterile alpha motif) domain of CNK (connector enhancer of kinase suppressor of ras (Ksr)) subfamily is a protein-protein interaction domain. CNK proteins are multidomain scaffold proteins containing a few protein-protein interaction domains and are required for connecting Rho and Ras signaling pathways. In Drosophila, the SAM domain of CNK is known to interact with the SAM domain of the aveugle protein, forming a heterodimer. Mutation of the SAM domain in human CNK1 abolishes the ability to cooperate with the Ras effector, supporting the idea that this interaction is necessary for proper Ras signal transduction. — an NCBI CDD conserved domain (cd09511); members share this curated model.
