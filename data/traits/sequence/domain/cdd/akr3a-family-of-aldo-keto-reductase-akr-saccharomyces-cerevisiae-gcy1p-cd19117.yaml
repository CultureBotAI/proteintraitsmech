identifier: CDD:cd19117
label: "AKR3A family of aldo-keto reductase (AKR). Saccharomyces cerevisiae Gcy1p and Ypr1p are founding members of aldo-keto reductase family 3 member A1 (AKR3A1) and A2 (AKR3A2), respectively. Gcy1p, also called galactose-inducible crystallin-like protein 1, is a glycerol dehydrogenase involved in glycerol catabolism under microaerobic conditions. It has mRNA binding activity. Ypr1p acts as a 2-methylbutyraldehyde reductase that displays high specific activity towards 2-methylbutyraldehyde, as well as other aldehydes such as hexanal."
definition: >-
  AKR3A family of aldo-keto reductase (AKR). Saccharomyces cerevisiae Gcy1p and Ypr1p are founding members of aldo-keto reductase family 3 member A1 (AKR3A1) and A2 (AKR3A2), respectively. Gcy1p, also called galactose-inducible crystallin-like protein 1, is a glycerol dehydrogenase involved in glycerol catabolism under microaerobic conditions. It has mRNA binding activity. Ypr1p acts as a 2-methylbutyraldehyde reductase that displays high specific activity towards 2-methylbutyraldehyde, as well as other aldehydes such as hexanal. — an NCBI CDD conserved domain (cd19117); members share this curated model.
