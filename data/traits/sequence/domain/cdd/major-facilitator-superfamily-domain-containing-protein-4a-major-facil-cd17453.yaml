label: "Major facilitator superfamily domain-containing protein 4A. Major facilitator superfamily domain-containing protein 4A (MFSD4A) belongs to the bacterial fucose permease, eukaryotic Major facilitator superfamily domain-containing protein 4 (FucP/MFSD4) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
