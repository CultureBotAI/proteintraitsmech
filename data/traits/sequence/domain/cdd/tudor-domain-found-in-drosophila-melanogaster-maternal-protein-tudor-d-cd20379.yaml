identifier: CDD:cd20379
label: "Tudor domain found in Drosophila melanogaster maternal protein Tudor (dTUD) and similar proteins. dTUD is required during oogenesis for the formation of primordial germ cells and for normal abdominal segmentation. It contains 11 Tudor domains. The family also includes mitochondrial A-kinase anchor protein 1 (AKAP1) and Tudor domain-containing proteins (TDRDs). AKAP1, also called A-kinase anchor protein 149 kDa (AKAP 149), or dual specificity A-kinase-anchoring protein 1 (D-AKAP-1), or protein kinase A-anchoring protein 1 (PRKA1), or Spermatid A-kinase anchor protein 84 (S-AKAP84), is found in mitochondria and in the endoplasmic reticulum-nuclear envelope where it anchors protein kinases, phosphatases, and a phosphodiesterase. It regulates multiple cellular processes governing mitochondrial homeostasis and cell viability. AKAP1 binds to type I and II regulatory subunits of protein kinase A and anchors them to the cytoplasmic face of the mitochondrial outer membrane. TDRDs have diverse biological functions and may contain one or more copies of the Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor domain found in Drosophila melanogaster maternal protein Tudor (dTUD) and similar proteins. dTUD is required during oogenesis for the formation of primordial germ cells and for normal abdominal segmentation. It contains 11 Tudor domains. The family also includes mitochondrial A-kinase anchor protein 1 (AKAP1) and Tudor domain-containing proteins (TDRDs). AKAP1, also called A-kinase anchor protein 149 kDa (AKAP 149), or dual specificity A-kinase-anchoring protein 1 (D-AKAP-1), or protein kinase A-anchoring protein 1 (PRKA1), or Spermatid A-kinase anchor protein 84 (S-AKAP84), is found in mitochondria and in the endoplasmic reticulum-nuclear envelope where it anchors protein kinases, phosphatases, and a phosphodiesterase. It regulates multiple cellular processes governing mitochondrial homeostasis and cell viability. AKAP1 binds to type I and II regulatory subunits of protein kinase A and anchors them to the cytoplasmic face of the mitochondrial outer membrane. TDRDs have diverse biological functions and may contain one or more copies of the Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20379); members share this curated model.
