identifier: CDD:cd18459
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 20 (KLHL20). KLHL20, also termed Kelch-like ECT2-interacting protein (KLEIP), or Kelch-like protein X, is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex involved in interferon response and anterograde Golgi to endosome transport. KLHL20 plays a role in actin assembly at cell-cell contact sites of Madin-Darby canine kidney cells. It also controls endothelial migration and sprouting angiogenesis."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 20 (KLHL20). KLHL20, also termed Kelch-like ECT2-interacting protein (KLEIP), or Kelch-like protein X, is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex involved in interferon response and anterograde Golgi to endosome transport. KLHL20 plays a role in actin assembly at cell-cell contact sites of Madin-Darby canine kidney cells. It also controls endothelial migration and sprouting angiogenesis. — an NCBI CDD conserved domain (cd18459); members share this curated model.
