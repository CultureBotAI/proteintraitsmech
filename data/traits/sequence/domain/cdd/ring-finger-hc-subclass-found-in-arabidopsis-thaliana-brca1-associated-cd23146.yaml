identifier: CDD:cd23146
label: "RING finger, HC subclass, found in Arabidopsis thaliana BRCA1-associated RING domain protein 1 (AtBARD1) and similar proteins. AtBARD1, also called protein REPRESSOR OF WUSCHEL 1, binds specifically to H3K4me3 regions of target gene (e.g. WUS and WOX5) promoters to repress their transcription via chromatin remodeling. It is required for the shoot apical meristem (SAM) organization and maintenance, by confining WUS expression to the organizing center, and for the quiescent center (QC) development in the root apical meristem (RAM), by repressing WOX5 expression in the root proximal meristem. AtBARD1 plays a role in DNA repair and in cell-cycle control. It is required for the repair of DNA double-strand breaks (DSBs), both natural and induced by genotoxic stress, by homologous recombination (HR). AtBARD1 contains a typical C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in Arabidopsis thaliana BRCA1-associated RING domain protein 1 (AtBARD1) and similar proteins. AtBARD1, also called protein REPRESSOR OF WUSCHEL 1, binds specifically to H3K4me3 regions of target gene (e.g. WUS and WOX5) promoters to repress their transcription via chromatin remodeling. It is required for the shoot apical meristem (SAM) organization and maintenance, by confining WUS expression to the organizing center, and for the quiescent center (QC) development in the root apical meristem (RAM), by repressing WOX5 expression in the root proximal meristem. AtBARD1 plays a role in DNA repair and in cell-cycle control. It is required for the repair of DNA double-strand breaks (DSBs), both natural and induced by genotoxic stress, by homologous recombination (HR). AtBARD1 contains a typical C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd23146); members share this curated model.
