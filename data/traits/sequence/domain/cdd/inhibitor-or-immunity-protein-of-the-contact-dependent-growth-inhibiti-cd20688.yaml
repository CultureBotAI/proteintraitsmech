identifier: CDD:cd20688
label: "inhibitor (or immunity protein) of the contact-dependent growth inhibition (CDI) system of Escherichia coli STEC_O31, Neisseria meningitidis MC58, and similar proteins. CDI toxins are expressed by gram-negative bacteria as part of a mechanism to inhibit the growth of neighboring cells. This model represents the inhibitor (CdiI, also called CdiI immunity protein) of the CdiA effector protein from Escherichia coli STEC_O31 Neisseria meningitidis MC58, and similar proteins. CdiA secretion is dependent on the outer membrane protein CdiB. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered via its C-terminal domain (CdiA-CT). The CdiI immunity proteins are intracellular proteins that inactivate the toxin/effector protein to prevent auto-inhibition. They are specific for their cognate CdiA-CT and do not protect cells from the toxins of other CDI+ bacteria. Thus, CDI systems encode a complex network of toxin-immunity protein pairs that are deployed for intercellular competition. Neisseria meningitidis MC58 immunity protein CdiI has structural homology to the Whirly family of RNA-binding proteins, but lacks the characteristic nucleic acid-binding motif of the family. It has been predicted to neutralize toxin activity by preventing access to RNA substrates."
definition: >-
  inhibitor (or immunity protein) of the contact-dependent growth inhibition (CDI) system of Escherichia coli STEC_O31, Neisseria meningitidis MC58, and similar proteins. CDI toxins are expressed by gram-negative bacteria as part of a mechanism to inhibit the growth of neighboring cells. This model represents the inhibitor (CdiI, also called CdiI immunity protein) of the CdiA effector protein from Escherichia coli STEC_O31 Neisseria meningitidis MC58, and similar proteins. CdiA secretion is dependent on the outer membrane protein CdiB. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered via its C-terminal domain (CdiA-CT). The CdiI immunity proteins are intracellular proteins that inactivate the toxin/effector protein to prevent auto-inhibition. They are specific for their cognate CdiA-CT and do not protect cells from the toxins of other CDI+ bacteria. Thus, CDI systems encode a complex network of toxin-immunity protein pairs that are deployed for intercellular competition. Neisseria meningitidis MC58 immunity protein CdiI has structural homology to the Whirly family of RNA-binding proteins, but lacks the characteristic nucleic acid-binding motif of the family. It has been predicted to neutralize toxin activity by preventing access to RNA substrates. — an NCBI CDD conserved domain (cd20688); members share this curated model.
