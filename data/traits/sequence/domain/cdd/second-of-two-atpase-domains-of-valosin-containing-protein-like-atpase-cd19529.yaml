identifier: CDD:cd19529
label: "second of two ATPase domains of Valosin-containing protein-like ATPase (VAT) and similar ATPase domains. The Valosin-containing protein-like ATPase of Thermoplasma acidophilum (VAT), is an archaeal homolog of the ubiquitous Cdc48/p97. It is a protein unfoldase that functions in concert with the 20S proteasome by unfolding proteasome substrates and passing them on for degradation. VAT forms a homohexamer, each monomer contains two tandem ATPase domains, referred to as D1 and D2, and an N-terminal domain. This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
definition: >-
  second of two ATPase domains of Valosin-containing protein-like ATPase (VAT) and similar ATPase domains. The Valosin-containing protein-like ATPase of Thermoplasma acidophilum (VAT), is an archaeal homolog of the ubiquitous Cdc48/p97. It is a protein unfoldase that functions in concert with the 20S proteasome by unfolding proteasome substrates and passing them on for degradation. VAT forms a homohexamer, each monomer contains two tandem ATPase domains, referred to as D1 and D2, and an N-terminal domain. This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion. — an NCBI CDD conserved domain (cd19529); members share this curated model.
