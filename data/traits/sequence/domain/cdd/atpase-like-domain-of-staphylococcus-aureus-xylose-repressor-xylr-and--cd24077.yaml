identifier: CDD:cd24077
label: "ATPase-like domain of Staphylococcus aureus xylose repressor (XylR) and similar proteins. This subfamily includes a group of uncharacterized proteins similar to Staphylococcus aureus xylose repressor (SaXylR), which belongs to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities. SaXylR acts as a transcriptional repressor of xylose-utilizing enzymes. It lacks the cysteine-rich zinc-binding motif, which presents in other family members."
definition: >-
  ATPase-like domain of Staphylococcus aureus xylose repressor (XylR) and similar proteins. This subfamily includes a group of uncharacterized proteins similar to Staphylococcus aureus xylose repressor (SaXylR), which belongs to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities. SaXylR acts as a transcriptional repressor of xylose-utilizing enzymes. It lacks the cysteine-rich zinc-binding motif, which presents in other family members. — an NCBI CDD conserved domain (cd24077); members share this curated model.
