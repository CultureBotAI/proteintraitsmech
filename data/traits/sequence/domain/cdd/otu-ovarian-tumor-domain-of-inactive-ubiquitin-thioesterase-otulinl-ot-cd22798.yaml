identifier: CDD:cd22798
label: "OTU (ovarian tumor) domain of inactive ubiquitin thioesterase Otulinl. Otulinl, also called FAM105A, is an OTU-class pseudo-deubiquitinase with a disrupted catalytic triad and undetectable cleavage activity for any diubiquitin linkage. It may play a role in endoplasmic reticulum (ER)-organelle communication. Otulinl belongs to the OTU family of cysteine proteases that use a conserved cysteine and histidine, and in some cases an aspartate, as the catalytic dyad (or triad)."
definition: >-
  OTU (ovarian tumor) domain of inactive ubiquitin thioesterase Otulinl. Otulinl, also called FAM105A, is an OTU-class pseudo-deubiquitinase with a disrupted catalytic triad and undetectable cleavage activity for any diubiquitin linkage. It may play a role in endoplasmic reticulum (ER)-organelle communication. Otulinl belongs to the OTU family of cysteine proteases that use a conserved cysteine and histidine, and in some cases an aspartate, as the catalytic dyad (or triad). — an NCBI CDD conserved domain (cd22798); members share this curated model.
