identifier: CDD:cd23230
label: "catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the genus Rabovirus of positive-sense single-stranded RNA [(+)ssRNA] viruses, within the family Picornaviridae. This group contains the catalytic core domain of the RdRp of RNA viruses belonging to the Rabovirus genus within the family Picornaviridae, order Picornavirales. The Rabovirus contains viruses with (+)ssRNA genomes that produce nonenveloped virions. The genus Rabovirus consists of four species Rabovirus A, Rabovirus B,  Rabovirus C, and Rabovirus D. Viral RNA of this genus was detected in feces of Norway rats (Rattus norvegicus) and mice (Mus musculus) in USA and Germany, in intestinal contents of Himalayan marmots (Marmota himalayana), and in tissue samples of Gairdner's shrewmice (Mus pahari). RdRps catalyze RNA template-dependent formation of phosphodiester bonds between ribonucleotides in the presence of divalent metal ions. The initiation of synthesis occurs at the 3'-end of the template in a VPg-dependent manner, and proceeds in the direction of 5'-3'. The active sites of RdRps are highly conserved in different species of picornaviruses. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
definition: >-
  catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the genus Rabovirus of positive-sense single-stranded RNA [(+)ssRNA] viruses, within the family Picornaviridae. This group contains the catalytic core domain of the RdRp of RNA viruses belonging to the Rabovirus genus within the family Picornaviridae, order Picornavirales. The Rabovirus contains viruses with (+)ssRNA genomes that produce nonenveloped virions. The genus Rabovirus consists of four species Rabovirus A, Rabovirus B, Rabovirus C, and Rabovirus D. Viral RNA of this genus was detected in feces of Norway rats (Rattus norvegicus) and mice (Mus musculus) in USA and Germany, in intestinal contents of Himalayan marmots (Marmota himalayana), and in tissue samples of Gairdner's shrewmice (Mus pahari). RdRps catalyze RNA template-dependent formation of phosphodiester bonds between ribonucleotides in the presence of divalent metal ions. The initiation of synthesis occurs at the 3'-end of the template in a VPg-dependent manner, and proceeds in the direction of 5'-3'. The active sites of RdRps are highly conserved in different species of picornaviruses. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides. — an NCBI CDD conserved domain (cd23230); members share this curated model.
