identifier: CDD:cd11527
label: "Nucleoside Triphosphate Pyrophosphohydrolase (EC 3.6.1.8) MazG-like domain found in dimeric 2-Deoxyuridine 5'-triphosphate nucleotidohydrolase and similar proteins. dUTPase (dUTP pyrophosphatase; EC 3.6.1.23) catalyzes the hydrolysis of dUTP to dUMP and pyrophosphate. It acts to ensure chromosomal integrity by reducing the effective ratio of dUTP/dTTP. Members in this family are dimeric dUTPases, such as those from Leishmania major, Trypanosoma cruzi, and Campylobacter jejuni, which differ from the monomeric and trimeric forms and adopt an all-alpha topology. A central four-helix bundle, consisting of two alpha-helices from the rigid domain and two helices from the mobile domain and connecting loops, form the active site in dimeric dUTPase-like proteins, requiring the presence of metal ion cofactors to hydrolyze both dUTP and dUDP."
definition: >-
  Nucleoside Triphosphate Pyrophosphohydrolase (EC 3.6.1.8) MazG-like domain found in dimeric 2-Deoxyuridine 5'-triphosphate nucleotidohydrolase and similar proteins. dUTPase (dUTP pyrophosphatase; EC 3.6.1.23) catalyzes the hydrolysis of dUTP to dUMP and pyrophosphate. It acts to ensure chromosomal integrity by reducing the effective ratio of dUTP/dTTP. Members in this family are dimeric dUTPases, such as those from Leishmania major, Trypanosoma cruzi, and Campylobacter jejuni, which differ from the monomeric and trimeric forms and adopt an all-alpha topology. A central four-helix bundle, consisting of two alpha-helices from the rigid domain and two helices from the mobile domain and connecting loops, form the active site in dimeric dUTPase-like proteins, requiring the presence of metal ion cofactors to hydrolyze both dUTP and dUDP. — an NCBI CDD conserved domain (cd11527); members share this curated model.
