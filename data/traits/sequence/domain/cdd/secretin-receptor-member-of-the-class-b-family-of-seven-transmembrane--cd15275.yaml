identifier: CDD:cd15275
label: "secretin receptor, member of the class B family of seven-transmembrane G protein-coupled receptors. Secretin receptor is a member of the group of G protein-coupled receptors for structurally similar peptide hormones that also include vasoactive intestinal peptide (VIP), growth-hormone-releasing hormone (GHRH), and pituitary adenylate cyclase activating polypeptide (PACAP). These receptors are classified into the subfamily B1 of class B GRCRs that consists of the classical hormone receptors, and have been identified in all the vertebrates, from fishes to mammals, but are not present in plants, fungi, or prokaryotes. For all class B receptors, the large N-terminal extracellular domain plays a critical role in peptide hormone recognition. Secretin, a polypeptide secreted by entero-endocrine S cells in the small intestine, is involved in maintaining body fluid balance. This polypeptide regulates the secretion of bile and bicarbonate into the duodenum from the pancreatic and biliary ducts, as well as regulates the duodenal pH by the control of gastric acid secretion. Studies with secretin receptor-null mice indicate that secretin plays a role in regulating renal water reabsorption. Secretin mediates its biological actions by elevating intracellular cAMP via G protein-coupled secretin receptor, which is expressed in the brain, pancreas, stomach, kidney, and liver."
definition: >-
  secretin receptor, member of the class B family of seven-transmembrane G protein-coupled receptors. Secretin receptor is a member of the group of G protein-coupled receptors for structurally similar peptide hormones that also include vasoactive intestinal peptide (VIP), growth-hormone-releasing hormone (GHRH), and pituitary adenylate cyclase activating polypeptide (PACAP). These receptors are classified into the subfamily B1 of class B GRCRs that consists of the classical hormone receptors, and have been identified in all the vertebrates, from fishes to mammals, but are not present in plants, fungi, or prokaryotes. For all class B receptors, the large N-terminal extracellular domain plays a critical role in peptide hormone recognition. Secretin, a polypeptide secreted by entero-endocrine S cells in the small intestine, is involved in maintaining body fluid balance. This polypeptide regulates the secretion of bile and bicarbonate into the duodenum from the pancreatic and biliary ducts, as well as regulates the duodenal pH by the control of gastric acid secretion. Studies with secretin receptor-null mice indicate that secretin plays a role in regulating renal water reabsorption. Secretin mediates its biological actions by elevating intracellular cAMP via G protein-coupled secretin receptor, which is expressed in the brain, pancreas, stomach, kidney, and liver. — an NCBI CDD conserved domain (cd15275); members share this curated model.
