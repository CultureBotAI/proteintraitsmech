identifier: CDD:cd10834
label: "PDZ domain 2 of the canonical isoform 1 of PDZ domain containing 7 (PDZD7), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 2 of the long isoform 1 of PDZD7, and related domains. PDZD7 is critical for the organization of Usher syndrome type 2 (USH2) complex. Usher syndrome is the leading cause of hereditary sensory deaf-blindness in humans; USH2 is the most common sub-type. Formation of the USH2 complex is based upon heterodimerization between PDZD7 and whirlin (another PDZ domain-containing protein) and a subsequent dynamic interplay between USH2 proteins via their multiple PDZ domains. The PDZD7 PDZ2 domain binds GPR98 (also known as VLGR1) and usherin (USH2A). PDZD7 and whirlin form heterodimers through their multiple PDZ domains; whirlin and PDZD7 interact with usherin and GPR98 to form an interdependent ankle link complex. PDZD7 also interacts with myosin VIIa. PDZD7 also forms homodimers through its PDZ2 domain. Various isoforms of PDZD7 produced by alternative splicing have been identified; this subgroup includes the second PDZ domain of the canonical isoform of PDZD7- isoform 1. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This PDZD7-like family PDZ2 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
