identifier: CDD:cd15779
label: "Staphylococcal/Streptococcal toxin, beta-grasp domain. The C-terminal domain of staphylococcal enterotoxins (SEs) is involved in the zinc-dependent binding of SEs to class II major histocompatibility complex molecules (MHC II) on antigen-presenting cells, as well as T-cell receptors (Vbeta 8.1). Via this mechanism, SEs stimulate the immune system, and eventually trigger toxic shock which may be lethal. Together with pyrogenic exotoxins of Streptococci (SPEs), these molecules are often described as superantigens."
definition: >-
  Staphylococcal/Streptococcal toxin, beta-grasp domain. The C-terminal domain of staphylococcal enterotoxins (SEs) is involved in the zinc-dependent binding of SEs to class II major histocompatibility complex molecules (MHC II) on antigen-presenting cells, as well as T-cell receptors (Vbeta 8.1). Via this mechanism, SEs stimulate the immune system, and eventually trigger toxic shock which may be lethal. Together with pyrogenic exotoxins of Streptococci (SPEs), these molecules are often described as superantigens. — an NCBI CDD conserved domain (cd15779); members share this curated model.
