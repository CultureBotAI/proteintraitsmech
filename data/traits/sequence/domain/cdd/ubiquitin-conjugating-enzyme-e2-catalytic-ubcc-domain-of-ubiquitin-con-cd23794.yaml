identifier: CDD:cd23794
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin conjugating enzymes E2 F, E2 M and related proteins. The E2F/E2M subfamily includes mammalian ubiquitin-conjugating enzymes E2 F (UBE2F/NCE2, EC 2.3.2.32) and E2 M (UBE2M/UBC12, EC 2.3.2.34), yeast NEDD8-conjugating enzyme UBC12 (EC 2.3.2.24), plant RUB1-conjugating enzyme 1-2 (RCE1/UBC12 and RCE2/UBC12L, EC 2.3.2.-), and similar proteins. UBE2F (also called EDD8-conjugating enzyme UBE2F, NEDD8 carrier protein UBE2F, NEDD8 protein ligase UBE2F, NEDD8-conjugating enzyme 2, or RING-type E3 NEDD8 transferase UBE2F) and UBE2M (also called NEDD8-conjugating enzyme UBC12, or NEDD8 carrier protein) accept the ubiquitin-like protein NEDD8 from the UBA3-NAE1 E1 complex and catalyzes its covalent attachment to other proteins. The RBX2-UBE2F complex neddylates specific target proteins, such as CUL5. The RBX1-UBE2M complex neddylates specific target proteins, such as CUL1, CUL2, CUL3 and CUL4. UBE2M is involved in cell proliferation. Saccharomyces cerevisiae UBC12 and Arabidopsis thaliana RCE1/RCE2 accept the ubiquitin-like protein NEDD8/RUB1 from the UBA3-ULA1 E1 complex and the ECR1-AXR1 E1 complex, respectively."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin conjugating enzymes E2 F, E2 M and related proteins. The E2F/E2M subfamily includes mammalian ubiquitin-conjugating enzymes E2 F (UBE2F/NCE2, EC 2.3.2.32) and E2 M (UBE2M/UBC12, EC 2.3.2.34), yeast NEDD8-conjugating enzyme UBC12 (EC 2.3.2.24), plant RUB1-conjugating enzyme 1-2 (RCE1/UBC12 and RCE2/UBC12L, EC 2.3.2.-), and similar proteins. UBE2F (also called EDD8-conjugating enzyme UBE2F, NEDD8 carrier protein UBE2F, NEDD8 protein ligase UBE2F, NEDD8-conjugating enzyme 2, or RING-type E3 NEDD8 transferase UBE2F) and UBE2M (also called NEDD8-conjugating enzyme UBC12, or NEDD8 carrier protein) accept the ubiquitin-like protein NEDD8 from the UBA3-NAE1 E1 complex and catalyzes its covalent attachment to other proteins. The RBX2-UBE2F complex neddylates specific target proteins, such as CUL5. The RBX1-UBE2M complex neddylates specific target proteins, such as CUL1, CUL2, CUL3 and CUL4. UBE2M is involved in cell proliferation. Saccharomyces cerevisiae UBC12 and Arabidopsis thaliana RCE1/RCE2 accept the ubiquitin-like protein NEDD8/RUB1 from the UBA3-ULA1 E1 complex and the ECR1-AXR1 E1 complex, respectively. — an NCBI CDD conserved domain (cd23794); members share this curated model.
