identifier: CDD:cd16937
label: "Histidine kinase-like ATPase domain of structural maintenance of chromosomes flexible hinge domain containing 1 (SMCHD1) protein. This family includes histidine kinase-like ATPase (HATPase) domain of structural maintenance of chromosomes flexible hinge domain containing 1 (SMCHD1) protein, which is involved in gene silencing and in DNA damage. It has critical roles in X-chromosome inactivation and is also an important regulator of autosomal gene clusters. Upon DNA damage, SMCHD1 promotes non-homologous end joining and inhibits homologous recombination repair. SMCHD1 is implicated in the pathogenesis of facioscapulohumeral muscular dystrophy."
definition: >-
