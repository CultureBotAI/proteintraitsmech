identifier: CDD:cd10905
label: Vitellogenin_Insects
definition: >-
  Vitellogenin-like proteins found in Insects. Insect Vitellogenin; Major egg yolk proteins that function in lipid binding. The subfamily is entirely Neoptera; interestingly, the sub-branches of the tree conform exactly to the taxonomy, with Hemiptera, hymenoptera, diptera, coleoptera, orthoptera, etc. each occupying it's own branch. There is a good review (pmid 20465817) about evolution within mosquitoes (Diptera)
