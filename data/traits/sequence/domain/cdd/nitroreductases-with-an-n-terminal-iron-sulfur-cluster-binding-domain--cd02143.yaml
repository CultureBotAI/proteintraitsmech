label: "nitroreductases with an N-terminal iron-sulfur cluster-binding domain. Members of this family utilize FMN as a cofactor. This family may be involved in the reduction of flavin or nitroaromatic compounds via an obligatory two-electron transfer. Nitroreductase is homodimer. Each subunit contains one FMN molecule."
