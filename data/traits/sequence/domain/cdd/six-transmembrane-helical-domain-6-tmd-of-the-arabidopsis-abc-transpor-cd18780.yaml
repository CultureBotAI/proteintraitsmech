identifier: CDD:cd18780
label: "Six-transmembrane helical domain (6-TMD) of the Arabidopsis ABC transporter B family member 27 and similar proteins. This group includes Arabidopsis ABC transporter B family member 27 (also known as AtABCB27, aluminum tolerance-related ATP-binding cassette transporter, transporter associated with antigen processing-like protein 2, AtTAP2, and ALS1) which may play a role in aluminum resistance. The ABC_6TM_TAP_ABCB8_10_like subgroup of the ABC_6TM exporter family includes ABC transporter associated with antigen processing (TAP), which is essential to cellular immunity against viral infection, as well as ABCB8 and ABCB10, which are found in the inner membrane of mitochondria, with the nucleotide-binding domains (NBDs) inside the mitochondrial matrix. Mammalian ABCB10 is essential for erythropoiesis and for protection of mitochondria against oxidative stress, while ABCB8 is essential for normal cardiac function, maintenance of mitochondrial iron homeostasis and maturation of cytosolic Fe/S proteins. The ABC_6TM exporter family represents the six transmembrane (TM) helices typically found in the ATP-binding cassette (ABC) transporters that function as exporters, which contain 6 TM helices per subunit (domain), or a total of 12 TM helices for the complete transporter. The ABC exporters are found in both prokaryotes and eukaryotes, where they mediate the cellular secretion of toxic compounds and a various type of lipids. In addition to ABC exporters, ABC transporters include two classes of ABC importers, classified depending on details of their architecture and mechanism. Only the ABC exporters are included in the ABC_6TM exporter family."
definition: >-
  Six-transmembrane helical domain (6-TMD) of the Arabidopsis ABC transporter B family member 27 and similar proteins. This group includes Arabidopsis ABC transporter B family member 27 (also known as AtABCB27, aluminum tolerance-related ATP-binding cassette transporter, transporter associated with antigen processing-like protein 2, AtTAP2, and ALS1) which may play a role in aluminum resistance. The ABC_6TM_TAP_ABCB8_10_like subgroup of the ABC_6TM exporter family includes ABC transporter associated with antigen processing (TAP), which is essential to cellular immunity against viral infection, as well as ABCB8 and ABCB10, which are found in the inner membrane of mitochondria, with the nucleotide-binding domains (NBDs) inside the mitochondrial matrix. Mammalian ABCB10 is essential for erythropoiesis and for protection of mitochondria against oxidative stress, while ABCB8 is essential for normal cardiac function, maintenance of mitochondrial iron homeostasis and maturation of cytosolic Fe/S proteins. The ABC_6TM exporter family represents the six transmembrane (TM) helices typically found in the ATP-binding cassette (ABC) transporters that function as exporters, which contain 6 TM helices per subunit (domain), or a total of 12 TM helices for the complete transporter. The ABC exporters are found in both prokaryotes and eukaryotes, where they mediate the cellular secretion of toxic compounds and a various type of lipids. In addition to ABC exporters, ABC transporters include two classes of ABC importers, classified depending on details of their architecture and mechanism. Only the ABC exporters are included in the ABC_6TM exporter family. — an NCBI CDD conserved domain (cd18780); members share this curated model.
