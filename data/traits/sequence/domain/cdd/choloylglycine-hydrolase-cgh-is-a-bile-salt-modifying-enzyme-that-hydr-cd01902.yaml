identifier: CDD:cd01902
label: "Choloylglycine hydrolase (CGH) is a bile salt-modifying enzyme that hydrolyzes non-peptide carbon-nitrogen bonds in choloylglycine and choloyltaurine, both of which are present in bile.  CGH is present in a number of probiotic microbial organisms that inhabit the gut.  CGH has an N-terminal nucleophilic cysteine, as do other members of the Ntn hydrolase family to which CGH belongs."
definition: >-
  Choloylglycine hydrolase (CGH) is a bile salt-modifying enzyme that hydrolyzes non-peptide carbon-nitrogen bonds in choloylglycine and choloyltaurine, both of which are present in bile. CGH is present in a number of probiotic microbial organisms that inhabit the gut. CGH has an N-terminal nucleophilic cysteine, as do other members of the Ntn hydrolase family to which CGH belongs. — an NCBI CDD conserved domain (cd01902); members share this curated model.
