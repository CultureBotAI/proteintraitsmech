identifier: CDD:cd10549
label: "Uncharacterized polyferredoxin-like protein. This family contains uncharacterized polyferredoxin protein similar to Methanobacterium thermoautotrophicum MvhB. The mvhB is a gene of the methylviologen-reducing hydrogenase operon. It is predicted to contain 12 [4Fe-4S] clusters, and was therefore suggested to be a polyferredoxin. As a subfamily of the beta subunit of the DMSO Reductase (DMSOR) family, it is predicted to function as electron carrier in the reducing reaction."
definition: >-
  Uncharacterized polyferredoxin-like protein. This family contains uncharacterized polyferredoxin protein similar to Methanobacterium thermoautotrophicum MvhB. The mvhB is a gene of the methylviologen-reducing hydrogenase operon. It is predicted to contain 12 [4Fe-4S] clusters, and was therefore suggested to be a polyferredoxin. As a subfamily of the beta subunit of the DMSO Reductase (DMSOR) family, it is predicted to function as electron carrier in the reducing reaction. — an NCBI CDD conserved domain (cd10549); members share this curated model.
