identifier: CDD:cd16070
label: TNFSF-like_insects
definition: >-
  Tumor necrosis factor ligand superfamily in insects. This family contains TNF-like proteins in insects that are uncharacterized. The TNF superfamily (TNFSF) includes ligands that bind to one or more TNF receptor superfamily (TNFRSF) molecules. These superfamily members initiate numerous physiological functions. TNF ligands are either membrane-associated or soluble trimeric forms that cluster their cognate receptors to initiate signal transduction. Function of TNF ligands in this family is unknown
