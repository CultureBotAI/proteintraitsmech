identifier: CDD:cd06743
label: "PDZ domain 1 of delphilin (L-delphilin isoform), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 1 of delphilin (also known as glutamate receptor, ionotropic, delta 2-interacting protein 1, L-delphilin). Delphilin, a postsynaptic protein which is selectively expressed at cerebellar Purkinje cells, links the glutamate receptor delta 2 subunit (GluRdelta2) with the actin cytoskeleton and various signaling molecules. Two alternatively spliced isoforms of delphilin have been characterized: L-delphilin has two PDZ domains, PDZ1 and PDZ2, and S-delphilin has a single PDZ domain (PDZ2). These two isoforms are differently palmitoylated and may be involved in controlling GluRdelta2 signaling in Purkinje cells. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This delphilin-like family PDZ1 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  PDZ domain 1 of delphilin (L-delphilin isoform), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 1 of delphilin (also known as glutamate receptor, ionotropic, delta 2-interacting protein 1, L-delphilin). Delphilin, a postsynaptic protein which is selectively expressed at cerebellar Purkinje cells, links the glutamate receptor delta 2 subunit (GluRdelta2) with the actin cytoskeleton and various signaling molecules. Two alternatively spliced isoforms of delphilin have been characterized: L-delphilin has two PDZ domains, PDZ1 and PDZ2, and S-delphilin has a single PDZ domain (PDZ2). These two isoforms are differently palmitoylated and may be involved in controlling GluRdelta2 signaling in Purkinje cells. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This delphilin-like family PDZ1 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd06743); members share this curated model.
