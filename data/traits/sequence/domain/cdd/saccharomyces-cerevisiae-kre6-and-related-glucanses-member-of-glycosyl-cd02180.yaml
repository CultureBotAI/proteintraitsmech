identifier: CDD:cd02180
label: "Saccharomyces cerevisiae KRE6 and related glucanses, member of glycosyl hydrolase family 16. KRE6 is a Saccharomyces cerevisiae glucanase that participates in the synthesis of beta-1,6-glucan, a major structural component of the cell wall.  It is a golgi membrane protein required for normal beta-1,6-glucan levels in the cell wall.  KRE6 is closely realted to laminarinase, a glycosyl hydrolase family 16 member that hydrolyzes 1,3-beta-D-glucosidic linkages in 1,3-beta-D-glucans such as laminarins, curdlans, paramylons, and pachymans, with very limited action on mixed-link (1,3-1,4-)-beta-D-glucans."
definition: >-
  Saccharomyces cerevisiae KRE6 and related glucanses, member of glycosyl hydrolase family 16. KRE6 is a Saccharomyces cerevisiae glucanase that participates in the synthesis of beta-1,6-glucan, a major structural component of the cell wall. It is a golgi membrane protein required for normal beta-1,6-glucan levels in the cell wall. KRE6 is closely realted to laminarinase, a glycosyl hydrolase family 16 member that hydrolyzes 1,3-beta-D-glucosidic linkages in 1,3-beta-D-glucans such as laminarins, curdlans, paramylons, and pachymans, with very limited action on mixed-link (1,3-1,4-)-beta-D-glucans. — an NCBI CDD conserved domain (cd02180); members share this curated model.
