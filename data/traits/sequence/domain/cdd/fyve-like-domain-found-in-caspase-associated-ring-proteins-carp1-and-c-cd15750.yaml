identifier: CDD:cd15750
label: "FYVE-like domain found in caspase-associated ring proteins, CARP1 and CARP2. CARP1 and CARP2 are a novel group of caspase regulators by the presence of a FYVE-type zinc finger domain. They do not localize to membranes in the cell and are involved in the negative regulation of apoptosis, specifically targeting two initiator caspases, caspase 8 and caspase 10, which are distinguished from other FYVE-type proteins. Moreover, these proteins have an altered sequence in the basic ligand binding patch and lack the WxxD (x for any residue) motif that is conserved only in phosphoinositide binding FYVE domains. Thus they constitute a family of unique FYVE-type domains called FYVE-like domains."
definition: >-
  FYVE-like domain found in caspase-associated ring proteins, CARP1 and CARP2. CARP1 and CARP2 are a novel group of caspase regulators by the presence of a FYVE-type zinc finger domain. They do not localize to membranes in the cell and are involved in the negative regulation of apoptosis, specifically targeting two initiator caspases, caspase 8 and caspase 10, which are distinguished from other FYVE-type proteins. Moreover, these proteins have an altered sequence in the basic ligand binding patch and lack the WxxD (x for any residue) motif that is conserved only in phosphoinositide binding FYVE domains. Thus they constitute a family of unique FYVE-type domains called FYVE-like domains. — an NCBI CDD conserved domain (cd15750); members share this curated model.
