identifier: CDD:cd18945
label: "basic helix-loop-helix (bHLH) domain found in transcription factor 4 (TCF-4) and similar proteins. TCF-4, also termed E2-2, or Class B basic helix-loop-helix protein 19 (bHLHb19), or immunoglobulin transcription factor 2 (ITF-2), or SL3-3 enhancer factor 2 (SEF-2), is a bHLH transcription factor that binds to the immunoglobulin enhancer Mu-E5/KE5-motif. It is involved in the initiation of neuronal differentiation."
definition: >-
