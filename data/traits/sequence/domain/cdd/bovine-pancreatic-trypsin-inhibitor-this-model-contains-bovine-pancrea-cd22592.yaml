identifier: CDD:cd22592
label: "bovine pancreatic trypsin inhibitor. This model contains bovine pancreatic trypsin inhibitor (BPTI, also known as pancreatic Kunitz inhibitor, aprotinin, or trypsin-kallikrein inhibitor), a small protein that inhibits the action of the trypsin, and is thus a member of the serine protease family of inhibitors. This class of enzymes contains conserved cysteine residues that form 3 disulfide bonds to stabilize the three-dimensional structure. BPTI has a relatively broad specificity, inhibiting trypsin as well as chymotrypsin, and elastase-like serine (pro)enzymes capable of very different primary specificity. It reacts rapidly with serine proteases to form stable complexes, but the enzyme:inhibitor complex formation may involve several intermediates corresponding to discrete reaction steps. Furthermore, BPTI inhibits the nitric oxide synthase type-I and -II action, and impairs K+ transport by Ca2+-activated K+ channels. Clinically, BPTI is used in certain surgical interventions, such as cardiopulmonary surgery and orthotopic liver transplantation since it significantly reduces hemorrhagic complications."
definition: >-
  bovine pancreatic trypsin inhibitor. This model contains bovine pancreatic trypsin inhibitor (BPTI, also known as pancreatic Kunitz inhibitor, aprotinin, or trypsin-kallikrein inhibitor), a small protein that inhibits the action of the trypsin, and is thus a member of the serine protease family of inhibitors. This class of enzymes contains conserved cysteine residues that form 3 disulfide bonds to stabilize the three-dimensional structure. BPTI has a relatively broad specificity, inhibiting trypsin as well as chymotrypsin, and elastase-like serine (pro)enzymes capable of very different primary specificity. It reacts rapidly with serine proteases to form stable complexes, but the enzyme:inhibitor complex formation may involve several intermediates corresponding to discrete reaction steps. Furthermore, BPTI inhibits the nitric oxide synthase type-I and -II action, and impairs K+ transport by Ca2+-activated K+ channels. Clinically, BPTI is used in certain surgical interventions, such as cardiopulmonary surgery and orthotopic liver transplantation since it significantly reduces hemorrhagic complications. — an NCBI CDD conserved domain (cd22592); members share this curated model.
