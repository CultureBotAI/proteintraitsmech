identifier: CDD:cd18720
label: "LabA-like PIN domain of uncharacterized Bacillus subtilis YqxD and related proteins. This subfamily includes the PIN domain of uncharacterized Bacillus subtilis YqxD (also known as YqfM) and Escherichia coli YaiI. Firmicute, such as Bacillus and Listeria, YqxD proteins are encoded within RNA polymerase major sigma43 operons, whereas E. coli YaiL is transcribed as a mono cistron. This subfamily belongs to LabA-like PIN domain family which includes Synechococcus elongatus PCC 7942 LabA, human ZNF451, uncharacterized Bacillus subtilis YqxD and Escherichia coli YaiI, and the N-terminal domain of a well-conserved group of mainly bacterial proteins with no defined function, which contain a C-terminal LabA_like_C domain. Curiously, a gene labeled NicB from Pseudomonas putida S16, which is described as a putative NADH-dependent hydroxylase involved in the microbial degradation of nicotine also falls into the LabA-like PIN family. The PIN (PilT N terminus) domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its active center, consisting of three highly conserved catalytic residues which coordinate metal ions; in some members, additional metal coordinating residues can be found while some others lack several of these key catalytic residues. The PIN active site is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons."
definition: >-
  LabA-like PIN domain of uncharacterized Bacillus subtilis YqxD and related proteins. This subfamily includes the PIN domain of uncharacterized Bacillus subtilis YqxD (also known as YqfM) and Escherichia coli YaiI. Firmicute, such as Bacillus and Listeria, YqxD proteins are encoded within RNA polymerase major sigma43 operons, whereas E. coli YaiL is transcribed as a mono cistron. This subfamily belongs to LabA-like PIN domain family which includes Synechococcus elongatus PCC 7942 LabA, human ZNF451, uncharacterized Bacillus subtilis YqxD and Escherichia coli YaiI, and the N-terminal domain of a well-conserved group of mainly bacterial proteins with no defined function, which contain a C-terminal LabA_like_C domain. Curiously, a gene labeled NicB from Pseudomonas putida S16, which is described as a putative NADH-dependent hydroxylase involved in the microbial degradation of nicotine also falls into the LabA-like PIN family. The PIN (PilT N terminus) domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its active center, consisting of three highly conserved catalytic residues which coordinate metal ions; in some members, additional metal coordinating residues can be found while some others lack several of these key catalytic residues. The PIN active site is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons. — an NCBI CDD conserved domain (cd18720); members share this curated model.
