identifier: CDD:cd21758
label: "twin-cysteine dimerization domain found in Schizosaccharomyces pombe MT organizer Mto2 and similar proteins. In the fission yeast Schizosaccharomyces pombe, the proteins Mto1 and Mto2 form the Mto1/2 complex, which recruits gamma-tubulin complex (gamma-TuC) to multiple non-centrosomal microtubule-organizing centers (MTOCs). It also activates gamma-TuC-dependent microtubule nucleation independently of localizing the gamma-TuC. The model corresponds to the twin-cysteine dimerization domain of Mto2."
definition: >-
  twin-cysteine dimerization domain found in Schizosaccharomyces pombe MT organizer Mto2 and similar proteins. In the fission yeast Schizosaccharomyces pombe, the proteins Mto1 and Mto2 form the Mto1/2 complex, which recruits gamma-tubulin complex (gamma-TuC) to multiple non-centrosomal microtubule-organizing centers (MTOCs). It also activates gamma-TuC-dependent microtubule nucleation independently of localizing the gamma-TuC. The model corresponds to the twin-cysteine dimerization domain of Mto2. — an NCBI CDD conserved domain (cd21758); members share this curated model.
