identifier: CDD:cd14509
label: "protein tyrosine phosphatase-like catalytic domain of phosphatase and tensin homolog. Phosphatase and tensin homolog (PTEN), also phosphatidylinositol 3,4,5-trisphosphate 3-phosphatase and dual-specificity protein phosphatase PTEN or mutated in multiple advanced cancers 1 (MMAC1), is a tumor suppressor that acts as a dual-specificity protein phosphatase and as a lipid phosphatase. It is a critical endogenous inhibitor of phosphoinositide signaling. It dephosphorylates phosphoinositide trisphosphate, and therefore, has the function of negatively regulating Akt. The PTEN/PI3K/AKT pathway regulates the signaling of multiple biological processes such as apoptosis, metabolism, cell proliferation, and cell growth. PTEN contains an N-terminal PIP-binding domain, a protein tyrosine phosphatase (PTP)-like catalytic domain, a regulatory C2 domain responsible for its cellular location, a C-tail containing phosphorylation sites, and a C-terminal PDZ domain."
definition: >-
