identifier: CDD:cd23262
label: mt-LAF20-like
definition: >-
  mitochondrial large subunit assembly factor 20 (mt-LAF20), and related proteins. mt-LAF20 is a Trypanosoma brucei mitochondrial large subunit (mt-LSU) assembly factor (mt-LAF) that, during the assembly process of the mt-LSU with other assembly factors such as mt-LAF21, mt-LAF22, KRIPP3, mt-LAF27, and mt-LAF28, as well as GTPases mt-EngA, mt-EngB, and Mtg1, is involved in the rearrangement of the region H32-35 of rRNA. Mitochondrial ribosomes (mitoribosomes) are ribonucleoprotein complexes and consist of a large (mt-LSU) and small subunit (mt-SSU). They differ markedly in composition and architecture from their bacterial counterparts, and between different eukaryotic lineages, and their biogenesis involves exchange of assembly factors by ribosomal proteins. An investigation of native assembly intermediates of the mt-LSU from T. brucei identified 28 assembly factors, some of which are homologous to bacterial and eukaryotic ribosome assembly factors. Mitochondrial biogenesis is biomedically important since mutations in mitoribosomal proteins, rRNAs, and assembly factors have been linked to a heterogeneous group of human multisystemic oxidative phosphorylation (OXPHOS) diseases and cancer development and progression
