identifier: CDD:cd17140
label: "Dublecortin-like domain 1 found in doublecortin-like kinase 1 (DCLK1). DCLK1 is a member of doublecortin (DCX) protein superfamily that functions as a microtubule-associated protein (MAP), and contains two conserved tubulin binding domains. The DCX domain has a stable ubiquitin-like tertiary fold. Ubiquitin (Ub) is a protein modifier in eukaryotes that is involved in various cellular processes, including transcriptional regulation, cell cycle control, and DNA repair. In addition to microtubule-binding domains, DCLK encodes a serine/threonine kinase domain that is similar to Ca/calmodulin-dependent (Cam) protein kinases. DCLK1 appears to regulate cyclic AMP signaling and is involved in neuronal migration, retrograde transport, neuronal apoptosis and neurogenesis. Unlike DCX, this DCLK has varying levels of expression throughout embryonic and adult life."
definition: >-
  Dublecortin-like domain 1 found in doublecortin-like kinase 1 (DCLK1). DCLK1 is a member of doublecortin (DCX) protein superfamily that functions as a microtubule-associated protein (MAP), and contains two conserved tubulin binding domains. The DCX domain has a stable ubiquitin-like tertiary fold. Ubiquitin (Ub) is a protein modifier in eukaryotes that is involved in various cellular processes, including transcriptional regulation, cell cycle control, and DNA repair. In addition to microtubule-binding domains, DCLK encodes a serine/threonine kinase domain that is similar to Ca/calmodulin-dependent (Cam) protein kinases. DCLK1 appears to regulate cyclic AMP signaling and is involved in neuronal migration, retrograde transport, neuronal apoptosis and neurogenesis. Unlike DCX, this DCLK has varying levels of expression throughout embryonic and adult life. — an NCBI CDD conserved domain (cd17140); members share this curated model.
