identifier: CDD:cd05121
label: "Activator of bc1 complex (ABC1) kinases (also called aarF domain containing kinase 3) and similar proteins. This family is composed of the atypical yeast protein kinase Abc1p, its human homolog ADCK3 (also called CABC1), and similar proteins. Abc1p (also called Coq8p) is required for the biosynthesis of Coenzyme Q (ubiquinone or Q), which is an essential lipid component in respiratory electron and proton transport. It is necessary for the formation of a multi-subunit Q-biosynthetic complex and may also function in the regulation of Q synthesis. Human ADCK3 is able to rescue defects in Q synthesis and the phosphorylation state of Coq proteins in yeast Abc1 (or Coq8) mutants. Mutations in ADCK3 cause progressive cerebellar ataxia and atrophy due to Q10 deficiency. Eukaryotes contain at least two more ABC1/ADCK3-like proteins: in humans, these are the putative atypical protein kinases named ADCK1 and ADCK2. In algae and higher plants, ABC1 kinases have proliferated to more than 15 subfamilies, most of which are located in plastids or mitochondria. Eight of these plant ABC1 kinase subfamilies (ABC1K1-8) are specific for photosynthetic organisms. ABC1 kinases are not related to the ATP-binding cassette (ABC) membrane transporter family."
definition: >-
  Activator of bc1 complex (ABC1) kinases (also called aarF domain containing kinase 3) and similar proteins. This family is composed of the atypical yeast protein kinase Abc1p, its human homolog ADCK3 (also called CABC1), and similar proteins. Abc1p (also called Coq8p) is required for the biosynthesis of Coenzyme Q (ubiquinone or Q), which is an essential lipid component in respiratory electron and proton transport. It is necessary for the formation of a multi-subunit Q-biosynthetic complex and may also function in the regulation of Q synthesis. Human ADCK3 is able to rescue defects in Q synthesis and the phosphorylation state of Coq proteins in yeast Abc1 (or Coq8) mutants. Mutations in ADCK3 cause progressive cerebellar ataxia and atrophy due to Q10 deficiency. Eukaryotes contain at least two more ABC1/ADCK3-like proteins: in humans, these are the putative atypical protein kinases named ADCK1 and ADCK2. In algae and higher plants, ABC1 kinases have proliferated to more than 15 subfamilies, most of which are located in plastids or mitochondria. Eight of these plant ABC1 kinase subfamilies (ABC1K1-8) are specific for photosynthetic organisms. ABC1 kinases are not related to the ATP-binding cassette (ABC) membrane transporter family. — an NCBI CDD conserved domain (cd05121); members share this curated model.
