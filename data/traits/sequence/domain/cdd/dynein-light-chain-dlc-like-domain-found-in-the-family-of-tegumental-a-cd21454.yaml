identifier: CDD:cd21454
label: "dynein light chain (DLC)-like domain found in the family of tegumental-allergen-like proteins (TALs). Tegumental-allergen-like proteins (TALs), also called tegument antigens, are characterized by two N-terminal EF-hand motifs and a C-terminal region resembling a dynein light chain (DLC)-like domain. They were mainly found in parasitic platyhelminth species. TALs are strongly associated with the tegument, a syncytial structure that forms the outer layer of the organism. They may be involved in the transport of vesicles within the tegumental cytoplasm, probably within dynein motor complexes. The model corresponds to the dynein light chain (DLC)-like domain of TAL."
definition: >-
  dynein light chain (DLC)-like domain found in the family of tegumental-allergen-like proteins (TALs). Tegumental-allergen-like proteins (TALs), also called tegument antigens, are characterized by two N-terminal EF-hand motifs and a C-terminal region resembling a dynein light chain (DLC)-like domain. They were mainly found in parasitic platyhelminth species. TALs are strongly associated with the tegument, a syncytial structure that forms the outer layer of the organism. They may be involved in the transport of vesicles within the tegumental cytoplasm, probably within dynein motor complexes. The model corresponds to the dynein light chain (DLC)-like domain of TAL. — an NCBI CDD conserved domain (cd21454); members share this curated model.
