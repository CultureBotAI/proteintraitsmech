identifier: CDD:cd19638
label: beta16_omp32
definition: >-
  Porin Omp32 domain. Porin Omp32 from Delftia acidovorans (formerly known as Comamonas acidovorans) is closely homologous to the porins of pathogenic Bordetella and Neisseria species. These strongly anion-selective porins consist of a 16-stranded beta barrel. Comamonas acidovorans Omp32 represents the anchor molecule for a peptide which is homologous to proteins that link the outer membrane to the cell wall peptidoglycan. Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane. They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances. Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface
