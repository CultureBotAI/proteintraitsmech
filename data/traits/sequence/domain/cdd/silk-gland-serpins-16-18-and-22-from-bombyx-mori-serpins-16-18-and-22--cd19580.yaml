identifier: CDD:cd19580
label: "silk gland serpins 16, 18, and 22 from Bombyx mori. Serpins 16, 18, and 22 of the silkworm Bombyx mori are found in the silk gland, a highly specialized organ that functions to synthesize and store silk proteins. These three serpins are mainly distributed in the middle silk gland and contain a signal peptide for secretion. They also share high sequence homology (~87%), implying that they might carry out a similar and specific function in the middle silk gland lumen. They have a canonical serpin fold, but contain a unique reactive center loop, which is shorter than that of typical serpins. It is thought that active proteases in silk glands are restricted by serpins until the wandering stage. Studies show that serpins 16 and 18 act as inhibitor of cysteine protease with serpin 18 acting specifically on fibroinase. SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
