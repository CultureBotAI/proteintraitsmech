identifier: CDD:cd05053
label: "Catalytic domain of the Protein Tyrosine Kinases, Fibroblast Growth Factor Receptors. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. The FGFR subfamily consists of FGFR1, FGFR2, FGFR3, FGFR4, and similar proteins. They are receptor PTKs (RTKs) containing an extracellular ligand-binding region with three immunoglobulin-like domains, a transmembrane segment, and an intracellular catalytic domain. The binding of FGFRs to their ligands, the FGFs, and to heparin/heparan sulfate (HS) results in the formation of a ternary complex, which leads to receptor dimerization and activation, and intracellular signaling. There are at least 23 FGFs and four types of FGFRs. The binding of FGFs to FGFRs is promiscuous, in that a receptor may be activated by several ligands and a ligand may bind to more that one type of receptor. FGF/FGFR signaling is important in the regulation of embryonic development, homeostasis, and regenerative processes. Depending on the cell type and stage, FGFR signaling produces diverse cellular responses including proliferation, growth arrest, differentiation, and apoptosis. Aberrant signaling leads to many human diseases such as skeletal, olfactory, and metabolic disorders, as well as cancer. The FGFR subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase ."
definition: >-
  Catalytic domain of the Protein Tyrosine Kinases, Fibroblast Growth Factor Receptors. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. The FGFR subfamily consists of FGFR1, FGFR2, FGFR3, FGFR4, and similar proteins. They are receptor PTKs (RTKs) containing an extracellular ligand-binding region with three immunoglobulin-like domains, a transmembrane segment, and an intracellular catalytic domain. The binding of FGFRs to their ligands, the FGFs, and to heparin/heparan sulfate (HS) results in the formation of a ternary complex, which leads to receptor dimerization and activation, and intracellular signaling. There are at least 23 FGFs and four types of FGFRs. The binding of FGFs to FGFRs is promiscuous, in that a receptor may be activated by several ligands and a ligand may bind to more that one type of receptor. FGF/FGFR signaling is important in the regulation of embryonic development, homeostasis, and regenerative processes. Depending on the cell type and stage, FGFR signaling produces diverse cellular responses including proliferation, growth arrest, differentiation, and apoptosis. Aberrant signaling leads to many human diseases such as skeletal, olfactory, and metabolic disorders, as well as cancer. The FGFR subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase . — an NCBI CDD conserved domain (cd05053); members share this curated model.
