identifier: CDD:cd06874
label: "The phosphoinositide binding Phox Homology domain of KIF16B kinesin or Sorting Nexin 23. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions such as cell signaling, vesicular trafficking, protein sorting, and lipid modification, among others. KIF16B, also called sorting nexin 23 (SNX23), is a family-3 kinesin which harbors an N-terminal kinesin motor domain containing ATP and microtubule binding sites, a ForkHead Associated (FHA) domain, and a C-terminal PX domain. The PX domain of KIF16B  binds to phosphatidylinositol-3-phosphate (PI3P) in early endosomes and plays a role in the transport of early endosomes to the plus end of microtubules. By regulating early endosome plus end motility, KIF16B modulates the balance between recycling and degradation of receptors. SNXs make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway."
definition: >-
  The phosphoinositide binding Phox Homology domain of KIF16B kinesin or Sorting Nexin 23. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions such as cell signaling, vesicular trafficking, protein sorting, and lipid modification, among others. KIF16B, also called sorting nexin 23 (SNX23), is a family-3 kinesin which harbors an N-terminal kinesin motor domain containing ATP and microtubule binding sites, a ForkHead Associated (FHA) domain, and a C-terminal PX domain. The PX domain of KIF16B binds to phosphatidylinositol-3-phosphate (PI3P) in early endosomes and plays a role in the transport of early endosomes to the plus end of microtubules. By regulating early endosome plus end motility, KIF16B modulates the balance between recycling and degradation of receptors. SNXs make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway. — an NCBI CDD conserved domain (cd06874); members share this curated model.
