identifier: CDD:cd12139
label: "Src Homology 3 domain of Bridging integrator 1 (Bin1), also called Amphiphysin-2. Bin1 isoforms are localized in many different tissues and may function in intracellular vesicle trafficking. It plays a role in the organization and maintenance of the T-tubule network in skeletal muscle. Mutations in Bin1 are associated with autosomal recessive centronuclear myopathy. Bin1 contains an N-terminal BAR domain with an additional N-terminal amphipathic helix (an N-BAR) and a C-terminal SH3 domain. The SH3 domain of Bin1 forms transient complexes with actin, myosin filaments, and CDK5, to facilitate sarcomere organization and myofiber maturation. It also binds dynamin and prevents its self-assembly. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Bridging integrator 1 (Bin1), also called Amphiphysin-2. Bin1 isoforms are localized in many different tissues and may function in intracellular vesicle trafficking. It plays a role in the organization and maintenance of the T-tubule network in skeletal muscle. Mutations in Bin1 are associated with autosomal recessive centronuclear myopathy. Bin1 contains an N-terminal BAR domain with an additional N-terminal amphipathic helix (an N-BAR) and a C-terminal SH3 domain. The SH3 domain of Bin1 forms transient complexes with actin, myosin filaments, and CDK5, to facilitate sarcomere organization and myofiber maturation. It also binds dynamin and prevents its self-assembly. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12139); members share this curated model.
