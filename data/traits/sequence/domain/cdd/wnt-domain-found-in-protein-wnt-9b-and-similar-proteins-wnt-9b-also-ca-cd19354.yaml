identifier: CDD:cd19354
label: "Wnt domain found in protein Wnt-9b and similar proteins. Wnt-9b, also called protein Wnt-14b or Wnt-15, functions in the canonical Wnt/beta-catenin signaling pathway. It plays a central role in the regulation of mesenchymal to epithelial transitions underlying organogenesis of the mammalian urogenital system. Wnt genes have been identified in vertebrates and invertebrates, but not in plants, unicellular eukaryotes, or prokaryotes. In humans, 19 WNT proteins are known. Because of their insolubility little is known about Wnt protein structure, but all have 23 or 24 Cys residues whose spacing is highly conserved. Signal transduction by Wnt proteins (including the Wnt/beta-catenin, the Wnt/Ca++, and the Wnt/polarity pathway) is mediated by receptors of the Frizzled and LDL-receptor-related protein (LRP) families. The Wnt signaling mediated by Wnt proteins that orchestrate and influence a myriad of cellular processes, such as cell proliferation, differentiation, tumorigenesis, apoptosis, and participation in immune defense during microbe infection."
definition: >-
  Wnt domain found in protein Wnt-9b and similar proteins. Wnt-9b, also called protein Wnt-14b or Wnt-15, functions in the canonical Wnt/beta-catenin signaling pathway. It plays a central role in the regulation of mesenchymal to epithelial transitions underlying organogenesis of the mammalian urogenital system. Wnt genes have been identified in vertebrates and invertebrates, but not in plants, unicellular eukaryotes, or prokaryotes. In humans, 19 WNT proteins are known. Because of their insolubility little is known about Wnt protein structure, but all have 23 or 24 Cys residues whose spacing is highly conserved. Signal transduction by Wnt proteins (including the Wnt/beta-catenin, the Wnt/Ca++, and the Wnt/polarity pathway) is mediated by receptors of the Frizzled and LDL-receptor-related protein (LRP) families. The Wnt signaling mediated by Wnt proteins that orchestrate and influence a myriad of cellular processes, such as cell proliferation, differentiation, tumorigenesis, apoptosis, and participation in immune defense during microbe infection. — an NCBI CDD conserved domain (cd19354); members share this curated model.
