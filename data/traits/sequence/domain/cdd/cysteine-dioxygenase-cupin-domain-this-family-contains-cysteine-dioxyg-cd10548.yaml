identifier: CDD:cd10548
label: "cysteine dioxygenase, cupin domain. This family contains cysteine dioxygenase (CDO; EC 1.13.11.20), which catalyzes the conversion of cysteine to cysteine sulfinic acid, the first step in the biosynthesis of essential oxidized cysteine metabolites such as sulfate, hypotaurine, and taurine. CDO also plays an important role in the regulation of intracellular cysteine levels in mammals; CDO expression is altered in cancer cells, and abnormal or deficient CDO activity has been linked to Parkinson's disease, Alzheimer's disease, and rheumatoid arthritis. CDO is an iron-dependent thiol dioxygenase that uses molecular oxygen to oxidize the sulfhydryl group of cysteine to generate cysteine sulfinic acid. The CDO active site contains an amino acid-derived cofactor. These enzymes are found in prokaryotes as well as eukaryotes and belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
