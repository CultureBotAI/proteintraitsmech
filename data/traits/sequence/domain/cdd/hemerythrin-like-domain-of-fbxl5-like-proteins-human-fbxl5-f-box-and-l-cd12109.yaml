identifier: CDD:cd12109
label: "Hemerythrin-like domain of FBXL5-like proteins. Human FBXL5 (F-box and leucine-rich repeat protein 5) protein plays a role in cellular iron homeostasis. It is part of an E3 ubiquitin ligase complex that targets the iron regulatory protein IRP2 for proteasomal degradation. The FBXL5's stability is regulated by iron concentration, with its iron- and oxygen-binding hemerythrin domain acting as a ligand-dependent regulatory switch."
definition: >-
  Hemerythrin-like domain of FBXL5-like proteins. Human FBXL5 (F-box and leucine-rich repeat protein 5) protein plays a role in cellular iron homeostasis. It is part of an E3 ubiquitin ligase complex that targets the iron regulatory protein IRP2 for proteasomal degradation. The FBXL5's stability is regulated by iron concentration, with its iron- and oxygen-binding hemerythrin domain acting as a ligand-dependent regulatory switch. — an NCBI CDD conserved domain (cd12109); members share this curated model.
