label: "The MopB_Tetrathionate-Ra CD contains tetrathionate reductase, subunit A, (TtrA) and other related proteins. The Salmonella enterica tetrathionate reductase catalyses the reduction of trithionate but not sulfur or thiosulfate. Members of this CD belong to the molybdopterin_binding (MopB) superfamily of proteins."
definition: >-
  The MopB_Tetrathionate-Ra CD contains tetrathionate reductase, subunit A, (TtrA) and other related proteins. The Salmonella enterica tetrathionate reductase catalyses the reduction of trithionate but not sulfur or thiosulfate. Members of this CD belong to the molybdopterin_binding (MopB) superfamily of proteins. — an NCBI CDD conserved domain (cd02758); members share this curated model.
