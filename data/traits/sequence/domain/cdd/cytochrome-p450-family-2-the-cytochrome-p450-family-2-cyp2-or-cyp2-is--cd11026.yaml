identifier: CDD:cd11026
label: "cytochrome P450 family 2. The cytochrome P450 family 2 (CYP2 or Cyp2) is one of the largest, most diverse CYP families in vertebrates. It includes many subfamilies across vertebrate species but not all subfamilies are found in multiple vertebrate taxonomic classes. The CYP2U and CYP2R genes are present in the vertebrate ancestor and are shared across all vertebrate classes, whereas some subfamilies are lineage-specific, such as CYP2B and CYP2S in mammals. CYP2 enzymes play important roles in drug metabolism. The CYP2 family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
