identifier: CDD:cd18298
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in RCC1 and BTB domain-containing proteins, RCBTB1 and RCBTB2. The RCC1-related guanine nucleotide exchange factor (GEF) family includes RCC1 and BTB domain-containing proteins, RCBTB1 and RCBTB2, both of which are chromosome condensation regulator-like guanine nucleotide exchange factors. They contain an RCC1 repeat, a BTB domain, and a BACK domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in RCC1 and BTB domain-containing proteins, RCBTB1 and RCBTB2. The RCC1-related guanine nucleotide exchange factor (GEF) family includes RCC1 and BTB domain-containing proteins, RCBTB1 and RCBTB2, both of which are chromosome condensation regulator-like guanine nucleotide exchange factors. They contain an RCC1 repeat, a BTB domain, and a BACK domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18298); members share this curated model.
