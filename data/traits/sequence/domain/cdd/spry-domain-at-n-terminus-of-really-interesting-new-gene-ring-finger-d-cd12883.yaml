identifier: CDD:cd12883
label: "SPRY domain at N-terminus of Really Interesting New Gene (RING) finger domain. This SPRY domain is found at the N-terminus of RING finger domains which are present in a variety of functionally distinct proteins and known to be involved in protein-protein and protein-DNA interactions. RING-finger domain is a type of Zn-finger that binds two Zn atoms and is identified in proteins with a wide range of functions such as viral replication, signal transduction, and development."
definition: >-
  SPRY domain at N-terminus of Really Interesting New Gene (RING) finger domain. This SPRY domain is found at the N-terminus of RING finger domains which are present in a variety of functionally distinct proteins and known to be involved in protein-protein and protein-DNA interactions. RING-finger domain is a type of Zn-finger that binds two Zn atoms and is identified in proteins with a wide range of functions such as viral replication, signal transduction, and development. — an NCBI CDD conserved domain (cd12883); members share this curated model.
