identifier: CDD:cd14825
label: "Trafficking protein particle complex subunit 2. Trafficking protein particle complex subunit 2 (TRAPPC2), also known as Sedlin (SEDL) or TRS20, has been identified as a component of the transport protein particle (TRAPP), required for tethering endoplasmic reticulum (ER)-derived vesicles to Golgi membranes and for Golgi traffic. In humans, deletions or point mutations in the SEDL gene cause the genetic disease spondyloepiphyseal dysplasia tarda (SEDT), an X-linked skeletal disorder."
definition: >-
  Trafficking protein particle complex subunit 2. Trafficking protein particle complex subunit 2 (TRAPPC2), also known as Sedlin (SEDL) or TRS20, has been identified as a component of the transport protein particle (TRAPP), required for tethering endoplasmic reticulum (ER)-derived vesicles to Golgi membranes and for Golgi traffic. In humans, deletions or point mutations in the SEDL gene cause the genetic disease spondyloepiphyseal dysplasia tarda (SEDT), an X-linked skeletal disorder. — an NCBI CDD conserved domain (cd14825); members share this curated model.
