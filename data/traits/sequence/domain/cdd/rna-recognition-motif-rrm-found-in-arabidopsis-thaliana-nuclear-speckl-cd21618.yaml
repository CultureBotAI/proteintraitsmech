identifier: CDD:cd21618
label: "RNA recognition motif (RRM) found in Arabidopsis thaliana nuclear speckle RNA-binding protein A (AtNSRA) and similar protein. AtNSRA is an alternative splicing (AS) regulator that binds to specific mRNAs and modulates auxin effects on the transcriptome. It can be displaced from its targets upon binding to AS competitor long non-coding RNA (ASCO-RNA). Members in this family contain an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain)."
definition: >-
  RNA recognition motif (RRM) found in Arabidopsis thaliana nuclear speckle RNA-binding protein A (AtNSRA) and similar protein. AtNSRA is an alternative splicing (AS) regulator that binds to specific mRNAs and modulates auxin effects on the transcriptome. It can be displaced from its targets upon binding to AS competitor long non-coding RNA (ASCO-RNA). Members in this family contain an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain). — an NCBI CDD conserved domain (cd21618); members share this curated model.
