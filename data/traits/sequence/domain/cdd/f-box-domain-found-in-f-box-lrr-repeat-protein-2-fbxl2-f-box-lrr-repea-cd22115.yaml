identifier: CDD:cd22115
label: "F-box domain found in F-box/LRR-repeat protein 2 (FBXL2), F-box/LRR-repeat protein 20 (FBXL20) and similar proteins. The family includes FBXL2 and FBXL30. FBXL2, also called F-box and leucine-rich repeat protein 2, or F-box protein FBL2/FBL3, is a calcium-activated substrate-recognition component of an SCF (SKP1-cullin-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. Unlike many F-box proteins, FBXL2 does not seem to target phosphodegron within its substrates but rather calmodulin-binding motifs and is thereby antagonized by calmodulin. FBXL20, also called SCRAPPER, F-box and leucine-rich repeat protein 20, or F-box/LRR-repeat protein 2-like, is a component of a synapse-localized SCF-type E3 ubiquitin ligase which regulates neural transmission. It is widely expressed in the central nervous system and plays an important role in the ubiquitin-dependent degradation of regulating synaptic membrane exocytosis 1 (RIM1), which is an important factor in the release of synaptic vesicles. It may also mediate the ubiquitin degradation of E-cadherin resulting in an increased invasive ability of malignant cells. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box/LRR-repeat protein 2 (FBXL2), F-box/LRR-repeat protein 20 (FBXL20) and similar proteins. The family includes FBXL2 and FBXL30. FBXL2, also called F-box and leucine-rich repeat protein 2, or F-box protein FBL2/FBL3, is a calcium-activated substrate-recognition component of an SCF (SKP1-cullin-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. Unlike many F-box proteins, FBXL2 does not seem to target phosphodegron within its substrates but rather calmodulin-binding motifs and is thereby antagonized by calmodulin. FBXL20, also called SCRAPPER, F-box and leucine-rich repeat protein 20, or F-box/LRR-repeat protein 2-like, is a component of a synapse-localized SCF-type E3 ubiquitin ligase which regulates neural transmission. It is widely expressed in the central nervous system and plays an important role in the ubiquitin-dependent degradation of regulating synaptic membrane exocytosis 1 (RIM1), which is an important factor in the release of synaptic vesicles. It may also mediate the ubiquitin degradation of E-cadherin resulting in an increased invasive ability of malignant cells. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22115); members share this curated model.
