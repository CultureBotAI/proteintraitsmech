identifier: CDD:cd05677
label: "M20 Defective in Utilization of Glutathione-type peptidases containing WD repeats. Peptidase M20 family, Defective in Utilization of Glutathione (DUG2) subfamily. DUG2-type proteins are metallopeptidases containing WD repeats at the N-terminus. DUG2 proteins are involved in the alternative pathway of glutathione (GSH) degradation. GSH, the major low-molecular-weight thiol compound in most eukaryotic cells, is normally degraded through the gamma-glutamyl cycle initiated by gamma-glutamyl transpeptidase. However, a novel pathway for the degradation of GSH has been characterized; it requires the participation of three genes identified in Saccharomyces cerevisiae as \"defective in utilization of glutathione\" genes including DUG1, DUG2, and DUG3. DUG1 encodes a probable di- or tri-peptidase identified as M20 metallopeptidase, DUG2 gene encodes a protein with a metallopeptidase domain and a large N-terminal WD40 repeat region, while DUG3 encodes a protein with a glutamine amidotransferase domain. Although dipeptides and tripeptides with a normal peptide bond, such as cys-gly or glu-cys-gly, can be hydrolyzed by the DUG1 protein, the presence of an unusual peptide bond, like in GSH, requires the participation of the DUG2 and DUG3 proteins as well. These three proteins form a GSH degradosomal complex."
definition: >-
  M20 Defective in Utilization of Glutathione-type peptidases containing WD repeats. Peptidase M20 family, Defective in Utilization of Glutathione (DUG2) subfamily. DUG2-type proteins are metallopeptidases containing WD repeats at the N-terminus. DUG2 proteins are involved in the alternative pathway of glutathione (GSH) degradation. GSH, the major low-molecular-weight thiol compound in most eukaryotic cells, is normally degraded through the gamma-glutamyl cycle initiated by gamma-glutamyl transpeptidase. However, a novel pathway for the degradation of GSH has been characterized; it requires the participation of three genes identified in Saccharomyces cerevisiae as "defective in utilization of glutathione" genes including DUG1, DUG2, and DUG3. DUG1 encodes a probable di- or tri-peptidase identified as M20 metallopeptidase, DUG2 gene encodes a protein with a metallopeptidase domain and a large N-terminal WD40 repeat region, while DUG3 encodes a protein with a glutamine amidotransferase domain. Although dipeptides and tripeptides with a normal peptide bond, such as cys-gly or glu-cys-gly, can be hydrolyzed by the DUG1 protein, the presence of an unusual peptide bond, like in GSH, requires the participation of the DUG2 and DUG3 proteins as well. These three proteins form a GSH degradosomal complex. — an NCBI CDD conserved domain (cd05677); members share this curated model.
