identifier: CDD:cd20155
label: "PWWP domain found in DNA (cytosine-5)-methyltransferase 3B (DNMT3B). DNMT3B, also called DNA methyltransferase HsaIIIB, DNA MTase HsaIIIB, or M.HsaIIIB, is required for genome-wide de novo methylation and is essential for the establishment of DNA methylation patterns during development. It may preferentially methylate nucleosomal DNA within the nucleosome core region. DNMT3B may function as a transcriptional co-repressor by associating with CBX4 and independently of DNA methylation. In tumorigenesis, DNA methylation by DNMT3B is known to play a role in the inactivation of tumor suppressor genes. In addition, a point mutation in the PWWP domain of DNMT3B has been identified in patients with ICF (immunodeficiency, centromeric instability, and facial anomalies) syndrome, a rare autosomal recessive disorder characterized by hypomethylation of classical satellite DNA."
definition: >-
