label: NSA2
definition: >-
  pre-ribosomal protein NSA2 (Nop seven-associated 2). NSA2 appears to be a protein required for the maturation of 27S pre-rRNA in yeast; it has been characterized in mammalian cells as a nucleolar protein that might play a role in the regulation of the cell cycle and in cell proliferation
