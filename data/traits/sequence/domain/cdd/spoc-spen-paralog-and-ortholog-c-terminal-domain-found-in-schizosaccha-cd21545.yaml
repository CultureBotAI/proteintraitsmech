identifier: CDD:cd21545
label: "SPOC (Spen paralog and ortholog C-terminal) domain found in Schizosaccharomyces pombe chromo domain-containing protein 1 (Chp1p) and similar proteins. Chp1p is a component of the kinetochore that plays a role in stabilizing microtubules and thus, allowing accurate chromosome segregation. It has a role in the RNA interference (RNAi) pathway which is important for heterochromatin formation and accurate chromosome segregation. Chp1p is also a member of the RNA-induced transcriptional silencing (RITS) complex, which is involved in the biosynthesis of dsRNA from primer siRNAs provided by the RNA-directed RNA polymerase (RDRC) complex. The C-terminal portion of Chp1p contains three domains: SPOC,  II, and PIN domains. This model corresponds to the SPOC domain that is involved in developmental signaling and has also been proposed to be a phosphorylation binding module."
definition: >-
  SPOC (Spen paralog and ortholog C-terminal) domain found in Schizosaccharomyces pombe chromo domain-containing protein 1 (Chp1p) and similar proteins. Chp1p is a component of the kinetochore that plays a role in stabilizing microtubules and thus, allowing accurate chromosome segregation. It has a role in the RNA interference (RNAi) pathway which is important for heterochromatin formation and accurate chromosome segregation. Chp1p is also a member of the RNA-induced transcriptional silencing (RITS) complex, which is involved in the biosynthesis of dsRNA from primer siRNAs provided by the RNA-directed RNA polymerase (RDRC) complex. The C-terminal portion of Chp1p contains three domains: SPOC, II, and PIN domains. This model corresponds to the SPOC domain that is involved in developmental signaling and has also been proposed to be a phosphorylation binding module. — an NCBI CDD conserved domain (cd21545); members share this curated model.
