identifier: CDD:cd22837
label: "third galactose/rhamnose binding lectin domain found in Silurus asotus rhamnose-binding lectin (RBL) and similar proteins. RBL, also known as Silurus asotus (catfish) roe lectin (SAL), is a lectin that binds L-rhamnose. It also binds monosaccharides possessing steric similarity to the hydroxyl group orientation at C2 and C4 of the pyranose ring structure of L-rhamnose, such as L-mannose and L-lyxose. RBL does not require a Ca2+ ion or free thiol group for its agglutination activity. RBL contains three galactose/rhamnose-binding lectin domains. This model corresponds to the third one."
definition: >-
  third galactose/rhamnose binding lectin domain found in Silurus asotus rhamnose-binding lectin (RBL) and similar proteins. RBL, also known as Silurus asotus (catfish) roe lectin (SAL), is a lectin that binds L-rhamnose. It also binds monosaccharides possessing steric similarity to the hydroxyl group orientation at C2 and C4 of the pyranose ring structure of L-rhamnose, such as L-mannose and L-lyxose. RBL does not require a Ca2+ ion or free thiol group for its agglutination activity. RBL contains three galactose/rhamnose-binding lectin domains. This model corresponds to the third one. — an NCBI CDD conserved domain (cd22837); members share this curated model.
