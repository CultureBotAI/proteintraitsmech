identifier: CDD:cd00243
label: "Sp18 and Lysin from Archaegastropoda (marine mollusks of the families Halotidae and Trochidae) sperm. Both proteins play an important role in fertilization: sp18 mediates fusion between sperm and egg cell membrane, lysin dissolves the vitelline envelope surrounding the egg; they are believed to be a product of gene duplication and subsequent divergence."
definition: >-
