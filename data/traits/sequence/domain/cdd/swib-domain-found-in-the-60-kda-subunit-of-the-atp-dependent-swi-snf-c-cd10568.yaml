identifier: CDD:cd10568
label: "SWIB domain found in the 60 kda subunit of the ATP-dependent SWI/SNF chromatin-remodeling complexes and similar proteins. SWIB domain is a conserved region found within proteins in the SWI/SNF family of complexes. SWI/SNF complex proteins display helicase and ATPase activities and are thought to regulate transcription of certain genes by altering the chromatin structure around those genes. The mammalian complexes are made up of 9-12 proteins called BAFs (BRG1-associated factors), among which the BAF60 subunit serves as a key link between the core complexes and specific transcriptional factors. The BAF60 subunit have at least three members: BAF60a, which is ubiquitous, BAF60b and BAF60c, which are expressed in muscle and pancreatic tissues, respectively. The family also includes Saccharomyces cerevisiae transcription regulatory protein SNF12 and remodel the structure of chromatin complex subunit 6 (RSC6), and Schizosaccharomyces pombe SWI/SNF and RSC complexes subunit SSR3. SNF12, also termed 73-kDa subunit of the SWI/SNF transcriptional regulatory complex, or SWI/SNF complex component SWP73, is involved in transcriptional activation and repression of select genes by chromatin remodeling (alteration of DNA-nucleosome topology). RSC6 and SSR3 are components of the RSC, which is involved in transcription regulation and nucleosome positioning. RSC6 is essential for mitotic growth and suppresses formamide sensitivity of the RSC8 mutants."
definition: >-
  SWIB domain found in the 60 kda subunit of the ATP-dependent SWI/SNF chromatin-remodeling complexes and similar proteins. SWIB domain is a conserved region found within proteins in the SWI/SNF family of complexes. SWI/SNF complex proteins display helicase and ATPase activities and are thought to regulate transcription of certain genes by altering the chromatin structure around those genes. The mammalian complexes are made up of 9-12 proteins called BAFs (BRG1-associated factors), among which the BAF60 subunit serves as a key link between the core complexes and specific transcriptional factors. The BAF60 subunit have at least three members: BAF60a, which is ubiquitous, BAF60b and BAF60c, which are expressed in muscle and pancreatic tissues, respectively. The family also includes Saccharomyces cerevisiae transcription regulatory protein SNF12 and remodel the structure of chromatin complex subunit 6 (RSC6), and Schizosaccharomyces pombe SWI/SNF and RSC complexes subunit SSR3. SNF12, also termed 73-kDa subunit of the SWI/SNF transcriptional regulatory complex, or SWI/SNF complex component SWP73, is involved in transcriptional activation and repression of select genes by chromatin remodeling (alteration of DNA-nucleosome topology). RSC6 and SSR3 are components of the RSC, which is involved in transcription regulation and nucleosome positioning. RSC6 is essential for mitotic growth and suppresses formamide sensitivity of the RSC8 mutants. — an NCBI CDD conserved domain (cd10568); members share this curated model.
