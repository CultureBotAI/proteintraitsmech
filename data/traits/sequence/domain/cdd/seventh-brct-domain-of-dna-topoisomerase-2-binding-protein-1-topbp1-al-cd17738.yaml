identifier: CDD:cd17738
label: "seventh BRCT domain of DNA topoisomerase 2-binding protein 1. TopBP1, also termed DNA topoisomerase II-beta-binding protein 1, or DNA topoisomerase II-binding protein 1, functions in DNA replication and damage response. It binds double-stranded DNA breaks and nicks as well as single-stranded DNA. TopBP1 contains six copies of BRCT domain. The family corresponds to the seventh BRCT domain. The Trp-X-X-X-Cys/Ser signature motif of the BRCT family is missing in this group."
definition: >-
  seventh BRCT domain of DNA topoisomerase 2-binding protein 1. TopBP1, also termed DNA topoisomerase II-beta-binding protein 1, or DNA topoisomerase II-binding protein 1, functions in DNA replication and damage response. It binds double-stranded DNA breaks and nicks as well as single-stranded DNA. TopBP1 contains six copies of BRCT domain. The family corresponds to the seventh BRCT domain. The Trp-X-X-X-Cys/Ser signature motif of the BRCT family is missing in this group. — an NCBI CDD conserved domain (cd17738); members share this curated model.
