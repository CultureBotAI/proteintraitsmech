identifier: CDD:cd14406
label: "UBA domain found in serine/threonine-protein kinase MARK2 and similar proteins. MARK2, also called ELKL motif kinase 1 (EMK-1), MAP/microtubule affinity-regulating kinase 2, PAR1 homolog, or PAR1 homolog b (Par-1b), is enriched in brain. It belongs to the AMPK family of Ser/Thr kinases. MARK2 has been implicated in regulating fertility, immune homeostasis, learning, and memory as well as adiposity, insulin hypersensitivity, and glucose metabolism. The activity of MARK2 is necessary for the outgrowth of cell processes, neurites, and dendritic spines. It is a TORC2 (also known as Crtc2) Ser-275 kinase that blocks TORC2-induced cAMP response element binding protein (CREB) activity. It regulates axon formation via phosphorylation of a kinesin-like motor protein GAKIN/KIF13B. It also acts as a positive regulator of Wnt-beta-catenin signaling."
