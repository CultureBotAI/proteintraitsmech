identifier: CDD:cd19040
label: "extracellular domain of gamma-aminobutyric acid receptor subunit beta-1 (GABAAR-B1 or GABRB1). This family contains extracellular domain (ECD) of gamma-aminobutyric acid receptor beta-1 subunit, a protein that is encoded by the GABRB1 gene. GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Upon gamma-aminobutyric acid (GABA) binding to the ligand binding site on the ECD, Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. The beta-1 subunit forms heteropentamers with other GABAAR subunits, likely expressed as alpha-beta1-gamma/delta, mainly found in the brain. It is clustered on the chromosome with genes encoding alpha 4, alpha 2, and gamma 1 subunits of the GABAAR. GABRB1 expression is altered significantly in the lateral cerebellum of subjects with schizophrenia, major depression, and bipolar disorder. Mutations in the GABRB1 gene promote alcohol consumption through increased tonic inhibition. Epigenetic control of gene expression may affect the expression of GABRB1 and disrupt inhibitory synaptic transmission during embryonic development. The GABRB1 gene is also associated with thalamus volume and modulates the association between thalamus volume and intelligence."
