label: TGF_beta_BMP2
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in bone morphogenetic protein 2 (BMP-2) and similar proteins. BMP-2, also termed BMP-2A, induces cartilage and bone formation. It stimulates the differentiation of myoblasts into osteoblasts via the EIF2AK3-EIF2A- ATF4 pathway
