identifier: CDD:cd05415
label: "Nucleotidyltransferase (NT) domain of Rel-Spo family proteins.; uncharacterized subgroup. NT_Rel-Spo: A subgroup of the catalytic domain found in Rel-Spo family proteins. The Rel-Spo family includes proteins similar to Escherichia coli ppGpp synthetase (RelA) and ppGpp synthetase/hydrolase (SpoT) and Streptococcus equisimilis Rel/Spo (SeqRel). Bacterial Rel-Spo family enzymes produce an intracellular signaling alarmone guanosine 5prime, 3prime-polyphosphate [(p)ppGpp] that triggers the stringent response, enabling bacteria to survive extended periods of nutrient limitation. (p)ppGpp is synthesized in E. coli, by RelA in response to amino-acid starvation and by SpoT under conditions of carbon limitation. In vivo the degradation activity [(p)ppGpp hydrolase] of SpoT is more abundant than its synthetic activity. Gram-positive organisms appear to have a single bifunctional Rel-Spo enzyme with both (p)ppGpp synthesis and degradation activities. For S.  equisimilis SeqRel these two activities are located to two domains within the same monomer, under reciprocal regulation. However, E.coli RelA/SpoT and S. equisimilis SeqRel, are not found in this subgroup. Proteins in this subgroup lack the N-terminal HD domain and presumably its (p)ppGpp hydrolysis activity. Little functional information is available proteins in this subgroup. Proteins in this subgroup belong to the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. Two of the three catalytic carboxylates are found in Rel-Spo enzymes, missing is the second carboxylate of the DXD motif. Evidence supports a single-cation synthetase mechanism."
definition: >-
  Nucleotidyltransferase (NT) domain of Rel-Spo family proteins.; uncharacterized subgroup. NT_Rel-Spo: A subgroup of the catalytic domain found in Rel-Spo family proteins. The Rel-Spo family includes proteins similar to Escherichia coli ppGpp synthetase (RelA) and ppGpp synthetase/hydrolase (SpoT) and Streptococcus equisimilis Rel/Spo (SeqRel). Bacterial Rel-Spo family enzymes produce an intracellular signaling alarmone guanosine 5prime, 3prime-polyphosphate [(p)ppGpp] that triggers the stringent response, enabling bacteria to survive extended periods of nutrient limitation. (p)ppGpp is synthesized in E. coli, by RelA in response to amino-acid starvation and by SpoT under conditions of carbon limitation. In vivo the degradation activity [(p)ppGpp hydrolase] of SpoT is more abundant than its synthetic activity. Gram-positive organisms appear to have a single bifunctional Rel-Spo enzyme with both (p)ppGpp synthesis and degradation activities. For S. equisimilis SeqRel these two activities are located to two domains within the same monomer, under reciprocal regulation. However, E.coli RelA/SpoT and S. equisimilis SeqRel, are not found in this subgroup. Proteins in this subgroup lack the N-terminal HD domain and presumably its (p)ppGpp hydrolysis activity. Little functional information is available proteins in this subgroup. Proteins in this subgroup belong to the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. Two of the three catalytic carboxylates are found in Rel-Spo enzymes, missing is the second carboxylate of the DXD motif. Evidence supports a single-cation synthetase mechanism. — an NCBI CDD conserved domain (cd05415); members share this curated model.
