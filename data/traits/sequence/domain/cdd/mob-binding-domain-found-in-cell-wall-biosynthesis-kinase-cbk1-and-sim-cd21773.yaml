identifier: CDD:cd21773
label: "Mob-binding domain found in cell wall biosynthesis kinase CBK1 and similar proteins. This group is composed of fungal NDR/LATS family proteins including Saccharomyces cerevisiae CBK1 (or CBK1p), Schizosaccharomyces pombe Orb6 (or Orb6p) and Neurospora crassa Cot1. CBK1 is an essential component in the RAM (regulation of Ace2p activity and cellular morphogenesis) network. CBK1 and Orb6 play similar roles in coordinating cell morphology with cell cycle progression. Cot1 plays a role in polar tip extension. NDR/LATS kinases bind to highly conserved Mob (Mps One binder) coactivators, forming regulatory complexes that control a diverse set of in vivo effector proteins, and are essential and evolutionarily conserved components of \"Hippo\" signaling pathways. Mob association creates a novel binding pocket that participates in the formation of the active state of NDR/LATS kinases. Kinases in this subfamily contain a regulatory domain located N-terminal to the serine/threonine kinase domain (called the N-terminal regulatory (NTR) domain) and an insert within the catalytic domain that contains an auto-inhibitory sequence. This model corresponds to the NTR or Mob-binding domain of CBK1 and similar serine/threonine protein kinases."
definition: >-
  Mob-binding domain found in cell wall biosynthesis kinase CBK1 and similar proteins. This group is composed of fungal NDR/LATS family proteins including Saccharomyces cerevisiae CBK1 (or CBK1p), Schizosaccharomyces pombe Orb6 (or Orb6p) and Neurospora crassa Cot1. CBK1 is an essential component in the RAM (regulation of Ace2p activity and cellular morphogenesis) network. CBK1 and Orb6 play similar roles in coordinating cell morphology with cell cycle progression. Cot1 plays a role in polar tip extension. NDR/LATS kinases bind to highly conserved Mob (Mps One binder) coactivators, forming regulatory complexes that control a diverse set of in vivo effector proteins, and are essential and evolutionarily conserved components of "Hippo" signaling pathways. Mob association creates a novel binding pocket that participates in the formation of the active state of NDR/LATS kinases. Kinases in this subfamily contain a regulatory domain located N-terminal to the serine/threonine kinase domain (called the N-terminal regulatory (NTR) domain) and an insert within the catalytic domain that contains an auto-inhibitory sequence. This model corresponds to the NTR or Mob-binding domain of CBK1 and similar serine/threonine protein kinases. — an NCBI CDD conserved domain (cd21773); members share this curated model.
