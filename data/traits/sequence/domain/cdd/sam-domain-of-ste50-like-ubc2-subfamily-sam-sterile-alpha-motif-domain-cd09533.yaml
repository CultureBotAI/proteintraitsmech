identifier: CDD:cd09533
label: "SAM domain of Ste50_like (ubc2) subfamily. SAM (sterile alpha motif) domain of Ste50-like (or Ubc2 for Ustilago bypass of cyclase) subfamily is a putative protein-protein interaction domain. This group includes only fungal proteins. Basidiomycetes have an N-terminal SAM domain, central UBQ domain, and C-terminal SH3 domain, while Ascomycetes lack the SH3 domain. Ubc2 of Ustilago maydis is a major virulence and maize pathogenicity factor. It is required for filamentous growth (the budding haploid form of Ustilago maydis is a saprophyte, while filamentous dikaryotic form is a pathogen). Also the Ubc2 protein is involved in the pheromone-responsive morphogenesis via the MAP kinase cascade. The SAM domain is necessary for ubc2 function; deletion of SAM eliminates this function.  A Lys-to-Glu mutation in the SAM domain of ubc2 gene induces temperature sensitivity."
definition: >-
  SAM domain of Ste50_like (ubc2) subfamily. SAM (sterile alpha motif) domain of Ste50-like (or Ubc2 for Ustilago bypass of cyclase) subfamily is a putative protein-protein interaction domain. This group includes only fungal proteins. Basidiomycetes have an N-terminal SAM domain, central UBQ domain, and C-terminal SH3 domain, while Ascomycetes lack the SH3 domain. Ubc2 of Ustilago maydis is a major virulence and maize pathogenicity factor. It is required for filamentous growth (the budding haploid form of Ustilago maydis is a saprophyte, while filamentous dikaryotic form is a pathogen). Also the Ubc2 protein is involved in the pheromone-responsive morphogenesis via the MAP kinase cascade. The SAM domain is necessary for ubc2 function; deletion of SAM eliminates this function. A Lys-to-Glu mutation in the SAM domain of ubc2 gene induces temperature sensitivity. — an NCBI CDD conserved domain (cd09533); members share this curated model.
