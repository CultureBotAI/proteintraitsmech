identifier: CDD:cd23534
label: "extracellular domain (ECD) found in activin receptor-like kinase 1 (ALK-1) and similar proteins. ALK-1 ((EC 2.7.11.30), also called ACVRL1, or ACVRLK1, or serine/threonine-protein kinase receptor R3 (SKR3), or TGF-B superfamily receptor type I (TSR-I)) acts as type I receptor for TGF-beta family ligands BMP9/GDF2 and BMP10 and important regulator of normal blood vessel development. On ligand binding, it forms a receptor complex consisting of two type II and two type I transmembrane serine/threonine kinases. Type II receptors phosphorylate and activate type I receptors which autophosphorylate, then bind and activate SMAD transcriptional regulators. ALK-1 may bind activin as well. This model corresponds to the extracellular domain (ECD) of ALK-1, which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in activin receptor-like kinase 1 (ALK-1) and similar proteins. ALK-1 ((EC 2.7.11.30), also called ACVRL1, or ACVRLK1, or serine/threonine-protein kinase receptor R3 (SKR3), or TGF-B superfamily receptor type I (TSR-I)) acts as type I receptor for TGF-beta family ligands BMP9/GDF2 and BMP10 and important regulator of normal blood vessel development. On ligand binding, it forms a receptor complex consisting of two type II and two type I transmembrane serine/threonine kinases. Type II receptors phosphorylate and activate type I receptors which autophosphorylate, then bind and activate SMAD transcriptional regulators. ALK-1 may bind activin as well. This model corresponds to the extracellular domain (ECD) of ALK-1, which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23534); members share this curated model.
