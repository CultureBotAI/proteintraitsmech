identifier: CDD:cd22708
label: "forkhead associated (FHA) domain found in the kinesin-like protein KIF16 family. The KIF16 family includes StARD9/KIF16A and KIF16B. StARD9, also called START domain-containing protein 9, or kinesin-like protein KIF16A, is a microtubule-dependent motor protein required for spindle pole assembly during mitosis. It is required to stabilize the pericentriolar material (PCM). KIF16B, also called sorting nexin-23, is a plus end-directed microtubule-dependent motor protein involved in endosome transport and receptor recycling and degradation. It regulates the plus end motility of early endosomes and the balance between recycling and degradation of receptors such as EGF receptor (EGFR) and FGF receptor (FGFR). It regulates the Golgi to endosome transport of FGFR-containing vesicles during early development, a key process for developing basement membrane and epiblast and primitive endoderm lineages during early postimplantation development. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine."
definition: >-
  forkhead associated (FHA) domain found in the kinesin-like protein KIF16 family. The KIF16 family includes StARD9/KIF16A and KIF16B. StARD9, also called START domain-containing protein 9, or kinesin-like protein KIF16A, is a microtubule-dependent motor protein required for spindle pole assembly during mitosis. It is required to stabilize the pericentriolar material (PCM). KIF16B, also called sorting nexin-23, is a plus end-directed microtubule-dependent motor protein involved in endosome transport and receptor recycling and degradation. It regulates the plus end motility of early endosomes and the balance between recycling and degradation of receptors such as EGF receptor (EGFR) and FGF receptor (FGFR). It regulates the Golgi to endosome transport of FGFR-containing vesicles during early development, a key process for developing basement membrane and epiblast and primitive endoderm lineages during early postimplantation development. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine. — an NCBI CDD conserved domain (cd22708); members share this curated model.
