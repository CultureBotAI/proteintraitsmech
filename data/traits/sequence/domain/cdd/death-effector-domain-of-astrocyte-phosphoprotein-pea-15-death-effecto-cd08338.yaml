identifier: CDD:cd08338
label: "Death Effector Domain of Astrocyte phosphoprotein PEA-15. Death Effector Domain (DED) similar to that found in PEA-15 (Astrocyte phosphoprotein PEA-15). PEA-15 is a multifunctional phosphoprotein that modulates signaling pathways, like the ERK MAP kinase cascade by binding to ERK and changing its subcellular localization. It has been implicated in apoptosis, cell proliferation, and glucose metabolism. It does not possess enzymatic activity and mainly acts as an adaptor protein. PEA-15 contains an N-terminal DED domain and a C-terminal disordered region. DEDs comprise a subfamily of the Death Domain (DD) superfamily. DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including PYRIN and CARD (Caspase activation and recruitment domain). They serve as adaptors in signaling pathways and they can recruit other proteins into signaling complexes."
definition: >-
