identifier: CDD:cd15467
label: MV-h
definition: >-
  Measles virus hemagglutinin. The hemagglutinin (H) of measles virus plays several roles during viral infection; it participates in virus attachment to host cells via binding to a proteinaceous receptor and it has a stimulating effect on membrane fusion during the entry of the virus into the host cell by interacting with the fusion protein F. This model characterizes the globular ectodomain of measles hemagglutinin, minus the stalk region. Receptors for measles virus have been identified as the signaling lymphocyte activation molecule (SLAM, in particular its distal ectodomain), CD46, and nectin-4 in epithelial cells
