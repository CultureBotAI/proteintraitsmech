identifier: CDD:cd15838
label: "Tumor necrosis factor receptor superfamily member 27 (TNFRSF27), also known as ectodysplasin A2 receptor (EDA2R) or X-linked ectodermal dysplasia receptor (XEDAR). TNFRSF27 (also known as ectodysplasin A2 receptor (EDA2R), X-linked ectodermal dysplasia receptor (XEDAR), EDAA2R, EDA-A2R) has two isoforms, EDA-A1 and EDA-A2, that are encoded by the anhidrotic ectodermal dysplasia (EDA) gene. It is highly expressed during embryonic development and binds to ectodysplasin-A2 (EDA-A2), playing a crucial role in the p53-signaling pathway. EDA2R is a direct p53 target that is frequently down-regulated in colorectal cancer tissues due to its epigenetic alterations or through the p53 gene mutations. Mutations in the EDA-A2/XEDAR signaling give rise to ectodermal dysplasia, characterized by loss of hair, sweat glands, and teeth. A non-synonymous SNP on EDA2R, along with genetic variants in human androgen receptor is associated with androgenetic alopecia (AGA)."
definition: >-
