identifier: CDD:cd02990
label: "UAS family, FAS-associated factor 1 (FAF1) subfamily; FAF1 contains a UAS domain of unknown function N-terminal to a ubiquitin-associated UBX domain. FAF1 also contains ubiquitin-associated UBA and nuclear targeting domains, N-terminal to the UAS domain. FAF1 is an apoptotic signaling molecule that acts downstream in the Fas signal transduction pathway. It interacts with the cytoplasmic domain of Fas, but not to a Fas mutant that is deficient in signal transduction. It is widely expressed in adult and embryonic tissues, and in tumor cell lines, and is localized not only in the cytoplasm where it interacts with Fas, but also in the nucleus. FAF1 contains phosphorylation sites for protein kinase CK2 within the nuclear targeting domain. Phosphorylation influences nuclear localization of FAF1 but does not affect its potentiation of Fas-induced apoptosis. Other functions have also been attributed to FAF1. It inhibits nuclear factor-kB (NF-kB) by interfering with the nuclear translocation of the p65 subunit. FAF1 also interacts with valosin-containing protein (VCP), which is involved in the ubiquitin-proteosome pathway."
definition: >-
  UAS family, FAS-associated factor 1 (FAF1) subfamily; FAF1 contains a UAS domain of unknown function N-terminal to a ubiquitin-associated UBX domain. FAF1 also contains ubiquitin-associated UBA and nuclear targeting domains, N-terminal to the UAS domain. FAF1 is an apoptotic signaling molecule that acts downstream in the Fas signal transduction pathway. It interacts with the cytoplasmic domain of Fas, but not to a Fas mutant that is deficient in signal transduction. It is widely expressed in adult and embryonic tissues, and in tumor cell lines, and is localized not only in the cytoplasm where it interacts with Fas, but also in the nucleus. FAF1 contains phosphorylation sites for protein kinase CK2 within the nuclear targeting domain. Phosphorylation influences nuclear localization of FAF1 but does not affect its potentiation of Fas-induced apoptosis. Other functions have also been attributed to FAF1. It inhibits nuclear factor-kB (NF-kB) by interfering with the nuclear translocation of the p65 subunit. FAF1 also interacts with valosin-containing protein (VCP), which is involved in the ubiquitin-proteosome pathway. — an NCBI CDD conserved domain (cd02990); members share this curated model.
