identifier: CDD:cd24066
label: "nucleotide-binding domain (NBD) of Escherichia coli fructokinase (FRK) and similar proteins. Escherichia coli FRK (EC 2.7.1.4), also called D-fructose kinase, manno(fructo)kinase, or MAK, catalyzes the phosphorylation of fructose to fructose-6-phosphate. It has also low level glucokinase activity in vitro. It is not able to phosphorylate D-ribose, D-mannitol, D-sorbitol, inositol, and L-threonine. Members of this subfamily belong to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities."
definition: >-
