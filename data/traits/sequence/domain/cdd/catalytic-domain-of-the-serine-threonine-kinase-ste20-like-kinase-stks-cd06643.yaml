identifier: CDD:cd06643
label: "Catalytic domain of the Serine/Threonine Kinase, Ste20-Like Kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. SLK promotes apoptosis through apoptosis signal-regulating kinase 1 (ASK1) and the mitogen-activated protein kinase (MAPK) p38. It acts as a MAPK kinase kinase by phosphorylating ASK1, resulting in the phosphorylation of p38. SLK also plays a role in mediating actin reorganization. It is part of a microtubule-associated complex that is targeted at adhesion sites, and is required in focal adhesion turnover and in regulating cell migration. The SLK subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Ste20-Like Kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. SLK promotes apoptosis through apoptosis signal-regulating kinase 1 (ASK1) and the mitogen-activated protein kinase (MAPK) p38. It acts as a MAPK kinase kinase by phosphorylating ASK1, resulting in the phosphorylation of p38. SLK also plays a role in mediating actin reorganization. It is part of a microtubule-associated complex that is targeted at adhesion sites, and is required in focal adhesion turnover and in regulating cell migration. The SLK subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd06643); members share this curated model.
