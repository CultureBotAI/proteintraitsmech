identifier: CDD:cd04661
label: "Mitochondrial ribosomal protein L46. Mitochondrial ribosomal protein L46 (MRP L46) is a component of the large subunit (39S) of the mammalian mitochondrial ribosome and a member of the NUDIX hydrolase superfamily. MRPs are thought to be involved in the maintenance of the mitochondrial DNA. In general, members of the NUDIX hydrolase superfamily require a divalent cation, such as Mg2+ or Mn2+, for activity and contain the NUDIX motif, a highly conserved 23-residue block (GX5EX7REUXEEXGU, where U = I, L or V), which functions as a metal binding and catalytic site. MRP L46 appears to contain a modified NUDIX motif."
definition: >-
  Mitochondrial ribosomal protein L46. Mitochondrial ribosomal protein L46 (MRP L46) is a component of the large subunit (39S) of the mammalian mitochondrial ribosome and a member of the NUDIX hydrolase superfamily. MRPs are thought to be involved in the maintenance of the mitochondrial DNA. In general, members of the NUDIX hydrolase superfamily require a divalent cation, such as Mg2+ or Mn2+, for activity and contain the NUDIX motif, a highly conserved 23-residue block (GX5EX7REUXEEXGU, where U = I, L or V), which functions as a metal binding and catalytic site. MRP L46 appears to contain a modified NUDIX motif. — an NCBI CDD conserved domain (cd04661); members share this curated model.
