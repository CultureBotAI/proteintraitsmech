identifier: CDD:cd21681
label: "synaptotagmin-like mitochondrial-lipid-binding protein (SMP) domain found in extended synaptotagmin-3 (E-Syt3) and similar proteins. Extended synaptotagmin-3 (E-Syt3), also called Chr3Syt, binds glycerophospholipids in a barrel-like domain and may play a role in cellular lipid transport. It tethers the endoplasmic reticulum to the cell membrane and promotes the formation of appositions between the endoplasmic reticulum and the cell membrane. E-Syt3 consists of an N-terminal endoplasmic reticulum (ER)-membrane anchor, a central SMP-domain, and three C-terminal cytoplasmic C2-domains. The ER-membrane anchor and C2 domains are required for tethering, and the SMP domain may be implicated in lipid transport. This model corresponds to the SMP domain."
definition: >-
  synaptotagmin-like mitochondrial-lipid-binding protein (SMP) domain found in extended synaptotagmin-3 (E-Syt3) and similar proteins. Extended synaptotagmin-3 (E-Syt3), also called Chr3Syt, binds glycerophospholipids in a barrel-like domain and may play a role in cellular lipid transport. It tethers the endoplasmic reticulum to the cell membrane and promotes the formation of appositions between the endoplasmic reticulum and the cell membrane. E-Syt3 consists of an N-terminal endoplasmic reticulum (ER)-membrane anchor, a central SMP-domain, and three C-terminal cytoplasmic C2-domains. The ER-membrane anchor and C2 domains are required for tethering, and the SMP domain may be implicated in lipid transport. This model corresponds to the SMP domain. — an NCBI CDD conserved domain (cd21681); members share this curated model.
