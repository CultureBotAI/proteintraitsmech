identifier: CDD:cd05798
label: "SIS_TAL_PGI: Transaldolase (TAL)/ Phosphoglucose isomerase (PGI). This group represents the SIS (Sugar ISomerase) PGI domain, of a multifunctional protein (TAL-PGI ) having both TAL and PGI activities. TAL_PGI contains an N-terminal TAL domain and a C-terminal PGI domain. TAL catalyzes the reversible conversion of sedoheptulose-7-phosphate (S7P) and glyceraldehyde-3-phosphate (G3P), to fructose-6-phosphate (F6P) and erythrose-4-phosphate (E4P). PGI catalyzes the reversible isomerization of F6P to glucose-6-phosphate (G6P). It has been suggested for Gluconobacter oxydans TAL_PGI that this enzyme generates E4P and G6P directly from S7P and G3P. G. oxydans TAL_PGI contributes to increased xylitol production from D-arabitol. As xylitol is an alternative natural sweetner to sucrose, the microbial conversion of D-arabitol to xylitol is of interest to food and pharmaceutical industries."
definition: >-
  SIS_TAL_PGI: Transaldolase (TAL)/ Phosphoglucose isomerase (PGI). This group represents the SIS (Sugar ISomerase) PGI domain, of a multifunctional protein (TAL-PGI ) having both TAL and PGI activities. TAL_PGI contains an N-terminal TAL domain and a C-terminal PGI domain. TAL catalyzes the reversible conversion of sedoheptulose-7-phosphate (S7P) and glyceraldehyde-3-phosphate (G3P), to fructose-6-phosphate (F6P) and erythrose-4-phosphate (E4P). PGI catalyzes the reversible isomerization of F6P to glucose-6-phosphate (G6P). It has been suggested for Gluconobacter oxydans TAL_PGI that this enzyme generates E4P and G6P directly from S7P and G3P. G. oxydans TAL_PGI contributes to increased xylitol production from D-arabitol. As xylitol is an alternative natural sweetner to sucrose, the microbial conversion of D-arabitol to xylitol is of interest to food and pharmaceutical industries. — an NCBI CDD conserved domain (cd05798); members share this curated model.
