identifier: CDD:cd14339
label: "UBA domain of SNF-related serine/threonine-protein kinase (SNRK) and similar proteins mainly found in metazoa. SNRK, also called Sucrose nonfermenting 1 (Snf1)-related kinase, is a serine/threonine kinase highly expressed in the testis. It is a distant member of the largely adenosine monophosphate (AMP)-activated protein kinase (AMPK) family. SNRK can be phosphorylated and activated by LKB1 and may mediate cellular effects regulated by LKB1. It is also involved in the regulation of colon cancer cell proliferation and beta-catenin signaling. It inhibits colon cancer cell proliferation through calcyclin-binding protein (CacyBP)-dependent reduction of beta-catenin. In addition to an N-terminal protein kinase domain, it harbors an ubiquitin-associated (UBA) domain, previously called SNF1 homology (SNH) domain which is conserved in other Snf1-related kinases, but not in any other protein kinase."
definition: >-
  UBA domain of SNF-related serine/threonine-protein kinase (SNRK) and similar proteins mainly found in metazoa. SNRK, also called Sucrose nonfermenting 1 (Snf1)-related kinase, is a serine/threonine kinase highly expressed in the testis. It is a distant member of the largely adenosine monophosphate (AMP)-activated protein kinase (AMPK) family. SNRK can be phosphorylated and activated by LKB1 and may mediate cellular effects regulated by LKB1. It is also involved in the regulation of colon cancer cell proliferation and beta-catenin signaling. It inhibits colon cancer cell proliferation through calcyclin-binding protein (CacyBP)-dependent reduction of beta-catenin. In addition to an N-terminal protein kinase domain, it harbors an ubiquitin-associated (UBA) domain, previously called SNF1 homology (SNH) domain which is conserved in other Snf1-related kinases, but not in any other protein kinase. — an NCBI CDD conserved domain (cd14339); members share this curated model.
