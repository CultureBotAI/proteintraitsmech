identifier: CDD:cd22292
label: "coiled-coil microtubule binding domain of centrosomal protein of 135 kDa (Cep135) and similar proteins. Cep135, also called centrosomal protein 4, is involved in early centriole assembly, duplication, biogenesis, and formation. It is required for the recruitment of CEP295 to the proximal end of new-born centrioles at the centriolar microtubule wall during early S phase in a PLK4-dependent manner. This model corresponds to a conserved coiled-coil domain of Cep135, which is critical for microtubule binding."
definition: >-
  coiled-coil microtubule binding domain of centrosomal protein of 135 kDa (Cep135) and similar proteins. Cep135, also called centrosomal protein 4, is involved in early centriole assembly, duplication, biogenesis, and formation. It is required for the recruitment of CEP295 to the proximal end of new-born centrioles at the centriolar microtubule wall during early S phase in a PLK4-dependent manner. This model corresponds to a conserved coiled-coil domain of Cep135, which is critical for microtubule binding. — an NCBI CDD conserved domain (cd22292); members share this curated model.
