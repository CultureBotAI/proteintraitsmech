identifier: CDD:cd23393
label: "C-terminal receptor binding domain, beta-trefoil fold, found in Clostridium botulinum neurotoxin type F (BoNT/F) and similar proteins. BoNT/F, also called bontoxilysin-F, is botulinum toxin that causes flaccid paralysis by inhibiting neurotransmitter (acetylcholine) release from the presynaptic membranes of nerve terminals of eukaryotic host skeletal and autonomic nervous system, with frequent heart or respiratory failure. There are two co-receptors of BoNT/F precursor, complex polysialylated gangliosides found on neural tissue and specific membrane-anchored proteins found in synaptic vesicles. BoNT/F was reported to bind synaptic vesicle protein 2 (SV2), but the functional relevance of SV2 for BoNT/F remains to be established. BoNT/F comprises three domains which are involved in catalysis (LC), translocation (HCT), and host receptor binding (HCR). The HCR domain is responsible for the highly specific targeting of the neurotoxin to neuronal cell membranes. It is a proven target for anti-BoNT antibody and vaccine development. This model corresponds to C-terminal HCR domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  C-terminal receptor binding domain, beta-trefoil fold, found in Clostridium botulinum neurotoxin type F (BoNT/F) and similar proteins. BoNT/F, also called bontoxilysin-F, is botulinum toxin that causes flaccid paralysis by inhibiting neurotransmitter (acetylcholine) release from the presynaptic membranes of nerve terminals of eukaryotic host skeletal and autonomic nervous system, with frequent heart or respiratory failure. There are two co-receptors of BoNT/F precursor, complex polysialylated gangliosides found on neural tissue and specific membrane-anchored proteins found in synaptic vesicles. BoNT/F was reported to bind synaptic vesicle protein 2 (SV2), but the functional relevance of SV2 for BoNT/F remains to be established. BoNT/F comprises three domains which are involved in catalysis (LC), translocation (HCT), and host receptor binding (HCR). The HCR domain is responsible for the highly specific targeting of the neurotoxin to neuronal cell membranes. It is a proven target for anti-BoNT antibody and vaccine development. This model corresponds to C-terminal HCR domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23393); members share this curated model.
