identifier: CDD:cd14199
label: "Catalytic domain of the Serine/Threonine kinase, Calmodulin Dependent Protein Kinase Kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates.  CaMKKs are upstream kinases of the CaM kinase cascade that phosphorylate and activate CaMKI and CamKIV. They may also phosphorylate other substrates including PKB and AMP-activated protein kinase (AMPK). CaMKK2, also called CaMKK beta, is one of the most versatile CaMKs. It is involved in regulating energy balance, glucose metabolism, adiposity, hematopoiesis, inflammation, and cancer. CaMKK2 contains unique N- and C-terminal domains and a central catalytic kinase domain that is followed by a regulatory domain that bears overlapping autoinhibitory and CaM-binding regions. It can be activated by signaling through G-coupled receptors, IP3 receptors, plasma membrane ion channels, and Toll-like receptors. Thus, CaMKK2 acts as a molecular hub that is capable of receiving and decoding signals from diverse pathways. The CaMKK2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, Calmodulin Dependent Protein Kinase Kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. CaMKKs are upstream kinases of the CaM kinase cascade that phosphorylate and activate CaMKI and CamKIV. They may also phosphorylate other substrates including PKB and AMP-activated protein kinase (AMPK). CaMKK2, also called CaMKK beta, is one of the most versatile CaMKs. It is involved in regulating energy balance, glucose metabolism, adiposity, hematopoiesis, inflammation, and cancer. CaMKK2 contains unique N- and C-terminal domains and a central catalytic kinase domain that is followed by a regulatory domain that bears overlapping autoinhibitory and CaM-binding regions. It can be activated by signaling through G-coupled receptors, IP3 receptors, plasma membrane ion channels, and Toll-like receptors. Thus, CaMKK2 acts as a molecular hub that is capable of receiving and decoding signals from diverse pathways. The CaMKK2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14199); members share this curated model.
