identifier: CDD:cd12974
label: LamG_flamingo_1
definition: >-
  Laminin G domain repeat 1 of flamingo-like proteins. Drosophila Flamingo/mammalian CELSRs are part of the cadherin superfamily, being considered a non-classical cadherin family. They are seven-pass transmembrane proteins involved in the planar cell polarity (PCP) pathway and are important in several neuronal interactions. In general, proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold
