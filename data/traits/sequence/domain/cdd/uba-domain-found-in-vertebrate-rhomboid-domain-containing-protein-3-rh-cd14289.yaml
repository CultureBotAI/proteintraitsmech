identifier: CDD:cd14289
label: UBA_RHBD3
definition: >-
  UBA domain found in vertebrate rhomboid domain-containing protein 3 (RHBD3). RHBD3 is encoded by a novel chromosome 22 CpG island-associated gene (C22orf3) that is not expressed in a significant proportion of pituitary tumors. C22orf3 is also called pituitary tumor apoptosis gene (PTAG) or RHBDD3 which is located directly upstream of EWSR1. Although its biological function remains unclear, RHBD3 contains an N-terminal rhomboid domain and a C-terminal ubiquitin-associated (UBA) domain
