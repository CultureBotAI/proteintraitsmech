identifier: CDD:cd17932
label: "DEXQD-box helicase domain of UvrD. UvrD is a highly conserved helicase involved in mismatch repair, nucleotide excision repair, and recombinational repair. It plays a critical role in maintaining genomic stability and facilitating DNA lesion repair in many prokaryotic species including Helicobacter pylori and Escherichia coli. UvrD is a member of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXQD-box helicase domain of UvrD. UvrD is a highly conserved helicase involved in mismatch repair, nucleotide excision repair, and recombinational repair. It plays a critical role in maintaining genomic stability and facilitating DNA lesion repair in many prokaryotic species including Helicobacter pylori and Escherichia coli. UvrD is a member of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17932); members share this curated model.
