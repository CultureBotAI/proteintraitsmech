label: "PR-SET domain found in PR domain zinc finger protein 6 (PRDM6) and similar proteins. PRDM6 (also termed PR domain-containing protein 6) is a putative histone-lysine N-methyltransferase that acts as a transcriptional repressor of smooth muscle gene expression. It may specifically methylate 'Lys-20' of histone H4 when associated with other proteins and in vitro."
definition: >-
