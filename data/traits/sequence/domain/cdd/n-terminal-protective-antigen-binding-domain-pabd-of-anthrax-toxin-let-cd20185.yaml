identifier: CDD:cd20185
label: "N-terminal protective antigen-binding domain (PABD) of Anthrax Toxin Lethal Factor (ATLF) and Edema Factor (EF), and similar domains; belongs to peptidase family M34. This subfamily includes the functional N-terminal protective antigen-binding domain (PABD) of the anthrax edema factor (EF), as well as the likely inactive N-terminal PABD of anthrax toxin lethal factor (ATLF), both secreted by Bacillus anthracis. ATLF and EF are enzyme components of anthrax toxin and are carried into the cell by a third component, the protective antigen (PA). ATLF-PABD resembles the C-terminal catalytic domain of ATLF (EC 3.4.24.83) but lacks the hallmark metalloprotease motif HEXXH. This subfamily belongs to the peptidase family M34 (also known as the anthrax lethal factor family), which also includes the C-terminal catalytic domain of ATLF, and Pro-Pro endopeptidase (PPEP-1; EC 3.4.24.89, also known as Zmp1), which is an extracellular metalloprotease that shows a unique specificity for hydrolyzing a Pro-Pro bond and is involved in bacterial adhesion."
definition: >-
  N-terminal protective antigen-binding domain (PABD) of Anthrax Toxin Lethal Factor (ATLF) and Edema Factor (EF), and similar domains; belongs to peptidase family M34. This subfamily includes the functional N-terminal protective antigen-binding domain (PABD) of the anthrax edema factor (EF), as well as the likely inactive N-terminal PABD of anthrax toxin lethal factor (ATLF), both secreted by Bacillus anthracis. ATLF and EF are enzyme components of anthrax toxin and are carried into the cell by a third component, the protective antigen (PA). ATLF-PABD resembles the C-terminal catalytic domain of ATLF (EC 3.4.24.83) but lacks the hallmark metalloprotease motif HEXXH. This subfamily belongs to the peptidase family M34 (also known as the anthrax lethal factor family), which also includes the C-terminal catalytic domain of ATLF, and Pro-Pro endopeptidase (PPEP-1; EC 3.4.24.89, also known as Zmp1), which is an extracellular metalloprotease that shows a unique specificity for hydrolyzing a Pro-Pro bond and is involved in bacterial adhesion. — an NCBI CDD conserved domain (cd20185); members share this curated model.
