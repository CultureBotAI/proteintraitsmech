identifier: CDD:cd22975
label: "dimerization/docking (D/D) domain found in testis-specific expressed protein 55 (TEX55) and similar proteins. TEX55, also called testis-specific conserved cAMP-dependent type II PK-anchoring protein (TSCPA), is a putative A-kinase anchoring protein (AKAP) that is dispensable for male fertility. It contains a C-terminal domain that shows high sequence similarity to the dimerization/docking (D/D) domains of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1."
definition: >-
  dimerization/docking (D/D) domain found in testis-specific expressed protein 55 (TEX55) and similar proteins. TEX55, also called testis-specific conserved cAMP-dependent type II PK-anchoring protein (TSCPA), is a putative A-kinase anchoring protein (AKAP) that is dispensable for male fertility. It contains a C-terminal domain that shows high sequence similarity to the dimerization/docking (D/D) domains of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1. — an NCBI CDD conserved domain (cd22975); members share this curated model.
