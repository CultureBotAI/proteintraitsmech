identifier: CDD:cd22060
label: "Wiskott Aldrich syndrome homology region 2 (WH2 motif) found in Metastasis suppressor protein 1 (MTSS-1). This family contains the first tandem Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2) found in metastasis suppressor protein 1 (MTSS1, also called also known as missing in metastasis or MIM). MTSS1 may be related to cancer progression or tumor metastasis in a variety of organ sites, most likely through an interaction with the actin cytoskeleton. It interacts with actin via its WH2 domain. MTSS1 is a novel potential metastasis suppressor gene in several types of human cancers; its expression is down-regulated in ovarian cancer, colorectal cancer, oesophageal cancer, prostate cancer and breast cancer, whereas it has also been observed to be up-regulated in hepato-cellular carcinoma and breast cancer."
