identifier: CDD:cd17902
label: "ArfGap with Rho-Gap domain, ANK repeat and PH domain-containing protein 3. The ARAP subfamily includes three members, ARAP1-3, and belongs to the ADP-ribosylation factor GTPase-activating proteins (Arf GAPs) family of proteins that promotes the hydrolysis of GTP bound to Arf, thereby inactivating Arf signaling.  The function of Arfs is dependent on GAPs and guanine nucleotide exchange factors (GEFs), which allow Arfs to cycle between the GDP-bound and GTP-bound forms. In addition to the Arf GAP domain, ARAPs contain the SAM (sterile-alpha motif) domain, 5 pleckstrin homology (PH) domains, the Rho-GAP domain, the Ras-association domain, and ANK repeats. ARAPs show phosphatidylinositol 3,4,5-trisphosphate (PI(3,4,5)P3)-dependent GAP activity toward Arf6. ARAPs play important roles in endocytic trafficking, cytoskeleton reorganization in response to growth factors stimulation, and focal adhesion dynamics. ARAP3 possesses a unique dual-specificity GAP activity for Arf6 and RhoA regulated by PI(3,4,5)P3 and a small GTPase Rap1-GTP. The RhoGAP activity of ARAP3 is enhanced by direct binding of Rap1-GTP to the Ras-association (RA) domain. ARAP3 is involved in regulation of cell shape and adhesion."
definition: >-
  ArfGap with Rho-Gap domain, ANK repeat and PH domain-containing protein 3. The ARAP subfamily includes three members, ARAP1-3, and belongs to the ADP-ribosylation factor GTPase-activating proteins (Arf GAPs) family of proteins that promotes the hydrolysis of GTP bound to Arf, thereby inactivating Arf signaling. The function of Arfs is dependent on GAPs and guanine nucleotide exchange factors (GEFs), which allow Arfs to cycle between the GDP-bound and GTP-bound forms. In addition to the Arf GAP domain, ARAPs contain the SAM (sterile-alpha motif) domain, 5 pleckstrin homology (PH) domains, the Rho-GAP domain, the Ras-association domain, and ANK repeats. ARAPs show phosphatidylinositol 3,4,5-trisphosphate (PI(3,4,5)P3)-dependent GAP activity toward Arf6. ARAPs play important roles in endocytic trafficking, cytoskeleton reorganization in response to growth factors stimulation, and focal adhesion dynamics. ARAP3 possesses a unique dual-specificity GAP activity for Arf6 and RhoA regulated by PI(3,4,5)P3 and a small GTPase Rap1-GTP. The RhoGAP activity of ARAP3 is enhanced by direct binding of Rap1-GTP to the Ras-association (RA) domain. ARAP3 is involved in regulation of cell shape and adhesion. — an NCBI CDD conserved domain (cd17902); members share this curated model.
