identifier: CDD:cd22648
label: "Q4D6Q6-like domain family. This family includes Trypanosoma cruzi protein Q4D6Q6 and similar proteins. Q4D6Q6 is a conserved and kinetoplastid-specific protein essential for cell viability. Its monomers adopt a beta-beta-alpha-beta-beta-alpha-beta-beta topology and form a propeller-like tetramer. An oxidized cysteine, which is part of a cluster with phosphorylated serines and hydrophobic residues, has been identified as a highly reactive site, and may play a role as a nucleophile in a post-translational modification reaction. Since Q4D6Q6 is not present in mammals, it can be a potential drug target against kinetoplastid infection causing Chagas disease, Sleeping sickness and Leishmaniasis."
definition: >-
  Q4D6Q6-like domain family. This family includes Trypanosoma cruzi protein Q4D6Q6 and similar proteins. Q4D6Q6 is a conserved and kinetoplastid-specific protein essential for cell viability. Its monomers adopt a beta-beta-alpha-beta-beta-alpha-beta-beta topology and form a propeller-like tetramer. An oxidized cysteine, which is part of a cluster with phosphorylated serines and hydrophobic residues, has been identified as a highly reactive site, and may play a role as a nucleophile in a post-translational modification reaction. Since Q4D6Q6 is not present in mammals, it can be a potential drug target against kinetoplastid infection causing Chagas disease, Sleeping sickness and Leishmaniasis. — an NCBI CDD conserved domain (cd22648); members share this curated model.
