identifier: CDD:cd04262
label: "Homologues of snake disintegrins ; Snake disintegrins inhibit the binding of ligands to integrin receptors. They contain a 'RGD' sequence, identical to the recognition site of many adhesion proteins. Molecules containing both disintegrin and metalloprotease domains are known as ADAMs."
definition: >-
  Homologues of snake disintegrins ; Snake disintegrins inhibit the binding of ligands to integrin receptors. They contain a 'RGD' sequence, identical to the recognition site of many adhesion proteins. Molecules containing both disintegrin and metalloprotease domains are known as ADAMs. — an NCBI CDD conserved domain (cd04262); members share this curated model.
