label: ATP-synt_III_subunit8
definition: >-
  Tetrahymena thermophila type III ATP synthase subunit 8 and similar proteins. The family includes Tetrahymena thermophila type III ATP synthase subunit 8, also known as Ymf56, and similar proteins. Type III mitochondrial ATP synthase is a symmetry-deviated dimer that induces membrane curvature through tetramerization
