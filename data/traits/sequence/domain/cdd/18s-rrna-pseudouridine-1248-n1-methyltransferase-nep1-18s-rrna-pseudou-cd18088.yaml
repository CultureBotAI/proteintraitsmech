identifier: CDD:cd18088
label: "18S rRNA (pseudouridine(1248)-N1)-methyltransferase Nep1. 18S rRNA (pseudouridine(1248)-N1)-methyltransferase Nep1 (also known as EMG1) methylates pseudouridine at position1248 (Psi1248) in 18S rRNA and is required for small subunit (SSU) ribosomal RNA (rRNA) maturation. Mutations on human cause in Bowen-Conradi Syndrome. Nep1 is a member of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot."
definition: >-
