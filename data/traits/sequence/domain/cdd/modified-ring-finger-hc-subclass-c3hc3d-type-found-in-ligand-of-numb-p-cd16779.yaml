identifier: CDD:cd16779
label: "Modified RING finger, HC subclass (C3HC3D-type), found in ligand of numb protein X 1 (LNX1). LNX1, also known as numb-binding protein 1 or PDZ domain-containing RING finger protein 2, is a PDZ domain-containing RING-type E3 ubiquitin ligase responsible for the ubiquitination and degradation of Numb, a component of the Notch signaling pathway that functions in the specification of cell fates during development and is known to control cell numbers during neurogenesis in vertebrates. LNX1 contains an N-terminal modified C3HC3D-type RING-HC finger, a NPAY motif for Numb-LNX interaction, and four PDZ domains necessary for the binding of substrates, including CAR, ErbB2, SKIP, JAM4, CAST, c-Src, Claudins, RhoC, KCNA4, PAK6, PLEKHG5, PKC-alpha1, TYK2, PDZ-binding kinase (PBK), LNX2, and itself."
definition: >-
  Modified RING finger, HC subclass (C3HC3D-type), found in ligand of numb protein X 1 (LNX1). LNX1, also known as numb-binding protein 1 or PDZ domain-containing RING finger protein 2, is a PDZ domain-containing RING-type E3 ubiquitin ligase responsible for the ubiquitination and degradation of Numb, a component of the Notch signaling pathway that functions in the specification of cell fates during development and is known to control cell numbers during neurogenesis in vertebrates. LNX1 contains an N-terminal modified C3HC3D-type RING-HC finger, a NPAY motif for Numb-LNX interaction, and four PDZ domains necessary for the binding of substrates, including CAR, ErbB2, SKIP, JAM4, CAST, c-Src, Claudins, RhoC, KCNA4, PAK6, PLEKHG5, PKC-alpha1, TYK2, PDZ-binding kinase (PBK), LNX2, and itself. — an NCBI CDD conserved domain (cd16779); members share this curated model.
