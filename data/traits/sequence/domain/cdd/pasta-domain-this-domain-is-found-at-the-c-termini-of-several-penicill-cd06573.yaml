identifier: CDD:cd06573
label: "PASTA domain. This domain is found at the C-termini of several Penicillin-binding proteins (PBPs) and bacterial serine/threonine kinases. It is a small globular fold consisting of 3 beta-sheets and an alpha-helix. The name PASTA is derived from PBP and Serine/Threonine kinase Associated domain."
definition: >-
  PASTA domain. This domain is found at the C-termini of several Penicillin-binding proteins (PBPs) and bacterial serine/threonine kinases. It is a small globular fold consisting of 3 beta-sheets and an alpha-helix. The name PASTA is derived from PBP and Serine/Threonine kinase Associated domain. — an NCBI CDD conserved domain (cd06573); members share this curated model.
