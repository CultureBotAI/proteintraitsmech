identifier: CDD:cd13013
label: "TSPN domain of thrombopondin;. Thrombospondins (TSPs) are multidomain, calcium-binding extracellular glycoproteins of animals.  play a role in cell attachment in a calcium-dependent manner and bind to other extracellular matrix (ECM) components.  The thrombospondins (TSPs) comprise a family of extracellular glycoproteins that regulates cellular behavior during tissue genesis and repair.The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold."
definition: >-
  TSPN domain of thrombopondin;. Thrombospondins (TSPs) are multidomain, calcium-binding extracellular glycoproteins of animals. play a role in cell attachment in a calcium-dependent manner and bind to other extracellular matrix (ECM) components. The thrombospondins (TSPs) comprise a family of extracellular glycoproteins that regulates cellular behavior during tissue genesis and repair.The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold. — an NCBI CDD conserved domain (cd13013); members share this curated model.
