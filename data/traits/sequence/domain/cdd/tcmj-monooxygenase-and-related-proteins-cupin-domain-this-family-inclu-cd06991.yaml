identifier: CDD:cd06991
label: "TcmJ monooxygenase and related proteins, cupin domain. This family includes TcmJ, a subunit of the tetracenomycin (TCM) polyketide synthase (PKS) type II complex in Streptomyces glaucescens. TcmJ is a quinone-forming monooxygenase involved in the modification of aromatic polyketides synthesized by polyketide synthases of types II and III. Orthologs of TcmJ include the Streptomyces BenD (benastatin biosynthetic pathway), the Streptomyces olivaceus ElmJ (polyketide antibiotic elloramycin biosynthetic pathway), the Actinomadura hibisca PdmL (pradimicin biosynthetic pathway), the Streptomyces cyaneus CurC (curamycin biosynthetic pathway), the Streptomyces rishiriensis Lct30 (lactonamycin biosynthetic pathway), and the Streptomyces WhiE II (spore pigment polyketide biosynthetic pathway). Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  TcmJ monooxygenase and related proteins, cupin domain. This family includes TcmJ, a subunit of the tetracenomycin (TCM) polyketide synthase (PKS) type II complex in Streptomyces glaucescens. TcmJ is a quinone-forming monooxygenase involved in the modification of aromatic polyketides synthesized by polyketide synthases of types II and III. Orthologs of TcmJ include the Streptomyces BenD (benastatin biosynthetic pathway), the Streptomyces olivaceus ElmJ (polyketide antibiotic elloramycin biosynthetic pathway), the Actinomadura hibisca PdmL (pradimicin biosynthetic pathway), the Streptomyces cyaneus CurC (curamycin biosynthetic pathway), the Streptomyces rishiriensis Lct30 (lactonamycin biosynthetic pathway), and the Streptomyces WhiE II (spore pigment polyketide biosynthetic pathway). Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd06991); members share this curated model.
