identifier: CDD:cd17658
label: "protein tyrosine phosphatase 1 from Arabidopsis thaliana and similar plant PTPs. Arabidopsis thaliana protein tyrosine phosphatase 1 (AtPTP1) belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. AtPTP1 dephosphorylates and inhibits MAP kinase 6 (MPK6) in non-oxidative stress conditions. Together with MAP kinase phosphatase 1 (MKP1) it expresses salicylic acid (SA) and camalexin biosynthesis, and therefore, modulating defense response."
definition: >-
