identifier: CDD:cd02292
label: "GFOR_WblB_like. The GFOR_WblB CD includes the lipopolysaccharide biosynthesis protein WblB (formerly BplA) and other related putative oxidoreductases. The wlbB gene is one of 12 genes involved in the biosynthesis of the Bordetella pertussis band A lipopolysaccharide trisaccharide. WblB and related predicted proteins share sequence similarity with a class of oxidoreductases that have been implicated in interconversions between hydroxyl and carbonyl groups, such as glucose-fructose oxidoreductase (GFOR) which oxidizes glucose to gluconolactone and reduces fructose to sorbitol in Zymomonas mobilis. Members of this CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the GFOR superfamily of proteins."
definition: >-
  GFOR_WblB_like. The GFOR_WblB CD includes the lipopolysaccharide biosynthesis protein WblB (formerly BplA) and other related putative oxidoreductases. The wlbB gene is one of 12 genes involved in the biosynthesis of the Bordetella pertussis band A lipopolysaccharide trisaccharide. WblB and related predicted proteins share sequence similarity with a class of oxidoreductases that have been implicated in interconversions between hydroxyl and carbonyl groups, such as glucose-fructose oxidoreductase (GFOR) which oxidizes glucose to gluconolactone and reduces fructose to sorbitol in Zymomonas mobilis. Members of this CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the GFOR superfamily of proteins. — an NCBI CDD conserved domain (cd02292); members share this curated model.
