identifier: CDD:cd16907
label: "YEATS domain found in YEATS2 and Drosophila D12. YEATS2 is a YEATS domain reader protein with a preference for recognition of histone H3 crotonylation on lysine 27 (H3K27crHistone crotonylation upregulates gene expression in an AF9-dependent manner. DNA regulation by chromatin thru histone post-translational modification and other mechanism involves complexes with write, eraser and reader functions. YEATS domains act as readers of the chromatin state, and stimulate transcriptional activity, thru preferential interactions with crotonylated lysines on histones. The YEATS family is named for several family members: 'YNK7', 'ENL', 'AF-9', and 'TFIIF small subunit', and also contains the GAS41 protein."
definition: >-
  YEATS domain found in YEATS2 and Drosophila D12. YEATS2 is a YEATS domain reader protein with a preference for recognition of histone H3 crotonylation on lysine 27 (H3K27crHistone crotonylation upregulates gene expression in an AF9-dependent manner. DNA regulation by chromatin thru histone post-translational modification and other mechanism involves complexes with write, eraser and reader functions. YEATS domains act as readers of the chromatin state, and stimulate transcriptional activity, thru preferential interactions with crotonylated lysines on histones. The YEATS family is named for several family members: 'YNK7', 'ENL', 'AF-9', and 'TFIIF small subunit', and also contains the GAS41 protein. — an NCBI CDD conserved domain (cd16907); members share this curated model.
