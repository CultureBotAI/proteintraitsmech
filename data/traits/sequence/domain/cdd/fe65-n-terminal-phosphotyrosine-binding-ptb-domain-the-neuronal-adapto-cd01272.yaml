identifier: CDD:cd01272
label: "Fe65 N-terminal Phosphotyrosine-binding (PTB) domain. The neuronal adaptor protein Fe65 is involved in brain development, Alzheimer disease amyloid precursor protein (APP) signaling, and proteolytic processing of APP. It contains three protein-protein interaction domains, one WW domain, and a unique tandem array of phosphotyrosine-binding (PTB) domains. The N-terminal PTB domain was shown to interact with a variety of proteins, including the low density lipoprotein receptor-related protein (LRP-1), the ApoEr2 receptor, and the histone acetyltransferase Tip60. PTB domains have a common PH-like fold and are found in various eukaryotic signaling molecules. This domain was initially shown to binds peptides with a NPXY motif with differing requirements for phosphorylation of the tyrosine, although more recent studies have found that some types of PTB domains can bind to peptides lack tyrosine residues altogether. In contrast to SH2 domains, which recognize phosphotyrosine and adjacent carboxy-terminal residues, PTB-domain binding specificity is conferred by residues amino-terminal to the phosphotyrosine. PTB domains are classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains. This cd is part of the Dab-like subgroup."
definition: >-
  Fe65 N-terminal Phosphotyrosine-binding (PTB) domain. The neuronal adaptor protein Fe65 is involved in brain development, Alzheimer disease amyloid precursor protein (APP) signaling, and proteolytic processing of APP. It contains three protein-protein interaction domains, one WW domain, and a unique tandem array of phosphotyrosine-binding (PTB) domains. The N-terminal PTB domain was shown to interact with a variety of proteins, including the low density lipoprotein receptor-related protein (LRP-1), the ApoEr2 receptor, and the histone acetyltransferase Tip60. PTB domains have a common PH-like fold and are found in various eukaryotic signaling molecules. This domain was initially shown to binds peptides with a NPXY motif with differing requirements for phosphorylation of the tyrosine, although more recent studies have found that some types of PTB domains can bind to peptides lack tyrosine residues altogether. In contrast to SH2 domains, which recognize phosphotyrosine and adjacent carboxy-terminal residues, PTB-domain binding specificity is conferred by residues amino-terminal to the phosphotyrosine. PTB domains are classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains. This cd is part of the Dab-like subgroup. — an NCBI CDD conserved domain (cd01272); members share this curated model.
