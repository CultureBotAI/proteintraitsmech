identifier: CDD:cd01930
label: fun_bacPLA2
definition: >-
  Fungal/bacterial Phospholipase A2 (fun_bacPLA2); PLA2s hydrolyze the 2-acyl ester bond of 1,2-diacylglycero-3-phospholipids. This specific subgroup (proposed name is group XIII PLA2) is the first identified in prokaryotes, but it is also present in fungi. It belongs to the broad class of small extracellular Ca+ dependent PLA2s containing disulfide bridges and utilizing a catalytic histidine
