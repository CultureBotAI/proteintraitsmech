identifier: CDD:cd01930
label: "Fungal/bacterial Phospholipase A2 (fun_bacPLA2); PLA2s hydrolyze the 2-acyl ester bond of 1,2-diacylglycero-3-phospholipids. This specific subgroup (proposed name is group XIII PLA2) is the first identified in prokaryotes, but it is also present in fungi. It belongs to the broad class of small extracellular Ca+ dependent PLA2s containing disulfide bridges and utilizing a catalytic histidine."
definition: >-
  Fungal/bacterial Phospholipase A2 (fun_bacPLA2); PLA2s hydrolyze the 2-acyl ester bond of 1,2-diacylglycero-3-phospholipids. This specific subgroup (proposed name is group XIII PLA2) is the first identified in prokaryotes, but it is also present in fungi. It belongs to the broad class of small extracellular Ca+ dependent PLA2s containing disulfide bridges and utilizing a catalytic histidine. — an NCBI CDD conserved domain (cd01930); members share this curated model.
