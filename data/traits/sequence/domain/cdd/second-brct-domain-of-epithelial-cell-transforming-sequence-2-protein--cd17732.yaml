label: "second BRCT domain of epithelial cell-transforming sequence 2 protein (ECT2) and similar proteins. ECT2 is a guanine nucleotide exchange factor (GEF) for Rho GTPases, phosphorylated in G2/M phases, and is involved in the regulation of cytokinesis. It contains two tandem BRCT domains. The family corresponds to the second BRCT domain."
definition: >-
  second BRCT domain of epithelial cell-transforming sequence 2 protein (ECT2) and similar proteins. ECT2 is a guanine nucleotide exchange factor (GEF) for Rho GTPases, phosphorylated in G2/M phases, and is involved in the regulation of cytokinesis. It contains two tandem BRCT domains. The family corresponds to the second BRCT domain. — an NCBI CDD conserved domain (cd17732); members share this curated model.
