identifier: CDD:cd15477
label: "Cargo binding domain of myosin 5b. Class V myosins are well studied unconventional myosins, represented by three paralogs (Myo5a,b,c) in vertebrates.  Their C-terminal cargo binding domains (CBDs) are important for the binding of a diverse set of cargos, including membrane vesicles, organelles, proteins and mRNA. They interact with several adaptor proteins, in case of Myo5b-CBD, Rab11-family interacting protein 2."
definition: >-
  Cargo binding domain of myosin 5b. Class V myosins are well studied unconventional myosins, represented by three paralogs (Myo5a,b,c) in vertebrates. Their C-terminal cargo binding domains (CBDs) are important for the binding of a diverse set of cargos, including membrane vesicles, organelles, proteins and mRNA. They interact with several adaptor proteins, in case of Myo5b-CBD, Rab11-family interacting protein 2. — an NCBI CDD conserved domain (cd15477); members share this curated model.
