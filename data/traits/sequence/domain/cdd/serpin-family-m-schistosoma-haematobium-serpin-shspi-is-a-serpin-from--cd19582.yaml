identifier: CDD:cd19582
label: "serpin family M, Schistosoma haematobium serpin. ShSPI is a serpin from the trematode Schistosoma haematobium. The protein is exposed on the surface of invading cercaria as well as of adult worms, suggesting its involvement in the parasite-host interaction. It has several distinctive features, mostly concerning the helical subdomain of the protein. It is proposed that these peculiarities are related to the unique biological properties of a small serpin subfamily which is conserved among pathogenic schistosomes. SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
definition: >-
  serpin family M, Schistosoma haematobium serpin. ShSPI is a serpin from the trematode Schistosoma haematobium. The protein is exposed on the surface of invading cercaria as well as of adult worms, suggesting its involvement in the parasite-host interaction. It has several distinctive features, mostly concerning the helical subdomain of the protein. It is proposed that these peculiarities are related to the unique biological properties of a small serpin subfamily which is conserved among pathogenic schistosomes. SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans. — an NCBI CDD conserved domain (cd19582); members share this curated model.
