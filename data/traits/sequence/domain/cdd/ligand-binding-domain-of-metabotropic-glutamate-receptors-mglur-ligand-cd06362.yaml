identifier: CDD:cd06362
label: "ligand binding domain of metabotropic glutamate receptors (mGluR). Ligand binding domain of the metabotropic glutamate receptors (mGluR), which are members of the family C of G-protein-coupled receptors that transduce extracellular signals into G-protein activation and ultimately into cellular responses. mGluRs bind to glutamate and function as an excitatory neurotransmitter; they are involved in learning, memory, anxiety, and the perception of pain. Eight subtypes of mGluRs have been cloned so far, and are classified into three groups according to their sequence similarities, transduction mechanisms, and pharmacological profiles. Group I is composed of mGlu1R and mGlu5R that both stimulate PLC hydrolysis. Group II includes mGlu2R and mGlu3R, which inhibit adenylyl cyclase, as do mGlu4R, mGlu6R, mGlu7R, and mGlu8R, which form group III."
