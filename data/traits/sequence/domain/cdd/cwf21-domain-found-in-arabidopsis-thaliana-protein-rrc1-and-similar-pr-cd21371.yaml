identifier: CDD:cd21371
label: "cwf21 domain found in Arabidopsis thaliana protein RRC1 and similar proteins. RRC1, also called reduced red-light responses in cry1cry2 background 1, is a SR-like splicing factor required for phytochrome B (phyB) signal transduction and involved in phyB-dependent alternative splicing. This subfamily also includes protein RRC1-like, which may also function as a SR-like splicing factor. SR family splicing factors are characterized by the presence of a domain rich in arginine and serine dipeptides, called the RS domain. This model represents the cwf21 domain of RRC1 and similar proteins. The cwf21 domain is involved in mRNA splicing; it binds directly to the spliceosomal protein Prp8."
definition: >-
  cwf21 domain found in Arabidopsis thaliana protein RRC1 and similar proteins. RRC1, also called reduced red-light responses in cry1cry2 background 1, is a SR-like splicing factor required for phytochrome B (phyB) signal transduction and involved in phyB-dependent alternative splicing. This subfamily also includes protein RRC1-like, which may also function as a SR-like splicing factor. SR family splicing factors are characterized by the presence of a domain rich in arginine and serine dipeptides, called the RS domain. This model represents the cwf21 domain of RRC1 and similar proteins. The cwf21 domain is involved in mRNA splicing; it binds directly to the spliceosomal protein Prp8. — an NCBI CDD conserved domain (cd21371); members share this curated model.
