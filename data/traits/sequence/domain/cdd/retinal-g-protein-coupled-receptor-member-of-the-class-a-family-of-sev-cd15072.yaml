identifier: CDD:cd15072
label: "retinal G protein coupled receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. This group represents the retinal G-protein coupled receptor (RGR) found exclusively in retinal pigment epithelium (RPE) and Muller cells. RGR is a member of the class A rhodopsin-like receptor family. As with other opsins, RGR binds all-trans retinal and contains a conserved lysine reside on the seventh helix. RGR functions as a photoisomerase to catalyze the conversion of all-trans-retinal to 11-cis-retinal. Two mutations in RGR gene are found in patients with retinitis pigmentosa, indicating that RGR is essential to the visual process."
definition: >-
