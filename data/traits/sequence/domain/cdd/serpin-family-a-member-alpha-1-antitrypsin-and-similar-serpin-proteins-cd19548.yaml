identifier: CDD:cd19548
label: "serpin family A member, alpha-1-antitrypsin and similar serpin proteins in birds and reptiles. The alpha-1-antitrypsin family has a variety of different members of sauropsida belonging to the clade A of the serpin superfamily. This branch includes members from zebra finch, green anole, king cobra, gekko, crocodile, and central bearded dragon. Alpha-1-antitrypsin (also called A1AT, A1A, AAT, alpha1-proteinase inhibitor/A1PI, alpha1-antiproteinase/A1AP, and serum trypsin inhibitor) is a protease inhibitor. Clade A includes the classical serine proteinase inhibitors, alpha-1-antitrypsin and alpha-1-antichymotrypsin, protein C inhibitor, kallistatin, and non-inhibitory serpins, like corticosteroid and thyroxin binding globulins. In general, SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
definition: >-
  serpin family A member, alpha-1-antitrypsin and similar serpin proteins in birds and reptiles. The alpha-1-antitrypsin family has a variety of different members of sauropsida belonging to the clade A of the serpin superfamily. This branch includes members from zebra finch, green anole, king cobra, gekko, crocodile, and central bearded dragon. Alpha-1-antitrypsin (also called A1AT, A1A, AAT, alpha1-proteinase inhibitor/A1PI, alpha1-antiproteinase/A1AP, and serum trypsin inhibitor) is a protease inhibitor. Clade A includes the classical serine proteinase inhibitors, alpha-1-antitrypsin and alpha-1-antichymotrypsin, protein C inhibitor, kallistatin, and non-inhibitory serpins, like corticosteroid and thyroxin binding globulins. In general, SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans. — an NCBI CDD conserved domain (cd19548); members share this curated model.
