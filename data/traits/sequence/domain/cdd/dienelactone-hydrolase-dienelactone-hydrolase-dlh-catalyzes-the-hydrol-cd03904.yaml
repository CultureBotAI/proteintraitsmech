identifier: CDD:cd03904
label: DLH
definition: >-
  Dienelactone hydrolase. Dienelactone hydrolase (DLH) catalyzes the hydrolysis of dienelactone to maleylacetate. DLH contains a Cys-His-Asp catalytic triad, which is unique among enzymes. DLH performs a process called substrate-assisted catalysis, wherein a functional group of the substrate plays a key role in the mechanism of catalysis
