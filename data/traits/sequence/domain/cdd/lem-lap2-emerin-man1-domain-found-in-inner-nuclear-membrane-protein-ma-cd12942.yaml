identifier: CDD:cd12942
label: "LEM (Lap2/Emerin/Man1) domain found in inner nuclear membrane protein Man1. This CD corresponds to the LEM domain of Man1 and similar proteins. Man1, also termed LEM domain-containing protein 3 (LEMD3), is an integral protein of the inner nuclear membrane that binds to nuclear lamins and emerin, thus playing a role in nuclear organization. It is part of a protein complex essential for chromatin organization and cell division. It also functions as an important negative regulator for the transforming growth factor beta (TGF-beta) /activin/Nodal signaling pathway and bone morphogenetic protein (BMP) signaling pathway by directly interacting with chromatin-associated proteins and transcriptional regulators, including the R-Smads, Smad1, Smad2, and Smad3. Man1 is a unique type of left/right (LR) signaling regulator that acts on the inner nuclear membrane. Furthermore, Man1 plays a crucial role in angiogenesis. The vascular remodeling can be regulated at the inner nuclear membrane through interactions between Man1 and Smads. Man1 contains an N-terminal LEM domain, two putative transmembrane domains, a Man1-Src1p C-terminal (MSC) domain, and a C-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain). The LEM domain interacts with DNA and chromatin-binding protein Barrier-to-Autointegration Factor, and is also necessary for efficient localization of Man1 in the inner nuclear membrane. It has been shown that the C-terminal nucleoplasmic region of Man1 exhibits a DNA binding winged helix domain and is responsible for both, DNA- and Smad-binding."
definition: >-
  LEM (Lap2/Emerin/Man1) domain found in inner nuclear membrane protein Man1. This CD corresponds to the LEM domain of Man1 and similar proteins. Man1, also termed LEM domain-containing protein 3 (LEMD3), is an integral protein of the inner nuclear membrane that binds to nuclear lamins and emerin, thus playing a role in nuclear organization. It is part of a protein complex essential for chromatin organization and cell division. It also functions as an important negative regulator for the transforming growth factor beta (TGF-beta) /activin/Nodal signaling pathway and bone morphogenetic protein (BMP) signaling pathway by directly interacting with chromatin-associated proteins and transcriptional regulators, including the R-Smads, Smad1, Smad2, and Smad3. Man1 is a unique type of left/right (LR) signaling regulator that acts on the inner nuclear membrane. Furthermore, Man1 plays a crucial role in angiogenesis. The vascular remodeling can be regulated at the inner nuclear membrane through interactions between Man1 and Smads. Man1 contains an N-terminal LEM domain, two putative transmembrane domains, a Man1-Src1p C-terminal (MSC) domain, and a C-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain). The LEM domain interacts with DNA and chromatin-binding protein Barrier-to-Autointegration Factor, and is also necessary for efficient localization of Man1 in the inner nuclear membrane. It has been shown that the C-terminal nucleoplasmic region of Man1 exhibits a DNA binding winged helix domain and is responsible for both, DNA- and Smad-binding. — an NCBI CDD conserved domain (cd12942); members share this curated model.
