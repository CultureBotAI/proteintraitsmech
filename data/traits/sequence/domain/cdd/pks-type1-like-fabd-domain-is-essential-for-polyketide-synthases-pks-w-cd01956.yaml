identifier: CDD:cd01956
label: "PKS_type1_like. FabD domain is essential for polyketide synthases (PKS) which closely related to fatty acid synthases (FAS).Both are multifunctional enzymes with the same ancestral enzymatic domain structure. Type I PKS are large modular enzyme systems which catalyse the biosynthesis of microcyclic polyketide products through an assembly line of active sites. PKS_type1_like group includes bacterial PKS which used acyl/malonyl-CoA as their starter or extender unit."
definition: >-
  PKS_type1_like. FabD domain is essential for polyketide synthases (PKS) which closely related to fatty acid synthases (FAS).Both are multifunctional enzymes with the same ancestral enzymatic domain structure. Type I PKS are large modular enzyme systems which catalyse the biosynthesis of microcyclic polyketide products through an assembly line of active sites. PKS_type1_like group includes bacterial PKS which used acyl/malonyl-CoA as their starter or extender unit. — an NCBI CDD conserved domain (cd01956); members share this curated model.
