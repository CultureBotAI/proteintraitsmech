identifier: CDD:cd23715
label: "ricin B-type lectin domain, beta-trefoil fold, found in a novel fruiting body lectin CCL2 from the ink cap mushroom Coprinopsis cinerea and similar proteins. Coprinopsis cinerea lectin 2 (CCL2) is a fucoside-binding lectin from the basidiomycete C. cinerea. The fungal lectin CCL2 adopts a beta-trefoil fold and has been implicated in the defense of this mushroom against invertebrate predators based on its toxicity towards nematodes and insects. Toxicity of CCL2 towards the bacterivorous nematode Caenorhabditis elegans is dependent on the specific recognition of the alpha1,3 fucosylated cores of N-glycans on the nematode intestinal epithelium and results in developmental delay and premature death. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in a novel fruiting body lectin CCL2 from the ink cap mushroom Coprinopsis cinerea and similar proteins. Coprinopsis cinerea lectin 2 (CCL2) is a fucoside-binding lectin from the basidiomycete C. cinerea. The fungal lectin CCL2 adopts a beta-trefoil fold and has been implicated in the defense of this mushroom against invertebrate predators based on its toxicity towards nematodes and insects. Toxicity of CCL2 towards the bacterivorous nematode Caenorhabditis elegans is dependent on the specific recognition of the alpha1,3 fucosylated cores of N-glycans on the nematode intestinal epithelium and results in developmental delay and premature death. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site. — an NCBI CDD conserved domain (cd23715); members share this curated model.
