identifier: CDD:cd03879
label: "M28 Zn-peptidase Aeromonas (Vibrio) proteolytica aminopeptidase. Peptidase family M28; Aeromonas (Vibrio) proteolytica aminopeptidase (AAP; leucine aminopeptidase from Vibrio proteolyticus; Bacterial leucyl aminopeptidase; E.C. 3.4.11.10) subfamily. AAP is a small (32kDa), heat stable leucine aminopeptidase and is active as a monomer. Similar forms of the enzyme have been isolated from Escherichia coli and Staphylococcus thermophilus. Leucine aminopeptidases, in general, play important roles in many biological processes such as protein catabolism, hormone degradation, regulation of migration and cell proliferation, as well as HIV infection and proliferation. AAP is a broad-specificity enzyme, utilizing two zinc(II) ions in its active site to remove N-terminal amino acids, with preference for large hydrophobic amino acids in the P1 position of the substrate, Leu being the most efficiently cleaved. It can accommodate all residues, except Pro, Asp and Glu in the P1' position."
definition: >-
