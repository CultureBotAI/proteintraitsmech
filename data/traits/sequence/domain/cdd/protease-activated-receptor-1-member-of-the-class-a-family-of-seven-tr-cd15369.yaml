identifier: CDD:cd15369
label: "protease-activated receptor 1, member of the class A family of seven-transmembrane G protein-coupled receptors. Protease-acted receptors (PARs) are seven-transmembrane proteins that belong to the class A G-protein coupled receptor (GPCR) family. Four different types of the protease-activated receptors have been identified: PAR1, PAR2, PAR3, and PAR4. PARs are predominantly expressed in platelets and are activated by serine proteases such as thrombin, trypsin, and tryptase. These proteases cleave the extracellular domain of the receptor to form a new N-terminus, which in turn functions as a tethered ligand. The newly-formed tethered ligand binds intramolecularly to activate the receptor and triggers G-protein binding and intracellular signaling. PAR1, PA3, and PAR4 are activated by thrombin, whereas PAR2 is activated by trypsin.  The PARs are known to couple with several G-proteins including Gi (cAMP inhibitory), G12/13 (Rho and Ras activation), and Gq (calcium signaling) to activate downstream signaling messengers which induces numerous cellular and physiological effects."
definition: >-
  protease-activated receptor 1, member of the class A family of seven-transmembrane G protein-coupled receptors. Protease-acted receptors (PARs) are seven-transmembrane proteins that belong to the class A G-protein coupled receptor (GPCR) family. Four different types of the protease-activated receptors have been identified: PAR1, PAR2, PAR3, and PAR4. PARs are predominantly expressed in platelets and are activated by serine proteases such as thrombin, trypsin, and tryptase. These proteases cleave the extracellular domain of the receptor to form a new N-terminus, which in turn functions as a tethered ligand. The newly-formed tethered ligand binds intramolecularly to activate the receptor and triggers G-protein binding and intracellular signaling. PAR1, PA3, and PAR4 are activated by thrombin, whereas PAR2 is activated by trypsin. The PARs are known to couple with several G-proteins including Gi (cAMP inhibitory), G12/13 (Rho and Ras activation), and Gq (calcium signaling) to activate downstream signaling messengers which induces numerous cellular and physiological effects. — an NCBI CDD conserved domain (cd15369); members share this curated model.
