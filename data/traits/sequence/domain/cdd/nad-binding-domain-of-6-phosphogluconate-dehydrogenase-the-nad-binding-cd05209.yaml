label: 6_pgdh_N_term_like_2
definition: >-
  NAD binding domain of 6-phosphogluconate dehydrogenase. The NAD binding domain of 6-phosphogluconate dehydrogenase adopts a Rossman fold. 6-PGDH catalyzes the oxidative decarboxylation of 6-phosphogluconate to ribulose 5-phosphate with NADP+ as an electron acceptor, as part of the pentose phosphate pathway. 6-PGDH is a homodimer in which monomers act independently. 6-PGDH has about a 1000-fold greater Km for NADP+ vs. NAD+
