identifier: CDD:cd18319
label: BTB_POZ_KLHL42
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 42 (KLHL42). KLHL42, also called Cullin-3-binding protein 9 (Ctb9) or Kelch domain-containing protein 5, is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex required for mitotic progression and cytokinesis. The BCR(KLHL42) E3 ubiquitin ligase complex mediates the ubiquitination and subsequent degradation of katanin (KATNA1). KLHL42 is involved in microtubule dynamics throughout mitosis. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids
