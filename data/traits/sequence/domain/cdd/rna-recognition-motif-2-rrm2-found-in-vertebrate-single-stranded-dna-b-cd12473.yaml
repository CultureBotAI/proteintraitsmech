identifier: CDD:cd12473
label: "RNA recognition motif 2 (RRM2) found in vertebrate single-stranded DNA-binding protein MSSP-1. This subgroup corresponds to the RRM2 of MSSP-1, also termed RNA-binding motif, single-stranded-interacting protein 1 (RBMS1), or suppressor of CDC2 with RNA-binding motif 2 (SCR2). MSSP-1 is a double- and single-stranded DNA binding protein that belongs to the c-myc single-strand binding proteins (MSSP) family. It specifically recognizes the sequence CT(A/T)(A/T)T, and stimulates DNA replication in the system using SV40 DNA. MSSP-1 is identical with Scr2, a human protein which complements the defect of cdc2 kinase in Schizosaccharomyces pombe. MSSP-1 has been implied in regulating DNA replication, transcription, apoptosis induction, and cell-cycle movement, via the interaction with c-MYC, the product of protooncogene c-myc. MSSP-1 contains two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), both of which are responsible for the specific DNA binding activity as well as induction of apoptosis."
definition: >-
  RNA recognition motif 2 (RRM2) found in vertebrate single-stranded DNA-binding protein MSSP-1. This subgroup corresponds to the RRM2 of MSSP-1, also termed RNA-binding motif, single-stranded-interacting protein 1 (RBMS1), or suppressor of CDC2 with RNA-binding motif 2 (SCR2). MSSP-1 is a double- and single-stranded DNA binding protein that belongs to the c-myc single-strand binding proteins (MSSP) family. It specifically recognizes the sequence CT(A/T)(A/T)T, and stimulates DNA replication in the system using SV40 DNA. MSSP-1 is identical with Scr2, a human protein which complements the defect of cdc2 kinase in Schizosaccharomyces pombe. MSSP-1 has been implied in regulating DNA replication, transcription, apoptosis induction, and cell-cycle movement, via the interaction with c-MYC, the product of protooncogene c-myc. MSSP-1 contains two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), both of which are responsible for the specific DNA binding activity as well as induction of apoptosis. — an NCBI CDD conserved domain (cd12473); members share this curated model.
