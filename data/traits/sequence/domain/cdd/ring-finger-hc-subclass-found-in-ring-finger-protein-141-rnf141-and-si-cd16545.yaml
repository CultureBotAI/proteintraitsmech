identifier: CDD:cd16545
label: "RING finger, HC subclass, found in RING finger protein 141 (RNF141) and similar proteins. RNF141, also known as zinc finger protein 230 (ZNF230), is a RING finger protein present primarily in the nuclei of spermatogonia, the acrosome, and the tail of spermatozoa. It may have a broad function during early development of vertebrates. It plays an important role in spermatogenesis, including spermatogenic cell proliferation and sperm maturation, as well as motility and fertilization. It also exhibits DNA binding activity. RNF141/ZNF230 gene mutations may be associated with azoospermia. RNF141 contains a C3HC4-type RING finger domain that may function as an activator module in transcription."
definition: >-
  RING finger, HC subclass, found in RING finger protein 141 (RNF141) and similar proteins. RNF141, also known as zinc finger protein 230 (ZNF230), is a RING finger protein present primarily in the nuclei of spermatogonia, the acrosome, and the tail of spermatozoa. It may have a broad function during early development of vertebrates. It plays an important role in spermatogenesis, including spermatogenic cell proliferation and sperm maturation, as well as motility and fertilization. It also exhibits DNA binding activity. RNF141/ZNF230 gene mutations may be associated with azoospermia. RNF141 contains a C3HC4-type RING finger domain that may function as an activator module in transcription. — an NCBI CDD conserved domain (cd16545); members share this curated model.
