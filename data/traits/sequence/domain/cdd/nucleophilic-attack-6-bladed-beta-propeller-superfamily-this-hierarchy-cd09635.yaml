identifier: CDD:cd09635
label: N6P
definition: >-
  Nucleophilic attack 6-bladed beta-propeller superfamily. This hierarchy describes a set of enzymes including and related to vertebrate paraoxonase, an enzyme that hydrolyses organophosphorous esters. The family is widely distributed across all three kindgoms of life and many subfamilies are uncharacterized. Included are the major royal jelly protein, which is the food of queen bee larvae, and is responsible for the high reproductive ability of the queen bee. Major royal jelly proteins make up around 90% of larval jelly proteins. This family also includes the yellow protein of drosophila, which controls pigmentation of the adult cuticle and larval mouth parts, members of the senescence marker protein 30 (SMP30)/gluconolactonase family, regulocalcin, S-valerolactone hydrolase, and strictosidine synthase. The proteins in this family are composed of six beta-propeller repeats that form a closed structure, similar to WD40- and NHL-repeat containing protein families. Some family members are also referred to as the calcium-dependent phosphotriesterases
