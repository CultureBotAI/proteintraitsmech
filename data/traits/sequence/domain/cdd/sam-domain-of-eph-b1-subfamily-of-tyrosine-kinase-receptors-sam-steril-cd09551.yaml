identifier: CDD:cd09551
label: "SAM domain of EPH-B1 subfamily of tyrosine kinase receptors. SAM (sterile alpha motif) domain of EPH-B1 subfamily of receptor tyrosine kinases is a C-terminal potential protein-protein interaction domain. This domain is located in the cytoplasmic region of EPH- B1 receptors. In human vascular endothelial cells it appears to mediate cell-cell initiated signal transduction via the binding of the adaptor protein GRB10 (growth factor) through its SH2 domain to a conserved tyrosine that is phosphorylated. EPH-B1 receptors play a role in neurogenesis, in particular in regulation of proliferation and migration of neural progenitors in the hippocampus and in corneal neovascularization; they are involved in converting the crossed retinal projection to ipsilateral retinal projection. They may be potential targets in angiogenesis-related disorders."
