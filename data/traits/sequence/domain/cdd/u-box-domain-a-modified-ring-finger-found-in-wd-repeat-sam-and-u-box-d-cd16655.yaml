identifier: CDD:cd16655
label: "U-box domain, a modified RING finger, found in WD repeat, SAM and U-box domain-containing protein 1 (WDSUB1) and similar proteins. WDSUB1 is an uncharacterized protein containing seven WD40 repeats and a SAM domain in addition to the U-box. Its biological role remains unclear. This subfamily also includes many uncharacterized kinase domain-containing U-box (AtPUB) proteins and several MIF4G motif-containing AtPUB proteins from Arabidopsis."
definition: >-
  U-box domain, a modified RING finger, found in WD repeat, SAM and U-box domain-containing protein 1 (WDSUB1) and similar proteins. WDSUB1 is an uncharacterized protein containing seven WD40 repeats and a SAM domain in addition to the U-box. Its biological role remains unclear. This subfamily also includes many uncharacterized kinase domain-containing U-box (AtPUB) proteins and several MIF4G motif-containing AtPUB proteins from Arabidopsis. — an NCBI CDD conserved domain (cd16655); members share this curated model.
