identifier: CDD:cd12196
label: "C-terminal, kinase associated domain 1 (KA1), a phospholipid binding domain, of microtubule affinity-regulating kinases 1-3. Microtubule-associated protein/microtubule affinity regulating kinases (MARKs), also called partition-defective (Par-1) kinases, are serine/threonine protein kinases (STKs) that catalyze the transfer of the gamma-phosphoryl group from ATP to S/T residues on protein substrates. They phosphorylate the tau protein and related microtubule-associated proteins (MAPs) on tubulin binding sites to induce detachment from microtubules, and are involved in the regulation of cell shape and polarity, cell cycle control, transport, and the cytoskeleton. Mammals contain four proteins, MARK1-4, encoded by distinct genes belonging to this subfamily, with additional isoforms arising from alternative splicing. MARK1/2, through their activation by death-associated protein kinase (DAPK), modulates polarized neurite outgrowth. MARK1, also called Par-1c, is also involved in axon-dendrite specification, and SNPs on the MARK1 gene is associated with autism spectrum disorders. MARK2, also called Par-1b, is implicated in many physiological processes including fertility, immune system homeostasis, learning and memory, growth, and metabolism. MARK3, also called Par-1a, is implicated in gluconeogenesis and adiposity; mice deficient with MARK3 display reduced adiposity, resistance to hepatic steatosis, and defective gluconeogensis. MARKs contain an N-terminal catalytic kinase domain, a ubiquitin-associated domain (UBA), and a C-terminal kinase associated domain (KA1). The KA1 domain binds anionic phospholipids and may be involved in membrane localization as well as in auto-inhibition of the kinase domain."
definition: >-
  C-terminal, kinase associated domain 1 (KA1), a phospholipid binding domain, of microtubule affinity-regulating kinases 1-3. Microtubule-associated protein/microtubule affinity regulating kinases (MARKs), also called partition-defective (Par-1) kinases, are serine/threonine protein kinases (STKs) that catalyze the transfer of the gamma-phosphoryl group from ATP to S/T residues on protein substrates. They phosphorylate the tau protein and related microtubule-associated proteins (MAPs) on tubulin binding sites to induce detachment from microtubules, and are involved in the regulation of cell shape and polarity, cell cycle control, transport, and the cytoskeleton. Mammals contain four proteins, MARK1-4, encoded by distinct genes belonging to this subfamily, with additional isoforms arising from alternative splicing. MARK1/2, through their activation by death-associated protein kinase (DAPK), modulates polarized neurite outgrowth. MARK1, also called Par-1c, is also involved in axon-dendrite specification, and SNPs on the MARK1 gene is associated with autism spectrum disorders. MARK2, also called Par-1b, is implicated in many physiological processes including fertility, immune system homeostasis, learning and memory, growth, and metabolism. MARK3, also called Par-1a, is implicated in gluconeogenesis and adiposity; mice deficient with MARK3 display reduced adiposity, resistance to hepatic steatosis, and defective gluconeogensis. MARKs contain an N-terminal catalytic kinase domain, a ubiquitin-associated domain (UBA), and a C-terminal kinase associated domain (KA1). The KA1 domain binds anionic phospholipids and may be involved in membrane localization as well as in auto-inhibition of the kinase domain. — an NCBI CDD conserved domain (cd12196); members share this curated model.
