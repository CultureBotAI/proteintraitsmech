identifier: CDD:cd17388
label: "Tetracycline resistance protein TetA and related proteins of the Major Facilitator Superfamily of transporters. This subfamily is composed of tetracycline resistance proteins similar to Escherichia coli TetA(A), TetA(B), and TetA(E), which are metal-tetracycline/H(+) antiporters that confer resistance to tetracycline by an active tetracycline efflux, which is an energy-dependent process that decreases the accumulation of the antibiotic in cells. TetA-like tetracycline resistance proteins belongs to the Eukaryotic Solute carrier 46 (SLC46)/Bacterial Tetracycline resistance (TetA) -like (SLC46/TetA-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Tetracycline resistance protein TetA and related proteins of the Major Facilitator Superfamily of transporters. This subfamily is composed of tetracycline resistance proteins similar to Escherichia coli TetA(A), TetA(B), and TetA(E), which are metal-tetracycline/H(+) antiporters that confer resistance to tetracycline by an active tetracycline efflux, which is an energy-dependent process that decreases the accumulation of the antibiotic in cells. TetA-like tetracycline resistance proteins belongs to the Eukaryotic Solute carrier 46 (SLC46)/Bacterial Tetracycline resistance (TetA) -like (SLC46/TetA-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17388); members share this curated model.
