identifier: CDD:cd00523
label: "Holliday junction resolvase. Holliday junction resolvases (HJRs) are endonucleases that specifically resolve Holliday junction DNA intermediates during homologous recombination. HJRs occur in archaea, bacteria, and in the mitochondria of certain eukaryotes; however, this CD includes only the archeal HJRs. The bacterial and archeal HJRs perform a similar function but differ in both sequence and structure. Structural similarity does however, exist between the archeal HJRs and type II restriction endonucleases, such as EcoRV, BglII, and Fok, and this similarity includes their active site configurations."
definition: >-
  Holliday junction resolvase. Holliday junction resolvases (HJRs) are endonucleases that specifically resolve Holliday junction DNA intermediates during homologous recombination. HJRs occur in archaea, bacteria, and in the mitochondria of certain eukaryotes; however, this CD includes only the archeal HJRs. The bacterial and archeal HJRs perform a similar function but differ in both sequence and structure. Structural similarity does however, exist between the archeal HJRs and type II restriction endonucleases, such as EcoRV, BglII, and Fok, and this similarity includes their active site configurations. — an NCBI CDD conserved domain (cd00523); members share this curated model.
