identifier: CDD:cd20245
label: "humanin and similar peptides. Humanin (HN) is a peptide encoded in the mitochondrial genome by the 16S ribosomal RNA gene MT-RNR2. HN has neuroprotective, anti-inflammatory, anti-apoptotic, anti-aging, and anti-fibrilogenic properties through interaction with a series of targets including BAX, IGFBP-3 (insulin-like growth factor binding protein 3), and a trimeric CNTFR/WSX-1/gp130 complex. Endogenous HN is both, an intracellular and secreted protein, and has been detected in brain, retinal pigment epithelium, blood vessels, pancreatic beta cells, tumors, testes and other tissues, and is also present in serum and in human seminal plasma. Single amino acid substitutions of HN can lead to significant changes in its potency and biological functions. There are multiple nuclearly-encoded HN isoforms which may be functional genes regulated in a tissue- and factor-specific manner. HN has potential as a therapeutic target for neurodegenerative and cardiovascular diseases, diabetes, male infertility, and cancer; it may have value as a biomarker for these diseases. Humanin analogs and peptide mimetics have been developed which show promising results in preclinical models of degenerative diseases."
definition: >-
  humanin and similar peptides. Humanin (HN) is a peptide encoded in the mitochondrial genome by the 16S ribosomal RNA gene MT-RNR2. HN has neuroprotective, anti-inflammatory, anti-apoptotic, anti-aging, and anti-fibrilogenic properties through interaction with a series of targets including BAX, IGFBP-3 (insulin-like growth factor binding protein 3), and a trimeric CNTFR/WSX-1/gp130 complex. Endogenous HN is both, an intracellular and secreted protein, and has been detected in brain, retinal pigment epithelium, blood vessels, pancreatic beta cells, tumors, testes and other tissues, and is also present in serum and in human seminal plasma. Single amino acid substitutions of HN can lead to significant changes in its potency and biological functions. There are multiple nuclearly-encoded HN isoforms which may be functional genes regulated in a tissue- and factor-specific manner. HN has potential as a therapeutic target for neurodegenerative and cardiovascular diseases, diabetes, male infertility, and cancer; it may have value as a biomarker for these diseases. Humanin analogs and peptide mimetics have been developed which show promising results in preclinical models of degenerative diseases. — an NCBI CDD conserved domain (cd20245); members share this curated model.
