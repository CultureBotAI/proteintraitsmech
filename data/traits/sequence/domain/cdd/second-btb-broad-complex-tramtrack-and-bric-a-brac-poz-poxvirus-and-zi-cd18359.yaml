identifier: CDD:cd18359
label: "second BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Rho-related BTB domain-containing protein 2 (RhoBTB2). RhoBTB2, also called Deleted in breast cancer 2 gene protein (DBC2) or p83, is an atypical Rho family small guanosine triphosphatase (GTPase) and is a member of the RhoBTB subfamily, which is characterized by containing a GTPase domain (in most cases, non-functional) followed by a proline-rich region, tandem BTB domains, and a conserved C-terminal region. The carboxyl terminal extension that harbors two BTB domains is capable of assembling cullin 3-dependent ubiquitin ligase complexes. RhoBTB2 functions as a tumor suppressor that regulates the expression of the methyltransferase METTL7A. It also acts an adaptor of the Cullin-3-dependent E3 ubiquitin ligase complex. This model corresponds to the second BTB domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  second BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Rho-related BTB domain-containing protein 2 (RhoBTB2). RhoBTB2, also called Deleted in breast cancer 2 gene protein (DBC2) or p83, is an atypical Rho family small guanosine triphosphatase (GTPase) and is a member of the RhoBTB subfamily, which is characterized by containing a GTPase domain (in most cases, non-functional) followed by a proline-rich region, tandem BTB domains, and a conserved C-terminal region. The carboxyl terminal extension that harbors two BTB domains is capable of assembling cullin 3-dependent ubiquitin ligase complexes. RhoBTB2 functions as a tumor suppressor that regulates the expression of the methyltransferase METTL7A. It also acts an adaptor of the Cullin-3-dependent E3 ubiquitin ligase complex. This model corresponds to the second BTB domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18359); members share this curated model.
