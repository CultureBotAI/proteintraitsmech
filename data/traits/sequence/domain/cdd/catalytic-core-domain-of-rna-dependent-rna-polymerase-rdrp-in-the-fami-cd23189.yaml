identifier: CDD:cd23189
label: "catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the family Arteriviridae of positive-sense single-stranded RNA [(+)ssRNA] viruses. This group contains the catalytic core domain of RdRp of RNA viruses belonging to the family Arteriviridae, order Nidovirales. Member viruses have a viral envelope and (+)ssRNA genome. The overall genome organization of the Arteriviruses are highly similar to the Coronaviruses; however, they lack the spike proteins of the coronaviruses. The family members include equine arteritis virus (EAV), porcine reproductive and respiratory syndrome virus (PRRSV), lactate dehydrogenase elevating virus of mice, and simian hemorrhagic fever virus (SHFV). The structure of Arteriviridae RdRp contains a RdRp domain as well as a large N-terminal extension that adopts a nidovirus RdRp-associated nucleotidyltransferase (NiRAN) architecture. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
