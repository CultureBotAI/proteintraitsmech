identifier: CDD:cd20283
label: "dimethylsulfoniopropionate lyase DddY, cupin domain. This family includes dimethylsulfoniopropionate (DMSP) lyase DddY, the only known periplasmic DMSP lyase that is present in certain proteobacteria. DddY cleaves dimethylsulfoniopropionate (DMSP), the organic osmolyte and antioxidant produced in marine environments, and yields acrylate and the climate-active gas dimethyl sulfide (DMS). The catabolism of DMSP by microbial organisms provides a major source of carbon and sulfur in the marine environment. Studies show that DddY binds a zinc ion as cofactor, and uses a key tyrosine as a general base to attack DMSP. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold."
