identifier: CDD:cd10805
label: "uncharacterized YdjC-like family proteins from bacteria. The subfamily contains many hypothetical proteins, and belongs to the YdjC-like family of uncharacterized proteins from bacteria. The YdjC-family is represented by an uncharacterised protein YdjC (also known as ChbG) encoded by the chb (N,N'-diacetylchitobiose, also called [GlcNAc]2) or cel operon in Escherichia coli, which encodes enzymes involved in growth on an N,N'-diacetylchitobiose carbon source. The molecular function of this subfamily is unclear."
definition: >-
  uncharacterized YdjC-like family proteins from bacteria. The subfamily contains many hypothetical proteins, and belongs to the YdjC-like family of uncharacterized proteins from bacteria. The YdjC-family is represented by an uncharacterised protein YdjC (also known as ChbG) encoded by the chb (N,N'-diacetylchitobiose, also called [GlcNAc]2) or cel operon in Escherichia coli, which encodes enzymes involved in growth on an N,N'-diacetylchitobiose carbon source. The molecular function of this subfamily is unclear. — an NCBI CDD conserved domain (cd10805); members share this curated model.
