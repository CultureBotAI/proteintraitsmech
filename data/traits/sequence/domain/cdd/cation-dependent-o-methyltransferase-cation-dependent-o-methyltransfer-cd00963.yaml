identifier: CDD:cd00963
label: "cation-dependent O-methyltransferase. Cation-dependent O-methyltransferases includes catechol O-methyltransferase, caffeoyl-CoA O-methyltransferase, and a family of bacterial O-methyltransferases that may be involved in antibiotic production. Catechol O-methyltransferase catalyzes the O-methylation (inactivation) of catecholamine neurotransmitters and catechol hormones. Caffeoyl-CoA O-methyltransferase methylates caffeoyl-CoA to feruloyl-CoA and 5-hydroxyferuloyl-CoA to sinapoyl-CoA as part of the synthesis of feruloylated polysaccharides involved in the reinforcement of the plant cell wall."
