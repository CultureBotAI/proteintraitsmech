identifier: CDD:cd21761
label: CHP1_DomainII
definition: >-
  Domain II of chromo domain-containing protein 1 (CHP1) and similar proteins. Domain II of chromo domain-containing protein 1 (CHP1) and similar proteins CHP1 is a component of the kinetochore which plays a role in stabilizing microtubules and so allowing accurate chromosome segregation. It has a role in the RNA interference (RNAi) pathway which is important for heterochromatin formation and accurate chromosome segregation. CHP1 is also a member of the RNA-induced transcriptional silencing (RITS) complex which is involved in the biosynthesis of dsRNA from primer siRNAs provided by the RNA-directed RNA polymerase (RDRC) complex. The C-terminal portion of CHP1 contains three domains: SPOC domain, Domain II, and PIN domain. The model corresponds to Domain II, which is a member of the Rossmann fold family, resembling eukaryotic phosphatases and receiver domains of bacterial phosphotransferase signaling systems
