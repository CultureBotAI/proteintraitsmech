identifier: CDD:cd18336
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 4 (KLHL4). KLHL4 shares high identity and similarity with the Drosophila kelch protein, a component of ring canals. It may be associated with X-linked cleft palate (CPX) and is also a candidate gene in the impairment of mullerian duct development. In addition, it has been identified as a target of insulin-like growth factor binding protein 5 (IGFBP5). KLHL4 contains a BTB domain and kelch repeat domains, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 4 (KLHL4). KLHL4 shares high identity and similarity with the Drosophila kelch protein, a component of ring canals. It may be associated with X-linked cleft palate (CPX) and is also a candidate gene in the impairment of mullerian duct development. In addition, it has been identified as a target of insulin-like growth factor binding protein 5 (IGFBP5). KLHL4 contains a BTB domain and kelch repeat domains, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18336); members share this curated model.
