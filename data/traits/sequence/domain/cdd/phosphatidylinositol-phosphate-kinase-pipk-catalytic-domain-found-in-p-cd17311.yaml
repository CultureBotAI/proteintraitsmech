identifier: CDD:cd17311
label: "Phosphatidylinositol phosphate kinase (PIPK) catalytic domain found in Phosphatidylinositol 5-phosphate 4-kinase type-2 gamma (PIP5K2C) and similar proteins. PIP5K2C (EC 2.7.1.149), also known as 1-phosphatidylinositol 5-phosphate 4-kinase 2-gamma, or PI5P4Kgamma, or diphosphoinositide kinase 2-gamma, or phosphatidylinositol 5-phosphate 4-kinase type II gamma, or PI(5)P 4-kinase type II gamma, or PIP4KII-gamma, or PIP4K2C, may play an important role in the production of phosphatidylinositol bisphosphate (PIP2) in the endoplasmic reticulum. It contributes to the development and maintenance of epithelial cell functional polarity. It also plays a role in the regulation of the immune system via mTORC1 signaling. Moreover, PIP5K2C is involved in arsenic trioxide (ATO) cytotoxicity. It mediates PIP2 generation required for positioning and assembly of bipolar spindles and alteration of PIP5K2C function by ATO may thus lead to spindle abnormalities."
definition: >-
  Phosphatidylinositol phosphate kinase (PIPK) catalytic domain found in Phosphatidylinositol 5-phosphate 4-kinase type-2 gamma (PIP5K2C) and similar proteins. PIP5K2C (EC 2.7.1.149), also known as 1-phosphatidylinositol 5-phosphate 4-kinase 2-gamma, or PI5P4Kgamma, or diphosphoinositide kinase 2-gamma, or phosphatidylinositol 5-phosphate 4-kinase type II gamma, or PI(5)P 4-kinase type II gamma, or PIP4KII-gamma, or PIP4K2C, may play an important role in the production of phosphatidylinositol bisphosphate (PIP2) in the endoplasmic reticulum. It contributes to the development and maintenance of epithelial cell functional polarity. It also plays a role in the regulation of the immune system via mTORC1 signaling. Moreover, PIP5K2C is involved in arsenic trioxide (ATO) cytotoxicity. It mediates PIP2 generation required for positioning and assembly of bipolar spindles and alteration of PIP5K2C function by ATO may thus lead to spindle abnormalities. — an NCBI CDD conserved domain (cd17311); members share this curated model.
