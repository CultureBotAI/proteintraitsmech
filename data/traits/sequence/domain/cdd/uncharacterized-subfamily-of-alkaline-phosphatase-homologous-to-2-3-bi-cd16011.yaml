identifier: CDD:cd16011
label: "uncharacterized subfamily of alkaline phosphatase, homologous to 2 3 bisphosphoglycerate independent phosphoglycerate mutase (iPGM) and bacterial phosphopentomutases. The proteins in this subfamily of alkaline phosphatase are not characterized. Their sequences show similarity to 2 3 bisphosphoglycerate independent phosphoglycerate mutase (iPGM) which catalyzes the interconversion of 3-phosphoglycerate to 2-phosphoglycerate, and to bacterial phosphopentomutases (PPMs) which interconvert alpha-D-ribose 5-phosphate (ribose 5-phosphate) and alpha-D-ribose 1-phosphate (ribose 1-phosphate)."
definition: >-
  uncharacterized subfamily of alkaline phosphatase, homologous to 2 3 bisphosphoglycerate independent phosphoglycerate mutase (iPGM) and bacterial phosphopentomutases. The proteins in this subfamily of alkaline phosphatase are not characterized. Their sequences show similarity to 2 3 bisphosphoglycerate independent phosphoglycerate mutase (iPGM) which catalyzes the interconversion of 3-phosphoglycerate to 2-phosphoglycerate, and to bacterial phosphopentomutases (PPMs) which interconvert alpha-D-ribose 5-phosphate (ribose 5-phosphate) and alpha-D-ribose 1-phosphate (ribose 1-phosphate). — an NCBI CDD conserved domain (cd16011); members share this curated model.
