identifier: CDD:cd21081
label: "Dachshund-homology domain found in the retinal determination protein Dachshund and similar proteins. Dachshund proteins act as transcription factors involved in the regulation of organogenesis. They may be a regulator of SIX1, SIX6 and probably SIX5. The Dachshund-homology domain (DHD), also known as the N-terminal Ski/Sno/Dac domain, adopts a mixed alpha/beta structure containing a helix-turn-helix motif, similar to features found in the forkhead/winged-helix family of DNA binding proteins. It contains a conserved CLPQ motif and can bind co-factors. Its structure suggests that it may also bind DNA. It has been postulated that Dachshund proteins may bind to chromatin DNA via their DHD domains."
definition: >-
  Dachshund-homology domain found in the retinal determination protein Dachshund and similar proteins. Dachshund proteins act as transcription factors involved in the regulation of organogenesis. They may be a regulator of SIX1, SIX6 and probably SIX5. The Dachshund-homology domain (DHD), also known as the N-terminal Ski/Sno/Dac domain, adopts a mixed alpha/beta structure containing a helix-turn-helix motif, similar to features found in the forkhead/winged-helix family of DNA binding proteins. It contains a conserved CLPQ motif and can bind co-factors. Its structure suggests that it may also bind DNA. It has been postulated that Dachshund proteins may bind to chromatin DNA via their DHD domains. — an NCBI CDD conserved domain (cd21081); members share this curated model.
