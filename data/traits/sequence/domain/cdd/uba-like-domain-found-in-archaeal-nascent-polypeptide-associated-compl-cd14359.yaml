identifier: CDD:cd14359
label: "UBA-like domain found in archaeal nascent polypeptide-associated complex homolog from Methanothermobacter marburgensis (AeNAC) and similar proteins. AeNAC is a functional archaeal homolog of eukaryotic nascent polypeptide-associated complex (NAC). Both AeNAC and eukaryotic NAC function as the cytosolic chaperone that can bind to ribosomal RNA, interact with the nascent polypeptide chains as they emerge from the ribosome, and assist in post-translational processes. They all contain a NAC domain and an ubiquitin-associated (UBA) domain in the C-terminus. However, unlike eukaryotic NAC, AeNAC forms a ribosome associated homodimer, but not heterodimer. The NAC domain of AeNAC is responsible for the homodimer formation."
definition: >-
  UBA-like domain found in archaeal nascent polypeptide-associated complex homolog from Methanothermobacter marburgensis (AeNAC) and similar proteins. AeNAC is a functional archaeal homolog of eukaryotic nascent polypeptide-associated complex (NAC). Both AeNAC and eukaryotic NAC function as the cytosolic chaperone that can bind to ribosomal RNA, interact with the nascent polypeptide chains as they emerge from the ribosome, and assist in post-translational processes. They all contain a NAC domain and an ubiquitin-associated (UBA) domain in the C-terminus. However, unlike eukaryotic NAC, AeNAC forms a ribosome associated homodimer, but not heterodimer. The NAC domain of AeNAC is responsible for the homodimer formation. — an NCBI CDD conserved domain (cd14359); members share this curated model.
