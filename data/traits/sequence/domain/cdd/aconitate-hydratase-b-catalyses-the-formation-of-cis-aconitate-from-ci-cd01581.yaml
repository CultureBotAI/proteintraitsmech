identifier: CDD:cd01581
label: "Aconitate hydratase B catalyses the formation of cis-aconitate from citrate as part of the TCA cycle. Aconitase B catalytic domain. Aconitate hydratase B catalyses the formation of cis-aconitate from citrate as part of the TCA cycle. Aconitase has an active (4FE-4S) and an inactive (3FE-4S) form. The active cluster is part of the catalytic site that interconverts citrate, cis-aconitase and isocitrate. The domain architecture of aconitase B is different from other aconitases in that the catalytic domain is normally found at C-terminus for other aconitases, but it is at N-terminus for B family. It also has a HEAT domain before domain 4 which plays a role in protein-protein interaction. This alignment is the core domain including domains 1,2 and 3."
definition: >-
  Aconitate hydratase B catalyses the formation of cis-aconitate from citrate as part of the TCA cycle. Aconitase B catalytic domain. Aconitate hydratase B catalyses the formation of cis-aconitate from citrate as part of the TCA cycle. Aconitase has an active (4FE-4S) and an inactive (3FE-4S) form. The active cluster is part of the catalytic site that interconverts citrate, cis-aconitase and isocitrate. The domain architecture of aconitase B is different from other aconitases in that the catalytic domain is normally found at C-terminus for other aconitases, but it is at N-terminus for B family. It also has a HEAT domain before domain 4 which plays a role in protein-protein interaction. This alignment is the core domain including domains 1,2 and 3. — an NCBI CDD conserved domain (cd01581); members share this curated model.
