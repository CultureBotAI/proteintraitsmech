identifier: CDD:cd14736
label: BACK_AtBPM-like
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in plant BTB/POZ-MATH (BPM) protein family. The BPM protein family includes Arabidopsis thaliana BTB/POZ and MATH domain-containing proteins, AtBPM1-6, and similar proteins. BPM protein, also termed protein BTB-POZ and MATH domain, may act as a substrate-specific adaptor of an E3 ubiquitin-protein ligase complex (CUL3-RBX1-BTB) which mediates the ubiquitination and subsequent proteasomal degradation of target proteins
