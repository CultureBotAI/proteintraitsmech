identifier: CDD:cd04334
label: "INS is an amino acid-editing domain inserted (INS) into the bacterial class II prolyl-tRNA synthetase (ProRS) however, this CD is not exclusively bacterial. It is also found at the N-terminus of the eukaryotic/archaea-like ProRS's of yeasts and single-celled parasites.  ProRS catalyzes the attachment of proline to tRNA(Pro); proline is first activated by ATP, and then transferred to the acceptor end of tRNA(Pro). ProRS can inadvertently process noncognate amino acids such as alanine and cysteine, and to avoid such errors, in post-transfer editing, the INS domain deacylates mischarged Ala-tRNA(Pro), thus ensuring the fidelity of translation. Misacylated Cys-tRNA(Pro) is not edited by ProRS.  In addition to the INS editing domain, the prokaryote-like ProRS protein contains catalytic and anticodon-binding domains which form a dimeric interface."
definition: >-
  INS is an amino acid-editing domain inserted (INS) into the bacterial class II prolyl-tRNA synthetase (ProRS) however, this CD is not exclusively bacterial. It is also found at the N-terminus of the eukaryotic/archaea-like ProRS's of yeasts and single-celled parasites. ProRS catalyzes the attachment of proline to tRNA(Pro); proline is first activated by ATP, and then transferred to the acceptor end of tRNA(Pro). ProRS can inadvertently process noncognate amino acids such as alanine and cysteine, and to avoid such errors, in post-transfer editing, the INS domain deacylates mischarged Ala-tRNA(Pro), thus ensuring the fidelity of translation. Misacylated Cys-tRNA(Pro) is not edited by ProRS. In addition to the INS editing domain, the prokaryote-like ProRS protein contains catalytic and anticodon-binding domains which form a dimeric interface. — an NCBI CDD conserved domain (cd04334); members share this curated model.
