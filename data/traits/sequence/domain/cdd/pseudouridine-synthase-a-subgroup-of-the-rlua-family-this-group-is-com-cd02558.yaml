identifier: CDD:cd02558
label: "Pseudouridine synthase, a subgroup of the RluA family. This group is comprised of bacterial proteins assigned to the RluA family of pseudouridine synthases. Pseudouridine synthases catalyze the isomerization of specific uridines in an RNA molecule to pseudouridines (5-ribosyluracil, psi).  No cofactors are required. The RluA family is comprised of proteins related to Escherichia coli RluA."
definition: >-
  Pseudouridine synthase, a subgroup of the RluA family. This group is comprised of bacterial proteins assigned to the RluA family of pseudouridine synthases. Pseudouridine synthases catalyze the isomerization of specific uridines in an RNA molecule to pseudouridines (5-ribosyluracil, psi). No cofactors are required. The RluA family is comprised of proteins related to Escherichia coli RluA. — an NCBI CDD conserved domain (cd02558); members share this curated model.
