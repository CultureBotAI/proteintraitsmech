identifier: CDD:cd21056
label: IntS9_CTD
definition: >-
  C-terminal domain of Integrator complex subunit 9 (IntS9) and similar proteins. IntS9, also termed protein related to CPSF subunits of 74 kDa, or RC-74, is a component of the Integrator (INT) complex, a complex involved in the small nuclear RNAs (snRNA) U1 and U2 transcription and in their 3'-box-dependent processing. It forms a stable complex with Integrator complex subunit 11 (IntS11) through their C-terminal domains (CTDs). IntS9-IntS11 interaction is crucial for the role of INT in snRNA 3'-end processing
