identifier: CDD:cd11325
label: "Alpha amylase catalytic domain found in Glycosyltrehalose trehalohydrolase (also called Maltooligosyl trehalose Trehalohydrolase). Glycosyltrehalose trehalohydrolase (GTHase) was discovered as part of a coupled system for the production of trehalose from soluble starch. In the first half of the reaction, glycosyltrehalose synthase (GTSase), an intramolecular glycosyl transferase, converts the glycosidic bond between the last two glucose residues of amylose from an alpha-1,4 bond to an alpha-1,1 bond, making a non-reducing glycosyl trehaloside. In the second half of the reaction, GTHase cleaves the alpha-1,4 glycosidic bond adjacent to the trehalose moiety to release trehalose and malto-oligosaccharide. Like isoamylase and other glycosidases that recognize branched oligosaccharides, GTHase contains an N-terminal extension and does not have the conserved calcium ion present in other alpha amylase family enzymes. The Alpha-amylase family comprises the largest family of glycoside hydrolases (GH), with the majority of enzymes acting on starch, glycogen, and related oligo- and polysaccharides. These proteins catalyze the transformation of alpha-1,4 and alpha-1,6 glucosidic linkages with retention of the anomeric center. The protein is described as having 3 domains: A, B, C. A is a (beta/alpha) 8-barrel; B is a loop between the beta 3 strand and alpha 3 helix of A; C is the C-terminal extension characterized by a Greek key. The majority of the enzymes have an active site cleft found between domains A and B where a triad of catalytic residues (Asp, Glu and Asp) performs catalysis. Other members of this family have lost the catalytic activity as in the case of the human 4F2hc, or only have 2 residues that serve as the catalytic nucleophile and the acid/base, such as Thermus A4 beta-galactosidase with 2 Glu residues (GH42) and human alpha-galactosidase with 2 Asp residues (GH31). The family members are quite extensive and include: alpha amylase, maltosyltransferase, cyclodextrin glycotransferase, maltogenic amylase, neopullulanase, isoamylase, 1,4-alpha-D-glucan maltotetrahydrolase, 4-alpha-glucotransferase, oligo-1,6-glucosidase, amylosucrase, sucrose phosphorylase, and amylomaltase. Glycosyltrehalose Trehalohydrolase Maltooligosyltrehalose Trehalohydrolase"
definition: >-
  Alpha amylase catalytic domain found in Glycosyltrehalose trehalohydrolase (also called Maltooligosyl trehalose Trehalohydrolase). Glycosyltrehalose trehalohydrolase (GTHase) was discovered as part of a coupled system for the production of trehalose from soluble starch. In the first half of the reaction, glycosyltrehalose synthase (GTSase), an intramolecular glycosyl transferase, converts the glycosidic bond between the last two glucose residues of amylose from an alpha-1,4 bond to an alpha-1,1 bond, making a non-reducing glycosyl trehaloside. In the second half of the reaction, GTHase cleaves the alpha-1,4 glycosidic bond adjacent to the trehalose moiety to release trehalose and malto-oligosaccharide. Like isoamylase and other glycosidases that recognize branched oligosaccharides, GTHase contains an N-terminal extension and does not have the conserved calcium ion present in other alpha amylase family enzymes. The Alpha-amylase family comprises the largest family of glycoside hydrolases (GH), with the majority of enzymes acting on starch, glycogen, and related oligo- and polysaccharides. These proteins catalyze the transformation of alpha-1,4 and alpha-1,6 glucosidic linkages with retention of the anomeric center. The protein is described as having 3 domains: A, B, C. A is a (beta/alpha) 8-barrel; B is a loop between the beta 3 strand and alpha 3 helix of A; C is the C-terminal extension characterized by a Greek key. The majority of the enzymes have an active site cleft found between domains A and B where a triad of catalytic residues (Asp, Glu and Asp) performs catalysis. Other members of this family have lost the catalytic activity as in the case of the human 4F2hc, or only have 2 residues that serve as the catalytic nucleophile and the acid/base, such as Thermus A4 beta-galactosidase with 2 Glu residues (GH42) and human alpha-galactosidase with 2 Asp residues (GH31). The family members are quite extensive and include: alpha amylase, maltosyltransferase, cyclodextrin glycotransferase, maltogenic amylase, neopullulanase, isoamylase, 1,4-alpha-D-glucan maltotetrahydrolase, 4-alpha-glucotransferase, oligo-1,6-glucosidase, amylosucrase, sucrose phosphorylase, and amylomaltase. Glycosyltrehalose Trehalohydrolase Maltooligosyltrehalose Trehalohydrolase — an NCBI CDD conserved domain (cd11325); members share this curated model.
