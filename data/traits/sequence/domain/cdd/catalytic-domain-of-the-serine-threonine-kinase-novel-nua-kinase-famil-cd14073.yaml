identifier: CDD:cd14073
label: "Catalytic domain of the Serine/Threonine Kinase, novel (nua) kinase family NUAK. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. NUAK proteins are classified as AMP-activated protein kinase (AMPK)-related kinases, which like AMPK are activated by the major tumor suppressor LKB1. Vertebrates contain two NUAK proteins, called NUAK1 and NUAK2. NUAK1, also called ARK5 (AMPK-related protein kinase 5), regulates cell proliferation and displays tumor suppression through direct interaction and phosphorylation of p53. It is also involved in cell senescence and motility. High NUAK1 expression is associated with invasiveness of nonsmall cell lung cancer (NSCLC) and breast cancer cells. NUAK2, also called SNARK (Sucrose, non-fermenting 1/AMP-activated protein kinase-related kinase), is involved in energy metabolism. It is activated by hyperosmotic stress, DNA damage, and nutrients such as glucose and glutamine. NUAK2-knockout mice develop obesity, altered serum lipid profiles, hyperinsulinaemia, hyperglycaemia, and impaired glucose tolerance. The NUAK subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, novel (nua) kinase family NUAK. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. NUAK proteins are classified as AMP-activated protein kinase (AMPK)-related kinases, which like AMPK are activated by the major tumor suppressor LKB1. Vertebrates contain two NUAK proteins, called NUAK1 and NUAK2. NUAK1, also called ARK5 (AMPK-related protein kinase 5), regulates cell proliferation and displays tumor suppression through direct interaction and phosphorylation of p53. It is also involved in cell senescence and motility. High NUAK1 expression is associated with invasiveness of nonsmall cell lung cancer (NSCLC) and breast cancer cells. NUAK2, also called SNARK (Sucrose, non-fermenting 1/AMP-activated protein kinase-related kinase), is involved in energy metabolism. It is activated by hyperosmotic stress, DNA damage, and nutrients such as glucose and glutamine. NUAK2-knockout mice develop obesity, altered serum lipid profiles, hyperinsulinaemia, hyperglycaemia, and impaired glucose tolerance. The NUAK subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14073); members share this curated model.
