identifier: CDD:cd20343
label: "BRcat domain found in human homolog of Drosophila Ariadne (HHARI) and similar proteins. This subfamily includes Drosophila melanogaster protein ariadne-1 (ARI-1), and its eukaryotic homologs, such as HHARI. ARI-1 is a widely expressed Drosophila RING-finger protein that localizes mainly in the cytoplasm, and is required for neural development. It interacts with the ubiquitin-conjugating enzyme, UbcD10. HHARI is also called H7-AP2, monocyte protein 6 (MOP-6), protein ariadne-1 homolog, Ariadne RBR E3 ubiquitin protein ligase 1 (ARIH1), ariadne-1 (ARI-1), UbcH7-binding protein, UbcM4-interacting protein, or ubiquitin-conjugating enzyme E2-binding protein 1. It is an RBR-type E3 ubiquitin-protein ligase highly expressed in nuclei, where it is co-localized with nuclear bodies including Cajal, PML, and Lewy bodies. It interacts with the E2 conjugating enzymes UbcH7, UbcH8, UbcM4, and UbcD10 in human, mouse and fly, and modulates the ubiquitylation of substrate proteins including single-minded 2 (SIM2) and translation initiation factor 4E homologous protein (4EHP). It functions as a potent mediator of DNA damage-induced translation arrest, which protects stem and cancer cells against genotoxic stress by initiating a 4EHP-mediated mRNA translation arrest. HHARI contains an RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. This model corresponds to the BRcat domain of HHARI and similar proteins that adopt the same fold as the Rcat domain while lacking the catalytic cysteine residue and ubiquitination activity."
definition: >-
  BRcat domain found in human homolog of Drosophila Ariadne (HHARI) and similar proteins. This subfamily includes Drosophila melanogaster protein ariadne-1 (ARI-1), and its eukaryotic homologs, such as HHARI. ARI-1 is a widely expressed Drosophila RING-finger protein that localizes mainly in the cytoplasm, and is required for neural development. It interacts with the ubiquitin-conjugating enzyme, UbcD10. HHARI is also called H7-AP2, monocyte protein 6 (MOP-6), protein ariadne-1 homolog, Ariadne RBR E3 ubiquitin protein ligase 1 (ARIH1), ariadne-1 (ARI-1), UbcH7-binding protein, UbcM4-interacting protein, or ubiquitin-conjugating enzyme E2-binding protein 1. It is an RBR-type E3 ubiquitin-protein ligase highly expressed in nuclei, where it is co-localized with nuclear bodies including Cajal, PML, and Lewy bodies. It interacts with the E2 conjugating enzymes UbcH7, UbcH8, UbcM4, and UbcD10 in human, mouse and fly, and modulates the ubiquitylation of substrate proteins including single-minded 2 (SIM2) and translation initiation factor 4E homologous protein (4EHP). It functions as a potent mediator of DNA damage-induced translation arrest, which protects stem and cancer cells against genotoxic stress by initiating a 4EHP-mediated mRNA translation arrest. HHARI contains an RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. This model corresponds to the BRcat domain of HHARI and similar proteins that adopt the same fold as the Rcat domain while lacking the catalytic cysteine residue and ubiquitination activity. — an NCBI CDD conserved domain (cd20343); members share this curated model.
