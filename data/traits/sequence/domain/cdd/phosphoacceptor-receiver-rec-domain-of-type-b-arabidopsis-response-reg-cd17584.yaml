identifier: CDD:cd17584
label: "phosphoacceptor receiver (REC) domain of type B Arabidopsis response regulators (ARRs) and similar domains. Type-B ARRs (Arabidopsis response regulators) are a class of MYB-type transcription factors that act as major players in the transcriptional activation of cytokinin-responsive genes. They directly regulate the expression of type-A ARR genes and other downstream target genes. Cytokinin is a plant hormone implicated in many growth and development processes including shoot organogenesis, leaf senescence, sink/source relationships, vascular development, lateral bud release, and photomorphogenic development. Cytokinin signaling involves a phosphorelay cascade by histidine kinase receptors (AHKs), histidine phosphotransfer proteins (AHPs) and downstream ARRs. ARRs are divided into two groups, type-A and -B, according to their sequence and domain structure. Type-B ARRs contain a receiver (REC) domain and a large C-terminal extension that has characteristics of an effector or output domain, with a Myb-like DNA binding domain referred to as the GARP domain. The GARP domain is a motif specific to plant transcription factors. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of type B Arabidopsis response regulators (ARRs) and similar domains. Type-B ARRs (Arabidopsis response regulators) are a class of MYB-type transcription factors that act as major players in the transcriptional activation of cytokinin-responsive genes. They directly regulate the expression of type-A ARR genes and other downstream target genes. Cytokinin is a plant hormone implicated in many growth and development processes including shoot organogenesis, leaf senescence, sink/source relationships, vascular development, lateral bud release, and photomorphogenic development. Cytokinin signaling involves a phosphorelay cascade by histidine kinase receptors (AHKs), histidine phosphotransfer proteins (AHPs) and downstream ARRs. ARRs are divided into two groups, type-A and -B, according to their sequence and domain structure. Type-B ARRs contain a receiver (REC) domain and a large C-terminal extension that has characteristics of an effector or output domain, with a Myb-like DNA binding domain referred to as the GARP domain. The GARP domain is a motif specific to plant transcription factors. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17584); members share this curated model.
