identifier: CDD:cd16301
label: "IMP-1, DIM-1, GIM-1, SIM-1, TMB-1 and related metallo-beta-lactamases, subclass B1; MBL-fold metallo-hydrolase domain. Includes the acquired MBLs IMP-1(a beta-lactamase that is active on imipenem), DIM-1 (Dutch imipenemase), GIM-1 (German imipenemase), KHM-1 (Kyorin Health Science MBL 1), SIM-1 (Seoul imipenemase), and TMB-1 (Tripoli metallo-beta-lactamase). IMP-1, DIM-1, GIM-1, SIM-1, and TMB-1 are Class 1 integron-mediated MBLs, KMH-1 is plasmid-mediated. MBLs (class B of the Ambler beta-lactamase classification) are a diverse group of metallo-enzymes that are capable of catalyzing the hydrolysis of a wide range of beta-lactam antibiotics. MBLs have been divided into three subclasses B1, B2 and B3, based on sequence/structural relationships and substrates, with the B1 and B2 MBLs being most closely related to each other. This subgroup of acquired MBLs belongs to the B1 subclass. B1 enzymes are most active with two zinc ions bound in the active site, and have a broad-spectrum substrate profile."
definition: >-
  IMP-1, DIM-1, GIM-1, SIM-1, TMB-1 and related metallo-beta-lactamases, subclass B1; MBL-fold metallo-hydrolase domain. Includes the acquired MBLs IMP-1(a beta-lactamase that is active on imipenem), DIM-1 (Dutch imipenemase), GIM-1 (German imipenemase), KHM-1 (Kyorin Health Science MBL 1), SIM-1 (Seoul imipenemase), and TMB-1 (Tripoli metallo-beta-lactamase). IMP-1, DIM-1, GIM-1, SIM-1, and TMB-1 are Class 1 integron-mediated MBLs, KMH-1 is plasmid-mediated. MBLs (class B of the Ambler beta-lactamase classification) are a diverse group of metallo-enzymes that are capable of catalyzing the hydrolysis of a wide range of beta-lactam antibiotics. MBLs have been divided into three subclasses B1, B2 and B3, based on sequence/structural relationships and substrates, with the B1 and B2 MBLs being most closely related to each other. This subgroup of acquired MBLs belongs to the B1 subclass. B1 enzymes are most active with two zinc ions bound in the active site, and have a broad-spectrum substrate profile. — an NCBI CDD conserved domain (cd16301); members share this curated model.
