identifier: CDD:cd17696
label: "RUN domain found in RUN and FYVE domain-containing protein 3 (RUFY3) and similar proteins. RUFY3, also called Rap2-interacting protein x (RIPx or RPIPx), or single axon-regulated protein (singar), is an N-terminal RUN domain and a C-terminal FYVE domain containing protein predominantly expressed in the brain. It suppresses formation of surplus axons for neuronal polarity. Unlike other RUFY proteins, RUFY3 can associate with the GTP-bound active form of Rab5. This model represents the RUN domain of RUFY3."
definition: >-
  RUN domain found in RUN and FYVE domain-containing protein 3 (RUFY3) and similar proteins. RUFY3, also called Rap2-interacting protein x (RIPx or RPIPx), or single axon-regulated protein (singar), is an N-terminal RUN domain and a C-terminal FYVE domain containing protein predominantly expressed in the brain. It suppresses formation of surplus axons for neuronal polarity. Unlike other RUFY proteins, RUFY3 can associate with the GTP-bound active form of Rab5. This model represents the RUN domain of RUFY3. — an NCBI CDD conserved domain (cd17696); members share this curated model.
