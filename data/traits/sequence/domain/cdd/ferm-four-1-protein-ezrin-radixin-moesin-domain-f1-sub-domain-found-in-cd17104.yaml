identifier: CDD:cd17104
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in E3 ubiquitin-protein ligase MYLIP and similar proteins. MYLIP, also termed inducible degrader of the LDL-receptor (Idol), or myosin regulatory light chain interacting protein (MIR), is an E3 ubiquitin-protein ligase that mediates ubiquitination and subsequent proteasomal degradation of myosin regulatory light chain (MRLC), LDLR, VLDLR and LRP8. Its activity depends on E2 ubiquitin-conjugating enzymes of the UBE2D family, including UBE2D1, UBE2D2, UBE2D3, and UBE2D4. MYLIP stimulates clathrin-independent endocytosis and acts as a sterol-dependent inhibitor of cellular cholesterol uptake by binding directly to the cytoplasmic tail of the LDLR and promoting its ubiquitination via the UBE2D1/E1 complex. The ubiquitinated LDLR then enters the multivesicular body (MVB) protein-sorting pathway and is shuttled to the lysosome for degradation. Moreover, MYLIP has been identified as a novel ERM-like protein that affects cytoskeleton interactions regulating cell motility, such as neurite outgrowth. The ERM proteins includes ezrin, radixin, and moesin, which are cytoskeletal effector proteins linking actin to membrane-bound proteins at the cell surface. MYLIP contains a FERM-domain and a C-terminal C3HC4-type RING-HC finger. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in E3 ubiquitin-protein ligase MYLIP and similar proteins. MYLIP, also termed inducible degrader of the LDL-receptor (Idol), or myosin regulatory light chain interacting protein (MIR), is an E3 ubiquitin-protein ligase that mediates ubiquitination and subsequent proteasomal degradation of myosin regulatory light chain (MRLC), LDLR, VLDLR and LRP8. Its activity depends on E2 ubiquitin-conjugating enzymes of the UBE2D family, including UBE2D1, UBE2D2, UBE2D3, and UBE2D4. MYLIP stimulates clathrin-independent endocytosis and acts as a sterol-dependent inhibitor of cellular cholesterol uptake by binding directly to the cytoplasmic tail of the LDLR and promoting its ubiquitination via the UBE2D1/E1 complex. The ubiquitinated LDLR then enters the multivesicular body (MVB) protein-sorting pathway and is shuttled to the lysosome for degradation. Moreover, MYLIP has been identified as a novel ERM-like protein that affects cytoskeleton interactions regulating cell motility, such as neurite outgrowth. The ERM proteins includes ezrin, radixin, and moesin, which are cytoskeletal effector proteins linking actin to membrane-bound proteins at the cell surface. MYLIP contains a FERM-domain and a C-terminal C3HC4-type RING-HC finger. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17104); members share this curated model.
