identifier: CDD:cd19741
label: "basic helix-loop-helix-orange (bHLH-O) domain found in Drosophila melanogaster enhancer of split mbeta protein (ESMB) and similar proteins. ESMB, also termed E(spl)mbeta, or HLH-mbeta, or split locus enhancer protein mA, is a bHLH-O transcriptional repressor of genes that require a bHLH protein for their transcription. It is involved in the neural-epidermal lineage decision during early neurogenesis. The family also includes Enhancer of split m7 protein (also known as E(spl)m7), which acts as a transcriptional repressor that participates in the control of cell fate choice by uncommitted neuroectodermal cells in the embryo."
definition: >-
  basic helix-loop-helix-orange (bHLH-O) domain found in Drosophila melanogaster enhancer of split mbeta protein (ESMB) and similar proteins. ESMB, also termed E(spl)mbeta, or HLH-mbeta, or split locus enhancer protein mA, is a bHLH-O transcriptional repressor of genes that require a bHLH protein for their transcription. It is involved in the neural-epidermal lineage decision during early neurogenesis. The family also includes Enhancer of split m7 protein (also known as E(spl)m7), which acts as a transcriptional repressor that participates in the control of cell fate choice by uncommitted neuroectodermal cells in the embryo. — an NCBI CDD conserved domain (cd19741); members share this curated model.
