identifier: CDD:cd18464
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like proteins, KLHL25 and KLHL37. The family includes KLHL25 and KLHL37. KLHL25, also called ectoderm-neural cortex protein 2 (ENC-2), is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex required for translational homeostasis. The BCR(KLHL25) ubiquitin ligase complex acts by mediating ubiquitination of hypophosphorylated EIF4EBP1 (4E-BP1). KLHL37, also called ectoderm-neural cortex protein 1 (ENC-1), or nuclear matrix protein NRP/B, or p53-induced gene 10 protein, is an actin-binding nuclear matrix protein that associates with p110(RB), and is involved in the regulation of neuronal process formation and in differentiation of neural crest cells."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like proteins, KLHL25 and KLHL37. The family includes KLHL25 and KLHL37. KLHL25, also called ectoderm-neural cortex protein 2 (ENC-2), is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex required for translational homeostasis. The BCR(KLHL25) ubiquitin ligase complex acts by mediating ubiquitination of hypophosphorylated EIF4EBP1 (4E-BP1). KLHL37, also called ectoderm-neural cortex protein 1 (ENC-1), or nuclear matrix protein NRP/B, or p53-induced gene 10 protein, is an actin-binding nuclear matrix protein that associates with p110(RB), and is involved in the regulation of neuronal process formation and in differentiation of neural crest cells. — an NCBI CDD conserved domain (cd18464); members share this curated model.
