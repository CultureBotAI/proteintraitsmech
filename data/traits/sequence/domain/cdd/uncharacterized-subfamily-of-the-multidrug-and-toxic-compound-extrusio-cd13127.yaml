identifier: CDD:cd13127
label: "Uncharacterized subfamily of the multidrug and toxic compound extrusion (MATE) proteins. This family might function as a translocase for lipopolysaccharides and participate in the biosynthesis of cell wall components such as teichuronic acid. The integral membrane proteins from the MATE family are involved in exporting metabolites across the cell membrane and are responsible for multidrug resistance (MDR) in many bacteria and animals. A number of family members are involved in the synthesis of peptidoglycan components in bacteria."
definition: >-
  Uncharacterized subfamily of the multidrug and toxic compound extrusion (MATE) proteins. This family might function as a translocase for lipopolysaccharides and participate in the biosynthesis of cell wall components such as teichuronic acid. The integral membrane proteins from the MATE family are involved in exporting metabolites across the cell membrane and are responsible for multidrug resistance (MDR) in many bacteria and animals. A number of family members are involved in the synthesis of peptidoglycan components in bacteria. — an NCBI CDD conserved domain (cd13127); members share this curated model.
