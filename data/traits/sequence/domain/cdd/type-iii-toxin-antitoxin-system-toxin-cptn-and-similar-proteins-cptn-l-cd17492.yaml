identifier: CDD:cd17492
label: "type III toxin-antitoxin system toxin CptN and similar proteins. CptN-like toxin component of a type III toxin-antitoxin (TA) system, which consists of a ribonuclease (RNase) toxin that processes its structured and specific cognate RNA antitoxin, which in turn then directly inhibits the toxin. TA systems have been associated with many important phenotypes, like phage resistance, maintenance of genomic islands, and formation of bacterial persister cells."
definition: >-
  type III toxin-antitoxin system toxin CptN and similar proteins. CptN-like toxin component of a type III toxin-antitoxin (TA) system, which consists of a ribonuclease (RNase) toxin that processes its structured and specific cognate RNA antitoxin, which in turn then directly inhibits the toxin. TA systems have been associated with many important phenotypes, like phage resistance, maintenance of genomic islands, and formation of bacterial persister cells. — an NCBI CDD conserved domain (cd17492); members share this curated model.
