identifier: CDD:cd07710
label: "Pseudomonas aeruginosa arylsulfatase SdsA1, Pseudomonas sp. DSM6611 arylsulfatase  Pisa1, and related proteins; MBL-fold metallo-hydrolase domain. Arylsulfatase (also known as aryl-sulfate sulfohydrolase, EC 3.1.6.1). Pseudomonas aeruginosa SdsA1 is a secreted SDS hydrolase that allows the bacterium to use primary sulfates such as the detergent SDS common in commercial personal hygiene products as a sole carbon or sulfur source. Pseudomonas inverting secondary alkylsulfatase 1 (Pisa1) is specific for secondary alkyl sulfates. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions."
definition: >-
  Pseudomonas aeruginosa arylsulfatase SdsA1, Pseudomonas sp. DSM6611 arylsulfatase Pisa1, and related proteins; MBL-fold metallo-hydrolase domain. Arylsulfatase (also known as aryl-sulfate sulfohydrolase, EC 3.1.6.1). Pseudomonas aeruginosa SdsA1 is a secreted SDS hydrolase that allows the bacterium to use primary sulfates such as the detergent SDS common in commercial personal hygiene products as a sole carbon or sulfur source. Pseudomonas inverting secondary alkylsulfatase 1 (Pisa1) is specific for secondary alkyl sulfates. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions. — an NCBI CDD conserved domain (cd07710); members share this curated model.
