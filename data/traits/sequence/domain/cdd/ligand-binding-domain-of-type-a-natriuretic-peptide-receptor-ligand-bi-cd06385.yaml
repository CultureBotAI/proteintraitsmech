identifier: CDD:cd06385
label: "Ligand-binding domain of type A natriuretic peptide receptor. Ligand-binding domain of type A natriuretic peptide receptor (NPR-A). NPR-A is one of three known single membrane-spanning natriuretic peptide receptors that regulate blood volume, blood pressure, ventricular hypertrophy, pulmonary hypertension, fat metabolism, and long bone growth. In mammals there are three natriuretic peptides: ANP, BNP, and CNP. NPR-A is highly expressed in kidney, adrenal, terminal ileum, adipose, aortic, and lung tissues. The rank order of NPR-A activation by natriuretic peptides is ANP>BNP>>CNP. Single allele-inactivating mutations in the promoter of human NPR-A are associated with hypertension and heart failure."
definition: >-
