identifier: CDD:cd01992
label: "N-terminal domain of tRNA(Ile)-lysidine synthase and similar proteins. tRNA(Ile)-lysidine synthase (EC 6.3.4.19), also called tRNA(Ile)-2-lysyl-cytidine synthase or tRNA(Ile)-lysidine synthetase, catalyzes the ligation of lysine onto the cytidine present at position 34 of the AUA codon-specific tRNA(Ile) that contains the anticodon CAU, in an ATP-dependent manner. Cytidine is converted to lysidine, thus changing the amino acid specificity of the tRNA from methionine to isoleucine. This subfamily belongs to the adenine nucleotide alpha hydrolase superfamily that also includes N-type ATP PPases and ATP sulfurylases. It forms an alpha/beta/alpha fold which binds to adenosine group. This domain has a strongly conserved motif SGGXD at the N-terminus."
definition: >-
  N-terminal domain of tRNA(Ile)-lysidine synthase and similar proteins. tRNA(Ile)-lysidine synthase (EC 6.3.4.19), also called tRNA(Ile)-2-lysyl-cytidine synthase or tRNA(Ile)-lysidine synthetase, catalyzes the ligation of lysine onto the cytidine present at position 34 of the AUA codon-specific tRNA(Ile) that contains the anticodon CAU, in an ATP-dependent manner. Cytidine is converted to lysidine, thus changing the amino acid specificity of the tRNA from methionine to isoleucine. This subfamily belongs to the adenine nucleotide alpha hydrolase superfamily that also includes N-type ATP PPases and ATP sulfurylases. It forms an alpha/beta/alpha fold which binds to adenosine group. This domain has a strongly conserved motif SGGXD at the N-terminus. — an NCBI CDD conserved domain (cd01992); members share this curated model.
