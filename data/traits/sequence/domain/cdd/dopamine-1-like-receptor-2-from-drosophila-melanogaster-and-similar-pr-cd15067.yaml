identifier: CDD:cd15067
label: "dopamine 1-like receptor 2 from Drosophila melanogaster and similar proteins, member of the class A family of seven-transmembrane G protein-coupled receptors. G protein-coupled dopamine 1-like receptor 2 is expressed in Drosophila heads and it shows significant sequence similarity with vertebrate and invertebrate dopamine receptors. Although the Drosophila Dop1R2 receptor does not cluster into the D1-like structural group, it does show pharmacological properties similar to D1-like receptors. As shown in vertebrate D1-like receptors, agonist stimulation of Dop1R2 activates adenylyl cyclase to increase cAMP levels and also generates a calcium signal through stimulation of phospholipase C."
definition: >-
  dopamine 1-like receptor 2 from Drosophila melanogaster and similar proteins, member of the class A family of seven-transmembrane G protein-coupled receptors. G protein-coupled dopamine 1-like receptor 2 is expressed in Drosophila heads and it shows significant sequence similarity with vertebrate and invertebrate dopamine receptors. Although the Drosophila Dop1R2 receptor does not cluster into the D1-like structural group, it does show pharmacological properties similar to D1-like receptors. As shown in vertebrate D1-like receptors, agonist stimulation of Dop1R2 activates adenylyl cyclase to increase cAMP levels and also generates a calcium signal through stimulation of phospholipase C. — an NCBI CDD conserved domain (cd15067); members share this curated model.
