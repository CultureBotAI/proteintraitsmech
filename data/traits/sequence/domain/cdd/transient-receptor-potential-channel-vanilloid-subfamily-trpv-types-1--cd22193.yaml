identifier: CDD:cd22193
label: "Transient Receptor Potential channel, Vanilloid subfamily (TRPV), types 1-4. TRPV1-4 are thermo-sensing channels that function directly in temperature-sensing and nociception; they share substantial structural and functional properties. Transient Receptor Potential (TRP) ion channels activated by temperature (thermo TRPs) are important molecular players in acute, inflammatory, and chronic pain states. So far, 11 TRP channels in mammalian cells have been identified as thermosensitive TRP (thermo-TRP) channels. TRPV1-4 channels are activated by different heat temperatures, for example, TRPV1 and TRPV2 are activated by high temperatures (>43C and >55C, respectively). TRPV1-4 belong to the vanilloid TRP subfamily (TRPV), named after the founding member vanilloid receptor 1 (TRPV1). The structure of TRPV shows the typical topology features of all TRP ion channel family members, such as six transmembrane regions, a short hydrophobic stretch between transmembrane segments 5 and 6 and large intracellular N- and C-terminal domains."
definition: >-
  Transient Receptor Potential channel, Vanilloid subfamily (TRPV), types 1-4. TRPV1-4 are thermo-sensing channels that function directly in temperature-sensing and nociception; they share substantial structural and functional properties. Transient Receptor Potential (TRP) ion channels activated by temperature (thermo TRPs) are important molecular players in acute, inflammatory, and chronic pain states. So far, 11 TRP channels in mammalian cells have been identified as thermosensitive TRP (thermo-TRP) channels. TRPV1-4 channels are activated by different heat temperatures, for example, TRPV1 and TRPV2 are activated by high temperatures (>43C and >55C, respectively). TRPV1-4 belong to the vanilloid TRP subfamily (TRPV), named after the founding member vanilloid receptor 1 (TRPV1). The structure of TRPV shows the typical topology features of all TRP ion channel family members, such as six transmembrane regions, a short hydrophobic stretch between transmembrane segments 5 and 6 and large intracellular N- and C-terminal domains. — an NCBI CDD conserved domain (cd22193); members share this curated model.
