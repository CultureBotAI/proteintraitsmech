identifier: CDD:cd12108
label: "Hemerythrin-like domain. Hemerythrin (Hr) like domains have the same four alpha helix bundle and a similar, but slightly different active site structure than hemerythrin. They are non-heme diiron binding proteins mainly found in bacteria and eukaryotes. Like Hr, they may be involved in oxygen transport or like human FBXL5 (F-box and leucine-rich repeat protein 5), a member of this group, play a role in cellular iron homeostasis."
definition: >-
  Hemerythrin-like domain. Hemerythrin (Hr) like domains have the same four alpha helix bundle and a similar, but slightly different active site structure than hemerythrin. They are non-heme diiron binding proteins mainly found in bacteria and eukaryotes. Like Hr, they may be involved in oxygen transport or like human FBXL5 (F-box and leucine-rich repeat protein 5), a member of this group, play a role in cellular iron homeostasis. — an NCBI CDD conserved domain (cd12108); members share this curated model.
