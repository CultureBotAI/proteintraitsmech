identifier: CDD:cd19099
label: "uncharacterized aldo-keto reductase (AKR) superfamily protein. This family includes a group of uncharacterized AKR superfamily proteins. Aldo-keto reductases (AKRs) are a superfamily of soluble NAD(P)(H) oxidoreductases whose chief purpose is to reduce aldehydes and ketones to primary and secondary alcohols. AKRs are present in all phyla and are of importance in both health and industrial applications."
definition: >-
  uncharacterized aldo-keto reductase (AKR) superfamily protein. This family includes a group of uncharacterized AKR superfamily proteins. Aldo-keto reductases (AKRs) are a superfamily of soluble NAD(P)(H) oxidoreductases whose chief purpose is to reduce aldehydes and ketones to primary and secondary alcohols. AKRs are present in all phyla and are of importance in both health and industrial applications. — an NCBI CDD conserved domain (cd19099); members share this curated model.
