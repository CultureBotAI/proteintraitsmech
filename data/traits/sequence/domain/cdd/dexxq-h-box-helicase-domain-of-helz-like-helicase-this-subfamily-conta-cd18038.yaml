identifier: CDD:cd18038
label: "DEXXQ/H-box helicase domain of Helz-like helicase. This subfamily contains HELZ, Mov10L1, and similar proteins. Helicase with zinc finger (HELZ) acts as a helicase that plays a role in RNA metabolism during development. Moloney leukemia virus 10-like protein 1 (Mov10L1) binds Piwi-interacting RNA (piRNA) precursors to initiate piRNA processing. All are members of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXXQ/H-box helicase domain of Helz-like helicase. This subfamily contains HELZ, Mov10L1, and similar proteins. Helicase with zinc finger (HELZ) acts as a helicase that plays a role in RNA metabolism during development. Moloney leukemia virus 10-like protein 1 (Mov10L1) binds Piwi-interacting RNA (piRNA) precursors to initiate piRNA processing. All are members of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd18038); members share this curated model.
