identifier: CDD:cd18159
label: "phosphoacceptor receiver (REC) domain of Streptococcus agalactiae NsrR-like OmpR family response regulators. Streptococcus agalactiae NsrR is a lantibiotic resistance-associated response regulator and is part of the nisin resistance operon. It is a member of the NsrRK two-component system (TCS) that is involved in the regulation of lantibiotic resistance genes such as a membrane-associated lipoprotein of LanI, and the nsr gene cluster which encodes for the resistance protein NSR and the ABC transporter NsrFP, both conferring resistance against nisin. This subfamily also includes Staphylococcus epidermidis GraR, part of the GraR/GraS TCS involved in resistance against cationic antimicrobial peptides, and Bacillus subtilis BceR, part of the BceS/BceR TCS involved in the regulation of bacitracin resistance. Members of this subfamily belong to the OmpR family of DNA-binding response regulators, which contain N-terminal receiver (REC) and C-terminal DNA-binding winged helix-turn-helix effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of Streptococcus agalactiae NsrR-like OmpR family response regulators. Streptococcus agalactiae NsrR is a lantibiotic resistance-associated response regulator and is part of the nisin resistance operon. It is a member of the NsrRK two-component system (TCS) that is involved in the regulation of lantibiotic resistance genes such as a membrane-associated lipoprotein of LanI, and the nsr gene cluster which encodes for the resistance protein NSR and the ABC transporter NsrFP, both conferring resistance against nisin. This subfamily also includes Staphylococcus epidermidis GraR, part of the GraR/GraS TCS involved in resistance against cationic antimicrobial peptides, and Bacillus subtilis BceR, part of the BceS/BceR TCS involved in the regulation of bacitracin resistance. Members of this subfamily belong to the OmpR family of DNA-binding response regulators, which contain N-terminal receiver (REC) and C-terminal DNA-binding winged helix-turn-helix effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd18159); members share this curated model.
