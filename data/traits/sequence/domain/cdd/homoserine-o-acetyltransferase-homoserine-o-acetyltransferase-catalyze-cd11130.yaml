identifier: CDD:cd11130
label: homoser_O_acetyltrans
definition: >-
  Homoserine O-acetyltransferase. Homoserine O-acetyltransferase catalyzes the formation of O-acetylhomoserine (OAH) in the methionine biosynthesis pathway of many bacterial, archael, and lower eukaryotic species. This family also includes a fungal deacetylcephalosporin C acetyltransferase, which catalyses the final step in cephalosporin C biosynthesis
