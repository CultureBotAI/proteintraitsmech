identifier: CDD:cd14212
label: "Catalytic domain of the Dual-specificity protein kinase, YAK1. Dual-specificity PKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine (S/T) as well as tyrosine residues on protein substrates. This subfamily is composed of proteins with similarity to Saccharomyces cerevisiae YAK1 (or Yak1p), a dual-specificity kinase that autophosphorylates at tyrosine residues and phosphorylates substrates on S/T residues. YAK1 phosphorylates and activates the transcription factors Hsf1 and Msn2, which play important roles in cellular homeostasis during stress conditions including heat shock, oxidative stress, and nutrient deficiency. It also phosphorylates the protein POP2, a component of a complex that regulates transcription, under glucose-deprived conditions. It functions as a part of a glucose-sensing system that is involved in controlling growth in yeast. The YAK1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Dual-specificity protein kinase, YAK1. Dual-specificity PKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine (S/T) as well as tyrosine residues on protein substrates. This subfamily is composed of proteins with similarity to Saccharomyces cerevisiae YAK1 (or Yak1p), a dual-specificity kinase that autophosphorylates at tyrosine residues and phosphorylates substrates on S/T residues. YAK1 phosphorylates and activates the transcription factors Hsf1 and Msn2, which play important roles in cellular homeostasis during stress conditions including heat shock, oxidative stress, and nutrient deficiency. It also phosphorylates the protein POP2, a component of a complex that regulates transcription, under glucose-deprived conditions. It functions as a part of a glucose-sensing system that is involved in controlling growth in yeast. The YAK1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14212); members share this curated model.
