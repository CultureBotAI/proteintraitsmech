identifier: CDD:cd09546
label: "SAM domain of EPH-A5 subfamily of tyrosine kinase receptors. SAM (sterile alpha motif) domain of EPH-A5 subfamily of receptor tyrosine kinases is a C-terminal potential protein-protein interaction domain. This domain is located in the cytoplasmic region of EPH-A5 receptors and appears to mediate cell-cell initiated signal transduction. Eph-A5 gene is almost exclusively expressed in the nervous system. Murine EPH-A5 receptors participate in axon guidance during embryogenesis and play a role in the adult synaptic plasticity, particularly in neuron-target interactions in multiple neural circuits. Additionally EPH-A5 receptors and its ligand ephrin A5 regulate dopaminergic axon outgrowth and influence the formation of the midbrain dopaminergic pathways. EphA5 gene expression was found decreased in a few different breast cancer cell lines, thus it might be a potential molecular marker for breast cancer carcinogenesis and progression."
