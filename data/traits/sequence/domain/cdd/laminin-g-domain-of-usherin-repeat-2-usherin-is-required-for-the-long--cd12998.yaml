identifier: CDD:cd12998
label: LamG_usherin_2
definition: >-
  Laminin G domain of usherin, repeat 2;. Usherin is required for the long-term maintenance of retinal photoreceptors and for the development of cochlear hair cells. It exists in 2 variants, a shorter, secreted, extracellular and a long, membrane-anchored variant with a large extracellular domain containing two LamG repeats and a short C-terminal PDZ-binding motif. Mutations in usherin account for the majority of Usher syndrome (USH) type II cases, the most common of the 3 types of USH. USH is the most frequent cause of combined deaf-blindness in humans. USH type II is characterized by moderate nonprogressive hearing loss without vestibular dysfunction and a tendency for more pronounced hearing loss for higher-frequency sounds. In general, LamG domains of neurexin and agrin undergo alternative splicing that modulates their affinity for protein ligands. Proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold
