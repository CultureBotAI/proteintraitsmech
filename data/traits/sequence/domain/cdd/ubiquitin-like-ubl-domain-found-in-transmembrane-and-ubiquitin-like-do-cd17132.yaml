label: "ubiquitin-like (Ubl) domain found in transmembrane and ubiquitin-like domain-containing protein 2 (TMUB2). TMUB2 is composed of an uncharacterized transmembrane domain and a ubiquitin-like (Ubl) domain-containing protein that shows high sequence similarity to TMUB1; the latter is highly expressed in the nervous system and is involved in the termination of liver regeneration."
