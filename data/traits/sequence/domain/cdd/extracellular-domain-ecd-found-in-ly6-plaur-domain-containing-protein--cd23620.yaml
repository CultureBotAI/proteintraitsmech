label: "extracellular domain (ECD) found in Ly6/PLAUR domain-containing protein 2 (LYPD2) and similar proteins. LYPD2 is a lymphocyte antigen-6 family protein. It contains an extracellular domain (ECD) that belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
