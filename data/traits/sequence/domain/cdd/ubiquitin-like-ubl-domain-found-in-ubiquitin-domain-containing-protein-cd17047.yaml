identifier: CDD:cd17047
label: "ubiquitin-like (Ubl) domain found in ubiquitin domain-containing protein UBFD1 and similar proteins. UBFD1, also termed ubiquitin-binding protein homolog (UBPH), is a polyubiquitin binding protein containing a conserved ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold, a common structure involved in protein-protein interactions. It may play a role as nuclear factor-kappaB (NF-kappaB) regulator."
definition: >-
  ubiquitin-like (Ubl) domain found in ubiquitin domain-containing protein UBFD1 and similar proteins. UBFD1, also termed ubiquitin-binding protein homolog (UBPH), is a polyubiquitin binding protein containing a conserved ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold, a common structure involved in protein-protein interactions. It may play a role as nuclear factor-kappaB (NF-kappaB) regulator. — an NCBI CDD conserved domain (cd17047); members share this curated model.
