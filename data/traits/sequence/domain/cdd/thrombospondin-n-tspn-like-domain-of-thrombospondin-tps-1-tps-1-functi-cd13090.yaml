identifier: CDD:cd13090
label: TSPN_Thrombospondin1
definition: >-
  Thrombospondin N (TSPN)-like domain of Thrombospondin(TPS)-1. TPS-1 functions at the interface of the cell membrane and the extracellular matrix to regulate matrix structure and cellular behavior. The thrombospondin N, the laminin G, and the pentraxin families form a superfamily all with a similar jellyroll fold
