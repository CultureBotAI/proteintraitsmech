identifier: CDD:cd00418
label: "catalytic core domain of glutamyl-tRNA and glutaminyl-tRNA synthetase. Glutamyl-tRNA synthetase(GluRS)/Glutaminyl-tRNA synthetase (GlnRS) cataytic core domain. These enzymes attach Glu or Gln, respectively, to the appropriate tRNA. Like other class I tRNA synthetases, they aminoacylate the 2'-OH of the nucleotide at the 3' end of the tRNA. The core domain is based on the Rossman fold and is responsible for the ATP-dependent formation of the enzyme bound aminoacyl-adenylate. It contains the characteristic class I HIGH and KMSKS motifs, which are involved in ATP binding. These enzymes function as monomers.  Archaea, cellular organelles, and some bacteria lack GlnRS.  In these cases, the \"non-discriminating\" form of GluRS aminoacylates both tRNA(Glu) and tRNA(Gln) with Glu, which is converted to Gln when appropriate by a transamidation enzyme. The discriminating form of GluRS differs from GlnRS and the non-discriminating form of GluRS in their C-terminal anti-codon binding domains."
definition: >-
  catalytic core domain of glutamyl-tRNA and glutaminyl-tRNA synthetase. Glutamyl-tRNA synthetase(GluRS)/Glutaminyl-tRNA synthetase (GlnRS) cataytic core domain. These enzymes attach Glu or Gln, respectively, to the appropriate tRNA. Like other class I tRNA synthetases, they aminoacylate the 2'-OH of the nucleotide at the 3' end of the tRNA. The core domain is based on the Rossman fold and is responsible for the ATP-dependent formation of the enzyme bound aminoacyl-adenylate. It contains the characteristic class I HIGH and KMSKS motifs, which are involved in ATP binding. These enzymes function as monomers. Archaea, cellular organelles, and some bacteria lack GlnRS. In these cases, the "non-discriminating" form of GluRS aminoacylates both tRNA(Glu) and tRNA(Gln) with Glu, which is converted to Gln when appropriate by a transamidation enzyme. The discriminating form of GluRS differs from GlnRS and the non-discriminating form of GluRS in their C-terminal anti-codon binding domains. — an NCBI CDD conserved domain (cd00418); members share this curated model.
