identifier: CDD:cd15154
label: "lysophosphatidic acid receptor 5, member of the class A family of seven-transmembrane G protein-coupled receptors. Lysophosphatidic acid receptor 5 (LPAR5) is a G protein-coupled receptor that binds the bioactive lipid lysophosphatidic acid (LPA) and is involved in maintenance of human hair growth. Phylogenetic analysis of the class A GPCRs shows that LAPR5 is classified into the cluster consisting receptors that are preferentially activated by adenosine and uridine nucleotides. Although LPA6 (P2Y5) is expressed in human hair follicle cells, LPA4 and LPA5 are not. These three receptors are highly homologous and mediate an increase in intracellular cAMP production. Activation of LPAR5 is coupled to G(q) and G(12/13) proteins."
definition: >-
  lysophosphatidic acid receptor 5, member of the class A family of seven-transmembrane G protein-coupled receptors. Lysophosphatidic acid receptor 5 (LPAR5) is a G protein-coupled receptor that binds the bioactive lipid lysophosphatidic acid (LPA) and is involved in maintenance of human hair growth. Phylogenetic analysis of the class A GPCRs shows that LAPR5 is classified into the cluster consisting receptors that are preferentially activated by adenosine and uridine nucleotides. Although LPA6 (P2Y5) is expressed in human hair follicle cells, LPA4 and LPA5 are not. These three receptors are highly homologous and mediate an increase in intracellular cAMP production. Activation of LPAR5 is coupled to G(q) and G(12/13) proteins. — an NCBI CDD conserved domain (cd15154); members share this curated model.
