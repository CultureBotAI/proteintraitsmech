identifier: CDD:cd12546
label: "RNA recognition motif in vertebrate RNA-binding protein 43 (RBM43). This subgroup corresponds to the RRM of RBM43, a putative RNA-binding protein containing one RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain). Although its biological function remains unclear, RBM43 shows high sequence homology to poly [ADP-ribose] polymerase 10 (PARP-10), which is a novel oncoprotein c-Myc-interacting protein with poly(ADP-ribose) polymerase activity."
definition: >-
  RNA recognition motif in vertebrate RNA-binding protein 43 (RBM43). This subgroup corresponds to the RRM of RBM43, a putative RNA-binding protein containing one RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain). Although its biological function remains unclear, RBM43 shows high sequence homology to poly [ADP-ribose] polymerase 10 (PARP-10), which is a novel oncoprotein c-Myc-interacting protein with poly(ADP-ribose) polymerase activity. — an NCBI CDD conserved domain (cd12546); members share this curated model.
