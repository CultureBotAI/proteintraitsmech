identifier: CDD:cd14531
label: "atypical dual specificity phosphatases similar to oxidant-induced cell-cycle arrest protein 1. Oxidant-induced cell-cycle arrest protein 1 (Oca1) is an atypical dual specificity phosphatase whose gene is required for G1 arrest in response to the lipid oxidation product linoleic acid hydroperoxide. It may function in linking growth, stress responses, and the cell cycle. Oca1 belongs to a group of atypical DSPs present in plants, fungi, kinetoplastids, and slime molds called plant and fungi atypical dual-specificity phosphatases (PFA-DSPs)."
