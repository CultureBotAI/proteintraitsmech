identifier: CDD:cd21255
label: "calponin homology (CH) domain found in EH domain-binding protein 1-like protein 1 and similar proteins. EHBP1L1 may act as Rab effector protein and play a role in vesicle trafficking. It coordinates Rab8 and Bin1 to regulate apical-directed transport in polarized epithelial cells. Members of this subfamily contain a single copy of the CH domain. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  calponin homology (CH) domain found in EH domain-binding protein 1-like protein 1 and similar proteins. EHBP1L1 may act as Rab effector protein and play a role in vesicle trafficking. It coordinates Rab8 and Bin1 to regulate apical-directed transport in polarized epithelial cells. Members of this subfamily contain a single copy of the CH domain. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21255); members share this curated model.
