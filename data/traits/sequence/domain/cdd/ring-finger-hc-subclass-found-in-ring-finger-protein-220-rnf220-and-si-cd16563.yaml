identifier: CDD:cd16563
label: "RING finger, HC subclass, found in RING finger protein 220 (RNF220) and similar proteins. RNF220 is an E3 ubiquitin-protein ligase that promotes the ubiquitination and proteasomal degradation of Sin3B, a scaffold protein of the Sin3/HDAC (histone deacetylase) corepressor complex. It can also bind E2 and mediate auto-ubiquitination of itself. Moreover, RNF220 specifically interacts with beta-catenin, and enhances canonical Wnt signaling through ubiquitin-specific protease 7 (USP7)-mediated deubiquitination and stabilization of beta-catenin, which is independent of its E3 ligase activity. RNF220 contains a characteristic C3HC4-type RING-HC finger at its C-terminus."
definition: >-
  RING finger, HC subclass, found in RING finger protein 220 (RNF220) and similar proteins. RNF220 is an E3 ubiquitin-protein ligase that promotes the ubiquitination and proteasomal degradation of Sin3B, a scaffold protein of the Sin3/HDAC (histone deacetylase) corepressor complex. It can also bind E2 and mediate auto-ubiquitination of itself. Moreover, RNF220 specifically interacts with beta-catenin, and enhances canonical Wnt signaling through ubiquitin-specific protease 7 (USP7)-mediated deubiquitination and stabilization of beta-catenin, which is independent of its E3 ligase activity. RNF220 contains a characteristic C3HC4-type RING-HC finger at its C-terminus. — an NCBI CDD conserved domain (cd16563); members share this curated model.
