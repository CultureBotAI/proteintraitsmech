identifier: CDD:cd05428
label: NT_ScTRF4-5_like
definition: >-
  Nucleotidyltransferase (NT) domain of Saccharomyces cerevisiae TRF4 and -5 poly (A) polymerases, and related proteins. NT_TRF4-5_like: catalytic domain found in proteins similar to the poly (A) polymerases (PAPs) Saccharomyces cerevisiae (Sc) TRF4 and -5, including Schizosaccharomyces pombe (Sp) caffeine-induced death proteins (CID)-14. PAPs are responsible for mRNA poly (A) tail synthesis. Multiple forms of PAPs are present in cell lines and tissues of different species, as the result of gene duplication, alternative splicing, and post-translational modification. ScTRF4 is a synthetic lethal with its homolog ScTRF5, indicating functional overlap. ScTRF4 PAP activity is Mn2+ dependent and highly specific for ATP. ScTRF4 associates with a multi-protein complex (TRAMP5) responsible for polyadenylating, a variety of nuclear RNAs, such as incorrectly folded RNAs, as a prelude to their degradation in the exosome. SpCID14 is also nuclear and is a functional homolog of ScTRF4, -5 in this pathway. These proteins are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these ScTRF4-5_like NT domains
