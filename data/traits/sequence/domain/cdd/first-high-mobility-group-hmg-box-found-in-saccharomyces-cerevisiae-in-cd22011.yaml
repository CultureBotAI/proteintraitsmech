identifier: CDD:cd22011
label: "first high mobility group (HMG)-box found in Saccharomyces cerevisiae intrastrand cross-link recognition protein (Ixr1) and similar proteins. Ixr1, also called structure-specific recognition protein (SSRP), is a homolog of the yeast mitochondrial regulator ABF2. It binds to platinated DNA and confers sensitivity to the anticancer drug cisplatin. Ixr1 contains two HMG-box domains. This model corresponds to the first one."
definition: >-
  first high mobility group (HMG)-box found in Saccharomyces cerevisiae intrastrand cross-link recognition protein (Ixr1) and similar proteins. Ixr1, also called structure-specific recognition protein (SSRP), is a homolog of the yeast mitochondrial regulator ABF2. It binds to platinated DNA and confers sensitivity to the anticancer drug cisplatin. Ixr1 contains two HMG-box domains. This model corresponds to the first one. — an NCBI CDD conserved domain (cd22011); members share this curated model.
