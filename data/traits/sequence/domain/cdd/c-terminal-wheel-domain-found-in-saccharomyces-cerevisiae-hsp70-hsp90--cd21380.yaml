identifier: CDD:cd21380
label: CTWD_Cns1
definition: >-
  C-terminal wheel domain found in Saccharomyces cerevisiae Hsp70/Hsp90 co-chaperone Cns1 and similar proteins. Cns1, also called cyclophilin seven suppressor 1, or STI1 stress-inducible protein homolog, binds to the molecular chaperones Hsp90 (HSC82 and HSP82) and Hsp70 (SSA1). It stimulates SSA1 ATPase activity, but not Hsp90 ATPase activity. It is involved in only a subset of Hsp90 functions. The model corresponds to Cns1 C-terminal wheel domain consisting of a twisted five-stranded beta sheet surrounded by several alpha helices
