identifier: CDD:cd14600
label: "catalytic domain of tyrosine-protein phosphatase non-receptor type 3. Tyrosine-protein phosphatase non-receptor type 3 (PTPN3), also called protein-tyrosine phosphatase H1 (PTP-H1), belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPN3 interacts with mitogen-activated protein kinase p38gamma and serves as its specific phosphatase. PTPN3 and p38gamma cooperate to promote Ras-induced oncogenesis. PTPN3 is a large modular protein containing an N-terminal FERM domain, a PDZ domain and a C-terminal catalytic PTP domain. Its PDZ domain binds with the PDZ-binding motif of p38gamma and enables efficient tyrosine dephosphorylation."
definition: >-
  catalytic domain of tyrosine-protein phosphatase non-receptor type 3. Tyrosine-protein phosphatase non-receptor type 3 (PTPN3), also called protein-tyrosine phosphatase H1 (PTP-H1), belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPN3 interacts with mitogen-activated protein kinase p38gamma and serves as its specific phosphatase. PTPN3 and p38gamma cooperate to promote Ras-induced oncogenesis. PTPN3 is a large modular protein containing an N-terminal FERM domain, a PDZ domain and a C-terminal catalytic PTP domain. Its PDZ domain binds with the PDZ-binding motif of p38gamma and enables efficient tyrosine dephosphorylation. — an NCBI CDD conserved domain (cd14600); members share this curated model.
