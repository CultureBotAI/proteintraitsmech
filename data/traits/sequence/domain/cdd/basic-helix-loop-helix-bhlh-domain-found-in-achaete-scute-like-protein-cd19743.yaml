label: "basic helix-loop-helix (bHLH) domain found in achaete-scute-like protein 2 (ASCL-2) and similar proteins. ASCL-2, also termed achaete-scute homolog 2 (ASH-2), or Class A basic helix-loop-helix protein 45 (bHLHa45), or mammalian achaete scute homolog 2 (Mash2), is a bHLH transcription factor that is involved in Schwann cell differentiation and control of proliferation in adult peripheral nerves."
