label: "Pseudouridine synthases, RsuA subfamily. Pseudouridine synthases  are responsible for the synthesis of pseudouridine from uracil in ribosomal RNA. The RsuA subfamily includes Pseudouridine Synthase similar to Ribosomal small subunit pseudouridine 516 synthase. Most of the proteins in this family are bacterial proteins."
definition: >-
  Pseudouridine synthases, RsuA subfamily. Pseudouridine synthases are responsible for the synthesis of pseudouridine from uracil in ribosomal RNA. The RsuA subfamily includes Pseudouridine Synthase similar to Ribosomal small subunit pseudouridine 516 synthase. Most of the proteins in this family are bacterial proteins. — an NCBI CDD conserved domain (cd02870); members share this curated model.
