identifier: CDD:cd21641
label: "SARS-CoV-2 ORF8 immunoglobulin (Ig) domain protein and related proteins. This subfamily includes the ORF8 immunoglobulin (Ig) domain protein of Severe acute respiratory syndrome (SARS) coronavirus 2 (SARS-CoV-2, also known as a 2019 novel coronavirus, 2019-nCoV) and related Sarbecovirus ORF8 proteins. SARS-CoV-2 causes the disease called \"coronavirus disease 2019\" (COVID-19). SARS-CoV-2 ORF8 (also known as ns8 and accessory protein 8) is a fast-evolving protein in SARS-related CoVs, and a potential pathogenicity factor which evolves rapidly to counter the immune response and facilitate the transmission between hosts. A 382 nucleotide deletion in SARS-CoV-2 ORF8 was found to correlate with milder disease and a lower incidence of hypoxia. SARS-CoV-2 ORF8 interacts with a variety of host proteins, including many factors involved in ERAD. It disrupts IFN-I signaling when exogenously overexpressed in cells, and downregulates MHC-I. It belongs to a family which includes Sarbecovirus ORF8 proteins classified as type II, such as bat coronavirus Rf1 ORF8, and those classified as type III, such as Bat SARS coronavirus HKU3-1 ORF8."
definition: >-
  SARS-CoV-2 ORF8 immunoglobulin (Ig) domain protein and related proteins. This subfamily includes the ORF8 immunoglobulin (Ig) domain protein of Severe acute respiratory syndrome (SARS) coronavirus 2 (SARS-CoV-2, also known as a 2019 novel coronavirus, 2019-nCoV) and related Sarbecovirus ORF8 proteins. SARS-CoV-2 causes the disease called "coronavirus disease 2019" (COVID-19). SARS-CoV-2 ORF8 (also known as ns8 and accessory protein 8) is a fast-evolving protein in SARS-related CoVs, and a potential pathogenicity factor which evolves rapidly to counter the immune response and facilitate the transmission between hosts. A 382 nucleotide deletion in SARS-CoV-2 ORF8 was found to correlate with milder disease and a lower incidence of hypoxia. SARS-CoV-2 ORF8 interacts with a variety of host proteins, including many factors involved in ERAD. It disrupts IFN-I signaling when exogenously overexpressed in cells, and downregulates MHC-I. It belongs to a family which includes Sarbecovirus ORF8 proteins classified as type II, such as bat coronavirus Rf1 ORF8, and those classified as type III, such as Bat SARS coronavirus HKU3-1 ORF8. — an NCBI CDD conserved domain (cd21641); members share this curated model.
