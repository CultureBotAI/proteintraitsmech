identifier: CDD:cd22293
label: "N-terminal REV7-binding domain of Shieldin complex subunit 3 (SHLD3) and similar proteins. SHLD3, also called REV7-interacting novel NHEJ regulator 1, or Shield complex subunit 3, is a component of the shieldin complex, which plays an important role in the repair of DNA double-stranded breaks (DSBs). During G1 and S phase of the cell cycle, the complex functions downstream of TP53BP1 to promote non-homologous end joining (NHEJ) and suppress DNA end resection. SHLD3 mediates various NHEJ-dependent processes including immunoglobulin class-switch recombination, and fusion of unprotected telomeres. The model corresponds to the N-terminal REV7-binding domain of SHLD3, which contains a REV7-binding FXPWFP motif."
definition: >-
  N-terminal REV7-binding domain of Shieldin complex subunit 3 (SHLD3) and similar proteins. SHLD3, also called REV7-interacting novel NHEJ regulator 1, or Shield complex subunit 3, is a component of the shieldin complex, which plays an important role in the repair of DNA double-stranded breaks (DSBs). During G1 and S phase of the cell cycle, the complex functions downstream of TP53BP1 to promote non-homologous end joining (NHEJ) and suppress DNA end resection. SHLD3 mediates various NHEJ-dependent processes including immunoglobulin class-switch recombination, and fusion of unprotected telomeres. The model corresponds to the N-terminal REV7-binding domain of SHLD3, which contains a REV7-binding FXPWFP motif. — an NCBI CDD conserved domain (cd22293); members share this curated model.
