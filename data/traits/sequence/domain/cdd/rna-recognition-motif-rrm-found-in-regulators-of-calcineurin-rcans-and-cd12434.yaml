identifier: CDD:cd12434
label: "RNA recognition motif (RRM) found in regulators of calcineurin (RCANs) and similar proteins. This subfamily corresponds to the RRM of RCANs, a novel family of calcineurin regulators that are key factors contributing to Down syndrome in humans. They can stimulate and inhibit the Ca2+/calmodulin-dependent phosphatase calcineurin (also termed PP2B or PP3C) signaling in vivo through direct interactions with its catalytic subunit. Overexpressed RCANs may bind and inhibit calcineurin. In contrast, low levels of phosphorylated RCANs may stimulate the calcineurin signaling. RCANs are characterized by harboring a central short, unique serine-proline motif containing FLIISPPxSPP box, which is strongly conserved from yeast to human but is absent in bacteria. They consist of an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), a highly conserved SP repeat domain containing the phosphorylation site by GSK-3, a well-known PxIxIT motif responsible for docking many substrates to calcineurin, and an unrecognized C-terminal TxxP motif of unknown function."
definition: >-
  RNA recognition motif (RRM) found in regulators of calcineurin (RCANs) and similar proteins. This subfamily corresponds to the RRM of RCANs, a novel family of calcineurin regulators that are key factors contributing to Down syndrome in humans. They can stimulate and inhibit the Ca2+/calmodulin-dependent phosphatase calcineurin (also termed PP2B or PP3C) signaling in vivo through direct interactions with its catalytic subunit. Overexpressed RCANs may bind and inhibit calcineurin. In contrast, low levels of phosphorylated RCANs may stimulate the calcineurin signaling. RCANs are characterized by harboring a central short, unique serine-proline motif containing FLIISPPxSPP box, which is strongly conserved from yeast to human but is absent in bacteria. They consist of an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), a highly conserved SP repeat domain containing the phosphorylation site by GSK-3, a well-known PxIxIT motif responsible for docking many substrates to calcineurin, and an unrecognized C-terminal TxxP motif of unknown function. — an NCBI CDD conserved domain (cd12434); members share this curated model.
