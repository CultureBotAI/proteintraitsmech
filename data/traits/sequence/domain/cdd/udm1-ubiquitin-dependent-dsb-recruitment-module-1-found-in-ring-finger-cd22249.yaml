identifier: CDD:cd22249
label: "UDM1 (ubiquitin-dependent DSB recruitment module 1) found in RING finger proteins RNF168, RNF169 and similar proteins. This model represents the UDM1 (ubiquitin-dependent double-strand break [DSB] recruitment module 1) found in RING finger proteins, RNF168 and RNF169. RNF168 is an E3 ubiquitin-protein ligase that promotes non-canonical K27 ubiquitination to signal DNA damage. It functions, together with RNF8, as a DNA damage response (DDR) factor that promotes a series of ubiquitylation events on substrates such as H2A and H2AX. With H2AK13/15 ubiquitylation, it facilitates recruitment of repair factors p53-binding protein 1 (53BP1) or the RAP80-BRCA1 complex to sites of double-strand breaks (DSBs), and inhibits homologous recombination (HR) in cells deficient in the tumor suppressor BRCA1. RNF168 also promotes H2A neddylation, which antagonizes ubiquitylation of H2A and regulates DNA damage repair. In addition, RNF168 forms a functional complex with RAD6A or RAD6B during the DNA damage response. RNF169 is an uncharacterized E3 ubiquitin-protein ligase paralogous to RNF168. It functions as a negative regulator of the DNA damage signaling cascade. RNF169 recognizes polyubiquitin structures but does not itself contribute to double-strand break (DSB)-induced chromatin ubiquitylation. It contributes to the regulation of DSB repair pathway utilization via functionally competing with recruiting repair factors, 53BP1 and RAP80-BRCA1, for association with RNF168-modified chromatin, independent of its catalytic activity, limiting the magnitude of the RNF8/RNF168-dependent signaling response to DSBs. The UDM1 domain comprises LRM1 (LR motif 1), UMI (ubiquitin-interacting motif [UIM]- and MIU-related UBD) and MIU1 (motif interacting with ubiquitin 1). Mutations of Ub-interacting residues in UDM1 have little effect on the accumulation of RNF168 to DSB sites, suggesting that it may not be the main site of binding ubiquitylated and polyubiquitylated targets."
definition: >-
  UDM1 (ubiquitin-dependent DSB recruitment module 1) found in RING finger proteins RNF168, RNF169 and similar proteins. This model represents the UDM1 (ubiquitin-dependent double-strand break [DSB] recruitment module 1) found in RING finger proteins, RNF168 and RNF169. RNF168 is an E3 ubiquitin-protein ligase that promotes non-canonical K27 ubiquitination to signal DNA damage. It functions, together with RNF8, as a DNA damage response (DDR) factor that promotes a series of ubiquitylation events on substrates such as H2A and H2AX. With H2AK13/15 ubiquitylation, it facilitates recruitment of repair factors p53-binding protein 1 (53BP1) or the RAP80-BRCA1 complex to sites of double-strand breaks (DSBs), and inhibits homologous recombination (HR) in cells deficient in the tumor suppressor BRCA1. RNF168 also promotes H2A neddylation, which antagonizes ubiquitylation of H2A and regulates DNA damage repair. In addition, RNF168 forms a functional complex with RAD6A or RAD6B during the DNA damage response. RNF169 is an uncharacterized E3 ubiquitin-protein ligase paralogous to RNF168. It functions as a negative regulator of the DNA damage signaling cascade. RNF169 recognizes polyubiquitin structures but does not itself contribute to double-strand break (DSB)-induced chromatin ubiquitylation. It contributes to the regulation of DSB repair pathway utilization via functionally competing with recruiting repair factors, 53BP1 and RAP80-BRCA1, for association with RNF168-modified chromatin, independent of its catalytic activity, limiting the magnitude of the RNF8/RNF168-dependent signaling response to DSBs. The UDM1 domain comprises LRM1 (LR motif 1), UMI (ubiquitin-interacting motif [UIM]- and MIU-related UBD) and MIU1 (motif interacting with ubiquitin 1). Mutations of Ub-interacting residues in UDM1 have little effect on the accumulation of RNF168 to DSB sites, suggesting that it may not be the main site of binding ubiquitylated and polyubiquitylated targets. — an NCBI CDD conserved domain (cd22249); members share this curated model.
