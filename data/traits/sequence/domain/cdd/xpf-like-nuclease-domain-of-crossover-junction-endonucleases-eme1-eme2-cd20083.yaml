identifier: CDD:cd20083
label: "XPF-like nuclease domain of crossover junction endonucleases, EME1, EME2 and similar proteins. The Mus81-EME1 complex is a structure-selective endonuclease with a critical role in the resolution of recombination intermediates during DNA repair after interstrand cross-links, replication fork collapse, or double-strand breaks. ERCC4 domain of Eme1 is a nuclease-like domain which is involved in  targeting the MUS81-EME1 heterodimer complex to DNA."
definition: >-
  XPF-like nuclease domain of crossover junction endonucleases, EME1, EME2 and similar proteins. The Mus81-EME1 complex is a structure-selective endonuclease with a critical role in the resolution of recombination intermediates during DNA repair after interstrand cross-links, replication fork collapse, or double-strand breaks. ERCC4 domain of Eme1 is a nuclease-like domain which is involved in targeting the MUS81-EME1 heterodimer complex to DNA. — an NCBI CDD conserved domain (cd20083); members share this curated model.
