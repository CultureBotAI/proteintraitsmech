identifier: CDD:cd10577
label: "Tumor necrosis factor receptor superfamily member 1B (TNFRSF1B), also known as TNFR2. TNFRSF1B (also known as TNFR2, type 2 TNFR, TNFBR, TNFR80, TNF-R75, TNF-R-II, p75, CD120b) binds TNF-alpha, but lacks the death domain (DD) that is associated with the cytoplasmic domain of TNFRSF1A (TNFR1). It is inducible and expressed exclusively by oligodendrocytes, astrocytes, T cells, thymocytes, myocytes, endothelial cells, and in human mesenchymal stem cells. TNFRSF1B protects oligodendrocyte progenitor cells (OLGs) against oxidative stress, and induces the up-regulation of cell survival genes. While pro-inflammatory and pathogen-clearing activities of TNF are mediated mainly through activation of TNFRSF1A, a strong activator of NF-kappaB, TNFRSF1B is more responsible for suppression of inflammation. Although the affinities of both receptors for soluble TNF are similar, TNFRSF1B is sometimes more abundantly expressed and thought to associate with TNF, thereby increasing its concentration near TNFRSF1A receptors, and making TNF available to activate TNFRSF1A (a ligand-passing mechanism)."
definition: >-
  Tumor necrosis factor receptor superfamily member 1B (TNFRSF1B), also known as TNFR2. TNFRSF1B (also known as TNFR2, type 2 TNFR, TNFBR, TNFR80, TNF-R75, TNF-R-II, p75, CD120b) binds TNF-alpha, but lacks the death domain (DD) that is associated with the cytoplasmic domain of TNFRSF1A (TNFR1). It is inducible and expressed exclusively by oligodendrocytes, astrocytes, T cells, thymocytes, myocytes, endothelial cells, and in human mesenchymal stem cells. TNFRSF1B protects oligodendrocyte progenitor cells (OLGs) against oxidative stress, and induces the up-regulation of cell survival genes. While pro-inflammatory and pathogen-clearing activities of TNF are mediated mainly through activation of TNFRSF1A, a strong activator of NF-kappaB, TNFRSF1B is more responsible for suppression of inflammation. Although the affinities of both receptors for soluble TNF are similar, TNFRSF1B is sometimes more abundantly expressed and thought to associate with TNF, thereby increasing its concentration near TNFRSF1A receptors, and making TNF available to activate TNFRSF1A (a ligand-passing mechanism). — an NCBI CDD conserved domain (cd10577); members share this curated model.
