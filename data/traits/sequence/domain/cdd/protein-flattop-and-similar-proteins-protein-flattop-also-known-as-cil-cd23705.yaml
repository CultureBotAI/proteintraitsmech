identifier: CDD:cd23705
label: "protein Flattop and similar proteins. Protein Flattop, also known as cilia- and flagella-associated protein 126 (CFAP126), or flagellum-associated protein 126 (FAP126), acts as a regulator of cilium basal body docking and positioning in mono- and multiciliated cells. It regulates basal body docking and cilia formation in multiciliated human lung cells. It also modulates kinocilium positioning and stereocilia bundle morphogenesis in the inner ear."
definition: >-
