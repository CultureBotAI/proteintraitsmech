identifier: CDD:cd22428
label: "first type I K homology (KH) RNA-binding domain found in tudor and KH domain-containing protein (TDRKH) and similar proteins. TDRKH, also called tudor domain-containing protein 2 (TDRD2), is a mitochondria-anchored RNA-binding protein that is required for spermatogenesis and involved in piRNA biogenesis. It specifically recruits MIWI, but not MILI, to engage the piRNA pathway. TDRKH contains two K-homology (KH) RNA-binding domains and one tudor domain, which are involved in binding to RNA or single-strand DNA. The model corresponds to the first one."
definition: >-
  first type I K homology (KH) RNA-binding domain found in tudor and KH domain-containing protein (TDRKH) and similar proteins. TDRKH, also called tudor domain-containing protein 2 (TDRD2), is a mitochondria-anchored RNA-binding protein that is required for spermatogenesis and involved in piRNA biogenesis. It specifically recruits MIWI, but not MILI, to engage the piRNA pathway. TDRKH contains two K-homology (KH) RNA-binding domains and one tudor domain, which are involved in binding to RNA or single-strand DNA. The model corresponds to the first one. — an NCBI CDD conserved domain (cd22428); members share this curated model.
