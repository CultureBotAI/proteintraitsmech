label: "fourth BRCT domain of Schizosaccharomyces pombe BRCT-containing protein 1 (BRC1) and similar proteins. Schizosaccharomyces pombe BRC1 is required for mitotic fidelity, specifically in the G2 phase of the cell cycle. It plays a role in chromatin organization. Members in this family contains six BRCT domains. This family corresponds to the fourth repeat."
definition: >-
  fourth BRCT domain of Schizosaccharomyces pombe BRCT-containing protein 1 (BRC1) and similar proteins. Schizosaccharomyces pombe BRC1 is required for mitotic fidelity, specifically in the G2 phase of the cell cycle. It plays a role in chromatin organization. Members in this family contains six BRCT domains. This family corresponds to the fourth repeat. — an NCBI CDD conserved domain (cd18438); members share this curated model.
