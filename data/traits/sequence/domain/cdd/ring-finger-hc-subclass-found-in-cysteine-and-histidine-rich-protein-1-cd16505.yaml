identifier: CDD:cd16505
label: "RING finger, HC subclass, found in cysteine and histidine-rich protein 1 (CYHR1) and similar proteins. CYHR1, also known as cysteine/histidine-rich protein (Chrp), shows sequence similarity with the Drosophila RING finger protein Seven-in-Absentia (sina) and its murine and human siah homologs. It is a novel prognostic marker that may work as a therapeutic target in patients with esophageal squamous cell carcinoma. It is also a biomarker of the response to erythropoietin in hemodialysis patients. CYHR1 contains an N-terminal C3HC4-type RING-HC finger and a C-terminal tumor necrosis factor (TNF) receptor associated factor (TRAF)-like substrate-binding domain (SBD)."
definition: >-
