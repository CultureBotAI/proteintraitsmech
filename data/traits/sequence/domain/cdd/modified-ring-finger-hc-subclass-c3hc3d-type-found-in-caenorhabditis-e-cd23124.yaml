label: "Modified RING finger, HC subclass (C3HC3D-type), found in Caenorhabditis elegans putative GTP-binding protein trim-23 homolog (arc-1) and similar proteins. arc-1, also called RING-type E3 ubiquitin transferase arc-1, is an E3 ubiquitin-protein ligase that mediates E2-dependent protein ubiquitination. arc-1 contains a modified C3HC3D-type RING-HC finger."
definition: >-
  Modified RING finger, HC subclass (C3HC3D-type), found in Caenorhabditis elegans putative GTP-binding protein trim-23 homolog (arc-1) and similar proteins. arc-1, also called RING-type E3 ubiquitin transferase arc-1, is an E3 ubiquitin-protein ligase that mediates E2-dependent protein ubiquitination. arc-1 contains a modified C3HC3D-type RING-HC finger. — an NCBI CDD conserved domain (cd23124); members share this curated model.
