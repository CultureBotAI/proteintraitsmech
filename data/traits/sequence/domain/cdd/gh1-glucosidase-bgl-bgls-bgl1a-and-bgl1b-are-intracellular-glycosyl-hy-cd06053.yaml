identifier: CDD:cd06053
label: GH1_glucosidase_BGL
definition: >-
  GH1_glucosidase_BGL. BGLs (BGL1A and BGL1B) are intracellular glycosyl hydrolase family 1 (GH1) beta-glucosidases found in bacteria and fungi that play an important role in cellulose degradation. Cellobiohydrolases and endo-glucanases catalyze the hydrolysis of cellulose to produce cellobiose and short cellooligosaccharides, which are then hydrolyzed to glucose by BGLs. BGL1A and BGL1B were first identified in the wood-rotting "white rot" fungus Phanerochaete chrysosporium. BGL1A and BGL1B are highly sequence similar and both are included in this alignment model yet their substrate recognition patterns and their expression characteristics are different. Cellobiose is hydrolyzed more effectively by BGL1B than by BGL1A, and the expression of bgl1B is induced by cellobiose, whereas bgl1A is constitutively expressed
