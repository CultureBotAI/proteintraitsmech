identifier: CDD:cd01400
label: "6PGL: 6-Phosphogluconolactonase (6PGL) subfamily; 6PGL catalyzes the second step of the oxidative phase of the pentose phosphate pathway, the hydrolyzation of 6-phosphoglucono-1,5-lactone (delta form) to 6-phosphogluconate. 6PGL is thought to guard against the accumulation of the delta form of the lactone, which may be toxic through its reaction with endogenous cellular nucleophiles."
definition: >-
