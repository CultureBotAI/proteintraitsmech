identifier: CDD:cd05769
label: "T cell receptor (TCR) beta chain constant immunoglobulin domain; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the T cell receptor (TCR) beta chain constant immunoglobulin domain. TCRs mediate antigen recognition by T lymphocytes, and are composed of alpha and beta, or gamma and delta, polypeptide chains with variable (V) and constant (C) regions. This group includes the variable domain of the beta chain. Alpha/beta TCRs recognize antigen as peptide fragments presented by major histocompatibility complex (MHC) molecules. The antigen binding site is formed by the variable domains of the alpha and beta chains, located at the N-terminus of each chain. Alpha/beta TCRs recognize antigens differently from gamma/delta TCRs."
definition: >-
  T cell receptor (TCR) beta chain constant immunoglobulin domain; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the T cell receptor (TCR) beta chain constant immunoglobulin domain. TCRs mediate antigen recognition by T lymphocytes, and are composed of alpha and beta, or gamma and delta, polypeptide chains with variable (V) and constant (C) regions. This group includes the variable domain of the beta chain. Alpha/beta TCRs recognize antigen as peptide fragments presented by major histocompatibility complex (MHC) molecules. The antigen binding site is formed by the variable domains of the alpha and beta chains, located at the N-terminus of each chain. Alpha/beta TCRs recognize antigens differently from gamma/delta TCRs. — an NCBI CDD conserved domain (cd05769); members share this curated model.
