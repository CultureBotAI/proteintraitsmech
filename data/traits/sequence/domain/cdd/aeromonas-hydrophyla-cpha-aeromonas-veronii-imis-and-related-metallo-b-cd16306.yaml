identifier: CDD:cd16306
label: "Aeromonas hydrophyla CphA, Aeromonas veronii ImiS, and related metallo-beta-lactamases, subclass B2; MBL-fold metallo-hydrolase domain. MBLs (class B of the Ambler beta-lactamase classification) are a diverse group of metallo-enzymes that are capable of catalyzing the hydrolysis of a wide range of beta-lactam antibiotics. MBLs have been divided into three subclasses B1, B2 and B3, based on sequence/structural relationships and substrates, with the B1 and B2 MBLs being most closely related to each other. B2 MBLs have a narrow substrate profile relative to subclass B1 MBLs that includes carbapenems, and they are active with one zinc ion bound in the Asp-Cys-His site, binding of a second zinc ion in the modified 3H site (Asn-His-His) inhibits catalysis."
definition: >-
  Aeromonas hydrophyla CphA, Aeromonas veronii ImiS, and related metallo-beta-lactamases, subclass B2; MBL-fold metallo-hydrolase domain. MBLs (class B of the Ambler beta-lactamase classification) are a diverse group of metallo-enzymes that are capable of catalyzing the hydrolysis of a wide range of beta-lactam antibiotics. MBLs have been divided into three subclasses B1, B2 and B3, based on sequence/structural relationships and substrates, with the B1 and B2 MBLs being most closely related to each other. B2 MBLs have a narrow substrate profile relative to subclass B1 MBLs that includes carbapenems, and they are active with one zinc ion bound in the Asp-Cys-His site, binding of a second zinc ion in the modified 3H site (Asn-His-His) inhibits catalysis. — an NCBI CDD conserved domain (cd16306); members share this curated model.
