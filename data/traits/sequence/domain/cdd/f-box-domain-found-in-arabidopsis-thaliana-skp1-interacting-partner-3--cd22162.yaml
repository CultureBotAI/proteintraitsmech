identifier: CDD:cd22162
label: "F-box domain found in Arabidopsis thaliana SKP1-interacting partner 3 (AtSKIP3) and similar proteins. AtSKIP3, also called F-box protein SKIP3, F-box protein PP2-B9, or protein PHLOEM PROTEIN 2-LIKE B9, is a component of SCF (SKP1-cullin-F-box protein) E3 ubiquitin ligase complexes, which may mediate the ubiquitination and subsequent proteasomal degradation of target proteins. It interacts with SKP1A/ASK1. This subfamily also includes many other Arabidopsis thaliana protein PHLOEM PROTEIN 2-LIKE proteins. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Arabidopsis thaliana SKP1-interacting partner 3 (AtSKIP3) and similar proteins. AtSKIP3, also called F-box protein SKIP3, F-box protein PP2-B9, or protein PHLOEM PROTEIN 2-LIKE B9, is a component of SCF (SKP1-cullin-F-box protein) E3 ubiquitin ligase complexes, which may mediate the ubiquitination and subsequent proteasomal degradation of target proteins. It interacts with SKP1A/ASK1. This subfamily also includes many other Arabidopsis thaliana protein PHLOEM PROTEIN 2-LIKE proteins. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22162); members share this curated model.
