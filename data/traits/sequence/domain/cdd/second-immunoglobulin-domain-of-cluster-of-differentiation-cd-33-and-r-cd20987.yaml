identifier: CDD:cd20987
label: "Second immunoglobulin domain of Cluster of Differentiation (CD) 33 and related Siglecs; member of the C2-set of IgSF domains. The members here are composed of the second immunoglobulin (Ig) domain of Cluster of Differentiation (CD) 33 (also known as sialic-acid binding immunoglobulin type-lectin 3 (Siglec-3)) and related Siglecs. CD33, a Siglec family member, is a well-known immunotherapeutic target in acute myeloid leukemia (AML). It is an inhibitory sialoadhesin expressed in human leukocytes of the myeloid lineage and some lymphoid subsets, including natural killer (NK) cells. Siglecs are primarily expressed on immune cells and recognize sialic acid-containing glycan ligands. Siglecs are organized as an extracellular module composed of Ig-like domains (an N-terminal variable set of Ig-like carbohydrate recognition domains, and 1 to 16 constant Ig-like domains), followed by transmembrane and short cytoplasmic domains. Human Siglecs are classified into two subgroups, one subgroup is comprised of sialoadhesin (Siglec-1), CD22 (Siglec-2), and MAG (Siglec-4, myelin-associated glycoprotein), the other subgroup is comprised of CD33-related Siglecs which include CD33 (Siglec-3) and human Siglecs 5-11. CD33 (Siglec-3) is the smallest Siglec member. It preferentially binds to alpha2-6- and alpha2-3-sialylated glycans and strongly binds to sialylated ligands on leukemic cell lines. Ig Superfamily (IgSF) domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. This group includes CD33-related Siglecs which belong to the C2-set of IgSF domains. Unlike the C1-set, the C2-set structures do not have a D strand."
definition: >-
  Second immunoglobulin domain of Cluster of Differentiation (CD) 33 and related Siglecs; member of the C2-set of IgSF domains. The members here are composed of the second immunoglobulin (Ig) domain of Cluster of Differentiation (CD) 33 (also known as sialic-acid binding immunoglobulin type-lectin 3 (Siglec-3)) and related Siglecs. CD33, a Siglec family member, is a well-known immunotherapeutic target in acute myeloid leukemia (AML). It is an inhibitory sialoadhesin expressed in human leukocytes of the myeloid lineage and some lymphoid subsets, including natural killer (NK) cells. Siglecs are primarily expressed on immune cells and recognize sialic acid-containing glycan ligands. Siglecs are organized as an extracellular module composed of Ig-like domains (an N-terminal variable set of Ig-like carbohydrate recognition domains, and 1 to 16 constant Ig-like domains), followed by transmembrane and short cytoplasmic domains. Human Siglecs are classified into two subgroups, one subgroup is comprised of sialoadhesin (Siglec-1), CD22 (Siglec-2), and MAG (Siglec-4, myelin-associated glycoprotein), the other subgroup is comprised of CD33-related Siglecs which include CD33 (Siglec-3) and human Siglecs 5-11. CD33 (Siglec-3) is the smallest Siglec member. It preferentially binds to alpha2-6- and alpha2-3-sialylated glycans and strongly binds to sialylated ligands on leukemic cell lines. Ig Superfamily (IgSF) domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. This group includes CD33-related Siglecs which belong to the C2-set of IgSF domains. Unlike the C1-set, the C2-set structures do not have a D strand. — an NCBI CDD conserved domain (cd20987); members share this curated model.
