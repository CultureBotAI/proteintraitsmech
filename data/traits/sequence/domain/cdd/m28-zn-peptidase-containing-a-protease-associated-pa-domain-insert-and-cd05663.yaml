identifier: CDD:cd05663
label: "M28 Zn-peptidase containing a protease-associated (PA) domain insert and associated with a PDZ domain. Peptidase family M28 (also called aminopeptidase Y family), uncharacterized subfamily. The M28 family contains aminopeptidases as well as carboxypeptidases. They have co-catalytic zinc ions; each zinc ion is tetrahedrally co-ordinated, with three amino acid ligands plus activated water; one aspartate residue binds both metal ions. This subfamily is composed of uncharacterized proteins, many of which contain a protease-associated (PA) domain insert which may participate in substrate binding and/or promote conformational changes, influencing the stability and accessibility of the site to substrate. Proteins in this subfamily are also associated with the PDZ domain, a widespread protein module that has been recruited to serve multiple functions during the course of evolution."
definition: >-
