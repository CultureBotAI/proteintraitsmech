identifier: CDD:cd17618
label: "phosphoacceptor receiver (REC) domain of PhoB response regulator from the OmpR family. The transcription factor PhoB is a component of the PhoR/PhoB two-component system, a key regulatory protein network that facilitates response to inorganic phosphate (Pi) starvation conditions by turning on the phosphate (pho) regulon whose products are involved in phosphorus uptake and metabolism. PhoB is a member of the OmpR family of DNA-binding response regulators that contains REC and winged helix-turn-helix (wHTH) DNA-binding output effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of PhoB response regulator from the OmpR family. The transcription factor PhoB is a component of the PhoR/PhoB two-component system, a key regulatory protein network that facilitates response to inorganic phosphate (Pi) starvation conditions by turning on the phosphate (pho) regulon whose products are involved in phosphorus uptake and metabolism. PhoB is a member of the OmpR family of DNA-binding response regulators that contains REC and winged helix-turn-helix (wHTH) DNA-binding output effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17618); members share this curated model.
