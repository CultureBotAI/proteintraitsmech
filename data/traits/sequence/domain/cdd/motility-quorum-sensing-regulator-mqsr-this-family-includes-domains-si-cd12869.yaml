identifier: CDD:cd12869
label: MqsR
definition: >-
  Motility quorum-sensing regulator (MqsR). This family includes domains similar to the motility quorum-sensing regulator MqsR, a toxin that is highly upregulated in persisters (dormant cells found in biofilms that are a source of antibiotic resistance). MqsR pairs with its antitoxin MqsA, forming a unique family of toxin:antitoxin (TA) systems. MqsR has been found to be structurally homologous to the bacterial ribonuclease (RelE) toxins; however, its sequence is not similar to any other known toxins and therefore its molecular function is as yet unknown
