identifier: CDD:cd00731
label: "CheA regulatory domain; CheA is a histidine protein kinase present in bacteria and archea. Activated by the chemotaxis receptor a histidine phosphoryl group from CheA is passed directly to an aspartate in the response regulator CheY. This signalling mechanism is modulated by the methyl accepting chemotaxis proteins (MCPs). MCPs form a highly interconnected, tightly packed array within the membrane that is organized, at least in part, through interactions with CheW and CheA. The CheA regulatory domain belongs to the family of CheW_like proteins and has been proposed to mediate interaction with the kinase regulator CheW."
definition: >-
  CheA regulatory domain; CheA is a histidine protein kinase present in bacteria and archea. Activated by the chemotaxis receptor a histidine phosphoryl group from CheA is passed directly to an aspartate in the response regulator CheY. This signalling mechanism is modulated by the methyl accepting chemotaxis proteins (MCPs). MCPs form a highly interconnected, tightly packed array within the membrane that is organized, at least in part, through interactions with CheW and CheA. The CheA regulatory domain belongs to the family of CheW_like proteins and has been proposed to mediate interaction with the kinase regulator CheW. — an NCBI CDD conserved domain (cd00731); members share this curated model.
