identifier: CDD:cd01755
label: "PLAT/ LH2 domain present in connection with a lipase domain. This family contains two major subgroups, the  lipoprotein lipase (LPL) and the pancreatic triglyceride lipase.  LPL is a key enzyme in catabolism of plasma lipoprotein triglycerides (TGs). The central role of triglyceride lipases is in energy production. In general, PLAT/LH2 domain's proposed function is to mediate interaction with lipids or membrane bound proteins."
definition: >-
  PLAT/ LH2 domain present in connection with a lipase domain. This family contains two major subgroups, the lipoprotein lipase (LPL) and the pancreatic triglyceride lipase. LPL is a key enzyme in catabolism of plasma lipoprotein triglycerides (TGs). The central role of triglyceride lipases is in energy production. In general, PLAT/LH2 domain's proposed function is to mediate interaction with lipids or membrane bound proteins. — an NCBI CDD conserved domain (cd01755); members share this curated model.
