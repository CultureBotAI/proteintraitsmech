identifier: CDD:cd14332
label: "C-terminal UBA-like domain of holliday junction ATP-dependent DNA helicase RuvA. RuvA, along with RuvB and RuvC proteins, is involved in branch migration of heteroduplex DNA in homologous recombination that is a crucial process for maintaining genomic integrity and generating biological diversity in all living organisms. RuvA has a tetrameric architecture in which each subunit comprised of three distinct domains. This model corresponds to the C-terminal domain of RuvA which is distantly related to the ubiquitin-associated (UBA) domain. It plays a significant role in the ATP-dependent branch migration of the hetero-duplex through direct contact with RuvB. Within the Holliday junction, the C-terminal domain makes no interaction with DNA."
definition: >-
  C-terminal UBA-like domain of holliday junction ATP-dependent DNA helicase RuvA. RuvA, along with RuvB and RuvC proteins, is involved in branch migration of heteroduplex DNA in homologous recombination that is a crucial process for maintaining genomic integrity and generating biological diversity in all living organisms. RuvA has a tetrameric architecture in which each subunit comprised of three distinct domains. This model corresponds to the C-terminal domain of RuvA which is distantly related to the ubiquitin-associated (UBA) domain. It plays a significant role in the ATP-dependent branch migration of the hetero-duplex through direct contact with RuvB. Within the Holliday junction, the C-terminal domain makes no interaction with DNA. — an NCBI CDD conserved domain (cd14332); members share this curated model.
