identifier: CDD:cd16667
label: "RING finger, H2 subclass, found in RING finger proteins RNF126, RNF115, and similar proteins. This subfamily includes RING finger proteins RNF126, RNF115, and similar proteins. RNF126 is a Bag6-dependent E3 ubiquitin ligase that is involved in the mislocalized protein (MLP) pathway of quality control. It regulates the retrograde sorting of the cation-independent mannose 6-phosphate receptor (CI-MPR). RNF126 promotes cancer cell proliferation by targeting the tumor suppressor p21 for ubiquitin-mediated degradation, and could be a novel therapeutic target in breast and prostate cancers. It is also able to ubiquitylate cytidine deaminase (AID), a poorly soluble protein that is essential for antibody diversification. RNF115, also known as Rab7-interacting ring finger protein (Rabring 7), or zinc finger protein 364 (ZNF364), or breast cancer-associated gene 2 (BCA2), is an E3 ubiquitin-protein ligase that is an endogenous inhibitor of adenosine monophosphate-activated protein kinase (AMPK) activation; this inhibition increases the efficacy of metformin in breast cancer cells. It also functions as a cofactor in the restriction imposed by tetherin on HIV-1, and targets HIV-1 Gag for lysosomal degradation, impairing virus assembly and release, in a tetherin-independent manner. Moreover, RNF115 is a Rab7-binding protein that stimulates c-Myc degradation through mono-ubiquitination of MM-1. It also plays crucial roles as a Rab7 target protein in vesicle traffic to late endosome/lysosome and lysosome biogenesis. RNF115 and RNF126 associate with the epidermal growth factor receptor (EGFR) and promote ubiquitylation of EGFR, suggesting they play a role in the ubiquitin-dependent sorting and downregulation of membrane receptors. Both of them contain an N-terminal BCA2 Zinc-finger domain (BZF), AKT-phosphorylation sites, and a C-terminal C3H2C3-type RING-H2 finger."
definition: >-
  RING finger, H2 subclass, found in RING finger proteins RNF126, RNF115, and similar proteins. This subfamily includes RING finger proteins RNF126, RNF115, and similar proteins. RNF126 is a Bag6-dependent E3 ubiquitin ligase that is involved in the mislocalized protein (MLP) pathway of quality control. It regulates the retrograde sorting of the cation-independent mannose 6-phosphate receptor (CI-MPR). RNF126 promotes cancer cell proliferation by targeting the tumor suppressor p21 for ubiquitin-mediated degradation, and could be a novel therapeutic target in breast and prostate cancers. It is also able to ubiquitylate cytidine deaminase (AID), a poorly soluble protein that is essential for antibody diversification. RNF115, also known as Rab7-interacting ring finger protein (Rabring 7), or zinc finger protein 364 (ZNF364), or breast cancer-associated gene 2 (BCA2), is an E3 ubiquitin-protein ligase that is an endogenous inhibitor of adenosine monophosphate-activated protein kinase (AMPK) activation; this inhibition increases the efficacy of metformin in breast cancer cells. It also functions as a cofactor in the restriction imposed by tetherin on HIV-1, and targets HIV-1 Gag for lysosomal degradation, impairing virus assembly and release, in a tetherin-independent manner. Moreover, RNF115 is a Rab7-binding protein that stimulates c-Myc degradation through mono-ubiquitination of MM-1. It also plays crucial roles as a Rab7 target protein in vesicle traffic to late endosome/lysosome and lysosome biogenesis. RNF115 and RNF126 associate with the epidermal growth factor receptor (EGFR) and promote ubiquitylation of EGFR, suggesting they play a role in the ubiquitin-dependent sorting and downregulation of membrane receptors. Both of them contain an N-terminal BCA2 Zinc-finger domain (BZF), AKT-phosphorylation sites, and a C-terminal C3H2C3-type RING-H2 finger. — an NCBI CDD conserved domain (cd16667); members share this curated model.
