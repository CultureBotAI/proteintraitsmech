identifier: CDD:cd23150
label: "second U-box domain, a modified RING finger, found in Legionella pneumophila U-box protein LubX and similar proteins. LubX, also called RING-type E3 ubiquitin transferase LubX, is part of the large arsenal of effectors in Legionella pneumophila that are translocated into the host cytosol during infection. LubX acts as an E3 ubiquitin-protein ligase (EC 2.3.2.27) that interferes with the host's ubiquitination pathway. LubX contains two RING-like U-box domains. U-box 1 is critical to the ubiquitin ligase activity, and U-box 2 mediates interaction with host target. This model corresponds to the second one."
definition: >-
  second U-box domain, a modified RING finger, found in Legionella pneumophila U-box protein LubX and similar proteins. LubX, also called RING-type E3 ubiquitin transferase LubX, is part of the large arsenal of effectors in Legionella pneumophila that are translocated into the host cytosol during infection. LubX acts as an E3 ubiquitin-protein ligase (EC 2.3.2.27) that interferes with the host's ubiquitination pathway. LubX contains two RING-like U-box domains. U-box 1 is critical to the ubiquitin ligase activity, and U-box 2 mediates interaction with host target. This model corresponds to the second one. — an NCBI CDD conserved domain (cd23150); members share this curated model.
