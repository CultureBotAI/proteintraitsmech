identifier: CDD:cd03721
label: "SOCS (suppressors of cytokine signaling) box of ASB2-like proteins. ASB family members have a C-terminal SOCS box and an N-terminal ankyrin-related sequence. ASB2 targets specific proteins to destruction by the proteasome in leukemia cells that have been induced to differentiate. The general function of the SOCS box is the recruitment of the ubiquitin-transferase system. The SOCS box interacts with Elongins B and C, Cullin-5 or Cullin-2, Rbx-1, and E2. Therefore, SOCS-box-containing proteins probably function as E3 ubiquitin ligases and mediate the degradation of proteins associated through their N-terminal regions."
definition: >-
