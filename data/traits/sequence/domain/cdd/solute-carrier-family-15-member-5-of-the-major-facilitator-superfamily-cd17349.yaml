identifier: CDD:cd17349
label: "Solute Carrier family 15 member 5 of the Major Facilitator Superfamily of transporters. Solute carrier family 15 member 5 (SLC15A5) is a member of the proton-coupled oligopeptide transporter (POT) family of integral membrane proteins that mediate the cellular uptake of di/tripeptides and peptide-like drugs. The specific function of SLC15A5 is unknown. SLC15A5 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Solute Carrier family 15 member 5 of the Major Facilitator Superfamily of transporters. Solute carrier family 15 member 5 (SLC15A5) is a member of the proton-coupled oligopeptide transporter (POT) family of integral membrane proteins that mediate the cellular uptake of di/tripeptides and peptide-like drugs. The specific function of SLC15A5 is unknown. SLC15A5 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17349); members share this curated model.
