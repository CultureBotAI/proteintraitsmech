identifier: CDD:cd14562
label: "protein tyrosine phosphatase-like domain of tensin-2. Tensin-2 (TNS2) is also called tensin-like C1 domain-containing phosphatase (TENC1) or C1 domain-containing phosphatase and tensin homolog (C1-TEN). It is part of the tensin family of intracellular proteins (tensin-1, -2, -3 and -4), which act as links between the extracellular matrix and the cytoskeleton, and thereby mediate signaling for cell shape and motility. Tensin-2 is an essential component for the maintenance of glomerular basement membrane (GBM) structures. It also modulates cell contractility and remodeling of collagen fibers through the DLC1, a RhoGAP that binds to tensins in focal adhesions. Tensin-2 may have phosphatase activity; it reduces AKT1 phosphorylation. It contains an N-terminal region with a zinc finger, a protein tyrosine phosphatase (PTP)-like domain and a protein kinase 2 (C2) domain, and a C-terminal region with SH2 and pTyr binding (PTB) domains."
definition: >-
  protein tyrosine phosphatase-like domain of tensin-2. Tensin-2 (TNS2) is also called tensin-like C1 domain-containing phosphatase (TENC1) or C1 domain-containing phosphatase and tensin homolog (C1-TEN). It is part of the tensin family of intracellular proteins (tensin-1, -2, -3 and -4), which act as links between the extracellular matrix and the cytoskeleton, and thereby mediate signaling for cell shape and motility. Tensin-2 is an essential component for the maintenance of glomerular basement membrane (GBM) structures. It also modulates cell contractility and remodeling of collagen fibers through the DLC1, a RhoGAP that binds to tensins in focal adhesions. Tensin-2 may have phosphatase activity; it reduces AKT1 phosphorylation. It contains an N-terminal region with a zinc finger, a protein tyrosine phosphatase (PTP)-like domain and a protein kinase 2 (C2) domain, and a C-terminal region with SH2 and pTyr binding (PTB) domains. — an NCBI CDD conserved domain (cd14562); members share this curated model.
