identifier: CDD:cd12733
label: "RNA recognition motif 3 (RRM3) found in G-rich sequence factor 1 (GRSF-1) and similar proteins. This subgroup corresponds to the RRM3 of G-rich sequence factor 1 (GRSF-1), a cytoplasmic poly(A)+ mRNA binding protein which interacts with RNA in a G-rich element-dependent manner. It may function in RNA packaging, stabilization of RNA secondary structure, or other macromolecular interactions. GRSF-1 contains three potential RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), which are responsible for the RNA binding. In addition, GRSF-1 has two auxiliary domains, an acidic alpha-helical domain and an N-terminal alanine-rich region, that may play a role in protein-protein interactions and provide binding specificity."
definition: >-
  RNA recognition motif 3 (RRM3) found in G-rich sequence factor 1 (GRSF-1) and similar proteins. This subgroup corresponds to the RRM3 of G-rich sequence factor 1 (GRSF-1), a cytoplasmic poly(A)+ mRNA binding protein which interacts with RNA in a G-rich element-dependent manner. It may function in RNA packaging, stabilization of RNA secondary structure, or other macromolecular interactions. GRSF-1 contains three potential RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), which are responsible for the RNA binding. In addition, GRSF-1 has two auxiliary domains, an acidic alpha-helical domain and an N-terminal alanine-rich region, that may play a role in protein-protein interactions and provide binding specificity. — an NCBI CDD conserved domain (cd12733); members share this curated model.
