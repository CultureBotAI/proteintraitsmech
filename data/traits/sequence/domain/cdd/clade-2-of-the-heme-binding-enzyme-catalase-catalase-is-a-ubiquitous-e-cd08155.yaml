identifier: CDD:cd08155
label: "Clade 2 of the heme-binding enzyme catalase. Catalase is a ubiquitous enzyme found in both prokaryotes and eukaryotes, which is involved in the protection of cells from the toxic effects of peroxides. It catalyzes the conversion of hydrogen peroxide to water and molecular oxygen. Catalases also utilize hydrogen peroxide to oxidize various substrates such as alcohol or phenols. Clade 2 catalases are mostly found in bacteria and fungi; they have a large subunit size of 75 to 84 kDa, and bind a heme d group buried deep inside the structure. They appear to form tetramers. In eukaryotic cells, catalases are located in peroxisomes."
definition: >-
  Clade 2 of the heme-binding enzyme catalase. Catalase is a ubiquitous enzyme found in both prokaryotes and eukaryotes, which is involved in the protection of cells from the toxic effects of peroxides. It catalyzes the conversion of hydrogen peroxide to water and molecular oxygen. Catalases also utilize hydrogen peroxide to oxidize various substrates such as alcohol or phenols. Clade 2 catalases are mostly found in bacteria and fungi; they have a large subunit size of 75 to 84 kDa, and bind a heme d group buried deep inside the structure. They appear to form tetramers. In eukaryotic cells, catalases are located in peroxisomes. — an NCBI CDD conserved domain (cd08155); members share this curated model.
