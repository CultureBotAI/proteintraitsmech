identifier: CDD:cd14442
label: "putative alginate O-acetyltranferases AlgJ, AlgV, and similar proteins. The alginate biosynthesis protein AlgX appears to be directly involved in the O-acetylation of alginate, an exopolysaccharide that is associated with the formation of persistent biofilms, such as those by mucoid strains of Pseudomonas aeruginosa that affect patients suffering from cystic fibrosis. Its N-terminal catalytic domain resembles SGNH hydrolases, though with a permuted topology. The active site matches that of the SGNH hydrolases, is well conserved, and has been verified experimentally. Members of this family have been annotated as AlgJ or AlgV, and they closely resemble AlgX in sequence and function, although they lack the C-terminal carbohydrate binding domain of AlgX."
definition: >-
  putative alginate O-acetyltranferases AlgJ, AlgV, and similar proteins. The alginate biosynthesis protein AlgX appears to be directly involved in the O-acetylation of alginate, an exopolysaccharide that is associated with the formation of persistent biofilms, such as those by mucoid strains of Pseudomonas aeruginosa that affect patients suffering from cystic fibrosis. Its N-terminal catalytic domain resembles SGNH hydrolases, though with a permuted topology. The active site matches that of the SGNH hydrolases, is well conserved, and has been verified experimentally. Members of this family have been annotated as AlgJ or AlgV, and they closely resemble AlgX in sequence and function, although they lack the C-terminal carbohydrate binding domain of AlgX. — an NCBI CDD conserved domain (cd14442); members share this curated model.
