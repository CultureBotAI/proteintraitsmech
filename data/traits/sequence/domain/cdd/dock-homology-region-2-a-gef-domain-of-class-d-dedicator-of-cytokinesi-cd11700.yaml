identifier: CDD:cd11700
label: "Dock Homology Region 2, a GEF domain, of Class D Dedicator of Cytokinesis 11. Dock11, also called Zizimin2 or activated Cdc42-associated GEF (ACG), is an atypical guanine nucleotide exchange factor (GEF) that lacks the conventional Dbl homology (DH) domain. As a GEF, it activates the small GTPase Cdc42 by exchanging bound GDP for free GTP. Dock11 is predominantly expressed in lymphocytes and is found in high levels in germinal center B lymphocytes after T cell dependent antigen immunization. DOCK proteins are divided into four classes (A-D) based on sequence similarity and domain architecture; class D includes Dock9, 10 and 11. All DOCKs contain two homology domains: the DHR-1 (Dock homology region-1), also called CZH1 (CED-5, Dock180, and MBC-zizimin homology 1), and DHR-2 (also called CZH2 or Docker). The DHR-1 domain binds phosphatidylinositol-3,4,5-triphosphate. This alignment model represents the DHR-2 domain of Dock11, which contains the catalytic GEF activity for Cdc42. Class D DOCKs also contain a Pleckstrin homology (PH) domain at the N-terminus."
definition: >-
  Dock Homology Region 2, a GEF domain, of Class D Dedicator of Cytokinesis 11. Dock11, also called Zizimin2 or activated Cdc42-associated GEF (ACG), is an atypical guanine nucleotide exchange factor (GEF) that lacks the conventional Dbl homology (DH) domain. As a GEF, it activates the small GTPase Cdc42 by exchanging bound GDP for free GTP. Dock11 is predominantly expressed in lymphocytes and is found in high levels in germinal center B lymphocytes after T cell dependent antigen immunization. DOCK proteins are divided into four classes (A-D) based on sequence similarity and domain architecture; class D includes Dock9, 10 and 11. All DOCKs contain two homology domains: the DHR-1 (Dock homology region-1), also called CZH1 (CED-5, Dock180, and MBC-zizimin homology 1), and DHR-2 (also called CZH2 or Docker). The DHR-1 domain binds phosphatidylinositol-3,4,5-triphosphate. This alignment model represents the DHR-2 domain of Dock11, which contains the catalytic GEF activity for Cdc42. Class D DOCKs also contain a Pleckstrin homology (PH) domain at the N-terminus. — an NCBI CDD conserved domain (cd11700); members share this curated model.
