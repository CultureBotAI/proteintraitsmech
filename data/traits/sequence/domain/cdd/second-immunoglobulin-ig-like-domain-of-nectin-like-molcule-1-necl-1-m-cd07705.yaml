identifier: CDD:cd07705
label: "Second immunoglobulin (Ig)-like domain of nectin-like molcule-1 (Necl-1); member of the I-set of Ig superfamily domains. The members here are composed of the second immunoglobulin (Ig)-like domain of nectin-like molcule-1 (Necl-1; also known as cell adhesion molecule3 (CADM3)). These nectin-like molecules have similar domain structures to those of nectins. At least five nectin-like molecules have been identified (Necl-1 through Necl-5). These have an extracellular region containing three Ig-like domains, one transmembrane region, and one cytoplasmic region. The N-terminal Ig-like domain of the extracellular region belongs to the V-type subfamily of Ig domains is essential to cell-cell adhesion and plays a part in the interaction with the envelope glycoprotein D of various viruses. Necl-1 and Necl-2 have Ca(2+)-independent homophilic and heterophilic cell-cell adhesion activity. Necl-1 is specifically expressed in neural tissue and is important to the formation of synapses, axon bundles, and myelinated axons. Necl-2 is expressed in a wide variety of tissues and is a putative tumour suppressor gene which is downregulated in aggressive neuroblastoma. Ig domains are likely to participate in ligand binding and recognition."
definition: >-
  Second immunoglobulin (Ig)-like domain of nectin-like molcule-1 (Necl-1); member of the I-set of Ig superfamily domains. The members here are composed of the second immunoglobulin (Ig)-like domain of nectin-like molcule-1 (Necl-1; also known as cell adhesion molecule3 (CADM3)). These nectin-like molecules have similar domain structures to those of nectins. At least five nectin-like molecules have been identified (Necl-1 through Necl-5). These have an extracellular region containing three Ig-like domains, one transmembrane region, and one cytoplasmic region. The N-terminal Ig-like domain of the extracellular region belongs to the V-type subfamily of Ig domains is essential to cell-cell adhesion and plays a part in the interaction with the envelope glycoprotein D of various viruses. Necl-1 and Necl-2 have Ca(2+)-independent homophilic and heterophilic cell-cell adhesion activity. Necl-1 is specifically expressed in neural tissue and is important to the formation of synapses, axon bundles, and myelinated axons. Necl-2 is expressed in a wide variety of tissues and is a putative tumour suppressor gene which is downregulated in aggressive neuroblastoma. Ig domains are likely to participate in ligand binding and recognition. — an NCBI CDD conserved domain (cd07705); members share this curated model.
