identifier: CDD:cd21706
label: "juxtamembrane and transmembrane (JMTM) domain found in Drosophila melanogaster neurogenic locus Notch protein (dNotch) and similar proteins. Drosophila melanogaster neurogenic locus Notch protein (dNotch) is an essential signaling protein which has a major role in many developmental processes. It functions as a receptor for membrane-bound ligands Delta and Serrate to regulate cell-fate determination. It regulates oogenesis, the differentiation of the ectoderm and the development of the central and peripheral nervous system, eye, wing disk, muscles and segmental appendages such as antennae and legs, through lateral inhibition or induction. It also regulates neuroblast self-renewal, identity and proliferation through the regulation of bHLH-O proteins; in larval brains, it is involved in the maintenance of type II neuroblast self-renewal and identity by suppressing erm expression together with pnt. It might also regulate dpn expression through the activation of the transcriptional regulator Su(H). This model corresponds to the juxtamembrane and transmembrane (JMTM) domain of dNotch, which comprises an extended coil, a transmembrane helix (TM), and a beta-strand."
definition: >-
  juxtamembrane and transmembrane (JMTM) domain found in Drosophila melanogaster neurogenic locus Notch protein (dNotch) and similar proteins. Drosophila melanogaster neurogenic locus Notch protein (dNotch) is an essential signaling protein which has a major role in many developmental processes. It functions as a receptor for membrane-bound ligands Delta and Serrate to regulate cell-fate determination. It regulates oogenesis, the differentiation of the ectoderm and the development of the central and peripheral nervous system, eye, wing disk, muscles and segmental appendages such as antennae and legs, through lateral inhibition or induction. It also regulates neuroblast self-renewal, identity and proliferation through the regulation of bHLH-O proteins; in larval brains, it is involved in the maintenance of type II neuroblast self-renewal and identity by suppressing erm expression together with pnt. It might also regulate dpn expression through the activation of the transcriptional regulator Su(H). This model corresponds to the juxtamembrane and transmembrane (JMTM) domain of dNotch, which comprises an extended coil, a transmembrane helix (TM), and a beta-strand. — an NCBI CDD conserved domain (cd21706); members share this curated model.
