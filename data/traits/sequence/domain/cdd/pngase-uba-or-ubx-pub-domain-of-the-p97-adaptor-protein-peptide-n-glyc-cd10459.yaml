identifier: CDD:cd10459
label: "PNGase/UBA or UBX (PUB) domain of the P97 adaptor protein Peptide:N-glycanase (PNGase). This PUB (PNGase/UBA or UBX) domain is found in the p97 adaptor protein PNGase (Peptide:N-glycanase). The PUB domain functions as a p97 (also known as valosin-containing protein or VCP) adaptor by interacting with the D1 and/or D2 ATPase domains. The type II AAA+ ATPase p97 is involved in a variety of cellular processes such as the deglycosylation of ERAD substrates, membrane fusion, transcription factor activation and cell cycle regulation through differential binding to specific adaptor proteins.  Peptide:N-glycanase (PNGase), a deglycosylating enzyme that functions in proteasome-dependent degradation of misfolded glycoproteins which are translocated from the endoplasmic reticulum (ER) to the cytosol during ERAD, associates with the ubiquitin-proteasome system proteins mediated by the N-terminal PUB domain. PNGase is present in all eukaryotic organisms; however, the yeast PNGase ortholog does not contain the PUB domain. The mammalian PNGase binds a considerable number of proteins via its PUB domain; these include ERAD E3 enzyme, the autocrine motility factor receptor (AMFR or gp78), SAKS and Derlin-1."
definition: >-
  PNGase/UBA or UBX (PUB) domain of the P97 adaptor protein Peptide:N-glycanase (PNGase). This PUB (PNGase/UBA or UBX) domain is found in the p97 adaptor protein PNGase (Peptide:N-glycanase). The PUB domain functions as a p97 (also known as valosin-containing protein or VCP) adaptor by interacting with the D1 and/or D2 ATPase domains. The type II AAA+ ATPase p97 is involved in a variety of cellular processes such as the deglycosylation of ERAD substrates, membrane fusion, transcription factor activation and cell cycle regulation through differential binding to specific adaptor proteins. Peptide:N-glycanase (PNGase), a deglycosylating enzyme that functions in proteasome-dependent degradation of misfolded glycoproteins which are translocated from the endoplasmic reticulum (ER) to the cytosol during ERAD, associates with the ubiquitin-proteasome system proteins mediated by the N-terminal PUB domain. PNGase is present in all eukaryotic organisms; however, the yeast PNGase ortholog does not contain the PUB domain. The mammalian PNGase binds a considerable number of proteins via its PUB domain; these include ERAD E3 enzyme, the autocrine motility factor receptor (AMFR or gp78), SAKS and Derlin-1. — an NCBI CDD conserved domain (cd10459); members share this curated model.
