identifier: CDD:cd19871
label: "double-stranded RNA binding motif of tRNA-dihydrouridine(20) synthase [NAD(P)+]-like (DUS2L) and similar proteins. DUS2L (also known as dihydrouridine synthase 2 (DUS2), up-regulated in lung cancer protein 8 (URLC8), or tRNA-dihydrouridine synthase 2-like) catalyzes the synthesis of dihydrouridine, a modified base found in the D-loop of most tRNAs. It negatively regulates the activation of EIF2AK2/PKR. DUS2L contains an N-terminal FMN-binding domain and a C-terminal double-stranded RNA binding motif (DSRM) that is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  double-stranded RNA binding motif of tRNA-dihydrouridine(20) synthase [NAD(P)+]-like (DUS2L) and similar proteins. DUS2L (also known as dihydrouridine synthase 2 (DUS2), up-regulated in lung cancer protein 8 (URLC8), or tRNA-dihydrouridine synthase 2-like) catalyzes the synthesis of dihydrouridine, a modified base found in the D-loop of most tRNAs. It negatively regulates the activation of EIF2AK2/PKR. DUS2L contains an N-terminal FMN-binding domain and a C-terminal double-stranded RNA binding motif (DSRM) that is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19871); members share this curated model.
