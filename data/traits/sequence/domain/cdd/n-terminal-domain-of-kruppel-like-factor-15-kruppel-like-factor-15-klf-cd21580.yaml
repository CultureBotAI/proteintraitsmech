identifier: CDD:cd21580
label: "N-terminal domain of Kruppel-like factor 15. Kruppel-like factor 15 (KLF15; also known as Krueppel-like factor 15 or kidney-enriched Kruppel-like factor/KKLF) is a protein that in humans is encoded by the KLF15 gene. KLF15 plays a role in gluconeogenesis, adipogenesis, and may be a potential therapeutic target to reduce hepatitis B virus gene expression and viral replication, heart failure and aortic aneurysm formation, and endometrial, breast cancer, and other diseases related to estrogen. It belongs to a family of proteins, called the Specificity Protein (SP)/KLF family, characterized by a C-terminal DNA-binding domain of 81 amino acids consisting of three Kruppel-like C2H2 zinc fingers. These factors bind to a loose consensus motif, namely NNRCRCCYY (where N is any nucleotide; R is A/G, and Y is C/T), such as the recurring motifs in GC and GT boxes (5'-GGGGCGGGG-3' and 5-GGTGTGGGG-3') that are present in promoters and more distal regulatory elements of mammalian genes. Members of the KLF family can act as activators or repressors of transcription depending on cell and promoter context. KLFs regulate various cellular functions, such as proliferation, differentiation, and apoptosis, as well as the development and homeostasis of several types of tissue. In addition to the C-terminal DNA-binding domain, each KLF also has a unique N-terminal activation/repression domain that confers specificity and allows it to bind specifically to a certain partner, leading to distinct activities in vivo. This model represents the N-terminal domain of KLF15."
