identifier: CDD:cd22458
label: "type I K homology (KH) RNA-binding domain found in Saccharomyces cerevisiae meiotic recombination 1 protein (MER1) and similar proteins. MER1 is required for chromosome pairing and genetic recombination. It may function to bring the axial elements of the synaptonemal complex corresponding to homologous chromosomes together by initiating recombination. MER1 might be responsible for regulating the MER2 gene and/or gene product."
definition: >-
  type I K homology (KH) RNA-binding domain found in Saccharomyces cerevisiae meiotic recombination 1 protein (MER1) and similar proteins. MER1 is required for chromosome pairing and genetic recombination. It may function to bring the axial elements of the synaptonemal complex corresponding to homologous chromosomes together by initiating recombination. MER1 might be responsible for regulating the MER2 gene and/or gene product. — an NCBI CDD conserved domain (cd22458); members share this curated model.
