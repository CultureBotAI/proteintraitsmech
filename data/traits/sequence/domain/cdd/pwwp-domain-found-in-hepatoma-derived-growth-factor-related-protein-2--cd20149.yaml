identifier: CDD:cd20149
label: "PWWP domain found in Hepatoma-derived growth factor-related protein 2 (HDGFL2). HDGFL2, also called HDGF-related protein 2 (HRP-2), or Hepatoma-derived growth factor 2 (HDGF-2), is involved in cellular growth control, through the regulation of cyclin D1 expression. It contains a PWWP domain, which is necessary for DNA binding."
definition: >-
  PWWP domain found in Hepatoma-derived growth factor-related protein 2 (HDGFL2). HDGFL2, also called HDGF-related protein 2 (HRP-2), or Hepatoma-derived growth factor 2 (HDGF-2), is involved in cellular growth control, through the regulation of cyclin D1 expression. It contains a PWWP domain, which is necessary for DNA binding. — an NCBI CDD conserved domain (cd20149); members share this curated model.
