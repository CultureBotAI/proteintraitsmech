identifier: CDD:cd00461
label: "RNA_pol_N_RPB10. RNA polymerase subunit RPB10 (also known as subunit N in archea) is highly conserved throughout eukaryotes and archea and has a \"zinc bundle\" structure consisting of three alpha-helices stabilized by a zinc ion (atypical CX2CXnCC metal binding motif). RPB10 has a role of a scaffold protein and functions in a structural capacity, either within the polymerase complex or with transcriptionally associated proteins and nucleic acids. RPB10 is absolutely required for cell growth and is shared by all three yeast RNAPs."
definition: >-
  RNA_pol_N_RPB10. RNA polymerase subunit RPB10 (also known as subunit N in archea) is highly conserved throughout eukaryotes and archea and has a "zinc bundle" structure consisting of three alpha-helices stabilized by a zinc ion (atypical CX2CXnCC metal binding motif). RPB10 has a role of a scaffold protein and functions in a structural capacity, either within the polymerase complex or with transcriptionally associated proteins and nucleic acids. RPB10 is absolutely required for cell growth and is shared by all three yeast RNAPs. — an NCBI CDD conserved domain (cd00461); members share this curated model.
