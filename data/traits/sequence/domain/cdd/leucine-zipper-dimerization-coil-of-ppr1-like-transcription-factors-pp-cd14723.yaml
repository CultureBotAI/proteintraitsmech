identifier: CDD:cd14723
label: "Leucine zipper Dimerization coil of Ppr1-like transcription factors. Ppr1/Ppr1p activates transcription of the URA1, URA3, and URA4 genes, which encode enzymes involved in the regulation of pyrimidine levels. Also included in this subfamily is Colletotrichum acutatum Nir1 which plays a role during nitrogen-starvation conditions. Proteins in this subfamily are members of the Gal4p family of transcriptional activators which contain an N-terminal DNA-binding domain with a Zn2Cys6 binuclear cluster that interact with CCG triplets and a leucine zipper-like heptad repeat that dimerizes. Dimerization allows binding of targets which contain two CCG motifs oriented in an inverted (CGG-CCG), direct (CCG-CCG), or everted (CCG-CGG) manner."
definition: >-
  Leucine zipper Dimerization coil of Ppr1-like transcription factors. Ppr1/Ppr1p activates transcription of the URA1, URA3, and URA4 genes, which encode enzymes involved in the regulation of pyrimidine levels. Also included in this subfamily is Colletotrichum acutatum Nir1 which plays a role during nitrogen-starvation conditions. Proteins in this subfamily are members of the Gal4p family of transcriptional activators which contain an N-terminal DNA-binding domain with a Zn2Cys6 binuclear cluster that interact with CCG triplets and a leucine zipper-like heptad repeat that dimerizes. Dimerization allows binding of targets which contain two CCG motifs oriented in an inverted (CGG-CCG), direct (CCG-CCG), or everted (CCG-CGG) manner. — an NCBI CDD conserved domain (cd14723); members share this curated model.
