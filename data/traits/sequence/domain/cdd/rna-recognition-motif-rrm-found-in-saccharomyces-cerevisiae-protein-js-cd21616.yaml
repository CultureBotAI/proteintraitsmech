identifier: CDD:cd21616
label: "RNA recognition motif (RRM) found in Saccharomyces cerevisiae protein JSN1 and similar proteins. JSN1, also called Pumilio homology domain family member 1 (PUF1), is a member of the PUF family of proteins. It facilitates association of Arp2/3 complex to yeast mitochondria. It may play a role in mitosis, perhaps by affecting the stability of microtubules. Members in this family contain an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain)."
definition: >-
  RNA recognition motif (RRM) found in Saccharomyces cerevisiae protein JSN1 and similar proteins. JSN1, also called Pumilio homology domain family member 1 (PUF1), is a member of the PUF family of proteins. It facilitates association of Arp2/3 complex to yeast mitochondria. It may play a role in mitosis, perhaps by affecting the stability of microtubules. Members in this family contain an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain). — an NCBI CDD conserved domain (cd21616); members share this curated model.
