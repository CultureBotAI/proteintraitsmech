identifier: CDD:cd07894
label: "Adenylation domain of RNA circularization proteins. RNA circularization proteins are capable of circularizing RNA molecules in an ATP-dependent reaction. RNA circularization may protect RNA from exonuclease activity. This model comprises the adenylation domain, the minimal catalytic unit that is common to all members of the ATP-dependent DNA ligase family, and the carboxy-terminal extension of RNA circularization protein that serves as a dimerization module. ATP-dependent polynucleotide ligases catalyze phosphodiester bond formation of nicked nucleic acid substrates using the high energy nucleotide of ATP as a cofactor in a three step reaction mechanism. The adenylation domain binds ATP and contains many active site residues."
definition: >-
  Adenylation domain of RNA circularization proteins. RNA circularization proteins are capable of circularizing RNA molecules in an ATP-dependent reaction. RNA circularization may protect RNA from exonuclease activity. This model comprises the adenylation domain, the minimal catalytic unit that is common to all members of the ATP-dependent DNA ligase family, and the carboxy-terminal extension of RNA circularization protein that serves as a dimerization module. ATP-dependent polynucleotide ligases catalyze phosphodiester bond formation of nicked nucleic acid substrates using the high energy nucleotide of ATP as a cofactor in a three step reaction mechanism. The adenylation domain binds ATP and contains many active site residues. — an NCBI CDD conserved domain (cd07894); members share this curated model.
