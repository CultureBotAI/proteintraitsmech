identifier: CDD:cd15495
label: "PHD finger found in Arabidopsis thaliana histone-lysine N-methyltransferase arabidopsis trithorax-like protein ATX3, ATX4, ATX5, and similar proteins. The family includes A. thaliana ATX3 (also termed protein SET domain group 14, or trithorax-homolog protein 3), ATX4 (also termed protein SET domain group 16, or trithorax-homolog protein 4) and ATX5 (also termed protein SET domain group 29, or trithorax-homolog protein 5), which belong to the histone-lysine methyltransferase family. They show distinct phylogenetic origins from the ATX1 and ATX2 family. They are multi-domain containing proteins that consist of an N-terminal PWWP domain, a canonical Cys4HisCys3 plant homeodomain (PHD) finger, a non-canonical extended PHD (ePHD) finger, Cys2HisCys5HisCys2His, and a C-terminal SET domain; this model corresponds to the Cys4HisCys3 canonical PHD finger."
definition: >-
