identifier: CDD:cd22340
label: NgoMIV-like
definition: >-
  Restriction endonuclease NgoMIV and similar endonucleases. Type II restriction endonuclease NgoMIV recognizes and cleaves the palindromic sequence 5'-G|CCGGC-3' (| denotes the cleavage site) to produce 4 bp 5' staggered ends. It is active as a homotetramer and belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI
