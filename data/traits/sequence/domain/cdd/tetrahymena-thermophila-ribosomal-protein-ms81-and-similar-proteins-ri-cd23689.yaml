identifier: CDD:cd23689
label: "Tetrahymena thermophila ribosomal protein mS81 and similar proteins. Ribosomal protein mS81 is a component of small subunit (SSU) in  Tetrahymena thermophila mitochondrial ribosomes (mitoribosomes). The  structure of the mitoribosomal SSU reveals an assembly of 94-ribosomal  proteins and four-rRNAs with an additional protein mass of ~700 kDa on  the small subunit, while the large subunit lacks 5S rRNA."
definition: >-
  Tetrahymena thermophila ribosomal protein mS81 and similar proteins. Ribosomal protein mS81 is a component of small subunit (SSU) in Tetrahymena thermophila mitochondrial ribosomes (mitoribosomes). The structure of the mitoribosomal SSU reveals an assembly of 94-ribosomal proteins and four-rRNAs with an additional protein mass of ~700 kDa on the small subunit, while the large subunit lacks 5S rRNA. — an NCBI CDD conserved domain (cd23689); members share this curated model.
