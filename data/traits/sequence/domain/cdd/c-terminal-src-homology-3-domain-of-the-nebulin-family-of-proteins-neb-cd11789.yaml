identifier: CDD:cd11789
label: "C-terminal Src Homology 3 domain of the Nebulin family of proteins. Nebulin family proteins contain multiple nebulin repeats, and may contain an N-terminal LIM domain and/or a C-terminal SH3 domain. They have molecular weights ranging from 34 to 900 kD, depending on the number of nebulin repeats, and they all bind actin. They are involved in the regulation of actin filament architecture and function as stabilizers and scaffolds for cytoskeletal structures with which they associate, such as long actin filaments or focal adhesions. Nebulin family proteins that contain a C-terminal SH3 domain include the giant filamentous protein nebulin, nebulette, Lasp1, and Lasp2. Lasp2, also called LIM-nebulette, is an alternatively spliced variant of nebulette. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  C-terminal Src Homology 3 domain of the Nebulin family of proteins. Nebulin family proteins contain multiple nebulin repeats, and may contain an N-terminal LIM domain and/or a C-terminal SH3 domain. They have molecular weights ranging from 34 to 900 kD, depending on the number of nebulin repeats, and they all bind actin. They are involved in the regulation of actin filament architecture and function as stabilizers and scaffolds for cytoskeletal structures with which they associate, such as long actin filaments or focal adhesions. Nebulin family proteins that contain a C-terminal SH3 domain include the giant filamentous protein nebulin, nebulette, Lasp1, and Lasp2. Lasp2, also called LIM-nebulette, is an alternatively spliced variant of nebulette. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11789); members share this curated model.
