identifier: CDD:cd10601
label: OAT_AGT
definition: >-
  Pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily: Alanine-glyoxylate aminotransferase. Alanine-glyoxylate aminotransferase family. This family belongs to pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily (fold I). This CD corresponds to alanine-glyoxylate aminotransferase (AGT). AGT catalyzes the transamination between alanine (an amino acid substrate) and glyoxylate (an alpha-keto acid substrate) to form pyruvate and glycine. In humans AGT is expressed mainly in the liver parenchymal cells and its deficiency leads to a potentially lethal autosomal recessive condition called primary hyperoxaluria type 1
