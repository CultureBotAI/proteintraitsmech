identifier: CDD:cd22707
label: "forkhead associated (FHA) domain found in kinesin-like protein KIF14 and similar proteins. KIF14 is a microtubule motor protein that binds to microtubules with high affinity through each tubulin heterodimer and has an ATPase activity. It plays a role in many processes like cell division, cytokinesis and in cell proliferation and apoptosis. KIF14 is a potential oncogene and is involved in the metastasis of various cancers. Mutations of KIF14 cause primary microcephaly by impairing cytokinesis. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine."
definition: >-
