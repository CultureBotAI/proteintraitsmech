identifier: CDD:cd23784
label: "RWD domain of kinetochore protein Spc25 and related proteins. Spc25 is a component of the nuclear division cycle 80 (NDC80) kinetochore complex, which is essential for the stable formation of kinetochore-microtubule anchoring and correct chromosome segregation during mitosis. NDC80 has two subcomplexes, NDC80/NUF2 which binds directly to microtubules, and Spc24/Spc25 which interacts with the kinetochore. The inner kinetochore centromere protein T (CENP-T) has been shown to interact directly with the Spc24/25 RWD domains; these RWD domains serve as interaction modules at the kinetochores."
definition: >-
  RWD domain of kinetochore protein Spc25 and related proteins. Spc25 is a component of the nuclear division cycle 80 (NDC80) kinetochore complex, which is essential for the stable formation of kinetochore-microtubule anchoring and correct chromosome segregation during mitosis. NDC80 has two subcomplexes, NDC80/NUF2 which binds directly to microtubules, and Spc24/Spc25 which interacts with the kinetochore. The inner kinetochore centromere protein T (CENP-T) has been shown to interact directly with the Spc24/25 RWD domains; these RWD domains serve as interaction modules at the kinetochores. — an NCBI CDD conserved domain (cd23784); members share this curated model.
