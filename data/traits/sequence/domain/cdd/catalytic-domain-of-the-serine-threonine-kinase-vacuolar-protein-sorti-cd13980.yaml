identifier: CDD:cd13980
label: "Catalytic domain of the Serine/Threonine kinase, Vacuolar protein sorting-associated protein 15. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. Vps15 is a large protein consisting of an N-terminal kinase domain, a C-terminal WD-repeat containing domain, and an intermediate bridge domain that contain HEAT repeats. The kinase domain is necessary for the signaling functions of Vps15. Human Vps15 was previously called p150. It associates and regulates Vps34, also called Class III phosphoinositide 3-kinase (PI3K), which catalyzes the phosphorylation of D-myo-phosphatidylinositol (PtdIns). Vps34 is the only PI3K present in yeast. It plays an important role in the regulation of protein and vesicular trafficking and sorting, autophagy, trimeric G-protein signaling, and phagocytosis. The Vps15 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and PI3K."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, Vacuolar protein sorting-associated protein 15. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. Vps15 is a large protein consisting of an N-terminal kinase domain, a C-terminal WD-repeat containing domain, and an intermediate bridge domain that contain HEAT repeats. The kinase domain is necessary for the signaling functions of Vps15. Human Vps15 was previously called p150. It associates and regulates Vps34, also called Class III phosphoinositide 3-kinase (PI3K), which catalyzes the phosphorylation of D-myo-phosphatidylinositol (PtdIns). Vps34 is the only PI3K present in yeast. It plays an important role in the regulation of protein and vesicular trafficking and sorting, autophagy, trimeric G-protein signaling, and phagocytosis. The Vps15 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and PI3K. — an NCBI CDD conserved domain (cd13980); members share this curated model.
