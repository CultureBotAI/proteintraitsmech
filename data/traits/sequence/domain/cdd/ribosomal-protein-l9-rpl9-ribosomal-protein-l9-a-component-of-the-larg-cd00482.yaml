identifier: CDD:cd00482
label: Ribosomal_L9
definition: >-
  Ribosomal protein L9 (Rpl9). Ribosomal protein L9, a component of the large subunit of the ribosome, has a fidelity functions and is required to suppress bypassing, frameshifting, and stop codon "hopping". Rpl9 has a highly conserved architecture consisting of two globular domains connecting by a long alpha-helix which its conserved architecture is required for its fidelity functions
