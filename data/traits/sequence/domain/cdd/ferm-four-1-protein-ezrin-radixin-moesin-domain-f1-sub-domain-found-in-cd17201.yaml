identifier: CDD:cd17201
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in erythrocyte membrane protein band 4.1-like protein 1 (EPB41L1) and similar proteins. EPB41L1, also termed neuronal protein 4.1 (4.1N), belongs to the skeletal protein 4.1 family that is involved in cellular processes such as cell adhesion, migration and signaling. It is a cytoskeleton-associated protein that may serve as a tumor suppressor in solid tumors. It suppresses hypoxia-induced epithelial-mesenchymal transition in epithelial ovarian cancer (EOC) cells. The down-regulation of EPB41L1 expression is a critical step for non-small cell lung cancer (NSCLC) development. Moreover, EPB41L1 functions as a linker protein between inositol 1,4,5-trisphosphate receptor type1 (IP3R1) and actin filaments in neurons. EPB41L1 contains a FERM domain, a spectrin and actin binding (SAB) domain, and a C-terminal domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in erythrocyte membrane protein band 4.1-like protein 1 (EPB41L1) and similar proteins. EPB41L1, also termed neuronal protein 4.1 (4.1N), belongs to the skeletal protein 4.1 family that is involved in cellular processes such as cell adhesion, migration and signaling. It is a cytoskeleton-associated protein that may serve as a tumor suppressor in solid tumors. It suppresses hypoxia-induced epithelial-mesenchymal transition in epithelial ovarian cancer (EOC) cells. The down-regulation of EPB41L1 expression is a critical step for non-small cell lung cancer (NSCLC) development. Moreover, EPB41L1 functions as a linker protein between inositol 1,4,5-trisphosphate receptor type1 (IP3R1) and actin filaments in neurons. EPB41L1 contains a FERM domain, a spectrin and actin binding (SAB) domain, and a C-terminal domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17201); members share this curated model.
