identifier: CDD:cd21072
label: "extracytosolic/lumenal domain (ELD) found in transient receptor potential channel mucolipin 3 (TRPML3). TRPML3, also called mucolipin-3 (ML3), acts as Ca(2+)-permeable cation channel with inwardly rectifying activity. It mediates release of Ca(2+) from endosomes to the cytoplasm, contributes to endosomal acidification and is involved in the regulation of membrane trafficking and fusion in the endosomal pathway. The model corresponds to extracytosolic/lumenal domain (ELD), a linker located between the first two transmembrane segments (S1 and S2) of TRPML3. It forms a tight tetramer that is crucial for full-length TRPML3 assembly and localization."
definition: >-
  extracytosolic/lumenal domain (ELD) found in transient receptor potential channel mucolipin 3 (TRPML3). TRPML3, also called mucolipin-3 (ML3), acts as Ca(2+)-permeable cation channel with inwardly rectifying activity. It mediates release of Ca(2+) from endosomes to the cytoplasm, contributes to endosomal acidification and is involved in the regulation of membrane trafficking and fusion in the endosomal pathway. The model corresponds to extracytosolic/lumenal domain (ELD), a linker located between the first two transmembrane segments (S1 and S2) of TRPML3. It forms a tight tetramer that is crucial for full-length TRPML3 assembly and localization. — an NCBI CDD conserved domain (cd21072); members share this curated model.
