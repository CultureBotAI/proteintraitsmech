identifier: CDD:cd15631
label: "PHD finger found in PHD finger protein 23 (PHF23). PHF23, also termed PHD-containing protein JUNE-1, is a hypothetical protein with a plant homeodomain (PHD) finger. It is encoded by gene PHF23 that acts as a candidate fusion partner for the nucleoporin gene NUP98. The NUP98-PHF23 fusion results from a cryptic translocation t(11;17)(p15;p13) in acute myeloid leukemia (AML)."
definition: >-
  PHD finger found in PHD finger protein 23 (PHF23). PHF23, also termed PHD-containing protein JUNE-1, is a hypothetical protein with a plant homeodomain (PHD) finger. It is encoded by gene PHF23 that acts as a candidate fusion partner for the nucleoporin gene NUP98. The NUP98-PHF23 fusion results from a cryptic translocation t(11;17)(p15;p13) in acute myeloid leukemia (AML). — an NCBI CDD conserved domain (cd15631); members share this curated model.
