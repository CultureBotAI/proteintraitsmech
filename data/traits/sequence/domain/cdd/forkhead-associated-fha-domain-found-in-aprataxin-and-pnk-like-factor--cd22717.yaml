identifier: CDD:cd22717
label: "forkhead associated (FHA) domain found in aprataxin and PNK-like factor (APLF) and similar proteins. APLF, also called apurinic-apyrimidinic endonuclease APLF, PNK and APTX-like FHA domain-containing protein, or XRCC1-interacting protein 1 (XIP1), is a novel apurinic-apyrimidinic (AP) endonuclease and 3'-5' exonuclease with conserved zinc-finger-like motifs involved in single-strand and double-strand DNA break repair. It is recruited to sites of DNA damage through interaction with poly(ADP-ribose), a polymeric post-translational modification synthesized transiently at sites of chromosomal damage to accelerate DNA strand break repair reactions. It can introduce nicks at hydroxyuracil and other types of pyrimidine base damage. Together with PARP3, APLF promotes the retention of the LIG4-XRCC4 complex on chromatin and accelerate DNA ligation during non-homologous end-joining (NHEJ). APLF contains an FHA domain at its N-terminus. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in aprataxin and PNK-like factor (APLF) and similar proteins. APLF, also called apurinic-apyrimidinic endonuclease APLF, PNK and APTX-like FHA domain-containing protein, or XRCC1-interacting protein 1 (XIP1), is a novel apurinic-apyrimidinic (AP) endonuclease and 3'-5' exonuclease with conserved zinc-finger-like motifs involved in single-strand and double-strand DNA break repair. It is recruited to sites of DNA damage through interaction with poly(ADP-ribose), a polymeric post-translational modification synthesized transiently at sites of chromosomal damage to accelerate DNA strand break repair reactions. It can introduce nicks at hydroxyuracil and other types of pyrimidine base damage. Together with PARP3, APLF promotes the retention of the LIG4-XRCC4 complex on chromatin and accelerate DNA ligation during non-homologous end-joining (NHEJ). APLF contains an FHA domain at its N-terminus. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22717); members share this curated model.
