identifier: CDD:cd09934
label: "Src homology 2 (SH2) domain found in Tec-like proteins. The Tec protein tyrosine kinase is the founding member of a family that includes Btk, Itk, Bmx, and Txk. The members have a PH domain, a zinc-binding motif, a SH3 domain, a SH2 domain, and a protein kinase catalytic domain. Btk is involved in B-cell receptor signaling with mutations in Btk responsible for X-linked agammaglobulinemia (XLA) in humans and X-linked immunodeficiency (xid) in mice. Itk is involved in T-cell receptor signaling. Tec is expressed in both T and B cells, and is thought to function in activated and effector T lymphocytes to induce the expression of genes regulated by NFAT transcription factors. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in Tec-like proteins. The Tec protein tyrosine kinase is the founding member of a family that includes Btk, Itk, Bmx, and Txk. The members have a PH domain, a zinc-binding motif, a SH3 domain, a SH2 domain, and a protein kinase catalytic domain. Btk is involved in B-cell receptor signaling with mutations in Btk responsible for X-linked agammaglobulinemia (XLA) in humans and X-linked immunodeficiency (xid) in mice. Itk is involved in T-cell receptor signaling. Tec is expressed in both T and B cells, and is thought to function in activated and effector T lymphocytes to induce the expression of genes regulated by NFAT transcription factors. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd09934); members share this curated model.
