identifier: CDD:cd03809
label: "glycosyltransferases MtfB, WbpX, and similar proteins. This family is most closely related to the GT4 family of glycosyltransferases. MtfB (mannosyltransferase B) in E. coli has been shown to direct the growth of the O9-specific polysaccharide chain. It transfers two mannoses into the position 3 of the previously synthesized polysaccharide."
definition: >-
