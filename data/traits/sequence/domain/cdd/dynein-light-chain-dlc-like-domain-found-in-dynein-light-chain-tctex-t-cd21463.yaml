identifier: CDD:cd21463
label: "dynein light chain (DLC)-like domain found in dynein light chain Tctex-type 3 (DYNLT3) and similar proteins. Dynein light chain Tctex-type 3 (DYNLT3), also called rp3, or protein 91/23, or T-complex-associated testis-expressed 1-like, is a non-catalytic accessory component of the cytoplasmic dynein 1 complex that are thought to be involved in linking dynein to cargos and to adapter proteins that regulate dynein function. It has a potential role in chromosome congression in human mitosis and is required for chromosome alignment during mouse oocyte meiotic maturation. The DYNLT3 light chain directly links cytoplasmic dynein to a spindle checkpoint protein, Bub3. The model corresponds to the dynein light chain (DLC)-like domain of DYNLT3."
definition: >-
  dynein light chain (DLC)-like domain found in dynein light chain Tctex-type 3 (DYNLT3) and similar proteins. Dynein light chain Tctex-type 3 (DYNLT3), also called rp3, or protein 91/23, or T-complex-associated testis-expressed 1-like, is a non-catalytic accessory component of the cytoplasmic dynein 1 complex that are thought to be involved in linking dynein to cargos and to adapter proteins that regulate dynein function. It has a potential role in chromosome congression in human mitosis and is required for chromosome alignment during mouse oocyte meiotic maturation. The DYNLT3 light chain directly links cytoplasmic dynein to a spindle checkpoint protein, Bub3. The model corresponds to the dynein light chain (DLC)-like domain of DYNLT3. — an NCBI CDD conserved domain (cd21463); members share this curated model.
