identifier: CDD:cd17678
label: "RUN2 domain found in DENN domain-containing protein 5 (DENND5) and similar proteins. DENND5 has been characterized as Rab6-interacting protein which is composed of an N-terminal DENN (Differentially Expressed in Normal and Neoplastic cells) domain followed by two RUN (RPIP8 [RaP2-interacting protein 8], UNC-14, and NESCA [new molecule containing SH3 at the carboxyl terminus]) domains flanking a PLAT (Polycystin-1, Lipoxygenase, Alpha-Toxin) domain. It functions in membrane trafficking at a crossroads between the Golgi and the endosomal system. DENND5 has two isoforms, DENND5A and DENND5B. This model represents the second RUN domain of DENND5."
definition: >-
  RUN2 domain found in DENN domain-containing protein 5 (DENND5) and similar proteins. DENND5 has been characterized as Rab6-interacting protein which is composed of an N-terminal DENN (Differentially Expressed in Normal and Neoplastic cells) domain followed by two RUN (RPIP8 [RaP2-interacting protein 8], UNC-14, and NESCA [new molecule containing SH3 at the carboxyl terminus]) domains flanking a PLAT (Polycystin-1, Lipoxygenase, Alpha-Toxin) domain. It functions in membrane trafficking at a crossroads between the Golgi and the endosomal system. DENND5 has two isoforms, DENND5A and DENND5B. This model represents the second RUN domain of DENND5. — an NCBI CDD conserved domain (cd17678); members share this curated model.
