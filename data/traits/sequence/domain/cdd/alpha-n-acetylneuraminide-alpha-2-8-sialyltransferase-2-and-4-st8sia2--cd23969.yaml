identifier: CDD:cd23969
label: "alpha-N-acetylneuraminide alpha-2,8-sialyltransferase 2 and 4. ST8Sia2 and 4 are known to be polysialyltransferases, and they can synthesize polysialic acid on neural cell adhesion molecules (NCAMs). ST8Sia family members are alpha-N-acetylneuraminide alpha-2,8-sialyltransferases that catalyze an alpha-2,8-linkage between sialic acid and the terminal sialic acid residues of glycochains, by transfering sialic acid from CMP-Sia and they belong to the glycosyltransferase family 29 (GT29)."
definition: >-
  alpha-N-acetylneuraminide alpha-2,8-sialyltransferase 2 and 4. ST8Sia2 and 4 are known to be polysialyltransferases, and they can synthesize polysialic acid on neural cell adhesion molecules (NCAMs). ST8Sia family members are alpha-N-acetylneuraminide alpha-2,8-sialyltransferases that catalyze an alpha-2,8-linkage between sialic acid and the terminal sialic acid residues of glycochains, by transfering sialic acid from CMP-Sia and they belong to the glycosyltransferase family 29 (GT29). — an NCBI CDD conserved domain (cd23969); members share this curated model.
