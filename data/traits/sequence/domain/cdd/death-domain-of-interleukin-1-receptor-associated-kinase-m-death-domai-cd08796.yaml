identifier: CDD:cd08796
label: "Death domain of Interleukin 1 Receptor Associated Kinase-M. Death Domain (DD) of Interleukin-1 Receptor-Associated Kinase M (IRAK-M). IRAKs are essential components of innate immunity and inflammation in mammals and other vertebrates. They are involved in signal transduction pathways involving IL-1 and IL-18 receptors, Toll-like receptors(TLRs), nuclear factor-kappaB (NF-kB), and mitogen-activated protein kinases (MAPKs). IRAKs contain an N-terminal DD domain and a C-terminal kinase domain. IRAK-M, also called IRAK-3, is an inactive kinase present only in macrophages in an inducible manner. It is a negative regulator of TLR signaling and it contributes to the attenuation of NF-kB activation. DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes."
definition: >-
  Death domain of Interleukin 1 Receptor Associated Kinase-M. Death Domain (DD) of Interleukin-1 Receptor-Associated Kinase M (IRAK-M). IRAKs are essential components of innate immunity and inflammation in mammals and other vertebrates. They are involved in signal transduction pathways involving IL-1 and IL-18 receptors, Toll-like receptors(TLRs), nuclear factor-kappaB (NF-kB), and mitogen-activated protein kinases (MAPKs). IRAKs contain an N-terminal DD domain and a C-terminal kinase domain. IRAK-M, also called IRAK-3, is an inactive kinase present only in macrophages in an inducible manner. It is a negative regulator of TLR signaling and it contributes to the attenuation of NF-kB activation. DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes. — an NCBI CDD conserved domain (cd08796); members share this curated model.
