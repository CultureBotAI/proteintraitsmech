identifier: CDD:cd01728
label: "Like-Sm protein 1. The eukaryotic LSm proteins (LSm1-7) assemble into a hetero-heptameric ring around the 3'-terminus of the gamma-methyl triphosphate (gamma-m-P3) capped U6 snRNA. Accumulation of uridylated RNAs in an lsm1 mutant suggests an involvement of the LSm1-7 complex in recognition of the 3' uridylation tag and recruitment of the decapping machinery. LSm1-7, together with Pat1, are also called the decapping activator. Members of this family share a highly conserved Sm fold containing an N-terminal helix followed by a strongly bent five-stranded antiparallel beta-sheet."
definition: >-
  Like-Sm protein 1. The eukaryotic LSm proteins (LSm1-7) assemble into a hetero-heptameric ring around the 3'-terminus of the gamma-methyl triphosphate (gamma-m-P3) capped U6 snRNA. Accumulation of uridylated RNAs in an lsm1 mutant suggests an involvement of the LSm1-7 complex in recognition of the 3' uridylation tag and recruitment of the decapping machinery. LSm1-7, together with Pat1, are also called the decapping activator. Members of this family share a highly conserved Sm fold containing an N-terminal helix followed by a strongly bent five-stranded antiparallel beta-sheet. — an NCBI CDD conserved domain (cd01728); members share this curated model.
