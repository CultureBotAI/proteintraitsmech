identifier: CDD:cd11051
label: "cytochrome P450 family 59 and similar cytochrome P450s. This family is composed of Aspergillus nidulans cytochrome P450 59 (CYP59), also called sterigmatocystin biosynthesis P450 monooxygenase stcS, and similar fungal proteins. CYP59 is required for the conversion of versicolorin A to sterigmatocystin. This family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
