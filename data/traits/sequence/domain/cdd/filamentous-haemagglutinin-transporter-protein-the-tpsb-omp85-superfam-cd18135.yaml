identifier: CDD:cd18135
label: "Filamentous haemagglutinin transporter protein. The TpsB/Omp85 superfamily of protein transporters, also called polypeptide-transporting beta barrel proteins includes transporters located in the outer membranes of Gram-negative bacteria and of organelles of endosymbiotic origin such as BamA (formerly YaeT) in Escherichia coli, Toc75 and Oep80 in chloroplasts, and Sam50 in mitochondria. FhaC, of the whooping cough agent Bordetella pertussis, is a member of the TpsB/Omp85 superfamily. TpsB transporters mediate the secretion across the outer membrane of their TpsA exoprotein partners, which serve as adhesins, cytolysins, invasins, proteases, etc., to the bacterial cell surface or in the extracellular environment. Monomeric FhaC is composed of a beta-barrel preceded by two periplasmic polypeptide-transport-associated (POTRA) domains in tandem. Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane.  They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances.  Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface."
definition: >-
  Filamentous haemagglutinin transporter protein. The TpsB/Omp85 superfamily of protein transporters, also called polypeptide-transporting beta barrel proteins includes transporters located in the outer membranes of Gram-negative bacteria and of organelles of endosymbiotic origin such as BamA (formerly YaeT) in Escherichia coli, Toc75 and Oep80 in chloroplasts, and Sam50 in mitochondria. FhaC, of the whooping cough agent Bordetella pertussis, is a member of the TpsB/Omp85 superfamily. TpsB transporters mediate the secretion across the outer membrane of their TpsA exoprotein partners, which serve as adhesins, cytolysins, invasins, proteases, etc., to the bacterial cell surface or in the extracellular environment. Monomeric FhaC is composed of a beta-barrel preceded by two periplasmic polypeptide-transport-associated (POTRA) domains in tandem. Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane. They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances. Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface. — an NCBI CDD conserved domain (cd18135); members share this curated model.
