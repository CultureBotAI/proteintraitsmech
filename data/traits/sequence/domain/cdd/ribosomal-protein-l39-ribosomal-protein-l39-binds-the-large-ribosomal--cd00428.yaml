identifier: CDD:cd00428
label: "Ribosomal protein L39. Ribosomal protein L39 binds the large ribosomal subunit in the region surrounding the distal end of the polypeptide exit tunnel. The ribosome is a large complex catalyst responsible for the synthesis of new proteins. Ribosomal features at the exit of the tunnel can play a role in the regulation of nascent chain exit and ion flux."
definition: >-
  Ribosomal protein L39. Ribosomal protein L39 binds the large ribosomal subunit in the region surrounding the distal end of the polypeptide exit tunnel. The ribosome is a large complex catalyst responsible for the synthesis of new proteins. Ribosomal features at the exit of the tunnel can play a role in the regulation of nascent chain exit and ion flux. — an NCBI CDD conserved domain (cd00428); members share this curated model.
