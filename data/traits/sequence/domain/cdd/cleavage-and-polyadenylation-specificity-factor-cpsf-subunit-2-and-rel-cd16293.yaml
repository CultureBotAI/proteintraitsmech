identifier: CDD:cd16293
label: "cleavage and polyadenylation specificity factor (CPSF) subunit 2 and related proteins; MBL-fold metallo-hydrolase domain. CPSF2, also known as cleavage and polyadenylation specificity factor 100 kDa subunit (CPSF-100), is a component of the CPSF complex, which plays a role in 3' end processing of pre-mRNAs during cleavage/polyadenylation, and during processing of metazoan histone pre-mRNAs. This subgroup includes Ydh1p, the yeast homolog of CPSF2. In addition to this MBL-fold metallo-hydrolase domain, members of this subgroup contain a beta-CASP (named for metallo-beta-lactamase, CPSF, Artemis, Snm1, Pso2) domain. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions."
definition: >-
