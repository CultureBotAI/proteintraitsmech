identifier: CDD:cd24075
label: "ATPase-like domain of N-acetylglucosamine repressor (NagC) and similar proteins. NagC acts as a repressor of the nagEBACD operon involved in the uptake and degradation of the amino sugars, N-acetyl-D-glucosamine (GlcNAc) and glucosamine (GlcN).  It acts both as an activator and a repressor for the transcription of the glmSU operon, encoding proteins necessary for the synthesis of GlcN (glmS) and the formation of UDP-GlcNAc (glmU). Members of this subfamily belong to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities."
definition: >-
  ATPase-like domain of N-acetylglucosamine repressor (NagC) and similar proteins. NagC acts as a repressor of the nagEBACD operon involved in the uptake and degradation of the amino sugars, N-acetyl-D-glucosamine (GlcNAc) and glucosamine (GlcN). It acts both as an activator and a repressor for the transcription of the glmSU operon, encoding proteins necessary for the synthesis of GlcN (glmS) and the formation of UDP-GlcNAc (glmU). Members of this subfamily belong to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities. — an NCBI CDD conserved domain (cd24075); members share this curated model.
