identifier: CDD:cd09556
label: "SAM domain of VTS1 RNA-binding proteins. SAM (sterile alpha motif) domain of VTS1 subfamily proteins is RNA binding domain located in the C-terminal region. SAM interacts with stem-loop structures of mRNA. Proteins of this subfamily participate in regulation of transcript stability and degradation, and also may be involved in vacuolar protein transport regulation. VTS1 protein of S.cerevisiae induces mRNA degradation via the major deadenylation-dependent mRNA decay pathway; VTS1 recruits CCR4/POP2/NOT deadenylase complex to target mRNA. The recruitment is the initial step resulting in poly(A) tail removal transcripts. Potentially SAM domain may be responsible not only for RNA binding but also for deadenylase binding."
definition: >-
  SAM domain of VTS1 RNA-binding proteins. SAM (sterile alpha motif) domain of VTS1 subfamily proteins is RNA binding domain located in the C-terminal region. SAM interacts with stem-loop structures of mRNA. Proteins of this subfamily participate in regulation of transcript stability and degradation, and also may be involved in vacuolar protein transport regulation. VTS1 protein of S.cerevisiae induces mRNA degradation via the major deadenylation-dependent mRNA decay pathway; VTS1 recruits CCR4/POP2/NOT deadenylase complex to target mRNA. The recruitment is the initial step resulting in poly(A) tail removal transcripts. Potentially SAM domain may be responsible not only for RNA binding but also for deadenylase binding. — an NCBI CDD conserved domain (cd09556); members share this curated model.
