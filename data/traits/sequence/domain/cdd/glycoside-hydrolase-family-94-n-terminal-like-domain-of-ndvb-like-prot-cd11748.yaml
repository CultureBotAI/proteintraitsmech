identifier: CDD:cd11748
label: "Glycoside hydrolase family 94 N-terminal-like domain of NdvB-like proteins. The glycoside hydrolase family 94 (previously known as glycosyltransferase family 36) includes cellobiose phosphorylase (EC:2.4.1.20), cellodextrin phosphorylase (EC:2.4.1.49), chitobiose phosphorylase (EC:2.4.1.-), amongst other members. Their N-terminal domain is involved in oligomerization and may play a role in catalysis, but it is separate from the catalytic domain [an (alpha/alpha)(6) barrel)]. The GH64N domain, as represented by this model, is found at the N-terminus of largely uncharacterized proteins, some members from Xanthomonas campestris and related organisms are annotated as NdvB (nodule development B) gene products, glycosyltransferases required for the synthesis of cyclic beta-(1,2)-glucans, which play a role in interactions between bacteria and plants."
definition: >-
  Glycoside hydrolase family 94 N-terminal-like domain of NdvB-like proteins. The glycoside hydrolase family 94 (previously known as glycosyltransferase family 36) includes cellobiose phosphorylase (EC:2.4.1.20), cellodextrin phosphorylase (EC:2.4.1.49), chitobiose phosphorylase (EC:2.4.1.-), amongst other members. Their N-terminal domain is involved in oligomerization and may play a role in catalysis, but it is separate from the catalytic domain [an (alpha/alpha)(6) barrel)]. The GH64N domain, as represented by this model, is found at the N-terminus of largely uncharacterized proteins, some members from Xanthomonas campestris and related organisms are annotated as NdvB (nodule development B) gene products, glycosyltransferases required for the synthesis of cyclic beta-(1,2)-glucans, which play a role in interactions between bacteria and plants. — an NCBI CDD conserved domain (cd11748); members share this curated model.
