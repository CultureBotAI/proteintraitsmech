identifier: CDD:cd14113
label: "C-terminal kinase domain of the Large Serine/Threonine Kinase and Rho Guanine Nucleotide Exchange Factor, Triple functional domain protein. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. Triple functional domain protein (Trio), also called PTPRF-interacting protein, is a large multidomain protein containing a series of spectrin-like repeats, two each of RhoGEF and SH3 domains, an immunoglobulin-like (Ig) domain and a C-terminal kinase. Trio plays important roles in neuronal cell migration and axon guidance. It was originally identified as an interacting partner of the of the receptor-like tyrosine phosphatase (RPTP) LAR (leukocyte-antigen-related protein), a family of receptors that function in the signaling to the actin cytoskeleton during development. Trio functions as a GEF for Rac1, RhoG, and RhoA, and is involved in the regulation of lamellipodia formation, mediating Rac1-dependent cell spreading and migration. The Trio subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  C-terminal kinase domain of the Large Serine/Threonine Kinase and Rho Guanine Nucleotide Exchange Factor, Triple functional domain protein. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. Triple functional domain protein (Trio), also called PTPRF-interacting protein, is a large multidomain protein containing a series of spectrin-like repeats, two each of RhoGEF and SH3 domains, an immunoglobulin-like (Ig) domain and a C-terminal kinase. Trio plays important roles in neuronal cell migration and axon guidance. It was originally identified as an interacting partner of the of the receptor-like tyrosine phosphatase (RPTP) LAR (leukocyte-antigen-related protein), a family of receptors that function in the signaling to the actin cytoskeleton during development. Trio functions as a GEF for Rac1, RhoG, and RhoA, and is involved in the regulation of lamellipodia formation, mediating Rac1-dependent cell spreading and migration. The Trio subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14113); members share this curated model.
