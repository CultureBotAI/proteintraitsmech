identifier: CDD:cd22600
label: "second Kunitz domain of Rhipicephalus microplus boophilin and similar proteins. This group includes venom serine protease inhibitors such as Rhipicephalus microplus and Ixodes scapularis boofilin, among others. Boophilin prevents blood clot formation to allow successful feeding and digestion through its inhibition activity of thrombin and other host anticoagulating factors like kallikrein, coagulation factor VII, or plasmin; it interacts with the host thrombin and trypsin. The structures of these domains are similar to those of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. Rhipicephalus microplus boophilin contains two Kunitz domains; this model represents the second repeat."
definition: >-
  second Kunitz domain of Rhipicephalus microplus boophilin and similar proteins. This group includes venom serine protease inhibitors such as Rhipicephalus microplus and Ixodes scapularis boofilin, among others. Boophilin prevents blood clot formation to allow successful feeding and digestion through its inhibition activity of thrombin and other host anticoagulating factors like kallikrein, coagulation factor VII, or plasmin; it interacts with the host thrombin and trypsin. The structures of these domains are similar to those of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. Rhipicephalus microplus boophilin contains two Kunitz domains; this model represents the second repeat. — an NCBI CDD conserved domain (cd22600); members share this curated model.
