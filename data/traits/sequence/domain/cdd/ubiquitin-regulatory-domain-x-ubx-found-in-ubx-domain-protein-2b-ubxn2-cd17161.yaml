identifier: CDD:cd17161
label: "Ubiquitin regulatory domain X (UBX) found in UBX domain protein 2B (UBXN2B) and similar proteins. UBXN2B, also termed NSFL1 cofactor p37, or p97 cofactor p37, belongs to the UBXD family of proteins that contains the ubiquitin regulatory domain X (UBX) with a beta-grasp ubiquitin-like fold, but without the C-terminal double glycine motif. UBX domain is typically located at the carboxyl terminus of proteins, and participates broadly in the regulation of protein degradation. UBXN2B is an adaptor protein of p97 (also known as VCP or Cdc48), which is a homohexameric AAA ATPase (ATPase associated with a variety of activities) involved in a variety of functions ranging from cell-cycle regulation to membrane fusion and protein degradation. UBXN2B forms a tight complex with p97 in the cytosol and localizes to the Golgi and endoplasmic reticulum (ER)."
definition: >-
  Ubiquitin regulatory domain X (UBX) found in UBX domain protein 2B (UBXN2B) and similar proteins. UBXN2B, also termed NSFL1 cofactor p37, or p97 cofactor p37, belongs to the UBXD family of proteins that contains the ubiquitin regulatory domain X (UBX) with a beta-grasp ubiquitin-like fold, but without the C-terminal double glycine motif. UBX domain is typically located at the carboxyl terminus of proteins, and participates broadly in the regulation of protein degradation. UBXN2B is an adaptor protein of p97 (also known as VCP or Cdc48), which is a homohexameric AAA ATPase (ATPase associated with a variety of activities) involved in a variety of functions ranging from cell-cycle regulation to membrane fusion and protein degradation. UBXN2B forms a tight complex with p97 in the cytosol and localizes to the Golgi and endoplasmic reticulum (ER). — an NCBI CDD conserved domain (cd17161); members share this curated model.
