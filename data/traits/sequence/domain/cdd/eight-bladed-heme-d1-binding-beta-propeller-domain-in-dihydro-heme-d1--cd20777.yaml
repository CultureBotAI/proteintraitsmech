identifier: CDD:cd20777
label: "eight-bladed heme d1-binding beta-propeller domain in dihydro-heme d1 dehydrogenase NirN. The monomeric dihydro-heme d1 dehydrogenase NirN is part of the denitrification process that enables biofilm formation of the opportunistic human pathogen Pseudomonas aeruginosa, making it more resilient to antibiotics and highly adaptable to different habitats. NirN, similar to the homodimeric cytochrome cd1 (nitrite reductase; NirS), consists of an eight-bladed heme d1-binding beta-propeller and a cytochrome c domain, but their relative orientation differs with respect to NirS.  His147, His323 and Tyr461, but not His417 are essential for activity.  All 8 blades of the propeller are included in this alignment."
definition: >-
  eight-bladed heme d1-binding beta-propeller domain in dihydro-heme d1 dehydrogenase NirN. The monomeric dihydro-heme d1 dehydrogenase NirN is part of the denitrification process that enables biofilm formation of the opportunistic human pathogen Pseudomonas aeruginosa, making it more resilient to antibiotics and highly adaptable to different habitats. NirN, similar to the homodimeric cytochrome cd1 (nitrite reductase; NirS), consists of an eight-bladed heme d1-binding beta-propeller and a cytochrome c domain, but their relative orientation differs with respect to NirS. His147, His323 and Tyr461, but not His417 are essential for activity. All 8 blades of the propeller are included in this alignment. — an NCBI CDD conserved domain (cd20777); members share this curated model.
