identifier: CDD:cd11924
label: "Second Src Homology 3 domain of Vinexin, also called Sorbin and SH3 domain containing 3 (Sorbs3). Vinexin is also called Sorbs3, SH3P3, and SH3-containing adapter molecule 1 (SCAM-1). It is an adaptor protein containing one sorbin homology (SoHo) and three SH3 domains. Vinexin was first identified as a vinculin binding protein; it is co-localized with vinculin at cell-ECM and cell-cell adhesion sites. There are several splice variants of vinexin: alpha, which contains the SoHo and three SH3 domains and displays tissue-specific expression; and beta, which contains only the three SH3 domains and is widely expressed. Vinexin alpha stimulates the accumulation of F-actin at focal contact sites. Vinexin also promotes keratinocyte migration and wound healing. The SH3 domains of vinexin have been reported to bind a number of ligands including vinculin, WAVE2, DLG5, Abl, and Cbl. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Second Src Homology 3 domain of Vinexin, also called Sorbin and SH3 domain containing 3 (Sorbs3). Vinexin is also called Sorbs3, SH3P3, and SH3-containing adapter molecule 1 (SCAM-1). It is an adaptor protein containing one sorbin homology (SoHo) and three SH3 domains. Vinexin was first identified as a vinculin binding protein; it is co-localized with vinculin at cell-ECM and cell-cell adhesion sites. There are several splice variants of vinexin: alpha, which contains the SoHo and three SH3 domains and displays tissue-specific expression; and beta, which contains only the three SH3 domains and is widely expressed. Vinexin alpha stimulates the accumulation of F-actin at focal contact sites. Vinexin also promotes keratinocyte migration and wound healing. The SH3 domains of vinexin have been reported to bind a number of ligands including vinculin, WAVE2, DLG5, Abl, and Cbl. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11924); members share this curated model.
