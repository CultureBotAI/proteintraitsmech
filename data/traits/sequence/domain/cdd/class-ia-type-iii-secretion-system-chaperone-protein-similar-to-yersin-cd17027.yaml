identifier: CDD:cd17027
label: "Class IA type III secretion system chaperone protein, similar to Yersinia pestis YscB. This family includes type III secretion system (T3SS) chaperone proteins similar to Yersinia pestis YscB and its homologs, Aeromonas hydrophila AscB and Photorhabdus luminescens LscB. In Yersinia pestis, which causes the deadly bubonic plague, the T3SS allows injection of effector proteins, termed Yersinia outer proteins (Yops) into macrophages and other immune cells, forming pores in the host cell membrane. The secretion of Yops is regulated by the activity of the YopN/SycN/YscB/TyeA complex. YscB acts, along with SycN, as a chaperone for YopN, a key part of a complex that regulates type III secretion so that it responds to contact with the eukaryotic target cell."
definition: >-
