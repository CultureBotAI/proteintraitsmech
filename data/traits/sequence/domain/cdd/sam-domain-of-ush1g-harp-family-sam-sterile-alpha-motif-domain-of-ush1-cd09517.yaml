identifier: CDD:cd09517
label: "SAM domain of USH1G_HARP family. SAM (sterile alpha motif) domain of USH1G/HARP (Usher syndrome type-1G/ Harmonin-interacting Ankyrin Repeat-containing protein) family is a protein-protein interaction domain. Members of this family have an N-terminal ankyrin repeat region and a C-terminal SAM domain. In mammals these proteins can interact via the SAM domain with the PDZ domain of harmonin to form a scaffolding complex that facilitates signal transduction in epithelial and inner ear sensory cells. It was suggested that USH1G and HARP can be tissue specific partners of harmonin. Mutations in ush1g genes lead to Usher syndrome type 1G. This syndrome is the cause of deaf-blindness in humans."
definition: >-
  SAM domain of USH1G_HARP family. SAM (sterile alpha motif) domain of USH1G/HARP (Usher syndrome type-1G/ Harmonin-interacting Ankyrin Repeat-containing protein) family is a protein-protein interaction domain. Members of this family have an N-terminal ankyrin repeat region and a C-terminal SAM domain. In mammals these proteins can interact via the SAM domain with the PDZ domain of harmonin to form a scaffolding complex that facilitates signal transduction in epithelial and inner ear sensory cells. It was suggested that USH1G and HARP can be tissue specific partners of harmonin. Mutations in ush1g genes lead to Usher syndrome type 1G. This syndrome is the cause of deaf-blindness in humans. — an NCBI CDD conserved domain (cd09517); members share this curated model.
