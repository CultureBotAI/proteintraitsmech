identifier: CDD:cd05845
label: "Second immunoglobulin (Ig)-like domain of the L1 cell adhesion molecule (CAM), and similar domains; member of the I-set of Ig superfamily (IgSF) domains. The members here are composed of the second immunoglobulin (Ig)-like domain of the L1 cell adhesion molecule (CAM) and similar proteins. L1 belongs to the L1 subfamily of cell adhesion molecules (CAMs) and is comprised of an extracellular region having six Ig-like domains, five fibronectin type III domains, a transmembrane region, and an intracellular domain. L1 is primarily expressed in the nervous system and is involved in its development and function. L1 is associated with an X-linked recessive disorder, X-linked hydrocephalus, MASA syndrome, or spastic paraplegia type 1 that involves abnormalities of axonal growth. This group belongs to the I-set of IgSF domains, having A-B-E-D strands in one beta-sheet and A'-G-F-C-C' in the other. Like the V-set Ig domains, members of the I-set have a discontinuous A strand, but lack a C\" strand."
definition: >-
  Second immunoglobulin (Ig)-like domain of the L1 cell adhesion molecule (CAM), and similar domains; member of the I-set of Ig superfamily (IgSF) domains. The members here are composed of the second immunoglobulin (Ig)-like domain of the L1 cell adhesion molecule (CAM) and similar proteins. L1 belongs to the L1 subfamily of cell adhesion molecules (CAMs) and is comprised of an extracellular region having six Ig-like domains, five fibronectin type III domains, a transmembrane region, and an intracellular domain. L1 is primarily expressed in the nervous system and is involved in its development and function. L1 is associated with an X-linked recessive disorder, X-linked hydrocephalus, MASA syndrome, or spastic paraplegia type 1 that involves abnormalities of axonal growth. This group belongs to the I-set of IgSF domains, having A-B-E-D strands in one beta-sheet and A'-G-F-C-C' in the other. Like the V-set Ig domains, members of the I-set have a discontinuous A strand, but lack a C" strand. — an NCBI CDD conserved domain (cd05845); members share this curated model.
