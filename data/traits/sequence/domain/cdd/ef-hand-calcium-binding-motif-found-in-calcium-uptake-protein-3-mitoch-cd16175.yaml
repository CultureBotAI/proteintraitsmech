identifier: CDD:cd16175
label: "EF-hand, calcium binding motif, found in calcium uptake protein 3, mitochondrial (MICU3) and similar proteins. MICU3, also termed EF-hand domain-containing family member A2 (EFHA2), is a paralog of MICU1 and notably found in the central nervous system (CNS) and skeletal muscle. At present, the precise molecular function of MICU3 remains unclear. It likely has a role in mitochondrial calcium handling. MICU3 contains an N-terminal mitochondrial targeting sequence (MTS) as well as two evolutionarily conserved canonical Ca2+-binding EF-hands separated by a long stretch of residues predicted to form alpha-helices."
definition: >-
  EF-hand, calcium binding motif, found in calcium uptake protein 3, mitochondrial (MICU3) and similar proteins. MICU3, also termed EF-hand domain-containing family member A2 (EFHA2), is a paralog of MICU1 and notably found in the central nervous system (CNS) and skeletal muscle. At present, the precise molecular function of MICU3 remains unclear. It likely has a role in mitochondrial calcium handling. MICU3 contains an N-terminal mitochondrial targeting sequence (MTS) as well as two evolutionarily conserved canonical Ca2+-binding EF-hands separated by a long stretch of residues predicted to form alpha-helices. — an NCBI CDD conserved domain (cd16175); members share this curated model.
