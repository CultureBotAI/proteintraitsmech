identifier: CDD:cd18953
label: bHLH_TS_bHLHe23_bHLHb4
definition: >-
  basic helix-loop-helix (bHLH) domain found in Class E basic helix-loop-helix protein 23 (bHLHe23) and similar proteins. bHLHe23, also termed Class B basic helix-loop-helix protein 4 (bHLHb4), is an OLIG-related bHLH transcription factor that is expressed in rod bipolar cells and is required for rod bipolar cell maturation. bHLHe23 have roles in spinal interneuron differentiation by mechanisms linked to the Notch signaling pathway. It modulates the expression of genes required for the differentiation and/or maintenance of pancreatic and neuronal cell types
