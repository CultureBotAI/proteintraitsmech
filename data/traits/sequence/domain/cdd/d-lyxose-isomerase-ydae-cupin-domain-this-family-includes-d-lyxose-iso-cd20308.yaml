identifier: CDD:cd20308
label: "D-lyxose isomerase YdaE, cupin domain. This family includes D-lyxose isomerase (D-LI; EC 5.3.1.15) homologous to YdaE from the sigma B regulon of Bacillus subtilis, a protein with an active site that is highly similar to the E. coli O157 z5688 D-lyxose isomerase. YdaE may have a synergistic role with ydaD, an NAD(P)-dependent alcohol dehydrogenase, in the adaptation to environment stresses; YdaD may be active against the ketose sugar produced by YdaE and function in providing resistance to oxidative stress through the production of reducing equivalents in the form of NAD(P)H. YdaE forms a cupin-type beta-barrel, with two alpha helices at the N-terminus. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold."
definition: >-
  D-lyxose isomerase YdaE, cupin domain. This family includes D-lyxose isomerase (D-LI; EC 5.3.1.15) homologous to YdaE from the sigma B regulon of Bacillus subtilis, a protein with an active site that is highly similar to the E. coli O157 z5688 D-lyxose isomerase. YdaE may have a synergistic role with ydaD, an NAD(P)-dependent alcohol dehydrogenase, in the adaptation to environment stresses; YdaD may be active against the ketose sugar produced by YdaE and function in providing resistance to oxidative stress through the production of reducing equivalents in the form of NAD(P)H. YdaE forms a cupin-type beta-barrel, with two alpha helices at the N-terminus. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold. — an NCBI CDD conserved domain (cd20308); members share this curated model.
