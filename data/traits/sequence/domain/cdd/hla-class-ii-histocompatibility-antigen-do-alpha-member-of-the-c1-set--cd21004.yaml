identifier: CDD:cd21004
label: "HLA class II histocompatibility antigen DO alpha; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the nonclassical MHC class II (MHCII) protein, HLA-DO, which binds HLA-DM and influences the repertoire of peptides presented by MHCII proteins.  In complex with HLA-DM, HLA-DO adopts a classical MHCII structure, with alterations near the a subunit's 310 helix. HLA-DO binds to HLA-DM at the same sites implicated in MHCII interaction, and kinetic analysis showed that HLA-DO acts as a competitive inhibitor by acting as a substrate mimic.  Though more remains to be elucidated about the function of HLA-DO, its unique distribution in the mammalian body namely, the exclusive expression of HLA-DO in B cells, thymic medullary epithelial cells, and dendritic cells indicate that it may be of physiological importance and has inspired further research.  Class I MHC proteins bind antigenic peptide fragments and present them to CD8+ T lymphocytes. Class I molecules consist of a transmembrane alpha chain and a small chain called the beta-2-microglobulin. The alpha chain contains three extracellular domains, two of which fold together to form the peptide-binding cleft (alpha1 and alpha2), and one which has an Ig fold (alpha3).  Peptide binding to class I molecules occurs in the endoplasmic reticulum (ER) and involves both chaperones and dedicated factors to assist in peptide loading.  Class I MHC molecules are expressed on most nucleated cells."
definition: >-
  HLA class II histocompatibility antigen DO alpha; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the nonclassical MHC class II (MHCII) protein, HLA-DO, which binds HLA-DM and influences the repertoire of peptides presented by MHCII proteins. In complex with HLA-DM, HLA-DO adopts a classical MHCII structure, with alterations near the a subunit's 310 helix. HLA-DO binds to HLA-DM at the same sites implicated in MHCII interaction, and kinetic analysis showed that HLA-DO acts as a competitive inhibitor by acting as a substrate mimic. Though more remains to be elucidated about the function of HLA-DO, its unique distribution in the mammalian body namely, the exclusive expression of HLA-DO in B cells, thymic medullary epithelial cells, and dendritic cells indicate that it may be of physiological importance and has inspired further research. Class I MHC proteins bind antigenic peptide fragments and present them to CD8+ T lymphocytes. Class I molecules consist of a transmembrane alpha chain and a small chain called the beta-2-microglobulin. The alpha chain contains three extracellular domains, two of which fold together to form the peptide-binding cleft (alpha1 and alpha2), and one which has an Ig fold (alpha3). Peptide binding to class I molecules occurs in the endoplasmic reticulum (ER) and involves both chaperones and dedicated factors to assist in peptide loading. Class I MHC molecules are expressed on most nucleated cells. — an NCBI CDD conserved domain (cd21004); members share this curated model.
