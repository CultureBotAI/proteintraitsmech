identifier: CDD:cd09401
label: "The  LIM domains of thymus LIM protein (TLP). The LIM domain of thymus LIM protein (TLP) like proteins:  This family includes the LIM domains of TLP and CRIP (Cysteine-Rich Intestinal Protein). TLP is the distant member of the CRP family of proteins. TLP has two isomers (TLP-A and TLP-B) and sharing approximately 30% with each of the three other CRPs.  Like CRP1, CRP2 and CRP3/MLP, TLP has two LIM domains, connected by a flexible linker region. Unlike the CRPs, TLP lacks the nuclear targeting signal (K/R-K/R-Y-G-P-K) and is localized solely in the cytoplasm. TLP is specifically expressed in the thymus in a subset of cortical epithelial cells.  TLP has a role in development of normal thymus and in controlling the development and differentiation of thymic epithelial cells. CRIP is a short LIM protein with only one LIM domain. CRIP gene is developmentally regulated and can be induced by glucocorticoid hormones during the first three postnatal weeks. The domain shows close sequence homology to LIM domain of thymus LIM protein. However, unlike the TLP proteins which have two LIM domains, the members of this family have only one LIM domain. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes."
definition: >-
  The LIM domains of thymus LIM protein (TLP). The LIM domain of thymus LIM protein (TLP) like proteins: This family includes the LIM domains of TLP and CRIP (Cysteine-Rich Intestinal Protein). TLP is the distant member of the CRP family of proteins. TLP has two isomers (TLP-A and TLP-B) and sharing approximately 30% with each of the three other CRPs. Like CRP1, CRP2 and CRP3/MLP, TLP has two LIM domains, connected by a flexible linker region. Unlike the CRPs, TLP lacks the nuclear targeting signal (K/R-K/R-Y-G-P-K) and is localized solely in the cytoplasm. TLP is specifically expressed in the thymus in a subset of cortical epithelial cells. TLP has a role in development of normal thymus and in controlling the development and differentiation of thymic epithelial cells. CRIP is a short LIM protein with only one LIM domain. CRIP gene is developmentally regulated and can be induced by glucocorticoid hormones during the first three postnatal weeks. The domain shows close sequence homology to LIM domain of thymus LIM protein. However, unlike the TLP proteins which have two LIM domains, the members of this family have only one LIM domain. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes. — an NCBI CDD conserved domain (cd09401); members share this curated model.
