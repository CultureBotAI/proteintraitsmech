identifier: CDD:cd17730
label: "fourth BRCT domain of PAX-interacting protein 1 (PAXIP1) and similar proteins. PAXIP1, also termed PAX transactivation activation domain-interacting protein (PTIP), is involved in DNA damage response and in transcriptional regulation through histone methyltransferase (HMT) complexes. It also facilitates ATM-mediated activation of p53 and promotes cellular resistance to ionizing radiation. PAXIP1 contains six BRCT repeats. This family corresponds to the fourth BRCT domain."
definition: >-
  fourth BRCT domain of PAX-interacting protein 1 (PAXIP1) and similar proteins. PAXIP1, also termed PAX transactivation activation domain-interacting protein (PTIP), is involved in DNA damage response and in transcriptional regulation through histone methyltransferase (HMT) complexes. It also facilitates ATM-mediated activation of p53 and promotes cellular resistance to ionizing radiation. PAXIP1 contains six BRCT repeats. This family corresponds to the fourth BRCT domain. — an NCBI CDD conserved domain (cd17730); members share this curated model.
