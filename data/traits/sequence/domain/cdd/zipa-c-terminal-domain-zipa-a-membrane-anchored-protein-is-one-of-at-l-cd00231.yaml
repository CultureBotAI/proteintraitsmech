identifier: CDD:cd00231
label: "ZipA C-terminal domain. ZipA, a membrane-anchored protein, is one of at least nine essential gene products necessary for assembly of the septal ring which mediates cell division in E.coli. ZipA and FtsA directly bind FtsZ, a homolog of eukaryotic tubulins, at the prospective division site, followed by the sequential addition of FtsK, FtsQ, FtsL, FtsW, FtsI, and FtsN.  ZipA contains three domains: a short N-terminal membrane-anchored domain, a central P/Q domain that is rich in proline and glutamine and a C-terminal domain, which comprises almost half the protein."
definition: >-
  ZipA C-terminal domain. ZipA, a membrane-anchored protein, is one of at least nine essential gene products necessary for assembly of the septal ring which mediates cell division in E.coli. ZipA and FtsA directly bind FtsZ, a homolog of eukaryotic tubulins, at the prospective division site, followed by the sequential addition of FtsK, FtsQ, FtsL, FtsW, FtsI, and FtsN. ZipA contains three domains: a short N-terminal membrane-anchored domain, a central P/Q domain that is rich in proline and glutamine and a C-terminal domain, which comprises almost half the protein. — an NCBI CDD conserved domain (cd00231); members share this curated model.
