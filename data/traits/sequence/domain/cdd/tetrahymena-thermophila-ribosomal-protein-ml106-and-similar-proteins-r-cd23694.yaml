identifier: CDD:cd23694
label: "Tetrahymena thermophila ribosomal protein mL106 and similar proteins. Ribosomal protein mL106 is a helical repeat protein binding large subunit (LSU) 3'-ES1. It acts as a component of LSU in the Tetrahymena thermophila mitoribosome, which reveals an assembly of 94-ribosomal proteins and four-rRNAs with an additional protein mass of ~700 kDa on the small subunit, while the large subunit lacks 5S rRNA."
definition: >-
  Tetrahymena thermophila ribosomal protein mL106 and similar proteins. Ribosomal protein mL106 is a helical repeat protein binding large subunit (LSU) 3'-ES1. It acts as a component of LSU in the Tetrahymena thermophila mitoribosome, which reveals an assembly of 94-ribosomal proteins and four-rRNAs with an additional protein mass of ~700 kDa on the small subunit, while the large subunit lacks 5S rRNA. — an NCBI CDD conserved domain (cd23694); members share this curated model.
