identifier: CDD:cd20620
label: "cytochrome P450 family 132 and similar cytochrome P450s. This subfamily is composed of Mycobacterium tuberculosis cytochrome P450 132 (CYP132) and similar proteins. The function of CYP132 is as yet unknown. CYP132 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
