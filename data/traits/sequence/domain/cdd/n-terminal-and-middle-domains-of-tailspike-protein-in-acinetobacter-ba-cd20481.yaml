identifier: CDD:cd20481
label: "N-terminal and middle domains of tailspike protein in Acinetobacter bacteriophages. This model describes the middle beta-helical domain of Acinetobacter bacteriophage tailspike proteins, as well as a separate N-terminal domain that does not appear to be part of the beta-helical substructure. The N-terminal domain may be involved in virion binding, and the molecules form a homo-trimeric arrangement. A C-terminal domain that may be involved in receptor binding is omitted from the model."
definition: >-
  N-terminal and middle domains of tailspike protein in Acinetobacter bacteriophages. This model describes the middle beta-helical domain of Acinetobacter bacteriophage tailspike proteins, as well as a separate N-terminal domain that does not appear to be part of the beta-helical substructure. The N-terminal domain may be involved in virion binding, and the molecules form a homo-trimeric arrangement. A C-terminal domain that may be involved in receptor binding is omitted from the model. — an NCBI CDD conserved domain (cd20481); members share this curated model.
