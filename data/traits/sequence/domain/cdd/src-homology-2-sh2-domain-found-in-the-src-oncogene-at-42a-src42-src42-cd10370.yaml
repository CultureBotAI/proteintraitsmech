identifier: CDD:cd10370
label: "Src homology 2 (SH2) domain found in the Src oncogene at 42A (Src42). Src42 is a member of the Src non-receptor type tyrosine kinase family of proteins. The integration of receptor tyrosine kinase-induced RAS and Src42 signals by Connector eNhancer of KSR (CNK) as a two-component input is essential for RAF activation in Drosophila. Src42 is present in a wide variety of organisms including: California sea hare, pea aphid, yellow fever mosquito, honey bee, Panamanian leafcutter ant, and sea urchin. Src42 has a unique N-terminal domain, an SH3 domain, an SH2 domain, a kinase domain and a regulatory tail, as do the other members of the family. Like the other members of the Src family the SH2 domain in addition to binding the target, also plays an autoinhibitory role by binding to its C-terminal tail.  In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in the Src oncogene at 42A (Src42). Src42 is a member of the Src non-receptor type tyrosine kinase family of proteins. The integration of receptor tyrosine kinase-induced RAS and Src42 signals by Connector eNhancer of KSR (CNK) as a two-component input is essential for RAF activation in Drosophila. Src42 is present in a wide variety of organisms including: California sea hare, pea aphid, yellow fever mosquito, honey bee, Panamanian leafcutter ant, and sea urchin. Src42 has a unique N-terminal domain, an SH3 domain, an SH2 domain, a kinase domain and a regulatory tail, as do the other members of the family. Like the other members of the Src family the SH2 domain in addition to binding the target, also plays an autoinhibitory role by binding to its C-terminal tail. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10370); members share this curated model.
