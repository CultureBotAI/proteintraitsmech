identifier: CDD:cd23712
label: mL63
definition: >-
  Trypanosoma brucei ribosomal protein mL63, and similar proteins. Ribosomal protein mL63 is a component of mitoribosomal large subunit (mtLSU) in Trypanosoma brucei mitochondrial ribosome (mitoribosome), which is composed of 127 mitoribosomal proteins and contains very small rRNAs. The family also includes Leishmania major ribosomal protein mL63
