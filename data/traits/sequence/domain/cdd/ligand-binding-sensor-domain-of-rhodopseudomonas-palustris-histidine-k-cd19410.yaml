identifier: CDD:cd19410
label: "ligand binding sensor domain of Rhodopseudomonas palustris histidine kinase HK9 and similar proteins. The ligand binding sensor domain of Rhodopseudomonas palustris histidine kinase HK9 and similar proteins forms a homodimer and binds to an as yet uncharacterized ligand, most likely via the dimerization interface, a feature that appears to be conserved in this domain superfamily. This domain is similar to the extracellular sensory domain CHASE3, specifically found in histidine kinases, adenylate cyclases, methyl-accepting chemotaxis proteins and predicted diguanylate cyclases/phosphodiesterases. Environmental factors that are recognized by CHASE3 domains are not known at this time."
definition: >-
  ligand binding sensor domain of Rhodopseudomonas palustris histidine kinase HK9 and similar proteins. The ligand binding sensor domain of Rhodopseudomonas palustris histidine kinase HK9 and similar proteins forms a homodimer and binds to an as yet uncharacterized ligand, most likely via the dimerization interface, a feature that appears to be conserved in this domain superfamily. This domain is similar to the extracellular sensory domain CHASE3, specifically found in histidine kinases, adenylate cyclases, methyl-accepting chemotaxis proteins and predicted diguanylate cyclases/phosphodiesterases. Environmental factors that are recognized by CHASE3 domains are not known at this time. — an NCBI CDD conserved domain (cd19410); members share this curated model.
