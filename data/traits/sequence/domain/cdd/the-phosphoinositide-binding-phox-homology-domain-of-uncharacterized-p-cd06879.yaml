identifier: CDD:cd06879
label: "The phosphoinositide binding Phox Homology domain of uncharacterized plant proteins. The PX domain is a phosphoinositide (PI) binding module involved in targeting proteins to PI-enriched membranes. Members in this subfamily are uncharacterized fungal proteins containing a PX domain. PX domain harboring proteins have been implicated in highly diverse functions such as cell signaling, vesicular trafficking, protein sorting, lipid modification, cell polarity and division, activation of T and B cells, and cell survival. In addition to protein-lipid interaction, the PX domain may also be involved in protein-protein interaction."
definition: >-
  The phosphoinositide binding Phox Homology domain of uncharacterized plant proteins. The PX domain is a phosphoinositide (PI) binding module involved in targeting proteins to PI-enriched membranes. Members in this subfamily are uncharacterized fungal proteins containing a PX domain. PX domain harboring proteins have been implicated in highly diverse functions such as cell signaling, vesicular trafficking, protein sorting, lipid modification, cell polarity and division, activation of T and B cells, and cell survival. In addition to protein-lipid interaction, the PX domain may also be involved in protein-protein interaction. — an NCBI CDD conserved domain (cd06879); members share this curated model.
