identifier: CDD:cd18210
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 22 (ZBTB22). ZBTB22, also called protein BING1 or zinc finger protein 297, may be involved in transcriptional regulation. Its gene, together with BING 3-5, TAPASIN, DAXX, RGL2, and HKE2, form a dense cluster at the centromeric end of the major histocompatibility complex class I region. ZBTB22 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 22 (ZBTB22). ZBTB22, also called protein BING1 or zinc finger protein 297, may be involved in transcriptional regulation. Its gene, together with BING 3-5, TAPASIN, DAXX, RGL2, and HKE2, form a dense cluster at the centromeric end of the major histocompatibility complex class I region. ZBTB22 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18210); members share this curated model.
