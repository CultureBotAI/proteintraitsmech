identifier: CDD:cd01957
label: PKS_NRPS
definition: >-
  PKS_NRPS. FabD domain is essential for polyketide synthases (PKS) which closely related to fatty acid synthases (FAS). Both are multifunctional enzymes with the same ancestral enzymatic domain structure. Type I PKS are large modular enzyme systems which catalyse the biosynthesis of microcyclic polyketide products through an assembly line of active sites. Individual domains act upon the growing chain and transfer it to downstream domains. PKS_NPRS is functionally distinct group of bacterial PKS and incluides hybrid or mixed PKS and non-ribosomal peptide synthase (NPRS) systems which condense aminoacids onto polyketide extender unit
