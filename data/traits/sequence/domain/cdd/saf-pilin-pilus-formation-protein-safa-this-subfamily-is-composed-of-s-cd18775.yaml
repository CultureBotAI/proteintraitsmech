identifier: CDD:cd18775
label: "Saf-pilin pilus formation protein SafA. This subfamily is composed of Saf-pilin pilus formation protein SafA from Salmonella enterica and similar proteins. SafA is the major subunit of Saf pili, which are often found in clinical isolates of Salmonella and are assembled by the chaperone-usher secretion pathway. In addition to safA, the saf operon is also composed of safB (periplasmic chaperone), safC (outer membrane usher), and safD (minor subunit). SafA and SafD subunits are transported from the cytoplasm into the periplasm via the SEC machinery, and the periplasmic chaperone SafB donates its G1 strand to complete the correct folding of SafA or SafD. In Saf pili assembly, the N-terminal extension (NTE) of an incoming SafA replaces the G1 strand (in SafB) via a zip-in-zip-out mechanism (also called donor-strand complementation or exchange) to form the polymer of SafD-(SafA)n (n > 100)."
definition: >-
  Saf-pilin pilus formation protein SafA. This subfamily is composed of Saf-pilin pilus formation protein SafA from Salmonella enterica and similar proteins. SafA is the major subunit of Saf pili, which are often found in clinical isolates of Salmonella and are assembled by the chaperone-usher secretion pathway. In addition to safA, the saf operon is also composed of safB (periplasmic chaperone), safC (outer membrane usher), and safD (minor subunit). SafA and SafD subunits are transported from the cytoplasm into the periplasm via the SEC machinery, and the periplasmic chaperone SafB donates its G1 strand to complete the correct folding of SafA or SafD. In Saf pili assembly, the N-terminal extension (NTE) of an incoming SafA replaces the G1 strand (in SafB) via a zip-in-zip-out mechanism (also called donor-strand complementation or exchange) to form the polymer of SafD-(SafA)n (n > 100). — an NCBI CDD conserved domain (cd18775); members share this curated model.
