identifier: CDD:cd19126
label: "AKR5A and AKR5G families of aldo-keto reductase (AKR). The AKR5A family of AKR includes prostaglandin F2-alpha synthase (PGFS) from Leishmania major (AKR5A1) and Trypanosoma brucei (AKR5A2). PGFS, also called 9,11-endoperoxide prostaglandin H2 reductase, catalyzes the NADP-dependent formation of prostaglandin F2-alpha from prostaglandin H2. It has also aldo/ketoreductase activity for synthetic substrates 9,10-phenanthrenequinone and p-nitrobenzaldehyde. The AKR5G family of AKR includes Bacillus subtilis glyoxal reductase (GR), uncharacterized oxidoreductase YtbE, and Bacillus aryabhattai aldo-keto reductase, which corresponds to aldo-keto reductase family 5 member G1-3 (AKR5G1-3), respectively. GR (YvgN, EC 1.1.1.283), also called methylglyoxal reductase, reduces glyoxal and methylglyoxal (2-oxopropanal). It is not involved in vitamin B6 biosynthesis."
definition: >-
  AKR5A and AKR5G families of aldo-keto reductase (AKR). The AKR5A family of AKR includes prostaglandin F2-alpha synthase (PGFS) from Leishmania major (AKR5A1) and Trypanosoma brucei (AKR5A2). PGFS, also called 9,11-endoperoxide prostaglandin H2 reductase, catalyzes the NADP-dependent formation of prostaglandin F2-alpha from prostaglandin H2. It has also aldo/ketoreductase activity for synthetic substrates 9,10-phenanthrenequinone and p-nitrobenzaldehyde. The AKR5G family of AKR includes Bacillus subtilis glyoxal reductase (GR), uncharacterized oxidoreductase YtbE, and Bacillus aryabhattai aldo-keto reductase, which corresponds to aldo-keto reductase family 5 member G1-3 (AKR5G1-3), respectively. GR (YvgN, EC 1.1.1.283), also called methylglyoxal reductase, reduces glyoxal and methylglyoxal (2-oxopropanal). It is not involved in vitamin B6 biosynthesis. — an NCBI CDD conserved domain (cd19126); members share this curated model.
