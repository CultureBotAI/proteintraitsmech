identifier: CDD:cd06692
label: "PDZ1 domain of Gallus gallus uncharacterized syntaxin-binding protein 4 (STXBP4) isoform X1, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 1 of Gallus gallus uncharacterized syntaxin-binding protein 4 (STXBP4) isoform X1, and related domains. Gallus gallus STXBP4 isoform X1 contains 2 PDZ domains (PDZ1 and PDZ2). PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This STXBP4-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
