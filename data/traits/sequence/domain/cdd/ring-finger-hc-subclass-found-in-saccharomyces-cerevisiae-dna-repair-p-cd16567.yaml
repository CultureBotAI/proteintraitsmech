identifier: CDD:cd16567
label: "RING finger, HC subclass, found in Saccharomyces cerevisiae DNA repair protein RAD16, Schizosaccharomyces pombe rhp16, and similar proteins. Budding yeast RAD16, also known as ATP-dependent helicase RAD16, is encoded by a yeast excision repair gene homologous to the recombinational repair gene RAD54 and to the SNF2 gene involved in transcriptional activation. It is a component of the global genome repair (GGR) complex that promotes global genome nucleotide excision repair (GG-NER) by removing DNA damage from non-transcribing DNA. RAD16 is involved in differential repair of DNA after UV damage, and repairs preferentially the MAT-alpha locus compared with the HML-alpha locus. Fission yeast rhp16, also known as ATP-dependent helicase rhp16, is a RAD16 homolog. It is involved in GGR via nucleotide excision repair (NER), in conjunction with rhp7, after UV irradiation. Both RAD16 and rhp16 contain a C3HC4-type RING-HC finger, as well as a DEAD-like helicase domain and a helicase superfamily C-terminal domain."
definition: >-
  RING finger, HC subclass, found in Saccharomyces cerevisiae DNA repair protein RAD16, Schizosaccharomyces pombe rhp16, and similar proteins. Budding yeast RAD16, also known as ATP-dependent helicase RAD16, is encoded by a yeast excision repair gene homologous to the recombinational repair gene RAD54 and to the SNF2 gene involved in transcriptional activation. It is a component of the global genome repair (GGR) complex that promotes global genome nucleotide excision repair (GG-NER) by removing DNA damage from non-transcribing DNA. RAD16 is involved in differential repair of DNA after UV damage, and repairs preferentially the MAT-alpha locus compared with the HML-alpha locus. Fission yeast rhp16, also known as ATP-dependent helicase rhp16, is a RAD16 homolog. It is involved in GGR via nucleotide excision repair (NER), in conjunction with rhp7, after UV irradiation. Both RAD16 and rhp16 contain a C3HC4-type RING-HC finger, as well as a DEAD-like helicase domain and a helicase superfamily C-terminal domain. — an NCBI CDD conserved domain (cd16567); members share this curated model.
