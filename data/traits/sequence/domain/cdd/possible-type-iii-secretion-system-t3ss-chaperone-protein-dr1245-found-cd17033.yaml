identifier: CDD:cd17033
label: "possible type III secretion system (T3SS) chaperone protein DR1245 found in Deinococcus radiodurans. This family includes a possible type III secretion system (T3SS) chaperone protein DR1245 found in Deinococcus radiodurans, a bacterium that is exceptionally resistant to the lethal effects of ionizing radiation (IR), ultraviolet light and other DNA-damaging agents. DR1245, a protein of unknown function conserved only in the Deinococcaceae, and with strong structural homology to YbjN proteins and T3SS chaperones, may display some chaperone activity towards DdrB, a protein found to be highly up-regulated following irradiation; DR1245 may also bind to other substrates."
definition: >-
