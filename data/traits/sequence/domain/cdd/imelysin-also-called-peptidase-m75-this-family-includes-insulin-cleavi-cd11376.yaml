identifier: CDD:cd11376
label: "imelysin also called Peptidase M75. This family includes insulin-cleaving membrane protease (imelysin, ICMP), imelysin-like protein (IPPA from Psychrobacter arcticus), iron-regulated protein A (IrpA) and iron-transporter EfeO-like alginate-binding protein (Algp7). Imelysin is a membrane protein with the active site outside the cell envelope. It is also called the peptidase M75 since the HxxE sequence motif characteristic of the M14 peptidase is completely conserved. However, the overall structure and the GxHxxE motif region differ from the known HxxE metallopeptidases, suggesting that imelysin-like proteins may not be peptidases. Imelysin's cleavage of the oxidized insulin B chain shows a preference for aromatic hydrophobic amino acids at P1'. Imelysin was first identified in Pseudomonas aeruginosa and has also been shown to cleave fibrinogen. The tertiary structure shows a fold consisting of two domains, each consisting of a bundle of four helices that are similar to each other, implying an ancient gene duplication and fusion event. In addition to an imelysin-like domain, Algp7 typically contains an N-terminal cupredoxin (CUP) domain and has a deep cleft between the 4-helix bundles sufficiently large to accommodate macromolecules such as alginate polysaccharide."
definition: >-
  imelysin also called Peptidase M75. This family includes insulin-cleaving membrane protease (imelysin, ICMP), imelysin-like protein (IPPA from Psychrobacter arcticus), iron-regulated protein A (IrpA) and iron-transporter EfeO-like alginate-binding protein (Algp7). Imelysin is a membrane protein with the active site outside the cell envelope. It is also called the peptidase M75 since the HxxE sequence motif characteristic of the M14 peptidase is completely conserved. However, the overall structure and the GxHxxE motif region differ from the known HxxE metallopeptidases, suggesting that imelysin-like proteins may not be peptidases. Imelysin's cleavage of the oxidized insulin B chain shows a preference for aromatic hydrophobic amino acids at P1'. Imelysin was first identified in Pseudomonas aeruginosa and has also been shown to cleave fibrinogen. The tertiary structure shows a fold consisting of two domains, each consisting of a bundle of four helices that are similar to each other, implying an ancient gene duplication and fusion event. In addition to an imelysin-like domain, Algp7 typically contains an N-terminal cupredoxin (CUP) domain and has a deep cleft between the 4-helix bundles sufficiently large to accommodate macromolecules such as alginate polysaccharide. — an NCBI CDD conserved domain (cd11376); members share this curated model.
