identifier: CDD:cd21414
label: unc_rv_SF1_Hel-like
definition: >-
  uncharacterized domain which connects the Cys/His rich zinc-binding domain (ZBD) and linker to the first helicase domain of ronidovirus SF1 helicase and related proteins. Helicases catalyze NTP-dependent unwinding of nucleic acid duplexes into single strands and are classified based on the arrangement of conserved motifs into six superfamilies. Members of this family belong to helicase superfamily 1 (SF1) and include ronidovirus helicases such as Gill-associated virus (GAV) replication helicase encoded on ORF1b. They are related to the SF1 family nidoviral replication helicases which include Severe Acute Respiratory Syndrome coronavirus (SARS) non-structural protein 13 (SARS-Nsp13), a component of the viral RNA synthesis replication and transcription complex (RTC). SARS-Nsp13 is a multidomain protein; its other domains include an N-terminal Cys/His rich zinc-binding domain (CH/ZBD) and a SF1 helicase core. The location and orientation of the uncharacterized domain represented in this ronidovirus group resembles that of the 1B domain in SARS-Nsp13 helicase; it connects the Cys/His zinc-binding domain (ZBD) and linker to the first helicase domain
