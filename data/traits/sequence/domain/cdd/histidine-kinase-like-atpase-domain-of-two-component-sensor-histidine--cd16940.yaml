identifier: CDD:cd16940
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli BasS. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) similar to Escherichia coli BasS HK of the BasS-BasR two-component regulatory system (TCS). Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA); some contain a HAMP sensory domain, while some an N-terminal two-component sensor kinase domain."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli BasS. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) similar to Escherichia coli BasS HK of the BasS-BasR two-component regulatory system (TCS). Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA); some contain a HAMP sensory domain, while some an N-terminal two-component sensor kinase domain. — an NCBI CDD conserved domain (cd16940); members share this curated model.
