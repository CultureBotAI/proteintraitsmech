identifier: CDD:cd19444
label: "fatty acid-binding protein 1. Fatty acid-binding protein 1, FABP1 (also known as fatty acid-binding protein 1, liver FABP, L-FABP) occurs at high cytosolic concentration in liver, intestine, and, in the case of humans, also in kidney. FABP1 binds to two molecules of long-chain fatty acids; the two binding sites appear to be inter-dependent. FABP1 binds to fatty acyl-CoAs, peroxisome proliferators, prostaglandins, bile acids, bilirubin, heme, hydroxyl and hydroperoxyl metabolites of fatty acids, lysophosphatidic acids, selenium, and other hydrophobic ligands. FABP1 is down-regulated in about ten percent of hepatocellular carcinoma (HCC) as well as in colorectal cancer at the adenoma stage, but can also be over-expressed in various cancers. This subgroup belongs to the intracellular fatty acid-binding protein (FABP) family, members of which are small proteins that bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
