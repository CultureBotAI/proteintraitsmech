identifier: CDD:cd14612
label: "catalytic domain of tyrosine-protein phosphatase non-receptor type 7. Tyrosine-protein phosphatase non-receptor type 7 (PTPN7), also called hematopoietic protein-tyrosine phosphatase (HePTP) or LC-PTP. belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPN7/HePTP is a kinase interaction motif (KIM)-PTP, characterized by the presence of a 16-amino-acid KIM that binds specifically to members of the MAPK (mitogen-activated protein kinase) family. PTPN7/HePTP is found exclusively in the white blood cells in bone marrow, thymus, spleen, lymph nodes and all myeloid and lymphoid cell lines. It negatively regulates T-cell activation and proliferation, and is often dysregulated in the preleukemic disorder myelodysplastic syndrome, as well as in acute myelogenous leukemia."
