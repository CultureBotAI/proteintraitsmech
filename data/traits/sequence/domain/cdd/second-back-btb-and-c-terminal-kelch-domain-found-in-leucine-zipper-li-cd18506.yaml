identifier: CDD:cd18506
label: "second BACK (BTB and C-terminal Kelch) domain found in leucine-zipper-like transcriptional regulator 1 (LZTR-1). LZTR-1 is a Golgi BTB-kelch protein that is degraded upon induction of apoptosis. It may also function as a transcriptional regulator that plays a crucial role in embryogenesis. Germline loss-of-function mutations in LZTR-1 predispose to an inherited disorder of multiple schwannomas."
definition: >-
  second BACK (BTB and C-terminal Kelch) domain found in leucine-zipper-like transcriptional regulator 1 (LZTR-1). LZTR-1 is a Golgi BTB-kelch protein that is degraded upon induction of apoptosis. It may also function as a transcriptional regulator that plays a crucial role in embryogenesis. Germline loss-of-function mutations in LZTR-1 predispose to an inherited disorder of multiple schwannomas. — an NCBI CDD conserved domain (cd18506); members share this curated model.
