identifier: CDD:cd11458
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in c-Myc and similar proteins. c-Myc, also termed Myc proto-oncogene protein, or Class E basic helix-loop-helix protein 39 (bHLHe39), or transcription factor p64, a bHLHZip proto-oncogene protein that functions as a transcription factor, which binds DNA in a non-specific manner, yet also specifically recognizes the core sequence 5'-CAC[GA]TG-3'. It activates the transcription of growth-related genes."
definition: >-
  basic Helix-Loop-Helix-zipper (bHLHzip) domain found in c-Myc and similar proteins. c-Myc, also termed Myc proto-oncogene protein, or Class E basic helix-loop-helix protein 39 (bHLHe39), or transcription factor p64, a bHLHZip proto-oncogene protein that functions as a transcription factor, which binds DNA in a non-specific manner, yet also specifically recognizes the core sequence 5'-CAC[GA]TG-3'. It activates the transcription of growth-related genes. — an NCBI CDD conserved domain (cd11458); members share this curated model.
