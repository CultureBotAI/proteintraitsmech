identifier: CDD:cd13868
label: "The second Cupredoxin domain of bacterial laccases including CotA, a bacterial endospore coat component. CotA protein is an abundant component of the outer coat layer in bacterial endospore coat and it is required for spore resistance against hydrogen peroxide and UV light. Laccase is composed of three cupredoxin-like domains and includes one mononuclear and one trinuclear copper center. It is a member of the multicopper oxidase (MCO) family, which couples the oxidation of a substrate with a four-electron reduction of molecular oxygen to water. MCOs oxidize their substrate by accepting electrons at a mononuclear copper center and transferring them to the active site trinuclear copper center. The cupredoxin domain 2 of 3-domain MCOs has lost the ability to bind copper."
definition: >-
  The second Cupredoxin domain of bacterial laccases including CotA, a bacterial endospore coat component. CotA protein is an abundant component of the outer coat layer in bacterial endospore coat and it is required for spore resistance against hydrogen peroxide and UV light. Laccase is composed of three cupredoxin-like domains and includes one mononuclear and one trinuclear copper center. It is a member of the multicopper oxidase (MCO) family, which couples the oxidation of a substrate with a four-electron reduction of molecular oxygen to water. MCOs oxidize their substrate by accepting electrons at a mononuclear copper center and transferring them to the active site trinuclear copper center. The cupredoxin domain 2 of 3-domain MCOs has lost the ability to bind copper. — an NCBI CDD conserved domain (cd13868); members share this curated model.
