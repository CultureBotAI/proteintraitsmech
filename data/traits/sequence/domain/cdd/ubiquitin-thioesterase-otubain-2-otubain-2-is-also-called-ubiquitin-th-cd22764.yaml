identifier: CDD:cd22764
label: "Ubiquitin Thioesterase Otubain-2. Otubain-2 is also called ubiquitin thioesterase OTUB2, deubiquitinating enzyme OTUB2, OTU domain-containing ubiquitin aldehyde-binding protein 2, or ubiquitin-specific-processing protease OTUB2. It is a deubiquitylase (DUB)/ubiquitin thioesterase (EC 3.4.19.12) that mediates the deubiquitination of 'Lys-11'-,'Lys-48'- and 'Lys-63'-linked polyubiquitin chains, with a preference for 'Lys-63'-linked polyubiquitin chains. OTUB2 plays a role in DNA double-strand break (DSB) response (DDR); it enhances RNF8-mediated ubiquitination in an early phase of the DDR and promotes faster DSB repair but suppresses homologous recombination. It also functions as a cancer stemness and metastasis-promoting factor that deubiquitinates and activates the transcriptional regulators YAP/TAZ, which play important roles in development, physiology, and tumorigenesis and are negatively controlled by the Hippo pathway. OTUB2 belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad. It is classified as a family C65 cysteine protease by MEROPS."
definition: >-
  Ubiquitin Thioesterase Otubain-2. Otubain-2 is also called ubiquitin thioesterase OTUB2, deubiquitinating enzyme OTUB2, OTU domain-containing ubiquitin aldehyde-binding protein 2, or ubiquitin-specific-processing protease OTUB2. It is a deubiquitylase (DUB)/ubiquitin thioesterase (EC 3.4.19.12) that mediates the deubiquitination of 'Lys-11'-,'Lys-48'- and 'Lys-63'-linked polyubiquitin chains, with a preference for 'Lys-63'-linked polyubiquitin chains. OTUB2 plays a role in DNA double-strand break (DSB) response (DDR); it enhances RNF8-mediated ubiquitination in an early phase of the DDR and promotes faster DSB repair but suppresses homologous recombination. It also functions as a cancer stemness and metastasis-promoting factor that deubiquitinates and activates the transcriptional regulators YAP/TAZ, which play important roles in development, physiology, and tumorigenesis and are negatively controlled by the Hippo pathway. OTUB2 belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad. It is classified as a family C65 cysteine protease by MEROPS. — an NCBI CDD conserved domain (cd22764); members share this curated model.
