identifier: CDD:cd18583
label: "Six-transmembrane helical domain of the heavy metal tolerance protein. This group represents the HMT1 subfamily of ATP Binding Cassette (ABC) transporters that are involved in transition metal homeostasis and detoxification processes. Heavy Metal Tolerance Factor-1 (HMT1) proteins are required for cadmium resistance in Caenorhabditis elegans and Drosophila melanogaster. HMT1 is closely related to Yeast ATM1 and human ABCB7 (ABC transporter subfamily B, member 7), which are involved in the assembly of cytosolic iron-sulfur (Fe/S) cluster-containing proteins by mediating export of Fe/S cluster precursors from mitochondria."
definition: >-
  Six-transmembrane helical domain of the heavy metal tolerance protein. This group represents the HMT1 subfamily of ATP Binding Cassette (ABC) transporters that are involved in transition metal homeostasis and detoxification processes. Heavy Metal Tolerance Factor-1 (HMT1) proteins are required for cadmium resistance in Caenorhabditis elegans and Drosophila melanogaster. HMT1 is closely related to Yeast ATM1 and human ABCB7 (ABC transporter subfamily B, member 7), which are involved in the assembly of cytosolic iron-sulfur (Fe/S) cluster-containing proteins by mediating export of Fe/S cluster precursors from mitochondria. — an NCBI CDD conserved domain (cd18583); members share this curated model.
