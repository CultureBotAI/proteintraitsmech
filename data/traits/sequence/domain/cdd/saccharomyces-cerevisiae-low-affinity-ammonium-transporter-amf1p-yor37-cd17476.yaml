identifier: CDD:cd17476
label: "Saccharomyces cerevisiae low affinity ammonium transporter Amf1p/YOR378W, aminotriazole resistance protein Atr1p, and similar transporters of the Major Facilitator Superfamily. Saccharomyces cerevisiae Amf1p/Ammonium Facilitator 1/YOR378W functions as a low affinity NH4+ transporter. S. cerevisiae aminotriazole resistance protein (Atr1p) is required for controlling sensitivity to aminotriazole; it is a putative component of the machinery responsible for pumping aminotriazole (and possibly other toxic compounds) out of the cell. This subfamily also includes S. cerevisiae YMR279C, a putative boron transporter involved in boron efflux and resistance, and Kluyveromyces lactis Knq1p which is involved in oxidative stress response and iron homeostasis. Amf1p, Atr1p, and YMR279C have been classified as group 1 members of the DHA2 (Drug:H+ Antiporter family 2) family, K. lactis Knq1 as group 2. This subfamily also includes two Aspergillus terreus terrein biosynthesis cluster proteins, efflux pump TerG and TerJ which may be required for efficient secretion of terrein or other secondary metabolites produced by the terrein gene cluster. The Amf1p-like subfamily belongs to the Methylenomycin A resistance protein (also called MMR peptide) and similar multidrug resistance (MDR) transporters (MMR-like MDR transporter) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Saccharomyces cerevisiae low affinity ammonium transporter Amf1p/YOR378W, aminotriazole resistance protein Atr1p, and similar transporters of the Major Facilitator Superfamily. Saccharomyces cerevisiae Amf1p/Ammonium Facilitator 1/YOR378W functions as a low affinity NH4+ transporter. S. cerevisiae aminotriazole resistance protein (Atr1p) is required for controlling sensitivity to aminotriazole; it is a putative component of the machinery responsible for pumping aminotriazole (and possibly other toxic compounds) out of the cell. This subfamily also includes S. cerevisiae YMR279C, a putative boron transporter involved in boron efflux and resistance, and Kluyveromyces lactis Knq1p which is involved in oxidative stress response and iron homeostasis. Amf1p, Atr1p, and YMR279C have been classified as group 1 members of the DHA2 (Drug:H+ Antiporter family 2) family, K. lactis Knq1 as group 2. This subfamily also includes two Aspergillus terreus terrein biosynthesis cluster proteins, efflux pump TerG and TerJ which may be required for efficient secretion of terrein or other secondary metabolites produced by the terrein gene cluster. The Amf1p-like subfamily belongs to the Methylenomycin A resistance protein (also called MMR peptide) and similar multidrug resistance (MDR) transporters (MMR-like MDR transporter) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17476); members share this curated model.
