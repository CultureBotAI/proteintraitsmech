identifier: CDD:cd14593
label: "protein tyrosine phosphatase-like pseudophosphatase domain of myotubularin related phosphoinositide phosphatase 10. Myotubularin related phosphoinositide phosphatase 10 (MTMR10) is enzymatically inactive and contains an N-terminal PH-GRAM domain. In general, myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. MTMR10 is a pseudophosphatase that lacks the catalytic cysteine in its catalytic pocket."
definition: >-
  protein tyrosine phosphatase-like pseudophosphatase domain of myotubularin related phosphoinositide phosphatase 10. Myotubularin related phosphoinositide phosphatase 10 (MTMR10) is enzymatically inactive and contains an N-terminal PH-GRAM domain. In general, myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. MTMR10 is a pseudophosphatase that lacks the catalytic cysteine in its catalytic pocket. — an NCBI CDD conserved domain (cd14593); members share this curated model.
