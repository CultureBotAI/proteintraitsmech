identifier: CDD:cd14284
label: "UBA domain found in Drosophila melanogaster protein Gawky (GW) and similar proteins. GW is the D. melanogaster GW182 homolog (dGW182) which belongs to the GW182 protein family. The GW182 proteins directly interact with Argonaute (Ago) proteins, and thus function as downstream effectors in the miRNA pathway, responsible for inhibition of translation and acceleration of mRNA decay. They are characterized by an abnormally high content of glycine/tryptophan (G/W) repeats, one or more glutamine (Q)-rich motifs, and a C-terminal RNA recognition motif (RRM), also called RBD (RNA binding domain) or RNP (ribonucleoprotein domain). The GW182 proteins are recruited to miRNA targets through an interaction between their N-terminal domain and an Argonaute protein. Then they promote translational repression and/or degradation of miRNA targets through their C-terminal silencing domain. In addition to a G/W repeats region, a Q-rich region, and a RRM domain, GW also contains a ubiquitin-associated domain (UBA)."
definition: >-
  UBA domain found in Drosophila melanogaster protein Gawky (GW) and similar proteins. GW is the D. melanogaster GW182 homolog (dGW182) which belongs to the GW182 protein family. The GW182 proteins directly interact with Argonaute (Ago) proteins, and thus function as downstream effectors in the miRNA pathway, responsible for inhibition of translation and acceleration of mRNA decay. They are characterized by an abnormally high content of glycine/tryptophan (G/W) repeats, one or more glutamine (Q)-rich motifs, and a C-terminal RNA recognition motif (RRM), also called RBD (RNA binding domain) or RNP (ribonucleoprotein domain). The GW182 proteins are recruited to miRNA targets through an interaction between their N-terminal domain and an Argonaute protein. Then they promote translational repression and/or degradation of miRNA targets through their C-terminal silencing domain. In addition to a G/W repeats region, a Q-rich region, and a RRM domain, GW also contains a ubiquitin-associated domain (UBA). — an NCBI CDD conserved domain (cd14284); members share this curated model.
