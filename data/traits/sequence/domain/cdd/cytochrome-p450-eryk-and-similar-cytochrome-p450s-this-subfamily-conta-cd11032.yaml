identifier: CDD:cd11032
label: "cytochrome P450 EryK and similar cytochrome P450s. This subfamily contains archaeal and bacterial CYPs including Saccharopolyspora erythraea P450 EryK, Saccharolobus solfataricus cytochrome P450 119 (CYP119), Picrophilus torridus CYP231A2, Bacillus subtilis CYP109, Streptomyces himastatinicus HmtT and HmtN, and Bacillus megaterium CYP106A2, among others. EryK, also called erythromycin C-12 hydroxylase, is active during the final steps of erythromycin A (ErA) biosynthesis. CYP106A2 catalyzes the hydroxylation of a variety of 3-oxo-delta(4)-steroids such as progesterone and deoxycorticosterone, mainly in the 15beta-position. It is also capable of hydroxylating a variety of terpenoids. HmtT and HmtN is involved in the post-tailoring of the cyclohexadepsipeptide backbone during the biosynthesis of the himastatin antibiotic. The EryK-like subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 EryK and similar cytochrome P450s. This subfamily contains archaeal and bacterial CYPs including Saccharopolyspora erythraea P450 EryK, Saccharolobus solfataricus cytochrome P450 119 (CYP119), Picrophilus torridus CYP231A2, Bacillus subtilis CYP109, Streptomyces himastatinicus HmtT and HmtN, and Bacillus megaterium CYP106A2, among others. EryK, also called erythromycin C-12 hydroxylase, is active during the final steps of erythromycin A (ErA) biosynthesis. CYP106A2 catalyzes the hydroxylation of a variety of 3-oxo-delta(4)-steroids such as progesterone and deoxycorticosterone, mainly in the 15beta-position. It is also capable of hydroxylating a variety of terpenoids. HmtT and HmtN is involved in the post-tailoring of the cyclohexadepsipeptide backbone during the biosynthesis of the himastatin antibiotic. The EryK-like subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd11032); members share this curated model.
