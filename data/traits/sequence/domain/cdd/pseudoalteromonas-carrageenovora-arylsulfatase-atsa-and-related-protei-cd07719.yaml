identifier: CDD:cd07719
label: "Pseudoalteromonas carrageenovora arylsulfatase AtsA and related proteins; MBL-fold metallo-hydrolase domain. Arylsulfatase (also known as aryl-sulfate sulfohydrolase, EC 3.1.6.1). Pseudoalteromonas carrageenovora arylsulfatase AtsA may function as a glycosulfohydrolase involved with desulfation of sulfated polysaccharides, which catalyzes hydrolysis of the arylsulfate ester bond, producing the aryl compounds and inorganic sulfate. CD also includes some sequences annotated as ribonucleases. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily."
definition: >-
  Pseudoalteromonas carrageenovora arylsulfatase AtsA and related proteins; MBL-fold metallo-hydrolase domain. Arylsulfatase (also known as aryl-sulfate sulfohydrolase, EC 3.1.6.1). Pseudoalteromonas carrageenovora arylsulfatase AtsA may function as a glycosulfohydrolase involved with desulfation of sulfated polysaccharides, which catalyzes hydrolysis of the arylsulfate ester bond, producing the aryl compounds and inorganic sulfate. CD also includes some sequences annotated as ribonucleases. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily. — an NCBI CDD conserved domain (cd07719); members share this curated model.
