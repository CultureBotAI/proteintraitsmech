identifier: CDD:cd22393
label: "first type I K homology (KH) RNA-binding domain found in KRR1 small subunit processome component and similar proteins. KRR1, also called HIV-1 Rev-binding protein 2, or KRR-R motif-containing protein 1, or Rev-interacting protein 1, or Rip-1, or ribosomal RNA assembly protein KRR1, is a ribosomal assembly factor required for 40S ribosome biogenesis. It is involved in nucleolar processing of pre-18S ribosomal RNA and ribosome assembly. KRR1 contains two K-homology (KH) RNA-binding domains. The model corresponds to the first one. The KH1 domain is a divergent KH domain that lacks the RNA-binding GXXG motif and is involved in binding another assembly factor, Kri1."
definition: >-
  first type I K homology (KH) RNA-binding domain found in KRR1 small subunit processome component and similar proteins. KRR1, also called HIV-1 Rev-binding protein 2, or KRR-R motif-containing protein 1, or Rev-interacting protein 1, or Rip-1, or ribosomal RNA assembly protein KRR1, is a ribosomal assembly factor required for 40S ribosome biogenesis. It is involved in nucleolar processing of pre-18S ribosomal RNA and ribosome assembly. KRR1 contains two K-homology (KH) RNA-binding domains. The model corresponds to the first one. The KH1 domain is a divergent KH domain that lacks the RNA-binding GXXG motif and is involved in binding another assembly factor, Kri1. — an NCBI CDD conserved domain (cd22393); members share this curated model.
