identifier: CDD:cd02607
label: "bifunctional phosphoserine phosphatase/phosphoserine:homoserine phosphotransferase, similar to Pseudomonas aeruginosa ThrH. This family includes Pseudomonas aeruginosa ThrH which is a duel activity enzyme having both phosphoserine phosphatase and phosphoserine:homoserine phosphotransferase activities, i.e. it can dephosphorylate phosphoserine, and can transfer phosphate from phosphoserine to homoserine. This family belongs to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases."
definition: >-
  bifunctional phosphoserine phosphatase/phosphoserine:homoserine phosphotransferase, similar to Pseudomonas aeruginosa ThrH. This family includes Pseudomonas aeruginosa ThrH which is a duel activity enzyme having both phosphoserine phosphatase and phosphoserine:homoserine phosphotransferase activities, i.e. it can dephosphorylate phosphoserine, and can transfer phosphate from phosphoserine to homoserine. This family belongs to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases. — an NCBI CDD conserved domain (cd02607); members share this curated model.
