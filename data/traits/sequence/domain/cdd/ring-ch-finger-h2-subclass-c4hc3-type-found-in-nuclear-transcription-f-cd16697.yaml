identifier: CDD:cd16697
label: "RING-CH finger, H2 subclass (C4HC3-type), found in nuclear transcription factor, X-box binding-like 1 (NFXL1) and similar proteins. NFXL1, also known as NF-X1-type zinc finger protein NFXL1, or ovarian zinc finger protein (OZFP), is encoded by the novel human cytoplasm-distribution zinc finger protein (CDZFP) gene. It is a putative zinc finger protein with a C4HC3-type RING-CH finger and a Cys-rich region that harbors several NFX1-type zinc fingers."
definition: >-
  RING-CH finger, H2 subclass (C4HC3-type), found in nuclear transcription factor, X-box binding-like 1 (NFXL1) and similar proteins. NFXL1, also known as NF-X1-type zinc finger protein NFXL1, or ovarian zinc finger protein (OZFP), is encoded by the novel human cytoplasm-distribution zinc finger protein (CDZFP) gene. It is a putative zinc finger protein with a C4HC3-type RING-CH finger and a Cys-rich region that harbors several NFX1-type zinc fingers. — an NCBI CDD conserved domain (cd16697); members share this curated model.
