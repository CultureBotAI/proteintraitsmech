identifier: CDD:cd07229
label: "Triacylglycerol lipase 3. Triacylglycerol lipase 3 (TGL3) are responsible for all the TAG lipase activity of the lipid particle. Triacylglycerol (TAG) lipases are also necessary for the mobilization of TAG stored in lipid particles. TGL3 contains the consensus sequence motif GXSXG, which is found in lipolytic enzymes. This family includes Tgl3p from Saccharomyces cerevisiae."
definition: >-
  Triacylglycerol lipase 3. Triacylglycerol lipase 3 (TGL3) are responsible for all the TAG lipase activity of the lipid particle. Triacylglycerol (TAG) lipases are also necessary for the mobilization of TAG stored in lipid particles. TGL3 contains the consensus sequence motif GXSXG, which is found in lipolytic enzymes. This family includes Tgl3p from Saccharomyces cerevisiae. — an NCBI CDD conserved domain (cd07229); members share this curated model.
