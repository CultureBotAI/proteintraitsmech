identifier: CDD:cd22087
label: "F-box domain found in F-box only protein 7 (FBXO7) and similar proteins. FBXO7, also called FBX7, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. It recognizes BIRC2 and DLGAP5. FBXO7 plays a role downstream of PINK1 in the clearance of damaged mitochondria via selective autophagy (mitophagy) by targeting PRKN to dysfunctional depolarized mitochondria. It promotes MFN1 ubiquitination. FBXO7 acts as a cell cycle regulator by enhancing cyclin D/cyclin-dependent kinase 6 (Cdk6) complex formation and stabilizing levels of p27, a cyclin-dependent kinase inhibitor. Mutations in the FBXO7 (PARK15) gene have been implicated in a juvenile form of parkinsonism called parkinsonian pyramidal syndrome (PPS), characterized by Parkinsonian symptoms and pyramidal tract signs. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 7 (FBXO7) and similar proteins. FBXO7, also called FBX7, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. It recognizes BIRC2 and DLGAP5. FBXO7 plays a role downstream of PINK1 in the clearance of damaged mitochondria via selective autophagy (mitophagy) by targeting PRKN to dysfunctional depolarized mitochondria. It promotes MFN1 ubiquitination. FBXO7 acts as a cell cycle regulator by enhancing cyclin D/cyclin-dependent kinase 6 (Cdk6) complex formation and stabilizing levels of p27, a cyclin-dependent kinase inhibitor. Mutations in the FBXO7 (PARK15) gene have been implicated in a juvenile form of parkinsonism called parkinsonian pyramidal syndrome (PPS), characterized by Parkinsonian symptoms and pyramidal tract signs. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22087); members share this curated model.
