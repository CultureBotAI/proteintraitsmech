identifier: CDD:cd12026
label: "Src homology 3 domain of the Tight junction protein, Zonula occludens protein 1. ZO-1 is a scaffolding protein that associates with other ZO proteins and other proteins of the tight junction, zonula adherens, and gap junctions. ZO proteins play roles in regulating cytoskeletal dynamics at these cell junctions. ZO-1 plays an essential role in embryonic development. It regulates the assembly and dynamics of the cortical cytoskeleton at cell-cell junctions. It is considered a member of the MAGUK (membrane-associated guanylate kinase) protein family, which is characterized by the presence of a core of three domains: PDZ, SH3, and guanylate kinase (GuK). The GuK domain in MAGUK proteins is enzymatically inactive; instead, the domain mediates protein-protein interactions and associates intramolecularly with the SH3 domain. The C-terminal region of ZO-1 is the largest of the three ZO proteins and contains an actin-binding region and domains of unknown function designated alpha and ZU5. The SH3 domain of ZO-1 has been shown to bind ZONAB, ZAK, afadin, and Galpha12. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of the Tight junction protein, Zonula occludens protein 1. ZO-1 is a scaffolding protein that associates with other ZO proteins and other proteins of the tight junction, zonula adherens, and gap junctions. ZO proteins play roles in regulating cytoskeletal dynamics at these cell junctions. ZO-1 plays an essential role in embryonic development. It regulates the assembly and dynamics of the cortical cytoskeleton at cell-cell junctions. It is considered a member of the MAGUK (membrane-associated guanylate kinase) protein family, which is characterized by the presence of a core of three domains: PDZ, SH3, and guanylate kinase (GuK). The GuK domain in MAGUK proteins is enzymatically inactive; instead, the domain mediates protein-protein interactions and associates intramolecularly with the SH3 domain. The C-terminal region of ZO-1 is the largest of the three ZO proteins and contains an actin-binding region and domains of unknown function designated alpha and ZU5. The SH3 domain of ZO-1 has been shown to bind ZONAB, ZAK, afadin, and Galpha12. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12026); members share this curated model.
