identifier: CDD:cd05435
label: "Nucleotidyltransferase (NT) domain of  Escherichia coli AadA5, and related proteins. NT_EcAadA5_like: catalytic nucleotidyltransferase (NT) domains found in proteins similar to Escherichia coli (Ec) AadA5. EcAadA5 confers resistance to the aminoglycoside antibiotic spectinomycin and is a putative aminoglycoside-3'-adenylyltransferase. The EcAadA5 ORF is part of the aadA5 cassette of a class 1 integron. Proteins in this group belong to the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these E. coli AadA5_like NT domains."
definition: >-
  Nucleotidyltransferase (NT) domain of Escherichia coli AadA5, and related proteins. NT_EcAadA5_like: catalytic nucleotidyltransferase (NT) domains found in proteins similar to Escherichia coli (Ec) AadA5. EcAadA5 confers resistance to the aminoglycoside antibiotic spectinomycin and is a putative aminoglycoside-3'-adenylyltransferase. The EcAadA5 ORF is part of the aadA5 cassette of a class 1 integron. Proteins in this group belong to the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these E. coli AadA5_like NT domains. — an NCBI CDD conserved domain (cd05435); members share this curated model.
