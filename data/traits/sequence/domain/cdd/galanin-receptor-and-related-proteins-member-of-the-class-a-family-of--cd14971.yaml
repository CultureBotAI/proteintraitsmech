identifier: CDD:cd14971
label: "galanin receptor and related proteins, member of the class A family of seven-transmembrane G protein-coupled receptors. This subfamily includes G-protein coupled galanin receptors, kisspeptin receptor and allatostatin-A receptor (AstA-R) in insects. These receptors, which are members of the class A of seven transmembrane GPCRs, share a high degree of sequence homology among themselves. The galanin receptors bind galanin, a neuropeptide that is widely expressed in the brain, peripheral tissues, and endocrine glands. Galanin is implicated in numerous neurological and psychiatric diseases including Alzheimer's disease, eating disorders, and epilepsy, among many others. KiSS1-derived peptide receptor (also known as GPR54 or kisspeptin receptor) binds the peptide hormone kisspeptin (metastin), which encoded by the metastasis suppressor gene (KISS1) expressed in various endocrine and reproductive tissues. AstA-R is a G-protein coupled receptor that binds allatostatin A. Three distinct types of allatostatin have been identified in the insects and crustaceans: AstA, AstB, and AstC. They both inhibit the biosynthesis of juvenile hormone and exert an inhibitory influence on food intake. Therefore, allatostatins are considered as potential targets for insect control."
definition: >-
  galanin receptor and related proteins, member of the class A family of seven-transmembrane G protein-coupled receptors. This subfamily includes G-protein coupled galanin receptors, kisspeptin receptor and allatostatin-A receptor (AstA-R) in insects. These receptors, which are members of the class A of seven transmembrane GPCRs, share a high degree of sequence homology among themselves. The galanin receptors bind galanin, a neuropeptide that is widely expressed in the brain, peripheral tissues, and endocrine glands. Galanin is implicated in numerous neurological and psychiatric diseases including Alzheimer's disease, eating disorders, and epilepsy, among many others. KiSS1-derived peptide receptor (also known as GPR54 or kisspeptin receptor) binds the peptide hormone kisspeptin (metastin), which encoded by the metastasis suppressor gene (KISS1) expressed in various endocrine and reproductive tissues. AstA-R is a G-protein coupled receptor that binds allatostatin A. Three distinct types of allatostatin have been identified in the insects and crustaceans: AstA, AstB, and AstC. They both inhibit the biosynthesis of juvenile hormone and exert an inhibitory influence on food intake. Therefore, allatostatins are considered as potential targets for insect control. — an NCBI CDD conserved domain (cd14971); members share this curated model.
