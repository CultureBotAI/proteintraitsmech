identifier: CDD:cd17495
label: "Type I restriction-modification system specificity (S) subunit Target Recognition Domain-ConseRved domain (TRD-CR), similar to Crinalium epipsammum S subunit (S.Cep9333ORF4827P) TRD2-CR2 and Corynebacterium genitalium sp. nov. S subunit (S.CgeORF10704P) TRD2-CR2. The recognition sequences for Crinalium epipsammum S subunit (S.Cep9333ORF4827P) and Corynebacterium genitalium sp. nov. S subunit (S.CgeORF10704P) are undetermined. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains both TRD1-CR1 and TRD2-CR2. This subfamily of TRD-CR's shows similarity to TRD1-CR1 of Aminobacterium colombiense DSM 12261 S subunit (S.Aco12261I), which recognizes 5'... GCANNNNNNTGT ... 3'. This subfamily may also include TRD-CR-like sequence-recognition domains of various type II restriction enzymes and methyltransferases and type I DNA methyltransferases."
