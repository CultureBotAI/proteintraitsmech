identifier: CDD:cd20080
label: "XPF-like nuclease domain of the family of Essential Meiotic Endonucleases (EMEs) and similar proteins. The family of EMEs includes EME1 and EME2. EME1, also called MMS4 homolog (hMMS4), interacts with MUS81 to form a DNA structure-specific endonuclease with substrate preference for branched DNA structures with a 5'-end at the branch nick. Its typical substrates include 3'-flap structures, replication forks and nicked Holliday junctions. EME1 may be required in mitosis for the processing of stalled or collapsed replication forks. EME2 interacts with MUS81 to form a DNA structure-specific endonuclease which cleaves substrates such as 3'-flap structures. MUS81-EME2 is responsible for fork cleavage and restart in human cells. The MUS81-EME2 protein, whose actions are restricted to S phase, is also responsible for telomere maintenance in telomerase-negative ALT (Alternative Lengthening of Telomeres) cells. The nuclease domain of EMEs is a nuclease-like domain which is involved in targeting the MUS81-EME heterodimer complex to DNA. The family also includes budding yeast Mms4 (also known as Eme1 in other organisms), a putative transcriptional (co)activator that protects Saccharomyces cerevisiae cells from endogenous and environmental DNA damage. It interacts with MUS81 to form a DNA structure-specific endonuclease with substrate preference for branched DNA structures with a 5'-end at the branch nick. The nuclease domain of Mms4 lacks the catalytic motif."
definition: >-
  XPF-like nuclease domain of the family of Essential Meiotic Endonucleases (EMEs) and similar proteins. The family of EMEs includes EME1 and EME2. EME1, also called MMS4 homolog (hMMS4), interacts with MUS81 to form a DNA structure-specific endonuclease with substrate preference for branched DNA structures with a 5'-end at the branch nick. Its typical substrates include 3'-flap structures, replication forks and nicked Holliday junctions. EME1 may be required in mitosis for the processing of stalled or collapsed replication forks. EME2 interacts with MUS81 to form a DNA structure-specific endonuclease which cleaves substrates such as 3'-flap structures. MUS81-EME2 is responsible for fork cleavage and restart in human cells. The MUS81-EME2 protein, whose actions are restricted to S phase, is also responsible for telomere maintenance in telomerase-negative ALT (Alternative Lengthening of Telomeres) cells. The nuclease domain of EMEs is a nuclease-like domain which is involved in targeting the MUS81-EME heterodimer complex to DNA. The family also includes budding yeast Mms4 (also known as Eme1 in other organisms), a putative transcriptional (co)activator that protects Saccharomyces cerevisiae cells from endogenous and environmental DNA damage. It interacts with MUS81 to form a DNA structure-specific endonuclease with substrate preference for branched DNA structures with a 5'-end at the branch nick. The nuclease domain of Mms4 lacks the catalytic motif. — an NCBI CDD conserved domain (cd20080); members share this curated model.
