identifier: CDD:cd21753
label: tandem_UIM_ATX3_like
definition: >-
  tandem UIM (ubiquitin-interacting motif) domain found in ataxin-3 and similar proteins. Ataxin-3, also called Machado-Joseph disease protein 1 (JosD1), or spinocerebellar ataxia type 3 protein, is a membrane-targeted deubiquitinating enzyme involved in protein homeostasis maintenance, transcription, cytoskeleton regulation, myogenesis and degradation of misfolded chaperone substrates. It is activated by ubiquitination and regulates membrane dynamics, cell motility, and endocytosis. Ataxin-3 acts as a histone-binding protein with two independent transcriptional corepressor activities. It interacts with key regulators of transcription and represses transcription. Members in this family contain a tandem UIM domain
