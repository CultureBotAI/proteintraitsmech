identifier: CDD:cd22384
label: "type I K homology (KH) RNA-binding domain found in the KH domain-containing, RNA-binding, signal transduction-associated protein (KHDRBS) family. The KHDRBS family includes three members, KHDRBS1-3. KHDRBS1, also called GAP-associated tyrosine phosphoprotein p62, or Src-associated in mitosis 68 kDa protein, or Sam68, or p21 Ras GTPase-activating protein-associated p62, or p68, is an RNA-binding protein that plays a role in the regulation of alternative splicing and influences mRNA splice site selection and exon inclusion. It binds to RNA containing 5'-[AU]UAA-3' as a bipartite motif spaced by more than 15 nucleotides. It also binds poly(A). KHDRBS1 acts as a putative regulator of mRNA stability and/or translation rates and mediates mRNA nuclear export. It is recruited and tyrosine phosphorylated by several receptor systems, for example the T-cell, leptin and insulin receptors. KHDRBS2, also called Sam68-like mammalian protein 1, or SLM-1, is an RNA-binding protein that plays a role in the regulation of alternative splicing and influences mRNA splice site selection and exon inclusion. It binds both poly(A) and poly(U) homopolymers. KHDRBS2 may function as an adapter protein for Src kinases during mitosis. KHDRBS3, also called RNA-binding protein T-Star, or Sam68-like mammalian protein 2, or SLM-2, or Sam68-like phosphotyrosine protein, is an RNA-binding protein that plays a role in the regulation of alternative splicing and influences mRNA splice site selection and exon inclusion. It binds optimally to RNA containing 5'-[AU]UAA-3' as a bipartite motif spaced by more than 15 nucleotides. It also binds poly(A). KHDRBS3 may play a role as a negative regulator of cell growth."
definition: >-
  type I K homology (KH) RNA-binding domain found in the KH domain-containing, RNA-binding, signal transduction-associated protein (KHDRBS) family. The KHDRBS family includes three members, KHDRBS1-3. KHDRBS1, also called GAP-associated tyrosine phosphoprotein p62, or Src-associated in mitosis 68 kDa protein, or Sam68, or p21 Ras GTPase-activating protein-associated p62, or p68, is an RNA-binding protein that plays a role in the regulation of alternative splicing and influences mRNA splice site selection and exon inclusion. It binds to RNA containing 5'-[AU]UAA-3' as a bipartite motif spaced by more than 15 nucleotides. It also binds poly(A). KHDRBS1 acts as a putative regulator of mRNA stability and/or translation rates and mediates mRNA nuclear export. It is recruited and tyrosine phosphorylated by several receptor systems, for example the T-cell, leptin and insulin receptors. KHDRBS2, also called Sam68-like mammalian protein 1, or SLM-1, is an RNA-binding protein that plays a role in the regulation of alternative splicing and influences mRNA splice site selection and exon inclusion. It binds both poly(A) and poly(U) homopolymers. KHDRBS2 may function as an adapter protein for Src kinases during mitosis. KHDRBS3, also called RNA-binding protein T-Star, or Sam68-like mammalian protein 2, or SLM-2, or Sam68-like phosphotyrosine protein, is an RNA-binding protein that plays a role in the regulation of alternative splicing and influences mRNA splice site selection and exon inclusion. It binds optimally to RNA containing 5'-[AU]UAA-3' as a bipartite motif spaced by more than 15 nucleotides. It also binds poly(A). KHDRBS3 may play a role as a negative regulator of cell growth. — an NCBI CDD conserved domain (cd22384); members share this curated model.
