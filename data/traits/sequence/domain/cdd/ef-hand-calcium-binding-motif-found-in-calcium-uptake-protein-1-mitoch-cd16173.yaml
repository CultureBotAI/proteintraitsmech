identifier: CDD:cd16173
label: "EF-hand, calcium binding motif, found in calcium uptake protein 1, mitochondrial (MICU1) and similar proteins. MICU1, also termed atopy-related autoantigen CALC (ara CALC), or calcium-binding atopy-related autoantigen 1 (CBARA1), or Hom s 4, or EFHA3, localizes to the inner mitochondrial membrane (IMM). It functions as a gatekeeper of the mitochondrial calcium uniporter (MCU) and regulates MCU-mediated mitochondrial Ca2+ uptake, which is essential for maintaining mitochondrial homoeostasis. MICU1 and its paralog, MICU2, are physically associated within the uniporter complex and are co-expressed across all tissues. They may operate together with MCU to regulate the channel. The mutations in MICU1 are associated with neuromuscular abnormalities in children. MICU1 contains an N-terminal mitochondrial targeting sequence (MTS) as well as two evolutionarily conserved canonical Ca2+-binding EF-hands separated by a long stretch of residues predicted to form alpha-helices."
definition: >-
  EF-hand, calcium binding motif, found in calcium uptake protein 1, mitochondrial (MICU1) and similar proteins. MICU1, also termed atopy-related autoantigen CALC (ara CALC), or calcium-binding atopy-related autoantigen 1 (CBARA1), or Hom s 4, or EFHA3, localizes to the inner mitochondrial membrane (IMM). It functions as a gatekeeper of the mitochondrial calcium uniporter (MCU) and regulates MCU-mediated mitochondrial Ca2+ uptake, which is essential for maintaining mitochondrial homoeostasis. MICU1 and its paralog, MICU2, are physically associated within the uniporter complex and are co-expressed across all tissues. They may operate together with MCU to regulate the channel. The mutations in MICU1 are associated with neuromuscular abnormalities in children. MICU1 contains an N-terminal mitochondrial targeting sequence (MTS) as well as two evolutionarily conserved canonical Ca2+-binding EF-hands separated by a long stretch of residues predicted to form alpha-helices. — an NCBI CDD conserved domain (cd16173); members share this curated model.
