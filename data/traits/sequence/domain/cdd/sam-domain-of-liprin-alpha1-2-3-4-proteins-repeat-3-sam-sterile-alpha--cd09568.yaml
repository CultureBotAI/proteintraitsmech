identifier: CDD:cd09568
label: "SAM domain of liprin-alpha1,2,3,4 proteins repeat 3. SAM (sterile alpha motif) domain repeat 3 of liprin-alpha1,2,3,4 proteins is a protein-protein interaction domain. Liprin-alpha proteins contain three copies (repeats) of SAM domain. They may form heterodimers with liprin-beta proteins through their SAM domains. Liprins were originally identified as LAR (leukocyte common antigen-related) transmembrane protein-tyrosine phosphatase-interacting proteins. They participate in mammary gland development and in axon guidance; in particular, liprin-alpha is involved in formation of the presynaptic active zone."
definition: >-
  SAM domain of liprin-alpha1,2,3,4 proteins repeat 3. SAM (sterile alpha motif) domain repeat 3 of liprin-alpha1,2,3,4 proteins is a protein-protein interaction domain. Liprin-alpha proteins contain three copies (repeats) of SAM domain. They may form heterodimers with liprin-beta proteins through their SAM domains. Liprins were originally identified as LAR (leukocyte common antigen-related) transmembrane protein-tyrosine phosphatase-interacting proteins. They participate in mammary gland development and in axon guidance; in particular, liprin-alpha is involved in formation of the presynaptic active zone. — an NCBI CDD conserved domain (cd09568); members share this curated model.
