identifier: CDD:cd15482
label: "Non-viral sialidases. Sialidases or neuraminidases function to bind and hydrolyze terminal sialic acid residues from various glycoconjugates, they play vital roles in pathogenesis, bacterial nutrition and cellular interactions. They have a six-bladed, beta-propeller fold with the non-viral sialidases containing 2-5 Asp-box motifs (most commonly Ser/Thr-X-Asp-[X]-Gly-X-Thr- Trp/Phe).  This CD includes eubacterial and eukaryotic sialidases."
definition: >-
  Non-viral sialidases. Sialidases or neuraminidases function to bind and hydrolyze terminal sialic acid residues from various glycoconjugates, they play vital roles in pathogenesis, bacterial nutrition and cellular interactions. They have a six-bladed, beta-propeller fold with the non-viral sialidases containing 2-5 Asp-box motifs (most commonly Ser/Thr-X-Asp-[X]-Gly-X-Thr- Trp/Phe). This CD includes eubacterial and eukaryotic sialidases. — an NCBI CDD conserved domain (cd15482); members share this curated model.
