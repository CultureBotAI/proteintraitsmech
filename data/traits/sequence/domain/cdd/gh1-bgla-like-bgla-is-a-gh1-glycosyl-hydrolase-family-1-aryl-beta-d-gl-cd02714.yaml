identifier: CDD:cd02714
label: GH1_BglA_like
definition: >-
  GH1_BglA_like. BglA is a GH1 (glycosyl hydrolase family 1) aryl-beta-D-glucosidase found in Bacillus subtilis that hydrolyzes the phenolic glucosides, such as arbutin and salicin, that are produced in plants. The BglA-like family of aryl-beta-D-glucosidases includes BglA from Bacillus subtilis, BglB from Pectobacterium carotovorum, BglH from Bacillus subtilis, ArbB from Erwinia chrysanthemi, AscB from Escherichia coli and Pectobacterium carotovorum, and CasB from Pectobacterium carotovorum
