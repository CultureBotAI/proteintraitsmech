identifier: CDD:cd14617
label: "catalytic domain of receptor-type tyrosine-protein phosphatase B. Receptor-type tyrosine-protein phosphatase B (PTPRB), also known as receptor-type tyrosine-protein phosphatase beta (R-PTP-beta) or vascular endothelial protein tyrosine phosphatase(VE-PTP), belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPRB/VE-PTP is a member of the R3 subfamily of receptor-type phosphotyrosine phosphatases (RPTP), characterized by a unique modular composition consisting of multiple extracellular fibronectin type III (FN3) repeats and a single (most RPTP subtypes have two) cytoplasmic catalytic PTP domain. It is expressed specifically in vascular endothelial cells and it plays an important role in blood vessel remodeling and angiogenesis."
