identifier: CDD:cd20352
label: "Rcat domain found in the RNF144 protein subfamily. The RNF144 subfamily includes RNF144A and RNF144B, which are transmembrane (TM) domain-containing RBR-type E3 ubiquitin-protein ligases. RNF144A, also called UbcM4-interacting protein 4 (UIP4), or ubiquitin-conjugating enzyme 7-interacting protein 4, targets DNA-dependent protein kinase catalytic subunit (DNA-PKcs), and thus promotes DNA damage-induced cell apoptosis. It is transcriptionally repressed by metastasis-associated protein 1 (MTA1) and inhibits MTA1-driven cancer cell migration and invasion. RNF144B, also called PIR2, IBR domain-containing protein 2 (IBRDC2), or p53-inducible RING finger protein (p53RFP), induces p53-dependent but caspase-independent apoptosis. It interacts with E2 ubiquitin-conjugating enzymes UbcH7 and UbcH8, but not with UbcH5. It is involved in ubiquitination and degradation of p21, a p53 downstream protein promoting growth arrest and antagonizing apoptosis, suggesting a role in switching a cell from p53-mediated growth arrest to apoptosis. Moreover, RNF144B regulates the levels of Bax, a pro-apoptotic protein from the Bcl-2 family, and protects cells from unprompted Bax activation and cell death. It also regulates epithelial homeostasis by mediating degradation of p21WAF1 and p63. Both RNF144A and RNF144B contain an RBR domain followed by a potential single-TM domain. The RBR domain was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. This model corresponds to the Rcat domain of the RNF144 protein subfamily that is essential for RBR E3 ligase activity and adopts the same fold as the BRcat domain."
definition: >-
  Rcat domain found in the RNF144 protein subfamily. The RNF144 subfamily includes RNF144A and RNF144B, which are transmembrane (TM) domain-containing RBR-type E3 ubiquitin-protein ligases. RNF144A, also called UbcM4-interacting protein 4 (UIP4), or ubiquitin-conjugating enzyme 7-interacting protein 4, targets DNA-dependent protein kinase catalytic subunit (DNA-PKcs), and thus promotes DNA damage-induced cell apoptosis. It is transcriptionally repressed by metastasis-associated protein 1 (MTA1) and inhibits MTA1-driven cancer cell migration and invasion. RNF144B, also called PIR2, IBR domain-containing protein 2 (IBRDC2), or p53-inducible RING finger protein (p53RFP), induces p53-dependent but caspase-independent apoptosis. It interacts with E2 ubiquitin-conjugating enzymes UbcH7 and UbcH8, but not with UbcH5. It is involved in ubiquitination and degradation of p21, a p53 downstream protein promoting growth arrest and antagonizing apoptosis, suggesting a role in switching a cell from p53-mediated growth arrest to apoptosis. Moreover, RNF144B regulates the levels of Bax, a pro-apoptotic protein from the Bcl-2 family, and protects cells from unprompted Bax activation and cell death. It also regulates epithelial homeostasis by mediating degradation of p21WAF1 and p63. Both RNF144A and RNF144B contain an RBR domain followed by a potential single-TM domain. The RBR domain was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. This model corresponds to the Rcat domain of the RNF144 protein subfamily that is essential for RBR E3 ligase activity and adopts the same fold as the BRcat domain. — an NCBI CDD conserved domain (cd20352); members share this curated model.
