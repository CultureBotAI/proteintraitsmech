identifier: CDD:cd19449
label: "fatty acid-binding protein ReP1-NCXSQ and similar proteins. Arthropod ReP1-NCXSQ (regulatory protein of the squid nerve sodium calcium exchanger) is required for MgATP stimulation of the squid nerve Na(+)/Ca(2+) exchanger NCXSQ1. ReP1-NCXSQ acts as a carrier of fatty acids; is possible that its biological ligand is palmitic acid, which is abundant in squid axons. The mechanism for fine-tuning of the regulation of NCXSQ1 by ReP1-NCXSQ may then involve the transport of palmitic acid. This subgroup belongs to the intracellular fatty acid-binding protein (FABP) family, members of which are small proteins that bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
