identifier: CDD:cd16609
label: "RING finger, HC subclass, found in tripartite motif-containing protein TRIM65 and similar proteins. TRIM65 is an E3 ubiquitin-protein ligase that interacts with the innate immune receptor MDA5, enhancing its ability to stimulate interferon-beta signaling. It functions as a potential oncogenic protein that negatively regulates p53 through ubiquitination, providing insight into the development of novel approaches targeting TRIM65 for non-small cell lung carcinoma (NSCLC) treatment, and also overcoming chemotherapy resistance. Moreover, TRIM65 negatively regulates microRNA-driven suppression of mRNA translation by targeting TNRC6 proteins for ubiquitination and degradation. TRIM65 belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain."
definition: >-
  RING finger, HC subclass, found in tripartite motif-containing protein TRIM65 and similar proteins. TRIM65 is an E3 ubiquitin-protein ligase that interacts with the innate immune receptor MDA5, enhancing its ability to stimulate interferon-beta signaling. It functions as a potential oncogenic protein that negatively regulates p53 through ubiquitination, providing insight into the development of novel approaches targeting TRIM65 for non-small cell lung carcinoma (NSCLC) treatment, and also overcoming chemotherapy resistance. Moreover, TRIM65 negatively regulates microRNA-driven suppression of mRNA translation by targeting TNRC6 proteins for ubiquitination and degradation. TRIM65 belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain. — an NCBI CDD conserved domain (cd16609); members share this curated model.
