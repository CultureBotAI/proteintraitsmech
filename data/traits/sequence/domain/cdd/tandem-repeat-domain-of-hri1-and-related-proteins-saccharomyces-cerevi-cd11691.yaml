identifier: CDD:cd11691
label: "Tandem repeat domain of HRI1 and related proteins. Saccharomyces cerevisiae Hri1p (Hrr25-interacting protein 1, YLR301w) is a non-essential gene product named for its interaction with the yeast protein kinase Hrr25p. It has also been characterized as an interaction partner for Sec72p, but does not seem to be required for protein translocation into the ER. It may be a cytosolic protein. Hri1p contains a tandem repeat of a structural unit that forms a beta-barrel with structural similarity to nitrobindin. The two repeats are sequence dissimilar, and the second (c-terminal) repeat is missing several strands, forming an incomplete barrel."
definition: >-
  Tandem repeat domain of HRI1 and related proteins. Saccharomyces cerevisiae Hri1p (Hrr25-interacting protein 1, YLR301w) is a non-essential gene product named for its interaction with the yeast protein kinase Hrr25p. It has also been characterized as an interaction partner for Sec72p, but does not seem to be required for protein translocation into the ER. It may be a cytosolic protein. Hri1p contains a tandem repeat of a structural unit that forms a beta-barrel with structural similarity to nitrobindin. The two repeats are sequence dissimilar, and the second (c-terminal) repeat is missing several strands, forming an incomplete barrel. — an NCBI CDD conserved domain (cd11691); members share this curated model.
