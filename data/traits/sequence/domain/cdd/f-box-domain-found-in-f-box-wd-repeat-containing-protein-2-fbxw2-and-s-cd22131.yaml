identifier: CDD:cd22131
label: "F-box domain found in F-box/WD repeat-containing protein 2 (FBXW2) and similar proteins. FBXW2, also called F-box and WD-40 domain-containing protein 2, or protein MD6, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It acts as a tumor suppressor by promoting SKP2 degradation. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box/WD repeat-containing protein 2 (FBXW2) and similar proteins. FBXW2, also called F-box and WD-40 domain-containing protein 2, or protein MD6, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It acts as a tumor suppressor by promoting SKP2 degradation. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22131); members share this curated model.
