identifier: CDD:cd19718
label: bHLH_TS_NGN3_ATOH5
definition: >-
  basic helix-loop-helix (bHLH) domain found in neurogenin-3 (NGN-3) and similar proteins. NGN-3, also termed Class A basic helix-loop-helix protein 7 (bHLHa7), or protein atonal homolog 5 (ATOH5), is a neural-specific bHLH transcription factor expressed in the developing central nervous system and the embryonic pancreas. It is involved in neurogenesis and plays an important role in spermatogenesis
