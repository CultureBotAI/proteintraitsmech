identifier: CDD:cd19824
label: "B-box-type 2 zinc finger  found in tripartite motif-containing protein 2 (TRIM2) and similar proteins. TRIM2, also known as RING finger protein 86 (RNF86), is an E3 ubiquitin-protein ligase that ubiquitinates the neurofilament light chain, a component of the intermediate filament in axons. Loss of function of TRIM2 results in early-onset axonal neuropathy. TRIM2 also plays a role in mediating the p42/p44 Semi-independent ubiquitination of the cell death-promoting protein Bcl-2-interacting mediator of cell death (Aim) in rapid ischemic tolerance. TRIM2 belongs to the C-VII subclass of TRIM (tripartite motif)-NHL family that is defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a RING finger, Bbox2, and a coiled coil domain, as well as a NHL (named after proteins NCL-1, HT2A and Lin-41 that contain repeats folded into a six-bladed beta propeller) repeat domain positioned C-terminal to the RBCC domain. The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif."
definition: >-
  B-box-type 2 zinc finger found in tripartite motif-containing protein 2 (TRIM2) and similar proteins. TRIM2, also known as RING finger protein 86 (RNF86), is an E3 ubiquitin-protein ligase that ubiquitinates the neurofilament light chain, a component of the intermediate filament in axons. Loss of function of TRIM2 results in early-onset axonal neuropathy. TRIM2 also plays a role in mediating the p42/p44 Semi-independent ubiquitination of the cell death-promoting protein Bcl-2-interacting mediator of cell death (Aim) in rapid ischemic tolerance. TRIM2 belongs to the C-VII subclass of TRIM (tripartite motif)-NHL family that is defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a RING finger, Bbox2, and a coiled coil domain, as well as a NHL (named after proteins NCL-1, HT2A and Lin-41 that contain repeats folded into a six-bladed beta propeller) repeat domain positioned C-terminal to the RBCC domain. The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif. — an NCBI CDD conserved domain (cd19824); members share this curated model.
