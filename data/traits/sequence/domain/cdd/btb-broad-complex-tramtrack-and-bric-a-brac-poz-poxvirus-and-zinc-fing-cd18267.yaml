identifier: CDD:cd18267
label: BTB_POZ_KLHL37_ENC1
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Ectoderm-neural cortex protein 1 (ENC-1). ENC-1 is also called Kelch-like protein 37 (KLHL37), nuclear matrix protein NRP/B, or p53-induced gene 10 protein. It is an actin-binding nuclear matrix protein that associates with p110(RB), and is involved in the regulation of neuronal process formation and in differentiation of neural crest cells. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids
