identifier: CDD:cd22343
label: "Uncharacterized nucleases similar to lambda phage exonuclease. This model characterizes a diverse set of nucleases such as alkaline exonuclease from Laribacter hongkongensis, lambda phage exonuclease, or a Cas4-like protein from the Mimivirus virophage resistance element system. They belong to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Uncharacterized nucleases similar to lambda phage exonuclease. This model characterizes a diverse set of nucleases such as alkaline exonuclease from Laribacter hongkongensis, lambda phage exonuclease, or a Cas4-like protein from the Mimivirus virophage resistance element system. They belong to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22343); members share this curated model.
