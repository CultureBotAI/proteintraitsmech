label: "nucleotide-binding domain (NBD) of Escherichia coli protein YjiL and similar proteins. The subfamily includes a group of uncharacterized proteins similar to Escherichia coli protein YjiL, which belongs to the BcrAD/BadFG-like ATPase family that also includes the BcrA/BadF/BzdQ and BcrD/BadG/BzdP proteins, which are subunits of benzoyl-CoA reductase that may be involved in ATP hydrolysis."
definition: >-
  nucleotide-binding domain (NBD) of Escherichia coli protein YjiL and similar proteins. The subfamily includes a group of uncharacterized proteins similar to Escherichia coli protein YjiL, which belongs to the BcrAD/BadFG-like ATPase family that also includes the BcrA/BadF/BzdQ and BcrD/BadG/BzdP proteins, which are subunits of benzoyl-CoA reductase that may be involved in ATP hydrolysis. — an NCBI CDD conserved domain (cd24109); members share this curated model.
