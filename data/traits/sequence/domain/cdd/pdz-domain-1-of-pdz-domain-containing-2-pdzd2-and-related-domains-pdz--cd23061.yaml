identifier: CDD:cd23061
label: "PDZ domain 1 of PDZ domain containing 2 (PDZD2), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 1 of PDZD2, also known as KIAA0300, PIN-1, PAPIN, activated in prostate cancer (AIPC) and PDZ domain-containing protein 3 (PDZK3). PDZD2 has seven PDZ domains. PDZD2 is expressed at exceptionally high levels in the pancreas and certain cancer tissues such as prostate cancer. It promotes the proliferation of insulinoma cells and is upregulated during prostate tumorigenesis. In osteosarcoma (OS), the microRNA miR-363 acts as a tumor suppressor by inhibiting PDZD2. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This PDZD2-like family PDZ1 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  PDZ domain 1 of PDZ domain containing 2 (PDZD2), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 1 of PDZD2, also known as KIAA0300, PIN-1, PAPIN, activated in prostate cancer (AIPC) and PDZ domain-containing protein 3 (PDZK3). PDZD2 has seven PDZ domains. PDZD2 is expressed at exceptionally high levels in the pancreas and certain cancer tissues such as prostate cancer. It promotes the proliferation of insulinoma cells and is upregulated during prostate tumorigenesis. In osteosarcoma (OS), the microRNA miR-363 acts as a tumor suppressor by inhibiting PDZD2. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This PDZD2-like family PDZ1 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd23061); members share this curated model.
