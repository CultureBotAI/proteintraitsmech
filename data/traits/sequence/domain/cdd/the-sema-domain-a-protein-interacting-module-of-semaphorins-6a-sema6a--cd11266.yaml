identifier: CDD:cd11266
label: "The Sema domain, a protein interacting module, of semaphorins 6A (Sema6A). In the cerebellum, Sema6A-plexin A2 signaling modulates granule cell migration by controlling centrosome positioning. Besides plexin A2, plexin A4 is also found to be a receptor of Sema6A.  Interactions between plexin A2, plexin A4, and Sema6A control lamina-restricted projection of hippocampal mossy fibers. It is required for the clustering of boundary cap cells at the PNS/CNS interface and thus, prevents motoneurons from streaming out of the ventral spinal cord. At the dorsal root entry site, it organizes the segregation of dorsal roots. Sema6A may also be involved in axonal pathfinding processes in the periinfarct and homotopic contralateral cortex. Sema6A is a member of the class 6 semaphorin family of proteins, which are membrane associated semaphorins. Semaphorins are regulatory molecules involved in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of semaphorins 6A (Sema6A). In the cerebellum, Sema6A-plexin A2 signaling modulates granule cell migration by controlling centrosome positioning. Besides plexin A2, plexin A4 is also found to be a receptor of Sema6A. Interactions between plexin A2, plexin A4, and Sema6A control lamina-restricted projection of hippocampal mossy fibers. It is required for the clustering of boundary cap cells at the PNS/CNS interface and thus, prevents motoneurons from streaming out of the ventral spinal cord. At the dorsal root entry site, it organizes the segregation of dorsal roots. Sema6A may also be involved in axonal pathfinding processes in the periinfarct and homotopic contralateral cortex. Sema6A is a member of the class 6 semaphorin family of proteins, which are membrane associated semaphorins. Semaphorins are regulatory molecules involved in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module. — an NCBI CDD conserved domain (cd11266); members share this curated model.
