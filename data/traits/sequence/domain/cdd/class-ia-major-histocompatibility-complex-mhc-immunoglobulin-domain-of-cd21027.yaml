identifier: CDD:cd21027
label: "Class Ia major histocompatibility complex (MHC) immunoglobulin domain of human leukocyte antigen (HLA) A; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the class Ia major histocompatibility complex (MHC) immunoglobulin domain of human leukocyte antigen (HLA) A. The classical class I molecules (HLA-A, -B, and -C) are responsible for the presentation of endogenous antigen to CD8+ T cells. The receptor is a heterodimer, and is composed of a heavy alpha chain and smaller beta chain. The alpha chain is encoded by a variant HLA-A gene, and the beta chain (beta-2-microglobulin) is an invariant beta-2-microglobulin molecule.  The beta-2-microglobulin protein is coded for by a separate region of the human genome. HLA-A2 is associated with spontaneous abortions, HIV, and Hodgkin lymphoma.  Class I molecules consist of a transmembrane alpha chain and a small chain called the beta-2-microglobulin. The alpha chain contains three extracellular domains, two of which fold together to form the peptide-binding cleft (alpha1 and alpha2), and one which has an Ig fold (alpha3).  Peptide binding to class I molecules occurs in the endoplasmic reticulum (ER) and involves both chaperones and dedicated factors to assist in peptide loading.  Class I MHC molecules are expressed on most nucleated cells."
definition: >-
  Class Ia major histocompatibility complex (MHC) immunoglobulin domain of human leukocyte antigen (HLA) A; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the class Ia major histocompatibility complex (MHC) immunoglobulin domain of human leukocyte antigen (HLA) A. The classical class I molecules (HLA-A, -B, and -C) are responsible for the presentation of endogenous antigen to CD8+ T cells. The receptor is a heterodimer, and is composed of a heavy alpha chain and smaller beta chain. The alpha chain is encoded by a variant HLA-A gene, and the beta chain (beta-2-microglobulin) is an invariant beta-2-microglobulin molecule. The beta-2-microglobulin protein is coded for by a separate region of the human genome. HLA-A2 is associated with spontaneous abortions, HIV, and Hodgkin lymphoma. Class I molecules consist of a transmembrane alpha chain and a small chain called the beta-2-microglobulin. The alpha chain contains three extracellular domains, two of which fold together to form the peptide-binding cleft (alpha1 and alpha2), and one which has an Ig fold (alpha3). Peptide binding to class I molecules occurs in the endoplasmic reticulum (ER) and involves both chaperones and dedicated factors to assist in peptide loading. Class I MHC molecules are expressed on most nucleated cells. — an NCBI CDD conserved domain (cd21027); members share this curated model.
