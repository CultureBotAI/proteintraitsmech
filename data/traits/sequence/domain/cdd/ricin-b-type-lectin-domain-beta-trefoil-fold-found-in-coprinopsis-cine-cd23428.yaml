identifier: CDD:cd23428
label: "ricin B-type lectin domain, beta-trefoil fold, found in Coprinopsis cinerea serine protease inhibitor 1 (PIC1) and similar proteins. PIC1, also called cospin, is a serine protease inhibitor that is active against beta-trypsin and alpha-chymotrypsin. This subfamily also includes Lentinula edodes serine protease inhibitor. In addition to beta-trypsin and alpha-chymotrypsin, it inhibits factor XIa, but not other enzymes involved in coagulation and fibrinolysis. It does not inhibit subtilisin, lysyl endopeptidase, arginyl endopeptidase or papain. Members of this family contain a ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a putative sugar-binding pocket. Protease inhibitors with the beta-trefoil fold may utilize their loops in various ways for the inhibition of serine proteases."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Coprinopsis cinerea serine protease inhibitor 1 (PIC1) and similar proteins. PIC1, also called cospin, is a serine protease inhibitor that is active against beta-trypsin and alpha-chymotrypsin. This subfamily also includes Lentinula edodes serine protease inhibitor. In addition to beta-trypsin and alpha-chymotrypsin, it inhibits factor XIa, but not other enzymes involved in coagulation and fibrinolysis. It does not inhibit subtilisin, lysyl endopeptidase, arginyl endopeptidase or papain. Members of this family contain a ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a putative sugar-binding pocket. Protease inhibitors with the beta-trefoil fold may utilize their loops in various ways for the inhibition of serine proteases. — an NCBI CDD conserved domain (cd23428); members share this curated model.
