identifier: CDD:cd20663
label: "cytochrome P450 family 2, subfamily D. Members of CYP2D are present in mammals, birds, reptiles, and amphibians. The hominin CYP2D subfamily consists of a functional CYP2D6 and two paralogs, CYP2D7 and CYP2D8, that are often not functional in some species. Human CYP2D6 has a high affinity for alkaloids and can detoxify them. It is also responsible for metabolizing about 25% of commonly used drugs, such as antidepressants, beta-blockers, and antiarrhythmics. The CYP2D subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 family 2, subfamily D. Members of CYP2D are present in mammals, birds, reptiles, and amphibians. The hominin CYP2D subfamily consists of a functional CYP2D6 and two paralogs, CYP2D7 and CYP2D8, that are often not functional in some species. Human CYP2D6 has a high affinity for alkaloids and can detoxify them. It is also responsible for metabolizing about 25% of commonly used drugs, such as antidepressants, beta-blockers, and antiarrhythmics. The CYP2D subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd20663); members share this curated model.
