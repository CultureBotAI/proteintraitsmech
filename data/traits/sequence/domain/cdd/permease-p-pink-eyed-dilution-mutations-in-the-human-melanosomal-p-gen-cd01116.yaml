identifier: CDD:cd01116
label: "Permease P (pink-eyed dilution). Mutations in the human melanosomal P gene were responsible for classic phenotype of oculocutaneous albinism type 2 (OCA2). Although the precise function of the P protein is unknown, it was predicted to regulate the intraorganelle pH, together with the ATP-driven proton pump. It shows significant sequence similarity to the Na+/H+ antiporter NhaD from Vibrio parahaemolyticus. Both proteins belong to ArsB/NhaD superfamily of permeases that translocate sodium, arsenate, sulfate, and organic anions across biological membranes in all three kingdoms of life.  A typical ArsB/NhaD permease contains 8-13 transmembrane domains."
definition: >-
  Permease P (pink-eyed dilution). Mutations in the human melanosomal P gene were responsible for classic phenotype of oculocutaneous albinism type 2 (OCA2). Although the precise function of the P protein is unknown, it was predicted to regulate the intraorganelle pH, together with the ATP-driven proton pump. It shows significant sequence similarity to the Na+/H+ antiporter NhaD from Vibrio parahaemolyticus. Both proteins belong to ArsB/NhaD superfamily of permeases that translocate sodium, arsenate, sulfate, and organic anions across biological membranes in all three kingdoms of life. A typical ArsB/NhaD permease contains 8-13 transmembrane domains. — an NCBI CDD conserved domain (cd01116); members share this curated model.
