identifier: CDD:cd18929
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in Max-associated protein 4 (Mad4) and similar proteins. Mad4, also termed Max dimerization protein 4, or Max dimerizer 4 (MXD4), or Class C basic helix-loop-helix protein 12 (bHLHc12), or Max-interacting transcriptional repressor MAD4, is a bHLHZip Max-interacting transcriptional repressor that suppresses c-myc dependent transformation and is expressed during neural and epidermal differentiation. It is regulated by a transcriptional repressor complex that contains Miz-1 and c-Myc."
definition: >-
  basic Helix-Loop-Helix-zipper (bHLHzip) domain found in Max-associated protein 4 (Mad4) and similar proteins. Mad4, also termed Max dimerization protein 4, or Max dimerizer 4 (MXD4), or Class C basic helix-loop-helix protein 12 (bHLHc12), or Max-interacting transcriptional repressor MAD4, is a bHLHZip Max-interacting transcriptional repressor that suppresses c-myc dependent transformation and is expressed during neural and epidermal differentiation. It is regulated by a transcriptional repressor complex that contains Miz-1 and c-Myc. — an NCBI CDD conserved domain (cd18929); members share this curated model.
