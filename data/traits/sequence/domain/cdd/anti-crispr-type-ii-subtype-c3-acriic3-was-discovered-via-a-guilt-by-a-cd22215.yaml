identifier: CDD:cd22215
label: AcrIIC3
definition: >-
  Anti-CRISPR type II subtype C3. AcrIIC3 was discovered via a guilt-by association (GBA) approach, which was based on the strong co-occurrence and clustering of acr and anti-CRISPR associated (aca) genes through proximity and homology searches. Subsequent structural and biochemical work has shown that AcrIIC3 binds opposite the active site on the HNH nuclease domain of Cas9 to inhibit its nuclease activity in an allosteric manner. AcrIIC3 employs a unique interface for HNH, which demonstrate the host specificity of AcrIIC3 that suggests potential applications in Cas9 control for gene editing. There is interest in engineered, light-dependent Acrs for optogenetic control of CRISPR-Cas9 systems; AcrIIC3-LOV2 hybrids (between AcrIIC3 and the LOV2 blue light sensory domain from Avena sativa) potently block Neisseria meningitidis Cas9 activity in mammalian cells in the dark, and permit robust genome editing at various endogenous loci upon blue light irradiation. Type IIC CRISPR-Cas systems are the simplest of the type II systems, employing only three Cas proteins, Cas9, Cas1, and Cas2. Almost all type II Acr proteins characterized to date directly interact with the Cas9 endonuclease, although by distinct mechanisms. The type II CRISPR/Cas subtype has a distinct crRNA-guided surveillance complex encoded by cas9 (formerly csn1), cas1, cas2, and csn2 (for type IIA) or cas4 (for type IIB) genes, and cas 9, cas1, cas2 (for type IIC) genes, all located in a single transcriptional unit directly upstream of the CRISPR locus. Cleavage of the DNA target in type II systems is carried out by Cas9 which is an RNA-guided double-stranded DNase with two independent nuclease domains, HNH and RuvC. Due to the reliance of the type II system on a single protein for function, Cas9 homologs derived from different subtypes and species have been utilized for numerous gene editing applications. CRISPR-Cas immune systems are used by certain prokaryotes and archaea to resist the invasion of foreign nucleic acids such as phages or plasmids. Anti-CRISPRs are small proteins which are the natural inhibitors for CRISPR-Cas systems; encoded on bacterial and archaeal viruses, they allow the virus to evade host CRISPR-Cas systems. The CRISPR-Cas-mediated adaptive immune response can be divided into three steps, including the acquisition of spacer derived from invading nucleic acids, crRNA processing, and target degradation. Theoretically, Acr proteins could suppress any step to disrupt the CRISPR-Cas system. Acr proteins are diverse with no common sequence or structural motif, and they inhibit a wide range of CRISPR-Cas systems with various inhibition mechanisms. CRISPR-Cas systems are divided into two classes (1 and 2) and six types (class 1: types I, III and IV; class 2: types II, V and VI). Class 2 systems employ a single multi-domain effector Cas9 protein complex that performs target recognition and cleavage. Acr families are named for their type and subtype which are numbered sequentially as they are discovered
