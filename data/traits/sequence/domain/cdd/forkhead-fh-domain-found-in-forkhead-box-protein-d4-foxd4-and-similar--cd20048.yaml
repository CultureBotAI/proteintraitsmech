identifier: CDD:cd20048
label: "Forkhead (FH) domain found in Forkhead box protein D4 (FOXD4) and similar proteins. FOXD4, also called Forkhead-related protein FKHL9, Forkhead-related transcription factor 5 (FREAC-5), or myeloid factor-alpha, is essential for establishing neural cell fate and for neuronal differentiation. The family also includes Forkhead box protein D4-like proteins, FOXD4L1-6. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein D4 (FOXD4) and similar proteins. FOXD4, also called Forkhead-related protein FKHL9, Forkhead-related transcription factor 5 (FREAC-5), or myeloid factor-alpha, is essential for establishing neural cell fate and for neuronal differentiation. The family also includes Forkhead box protein D4-like proteins, FOXD4L1-6. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20048); members share this curated model.
