identifier: CDD:cd18083
label: aTrm56-like
definition: >-
  archaeal tRNA (cytidine(56)-2'-O)-methyltransferase Trm56. Archaeal tRNA (cytidine(56)-2'-O)-methyltransferase Trm56 catalyzes the 2'-O-ribose methylation of cytidine at position 56 in tRNAs. Trm56 is a member of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot
