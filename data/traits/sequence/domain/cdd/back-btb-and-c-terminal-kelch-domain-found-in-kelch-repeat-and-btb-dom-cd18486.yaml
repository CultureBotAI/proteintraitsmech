identifier: CDD:cd18486
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch repeat and BTB domain-containing protein 13 (KBTBD13). KBTBD13 is a muscle-specific protein. Autosomal dominant mutations may cause nemaline myopathy (NEM); these disease-associated mutations are located in conserved Kelch repeats and are predicted to disrupt the beta-propeller structure. KBTBD13 may act as a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex that functions as a muscle specific ubiquitin ligase, and thereby implicate the ubiquitin proteasome pathway in the pathogenesis of KBTBD13-associated NEM."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch repeat and BTB domain-containing protein 13 (KBTBD13). KBTBD13 is a muscle-specific protein. Autosomal dominant mutations may cause nemaline myopathy (NEM); these disease-associated mutations are located in conserved Kelch repeats and are predicted to disrupt the beta-propeller structure. KBTBD13 may act as a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex that functions as a muscle specific ubiquitin ligase, and thereby implicate the ubiquitin proteasome pathway in the pathogenesis of KBTBD13-associated NEM. — an NCBI CDD conserved domain (cd18486); members share this curated model.
