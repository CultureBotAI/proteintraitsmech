identifier: CDD:cd07050
label: "ethanolamine utilization protein S (EutS), Bacterial Micro-Compartment (BMC) domain repeat 2. EutL proteins are homologs of the carboxysome shell protein. They are encoded within the eut operon and might be required for the formation of the outer shell of the bacterial eut polyhedral organelles which are involved in the cobalamin-dependent degradation of ethanolamine. Although it has been suggested that EutL might form hexamers and further assemble into the flat facets of the polyhedral outer shell of eut organelles at present no experimental evidence directly supports this view. EutL proteins contain two tandem BMC domains. This CD includes domain 2 (the second BMC domain of EutL)."
definition: >-
  ethanolamine utilization protein S (EutS), Bacterial Micro-Compartment (BMC) domain repeat 2. EutL proteins are homologs of the carboxysome shell protein. They are encoded within the eut operon and might be required for the formation of the outer shell of the bacterial eut polyhedral organelles which are involved in the cobalamin-dependent degradation of ethanolamine. Although it has been suggested that EutL might form hexamers and further assemble into the flat facets of the polyhedral outer shell of eut organelles at present no experimental evidence directly supports this view. EutL proteins contain two tandem BMC domains. This CD includes domain 2 (the second BMC domain of EutL). — an NCBI CDD conserved domain (cd07050); members share this curated model.
