identifier: CDD:cd21416
label: HDC_protein
definition: >-
  histidine decarboxylase (HDC) gene cluster protein. This model includes an uncharacterized histidine decarboxylase (HDC) gene cluster protein. Lactobacillus parabuchneri is one of the major causes of elevated histamine levels in cheese. Histamine positive strain FAM21731 from L. parabuchneri has been shown to contain a histidine decarboxylase gene cluster present on a genomic island, which seems to have undergone transfer within the same species as well as between other lactobacilli
