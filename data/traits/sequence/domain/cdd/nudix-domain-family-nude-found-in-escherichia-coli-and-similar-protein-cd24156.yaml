identifier: CDD:cd24156
label: "NUDIX domain family NudE found in Escherichia coli, and similar proteins. The adenosine nucleotide hydrolase NudE protein in Escherichia coli is a NUDIX hydrolase family member active against ADP ribose, NADH, AP2A and AP3A33, and is classified as a hydrolase (E.C. 3.6.1.-) based on gene annotations. It is an ADPRase (EC 3.6.1.13) catalyzes the hydrolysis of ADP-ribose to AMP and ribose-5-P. Like other members of the NUDIX hydrolase superfamily of enzymes, it is thought to require a divalent cation, such as Mg2+, for its activity. It also contains a 23-residue NUDIX motif (GX5EX7REUXEEXGU, where U = I, L or V) which functions as a metal binding site/catalytic site. In addition to the NUDIX motif, there are additional conserved amino acid residues, distal from the signature sequence, that correlate with substrate specificity. Members of the NUDIX hydrolase superfamily catalyze the hydrolysis of NUcleoside DIphosphates linked to other moieties, X. Enzymes belonging to this superfamily require a divalent cation, such as Mg2+ or Mn2+, for their activity and contain a highly conserved 23-residue NUDIX motif (GX5EX7REUXEEXGU, where U = I, L or V), which functions as a metal binding and catalytic site. Substrates of NUDIX hydrolases include intact and oxidatively damaged nucleoside triphosphates, dinucleoside polyphosphates, nucleotide-sugars and dinucleotide enzymes. These substrates are metabolites or cell signaling molecules that require regulation during different stages of the cell cycle or during periods of stress. In general, the role of the NUDIX hydrolase is to sanitize the nucleotide pools and to maintain cell viability, thereby serving as surveillance & \"house-cleaning\" enzymes. Substrate specificity is used to define families within the superfamily. Differences in substrate specificity are determined by the N-terminal extension or by residues in variable loop regions. Mechanistically, substrate hydrolysis occurs by a nucleophilic substitution reaction, with variation in the numbers and roles of divalent cations required."
definition: >-
  NUDIX domain family NudE found in Escherichia coli, and similar proteins. The adenosine nucleotide hydrolase NudE protein in Escherichia coli is a NUDIX hydrolase family member active against ADP ribose, NADH, AP2A and AP3A33, and is classified as a hydrolase (E.C. 3.6.1.-) based on gene annotations. It is an ADPRase (EC 3.6.1.13) catalyzes the hydrolysis of ADP-ribose to AMP and ribose-5-P. Like other members of the NUDIX hydrolase superfamily of enzymes, it is thought to require a divalent cation, such as Mg2+, for its activity. It also contains a 23-residue NUDIX motif (GX5EX7REUXEEXGU, where U = I, L or V) which functions as a metal binding site/catalytic site. In addition to the NUDIX motif, there are additional conserved amino acid residues, distal from the signature sequence, that correlate with substrate specificity. Members of the NUDIX hydrolase superfamily catalyze the hydrolysis of NUcleoside DIphosphates linked to other moieties, X. Enzymes belonging to this superfamily require a divalent cation, such as Mg2+ or Mn2+, for their activity and contain a highly conserved 23-residue NUDIX motif (GX5EX7REUXEEXGU, where U = I, L or V), which functions as a metal binding and catalytic site. Substrates of NUDIX hydrolases include intact and oxidatively damaged nucleoside triphosphates, dinucleoside polyphosphates, nucleotide-sugars and dinucleotide enzymes. These substrates are metabolites or cell signaling molecules that require regulation during different stages of the cell cycle or during periods of stress. In general, the role of the NUDIX hydrolase is to sanitize the nucleotide pools and to maintain cell viability, thereby serving as surveillance & "house-cleaning" enzymes. Substrate specificity is used to define families within the superfamily. Differences in substrate specificity are determined by the N-terminal extension or by residues in variable loop regions. Mechanistically, substrate hydrolysis occurs by a nucleophilic substitution reaction, with variation in the numbers and roles of divalent cations required. — an NCBI CDD conserved domain (cd24156); members share this curated model.
