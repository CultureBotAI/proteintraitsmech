identifier: CDD:cd17680
label: "RUN domain found in pleckstrin homology domain-containing family M member 2 (PLEKHM2) and similar proteins. PLEKHM2, also called PH domain-containing family M member 2, or Salmonella-induced filaments A (SifA) and Kinesin-Interacting Protein (SKIP), is the lysosome, melanosome and lytic granule cargo adaptor that controls lysosome positioning using a composite kinesin-1 heavy and light chain-binding domain. In addition to kinesin-1, it also interacts with several Rabs to affect endosomal trafficking. This model represents the RUN domain of PLEKHM2."
definition: >-
  RUN domain found in pleckstrin homology domain-containing family M member 2 (PLEKHM2) and similar proteins. PLEKHM2, also called PH domain-containing family M member 2, or Salmonella-induced filaments A (SifA) and Kinesin-Interacting Protein (SKIP), is the lysosome, melanosome and lytic granule cargo adaptor that controls lysosome positioning using a composite kinesin-1 heavy and light chain-binding domain. In addition to kinesin-1, it also interacts with several Rabs to affect endosomal trafficking. This model represents the RUN domain of PLEKHM2. — an NCBI CDD conserved domain (cd17680); members share this curated model.
