identifier: CDD:cd18952
label: "basic helix-loop-helix (bHLH) domain found in heart- and neural crest derivatives-expressed protein 1 (HAND1) and similar proteins. HAND1, also termed Class A basic helix-loop-helix protein 27 (bHLHa27), or extraembryonic tissues, heart, autonomic nervous system and neural crest derivatives-expressed protein 1 (eHAND), is a bHLH transcription factor that plays an essential role in both trophoblast-giant cells differentiation and in cardiac morphogenesis."
definition: >-
