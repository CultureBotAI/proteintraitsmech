identifier: CDD:cd21856
label: "Plk4-binding domain found in centrosomal protein of 192 kDa (Cep192) and similar proteins. Cep192, also called SPD-2, plays a critical role in mitotic centrosome maturation and bipolar spindle assembly. It appears to be a major regulator of pericentriolar material (PCM) recruitment and centriole duplication. It is a centrosome-specific activating scaffold for Aurora kinase A (AURKA) and polo-like kinase 1 (Plk1). Cep192 also plays a key role in centrosome recruitment of both Cep152 and Polo-like kinase 4 (Plk4). This model corresponds to a conserved region in Cep192 that is responsible for binding to the cryptic polo box (CPB) of Plk4."
definition: >-
  Plk4-binding domain found in centrosomal protein of 192 kDa (Cep192) and similar proteins. Cep192, also called SPD-2, plays a critical role in mitotic centrosome maturation and bipolar spindle assembly. It appears to be a major regulator of pericentriolar material (PCM) recruitment and centriole duplication. It is a centrosome-specific activating scaffold for Aurora kinase A (AURKA) and polo-like kinase 1 (Plk1). Cep192 also plays a key role in centrosome recruitment of both Cep152 and Polo-like kinase 4 (Plk4). This model corresponds to a conserved region in Cep192 that is responsible for binding to the cryptic polo box (CPB) of Plk4. — an NCBI CDD conserved domain (cd21856); members share this curated model.
