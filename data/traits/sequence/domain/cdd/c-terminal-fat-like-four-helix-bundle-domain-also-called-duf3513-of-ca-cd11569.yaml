identifier: CDD:cd11569
label: "C-terminal FAT-like Four helix bundle domain, also called DUF3513, of CAS (Crk-Associated Substrate) scaffolding protein, Breast Cancer Anti-estrogen Resistance 1; a protein interaction module. BCAR1, also called p130cas or CASS1, is the founding member of the CAS family of scaffolding proteins and was originally identified through its ability to associate with Crk. The name BCAR1 was designated because the human gene was identified in a screen for genes that promote resistance to tamoxifen. It is widely expressed and its deletion is lethal in mice. It plays a role in regulating cell motility, survival, proliferation, transformation, cancer progression, and bacterial pathogenesis. CAS proteins function as molecular scaffolds to regulate protein complexes that are involved in many cellular processes. They share a common domain structure containing protein interaction modules that enable their scaffolding function, including an N-terminal SH3 domain, an unstructured substrate domain that contains many YxxP motifs, a serine-rich four-helix bundle, and a FAT-like C-terminal domain, which binds to the C-terminal domain of NSPs (novel SH2-containing proteins) to form multidomain signaling modules that mediate cell migration and invasion."
