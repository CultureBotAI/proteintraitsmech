identifier: CDD:cd24031
label: "nucleotide-binding domain (NBD) of the Kae1/TsaD family tRNA N6-adenosine threonylcarbamoyltransferase. tRNA N6-adenosine threonylcarbamoyltransferase (EC 2.3.1.234), also called N6-L-threonylcarbamoyladenine synthase, t(6)A synthase, t(6)A37 threonylcarbamoyladenosine biosynthesis protein, or tRNA threonylcarbamoyladenosine biosynthesis protein, is required for the formation of a threonylcarbamoyl group on adenosine at position 37 (t(6)A37) in tRNAs that read codons beginning with adenine. It is involved in the transfer of the threonylcarbamoyl moiety of threonylcarbamoyl-AMP (TC-AMP) to the N6 group of A37. The family includes different orthologous of tRNA N6-adenosine threonylcarbamoyltransferase, such as bacterial kinase-associated endopeptidase 1 (Kae1) and TsaD (also known as YgjD) protein, mammalian O-sialoglycoprotein endopeptidase (OSGEP) and yeast protein Kae1, as well as mammalian OSGEP-like protein 1 (OSGEPL1) and yeast protein Qri7, which are the mitochondrial versions of the universal Kae1/TsaD (also known as YgjD) protein and essential for mitochondrial genome maintenance."
definition: >-
  nucleotide-binding domain (NBD) of the Kae1/TsaD family tRNA N6-adenosine threonylcarbamoyltransferase. tRNA N6-adenosine threonylcarbamoyltransferase (EC 2.3.1.234), also called N6-L-threonylcarbamoyladenine synthase, t(6)A synthase, t(6)A37 threonylcarbamoyladenosine biosynthesis protein, or tRNA threonylcarbamoyladenosine biosynthesis protein, is required for the formation of a threonylcarbamoyl group on adenosine at position 37 (t(6)A37) in tRNAs that read codons beginning with adenine. It is involved in the transfer of the threonylcarbamoyl moiety of threonylcarbamoyl-AMP (TC-AMP) to the N6 group of A37. The family includes different orthologous of tRNA N6-adenosine threonylcarbamoyltransferase, such as bacterial kinase-associated endopeptidase 1 (Kae1) and TsaD (also known as YgjD) protein, mammalian O-sialoglycoprotein endopeptidase (OSGEP) and yeast protein Kae1, as well as mammalian OSGEP-like protein 1 (OSGEPL1) and yeast protein Qri7, which are the mitochondrial versions of the universal Kae1/TsaD (also known as YgjD) protein and essential for mitochondrial genome maintenance. — an NCBI CDD conserved domain (cd24031); members share this curated model.
