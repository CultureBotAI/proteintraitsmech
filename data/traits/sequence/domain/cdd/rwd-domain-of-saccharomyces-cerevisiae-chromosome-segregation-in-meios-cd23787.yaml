identifier: CDD:cd23787
label: "RWD domain of Saccharomyces cerevisiae chromosome segregation in meiosis protein 1 (CSM1) and related proteins. Saccharomyces cerevisiae CSM1 is a component of the monopolin complex which promotes monoorientation during meiosis I, required for chromosome segregation during meiosis. It also plays a mitotic role in DNA replication. The family also includes Schizosaccharomyces pombe chromosome segregation protein 1 (PCS1), which is a component of a monopolin-like complex composed of PCS1 and MDE4. The PCS1/MDE4 complex associates with the kinetochore and is essential for accurate chromosome segregation during mitosis and meiosis II. PCS1 may clamp together microtubule binding sites on the same kinetochore, preventing merotelic attachment of microtubules. In contrast to its S. cerevisiae ortholog CSM1, PCS1 is not required for mono-orientation during meiosis I."
definition: >-
  RWD domain of Saccharomyces cerevisiae chromosome segregation in meiosis protein 1 (CSM1) and related proteins. Saccharomyces cerevisiae CSM1 is a component of the monopolin complex which promotes monoorientation during meiosis I, required for chromosome segregation during meiosis. It also plays a mitotic role in DNA replication. The family also includes Schizosaccharomyces pombe chromosome segregation protein 1 (PCS1), which is a component of a monopolin-like complex composed of PCS1 and MDE4. The PCS1/MDE4 complex associates with the kinetochore and is essential for accurate chromosome segregation during mitosis and meiosis II. PCS1 may clamp together microtubule binding sites on the same kinetochore, preventing merotelic attachment of microtubules. In contrast to its S. cerevisiae ortholog CSM1, PCS1 is not required for mono-orientation during meiosis I. — an NCBI CDD conserved domain (cd23787); members share this curated model.
