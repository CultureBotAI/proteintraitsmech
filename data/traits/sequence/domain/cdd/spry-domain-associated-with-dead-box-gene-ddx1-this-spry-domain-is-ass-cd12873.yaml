identifier: CDD:cd12873
label: "SPRY domain associated with DEAD box gene DDX1. This SPRY domain is associated with the DEAD box gene, DDX1, an RNA-dependent ATPase involved in HIV-1 Rev function and virus replication. It is suggested that DDX1 acts as a cellular cofactor by promoting oligomerization of Rev on the Rev response element (RRE). DDX1 RNA is overexpressed in breast cancer, data showing a strong and independent association between poor prognosis and deregulation of the DEAD box protein DDX1, thus potentially serving as an effective prognostic biomarker for early recurrence in primary breast cancer. DDX1 also interacts with RelA and enhances nuclear factor kappaB-mediated transcription. DEAD-box proteins are associated with all levels of RNA metabolism and function, and have been implicated in translation initiation, transcription, RNA splicing, ribosome assembly, RNA transport, and RNA decay."
definition: >-
  SPRY domain associated with DEAD box gene DDX1. This SPRY domain is associated with the DEAD box gene, DDX1, an RNA-dependent ATPase involved in HIV-1 Rev function and virus replication. It is suggested that DDX1 acts as a cellular cofactor by promoting oligomerization of Rev on the Rev response element (RRE). DDX1 RNA is overexpressed in breast cancer, data showing a strong and independent association between poor prognosis and deregulation of the DEAD box protein DDX1, thus potentially serving as an effective prognostic biomarker for early recurrence in primary breast cancer. DDX1 also interacts with RelA and enhances nuclear factor kappaB-mediated transcription. DEAD-box proteins are associated with all levels of RNA metabolism and function, and have been implicated in translation initiation, transcription, RNA splicing, ribosome assembly, RNA transport, and RNA decay. — an NCBI CDD conserved domain (cd12873); members share this curated model.
