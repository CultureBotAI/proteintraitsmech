identifier: CDD:cd18636
label: "chromodomain of chromodomain-containing protein 1, and similar proteins. CHRomatin Organization Modifier (chromo) domain of chromodomain-containing protein 1 (CHp1), and similar proteins. Chp1 is needed for RNA interference-dependent heterochromatin formation in fission yeast. Chp1 is a member of the RNA-induced transcriptional silencing (RITS) complex which maintains the heterochromatin regions. The chromodomain of the Chp1 component binds the histone H3 lysine 9 methylated tail (H3K9me) and the core of the nucleosome. A chromodomain is a conserved region of about 50 amino acids, found in a variety of chromosomal proteins, and which appears to play a role in the functional organization of the eukaryotic nucleus. The chromodomain is implicated in the binding, of the proteins in which it is found, to methylated histone tails and maybe RNA. A chromodomain may occur as a single instance, in a tandem arrangement, or followed by a related chromo shadow domain."
