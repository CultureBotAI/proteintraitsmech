identifier: CDD:cd06381
label: "N-terminal leucine-isoleucine-valine binding protein (LIVBP)-like domain of an orphan family of delta receptors, GluRdelta1 and GluRdelta2. This CD represents the N-terminal leucine-isoleucine-valine binding protein (LIVBP)-like domain of an orphan family of delta receptors, GluRdelta1 and GluRdelta2. While this N-terminal domain belongs to the periplasmic-binding fold type 1 superfamily, the glutamate-binding domain of the iGluR is structurally homologous to the periplasmic-binding fold type 2. The LIVBP-like domain of iGluRs is thought to play a role in the initial assembly of iGluR subunits, but it is not well understood how this domain is arranged and functions in intact iGluR. Although the delta receptors are a member of the ionotropic glutamate receptor family, they cannot be activated by AMPA, kainate, NMDA, glutamate, or any other ligands. Phylogenetic analysis shows that both GluRdelta1 and GluRalpha2 are more homologous to non-NMDA receptors. GluRdelta2 was shown to function as an AMPA-like receptor by mutation analysis. Moreover, targeted disruption of GluRdelta2 gene caused motor coordination impairment, Purkinje cell maturation, and long-term depression of synaptic transmission. It has been suggested that GluRdelta2 is the receptor for cerebellin 1, a glycoprotein of the Clq, and the tumor necrosis factor family which is secreted from cerebellar granule cells. Furthermore, recent studies have shown that the orphan GluRdelta1 plays an essential role in high-frequency hearing and ionic homeostasis in the basal cochlea and that the locus encoding GluRdelta1 may be involved in congenial or acquired high-frequency hearing loss in humans."
definition: >-
  N-terminal leucine-isoleucine-valine binding protein (LIVBP)-like domain of an orphan family of delta receptors, GluRdelta1 and GluRdelta2. This CD represents the N-terminal leucine-isoleucine-valine binding protein (LIVBP)-like domain of an orphan family of delta receptors, GluRdelta1 and GluRdelta2. While this N-terminal domain belongs to the periplasmic-binding fold type 1 superfamily, the glutamate-binding domain of the iGluR is structurally homologous to the periplasmic-binding fold type 2. The LIVBP-like domain of iGluRs is thought to play a role in the initial assembly of iGluR subunits, but it is not well understood how this domain is arranged and functions in intact iGluR. Although the delta receptors are a member of the ionotropic glutamate receptor family, they cannot be activated by AMPA, kainate, NMDA, glutamate, or any other ligands. Phylogenetic analysis shows that both GluRdelta1 and GluRalpha2 are more homologous to non-NMDA receptors. GluRdelta2 was shown to function as an AMPA-like receptor by mutation analysis. Moreover, targeted disruption of GluRdelta2 gene caused motor coordination impairment, Purkinje cell maturation, and long-term depression of synaptic transmission. It has been suggested that GluRdelta2 is the receptor for cerebellin 1, a glycoprotein of the Clq, and the tumor necrosis factor family which is secreted from cerebellar granule cells. Furthermore, recent studies have shown that the orphan GluRdelta1 plays an essential role in high-frequency hearing and ionic homeostasis in the basal cochlea and that the locus encoding GluRdelta1 may be involved in congenial or acquired high-frequency hearing loss in humans. — an NCBI CDD conserved domain (cd06381); members share this curated model.
