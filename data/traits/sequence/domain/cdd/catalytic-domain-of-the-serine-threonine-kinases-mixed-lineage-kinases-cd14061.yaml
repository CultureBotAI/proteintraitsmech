identifier: CDD:cd14061
label: "Catalytic domain of the Serine/Threonine Kinases, Mixed Lineage Kinases. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MLKs act as mitogen-activated protein kinase kinase kinases (MAP3Ks, MKKKs, MAPKKKs), which phosphorylate and activate MAPK kinases (MAPKKs or MKKs or MAP2Ks), which in turn phosphorylate and activate MAPKs during signaling cascades that are important in mediating cellular responses to extracellular signals. Mammals have four MLKs (MLK1-4), mostly conserved in vertebrates, which contain an SH3 domain, a catalytic kinase domain, a leucine zipper, a proline-rich region, and a CRIB domain that mediates binding to GTP-bound Cdc42 and Rac. MLKs play roles in immunity and inflammation, as well as in cell death, proliferation, and cell cycle regulation. The MLK subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinases, Mixed Lineage Kinases. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MLKs act as mitogen-activated protein kinase kinase kinases (MAP3Ks, MKKKs, MAPKKKs), which phosphorylate and activate MAPK kinases (MAPKKs or MKKs or MAP2Ks), which in turn phosphorylate and activate MAPKs during signaling cascades that are important in mediating cellular responses to extracellular signals. Mammals have four MLKs (MLK1-4), mostly conserved in vertebrates, which contain an SH3 domain, a catalytic kinase domain, a leucine zipper, a proline-rich region, and a CRIB domain that mediates binding to GTP-bound Cdc42 and Rac. MLKs play roles in immunity and inflammation, as well as in cell death, proliferation, and cell cycle regulation. The MLK subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14061); members share this curated model.
