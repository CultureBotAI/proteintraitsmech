identifier: CDD:cd08534
label: "Sterile alpha motif (SAM)/Pointed domain of GA-binding protein (GABP) alpha chain. SAM Pointed domain of GA-binding protein (GABP) alpha subfamily of ETS transcriptional regulators is a putative protein-protein interaction domain. This type of transcriptional regulators forms heterotetramers containing two alpha and two beta subunits.  It interacts with GA repeats (purine rich repeats). GABP transcriptional factors control gene expression in cell cycle control, apoptosis, and cellular respiration. GABP participates in regulation of transmembrane receptors and key hormones especially in myeloid cells and at the neuromuscular junction."
definition: >-
