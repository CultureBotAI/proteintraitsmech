identifier: CDD:cd16915
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli K-12 DpiB, DcuS, and Bacillus subtilis CitS, DctS, and YufL. This family includes histidine kinase-like ATPase domains of Escherichia coli K-12 DpiB and DcuS, and Bacillus subtilis CitS, DctS and MalK histidine kinases (HKs) all of which are two component transduction systems (TCSs). E. coli K-12 DpiB (also known as CitA) is the histidine kinase (HK) of DpiA-DpiB, a two-component signal transduction system (TCS) required for the expression of citrate-specific fermentation genes and genes involved in plasmid inheritance. E. coli K-12 DcuS (also known as YjdH) is the HK of DcuS-DcuR, a TCS that in the presence of the extracellular C4-dicarboxlates, activates the expression of the genes of anaerobic fumarate respiration and of aerobic C4-dicarboxylate uptake. CitS is the HK of Bacillus subtilis CitS-CitT, a TCS which regulates expression of CitM, the Mg-citrate transporter. Bacillus subtilis DctS forms a tripartite sensor unit (DctS/DctA/DctB) for sensing C4 dicarboxylates.  Bacillus subtilis MalK (also known as YfuL) is the HK of MalK-MalR (YufL-YufM) a TCS which regulates the expression of the malate transporters MaeN (YufR) and YflS, and is essential for utilization of malate in minimal medium. Proteins having this DpiB-CitA-like HATPase domain generally have sensor domains such as Cache and PAS, and a histidine kinase A (HisKA)-like SpoOB-type, alpha-helical domain."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli K-12 DpiB, DcuS, and Bacillus subtilis CitS, DctS, and YufL. This family includes histidine kinase-like ATPase domains of Escherichia coli K-12 DpiB and DcuS, and Bacillus subtilis CitS, DctS and MalK histidine kinases (HKs) all of which are two component transduction systems (TCSs). E. coli K-12 DpiB (also known as CitA) is the histidine kinase (HK) of DpiA-DpiB, a two-component signal transduction system (TCS) required for the expression of citrate-specific fermentation genes and genes involved in plasmid inheritance. E. coli K-12 DcuS (also known as YjdH) is the HK of DcuS-DcuR, a TCS that in the presence of the extracellular C4-dicarboxlates, activates the expression of the genes of anaerobic fumarate respiration and of aerobic C4-dicarboxylate uptake. CitS is the HK of Bacillus subtilis CitS-CitT, a TCS which regulates expression of CitM, the Mg-citrate transporter. Bacillus subtilis DctS forms a tripartite sensor unit (DctS/DctA/DctB) for sensing C4 dicarboxylates. Bacillus subtilis MalK (also known as YfuL) is the HK of MalK-MalR (YufL-YufM) a TCS which regulates the expression of the malate transporters MaeN (YufR) and YflS, and is essential for utilization of malate in minimal medium. Proteins having this DpiB-CitA-like HATPase domain generally have sensor domains such as Cache and PAS, and a histidine kinase A (HisKA)-like SpoOB-type, alpha-helical domain. — an NCBI CDD conserved domain (cd16915); members share this curated model.
