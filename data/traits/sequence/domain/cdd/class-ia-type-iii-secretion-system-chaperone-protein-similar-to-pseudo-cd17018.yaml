identifier: CDD:cd17018
label: T3SC_IA_ExsC-like
definition: >-
  Class IA type III secretion system chaperone protein, similar to Pseudomonas aeruginosa exoenzyme S synthesis protein C (ExsC). This family includes type III secretion system (T3SS) chaperone proteins similar to Pseudomonas aeruginosa and Aeromonas hydrophila ExsC (also known as exoenzyme S synthesis protein C). P. aeruginosa ExsC, a member of the type IA family of T3SS chaperones, is unique because, as part of the signaling process, it binds small secreted protein ExsE as well as the non-secreted anti-activator protein ExsD; it relieves repression of the transcriptional activator ExsA (which activates expression of T3SS genes) by ExsD. However, in Aeromonas, although ExsA is likely the master regulator of the T3SS, there is little evidence of ExsC and ExsE involvement in the regulation of the T3SS
