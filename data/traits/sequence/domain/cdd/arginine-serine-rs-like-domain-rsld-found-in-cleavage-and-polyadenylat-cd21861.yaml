identifier: CDD:cd21861
label: "arginine/serine (RS)-like domain (RSLD) found in cleavage and polyadenylation specificity factor subunit 6 (CPSF6) and similar proteins. CPSF6, also called cleavage and polyadenylation specificity factor 68 kDa subunit, or CPSF 68 kDa subunit, or cleavage factor Im complex 68 kDa subunit (CFIm68), or pre-mRNA cleavage factor Im 68 kDa subunit, or protein HPBRII-4/7, is a component of the cleavage factor Im (CFIm) complex that functions as an activator of the pre-mRNA 3'-end cleavage and polyadenylation processing required for the maturation of pre-mRNA into functional mRNAs. CPSF6 enhances NUDT21/CPSF5 binding to 5'-UGUA-3' elements localized upstream of pA signals and promotes RNA looping, and hence activates directly the mRNA 3'-processing machinery. It plays a role in mRNA export. CPSF6 harbors a Pro-rich domain (PRD) situated between an N-terminal RRM and C-terminal arginine/serine (RS)-like domain (RSLD). The model corresponds to RSLD domain that is enriched in Arg-Asp/Glu repeats and mediates TNPO3 binding."
definition: >-
  arginine/serine (RS)-like domain (RSLD) found in cleavage and polyadenylation specificity factor subunit 6 (CPSF6) and similar proteins. CPSF6, also called cleavage and polyadenylation specificity factor 68 kDa subunit, or CPSF 68 kDa subunit, or cleavage factor Im complex 68 kDa subunit (CFIm68), or pre-mRNA cleavage factor Im 68 kDa subunit, or protein HPBRII-4/7, is a component of the cleavage factor Im (CFIm) complex that functions as an activator of the pre-mRNA 3'-end cleavage and polyadenylation processing required for the maturation of pre-mRNA into functional mRNAs. CPSF6 enhances NUDT21/CPSF5 binding to 5'-UGUA-3' elements localized upstream of pA signals and promotes RNA looping, and hence activates directly the mRNA 3'-processing machinery. It plays a role in mRNA export. CPSF6 harbors a Pro-rich domain (PRD) situated between an N-terminal RRM and C-terminal arginine/serine (RS)-like domain (RSLD). The model corresponds to RSLD domain that is enriched in Arg-Asp/Glu repeats and mediates TNPO3 binding. — an NCBI CDD conserved domain (cd21861); members share this curated model.
