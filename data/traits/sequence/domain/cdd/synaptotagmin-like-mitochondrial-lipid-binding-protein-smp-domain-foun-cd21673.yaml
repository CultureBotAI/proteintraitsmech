identifier: CDD:cd21673
label: "synaptotagmin-like mitochondrial-lipid-binding protein (SMP) domain found in mitochondrial distribution and morphology protein 34 (Mdm34) and similar proteins. Mitochondrial distribution and morphology protein 34 (Mdm34), also called mitochondrial outer membrane protein 2 (Mmm2), is a mitochondrial outer membrane protein required for yeast mitochondrial shape and maintenance of mtDNA nucleoids. It is a component of the ERMES/Mdm complex, which serves as a molecular tether to connect the endoplasmic reticulum (ER) and mitochondria. Components of this complex are involved in the control of mitochondrial shape and protein biogenesis, and function in nonvesicular lipid trafficking between the ER and mitochondria. Mdm34 is essential for the interaction of the ER-resident membrane protein Mmm1 and the outer mitochondrial membrane-resident beta-barrel protein Mdm10. This model corresponds to the SMP domain of Mdm34, which may be implicated in lipid transport."
definition: >-
  synaptotagmin-like mitochondrial-lipid-binding protein (SMP) domain found in mitochondrial distribution and morphology protein 34 (Mdm34) and similar proteins. Mitochondrial distribution and morphology protein 34 (Mdm34), also called mitochondrial outer membrane protein 2 (Mmm2), is a mitochondrial outer membrane protein required for yeast mitochondrial shape and maintenance of mtDNA nucleoids. It is a component of the ERMES/Mdm complex, which serves as a molecular tether to connect the endoplasmic reticulum (ER) and mitochondria. Components of this complex are involved in the control of mitochondrial shape and protein biogenesis, and function in nonvesicular lipid trafficking between the ER and mitochondria. Mdm34 is essential for the interaction of the ER-resident membrane protein Mmm1 and the outer mitochondrial membrane-resident beta-barrel protein Mdm10. This model corresponds to the SMP domain of Mdm34, which may be implicated in lipid transport. — an NCBI CDD conserved domain (cd21673); members share this curated model.
