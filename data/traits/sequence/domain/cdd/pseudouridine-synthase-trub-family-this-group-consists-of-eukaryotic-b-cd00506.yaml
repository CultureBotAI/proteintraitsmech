identifier: CDD:cd00506
label: "Pseudouridine synthase, TruB family. This group consists of eukaryotic, bacterial and archeal pseudouridine synthases similar to Escherichia coli TruB, Saccharomyces cerevisiae Pus4, M.  tuberculosis TruB, S. cerevisiae Cbf5 and human dyskerin. Pseudouridine synthases catalyze the isomerization of specific uridines in an RNA molecule to pseudouridines (5-ribosyluracil, psi). No cofactors are required.  E. coli TruB, M.  tuberculosis TruB and S. cerevisiae Pus4,  make psi55 in the T loop of tRNAs. Pus4 catalyses the formation of psi55 in both cytoplasmic and mitochondrial tRNAs. Psi55 is almost universally conserved. S. cerevisiae Cbf5 and human dyskerin are nucleolar proteins that, with the help of guide RNAs, make the hundreds of psueudouridnes present in rRNA and small nuclear RNAs (snRNAs).  Cbf5/Dyskerin is the catalytic subunit of eukaryotic box H/ACA small nucleolar ribonucleoprotein (snoRNP) particles. Mutations in human dyskerin cause X-linked dyskeratosis congenitas."
definition: >-
  Pseudouridine synthase, TruB family. This group consists of eukaryotic, bacterial and archeal pseudouridine synthases similar to Escherichia coli TruB, Saccharomyces cerevisiae Pus4, M. tuberculosis TruB, S. cerevisiae Cbf5 and human dyskerin. Pseudouridine synthases catalyze the isomerization of specific uridines in an RNA molecule to pseudouridines (5-ribosyluracil, psi). No cofactors are required. E. coli TruB, M. tuberculosis TruB and S. cerevisiae Pus4, make psi55 in the T loop of tRNAs. Pus4 catalyses the formation of psi55 in both cytoplasmic and mitochondrial tRNAs. Psi55 is almost universally conserved. S. cerevisiae Cbf5 and human dyskerin are nucleolar proteins that, with the help of guide RNAs, make the hundreds of psueudouridnes present in rRNA and small nuclear RNAs (snRNAs). Cbf5/Dyskerin is the catalytic subunit of eukaryotic box H/ACA small nucleolar ribonucleoprotein (snoRNP) particles. Mutations in human dyskerin cause X-linked dyskeratosis congenitas. — an NCBI CDD conserved domain (cd00506); members share this curated model.
