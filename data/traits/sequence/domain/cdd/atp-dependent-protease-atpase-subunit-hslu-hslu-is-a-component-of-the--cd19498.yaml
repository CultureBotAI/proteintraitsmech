identifier: CDD:cd19498
label: "ATP-dependent protease ATPase subunit HslU. HslU is a component of the ATP-dependent protease HslVU. In HslVU, HslU ATPase serves to unfold and translocate protein substrate, and the HslV protease degrades the unfolded proteins. This RecA-like_HslU subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
definition: >-
  ATP-dependent protease ATPase subunit HslU. HslU is a component of the ATP-dependent protease HslVU. In HslVU, HslU ATPase serves to unfold and translocate protein substrate, and the HslV protease degrades the unfolded proteins. This RecA-like_HslU subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion. — an NCBI CDD conserved domain (cd19498); members share this curated model.
