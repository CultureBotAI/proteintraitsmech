label: C_C_bond_hyd
definition: >-
  Carbon-carbon bond hydrolase. The Carbon-Carbon bond hydrolase family of alpha/beta hydrolases includes the meta-cleavage compound hydrolases, 2-hydroxy-6-oxo-6-phenylhexa- 2,4-dienoate hydrolase (BPHD), and 2-Hydroxy-6-keto-nona-2,4-diene- 1,9-dioic acid 5,6-hydrolase (MhpC). BPHD is the fourth enzyme in the biphenyl catabolic (Bph) pathway, which is responsible for degradation of polychlorinated biphenyls (PCBs). BphD catalyzesl carbon-carbon bond hydrolysis of 2-hydroxy-6-oxo-6-phenylhexa-2,4-dienoic acid (HOPDA), an uncommon reaction in which the substrate is subject to histidine-mediated enol-keto tautomerization prior to hydrolysis. Bacterial MhpC is part of the phenylpropionate degradation pathway, where it functions as a homodimer
