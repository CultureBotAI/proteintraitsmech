identifier: CDD:cd06361
label: "ligand-binding domain of the promiscuous L-alpha-amino acid receptor GPRC6A which is a broad-spectrum amino acid-sensing receptor. This family includes the ligand-binding domain of the promiscuous L-alpha-amino acid receptor GPRC6A which is a broad-spectrum amino acid-sensing receptor, and its fish homolog, the 5.24 chemoreceptor. GPRC6A is a member of the family C of G-protein-coupled receptors that transduce extracellular signals into G-protein activation and ultimately into cellular responses."
definition: >-
