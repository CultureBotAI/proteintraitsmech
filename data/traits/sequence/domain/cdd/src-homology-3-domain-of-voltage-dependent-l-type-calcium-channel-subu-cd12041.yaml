identifier: CDD:cd12041
label: "Src Homology 3 domain of Voltage-dependent L-type calcium channel subunit beta-1. The beta1 subunit of voltage-dependent calcium channels (Ca(V)s) is one of four beta subunits present in vertebrates. It is the only beta subunit, as the beta1a variant, expressed in skeletal muscle; the beta1b variant is also widely expressed in other tissues including the heart and brain. Knockout of the beta1 gene in mice results in embryonic lethality, demonstrating its importance in development. Ca(V)s are multi-protein complexes that regulate the entry of calcium into cells. They impact muscle contraction, neuronal migration, hormone and neurotransmitter release, and the activation of calcium-dependent signaling pathways. They are composed of four subunits: alpha1, alpha2delta, beta, and gamma. The beta subunit is a soluble and intracellular protein that interacts with the transmembrane alpha1 subunit. It facilitates the trafficking and proper localization of the alpha1 subunit to the cellular plasma membrane. Vertebrates contain four different beta subunits from distinct genes (beta1-4); each exists as multiple splice variants. All are expressed in the brain while other tissues show more specific expression patterns. The beta subunits show similarity to MAGUK (membrane-associated guanylate kinase) proteins in that they contain SH3 and inactive guanylate kinase (GuK) domains; however, they do not appear to contain a PDZ domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Voltage-dependent L-type calcium channel subunit beta-1. The beta1 subunit of voltage-dependent calcium channels (Ca(V)s) is one of four beta subunits present in vertebrates. It is the only beta subunit, as the beta1a variant, expressed in skeletal muscle; the beta1b variant is also widely expressed in other tissues including the heart and brain. Knockout of the beta1 gene in mice results in embryonic lethality, demonstrating its importance in development. Ca(V)s are multi-protein complexes that regulate the entry of calcium into cells. They impact muscle contraction, neuronal migration, hormone and neurotransmitter release, and the activation of calcium-dependent signaling pathways. They are composed of four subunits: alpha1, alpha2delta, beta, and gamma. The beta subunit is a soluble and intracellular protein that interacts with the transmembrane alpha1 subunit. It facilitates the trafficking and proper localization of the alpha1 subunit to the cellular plasma membrane. Vertebrates contain four different beta subunits from distinct genes (beta1-4); each exists as multiple splice variants. All are expressed in the brain while other tissues show more specific expression patterns. The beta subunits show similarity to MAGUK (membrane-associated guanylate kinase) proteins in that they contain SH3 and inactive guanylate kinase (GuK) domains; however, they do not appear to contain a PDZ domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12041); members share this curated model.
