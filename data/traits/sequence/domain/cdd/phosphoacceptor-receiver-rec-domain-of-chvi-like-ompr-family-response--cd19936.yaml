identifier: CDD:cd19936
label: "phosphoacceptor receiver (REC) domain of ChvI-like OmpR family response regulators. Sinorhizobium meliloti ChvI is part of the ExoS/ChvI two-component regulatory system (TCS) that is required for nitrogen-fixing symbiosis and exopolysaccharide synthesis. ExoS/ChvI also play important roles in regulating biofilm formation, motility, nutrient utilization, and the viability of free-living bacteria. ChvI belongs to the OmpR family of DNA-binding response regulators that contain N-terminal receiver (REC) and C-terminal DNA-binding winged helix-turn-helix effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of ChvI-like OmpR family response regulators. Sinorhizobium meliloti ChvI is part of the ExoS/ChvI two-component regulatory system (TCS) that is required for nitrogen-fixing symbiosis and exopolysaccharide synthesis. ExoS/ChvI also play important roles in regulating biofilm formation, motility, nutrient utilization, and the viability of free-living bacteria. ChvI belongs to the OmpR family of DNA-binding response regulators that contain N-terminal receiver (REC) and C-terminal DNA-binding winged helix-turn-helix effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd19936); members share this curated model.
