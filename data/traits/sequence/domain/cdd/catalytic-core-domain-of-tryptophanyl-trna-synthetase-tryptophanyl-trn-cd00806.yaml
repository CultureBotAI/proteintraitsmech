identifier: CDD:cd00806
label: "catalytic core domain of tryptophanyl-tRNA synthetase. Tryptophanyl-tRNA synthetase (TrpRS) catalytic core domain. TrpRS is a homodimer which attaches Tyr to the appropriate tRNA. TrpRS is a class I tRNA synthetases, so it aminoacylates the 2'-OH of the nucleotide at the 3' end of the tRNA. The core domain is based on the Rossman fold and is responsible for the ATP-dependent formation of the enzyme bound aminoacyl-adenylate. It contains class I characteristic HIGH and KMSKS motifs, which are involved in ATP binding"
definition: >-
  catalytic core domain of tryptophanyl-tRNA synthetase. Tryptophanyl-tRNA synthetase (TrpRS) catalytic core domain. TrpRS is a homodimer which attaches Tyr to the appropriate tRNA. TrpRS is a class I tRNA synthetases, so it aminoacylates the 2'-OH of the nucleotide at the 3' end of the tRNA. The core domain is based on the Rossman fold and is responsible for the ATP-dependent formation of the enzyme bound aminoacyl-adenylate. It contains class I characteristic HIGH and KMSKS motifs, which are involved in ATP binding — an NCBI CDD conserved domain (cd00806); members share this curated model.
