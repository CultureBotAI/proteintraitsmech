identifier: CDD:cd14857
label: TrmE_Helical
definition: >-
  central helical domain of TrmE, a tRNA modification GTPase. This family contains the central, helical domain of TrmE (also known as MnmE ThdF, MSS1), a guanine nucleotide-binding protein conserved in all three kingdoms of life. It is involved in the modification of uridine bases (U34) at the first anticodon (wobble) position of tRNAs decoding two-family box triplets. TrmE is a three-domain protein comprising N-terminal tetrahydrofolate-binding domain, a central helical domain, and a canonical Ras-like G domain which is inserted into the helical domain. The helical domain enables flexibility and accessibility, acting as a hinge for the conformational change that brings N-terminal domain catalytic cysteine and the cofactor THF closer to each other. The yeast member of TrmE family, MSS1, is involved in mitochondrial translation while bacterial members are often present in translation-related operons. MSS1 GTPase is also involved in the expression of cytochrome c oxidase subunit 1 (COX1)
