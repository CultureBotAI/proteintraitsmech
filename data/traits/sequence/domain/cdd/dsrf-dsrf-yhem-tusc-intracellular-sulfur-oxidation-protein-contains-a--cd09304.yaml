label: YchN_like_DsrF
definition: >-
  DsrF (DsrF/YheM/TusC) intracellular sulfur oxidation protein, contains a YchN-like fold. DsrF is a subunit of the bacterial DsrEFH complex involved in sulfur oxidation. This family includes Escherichia coli TusC (YheM)
