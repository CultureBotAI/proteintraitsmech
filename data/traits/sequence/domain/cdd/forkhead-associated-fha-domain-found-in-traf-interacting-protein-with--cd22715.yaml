identifier: CDD:cd22715
label: "forkhead associated (FHA) domain found in TRAF-interacting protein with FHA domain-containing protein B (TIFAB). TIFAB, also called TIFA-like protein, inhibits TIFA-mediated TRAF6 activation possibly by inducing a conformational change in TIFA. It regulates USP15-mediated p53 signaling during stressed and malignant hematopoiesis. It contains an FHA domain, which is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in TRAF-interacting protein with FHA domain-containing protein B (TIFAB). TIFAB, also called TIFA-like protein, inhibits TIFA-mediated TRAF6 activation possibly by inducing a conformational change in TIFA. It regulates USP15-mediated p53 signaling during stressed and malignant hematopoiesis. It contains an FHA domain, which is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22715); members share this curated model.
