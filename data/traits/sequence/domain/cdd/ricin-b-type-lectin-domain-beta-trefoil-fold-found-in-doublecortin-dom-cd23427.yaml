identifier: CDD:cd23427
label: "ricin B-type lectin domain, beta-trefoil fold, found in doublecortin domain-containing protein 1 (DCDC1) and similar proteins. DCDC1, also called doublecortin domain-containing 5 protein (DCDC5), is a microtubule-binding protein which plays an important role in mediating dynein-dependent transport of RAB8A-positive vesicles to the midbody during cytokinesis. In addition to doublecortin-like domains, DCDC1 may also contain a ricin B-type lectin domain in the middle region. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a putative sugar-binding pocket."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in doublecortin domain-containing protein 1 (DCDC1) and similar proteins. DCDC1, also called doublecortin domain-containing 5 protein (DCDC5), is a microtubule-binding protein which plays an important role in mediating dynein-dependent transport of RAB8A-positive vesicles to the midbody during cytokinesis. In addition to doublecortin-like domains, DCDC1 may also contain a ricin B-type lectin domain in the middle region. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a putative sugar-binding pocket. — an NCBI CDD conserved domain (cd23427); members share this curated model.
