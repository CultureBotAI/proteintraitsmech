identifier: CDD:cd05113
label: "Catalytic domain of the Protein Tyrosine Kinases, Bruton's tyrosine kinase and Bone marrow kinase on the X chromosome. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Btk and Bmx (also named Etk) are members of the Tec-like subfamily of proteins, which are cytoplasmic (or nonreceptor) PTKs with similarity to Src kinases in that they contain Src homology protein interaction domains (SH3, SH2) N-terminal to the catalytic tyr kinase domain. Unlike Src kinases, most Tec subfamily members except Rlk also contain an N-terminal pleckstrin homology (PH) domain, which binds the products of PI3K and allows membrane recruitment and activation. In addition, Btk contains the Tec homology (TH) domain with proline-rich and zinc-binding regions. Btk is expressed in B-cells, and a variety of myeloid cells including mast cells, platelets, neutrophils, and dendrictic cells. It interacts with a variety of partners, from cytosolic proteins to nuclear transcription factors, suggesting a diversity of functions. Stimulation of a diverse array of cell surface receptors, including antigen engagement of the B-cell receptor, leads to PH-mediated membrane translocation of Btk and subsequent phosphorylation by Src kinase and activation. Btk plays an important role in the life cycle of B-cells including their development, differentiation, proliferation, survival, and apoptosis. Mutations in Btk cause the primary immunodeficiency disease, X-linked agammaglobulinaemia (XLA) in humans. Bmx is primarily expressed in bone marrow and the arterial endothelium, and plays an important role in ischemia-induced angiogenesis. It facilitates arterial growth, capillary formation, vessel maturation, and bone marrow-derived endothelial progenitor cell mobilization. The Btk/Bmx subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Protein Tyrosine Kinases, Bruton's tyrosine kinase and Bone marrow kinase on the X chromosome. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Btk and Bmx (also named Etk) are members of the Tec-like subfamily of proteins, which are cytoplasmic (or nonreceptor) PTKs with similarity to Src kinases in that they contain Src homology protein interaction domains (SH3, SH2) N-terminal to the catalytic tyr kinase domain. Unlike Src kinases, most Tec subfamily members except Rlk also contain an N-terminal pleckstrin homology (PH) domain, which binds the products of PI3K and allows membrane recruitment and activation. In addition, Btk contains the Tec homology (TH) domain with proline-rich and zinc-binding regions. Btk is expressed in B-cells, and a variety of myeloid cells including mast cells, platelets, neutrophils, and dendrictic cells. It interacts with a variety of partners, from cytosolic proteins to nuclear transcription factors, suggesting a diversity of functions. Stimulation of a diverse array of cell surface receptors, including antigen engagement of the B-cell receptor, leads to PH-mediated membrane translocation of Btk and subsequent phosphorylation by Src kinase and activation. Btk plays an important role in the life cycle of B-cells including their development, differentiation, proliferation, survival, and apoptosis. Mutations in Btk cause the primary immunodeficiency disease, X-linked agammaglobulinaemia (XLA) in humans. Bmx is primarily expressed in bone marrow and the arterial endothelium, and plays an important role in ischemia-induced angiogenesis. It facilitates arterial growth, capillary formation, vessel maturation, and bone marrow-derived endothelial progenitor cell mobilization. The Btk/Bmx subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05113); members share this curated model.
