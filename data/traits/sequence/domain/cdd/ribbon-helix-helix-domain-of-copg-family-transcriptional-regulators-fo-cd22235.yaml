identifier: CDD:cd22235
label: "ribbon-helix-helix domain of CopG family transcriptional regulators found in archaea. This subfamily includes the N-terminal ribbon-helix-helix (RHH) domain of putative transcriptional repressor CopG from archaea, and similar proteins. These uncharacterized proteins have a typical RHH, similar to plasmid-encoded transcriptional repressor CopG, the protein that is encoded by the promiscuous streptococcal plasmid pMV158 and is involved in the control of plasmid copy number."
definition: >-
  ribbon-helix-helix domain of CopG family transcriptional regulators found in archaea. This subfamily includes the N-terminal ribbon-helix-helix (RHH) domain of putative transcriptional repressor CopG from archaea, and similar proteins. These uncharacterized proteins have a typical RHH, similar to plasmid-encoded transcriptional repressor CopG, the protein that is encoded by the promiscuous streptococcal plasmid pMV158 and is involved in the control of plasmid copy number. — an NCBI CDD conserved domain (cd22235); members share this curated model.
