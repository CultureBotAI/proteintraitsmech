identifier: CDD:cd09395
label: "The second LIM domain of  Rga GTPase-Activating Proteins. The second LIM domain of  Rga GTPase-Activating Proteins: The members of this family contain two tandem repeats of LIM domains and a Rho-type GTPase activating protein (RhoGap) domain. Rga activates GTPases during polarized morphogenesis. In yeast, a known regulating target of Rga is CDC42p, a small GTPase. The LIM domain is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein."
definition: >-
  The second LIM domain of Rga GTPase-Activating Proteins. The second LIM domain of Rga GTPase-Activating Proteins: The members of this family contain two tandem repeats of LIM domains and a Rho-type GTPase activating protein (RhoGap) domain. Rga activates GTPases during polarized morphogenesis. In yeast, a known regulating target of Rga is CDC42p, a small GTPase. The LIM domain is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein. — an NCBI CDD conserved domain (cd09395); members share this curated model.
