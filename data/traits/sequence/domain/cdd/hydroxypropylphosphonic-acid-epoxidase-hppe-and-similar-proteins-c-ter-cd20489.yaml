identifier: CDD:cd20489
label: "hydroxypropylphosphonic acid epoxidase (HppE) and similar proteins, C-terminal cupin domain. This family includes HppE (hydroxypropylphosphonic acid epoxidase or HPP epoxidase or 2-hydroxypropylphosphonic acid epoxidase; EC 1.11.1.23), a non-heme mononuclear iron-dependent enzyme that catalyzes a unique epoxidation reaction as part of the biosynthetic pathway of the clinically important oxirane antibiotic fosfomycin. HppE uses a facial triad with two histidine ligands and one aspartic acid or glutamic acid, His2(Glu/Asp), to catalyze a variety of different reactions, including DNA repair and antibiotic biosynthesis. The C-terminal catalytic domain of HppE has a cupin fold that binds a divalent cation, whereas the N-terminal domain carries a helix-turn-helix (HTH) motif with putative DNA-binding helices. HppE converts (S)-2-hydroxypropyl-1-phosphonate (S-HPP) to the antibiotic fosfomycin [(1R,2S)-epoxypropylphosphonate] in an unusual 1,3-dehydrogenation of a secondary alcohol to an epoxide; it uses H2O2 as a co-substrate to abstract hydrogen (Ho) from C1 of S-HPP to initiate epoxide ring closure, using an iron(IV)-oxo complex as the Ho abstractor. HppE belongs to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization and its structure serves as a model for numerous proteins of unknown function, predicted to be transcription factors, containing an HTH motif at the N-terminus and a cupin domain at the C-terminus."
definition: >-
  hydroxypropylphosphonic acid epoxidase (HppE) and similar proteins, C-terminal cupin domain. This family includes HppE (hydroxypropylphosphonic acid epoxidase or HPP epoxidase or 2-hydroxypropylphosphonic acid epoxidase; EC 1.11.1.23), a non-heme mononuclear iron-dependent enzyme that catalyzes a unique epoxidation reaction as part of the biosynthetic pathway of the clinically important oxirane antibiotic fosfomycin. HppE uses a facial triad with two histidine ligands and one aspartic acid or glutamic acid, His2(Glu/Asp), to catalyze a variety of different reactions, including DNA repair and antibiotic biosynthesis. The C-terminal catalytic domain of HppE has a cupin fold that binds a divalent cation, whereas the N-terminal domain carries a helix-turn-helix (HTH) motif with putative DNA-binding helices. HppE converts (S)-2-hydroxypropyl-1-phosphonate (S-HPP) to the antibiotic fosfomycin [(1R,2S)-epoxypropylphosphonate] in an unusual 1,3-dehydrogenation of a secondary alcohol to an epoxide; it uses H2O2 as a co-substrate to abstract hydrogen (Ho) from C1 of S-HPP to initiate epoxide ring closure, using an iron(IV)-oxo complex as the Ho abstractor. HppE belongs to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization and its structure serves as a model for numerous proteins of unknown function, predicted to be transcription factors, containing an HTH motif at the N-terminus and a cupin domain at the C-terminus. — an NCBI CDD conserved domain (cd20489); members share this curated model.
