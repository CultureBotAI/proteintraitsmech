identifier: CDD:cd22684
label: "forkhead associated (FHA) domain found in Mycobacterium tuberculosis GarA, Corynebacterium glutamicum OdhI and similar proteins. This family includes Mycobacterium tuberculosis glycogen accumulation regulator GarA and Corynebacterium glutamicum oxoglutarate dehydrogenase inhibitor (OdhI). GarA is involved in the regulation of glutamate metabolism. It acts as a phosphorylation-dependent molecular switch that modulates the activities of Kgd, Gdh and GltB. GarA binds to Kgd, Gdh, GltB, PknB, and the N-terminal region of PknG via its FHA domain. OdhI is an essential component of the PknG signaling pathway. It can inhibit the activity of 2-oxoglutarate dehydrogenase only when it is unphosphorylated. The FHA domain is a small phosphopeptide recognition module."
