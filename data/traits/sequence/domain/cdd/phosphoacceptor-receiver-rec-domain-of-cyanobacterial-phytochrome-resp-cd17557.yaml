identifier: CDD:cd17557
label: "phosphoacceptor receiver (REC) domain of cyanobacterial phytochrome response regulator Rcp and similar domains. This family is composed of response regulators (RRs) that are members of phytochrome-associated, light-sensing two-component signal transduction pathways such as Synechocystis sp. Rcp1, Tolypothrix sp. RcpA, and Agrobacterium tumefaciens bacteriophytochrome response regulator AtBRR. They are stand-alone RRs containing only a REC domain with no output/effector domain. The REC domain itself functions as an effector domain. Also included in this family us Methanosaeta harundinacea methanogenesis regulatory protein FilR2, also a stand-alone RR. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
