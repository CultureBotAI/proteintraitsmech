label: "type I K homology (KH) RNA-binding domain found in Oryza sativa SPL11-interacting protein 1 (SPIN1) and similar proteins. SPIN1 is a K homology domain protein negatively regulated and ubiquitinated by the E3 ubiquitin ligase SPL11. It is involved in flowering time control in rice. SPIN1 binds DNA and RNA in vitro."
definition: >-
  type I K homology (KH) RNA-binding domain found in Oryza sativa SPL11-interacting protein 1 (SPIN1) and similar proteins. SPIN1 is a K homology domain protein negatively regulated and ubiquitinated by the E3 ubiquitin ligase SPL11. It is involved in flowering time control in rice. SPIN1 binds DNA and RNA in vitro. — an NCBI CDD conserved domain (cd22467); members share this curated model.
