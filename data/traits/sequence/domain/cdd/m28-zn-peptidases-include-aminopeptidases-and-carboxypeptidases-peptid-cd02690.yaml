identifier: CDD:cd02690
label: "M28 Zn-peptidases include aminopeptidases and carboxypeptidases. Peptidase M28 family (also called aminopeptidase Y family) contains aminopeptidases as well as carboxypeptidases. They have co-catalytic zinc ions; each zinc ion is tetrahedrally co-ordinated, with three amino acid ligands plus activated water; one aspartate residue binds both metal ions. The aminopeptidases in this family are also called bacterial leucyl aminopeptidases, but are able to release a variety of N-terminal amino acids. IAP aminopeptidase and aminopeptidase Y preferentially release basic amino acids while glutamate carboxypeptidase II preferentially releases C-terminal glutamates. Plasma glutamate carboxypeptidase (PGCP) and glutamate carboxypeptidase II (NAALADase) hydrolyze dipeptides. Several members of the M28 peptidase family have PA domain inserts which may participate in substrate binding and/or in promoting conformational changes, which influence the stability and accessibility of the site to substrate. These include prostate-specific membrane antigen (PSMA), yeast aminopeptidase S (SGAP), human transferrin receptors (TfR1 and TfR2), plasma glutamate carboxypeptidase (PGCP) and several predicted aminopeptidases where relatively little is known about them. Also included in the M28 family are glutaminyl cyclases (QC), which are involved in N-terminal glutamine cyclization of many endocrine peptides. Nicastrin and nicalin belong to this family but lack the amino-acid conservation required for catalytically active aminopeptidases."
definition: >-
  M28 Zn-peptidases include aminopeptidases and carboxypeptidases. Peptidase M28 family (also called aminopeptidase Y family) contains aminopeptidases as well as carboxypeptidases. They have co-catalytic zinc ions; each zinc ion is tetrahedrally co-ordinated, with three amino acid ligands plus activated water; one aspartate residue binds both metal ions. The aminopeptidases in this family are also called bacterial leucyl aminopeptidases, but are able to release a variety of N-terminal amino acids. IAP aminopeptidase and aminopeptidase Y preferentially release basic amino acids while glutamate carboxypeptidase II preferentially releases C-terminal glutamates. Plasma glutamate carboxypeptidase (PGCP) and glutamate carboxypeptidase II (NAALADase) hydrolyze dipeptides. Several members of the M28 peptidase family have PA domain inserts which may participate in substrate binding and/or in promoting conformational changes, which influence the stability and accessibility of the site to substrate. These include prostate-specific membrane antigen (PSMA), yeast aminopeptidase S (SGAP), human transferrin receptors (TfR1 and TfR2), plasma glutamate carboxypeptidase (PGCP) and several predicted aminopeptidases where relatively little is known about them. Also included in the M28 family are glutaminyl cyclases (QC), which are involved in N-terminal glutamine cyclization of many endocrine peptides. Nicastrin and nicalin belong to this family but lack the amino-acid conservation required for catalytically active aminopeptidases. — an NCBI CDD conserved domain (cd02690); members share this curated model.
