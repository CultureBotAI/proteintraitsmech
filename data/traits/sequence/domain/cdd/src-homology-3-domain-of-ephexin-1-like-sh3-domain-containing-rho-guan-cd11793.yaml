identifier: CDD:cd11793
label: "Src homology 3 domain of ephexin-1-like SH3 domain containing Rho guanine nucleotide exchange factors. Members of this family contain RhoGEF (also called Dbl-homologous or DH), Pleckstrin Homology (PH), and C-terminal SH3 domains. They include the Rho guanine nucleotide exchange factors ARHGEF5, ARHGEF16, ARHGEF19, ARHGEF26, ARHGEF27 (also called ephexin-1), and similar proteins, and are also called ephexins because they interact directly with ephrin A receptors. GEFs interact with Rho GTPases via their DH domains to catalyze nucleotide exchange by stabilizing the nucleotide-free GTPase intermediate. They play important roles in neuronal development. The SH3 domains of ARHGEFs play an autoinhibitory role through intramolecular interactions with a proline-rich region N-terminal to the DH domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of ephexin-1-like SH3 domain containing Rho guanine nucleotide exchange factors. Members of this family contain RhoGEF (also called Dbl-homologous or DH), Pleckstrin Homology (PH), and C-terminal SH3 domains. They include the Rho guanine nucleotide exchange factors ARHGEF5, ARHGEF16, ARHGEF19, ARHGEF26, ARHGEF27 (also called ephexin-1), and similar proteins, and are also called ephexins because they interact directly with ephrin A receptors. GEFs interact with Rho GTPases via their DH domains to catalyze nucleotide exchange by stabilizing the nucleotide-free GTPase intermediate. They play important roles in neuronal development. The SH3 domains of ARHGEFs play an autoinhibitory role through intramolecular interactions with a proline-rich region N-terminal to the DH domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11793); members share this curated model.
