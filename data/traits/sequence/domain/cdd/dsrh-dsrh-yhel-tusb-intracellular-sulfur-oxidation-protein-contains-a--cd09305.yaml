label: YchN_like_DsrH
definition: >-
  DsrH (DsrH/YheL/TusB) intracellular sulfur oxidation protein, contains a YchN-like fold. DsrH is a subunit of the bacterial DsrEFH complex involved in sulfur oxidation. This family includes Escherichia coli TusB (YheL)
