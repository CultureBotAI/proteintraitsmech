identifier: CDD:PRK11026
label: "putative protein insertion permease FtsX. FtsX is an integral membrane protein encoded in the same operon as signal recognition particle docking protein FtsY and FtsE. It belongs to a family of predicted permeases and may play a role in the insertion of proteins required for potassium transport, cell division, and other activities. FtsE is a hydrophilic nucleotide-binding protein that associates with the inner membrane by means of association with FtsX. [Cellular processes, Cell division, Protein fate, Protein and peptide secretion and trafficking]"
definition: >-
  putative protein insertion permease FtsX. FtsX is an integral membrane protein encoded in the same operon as signal recognition particle docking protein FtsY and FtsE. It belongs to a family of predicted permeases and may play a role in the insertion of proteins required for potassium transport, cell division, and other activities. FtsE is a hydrophilic nucleotide-binding protein that associates with the inner membrane by means of association with FtsX. [Cellular processes, Cell division, Protein fate, Protein and peptide secretion and trafficking] — an NCBI CDD conserved domain (PRK11026); members share this curated model.
