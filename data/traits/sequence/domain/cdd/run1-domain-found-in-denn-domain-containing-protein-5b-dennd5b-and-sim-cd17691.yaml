identifier: CDD:cd17691
label: "RUN1 domain found in DENN domain-containing protein 5B (DENND5B) and similar proteins. DENND5B, also called Rab6-interacting protein 1 (Rab6IP1)-like protein, functions in membrane trafficking at a crossroads between the Golgi and the endosomal system. It is composed of an N-terminal DENN (Differentially Expressed in Normal and Neoplastic cells) domain followed by two RUN (RPIP8 [RaP2-interacting protein 8], UNC-14, and NESCA [new molecule containing SH3 at the carboxyl terminus]) domains flanking a PLAT (Polycystin-1, Lipoxygenase, Alpha-Toxin) domain. This model represents the first RUN domain of DENND5B."
definition: >-
  RUN1 domain found in DENN domain-containing protein 5B (DENND5B) and similar proteins. DENND5B, also called Rab6-interacting protein 1 (Rab6IP1)-like protein, functions in membrane trafficking at a crossroads between the Golgi and the endosomal system. It is composed of an N-terminal DENN (Differentially Expressed in Normal and Neoplastic cells) domain followed by two RUN (RPIP8 [RaP2-interacting protein 8], UNC-14, and NESCA [new molecule containing SH3 at the carboxyl terminus]) domains flanking a PLAT (Polycystin-1, Lipoxygenase, Alpha-Toxin) domain. This model represents the first RUN domain of DENND5B. — an NCBI CDD conserved domain (cd17691); members share this curated model.
