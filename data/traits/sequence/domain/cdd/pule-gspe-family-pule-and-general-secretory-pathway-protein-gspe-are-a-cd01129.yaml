identifier: CDD:cd01129
label: "PulE-GspE family. PulE and General secretory pathway protein GspE are ATPases of the type II secretory pathway, the main terminal branch of the general secretory pathway (GSP). PulE is a cytoplasmic protein of the GSP, which contains an ATP binding site and a tetracysteine motif. This subgroup also includes PilB, a type IV pilus assembly ATPase, DotB, an ATPase of the type IVb secretion system, also known as the dot/icm system, Escherichia coli IncI plasmid-encoded conjugative transfer ATPase TraJ, and HofB."
definition: >-
  PulE-GspE family. PulE and General secretory pathway protein GspE are ATPases of the type II secretory pathway, the main terminal branch of the general secretory pathway (GSP). PulE is a cytoplasmic protein of the GSP, which contains an ATP binding site and a tetracysteine motif. This subgroup also includes PilB, a type IV pilus assembly ATPase, DotB, an ATPase of the type IVb secretion system, also known as the dot/icm system, Escherichia coli IncI plasmid-encoded conjugative transfer ATPase TraJ, and HofB. — an NCBI CDD conserved domain (cd01129); members share this curated model.
