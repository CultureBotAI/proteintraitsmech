identifier: CDD:cd18094
label: SpoU-like_TrmL
definition: >-
  SAM-dependent tRNA methylase related to TrmL. tRNA (Um34/Cm34) methyltransferase TrmL catalyzes the methyl transfer from S-adenosyl-L-methionine (AdoMet) to the 2'-OH at position 34 in both tRNA(Leu)(CmAA) and tRNA(Leu)(cmnm5UmAA). It is part of the SpoU family of MTases, a subfamily of the SPOUT methyltransferase superfamily. The SPOUT methyltransferase superfamily is a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot
