identifier: CDD:cd06175
label: "Proton-coupled oligopeptide transporter (POT) family of the Major Facilitator Superfamily of transporters. The Proton-coupled oligopeptide transporter (POT) family is present across all major kingdoms of life and is known by a variety of names. It is referred to as the Nitrate transporter/Peptide transporter (NRT1/PTR) family (NPF) in plants, and in addition to POT, it is also known as the Peptide transporter (PepT/PTR) or Solute Carrier 15 (SLC15) family in animals. Members of this family are proton-driven symporters involved in nitrogen acquisition in the form of di- and tripeptides. Plant members transport other nitrogenous ligands including nitrate, the plant hormone auxin, and glucosinolate compounds that are important for seed defense. POT proteins exhibit substrate multispecificity, with one transporter able to recognize as many as 8,400 types of di/tripeptides and certain peptide-like drugs. The POT family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Proton-coupled oligopeptide transporter (POT) family of the Major Facilitator Superfamily of transporters. The Proton-coupled oligopeptide transporter (POT) family is present across all major kingdoms of life and is known by a variety of names. It is referred to as the Nitrate transporter/Peptide transporter (NRT1/PTR) family (NPF) in plants, and in addition to POT, it is also known as the Peptide transporter (PepT/PTR) or Solute Carrier 15 (SLC15) family in animals. Members of this family are proton-driven symporters involved in nitrogen acquisition in the form of di- and tripeptides. Plant members transport other nitrogenous ligands including nitrate, the plant hormone auxin, and glucosinolate compounds that are important for seed defense. POT proteins exhibit substrate multispecificity, with one transporter able to recognize as many as 8,400 types of di/tripeptides and certain peptide-like drugs. The POT family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd06175); members share this curated model.
