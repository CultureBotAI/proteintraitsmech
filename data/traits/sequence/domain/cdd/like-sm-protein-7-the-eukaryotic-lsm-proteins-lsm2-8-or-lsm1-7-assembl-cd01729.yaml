identifier: CDD:cd01729
label: "Like-Sm protein 7. The eukaryotic LSm proteins (LSm2-8 or LSm1-7) assemble into a hetero-heptameric ring around the 3'-terminus uridylation tag of the gamma-methyl triphosphate (gamma-m-P3) capped U6 snRNA. LSm2-8 form the core of the snRNP particle that, in turn, assembles with other components onto the pre-mRNA to form the spliceosome which is responsible for the excision of introns and the ligation of exons. LSm1-7 is involved in recognition of the 3' uridylation tag and recruitment of the decapping machinery. LSm657 is believed to be an assembly intermediate for both the LSm1-7 and LSm2-8 rings. Members of this family share a highly conserved Sm fold containing an N-terminal helix followed by a strongly bent five-stranded antiparallel beta-sheet."
definition: >-
  Like-Sm protein 7. The eukaryotic LSm proteins (LSm2-8 or LSm1-7) assemble into a hetero-heptameric ring around the 3'-terminus uridylation tag of the gamma-methyl triphosphate (gamma-m-P3) capped U6 snRNA. LSm2-8 form the core of the snRNP particle that, in turn, assembles with other components onto the pre-mRNA to form the spliceosome which is responsible for the excision of introns and the ligation of exons. LSm1-7 is involved in recognition of the 3' uridylation tag and recruitment of the decapping machinery. LSm657 is believed to be an assembly intermediate for both the LSm1-7 and LSm2-8 rings. Members of this family share a highly conserved Sm fold containing an N-terminal helix followed by a strongly bent five-stranded antiparallel beta-sheet. — an NCBI CDD conserved domain (cd01729); members share this curated model.
