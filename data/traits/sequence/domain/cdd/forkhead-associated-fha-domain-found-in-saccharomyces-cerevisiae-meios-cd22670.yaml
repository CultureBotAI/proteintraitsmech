identifier: CDD:cd22670
label: "forkhead associated (FHA) domain found in Saccharomyces cerevisiae meiosis-specific serine/threonine-protein kinase MEK1 and similar proteins. MEK1 (EC 2.7.11.1), also known as MRE4, is a meiosis-specific protein kinase required for chromosome synapsis and meiotic recombination. The recruitment and activation of MEK1 require the phosphorylation of the chromosome axis protein Hop1 at Thr318 (pT318), which is necessary for recognition by the MEK1 FHA domain. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in Saccharomyces cerevisiae meiosis-specific serine/threonine-protein kinase MEK1 and similar proteins. MEK1 (EC 2.7.11.1), also known as MRE4, is a meiosis-specific protein kinase required for chromosome synapsis and meiotic recombination. The recruitment and activation of MEK1 require the phosphorylation of the chromosome axis protein Hop1 at Thr318 (pT318), which is necessary for recognition by the MEK1 FHA domain. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22670); members share this curated model.
