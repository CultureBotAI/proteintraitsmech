identifier: CDD:cd23171
label: "catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the positive-sense single-stranded RNA [(+)ssRNA] picorna-like virus Ectropis obliqua,  and related viruses. This group contains the catalytic core domain of RdRp of Ectropis obliqua picorna-like virus (EoPV), and related viruses. EoPV is an insect (+)ssRNA virus that causes a lethal granulosis infection of larvae of the tea looper (Ectropis obliqua), and related insect-infecting iflaviruses. Ectropis obliqua, a species of  moth, is one of the most destructive pest insects on tea plants throughout growing areas of this crop in southern China. The EoPV genome contains a single large ORF encoding the capsid proteins at the 5' terminus of the genome with the non-structural proteins at the 3' end of the genome. This organization is similar to typical mammalian picornaviruses. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
definition: >-
  catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the positive-sense single-stranded RNA [(+)ssRNA] picorna-like virus Ectropis obliqua, and related viruses. This group contains the catalytic core domain of RdRp of Ectropis obliqua picorna-like virus (EoPV), and related viruses. EoPV is an insect (+)ssRNA virus that causes a lethal granulosis infection of larvae of the tea looper (Ectropis obliqua), and related insect-infecting iflaviruses. Ectropis obliqua, a species of moth, is one of the most destructive pest insects on tea plants throughout growing areas of this crop in southern China. The EoPV genome contains a single large ORF encoding the capsid proteins at the 5' terminus of the genome with the non-structural proteins at the 3' end of the genome. This organization is similar to typical mammalian picornaviruses. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides. — an NCBI CDD conserved domain (cd23171); members share this curated model.
