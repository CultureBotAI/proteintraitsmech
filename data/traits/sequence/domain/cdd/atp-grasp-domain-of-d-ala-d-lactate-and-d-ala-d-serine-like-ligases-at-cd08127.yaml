label: ATP-G_DDlac-DDser_EfVanAB-EcaVanC
definition: >-
  ATP-grasp domain of D-ala-D-lactate and D-ala-D-serine like ligases. ATP-grasp domain of D-ala-D-lactate and D-ala-D-serine ligases. D-alanine:D-x ligase (Ddl, EC 6.3.2.4) is a bacterial cell wall synthesizing enzyme that catalyzes the ligation of D-alanine with D-lactate (in case of D-ala-D-lac ligases) or D-serine (in case of D-ala-D-ser ligases). Bacteria that show vancomycin resistance, which develops after prolonged clinical treatment with vancomycin, possess an inactive Ddl and rely on another ligase, D-alanine:D-lactate ligase (Van), which produces D-alanine:D-lactate rather than D-alanine:Dalanine for cell wall synthesis. These enzymes convert ATP to ADP during ligation raction where carboxylate substrate is D-alanine and amine or thiol substrate is either D-lactate or D-serine. This reaction occurs in the presence of two Mg ions. Preference of the enzyme for D-lactate as a ligand over D-alanine could be mediated by electrostatic effects and/or a hydrogen-bonding network, which principally involve His-244. VanA, VanB, and VanD from Enterococcus faecalis are examples of DDlac type of ligases that are included in this group. VanC from Enterococcus gallinarum, VanC3, VanC4 from Enterococcus casseliflavus, and VanE from Enterococcus faecalis are all examples of DDser type of ligases that are also included in this subfamily
