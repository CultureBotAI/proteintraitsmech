identifier: CDD:cd22185
label: "Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2) of human Vasodilator-stimulated phosphoprotein and related proteins. This family contains the Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2) of Ena/VASP family members including Protein enabled homolog (also known as Mena, mammalian enabled), VASP (vasodilator-stimulated phosphoprotein) and EVL (Ena-VASP-like or Enabled VASP or Ena/VASP). These are actin-associated proteins involved in a range of processes dependent on cytoskeleton remodeling and cell polarity such as axon guidance and lamellipodial and filopodial dynamics in migrating cells, platelet activation and cell migration. Ena/VASP proteins processively elongate F-actin barbed ends, promoting dissociation of barbed end assembly antagonists (uncapping).  WH2 domains are small, widespread intrinsically disordered actin-binding peptides displaying significant sequence variability and different regulations of actin self-assembly in motile and morphogenetic processes. WH2 domains are identified by a central consensus actin-binding motif LKKT/V flanked by variable N-terminal and C-terminal extensions."
definition: >-
  Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2) of human Vasodilator-stimulated phosphoprotein and related proteins. This family contains the Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2) of Ena/VASP family members including Protein enabled homolog (also known as Mena, mammalian enabled), VASP (vasodilator-stimulated phosphoprotein) and EVL (Ena-VASP-like or Enabled VASP or Ena/VASP). These are actin-associated proteins involved in a range of processes dependent on cytoskeleton remodeling and cell polarity such as axon guidance and lamellipodial and filopodial dynamics in migrating cells, platelet activation and cell migration. Ena/VASP proteins processively elongate F-actin barbed ends, promoting dissociation of barbed end assembly antagonists (uncapping). WH2 domains are small, widespread intrinsically disordered actin-binding peptides displaying significant sequence variability and different regulations of actin self-assembly in motile and morphogenetic processes. WH2 domains are identified by a central consensus actin-binding motif LKKT/V flanked by variable N-terminal and C-terminal extensions. — an NCBI CDD conserved domain (cd22185); members share this curated model.
