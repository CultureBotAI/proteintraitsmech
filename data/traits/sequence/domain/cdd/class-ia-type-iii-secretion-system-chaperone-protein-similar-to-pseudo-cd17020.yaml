identifier: CDD:cd17020
label: "Class IA type III secretion system chaperone protein, similar to Pseudomonas syringae chaperone protein ShcM. This family includes type III secretion system (T3SS) chaperone proteins similar to Pseudomonas syringae ShcM and similar proteins. In P. syringae, which is a plant pathogen that can infect a wide range of species, the T3SS allows injection of the effector protein HopPtoM (previously known as CEL ORF3), among known plant pathogen effectors, that makes a major contribution to the elicitation of lesion symptoms but not growth in host tomato leaves. Chaperone ShcM is required for efficient translocation and function of HopPtoM in the plant cell, consistent with the presence of customized chaperones in plant pathogenic bacteria."
definition: >-
  Class IA type III secretion system chaperone protein, similar to Pseudomonas syringae chaperone protein ShcM. This family includes type III secretion system (T3SS) chaperone proteins similar to Pseudomonas syringae ShcM and similar proteins. In P. syringae, which is a plant pathogen that can infect a wide range of species, the T3SS allows injection of the effector protein HopPtoM (previously known as CEL ORF3), among known plant pathogen effectors, that makes a major contribution to the elicitation of lesion symptoms but not growth in host tomato leaves. Chaperone ShcM is required for efficient translocation and function of HopPtoM in the plant cell, consistent with the presence of customized chaperones in plant pathogenic bacteria. — an NCBI CDD conserved domain (cd17020); members share this curated model.
