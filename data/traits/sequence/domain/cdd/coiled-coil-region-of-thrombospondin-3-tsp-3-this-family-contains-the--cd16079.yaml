identifier: CDD:cd16079
label: "Coiled coil region of thrombospondin-3 (TSP-3). This family contains the N-terminal coiled coil region of TSP-3, which is highly expressed in osteosarcomas and associated with metastasis. TSP-3, along with TSP-5 and type IX collagen, is also expressed in the growth plate and all operate in concert and participate in growth plate organization that directly modulates linear growth. It forms a pentameric left-handed coiled coil with a channel that is a unique carrier for lipophilic compounds. The pentamer is stabilized by inter-subunit disulfide bonds formed between cysteine residues adjacent to the C-terminal end of the coiled coil region. TSP-3 knockout mice have been shown to display accelerated endochondral ossification and increased trabecular bone in the femoral head."
definition: >-
