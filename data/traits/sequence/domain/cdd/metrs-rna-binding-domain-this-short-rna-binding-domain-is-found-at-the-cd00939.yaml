identifier: CDD:cd00939
label: "MetRS_RNA binding domain. This short RNA-binding domain is found at the C-terminus of MetRS in several higher eukaryote aminoacyl-tRNA synthetases (aaRSs). It is repeated in Drosophila MetRS. This domain consists of a helix-turn-helix structure, which is similar to other RNA-binding proteins. It is involved in both protein-RNA interactions by binding tRNA and protein-protein interactions, which are important for the formation of aaRSs into multienzyme complexes."
definition: >-
  MetRS_RNA binding domain. This short RNA-binding domain is found at the C-terminus of MetRS in several higher eukaryote aminoacyl-tRNA synthetases (aaRSs). It is repeated in Drosophila MetRS. This domain consists of a helix-turn-helix structure, which is similar to other RNA-binding proteins. It is involved in both protein-RNA interactions by binding tRNA and protein-protein interactions, which are important for the formation of aaRSs into multienzyme complexes. — an NCBI CDD conserved domain (cd00939); members share this curated model.
