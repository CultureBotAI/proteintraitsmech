identifier: CDD:cd13083
label: LamG_perlecan_1
definition: >-
  Laminin G domain repeat 1 in perlecan. Perlecan is a large multi-domain heparan sulfate proteoglycan of the extracellular matrix that plays a crucial role in tissue development and organogenesis. It supports various biological functions, including cell adhesion, growth factor binding, and modulation of apoptosis. Perlecan contains five major domains, that show homology to other molecules involved nutrient metabolism, cell proliferation and adhesion. Domain V consists of laminin G and EGF-like domains. In general, proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold
