identifier: CDD:cd05715
label: "Immunoglobulin (Ig)-like domain of protein zero (P0) and similar proteins. The members here are composed of the immunoglobulin (Ig) domain of protein zero (P0), a myelin membrane adhesion molecule. P0 accounts for over 50% of the total protein in peripheral nervous system (PNS) myelin. P0 is a single-pass transmembrane glycoprotein with a highly basic intracellular domain and an extracellular Ig domain. The extracellular domain of P0 (P0-ED) is similar to the Ig variable domain, carrying one acceptor sequence for N-linked glycosylation. P0 plays a role in membrane adhesion in the spiral wraps of the myelin sheath. The intracellular domain is thought to mediate membrane apposition of the cytoplasmic faces and may, through electrostatic interactions, interact directly with lipid headgroups. It is thought that homophilic interactions of the P0 extracellular domain mediate membrane juxtaposition in the extracellular space of PNS myelin. This group also contains the Ig domain of sodium channel subunit beta-2 (SCN2B), and of epithelial V-like antigen 1 (EVA). EVA, also known as myelin protein zero-like 2, is an adhesion molecule, which may play a role in structural organization of the thymus and early lymphocyte development. SCN2B subunits play a role in determining sodium channel density and function in neurons,and in control of electrical excitability in the brain."
definition: >-
  Immunoglobulin (Ig)-like domain of protein zero (P0) and similar proteins. The members here are composed of the immunoglobulin (Ig) domain of protein zero (P0), a myelin membrane adhesion molecule. P0 accounts for over 50% of the total protein in peripheral nervous system (PNS) myelin. P0 is a single-pass transmembrane glycoprotein with a highly basic intracellular domain and an extracellular Ig domain. The extracellular domain of P0 (P0-ED) is similar to the Ig variable domain, carrying one acceptor sequence for N-linked glycosylation. P0 plays a role in membrane adhesion in the spiral wraps of the myelin sheath. The intracellular domain is thought to mediate membrane apposition of the cytoplasmic faces and may, through electrostatic interactions, interact directly with lipid headgroups. It is thought that homophilic interactions of the P0 extracellular domain mediate membrane juxtaposition in the extracellular space of PNS myelin. This group also contains the Ig domain of sodium channel subunit beta-2 (SCN2B), and of epithelial V-like antigen 1 (EVA). EVA, also known as myelin protein zero-like 2, is an adhesion molecule, which may play a role in structural organization of the thymus and early lymphocyte development. SCN2B subunits play a role in determining sodium channel density and function in neurons,and in control of electrical excitability in the brain. — an NCBI CDD conserved domain (cd05715); members share this curated model.
