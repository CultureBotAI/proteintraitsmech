identifier: CDD:cd05443
label: NT_EcGlnE_like_C
definition: >-
  C-terminal Nucleotidyltransferase (NT) domain of Escherichia coli adenylyltransferase (GlnE) and related proteins. NT_EcGlnE_like_C: catalytic nucleotidyltransferase (NT) domain similar to the C-terminal NT domain of proteins similar to Escherichia coli (Ec) adenylyltransferases (ATases, GlnE). The assimilation of nitrogen and its regulation has been well studied in E. coli. One route by which E.coli assimilates its preferred nitrogen source (NH4+) is through the GS/Glutamate synthase (GOGAT) pathway: GS first catalyzes the synthesis of glutamine from ammonia and glutamate, GOGAT then catalyzes the transfer of the amide-amino group of glutamine to 2-oxoglutarate. The GS/GOGAT pathway operates under nitrogen limitation. GS can be regulated through reversible nucleotidylation by GlnE; in nitrogen sufficiency GlnE adenylates GS, reducing its activity, under nitrogen limiting conditions GlnE deadenylates GS-AMP to restore GS activity. The activity of E.coli GlnE is modulated by PII-proteins, glutamine, 2-oxoglutarate, ATP and UTP. GlnE proteins appear to have two separate NT domains. The N-terminal domain (GlnE-N) of E.coli GlnE has been shown to carry out the deadenylylationof GS, and the C-terminal (GlnE_C) domain the adenylylation reaction; EcGlnE-N and EcGlnE-C sandwich a central regulatory domain. In contrast to E.coli GlnE, Rr GlnE is chiefly regulated by 2-oxoglutarate, glutamine has no effect on the adenylation or deadenylation. activities. Rr PII proteins only promote the adenylation reaction of RrGlnE and not the adenylation reaction. These proteins are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these EcGlnE_like _C NT domains
