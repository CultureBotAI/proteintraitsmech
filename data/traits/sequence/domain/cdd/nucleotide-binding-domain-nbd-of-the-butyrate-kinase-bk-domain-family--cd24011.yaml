identifier: CDD:cd24011
label: "nucleotide-binding domain (NBD) of the butyrate kinase (BK) domain family. Butyrate kinase (EC 2.7.2.7) catalyzes the formation of butyryl-CoA by phosphorylating butyrate in the presence of ATP to form butyryl phosphate. Butyrate kinases exist in many fermentative species of the bacterial and archaeal families. They belong to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains."
definition: >-
  nucleotide-binding domain (NBD) of the butyrate kinase (BK) domain family. Butyrate kinase (EC 2.7.2.7) catalyzes the formation of butyryl-CoA by phosphorylating butyrate in the presence of ATP to form butyryl phosphate. Butyrate kinases exist in many fermentative species of the bacterial and archaeal families. They belong to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains. — an NCBI CDD conserved domain (cd24011); members share this curated model.
