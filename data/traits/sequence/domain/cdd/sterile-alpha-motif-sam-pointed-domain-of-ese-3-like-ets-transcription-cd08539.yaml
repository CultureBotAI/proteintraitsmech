identifier: CDD:cd08539
label: "Sterile alpha motif (SAM)/Pointed domain of ESE-3 like ETS transcriptional regulators. SAM Pointed domain of ESE-3-like (Epithelium-Specific ETS) subfamily of ETS transcriptional regulators is a putative protein-protein interaction domain. It can act as a major transactivator by providing a potential docking site for co-activators. The ESE-3 transcriptional activator is involved in regulation of glandular epithelium differentiation through the MAP kinase signaling cascade. It is found to be expressed in glandular epithelium of prostate, pancreas, salivary gland, and trachea. Additionally, ESE-3 is differentially expressed during monocyte-derived dendritic cells development. DNA binding consensus motif for ESE-3 consists of purine-rich GGAA/T core sequence. The expression profiles of these factors are altered in epithelial cancers. Members of this subfamily are potential targets for cancer therapy."
