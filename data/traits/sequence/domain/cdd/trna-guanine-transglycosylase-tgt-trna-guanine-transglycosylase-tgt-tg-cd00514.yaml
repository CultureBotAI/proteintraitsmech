identifier: CDD:cd00514
label: TGT
definition: >-
  tRNA-guanine transglycosylase (TGT). tRNA-guanine transglycosylase (TGT). TGT is an enzyme involved in modifying Asn, Asp, His, and Tyr tRNAs, leading to the replacement of guanine-34 at the wobble position with the hypermodified base queuine. TGT replaces G34 with a queuine precursor (preQ1), the first step in the substitution of queuine at the wobble position. A feature of this family is the conserved zinc-binding motif: C-X-C-X(2)-C-X(22,29)H
