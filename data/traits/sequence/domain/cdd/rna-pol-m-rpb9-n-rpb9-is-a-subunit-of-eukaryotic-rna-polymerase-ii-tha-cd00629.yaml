identifier: CDD:cd00629
label: RNA_pol_M_RPB9_N
definition: >-
  RNA_pol_M_RPB9_N. RPB9 is a subunit of eukaryotic RNA polymerase II that contributes to transcription elongation by recruiting transcription factor TFIIE to the RNA polymerase II complex. RPB9 is also necessary for accurate transcription start site selection. Rpb9 contains two conserved zinc ribbon domains and this CD represents the N-terminal domain.The C-terminal domain of Rpb9 binds the DNA template and is included in a separate CD.RPB9 has paralogs (RPA12 and RPC11) that assemble into the RNA polymerase I and III complexes respectively and they are included in this CD. RPB9 also has an archeal ortholog called subunit M but does not exist in bacteria
