identifier: CDD:cd11282
label: "Coactosin-like members of the ADF homology domain family. Actin depolymerization factor/cofilin-like domains (ADF domains) are present in a family of essential eukaryotic actin regulatory proteins. Many of these proteins enhance the turnover rate of actin and interact with actin monomers as well as actin filaments. The function of coactosins is not well understood. They appear to interfere with the capping of actin filaments in Dictyostelium, and may not be able to bind monomeric globular actin. A role for coactosins as chaperones stabilizing 5-lipoxygenase (5LO) has been suggested; 5LO plays a crucial role in leukotriene synthesis."
definition: >-
