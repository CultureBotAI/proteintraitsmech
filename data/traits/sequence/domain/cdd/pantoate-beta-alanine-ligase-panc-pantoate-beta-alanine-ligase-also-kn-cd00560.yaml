label: "Pantoate-beta-alanine ligase. PanC  Pantoate-beta-alanine ligase, also known as pantothenate synthase, catalyzes the formation of pantothenate from pantoate and alanine.  PanC  belongs to a large superfamily of nucleotidyltransferases that includes , ATP sulfurylase (ATPS), phosphopantetheine adenylyltransferase (PPAT), and the amino-acyl tRNA synthetases. The enzymes of this family are structurally similar and share a dinucleotide-binding domain."
definition: >-
  Pantoate-beta-alanine ligase. PanC Pantoate-beta-alanine ligase, also known as pantothenate synthase, catalyzes the formation of pantothenate from pantoate and alanine. PanC belongs to a large superfamily of nucleotidyltransferases that includes , ATP sulfurylase (ATPS), phosphopantetheine adenylyltransferase (PPAT), and the amino-acyl tRNA synthetases. The enzymes of this family are structurally similar and share a dinucleotide-binding domain. — an NCBI CDD conserved domain (cd00560); members share this curated model.
