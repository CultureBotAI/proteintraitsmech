identifier: CDD:cd10151
label: TthCsoR-like_DUF156
definition: >-
  Thermus thermophilus CsoR, a Cu(I)-sensing transcriptional regulator, and related domains; this domain family was previously known as part of DUF156. This domain family contains various Cu(I)-inducible transcriptional regulators including CsoR (copper-sensitive operon repressor) from Mycobacterium tuberculosis (MtCsoR), and Thermus thermophilus (TthCsoR). CsoR regulates the expression of genes involved in copper homeostasis. For example, TthCsoR binds the promoter region of the copZ-csoR-copA operon, and represses expression of these genes, which encode the copper chaperone CopZ, CsoR, and the copper efflux P-type ATPase CopA, respectively. In the presence of excess Cu(I), TthCsoR binds this ion, and is released from the DNA, allowing expression of the downstream genes. TthCsoR also senses other metal ions such as Cu(II), Zn(II), Ag(I), Cd(II) and Ni(II). MtCsoR regulates an operon that includes CsoR and a putative copper transporter gene, ctpV (cation transporter P-type ATPase). CsoRs form a homotetramer (dimer of dimers). In MtCsoR, within each dimer, two Cys residues on opposite subunits, along with a His residue, bind the Cu(I) ion (forming a triagonal S2N coordination complex, C-H-C). These residues are conserved in some but not all members of this family; for example, for TthCsoR, there is a His instead of the second Cys as well as an N-terminal His (not found in those family members having C-H-C) which may also be involved in metal binding (H-C-H-H). A conserved Tyr and a Glu residue facilitate allosteric regulation of DNA binding
