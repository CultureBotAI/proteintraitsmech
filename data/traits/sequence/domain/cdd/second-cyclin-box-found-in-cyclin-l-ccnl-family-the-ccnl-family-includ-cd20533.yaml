identifier: CDD:cd20533
label: "second cyclin box found in cyclin-L (CCNL) family. The CCNL family includes two cyclins, CCNL1 and CCNL2. CCNL1 is involved in regulation of RNA polymerase II (pol II) transcription. It functions in association with cyclin-dependent kinases (CDKs). CCNL2 is a novel RNA polymerase II-associated cyclin involved in pre-mRNA splicing. It may induce cell death, possibly by acting on the transcription and RNA processing of apoptosis-related factors. Members of this family contain two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain."
definition: >-
  second cyclin box found in cyclin-L (CCNL) family. The CCNL family includes two cyclins, CCNL1 and CCNL2. CCNL1 is involved in regulation of RNA polymerase II (pol II) transcription. It functions in association with cyclin-dependent kinases (CDKs). CCNL2 is a novel RNA polymerase II-associated cyclin involved in pre-mRNA splicing. It may induce cell death, possibly by acting on the transcription and RNA processing of apoptosis-related factors. Members of this family contain two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20533); members share this curated model.
