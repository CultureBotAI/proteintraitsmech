identifier: CDD:cd17031
label: "Class IA type III secretion system chaperone protein, similar to Yersinia pestis SycN. This family includes type III secretion system (T3SS) chaperone proteins similar to Yersinia pestis SycN and similar proteins. In Yersinia pestis, the causative agent of bubonic and pneumonic plague, the T3SS allows injection of effector proteins, termed Yersinia outer proteins (Yops) into macrophages and other immune cells, forming pores in the host cell membrane and have been linked to cytolysis. The secretion of Yops is regulated by the activity of the YopN/SycN/YscB/TyeA complex; SycN-YscB forms a heterodimeric secretion chaperone and binds YopN, a key part of a complex that regulates type III secretion, in response to calcium levels, so that secretion occurs only after contact with the targeted eukaryotic cell. Negative regulation is mediated by the complex by blocking the entrance to the secretion apparatus prior to contact with mammalian cells."
definition: >-
  Class IA type III secretion system chaperone protein, similar to Yersinia pestis SycN. This family includes type III secretion system (T3SS) chaperone proteins similar to Yersinia pestis SycN and similar proteins. In Yersinia pestis, the causative agent of bubonic and pneumonic plague, the T3SS allows injection of effector proteins, termed Yersinia outer proteins (Yops) into macrophages and other immune cells, forming pores in the host cell membrane and have been linked to cytolysis. The secretion of Yops is regulated by the activity of the YopN/SycN/YscB/TyeA complex; SycN-YscB forms a heterodimeric secretion chaperone and binds YopN, a key part of a complex that regulates type III secretion, in response to calcium levels, so that secretion occurs only after contact with the targeted eukaryotic cell. Negative regulation is mediated by the complex by blocking the entrance to the secretion apparatus prior to contact with mammalian cells. — an NCBI CDD conserved domain (cd17031); members share this curated model.
