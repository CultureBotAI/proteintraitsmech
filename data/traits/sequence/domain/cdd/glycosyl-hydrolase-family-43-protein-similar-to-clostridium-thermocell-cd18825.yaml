identifier: CDD:cd18825
label: "Glycosyl hydrolase family 43 protein similar to Clostridium thermocellum exo-beta-1,3-galactanase CtGH43 and Ruminococcus champanellensis arabinanase Ara43A. This uncharacterized glycosyl hydrolase family 43 (GH43) subgroup belongs to a subgroup which includes characterized enzymes with exo-beta-1,3-galactanase (EC 3.2.1.145, also known as galactan 1,3-beta-galactosidase) activity such as Clostridium thermocellum (Ct1,3Gal43A or CtGH43) and Phanerochaete chrysosporium 1,3Gal43A (Pc1, 3Gal43A), and arabinanase (EC 3.2.1.99) activity such as Ruminococcus champanellensis Ara43A. GH43 are inverting enzymes (i.e. they invert the stereochemistry of the anomeric carbon atom of the substrate) that have an aspartate as the catalytic general base, a glutamate as the catalytic general acid and another aspartate that is responsible for pKa modulation and orienting the catalytic acid. Many GH43 enzymes display both alpha-L-arabinofuranosidase and beta-D-xylosidase activity using aryl-glycosides as substrates. A common structural feature of GH43 enzymes is a 5-bladed beta-propeller domain that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller."
definition: >-
  Glycosyl hydrolase family 43 protein similar to Clostridium thermocellum exo-beta-1,3-galactanase CtGH43 and Ruminococcus champanellensis arabinanase Ara43A. This uncharacterized glycosyl hydrolase family 43 (GH43) subgroup belongs to a subgroup which includes characterized enzymes with exo-beta-1,3-galactanase (EC 3.2.1.145, also known as galactan 1,3-beta-galactosidase) activity such as Clostridium thermocellum (Ct1,3Gal43A or CtGH43) and Phanerochaete chrysosporium 1,3Gal43A (Pc1, 3Gal43A), and arabinanase (EC 3.2.1.99) activity such as Ruminococcus champanellensis Ara43A. GH43 are inverting enzymes (i.e. they invert the stereochemistry of the anomeric carbon atom of the substrate) that have an aspartate as the catalytic general base, a glutamate as the catalytic general acid and another aspartate that is responsible for pKa modulation and orienting the catalytic acid. Many GH43 enzymes display both alpha-L-arabinofuranosidase and beta-D-xylosidase activity using aryl-glycosides as substrates. A common structural feature of GH43 enzymes is a 5-bladed beta-propeller domain that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller. — an NCBI CDD conserved domain (cd18825); members share this curated model.
