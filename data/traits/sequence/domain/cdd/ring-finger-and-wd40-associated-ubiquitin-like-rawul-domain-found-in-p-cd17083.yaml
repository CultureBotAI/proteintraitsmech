identifier: CDD:cd17083
label: "RING finger- and WD40-associated ubiquitin-like (RAWUL) domain found in polycomb group RING finger protein 3 (PCGF3) and similar proteins. PCGF3, also termed RING finger protein 3A (RNF3A), is one of six PcG RING finger (PCGF) homologs (PCGF1, PCGF2/Mel-18, PCGF3, PCGF4/BMI1, PCGF5, and PCGF6) and serves as the core component of a Polycomb repressive complex 1 (PRC1). Like other PCGF homologs, PCGF3 associates with ring finger protein 2 (RNF2) to form a RNF2-PCGF heterodimer, which is catalytically competent as an E3 ubiquitin transferase and is the scaffold for the assembly of additional components. PCGF3 contains a C3HC4-type RING-HC finger, and a RAWUL domain."
definition: >-
  RING finger- and WD40-associated ubiquitin-like (RAWUL) domain found in polycomb group RING finger protein 3 (PCGF3) and similar proteins. PCGF3, also termed RING finger protein 3A (RNF3A), is one of six PcG RING finger (PCGF) homologs (PCGF1, PCGF2/Mel-18, PCGF3, PCGF4/BMI1, PCGF5, and PCGF6) and serves as the core component of a Polycomb repressive complex 1 (PRC1). Like other PCGF homologs, PCGF3 associates with ring finger protein 2 (RNF2) to form a RNF2-PCGF heterodimer, which is catalytically competent as an E3 ubiquitin transferase and is the scaffold for the assembly of additional components. PCGF3 contains a C3HC4-type RING-HC finger, and a RAWUL domain. — an NCBI CDD conserved domain (cd17083); members share this curated model.
