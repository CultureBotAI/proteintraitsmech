identifier: CDD:cd22979
label: "dimerization/docking (D/D) domain found in adenylate kinase isoenzyme 8 (AK8) and similar proteins. AK8 (EC 2.7.4.3/EC 2.7.4.6), also called ATP-AMP transphosphorylase 8, acts as a nucleoside monophosphate (NMP) kinase that catalyzes the reversible transfer of the terminal phosphate group between nucleoside triphosphates and monophosphates. It has highest activity toward AMP, and weaker activity toward dAMP, CMP and dCMP. It also displays broad nucleoside diphosphate kinase activity. AK8 contains an N-terminal domain that shows high sequence similarity to the dimerization/docking (D/D) domains of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1."
definition: >-
