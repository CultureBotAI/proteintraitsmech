identifier: CDD:cd11922
label: "Second Src Homology 3 domain of Sorbin and SH3 domain containing 1 (Sorbs1), also called ponsin. Sorbs1 is also called ponsin, SH3P12, or CAP (c-Cbl associated protein). It is an adaptor protein containing one sorbin homology (SoHo) and three SH3 domains. It binds Cbl and plays a major role in regulating the insulin signaling pathway by enhancing insulin-induced phosphorylation of Cbl. Sorbs1, like vinexin, localizes at cell-ECM and cell-cell adhesion sites where it binds vinculin, paxillin, and afadin. It may function in the control of cell motility. Other interaction partners of Sorbs1 include c-Abl, Sos, flotillin, Grb4, ataxin-7, filamin C, among others. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Second Src Homology 3 domain of Sorbin and SH3 domain containing 1 (Sorbs1), also called ponsin. Sorbs1 is also called ponsin, SH3P12, or CAP (c-Cbl associated protein). It is an adaptor protein containing one sorbin homology (SoHo) and three SH3 domains. It binds Cbl and plays a major role in regulating the insulin signaling pathway by enhancing insulin-induced phosphorylation of Cbl. Sorbs1, like vinexin, localizes at cell-ECM and cell-cell adhesion sites where it binds vinculin, paxillin, and afadin. It may function in the control of cell motility. Other interaction partners of Sorbs1 include c-Abl, Sos, flotillin, Grb4, ataxin-7, filamin C, among others. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11922); members share this curated model.
