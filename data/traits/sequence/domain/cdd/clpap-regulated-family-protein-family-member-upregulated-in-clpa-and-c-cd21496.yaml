identifier: CDD:cd21496
label: clpAP-regulated
definition: >-
  clpAP-regulated family protein. Family member upregulated in clpA and clpP mutants of Pseudomonas fluorescens SS101; protease complex ClpAP regulates lipopeptide biosynthesis. Family member shown to be a target of the CbrAB/Crc Carbon Catabolite Control System in Pseudomonas aeruginosa. Family member proposed to be involved in lipid metabolism in Burkholderia pseudomallei
