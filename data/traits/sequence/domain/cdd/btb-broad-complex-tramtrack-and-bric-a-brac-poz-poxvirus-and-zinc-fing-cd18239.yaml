identifier: CDD:cd18239
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like proteins KLHL9 and KLHL13. KLHL9 and KLHL13 (also called BTB and kelch domain-containing protein 2, or BKLHD2) are substrate-specific adaptors of a BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex required for mitotic progression and cytokinesis. The BCR(KLHL9-KLHL13) E3 ubiquitin ligase complex mediates the ubiquitination of AURKB and controls the dynamic behavior of AURKB on mitotic chromosomes, thereby coordinating faithful mitotic progression and completion of cytokinesis. They contain a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like proteins KLHL9 and KLHL13. KLHL9 and KLHL13 (also called BTB and kelch domain-containing protein 2, or BKLHD2) are substrate-specific adaptors of a BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex required for mitotic progression and cytokinesis. The BCR(KLHL9-KLHL13) E3 ubiquitin ligase complex mediates the ubiquitination of AURKB and controls the dynamic behavior of AURKB on mitotic chromosomes, thereby coordinating faithful mitotic progression and completion of cytokinesis. They contain a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18239); members share this curated model.
