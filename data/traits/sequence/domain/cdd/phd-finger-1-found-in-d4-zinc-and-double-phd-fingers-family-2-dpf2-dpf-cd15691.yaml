identifier: CDD:cd15691
label: "PHD finger 1 found in D4, zinc and double PHD fingers family 2 (DPF2). DPF2 (also termed zinc finger protein ubi-d4, apoptosis response zinc finger protein, BRG1-associated factor 45D (BAF45D), or protein requiem) is a transcription factor that is encoded by the ubiquitously expressed gene, ubi-d4, and may be involved in leukemia or other cancers with other genes connected with cancer. It recognizes acetylated histone H3 and suppresses the function of estrogen-related receptor alpha (ERRalpha) through histone deacetylase 1 (HDAC1). Moreover, DPF2 functions as a linker protein between the SWI/SNF complex and RelB/p52 NF-kappaB heterodimer and plays important roles in NF-kappaB transactivation via its non-canonical pathway. It is also required as a transcriptional coactivator in SWI/SNF complex-dependent activation of NF-kappaB RelA/p50 heterodimer. DPF2 contains a nuclear localization signal in the N-terminal region, a Cys2His2 (C2H2) zinc finger or Kruppel-type zinc-finger and a sequence of negatively charged amino acids in the central region, and a cysteine/histidine-rich region that is composed of two adjacent plant homeodomain (PHD) fingers (d4-domain) in the C-terminal part of the molecule. This subfamily also includes DPF3 from zebrafish. This model describes the first PHD finger."
definition: >-
  PHD finger 1 found in D4, zinc and double PHD fingers family 2 (DPF2). DPF2 (also termed zinc finger protein ubi-d4, apoptosis response zinc finger protein, BRG1-associated factor 45D (BAF45D), or protein requiem) is a transcription factor that is encoded by the ubiquitously expressed gene, ubi-d4, and may be involved in leukemia or other cancers with other genes connected with cancer. It recognizes acetylated histone H3 and suppresses the function of estrogen-related receptor alpha (ERRalpha) through histone deacetylase 1 (HDAC1). Moreover, DPF2 functions as a linker protein between the SWI/SNF complex and RelB/p52 NF-kappaB heterodimer and plays important roles in NF-kappaB transactivation via its non-canonical pathway. It is also required as a transcriptional coactivator in SWI/SNF complex-dependent activation of NF-kappaB RelA/p50 heterodimer. DPF2 contains a nuclear localization signal in the N-terminal region, a Cys2His2 (C2H2) zinc finger or Kruppel-type zinc-finger and a sequence of negatively charged amino acids in the central region, and a cysteine/histidine-rich region that is composed of two adjacent plant homeodomain (PHD) fingers (d4-domain) in the C-terminal part of the molecule. This subfamily also includes DPF3 from zebrafish. This model describes the first PHD finger. — an NCBI CDD conserved domain (cd15691); members share this curated model.
