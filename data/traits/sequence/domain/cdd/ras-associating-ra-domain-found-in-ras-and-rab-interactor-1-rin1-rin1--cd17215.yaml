identifier: CDD:cd17215
label: "Ras-associating (RA) domain found in Ras and Rab interactor 1 (Rin1). Rin1, also termed Ras inhibitor JC99, or Ras interaction/interference protein 1, is a downstream Ras effector that represents a unique class of Ras effector connected to two independent signaling pathways. The first effector pathway is the direct activation of RAB5-mediated endocytosis and the second pathway involves direct activation of ABL tyrosine kinase activity. Rin1 functions as a guanine nucleotide exchange factor (GEF) for RAB5 GTPases. The RAB5 GEF activity of Rin1 promotes early endosome fusion, an early event in transit to the lysosome. Rin1 binds the SH3 and SH2 domains of ABL proteins, ABL1 and ABL2, and activates their tyrosine kinase activity. Rin1 contains SH2 and proline-rich domains in the N-terminal region, and RH, VPS9, and RA domains in the C-terminal region. The RA domain has the beta-grasp ubiquitin-like (Ubl) fold with low sequence similarity to ubiquitin; ubiquitin is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair."
definition: >-
  Ras-associating (RA) domain found in Ras and Rab interactor 1 (Rin1). Rin1, also termed Ras inhibitor JC99, or Ras interaction/interference protein 1, is a downstream Ras effector that represents a unique class of Ras effector connected to two independent signaling pathways. The first effector pathway is the direct activation of RAB5-mediated endocytosis and the second pathway involves direct activation of ABL tyrosine kinase activity. Rin1 functions as a guanine nucleotide exchange factor (GEF) for RAB5 GTPases. The RAB5 GEF activity of Rin1 promotes early endosome fusion, an early event in transit to the lysosome. Rin1 binds the SH3 and SH2 domains of ABL proteins, ABL1 and ABL2, and activates their tyrosine kinase activity. Rin1 contains SH2 and proline-rich domains in the N-terminal region, and RH, VPS9, and RA domains in the C-terminal region. The RA domain has the beta-grasp ubiquitin-like (Ubl) fold with low sequence similarity to ubiquitin; ubiquitin is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair. — an NCBI CDD conserved domain (cd17215); members share this curated model.
