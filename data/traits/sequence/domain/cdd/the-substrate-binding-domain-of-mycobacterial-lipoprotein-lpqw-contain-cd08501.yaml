identifier: CDD:cd08501
label: "The substrate-binding domain of mycobacterial lipoprotein Lpqw contains type 2 periplasmic binding fold. LpqW is one of key players in synthesis and transport of the unique components of the mycobacterial cell wall which is a complex structure rich in two related lipoglycans, the phosphatidylinositol mannosides (PIMs) and lipoarabinomannans (LAMs).  Lpqw is a highly conserved lipoprotein that transport intermediates from a pathway for mature PIMs production into a pathway for LAMs biosynthesis, thus controlling the relative abundance of these two essential components of cell wall.   LpqW is thought to have been adapted by the cell-wall biosynthesis machinery of mycobacteria and other closely related pathogens, evolving to play an important role in PIMs/LAMs biosynthesis.  Most of periplasmic binding proteins are comprised of only two globular subdomains corresponding to domains I and III of the LpqW protein. The structural topology of these domains is most similar to that of the type 2 periplasmic binding proteins (PBP2), which are responsible for the uptake of a variety of substrates such as phosphate, sulfate, polysaccharides, lysine/arginine/ornithine, and histidine.  The PBP2 bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. After binding their specific ligand with high affinity, they can interact with a cognate membrane transport complex comprised of two integral membrane domains and two cytoplasmically located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis.  Besides transport proteins, the PBP2 superfamily includes the ligand-binding domains from ionotropic glutamate receptors, LysR-type transcriptional regulators, and unorthodox sensor proteins involved in signal transduction."
definition: >-
  The substrate-binding domain of mycobacterial lipoprotein Lpqw contains type 2 periplasmic binding fold. LpqW is one of key players in synthesis and transport of the unique components of the mycobacterial cell wall which is a complex structure rich in two related lipoglycans, the phosphatidylinositol mannosides (PIMs) and lipoarabinomannans (LAMs). Lpqw is a highly conserved lipoprotein that transport intermediates from a pathway for mature PIMs production into a pathway for LAMs biosynthesis, thus controlling the relative abundance of these two essential components of cell wall. LpqW is thought to have been adapted by the cell-wall biosynthesis machinery of mycobacteria and other closely related pathogens, evolving to play an important role in PIMs/LAMs biosynthesis. Most of periplasmic binding proteins are comprised of only two globular subdomains corresponding to domains I and III of the LpqW protein. The structural topology of these domains is most similar to that of the type 2 periplasmic binding proteins (PBP2), which are responsible for the uptake of a variety of substrates such as phosphate, sulfate, polysaccharides, lysine/arginine/ornithine, and histidine. The PBP2 bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. After binding their specific ligand with high affinity, they can interact with a cognate membrane transport complex comprised of two integral membrane domains and two cytoplasmically located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis. Besides transport proteins, the PBP2 superfamily includes the ligand-binding domains from ionotropic glutamate receptors, LysR-type transcriptional regulators, and unorthodox sensor proteins involved in signal transduction. — an NCBI CDD conserved domain (cd08501); members share this curated model.
