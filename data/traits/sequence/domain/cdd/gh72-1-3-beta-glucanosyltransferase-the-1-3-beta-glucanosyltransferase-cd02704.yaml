identifier: CDD:cd02704
label: "GH72_1_3_beta_glucanosyltransferase. The 1,3-beta-glucanosyltransferases of glycosyl hydrolase family 72 (GH72) are glycosylphosphatidylinositol-anchored plasma membrane glycoproteins that are required for proper cell wall assembly and morphogenesis in fungal pathogens such as Candida albicans and Aspergillus fumigatus.  1,3-beta-glucanosyltransferases catalyze the cleavage of a 1,3-beta-glucan molecule and the transfer of the newly generated reducing end to the non-reducing end of another 1,3-beta-glucan molecule forming a 1,3-beta-linkage.  Members of this family include GAS1 from Saccharomyces cerevisiae, PHR1 from Candida albicans, and GEL1 from Aspergillus fumigatus."
definition: >-
  GH72_1_3_beta_glucanosyltransferase. The 1,3-beta-glucanosyltransferases of glycosyl hydrolase family 72 (GH72) are glycosylphosphatidylinositol-anchored plasma membrane glycoproteins that are required for proper cell wall assembly and morphogenesis in fungal pathogens such as Candida albicans and Aspergillus fumigatus. 1,3-beta-glucanosyltransferases catalyze the cleavage of a 1,3-beta-glucan molecule and the transfer of the newly generated reducing end to the non-reducing end of another 1,3-beta-glucan molecule forming a 1,3-beta-linkage. Members of this family include GAS1 from Saccharomyces cerevisiae, PHR1 from Candida albicans, and GEL1 from Aspergillus fumigatus. — an NCBI CDD conserved domain (cd02704); members share this curated model.
