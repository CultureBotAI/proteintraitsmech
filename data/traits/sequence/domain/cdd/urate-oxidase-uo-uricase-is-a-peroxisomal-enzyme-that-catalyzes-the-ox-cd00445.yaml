identifier: CDD:cd00445
label: "Urate oxidase (UO, uricase) is a peroxisomal enzyme that catalyzes the oxidation of uric acid to allantoin in most fish, amphibian, and mammalian species. The enzymatic process involves catalyzing the oxidative opening of the purine ring during the purine degradation pathway.  In humans and certain other primates, however, the enzyme has been lost by some unknown mechanism. Each monomer contains two instances of this domain.  Its functional form is a homotetramer for most species, though there are reports that some may form heterotetramers based on a few biochemical studies."
definition: >-
  Urate oxidase (UO, uricase) is a peroxisomal enzyme that catalyzes the oxidation of uric acid to allantoin in most fish, amphibian, and mammalian species. The enzymatic process involves catalyzing the oxidative opening of the purine ring during the purine degradation pathway. In humans and certain other primates, however, the enzyme has been lost by some unknown mechanism. Each monomer contains two instances of this domain. Its functional form is a homotetramer for most species, though there are reports that some may form heterotetramers based on a few biochemical studies. — an NCBI CDD conserved domain (cd00445); members share this curated model.
