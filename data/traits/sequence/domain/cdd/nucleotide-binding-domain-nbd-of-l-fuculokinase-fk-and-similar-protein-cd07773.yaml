identifier: CDD:cd07773
label: "nucleotide-binding domain (NBD) of L-fuculokinase (FK) and similar proteins. FK (EC 2.7.1.51), also called L-fuculose kinase, catalyzes the ATP-dependent phosphorylation of L-fuculose to produce L-fuculose-1-phosphate and ADP. It can also phosphorylate, with lower efficiency, D-ribulose, D-xylulose and D-fructose. The presence of Mg2+ or Mn2+ is required for enzymatic activity. FKs belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain."
definition: >-
  nucleotide-binding domain (NBD) of L-fuculokinase (FK) and similar proteins. FK (EC 2.7.1.51), also called L-fuculose kinase, catalyzes the ATP-dependent phosphorylation of L-fuculose to produce L-fuculose-1-phosphate and ADP. It can also phosphorylate, with lower efficiency, D-ribulose, D-xylulose and D-fructose. The presence of Mg2+ or Mn2+ is required for enzymatic activity. FKs belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain. — an NCBI CDD conserved domain (cd07773); members share this curated model.
