identifier: CDD:cd01274
label: "Ankyrin repeat and sterile alpha motif (SAM) domain-containing (Anks) protein family Phosphotyrosine-binding (PTB) domain. Both AIDA-1b (AbetaPP intracellular domain-associated protein 1b) and Odin (also known as ankyrin repeat and sterile alpha motif domain-containing 1A; ANKS1A) belong to the Anks protein family. Both of these family members interacts with the EphA8 receptor. Ank members consists of ankyrin repeats, a SAM domain and a C-terminal PTB domain which is crucial for interaction with the juxtamembrane (JM) region of EphA8. PTB domains are classified into three groups, namely, phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains of which the Anks PTB is a member. PTB domains have a common PH-like fold and are found in various eukaryotic signaling molecules. This domain was initially shown to binds peptides with a NPXY motif with differing requirements for phosphorylation of the tyrosine, although more recent studies have found that some types of PTB domains can bind to peptides lack tyrosine residues altogether. In contrast to SH2 domains, which recognize phosphotyrosine and adjacent carboxy-terminal residues, PTB-domain binding specificity is conferred by residues amino-terminal to the phosphotyrosine. PTB domains are classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains. This cd is part of the Dab-like subgroup."
definition: >-
  Ankyrin repeat and sterile alpha motif (SAM) domain-containing (Anks) protein family Phosphotyrosine-binding (PTB) domain. Both AIDA-1b (AbetaPP intracellular domain-associated protein 1b) and Odin (also known as ankyrin repeat and sterile alpha motif domain-containing 1A; ANKS1A) belong to the Anks protein family. Both of these family members interacts with the EphA8 receptor. Ank members consists of ankyrin repeats, a SAM domain and a C-terminal PTB domain which is crucial for interaction with the juxtamembrane (JM) region of EphA8. PTB domains are classified into three groups, namely, phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains of which the Anks PTB is a member. PTB domains have a common PH-like fold and are found in various eukaryotic signaling molecules. This domain was initially shown to binds peptides with a NPXY motif with differing requirements for phosphorylation of the tyrosine, although more recent studies have found that some types of PTB domains can bind to peptides lack tyrosine residues altogether. In contrast to SH2 domains, which recognize phosphotyrosine and adjacent carboxy-terminal residues, PTB-domain binding specificity is conferred by residues amino-terminal to the phosphotyrosine. PTB domains are classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains. This cd is part of the Dab-like subgroup. — an NCBI CDD conserved domain (cd01274); members share this curated model.
