identifier: CDD:cd21041
label: "KIX domain found in ATP-dependent DNA helicase Q5 (RECQL5) and similar proteins. RECQL5, also termed DNA helicase, RecQ-like type 5 (RecQ5), or RecQ protein-like 5, is an ATP-dependent DNA helicase that plays an important role in DNA replication, transcription and repair. It inhibits elongation of stalled transcripts at DNA damage sites by binding to the RNA polymerase II subunit POLR2A and blocking the TCEA1 binding site. It is required for mitotic chromosome separation after cross-over events and cell cycle progress. The model corresponds to the RECQL5 KIX domain that form three-helix bundles and reveals similarities with domain II of the transcription elongation factor TFIIS."
definition: >-
  KIX domain found in ATP-dependent DNA helicase Q5 (RECQL5) and similar proteins. RECQL5, also termed DNA helicase, RecQ-like type 5 (RecQ5), or RecQ protein-like 5, is an ATP-dependent DNA helicase that plays an important role in DNA replication, transcription and repair. It inhibits elongation of stalled transcripts at DNA damage sites by binding to the RNA polymerase II subunit POLR2A and blocking the TCEA1 binding site. It is required for mitotic chromosome separation after cross-over events and cell cycle progress. The model corresponds to the RECQL5 KIX domain that form three-helix bundles and reveals similarities with domain II of the transcription elongation factor TFIIS. — an NCBI CDD conserved domain (cd21041); members share this curated model.
