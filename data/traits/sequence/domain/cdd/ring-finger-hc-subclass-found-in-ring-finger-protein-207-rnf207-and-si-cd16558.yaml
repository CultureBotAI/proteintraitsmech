identifier: CDD:cd16558
label: "RING finger, HC subclass, found in RING finger protein 207 (RNF207) and similar proteins. RNF207 is a cardiac-specific E3 ubiquitin-protein ligase that plays an important role in the regulation of cardiac repolarization. It regulates action potential duration, likely via effects on human ether-a-go-go-related gene (HERG) trafficking and localization in a heat shock protein-dependent manner. RNF207 contains a C3HC4-type RING-HC finger, Bbox 1 and Bbox C-terminal (BBC) domain, as well as a C-terminal non-homologous region (CNHR)."
definition: >-
  RING finger, HC subclass, found in RING finger protein 207 (RNF207) and similar proteins. RNF207 is a cardiac-specific E3 ubiquitin-protein ligase that plays an important role in the regulation of cardiac repolarization. It regulates action potential duration, likely via effects on human ether-a-go-go-related gene (HERG) trafficking and localization in a heat shock protein-dependent manner. RNF207 contains a C3HC4-type RING-HC finger, Bbox 1 and Bbox C-terminal (BBC) domain, as well as a C-terminal non-homologous region (CNHR). — an NCBI CDD conserved domain (cd16558); members share this curated model.
