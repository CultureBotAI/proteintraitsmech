identifier: CDD:cd16275
label: "Bacillus amyloliquefaciens BaeB and related proteins; MBL-fold metallo hydrolase domain. Bacillus amyloliquefaciens BaeB may play a role in the synthesis of the antibiotic polyketide bacillaene. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions."
