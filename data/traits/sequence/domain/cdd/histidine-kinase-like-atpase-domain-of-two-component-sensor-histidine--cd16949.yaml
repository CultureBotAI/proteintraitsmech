identifier: CDD:cd16949
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli CpxA. This family includes the histidine kinase-like ATPase (HATPase) domains of two-component sensor histidine kinase (HKs) similar to Escherichia coli CpxA, HK of the CpxA-CpxR two-component regulatory system (TCS) which may function in acid stress and in cell wall stability. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA) and a HAMP sensor domain; some also contain a CpxA family periplasmic domain."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli CpxA. This family includes the histidine kinase-like ATPase (HATPase) domains of two-component sensor histidine kinase (HKs) similar to Escherichia coli CpxA, HK of the CpxA-CpxR two-component regulatory system (TCS) which may function in acid stress and in cell wall stability. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA) and a HAMP sensor domain; some also contain a CpxA family periplasmic domain. — an NCBI CDD conserved domain (cd16949); members share this curated model.
