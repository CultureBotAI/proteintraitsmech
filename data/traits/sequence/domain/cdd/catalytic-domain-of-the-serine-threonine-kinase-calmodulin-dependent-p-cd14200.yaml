identifier: CDD:cd14200
label: "Catalytic domain of the Serine/Threonine kinase, Calmodulin Dependent Protein Kinase Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates.  CaMKKs are upstream kinases of the CaM kinase cascade that phosphorylate and activate CaMKI and CamKIV. They may also phosphorylate other substrates including PKB and AMP-activated protein kinase (AMPK). CaMKK1, also called CaMKK alpha, is involved in the regulation of glucose uptake in skeletal muscles, independently of AMPK and PKB activation. It also play roles in learning and memory. Studies on CaMKK1 knockout mice reveal deficits in fear conditioning. The CaMKK1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, Calmodulin Dependent Protein Kinase Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. CaMKKs are upstream kinases of the CaM kinase cascade that phosphorylate and activate CaMKI and CamKIV. They may also phosphorylate other substrates including PKB and AMP-activated protein kinase (AMPK). CaMKK1, also called CaMKK alpha, is involved in the regulation of glucose uptake in skeletal muscles, independently of AMPK and PKB activation. It also play roles in learning and memory. Studies on CaMKK1 knockout mice reveal deficits in fear conditioning. The CaMKK1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14200); members share this curated model.
