identifier: CDD:cd17377
label: "Solute carrier family 22 member 15 of the Major Facilitator Superfamily of transporters. Solute carrier family 22 member 15 (SLC22A15) is also called fly-like putative transporter 1 (FLIPT1). It is expressed at the highest levels in the kidney and brain. It is a member of the SLC22 family of transporters, which includes organic cation transporters (OCTs), organic zwitterion/cation transporters (OCTNs), and organic anion transporters (OATs). SLC22 transporters interact with a variety of compounds that include drugs of abuse, environmental toxins, opioid analgesics, antidepressant and anxiolytic agents, and neurotransmitters and their metabolites. SLC22A15 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
