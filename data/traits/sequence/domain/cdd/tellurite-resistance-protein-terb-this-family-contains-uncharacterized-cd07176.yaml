label: "tellurite resistance protein terB. This family contains uncharacterized bacterial proteins involved in tellurium resistance. The prototype of this CD is the Kp-terB protein from Klebsiella pneumoniae, whose 3D structure was recently determined. The biological function of terB and the mechanism responsible for tellurium resistance are unknown."
