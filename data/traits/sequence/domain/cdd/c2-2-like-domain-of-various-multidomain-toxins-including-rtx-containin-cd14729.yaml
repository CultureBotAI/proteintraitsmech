identifier: CDD:cd14729
label: "C2-2 like domain of various multidomain toxins, including RTX-containing like proteins. This group contains mostly poorly-characterized C2-2 like domains of multidomain bacterial toxins, including Pasteurella multocida toxin PMT (also known as dermonecrotic toxin), MARTX (multifunctional-autoprocessing repeats-in-toxin holotoxin RtxA) proteins from Vibrio vulnificus, as well as bacterial effector protein from Pseudomonas syringae (type III effector HopAC1). MARTX domains at the N- and C- termini act in the translocation of the central domain across the eukaryotic plasma membrane, where it is proteolytically released. These are related to Pasteurella multicida toxin, which has structural and sequence similarity to the TIKI/TraB family of proteases. However, while this group of multidomain proteins shows fairly strong conservation of the active site residues of this family, the Pasteurella multicida toxin does not."
definition: >-
  C2-2 like domain of various multidomain toxins, including RTX-containing like proteins. This group contains mostly poorly-characterized C2-2 like domains of multidomain bacterial toxins, including Pasteurella multocida toxin PMT (also known as dermonecrotic toxin), MARTX (multifunctional-autoprocessing repeats-in-toxin holotoxin RtxA) proteins from Vibrio vulnificus, as well as bacterial effector protein from Pseudomonas syringae (type III effector HopAC1). MARTX domains at the N- and C- termini act in the translocation of the central domain across the eukaryotic plasma membrane, where it is proteolytically released. These are related to Pasteurella multicida toxin, which has structural and sequence similarity to the TIKI/TraB family of proteases. However, while this group of multidomain proteins shows fairly strong conservation of the active site residues of this family, the Pasteurella multicida toxin does not. — an NCBI CDD conserved domain (cd14729); members share this curated model.
