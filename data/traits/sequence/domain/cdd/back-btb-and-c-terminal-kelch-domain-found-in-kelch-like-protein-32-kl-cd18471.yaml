label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 32 (KLHL32). KLHL32, also termed BTB and kelch domain-containing protein 5 (BKLHD5), belongs to the KLHL family. Its function remains unclear. KLHL32 SNPs may be associated with body mass index in individuals of African ancestry."
