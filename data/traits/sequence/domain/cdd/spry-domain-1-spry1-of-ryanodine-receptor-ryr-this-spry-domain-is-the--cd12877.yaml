identifier: CDD:cd12877
label: "SPRY domain 1 (SPRY1) of ryanodine receptor (RyR). This SPRY domain is the first of three structural repeats in all three isoforms of the ryanodine receptor (RyR), which are the major Ca2+ release channels in the membranes of sarcoplasmic reticulum (SR). There are three RyR genes in mammals; the skeletal RyR1, the cardiac RyR2 and the brain RyR3. The three SPRY domains are located in the N-terminal part of the cytoplasmic region of the RyRs, but no specific function has been found for this first SPRY domain of the RyRs."
definition: >-
  SPRY domain 1 (SPRY1) of ryanodine receptor (RyR). This SPRY domain is the first of three structural repeats in all three isoforms of the ryanodine receptor (RyR), which are the major Ca2+ release channels in the membranes of sarcoplasmic reticulum (SR). There are three RyR genes in mammals; the skeletal RyR1, the cardiac RyR2 and the brain RyR3. The three SPRY domains are located in the N-terminal part of the cytoplasmic region of the RyRs, but no specific function has been found for this first SPRY domain of the RyRs. — an NCBI CDD conserved domain (cd12877); members share this curated model.
