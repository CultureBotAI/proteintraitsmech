identifier: CDD:cd07532
label: "UmpH/NagD family phosphatase para nitrophenyl phosphate phosphatase, similar to Plasmodium falciparum PNPase. Plasmodium falciparum para nitrophenyl phosphate phosphatase (PNPase) catalyzes the dephosphorylation of thiamine monophosphate to thiamine, other substrates on which its active are nucleotides, phosphorylated sugars, pyridoxal-5-phosphate, and paranitrophenyl phosphate. This subfamily belongs to the UmpH/NagD phosphatase family, and to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases."
definition: >-
  UmpH/NagD family phosphatase para nitrophenyl phosphate phosphatase, similar to Plasmodium falciparum PNPase. Plasmodium falciparum para nitrophenyl phosphate phosphatase (PNPase) catalyzes the dephosphorylation of thiamine monophosphate to thiamine, other substrates on which its active are nucleotides, phosphorylated sugars, pyridoxal-5-phosphate, and paranitrophenyl phosphate. This subfamily belongs to the UmpH/NagD phosphatase family, and to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases. — an NCBI CDD conserved domain (cd07532); members share this curated model.
