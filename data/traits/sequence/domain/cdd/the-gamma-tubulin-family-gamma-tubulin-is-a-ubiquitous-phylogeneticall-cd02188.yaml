identifier: CDD:cd02188
label: "The gamma-tubulin family. Gamma-tubulin is a ubiquitous phylogenetically conserved member of tubulin superfamily.  Gamma is a low abundance protein present within the cells in both various types of microtubule-organizing centers and cytoplasmic protein complexes.  Gamma-tubulin recruits the alpha/beta-tubulin dimers that form the minus ends of microtubules and is thought to be involved in microtubule nucleation and capping."
definition: >-
  The gamma-tubulin family. Gamma-tubulin is a ubiquitous phylogenetically conserved member of tubulin superfamily. Gamma is a low abundance protein present within the cells in both various types of microtubule-organizing centers and cytoplasmic protein complexes. Gamma-tubulin recruits the alpha/beta-tubulin dimers that form the minus ends of microtubules and is thought to be involved in microtubule nucleation and capping. — an NCBI CDD conserved domain (cd02188); members share this curated model.
