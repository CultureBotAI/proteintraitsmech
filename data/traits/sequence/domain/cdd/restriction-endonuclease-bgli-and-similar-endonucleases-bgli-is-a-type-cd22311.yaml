identifier: CDD:cd22311
label: "Restriction endonuclease BglI and similar endonucleases. BglI is a type II restriction endonuclease that recognizes the interrupted DNA sequence GCCNNNNNGGC and cleaves between the fourth and fifth unspecified base pair to produce overhanging ends; it belongs to a superfamily of nucleases including very short patch repair (Vsr) Endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Restriction endonuclease BglI and similar endonucleases. BglI is a type II restriction endonuclease that recognizes the interrupted DNA sequence GCCNNNNNGGC and cleaves between the fourth and fifth unspecified base pair to produce overhanging ends; it belongs to a superfamily of nucleases including very short patch repair (Vsr) Endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22311); members share this curated model.
