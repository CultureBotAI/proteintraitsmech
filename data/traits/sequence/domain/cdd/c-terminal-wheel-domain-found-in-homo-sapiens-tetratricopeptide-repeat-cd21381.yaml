identifier: CDD:cd21381
label: "C-terminal wheel domain found in Homo sapiens tetratricopeptide repeat protein 4 (TTC4) and similar proteins. TTC4, also called TPR repeat protein 4, is a putative Hsp90 co-chaperone which interacts with CDC6 and shows alterations in transformed cells. It interacts with TBK1 and promotes Sendai virus (SeV)-induced host cell innate immune responses. The model corresponds to TTC4 C-terminal wheel domain consisting of a twisted five-stranded beta sheet surrounded by several alpha helices."
definition: >-
  C-terminal wheel domain found in Homo sapiens tetratricopeptide repeat protein 4 (TTC4) and similar proteins. TTC4, also called TPR repeat protein 4, is a putative Hsp90 co-chaperone which interacts with CDC6 and shows alterations in transformed cells. It interacts with TBK1 and promotes Sendai virus (SeV)-induced host cell innate immune responses. The model corresponds to TTC4 C-terminal wheel domain consisting of a twisted five-stranded beta sheet surrounded by several alpha helices. — an NCBI CDD conserved domain (cd21381); members share this curated model.
