identifier: CDD:cd06668
label: "PDZ domain 4 of multi-PDZ-domain protein 1 (MUPP1) and PATJ (protein-associated tight junction) and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 4 of MUPP1 and PATJ, and related domains. MUPP1 and PATJ serve as scaffolding proteins linking different proteins and protein complexes involved in the organization of tight junctions and epithelial polarity. MUPP1 contains an L27 (Lin-2 and Lin-7 binding) domain and 13 PDZ domains. PATJ (also known as INAD-like) contains an L27 domain and ten PDZ domains. MUPP1 and PATJ share several binding partners, including junctional adhesion molecules (JAM), zonula occludens (ZO)-3, Pals1 (protein associated with Lin-7), Par (partitioning defective)-6 proteins, and nectins (adherence junction adhesion molecules). PATJ lacks 3 PDZ domains seen in MUPP1: PDZ6, 9, and 13; consequently, MUPP1 PDZ7 and 8 align with PATJ PDZ6 and 7; and MUPP1 PDZ domains 10-12 align with PATJ PDZ domains 8-10. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This MUPP1-like family PDZ4 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F"
definition: >-
  PDZ domain 4 of multi-PDZ-domain protein 1 (MUPP1) and PATJ (protein-associated tight junction) and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 4 of MUPP1 and PATJ, and related domains. MUPP1 and PATJ serve as scaffolding proteins linking different proteins and protein complexes involved in the organization of tight junctions and epithelial polarity. MUPP1 contains an L27 (Lin-2 and Lin-7 binding) domain and 13 PDZ domains. PATJ (also known as INAD-like) contains an L27 domain and ten PDZ domains. MUPP1 and PATJ share several binding partners, including junctional adhesion molecules (JAM), zonula occludens (ZO)-3, Pals1 (protein associated with Lin-7), Par (partitioning defective)-6 proteins, and nectins (adherence junction adhesion molecules). PATJ lacks 3 PDZ domains seen in MUPP1: PDZ6, 9, and 13; consequently, MUPP1 PDZ7 and 8 align with PATJ PDZ6 and 7; and MUPP1 PDZ domains 10-12 align with PATJ PDZ domains 8-10. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This MUPP1-like family PDZ4 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F — an NCBI CDD conserved domain (cd06668); members share this curated model.
