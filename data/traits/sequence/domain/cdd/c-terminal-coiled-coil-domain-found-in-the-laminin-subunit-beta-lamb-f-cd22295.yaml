identifier: CDD:cd22295
label: "C-terminal coiled-coil domain found in the laminin subunit beta (LAMB) family. The LAMB family contains four members, LAMB1-4. They are components of laminin, a complex glycoprotein consisting of three different polypeptide chains (alpha, beta, gamma). Binding to cells via a high affinity receptor, laminin is thought to mediate the attachment, migration, and organization of cells into tissues during embryonic development by interacting with other extracellular matrix components. This model corresponds to the C-terminal coiled-coil domain of LAMB, which may be involved in the integrin binding activity."
definition: >-
  C-terminal coiled-coil domain found in the laminin subunit beta (LAMB) family. The LAMB family contains four members, LAMB1-4. They are components of laminin, a complex glycoprotein consisting of three different polypeptide chains (alpha, beta, gamma). Binding to cells via a high affinity receptor, laminin is thought to mediate the attachment, migration, and organization of cells into tissues during embryonic development by interacting with other extracellular matrix components. This model corresponds to the C-terminal coiled-coil domain of LAMB, which may be involved in the integrin binding activity. — an NCBI CDD conserved domain (cd22295); members share this curated model.
