identifier: CDD:cd15536
label: "PHD finger found in PHD and RING finger domain-containing protein 1 (PHRF1). PHRF1, also termed KIAA1542, or CTD-binding SR-like protein rA9, is a ubiquitin ligase that induces the ubiquitination of TGIF (TG-interacting factor) at lysine 130. It acts as a tumor suppressor that promotes the transforming growth factor (TGF)-beta cytostatic program through selective release of TGIF-driven promyelocytic leukemia protein (PML) inactivation. PHRF1 contains a plant homeodomain (PHD) finger and a RING finger."
definition: >-
  PHD finger found in PHD and RING finger domain-containing protein 1 (PHRF1). PHRF1, also termed KIAA1542, or CTD-binding SR-like protein rA9, is a ubiquitin ligase that induces the ubiquitination of TGIF (TG-interacting factor) at lysine 130. It acts as a tumor suppressor that promotes the transforming growth factor (TGF)-beta cytostatic program through selective release of TGIF-driven promyelocytic leukemia protein (PML) inactivation. PHRF1 contains a plant homeodomain (PHD) finger and a RING finger. — an NCBI CDD conserved domain (cd15536); members share this curated model.
