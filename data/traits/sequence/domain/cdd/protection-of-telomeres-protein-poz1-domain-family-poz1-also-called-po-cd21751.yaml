identifier: CDD:cd21751
label: Poz1
definition: >-
  protection of telomeres protein Poz1 domain family. Poz1, also called Pot1-associated protein Poz1, is a telomeric DNA-binding protein that negatively regulates telomerase and telomere length. It is a component of telomeric shelterin complex that caps chromosome ends and plays a crucial role in telomere maintenance and protection in the fission yeast Schizosaccharomyces pombe. Shelterin is composed of telomeric single- and double-stranded DNA-binding protein subcomplexes Pot1-Tpz1 and Taz1-Rap1, which are bridged by their interacting protein Poz1
