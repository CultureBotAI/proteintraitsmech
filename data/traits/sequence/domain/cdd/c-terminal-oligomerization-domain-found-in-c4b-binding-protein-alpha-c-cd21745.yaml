identifier: CDD:cd21745
label: C4bp-like_CTD
definition: >-
  C-terminal oligomerization domain found in C4b-binding protein alpha chain (C4bp) and similar proteins. C4bp, also called proline-rich protein (PRP), is a plasma glycoprotein complex of 570 kDa that acts as the major inhibitor of the classical complement and lectin pathway. It binds as a cofactor to C3b/C4b inactivator (C3bINA), which then hydrolyzes the complement fragment C4b. It also accelerates the degradation of the C4bC2a complex (C3 convertase) by dissociating the complement fragment C2a. C4bp alpha chain binds C4b. It interacts also with anticoagulant protein S and with serum amyloid P component. The family also includes Zona pellucida sperm-binding protein 3 receptor (Zp3r), also called sperm fertilization protein 56 (sp56). It binds to ZP3 glycoprotein in egg zona pellucida and is probably involved in interactions between sperm acrosome and egg zona pellucida during and immediately following the acrosome reaction. The model corresponds to the C-terminal oligomerization domain of C4bp and ZP3r
