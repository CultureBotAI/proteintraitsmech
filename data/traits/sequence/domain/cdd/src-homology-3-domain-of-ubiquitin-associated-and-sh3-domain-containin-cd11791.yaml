identifier: CDD:cd11791
label: "Src homology 3 domain of Ubiquitin-associated and SH3 domain-containing proteins, also called TULA (T cell Ubiquitin LigAnd) family of proteins. UBASH3 or TULA proteins are also referred to as Suppressor of T cell receptor Signaling (STS) proteins. They contain an N-terminal UBA domain, a central SH3 domain, and a C-terminal histidine phosphatase domain. They bind c-Cbl through the SH3 domain and to ubiquitin via UBA. In some vertebrates, there are two TULA family proteins, called UBASH3A (also called TULA or STS-2) and UBASH3B (also called TULA-2 or STS-1), which show partly overlapping as well as distinct functions. UBASH3B is widely expressed while UBASH3A is only found in lymphoid cells. UBASH3A facilitates apoptosis induced in T cells through its interaction with the apoptosis-inducing factor AIF. UBASH3B is an active phosphatase while UBASH3A is not. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of Ubiquitin-associated and SH3 domain-containing proteins, also called TULA (T cell Ubiquitin LigAnd) family of proteins. UBASH3 or TULA proteins are also referred to as Suppressor of T cell receptor Signaling (STS) proteins. They contain an N-terminal UBA domain, a central SH3 domain, and a C-terminal histidine phosphatase domain. They bind c-Cbl through the SH3 domain and to ubiquitin via UBA. In some vertebrates, there are two TULA family proteins, called UBASH3A (also called TULA or STS-2) and UBASH3B (also called TULA-2 or STS-1), which show partly overlapping as well as distinct functions. UBASH3B is widely expressed while UBASH3A is only found in lymphoid cells. UBASH3A facilitates apoptosis induced in T cells through its interaction with the apoptosis-inducing factor AIF. UBASH3B is an active phosphatase while UBASH3A is not. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11791); members share this curated model.
