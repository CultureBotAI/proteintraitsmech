identifier: CDD:cd23365
label: "soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Leucaena leucocephala trypsin inhibitor (LlTI) and similar proteins. LlTI is a Kunitz-type trypsin inhibitor that inhibits trypsin, plasmin, human plasma kallikrein, chymotrypsin, and factor XIIa activity. This subfamily also includes tamarind Kunitz inhibitor (TKI), Enterolobium contortisiliquum trypsin inhibitor (EcTI), Acacia confusa trypsin inhibitor (AcTI), Bauhinia ungulata factor Xa inhibitor BuXI, and Phanera variegata trypsin inhibitor BvTI. TKI is a Kunitz-type dual inhibitor (TKI) of factor Xa (FXa) and trypsin. It shows prolongation of blood coagulation time. EcTI also belongs to the Kunitz family of plant inhibitors, common in plant seeds. It inhibits trypsin, chymotrypsin, plasma kallikrein, plasmin, human neutrophil elastase, and Factor XIIa in the stoichiometric ratio 1:1, but not thrombin, bovine pancreatic elastase, or Factor Xa. It is involved in the inhibition of the invasion of gastric cancer cells through alterations in integrin-dependent cell signaling pathway. AcTI inhibits trypsin and alpha-chymotrypsin stoichiometrically at the molar ratio of 1:1 and 2:1 respectively. BuXI inhibits bovine trypsin and chymotrypsin, and human plasmin, plasma kallikrein, factor XIIa, and factor Xa. BvTI inhibits bovine trypsin and chymotrypsin, and human plasmin, plasma kallikrein and factor XIIa. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Leucaena leucocephala trypsin inhibitor (LlTI) and similar proteins. LlTI is a Kunitz-type trypsin inhibitor that inhibits trypsin, plasmin, human plasma kallikrein, chymotrypsin, and factor XIIa activity. This subfamily also includes tamarind Kunitz inhibitor (TKI), Enterolobium contortisiliquum trypsin inhibitor (EcTI), Acacia confusa trypsin inhibitor (AcTI), Bauhinia ungulata factor Xa inhibitor BuXI, and Phanera variegata trypsin inhibitor BvTI. TKI is a Kunitz-type dual inhibitor (TKI) of factor Xa (FXa) and trypsin. It shows prolongation of blood coagulation time. EcTI also belongs to the Kunitz family of plant inhibitors, common in plant seeds. It inhibits trypsin, chymotrypsin, plasma kallikrein, plasmin, human neutrophil elastase, and Factor XIIa in the stoichiometric ratio 1:1, but not thrombin, bovine pancreatic elastase, or Factor Xa. It is involved in the inhibition of the invasion of gastric cancer cells through alterations in integrin-dependent cell signaling pathway. AcTI inhibits trypsin and alpha-chymotrypsin stoichiometrically at the molar ratio of 1:1 and 2:1 respectively. BuXI inhibits bovine trypsin and chymotrypsin, and human plasmin, plasma kallikrein, factor XIIa, and factor Xa. BvTI inhibits bovine trypsin and chymotrypsin, and human plasmin, plasma kallikrein and factor XIIa. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23365); members share this curated model.
