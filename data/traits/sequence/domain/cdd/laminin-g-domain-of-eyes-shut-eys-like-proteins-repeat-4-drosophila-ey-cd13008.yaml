identifier: CDD:cd13008
label: "Laminin G domain of eyes shut (eys) like proteins, repeat 4;. Drosophila eyes shut plays an important role in eye development by being essential for the formation of matrix-filled interrhabdomeral space. It contains 14 EGF (epidermal growth factor-like) domains, 4 LamG (Laminin G-like) domains, and a threonine/serine-rich domain. This region is predicted to be highly glycosylated and contains binding sites for glycosaminoglycans.  Laminin G-like domains are usually Ca2+ mediated receptors that can have binding sites for steroids, beta1 integrins, heparin, sulfatides, fibulin-1, and alpha-dystroglycans.Laminin G-like domains are usually Ca2+ mediated receptors that can have binding sites for steroids, beta1 integrins, heparin, sulfatides, fibulin-1, and alpha-dystroglycans. Proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold."
definition: >-
  Laminin G domain of eyes shut (eys) like proteins, repeat 4;. Drosophila eyes shut plays an important role in eye development by being essential for the formation of matrix-filled interrhabdomeral space. It contains 14 EGF (epidermal growth factor-like) domains, 4 LamG (Laminin G-like) domains, and a threonine/serine-rich domain. This region is predicted to be highly glycosylated and contains binding sites for glycosaminoglycans. Laminin G-like domains are usually Ca2+ mediated receptors that can have binding sites for steroids, beta1 integrins, heparin, sulfatides, fibulin-1, and alpha-dystroglycans.Laminin G-like domains are usually Ca2+ mediated receptors that can have binding sites for steroids, beta1 integrins, heparin, sulfatides, fibulin-1, and alpha-dystroglycans. Proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold. — an NCBI CDD conserved domain (cd13008); members share this curated model.
