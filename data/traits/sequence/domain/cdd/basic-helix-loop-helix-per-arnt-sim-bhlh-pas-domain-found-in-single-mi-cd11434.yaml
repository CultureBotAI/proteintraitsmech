identifier: CDD:cd11434
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in single-minded (SIM) family. The SIM family includes Drosophila melanogaster protein SIM and its homologs from vertebrates, single-minded homolog 1 (SIM1) and single-minded homolog 2 (SIM2). SIM is a nuclear bHLH-PAS transcription factor that functions as a master developmental regulator controlling midline development of the ventral nerve cord in Drosophila. SIM1, also termed Class E basic helix-loop-helix protein 14 (bHLHe14), is a bHLH-PAS transcription factor that may have pleiotropic effects during embryogenesis and in the adult. SIM2, also termed Class E basic helix-loop-helix protein 15 (bHLHe15), is a bHLH-PAS transcription factor that may be a master gene of central nervous system (CNS) development in cooperation with ARNT. It may have pleiotropic effects in the tissues expressed during development."
definition: >-
