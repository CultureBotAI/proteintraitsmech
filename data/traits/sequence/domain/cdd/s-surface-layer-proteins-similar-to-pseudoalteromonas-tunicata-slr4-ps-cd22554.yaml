identifier: CDD:cd22554
label: "S (surface)-layer proteins similar to Pseudoalteromonas tunicata Slr4. Pseudoalteromonas tunicata D2 Slr4 (also known as EAR28894 protein) is an S-layer protein and the dominant protein within P. tunicata pellicle biofilm components. S-layers are self-assembling, paracrystalline proteinaceous lattices that form an interface between the cell and its extracellular environment; purified P. tunicata Slr4 protein is able to form square (p4 symmetry) paracrystalline lattices. Slr4 may protect cells and biofilm matrix components against stressors such as attack by viruses, bacteria or eukaryotes. The Slr4 family is widely distributed in gammaproteobacteria, including species of Pseudoalteromonas and Vibrio, and is found exclusively in marine metagenomes. It may play an important role in marine microbial physiology and ecology."
definition: >-
  S (surface)-layer proteins similar to Pseudoalteromonas tunicata Slr4. Pseudoalteromonas tunicata D2 Slr4 (also known as EAR28894 protein) is an S-layer protein and the dominant protein within P. tunicata pellicle biofilm components. S-layers are self-assembling, paracrystalline proteinaceous lattices that form an interface between the cell and its extracellular environment; purified P. tunicata Slr4 protein is able to form square (p4 symmetry) paracrystalline lattices. Slr4 may protect cells and biofilm matrix components against stressors such as attack by viruses, bacteria or eukaryotes. The Slr4 family is widely distributed in gammaproteobacteria, including species of Pseudoalteromonas and Vibrio, and is found exclusively in marine metagenomes. It may play an important role in marine microbial physiology and ecology. — an NCBI CDD conserved domain (cd22554); members share this curated model.
