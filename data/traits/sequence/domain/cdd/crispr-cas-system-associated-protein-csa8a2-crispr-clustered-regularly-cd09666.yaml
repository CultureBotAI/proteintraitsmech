label: Cas8a2_I-A
definition: >-
  CRISPR/Cas system-associated protein Csa8a2. CRISPR (Clustered Regularly Interspaced Short Palindromic Repeats) and associated Cas proteins comprise a system for heritable host defense by prokaryotic cells against phage and other foreign DNA; Zn-finger domain containing protein, distant homologs of Cas8 proteins; signature gene for I-A subtype; also known as Csa4 family
