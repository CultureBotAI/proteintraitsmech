identifier: CDD:cd11658
label: "SANT/myb-like domain of Human Dna Methyltransferase 1 Associated Protein 1-like. These proteins are members of the SANT/myb group. SANT is named after 'SWI3, ADA2, N-CoR and TFIIIB', several factors that share this domain. The SANT domain resembles the 3 alpha-helix bundle of the DNA-binding Myb domains and is found in a diverse set of proteins."
definition: >-
  SANT/myb-like domain of Human Dna Methyltransferase 1 Associated Protein 1-like. These proteins are members of the SANT/myb group. SANT is named after 'SWI3, ADA2, N-CoR and TFIIIB', several factors that share this domain. The SANT domain resembles the 3 alpha-helix bundle of the DNA-binding Myb domains and is found in a diverse set of proteins. — an NCBI CDD conserved domain (cd11658); members share this curated model.
