identifier: CDD:cd19303
label: EFMT4
definition: >-
  EEF1A lysine methyltransferase 4. EEF1A lysine methyltransferase 4 (EFMT4) catalyzes three successive methylations on 'Lys-36' in eukaryotic translation elongation factor 1 alpha (EEF1A1 or EEF1A2). S-adenosylmethionine-dependent methyltransferases (SAM or AdoMet-MTase), class I; AdoMet-MTases are enzymes that use S-adenosyl-L-methionine (SAM or AdoMet) as a substrate for methyltransfer, creating the product S-adenosyl-L-homocysteine (AdoHcy). There are at least five structurally distinct families of AdoMet-MTases, class I being the largest and most diverse. Within this class enzymes can be classified by different substrate specificity (small molecules, lipids, nucleic acids, etc) and different target atoms for methylation (nitrogen, oxygen, carbon, sulfur,etc)
