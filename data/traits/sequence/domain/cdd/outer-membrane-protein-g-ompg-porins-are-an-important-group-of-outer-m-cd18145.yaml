identifier: CDD:cd18145
label: "Outer membrane protein G (OmpG). Porins are an important group of outer membrane (OM) channel proteins which mediate the non-specific, diffusion-based passage of small (<600 Da) polar molecules.  OmpG porin is unique in that it functions as a monomer. All other known porins of Gram-negative bacteria function as trimers, with each monomer composed of a 16-stranded beta-barrel with a relatively narrow central pore. OmpG porin is a14-stranded beta-barrel with a relatively simple architecture and a large ( approximately 13 A) central pore that is similar in size to that of the toxin alpha-hemolysin. OmpG is thought to form a non-specific channel for the transport of larger oligosaccharides. OmpG has pH-dependent channel gating that is thought to be mediated by a histidine pair His231/His261. It is proposed that in acidic pH conditions the protonated histidines would repel each other triggering a refolding of loop L6 to a position where it would block the channel entrance."
definition: >-
  Outer membrane protein G (OmpG). Porins are an important group of outer membrane (OM) channel proteins which mediate the non-specific, diffusion-based passage of small (<600 Da) polar molecules. OmpG porin is unique in that it functions as a monomer. All other known porins of Gram-negative bacteria function as trimers, with each monomer composed of a 16-stranded beta-barrel with a relatively narrow central pore. OmpG porin is a14-stranded beta-barrel with a relatively simple architecture and a large ( approximately 13 A) central pore that is similar in size to that of the toxin alpha-hemolysin. OmpG is thought to form a non-specific channel for the transport of larger oligosaccharides. OmpG has pH-dependent channel gating that is thought to be mediated by a histidine pair His231/His261. It is proposed that in acidic pH conditions the protonated histidines would repel each other triggering a refolding of loop L6 to a position where it would block the channel entrance. — an NCBI CDD conserved domain (cd18145); members share this curated model.
