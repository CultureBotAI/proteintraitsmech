identifier: CDD:cd21864
label: "C-terminal domain of G2 and S phase-expressed protein 1. G2 and S phase-expressed protein 1 (GTSE-1), also called protein B99 homolog, is a cell cycle-regulated protein mainly localized in the cytoplasm and apparently associated with microtubules. It may be involved in p53-induced cell cycle arrest in G2/M phase by interfering with microtubule rearrangements that are required to enter mitosis. Overexpression of GTSE-1 delays G2/M phase progression. GTSE-1 is a clathrin adaptor protein; it is recruited to the spindle by clathrin, which stabilizes microtubules by inhibiting the microtubule depolymerase MCAK. This model corresponds to a conserved domain at the C-terminus of GTSE-1, which is required for clathrin binding and is only conserved in vertebrates."
