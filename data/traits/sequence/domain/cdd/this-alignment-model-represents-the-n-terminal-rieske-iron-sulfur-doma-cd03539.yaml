identifier: CDD:cd03539
label: "This alignment model represents the N-terminal rieske iron-sulfur domain of the oxygenase alpha subunit (NagG) of salicylate 5-hydroxylase (S5H). S5H converts salicylate (2-hydroxybenzoate), a metabolic intermediate of phenanthrene, to gentisate (2,5-dihydroxybenzoate) as part of an alternate pathway for naphthalene catabolism. S5H is a multicomponent enzyme made up of NagGH (the oxygenase components), NagAa (the ferredoxin reductase component), and NagAb (the ferredoxin component). The oxygenase component is made up of alpha (NagG) and beta (NagH) subunits."
definition: >-
  This alignment model represents the N-terminal rieske iron-sulfur domain of the oxygenase alpha subunit (NagG) of salicylate 5-hydroxylase (S5H). S5H converts salicylate (2-hydroxybenzoate), a metabolic intermediate of phenanthrene, to gentisate (2,5-dihydroxybenzoate) as part of an alternate pathway for naphthalene catabolism. S5H is a multicomponent enzyme made up of NagGH (the oxygenase components), NagAa (the ferredoxin reductase component), and NagAb (the ferredoxin component). The oxygenase component is made up of alpha (NagG) and beta (NagH) subunits. — an NCBI CDD conserved domain (cd03539); members share this curated model.
