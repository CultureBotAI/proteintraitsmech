identifier: CDD:cd19720
label: bHLH_TS_NeuroD2
definition: >-
  basic helix-loop-helix (bHLH) domain found in neurogenic differentiation factor 2 (NeuroD2) and similar proteins. NeuroD2, also termed Class A basic helix-loop-helix protein 1 (bHLHa1), or NeuroD-related factor (NDRF), is a neuronal calcium-dependent bHLH transcription factor that induces neuronal differentiation and promotes neuronal survival. It plays a central role in thalamocortical synaptic maturation. NeuroD2 mediates calcium-dependent transcription activation by binding to E box-containing promoter
