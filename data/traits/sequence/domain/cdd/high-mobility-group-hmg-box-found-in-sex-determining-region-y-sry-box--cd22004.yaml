identifier: CDD:cd22004
label: "high mobility group (HMG)-box found in sex-determining region Y (SRY)-box (SOX) family transcription factors. The SOX gene family of transcription factors are characterized by the evolutionarily conserved SRY-type HMG box, which is a DNA binding domain that binds the minor groove of DNA on a common consensus site, (A/T)(A/T)CAA(A/T)G but with different levels of efficiency. Members include SRY and its homologs identified in mammals that can be subdivided into 8 groups (A, B1, B2, C, D, E, F, G, H). They are involved in embryonic development, regulating processes such as cell differentiation, maintenance of stemness, sex determination, and development of the central nervous, haematopoietic and other organ systems. The SOX gene family has a crucial role in carcinogenesis and cancer progression."
definition: >-
  high mobility group (HMG)-box found in sex-determining region Y (SRY)-box (SOX) family transcription factors. The SOX gene family of transcription factors are characterized by the evolutionarily conserved SRY-type HMG box, which is a DNA binding domain that binds the minor groove of DNA on a common consensus site, (A/T)(A/T)CAA(A/T)G but with different levels of efficiency. Members include SRY and its homologs identified in mammals that can be subdivided into 8 groups (A, B1, B2, C, D, E, F, G, H). They are involved in embryonic development, regulating processes such as cell differentiation, maintenance of stemness, sex determination, and development of the central nervous, haematopoietic and other organ systems. The SOX gene family has a crucial role in carcinogenesis and cancer progression. — an NCBI CDD conserved domain (cd22004); members share this curated model.
