identifier: CDD:cd10276
label: "Beta-barrel assembly machinery (Bam) complex component B and related proteins. BamB (YflG) is a non-essential component of the beta-barrel assembly machinery (Bam), a multi-subunit complex that inserts proteins with beta-barrel topology into the outer membrane. BamB has been found to interact with BamA, which in turn binds and stabilizes pre-folded beta-barrel proteins; it has been suggested that BamB participates in the stabilization."
definition: >-
  Beta-barrel assembly machinery (Bam) complex component B and related proteins. BamB (YflG) is a non-essential component of the beta-barrel assembly machinery (Bam), a multi-subunit complex that inserts proteins with beta-barrel topology into the outer membrane. BamB has been found to interact with BamA, which in turn binds and stabilizes pre-folded beta-barrel proteins; it has been suggested that BamB participates in the stabilization. — an NCBI CDD conserved domain (cd10276); members share this curated model.
