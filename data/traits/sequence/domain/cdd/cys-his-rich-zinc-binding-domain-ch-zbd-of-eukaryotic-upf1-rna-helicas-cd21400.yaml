identifier: CDD:cd21400
label: "Cys/His rich zinc-binding domain (CH/ZBD) of eukaryotic UPF1 RNA helicase and related proteins. Helicases catalyze NTP-dependent unwinding of nucleic acid duplexes into single strands and are classified based on the arrangement of conserved motifs into six superfamilies. UPF1 belongs to helicase superfamily 1 (SF1). The CH/ZBD has 3 zinc-finger (ZnF1-3) motifs. UPF1 participates in nonsense-mediated mRNA decay (NMD), a pathway which degrades transcripts with premature termination codons. The N-terminal CH/ZBD of UPF1 interacts with UPF2, a factor also involved in NMD. UPF1 has an N-terminal CH/ZBD, a 1B domain, and a SF1 helicase core."
definition: >-
