identifier: CDD:cd20377
label: "14-3-3 domain containing proteins bind phosphorylated serines/threonines in their binding partners. SMG5 has 14_3_3_like domain at its N-terminal that is involved in the nonsense-mediated mRNA decay (NMD) which triggers the rapid degradation of aberrant mRNAs containing premature translation termination codons (PTCs). NMD requires three 14-3-3-like proteins (SMG5, SMG6 and SMG7) in metazoans. NMD target degradation is triggered by recruitment of 14-3-3-like domain containing proteins (SMG5, SMG6 and SMG7) to PTC-containing mRNAs through the interaction of their 14-3-3-like domains with phosphorylated UPF1, the central NMD effector. Recruitment of SMG5, SMG6, and SMG7 causes NMD target degradation in metazoans."
definition: >-
