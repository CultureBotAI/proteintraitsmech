identifier: CDD:cd18587
label: "Six-transmembrane helical domain of the ABC transporter subunit LapB and similar proteins. This group represents the six-transmembrane helical domain (6-TMD) of the ABC subunit in the type 1 secretion systems (T1SS), such as LapB. LapB is an inner-membrane transporter component of the LapBCE system that is required for the secretion of the LapA adhesion, LapA is a RTX (repeats in toxin) protein found in Pseudomonas fluorescens and is required for biofilm formation in this organism. T1SS are found in pathogenic Gram-negative bacteria to export proteins (often proteases) across both inner and outer membranes to the extracellular medium. In this T1SS system, LapB is a cytoplasmic membrane-localized ATPase, LapC is a membrane fusion protein, and LapE is an outer membrane protein."
definition: >-
  Six-transmembrane helical domain of the ABC transporter subunit LapB and similar proteins. This group represents the six-transmembrane helical domain (6-TMD) of the ABC subunit in the type 1 secretion systems (T1SS), such as LapB. LapB is an inner-membrane transporter component of the LapBCE system that is required for the secretion of the LapA adhesion, LapA is a RTX (repeats in toxin) protein found in Pseudomonas fluorescens and is required for biofilm formation in this organism. T1SS are found in pathogenic Gram-negative bacteria to export proteins (often proteases) across both inner and outer membranes to the extracellular medium. In this T1SS system, LapB is a cytoplasmic membrane-localized ATPase, LapC is a membrane fusion protein, and LapE is an outer membrane protein. — an NCBI CDD conserved domain (cd18587); members share this curated model.
