identifier: CDD:cd09081
label: "CdtB, the catalytic DNase I-like subunit of cytolethal distending toxin (CDT) protein. CDT is a secreted protein toxin produced by a number of Gram-negative disease-causing bacteria. CDT causes cell cycle arrest and eventual cell death in eukaryotic cells, as a result of chromosomal DNA damage caused by the catalytic, DNase I-like, CdtB subunit. Bacterial CDTs are generally comprised of three subunits, CdtA, -B and -C. CdtB is translocated  into the host cell, where it acts as a genotoxin. CdtA and CdtC are needed for cell surface binding and cellular entry, and it is likely that they remain associated with the membrane, when CdtB is internalized. CdtB enters the target nucleus via nuclear translocation signal domain(s). This family belongs to the large EEP (exonuclease/endonuclease/phosphatase) superfamily that contains functionally diverse enzymes that share a common catalytic mechanism of cleaving phosphodiester bonds."
definition: >-
  CdtB, the catalytic DNase I-like subunit of cytolethal distending toxin (CDT) protein. CDT is a secreted protein toxin produced by a number of Gram-negative disease-causing bacteria. CDT causes cell cycle arrest and eventual cell death in eukaryotic cells, as a result of chromosomal DNA damage caused by the catalytic, DNase I-like, CdtB subunit. Bacterial CDTs are generally comprised of three subunits, CdtA, -B and -C. CdtB is translocated into the host cell, where it acts as a genotoxin. CdtA and CdtC are needed for cell surface binding and cellular entry, and it is likely that they remain associated with the membrane, when CdtB is internalized. CdtB enters the target nucleus via nuclear translocation signal domain(s). This family belongs to the large EEP (exonuclease/endonuclease/phosphatase) superfamily that contains functionally diverse enzymes that share a common catalytic mechanism of cleaving phosphodiester bonds. — an NCBI CDD conserved domain (cd09081); members share this curated model.
