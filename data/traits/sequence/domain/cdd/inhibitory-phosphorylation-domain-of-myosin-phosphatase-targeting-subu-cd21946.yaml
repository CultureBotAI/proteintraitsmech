identifier: CDD:cd21946
label: "inhibitory phosphorylation domain of myosin phosphatase targeting subunit 2 (MYPT2). MYPT2, also called protein phosphatase 1 regulatory subunit 12B (PPP1R12B), or myosin phosphatase target subunit 2, is the targeting subunit of smooth-muscle myosin phosphatase that regulates myosin phosphatase activity and augments Ca(2+) sensitivity of the contractile apparatus. This model corresponds to the inhibitory phosphorylation domain of MYPT2."
definition: >-
  inhibitory phosphorylation domain of myosin phosphatase targeting subunit 2 (MYPT2). MYPT2, also called protein phosphatase 1 regulatory subunit 12B (PPP1R12B), or myosin phosphatase target subunit 2, is the targeting subunit of smooth-muscle myosin phosphatase that regulates myosin phosphatase activity and augments Ca(2+) sensitivity of the contractile apparatus. This model corresponds to the inhibitory phosphorylation domain of MYPT2. — an NCBI CDD conserved domain (cd21946); members share this curated model.
