identifier: CDD:cd08209
label: "2,3-diketo-5-methylthiopentyl-1-phosphate enolase. Ribulose bisphosphate carboxylase like proteins (RLPs) similar to B. subtilis YkrW protein, have been identified as 2,3-diketo-5-methylthiopentyl-1-phosphate enolases. They catalyze the tautomerization of 2,3-diketo-5-methylthiopentane 1-phosphate (DK-MTP 1-P). This is an important step in the methionine salvage pathway in which 5-methylthio-D-ribose (MTR) derived from 5'-methylthioadenosine is converted to methionine."
definition: >-
  2,3-diketo-5-methylthiopentyl-1-phosphate enolase. Ribulose bisphosphate carboxylase like proteins (RLPs) similar to B. subtilis YkrW protein, have been identified as 2,3-diketo-5-methylthiopentyl-1-phosphate enolases. They catalyze the tautomerization of 2,3-diketo-5-methylthiopentane 1-phosphate (DK-MTP 1-P). This is an important step in the methionine salvage pathway in which 5-methylthio-D-ribose (MTR) derived from 5'-methylthioadenosine is converted to methionine. — an NCBI CDD conserved domain (cd08209); members share this curated model.
