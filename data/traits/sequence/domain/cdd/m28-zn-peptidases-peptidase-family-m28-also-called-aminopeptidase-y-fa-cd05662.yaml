identifier: CDD:cd05662
label: "M28 Zn-Peptidases. Peptidase family M28 (also called aminopeptidase Y family), uncharacterized subfamily. The M28 family contains aminopeptidases as well as carboxypeptidases. They have co-catalytic zinc ions; each zinc ion is tetrahedrally co-ordinated, with three amino acid ligands plus activated water; one aspartate residue binds both metal ions. This subfamily is composed of uncharacterized proteins that do not contain a protease-associated (PA) domain."
definition: >-
  M28 Zn-Peptidases. Peptidase family M28 (also called aminopeptidase Y family), uncharacterized subfamily. The M28 family contains aminopeptidases as well as carboxypeptidases. They have co-catalytic zinc ions; each zinc ion is tetrahedrally co-ordinated, with three amino acid ligands plus activated water; one aspartate residue binds both metal ions. This subfamily is composed of uncharacterized proteins that do not contain a protease-associated (PA) domain. — an NCBI CDD conserved domain (cd05662); members share this curated model.
