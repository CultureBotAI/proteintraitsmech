identifier: CDD:cd19246
label: "geranyl diphosphate C-methyltransferase. GPPMT catalyzes the SAM-dependent methylation of geranyl diphosphate (GPP) to yield (E)-2-methylgeranyl diphosphate (2-MeGPP). S-adenosylmethionine-dependent methyltransferases (SAM or AdoMet-MTase), class I;  AdoMet-MTases are enzymes that use S-adenosyl-L-methionine (SAM or AdoMet) as a substrate for methyltransfer, creating the product S-adenosyl-L-homocysteine (AdoHcy). There are at least five structurally distinct families of AdoMet-MTases, class I being the largest and most diverse. Within this class enzymes can be classified by different substrate specificity (small molecules, lipids, nucleic acids, etc) and different target atoms for methylation (nitrogen, oxygen, carbon, sulfur,etc)."
definition: >-
  geranyl diphosphate C-methyltransferase. GPPMT catalyzes the SAM-dependent methylation of geranyl diphosphate (GPP) to yield (E)-2-methylgeranyl diphosphate (2-MeGPP). S-adenosylmethionine-dependent methyltransferases (SAM or AdoMet-MTase), class I; AdoMet-MTases are enzymes that use S-adenosyl-L-methionine (SAM or AdoMet) as a substrate for methyltransfer, creating the product S-adenosyl-L-homocysteine (AdoHcy). There are at least five structurally distinct families of AdoMet-MTases, class I being the largest and most diverse. Within this class enzymes can be classified by different substrate specificity (small molecules, lipids, nucleic acids, etc) and different target atoms for methylation (nitrogen, oxygen, carbon, sulfur,etc). — an NCBI CDD conserved domain (cd19246); members share this curated model.
