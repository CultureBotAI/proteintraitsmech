identifier: CDD:cd11003
label: "RNAP ECF sigma factors 24 and 70 and alternative sigma factors E, X, and and ECF alternative sigma factor Y. Along with ECF (Extra-cytoplasmic function) sigma factors 24 and 70, which are important in a variety of organisms including E.coli, this subfamily consists of alternative Sigma factors E, which in E.coli is responsible for responding to evironmental stresses and in Bacillus subtilis is involved in sporulation along with Sigma X. Sigma Y is an ECF alternative sigma factor. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. A variety of regions on domain 2 are responsible for DNA promoter binding specificty at the -10 promoter recognition site and other functions in transcription initiation with aided by the entire sigma factor."
definition: >-
  RNAP ECF sigma factors 24 and 70 and alternative sigma factors E, X, and and ECF alternative sigma factor Y. Along with ECF (Extra-cytoplasmic function) sigma factors 24 and 70, which are important in a variety of organisms including E.coli, this subfamily consists of alternative Sigma factors E, which in E.coli is responsible for responding to evironmental stresses and in Bacillus subtilis is involved in sporulation along with Sigma X. Sigma Y is an ECF alternative sigma factor. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. A variety of regions on domain 2 are responsible for DNA promoter binding specificty at the -10 promoter recognition site and other functions in transcription initiation with aided by the entire sigma factor. — an NCBI CDD conserved domain (cd11003); members share this curated model.
