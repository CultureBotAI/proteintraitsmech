identifier: CDD:cd18122
label: "C-terminal catalytic domain found in glyceraldehyde-3-phosphate dehydrogenase (GAPDH) superfamily of proteins. GAPDH-like C-terminal catalytic domains are typically associated with a classic N-terminal Rossmann fold NAD(P)-binding domain. This superfamily includes the C-terminal domains of glyceraldehyde-3-phosphate dehydrogenase (GAPDH), N-acetyl-gamma-glutamyl-phosphate reductase (AGPR), aspartate beta-semialdehyde dehydrogenase (ASADH), acetaldehyde dehydrogenase (ALDH) and USG-1 homolog proteins."
definition: >-
  C-terminal catalytic domain found in glyceraldehyde-3-phosphate dehydrogenase (GAPDH) superfamily of proteins. GAPDH-like C-terminal catalytic domains are typically associated with a classic N-terminal Rossmann fold NAD(P)-binding domain. This superfamily includes the C-terminal domains of glyceraldehyde-3-phosphate dehydrogenase (GAPDH), N-acetyl-gamma-glutamyl-phosphate reductase (AGPR), aspartate beta-semialdehyde dehydrogenase (ASADH), acetaldehyde dehydrogenase (ALDH) and USG-1 homolog proteins. — an NCBI CDD conserved domain (cd18122); members share this curated model.
