identifier: CDD:cd17542
label: "phosphoacceptor receiver (REC) domain of chemotaxis protein CheY. The chemotaxis response regulator CheY contains a stand-alone REC domain. Chemotaxis is a behavior known for motile bacteria that directs their movement in response to chemical gradients. CheY is involved in transmitting sensory signals from chemoreceptors to the flagellar motors. Phosphorylated CheY interacts with the flagella switch components FliM and FliY, which causes counterclockwise rotation of the flagella, resulting in smooth swimming. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of chemotaxis protein CheY. The chemotaxis response regulator CheY contains a stand-alone REC domain. Chemotaxis is a behavior known for motile bacteria that directs their movement in response to chemical gradients. CheY is involved in transmitting sensory signals from chemoreceptors to the flagellar motors. Phosphorylated CheY interacts with the flagella switch components FliM and FliY, which causes counterclockwise rotation of the flagella, resulting in smooth swimming. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17542); members share this curated model.
