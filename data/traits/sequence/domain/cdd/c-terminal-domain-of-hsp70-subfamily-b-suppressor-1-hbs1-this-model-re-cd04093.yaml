identifier: CDD:cd04093
label: "C-terminal domain of Hsp70 subfamily B suppressor 1 (HBS1). This model represents the C-terminal domain of Hsp70 subfamily B suppressor 1 (HBS1), which is homologous to the domain III of EF-1alpha. This group contains proteins similar to yeast Hbs1, which together with Dom34, promotes the No-go decay (NGD) of mRNA. The NGD targets mRNAs whose elongation stalled for degradation initiated by endonucleolytic cleavage in the vicinity of the stalled ribosome."
definition: >-
  C-terminal domain of Hsp70 subfamily B suppressor 1 (HBS1). This model represents the C-terminal domain of Hsp70 subfamily B suppressor 1 (HBS1), which is homologous to the domain III of EF-1alpha. This group contains proteins similar to yeast Hbs1, which together with Dom34, promotes the No-go decay (NGD) of mRNA. The NGD targets mRNAs whose elongation stalled for degradation initiated by endonucleolytic cleavage in the vicinity of the stalled ribosome. — an NCBI CDD conserved domain (cd04093); members share this curated model.
