identifier: CDD:cd18328
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 7C (ZBTB7C). ZBTB7C is also called affected by papillomavirus DNA integration in ME180 cells protein 1 (APM-1), zinc finger and BTB domain-containing protein 36 (ZBTB36), zinc finger protein 857C (ZNF857C), or kidney cancer-related POZ domain and Kruppel-like protein (Kr-POK). It is a transcriptional repressor with a pro-oncogenic role that relies upon binding to p53 and inhibition of its transactivation function. It may act as an important regulator of fatty acid synthesis and may induce rapid cancer cell proliferation by increasing palmitate synthesis. The ZBTB7C gene has been identified as a susceptibility gene to ischemic injury. ZBTB7C contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 7C (ZBTB7C). ZBTB7C is also called affected by papillomavirus DNA integration in ME180 cells protein 1 (APM-1), zinc finger and BTB domain-containing protein 36 (ZBTB36), zinc finger protein 857C (ZNF857C), or kidney cancer-related POZ domain and Kruppel-like protein (Kr-POK). It is a transcriptional repressor with a pro-oncogenic role that relies upon binding to p53 and inhibition of its transactivation function. It may act as an important regulator of fatty acid synthesis and may induce rapid cancer cell proliferation by increasing palmitate synthesis. The ZBTB7C gene has been identified as a susceptibility gene to ischemic injury. ZBTB7C contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18328); members share this curated model.
