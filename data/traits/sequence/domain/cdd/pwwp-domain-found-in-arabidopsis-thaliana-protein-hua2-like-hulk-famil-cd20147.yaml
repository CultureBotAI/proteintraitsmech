identifier: CDD:cd20147
label: "PWWP domain found in Arabidopsis thaliana protein HUA2-LIKE (HULK) family. The HULK family includes HUA2-like proteins 1-3 (HULK1-3), which are probable transcription factors that act with partial redundancy with each other. They may play diverse and essential roles in the control of plant development, physiology and flowering time. The PWWP domain specifically recognizes DNA and histone methylated lysines."
definition: >-
  PWWP domain found in Arabidopsis thaliana protein HUA2-LIKE (HULK) family. The HULK family includes HUA2-like proteins 1-3 (HULK1-3), which are probable transcription factors that act with partial redundancy with each other. They may play diverse and essential roles in the control of plant development, physiology and flowering time. The PWWP domain specifically recognizes DNA and histone methylated lysines. — an NCBI CDD conserved domain (cd20147); members share this curated model.
