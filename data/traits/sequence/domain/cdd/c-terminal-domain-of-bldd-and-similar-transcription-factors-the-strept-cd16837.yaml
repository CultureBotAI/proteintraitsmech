label: BldD_C_like
definition: >-
  C-terminal domain of BldD and similar transcription factors. The Streptomyces transcription factor BldD dimerizes via an unusual mechanism that inolves a tetrameric c-di-GMP assembly. BdlD is involved in controlling multicellular differentiation in sporulating actinomycetes
