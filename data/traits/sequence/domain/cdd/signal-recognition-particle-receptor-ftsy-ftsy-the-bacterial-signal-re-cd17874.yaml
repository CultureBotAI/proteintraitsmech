label: "signal recognition particle receptor FtsY. FtsY, the bacterial  signal-recognition particle (SRP) receptor (SR), is homologous to the SRP receptor alpha-subunit (SRalpha) of the eukaryotic SR. It interacts with the signal-recognition particle (SRP) and is required for the co-translational membrane targeting of proteins."
definition: >-
  signal recognition particle receptor FtsY. FtsY, the bacterial signal-recognition particle (SRP) receptor (SR), is homologous to the SRP receptor alpha-subunit (SRalpha) of the eukaryotic SR. It interacts with the signal-recognition particle (SRP) and is required for the co-translational membrane targeting of proteins. — an NCBI CDD conserved domain (cd17874); members share this curated model.
