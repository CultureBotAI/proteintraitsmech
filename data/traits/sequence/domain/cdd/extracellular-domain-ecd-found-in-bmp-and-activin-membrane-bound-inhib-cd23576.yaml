identifier: CDD:cd23576
label: "extracellular domain (ECD) found in BMP and activin membrane-bound inhibitor (BAMBI) and similar proteins. BAMBI (also called non-metastatic gene A protein (NMA), or putative transmembrane protein NMA) is a transmembrane protein that acts as an important regulator of trabecular meshwork extracellular matrix and ocular hypertension. It negatively regulates the signaling activity of transforming growth factor (TGF)-beta, activin, and bone morphogenetic protein (BMP). BAMBI can function as a positive regulator of the Wnt/beta-catenin pathway to promote cell proliferation. It may be a reactive oxygen regulator to affect adipogenesis, thereby controlling obesity and metabolic syndrome. BAMBI contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in BMP and activin membrane-bound inhibitor (BAMBI) and similar proteins. BAMBI (also called non-metastatic gene A protein (NMA), or putative transmembrane protein NMA) is a transmembrane protein that acts as an important regulator of trabecular meshwork extracellular matrix and ocular hypertension. It negatively regulates the signaling activity of transforming growth factor (TGF)-beta, activin, and bone morphogenetic protein (BMP). BAMBI can function as a positive regulator of the Wnt/beta-catenin pathway to promote cell proliferation. It may be a reactive oxygen regulator to affect adipogenesis, thereby controlling obesity and metabolic syndrome. BAMBI contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23576); members share this curated model.
