identifier: CDD:cd18939
label: bHLH_TS_Msgn1
definition: >-
  basic helix-loop-helix (bHLH) domain found in mesogenin-1 (Msgn1) and similar proteins. Msgn1, also termed paraxial mesoderm-specific mesogenin1, or pMesogenin1 (pMsgn1), is a bHLH transcription factor required for maturation and segmentation of paraxial mesoderm. It may regulate the expression of T-box transcription factors essential for mesoderm formation and differentiation
