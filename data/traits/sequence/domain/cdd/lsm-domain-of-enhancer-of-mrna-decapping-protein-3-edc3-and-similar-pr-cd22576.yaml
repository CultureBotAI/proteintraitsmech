identifier: CDD:cd22576
label: Edc3_Lsm
definition: >-
  Lsm domain of enhancer of mRNA-decapping protein 3 (Edc3) and similar proteins. Edc3 is an enhancer that stimulates decapping of both stable and unstable mRNA during mRNA decay. It does not affect nonsense-mediated mRNA decay. Edc3 also acts as a scaffold that aggregates mRNA ribonucleoproteins together for normal P-body assembly. The model corresponds to the N-terminal Lsm domain of Edc3, which is responsible for Dcp2 binding and decapping activation
