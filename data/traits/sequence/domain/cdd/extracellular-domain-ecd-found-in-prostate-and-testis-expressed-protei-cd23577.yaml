identifier: CDD:cd23577
label: TFP_LU_ECD_PATE1
definition: >-
  extracellular domain (ECD) found in prostate and testis expressed protein 1 (PATE1) and similar proteins. PATE1 is a novel sperm-associated protein generally expressed in male genital tract and related to sperm development, maturation and fertilization. It contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)
