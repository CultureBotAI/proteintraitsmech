identifier: CDD:cd17378
label: "Plant organic cation/carnitine transporters of the Major Facilitator Superfamily of transporters. Plant organic cation/carnitine transporters (OCTs) are sequence-similar to their animal counterparts, which are broad-specificity transporters that play a critical role in the excretion and distribution of endogeneous organic cations and for the uptake, elimination and distribution of cationic drugs, toxins, and environmental waste products. Little is know about plant OCTs. In Arabidopsis, there are six genes belonging to this family that show distinct, organ-specific expression pattern of the individual genes. AtOCT1 has been found to affect root development and carnitine-related responses in Arabidopsis. AtOCT4, 5 and 6 are up-regulated during drought stress, AtOCT3 and 5 during cold stress and AtOCT5 and 6 during salt stress treatments. Plant OCTs belongs to the Solute carrier 22 (SLC22) family of organic cation/anion/zwitterion transporters of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Plant organic cation/carnitine transporters of the Major Facilitator Superfamily of transporters. Plant organic cation/carnitine transporters (OCTs) are sequence-similar to their animal counterparts, which are broad-specificity transporters that play a critical role in the excretion and distribution of endogeneous organic cations and for the uptake, elimination and distribution of cationic drugs, toxins, and environmental waste products. Little is know about plant OCTs. In Arabidopsis, there are six genes belonging to this family that show distinct, organ-specific expression pattern of the individual genes. AtOCT1 has been found to affect root development and carnitine-related responses in Arabidopsis. AtOCT4, 5 and 6 are up-regulated during drought stress, AtOCT3 and 5 during cold stress and AtOCT5 and 6 during salt stress treatments. Plant OCTs belongs to the Solute carrier 22 (SLC22) family of organic cation/anion/zwitterion transporters of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17378); members share this curated model.
