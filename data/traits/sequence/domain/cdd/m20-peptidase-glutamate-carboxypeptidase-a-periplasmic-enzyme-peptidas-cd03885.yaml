identifier: CDD:cd03885
label: "M20 Peptidase Glutamate carboxypeptidase, a periplasmic enzyme. Peptidase M20 family, Glutamate carboxypeptidase (carboxypeptidase G; carboxypeptidase G1; carboxypeptidase G2; CPDG2; CPG2; Folate hydrolase G2; Pteroylmonoglutamic acid hydrolase G2; Glucarpidase; E.C. 3.4.17.11) subfamily. CPDG2 is a periplasmic enzyme that is synthesized with a signal peptide. It is a dimeric zinc-dependent exopeptidase, with two domains, a catalytic domain, which provides the ligands for the two zinc ions in the active site, and a dimerization domain. CPDG2 cleaves the C-terminal glutamate moiety from a wide range of N-acyl groups, including peptidyl, aminoacyl, benzoyl, benzyloxycarbonyl, folyl, and pteroyl groups to release benzoic acid, phenol, and aniline mustards. It is used clinically to treat methotrexate toxicity by hydrolyzing it to inactive and non-toxic metabolites. It is also proposed for use in antibody-directed enzyme prodrug therapy; for example, glutamate can be cleaved from glutamated benzoyl nitrogen mustards, producing nitrogen mustards with effective cytotoxicity against tumor cells."
