identifier: CDD:cd23433
label: "ricin B-type lectin domain, beta-trefoil fold, found in the polypeptide N-acetylgalactosaminyltransferase 1 (GALNT1)-like subfamily. The GALNT1-like subfamily includes GALNT1 and GALNT13. They catalyze the initial reaction in O-linked oligosaccharide biosynthesis, the transfer of an N-acetyl-D-galactosamine residue to a serine or threonine residue on the protein receptor. GALNT1 has a broad spectrum of substrates for peptides such as EA2, Muc5AC, Muc1a, Muc1b and Muc7. GALNT13 has a much stronger activity than GALNT1 to transfer GalNAc to mucin peptides, such as Muc5Ac and Muc7. It can glycosylate SDC3. It may be responsible for the synthesis of Tn antigen in neuronal cells. Members of this subfamily comprise a glycosyltransferase region and a ricin B-type lectin domain. The glycosyltransferase region contains two conserved domains, domain A (also called GT1 motif) and domain B (also called Gal/GalNAc-T motif). This model corresponds to the ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ricin B-type lectin domain binds to GalNAc and contributes to the glycopeptide specificity."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in the polypeptide N-acetylgalactosaminyltransferase 1 (GALNT1)-like subfamily. The GALNT1-like subfamily includes GALNT1 and GALNT13. They catalyze the initial reaction in O-linked oligosaccharide biosynthesis, the transfer of an N-acetyl-D-galactosamine residue to a serine or threonine residue on the protein receptor. GALNT1 has a broad spectrum of substrates for peptides such as EA2, Muc5AC, Muc1a, Muc1b and Muc7. GALNT13 has a much stronger activity than GALNT1 to transfer GalNAc to mucin peptides, such as Muc5Ac and Muc7. It can glycosylate SDC3. It may be responsible for the synthesis of Tn antigen in neuronal cells. Members of this subfamily comprise a glycosyltransferase region and a ricin B-type lectin domain. The glycosyltransferase region contains two conserved domains, domain A (also called GT1 motif) and domain B (also called Gal/GalNAc-T motif). This model corresponds to the ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ricin B-type lectin domain binds to GalNAc and contributes to the glycopeptide specificity. — an NCBI CDD conserved domain (cd23433); members share this curated model.
