identifier: CDD:cd21726
label: "alpha-catenin binding domain found in Drosophila melanogaster armadillo segment polarity protein (dArm) and similar proteins. dArm is a Drosophila catenin that plays a role during central nervous system development. It can associate with alpha-catenin. The neural isoform of dArm may associate with CadN and participate in the transmission of developmental information. Its cytoplasmic isoform accumulates through Wingless (Wg) signaling; arm function in Wg signal transduction is required early in development for determination of neuroblast fate. Arm and Abl proteins function cooperatively at adherens junctions in both the CNS and epidermis. This model corresponds to a small region at the C-terminus of dArm, which shows high sequence similarity with alpha-catenin binding domain of catenin beta-1 (CTNNB1)."
definition: >-
  alpha-catenin binding domain found in Drosophila melanogaster armadillo segment polarity protein (dArm) and similar proteins. dArm is a Drosophila catenin that plays a role during central nervous system development. It can associate with alpha-catenin. The neural isoform of dArm may associate with CadN and participate in the transmission of developmental information. Its cytoplasmic isoform accumulates through Wingless (Wg) signaling; arm function in Wg signal transduction is required early in development for determination of neuroblast fate. Arm and Abl proteins function cooperatively at adherens junctions in both the CNS and epidermis. This model corresponds to a small region at the C-terminus of dArm, which shows high sequence similarity with alpha-catenin binding domain of catenin beta-1 (CTNNB1). — an NCBI CDD conserved domain (cd21726); members share this curated model.
