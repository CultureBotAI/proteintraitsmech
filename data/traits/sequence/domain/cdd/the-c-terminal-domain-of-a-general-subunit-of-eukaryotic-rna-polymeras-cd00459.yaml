identifier: CDD:cd00459
label: RNA_pol_Rpb5_C
definition: >-
  The C-terminal domain of a general subunit of eukaryotic RNA polymerases Rpb5 and its corresponding archaeal subunit RpoH. RNA polymerases are multisubunit enzymes that synthesize RNA from DNA. While three different RNA polymerases exist in eukaryotes, only one is present in archea. RPB5 is an essential and general subunit of eukaryotic and archaeal RNA polymerases which consists of a N-terminal and a C-terminal domain in eukaryote and only the conserved C-terminal domain in archaea (RpoH) .RPB5 interacts with several general transcription factors or specific gene regulators
