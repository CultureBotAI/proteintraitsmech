identifier: CDD:cd10997
label: "RNAP alternative sigma factors E and ECF alternative sigma factor M. Sigma E is an alternative sigma factor within the Sig70 family which is specific to bacteria E.coli, and is found in complex with its corresponding anti-sigma factor, RseA in the RNAP holoenzyme. This sigma factor is programmed to respond to stress, or conditions that lead to protein denaturation. In Bacillus subtilis, Sigma E is also involved in the sporulation process. Sigma M is also an alternative sigma factor found in Bacillus subtilis and is an ECF (Extra-cytoplasmic function) sigma factor. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. The most C-terminal domain of sigma 70 includes conserved regions 4.1 and 4.2, which contain four alpha helices that are arranged as a pair of HtH motifs."
definition: >-
  RNAP alternative sigma factors E and ECF alternative sigma factor M. Sigma E is an alternative sigma factor within the Sig70 family which is specific to bacteria E.coli, and is found in complex with its corresponding anti-sigma factor, RseA in the RNAP holoenzyme. This sigma factor is programmed to respond to stress, or conditions that lead to protein denaturation. In Bacillus subtilis, Sigma E is also involved in the sporulation process. Sigma M is also an alternative sigma factor found in Bacillus subtilis and is an ECF (Extra-cytoplasmic function) sigma factor. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. The most C-terminal domain of sigma 70 includes conserved regions 4.1 and 4.2, which contain four alpha helices that are arranged as a pair of HtH motifs. — an NCBI CDD conserved domain (cd10997); members share this curated model.
