identifier: CDD:cd17632
label: "adenylation domain of carboxylic acid reductase (CAR). This family contains the adenylation domain of carboxylic acid reductase enzymes (CARs), and performs an equivalent function to that of the ANL superfamily of adenylating enzymes. It takes a carboxylic acid substrate and ATP, and produces an AMP-acyl phosphoester intermediate, releasing pyrophosphate. Kinetic analysis using various substrates shows that this enzyme has a broad but similar substrate specificity, preferring electron-rich acids. This suggests that attack by the carboxylate on the alpha-phosphate of adenosine triphosphate (ATP) is the step that determines the substrate specificity and reaction kinetics. CAR is an important enzyme for use as a biocatalyst providing regiospecific route to aldehydes from their respective carboxylic acids."
definition: >-
  adenylation domain of carboxylic acid reductase (CAR). This family contains the adenylation domain of carboxylic acid reductase enzymes (CARs), and performs an equivalent function to that of the ANL superfamily of adenylating enzymes. It takes a carboxylic acid substrate and ATP, and produces an AMP-acyl phosphoester intermediate, releasing pyrophosphate. Kinetic analysis using various substrates shows that this enzyme has a broad but similar substrate specificity, preferring electron-rich acids. This suggests that attack by the carboxylate on the alpha-phosphate of adenosine triphosphate (ATP) is the step that determines the substrate specificity and reaction kinetics. CAR is an important enzyme for use as a biocatalyst providing regiospecific route to aldehydes from their respective carboxylic acids. — an NCBI CDD conserved domain (cd17632); members share this curated model.
