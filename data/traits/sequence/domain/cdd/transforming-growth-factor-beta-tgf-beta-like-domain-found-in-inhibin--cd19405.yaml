identifier: CDD:cd19405
label: TGF_beta_INHBB
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in inhibin beta B chain (INHBB) and similar proteins. INHBB, also termed activin beta-B chain, is a component of inhibin B, activin A, or activin AB. Inhibins and activins inhibit and activate, respectively, the secretion of follitropin by the pituitary gland
