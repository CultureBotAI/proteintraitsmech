identifier: CDD:cd16544
label: "RING finger, HC subclass, found in RING finger protein 138 (RNF138) and similar proteins. RNF138, also known as Nemo-like kinase-associated RING finger protein (NARF) or NLK-associated RING finger protein, is an E3 ubiquitin-protein ligase that plays an important role in glioma cell proliferation, apoptosis, and cell cycle. It specifically cooperates with the E2 conjugating enzyme E2-25K (Hip-2/UbcH1), regulates the ubiquitylation and degradation of T cell factor/lymphoid enhancer factor (TCF/LEF), and further suppresses Wnt-beta-catenin signaling. RNF138, together with three closely related proteins: RNF114, RNF125 and RNF166, forms a novel family of ubiquitin ligases with a C3HC4-type RING-HC finger, a C2HC-, and two C2H2-type zinc fingers, as well as a ubiquitin interacting motif (UIM)."
definition: >-
  RING finger, HC subclass, found in RING finger protein 138 (RNF138) and similar proteins. RNF138, also known as Nemo-like kinase-associated RING finger protein (NARF) or NLK-associated RING finger protein, is an E3 ubiquitin-protein ligase that plays an important role in glioma cell proliferation, apoptosis, and cell cycle. It specifically cooperates with the E2 conjugating enzyme E2-25K (Hip-2/UbcH1), regulates the ubiquitylation and degradation of T cell factor/lymphoid enhancer factor (TCF/LEF), and further suppresses Wnt-beta-catenin signaling. RNF138, together with three closely related proteins: RNF114, RNF125 and RNF166, forms a novel family of ubiquitin ligases with a C3HC4-type RING-HC finger, a C2HC-, and two C2H2-type zinc fingers, as well as a ubiquitin interacting motif (UIM). — an NCBI CDD conserved domain (cd16544); members share this curated model.
