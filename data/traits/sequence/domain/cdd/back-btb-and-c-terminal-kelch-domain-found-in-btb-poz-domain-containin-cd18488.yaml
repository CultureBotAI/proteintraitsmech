identifier: CDD:cd18488
label: BACK_BTBD3_like
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in BTB/POZ domain-containing proteins, BTBD3 and BTBD6. This subfamily includes BTB/POZ domain-containing proteins BTBD3 and BTBD6, both of which are BTB-domain-containing Kelch-like proteins. BTBD3 controls dendrite orientation toward active axons in mammalian neocortex. BTBD6 is required for proper embryogenesis and plays an essential evolutionarily-conserved role during neuronal development
