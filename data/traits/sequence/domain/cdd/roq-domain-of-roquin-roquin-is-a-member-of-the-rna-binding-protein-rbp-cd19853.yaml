identifier: CDD:cd19853
label: "ROQ domain of Roquin. Roquin is a member of the RNA Binding Protein (RBP) family. It targets a cis-regulatory element which plays an essential role in controlling the levels of mRNAs coding for various key proteins involved in immune regulation. Roquin-1 and its paralog Roquin-2 share a common domain organization and the ability to bind nucleic acids through their ROQ domain. Roquins contain a RING domain followed by a ROQ domain, a C3H1-type zinc finger domain and a proline rich domain at the C-terminus. The ROQ domain is composed of three sub-domains I, II and III, of which subdomains II and III are similar to helix-turn-helix (HTH) and/or winged-helix (WH) motifs. Roquin is an essential factor in the prevention of autoimmune disease. Roquin knockout mice show perinatal lethality but not autoimmunity, suggesting that Roquin may have important developmental functions as well."
definition: >-
  ROQ domain of Roquin. Roquin is a member of the RNA Binding Protein (RBP) family. It targets a cis-regulatory element which plays an essential role in controlling the levels of mRNAs coding for various key proteins involved in immune regulation. Roquin-1 and its paralog Roquin-2 share a common domain organization and the ability to bind nucleic acids through their ROQ domain. Roquins contain a RING domain followed by a ROQ domain, a C3H1-type zinc finger domain and a proline rich domain at the C-terminus. The ROQ domain is composed of three sub-domains I, II and III, of which subdomains II and III are similar to helix-turn-helix (HTH) and/or winged-helix (WH) motifs. Roquin is an essential factor in the prevention of autoimmune disease. Roquin knockout mice show perinatal lethality but not autoimmunity, suggesting that Roquin may have important developmental functions as well. — an NCBI CDD conserved domain (cd19853); members share this curated model.
