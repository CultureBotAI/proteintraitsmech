identifier: CDD:cd24133
label: "nucleotide-binding domain (NBD) of bacterial tRNA N6-adenosine threonylcarbamoyltransferase TsaD and similar proteins. TsaD (EC 2.3.1.234), also called N6-L-threonylcarbamoyladenine synthase, t(6)A synthase, t(6)A37 threonylcarbamoyladenosine biosynthesis protein TsaD, or tRNA threonylcarbamoyladenosine biosynthesis protein TsaD, is required for the formation of a threonylcarbamoyl group on adenosine at position 37 (t(6)A37) in tRNAs that read codons beginning with adenine. It is involved in the transfer of the threonylcarbamoyl moiety of threonylcarbamoyl-AMP (TC-AMP) to the N6 group of A37, together with TsaE and TsaB. TsaD likely plays a direct catalytic role in this reaction."
definition: >-
  nucleotide-binding domain (NBD) of bacterial tRNA N6-adenosine threonylcarbamoyltransferase TsaD and similar proteins. TsaD (EC 2.3.1.234), also called N6-L-threonylcarbamoyladenine synthase, t(6)A synthase, t(6)A37 threonylcarbamoyladenosine biosynthesis protein TsaD, or tRNA threonylcarbamoyladenosine biosynthesis protein TsaD, is required for the formation of a threonylcarbamoyl group on adenosine at position 37 (t(6)A37) in tRNAs that read codons beginning with adenine. It is involved in the transfer of the threonylcarbamoyl moiety of threonylcarbamoyl-AMP (TC-AMP) to the N6 group of A37, together with TsaE and TsaB. TsaD likely plays a direct catalytic role in this reaction. — an NCBI CDD conserved domain (cd24133); members share this curated model.
