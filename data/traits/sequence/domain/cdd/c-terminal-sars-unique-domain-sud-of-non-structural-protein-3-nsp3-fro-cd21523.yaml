identifier: CDD:cd21523
label: "C-terminal SARS-Unique Domain (SUD) of non-structural protein 3 (Nsp3) from Middle East respiratory syndrome-related coronavirus and related betacoronaviruses in the C lineage. This subfamily contains the SUD-C of Middle East respiratory syndrome-related (MERS) coronavirus (CoV) Nsp3 and other Nsp3s from betacoronaviruses in the merbecovirus subgenera (C lineage), including several bat-CoVs such as Tylonycteris bat CoV HKU4, Pipistrellus bat CoV HKU5, and Hypsugo bat CoV HKU25. Non-structural protein 3 (Nsp3) is a large multi-functional multi-domain protein that is an essential component of the replication/transcription complex (RTC), which carries out RNA synthesis, RNA processing, and interference with the host cell innate immune system. Nsp3 of SARS coronavirus includes a SARS-unique domain (SUD) consisting of three globular domains separated by short linker peptide segments: SUD-N, SUD-M, and SUD-C. SUD-N and SUD-M are macro domains which bind G-quadruplexes (unusual nucleic-acid structures formed by consecutive guanosine nucleotides). SUD is not as specific to SARS CoV as originally thought and is also found in MERS and related bat coronaviruses. Similar to SARS SUD-C, Tylonycteris bat-CoV HKU4 SUD-C (HKU4 C), a member of the MERS SUD-C group, also adopts a frataxin-like fold (DOI:10.1177/1934578X19849202) that has structural similarity to DNA-binding domains of DNA-modifying enzymes. However, there is little sequence similarity between the two domains. SARS SUD-C has been shown to bind to single-stranded RNA and recognize purine bases more strongly than pyrimidine bases; it also regulates the RNA binding behavior of the SARS SUD-M macrodomain. It is not known whether MERS SUD-C or HKU4 C functions in the same way. It has been suggested that HKU4 C engages in protein-protein interactions with HKU4 SUD-M."
definition: >-
  C-terminal SARS-Unique Domain (SUD) of non-structural protein 3 (Nsp3) from Middle East respiratory syndrome-related coronavirus and related betacoronaviruses in the C lineage. This subfamily contains the SUD-C of Middle East respiratory syndrome-related (MERS) coronavirus (CoV) Nsp3 and other Nsp3s from betacoronaviruses in the merbecovirus subgenera (C lineage), including several bat-CoVs such as Tylonycteris bat CoV HKU4, Pipistrellus bat CoV HKU5, and Hypsugo bat CoV HKU25. Non-structural protein 3 (Nsp3) is a large multi-functional multi-domain protein that is an essential component of the replication/transcription complex (RTC), which carries out RNA synthesis, RNA processing, and interference with the host cell innate immune system. Nsp3 of SARS coronavirus includes a SARS-unique domain (SUD) consisting of three globular domains separated by short linker peptide segments: SUD-N, SUD-M, and SUD-C. SUD-N and SUD-M are macro domains which bind G-quadruplexes (unusual nucleic-acid structures formed by consecutive guanosine nucleotides). SUD is not as specific to SARS CoV as originally thought and is also found in MERS and related bat coronaviruses. Similar to SARS SUD-C, Tylonycteris bat-CoV HKU4 SUD-C (HKU4 C), a member of the MERS SUD-C group, also adopts a frataxin-like fold (DOI:10.1177/1934578X19849202) that has structural similarity to DNA-binding domains of DNA-modifying enzymes. However, there is little sequence similarity between the two domains. SARS SUD-C has been shown to bind to single-stranded RNA and recognize purine bases more strongly than pyrimidine bases; it also regulates the RNA binding behavior of the SARS SUD-M macrodomain. It is not known whether MERS SUD-C or HKU4 C functions in the same way. It has been suggested that HKU4 C engages in protein-protein interactions with HKU4 SUD-M. — an NCBI CDD conserved domain (cd21523); members share this curated model.
