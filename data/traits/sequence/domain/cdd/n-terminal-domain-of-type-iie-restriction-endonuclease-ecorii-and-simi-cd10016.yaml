identifier: CDD:cd10016
label: "N-terminal domain of type IIE restriction endonuclease EcoRII and similar proteins. N-terminal domain of type IIE restriction endonuclease EcoRII and similar proteins. Type II restriction endonucleases are components of restriction modification (RM) systems that protect bacteria and archaea against invading foreign DNA. They usually function as homodimers or homotetramers that cleave DNA at defined sites of 4 to 8 bp in length, and they require Mg2+,  not ATP or GTP, for catalysis. EcoRII is specific for the 5'-CCWGG sequence (W stands for A or T). EcoRII consists of 2 domains, the C-terminal catalytic/dimerization domain (EcoRII-C), and the N-terminal effector DNA binding domain (EcoRII-N). To be catalytically active, EcoRII has to form a dimer."
definition: >-
  N-terminal domain of type IIE restriction endonuclease EcoRII and similar proteins. N-terminal domain of type IIE restriction endonuclease EcoRII and similar proteins. Type II restriction endonucleases are components of restriction modification (RM) systems that protect bacteria and archaea against invading foreign DNA. They usually function as homodimers or homotetramers that cleave DNA at defined sites of 4 to 8 bp in length, and they require Mg2+, not ATP or GTP, for catalysis. EcoRII is specific for the 5'-CCWGG sequence (W stands for A or T). EcoRII consists of 2 domains, the C-terminal catalytic/dimerization domain (EcoRII-C), and the N-terminal effector DNA binding domain (EcoRII-N). To be catalytically active, EcoRII has to form a dimer. — an NCBI CDD conserved domain (cd10016); members share this curated model.
