identifier: CDD:cd21696
label: "beta-strand (B) domain of GINS complex protein Psf1. Psf1 (partner of Sld5 1) is a component of the GINS (named from the Japanese go-ichi-ni-san, meaning 5-1-2-3 for the Sld5, Psf1, Psf2, and Psf3 subunits) tetrameric protein complex, and is mainly expressed in highly proliferative tissues, such as blastocysts, adult bone marrow, and testis, in which the stem cell system is active. Psf1 has been reported to be a prognostic biomarker in breast cancer, prostate cancer, hepatocellular carcinoma, and non-small cell lung cancer (NSCLC) patients treated with surgery following preoperative chemotherapy or chemoradiotherapy. Loss of Psf1 causes embryonic lethality. GINS is a complex of four subunits (Sld5, Psf1, Psf2 and Psf3) and is involved in both the initiation and elongation stages of eukaryotic chromosome replication. Besides being essential for the maintenance of genomic integrity, GINS plays a central role in coordinating DNA replication with cell cycle checkpoints and is involved in cell growth. The eukaryotic GINS subunits Sld5, Psf1, Psf2 and Psf3 are homologous, and homologs are also found in archaea; the complex is not found in bacteria. The four subunits of the complex consist of two domains each, called the alpha-helical (A) and beta-strand (B) domains. The A and B domains of Sld5/Psf1 are permuted with respect to Psf1/Psf3. This model represents the B-domain of GINS subunit Psf1."
definition: >-
  beta-strand (B) domain of GINS complex protein Psf1. Psf1 (partner of Sld5 1) is a component of the GINS (named from the Japanese go-ichi-ni-san, meaning 5-1-2-3 for the Sld5, Psf1, Psf2, and Psf3 subunits) tetrameric protein complex, and is mainly expressed in highly proliferative tissues, such as blastocysts, adult bone marrow, and testis, in which the stem cell system is active. Psf1 has been reported to be a prognostic biomarker in breast cancer, prostate cancer, hepatocellular carcinoma, and non-small cell lung cancer (NSCLC) patients treated with surgery following preoperative chemotherapy or chemoradiotherapy. Loss of Psf1 causes embryonic lethality. GINS is a complex of four subunits (Sld5, Psf1, Psf2 and Psf3) and is involved in both the initiation and elongation stages of eukaryotic chromosome replication. Besides being essential for the maintenance of genomic integrity, GINS plays a central role in coordinating DNA replication with cell cycle checkpoints and is involved in cell growth. The eukaryotic GINS subunits Sld5, Psf1, Psf2 and Psf3 are homologous, and homologs are also found in archaea; the complex is not found in bacteria. The four subunits of the complex consist of two domains each, called the alpha-helical (A) and beta-strand (B) domains. The A and B domains of Sld5/Psf1 are permuted with respect to Psf1/Psf3. This model represents the B-domain of GINS subunit Psf1. — an NCBI CDD conserved domain (cd21696); members share this curated model.
