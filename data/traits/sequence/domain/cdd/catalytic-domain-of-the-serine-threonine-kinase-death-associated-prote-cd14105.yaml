identifier: CDD:cd14105
label: "Catalytic domain of the Serine/Threonine Kinase, Death-Associated Protein Kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DAPKs mediate cell death and act as tumor suppressors. They are necessary to induce cell death and their overexpression leads to death-associated changes including membrane blebbing, cell rounding, and formation of autophagic vesicles. Vertebrates contain three subfamily members with different domain architecture, localization, and function. DAPK1 is the prototypical member of the subfamily and is also simply referred to as DAPK. DAPK2 is also called DAPK-related protein 1 (DRP-1), while DAPK3 has also been named DAP-like kinase (DLK) and zipper-interacting protein kinase (ZIPk). These proteins are ubiquitously expressed in adult tissues, are capable of cross talk with each other, and may act synergistically in regulating cell death. The DAPK subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Death-Associated Protein Kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DAPKs mediate cell death and act as tumor suppressors. They are necessary to induce cell death and their overexpression leads to death-associated changes including membrane blebbing, cell rounding, and formation of autophagic vesicles. Vertebrates contain three subfamily members with different domain architecture, localization, and function. DAPK1 is the prototypical member of the subfamily and is also simply referred to as DAPK. DAPK2 is also called DAPK-related protein 1 (DRP-1), while DAPK3 has also been named DAP-like kinase (DLK) and zipper-interacting protein kinase (ZIPk). These proteins are ubiquitously expressed in adult tissues, are capable of cross talk with each other, and may act synergistically in regulating cell death. The DAPK subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14105); members share this curated model.
