identifier: CDD:cd13305
label: "SHANK-associated RH domain interacting protein Pleckstrin homology (PH) domain. SHARPIN has a variety of roles including: a role as a scaffolding partner of anchoring/scaffold proteins Shank1, a role in carcinogenesis through the interaction with FYN binding protein (FYB), which binds to oncogene FYN, a role in apoptosis by interacting with AIFM1, a mitochondrial regulator of cell death, CAPN13, and NSD1, as well as a role in immune disease and inflammation. SHARPIN has at its N-terminus a PH domain, followed by a E3 ubiquitin ligase domain, and a C-terminal RanBP-type and C3HC4-type zinc finger containing 1 domain (RBCK1, also known as HOIP which functions as a protein kinase C (PKC) binding protein as well as a transcriptional activator. SHARPIN's PH domain functions as a dimerization module, rather than a ligand recognition domain. Instead it acts as a dimerization module extending the functional applications of this superfold. PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. They share little sequence conservation, but all have a common fold, which is electrostatically polarized. Less than 10% of PH domains bind phosphoinositide phosphates (PIPs) with high affinity and specificity. PH domains are distinguished from other PIP-binding domains by their specific high-affinity binding to PIPs with two vicinal phosphate groups: PtdIns(3,4)P2, PtdIns(4,5)P2 or PtdIns(3,4,5)P3 which results in targeting some PH domain proteins to the plasma membrane. A few display strong specificity in lipid binding. Any specificity is usually determined by loop regions or insertions in the N-terminus of the domain, which are not conserved across all PH domains. PH domains are found in cellular signaling proteins such as serine/threonine kinase, tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, as well as cytoskeletal associated molecules and in lipid associated enzymes."
definition: >-
  SHANK-associated RH domain interacting protein Pleckstrin homology (PH) domain. SHARPIN has a variety of roles including: a role as a scaffolding partner of anchoring/scaffold proteins Shank1, a role in carcinogenesis through the interaction with FYN binding protein (FYB), which binds to oncogene FYN, a role in apoptosis by interacting with AIFM1, a mitochondrial regulator of cell death, CAPN13, and NSD1, as well as a role in immune disease and inflammation. SHARPIN has at its N-terminus a PH domain, followed by a E3 ubiquitin ligase domain, and a C-terminal RanBP-type and C3HC4-type zinc finger containing 1 domain (RBCK1, also known as HOIP which functions as a protein kinase C (PKC) binding protein as well as a transcriptional activator. SHARPIN's PH domain functions as a dimerization module, rather than a ligand recognition domain. Instead it acts as a dimerization module extending the functional applications of this superfold. PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. They share little sequence conservation, but all have a common fold, which is electrostatically polarized. Less than 10% of PH domains bind phosphoinositide phosphates (PIPs) with high affinity and specificity. PH domains are distinguished from other PIP-binding domains by their specific high-affinity binding to PIPs with two vicinal phosphate groups: PtdIns(3,4)P2, PtdIns(4,5)P2 or PtdIns(3,4,5)P3 which results in targeting some PH domain proteins to the plasma membrane. A few display strong specificity in lipid binding. Any specificity is usually determined by loop regions or insertions in the N-terminus of the domain, which are not conserved across all PH domains. PH domains are found in cellular signaling proteins such as serine/threonine kinase, tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, as well as cytoskeletal associated molecules and in lipid associated enzymes. — an NCBI CDD conserved domain (cd13305); members share this curated model.
