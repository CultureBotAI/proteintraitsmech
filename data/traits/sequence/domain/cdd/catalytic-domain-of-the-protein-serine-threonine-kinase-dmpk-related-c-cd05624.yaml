identifier: CDD:cd05624
label: "Catalytic domain of the Protein Serine/Threonine Kinase, DMPK-related cell division control protein 42 binding kinase (MRCK) beta. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MRCK-beta is expressed ubiquitously in many tissues. MRCK is activated via interaction with the small GTPase Cdc42. MRCK/Cdc42 signaling mediates myosin-dependent cell motility. The MRCK-beta subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. This alignment model includes the dimerization domain."
definition: >-
  Catalytic domain of the Protein Serine/Threonine Kinase, DMPK-related cell division control protein 42 binding kinase (MRCK) beta. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MRCK-beta is expressed ubiquitously in many tissues. MRCK is activated via interaction with the small GTPase Cdc42. MRCK/Cdc42 signaling mediates myosin-dependent cell motility. The MRCK-beta subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. This alignment model includes the dimerization domain. — an NCBI CDD conserved domain (cd05624); members share this curated model.
