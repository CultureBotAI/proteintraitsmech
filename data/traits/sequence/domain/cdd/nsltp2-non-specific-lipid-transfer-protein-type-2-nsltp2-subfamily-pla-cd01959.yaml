identifier: CDD:cd01959
label: "nsLTP2: Non-specific lipid-transfer protein type 2 (nsLTP2) subfamily; Plant nsLTPs are small, soluble proteins that facilitate the transfer of fatty acids, phospholipids, glycolipids, and steroids between membranes. In addition to lipid transport and assembly, nsLTPs also play a key role in the defense of plants against pathogens. There are two closely-related types of nsLTPs, types 1 and 2, which differ in protein sequence, molecular weight, and biological properties. nsLTPs contain an internal hydrophobic cavity, which serves as the binding site for lipids. nsLTP2 can bind lipids and sterols. Structure studies of rice nsLTPs show that the plasticity of the hydrophobic cavity is an important factor in ligand binding. The flexibility of the sLTP2 cavity allows its binding to rigid sterol molecules, whereas nsLTP1 cannot bind sterols despite its larger cavity size. The resulting nsLTP2/sterol complexes may bind to receptors that trigger defense responses. nsLTP2 gene expression has been observed in barley and rice developing seeds, during Zinnia elegans cell differentiation, and under abiotic stress conditions in barley roots. The nsLTP2 of Brassica rapa has also been identified as a potent allergen."
