identifier: CDD:cd03455
label: "SAV4209 is a Streptomyces avermitilis protein with a hot dog fold that is similar to those of (R)-specific enoyl-CoA hydratase, the peroxisomal Hydratase-Dehydrogenase-Epimerase (HDE) protein, and the fatty acid synthase beta subunit.  The alpha- and gamma-proteobacterial members of this CD have, in addition to a hot dog fold, an N-terminal extension."
definition: >-
  SAV4209 is a Streptomyces avermitilis protein with a hot dog fold that is similar to those of (R)-specific enoyl-CoA hydratase, the peroxisomal Hydratase-Dehydrogenase-Epimerase (HDE) protein, and the fatty acid synthase beta subunit. The alpha- and gamma-proteobacterial members of this CD have, in addition to a hot dog fold, an N-terminal extension. — an NCBI CDD conserved domain (cd03455); members share this curated model.
