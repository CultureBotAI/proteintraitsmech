identifier: CDD:cd22036
label: "high mobility group (HMG)-box found in sex determining region Y (SRY)-box 4 (SOX4) and similar proteins. SOX-4 is a transcriptional activator that promotes neuronal differentiation both in the adult and embryonic neural progenitors. It binds with high affinity to the T-cell enhancer motif 5'-AACAAAG-3' motif. SOX-4 is abnormally expressed in various cancers. SOX-4 belongs to group C SRY-related high-mobility group (HMG) box (Sox) transcription factors."
definition: >-
  high mobility group (HMG)-box found in sex determining region Y (SRY)-box 4 (SOX4) and similar proteins. SOX-4 is a transcriptional activator that promotes neuronal differentiation both in the adult and embryonic neural progenitors. It binds with high affinity to the T-cell enhancer motif 5'-AACAAAG-3' motif. SOX-4 is abnormally expressed in various cancers. SOX-4 belongs to group C SRY-related high-mobility group (HMG) box (Sox) transcription factors. — an NCBI CDD conserved domain (cd22036); members share this curated model.
