identifier: CDD:cd16785
label: "Modified RING finger, HC subclass (C3HC5-type), found in neuralized-like protein 1A (NEURL1A) and similar proteins. NEURL1A, also known as NEURL1, NEU, neuralized 1, or RING finger protein 67 (RNF67), is a mammalian homolog of the Drosophila neuralized (D-neu) protein. It functions as an E3 ubiquitin-protein ligase that directly interacts with and monoubiquitinates cytoplasmic polyadenylation element-binding protein 3 (CPEB3), an RNA binding protein and a translational regulator of local protein synthesis, which facilitates hippocampal plasticity and hippocampal-dependent memory storage. It also acts as a potential tumor suppressor that causes apoptosis and downregulates Notch target genes in the medulloblastoma. NEURL1A contains two neuralized homology regions (NHRs) responsible for Neural-ligand interactions and a modified C3HC5-type RING-HC finger required for ubiquitin ligase activity. The C3HC5-type RING-HC finger is distinguished from typical C3HC4-type RING-HC finger due to the existence of the additional cysteine residue in the middle portion of the RING finger domain."
definition: >-
  Modified RING finger, HC subclass (C3HC5-type), found in neuralized-like protein 1A (NEURL1A) and similar proteins. NEURL1A, also known as NEURL1, NEU, neuralized 1, or RING finger protein 67 (RNF67), is a mammalian homolog of the Drosophila neuralized (D-neu) protein. It functions as an E3 ubiquitin-protein ligase that directly interacts with and monoubiquitinates cytoplasmic polyadenylation element-binding protein 3 (CPEB3), an RNA binding protein and a translational regulator of local protein synthesis, which facilitates hippocampal plasticity and hippocampal-dependent memory storage. It also acts as a potential tumor suppressor that causes apoptosis and downregulates Notch target genes in the medulloblastoma. NEURL1A contains two neuralized homology regions (NHRs) responsible for Neural-ligand interactions and a modified C3HC5-type RING-HC finger required for ubiquitin ligase activity. The C3HC5-type RING-HC finger is distinguished from typical C3HC4-type RING-HC finger due to the existence of the additional cysteine residue in the middle portion of the RING finger domain. — an NCBI CDD conserved domain (cd16785); members share this curated model.
