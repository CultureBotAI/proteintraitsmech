identifier: CDD:cd15197
label: "neuropeptide S receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. Neuropeptide S (NPS) promotes arousal and anxiolytic-like effects by activating its cognate receptor NPSR. NPSR is widely expressed in the brain, and its activation induces an elevation of intracellular calcium and cAMP concentrations, presumably by coupling to G(s) and G(q) proteins. Mutations in NPSR have been associated with an increased susceptibility to asthma. NPSR was originally identified as an orphan receptor GPR154 and is also known as G protein receptor for asthma susceptibility (GPRA) or vasopressin receptor-related receptor 1 (VRR1)."
definition: >-
