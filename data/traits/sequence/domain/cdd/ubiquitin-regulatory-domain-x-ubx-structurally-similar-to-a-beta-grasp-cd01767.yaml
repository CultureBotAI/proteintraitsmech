identifier: CDD:cd01767
label: "Ubiquitin regulatory domain X (UBX) structurally similar to a beta-grasp ubiquitin-like fold. The UBXD family of proteins contains the ubiquitin regulatory domain X (UBX) with a beta-grasp ubiquitin-like fold, but without the C-terminal double glycine motif. UBX domain is typically located at the carboxyl terminus of proteins, and participates broadly in the regulation of protein degradation. Members in this family function as cofactors of p97 (also known as VCP or Cdc48), which is a homohexameric AAA ATPase (ATPase associated with a variety of activities) involved in a variety of functions ranging from cell-cycle regulation to membrane fusion and protein degradation. Based on domain composition, UBXD proteins can be divided into two main groups, with and without ubiquitin-associated (UBA) domain."
definition: >-
  Ubiquitin regulatory domain X (UBX) structurally similar to a beta-grasp ubiquitin-like fold. The UBXD family of proteins contains the ubiquitin regulatory domain X (UBX) with a beta-grasp ubiquitin-like fold, but without the C-terminal double glycine motif. UBX domain is typically located at the carboxyl terminus of proteins, and participates broadly in the regulation of protein degradation. Members in this family function as cofactors of p97 (also known as VCP or Cdc48), which is a homohexameric AAA ATPase (ATPase associated with a variety of activities) involved in a variety of functions ranging from cell-cycle regulation to membrane fusion and protein degradation. Based on domain composition, UBXD proteins can be divided into two main groups, with and without ubiquitin-associated (UBA) domain. — an NCBI CDD conserved domain (cd01767); members share this curated model.
