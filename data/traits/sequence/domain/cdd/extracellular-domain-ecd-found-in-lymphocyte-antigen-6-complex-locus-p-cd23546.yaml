identifier: CDD:cd23546
label: "extracellular domain (ECD) found in lymphocyte antigen 6 complex locus protein G6c (Ly6G6c) and similar proteins. Ly6G6c is a glycosylated, GPI-anchored, cell surface molecule, located on filopodia, which could act as cell receptor with potential roles in signaling or cell-cell interactions. Ly6G6c contains an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in lymphocyte antigen 6 complex locus protein G6c (Ly6G6c) and similar proteins. Ly6G6c is a glycosylated, GPI-anchored, cell surface molecule, located on filopodia, which could act as cell receptor with potential roles in signaling or cell-cell interactions. Ly6G6c contains an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23546); members share this curated model.
