identifier: CDD:cd23622
label: "first extracellular domain (ECD) found in testis-expressed protein 101 (TEX101) and similar proteins. TEX101 (also called cell surface receptor NYD-SP8, or scleroderma-associated autoantigen, or spermatogenesis-related gene protein (SGRG)) is a germ cell-specific glycosylphosphatidylinositol (GPI)-anchored protein essential for sperm fertility and spermatogenesis. It plays a role in fertilization by controlling binding of sperm to zona pellucida and migration of spermatozoa into the oviduct.  It is associated with Ly6k during spermatogenesis in testis and is required for stable expression of lymphocyte antigen 6 family member K (Ly6k) on testicular germ cells. TEX101 contains two extracellular domains (ECDs) that belong to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). This model corresponds to the first ECD."
definition: >-
  first extracellular domain (ECD) found in testis-expressed protein 101 (TEX101) and similar proteins. TEX101 (also called cell surface receptor NYD-SP8, or scleroderma-associated autoantigen, or spermatogenesis-related gene protein (SGRG)) is a germ cell-specific glycosylphosphatidylinositol (GPI)-anchored protein essential for sperm fertility and spermatogenesis. It plays a role in fertilization by controlling binding of sperm to zona pellucida and migration of spermatozoa into the oviduct. It is associated with Ly6k during spermatogenesis in testis and is required for stable expression of lymphocyte antigen 6 family member K (Ly6k) on testicular germ cells. TEX101 contains two extracellular domains (ECDs) that belong to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). This model corresponds to the first ECD. — an NCBI CDD conserved domain (cd23622); members share this curated model.
