identifier: CDD:cd14269
label: "SUKH domain superfamily. Proteins in this family are involved in the regulation of 1,3-beta-glucan synthase activity and cell-wall formation. Genome contextual information showed that SMI1 are primary immunity proteins in bacterial toxin systems. SUKH includes proteins such as SMI1/KNR4, PGs2, FBX03, SKIP16, Syd, herpesviral US22, IRS1, and TRS1."
definition: >-
  SUKH domain superfamily. Proteins in this family are involved in the regulation of 1,3-beta-glucan synthase activity and cell-wall formation. Genome contextual information showed that SMI1 are primary immunity proteins in bacterial toxin systems. SUKH includes proteins such as SMI1/KNR4, PGs2, FBX03, SKIP16, Syd, herpesviral US22, IRS1, and TRS1. — an NCBI CDD conserved domain (cd14269); members share this curated model.
