identifier: CDD:cd08169
label: "Dehydroquinate synthase-like which includes dehydroquinate synthase, 2-deoxy-scyllo-inosose synthase, and 2-epi-5-epi-valiolone synthase. This group contains dehydroquinate synthase, 2-deoxy-scyllo-inosose synthase, and 2-epi-5-epi-valiolone synthase. These proteins exhibit the dehydroquinate synthase structural fold. Dehydroquinate synthase (DHQS) catalyzes the conversion of 3-deoxy-D-arabino-heptulosonate-7-phosphate (DAHP) to dehydroquinate (DHQ) in the second step of the shikimate pathway. This pathway involves seven sequential enzymatic steps in the conversion of erythrose 4-phosphate and phosphoenolpyruvate into chorismate for subsequent synthesis of aromatic compounds. 2-deoxy-scyllo-inosose synthase (DOIS) catalyzes carbocycle formation from D-glucose-6-phosphate to 2-deoxy-scyllo-inosose through a multi-step reaction in the biosynthesis of aminoglycoside antibiotics. 2-deoxystreptamine (DOS)-containing aminoglycoside antibiotics includes neomycin, kanamycin, gentamicin, and ribostamycin. 2-epi-5-epi-valiolone synthases catalyze the cyclization of sedoheptulose 7-phosphate to 2-epi-5-epi-valiolone in the biosynthesis of C(7)N-aminocyclitol-containing products. The cyclization product, 2-epi-5-epi-valiolone ((2S,3S,4S,5R)-5-(hydroxymethyl)cyclohexanon-2,3,4,5-tetrol), is a precursor of the valienamine moiety. The valienamine unit is responsible for their biological activities as various glycosidic hydrolases inhibitors. Two important microbial secondary metabolites, validamycin and acarbose, are used in agricultural and biomedical applications."
definition: >-
  Dehydroquinate synthase-like which includes dehydroquinate synthase, 2-deoxy-scyllo-inosose synthase, and 2-epi-5-epi-valiolone synthase. This group contains dehydroquinate synthase, 2-deoxy-scyllo-inosose synthase, and 2-epi-5-epi-valiolone synthase. These proteins exhibit the dehydroquinate synthase structural fold. Dehydroquinate synthase (DHQS) catalyzes the conversion of 3-deoxy-D-arabino-heptulosonate-7-phosphate (DAHP) to dehydroquinate (DHQ) in the second step of the shikimate pathway. This pathway involves seven sequential enzymatic steps in the conversion of erythrose 4-phosphate and phosphoenolpyruvate into chorismate for subsequent synthesis of aromatic compounds. 2-deoxy-scyllo-inosose synthase (DOIS) catalyzes carbocycle formation from D-glucose-6-phosphate to 2-deoxy-scyllo-inosose through a multi-step reaction in the biosynthesis of aminoglycoside antibiotics. 2-deoxystreptamine (DOS)-containing aminoglycoside antibiotics includes neomycin, kanamycin, gentamicin, and ribostamycin. 2-epi-5-epi-valiolone synthases catalyze the cyclization of sedoheptulose 7-phosphate to 2-epi-5-epi-valiolone in the biosynthesis of C(7)N-aminocyclitol-containing products. The cyclization product, 2-epi-5-epi-valiolone ((2S,3S,4S,5R)-5-(hydroxymethyl)cyclohexanon-2,3,4,5-tetrol), is a precursor of the valienamine moiety. The valienamine unit is responsible for their biological activities as various glycosidic hydrolases inhibitors. Two important microbial secondary metabolites, validamycin and acarbose, are used in agricultural and biomedical applications. — an NCBI CDD conserved domain (cd08169); members share this curated model.
