identifier: CDD:cd11664
label: "uncharacterized proteins similar to the Aspergillus nidulans lactam utilization protein LamB. This bacterial subfamily of the LamB/YbgL family, contains many well conserved uncharacterized proteins. Although their molecular function is unknown, those proteins show high sequence similarity to the Aspergillus nidulans lactam utilization protein LamB, which might be required for conversion of exogenous 2-pyrrolidinone to endogenous GABA."
definition: >-
  uncharacterized proteins similar to the Aspergillus nidulans lactam utilization protein LamB. This bacterial subfamily of the LamB/YbgL family, contains many well conserved uncharacterized proteins. Although their molecular function is unknown, those proteins show high sequence similarity to the Aspergillus nidulans lactam utilization protein LamB, which might be required for conversion of exogenous 2-pyrrolidinone to endogenous GABA. — an NCBI CDD conserved domain (cd11664); members share this curated model.
