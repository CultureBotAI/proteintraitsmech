identifier: CDD:cd16043
label: TNFSF2_teleost
definition: >-
  Tumor Necrosis Factor Superfamily 2 (TNFSF2) in teleosts; also known as TNF or TNF-alpha. This family contains TNF-alpha (also known as TNF, TNFSF2, TNFA, DIF or Cachectin) found only in teleosts. It has been postulated that the duplication and evolution of the TNFSF and TNFRSF families paralleled the emergence of the adaptive immune system, leading to teleost-wide whole-genome duplication (WGD) events; TNFSF members play critical roles in many aspects of immune system organization and function. Teleost species possess between 1 and 3 copies of TNF-alpha, as well as a receptor similar to TNFR1. Functional studies in zebrafish show a conserved role of TNF-alpha/TNFR1 system in the regulation of cell survival and resistance to infectious disease. TNF-alpha is a cytokine that has a wide variety of functions, including cytolysis of certain tumor cell lines, induction of cachexia, induction of fever by direct action or by stimulation of interleukin-1 secretion, as well as stimulation of cell proliferation and induction of cell differentiation under certain conditions. TNF-alpha binds TNFR1 (also known as type I TNFR, TNFR1, DR1, TNFRSF1A, CD120a, p55) through the death domain (DD), which activates NF-kappaB, mediates apoptosis and activates signaling pathways controlling inflammatory, immune and stress responses. It also binds TNFR2 (TNFRSF2, type 2 TNFR, TNFBR, TNFR80, TNF-R75, TNF-R-II, p75, CD120b) which lacks the DD but is inducible and expressed exclusively by oligodendrocytes, astrocytes, T cells, thymocytes, myocytes, endothelial cells and in human mesenchymal stem cells, and is responsible for suppression of inflammation. Although the affinities of both receptors for soluble TNF-alpha are similar, TNFR1 is sometimes more abundantly expressed and thought to associate with TNF, thereby increasing its concentration near TNFR1 receptors, and making TNF available to activate TNFR1 (a ligand-passing mechanism). TNF-alpha is synthesized as a type II transmembrane protein which is then clipped by the TNF converting enzyme (TACE) and released as a homotrimer to bind to its receptors
