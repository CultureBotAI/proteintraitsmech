identifier: CDD:cd00565
label: "ubiquitin-like (Ubl) domain found in sulfur carrier protein ThiS. ThiS, also termed Thiamine biosynthesis protein (ThiaminS), is a sulfur carrier protein involved in thiamin biosynthesis in prokaryotes. It has the beta-grasp ubiquitin-like (Ubl) fold with low sequence similarity to ubiquitin (Ub), and is activated in an ATP-dependent manner by sulfurtransferases, similar to the activation mechanism of Ub-activating enzyme E1. ThiS has common evolutionary origin with Ub-related protein modifiers in eukaryotes, a beta-grasp fold as Ub, and is closely related to proteins MoaD and Urm1."
definition: >-
  ubiquitin-like (Ubl) domain found in sulfur carrier protein ThiS. ThiS, also termed Thiamine biosynthesis protein (ThiaminS), is a sulfur carrier protein involved in thiamin biosynthesis in prokaryotes. It has the beta-grasp ubiquitin-like (Ubl) fold with low sequence similarity to ubiquitin (Ub), and is activated in an ATP-dependent manner by sulfurtransferases, similar to the activation mechanism of Ub-activating enzyme E1. ThiS has common evolutionary origin with Ub-related protein modifiers in eukaryotes, a beta-grasp fold as Ub, and is closely related to proteins MoaD and Urm1. — an NCBI CDD conserved domain (cd00565); members share this curated model.
