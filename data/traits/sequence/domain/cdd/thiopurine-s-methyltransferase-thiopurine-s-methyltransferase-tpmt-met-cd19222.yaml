identifier: CDD:cd19222
label: TPMT
definition: >-
  thiopurine S-methyltransferase. Thiopurine S-methyltransferase (TPMT) metabolizes thiopurine drugs, such as 6-mercaptopurine which is used as chemotherapeutic agents, via S-adenosyl-L-methionine as the S-methyl donor and S-adenosyl-L-homocysteine as a byproduct. S-adenosylmethionine-dependent methyltransferases (SAM or AdoMet-MTase), class I; AdoMet-MTases are enzymes that use S-adenosyl-L-methionine (SAM or AdoMet) as a substrate for methyltransfer, creating the product S-adenosyl-L-homocysteine (AdoHcy). There are at least five structurally distinct families of AdoMet-MTases, class I being the largest and most diverse. Within this class enzymes can be classified by different substrate specificity (small molecules, lipids, nucleic acids, etc) and different target atoms for methylation (nitrogen, oxygen, carbon, sulfur,etc)
