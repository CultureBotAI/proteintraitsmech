identifier: CDD:cd24093
label: "nucleotide-binding domain (NBD) of Saccharmoyces cerevisiae Hsp70 chaperone Ssb and similar proteins. Ssb is ribosome-bound, Hsp70-type chaperone that assists in the co-translational folding of newly synthesized proteins in the cytosol. It stimulates folding by interacting with nascent chains, binding to short, largely hydrophobic sequences exposed by unfolded proteins, thereby stabilizing longer, more slowly translated, and aggregation-prone nascent polypeptides and domains that cannot fold stably until fully synthesized. Ssb cooperates with a specific Hsp40/Hsp70 co-chaperone termed the ribosome-associated complex (RAC), which stimulates the ATPase activity of the ribosome-associated pool of Ssbs and switches it to the high affinity substrate binding state. Saccharmoyces cerevisiae Ssb are encoded by two genes, SSB1 and SSB2. Ssb1p is also known as cold-inducible protein YG101. Members in this subfamily belong to the heat shock protein 70 (HSP70) family of chaperones that assist in protein folding and assembly, and can direct incompetent \"client\" proteins towards degradation. Typically, HSP70s have a nucleotide-binding domain (NBD) and a substrate-binding domain (SBD). The nucleotide sits in a deep cleft formed between the two lobes of the NBD. The two subdomains of each lobe change conformation between ATP-bound, ADP-bound, and nucleotide-free states. ATP binding opens up the substrate-binding site; substrate-binding increases the rate of ATP hydrolysis. HSP70 chaperone activity is regulated by various co-chaperones: J-domain proteins and nucleotide exchange factors (NEFs)."
definition: >-
  nucleotide-binding domain (NBD) of Saccharmoyces cerevisiae Hsp70 chaperone Ssb and similar proteins. Ssb is ribosome-bound, Hsp70-type chaperone that assists in the co-translational folding of newly synthesized proteins in the cytosol. It stimulates folding by interacting with nascent chains, binding to short, largely hydrophobic sequences exposed by unfolded proteins, thereby stabilizing longer, more slowly translated, and aggregation-prone nascent polypeptides and domains that cannot fold stably until fully synthesized. Ssb cooperates with a specific Hsp40/Hsp70 co-chaperone termed the ribosome-associated complex (RAC), which stimulates the ATPase activity of the ribosome-associated pool of Ssbs and switches it to the high affinity substrate binding state. Saccharmoyces cerevisiae Ssb are encoded by two genes, SSB1 and SSB2. Ssb1p is also known as cold-inducible protein YG101. Members in this subfamily belong to the heat shock protein 70 (HSP70) family of chaperones that assist in protein folding and assembly, and can direct incompetent "client" proteins towards degradation. Typically, HSP70s have a nucleotide-binding domain (NBD) and a substrate-binding domain (SBD). The nucleotide sits in a deep cleft formed between the two lobes of the NBD. The two subdomains of each lobe change conformation between ATP-bound, ADP-bound, and nucleotide-free states. ATP binding opens up the substrate-binding site; substrate-binding increases the rate of ATP hydrolysis. HSP70 chaperone activity is regulated by various co-chaperones: J-domain proteins and nucleotide exchange factors (NEFs). — an NCBI CDD conserved domain (cd24093); members share this curated model.
