identifier: CDD:cd21739
label: "nuclear export signal 2 (NES2) and nuclear import signal (NLS) domains found in carbohydrate-responsive element-binding protein (ChREBP), MLX-interacting protein (MLXIP), and similar proteins. This family includes two transcription factors: ChREBP and MLXIP. ChREBP, also called class D basic helix-loop-helix protein 14 (bHLHd14), Max-like protein (MLX) interactor or MIO, MLX-interacting protein-like (MLXIPL), WS basic-helix-loop-helix leucine zipper protein (WS-bHLH), or Williams-Beuren syndrome chromosomal region 14 protein (WBSCR14), functions at two levels; nuclear localization and DNA binding. ChREBP binds to the canonical and non-canonical E box sequences 5'-CACGTG-3'. It also binds DNA as a heterodimer with TCFL4/MLX. MLXIP, also called class E basic helix-loop-helix protein 36 (bHLHe36), transcriptional activator MondoA, or MIR, is a novel basic helix-loop-helix-leucine zipper transcriptional activator that constitutes a positive branch of a max-like network. MLXIP binds DNA by forming a heterodimer with Max-like protein (MLX), and activates transcription. It binds to the canonical E box sequence 5'-CACGTG-3'. MLXIP plays a role in transcriptional activation of glycolytic target genes and is involved in glucose-responsive gene regulation. Members in this family may contain functional domains, including two nuclear export signals, NES1 and NES2, and a nuclear import signal (NLS) in the N-terminal region. This model corresponds to NES2 and NLS domains."
definition: >-
  nuclear export signal 2 (NES2) and nuclear import signal (NLS) domains found in carbohydrate-responsive element-binding protein (ChREBP), MLX-interacting protein (MLXIP), and similar proteins. This family includes two transcription factors: ChREBP and MLXIP. ChREBP, also called class D basic helix-loop-helix protein 14 (bHLHd14), Max-like protein (MLX) interactor or MIO, MLX-interacting protein-like (MLXIPL), WS basic-helix-loop-helix leucine zipper protein (WS-bHLH), or Williams-Beuren syndrome chromosomal region 14 protein (WBSCR14), functions at two levels; nuclear localization and DNA binding. ChREBP binds to the canonical and non-canonical E box sequences 5'-CACGTG-3'. It also binds DNA as a heterodimer with TCFL4/MLX. MLXIP, also called class E basic helix-loop-helix protein 36 (bHLHe36), transcriptional activator MondoA, or MIR, is a novel basic helix-loop-helix-leucine zipper transcriptional activator that constitutes a positive branch of a max-like network. MLXIP binds DNA by forming a heterodimer with Max-like protein (MLX), and activates transcription. It binds to the canonical E box sequence 5'-CACGTG-3'. MLXIP plays a role in transcriptional activation of glycolytic target genes and is involved in glucose-responsive gene regulation. Members in this family may contain functional domains, including two nuclear export signals, NES1 and NES2, and a nuclear import signal (NLS) in the N-terminal region. This model corresponds to NES2 and NLS domains. — an NCBI CDD conserved domain (cd21739); members share this curated model.
