identifier: CDD:cd20019
label: "Forkhead (FH) domain found in the Forkhead box protein E (FOXE) subfamily. The FOXE subfamily includes two winged helix transcription factors, FOXE1 (also known as FOXE2) and FOXE3. FOXE1, also called Forkhead-related protein FKHL15, HFKH4, HNF-3/fork head-like protein 5 (HFKL5), or thyroid transcription factor 2 (TTF-2), is a transcription factor that binds consensus sites on a variety of gene promoters and activate their transcription. FOXE3, also called Forkhead-related protein FKHL12 or Forkhead-related transcription factor 8 (FREAC-8), is a transcription factor that controls lens epithelial cell growth through regulation of proliferation, apoptosis, and the cell cycle. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in the Forkhead box protein E (FOXE) subfamily. The FOXE subfamily includes two winged helix transcription factors, FOXE1 (also known as FOXE2) and FOXE3. FOXE1, also called Forkhead-related protein FKHL15, HFKH4, HNF-3/fork head-like protein 5 (HFKL5), or thyroid transcription factor 2 (TTF-2), is a transcription factor that binds consensus sites on a variety of gene promoters and activate their transcription. FOXE3, also called Forkhead-related protein FKHL12 or Forkhead-related transcription factor 8 (FREAC-8), is a transcription factor that controls lens epithelial cell growth through regulation of proliferation, apoptosis, and the cell cycle. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20019); members share this curated model.
