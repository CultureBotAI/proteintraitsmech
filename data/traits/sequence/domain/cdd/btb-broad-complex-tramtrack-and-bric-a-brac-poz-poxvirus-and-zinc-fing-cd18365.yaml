identifier: CDD:cd18365
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing proteins, KCTD6, KCTD21 and similar proteins. KCTD6, also called KCASH3 (KCTD containing, Cullin3 adaptor, suppressor of Hedgehog 3), is a substrate-specific adaptor of cullin-3, effectively regulating protein levels of the muscle small ankyrin-1 isoform 5 (sAnk1.5). KCTD21, also called KCASH2, functions as a substrate-specific adaptor of cullin-3, promoting the ubiquitination and degradation of histone deacetylase HDAC1, thereby inhibiting the deacetylation-mediated transcriptional activation of the Hedgehog effectors Gli1 and Gli2. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing proteins, KCTD6, KCTD21 and similar proteins. KCTD6, also called KCASH3 (KCTD containing, Cullin3 adaptor, suppressor of Hedgehog 3), is a substrate-specific adaptor of cullin-3, effectively regulating protein levels of the muscle small ankyrin-1 isoform 5 (sAnk1.5). KCTD21, also called KCASH2, functions as a substrate-specific adaptor of cullin-3, promoting the ubiquitination and degradation of histone deacetylase HDAC1, thereby inhibiting the deacetylation-mediated transcriptional activation of the Hedgehog effectors Gli1 and Gli2. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. — an NCBI CDD conserved domain (cd18365); members share this curated model.
