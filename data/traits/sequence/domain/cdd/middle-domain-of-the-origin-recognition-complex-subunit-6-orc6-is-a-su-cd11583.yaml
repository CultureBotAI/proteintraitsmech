identifier: CDD:cd11583
label: Orc6_mid
definition: >-
  Middle domain of the origin recognition complex subunit 6. Orc6 is a subunit of the origin recognition complex in eukaryotes, and it may be involved in binding to DNA. This model describes the central or middle domain of Orc6, whose structure resembles that of TFIIB, a DNA-binding transcription factor. Orc6 appears to form distinct complexes with DNA, and a putative DNA-binding site has been identified
