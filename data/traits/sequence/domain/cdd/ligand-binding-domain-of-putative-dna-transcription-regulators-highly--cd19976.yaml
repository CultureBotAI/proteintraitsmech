identifier: CDD:cd19976
label: "ligand-binding domain of putative DNA transcription regulators highly similar to that of the transcription regulator DegA. This group includes the ligand-binding domain of uncharacterized DNA transcription repressors highly similar to that of the transcription regulator DegA, which is involved in the control of degradation of Bacillus subtilis amidophosphoribosyltransferase (purF). This group belongs to the LacI-GalR family repressors and are composed of two functional domains: an N-terminal HTH (helix-turn-helix) domain, which is responsible for the DNA-binding specificity, and a C-terminal ligand-binding domain, which is homologous to the sugar-binding domain of ABC-type transport systems that contain the type 1 periplasmic binding protein-like fold. As also observed in the periplasmic binding proteins, the C-terminal domain of the bacterial transcription repressor undergoes a conformational change upon ligand binding which in turn changes the DNA binding."
definition: >-
  ligand-binding domain of putative DNA transcription regulators highly similar to that of the transcription regulator DegA. This group includes the ligand-binding domain of uncharacterized DNA transcription repressors highly similar to that of the transcription regulator DegA, which is involved in the control of degradation of Bacillus subtilis amidophosphoribosyltransferase (purF). This group belongs to the LacI-GalR family repressors and are composed of two functional domains: an N-terminal HTH (helix-turn-helix) domain, which is responsible for the DNA-binding specificity, and a C-terminal ligand-binding domain, which is homologous to the sugar-binding domain of ABC-type transport systems that contain the type 1 periplasmic binding protein-like fold. As also observed in the periplasmic binding proteins, the C-terminal domain of the bacterial transcription repressor undergoes a conformational change upon ligand binding which in turn changes the DNA binding. — an NCBI CDD conserved domain (cd19976); members share this curated model.
