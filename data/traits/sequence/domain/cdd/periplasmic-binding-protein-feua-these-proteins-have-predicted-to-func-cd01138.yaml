identifier: CDD:cd01138
label: "Periplasmic binding protein FeuA.  These proteins have predicted to function as initial receptors in ABC transport of metal ions in some eubacterial species.  They belong to the TroA superfamily of periplasmic metal binding proteins that share a distinct fold and ligand binding mechanism. A typical TroA protein is comprised of two globular subdomains connected by a single helix and can bind their ligands in the cleft between these domains."
definition: >-
  Periplasmic binding protein FeuA. These proteins have predicted to function as initial receptors in ABC transport of metal ions in some eubacterial species. They belong to the TroA superfamily of periplasmic metal binding proteins that share a distinct fold and ligand binding mechanism. A typical TroA protein is comprised of two globular subdomains connected by a single helix and can bind their ligands in the cleft between these domains. — an NCBI CDD conserved domain (cd01138); members share this curated model.
