identifier: CDD:cd17245
label: "Type I restriction-modification system specificity (S) subunit Target Recognition Domain-ConseRved domain (TRD-CR), similar to Thermoanaerobacter tengcongensis S subunit (S.TteMORF1547P) TRD2-CR2 and Aminobacterium colombiense DSM 12261 S subunit (S.Aco12261I) TRD1-CR1. The S.Aco12261I S subunit recognizes 5'... GCANNNNNNTGT ... 3', while the recognition sequence is undetermined for S.TteMORF1547P TRD2-CR2. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains both TRD1-CR1 and TRD2-CR2. S.TteMORF1547P TRD1-CR1 and S.Aco12261I TRD2-CR2 do not belong to this family. This family may also include TRD-CR-like sequence-recognition domains of various type II restriction enzymes and methyltransferases and type I DNA methyltransferases."
definition: >-
  Type I restriction-modification system specificity (S) subunit Target Recognition Domain-ConseRved domain (TRD-CR), similar to Thermoanaerobacter tengcongensis S subunit (S.TteMORF1547P) TRD2-CR2 and Aminobacterium colombiense DSM 12261 S subunit (S.Aco12261I) TRD1-CR1. The S.Aco12261I S subunit recognizes 5'... GCANNNNNNTGT ... 3', while the recognition sequence is undetermined for S.TteMORF1547P TRD2-CR2. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains both TRD1-CR1 and TRD2-CR2. S.TteMORF1547P TRD1-CR1 and S.Aco12261I TRD2-CR2 do not belong to this family. This family may also include TRD-CR-like sequence-recognition domains of various type II restriction enzymes and methyltransferases and type I DNA methyltransferases. — an NCBI CDD conserved domain (cd17245); members share this curated model.
