identifier: CDD:cd18521
label: "BACK (BTB and C-terminal Kelch) domain found in TD and POZ domain-containing proteins, Tdpoz1-4. TDPOZ is a family of bipartite animal and plant proteins that contain a tumor necrosis factor receptor-associated factor (TRAF) domain (TD) and a POZ/BTB domain. TDPOZ proteins may be nuclear scaffold proteins probably involved in transcription regulation in early development and other cellular processes. This subfamily contains only mammalian members. Plant TDPOZ proteins contain a MATH domain at the N-terminal region and are named \"BTB/POZ and MATH domain-containing proteins (BPM)\", and are not inlcuded in this subfamily."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in TD and POZ domain-containing proteins, Tdpoz1-4. TDPOZ is a family of bipartite animal and plant proteins that contain a tumor necrosis factor receptor-associated factor (TRAF) domain (TD) and a POZ/BTB domain. TDPOZ proteins may be nuclear scaffold proteins probably involved in transcription regulation in early development and other cellular processes. This subfamily contains only mammalian members. Plant TDPOZ proteins contain a MATH domain at the N-terminal region and are named "BTB/POZ and MATH domain-containing proteins (BPM)", and are not inlcuded in this subfamily. — an NCBI CDD conserved domain (cd18521); members share this curated model.
