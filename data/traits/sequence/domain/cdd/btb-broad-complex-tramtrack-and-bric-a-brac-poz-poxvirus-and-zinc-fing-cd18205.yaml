identifier: CDD:cd18205
label: BTB_POZ_ZBTB16_PLZF
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 16 (ZBTB16). ZBTB16 is also called promyelocytic leukemia zinc finger protein, zinc finger protein 145, or zinc finger protein PLZF. It is a DNA-binding transcription factor essential for undifferentiated cell maintenance. ZBTB16 also acts as a downstream transcriptional regulator of Osterix and can be useful as a late marker of osteoblastic differentiation. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids
