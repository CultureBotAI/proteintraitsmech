identifier: CDD:cd21043
label: GE1_CTD
definition: >-
  C-terminal domain found in the Ge-1 protein family. Ge-1 protein, also known as enhancer of mRNA-decapping protein 4, is a WD repeat-containing protein, a central component of P-bodies. It acts as an autoantigen that may act prior to the 5'-decapping step in mRNA degradation. Ge-1 protein from plant is also called varicose (vcs), which is required for leaf blade development. The model corresponds to the C-terminal domain of Ge-1. It interacts with DCP2 and mediates Ge-1 oligomerization and P-body localization
