identifier: CDD:cd14487
label: "C-terminal carbohydrate-binding domain of the alginate O-acetyltranferase AlgX. The alginate biosynthesis protein AlgX appears to be directly involved in the O-acetylation of alginate, an exopolysaccharide that is associated with the formation of persistent biofilms, such as those by mucoid strains of Pseudomonas aeruginosa that affect patients suffering from cystic fibrosis. This N-terminal catalytic domain resembles SGNH hydrolases, though with a permuted topology. The active site matches that of the SGNH hydrolases, is well conserved, and has been verified experimentally. AlgX contains a C-terminal carbohydrate binding domain that belongs to the wider family of CBM6-CBM35-CBM36_like domains."
definition: >-
  C-terminal carbohydrate-binding domain of the alginate O-acetyltranferase AlgX. The alginate biosynthesis protein AlgX appears to be directly involved in the O-acetylation of alginate, an exopolysaccharide that is associated with the formation of persistent biofilms, such as those by mucoid strains of Pseudomonas aeruginosa that affect patients suffering from cystic fibrosis. This N-terminal catalytic domain resembles SGNH hydrolases, though with a permuted topology. The active site matches that of the SGNH hydrolases, is well conserved, and has been verified experimentally. AlgX contains a C-terminal carbohydrate binding domain that belongs to the wider family of CBM6-CBM35-CBM36_like domains. — an NCBI CDD conserved domain (cd14487); members share this curated model.
