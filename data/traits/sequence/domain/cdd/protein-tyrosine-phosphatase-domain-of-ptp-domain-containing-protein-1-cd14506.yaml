label: "protein tyrosine phosphatase domain of PTP domain-containing protein 1. protein tyrosine phosphatase domain-containing protein 1 (PTPDC1) is an uncharacterized non-receptor class protein-tyrosine phosphatase (PTP). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. Small interfering RNA (siRNA) knockdown of the ptpdc1 gene is associated with elongated cilia."
definition: >-
