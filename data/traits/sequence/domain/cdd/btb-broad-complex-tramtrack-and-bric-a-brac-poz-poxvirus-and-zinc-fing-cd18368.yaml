identifier: CDD:cd18368
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 9 (KCTD9). KCTD9 is a BTB/POZ domain-containing protein that contributes to liver injury through NK cell activation during hepatitis B virus-induced acute-on-chronic liver failure. It functions as a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex, which mediates the ubiquitination of target proteins, leading to their degradation by the proteasome. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. The KCTD9 BTB domain forms a pentameric structure."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 9 (KCTD9). KCTD9 is a BTB/POZ domain-containing protein that contributes to liver injury through NK cell activation during hepatitis B virus-induced acute-on-chronic liver failure. It functions as a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex, which mediates the ubiquitination of target proteins, leading to their degradation by the proteasome. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. The KCTD9 BTB domain forms a pentameric structure. — an NCBI CDD conserved domain (cd18368); members share this curated model.
