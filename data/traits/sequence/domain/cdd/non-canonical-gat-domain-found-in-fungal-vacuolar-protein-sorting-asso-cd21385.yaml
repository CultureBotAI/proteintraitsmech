identifier: CDD:cd21385
label: "non-canonical GAT domain found in fungal vacuolar protein sorting-associated protein 27 (Vps27) and similar proteins. Vps27, also called Golgi retention defective protein 11 (GRD11), is a component of the ESCRT-0 complex which is the sorting receptor for ubiquitinated cargo proteins at the multivesicular body (MVB), and recruits ESCRT-I to the MVB outer membrane. It controls exit from the prevacuolar compartment (PVC) in both the forward direction to the vacuole and the return to the Golgi. Members of this family contain a non-canonical GAT (GGA and Tom1) domain consisting of two helices. A canonical GAT domain is a monomeric three-helix bundle that bind to ubiquitin. Vps27, together with another GAT domain-containing protein Hse1, forms a Vps27/Hse1 core complex that consists of two intertwined non-canonical GAT domains, each consisting of two helices from one subunit, and one from the other subunit. The two GAT domains are connected by a two-stranded coiled-coil. The Vps27/Hse1 complex, an intertwined GAT heterodimer, is a scaffold for binding of ubiquitinated cargo proteins and coordinating ubiquitination and deubiquitination reactions that regulate sorting."
definition: >-
  non-canonical GAT domain found in fungal vacuolar protein sorting-associated protein 27 (Vps27) and similar proteins. Vps27, also called Golgi retention defective protein 11 (GRD11), is a component of the ESCRT-0 complex which is the sorting receptor for ubiquitinated cargo proteins at the multivesicular body (MVB), and recruits ESCRT-I to the MVB outer membrane. It controls exit from the prevacuolar compartment (PVC) in both the forward direction to the vacuole and the return to the Golgi. Members of this family contain a non-canonical GAT (GGA and Tom1) domain consisting of two helices. A canonical GAT domain is a monomeric three-helix bundle that bind to ubiquitin. Vps27, together with another GAT domain-containing protein Hse1, forms a Vps27/Hse1 core complex that consists of two intertwined non-canonical GAT domains, each consisting of two helices from one subunit, and one from the other subunit. The two GAT domains are connected by a two-stranded coiled-coil. The Vps27/Hse1 complex, an intertwined GAT heterodimer, is a scaffold for binding of ubiquitinated cargo proteins and coordinating ubiquitination and deubiquitination reactions that regulate sorting. — an NCBI CDD conserved domain (cd21385); members share this curated model.
