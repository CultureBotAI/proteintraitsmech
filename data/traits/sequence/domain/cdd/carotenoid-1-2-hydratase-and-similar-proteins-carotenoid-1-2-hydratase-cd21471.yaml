identifier: CDD:cd21471
label: "carotenoid 1,2-hydratase and similar proteins. Carotenoid 1,2-hydratase (EC 4.2.1.131; CrtC; also known as acyclic carotenoid 1,2-hydratase, 1-hydroxyneurosporene hydratase, hydroxylycopene hydratase, hydroxyneurosporene synthase, lycopene hydratase, or neurosporene hydratase) is an enzyme with the systematic name lycopene hydro-lyase (1-hydroxy-1,2-dihydrolycopene-forming). It is involved in the biosynthesis of carotenoids such as lycopenes. It catalyzes the hydration of neurosporene to the corresponding hydroxylated carotenoids 1-HO-neurosporene and that of lycopene to 1-HO-lycopene. Studies suggest that CrtC may be bound to the membrane through an anchor so that a close distance to the substrate, which is synthesized in the cell membranes, is facilitated."
definition: >-
  carotenoid 1,2-hydratase and similar proteins. Carotenoid 1,2-hydratase (EC 4.2.1.131; CrtC; also known as acyclic carotenoid 1,2-hydratase, 1-hydroxyneurosporene hydratase, hydroxylycopene hydratase, hydroxyneurosporene synthase, lycopene hydratase, or neurosporene hydratase) is an enzyme with the systematic name lycopene hydro-lyase (1-hydroxy-1,2-dihydrolycopene-forming). It is involved in the biosynthesis of carotenoids such as lycopenes. It catalyzes the hydration of neurosporene to the corresponding hydroxylated carotenoids 1-HO-neurosporene and that of lycopene to 1-HO-lycopene. Studies suggest that CrtC may be bound to the membrane through an anchor so that a close distance to the substrate, which is synthesized in the cell membranes, is facilitated. — an NCBI CDD conserved domain (cd21471); members share this curated model.
