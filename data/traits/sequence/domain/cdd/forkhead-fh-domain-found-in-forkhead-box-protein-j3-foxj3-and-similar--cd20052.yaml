identifier: CDD:cd20052
label: FH_FOXJ3
definition: >-
  Forkhead (FH) domain found in Forkhead box protein J3 (FOXJ3) and similar proteins. FOXJ3 is a transcription factor which regulates sperm function. It transcriptionally activates Mef2c and regulates adult skeletal muscle fiber type identity. Polymorphisms in the FOXJ3 gene may be associated with the development of rheumatoid arthritis. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'
