identifier: CDD:cd09444
label: "This domain belongs to the LIM domain family which are found on Mical (molecule interacting with CasL) like proteins. The LIM domain on proteins of unknown function: This domain belongs to the LIM domain family which are found on Mical (molecule interacting with CasL) like proteins. Known members of the Mical-like family includes single LIM domain containing proteins, Mical (molecule interacting with CasL), pollen specific protein SF3, Eplin, xin actin-binding repeat-containing protein 2 (XIRP2), and Ltd-1. The members of this family function mainly at the cytoskeleton and focal adhesions. They interact with transcription factors or other signaling molecules to play roles in muscle development, neuronal differentiation, cell growth, and mobility.  As in other LIM domains, this domain family is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein."
definition: >-
  This domain belongs to the LIM domain family which are found on Mical (molecule interacting with CasL) like proteins. The LIM domain on proteins of unknown function: This domain belongs to the LIM domain family which are found on Mical (molecule interacting with CasL) like proteins. Known members of the Mical-like family includes single LIM domain containing proteins, Mical (molecule interacting with CasL), pollen specific protein SF3, Eplin, xin actin-binding repeat-containing protein 2 (XIRP2), and Ltd-1. The members of this family function mainly at the cytoskeleton and focal adhesions. They interact with transcription factors or other signaling molecules to play roles in muscle development, neuronal differentiation, cell growth, and mobility. As in other LIM domains, this domain family is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein. — an NCBI CDD conserved domain (cd09444); members share this curated model.
