identifier: CDD:cd05601
label: "Catalytic domain of the Serine/Threonine Kinase, Citron Rho-interacting kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. CRIK (also called citron kinase) is an effector of the small GTPase Rho. It plays an important function during cytokinesis and affects its contractile process. CRIK-deficient mice show severe ataxia and epilepsy as a result of abnormal cytokinesis and massive apoptosis in neuronal precursors. A Down syndrome critical region protein TTC3 interacts with CRIK and inhibits CRIK-dependent neuronal differentiation and neurite extension. CRIK contains a catalytic domain, a central coiled-coil domain, and a C-terminal region containing a Rho-binding domain (RBD), a zinc finger, and a pleckstrin homology (PH) domain, in addition to other motifs. The CRIK subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Citron Rho-interacting kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. CRIK (also called citron kinase) is an effector of the small GTPase Rho. It plays an important function during cytokinesis and affects its contractile process. CRIK-deficient mice show severe ataxia and epilepsy as a result of abnormal cytokinesis and massive apoptosis in neuronal precursors. A Down syndrome critical region protein TTC3 interacts with CRIK and inhibits CRIK-dependent neuronal differentiation and neurite extension. CRIK contains a catalytic domain, a central coiled-coil domain, and a C-terminal region containing a Rho-binding domain (RBD), a zinc finger, and a pleckstrin homology (PH) domain, in addition to other motifs. The CRIK subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05601); members share this curated model.
