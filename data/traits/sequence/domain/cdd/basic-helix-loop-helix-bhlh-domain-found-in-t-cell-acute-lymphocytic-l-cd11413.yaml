identifier: CDD:cd11413
label: "basic helix-loop-helix (bHLH) domain found in T-cell acute lymphocytic leukemia protein/ lymphoblastic leukemia-derived sequence (TAL/LYL) family. The TAL/LYL family includes a group of bHLH transcription factors (TAL1, TAL2 and LYL1) implicated in T cell acute leukaemia. They act as mediators of T cell leukaemogenesis. TAL-1, also termed Class A basic helix-loop-helix protein 17 (bHLHa17), or stem cell protein (SCL), or T-cell leukemia/lymphoma protein 5, is a hematopoietic-specific bHLH transcription factor that functions in embryonic and adult hematopoiesis in vertebrates. It is also required for embryonic vascular remodeling.  It acts as a regulator of erythroid differentiation and binds to regulatory regions of a large cohort of erythroid genes as part of a complex with GATA-1, LMO2 and Ldb1. TAL-2, also termed Class A basic helix-loop-helix protein 19 (bHLHa19), is a bHLH transcription factor essential for the normal brain development. Lyl-1, also termed Class A basic helix-loop-helix protein 18 (bHLHa18), or lymphoblastic leukemia-derived sequence 1, is a proto-oncogenic bHLH transcription factor that plays an important role in hematopoietic stem cell function and is required for the late stages of postnatal angiogenesis to limit the formation of new blood vessels, notably by regulating the activity of the small GTPase Rap1. LYL-1 deficiency induces a stress erythropoiesis."
definition: >-
  basic helix-loop-helix (bHLH) domain found in T-cell acute lymphocytic leukemia protein/ lymphoblastic leukemia-derived sequence (TAL/LYL) family. The TAL/LYL family includes a group of bHLH transcription factors (TAL1, TAL2 and LYL1) implicated in T cell acute leukaemia. They act as mediators of T cell leukaemogenesis. TAL-1, also termed Class A basic helix-loop-helix protein 17 (bHLHa17), or stem cell protein (SCL), or T-cell leukemia/lymphoma protein 5, is a hematopoietic-specific bHLH transcription factor that functions in embryonic and adult hematopoiesis in vertebrates. It is also required for embryonic vascular remodeling. It acts as a regulator of erythroid differentiation and binds to regulatory regions of a large cohort of erythroid genes as part of a complex with GATA-1, LMO2 and Ldb1. TAL-2, also termed Class A basic helix-loop-helix protein 19 (bHLHa19), is a bHLH transcription factor essential for the normal brain development. Lyl-1, also termed Class A basic helix-loop-helix protein 18 (bHLHa18), or lymphoblastic leukemia-derived sequence 1, is a proto-oncogenic bHLH transcription factor that plays an important role in hematopoietic stem cell function and is required for the late stages of postnatal angiogenesis to limit the formation of new blood vessels, notably by regulating the activity of the small GTPase Rap1. LYL-1 deficiency induces a stress erythropoiesis. — an NCBI CDD conserved domain (cd11413); members share this curated model.
