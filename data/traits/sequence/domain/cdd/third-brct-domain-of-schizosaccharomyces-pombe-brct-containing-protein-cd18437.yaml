identifier: CDD:cd18437
label: "third BRCT domain of Schizosaccharomyces pombe BRCT-containing protein 1 (BRC1) and similar proteins. Schizosaccharomyces pombe BRC1 is required for mitotic fidelity, specifically in the G2 phase of the cell cycle. It plays a role in chromatin organization. The family also includes Cryptococcus neoformans DNA ligase 4 (LIG4, also known as DNA ligase IV or polydeoxyribonucleotide synthase [ATP] 4), which is involved in dsDNA break repair, and plays a role in non-homologous integration (NHI) pathways where it is required in the final step of non-homologus end-joining. Members in this family contains six BRCT domains. This family corresponds to the third repeat. The Trp-X-X-X-Cys/Ser signature motif of the BRCT family is not conserved in this group; it contains a conserved Trp, but not the Cys/Ser residue."
definition: >-
  third BRCT domain of Schizosaccharomyces pombe BRCT-containing protein 1 (BRC1) and similar proteins. Schizosaccharomyces pombe BRC1 is required for mitotic fidelity, specifically in the G2 phase of the cell cycle. It plays a role in chromatin organization. The family also includes Cryptococcus neoformans DNA ligase 4 (LIG4, also known as DNA ligase IV or polydeoxyribonucleotide synthase [ATP] 4), which is involved in dsDNA break repair, and plays a role in non-homologous integration (NHI) pathways where it is required in the final step of non-homologus end-joining. Members in this family contains six BRCT domains. This family corresponds to the third repeat. The Trp-X-X-X-Cys/Ser signature motif of the BRCT family is not conserved in this group; it contains a conserved Trp, but not the Cys/Ser residue. — an NCBI CDD conserved domain (cd18437); members share this curated model.
