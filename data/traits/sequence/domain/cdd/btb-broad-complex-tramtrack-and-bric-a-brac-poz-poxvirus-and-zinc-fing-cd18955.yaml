identifier: CDD:cd18955
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB and CNC homolog (BACH) proteins. This subfamily includes BACH1 (also called BTB-basic leucine zipper transcription factor 1), BACH2 (also called BTB-basic leucine zipper transcription factor 2), and similar proteins. They belong to the cap 'n' collar (CNC) and basic leucine zipper (bZIP) factor family. BACH1 is a heme-responsive transcriptional repressor of heme oxygenase (HO)-1. It represses genes involved in heme metabolism and oxidative stress response. BACH2 is a lymphoid-specific transcription factor with a prominent role in B-cell development. It is transcriptionally regulated by the BCR/ABL oncogene. It represses the anti-apoptotic factor heme oxygenase-1 (HO-1). Subfamily members contain a BTB domain and a basic leucine zipper (bZIP) domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB and CNC homolog (BACH) proteins. This subfamily includes BACH1 (also called BTB-basic leucine zipper transcription factor 1), BACH2 (also called BTB-basic leucine zipper transcription factor 2), and similar proteins. They belong to the cap 'n' collar (CNC) and basic leucine zipper (bZIP) factor family. BACH1 is a heme-responsive transcriptional repressor of heme oxygenase (HO)-1. It represses genes involved in heme metabolism and oxidative stress response. BACH2 is a lymphoid-specific transcription factor with a prominent role in B-cell development. It is transcriptionally regulated by the BCR/ABL oncogene. It represses the anti-apoptotic factor heme oxygenase-1 (HO-1). Subfamily members contain a BTB domain and a basic leucine zipper (bZIP) domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18955); members share this curated model.
