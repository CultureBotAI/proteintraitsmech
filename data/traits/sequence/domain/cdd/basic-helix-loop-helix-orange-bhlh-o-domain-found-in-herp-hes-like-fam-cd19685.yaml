identifier: CDD:cd19685
label: "basic helix-loop-helix-orange (bHLH-O) domain found in HERP/HES-like family. The HERP/HES-like family includes bHLH-O transcriptional regulators that are related to the Drosophila hairy and Enhancer-of-split (HES) proteins. The HERP (HES-related repressor protein) subfamily proteins contain a basic helix-loop-helix (bHLH) domain with an invariant glycine residue in its basic region, an orange domain in the central region and YXXW sequence motif at its C-terminal region. Hairy and enhancer of split (HES)-related repressor protein (HERP) proteins (HEY1, HEY2 and HEYL) act as downstream effectors of Notch signaling. They are involved in cardiovascular development and have roles in somitogenesis, myogenesis and gliogenesis. Hairy and enhancer of split-related protein HELT is a transcriptional repressor expressed in the developing central nervous system. It binds preferentially to the canonical E box sequence 5'-CACGCG-3' and regulates neuronal differentiation and/or identity. Differentially expressed in chondrocytes proteins, DEC1 and DEC2, are widely expressed in both embryonic and adult tissues and have been implicated in apoptosis, cell proliferation, and circadian rhythms, as well as malignancy in various cancers.  Drosophila melanogaster protein clockwork orange (Cwo) is also included in this subfamily. It is involved in the regulation of Drosophila circadian rhythms. It functions as both an activator and a repressor of clock gene expression. The HES subfamily proteins contain a basic helix-loop-helix (bHLH) domain with an invariant proline residue in its basic region, an orange domain in the central region and a conserved tetrapeptide motif, WRPW, at its C-terminal region. They form heterodimers or homodimers via their HLH domain and bind DNA to repress gene transcription that play an essential role in development of both compartment and boundary cells of the central nervous system."
