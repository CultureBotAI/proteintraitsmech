identifier: CDD:cd02279
label: "Acetylad_DH. This CD includes acetaldehyde dehydrogenase (Acetylald_DH) and other related proteins. Acetaldehyde dehydrogenase has been characterized in a bifunctional enzyme, 4-hydroxy-2-ketovalerate aldolase (DmpG)/ acylating acetaldehyde dehydrogenase (DmpF), involved in the bacterial degradation of toxic aromatic compounds. This bifunctional aldolase-dehydrogenase catalyzes the final two steps of the meta-cleavage pathway for catechol, an intermediate in many bacterial species, in the degradation of phenols, toluates, naphthalene, biphenyls and other aromatic compounds. DmpG and DmpF (from a methylphenol-degrading pseudomonad) convert 4-hydroxy-2-ketovalerate to acetaldehyde, then to pyruvate and acetyl-CoA. The biologically active unit is a tetramer made up of two DmpG/F heterodimers. The Acetylald_DH (DmpF) monomer contains an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and is a member of the GAPDH superfamily of proteins."
definition: >-
  Acetylad_DH. This CD includes acetaldehyde dehydrogenase (Acetylald_DH) and other related proteins. Acetaldehyde dehydrogenase has been characterized in a bifunctional enzyme, 4-hydroxy-2-ketovalerate aldolase (DmpG)/ acylating acetaldehyde dehydrogenase (DmpF), involved in the bacterial degradation of toxic aromatic compounds. This bifunctional aldolase-dehydrogenase catalyzes the final two steps of the meta-cleavage pathway for catechol, an intermediate in many bacterial species, in the degradation of phenols, toluates, naphthalene, biphenyls and other aromatic compounds. DmpG and DmpF (from a methylphenol-degrading pseudomonad) convert 4-hydroxy-2-ketovalerate to acetaldehyde, then to pyruvate and acetyl-CoA. The biologically active unit is a tetramer made up of two DmpG/F heterodimers. The Acetylald_DH (DmpF) monomer contains an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and is a member of the GAPDH superfamily of proteins. — an NCBI CDD conserved domain (cd02279); members share this curated model.
