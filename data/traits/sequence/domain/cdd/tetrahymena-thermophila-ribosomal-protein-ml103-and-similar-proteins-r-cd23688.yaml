identifier: CDD:cd23688
label: mL103
definition: >-
  Tetrahymena thermophila ribosomal protein mL103 and similar proteins. Ribosomal protein mL103 is a component of large subunit (LSU) in Tetrahymena thermophila mitochondrial ribosomes (mitoribosomes). The structure of the mitoribosomal complex reveals an assembly of 94-ribosomal proteins and four-rRNAs with an additional protein mass of ~700 kDa on the small subunit, while the large subunit lacks 5S rRNA
