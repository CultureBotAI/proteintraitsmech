identifier: CDD:cd09493
label: "SAM (Sterile alpha motif ), SASH1-like. SAM (sterile alpha motif) domain of SASH1-like proteins is a protein-protein interaction domain. Members of this subfamily are putative adaptor proteins. They appear to mediate signal transduction. Proteins of this subfamily are known to be involved in preventing DN thymocytes from premature initiation of programmed cell death and in B cells activation and differentiation. They have been found downregulated in some breast tumors, liver metastases and colon cancers if compare to corresponding normal tissues."
definition: >-
  SAM (Sterile alpha motif ), SASH1-like. SAM (sterile alpha motif) domain of SASH1-like proteins is a protein-protein interaction domain. Members of this subfamily are putative adaptor proteins. They appear to mediate signal transduction. Proteins of this subfamily are known to be involved in preventing DN thymocytes from premature initiation of programmed cell death and in B cells activation and differentiation. They have been found downregulated in some breast tumors, liver metastases and colon cancers if compare to corresponding normal tissues. — an NCBI CDD conserved domain (cd09493); members share this curated model.
