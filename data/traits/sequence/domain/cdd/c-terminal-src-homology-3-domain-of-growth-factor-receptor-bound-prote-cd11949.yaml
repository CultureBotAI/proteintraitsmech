identifier: CDD:cd11949
label: "C-terminal Src homology 3 domain of Growth factor receptor-bound protein 2. GRB2 is a critical signaling molecule that regulates the Ras pathway by linking tyrosine kinases to the Ras guanine nucleotide releasing protein Sos (son of sevenless), which converts Ras to the active GTP-bound state. It is ubiquitously expressed in all tissues throughout development and is important in cell cycle progression, motility, morphogenesis, and angiogenesis. In lymphocytes, GRB2 is associated with antigen receptor signaling components. GRB2 contains an N-terminal SH3 domain, a central SH2 domain, and a C-terminal SH3 domain. The C-terminal SH3 domain of GRB2 binds to Gab2 (Grb2-associated binder 2) through epitopes containing RxxK motifs, as well as to the proline-rich C-terminus of FGRF2. SH3 domains are protein interaction domains that typically bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  C-terminal Src homology 3 domain of Growth factor receptor-bound protein 2. GRB2 is a critical signaling molecule that regulates the Ras pathway by linking tyrosine kinases to the Ras guanine nucleotide releasing protein Sos (son of sevenless), which converts Ras to the active GTP-bound state. It is ubiquitously expressed in all tissues throughout development and is important in cell cycle progression, motility, morphogenesis, and angiogenesis. In lymphocytes, GRB2 is associated with antigen receptor signaling components. GRB2 contains an N-terminal SH3 domain, a central SH2 domain, and a C-terminal SH3 domain. The C-terminal SH3 domain of GRB2 binds to Gab2 (Grb2-associated binder 2) through epitopes containing RxxK motifs, as well as to the proline-rich C-terminus of FGRF2. SH3 domains are protein interaction domains that typically bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11949); members share this curated model.
