identifier: CDD:cd16178
label: "EF-hand, calcium binding motif, found in secretagogin (SCGN). SCGN is a six EF-hand calcium-binding protein expressed in neuroendocrine, pancreatic endocrine and retinal cells. It plays a crucial role in cell apoptosis, receptor signaling and differentiation. It is also involved in vesicle secretion through binding to various proteins, including interacts with SNAP25, SNAP23, DOC2alpha, ARFGAP2, rootletin, KIF5B, beta-tubulin, DDAH-2, ATP-synthase and myeloid leukemia factor 2. SCGN functions as a calcium sensor/coincidence detector modulating vesicular exocytosis of neurotransmitters, neuropeptides or hormones. It also serves as a calcium buffer in neurons. Thus, SCGN may be linked to the pathogenesis of neurological diseases such as Alzheimer's, and also acts as a serum marker of neuronal damage, or as a tumor biomarker. SCGN consists of the three globular domains each of which contains a pair of EF-hand motifs. All six EF hand motifs of SCGN in some eukaryotes, including D. rerio, X. laevis, M. domestica, G. gallus, O. anatinus, could potentially bind six calcium ions. In contrast, SCGNs from higher eukaryotes have at least one non-functional EF-hand motif due to the mutation(s) or deletions. For instance, the EF1 loop does not coordinate calcium ion due to the key residue asparagine replaced by lysine in SCGNs of many mammalian species. Moreover, the EF2 loop seems to be competent for calcium-binding in most mammalian SCGNs except for human and chimpanzee orthologs."
definition: >-
  EF-hand, calcium binding motif, found in secretagogin (SCGN). SCGN is a six EF-hand calcium-binding protein expressed in neuroendocrine, pancreatic endocrine and retinal cells. It plays a crucial role in cell apoptosis, receptor signaling and differentiation. It is also involved in vesicle secretion through binding to various proteins, including interacts with SNAP25, SNAP23, DOC2alpha, ARFGAP2, rootletin, KIF5B, beta-tubulin, DDAH-2, ATP-synthase and myeloid leukemia factor 2. SCGN functions as a calcium sensor/coincidence detector modulating vesicular exocytosis of neurotransmitters, neuropeptides or hormones. It also serves as a calcium buffer in neurons. Thus, SCGN may be linked to the pathogenesis of neurological diseases such as Alzheimer's, and also acts as a serum marker of neuronal damage, or as a tumor biomarker. SCGN consists of the three globular domains each of which contains a pair of EF-hand motifs. All six EF hand motifs of SCGN in some eukaryotes, including D. rerio, X. laevis, M. domestica, G. gallus, O. anatinus, could potentially bind six calcium ions. In contrast, SCGNs from higher eukaryotes have at least one non-functional EF-hand motif due to the mutation(s) or deletions. For instance, the EF1 loop does not coordinate calcium ion due to the key residue asparagine replaced by lysine in SCGNs of many mammalian species. Moreover, the EF2 loop seems to be competent for calcium-binding in most mammalian SCGNs except for human and chimpanzee orthologs. — an NCBI CDD conserved domain (cd16178); members share this curated model.
