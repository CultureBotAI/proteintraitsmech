identifier: CDD:cd11629
label: "Protein kinase C-related kinase homology region 1 (HR1) Rho-binding domain of Formin Binding Protein 17. FBP17, also called FormiN Binding Protein 1 (FNBP1), is involved in dynamin-mediated endocytosis. It is recruited to clathrin-coated pits late in the endocytosis process and may play a role in the invagination and scission steps. FBP17 binds in vivo to tankyrase, a protein involved in telomere maintenance and mitogen activated protein kinase (MAPK) signaling. It also binds to the Fas ligand and may be implicated in the inflammatory response. FBP17 contains an N-terminal F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain, central HR1 domain, and a C-terminal SH3 domain. HR1 domains are anti-parallel coiled-coil (ACC) domains that bind small GTPases from the Rho family; the HR1 domain of the related protein, CIP4, binds Cdc42 and TC10. Translocation of CIP4 is facilitated by its binding to TC10 at the plasma membrane."
definition: >-
  Protein kinase C-related kinase homology region 1 (HR1) Rho-binding domain of Formin Binding Protein 17. FBP17, also called FormiN Binding Protein 1 (FNBP1), is involved in dynamin-mediated endocytosis. It is recruited to clathrin-coated pits late in the endocytosis process and may play a role in the invagination and scission steps. FBP17 binds in vivo to tankyrase, a protein involved in telomere maintenance and mitogen activated protein kinase (MAPK) signaling. It also binds to the Fas ligand and may be implicated in the inflammatory response. FBP17 contains an N-terminal F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain, central HR1 domain, and a C-terminal SH3 domain. HR1 domains are anti-parallel coiled-coil (ACC) domains that bind small GTPases from the Rho family; the HR1 domain of the related protein, CIP4, binds Cdc42 and TC10. Translocation of CIP4 is facilitated by its binding to TC10 at the plasma membrane. — an NCBI CDD conserved domain (cd11629); members share this curated model.
