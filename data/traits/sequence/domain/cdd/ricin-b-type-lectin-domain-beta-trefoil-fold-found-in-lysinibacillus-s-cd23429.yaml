identifier: CDD:cd23429
label: beta-trefoil_Ricin_BinAB
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Lysinibacillus sphaericus BinA, BinB, and similar proteins. This subfamily includes Lysinibacillus sphaericus binary larvicide subunit BinA (also called 41.9 kDa insecticidal toxin, or larvicidal toxin protein P42) and subunit BinB (including 51.4 kDa insecticidal toxin and 63 kDa toxin crystal protein). They are components of a binary toxin active against Culex and some Aedes mosquito larvae. The individual subunits are not toxic. BinA forms a heterodimer with BinB. BinAB binds to the gastric caecum and posterior midgut of C. quinquefasciatus larvae. Binary toxin internalization into host gut cells requires both proteins. Both BinA and BinB have an N-terminal ricin B-type lectin domain and a C-terminal pore-forming domain. The ricin B-type lectin domain shows a beta-trefoil fold that has barrel and cap subdomains. The cap has 3 carbohydrate-binding modules while the barrel is involved in host cell receptor binding. At neutral pH, the carbohydrate-binding modules are accessible on the toxin surface, but the barrel subdomain is not
