identifier: CDD:cd23328
label: "FGF domain, beta-trefoil fold, found in fibroblast growth factor 12 (FGF12) and similar proteins. FGF12, also called fibroblast growth factor homologous factor 1 (FHF1), or myocyte-activating factor, is involved in nervous system development and function. It plays a role in the positive regulation of voltage-gated sodium channel activity. It promotes neuronal excitability by elevating the voltage dependence of neuronal sodium channel SCN8A fast inactivation. FGF12 interacts with the C-terminal region of SCN9A. FGF12 contains a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  FGF domain, beta-trefoil fold, found in fibroblast growth factor 12 (FGF12) and similar proteins. FGF12, also called fibroblast growth factor homologous factor 1 (FHF1), or myocyte-activating factor, is involved in nervous system development and function. It plays a role in the positive regulation of voltage-gated sodium channel activity. It promotes neuronal excitability by elevating the voltage dependence of neuronal sodium channel SCN8A fast inactivation. FGF12 interacts with the C-terminal region of SCN9A. FGF12 contains a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23328); members share this curated model.
