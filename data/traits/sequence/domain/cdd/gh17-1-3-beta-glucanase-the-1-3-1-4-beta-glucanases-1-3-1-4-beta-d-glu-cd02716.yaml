identifier: CDD:cd02716
label: GH17_1_3_beta_glucanase
definition: >-
  GH17_1_3_beta_glucanase. The 1-3, 1-4-beta-glucanases (1,3-1,4-beta-D-glucan 4-glucanohydrolases) from plants such as barley degrade mixed linked beta-glucan in the cell wall of the starchy grain endosperm. 1,3-1,4-beta-Glucanases also occur in bacteria which have a similar specificity for beta-1,4 glycosyl bonds of O-3-substituted glucose units in linear polysaccharides and a similar catalytic mechanism but are unrelated to the plant glucanses in sequence and tertiary structure. The plant glucanases belong to glycosyl hydrolase family 17 (GH17) and are included here, while the bacterial glucanases belong to glycosyl hydrolase family 16 (GH16)
