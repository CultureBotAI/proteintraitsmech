identifier: CDD:cd08096
label: ATP-G_RimK-CofE-like
definition: >-
  ATP-grasp domain of ribosomal S6 modification enzyme. The ATP-grasp domain is found in the ribosomal S6 modification enzyme RimK. RimK is an alpha-L-glutamate ligase which is responsible for the addition of glutamate residues to the C-terminus of ribosomal protein S6 during the post-translational modification. RimK-like proteins display ATP-dependent carboxylate-amine ligase activity, where acylphosphate intermediates are involved in the catalytic mechanism. Escherichia coli RimK is homologous to T. thermophilus LysX. CofE and CofF proteins (a gamma-F420-2:alpha-L-glutamate ligase) from Methanococcus jannaschii belong to this group
