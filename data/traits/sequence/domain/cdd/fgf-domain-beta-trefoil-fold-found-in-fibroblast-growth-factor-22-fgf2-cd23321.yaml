identifier: CDD:cd23321
label: "FGF domain, beta-trefoil fold, found in fibroblast growth factor 22 (FGF22) and similar proteins. FGF22 plays a role in the fasting response, glucose homeostasis, lipolysis, and lipogenesis. It can stimulate cell proliferation (in vitro). It may be involved in hair development. FGF22 interacts with fibroblast growth factor receptors, FGFR1 and FGFR2, as well as fibroblast growth factor-binding protein 1 (FGFBP1). FGF22 contains a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  FGF domain, beta-trefoil fold, found in fibroblast growth factor 22 (FGF22) and similar proteins. FGF22 plays a role in the fasting response, glucose homeostasis, lipolysis, and lipogenesis. It can stimulate cell proliferation (in vitro). It may be involved in hair development. FGF22 interacts with fibroblast growth factor receptors, FGFR1 and FGFR2, as well as fibroblast growth factor-binding protein 1 (FGFBP1). FGF22 contains a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23321); members share this curated model.
