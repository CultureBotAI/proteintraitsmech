label: "EVE domains are putative RNA-binding domains that belong to the PUA superfamily. The EVE domain, formerly known as DUF55, has been revealed via structural similarity to be part of the PUA superfamily. It is most similar in three-dimensional fold to the YTH (YT521-B homology) domain, and is thought to be involved in RNA-binding."
definition: >-
  EVE domains are putative RNA-binding domains that belong to the PUA superfamily. The EVE domain, formerly known as DUF55, has been revealed via structural similarity to be part of the PUA superfamily. It is most similar in three-dimensional fold to the YTH (YT521-B homology) domain, and is thought to be involved in RNA-binding. — an NCBI CDD conserved domain (cd21133); members share this curated model.
