label: FlaRed_like_euk
definition: >-
  Flavin reductase-like protein family. It belongs to a flavin reductase superfamily which is part of a two-component enzyem system. The smaller component is a flavin reductase which reduces FMN or FAD using NAD(P)H as electron donor. The larger component enzyme then uses the reduced flavin to hydroxylate the substrates. This family mainly presents in eukaryote
