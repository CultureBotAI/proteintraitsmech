identifier: CDD:cd18260
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 31 (KLHL31). KLHL31 is also called BTB and kelch domain-containing protein 6 (BKLHD6), Kelch repeat and BTB domain-containing protein 1 (KBTBD1), or Kelch-like protein KLHL. It is a transcriptional repressor in the MAPK/JNK signaling pathway to regulate cellular functions. Overexpression inhibits the transcriptional activities of both the TPA-response element (TRE) and serum response element (SRE). It is also a novel modulator of canonical Wnt signaling, which is important for vertebrate myogenesis. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. Its function remains unclear. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 31 (KLHL31). KLHL31 is also called BTB and kelch domain-containing protein 6 (BKLHD6), Kelch repeat and BTB domain-containing protein 1 (KBTBD1), or Kelch-like protein KLHL. It is a transcriptional repressor in the MAPK/JNK signaling pathway to regulate cellular functions. Overexpression inhibits the transcriptional activities of both the TPA-response element (TRE) and serum response element (SRE). It is also a novel modulator of canonical Wnt signaling, which is important for vertebrate myogenesis. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. Its function remains unclear. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18260); members share this curated model.
