identifier: CDD:cd17372
label: "Synaptic vesicle 2-related protein (SVOP) and related proteins of the Major Facilitator Superfamily. This subfamily is composed of synaptic vesicle 2 (SV2)-related protein (SVOP), SVOP-like protein (SVOPL), and similar proteins. SVOP is a transporter-like nucleotide binding protein that localizes to neurotransmitter-containing vesicles. Like SV2, SVOP is expressed in all brain regions, with highest levels in cerebellum, hindbrain and pineal gland. Studies with knockout mice suggets that SVOP may perform a subtle function that is not necessary for survival under normal conditions, since mice lacking SVOP are viable, fertile, and phenotypically normal. SVOP and SVOPL share structural similarity to the solute carrier family 22 (SLC22), a large family of organic cation and anion transporters. The SVOP-like subfamily belongs to the Metazoan Synaptic Vesicle Glycoprotein 2 (SV2) and related small molecule transporter family (SV2-like) of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Synaptic vesicle 2-related protein (SVOP) and related proteins of the Major Facilitator Superfamily. This subfamily is composed of synaptic vesicle 2 (SV2)-related protein (SVOP), SVOP-like protein (SVOPL), and similar proteins. SVOP is a transporter-like nucleotide binding protein that localizes to neurotransmitter-containing vesicles. Like SV2, SVOP is expressed in all brain regions, with highest levels in cerebellum, hindbrain and pineal gland. Studies with knockout mice suggets that SVOP may perform a subtle function that is not necessary for survival under normal conditions, since mice lacking SVOP are viable, fertile, and phenotypically normal. SVOP and SVOPL share structural similarity to the solute carrier family 22 (SLC22), a large family of organic cation and anion transporters. The SVOP-like subfamily belongs to the Metazoan Synaptic Vesicle Glycoprotein 2 (SV2) and related small molecule transporter family (SV2-like) of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17372); members share this curated model.
