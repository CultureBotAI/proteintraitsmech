identifier: CDD:cd21778
label: "Mob-binding domain found in large tumor suppressor homolog 1 (LATS1) and similar proteins. LATS1, also called WARTS protein kinase, is a serine/threonine-protein kinase that functions as a tumor suppressor and is implicated in cell cycle regulation. Inactivation of LATS1 in mice results in the development of various tumors, including sarcomas and ovarian cancer. Promoter methylation, loss of heterozygosity, and missense mutations targeting the LATS1 gene have also been found in human sarcomas and ovarian cancers. In addition, decreased expression of LATS1 is associated with an aggressive phenotype and poor prognosis. LATS1 induces G2 arrest and promotes cytokinesis. It may be a component of the mitotic exit network in higher eukaryotes. LATS1 belongs to the NDR/LATS family of kinases that bind to highly conserved Mob (Mps One binder) coactivators, forming regulatory complexes that control a diverse set of in vivo effector proteins, and are essential and evolutionarily conserved components of \"Hippo\" signaling pathways. Mob association creates a novel binding pocket that participates in the formation of the active state of NDR/LATS kinases. LATS proteins contain a regulatory domain located N-terminal to the serine/threonine kinase domain (called the N-terminal regulatory (NTR) domain) and an insert within the catalytic domain that contains an auto-inhibitory sequence. This model corresponds to the NTR or Mob-binding domain of LATS1 serine/threonine protein kinase and similar proteins."
definition: >-
  Mob-binding domain found in large tumor suppressor homolog 1 (LATS1) and similar proteins. LATS1, also called WARTS protein kinase, is a serine/threonine-protein kinase that functions as a tumor suppressor and is implicated in cell cycle regulation. Inactivation of LATS1 in mice results in the development of various tumors, including sarcomas and ovarian cancer. Promoter methylation, loss of heterozygosity, and missense mutations targeting the LATS1 gene have also been found in human sarcomas and ovarian cancers. In addition, decreased expression of LATS1 is associated with an aggressive phenotype and poor prognosis. LATS1 induces G2 arrest and promotes cytokinesis. It may be a component of the mitotic exit network in higher eukaryotes. LATS1 belongs to the NDR/LATS family of kinases that bind to highly conserved Mob (Mps One binder) coactivators, forming regulatory complexes that control a diverse set of in vivo effector proteins, and are essential and evolutionarily conserved components of "Hippo" signaling pathways. Mob association creates a novel binding pocket that participates in the formation of the active state of NDR/LATS kinases. LATS proteins contain a regulatory domain located N-terminal to the serine/threonine kinase domain (called the N-terminal regulatory (NTR) domain) and an insert within the catalytic domain that contains an auto-inhibitory sequence. This model corresponds to the NTR or Mob-binding domain of LATS1 serine/threonine protein kinase and similar proteins. — an NCBI CDD conserved domain (cd21778); members share this curated model.
