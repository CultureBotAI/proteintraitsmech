identifier: CDD:cd23830
label: DRWD-N_Mcm21
definition: >-
  N-terminal double-RWD domain of minichromosome maintenance protein 21 (MCM21) and related proteins. MCM21, also called inner kinetochore subunit MCM21, CENP-O homolog, chromosome transmission fidelity protein 5 (CTF5), or constitutive centromere-associated network protein MCM21, is a component of the kinetochore, a multiprotein complex that assembles on centromeric DNA and attaches chromosomes to spindle microtubules, mediating chromosome segregation and sister chromatid segregation during meiosis and mitosis. MCM21 contains two RWD domains, also known as a double-RWD domain, DRWD, which is involved in interactions with other kinetochore proteins. The model corresponds to the N-terminal double-RWD domain (DRWD-N)
