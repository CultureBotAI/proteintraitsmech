identifier: CDD:cd09287
label: "catalytic core domain of non-discriminating glutamyl-tRNA synthetase. Non-discriminating Glutamyl-tRNA synthetase (GluRS) cataytic core domain. These enzymes attach Glu to the appropriate tRNA. Like other class I tRNA synthetases, they aminoacylate the 2'-OH of the nucleotide at the 3' end of the tRNA. The core domain is based on the Rossman fold and is responsible for the ATP-dependent formation of the enzyme bound aminoacyl-adenylate. It contains the characteristic class I HIGH and KMSKS motifs, which are involved in ATP binding. These enzymes function as monomers. Archaea and most bacteria lack GlnRS. In these organisms, the \"non-discriminating\" form of GluRS aminoacylates both tRNA(Glu) and tRNA(Gln) with Glu, which is converted to Gln when appropriate by a transamidation enzyme."
definition: >-
  catalytic core domain of non-discriminating glutamyl-tRNA synthetase. Non-discriminating Glutamyl-tRNA synthetase (GluRS) cataytic core domain. These enzymes attach Glu to the appropriate tRNA. Like other class I tRNA synthetases, they aminoacylate the 2'-OH of the nucleotide at the 3' end of the tRNA. The core domain is based on the Rossman fold and is responsible for the ATP-dependent formation of the enzyme bound aminoacyl-adenylate. It contains the characteristic class I HIGH and KMSKS motifs, which are involved in ATP binding. These enzymes function as monomers. Archaea and most bacteria lack GlnRS. In these organisms, the "non-discriminating" form of GluRS aminoacylates both tRNA(Glu) and tRNA(Gln) with Glu, which is converted to Gln when appropriate by a transamidation enzyme. — an NCBI CDD conserved domain (cd09287); members share this curated model.
