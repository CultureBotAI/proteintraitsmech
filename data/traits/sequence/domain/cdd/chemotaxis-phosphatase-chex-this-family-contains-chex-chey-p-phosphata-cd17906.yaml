identifier: CDD:cd17906
label: "chemotaxis phosphatase CheX. This family contains CheX CheY-P phosphatase which is very closely related to CheC chemotaxis phosphatase; both dephosphorylate CheY, although CheC requires binding of CheD to achieve the level of activity of CheX. CheX has been shown to be the most powerful CheY-P phosphatase of the CheC-FliY-CheX (CXY) family. Structural and functional data of CheX and its CheY3 substrate in Borrelia burgdorferi (the causative agent of Lyme disease) bound to the phosphoryl analog BeF3(-) and Mg2+ reveal a unique mode of binding, but a catalytic mechanism which is virtually identical to that used by the structurally unrelated CheZ, providing a striking example of convergent evolution. Thus, CheX is quite divergent from the rest of the CXY family; it forms a dimer and some may function outside chemotaxis. The data also suggest a possible CheX regulatory mechanism through dissociation of the CheX homodimer."
definition: >-
  chemotaxis phosphatase CheX. This family contains CheX CheY-P phosphatase which is very closely related to CheC chemotaxis phosphatase; both dephosphorylate CheY, although CheC requires binding of CheD to achieve the level of activity of CheX. CheX has been shown to be the most powerful CheY-P phosphatase of the CheC-FliY-CheX (CXY) family. Structural and functional data of CheX and its CheY3 substrate in Borrelia burgdorferi (the causative agent of Lyme disease) bound to the phosphoryl analog BeF3(-) and Mg2+ reveal a unique mode of binding, but a catalytic mechanism which is virtually identical to that used by the structurally unrelated CheZ, providing a striking example of convergent evolution. Thus, CheX is quite divergent from the rest of the CXY family; it forms a dimer and some may function outside chemotaxis. The data also suggest a possible CheX regulatory mechanism through dissociation of the CheX homodimer. — an NCBI CDD conserved domain (cd17906); members share this curated model.
