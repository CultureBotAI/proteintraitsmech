identifier: CDD:cd10604
label: "Pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily: Eukaryotic gamma-aminobutyrate aminotransferase family. Eukaryotic gamma-aminobutyrate aminotransferase family (GABA-AT). GABA-AT is a pyridoxal 5'-phosphate (PLP)-dependent enzyme that catalyzes the conversion of the inhibitory neurotransmitter gamma-aminobutyric acid and alpha-ketoglutarate to succinic semialdehyde and the excitatory neurotransmitter L-glutamic acid. The enzyme is a target for antiepileptic drugs because its selective inhibition raises GABA concentrations in brain."
definition: >-
  Pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily: Eukaryotic gamma-aminobutyrate aminotransferase family. Eukaryotic gamma-aminobutyrate aminotransferase family (GABA-AT). GABA-AT is a pyridoxal 5'-phosphate (PLP)-dependent enzyme that catalyzes the conversion of the inhibitory neurotransmitter gamma-aminobutyric acid and alpha-ketoglutarate to succinic semialdehyde and the excitatory neurotransmitter L-glutamic acid. The enzyme is a target for antiepileptic drugs because its selective inhibition raises GABA concentrations in brain. — an NCBI CDD conserved domain (cd10604); members share this curated model.
