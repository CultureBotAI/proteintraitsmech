identifier: CDD:cd08718
label: "Regulator of G protein signaling (RGS) domain found in the RZ protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RZ subfamily of the RGS protein family.  They are a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins play critical regulatory roles as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha-subunits. Deactivation of G-protein signaling is controlled by RGS domains, which accelerate GTPase activity of the alpha subunit by hydrolysis of GTP to GDP, which results in reassociation of the alpha-subunit with the beta-gamma-dimer and inhibition of downstream activity. As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. The RZ subfamily of RGS proteins includes RGS17, RGS19 (former GAIP), RGS20, and its splice variant Ret-RGS."
definition: >-
  Regulator of G protein signaling (RGS) domain found in the RZ protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RZ subfamily of the RGS protein family. They are a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins play critical regulatory roles as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha-subunits. Deactivation of G-protein signaling is controlled by RGS domains, which accelerate GTPase activity of the alpha subunit by hydrolysis of GTP to GDP, which results in reassociation of the alpha-subunit with the beta-gamma-dimer and inhibition of downstream activity. As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. The RZ subfamily of RGS proteins includes RGS17, RGS19 (former GAIP), RGS20, and its splice variant Ret-RGS. — an NCBI CDD conserved domain (cd08718); members share this curated model.
