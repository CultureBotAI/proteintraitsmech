identifier: CDD:cd23113
label: "RING finger, H2 subclass, found in Arabidopsis thaliana MED25-binding RING-H2 protein (MBR) and similar proteins. This subfamily includes MBR1 and MBR2 (also called HAL3-interacting protein 1 or AtHIP1). They are E3 ubiquitin-protein ligases that function as regulators of MED25 stability by targeting MED25 for degradation in a RING-H2-dependent manner. Proteasome-dependent degradation of MED25 seems to activate its function as a positive regulator of FLOWERING LOCUS T (FT) and is important to induce the expression of FT, and consequently to promote flowering. MBR2 may also function downstream of HAL3 and be required for HAL3-regulated plant growth. Activation of MBR2 by HAL3 may lead to the degradation of cell cycle suppressors, resulting in enhancement of cell division and plant growth. Both MBR1 and MBR2 contain a C3H2C3-type RING-H2 finger."
definition: >-
  RING finger, H2 subclass, found in Arabidopsis thaliana MED25-binding RING-H2 protein (MBR) and similar proteins. This subfamily includes MBR1 and MBR2 (also called HAL3-interacting protein 1 or AtHIP1). They are E3 ubiquitin-protein ligases that function as regulators of MED25 stability by targeting MED25 for degradation in a RING-H2-dependent manner. Proteasome-dependent degradation of MED25 seems to activate its function as a positive regulator of FLOWERING LOCUS T (FT) and is important to induce the expression of FT, and consequently to promote flowering. MBR2 may also function downstream of HAL3 and be required for HAL3-regulated plant growth. Activation of MBR2 by HAL3 may lead to the degradation of cell cycle suppressors, resulting in enhancement of cell division and plant growth. Both MBR1 and MBR2 contain a C3H2C3-type RING-H2 finger. — an NCBI CDD conserved domain (cd23113); members share this curated model.
