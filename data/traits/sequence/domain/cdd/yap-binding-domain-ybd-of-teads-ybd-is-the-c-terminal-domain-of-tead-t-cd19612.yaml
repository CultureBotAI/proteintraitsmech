identifier: CDD:cd19612
label: "YAP-binding domain (YBD) of TEADs. YBD is the C-terminal domain of TEAD/TEF family transcription factors which get partner with Yki/YAP (Yes-associated protein) to regulate Hippo pathway-responsive genes. The Hippo signaling pathway controls cell growth, proliferation, and apoptosis by regulating the expression of target genes that execute these processes. All TEAD proteins contain an N-terminal DNA-binding TEA domain and a C-terminal YBD but lack an activation domain which through interaction with YAP form functional heterodimeric transcription factors that activate proliferative gene expression programs."
definition: >-
  YAP-binding domain (YBD) of TEADs. YBD is the C-terminal domain of TEAD/TEF family transcription factors which get partner with Yki/YAP (Yes-associated protein) to regulate Hippo pathway-responsive genes. The Hippo signaling pathway controls cell growth, proliferation, and apoptosis by regulating the expression of target genes that execute these processes. All TEAD proteins contain an N-terminal DNA-binding TEA domain and a C-terminal YBD but lack an activation domain which through interaction with YAP form functional heterodimeric transcription factors that activate proliferative gene expression programs. — an NCBI CDD conserved domain (cd19612); members share this curated model.
