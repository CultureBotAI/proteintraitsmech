identifier: CDD:cd10815
label: "N-terminal catalytic domain of Escherichia coli alpha-mannosidase MngB and its bacterial homologs; glycoside hydrolase family 38 (GH38). The bacterial subfamily is represented by Escherichia coli alpha-mannosidase MngB, which is encoded by the mngB gene (previously called ybgG). MngB exhibits alpha-mannosidase activity that converts 2-O-(6-phospho-alpha-mannosyl)-D-glycerate to mannose-6-phosphate and glycerate in the pathway which enables use of mannosyl-D-glycerate as a sole carbon source. A divalent metal ion is required for its activity."
definition: >-
  N-terminal catalytic domain of Escherichia coli alpha-mannosidase MngB and its bacterial homologs; glycoside hydrolase family 38 (GH38). The bacterial subfamily is represented by Escherichia coli alpha-mannosidase MngB, which is encoded by the mngB gene (previously called ybgG). MngB exhibits alpha-mannosidase activity that converts 2-O-(6-phospho-alpha-mannosyl)-D-glycerate to mannose-6-phosphate and glycerate in the pathway which enables use of mannosyl-D-glycerate as a sole carbon source. A divalent metal ion is required for its activity. — an NCBI CDD conserved domain (cd10815); members share this curated model.
