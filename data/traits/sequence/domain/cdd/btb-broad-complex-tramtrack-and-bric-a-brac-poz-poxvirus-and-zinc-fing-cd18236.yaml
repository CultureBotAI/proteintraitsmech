identifier: CDD:cd18236
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 6 (KLHL6). KLHL6 is a BTB-kelch protein with a lymphoid tissue-restricted expression pattern. It is involved in B-lymphocyte antigen receptor signaling and germinal center formation. It belongs to the KLHL gene family, which is composed of an N-terminal BTB-POZ domain and four to six Kelch motifs in tandem. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 6 (KLHL6). KLHL6 is a BTB-kelch protein with a lymphoid tissue-restricted expression pattern. It is involved in B-lymphocyte antigen receptor signaling and germinal center formation. It belongs to the KLHL gene family, which is composed of an N-terminal BTB-POZ domain and four to six Kelch motifs in tandem. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18236); members share this curated model.
