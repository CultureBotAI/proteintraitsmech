identifier: CDD:cd23445
label: "ricin B-type lectin domain, beta-trefoil fold, found in Clostridium botulinum hemagglutinating proteins, HA17 and HA33, and similar proteins. The subfamily includes Clostridium botulinum hemagglutinating proteins HA17 and HA33, Lysinibacillus sphaericus mosquitocidal toxin (MTX) and Pieris brassicae pierisin. The hemagglutinin (HA) component of the progenitor toxin protects the structural integrity of the neurotoxin. It may increase internalization of the neurotoxin into the bloodstream of the host. The hemagglutinin complex, composed of HA-70 (also known as HA3), HA-33 (also known as HA1) and HA-17 (also known as HA2), agglutinates erythrocytes, whereas the individual components do not. HA-33 is involved in recognition of cell-surface carbohydrates. HA-17 and HA-70 are involved in paracellular barrier disruption by E-cadherin binding. MTX acts as an ADP-ribosyl transferase. Pierisin, also called NAD--DNA ADP-ribosyltransferase, pierisin-2, or pierisin-B, catalyzes the ADP ribosylation of double-stranded DNA by targeting the N2 amino group of dG residues. It induces apoptosis in a range of human cell lines. Members of this subfamily contain at least one ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Clostridium botulinum hemagglutinating proteins, HA17 and HA33, and similar proteins. The subfamily includes Clostridium botulinum hemagglutinating proteins HA17 and HA33, Lysinibacillus sphaericus mosquitocidal toxin (MTX) and Pieris brassicae pierisin. The hemagglutinin (HA) component of the progenitor toxin protects the structural integrity of the neurotoxin. It may increase internalization of the neurotoxin into the bloodstream of the host. The hemagglutinin complex, composed of HA-70 (also known as HA3), HA-33 (also known as HA1) and HA-17 (also known as HA2), agglutinates erythrocytes, whereas the individual components do not. HA-33 is involved in recognition of cell-surface carbohydrates. HA-17 and HA-70 are involved in paracellular barrier disruption by E-cadherin binding. MTX acts as an ADP-ribosyl transferase. Pierisin, also called NAD--DNA ADP-ribosyltransferase, pierisin-2, or pierisin-B, catalyzes the ADP ribosylation of double-stranded DNA by targeting the N2 amino group of dG residues. It induces apoptosis in a range of human cell lines. Members of this subfamily contain at least one ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23445); members share this curated model.
