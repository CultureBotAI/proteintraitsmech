identifier: CDD:cd07983
label: "Lysophospholipid Acyltransferases (LPLATs) of Glycerophospholipid Biosynthesis: DUF374. Lysophospholipid acyltransferase (LPLAT) superfamily member: acyltransferases of de novo and remodeling pathways of glycerophospholipid biosynthesis which catalyze the incorporation of an acyl group from either acylCoAs or acyl-acyl carrier proteins (acylACPs) into acceptors such as glycerol 3-phosphate, dihydroxyacetone phosphate or lyso-phosphatidic acid. Included in this subgroup are the uncharacterized DUF374 phospholipid/glycerol acyltransferases and similar proteins."
definition: >-
