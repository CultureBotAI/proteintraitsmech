identifier: CDD:cd21789
label: "Middle HEAT-repeat binding domain found in Schizosaccharomyces pombe meiotic recombination protein Rec8 (SpRec8p) and similar proteins. SpRec8p, also called cohesin rec8, is involved primarily in the early steps of meiotic recombination. It is required to ensure reductional chromosome segregation. This model corresponds to a small region in the middle of SpRec8p that shows high sequence similarity with the HEAT-repeat binding domain of Saccharomyces cerevisiae sister chromatid cohesion protein 1 (ScScc1p) and Homo sapiens nuclear matrix protein 1 (NXP-1), which consists of short helices and two long extended segments."
definition: >-
  Middle HEAT-repeat binding domain found in Schizosaccharomyces pombe meiotic recombination protein Rec8 (SpRec8p) and similar proteins. SpRec8p, also called cohesin rec8, is involved primarily in the early steps of meiotic recombination. It is required to ensure reductional chromosome segregation. This model corresponds to a small region in the middle of SpRec8p that shows high sequence similarity with the HEAT-repeat binding domain of Saccharomyces cerevisiae sister chromatid cohesion protein 1 (ScScc1p) and Homo sapiens nuclear matrix protein 1 (NXP-1), which consists of short helices and two long extended segments. — an NCBI CDD conserved domain (cd21789); members share this curated model.
