identifier: CDD:cd07536
label: "Aminophospholipid translocases (APLTs), similar to Saccharomyces cerevisiae Dnf1-3p, Drs2p, Neo1p, and human ATP8A2, -9B, -10D, -11B, and -11C. Aminophospholipid translocases (APLTs), also known as type 4 P-type ATPases, act as flippases, and translocate specific phospholipids from the exoplasmic leaflet to the cytoplasmic leaflet of biological membranes. Yeast Dnf1 and Dnf2 mediate the transport of phosphatidylethanolamine, phosphatidylserine, and phosphatidylcholine from the outer to the inner leaflet of the plasma membrane. Mammalian ATP11C may selectively transports PS and PE from the outer leaflet of the plasma membrane to the inner leaflet. The yeast Neo1p localizes to the endoplasmic reticulum and the Golgi complex and plays a role in membrane trafficking within the endomembrane system. Human putative ATPase phospholipid transporting 9B, ATP9B, localizes to the trans-golgi network in a CDC50 protein-independent manner. It also includes Arabidopsis phospholipid flippases including ALA1, and Caenorhabditis elegans flippases, including TAT-1, the latter has been shown to facilitate the inward transport of phosphatidylserine. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle."
definition: >-
