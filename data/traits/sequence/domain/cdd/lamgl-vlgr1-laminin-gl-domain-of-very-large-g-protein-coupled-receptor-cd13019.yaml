identifier: CDD:cd13019
label: LamGL_VLGR1
definition: >-
  LamGL_VLGR1. Laminin GL domain of very large G protein-coupled receptor-1 (VLGR1), also known as USH2C or G protein-coupled receptor 98 (GPR98); VLGR1, the largest known cell surface protein with about 6300 amino acids, is expressed at high levels within the embryonic nervous system. It has been shown to be important for proper stereocilia maturation of cochlear hair cells. Mutations have been shown to be the cause of one subtype of Usher syndrome (USH) type II cases, the most common of the 3 types of USH. USH is the most frequent cause of combined deaf-blindness in humans. USH type II is characterized by moderate nonprogressive hearing loss without vestibular dysfunction and a tendency for more pronounced hearing loss for higher-frequency sounds. In general, LamG domains of neurexin and agrin undergo alternative splicing that modulates their affinity for protein ligands. Proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold
