identifier: CDD:cd11943
label: "Src homology 3 domain of JNK-interacting protein 1. JNK-interacting protein 1 (JIP1) is also called Islet-brain 1 (IB1) or Mitogen-activated protein kinase 8-interacting protein 1 (MAPK8IP1). It is highly expressed in neurons, where it functions as an adaptor linking motor to cargo during axonal transport. It also affects microtubule dynamics in neurons. JIP1 is also found in pancreatic beta-cells, where it is involved in regulating insulin secretion. In addition to a JNK binding domain, JIP1 also contains SH3 and Phosphotyrosine-binding (PTB) domains. Its SH3 domain homodimerizes at the interface usually involved in proline-rich ligand recognition, despite the lack of this motif in the domain itself. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of JNK-interacting protein 1. JNK-interacting protein 1 (JIP1) is also called Islet-brain 1 (IB1) or Mitogen-activated protein kinase 8-interacting protein 1 (MAPK8IP1). It is highly expressed in neurons, where it functions as an adaptor linking motor to cargo during axonal transport. It also affects microtubule dynamics in neurons. JIP1 is also found in pancreatic beta-cells, where it is involved in regulating insulin secretion. In addition to a JNK binding domain, JIP1 also contains SH3 and Phosphotyrosine-binding (PTB) domains. Its SH3 domain homodimerizes at the interface usually involved in proline-rich ligand recognition, despite the lack of this motif in the domain itself. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11943); members share this curated model.
