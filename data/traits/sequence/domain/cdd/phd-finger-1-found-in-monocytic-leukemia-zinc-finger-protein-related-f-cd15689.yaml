identifier: CDD:cd15689
label: "PHD finger 1 found in monocytic leukemia zinc finger protein-related factor (MORF). MORF, also termed MOZ2, or histone acetyltransferase KAT6B, or MOZ, YBF2/SAS3, SAS2 and TIP60 protein 4 (MYST4), is a ubiquitously expressed transcriptional regulator with intrinsic histone acetyltransferase (HAT) activity. It can interact with the Runt-domain transcription factor Runx2 and form a tetrameric complex with BRPFs, ING5, and EAF6. MORF and monocytic leukemia zinc-finger protein (MOZ) are catalytic subunits of HAT complexes that are required for normal developmental programs, such as hematopoiesis, neurogenesis, and skeletogenesis, and are also implicated in human leukemias. MORF contains an N-terminal region containing two plant homeodomain (PHD) fingers, a putative HAT domain, an acidic region, and a C-terminal Ser/Met-rich domain. The model corresponds to the first PHD finger."
definition: >-
  PHD finger 1 found in monocytic leukemia zinc finger protein-related factor (MORF). MORF, also termed MOZ2, or histone acetyltransferase KAT6B, or MOZ, YBF2/SAS3, SAS2 and TIP60 protein 4 (MYST4), is a ubiquitously expressed transcriptional regulator with intrinsic histone acetyltransferase (HAT) activity. It can interact with the Runt-domain transcription factor Runx2 and form a tetrameric complex with BRPFs, ING5, and EAF6. MORF and monocytic leukemia zinc-finger protein (MOZ) are catalytic subunits of HAT complexes that are required for normal developmental programs, such as hematopoiesis, neurogenesis, and skeletogenesis, and are also implicated in human leukemias. MORF contains an N-terminal region containing two plant homeodomain (PHD) fingers, a putative HAT domain, an acidic region, and a C-terminal Ser/Met-rich domain. The model corresponds to the first PHD finger. — an NCBI CDD conserved domain (cd15689); members share this curated model.
