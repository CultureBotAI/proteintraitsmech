identifier: CDD:cd19482
label: "RecA-like domain of the nucleoside-triphosphatase THEP1 family. This family represents the THEP1 family ATPase domain. It includes nucleoside-triphosphatase THEP 1 from Aquifex aeolicus (aaTHEP1) a nucleoside-phosphatase, with activity towards ATP, GTP, CTP, TTP and UTP; and which may hydrolyze nucleoside diphosphates with lower efficiency. The catalytic function of aaTHEP1 remains unclear, it may be a DNA/RNA modifying enzyme. Human THEP1 (hsTHEP1) may have a general function in many human tissues, as it is widely expressed in most examined tissues (such as in brain, heart, lymph node, skin, pancreas); it is especially highly expressed in embryonic and various tumor tissues. This family belongs to the RecA-like NTPase superfamily which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
definition: >-
  RecA-like domain of the nucleoside-triphosphatase THEP1 family. This family represents the THEP1 family ATPase domain. It includes nucleoside-triphosphatase THEP 1 from Aquifex aeolicus (aaTHEP1) a nucleoside-phosphatase, with activity towards ATP, GTP, CTP, TTP and UTP; and which may hydrolyze nucleoside diphosphates with lower efficiency. The catalytic function of aaTHEP1 remains unclear, it may be a DNA/RNA modifying enzyme. Human THEP1 (hsTHEP1) may have a general function in many human tissues, as it is widely expressed in most examined tissues (such as in brain, heart, lymph node, skin, pancreas); it is especially highly expressed in embryonic and various tumor tissues. This family belongs to the RecA-like NTPase superfamily which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion. — an NCBI CDD conserved domain (cd19482); members share this curated model.
