identifier: CDD:cd23452
label: "ricin B-type lectin domain, beta-trefoil fold, found in Rarobacter faecitabidus serine protease I (RPI) and similar proteins. RPI, also called serine protease 1, is a major serine protease exhibiting lytic activity toward living yeast cells. It has a lectin-like affinity for mannose. Mannoproteins may be the native substrate for RPI. RPI contains a C-terminal ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Rarobacter faecitabidus serine protease I (RPI) and similar proteins. RPI, also called serine protease 1, is a major serine protease exhibiting lytic activity toward living yeast cells. It has a lectin-like affinity for mannose. Mannoproteins may be the native substrate for RPI. RPI contains a C-terminal ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site. — an NCBI CDD conserved domain (cd23452); members share this curated model.
