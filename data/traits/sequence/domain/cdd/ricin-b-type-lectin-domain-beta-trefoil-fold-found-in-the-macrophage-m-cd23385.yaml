identifier: CDD:cd23385
label: "ricin B-type lectin domain, beta-trefoil fold, found in the macrophage mannose receptor (MRC) family. The MRC family includes MRC1-2, receptor-type tyrosine-protein phosphatase beta (PTPRB) isoform e, secretory phospholipase A2 receptor (PLA2R1), and lymphocyte antigen 75 (Ly-75). MRC1 mediates the endocytosis of glycoproteins by macrophages. It binds both sulfated and non-sulfated polysaccharide chains, and acts as a phagocytic receptor for bacteria, fungi, and other pathogens. It also acts as a receptor for Dengue virus envelope protein E. MRC2 may play a role as an endocytotic lectin receptor displaying calcium-dependent lectin activity. It internalizes glycosylated ligands from the extracellular space for release in an endosomal compartment via clathrin-mediated endocytosis. It may be involved in plasminogen activation system controlling the extracellular level of PLAUR/PLAU, and thus may regulate protease activity at the cell surface. It may contribute to cellular uptake, remodeling, and degradation of extracellular collagen matrices. It may play a role during cancer progression as well as in other chronic tissue destructive diseases acting on collagen turnover. It may participate in remodeling of extracellular matrix cooperating with the matrix metalloproteinases (MMPs). PTPRB (EC 3.1.3.48), also called protein-tyrosine phosphatase beta, plays an important role in blood vessel remodeling and angiogenesis. It is not necessary for the initial formation of the blood vessels but is essential for their maintenance and remodeling. It is also essential for the maintenance of endothelial cell contact integrity and for the adhesive function of VE-cadherin in endothelial cells that requires the presence of plakoglobin. PLA2R1 is a receptor for secretory phospholipase A2 (sPLA2). It acts as a receptor for phospholipase sPLA2-IB/PLA2G1B but not sPLA2-IIA/PLA2G2A. It can also bind to snake PA2-like toxins. It may be involved in responses in proinflammatory cytokine productions during endotoxic shock. It also has endocytic properties and rapidly internalizes sPLA2 ligands, which is particularly important for the clearance of extracellular sPLA2s to protect their potent enzymatic activities. Ly-75 acts as an endocytic receptor to direct captured antigens from the extracellular space to a specialized antigen-processing compartment. It causes reduced proliferation of B-lymphocytes. All family members contain a ricin B-type lectin domain at the N-terminus. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket. One member of this family, MRC1, is missing the gamma subdomain."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in the macrophage mannose receptor (MRC) family. The MRC family includes MRC1-2, receptor-type tyrosine-protein phosphatase beta (PTPRB) isoform e, secretory phospholipase A2 receptor (PLA2R1), and lymphocyte antigen 75 (Ly-75). MRC1 mediates the endocytosis of glycoproteins by macrophages. It binds both sulfated and non-sulfated polysaccharide chains, and acts as a phagocytic receptor for bacteria, fungi, and other pathogens. It also acts as a receptor for Dengue virus envelope protein E. MRC2 may play a role as an endocytotic lectin receptor displaying calcium-dependent lectin activity. It internalizes glycosylated ligands from the extracellular space for release in an endosomal compartment via clathrin-mediated endocytosis. It may be involved in plasminogen activation system controlling the extracellular level of PLAUR/PLAU, and thus may regulate protease activity at the cell surface. It may contribute to cellular uptake, remodeling, and degradation of extracellular collagen matrices. It may play a role during cancer progression as well as in other chronic tissue destructive diseases acting on collagen turnover. It may participate in remodeling of extracellular matrix cooperating with the matrix metalloproteinases (MMPs). PTPRB (EC 3.1.3.48), also called protein-tyrosine phosphatase beta, plays an important role in blood vessel remodeling and angiogenesis. It is not necessary for the initial formation of the blood vessels but is essential for their maintenance and remodeling. It is also essential for the maintenance of endothelial cell contact integrity and for the adhesive function of VE-cadherin in endothelial cells that requires the presence of plakoglobin. PLA2R1 is a receptor for secretory phospholipase A2 (sPLA2). It acts as a receptor for phospholipase sPLA2-IB/PLA2G1B but not sPLA2-IIA/PLA2G2A. It can also bind to snake PA2-like toxins. It may be involved in responses in proinflammatory cytokine productions during endotoxic shock. It also has endocytic properties and rapidly internalizes sPLA2 ligands, which is particularly important for the clearance of extracellular sPLA2s to protect their potent enzymatic activities. Ly-75 acts as an endocytic receptor to direct captured antigens from the extracellular space to a specialized antigen-processing compartment. It causes reduced proliferation of B-lymphocytes. All family members contain a ricin B-type lectin domain at the N-terminus. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket. One member of this family, MRC1, is missing the gamma subdomain. — an NCBI CDD conserved domain (cd23385); members share this curated model.
