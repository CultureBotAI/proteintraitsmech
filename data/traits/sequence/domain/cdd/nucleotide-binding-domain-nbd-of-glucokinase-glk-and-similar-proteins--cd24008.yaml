identifier: CDD:cd24008
label: "nucleotide-binding domain (NBD) of glucokinase (GLK) and similar proteins. Glucokinase (EC 2.7.1.2), also called glucose kinase, acts as an ATP-dependent kinase that phosphorylates glucose using ATP as a donor to give glucose-6-phosphate and ADP. Glucokinases are mainly found in invertebrates and microorganisms and highly specific for glucose. Glucokinases belong to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains."
definition: >-
  nucleotide-binding domain (NBD) of glucokinase (GLK) and similar proteins. Glucokinase (EC 2.7.1.2), also called glucose kinase, acts as an ATP-dependent kinase that phosphorylates glucose using ATP as a donor to give glucose-6-phosphate and ADP. Glucokinases are mainly found in invertebrates and microorganisms and highly specific for glucose. Glucokinases belong to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains. — an NCBI CDD conserved domain (cd24008); members share this curated model.
