identifier: CDD:cd06994
label: cupin_HIF_N
definition: >-
  Homo sapiens hypoxia-inducible factor and related proteins, N-terminal cupin domain. Hypoxia-Inducible Factor (HIF) is a eukaryotic transcription factor/asparagine hydroxylase that is regulated by oxygen-dependent hydroxylation. The HIF transcriptional complex is composed of an alpha/beta heterodimer, HIF-beta being a constitutive nuclear protein that dimerizes with oxygen regulated HIF-alpha subunits. Under normoxic conditions, hydroxylation of certain proline residues on HIF-alpha triggers destruction of the HIF-alpha subunit while hydroxylation of asparagine in the C-terminal transactivation domain of HIF-alpha prevents its interaction with p300. Under hypoxic conditions, a lack of hydroxylase activity enables HIF-alpha to escape destruction and become transcriptionally active. HIF is part of a transcriptional cascade that when activated, directs a series of adaptive responses that enhance oxygen delivery or limit oxygen demand. Activation of HIF in cancer and ischemic/hypoxic vascular diseases has indicated a central role in human pathology. Orthologs of HIF exist in prokaryotes, and these include YxbC, a uncharacterized asparaginyl hydroxylase from Bacillus subtilis
