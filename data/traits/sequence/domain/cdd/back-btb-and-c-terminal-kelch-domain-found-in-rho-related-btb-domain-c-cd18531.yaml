identifier: CDD:cd18531
label: "BACK (BTB and C-terminal Kelch) domain found in Rho-related BTB domain-containing protein 2 (RhoBTB2). RhoBTB2, also called Deleted in breast cancer 2 gene protein (DBC2), or p83, is an atypical member of the Rho GTPase family of signaling proteins, which is characterized by containing a carboxyl terminal extension that harbors two BTB domains and a BACK domain and is capable of assembling cullin 3-dependent ubiquitin ligase complexes. It functions as a tumor suppressor that regulates the expression of the methyltransferase METTL7A. RhoBTB2 also acts an adaptor of the Cullin-3-dependent E3 ubiquitin ligase complex."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Rho-related BTB domain-containing protein 2 (RhoBTB2). RhoBTB2, also called Deleted in breast cancer 2 gene protein (DBC2), or p83, is an atypical member of the Rho GTPase family of signaling proteins, which is characterized by containing a carboxyl terminal extension that harbors two BTB domains and a BACK domain and is capable of assembling cullin 3-dependent ubiquitin ligase complexes. It functions as a tumor suppressor that regulates the expression of the methyltransferase METTL7A. RhoBTB2 also acts an adaptor of the Cullin-3-dependent E3 ubiquitin ligase complex. — an NCBI CDD conserved domain (cd18531); members share this curated model.
