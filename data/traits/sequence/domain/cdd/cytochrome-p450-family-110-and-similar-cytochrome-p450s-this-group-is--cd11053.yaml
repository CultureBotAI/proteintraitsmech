identifier: CDD:cd11053
label: "cytochrome P450 family 110 and similar cytochrome P450s. This group is composed of mostly uncharacterized proteins, including Nostoc sp. probable cytochrome P450 110 (CYP110) and putative cytochrome P450s 139 (CYP139), 138 (CYP138), and 135B1 (CYP135B1) from Mycobacterium bovis. CYP110 genes, unique to cyanobacteria, are widely distributed in heterocyst-forming cyanobacteria including nitrogen-fixing genera Nostoc and Anabaena. This family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 family 110 and similar cytochrome P450s. This group is composed of mostly uncharacterized proteins, including Nostoc sp. probable cytochrome P450 110 (CYP110) and putative cytochrome P450s 139 (CYP139), 138 (CYP138), and 135B1 (CYP135B1) from Mycobacterium bovis. CYP110 genes, unique to cyanobacteria, are widely distributed in heterocyst-forming cyanobacteria including nitrogen-fixing genera Nostoc and Anabaena. This family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd11053); members share this curated model.
