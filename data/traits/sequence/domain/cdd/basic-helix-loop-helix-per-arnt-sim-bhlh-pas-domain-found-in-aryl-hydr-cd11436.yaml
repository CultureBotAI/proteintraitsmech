identifier: CDD:cd11436
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in aryl hydrocarbon receptor (AhR) and similar proteins. AhR, also termed Ah receptor, or Dioxin receptor (DR), or Class E basic helix-loop-helix protein 76 (bHLHe76), is the only member of bHLH-PAS transcription regulators that bind and be activated by small chemical ligands. It is activated by Dioxin to control the expression of certain genes to influence biological processes such as apoptosis, proliferation, cell growth and differentiation. To form active DNA binding complexes AhR dimerize with a bHLH-PAS factor ARNT (Aryl hydrocarbon Nuclear Receptor Translocator)."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in aryl hydrocarbon receptor (AhR) and similar proteins. AhR, also termed Ah receptor, or Dioxin receptor (DR), or Class E basic helix-loop-helix protein 76 (bHLHe76), is the only member of bHLH-PAS transcription regulators that bind and be activated by small chemical ligands. It is activated by Dioxin to control the expression of certain genes to influence biological processes such as apoptosis, proliferation, cell growth and differentiation. To form active DNA binding complexes AhR dimerize with a bHLH-PAS factor ARNT (Aryl hydrocarbon Nuclear Receptor Translocator). — an NCBI CDD conserved domain (cd11436); members share this curated model.
