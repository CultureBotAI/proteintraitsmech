identifier: CDD:cd23466
label: "ricin B-type lectin domain, beta-trefoil fold, found in polypeptide N-acetylgalactosaminyltransferase 1 (GALNT1) and similar proteins. GALNT1 (EC 2.4.1.41), also called polypeptide GalNAc transferase 1, GalNAc-T1, pp-GaNTase 1, protein-UDP acetylgalactosaminyltransferase 1, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 1, catalyzes the initial reaction in O-linked oligosaccharide biosynthesis, the transfer of an N-acetyl-D-galactosamine residue to a serine or threonine residue on the protein receptor. It has a broad spectrum of substrates for peptides such as EA2, Muc5AC, Muc1a, Muc1b and Muc7. GALNT1 comprises a glycosyltransferase region and a ricin B-type lectin domain. The glycosyltransferase region contains two conserved domains, domain A (also called GT1 motif) and domain B (also called Gal/GalNAc-T motif). This model corresponds to the ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ricin B-type lectin domain is required in the glycopeptide specificity of enzyme activity but not for activity with naked peptide substrates, suggesting that it triggers the catalytic domain to act on GalNAc-glycopeptide substrates."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in polypeptide N-acetylgalactosaminyltransferase 1 (GALNT1) and similar proteins. GALNT1 (EC 2.4.1.41), also called polypeptide GalNAc transferase 1, GalNAc-T1, pp-GaNTase 1, protein-UDP acetylgalactosaminyltransferase 1, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 1, catalyzes the initial reaction in O-linked oligosaccharide biosynthesis, the transfer of an N-acetyl-D-galactosamine residue to a serine or threonine residue on the protein receptor. It has a broad spectrum of substrates for peptides such as EA2, Muc5AC, Muc1a, Muc1b and Muc7. GALNT1 comprises a glycosyltransferase region and a ricin B-type lectin domain. The glycosyltransferase region contains two conserved domains, domain A (also called GT1 motif) and domain B (also called Gal/GalNAc-T motif). This model corresponds to the ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ricin B-type lectin domain is required in the glycopeptide specificity of enzyme activity but not for activity with naked peptide substrates, suggesting that it triggers the catalytic domain to act on GalNAc-glycopeptide substrates. — an NCBI CDD conserved domain (cd23466); members share this curated model.
