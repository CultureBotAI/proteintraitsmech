identifier: CDD:cd19509
label: "ATPase domain of VPS4, ATAD1, K, KTNA1, Spastin, FIGL-1 and similar ATPase domains. This subfamily includes the ATPase domains of vacuolar protein sorting-associated protein 4 (VPS4), ATPase family AAA domain-containing protein 1 (ATAD1, also known as Thorase), Katanin p60 ATPase-containing subunit A1 (KTNA1), Spastin, and Fidgetin-Like 1 (FIGL-1). This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
definition: >-
  ATPase domain of VPS4, ATAD1, K, KTNA1, Spastin, FIGL-1 and similar ATPase domains. This subfamily includes the ATPase domains of vacuolar protein sorting-associated protein 4 (VPS4), ATPase family AAA domain-containing protein 1 (ATAD1, also known as Thorase), Katanin p60 ATPase-containing subunit A1 (KTNA1), Spastin, and Fidgetin-Like 1 (FIGL-1). This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion. — an NCBI CDD conserved domain (cd19509); members share this curated model.
