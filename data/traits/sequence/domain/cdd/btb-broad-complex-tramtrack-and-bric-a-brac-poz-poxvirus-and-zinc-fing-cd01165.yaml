identifier: CDD:cd01165
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain superfamily. Proteins in this superfamily are characterized by the presence of a common protein-protein interaction motif of about 100 amino acids, known as the BTB/POZ domain. Members include transcription factors, oncogenic proteins, ion channel proteins, and potassium channel tetramerization domain (KCTD) proteins. They have been identified in poxviruses and many eukaryotes, and have diverse functions, such as transcriptional regulation, chromatin remodeling, protein degradation and cytoskeletal regulation. Many BTB/POZ proteins contain one or two additional domains, such as kelch repeats, zinc-finger domains, FYVE (Fab1, YOTB, Vac1, and EEA1) fingers, or ankyrin repeats, among others. These special additional domains or interaction partners provide unique characteristics and functions to BTB/POZ proteins. In ion channel proteins and KCTD proteins, the BTB/POZ domain is also called the tetramerization (T1) domain."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain superfamily. Proteins in this superfamily are characterized by the presence of a common protein-protein interaction motif of about 100 amino acids, known as the BTB/POZ domain. Members include transcription factors, oncogenic proteins, ion channel proteins, and potassium channel tetramerization domain (KCTD) proteins. They have been identified in poxviruses and many eukaryotes, and have diverse functions, such as transcriptional regulation, chromatin remodeling, protein degradation and cytoskeletal regulation. Many BTB/POZ proteins contain one or two additional domains, such as kelch repeats, zinc-finger domains, FYVE (Fab1, YOTB, Vac1, and EEA1) fingers, or ankyrin repeats, among others. These special additional domains or interaction partners provide unique characteristics and functions to BTB/POZ proteins. In ion channel proteins and KCTD proteins, the BTB/POZ domain is also called the tetramerization (T1) domain. — an NCBI CDD conserved domain (cd01165); members share this curated model.
