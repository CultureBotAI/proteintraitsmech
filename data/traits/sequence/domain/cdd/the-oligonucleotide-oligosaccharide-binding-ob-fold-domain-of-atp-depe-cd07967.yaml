identifier: CDD:cd07967
label: "The Oligonucleotide/oligosaccharide binding (OB)-fold domain of ATP-dependent DNA ligase III is a DNA-binding module that is part of the catalytic core unit. ATP-dependent polynucleotide ligases catalyze phosphodiester bond formation using nicked nucleic acid substrates with the high energy nucleotide of ATP as a cofactor in a three step reaction mechanism. DNA ligases play a vital role in the diverse processes of DNA replication, recombination and repair. ATP-dependent ligases are present in many organisms such as viruses, bacteriohages, eukarya, archaea and bacteria. There are three classes of ATP-dependent DNA ligases in eukaryotic cells (I, III and IV). DNA ligase III is not found in lower eukaryotes and is present both in the nucleus and mitochondria. It has several isoforms; two splice forms, III-alpha and III-beta, differ in their carboxy-terminal sequences. DNA ligase III-beta is believed to play a role in homologous recombination during meiotic prophase. DNA ligase III-alpha interacts with X-ray Cross Complementing factor 1 (XRCC1) and functions in single nucleotide Base Excision Repair (BER). The mitochondrial form of DNA ligase III originates from the nucleolus and is involved in the mitochondrial DNA repair pathway. This isoform is expressed by a second start site on the DNA ligase III gene. DNA ligases have a highly modular architecture consisting of a unique arrangement of two or more discrete domains. The adenylation and C-terminal oligouncleotide/oligosaccharide binding (OB)-fold domains comprise a catalytic core unit that is common to most members of the ATP-dependent DNA ligase family. The catalytic core unit contains six conserved sequence motifs (I, III, IIIa, IV, V and VI) that define this family of related nucleotidyltransferases. The OB-fold domain contacts the nicked DNA substrate and is required for the ATP-dependent DNA ligase nucleotidylation step. The RxDK motif (motif VI), which is essential for ATP hydrolysis, is located in the OB-fold domain."
definition: >-
  The Oligonucleotide/oligosaccharide binding (OB)-fold domain of ATP-dependent DNA ligase III is a DNA-binding module that is part of the catalytic core unit. ATP-dependent polynucleotide ligases catalyze phosphodiester bond formation using nicked nucleic acid substrates with the high energy nucleotide of ATP as a cofactor in a three step reaction mechanism. DNA ligases play a vital role in the diverse processes of DNA replication, recombination and repair. ATP-dependent ligases are present in many organisms such as viruses, bacteriohages, eukarya, archaea and bacteria. There are three classes of ATP-dependent DNA ligases in eukaryotic cells (I, III and IV). DNA ligase III is not found in lower eukaryotes and is present both in the nucleus and mitochondria. It has several isoforms; two splice forms, III-alpha and III-beta, differ in their carboxy-terminal sequences. DNA ligase III-beta is believed to play a role in homologous recombination during meiotic prophase. DNA ligase III-alpha interacts with X-ray Cross Complementing factor 1 (XRCC1) and functions in single nucleotide Base Excision Repair (BER). The mitochondrial form of DNA ligase III originates from the nucleolus and is involved in the mitochondrial DNA repair pathway. This isoform is expressed by a second start site on the DNA ligase III gene. DNA ligases have a highly modular architecture consisting of a unique arrangement of two or more discrete domains. The adenylation and C-terminal oligouncleotide/oligosaccharide binding (OB)-fold domains comprise a catalytic core unit that is common to most members of the ATP-dependent DNA ligase family. The catalytic core unit contains six conserved sequence motifs (I, III, IIIa, IV, V and VI) that define this family of related nucleotidyltransferases. The OB-fold domain contacts the nicked DNA substrate and is required for the ATP-dependent DNA ligase nucleotidylation step. The RxDK motif (motif VI), which is essential for ATP hydrolysis, is located in the OB-fold domain. — an NCBI CDD conserved domain (cd07967); members share this curated model.
