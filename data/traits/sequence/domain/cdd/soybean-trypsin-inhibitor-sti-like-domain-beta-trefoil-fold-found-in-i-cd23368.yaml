identifier: CDD:cd23368
label: "soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Ipomoea batatas sporamin and similar proteins. This subfamily includes Ipomoea batatas sporamin A and sporamin B. They are major tuberous root proteins that belong to the soybean trypsin inhibitor (Kunitz) family of protease inhibitors. They exhibit antitumor activity in a number of types of tumor cells. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
