identifier: CDD:cd22681
label: "forkhead associated (FHA) domain found in Saccharomyces cerevisiae pre-mRNA leakage protein 1 (PML1) and similar proteins. PML1 is an FHA domain-containing protein required for efficient splicing and pre-mRNA nuclear retention. It is a component of the pre-mRNA retention and splicing (RES) complex composed of at least BUD13, IST3, and PML1. It contains an FHA domain, which is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in Saccharomyces cerevisiae pre-mRNA leakage protein 1 (PML1) and similar proteins. PML1 is an FHA domain-containing protein required for efficient splicing and pre-mRNA nuclear retention. It is a component of the pre-mRNA retention and splicing (RES) complex composed of at least BUD13, IST3, and PML1. It contains an FHA domain, which is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22681); members share this curated model.
