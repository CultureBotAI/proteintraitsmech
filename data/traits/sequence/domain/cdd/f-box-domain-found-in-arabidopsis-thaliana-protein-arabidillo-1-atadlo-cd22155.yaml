identifier: CDD:cd22155
label: "F-box domain found in Arabidopsis thaliana protein ARABIDILLO 1 (AtADLO1) and similar proteins. AtADLO1, also called F-box only protein 5 (FBX5), promotes lateral root initiation and development, independently of auxin (IAA) and abscisic acid (ABA). The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Arabidopsis thaliana protein ARABIDILLO 1 (AtADLO1) and similar proteins. AtADLO1, also called F-box only protein 5 (FBX5), promotes lateral root initiation and development, independently of auxin (IAA) and abscisic acid (ABA). The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22155); members share this curated model.
