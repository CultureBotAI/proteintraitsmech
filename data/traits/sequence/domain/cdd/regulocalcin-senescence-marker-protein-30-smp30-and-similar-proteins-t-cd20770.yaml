identifier: CDD:cd20770
label: "regulocalcin, senescence marker protein 30 (SMP30), and similar proteins. The family includes human senescence marker protein 30, originally identified as an aging marker. SMP30 functions as a lactonase in the biosynthesis of L-ascorbic acid in non-primate mammals, and is also referred to as regulocalcin, with a suggested function in the homeostasis of calcium. It is a member of the nucleophilic attack 6-bladed beta-propeller (N6P) superfamily and is related to vertebrate paraoxonase, an enzyme that hydrolyzes organophosphorous esters."
definition: >-
  regulocalcin, senescence marker protein 30 (SMP30), and similar proteins. The family includes human senescence marker protein 30, originally identified as an aging marker. SMP30 functions as a lactonase in the biosynthesis of L-ascorbic acid in non-primate mammals, and is also referred to as regulocalcin, with a suggested function in the homeostasis of calcium. It is a member of the nucleophilic attack 6-bladed beta-propeller (N6P) superfamily and is related to vertebrate paraoxonase, an enzyme that hydrolyzes organophosphorous esters. — an NCBI CDD conserved domain (cd20770); members share this curated model.
