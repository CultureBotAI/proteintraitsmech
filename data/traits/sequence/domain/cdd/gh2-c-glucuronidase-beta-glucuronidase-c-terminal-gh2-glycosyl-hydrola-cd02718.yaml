identifier: CDD:cd02718
label: GH2_C_glucuronidase
definition: >-
  GH2_C_glucuronidase. Beta-glucuronidase, C-terminal GH2 (glycosyl hydrolase, family 2) domain. Beta-glucuronidase is a lysosomal exoglycosidase that cleaves beta-glucuronic acid residues from the nonreducing end of glycosaminoglycans, such as chondroitin sulfate and hyaluronic acid, and is an essential enzyme for the normal restructuring and turnover of these extracellular matrix components. Beta-glucuronidase has three structural domains; an N-terminal jelly roll barrel domain, an immunoglobulin constant domain, and a C-terminal GH2 TIM barrel catalytic domain. Beta-glucuronidase also has an N-terminal hairpin lysosomal targeting motif. Beta-glucuronidase forms a homotetramer. The active site is located within a large cleft at the interface of two monomers. Mutations in beta-glucuronidase are responsible for the lysosomal storage disease mucopolysaccharidosis VII (MPS VII)
