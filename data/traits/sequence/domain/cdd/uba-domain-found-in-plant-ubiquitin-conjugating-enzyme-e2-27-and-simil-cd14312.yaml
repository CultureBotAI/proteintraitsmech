identifier: CDD:cd14312
label: "UBA domain found in plant ubiquitin-conjugating enzyme E2 27 and similar proteins. UBC27, also called ubiquitin carrier protein 27, functions as a class II ubiquitin-conjugating (UBC) enzyme (E2). E2, together with E1 (ubiquitin-activating enzyme UBA) and E3 (ubiquitin ligase), is required in the multi-step reaction of ubiquitin conjugation. Unlike other Arabidopsis UBCs, in addition to an N-terminal ubiquitin-conjugating enzyme E2 catalytic domain (UBCc), UBC27 has an additional C-terminal ubiquitin-associated domain (UBA)."
definition: >-
  UBA domain found in plant ubiquitin-conjugating enzyme E2 27 and similar proteins. UBC27, also called ubiquitin carrier protein 27, functions as a class II ubiquitin-conjugating (UBC) enzyme (E2). E2, together with E1 (ubiquitin-activating enzyme UBA) and E3 (ubiquitin ligase), is required in the multi-step reaction of ubiquitin conjugation. Unlike other Arabidopsis UBCs, in addition to an N-terminal ubiquitin-conjugating enzyme E2 catalytic domain (UBCc), UBC27 has an additional C-terminal ubiquitin-associated domain (UBA). — an NCBI CDD conserved domain (cd14312); members share this curated model.
