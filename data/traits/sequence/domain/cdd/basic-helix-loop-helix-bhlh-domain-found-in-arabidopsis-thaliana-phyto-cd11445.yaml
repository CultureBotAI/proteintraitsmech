identifier: CDD:cd11445
label: "basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana phytochrome interacting factors (PIFs) and similar proteins. The family includes several bHLH transcription factors from Arabidopsis thaliana, such as PIFs, ALC, PIL1, SPATULA, and UNE10. PIFs (PIF1, PIF3, PIF4, PIF5, PIF6 and PIF7) have been shown to control light-regulated gene expression. They directly bind to the photoactivated phytochromes and are degraded in response to light signals. ALC, also termed AtbHLH73, or protein ALCATRAZ, or EN 98, is required for the dehiscence of fruit, especially for the separation of the valve cells from the replum. It promotes the differentiation of a strip of labile non-lignified cells sandwiched between layers of lignified cells. PIL1, also termed AtbHLH124, or protein phytochrome interacting factor 3-like 1, or EN 110, is involved in responses to transient and long-term shade. It is required for the light-mediated inhibition of hypocotyl elongation and necessary for rapid light-induced expression of the photomorphogenesis- and circadian-related gene APRR9. PIL1 seems to play a role in multiple PHYB responses, such as flowering transition and petiole elongation. SPATULA, also termed AtbHLH24, or EN 99, plays a role in floral organogenesis. It promotes the growth of carpel margins and of pollen tract tissues derived from them. UNE10, also termed AtbHLH16, or protein UNFERTILIZED EMBRYO SAC 10, or EN 99, is required during the fertilization of ovules by pollen."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana phytochrome interacting factors (PIFs) and similar proteins. The family includes several bHLH transcription factors from Arabidopsis thaliana, such as PIFs, ALC, PIL1, SPATULA, and UNE10. PIFs (PIF1, PIF3, PIF4, PIF5, PIF6 and PIF7) have been shown to control light-regulated gene expression. They directly bind to the photoactivated phytochromes and are degraded in response to light signals. ALC, also termed AtbHLH73, or protein ALCATRAZ, or EN 98, is required for the dehiscence of fruit, especially for the separation of the valve cells from the replum. It promotes the differentiation of a strip of labile non-lignified cells sandwiched between layers of lignified cells. PIL1, also termed AtbHLH124, or protein phytochrome interacting factor 3-like 1, or EN 110, is involved in responses to transient and long-term shade. It is required for the light-mediated inhibition of hypocotyl elongation and necessary for rapid light-induced expression of the photomorphogenesis- and circadian-related gene APRR9. PIL1 seems to play a role in multiple PHYB responses, such as flowering transition and petiole elongation. SPATULA, also termed AtbHLH24, or EN 99, plays a role in floral organogenesis. It promotes the growth of carpel margins and of pollen tract tissues derived from them. UNE10, also termed AtbHLH16, or protein UNFERTILIZED EMBRYO SAC 10, or EN 99, is required during the fertilization of ovules by pollen. — an NCBI CDD conserved domain (cd11445); members share this curated model.
