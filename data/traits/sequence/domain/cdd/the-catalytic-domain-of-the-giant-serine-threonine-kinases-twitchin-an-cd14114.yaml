identifier: CDD:cd14114
label: "The catalytic domain of the Giant Serine/Threonine Kinases, Twitchin and Projectin. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. This subfamily is composed of Caenorhabditis elegans and Aplysia californica Twitchin, Drosophila melanogaster Projectin, and similar proteins. These are very large muscle proteins containing multiple immunoglobulin (Ig)-like and fibronectin type III (FN3) domains and a single kinase domain near the C-terminus. Twitchin and Projectin are both associated with thick filaments. Twitchin is localized in the outer parts of A-bands and is involved in regulating muscle contraction. It interacts with the myofibrillar proteins myosin and actin in a phosphorylation-dependent manner, and may be involved in regulating the myosin cross-bridge cycle. The kinase activity of Twitchen is activated by Ca2+ and the Ca2+ binding protein S100A1. Projectin is associated with the end of thick filaments and is a component of flight muscle connecting filaments. The kinase domain of Projectin may play roles in autophosphorylation and transphosphorylation, which impact the formation of myosin filaments. The Twitchin-like subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  The catalytic domain of the Giant Serine/Threonine Kinases, Twitchin and Projectin. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. This subfamily is composed of Caenorhabditis elegans and Aplysia californica Twitchin, Drosophila melanogaster Projectin, and similar proteins. These are very large muscle proteins containing multiple immunoglobulin (Ig)-like and fibronectin type III (FN3) domains and a single kinase domain near the C-terminus. Twitchin and Projectin are both associated with thick filaments. Twitchin is localized in the outer parts of A-bands and is involved in regulating muscle contraction. It interacts with the myofibrillar proteins myosin and actin in a phosphorylation-dependent manner, and may be involved in regulating the myosin cross-bridge cycle. The kinase activity of Twitchen is activated by Ca2+ and the Ca2+ binding protein S100A1. Projectin is associated with the end of thick filaments and is a component of flight muscle connecting filaments. The kinase domain of Projectin may play roles in autophosphorylation and transphosphorylation, which impact the formation of myosin filaments. The Twitchin-like subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14114); members share this curated model.
