identifier: CDD:cd12789
label: "Ras-GTPase Activating Domain of plexin-C1. Plexins form a conserved family of transmembrane receptors for semaphorins and may be the ancestors of semaphorins. Plexins are divided into four types (A-D) according to sequence similarity. Plexin-C1 has been identified as the receptor of semaphorin 7A, which plays regulatory roles in both the immune and nervous systems. Unlike other semaphorins which act as repulsive guidance cues, Sema7A enhances central and peripheral axon growth and is required for proper axon tract formation during embryonic development. Plexin-C1 is a potential tumor suppressor for melanoma progression. The expression of Plexin-C1 is diminished or absent in human melanoma cell lines. Cofilin, an actin-binding protein involved in cell migration, is a downstream target of Sema7A and Plexin-C1 signaling. Melanoma invasion and metastasis may be promoted through the loss of Plexin-C1 inhibitory signaling on cofilin activation. Plexins contain a C-terminal RasGAP domain, which functions as an enhancer of the hydrolysis of GTP that is bound to Ras-GTPases. Plexins display GAP activity towards the Ras homolog Rap. Although the Rho (Ras homolog) GTPases are most closely related to members of the Ras family, RhoGAP and RasGAP show no sequence homology at their amino acid level. RasGTPases function as molecular switches in a large number of of signaling pathways. When bound to GTP they are in the on state and when bound to GDP they are in the off state. The RasGAP domain speeds up the hydrolysis of GTP in Ras-like proteins acting as a negative regulator."
definition: >-
  Ras-GTPase Activating Domain of plexin-C1. Plexins form a conserved family of transmembrane receptors for semaphorins and may be the ancestors of semaphorins. Plexins are divided into four types (A-D) according to sequence similarity. Plexin-C1 has been identified as the receptor of semaphorin 7A, which plays regulatory roles in both the immune and nervous systems. Unlike other semaphorins which act as repulsive guidance cues, Sema7A enhances central and peripheral axon growth and is required for proper axon tract formation during embryonic development. Plexin-C1 is a potential tumor suppressor for melanoma progression. The expression of Plexin-C1 is diminished or absent in human melanoma cell lines. Cofilin, an actin-binding protein involved in cell migration, is a downstream target of Sema7A and Plexin-C1 signaling. Melanoma invasion and metastasis may be promoted through the loss of Plexin-C1 inhibitory signaling on cofilin activation. Plexins contain a C-terminal RasGAP domain, which functions as an enhancer of the hydrolysis of GTP that is bound to Ras-GTPases. Plexins display GAP activity towards the Ras homolog Rap. Although the Rho (Ras homolog) GTPases are most closely related to members of the Ras family, RhoGAP and RasGAP show no sequence homology at their amino acid level. RasGTPases function as molecular switches in a large number of of signaling pathways. When bound to GTP they are in the on state and when bound to GDP they are in the off state. The RasGAP domain speeds up the hydrolysis of GTP in Ras-like proteins acting as a negative regulator. — an NCBI CDD conserved domain (cd12789); members share this curated model.
