identifier: CDD:cd12967
label: "Uncharacterized subgroup of the CBM-SusE-F_like superfamily. The CBM SusE-F_like superfamily includes starch-specific CBMs (carbohydrate-binding modules) of SusE and SusF, two cell surface lipoproteins within the Sus (Starch-utilization system) system of the human gut symbiont Bacteroides thetaiotaomicron. These CBMs have no enzymatic activity. The precise mechanistic roles of SusE and SusF in starch metabolism are unclear. Both proteins have an N-terminal domain which may belong to the immunoglobulin superfamily (IgSF), followed by two or three tandem starch-binding CBMs. SusF has three CBMs (CBM-Fa, -Fb, and -Fc; F denotes SusF, and they are labeled alphabetically from the N- to C- terminus). SusE has two CBMs (CBM-Eb and -Ec, corresponding to CBM-Fb and -Fc). Each starch-binding site contains an arc of aromatic amino acids for hydrophobic stacking with glucose, and hydrogen-bonding acceptors and donors for interacting with the O-2 and O-3 of glucose. These five CBMs show differences in their affinity for various different starch oligosaccharides, and they also contribute differently to binding insoluble starch. Proteins in this group are present in the species of the Gram-negative Bacteroidetes phylum."
definition: >-
  Uncharacterized subgroup of the CBM-SusE-F_like superfamily. The CBM SusE-F_like superfamily includes starch-specific CBMs (carbohydrate-binding modules) of SusE and SusF, two cell surface lipoproteins within the Sus (Starch-utilization system) system of the human gut symbiont Bacteroides thetaiotaomicron. These CBMs have no enzymatic activity. The precise mechanistic roles of SusE and SusF in starch metabolism are unclear. Both proteins have an N-terminal domain which may belong to the immunoglobulin superfamily (IgSF), followed by two or three tandem starch-binding CBMs. SusF has three CBMs (CBM-Fa, -Fb, and -Fc; F denotes SusF, and they are labeled alphabetically from the N- to C- terminus). SusE has two CBMs (CBM-Eb and -Ec, corresponding to CBM-Fb and -Fc). Each starch-binding site contains an arc of aromatic amino acids for hydrophobic stacking with glucose, and hydrogen-bonding acceptors and donors for interacting with the O-2 and O-3 of glucose. These five CBMs show differences in their affinity for various different starch oligosaccharides, and they also contribute differently to binding insoluble starch. Proteins in this group are present in the species of the Gram-negative Bacteroidetes phylum. — an NCBI CDD conserved domain (cd12967); members share this curated model.
