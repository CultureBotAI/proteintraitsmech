identifier: CDD:cd22628
label: "Kunitz-type domain from the alpha1 chain of type XXVIII collagen, and similar proteins. This model includes the Kunitz-type domain from the alpha1 chain of type XXVIII collagen (collagen alpha-1(XXVIII) chain) and similar proteins. The zebrafish has four collagen XXVIII genes all of which are differentially expressed in the liver, thymus, muscle, intestine and skin; only the alpha1 chain contains the Kunitz domain which is often proteolytically processed. Mammals only contain the alpha1 collagen chain, expressed mostly in dorsal root ganglia and peripheral nerves. The Kunitz domain is found at the C-terminus, and is most related to Kunitz domains of papilin and alpha3(VI) collagen. This domain is similar to that of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor) that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  Kunitz-type domain from the alpha1 chain of type XXVIII collagen, and similar proteins. This model includes the Kunitz-type domain from the alpha1 chain of type XXVIII collagen (collagen alpha-1(XXVIII) chain) and similar proteins. The zebrafish has four collagen XXVIII genes all of which are differentially expressed in the liver, thymus, muscle, intestine and skin; only the alpha1 chain contains the Kunitz domain which is often proteolytically processed. Mammals only contain the alpha1 collagen chain, expressed mostly in dorsal root ganglia and peripheral nerves. The Kunitz domain is found at the C-terminus, and is most related to Kunitz domains of papilin and alpha3(VI) collagen. This domain is similar to that of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor) that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22628); members share this curated model.
