identifier: CDD:cd21338
label: "second calponin homology (CH) domain found in beta-parvin. Beta-parvin, also called affixin, is an adapter protein that plays a role in integrin signaling via ILK and in activation of the GTPases Cdc42 and Rac1 by guanine exchange factors, such as ARHGEF6. It is involved in the reorganization of the actin cytoskeleton and the formation of lamellipodia and also plays a role in cell adhesion, cell spreading, establishment or maintenance of cell polarity, and cell migration. Beta-parvin contains two copies of the CH domain. This model corresponds to the second CH domain. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  second calponin homology (CH) domain found in beta-parvin. Beta-parvin, also called affixin, is an adapter protein that plays a role in integrin signaling via ILK and in activation of the GTPases Cdc42 and Rac1 by guanine exchange factors, such as ARHGEF6. It is involved in the reorganization of the actin cytoskeleton and the formation of lamellipodia and also plays a role in cell adhesion, cell spreading, establishment or maintenance of cell polarity, and cell migration. Beta-parvin contains two copies of the CH domain. This model corresponds to the second CH domain. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21338); members share this curated model.
