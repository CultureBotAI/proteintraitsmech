identifier: CDD:cd23004
label: "catalytic glycosyltransferase (GT) domain found in lysyl hydroxylase 1 (LH1) and similar proteins. LH1 (EC 1.14.11.4), also called procollagen-lysine,2-oxoglutarate 5-dioxygenase 1 (PLOD1), forms hydroxylysine residues in -Xaa-Lys-Gly- sequences in collagens. These hydroxylysines may serve as sites of attachment for carbohydrate units and are essential for the stability of the intermolecular collagen cross-links. LH1 is part of a complex composed of PLOD1, P3H3 and P3H4 that catalyzes hydroxylation of lysine residues in collagen alpha chains and is required for normal assembly and cross-linkling of collagen fibrils. This model corresponds to the N-terminal conserved domain of LH1, which shows high sequence similarity with catalytic glycosyltransferase (GT) domain of LH3."
definition: >-
  catalytic glycosyltransferase (GT) domain found in lysyl hydroxylase 1 (LH1) and similar proteins. LH1 (EC 1.14.11.4), also called procollagen-lysine,2-oxoglutarate 5-dioxygenase 1 (PLOD1), forms hydroxylysine residues in -Xaa-Lys-Gly- sequences in collagens. These hydroxylysines may serve as sites of attachment for carbohydrate units and are essential for the stability of the intermolecular collagen cross-links. LH1 is part of a complex composed of PLOD1, P3H3 and P3H4 that catalyzes hydroxylation of lysine residues in collagen alpha chains and is required for normal assembly and cross-linkling of collagen fibrils. This model corresponds to the N-terminal conserved domain of LH1, which shows high sequence similarity with catalytic glycosyltransferase (GT) domain of LH3. — an NCBI CDD conserved domain (cd23004); members share this curated model.
