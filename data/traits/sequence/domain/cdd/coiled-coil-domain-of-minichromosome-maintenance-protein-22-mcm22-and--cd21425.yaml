identifier: CDD:cd21425
label: MCM22_cc
definition: >-
  coiled-coil domain of minichromosome maintenance protein 22 (MCM22) and similar proteins. MCM22, also called CENP-K homolog, or constitutive centromere-associated network protein MCM22, is a component of the kinetochore, a multiprotein complex that assembles on centromeric DNA and attaches chromosomes to spindle microtubules, mediating chromosome segregation and sister chromatid segregation during meiosis and mitosis. The model corresponds to a coiled-coil domain of MCM22, which may mediate functionally important protein-protein interactions
