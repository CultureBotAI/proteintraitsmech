identifier: CDD:cd17668
label: "catalytic domain of receptor-type tyrosine-protein phosphatase Z, repeat 1. Receptor-type tyrosine-protein phosphatase Z (PTPRZ), also called receptor-type tyrosine-protein phosphatase zeta (R-PTP-zeta), belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. Three isoforms are generated by alternative splicing from a single PTPRZ gene: two transmembrane isoforms, PTPRZ-A and PTPRZ-B, and one secretory isoform, PTPRZ-S (also known as phosphacan); all are preferentially expressed in the central nervous system (CNS) as chondroitin sulfate (CS) proteoglycans. PTPRZ isoforms play important roles in maintaining oligodendrocyte precursor cells in an undifferentiated state. PTPRZ is a type 1 integral membrane protein consisting of an extracellular region with a carbonic anhydrase-like (CAH) and a fibronectin type III (FN3) domains, and an intracellular region with a catalytic PTP domain (repeat 1) proximal to the membrane, and a catalytically inactive PTP-fold domain (repeat 2) distal to the membrane. This model represents the catalytic PTP domain (repeat 1)."
