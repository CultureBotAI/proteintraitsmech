identifier: CDD:cd08217
label: "Catalytic domain of the Serine/Threonine Kinase, Never In Mitosis gene A (NIMA)-related kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The Nek2 subfamily includes Aspergillus nidulans NIMA kinase, the founding member of the Nek family, which was identified in a screen for cell cycle mutants prevented from entering mitosis. NIMA is essential for mitotic entry and progression through mitosis, and its degradation is essential for mitotic exit. NIMA is involved in nuclear membrane fission. Vertebrate Nek2 is a cell cycle-regulated STK, localized in centrosomes and kinetochores, that regulates centrosome splitting at the G2/M phase. It also interacts with other mitotic kinases such as Polo-like kinase 1 and may play a role in spindle checkpoint. An increase in the expression of the human NEK2 gene is strongly associated with the progression of non-Hodgkin lymphoma. Nek2 is one in a family of 11 different Neks (Nek1-11) that are involved in cell cycle control. It The Nek family is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Never In Mitosis gene A (NIMA)-related kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The Nek2 subfamily includes Aspergillus nidulans NIMA kinase, the founding member of the Nek family, which was identified in a screen for cell cycle mutants prevented from entering mitosis. NIMA is essential for mitotic entry and progression through mitosis, and its degradation is essential for mitotic exit. NIMA is involved in nuclear membrane fission. Vertebrate Nek2 is a cell cycle-regulated STK, localized in centrosomes and kinetochores, that regulates centrosome splitting at the G2/M phase. It also interacts with other mitotic kinases such as Polo-like kinase 1 and may play a role in spindle checkpoint. An increase in the expression of the human NEK2 gene is strongly associated with the progression of non-Hodgkin lymphoma. Nek2 is one in a family of 11 different Neks (Nek1-11) that are involved in cell cycle control. It The Nek family is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd08217); members share this curated model.
