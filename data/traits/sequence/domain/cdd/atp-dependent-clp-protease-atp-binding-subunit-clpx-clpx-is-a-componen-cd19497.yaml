identifier: CDD:cd19497
label: "ATP-dependent Clp protease ATP-binding subunit ClpX. ClpX is a component of the ATP-dependent protease ClpXP. In ClpXP,  ClpX ATPase serves to specifically recognize, unfold, and translocate protein substrates into the chamber of ClpP protease for degradation. This RecA-like_ClpX domain subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
definition: >-
  ATP-dependent Clp protease ATP-binding subunit ClpX. ClpX is a component of the ATP-dependent protease ClpXP. In ClpXP, ClpX ATPase serves to specifically recognize, unfold, and translocate protein substrates into the chamber of ClpP protease for degradation. This RecA-like_ClpX domain subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion. — an NCBI CDD conserved domain (cd19497); members share this curated model.
