identifier: CDD:cd06753
label: "PDZ domain of PDZ-LIM family proteins, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of PDZ-LIM family proteins including PDLIM1-7, and related domains. PDZ-LIM family proteins (also known as Zasp PDZ domain proteins) are involved in the rearrangement of the actin cytoskeleton; they mediate association with the cytoskeleton through alpha-actinin as well as with other proteins involved in signal transduction pathways. Members of this family include PDLIM1 (also known as C-terminal LIM domain protein 1, elfin, LIM domain protein CLP-36), PDLIM2 (also known as PDZ-LIM protein mystique), PDLIM3 (also known as actinin-associated LIM protein, alpha-actinin-2-associated LIM protein, ALP), PDLIM4 (also known as LIM protein RIL, Reversion-induced LIM protein), PDLIM5 (also known as enigma homolog, ENH, enigma-like PDZ and LIM domains protein), PDLIM6 (also known as LIM domain-binding protein 3, ZASP, Cypher, Oracle), and PDLIM7 (also known as PDZ and LIM domain protein 7, LIM mineralization protein, LMP; protein enigma). PDLIM1 has been shown to negatively regulate NF-kappaB-mediated signaling in the cytoplasm. PDLIM7 negatively regulates p53 through binding murine double minute 2 (MDM2). The PDZ domains of PDZ-LIM family proteins PDLIM1, 2, 3, 5, 6, 7 have been shown to bind actin. Other PDZ-LIM family PDZ domain binding partners include thyroid receptor interacting protein-6 (PDLIM4-PDZ), the LIM domain of PDLIM4 (PDLIM4-PDZ), tropomyosin (PDLIM7-PDZ), myotilin and calsarcin 1 (PDLIM6-PDZ), and proteins from the myotilin and FATZ (calsarcin/myozenin) families (PDLIM1, 3, 4, 6 PDZ domains). PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This PDLIM-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
