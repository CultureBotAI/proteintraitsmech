identifier: CDD:cd07408
label: "Staphylococcus aureus SA0022 and related proteins, N-terminal metallophosphatase domain. SA0022 is an uncharacterized Staphylococcus aureus UshA-like protein with two putative domains, an N-terminal metallophosphatase domain and  a C-terminal nucleotidase domain.  SA0022 also contains a putative C-terminal cell wall anchor domain.  The N-terminal metallophosphatase domain belongs to a large superfamily of distantly related metallophosphatases (MPPs) that includes: Mre11/SbcD-like exonucleases, Dbr1-like RNA lariat debranching enzymes, YfcE-like phosphodiesterases, purple acid phosphatases (PAPs), YbbF-like UDP-2,3-diacylglucosamine hydrolases, and acid sphingomyelinases (ASMases).  MPPs are functionally diverse, but all share a conserved domain with an active site consisting of two metal ions (usually manganese, iron, or zinc) coordinated with octahedral geometry by a cage of histidine, aspartate, and asparagine residues. The conserved domain is a double beta-sheet sandwich with a di-metal active site made up of residues located at the C-terminal side of the sheets. This domain is thought to allow for productive metal coordination."
definition: >-
  Staphylococcus aureus SA0022 and related proteins, N-terminal metallophosphatase domain. SA0022 is an uncharacterized Staphylococcus aureus UshA-like protein with two putative domains, an N-terminal metallophosphatase domain and a C-terminal nucleotidase domain. SA0022 also contains a putative C-terminal cell wall anchor domain. The N-terminal metallophosphatase domain belongs to a large superfamily of distantly related metallophosphatases (MPPs) that includes: Mre11/SbcD-like exonucleases, Dbr1-like RNA lariat debranching enzymes, YfcE-like phosphodiesterases, purple acid phosphatases (PAPs), YbbF-like UDP-2,3-diacylglucosamine hydrolases, and acid sphingomyelinases (ASMases). MPPs are functionally diverse, but all share a conserved domain with an active site consisting of two metal ions (usually manganese, iron, or zinc) coordinated with octahedral geometry by a cage of histidine, aspartate, and asparagine residues. The conserved domain is a double beta-sheet sandwich with a di-metal active site made up of residues located at the C-terminal side of the sheets. This domain is thought to allow for productive metal coordination. — an NCBI CDD conserved domain (cd07408); members share this curated model.
