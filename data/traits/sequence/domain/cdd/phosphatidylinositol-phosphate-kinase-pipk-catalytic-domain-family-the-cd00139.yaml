identifier: CDD:cd00139
label: "Phosphatidylinositol phosphate kinase (PIPK) catalytic domain family. The Phosphatidylinositol phosphate kinase (PIPK) catalytic domain family includes phosphatidylinositol 5-phosphate 4-kinases (PIP5Ks) and similar proteins. PIP5Ks catalyze the phosphorylation of phosphatidylinositol phosphate on the fourth or fifth hydroxyl of the inositol ring, to form phosphatidylinositol bisphosphate. The family includes type I and II PIP5Ks (-alpha, -beta, and -gamma) kinases. Signalling by phosphorylated species of phosphatidylinositol regulates secretion, vesicular trafficking, membrane translocation, cell adhesion, chemotaxis, DNA synthesis, and cell cycling."
definition: >-
  Phosphatidylinositol phosphate kinase (PIPK) catalytic domain family. The Phosphatidylinositol phosphate kinase (PIPK) catalytic domain family includes phosphatidylinositol 5-phosphate 4-kinases (PIP5Ks) and similar proteins. PIP5Ks catalyze the phosphorylation of phosphatidylinositol phosphate on the fourth or fifth hydroxyl of the inositol ring, to form phosphatidylinositol bisphosphate. The family includes type I and II PIP5Ks (-alpha, -beta, and -gamma) kinases. Signalling by phosphorylated species of phosphatidylinositol regulates secretion, vesicular trafficking, membrane translocation, cell adhesion, chemotaxis, DNA synthesis, and cell cycling. — an NCBI CDD conserved domain (cd00139); members share this curated model.
