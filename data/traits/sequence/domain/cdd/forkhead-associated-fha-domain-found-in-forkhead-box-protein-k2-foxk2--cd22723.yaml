identifier: CDD:cd22723
label: "forkhead associated (FHA) domain found in forkhead box protein K2 (FOXK2) and similar proteins. FOXK2, also called cellular transcription factor ILF-1, or interleukin enhancer-binding factor 1, is a transcriptional regulator that recognizes the core sequence 5'-TAAACA-3'. It binds to NFAT-like motifs (purine-rich) in the IL2 promoter. It also binds to HIV-1 long terminal repeat. FOXK2 may be involved in both positive and negative regulation of important viral and cellular promoter elements. In addition, FOXK2 plays a critical role in suppressing tumorigenesis. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in forkhead box protein K2 (FOXK2) and similar proteins. FOXK2, also called cellular transcription factor ILF-1, or interleukin enhancer-binding factor 1, is a transcriptional regulator that recognizes the core sequence 5'-TAAACA-3'. It binds to NFAT-like motifs (purine-rich) in the IL2 promoter. It also binds to HIV-1 long terminal repeat. FOXK2 may be involved in both positive and negative regulation of important viral and cellular promoter elements. In addition, FOXK2 plays a critical role in suppressing tumorigenesis. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22723); members share this curated model.
