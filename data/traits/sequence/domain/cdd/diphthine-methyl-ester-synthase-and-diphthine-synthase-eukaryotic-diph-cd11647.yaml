identifier: CDD:cd11647
label: "diphthine methyl ester synthase and diphthine synthase. Eukaryotic diphthine methyl ester synthase (DHP5) and archaeal diphthamide synthase (DphB) participate in the second step of the biosynthetic pathway of diphthamide. The eukaryotic enzyme catalyzes four methylations of the modified target histidine residue in translation elongation factor 2 (EF-2), to form an intermediate called diphthine methyl ester; the archaeal enzyme, catalyzes only 3 methylations, producing diphthine. Diphtheria toxin ADP-ribosylates diphthamide leading to inhibition of protein synthesis in the eukaryotic host cells."
definition: >-
