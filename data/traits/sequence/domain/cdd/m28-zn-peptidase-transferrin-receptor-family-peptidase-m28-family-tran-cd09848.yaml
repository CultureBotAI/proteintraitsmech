identifier: CDD:cd09848
label: "M28 Zn-peptidase Transferrin Receptor family. Peptidase M28 family; Transferrin Receptor (TfR) subfamily. TfRs are homodimeric type II transmembrane proteins containing three distinct domains: protease-like, apical or protease-associated (PA), and helical domains. The protease-like domain is a large extracellular portion (ectodomain). In TfR, it contains a binding site for the transferrin molecule and has 28% identity to membrane glutamate carboxypeptidase II (mGCP-II or PSMA). The PA domain is inserted between the first and second strands of the central beta sheet in the protease-like domain. TfR1 is widely expressed, and is a key player in the uptake of iron-loaded transferrin (Tf) into cells. The TfR1 homodimer binds two molecules of Tf and the complex is then internalized. TfR1 may also participate in cell growth and proliferation. TfR2 binds Tf but with a significantly lower affinity than TfR1. It is expressed chiefly in hepatocytes, hematopoietic cells, and duodenal crypt cells; its expression overlaps with that of hereditary hemochromatosis protein (HFE). TfR2 is involved in iron homeostasis; in humans, mutations in TfR2 are associated with a form of hemochromatosis (HFE3). While related in sequence to peptidase M28 glutamate carboxypeptidase II (also called prostate-specific membrane antigen or PSMA), TfR lacks the metal ion coordination centers and protease activity of that group."
definition: >-
  M28 Zn-peptidase Transferrin Receptor family. Peptidase M28 family; Transferrin Receptor (TfR) subfamily. TfRs are homodimeric type II transmembrane proteins containing three distinct domains: protease-like, apical or protease-associated (PA), and helical domains. The protease-like domain is a large extracellular portion (ectodomain). In TfR, it contains a binding site for the transferrin molecule and has 28% identity to membrane glutamate carboxypeptidase II (mGCP-II or PSMA). The PA domain is inserted between the first and second strands of the central beta sheet in the protease-like domain. TfR1 is widely expressed, and is a key player in the uptake of iron-loaded transferrin (Tf) into cells. The TfR1 homodimer binds two molecules of Tf and the complex is then internalized. TfR1 may also participate in cell growth and proliferation. TfR2 binds Tf but with a significantly lower affinity than TfR1. It is expressed chiefly in hepatocytes, hematopoietic cells, and duodenal crypt cells; its expression overlaps with that of hereditary hemochromatosis protein (HFE). TfR2 is involved in iron homeostasis; in humans, mutations in TfR2 are associated with a form of hemochromatosis (HFE3). While related in sequence to peptidase M28 glutamate carboxypeptidase II (also called prostate-specific membrane antigen or PSMA), TfR lacks the metal ion coordination centers and protease activity of that group. — an NCBI CDD conserved domain (cd09848); members share this curated model.
