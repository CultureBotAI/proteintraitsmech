identifier: CDD:cd17941
label: "DEAD-box helicase domain of DEAD box protein 10. Fusion of the DDX10 gene and the nucleoporin gene, NUP98, by inversion 11 (p15q22) chromosome translocation is found in the patients with de novo or therapy-related myeloid malignancies. Diseases associated with DDX10 (also known as DDX10-NUP98 Fusion Protein Type 2) include myelodysplastic syndrome and leukemia, acute myeloid. DDX10 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of DEAD box protein 10. Fusion of the DDX10 gene and the nucleoporin gene, NUP98, by inversion 11 (p15q22) chromosome translocation is found in the patients with de novo or therapy-related myeloid malignancies. Diseases associated with DDX10 (also known as DDX10-NUP98 Fusion Protein Type 2) include myelodysplastic syndrome and leukemia, acute myeloid. DDX10 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17941); members share this curated model.
