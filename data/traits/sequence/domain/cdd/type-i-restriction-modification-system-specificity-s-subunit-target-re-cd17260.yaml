identifier: CDD:cd17260
label: "Type I restriction-modification system specificity (S) subunit Target Recognition Domain-ConseRved domain (TRD-CR), similar to S.EcoEI TRD1-CR1, S.EcoJA17PI TRD1-CR1, S.EcoJA23PI TRD1-CR1, and S.StyLTIII TRD1-CR1. Escherichia coli A58 S subunit (S.EcoEI) recognizes 5'... GAGNNNNNNNATGC ... 3', Escherichia coli UCD_JA17_pb S subunit (S.EcoJA17PI) and Escherichia coli UCD_JA23_pb S subunit (S.EcoJA23PI) recognize 5'... GAGNNNNNNNGTCA ... 3', and Salmonella typhimurium LT7 S subunit (S.StyLTIII) recognizes 5'... GAGNNNNNNRTAYG ... 3'. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. For example: S.EcoEI TRD1 and S.StyLTIII TRD1 recognize GAG/CTC, S.EcoEI TRD2 recognizes GCAT/ATGC, and S.StyLTIII TRD2 recognizes CRTAY/RTAYG. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains both TRD1-CR1 and TRD2-CR2. It also includes TRD-CR-like sequence-recognition domains of various type II restriction enzymes and methyltransferases, such as Pseudomonas putida Jo 4-731 Type IIG restriction enzyme/N6-adenine DNA methyltransferas RM.PpiI and Porphyromonas macacae COT-192 OH2631 RM.Pma2631ORF8845P, as well as type I DNA methyltransferases such as Chlorobium limicola M.Cli245ORF128P. RM.PpiI recognizes the sequence 5' ... GAACNNNNNCTC ... 3'."
