identifier: CDD:cd11454
label: "basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana protein INDEHISCENT (IND) and similar proteins. The family includes several bHLH transcription factors from Arabidopsis thaliana, such as IND, HEC proteins (HEC1, HEC2 and HEC3) and UNE12. IND, also termed AtbHLH40, or EN 120, is a bHLH transcription regulator required for seed dispersal. It is involved in the differentiation of all three cell types required for fruit dehiscence. HEC1 (also termed AtbHLH88, or protein HECATE 1, or EN 118), HEC2 (also termed AtbHLH37, or protein HECATE 2, or EN 117) and HEC3 (also termed AtbHLH43, or protein HECATE 3, or EN 119) are required for the female reproductive tract development and fertility. Both IND and HEC proteins have been implicated in regulation of auxin signaling. They heterodimerize with SPATULA (SPT) bHLH transcription factor to regulate reproductive tract development in plant. UNE12, also termed AtbHLH59, or protein UNFERTILIZED EMBRYO SAC 12, or EN 93, is required for ovule fertilization."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana protein INDEHISCENT (IND) and similar proteins. The family includes several bHLH transcription factors from Arabidopsis thaliana, such as IND, HEC proteins (HEC1, HEC2 and HEC3) and UNE12. IND, also termed AtbHLH40, or EN 120, is a bHLH transcription regulator required for seed dispersal. It is involved in the differentiation of all three cell types required for fruit dehiscence. HEC1 (also termed AtbHLH88, or protein HECATE 1, or EN 118), HEC2 (also termed AtbHLH37, or protein HECATE 2, or EN 117) and HEC3 (also termed AtbHLH43, or protein HECATE 3, or EN 119) are required for the female reproductive tract development and fertility. Both IND and HEC proteins have been implicated in regulation of auxin signaling. They heterodimerize with SPATULA (SPT) bHLH transcription factor to regulate reproductive tract development in plant. UNE12, also termed AtbHLH59, or protein UNFERTILIZED EMBRYO SAC 12, or EN 93, is required for ovule fertilization. — an NCBI CDD conserved domain (cd11454); members share this curated model.
