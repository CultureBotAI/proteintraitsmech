identifier: CDD:cd13038
label: LamG_Caspr1-1
definition: >-
  Laminin G domain repeat 1 of contactin-associated protein 1 (CASPR1). Casprs are located in the paranodal and juxtaparanodal regions of the nodes of Ranvier, that seperate the myelinated axon segments in the central nervous system (CNS) and the peripheral nervous system (PNS). Caspr1 (paranodin or neurexin IV ) and contactin are located at the paranodes, and K+ channels and Caspr2 at the juxtaparanodal region. Casp1 has a large extracellular region, a single transmembrane segment and a short intracellular region. Its extracellular region contains a factor VIII/discoidin domain, two repetitions of an EGF domains flanked by laminin G domains, interrupted by a fibrinogen-like sequence and a Pro-Gly-Tyr repeat. It plays a central role in the formation of paranodal junctions and therefore in the integrity of myelinated fibers. In general, proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold
