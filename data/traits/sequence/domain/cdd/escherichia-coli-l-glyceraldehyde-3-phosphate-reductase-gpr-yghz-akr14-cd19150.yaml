identifier: CDD:cd19150
label: "Escherichia coli L-glyceraldehyde 3-phosphate reductase (GPR/YghZ/AKR14A1) and similar proteins. Escherichia coli L-glyceraldehyde 3-phosphate reductase (GPR/YghZ), also called GAP reductase, is a founding member of aldo-keto reductase family 14 member A1 (AKR14A1). It catalyzes the stereospecific, NADPH-dependent reduction of L-glyceraldehyde 3-phosphate (L-GAP). It is also involved in the stress response as a methylglyoxal reductase which converts the toxic metabolite methylglyoxal to acetol in vitro and in vivo."
definition: >-
  Escherichia coli L-glyceraldehyde 3-phosphate reductase (GPR/YghZ/AKR14A1) and similar proteins. Escherichia coli L-glyceraldehyde 3-phosphate reductase (GPR/YghZ), also called GAP reductase, is a founding member of aldo-keto reductase family 14 member A1 (AKR14A1). It catalyzes the stereospecific, NADPH-dependent reduction of L-glyceraldehyde 3-phosphate (L-GAP). It is also involved in the stress response as a methylglyoxal reductase which converts the toxic metabolite methylglyoxal to acetol in vitro and in vivo. — an NCBI CDD conserved domain (cd19150); members share this curated model.
