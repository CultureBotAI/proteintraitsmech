identifier: CDD:cd23592
label: "extracellular domain (ECD), Ly6/uPAR superfamily, three finger domain (TFD) fold, found in Drosophila melanogaster protein crooked and similar proteins. Crooked (Crok) is a glycosylphosphatidylinositol (GPI)-anchored protein that plays an essential role in septa formation, the membrane accumulation of SJ components and paracellular barrier functions. It required for septate junction (SJ) formation and function in a tissue-autonomous manner. Crooked is specifically required for correct membrane trafficking of Neurexin IV, a central SJ component. Crooked is a member of the Drosophila Ly6 superfamily. It contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
