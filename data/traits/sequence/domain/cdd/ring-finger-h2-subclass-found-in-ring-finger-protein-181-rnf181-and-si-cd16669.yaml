identifier: CDD:cd16669
label: "RING finger, H2 subclass, found in RING finger protein 181 (RNF181) and similar proteins. RNF181, also known as HSPC238, is a platelet E3 ubiquitin-protein ligase containing a C3H2C3-type RING-H2 finger. It interacts with the KVGFFKR motif of platelet integrin alpha(IIb)beta3, suggesting a role for RNF181-mediated ubiquitination in integrin and platelet signaling. It also suppresses the tumorigenesis of hepatocellular carcinoma (HCC) through the inhibition of extracellular signal-regulated kinase/mitogen-activated protein kinase (ERK/MAPK) signaling in the liver."
definition: >-
