identifier: CDD:cd09391
label: "The first LIM domain of Lrg1p, a LIM and RhoGap domain containing protein. The first LIM domain of Lrg1p, a LIM and RhoGap domain containing protein: The members of this family contain three tandem repeats of LIM domains and a Rho-type GTPase activating protein (RhoGap) domain. Lrg1p is a Rho1 GTPase-activating protein required for efficient cell fusion in yeast. Lrg1p-GAP domain strongly and specifically stimulates the GTPase activity of Rho1p, a regulator of beta (1-3)-glucan synthase in vitro. The LIM domain is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein."
definition: >-
  The first LIM domain of Lrg1p, a LIM and RhoGap domain containing protein. The first LIM domain of Lrg1p, a LIM and RhoGap domain containing protein: The members of this family contain three tandem repeats of LIM domains and a Rho-type GTPase activating protein (RhoGap) domain. Lrg1p is a Rho1 GTPase-activating protein required for efficient cell fusion in yeast. Lrg1p-GAP domain strongly and specifically stimulates the GTPase activity of Rho1p, a regulator of beta (1-3)-glucan synthase in vitro. The LIM domain is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein. — an NCBI CDD conserved domain (cd09391); members share this curated model.
