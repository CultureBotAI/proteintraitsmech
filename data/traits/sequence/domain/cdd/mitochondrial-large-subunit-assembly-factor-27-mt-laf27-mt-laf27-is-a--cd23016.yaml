identifier: CDD:cd23016
label: mt-LAF27
definition: >-
  mitochondrial large subunit assembly factor 27 (mt-LAF27). mt-LAF27 is a mitochondrial large subunit assembly factor (mt-LAF) found in Trypanosomatids. In Trypanosoma brucei, mt-LAF27 is involved in the rearrangement of the H32-35 region of rRNA, together with other assembly factors such as mt-LAF21, mt-LAF22, KRIPP3, mt-LAF20, and mt-LAF28, as well as GTPases mt-EngA, mt-EngB, and Mtg1. The T. brucei mitochondrial ribosome (mitoribosome) has 28 assembly factors, 6 of which are homologous to bacterial and eukaryotic ribosome assembly factors. Mitoribosome assembly factors interact with the partially folded rRNA by specifically recognizing functionally important regions. The T. brucei mitoribosomal large subunit (mtLSU) accommodates the peptidyl transferase center (PTC) that catalyzes formation of peptide bonds between amino acids, tRNA-binding sites, the L7/L12 stalk that is responsible for the recruitment of translation factors, the L1 stalk, the central protuberance (CP) that facilitates communication between various functional sites, and the exit tunnel to egress a synthesized protein. Mitoribosomal biogenesis relies on an extensive protein network formed by the assembly factors that connect a premature PTC, the L1, and L7/L12 stalks with the CP, while the exit tunnel is blocked. The study of mitochondrial biogenesis in resource organisms is biomedically important since mutations in mitoribosomal proteins, rRNAs, and assembly factors have been linked to a heterogeneous group of human multi-systemic oxidative phosphorylation (OXPHOS) diseases and cancer development and progression
