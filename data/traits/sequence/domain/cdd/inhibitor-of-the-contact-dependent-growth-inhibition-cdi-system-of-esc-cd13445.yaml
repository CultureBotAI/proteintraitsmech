identifier: CDD:cd13445
label: CDI_inhibitor_EC869_like
definition: >-
  Inhibitor of the contact-dependent growth inhibition (CDI) system of Escherichia coli EC869, and related proteins. CDI toxins are expressed by gram-negative bacteria as part of a mechanism to inhibit the growth of neighboring bacteria. This model represents the inhibitor of the CdiA effector protein from Escherichia coli EC869 (which is a DNAse). CdiA secretion is dependent on the outer membrane protein CdiB. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered. The inhibitors are intracellular proteins that inactivate the toxin/effector protein. This domain is also known as DUF1436
