identifier: CDD:cd21372
label: "cwf21 domain found in fungal complexed with CEF1 protein 21 (CWC21) and similar proteins. This subfamily includes complexed with CEF1 protein 21 (CWC21) from budding yeast, complexed with cdc5 protein 21 (CWF21) from fission yeast, as well as their orthologs, serine/arginine repetitive matrix proteins (SRRM2 and SRRM3) from vertebrates. Both CWC21 and CWF21 are pre-mRNA-splicing factors that may function at or prior to the first catalytic step of splicing at the catalytic center of the spliceosome, together with ISY1. SRRM2 is required for pre-mRNA splicing as a component of the spliceosome. SRRM3 may play a role in regulating breast cancer cell invasiveness. It may be involved in RYBP-mediated breast cancer progression. Members of this family contain a cwf21 domain at the N-terminus. The cwf21 domain is involved in mRNA splicing; it binds directly to the spliceosomal protein Prp8."
definition: >-
  cwf21 domain found in fungal complexed with CEF1 protein 21 (CWC21) and similar proteins. This subfamily includes complexed with CEF1 protein 21 (CWC21) from budding yeast, complexed with cdc5 protein 21 (CWF21) from fission yeast, as well as their orthologs, serine/arginine repetitive matrix proteins (SRRM2 and SRRM3) from vertebrates. Both CWC21 and CWF21 are pre-mRNA-splicing factors that may function at or prior to the first catalytic step of splicing at the catalytic center of the spliceosome, together with ISY1. SRRM2 is required for pre-mRNA splicing as a component of the spliceosome. SRRM3 may play a role in regulating breast cancer cell invasiveness. It may be involved in RYBP-mediated breast cancer progression. Members of this family contain a cwf21 domain at the N-terminus. The cwf21 domain is involved in mRNA splicing; it binds directly to the spliceosomal protein Prp8. — an NCBI CDD conserved domain (cd21372); members share this curated model.
