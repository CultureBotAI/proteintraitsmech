identifier: CDD:cd14064
label: "Catalytic domain of the Dual-specificity protein kinase, TNNI3-interacting kinase. Dual-specificity PKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine as well as tyrosine residues on protein substrates. TNNI3K, also called cardiac ankyrin repeat kinase (CARK), is a cardiac-specific troponin I-interacting kinase that promotes cardiac myogenesis, improves cardiac performance, and protects the myocardium from ischemic injury. It contains N-terminal ankyrin repeats, a catalytic kinase domain, and a C-terminal serine-rich domain. TNNI3K exerts a disease-accelerating effect on cardiac dysfunction and reduced survival in mouse models of cardiomyopathy. The TNNI3K subfamily is part of a larger superfamily that includes the catalytic domains of other protein serine/threonine PKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Dual-specificity protein kinase, TNNI3-interacting kinase. Dual-specificity PKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine as well as tyrosine residues on protein substrates. TNNI3K, also called cardiac ankyrin repeat kinase (CARK), is a cardiac-specific troponin I-interacting kinase that promotes cardiac myogenesis, improves cardiac performance, and protects the myocardium from ischemic injury. It contains N-terminal ankyrin repeats, a catalytic kinase domain, and a C-terminal serine-rich domain. TNNI3K exerts a disease-accelerating effect on cardiac dysfunction and reduced survival in mouse models of cardiomyopathy. The TNNI3K subfamily is part of a larger superfamily that includes the catalytic domains of other protein serine/threonine PKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14064); members share this curated model.
