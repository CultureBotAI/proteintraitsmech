identifier: CDD:cd11274
label: "The Sema domain, a protein interacting module, of Plexin A4. Plexin A4 forms a receptor complex with neuropilins (NRPs) and transduces signals for class 3 semaphorins in the nervous system. It regulates facial nerve development by functioning as a receptor for Sema3A/NRP1. Both plexins A3 and A4 are essential for normal sympathetic development. They function both cooperatively, to regulate the migration of sympathetic neurons, and differentially, to guide sympathetic axons. Plexin A4 is also expressed in lymphoid tissues and functions in the immune system. It negatively regulates T lymphocyte responses. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a ligand-recognition and -binding module."
definition: >-
