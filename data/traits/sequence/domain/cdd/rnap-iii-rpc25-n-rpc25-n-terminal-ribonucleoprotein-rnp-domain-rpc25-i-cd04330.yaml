identifier: CDD:cd04330
label: "RNAP_III_Rpc25_N: Rpc25, N-terminal ribonucleoprotein (RNP) domain. Rpc25 is a subunit of eukaryotic RNA polymerase (RNAP) III and is homologous to Rpa43 of eukaryotic RNAP I, Rpb7 of eukaryotic RNAP II, and RpoE of archaeal RNAP. Rpc25 has two domains, an N-terminal RNP domain and a C-terminal oligonucleotide-binding (OB) domain, both of which are thought to bind single-stranded RNA. Rpc25 heterodimerizes with Rpc17 and plays an important role in transcription initiation. RNAP III transcribes diverse structural and catalytic RNAs including 5S ribosomal RNAs, tRNAs, and a small number of snRNAs involved in RNA and protein synthesis."
definition: >-
  RNAP_III_Rpc25_N: Rpc25, N-terminal ribonucleoprotein (RNP) domain. Rpc25 is a subunit of eukaryotic RNA polymerase (RNAP) III and is homologous to Rpa43 of eukaryotic RNAP I, Rpb7 of eukaryotic RNAP II, and RpoE of archaeal RNAP. Rpc25 has two domains, an N-terminal RNP domain and a C-terminal oligonucleotide-binding (OB) domain, both of which are thought to bind single-stranded RNA. Rpc25 heterodimerizes with Rpc17 and plays an important role in transcription initiation. RNAP III transcribes diverse structural and catalytic RNAs including 5S ribosomal RNAs, tRNAs, and a small number of snRNAs involved in RNA and protein synthesis. — an NCBI CDD conserved domain (cd04330); members share this curated model.
