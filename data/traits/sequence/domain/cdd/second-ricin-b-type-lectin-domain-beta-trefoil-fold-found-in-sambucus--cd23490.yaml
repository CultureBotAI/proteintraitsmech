identifier: CDD:cd23490
label: "second ricin B-type lectin domain, beta-trefoil fold, found in Sambucus ebulus ebulin I and similar proteins. This subfamily includes Sambucus ebulus ebulin I and Sambucus nigra nigrin b (also known as agglutinin V or SNAV), SNAI (also known as agglutinin I), SNAI' and SNAIf. Ebulin l is a type II ribosome-inactivating protein (RIP) isolated from the leaves of Sambucus ebulus. It is a disulfide-linked heterodimer composed of a toxic A chain and a galactoside-specific lectin B chain. It is considered a nontoxic type II RIP due to a reduced cytotoxicity on whole cells and animals as compared with other toxic type II RIP like ricin. Ebulin l binds an A-chain substrate analogue, pteroic acid. It binds bind galactose and lactose in subdomain 1alpha in a similar manner to that of ricin. In contrast, it binds only the monosaccharide galactose, and not the disaccharide lactose in subdomain 2gamma. SNAV is a non-toxic GalNAc-specific type II RIP which strongly inhibits mammalian protein synthesis but does not affect plant nor bacterial protein synthesis. SNAI is Neu5Ac(alpha2-6)Gal/GalNAc specific agglutinin. It also acts as a type II RIP that strongly inhibits mammalian but not plant ribosomes. SNAI' is another NeuAc(alpha2,6)Gal/GalNAc binding type II RIP from elderberry (Sambucus nigra) bark. It is a minor bark protein which closely resembles the major Neu5Ac(alpha2,6)Gal/GalNAc binding type II RIP, SNAI, with respect to its carbohydrate-binding specificity and ribosome-inactivating activity but has a different molecular structure due to a single cysteine residue present in the B chain of SNAI but absent from SNAI'. SNAIf is fruit specific SNAI. It functions as fetuin-binding fruit lectin. Like Ebulin l, SNAV, SNAI, SNAI' and SNAIf consist of a sugar-binding B chain linked via a disulfide bond to the catalytically active A chain. The A chain is responsible for inhibiting protein synthesis through the catalytic inactivation of 60S ribosomal subunits by removing adenine from position 4,324 of 28S rRNA. The B chain binds to cell receptors and probably facilitates the entry into the cell of the A chain. It may also be responsible for cell agglutination (lectin activity). The B chain contains two ricin B-type lectin domains with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The model corresponds to the second ricin B-type lectin domain."
definition: >-
  second ricin B-type lectin domain, beta-trefoil fold, found in Sambucus ebulus ebulin I and similar proteins. This subfamily includes Sambucus ebulus ebulin I and Sambucus nigra nigrin b (also known as agglutinin V or SNAV), SNAI (also known as agglutinin I), SNAI' and SNAIf. Ebulin l is a type II ribosome-inactivating protein (RIP) isolated from the leaves of Sambucus ebulus. It is a disulfide-linked heterodimer composed of a toxic A chain and a galactoside-specific lectin B chain. It is considered a nontoxic type II RIP due to a reduced cytotoxicity on whole cells and animals as compared with other toxic type II RIP like ricin. Ebulin l binds an A-chain substrate analogue, pteroic acid. It binds bind galactose and lactose in subdomain 1alpha in a similar manner to that of ricin. In contrast, it binds only the monosaccharide galactose, and not the disaccharide lactose in subdomain 2gamma. SNAV is a non-toxic GalNAc-specific type II RIP which strongly inhibits mammalian protein synthesis but does not affect plant nor bacterial protein synthesis. SNAI is Neu5Ac(alpha2-6)Gal/GalNAc specific agglutinin. It also acts as a type II RIP that strongly inhibits mammalian but not plant ribosomes. SNAI' is another NeuAc(alpha2,6)Gal/GalNAc binding type II RIP from elderberry (Sambucus nigra) bark. It is a minor bark protein which closely resembles the major Neu5Ac(alpha2,6)Gal/GalNAc binding type II RIP, SNAI, with respect to its carbohydrate-binding specificity and ribosome-inactivating activity but has a different molecular structure due to a single cysteine residue present in the B chain of SNAI but absent from SNAI'. SNAIf is fruit specific SNAI. It functions as fetuin-binding fruit lectin. Like Ebulin l, SNAV, SNAI, SNAI' and SNAIf consist of a sugar-binding B chain linked via a disulfide bond to the catalytically active A chain. The A chain is responsible for inhibiting protein synthesis through the catalytic inactivation of 60S ribosomal subunits by removing adenine from position 4,324 of 28S rRNA. The B chain binds to cell receptors and probably facilitates the entry into the cell of the A chain. It may also be responsible for cell agglutination (lectin activity). The B chain contains two ricin B-type lectin domains with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The model corresponds to the second ricin B-type lectin domain. — an NCBI CDD conserved domain (cd23490); members share this curated model.
