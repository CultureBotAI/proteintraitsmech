label: "high mobility group (HMG)-box found in WD repeat and HMG-box DNA-binding protein 1 (WDHD1) and similar proteins. WDHD1, also called acidic nucleoplasmic DNA-binding protein 1 (And-1), acts as a replication initiation factor that brings together the MCM2-7 helicase and the DNA polymerase alpha/primase complex in order to initiate DNA replication."
