identifier: CDD:cd17483
label: "Autophagy-related protein 22 and similar proteins; member of the Major Facilitator Superfamily of transporters. Atg22 (also known as Aut4) protein functions as a vacuolar effluxer which mediates the efflux of amino acids resulting from autophagic degradation. The release of autophagic amino acids allows the maintenance of protein synthesis and viability during nitrogen starvation. Members of this family belong to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Autophagy-related protein 22 and similar proteins; member of the Major Facilitator Superfamily of transporters. Atg22 (also known as Aut4) protein functions as a vacuolar effluxer which mediates the efflux of amino acids resulting from autophagic degradation. The release of autophagic amino acids allows the maintenance of protein synthesis and viability during nitrogen starvation. Members of this family belong to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17483); members share this curated model.
