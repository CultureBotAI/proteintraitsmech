identifier: CDD:cd20394
label: "second Tudor domain found in SAGA-associated factor 29 (SGF29) and similar proteins. SGF29, also called coiled-coil domain-containing protein 101, or SAGA complex-associated factor 29, is a chromatin reader component of some histone acetyltransferase (HAT) SAGA-type complexes, like the TFTC-HAT, ATAC or STAGA complexes. It specifically recognizes and binds methylated 'Lys-4' of histone H3 (H3K4me), with a preference for trimethylated form (H3K4me3). SGF29 contains two Tudor domains. The model corresponds to the second one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  second Tudor domain found in SAGA-associated factor 29 (SGF29) and similar proteins. SGF29, also called coiled-coil domain-containing protein 101, or SAGA complex-associated factor 29, is a chromatin reader component of some histone acetyltransferase (HAT) SAGA-type complexes, like the TFTC-HAT, ATAC or STAGA complexes. It specifically recognizes and binds methylated 'Lys-4' of histone H3 (H3K4me), with a preference for trimethylated form (H3K4me3). SGF29 contains two Tudor domains. The model corresponds to the second one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20394); members share this curated model.
