identifier: CDD:cd10603
label: OAT_AF1815
definition: >-
  Pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily: Uncharacterized Archaeoglobus fulgidus AF1815 and homologs. Uncharacterized Archaeoglobus fulgidus AF1815 and similar putative aminotransferases are included in this subfamily of the Acetyl ornithine aminotransferase family. This family belongs to pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily (fold I). The major groups in this CD correspond to ornithine aminotransferase, acetylornithine aminotransferase, alanine-glyoxylate aminotransferase, dialkylglycine decarboxylase, 4-aminobutyrate aminotransferase, beta-alanine-pyruvate aminotransferase, adenosylmethionine-8-amino-7-oxononanoate aminotransferase, and glutamate-1-semialdehyde 2,1-aminomutase. These enzymes act on basic amino acids and their derivatives are involved in transamination or decarboxylation
