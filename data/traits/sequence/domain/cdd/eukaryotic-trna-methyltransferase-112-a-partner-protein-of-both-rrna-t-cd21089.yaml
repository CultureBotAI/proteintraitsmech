identifier: CDD:cd21089
label: "eukaryotic tRNA methyltransferase 112, a partner protein of both rRNA/tRNA and protein methyltransferases, and similar proteins. This family contains eukaryotic tRNA methyltransferase 112 (Trm112)-like proteins such as human multifunctional methyltransferase subunit Trm112 protein, which acts as an activator of both rRNA/tRNA and protein methyltransferases. Trm112 acts as an obligate activating platform for at least four methyltransferases (MTase) involved in the modification of 18S rRNA (Bud23), tRNA (Trm9 and Trm11) and translation termination factor eRF1 (Mtq2) in eukaryotes. Hence, Trm112 is at a nexus between ribosome synthesis and function. Trm112 is a partner protein of N6amt1 (N6 -adenine-specific DNA methyltransferase 1), which is suggested to be the N6-adenine DNA methyltransferase (MTase) in human cells. Trm112 binds to a hydrophobic surface of N6amt1, stabilizing its structure but not directly contributing to substrate binding and catalysis. In Yarrowia lipolytica, it forms a complex with Trm9 methyltransferase, which is involved in the 5-methoxycarbonylmethyluridine (mcm(5)U) modification of the tRNA anticodon wobble position and hence promotes translational fidelity. In Saccharomyces cerevisiae, Trm112 (also called Ynr046w or tRNA methyltransferase 112) is a zinc binding protein that is plurifunctional and a component of the eRF1 methyltransferase, putatively containing a zinc finger signature motif."
definition: >-
  eukaryotic tRNA methyltransferase 112, a partner protein of both rRNA/tRNA and protein methyltransferases, and similar proteins. This family contains eukaryotic tRNA methyltransferase 112 (Trm112)-like proteins such as human multifunctional methyltransferase subunit Trm112 protein, which acts as an activator of both rRNA/tRNA and protein methyltransferases. Trm112 acts as an obligate activating platform for at least four methyltransferases (MTase) involved in the modification of 18S rRNA (Bud23), tRNA (Trm9 and Trm11) and translation termination factor eRF1 (Mtq2) in eukaryotes. Hence, Trm112 is at a nexus between ribosome synthesis and function. Trm112 is a partner protein of N6amt1 (N6 -adenine-specific DNA methyltransferase 1), which is suggested to be the N6-adenine DNA methyltransferase (MTase) in human cells. Trm112 binds to a hydrophobic surface of N6amt1, stabilizing its structure but not directly contributing to substrate binding and catalysis. In Yarrowia lipolytica, it forms a complex with Trm9 methyltransferase, which is involved in the 5-methoxycarbonylmethyluridine (mcm(5)U) modification of the tRNA anticodon wobble position and hence promotes translational fidelity. In Saccharomyces cerevisiae, Trm112 (also called Ynr046w or tRNA methyltransferase 112) is a zinc binding protein that is plurifunctional and a component of the eRF1 methyltransferase, putatively containing a zinc finger signature motif. — an NCBI CDD conserved domain (cd21089); members share this curated model.
