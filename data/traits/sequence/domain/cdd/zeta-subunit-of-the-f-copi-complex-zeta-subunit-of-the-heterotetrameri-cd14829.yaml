identifier: CDD:cd14829
label: "zeta subunit of the F-COPI complex. Zeta subunit of the heterotetrameric F-COPI complex, which consists of one beta-, one gamma-, one delta-, and one zeta subunit, where beta- and gamma- subunits are related to the large adaptor protein (AP) complex subunits, and delta- and zeta- subunits are related to the medium and small AP subunits, respectively. F-COPI forms a coatomer together with the B-COPI subcomplex, which assembles with a small GTPase, ADP-ribosylation factor 1 (ARF1), playing an important role in the formation of COPI complex-coated vesicles. COPI complex-coated vesicles function in the early secretory pathway mediating the retrograde transport from the Golgi to the ER, and intra-Golgi transport."
