identifier: CDD:cd20128
label: "fourth malignant brain tumor (MBT) repeat found in Drosophila melanogaster Polycomb protein Sfmbt (dSfmbt). dSfmbt, also called Scm-like with four MBT domain-containing protein 1, is a Polycomb group repressor involved in epigenetic regulation of gene expression. dSfmbt contains four MBT (malignant brain tumor) repeats. The MBT repeat is a protein module that recognizes methylated lysine residues on histones. MBT repeats contain a semi-aromatic cage to accommodate methyllysine and show specificity towards the lower methylation states of lysine. This model corresponds to the fourth MBT repeat that contains the semi-aromatic cage that binds methylated lysine residues."
definition: >-
  fourth malignant brain tumor (MBT) repeat found in Drosophila melanogaster Polycomb protein Sfmbt (dSfmbt). dSfmbt, also called Scm-like with four MBT domain-containing protein 1, is a Polycomb group repressor involved in epigenetic regulation of gene expression. dSfmbt contains four MBT (malignant brain tumor) repeats. The MBT repeat is a protein module that recognizes methylated lysine residues on histones. MBT repeats contain a semi-aromatic cage to accommodate methyllysine and show specificity towards the lower methylation states of lysine. This model corresponds to the fourth MBT repeat that contains the semi-aromatic cage that binds methylated lysine residues. — an NCBI CDD conserved domain (cd20128); members share this curated model.
