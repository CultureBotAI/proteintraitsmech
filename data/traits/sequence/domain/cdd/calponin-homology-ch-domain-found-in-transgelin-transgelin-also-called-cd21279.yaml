identifier: CDD:cd21279
label: "calponin homology (CH) domain found in transgelin. Transgelin, also called 22 kDa actin-binding protein, protein WS3-10, or smooth muscle protein 22-alpha (SM22-alpha), acts as an actin cross-linking/gelling protein that may be involved in calcium interactions and in regulating contractile properties of the cell. It may also contribute to replicative senescence. Transgelin contains a single copy of the CH domain. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  calponin homology (CH) domain found in transgelin. Transgelin, also called 22 kDa actin-binding protein, protein WS3-10, or smooth muscle protein 22-alpha (SM22-alpha), acts as an actin cross-linking/gelling protein that may be involved in calcium interactions and in regulating contractile properties of the cell. It may also contribute to replicative senescence. Transgelin contains a single copy of the CH domain. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21279); members share this curated model.
