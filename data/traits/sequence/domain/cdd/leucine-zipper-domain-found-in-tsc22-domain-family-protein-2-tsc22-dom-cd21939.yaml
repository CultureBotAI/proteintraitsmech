identifier: CDD:cd21939
label: "leucine zipper domain found in TSC22 domain family protein 2. TSC22 domain family protein 2 (TSC22D2), also called transforming growth factor beta-stimulated clone 22 domain family member 2, or TSC22-related-inducible leucine zipper protein 4 (TILZ4), may participate in the regulation of cell growth. It interacts with pyruvate kinase isoform M2 (PKM2) and WD repeat domain 77 (WDR77). The model corresponds to the conserved leucine zipper (ZIP) domain located at the C-terminus of TSC22D2. Its first helix is not basic and does not contain the consensus sequence, NXX(A)(A)XX(C/S)R, found in most basic region/leucine zipper (bZIP) proteins. Thus, the DNA-binding capability of the ZIP domain is not obvious. Similar to bZIP, ZIP forms homo- and heterodimers, resulting in many dimers that may have different effects on transcription."
definition: >-
  leucine zipper domain found in TSC22 domain family protein 2. TSC22 domain family protein 2 (TSC22D2), also called transforming growth factor beta-stimulated clone 22 domain family member 2, or TSC22-related-inducible leucine zipper protein 4 (TILZ4), may participate in the regulation of cell growth. It interacts with pyruvate kinase isoform M2 (PKM2) and WD repeat domain 77 (WDR77). The model corresponds to the conserved leucine zipper (ZIP) domain located at the C-terminus of TSC22D2. Its first helix is not basic and does not contain the consensus sequence, NXX(A)(A)XX(C/S)R, found in most basic region/leucine zipper (bZIP) proteins. Thus, the DNA-binding capability of the ZIP domain is not obvious. Similar to bZIP, ZIP forms homo- and heterodimers, resulting in many dimers that may have different effects on transcription. — an NCBI CDD conserved domain (cd21939); members share this curated model.
