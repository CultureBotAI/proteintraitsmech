identifier: CDD:cd04083
label: "Carbohydrate Binding Module 35 (CBM35) domains similar to Lmo2446. This family includes carbohydrate binding module 35 (CBM35) domains that are appended to several carbohydrate binding enzymes. Some CBM35 domains belonging to this family are appended to glycoside hydrolase (GH) family domains, including glycoside hydrolase family 31 (GH31), for example the CBM35 domain of Lmo2446, an uncharacterized protein from Listeria monocytogenes EGD-e. These CBM35s are non-catalytic carbohydrate binding domains that facilitate the strong binding of the GH catalytic modules with their dedicated, insoluble substrates. GH31 has a wide range of hydrolytic activities such as alpha-glucosidase, alpha-xylosidase, 6-alpha-glucosyltransferase, or alpha-1,4-glucan lyase, cleaving a terminal carbohydrate moiety from a substrate that may be a starch or a glycoprotein. Most characterized GH31 enzymes are alpha-glucosidases."
definition: >-
  Carbohydrate Binding Module 35 (CBM35) domains similar to Lmo2446. This family includes carbohydrate binding module 35 (CBM35) domains that are appended to several carbohydrate binding enzymes. Some CBM35 domains belonging to this family are appended to glycoside hydrolase (GH) family domains, including glycoside hydrolase family 31 (GH31), for example the CBM35 domain of Lmo2446, an uncharacterized protein from Listeria monocytogenes EGD-e. These CBM35s are non-catalytic carbohydrate binding domains that facilitate the strong binding of the GH catalytic modules with their dedicated, insoluble substrates. GH31 has a wide range of hydrolytic activities such as alpha-glucosidase, alpha-xylosidase, 6-alpha-glucosyltransferase, or alpha-1,4-glucan lyase, cleaving a terminal carbohydrate moiety from a substrate that may be a starch or a glycoprotein. Most characterized GH31 enzymes are alpha-glucosidases. — an NCBI CDD conserved domain (cd04083); members share this curated model.
