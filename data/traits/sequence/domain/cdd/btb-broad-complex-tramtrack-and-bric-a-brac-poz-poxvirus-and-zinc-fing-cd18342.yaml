identifier: CDD:cd18342
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in speckle-type POZ protein (SPOP). SPOP, also called HIB homolog 1 or Roadkill homolog 1, is a novel nuclear speckle-type protein which serves as an adaptor of a cullin-RING-based BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex that mediates the ubiquitination and proteasomal degradation of target proteins, such as BRMS1, DAXX, PDX1/IPF1, GLI2 and GLI3. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in speckle-type POZ protein (SPOP). SPOP, also called HIB homolog 1 or Roadkill homolog 1, is a novel nuclear speckle-type protein which serves as an adaptor of a cullin-RING-based BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex that mediates the ubiquitination and proteasomal degradation of target proteins, such as BRMS1, DAXX, PDX1/IPF1, GLI2 and GLI3. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18342); members share this curated model.
