identifier: CDD:cd17943
label: "DEAD-box helicase domain of DEAD box protein 20. DDX20 (also called DEAD Box Protein DP 103, Component Of Gems 3, Gemin-3, and SMN-Interacting Protein) interacts directly with SMN (survival of motor neurons), the spinal muscular atrophy gene product, and may play a catalytic role in the function of the SMN complex on ribonucleoproteins. Diseases associated with DDX20 include spinal muscular atrophy and muscular atrophy. DDX20 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
