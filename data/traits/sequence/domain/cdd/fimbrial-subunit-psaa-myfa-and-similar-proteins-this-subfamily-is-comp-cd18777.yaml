identifier: CDD:cd18777
label: "Fimbrial subunit PsaA, MyfA, and similar proteins. This subfamily is composed of Yersinia pestis PsaA, Yersinia enterocolitica MyfA, and similar proteins. PsaA and MyfA are the major subunits of pH 6 antigen (Psa) and Myf fimbrial homopolymers. Psa and Myf specifically recognize beta1-3- or beta1-4-linked galactose in glycosphingolipids, but while Psa also binds phosphatidylcholine, Myf does not. Psa has acquired a tyrosine-rich surface that enables it to bind to phosphatidylcholine and mediate adhesion of Y. pestis/pseudotuberculosis to alveolar cells. Myf has specialized as a carbohydrate-binding adhesin, facilitating the attachment of Y. enterocolitica to intestinal cells. During fimbria/pili assembly, polymerization occurs when the N-terminal extension (NTE) of one monomer is inserted into an adjacent monomer, providing the final beta strand or G-strand, to complete the Ig-like fold, in a mechanism called the donor-strand complementation (DSC) or donor-strand exchange (DSE)."
definition: >-
  Fimbrial subunit PsaA, MyfA, and similar proteins. This subfamily is composed of Yersinia pestis PsaA, Yersinia enterocolitica MyfA, and similar proteins. PsaA and MyfA are the major subunits of pH 6 antigen (Psa) and Myf fimbrial homopolymers. Psa and Myf specifically recognize beta1-3- or beta1-4-linked galactose in glycosphingolipids, but while Psa also binds phosphatidylcholine, Myf does not. Psa has acquired a tyrosine-rich surface that enables it to bind to phosphatidylcholine and mediate adhesion of Y. pestis/pseudotuberculosis to alveolar cells. Myf has specialized as a carbohydrate-binding adhesin, facilitating the attachment of Y. enterocolitica to intestinal cells. During fimbria/pili assembly, polymerization occurs when the N-terminal extension (NTE) of one monomer is inserted into an adjacent monomer, providing the final beta strand or G-strand, to complete the Ig-like fold, in a mechanism called the donor-strand complementation (DSC) or donor-strand exchange (DSE). — an NCBI CDD conserved domain (cd18777); members share this curated model.
