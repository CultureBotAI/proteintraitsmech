identifier: CDD:cd09514
label: "SAM domain of sphingomyelin synthase. SAM (sterile alpha motif) domain of SGMS-1 (sphingomyelin synthase) subfamily is a potential protein-protein interaction domain. Sphingomyelin synthase 1 is a transmembrane protein with a SAM domain at the N-terminus and a catalytic domain at the C-terminus. Sphingomyelin synthase 1 is a Golgi-associated enzyme, and depending on the concentration of diacylglycerol and ceramide, can catalyze synthesis phosphocholine or sphingomyelin, respectively. It plays a central role in sphingolipid and glycerophospholipid metabolism."
definition: >-
  SAM domain of sphingomyelin synthase. SAM (sterile alpha motif) domain of SGMS-1 (sphingomyelin synthase) subfamily is a potential protein-protein interaction domain. Sphingomyelin synthase 1 is a transmembrane protein with a SAM domain at the N-terminus and a catalytic domain at the C-terminus. Sphingomyelin synthase 1 is a Golgi-associated enzyme, and depending on the concentration of diacylglycerol and ceramide, can catalyze synthesis phosphocholine or sphingomyelin, respectively. It plays a central role in sphingolipid and glycerophospholipid metabolism. — an NCBI CDD conserved domain (cd09514); members share this curated model.
