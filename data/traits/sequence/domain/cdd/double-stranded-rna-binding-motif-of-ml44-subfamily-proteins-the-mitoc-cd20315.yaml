identifier: CDD:cd20315
label: "double-stranded RNA binding motif of mL44 subfamily proteins. The mitochondrion-specific ribosomal protein mL44 subfamily is composed of mitochondrial 54S ribosomal protein L3 (MRPL3) and mitochondrial 39S ribosomal protein L44 (MRPL44). MRPL3 (also known as mitochondrial large ribosomal subunit protein mL44) is a component of the mitochondrial ribosome (mitoribosome), a dedicated translation machinery responsible for the synthesis of mitochondrial genome-encoded proteins, including at least some of the essential transmembrane subunits of the mitochondrial respiratory chain. MRPL44 (also called L44mt, MRP-L44, or mitochondrial large ribosomal subunit protein mL44) is a component of the 39S subunit of mitochondrial ribosome. It may play a role in the assembly/stability of nascent mitochondrial polypeptides exiting the ribosome. Members of this family contain a RNase III-like domain and a double-stranded RNA binding motif (DSRM). DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  double-stranded RNA binding motif of mL44 subfamily proteins. The mitochondrion-specific ribosomal protein mL44 subfamily is composed of mitochondrial 54S ribosomal protein L3 (MRPL3) and mitochondrial 39S ribosomal protein L44 (MRPL44). MRPL3 (also known as mitochondrial large ribosomal subunit protein mL44) is a component of the mitochondrial ribosome (mitoribosome), a dedicated translation machinery responsible for the synthesis of mitochondrial genome-encoded proteins, including at least some of the essential transmembrane subunits of the mitochondrial respiratory chain. MRPL44 (also called L44mt, MRP-L44, or mitochondrial large ribosomal subunit protein mL44) is a component of the 39S subunit of mitochondrial ribosome. It may play a role in the assembly/stability of nascent mitochondrial polypeptides exiting the ribosome. Members of this family contain a RNase III-like domain and a double-stranded RNA binding motif (DSRM). DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd20315); members share this curated model.
