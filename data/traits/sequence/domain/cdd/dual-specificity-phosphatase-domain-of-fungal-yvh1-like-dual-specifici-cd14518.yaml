identifier: CDD:cd14518
label: "dual specificity phosphatase domain of fungal YVH1-like dual specificity protein phosphatase. This family is composed of Saccharomyces cerevisiae dual specificity protein phosphatase Yvh1 and similar fungal proteins. Yvh1 could function as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). It regulates cell growth, sporulation, and glycogen accumulation. It plays an important role in ribosome assembly. Yvh1 associates transiently with late pre-60S particles and is required for the release of the nucleolar/nuclear pre-60S factor Mrt4, which is necessary to construct a translation-competent 60S subunit and mature ribosome stalk. Yvh1 contains an N-terminal catalytic dual specificity phosphatase domain and a C-terminal tail."
definition: >-
  dual specificity phosphatase domain of fungal YVH1-like dual specificity protein phosphatase. This family is composed of Saccharomyces cerevisiae dual specificity protein phosphatase Yvh1 and similar fungal proteins. Yvh1 could function as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). It regulates cell growth, sporulation, and glycogen accumulation. It plays an important role in ribosome assembly. Yvh1 associates transiently with late pre-60S particles and is required for the release of the nucleolar/nuclear pre-60S factor Mrt4, which is necessary to construct a translation-competent 60S subunit and mature ribosome stalk. Yvh1 contains an N-terminal catalytic dual specificity phosphatase domain and a C-terminal tail. — an NCBI CDD conserved domain (cd14518); members share this curated model.
