identifier: CDD:cd17970
label: "DEAH-box helicase domain of Fanconi anemia group J protein and similar proteins. Fanconi anemia group J protein (FACJ or FANCJ, also known as BRIP1) is a DNA helicase required for the maintenance of chromosomal stability. It plays a role in the repair of DNA double-strand breaks by homologous recombination dependent on its interaction with BRCA1. FANCJ belongs to the DEAD-box helicase family, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAH-box helicase domain of Fanconi anemia group J protein and similar proteins. Fanconi anemia group J protein (FACJ or FANCJ, also known as BRIP1) is a DNA helicase required for the maintenance of chromosomal stability. It plays a role in the repair of DNA double-strand breaks by homologous recombination dependent on its interaction with BRCA1. FANCJ belongs to the DEAD-box helicase family, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17970); members share this curated model.
