identifier: CDD:cd16122
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in sorting nexin protein 31 (SNX31). SNX31 is a member of the family of cytoplasmic sorting nexin adaptor proteins that regulate endosomal trafficking of cell surface proteins. It is a novel sorting nexin associated with the uroplakin-degrading multivesicular bodies in terminally differentiated urothelial cells. SNX31 binds multiple beta integrin cytoplasmic domains and regulates beta1 integrin surface levels and stability. SNX31 contains a PX (Phox homology) domain and a FERM (Band 4.1, ezrin, radixin, moesin) domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in sorting nexin protein 31 (SNX31). SNX31 is a member of the family of cytoplasmic sorting nexin adaptor proteins that regulate endosomal trafficking of cell surface proteins. It is a novel sorting nexin associated with the uroplakin-degrading multivesicular bodies in terminally differentiated urothelial cells. SNX31 binds multiple beta integrin cytoplasmic domains and regulates beta1 integrin surface levels and stability. SNX31 contains a PX (Phox homology) domain and a FERM (Band 4.1, ezrin, radixin, moesin) domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd16122); members share this curated model.
