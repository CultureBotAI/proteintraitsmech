identifier: CDD:cd09632
label: "Periplasmic lysozyme inhibitor, I-type (PliI) and similar proteins. Aeromonas hydrophila PliI is a dimeric periplasmic protein that enables bacteria to resist permeabilization of the outer membrane by the bactericidal action of lysozyme. PliI may be a direct inhibitor of lysozyme that inserts a conserved loop into the active site of type I (invertebrate) lysozymes."
definition: >-
  Periplasmic lysozyme inhibitor, I-type (PliI) and similar proteins. Aeromonas hydrophila PliI is a dimeric periplasmic protein that enables bacteria to resist permeabilization of the outer membrane by the bactericidal action of lysozyme. PliI may be a direct inhibitor of lysozyme that inserts a conserved loop into the active site of type I (invertebrate) lysozymes. — an NCBI CDD conserved domain (cd09632); members share this curated model.
