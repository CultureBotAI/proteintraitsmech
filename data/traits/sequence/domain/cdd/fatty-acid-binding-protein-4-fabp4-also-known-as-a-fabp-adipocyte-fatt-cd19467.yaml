identifier: CDD:cd19467
label: "fatty acid binding protein 4. FABP4 (also known as A-FABP, adipocyte fatty acid binding protein, aP2) is highly expressed in macrophages and in adipocytes where it regulates fatty acid storage and lipolysis and is an important mediator of inflammation. It binds long chain fatty acids, retinoic acid and eicosanoids. This subgroup belongs to the intracellular fatty-acid binding protein (FABP) family, members of which are small proteins that bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
