identifier: CDD:cd20307
label: "Bacillus subtilis bacilysin and related proteins, N-terminal cupin domain. This model represents the N-terminal domain of bacilysin (BacB, also known as AerE in Microcystis aeruginosa), a non-ribosomally synthesized dipeptide antibiotic that is produced and excreted by certain strains of Bacillus subtilis. Bacilysin is an oxidase that catalyzes the synthesis of 2-oxo-3-(4-oxocyclohexa-2,5-dienyl)propanoic acid, a precursor to L-anticapsin. Each bacilysin monomer has two tandem cupin domains. It is active against a wide range of bacteria and some fungi. The antimicrobial activity of bacilysin is antagonized by glucosamine and N-acetyl glucosamine, indicating that bacilysin interferes with glucosamine synthesis, and thus, with the synthesis of microbial cell walls. AerE is thought to be involved in the formation of the 2-carboxy-6-hydroxyoctahydroindole (Choi) moiety found on all aeruginosin tetrapeptides, based on gene knock-out experiments. It is encoded by the aerE gene of the aerABCDEF Aeruginosin biosynthesis gene cluster in Microcystis aeruginosa. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold."
definition: >-
  Bacillus subtilis bacilysin and related proteins, N-terminal cupin domain. This model represents the N-terminal domain of bacilysin (BacB, also known as AerE in Microcystis aeruginosa), a non-ribosomally synthesized dipeptide antibiotic that is produced and excreted by certain strains of Bacillus subtilis. Bacilysin is an oxidase that catalyzes the synthesis of 2-oxo-3-(4-oxocyclohexa-2,5-dienyl)propanoic acid, a precursor to L-anticapsin. Each bacilysin monomer has two tandem cupin domains. It is active against a wide range of bacteria and some fungi. The antimicrobial activity of bacilysin is antagonized by glucosamine and N-acetyl glucosamine, indicating that bacilysin interferes with glucosamine synthesis, and thus, with the synthesis of microbial cell walls. AerE is thought to be involved in the formation of the 2-carboxy-6-hydroxyoctahydroindole (Choi) moiety found on all aeruginosin tetrapeptides, based on gene knock-out experiments. It is encoded by the aerE gene of the aerABCDEF Aeruginosin biosynthesis gene cluster in Microcystis aeruginosa. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold. — an NCBI CDD conserved domain (cd20307); members share this curated model.
