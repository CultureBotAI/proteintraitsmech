identifier: CDD:cd06659
label: "Catalytic domain of the Serine/Threonine Kinase, p21-activated kinase 6. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. PAK6 may play a role in stress responses through its activation by the mitogen-activated protein kinase (MAPK) p38 and MAPK kinase 6 (MKK6) pathway. PAK6 is highly expressed in the brain. It is not required for viability, but together with PAK5, it is required for normal levels of locomotion and activity, and for learning and memory. Increased expression of PAK6 is found in primary and metastatic prostate cancer. PAK6 may play a role in the regulation of motility. PAK6 belongs to the group II PAKs, which contain a PBD (p21-binding domain) and a C-terminal catalytic domain, but do not harbor an AID (autoinhibitory domain) or SH3 binding sites. PAKs are Rho family GTPase-regulated kinases that serve as important mediators in the function of Cdc42 (cell division cycle 42) and Rac. The PAK subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, p21-activated kinase 6. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. PAK6 may play a role in stress responses through its activation by the mitogen-activated protein kinase (MAPK) p38 and MAPK kinase 6 (MKK6) pathway. PAK6 is highly expressed in the brain. It is not required for viability, but together with PAK5, it is required for normal levels of locomotion and activity, and for learning and memory. Increased expression of PAK6 is found in primary and metastatic prostate cancer. PAK6 may play a role in the regulation of motility. PAK6 belongs to the group II PAKs, which contain a PBD (p21-binding domain) and a C-terminal catalytic domain, but do not harbor an AID (autoinhibitory domain) or SH3 binding sites. PAKs are Rho family GTPase-regulated kinases that serve as important mediators in the function of Cdc42 (cell division cycle 42) and Rac. The PAK subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd06659); members share this curated model.
