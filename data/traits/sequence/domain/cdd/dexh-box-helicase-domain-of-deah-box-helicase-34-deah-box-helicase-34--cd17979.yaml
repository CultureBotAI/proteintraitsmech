identifier: CDD:cd17979
label: "DEXH-box helicase domain of DEAH-box helicase 34. DEAH-box helicase 34 (DHX34) plays a role in the nonsense-mediated decay (NMD), a surveillance mechanism that degrades aberrant mRNAs. DHX34 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of DEAH-box helicase 34. DEAH-box helicase 34 (DHX34) plays a role in the nonsense-mediated decay (NMD), a surveillance mechanism that degrades aberrant mRNAs. DHX34 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17979); members share this curated model.
