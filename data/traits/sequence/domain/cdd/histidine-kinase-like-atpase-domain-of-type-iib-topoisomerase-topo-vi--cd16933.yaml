identifier: CDD:cd16933
label: "Histidine kinase-like ATPase domain of type IIB topoisomerase, Topo VI, subunit B. This family includes the histidine kinase-like ATPase (HATPase) domain of the B subunit of topoisomerase VI (Topo VIB). Topo VI is a heterotetrameric complex composed of two TopVIA and two TopVIB subunits and is categorized as a type II B DNA topoisomerase. It is found in archaea and also in plants. Type II enzymes cleave both strands of a DNA duplex and pass a second duplex through the resulting break in an ATP-dependent mechanism. DNA cleavage by Topo VI generates two-nucleotide 5'-protruding ends."
definition: >-
  Histidine kinase-like ATPase domain of type IIB topoisomerase, Topo VI, subunit B. This family includes the histidine kinase-like ATPase (HATPase) domain of the B subunit of topoisomerase VI (Topo VIB). Topo VI is a heterotetrameric complex composed of two TopVIA and two TopVIB subunits and is categorized as a type II B DNA topoisomerase. It is found in archaea and also in plants. Type II enzymes cleave both strands of a DNA duplex and pass a second duplex through the resulting break in an ATP-dependent mechanism. DNA cleavage by Topo VI generates two-nucleotide 5'-protruding ends. — an NCBI CDD conserved domain (cd16933); members share this curated model.
