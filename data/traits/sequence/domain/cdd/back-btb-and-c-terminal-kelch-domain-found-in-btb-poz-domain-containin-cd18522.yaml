identifier: CDD:cd18522
label: "BACK (BTB and C-terminal Kelch) domain found in BTB/POZ domain-containing protein 1 (BTBD1). BTBD1, also called Hepatitis C virus NS5A-transactivated protein 8 or HCV NS5A-transactivated protein 8, is a BTB-domain-containing Kelch-like protein specifically expressed in skeletal muscle. It interacts with DNA topoisomerase 1 (Topo1), a key enzyme in cell survival. BTBD1 and BTBD2 colocalize to cytoplasmic bodies with the RBCC/tripartite motif protein, TRIM5delta. It may serve as a substrate-specific adaptor of an E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in BTB/POZ domain-containing protein 1 (BTBD1). BTBD1, also called Hepatitis C virus NS5A-transactivated protein 8 or HCV NS5A-transactivated protein 8, is a BTB-domain-containing Kelch-like protein specifically expressed in skeletal muscle. It interacts with DNA topoisomerase 1 (Topo1), a key enzyme in cell survival. BTBD1 and BTBD2 colocalize to cytoplasmic bodies with the RBCC/tripartite motif protein, TRIM5delta. It may serve as a substrate-specific adaptor of an E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. — an NCBI CDD conserved domain (cd18522); members share this curated model.
