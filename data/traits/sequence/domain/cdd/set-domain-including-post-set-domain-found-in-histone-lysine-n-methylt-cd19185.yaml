identifier: CDD:cd19185
label: "SET domain (including post-SET domain) found in histone-lysine N-methyltransferase 5C (KMT5C) and similar proteins. KMT5C (also termed lysine N-methyltransferase 5C, lysine-specific methyltransferase 5C, suppressor of variegation 4-20 homolog 2, Su(var)4-20 homolog 2 or Suv4-20h2) is a histone methyltransferase that specifically trimethylates 'Lys-20' of histone H4 (H4K20me3). It plays a central role in the establishment of constitutive heterochromatin in pericentric heterochromatin regions."
definition: >-
  SET domain (including post-SET domain) found in histone-lysine N-methyltransferase 5C (KMT5C) and similar proteins. KMT5C (also termed lysine N-methyltransferase 5C, lysine-specific methyltransferase 5C, suppressor of variegation 4-20 homolog 2, Su(var)4-20 homolog 2 or Suv4-20h2) is a histone methyltransferase that specifically trimethylates 'Lys-20' of histone H4 (H4K20me3). It plays a central role in the establishment of constitutive heterochromatin in pericentric heterochromatin regions. — an NCBI CDD conserved domain (cd19185); members share this curated model.
