identifier: CDD:cd23973
label: "alpha-N-acetylgalactosaminide alpha-2,6-sialyltransferase 1. ST6GalNAc family members are alpha-N-acetylgalactosaminide alpha-2,6-sialyltransferases that catalyze an alpha-2,6-linkage between sialic acid and the N-acetylgalactosamine residues of glycochains through an 2,6-linkage, by transfering sialic acid from CMP-Sia. ST6GalNAc1 utilize mainly GalNAc-,Galbeta1,3GalNAc-, and Sia2,3Galbeta1,3GalNAc on O-glycans of glycoproteins as acceptors. The ST6GalNac family belongs to glycosyltransferase family 29 (GT29)."
definition: >-
  alpha-N-acetylgalactosaminide alpha-2,6-sialyltransferase 1. ST6GalNAc family members are alpha-N-acetylgalactosaminide alpha-2,6-sialyltransferases that catalyze an alpha-2,6-linkage between sialic acid and the N-acetylgalactosamine residues of glycochains through an 2,6-linkage, by transfering sialic acid from CMP-Sia. ST6GalNAc1 utilize mainly GalNAc-,Galbeta1,3GalNAc-, and Sia2,3Galbeta1,3GalNAc on O-glycans of glycoproteins as acceptors. The ST6GalNac family belongs to glycosyltransferase family 29 (GT29). — an NCBI CDD conserved domain (cd23973); members share this curated model.
