identifier: CDD:cd06330
label: "periplasmic substrate-binding domain of active transport proteins. Periplasmic substrate-binding domain of active transport proteins found in bacteria and Archaea that is predicted to be involved in the efflux of toxic compounds. Members of this subgroup include proteins from Herminiimonas arsenicoxydans, which is resistant to arsenic (As) and various heavy metals such as cadmium and zinc. Moreover, they show significant sequence similarity to the cluster of AmiC and active transport systems for short-chain amides and urea (FmdDEF), and thus are likely to exhibit a ligand-binding mode similar to that of the amide sensor protein AmiC from Pseudomonas aeruginosa."
definition: >-
  periplasmic substrate-binding domain of active transport proteins. Periplasmic substrate-binding domain of active transport proteins found in bacteria and Archaea that is predicted to be involved in the efflux of toxic compounds. Members of this subgroup include proteins from Herminiimonas arsenicoxydans, which is resistant to arsenic (As) and various heavy metals such as cadmium and zinc. Moreover, they show significant sequence similarity to the cluster of AmiC and active transport systems for short-chain amides and urea (FmdDEF), and thus are likely to exhibit a ligand-binding mode similar to that of the amide sensor protein AmiC from Pseudomonas aeruginosa. — an NCBI CDD conserved domain (cd06330); members share this curated model.
