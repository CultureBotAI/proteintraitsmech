identifier: CDD:cd11654
label: TRF2_RBM
definition: >-
  RAP1 binding motif of telomere repeat binding factor. TRF2 (Telomere repeat binding factor 2) functions as part of the 6-component shelterin complex. TRF2 binds DNA and recruits RAP1 (via binding to the RAP1 protein c-terminus (RCT)) and TIN2 in the protection of telomeres from DNA repair machinery. Metazoan shelterin consists of 3 DNA-binding proteins (TRF2, TRF1 and POT1) and 3 recruited proteins that bind to one or more of these DNA-binding proteins (RAP1, TIN2, TPP1). Human TRF1 and TRF2 bind double-stranded DNA. hTRF2 consists of a basic N-terminus, a TRF homology domain, the RAP1 binding motif (RBM) described by this model, the TIN2 binding motif (TBM), and a myb-like DNA binding domain
