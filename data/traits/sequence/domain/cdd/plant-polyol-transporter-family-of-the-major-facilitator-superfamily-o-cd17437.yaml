identifier: CDD:cd17437
label: "Plant Polyol transporter family of the Major Facilitator Superfamily of transporters. The plant Polyol transporter (PLT) subfamily includes PLT1-6 from  Arabidopsis thaliana and similar transporters. The best characterized member of the group is Polyol transporter 5, also called Sugar-proton symporter PLT5, which mediates the H+-symport of numerous substrates including linear polyols (such as sorbitol, xylitol, erythritol or glycerol), cyclic polyol myo-inositol, and different hexoses, pentoses (including ribose), tetroses, and sugar alcohols. It functions to transport a wide range of substrates into specific sink tissues in the plant. The PLT subfamily belongs to the Glucose transporter -like (GLUT-like) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Plant Polyol transporter family of the Major Facilitator Superfamily of transporters. The plant Polyol transporter (PLT) subfamily includes PLT1-6 from Arabidopsis thaliana and similar transporters. The best characterized member of the group is Polyol transporter 5, also called Sugar-proton symporter PLT5, which mediates the H+-symport of numerous substrates including linear polyols (such as sorbitol, xylitol, erythritol or glycerol), cyclic polyol myo-inositol, and different hexoses, pentoses (including ribose), tetroses, and sugar alcohols. It functions to transport a wide range of substrates into specific sink tissues in the plant. The PLT subfamily belongs to the Glucose transporter -like (GLUT-like) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17437); members share this curated model.
