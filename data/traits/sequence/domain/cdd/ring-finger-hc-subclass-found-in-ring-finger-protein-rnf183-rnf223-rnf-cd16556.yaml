identifier: CDD:cd16556
label: "RING finger, HC subclass, found in RING finger protein RNF183, RNF223, RNF225 and similar proteins. RNF183 is an E3 ubiquitin-protein ligase that is upregulated during intestinal inflammation and is negatively regulated by miR-7. It promotes intestinal inflammation by increasing the ubiquitination and degradation of inhibitor of kappa B, thereby resulting in secondary activation of the Nuclear factor-kappaB (NF-kB) pathway. The interaction between RNF183-mediated ubiquitination and miRNA may be an important novel epigenetic mechanism in the pathogenesis of inflammatory bowel disease (IBD). The biological function of RNF223 and RNF225 remains unclear. Members of this family contain an N-terminal C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in RING finger protein RNF183, RNF223, RNF225 and similar proteins. RNF183 is an E3 ubiquitin-protein ligase that is upregulated during intestinal inflammation and is negatively regulated by miR-7. It promotes intestinal inflammation by increasing the ubiquitination and degradation of inhibitor of kappa B, thereby resulting in secondary activation of the Nuclear factor-kappaB (NF-kB) pathway. The interaction between RNF183-mediated ubiquitination and miRNA may be an important novel epigenetic mechanism in the pathogenesis of inflammatory bowel disease (IBD). The biological function of RNF223 and RNF225 remains unclear. Members of this family contain an N-terminal C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd16556); members share this curated model.
