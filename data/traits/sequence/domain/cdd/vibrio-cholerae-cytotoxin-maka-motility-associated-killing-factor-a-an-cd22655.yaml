identifier: CDD:cd22655
label: "Vibrio cholerae cytotoxin MakA (motility associated killing factor A), and similar proteins. This model includes Vibrio cholerae motility associated killing factor A (MakA) cytotoxin, a member of the cytolysin A (ClyA) family of alpha pore-forming toxins (alpha-PFTs). The MakA protein is encoded by the mak operon. Transport of the MakA protein from the bacteria is shown to occur by flagellum-dependent secretion, highlighting a non-conventional and direct role of flagella in pathogenesis of V. cholerae; a conserved N-terminal FTPP motif is essential for MakA secretion via the flagellum channel in a proton motive force-dependent manner.  Structure of MakA shows an elongated, almost entirely alpha-helical protein, with the head domain consisting of two helices and three beta-strands that together with the short beta-strand of the tail domain forms a four-stranded sheet. MakA has been demonstrated to cause toxicity in both Caenorhabditis elegans and zebrafish."
definition: >-
  Vibrio cholerae cytotoxin MakA (motility associated killing factor A), and similar proteins. This model includes Vibrio cholerae motility associated killing factor A (MakA) cytotoxin, a member of the cytolysin A (ClyA) family of alpha pore-forming toxins (alpha-PFTs). The MakA protein is encoded by the mak operon. Transport of the MakA protein from the bacteria is shown to occur by flagellum-dependent secretion, highlighting a non-conventional and direct role of flagella in pathogenesis of V. cholerae; a conserved N-terminal FTPP motif is essential for MakA secretion via the flagellum channel in a proton motive force-dependent manner. Structure of MakA shows an elongated, almost entirely alpha-helical protein, with the head domain consisting of two helices and three beta-strands that together with the short beta-strand of the tail domain forms a four-stranded sheet. MakA has been demonstrated to cause toxicity in both Caenorhabditis elegans and zebrafish. — an NCBI CDD conserved domain (cd22655); members share this curated model.
