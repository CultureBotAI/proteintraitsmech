identifier: CDD:cd02700
label: beta_glycanase
definition: >-
  beta_glycanase. Glycosyl hydrolases are classified into 110 families on the basis of amino acid sequence similarity in the CAZy (carbohydrate active enzymes) database, 16 of which are grouped together into a superfamily of beta-glycanases called clan GH-A (also named superfamily 4/7). Clan GH-A glycosyl hydrolase families include; GH1, GH2, GH5, GH10, GH17, GH26, GH30, GH35, GH39, GH42, GH51, GH53, GH59, GH72, GH79, and GH86 . Members of this superfamily adopt a (beta/alpha)8 TIM barrel fold in which the two active site residues directly involved in catalysis, the acid/base catalyst and the nucleophile, are located in beta strands 4 and 7, respectively. The enzymatic hydrolysis of glycosidic bonds results in either an overall inversion or retention of the anomeric configuration, and about two-thirds of the characterized glycosyl hydrolase families are retaining enzymes. Most retaining glycosidases cleave the glycosidic bond using two active site residues, acting as a nucleophile and an acid/base. The hydrolysis proceeds through a two-step double displacement mechanism, in which a covalent glycosyl-enzyme intermediate is formed amid the two reaction steps
