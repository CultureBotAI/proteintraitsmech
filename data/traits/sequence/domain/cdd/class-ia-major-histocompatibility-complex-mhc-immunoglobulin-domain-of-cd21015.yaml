identifier: CDD:cd21015
label: "Class Ia major histocompatibility complex (MHC) immunoglobulin domain of RT1-Aa; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the Class Ia major histocompatibility complex (MHC) immunoglobulin domain of RT1-Aa. While most mammalian species transport these peptides into the ER via a single allele of TAP, rats have evolved different TAPs, TAP-A and TAP-B, RT1-Aa and RT1-A1c, which are associated with TAP-A and TAP-B. The rat MHC class Ia molecule RT1-Aa has the unusual capacity to bind long peptides ending in arginine, such as MTF-E, a thirteen-residue, maternally transmitted minor histocompatibility antigen. Class I MHC proteins bind antigenic peptide fragments and present them to CD8+ T lymphocytes. Class I molecules consist of a transmembrane alpha chain and a small chain called the beta-2-microglobulin. The alpha chain contains three extracellular domains, two of which fold together to form the peptide-binding cleft (alpha1 and alpha2), and one which has an Ig fold (alpha3).  Peptide binding to class I molecules occurs in the endoplasmic reticulum (ER) and involves both chaperones and dedicated factors to assist in peptide loading.  Class I MHC molecules are expressed on most nucleated cells."
definition: >-
  Class Ia major histocompatibility complex (MHC) immunoglobulin domain of RT1-Aa; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the Class Ia major histocompatibility complex (MHC) immunoglobulin domain of RT1-Aa. While most mammalian species transport these peptides into the ER via a single allele of TAP, rats have evolved different TAPs, TAP-A and TAP-B, RT1-Aa and RT1-A1c, which are associated with TAP-A and TAP-B. The rat MHC class Ia molecule RT1-Aa has the unusual capacity to bind long peptides ending in arginine, such as MTF-E, a thirteen-residue, maternally transmitted minor histocompatibility antigen. Class I MHC proteins bind antigenic peptide fragments and present them to CD8+ T lymphocytes. Class I molecules consist of a transmembrane alpha chain and a small chain called the beta-2-microglobulin. The alpha chain contains three extracellular domains, two of which fold together to form the peptide-binding cleft (alpha1 and alpha2), and one which has an Ig fold (alpha3). Peptide binding to class I molecules occurs in the endoplasmic reticulum (ER) and involves both chaperones and dedicated factors to assist in peptide loading. Class I MHC molecules are expressed on most nucleated cells. — an NCBI CDD conserved domain (cd21015); members share this curated model.
