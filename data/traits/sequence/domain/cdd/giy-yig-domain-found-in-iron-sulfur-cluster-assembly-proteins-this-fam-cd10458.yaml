identifier: CDD:cd10458
label: "GIY-YIG domain found in iron-sulfur cluster assembly proteins. This family includes a group of uncharacterized iron-sulfur cluster assembly proteins that transiently bind the iron-sulfur cluster before transfer to target apoproteins. These iron-sulfur cluster assembly proteins contains a GIY-YIG domain that shows statistically significant similarity to the N-terminal catalytic domains of GIY-YIG family of intron-encoded homing endonuclease I-TevI and catalytic GIY-YIG domain of nucleotide excision repair endonuclease UvrC. They also contain a C-terminal NifU-like domain that corresponds to a common region between the NifU protein from nitrogen-fixing bacteria and rhodobacterial species.  The biochemical function of NifU is unknown."
definition: >-
  GIY-YIG domain found in iron-sulfur cluster assembly proteins. This family includes a group of uncharacterized iron-sulfur cluster assembly proteins that transiently bind the iron-sulfur cluster before transfer to target apoproteins. These iron-sulfur cluster assembly proteins contains a GIY-YIG domain that shows statistically significant similarity to the N-terminal catalytic domains of GIY-YIG family of intron-encoded homing endonuclease I-TevI and catalytic GIY-YIG domain of nucleotide excision repair endonuclease UvrC. They also contain a C-terminal NifU-like domain that corresponds to a common region between the NifU protein from nitrogen-fixing bacteria and rhodobacterial species. The biochemical function of NifU is unknown. — an NCBI CDD conserved domain (cd10458); members share this curated model.
