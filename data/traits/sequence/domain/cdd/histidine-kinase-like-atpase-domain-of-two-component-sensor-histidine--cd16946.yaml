identifier: CDD:cd16946
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli BasS. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) similar to Escherichia coli BaeS HK of the BaeS/BaeR two-component regulatory system (TCS), which responds to envelope stress. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA), and a HAMP sensory domain."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli BasS. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) similar to Escherichia coli BaeS HK of the BaeS/BaeR two-component regulatory system (TCS), which responds to envelope stress. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA), and a HAMP sensory domain. — an NCBI CDD conserved domain (cd16946); members share this curated model.
