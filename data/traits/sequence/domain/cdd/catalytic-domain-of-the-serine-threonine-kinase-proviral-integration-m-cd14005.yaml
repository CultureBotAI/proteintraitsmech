identifier: CDD:cd14005
label: "Catalytic domain of the Serine/Threonine kinase, Proviral Integration Moloney virus (PIM) kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The PIM gene locus was discovered as a result of the cloning of retroviral intergration sites in murine Moloney leukemia virus, leading to the identification of PIM kinases. They are constitutively active STKs with a broad range of cellular targets and are overexpressed in many haematopoietic malignancies and solid cancers. Vertebrates contain three distinct PIM kinase genes (PIM1-3); each gene may result in mutliple protein isoforms. There are two PIM1 and three PIM2 isoforms as a result of alternative translation initiation sites, while there is only one PIM3 protein. Compound knockout mice deficient of all three PIM kinases that survive the perinatal period show a profound reduction in body size, indicating that PIMs are important for body growth. The PIM subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, Proviral Integration Moloney virus (PIM) kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The PIM gene locus was discovered as a result of the cloning of retroviral intergration sites in murine Moloney leukemia virus, leading to the identification of PIM kinases. They are constitutively active STKs with a broad range of cellular targets and are overexpressed in many haematopoietic malignancies and solid cancers. Vertebrates contain three distinct PIM kinase genes (PIM1-3); each gene may result in mutliple protein isoforms. There are two PIM1 and three PIM2 isoforms as a result of alternative translation initiation sites, while there is only one PIM3 protein. Compound knockout mice deficient of all three PIM kinases that survive the perinatal period show a profound reduction in body size, indicating that PIMs are important for body growth. The PIM subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14005); members share this curated model.
