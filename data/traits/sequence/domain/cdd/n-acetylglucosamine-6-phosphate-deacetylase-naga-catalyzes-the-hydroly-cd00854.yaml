identifier: CDD:cd00854
label: "N-acetylglucosamine-6-phosphate deacetylase, NagA, catalyzes the hydrolysis of the N-acetyl group of N-acetyl-glucosamine-6-phosphate (GlcNAc-6-P) to glucosamine 6-phosphate and acetate. This is the first committed step in the biosynthetic pathway to amino-sugar-nucleotides, which is needed for cell wall peptidoglycan and teichoic acid biosynthesis. Deacetylation of N-acetylglucosamine is also important in lipopolysaccharide synthesis and cell wall recycling."
definition: >-
  N-acetylglucosamine-6-phosphate deacetylase, NagA, catalyzes the hydrolysis of the N-acetyl group of N-acetyl-glucosamine-6-phosphate (GlcNAc-6-P) to glucosamine 6-phosphate and acetate. This is the first committed step in the biosynthetic pathway to amino-sugar-nucleotides, which is needed for cell wall peptidoglycan and teichoic acid biosynthesis. Deacetylation of N-acetylglucosamine is also important in lipopolysaccharide synthesis and cell wall recycling. — an NCBI CDD conserved domain (cd00854); members share this curated model.
