identifier: CDD:cd14549
label: "catalytic domain of R5 subfamily receptor-type tyrosine-protein phosphatases, repeat 1. The R5 subfamily of receptor-type phosphotyrosine phosphatases (RPTP) is composed of receptor-type tyrosine-protein phosphatase Z (PTPRZ) and G (PTPRG). They belong to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. They are type 1 integral membrane proteins consisting of an extracellular region with a carbonic anhydrase-like (CAH) and a fibronectin type III (FN3) domains, and an intracellular region with a catalytic PTP domain (repeat 1) proximal to the membrane, and a catalytically inactive PTP-fold domain (repeat 2) distal to the membrane. This model represents the catalytic PTP domain (repeat 1)."
definition: >-
