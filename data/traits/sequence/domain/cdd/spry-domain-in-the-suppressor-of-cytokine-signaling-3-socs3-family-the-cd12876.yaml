identifier: CDD:cd12876
label: "SPRY domain in the suppressor of cytokine signaling 3 (SOCS3) family. The SPRY domain-containing SOCS box protein family (SPSB1-4, also known as SSB-1 to -4) is composed of a central SPRY protein interaction domain and a C-terminal SOCS box. All four SPSB proteins interact with c-Met, the hepatocyte growth factor receptor, but SOCS3 regulates cellular response to a variety of cytokines such as leukemia inhibitory factor (LIF) and interleukin 6. SOCS3, along with SOCS1, are expressed by immune cells and cells of the central nervous system (CNS) and have the potential to impact immune processes within the CNS. In non-small cell lung cancer (NSCLC), SOCS3 is silenced and proline-rich tyrosine kinase 2 (Pyk2) is over-expressed; it has been suggested that SOCS3 could be an effective way to prevent the progression of NSCLC due to its role in regulating Pyk2 expression."
