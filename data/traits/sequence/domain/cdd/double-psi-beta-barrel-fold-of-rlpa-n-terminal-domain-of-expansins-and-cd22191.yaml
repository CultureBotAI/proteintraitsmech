identifier: CDD:cd22191
label: "double-psi beta-barrel fold of RlpA, N-terminal domain of expansins, and similar domains. The double-psi beta-barrel (DPBB) fold is found in a divergent group of proteins, including endolytic peptidoglycan transglycosylase RlpA (rare lipoprotein A), EG45-like domain containing proteins, kiwellins, Streptomyces papain inhibitor (SPI), the N-terminal domain of plant and bacterial expansins, GH45 family of endoglucanases, barwins, cerato-platanins, membrane-bound lytic murein transglycosylase A (MltA) and YuiC-like proteins. RlpA may work in tandem with amidases to degrade peptidoglycan (PG) in the division septum and lateral wall to facilitate daughter cell separation. An EG45-like domain containing protein from Arabidopsis thaliana, called plant natriuretic peptide A (AtPNP-A), functions in cell volume regulation. Kiwellin proteins comprise a widespread family of plant-defense proteins that target pathogenic bacterial/fungal effectors that down-regulate plant defense responses. SPI is a stress protein produced under hyperthermal stress conditions that serves as a glutamine and lysine donor substrate for microbial transglutaminase (MTG, EC 2.3.2.13) from Streptomycetes. Some expansin family proteins display cell wall loosening activity and are involved in cell expansion and other developmental events during which cell wall modification occurs. Endoglucanases (EC 3.2.1.4) catalyze the endohydrolysis of (1-4)-beta-D-glucosidic linkages in cellulose, lichenin, and cereal beta-D-glucans. Animal cellulases, such as endoglucanase EG27II, have great potential for industrial applications such as bioethanol production. Barwin is a basic protein from barley seed. It is a probable plant lectin that may be involved in a defense mechanism. Cerato-platanin is a phytotoxin which causes production of phytoalexin in platanus acerifolia, platanus occidentalis, and platanus orientalis. It also induces cell necrosis. MltA, also called murein hydrolase A, is a murein-degrading enzyme that may play a role in recycling of muropeptides during cell elongation and/or cell division. It degrades murein glycan strands and insoluble, high-molecular weight murein sacculi. YuiC is a Firmicute stationary phase survival (Sps) protein."
definition: >-
  double-psi beta-barrel fold of RlpA, N-terminal domain of expansins, and similar domains. The double-psi beta-barrel (DPBB) fold is found in a divergent group of proteins, including endolytic peptidoglycan transglycosylase RlpA (rare lipoprotein A), EG45-like domain containing proteins, kiwellins, Streptomyces papain inhibitor (SPI), the N-terminal domain of plant and bacterial expansins, GH45 family of endoglucanases, barwins, cerato-platanins, membrane-bound lytic murein transglycosylase A (MltA) and YuiC-like proteins. RlpA may work in tandem with amidases to degrade peptidoglycan (PG) in the division septum and lateral wall to facilitate daughter cell separation. An EG45-like domain containing protein from Arabidopsis thaliana, called plant natriuretic peptide A (AtPNP-A), functions in cell volume regulation. Kiwellin proteins comprise a widespread family of plant-defense proteins that target pathogenic bacterial/fungal effectors that down-regulate plant defense responses. SPI is a stress protein produced under hyperthermal stress conditions that serves as a glutamine and lysine donor substrate for microbial transglutaminase (MTG, EC 2.3.2.13) from Streptomycetes. Some expansin family proteins display cell wall loosening activity and are involved in cell expansion and other developmental events during which cell wall modification occurs. Endoglucanases (EC 3.2.1.4) catalyze the endohydrolysis of (1-4)-beta-D-glucosidic linkages in cellulose, lichenin, and cereal beta-D-glucans. Animal cellulases, such as endoglucanase EG27II, have great potential for industrial applications such as bioethanol production. Barwin is a basic protein from barley seed. It is a probable plant lectin that may be involved in a defense mechanism. Cerato-platanin is a phytotoxin which causes production of phytoalexin in platanus acerifolia, platanus occidentalis, and platanus orientalis. It also induces cell necrosis. MltA, also called murein hydrolase A, is a murein-degrading enzyme that may play a role in recycling of muropeptides during cell elongation and/or cell division. It degrades murein glycan strands and insoluble, high-molecular weight murein sacculi. YuiC is a Firmicute stationary phase survival (Sps) protein. — an NCBI CDD conserved domain (cd22191); members share this curated model.
