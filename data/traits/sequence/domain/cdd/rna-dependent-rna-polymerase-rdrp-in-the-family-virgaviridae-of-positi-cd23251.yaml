identifier: CDD:cd23251
label: "RNA-dependent RNA polymerase (RdRp) in the family Virgaviridae of positive-sense single-stranded RNA [(+)ssRNA] viruses. This group contains the RdRp of RNA viruses belonging to the family Virgaviridae, order Martellivirales. The Virgaviridae is a family of plant viruses with rod-shaped virions, a (+)ssRNA genome with a 3'-terminal tRNA-like structure and a replication protein similar to those of the alpha-like supergroup. Plants serve as natural hosts. The name of the family is derived from the Latin word virga (rod), as all viruses in this family are rod-shaped. There are currently 59 species in this family, divided among seven genera: Goravirus, Furovirus, Hordeivirus, Pecluvirus, Pomovirus, Tobamovirus, and Tobravirus. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
definition: >-
  RNA-dependent RNA polymerase (RdRp) in the family Virgaviridae of positive-sense single-stranded RNA [(+)ssRNA] viruses. This group contains the RdRp of RNA viruses belonging to the family Virgaviridae, order Martellivirales. The Virgaviridae is a family of plant viruses with rod-shaped virions, a (+)ssRNA genome with a 3'-terminal tRNA-like structure and a replication protein similar to those of the alpha-like supergroup. Plants serve as natural hosts. The name of the family is derived from the Latin word virga (rod), as all viruses in this family are rod-shaped. There are currently 59 species in this family, divided among seven genera: Goravirus, Furovirus, Hordeivirus, Pecluvirus, Pomovirus, Tobamovirus, and Tobravirus. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides. — an NCBI CDD conserved domain (cd23251); members share this curated model.
