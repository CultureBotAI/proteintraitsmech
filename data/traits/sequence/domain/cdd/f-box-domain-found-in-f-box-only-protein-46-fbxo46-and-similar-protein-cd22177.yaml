identifier: CDD:cd22177
label: F-box_FBXO46
definition: >-
  F-box domain found in F-box only protein 46 (FBXO46) and similar proteins. FBXO46, also called FBX46, or F-box only protein 34-like, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex that mediates degradation of the tumor suppressor FBXO31 and thereby prevents premature cellular senescence. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression
