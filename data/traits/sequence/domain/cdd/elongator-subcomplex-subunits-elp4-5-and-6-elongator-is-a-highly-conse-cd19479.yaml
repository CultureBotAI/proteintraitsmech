identifier: CDD:cd19479
label: Elp456
definition: >-
  Elongator subcomplex subunits Elp4, 5 and 6. Elongator is a highly conserved multiprotein complex involved in RNA polymerase II-mediated transcriptional elongation and many other processes, including cytoskeleton organization, exocytosis, and tRNA modification. It is composed of two subcomplexes, Elp1-3 and Elp4-6. Elp4-6 forms a heterohexameric RecA-like ring structure, although they lack the key sequence signatures of ATPases
