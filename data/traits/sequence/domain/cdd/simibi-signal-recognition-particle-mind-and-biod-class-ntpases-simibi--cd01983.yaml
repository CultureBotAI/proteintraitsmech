identifier: CDD:cd01983
label: "SIMIBI (signal recognition particle, MinD and BioD)-class NTPases. SIMIBI (after signal recognition particle, MinD, and BioD), consists of signal recognition particle (SRP) GTPases, the assemblage of MinD-like ATPases, which are involved in protein localization, chromosome partitioning, and membrane transport, and a group of metabolic enzymes with kinase or related phosphate transferase activity. Functionally, proteins in this superfamily use the energy from hydrolysis of NTP to transfer electron or ion."
definition: >-
  SIMIBI (signal recognition particle, MinD and BioD)-class NTPases. SIMIBI (after signal recognition particle, MinD, and BioD), consists of signal recognition particle (SRP) GTPases, the assemblage of MinD-like ATPases, which are involved in protein localization, chromosome partitioning, and membrane transport, and a group of metabolic enzymes with kinase or related phosphate transferase activity. Functionally, proteins in this superfamily use the energy from hydrolysis of NTP to transfer electron or ion. — an NCBI CDD conserved domain (cd01983); members share this curated model.
