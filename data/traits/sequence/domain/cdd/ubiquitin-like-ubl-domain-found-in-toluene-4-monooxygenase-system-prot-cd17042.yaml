identifier: CDD:cd17042
label: Ubl_TmoB
definition: >-
  Ubiquitin-like (Ubl) domain found in toluene-4-monooxygenase system protein B (TmoB). TmoB is a component of the multicomponent toluene-4-monooxygenase (T4MO) system that metabolizes toluene as a carbon source. The T4MO complex is composed of a diiron hydroxylase (T4MOH), a Rieske-type ferredoxin (T4MOC), an effector protein (T4MOD), and an NADH oxidoreductase (T4MOF). The T4MOH component consists of TmoA, TmoB, and TmoE. TmoB adopts a beta-grasp ubiquitin-like fold but its precise role remains unclear
