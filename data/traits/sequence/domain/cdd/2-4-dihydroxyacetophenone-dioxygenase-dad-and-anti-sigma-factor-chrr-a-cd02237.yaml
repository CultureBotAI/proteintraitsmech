identifier: CDD:cd02237
label: "2,4'-Dihydroxyacetophenone dioxygenase (DAD) and anti-sigma factor ChrR, and similar proteins; cupin domain. This family includes the proteins 2,4'-Dihydroxyacetophenone dioxygenase (DAD) and anti-sigma factor ChrR. DAD catalyzes the oxidation of 2,4'-dihydroxyacetophenone to 4-hydroxybenzoate and formate as part of the 4-hydroxyacetophenone catabolic pathway. The enzyme is a homotetramer containing one iron per molecule of enzyme. Anti-sigma factor ChrR is a member of the ZAS (Zn2+ anti-sigma) subfamily of group IV anti-sigmas. It inhibits transcriptional activity by binding to the Rsp extra cytoplasmic function (ECF) sigma factor E (sigmaE). Some ChrR members contain tandem repeats of two distinct homologous functional domains. Members of this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold."
definition: >-
  2,4'-Dihydroxyacetophenone dioxygenase (DAD) and anti-sigma factor ChrR, and similar proteins; cupin domain. This family includes the proteins 2,4'-Dihydroxyacetophenone dioxygenase (DAD) and anti-sigma factor ChrR. DAD catalyzes the oxidation of 2,4'-dihydroxyacetophenone to 4-hydroxybenzoate and formate as part of the 4-hydroxyacetophenone catabolic pathway. The enzyme is a homotetramer containing one iron per molecule of enzyme. Anti-sigma factor ChrR is a member of the ZAS (Zn2+ anti-sigma) subfamily of group IV anti-sigmas. It inhibits transcriptional activity by binding to the Rsp extra cytoplasmic function (ECF) sigma factor E (sigmaE). Some ChrR members contain tandem repeats of two distinct homologous functional domains. Members of this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold. — an NCBI CDD conserved domain (cd02237); members share this curated model.
