identifier: CDD:cd17177
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F0 sub-domain, found in SH3 and multiple ankyrin repeat domains protein 3 (SHANK3). SHANK3, also termed proline-rich synapse-associated protein 2 (ProSAP2), is a postsynaptic density (PSD)-associated scaffolding protein at the excitatory synapse that interconnects neurotransmitter receptors and cell adhesion molecules by direct and indirect interactions with numerous other PSD-associated proteins. It is critical for synaptic plasticity and the trans-synaptic coupling between the reliability of presynaptic neurotransmitter release and postsynaptic responsiveness. It is a key component of a zinc-sensitive signaling system that regulates excitatory synaptic strength. Mutations in the SHANK3 synaptic scaffolding gene may lead to autism spectrum disorder and mental retardation, and the cause of human Phelan-McDermid syndrome (22q13.3 deletion syndrome) has been isolated to loss of function of one copy of the SHANK3 gene. SHANK3 contains an N-terminal F0 domain of FERM (Band 4.1, ezrin, radixin, moesin), six ankyrin (ANK) repeats, one SH3 (Src homology 3) domain, one PDZ (PSD-95, Dlg, and ZO-1/2, also known as DHR or GLGF) domain, and a C-terminal SAM (sterile alpha motif) domain. This family corresponds to the F0 domain that adopts a ubiquitin-like fold."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F0 sub-domain, found in SH3 and multiple ankyrin repeat domains protein 3 (SHANK3). SHANK3, also termed proline-rich synapse-associated protein 2 (ProSAP2), is a postsynaptic density (PSD)-associated scaffolding protein at the excitatory synapse that interconnects neurotransmitter receptors and cell adhesion molecules by direct and indirect interactions with numerous other PSD-associated proteins. It is critical for synaptic plasticity and the trans-synaptic coupling between the reliability of presynaptic neurotransmitter release and postsynaptic responsiveness. It is a key component of a zinc-sensitive signaling system that regulates excitatory synaptic strength. Mutations in the SHANK3 synaptic scaffolding gene may lead to autism spectrum disorder and mental retardation, and the cause of human Phelan-McDermid syndrome (22q13.3 deletion syndrome) has been isolated to loss of function of one copy of the SHANK3 gene. SHANK3 contains an N-terminal F0 domain of FERM (Band 4.1, ezrin, radixin, moesin), six ankyrin (ANK) repeats, one SH3 (Src homology 3) domain, one PDZ (PSD-95, Dlg, and ZO-1/2, also known as DHR or GLGF) domain, and a C-terminal SAM (sterile alpha motif) domain. This family corresponds to the F0 domain that adopts a ubiquitin-like fold. — an NCBI CDD conserved domain (cd17177); members share this curated model.
