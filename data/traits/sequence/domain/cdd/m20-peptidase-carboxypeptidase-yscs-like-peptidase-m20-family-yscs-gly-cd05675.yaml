identifier: CDD:cd05675
label: "M20 Peptidase, carboxypeptidase yscS-like. Peptidase M20 family, yscS (GlyX-carboxypeptidase, CPS1, carboxypeptidase S, carboxypeptidase a, carboxypeptidase yscS, glycine carboxypeptidase)-like subfamily. This group contains proteins that have been uncharacterized to date with similarity to vacuolar proteins involved in nitrogen metabolism which are essential for use of certain peptides that are sole nitrogen sources. YscS releases a C-terminal amino acid from a peptide that has glycine as the penultimate residue. It is synthesized as one polypeptide chain precursor which yields two active precursor molecules after carbohydrate modification in the secretory pathway. The proteolytically unprocessed forms are associated with the membrane, whereas the mature forms of the enzyme are soluble. Enzymes in this subfamily may also cleave intracellularly generated peptides in order to recycle amino acids for protein synthesis."
