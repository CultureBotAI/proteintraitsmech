identifier: CDD:cd02796
label: "tRNA-binding-domain-containing prokaryotic phenylalanly tRNA synthetase (PheRS) beta chain.  PheRS aminoacylate phenylalanine transfer RNAs (tRNAphe).  PheRSs belong structurally to class II aminoacyl tRNA synthetases (aaRSs) but, as they aminoacylate the 2'OH of the terminal ribose of tRNA they belong functionally to class 1 aaRSs.  This domain has general tRNA binding properties and is believed to direct tRNAphe to the active site of the enzyme."
definition: >-
  tRNA-binding-domain-containing prokaryotic phenylalanly tRNA synthetase (PheRS) beta chain. PheRS aminoacylate phenylalanine transfer RNAs (tRNAphe). PheRSs belong structurally to class II aminoacyl tRNA synthetases (aaRSs) but, as they aminoacylate the 2'OH of the terminal ribose of tRNA they belong functionally to class 1 aaRSs. This domain has general tRNA binding properties and is believed to direct tRNAphe to the active site of the enzyme. — an NCBI CDD conserved domain (cd02796); members share this curated model.
