identifier: CDD:cd08142
label: "ATP-grasp domain of pyruvate phosphate dikinase. The N-terminal domain of pyruvate phosphate dikinase (PPDK) is similar to the nucleotide-binding domain of the ATP-grasp superfamily. PPDK (EC 2.7.9.1), also known as pyruvate phosphate dikinase, catalyzes the reversible conversion of ATP, inorganic phosphate (Pi) and pyruvate to AMP, pyrophosphate and phosphoenolpyruvate (PEP). PPDK is homologous to phosphoenolpyruvate synthetase (PPS) which catalyzes a very similar reaction of phosphoenolpyruvate biosynthesis. Mutagenesis experiments reveal that the pyruvate and ATP-binding sites do not overlap. PPDK utilizes Mg as a cofactor. It appears that the active site loop caps the nucleotide binding site."
definition: >-
  ATP-grasp domain of pyruvate phosphate dikinase. The N-terminal domain of pyruvate phosphate dikinase (PPDK) is similar to the nucleotide-binding domain of the ATP-grasp superfamily. PPDK (EC 2.7.9.1), also known as pyruvate phosphate dikinase, catalyzes the reversible conversion of ATP, inorganic phosphate (Pi) and pyruvate to AMP, pyrophosphate and phosphoenolpyruvate (PEP). PPDK is homologous to phosphoenolpyruvate synthetase (PPS) which catalyzes a very similar reaction of phosphoenolpyruvate biosynthesis. Mutagenesis experiments reveal that the pyruvate and ATP-binding sites do not overlap. PPDK utilizes Mg as a cofactor. It appears that the active site loop caps the nucleotide binding site. — an NCBI CDD conserved domain (cd08142); members share this curated model.
