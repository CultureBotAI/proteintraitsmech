identifier: CDD:cd17915
label: "DEAH-box helicase domain of XPD family DEAD-like helicases. The xeroderma pigmentosum group D (XPD)-like family members are DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAH-box helicase domain of XPD family DEAD-like helicases. The xeroderma pigmentosum group D (XPD)-like family members are DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17915); members share this curated model.
