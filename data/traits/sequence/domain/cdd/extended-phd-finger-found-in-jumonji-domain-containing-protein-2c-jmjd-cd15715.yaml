identifier: CDD:cd15715
label: "Extended PHD finger found in Jumonji domain-containing protein 2C (JMJD2C). The extended plant homeodomain (ePHD) zinc finger is characterized as Cys2HisCys5HisCys2His. This model includes the ePHD finger of JMJD2C. JMJD2C, also termed lysine-specific demethylase 4C (KDM4C), or gene amplified in squamous cell carcinoma 1 protein (GASC-1 protein), or JmjC domain-containing histone demethylation protein 3C (JHDM3C), is an epigenetic factor that catalyzes the demethylation of di- and trimethylated H3K9 and H3K36, and may be involved in the development and/or progression of various types of cancer including esophageal squamous cell carcinoma (ESC) and breast cancer. It selectively interacts with hypoxia-inducible factor 1alpha (HIF1alpha) and plays a role in breast cancer progression. Moreover, JMJD2C may play an important role in the treatment of obesity and its complications by modulating the regulation of adipogenesis by nuclear receptor peroxisome proliferator-activated receptor gamma (PPARgamma). JMJD2C contains jmjN and jmjC domains in the N-terminal region, followed by a canonical plant homeodomain (PHD) finger, this non-canonical ePHD finger, and a Tudor domain."
definition: >-
  Extended PHD finger found in Jumonji domain-containing protein 2C (JMJD2C). The extended plant homeodomain (ePHD) zinc finger is characterized as Cys2HisCys5HisCys2His. This model includes the ePHD finger of JMJD2C. JMJD2C, also termed lysine-specific demethylase 4C (KDM4C), or gene amplified in squamous cell carcinoma 1 protein (GASC-1 protein), or JmjC domain-containing histone demethylation protein 3C (JHDM3C), is an epigenetic factor that catalyzes the demethylation of di- and trimethylated H3K9 and H3K36, and may be involved in the development and/or progression of various types of cancer including esophageal squamous cell carcinoma (ESC) and breast cancer. It selectively interacts with hypoxia-inducible factor 1alpha (HIF1alpha) and plays a role in breast cancer progression. Moreover, JMJD2C may play an important role in the treatment of obesity and its complications by modulating the regulation of adipogenesis by nuclear receptor peroxisome proliferator-activated receptor gamma (PPARgamma). JMJD2C contains jmjN and jmjC domains in the N-terminal region, followed by a canonical plant homeodomain (PHD) finger, this non-canonical ePHD finger, and a Tudor domain. — an NCBI CDD conserved domain (cd15715); members share this curated model.
