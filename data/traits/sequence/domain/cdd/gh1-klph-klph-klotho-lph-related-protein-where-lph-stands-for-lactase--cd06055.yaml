identifier: CDD:cd06055
label: GH1_Klph
definition: >-
  GH1_Klph. Klph (Klotho-LPH related protein; where LPH stands for lactase-phlorizin hydrolase) also known as LCTL (lactose-like). Klph has the following domain architecture; an N-terminal signal sequence, followed by a glycosyl hydrolase family 1 (GH1) domain, a transmembrane domain and a short cytoplasmic tail
