identifier: CDD:cd07545
label: "P-type heavy metal-transporting ATPase, similar to Staphylococcus aureus plasmid pI258 CadA, a cadmium-efflux ATPase. CadA from gram-positive Staphylococcus aureus plasmid pI258 is required for full Cd(2+) and Zn(2+) resistance. This subfamily also includes CadA, from the gram-negative bacilli, Stenotrophomonas maltophilia D457R, which is a cadmium efflux pump acquired as part of a cluster of antibiotic and heavy metal resistance genes from gram-positive bacteria. This subclass of P-type ATPase is also referred to as CPx-type ATPases because their amino acid sequences contain a characteristic CPC or CPH motif associated with a stretch of hydrophobic amino acids and N-terminal ion-binding sequences. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle."
definition: >-
  P-type heavy metal-transporting ATPase, similar to Staphylococcus aureus plasmid pI258 CadA, a cadmium-efflux ATPase. CadA from gram-positive Staphylococcus aureus plasmid pI258 is required for full Cd(2+) and Zn(2+) resistance. This subfamily also includes CadA, from the gram-negative bacilli, Stenotrophomonas maltophilia D457R, which is a cadmium efflux pump acquired as part of a cluster of antibiotic and heavy metal resistance genes from gram-positive bacteria. This subclass of P-type ATPase is also referred to as CPx-type ATPases because their amino acid sequences contain a characteristic CPC or CPH motif associated with a stretch of hydrophobic amino acids and N-terminal ion-binding sequences. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle. — an NCBI CDD conserved domain (cd07545); members share this curated model.
