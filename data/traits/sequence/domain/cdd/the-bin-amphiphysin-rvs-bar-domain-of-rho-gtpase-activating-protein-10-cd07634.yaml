identifier: CDD:cd07634
label: "The Bin/Amphiphysin/Rvs (BAR) domain of Rho GTPase activating protein 10-like. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions. This group is composed of uncharacterized proteins called Rho GTPase activating protein (GAP) 10-like. GAP10-like may be a GAP with activity towards RhoA and Cdc42. Similar to GRAF and GRAF2, it contains an N-terminal BAR domain, followed by a Pleckstrin homology (PH) domain, a Rho GAP domain, and a C-terminal SH3 domain. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions. The BAR domains of the related proteins GRAF and OPHN1, directly interact with their Rho GAP domains and inhibit theiractivity. The autoinhibited proteins are capable of binding membranes and tubulating liposomes, showing that the membrane-tubulation and GAP-inhibitory functions of the BAR domain can occur simultaneously."
definition: >-
  The Bin/Amphiphysin/Rvs (BAR) domain of Rho GTPase activating protein 10-like. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions. This group is composed of uncharacterized proteins called Rho GTPase activating protein (GAP) 10-like. GAP10-like may be a GAP with activity towards RhoA and Cdc42. Similar to GRAF and GRAF2, it contains an N-terminal BAR domain, followed by a Pleckstrin homology (PH) domain, a Rho GAP domain, and a C-terminal SH3 domain. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions. The BAR domains of the related proteins GRAF and OPHN1, directly interact with their Rho GAP domains and inhibit theiractivity. The autoinhibited proteins are capable of binding membranes and tubulating liposomes, showing that the membrane-tubulation and GAP-inhibitory functions of the BAR domain can occur simultaneously. — an NCBI CDD conserved domain (cd07634); members share this curated model.
