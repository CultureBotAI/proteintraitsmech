identifier: CDD:cd22750
label: "OTU (ovarian tumor) domain of family C64 cysteine proteases. This group includes proteins classified as family C64 cysteine protease by MEROPS, such as tumor necrosis factor (TNF) alpha-induced protein 3 (TNFAIP3), ZRANB1, OTU domain-containing protein 7A (OTUD7A), and OTUD7B. It also includes VCIP135. These proteins are deubiquitinases (DUBs)/ubiquitin thioesterases (EC 3.4.19.12) that mediates the deubiquitination of protein substrates. TNFAIP3 also contains ubiquitin ligase activity. It antagonizes IKK [IkappaB (inhibitor of kappaB) kinase] activation by modulating Lys63-linked polyubiquitination of cytokine-receptor-associated factors including TRAF2/6 (tumour-necrosis-factor-receptor-associated factor 2/6) and RIP1 (receptor-interacting protein 1). ZRANB1 binds, deubiquitinates, and stabilizes EZH2, which is the catalytic component of the Polycomb repressive complex 2 (PRC2) that silences gene transcription by methylating histone H3 at lysine 27 and is mutated or highly expressed in many types of cancer, including lymphoma, melanoma, prostate cancer, ovarian cancer, and breast cancer. OTUD7A has been identified as a critical gene for brain function, while OTUD7B functions as a negative regulator of the non-canonical NF-kappaB pathway by mediating the deubiquitination of TRAF3, an inhibitor of the NF-kappaB pathway, resulting in preventing TRAF3 proteolysis and over-activation of non-canonical NF-kappaB. VCIP135 controls Golgi membrane dynamics in the cell cycle and is required for Golgi and ER assembly. This group belongs to the OTU family of cysteine proteases that use a conserved cysteine and histidine, and in most cases an aspartate, as the catalytic triad."
definition: >-
  OTU (ovarian tumor) domain of family C64 cysteine proteases. This group includes proteins classified as family C64 cysteine protease by MEROPS, such as tumor necrosis factor (TNF) alpha-induced protein 3 (TNFAIP3), ZRANB1, OTU domain-containing protein 7A (OTUD7A), and OTUD7B. It also includes VCIP135. These proteins are deubiquitinases (DUBs)/ubiquitin thioesterases (EC 3.4.19.12) that mediates the deubiquitination of protein substrates. TNFAIP3 also contains ubiquitin ligase activity. It antagonizes IKK [IkappaB (inhibitor of kappaB) kinase] activation by modulating Lys63-linked polyubiquitination of cytokine-receptor-associated factors including TRAF2/6 (tumour-necrosis-factor-receptor-associated factor 2/6) and RIP1 (receptor-interacting protein 1). ZRANB1 binds, deubiquitinates, and stabilizes EZH2, which is the catalytic component of the Polycomb repressive complex 2 (PRC2) that silences gene transcription by methylating histone H3 at lysine 27 and is mutated or highly expressed in many types of cancer, including lymphoma, melanoma, prostate cancer, ovarian cancer, and breast cancer. OTUD7A has been identified as a critical gene for brain function, while OTUD7B functions as a negative regulator of the non-canonical NF-kappaB pathway by mediating the deubiquitination of TRAF3, an inhibitor of the NF-kappaB pathway, resulting in preventing TRAF3 proteolysis and over-activation of non-canonical NF-kappaB. VCIP135 controls Golgi membrane dynamics in the cell cycle and is required for Golgi and ER assembly. This group belongs to the OTU family of cysteine proteases that use a conserved cysteine and histidine, and in most cases an aspartate, as the catalytic triad. — an NCBI CDD conserved domain (cd22750); members share this curated model.
