identifier: CDD:cd13012
label: TSPN_multiplexins
definition: >-
  Thrombospondin N (TSPN)-like domain of multiplexins, comprised of collagen XVIII and XV;. Collagen XVIII, a heparan sulfate proteoglycan, is a component of basement membranes (BMs) and plays an important role in retinal vascular development and angiogenesis in the eye. Mutations in COL18A, coding for collagen XVIII, can lead to Knobloch syndrome (KNO), an autosomal recessive disorder characterized by high myopia, vitreoretinal degeneration with retinal detachment, and congenital encephalocele. Collagen XV is a rare large non-fibrillar collagen that plays a structural role in skeletal muscle and capillaries. The thrombospondin N, the laminin G, and the pentraxin families form a superfamily all with a similar jellyroll fold
