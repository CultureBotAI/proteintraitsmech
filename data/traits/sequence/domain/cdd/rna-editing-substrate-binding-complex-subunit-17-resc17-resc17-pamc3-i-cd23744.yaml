identifier: CDD:cd23744
label: "RNA-editing substrate-binding complex subunit 17 (RESC17). RESC17 (PAMC3) is a component of the RNA-editing substrate-binding complex (RESC), consisting of about 20-components, that is involved in kinetoplast RNA processing. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode guide RNAs (gRNAs) involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. 12 of the 18 maxicircle genes are present as cryptogenes whose transcripts require U-insertion/deletion editing, mediated by gRNAs, to restore a protein-coding capacity. RESC interacts with two other complexes, the RNA-editing helicase 2 complex (REH2C) and RNA-editing catalytic complex (RECC) to form an assembly (editosome/holoenzyme) that carries out U-insertion/deletion mRNA editing. RESC17 is predicted (AlphaFold) to contain four domains; the two C-terminal domains (domains 3 and 4) are structurally similar and superimposable to RESC18 domains 3 and 4. Domain 3 adopts a helical fold and shows similarity to helix-turn-helix DNA-binding motifs, while domain 4 adopts a 5-stranded beta sheet structure surrounded by helices. Domain 4, the largest domain and predicted with the highest confidence of the four domains, shows structural similarity to many proteins belonging to different domain superfamilies including class I SAM-dependent methyltransferases and electron transfer flavoprotein (ETF) alpha belonging to the adenine nucleotide alpha hydrolase superfamily. The two N-terminal domains adopt partial winged helix or helix-turn-helix folds with structural similarities to various RNA- or DNA-binding domains."
definition: >-
  RNA-editing substrate-binding complex subunit 17 (RESC17). RESC17 (PAMC3) is a component of the RNA-editing substrate-binding complex (RESC), consisting of about 20-components, that is involved in kinetoplast RNA processing. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode guide RNAs (gRNAs) involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. 12 of the 18 maxicircle genes are present as cryptogenes whose transcripts require U-insertion/deletion editing, mediated by gRNAs, to restore a protein-coding capacity. RESC interacts with two other complexes, the RNA-editing helicase 2 complex (REH2C) and RNA-editing catalytic complex (RECC) to form an assembly (editosome/holoenzyme) that carries out U-insertion/deletion mRNA editing. RESC17 is predicted (AlphaFold) to contain four domains; the two C-terminal domains (domains 3 and 4) are structurally similar and superimposable to RESC18 domains 3 and 4. Domain 3 adopts a helical fold and shows similarity to helix-turn-helix DNA-binding motifs, while domain 4 adopts a 5-stranded beta sheet structure surrounded by helices. Domain 4, the largest domain and predicted with the highest confidence of the four domains, shows structural similarity to many proteins belonging to different domain superfamilies including class I SAM-dependent methyltransferases and electron transfer flavoprotein (ETF) alpha belonging to the adenine nucleotide alpha hydrolase superfamily. The two N-terminal domains adopt partial winged helix or helix-turn-helix folds with structural similarities to various RNA- or DNA-binding domains. — an NCBI CDD conserved domain (cd23744); members share this curated model.
