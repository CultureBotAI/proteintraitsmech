identifier: CDD:cd10912
label: "PIN_domain of Bacillus subtilis YacP/Rae1 and related proteins. Bacillus subtilis YacP, also known as Rae1, is an endoribonuclease involved in ribosome-dependent mRNA decay. The PIN (PilT N terminus) domain belongs to a large nuclease superfamily. PIN domains were originally named for their sequence similarity to the N-terminal domain of an annotated pili biogenesis protein, PilT, a domain fusion between a PIN-domain and a PilT ATPase domain. The structural properties of the PIN domain indicate its putative active center, consisting of invariant acidic amino acid residues (putative metal-binding residues), is geometrically similar in the active center of structure-specific 5' nucleases (also known as Flap endonuclease-1-like), PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons."
definition: >-
