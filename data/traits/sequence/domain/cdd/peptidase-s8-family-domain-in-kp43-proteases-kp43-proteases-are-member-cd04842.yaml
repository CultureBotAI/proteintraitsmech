identifier: CDD:cd04842
label: "Peptidase S8 family domain in Kp43 proteases. Kp43 proteases are members of the peptidase S8 or Subtilase clan of proteases. They have an Asp/His/Ser catalytic triad similar to that found in trypsin-like proteases, but do not share their three-dimensional structure (an example of convergent evolution). Kp43 is topologically similar to kexin and furin both of which are proprotein convertases, but differ in amino acids sequence and the position of its C-terminal barrel.  Kp43 has 3 Ca2+ binding sites that differ from the corresponding sites in the other known subtilisin-like proteases.  KP-43 protease is known to be an oxidation-resistant protease when compared with the other subtilisin-like proteases"
definition: >-
  Peptidase S8 family domain in Kp43 proteases. Kp43 proteases are members of the peptidase S8 or Subtilase clan of proteases. They have an Asp/His/Ser catalytic triad similar to that found in trypsin-like proteases, but do not share their three-dimensional structure (an example of convergent evolution). Kp43 is topologically similar to kexin and furin both of which are proprotein convertases, but differ in amino acids sequence and the position of its C-terminal barrel. Kp43 has 3 Ca2+ binding sites that differ from the corresponding sites in the other known subtilisin-like proteases. KP-43 protease is known to be an oxidation-resistant protease when compared with the other subtilisin-like proteases — an NCBI CDD conserved domain (cd04842); members share this curated model.
