identifier: CDD:cd14583
label: "protein tyrosine phosphatase-like domain of myotubularin related phosphoinositide phosphatase 7. Myotubularin related phosphoinositide phosphatase 7 (MTMR7) is enzymatically active and contains a C-terminal coiled-coil domain and an N-terminal PH-GRAM domain. In general, myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. They dephosphorylate the D-3 position of phosphatidylinositol 3-phosphate [PI(3)P] and phosphatidylinositol 3,5-bisphosphate [PI(3,5)P2], generating phosphatidylinositol and phosphatidylinositol 5-phosphate [PI(5)P], respectively. In neuronal cells, MTMR7 forms a complex with catalytically inactive MTMR9 and dephosphorylates phosphatidylinositol 3-phosphate and Ins(1,3)P2."
definition: >-
