identifier: CDD:cd05749
label: "Second immunoglobulin (Ig)-like domain of Axl/Tyro3 family receptor tyrosine kinases (RTKs); member of the I-set of Ig superfamily (IgSF) domains. The members here are composed of the second immunoglobulin (Ig)-like domain in the Axl/Tyro3 family of receptor tyrosine kinases (RTKs). This family includes Axl (also known as Ark, Ufo, and Tyro7), Tyro3 (also known as Sky, Rse, Brt, Dtk, and Tif), and Mer (also known as Nyk, c-Eyk, and Tyro12). Axl/Tyro3 family receptors have an extracellular portion with two Ig-like domains followed by two fibronectin-types III (FNIII) domains, a membrane-spanning single helix, and a cytoplasmic tyrosine kinase domain. Axl, Tyro3, and Mer are widely expressed in adult tissues, though they show higher expression in the brain, lymphatic and vascular systems, and testis. Axl, Tyro3, and Mer bind the vitamin K dependent protein Gas6 with high affinity, and in doing so activate their tyrosine kinase activity. Axl/Gas6 signaling may play a part in cell adhesion processes, prevention of apoptosis, and cell proliferation."
definition: >-
