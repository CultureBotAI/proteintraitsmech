identifier: CDD:cd24001
label: "nucleotide-binding domain (NBD) of the Kae1/TsaB-like domain family. The family includes tRNA N6-adenosine threonylcarbamoyltransferase Kae1/TsaD, tRNA threonylcarbamoyladenosine biosynthesis protein TsaB (previously known as YeaZ), as well as proteins from the NodU/CmcH subfamily. tRNA N6-adenosine threonylcarbamoyltransferase (EC 2.3.1.234) is required for the formation of a threonylcarbamoyl group on adenosine at position 37 (t(6)A37) in tRNAs that read codons beginning with adenine. It is involved in the transfer of the threonylcarbamoyl moiety of threonylcarbamoyl-AMP (TC-AMP) to the N6 group of A37. TsaB is required for the formation of a threonylcarbamoyl group on adenosine at position 37 (t(6)A37) in tRNAs that read codons beginning with adenine. It may be involved in the transfer of the threonylcarbamoyl moiety of threonylcarbamoyl-AMP (TC-AMP) to the N6 group of A37, together with TsaD and TsaE. TsaB seems to play an indirect role in the t(6)A biosynthesis pathway, possibly in regulating the core enzymatic function of TsaD. The NodU/CmcH family includes NodU from Rhizobium, CmcH from Amycolatopsis lactamdurans, the bifunctional carbamoyltransferase TobZ from Streptoalloteichus tenebrarius, NovN from Streptomyces niveus and NolNO from Sinorhizobium fredii. NodU is a Rhizobium nodulation protein involved in the synthesis of nodulation factors has 6-O-carbamoyltransferase-like activity. 3'-hydroxymethylcephem-O-carbamoyltransferase CmcH (EC 2.1.3.7) is involved in cephamycin (antibiotic) biosynthesis and has 3-hydroxymethylcephem carbamoyltransferase activity. nebramycin 5' synthase TobZ (EC 6.1.2.2) functions as an ATP carbamoyltransferase and tobramycin carbamoyltransferase. Novobiocin biosynthesis protein NovN (EC 2.1.3.12) acts as a carbamoyltransferase that mediates 3'-carbamoylation of the noviosyl ring to produce novobiocin, the final step in the novobiocin biosynthesis pathway. nodulation protein NolNO (EC 2.1.3.-) is involved in the O-carbamoylation of nod factors. The NodU/CmcH subfamily proteins consist of two domains. Only the N-terminal domain shows similarity with Kae1/TsaB-like domain, which belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains."
definition: >-
  nucleotide-binding domain (NBD) of the Kae1/TsaB-like domain family. The family includes tRNA N6-adenosine threonylcarbamoyltransferase Kae1/TsaD, tRNA threonylcarbamoyladenosine biosynthesis protein TsaB (previously known as YeaZ), as well as proteins from the NodU/CmcH subfamily. tRNA N6-adenosine threonylcarbamoyltransferase (EC 2.3.1.234) is required for the formation of a threonylcarbamoyl group on adenosine at position 37 (t(6)A37) in tRNAs that read codons beginning with adenine. It is involved in the transfer of the threonylcarbamoyl moiety of threonylcarbamoyl-AMP (TC-AMP) to the N6 group of A37. TsaB is required for the formation of a threonylcarbamoyl group on adenosine at position 37 (t(6)A37) in tRNAs that read codons beginning with adenine. It may be involved in the transfer of the threonylcarbamoyl moiety of threonylcarbamoyl-AMP (TC-AMP) to the N6 group of A37, together with TsaD and TsaE. TsaB seems to play an indirect role in the t(6)A biosynthesis pathway, possibly in regulating the core enzymatic function of TsaD. The NodU/CmcH family includes NodU from Rhizobium, CmcH from Amycolatopsis lactamdurans, the bifunctional carbamoyltransferase TobZ from Streptoalloteichus tenebrarius, NovN from Streptomyces niveus and NolNO from Sinorhizobium fredii. NodU is a Rhizobium nodulation protein involved in the synthesis of nodulation factors has 6-O-carbamoyltransferase-like activity. 3'-hydroxymethylcephem-O-carbamoyltransferase CmcH (EC 2.1.3.7) is involved in cephamycin (antibiotic) biosynthesis and has 3-hydroxymethylcephem carbamoyltransferase activity. nebramycin 5' synthase TobZ (EC 6.1.2.2) functions as an ATP carbamoyltransferase and tobramycin carbamoyltransferase. Novobiocin biosynthesis protein NovN (EC 2.1.3.12) acts as a carbamoyltransferase that mediates 3'-carbamoylation of the noviosyl ring to produce novobiocin, the final step in the novobiocin biosynthesis pathway. nodulation protein NolNO (EC 2.1.3.-) is involved in the O-carbamoylation of nod factors. The NodU/CmcH subfamily proteins consist of two domains. Only the N-terminal domain shows similarity with Kae1/TsaB-like domain, which belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains. — an NCBI CDD conserved domain (cd24001); members share this curated model.
