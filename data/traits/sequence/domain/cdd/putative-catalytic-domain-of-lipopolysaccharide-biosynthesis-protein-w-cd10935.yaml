identifier: CDD:cd10935
label: "Putative catalytic domain of lipopolysaccharide biosynthesis protein WalW and its bacterial homologs. This family corresponds to a group of uncharacterized lipopolysaccharide biosynthesis protein WalW found in bacteria. Although their biochemical properties remain to be determined, members of this family is composed of a seven-stranded barrel with detectable sequence similarity to the six-stranded barrel rhizobial NodB-like proteins, which remove N-linked or O-linked acetyl groups from cell wall polysaccharides and belong to the larger carbohydrate esterase 4 (CE4) superfamily."
definition: >-
  Putative catalytic domain of lipopolysaccharide biosynthesis protein WalW and its bacterial homologs. This family corresponds to a group of uncharacterized lipopolysaccharide biosynthesis protein WalW found in bacteria. Although their biochemical properties remain to be determined, members of this family is composed of a seven-stranded barrel with detectable sequence similarity to the six-stranded barrel rhizobial NodB-like proteins, which remove N-linked or O-linked acetyl groups from cell wall polysaccharides and belong to the larger carbohydrate esterase 4 (CE4) superfamily. — an NCBI CDD conserved domain (cd10935); members share this curated model.
