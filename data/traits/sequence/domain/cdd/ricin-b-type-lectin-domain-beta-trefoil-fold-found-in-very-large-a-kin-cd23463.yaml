identifier: CDD:cd23463
label: "ricin B-type lectin domain, beta-trefoil fold, found in very large A-kinase anchor protein (vlAKAP) and similar proteins. vlAKAP, also called beta/gamma crystallin domain-containing protein 3 (CRYBG3), is an anchoring protein that mediates the subcellular compartmentation of protein kinase A (PKA). It binds to the dimeric RII-alpha regulatory subunit of PKA (PRKAR2A/PRKAR2B). vlAKAP belongs to the beta/gamma-crystallin family. It contains a ricin B-type lectin domain at the C-terminus. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in very large A-kinase anchor protein (vlAKAP) and similar proteins. vlAKAP, also called beta/gamma crystallin domain-containing protein 3 (CRYBG3), is an anchoring protein that mediates the subcellular compartmentation of protein kinase A (PKA). It binds to the dimeric RII-alpha regulatory subunit of PKA (PRKAR2A/PRKAR2B). vlAKAP belongs to the beta/gamma-crystallin family. It contains a ricin B-type lectin domain at the C-terminus. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket. — an NCBI CDD conserved domain (cd23463); members share this curated model.
