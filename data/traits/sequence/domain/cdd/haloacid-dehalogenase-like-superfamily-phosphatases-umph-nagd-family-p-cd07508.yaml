identifier: CDD:cd07508
label: "haloacid dehalogenase-like superfamily phosphatases, UmpH/NagD family. Phosphatases in this UmpH/NagD family include Escherichia coli UmpH UMP phosphatase/NagD nucleotide phosphatase , Mycobacterium tuberculosis Rv1692 glycerol 3-phosphate phosphatase, human PGP phosphoglycolate phosphatase, Schizosaccharomyces pombe PHO2 p-nitrophenylphosphatase, Bacillus AraL a putative sugar phosphatase, and  Plasmodium falciparum para nitrophenyl phosphate phosphatase PNPase. This family belongs to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases."
definition: >-
  haloacid dehalogenase-like superfamily phosphatases, UmpH/NagD family. Phosphatases in this UmpH/NagD family include Escherichia coli UmpH UMP phosphatase/NagD nucleotide phosphatase , Mycobacterium tuberculosis Rv1692 glycerol 3-phosphate phosphatase, human PGP phosphoglycolate phosphatase, Schizosaccharomyces pombe PHO2 p-nitrophenylphosphatase, Bacillus AraL a putative sugar phosphatase, and Plasmodium falciparum para nitrophenyl phosphate phosphatase PNPase. This family belongs to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases. — an NCBI CDD conserved domain (cd07508); members share this curated model.
