identifier: CDD:cd20656
label: "cytochrome P450 family 98. Cytochrome P450 family 98 (CYP98) monooxygenases catalyze the meta-hydroxylation step in the phenylpropanoid biosynthetic pathway. CYP98A3, also called p-coumaroylshikimate/quinate 3'-hydroxylase, catalyzes 3'-hydroxylation of p-coumaric esters of shikimic/quinic acids to form lignin monomers. CYP98A8, also called p-coumarate 3-hydroxylase, acts redundantly with CYP98A9 as tricoumaroylspermidine meta-hydroxylase. CYP98 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 family 98. Cytochrome P450 family 98 (CYP98) monooxygenases catalyze the meta-hydroxylation step in the phenylpropanoid biosynthetic pathway. CYP98A3, also called p-coumaroylshikimate/quinate 3'-hydroxylase, catalyzes 3'-hydroxylation of p-coumaric esters of shikimic/quinic acids to form lignin monomers. CYP98A8, also called p-coumarate 3-hydroxylase, acts redundantly with CYP98A9 as tricoumaroylspermidine meta-hydroxylase. CYP98 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd20656); members share this curated model.
