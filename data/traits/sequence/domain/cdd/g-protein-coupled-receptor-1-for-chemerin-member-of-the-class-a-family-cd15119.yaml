identifier: CDD:cd15119
label: "G protein-coupled receptor 1 for chemerin, member of the class A family of seven-transmembrane G protein-coupled receptors. G-protein coupled receptor 1 (GPR1) belongs to the class A of the seven transmembrane domain receptors.  This is an orphan receptor that can be activated by the leukocyte chemoattractant chemerin, thereby suggesting that some of the anti-inflammatory actions of chemerin may be mediated through GPR1. GPR1 is most closely related to another chemerin receptor CMKLR1. In an in-vitro study, GPR1 has been shown to act as a co-receptor to allow replication of HIV viruses."
definition: >-
  G protein-coupled receptor 1 for chemerin, member of the class A family of seven-transmembrane G protein-coupled receptors. G-protein coupled receptor 1 (GPR1) belongs to the class A of the seven transmembrane domain receptors. This is an orphan receptor that can be activated by the leukocyte chemoattractant chemerin, thereby suggesting that some of the anti-inflammatory actions of chemerin may be mediated through GPR1. GPR1 is most closely related to another chemerin receptor CMKLR1. In an in-vitro study, GPR1 has been shown to act as a co-receptor to allow replication of HIV viruses. — an NCBI CDD conserved domain (cd15119); members share this curated model.
