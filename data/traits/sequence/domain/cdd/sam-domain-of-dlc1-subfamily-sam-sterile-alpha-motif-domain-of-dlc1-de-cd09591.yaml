identifier: CDD:cd09591
label: "SAM domain of DLC1 subfamily. SAM (sterile alpha motif) domain of DLC1 (Deleted in liver cancer) protein is a protein-protein interaction domain located at the N-terminus. Proteins of this subfamily do not form dimers/oligomers through their SAM domains. They participate in regulation of cell migration. SAM domain of human DLC1 protein contains the EF1A1 (eukaryotic elongation factor) binding motif, thus SAM facilitates recruitment of EF1A1 to the membrane periphery and suppresses cell migration."
definition: >-
  SAM domain of DLC1 subfamily. SAM (sterile alpha motif) domain of DLC1 (Deleted in liver cancer) protein is a protein-protein interaction domain located at the N-terminus. Proteins of this subfamily do not form dimers/oligomers through their SAM domains. They participate in regulation of cell migration. SAM domain of human DLC1 protein contains the EF1A1 (eukaryotic elongation factor) binding motif, thus SAM facilitates recruitment of EF1A1 to the membrane periphery and suppresses cell migration. — an NCBI CDD conserved domain (cd09591); members share this curated model.
