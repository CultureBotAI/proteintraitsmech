identifier: CDD:cd21944
label: "inhibitory phosphorylation domain of myosin phosphatase targeting subunit 1(MYPT1). MYPT1, also called protein phosphatase 1 regulatory subunit 12A (PPP1R12A), myosin phosphatase target subunit 1, or protein phosphatase myosin-binding subunit, is the targeting subunit of smooth-muscle myosin phosphatase. It is a substrate for the asparaginyl hydroxylase factor inhibiting hypoxia-inducible factor (FIH). MYPT1 acts as a key regulator of protein phosphatase 1C (PPP1C). It mediates binding to myosin. As part of the PPP1C complex, MYPT1 is involved in dephosphorylation of the mitosis regulator polo-like kinase 1 (PLK1). It is capable of inhibiting HIF1A inhibitor (HIF1AN)-dependent suppression of HIF1A activity. This model corresponds to the inhibitory phosphorylation domain of MYPT1."
definition: >-
