identifier: CDD:cd06052
label: "GH1_aphid_myrosinase. Aphid myrosinase is a beta-D-thioglucosidase found primarily in insects but homologs exist in plants such as the Sitka Spruce. Aphid myrosinase hydrolyses glucosinolates sequestered from the host plant to yield volatile isothiocyanates.  These isothiocyanates act synergistically with the pheromone E-beta-farnesene as part of an alarm system when the aphid is predated.  The structure of Aphid Myrosinase is very similar to those of white mustard plant (Sinapis alba) Myrosinase and other plant diglycosidases however, its aglycon binding site differs strongly from that of the plant myrosinase.  Aphid myrosinase was identified in the cabbage aphid Brevicoryne brassicae."
definition: >-
  GH1_aphid_myrosinase. Aphid myrosinase is a beta-D-thioglucosidase found primarily in insects but homologs exist in plants such as the Sitka Spruce. Aphid myrosinase hydrolyses glucosinolates sequestered from the host plant to yield volatile isothiocyanates. These isothiocyanates act synergistically with the pheromone E-beta-farnesene as part of an alarm system when the aphid is predated. The structure of Aphid Myrosinase is very similar to those of white mustard plant (Sinapis alba) Myrosinase and other plant diglycosidases however, its aglycon binding site differs strongly from that of the plant myrosinase. Aphid myrosinase was identified in the cabbage aphid Brevicoryne brassicae. — an NCBI CDD conserved domain (cd06052); members share this curated model.
