identifier: CDD:cd19702
label: "basic helix-loop-helix (bHLH) domain found in helix-loop-helix protein 2 (HEN-2) and similar proteins. HEN-2, also termed nescient helix-loop-helix 2 (Nhlh2), or Class A basic helix-loop-helix protein 34 (bHLHa34), or nescient helix loop helix 2 (NSCL-2), is a neuron-specific bHLH transcription factor that may serve as DNA-binding protein and may be involved in the control of cell-type determination, possibly within the developing nervous system."
definition: >-
  basic helix-loop-helix (bHLH) domain found in helix-loop-helix protein 2 (HEN-2) and similar proteins. HEN-2, also termed nescient helix-loop-helix 2 (Nhlh2), or Class A basic helix-loop-helix protein 34 (bHLHa34), or nescient helix loop helix 2 (NSCL-2), is a neuron-specific bHLH transcription factor that may serve as DNA-binding protein and may be involved in the control of cell-type determination, possibly within the developing nervous system. — an NCBI CDD conserved domain (cd19702); members share this curated model.
