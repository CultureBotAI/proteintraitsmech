identifier: CDD:cd17553
label: "phosphoacceptor receiver (REC) domain of Spo0F and similar domains. Spo0F, a stand-alone response regulator containing only a REC domain with no output/effector domain, controls sporulation in Bacillus subtilis through the exchange of a phosphoryl group. Bacillus subtilis forms spores when conditions for growth become unfavorable. The initiation of sporulation is controlled by a phosphorelay (an expanded version of the two-component system) that consists of four main components: a histidine kinase (KinA), a secondary messenger (Spo0F), a phosphotransferase (Spo0B), and a transcription factor (Spo0A). REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
