identifier: CDD:cd08182
label: "Hydroxyethylphosphoate dehydrogenase (HEPD) catalyzes the reduction of phosphonoacetaldehyde (PnAA) to hydroxyethylphosphoate (HEP). Hydroxyethylphosphoate dehydrogenase (HEPD) catalyzes the reduction of phosphonoacetaldehyde (PnAA) to hydroxyethylphosphoate (HEP) with either NADH or NADPH as a cofactor, although NADH is the preferred cofactor. PnAA is a biosynthetic intermediate for several phosphonates such as the antibiotic fosfomycin, phosphinothricin tripeptide (PTT), and 2-aminoethylphosphonate (AEP). This enzyme is named PhpC in PTT biosynthesis pathway in Streptomyces hygroscopicus and S. viridochromogenes."
definition: >-
  Hydroxyethylphosphoate dehydrogenase (HEPD) catalyzes the reduction of phosphonoacetaldehyde (PnAA) to hydroxyethylphosphoate (HEP). Hydroxyethylphosphoate dehydrogenase (HEPD) catalyzes the reduction of phosphonoacetaldehyde (PnAA) to hydroxyethylphosphoate (HEP) with either NADH or NADPH as a cofactor, although NADH is the preferred cofactor. PnAA is a biosynthetic intermediate for several phosphonates such as the antibiotic fosfomycin, phosphinothricin tripeptide (PTT), and 2-aminoethylphosphonate (AEP). This enzyme is named PhpC in PTT biosynthesis pathway in Streptomyces hygroscopicus and S. viridochromogenes. — an NCBI CDD conserved domain (cd08182); members share this curated model.
