identifier: CDD:cd14266
label: "Integral membrane undecaprenol kinase domain co-occurring with type 2 phosphatidic acid phosphatase-like domains. This bacterial family of homo-trimeric integral membrane enzyme domains catalyzes the ATP-dependent phosphorylation of of undecaprenol to undecaprenyl phosphate. They sit N-terminally to phosphatase domains that are members of the type 2 phosphatidic acid phosphatase superfamily, and the function of members of this domain architecture was determined to be undecaprenyl pyrophosphate phosphatases. The bi-functional enzymes might generate undecaprenyl phosphate via two mechanisms - the phosphorylation of undecaprenol or the cleavage of the terminal phosphate group of undecaprenyl pyrophosphate."
definition: >-
  Integral membrane undecaprenol kinase domain co-occurring with type 2 phosphatidic acid phosphatase-like domains. This bacterial family of homo-trimeric integral membrane enzyme domains catalyzes the ATP-dependent phosphorylation of of undecaprenol to undecaprenyl phosphate. They sit N-terminally to phosphatase domains that are members of the type 2 phosphatidic acid phosphatase superfamily, and the function of members of this domain architecture was determined to be undecaprenyl pyrophosphate phosphatases. The bi-functional enzymes might generate undecaprenyl phosphate via two mechanisms - the phosphorylation of undecaprenol or the cleavage of the terminal phosphate group of undecaprenyl pyrophosphate. — an NCBI CDD conserved domain (cd14266); members share this curated model.
