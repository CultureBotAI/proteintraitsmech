identifier: CDD:cd13972
label: "Ubiquinone biosynthetic protein UbiB. UbiB is the prokaryotic homolog of yeast Abc1p and human ADCK3 (aarF domain containing kinase 3). It is required for the biosynthesis of Coenzyme Q (ubiquinone or Q), which is an essential lipid component in respiratory electron and proton transport. It is required in the first monooxygenase step in Q biosynthesis. Mutant strains with disrupted ubiB genes lack Q and accumulate octaprenylphenol, a Q biosynthetic intermediate."
definition: >-
  Ubiquinone biosynthetic protein UbiB. UbiB is the prokaryotic homolog of yeast Abc1p and human ADCK3 (aarF domain containing kinase 3). It is required for the biosynthesis of Coenzyme Q (ubiquinone or Q), which is an essential lipid component in respiratory electron and proton transport. It is required in the first monooxygenase step in Q biosynthesis. Mutant strains with disrupted ubiB genes lack Q and accumulate octaprenylphenol, a Q biosynthetic intermediate. — an NCBI CDD conserved domain (cd13972); members share this curated model.
