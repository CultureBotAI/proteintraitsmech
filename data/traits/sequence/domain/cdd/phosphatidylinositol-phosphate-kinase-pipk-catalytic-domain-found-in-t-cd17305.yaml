identifier: CDD:cd17305
label: "Phosphatidylinositol phosphate kinase (PIPK) catalytic domain found in type II phosphatidylinositol 5-phosphate 4-kinase (PIP5KII) and similar proteins. PIP5KIIs, also known as PIPKIIs, or PI4P5KIIs, are responsible for the synthesis of phosphatidylinositol-4,5-bisphosphate (PtdIns4,5P2), an essential lipid molecule in various cellular processes, from phosphatidylinositol-5-phosphate (PtdIns5P). Three distinct PIP5KIs have been characterized in erythrocytes, PIP5K2A, PIP5K2B, and PIP5K2C isoforms."
definition: >-
  Phosphatidylinositol phosphate kinase (PIPK) catalytic domain found in type II phosphatidylinositol 5-phosphate 4-kinase (PIP5KII) and similar proteins. PIP5KIIs, also known as PIPKIIs, or PI4P5KIIs, are responsible for the synthesis of phosphatidylinositol-4,5-bisphosphate (PtdIns4,5P2), an essential lipid molecule in various cellular processes, from phosphatidylinositol-5-phosphate (PtdIns5P). Three distinct PIP5KIs have been characterized in erythrocytes, PIP5K2A, PIP5K2B, and PIP5K2C isoforms. — an NCBI CDD conserved domain (cd17305); members share this curated model.
