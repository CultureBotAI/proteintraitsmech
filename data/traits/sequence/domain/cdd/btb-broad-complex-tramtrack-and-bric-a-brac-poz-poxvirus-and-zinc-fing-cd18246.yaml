identifier: CDD:cd18246
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 17 (KLHL17). KLHL17, also called actinfilin, is a substrate-recognition component of some cullin-RING-based BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complexes. It acts as a Cullin 3 (Cul3) substrate adaptor that links GLUR6 to the E3 ubiquitin-ligase complex, and mediates the ubiquitination and subsequent degradation of GLUR6. It may play a role in actin-based neuronal function. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 17 (KLHL17). KLHL17, also called actinfilin, is a substrate-recognition component of some cullin-RING-based BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complexes. It acts as a Cullin 3 (Cul3) substrate adaptor that links GLUR6 to the E3 ubiquitin-ligase complex, and mediates the ubiquitination and subsequent degradation of GLUR6. It may play a role in actin-based neuronal function. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18246); members share this curated model.
