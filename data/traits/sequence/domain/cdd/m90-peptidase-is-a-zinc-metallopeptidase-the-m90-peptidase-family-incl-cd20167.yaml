identifier: CDD:cd20167
label: Peptidase_M90-like
definition: >-
  M90 peptidase is a zinc-metallopeptidase. The M90 peptidase family includes the MtfA (Mlc Titration Factor A) peptidase from Escherichia coli, also known as the YeeI gene product, which is involved in the control of the glucose-phosphotransferase sensory and regulatory system by inactivation of the repressor Mlc (making large colonies). E. coli MtfA has been shown to have aminopeptidase activity with the presence of a single zinc ion in the active site ligated by two histidines in a HEXXH motif. This family also includes uncharacterized proteins similar to MtfA peptidase
