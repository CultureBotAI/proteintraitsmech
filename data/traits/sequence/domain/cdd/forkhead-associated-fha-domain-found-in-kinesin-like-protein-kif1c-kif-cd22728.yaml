identifier: CDD:cd22728
label: "forkhead associated (FHA) domain found in kinesin-like protein KIF1C. KIF1C is a new kinesin-like protein involved in vesicle transport from the Golgi apparatus to the endoplasmic reticulum. It has a microtubule plus end-directed motility. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine."
definition: >-
