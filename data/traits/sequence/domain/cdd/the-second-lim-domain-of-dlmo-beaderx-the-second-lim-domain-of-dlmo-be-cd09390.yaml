identifier: CDD:cd09390
label: "The second LIM domain of dLMO (Beaderx). The second LIM domain of dLMO (Beaderx): dLMO is a nuclear protein that plays important roles in transcriptional regulation and development. In Drosophila dLMO modulates the activity of LIM-homeodomain protein Apterous (Ap), which regulates the formation of the dorsal-ventral axis of the Drosophila wing. Biochemical analysis shows that dLMO protein influences the activity of Apterous by binding of its cofactor Chip. Further studies shown that dLMO proteins might function in an evolutionarily conserved mechanism involved in patterning the appendages. All LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes."
