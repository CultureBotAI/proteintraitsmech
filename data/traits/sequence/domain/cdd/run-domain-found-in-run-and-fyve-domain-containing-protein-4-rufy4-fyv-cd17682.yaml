identifier: CDD:cd17682
label: "RUN domain found in RUN and FYVE domain-containing protein 4 (RUFY4), FYVE and coiled-coil domain-containing protein 1 (FYCO1), and similar proteins. The family includes RUFY4 and FYCO1. RUFY4 acts as a positive regulator that enhances autophagy and lysosome tethering in response to Interleukin-4. It is expressed in a cell-specific manner or under specific immunological conditions associated with IL4 expression such as allergic asthma. FYCO1, also called zinc finger FYVE domain-containing protein 7 (ZFYVE7), is a multidomain autophagy adaptor protein that interacts with kinesin motor proteins and with the autophagosomal membrane components microtubule-associated protein 1 light chain 3 (LC3), Rab7, and phosphatidylinositol 3-phosphate (PI3P), to mediate microtubule plus-end-directed autophagosome transport. Both RUFY4 and FYCO1 contain an N-terminal RUN domain and a C-terminal FYVE domain with two coiled-coil domains in-between; this model represents the RUN domain."
definition: >-
  RUN domain found in RUN and FYVE domain-containing protein 4 (RUFY4), FYVE and coiled-coil domain-containing protein 1 (FYCO1), and similar proteins. The family includes RUFY4 and FYCO1. RUFY4 acts as a positive regulator that enhances autophagy and lysosome tethering in response to Interleukin-4. It is expressed in a cell-specific manner or under specific immunological conditions associated with IL4 expression such as allergic asthma. FYCO1, also called zinc finger FYVE domain-containing protein 7 (ZFYVE7), is a multidomain autophagy adaptor protein that interacts with kinesin motor proteins and with the autophagosomal membrane components microtubule-associated protein 1 light chain 3 (LC3), Rab7, and phosphatidylinositol 3-phosphate (PI3P), to mediate microtubule plus-end-directed autophagosome transport. Both RUFY4 and FYCO1 contain an N-terminal RUN domain and a C-terminal FYVE domain with two coiled-coil domains in-between; this model represents the RUN domain. — an NCBI CDD conserved domain (cd17682); members share this curated model.
