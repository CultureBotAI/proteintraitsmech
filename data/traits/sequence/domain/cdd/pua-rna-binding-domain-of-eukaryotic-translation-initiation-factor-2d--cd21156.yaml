identifier: CDD:cd21156
label: "PUA RNA-binding domain of eukaryotic translation initiation factor 2D and similar proteins. The RNA-binding PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain was detected in a number of proteins involved in RNA metabolism. Most members of this  eukaryotic translation initiation factor 2D (eIF2d)-like family of eukaryotic proteins also contain a domain homologous to the translation initiation factor eIF1/SUI1, and a short uncharacterized N-terminal domain. eIF2D may function as a cytosolic GTP-independent initiation factor which delivers Met-tRNA (and non-initiating tRNAs) to the 40S ribosomal subunit. The family member from Drosophila melanogaster has been named ligatin, and this alias has been adopted for other family members as well, which are not homologous to the vertebrate ligatin (LGTN) that is a trafficking receptor for phosphoglycoproteins."
definition: >-
  PUA RNA-binding domain of eukaryotic translation initiation factor 2D and similar proteins. The RNA-binding PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain was detected in a number of proteins involved in RNA metabolism. Most members of this eukaryotic translation initiation factor 2D (eIF2d)-like family of eukaryotic proteins also contain a domain homologous to the translation initiation factor eIF1/SUI1, and a short uncharacterized N-terminal domain. eIF2D may function as a cytosolic GTP-independent initiation factor which delivers Met-tRNA (and non-initiating tRNAs) to the 40S ribosomal subunit. The family member from Drosophila melanogaster has been named ligatin, and this alias has been adopted for other family members as well, which are not homologous to the vertebrate ligatin (LGTN) that is a trafficking receptor for phosphoglycoproteins. — an NCBI CDD conserved domain (cd21156); members share this curated model.
