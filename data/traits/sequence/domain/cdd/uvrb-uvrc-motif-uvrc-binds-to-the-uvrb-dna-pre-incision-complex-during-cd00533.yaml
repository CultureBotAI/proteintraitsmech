identifier: CDD:cd00533
label: uvrBC_motif
definition: >-
  UvrB/uvrC motif. UvrC binds to the UvrB-DNA pre-incision complex during nucleotide excision repair of damaged DNA. This interaction is mediated by helical hairpin motifs present both in UvrB and UvrC. A similar motif is also present in specific isoforms of the regulatory subunit of Clp proteases, being involved in stress response and being present in chloroplasts
