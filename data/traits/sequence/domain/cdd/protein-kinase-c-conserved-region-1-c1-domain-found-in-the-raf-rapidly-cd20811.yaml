identifier: CDD:cd20811
label: "protein kinase C conserved region 1 (C1 domain) found in the Raf (Rapidly Accelerated Fibrosarcoma) kinase family. Raf kinases are serine/threonine kinases (STKs) that catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. They act as mitogen-activated protein kinase kinase kinases (MAP3Ks, MKKKs, MAPKKKs), which phosphorylate and activate MAPK kinases (MAPKKs or MKKs or MAP2Ks), which in turn phosphorylate and activate MAPKs during signaling cascades that are important in mediating cellular responses to extracellular signals. They function in the linear Ras-Raf-MEK-ERK pathway that regulates many cellular processes including cycle regulation, proliferation, differentiation, survival, and apoptosis. Aberrant expression or activation of components in this pathway are associated with tumor initiation, progression, and metastasis. Raf proteins contain a Ras binding domain, a zinc finger cysteine-rich domain (C1), and a catalytic kinase domain. Vertebrates have three Raf isoforms (A-, B-, and C-Raf) with different expression profiles, modes of regulation, and abilities to function in the ERK cascade, depending on cellular context and stimuli. They have essential and non-overlapping roles during embryo- and organogenesis. Knockout of each isoform results in a lethal phenotype or abnormality in most mouse strains. This model describes the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in the Raf (Rapidly Accelerated Fibrosarcoma) kinase family. Raf kinases are serine/threonine kinases (STKs) that catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. They act as mitogen-activated protein kinase kinase kinases (MAP3Ks, MKKKs, MAPKKKs), which phosphorylate and activate MAPK kinases (MAPKKs or MKKs or MAP2Ks), which in turn phosphorylate and activate MAPKs during signaling cascades that are important in mediating cellular responses to extracellular signals. They function in the linear Ras-Raf-MEK-ERK pathway that regulates many cellular processes including cycle regulation, proliferation, differentiation, survival, and apoptosis. Aberrant expression or activation of components in this pathway are associated with tumor initiation, progression, and metastasis. Raf proteins contain a Ras binding domain, a zinc finger cysteine-rich domain (C1), and a catalytic kinase domain. Vertebrates have three Raf isoforms (A-, B-, and C-Raf) with different expression profiles, modes of regulation, and abilities to function in the ERK cascade, depending on cellular context and stimuli. They have essential and non-overlapping roles during embryo- and organogenesis. Knockout of each isoform results in a lethal phenotype or abnormality in most mouse strains. This model describes the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20811); members share this curated model.
