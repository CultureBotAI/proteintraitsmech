identifier: CDD:cd19939
label: "phosphoacceptor receiver (REC) domain of BfmR-like OmpR family response regulators. Acinetobacter baumannii BfmR is part of the BfmR/S two-component system that functions as the master regulator of biofilm initiation. BfmR confers resistance to complement-mediated bactericidal activity, independent of capsular polysaccharide, and also increases resistance to the clinically important antimicrobials meropenem and colistin, making it a potential antimicrobial target. Its inhibition would have the dual benefit of significantly decreasing in vivo survival and increasing sensitivity to selected antimicrobials. Members of this subfamily belong to the OmpR family of DNA-binding response regulators, which are characterized by a REC domain and a winged helix-turn-helix (wHTH) DNA-binding output effector domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of BfmR-like OmpR family response regulators. Acinetobacter baumannii BfmR is part of the BfmR/S two-component system that functions as the master regulator of biofilm initiation. BfmR confers resistance to complement-mediated bactericidal activity, independent of capsular polysaccharide, and also increases resistance to the clinically important antimicrobials meropenem and colistin, making it a potential antimicrobial target. Its inhibition would have the dual benefit of significantly decreasing in vivo survival and increasing sensitivity to selected antimicrobials. Members of this subfamily belong to the OmpR family of DNA-binding response regulators, which are characterized by a REC domain and a winged helix-turn-helix (wHTH) DNA-binding output effector domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd19939); members share this curated model.
