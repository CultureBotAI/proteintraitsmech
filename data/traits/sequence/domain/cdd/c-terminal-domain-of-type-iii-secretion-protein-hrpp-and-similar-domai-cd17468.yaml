identifier: CDD:cd17468
label: "C-terminal domain of type III secretion protein HrpP and similar domains. This subfamily contains Pseudomonas syringae HrpP, a type III secretion system (T3SS) substrate specificity switch-domain protein that has has an atypical T3SS translocation signal. HrpP is required for the export of pathogenicity factors into plant cells. HrpP contains a C-terminal domain similar to the globular C-terminal substrate-switching (SS) domain, also called the type III secretion substrate specificity switch (T3S4) domain, of Yersinia pestis YscP."
definition: >-
  C-terminal domain of type III secretion protein HrpP and similar domains. This subfamily contains Pseudomonas syringae HrpP, a type III secretion system (T3SS) substrate specificity switch-domain protein that has has an atypical T3SS translocation signal. HrpP is required for the export of pathogenicity factors into plant cells. HrpP contains a C-terminal domain similar to the globular C-terminal substrate-switching (SS) domain, also called the type III secretion substrate specificity switch (T3S4) domain, of Yersinia pestis YscP. — an NCBI CDD conserved domain (cd17468); members share this curated model.
