identifier: CDD:cd20043
label: FH_FOXB2
definition: >-
  Forkhead (FH) domain found in Forkhead box protein B2 (FOXB2) and similar proteins. FOXB2, also called transcription factor FKH-4, may act as a transcription factor. It may also act as a tumor suppressor; it has been found to inhibit the malignant characteristics of the pancreatic cancer cell line Panc-1 in vitro. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'
