identifier: CDD:cd17222
label: "Ras-associating (RA) domain found in Ras-association domain-containing protein 4 (RASSF4). RASSF4 is a member of a family of six related classical RASSF1-6 proteins and is broadly expressed in normal tissues. RASSF4 expression is reduced in tumor cell lines and primary tumors by promoter specific hypermethylation. RASSF4 contains the RA and SARAH domains. The RA domain of the classical RASSF protein family has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. RA domains mediate interactions with Ras and other small GTPases, and SARAH domains mediate protein-protein interactions crucial in the pathways that induce cell cycle arrest and apoptosis. RASSF4 inhibits lung cancer cell proliferation and invasion."
definition: >-
  Ras-associating (RA) domain found in Ras-association domain-containing protein 4 (RASSF4). RASSF4 is a member of a family of six related classical RASSF1-6 proteins and is broadly expressed in normal tissues. RASSF4 expression is reduced in tumor cell lines and primary tumors by promoter specific hypermethylation. RASSF4 contains the RA and SARAH domains. The RA domain of the classical RASSF protein family has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. RA domains mediate interactions with Ras and other small GTPases, and SARAH domains mediate protein-protein interactions crucial in the pathways that induce cell cycle arrest and apoptosis. RASSF4 inhibits lung cancer cell proliferation and invasion. — an NCBI CDD conserved domain (cd17222); members share this curated model.
