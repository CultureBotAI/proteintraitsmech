identifier: CDD:cd00355
label: "Ribosomal protein L30, which is found in eukaryotes and prokaryotes but not in archaea, is one of the smallest ribosomal proteins with a molecular mass of about 7kDa. L30 binds the 23SrRNA as well as the 5S rRNA and is one of five ribosomal proteins that mediate the interactions 5S rRNA makes with the ribosome.  The eukaryotic L30 members have N- and/or C-terminal extensions not found in their prokaryotic orthologs.  L30 is closely related to the ribosomal L7 protein found in eukaryotes and archaea."
definition: >-
  Ribosomal protein L30, which is found in eukaryotes and prokaryotes but not in archaea, is one of the smallest ribosomal proteins with a molecular mass of about 7kDa. L30 binds the 23SrRNA as well as the 5S rRNA and is one of five ribosomal proteins that mediate the interactions 5S rRNA makes with the ribosome. The eukaryotic L30 members have N- and/or C-terminal extensions not found in their prokaryotic orthologs. L30 is closely related to the ribosomal L7 protein found in eukaryotes and archaea. — an NCBI CDD conserved domain (cd00355); members share this curated model.
