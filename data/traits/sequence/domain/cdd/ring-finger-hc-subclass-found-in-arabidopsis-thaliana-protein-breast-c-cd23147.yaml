identifier: CDD:cd23147
label: "RING finger, HC subclass, found in Arabidopsis thaliana protein BREAST CANCER SUSCEPTIBILITY 1 homolog (AtBRCA1) and similar proteins. AtBRCA1 plays a role in DNA repair and in cell-cycle control. It is required for the repair of DNA double-strand breaks (DSBs), both natural and induced by genotoxic stress, by homologous recombination (HR). AtBRCA1 contains a typical C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in Arabidopsis thaliana protein BREAST CANCER SUSCEPTIBILITY 1 homolog (AtBRCA1) and similar proteins. AtBRCA1 plays a role in DNA repair and in cell-cycle control. It is required for the repair of DNA double-strand breaks (DSBs), both natural and induced by genotoxic stress, by homologous recombination (HR). AtBRCA1 contains a typical C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd23147); members share this curated model.
