identifier: CDD:cd16987
label: "ANTH (AP180 N-Terminal Homology) domain, N-terminal region, of plant Clathrin coat assembly protein AP180 and similar proteins. This subfamily is composed of plant clathrin coat assembly protein AP180 and other ANTH domain containing proteins that are yet to be characterized. Arabidopsis thaliana AP180 (At-AP180) is a binding partner of plant alphaC-adaptin; it functions as a clathrin assembly protein that promotes the formation of cages with an almost uniform size distribution. In addition to At-AP180, Arabidopsis thaliana contains many ANTH domain containing proteins labelled as putative clathrin assembly proteins included in this subfamily such as At4g02650, At5g10410, At2g25430, and At1g33340, among others. ANTH domains bind both inositol phospholipids and proteins, and contribute to the nucleation and formation of clathrin coats on membranes. The ANTH domain is a unique module whose N-terminal half is structurally similar to the Epsin N-Terminal Homology (ENTH) and Vps27/Hrs/STAM (VHS) domains, containing a superhelix of eight alpha helices. In addition, it contains a coiled-coil C-terminal half with strutural similarity to spectrin repeats. It binds phosphoinositide PtdIns(4,5)P2 at a short conserved motif K[X]9[K/R][H/Y] between helices 1 and 2. This model describes the N-terminal region of ANTH domains of plant clathrin coat assembly protein AP180 and similar proteins."
definition: >-
  ANTH (AP180 N-Terminal Homology) domain, N-terminal region, of plant Clathrin coat assembly protein AP180 and similar proteins. This subfamily is composed of plant clathrin coat assembly protein AP180 and other ANTH domain containing proteins that are yet to be characterized. Arabidopsis thaliana AP180 (At-AP180) is a binding partner of plant alphaC-adaptin; it functions as a clathrin assembly protein that promotes the formation of cages with an almost uniform size distribution. In addition to At-AP180, Arabidopsis thaliana contains many ANTH domain containing proteins labelled as putative clathrin assembly proteins included in this subfamily such as At4g02650, At5g10410, At2g25430, and At1g33340, among others. ANTH domains bind both inositol phospholipids and proteins, and contribute to the nucleation and formation of clathrin coats on membranes. The ANTH domain is a unique module whose N-terminal half is structurally similar to the Epsin N-Terminal Homology (ENTH) and Vps27/Hrs/STAM (VHS) domains, containing a superhelix of eight alpha helices. In addition, it contains a coiled-coil C-terminal half with strutural similarity to spectrin repeats. It binds phosphoinositide PtdIns(4,5)P2 at a short conserved motif K[X]9[K/R][H/Y] between helices 1 and 2. This model describes the N-terminal region of ANTH domains of plant clathrin coat assembly protein AP180 and similar proteins. — an NCBI CDD conserved domain (cd16987); members share this curated model.
