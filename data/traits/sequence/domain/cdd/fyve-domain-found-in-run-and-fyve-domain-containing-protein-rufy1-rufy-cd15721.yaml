identifier: CDD:cd15721
label: "FYVE domain found in RUN and FYVE domain-containing protein RUFY1, RUFY2 and similar proteins. This family includes RUN and FYVE domain-containing protein RUFY1 and RUFY2. RUFY1, also termed FYVE-finger protein EIP1, or La-binding protein 1, or Rab4-interacting protein (Rabip4), or Zinc finger FYVE domain-containing protein 12 (ZFY12), a human homologue of mouse Rabip4, an effector of Rab4 GTPase that regulates recycling of endocytosed cargo. RUFY1 is an endosomal protein that functions as a dual effector of Rab4 and Rab14 and is involved in efficient recycling of transferrin (Tfn). It is a downstream effector of Etk, a downstream tyrosine kinase of PI3-kinase that is involved in regulation of vesicle trafficking. RUFY2, also termed Rab4-interacting protein related, is a novel embryonic factor that is present in the nucleus at early stages of embryonic development. It may have both endosomal functions in the cytoplasm and nuclear functions. Both RUFY1 and RUFY2 contain an N-terminal RUN domain and a C-terminal FYVE domain with two coiled-coil domains in-between."
definition: >-
  FYVE domain found in RUN and FYVE domain-containing protein RUFY1, RUFY2 and similar proteins. This family includes RUN and FYVE domain-containing protein RUFY1 and RUFY2. RUFY1, also termed FYVE-finger protein EIP1, or La-binding protein 1, or Rab4-interacting protein (Rabip4), or Zinc finger FYVE domain-containing protein 12 (ZFY12), a human homologue of mouse Rabip4, an effector of Rab4 GTPase that regulates recycling of endocytosed cargo. RUFY1 is an endosomal protein that functions as a dual effector of Rab4 and Rab14 and is involved in efficient recycling of transferrin (Tfn). It is a downstream effector of Etk, a downstream tyrosine kinase of PI3-kinase that is involved in regulation of vesicle trafficking. RUFY2, also termed Rab4-interacting protein related, is a novel embryonic factor that is present in the nucleus at early stages of embryonic development. It may have both endosomal functions in the cytoplasm and nuclear functions. Both RUFY1 and RUFY2 contain an N-terminal RUN domain and a C-terminal FYVE domain with two coiled-coil domains in-between. — an NCBI CDD conserved domain (cd15721); members share this curated model.
