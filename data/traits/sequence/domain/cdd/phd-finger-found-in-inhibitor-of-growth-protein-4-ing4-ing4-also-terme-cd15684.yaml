identifier: CDD:cd15684
label: "PHD finger found in inhibitor of growth protein 4 (ING4). ING4, also termed p29ING4, is one member of the inhibitor of growth (ING) family of type II tumor suppressors. It acts as an E3 ubiquitin ligase to induce ubiquitination of the p65 subunit of NF-kappaB and inhibit the transactivation of NF-kappaB target genes. It also induces apoptosis through a p53 dependent pathway, including increasing p53 acetylation, inhibiting Mdm2-mediated degradation of p53 and enhancing the expression of p53 responsive genes both at the transcriptional and post-translational levels. Moreover, ING4 can inhibit the translation of proto-oncogene MYC by interacting with AUF1. It also regulates other transcription factors, such as hypoxia-inducible factor (HIF). In addition, ING4 associates with histone acetyltransferase (HAT) complexes containing MOZ (monocytic leukemia zinc finger protein)/MORF (MOZ-related factor) and HBO1, and further directs the MOZ/MORF and HBO1 complexes to chromatin. ING4 contains an N-terminal ING histone-binding domain and a C-terminal plant homeodomain (PHD) finger."
definition: >-
  PHD finger found in inhibitor of growth protein 4 (ING4). ING4, also termed p29ING4, is one member of the inhibitor of growth (ING) family of type II tumor suppressors. It acts as an E3 ubiquitin ligase to induce ubiquitination of the p65 subunit of NF-kappaB and inhibit the transactivation of NF-kappaB target genes. It also induces apoptosis through a p53 dependent pathway, including increasing p53 acetylation, inhibiting Mdm2-mediated degradation of p53 and enhancing the expression of p53 responsive genes both at the transcriptional and post-translational levels. Moreover, ING4 can inhibit the translation of proto-oncogene MYC by interacting with AUF1. It also regulates other transcription factors, such as hypoxia-inducible factor (HIF). In addition, ING4 associates with histone acetyltransferase (HAT) complexes containing MOZ (monocytic leukemia zinc finger protein)/MORF (MOZ-related factor) and HBO1, and further directs the MOZ/MORF and HBO1 complexes to chromatin. ING4 contains an N-terminal ING histone-binding domain and a C-terminal plant homeodomain (PHD) finger. — an NCBI CDD conserved domain (cd15684); members share this curated model.
