identifier: CDD:cd16718
label: "RING finger, HC subclass, found in ligand of numb protein X 3 (LNX3). LNX3, also known as PDZ domain-containing RING finger protein 3 (PDZRN3), or Semaphorin cytoplasmic domain-associated protein 3 (SEMACAP3), is an E3 ubiquitin-protein ligase that was first identified as a Semaphorin-binding partner. It is also responsible for the ubiquitination and degradation of Numb, a component of the Notch signaling pathway that functions in the specification of cell fates during development and is known to control cell numbers during neurogenesis in vertebrates. LNX3 acts as a negative regulator of osteoblast differentiation by inhibiting Wnt-beta-catenin signaling. LNX3 also plays an important role in neuromuscular junction formation. It interacts with and ubiquitinates the muscle specific tyrosine kinase (MuSK), thus promoting its endocytosis and negatively regulating the cell surface expression of this key regulator of postsynaptic assembly. LNX3 contains an N-terminal C3HC4-type RING-HC finger, two PDZ domains, and a C-terminal LNX3 homology (LNX3H) domain."
definition: >-
  RING finger, HC subclass, found in ligand of numb protein X 3 (LNX3). LNX3, also known as PDZ domain-containing RING finger protein 3 (PDZRN3), or Semaphorin cytoplasmic domain-associated protein 3 (SEMACAP3), is an E3 ubiquitin-protein ligase that was first identified as a Semaphorin-binding partner. It is also responsible for the ubiquitination and degradation of Numb, a component of the Notch signaling pathway that functions in the specification of cell fates during development and is known to control cell numbers during neurogenesis in vertebrates. LNX3 acts as a negative regulator of osteoblast differentiation by inhibiting Wnt-beta-catenin signaling. LNX3 also plays an important role in neuromuscular junction formation. It interacts with and ubiquitinates the muscle specific tyrosine kinase (MuSK), thus promoting its endocytosis and negatively regulating the cell surface expression of this key regulator of postsynaptic assembly. LNX3 contains an N-terminal C3HC4-type RING-HC finger, two PDZ domains, and a C-terminal LNX3 homology (LNX3H) domain. — an NCBI CDD conserved domain (cd16718); members share this curated model.
