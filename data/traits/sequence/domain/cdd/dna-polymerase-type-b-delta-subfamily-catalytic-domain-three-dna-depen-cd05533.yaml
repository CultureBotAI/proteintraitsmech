identifier: CDD:cd05533
label: "DNA polymerase type-B delta subfamily catalytic domain. Three DNA-dependent DNA polymerases type B (alpha, delta, and epsilon) have been identified as essential for nuclear DNA replication in eukaryotes. Presently, no direct data is available regarding the strand specificity of DNA polymerase during DNA replication in vivo. However, mutation analysis supports the hypothesis that DNA polymerase delta is the enzyme responsible for both elongation and maturation of Okazaki fragments on the lagging strand."
definition: >-
  DNA polymerase type-B delta subfamily catalytic domain. Three DNA-dependent DNA polymerases type B (alpha, delta, and epsilon) have been identified as essential for nuclear DNA replication in eukaryotes. Presently, no direct data is available regarding the strand specificity of DNA polymerase during DNA replication in vivo. However, mutation analysis supports the hypothesis that DNA polymerase delta is the enzyme responsible for both elongation and maturation of Okazaki fragments on the lagging strand. — an NCBI CDD conserved domain (cd05533); members share this curated model.
