identifier: CDD:cd19579
label: "Manduca sexta Serpin 1K and similar proteins. Serpin 1K is a chymotrypsin inhibitor and is 1 of 12 serpins found in the hemolymph of the hornworm moth Manduca sexta. Serpins may be involved in the immune response in insect hemolymph. All of these serpins are encoded by the same gene, and the message for each is produced by alternative splicing of the final exon. This exon encodes the RCL and two strands of sheet B. Serpin 1K has a canonical structure at the reactive center, as is observed in a1-antitrypsin, whereas hinge residues (P17-P13) adopt the position and conformation observed in ovalbumin. SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
