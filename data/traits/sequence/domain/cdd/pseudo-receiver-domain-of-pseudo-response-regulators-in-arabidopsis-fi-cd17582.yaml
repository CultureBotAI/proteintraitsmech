identifier: CDD:cd17582
label: "pseudo receiver domain of pseudo-response regulators. In Arabidopsis, five pseudo-response regulators (PRRs), also called APRRs, comprise a core group of clock components that controls the pace of the central oscillator of the circadian clock, an endogenous time-keeping mechanism that enables organisms to adapt to external daily cycles. The coordinated sequential expression of PRR9 (APRR9), PRR7 (APRR7), PRR5 (APRR5), PRR3 (APRR3), and PRR1 (APRR1) results in circadian waves that may be at the basis of the endogenous circadian clock. PRRs contain an N-terminal pseudo receiver (psREC) domain that resembles the receiver domain of a two-component response regulator, but lacks an aspartate residue that accepts a phosphoryl group from the sensor kinase, and a CCT motif at the C-terminus that contains a putative nuclear localization signal. The psREC domain is involved in protein-protein interactions."
definition: >-
  pseudo receiver domain of pseudo-response regulators. In Arabidopsis, five pseudo-response regulators (PRRs), also called APRRs, comprise a core group of clock components that controls the pace of the central oscillator of the circadian clock, an endogenous time-keeping mechanism that enables organisms to adapt to external daily cycles. The coordinated sequential expression of PRR9 (APRR9), PRR7 (APRR7), PRR5 (APRR5), PRR3 (APRR3), and PRR1 (APRR1) results in circadian waves that may be at the basis of the endogenous circadian clock. PRRs contain an N-terminal pseudo receiver (psREC) domain that resembles the receiver domain of a two-component response regulator, but lacks an aspartate residue that accepts a phosphoryl group from the sensor kinase, and a CCT motif at the C-terminus that contains a putative nuclear localization signal. The psREC domain is involved in protein-protein interactions. — an NCBI CDD conserved domain (cd17582); members share this curated model.
