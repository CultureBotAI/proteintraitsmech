identifier: CDD:cd11415
label: "basic helix-loop-helix (bHLH) domain found in Fer3-like protein (FERD3L) and similar proteins. FERD3L, also termed basic helix-loop-helix protein N-twist, or Class A basic helix-loop-helix protein 31 (bHLHa31), or nephew of atonal 3 (NATO3), or Neuronal twist (NTWIST), is a bHLH transcription factor expressed in the developing central nervous system (CNS). It regulates floor plate (FP) cells development. FP is a critical organizing center located at the ventral-most midline of the neural tube. FERD3L binds to the E-box and functions as inhibitor of transcription."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Fer3-like protein (FERD3L) and similar proteins. FERD3L, also termed basic helix-loop-helix protein N-twist, or Class A basic helix-loop-helix protein 31 (bHLHa31), or nephew of atonal 3 (NATO3), or Neuronal twist (NTWIST), is a bHLH transcription factor expressed in the developing central nervous system (CNS). It regulates floor plate (FP) cells development. FP is a critical organizing center located at the ventral-most midline of the neural tube. FERD3L binds to the E-box and functions as inhibitor of transcription. — an NCBI CDD conserved domain (cd11415); members share this curated model.
