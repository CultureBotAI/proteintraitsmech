identifier: CDD:cd19043
label: "extracellular domain of gamma-aminobutyric acid receptor subunit gamma-1 (GABAAR-G1 or GABRG1). This family contains extracellular domain of gamma-aminobutyric acid receptor subunit gamma-1 (GABAAR-G1), a protein that is encoded by the GABRG1 gene in humans, clustered with the alpha2 gene GABRA2, which is associated with alcohol dependence. GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Upon gamma-aminobutyric acid (GABA) binding to the ligand binding site on the ECD, Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. The gamma-1 subunit forms heteropentamers with other GABAAR subunits, likely expressed as combination of alpha1/2-beta-gamma1 subunits. A variant in GABRG1 shows the strongest statistical evidence of association of recovery from eating disorders. Studies show that upregulating or preserving GABAA gamma1/3 and gamma2 receptors may protect neurons against neurofibrillary pathology in Alzheimer's disease."
definition: >-
  extracellular domain of gamma-aminobutyric acid receptor subunit gamma-1 (GABAAR-G1 or GABRG1). This family contains extracellular domain of gamma-aminobutyric acid receptor subunit gamma-1 (GABAAR-G1), a protein that is encoded by the GABRG1 gene in humans, clustered with the alpha2 gene GABRA2, which is associated with alcohol dependence. GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Upon gamma-aminobutyric acid (GABA) binding to the ligand binding site on the ECD, Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. The gamma-1 subunit forms heteropentamers with other GABAAR subunits, likely expressed as combination of alpha1/2-beta-gamma1 subunits. A variant in GABRG1 shows the strongest statistical evidence of association of recovery from eating disorders. Studies show that upregulating or preserving GABAA gamma1/3 and gamma2 receptors may protect neurons against neurofibrillary pathology in Alzheimer's disease. — an NCBI CDD conserved domain (cd19043); members share this curated model.
