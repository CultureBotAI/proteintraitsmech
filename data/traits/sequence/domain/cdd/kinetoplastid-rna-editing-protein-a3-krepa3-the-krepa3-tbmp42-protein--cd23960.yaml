identifier: CDD:cd23960
label: "Kinetoplastid RNA Editing Protein A3 (KREPA3). The KREPA3 (TbMP42) protein is a component of the parasitic protozoan's KREPA RNA editing catalytic complex (RECC). Kinetoplastid RNA editing (KRE) proteins occur as pairs or sets of related proteins in multiple complexes. KREPA complex is composed of six components (KREPA1-6), which share a conserved C-terminal region containing an oligonucleotide-binding (OB)-fold-like domain. Apart from the conserved C-terminal OB-fold domain, KREPA1, KREPA2, and KREPA3 contain two conserved C2H2 zinc-finger domains. KREPA3 zinc fingers and OB-fold domain are each essential for growth and in vivo editing in both procyclic (PF) and bloodstream (BF) life cycle stages of Trypanosoma brucei. KREPA3 may function in editosome organization and/or RNA positioning."
definition: >-
  Kinetoplastid RNA Editing Protein A3 (KREPA3). The KREPA3 (TbMP42) protein is a component of the parasitic protozoan's KREPA RNA editing catalytic complex (RECC). Kinetoplastid RNA editing (KRE) proteins occur as pairs or sets of related proteins in multiple complexes. KREPA complex is composed of six components (KREPA1-6), which share a conserved C-terminal region containing an oligonucleotide-binding (OB)-fold-like domain. Apart from the conserved C-terminal OB-fold domain, KREPA1, KREPA2, and KREPA3 contain two conserved C2H2 zinc-finger domains. KREPA3 zinc fingers and OB-fold domain are each essential for growth and in vivo editing in both procyclic (PF) and bloodstream (BF) life cycle stages of Trypanosoma brucei. KREPA3 may function in editosome organization and/or RNA positioning. — an NCBI CDD conserved domain (cd23960); members share this curated model.
