identifier: CDD:cd16963
label: "fungal mitochondrial Holliday junction resolvases similar to Saccharomyces cerevisiae CCE1. Saccharomyces cerevisiae Cruciform cutting endonuclease 1 (CCE1) is a Holliday junction resolvase specific for 4-way junctions. CCE1 is involved in the maintenance of mitochondrial DNA. Holliday junction resolvases (HJRs) are endonucleases that specifically resolve Holliday junction DNA intermediates during homologous recombination. Holliday junctions are formed by the reciprocal exchange of strands between two DNA duplexes. HJRs occur in archaea, bacteria, and in the mitochondria of certain fungi; they may form homodimers and display structural similarity to RNase H and Hsp70."
