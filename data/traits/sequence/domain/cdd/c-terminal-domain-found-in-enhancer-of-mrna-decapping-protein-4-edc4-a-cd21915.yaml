identifier: CDD:cd21915
label: CTD_EDC4_like
definition: >-
  C-terminal domain found in enhancer of mRNA-decapping protein 4 (EDC4) and similar proteins. The family includes mammalian EDC4 and its homologs from insects and plants. EDC4, also called autoantigen Ge-1, or autoantigen RCD-8, or human enhancer of decapping large subunit (Hedls), is an activator of mRNA decapping in the process of mRNA degradation. It is a component of a complex containing DCP2 and DCP1A which functions in decapping of ARE-containing mRNAs. EDC4 Promotes complex formation between DCP1A and DCP2. Drosophila melanogaster EDC homolog, Ge-1, may play a role in mRNA decapping in the process of mRNA degradation. It is required for silencing a subset of endogenous miRNA targets. Arabidopsis thaliana EDC4, also called Protein VARICOSE, is a WD-domain protein required for leaf blade development. Arabidopsis DCP2, DCP1, and EDC4 form a decapping complex that is involved in the degradation of mRNAs and required for postembryonic development. The model corresponds to a conserved region at the C-terminus. In Drosophila melanogaster Ge-1, the C-terminal domain (CTD) interacts with DCP2 and mediates Ge-1 oligomerization and P-body localization
