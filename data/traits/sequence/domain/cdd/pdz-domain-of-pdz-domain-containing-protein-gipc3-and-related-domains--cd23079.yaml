identifier: CDD:cd23079
label: "PDZ domain of PDZ domain-containing protein GIPC3, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of GIPC3, and related domains. GIPC3 (also known as C19orf64) belongs to the GIPC family, members of which contain an N-terminal GIPC-homology 1 (GH1) domain, a central PDZ domain, and a C-terminal GH2 domain. GIPC proteins function as adaptor molecules that assemble RTKs, GPCRs, integrins, transmembrane proteins and cytoplasmic signaling regulators as cargoes of MYO6-dependent endocytic transport. Mutations in the Gipc3 gene cause nonsyndromic hearing loss. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This GIPC3 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  PDZ domain of PDZ domain-containing protein GIPC3, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of GIPC3, and related domains. GIPC3 (also known as C19orf64) belongs to the GIPC family, members of which contain an N-terminal GIPC-homology 1 (GH1) domain, a central PDZ domain, and a C-terminal GH2 domain. GIPC proteins function as adaptor molecules that assemble RTKs, GPCRs, integrins, transmembrane proteins and cytoplasmic signaling regulators as cargoes of MYO6-dependent endocytic transport. Mutations in the Gipc3 gene cause nonsyndromic hearing loss. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This GIPC3 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd23079); members share this curated model.
