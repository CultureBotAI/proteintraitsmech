identifier: CDD:cd18286
label: "second BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB/POZ domain-containing protein 8 (BTBD8). BTBD8 is a BTB-domain-containing Kelch-like protein that may play a role in developmental processes. It may also act as a protein-protein adaptor in a transcription complex and thus be involved in brain development. BTBD8 contains two BTB domains. This model corresponds to the second domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  second BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB/POZ domain-containing protein 8 (BTBD8). BTBD8 is a BTB-domain-containing Kelch-like protein that may play a role in developmental processes. It may also act as a protein-protein adaptor in a transcription complex and thus be involved in brain development. BTBD8 contains two BTB domains. This model corresponds to the second domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18286); members share this curated model.
