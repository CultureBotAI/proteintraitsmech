identifier: CDD:cd17142
label: "Dublecortin-like domain 2 found in neuronal migration protein doublecortin (DCX). DCX, also termed doublin or lissencephalin-X (Lis-XDCX), is a microtubule-associated protein (MAP). It belongs to the doublecortin (DCX) family, has double tandem DCX repeats, and is expressed in migrating neurons. Structure studies show that the N-terminal DCX domain has a stable ubiquitin-like fold. DCX is not only a unique MAP in terms of its structure, but also interacts with multiple additional proteins. Mutations in the human DCX genes are associated with abnormal neuronal migration, epilepsy, and mental retardation."
definition: >-
  Dublecortin-like domain 2 found in neuronal migration protein doublecortin (DCX). DCX, also termed doublin or lissencephalin-X (Lis-XDCX), is a microtubule-associated protein (MAP). It belongs to the doublecortin (DCX) family, has double tandem DCX repeats, and is expressed in migrating neurons. Structure studies show that the N-terminal DCX domain has a stable ubiquitin-like fold. DCX is not only a unique MAP in terms of its structure, but also interacts with multiple additional proteins. Mutations in the human DCX genes are associated with abnormal neuronal migration, epilepsy, and mental retardation. — an NCBI CDD conserved domain (cd17142); members share this curated model.
