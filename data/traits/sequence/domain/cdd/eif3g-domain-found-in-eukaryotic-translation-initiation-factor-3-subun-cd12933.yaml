identifier: CDD:cd12933
label: eIF3G
definition: >-
  eIF3G domain found in eukaryotic translation initiation factor 3 subunit G (eIF-3G) and similar proteins. eIF-3G, also termed eIF-3 subunit 4, or eIF-3-delta, or eIF3-p42, or eIF3-p44, is the RNA-binding subunit of eIF3. eIF3 is a large multi-subunit complex that plays a central role in the initiation of translation by binding to the 40 S ribosomal subunit and promoting the binding of methionyl-tRNAi and mRNA. eIF-3G binds 18 S rRNA and beta-globin mRNA, and therefore appears to be a nonspecific RNA-binding protein. Besides, eIF-3G is one of the cytosolic targets; it interacts with mature apoptosis-inducing factor (AIF). This family also includes yeast eIF3-p33, a homolog of vertebrate eIF-3G; it plays an important role in the initiation phase of protein synthesis in yeast. It binds both mRNA and rRNA fragments due to an RNA recognition motif near its C-terminus
