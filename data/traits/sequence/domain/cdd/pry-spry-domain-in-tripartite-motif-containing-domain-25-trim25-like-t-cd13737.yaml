identifier: CDD:cd13737
label: "PRY/SPRY domain in tripartite motif-containing domain 25 (TRIM25)-like. This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of proteins similar to TRIM25 (composed of RING/B-box/coiled-coil core and also known as RBCC proteins). TRIM25 (also called Efp) ubiquitinates the N terminus of the viral RNA receptor retinoic acid-inducible gene-I (RIG-I) in response to viral infection, leading to activation of the RIG-I signaling pathway, thus resulting in type I interferon production to limit viral replication. It has been shown that the influenza A virus targets TRIM25 and disables its antiviral function."
definition: >-
