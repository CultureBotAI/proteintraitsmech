identifier: CDD:cd10375
label: "Src homology 2 (SH2) domain found in signal transducer and activator of transcription (STAT) 4proteins. STAT4 mediate signals from the IL-12 receptors. STAT4 is mainly phosphorylated by IL-12-mediated signaling pathway in T cells. STAT4 expression is restricted in myeloid cells, thymus and testis. L-12 is the major cytokine that can activate STAT4, resulting in its tyrosine phosphorylation. The IL-12 receptor has two chains, termed IL-12R 1 and IL-12R 2, and ligand binding results in heterodimer formation and activation of the receptor associated JAK kinases, Jak2 and Tyk2. Phosphorylated STAT4 homo-dimerizes via its SH2 domain, and translocates into nucleus where it can recognize traditional N3 STAT target sequences in IL-12 responsive genes. STAT4 can also be phosphorylated in response to IFN-gamma stimulation through activation of Jak1 and Tyk2  in human. IL-17 can also activate STAT4 in human monocytic leukemia cell lines and IL-2 can induce Jak2 and Stat4 activation in NK cells but not in T cells. T helper 1 (Th1) cells produce IL-2 and IFNgamma, whereas Th2 cells secrete IL-4, IL-5, IL-6 and IL-13. Th1 cells are responsible for cell-mediated/inflammatory immunity and can enhance defenses against infectious agents and cancer, while Th2 cells are essential for humoral immunity and the clearance of parasitic antigens. The most potent factors that can promote Th1 and Th2 differentiation are the cytokines IL-12 and IL-4 respectively Although STAT4 is expressed both in Th1 and Th2 cells, STAT4 can only be phosphorylated by IL-12 which suggests that STAT4 plays an important role in Th1 cell function or development. STAT4 activation leads to Th1 differentiation, including the target genes of STAT4 such as ERM, a transcription factor that belongs to the Ets family of transcription factors. The expression of ERM is specifically induced by IL-12 in wild-type Th1 cells, but not in STAT4-deficient T cells. STAT proteins mediate the signaling of cytokines and a number of growth factors from the receptors of these extracellular signaling molecules to the cell nucleus. STATs are specifically phosphorylated by receptor-associated Janus kinases, receptor tyrosine kinases, or cytoplasmic tyrosine kinases. The phosphorylated STAT molecules dimerize by reciprocal binding of their SH2 domains to the phosphotyrosine residues. These dimeric STATs translocate into the nucleus, bind to specific DNA sequences, and regulate the transcription of their target genes.  However there are a number of unphosphorylated STATs that travel between the cytoplasm and nucleus and some STATs that exist as dimers in unstimulated cells that can exert biological functions independent of being activated. There are seven mammalian STAT family members which have been identified: STAT1, STAT2, STAT3, STAT4, STAT5 (STAT5A and STAT5B), and STAT6. There are 6 conserved domains in STAT: N-terminal domain (NTD), coiled-coil domain (CCD), DNA-binding domain (DBD), alpha-helical linker domain (LD), SH2 domain, and transactivation domain (TAD).  NTD is involved in dimerization of unphosphorylated STATs monomers and for the tetramerization between STAT1, STAT3, STAT4 and STAT5 on promoters with two or more tandem STAT binding sites.  It also plays a role in promoting interactions with transcriptional co-activators such as CREB binding protein (CBP)/p300, as well as being important for nuclear import and deactivation of STATs involving tyrosine de-phosphorylation. CCD interacts with other proteins, such as IFN regulatory protein 9 (IRF-9/p48) with STAT1 and c-JUN with STAT3 and is also thought to participate in the negative regulation of these proteins. Distinct genes are bound to STATs via their DBD domain. This domain is also involved in nuclear translocation of activated STAT1 and STAT3 phosphorylated dimers upon cytokine stimulation.  LD links the DNA-binding and SH2  domains and is important for the transcriptional activation of STAT1 in response to IFN-gamma. It also plays a role in protein-protein interactions and has also been implicated in the constitutive nucleocytoplasmic shuttling of unphosphorylated STATs in resting cells.  The SH2 domain is necessary for receptor association and tyrosine phosphodimer formation. Residues within this domain may be particularly important for some cellular functions mediated by the STATs as well as residues adjacent to this domain.  The TAD interacts with several proteins, namely minichromosome maintenance complex component 5 (MCM5), breast cancer 1 (BRCA1) and CBP/p300. TAD also contains a modulatory phosphorylation site that regulates STAT activity and is necessary for maximal transcription of a number of target genes. The conserved tyrosine residue present in the C-terminus is crucial for dimerization via interaction with the SH2 domain upon the interaction of the ligand with the receptor. STAT activation by tyrosine phosphorylation also determines nuclear import and retention, DNA binding to specific DNA elements in the promoters of responsive genes, and transcriptional activation of STAT dimers. In addition to the SH2 domain there is a coiled-coil domain, a DNA binding domain, and a transactivation domain in the STAT proteins. In general SH2 domains are involved in signal transduction.  They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in signal transducer and activator of transcription (STAT) 4proteins. STAT4 mediate signals from the IL-12 receptors. STAT4 is mainly phosphorylated by IL-12-mediated signaling pathway in T cells. STAT4 expression is restricted in myeloid cells, thymus and testis. L-12 is the major cytokine that can activate STAT4, resulting in its tyrosine phosphorylation. The IL-12 receptor has two chains, termed IL-12R 1 and IL-12R 2, and ligand binding results in heterodimer formation and activation of the receptor associated JAK kinases, Jak2 and Tyk2. Phosphorylated STAT4 homo-dimerizes via its SH2 domain, and translocates into nucleus where it can recognize traditional N3 STAT target sequences in IL-12 responsive genes. STAT4 can also be phosphorylated in response to IFN-gamma stimulation through activation of Jak1 and Tyk2 in human. IL-17 can also activate STAT4 in human monocytic leukemia cell lines and IL-2 can induce Jak2 and Stat4 activation in NK cells but not in T cells. T helper 1 (Th1) cells produce IL-2 and IFNgamma, whereas Th2 cells secrete IL-4, IL-5, IL-6 and IL-13. Th1 cells are responsible for cell-mediated/inflammatory immunity and can enhance defenses against infectious agents and cancer, while Th2 cells are essential for humoral immunity and the clearance of parasitic antigens. The most potent factors that can promote Th1 and Th2 differentiation are the cytokines IL-12 and IL-4 respectively Although STAT4 is expressed both in Th1 and Th2 cells, STAT4 can only be phosphorylated by IL-12 which suggests that STAT4 plays an important role in Th1 cell function or development. STAT4 activation leads to Th1 differentiation, including the target genes of STAT4 such as ERM, a transcription factor that belongs to the Ets family of transcription factors. The expression of ERM is specifically induced by IL-12 in wild-type Th1 cells, but not in STAT4-deficient T cells. STAT proteins mediate the signaling of cytokines and a number of growth factors from the receptors of these extracellular signaling molecules to the cell nucleus. STATs are specifically phosphorylated by receptor-associated Janus kinases, receptor tyrosine kinases, or cytoplasmic tyrosine kinases. The phosphorylated STAT molecules dimerize by reciprocal binding of their SH2 domains to the phosphotyrosine residues. These dimeric STATs translocate into the nucleus, bind to specific DNA sequences, and regulate the transcription of their target genes. However there are a number of unphosphorylated STATs that travel between the cytoplasm and nucleus and some STATs that exist as dimers in unstimulated cells that can exert biological functions independent of being activated. There are seven mammalian STAT family members which have been identified: STAT1, STAT2, STAT3, STAT4, STAT5 (STAT5A and STAT5B), and STAT6. There are 6 conserved domains in STAT: N-terminal domain (NTD), coiled-coil domain (CCD), DNA-binding domain (DBD), alpha-helical linker domain (LD), SH2 domain, and transactivation domain (TAD). NTD is involved in dimerization of unphosphorylated STATs monomers and for the tetramerization between STAT1, STAT3, STAT4 and STAT5 on promoters with two or more tandem STAT binding sites. It also plays a role in promoting interactions with transcriptional co-activators such as CREB binding protein (CBP)/p300, as well as being important for nuclear import and deactivation of STATs involving tyrosine de-phosphorylation. CCD interacts with other proteins, such as IFN regulatory protein 9 (IRF-9/p48) with STAT1 and c-JUN with STAT3 and is also thought to participate in the negative regulation of these proteins. Distinct genes are bound to STATs via their DBD domain. This domain is also involved in nuclear translocation of activated STAT1 and STAT3 phosphorylated dimers upon cytokine stimulation. LD links the DNA-binding and SH2 domains and is important for the transcriptional activation of STAT1 in response to IFN-gamma. It also plays a role in protein-protein interactions and has also been implicated in the constitutive nucleocytoplasmic shuttling of unphosphorylated STATs in resting cells. The SH2 domain is necessary for receptor association and tyrosine phosphodimer formation. Residues within this domain may be particularly important for some cellular functions mediated by the STATs as well as residues adjacent to this domain. The TAD interacts with several proteins, namely minichromosome maintenance complex component 5 (MCM5), breast cancer 1 (BRCA1) and CBP/p300. TAD also contains a modulatory phosphorylation site that regulates STAT activity and is necessary for maximal transcription of a number of target genes. The conserved tyrosine residue present in the C-terminus is crucial for dimerization via interaction with the SH2 domain upon the interaction of the ligand with the receptor. STAT activation by tyrosine phosphorylation also determines nuclear import and retention, DNA binding to specific DNA elements in the promoters of responsive genes, and transcriptional activation of STAT dimers. In addition to the SH2 domain there is a coiled-coil domain, a DNA binding domain, and a transactivation domain in the STAT proteins. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10375); members share this curated model.
