identifier: CDD:cd13885
label: "The second cupredoxin domain of CumA like multicopper oxidase. This multicopper oxidase (MCO) subfamily includes CumA from Pseudomonas putida. CumA is involved in the oxidation of Mn(II) in Pseudomonas putida; however, the cumA gene has been identified in a variety of bacterial species, including both Mn(II)-oxidizing and non-Mn(II)-oxidizing strains. Thus, the proteins in this family may catalyze the oxidation of other substrates. MCOs catalyze the oxidation of a variety aromatic - notably phenolic and inorganic substances coupled to the reduction of molecular oxygen to water and  has been implicated in a wide spectrum of biological activities and, in particular, plays a key role in morphogenesis, development and lignin metabolism. The MCOs in this subfamily are composed of three cupredoxin domains that include one mononuclear and one trinuclear copper center. The copper ions are bound in several sites: Type 1, Type 2, and/or Type 3. The ensemble of types 2 and 3 copper is called a trinuclear cluster. MCOs oxidize their substrate by accepting electrons at a mononuclear copper center and transferring them to the active site trinuclear copper center. The cupredoxin domain 2 of 3-domain MCOs has lost the ability to bind copper."
definition: >-
  The second cupredoxin domain of CumA like multicopper oxidase. This multicopper oxidase (MCO) subfamily includes CumA from Pseudomonas putida. CumA is involved in the oxidation of Mn(II) in Pseudomonas putida; however, the cumA gene has been identified in a variety of bacterial species, including both Mn(II)-oxidizing and non-Mn(II)-oxidizing strains. Thus, the proteins in this family may catalyze the oxidation of other substrates. MCOs catalyze the oxidation of a variety aromatic - notably phenolic and inorganic substances coupled to the reduction of molecular oxygen to water and has been implicated in a wide spectrum of biological activities and, in particular, plays a key role in morphogenesis, development and lignin metabolism. The MCOs in this subfamily are composed of three cupredoxin domains that include one mononuclear and one trinuclear copper center. The copper ions are bound in several sites: Type 1, Type 2, and/or Type 3. The ensemble of types 2 and 3 copper is called a trinuclear cluster. MCOs oxidize their substrate by accepting electrons at a mononuclear copper center and transferring them to the active site trinuclear copper center. The cupredoxin domain 2 of 3-domain MCOs has lost the ability to bind copper. — an NCBI CDD conserved domain (cd13885); members share this curated model.
