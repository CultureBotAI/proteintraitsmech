identifier: CDD:cd21858
label: "N-terminal acidic domain of telomeric repeat-binding factor 1 (TERF1) and similar proteins. TERF1, also called NIMA-interacting protein 2, or TTAGGG repeat-binding factor 1 (TRBF1), or telomeric protein Pin2/TRF1, or telomere repeat factor 1 (TRF1), is a subunit of shelterin complex (also known as the telosome) and plays a critical role in inhibiting telomere elongation by telomerase. It binds the telomeric double-stranded 5'-TTAGGG-3' repeat and negatively regulates telomere length. It is involved in the regulation of the mitotic spindle. Component of the shelterin complex (telosome) that is involved in the regulation of telomere length and protection. Shelterin associates with arrays of double-stranded 5'-TTAGGG-3' repeats added by telomerase and protects chromosome ends; without its protective activity, telomeres are no longer hidden from the DNA damage surveillance and chromosome ends are inappropriately processed by DNA repair pathways. The model corresponds to the N-terminal acidic domain of TERF1, which is responsible for TNKS binding."
definition: >-
  N-terminal acidic domain of telomeric repeat-binding factor 1 (TERF1) and similar proteins. TERF1, also called NIMA-interacting protein 2, or TTAGGG repeat-binding factor 1 (TRBF1), or telomeric protein Pin2/TRF1, or telomere repeat factor 1 (TRF1), is a subunit of shelterin complex (also known as the telosome) and plays a critical role in inhibiting telomere elongation by telomerase. It binds the telomeric double-stranded 5'-TTAGGG-3' repeat and negatively regulates telomere length. It is involved in the regulation of the mitotic spindle. Component of the shelterin complex (telosome) that is involved in the regulation of telomere length and protection. Shelterin associates with arrays of double-stranded 5'-TTAGGG-3' repeats added by telomerase and protects chromosome ends; without its protective activity, telomeres are no longer hidden from the DNA damage surveillance and chromosome ends are inappropriately processed by DNA repair pathways. The model corresponds to the N-terminal acidic domain of TERF1, which is responsible for TNKS binding. — an NCBI CDD conserved domain (cd21858); members share this curated model.
