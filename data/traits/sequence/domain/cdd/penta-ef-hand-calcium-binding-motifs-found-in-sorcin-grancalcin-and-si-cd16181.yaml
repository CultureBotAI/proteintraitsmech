identifier: CDD:cd16181
label: "Penta-EF hand, calcium binding motifs, found in sorcin, grancalcin, and similar proteins. The family corresponds to the second group of penta-EF hand (PEF) proteins that includes sorcin, grancalcin, and similar proteins. Sorcin, also termed 22 kDa Ca2+-binding protein, CP-22, or V19, is a soluble resistance-related calcium-binding protein that is expressed in normal mammalian tissues, such as the liver, lungs and heart. It contains a flexible glycine and proline-rich N-terminal extension and five EF-hand motifs that associate with membranes in a calcium-dependent manner. It may harbor three potential Ca2+ binding sites through its EF1, EF2 and EF3 hands. However, binding of only two Ca2+/monomer suffices to trigger the conformational change that exposes hydrophobic regions and leads to interaction with the respective targets. Sorcin forms homodimers through the association of the unpaired EF5 hand. Among the PEF proteins, sorcin is unique in that it contains potential phosphorylation sites by cAMP-dependent protein kinase (PKA), and it can form a tetramer at slightly acid pH values although remaining a stable dimer at neutral pH.  Grancalcin (GCA) is a cytosolic Ca2+-binding protein specifically expressed in neutrophils and monocytes/macrophages. It can strongly interact with sorcin to form a heterodimer and further modulate the function of sorcin. GCA exists as homodimers in solution. It contains five EF-hand motifs attached to an N-terminal region of an approximately 50 residue-long segment rich in glycines and prolines. In contrast with sorcin, GCA binds two Ca2+ ions through its EF1 and EF3 hands."
definition: >-
  Penta-EF hand, calcium binding motifs, found in sorcin, grancalcin, and similar proteins. The family corresponds to the second group of penta-EF hand (PEF) proteins that includes sorcin, grancalcin, and similar proteins. Sorcin, also termed 22 kDa Ca2+-binding protein, CP-22, or V19, is a soluble resistance-related calcium-binding protein that is expressed in normal mammalian tissues, such as the liver, lungs and heart. It contains a flexible glycine and proline-rich N-terminal extension and five EF-hand motifs that associate with membranes in a calcium-dependent manner. It may harbor three potential Ca2+ binding sites through its EF1, EF2 and EF3 hands. However, binding of only two Ca2+/monomer suffices to trigger the conformational change that exposes hydrophobic regions and leads to interaction with the respective targets. Sorcin forms homodimers through the association of the unpaired EF5 hand. Among the PEF proteins, sorcin is unique in that it contains potential phosphorylation sites by cAMP-dependent protein kinase (PKA), and it can form a tetramer at slightly acid pH values although remaining a stable dimer at neutral pH. Grancalcin (GCA) is a cytosolic Ca2+-binding protein specifically expressed in neutrophils and monocytes/macrophages. It can strongly interact with sorcin to form a heterodimer and further modulate the function of sorcin. GCA exists as homodimers in solution. It contains five EF-hand motifs attached to an N-terminal region of an approximately 50 residue-long segment rich in glycines and prolines. In contrast with sorcin, GCA binds two Ca2+ ions through its EF1 and EF3 hands. — an NCBI CDD conserved domain (cd16181); members share this curated model.
