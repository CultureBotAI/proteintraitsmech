identifier: CDD:cd12157
label: "Thermostable Phosphite Dehydrogenase. Phosphite dehydrogenase (PTDH), a member of the D-specific 2-hydroxyacid dehydrogenase family, catalyzes the NAD-dependent formation of phosphate from phosphite (hydrogen phosphonate). PTDH has been suggested as a potential enzyme for cofactor regeneration systems. The D-specific 2-hydroxyacid dehydrogenase superfamily include groups such as formate dehydrogenase, glycerate dehydrogenase, L-alanine dehydrogenase, and S-adenosylhomocysteine hydrolase. Despite often low sequence identity, these proteins typically have a characteristic arrangement of 2 similar subdomains of the alpha/beta Rossmann fold NAD+ binding form. The NAD+ binding domain is inserted within the linear sequence of the mostly N-terminal catalytic domain, which has a similar domain structure to the internal NAD-binding domain."
definition: >-
  Thermostable Phosphite Dehydrogenase. Phosphite dehydrogenase (PTDH), a member of the D-specific 2-hydroxyacid dehydrogenase family, catalyzes the NAD-dependent formation of phosphate from phosphite (hydrogen phosphonate). PTDH has been suggested as a potential enzyme for cofactor regeneration systems. The D-specific 2-hydroxyacid dehydrogenase superfamily include groups such as formate dehydrogenase, glycerate dehydrogenase, L-alanine dehydrogenase, and S-adenosylhomocysteine hydrolase. Despite often low sequence identity, these proteins typically have a characteristic arrangement of 2 similar subdomains of the alpha/beta Rossmann fold NAD+ binding form. The NAD+ binding domain is inserted within the linear sequence of the mostly N-terminal catalytic domain, which has a similar domain structure to the internal NAD-binding domain. — an NCBI CDD conserved domain (cd12157); members share this curated model.
