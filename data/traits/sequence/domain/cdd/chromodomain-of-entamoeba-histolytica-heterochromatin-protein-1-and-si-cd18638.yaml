identifier: CDD:cd18638
label: "chromodomain of Entamoeba histolytica heterochromatin protein 1, and similar proteins. This subgroup includes the N-terminal CHRomatin Organization Modifier (chromo) domain of heterochromatin protein 1 (HP1)-like protein from Entamoeba histolytica, and similar proteins. A chromodomain is a conserved region of about 50 amino acids, found in a variety of chromosomal proteins, and which appears to play a role in the functional organization of the eukaryotic nucleus. The chromodomain is implicated in the binding, of the proteins in which it is found, to methylated histone tails and maybe RNA. A chromodomain may occur as a single instance, in a tandem arrangement, or followed by a related chromo shadow domain."
definition: >-
  chromodomain of Entamoeba histolytica heterochromatin protein 1, and similar proteins. This subgroup includes the N-terminal CHRomatin Organization Modifier (chromo) domain of heterochromatin protein 1 (HP1)-like protein from Entamoeba histolytica, and similar proteins. A chromodomain is a conserved region of about 50 amino acids, found in a variety of chromosomal proteins, and which appears to play a role in the functional organization of the eukaryotic nucleus. The chromodomain is implicated in the binding, of the proteins in which it is found, to methylated histone tails and maybe RNA. A chromodomain may occur as a single instance, in a tandem arrangement, or followed by a related chromo shadow domain. — an NCBI CDD conserved domain (cd18638); members share this curated model.
