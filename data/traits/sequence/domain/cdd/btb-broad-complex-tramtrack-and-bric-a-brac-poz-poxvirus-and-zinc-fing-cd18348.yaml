identifier: CDD:cd18348
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB/POZ domain-containing protein 3 (BTBD3). BTBD3 is a BTB-domain-containing Kelch-like protein that controls dendrite orientation toward active axons in the mammalian neocortex. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB/POZ domain-containing protein 3 (BTBD3). BTBD3 is a BTB-domain-containing Kelch-like protein that controls dendrite orientation toward active axons in the mammalian neocortex. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18348); members share this curated model.
