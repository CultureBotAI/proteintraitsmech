identifier: CDD:cd21847
label: "transmembrane (TM) domain found in nicastrin and similar proteins. Nicastrin is a key regulator of presenilin function. It is an essential subunit of the gamma-secretase complex, an endoprotease complex that catalyzes the intramembrane cleavage of integral membrane proteins such as Notch receptors and APP (amyloid-beta precursor protein). The gamma-secretase complex plays a role in Notch and Wnt signaling cascades and regulation of downstream processes via its role in processing key regulatory proteins, and by regulating cytosolic CTNNB1 levels. Nicastrin contains a large extracellular domain, a single transmembrane (TM) domain, and a short C-terminus. The model corresponds to the TM domain that is important for the gamma-secretase complex formation."
definition: >-
  transmembrane (TM) domain found in nicastrin and similar proteins. Nicastrin is a key regulator of presenilin function. It is an essential subunit of the gamma-secretase complex, an endoprotease complex that catalyzes the intramembrane cleavage of integral membrane proteins such as Notch receptors and APP (amyloid-beta precursor protein). The gamma-secretase complex plays a role in Notch and Wnt signaling cascades and regulation of downstream processes via its role in processing key regulatory proteins, and by regulating cytosolic CTNNB1 levels. Nicastrin contains a large extracellular domain, a single transmembrane (TM) domain, and a short C-terminus. The model corresponds to the TM domain that is important for the gamma-secretase complex formation. — an NCBI CDD conserved domain (cd21847); members share this curated model.
