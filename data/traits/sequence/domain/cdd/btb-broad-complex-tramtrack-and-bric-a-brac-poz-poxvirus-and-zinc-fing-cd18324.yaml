identifier: CDD:cd18324
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 18 (ZBTB18). ZBTB18 is also called 58 kDa repressor protein (RP58), transcriptional repressor RP58, translin-associated zinc finger protein 1 (TAZ-1), zinc finger protein 238 (ZNF238), or zinc finger protein C2H2-171. It is a sequence-specific transrepressor associated with heterochromatin. It plays a role in various developmental processes such as myogenesis and brain development. It specifically binds the consensus DNA sequence 5'-[AC]ACATCTG[GT][AC]-3' which contains the E box core, and acts by recruiting chromatin remodeling multiprotein complexes. ZBTB18 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 18 (ZBTB18). ZBTB18 is also called 58 kDa repressor protein (RP58), transcriptional repressor RP58, translin-associated zinc finger protein 1 (TAZ-1), zinc finger protein 238 (ZNF238), or zinc finger protein C2H2-171. It is a sequence-specific transrepressor associated with heterochromatin. It plays a role in various developmental processes such as myogenesis and brain development. It specifically binds the consensus DNA sequence 5'-[AC]ACATCTG[GT][AC]-3' which contains the E box core, and acts by recruiting chromatin remodeling multiprotein complexes. ZBTB18 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18324); members share this curated model.
