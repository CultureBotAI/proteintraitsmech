identifier: CDD:cd17401
label: "Solute carrier organic anion transporter 2 family of the Major Facilitator Superfamily of transporters. The Solute carrier organic anion transporter 2 (SLCO2) or Organic anion transporting polypeptide 2 (OATP2) family contains two subfamilies: OATP2A and OATP2B, each containing one mammalian member, OATP2A1 and OATP2B1, respectively. OATP2A1 (encoded by SLCO2A1) is a lactate/prostaglandin anion exchanger that mediates the release of newly synthesized prostaglandins (PGD2, PGE1, PGE2, PGF2A and PGI2) from cells, the transepithelial transport of prostaglandins, and the clearance of prostaglandins from the circulation. OATP2B1 (encoded by SLCO2B1) mediates the Na(+)-independent transport of various organic anions such as taurocholate, the prostaglandins PGD2, PGE1, PGE2, leukotriene C4, thromboxane B2 and iloprost, as well as endogenous sex steroid conjugates such as dehydroepiandrosterone sulfate (DHEAS). The SLCO2/OATP2 family belongs to the Solute carrier organic anion transporter [SLCO, also called organic anion transporting polypeptides (OATPs) or Solute carrier family 21] family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Solute carrier organic anion transporter 2 family of the Major Facilitator Superfamily of transporters. The Solute carrier organic anion transporter 2 (SLCO2) or Organic anion transporting polypeptide 2 (OATP2) family contains two subfamilies: OATP2A and OATP2B, each containing one mammalian member, OATP2A1 and OATP2B1, respectively. OATP2A1 (encoded by SLCO2A1) is a lactate/prostaglandin anion exchanger that mediates the release of newly synthesized prostaglandins (PGD2, PGE1, PGE2, PGF2A and PGI2) from cells, the transepithelial transport of prostaglandins, and the clearance of prostaglandins from the circulation. OATP2B1 (encoded by SLCO2B1) mediates the Na(+)-independent transport of various organic anions such as taurocholate, the prostaglandins PGD2, PGE1, PGE2, leukotriene C4, thromboxane B2 and iloprost, as well as endogenous sex steroid conjugates such as dehydroepiandrosterone sulfate (DHEAS). The SLCO2/OATP2 family belongs to the Solute carrier organic anion transporter [SLCO, also called organic anion transporting polypeptides (OATPs) or Solute carrier family 21] family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17401); members share this curated model.
