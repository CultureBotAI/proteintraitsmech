identifier: CDD:cd22169
label: "F-box domain found in F-box only protein 17 (FBXO17), F-box only protein 27 (FBXO27) and similar proteins. This subfamily includes FBXO17 and FBXO27. FBXO17 is also called FBX17, F-box only protein 26 (FBX26/FBXO26), or FBG4, while FBXO27 is also called FBX27, or F-box/G-domain protein 5. FBXO17 and FBXO27 are the substrate-recognition components of SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complexes. They can recognize and bind denatured glycoproteins, which are modified with complex-type oligosaccharides. FBXO17 also recognizes sulfated glycans but does not bind high-mannose glycoproteins. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 17 (FBXO17), F-box only protein 27 (FBXO27) and similar proteins. This subfamily includes FBXO17 and FBXO27. FBXO17 is also called FBX17, F-box only protein 26 (FBX26/FBXO26), or FBG4, while FBXO27 is also called FBX27, or F-box/G-domain protein 5. FBXO17 and FBXO27 are the substrate-recognition components of SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complexes. They can recognize and bind denatured glycoproteins, which are modified with complex-type oligosaccharides. FBXO17 also recognizes sulfated glycans but does not bind high-mannose glycoproteins. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22169); members share this curated model.
