identifier: CDD:cd17180
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F0 sub-domain, found in kindlin-1 (KIND1). KIND1, also termed Kindlerin, or Kindler syndrome protein, or fermitin family homolog 1 (FERMT1), or Unc-112-related protein 1 (URP1), is an integrin-interacting protein that has been implicated in cell adhesion, proliferation, polarity, and motility. It is essential for maintaining the structure of cell-matrix adhesion, such as focal adhesions and podosomes. KIND1 is expressed primarily in epithelial cells. Loss or mutations of KIND1 gene may cause the Kindler syndrome (KS), an autosomal recessive skin disorder with an intriguing progressive phenotype comprising skin blistering, photosensitivity, progressive poikiloderma with extensive skin atrophy, and propensity to skin cancer. KIND1 forms a molecular complex with the key transforming growth factor (TGF)-beta/Smad3 signaling components including type I TGFbeta receptor (TbetaRI), Smad3 and Smad anchor for receptor activation (SARA) to control the activation of TGF-beta/Smad3 signaling pathway. KIND1 consists of an atypical FERM domain that is made up of F1, F2 and F3 domains, as well as an N-terminal region, which precedes the FERM domain and has been referred to as the F0 domain. This family corresponds to the F0 domain."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F0 sub-domain, found in kindlin-1 (KIND1). KIND1, also termed Kindlerin, or Kindler syndrome protein, or fermitin family homolog 1 (FERMT1), or Unc-112-related protein 1 (URP1), is an integrin-interacting protein that has been implicated in cell adhesion, proliferation, polarity, and motility. It is essential for maintaining the structure of cell-matrix adhesion, such as focal adhesions and podosomes. KIND1 is expressed primarily in epithelial cells. Loss or mutations of KIND1 gene may cause the Kindler syndrome (KS), an autosomal recessive skin disorder with an intriguing progressive phenotype comprising skin blistering, photosensitivity, progressive poikiloderma with extensive skin atrophy, and propensity to skin cancer. KIND1 forms a molecular complex with the key transforming growth factor (TGF)-beta/Smad3 signaling components including type I TGFbeta receptor (TbetaRI), Smad3 and Smad anchor for receptor activation (SARA) to control the activation of TGF-beta/Smad3 signaling pathway. KIND1 consists of an atypical FERM domain that is made up of F1, F2 and F3 domains, as well as an N-terminal region, which precedes the FERM domain and has been referred to as the F0 domain. This family corresponds to the F0 domain. — an NCBI CDD conserved domain (cd17180); members share this curated model.
