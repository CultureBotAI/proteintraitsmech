identifier: CDD:cd15190
label: "apelin receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. Apelin (APJ) receptor is a G protein-coupled receptor that binds the endogenous peptide ligands, apelin and Toddler/Elabela. APJ is an adipocyte-derived hormone that is ubiquitously expressed throughout the human body and Toddler/Elabela is a short secretory peptide that is required for normal cardiac development in zebrafish. Activation of APJ receptor plays key roles in diverse physiological processes including vasoconstriction and vasodilation, cardiac muscle contractility, angiogenesis, and regulation of water balance and food intake."
definition: >-
  apelin receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. Apelin (APJ) receptor is a G protein-coupled receptor that binds the endogenous peptide ligands, apelin and Toddler/Elabela. APJ is an adipocyte-derived hormone that is ubiquitously expressed throughout the human body and Toddler/Elabela is a short secretory peptide that is required for normal cardiac development in zebrafish. Activation of APJ receptor plays key roles in diverse physiological processes including vasoconstriction and vasodilation, cardiac muscle contractility, angiogenesis, and regulation of water balance and food intake. — an NCBI CDD conserved domain (cd15190); members share this curated model.
