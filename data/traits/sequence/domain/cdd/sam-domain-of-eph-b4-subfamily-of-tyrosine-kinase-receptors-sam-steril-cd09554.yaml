identifier: CDD:cd09554
label: "SAM domain of EPH-B4 subfamily of tyrosine kinase receptors. SAM (sterile alpha motif) domain of EPH-B4 subfamily of receptor tyrosine kinases is a C-terminal potential protein-protein interaction domain. This domain is located in the cytoplasmic region of EPH-B4 receptors and appears to mediate cell-cell initiated signal transduction. EPH-B4 protein kinase performs kinase-dependent and kinase-independent functions.  These receptors play a role in the regular vascular system development during embryogenesis. They were found overexpressed in a variety of cancers, including carcinoma of the head and neck, ovarian cancer, bladder cancer, and downregulated in bone myeloma. Thus, EphB4 is a potential biomarker and a target for drug design."
definition: >-
