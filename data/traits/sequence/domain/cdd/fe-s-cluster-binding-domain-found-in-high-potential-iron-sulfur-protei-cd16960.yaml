identifier: CDD:cd16960
label: "Fe-S cluster binding domain found in high-potential iron-sulfur proteins (HiPIPs). HiPIPs are a specific class of high-redox potential 4Fe-4S ferredoxins that functions in anaerobic electron transport in most purple and in some other photosynthetic bacteria and in at least one genus (Paracoccus) of halophilic, denitrifying bacteria. The HiPIPs are small proteins which show significant variation in their sequences, their sizes, and in their oxidation-reduction potentials. They have been characterized by a [4Fe-4S] cluster bound by four conserved cysteine residues."
definition: >-
  Fe-S cluster binding domain found in high-potential iron-sulfur proteins (HiPIPs). HiPIPs are a specific class of high-redox potential 4Fe-4S ferredoxins that functions in anaerobic electron transport in most purple and in some other photosynthetic bacteria and in at least one genus (Paracoccus) of halophilic, denitrifying bacteria. The HiPIPs are small proteins which show significant variation in their sequences, their sizes, and in their oxidation-reduction potentials. They have been characterized by a [4Fe-4S] cluster bound by four conserved cysteine residues. — an NCBI CDD conserved domain (cd16960); members share this curated model.
