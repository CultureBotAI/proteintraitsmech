label: "The \"knottin\" fold is stable cysteine-rich scaffold, in which one disulfide bridge crosses the macrocycle made by two other disulfide bridges and the connecting backbone segments. Members include plant lectins/antimicrobial peptides, plant proteinase/amylase inhibitors, plant gamma-thionins, and arthropod defensins."
definition: >-
  The "knottin" fold is stable cysteine-rich scaffold, in which one disulfide bridge crosses the macrocycle made by two other disulfide bridges and the connecting backbone segments. Members include plant lectins/antimicrobial peptides, plant proteinase/amylase inhibitors, plant gamma-thionins, and arthropod defensins. — an NCBI CDD conserved domain (cd00107); members share this curated model.
