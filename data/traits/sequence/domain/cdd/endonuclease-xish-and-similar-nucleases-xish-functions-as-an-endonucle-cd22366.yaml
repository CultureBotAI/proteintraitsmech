identifier: CDD:cd22366
label: "Endonuclease XisH and similar nucleases. XisH functions as an endonuclease in the control of expression of nitrogen fixation genes of certain Anabaena and Nostoc species of cyanobacteria. Together with XisI, it controls the cell-type specificity of the excision of the fdxN element by the recombinase XisF. XisH belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Endonuclease XisH and similar nucleases. XisH functions as an endonuclease in the control of expression of nitrogen fixation genes of certain Anabaena and Nostoc species of cyanobacteria. Together with XisI, it controls the cell-type specificity of the excision of the fdxN element by the recombinase XisF. XisH belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22366); members share this curated model.
