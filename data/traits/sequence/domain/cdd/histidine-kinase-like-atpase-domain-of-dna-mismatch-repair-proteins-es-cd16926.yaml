identifier: CDD:cd16926
label: "Histidine kinase-like ATPase domain of DNA mismatch repair proteins Escherichia coli MutL, human MutL homologs (MLH/ PMS), and related domains. This family includes the histidine kinase-like ATPase (HATPase) domains of Escherichia coli MutL, human MLH1 (mutL homolog 1), human PMS1 (PMS1 homolog 1, mismatch repair system component), human MLH3 (mutL homolog 3), and human PMS2 (PMS1 homolog 2, mismatch repair system component). MutL homologs (MLH/PMS) participate in MMR (DNA mismatch repair), and in addition have role(s) in DNA damage signaling and suppression of homologous recombination (recombination between partially homologous parental DNAs). The primary role of MutL in MMR is to mediate protein-protein interactions during mismatch recognition and strand removal; a ternary complex is formed between MutS, MutL, and the mismatched DNA, which activates the MutH endonuclease."
definition: >-
  Histidine kinase-like ATPase domain of DNA mismatch repair proteins Escherichia coli MutL, human MutL homologs (MLH/ PMS), and related domains. This family includes the histidine kinase-like ATPase (HATPase) domains of Escherichia coli MutL, human MLH1 (mutL homolog 1), human PMS1 (PMS1 homolog 1, mismatch repair system component), human MLH3 (mutL homolog 3), and human PMS2 (PMS1 homolog 2, mismatch repair system component). MutL homologs (MLH/PMS) participate in MMR (DNA mismatch repair), and in addition have role(s) in DNA damage signaling and suppression of homologous recombination (recombination between partially homologous parental DNAs). The primary role of MutL in MMR is to mediate protein-protein interactions during mismatch recognition and strand removal; a ternary complex is formed between MutS, MutL, and the mismatched DNA, which activates the MutH endonuclease. — an NCBI CDD conserved domain (cd16926); members share this curated model.
