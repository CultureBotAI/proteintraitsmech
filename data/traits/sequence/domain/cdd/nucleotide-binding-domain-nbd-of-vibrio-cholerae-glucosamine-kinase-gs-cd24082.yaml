identifier: CDD:cd24082
label: "nucleotide-binding domain (NBD) of Vibrio cholerae glucosamine kinase GspK and similar proteins. The family includes a group of uncharacterized proteins similar to Vibrio cholerae glucosamine kinase GspK (EC 2.7.1.8), also called GlcN kinase. It acts as ATP-dependent kinase, which is specific for glucosamine. GspK does not show kinase activity with any other sugar."
definition: >-
  nucleotide-binding domain (NBD) of Vibrio cholerae glucosamine kinase GspK and similar proteins. The family includes a group of uncharacterized proteins similar to Vibrio cholerae glucosamine kinase GspK (EC 2.7.1.8), also called GlcN kinase. It acts as ATP-dependent kinase, which is specific for glucosamine. GspK does not show kinase activity with any other sugar. — an NCBI CDD conserved domain (cd24082); members share this curated model.
