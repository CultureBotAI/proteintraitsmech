identifier: CDD:cd15897
label: "The penta-EF hand (PEF) family. The penta-EF hand (PEF) family contains a group of five EF-hand calcium-binding proteins, including several classical calpain large catalytic subunits (CAPN1, 2, 3, 8, 9,  11, 12, 13, 14), two calpain small subunits (CAPNS1 and CAPNS2), as well as non-calpain PEF proteins, ALG-2 (apoptosis-linked gene 2, also termed programmed cell death protein 6, PDCD6), peflin, sorcin, and grancalcin. Based on the sequence similarity of EF1 hand, ALG-2 and peflin have been classified into group I PEF proteins. Calcium-dependent protease calpain subfamily members, sorcin and grancalcin, are group II PEF proteins. Calpains (EC 3.4.22.17) are calcium-activated intracellular cysteine proteases that play important roles in the degradation or functional modulation in a variety of substrates. They have been implicated in a number of physiological processes such as cell cycle progression, remodeling of cytoskeletal-cell membrane attachments, signal transduction, gene expression and apoptosis. ALG-2 is a pro-apoptotic factor that forms a homodimer in the cell or a heterodimer with its closest paralog peflin through their EF5s. Peflin is a 30-kD PEF protein with a longer N-terminal hydrophobic domain than any other member of the PEF family, and it contains nine nonapeptide (A/PPGGPYGGP) repeats. It exists only as a heterodimer with ALG-2. The dissociation of heterodimer occurs in the presence of Ca2+. ALG-2 interacts with various proteins in a Ca2+-dependent manner. Sorcin (for soluble resistance-related calcium binding protein) is a soluble resistance-related calcium-binding protein that participates in the regulation of calcium homeostasis in cells. Grancalcin is a cytosolic Ca2+-binding protein specifically expressed in neutrophils and monocytes/macrophages. It plays a key role in leukocyte-specific functions that are responsible for host defense. Grancalcin can form a heterodimer together with sorcin. Members in this family contain five EF-hand motifs attached to an N-terminal region of variable length containing one or more short Gly/Pro-rich sequences. These proteins form homodimers or heterodimers through pairing between the 5th EF-hands from the two molecules. Unlike calmodulin, the PEF domains do not undergo major conformational changes upon binding Ca2+."
definition: >-
  The penta-EF hand (PEF) family. The penta-EF hand (PEF) family contains a group of five EF-hand calcium-binding proteins, including several classical calpain large catalytic subunits (CAPN1, 2, 3, 8, 9, 11, 12, 13, 14), two calpain small subunits (CAPNS1 and CAPNS2), as well as non-calpain PEF proteins, ALG-2 (apoptosis-linked gene 2, also termed programmed cell death protein 6, PDCD6), peflin, sorcin, and grancalcin. Based on the sequence similarity of EF1 hand, ALG-2 and peflin have been classified into group I PEF proteins. Calcium-dependent protease calpain subfamily members, sorcin and grancalcin, are group II PEF proteins. Calpains (EC 3.4.22.17) are calcium-activated intracellular cysteine proteases that play important roles in the degradation or functional modulation in a variety of substrates. They have been implicated in a number of physiological processes such as cell cycle progression, remodeling of cytoskeletal-cell membrane attachments, signal transduction, gene expression and apoptosis. ALG-2 is a pro-apoptotic factor that forms a homodimer in the cell or a heterodimer with its closest paralog peflin through their EF5s. Peflin is a 30-kD PEF protein with a longer N-terminal hydrophobic domain than any other member of the PEF family, and it contains nine nonapeptide (A/PPGGPYGGP) repeats. It exists only as a heterodimer with ALG-2. The dissociation of heterodimer occurs in the presence of Ca2+. ALG-2 interacts with various proteins in a Ca2+-dependent manner. Sorcin (for soluble resistance-related calcium binding protein) is a soluble resistance-related calcium-binding protein that participates in the regulation of calcium homeostasis in cells. Grancalcin is a cytosolic Ca2+-binding protein specifically expressed in neutrophils and monocytes/macrophages. It plays a key role in leukocyte-specific functions that are responsible for host defense. Grancalcin can form a heterodimer together with sorcin. Members in this family contain five EF-hand motifs attached to an N-terminal region of variable length containing one or more short Gly/Pro-rich sequences. These proteins form homodimers or heterodimers through pairing between the 5th EF-hands from the two molecules. Unlike calmodulin, the PEF domains do not undergo major conformational changes upon binding Ca2+. — an NCBI CDD conserved domain (cd15897); members share this curated model.
