identifier: CDD:cd14249
label: "Exocrine gland-secreting peptide 1 (ESP1) and similar pheromones. ESP1 is a peptide pheromone found in male mouse tear fluid, which is recognized by a specific G-protein-coupled receptor in the vomeronasal sensory neurons and affects female mouse sexual receptive behaviour. This small family appears restricted to rodents; the functions of members other than mouse ESP1 have not yet been determined."
definition: >-
  Exocrine gland-secreting peptide 1 (ESP1) and similar pheromones. ESP1 is a peptide pheromone found in male mouse tear fluid, which is recognized by a specific G-protein-coupled receptor in the vomeronasal sensory neurons and affects female mouse sexual receptive behaviour. This small family appears restricted to rodents; the functions of members other than mouse ESP1 have not yet been determined. — an NCBI CDD conserved domain (cd14249); members share this curated model.
