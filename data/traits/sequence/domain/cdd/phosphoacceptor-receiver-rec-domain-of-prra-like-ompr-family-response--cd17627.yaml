identifier: CDD:cd17627
label: "phosphoacceptor receiver (REC) domain of PrrA-like OmpR family response regulators. The Mycobacterium tuberculosis PrrA is part of the PrrA/PrrB two-component system (TCS) that has been implicated in early intracellular multiplication and is essential for viability. Also included in this subfamily is Mycobacterium tuberculosis MprA, part of the MprAB TCS that regulates EspR, a key regulator of the ESX-1 secretion system, and is required for establishment and maintenance of persistent infection in a tissue- and stage-specific fashion. PrrA and MprA belong to the OmpR family of DNA-binding response regulators, which contain N-terminal receiver (REC) and C-terminal DNA-binding winged helix-turn-helix effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of PrrA-like OmpR family response regulators. The Mycobacterium tuberculosis PrrA is part of the PrrA/PrrB two-component system (TCS) that has been implicated in early intracellular multiplication and is essential for viability. Also included in this subfamily is Mycobacterium tuberculosis MprA, part of the MprAB TCS that regulates EspR, a key regulator of the ESX-1 secretion system, and is required for establishment and maintenance of persistent infection in a tissue- and stage-specific fashion. PrrA and MprA belong to the OmpR family of DNA-binding response regulators, which contain N-terminal receiver (REC) and C-terminal DNA-binding winged helix-turn-helix effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17627); members share this curated model.
