identifier: CDD:cd20050
label: FH_FOXF2
definition: >-
  Forkhead (FH) domain found in Forkhead box protein F2 (FOXF2) and similar proteins. FOXF2, also called Forkhead-related activator 2 (FREAC-2), Forkhead-related protein FKHL6, or Forkhead-related transcription factor 2, is a probable transcription activator for a number of lung-specific genes. It is involved in programming organogenesis and regulating epithelial-to-mesenchymal transition (EMT) and cell proliferation. FOXF2 dysregulation is critical for tumorigenesis of various tissue types. Its expression correlates with good prognosis in patients with early non-invasive stages of breast cancer, but with poor prognosis in advanced breast cancer. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'
