identifier: CDD:cd13204
label: "FERM domain C-lobe, repeat 2, of Myosin-like proteins. These myosin-like proteins are unidentified though they are sequence similar to myosin 1/myo1, myosin 7/myoVII, and myosin 10/myoX. These myosin-like proteins contain an N-terminal motor/head region and a C-terminal tail consisting of two myosin tail homology 4 (MyTH4) and twos FERM domains. In myoX the FERM domain forms a supramodule with its MyTH4 domain which binds to the negatively charged E-hook region in the tails of alpha- and beta-tubulin forming a proposed motorized link between actin filaments and microtubules and a similar thing might happen in these myosins. The FERM domain has a cloverleaf tripart structure composed of: (1) FERM_N (A-lobe or F1); (2) FERM_M (B-lobe, or F2); and (3) FERM_C (C-lobe or F3). The second FERM_N repeat is present in this hierarchy. The C-lobe/F3 within the FERM domain is part of the PH domain family. The FERM domain is found in the cytoskeletal-associated proteins such as ezrin, moesin, radixin, 4.1R, and merlin. These proteins provide a link between the membrane and cytoskeleton and are involved in signal transduction pathways. The FERM domain is also found in protein tyrosine phosphatases (PTPs), the tyrosine kinases FAK and JAK, in addition to other proteins involved in signaling. This domain is structurally similar to the PH and PTB domains and consequently is capable of binding to both peptides and phospholipids at different sites."
definition: >-
  FERM domain C-lobe, repeat 2, of Myosin-like proteins. These myosin-like proteins are unidentified though they are sequence similar to myosin 1/myo1, myosin 7/myoVII, and myosin 10/myoX. These myosin-like proteins contain an N-terminal motor/head region and a C-terminal tail consisting of two myosin tail homology 4 (MyTH4) and twos FERM domains. In myoX the FERM domain forms a supramodule with its MyTH4 domain which binds to the negatively charged E-hook region in the tails of alpha- and beta-tubulin forming a proposed motorized link between actin filaments and microtubules and a similar thing might happen in these myosins. The FERM domain has a cloverleaf tripart structure composed of: (1) FERM_N (A-lobe or F1); (2) FERM_M (B-lobe, or F2); and (3) FERM_C (C-lobe or F3). The second FERM_N repeat is present in this hierarchy. The C-lobe/F3 within the FERM domain is part of the PH domain family. The FERM domain is found in the cytoskeletal-associated proteins such as ezrin, moesin, radixin, 4.1R, and merlin. These proteins provide a link between the membrane and cytoskeleton and are involved in signal transduction pathways. The FERM domain is also found in protein tyrosine phosphatases (PTPs), the tyrosine kinases FAK and JAK, in addition to other proteins involved in signaling. This domain is structurally similar to the PH and PTB domains and consequently is capable of binding to both peptides and phospholipids at different sites. — an NCBI CDD conserved domain (cd13204); members share this curated model.
