identifier: CDD:cd15393
label: "leucokinin-like peptide receptor from tick and related proteins, member of the class A family of seven-transmembrane G protein-coupled receptors. This subgroup includes a leucokinin-like peptide receptor from the Southern cattle tick, Boophilus microplus, a pest of cattle world-wide. Leucokinins are invertebrate neuropeptides that exhibit myotropic and diuretic activity. This receptor is the first neuropeptide receptor known from the Acari and the second known in the subfamily of leucokinin-like peptide G-protein-coupled receptors. The other known leucokinin-like peptide receptor is a lymnokinin receptor from the mollusc Lymnaea stagnalis."
definition: >-
  leucokinin-like peptide receptor from tick and related proteins, member of the class A family of seven-transmembrane G protein-coupled receptors. This subgroup includes a leucokinin-like peptide receptor from the Southern cattle tick, Boophilus microplus, a pest of cattle world-wide. Leucokinins are invertebrate neuropeptides that exhibit myotropic and diuretic activity. This receptor is the first neuropeptide receptor known from the Acari and the second known in the subfamily of leucokinin-like peptide G-protein-coupled receptors. The other known leucokinin-like peptide receptor is a lymnokinin receptor from the mollusc Lymnaea stagnalis. — an NCBI CDD conserved domain (cd15393); members share this curated model.
