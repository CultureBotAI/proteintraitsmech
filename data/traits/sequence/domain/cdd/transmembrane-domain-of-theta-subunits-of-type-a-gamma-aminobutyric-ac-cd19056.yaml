identifier: CDD:cd19056
label: "transmembrane domain of theta subunits of type-A gamma-aminobutyric acid receptor (GABAAR). This family contains transmembrane (TM) domain of the theta subunit of type-A gamma-aminobutyric acid receptor (GABAAR). The transmembrane region consists of four transmembrane-spanning alpha-helical segments (M1-M4) that are linked by loops. The intracellular loop that links M1 and M2 determines the ion selectivity of the channel. GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. GABA stimulates human hepatocellular carcinoma growth through overexpressed GABAA receptor theta subunit. Also, two autism spectrum disorder (ASD)-associated protein truncation variants have been identified in alpha 3 (GABRA3) and theta (GABRQ) genes."
definition: >-
  transmembrane domain of theta subunits of type-A gamma-aminobutyric acid receptor (GABAAR). This family contains transmembrane (TM) domain of the theta subunit of type-A gamma-aminobutyric acid receptor (GABAAR). The transmembrane region consists of four transmembrane-spanning alpha-helical segments (M1-M4) that are linked by loops. The intracellular loop that links M1 and M2 determines the ion selectivity of the channel. GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. GABA stimulates human hepatocellular carcinoma growth through overexpressed GABAA receptor theta subunit. Also, two autism spectrum disorder (ASD)-associated protein truncation variants have been identified in alpha 3 (GABRA3) and theta (GABRQ) genes. — an NCBI CDD conserved domain (cd19056); members share this curated model.
