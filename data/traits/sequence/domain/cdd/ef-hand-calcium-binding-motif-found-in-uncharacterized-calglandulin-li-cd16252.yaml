identifier: CDD:cd16252
label: "EF-hand, calcium binding motif, found in uncharacterized calglandulin-like proteins. The family corresponds to a group of uncharacterized calglandulin-like proteins. Although their biological function remain unclear, they show high sequence similarity with human calglandulin-like protein GAGLP, which is an ortholog of calglandulin from the venom glands of Bothrops insularis snake. Both GAGLP and calglandulin are putative Ca2+-binding proteins with four EF-hand motifs. However, members in this family contain only three EF-hand motifs. In this point, they may belong to the parvalbumin-like EF-hand family, which is characterized by the presence of three consecutive EF-hand motifs (helix-loop-helix)."
definition: >-
  EF-hand, calcium binding motif, found in uncharacterized calglandulin-like proteins. The family corresponds to a group of uncharacterized calglandulin-like proteins. Although their biological function remain unclear, they show high sequence similarity with human calglandulin-like protein GAGLP, which is an ortholog of calglandulin from the venom glands of Bothrops insularis snake. Both GAGLP and calglandulin are putative Ca2+-binding proteins with four EF-hand motifs. However, members in this family contain only three EF-hand motifs. In this point, they may belong to the parvalbumin-like EF-hand family, which is characterized by the presence of three consecutive EF-hand motifs (helix-loop-helix). — an NCBI CDD conserved domain (cd16252); members share this curated model.
