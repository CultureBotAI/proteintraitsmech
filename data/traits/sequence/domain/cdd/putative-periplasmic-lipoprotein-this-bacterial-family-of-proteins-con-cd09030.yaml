identifier: CDD:cd09030
label: "Putative periplasmic lipoprotein. This bacterial family of proteins contains members described as putative lipoproteins, some are also known as YcfL. The function of this family is unknown. Family members have also been annotated as predicted periplasmic lipoproteins (COG5633), and appear to contain an N-terminal membrane lipoprotein lipid attachment side (pfam08139), which is not included in this alignment model."
definition: >-
  Putative periplasmic lipoprotein. This bacterial family of proteins contains members described as putative lipoproteins, some are also known as YcfL. The function of this family is unknown. Family members have also been annotated as predicted periplasmic lipoproteins (COG5633), and appear to contain an N-terminal membrane lipoprotein lipid attachment side (pfam08139), which is not included in this alignment model. — an NCBI CDD conserved domain (cd09030); members share this curated model.
