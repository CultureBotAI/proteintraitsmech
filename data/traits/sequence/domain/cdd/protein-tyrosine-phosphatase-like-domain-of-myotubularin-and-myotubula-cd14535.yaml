identifier: CDD:cd14535
label: "protein tyrosine phosphatase-like domain of myotubularin, and  myotubularin related phosphoinositide phosphatases 1 and 2. This subgroup of enzymatically active phosphatase domains of myotubularins consists of MTM1, MTMR1 and MTMR2. All contain an additional N-terminal PH-GRAM domain and C-terminal coiled-coiled domain and PDZ binding site. In general, myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. They dephosphorylate the D-3 position of phosphatidylinositol 3-phosphate [PI(3)P] and phosphatidylinositol 3,5-bisphosphate [PI(3,5)P2], generating phosphatidylinositol and phosphatidylinositol 5-phosphate [PI(5)P], respectively."
definition: >-
  protein tyrosine phosphatase-like domain of myotubularin, and myotubularin related phosphoinositide phosphatases 1 and 2. This subgroup of enzymatically active phosphatase domains of myotubularins consists of MTM1, MTMR1 and MTMR2. All contain an additional N-terminal PH-GRAM domain and C-terminal coiled-coiled domain and PDZ binding site. In general, myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. They dephosphorylate the D-3 position of phosphatidylinositol 3-phosphate [PI(3)P] and phosphatidylinositol 3,5-bisphosphate [PI(3,5)P2], generating phosphatidylinositol and phosphatidylinositol 5-phosphate [PI(5)P], respectively. — an NCBI CDD conserved domain (cd14535); members share this curated model.
