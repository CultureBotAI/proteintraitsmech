identifier: CDD:cd20381
label: "Tudor domain found in Lamin-B receptor (LBR) and similar proteins. LBR, also called integral nuclear envelope inner membrane (INM) protein or LMN2R, is a nuclear envelope protein that anchors the lamina and the heterochromatin to the inner nuclear membrane, in cellular senescence induced by excess thymidine. It is also important for cholesterol biosynthesis. LBR can interact with chromodomain proteins and DNA. It contains one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor domain found in Lamin-B receptor (LBR) and similar proteins. LBR, also called integral nuclear envelope inner membrane (INM) protein or LMN2R, is a nuclear envelope protein that anchors the lamina and the heterochromatin to the inner nuclear membrane, in cellular senescence induced by excess thymidine. It is also important for cholesterol biosynthesis. LBR can interact with chromodomain proteins and DNA. It contains one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20381); members share this curated model.
