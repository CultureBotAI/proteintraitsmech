identifier: CDD:cd20651
label: "cytochrome P450 family 15, subfamily A, polypeptide 1, and similar cytochrome P450s. This subfamily is composed of insect and crustacean cytochrome P450s including Diploptera punctata cytochrome P450 15A1 (CYP15A1 or CYP15A1), Panulirus argus CYP2L1, and CYP303A1, CYP304A1, and CYP305A1 from Drosophila melanogaster. CYP15A1, also called methyl farnesoate epoxidase, catalyzes the conversion of methyl farnesoate to juvenile hormone III acid during juvenile hormone biosynthesis. CYP303A1, CYP304A1, and CYP305A1 may be involved in the metabolism of insect hormones and in the breakdown of synthetic insecticides. The CYP15A1-like subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 family 15, subfamily A, polypeptide 1, and similar cytochrome P450s. This subfamily is composed of insect and crustacean cytochrome P450s including Diploptera punctata cytochrome P450 15A1 (CYP15A1 or CYP15A1), Panulirus argus CYP2L1, and CYP303A1, CYP304A1, and CYP305A1 from Drosophila melanogaster. CYP15A1, also called methyl farnesoate epoxidase, catalyzes the conversion of methyl farnesoate to juvenile hormone III acid during juvenile hormone biosynthesis. CYP303A1, CYP304A1, and CYP305A1 may be involved in the metabolism of insect hormones and in the breakdown of synthetic insecticides. The CYP15A1-like subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd20651); members share this curated model.
