identifier: CDD:cd08739
label: "Regulator of G protein signaling (RGS) domain found in the RGS9 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS9 protein, a member of R7 subfamily of the RGS protein family. RGS is a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis.  Other members of the R7 subfamily (Neuronal RGS) include: RGS6, RGS7, and RGS11, all of which are expressed predominantly in the nervous system, form an obligatory complex with G-beta-5, and play important roles in the regulation of crucial neuronal processes such as vision and motor control.  Additionally they have been implicated in many neurological conditions such as anxiety, schizophrenia, and drug dependence. RGS9 forms constitutive complexes with G-beta-5 subunit and controls such fundamental functions as vision and behavior. RGS9 exists in two splice isoforms: RGS9-1 which regulates phototransduction in rods and cones and RGS9-2 which regulates dopamine and opioid signaling in the basal ganglia. In addition, RGS9 was found to bind many other proteins outside of G protein signaling pathways including: mu-opioid receptor, beta-arrestin, alpha-actinin-2, NMDAR, polycystin, spinophilin, and guanylyl cyclase, among others."
definition: >-
  Regulator of G protein signaling (RGS) domain found in the RGS9 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS9 protein, a member of R7 subfamily of the RGS protein family. RGS is a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. Other members of the R7 subfamily (Neuronal RGS) include: RGS6, RGS7, and RGS11, all of which are expressed predominantly in the nervous system, form an obligatory complex with G-beta-5, and play important roles in the regulation of crucial neuronal processes such as vision and motor control. Additionally they have been implicated in many neurological conditions such as anxiety, schizophrenia, and drug dependence. RGS9 forms constitutive complexes with G-beta-5 subunit and controls such fundamental functions as vision and behavior. RGS9 exists in two splice isoforms: RGS9-1 which regulates phototransduction in rods and cones and RGS9-2 which regulates dopamine and opioid signaling in the basal ganglia. In addition, RGS9 was found to bind many other proteins outside of G protein signaling pathways including: mu-opioid receptor, beta-arrestin, alpha-actinin-2, NMDAR, polycystin, spinophilin, and guanylyl cyclase, among others. — an NCBI CDD conserved domain (cd08739); members share this curated model.
