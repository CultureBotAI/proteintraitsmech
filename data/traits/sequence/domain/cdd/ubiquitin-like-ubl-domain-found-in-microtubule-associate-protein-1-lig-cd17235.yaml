identifier: CDD:cd17235
label: "ubiquitin-like (Ubl) domain found in microtubule associate protein 1 light chain 3B (MAP1LC3B). Autophagy is an essential intracellular process that targets large protein complexes, bacterial pathogens, and organelles for degradation. MAPLC3B belongs to the MAP1LC3 (short name LC3) family proteins. MAP1LC3 has a ubiquitin-like (Ubl) fold and belongs to the autophagy-related 8 (ATG8) protein family. A Ubl conjugation of MAPLC3 by the phospholipid phosphatidylethanolamine (PE) is an essential process for the formation of autophagosomes. MAP1LC3 is cleaved by cysteine protease ATG4 and then conjugated with PE by E1-like enzyme ATG7 and ATG3, an E2-like enzyme. The Ubl conversion of MAP1LC3 is known as a marker of autophagy-induction. All MAP1LC3 proteins are dispensable for basal autophagy; however, it has been shown that  MAP1LC3B is responsible for selective degradation of p62 through autophagy."
definition: >-
  ubiquitin-like (Ubl) domain found in microtubule associate protein 1 light chain 3B (MAP1LC3B). Autophagy is an essential intracellular process that targets large protein complexes, bacterial pathogens, and organelles for degradation. MAPLC3B belongs to the MAP1LC3 (short name LC3) family proteins. MAP1LC3 has a ubiquitin-like (Ubl) fold and belongs to the autophagy-related 8 (ATG8) protein family. A Ubl conjugation of MAPLC3 by the phospholipid phosphatidylethanolamine (PE) is an essential process for the formation of autophagosomes. MAP1LC3 is cleaved by cysteine protease ATG4 and then conjugated with PE by E1-like enzyme ATG7 and ATG3, an E2-like enzyme. The Ubl conversion of MAP1LC3 is known as a marker of autophagy-induction. All MAP1LC3 proteins are dispensable for basal autophagy; however, it has been shown that MAP1LC3B is responsible for selective degradation of p62 through autophagy. — an NCBI CDD conserved domain (cd17235); members share this curated model.
