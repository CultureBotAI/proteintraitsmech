identifier: CDD:cd17061
label: "ubiquitin-like (Ubl) domain found in IQ and ubiquitin-like domain-containing protein (IQUB) and similar proteins. IQUB is an IQ motif and ubiquitin domain-containing protein that may play roles in cilia formation and/or maintenance. It contains a conserved ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold, a common structure involved in protein-protein interactions."
definition: >-
  ubiquitin-like (Ubl) domain found in IQ and ubiquitin-like domain-containing protein (IQUB) and similar proteins. IQUB is an IQ motif and ubiquitin domain-containing protein that may play roles in cilia formation and/or maintenance. It contains a conserved ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold, a common structure involved in protein-protein interactions. — an NCBI CDD conserved domain (cd17061); members share this curated model.
