identifier: CDD:cd07694
label: "Second immunoglobulin (Ig) domain of Cluster of Differentiation (CD) 4; member of the C2-set of IgSF domains. The members here are composed of the second immunoglobulin (Ig) Constant 2 (C2)-set domain of Cluster of Differentiation (CD) 4. CD4 and CD8 are the two primary co-receptor proteins found on the surface of T cells, and the presence of either CD4 or CD8 determines the function of the T cell. CD4 is found on helper T cells, where it is required for the binding of MHC (major histocompatibility complex) class II molecules, while CD8 is found on cytotoxic T cells, where it is required for the binding of MHC class I molecules. CD4 contains four immunoglobulin domains, with the first three included in this hierarchy.  The fourth domain has a general Ig architecture, but has slight topological changes in the arrangement of beta strands relative to the other structures in this family and is not specifically included in the hierarchy. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. This group belongs to the C2-set of IgSF domains, having A, B, and E strands in one beta-sheet and A', G, F, C' in the other. Unlike other Ig domain sets, the C2-set lacks the D strand."
definition: >-
  Second immunoglobulin (Ig) domain of Cluster of Differentiation (CD) 4; member of the C2-set of IgSF domains. The members here are composed of the second immunoglobulin (Ig) Constant 2 (C2)-set domain of Cluster of Differentiation (CD) 4. CD4 and CD8 are the two primary co-receptor proteins found on the surface of T cells, and the presence of either CD4 or CD8 determines the function of the T cell. CD4 is found on helper T cells, where it is required for the binding of MHC (major histocompatibility complex) class II molecules, while CD8 is found on cytotoxic T cells, where it is required for the binding of MHC class I molecules. CD4 contains four immunoglobulin domains, with the first three included in this hierarchy. The fourth domain has a general Ig architecture, but has slight topological changes in the arrangement of beta strands relative to the other structures in this family and is not specifically included in the hierarchy. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. This group belongs to the C2-set of IgSF domains, having A, B, and E strands in one beta-sheet and A', G, F, C' in the other. Unlike other Ig domain sets, the C2-set lacks the D strand. — an NCBI CDD conserved domain (cd07694); members share this curated model.
