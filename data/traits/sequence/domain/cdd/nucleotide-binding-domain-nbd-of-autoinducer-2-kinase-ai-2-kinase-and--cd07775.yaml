identifier: CDD:cd07775
label: "nucleotide-binding domain (NBD) of autoinducer-2 kinase (AI-2 kinase) and similar proteins. AI-2 kinase (EC 2.7.1.189), also known as LsrK, catalyzes the phosphorylation of autoinducer-2 (AI-2) to phospho-AI-2, which subsequently inactivates the transcriptional regulator LsrR and leads to the transcription of the lsr operon. It phosphorylates the ring-open form of (S)-4,5-dihydroxypentane-2,3-dione (DPD), which is the precursor to all AI-2 signaling molecules, at the C5 position. It is required for the regulation of the lsr operon and many other genes. Members of this subfamily belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain."
definition: >-
  nucleotide-binding domain (NBD) of autoinducer-2 kinase (AI-2 kinase) and similar proteins. AI-2 kinase (EC 2.7.1.189), also known as LsrK, catalyzes the phosphorylation of autoinducer-2 (AI-2) to phospho-AI-2, which subsequently inactivates the transcriptional regulator LsrR and leads to the transcription of the lsr operon. It phosphorylates the ring-open form of (S)-4,5-dihydroxypentane-2,3-dione (DPD), which is the precursor to all AI-2 signaling molecules, at the C5 position. It is required for the regulation of the lsr operon and many other genes. Members of this subfamily belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain. — an NCBI CDD conserved domain (cd07775); members share this curated model.
