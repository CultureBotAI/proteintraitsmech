identifier: CDD:cd22139
label: "F-box domain found in uncharacterized F-box protein group similar to F-box only protein 3 (FBXO3). This subfamily corresponds to a group of uncharacterized F-box proteins which show sequence similarity to F-box only protein 3 (FBXO3). FBXO3, also called FBX3, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex, that mediates the ubiquitination of HIPK2 and probably that of EP300, leading to rapid degradation by the proteasome. It also promotes ubiquitylation and transcriptional activity of AIRE (autoimmune regulator). The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in uncharacterized F-box protein group similar to F-box only protein 3 (FBXO3). This subfamily corresponds to a group of uncharacterized F-box proteins which show sequence similarity to F-box only protein 3 (FBXO3). FBXO3, also called FBX3, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex, that mediates the ubiquitination of HIPK2 and probably that of EP300, leading to rapid degradation by the proteasome. It also promotes ubiquitylation and transcriptional activity of AIRE (autoimmune regulator). The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22139); members share this curated model.
