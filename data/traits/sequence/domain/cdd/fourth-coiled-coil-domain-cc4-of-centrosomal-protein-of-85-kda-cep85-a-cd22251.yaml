identifier: CDD:cd22251
label: "fourth coiled-coil domain (cc4) of centrosomal protein of 85 kDa (CEP85) and similar proteins. CEP85, also called coiled-coil domain-containing protein 21 (CCDC21), is a centriole duplication factor that directly engages STIL. It acts as a negative regulator of NEK2 to maintain the centrosome integrity in interphase. It suppresses centrosome disjunction by inhibiting NEK2 kinase activity. The model corresponds to the fourth coiled-coil domain (cc4) of CEP85, which reveals a parallel coiled-coil dimer and is responsible for the binding of STIL N-terminal domain (NTD)."
definition: >-
  fourth coiled-coil domain (cc4) of centrosomal protein of 85 kDa (CEP85) and similar proteins. CEP85, also called coiled-coil domain-containing protein 21 (CCDC21), is a centriole duplication factor that directly engages STIL. It acts as a negative regulator of NEK2 to maintain the centrosome integrity in interphase. It suppresses centrosome disjunction by inhibiting NEK2 kinase activity. The model corresponds to the fourth coiled-coil domain (cc4) of CEP85, which reveals a parallel coiled-coil dimer and is responsible for the binding of STIL N-terminal domain (NTD). — an NCBI CDD conserved domain (cd22251); members share this curated model.
