identifier: CDD:cd22584
label: "Rcat domain found in an uncharacterized subfamily of RBR proteins. This subfamily contains uncharacterized members of the RBR family, including Arabidopsis thaliana mutator-like transposase and hypothetical protein At2g19610/F3P11.21. The RBR family of RING-type E3 ligases are characterized by containing a RBR domain, which was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. It is composed of an extended RING domain (RING1) followed by an in-between RING (IBR) domain and the catalytic domain, which is structurally an IBR domain but is commonly designated RING2. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been corrected as RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently, where the IBR and RING2 domains have been renamed as BRcat and Rcat domains, respectively. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. RBR family members play roles in protein quality control and can indirectly regulate transcription. Evidence suggests that RBR proteins are often parts of cullin-containing ubiquitin ligase complexes. This model corresponds to the Rcat domain that is essential for RBR E3 ligase activity and adopts the same fold as the BRcat domain."
definition: >-
  Rcat domain found in an uncharacterized subfamily of RBR proteins. This subfamily contains uncharacterized members of the RBR family, including Arabidopsis thaliana mutator-like transposase and hypothetical protein At2g19610/F3P11.21. The RBR family of RING-type E3 ligases are characterized by containing a RBR domain, which was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. It is composed of an extended RING domain (RING1) followed by an in-between RING (IBR) domain and the catalytic domain, which is structurally an IBR domain but is commonly designated RING2. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been corrected as RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently, where the IBR and RING2 domains have been renamed as BRcat and Rcat domains, respectively. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. RBR family members play roles in protein quality control and can indirectly regulate transcription. Evidence suggests that RBR proteins are often parts of cullin-containing ubiquitin ligase complexes. This model corresponds to the Rcat domain that is essential for RBR E3 ligase activity and adopts the same fold as the BRcat domain. — an NCBI CDD conserved domain (cd22584); members share this curated model.
