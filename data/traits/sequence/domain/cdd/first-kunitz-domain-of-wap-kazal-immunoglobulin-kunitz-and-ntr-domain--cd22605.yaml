identifier: CDD:cd22605
label: "first Kunitz domain of WAP, Kazal, immunoglobulin, Kunitz and NTR domain-containing proteins. This subfamily includes WAP, Kazal, immunoglobulin, Kunitz and NTR domain-containing protein 1 (WFIKKN1, WFKN1), WFIKKN2 (WFKN2), and similar proteins. WFIKKN proteins are protease inhibitors that contain two distinct Kunitz-type protease inhibitor domains. They may have serine protease- and metalloprotease-inhibitor activity. This model represents the first Kunitz domain that is similar to Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor) that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  first Kunitz domain of WAP, Kazal, immunoglobulin, Kunitz and NTR domain-containing proteins. This subfamily includes WAP, Kazal, immunoglobulin, Kunitz and NTR domain-containing protein 1 (WFIKKN1, WFKN1), WFIKKN2 (WFKN2), and similar proteins. WFIKKN proteins are protease inhibitors that contain two distinct Kunitz-type protease inhibitor domains. They may have serine protease- and metalloprotease-inhibitor activity. This model represents the first Kunitz domain that is similar to Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor) that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22605); members share this curated model.
