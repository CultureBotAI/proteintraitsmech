identifier: CDD:cd10366
label: "Src homology 2 (SH2) domain found in Yes. Yes is a member of the Src non-receptor type tyrosine kinase family of proteins. Yes is the cellular homolog of the Yamaguchi sarcoma virus oncogene. In humans it is encoded by the YES1 gene which maps to chromosome 18 and is in close proximity to thymidylate synthase. A corresponding Yes pseudogene has been found on chromosome 22. YES1 has been shown to interact with Janus kinase 2, CTNND1,RPL10, and Occludin. Yes1 has a unique N-terminal domain, an SH3 domain, an SH2 domain, a kinase domain and a regulatory tail, as do the other members of the family. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in Yes. Yes is a member of the Src non-receptor type tyrosine kinase family of proteins. Yes is the cellular homolog of the Yamaguchi sarcoma virus oncogene. In humans it is encoded by the YES1 gene which maps to chromosome 18 and is in close proximity to thymidylate synthase. A corresponding Yes pseudogene has been found on chromosome 22. YES1 has been shown to interact with Janus kinase 2, CTNND1,RPL10, and Occludin. Yes1 has a unique N-terminal domain, an SH3 domain, an SH2 domain, a kinase domain and a regulatory tail, as do the other members of the family. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10366); members share this curated model.
