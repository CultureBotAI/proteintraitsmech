identifier: CDD:cd17196
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM and PDZ domain-containing protein 2 (FRMPD2). FRMPD2, also termed PDZ domain-containing protein 4 (PDZK4), or PDZ domain-containing protein 5C (PDZD5C), is a potential scaffold protein involved in basolateral membrane targeting in epithelial cells. It interacts with nucleotide-binding oligomerization domain-2 (NOD2) through leucine-rich repeats and forms a complex with the membrane-associated protein ERBB2IP. FRMPD2 contains an N-terminal KIND domain, a FERM domain and three PDZ domains. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM and PDZ domain-containing protein 2 (FRMPD2). FRMPD2, also termed PDZ domain-containing protein 4 (PDZK4), or PDZ domain-containing protein 5C (PDZD5C), is a potential scaffold protein involved in basolateral membrane targeting in epithelial cells. It interacts with nucleotide-binding oligomerization domain-2 (NOD2) through leucine-rich repeats and forms a complex with the membrane-associated protein ERBB2IP. FRMPD2 contains an N-terminal KIND domain, a FERM domain and three PDZ domains. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17196); members share this curated model.
