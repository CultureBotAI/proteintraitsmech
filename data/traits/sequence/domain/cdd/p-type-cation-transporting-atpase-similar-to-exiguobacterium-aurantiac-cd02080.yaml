identifier: CDD:cd02080
label: "P-type cation-transporting ATPase similar to Exiguobacterium aurantiacum Mna, an Na(+)-ATPase, and Synechocystis sp. PCC 6803 PMA1, a putative Ca(2+)-ATPase. This subfamily includes the P-type Na(+)-ATPase of an alkaliphilic bacterium Exiguobacterium aurantiacum Mna and cyanobacterium Synechocystis sp. PCC 6803 PMA1, a cation-transporting ATPase which may translocate calcium. The P-type ATPases, are a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle."
definition: >-
  P-type cation-transporting ATPase similar to Exiguobacterium aurantiacum Mna, an Na(+)-ATPase, and Synechocystis sp. PCC 6803 PMA1, a putative Ca(2+)-ATPase. This subfamily includes the P-type Na(+)-ATPase of an alkaliphilic bacterium Exiguobacterium aurantiacum Mna and cyanobacterium Synechocystis sp. PCC 6803 PMA1, a cation-transporting ATPase which may translocate calcium. The P-type ATPases, are a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle. — an NCBI CDD conserved domain (cd02080); members share this curated model.
