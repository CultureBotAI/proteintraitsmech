identifier: CDD:cd07729
label: "quorum-quenching N-acyl-homoserine lactonase, MBL-fold metallo-hydrolase domain. Acyl Homoserine Lactones (also known as AHLs) are signal molecules which coordinate gene expression in quorum sensing, in many Gram-negative bacteria. Quorum-quenching N-acyl-homoserine lactonase (also known as AHL lactonase, N-acyl-L-homoserine lactone hydrolase, EC 3.1.1.81) catalyzes the hydrolysis and opening of the homoserine lactone rings of AHLs, a reaction that can block quorum sensing. These enzymes belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions."
definition: >-
  quorum-quenching N-acyl-homoserine lactonase, MBL-fold metallo-hydrolase domain. Acyl Homoserine Lactones (also known as AHLs) are signal molecules which coordinate gene expression in quorum sensing, in many Gram-negative bacteria. Quorum-quenching N-acyl-homoserine lactonase (also known as AHL lactonase, N-acyl-L-homoserine lactone hydrolase, EC 3.1.1.81) catalyzes the hydrolysis and opening of the homoserine lactone rings of AHLs, a reaction that can block quorum sensing. These enzymes belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions. — an NCBI CDD conserved domain (cd07729); members share this curated model.
