identifier: CDD:cd19347
label: "Wnt domain found in protein Wnt-5a and similar proteins. Wnt-5a is a secreted growth factor that belongs to the noncanonical members of the Wingless-related MMTV-integration family. It can activate or inhibit canonical Wnt signaling, depending on receptor context. Wnt-5a specifically regulates dendritic spine formation in rodent hippocampal neurons, resulting in postsynaptic development that promotes the clustering of the postsynaptic density protein 95 (PSD-95). Wnt genes have been identified in vertebrates and invertebrates, but not in plants, unicellular eukaryotes, or prokaryotes. In humans, 19 WNT proteins are known. Because of their insolubility little is known about Wnt protein structure, but all have 23 or 24 Cys residues whose spacing is highly conserved. Signal transduction by Wnt proteins (including the Wnt/beta-catenin, the Wnt/Ca++, and the Wnt/polarity pathway) is mediated by receptors of the Frizzled and LDL-receptor-related protein (LRP) families. The Wnt signaling mediated by Wnt proteins that orchestrate and influence a myriad of cellular processes, such as cell proliferation, differentiation, tumorigenesis, apoptosis, and participation in immune defense during microbe infection."
definition: >-
  Wnt domain found in protein Wnt-5a and similar proteins. Wnt-5a is a secreted growth factor that belongs to the noncanonical members of the Wingless-related MMTV-integration family. It can activate or inhibit canonical Wnt signaling, depending on receptor context. Wnt-5a specifically regulates dendritic spine formation in rodent hippocampal neurons, resulting in postsynaptic development that promotes the clustering of the postsynaptic density protein 95 (PSD-95). Wnt genes have been identified in vertebrates and invertebrates, but not in plants, unicellular eukaryotes, or prokaryotes. In humans, 19 WNT proteins are known. Because of their insolubility little is known about Wnt protein structure, but all have 23 or 24 Cys residues whose spacing is highly conserved. Signal transduction by Wnt proteins (including the Wnt/beta-catenin, the Wnt/Ca++, and the Wnt/polarity pathway) is mediated by receptors of the Frizzled and LDL-receptor-related protein (LRP) families. The Wnt signaling mediated by Wnt proteins that orchestrate and influence a myriad of cellular processes, such as cell proliferation, differentiation, tumorigenesis, apoptosis, and participation in immune defense during microbe infection. — an NCBI CDD conserved domain (cd19347); members share this curated model.
