identifier: CDD:cd13800
label: IL2
definition: >-
  Interleukin 15. Interleukin 2 is a helical cytokine responsible for signaling in the immune response. Receptors for IL-2 are composed of CD25, CD122, and a common gamma chain, and activate the Ras/MAPK, JAK/Stat, and PI 3-kinase/AKT signaling pathways
