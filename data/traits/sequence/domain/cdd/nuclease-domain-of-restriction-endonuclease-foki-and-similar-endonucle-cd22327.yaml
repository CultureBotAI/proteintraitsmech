identifier: CDD:cd22327
label: "Nuclease domain of restriction endonuclease FokI and similar endonucleases. The type II restriction endonuclease FokI recognizes an asymmetric nucleotide sequence 5'-GGATG(N)9/13 and cleaves both DNA strands outside the recognition motif; its nuclease domain belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and HindIII."
definition: >-
  Nuclease domain of restriction endonuclease FokI and similar endonucleases. The type II restriction endonuclease FokI recognizes an asymmetric nucleotide sequence 5'-GGATG(N)9/13 and cleaves both DNA strands outside the recognition motif; its nuclease domain belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and HindIII. — an NCBI CDD conserved domain (cd22327); members share this curated model.
