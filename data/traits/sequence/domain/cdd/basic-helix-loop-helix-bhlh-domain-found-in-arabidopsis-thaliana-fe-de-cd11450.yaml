identifier: CDD:cd11450
label: "basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana Fe-deficiency induced transcription factor 1 (FIT) and similar proteins. The family includes bHLH transcription factors from Arabidopsis thaliana, such as FIT and DYT1. FIT, also termed FER-like iron deficiency-induced transcription factor, or FER-like regulator of iron uptake, or AtbHLH29, or EN 43, is a bHLH transcription factor that is required for the iron deficiency response in plant. It regulates FRO2 at the level of mRNA accumulation and IRT1 at the level of protein accumulation. DYT1, also termed AtbHLH22, or protein dysfunctional tapetum 1, or EN 49, is a bHLH transcription factor involved in the control of tapetum development. It is required for male fertility and pollen differentiation, especially during callose deposition."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana Fe-deficiency induced transcription factor 1 (FIT) and similar proteins. The family includes bHLH transcription factors from Arabidopsis thaliana, such as FIT and DYT1. FIT, also termed FER-like iron deficiency-induced transcription factor, or FER-like regulator of iron uptake, or AtbHLH29, or EN 43, is a bHLH transcription factor that is required for the iron deficiency response in plant. It regulates FRO2 at the level of mRNA accumulation and IRT1 at the level of protein accumulation. DYT1, also termed AtbHLH22, or protein dysfunctional tapetum 1, or EN 49, is a bHLH transcription factor involved in the control of tapetum development. It is required for male fertility and pollen differentiation, especially during callose deposition. — an NCBI CDD conserved domain (cd11450); members share this curated model.
