identifier: CDD:cd07826
label: "Putative hydrophobic ligand-binding SRPBCC domain of an uncharacterized subgroup of CalC- and Aha1-like proteins. SRPBCC (START/RHO_alpha_C/PITP/Bet_v1/CoxG/CalC) domain of a functionally uncharacterized subgroup of CalC- and Aha1-like proteins. This group shows similarity to the SRPBCC domains of Micromonospora echinospora CalC (a protein which confers resistance to enediynes) and human Aha1 (one of several co-chaperones which regulate the dimeric chaperone Hsp90), and belongs to the SRPBCC domain superfamily of proteins that bind hydrophobic ligands. SRPBCC domains have a deep hydrophobic ligand-binding pocket and they bind diverse ligands."
definition: >-
  Putative hydrophobic ligand-binding SRPBCC domain of an uncharacterized subgroup of CalC- and Aha1-like proteins. SRPBCC (START/RHO_alpha_C/PITP/Bet_v1/CoxG/CalC) domain of a functionally uncharacterized subgroup of CalC- and Aha1-like proteins. This group shows similarity to the SRPBCC domains of Micromonospora echinospora CalC (a protein which confers resistance to enediynes) and human Aha1 (one of several co-chaperones which regulate the dimeric chaperone Hsp90), and belongs to the SRPBCC domain superfamily of proteins that bind hydrophobic ligands. SRPBCC domains have a deep hydrophobic ligand-binding pocket and they bind diverse ligands. — an NCBI CDD conserved domain (cd07826); members share this curated model.
