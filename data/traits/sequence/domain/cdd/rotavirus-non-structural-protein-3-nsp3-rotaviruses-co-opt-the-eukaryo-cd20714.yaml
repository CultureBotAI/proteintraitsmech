identifier: CDD:cd20714
label: NSP3_rotavirus
definition: >-
  rotavirus non-structural protein 3 (NSP3). Rotaviruses co-opt the eukaryotic translation machinery during their life cycle. Most eukaryotic mRNAs are characterized by a 5' cap structure and a 3' poly(A) tail. Eukaryotic translation initiation is facilitated by interactions between the 3' poly(A) tail and the 5' end of the message mediated by poly(A) binding protein (PABP) and eukaryotic translation initiation factor 4G (eIF4G). Rotavirus NSP3 is a functional analog of PABP that enables rotaviruses to direct eukaryotic translation machinery to viral mRNAs. It binds to the 3' consensus sequence of viral mRNA and participates in mRNA circularization by interacting with eIF4G. NSP3 closes the viral mRNA loop and facilitates translation of its own mRNAs while blocking recruitment of PABP to the eukaryotic translation initiation machinery
