identifier: CDD:cd21957
label: "GBM (Gle1-binding motif) domain found in nucleoporin NUP42 and similar proteins. NUP42, also called NLP-1, or nucleoporin CG1, or nucleoporin-42, or nucleoporin-like protein 2 (NUPL2), is required for the export of mRNAs containing poly(A) tails from the nucleus into the cytoplasm. The model corresponds to the GBM (Gle1-binding motif) domain of NUP42, which is responsible for the binding of Gle1. Nup42-Gle1 interaction is integral to Dbp5 (hDDX19B) activation and efficient mRNA export."
definition: >-
  GBM (Gle1-binding motif) domain found in nucleoporin NUP42 and similar proteins. NUP42, also called NLP-1, or nucleoporin CG1, or nucleoporin-42, or nucleoporin-like protein 2 (NUPL2), is required for the export of mRNAs containing poly(A) tails from the nucleus into the cytoplasm. The model corresponds to the GBM (Gle1-binding motif) domain of NUP42, which is responsible for the binding of Gle1. Nup42-Gle1 interaction is integral to Dbp5 (hDDX19B) activation and efficient mRNA export. — an NCBI CDD conserved domain (cd21957); members share this curated model.
