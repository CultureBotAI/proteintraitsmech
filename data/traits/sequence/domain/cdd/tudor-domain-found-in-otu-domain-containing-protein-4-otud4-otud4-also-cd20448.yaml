identifier: CDD:cd20448
label: "Tudor domain found in OTU domain-containing protein 4 (OTUD4). OTUD4, also called HIV-1-induced protein HIN-1, is a phospho-activated K63 deubiquitinase that hydrolyzes the isopeptide bond between the ubiquitin C-terminus and the lysine epsilon-amino group of the target protein. It may negatively regulate inflammatory and pathogen recognition signaling in innate immune response. It contains one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor domain found in OTU domain-containing protein 4 (OTUD4). OTUD4, also called HIV-1-induced protein HIN-1, is a phospho-activated K63 deubiquitinase that hydrolyzes the isopeptide bond between the ubiquitin C-terminus and the lysine epsilon-amino group of the target protein. It may negatively regulate inflammatory and pathogen recognition signaling in innate immune response. It contains one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20448); members share this curated model.
