identifier: CDD:cd21424
label: MCM16_cc
definition: >-
  coiled-coil domain of minichromosome maintenance protein 16 (MCM16) and similar proteins. MCM16, also called CENP-H homolog, or constitutive centromere-associated network protein MCM16, is a component of the kinetochore, a multiprotein complex that assembles on centromeric DNA and attaches chromosomes to spindle microtubules, mediating chromosome segregation and sister chromatid segregation during meiosis and mitosis. The model corresponds to a coiled-coil domain of MCM16, which may mediate functionally important protein-protein interactions
