label: "RNA recognition motif 5 (RRM5) found in RNA-binding protein 12B (RBM12B) and similar proteins. This subgroup corresponds to the RRM5 of RBM12B which contains five distinct RNA binding motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). Its biological role remains unclear."
definition: >-
  RNA recognition motif 5 (RRM5) found in RNA-binding protein 12B (RBM12B) and similar proteins. This subgroup corresponds to the RRM5 of RBM12B which contains five distinct RNA binding motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). Its biological role remains unclear. — an NCBI CDD conserved domain (cd12750); members share this curated model.
