identifier: CDD:cd13088
label: TSPN_COL18A
definition: >-
  Thrombospondin N (TSPN)-like domain of collagen XVIII;. Collagen XVIII, a heparan sulfate proteoglycan, is a component of basement membranes (BMs). It is comprised of an interrupted triple-helical collagenous (COL) domain, flanked by N-terminal and C-terminal noncollagenous domains (NCs). The TSPN-like domain is part of the N-teminal NC. The C-terminal NC, also called endostatin, is proteolytically cleaved and has anti-angiogenic activity. Collagen XVIII plays an important role in retinal vascular development and angiogenesis in the eye. Mutations in COL18A, coding for collagen XVIII, can lead to Knobloch syndrome (KNO), an autosomal recessive disorder characterized by high myopia, vitreoretinal degeneration with retinal detachment, and congenital encephalocele. The thrombospondin N, the laminin G, and the pentraxin families form a superfamily all with a similar jellyroll fold
