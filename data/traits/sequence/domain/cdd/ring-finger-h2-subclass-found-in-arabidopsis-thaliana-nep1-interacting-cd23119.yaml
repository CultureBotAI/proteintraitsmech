identifier: CDD:cd23119
label: "RING finger, H2 subclass, found in Arabidopsis thaliana NEP1-interacting protein-like 1 (NIPL1) and similar proteins. This subfamily includes Arabidopsis thaliana NIPL1 and MISFOLDED PROTEIN SENSING RING E3 LIGASE 1 (MPSR1). NIPL1, also called RING-H2 finger protein ATL27, may be involved in the early steps of the plant defense signaling pathway. MPSR1 is a cytoplasmic E3 ubiquitin-protein ligase involved in protein quality control (PQC) under proteotoxic stress. It is essential for plant survival under proteotoxic stress. It functions by removing damaged proteins before they form cytotoxic aggregates. It recognizes misfolded proteins selectively and tethers polyubiquitin chains to the proteins directly for subsequent degradation by the 26S proteasome pathway. Members of this subfamily contain a C3H2C3-type RING-H2 finger."
definition: >-
  RING finger, H2 subclass, found in Arabidopsis thaliana NEP1-interacting protein-like 1 (NIPL1) and similar proteins. This subfamily includes Arabidopsis thaliana NIPL1 and MISFOLDED PROTEIN SENSING RING E3 LIGASE 1 (MPSR1). NIPL1, also called RING-H2 finger protein ATL27, may be involved in the early steps of the plant defense signaling pathway. MPSR1 is a cytoplasmic E3 ubiquitin-protein ligase involved in protein quality control (PQC) under proteotoxic stress. It is essential for plant survival under proteotoxic stress. It functions by removing damaged proteins before they form cytotoxic aggregates. It recognizes misfolded proteins selectively and tethers polyubiquitin chains to the proteins directly for subsequent degradation by the 26S proteasome pathway. Members of this subfamily contain a C3H2C3-type RING-H2 finger. — an NCBI CDD conserved domain (cd23119); members share this curated model.
