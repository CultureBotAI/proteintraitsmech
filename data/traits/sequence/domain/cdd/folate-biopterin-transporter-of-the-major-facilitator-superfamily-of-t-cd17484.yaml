identifier: CDD:cd17484
label: "Folate-biopterin transporter of the Major Facilitator Superfamily of transporters. The Folate-biopterin transporter (FBT) family includes folate carriers related to those of trypanosomatids in higher plant plastids and cyanobacteria. FBT mediates folate monoglutamate transport involved in tetrahydrofolate biosynthesis. It also mediates transport of antifolates, such as methotrexate and aminopterin. The FBT family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Folate-biopterin transporter of the Major Facilitator Superfamily of transporters. The Folate-biopterin transporter (FBT) family includes folate carriers related to those of trypanosomatids in higher plant plastids and cyanobacteria. FBT mediates folate monoglutamate transport involved in tetrahydrofolate biosynthesis. It also mediates transport of antifolates, such as methotrexate and aminopterin. The FBT family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17484); members share this curated model.
