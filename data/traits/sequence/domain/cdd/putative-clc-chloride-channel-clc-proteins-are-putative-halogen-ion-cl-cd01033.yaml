identifier: CDD:cd01033
label: "Putative ClC chloride channel.  Clc proteins are putative halogen ion (Cl-, Br- and I-) transporters found in eubacteria. They belong to the ClC superfamily of halogen ion channels, which share a unique double-barreled architecture and voltage-dependent gating mechanism.  This superfamily lacks any structural or sequence similarity to other known ion channels and exhibit unique properties of ion permeation and gating.  The voltage-dependent gating is conferred by the permeating anion itself, acting as the gating charge."
definition: >-
  Putative ClC chloride channel. Clc proteins are putative halogen ion (Cl-, Br- and I-) transporters found in eubacteria. They belong to the ClC superfamily of halogen ion channels, which share a unique double-barreled architecture and voltage-dependent gating mechanism. This superfamily lacks any structural or sequence similarity to other known ion channels and exhibit unique properties of ion permeation and gating. The voltage-dependent gating is conferred by the permeating anion itself, acting as the gating charge. — an NCBI CDD conserved domain (cd01033); members share this curated model.
