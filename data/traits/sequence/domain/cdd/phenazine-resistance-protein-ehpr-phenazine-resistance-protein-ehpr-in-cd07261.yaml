label: "phenazine resistance protein, EhpR. Phenazine resistance protein (EhpR)  in Enterobacter agglomerans confers resistance by binding D-alanyl-griseoluteic acid and acting as a chaperone involved in exporting the antibiotic rather than by altering it chemically. EhpR is evolutionarily related to glyoxalase I and type I extradiol dioxygenases."
