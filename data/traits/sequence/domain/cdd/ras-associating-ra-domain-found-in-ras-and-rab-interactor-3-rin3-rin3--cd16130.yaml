identifier: CDD:cd16130
label: "Ras-associating (RA) domain found in Ras and Rab interactor 3 (Rin3). Rin3, also termed Ras interaction/interference protein 3, is a RAS effector and a RAB5-activating guanine nucleotide exchange factor (GEF) specifically for GTPase Rab31. It functions as a negative regulator of mast cell responses to Stem Cell Factor (SCF). Rin3 contains the Vps9p-like guanine nucleotide exchange factor and Ras-association (RA) domains."
definition: >-
  Ras-associating (RA) domain found in Ras and Rab interactor 3 (Rin3). Rin3, also termed Ras interaction/interference protein 3, is a RAS effector and a RAB5-activating guanine nucleotide exchange factor (GEF) specifically for GTPase Rab31. It functions as a negative regulator of mast cell responses to Stem Cell Factor (SCF). Rin3 contains the Vps9p-like guanine nucleotide exchange factor and Ras-association (RA) domains. — an NCBI CDD conserved domain (cd16130); members share this curated model.
