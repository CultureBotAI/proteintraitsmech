identifier: CDD:cd21629
label: NS6_deltaCoV
definition: >-
  deltacoronavirus accessory protein NS6. This family includes the accessory protein NS6 from deltacoronaviruses such as porcine coronavirus HKU15, and several avian coronaviruses found in sparrow, pigeon, quail and falcon, among others. There are five essential genes in coronaviruses (CoVs) that result in the following gene products: Spike (S) protein, Membrane (M) glycoprotein, Nucleocapsid (N), Envelope (E) protein, and replicase/protease polyproteins (ORF1ab); all are required to produce a structurally complete viral particle. In addition, CoV genomes also contain ORFs coding for accessory proteins that are specific for certain CoV lineages or for a particular CoV. In general, CoV accessory proteins are considered to be dispensable for viral replication; however, several accessory proteins have been shown to exhibit functions in virus-host interactions during CoV infection. Porcine deltacoronavirus (PDCoV) encodes three accessory proteins, NS6, NS7, and NS7a. During PDCoV infection, NS6 antagonizes RIG-I-like receptor (RLR)-mediated IFN-beta production to evade host innate immune defense; it interacts with RIG-I and MDA5 to impede their association with double-stranded RNA. This is an important finding towards novel therapeutic targets and may lead to the development of more effective vaccines against PDCoV infection
