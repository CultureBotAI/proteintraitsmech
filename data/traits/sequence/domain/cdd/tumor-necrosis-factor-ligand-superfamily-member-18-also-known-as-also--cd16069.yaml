identifier: CDD:cd16069
label: "tumor necrosis factor ligand superfamily member 18, also known as also known as glucocorticoid-induced tumor necrosis factor receptor family-related protein ligand (GITRL). This family contains TNFSF18 (also known as glucocorticoid-induced tumor necrosis factor family-related protein ligand (GITRL), activation-inducible TNF receptor ligand (AITRL) or TL6), a cytokine ligand for receptor TNFRSF18/AITR/GITR. GITRL expression is predominantly expressed by antigen-presenting cells (APCs), including dendritic cells (DCs) and macrophages. It activates GITR which subsequently influences the activity of effector and regulatory T cells, participating in the development of several autoimmune and inflammatory diseases, including autoimmune thyroid disease and rheumatoid arthritis. In systemic lupus erythematosus (SLE) patients, serum GITRL levels are increased compared with healthy controls. GITR and its ligand, GITRL, are possibly involved in the pathogenesis of primary Sjogren's syndrome (pSS). GITR is inactivated during tumor progression in Multiple Myeloma (MM); restoration of GITR expression in GITR deficient MM cells leads to inhibition of MM proliferation and induction of apoptosis, thus playing a pivotal role in MM pathogenesis and disease progression. It modulates cytokine release and natural killer (NK) cell reactivity in chronic lymphocytic leukemia (CLL); pronounced expression of GITRL and GITR receptor on NK cells of CLL patients have been observed compared with healthy controls. Upon GITR-GITRL interaction, signaling via GITRL into the leukemia cells induces the release of interleukin (IL)-6, IL-8 and TNF, which act as growth and survival factors for CLL cells. Increased levels of GITRL have been found in serum and thyroid glands of Hashimoto's thyroiditis patients, which may impair the balance of T-helper (Th) 17/regulatory-T (Treg) cells."
