identifier: CDD:cd17667
label: "catalytic domain of receptor-type tyrosine-protein phosphatase G, repeat 1. Receptor-type tyrosine-protein phosphatase G (PTPRG), also called protein-tyrosine phosphatase gamma (R-PTP-gamma), belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPRG is an important tumor suppressor gene in multiple human cancers such as lung, ovarian, and breast cancers. It is widely expressed in many tissues, including the central nervous system, where it plays a role during neuroinflammation processes. It can dephosphorylate platelet-derived growth factor receptor beta (PDGFRB) and may play a role in PDGFRB-related infantile myofibromatosis. PTPRG has four splicing isoforms: three transmembrane isoforms, PTPRG-A, B, and C, and one secretory isoform, PTPRG-S, which are expressed in many tissues including the brain. PTPRG is a type 1 integral membrane protein consisting of an extracellular region with a carbonic anhydrase-like (CAH) and a fibronectin type III (FN3) domains, and an intracellular region with a catalytic PTP domain (repeat 1) proximal to the membrane, and a catalytically inactive PTP-fold domain (repeat 2) distal to the membrane. This model represents the catalytic PTP domain (repeat 1)."
