identifier: CDD:cd11526
label: "The SYLF domain (also called DUF500), a novel lipid-binding module, of FYVE zinc finger domain containing proteins. This subfamily is composed of uncharacterized proteins from plants and stramenopiles containing a FYVE zinc finger domain followed by a SYLF domain (also called DUF500). The SYLF domain of the related protein, SH3YL1, binds phosphoinositides with high affinity, while the N-terminal SYLF domains of both Ysc84p and Lsb3p have been shown to bind and bundle actin filaments, as well as bind liposomes with high affinity."
definition: >-
  The SYLF domain (also called DUF500), a novel lipid-binding module, of FYVE zinc finger domain containing proteins. This subfamily is composed of uncharacterized proteins from plants and stramenopiles containing a FYVE zinc finger domain followed by a SYLF domain (also called DUF500). The SYLF domain of the related protein, SH3YL1, binds phosphoinositides with high affinity, while the N-terminal SYLF domains of both Ysc84p and Lsb3p have been shown to bind and bundle actin filaments, as well as bind liposomes with high affinity. — an NCBI CDD conserved domain (cd11526); members share this curated model.
