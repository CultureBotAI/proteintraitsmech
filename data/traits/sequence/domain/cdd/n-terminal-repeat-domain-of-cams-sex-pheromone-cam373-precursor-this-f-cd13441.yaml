identifier: CDD:cd13441
label: CamS_repeat_1
definition: >-
  N-terminal repeat domain of CamS sex pheromone cAM373 precursor. This family includes CamS, from which Staphylococcus aureus sex pheromone staph-cAM373 is processed. The protein contains two structurally similar repeats in a tandem arrangement. The heptapeptide cAM373 is a Streptococcus faecalis pheromone, secreted by recipient cells, which induces a mating response in donor cells that contain particular conjugative plasmids. cAM373 is also excreted by Staphylococcus aureus. The family also contains sex hormone precursors from other bacteria
