identifier: CDD:cd10493
label: "N-terminal Mad Homology 1 (MH1) domain in SMAD6. The MH1 is a small DNA-binding domain present in SMAD (small mothers against decapentaplegic) family of proteins, which are signal transducers and transcriptional modulators that mediate multiple signaling pathways.  MH1 binds to the DNA major groove in an unusual manner via a beta hairpin structure.  It negatively regulates the functions of the MH2 domain, the C-terminal domain of SMAD. This MH1 belongs to SMAD6, an inhibitory SMAD (I-SMAD) or antagonistic SMAD, which acts as a negative regulator of signaling mediated by TGF-beta superfamily ligands, by competing with SMAD4 and preventing the transcription of SMAD4's gene products. SMAD6 specifically inhibits bone morphogenetic protein (BMP) type I receptor mediated signaling."
definition: >-
  N-terminal Mad Homology 1 (MH1) domain in SMAD6. The MH1 is a small DNA-binding domain present in SMAD (small mothers against decapentaplegic) family of proteins, which are signal transducers and transcriptional modulators that mediate multiple signaling pathways. MH1 binds to the DNA major groove in an unusual manner via a beta hairpin structure. It negatively regulates the functions of the MH2 domain, the C-terminal domain of SMAD. This MH1 belongs to SMAD6, an inhibitory SMAD (I-SMAD) or antagonistic SMAD, which acts as a negative regulator of signaling mediated by TGF-beta superfamily ligands, by competing with SMAD4 and preventing the transcription of SMAD4's gene products. SMAD6 specifically inhibits bone morphogenetic protein (BMP) type I receptor mediated signaling. — an NCBI CDD conserved domain (cd10493); members share this curated model.
