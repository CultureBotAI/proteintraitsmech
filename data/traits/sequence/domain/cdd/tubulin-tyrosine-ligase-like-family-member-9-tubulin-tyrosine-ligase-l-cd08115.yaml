identifier: CDD:cd08115
label: ATP-G_TTLL9
definition: >-
  tubulin tyrosine ligase-like family, member 9. Tubulin tyrosine ligase-like family, member 9 (TTLL9) is a member of Tubulin-tyrosine ligase (TTL, EC 6.3.2.25) family. TTL catalyses the posttranslational addition of a tyrosine to the carboxy-terminal end of detyrosinated alpha-tubulin in the presense of ATP. TTL requires K and Mg ions for catalysis and uses detyrosinated alpha-tubulin as a substrate. It plays a key role in microtubules assembly. Based on the sequence and functional similarities with glutathione synthetase (GSHase), biotin carboxylase (BC), D-ala D-ala ligase (DD-ligase), and succinyl-CoA synthetase (SCS) families it is concluded that TTL belongs to ATP-grasp superfamily. Human tubulin tyrosine ligase-like 9 gene (TTLL9) maps to chromosome region 20q11.21 and encodes for a 439 amino acid protein
