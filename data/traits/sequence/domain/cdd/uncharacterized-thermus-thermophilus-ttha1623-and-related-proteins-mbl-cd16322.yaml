identifier: CDD:cd16322
label: "uncharacterized Thermus thermophilus TTHA1623 and related proteins; MBL-fold metallo hydrolase domain. Includes the MBL-fold metallo hydrolase domain of uncharacterized Thermus thermophilus TTHA1623 and related proteins. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions. This family includes homologs present in a wide range of bacteria and archaea and some eukaryota. Members of the MBL-fold metallo-hydrolase superfamily exhibit a variety of active site metallo-chemistry, TTHA1623 exhibiting a uniquely shaped putative substrate-binding pocket with a glyoxalase II-type metal-coordination mode."
definition: >-
  uncharacterized Thermus thermophilus TTHA1623 and related proteins; MBL-fold metallo hydrolase domain. Includes the MBL-fold metallo hydrolase domain of uncharacterized Thermus thermophilus TTHA1623 and related proteins. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions. This family includes homologs present in a wide range of bacteria and archaea and some eukaryota. Members of the MBL-fold metallo-hydrolase superfamily exhibit a variety of active site metallo-chemistry, TTHA1623 exhibiting a uniquely shaped putative substrate-binding pocket with a glyoxalase II-type metal-coordination mode. — an NCBI CDD conserved domain (cd16322); members share this curated model.
