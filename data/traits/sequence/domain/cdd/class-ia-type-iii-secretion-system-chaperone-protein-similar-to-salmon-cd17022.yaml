identifier: CDD:cd17022
label: T3SC_IA_SigE-like
definition: >-
  Class IA type III secretion system chaperone protein, similar to Salmonella enterica SigE. This family includes type III secretion system (T3SS) chaperone proteins similar to Salmonella enterica chaperone SigE and similar proteins. In S. enterica, many of its serovars being serious human pathogens, the T3SS allows injection of the effector SigD (also known as SopB) which is an inositol phosphatase. Chaperone SigE binds to SigD, which, upon translocation into the host cell, preferentially dephosphorylates specific inositol phospholipids that are thought to be crucial for subsequent activation of the host cell Ser-Thr kinase Akt
