identifier: CDD:cd04938
label: "TGS (ThrRS, GTPase and SpoT) domain found in the Obg protein family. The Obg family of GTPases function has been implicated in cellular processes as diverse as sporulation, stress response, control of DNA replication, and ribosome assembly. It consists of several subfamilies such as DRG and YchF with TGS domain. The TGS domain is named after the various RNA-binding multidomain ThrRS, GTPase, and SpoT/RelA proteins in which this domain occurs. The TGS domain of Obg-like GTPases such as those present in DRG (developmentally regulated GTP-binding protein), and GTP-binding proteins Ygr210 and YchF has a beta-grasp ubiquitin-like fold, a common structure involved in protein-protein interactions."
definition: >-
  TGS (ThrRS, GTPase and SpoT) domain found in the Obg protein family. The Obg family of GTPases function has been implicated in cellular processes as diverse as sporulation, stress response, control of DNA replication, and ribosome assembly. It consists of several subfamilies such as DRG and YchF with TGS domain. The TGS domain is named after the various RNA-binding multidomain ThrRS, GTPase, and SpoT/RelA proteins in which this domain occurs. The TGS domain of Obg-like GTPases such as those present in DRG (developmentally regulated GTP-binding protein), and GTP-binding proteins Ygr210 and YchF has a beta-grasp ubiquitin-like fold, a common structure involved in protein-protein interactions. — an NCBI CDD conserved domain (cd04938); members share this curated model.
