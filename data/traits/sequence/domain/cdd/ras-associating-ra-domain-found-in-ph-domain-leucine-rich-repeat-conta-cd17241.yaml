identifier: CDD:cd17241
label: "Ras-associating (RA) domain found in PH domain leucine-rich repeat-containing protein phosphatase 2 (PHLPP2). PHLPP2, also termed PH domain leucine-rich repeat-containing protein phosphatase-like (PHLPP-like), is involved in two key signaling pathways, the phosphatidylinositol 3-kinase and diacylglycerol signaling pathways, by directly dephosphorylating and inactivating Akt serine-threonine kinases (Akt1, Akt2, Akt3) and protein kinase C (PKC) isoforms. PHLPP2 also plays critical roles in many cancers, such as glioma, hypopharyngeal squamous cell carcinomas, and non-small cell lung cancer. PHLPP2 contains a Ras-associating (RA) domain followed by a PH domain, leucine-rich repeats and protein phosphatase 2C (PP2C) domain."
definition: >-
  Ras-associating (RA) domain found in PH domain leucine-rich repeat-containing protein phosphatase 2 (PHLPP2). PHLPP2, also termed PH domain leucine-rich repeat-containing protein phosphatase-like (PHLPP-like), is involved in two key signaling pathways, the phosphatidylinositol 3-kinase and diacylglycerol signaling pathways, by directly dephosphorylating and inactivating Akt serine-threonine kinases (Akt1, Akt2, Akt3) and protein kinase C (PKC) isoforms. PHLPP2 also plays critical roles in many cancers, such as glioma, hypopharyngeal squamous cell carcinomas, and non-small cell lung cancer. PHLPP2 contains a Ras-associating (RA) domain followed by a PH domain, leucine-rich repeats and protein phosphatase 2C (PP2C) domain. — an NCBI CDD conserved domain (cd17241); members share this curated model.
