identifier: CDD:cd07847
label: "Catalytic domain of the Serine/Threonine Kinases, Cyclin-Dependent protein Kinase Like 1 and 4. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. CDKL1, also called p42 KKIALRE, is a glial protein that is upregulated in gliosis. It is present in neuroblastoma and A431 human carcinoma cells, and may be implicated in neoplastic transformation. The function of CDKL4 is unknown. CDKs belong to a large family of STKs that are regulated by their cognate cyclins. Together, they are involved in the control of cell-cycle progression, transcription, and neuronal function. The CDKL1/4 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
