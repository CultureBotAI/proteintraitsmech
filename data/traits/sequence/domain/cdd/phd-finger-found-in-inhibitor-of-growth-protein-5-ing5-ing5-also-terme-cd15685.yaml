identifier: CDD:cd15685
label: "PHD finger found in inhibitor of growth protein 5 (ING5). ING5, also termed p28ING5, is one member of the inhibitor of growth (ING) family of type II tumor suppressors. It acts as a Tip60 cofactor that acetylates p53 at K120 and subsequently activates the expression of p53-dependent apoptotic genes in response to DNA damage. Aberrant ING5 expression may contribute to pathogenesis, growth, and invasion of gastric carcinomas and colorectal cancer. ING5 can physically interact with p300 and p53 in vivo, and its overexpression induces apoptosis in colorectal cancer cells. It also associates with cyclin A1 (INCA1) and functions as a growth suppressor with suppressed expression in Acute Myeloid Leukemia (AML). Moreover, ING5 translocation from the nucleus to the cytoplasm might be a critical event for carcinogenesis and tumor progression in human head and neck squamous cell carcinoma. In addition, ING5 associates with histone acetyltransferase (HAT) complexes containing MOZ (monocytic leukemia zinc finger protein)/MORF (MOZ-related factor) and HBO1, and further directs the MOZ/MORF and HBO1 complexes to chromatin. ING5 contains an N-terminal ING histone-binding domain and a C-terminal plant homeodomain (PHD) finger."
definition: >-
  PHD finger found in inhibitor of growth protein 5 (ING5). ING5, also termed p28ING5, is one member of the inhibitor of growth (ING) family of type II tumor suppressors. It acts as a Tip60 cofactor that acetylates p53 at K120 and subsequently activates the expression of p53-dependent apoptotic genes in response to DNA damage. Aberrant ING5 expression may contribute to pathogenesis, growth, and invasion of gastric carcinomas and colorectal cancer. ING5 can physically interact with p300 and p53 in vivo, and its overexpression induces apoptosis in colorectal cancer cells. It also associates with cyclin A1 (INCA1) and functions as a growth suppressor with suppressed expression in Acute Myeloid Leukemia (AML). Moreover, ING5 translocation from the nucleus to the cytoplasm might be a critical event for carcinogenesis and tumor progression in human head and neck squamous cell carcinoma. In addition, ING5 associates with histone acetyltransferase (HAT) complexes containing MOZ (monocytic leukemia zinc finger protein)/MORF (MOZ-related factor) and HBO1, and further directs the MOZ/MORF and HBO1 complexes to chromatin. ING5 contains an N-terminal ING histone-binding domain and a C-terminal plant homeodomain (PHD) finger. — an NCBI CDD conserved domain (cd15685); members share this curated model.
