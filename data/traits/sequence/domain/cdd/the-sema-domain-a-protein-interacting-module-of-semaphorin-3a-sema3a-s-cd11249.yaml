identifier: CDD:cd11249
label: "The Sema domain, a protein interacting module, of semaphorin 3A (Sema3A). Sema3A has been reported to inhibit the growth of certain experimental tumors and to regulate endothelial cell migration and apoptosis in vitro, as well as arteriogenesis in the muscle, skin vessel permeability, and tumor angiogenesis in vivo. The function of Sema3A is mediated through receptors neuropilin-1 (NP1) and plexins, although little is known about the requirement of specific plexins in its receptor complex. It is known however that Plexin-A4 is the receptor for Sema3A in the Toll-like receptor- and sepsis-induced cytokine storm during immune response. Sema3A is a member of the Class 3 semaphorin family of secreted proteins. Semaphorins are regulatory molecules in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of semaphorin 3A (Sema3A). Sema3A has been reported to inhibit the growth of certain experimental tumors and to regulate endothelial cell migration and apoptosis in vitro, as well as arteriogenesis in the muscle, skin vessel permeability, and tumor angiogenesis in vivo. The function of Sema3A is mediated through receptors neuropilin-1 (NP1) and plexins, although little is known about the requirement of specific plexins in its receptor complex. It is known however that Plexin-A4 is the receptor for Sema3A in the Toll-like receptor- and sepsis-induced cytokine storm during immune response. Sema3A is a member of the Class 3 semaphorin family of secreted proteins. Semaphorins are regulatory molecules in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module. — an NCBI CDD conserved domain (cd11249); members share this curated model.
