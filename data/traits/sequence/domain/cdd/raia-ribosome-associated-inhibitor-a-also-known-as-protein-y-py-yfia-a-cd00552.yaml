identifier: CDD:cd00552
label: RaiA
definition: >-
  RaiA ("ribosome-associated inhibitor A", also known as Protein Y (PY), YfiA, and SpotY, is a stress-response protein that binds the ribosomal subunit interface and arrests translation by interfering with aminoacyl-tRNA binding to the ribosomal A site. RaiA is also thought to counteract miscoding at the A site thus reducing translation errors. The RaiA fold structurally resembles the double-stranded RNA-binding domain (dsRBD)
