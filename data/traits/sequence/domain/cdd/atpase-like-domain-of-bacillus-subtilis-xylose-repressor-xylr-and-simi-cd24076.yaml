identifier: CDD:cd24076
label: "ATPase-like domain of Bacillus subtilis xylose repressor (XylR) and similar proteins. This subfamily includes a group of uncharacterized proteins similar to Bacillus subtilis xylose repressor (BsXylR), which belongs to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities. BsXylR acts as transcriptional repressor of xylose-utilizing enzymes."
definition: >-
  ATPase-like domain of Bacillus subtilis xylose repressor (XylR) and similar proteins. This subfamily includes a group of uncharacterized proteins similar to Bacillus subtilis xylose repressor (BsXylR), which belongs to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities. BsXylR acts as transcriptional repressor of xylose-utilizing enzymes. — an NCBI CDD conserved domain (cd24076); members share this curated model.
