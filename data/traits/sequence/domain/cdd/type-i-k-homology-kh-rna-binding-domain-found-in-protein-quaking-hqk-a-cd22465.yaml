identifier: CDD:cd22465
label: "type I K homology (KH) RNA-binding domain found in protein quaking (Hqk) and similar proteins. Hqk, also called HqkI, is an RNA-binding protein that plays a central role in myelinization. It binds to the 5'-NACUAAY-N(1,20)-UAAY-3' RNA core sequence and regulates target mRNA stability. It acts by regulating pre-mRNA splicing, mRNA export and protein translation. Hqk is a regulator of oligodendrocyte differentiation and maturation in the brain that may play a role in myelin and oligodendrocyte dysfunction in schizophrenia."
definition: >-
  type I K homology (KH) RNA-binding domain found in protein quaking (Hqk) and similar proteins. Hqk, also called HqkI, is an RNA-binding protein that plays a central role in myelinization. It binds to the 5'-NACUAAY-N(1,20)-UAAY-3' RNA core sequence and regulates target mRNA stability. It acts by regulating pre-mRNA splicing, mRNA export and protein translation. Hqk is a regulator of oligodendrocyte differentiation and maturation in the brain that may play a role in myelin and oligodendrocyte dysfunction in schizophrenia. — an NCBI CDD conserved domain (cd22465); members share this curated model.
