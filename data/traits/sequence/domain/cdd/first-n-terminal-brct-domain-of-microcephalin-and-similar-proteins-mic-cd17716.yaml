identifier: CDD:cd17716
label: "first (N-terminal) BRCT domain of microcephalin and similar proteins. Microcephalin is a DNA damage response protein involved in regulation of CHK1 and BRCA1. It has been implicated in chromosome condensation and DNA damage induced cellular responses. It may play a role in neurogenesis and regulation of the size of the cerebral cortex. Microcephalin contains three BRCT repeats. This family corresponds to the first repeat."
definition: >-
  first (N-terminal) BRCT domain of microcephalin and similar proteins. Microcephalin is a DNA damage response protein involved in regulation of CHK1 and BRCA1. It has been implicated in chromosome condensation and DNA damage induced cellular responses. It may play a role in neurogenesis and regulation of the size of the cerebral cortex. Microcephalin contains three BRCT repeats. This family corresponds to the first repeat. — an NCBI CDD conserved domain (cd17716); members share this curated model.
