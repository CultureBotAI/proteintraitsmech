identifier: CDD:cd01019
label: "Zinc binding protein ZnuA. These proteins have been shown to function as initial receptors in the ABC uptake of Zn2+.  They belong to the TroA superfamily of periplasmic metal binding proteins that share a distinct fold and ligand binding mechanism.  They are comprised of two globular subdomains connected by a single helix and bind their specific ligands in the cleft between these domains.  A typical TroA protein is comprised of two globular subdomains connected by a single helix and can bind the metal ion in the cleft between these domains. In addition, these proteins sometimes have a low complexity region containing a metal-binding histidine-rich motif (repetitive HDH sequence)."
definition: >-
  Zinc binding protein ZnuA. These proteins have been shown to function as initial receptors in the ABC uptake of Zn2+. They belong to the TroA superfamily of periplasmic metal binding proteins that share a distinct fold and ligand binding mechanism. They are comprised of two globular subdomains connected by a single helix and bind their specific ligands in the cleft between these domains. A typical TroA protein is comprised of two globular subdomains connected by a single helix and can bind the metal ion in the cleft between these domains. In addition, these proteins sometimes have a low complexity region containing a metal-binding histidine-rich motif (repetitive HDH sequence). — an NCBI CDD conserved domain (cd01019); members share this curated model.
