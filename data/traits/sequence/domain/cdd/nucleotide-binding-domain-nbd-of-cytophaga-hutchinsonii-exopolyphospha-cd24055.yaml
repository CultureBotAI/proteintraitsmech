identifier: CDD:cd24055
label: "nucleotide-binding domain (NBD) of Cytophaga hutchinsonii exopolyphosphatase (ChPPX) and similar proteins. The PPX/GppA family proteins play essential roles in bacterial survival and metabolism. Guanosine pentaphosphate (pppGpp) phosphohydrolase (GppA; EC 3.6.1.40) plays a key role in (p)ppGpp homeostasis. It specifically catalyzes the conversion of pppGpp to ppGpp (guanosine tetraphosphate). Sharing a similar domain structure, GppA is indistinguishable from exopolyphosphatase (PPX; EC 3.6.1.11), which mediates the metabolism of cellular inorganic polyphosphate. Especially, it is responsible for the maintenance of appropriate levels of cellular inorganic polyphosphate (PolyP). The family corresponds a group of proteins similar to uncharacterized Cytophaga hutchinsonii exopolyphosphatase (ChPPX)."
definition: >-
  nucleotide-binding domain (NBD) of Cytophaga hutchinsonii exopolyphosphatase (ChPPX) and similar proteins. The PPX/GppA family proteins play essential roles in bacterial survival and metabolism. Guanosine pentaphosphate (pppGpp) phosphohydrolase (GppA; EC 3.6.1.40) plays a key role in (p)ppGpp homeostasis. It specifically catalyzes the conversion of pppGpp to ppGpp (guanosine tetraphosphate). Sharing a similar domain structure, GppA is indistinguishable from exopolyphosphatase (PPX; EC 3.6.1.11), which mediates the metabolism of cellular inorganic polyphosphate. Especially, it is responsible for the maintenance of appropriate levels of cellular inorganic polyphosphate (PolyP). The family corresponds a group of proteins similar to uncharacterized Cytophaga hutchinsonii exopolyphosphatase (ChPPX). — an NCBI CDD conserved domain (cd24055); members share this curated model.
