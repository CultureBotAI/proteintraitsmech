identifier: CDD:cd19490
label: "XRCC2 recombinase. XRCC2 (X-ray repair complementing defective repair in Chinese hamster cells 2) recombinase, a RAD51 paralog, plays an important role in DNA repair by homologous recombination (HR). HR is an important error-free repair mechanism for chromosomal double-strand break (DSB) which otherwise leads to cell cycle arrest and death. XRCC2, together with the other RAD51 paralogs, RAD51B, RAD51C, RAD51D, and XRCC3, helps recruit RAD51 to the break site."
definition: >-
  XRCC2 recombinase. XRCC2 (X-ray repair complementing defective repair in Chinese hamster cells 2) recombinase, a RAD51 paralog, plays an important role in DNA repair by homologous recombination (HR). HR is an important error-free repair mechanism for chromosomal double-strand break (DSB) which otherwise leads to cell cycle arrest and death. XRCC2, together with the other RAD51 paralogs, RAD51B, RAD51C, RAD51D, and XRCC3, helps recruit RAD51 to the break site. — an NCBI CDD conserved domain (cd19490); members share this curated model.
