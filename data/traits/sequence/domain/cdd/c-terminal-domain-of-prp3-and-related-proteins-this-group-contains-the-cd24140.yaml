identifier: CDD:cd24140
label: "C-terminal domain of Prp3 and related proteins. This group contains the C-terminal domains of Prp3 and RWD domain-containing proteins 2/3. Predicted structures (by AlphaFold) of the C-terminal domains of RWDD2 and RWDD3 reveal similarity to the C-terminal domain of Prp3, an essential U4/U6 di-snRNP-associated protein which plays a role in pre-mRNA splicing. The Prp3 C-terminal domain is a single-stranded RNA-binding domain."
definition: >-
  C-terminal domain of Prp3 and related proteins. This group contains the C-terminal domains of Prp3 and RWD domain-containing proteins 2/3. Predicted structures (by AlphaFold) of the C-terminal domains of RWDD2 and RWDD3 reveal similarity to the C-terminal domain of Prp3, an essential U4/U6 di-snRNP-associated protein which plays a role in pre-mRNA splicing. The Prp3 C-terminal domain is a single-stranded RNA-binding domain. — an NCBI CDD conserved domain (cd24140); members share this curated model.
