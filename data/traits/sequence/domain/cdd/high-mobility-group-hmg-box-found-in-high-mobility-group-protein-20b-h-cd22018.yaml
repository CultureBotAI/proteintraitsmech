identifier: CDD:cd22018
label: "high mobility group (HMG)-box found in high mobility group protein 20B (HMG20B) and similar proteins. HMG20B, also called SWI/SNF-related matrix-associated actin-dependent regulator of chromatin subfamily E member 1-related, SMARCE1-related protein (SMARCE1R), BRCA2-associated factor 35 (BRAF35), HMG box-containing protein 20B, HMG domain-containing protein 2 (HMGXB2), HMG domain-containing protein HMGX2, Sox-like transcriptional factor, or structural DNA-binding protein BRAF35, is a DNA binding factor that acts as a repressor of erythroid differentiation. It is required for correct progression through the G2 phase of the cell cycle and entry into mitosis. It is also required for RCOR1/CoREST mediated repression of neuronal specific gene promoters. HMG20B is a core subunit of the Lys-specific demethylase 1/REST co-repressor 1 (LSD1-CoREST) histone demethylase complex."
definition: >-
  high mobility group (HMG)-box found in high mobility group protein 20B (HMG20B) and similar proteins. HMG20B, also called SWI/SNF-related matrix-associated actin-dependent regulator of chromatin subfamily E member 1-related, SMARCE1-related protein (SMARCE1R), BRCA2-associated factor 35 (BRAF35), HMG box-containing protein 20B, HMG domain-containing protein 2 (HMGXB2), HMG domain-containing protein HMGX2, Sox-like transcriptional factor, or structural DNA-binding protein BRAF35, is a DNA binding factor that acts as a repressor of erythroid differentiation. It is required for correct progression through the G2 phase of the cell cycle and entry into mitosis. It is also required for RCOR1/CoREST mediated repression of neuronal specific gene promoters. HMG20B is a core subunit of the Lys-specific demethylase 1/REST co-repressor 1 (LSD1-CoREST) histone demethylase complex. — an NCBI CDD conserved domain (cd22018); members share this curated model.
