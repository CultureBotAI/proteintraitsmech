identifier: CDD:cd14445
label: "Rab interacting lysosomal protein-like 1 and 2 (Rilpl1 and Rilpl2). This domain is found in Rab interacting lysosomal protein-like 1 and 2, and appears to be conserved in Bilateria. The Rilp-like proteins regulate the concentration of ciliary membrane proteins in the primary cilium. Rilpl2 interacts with myosin-Va and has been linked to the regulation of cellular morphology in neurons; it forms a complex with Rac1 and activates Rac1-Pak signaling, dependent on myosin-Va."
definition: >-
  Rab interacting lysosomal protein-like 1 and 2 (Rilpl1 and Rilpl2). This domain is found in Rab interacting lysosomal protein-like 1 and 2, and appears to be conserved in Bilateria. The Rilp-like proteins regulate the concentration of ciliary membrane proteins in the primary cilium. Rilpl2 interacts with myosin-Va and has been linked to the regulation of cellular morphology in neurons; it forms a complex with Rac1 and activates Rac1-Pak signaling, dependent on myosin-Va. — an NCBI CDD conserved domain (cd14445); members share this curated model.
