identifier: CDD:cd11287
label: "C-terminal Actin depolymerization factor-homology domain of Sec23. The C-terminal domain of the Sec23 subunit of the coat protein complex II (COPII) is distantly related to gelsolin-like repeats and the actin depolymerizing domains found in cofilin and similar proteins. Sec23 forms a tight complex with Sec24. The cytoplasmic Sec23/24 complex is recruited together with Sar1-GTP and Sec13/31 to induce coat polymerization and membrane deformation in the forming of COPII-coated endoplasmic reticulum vesicles. The function of the Sec23 C-terminal domain is unclear."
definition: >-
  C-terminal Actin depolymerization factor-homology domain of Sec23. The C-terminal domain of the Sec23 subunit of the coat protein complex II (COPII) is distantly related to gelsolin-like repeats and the actin depolymerizing domains found in cofilin and similar proteins. Sec23 forms a tight complex with Sec24. The cytoplasmic Sec23/24 complex is recruited together with Sar1-GTP and Sec13/31 to induce coat polymerization and membrane deformation in the forming of COPII-coated endoplasmic reticulum vesicles. The function of the Sec23 C-terminal domain is unclear. — an NCBI CDD conserved domain (cd11287); members share this curated model.
