identifier: CDD:cd16606
label: "RING finger, HC subclass, found in tripartite motif-containing protein TRIM58 and similar proteins. TRIM58, also known as protein BIA2, is an erythroid E3 ubiquitin-protein ligase induced during late erythropoiesis. It binds and ubiquitinates the intermediate chain of the microtubule motor dynein (DYNC1LI1/DYNC1LI2), stimulating the degradation of the dynein holoprotein complex. It may participate in the erythroblast enucleation process through regulation of nuclear polarization. TRIM58 belongs to the C-IV subclass of TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain."
definition: >-
  RING finger, HC subclass, found in tripartite motif-containing protein TRIM58 and similar proteins. TRIM58, also known as protein BIA2, is an erythroid E3 ubiquitin-protein ligase induced during late erythropoiesis. It binds and ubiquitinates the intermediate chain of the microtubule motor dynein (DYNC1LI1/DYNC1LI2), stimulating the degradation of the dynein holoprotein complex. It may participate in the erythroblast enucleation process through regulation of nuclear polarization. TRIM58 belongs to the C-IV subclass of TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain. — an NCBI CDD conserved domain (cd16606); members share this curated model.
