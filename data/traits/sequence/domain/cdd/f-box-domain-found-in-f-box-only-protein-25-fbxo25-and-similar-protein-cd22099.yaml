identifier: CDD:cd22099
label: F-box_FBXO25
definition: >-
  F-box domain found in F-box only protein 25 (FBXO25) and similar proteins. FBXO25, also called FBX25, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It functions as a negative regulator of MAPK signaling though the reduction of ERK1/2 activation. It controls Tbx5 and Nkx2-5 transcriptional activity to regulate cardiomyocyte development. FBXO25 also plays a crucial role in tumorigenesis. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression
