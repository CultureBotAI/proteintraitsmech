identifier: CDD:cd17968
label: "DEAH-box helicase domain of ATP-dependent DNA helicase DDX11. DDX11 (also called ChlR1) encodes a protein of the conserved family of Iron-Sulfur (Fe-S) cluster DNA helicases and is thought to function in maintaining chromosome transmission fidelity and genome stability. Mutations in the Chl1 human homologs ChlR1/DDX11 and BACH1/BRIP1/FANCJ collectively result in Warsaw Breakage Syndrome, Fanconi anemia, cell aneuploidy and breast and ovarian cancers. DDX11 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAH-box helicase domain of ATP-dependent DNA helicase DDX11. DDX11 (also called ChlR1) encodes a protein of the conserved family of Iron-Sulfur (Fe-S) cluster DNA helicases and is thought to function in maintaining chromosome transmission fidelity and genome stability. Mutations in the Chl1 human homologs ChlR1/DDX11 and BACH1/BRIP1/FANCJ collectively result in Warsaw Breakage Syndrome, Fanconi anemia, cell aneuploidy and breast and ovarian cancers. DDX11 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17968); members share this curated model.
