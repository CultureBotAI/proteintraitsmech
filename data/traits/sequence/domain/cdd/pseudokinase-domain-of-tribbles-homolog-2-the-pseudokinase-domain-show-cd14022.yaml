identifier: CDD:cd14022
label: "Pseudokinase domain of Tribbles Homolog 2. The pseudokinase domain shows similarity to protein kinases but lacks crucial residues for catalytic activity. TRB2 binds and negatively regulates the mitogen activated protein kinase (MAPK) kinases, MKK7 and MEK1, which are activators of the MAPKs, ERK and JNK. It controls the activation of inflammatory monocytes, which is essential in innate immune responses and the pathogenesis of inflammatory diseases such as atherosclerosis. TRB2 expression is down-regulated in human acute myeloid leukaemia (AML), which may lead to enhanced cell survival and pathogenesis of the disease. TRB2 is one of three Tribbles Homolog (TRB) proteins present in vertebrates that are encoded by three separate genes. TRB proteins interact with many proteins involved in signalling pathways. They play scaffold-like regulatory functions and affect many cellular processes such as mitosis, apoptosis, and gene expression. The TRB2 subfamily is part of a larger superfamily that includes the catalytic domains of serine/threonine kinases, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Pseudokinase domain of Tribbles Homolog 2. The pseudokinase domain shows similarity to protein kinases but lacks crucial residues for catalytic activity. TRB2 binds and negatively regulates the mitogen activated protein kinase (MAPK) kinases, MKK7 and MEK1, which are activators of the MAPKs, ERK and JNK. It controls the activation of inflammatory monocytes, which is essential in innate immune responses and the pathogenesis of inflammatory diseases such as atherosclerosis. TRB2 expression is down-regulated in human acute myeloid leukaemia (AML), which may lead to enhanced cell survival and pathogenesis of the disease. TRB2 is one of three Tribbles Homolog (TRB) proteins present in vertebrates that are encoded by three separate genes. TRB proteins interact with many proteins involved in signalling pathways. They play scaffold-like regulatory functions and affect many cellular processes such as mitosis, apoptosis, and gene expression. The TRB2 subfamily is part of a larger superfamily that includes the catalytic domains of serine/threonine kinases, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14022); members share this curated model.
