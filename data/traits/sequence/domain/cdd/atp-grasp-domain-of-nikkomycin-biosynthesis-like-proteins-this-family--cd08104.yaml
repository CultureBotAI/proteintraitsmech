identifier: CDD:cd08104
label: ATP-G_NikS-like
definition: >-
  ATP-grasp domain of nikkomycin biosynthesis like proteins. This family appears to have the sequence similarity with the ATP-grasp domain. Enzymes related to ATP-grasp superfamily catalyze an ATP-dependent ligation of a carboxyl group carbon of one substrate with an amino or imino group nitrogen of the second one via the formation of an acylphosphate intermediate. Catalytic center requires the presence of one or more metal ions as a physiological cofactor. ATP-grasp superfamily members also share a conserved Mg-ATP-binding pocket which is covered by a flexible loop that is believed to undergo a conformational change on substrate binding. SanS from Streptomyces ansochromogenes, and NikS from Streptomyces tendae belong to this family which are essential for nikkomycin biosynthesis
