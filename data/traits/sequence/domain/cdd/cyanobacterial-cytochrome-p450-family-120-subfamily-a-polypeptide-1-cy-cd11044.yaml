identifier: CDD:cd11044
label: "cyanobacterial cytochrome P450 family 120, subfamily A, polypeptide 1 (CYP120A1), vertebrate cytochrome P450 family 26 enzymes, and similar cytochrome P450s. This family includes cyanobacterial CYP120A1 and vertebrate cytochrome P450s 26A1 (CYP26A1), 26B1 (CYP26B1), and 26C1 (CYP26C1). These are retinoic acid-metabolizing cytochromes that play key roles in retinoic acid (RA) metabolism. Human and zebrafish CYP26a1, as well as Synechocystis CYP120A1 are characterized as RA hydroxylases. RA is a critical signaling molecule that regulates gene transcription and the cell cycle. This family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cyanobacterial cytochrome P450 family 120, subfamily A, polypeptide 1 (CYP120A1), vertebrate cytochrome P450 family 26 enzymes, and similar cytochrome P450s. This family includes cyanobacterial CYP120A1 and vertebrate cytochrome P450s 26A1 (CYP26A1), 26B1 (CYP26B1), and 26C1 (CYP26C1). These are retinoic acid-metabolizing cytochromes that play key roles in retinoic acid (RA) metabolism. Human and zebrafish CYP26a1, as well as Synechocystis CYP120A1 are characterized as RA hydroxylases. RA is a critical signaling molecule that regulates gene transcription and the cell cycle. This family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd11044); members share this curated model.
