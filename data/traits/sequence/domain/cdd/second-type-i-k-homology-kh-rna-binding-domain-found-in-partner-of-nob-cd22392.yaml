identifier: CDD:cd22392
label: "second type I K homology (KH) RNA-binding domain found in partner of NOB1 (PNO1) and similar proteins. PNO1 is an RNA-binding protein that acts as a ribosome assembly factor and plays an important role in ribosome biogenesis. It positively regulates dimethylation of two adjacent adenosines in the loop of a conserved hairpin near the 3'-end of 18S rRNA. PNO1 contains two K-homology (KH) RNA-binding domains. The model corresponds to the second one."
definition: >-
  second type I K homology (KH) RNA-binding domain found in partner of NOB1 (PNO1) and similar proteins. PNO1 is an RNA-binding protein that acts as a ribosome assembly factor and plays an important role in ribosome biogenesis. It positively regulates dimethylation of two adjacent adenosines in the loop of a conserved hairpin near the 3'-end of 18S rRNA. PNO1 contains two K-homology (KH) RNA-binding domains. The model corresponds to the second one. — an NCBI CDD conserved domain (cd22392); members share this curated model.
