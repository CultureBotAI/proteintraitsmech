identifier: CDD:cd17202
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in erythrocyte membrane protein band 4.1-like protein 2 (EPB41L2) and similar proteins. EPB41L2, also termed generally expressed protein 4.1 (4.1G), belongs to the skeletal protein 4.1 family that is involved in cellular processes such as cell adhesion, migration and signaling. EPB41L2 contains a FERM domain, a spectrin and actin binding (SAB) domain, and a C-terminal domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in erythrocyte membrane protein band 4.1-like protein 2 (EPB41L2) and similar proteins. EPB41L2, also termed generally expressed protein 4.1 (4.1G), belongs to the skeletal protein 4.1 family that is involved in cellular processes such as cell adhesion, migration and signaling. EPB41L2 contains a FERM domain, a spectrin and actin binding (SAB) domain, and a C-terminal domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17202); members share this curated model.
