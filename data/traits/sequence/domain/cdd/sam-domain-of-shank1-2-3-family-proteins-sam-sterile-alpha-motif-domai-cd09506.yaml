identifier: CDD:cd09506
label: "SAM domain of Shank1,2,3 family proteins. SAM (sterile alpha motif) domain of Shank1,2,3 family proteins is a protein-protein interaction domain. Shank1,2,3 proteins are scaffold proteins that are known to interact with a variety of cytoplasmic and membrane proteins. SAM domains of the Shank1,2,3 family are prone to homooligomerization. They are highly enriched in the postsynaptic density, acting as scaffolds to organize assembly of postsynaptic proteins. SAM domains of Shank3 proteins can form large sheets of helical fibers. Shank genes show distinct patterns of expression, in rat Shank1 mRNA is found almost exclusively in brain, Shank2 in brain, kidney and liver, and Shank3 in heart, brain and spleen."
definition: >-
  SAM domain of Shank1,2,3 family proteins. SAM (sterile alpha motif) domain of Shank1,2,3 family proteins is a protein-protein interaction domain. Shank1,2,3 proteins are scaffold proteins that are known to interact with a variety of cytoplasmic and membrane proteins. SAM domains of the Shank1,2,3 family are prone to homooligomerization. They are highly enriched in the postsynaptic density, acting as scaffolds to organize assembly of postsynaptic proteins. SAM domains of Shank3 proteins can form large sheets of helical fibers. Shank genes show distinct patterns of expression, in rat Shank1 mRNA is found almost exclusively in brain, Shank2 in brain, kidney and liver, and Shank3 in heart, brain and spleen. — an NCBI CDD conserved domain (cd09506); members share this curated model.
