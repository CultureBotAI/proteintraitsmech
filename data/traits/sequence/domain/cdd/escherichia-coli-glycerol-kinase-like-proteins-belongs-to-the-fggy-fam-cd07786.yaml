identifier: CDD:cd07786
label: "Escherichia coli glycerol kinase-like proteins; belongs to the FGGY family of carbohydrate kinases. This subgroup is composed of mostly bacterial and archaeal glycerol kinases (GK), including the well characterized proteins from Escherichia coli (EcGK), Thermococcus kodakaraensis (TkGK), and Enterococcus casseliflavus (EnGK). GKs contain two large domains separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain. The high affinity ATP binding site of EcGK is created only by a substrate-induced conformational change, which is initiated by protein-protein interactions through complex formation with enzyme IIAGlc (also known as IIIGlc), the glucose-specific phosphocarrier protein of the phosphotransferase system (PTS). EcGK exists in a dimer-tetramer equilibrium. IIAGlc binds to both EcGK dimer and tetramer, and inhibits the uptake and subsequent metabolism of glycerol and maltose. Another well-known allosteric regulator of EcGK is fructose 1,6-bisphosphate (FBP), which binds to the EcGK tetramer and plays an essential role in the stabilization of the inactive tetrameric form. EcGK requires Mg2+ for its enzymatic activity. Members in this subgroup belong to the FGGY family of carbohydrate kinases"
definition: >-
  Escherichia coli glycerol kinase-like proteins; belongs to the FGGY family of carbohydrate kinases. This subgroup is composed of mostly bacterial and archaeal glycerol kinases (GK), including the well characterized proteins from Escherichia coli (EcGK), Thermococcus kodakaraensis (TkGK), and Enterococcus casseliflavus (EnGK). GKs contain two large domains separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain. The high affinity ATP binding site of EcGK is created only by a substrate-induced conformational change, which is initiated by protein-protein interactions through complex formation with enzyme IIAGlc (also known as IIIGlc), the glucose-specific phosphocarrier protein of the phosphotransferase system (PTS). EcGK exists in a dimer-tetramer equilibrium. IIAGlc binds to both EcGK dimer and tetramer, and inhibits the uptake and subsequent metabolism of glycerol and maltose. Another well-known allosteric regulator of EcGK is fructose 1,6-bisphosphate (FBP), which binds to the EcGK tetramer and plays an essential role in the stabilization of the inactive tetrameric form. EcGK requires Mg2+ for its enzymatic activity. Members in this subgroup belong to the FGGY family of carbohydrate kinases — an NCBI CDD conserved domain (cd07786); members share this curated model.
