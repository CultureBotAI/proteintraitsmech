identifier: CDD:cd05429
label: NT_hZCCHC11-6_D1_like
definition: >-
  First nucleotidyltransferase (NT) domain of human zinc finger CCHC domain-containing proteins (hZCCHC)-6, and -11 and related domains. NT_hZCCHC11-6_D1_like: catalytic domain found in proteins similar to the first of two poly (A) polymerases (PAP) domains of human zinc finger CCHC domain-containing proteins (hZCCHC)-6, and -11. PAPs are responsible for mRNA poly (A) tail synthesis. Multiple forms of PAPs are present in cell lines and tissues of different species, as the result of gene duplication, alternative splicing, and post-translational modification. hZCCHC11 is mostly nuclear in localization, and thought to be involved in regulation of RNA processing or transcription; however it also translocates to the cytoplasm in response to Lipopolysaccharide (LPS) and there plays a role in Toll-like receptor (TLR) signaling. hZCCHC6 in addition to having PAP activity, has substantial poly(U) polymerase(PUP) activity. These proteins are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. Only one of these carboxylate residues is well conserved in these NT_hZCCHC11-6_D1_like domains
