identifier: CDD:cd21842
label: TBC1D7bd_TSC1
definition: >-
  TBC1D7-binding coiled-coil domain found in tuberous sclerosis 1 protein (TSC1). TSC1 (also called hamartin), together with TSC2 (also called tuberin), forms a complex that inhibits mammalian target of rapamycin (mTOR)-mediated cell growth and proliferation. It has been implicated as a tumor suppressor involved in the development of various malignancies. TSC1 contains a large coiled-coil domain that consists of two regions. The N-terminal region is important for TSC2 binding and the C-terminal region harbors a TBC1D7-binding site. The model corresponds to the TBC1D7-binding coiled-coil domain
