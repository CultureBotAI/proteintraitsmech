identifier: CDD:cd23797
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 H and related proteins. The E2H subfamily includes mammalian ubiquitin-conjugating enzymes E2 H (UBE2H), yeast E2 ubiquitin-conjugating enzyme 8 (UBC8/GID3), and plant ubiquitin-conjugating enzyme E2 4-6 (UBC4-6). They are ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. UBE2H (also E3-independent, EC 2.3.2.24) transfers ubiquitin to MAEA, a core component of the CTLH E3 ubiquitin-protein ligase complex. In vitro, UBE2H catalyzes 'Lys-11'- and 'Lys-48'-linked polyubiquitination. It might also ubiquitinate histone H2A. Saccharomyces cerevisiae UBC8 is required for the adaptation to the presence of glucose in the growth medium; it mediates the degradation of enzymes involved in gluconeogenesis when cells are shifted to glucose-containing medium. It is also required for proteasome-dependent catabolite degradation of fructose-1,6-bisphosphatase (FBP1)."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 H and related proteins. The E2H subfamily includes mammalian ubiquitin-conjugating enzymes E2 H (UBE2H), yeast E2 ubiquitin-conjugating enzyme 8 (UBC8/GID3), and plant ubiquitin-conjugating enzyme E2 4-6 (UBC4-6). They are ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. UBE2H (also E3-independent, EC 2.3.2.24) transfers ubiquitin to MAEA, a core component of the CTLH E3 ubiquitin-protein ligase complex. In vitro, UBE2H catalyzes 'Lys-11'- and 'Lys-48'-linked polyubiquitination. It might also ubiquitinate histone H2A. Saccharomyces cerevisiae UBC8 is required for the adaptation to the presence of glucose in the growth medium; it mediates the degradation of enzymes involved in gluconeogenesis when cells are shifted to glucose-containing medium. It is also required for proteasome-dependent catabolite degradation of fructose-1,6-bisphosphatase (FBP1). — an NCBI CDD conserved domain (cd23797); members share this curated model.
