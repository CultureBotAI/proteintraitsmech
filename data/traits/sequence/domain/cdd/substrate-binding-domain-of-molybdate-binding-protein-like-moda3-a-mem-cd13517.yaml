identifier: CDD:cd13517
label: "Substrate binding domain of molybdate binding protein-like (ModA3), a member of the type 2 periplasmic binding fold superfamily. This subfamily contains molybdate binding protein-like (ModA3) domain of an ABC-type transporter. Molybdate transport system is comprised of a periplasmic binding protein, an integral membrane protein, and an energizer protein. These three proteins are coded by modA, modB, and modC genes, respectively. ModA proteins serve as initial receptors in the ABC transport of molybdate mostly in eubacteria and archaea. ModA transporters import molybdenum and tungsten from the environment in the form of the oxyanions molybdate (MoO(4) (2-)) and tungstate (WO(4) (2-)). After binding molybdate with high affinity, they interact with a cognate membrane transport complex comprised of two integral membrane domains and two cytoplasmically located ATPase. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis. In contrast to the structure of the two ModA homologs from Escherichia coli and Azotobacter vinelandii, where the oxygen atoms are tetrahedrally arrangted around the metal center, the structure of Pyrococcus furiosus ModA/WtpA (PfModA) has shown that a binding site for molybdate and tungstate where the central metal atom is in a hexacoordinate configuration. The ModA proteins belong to the PBP2 superfamily of periplasmic binding proteins that differ in size and ligand specificity, but have similar tertiary structures consisting of two globular subdomains connected by a flexible hinge.  They have been shown to bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap."
definition: >-
  Substrate binding domain of molybdate binding protein-like (ModA3), a member of the type 2 periplasmic binding fold superfamily. This subfamily contains molybdate binding protein-like (ModA3) domain of an ABC-type transporter. Molybdate transport system is comprised of a periplasmic binding protein, an integral membrane protein, and an energizer protein. These three proteins are coded by modA, modB, and modC genes, respectively. ModA proteins serve as initial receptors in the ABC transport of molybdate mostly in eubacteria and archaea. ModA transporters import molybdenum and tungsten from the environment in the form of the oxyanions molybdate (MoO(4) (2-)) and tungstate (WO(4) (2-)). After binding molybdate with high affinity, they interact with a cognate membrane transport complex comprised of two integral membrane domains and two cytoplasmically located ATPase. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis. In contrast to the structure of the two ModA homologs from Escherichia coli and Azotobacter vinelandii, where the oxygen atoms are tetrahedrally arrangted around the metal center, the structure of Pyrococcus furiosus ModA/WtpA (PfModA) has shown that a binding site for molybdate and tungstate where the central metal atom is in a hexacoordinate configuration. The ModA proteins belong to the PBP2 superfamily of periplasmic binding proteins that differ in size and ligand specificity, but have similar tertiary structures consisting of two globular subdomains connected by a flexible hinge. They have been shown to bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. — an NCBI CDD conserved domain (cd13517); members share this curated model.
