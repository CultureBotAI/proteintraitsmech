identifier: CDD:cd13214
label: "WW binding protein 2 (WB2) Pleckstrin Homology-Glucosyltransferases, Rab-like GTPase activators and Myotubularins (PH-GRAM) domain. WBP2 plays a number of roles including: acting as a tyrosine kinase substrate, activation of estrogen receptor alpha (ERalpha)/progesterone receptor (PR) transcription, and playing a role in breast cancer. WBP2 contain a N-terminal PH-GRAM domain and a C-terminal WWbp domain. The GRAM domain, found in myotubularins, glucosyltransferases, and other putative membrane-associated proteins, is part of a larger motif with a pleckstrin homology (PH) domain fold. The WWbp domain is characterized by several short PY and PT-like motifs of the PPPPY form and binds to WW domains. WW domains contain two highly conserved tryptophans that are spaced 20-23 residues apart. They bind proline-rich peptide motifs [AP]-P-P-[AP]-Y, and/or phosphoserine- phosphothreonine-containing motifs."
definition: >-
  WW binding protein 2 (WB2) Pleckstrin Homology-Glucosyltransferases, Rab-like GTPase activators and Myotubularins (PH-GRAM) domain. WBP2 plays a number of roles including: acting as a tyrosine kinase substrate, activation of estrogen receptor alpha (ERalpha)/progesterone receptor (PR) transcription, and playing a role in breast cancer. WBP2 contain a N-terminal PH-GRAM domain and a C-terminal WWbp domain. The GRAM domain, found in myotubularins, glucosyltransferases, and other putative membrane-associated proteins, is part of a larger motif with a pleckstrin homology (PH) domain fold. The WWbp domain is characterized by several short PY and PT-like motifs of the PPPPY form and binds to WW domains. WW domains contain two highly conserved tryptophans that are spaced 20-23 residues apart. They bind proline-rich peptide motifs [AP]-P-P-[AP]-Y, and/or phosphoserine- phosphothreonine-containing motifs. — an NCBI CDD conserved domain (cd13214); members share this curated model.
