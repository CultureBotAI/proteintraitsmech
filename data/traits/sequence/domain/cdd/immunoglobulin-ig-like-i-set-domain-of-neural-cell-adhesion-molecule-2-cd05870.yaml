identifier: CDD:cd05870
label: "Immunoglobulin (Ig)-like I-set domain of Neural Cell Adhesion Molecule 2 (NCAM-2). The members here are composed of the fourth Ig domain of Neural Cell Adhesion Molecule NCAM-2 (also known as OCAM/mamFas II and RNCAM). NCAM-2 is organized similarly to NCAM, including five N-terminal Ig-like domains and two fibronectin type III domains. NCAM-2 is differentially expressed in the developing and mature olfactory epithelium (OE), and may function like NCAM, as an adhesion molecule. One of the unique features of I-set domains is the lack of a C\" strand. The structures of this group show that the Ig domain lacks this strand and thus is a member of the I-set of Ig domains."
definition: >-
  Immunoglobulin (Ig)-like I-set domain of Neural Cell Adhesion Molecule 2 (NCAM-2). The members here are composed of the fourth Ig domain of Neural Cell Adhesion Molecule NCAM-2 (also known as OCAM/mamFas II and RNCAM). NCAM-2 is organized similarly to NCAM, including five N-terminal Ig-like domains and two fibronectin type III domains. NCAM-2 is differentially expressed in the developing and mature olfactory epithelium (OE), and may function like NCAM, as an adhesion molecule. One of the unique features of I-set domains is the lack of a C" strand. The structures of this group show that the Ig domain lacks this strand and thus is a member of the I-set of Ig domains. — an NCBI CDD conserved domain (cd05870); members share this curated model.
