label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in Drosophila melanogaster Circadian locomotor output cycles protein kaput (dCLOCK) and similar proteins. dCLOCK, also termed dPAS1, is a bHLH-PAS Circadian regulator that acts as a transcription factor and generates a rhythmic output with a period of about 24 hours."
