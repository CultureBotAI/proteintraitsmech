identifier: CDD:cd16045
label: TNFSF3
definition: >-
  Tumor necrosis factor superfamily 3 (TNFSF3), also known as TNF-C or lymphotoxin-beta. This family contains TNFSF3 (also known as lymphotoxin-beta or LT-beta, LTB, tumor necrosis factor C, TNF-C), a proinflammatory cytokine produced by lymphocytes. TNFSF3/LTB is expressed together with lymphotoxin-alpha (LTA), which oligomerize, generating cell-surface lymphotoxin-alpha 1/beta 2 complex (LTA1B2) heterotrimers; the LTB provides the membrane anchor for the trimer and confers specificity for lyphotoxin beta receptor (LTbetaR, also known as TNFRSF3) binding (i.e.LTA1B2 is thus the primary ligand for LTbetaR). Studies show that LTB-related cytokines directly contribute to the phenotype of cancer cells and alter the tumor microenvironment. LTbetaR agonism by these ligands initiates canonical, as well as non-canonical nuclear factor-kappaB (NF-kappaB) signaling, and preferentially results in the translocation of p52-RELB complexes into the nucleus. Studies show that LTB cytokines directly contribute to the phenotype of cancer cells and alter the tumor microenvironment. LTB and LTbetaR expression have been found to be upregulated in liver tumors. LTA1B2-expressing cancer cells activate LTbetaR in stromal cells; the receptor can secrete chemokines or potentially other factors that favor cancer progression
