identifier: CDD:cd23085
label: "circularly permuted PDZ domain of Arabidopsis thaliana putative protease Do-like 14 (DEGP14) and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of Arabidopsis thaliana putative protease DEGP14 and related domains. DEGP14 is a putative protease belonging to the HtrA family of housekeeping proteases. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as A, B, C, alpha-helix 1, beta-strands D, E,  alpha-helix 2 and beta-strand F. This AtDEGP14-like PDZ domain is a circularly permuted PDZ domain which places beta-strand A on the C-terminus. Another permutation exists in the PDZ superfamily which places both beta-strands A and B on the C-terminus."
definition: >-
  circularly permuted PDZ domain of Arabidopsis thaliana putative protease Do-like 14 (DEGP14) and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of Arabidopsis thaliana putative protease DEGP14 and related domains. DEGP14 is a putative protease belonging to the HtrA family of housekeeping proteases. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. This AtDEGP14-like PDZ domain is a circularly permuted PDZ domain which places beta-strand A on the C-terminus. Another permutation exists in the PDZ superfamily which places both beta-strands A and B on the C-terminus. — an NCBI CDD conserved domain (cd23085); members share this curated model.
