identifier: CDD:cd22735
label: "forkhead associated (FHA) domain found in aprataxin and similar proteins. Aprataxin (EC 3.6.1.71/EC 3.6.1.72), also called forkhead-associated domain histidine triad-like protein (FHA-HIT), is a DNA-binding protein involved in single-strand DNA break repair, double-strand DNA break repair, and base excision repair. It catalyzes the release of adenylate groups covalently linked to 5'-phosphate termini, resulting in the production of 5'-phosphate termini that can be efficiently rejoined. It can also hydrolyze adenosine 5'-monophosphoramidate (AMP-NH(2)) and diadenosine tetraphosphate (AppppA), but with lower catalytic activity. Likewise, it catalyzes the release of 3'-linked guanosine (DNAppG) and inosine (DNAppI) from DNA but has higher specific activity with 5'-linked adenosine (AppDNA). Mutations in the gene APTX have been associated with ataxia-ocular apraxia. Aprataxin contains an FHA domain at its N-terminus. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in aprataxin and similar proteins. Aprataxin (EC 3.6.1.71/EC 3.6.1.72), also called forkhead-associated domain histidine triad-like protein (FHA-HIT), is a DNA-binding protein involved in single-strand DNA break repair, double-strand DNA break repair, and base excision repair. It catalyzes the release of adenylate groups covalently linked to 5'-phosphate termini, resulting in the production of 5'-phosphate termini that can be efficiently rejoined. It can also hydrolyze adenosine 5'-monophosphoramidate (AMP-NH(2)) and diadenosine tetraphosphate (AppppA), but with lower catalytic activity. Likewise, it catalyzes the release of 3'-linked guanosine (DNAppG) and inosine (DNAppI) from DNA but has higher specific activity with 5'-linked adenosine (AppDNA). Mutations in the gene APTX have been associated with ataxia-ocular apraxia. Aprataxin contains an FHA domain at its N-terminus. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22735); members share this curated model.
