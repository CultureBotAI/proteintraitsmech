identifier: CDD:cd17226
label: "Ras-associating (RA) domain found in Arf-GAP with Rho-GAP domain, ANK repeat and PH domain-containing protein 1 (ARAP1). ARAP1, also termed Centaurin-delta-2 (Cnt-d2), is a phosphatidylinositol 3,4,5-trisphosphate (PtdIns(3,4,5)P(3))-dependent Arf Rap-activated guanosine triphosphatase (GTPase)-activating protein (GAP) that inhibits the trafficking of epidermal growth factor receptor (EGFR) to the early endosome. It associates with the Cbl-interacting protein of 85 kDa (CIN85), regulates endocytic trafficking of the EGFR, and thus affects ubiquitination of EGFR. It also regulates the ring size of circular dorsal ruffles through Arf1 and Arf5. ARAP1 contains multiple functional domains, including ArfGAP and RhoGAP domains, as well as a sterile alpha motif (Sam) domain, five PH domains, and a RA domain. The RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin (Ub); Ub is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes."
definition: >-
  Ras-associating (RA) domain found in Arf-GAP with Rho-GAP domain, ANK repeat and PH domain-containing protein 1 (ARAP1). ARAP1, also termed Centaurin-delta-2 (Cnt-d2), is a phosphatidylinositol 3,4,5-trisphosphate (PtdIns(3,4,5)P(3))-dependent Arf Rap-activated guanosine triphosphatase (GTPase)-activating protein (GAP) that inhibits the trafficking of epidermal growth factor receptor (EGFR) to the early endosome. It associates with the Cbl-interacting protein of 85 kDa (CIN85), regulates endocytic trafficking of the EGFR, and thus affects ubiquitination of EGFR. It also regulates the ring size of circular dorsal ruffles through Arf1 and Arf5. ARAP1 contains multiple functional domains, including ArfGAP and RhoGAP domains, as well as a sterile alpha motif (Sam) domain, five PH domains, and a RA domain. The RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin (Ub); Ub is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes. — an NCBI CDD conserved domain (cd17226); members share this curated model.
