label: ATP-G_DDala_EcDdlB
definition: >-
  ATP-grasp domain of D-ala-D-ala (EcDdlB type) ligases. ATP-grasp domain of D-ala-D-ala (EcDdlB type) ligases. D-alanine:D-alanine ligase (Ddl, EC 6.3.2.4) is a bacterial cell wall synthesizing enzyme. This group represents EcDdlB (Escherichia coli B D-ala-D-ala) type of enzymes that are sensitive to vancomycin. These enzymes convert ATP to ADP during ligation raction where carboxylate substrate is D-alanine and amine or thiol substrate is also D-alanine. Structural analysis confirms that w-loop defines the active site residues. This subfamily also includes other characterized members like ddlS encoded DDL from Streptomyces lavendulae which produces D-cycloserine (DCS). DCS is a cyclic structural analogue of D-alanine which is used as a clinical medicine for the treatment of tuberculosis. Although sequence motif in w-loop from DDL (S. lavendulae) are similar to those of D-ala:D-ser ligases, experiments confirm that it does not display any D-ala:D-lac or D-ala:D-ser activity
