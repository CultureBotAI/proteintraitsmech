identifier: CDD:cd15863
label: "SNARE motif of GS27. GS27 (also known as Bos1, EPM6, golgi SNAP receptor complex member 2 or GOSR2) is a member of the Qb subfamily of SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptor) proteins. GS27 forms a complex together with Bet1 (Qc), syntaxin-5 (Qa) and Sec22B (R-SNARE). This complex regulates the early secretory pathway of eukaryotic cells at the level of the transport from endoplasmic reticulum (ER) to the ER-Golgi intermediate compartment (ERGIC). SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptor) proteins, which consist of coiled-coil helices (called SNARE motifs) that mediate the interactions between SNARE proteins, and a transmembrane domain. The SNARE complex mediates membrane fusion, important for trafficking of newly synthesized proteins, recycling of pre-existing proteins and organelle formation. SNARE proteins are classified into four groups, Qa-, Qb-, Qc- and R-SNAREs, depending on whether the residue in the hydrophilic center layer of the four-helical bundle is a glutamine (Q) or arginine (R). Qa-, as well as Qb- and Qc-SNAREs, are localized to target organelle membranes, while R-SNARE is localized to vesicle membranes. They form unique complexes consisting of one member of each subgroup, that mediate fusion between a specific type of vesicles and their target organelle."
definition: >-
  SNARE motif of GS27. GS27 (also known as Bos1, EPM6, golgi SNAP receptor complex member 2 or GOSR2) is a member of the Qb subfamily of SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptor) proteins. GS27 forms a complex together with Bet1 (Qc), syntaxin-5 (Qa) and Sec22B (R-SNARE). This complex regulates the early secretory pathway of eukaryotic cells at the level of the transport from endoplasmic reticulum (ER) to the ER-Golgi intermediate compartment (ERGIC). SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptor) proteins, which consist of coiled-coil helices (called SNARE motifs) that mediate the interactions between SNARE proteins, and a transmembrane domain. The SNARE complex mediates membrane fusion, important for trafficking of newly synthesized proteins, recycling of pre-existing proteins and organelle formation. SNARE proteins are classified into four groups, Qa-, Qb-, Qc- and R-SNAREs, depending on whether the residue in the hydrophilic center layer of the four-helical bundle is a glutamine (Q) or arginine (R). Qa-, as well as Qb- and Qc-SNAREs, are localized to target organelle membranes, while R-SNARE is localized to vesicle membranes. They form unique complexes consisting of one member of each subgroup, that mediate fusion between a specific type of vesicles and their target organelle. — an NCBI CDD conserved domain (cd15863); members share this curated model.
