identifier: CDD:cd20655
label: "cytochrome P450 family 93. The cytochrome P450 family 93 (CYP93) is specifically found in flowering plants and could be classified into ten subfamilies, CYP93A-K. CYP93A appears to be the ancestor that was derived in flowering plants, and the remaining subfamiles show lineage-specific distribution: CYP93B and CYP93C are present in dicots; CYP93F is distributed only in Poaceae; CYP93G and CYP93J are monocot-specific; CYP93E is unique to legumes; CYP93H and CYP93K are only found in Aquilegia coerulea; and CYP93D is Brassicaceae-specific. Members of this family include: Glycyrrhiza echinata CYP93B1, also called licodione synthase (EC 1.14.14.140), that catalyzes the formation of licodione and 2-hydroxynaringenin from (2S)-liquiritigenin and (2S)-naringenin, respectively; and Glycine max CYP93A1, also called 3,9-dihydroxypterocarpan 6A-monooxygenase (EC 1.14.14.93), that is involved in the biosynthesis of the phytoalexin glyceollin. CYP93 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 family 93. The cytochrome P450 family 93 (CYP93) is specifically found in flowering plants and could be classified into ten subfamilies, CYP93A-K. CYP93A appears to be the ancestor that was derived in flowering plants, and the remaining subfamiles show lineage-specific distribution: CYP93B and CYP93C are present in dicots; CYP93F is distributed only in Poaceae; CYP93G and CYP93J are monocot-specific; CYP93E is unique to legumes; CYP93H and CYP93K are only found in Aquilegia coerulea; and CYP93D is Brassicaceae-specific. Members of this family include: Glycyrrhiza echinata CYP93B1, also called licodione synthase (EC 1.14.14.140), that catalyzes the formation of licodione and 2-hydroxynaringenin from (2S)-liquiritigenin and (2S)-naringenin, respectively; and Glycine max CYP93A1, also called 3,9-dihydroxypterocarpan 6A-monooxygenase (EC 1.14.14.93), that is involved in the biosynthesis of the phytoalexin glyceollin. CYP93 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd20655); members share this curated model.
