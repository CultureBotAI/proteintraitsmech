identifier: CDD:cd05169
label: "Catalytic domain of Target of Rapamycin. TOR contains a rapamycin binding domain, a catalytic domain, and a FATC (FRAP, ATM and TRRAP, C-terminal) domain at the C-terminus. It is also called FRAP (FK506 binding protein 12-rapamycin associated protein). TOR is a central component of the eukaryotic growth regulatory network. It controls the expression of many genes transcribed by all three RNA polymerases. It associates with other proteins to form two distinct complexes, TORC1 and TORC2. TORC1 is involved in diverse growth-related functions including protein synthesis, nutrient use and transport, autophagy and stress responses. TORC2 is involved in organizing cytoskeletal structures. TOR is a member of the phosphoinositide 3-kinase-related protein kinase (PIKK) subfamily. PIKKs have intrinsic serine/threonine kinase activity and are distinguished from other PKs by their unique catalytic domain, similar to that of lipid PI3K, and their large molecular weight (240-470 kDa). The TOR catalytic domain subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as the typical serine/threonine/tyrosine protein kinases (PKs), aminoglycoside phosphotransferase, choline kinase, and RIO kinases."
definition: >-
  Catalytic domain of Target of Rapamycin. TOR contains a rapamycin binding domain, a catalytic domain, and a FATC (FRAP, ATM and TRRAP, C-terminal) domain at the C-terminus. It is also called FRAP (FK506 binding protein 12-rapamycin associated protein). TOR is a central component of the eukaryotic growth regulatory network. It controls the expression of many genes transcribed by all three RNA polymerases. It associates with other proteins to form two distinct complexes, TORC1 and TORC2. TORC1 is involved in diverse growth-related functions including protein synthesis, nutrient use and transport, autophagy and stress responses. TORC2 is involved in organizing cytoskeletal structures. TOR is a member of the phosphoinositide 3-kinase-related protein kinase (PIKK) subfamily. PIKKs have intrinsic serine/threonine kinase activity and are distinguished from other PKs by their unique catalytic domain, similar to that of lipid PI3K, and their large molecular weight (240-470 kDa). The TOR catalytic domain subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as the typical serine/threonine/tyrosine protein kinases (PKs), aminoglycoside phosphotransferase, choline kinase, and RIO kinases. — an NCBI CDD conserved domain (cd05169); members share this curated model.
