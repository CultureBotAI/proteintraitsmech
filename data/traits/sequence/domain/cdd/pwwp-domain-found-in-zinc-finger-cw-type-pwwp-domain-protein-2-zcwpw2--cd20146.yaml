identifier: CDD:cd20146
label: "PWWP domain found in zinc finger CW-type PWWP domain protein 2 (ZCWPW2) and similar proteins. ZCWPW2 is a histone H3K4me3 reader. In addition to the PWWP domain, ZCWPW2 contains a zinc finger CW (zf-CW) domain that is a histone modification reader for the histone H3 tail with trimethylated K4. The PWWP domain specifically recognizes DNA and histone methylated lysines."
definition: >-
  PWWP domain found in zinc finger CW-type PWWP domain protein 2 (ZCWPW2) and similar proteins. ZCWPW2 is a histone H3K4me3 reader. In addition to the PWWP domain, ZCWPW2 contains a zinc finger CW (zf-CW) domain that is a histone modification reader for the histone H3 tail with trimethylated K4. The PWWP domain specifically recognizes DNA and histone methylated lysines. — an NCBI CDD conserved domain (cd20146); members share this curated model.
