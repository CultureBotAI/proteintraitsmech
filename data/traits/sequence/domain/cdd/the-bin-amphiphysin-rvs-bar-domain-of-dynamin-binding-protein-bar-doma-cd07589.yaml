identifier: CDD:cd07589
label: "The Bin/Amphiphysin/Rvs (BAR) domain of Dynamin Binding Protein. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions. DyNamin Binding Protein (DNMBP), also called Tuba, is a Cdc42-specific Guanine nucleotide Exchange Factor (GEF) that binds dynamin and various actin regulatory proteins. It serves as a link between dynamin function, Rho GTPase signaling, and actin dynamics. It plays an important role in regulating cell junction configuration. DNMBP contains BAR and SH3 domains as well as a Dbl Homology domain (DH domain), which harbors GEF activity. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions. The BAR domain of DNMBP may be involved in binding to membranes. The gene encoding DNMBP is a candidate gene for late onset Alzheimer's disease."
definition: >-
  The Bin/Amphiphysin/Rvs (BAR) domain of Dynamin Binding Protein. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions. DyNamin Binding Protein (DNMBP), also called Tuba, is a Cdc42-specific Guanine nucleotide Exchange Factor (GEF) that binds dynamin and various actin regulatory proteins. It serves as a link between dynamin function, Rho GTPase signaling, and actin dynamics. It plays an important role in regulating cell junction configuration. DNMBP contains BAR and SH3 domains as well as a Dbl Homology domain (DH domain), which harbors GEF activity. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions. The BAR domain of DNMBP may be involved in binding to membranes. The gene encoding DNMBP is a candidate gene for late onset Alzheimer's disease. — an NCBI CDD conserved domain (cd07589); members share this curated model.
