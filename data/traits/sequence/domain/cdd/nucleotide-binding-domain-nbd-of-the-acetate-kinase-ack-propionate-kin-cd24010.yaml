identifier: CDD:cd24010
label: "nucleotide-binding domain (NBD) of the acetate kinase (AcK)/propionate kinase (PK) domain family. The family corresponds to a group of proteins which transfer phosphate from ATP to a short chain aliphatic acid. It includes acetate kinase (AckA) and propionate kinase (TdcD and PduW). Acetate kinase (EC 2.7.2.1), also called acetokinase, catalyzes the formation of acetyl phosphate from acetate and ATP. It can also catalyze the reverse reaction in the presence of a divalent cation. During anaerobic growth of the organism, this enzyme is also involved in the synthesis of most of the ATP formed catabolically. Propionate kinase TdcD (EC 2.7.2.15) catalyzes the conversion of propionyl phosphate and ADP to propionate and ATP. It can also use acetyl phosphate as phosphate group acceptor. The family also includes propionate kinase PduW (EC 2.7.2.15) that works with phosphate acetyltransferase (pta) to capture exogenous propionate and regenerate propionyl-CoA during degradation of propionate and 1,2-propanediol (1,2-PD). This protein restores growth to an eutQ deletion on ethanolamine and tetrathionate under anoxic conditions. The AcK/PK family belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains."
definition: >-
  nucleotide-binding domain (NBD) of the acetate kinase (AcK)/propionate kinase (PK) domain family. The family corresponds to a group of proteins which transfer phosphate from ATP to a short chain aliphatic acid. It includes acetate kinase (AckA) and propionate kinase (TdcD and PduW). Acetate kinase (EC 2.7.2.1), also called acetokinase, catalyzes the formation of acetyl phosphate from acetate and ATP. It can also catalyze the reverse reaction in the presence of a divalent cation. During anaerobic growth of the organism, this enzyme is also involved in the synthesis of most of the ATP formed catabolically. Propionate kinase TdcD (EC 2.7.2.15) catalyzes the conversion of propionyl phosphate and ADP to propionate and ATP. It can also use acetyl phosphate as phosphate group acceptor. The family also includes propionate kinase PduW (EC 2.7.2.15) that works with phosphate acetyltransferase (pta) to capture exogenous propionate and regenerate propionyl-CoA during degradation of propionate and 1,2-propanediol (1,2-PD). This protein restores growth to an eutQ deletion on ethanolamine and tetrathionate under anoxic conditions. The AcK/PK family belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains. — an NCBI CDD conserved domain (cd24010); members share this curated model.
