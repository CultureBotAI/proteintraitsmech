identifier: CDD:cd12517
label: "RNA recognition motif (RRM) found in vertebrate RNA-binding protein 27 (RBM27). This subgroup corresponds to the RRM of RBM27 which contains a single RNA recognition motif (RRM), also known as RBD (RNA binding domain) or RNP (ribonucleoprotein domain). Although the specific function of the RRM in RBM27 remains unclear, it shows high sequence similarity with RRM1of RBM26, which functions as a cutaneous lymphoma (CL)-associated antigen."
definition: >-
  RNA recognition motif (RRM) found in vertebrate RNA-binding protein 27 (RBM27). This subgroup corresponds to the RRM of RBM27 which contains a single RNA recognition motif (RRM), also known as RBD (RNA binding domain) or RNP (ribonucleoprotein domain). Although the specific function of the RRM in RBM27 remains unclear, it shows high sequence similarity with RRM1of RBM26, which functions as a cutaneous lymphoma (CL)-associated antigen. — an NCBI CDD conserved domain (cd12517); members share this curated model.
