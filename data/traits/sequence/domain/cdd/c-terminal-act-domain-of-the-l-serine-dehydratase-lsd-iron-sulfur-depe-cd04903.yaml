identifier: CDD:cd04903
label: "C-terminal ACT domain of the L-serine dehydratase (LSD), iron-sulfur-dependent, beta subunit. The C-terminal ACT domain of the L-serine dehydratase (LSD), iron-sulfur-dependent, beta subunit, found in various bacterial anaerobes such as Clostridium, Bacillis, and Treponema species. These enzymes catalyze the deamination of L-serine, producing pyruvate and ammonia. Unlike the eukaryotic L-serine dehydratase, which requires the pyridoxal-5'-phosphate (PLP) cofactor, the prokaryotic L-serine dehydratase contains an [4Fe-4S] cluster instead of a PLP active site. The LSD alpha and beta subunits of the 'clostridial' enzyme are encoded by the sdhA and sdhB genes. The single subunit bacterial homologs of L-serine dehydratase (LSD1, LSD2, TdcG) present in Escherichia coli, and other enterobacterials, lack the ACT domain described here. Members of this CD belong to the superfamily of ACT regulatory domains."
definition: >-
  C-terminal ACT domain of the L-serine dehydratase (LSD), iron-sulfur-dependent, beta subunit. The C-terminal ACT domain of the L-serine dehydratase (LSD), iron-sulfur-dependent, beta subunit, found in various bacterial anaerobes such as Clostridium, Bacillis, and Treponema species. These enzymes catalyze the deamination of L-serine, producing pyruvate and ammonia. Unlike the eukaryotic L-serine dehydratase, which requires the pyridoxal-5'-phosphate (PLP) cofactor, the prokaryotic L-serine dehydratase contains an [4Fe-4S] cluster instead of a PLP active site. The LSD alpha and beta subunits of the 'clostridial' enzyme are encoded by the sdhA and sdhB genes. The single subunit bacterial homologs of L-serine dehydratase (LSD1, LSD2, TdcG) present in Escherichia coli, and other enterobacterials, lack the ACT domain described here. Members of this CD belong to the superfamily of ACT regulatory domains. — an NCBI CDD conserved domain (cd04903); members share this curated model.
