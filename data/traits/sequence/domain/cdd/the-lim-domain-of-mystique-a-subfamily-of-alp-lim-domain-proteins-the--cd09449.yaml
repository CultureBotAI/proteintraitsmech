identifier: CDD:cd09449
label: "The LIM domain of Mystique, a subfamily of ALP LIM domain proteins. The LIM domain of Mystique, a subfamily of ALP LIM domain proteins: Mystique is the most recently identified member of the ALP protein family. It also interacts with alpha-actinin, as other ALP proteins do. Mystique promotes cell attachment and migration and suppresses anchorage-independent growth. The LIM domain of Mystique is required for the suppression function. Moreover, Mystique functions as an ubiquitin E3 ligase acting on STAT proteins to cause their proteosome mediated degradation. As in all LIM domains, this domain is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes."
definition: >-
