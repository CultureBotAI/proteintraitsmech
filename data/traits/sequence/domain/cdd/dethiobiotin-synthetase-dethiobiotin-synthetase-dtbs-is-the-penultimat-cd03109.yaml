identifier: CDD:cd03109
label: "dethiobiotin synthetase. Dethiobiotin synthetase (DTBS) is the penultimate enzyme in the biotin biosynthesis pathway in Escherichia coli and other microorganisms. The enzyme catalyzes formation of the ureido ring of dethiobiotin from (7R,8S)-7,8-diaminononanoic acid (DAPA) and carbon dioxide. The enzyme utilizes carbon dioxide instead of hydrogen carbonate as substrate and is dependent on ATP and divalent metal ions as cofactors."
definition: >-
  dethiobiotin synthetase. Dethiobiotin synthetase (DTBS) is the penultimate enzyme in the biotin biosynthesis pathway in Escherichia coli and other microorganisms. The enzyme catalyzes formation of the ureido ring of dethiobiotin from (7R,8S)-7,8-diaminononanoic acid (DAPA) and carbon dioxide. The enzyme utilizes carbon dioxide instead of hydrogen carbonate as substrate and is dependent on ATP and divalent metal ions as cofactors. — an NCBI CDD conserved domain (cd03109); members share this curated model.
