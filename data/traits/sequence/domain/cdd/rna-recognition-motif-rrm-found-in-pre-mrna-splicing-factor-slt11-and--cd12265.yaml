identifier: CDD:cd12265
label: "RNA recognition motif (RRM) found in pre-mRNA-splicing factor SLT11 and similar proteins. This subfamily corresponds to the RRM of SLT11, also known as extracellular mutant protein 2, or synthetic lethality with U2 protein 11, and is a splicing factor required for spliceosome assembly in yeast. It contains a conserved RNA recognition motif (RRM), also known as RBD (RNA binding domain) or RNP (ribonucleoprotein domain). SLT11 can facilitate the cooperative formation of U2/U6 helix II in association with stem II in the yeast spliceosome by utilizing its RNA-annealing and -binding activities."
definition: >-
  RNA recognition motif (RRM) found in pre-mRNA-splicing factor SLT11 and similar proteins. This subfamily corresponds to the RRM of SLT11, also known as extracellular mutant protein 2, or synthetic lethality with U2 protein 11, and is a splicing factor required for spliceosome assembly in yeast. It contains a conserved RNA recognition motif (RRM), also known as RBD (RNA binding domain) or RNP (ribonucleoprotein domain). SLT11 can facilitate the cooperative formation of U2/U6 helix II in association with stem II in the yeast spliceosome by utilizing its RNA-annealing and -binding activities. — an NCBI CDD conserved domain (cd12265); members share this curated model.
