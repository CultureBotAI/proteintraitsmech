identifier: CDD:cd14330
label: "UBA domain found in Arabidopsis thaliana DNA (cytosine-5)-methyltransferase DRM2 (atDRM2) and similar proteins. atDRM2, also called protein domains rearranged methylase 2, is a homolog of the mammalian de novo methyltransferase DNMT3. It is the major de novo methyltransferase targeted to DNA by small interfering RNAs (siRNAs) in the RNA-directed DNA methylation (RdDM) pathway in Arabidopsis thaliana. atDRM2 is a part of the RdDM effector complex and plays a catalytic role in RdDM. It contains an N-terminal UBA domains and a C-terminal methyltransferase domain, both of which are required for normal RdDM."
definition: >-
  UBA domain found in Arabidopsis thaliana DNA (cytosine-5)-methyltransferase DRM2 (atDRM2) and similar proteins. atDRM2, also called protein domains rearranged methylase 2, is a homolog of the mammalian de novo methyltransferase DNMT3. It is the major de novo methyltransferase targeted to DNA by small interfering RNAs (siRNAs) in the RNA-directed DNA methylation (RdDM) pathway in Arabidopsis thaliana. atDRM2 is a part of the RdDM effector complex and plays a catalytic role in RdDM. It contains an N-terminal UBA domains and a C-terminal methyltransferase domain, both of which are required for normal RdDM. — an NCBI CDD conserved domain (cd14330); members share this curated model.
