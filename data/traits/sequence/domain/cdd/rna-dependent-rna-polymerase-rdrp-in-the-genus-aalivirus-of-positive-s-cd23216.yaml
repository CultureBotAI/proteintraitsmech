identifier: CDD:cd23216
label: "RNA-dependent RNA polymerase (RdRp) in the genus Aalivirus of positive-sense single-stranded RNA [(+)ssRNA] viruses, within the family Picornaviridae. This group contains the RdRp of RNA viruses belonging to the Aalivirus genus within the family Picornaviridae, order Picornavirales. Member viruses have a (+)ssRNA genome. Aalivirus is a new picornavirus found in ducks in China. It is most closely related to duck hepatitis A virus (genus Avihepatovirus) and to avisivirus A1 (genus Avisivirus). The name \"aalivirus\" is derived from Avihepatovirus/Avisivirus-like virus. RdRps are multi-domain proteins that play a pivotal role in enterovirus replication. RdRps catalyze RNA template-dependent formation of phosphodiester bonds between ribonucleotides in the presence of divalent metal ions. The initiation of synthesis occurs at the 3'-end of the template in a VPg-dependent manner and proceeds in the direction of 5'-3'. The active sites of RdRps are highly conserved in different species of picornaviruses. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
definition: >-
  RNA-dependent RNA polymerase (RdRp) in the genus Aalivirus of positive-sense single-stranded RNA [(+)ssRNA] viruses, within the family Picornaviridae. This group contains the RdRp of RNA viruses belonging to the Aalivirus genus within the family Picornaviridae, order Picornavirales. Member viruses have a (+)ssRNA genome. Aalivirus is a new picornavirus found in ducks in China. It is most closely related to duck hepatitis A virus (genus Avihepatovirus) and to avisivirus A1 (genus Avisivirus). The name "aalivirus" is derived from Avihepatovirus/Avisivirus-like virus. RdRps are multi-domain proteins that play a pivotal role in enterovirus replication. RdRps catalyze RNA template-dependent formation of phosphodiester bonds between ribonucleotides in the presence of divalent metal ions. The initiation of synthesis occurs at the 3'-end of the template in a VPg-dependent manner and proceeds in the direction of 5'-3'. The active sites of RdRps are highly conserved in different species of picornaviruses. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides. — an NCBI CDD conserved domain (cd23216); members share this curated model.
