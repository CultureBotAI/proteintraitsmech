identifier: CDD:cd18902
label: Ribosomal_S8
definition: >-
  Ribosomal small subunit protein S8, archea. Ribosomal protein S8 is highly conserved among the three kingdoms, Bacteria, Archaea and Eukarya. Archaeal ribosomes have an intermediate complexity compared with bacterial and eukaryotic ones, sharing several additional components of the translation machinery with eukaryotes that are absent in bacteria. Ribosomal protein S8 is a primary rRNA binding protein that plays a role in the assembly of the central domain and is required for subsequent binding of proteins S5 and S12
