identifier: CDD:cd22591
label: "Anti-CRISPR type II subtype A5. AcrIIA5 is an anti-CRISPR (Acr) protein which was discovered in a virulent phage infecting Streptococcus thermophilus which strongly inhibits diverse Cas9 homologs. AcrIIA5 adopts a novel fold preceded by an intrinsically disordered region (IDR), which is required for Cas9 inhibition by AcrIIA5. Truncation of the IDR led to a complete loss of its Acr activity, and the length and charge of the IDR modulate AcrIIA5 binding to Cas9. The CRISPR Cas9-based cytosine base editors (CBEs) and adenine base editors (ABEs) are capable of catalyzing C-G to T-A or A-T to G-C base pair conversions, respectively, and are promising tools for achieving precise genetic changes in a wide range of organisms; however, the recognition of cognate DNA sequences near their target sites can cause severe off-target effects that greatly limit their clinical applications. Anti-CRISPRs, may have use in ameliorating the off-target effects of base editing systems. Anti-CRISPRs, AcrIIA2, AcrIIA4, and AcrIIA5 efficiently inhibit base editing systems in human cells. In particular, AcrIIA5 could efficiently inhibit different base editor variant systems, and diminish the off-target events of the base editor (CBE and ABE); suggesting that AcrIIA5 may have wide use for the precise control of base editing and to thoroughly \"shut off\" nuclease activity of both CBE and ABE systems. Almost all type II Acr proteins characterized to date directly interact with the Cas9 endonuclease, although by distinct mechanisms. The type II CRISPR/Cas subtype has a distinct crRNA-guided surveillance complex encoded by cas9 (formerly csn1), cas1, cas2, and csn2 (for type IIA) or cas4 (for type IIB) genes, type II-Cs are generally characterized by the absence of both cas4 and csn2; these genes are all located in a single transcriptional unit directly upstream of the CRISPR locus. However, variants of type II-C systems have been identified in archaea that contain cas4, and have cas1, cas2, cas4 downstream of the CRISPR locus. Cleavage of the DNA target in type II systems is carried out by Cas9 which is an RNA-guided double-stranded DNase with two independent nuclease domains, HNH and RuvC. CRISPR-Cas immune systems are used by certain prokaryotes and archaea to resist the invasion of foreign nucleic acids such as phages or plasmids. Anti-CRISPRs are small proteins which are the natural inhibitors for CRISPR-Cas systems; encoded on bacterial and archaeal viruses, they allow the virus to evade host CRISPR-Cas systems. The CRISPR-Cas-mediated adaptive immune response can be divided into three steps, including the acquisition of spacer derived from invading nucleic acids, crRNA processing, and target degradation. Theoretically, Acr proteins could suppress any step to disrupt the CRISPR-Cas system. Acr proteins are diverse with no common sequence or structural motif, and they inhibit a wide range of CRISPR-Cas systems with various inhibition mechanisms. CRISPR-Cas systems are divided into two classes (1 and 2) and six types (class 1: types I, III and IV; class 2: types II, V and VI). Class 2 systems are characterized by effector modules that consist of a single multidomain protein, such as Cas9 in type II. Acr families are named for their type and subtype which are numbered sequentially as they are discovered."
definition: >-
  Anti-CRISPR type II subtype A5. AcrIIA5 is an anti-CRISPR (Acr) protein which was discovered in a virulent phage infecting Streptococcus thermophilus which strongly inhibits diverse Cas9 homologs. AcrIIA5 adopts a novel fold preceded by an intrinsically disordered region (IDR), which is required for Cas9 inhibition by AcrIIA5. Truncation of the IDR led to a complete loss of its Acr activity, and the length and charge of the IDR modulate AcrIIA5 binding to Cas9. The CRISPR Cas9-based cytosine base editors (CBEs) and adenine base editors (ABEs) are capable of catalyzing C-G to T-A or A-T to G-C base pair conversions, respectively, and are promising tools for achieving precise genetic changes in a wide range of organisms; however, the recognition of cognate DNA sequences near their target sites can cause severe off-target effects that greatly limit their clinical applications. Anti-CRISPRs, may have use in ameliorating the off-target effects of base editing systems. Anti-CRISPRs, AcrIIA2, AcrIIA4, and AcrIIA5 efficiently inhibit base editing systems in human cells. In particular, AcrIIA5 could efficiently inhibit different base editor variant systems, and diminish the off-target events of the base editor (CBE and ABE); suggesting that AcrIIA5 may have wide use for the precise control of base editing and to thoroughly "shut off" nuclease activity of both CBE and ABE systems. Almost all type II Acr proteins characterized to date directly interact with the Cas9 endonuclease, although by distinct mechanisms. The type II CRISPR/Cas subtype has a distinct crRNA-guided surveillance complex encoded by cas9 (formerly csn1), cas1, cas2, and csn2 (for type IIA) or cas4 (for type IIB) genes, type II-Cs are generally characterized by the absence of both cas4 and csn2; these genes are all located in a single transcriptional unit directly upstream of the CRISPR locus. However, variants of type II-C systems have been identified in archaea that contain cas4, and have cas1, cas2, cas4 downstream of the CRISPR locus. Cleavage of the DNA target in type II systems is carried out by Cas9 which is an RNA-guided double-stranded DNase with two independent nuclease domains, HNH and RuvC. CRISPR-Cas immune systems are used by certain prokaryotes and archaea to resist the invasion of foreign nucleic acids such as phages or plasmids. Anti-CRISPRs are small proteins which are the natural inhibitors for CRISPR-Cas systems; encoded on bacterial and archaeal viruses, they allow the virus to evade host CRISPR-Cas systems. The CRISPR-Cas-mediated adaptive immune response can be divided into three steps, including the acquisition of spacer derived from invading nucleic acids, crRNA processing, and target degradation. Theoretically, Acr proteins could suppress any step to disrupt the CRISPR-Cas system. Acr proteins are diverse with no common sequence or structural motif, and they inhibit a wide range of CRISPR-Cas systems with various inhibition mechanisms. CRISPR-Cas systems are divided into two classes (1 and 2) and six types (class 1: types I, III and IV; class 2: types II, V and VI). Class 2 systems are characterized by effector modules that consist of a single multidomain protein, such as Cas9 in type II. Acr families are named for their type and subtype which are numbered sequentially as they are discovered. — an NCBI CDD conserved domain (cd22591); members share this curated model.
