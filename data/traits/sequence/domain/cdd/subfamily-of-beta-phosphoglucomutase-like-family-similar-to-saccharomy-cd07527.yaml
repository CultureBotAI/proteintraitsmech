identifier: CDD:cd07527
label: "subfamily of beta-phosphoglucomutase-like family, similar to Saccharomyces cerevisiae DL-glycerol-3-phosphate phosphatase (GPP1p/ Rhr2p and GPP2p/HOR2p) and 2-deoxyglucose-6-phosphate phosphatase (DOG1p and DOG2p). This subfamily includes Saccharomyces cerevisiae DL-glycerol-3-phosphate phosphatase (GPP1p/ Rhr2p and GPP2p/HOR2p) and 2-deoxyglucose-6-phosphate phosphatase (DOG1p and DOG2p). GPP1p and GPP2p are involved in glycerol biosynthesis, GPP1 is induced in response to both anaerobic and hyperosmotic stress, GPP2 is induced in response to hyperosmotic or oxidative stress, and during diauxic shift; overexpression of DOG1 or DOG2 confers 2-deoxyglucose resistance. These belong to the beta-phosphoglucomutase-like family whose other members include Lactococcus lactis beta-PGM, a mutase which catalyzes the interconversion of beta-D-glucose 1-phosphate (G1P) and D-glucose 6-phosphate (G6P), and Escherichia coli 6-phosphogluconate phosphatase YieH. This family belongs to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases."
definition: >-
  subfamily of beta-phosphoglucomutase-like family, similar to Saccharomyces cerevisiae DL-glycerol-3-phosphate phosphatase (GPP1p/ Rhr2p and GPP2p/HOR2p) and 2-deoxyglucose-6-phosphate phosphatase (DOG1p and DOG2p). This subfamily includes Saccharomyces cerevisiae DL-glycerol-3-phosphate phosphatase (GPP1p/ Rhr2p and GPP2p/HOR2p) and 2-deoxyglucose-6-phosphate phosphatase (DOG1p and DOG2p). GPP1p and GPP2p are involved in glycerol biosynthesis, GPP1 is induced in response to both anaerobic and hyperosmotic stress, GPP2 is induced in response to hyperosmotic or oxidative stress, and during diauxic shift; overexpression of DOG1 or DOG2 confers 2-deoxyglucose resistance. These belong to the beta-phosphoglucomutase-like family whose other members include Lactococcus lactis beta-PGM, a mutase which catalyzes the interconversion of beta-D-glucose 1-phosphate (G1P) and D-glucose 6-phosphate (G6P), and Escherichia coli 6-phosphogluconate phosphatase YieH. This family belongs to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases. — an NCBI CDD conserved domain (cd07527); members share this curated model.
