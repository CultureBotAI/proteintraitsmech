identifier: CDD:cd12294
label: "RNA recognition motif in ribosomal RNA-processing protein 7 homolog A (Rrp7A) and similar proteins. This subfamily corresponds to the RRM of Rrp7A, also termed gastric cancer antigen Zg14, a homolog of yeast ribosomal RNA-processing protein 7 (Rrp7p), and mainly found in Metazoa. Rrp7p is an essential yeast protein involved in pre-rRNA processing and ribosome assembly, and is speculated to be required for correct assembly of rpS27 into the pre-ribosomal particle. In contrast, the cellular function of Rrp7A remains unclear currently. Rrp7A harbors an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), and a C-terminal Rrp7 domain."
definition: >-
  RNA recognition motif in ribosomal RNA-processing protein 7 homolog A (Rrp7A) and similar proteins. This subfamily corresponds to the RRM of Rrp7A, also termed gastric cancer antigen Zg14, a homolog of yeast ribosomal RNA-processing protein 7 (Rrp7p), and mainly found in Metazoa. Rrp7p is an essential yeast protein involved in pre-rRNA processing and ribosome assembly, and is speculated to be required for correct assembly of rpS27 into the pre-ribosomal particle. In contrast, the cellular function of Rrp7A remains unclear currently. Rrp7A harbors an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), and a C-terminal Rrp7 domain. — an NCBI CDD conserved domain (cd12294); members share this curated model.
