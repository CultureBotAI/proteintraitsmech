identifier: CDD:cd18040
label: "C-terminal DEXX-box helicase domain of HELZ2. Helicase with zinc finger 2 (HELZ2, also known as PPAR-alpha-interacting complex protein 285 or PRIC285 and PPAR-gamma DBD-interacting protein 1 or PDIP1) acts as a transcriptional coactivator for a number of nuclear receptors including PPARA, PPARG, THRA, THRB and RXRA. It belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  C-terminal DEXX-box helicase domain of HELZ2. Helicase with zinc finger 2 (HELZ2, also known as PPAR-alpha-interacting complex protein 285 or PRIC285 and PPAR-gamma DBD-interacting protein 1 or PDIP1) acts as a transcriptional coactivator for a number of nuclear receptors including PPARA, PPARG, THRA, THRB and RXRA. It belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd18040); members share this curated model.
