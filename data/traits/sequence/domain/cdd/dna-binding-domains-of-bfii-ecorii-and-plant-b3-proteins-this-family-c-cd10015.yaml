identifier: CDD:cd10015
label: "DNA binding domains of BfiI, EcoRII and plant B3 proteins. This family contains the N-terminal DNA binding domain of type IIE restriction endonuclease EcoRII-like proteins, the C-terminal DNA binding  domain of type IIS restriction endonuclease BfiI-like proteins and plant-specific B3 proteins. Type II restriction endonucleases are components of restriction modification (RM) systems that protect bacteria and archaea against invading foreign DNA. They usually function as homodimers or homotetramers that cleave DNA at defined sites of 4 to 8 bp in length, and they require Mg2+, not ATP or GTP, for catalysis. EcoRII is specific for the 5'-CCWGG sequence (W stands for A or T). EcoRII consists of 2 domains, the C-terminal catalytic/dimerization domain (EcoRII-C), and the N-terminal effector DNA binding domain (EcoRII-N). BfiI is unique in cleaving DNA at fixed positions downstream of an asymmetric sequence in the absence of Mg2+. BfiI consists of two discrete domains with distinct functions: an N-terminal catalytic domain with non-specific nuclease activity and dimerization function that is more closely related to Nuc, an EDTA-resistant nuclease from the phospholipase D (PLD) superfamily; and a C-terminal domain that specifically recognizes its target sequences, 5'-ACTGGG-3'. B3 proteins are a family of plant-specific transcription factors, involved in a great variety of processes, including seed development and auxin response."
definition: >-
  DNA binding domains of BfiI, EcoRII and plant B3 proteins. This family contains the N-terminal DNA binding domain of type IIE restriction endonuclease EcoRII-like proteins, the C-terminal DNA binding domain of type IIS restriction endonuclease BfiI-like proteins and plant-specific B3 proteins. Type II restriction endonucleases are components of restriction modification (RM) systems that protect bacteria and archaea against invading foreign DNA. They usually function as homodimers or homotetramers that cleave DNA at defined sites of 4 to 8 bp in length, and they require Mg2+, not ATP or GTP, for catalysis. EcoRII is specific for the 5'-CCWGG sequence (W stands for A or T). EcoRII consists of 2 domains, the C-terminal catalytic/dimerization domain (EcoRII-C), and the N-terminal effector DNA binding domain (EcoRII-N). BfiI is unique in cleaving DNA at fixed positions downstream of an asymmetric sequence in the absence of Mg2+. BfiI consists of two discrete domains with distinct functions: an N-terminal catalytic domain with non-specific nuclease activity and dimerization function that is more closely related to Nuc, an EDTA-resistant nuclease from the phospholipase D (PLD) superfamily; and a C-terminal domain that specifically recognizes its target sequences, 5'-ACTGGG-3'. B3 proteins are a family of plant-specific transcription factors, involved in a great variety of processes, including seed development and auxin response. — an NCBI CDD conserved domain (cd10015); members share this curated model.
