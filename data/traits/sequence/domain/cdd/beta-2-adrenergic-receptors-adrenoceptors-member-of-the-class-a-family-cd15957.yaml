identifier: CDD:cd15957
label: "beta-2 adrenergic receptors (adrenoceptors), member of the class A family of seven-transmembrane G protein-coupled receptors. Beta-2 AR is activated by adrenaline that plays important roles in cardiac function and pulmonary physiology. While beta-1 AR and beta-2 AR are the major subtypes involved in modulating cardiac contractility and heart rate by positively stimulating the G(s) protein-adenylate cyclase-cAMP-PKA signaling pathway, beta-2 AR can couple to both G(s) and G(i) proteins in the heart. Moreover, beta-2 AR activation leads to smooth muscle relaxation and bronchodilation in the lung. The beta adrenergic receptors are a subfamily of the class A rhodopsin-like G protein-coupled receptors."
definition: >-
  beta-2 adrenergic receptors (adrenoceptors), member of the class A family of seven-transmembrane G protein-coupled receptors. Beta-2 AR is activated by adrenaline that plays important roles in cardiac function and pulmonary physiology. While beta-1 AR and beta-2 AR are the major subtypes involved in modulating cardiac contractility and heart rate by positively stimulating the G(s) protein-adenylate cyclase-cAMP-PKA signaling pathway, beta-2 AR can couple to both G(s) and G(i) proteins in the heart. Moreover, beta-2 AR activation leads to smooth muscle relaxation and bronchodilation in the lung. The beta adrenergic receptors are a subfamily of the class A rhodopsin-like G protein-coupled receptors. — an NCBI CDD conserved domain (cd15957); members share this curated model.
