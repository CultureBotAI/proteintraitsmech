identifier: CDD:cd16979
label: "VHS (Vps27/Hrs/STAM) domain of Vacuolar protein sorting-associated protein 27. Vacuolar protein sorting-associated protein 27 (Vps27 or Vps27p) is also called Golgi retention defective protein 11, and is the yeast homolog of Hrs (Hepatocyte growth factor-regulated tyrosine kinase substrate). Together with class E vacuolar protein-sorting machinery protein HSE1, it comprises the ESCRT-0 complex, the sorting receptor for ubiquitinated cargo proteins at the multivesicular body (MVB). The complex directly binds to ubiquitinated transmembrane proteins and recruits both ubiquitin ligases and deubiquitinating enzymes. It is also required the efficient recycling of late Golgi proteins including the carboxypeptidase Y (CPY) sorting receptor, Vps10. Vps27 contain similar domains and motifs to Hrs; it contains an N-terminal VHS domain, which has a superhelical structure similar to the structure of ARM (Armadillo) repeats, a FYVE (Fab1p, YOTB, Vac1p, and EEA1) zinc finger domain, two Ubiquitin-Interacting Motifs (UIMs), a GAT (GGA and TOM) domain, two a P(S/T)XP motifs that recruit ESCRT-I, and a short peptide motif near the C-terminus that recruits clathrin."
definition: >-
  VHS (Vps27/Hrs/STAM) domain of Vacuolar protein sorting-associated protein 27. Vacuolar protein sorting-associated protein 27 (Vps27 or Vps27p) is also called Golgi retention defective protein 11, and is the yeast homolog of Hrs (Hepatocyte growth factor-regulated tyrosine kinase substrate). Together with class E vacuolar protein-sorting machinery protein HSE1, it comprises the ESCRT-0 complex, the sorting receptor for ubiquitinated cargo proteins at the multivesicular body (MVB). The complex directly binds to ubiquitinated transmembrane proteins and recruits both ubiquitin ligases and deubiquitinating enzymes. It is also required the efficient recycling of late Golgi proteins including the carboxypeptidase Y (CPY) sorting receptor, Vps10. Vps27 contain similar domains and motifs to Hrs; it contains an N-terminal VHS domain, which has a superhelical structure similar to the structure of ARM (Armadillo) repeats, a FYVE (Fab1p, YOTB, Vac1p, and EEA1) zinc finger domain, two Ubiquitin-Interacting Motifs (UIMs), a GAT (GGA and TOM) domain, two a P(S/T)XP motifs that recruit ESCRT-I, and a short peptide motif near the C-terminus that recruits clathrin. — an NCBI CDD conserved domain (cd16979); members share this curated model.
