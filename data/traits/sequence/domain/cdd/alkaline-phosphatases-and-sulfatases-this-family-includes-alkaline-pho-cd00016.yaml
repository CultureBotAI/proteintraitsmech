identifier: CDD:cd00016
label: "alkaline phosphatases and sulfatases. This family includes alkaline phosphatases and sulfatases. Alkaline phosphatases are non-specific phosphomonoesterases that catalyze the hydrolysis reaction via a phosphoseryl intermediate to produce inorganic phosphate and the corresponding alcohol, optimally at high pH. Alkaline phosphatase exists as a dimer, each monomer binding 2 zinc atoms and one magnesium atom, which are essential for enzymatic activity. Sulfatases catalyze the hydrolysis of sulfate esters from wide range of substrates, including steroids, carbohydrates and proteins. Sulfate esters may be formed from various alcohols and amines. The biological roles of sulfatase includes the cycling of sulfur in the environment, in the degradation of sulfated glycosaminoglycans and glycolipids in the lysosome, and in remodeling sulfated glycosaminoglycans in the extracellular space. Both alkaline phosphatase and sulfatase are essential for human metabolism. Deficiency of individual enzyme cause genetic diseases."
