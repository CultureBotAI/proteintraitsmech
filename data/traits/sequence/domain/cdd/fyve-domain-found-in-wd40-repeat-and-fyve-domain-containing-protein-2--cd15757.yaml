identifier: CDD:cd15757
label: "FYVE domain found in WD40 repeat and FYVE domain-containing protein 2 (WDFY2). WDFY2, also termed zinc finger FYVE domain-containing protein 22, or ProF (propeller-FYVE protein), is a phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) binding protein that is localized to a distinct subset of early endosomes close to the plasma membrane. It interacts preferentially with endogenous serine/threonine kinase Akt2, but not Akt1, and plays a specific role in modulating signaling through Akt downstream of the interaction of this kinase with the endosomal proteins APPL (adaptor protein containing PH domain, PTB domain, and leucine zipper motif). In addition to Akt, WDFY2 serves as a binding partner for protein kinase C, zeta (PRKCZ), and its substrate vesicle-associated membrane protein 2 (VAMP2), and is involved in vesicle cycling in various secretory pathways. Moreover, Silencing of WDFY2 by siRNA produces a strong inhibition of endocytosis. WDFY2 contains WD40 motifs and a FYVE domain."
definition: >-
  FYVE domain found in WD40 repeat and FYVE domain-containing protein 2 (WDFY2). WDFY2, also termed zinc finger FYVE domain-containing protein 22, or ProF (propeller-FYVE protein), is a phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) binding protein that is localized to a distinct subset of early endosomes close to the plasma membrane. It interacts preferentially with endogenous serine/threonine kinase Akt2, but not Akt1, and plays a specific role in modulating signaling through Akt downstream of the interaction of this kinase with the endosomal proteins APPL (adaptor protein containing PH domain, PTB domain, and leucine zipper motif). In addition to Akt, WDFY2 serves as a binding partner for protein kinase C, zeta (PRKCZ), and its substrate vesicle-associated membrane protein 2 (VAMP2), and is involved in vesicle cycling in various secretory pathways. Moreover, Silencing of WDFY2 by siRNA produces a strong inhibition of endocytosis. WDFY2 contains WD40 motifs and a FYVE domain. — an NCBI CDD conserved domain (cd15757); members share this curated model.
