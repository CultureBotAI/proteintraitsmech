identifier: CDD:cd16660
label: "U-box domain, a modified RING finger, found in RING finger protein 37 (RNF37). RNF37, also known as KIAA0860, U-box domain-containing protein 5 (UBOX5), UbcM4-interacting protein 5 (UIP5), or ubiquitin-conjugating enzyme 7-interacting protein 5, is an E3 ubiquitin-protein ligase found exclusively in the nucleus as part of a nuclear dot-like structure. It interacts with the molecular chaperone VCP/p97 protein. RNF37 contains a U-box domain followed by a potential nuclear location signal (NLS), and a C-terminal C3HC4-type RING-HC finger. The U-box domain is a modified RING finger domain that lacks the hallmark metal-chelating cysteines and histidines of the latter, but is likely to adopt a RING finger-like conformation. The presence of the U-box, but not of the RING finger, is required for the E3 activity. The U-box domain can directly interact with several E2 enzymes, including UbcM2, UbcM3, UbcM4, UbcH5, and UbcH8, suggesting a similar function as the RING finger in the ubiquitination pathway. This model corresponds to the U-box domain."
definition: >-
  U-box domain, a modified RING finger, found in RING finger protein 37 (RNF37). RNF37, also known as KIAA0860, U-box domain-containing protein 5 (UBOX5), UbcM4-interacting protein 5 (UIP5), or ubiquitin-conjugating enzyme 7-interacting protein 5, is an E3 ubiquitin-protein ligase found exclusively in the nucleus as part of a nuclear dot-like structure. It interacts with the molecular chaperone VCP/p97 protein. RNF37 contains a U-box domain followed by a potential nuclear location signal (NLS), and a C-terminal C3HC4-type RING-HC finger. The U-box domain is a modified RING finger domain that lacks the hallmark metal-chelating cysteines and histidines of the latter, but is likely to adopt a RING finger-like conformation. The presence of the U-box, but not of the RING finger, is required for the E3 activity. The U-box domain can directly interact with several E2 enzymes, including UbcM2, UbcM3, UbcM4, UbcH5, and UbcH8, suggesting a similar function as the RING finger in the ubiquitination pathway. This model corresponds to the U-box domain. — an NCBI CDD conserved domain (cd16660); members share this curated model.
