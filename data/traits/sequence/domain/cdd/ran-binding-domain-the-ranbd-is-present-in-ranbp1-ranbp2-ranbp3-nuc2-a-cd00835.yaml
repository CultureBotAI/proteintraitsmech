identifier: CDD:cd00835
label: "Ran-binding domain. The RanBD is present in RanBP1, RanBP2, RanBP3, Nuc2, and Nuc50. Most of these proteins have a single RanBD, with the exception of RanBP2 which has 4 RanBDs. Ran is a Ras-like nuclear small GTPase, which regulates receptor-mediated transport between the nucleus and the cytoplasm. RanGTP hydrolysis is stimulated by RanGAP together with the Ran-binding domain containing acessory proteins RanBP1 and RanBP2. These accessory proteins stabilize the active GTP-bound form of Ran. The Ran-binding domain is found in multiple copies in Nuclear pore complex proteins. RabBD shares structural similarity to the PH domain, but lacks detectable sequence similarity. The RanBD proteins of the nuclear pore complex (NPC): nucleoporin 1 (NUP1), NUP2, NUP61, and Nuclear Pore complex Protein 9 (npp-9) are present in the parent, but specific models were not made due to lineage. To date there been no reports of inositol phosphate or phosphoinositide binding by Ran-binding proteins."
definition: >-
  Ran-binding domain. The RanBD is present in RanBP1, RanBP2, RanBP3, Nuc2, and Nuc50. Most of these proteins have a single RanBD, with the exception of RanBP2 which has 4 RanBDs. Ran is a Ras-like nuclear small GTPase, which regulates receptor-mediated transport between the nucleus and the cytoplasm. RanGTP hydrolysis is stimulated by RanGAP together with the Ran-binding domain containing acessory proteins RanBP1 and RanBP2. These accessory proteins stabilize the active GTP-bound form of Ran. The Ran-binding domain is found in multiple copies in Nuclear pore complex proteins. RabBD shares structural similarity to the PH domain, but lacks detectable sequence similarity. The RanBD proteins of the nuclear pore complex (NPC): nucleoporin 1 (NUP1), NUP2, NUP61, and Nuclear Pore complex Protein 9 (npp-9) are present in the parent, but specific models were not made due to lineage. To date there been no reports of inositol phosphate or phosphoinositide binding by Ran-binding proteins. — an NCBI CDD conserved domain (cd00835); members share this curated model.
