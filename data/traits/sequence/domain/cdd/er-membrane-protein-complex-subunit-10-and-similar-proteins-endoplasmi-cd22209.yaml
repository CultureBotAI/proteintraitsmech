identifier: CDD:cd22209
label: "ER membrane protein complex subunit 10 and similar proteins. Endoplasmic reticulum (ER) membrane protein complex subunit 10 (EMC10), also called hematopoietic signal peptide-containing membrane domain-containing protein 1 (HSM1) or INM02, is a bone marrow-derived angiogenic growth factor promoting angiogenesis and tissue repair in the heart after myocardial infarction. It stimulates cardiac endothelial cell migration and outgrowth via the activation of p38 MAPK, PAK, and MAPK2 signaling pathways. Yeast EMC10 is a non-essential component of the ER membrane protein complex (EMC), which may be involved in ER-associated degradation (ERAD) and proper assembly of multi-pass transmembrane proteins."
