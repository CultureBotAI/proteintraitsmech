identifier: CDD:cd18224
label: BTB_POZ_ZBTB39
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 39 (ZBTB39). ZBTB39 may be involved in transcriptional regulation. Its specific function is as yet unknown. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids
