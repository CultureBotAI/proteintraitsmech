identifier: CDD:cd08186
label: "Iron-containing alcohol dehydrogenase. This family contains iron-containing alcohol dehydrogenase (ADH) which catalyzes the reduction of acetaldehyde to alcohol with NADP as cofactor. The ADH of hyperthermophilic archaeon Thermococcus hydrothermalis oxidizes a series of primary aliphatic and aromatic alcohols, preferentially from C2 to C8, but is also active towards methanol and glycerol, and is stereospecific for monoterpenes. It has been suggested that the type III ADHs in microorganisms are involved in acetaldehyde detoxication rather than in alcohol turnover."
definition: >-
  Iron-containing alcohol dehydrogenase. This family contains iron-containing alcohol dehydrogenase (ADH) which catalyzes the reduction of acetaldehyde to alcohol with NADP as cofactor. The ADH of hyperthermophilic archaeon Thermococcus hydrothermalis oxidizes a series of primary aliphatic and aromatic alcohols, preferentially from C2 to C8, but is also active towards methanol and glycerol, and is stereospecific for monoterpenes. It has been suggested that the type III ADHs in microorganisms are involved in acetaldehyde detoxication rather than in alcohol turnover. — an NCBI CDD conserved domain (cd08186); members share this curated model.
