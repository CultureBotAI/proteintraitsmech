identifier: CDD:cd10280
label: "Membrane-bound PQQ-dependent glucose dehydrogenase. This bacterial subfamily of enzymes belongs to the dehydrogenase family with pyrroloquinoline quinone (PQQ) as cofactor, and is the only subfamily that is bound to the membrane. Glucose dehydrogenase converts D-glucose to D-glucono-1,5-lactone in a reaction that is coupled with the respiratory chain in the periplasmic oxidation of sugars and alcohols in gram-negative bacteria. Ubiquinone functions as the electron acceptor. The alignment model contains an 8-bladed beta-propeller."
definition: >-
  Membrane-bound PQQ-dependent glucose dehydrogenase. This bacterial subfamily of enzymes belongs to the dehydrogenase family with pyrroloquinoline quinone (PQQ) as cofactor, and is the only subfamily that is bound to the membrane. Glucose dehydrogenase converts D-glucose to D-glucono-1,5-lactone in a reaction that is coupled with the respiratory chain in the periplasmic oxidation of sugars and alcohols in gram-negative bacteria. Ubiquinone functions as the electron acceptor. The alignment model contains an 8-bladed beta-propeller. — an NCBI CDD conserved domain (cd10280); members share this curated model.
