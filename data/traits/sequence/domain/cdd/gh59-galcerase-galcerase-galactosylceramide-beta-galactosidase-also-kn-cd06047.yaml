identifier: CDD:cd06047
label: GH59_GALCERase
definition: >-
  GH59_GALCERase. GALCERase (galactosylceramide beta-galactosidase), also known as galactocerebrosidase, galactosylceramidase, or GALC is a lysosomal enzyme that catalyzes the breakdown of galactocerebroside. Globoid cell leukodystrophy (GLD) or Krabbe's disease (KD), is an autosomal recessive disorder caused by a generalized deficiency of this enzyme. The failure to degrade galactocerebroside in oligodendrocytes and Schwann cells leads to the death of these myelinating cells, progressive demyelination, and the early demise of GLD patients. The twitcher mutant mouse, the animal model of Krabbe disease, is characterized by a deficiency of GALCERase activity. GALCERase belongs to glycosyl hydrolase family 59 (GH59). GH59 and GH30 are highly sequence-similar
