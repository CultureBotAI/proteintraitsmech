identifier: CDD:cd05411
label: "Nucleotidyltransferase (NT) domain of Aquifex aeolicus A-adding enzyme, class II, and related proteins. NT_AqaAase_like:  Aquifex aeolicus A-adding enzyme [ATP tRNA nucleotidyltransferase, AqaAase]-like, class II. AqaAase in a template-independent reaction adds adenosine (A), onto the 3prime end of tRNA lacking a terminal A. This subgroup includes proteins similar to AqaAse including Synechocystis sp. and Deinococcus radiodurans Aases. In these ancient and slow evolving bacteria Aases and CC-adding enzymes collaborate to add CCA to tRNAs. These proteins are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group."
definition: >-
  Nucleotidyltransferase (NT) domain of Aquifex aeolicus A-adding enzyme, class II, and related proteins. NT_AqaAase_like: Aquifex aeolicus A-adding enzyme [ATP tRNA nucleotidyltransferase, AqaAase]-like, class II. AqaAase in a template-independent reaction adds adenosine (A), onto the 3prime end of tRNA lacking a terminal A. This subgroup includes proteins similar to AqaAse including Synechocystis sp. and Deinococcus radiodurans Aases. In these ancient and slow evolving bacteria Aases and CC-adding enzymes collaborate to add CCA to tRNAs. These proteins are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. — an NCBI CDD conserved domain (cd05411); members share this curated model.
