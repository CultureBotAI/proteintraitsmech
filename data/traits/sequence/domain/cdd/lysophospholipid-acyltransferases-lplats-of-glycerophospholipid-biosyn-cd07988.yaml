identifier: CDD:cd07988
label: "Lysophospholipid Acyltransferases (LPLATs) of Glycerophospholipid Biosynthesis: Unknown ABO13168. Lysophospholipid acyltransferase (LPLAT) superfamily member: acyltransferases of de novo and remodeling pathways of glycerophospholipid biosynthesis which catalyze the incorporation of an acyl group from either acylCoAs or acyl-acyl carrier proteins (acylACPs) into acceptors such as glycerol 3-phosphate, dihydroxyacetone phosphate or lyso-phosphatidic acid. Included in this subgroup are uncharacterized phospholipid/glycerol acyltransferases such as the Acinetobacter baumannii ATCC 17978 locus ABO13168 putative acyltransferase, and similar proteins."
definition: >-
