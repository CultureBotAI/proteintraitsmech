identifier: CDD:cd12029
label: "Src Homology 3 domain of Disks Large homolog 3. DLG3, also called synapse-associated protein 102 (SAP102), is a scaffolding protein that clusters at synapses and plays an important role in synaptic development and plasticity. Mutations in DLG3 cause midgestational embryonic lethality in mice and may be associated with nonsyndromic X-linked mental retardation in humans. It interacts with the NEDD4 (neural precursor cell-expressed developmentally downregulated 4) family of ubiquitin ligases and promotes apical tight junction formation. DLG3 is a member of the MAGUK (membrane-associated guanylate kinase) protein family, which is characterized by the presence of a core of three domains: PDZ, SH3, and guanylate kinase (GuK). The GuK domain in MAGUK proteins is enzymatically inactive; instead, the domain mediates protein-protein interactions and associates intramolecularly with the SH3 domain. DLG3 contains three PDZ domains. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Disks Large homolog 3. DLG3, also called synapse-associated protein 102 (SAP102), is a scaffolding protein that clusters at synapses and plays an important role in synaptic development and plasticity. Mutations in DLG3 cause midgestational embryonic lethality in mice and may be associated with nonsyndromic X-linked mental retardation in humans. It interacts with the NEDD4 (neural precursor cell-expressed developmentally downregulated 4) family of ubiquitin ligases and promotes apical tight junction formation. DLG3 is a member of the MAGUK (membrane-associated guanylate kinase) protein family, which is characterized by the presence of a core of three domains: PDZ, SH3, and guanylate kinase (GuK). The GuK domain in MAGUK proteins is enzymatically inactive; instead, the domain mediates protein-protein interactions and associates intramolecularly with the SH3 domain. DLG3 contains three PDZ domains. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12029); members share this curated model.
