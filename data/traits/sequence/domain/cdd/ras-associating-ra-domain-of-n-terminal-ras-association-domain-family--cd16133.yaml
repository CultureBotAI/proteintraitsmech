identifier: CDD:cd16133
label: "Ras-associating (RA) domain of N-terminal Ras-association domain family 9 (RASSF9). RASSF9, also termed PAM COOH-terminal interactor protein 1 (P-CIP1), or peptidylglycine alpha-amidating monooxygenase COOH-terminal interactor, is a member of N-terminus RASSF7-10 protein family. RASSF7-10 has an RA domain at the N-terminus and lacks a conserved SARAH (Salvador/RASSF/Hpo) motif adjacent to the RA domain that is found in members of the RASSF1-6 family. The RA domain of the N-terminal RASSF proteins family has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. RASSF9 was formerly known as PAM COOH-terminal interactor-1 (P-CIP1) because of its interaction with peptidylglycine alpha-amidating mono-oxygenase (PAM) and possibility of its role in regulating the trafficking of integral membrane PAM. RASSF9 is widely expressed in multiple organs such as testis, kidney, skeletal muscle, liver, lung, brain, and heart. Cloned RASSF9 showed preferential binding to N-Ras and K-Ras."
definition: >-
  Ras-associating (RA) domain of N-terminal Ras-association domain family 9 (RASSF9). RASSF9, also termed PAM COOH-terminal interactor protein 1 (P-CIP1), or peptidylglycine alpha-amidating monooxygenase COOH-terminal interactor, is a member of N-terminus RASSF7-10 protein family. RASSF7-10 has an RA domain at the N-terminus and lacks a conserved SARAH (Salvador/RASSF/Hpo) motif adjacent to the RA domain that is found in members of the RASSF1-6 family. The RA domain of the N-terminal RASSF proteins family has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. RASSF9 was formerly known as PAM COOH-terminal interactor-1 (P-CIP1) because of its interaction with peptidylglycine alpha-amidating mono-oxygenase (PAM) and possibility of its role in regulating the trafficking of integral membrane PAM. RASSF9 is widely expressed in multiple organs such as testis, kidney, skeletal muscle, liver, lung, brain, and heart. Cloned RASSF9 showed preferential binding to N-Ras and K-Ras. — an NCBI CDD conserved domain (cd16133); members share this curated model.
