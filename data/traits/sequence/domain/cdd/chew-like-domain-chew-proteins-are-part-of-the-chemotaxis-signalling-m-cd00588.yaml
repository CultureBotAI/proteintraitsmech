identifier: CDD:cd00588
label: "CheW-like domain. CheW proteins are part of the chemotaxis signalling mechanism in bacteria. CheW interacts with the methyl accepting chemotaxis proteins (MCPs) and relays signals to CheY, which affects flageller rotation. This family includes CheW and other related proteins that are involved in chemotaxis. The CheW-like regulatory domain in the chemotaxis associated histidine kinase CheA binds to CheW, suggesting that these domains can interact with each other."
definition: >-
  CheW-like domain. CheW proteins are part of the chemotaxis signalling mechanism in bacteria. CheW interacts with the methyl accepting chemotaxis proteins (MCPs) and relays signals to CheY, which affects flageller rotation. This family includes CheW and other related proteins that are involved in chemotaxis. The CheW-like regulatory domain in the chemotaxis associated histidine kinase CheA binds to CheW, suggesting that these domains can interact with each other. — an NCBI CDD conserved domain (cd00588); members share this curated model.
