identifier: CDD:cd06173
label: "Macrolide efflux protein A and similar proteins of the Major Facilitator Superfamily of transporters. This family is composed of Streptococcus pyogenes macrolide efflux protein A (MefA) and similar transporters, many of which remain uncharacterized. Some members may be multidrug resistance (MDR) transporters, which are drug/H+ antiporters (DHAs) that mediate the efflux of a variety of drugs and toxic compounds, conferring resistance to these compounds. MefA confers resistance to 14-membered macrolides including erythromycin and to 15-membered macrolides. It functions as an efflux pump to regulate intracellular macrolide levels. The MefA-like family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
