identifier: CDD:cd09161
label: "Putative catalytic domain, repeat 2, of Pseudomonas aeruginosa cardiolipin synthase and similar proteins. Putative catalytic domain, repeat 2, of Pseudomonas aeruginosa cardiolipin (CL) synthase (PaCLS) and similar proteins. Although PaCLS and similar proteins have not been functionally characterized, members in this subfamily show high sequence homology to bacterial CL synthases, which catalyze the reversible phosphatidyl group transfer between two phosphatidylglycerol molecules to form CL and glycerol. Moreover, PaCLS and other members of this subfamily contain two HKD motifs (H-x-K-x(4)-D, where x represents any amino acid residue) that characterizes the phospholipase D (PLD) superfamily. The two motifs may be part of the active site and may be involved in phosphatidyl group transfer."
definition: >-
