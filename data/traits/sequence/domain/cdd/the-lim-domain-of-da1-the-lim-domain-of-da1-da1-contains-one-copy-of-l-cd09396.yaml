identifier: CDD:cd09396
label: "The Lim domain of DA1. The Lim domain of DA1: DA1 contains one copy of LIM domain and a domain of unknown function. DA1 is predicted as an ubiquitin receptor, which sets final seed and organ size by restricting the period of cell proliferation. The LIM domain is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein."
definition: >-
  The Lim domain of DA1. The Lim domain of DA1: DA1 contains one copy of LIM domain and a domain of unknown function. DA1 is predicted as an ubiquitin receptor, which sets final seed and organ size by restricting the period of cell proliferation. The LIM domain is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein. — an NCBI CDD conserved domain (cd09396); members share this curated model.
