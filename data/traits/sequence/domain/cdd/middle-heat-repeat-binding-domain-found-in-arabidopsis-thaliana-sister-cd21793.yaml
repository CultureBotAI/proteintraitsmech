identifier: CDD:cd21793
label: "Middle HEAT-repeat binding domain found in Arabidopsis thaliana sister chromatid cohesion 1 protein 1-4 (SYN1-4) and similar proteins. The family includes a group of plant chromosome cohesin proteins from the Rad21/Rec8 family, such as SYN1-4. SYN1, also called protein DETERMINATE INFERTILE 1 (DIF1), or SCC1 homolog 1, is involved in chromosome condensation, pairing, and segregation during meiosis. It is also responsible for cohesion between replicated sister chromatids. SYN4, also called AtRAD21-3, or AtRAD21.3, is involved in sister chromatid and centromere cohesion during mitosis. Similarly, SYN2 (also called SCC1 homolog 2, or AtRAD21-1) and SYN3 (also called SCC1 homolog 3, or AtRAD21-2) may also be involved in sister chromatid cohesion during mitosis. This model corresponds to a small region in the middle of SYN1-4 that shows high sequence similarity with the HEAT-repeat binding domain found in both the middle of Saccharomyces cerevisiae sister chromatid cohesion protein 1 (ScScc1p) and Homo sapiens nuclear matrix protein 1 (NXP-1), which consists of short helices and two long extended segments."
definition: >-
  Middle HEAT-repeat binding domain found in Arabidopsis thaliana sister chromatid cohesion 1 protein 1-4 (SYN1-4) and similar proteins. The family includes a group of plant chromosome cohesin proteins from the Rad21/Rec8 family, such as SYN1-4. SYN1, also called protein DETERMINATE INFERTILE 1 (DIF1), or SCC1 homolog 1, is involved in chromosome condensation, pairing, and segregation during meiosis. It is also responsible for cohesion between replicated sister chromatids. SYN4, also called AtRAD21-3, or AtRAD21.3, is involved in sister chromatid and centromere cohesion during mitosis. Similarly, SYN2 (also called SCC1 homolog 2, or AtRAD21-1) and SYN3 (also called SCC1 homolog 3, or AtRAD21-2) may also be involved in sister chromatid cohesion during mitosis. This model corresponds to a small region in the middle of SYN1-4 that shows high sequence similarity with the HEAT-repeat binding domain found in both the middle of Saccharomyces cerevisiae sister chromatid cohesion protein 1 (ScScc1p) and Homo sapiens nuclear matrix protein 1 (NXP-1), which consists of short helices and two long extended segments. — an NCBI CDD conserved domain (cd21793); members share this curated model.
