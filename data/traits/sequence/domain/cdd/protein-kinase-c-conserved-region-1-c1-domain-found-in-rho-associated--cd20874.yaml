identifier: CDD:cd20874
label: "protein kinase C conserved region 1 (C1 domain) found in Rho-associated coiled-coil containing protein kinase 1 (ROCK1) and similar proteins. ROCK1 is a serine/threonine kinase, catalyzing the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. ROCK1, also called Rho-associated protein kinase 1, renal carcinoma antigen NY-REN-35, Rho-associated, coiled-coil-containing protein kinase I (ROCK-I), p160 ROCK-1, or p160ROCK, is preferentially expressed in the liver, lung, spleen, testes, and kidney. It mediates signaling from Rho to the actin cytoskeleton. It is implicated in the development of cardiac fibrosis, cardiomyocyte apoptosis, and hyperglycemia. Mice deficient with ROCK1 display eyelids open at birth (EOB) and omphalocele phenotypes due to the disorganization of actin filaments in the eyelids and the umbilical ring. ROCK proteins contain an N-terminal extension, a catalytic kinase domain, and a C-terminal extension, which contains a coiled-coil region encompassing a Rho-binding domain (RBD), a pleckstrin homology (PH) domain and a C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in Rho-associated coiled-coil containing protein kinase 1 (ROCK1) and similar proteins. ROCK1 is a serine/threonine kinase, catalyzing the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. ROCK1, also called Rho-associated protein kinase 1, renal carcinoma antigen NY-REN-35, Rho-associated, coiled-coil-containing protein kinase I (ROCK-I), p160 ROCK-1, or p160ROCK, is preferentially expressed in the liver, lung, spleen, testes, and kidney. It mediates signaling from Rho to the actin cytoskeleton. It is implicated in the development of cardiac fibrosis, cardiomyocyte apoptosis, and hyperglycemia. Mice deficient with ROCK1 display eyelids open at birth (EOB) and omphalocele phenotypes due to the disorganization of actin filaments in the eyelids and the umbilical ring. ROCK proteins contain an N-terminal extension, a catalytic kinase domain, and a C-terminal extension, which contains a coiled-coil region encompassing a Rho-binding domain (RBD), a pleckstrin homology (PH) domain and a C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20874); members share this curated model.
