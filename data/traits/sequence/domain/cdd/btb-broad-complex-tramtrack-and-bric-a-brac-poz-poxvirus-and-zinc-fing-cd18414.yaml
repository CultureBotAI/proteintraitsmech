identifier: CDD:cd18414
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium voltage-gated channel subfamily C members KCNC1 and KCNC3. KCNC1 (also called NGK2, voltage-gated potassium channel subunit Kv3.1, or voltage-gated potassium channel subunit Kv4) and KCNC3 (also called KSHIIID or voltage-gated potassium channel subunit Kv3.3) play important roles in the rapid repolarization of fast-firing brain neurons. Assuming opened or closed conformations in response to the voltage difference across the membrane, the proteins form tetrameric potassium-selective channels through which potassium ions may pass in accordance with their electrochemical gradient. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. KCNC1 and KCNC3 are alpha subunit that form functional homo- or hetero-tetrameric channels (with other alpha subunits) through their BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium voltage-gated channel subfamily C members KCNC1 and KCNC3. KCNC1 (also called NGK2, voltage-gated potassium channel subunit Kv3.1, or voltage-gated potassium channel subunit Kv4) and KCNC3 (also called KSHIIID or voltage-gated potassium channel subunit Kv3.3) play important roles in the rapid repolarization of fast-firing brain neurons. Assuming opened or closed conformations in response to the voltage difference across the membrane, the proteins form tetrameric potassium-selective channels through which potassium ions may pass in accordance with their electrochemical gradient. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. KCNC1 and KCNC3 are alpha subunit that form functional homo- or hetero-tetrameric channels (with other alpha subunits) through their BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif. — an NCBI CDD conserved domain (cd18414); members share this curated model.
