identifier: CDD:cd08700
label: "C-terminal subdomain of the Formyltransferase-like domain found in OzmH-like proteins. Domain found in OzmH-like proteins with similarity to the C-terminal domain of Formyltransferase. OzmH is one of the proteins involved in the synthesis of Oxazolomycin (OZM), which is a hybrid peptide-polyketide antibiotic that exhibits potent antitumor and antiviral activities. OzmH is a multi-domain protein consisting of a formyl transferase domain, a flavin-utilizing monoxygenase domain, a LuxE domain functioning as an acyl protein synthetase and a phosphopantetheine (PP)-binding domain, which may function as an acyl carrier. It shows sequence similarity with other peptide-polyketide biosynthesis proteins."
definition: >-
  C-terminal subdomain of the Formyltransferase-like domain found in OzmH-like proteins. Domain found in OzmH-like proteins with similarity to the C-terminal domain of Formyltransferase. OzmH is one of the proteins involved in the synthesis of Oxazolomycin (OZM), which is a hybrid peptide-polyketide antibiotic that exhibits potent antitumor and antiviral activities. OzmH is a multi-domain protein consisting of a formyl transferase domain, a flavin-utilizing monoxygenase domain, a LuxE domain functioning as an acyl protein synthetase and a phosphopantetheine (PP)-binding domain, which may function as an acyl carrier. It shows sequence similarity with other peptide-polyketide biosynthesis proteins. — an NCBI CDD conserved domain (cd08700); members share this curated model.
