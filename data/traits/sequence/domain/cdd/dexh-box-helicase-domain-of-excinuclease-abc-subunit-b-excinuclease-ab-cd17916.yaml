identifier: CDD:cd17916
label: "DEXH-box helicase domain of excinuclease ABC subunit B. Excinuclease ABC subunit B (or UvrB) plays a central role in nucleotide excision repair (NER). Together with other components of the NER system, like UvrA, UvrC, UvrD (helicase II) and DNA polymerase I, it recognizes and cleaves damaged DNA in a multistep ATP-dependent reaction. UvrB is critical for the second phase of damage recognition by verifying the nature of the damage and forming the pre-incision complex. Its ATPase site becomes activated in the presence of UvrA and damaged DNA, but its activity is strand destabilization via distortion of the DNA at lesion site, with very limited DNA unwinding. UvrB is a member of the DEAD-like helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of excinuclease ABC subunit B. Excinuclease ABC subunit B (or UvrB) plays a central role in nucleotide excision repair (NER). Together with other components of the NER system, like UvrA, UvrC, UvrD (helicase II) and DNA polymerase I, it recognizes and cleaves damaged DNA in a multistep ATP-dependent reaction. UvrB is critical for the second phase of damage recognition by verifying the nature of the damage and forming the pre-incision complex. Its ATPase site becomes activated in the presence of UvrA and damaged DNA, but its activity is strand destabilization via distortion of the DNA at lesion site, with very limited DNA unwinding. UvrB is a member of the DEAD-like helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17916); members share this curated model.
