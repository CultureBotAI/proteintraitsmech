identifier: CDD:cd08045
label: "histone-fold domain found in transcription initiation factor TFIID subunit 4 (TAF4) and similar proteins. TAF4, also called TATA Binding Protein (TBP) associated factor 4, RNA polymerase II TBP-associated factor subunit C, TBP-associated factor 4, transcription initiation factor TFIID 130 kDa subunit (TAF(II)130, TAFII-130, TAFII130), or transcription initiation factor TFIID 135 kDa subunit (TAF(II)135, TAFII-135, TAFII135), is a component of the TFIID complex that is composed of TATA binding protein (TBP) and a number of TBP-associated factors (TAFs). TFIID is one of the general transcription factors required for accurate and regulated initiation by RNA polymerase II. It plays a central role in mediating promoter responses to various activators and repressors. TAF4 potentiates transcriptional activation by the AF-2S of retinoic acid, vitamin D3 and thyroid hormone. TAF4 also acts as a component of the TFTC-HAT complex and some MLL1/MLL complexes. TAF4 interacts with ATF7 and the interaction inhibits ATF7-mediated transactivation."
definition: >-
  histone-fold domain found in transcription initiation factor TFIID subunit 4 (TAF4) and similar proteins. TAF4, also called TATA Binding Protein (TBP) associated factor 4, RNA polymerase II TBP-associated factor subunit C, TBP-associated factor 4, transcription initiation factor TFIID 130 kDa subunit (TAF(II)130, TAFII-130, TAFII130), or transcription initiation factor TFIID 135 kDa subunit (TAF(II)135, TAFII-135, TAFII135), is a component of the TFIID complex that is composed of TATA binding protein (TBP) and a number of TBP-associated factors (TAFs). TFIID is one of the general transcription factors required for accurate and regulated initiation by RNA polymerase II. It plays a central role in mediating promoter responses to various activators and repressors. TAF4 potentiates transcriptional activation by the AF-2S of retinoic acid, vitamin D3 and thyroid hormone. TAF4 also acts as a component of the TFTC-HAT complex and some MLL1/MLL complexes. TAF4 interacts with ATF7 and the interaction inhibits ATF7-mediated transactivation. — an NCBI CDD conserved domain (cd08045); members share this curated model.
