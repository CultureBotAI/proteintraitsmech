identifier: CDD:cd18515
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 37 (KLHL37). KLHL37, also called ectoderm-neural cortex protein 1 (ENC-1), or nuclear matrix protein NRP/B, or p53-induced gene 10 protein, is an actin-binding nuclear matrix protein that associates with p110(RB), and is involved in the regulation of neuronal process formation and in differentiation of neural crest cells."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 37 (KLHL37). KLHL37, also called ectoderm-neural cortex protein 1 (ENC-1), or nuclear matrix protein NRP/B, or p53-induced gene 10 protein, is an actin-binding nuclear matrix protein that associates with p110(RB), and is involved in the regulation of neuronal process formation and in differentiation of neural crest cells. — an NCBI CDD conserved domain (cd18515); members share this curated model.
