identifier: CDD:cd22202
label: NPHP1_NTD_CC
definition: >-
  N-terminal coiled coil domain found in nephrocystin-1 (NPHP1) and similar proteins. NPHP1, also called Juvenile nephronophthisis 1 protein, acts as an adaptor protein that harbors an SH3 domain flanked by two glutamic acid-rich regions and a conserved C-terminal nephrocystin homology domain (NHD). The model corresponds to N-terminal coiled coil domain of NPHP1, which plays an important role in NPHP1 self-association and/or protein-protein interactions. Loss of NPHP1 in humans causes nephronophthisis (NPH), an autosomal-recessive cystic kidney disease
