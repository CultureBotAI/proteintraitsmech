identifier: CDD:cd01273
label: "Cell death protein 6 homolog (CED-6/GULP1) Phosphotyrosine-binding (PTB) domain. CED6 (also known as GULP1: engulfment adaptor PTB domain containing 1) is an adaptor protein involved in the specific recognition and engulfment of apoptotic cells. CED6 has been shown to interact with the cytoplasmic tail of another protein involved in the engulfment of apoptotic cells, CED1. CED6 has a C-terminal PTB domain, which can bind to NPXY motifs. PTB domains have a common PH-like fold and are found in various eukaryotic signaling molecules. This domain was initially shown to binds peptides with a NPXY motif with differing requirements for phosphorylation of the tyrosine, although more recent studies have found that some types of PTB domains can bind to peptides lack tyrosine residues altogether. In contrast to SH2 domains, which recognize phosphotyrosine and adjacent carboxy-terminal residues, PTB-domain binding specificity is conferred by residues amino-terminal to the phosphotyrosine. PTB domains are classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains. This cd is part of the Dab-like subgroup."
definition: >-
  Cell death protein 6 homolog (CED-6/GULP1) Phosphotyrosine-binding (PTB) domain. CED6 (also known as GULP1: engulfment adaptor PTB domain containing 1) is an adaptor protein involved in the specific recognition and engulfment of apoptotic cells. CED6 has been shown to interact with the cytoplasmic tail of another protein involved in the engulfment of apoptotic cells, CED1. CED6 has a C-terminal PTB domain, which can bind to NPXY motifs. PTB domains have a common PH-like fold and are found in various eukaryotic signaling molecules. This domain was initially shown to binds peptides with a NPXY motif with differing requirements for phosphorylation of the tyrosine, although more recent studies have found that some types of PTB domains can bind to peptides lack tyrosine residues altogether. In contrast to SH2 domains, which recognize phosphotyrosine and adjacent carboxy-terminal residues, PTB-domain binding specificity is conferred by residues amino-terminal to the phosphotyrosine. PTB domains are classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains. This cd is part of the Dab-like subgroup. — an NCBI CDD conserved domain (cd01273); members share this curated model.
