identifier: CDD:cd19644
label: "outer membrane protein P2. OmpP2 functions as a porin in Haemophilus influenzae type b (Hib), responsible for meningitis, and also represents the most abundant protein in the outer membrane of this pathogen.  OmpP2 is thought to act as a facilitator for nicotinamide-based nucleotide transport of NAD and NMN in H. influenzae. Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane.  They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances.  Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface."
definition: >-
  outer membrane protein P2. OmpP2 functions as a porin in Haemophilus influenzae type b (Hib), responsible for meningitis, and also represents the most abundant protein in the outer membrane of this pathogen. OmpP2 is thought to act as a facilitator for nicotinamide-based nucleotide transport of NAD and NMN in H. influenzae. Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane. They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances. Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface. — an NCBI CDD conserved domain (cd19644); members share this curated model.
