identifier: CDD:cd08135
label: ATP-G_MCC_BC-C
definition: >-
  ATP-grasp domain of methylcrotonoyl-CoA carboxylase, and biotin carboxylase domain C. 3-methylcrotonyl-CoA carboxylase (MCC, EC 6.4.1.4) catalyzes the carboxylation of 3-methylcrotonyl-CoA to 3-methylglutaconyl-CoA. MCC is a heteropolymeric mitochondrial enzyme which is composed of six heterodimers of alpha- and beta-chains. The N-terminal of alpha-subunit contains biotin carboxylase (BC) domain while the C-terminal contains the biotin carboxyl carrier protein (BCCP). Carboxyltransferase (CT) activity is present on the beta subunit. Catalytic mechanism involves interaction between BC and BCCP domains to catalyze carboxybiotin in the presence of ATP and bicarbonate. The CT domain then transfers the carboxyl group from carboxybiotin to 3-methylcrotonyl-CoA to produce 3-methylglutaconyl-CoA. MCC is predominantly expressed in kidney and liver. Human MCCase (encoded by MCCC1) belongs to this family. Mutations in this MCCC1 is associated with an autosomal recessive disorder of leucine catabolism that results into 3-Methylcrotonylglycinuria
