identifier: CDD:cd02269
label: "HSDH_SF. The homoserine dehydrogenase (HSDH) superfamily of proteins includes the NAD(P)H-dependent HSDH encoded by the thrA, metL, and hom genes and similar HSDH proteins. HSDH reduces aspartate semi-aldehyde to the amino acid homoserine, one that is required for the biosynthesis of Met, Thr, and Ile from Asp in microbes, fungi, and plants. Neither the enzyme nor the aspartate pathway is found in the animal kingdom. Fungal HSDH is a homodimer of 38 kDa subunits, unlike the bifunctional HSDH enzyme from many bacteria and plants where it is fused to aspartokinase, the first enzyme in the pathway. Members of this superfamily contain a Rossmann fold NAD(P)H binding domain and unique catalytic fold with similarities to the glyceraldehyde-3-phosphate dehydrogenase domain and are members of the NADB_G3PDH superfamily of proteins. Flanking aspartokinase (AA_kinase) or ACT domains are not included in this alignment."
definition: >-
  HSDH_SF. The homoserine dehydrogenase (HSDH) superfamily of proteins includes the NAD(P)H-dependent HSDH encoded by the thrA, metL, and hom genes and similar HSDH proteins. HSDH reduces aspartate semi-aldehyde to the amino acid homoserine, one that is required for the biosynthesis of Met, Thr, and Ile from Asp in microbes, fungi, and plants. Neither the enzyme nor the aspartate pathway is found in the animal kingdom. Fungal HSDH is a homodimer of 38 kDa subunits, unlike the bifunctional HSDH enzyme from many bacteria and plants where it is fused to aspartokinase, the first enzyme in the pathway. Members of this superfamily contain a Rossmann fold NAD(P)H binding domain and unique catalytic fold with similarities to the glyceraldehyde-3-phosphate dehydrogenase domain and are members of the NADB_G3PDH superfamily of proteins. Flanking aspartokinase (AA_kinase) or ACT domains are not included in this alignment. — an NCBI CDD conserved domain (cd02269); members share this curated model.
