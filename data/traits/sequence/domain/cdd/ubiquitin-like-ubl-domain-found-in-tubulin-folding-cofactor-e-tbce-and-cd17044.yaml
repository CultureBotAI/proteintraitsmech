identifier: CDD:cd17044
label: "ubiquitin-like (Ubl) domain found in tubulin-folding cofactor E (TBCE) and similar proteins. TBCE, also termed tubulin-specific chaperone E, is a tubulin polymerizing protein involved in the second step of the tubulin folding pathway through cooperating in tubulin heterodimer dissociation both in vivo and in vitro. It may also be implicated in the maintenance of the neuronal microtubule network. Mutations in TBCE gene cause hypoparathyroidism, mental retardation and facial dysmorphism. TBCE contains an N-terminal cytoskeleton-associated protein with glycine-rich segment (CAP-Gly) domain, a leucine-rich repeat protein-protein interaction domain followed by leucine-rich repeat (LRR) domains, and a C-terminal ubiquitin-like (Ubl) domain. Ubiquitin is a protein modifier in eukaryotes that is involved in various cellular processes."
definition: >-
  ubiquitin-like (Ubl) domain found in tubulin-folding cofactor E (TBCE) and similar proteins. TBCE, also termed tubulin-specific chaperone E, is a tubulin polymerizing protein involved in the second step of the tubulin folding pathway through cooperating in tubulin heterodimer dissociation both in vivo and in vitro. It may also be implicated in the maintenance of the neuronal microtubule network. Mutations in TBCE gene cause hypoparathyroidism, mental retardation and facial dysmorphism. TBCE contains an N-terminal cytoskeleton-associated protein with glycine-rich segment (CAP-Gly) domain, a leucine-rich repeat protein-protein interaction domain followed by leucine-rich repeat (LRR) domains, and a C-terminal ubiquitin-like (Ubl) domain. Ubiquitin is a protein modifier in eukaryotes that is involved in various cellular processes. — an NCBI CDD conserved domain (cd17044); members share this curated model.
