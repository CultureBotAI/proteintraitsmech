identifier: CDD:cd18016
label: "DEAH-box helicase domain of RecQ2. ATP-dependent DNA helicase Q2 (RecQ2, also called Bloom syndrome protein homolog or BLM) is part of the RecQ family of highly conserved DNA repair helicases that is part of the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. Mutations in RecQ2 cause Bloom syndrome."
definition: >-
  DEAH-box helicase domain of RecQ2. ATP-dependent DNA helicase Q2 (RecQ2, also called Bloom syndrome protein homolog or BLM) is part of the RecQ family of highly conserved DNA repair helicases that is part of the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. Mutations in RecQ2 cause Bloom syndrome. — an NCBI CDD conserved domain (cd18016); members share this curated model.
