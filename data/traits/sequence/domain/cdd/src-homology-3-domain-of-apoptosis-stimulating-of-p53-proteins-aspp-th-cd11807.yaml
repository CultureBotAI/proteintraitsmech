identifier: CDD:cd11807
label: "Src homology 3 domain of Apoptosis Stimulating of p53 proteins (ASPP). The ASPP family of proteins bind to important regulators of apoptosis (p53, Bcl-2, and RelA) and cell growth (APCL, PP1). They share similarity at their C-termini, where they harbor a proline-rich region, four ankyrin (ANK) repeats, and an SH3 domain. Vertebrates contain three members of the family: ASPP1, ASPP2, and iASPP. ASPP1 and ASPP2 activate the apoptotic function of the p53 family of tumor suppressors (p53, p63, and p73), while iASPP is an oncoprotein that specifically inhibits p53-induced apoptosis. The expression of ASPP proteins is altered in tumors; ASPP1 and ASPP2 are downregulated whereas iASPP is upregulated is some cancer types. ASPP proteins also bind and regulate protein phosphatase 1 (PP1), and this binding is competitive with p53 binding. The SH3 domain and the ANK repeats of ASPP contribute to the p53 binding site; they bind to the DNA binding domain of p53. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of Apoptosis Stimulating of p53 proteins (ASPP). The ASPP family of proteins bind to important regulators of apoptosis (p53, Bcl-2, and RelA) and cell growth (APCL, PP1). They share similarity at their C-termini, where they harbor a proline-rich region, four ankyrin (ANK) repeats, and an SH3 domain. Vertebrates contain three members of the family: ASPP1, ASPP2, and iASPP. ASPP1 and ASPP2 activate the apoptotic function of the p53 family of tumor suppressors (p53, p63, and p73), while iASPP is an oncoprotein that specifically inhibits p53-induced apoptosis. The expression of ASPP proteins is altered in tumors; ASPP1 and ASPP2 are downregulated whereas iASPP is upregulated is some cancer types. ASPP proteins also bind and regulate protein phosphatase 1 (PP1), and this binding is competitive with p53 binding. The SH3 domain and the ANK repeats of ASPP contribute to the p53 binding site; they bind to the DNA binding domain of p53. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11807); members share this curated model.
