identifier: CDD:cd16553
label: "RING finger, HC subclass, found in RING finger protein 170 (RNF170) and similar proteins. RNF170, also known as putative LAG1-interacting protein, is an endoplasmic reticulum (ER) membrane-bound E3 ubiquitin-protein ligase that mediates ubiquitination-dependent degradation of type-I inositol 1,4,5-trisphosphate (IP3) receptors (ITPR1) via the endoplasmic-reticulum-associated protein degradation (ERAD) pathway. A point mutation (arginine to cysteine at position 199) in the RNF170 gene is linked with autosomal-dominant sensory ataxia (ADSA), a disease characterized by neurodegeneration in the posterior columns of the spinal cord. RNF170 contains a C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in RING finger protein 170 (RNF170) and similar proteins. RNF170, also known as putative LAG1-interacting protein, is an endoplasmic reticulum (ER) membrane-bound E3 ubiquitin-protein ligase that mediates ubiquitination-dependent degradation of type-I inositol 1,4,5-trisphosphate (IP3) receptors (ITPR1) via the endoplasmic-reticulum-associated protein degradation (ERAD) pathway. A point mutation (arginine to cysteine at position 199) in the RNF170 gene is linked with autosomal-dominant sensory ataxia (ADSA), a disease characterized by neurodegeneration in the posterior columns of the spinal cord. RNF170 contains a C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd16553); members share this curated model.
