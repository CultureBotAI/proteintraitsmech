identifier: CDD:cd07610
label: "The Extended FES-CIP4 Homology (FCH) or F-BAR (FCH and Bin/Amphiphysin/Rvs) domain, a dimerization module that binds and bends membranes. F-BAR domains are dimerization modules that bind and bend membranes and are found in proteins involved in membrane dynamics and actin reorganization. F-BAR domain containing proteins, also known as Pombe Cdc15 homology (PCH) family proteins, include Fes and Fer tyrosine kinases, PACSINs/Syndapins, FCHO, PSTPIP, CIP4-like proteins and srGAPs. Many members also contain an SH3 domain and play roles in endocytosis. F-BAR domains form banana-shaped dimers with a positively-charged concave surface that binds to negatively-charged lipid membranes. They can induce membrane deformation in the form of long tubules. These tubules have diameters larger than those observed with N-BARs. The F-BAR domains of some members such as NOSTRIN and Rgd1 are important for the subcellular localization of the protein."
definition: >-
  The Extended FES-CIP4 Homology (FCH) or F-BAR (FCH and Bin/Amphiphysin/Rvs) domain, a dimerization module that binds and bends membranes. F-BAR domains are dimerization modules that bind and bend membranes and are found in proteins involved in membrane dynamics and actin reorganization. F-BAR domain containing proteins, also known as Pombe Cdc15 homology (PCH) family proteins, include Fes and Fer tyrosine kinases, PACSINs/Syndapins, FCHO, PSTPIP, CIP4-like proteins and srGAPs. Many members also contain an SH3 domain and play roles in endocytosis. F-BAR domains form banana-shaped dimers with a positively-charged concave surface that binds to negatively-charged lipid membranes. They can induce membrane deformation in the form of long tubules. These tubules have diameters larger than those observed with N-BARs. The F-BAR domains of some members such as NOSTRIN and Rgd1 are important for the subcellular localization of the protein. — an NCBI CDD conserved domain (cd07610); members share this curated model.
