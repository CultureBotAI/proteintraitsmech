identifier: CDD:cd07476
label: "Peptidase S8 family domain in Thiazoline oxidase/subtilisin-like proteases. Thiazoline oxidase/subtilisin-like protease is produced by the symbiotic bacteria Prochloron spp. that inhabit didemnid family ascidians.  The cyclic peptides of the patellamide class found in didemnid extracts are now known to be synthesized by the Prochloron spp.  The prepatellamide is heterocyclized to form thiazole and oxazoline rings and the peptide is cleaved to form the two cyclic patellamides A and C.  Subtilases, or subtilisin-like serine proteases, have an Asp/His/Ser catalytic triad similar to that found in trypsin-like proteases, but do not share their three-dimensional structure (an example of convergent evolution)."
definition: >-
  Peptidase S8 family domain in Thiazoline oxidase/subtilisin-like proteases. Thiazoline oxidase/subtilisin-like protease is produced by the symbiotic bacteria Prochloron spp. that inhabit didemnid family ascidians. The cyclic peptides of the patellamide class found in didemnid extracts are now known to be synthesized by the Prochloron spp. The prepatellamide is heterocyclized to form thiazole and oxazoline rings and the peptide is cleaved to form the two cyclic patellamides A and C. Subtilases, or subtilisin-like serine proteases, have an Asp/His/Ser catalytic triad similar to that found in trypsin-like proteases, but do not share their three-dimensional structure (an example of convergent evolution). — an NCBI CDD conserved domain (cd07476); members share this curated model.
