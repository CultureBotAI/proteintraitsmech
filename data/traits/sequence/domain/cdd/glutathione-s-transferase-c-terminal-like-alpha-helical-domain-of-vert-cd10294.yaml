identifier: CDD:cd10294
label: "Glutathione S-transferase C-terminal-like, alpha helical domain of vertebrate Valyl-tRNA synthetase. Glutathione S-transferase (GST) C-terminal domain family, Valyl-tRNA synthetase (ValRS) subfamily; This model characterizes the GST_C-like domain found in the N-terminal region of human ValRS and its homologs from other vertebrates such as frog and zebrafish. Aminoacyl-tRNA synthetases (aaRSs) comprise a family of enzymes that catalyze the coupling of amino acids with their matching tRNAs. This involves the formation of an aminoacyl adenylate using ATP, followed by the transfer of the activated amino acid to the 3'-adenosine moiety of the tRNA. AaRSs may also be involved in translational and transcriptional regulation, as well as in tRNA processing. They typically form large stable complexes with other proteins. ValRS forms a stable complex with Elongation Factor-1H (EF-1H), and together, they catalyze consecutive steps in protein biosynthesis, tRNA aminoacylation and its transfer to EF. The GST_C-like domain of ValRS from higher eukaryotes is likely involved in protein-protein interactions, to mediate the formation of the multi-aaRS complex that acts as a molecular hub to coordinate protein synthesis. ValRSs from prokaryotes and lower eukaryotes, such as fungi and plants, do not appear to contain this GST_C-like domain."
