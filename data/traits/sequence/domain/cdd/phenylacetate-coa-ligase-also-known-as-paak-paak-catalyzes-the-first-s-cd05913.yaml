identifier: CDD:cd05913
label: "Phenylacetate-CoA ligase (also known as PaaK). PaaK catalyzes the first step in the aromatic degradation pathway, by converting phenylacetic acid (PA) into phenylacetyl-CoA (PA-CoA). Phenylacetate-CoA ligase has been found in proteobacteria as well as gram positive prokaryotes. The enzyme is specifically induced after aerobic growth in a chemically defined medium containing PA or phenylalanine (Phe) as the sole carbon source. PaaKs are members of the adenylate-forming enzyme (AFE) family. However, sequence comparison reveals divergent features of PaaK with respect to the superfamily, including a novel N-terminal sequence."
definition: >-
