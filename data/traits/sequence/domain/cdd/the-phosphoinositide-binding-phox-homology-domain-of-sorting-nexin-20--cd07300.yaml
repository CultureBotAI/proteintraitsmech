identifier: CDD:cd07300
label: "The phosphoinositide binding Phox Homology domain of Sorting Nexin 20. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions. Sorting nexins (SNXs) make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway. Some SNXs are localized in early endosome structures such as clathrin-coated pits, while others are located in late structures of the endocytic pathway. SNX20 interacts with P-Selectin glycoprotein ligand-1 (PSGL-1), a surface-expressed mucin that acts as a ligand for the selectin family of adhesion proteins. The PX domain of SNX20 binds PIs and targets the SNX20/PSGL-1 complex to endosomes. SNX20 may function in the sorting and cycling of PSGL-1 into endosomes."
definition: >-
  The phosphoinositide binding Phox Homology domain of Sorting Nexin 20. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions. Sorting nexins (SNXs) make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway. Some SNXs are localized in early endosome structures such as clathrin-coated pits, while others are located in late structures of the endocytic pathway. SNX20 interacts with P-Selectin glycoprotein ligand-1 (PSGL-1), a surface-expressed mucin that acts as a ligand for the selectin family of adhesion proteins. The PX domain of SNX20 binds PIs and targets the SNX20/PSGL-1 complex to endosomes. SNX20 may function in the sorting and cycling of PSGL-1 into endosomes. — an NCBI CDD conserved domain (cd07300); members share this curated model.
