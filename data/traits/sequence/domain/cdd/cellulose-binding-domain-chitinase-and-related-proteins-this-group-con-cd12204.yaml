identifier: CDD:cd12204
label: "Cellulose-binding domain, chitinase and related proteins. This group contains proteins related to the cellulose-binding domain of Erwinia chrysanthemi endoglucanase Z (EGZ) and Serratia marcescens chitinase B (ChiB). Gram negative plant parasite Erwinia chrysanthemi produces a variety of depolymerizing enzymes to metabolize pectin and cellulose on the host plant. Cellulase EGZ has a modular structure, with N-terminal catalytic domain linked to a C-terminal cellulose-binding domain (CBD). CBD mediates the secretion activity of EGZ. Chitinases allow certain bacteria to utilize chitin as a energy source. Typically, non-plant chitinases are of the glycosidase family 18."
definition: >-
  Cellulose-binding domain, chitinase and related proteins. This group contains proteins related to the cellulose-binding domain of Erwinia chrysanthemi endoglucanase Z (EGZ) and Serratia marcescens chitinase B (ChiB). Gram negative plant parasite Erwinia chrysanthemi produces a variety of depolymerizing enzymes to metabolize pectin and cellulose on the host plant. Cellulase EGZ has a modular structure, with N-terminal catalytic domain linked to a C-terminal cellulose-binding domain (CBD). CBD mediates the secretion activity of EGZ. Chitinases allow certain bacteria to utilize chitin as a energy source. Typically, non-plant chitinases are of the glycosidase family 18. — an NCBI CDD conserved domain (cd12204); members share this curated model.
