identifier: CDD:cd22936
label: "Tetrahymena thermophila shulin, human uncharacterized protein C20orf194, and similar proteins. This family contains Tetrahymena thermophila shulin, human uncharacterized protein C20orf194, and similar proteins. Shulin is a negative regulator of the ciliary outer dynein arm (ODA). It binds newly synthesized ODAs, locks the dynein motors together by shutting off motor activity, and facilitates the delivery of ODAs from the cytoplasm to their final position in the cilia. ODAs, together with inner dynein arms (IDAs), are arrayed along a microtubule-based structure called the axoneme and drive the movement of cilia. Human C20orf194 interacts with the small GTPase Arf-like 3 (ARL3) and may act as its effector. The rs6051702 single nucleotide polymorphism (SNP) within the C20orf194 gene is associated with inosine triphosphatase (ITPA) functional gene polymorphisms that were found to influence RBV-induced hemoglobin (Hb)-decline during treatment of chronic hepatitis C patients with pegylated interferon (PEG-IFN) plus ribavirin (RBV)."
