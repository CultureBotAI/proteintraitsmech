identifier: CDD:cd10396
label: "Src homology 2 (SH2) domain found in Tec protein, IL2-inducible T-cell kinase (Itk). A member of the Tec protein tyrosine kinase Itk is expressed thymus, spleen, lymph node, T lymphocytes, NK and mast cells. It plays a role in T-cell proliferation and differentiation, analogous to Tec family kinases Txk. Itk  has been shown to interact with Fyn, Wiskott-Aldrich syndrome protein, KHDRBS1, PLCG1, Lymphocyte cytosolic protein 2, Linker of activated T cells, Karyopherin alpha 2, Grb2, and Peptidylprolyl isomerase A. Most of the Tec family members have a PH domain (Txk and the short (type 1) splice variant of Drosophila Btk29A are exceptions), a Tec homology (TH) domain, a SH3 domain, a SH2 domain, and a protein kinase catalytic domain. The TH domain consists of a Zn2+-binding Btk motif and a proline-rich region. The Btk motif is found in Tec kinases, Ras GAP, and IGBP. It is crucial for the function of Tec PH domains and it's lack of presence in Txk is not surprising since it lacks a PH domain. The type 1 splice form of the Drosophila homolog also lacks both the PH domain and the Btk motif. The proline-rich regions are highly conserved for the most part with the exception of Bmx whose residues surrounding the PXXP motif are not conserved (TH-like) and Btk29A  which is entirely unique with large numbers of glycine residues (TH-extended).  Tec family members all lack a C-terminal tyrosine having an autoinhibitory function in its phosphorylated state. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in Tec protein, IL2-inducible T-cell kinase (Itk). A member of the Tec protein tyrosine kinase Itk is expressed thymus, spleen, lymph node, T lymphocytes, NK and mast cells. It plays a role in T-cell proliferation and differentiation, analogous to Tec family kinases Txk. Itk has been shown to interact with Fyn, Wiskott-Aldrich syndrome protein, KHDRBS1, PLCG1, Lymphocyte cytosolic protein 2, Linker of activated T cells, Karyopherin alpha 2, Grb2, and Peptidylprolyl isomerase A. Most of the Tec family members have a PH domain (Txk and the short (type 1) splice variant of Drosophila Btk29A are exceptions), a Tec homology (TH) domain, a SH3 domain, a SH2 domain, and a protein kinase catalytic domain. The TH domain consists of a Zn2+-binding Btk motif and a proline-rich region. The Btk motif is found in Tec kinases, Ras GAP, and IGBP. It is crucial for the function of Tec PH domains and it's lack of presence in Txk is not surprising since it lacks a PH domain. The type 1 splice form of the Drosophila homolog also lacks both the PH domain and the Btk motif. The proline-rich regions are highly conserved for the most part with the exception of Bmx whose residues surrounding the PXXP motif are not conserved (TH-like) and Btk29A which is entirely unique with large numbers of glycine residues (TH-extended). Tec family members all lack a C-terminal tyrosine having an autoinhibitory function in its phosphorylated state. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10396); members share this curated model.
