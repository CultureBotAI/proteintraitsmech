identifier: CDD:cd16566
label: "RING finger, HC subclass, found in RING finger and SPRY domain-containing protein 1 (RSPRY1) and similar proteins. RSPRY1 is a hypothetical RING and SPRY domain-containing protein of unknown physiological function. Mutations in its corresponding gene RSPRY1 may associate with a distinct skeletal dysplasia syndrome. RSPRY1 contains a B30.2/SPRY domain and a C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in RING finger and SPRY domain-containing protein 1 (RSPRY1) and similar proteins. RSPRY1 is a hypothetical RING and SPRY domain-containing protein of unknown physiological function. Mutations in its corresponding gene RSPRY1 may associate with a distinct skeletal dysplasia syndrome. RSPRY1 contains a B30.2/SPRY domain and a C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd16566); members share this curated model.
