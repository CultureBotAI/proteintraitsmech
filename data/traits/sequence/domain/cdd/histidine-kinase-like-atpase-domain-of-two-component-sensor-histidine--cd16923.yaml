identifier: CDD:cd16923
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Enterococcus faecium VanS. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) such as Enterococcus faecium VanS HK of the VanS-VanR two-component regulatory system (TCS) which activates the transcription of vanH, vanA and vanX vancomycin resistance genes. It also contains Ecoli YedV and PcoS, probable members of YedW-YedV TCS and PcoS-PcoR TCS, repectively. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA); most also have a HAMP sensor domain."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Enterococcus faecium VanS. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) such as Enterococcus faecium VanS HK of the VanS-VanR two-component regulatory system (TCS) which activates the transcription of vanH, vanA and vanX vancomycin resistance genes. It also contains Ecoli YedV and PcoS, probable members of YedW-YedV TCS and PcoS-PcoR TCS, repectively. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA); most also have a HAMP sensor domain. — an NCBI CDD conserved domain (cd16923); members share this curated model.
