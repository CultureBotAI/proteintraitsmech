identifier: CDD:cd00456
label: Ribosomal_L21e
definition: >-
  Ribosomal_L21e. Ribosomal protein L21e. L21e is a protein of the large ribosomal subunit located in the central protuberance, along with L18 and L5. It interacts with L18 and 5S rRNA, and forms an extensive network of interactions with 23S rRNA, but a more specific function for the protein is unknown at this time. L21e may be one of several ribosomal proteins whose function appears to be primarily structural, through assisting the proper folding of RNA and helping to maintain the proper three-dimensional structure for the ribosome
