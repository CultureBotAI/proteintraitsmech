identifier: CDD:cd20778
label: "eight-bladed heme d1-binding beta-propeller domain in cytochrome cd1 nitrate reductase NirF. Denitrification is a process that enables biofilm formation of the opportunistic human pathogen Pseudomonas aeruginosa, making it more resilient to antibiotics and highly adaptable to different habitats. During denitrification, nitrate (Nar), nitrite (Nir), nitric oxide (Nor), and nitrous oxide (Nos) reductases catalyze the reaction cascade of NO3- -> NO2- -> NO -> N2O -> N2. The integral membrane proteins NorC, NorB, and NosR form the core assembly platform that binds the nitrate reductase NarGHI and the periplasmic cytochrome cd1 (nitrite reductase) NirS via its maturation factor NirF.  The nirFDLGHJE genes encode proteins required for heme d1 biosynthesis. NirS, NirF, and NirN, the monomeric dihydro-heme d1 dehydrogenase form a stable complex during nitrite reductase maturation. The nitrite reductase NirS is bound to the denitrification supercomplex via NorB, while the electron donor system NirM and the enzyme maturation machinery NirN-NirF-NirQ, interacting with NirS, are bound via NorC."
definition: >-
  eight-bladed heme d1-binding beta-propeller domain in cytochrome cd1 nitrate reductase NirF. Denitrification is a process that enables biofilm formation of the opportunistic human pathogen Pseudomonas aeruginosa, making it more resilient to antibiotics and highly adaptable to different habitats. During denitrification, nitrate (Nar), nitrite (Nir), nitric oxide (Nor), and nitrous oxide (Nos) reductases catalyze the reaction cascade of NO3- -> NO2- -> NO -> N2O -> N2. The integral membrane proteins NorC, NorB, and NosR form the core assembly platform that binds the nitrate reductase NarGHI and the periplasmic cytochrome cd1 (nitrite reductase) NirS via its maturation factor NirF. The nirFDLGHJE genes encode proteins required for heme d1 biosynthesis. NirS, NirF, and NirN, the monomeric dihydro-heme d1 dehydrogenase form a stable complex during nitrite reductase maturation. The nitrite reductase NirS is bound to the denitrification supercomplex via NorB, while the electron donor system NirM and the enzyme maturation machinery NirN-NirF-NirQ, interacting with NirS, are bound via NorC. — an NCBI CDD conserved domain (cd20778); members share this curated model.
