identifier: CDD:cd22253
label: "helical domain of DDI (HDD) found in DNA-DAMAGE INDUCIBLE 1 (DDI1) family proteins. The DDI1 family includes protein DNA-DAMAGE INDUCIBLE 1 (DDI1) and its homologs. DDI1 is a receptor of ubiquitinated protein targeted to ubiquitin/proteasome-mediated proteolysis (UPP). Protein DDI1 homolog 1 (DDI1) may act as a proteasomal shuttle which links the proteasome and replication fork proteins like RTF2. Protein DDI1 homolog 2 (DDI2) is an aspartic protease that specifically recognizes and binds ubiquitinated NFE2L1/NRF1. It mediates the cleavage of NFE2L1/NRF1 at 'Leu-104', thereby promoting release of NFE2L1/NRF1 from the endoplasmic reticulum membrane. DDI1 and DDI2 are required for cellular survival following replication stress. They work together or play redundant role to remove RTF2 from stalled forks to allow cell cycle progression after replication stress and maintains genome integrity. The model corresponds to helical domain of DDI (HDD) that possesses a novel alpha-helical architecture and shares broad similarities with the Sti1-like domain of Rad23."
definition: >-
  helical domain of DDI (HDD) found in DNA-DAMAGE INDUCIBLE 1 (DDI1) family proteins. The DDI1 family includes protein DNA-DAMAGE INDUCIBLE 1 (DDI1) and its homologs. DDI1 is a receptor of ubiquitinated protein targeted to ubiquitin/proteasome-mediated proteolysis (UPP). Protein DDI1 homolog 1 (DDI1) may act as a proteasomal shuttle which links the proteasome and replication fork proteins like RTF2. Protein DDI1 homolog 2 (DDI2) is an aspartic protease that specifically recognizes and binds ubiquitinated NFE2L1/NRF1. It mediates the cleavage of NFE2L1/NRF1 at 'Leu-104', thereby promoting release of NFE2L1/NRF1 from the endoplasmic reticulum membrane. DDI1 and DDI2 are required for cellular survival following replication stress. They work together or play redundant role to remove RTF2 from stalled forks to allow cell cycle progression after replication stress and maintains genome integrity. The model corresponds to helical domain of DDI (HDD) that possesses a novel alpha-helical architecture and shares broad similarities with the Sti1-like domain of Rad23. — an NCBI CDD conserved domain (cd22253); members share this curated model.
