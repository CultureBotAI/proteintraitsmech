identifier: CDD:cd16511
label: "variant of RING finger, HC subclass, found in interferon regulatory factor 2-binding protein IRF-2BP1, IRF-2BP2, and similar proteins. This subfamily includes IRF-2BP1, IRF-2BP2, and their homolog, IRF-2BP-like, also known as IRF-2BPL or C14orf4. IRF-2BP1 and IRF-2BP2 are nuclear proteins that bind to the C-terminal repression domain of IRF-2 and act as IRF-2-dependent transcriptional corepressors, both enhancer-activated and basal transcription. IRF-2BPL is expressed in the mediobasal hypothalamus and plays a critical function in regulating the female reproductive neuroendocrine axis. All subfamily members contain a C-terminal variant C3HC4-type RING-HC finger."
definition: >-
  variant of RING finger, HC subclass, found in interferon regulatory factor 2-binding protein IRF-2BP1, IRF-2BP2, and similar proteins. This subfamily includes IRF-2BP1, IRF-2BP2, and their homolog, IRF-2BP-like, also known as IRF-2BPL or C14orf4. IRF-2BP1 and IRF-2BP2 are nuclear proteins that bind to the C-terminal repression domain of IRF-2 and act as IRF-2-dependent transcriptional corepressors, both enhancer-activated and basal transcription. IRF-2BPL is expressed in the mediobasal hypothalamus and plays a critical function in regulating the female reproductive neuroendocrine axis. All subfamily members contain a C-terminal variant C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd16511); members share this curated model.
