identifier: CDD:cd17088
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM and PDZ domain-containing proteins FRMPD1, FRMPD3, FRMPD4, and similar proteins. This family includes FERM and PDZ domain-containing proteins FRMPD1, FRMPD3, and FRMPD4, which all contain a PDZ domain and a FERM domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain of the FERM domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). FRMPD1, also termed FERM domain-containing protein 2, is an activator of G-protein signaling 3 (AGS3)-binding protein that regulates the subcellular location of AGS3 and its interaction with G-proteins. FRMPD4, also termed PDZ domain-containing protein 10, or PSD-95-interacting regulator of spine morphogenesis (Preso), is a multiscaffolding protein that modulates both Homer1 and post-synaptic density protein 95 activity. Both FRMPD1 and FRMPD4 can associate with the tetratricopeptide repeat (TPR) motif-containing adaptor protein LGN. The biological role of FRMPD3 remains unclear."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM and PDZ domain-containing proteins FRMPD1, FRMPD3, FRMPD4, and similar proteins. This family includes FERM and PDZ domain-containing proteins FRMPD1, FRMPD3, and FRMPD4, which all contain a PDZ domain and a FERM domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain of the FERM domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). FRMPD1, also termed FERM domain-containing protein 2, is an activator of G-protein signaling 3 (AGS3)-binding protein that regulates the subcellular location of AGS3 and its interaction with G-proteins. FRMPD4, also termed PDZ domain-containing protein 10, or PSD-95-interacting regulator of spine morphogenesis (Preso), is a multiscaffolding protein that modulates both Homer1 and post-synaptic density protein 95 activity. Both FRMPD1 and FRMPD4 can associate with the tetratricopeptide repeat (TPR) motif-containing adaptor protein LGN. The biological role of FRMPD3 remains unclear. — an NCBI CDD conserved domain (cd17088); members share this curated model.
