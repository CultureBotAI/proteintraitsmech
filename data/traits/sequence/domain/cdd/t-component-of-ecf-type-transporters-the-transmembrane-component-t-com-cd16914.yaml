identifier: CDD:cd16914
label: "T component of ECF-type transporters. The transmembrane component (T component) of the energy coupling-factor (ECF)-type transporter is a transmembrane protein important for vitamin uptake in prokaryotes. In addition to the T component, energy-coupling factor (ECF) transporters contain an energy-coupling module that consists of two ATP-binding proteins (known as the A and A' components) and a substrate-binding (S) component. ECF transporters comprise a subgroup of ATP-binding cassette (ABC) transporters that do not make use of water-soluble substrate binding proteins or domains, but instead employ integral membrane proteins for substrate binding, the S component, in contrast to classical ABC importers. The T component links the S component to the ATP-binding subcomplex that is composed of the A and A' components."
definition: >-
  T component of ECF-type transporters. The transmembrane component (T component) of the energy coupling-factor (ECF)-type transporter is a transmembrane protein important for vitamin uptake in prokaryotes. In addition to the T component, energy-coupling factor (ECF) transporters contain an energy-coupling module that consists of two ATP-binding proteins (known as the A and A' components) and a substrate-binding (S) component. ECF transporters comprise a subgroup of ATP-binding cassette (ABC) transporters that do not make use of water-soluble substrate binding proteins or domains, but instead employ integral membrane proteins for substrate binding, the S component, in contrast to classical ABC importers. The T component links the S component to the ATP-binding subcomplex that is composed of the A and A' components. — an NCBI CDD conserved domain (cd16914); members share this curated model.
