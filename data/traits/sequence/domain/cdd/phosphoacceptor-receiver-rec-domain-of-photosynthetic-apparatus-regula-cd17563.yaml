identifier: CDD:cd17563
label: "phosphoacceptor receiver (REC) domain of photosynthetic apparatus regulatory protein RegA. Rhodobacter sphaeroides RegA, also called response regulator PrrA, is the DNA binding regulatory protein of a redox-responsive two-component regulatory system RegB/RegA that is involved in transactivating anaerobic expression of the photosynthetic apparatus. It contains a REC domain and a DNA-binding helix-turn-helix output domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of photosynthetic apparatus regulatory protein RegA. Rhodobacter sphaeroides RegA, also called response regulator PrrA, is the DNA binding regulatory protein of a redox-responsive two-component regulatory system RegB/RegA that is involved in transactivating anaerobic expression of the photosynthetic apparatus. It contains a REC domain and a DNA-binding helix-turn-helix output domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17563); members share this curated model.
