identifier: CDD:cd23741
label: "RNA-editing substrate-binding complex subunit 11A (RESC11A) and similar proteins. RESC11A (REMC4, MRB8180) is an RNA-binding component of the RNA-editing substrate-binding complex (RESC), composed of about 20 components, that is involved in kinetoplast RNA processing. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode guide RNAs (gRNAs) involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. 12 of the 18 maxicircle genes are present as cryptogenes whose transcripts require U-insertion/deletion editing, mediated by gRNAs, to restore a protein-coding capacity. RESC interacts with two other complexes, the RNA-editing helicase 2 complex (REH2C) and RNA-editing catalytic complex (RECC), to form an assembly (editosome/holoenzyme) that carries out U-insertion/deletion mRNA editing. RESC11A is predicted (by AlphaFold) to be a helical repeat protein, with a predominantly alpha-helical structure that shows no similarity to any experimentally determined structure. Shorter regions within the protein show some structural similarity to various alpha-helical proteins including those containing containing Armadillo (ARM)/beta-catenin-like repeats and tetratricopeptide (TPR) repeats. Both ARM and TPR repeats are implicated in mediating protein-protein interactions."
definition: >-
  RNA-editing substrate-binding complex subunit 11A (RESC11A) and similar proteins. RESC11A (REMC4, MRB8180) is an RNA-binding component of the RNA-editing substrate-binding complex (RESC), composed of about 20 components, that is involved in kinetoplast RNA processing. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode guide RNAs (gRNAs) involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. 12 of the 18 maxicircle genes are present as cryptogenes whose transcripts require U-insertion/deletion editing, mediated by gRNAs, to restore a protein-coding capacity. RESC interacts with two other complexes, the RNA-editing helicase 2 complex (REH2C) and RNA-editing catalytic complex (RECC), to form an assembly (editosome/holoenzyme) that carries out U-insertion/deletion mRNA editing. RESC11A is predicted (by AlphaFold) to be a helical repeat protein, with a predominantly alpha-helical structure that shows no similarity to any experimentally determined structure. Shorter regions within the protein show some structural similarity to various alpha-helical proteins including those containing containing Armadillo (ARM)/beta-catenin-like repeats and tetratricopeptide (TPR) repeats. Both ARM and TPR repeats are implicated in mediating protein-protein interactions. — an NCBI CDD conserved domain (cd23741); members share this curated model.
