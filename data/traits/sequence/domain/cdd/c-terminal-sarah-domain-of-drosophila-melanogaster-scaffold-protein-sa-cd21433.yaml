identifier: CDD:cd21433
label: "C-terminal SARAH domain of Drosophila melanogaster scaffold protein salvador (Sav) and similar proteins. Sav is a scaffold protein that is mainly found in metazoans. Drosophila melanogaster salvador, also called Shar-pei (SHRP), promotes both cell cycle exit and apoptosis in Drosophila. It plays a key role in the Hippo/SWH (Sav/Wts/Hpo) signaling pathway, a signaling pathway that plays a pivotal role in organ size control and tumor suppression by restricting proliferation and promoting apoptosis. Human protein salvador homolog 1, also called 45 kDa WW domain protein (WW45), acts as a mammalian sterile 20-like kinase 1 (MST1)-binding protein required to enhance MST1-mediated apoptosis. It is a regulator of STK3/MST2 and STK4/MST1 in the Hippo signaling pathway. It also plays a role in centrosome disjunction by regulating the localization of NEK2 to centrosomes, and its ability to phosphorylate CROCC and CEP250. This model corresponds to the C-terminal SARAH (Salvador-RassF-Hippo) domain of Sav, which mediates complex formation/heterodimerization between Hippo and Sav."
definition: >-
  C-terminal SARAH domain of Drosophila melanogaster scaffold protein salvador (Sav) and similar proteins. Sav is a scaffold protein that is mainly found in metazoans. Drosophila melanogaster salvador, also called Shar-pei (SHRP), promotes both cell cycle exit and apoptosis in Drosophila. It plays a key role in the Hippo/SWH (Sav/Wts/Hpo) signaling pathway, a signaling pathway that plays a pivotal role in organ size control and tumor suppression by restricting proliferation and promoting apoptosis. Human protein salvador homolog 1, also called 45 kDa WW domain protein (WW45), acts as a mammalian sterile 20-like kinase 1 (MST1)-binding protein required to enhance MST1-mediated apoptosis. It is a regulator of STK3/MST2 and STK4/MST1 in the Hippo signaling pathway. It also plays a role in centrosome disjunction by regulating the localization of NEK2 to centrosomes, and its ability to phosphorylate CROCC and CEP250. This model corresponds to the C-terminal SARAH (Salvador-RassF-Hippo) domain of Sav, which mediates complex formation/heterodimerization between Hippo and Sav. — an NCBI CDD conserved domain (cd21433); members share this curated model.
