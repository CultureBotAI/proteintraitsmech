identifier: CDD:cd18570
label: "Six-transmembrane helical domain (6-TMD) of the peptidase-containing ATP-binding cassette transporters. This group includes the 6-TMD of the peptidase-containing ATP-binding cassette transporters (PCATs) such as Clostridium thermocellum PCAT1, a polypeptide processing and secretion transporter, and LagD, a bacteriocin ABC transporter from Lactococcus lactis. Bacterial exporters are typically formed by dimers of TMD-NBD half-transporters. Thus, most bacterial ABC transporters are formed of two identical TMDs and two identical NBDs. The transporters involved in protein secretion often contain additional peptidase domains essential for substrate processing. These peptidase domains belong to the cysteine protease superfamily, classified as family C39, bacteriocin-processing peptidase. LagD is highly similar to the peptidase-containing ATP-binding cassette transporters (PCATs). In Gram-positive bacteria, the PCATs are responsible for exporting quorum-sensing or antimicrobial peptides called bacteriocins."
definition: >-
  Six-transmembrane helical domain (6-TMD) of the peptidase-containing ATP-binding cassette transporters. This group includes the 6-TMD of the peptidase-containing ATP-binding cassette transporters (PCATs) such as Clostridium thermocellum PCAT1, a polypeptide processing and secretion transporter, and LagD, a bacteriocin ABC transporter from Lactococcus lactis. Bacterial exporters are typically formed by dimers of TMD-NBD half-transporters. Thus, most bacterial ABC transporters are formed of two identical TMDs and two identical NBDs. The transporters involved in protein secretion often contain additional peptidase domains essential for substrate processing. These peptidase domains belong to the cysteine protease superfamily, classified as family C39, bacteriocin-processing peptidase. LagD is highly similar to the peptidase-containing ATP-binding cassette transporters (PCATs). In Gram-positive bacteria, the PCATs are responsible for exporting quorum-sensing or antimicrobial peptides called bacteriocins. — an NCBI CDD conserved domain (cd18570); members share this curated model.
