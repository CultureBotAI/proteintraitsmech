identifier: CDD:cd22382
label: "type I K homology (KH) RNA-binding domain found in splicing factor 1 (SF1) and similar proteins. SF1, also called branch point-binding protein, or BBP, or transcription factor ZFM1, or zinc finger gene in MEN1 locus, or zinc finger protein 162, is necessary for the ATP-dependent first step of spliceosome assembly. Binds to the intron branch point sequence (BPS) 5'-UACUAAC-3' of the pre-mRNA. It may act as transcription repressor."
definition: >-
  type I K homology (KH) RNA-binding domain found in splicing factor 1 (SF1) and similar proteins. SF1, also called branch point-binding protein, or BBP, or transcription factor ZFM1, or zinc finger gene in MEN1 locus, or zinc finger protein 162, is necessary for the ATP-dependent first step of spliceosome assembly. Binds to the intron branch point sequence (BPS) 5'-UACUAAC-3' of the pre-mRNA. It may act as transcription repressor. — an NCBI CDD conserved domain (cd22382); members share this curated model.
