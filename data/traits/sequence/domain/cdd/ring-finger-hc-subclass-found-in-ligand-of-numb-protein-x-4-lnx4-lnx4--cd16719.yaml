identifier: CDD:cd16719
label: "RING finger, HC subclass, found in ligand of numb protein X 4 (LNX4). LNX4, also known as PDZ domain-containing RING finger protein 4 (PDZRN4), or SEMACAP3-like protein (SEMCAP3L), is an E3 ubiquitin-protein ligase responsible for the ubiquitination and degradation of Numb, a component of the Notch signaling pathway that functions in the specification of cell fates during development and is known to control cell numbers during neurogenesis in vertebrates. LNX4 contains an N-terminal C3HC4-type RING-HC finger, two PDZ domains, and a C-terminal LNX3 homology (LNX3H) domain."
definition: >-
  RING finger, HC subclass, found in ligand of numb protein X 4 (LNX4). LNX4, also known as PDZ domain-containing RING finger protein 4 (PDZRN4), or SEMACAP3-like protein (SEMCAP3L), is an E3 ubiquitin-protein ligase responsible for the ubiquitination and degradation of Numb, a component of the Notch signaling pathway that functions in the specification of cell fates during development and is known to control cell numbers during neurogenesis in vertebrates. LNX4 contains an N-terminal C3HC4-type RING-HC finger, two PDZ domains, and a C-terminal LNX3 homology (LNX3H) domain. — an NCBI CDD conserved domain (cd16719); members share this curated model.
