identifier: CDD:cd15280
label: "vomeronasal type-2 receptor-like proteins, member of the class C family of seven-transmembrane G protein-coupled receptors. This group represents vomeronasal type-2 receptor-like proteins that are closely related to the V2R family of vomeronasal GPCRs. Members of the V2R family of vomeronasal GPCRs are involved in detecting protein pheromones for social and sexual cues between the same species. V2Rs and G-alpha(o) protein are coexpressed in the basal layer of the vomeronasal organ (VNO), which is the sensory organ of the accessory olfactory system present in amphibians, reptiles, and non-primate mammals such as mice and rodents, but it is non-functional or absent in humans, apes, and monkeys. On the other hand, members of the V1R receptor family and G-alpha(i2) protein are co-expressed in the apical neurons of the VNO. Activation of V1R or V2R causes activation of phospholipase pathway, generating the secondary messengers diacylglycerol (DAG) and IP3. However, in contrast to V1Rs, V2Rs contain the long N-terminal extracellular domain, which is believed to bind pheromones. Human V2R1-like protein, also known as putative calcium-sensing receptor-like 1 (CASRL1), is not included here because it is a nonfunctional pseudogene."
