identifier: CDD:cd18622
label: "glycoside hydrolase family 32 protein such as Aspergillus ficuum endo-inulinase (Inu2). This subfamily of glycosyl hydrolase family GH32 includes endo-inulinase (inu2, EC 3.2.1.7), exo-inulinase (Inu1, EC  3.2.1.80), invertase (EC 3.2.1.26), and levan fructotransferase (LftA, EC 4.2.2.16), among others. These enzymes cleave sucrose into fructose and glucose via beta-fructofuranosidase activity, producing invert sugar that is a mixture of dextrorotatory D-glucose and levorotatory D-fructose, thus named invertase (EC 3.2.1.26). These retaining enzymes (i.e. they retain the configuration at anomeric carbon atom of the substrate) catalyze hydrolysis in two steps involving a covalent glycosyl enzyme intermediate: an aspartate located close to the N-terminus acts as the catalytic nucleophile and a glutamate acts as the general acid/base; a conserved aspartate residue in the Arg-Asp-Pro (RDP) motif stabilizes the transition state. These enzymes are predicted to display a 5-fold beta-propeller fold as found for GH43 and CH68. The breakdown of sucrose is widely used as a carbon or energy source by bacteria, fungi, and plants. Invertase is used commercially in the confectionery industry, since fructose has a sweeter taste than sucrose and a lower tendency  to crystallize. A common structural feature of all these enzymes is a 5-bladed beta-propeller domain, similar to GH43, that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller."
definition: >-
  glycoside hydrolase family 32 protein such as Aspergillus ficuum endo-inulinase (Inu2). This subfamily of glycosyl hydrolase family GH32 includes endo-inulinase (inu2, EC 3.2.1.7), exo-inulinase (Inu1, EC 3.2.1.80), invertase (EC 3.2.1.26), and levan fructotransferase (LftA, EC 4.2.2.16), among others. These enzymes cleave sucrose into fructose and glucose via beta-fructofuranosidase activity, producing invert sugar that is a mixture of dextrorotatory D-glucose and levorotatory D-fructose, thus named invertase (EC 3.2.1.26). These retaining enzymes (i.e. they retain the configuration at anomeric carbon atom of the substrate) catalyze hydrolysis in two steps involving a covalent glycosyl enzyme intermediate: an aspartate located close to the N-terminus acts as the catalytic nucleophile and a glutamate acts as the general acid/base; a conserved aspartate residue in the Arg-Asp-Pro (RDP) motif stabilizes the transition state. These enzymes are predicted to display a 5-fold beta-propeller fold as found for GH43 and CH68. The breakdown of sucrose is widely used as a carbon or energy source by bacteria, fungi, and plants. Invertase is used commercially in the confectionery industry, since fructose has a sweeter taste than sucrose and a lower tendency to crystallize. A common structural feature of all these enzymes is a 5-bladed beta-propeller domain, similar to GH43, that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller. — an NCBI CDD conserved domain (cd18622); members share this curated model.
