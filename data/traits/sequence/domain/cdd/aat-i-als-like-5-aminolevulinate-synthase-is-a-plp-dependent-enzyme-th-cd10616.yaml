identifier: CDD:cd10616
label: "AAT_I. ALS_like: 5-aminolevulinate_synthase is a PLP dependent enzyme that catalyzes the condensation of succinyl-CoA and glycine to yield 5-aminolevulinic acid in mitochondria of variety of species, including animals, fungi and some protists and in alpha-proteobacteria. Mutagenesis along with structure homology modeling studies have shown that the enzyme is a homodimer with the activesite located at the dimer interface. Members of this group are found in bacteria and eukaryotes."
definition: >-
