identifier: CDD:cd06286
label: "ligand-binding domain of a novel transcription factor implicated in catabolite repression in Bacillus and Clostridium species. This group includes the ligand-binding domain of a novel transcription factor implicated in catabolite repression in Bacillus and Clostridium species. Catabolite control protein B (CcpB) is 30% identical in sequence to CcpA which functions as the major transcriptional regulator of carbon catabolite repression/regulation (CCR), a process in which enzymes necessary for the metabolism of alternative sugars are inhibited in the presence of glucose. Like CcpA, the DNA-binding protein CcpB exerts its catabolite-repressing effect by a mechanism dependent on the presence of HPr(Ser-P), the small phosphocarrier proteins of the phosphoenolpyruvate-sugar phosphotransferase system, but with a less significant degree."
definition: >-
