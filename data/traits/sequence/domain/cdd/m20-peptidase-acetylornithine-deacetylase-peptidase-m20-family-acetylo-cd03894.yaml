identifier: CDD:cd03894
label: "M20 Peptidase acetylornithine deacetylase. Peptidase M20 family, acetylornithine deacetylase (ArgE, Acetylornithinase, AO, N2-acetyl-L-ornithine amidohydrolase, EC 3.5.1.16) subfamily. ArgE catalyzes the conversion of N-acetylornithine to ornithine, which can then be incorporated into the urea cycle for the final stage of arginine synthesis. The substrate specificity of ArgE is quite broad; several alpha-N-acyl-L-amino acids can be hydrolyzed, including alpha-N-acetylmethionine and alpha-N-formylmethionine. ArgE shares significant sequence homology and biochemical features, and possibly a common origin, with glutamate carboxypeptidase (CPG2) and succinyl-diaminopimelate desuccinylase (DapE), and aminoacylase I (ACY1), having all metal ligand binding residues conserved."
definition: >-
