identifier: CDD:cd05719
label: "Second immunoglobulin (Ig) domain of poliovirus receptor (PVR, also known as CD155 and Necl-5), and similar domains; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the second immunoglobulin (Ig) domain of poliovirus receptor (PVR, also known as CD155 and nectin-like protein 5 (Necl-5)) and similar proteins. Poliovirus (PV) binds to its cellular receptor (PVR/CD155) to initiate infection. CD155 is a membrane-anchored, single-span glycoprotein; its extracellular region has three Ig-like domains. There are four different isotypes of CD155 (referred to as alpha, beta, gamma, and delta), these result from alternate splicing of the CD155 mRNA, and have identical extracellular domains. CD155-beta and CD155-gamma are secreted, while CD155-alpha and CD155-delta are membrane-bound and function as PV receptors. The virus recognition site is contained in the amino-terminal domain, D1. Having the virus attachment site on the receptor distal from the plasma membrane may be important for successful initiation of infection of cells by the virus. CD155 binds in the poliovirus \"canyon\" and has a footprint similar to that of the intercellular adhesion molecule-1 receptor on human rhinoviruses. This group also includes the second Ig-like domain of nectin-1, also known as poliovirus receptor related protein(PVRL)1 or CD111."
definition: >-
  Second immunoglobulin (Ig) domain of poliovirus receptor (PVR, also known as CD155 and Necl-5), and similar domains; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the second immunoglobulin (Ig) domain of poliovirus receptor (PVR, also known as CD155 and nectin-like protein 5 (Necl-5)) and similar proteins. Poliovirus (PV) binds to its cellular receptor (PVR/CD155) to initiate infection. CD155 is a membrane-anchored, single-span glycoprotein; its extracellular region has three Ig-like domains. There are four different isotypes of CD155 (referred to as alpha, beta, gamma, and delta), these result from alternate splicing of the CD155 mRNA, and have identical extracellular domains. CD155-beta and CD155-gamma are secreted, while CD155-alpha and CD155-delta are membrane-bound and function as PV receptors. The virus recognition site is contained in the amino-terminal domain, D1. Having the virus attachment site on the receptor distal from the plasma membrane may be important for successful initiation of infection of cells by the virus. CD155 binds in the poliovirus "canyon" and has a footprint similar to that of the intercellular adhesion molecule-1 receptor on human rhinoviruses. This group also includes the second Ig-like domain of nectin-1, also known as poliovirus receptor related protein(PVRL)1 or CD111. — an NCBI CDD conserved domain (cd05719); members share this curated model.
