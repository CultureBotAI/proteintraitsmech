identifier: CDD:cd17957
label: "DEAD-box helicase domain of DEAD box protein 52. DDX52 (also called ROK1 and HUSSY19) is ubiquitously expressed in testis, endometrium, and other tissues in humans. DDX52 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of DEAD box protein 52. DDX52 (also called ROK1 and HUSSY19) is ubiquitously expressed in testis, endometrium, and other tissues in humans. DDX52 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17957); members share this curated model.
