identifier: CDD:cd11262
label: "The Sema domain, a protein interacting module, of semaphorin 4G (Sema4G). The Sema4G and Sema4C genes are expressed in the developing cerebellar cortex. Sema4G and Sema4C proteins specifically bind to Plexin B2 expressed in the cerebellar granule cells. Sema4G and Sema4C are involved in neural tube closure and cerebellar granule cell development through Plexin B2.Sema4G belongs to the class 4 transmembrane semaphorin family of proteins. Semaphorins are regulatory molecules involved in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of semaphorin 4G (Sema4G). The Sema4G and Sema4C genes are expressed in the developing cerebellar cortex. Sema4G and Sema4C proteins specifically bind to Plexin B2 expressed in the cerebellar granule cells. Sema4G and Sema4C are involved in neural tube closure and cerebellar granule cell development through Plexin B2.Sema4G belongs to the class 4 transmembrane semaphorin family of proteins. Semaphorins are regulatory molecules involved in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module. — an NCBI CDD conserved domain (cd11262); members share this curated model.
