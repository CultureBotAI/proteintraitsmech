identifier: CDD:cd00357
label: "Ribosomal protein uS10. Ribosomal protein S10, also known as uS10, is an essential component of the 30S ribosomal subunit in both prokaryotes and eukaryotes. Its ortholog in eukaryotes is known as S20. uS10 has homologs in mitochondria (uS10m) and chloroplasts (uS10c). Despite some ribosomal proteins being dispensable, S10 is crucial for cell survival due to its role in the final assembly of the 30S subunit and as one of the last six proteins added to the precursor. S10 is involved in both translation and transcription, serving as an antitermination factor in the latter. Although the unstructured loop of S10 is present in all life kingdoms, its sequence is not highly conserved. A mutant S10 lacking the ribosome-binding loop is unable to support cell growth."
definition: >-
  Ribosomal protein uS10. Ribosomal protein S10, also known as uS10, is an essential component of the 30S ribosomal subunit in both prokaryotes and eukaryotes. Its ortholog in eukaryotes is known as S20. uS10 has homologs in mitochondria (uS10m) and chloroplasts (uS10c). Despite some ribosomal proteins being dispensable, S10 is crucial for cell survival due to its role in the final assembly of the 30S subunit and as one of the last six proteins added to the precursor. S10 is involved in both translation and transcription, serving as an antitermination factor in the latter. Although the unstructured loop of S10 is present in all life kingdoms, its sequence is not highly conserved. A mutant S10 lacking the ribosome-binding loop is unable to support cell growth. — an NCBI CDD conserved domain (cd00357); members share this curated model.
