identifier: CDD:cd09739
label: Cas6_I-F
definition: >-
  CRISPR/Cas system-associated RAMP superfamily protein Cas6f. CRISPR (Clustered Regularly Interspaced Short Palindromic Repeats) and associated Cas proteins comprise a system for heritable host defense by prokaryotic cells against phage and other foreign DNA; Cas6f is an endoribonuclease that generates crRNA; This family is specific for CRISPR/Cas system I-F subtype; Possesses RRM fold; also known as Csy4 family
