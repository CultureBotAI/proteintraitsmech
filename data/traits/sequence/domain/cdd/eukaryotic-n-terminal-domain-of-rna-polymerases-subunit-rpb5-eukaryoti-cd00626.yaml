identifier: CDD:cd00626
label: RNA_pol_Rpb5_N
definition: >-
  Eukaryotic N-terminal domain of RNA polymerases subunit Rpb5. Eukaryotic RNA polymerases are multisubunits enzymes that synthesize different types of RNAs. RNA pol I, II, and III are composed of protein subunits with a catalytic core formed by the two largest subunits, which are highly conserved throughout evolution, and five common subunits to the three enzymes. The RPB5 subunit of RNA polymerase has a bipartite structure which includes a eukaryote-specific N-terminal domain and a C-terminal "assembly" domain resembling the archaeal subunit H. The N-terminal domain is involved in DNA binding and is part of the jaw module in the RNA polymerase II structure, which is important for positioning of downstream DNA. RPB5 also serves as an interaction target for transcription factors that bind RNA polymerase at a given promoter. RPB5 is largely exposed to interactions with general transcription factors or possibly with specific gene regulators such as TFIIF and Taf15. RPB5 is referred to as a universal subunit because it is present in all three eukaryotic RNA polymerases
