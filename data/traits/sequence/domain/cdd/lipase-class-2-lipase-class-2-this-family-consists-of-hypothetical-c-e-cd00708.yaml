identifier: CDD:cd00708
label: "Lipase class 2. Lipase (class 2). This family consists of hypothetical C. elegans proteins and lipases. Lipases or triacylglycerol acylhydrolases hydrolyze ester bonds in triacylglycerol giving diacylglycerol, monoacylglycerol, glycerol and free fatty acids.   A typical feature of lipases is \"interfacial activation,\" the process of becoming active at the lipid/water interface, although several examples of lipases have been identified that do not undergo interfacial activation .  The active site of a lipase contains a catalytic triad consisting of Ser - His - Asp/Glu, but unlike most serine proteases, the active site is buried inside the structure.  A \"lid\" or \"flap\" usually covers the active site, making it inaccessible to solvent and substrates. The lid opens during the process of interfacial activation, allowing the lipid substrate access to the active site."
definition: >-
  Lipase class 2. Lipase (class 2). This family consists of hypothetical C. elegans proteins and lipases. Lipases or triacylglycerol acylhydrolases hydrolyze ester bonds in triacylglycerol giving diacylglycerol, monoacylglycerol, glycerol and free fatty acids. A typical feature of lipases is "interfacial activation," the process of becoming active at the lipid/water interface, although several examples of lipases have been identified that do not undergo interfacial activation . The active site of a lipase contains a catalytic triad consisting of Ser - His - Asp/Glu, but unlike most serine proteases, the active site is buried inside the structure. A "lid" or "flap" usually covers the active site, making it inaccessible to solvent and substrates. The lid opens during the process of interfacial activation, allowing the lipid substrate access to the active site. — an NCBI CDD conserved domain (cd00708); members share this curated model.
