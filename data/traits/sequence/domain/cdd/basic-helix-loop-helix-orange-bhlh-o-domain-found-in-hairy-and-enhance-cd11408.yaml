identifier: CDD:cd11408
label: "basic helix-loop-helix-orange (bHLH-O) domain found in hairy and enhancer of split-related protein HELT and similar proteins. HELT, also termed HES/HEY-like transcription factor, is a bHLH-O transcriptional repressor expressed in the developing central nervous system. It binds preferentially to the canonical E box sequence 5'-CACGCG-3' and regulates neuronal differentiation and/or identity. HELT could homodimerize and heterodimerize with other bHLH-O protein such as HES-5 or HEY-2 and bound to E box to repress gene transcription."
definition: >-
  basic helix-loop-helix-orange (bHLH-O) domain found in hairy and enhancer of split-related protein HELT and similar proteins. HELT, also termed HES/HEY-like transcription factor, is a bHLH-O transcriptional repressor expressed in the developing central nervous system. It binds preferentially to the canonical E box sequence 5'-CACGCG-3' and regulates neuronal differentiation and/or identity. HELT could homodimerize and heterodimerize with other bHLH-O protein such as HES-5 or HEY-2 and bound to E box to repress gene transcription. — an NCBI CDD conserved domain (cd11408); members share this curated model.
