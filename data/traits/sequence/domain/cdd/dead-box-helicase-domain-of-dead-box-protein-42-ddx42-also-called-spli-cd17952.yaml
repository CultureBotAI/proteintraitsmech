identifier: CDD:cd17952
label: "DEAD-box helicase domain of DEAD box protein 42. DDX42 (also called Splicing Factor 3B-Associated 125 kDa Protein, RHELP, or RNAHP) is an NTPase with a preference for ATP, the hydrolysis of which is enhanced by various RNA substrates. It acts as a non-processive RNA helicase with protein displacement and RNA annealing activities. DDX42 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of DEAD box protein 42. DDX42 (also called Splicing Factor 3B-Associated 125 kDa Protein, RHELP, or RNAHP) is an NTPase with a preference for ATP, the hydrolysis of which is enhanced by various RNA substrates. It acts as a non-processive RNA helicase with protein displacement and RNA annealing activities. DDX42 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17952); members share this curated model.
