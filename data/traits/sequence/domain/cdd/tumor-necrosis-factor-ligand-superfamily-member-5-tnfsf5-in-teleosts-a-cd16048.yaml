identifier: CDD:cd16048
label: "Tumor necrosis factor ligand superfamily member 5 (TNFSF5) in teleosts, also known as CD40 ligand (CD40L). This family contains TNFSF5 (also known as CD40 ligand or CD40L, CD154, Ly62, HIGM1, T-BAM) found only in teleosts (i.e. ray-finned, bony fish). Localized or genome-wide duplication and evolution of the TNFSF members appear to have paralleled the emergence of the adaptive immune system.  Teleost CD40L and its cognate receptor, TNFRSF5/CD40, are widely expressed, particularly in immune tissues, with highest constitutive expression observed in the spleen, peripheral blood leukocytes, gill, posterior and anterior kidney, and to a lesser extent, in the skin, heart, liver, and intestinal tissues. In tetrapods, TNFSF5/CD40L is primarily expressed on activated CD4+ T lymphocytes where it is tightly regulated, but also found on a wide variety of cells, including monocytes, activated B-cells, epithelial and vascular endothelial cells, smooth muscle cells and dendritic cells (DCs). Expression on activated platelets may participate in the pathogenesis of thrombotic diseases. Binding of CD40L to CD40 on the surface of activated T cells initiates a variety of signals in B cells including the activation of MAP kinases and NF-kB. It promotes B-cell survival and activation, drives rapid expansion of antigen-activated B-cells and facilitates plasma cells and memory B-cell differentiation. A primary defect in the CD40/CD40L system is associated with X-linked hyper-IgM (XHIGM) syndrome, caused by mutations in the CD40L locus; disease manifestations include over-representation of circulating IgM and the inability to produce IgG, IgA and IgE. Increased levels of soluble CD40L are found in serum or plasma of patients suffering from systemic lupus erythematosus (SLE), Sjogren's syndrome (SS), inflammatory bowel disease (IBD) and cardiovascular disease. Upregulated levels of CD40/CD40L on B cells and T cells may play an important role in the immune pathogenesis of breast cancer. In patients with cardiovascular disease increased serum CD40L indicates an increased risk of cardiovascular events and susceptibility for vascular damage. CD40L is upregulated in T-cells of patients suffering from autoimmune diseases, such as peripheral blood mononuclear cells (PBMCs) of SLE patients and rheumatoid arthritis (RA) joints. Consequently, the CD40/CD40L system serves as a link between tumorigenesis, atherosclerosis and the immune system, and offers a potential target for drug therapy for related diseases, such as cancer, atherosclerosis, diabetes mellitus, and immunological rejection."
definition: >-
  Tumor necrosis factor ligand superfamily member 5 (TNFSF5) in teleosts, also known as CD40 ligand (CD40L). This family contains TNFSF5 (also known as CD40 ligand or CD40L, CD154, Ly62, HIGM1, T-BAM) found only in teleosts (i.e. ray-finned, bony fish). Localized or genome-wide duplication and evolution of the TNFSF members appear to have paralleled the emergence of the adaptive immune system. Teleost CD40L and its cognate receptor, TNFRSF5/CD40, are widely expressed, particularly in immune tissues, with highest constitutive expression observed in the spleen, peripheral blood leukocytes, gill, posterior and anterior kidney, and to a lesser extent, in the skin, heart, liver, and intestinal tissues. In tetrapods, TNFSF5/CD40L is primarily expressed on activated CD4+ T lymphocytes where it is tightly regulated, but also found on a wide variety of cells, including monocytes, activated B-cells, epithelial and vascular endothelial cells, smooth muscle cells and dendritic cells (DCs). Expression on activated platelets may participate in the pathogenesis of thrombotic diseases. Binding of CD40L to CD40 on the surface of activated T cells initiates a variety of signals in B cells including the activation of MAP kinases and NF-kB. It promotes B-cell survival and activation, drives rapid expansion of antigen-activated B-cells and facilitates plasma cells and memory B-cell differentiation. A primary defect in the CD40/CD40L system is associated with X-linked hyper-IgM (XHIGM) syndrome, caused by mutations in the CD40L locus; disease manifestations include over-representation of circulating IgM and the inability to produce IgG, IgA and IgE. Increased levels of soluble CD40L are found in serum or plasma of patients suffering from systemic lupus erythematosus (SLE), Sjogren's syndrome (SS), inflammatory bowel disease (IBD) and cardiovascular disease. Upregulated levels of CD40/CD40L on B cells and T cells may play an important role in the immune pathogenesis of breast cancer. In patients with cardiovascular disease increased serum CD40L indicates an increased risk of cardiovascular events and susceptibility for vascular damage. CD40L is upregulated in T-cells of patients suffering from autoimmune diseases, such as peripheral blood mononuclear cells (PBMCs) of SLE patients and rheumatoid arthritis (RA) joints. Consequently, the CD40/CD40L system serves as a link between tumorigenesis, atherosclerosis and the immune system, and offers a potential target for drug therapy for related diseases, such as cancer, atherosclerosis, diabetes mellitus, and immunological rejection. — an NCBI CDD conserved domain (cd16048); members share this curated model.
