identifier: CDD:cd23822
label: RWD_ScYIH1-like
definition: >-
  RWD domain of Saccharomyces cerevisiae protein YIH1 and related proteins. YIH1, also called protein IMPACT homolog, is an actin-binding protein that acts as a translational regulator which ensures constant high levels of translation under amino acid starvation. It plays a role as a negative regulator of GCN2 kinase activity. It impairs GCN1-mediated GCN2 activation, and hence GCN2-mediated eIF-2-alpha phosphorylation in amino acid-starved cells and subsequent down-regulation of protein synthesis. In normal conditions, it resides in an actin complex and has no activity
