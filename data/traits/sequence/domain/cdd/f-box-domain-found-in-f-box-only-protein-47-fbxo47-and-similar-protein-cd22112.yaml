identifier: CDD:cd22112
label: F-box_FBXO47
definition: >-
  F-box domain found in F-box only protein 47 (FBXO47) and similar proteins. FBXO47, also called FBX47, functions as the substrate-recognition component of an SCF (SKP1-cullin-F-box) protein ligase complex. It probably recognizes and binds to some phosphorylated proteins and promotes their ubiquitination and degradation. It has a potential role as a tumor-suppressor gene. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression
