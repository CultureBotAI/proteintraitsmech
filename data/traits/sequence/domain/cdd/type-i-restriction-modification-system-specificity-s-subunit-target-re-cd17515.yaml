identifier: CDD:cd17515
label: "Type I restriction-modification system specificity (S) subunit Target Recognition Domain-ConseRved domain (TRD-CR), similar to MjaXIP/S.MjaORF132P TRD1-CR1, S.Sau1132ORF3780P TRD1-CR1, S.Mca353ORF290P TRD1-CR1, and other TRD-CR's. The Staphylococcus aureus subsp. aureus MSHR1132 S subunit (S.Sau1132ORF3780P) recognizes 5'... CAAGNNNNNRTC ... 3', and Moraxella catarrhalis S subunit (S.Mca353ORF290P) recognizes 5'... CAAGNNNNNNTGT ... 3'. The recognition sequence of Methanococcus jannaschii S subunit (MjaXIP/S.MjaORF132P) is undetermined. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. For example, S.Sau1132ORF3780P-TRD1 recognizes CAAG/CTTG, and S.Sau1132ORF3780P-TRD2 recognizes GAY/RTC. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains both TRD1-CR1 and TRD2-CR2. It may also include TRD-CR-like sequence-recognition domains of various type II restriction enzymes and methyltransferases and type I DNA methyltransferases."
definition: >-
