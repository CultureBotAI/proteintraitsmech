identifier: CDD:cd17134
label: "Ras-binding domain (RBD) found in serine/threonine-protein kinase BRAF. BRAF, also termed proto-oncogene B-Raf, or p94, or v-Raf murine sarcoma viral oncogene homolog B1, belongs to the RAF family. The RAF family includes three RAF kinases ARAF, BRAF, and RAF1/CRAF, encoded by proto-oncogenes, which activate the mitogen-activated protein kinase/extracellular-signal-regulated kinase (MAPK/ERK) cascade downstream of RAS. They share a common structure consisting of an N-terminal regulatory domain and a C-terminal kinase domain. There are three conserved regions (CR1-3) in the regulatory domain, CR1 contains a Ras-binding domain (RBD) and a cysteine-rich domain (CRD), CR2 is a serine/threonine-rich domain, and CR3 encodes the kinase domain required for RAF. The RBD of RAF has a beta-grasp ubiquitin-like fold, a common structure involved in protein-protein interactions.  BRAF is the most effective RAF kinase in terms of induction of MEK/ERK activity. It is somatically mutated in a number of human cancers."
definition: >-
  Ras-binding domain (RBD) found in serine/threonine-protein kinase BRAF. BRAF, also termed proto-oncogene B-Raf, or p94, or v-Raf murine sarcoma viral oncogene homolog B1, belongs to the RAF family. The RAF family includes three RAF kinases ARAF, BRAF, and RAF1/CRAF, encoded by proto-oncogenes, which activate the mitogen-activated protein kinase/extracellular-signal-regulated kinase (MAPK/ERK) cascade downstream of RAS. They share a common structure consisting of an N-terminal regulatory domain and a C-terminal kinase domain. There are three conserved regions (CR1-3) in the regulatory domain, CR1 contains a Ras-binding domain (RBD) and a cysteine-rich domain (CRD), CR2 is a serine/threonine-rich domain, and CR3 encodes the kinase domain required for RAF. The RBD of RAF has a beta-grasp ubiquitin-like fold, a common structure involved in protein-protein interactions. BRAF is the most effective RAF kinase in terms of induction of MEK/ERK activity. It is somatically mutated in a number of human cancers. — an NCBI CDD conserved domain (cd17134); members share this curated model.
