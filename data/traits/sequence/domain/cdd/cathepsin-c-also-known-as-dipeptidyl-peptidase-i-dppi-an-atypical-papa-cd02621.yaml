identifier: CDD:cd02621
label: "Cathepsin C; also known as Dipeptidyl Peptidase I (DPPI), an atypical papain-like cysteine peptidase with chloride dependency and dipeptidyl aminopeptidase activity, resulting from its tetrameric structure which limits substrate access. Each subunit of the tetramer is composed of three peptides: the heavy and light chains, which together adopts the papain fold and forms the catalytic domain; and the residual propeptide region, which forms a beta barrel and points towards the substrate's N-terminus. The subunit composition is the result of the unique characteristic of procathepsin C maturation involving the cleavage of the catalytic domain and the non-autocatalytic excision of an activation peptide within its propeptide region. By removing N-terminal dipeptide extensions, cathepsin C activates granule serine peptidases (granzymes) involved in cell-mediated apoptosis, inflammation and tissue remodelling. Loss-of-function mutations in cathepsin C are associated with Papillon-Lefevre and Haim-Munk syndromes, rare diseases characterized by hyperkeratosis and early-onset periodontitis. Cathepsin C is widely expressed in many tissues with high levels in lung, kidney and placenta. It is also highly expressed in cytotoxic lymphocytes and mature myeloid cells."
definition: >-
  Cathepsin C; also known as Dipeptidyl Peptidase I (DPPI), an atypical papain-like cysteine peptidase with chloride dependency and dipeptidyl aminopeptidase activity, resulting from its tetrameric structure which limits substrate access. Each subunit of the tetramer is composed of three peptides: the heavy and light chains, which together adopts the papain fold and forms the catalytic domain; and the residual propeptide region, which forms a beta barrel and points towards the substrate's N-terminus. The subunit composition is the result of the unique characteristic of procathepsin C maturation involving the cleavage of the catalytic domain and the non-autocatalytic excision of an activation peptide within its propeptide region. By removing N-terminal dipeptide extensions, cathepsin C activates granule serine peptidases (granzymes) involved in cell-mediated apoptosis, inflammation and tissue remodelling. Loss-of-function mutations in cathepsin C are associated with Papillon-Lefevre and Haim-Munk syndromes, rare diseases characterized by hyperkeratosis and early-onset periodontitis. Cathepsin C is widely expressed in many tissues with high levels in lung, kidney and placenta. It is also highly expressed in cytotoxic lymphocytes and mature myeloid cells. — an NCBI CDD conserved domain (cd02621); members share this curated model.
