identifier: CDD:cd14193
label: "Catalytic domain of the Serine/Threonine Kinase, Myosin Light Chain Kinase 4. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MLCK phosphorylates myosin regulatory light chain and controls the contraction of all muscle types. In vertebrates, different MLCKs function in smooth (MLCK1), skeletal (MLCK2), and cardiac (MLCK3) muscles. A fourth protein, MLCK4, has also been identified through comprehensive genome analysis although it has not been biochemically characterized. MLCK4  (or MYLK4 or SgK085) contains a single kinase domain near the C-terminus. The MLCK4 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Myosin Light Chain Kinase 4. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MLCK phosphorylates myosin regulatory light chain and controls the contraction of all muscle types. In vertebrates, different MLCKs function in smooth (MLCK1), skeletal (MLCK2), and cardiac (MLCK3) muscles. A fourth protein, MLCK4, has also been identified through comprehensive genome analysis although it has not been biochemically characterized. MLCK4 (or MYLK4 or SgK085) contains a single kinase domain near the C-terminus. The MLCK4 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14193); members share this curated model.
