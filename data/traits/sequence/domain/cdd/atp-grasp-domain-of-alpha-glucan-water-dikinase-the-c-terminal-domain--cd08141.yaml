identifier: CDD:cd08141
label: "ATP-grasp domain of alpha-glucan water dikinase. The C-terminal domain of alpha-glucan water dikinase (GWD) is similar to the nucleotide-binding domain of the ATP-grasp superfamily. GWD (EC 2.7.9.4), catalyzes the the phosphorylation of starch by a dikinase-type reaction mechanism in which the beta-phosphate of ATP is transferred to the glucosyl residue of starch. GWD shows similarity in both sequence and overall reaction mechanism to bacterial PPS (pyruvate, water dikinase) and PPDK (pyruvate, phosphate dikinase). His-992 of potato GWD plays an important role in catalysis by generating stable phosphohistidine intermediate. It appears that the GWD family arose after the divergence of the plant kingdom."
definition: >-
  ATP-grasp domain of alpha-glucan water dikinase. The C-terminal domain of alpha-glucan water dikinase (GWD) is similar to the nucleotide-binding domain of the ATP-grasp superfamily. GWD (EC 2.7.9.4), catalyzes the the phosphorylation of starch by a dikinase-type reaction mechanism in which the beta-phosphate of ATP is transferred to the glucosyl residue of starch. GWD shows similarity in both sequence and overall reaction mechanism to bacterial PPS (pyruvate, water dikinase) and PPDK (pyruvate, phosphate dikinase). His-992 of potato GWD plays an important role in catalysis by generating stable phosphohistidine intermediate. It appears that the GWD family arose after the divergence of the plant kingdom. — an NCBI CDD conserved domain (cd08141); members share this curated model.
