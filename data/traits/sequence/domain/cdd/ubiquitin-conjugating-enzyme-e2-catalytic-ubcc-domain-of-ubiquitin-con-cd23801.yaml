identifier: CDD:cd23801
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 L3, L5, L6 and related proteins. The E2L3-like subfamily includes mammalian ubiquitin-conjugating enzymes E2 L3 (UBE2L3/UBCH7/UBCE7), L5 (UBE2L5), L6 (UBE2L6/UBCH8), and similar proteins. They are ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. UBE2L3 specifically acts with HECT-type and RBR family E3 ubiquitin-protein ligases. It does not function with most RING-containing E3 ubiquitin-protein ligases because it lacks intrinsic E3-independent reactivity with lysine: in contrast, it has activity with the RBR family E3 enzymes, such as PRKN and ARIH1, that function like RING-HECT hybrids. In vitro, UBE2L3 catalyzes 'Lys-11'-linked polyubiquitination. It is involved in the selective degradation of short-lived and abnormal proteins. In addition to ubiquitin, UBE2L6 also catalyzes the covalent attachment of ISG15 to other proteins. It functions in the E6/E6-AP-induced ubiquitination of p53/TP53. It promotes ubiquitination and subsequent proteasomal degradation of FLT3."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 L3, L5, L6 and related proteins. The E2L3-like subfamily includes mammalian ubiquitin-conjugating enzymes E2 L3 (UBE2L3/UBCH7/UBCE7), L5 (UBE2L5), L6 (UBE2L6/UBCH8), and similar proteins. They are ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. UBE2L3 specifically acts with HECT-type and RBR family E3 ubiquitin-protein ligases. It does not function with most RING-containing E3 ubiquitin-protein ligases because it lacks intrinsic E3-independent reactivity with lysine: in contrast, it has activity with the RBR family E3 enzymes, such as PRKN and ARIH1, that function like RING-HECT hybrids. In vitro, UBE2L3 catalyzes 'Lys-11'-linked polyubiquitination. It is involved in the selective degradation of short-lived and abnormal proteins. In addition to ubiquitin, UBE2L6 also catalyzes the covalent attachment of ISG15 to other proteins. It functions in the E6/E6-AP-induced ubiquitination of p53/TP53. It promotes ubiquitination and subsequent proteasomal degradation of FLT3. — an NCBI CDD conserved domain (cd23801); members share this curated model.
