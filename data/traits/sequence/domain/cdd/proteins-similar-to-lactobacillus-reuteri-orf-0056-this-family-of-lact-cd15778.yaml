  Proteins similar to Lactobacillus reuteri ORF 0056. This family of Lactobacillus proteins has not been characterized. The 3D structure has been solved for a hypothetical protein with a predicted signal peptide, as part of a wider examination of the structural biology of commensal human gut flora and pathogens
