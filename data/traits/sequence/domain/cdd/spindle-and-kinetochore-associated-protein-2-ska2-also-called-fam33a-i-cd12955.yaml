identifier: CDD:cd12955
label: "Spindle and kinetochore-associated protein 2. SKA2, also called FAM33A, is a component of the SKA complex, which is formed by the association of three subunits (SKA1, SKA2, annd SKA3). The SKA complex is essential for accurate cell division. It functions with the Ndc80 network to establish stable kinetochore-microtubule interactions, which are crucial for the highly orchestrated chromosome movements during mitosis. The biological unit is a W-shaped homodimer of the three-subunit complex. SKA2 has also been identified as a glucocorticoid receptor-interacting protein and may be involved in regulating cancer cell proliferation."
definition: >-
