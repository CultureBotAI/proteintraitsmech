identifier: CDD:cd03681
label: "Coenzyme B12-dependent-methylmalonyl coenzyme A (CoA) mutase (MCM) family, MeaA-like subfamily; contains various methylmalonyl coenzyme A (CoA) mutase (MCM)-like proteins similar to the Streptomyces cinnamonensis MeaA, Methylobacterium extorquens MeaA and Streptomyces collinus B12-dependent mutase. Members of this subfamily contain an N-terminal MCM domain and a C-terminal coenzyme B12 binding domain. S. cinnamonensis MeaA is a putative B12-dependent mutase which provides methylmalonyl-CoA precursors for the biosynthesis of the monensin polyketide via an unknown pathway. S. collinus B12-dependent mutase may be involved in a pathway for acetate assimilation."
definition: >-
  Coenzyme B12-dependent-methylmalonyl coenzyme A (CoA) mutase (MCM) family, MeaA-like subfamily; contains various methylmalonyl coenzyme A (CoA) mutase (MCM)-like proteins similar to the Streptomyces cinnamonensis MeaA, Methylobacterium extorquens MeaA and Streptomyces collinus B12-dependent mutase. Members of this subfamily contain an N-terminal MCM domain and a C-terminal coenzyme B12 binding domain. S. cinnamonensis MeaA is a putative B12-dependent mutase which provides methylmalonyl-CoA precursors for the biosynthesis of the monensin polyketide via an unknown pathway. S. collinus B12-dependent mutase may be involved in a pathway for acetate assimilation. — an NCBI CDD conserved domain (cd03681); members share this curated model.
