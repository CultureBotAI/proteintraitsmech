identifier: CDD:cd05320
label: GFOR_like_oxidoreductase
definition: >-
  GFOR_like_oxidoreductase. Glucose-Fructose Oxidoreductase (GFOR) and related proteins; GFOR is a homotetrameric enzyme that catalyzes the NADP+-dependent oxidation of glucose to gluconolactone and reduction of fructose to sorbitol, in a ping-pong mechanism. GFOR is translocated, via a signal peptide directed, sec-independent pathway, in a fully folded, active form with its cofactor tightly bound, to the periplasm, where it functions to produce sorbitol for osmoprotection and gluconolactone for degradation via the Entner-Doudoroff pathway. GFOR contains two domains: an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and is a member of the glucose-fructose oxidoreductase family of proteins
