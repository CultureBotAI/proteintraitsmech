identifier: CDD:cd22208
label: "C-terminal XL-box (XopL E3 ligase box) domain of Xanthomonas type III effector Xcv3220 (XopL) and similar proteins. XopL is a novel type III effector from the model plant pathogen Xanthomonas campestris pv. Vesicatoria. It exhibits E3 ubiquitin ligase activity in vitro and in planta, induces plant cell death and subverts plant immunity. The model corresponds to the C-terminal domain (CTD) of XopL, which revealed a single domain with a novel fold, termed XL-box (XopL E3 ligase box).  The lack of cysteine residues in the XL-box suggests the absence of thioester-linked ubiquitin-E3 ligase intermediates and a non-catalytic mechanism for XopL-mediated ubiquitination. The CTD specifically interacts with plant E2 ubiquitin conjugating enzymes and mediates formation of predominantly K11-linked polyubiquitin chains."
definition: >-
  C-terminal XL-box (XopL E3 ligase box) domain of Xanthomonas type III effector Xcv3220 (XopL) and similar proteins. XopL is a novel type III effector from the model plant pathogen Xanthomonas campestris pv. Vesicatoria. It exhibits E3 ubiquitin ligase activity in vitro and in planta, induces plant cell death and subverts plant immunity. The model corresponds to the C-terminal domain (CTD) of XopL, which revealed a single domain with a novel fold, termed XL-box (XopL E3 ligase box). The lack of cysteine residues in the XL-box suggests the absence of thioester-linked ubiquitin-E3 ligase intermediates and a non-catalytic mechanism for XopL-mediated ubiquitination. The CTD specifically interacts with plant E2 ubiquitin conjugating enzymes and mediates formation of predominantly K11-linked polyubiquitin chains. — an NCBI CDD conserved domain (cd22208); members share this curated model.
