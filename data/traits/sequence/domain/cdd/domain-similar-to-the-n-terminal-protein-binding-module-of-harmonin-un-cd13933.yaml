identifier: CDD:cd13933
label: harmonin_N_like_u1
definition: >-
  domain similar to the N-terminal protein-binding module of harmonin; uncharacterized subgroup. This domain is a putative protein-binding module based on its sequence similarity to the N-terminal domain of harmonin. Harmonin (not belonging to this group) is a postsynaptic density-95/discs-large/ZO-1 (PDZ) domain-containing scaffold protein, which organizes the Usher protein network of the inner ear and the retina. This domain is also related to domains found in several other scaffold proteins which organize supramolecular complexes
