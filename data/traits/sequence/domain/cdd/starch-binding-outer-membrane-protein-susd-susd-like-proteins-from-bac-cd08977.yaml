identifier: CDD:cd08977
label: "starch binding outer membrane protein SusD. SusD-like proteins from Bacteroidetes, members of the human distal gut microbiota, are part of the starch utilization system (Sus). Sus is one of the large clusters of glycosyl hydrolases, called polysaccharide utilization loci (PULs), which play an important role in polysaccharide recognition and uptake, and it is needed for growth on amylose, amylopectin, pullulan, and maltooligosaccharides. SusD, together with SusC, a predicted beta-barrel porin, forms the minimum outer-membrane starch-binding complex. The adult human distal gut microbiota is essential for digestion of a large variety of dietary polysaccharides, for which humans lack the necessary glycosyl hydrolases."
definition: >-
  starch binding outer membrane protein SusD. SusD-like proteins from Bacteroidetes, members of the human distal gut microbiota, are part of the starch utilization system (Sus). Sus is one of the large clusters of glycosyl hydrolases, called polysaccharide utilization loci (PULs), which play an important role in polysaccharide recognition and uptake, and it is needed for growth on amylose, amylopectin, pullulan, and maltooligosaccharides. SusD, together with SusC, a predicted beta-barrel porin, forms the minimum outer-membrane starch-binding complex. The adult human distal gut microbiota is essential for digestion of a large variety of dietary polysaccharides, for which humans lack the necessary glycosyl hydrolases. — an NCBI CDD conserved domain (cd08977); members share this curated model.
