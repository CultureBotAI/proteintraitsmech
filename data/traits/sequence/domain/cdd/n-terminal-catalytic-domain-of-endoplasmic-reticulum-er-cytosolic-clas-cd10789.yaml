identifier: CDD:cd10789
label: "N-terminal catalytic domain of endoplasmic reticulum(ER)/cytosolic class II alpha-mannosidases; glycoside hydrolase family 38 (GH38). The subfamily is represented by Saccharomyces cerevisiae vacuolar alpha-mannosidase Ams1, rat ER/cytosolic alpha-mannosidase Man2C1, and similar proteins. Members in this family share high sequence similarity. None of them have any classical signal sequence or membrane spanning domains, which are typical of sorting or targeting signals. Ams1 functions as a second resident vacuolar hydrolase in S. cerevisiae. It aids in recycling macromolecular components of the cell through hydrolysis of terminal, non-reducing alpha-d-mannose residues. Ams1 utilizes both the cytoplasm to vacuole targeting (Cvt, nutrient-rich conditions) and autophagic (starvation conditions) pathways for biosynthetic delivery to the vacuole. Man2C1is involved in oligosaccharide catabolism in both the ER and cytosol. It can catalyze the cobalt-dependent cleavage of alpha 1,2-, alpha 1,3-, and alpha 1,6-linked mannose residues. Members in this family are retaining glycosyl hydrolases of family GH38 that employs a two-step mechanism involving the formation of a covalent glycosyl-enzyme complex. Two carboxylic acids positioned within the active site act in concert: one as a catalytic nucleophile and the other as a general acid/base catalyst."
definition: >-
  N-terminal catalytic domain of endoplasmic reticulum(ER)/cytosolic class II alpha-mannosidases; glycoside hydrolase family 38 (GH38). The subfamily is represented by Saccharomyces cerevisiae vacuolar alpha-mannosidase Ams1, rat ER/cytosolic alpha-mannosidase Man2C1, and similar proteins. Members in this family share high sequence similarity. None of them have any classical signal sequence or membrane spanning domains, which are typical of sorting or targeting signals. Ams1 functions as a second resident vacuolar hydrolase in S. cerevisiae. It aids in recycling macromolecular components of the cell through hydrolysis of terminal, non-reducing alpha-d-mannose residues. Ams1 utilizes both the cytoplasm to vacuole targeting (Cvt, nutrient-rich conditions) and autophagic (starvation conditions) pathways for biosynthetic delivery to the vacuole. Man2C1is involved in oligosaccharide catabolism in both the ER and cytosol. It can catalyze the cobalt-dependent cleavage of alpha 1,2-, alpha 1,3-, and alpha 1,6-linked mannose residues. Members in this family are retaining glycosyl hydrolases of family GH38 that employs a two-step mechanism involving the formation of a covalent glycosyl-enzyme complex. Two carboxylic acids positioned within the active site act in concert: one as a catalytic nucleophile and the other as a general acid/base catalyst. — an NCBI CDD conserved domain (cd10789); members share this curated model.
