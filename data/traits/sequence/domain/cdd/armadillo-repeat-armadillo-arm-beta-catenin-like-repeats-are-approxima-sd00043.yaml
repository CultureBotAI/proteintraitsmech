identifier: CDD:sd00043
label: "armadillo repeat. Armadillo (ARM)/beta-catenin-like repeats are approximately 40 amino acid long, tandemly repeated sequence motif, first identified in the Drosophila segment polarity gene armadillo. These repeats were also found in the mammalian armadillo homolog beta-catenin, the junctional plaque protein plakoglobin, the adenomatous polyposis coli (APC) tumor suppressor protein, and a number of other proteins. ARM has been implicated in mediating protein-protein interactions, but no common features among the target proteins recognized by the ARM repeats have been identified. ARM repeats are related to HEAT repeats."
definition: >-
  armadillo repeat. Armadillo (ARM)/beta-catenin-like repeats are approximately 40 amino acid long, tandemly repeated sequence motif, first identified in the Drosophila segment polarity gene armadillo. These repeats were also found in the mammalian armadillo homolog beta-catenin, the junctional plaque protein plakoglobin, the adenomatous polyposis coli (APC) tumor suppressor protein, and a number of other proteins. ARM has been implicated in mediating protein-protein interactions, but no common features among the target proteins recognized by the ARM repeats have been identified. ARM repeats are related to HEAT repeats. — an NCBI CDD conserved domain (sd00043); members share this curated model.
