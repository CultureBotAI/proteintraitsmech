identifier: CDD:cd13397
label: "nucleotide-binding domain (NBD) of actin, actin-related proteins T1-T3 (Arp-T1-3), and similar proteins. The family includes actin and human actin-related proteins T1, T2, and T3. Actin is a ubiquitous protein involved in the formation of filaments that are major components of the cytoskeleton. It is a highly dynamic structural protein network involved in processes such as cell contraction, cell motility, vesicle trafficking, intracellular organization, cytokinesis, endocytosis and apoptosis. Arp-T1, encoded by ACTRT1/ARPT1 gene expressed in testis, negatively regulates the Hedgehog (SHH) signaling, binds to the promoter of the SHH signaling mediator, GLI1, and inhibits its expression. Arp-T2 (also called actin-related protein M2; encoded by ACTRT2/ARPM2 gene expressed in testis and various other cell types) and Arp-T3 (also called actin-related protein M1; encoded by ACTRT3/ARPM1 gene expressed in all tested human tissues) play general roles in the organization of the cytoskeleton like other cytoplasmic actin-related proteins."
definition: >-
  nucleotide-binding domain (NBD) of actin, actin-related proteins T1-T3 (Arp-T1-3), and similar proteins. The family includes actin and human actin-related proteins T1, T2, and T3. Actin is a ubiquitous protein involved in the formation of filaments that are major components of the cytoskeleton. It is a highly dynamic structural protein network involved in processes such as cell contraction, cell motility, vesicle trafficking, intracellular organization, cytokinesis, endocytosis and apoptosis. Arp-T1, encoded by ACTRT1/ARPT1 gene expressed in testis, negatively regulates the Hedgehog (SHH) signaling, binds to the promoter of the SHH signaling mediator, GLI1, and inhibits its expression. Arp-T2 (also called actin-related protein M2; encoded by ACTRT2/ARPM2 gene expressed in testis and various other cell types) and Arp-T3 (also called actin-related protein M1; encoded by ACTRT3/ARPM1 gene expressed in all tested human tissues) play general roles in the organization of the cytoskeleton like other cytoplasmic actin-related proteins. — an NCBI CDD conserved domain (cd13397); members share this curated model.
