identifier: CDD:cd16326
label: "LolB, an outer membrane lipoprotein receptor. This family contains the outer membrane lipoprotein receptor, LolB, which catalyzes the last step of lipoprotein transfer from the inner to the outer membrane. There are five Lol proteins (LolA, LolB, LolC, LolD, and LolE) involved in the sorting and membrane localization of lipoprotein and are highly conserved in Gram-negative bacteria. LolA transports lipoproteins through the periplasm to LolB, which then localizes them to outer membranes; the protruding loop of LolB has been shown to be essential for the localization of lipoproteins in the anchoring of bacterial triacylated proteins to the outer membrane."
definition: >-
  LolB, an outer membrane lipoprotein receptor. This family contains the outer membrane lipoprotein receptor, LolB, which catalyzes the last step of lipoprotein transfer from the inner to the outer membrane. There are five Lol proteins (LolA, LolB, LolC, LolD, and LolE) involved in the sorting and membrane localization of lipoprotein and are highly conserved in Gram-negative bacteria. LolA transports lipoproteins through the periplasm to LolB, which then localizes them to outer membranes; the protruding loop of LolB has been shown to be essential for the localization of lipoproteins in the anchoring of bacterial triacylated proteins to the outer membrane. — an NCBI CDD conserved domain (cd16326); members share this curated model.
