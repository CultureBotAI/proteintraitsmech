label: "Chromobacterium violaceum CV2614 and related proteins, cupin domain. This family includes mostly bacterial proteins homologous to CV2614, a Chromobacterium violaceum protein of unknown function. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
