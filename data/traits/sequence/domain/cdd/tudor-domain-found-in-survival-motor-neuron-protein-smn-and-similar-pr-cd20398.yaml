identifier: CDD:cd20398
label: "Tudor domain found in survival motor neuron protein (SMN) and similar proteins. SMN, also called component of gems 1, or Gemin-1, is part of a multimeric SMN complex that includes spliceosomal Sm core proteins and plays a catalyst role in the assembly of small nuclear ribonucleoproteins (snRNPs), the building blocks of the spliceosome. Mutations in human SMN lead to motor neuron degeneration and spinal muscular atrophy. SMN contains a central, highly conserved Tudor domain that is required for U snRNP assembly and Sm protein binding and has been shown to bind arginine-glycine-rich motifs in an methylarginine-dependent manner."
definition: >-
  Tudor domain found in survival motor neuron protein (SMN) and similar proteins. SMN, also called component of gems 1, or Gemin-1, is part of a multimeric SMN complex that includes spliceosomal Sm core proteins and plays a catalyst role in the assembly of small nuclear ribonucleoproteins (snRNPs), the building blocks of the spliceosome. Mutations in human SMN lead to motor neuron degeneration and spinal muscular atrophy. SMN contains a central, highly conserved Tudor domain that is required for U snRNP assembly and Sm protein binding and has been shown to bind arginine-glycine-rich motifs in an methylarginine-dependent manner. — an NCBI CDD conserved domain (cd20398); members share this curated model.
