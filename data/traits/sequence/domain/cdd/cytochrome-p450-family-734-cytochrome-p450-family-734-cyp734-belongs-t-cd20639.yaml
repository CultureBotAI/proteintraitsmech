identifier: CDD:cd20639
label: "cytochrome P450 family 734. Cytochrome P450 family 734 (CYP734) belongs to the plant CYP72 clan, which is generally associated with the metabolism of a diversity of fairly hydrophobic compounds including fatty acids and isoprenoids, with the catabolism of hormones (brassinosteroids and gibberellin, GA) and with the biosynthesis of cytokinins. CYP734As function as multisubstrate and multifunctional enzymes in brassinosteroid (BRs) catabolism and regulation of BRs homeostasis. Arabidopsis thaliana CYP734A1/BAS1 (formerly CYP72B1) inactivates bioactive brassinosteroids such as castasterone (CS) and brassinolide (BL) by C-26 hydroxylation. Rice CYP734As can catalyze C-22 hydroxylation as well as second and third oxidations to produce aldehyde and carboxylate groups at C-26. CYP734 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
