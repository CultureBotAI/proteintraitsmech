identifier: CDD:cd04444
label: "DEP (Dishevelled, Egl-10, and Pleckstrin) domain found in pleckstrin 2-like proteins.  Pleckstrin 2 is found in a wide variety of cell types, which suggest a more general role in signaling than pleckstrin 1.  Pleckstrin-like proteins contain a central DEP domain, flanked by 2 PH (pleckstrin homology) domains."
definition: >-
  DEP (Dishevelled, Egl-10, and Pleckstrin) domain found in pleckstrin 2-like proteins. Pleckstrin 2 is found in a wide variety of cell types, which suggest a more general role in signaling than pleckstrin 1. Pleckstrin-like proteins contain a central DEP domain, flanked by 2 PH (pleckstrin homology) domains. — an NCBI CDD conserved domain (cd04444); members share this curated model.
