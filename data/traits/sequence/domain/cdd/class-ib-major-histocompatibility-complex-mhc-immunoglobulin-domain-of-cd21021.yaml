identifier: CDD:cd21021
label: "Class Ib major histocompatibility complex (MHC) immunoglobulin domain of human leukocyte antigen H; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the Class Ib major histocompatibility complex (MHC) immunoglobulin domain of human leukocyte antigen H (HLA-H). HLA-H (also known as hereditary hemochromatosis protein; HFE) is a major histocompatibility complex (MHC) class I-like protein that is mutated in Hereditary Hemochromatosis. HFE is a protein of 343 amino acids that includes a signal peptide, an extracellular transferrin receptor-binding region (a1 and a2), an immunoglobulin-like domain (a3), a transmembrane region, and a short cytoplasmic tail.  HFE binds beta-2-microglobulin to form a heterodimer expressed at the cell surface. It binds transferrin receptor (TFRC) in its extracellular alpha1-alpha2 domain.  HFE plays an important part in the regulation of hepcidin expression in response to iron overload and the liver is important in the pathophysiology of HFE-associated hemochromatosis.  Nine HFE splicing variants have been reported with transcripts lacking exon 2 or exon 3, or exons 2-3, 2-4, or 2-5.  Diverse mutations involving HFE introns and exons discovered in persons with hemochromatosis or their family members cause or probably cause high iron phenotypes. Class I MHC proteins bind antigenic peptide fragments and present them to CD8+ T lymphocytes. Class I molecules consist of a transmembrane alpha chain and a small chain called the beta-2-microglobulin. The alpha chain contains three extracellular domains, two of which fold together to form the peptide-binding cleft (alpha1 and alpha2), and one which has an Ig fold (alpha3).  Peptide binding to class I molecules occurs in the endoplasmic reticulum (ER) and involves both chaperones and dedicated factors to assist in peptide loading.  Class I MHC molecules are expressed on most nucleated cells."
definition: >-
  Class Ib major histocompatibility complex (MHC) immunoglobulin domain of human leukocyte antigen H; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the Class Ib major histocompatibility complex (MHC) immunoglobulin domain of human leukocyte antigen H (HLA-H). HLA-H (also known as hereditary hemochromatosis protein; HFE) is a major histocompatibility complex (MHC) class I-like protein that is mutated in Hereditary Hemochromatosis. HFE is a protein of 343 amino acids that includes a signal peptide, an extracellular transferrin receptor-binding region (a1 and a2), an immunoglobulin-like domain (a3), a transmembrane region, and a short cytoplasmic tail. HFE binds beta-2-microglobulin to form a heterodimer expressed at the cell surface. It binds transferrin receptor (TFRC) in its extracellular alpha1-alpha2 domain. HFE plays an important part in the regulation of hepcidin expression in response to iron overload and the liver is important in the pathophysiology of HFE-associated hemochromatosis. Nine HFE splicing variants have been reported with transcripts lacking exon 2 or exon 3, or exons 2-3, 2-4, or 2-5. Diverse mutations involving HFE introns and exons discovered in persons with hemochromatosis or their family members cause or probably cause high iron phenotypes. Class I MHC proteins bind antigenic peptide fragments and present them to CD8+ T lymphocytes. Class I molecules consist of a transmembrane alpha chain and a small chain called the beta-2-microglobulin. The alpha chain contains three extracellular domains, two of which fold together to form the peptide-binding cleft (alpha1 and alpha2), and one which has an Ig fold (alpha3). Peptide binding to class I molecules occurs in the endoplasmic reticulum (ER) and involves both chaperones and dedicated factors to assist in peptide loading. Class I MHC molecules are expressed on most nucleated cells. — an NCBI CDD conserved domain (cd21021); members share this curated model.
