identifier: CDD:cd20734
label: "Polymorphic Nuclease effector (PoNe) domain co-occurring with RHS repeat-associated core domain. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains proteins with PoNe domains typically co-occurring with N-terminal domains such as RHS repeat-associated core domains, which may contain FG-GAP, RHS or YD repeats, and are found in secreted bacterial insecticidal toxins."
definition: >-
  Polymorphic Nuclease effector (PoNe) domain co-occurring with RHS repeat-associated core domain. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains proteins with PoNe domains typically co-occurring with N-terminal domains such as RHS repeat-associated core domains, which may contain FG-GAP, RHS or YD repeats, and are found in secreted bacterial insecticidal toxins. — an NCBI CDD conserved domain (cd20734); members share this curated model.
