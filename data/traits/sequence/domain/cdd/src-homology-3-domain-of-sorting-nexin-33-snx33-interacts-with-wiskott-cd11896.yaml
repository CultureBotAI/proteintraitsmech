identifier: CDD:cd11896
label: "Src Homology 3 domain of Sorting Nexin 33. SNX33 interacts with Wiskott-Aldrich syndrome protein (WASP) and plays a role in the maintenance of cell shape and cell cycle progression. It modulates the shedding and endocytosis of cellular prion protein (PrP(c)) and amyloid precursor protein (APP). SNXs are Phox homology (PX) domain containing proteins that are involved in regulating membrane traffic and protein sorting in the endosomal system. SNX33 also contains BAR and SH3 domains. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
