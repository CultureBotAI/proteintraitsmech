identifier: CDD:cd18225
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 40 (ZBTB40). ZBTB40 may be involved in transcriptional regulation. Single-nucleotide polymorphisms of ZBTB40 are associated with bone mineral density in European and East-Asian populations. ZBTB40 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 40 (ZBTB40). ZBTB40 may be involved in transcriptional regulation. Single-nucleotide polymorphisms of ZBTB40 are associated with bone mineral density in European and East-Asian populations. ZBTB40 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18225); members share this curated model.
