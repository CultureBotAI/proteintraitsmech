identifier: CDD:cd17574
label: "phosphoacceptor receiver (REC) domain of OmpR family response regulators. OmpR-like proteins are one of the most widespread transcriptional regulators. OmpR family members contain REC and winged helix-turn-helix (wHTH) DNA-binding output effector domain.  They are involved in the control of environmental stress tolerance (such as the oxidative, osmotic and acid stress response), motility, virulence, outer membrane biogenesis and other processes. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of OmpR family response regulators. OmpR-like proteins are one of the most widespread transcriptional regulators. OmpR family members contain REC and winged helix-turn-helix (wHTH) DNA-binding output effector domain. They are involved in the control of environmental stress tolerance (such as the oxidative, osmotic and acid stress response), motility, virulence, outer membrane biogenesis and other processes. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17574); members share this curated model.
