identifier: CDD:cd07548
label: "P-type heavy metal-transporting ATPase, similar to Bacillus subtilis CadA which appears to transport cadmium, zinc and cobalt but not copper out of the cell. Bacillus subtilis CadA/YvgW appears to transport cadmium, zinc and cobalt but not copper, out of the cell. Functions in metal ion resistance and cellular metal ion homeostasis. CadA/YvgW is also important for sporulation in B. subtilis, the significant specific expression of the cadA/yvgW gene during the late stage of sporulation, is controlled by forespore-specific sigma factor, sigma G, and mother cell-specific sigma factor, sigma E. This subfamily also includes Helicobacter pylori CadA an essential resistance pump with ion specificity towards Cd(2+), Zn(2+) and Co(2+), and Zn-transporting ATPase, ZiaA(N) in Synechocystis PCC 6803. Transcription of ziaA is induced by Zn under the control of the Zn responsive repressor ZiaR. This subclass of P-type ATPase is also referred to as CPx-type ATPases because their amino acid sequences contain a characteristic CPC or CPH motif associated with a stretch of hydrophobic amino acids and N-terminal ion-binding sequences. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle."
definition: >-
  P-type heavy metal-transporting ATPase, similar to Bacillus subtilis CadA which appears to transport cadmium, zinc and cobalt but not copper out of the cell. Bacillus subtilis CadA/YvgW appears to transport cadmium, zinc and cobalt but not copper, out of the cell. Functions in metal ion resistance and cellular metal ion homeostasis. CadA/YvgW is also important for sporulation in B. subtilis, the significant specific expression of the cadA/yvgW gene during the late stage of sporulation, is controlled by forespore-specific sigma factor, sigma G, and mother cell-specific sigma factor, sigma E. This subfamily also includes Helicobacter pylori CadA an essential resistance pump with ion specificity towards Cd(2+), Zn(2+) and Co(2+), and Zn-transporting ATPase, ZiaA(N) in Synechocystis PCC 6803. Transcription of ziaA is induced by Zn under the control of the Zn responsive repressor ZiaR. This subclass of P-type ATPase is also referred to as CPx-type ATPases because their amino acid sequences contain a characteristic CPC or CPH motif associated with a stretch of hydrophobic amino acids and N-terminal ion-binding sequences. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle. — an NCBI CDD conserved domain (cd07548); members share this curated model.
