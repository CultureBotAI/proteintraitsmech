identifier: CDD:cd16638
label: "Modified RING finger, HC subclass (C3HC3D-type), found in Roquin-1, Roquin-2, and similar proteins. The ROQUIN family includes Roquin-1, Roquin-2, and similar proteins, which localize to the cytoplasm and upon stress, are concentrated in stress granules. They may play essential roles in preventing T-cell-mediated autoimmune disease and in microRNA-mediated repression of inducible costimulator (Icos) mRNA. They function as E3 ubiquitin ligases consisting of an N-terminal modified C3HC3D-type RING-HC finger with a potential E3 activity, a highly conserved ROQ domain required for RNA binding and localization to stress granules, and a CCCH-type zinc finger involved in RNA recognition."
definition: >-
