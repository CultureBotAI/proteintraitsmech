identifier: CDD:cd16057
label: TNFSF11
definition: >-
  Tumor necrosis factor ligand superfamily member 11 (TNFSF11), also known as receptor activator of nuclear factor kappa-B ligand or RANKL. This family contains TNFSF11 (also known as receptor activator of nuclear factor kappa-B ligand or RANKL, TNF-related activation-induced cytokine or TRANCE, osteoclast differentiation factor or ODF, Osteoprotegerin ligand or OPGL, CD254, OPTB2, hRANKL2) and is known to affect the immune system and control bone regeneration and remodeling. RANKL is highly expressed in the lung, thymus and lymph nodes, while low expression is found in bone marrow, stomach, heart, spleen, placenta, peripheral blood, leukocytes, skeletal muscle and the thyroid. Its receptor TNFSF11A (RANK) is expressed on the surface membrane of dendritic cells (DC) and its decoy receptor TNFRSF11B (OPG) is expressed in both the bone (osteoblasts) and immune systems (B cells and DCs). Binding of RANKL to its cognate receptor RANK is crucial for osteoclast development from haematopoietic progenitor cells and activation of mature osteoclasts. However, binding of RANKL to OPG prevents binding to RANK and signaling, and therefore inhibits bone turnover by osteoclasts. Patients with diseases such as osteoporosis, metastases, or rheumatoid arthritis all show an increased activity of osteoclasts; thus, the RANKL-RANK-OPG axis is the most relevant therapeutic target for osteoclast-regulated bone diseases. Data show that inhibiting tumor-induced osteoclastogenesis by RANKL will protect against bone destruction as well as inhibit the progression of established bone metastases and delay formation of de novo bone metastases. The human monoclonal antibody against RANKL, Denosumab, has been demonstrated to prevent or delay skeletal-related events (SREs) in patients with solid tumors that have metastasized to bone, e.g. myeloma, breast and prostate cancers, which can typically induce secondary cancers within bone. Medroxyprogesterone acetate (MPA), a common synthetic progestin used as hormone therapy for osteoporosis or endometriosis in menopausal patients may increase risks of developing breast cancer due to an increase expression of RANKL, since it causes a substantial induction of RANKL in mammary-gland epithelial cells. Thus, inhibition of RANKL has potential for the prevention and treatment of breast cancer. T and B cells also express RANKL upon activation which can lead to abnormal bone loss. T cells play a major role in the pathogenesis of rheumatoid arthritis (RA) and RANKL, expressed by synovial fibroblasts, is responsible for the formation of osteoclasts and bone loss in RA, thus directly linking the bone to the immune system. RANKL is also required for the normal development of B cells and seems to be anti-inflammatory in the absence of pre-existing inflammation
