label: "PNPOx_Bli_3_like: a family of proteins related to PNP oxidases and other flavin mononucleotide (FMN) binding proteins. Bli-3 is a fungal protein induced by blue light, which may play a role in stress response; bacterial members of this family have been linked to stress response as well."
