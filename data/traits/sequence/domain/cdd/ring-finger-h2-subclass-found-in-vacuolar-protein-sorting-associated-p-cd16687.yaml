identifier: CDD:cd16687
label: "RING finger, H2 subclass, found in vacuolar protein sorting-associated protein 8 (Vps8) and similar proteins. Vps8 is the Rab-specific subunit of the endosomal tethering complex CORVET (class C core vacuole/endosome transport) that also includes Vps3 and a Class C Vps core complex composed of Vps11, Vps16, Vps18, and Vps33. CORVET operates at endosomes, controls traffic into late endosomes, and interacts with the Rab5/Vps21-GTP form. The CORVET-specific Vps3 and Vps8 subunits belong to the class D Vps. They form a subcomplex that interact with Rab5/Vps21, and is critical for localization and function of the CORVET tethering complex on endosomes. Vps8 contains an N-terminal WD40 repeat and a C-terminal C3H2C3-type RING-H2 finger."
definition: >-
  RING finger, H2 subclass, found in vacuolar protein sorting-associated protein 8 (Vps8) and similar proteins. Vps8 is the Rab-specific subunit of the endosomal tethering complex CORVET (class C core vacuole/endosome transport) that also includes Vps3 and a Class C Vps core complex composed of Vps11, Vps16, Vps18, and Vps33. CORVET operates at endosomes, controls traffic into late endosomes, and interacts with the Rab5/Vps21-GTP form. The CORVET-specific Vps3 and Vps8 subunits belong to the class D Vps. They form a subcomplex that interact with Rab5/Vps21, and is critical for localization and function of the CORVET tethering complex on endosomes. Vps8 contains an N-terminal WD40 repeat and a C-terminal C3H2C3-type RING-H2 finger. — an NCBI CDD conserved domain (cd16687); members share this curated model.
