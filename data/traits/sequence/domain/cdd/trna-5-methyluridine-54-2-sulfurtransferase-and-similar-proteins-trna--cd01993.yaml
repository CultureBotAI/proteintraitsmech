identifier: CDD:cd01993
label: "tRNA-5-methyluridine(54) 2-sulfurtransferase and similar proteins. tRNA-5-methyluridine(54) 2-sulfurtransferase, also called tRNA thiouridine synthetase TtuA, catalyzes the ATP-dependent 2-thiolation of 5-methyluridine residue at position 54 in the T loop of tRNAs, leading to 5-methyl-2-thiouridine (m(5)s(2)U or s(2)T). TtuA belongs to the adenine nucleotide alpha hydrolase superfamily (AANH) that includes N-type ATP PPases and ATP sulfurylases. It forms an alpha/beta/alpha fold which binds to the adenosine group. This domain has a strongly conserved motif SGGKD at the N-terminus."
definition: >-
