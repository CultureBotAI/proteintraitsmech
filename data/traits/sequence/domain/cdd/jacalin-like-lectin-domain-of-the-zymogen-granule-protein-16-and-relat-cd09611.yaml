identifier: CDD:cd09611
label: "Jacalin-like lectin domain of the zymogen granule protein 16 and related proteins. ZG16p is a conserved secreted vertebrate protein with tissue-specific expression profiles, which might play a role in glycoprotein secretion, perhaps as a linker protein that participates in the formation and/or transport of the zymogen granule. Its paralog ZG16b (PAUF) has been associated with roles in gene regulation and cancer. This domain family also contains mammalian proteins labelled as prostatic spermine-binding protein (SBP) and salivary-gland specific secreted proteins."
definition: >-
  Jacalin-like lectin domain of the zymogen granule protein 16 and related proteins. ZG16p is a conserved secreted vertebrate protein with tissue-specific expression profiles, which might play a role in glycoprotein secretion, perhaps as a linker protein that participates in the formation and/or transport of the zymogen granule. Its paralog ZG16b (PAUF) has been associated with roles in gene regulation and cancer. This domain family also contains mammalian proteins labelled as prostatic spermine-binding protein (SBP) and salivary-gland specific secreted proteins. — an NCBI CDD conserved domain (cd09611); members share this curated model.
