identifier: CDD:cd18959
label: "Ribosomal small subunit protein S14, bacteria and eukaryotic mitochondria and chloroplast. The small subunit S14 of the bacterial ribosome including the S14 from bacteria as well as from eukaryotic mitochondria and chloroplast.  Ribosomal protein S14 is a member of the small ribosomal subunit forming a tight cluster with subunits S3 and S10 in the head region of the ribosome and16S ribosomal RNA. uS14 contains a bound zinc ion that is coordinated by four cysteine residues through zinc motif. However not all bacterial ribosomal protein S14 have zinc motif and the linker region of the zinc-finger motif serves a critical structural role in S14. Mitochondrial and chloroplast ribosomes synthesize proteins that are involved in oxidative phosphorylation (ATP generation) and photosynthesis. uS14 is one of the fourteen mitochondrial ribosomal proteins that is known to have significant sequence homology with their bacterial counterpart."
definition: >-
  Ribosomal small subunit protein S14, bacteria and eukaryotic mitochondria and chloroplast. The small subunit S14 of the bacterial ribosome including the S14 from bacteria as well as from eukaryotic mitochondria and chloroplast. Ribosomal protein S14 is a member of the small ribosomal subunit forming a tight cluster with subunits S3 and S10 in the head region of the ribosome and16S ribosomal RNA. uS14 contains a bound zinc ion that is coordinated by four cysteine residues through zinc motif. However not all bacterial ribosomal protein S14 have zinc motif and the linker region of the zinc-finger motif serves a critical structural role in S14. Mitochondrial and chloroplast ribosomes synthesize proteins that are involved in oxidative phosphorylation (ATP generation) and photosynthesis. uS14 is one of the fourteen mitochondrial ribosomal proteins that is known to have significant sequence homology with their bacterial counterpart. — an NCBI CDD conserved domain (cd18959); members share this curated model.
