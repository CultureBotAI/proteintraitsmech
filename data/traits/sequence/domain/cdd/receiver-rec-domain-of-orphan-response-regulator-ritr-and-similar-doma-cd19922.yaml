identifier: CDD:cd19922
label: "receiver (REC) domain of orphan response regulator RitR and similar domains. Streptococcus pneumoniae RitR (Repressor of iron transport Regulator, formerly RR489) is an orphan two-component signal transduction response regulator that is required for lung pathogenicity. It acts to repress iron uptake via binding the pneumococcal iron uptake (Piu) transporter promoter. Members of this subfamily contain REC and DNA-binding output domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. However, members of this family do not contain the phosphorylatable aspartic acid residue and are phosphorylation-independent."
definition: >-
  receiver (REC) domain of orphan response regulator RitR and similar domains. Streptococcus pneumoniae RitR (Repressor of iron transport Regulator, formerly RR489) is an orphan two-component signal transduction response regulator that is required for lung pathogenicity. It acts to repress iron uptake via binding the pneumococcal iron uptake (Piu) transporter promoter. Members of this subfamily contain REC and DNA-binding output domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. However, members of this family do not contain the phosphorylatable aspartic acid residue and are phosphorylation-independent. — an NCBI CDD conserved domain (cd19922); members share this curated model.
