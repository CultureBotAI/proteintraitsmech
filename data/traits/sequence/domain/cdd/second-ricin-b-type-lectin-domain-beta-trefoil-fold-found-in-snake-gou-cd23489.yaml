identifier: CDD:cd23489
label: "second ricin B-type lectin domain, beta-trefoil fold, found in snake gourd (Trichosanthes anguina) seed lectin (SGSL) and similar proteins. Type II ribosome-inactivating proteins (RIPs) inhibit translation in eukaryotes by irreversibly inactivating the 28S rRNA and preventing the binding of elongation factor II to the ribosome. SGSL is a non-toxic three-chain type II RIPs consisting of Aalpha, Abeta and B chains with Abeta and B being disulfide-linked. The Aalpha and Abeta chains constitute the rRNA glycosidase domain and the B chain contains two ricin B-type carbohydrate-binding lectin domains. SGSL may have no glycosidase activity due to small changes in both the nucleotide binding and carbohydrate binding capabilities. It binds galactose and derivatives with a preference for the beta-anomeric forms. It also binds prophyrins. SGSL has hemagglutinating activity towards rabbit and human erythrocytes. The ricin B-type lectin domain shows beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The model corresponds to the second ricin B-type lectin domain."
definition: >-
  second ricin B-type lectin domain, beta-trefoil fold, found in snake gourd (Trichosanthes anguina) seed lectin (SGSL) and similar proteins. Type II ribosome-inactivating proteins (RIPs) inhibit translation in eukaryotes by irreversibly inactivating the 28S rRNA and preventing the binding of elongation factor II to the ribosome. SGSL is a non-toxic three-chain type II RIPs consisting of Aalpha, Abeta and B chains with Abeta and B being disulfide-linked. The Aalpha and Abeta chains constitute the rRNA glycosidase domain and the B chain contains two ricin B-type carbohydrate-binding lectin domains. SGSL may have no glycosidase activity due to small changes in both the nucleotide binding and carbohydrate binding capabilities. It binds galactose and derivatives with a preference for the beta-anomeric forms. It also binds prophyrins. SGSL has hemagglutinating activity towards rabbit and human erythrocytes. The ricin B-type lectin domain shows beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The model corresponds to the second ricin B-type lectin domain. — an NCBI CDD conserved domain (cd23489); members share this curated model.
