identifier: CDD:cd13744
label: "PRY/SPRY domain in tripartite motif-binding protein 62 (TRIM62). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM62. It is also called DEAR1 ductal epithelium (associated RING chromosome 1) and is involved in the morphogenesis of the mammary gland; loss of TRIM62 gene expression in breast is associated with increased risk of recurrence in early-onset breast cancer and thus, making TRIM62 a predictive biomarker. Non-small cell lung cancer lesions show a step-wise loss of TRIM62 levels during disease progression, indicating that it may play a role in the evolution of lung cancer. Decreased levels of TRIM62 also represent an independent adverse prognostic factor in AML."
definition: >-
