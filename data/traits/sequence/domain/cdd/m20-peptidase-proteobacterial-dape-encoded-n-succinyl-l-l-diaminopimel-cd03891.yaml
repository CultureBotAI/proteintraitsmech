identifier: CDD:cd03891
label: "M20 Peptidase proteobacterial DapE encoded N-succinyl-L,L-diaminopimelic acid desuccinylase. Peptidase M20 family, proteobacterial DapE encoded N-succinyl-L,L-diaminopimelic acid desuccinylase (DapE; aspartyl dipeptidase; succinyl-diaminopimelate desuccinylase) subfamily. DapE catalyzes the hydrolysis of N-succinyl-L,L-diaminopimelate (L,L-SDAP) to L,L-diaminopimelate and succinate. It has been shown that DapE is essential for cell growth and proliferation. DapEs have been purified from Escherichia coli and Haemophilus influenzae, while the genes that encode for DapEs have been sequenced from several bacterial sources such as Corynebacterium glutamicum, Helicobacter pylori, Neisseria meningitidis and Mycobacterium tuberculosis. DapE is a small, dimeric enzyme that requires two zinc atoms per molecule for full enzymatic activity. All of the amino acids that function as metal binding ligands are strictly conserved in DapE."
definition: >-
