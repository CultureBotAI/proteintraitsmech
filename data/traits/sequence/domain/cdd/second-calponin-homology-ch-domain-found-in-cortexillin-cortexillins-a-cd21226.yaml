identifier: CDD:cd21226
label: "second calponin homology (CH) domain found in cortexillin. Cortexillins are actin-bundling proteins that play a critical role in regulating cell morphology and actin cytoskeleton reorganization. They play a major role in cytokinesis and contain two copies of the CH domain. This model corresponds to the second CH domain. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  second calponin homology (CH) domain found in cortexillin. Cortexillins are actin-bundling proteins that play a critical role in regulating cell morphology and actin cytoskeleton reorganization. They play a major role in cytokinesis and contain two copies of the CH domain. This model corresponds to the second CH domain. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21226); members share this curated model.
