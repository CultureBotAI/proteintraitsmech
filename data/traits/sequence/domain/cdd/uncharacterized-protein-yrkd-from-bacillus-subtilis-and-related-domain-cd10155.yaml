identifier: CDD:cd10155
label: BsYrkD-like_DUF156
definition: >-
  Uncharacterized protein YrkD from Bacillus subtilis and related domains; this domain superfamily was previously known as part of DUF156. This domain family contains an uncharacterized protein YrkD from Bacillus subtilis and related proteins. This family is part of a larger superfamily that contains various transcriptional regulators that respond to different stressors such as Cu(I), Ni(I), sulfite, and formaldehyde, and includes CsoRs (copper-sensitive operon repressors). CsoRs form homotetramers (dimer of dimers). In Mycobacterium tuberculosis CsoR, within each dimer, two Cys residues on opposite subunits, along with a His residue, bind the Cu(I) ion (forming a triagonal S2N coordination complex, C-H-C). These residues are conserved in the majority of members of this superfamily. In this family, however, not all these residues are conserved, there is an Asn instead of the His (C-N-C); also a conserved Tyr and a Glu residue that facilitates allosteric regulation of DNA binding for CsoRs are very poorly conserved
