identifier: CDD:cd21266
label: "calponin homology (CH) domain found in beta-Pak Interactive eXchange factor. Beta-Pak Interactive eXchange factor (beta-PIX), also called PAK-interacting exchange factor beta, Rho guanine nucleotide exchange factor 7 (ARHGEF7), p85, or Cool (Cloned out of Library)-1, activates small GTPases by exchanging bound GDP for free GTP. It acts as a GEF for both Cdc42 and Rac1, and plays important roles in regulating neuroendocrine exocytosis, focal adhesion maturation, cell migration, synaptic vesicle localization, and insulin secretion. Beta-PIX contains a single copy of the CH domain at its N-terminus. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  calponin homology (CH) domain found in beta-Pak Interactive eXchange factor. Beta-Pak Interactive eXchange factor (beta-PIX), also called PAK-interacting exchange factor beta, Rho guanine nucleotide exchange factor 7 (ARHGEF7), p85, or Cool (Cloned out of Library)-1, activates small GTPases by exchanging bound GDP for free GTP. It acts as a GEF for both Cdc42 and Rac1, and plays important roles in regulating neuroendocrine exocytosis, focal adhesion maturation, cell migration, synaptic vesicle localization, and insulin secretion. Beta-PIX contains a single copy of the CH domain at its N-terminus. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21266); members share this curated model.
