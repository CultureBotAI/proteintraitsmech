identifier: CDD:cd20033
label: FH_FOXP
definition: >-
  Forkhead (FH) domain found in the Forkhead box protein P (FOXP) subfamily. The FOXP subfamily includes four winged helix transcription factors, FOXP1-4. They are involved in the development of the central nervous system. Mutations in FOXP1, also called Mac-1-regulated Forkhead (MFH), leads to developmental delay, intellectual disability, autism spectrum disorder, speech delay, and dysmorphic features. FOXP2, also called CAG repeat protein 44 or Trinucleotide repeat-containing gene 10 protein, is a transcriptional repressor that may play a role in the specification and differentiation of lung epithelium. It may also play a role in developing neural, gastrointestinal and cardiovascular tissues. FOXP3, also called Scurfin, is a transcriptional regulator which is crucial for the development and inhibitory function of regulatory T-cells (Treg). FOXP4, also called Forkhead-related protein-like A, is a transcriptional repressor that represses lung-specific expression. It is necessary for normal T cell cytokine recall responses to antigen following pathogenic infection. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'
