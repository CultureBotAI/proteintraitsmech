identifier: CDD:cd17491
label: "Major facilitator superfamily domain-containing protein 12. Major facilitator superfamily domain-containing protein 12 (MFSD12) protein subfamily includes a group of uncharacterized proteins similar to human MFSD2. MFSD2 is composed of two vertebrate members, MFSD2A and MFSD2B. MFSD2A is an LPC symporter that plays an essential role for blood-brain barrier formation and function. MFSD2B is a potential risk or protect factor in the prognosis of lung adenocarcinoma. The MFSD12 subfamily belongs to the Salmonella enterica Na+/melibiose symporter like (MelB-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Major facilitator superfamily domain-containing protein 12. Major facilitator superfamily domain-containing protein 12 (MFSD12) protein subfamily includes a group of uncharacterized proteins similar to human MFSD2. MFSD2 is composed of two vertebrate members, MFSD2A and MFSD2B. MFSD2A is an LPC symporter that plays an essential role for blood-brain barrier formation and function. MFSD2B is a potential risk or protect factor in the prognosis of lung adenocarcinoma. The MFSD12 subfamily belongs to the Salmonella enterica Na+/melibiose symporter like (MelB-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17491); members share this curated model.
