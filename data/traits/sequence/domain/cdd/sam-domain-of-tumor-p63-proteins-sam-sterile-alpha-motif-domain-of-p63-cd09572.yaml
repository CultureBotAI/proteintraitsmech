identifier: CDD:cd09572
label: "SAM domain of tumor-p63 proteins. SAM (sterile alpha motif) domain of p63 proteins is a putative protein-protein interaction domain.  p63 is homolog to the tumor suppressor p53. p63 has a C-terminal SAM domain in the longest spliced alpha form, while p53 doesn't have it. p63 knockout mice show significant developmental abnormalities but no increased cancer susceptibility, suggesting that p63 plays a role in regulation of normal development. No evidence for homooligomerization through SAM domains was found for the p63 subfamily. It was suggested that the partner proteins should be either more distantly related SAM-containing domain proteins or proteins without the SAM domain. Mutations in the SAM domain of p63 are found in AEC syndrome patients."
definition: >-
  SAM domain of tumor-p63 proteins. SAM (sterile alpha motif) domain of p63 proteins is a putative protein-protein interaction domain. p63 is homolog to the tumor suppressor p53. p63 has a C-terminal SAM domain in the longest spliced alpha form, while p53 doesn't have it. p63 knockout mice show significant developmental abnormalities but no increased cancer susceptibility, suggesting that p63 plays a role in regulation of normal development. No evidence for homooligomerization through SAM domains was found for the p63 subfamily. It was suggested that the partner proteins should be either more distantly related SAM-containing domain proteins or proteins without the SAM domain. Mutations in the SAM domain of p63 are found in AEC syndrome patients. — an NCBI CDD conserved domain (cd09572); members share this curated model.
