identifier: CDD:cd08507
label: "The C-terminal solute-binding domain of DNA-binding transcriptional regulator SgrR is related to the ABC-type oligopeptide-binding proteins and contains the type 2 periplasmic-binding fold. A novel family of SgrR transcriptional regulator contains a two-domain structure with an N terminal DNA-binding domain of the winged helix family and a C-terminal solute-binding domain. The C-terminal domain shows strong homology with the ABC-type oligopeptide-binding protein family, a member of the type 2 periplasmic-binding fold protein (PBP2) superfamily that also includes the C-terminal substrate-binding domain of LysR-type transcriptional regulators. SgrR (SugaR transport-related Regulator) is negatively autoregulated and activates transcription of divergent operon SgrS, which encodes a small RNA required for recovery from glucose-phosphate stress.  Hence, the small RNA SgrS and SgrR, the transcription factor that controls sgrS expression, are both required for recovery from glucose-phosphate stress. Most of periplasmic binding proteins are comprised of only two globular subdomains corresponding to domains I and III of the dipeptide/oligopeptide binding proteins. The structural topology of these domains is most similar to that of the type 2 periplasmic binding proteins (PBP2), which are responsible for the uptake of a variety of substrates such as phosphate, sulfate, polysaccharides, lysine/arginine/ornithine, and histidine.  The PBP2 bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. After binding their specific ligand with high affinity, they can interact with a cognate membrane transport complex comprised of two integral membrane domains and two cytoplasmically located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis."
definition: >-
  The C-terminal solute-binding domain of DNA-binding transcriptional regulator SgrR is related to the ABC-type oligopeptide-binding proteins and contains the type 2 periplasmic-binding fold. A novel family of SgrR transcriptional regulator contains a two-domain structure with an N terminal DNA-binding domain of the winged helix family and a C-terminal solute-binding domain. The C-terminal domain shows strong homology with the ABC-type oligopeptide-binding protein family, a member of the type 2 periplasmic-binding fold protein (PBP2) superfamily that also includes the C-terminal substrate-binding domain of LysR-type transcriptional regulators. SgrR (SugaR transport-related Regulator) is negatively autoregulated and activates transcription of divergent operon SgrS, which encodes a small RNA required for recovery from glucose-phosphate stress. Hence, the small RNA SgrS and SgrR, the transcription factor that controls sgrS expression, are both required for recovery from glucose-phosphate stress. Most of periplasmic binding proteins are comprised of only two globular subdomains corresponding to domains I and III of the dipeptide/oligopeptide binding proteins. The structural topology of these domains is most similar to that of the type 2 periplasmic binding proteins (PBP2), which are responsible for the uptake of a variety of substrates such as phosphate, sulfate, polysaccharides, lysine/arginine/ornithine, and histidine. The PBP2 bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. After binding their specific ligand with high affinity, they can interact with a cognate membrane transport complex comprised of two integral membrane domains and two cytoplasmically located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis. — an NCBI CDD conserved domain (cd08507); members share this curated model.
