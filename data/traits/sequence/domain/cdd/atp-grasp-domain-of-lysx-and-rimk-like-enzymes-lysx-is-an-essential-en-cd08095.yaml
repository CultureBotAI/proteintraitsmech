identifier: CDD:cd08095
label: "ATP-grasp domain of LysX and RimK-like enzymes. LysX is an essential enzyme of alpha-aminoadipate pathway for lysine biosynthesis. This pathway is found in yeast and fungi. Lyx is a 31 kDa protein, from Thermus thermophilus HB8, that catalyzes the acylation of alpha-aminoadipate to N2-acetyl-alpha-aminoadipate in the presence of ATP. LysX binds a carboxyl-containing substrate and ATP, forming an acyl-phosphate intermediate via the conversion of ATP to ADP. Later, it ligates the amino group of alpha-aminoadipate and another carboxyl-containing substrate, producing N2-acetyl-alpha-aminoadipate as a possible product. Sequence and structural similarity of LysX to GSHase and DD-ligase suggests that LysX also requires a divalent cation, such as Mg ion, for catalysis."
definition: >-
  ATP-grasp domain of LysX and RimK-like enzymes. LysX is an essential enzyme of alpha-aminoadipate pathway for lysine biosynthesis. This pathway is found in yeast and fungi. Lyx is a 31 kDa protein, from Thermus thermophilus HB8, that catalyzes the acylation of alpha-aminoadipate to N2-acetyl-alpha-aminoadipate in the presence of ATP. LysX binds a carboxyl-containing substrate and ATP, forming an acyl-phosphate intermediate via the conversion of ATP to ADP. Later, it ligates the amino group of alpha-aminoadipate and another carboxyl-containing substrate, producing N2-acetyl-alpha-aminoadipate as a possible product. Sequence and structural similarity of LysX to GSHase and DD-ligase suggests that LysX also requires a divalent cation, such as Mg ion, for catalysis. — an NCBI CDD conserved domain (cd08095); members share this curated model.
