identifier: CDD:cd17589
label: "phosphoacceptor receiver (REC) domain of uncharacterized tetratricopeptide repeat (TPR)-containing response regulators. Response regulators share the common phosphoacceptor REC domain and different output domains. This subfamily contains uncharacterized response regulators with TPR repeats as the effector or output domain, which might contain between 3 to 16 TPR repeats (each about 34 amino acids). TPR-containing proteins occur in all domains of life and the abundance of TPR-containing proteins in a bacterial proteome is not indicative of virulence. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. Some members in this subfamily may contain inactive REC domains lacking canonical metal-binding and active site residues."
definition: >-
  phosphoacceptor receiver (REC) domain of uncharacterized tetratricopeptide repeat (TPR)-containing response regulators. Response regulators share the common phosphoacceptor REC domain and different output domains. This subfamily contains uncharacterized response regulators with TPR repeats as the effector or output domain, which might contain between 3 to 16 TPR repeats (each about 34 amino acids). TPR-containing proteins occur in all domains of life and the abundance of TPR-containing proteins in a bacterial proteome is not indicative of virulence. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. Some members in this subfamily may contain inactive REC domains lacking canonical metal-binding and active site residues. — an NCBI CDD conserved domain (cd17589); members share this curated model.
