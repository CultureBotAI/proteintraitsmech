label: "RING finger, HC subclass, found in RING finger protein 212B (RNF212B) and similar proteins. RNF212B is an uncharacterized protein with high sequence similarity with RNF212, a dosage-sensitive regulator of crossing-over during mammalian meiosis. RNF212B contains an N-terminal C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in RING finger protein 212B (RNF212B) and similar proteins. RNF212B is an uncharacterized protein with high sequence similarity with RNF212, a dosage-sensitive regulator of crossing-over during mammalian meiosis. RNF212B contains an N-terminal C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd16747); members share this curated model.
