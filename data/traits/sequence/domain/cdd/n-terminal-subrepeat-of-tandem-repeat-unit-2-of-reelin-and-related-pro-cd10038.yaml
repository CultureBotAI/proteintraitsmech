identifier: CDD:cd10038
label: Reelin_repeat_2_subrepeat_1
definition: >-
  N-terminal subrepeat of tandem repeat unit 2 of reelin and related proteins. Reelin is an extracellular glycoprotein involved in neuronal development, specifically in the brain cortex. It contains 8 tandemly repeated units, each of which is composed of two highly similar subrepeats and a central EGF domain. This model characterizes the N-terminal subrepeat, which directly contacts the C-terminal subrepeat and the EGF domain in a compact arrangement. Consecutive reelin repeat units are packed together to form an overall rod-like molecular structure. Reelin repeats 5 and 6 are reported to interact with neuronal receptors, the apolipoprotein E receptor 2 (ApoER2) and the very-low-density lipoprotein receptor (VLDLR), triggering a signaling cascade upon binding and subsequent tyrosine phosphorylation of the cytoplasmic disabled-1 (Dab1)
