identifier: CDD:cd18132
label: "trans membrane region of Usher. The outer membrane protein usher plays an important role in the biogenesis of fimbriae (or pili) in gram-negative bacteria. The biogenesis of fimbriae requires a two-component assembly and transport system which is composed of a periplasmic chaperone and an outer membrane protein called usher. Usher is a large protein whose main domain consists of membrane-spanning beta-sheets, similar to porins. It catalyses the ordered polymerization of subunits and enables the translocation of the growing fibre across the outer membrane in a self-energized process."
definition: >-
  trans membrane region of Usher. The outer membrane protein usher plays an important role in the biogenesis of fimbriae (or pili) in gram-negative bacteria. The biogenesis of fimbriae requires a two-component assembly and transport system which is composed of a periplasmic chaperone and an outer membrane protein called usher. Usher is a large protein whose main domain consists of membrane-spanning beta-sheets, similar to porins. It catalyses the ordered polymerization of subunits and enables the translocation of the growing fibre across the outer membrane in a self-energized process. — an NCBI CDD conserved domain (cd18132); members share this curated model.
