identifier: CDD:cd13143
label: "Subfamily of the multidrug and toxic compound extrusion (MATE)-like proteins similar to Streptococcus aureus MepA. The integral membrane proteins from the MATE family are involved in exporting metabolites across the cell membrane and are responsible for multidrug resistance (MDR) in many bacteria and animals. This subfamily includes Streptococcus aureus MepA and Vibrio vulnificus VmrA and functions most likely as a multidrug efflux pump."
definition: >-
  Subfamily of the multidrug and toxic compound extrusion (MATE)-like proteins similar to Streptococcus aureus MepA. The integral membrane proteins from the MATE family are involved in exporting metabolites across the cell membrane and are responsible for multidrug resistance (MDR) in many bacteria and animals. This subfamily includes Streptococcus aureus MepA and Vibrio vulnificus VmrA and functions most likely as a multidrug efflux pump. — an NCBI CDD conserved domain (cd13143); members share this curated model.
