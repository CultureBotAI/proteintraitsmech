identifier: CDD:cd18812
label: "CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain of peptidase inhibitor 15 and similar proteins. This family is composed of peptidase inhibitor 15 (PI15), peptidase inhibitor R3HDML, cysteine-rich secretory protein LCCL domain-containing 1 (CRISPLD1), and cysteine-rich secretory protein LCCL domain-containing 2 (CRISPLD2). PI15 is a serine protease inhibitor which displays weak inhibitory activity against trypsin and may play a role in facial patterning during embryonic development. The PI15 gene is a candidate gene for abdominal aortic internal elastic lamina ruptures in the rat. R3HDML is a putative serine protease inhibitor, whose gene may be associated with clinical dimensions of schizophrenia. CRISPLD1 may play a role in NSCLP (nonsyndromic cleft lip with or without cleft palate) through the interaction with CRISPLD2 and folate pathway genes. plays a role in the etiology of NSCLP and is required for neural crest cell migration and cell viability during craniofacial development. The wider family of CAP domain containing proteins includes plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins (CRISPs), and allergen 5 from vespid venom, among others."
definition: >-
  CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain of peptidase inhibitor 15 and similar proteins. This family is composed of peptidase inhibitor 15 (PI15), peptidase inhibitor R3HDML, cysteine-rich secretory protein LCCL domain-containing 1 (CRISPLD1), and cysteine-rich secretory protein LCCL domain-containing 2 (CRISPLD2). PI15 is a serine protease inhibitor which displays weak inhibitory activity against trypsin and may play a role in facial patterning during embryonic development. The PI15 gene is a candidate gene for abdominal aortic internal elastic lamina ruptures in the rat. R3HDML is a putative serine protease inhibitor, whose gene may be associated with clinical dimensions of schizophrenia. CRISPLD1 may play a role in NSCLP (nonsyndromic cleft lip with or without cleft palate) through the interaction with CRISPLD2 and folate pathway genes. plays a role in the etiology of NSCLP and is required for neural crest cell migration and cell viability during craniofacial development. The wider family of CAP domain containing proteins includes plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins (CRISPs), and allergen 5 from vespid venom, among others. — an NCBI CDD conserved domain (cd18812); members share this curated model.
