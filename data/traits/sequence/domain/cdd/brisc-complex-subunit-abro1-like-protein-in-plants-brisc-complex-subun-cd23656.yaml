identifier: CDD:cd23656
label: Abraxas_plant
definition: >-
  BRISC complex subunit Abro1-like protein in plants. BRISC complex subunit Abraxas 2 is also known as ABRO1, FAM175B or KIAA0157. The BRISC complex consists of BRCC36, MERIT40, BRE, and Abraxas 2, and serves cellular stress response and immune signaling functions; it specifically cleaves 'Lys-63'-linked polyubiquitin, leaving the last ubiquitin chain attached to its substrates; BRISC's catalytic subunit is the deubiquitinase (DUB) BRCC36. BRCC36 associates with pseudo-DUB protein Abraxas2, which lacks the essential Zn2+-coordinating residues required for DUB catalytic function. Higher-order association of BRCC36 and Abraxas2 into a dimer of heterodimers (superdimer) is required for BRCC36 DUB activity. In the BRISC complex, Abraxas 2 binds SHMT2a, a metabolic enzyme enabling cancer growth in hypoxic environments, which prevents the BRCC36 from binding and cleaving ubiquitin chains. BRCC36 in BRISC is activated by assembly due to interaction between Glu30 of BRCC36 and Asn164 in Abraxas 2 which structures the activation loop and positions the catalytic Glu33. Members in this subfamily include plant homologs of Abraxas 2 domains such as Arabidopsis thaliana BRCA1 (AtBRCA1). During plant evolution, BRCA1 acquired a PHD domain (absent in mammals), which might be involved in the transcriptional regulation of plant development, thus implicating participation of AtBRCA1 recruitment to damaged DNA. Arabidopsis thaliana harbors two homologs of the mammalian BRCA1 interaction partner BRCC36, AtBRCC36A and AtBRCC36B. Mutation of AtBRCC36A leads to a severe defect in intra- and interchromosomal homologous recombination (HR), which is also apparent in Atbrca1; in contrast, Atbrcc36b mutants showed no effect in HR. Atbrcc36a/Atbrca1 double mutant behaves like the single mutants of AtBRCA1 and AtBRCC36A and appears to be involved in a common pathway in the regulation of HR. AtBRCC36 is also epistatic to AtBRCA1 in DNA crosslink repair
