identifier: CDD:cd23793
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin conjugating enzyme E2 E1-E3 and related proteins. The E2E subfamily includes mammalian ubiquitin-conjugating enzyme E2 E1-3 (UBE2E1/UBCH6, UBE2E2/UBCH8, UBE2E3/UBCH9) and similar proteins. UBE2E, also known as (E3-independent) E2 ubiquitin-conjugating enzyme E, or E2 ubiquitin-conjugating enzyme E, accepts ubiquitin from the E1 complex and catalyzes its covalent attachment to other proteins. UBE2E1 (EC 2.3.2.23 and EC 2.3.2.24) catalyzes the covalent attachment of ISG15 to other proteins. It mediates the selective degradation of short-lived and abnormal proteins. In vitro, it also catalyzes 'Lys-48'-linked polyubiquitination. In vitro, both UBE2E2 (EC 2.3.2.23) and  UBE2E3 (EC 2.3.2.23) catalyze 'Lys-11'- and 'Lys-48'-, as well as 'Lys-63'-linked polyubiquitination. UBE2E2 catalyzes the ISGylation of influenza A virus NS1 protein. UBE2E3 participates in the regulation of trans-epithelial sodium transport in renal cells. It may be involved in cell growth arrest."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin conjugating enzyme E2 E1-E3 and related proteins. The E2E subfamily includes mammalian ubiquitin-conjugating enzyme E2 E1-3 (UBE2E1/UBCH6, UBE2E2/UBCH8, UBE2E3/UBCH9) and similar proteins. UBE2E, also known as (E3-independent) E2 ubiquitin-conjugating enzyme E, or E2 ubiquitin-conjugating enzyme E, accepts ubiquitin from the E1 complex and catalyzes its covalent attachment to other proteins. UBE2E1 (EC 2.3.2.23 and EC 2.3.2.24) catalyzes the covalent attachment of ISG15 to other proteins. It mediates the selective degradation of short-lived and abnormal proteins. In vitro, it also catalyzes 'Lys-48'-linked polyubiquitination. In vitro, both UBE2E2 (EC 2.3.2.23) and UBE2E3 (EC 2.3.2.23) catalyze 'Lys-11'- and 'Lys-48'-, as well as 'Lys-63'-linked polyubiquitination. UBE2E2 catalyzes the ISGylation of influenza A virus NS1 protein. UBE2E3 participates in the regulation of trans-epithelial sodium transport in renal cells. It may be involved in cell growth arrest. — an NCBI CDD conserved domain (cd23793); members share this curated model.
