identifier: CDD:cd20310
label: cupin_L-RbI
definition: >-
  L-ribose isomerase, cupin domain. L-ribose isomerase (RbI) catalyzes the reversible isomerization between L-ribose and L-ribulose, which are rare sugars and non-abundant in nature. RbI from Acinetobacter sp. DL-28 has been shown to have D-lyxose isomerase activity of about 47% compared to L-ribose. Cellulomonas parahominis MB426 RbI has a broad substrate specificity and can also catalyze the isomerization between D-lyxose and D-xylulose, D-talose and D-tagatose, L-allose and L-psicose, L-gulose and L-sorbose, and D-mannose and D-fructose. RbI adopts a cupin-type structure and belongs to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold
