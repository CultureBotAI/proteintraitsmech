identifier: CDD:cd18818
label: "Glycosyl hydrolase family 43 such as Geobacillus thermoleovorans IT-08 beta-xylosidase/exo-xylanase (GbtXyl43B). This glycosyl hydrolase family 43 (GH43) subgroup includes the characterized enzymes Geobacillus thermoleovorans IT-08 beta-xylosidase (EC 3.2.1.37) / exo-xylanase (GbtXyl43B), and Paenibacillus sp. strain E18 alpha-L-arabinofuranosidase (EC 3.2.1.55) Abf43B. It belongs to the glycosyl hydrolase clan F (according to carbohydrate-active enzymes database (CAZY)) which includes family 43 (GH43) and 62 (GH62) families. GH43 are inverting enzymes (i.e. they invert the stereochemistry of the anomeric carbon atom of the substrate) that have an aspartate as the catalytic general base, a glutamate as the catalytic general acid and another aspartate that is responsible for pKa modulation and orienting the catalytic acid. Many GH43 enzymes display both alpha-L-arabinofuranosidase and beta-D-xylosidase activity using aryl-glycosides as substrates. A common structural feature of GH43 enzymes is a 5-bladed beta-propeller domain that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller."
definition: >-
  Glycosyl hydrolase family 43 such as Geobacillus thermoleovorans IT-08 beta-xylosidase/exo-xylanase (GbtXyl43B). This glycosyl hydrolase family 43 (GH43) subgroup includes the characterized enzymes Geobacillus thermoleovorans IT-08 beta-xylosidase (EC 3.2.1.37) / exo-xylanase (GbtXyl43B), and Paenibacillus sp. strain E18 alpha-L-arabinofuranosidase (EC 3.2.1.55) Abf43B. It belongs to the glycosyl hydrolase clan F (according to carbohydrate-active enzymes database (CAZY)) which includes family 43 (GH43) and 62 (GH62) families. GH43 are inverting enzymes (i.e. they invert the stereochemistry of the anomeric carbon atom of the substrate) that have an aspartate as the catalytic general base, a glutamate as the catalytic general acid and another aspartate that is responsible for pKa modulation and orienting the catalytic acid. Many GH43 enzymes display both alpha-L-arabinofuranosidase and beta-D-xylosidase activity using aryl-glycosides as substrates. A common structural feature of GH43 enzymes is a 5-bladed beta-propeller domain that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller. — an NCBI CDD conserved domain (cd18818); members share this curated model.
