identifier: CDD:cd08086
label: "ATP-grasp domain of FAICAR synthetase (PurP). Formylaminocarboxyimidazole ribonucleotide synthetase (FAICAR synthetase or PurP) catalyzes the conversion of aminocarboxyimidazole ribonucleotide (AICAR) to FAICAR in the presence ATP and formate. Mg ion is used as a cofactor. A flexible loop covers the active site residues. It is the ninth step of the de novo purine biosynthetic pathway. M. jannaschii PurP belongs to this family and exists as a hexamer in native state. PurP is appears to use a formylphosphate intermediate formed by an ATP-dependent phosphorylation, and a conserved His27 as the catalytic base to deprotonate the 5-amino group of AICAR for nucleophilic attack."
definition: >-
