identifier: CDD:cd14496
label: "protein tyrosine phosphatase-like domains of paladin. Paladin is a putative phosphatase, which in mouse is expressed in endothelial cells during embryonic development and in arterial smooth muscle cells in adults. It has been suggested to be an antiphosphatase that regulates the activity of specific neural crest regulatory factors and thus, modulates neural crest cell formation and migration. Paladin contains two protein tyrosine phosphatase (PTP)-like domains. This model represents both repeats."
definition: >-
  protein tyrosine phosphatase-like domains of paladin. Paladin is a putative phosphatase, which in mouse is expressed in endothelial cells during embryonic development and in arterial smooth muscle cells in adults. It has been suggested to be an antiphosphatase that regulates the activity of specific neural crest regulatory factors and thus, modulates neural crest cell formation and migration. Paladin contains two protein tyrosine phosphatase (PTP)-like domains. This model represents both repeats. — an NCBI CDD conserved domain (cd14496); members share this curated model.
