identifier: CDD:cd17466
label: T3SS_Flik_C_like
definition: >-
  C-terminal domain of type III secretion proteins FliK, HrpP, YscP, and similar domains. Type III secretion systems (T3SS) are essential components of two complex bacterial machineries: the flagellum, which drives cell motility, and the non-flagellar T3SS, which delivers effectors into eukaryotic cells. This model represents the C-terminal domain of T3SS proteins such as the flagellar hook-length control protein FliK, and non-flagellar Yop proteins translocation protein P (YscP) and HrpP. FliK is responsible for switching secretion from the hook protein to that of the filament protein, by interacting with FlhB, the switchable secretion gate. HrpP is a type III secretion system substrate specificity switch-domain protein that is required for the export of pathogenicity factors into plant cells by pathogens. YscP is a needle-length sensing protein that controls the needle length of the injectisome, which is used by pathogenic bacteria to inject effector proteins across eukaryotic cell membranes. FliK, YscP, and HrpP contain a C-terminal globular domain that is necessary for the hierarchical switching of substrates during T3SS assembly and subsequent virulence effector secretion and is also referred to as the substrate-switching (SS) domain or the type III secretion substrate specificity switch (T3S4) domain
