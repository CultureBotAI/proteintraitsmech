identifier: CDD:cd08067
label: "Mov34/MPN/PAD-1 family: Histone H2A deubiquitinase. This family includes histone H2A deubiquitinase (Histone H2A DUB;MYSM1; myb-like, SWIRM and MPN domains 1; 2ADUB; 2A-DUB; KIAA19152ADUB, or KIAA1915/MYSM1), a member of JAMM/MPN+ deubiquitinases (DUBs), with possible Zn2+-dependent ubiquitin isopeptidase activity. It contains the SWIRM (Swi3p, Rsc8p and Moira), and SANT (SWI-SNF, ADA N-CoR, TFIIIB)/Myb domains; the SANT, but not the SWIRM, domain can bind directly to DNA. 2A-DUB is specific for monoubiquitinated H2A (uH2A), regulating transcription by coordinating histone acetylation and deubiquitination, and destabilizing the association of linker histone H1 with nucleosomes. 2A-DUB interacts with p/CAF (p300/CBP-associated factor) in a co-regulatory protein complex, where the status of acetylation of nucleosomal histones modulates its deubiquitinase activity. 2A-DUB is a positive regulator of androgen receptor (AR) transactivation activity on a reporter gene; it participates in transcriptional regulation events in androgen receptor-dependent gene activation. In prostate tumors, the levels of uH2A are dramatically decreased, thus 2A-DUB serving as a cancer-related marker."
definition: >-
  Mov34/MPN/PAD-1 family: Histone H2A deubiquitinase. This family includes histone H2A deubiquitinase (Histone H2A DUB;MYSM1; myb-like, SWIRM and MPN domains 1; 2ADUB; 2A-DUB; KIAA19152ADUB, or KIAA1915/MYSM1), a member of JAMM/MPN+ deubiquitinases (DUBs), with possible Zn2+-dependent ubiquitin isopeptidase activity. It contains the SWIRM (Swi3p, Rsc8p and Moira), and SANT (SWI-SNF, ADA N-CoR, TFIIIB)/Myb domains; the SANT, but not the SWIRM, domain can bind directly to DNA. 2A-DUB is specific for monoubiquitinated H2A (uH2A), regulating transcription by coordinating histone acetylation and deubiquitination, and destabilizing the association of linker histone H1 with nucleosomes. 2A-DUB interacts with p/CAF (p300/CBP-associated factor) in a co-regulatory protein complex, where the status of acetylation of nucleosomal histones modulates its deubiquitinase activity. 2A-DUB is a positive regulator of androgen receptor (AR) transactivation activity on a reporter gene; it participates in transcriptional regulation events in androgen receptor-dependent gene activation. In prostate tumors, the levels of uH2A are dramatically decreased, thus 2A-DUB serving as a cancer-related marker. — an NCBI CDD conserved domain (cd08067); members share this curated model.
