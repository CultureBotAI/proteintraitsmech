identifier: CDD:cd01021
label: "Goose egg-white lysozyme. Eukaryotic goose-type or G-type lysozyme (goose egg-white lysozyme; GEWL) catalyzes the cleavage of the beta-1,4-glycosidic bond between N-acetylmuramic acid (MurNAc) and N-acetylglucosamine (GlcNAc). Mammals have two lysozymes. This family corresponds to human and mouse lysozyme G-like protein 2."
definition: >-
  Goose egg-white lysozyme. Eukaryotic goose-type or G-type lysozyme (goose egg-white lysozyme; GEWL) catalyzes the cleavage of the beta-1,4-glycosidic bond between N-acetylmuramic acid (MurNAc) and N-acetylglucosamine (GlcNAc). Mammals have two lysozymes. This family corresponds to human and mouse lysozyme G-like protein 2. — an NCBI CDD conserved domain (cd01021); members share this curated model.
