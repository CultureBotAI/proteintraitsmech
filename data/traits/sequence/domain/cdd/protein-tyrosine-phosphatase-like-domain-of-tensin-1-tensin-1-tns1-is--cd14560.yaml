identifier: CDD:cd14560
label: "protein tyrosine phosphatase-like domain of tensin-1. Tensin-1 (TNS1) is part of the tensin family of intracellular proteins (tensin-1, -2, -3 and -4), which act as links between the extracellular matrix and the cytoskeleton, and thereby mediate signaling for cell shape and motility. It plays an essential role in TGF-beta-induced myofibroblast differentiation and myofibroblast-mediated formation of extracellular fibronectin and collagen matrix. It also positively regulates RhoA activity through its interaction with DLC1, a RhoGAP-containing tumor suppressor; the tensin-1-DLC1-RhoA signaling axis is critical in regulating cellular functions that lead to angiogenesis. Tensin-1 contains an N-terminal region with a protein tyrosine phosphatase (PTP)-like domain followed by a protein kinase 2 (C2) domain, and a C-terminal region with SH2 and pTyr binding (PTB) domains."
definition: >-
  protein tyrosine phosphatase-like domain of tensin-1. Tensin-1 (TNS1) is part of the tensin family of intracellular proteins (tensin-1, -2, -3 and -4), which act as links between the extracellular matrix and the cytoskeleton, and thereby mediate signaling for cell shape and motility. It plays an essential role in TGF-beta-induced myofibroblast differentiation and myofibroblast-mediated formation of extracellular fibronectin and collagen matrix. It also positively regulates RhoA activity through its interaction with DLC1, a RhoGAP-containing tumor suppressor; the tensin-1-DLC1-RhoA signaling axis is critical in regulating cellular functions that lead to angiogenesis. Tensin-1 contains an N-terminal region with a protein tyrosine phosphatase (PTP)-like domain followed by a protein kinase 2 (C2) domain, and a C-terminal region with SH2 and pTyr binding (PTB) domains. — an NCBI CDD conserved domain (cd14560); members share this curated model.
