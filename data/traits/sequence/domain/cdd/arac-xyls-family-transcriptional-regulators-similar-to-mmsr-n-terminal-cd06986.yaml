identifier: CDD:cd06986
label: "AraC/XylS family transcriptional regulators similar to MmsR, N-terminal cupin domain. This family contains bacterial proteins containing an AraC/XylS family helix-turn-helix (HTH) DNA-binding domain C-terminal to a cupin domain, and may be possible transcriptional regulators. Included is MmsR, a bacterial transcriptional regulator thought to positively regulate the expression of the mmsAB operon. The mmsAB operon contains two structural genes involved in valine metabolism: mmsA which encodes methylmalonate-semialdehyde dehydrogenase, and mmsB which encodes 3-hydroxyisobutyrate dehydrogenase. The cupin domain of members of this subfamily does not contain a metal binding site."
definition: >-
  AraC/XylS family transcriptional regulators similar to MmsR, N-terminal cupin domain. This family contains bacterial proteins containing an AraC/XylS family helix-turn-helix (HTH) DNA-binding domain C-terminal to a cupin domain, and may be possible transcriptional regulators. Included is MmsR, a bacterial transcriptional regulator thought to positively regulate the expression of the mmsAB operon. The mmsAB operon contains two structural genes involved in valine metabolism: mmsA which encodes methylmalonate-semialdehyde dehydrogenase, and mmsB which encodes 3-hydroxyisobutyrate dehydrogenase. The cupin domain of members of this subfamily does not contain a metal binding site. — an NCBI CDD conserved domain (cd06986); members share this curated model.
