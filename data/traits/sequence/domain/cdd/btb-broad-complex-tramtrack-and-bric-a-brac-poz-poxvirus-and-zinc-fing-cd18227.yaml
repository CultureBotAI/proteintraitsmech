identifier: CDD:cd18227
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 43 (ZBTB43). ZBTB43, also called zinc finger and BTB domain-containing protein 22B (ZBTB22b), zinc finger protein 297B (ZNF297B), or ZnF-x, may be involved in transcriptional regulation. It interacts with BDP1, a subunit of transcription factor IIIB (TFIIIB). Since BDP1 is essential in Pol III transcription, ZBTB43 may also regulate these transcriptional pathways. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 43 (ZBTB43). ZBTB43, also called zinc finger and BTB domain-containing protein 22B (ZBTB22b), zinc finger protein 297B (ZNF297B), or ZnF-x, may be involved in transcriptional regulation. It interacts with BDP1, a subunit of transcription factor IIIB (TFIIIB). Since BDP1 is essential in Pol III transcription, ZBTB43 may also regulate these transcriptional pathways. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18227); members share this curated model.
