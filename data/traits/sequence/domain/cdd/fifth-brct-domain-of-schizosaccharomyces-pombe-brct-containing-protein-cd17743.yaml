identifier: CDD:cd17743
label: "fifth BRCT domain of Schizosaccharomyces pombe BRCT-containing protein 1 (BRC1) and similar proteins. Schizosaccharomyces pombe BRC1 is required for mitotic fidelity, specifically in the G2 phase of the cell cycle. It plays a role in chromatin organization. The family also includes Cryptococcus neoformans DNA ligase 4 (LIG4, also known as DNA ligase IV or polydeoxyribonucleotide synthase [ATP] 4), which is involved in dsDNA break repair, and plays a role in non-homologous integration (NHI) pathways where it is required in the final step of non-homologus end-joining. Members in this family contain six BRCT domains. This family corresponds to the fifth one."
definition: >-
  fifth BRCT domain of Schizosaccharomyces pombe BRCT-containing protein 1 (BRC1) and similar proteins. Schizosaccharomyces pombe BRC1 is required for mitotic fidelity, specifically in the G2 phase of the cell cycle. It plays a role in chromatin organization. The family also includes Cryptococcus neoformans DNA ligase 4 (LIG4, also known as DNA ligase IV or polydeoxyribonucleotide synthase [ATP] 4), which is involved in dsDNA break repair, and plays a role in non-homologous integration (NHI) pathways where it is required in the final step of non-homologus end-joining. Members in this family contain six BRCT domains. This family corresponds to the fifth one. — an NCBI CDD conserved domain (cd17743); members share this curated model.
