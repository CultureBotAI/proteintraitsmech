identifier: CDD:cd16177
label: "EF-hand, calcium binding motif, found in calretinin (CR). CR, also termed 29 kDa calbindin, is a cytosolic hexa-EF-hand calcium-binding protein predominantly expressed in a variety of normal and tumorigenic t specific neurons of the central and peripheral nervous system. It possibly functions as a calcium buffer, calcium sensor, and apoptosis regulator, which may be implicated in many biological processes, including cell proliferation, differentiation, and cell death. CR contains six EF-hand motifs within two independent domains, CR I-II and CR III-VI. CR I-II consists of EF-hand motifs 1 and 2, and CR III-VI consists of EF-hand motifs 3-6. The first 5 EF-hand motifs are capable of binding calcium ions, while the EF-hand 6 is inactive. Thus, CR has two pairs of cooperative binding sites (I-II and III-IV), which display high affinity calcium-binding sites, and one independent calcium ion-binding site (V), which displays lower affinity binding."
definition: >-
  EF-hand, calcium binding motif, found in calretinin (CR). CR, also termed 29 kDa calbindin, is a cytosolic hexa-EF-hand calcium-binding protein predominantly expressed in a variety of normal and tumorigenic t specific neurons of the central and peripheral nervous system. It possibly functions as a calcium buffer, calcium sensor, and apoptosis regulator, which may be implicated in many biological processes, including cell proliferation, differentiation, and cell death. CR contains six EF-hand motifs within two independent domains, CR I-II and CR III-VI. CR I-II consists of EF-hand motifs 1 and 2, and CR III-VI consists of EF-hand motifs 3-6. The first 5 EF-hand motifs are capable of binding calcium ions, while the EF-hand 6 is inactive. Thus, CR has two pairs of cooperative binding sites (I-II and III-IV), which display high affinity calcium-binding sites, and one independent calcium ion-binding site (V), which displays lower affinity binding. — an NCBI CDD conserved domain (cd16177); members share this curated model.
