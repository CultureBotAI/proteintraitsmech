identifier: CDD:cd22142
label: "F-box domain found in Saccharomyces cerevisiae protein Digs into agar protein 2 (ScDIA2) and similar proteins. ScDIA2 is a replication origin-binding protein that plays a role in regulating DNA replication. It is a component of a SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Saccharomyces cerevisiae protein Digs into agar protein 2 (ScDIA2) and similar proteins. ScDIA2 is a replication origin-binding protein that plays a role in regulating DNA replication. It is a component of a SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22142); members share this curated model.
