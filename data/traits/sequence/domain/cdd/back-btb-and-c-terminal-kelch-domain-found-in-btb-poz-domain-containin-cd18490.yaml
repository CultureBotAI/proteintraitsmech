identifier: CDD:cd18490
label: "BACK (BTB and C-terminal Kelch) domain found in BTB/POZ domain-containing protein 8 (BTBD8). BTBD8 is a BTB-domain-containing Kelch-like protein that may play a role in developmental process. It may also act as a protein-protein adaptor in a transcription complex and thus may be involved in brain development."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in BTB/POZ domain-containing protein 8 (BTBD8). BTBD8 is a BTB-domain-containing Kelch-like protein that may play a role in developmental process. It may also act as a protein-protein adaptor in a transcription complex and thus may be involved in brain development. — an NCBI CDD conserved domain (cd18490); members share this curated model.
