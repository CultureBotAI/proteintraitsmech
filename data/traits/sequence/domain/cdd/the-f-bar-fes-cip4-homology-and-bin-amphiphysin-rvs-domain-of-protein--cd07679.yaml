identifier: CDD:cd07679
label: "The F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain of Protein kinase C and Casein kinase Substrate in Neurons 2 (PACSIN2). F-BAR domains are dimerization modules that bind and bend membranes and are found in proteins involved in membrane dynamics and actin reorganization. Protein kinase C and Casein kinase Substrate in Neurons (PACSIN) proteins, also called Synaptic dynamin-associated proteins (Syndapins), act as regulators of cytoskeletal and membrane dynamics. Vetebrates harbor three isoforms with distinct expression patterns and specific functions. PACSIN 2 or Syndapin II is expressed ubiquitously and is involved in the regulation of tubulin polymerization. It associates with Golgi membranes and forms a complex with dynamin II which is crucial in promoting vesicle formation from the trans-Golgi network. PACSIN 2 contains an N-terminal F-BAR domain and a C-terminal SH3 domain. F-BAR domains form banana-shaped dimers with a positively-charged concave surface that binds to negatively-charged lipid membranes. They can induce membrane deformation in the form of long tubules."
definition: >-
  The F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain of Protein kinase C and Casein kinase Substrate in Neurons 2 (PACSIN2). F-BAR domains are dimerization modules that bind and bend membranes and are found in proteins involved in membrane dynamics and actin reorganization. Protein kinase C and Casein kinase Substrate in Neurons (PACSIN) proteins, also called Synaptic dynamin-associated proteins (Syndapins), act as regulators of cytoskeletal and membrane dynamics. Vetebrates harbor three isoforms with distinct expression patterns and specific functions. PACSIN 2 or Syndapin II is expressed ubiquitously and is involved in the regulation of tubulin polymerization. It associates with Golgi membranes and forms a complex with dynamin II which is crucial in promoting vesicle formation from the trans-Golgi network. PACSIN 2 contains an N-terminal F-BAR domain and a C-terminal SH3 domain. F-BAR domains form banana-shaped dimers with a positively-charged concave surface that binds to negatively-charged lipid membranes. They can induce membrane deformation in the form of long tubules. — an NCBI CDD conserved domain (cd07679); members share this curated model.
