identifier: CDD:sd00042
label: LVIVD
definition: >-
  LVIVD repeat. LVIVD repeats are mainly found in bacterial and archaeal cell surface proteins, many of them hypothetical. Structurally, LVIVD repeats have been predicted to form a beta-propeller, with each repeat forming one four-stranded anti-parallel beta-sheet blade
