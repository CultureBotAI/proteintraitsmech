identifier: CDD:cd19742
label: "basic helix-loop-helix (bHLH) domain found in achaete-scute-like protein 1 (ASCL-1) and similar proteins. ASCL-1, also termed Class A basic helix-loop-helix protein 46 (bHLHa46), or achaete-scute homolog 1 (ASH-1), or mammalian achaete scute homolog 1 (Mash1), is a neural-specific bHLH transcription factor that is expressed in subsets of neural progenitors in both the central and peripheral nervous system. It plays a key role in neuronal differentiation and specification in the nervous system."
definition: >-
  basic helix-loop-helix (bHLH) domain found in achaete-scute-like protein 1 (ASCL-1) and similar proteins. ASCL-1, also termed Class A basic helix-loop-helix protein 46 (bHLHa46), or achaete-scute homolog 1 (ASH-1), or mammalian achaete scute homolog 1 (Mash1), is a neural-specific bHLH transcription factor that is expressed in subsets of neural progenitors in both the central and peripheral nervous system. It plays a key role in neuronal differentiation and specification in the nervous system. — an NCBI CDD conserved domain (cd19742); members share this curated model.
