identifier: CDD:cd23310
label: "FGF domain, beta-trefoil fold, found in the fibroblast growth factor 19 (FGF19)-like family. The FGF19-like family includes FGF19, FGF21, and FGF23. FGF19 is involved in the suppression of bile acid biosynthesis through down-regulation of CYP7A1 expression, following positive regulation of the JNK and ERK1/2 cascades. It stimulates glucose uptake in adipocytes. Its activity requires the presence of beta-Klotho (KLB) and FGFR4. FGF-19 interacts with fibroblast growth factor receptors, FGFR1, FGFR2, FGFR3, and FGFR4. FGF21 stimulates glucose uptake in differentiated adipocytes via the induction of glucose transporter SLC2A1/GLUT1 expression (but not SLC2A4/GLUT4 expression). Its activity requires the presence of KLB. It interacts (via C-terminus) with KLB and fibroblast growth factor receptor FGFR4. FGF23, also called phosphatonin, or tumor-derived hypophosphatemia-inducing factor (HYPF), is a regulator of phosphate homeostasis. It inhibits renal tubular phosphate transport by reducing SLC34A1 levels. It upregulates EGR1 expression in the presence of alpha-Klotho (KL). It acts directly on the parathyroid to decrease PTH secretion. FGF23 acts as a regulator of vitamin-D metabolism. It negatively regulates osteoblast differentiation and matrix mineralization. FGF23 interacts with FGFR1, FGFR2, FGFR3, and FGFR4. Members in this family contain a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  FGF domain, beta-trefoil fold, found in the fibroblast growth factor 19 (FGF19)-like family. The FGF19-like family includes FGF19, FGF21, and FGF23. FGF19 is involved in the suppression of bile acid biosynthesis through down-regulation of CYP7A1 expression, following positive regulation of the JNK and ERK1/2 cascades. It stimulates glucose uptake in adipocytes. Its activity requires the presence of beta-Klotho (KLB) and FGFR4. FGF-19 interacts with fibroblast growth factor receptors, FGFR1, FGFR2, FGFR3, and FGFR4. FGF21 stimulates glucose uptake in differentiated adipocytes via the induction of glucose transporter SLC2A1/GLUT1 expression (but not SLC2A4/GLUT4 expression). Its activity requires the presence of KLB. It interacts (via C-terminus) with KLB and fibroblast growth factor receptor FGFR4. FGF23, also called phosphatonin, or tumor-derived hypophosphatemia-inducing factor (HYPF), is a regulator of phosphate homeostasis. It inhibits renal tubular phosphate transport by reducing SLC34A1 levels. It upregulates EGR1 expression in the presence of alpha-Klotho (KL). It acts directly on the parathyroid to decrease PTH secretion. FGF23 acts as a regulator of vitamin-D metabolism. It negatively regulates osteoblast differentiation and matrix mineralization. FGF23 interacts with FGFR1, FGFR2, FGFR3, and FGFR4. Members in this family contain a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23310); members share this curated model.
