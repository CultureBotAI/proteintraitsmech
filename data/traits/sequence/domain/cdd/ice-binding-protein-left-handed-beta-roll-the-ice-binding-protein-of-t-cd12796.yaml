identifier: CDD:cd12796
label: "Ice-binding protein, left-handed beta-roll. The ice-binding protein of the grass Lolium perenne (LpIBP) discourages the recrystallization of ice. Ice-binding proteins produced by organisms to prevent the growing of ice are termed to anti-freeze proteins. LpIBP consists of an unusual left-handed beta roll. Ice-binding is mediated by a flat beta-sheet on one side of the helix."
definition: >-
  Ice-binding protein, left-handed beta-roll. The ice-binding protein of the grass Lolium perenne (LpIBP) discourages the recrystallization of ice. Ice-binding proteins produced by organisms to prevent the growing of ice are termed to anti-freeze proteins. LpIBP consists of an unusual left-handed beta roll. Ice-binding is mediated by a flat beta-sheet on one side of the helix. — an NCBI CDD conserved domain (cd12796); members share this curated model.
