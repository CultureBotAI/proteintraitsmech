identifier: CDD:cd05204
label: Octopine_norvaline_DH
definition: >-
  NAD/NADP octopine/nopaline dehydrogenase, NAD binding domain. This group of enzymes act on the CH-NH substrate bond using NAD(+) or NADP(+) as an acceptor. The Pfam family consists mainly of octopine and nopaline dehydrogenases from Ti plasmids. This domain is an NAD(P) binding Rossman fold
