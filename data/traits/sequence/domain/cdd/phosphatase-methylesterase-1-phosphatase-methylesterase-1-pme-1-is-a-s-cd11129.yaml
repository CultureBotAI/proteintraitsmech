identifier: CDD:cd11129
label: "Phosphatase methylesterase 1. Phosphatase methylesterase 1 (PME-1) is a serine hydrolase that controls the reversible methylation of protein phosphatase 2 (PPA2).  It has been implicated in both cancer and Alzheimer's Disease.  In malignant gliomas, it supports sustained ERK pathway activity.  Regulation of PPA2 in the brain is critical for neuroblastoma cell differentiation, and neuritic alterations are observed in many neurodegenerative disorders, such as Alzheimer's."
definition: >-
  Phosphatase methylesterase 1. Phosphatase methylesterase 1 (PME-1) is a serine hydrolase that controls the reversible methylation of protein phosphatase 2 (PPA2). It has been implicated in both cancer and Alzheimer's Disease. In malignant gliomas, it supports sustained ERK pathway activity. Regulation of PPA2 in the brain is critical for neuroblastoma cell differentiation, and neuritic alterations are observed in many neurodegenerative disorders, such as Alzheimer's. — an NCBI CDD conserved domain (cd11129); members share this curated model.
