identifier: CDD:cd17199
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM domain-containing protein 4A (FRMD4A). FRMD4A is a cytohesin adaptor involved in cell structure, transport and signaling. It promotes the growth of cancer cells in tongue, head and neck squamous cell carcinomas. It also regulates tau secretion by activating cytohesin-Arf6 signaling through connecting cytohesin family Arf6-specific guanine-nucleotide exchange factors (GEFs) and Par-3 at primordial adherens junctions during epithelial polarization. As a genetic risk factor for late-onset Alzheimer's disease (AD), FRMD4A may play a role in amyloidogenic and tau-related pathways in AD. FRMD4A contains a FERM domain that is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM domain-containing protein 4A (FRMD4A). FRMD4A is a cytohesin adaptor involved in cell structure, transport and signaling. It promotes the growth of cancer cells in tongue, head and neck squamous cell carcinomas. It also regulates tau secretion by activating cytohesin-Arf6 signaling through connecting cytohesin family Arf6-specific guanine-nucleotide exchange factors (GEFs) and Par-3 at primordial adherens junctions during epithelial polarization. As a genetic risk factor for late-onset Alzheimer's disease (AD), FRMD4A may play a role in amyloidogenic and tau-related pathways in AD. FRMD4A contains a FERM domain that is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17199); members share this curated model.
