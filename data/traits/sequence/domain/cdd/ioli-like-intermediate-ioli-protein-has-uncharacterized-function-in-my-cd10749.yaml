identifier: CDD:cd10749
label: IolI-like_intermediate
definition: >-
  IolI-like_intermediate. Ioli Protein has uncharacterized function in Myo-Inositol catabolism.In B. subtilis, the iol operons iolABCDEFGHIJ and iolRS, and the iolT gene are known to be required for inositol catabolism.The iolI gene product was shown to be 2KMI/1-keto-DCI isomerase involved in DCI metabolism. IolI is paralogous to both IolH and IolE. These are all members of the Xylose-isomerase-like TIM barrell superfamily
