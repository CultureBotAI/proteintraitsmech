identifier: CDD:cd17082
label: RAWUL_PCGF2_like
definition: >-
  RING finger- and WD40-associated ubiquitin-like (RAWUL) domain found in polycomb group RING finger proteins PCGF2, PCGF4, and similar proteins. This family includes polycomb group RING finger proteins, PCGF2 (also known as Mel-18, or RNF110, or ZNF144) and PCGF4 (also known as BMI-1, or RNF51), both serving as the core component of a canonical polycomb repressive complex 1 (PRC1). PRC1 is composed of a chromodomain-containing protein (CBX2, CBX4, CBX6, CBX7 or CBX8) and a polyhomeotic protein (PHC1, PHC2, or PHC3). Like other PCGF homologs, PCGF2 associates with ring finger protein 2 (RNF2) to form a RNF2-PCGF heterodimer, which is catalytically competent as an E3 ubiquitin transferase and is the scaffold for the assembly of additional components. PCGF4 associates with the Runx1/CBFbeta transcription factor complex to silence the target gene in a PRC2-independent manner. Both, PCGF2 and PCGF4, contain a C3HC4-type RING-HC finger and a RAWUL domain
