identifier: CDD:cd18127
label: "C-terminal catalytic domain of type II glyceraldehyde-3-phosphate dehydrogenase (GAPDH) and similar proteins. Glyceraldehyde-3-phosphate dehydrogenase (GAPDH) plays an important role in glycolysis and gluconeogenesis by reversibly catalyzing the oxidation and phosphorylation of D-glyceraldehyde-3-phosphate to 1,3-diphospho-glycerate. It has been implicated in varied activities including regulating mRNA stability, the regulation of gene expression, induction of apoptosis, intracellular membrane trafficking, iron uptake and transport (via secreted GAPDH), heme metabolism, the maintenance of genomic integrity, and nuclear tRNA export. GAPDH proteins contains an N-terminal NAD(P)-binding domain and a C-terminal catalytic domain. The primarily N-terminal NAD(P)-binding domain contains a Rossmann fold which combines with the catalytic cysteine-containing C-terminus to form a catalytic cleft. Phosphatidyl-serine, RNA, and glutathione binding sites have been identified in the N-terminus. Different forms of GAPDH exist which utilize NAD (1.2.1.12), NADP (1.2.1.13) or either (1.2.1.59). The family corresponds to type II NADP+ utilizing GAPDHs, mainly from archaea."
definition: >-
  C-terminal catalytic domain of type II glyceraldehyde-3-phosphate dehydrogenase (GAPDH) and similar proteins. Glyceraldehyde-3-phosphate dehydrogenase (GAPDH) plays an important role in glycolysis and gluconeogenesis by reversibly catalyzing the oxidation and phosphorylation of D-glyceraldehyde-3-phosphate to 1,3-diphospho-glycerate. It has been implicated in varied activities including regulating mRNA stability, the regulation of gene expression, induction of apoptosis, intracellular membrane trafficking, iron uptake and transport (via secreted GAPDH), heme metabolism, the maintenance of genomic integrity, and nuclear tRNA export. GAPDH proteins contains an N-terminal NAD(P)-binding domain and a C-terminal catalytic domain. The primarily N-terminal NAD(P)-binding domain contains a Rossmann fold which combines with the catalytic cysteine-containing C-terminus to form a catalytic cleft. Phosphatidyl-serine, RNA, and glutathione binding sites have been identified in the N-terminus. Different forms of GAPDH exist which utilize NAD (1.2.1.12), NADP (1.2.1.13) or either (1.2.1.59). The family corresponds to type II NADP+ utilizing GAPDHs, mainly from archaea. — an NCBI CDD conserved domain (cd18127); members share this curated model.
