identifier: CDD:cd24053
label: "nucleotide-binding domain (NBD) of Escherichia coli exopolyphosphatase (EcPPX), guanosine pentaphosphate phosphohydrolase (EcGppA) and similar proteins. The PPX/GppA family proteins play essential roles in bacterial survival and metabolism. Guanosine pentaphosphate (pppGpp) phosphohydrolase (GppA; EC 3.6.1.40) plays a key role in (p)ppGpp homeostasis. It specifically catalyzes the conversion of pppGpp to ppGpp (guanosine tetraphosphate). Sharing a similar domain structure, GppA is indistinguishable from exopolyphosphatase (PPX; EC 3.6.1.11), which mediates the metabolism of cellular inorganic polyphosphate. Especially, it is responsible for the maintenance of appropriate levels of cellular inorganic polyphosphate (PolyP). The family corresponds a group of proteins similar to Escherichia coli exopolyphosphatase (EcPPX) and guanosine pentaphosphate phosphohydrolase (EcGppA). Unlike other PPX/GppA family members containing one PPX/GppA homolog, E. coli possesses two homologs, EcGppA and EcPPX."
definition: >-
  nucleotide-binding domain (NBD) of Escherichia coli exopolyphosphatase (EcPPX), guanosine pentaphosphate phosphohydrolase (EcGppA) and similar proteins. The PPX/GppA family proteins play essential roles in bacterial survival and metabolism. Guanosine pentaphosphate (pppGpp) phosphohydrolase (GppA; EC 3.6.1.40) plays a key role in (p)ppGpp homeostasis. It specifically catalyzes the conversion of pppGpp to ppGpp (guanosine tetraphosphate). Sharing a similar domain structure, GppA is indistinguishable from exopolyphosphatase (PPX; EC 3.6.1.11), which mediates the metabolism of cellular inorganic polyphosphate. Especially, it is responsible for the maintenance of appropriate levels of cellular inorganic polyphosphate (PolyP). The family corresponds a group of proteins similar to Escherichia coli exopolyphosphatase (EcPPX) and guanosine pentaphosphate phosphohydrolase (EcGppA). Unlike other PPX/GppA family members containing one PPX/GppA homolog, E. coli possesses two homologs, EcGppA and EcPPX. — an NCBI CDD conserved domain (cd24053); members share this curated model.
