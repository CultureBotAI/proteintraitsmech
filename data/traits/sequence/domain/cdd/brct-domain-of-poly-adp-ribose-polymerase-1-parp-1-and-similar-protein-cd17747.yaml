identifier: CDD:cd17747
label: "BRCT domain of poly [ADP-ribose] polymerase 1 (PARP-1) and similar proteins. PARP-1 (EC 2.4.2.30), also termed ADP-ribosyltransferase diphtheria toxin-like 1 (ARTD1), or NAD(+) ADP-ribosyltransferase 1 (ADPRT 1), or poly[ADP-ribose] synthase 1, is involved in the base excision repair (BER) pathway, by catalyzing the poly(ADP-ribosyl)ation of a limited number of acceptor proteins involved in chromatin architecture and in DNA metabolism."
definition: >-
  BRCT domain of poly [ADP-ribose] polymerase 1 (PARP-1) and similar proteins. PARP-1 (EC 2.4.2.30), also termed ADP-ribosyltransferase diphtheria toxin-like 1 (ARTD1), or NAD(+) ADP-ribosyltransferase 1 (ADPRT 1), or poly[ADP-ribose] synthase 1, is involved in the base excision repair (BER) pathway, by catalyzing the poly(ADP-ribosyl)ation of a limited number of acceptor proteins involved in chromatin architecture and in DNA metabolism. — an NCBI CDD conserved domain (cd17747); members share this curated model.
