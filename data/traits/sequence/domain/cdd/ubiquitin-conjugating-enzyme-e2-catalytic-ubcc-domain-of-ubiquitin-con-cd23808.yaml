identifier: CDD:cd23808
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin conjugating enzyme E2 W and related enzymes. The E2W subfamily includes mammalian ubiquitin-conjugating enzymes E2 W (UBE2W/UBC16), plant ubiquitin-conjugating enzyme E2 15-18 (UBC15-18), and similar proteins. They are ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. UBE2W, also called FLJ11011, E2 ubiquitin-conjugating enzyme W, N-terminal E2 ubiquitin-conjugating enzyme (EC 2.3.2.25), N-terminus-conjugating E2, ubiquitin carrier protein W, ubiquitin-conjugating enzyme 16 (UBC-16), or ubiquitin-protein ligase W, specifically monoubiquitinates the N-terminus of various substrates, including ATXN3, MAPT/TAU, POLR2H/RPB8 and STUB1/CHIP, by recognizing backbone atoms of disordered N-termini. In vitro, UBE2W catalyzes 'Lys-11'-linked polyubiquitination. UBE2W is an important protein for early postnatal survival and for the normal functioning of multiple organ systems."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin conjugating enzyme E2 W and related enzymes. The E2W subfamily includes mammalian ubiquitin-conjugating enzymes E2 W (UBE2W/UBC16), plant ubiquitin-conjugating enzyme E2 15-18 (UBC15-18), and similar proteins. They are ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. UBE2W, also called FLJ11011, E2 ubiquitin-conjugating enzyme W, N-terminal E2 ubiquitin-conjugating enzyme (EC 2.3.2.25), N-terminus-conjugating E2, ubiquitin carrier protein W, ubiquitin-conjugating enzyme 16 (UBC-16), or ubiquitin-protein ligase W, specifically monoubiquitinates the N-terminus of various substrates, including ATXN3, MAPT/TAU, POLR2H/RPB8 and STUB1/CHIP, by recognizing backbone atoms of disordered N-termini. In vitro, UBE2W catalyzes 'Lys-11'-linked polyubiquitination. UBE2W is an important protein for early postnatal survival and for the normal functioning of multiple organ systems. — an NCBI CDD conserved domain (cd23808); members share this curated model.
