identifier: CDD:cd18913
label: "basic helix-loop-helix-orange (bHLH-O) domain found in Drosophila melanogaster protein hairy, protein deadpan and similar proteins. Protein hairy is a bHLH transcriptional repressor of genes that require a bHLH-O protein for their transcription. It acts as a pair-rule protein that regulates embryonic segmentation and adult bristle patterning. Protein deadpan is closely related to the product of the segmentation gene hairy. It is a direct target of Notch signaling and regulates neuroblast self-renewal in Drosophila."
definition: >-
  basic helix-loop-helix-orange (bHLH-O) domain found in Drosophila melanogaster protein hairy, protein deadpan and similar proteins. Protein hairy is a bHLH transcriptional repressor of genes that require a bHLH-O protein for their transcription. It acts as a pair-rule protein that regulates embryonic segmentation and adult bristle patterning. Protein deadpan is closely related to the product of the segmentation gene hairy. It is a direct target of Notch signaling and regulates neuroblast self-renewal in Drosophila. — an NCBI CDD conserved domain (cd18913); members share this curated model.
