identifier: CDD:cd13995
label: "Catalytic domain of the Serine/Threonine kinase, Mitogen-Activated Protein Kinase (MAPK) Kinase Kinase 8. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MAP3K8 is also called Tumor progression locus 2 (Tpl2) or Cancer Osaka thyroid (Cot), and was first identified as a proto-oncogene in T-cell lymphoma induced by MoMuL virus and in breast carcinoma induced by MMTV. Activated MAP3K8 induces various MAPK pathways including Extracellular Regulated Kinase (ERK) 1/2, c-Jun N-terminal kinase (JNK), and p38. It plays a pivotal role in innate immunity, linking Toll-like receptors to the production of TNF and the activation of ERK in macrophages. It is also required in interleukin-1beta production and is critical in host defense against Gram-positive bacteria. MAP3Ks (MKKKs or MAPKKKs) phosphorylate and activate MAPK kinases (MAPKKs or MKKs or MAP2Ks), which in turn phosphorylate and activate MAPKs during signaling cascades that are important in mediating cellular responses to extracellular signals. The MAP3K8 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, Mitogen-Activated Protein Kinase (MAPK) Kinase Kinase 8. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MAP3K8 is also called Tumor progression locus 2 (Tpl2) or Cancer Osaka thyroid (Cot), and was first identified as a proto-oncogene in T-cell lymphoma induced by MoMuL virus and in breast carcinoma induced by MMTV. Activated MAP3K8 induces various MAPK pathways including Extracellular Regulated Kinase (ERK) 1/2, c-Jun N-terminal kinase (JNK), and p38. It plays a pivotal role in innate immunity, linking Toll-like receptors to the production of TNF and the activation of ERK in macrophages. It is also required in interleukin-1beta production and is critical in host defense against Gram-positive bacteria. MAP3Ks (MKKKs or MAPKKKs) phosphorylate and activate MAPK kinases (MAPKKs or MKKs or MAP2Ks), which in turn phosphorylate and activate MAPKs during signaling cascades that are important in mediating cellular responses to extracellular signals. The MAP3K8 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd13995); members share this curated model.
