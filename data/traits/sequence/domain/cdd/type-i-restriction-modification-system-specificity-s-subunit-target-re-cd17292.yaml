identifier: CDD:cd17292
label: RMtype1_S_LlaA17I_TRD2-CR2_like
definition: >-
  Type I restriction-modification system specificity (S) subunit Target Recognition Domain-ConseRved domain (TRD-CR), similar to the S subunit TRD2-CR2 regions of Lactococcus lactis subsp. cremoris A17 (S.LlaA17I), Haemophilus influenzae Rd (S.HindORF215P) and Clostridium species ASF502 (S.Csp502ORF478P). Lactococcus lactis subsp. cremoris A17 S subunit (S.LlaA17I) recognizes 5'... CAANNNNNNNNTAYG... 3', while the recognition sequences of Clostridium species ASF502 S subunit (S.Csp502ORF478P) and Haemophilus influenzae Rd S subunit (S.HindORF215P) are undetermined. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one heteromeric enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains both TRD1-CR1 and TRD2-CR2. It also includes TRD-CR-like sequence-recognition domains of various type II restriction enzymes and methyltransferases, such as Porphyromonas species COT-108 OH1349 Type IIG restriction enzyme/N6-adenine DNA methyltransferase (RM.Psp1349ORF730P) of unknown recognition sequence. It may also include type I DNA methyltransferases
