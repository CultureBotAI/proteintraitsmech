identifier: CDD:cd06189
label: "NAD(P)H dependent flavin oxidoreductases use flavin as a substrate in mediating electron transfer from iron complexes or iron proteins. Structurally similar to ferredoxin reductases, but with only 15% sequence identity, flavin reductases reduce FAD, FMN, or riboflavin via NAD(P)H. Flavin is used as a substrate, rather than a tightly bound prosthetic group as in flavoenzymes; weaker binding is due to the absence of a binding site for the AMP moeity of FAD."
definition: >-
  NAD(P)H dependent flavin oxidoreductases use flavin as a substrate in mediating electron transfer from iron complexes or iron proteins. Structurally similar to ferredoxin reductases, but with only 15% sequence identity, flavin reductases reduce FAD, FMN, or riboflavin via NAD(P)H. Flavin is used as a substrate, rather than a tightly bound prosthetic group as in flavoenzymes; weaker binding is due to the absence of a binding site for the AMP moeity of FAD. — an NCBI CDD conserved domain (cd06189); members share this curated model.
