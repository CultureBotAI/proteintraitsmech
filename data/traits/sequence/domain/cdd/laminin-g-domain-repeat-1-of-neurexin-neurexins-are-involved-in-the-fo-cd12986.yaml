identifier: CDD:cd12986
label: LamG_neurexin_1
definition: >-
  Laminin G domain repeat 1 of neurexin. Neurexins are involved in the formation and function of synapses. They function as cell adhesion molecules, bridging the synaptic cleft. In most animals, neurexins are encoded by 3 genes, each of which encodes a larger alpha- and a shorter beta-isoform. Additional diversity arises from alternative splicing. Beta-Neurexins contain a single Laminin G domain, whereas alpha-neurexins contain six laminin G domains, organized into three modules which each contain two lamG repeats and one EGF-like domain. In mammalian brain, neurexins have three known extracellular binding partners: neuroligins, dystroglycan and neurexophilins. Neuroligins bind to alpha- and beta-neurexins in a Ca2+-dependent manner, dystroglycan shows a preference for Ca2+-dependent binding to alpha-neurexins, and neurexophilin bind Ca2+-independent and specifically to alpha-neurexin. It has been shown in mice that knockout of all three alpha-neurexins (leaving the beta-neurexins intact) leads to perinatal death due to the loss of presynaptic Ca2+ channel function. In general, proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold
