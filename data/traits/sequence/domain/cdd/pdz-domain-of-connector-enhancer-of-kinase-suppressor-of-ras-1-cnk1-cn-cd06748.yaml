  PDZ domain of connector enhancer of kinase suppressor of ras 1 (CNK1), CNK2, CNK3, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of CNK1 (also known as connector enhancer of KSR 1 (CNKSR1), CNK homolog protein 1, connector enhancer of KSR-like), CNK2 (also known as CNKSR2, CNK homolog protein 2), and CNK3 (also known as CNKSR3, CNK homolog protein 3, CNKSR family member 3, maguin-like). CNK proteins modulate Ras-mediated signaling, acting downstream of Ras as a scaffold for the Raf/MEK/ERK kinase cascade. They also modulate signaling mediated via Rho family small GTPases, through interactions with various guanine nucleotide exchange factors (GEFs) and GTPase activating proteins (GAPs), and modulate the insulin signaling pathway through interactions with the Arf guanine nucleotide exchange factors. CNK proteins also regulate cell proliferation and migration by acting as scaffolds for the PI3K/Akt and JNK signaling cascades. CNK2 plays a role in the molecular processes that govern morphology of the postsynaptic density (PSD), and influences subcellular localization of the regulatory NCK-interacting kinase TNIK. TNIK binds a region of CNK2 including the PDZ and the DUF domain; this region also binds the kinase MINK1. CNK2 may also influence the membrane localization of MINK1. CNK3 plays a part in transepithelial sodium transport; it coordinates assembly of an epithelial sodium channel (ENaC)-regulatory complex. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This CNK1-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged as beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta- strand F. — an NCBI CDD conserved domain (cd06748); members share this curated model.
