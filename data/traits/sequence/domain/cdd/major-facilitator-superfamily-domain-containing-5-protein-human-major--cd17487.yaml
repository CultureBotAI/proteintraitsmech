identifier: CDD:cd17487
label: MFS_MFSD5_like
definition: >-
  Major facilitator superfamily domain containing 5 protein. Human major facilitator superfamily domain containing 5 protein (MFSD5) is also called molybdate-anion transporter, or molybdate transporter 2 homolog (MOT2). It acts as an atypical solute carrier (SLC) that mediates high-affinity intracellular uptake of the rare oligo-element molybdenum. It may also play a role in maintaining the glucose homeostasis and pancreatic beta-cell proliferation, as well as in altered energy homeostasis. MFSD5 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement
