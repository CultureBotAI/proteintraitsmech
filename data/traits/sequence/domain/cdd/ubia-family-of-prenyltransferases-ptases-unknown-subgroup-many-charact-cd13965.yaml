identifier: CDD:cd13965
label: "UbiA family of prenyltransferases (PTases), Unknown subgroup. Many characterized members of the UbiA prenyltransferase family are aromatic prenyltransferases and play an important role in the biosynthesis of heme, chlorophyll, vitamin E, and vitamin K. They contain two copies of a motif similar to the active site DxxD motif of trans-prenyltransferases and are potentially related. Prenyltransferases (PTs) catalyze the regioselective transfer of prenyl moieties onto a wide variety of substrates and play an important role in many biosynthetic pathways. The function of this subgroup is unknown."
definition: >-
  UbiA family of prenyltransferases (PTases), Unknown subgroup. Many characterized members of the UbiA prenyltransferase family are aromatic prenyltransferases and play an important role in the biosynthesis of heme, chlorophyll, vitamin E, and vitamin K. They contain two copies of a motif similar to the active site DxxD motif of trans-prenyltransferases and are potentially related. Prenyltransferases (PTs) catalyze the regioselective transfer of prenyl moieties onto a wide variety of substrates and play an important role in many biosynthetic pathways. The function of this subgroup is unknown. — an NCBI CDD conserved domain (cd13965); members share this curated model.
