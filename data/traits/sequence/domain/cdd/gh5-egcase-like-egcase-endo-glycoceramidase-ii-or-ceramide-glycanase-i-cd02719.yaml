identifier: CDD:cd02719
label: "GH5_EGCase_like. EGCase (endo-Glycoceramidase II or Ceramide Glycanase) is a membrane-associated glycosyl hydrolase, family 5 (GH5) glycosidase that hydrolyzes the beta-glycosidic linkage between the sugar and ceramide moieties of various glycosphingolipids with a net retention of stereochemistry at the anomeric center via a double-displacement mechanism common to other retaining glycosidases of the beta-glycanase superfamily. EGcase is present in both prokaryotes and eukaryotes (invertebrates but not mammals). The active site of EGCase includes a wide, polar cavity to bind the polyhydroxylated oligosaccharide moiety and a narrow, hydrophobic tunnel to bind the ceramide lipid chains. EGCase is functionally distinct from other GH5 glycanases such as the mannanases and cellulases.  The latter enzymes bind a polyhydroxylic, hydrophilic substrate whereas EGCase binds an amphiphilic (half hydrophilic, half hydrophobic) substrate. Each EGCase monomer has two distinct domains; an N-terminal (alpha/beta)8 TIM barrel catalytic domain typical of GH5 family members, and a C-terminal carbohydrate-binding module.  The N-terminal catalytic domain has a \"lid\" structure covering the active site channel."
definition: >-
  GH5_EGCase_like. EGCase (endo-Glycoceramidase II or Ceramide Glycanase) is a membrane-associated glycosyl hydrolase, family 5 (GH5) glycosidase that hydrolyzes the beta-glycosidic linkage between the sugar and ceramide moieties of various glycosphingolipids with a net retention of stereochemistry at the anomeric center via a double-displacement mechanism common to other retaining glycosidases of the beta-glycanase superfamily. EGcase is present in both prokaryotes and eukaryotes (invertebrates but not mammals). The active site of EGCase includes a wide, polar cavity to bind the polyhydroxylated oligosaccharide moiety and a narrow, hydrophobic tunnel to bind the ceramide lipid chains. EGCase is functionally distinct from other GH5 glycanases such as the mannanases and cellulases. The latter enzymes bind a polyhydroxylic, hydrophilic substrate whereas EGCase binds an amphiphilic (half hydrophilic, half hydrophobic) substrate. Each EGCase monomer has two distinct domains; an N-terminal (alpha/beta)8 TIM barrel catalytic domain typical of GH5 family members, and a C-terminal carbohydrate-binding module. The N-terminal catalytic domain has a "lid" structure covering the active site channel. — an NCBI CDD conserved domain (cd02719); members share this curated model.
