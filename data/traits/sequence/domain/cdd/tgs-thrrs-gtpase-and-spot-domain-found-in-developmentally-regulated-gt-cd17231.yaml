identifier: CDD:cd17231
label: "TGS (ThrRS, GTPase and SpoT) domain found in developmentally regulated GTP binding protein 2 (DRG-2). DRG-2 is a member of the DRG family GTP-binding proteins. It has been implicated in cell growth, differentiation and death. DRG-2 plays a critical role in control of the cell cycle and apoptosis in Jurkat T cells. It regulates G2/M progression via the cyclin B1-Cdk1 complex. Moreover, DRG-2 is an endosomal protein and a key regulator of the small GTPase Rab5 deactivation and transferrin recycling. It enhances experimental autoimmune encephalomyelitis (EAE) by suppressing the development of TH17 cells. It is also associated with survival and cytoskeleton organization of osteoclasts under influence of macrophage colony-stimulating factor, and its overexpression leads to elevated bone resorptive activity of osteoclasts, resulting in bone loss. DRG-2 contains a domain of characteristic Obg-type G-motifs that may be the core of GTPase activity, as well as this C-terminal TGS (ThrRS, GTPase and SpoT) domain that has a predominantly beta-grasp ubiquitin-like fold and may be involved in RNA binding."
definition: >-
  TGS (ThrRS, GTPase and SpoT) domain found in developmentally regulated GTP binding protein 2 (DRG-2). DRG-2 is a member of the DRG family GTP-binding proteins. It has been implicated in cell growth, differentiation and death. DRG-2 plays a critical role in control of the cell cycle and apoptosis in Jurkat T cells. It regulates G2/M progression via the cyclin B1-Cdk1 complex. Moreover, DRG-2 is an endosomal protein and a key regulator of the small GTPase Rab5 deactivation and transferrin recycling. It enhances experimental autoimmune encephalomyelitis (EAE) by suppressing the development of TH17 cells. It is also associated with survival and cytoskeleton organization of osteoclasts under influence of macrophage colony-stimulating factor, and its overexpression leads to elevated bone resorptive activity of osteoclasts, resulting in bone loss. DRG-2 contains a domain of characteristic Obg-type G-motifs that may be the core of GTPase activity, as well as this C-terminal TGS (ThrRS, GTPase and SpoT) domain that has a predominantly beta-grasp ubiquitin-like fold and may be involved in RNA binding. — an NCBI CDD conserved domain (cd17231); members share this curated model.
