identifier: CDD:cd10620
label: glu_deC_b_like
definition: >-
  Pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily: Glutamate decarboxylase type b. Glutamate decarboxylase type b (GDC_b). This family belongs to pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily (fold I). Based on sequence identity, there are two distinct types of histidine and glutamate decarboxylases (types a and b). The major groups in this CD corresponds to histidine decarboxylase type b (HDC_b) and glutamate decarboxylase type b (GDC_b). GDC_b catalyzes the decarboxylation of glutamate and HDC_b catalyzes the decarboxylation of histidine. This sub-family has eubacterial, archaeal and plant members
