definition: >-
  Bowman-Birk type proteinase inhibitor (BBI); family of plant serine protease inhibitors that block trypsin or chymotrypsin.They are either single-headed (one reactive site, one inactive site, present mainly in monocotyledonous seeds) or double-headed (two reactive sites, present mainly in dicotyledonous seeds)
