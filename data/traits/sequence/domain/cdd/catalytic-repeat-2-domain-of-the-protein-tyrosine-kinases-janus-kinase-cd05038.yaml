identifier: CDD:cd05038
label: "Catalytic (repeat 2) domain of the Protein Tyrosine Kinases, Janus kinases. The Jak subfamily is composed of Jak1, Jak2, Jak3, TYK2, and similar proteins. They are PTKs, catalyzing the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Jaks are cytoplasmic (or nonreceptor) PTKs containing an N-terminal FERM domain, followed by a Src homology 2 (SH2) domain, a pseudokinase domain, and a C-terminal tyr kinase catalytic domain. Most Jaks are expressed in a wide variety of tissues, except for Jak3, which is expressed only in hematopoietic cells. Jaks are crucial for cytokine receptor signaling. They are activated by autophosphorylation upon cytokine-induced receptor aggregation, and subsequently trigger downstream signaling events such as the phosphorylation of signal transducers and activators of transcription (STATs). Jaks are also involved in regulating the surface expression of some cytokine receptors. The Jak-STAT pathway is involved in many biological processes including hematopoiesis, immunoregulation, host defense, fertility, lactation, growth, and embryogenesis. The Jak subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic (repeat 2) domain of the Protein Tyrosine Kinases, Janus kinases. The Jak subfamily is composed of Jak1, Jak2, Jak3, TYK2, and similar proteins. They are PTKs, catalyzing the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Jaks are cytoplasmic (or nonreceptor) PTKs containing an N-terminal FERM domain, followed by a Src homology 2 (SH2) domain, a pseudokinase domain, and a C-terminal tyr kinase catalytic domain. Most Jaks are expressed in a wide variety of tissues, except for Jak3, which is expressed only in hematopoietic cells. Jaks are crucial for cytokine receptor signaling. They are activated by autophosphorylation upon cytokine-induced receptor aggregation, and subsequently trigger downstream signaling events such as the phosphorylation of signal transducers and activators of transcription (STATs). Jaks are also involved in regulating the surface expression of some cytokine receptors. The Jak-STAT pathway is involved in many biological processes including hematopoiesis, immunoregulation, host defense, fertility, lactation, growth, and embryogenesis. The Jak subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05038); members share this curated model.
