identifier: CDD:cd14579
label: "dual specificity protein phosphatase 3. Dual specificity protein phosphatase 3 (DUSP3), also called vaccinia H1-related phosphatase (VHR), functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). It deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. DUSP3 is an atypical DUSP; it contains the catalytic dual specificity phosphatase domain but lacks the N-terminal Cdc25/rhodanese-like domain that is present in typical DUSPs or MKPs. It favors bisphosphorylated substrates over monophosphorylated ones, and prefers pTyr peptides over pSer/pThr peptides. Reported physiological substrates includes MAPKs ERK1/2, JNK, and p38, as well as STAT5, EGFR, and ErbB2. DUSP3 has been linked to breast and prostate cancer, and may also play a role in thrombosis."
definition: >-
  dual specificity protein phosphatase 3. Dual specificity protein phosphatase 3 (DUSP3), also called vaccinia H1-related phosphatase (VHR), functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). It deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. DUSP3 is an atypical DUSP; it contains the catalytic dual specificity phosphatase domain but lacks the N-terminal Cdc25/rhodanese-like domain that is present in typical DUSPs or MKPs. It favors bisphosphorylated substrates over monophosphorylated ones, and prefers pTyr peptides over pSer/pThr peptides. Reported physiological substrates includes MAPKs ERK1/2, JNK, and p38, as well as STAT5, EGFR, and ErbB2. DUSP3 has been linked to breast and prostate cancer, and may also play a role in thrombosis. — an NCBI CDD conserved domain (cd14579); members share this curated model.
