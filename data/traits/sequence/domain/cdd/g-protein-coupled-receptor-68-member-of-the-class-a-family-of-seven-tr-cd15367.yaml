identifier: CDD:cd15367
label: "G protein-coupled receptor 68, member of the class A family of seven-transmembrane G protein-coupled receptors. The ovarian cancer G-protein receptor 1 (OGR1, also known as GPR68) is a member of the proton-sensing G-protein-coupled receptor (GPCR) family which also includes the G2 accumulation receptor (G2A, also known as GPR132), the T cell death associated gene-8 receptor (TDAG8, GPR65), and the G-protein-coupled receptor 4 (GPR4). Proton-sensing G-protein coupled receptors sense pH of 7.6 to 6.0 and mediates a variety of biological activities in neutral and mildly acidic pH conditions, whereas the acid-sensing ionotropic ion channels typically sense strong acidic pH. Knock-out mice studies have suggested that OGR1 plays a role in the regulation of insulin secretion and glucose metabolism. OGR1 couples to G(q/11) proteins and activates phospholipase C and Ca2+ signaling pathways."
definition: >-
  G protein-coupled receptor 68, member of the class A family of seven-transmembrane G protein-coupled receptors. The ovarian cancer G-protein receptor 1 (OGR1, also known as GPR68) is a member of the proton-sensing G-protein-coupled receptor (GPCR) family which also includes the G2 accumulation receptor (G2A, also known as GPR132), the T cell death associated gene-8 receptor (TDAG8, GPR65), and the G-protein-coupled receptor 4 (GPR4). Proton-sensing G-protein coupled receptors sense pH of 7.6 to 6.0 and mediates a variety of biological activities in neutral and mildly acidic pH conditions, whereas the acid-sensing ionotropic ion channels typically sense strong acidic pH. Knock-out mice studies have suggested that OGR1 plays a role in the regulation of insulin secretion and glucose metabolism. OGR1 couples to G(q/11) proteins and activates phospholipase C and Ca2+ signaling pathways. — an NCBI CDD conserved domain (cd15367); members share this curated model.
