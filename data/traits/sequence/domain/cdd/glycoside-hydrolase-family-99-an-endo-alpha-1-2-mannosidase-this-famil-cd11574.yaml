identifier: CDD:cd11574
label: "Glycoside hydrolase family 99, an endo-alpha-1,2-mannosidase. This family of glycoside hydrolases 99 (following the CAZY nomenclature) includes endo-alpha-1,2-mannosidase (EC 3.2.1.130), which is an important membrane-associated eukaryotic enzyme involved in the maturation of N-linked glycans. Specifically, it cleaves mannoside linkages internal to N-linked glycan chains by hydrolyzing an alpha-1,2-mannosidic bond between a glucose-substituted mannose and the remainder of the chain. The biological function and significance of the soluble bacterial orthologs, which may have obtained the genes via horizontal transfer, is not clear."
definition: >-
