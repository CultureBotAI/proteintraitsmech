identifier: CDD:cd11040
label: "cytochrome P450s similar to cytochrome P450 family 7, subfamily A, polypeptide 1, cytochrome P450 family 7, subfamily B, polypeptide 1, cytochrome P450 family 8, subfamily A, polypeptide 1. This family is composed of cytochrome P450s (CYPs) with similarity to the human P450s CYP7A1, CYP7B1, CYP8B1, CYP39A1 and prostacyclin synthase (CYP8A1). CYP7A1, CYP7B1, CYP8B1, and CYP39A1 are involved in the catabolism of cholesterol to bile acids (BAs) in two major pathways. CYP7A1 (cholesterol 7alpha-hydroxylase) and CYP8B1 (sterol 12-alpha-hydroxylase) function in the classic (or neutral) pathway, which leads to two bile acids: cholic acid (CA) and chenodeoxycholic acid (CDCA). CYP7B1 and CYP39A1 are 7-alpha-hydroxylases involved in the alternative (or acidic) pathway, which leads mainly to the formation of CDCA. Prostacyclin synthase (CYP8A1) catalyzes the isomerization of prostaglandin H2 to prostacyclin (or prostaglandin I2), a potent mediator of vasodilation and anti-platelet aggregation. This family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450s similar to cytochrome P450 family 7, subfamily A, polypeptide 1, cytochrome P450 family 7, subfamily B, polypeptide 1, cytochrome P450 family 8, subfamily A, polypeptide 1. This family is composed of cytochrome P450s (CYPs) with similarity to the human P450s CYP7A1, CYP7B1, CYP8B1, CYP39A1 and prostacyclin synthase (CYP8A1). CYP7A1, CYP7B1, CYP8B1, and CYP39A1 are involved in the catabolism of cholesterol to bile acids (BAs) in two major pathways. CYP7A1 (cholesterol 7alpha-hydroxylase) and CYP8B1 (sterol 12-alpha-hydroxylase) function in the classic (or neutral) pathway, which leads to two bile acids: cholic acid (CA) and chenodeoxycholic acid (CDCA). CYP7B1 and CYP39A1 are 7-alpha-hydroxylases involved in the alternative (or acidic) pathway, which leads mainly to the formation of CDCA. Prostacyclin synthase (CYP8A1) catalyzes the isomerization of prostaglandin H2 to prostacyclin (or prostaglandin I2), a potent mediator of vasodilation and anti-platelet aggregation. This family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd11040); members share this curated model.
