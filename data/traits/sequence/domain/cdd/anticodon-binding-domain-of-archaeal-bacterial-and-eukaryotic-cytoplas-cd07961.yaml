identifier: CDD:cd07961
label: "Anticodon-binding domain of archaeal, bacterial, and eukaryotic cytoplasmic isoleucyl tRNA synthetases. This domain is found in isoleucyl tRNA synthetases (IleRS), which belong to the class Ia aminoacyl tRNA synthetases. It lies C-terminal to the catalytic core domain, and recognizes and specifically binds to the tRNA anticodon. This family includes bacterial, archaeal, and eukaryotic cytoplasmic members. IleRS catalyzes the transfer of isoleucine to the 3'-end of its tRNA."
definition: >-
  Anticodon-binding domain of archaeal, bacterial, and eukaryotic cytoplasmic isoleucyl tRNA synthetases. This domain is found in isoleucyl tRNA synthetases (IleRS), which belong to the class Ia aminoacyl tRNA synthetases. It lies C-terminal to the catalytic core domain, and recognizes and specifically binds to the tRNA anticodon. This family includes bacterial, archaeal, and eukaryotic cytoplasmic members. IleRS catalyzes the transfer of isoleucine to the 3'-end of its tRNA. — an NCBI CDD conserved domain (cd07961); members share this curated model.
