identifier: CDD:cd15628
label: "PHD finger found in bromodomain adjacent to zinc finger domain protein 1B (BAZ1B). BAZ1B, also termed Tyrosine-protein kinase BAZ1B, or Williams syndrome transcription factor (WSTF), or Williams-Beuren syndrome chromosomal region 10 protein, Williams-Beuren syndrome chromosomal region 9 protein, or WALp2, is a multifunctional protein implicated in several nuclear processes, including replication, transcription, and the DNA damage response. BAZ1B/WSTF, together with the imitation switch (ISWI) ATPase, forms a WSTF-ISWI chromatin remodeling complex (WICH), which transiently associates with the human inactive X chromosome (Xi) during late S-phase prior to BRCA1 and gamma-H2AX. Moreover, BAZ1B/WSTF, SNF2h, and nuclear myosin 1 (NM1) forms the chromatin remodeling complex B-WICH that is involved in regulating rDNA transcription. BAZ1B contains a WAC motif, a DDT domain, BAZ 1 and BAZ 2 motifs, a WAKZ (WSTF/Acf1/KIAA0314/ZK783.4) motif, a plant homeodomain (PHD) finger, and a bromodomain."
definition: >-
  PHD finger found in bromodomain adjacent to zinc finger domain protein 1B (BAZ1B). BAZ1B, also termed Tyrosine-protein kinase BAZ1B, or Williams syndrome transcription factor (WSTF), or Williams-Beuren syndrome chromosomal region 10 protein, Williams-Beuren syndrome chromosomal region 9 protein, or WALp2, is a multifunctional protein implicated in several nuclear processes, including replication, transcription, and the DNA damage response. BAZ1B/WSTF, together with the imitation switch (ISWI) ATPase, forms a WSTF-ISWI chromatin remodeling complex (WICH), which transiently associates with the human inactive X chromosome (Xi) during late S-phase prior to BRCA1 and gamma-H2AX. Moreover, BAZ1B/WSTF, SNF2h, and nuclear myosin 1 (NM1) forms the chromatin remodeling complex B-WICH that is involved in regulating rDNA transcription. BAZ1B contains a WAC motif, a DDT domain, BAZ 1 and BAZ 2 motifs, a WAKZ (WSTF/Acf1/KIAA0314/ZK783.4) motif, a plant homeodomain (PHD) finger, and a bromodomain. — an NCBI CDD conserved domain (cd15628); members share this curated model.
