identifier: CDD:cd22928
label: "histone-fold domain found in DNA polymerase epsilon subunit 3 (POLE3) and similar proteins. POLE3, also called arsenic-transactivated protein (AsTP), chromatin accessibility complex 17 kDa protein (CHRAC-17), DNA polymerase II subunit 3, or DNA polymerase epsilon subunit p17, may participate in DNA repair and in chromosomal DNA replication. It is an accessory component of the DNA polymerase epsilon complex, which consists of four subunits: the catalytic subunit POLE and the accessory subunits POLE2, POLE3 and POLE4. It forms a complex with CHRAC1 and binds naked DNA, which is then incorporated into chromatin, aided by the nucleosome-remodeling activity of ISWI/SNF2H and ACF1. In fungi, POLE3 has been named as DNA polymerase epsilon subunit D (DPB4, also known as DNA polymerase II subunit D). DPB4 acts as an accessory component of the DNA polymerase epsilon (DNA polymerase II) that consists of POL2, DPB2, DPB3 and DPB4, and participates in chromosomal DNA replication. It also functions as a component of the ISW2 complex, which acts in remodeling the chromatin by catalyzing an ATP-dependent alteration in the structure of nucleosomal DNA."
definition: >-
  histone-fold domain found in DNA polymerase epsilon subunit 3 (POLE3) and similar proteins. POLE3, also called arsenic-transactivated protein (AsTP), chromatin accessibility complex 17 kDa protein (CHRAC-17), DNA polymerase II subunit 3, or DNA polymerase epsilon subunit p17, may participate in DNA repair and in chromosomal DNA replication. It is an accessory component of the DNA polymerase epsilon complex, which consists of four subunits: the catalytic subunit POLE and the accessory subunits POLE2, POLE3 and POLE4. It forms a complex with CHRAC1 and binds naked DNA, which is then incorporated into chromatin, aided by the nucleosome-remodeling activity of ISWI/SNF2H and ACF1. In fungi, POLE3 has been named as DNA polymerase epsilon subunit D (DPB4, also known as DNA polymerase II subunit D). DPB4 acts as an accessory component of the DNA polymerase epsilon (DNA polymerase II) that consists of POL2, DPB2, DPB3 and DPB4, and participates in chromosomal DNA replication. It also functions as a component of the ISW2 complex, which acts in remodeling the chromatin by catalyzing an ATP-dependent alteration in the structure of nucleosomal DNA. — an NCBI CDD conserved domain (cd22928); members share this curated model.
