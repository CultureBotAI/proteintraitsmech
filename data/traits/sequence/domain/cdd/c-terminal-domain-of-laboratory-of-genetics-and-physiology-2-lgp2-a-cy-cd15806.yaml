identifier: CDD:cd15806
label: "C-terminal domain of Laboratory of Genetics and Physiology 2 (LGP2), a cytoplasmic viral RNA receptor. Laboratory of Genetics and Physiology 2 (LGP2) is one of three members of the RIG-I-like Receptor (RLR) family. RLRs are cytoplasmic RNA receptors that recognize non-self RNA and act as molecular sensors to detect viral pathogens. They are characterized by a central DExD/H-box helicase domain and a C-terminal domain, both of which are responsible for binding viral RNA. LGP2 lacks the caspase activation and recruitment domains (CARDs) that are present in other RLRs, which initiate downstream signaling upon viral RNA sensing. LGP2 may play a regulatory role in RLR signaling, and may cooperate with either RIG-I or MDA5 to sense viral RNA."
definition: >-
