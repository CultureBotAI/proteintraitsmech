definition: >-
  x. Tripeptidyl aminopeptidase (TAP)-like family of the alpha/beta hydrolase superfamily. ACK!! Got the master via pfam because it's the one that says it's TAP. However, reading its paper is not terribly elucidating, and refers to ref 18 of that paper (PMID 7926006) which reports this protein is a serine protease...??? I have no idea if this protein does anything TAP related or not!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!! Somehow got from that paper in PubMed to PMID 15598885 (dont' even remember how...) and used the sequence info from a figure to BLAST and find gi 311033513. Imported it into this CD and it clearly doesn't fit. Entrez does not put it in this superfamily at all..................... — an NCBI CDD conserved domain (cd11126); members share this curated model.
