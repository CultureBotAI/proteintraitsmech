identifier: CDD:cd15476
label: "Cargo binding domain of myosin 5C. Class V myosins are well studied unconventional myosins, represented by three paralogs (Myo5a,b,c) in vertebrates.  Their C-terminal cargo binding domains (CBDs) are important for the binding of a diverse set of cargos, including membrane vesicles, organelles, proteins and mRNA. The MyoV-CBDs directly interact with several adaptor proteins.MyoVb and myoVc areprimarily expressed in epithelial cells, and have been implicated as motors involved in recycling endosomes."
definition: >-
  Cargo binding domain of myosin 5C. Class V myosins are well studied unconventional myosins, represented by three paralogs (Myo5a,b,c) in vertebrates. Their C-terminal cargo binding domains (CBDs) are important for the binding of a diverse set of cargos, including membrane vesicles, organelles, proteins and mRNA. The MyoV-CBDs directly interact with several adaptor proteins.MyoVb and myoVc areprimarily expressed in epithelial cells, and have been implicated as motors involved in recycling endosomes. — an NCBI CDD conserved domain (cd15476); members share this curated model.
