identifier: CDD:cd16930
label: "Histidine kinase-like ATPase domain of eukaryotic topoisomerase II. This family includes the histidine kinase-like ATPase (HATpase) domains of human topoisomerase IIA (TopIIA) and TopIIB, Saccharomyces cerevisae TOP2p, and related proteins. These proteins catalyze the passage of DNA double strands through a transient double-strand break in the presence of ATP."
definition: >-
  Histidine kinase-like ATPase domain of eukaryotic topoisomerase II. This family includes the histidine kinase-like ATPase (HATpase) domains of human topoisomerase IIA (TopIIA) and TopIIB, Saccharomyces cerevisae TOP2p, and related proteins. These proteins catalyze the passage of DNA double strands through a transient double-strand break in the presence of ATP. — an NCBI CDD conserved domain (cd16930); members share this curated model.
