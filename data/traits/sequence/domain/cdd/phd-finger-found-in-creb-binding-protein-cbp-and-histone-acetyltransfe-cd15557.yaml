identifier: CDD:cd15557
label: "PHD finger found in CREB-binding protein (CBP) and histone acetyltransferase p300. This p300/CBP family includes two highly homologous histone acetyltransferases (HATs), CREB-binding protein (CBP) and p300. CBP is also known as KAT3A or CREBBP. It specifically interacts with the phosphorylated form of cyclic adenosine monophosphate-responsive element-binding protein (CREB). p300, also termed as KAT3B, or E1A-associated protein p300 (EP300), is a paralog of CBP. and is involved in E1A function in cell cycle progression and cellular differentiation. Both CBP and p300 are co-activator proteins that have been implicated in cell cycle regulation, apoptosis, embryonic development, cellular differentiation and cancer. They associate with a number of DNA-binding transcription activators as well as general transcription factors (GTFs), thus mediating recruitment of basal transcription machinery to the promoter. They contain a cysteine-histidine rich region, KIX (CREB interaction) domain, a plant homeodomain (PHD) finger, a HAT domain, followed by a SRC interaction domain."
definition: >-
  PHD finger found in CREB-binding protein (CBP) and histone acetyltransferase p300. This p300/CBP family includes two highly homologous histone acetyltransferases (HATs), CREB-binding protein (CBP) and p300. CBP is also known as KAT3A or CREBBP. It specifically interacts with the phosphorylated form of cyclic adenosine monophosphate-responsive element-binding protein (CREB). p300, also termed as KAT3B, or E1A-associated protein p300 (EP300), is a paralog of CBP. and is involved in E1A function in cell cycle progression and cellular differentiation. Both CBP and p300 are co-activator proteins that have been implicated in cell cycle regulation, apoptosis, embryonic development, cellular differentiation and cancer. They associate with a number of DNA-binding transcription activators as well as general transcription factors (GTFs), thus mediating recruitment of basal transcription machinery to the promoter. They contain a cysteine-histidine rich region, KIX (CREB interaction) domain, a plant homeodomain (PHD) finger, a HAT domain, followed by a SRC interaction domain. — an NCBI CDD conserved domain (cd15557); members share this curated model.
