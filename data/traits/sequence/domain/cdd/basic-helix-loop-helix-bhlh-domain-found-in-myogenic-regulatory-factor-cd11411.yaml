identifier: CDD:cd11411
label: bHLH_TS_MRF
definition: >-
  basic helix-loop-helix (bHLH) domain found in myogenic regulatory factor (MRF) family. MRFs are a family of muscle-specific bHLH transcription proteins (MyoD, Myf5, Mrf4 and MyoG) that plays an essential role in regulating skeletal muscle development and growth. MRFs are capable of binding to E-box motifs as a heterodimer with E-proteins to regulate transcription expression
