identifier: CDD:cd21010
label: "Immunoglobulin domain of Zn-alpha2-glycoprotein (ZAG); member of the C1-set of Ig superfamily (IgSF) domains.  The members here are composed of the immunoglobulin domain of Zn-alpha2-glycoprotein (ZAG). ZAG is a soluble protein that is present in serum and other body fluids. ZAG stimulates lipid degradation in adipocytes and causes the extensive fat losses associated with some advanced cancers. The 2.8 angstrom crystal structure of ZAG resembles a class I major histocompatibility complex (MHC) heavy chain, but ZAG does not bind the class I light chain beta-2-microglobulin. The ZAG structure includes a large groove analogous to class I MHC peptide binding grooves. Instead of a peptide, the ZAG groove contains a nonpeptidic compound that may be implicated in lipid catabolism under normal or pathological conditions. IgC_MHC_I_alpha3;  Immunoglobulin (Ig) domain of major histocompatibility complex (MHC) class I alpha chain. Class I MHC proteins bind antigenic peptide fragments and present them to CD8+ T lymphocytes.  Class I molecules consist of a transmembrane alpha chain and a small chain called the beta-2-microglobulin. The alpha chain contains three extracellular domains, two of which fold together to form the peptide-binding cleft (alpha1 and alpha2), and one which has an Ig fold (alpha3).  Peptide binding to class I molecules occurs in the endoplasmic reticulum (ER) and involves both chaperones and dedicated factors to assist in peptide loading.  Class I MHC molecules are expressed on most nucleated cells."
definition: >-
  Immunoglobulin domain of Zn-alpha2-glycoprotein (ZAG); member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the immunoglobulin domain of Zn-alpha2-glycoprotein (ZAG). ZAG is a soluble protein that is present in serum and other body fluids. ZAG stimulates lipid degradation in adipocytes and causes the extensive fat losses associated with some advanced cancers. The 2.8 angstrom crystal structure of ZAG resembles a class I major histocompatibility complex (MHC) heavy chain, but ZAG does not bind the class I light chain beta-2-microglobulin. The ZAG structure includes a large groove analogous to class I MHC peptide binding grooves. Instead of a peptide, the ZAG groove contains a nonpeptidic compound that may be implicated in lipid catabolism under normal or pathological conditions. IgC_MHC_I_alpha3; Immunoglobulin (Ig) domain of major histocompatibility complex (MHC) class I alpha chain. Class I MHC proteins bind antigenic peptide fragments and present them to CD8+ T lymphocytes. Class I molecules consist of a transmembrane alpha chain and a small chain called the beta-2-microglobulin. The alpha chain contains three extracellular domains, two of which fold together to form the peptide-binding cleft (alpha1 and alpha2), and one which has an Ig fold (alpha3). Peptide binding to class I molecules occurs in the endoplasmic reticulum (ER) and involves both chaperones and dedicated factors to assist in peptide loading. Class I MHC molecules are expressed on most nucleated cells. — an NCBI CDD conserved domain (cd21010); members share this curated model.
