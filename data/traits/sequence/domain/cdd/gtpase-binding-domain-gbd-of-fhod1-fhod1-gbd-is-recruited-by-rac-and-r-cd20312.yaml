identifier: CDD:cd20312
label: "GTPase-binding domain (GBD) of FHOD1. FHOD1-GBD is recruited by Rac and Ras GTPases in cells and plays an essential role for FHOD1-mediated actin remodeling. FHOD1 is a Diaphanous-related formins (DRFs) which is one of the seven subfamilies of formins. Formins are characterized by the presence of a conserved formin homology 2 (FH2) domain. GBD is essential for FHOD1 activities in actin remodeling and transcriptional activation, localizes to specific GTPases in cells, and binds to GTPases in vitro."
definition: >-
  GTPase-binding domain (GBD) of FHOD1. FHOD1-GBD is recruited by Rac and Ras GTPases in cells and plays an essential role for FHOD1-mediated actin remodeling. FHOD1 is a Diaphanous-related formins (DRFs) which is one of the seven subfamilies of formins. Formins are characterized by the presence of a conserved formin homology 2 (FH2) domain. GBD is essential for FHOD1 activities in actin remodeling and transcriptional activation, localizes to specific GTPases in cells, and binds to GTPases in vitro. — an NCBI CDD conserved domain (cd20312); members share this curated model.
