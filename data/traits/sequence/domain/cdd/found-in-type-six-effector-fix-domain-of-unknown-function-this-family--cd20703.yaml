identifier: CDD:cd20703
label: "Found in type sIX effector (FIX) domain of unknown function. This family contains the Found in type sIX effector (FIX) domain and similar proteins. FIX is found N-terminal to known toxin domains and is genetically and functionally linked to type VI secretion system (T6SS), a widespread mechanism used by Gram-negative bacteria to antagonize neighboring cells. In Vibrio parahaemolyticus, it also co-occurs with C-terminal nuclease toxin PoNe (Polymorphic Nuclease effector) which is associated with several toxin delivery systems including type V, type VI, and type VII. FIX is present in various established T6SS-secreted effectors that have an N-terminal VgrG or PAAR or PAAR-like (i.e., DUF4280) domain, suggesting that FIX may play a role in delivery of T6SS effectors, and serve as a new marker for T6SS-delivered proteins to enable the identification of novel T6SS substrates."
