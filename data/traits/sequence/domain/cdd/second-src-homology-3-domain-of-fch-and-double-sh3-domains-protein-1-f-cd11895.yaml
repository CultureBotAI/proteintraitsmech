identifier: CDD:cd11895
label: "Second Src Homology 3 domain of FCH and double SH3 domains protein 1. FCHSD1 has a domain structure consisting of an N-terminal F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs), two SH3, and C-terminal proline-rich domains. It has only been characterized in silico and its function is unknown. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Second Src Homology 3 domain of FCH and double SH3 domains protein 1. FCHSD1 has a domain structure consisting of an N-terminal F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs), two SH3, and C-terminal proline-rich domains. It has only been characterized in silico and its function is unknown. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11895); members share this curated model.
