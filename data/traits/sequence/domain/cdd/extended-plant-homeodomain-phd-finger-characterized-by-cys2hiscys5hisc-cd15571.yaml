identifier: CDD:cd15571
label: "Extended plant homeodomain (PHD) finger, characterized by Cys2HisCys5HisCys2His. PHD finger is also termed LAP (leukemia-associated protein) motif or TTC (trithorax consensus) domain. The extended PHD finger is characterized as Cys2HisCys5HisCys2His, which has been found in a variety of eukaryotic proteins involved in the control of gene transcription and chromatin dynamics. PHD fingers can recognize the unmodified and modified histone H3 tail, and some have been found to interact with non-histone proteins. They also function as epigenome readers controlling gene expression through molecular recruitment of multi-protein complexes of chromatin regulators and transcription factors."
definition: >-
  Extended plant homeodomain (PHD) finger, characterized by Cys2HisCys5HisCys2His. PHD finger is also termed LAP (leukemia-associated protein) motif or TTC (trithorax consensus) domain. The extended PHD finger is characterized as Cys2HisCys5HisCys2His, which has been found in a variety of eukaryotic proteins involved in the control of gene transcription and chromatin dynamics. PHD fingers can recognize the unmodified and modified histone H3 tail, and some have been found to interact with non-histone proteins. They also function as epigenome readers controlling gene expression through molecular recruitment of multi-protein complexes of chromatin regulators and transcription factors. — an NCBI CDD conserved domain (cd15571); members share this curated model.
