identifier: CDD:cd01807
label: "ubiquitin-like (Ubl) domain found in ubiquitin-like proteins UBL4A and similar proteins. UBL4A, also termed GdX, is a ubiquitously expressed ubiquitin-like (Ubl) protein that forms a complex with partner proteins and participates in the protein processing through endoplasmic reticulum (ER), acting as a chaperone. As a key component of the BCL2-associated athanogene 6 (BAG6) chaperone complex, UBL4A plays a role in mediating DNA damage signaling and cell death. UBL4A also regulates insulin-induced Akt plasma membrane translocation through promotion of Arp2/3-dependent actin branching. Moreover, UBL4A specifically stabilizes the TC45/STAT3 association and promotes dephosphorylation of STAT3 to repress tumorigenesis. UBL4B is testis-specific, and encoded by an X-derived retrogene Ubl4b, which is specifically expressed in post-meiotic germ cells in mammals. As a germ cell-specific cytoplasmic protein, UBL4B is not present in somatic cells. Moreover, UBL4B is present in elongated spermatids, but not in spermatocytes and round spermatids, suggesting its function is restricted to late spermiogenesis. The function of UBL4A may be compensated by either UBL4B or other Ubl proteins in normal conditions. Both UBL4A and UBL4B contain a conserved Ubl domain with a beta-grasp Ubl fold, a common structure involved in protein-protein interactions."
definition: >-
  ubiquitin-like (Ubl) domain found in ubiquitin-like proteins UBL4A and similar proteins. UBL4A, also termed GdX, is a ubiquitously expressed ubiquitin-like (Ubl) protein that forms a complex with partner proteins and participates in the protein processing through endoplasmic reticulum (ER), acting as a chaperone. As a key component of the BCL2-associated athanogene 6 (BAG6) chaperone complex, UBL4A plays a role in mediating DNA damage signaling and cell death. UBL4A also regulates insulin-induced Akt plasma membrane translocation through promotion of Arp2/3-dependent actin branching. Moreover, UBL4A specifically stabilizes the TC45/STAT3 association and promotes dephosphorylation of STAT3 to repress tumorigenesis. UBL4B is testis-specific, and encoded by an X-derived retrogene Ubl4b, which is specifically expressed in post-meiotic germ cells in mammals. As a germ cell-specific cytoplasmic protein, UBL4B is not present in somatic cells. Moreover, UBL4B is present in elongated spermatids, but not in spermatocytes and round spermatids, suggesting its function is restricted to late spermiogenesis. The function of UBL4A may be compensated by either UBL4B or other Ubl proteins in normal conditions. Both UBL4A and UBL4B contain a conserved Ubl domain with a beta-grasp Ubl fold, a common structure involved in protein-protein interactions. — an NCBI CDD conserved domain (cd01807); members share this curated model.
