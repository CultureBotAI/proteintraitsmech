identifier: CDD:cd06190
label: "Toluene-4-monoxygenase electron transfer component of Pseudomonas mendocina hydroxylates toluene and forms p-cresol as part of a three component toluene-4-monoxygenase system. Electron transfer is from NADH to an NADH:ferredoxin oxidoreductase (TmoF in P. mendocina) to ferredoxin to an iron-containing oxygenase. TmoF is homologous to other mono- and dioxygenase systems within the ferredoxin reductase family."
definition: >-
  Toluene-4-monoxygenase electron transfer component of Pseudomonas mendocina hydroxylates toluene and forms p-cresol as part of a three component toluene-4-monoxygenase system. Electron transfer is from NADH to an NADH:ferredoxin oxidoreductase (TmoF in P. mendocina) to ferredoxin to an iron-containing oxygenase. TmoF is homologous to other mono- and dioxygenase systems within the ferredoxin reductase family. — an NCBI CDD conserved domain (cd06190); members share this curated model.
