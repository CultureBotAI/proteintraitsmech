identifier: CDD:cd02689
label: Alpha_amylase_like_C-term
definition: >-
  Alpha amylase-like C-terminus domain. The members in this cd are composed primarily of alpha amylase and cyclodextrin glycotransferase (CGTase). Amylases and Cgtases both degrade starch to smaller oligosaccharides by hydrolyzing the alpha-D-(1,4) linkages between glucose residues present in starch. In the case of CGTases, an additional cyclization reaction is catalyzed yielding mixtures of cyclic oligosaccharides which are referred to as alpha-, beta-, or gamma-cyclodextrins and consist of six, seven, or eight glucoses, respectively. Besides having similar catalytic site residues, amylases and CGTases contain carbohydrate binding domains that are distant from the active site and which are implicated in attaching the enzyme to raw starch granules and in guiding the amylose chain into the active site
