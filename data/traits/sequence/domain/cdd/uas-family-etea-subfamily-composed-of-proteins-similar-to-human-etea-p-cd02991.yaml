identifier: CDD:cd02991
label: "UAS family, ETEA subfamily; composed of proteins similar to human ETEA protein, the translation product of a highly expressed gene in the T-cells and eosinophils of atopic dermatitis patients compared with those of normal individuals. ETEA shows homology to Fas-associated factor 1 (FAF1); both containing UAS and UBX (ubiquitin-associated) domains. Compared to FAF1, however, ETEA lacks the ubiquitin-associated UBA domain and a nuclear targeting domain. The function of ETEA is still unknown. A yeast two-hybrid assay showed that it can interact with Fas. Because of its homology to FAF1, it is postulated that ETEA could be involved in modulating Fas-mediated apoptosis of T-cells and eosinophils of atopic dermatitis patients, making them more resistant to apoptosis."
definition: >-
  UAS family, ETEA subfamily; composed of proteins similar to human ETEA protein, the translation product of a highly expressed gene in the T-cells and eosinophils of atopic dermatitis patients compared with those of normal individuals. ETEA shows homology to Fas-associated factor 1 (FAF1); both containing UAS and UBX (ubiquitin-associated) domains. Compared to FAF1, however, ETEA lacks the ubiquitin-associated UBA domain and a nuclear targeting domain. The function of ETEA is still unknown. A yeast two-hybrid assay showed that it can interact with Fas. Because of its homology to FAF1, it is postulated that ETEA could be involved in modulating Fas-mediated apoptosis of T-cells and eosinophils of atopic dermatitis patients, making them more resistant to apoptosis. — an NCBI CDD conserved domain (cd02991); members share this curated model.
