identifier: CDD:cd06128
label: "DEDDy 3'-5' exonuclease domain of family-A DNA polymerases. The 3'-5' exonuclease domain of family-A DNA polymerases has a fundamental role in reducing polymerase errors and is involved in proofreading activity. Family-A DNA polymerases contain a DnaQ-like exonuclease domain in the same polypeptide chain as the polymerase domain, similar to family-B DNA polymerases. The exonuclease domain contains three conserved sequence motifs termed ExoI, ExoII and ExoIII, which are clustered around the active site and contain four invariant acidic residues that serve as ligands for the two metal ions required for catalysis. The Klenow fragment (KF) of Escherichia coli Pol I, the Thermus aquaticus (Taq) Pol I, and Bacillus stearothermophilus (BF) Pol I are examples of family-A DNA polymerases. They are involved in nucleotide excision repair and in the processing of Okazaki fragments that are generated during lagging strand synthesis. The N-terminal domains of BF Pol I and Taq Pol I resemble the fold of the 3'-5' exonuclease domain of KF without the proofreading activity of KF. The four critical metal-binding residues are not conserved in BF Pol I and Taq Pol I, and they are unable to bind metals necessary for exonuclease activity."
definition: >-
  DEDDy 3'-5' exonuclease domain of family-A DNA polymerases. The 3'-5' exonuclease domain of family-A DNA polymerases has a fundamental role in reducing polymerase errors and is involved in proofreading activity. Family-A DNA polymerases contain a DnaQ-like exonuclease domain in the same polypeptide chain as the polymerase domain, similar to family-B DNA polymerases. The exonuclease domain contains three conserved sequence motifs termed ExoI, ExoII and ExoIII, which are clustered around the active site and contain four invariant acidic residues that serve as ligands for the two metal ions required for catalysis. The Klenow fragment (KF) of Escherichia coli Pol I, the Thermus aquaticus (Taq) Pol I, and Bacillus stearothermophilus (BF) Pol I are examples of family-A DNA polymerases. They are involved in nucleotide excision repair and in the processing of Okazaki fragments that are generated during lagging strand synthesis. The N-terminal domains of BF Pol I and Taq Pol I resemble the fold of the 3'-5' exonuclease domain of KF without the proofreading activity of KF. The four critical metal-binding residues are not conserved in BF Pol I and Taq Pol I, and they are unable to bind metals necessary for exonuclease activity. — an NCBI CDD conserved domain (cd06128); members share this curated model.
