identifier: CDD:cd17686
label: "RUN domain found in Run domain Beclin-1-interacting and cysteine-rich domain-containing protein (RUBCN) and similar proteins. RUBCN, also called rubicon, or beclin-1 associated RUN domain containing protein (Baron), is part of a Beclin-1-Vps34-containing autophagy complex. It negatively regulates endosome maturation and degradative endocytic trafficking and impairs autophagosome maturation process. It is also an important negative regulator of the innate immune response, enhances viral replication and may play a role in viral immune evasion. This model contains the RUN domain of RUBCN."
definition: >-
  RUN domain found in Run domain Beclin-1-interacting and cysteine-rich domain-containing protein (RUBCN) and similar proteins. RUBCN, also called rubicon, or beclin-1 associated RUN domain containing protein (Baron), is part of a Beclin-1-Vps34-containing autophagy complex. It negatively regulates endosome maturation and degradative endocytic trafficking and impairs autophagosome maturation process. It is also an important negative regulator of the innate immune response, enhances viral replication and may play a role in viral immune evasion. This model contains the RUN domain of RUBCN. — an NCBI CDD conserved domain (cd17686); members share this curated model.
