identifier: CDD:cd00170
label: "Sec14p-like lipid-binding domain. Sec14p-like lipid-binding domains are found in secretory proteins, such as S. cerevisiae phosphatidylinositol transfer protein (Sec14p), and in lipid regulated proteins such as RhoGAPs, RhoGEFs and neurofibromin (NF1). SEC14 domain of Dbl is known to associate with G protein beta/gamma subunits."
definition: >-
  Sec14p-like lipid-binding domain. Sec14p-like lipid-binding domains are found in secretory proteins, such as S. cerevisiae phosphatidylinositol transfer protein (Sec14p), and in lipid regulated proteins such as RhoGAPs, RhoGEFs and neurofibromin (NF1). SEC14 domain of Dbl is known to associate with G protein beta/gamma subunits. — an NCBI CDD conserved domain (cd00170); members share this curated model.
