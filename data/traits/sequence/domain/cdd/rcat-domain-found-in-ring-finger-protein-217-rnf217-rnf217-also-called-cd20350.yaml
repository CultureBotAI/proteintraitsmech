identifier: CDD:cd20350
label: "Rcat domain found in RING finger protein 217 (RNF217). RNF217, also called IBR domain-containing protein 1 (IBRDC1), is a transmembrane (TM) domain-containing RBR-type E3 ubiquitin-protein ligase, with different splice variants, that is mainly expressed in testis and skeletal muscle. It interacts with the anti-apoptotic protein HAX1, and is adjacent to a translocation breakpoint involving ETV6 in childhood acute lymphoblastic leukemia (ALL). RNF217 contains an RBR domain followed by TMs. The RBR domain was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. This model corresponds to the Rcat domain of RNF217 that is essential for RBR E3 ligase activity and adopts the same fold as the BRcat domain."
definition: >-
  Rcat domain found in RING finger protein 217 (RNF217). RNF217, also called IBR domain-containing protein 1 (IBRDC1), is a transmembrane (TM) domain-containing RBR-type E3 ubiquitin-protein ligase, with different splice variants, that is mainly expressed in testis and skeletal muscle. It interacts with the anti-apoptotic protein HAX1, and is adjacent to a translocation breakpoint involving ETV6 in childhood acute lymphoblastic leukemia (ALL). RNF217 contains an RBR domain followed by TMs. The RBR domain was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. This model corresponds to the Rcat domain of RNF217 that is essential for RBR E3 ligase activity and adopts the same fold as the BRcat domain. — an NCBI CDD conserved domain (cd20350); members share this curated model.
