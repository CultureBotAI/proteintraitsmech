identifier: CDD:cd11447
label: "basic helix-loop-helix-orange (bHLH-O) domain found in hairy/enhancer-of-split related with YRPW motif-like protein (HEYL) and similar proteins. HEYL, also termed Class B basic helix-loop-helix protein 33 (bHLHb33), or hairy-related transcription factor 3 (HRT-3), is a bHLH-O transcriptional repressor that is strongly expressed in the presomitic mesoderm, the somites, the peripheral nervous system and smooth muscle of all arteries and is a downstream effector of the Notch and transforming growth factor-beta pathways. It promotes neuronal differentiation by activating proneural genes and inhibiting other hairy and enhancer of split (HES) and hairy/enhancer-of-split related with YRPW motif protein (HEY) proteins. HEYL also functions as a tumor suppressor involved in the progression of human cancers."
definition: >-
  basic helix-loop-helix-orange (bHLH-O) domain found in hairy/enhancer-of-split related with YRPW motif-like protein (HEYL) and similar proteins. HEYL, also termed Class B basic helix-loop-helix protein 33 (bHLHb33), or hairy-related transcription factor 3 (HRT-3), is a bHLH-O transcriptional repressor that is strongly expressed in the presomitic mesoderm, the somites, the peripheral nervous system and smooth muscle of all arteries and is a downstream effector of the Notch and transforming growth factor-beta pathways. It promotes neuronal differentiation by activating proneural genes and inhibiting other hairy and enhancer of split (HES) and hairy/enhancer-of-split related with YRPW motif protein (HEY) proteins. HEYL also functions as a tumor suppressor involved in the progression of human cancers. — an NCBI CDD conserved domain (cd11447); members share this curated model.
