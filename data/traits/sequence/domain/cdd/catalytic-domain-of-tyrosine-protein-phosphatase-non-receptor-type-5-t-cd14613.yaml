identifier: CDD:cd14613
label: "catalytic domain of tyrosine-protein phosphatase non-receptor type 5. Tyrosine-protein phosphatase non-receptor type 5 (PTPN5), also called striatum-enriched protein-tyrosine phosphatase (STEP) or neural-specific PTP, belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPN5/STEP is a kinase interaction motif (KIM)-PTP, characterized by the presence of a 16-amino-acid KIM that binds specifically to members of the MAPK (mitogen-activated protein kinase) family. It is a CNS-enriched protein that regulates key signaling proteins required for synaptic strengthening, as well as NMDA and AMPA receptor trafficking. PTPN5 is implicated in multiple neurologic and neuropsychiatric disorders, such as Alzheimer's disease, Parkinson's disease, schizophrenia, and fragile X syndrome."
