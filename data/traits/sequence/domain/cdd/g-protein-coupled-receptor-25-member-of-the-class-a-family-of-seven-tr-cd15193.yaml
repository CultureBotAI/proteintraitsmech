identifier: CDD:cd15193
label: "G protein-coupled receptor 25, member of the class A family of seven-transmembrane G protein-coupled receptors. GPR25 is an orphan G-protein coupled receptor that shares strong sequence homology to GPR15 and the angiotensin II receptors. These closely related receptors form a group within the class A G-protein coupled receptors (GPCRs). GPR15 controls homing of T cells, especially FOXP3(+) regulatory T cells, to the large intestine mucosa and thereby mediates local immune homeostasis. Moreover, GRP15-deficient mice were shown to be prone to develop more severe large intestine inflammation. Angiotensin II (Ang II), the main effector in the renin-angiotensin system, plays a crucial role in the regulation of cardiovascular homeostasis through its type 1 (AT1) and type 2 (AT2) receptors."
definition: >-
  G protein-coupled receptor 25, member of the class A family of seven-transmembrane G protein-coupled receptors. GPR25 is an orphan G-protein coupled receptor that shares strong sequence homology to GPR15 and the angiotensin II receptors. These closely related receptors form a group within the class A G-protein coupled receptors (GPCRs). GPR15 controls homing of T cells, especially FOXP3(+) regulatory T cells, to the large intestine mucosa and thereby mediates local immune homeostasis. Moreover, GRP15-deficient mice were shown to be prone to develop more severe large intestine inflammation. Angiotensin II (Ang II), the main effector in the renin-angiotensin system, plays a crucial role in the regulation of cardiovascular homeostasis through its type 1 (AT1) and type 2 (AT2) receptors. — an NCBI CDD conserved domain (cd15193); members share this curated model.
