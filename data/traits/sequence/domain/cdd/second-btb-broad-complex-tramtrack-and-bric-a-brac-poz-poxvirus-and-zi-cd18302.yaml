identifier: CDD:cd18302
label: "second BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in inhibitor of Bruton tyrosine kinase (IBtk). IBtk is an inhibitor or negative regulator of Bruton tyrosine kinase (Btk), which is required for B-cell differentiation and development. IBtk binds to the PH domain of Btk and down-regulates the Btk kinase activity. It contains two BTB domains. This model corresponds to the second BTB domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  second BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in inhibitor of Bruton tyrosine kinase (IBtk). IBtk is an inhibitor or negative regulator of Bruton tyrosine kinase (Btk), which is required for B-cell differentiation and development. IBtk binds to the PH domain of Btk and down-regulates the Btk kinase activity. It contains two BTB domains. This model corresponds to the second BTB domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18302); members share this curated model.
