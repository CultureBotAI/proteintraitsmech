identifier: CDD:cd16205
label: "EF-hand motif found in phosphoinositide phospholipase C eta (PI-PLC-eta). PI-PLC-eta isozymes represent a class of neuron-specific metazoan PI-PLCs that are most abundant in the brain, particularly in the hippocampus, habenula, olfactory bulb, cerebellum, and throughout the cerebral cortex. They are phosphatidylinositol 4,5-bisphosphate-hydrolyzing enzymes that are more sensitive to Ca2+ than other PI-PLC isozymes. They function as calcium sensors activated by small increases in intracellular calcium concentrations. They are also activated through G-protein-coupled receptor (GPCR) stimulation, and further mediate GPCR signalling pathways. PI-PLC-eta isozymes contain an N-terminal pleckstrin homology (PH) domain, four atypical EF-hand motifs, a PLC catalytic core domain, a C2 domain, and a unique C-terminal tail that terminates with a PDZ-binding motif, a potential interaction site for other signaling proteins. The PLC catalytic core domain is a TIM barrel with two highly conserved regions (X and Y) split by a highly degenerate linker sequence. The C-terminal tail harbors a number of proline-rich motifs which may interact with SH3 (Src homology 3) domain-containing proteins, as well as many serine/threonine residues, suggesting possible regulation of interactions by protein kinases/phosphatases. There are two PI-PLC-eta isozymes (1-2). Aside from the PI-PLC-eta isozymes identified in mammals, their eukaryotic homologs are also present in this family."
definition: >-
  EF-hand motif found in phosphoinositide phospholipase C eta (PI-PLC-eta). PI-PLC-eta isozymes represent a class of neuron-specific metazoan PI-PLCs that are most abundant in the brain, particularly in the hippocampus, habenula, olfactory bulb, cerebellum, and throughout the cerebral cortex. They are phosphatidylinositol 4,5-bisphosphate-hydrolyzing enzymes that are more sensitive to Ca2+ than other PI-PLC isozymes. They function as calcium sensors activated by small increases in intracellular calcium concentrations. They are also activated through G-protein-coupled receptor (GPCR) stimulation, and further mediate GPCR signalling pathways. PI-PLC-eta isozymes contain an N-terminal pleckstrin homology (PH) domain, four atypical EF-hand motifs, a PLC catalytic core domain, a C2 domain, and a unique C-terminal tail that terminates with a PDZ-binding motif, a potential interaction site for other signaling proteins. The PLC catalytic core domain is a TIM barrel with two highly conserved regions (X and Y) split by a highly degenerate linker sequence. The C-terminal tail harbors a number of proline-rich motifs which may interact with SH3 (Src homology 3) domain-containing proteins, as well as many serine/threonine residues, suggesting possible regulation of interactions by protein kinases/phosphatases. There are two PI-PLC-eta isozymes (1-2). Aside from the PI-PLC-eta isozymes identified in mammals, their eukaryotic homologs are also present in this family. — an NCBI CDD conserved domain (cd16205); members share this curated model.
