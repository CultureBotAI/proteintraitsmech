identifier: CDD:cd18640
label: "chromodomain of Drosophila melanogaster chromator chromodomain protein, and similar proteins. This subgroup includes the CHROMO (CHRromatin Organization Modifier) domain found in chromodomain of Drosophila melanogaster chromator (also known as Chriz/Chro) chromodomain protein, and similar proteins.  Chromator is a nuclear protein that plays a role in proper spindle dynamics during mitosis. The chromodomain is implicated in the binding, of the proteins in which it is found, to methylated histone tails and maybe RNA. A chromodomain may occur as a single instance, in a tandem arrangement, or followed by a related chromo shadow domain."
definition: >-
  chromodomain of Drosophila melanogaster chromator chromodomain protein, and similar proteins. This subgroup includes the CHROMO (CHRromatin Organization Modifier) domain found in chromodomain of Drosophila melanogaster chromator (also known as Chriz/Chro) chromodomain protein, and similar proteins. Chromator is a nuclear protein that plays a role in proper spindle dynamics during mitosis. The chromodomain is implicated in the binding, of the proteins in which it is found, to methylated histone tails and maybe RNA. A chromodomain may occur as a single instance, in a tandem arrangement, or followed by a related chromo shadow domain. — an NCBI CDD conserved domain (cd18640); members share this curated model.
