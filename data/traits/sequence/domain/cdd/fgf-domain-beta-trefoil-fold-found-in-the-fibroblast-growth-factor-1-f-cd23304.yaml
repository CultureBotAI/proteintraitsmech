identifier: CDD:cd23304
label: "FGF domain, beta-trefoil fold, found in the fibroblast growth factor 1 (FGF1)-like family. The FGF1-like family includes FGF1 and FGF2. FGF1, also called acidic fibroblast growth factor (aFGF), or endothelial cell growth factor (ECGF), or heparin-binding growth factor 1 (HBGF-1), plays an important role in the regulation of cell survival, cell division, angiogenesis, cell differentiation, and cell migration. It functions as a potent mitogen in vitro. FGF1 acts as a ligand for fibroblast growth factor receptor 1 (FGFR1) and integrin. It interacts with FGFR1, FGFR2, FGFR3, and FGFR4. Affinity between fibroblast growth factors (FGFs) and their receptors is increased by heparan sulfate glycosaminoglycans that function as coreceptors. FGF1 also interacts with fibroblast growth factor-binding protein 1 (FGFBP1), FGF1, and FGF2. FGF2, also called basic fibroblast growth factor (bFGF), or heparin-binding growth factor 2 (HBGF2), acts as a ligand for FGFR1, FGFR2, FGFR3, and FGFR4. It also acts as an integrin ligand which is required for FGF2 signaling. FGF2 plays an important role in the regulation of cell survival, cell division, cell differentiation and cell migration. Both FGF1 and FGF2 contain a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  FGF domain, beta-trefoil fold, found in the fibroblast growth factor 1 (FGF1)-like family. The FGF1-like family includes FGF1 and FGF2. FGF1, also called acidic fibroblast growth factor (aFGF), or endothelial cell growth factor (ECGF), or heparin-binding growth factor 1 (HBGF-1), plays an important role in the regulation of cell survival, cell division, angiogenesis, cell differentiation, and cell migration. It functions as a potent mitogen in vitro. FGF1 acts as a ligand for fibroblast growth factor receptor 1 (FGFR1) and integrin. It interacts with FGFR1, FGFR2, FGFR3, and FGFR4. Affinity between fibroblast growth factors (FGFs) and their receptors is increased by heparan sulfate glycosaminoglycans that function as coreceptors. FGF1 also interacts with fibroblast growth factor-binding protein 1 (FGFBP1), FGF1, and FGF2. FGF2, also called basic fibroblast growth factor (bFGF), or heparin-binding growth factor 2 (HBGF2), acts as a ligand for FGFR1, FGFR2, FGFR3, and FGFR4. It also acts as an integrin ligand which is required for FGF2 signaling. FGF2 plays an important role in the regulation of cell survival, cell division, cell differentiation and cell migration. Both FGF1 and FGF2 contain a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23304); members share this curated model.
