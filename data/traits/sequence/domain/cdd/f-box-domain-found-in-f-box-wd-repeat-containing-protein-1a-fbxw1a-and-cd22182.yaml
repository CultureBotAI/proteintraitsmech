identifier: CDD:cd22182
label: "F-box domain found in F-box/WD repeat-containing protein 1A (FBXW1A) and similar proteins. FBXW1A, also called E3RSIkappaB, epididymis tissue protein Li 2a, F-box and WD repeats protein beta-TrCP, or pIkappaBalpha-E3 receptor subunit, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins, such as CTNNB1, NFKBIA, NFKBIB and NFKBIE, as well as phosphorylated NFKB1, ATF4, CDC25A, DLG1, FBXO5, PER1, SMAD3, SMAD4, SNAI1 and probably NFKB2. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box/WD repeat-containing protein 1A (FBXW1A) and similar proteins. FBXW1A, also called E3RSIkappaB, epididymis tissue protein Li 2a, F-box and WD repeats protein beta-TrCP, or pIkappaBalpha-E3 receptor subunit, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins, such as CTNNB1, NFKBIA, NFKBIB and NFKBIE, as well as phosphorylated NFKB1, ATF4, CDC25A, DLG1, FBXO5, PER1, SMAD3, SMAD4, SNAI1 and probably NFKB2. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22182); members share this curated model.
