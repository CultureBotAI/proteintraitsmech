identifier: CDD:cd11471
label: bHLH_TS_HAND2
definition: >-
  basic helix-loop-helix (bHLH) domain found in heart- and neural crest derivatives-expressed protein 2 (HAND2) and similar proteins. HAND2, also termed Class A basic helix-loop-helix protein 26 (bHLHa26), or deciduum, heart, autonomic nervous system and neural crest derivatives-expressed protein 2 (dHAND), is a bHLH transcription factor that is essential for cardiac morphogenesis, particularly for the formation of the right ventricle and of the aortic arch arteries
