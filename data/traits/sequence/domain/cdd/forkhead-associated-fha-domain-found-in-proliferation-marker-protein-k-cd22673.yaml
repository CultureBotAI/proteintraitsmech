identifier: CDD:cd22673
label: "forkhead associated (FHA) domain found in proliferation marker protein Ki-67 and similar proteins. Ki-67, also called antigen identified by monoclonal antibody Ki-67, antigen KI-67, or antigen Ki67, acts as a biological surfactant to disperse mitotic chromosomes. It is required to maintain individual mitotic chromosomes dispersed in the cytoplasm following nuclear envelope disassembly. Ki-67 binds DNA with a preference for supercoiled DNA and AT-rich DNA. It may also play a role in chromatin organization. Ki-67 contains an FHA domain at its N-terminus. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in proliferation marker protein Ki-67 and similar proteins. Ki-67, also called antigen identified by monoclonal antibody Ki-67, antigen KI-67, or antigen Ki67, acts as a biological surfactant to disperse mitotic chromosomes. It is required to maintain individual mitotic chromosomes dispersed in the cytoplasm following nuclear envelope disassembly. Ki-67 binds DNA with a preference for supercoiled DNA and AT-rich DNA. It may also play a role in chromatin organization. Ki-67 contains an FHA domain at its N-terminus. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22673); members share this curated model.
