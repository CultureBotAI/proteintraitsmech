identifier: CDD:cd14285
label: "UBA domain found in Saccharomyces cerevisiae EH domain-containing and endocytosis protein 1 (Ede1) and similar proteins. Ede1, also bud site selection protein 15, is the mammalian protein Eps15 homolog found in yeast and functions at the internalization step of endocytosis. Both Ede1 and Eps15 are endocytic scaffold proteins that may involve in stabilization of the adaptor-cargo complex. They both contain contains three N-terminal Eps15 homology (EH) domains and C-terminal ubiquitin-binding motifs. Whereas Eps15 has two ubiquitin interacting motifs (UIM), Ede1 harbors a single ubiquitin-associated (UBA) domain. This model corresponds to Ede1 UBA domain that is responsible for the binding of monoubiquitinated proteins and negatively regulates EH domain-mediated protein-protein interactions."
definition: >-
  UBA domain found in Saccharomyces cerevisiae EH domain-containing and endocytosis protein 1 (Ede1) and similar proteins. Ede1, also bud site selection protein 15, is the mammalian protein Eps15 homolog found in yeast and functions at the internalization step of endocytosis. Both Ede1 and Eps15 are endocytic scaffold proteins that may involve in stabilization of the adaptor-cargo complex. They both contain contains three N-terminal Eps15 homology (EH) domains and C-terminal ubiquitin-binding motifs. Whereas Eps15 has two ubiquitin interacting motifs (UIM), Ede1 harbors a single ubiquitin-associated (UBA) domain. This model corresponds to Ede1 UBA domain that is responsible for the binding of monoubiquitinated proteins and negatively regulates EH domain-mediated protein-protein interactions. — an NCBI CDD conserved domain (cd14285); members share this curated model.
