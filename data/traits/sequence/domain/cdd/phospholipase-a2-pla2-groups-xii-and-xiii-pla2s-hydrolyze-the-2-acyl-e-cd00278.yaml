label: PLA2_XII_XIII
definition: >-
  Phospholipase A2 (PLA2) groups XII and XIII; PLA2s hydrolyze the 2-acyl ester bond of 1,2-diacylglycero-3-phospholipids. It belongs to the broad class of small extracellular Ca+ dependent PLA2s containing disulfide bridges and utilizing a catalytic histidine
