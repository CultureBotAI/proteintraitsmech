identifier: CDD:cd18675
label: PIN_SpAst1-like
definition: >-
  FEN-like PIN domain of Schizosaccharomyces pombe asteroid homolog 1 and related proteins. Schizosaccharomyces pombe Ast1 is a homologue of Drosophila Asteroid and human ASTE1. Ast1 appears to be involved in mounting a checkpoint response to endogenous damage in cells lacking Rad2 and Exo1. This subfamily belongs to the structure-specific, 5' nuclease family (FEN-like) that catalyzes hydrolysis of DNA duplex-containing nucleic acid structures during DNA replication, repair, and recombination. Canonical members of the FEN-like family possess a PIN domain with a two-helical structure insert (also known as the helical arch, helical clamp or I domain) of variable length (approximately 16 to 800 residues), the helical arch/clamp region is involved in DNA binding. The PIN domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its putative active center, consisting of invariant acidic amino acid residues (putative metal-binding residues), is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons
