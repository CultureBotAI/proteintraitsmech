identifier: CDD:cd22184
label: "Archaeaoglobus fulgidus Af2093 and similar proteins. This family represents the uncharacterized protein Af2093, which has no known function. The three-dimensional fold of this protein family resembles that of PDDEXK nucleases, but it lacks the typical catalytic site."
definition: >-
  Archaeaoglobus fulgidus Af2093 and similar proteins. This family represents the uncharacterized protein Af2093, which has no known function. The three-dimensional fold of this protein family resembles that of PDDEXK nucleases, but it lacks the typical catalytic site. — an NCBI CDD conserved domain (cd22184); members share this curated model.
