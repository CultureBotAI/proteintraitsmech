label: Af2093-like
definition: >-
  Archaeaoglobus fulgidus Af2093 and similar proteins. This family represents the uncharacterized protein Af2093, which has no known function. The three-dimensional fold of this protein family resembles that of PDDEXK nucleases, but it lacks the typical catalytic site
