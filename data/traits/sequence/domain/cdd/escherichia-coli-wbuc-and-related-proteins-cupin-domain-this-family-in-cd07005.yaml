identifier: CDD:cd07005
label: "Escherichia coli WbuC and related proteins, cupin domain. This family includes bacterial proteins homologous to WbuC, an Escherichia coli protein of unknown function with a cupin beta barrel fold.  Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  Escherichia coli WbuC and related proteins, cupin domain. This family includes bacterial proteins homologous to WbuC, an Escherichia coli protein of unknown function with a cupin beta barrel fold. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd07005); members share this curated model.
