identifier: CDD:cd24141
label: NDUFS5-like
definition: >-
  mitochondrial complex I subunit NDUFS5 and similar proteins. Ndufs5 (NADH dehydrogenase [ubiquinone] iron-sulfur protein 5) is an accessory subunit of the mitochondrial membrane respiratory chain NADH dehydrogenase (Complex I). Complex I is a 45-subunit complex that functions in the transfer of electrons from NADH to the respiratory chain. It plays a key role in cellular energy metabolism, generating a major portion of the proton motive force that drives aerobic ATP synthesis. Ndufs5 is a component of the iron-sulfur (IP) subcomplex and does not seem to be involved in catalysis
