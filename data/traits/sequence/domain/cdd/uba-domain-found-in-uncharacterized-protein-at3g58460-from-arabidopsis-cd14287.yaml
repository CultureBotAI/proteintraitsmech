identifier: CDD:cd14287
label: "UBA domain found in uncharacterized protein At3g58460 from Arabidopsis thaliana and its homologs from other plants. The uncharacterized protein At3g58460 from Arabidopsis thaliana is also known as rhomboid-like protein 15 which is encoded by RBL15 gene. Although the biological function of the family members remains unclear, they all contain an N-terminal rhomboid-like domain and a C-terminal ubiquitin-associated (UBA) domain."
definition: >-
  UBA domain found in uncharacterized protein At3g58460 from Arabidopsis thaliana and its homologs from other plants. The uncharacterized protein At3g58460 from Arabidopsis thaliana is also known as rhomboid-like protein 15 which is encoded by RBL15 gene. Although the biological function of the family members remains unclear, they all contain an N-terminal rhomboid-like domain and a C-terminal ubiquitin-associated (UBA) domain. — an NCBI CDD conserved domain (cd14287); members share this curated model.
