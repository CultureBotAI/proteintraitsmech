identifier: CDD:cd06995
label: "AraC/XylS family transcriptional regulators similar to Escherichia coli YkgD, N-terminal cupin domain. This family contains mostly bacterial proteins containing an AraC/XylS family helix-turn-helix (HTH) DNA-binding domain C-terminal to a cupin domain, and may be possible transcriptional regulators. Included in this family is YkgD, an uncharacterized Escherichia coli protein thought to be a transcriptional regulator. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  AraC/XylS family transcriptional regulators similar to Escherichia coli YkgD, N-terminal cupin domain. This family contains mostly bacterial proteins containing an AraC/XylS family helix-turn-helix (HTH) DNA-binding domain C-terminal to a cupin domain, and may be possible transcriptional regulators. Included in this family is YkgD, an uncharacterized Escherichia coli protein thought to be a transcriptional regulator. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd06995); members share this curated model.
