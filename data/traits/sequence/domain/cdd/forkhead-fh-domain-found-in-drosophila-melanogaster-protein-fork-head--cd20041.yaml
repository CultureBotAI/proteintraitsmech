identifier: CDD:cd20041
label: FH_dFKH
definition: >-
  Forkhead (FH) domain found in Drosophila melanogaster protein fork head (dFKH) and similar proteins. dFKH promotes terminal as opposed to segmental development. In the absence of dFKH, this developmental switch does not occur. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'
