identifier: CDD:cd14961
label: "NHL repeat domain of the tripartite motif-containing protein 32 (TRIM32) and related proteins. The E3 ubiquitin-protein ligase TRIM32 (HT2A) is widely expressed and is responsible for ubiquinating a large variety of targets, including dysbindin (DTNBP1), NPHP7/Glis2, TAp73, and others. TRIM32 promotes disassociation of the plakoglobin-PI3K complex and reduces PI3K-Akt-FoxO signaling. Mutations in TRIM32 have been implemented in the two diverse diseases limb-girdle muscular dystrophy type 2H (LGMD2H) or sarcotubular myopathy (STM) and Bardet-Biedl syndrome type 11 (BBS11). The NHL (NCL-1, HT2A and LIN-41) repeat is found in multiple tandem copies, typically as 6 instances. It is about 40 residues long and resembles the WD repeat and other beta-propeller structures."
definition: >-
  NHL repeat domain of the tripartite motif-containing protein 32 (TRIM32) and related proteins. The E3 ubiquitin-protein ligase TRIM32 (HT2A) is widely expressed and is responsible for ubiquinating a large variety of targets, including dysbindin (DTNBP1), NPHP7/Glis2, TAp73, and others. TRIM32 promotes disassociation of the plakoglobin-PI3K complex and reduces PI3K-Akt-FoxO signaling. Mutations in TRIM32 have been implemented in the two diverse diseases limb-girdle muscular dystrophy type 2H (LGMD2H) or sarcotubular myopathy (STM) and Bardet-Biedl syndrome type 11 (BBS11). The NHL (NCL-1, HT2A and LIN-41) repeat is found in multiple tandem copies, typically as 6 instances. It is about 40 residues long and resembles the WD repeat and other beta-propeller structures. — an NCBI CDD conserved domain (cd14961); members share this curated model.
