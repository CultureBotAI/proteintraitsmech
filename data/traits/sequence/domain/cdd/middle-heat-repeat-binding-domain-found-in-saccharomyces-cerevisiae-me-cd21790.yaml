identifier: CDD:cd21790
label: "Middle HEAT-repeat binding domain found in Saccharomyces cerevisiae meiotic recombination protein Rec8 (ScRec8p) and similar proteins. ScRec8p, also called cohesin REC8, or sporulation protein 69, replaces the SCC1 mitosis-specific cohesin to ensure sister chromatid cohesion during meiosis. It is cleaved by ESP1 shortly before the first meiotic division, and dissociates from chromatin, allowing sister chromatids to segregate. It is protected from cleavage by SPO13. This model corresponds to a small region in the middle of ScRec8p that shows high sequence similarity with the HEAT-repeat binding domain of Saccharomyces cerevisiae sister chromatid cohesion protein 1 (ScScc1p) and Homo sapiens nuclear matrix protein 1 (NXP-1), which consists of short helices and two long extended segments."
definition: >-
  Middle HEAT-repeat binding domain found in Saccharomyces cerevisiae meiotic recombination protein Rec8 (ScRec8p) and similar proteins. ScRec8p, also called cohesin REC8, or sporulation protein 69, replaces the SCC1 mitosis-specific cohesin to ensure sister chromatid cohesion during meiosis. It is cleaved by ESP1 shortly before the first meiotic division, and dissociates from chromatin, allowing sister chromatids to segregate. It is protected from cleavage by SPO13. This model corresponds to a small region in the middle of ScRec8p that shows high sequence similarity with the HEAT-repeat binding domain of Saccharomyces cerevisiae sister chromatid cohesion protein 1 (ScScc1p) and Homo sapiens nuclear matrix protein 1 (NXP-1), which consists of short helices and two long extended segments. — an NCBI CDD conserved domain (cd21790); members share this curated model.
