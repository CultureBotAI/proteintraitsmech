identifier: CDD:cd19006
label: "gamma-aminobutyric acid receptor subunit beta-like extracellular domain in protostomia, such as LCCH3 (ligand-gated chloride channel homolog 3). This family contains extracellular domain of beta-like subunits of type-A gamma-aminobutyric acid receptor (GABAAR) found in protostomia, similar to Drosophila melanogaster ligand-gated chloride channel homolog 3 (LCCH3) subunits. Drosophila melanogaster expresses three GABA-receptor subunit orthologs: (RDL, resistant to dieldrin; GRD, GABA/glycine-like receptor of Drosophila; LCCH3, ligand-gated chloride channel homolog 3), and may possibly form homo- and/or heteropentameric associations. LCCH3 has been shown to combine with subunit GRD to form cation-selective GABA-gated ion channels when coexpressed in Xenopus laevis oocytes. GABAARs are known to be the molecular targets of a class of insecticides. The resulting pentameric receptors in this family have been shown to be activated by insect GABA-receptor agonists muscimol and CACA, and blocked by antagonists fipronil, dieldrin, and picrotoxin, but not bicuculline. GABAARs are abundant in the CNS, where their physiological role is to mediate fast inhibitory neurotransmission. In insects, this inhibitory transmission plays a crucial role in olfactory information processing."
definition: >-
  gamma-aminobutyric acid receptor subunit beta-like extracellular domain in protostomia, such as LCCH3 (ligand-gated chloride channel homolog 3). This family contains extracellular domain of beta-like subunits of type-A gamma-aminobutyric acid receptor (GABAAR) found in protostomia, similar to Drosophila melanogaster ligand-gated chloride channel homolog 3 (LCCH3) subunits. Drosophila melanogaster expresses three GABA-receptor subunit orthologs: (RDL, resistant to dieldrin; GRD, GABA/glycine-like receptor of Drosophila; LCCH3, ligand-gated chloride channel homolog 3), and may possibly form homo- and/or heteropentameric associations. LCCH3 has been shown to combine with subunit GRD to form cation-selective GABA-gated ion channels when coexpressed in Xenopus laevis oocytes. GABAARs are known to be the molecular targets of a class of insecticides. The resulting pentameric receptors in this family have been shown to be activated by insect GABA-receptor agonists muscimol and CACA, and blocked by antagonists fipronil, dieldrin, and picrotoxin, but not bicuculline. GABAARs are abundant in the CNS, where their physiological role is to mediate fast inhibitory neurotransmission. In insects, this inhibitory transmission plays a crucial role in olfactory information processing. — an NCBI CDD conserved domain (cd19006); members share this curated model.
