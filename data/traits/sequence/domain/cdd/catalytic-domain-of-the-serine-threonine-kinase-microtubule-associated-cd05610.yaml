identifier: CDD:cd05610
label: "Catalytic domain of the Serine/Threonine Kinase, Microtubule-associated serine/threonine-like kinase (also called greatwall kinase). STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The MASTL kinases in this group carry only a catalytic domain, which contains a long insertion relative to MAST kinases. MASTL, also called greatwall kinase (Gwl), is involved in the regulation of mitotic entry, which is controlled by the coordinated activities of protein kinases and opposing protein phosphatases (PPs). The cyclin B/CDK1 complex induces entry into M-phase while PP2A-B55 shows anti-mitotic activity. MASTL/Gwl is activated downstream of cyclin B/CDK1 and indirectly inhibits PP2A-B55 by phosphorylating the small protein alpha-endosulfine (Ensa) or the cAMP-regulated phosphoprotein 19 (Arpp19), resulting in M-phase progression. Gwl kinase may also play roles in mRNA stabilization and DNA checkpoint recovery. The human MASTL gene has also been named FLJ14813; a missense mutation in FLJ14813 is associated with autosomal dominant thrombocytopenia. The MASTL kinase subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Microtubule-associated serine/threonine-like kinase (also called greatwall kinase). STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The MASTL kinases in this group carry only a catalytic domain, which contains a long insertion relative to MAST kinases. MASTL, also called greatwall kinase (Gwl), is involved in the regulation of mitotic entry, which is controlled by the coordinated activities of protein kinases and opposing protein phosphatases (PPs). The cyclin B/CDK1 complex induces entry into M-phase while PP2A-B55 shows anti-mitotic activity. MASTL/Gwl is activated downstream of cyclin B/CDK1 and indirectly inhibits PP2A-B55 by phosphorylating the small protein alpha-endosulfine (Ensa) or the cAMP-regulated phosphoprotein 19 (Arpp19), resulting in M-phase progression. Gwl kinase may also play roles in mRNA stabilization and DNA checkpoint recovery. The human MASTL gene has also been named FLJ14813; a missense mutation in FLJ14813 is associated with autosomal dominant thrombocytopenia. The MASTL kinase subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05610); members share this curated model.
