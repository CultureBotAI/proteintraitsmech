identifier: CDD:cd12882
label: "SPRY domain at N-terminus of ring finger protein 123. This SPRY domain is found at the N-terminus of RING finger protein 123 domain (also known as E3 ubiquitin-protein ligase RNF123). The ring finger domain motif is present in a variety of functionally distinct proteins and known to be involved in protein-protein and protein-DNA interactions. RNF123 displays E3 ubiquitin ligase activity toward the cyclin-dependent kinase inhibitor p27 (Kip1)."
definition: >-
