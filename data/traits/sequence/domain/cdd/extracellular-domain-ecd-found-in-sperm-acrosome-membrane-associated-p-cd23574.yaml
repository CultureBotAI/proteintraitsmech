identifier: CDD:cd23574
label: "extracellular domain (ECD) found in sperm acrosome membrane-associated protein 4 (SPACA4). SPACA4 (also called SAMP14) is a sperm surface membrane protein that may be involved in sperm-egg plasma membrane adhesion and fusion during fertilization. SPACA4 contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in sperm acrosome membrane-associated protein 4 (SPACA4). SPACA4 (also called SAMP14) is a sperm surface membrane protein that may be involved in sperm-egg plasma membrane adhesion and fusion during fertilization. SPACA4 contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23574); members share this curated model.
