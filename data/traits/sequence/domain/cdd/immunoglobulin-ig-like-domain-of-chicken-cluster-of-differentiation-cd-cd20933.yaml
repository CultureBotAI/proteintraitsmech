identifier: CDD:cd20933
label: "Immunoglobulin (Ig)-like domain of chicken Cluster of Differentiation (CD) 3 epsilon chain and similar proteins. The members here are composed of the immunoglobulin (Ig)-like domain of chicken Cluster of Differentiation (CD) 3 epsilon chain and similar proteins. CD3 is a T cell surface receptor that is associated with alpha/beta T cell receptors (TCRs). The CD3 complex consists of one gamma, one delta, two epsilon, and two zeta chains. The CD3 subunits form heterodimers as gamma/epsilon, delta/epsilon, and zeta/zeta. The gamma, delta, and epsilon chains each contain an extracellular Ig domain, whereas the extracellular domains of the zeta chains are very small and have unknown structure. The CD3 domain participates in intracellular signaling once the TCR has bound an MHC/antigen complex. The chicken CD3epsilon Ig domain has low sequence identity with human (22%) and mouse (24%) CD3epsilon, but overall is structurally very similar over the entire domain."
definition: >-
  Immunoglobulin (Ig)-like domain of chicken Cluster of Differentiation (CD) 3 epsilon chain and similar proteins. The members here are composed of the immunoglobulin (Ig)-like domain of chicken Cluster of Differentiation (CD) 3 epsilon chain and similar proteins. CD3 is a T cell surface receptor that is associated with alpha/beta T cell receptors (TCRs). The CD3 complex consists of one gamma, one delta, two epsilon, and two zeta chains. The CD3 subunits form heterodimers as gamma/epsilon, delta/epsilon, and zeta/zeta. The gamma, delta, and epsilon chains each contain an extracellular Ig domain, whereas the extracellular domains of the zeta chains are very small and have unknown structure. The CD3 domain participates in intracellular signaling once the TCR has bound an MHC/antigen complex. The chicken CD3epsilon Ig domain has low sequence identity with human (22%) and mouse (24%) CD3epsilon, but overall is structurally very similar over the entire domain. — an NCBI CDD conserved domain (cd20933); members share this curated model.
