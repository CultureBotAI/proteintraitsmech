identifier: CDD:cd10552
label: "N-terminal FeS domain of pyrogallol-phloroglucinol transhydroxylase (TH), beta subunit. This family includes the beta subunit of pyrogallol-phloroglucinol transhydroxylase (TH), a cytoplasmic molybdenum (Mo) enzyme from anaerobic microorganisms like Pelobacter acidigallici and Desulfitobacterium hafniense which catalyzes the conversion of pyrogallol to phloroglucinol, an important building block of plant polymers. TH belongs to the DMSO reductase (DMSOR) family; it is a heterodimer consisting of a large alpha catalytic subunit and a small beta FeS subunit.  The beta subunit has two domains with the N-terminal domain containing three [4Fe-4S] centers and a seven-stranded, mainly antiparallel beta-barrel domain. In the anaerobic bacterium Pelobacter acidigallici, gallic acid, pyrogallol, phloroglucinol, or phloroglucinol carboxylic acid are fermented to three molecules of acetate (plus CO2), and TH is the key enzyme in the fermentation pathway, which converts pyrogallol to phloroglucinol in the absence of O2."
definition: >-
  N-terminal FeS domain of pyrogallol-phloroglucinol transhydroxylase (TH), beta subunit. This family includes the beta subunit of pyrogallol-phloroglucinol transhydroxylase (TH), a cytoplasmic molybdenum (Mo) enzyme from anaerobic microorganisms like Pelobacter acidigallici and Desulfitobacterium hafniense which catalyzes the conversion of pyrogallol to phloroglucinol, an important building block of plant polymers. TH belongs to the DMSO reductase (DMSOR) family; it is a heterodimer consisting of a large alpha catalytic subunit and a small beta FeS subunit. The beta subunit has two domains with the N-terminal domain containing three [4Fe-4S] centers and a seven-stranded, mainly antiparallel beta-barrel domain. In the anaerobic bacterium Pelobacter acidigallici, gallic acid, pyrogallol, phloroglucinol, or phloroglucinol carboxylic acid are fermented to three molecules of acetate (plus CO2), and TH is the key enzyme in the fermentation pathway, which converts pyrogallol to phloroglucinol in the absence of O2. — an NCBI CDD conserved domain (cd10552); members share this curated model.
