identifier: CDD:cd03199
label: "C-terminal, alpha helical domain of Glutaredoxin 2. Glutathione S-transferase (GST) C-terminal domain family, Glutaredoxin 2 (GRX2) subfamily; composed of Escherichia coli GRX2 and similar proteins. Escherichia coli GRX2 is an atypical GRX with a molecular mass of about 24kD (most GRXs range from 9-12kD). It adopts a GST fold containing an N-terminal thioredoxin-fold domain and a C-terminal alpha helical domain. It contains a redox active CXXC motif located in the N-terminal domain, but is not able to reduce ribonucleotide reductase like other GRXs. However, it catalyzes GSH-dependent protein disulfide reduction of other substrates efficiently. GRX2 is thought to function primarily in catalyzing the reversible glutathionylation of proteins in cellular redox regulation including stress responses."
