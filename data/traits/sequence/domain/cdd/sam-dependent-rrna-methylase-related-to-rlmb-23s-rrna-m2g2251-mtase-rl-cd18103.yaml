identifier: CDD:cd18103
label: "SAM-dependent rRNA methylase related to RlmB. 23S rRNA-M2G2251-MTase RlmB catalyzes the methylation of guanosine 2251, a modification conserved in the peptidyltransferase domain of 23S rRNA. It is part of the SpoU family of MTases, a subfamily of the SPOUT methyltransferase superfamily. The SPOUT methyltransferase superfamily is a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot."
definition: >-
  SAM-dependent rRNA methylase related to RlmB. 23S rRNA-M2G2251-MTase RlmB catalyzes the methylation of guanosine 2251, a modification conserved in the peptidyltransferase domain of 23S rRNA. It is part of the SpoU family of MTases, a subfamily of the SPOUT methyltransferase superfamily. The SPOUT methyltransferase superfamily is a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot. — an NCBI CDD conserved domain (cd18103); members share this curated model.
