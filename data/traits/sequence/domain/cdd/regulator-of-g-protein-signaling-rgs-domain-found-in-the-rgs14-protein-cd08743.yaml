identifier: CDD:cd08743
label: "Regulator of G protein signaling (RGS) domain found in the RGS14 protein. RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS14 protein. RGS14 is a member of the RA/RGS subfamily of RGS proteins family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. RGS14 belong to the R12 RGS subfamily, which includes RGS10 and RGS12, all of which are highly selective for G-alpha-i1 over G-alpha-q.  RGS14 binds and regulates the subcellular localization and activities of H-Ras and Raf  kinases in cells and thereby integrates G protein and Ras/Raf signaling pathways."
definition: >-
  Regulator of G protein signaling (RGS) domain found in the RGS14 protein. RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS14 protein. RGS14 is a member of the RA/RGS subfamily of RGS proteins family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. RGS14 belong to the R12 RGS subfamily, which includes RGS10 and RGS12, all of which are highly selective for G-alpha-i1 over G-alpha-q. RGS14 binds and regulates the subcellular localization and activities of H-Ras and Raf kinases in cells and thereby integrates G protein and Ras/Raf signaling pathways. — an NCBI CDD conserved domain (cd08743); members share this curated model.
