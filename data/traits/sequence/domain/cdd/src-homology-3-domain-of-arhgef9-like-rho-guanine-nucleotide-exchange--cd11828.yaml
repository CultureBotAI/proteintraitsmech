identifier: CDD:cd11828
label: "Src homology 3 domain of ARHGEF9-like Rho guanine nucleotide exchange factors. Members of this family contain a SH3 domain followed by RhoGEF (also called Dbl-homologous or DH) and Pleckstrin Homology (PH) domains. They include the Rho guanine nucleotide exchange factors ARHGEF9, ASEF (also called ARHGEF4), ASEF2, and similar proteins. GEFs activate small GTPases by exchanging bound GDP for free GTP. ARHGEF9 specifically activates Cdc42, while both ASEF and ASEF2 can activate Rac1 and Cdc42. ARHGEF9 is highly expressed in the brain and it interacts with gephyrin, a postsynaptic protein associated with GABA and glycine receptors. ASEF plays a role in angiogenesis and cell migration. ASEF2 is important in cell migration and adhesion dynamics. ASEF exists in an autoinhibited form and is activated upon binding of the tumor suppressor APC (adenomatous polyposis coli), leading to the activation of Rac1 or Cdc42. In its autoinhibited form, the SH3 domain of ASEF forms an extensive interface with the DH and PH domains, blocking the Rac binding site. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of ARHGEF9-like Rho guanine nucleotide exchange factors. Members of this family contain a SH3 domain followed by RhoGEF (also called Dbl-homologous or DH) and Pleckstrin Homology (PH) domains. They include the Rho guanine nucleotide exchange factors ARHGEF9, ASEF (also called ARHGEF4), ASEF2, and similar proteins. GEFs activate small GTPases by exchanging bound GDP for free GTP. ARHGEF9 specifically activates Cdc42, while both ASEF and ASEF2 can activate Rac1 and Cdc42. ARHGEF9 is highly expressed in the brain and it interacts with gephyrin, a postsynaptic protein associated with GABA and glycine receptors. ASEF plays a role in angiogenesis and cell migration. ASEF2 is important in cell migration and adhesion dynamics. ASEF exists in an autoinhibited form and is activated upon binding of the tumor suppressor APC (adenomatous polyposis coli), leading to the activation of Rac1 or Cdc42. In its autoinhibited form, the SH3 domain of ASEF forms an extensive interface with the DH and PH domains, blocking the Rac binding site. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11828); members share this curated model.
