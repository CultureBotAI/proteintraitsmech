identifier: CDD:cd18369
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing proteins, KCTD10 (BACURD3), KCTD13 (BACURD1), and TNFAIP1 (BACURD2). This subfamily of KCTD proteins, also called the BTB/POZ domain-containing adapter for CUL3-mediated RhoA degradation protein (BACURD) subfamily, includes KCTD10 (BACURD3), KCTD13 (BACURD1), and TNFAIP1 (BACURD2). KCTD10 is a BTB/POZ domain-containing protein that interacts with proliferating cell nuclear antigen (PCNA) and polymerase delta, and participates in DNA repair, DNA replication, and cell-cycle control. Its down-regulation could inhibit cell proliferation. KCTD10 also plays crucial roles in embryonic angiogenesis and heart development in mammals by negatively regulating the Notch signaling pathway. KCTD13 is a BTB/POZ domain-containing protein that may function as a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex that mediates the ubiquitination of RhoA, leading to its degradation by the proteasome, thereby regulating the actin cytoskeleton and cell migration. TNFAIP1, also called protein B12, is a BTB/POZ domain-containing protein that is involved in DNA replication, DNA damage repair, cell apoptosis, and is implicated in human diseases including cancer, Alzheimer's disease (AD) and type 2 diabetic nephropathy. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. KCTD10 and KCTD13 BTB domains form a novel two-fold symmetric tetramer that is distinct from the tetramer formed by voltage-gated potassium (Kv) channels."
definition: >-
