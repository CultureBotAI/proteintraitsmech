identifier: CDD:cd20513
label: "first cyclin box found in cyclin-C (CCNC) and similar proteins. CCNC, also termed CycC, or SRB11, is a component of the Mediator complex, a coactivator involved in regulated gene transcription of nearly all RNA polymerase II-dependent genes. It mediates stress-induced mitochondrial fission and apoptosis. CCNC contains two cyclin boxes. This model corresponds to the first one. The cyclin box is a protein binding domain."
definition: >-
  first cyclin box found in cyclin-C (CCNC) and similar proteins. CCNC, also termed CycC, or SRB11, is a component of the Mediator complex, a coactivator involved in regulated gene transcription of nearly all RNA polymerase II-dependent genes. It mediates stress-induced mitochondrial fission and apoptosis. CCNC contains two cyclin boxes. This model corresponds to the first one. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20513); members share this curated model.
