identifier: CDD:cd15392
label: "neuropeptide Y receptor-like found in insect and related proteins, member of the class A family of seven-transmembrane G protein-coupled receptors. This subgroup includes a novel G protein-coupled receptor (also known as PR4 receptor) from Drosophila melanogaster, which can be activated by the members of the neuropeptide Y (NPY) family, including NPY, peptide YY (PYY) and pancreatic polypeptide (PP), when expressed in Xenopus oocytes. These homologous peptides of 36-amino acids in length contain a hairpin-like structural motif, which referred to as the pancreatic polypeptide fold, and function as gastrointestinal hormones and neurotransmitters. The PR4 receptor also shares strong sequence homology to the mammalian tachykinin receptors (NK1R, NK2R, and NK3R), whose endogenous ligands are substance P (SP), neurokinin A (NKA), and neurokinin B (NKB), respectively. The tachykinins function as excitatory transmitters on neurons and cells in the gastrointestinal tract."
definition: >-
  neuropeptide Y receptor-like found in insect and related proteins, member of the class A family of seven-transmembrane G protein-coupled receptors. This subgroup includes a novel G protein-coupled receptor (also known as PR4 receptor) from Drosophila melanogaster, which can be activated by the members of the neuropeptide Y (NPY) family, including NPY, peptide YY (PYY) and pancreatic polypeptide (PP), when expressed in Xenopus oocytes. These homologous peptides of 36-amino acids in length contain a hairpin-like structural motif, which referred to as the pancreatic polypeptide fold, and function as gastrointestinal hormones and neurotransmitters. The PR4 receptor also shares strong sequence homology to the mammalian tachykinin receptors (NK1R, NK2R, and NK3R), whose endogenous ligands are substance P (SP), neurokinin A (NKA), and neurokinin B (NKB), respectively. The tachykinins function as excitatory transmitters on neurons and cells in the gastrointestinal tract. — an NCBI CDD conserved domain (cd15392); members share this curated model.
