identifier: CDD:cd19438
label: "bacterial lipocalin Blc, Arabidopsis thaliana temperature-induced lipocalin-1, and similar proteins. Escherichia coli bacterial lipocalin (Blc, also known as YjeL) is an outer membrane lipoprotein involved in the storage or transport of lipids necessary for membrane maintenance under stressful conditions. Blc has a binding preference for lysophospholipids. This group includes eukaryotic lipocalins such as Arabidopsis thaliana temperature-induced lipocalin-1 (TIL) which is involved in thermotolerance, oxidative, salt, drought and high light stress tolerance, and is needed for seed longevity by ensuring polyunsaturated lipids integrity. This group belongs to the lipocalin/cytosolic fatty-acid binding protein family which have a large beta-barrel ligand-binding cavity. Lipocalins are mainly low molecular weight extracellular proteins that bind principally small hydrophobic ligands, and form covalent or non-covalent complexes with soluble macromolecules, as well as membrane bound-receptors. They participate in processes such as ligand transport, modulation of cell growth and metabolism, regulation of immune response, smell reception, tissue development and animal behavior. Cytosolic fatty-acid binding proteins, also bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
definition: >-
  bacterial lipocalin Blc, Arabidopsis thaliana temperature-induced lipocalin-1, and similar proteins. Escherichia coli bacterial lipocalin (Blc, also known as YjeL) is an outer membrane lipoprotein involved in the storage or transport of lipids necessary for membrane maintenance under stressful conditions. Blc has a binding preference for lysophospholipids. This group includes eukaryotic lipocalins such as Arabidopsis thaliana temperature-induced lipocalin-1 (TIL) which is involved in thermotolerance, oxidative, salt, drought and high light stress tolerance, and is needed for seed longevity by ensuring polyunsaturated lipids integrity. This group belongs to the lipocalin/cytosolic fatty-acid binding protein family which have a large beta-barrel ligand-binding cavity. Lipocalins are mainly low molecular weight extracellular proteins that bind principally small hydrophobic ligands, and form covalent or non-covalent complexes with soluble macromolecules, as well as membrane bound-receptors. They participate in processes such as ligand transport, modulation of cell growth and metabolism, regulation of immune response, smell reception, tissue development and animal behavior. Cytosolic fatty-acid binding proteins, also bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development. — an NCBI CDD conserved domain (cd19438); members share this curated model.
