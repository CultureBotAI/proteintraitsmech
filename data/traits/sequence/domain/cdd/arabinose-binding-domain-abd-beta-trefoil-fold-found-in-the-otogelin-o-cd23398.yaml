identifier: CDD:cd23398
label: "Arabinose-binding domain (ABD), beta-trefoil fold, found in the otogelin (OTOG) family. The OTOG family includes otogelin (OTOG) and otogelin-like protein (OTOGL). OTOG is a glycoprotein specific to acellular membranes of the inner ear. It may be required for the anchoring of the otoconial membranes and cupula to the underlying neuroepithelia in the vestibule. OTOG may be involved in the organization and/or stabilization of the fibrillar network that compose the tectorial membrane in the cochlea. OTOGL is a mucin glycoprotein that is a component of the tectorial membrane. It acts as a gel-forming mucin that forms high-molecular-weight complexes and is glycosylated through mucin-type O-glycosylation. Mutations in the OTOG or OTOGL gene may cause hearing loss. Members of this family contain an ABD with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ABD of the related protein, alpha-L-arabinofuranosidase, binds two arabinose molecules in the beta and gamma subdomains."
definition: >-
  Arabinose-binding domain (ABD), beta-trefoil fold, found in the otogelin (OTOG) family. The OTOG family includes otogelin (OTOG) and otogelin-like protein (OTOGL). OTOG is a glycoprotein specific to acellular membranes of the inner ear. It may be required for the anchoring of the otoconial membranes and cupula to the underlying neuroepithelia in the vestibule. OTOG may be involved in the organization and/or stabilization of the fibrillar network that compose the tectorial membrane in the cochlea. OTOGL is a mucin glycoprotein that is a component of the tectorial membrane. It acts as a gel-forming mucin that forms high-molecular-weight complexes and is glycosylated through mucin-type O-glycosylation. Mutations in the OTOG or OTOGL gene may cause hearing loss. Members of this family contain an ABD with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ABD of the related protein, alpha-L-arabinofuranosidase, binds two arabinose molecules in the beta and gamma subdomains. — an NCBI CDD conserved domain (cd23398); members share this curated model.
