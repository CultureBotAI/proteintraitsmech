identifier: CDD:cd15203
label: "neuropeptide Y receptors and related proteins, member of the class A family of seven-transmembrane G protein-coupled receptors. NPY is a 36-amino acid peptide neurotransmitter with a C-terminal tyrosine amide residue that is widely distributed in the brain and the autonomic nervous system of many mammalian species. NPY exerts its functions through five, G-protein coupled receptor subtypes including NPY1R, NPY2R, NPY4R, NPY5R, and NPY6R; however, NPY6R is not functional in humans. NYP receptors are also activated by its two other family members, peptide YY (PYY) and pancreatic polypeptide (PP). They typically couple to Gi or Go proteins, which leads to a decrease in adenylate cyclase activity, thereby decreasing intracellular cAMP levels, and are involved in diverse physiological roles including appetite regulation, circadian rhythm, and anxiety.  Also included in this subgroup is prolactin-releasing peptide (PrRP) receptor (previously known as GPR10), which is activated by its endogenous ligand PrRP, a neuropeptide possessing C-terminal Arg-Phe-amide motif. There are two active isoforms of PrRP in mammals: one consists of 20 amino acid residues (PrRP-20) and the other consists of 31 amino acid residues (PrRP-31). PrRP receptor shows significant sequence homology to the NPY receptors, and a micromolar level of NPY can bind and completely inhibit the PrRP-evoked intracellular calcium response in PrRP receptor-expressing cells, suggesting that the PrRP receptor shares a common ancestor with the NPY receptors."
definition: >-
  neuropeptide Y receptors and related proteins, member of the class A family of seven-transmembrane G protein-coupled receptors. NPY is a 36-amino acid peptide neurotransmitter with a C-terminal tyrosine amide residue that is widely distributed in the brain and the autonomic nervous system of many mammalian species. NPY exerts its functions through five, G-protein coupled receptor subtypes including NPY1R, NPY2R, NPY4R, NPY5R, and NPY6R; however, NPY6R is not functional in humans. NYP receptors are also activated by its two other family members, peptide YY (PYY) and pancreatic polypeptide (PP). They typically couple to Gi or Go proteins, which leads to a decrease in adenylate cyclase activity, thereby decreasing intracellular cAMP levels, and are involved in diverse physiological roles including appetite regulation, circadian rhythm, and anxiety. Also included in this subgroup is prolactin-releasing peptide (PrRP) receptor (previously known as GPR10), which is activated by its endogenous ligand PrRP, a neuropeptide possessing C-terminal Arg-Phe-amide motif. There are two active isoforms of PrRP in mammals: one consists of 20 amino acid residues (PrRP-20) and the other consists of 31 amino acid residues (PrRP-31). PrRP receptor shows significant sequence homology to the NPY receptors, and a micromolar level of NPY can bind and completely inhibit the PrRP-evoked intracellular calcium response in PrRP receptor-expressing cells, suggesting that the PrRP receptor shares a common ancestor with the NPY receptors. — an NCBI CDD conserved domain (cd15203); members share this curated model.
