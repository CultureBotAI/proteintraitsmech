identifier: CDD:cd18162
label: PRC
definition: >-
  PRC-barrel domain. photoreaction center (PRC)-barrel domain is a widespread, conserved all beta barrel domain shared by photosynthetic reaction center H subunits (PRCH), RNA metabolism proteins of the RimM group, calmodulin-regulated spectrin-associated proteins (CAMSAPs), patronin, and many uncharacterized homolog proteins from bacteria and archaea. PRCH is important for the assembly of the photosynthetic reaction center and appears to regulate electron transfer during the reduction of the secondary quinone. RimM is an accessory protein needed during the final step in the assembly of 30S ribosomal subunit, possibly for assembly of the head region (the 16S rRNA 3' domain). It is also essential for efficient processing of 16S rRNA. CAMSAP1 is a microtubule-binding protein that plays a role in the regulation of cell morphology and cytoskeletal organization. It may regulate neurite outgrowth through interaction with spectrin. CAMSAP2 (also known as CAMSAP1L1) and CAMSAP3 (also known as Nezha) are microtubule minus-end binding proteins that may regulate non-centrosomal microtubule dynamics and organization. They may also be involved in regulation of the organization of cellular organelles including the Golgi and the early endosomes through the microtubule cytoskeleton. Drosophila melanogaster patronin, also termed short spindle protein 4, is involved in mitotic spindle assembly, as well as the regulation of microtubule severing. Some family members contain two or three copies of PRC-barrel domain
