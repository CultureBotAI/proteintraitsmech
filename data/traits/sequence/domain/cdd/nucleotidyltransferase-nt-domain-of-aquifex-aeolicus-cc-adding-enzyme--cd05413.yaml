identifier: CDD:cd05413
label: NT_AqaCCase_like
definition: >-
  Nucleotidyltransferase (NT) domain of Aquifex aeolicus CC-adding enzyme, class II, and related proteins. NT_AqaCCase_like: Aquifex aeolicus CC-adding enzyme [ATP tRNA nucleotidyltransferase, AqaAase]-like, class II. AqaCCase in a template-independent reaction adds cytidine(C) to the 3prime end of tRNAlacking CC adenosine(A) and CA. This subgroup includes proteins similar to AqaCCase including Synechocystis sp. and Deinococcus radiodurans CCases. In these ancient and slow evolving bacteria, CCases and A-adding enzymes collaborate to add CCA to tRNAs. These proteins are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group
