identifier: CDD:cd15126
label: "endothelin B receptor-like protein 2, member of the class A family of seven-transmembrane G protein-coupled receptors. Endothelin B receptor-like protein 2, also called GPR37L1, is almost exclusively expressed in the nervous system. It has recently been shown to act as a receptor for the neuropeptide prosaptide, the active fragment of the secreted neuroprotective and glioprotective factor prosaposin (also called sulfated glycoprotein-1). Both prosaptide and prosaposin protect primary astrocytes against oxidative stress. GPR37L1 is part of the class A family of GPCRs that includes receptors for hormones, neurotransmitters, sensory stimuli, and a variety of other ligands. All GPCRs have a common structural architecture comprising of seven-transmembrane (TM) alpha-helices interconnected by three extracellular and three intracellular loops. A general feature of GPCR signaling is agonist-induced conformational changes in the receptors, leading to activation of the heterotrimeric G proteins, which consist of the guanine nucleotide-binding G-alpha subunit and the dimeric G-beta-gamma subunits. The activated G proteins then bind to and activate numerous downstream effector proteins, which generate second messengers that mediate a broad range of cellular and physiological processes."
