identifier: CDD:cd03735
label: "SOCS (suppressors of cytokine signaling) box of SOCS1-like proteins. Together with CIS1, the CIS/SOCS family of proteins is characterized by the presence of a C-terminal SOCS box and a central SH2 domain. SOCS1, like CIS1 and SOCS3, is involved in the down-regulation of the JAK/STAT pathway. SOCS1 has a dual function as a direct potent JAK kinase inhibitor and as a component of an E3 ubiquitin-ligase complex recruiting substrates to the protein degradation machinery."
definition: >-
  SOCS (suppressors of cytokine signaling) box of SOCS1-like proteins. Together with CIS1, the CIS/SOCS family of proteins is characterized by the presence of a C-terminal SOCS box and a central SH2 domain. SOCS1, like CIS1 and SOCS3, is involved in the down-regulation of the JAK/STAT pathway. SOCS1 has a dual function as a direct potent JAK kinase inhibitor and as a component of an E3 ubiquitin-ligase complex recruiting substrates to the protein degradation machinery. — an NCBI CDD conserved domain (cd03735); members share this curated model.
