identifier: CDD:cd22110
label: "F-box domain found in F-box only protein 42 (FBXO42) and similar proteins. FBXO42, also called FBX42, or just one F-box and Kelch domain-containing protein (JFK), is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It specifically recognizes p53/TP53, promoting its ubiquitination and degradation. FBXO42 is also involved in the ubiquitin-proteasome system that may play a role in the pathogenesis of Parkinson's disease (PD). The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 42 (FBXO42) and similar proteins. FBXO42, also called FBX42, or just one F-box and Kelch domain-containing protein (JFK), is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It specifically recognizes p53/TP53, promoting its ubiquitination and degradation. FBXO42 is also involved in the ubiquitin-proteasome system that may play a role in the pathogenesis of Parkinson's disease (PD). The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22110); members share this curated model.
