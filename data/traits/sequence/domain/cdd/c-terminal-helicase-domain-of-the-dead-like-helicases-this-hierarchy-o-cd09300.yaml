identifier: CDD:cd09300
label: "C-terminal helicase domain of the DEAD-like helicases. This hierarchy of DEAD-like helicases is composed of two superfamilies, SF1 and SF2, that share almost identical folds and extensive structural similarity in their catalytic core. Helicases are involved in ATP-dependent RNA or DNA unwinding. Two distinct types of helicases exist, those forming toroidal, predominantly hexameric structures, and those that do not. SF1 and SF2 helicases do not form toroidal structures, while SF3-6 helicases do. Their conserved helicase core consists of two similar protein domains that resemble the fold of the recombination protein RecA. This model describes the C-terminal domain, also called HelicC."
definition: >-
  C-terminal helicase domain of the DEAD-like helicases. This hierarchy of DEAD-like helicases is composed of two superfamilies, SF1 and SF2, that share almost identical folds and extensive structural similarity in their catalytic core. Helicases are involved in ATP-dependent RNA or DNA unwinding. Two distinct types of helicases exist, those forming toroidal, predominantly hexameric structures, and those that do not. SF1 and SF2 helicases do not form toroidal structures, while SF3-6 helicases do. Their conserved helicase core consists of two similar protein domains that resemble the fold of the recombination protein RecA. This model describes the C-terminal domain, also called HelicC. — an NCBI CDD conserved domain (cd09300); members share this curated model.
