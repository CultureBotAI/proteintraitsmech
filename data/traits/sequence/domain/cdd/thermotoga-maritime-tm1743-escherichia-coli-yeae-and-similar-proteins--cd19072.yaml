identifier: CDD:cd19072
label: "Thermotoga maritime Tm1743, Escherichia coli YeaE and similar proteins. Thermotoga maritime Tm1743 is a founding member of aldo-keto reductase family 3 member F1 (AKR3F1). It is a aldo/keto reductase family oxidoreductase. Escherichia coli YeaE may act as an aldo-keto reductase (AKR) that catalyzes the reversible reduction of ketones to the respective alcohols using NAD(P)H as a hydride donor."
definition: >-
  Thermotoga maritime Tm1743, Escherichia coli YeaE and similar proteins. Thermotoga maritime Tm1743 is a founding member of aldo-keto reductase family 3 member F1 (AKR3F1). It is a aldo/keto reductase family oxidoreductase. Escherichia coli YeaE may act as an aldo-keto reductase (AKR) that catalyzes the reversible reduction of ketones to the respective alcohols using NAD(P)H as a hydride donor. — an NCBI CDD conserved domain (cd19072); members share this curated model.
