identifier: CDD:cd02253
label: "L-Aminopeptidase D-amidase/D-esterase (DmpA) family; DmpA catalyzes the release of N-terminal D and L amino acids from peptide susbtrates. DmpA is synthesized as a single polypeptide precursor, which is autocatalytically cleaved to the active heterodimeric form. The cleavage results in two polypeptide chains, with one chain containing an N-terminal nucleophile. This group represents one of the rare aminopeptidases that are not metalloenzymes. DmpA shows similarity in catalytic mechanism to N-terminal nucleophile (Ntn) hydrolases, which are enzymes that catalyze the cleavage of amide bonds through the nucleophilic attack of the side chain of an N-terminal serine, threonine, or cysteine."
definition: >-
  L-Aminopeptidase D-amidase/D-esterase (DmpA) family; DmpA catalyzes the release of N-terminal D and L amino acids from peptide susbtrates. DmpA is synthesized as a single polypeptide precursor, which is autocatalytically cleaved to the active heterodimeric form. The cleavage results in two polypeptide chains, with one chain containing an N-terminal nucleophile. This group represents one of the rare aminopeptidases that are not metalloenzymes. DmpA shows similarity in catalytic mechanism to N-terminal nucleophile (Ntn) hydrolases, which are enzymes that catalyze the cleavage of amide bonds through the nucleophilic attack of the side chain of an N-terminal serine, threonine, or cysteine. — an NCBI CDD conserved domain (cd02253); members share this curated model.
