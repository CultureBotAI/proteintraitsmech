identifier: CDD:cd24041
label: "nucleotide-binding domain (NBD) of Arabidopsis thaliana apyrase 1 (AtAPY1), apyrase 2 (AtAPY2), and similar proteins. Apyrase (APY; EC 3.6.1.5), also called ATP-diphosphatase, ATP-diphosphohydrolase, adenosine diphosphatase, ADPase, NTPDase, or nucleoside triphosphate diphosphohydrolase, catalyzes the hydrolysis of phosphoanhydride bonds of nucleoside tri- and di-phosphates (NTPs and NDPs) in the presence of divalent cations. AtAPY1 and AtAPY2 are typical type II membrane proteins and function at the plasma membrane as ATPases and ADPases regulating ecto-ATP/ADP concentrations. They also act as endo-apyrases residing in the Golgi lumen with UDPase and GDPase activities. AtAPY1 and AtAPY2 play roles in the regulation of stomatal function by modulating extracellular ATP levels in guard cells. They work together to reduce extracellular ATP level which is essential for pollen germination and normal plant development."
definition: >-
  nucleotide-binding domain (NBD) of Arabidopsis thaliana apyrase 1 (AtAPY1), apyrase 2 (AtAPY2), and similar proteins. Apyrase (APY; EC 3.6.1.5), also called ATP-diphosphatase, ATP-diphosphohydrolase, adenosine diphosphatase, ADPase, NTPDase, or nucleoside triphosphate diphosphohydrolase, catalyzes the hydrolysis of phosphoanhydride bonds of nucleoside tri- and di-phosphates (NTPs and NDPs) in the presence of divalent cations. AtAPY1 and AtAPY2 are typical type II membrane proteins and function at the plasma membrane as ATPases and ADPases regulating ecto-ATP/ADP concentrations. They also act as endo-apyrases residing in the Golgi lumen with UDPase and GDPase activities. AtAPY1 and AtAPY2 play roles in the regulation of stomatal function by modulating extracellular ATP levels in guard cells. They work together to reduce extracellular ATP level which is essential for pollen germination and normal plant development. — an NCBI CDD conserved domain (cd24041); members share this curated model.
