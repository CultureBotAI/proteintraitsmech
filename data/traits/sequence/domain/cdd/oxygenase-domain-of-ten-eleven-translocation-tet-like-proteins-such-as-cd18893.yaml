identifier: CDD:cd18893
label: "oxygenase domain of ten-eleven translocation (TET)-like proteins such as Naegleria gruberi Tet-like protein (NgTet1) and similar proteins. Naegleria gruberi Tet1 can catalyze the iterative oxidation of both 5-methylcytosine (5mC) and thymidine (T) on various DNA forms. Like mammalian TETs, it catalyzes the oxidation of 5mC to 5-hydroxymethylcytosine (5hmC), 5-formylcytosine (5fC) and 5-carboxylcytosine (5caC) in three consecutive, Fe2+ and alpha-ketoglutarate (also known as 2-oxoglutarate, 2-OG)-dependent oxidation reactions. Like JBP1 and JBP2, NgTet1 can perform T-oxidation to form 5-hydroxymethyluridine (5hmU), but in addition it can catalyze the formation of 5-formyluridine (5fU) and 5-carboxyluridine (5caU). This family belongs to the TET/JBP family of dioxygenases that require Fe2+ and alpha-ketoglutarate (also known as 2-oxoglutarate) for activity."
definition: >-
  oxygenase domain of ten-eleven translocation (TET)-like proteins such as Naegleria gruberi Tet-like protein (NgTet1) and similar proteins. Naegleria gruberi Tet1 can catalyze the iterative oxidation of both 5-methylcytosine (5mC) and thymidine (T) on various DNA forms. Like mammalian TETs, it catalyzes the oxidation of 5mC to 5-hydroxymethylcytosine (5hmC), 5-formylcytosine (5fC) and 5-carboxylcytosine (5caC) in three consecutive, Fe2+ and alpha-ketoglutarate (also known as 2-oxoglutarate, 2-OG)-dependent oxidation reactions. Like JBP1 and JBP2, NgTet1 can perform T-oxidation to form 5-hydroxymethyluridine (5hmU), but in addition it can catalyze the formation of 5-formyluridine (5fU) and 5-carboxyluridine (5caU). This family belongs to the TET/JBP family of dioxygenases that require Fe2+ and alpha-ketoglutarate (also known as 2-oxoglutarate) for activity. — an NCBI CDD conserved domain (cd18893); members share this curated model.
