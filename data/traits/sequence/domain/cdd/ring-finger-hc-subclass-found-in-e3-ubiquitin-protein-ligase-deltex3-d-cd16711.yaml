identifier: CDD:cd16711
label: "RING finger, HC subclass, found in E3 ubiquitin-protein ligase Deltex3 (DTX3) and similar proteins. DTX3, also known as RING finger protein 154 (RNF154), is an E3 ubiquitin-protein ligase that belongs to the Deltex (DTX) family. In contrast to other DTXs, DTX3 does not contain two N-terminal Notch-binding WWE domains, but a short unique N-terminal domain, suggesting it does not interact with the intracellular domain of Notch. Its C-terminal region includes a C3HC4-type RING-HC finger, and a previously unidentified C-terminal domain."
definition: >-
  RING finger, HC subclass, found in E3 ubiquitin-protein ligase Deltex3 (DTX3) and similar proteins. DTX3, also known as RING finger protein 154 (RNF154), is an E3 ubiquitin-protein ligase that belongs to the Deltex (DTX) family. In contrast to other DTXs, DTX3 does not contain two N-terminal Notch-binding WWE domains, but a short unique N-terminal domain, suggesting it does not interact with the intracellular domain of Notch. Its C-terminal region includes a C3HC4-type RING-HC finger, and a previously unidentified C-terminal domain. — an NCBI CDD conserved domain (cd16711); members share this curated model.
