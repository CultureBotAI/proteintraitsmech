identifier: CDD:cd13775
label: "Uncharacterized prokaryotic subfamily of the stomatin-like proteins (slipins), a subgroup of the SPFH family (stomatin, prohibitin, flotillin, and HflK/C). This model summarizes a subgroup of the stomatin-like protein family (SLPs or slipins) that is found in bacteria and archaebacteria. The conserved domain common to the SPFH superfamily has also been referred to as the Band 7 domain. Individual proteins of the SPFH superfamily may cluster to form membrane microdomains which may in turn recruit multiprotein complexes. Bacterial and archaebacterial SLPs remain uncharacterized."
definition: >-
  Uncharacterized prokaryotic subfamily of the stomatin-like proteins (slipins), a subgroup of the SPFH family (stomatin, prohibitin, flotillin, and HflK/C). This model summarizes a subgroup of the stomatin-like protein family (SLPs or slipins) that is found in bacteria and archaebacteria. The conserved domain common to the SPFH superfamily has also been referred to as the Band 7 domain. Individual proteins of the SPFH superfamily may cluster to form membrane microdomains which may in turn recruit multiprotein complexes. Bacterial and archaebacterial SLPs remain uncharacterized. — an NCBI CDD conserved domain (cd13775); members share this curated model.
