identifier: CDD:cd17554
label: "phosphoacceptor receiver (REC) domain of Thermotoga maritima response regulator TrrA and similar domains. Thermotoga maritima contains a two-component signal transduction system (TCS) composed of the ThkA sensory histidine kinase (HK) and its cognate response regulator (RR) TrrA; the specific function of the system is unknown. TCSs couple environmental stimuli to adaptive responses. TrrA is a stand-alone RR containing only a REC domain with no output/effector domain. The REC domain itself functions as an effector domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of Thermotoga maritima response regulator TrrA and similar domains. Thermotoga maritima contains a two-component signal transduction system (TCS) composed of the ThkA sensory histidine kinase (HK) and its cognate response regulator (RR) TrrA; the specific function of the system is unknown. TCSs couple environmental stimuli to adaptive responses. TrrA is a stand-alone RR containing only a REC domain with no output/effector domain. The REC domain itself functions as an effector domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17554); members share this curated model.
