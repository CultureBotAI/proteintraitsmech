identifier: CDD:cd20607
label: "nitroreductase family domain similar to the C-terminal domain of F420:gamma-glutamyl ligase FbiB. Proteins of this family catalyze the reduction of flavin or nitrocompounds using NAD(P)H as electron donor in a obligatory two-electron transfer,  utilizing FMN or FAD as cofactor. They are often found to be homodimers. Mycobacterium tuberculosis FbiB, is a two-domain protein and produces F420 with predominantly 5 to 7 L-glutamate residues in the poly-gamma-glutamate tail, its C-terminal domain is homologous to FMN-dependent nitroreductases."
definition: >-
  nitroreductase family domain similar to the C-terminal domain of F420:gamma-glutamyl ligase FbiB. Proteins of this family catalyze the reduction of flavin or nitrocompounds using NAD(P)H as electron donor in a obligatory two-electron transfer, utilizing FMN or FAD as cofactor. They are often found to be homodimers. Mycobacterium tuberculosis FbiB, is a two-domain protein and produces F420 with predominantly 5 to 7 L-glutamate residues in the poly-gamma-glutamate tail, its C-terminal domain is homologous to FMN-dependent nitroreductases. — an NCBI CDD conserved domain (cd20607); members share this curated model.
