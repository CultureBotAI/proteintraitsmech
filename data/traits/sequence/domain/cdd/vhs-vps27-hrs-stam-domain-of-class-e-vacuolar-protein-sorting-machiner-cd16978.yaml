identifier: CDD:cd16978
label: "VHS (Vps27/Hrs/STAM) domain of Class E vacuolar protein-sorting machinery protein HSE1. Class E vacuolar protein-sorting machinery protein HSE1, together with Vps27, comprise the ESCRT-0 complex, the sorting receptor for ubiquitinated cargo proteins at the multivesicular body (MVB). The complex directly binds to ubiquitinated transmembrane proteins and recruits both ubiquitin ligases and deubiquitinating enzymes. It is also required the efficient recycling of late Golgi proteins including the carboxypeptidase Y (CPY) sorting receptor, Vps10. Similar to metazoan STAMs, HSE1 contain: an N-terminal VHS domain, which is involved in cytokine-mediated intracellular signal transduction and has a superhelical structure similar to the structure of ARM (Armadillo) repeats; a Ubiquitin-Interacting Motif (UIM); a SH3 (Src Homology 3) domain, a well-established protein-protein interaction domain; and a GAT (GGA and TOM) domain, which is essential for the normal sorting function of HSE1."
definition: >-
  VHS (Vps27/Hrs/STAM) domain of Class E vacuolar protein-sorting machinery protein HSE1. Class E vacuolar protein-sorting machinery protein HSE1, together with Vps27, comprise the ESCRT-0 complex, the sorting receptor for ubiquitinated cargo proteins at the multivesicular body (MVB). The complex directly binds to ubiquitinated transmembrane proteins and recruits both ubiquitin ligases and deubiquitinating enzymes. It is also required the efficient recycling of late Golgi proteins including the carboxypeptidase Y (CPY) sorting receptor, Vps10. Similar to metazoan STAMs, HSE1 contain: an N-terminal VHS domain, which is involved in cytokine-mediated intracellular signal transduction and has a superhelical structure similar to the structure of ARM (Armadillo) repeats; a Ubiquitin-Interacting Motif (UIM); a SH3 (Src Homology 3) domain, a well-established protein-protein interaction domain; and a GAT (GGA and TOM) domain, which is essential for the normal sorting function of HSE1. — an NCBI CDD conserved domain (cd16978); members share this curated model.
