identifier: CDD:cd21852
label: PBD_ACD
definition: >-
  POT1 binding domain (PBD) found in adrenocortical dysplasia protein (ACD) and similar proteins. ACD, also called PIP1, or PTOP, or TINT1, or TPP1, or POT1 and TIN2-interacting protein, is a component of the shelterin complex (telosome) that is involved in the regulation of telomere length and protection. Shelterin associates with arrays of double-stranded TTAGGG repeats added by telomerase and protects chromosome ends. Without its protective activity, telomeres are no longer hidden from the DNA damage surveillance and chromosome ends are inappropriately processed by DNA repair pathways. ACD promotes binding of POT1 to single-stranded telomeric DNA. it modulates the inhibitory effects of POT1 on telomere elongation. The ACD-POT1 heterodimer enhances telomere elongation by recruiting telomerase to telomeres and increasing its processivity. ACD may also play a role in organogenesis. The model corresponds to POT1 binding domain (PBD) of ACD
