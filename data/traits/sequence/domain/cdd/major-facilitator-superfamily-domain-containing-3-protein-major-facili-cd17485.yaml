identifier: CDD:cd17485
label: "Major facilitator superfamily domain containing 3 protein. Major facilitator superfamily domain containing 3 protein (MFSD3) is a predicted acetyl-CoA transporter. As an atypical putative membrane-bound solute carrier (SLC), MFSD3 is most likely to be functionally active in the plasma membrane and not in any intracellular organelles. MFSD3 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Major facilitator superfamily domain containing 3 protein. Major facilitator superfamily domain containing 3 protein (MFSD3) is a predicted acetyl-CoA transporter. As an atypical putative membrane-bound solute carrier (SLC), MFSD3 is most likely to be functionally active in the plasma membrane and not in any intracellular organelles. MFSD3 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17485); members share this curated model.
