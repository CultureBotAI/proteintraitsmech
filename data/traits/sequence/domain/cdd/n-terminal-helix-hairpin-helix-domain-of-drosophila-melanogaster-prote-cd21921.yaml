identifier: CDD:cd21921
label: HHH_NTD_Del
definition: >-
  N-terminal helix-hairpin-helix domain of Drosophila melanogaster protein deadlock (Del) and similar proteins. Deadlock (Del) is a developmental protein required for germline maintenance, fusome morphogenesis and axial patterning in oogenesis and associates with centrosomes in the early embryo. Del interacts with Rhino, a rapidly evolving heterochromatin protein 1 (HP1) family protein, to form Rhino-Deadlock complex. The model corresponds to the N-terminal helix-hairpin-helix domain of Del, which is responsible for the binding of Rhino C-terminal chromoshadow domain (CSD)
