identifier: CDD:cd18727
label: "VapC-like PIN domain of Saccharomyces cerevisiae Swt1p, human SWT1 and related proteins. Saccharomyces cerevisiae mRNA-processing endoribonuclease Swt1p plays an important role in quality control of nuclear mRNPs in eukaryotes. Human transcriptional protein SWT1 (RNA endoribonuclease homolog, also known as HsSwt1, C1orf26, and chromosome 1 open reading frame 26) is an RNA endonuclease that participates in quality control of nuclear mRNPs and can associate with the nuclear pore complex (NPC). This subfamily belongs to the Smg5 and Smg6-like PIN domain family. Smg5 and Smg6 are essential factors in NMD, a post-transcriptional regulatory pathway that recognizes and rapidly degrades mRNAs containing premature translation termination codons. In vivo, the Smg6 PIN domain elicits degradation of bound mRNAs, as well as, metal-ion dependent, degradation of single-stranded RNA, in vitro. The PIN (PilT N terminus) domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its putative active center, consisting of invariant acidic amino acid residues (putative metal-binding residues), is geometrically similar in the active center of structure-specific 5' nucleases (also known as Flap endonuclease-1-like), PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons. Point mutation studies of the conserved aspartate residues in the catalytic center of the Smg6 PIN domain revealed that Smg6 is the endonuclease involved in human NMD. However, Smg5 lacks several of these key catalytic residues and does not degrade single-stranded RNA, in vivo."
definition: >-
  VapC-like PIN domain of Saccharomyces cerevisiae Swt1p, human SWT1 and related proteins. Saccharomyces cerevisiae mRNA-processing endoribonuclease Swt1p plays an important role in quality control of nuclear mRNPs in eukaryotes. Human transcriptional protein SWT1 (RNA endoribonuclease homolog, also known as HsSwt1, C1orf26, and chromosome 1 open reading frame 26) is an RNA endonuclease that participates in quality control of nuclear mRNPs and can associate with the nuclear pore complex (NPC). This subfamily belongs to the Smg5 and Smg6-like PIN domain family. Smg5 and Smg6 are essential factors in NMD, a post-transcriptional regulatory pathway that recognizes and rapidly degrades mRNAs containing premature translation termination codons. In vivo, the Smg6 PIN domain elicits degradation of bound mRNAs, as well as, metal-ion dependent, degradation of single-stranded RNA, in vitro. The PIN (PilT N terminus) domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its putative active center, consisting of invariant acidic amino acid residues (putative metal-binding residues), is geometrically similar in the active center of structure-specific 5' nucleases (also known as Flap endonuclease-1-like), PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons. Point mutation studies of the conserved aspartate residues in the catalytic center of the Smg6 PIN domain revealed that Smg6 is the endonuclease involved in human NMD. However, Smg5 lacks several of these key catalytic residues and does not degrade single-stranded RNA, in vivo. — an NCBI CDD conserved domain (cd18727); members share this curated model.
