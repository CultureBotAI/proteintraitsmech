identifier: CDD:cd20602
label: "cyclin box found in CDK5 and ABL1 enzyme substrate 1 (CABLES1). CABLES1, also called interactor with CDK3 1 (Ik3-1), is a cyclin-dependent kinase binding protein that enhances cyclin-dependent kinase tyrosine phosphorylation by non-receptor tyrosine kinases, such as that of CDK5 by activated ABL1, which leads to increased CDK5 activity and is critical for neuronal development, and that of CDK2 by WEE1, which leads to decreased CDK2 activity and growth inhibition. CABLES1 contains one cyclin box. The cyclin box is a protein binding domain."
definition: >-
  cyclin box found in CDK5 and ABL1 enzyme substrate 1 (CABLES1). CABLES1, also called interactor with CDK3 1 (Ik3-1), is a cyclin-dependent kinase binding protein that enhances cyclin-dependent kinase tyrosine phosphorylation by non-receptor tyrosine kinases, such as that of CDK5 by activated ABL1, which leads to increased CDK5 activity and is critical for neuronal development, and that of CDK2 by WEE1, which leads to decreased CDK2 activity and growth inhibition. CABLES1 contains one cyclin box. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20602); members share this curated model.
