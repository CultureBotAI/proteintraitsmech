identifier: CDD:cd02770
label: "This CD (MopB_DmsA-EC) includes the DmsA enzyme of the dmsABC operon encoding the anaerobic dimethylsulfoxide reductase (DMSOR) of Escherichia coli and other related DMSOR-like enzymes. Unlike other DMSOR-like enzymes, this group has a  predicted N-terminal iron-sulfur [4Fe-4S] cluster  binding site. These members belong to the molybdopterin_binding (MopB) superfamily of proteins."
definition: >-
  This CD (MopB_DmsA-EC) includes the DmsA enzyme of the dmsABC operon encoding the anaerobic dimethylsulfoxide reductase (DMSOR) of Escherichia coli and other related DMSOR-like enzymes. Unlike other DMSOR-like enzymes, this group has a predicted N-terminal iron-sulfur [4Fe-4S] cluster binding site. These members belong to the molybdopterin_binding (MopB) superfamily of proteins. — an NCBI CDD conserved domain (cd02770); members share this curated model.
