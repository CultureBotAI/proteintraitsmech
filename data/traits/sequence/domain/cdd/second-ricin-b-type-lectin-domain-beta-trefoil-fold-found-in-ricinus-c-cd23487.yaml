identifier: CDD:cd23487
label: "second ricin B-type lectin domain, beta-trefoil fold, found in Ricinus communis ricin, agglutinin and similar proteins. This subfamily includes ricin and agglutinin (RCA), toxic lectins from Ricinus communis. Ricin is highly toxic to animal cells, and to a lesser extent to plant cells. As a prototype AB toxin, ricin is composed of two polypeptide chains (A- and B-chain) linked by a disulfide bond. Ricin A chain acts as an RNA N-glycosidase that removes a specific adenine residue from an exposed loop of the 28S rRNA (A4324 in mammals), leading to rRNA breakage. Ricin B chain functions as a lectin that mediates cell binding via different oligosaccharide residues on the cell surface, including N-acetylglucosamine and galactose residues found on glycolipids and glycoproteins. It is also responsible for cell agglutination. Agglutinin shows high sequence similarity with ricin. It is only a weak toxin but a strong hemagglutinin. By contrast, ricin is a potent toxin but a weak hemagglutinin. Like ricin, agglutinin consists of a sugar-binding B chain linked via a disulfide bond to the catalytically active A chain. The B-chain of ricin and agglutinin contains two ricin B-type lectin domains with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. This model corresponds to the second ricin B-type lectin domain."
definition: >-
  second ricin B-type lectin domain, beta-trefoil fold, found in Ricinus communis ricin, agglutinin and similar proteins. This subfamily includes ricin and agglutinin (RCA), toxic lectins from Ricinus communis. Ricin is highly toxic to animal cells, and to a lesser extent to plant cells. As a prototype AB toxin, ricin is composed of two polypeptide chains (A- and B-chain) linked by a disulfide bond. Ricin A chain acts as an RNA N-glycosidase that removes a specific adenine residue from an exposed loop of the 28S rRNA (A4324 in mammals), leading to rRNA breakage. Ricin B chain functions as a lectin that mediates cell binding via different oligosaccharide residues on the cell surface, including N-acetylglucosamine and galactose residues found on glycolipids and glycoproteins. It is also responsible for cell agglutination. Agglutinin shows high sequence similarity with ricin. It is only a weak toxin but a strong hemagglutinin. By contrast, ricin is a potent toxin but a weak hemagglutinin. Like ricin, agglutinin consists of a sugar-binding B chain linked via a disulfide bond to the catalytically active A chain. The B-chain of ricin and agglutinin contains two ricin B-type lectin domains with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. This model corresponds to the second ricin B-type lectin domain. — an NCBI CDD conserved domain (cd23487); members share this curated model.
