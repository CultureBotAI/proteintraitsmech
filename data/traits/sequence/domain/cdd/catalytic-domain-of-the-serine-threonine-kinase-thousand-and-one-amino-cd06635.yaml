identifier: CDD:cd06635
label: "Catalytic domain of the Serine/Threonine Kinase, Thousand-and-One Amino acids 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. TAO1 is sometimes referred to as prostate-derived sterile 20-like kinase 2 (PSK2). TAO1 activates the p38 MAPK through direct interaction with and activation of MEK3. TAO1 is highly expressed in the brain and may play a role in neuronal apoptosis. TAO1 interacts with the checkpoint proteins BubR1 and Mad2, and plays an important role in regulating mitotic progression, which is required for both chromosome congression and checkpoint-induced anaphase delay. TAO1 may play a role in protecting genomic stability. TAO proteins possess MAPK kinase kinase activity. MAPK signaling cascades are important in mediating cellular responses to extracellular signals. The TAO1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Thousand-and-One Amino acids 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. TAO1 is sometimes referred to as prostate-derived sterile 20-like kinase 2 (PSK2). TAO1 activates the p38 MAPK through direct interaction with and activation of MEK3. TAO1 is highly expressed in the brain and may play a role in neuronal apoptosis. TAO1 interacts with the checkpoint proteins BubR1 and Mad2, and plays an important role in regulating mitotic progression, which is required for both chromosome congression and checkpoint-induced anaphase delay. TAO1 may play a role in protecting genomic stability. TAO proteins possess MAPK kinase kinase activity. MAPK signaling cascades are important in mediating cellular responses to extracellular signals. The TAO1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd06635); members share this curated model.
