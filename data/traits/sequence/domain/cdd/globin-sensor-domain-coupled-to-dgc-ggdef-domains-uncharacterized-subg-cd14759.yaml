identifier: CDD:cd14759
label: GS_GGDEF_2
definition: >-
  Globin sensor domain, coupled to DGC/GGDEF domains; uncharacterized subgroup. The majority of globin-coupled-sensors in this subfamily have diguanylate cyclase (DGC/GGDEF) domains N-terminal to the globin sensor domain and/or C-terminal EAL domains, DGC/GGDEF and EAL domains are involved in the synthesis and degradation of the secondary messenger c-di-GMP, respectively. Some members have GAF small-molecule-binding domains in addition
