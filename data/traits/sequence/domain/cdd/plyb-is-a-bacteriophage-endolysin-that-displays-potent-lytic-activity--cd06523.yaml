identifier: CDD:cd06523
label: "PlyB is a bacteriophage endolysin that displays potent lytic activity toward Bacillus anthracis.  PlyB has an N-terminal glycosyl hydrolase family 25 (GH25) catalytic domain and a C-terminal bacterial SH3-like domain, SH3b.  Both domains are required for effective catalytic activity.  Endolysins are produced by bacteriophages at the end of their life cycle and participate in lysing the bacterial cell in order to release the newly formed progeny.  Endolysins (also referred to as endo-N-acetylmuramidases or peptidoglycan hydrolases) degrade bacterial cell walls by catalyzing the hydrolysis of 1,4-beta-linkages between N-acetylmuramic acid and N-acetyl-D-glucosamine residues."
definition: >-
  PlyB is a bacteriophage endolysin that displays potent lytic activity toward Bacillus anthracis. PlyB has an N-terminal glycosyl hydrolase family 25 (GH25) catalytic domain and a C-terminal bacterial SH3-like domain, SH3b. Both domains are required for effective catalytic activity. Endolysins are produced by bacteriophages at the end of their life cycle and participate in lysing the bacterial cell in order to release the newly formed progeny. Endolysins (also referred to as endo-N-acetylmuramidases or peptidoglycan hydrolases) degrade bacterial cell walls by catalyzing the hydrolysis of 1,4-beta-linkages between N-acetylmuramic acid and N-acetyl-D-glucosamine residues. — an NCBI CDD conserved domain (cd06523); members share this curated model.
