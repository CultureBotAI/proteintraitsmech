identifier: CDD:cd17446
label: "Solute carrier family 22 member 6 (also called Organic anion transporter 1) and similar transporters of the Major Facilitator Superfamily. This subfamily includes solute carrier family 22 member 6 (SLC22A6, also called organic anion transporter 1 or OAT1 or para-aminohippurate (PAH) transporter), SLC22A8 (or OAT3), and SLC22A20 (or OAT6). OAT1 and OAT3 are involved in the renal elimination of endogenous and exogenous organic anions (OAs). They function as OA exchangers, coupling the uptake of OAs against an electrochemical gradient with the efflux of intracellular dicarboxylates. SLC22A20 is an OA transporter that mediates the uptake of estrone sulfate. The OAT1-like subfamily belongs to the Solute carrier 22 (SLC22) family of organic cation/anion/zwitterion transporters of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Solute carrier family 22 member 6 (also called Organic anion transporter 1) and similar transporters of the Major Facilitator Superfamily. This subfamily includes solute carrier family 22 member 6 (SLC22A6, also called organic anion transporter 1 or OAT1 or para-aminohippurate (PAH) transporter), SLC22A8 (or OAT3), and SLC22A20 (or OAT6). OAT1 and OAT3 are involved in the renal elimination of endogenous and exogenous organic anions (OAs). They function as OA exchangers, coupling the uptake of OAs against an electrochemical gradient with the efflux of intracellular dicarboxylates. SLC22A20 is an OA transporter that mediates the uptake of estrone sulfate. The OAT1-like subfamily belongs to the Solute carrier 22 (SLC22) family of organic cation/anion/zwitterion transporters of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17446); members share this curated model.
