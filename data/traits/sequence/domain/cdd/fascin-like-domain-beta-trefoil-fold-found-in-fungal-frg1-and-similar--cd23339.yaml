identifier: CDD:cd23339
label: "fascin-like domain, beta-trefoil fold, found in fungal FRG1 and similar proteins. This group includes Schizosaccharomyces pombe protein FRG1 (SpFRG1), which may have a role in the processing of pre-rRNA or in the assembly of rRNA into ribosomal subunits. It is a component of the spliceosome and may be involved in pre-mRNA splicing. SpFRG1 contains a fascin-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  fascin-like domain, beta-trefoil fold, found in fungal FRG1 and similar proteins. This group includes Schizosaccharomyces pombe protein FRG1 (SpFRG1), which may have a role in the processing of pre-rRNA or in the assembly of rRNA into ribosomal subunits. It is a component of the spliceosome and may be involved in pre-mRNA splicing. SpFRG1 contains a fascin-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23339); members share this curated model.
