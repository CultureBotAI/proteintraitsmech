identifier: CDD:cd17249
label: "Type I restriction-modification system specificity (S) subunit Target Recognition Domain-ConseRved domain (TRD-CR), similar to S.EcoR124I TRD2-CR2, S.Eco540I TRD2-CR2, S.Eco540AI TRD2-CR2, and S.Eco540ANI TRD2-CR2. Escherichia coli (R124) S subunit (S.EcoR124I), E. coli ST540 S subunit (S.Eco540I), E. coli ST540A S subunit (S.Eco540AI), and Escherichia coli ST540AN S subunit (S.Eco540ANI) recognize the sequence 5'... GAANNNNNNRTCG ... 3'. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. For example, S.EcoR124I -TRD1 recognizes GAA/TTC, and -TRD2 recognizes CGAY/RTCG. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains both TRD1-CR1 and TRD2-CR2. It may also include TRD-CR-like sequence-recognition domains of various type II restriction enzymes and methyltransferases and type I DNA methyltransferases."
definition: >-
