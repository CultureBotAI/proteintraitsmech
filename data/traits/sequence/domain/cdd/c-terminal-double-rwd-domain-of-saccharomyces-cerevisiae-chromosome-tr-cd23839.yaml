identifier: CDD:cd23839
label: "C-terminal double-RWD domain of Saccharomyces cerevisiae chromosome transmission fidelity 19 (CTF19) and related proteins. CTF19, also called inner kinetochore subunit CTF19, CENP-P homolog, chromosome transmission fidelity protein 19, constitutive centromere-associated network protein CTF19, or minichromosome maintenance protein 18, is a component of the kinetochore, a multiprotein complex that assembles on centromeric DNA and attaches chromosomes to spindle microtubules, mediating chromosome segregation and sister chromatid segregation during meiosis and mitosis. ScCTF19 contains two RWD domains, also known as a double-RWD domain, DRWD, which is involved in interactions with other kinetochore proteins. The model corresponds to the C-terminal double-RWD domain (DRWD-C)."
definition: >-
  C-terminal double-RWD domain of Saccharomyces cerevisiae chromosome transmission fidelity 19 (CTF19) and related proteins. CTF19, also called inner kinetochore subunit CTF19, CENP-P homolog, chromosome transmission fidelity protein 19, constitutive centromere-associated network protein CTF19, or minichromosome maintenance protein 18, is a component of the kinetochore, a multiprotein complex that assembles on centromeric DNA and attaches chromosomes to spindle microtubules, mediating chromosome segregation and sister chromatid segregation during meiosis and mitosis. ScCTF19 contains two RWD domains, also known as a double-RWD domain, DRWD, which is involved in interactions with other kinetochore proteins. The model corresponds to the C-terminal double-RWD domain (DRWD-C). — an NCBI CDD conserved domain (cd23839); members share this curated model.
