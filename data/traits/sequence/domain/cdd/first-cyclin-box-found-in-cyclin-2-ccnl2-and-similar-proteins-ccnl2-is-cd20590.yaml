identifier: CDD:cd20590
label: "first cyclin box found in cyclin-2 (CCNL2) and similar proteins. CCNL2 is a novel RNA polymerase II-associated cyclin that is involved in pre-mRNA splicing. It may induce cell death, possibly by acting on the transcription and RNA processing of apoptosis-related factors. CCNL2 contains two cyclin boxes. This model corresponds to the first one. The cyclin box is a protein binding domain."
definition: >-
  first cyclin box found in cyclin-2 (CCNL2) and similar proteins. CCNL2 is a novel RNA polymerase II-associated cyclin that is involved in pre-mRNA splicing. It may induce cell death, possibly by acting on the transcription and RNA processing of apoptosis-related factors. CCNL2 contains two cyclin boxes. This model corresponds to the first one. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20590); members share this curated model.
