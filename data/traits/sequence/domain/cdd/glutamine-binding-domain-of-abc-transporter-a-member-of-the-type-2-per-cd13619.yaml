identifier: CDD:cd13619
label: "Glutamine-binding domain of ABC transporter, a member of the type 2 periplasmic binding fold protein superfamily. Periplasmic glutamine binding domain GlnP serves as an initial receptor in the ABC transport of glutamine in eubacteria. GlnP belongs to the type 2 periplasmic-binding fold protein (PBP2) superfamily, whose members are involved in chemotaxis and uptake of nutrients and other small molecules from the extracellular space as a primary receptor. PBP2 typically comprises of two globular subdomains connected by a flexible hinge and bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. After binding their specific ligand with high affinity, they can interact with a cognate membrane transport complex comprised of two integral membrane domains and two receptor cytoplasmically-located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis."
