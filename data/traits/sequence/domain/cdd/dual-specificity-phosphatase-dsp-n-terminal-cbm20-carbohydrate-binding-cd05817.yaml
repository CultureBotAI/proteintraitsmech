identifier: CDD:cd05817
label: "Dual-specificity phosphatase (DSP), N-terminal CBM20 (carbohydrate-binding module, family 20) domain. This CBM20 domain is located at the N-terminus of a protein tyrosine phosphatase of unknown function found in slime molds and ciliated protozoans. The CBM20 domain is found in a large number of starch degrading enzymes including alpha-amylase, beta-amylase, glucoamylase, and CGTase (cyclodextrin glucanotransferase). CBM20 is also present in proteins that have a regulatory role in starch metabolism in plants (e.g. alpha-amylase) or glycogen metabolism in mammals (e.g. laforin). CBM20 folds as an antiparallel beta-barrel structure with two starch binding sites. These two sites are thought to differ functionally with site 1 acting as the initial starch recognition site and site 2 involved in the specific recognition of appropriate regions of starch."
definition: >-
  Dual-specificity phosphatase (DSP), N-terminal CBM20 (carbohydrate-binding module, family 20) domain. This CBM20 domain is located at the N-terminus of a protein tyrosine phosphatase of unknown function found in slime molds and ciliated protozoans. The CBM20 domain is found in a large number of starch degrading enzymes including alpha-amylase, beta-amylase, glucoamylase, and CGTase (cyclodextrin glucanotransferase). CBM20 is also present in proteins that have a regulatory role in starch metabolism in plants (e.g. alpha-amylase) or glycogen metabolism in mammals (e.g. laforin). CBM20 folds as an antiparallel beta-barrel structure with two starch binding sites. These two sites are thought to differ functionally with site 1 acting as the initial starch recognition site and site 2 involved in the specific recognition of appropriate regions of starch. — an NCBI CDD conserved domain (cd05817); members share this curated model.
