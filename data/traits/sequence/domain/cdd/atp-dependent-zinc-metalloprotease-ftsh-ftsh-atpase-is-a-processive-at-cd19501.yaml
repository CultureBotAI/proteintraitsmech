identifier: CDD:cd19501
label: "ATP-dependent zinc metalloprotease FtsH. FtsH ATPase is a processive, ATP-dependent zinc metallopeptidase for both cytoplasmic and membrane proteins. It is anchored to the cytoplasmic membrane such that the amino- and carboxy-termini are exposed to the cytoplasm. It presents a membrane-bound hexameric structure that is able to unfold and degrade protein substrates. It is comprised of an N-terminal transmembrane region and the larger C-terminal cytoplasmic region, which consists of an ATPase domain and a protease domain. This RecA-Like FTsH subfamily represents the ATPase domain, and belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
definition: >-
  ATP-dependent zinc metalloprotease FtsH. FtsH ATPase is a processive, ATP-dependent zinc metallopeptidase for both cytoplasmic and membrane proteins. It is anchored to the cytoplasmic membrane such that the amino- and carboxy-termini are exposed to the cytoplasm. It presents a membrane-bound hexameric structure that is able to unfold and degrade protein substrates. It is comprised of an N-terminal transmembrane region and the larger C-terminal cytoplasmic region, which consists of an ATPase domain and a protease domain. This RecA-Like FTsH subfamily represents the ATPase domain, and belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion. — an NCBI CDD conserved domain (cd19501); members share this curated model.
