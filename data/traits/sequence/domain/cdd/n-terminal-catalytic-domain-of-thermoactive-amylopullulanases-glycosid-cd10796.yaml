identifier: CDD:cd10796
label: "N-terminal catalytic domain of thermoactive amylopullulanases; glycoside hydrolase family 57 (GH57). Pullulanases (EC 3.2.1.41) are capable of hydrolyzing the alpha-1,6 glucosidic bonds of pullulan, producing maltotriose.  Amylopullulanases (APU, E.C 3.2.1.1/41) are type II pullulanases which can also degrade both the alpha-1,6 and alpha-1,4 glucosidic bonds of starch, producing oligosaccharides. This subfamily includes GH57 archaeal thermoactive APUs, which show both pullulanolytic and amylolytic activities. They have an acid pH optimum and the presence of Ca2+ might increase their activity, thermostability, and substrate affinity. Besides GH57 thermoactive APUs, all mesophilic and some thermoactive APUs belong to glycoside hydrolase family 13 with catalytic features distinct from GH57. This subfamily also includes many uncharacterized proteins found in bacteria and archaea."
definition: >-
  N-terminal catalytic domain of thermoactive amylopullulanases; glycoside hydrolase family 57 (GH57). Pullulanases (EC 3.2.1.41) are capable of hydrolyzing the alpha-1,6 glucosidic bonds of pullulan, producing maltotriose. Amylopullulanases (APU, E.C 3.2.1.1/41) are type II pullulanases which can also degrade both the alpha-1,6 and alpha-1,4 glucosidic bonds of starch, producing oligosaccharides. This subfamily includes GH57 archaeal thermoactive APUs, which show both pullulanolytic and amylolytic activities. They have an acid pH optimum and the presence of Ca2+ might increase their activity, thermostability, and substrate affinity. Besides GH57 thermoactive APUs, all mesophilic and some thermoactive APUs belong to glycoside hydrolase family 13 with catalytic features distinct from GH57. This subfamily also includes many uncharacterized proteins found in bacteria and archaea. — an NCBI CDD conserved domain (cd10796); members share this curated model.
