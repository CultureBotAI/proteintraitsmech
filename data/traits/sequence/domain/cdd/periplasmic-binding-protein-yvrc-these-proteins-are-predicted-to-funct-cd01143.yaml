identifier: CDD:cd01143
label: "Periplasmic binding protein YvrC.  These proteins are predicted to function as initial receptors in ABC transport of metal ions in eubacteria and archaea.  They belong to the TroA superfamily of periplasmic metal binding proteins that share a distinct fold and ligand binding mechanism. A typical TroA protein is comprised of two globular subdomains connected by a single helix and can bind the metal ion in the cleft between these domains."
definition: >-
  Periplasmic binding protein YvrC. These proteins are predicted to function as initial receptors in ABC transport of metal ions in eubacteria and archaea. They belong to the TroA superfamily of periplasmic metal binding proteins that share a distinct fold and ligand binding mechanism. A typical TroA protein is comprised of two globular subdomains connected by a single helix and can bind the metal ion in the cleft between these domains. — an NCBI CDD conserved domain (cd01143); members share this curated model.
