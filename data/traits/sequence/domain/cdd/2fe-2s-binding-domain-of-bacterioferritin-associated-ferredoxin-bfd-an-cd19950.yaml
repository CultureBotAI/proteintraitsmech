identifier: CDD:cd19950
label: "[2Fe-2S]-binding domain of bacterioferritin-associated ferredoxin (BFD) and related proteins; uncharacterized subgroup. The BFD-like [2Fe-2S]-binding domain comprises a helix-turn-helix fold, and binds an [2Fe-2S] cluster via 4 highly-conserved Cys residues, found in loops between the alpha-helices. The Cys residues are organized in a unique C-X2-C-X31-35-C-X2-9-C-arrangement. [2Fe-2S] clusters are sulfide-linked diiron centers, a primary role for which is electron transport.  BFD-like [2Fe-2S]-binding domains are found in proteins such as bacterioferritin-associated ferredoxin (BFD), the large subunit of NADH-dependent nitrite reductase, Cu+ chaperone CopZ, anaerobic glycerol 3-phosphate dehydrogenase subunit A, hydrogen cyanide synthase subunit B, nitrogen fixation protein NifU, prokaryotic assimilatory nitrate reductase catalytic subunit NasA, and archaeal proline dehydrogenase PDH1."
definition: >-
  [2Fe-2S]-binding domain of bacterioferritin-associated ferredoxin (BFD) and related proteins; uncharacterized subgroup. The BFD-like [2Fe-2S]-binding domain comprises a helix-turn-helix fold, and binds an [2Fe-2S] cluster via 4 highly-conserved Cys residues, found in loops between the alpha-helices. The Cys residues are organized in a unique C-X2-C-X31-35-C-X2-9-C-arrangement. [2Fe-2S] clusters are sulfide-linked diiron centers, a primary role for which is electron transport. BFD-like [2Fe-2S]-binding domains are found in proteins such as bacterioferritin-associated ferredoxin (BFD), the large subunit of NADH-dependent nitrite reductase, Cu+ chaperone CopZ, anaerobic glycerol 3-phosphate dehydrogenase subunit A, hydrogen cyanide synthase subunit B, nitrogen fixation protein NifU, prokaryotic assimilatory nitrate reductase catalytic subunit NasA, and archaeal proline dehydrogenase PDH1. — an NCBI CDD conserved domain (cd19950); members share this curated model.
