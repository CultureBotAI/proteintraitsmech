identifier: CDD:cd22147
label: "F-box domain found in Schizosaccharomyces pombe Skp1-binding protein 1 (SpPof1) and similar proteins. SpPof1, also called F-box/WD repeat-containing protein pof1, probably recognizes and binds to some phosphorylated proteins and promotes their ubiquitination and degradation. It is required for the inactivation of zip1 via ubiquitination. This subfamily also includes Saccharomyces cerevisiae methionine-requiring protein 30 (ScMET30, also called E3 ubiquitin ligase complex SCF(Met30) subunit MET30), Aspergillus niger sulfur controller B (AnSCONB, also called sulfur metabolite repression control protein B) and Neurospora crassa sulfur controller 2 (NcSCON2, also called sulfur metabolite repression control protein 2). ScMET30 acts as a transcriptional inhibitor that negatively regulates the expression of sulfur amino acid biosynthesis genes. It controls cell cycle function (being required for the G1/S transition and M-phase but not the S-phase), sulfur metabolism, and methionine biosynthesis as part of the E3 ubiquitin ligase complex SCF(Met30). AnSCONB and NcSCON2 are components of the SCF (sconB/scon-2) E3 ubiquitin ligase complexes involved in the regulation of sulfur metabolite repression, probably by mediating the inactivation or degradation of the metR transcription factor. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Schizosaccharomyces pombe Skp1-binding protein 1 (SpPof1) and similar proteins. SpPof1, also called F-box/WD repeat-containing protein pof1, probably recognizes and binds to some phosphorylated proteins and promotes their ubiquitination and degradation. It is required for the inactivation of zip1 via ubiquitination. This subfamily also includes Saccharomyces cerevisiae methionine-requiring protein 30 (ScMET30, also called E3 ubiquitin ligase complex SCF(Met30) subunit MET30), Aspergillus niger sulfur controller B (AnSCONB, also called sulfur metabolite repression control protein B) and Neurospora crassa sulfur controller 2 (NcSCON2, also called sulfur metabolite repression control protein 2). ScMET30 acts as a transcriptional inhibitor that negatively regulates the expression of sulfur amino acid biosynthesis genes. It controls cell cycle function (being required for the G1/S transition and M-phase but not the S-phase), sulfur metabolism, and methionine biosynthesis as part of the E3 ubiquitin ligase complex SCF(Met30). AnSCONB and NcSCON2 are components of the SCF (sconB/scon-2) E3 ubiquitin ligase complexes involved in the regulation of sulfur metabolite repression, probably by mediating the inactivation or degradation of the metR transcription factor. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22147); members share this curated model.
