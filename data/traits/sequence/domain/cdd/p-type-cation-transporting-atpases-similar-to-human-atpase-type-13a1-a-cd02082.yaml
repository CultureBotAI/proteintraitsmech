identifier: CDD:cd02082
label: "P-type cation-transporting ATPases, similar to human ATPase type 13A1-A4 (ATP13A1-A4) proteins and Saccharomyces cerevisiae Ypk9p and Spf1p. Saccharomyces cerevisiae Yph9p localizes to the yeast vacuole and may play a role in sequestering heavy metal ions, its deletion confers sensitivity for growth for cadmium, manganese, nickel or selenium. Saccharomyces 1 Spf1p may mediate manganese transport into the endoplasmic reticulum. Human ATP13A2 (PARK9/CLN12) is a lysosomal transporter with zinc as the possible substrate. Mutation in the ATP13A2 gene has been linked to Parkinson's disease and Kufor-Rakeb syndrome, and to neuronal ceroid lipofuscinoses. ATP13A3/AFURS1 is a candidate gene for oculo auriculo vertebral spectrum (OAVS), being one of nine genes included in a 3q29 microduplication in a patient with OAVS. Mutation in the human ATP13A4 may be involved in a speech-language disorder. The expression of ATP13A1 has been followed during mouse development, ATP13A1 transcript expression showed an increase as development progressed, with the highest expression at the peak of neurogenesis. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle."
definition: >-
  P-type cation-transporting ATPases, similar to human ATPase type 13A1-A4 (ATP13A1-A4) proteins and Saccharomyces cerevisiae Ypk9p and Spf1p. Saccharomyces cerevisiae Yph9p localizes to the yeast vacuole and may play a role in sequestering heavy metal ions, its deletion confers sensitivity for growth for cadmium, manganese, nickel or selenium. Saccharomyces 1 Spf1p may mediate manganese transport into the endoplasmic reticulum. Human ATP13A2 (PARK9/CLN12) is a lysosomal transporter with zinc as the possible substrate. Mutation in the ATP13A2 gene has been linked to Parkinson's disease and Kufor-Rakeb syndrome, and to neuronal ceroid lipofuscinoses. ATP13A3/AFURS1 is a candidate gene for oculo auriculo vertebral spectrum (OAVS), being one of nine genes included in a 3q29 microduplication in a patient with OAVS. Mutation in the human ATP13A4 may be involved in a speech-language disorder. The expression of ATP13A1 has been followed during mouse development, ATP13A1 transcript expression showed an increase as development progressed, with the highest expression at the peak of neurogenesis. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle. — an NCBI CDD conserved domain (cd02082); members share this curated model.
