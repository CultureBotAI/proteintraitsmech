label: TFP_LU_ECD_LYPD3_rpt1
definition: >-
  first extracellular domain (ECD) found in Ly6/PLAUR domain-containing protein 3 (LYPD3) and similar proteins. LYPD3 (also called GPI-anchored metastasis-associated protein C4.4A homolog, or matrigel-induced gene C4 protein (MIG-C4)) supports cell migration. It may be involved in urothelial cell-matrix interactions as well as in tumor progression. LYPD3 contains two extracellular domains (ECDs) that belong to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). This model corresponds to the first ECD
