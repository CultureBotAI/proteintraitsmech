identifier: CDD:cd16710
label: "RING finger, HC subclass, found in E3 ubiquitin-protein ligase Cbl-c and similar proteins. Cbl-c, also known as RING finger protein 57 (RNF57), SH3-binding protein Cbl-3, SH3-binding protein Cbl-c, or signal transduction protein Cbl-c, is an E3 ubiquitin-protein ligase expressed exclusively in epithelial cells. It contains a tyrosine-kinase-binding domain (TKB, also known as the phosphotyrosine binding PTB domain, composed of a four helix-bundle, a Ca2+ binding EF-hand and a highly variant SH2 domain), a C3HC4-type RING-HC finger, and a short proline-rich region, but lacks the ubiquitin-associated (UBA) leucine zipper motif that are present in Cbl and Cbl-b. Cbl-c acts as a regulator of epidermal growth factor receptor (EGFR)-mediated signal transduction. It also suppresses v-Src-induced transformation through ubiquitin-dependent protein degradation. Moreover, Cbl-c ubiquitinates and downregulates RETMEN2A and implicates Enigma (PDLIM7) as a positive regulator of RETMEN2A by blocking Cbl-mediated ubiquitination and degradation. The ubiquitin ligase activity of Cbl-c is increased via the interaction of its RING-HC finger domain with a LIM domain of the paxillin homolog, hydrogen peroxide induced construct 5 (Hic-5)."
definition: >-
  RING finger, HC subclass, found in E3 ubiquitin-protein ligase Cbl-c and similar proteins. Cbl-c, also known as RING finger protein 57 (RNF57), SH3-binding protein Cbl-3, SH3-binding protein Cbl-c, or signal transduction protein Cbl-c, is an E3 ubiquitin-protein ligase expressed exclusively in epithelial cells. It contains a tyrosine-kinase-binding domain (TKB, also known as the phosphotyrosine binding PTB domain, composed of a four helix-bundle, a Ca2+ binding EF-hand and a highly variant SH2 domain), a C3HC4-type RING-HC finger, and a short proline-rich region, but lacks the ubiquitin-associated (UBA) leucine zipper motif that are present in Cbl and Cbl-b. Cbl-c acts as a regulator of epidermal growth factor receptor (EGFR)-mediated signal transduction. It also suppresses v-Src-induced transformation through ubiquitin-dependent protein degradation. Moreover, Cbl-c ubiquitinates and downregulates RETMEN2A and implicates Enigma (PDLIM7) as a positive regulator of RETMEN2A by blocking Cbl-mediated ubiquitination and degradation. The ubiquitin ligase activity of Cbl-c is increased via the interaction of its RING-HC finger domain with a LIM domain of the paxillin homolog, hydrogen peroxide induced construct 5 (Hic-5). — an NCBI CDD conserved domain (cd16710); members share this curated model.
