identifier: CDD:cd21919
label: GBD_RalBP1
definition: >-
  Ral binding domain (GBD) of RalA-binding protein 1 (RalBP1) and similar proteins. RalBP1, also called 76 kDa Ral-interacting protein (RLIP76), or dinitrophenyl S-glutathione ATPase, or DNP-SG ATPase, or Ral-interacting protein 1, is a Ral effector with CDC42/Rac GTPase-activating protein activity. It can activate specifically hydrolysis of GTP bound to RAC1 and CDC42, but not RALA. It mediates ATP-dependent transport of S-(2,4-dinitrophenyl)-glutathione (DNP-SG) and doxorubicin (DOX) and is the major ATP-dependent transporter of glutathione conjugates of electrophiles (GS-E) and DOX in erythrocytes. It can catalyze transport of glutathione conjugates and xenobiotics, and may contribute to the multidrug resistance phenomenon. RalBP1 also serves as a scaffold protein that brings together proteins forming an endocytotic complex during interphase and with CDK1 to switch off endocytosis. One of its substrates would be EPN1/Epsin. The model corresponds to the Ral binding domain (GBD) of RalBP1, which comprises a coiled-coil motif
