identifier: CDD:cd22013
label: "high mobility group (HMG)-box found in Arabidopsis thaliana FACT complex subunit SSRP1 and similar proteins. SSRP1, also called facilitates chromatin transcription complex subunit SSRP1, high mobility group B protein 8, nucleosome/chromatin assembly factor group D 08 (or D 8), protein NUCLEAR FUSION DEFECTIVE 8, or recombination signal sequence recognition protein 1, is a component of the FACT complex, a general chromatin factor that acts to reorganize nucleosomes. The FACT complex is involved in multiple processes that require DNA as a template such as mRNA elongation, DNA replication, and DNA repair. SSRP1 may bind specifically to double-stranded DNA. It is required for karyogamy during female gametophyte development, when the two polar nuclei fuse to form the diploid central cell nucleus. SSRP1 contains only one HMG-box domain."
definition: >-
  high mobility group (HMG)-box found in Arabidopsis thaliana FACT complex subunit SSRP1 and similar proteins. SSRP1, also called facilitates chromatin transcription complex subunit SSRP1, high mobility group B protein 8, nucleosome/chromatin assembly factor group D 08 (or D 8), protein NUCLEAR FUSION DEFECTIVE 8, or recombination signal sequence recognition protein 1, is a component of the FACT complex, a general chromatin factor that acts to reorganize nucleosomes. The FACT complex is involved in multiple processes that require DNA as a template such as mRNA elongation, DNA replication, and DNA repair. SSRP1 may bind specifically to double-stranded DNA. It is required for karyogamy during female gametophyte development, when the two polar nuclei fuse to form the diploid central cell nucleus. SSRP1 contains only one HMG-box domain. — an NCBI CDD conserved domain (cd22013); members share this curated model.
