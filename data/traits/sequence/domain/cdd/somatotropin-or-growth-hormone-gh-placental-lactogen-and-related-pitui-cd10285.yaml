identifier: CDD:cd10285
label: "Somatotropin or growth hormone (GH), placental lactogen, and related pituitary gland hormones. Growth hormone (GH) or somatotropin is a peptide hormone synthesized by the pituitary gland, which mediates anabolic effects in development. GH is known to activate, via binding to specific cellular receptors, the MAPK/ERK and JAK-STAT signaling pathways. Via the latter, it triggers the secretion of insulin-like growth factor 1 (mostly in the liver). Besides increasing body height, GH has been shown to have a host of other effects."
definition: >-
  Somatotropin or growth hormone (GH), placental lactogen, and related pituitary gland hormones. Growth hormone (GH) or somatotropin is a peptide hormone synthesized by the pituitary gland, which mediates anabolic effects in development. GH is known to activate, via binding to specific cellular receptors, the MAPK/ERK and JAK-STAT signaling pathways. Via the latter, it triggers the secretion of insulin-like growth factor 1 (mostly in the liver). Besides increasing body height, GH has been shown to have a host of other effects. — an NCBI CDD conserved domain (cd10285); members share this curated model.
