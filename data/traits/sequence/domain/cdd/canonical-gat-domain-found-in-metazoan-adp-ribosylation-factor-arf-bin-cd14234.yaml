identifier: CDD:cd14234
label: "canonical GAT domain found in metazoan ADP-ribosylation factor (Arf)-binding proteins (GGAs). GGAs, also called Golgi-localized gamma-ear-containing Arf-binding proteins, belong to a family of ubiquitously expressed, monomeric, motif-binding cargo/clathrin adaptor proteins that regulate clathrin-mediated trafficking of cargo proteins from the trans-Golgi network (TGN) to endosomes. Moreover, GGAs play important roles in ubiquitin-dependent sorting of cargo proteins both in biosynthetic and endocytic pathways. Three GGAs (GGA1, GGA2, and GGA3) have been identified in mammals. They may appear to behave similarly, since all of them have a multidomain structure consisting of: an N-terminal VHS (Vps27/Hrs/Stam) domain that binds the acidic-cluster dileucine (DxxLL)-type sorting signals (where x is any amino acid) found in the cytoplasmic tail of TGN sorting receptors; a GAT (GGA and TOM) domain that interacts with class I GTP-bound form of Arf proteins, Rabaptin-5, ubiquitin, and the tumor susceptibility gene 101 product (TSG101); a largely unstructured hinge region that contains clathrin-binding motifs; and a C-terminal GAE (gamma-adaptin ear homology) domain that binds accessory proteins. However, the three GGAs have some differences, which suggest they may possess their own distinct roles. For instance, both GGA1 and GGA3, but not GGA2, contains an internal DxxLL motif that binds to it own VHS domain. Only a portion of the VHS domain of GGA2 possesses distant structural homology to that of GGA1 or GGA3. Moreover, the binding affinity of GGA2 to ubiquitin is quite lower than that of GGA1 or GGA3. In addition, GGA3 has a short splicing variant that is predominantly expressed in human cell lines and tissues except the brain. It does have a VHS domain, but it is unable to bind to the DxxLL motif. GGA2 and GGA3 undergo epidermal growth factor (EGF)-induced phosphorylation."
definition: >-
  canonical GAT domain found in metazoan ADP-ribosylation factor (Arf)-binding proteins (GGAs). GGAs, also called Golgi-localized gamma-ear-containing Arf-binding proteins, belong to a family of ubiquitously expressed, monomeric, motif-binding cargo/clathrin adaptor proteins that regulate clathrin-mediated trafficking of cargo proteins from the trans-Golgi network (TGN) to endosomes. Moreover, GGAs play important roles in ubiquitin-dependent sorting of cargo proteins both in biosynthetic and endocytic pathways. Three GGAs (GGA1, GGA2, and GGA3) have been identified in mammals. They may appear to behave similarly, since all of them have a multidomain structure consisting of: an N-terminal VHS (Vps27/Hrs/Stam) domain that binds the acidic-cluster dileucine (DxxLL)-type sorting signals (where x is any amino acid) found in the cytoplasmic tail of TGN sorting receptors; a GAT (GGA and TOM) domain that interacts with class I GTP-bound form of Arf proteins, Rabaptin-5, ubiquitin, and the tumor susceptibility gene 101 product (TSG101); a largely unstructured hinge region that contains clathrin-binding motifs; and a C-terminal GAE (gamma-adaptin ear homology) domain that binds accessory proteins. However, the three GGAs have some differences, which suggest they may possess their own distinct roles. For instance, both GGA1 and GGA3, but not GGA2, contains an internal DxxLL motif that binds to it own VHS domain. Only a portion of the VHS domain of GGA2 possesses distant structural homology to that of GGA1 or GGA3. Moreover, the binding affinity of GGA2 to ubiquitin is quite lower than that of GGA1 or GGA3. In addition, GGA3 has a short splicing variant that is predominantly expressed in human cell lines and tissues except the brain. It does have a VHS domain, but it is unable to bind to the DxxLL motif. GGA2 and GGA3 undergo epidermal growth factor (EGF)-induced phosphorylation. — an NCBI CDD conserved domain (cd14234); members share this curated model.
