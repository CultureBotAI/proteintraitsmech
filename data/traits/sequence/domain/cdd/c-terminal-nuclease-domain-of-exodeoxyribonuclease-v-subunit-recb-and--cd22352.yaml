identifier: CDD:cd22352
label: "C-terminal nuclease domain of exodeoxyribonuclease V subunit RecB and similar proteins. Exodeoxyribonuclease V subunit beta (RecB) is a helicase/nuclease that prepares dsDNA breaks (DSB) for recombinational DNA repair; it binds to DSBs and unwinds DNA via a rapid and highly processive ATP-dependent bidirectional helicase. The C-terminal PDDEXK nuclease domain belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  C-terminal nuclease domain of exodeoxyribonuclease V subunit RecB and similar proteins. Exodeoxyribonuclease V subunit beta (RecB) is a helicase/nuclease that prepares dsDNA breaks (DSB) for recombinational DNA repair; it binds to DSBs and unwinds DNA via a rapid and highly processive ATP-dependent bidirectional helicase. The C-terminal PDDEXK nuclease domain belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22352); members share this curated model.
