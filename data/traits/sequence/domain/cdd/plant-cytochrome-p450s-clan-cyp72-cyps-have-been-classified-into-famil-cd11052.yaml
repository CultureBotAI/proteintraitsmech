identifier: CDD:cd11052
label: "Plant cytochrome P450s, clan CYP72. CYPs have been classified into families and subfamilies based on homology and phylogenetic criteria; family membership is defined as 40% amino acid sequence identity or higher. The plant CYPs have also been classified according to clans; land plants have 11 clans that form two groups: single-family clans (CYP51, CYP74, CYP97, CYP710, CYP711, CYP727, CYP746) and multi-family clans (CYP71, CYP72, CYP85, CYP86). The CYP72 clan is associated with the metabolism of a diversity of fairly hydrophobic compounds including fatty acids and isoprenoids, with the catabolism of hormones (brassinosteroids and gibberellin, GA) and with the biosynthesis of cytokinins. This clan includes: CYP734 enzymes that are involved in brassinosteroid (BRs) catabolism and regulation of BRs homeostasis; CYP714 enzymes that are involved in the biosynthesis of gibberellins (GAs) and the mechanism to control their bioactive endogenous levels; and CYP72 family enzymes, among others. The CYP72 clan belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  Plant cytochrome P450s, clan CYP72. CYPs have been classified into families and subfamilies based on homology and phylogenetic criteria; family membership is defined as 40% amino acid sequence identity or higher. The plant CYPs have also been classified according to clans; land plants have 11 clans that form two groups: single-family clans (CYP51, CYP74, CYP97, CYP710, CYP711, CYP727, CYP746) and multi-family clans (CYP71, CYP72, CYP85, CYP86). The CYP72 clan is associated with the metabolism of a diversity of fairly hydrophobic compounds including fatty acids and isoprenoids, with the catabolism of hormones (brassinosteroids and gibberellin, GA) and with the biosynthesis of cytokinins. This clan includes: CYP734 enzymes that are involved in brassinosteroid (BRs) catabolism and regulation of BRs homeostasis; CYP714 enzymes that are involved in the biosynthesis of gibberellins (GAs) and the mechanism to control their bioactive endogenous levels; and CYP72 family enzymes, among others. The CYP72 clan belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd11052); members share this curated model.
