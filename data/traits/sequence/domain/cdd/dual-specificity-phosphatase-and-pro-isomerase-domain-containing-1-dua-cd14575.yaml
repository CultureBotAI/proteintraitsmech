identifier: CDD:cd14575
label: "dual specificity phosphatase and pro isomerase domain containing 1. Dual specificity phosphatase and pro isomerase domain containing 1 (DUPD1) was initially named as such because computational prediction appeared to encode a protein of 446 amino acids in length that included two catalytic domains: a proline isomerase and a dual specificity phosphatase (DUSP). However, it was subsequently shown that the true open reading frame only encompassed the DUSP domain and the gene product was therefore renamed DUSP27. This is distinct from inactive DUSP27. DUSPs function as protein-serine/threonine phosphatases (EC 3.1.3.16) and protein-tyrosine-phosphatases (EC 3.1.3.48). DUPD1/DUSP27 has been shown to have catalytic activity with preference for phosphotyrosine over phosphothreonine and phosphoserine residues. It associates with the short form of the prolactin (PRL) receptor and plays a role in PRL-mediated MAPK inhibition in ovarian cells."
definition: >-
  dual specificity phosphatase and pro isomerase domain containing 1. Dual specificity phosphatase and pro isomerase domain containing 1 (DUPD1) was initially named as such because computational prediction appeared to encode a protein of 446 amino acids in length that included two catalytic domains: a proline isomerase and a dual specificity phosphatase (DUSP). However, it was subsequently shown that the true open reading frame only encompassed the DUSP domain and the gene product was therefore renamed DUSP27. This is distinct from inactive DUSP27. DUSPs function as protein-serine/threonine phosphatases (EC 3.1.3.16) and protein-tyrosine-phosphatases (EC 3.1.3.48). DUPD1/DUSP27 has been shown to have catalytic activity with preference for phosphotyrosine over phosphothreonine and phosphoserine residues. It associates with the short form of the prolactin (PRL) receptor and plays a role in PRL-mediated MAPK inhibition in ovarian cells. — an NCBI CDD conserved domain (cd14575); members share this curated model.
