identifier: CDD:cd10788
label: YdjC_like
definition: >-
  YdjC-family proteins. YdjC-family proteins are widely distributed, from human to bacteria. It is represented by an uncharacterised protein YdjC (also known as ChbG), encoded by the chb (N,N'-diacetylchitobiose, also called [GlcNAc]2) or cel operon in Escherichia coli, which encodes enzymes involved in growth on an N,N'-diacetylchitobiose carbon source. This subfamily also includes hopanoid biosynthesis associated proteins HpnK and many uncharacterized YdjC homologs. Although the exact molecular function of the YdjC-family proteins remains unclear, it has been suggested that they play a role in the cleavage of cellobiosephosphate
