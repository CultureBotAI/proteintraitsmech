label: CYCLIN_AtCycU-like
definition: >-
  cyclin box found in Arabidopsis thaliana U-type cyclins (CycUs) and similar proteins. CycUs interact with cyclin-dependent kinase A-1 (CDKA-1) to trigger its kinase activity. CycUs contain one cyclin box. The cyclin box is a protein binding domain
