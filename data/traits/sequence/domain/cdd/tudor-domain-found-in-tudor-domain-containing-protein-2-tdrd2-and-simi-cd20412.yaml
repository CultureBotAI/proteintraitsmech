identifier: CDD:cd20412
label: "Tudor domain found in Tudor domain-containing protein 2 (TDRD2) and similar proteins. TDRD2, also called Tudor and KH domain-containing protein (TDRKH), participates in the primary piwi-interacting RNA (piRNA) biogenesis pathway and is required during spermatogenesis to repress transposable elements and prevent their mobilization, which is essential for germline integrity. The family also includes the TDRD2 homolog found in Drosophila melanogaster (dTDRKH), which is also called partner of PIWIs protein, or PAPI, and is involved in Zucchini-mediated piRNA 3'-end maturation. TDRD2 contains two KH domains and one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor domain found in Tudor domain-containing protein 2 (TDRD2) and similar proteins. TDRD2, also called Tudor and KH domain-containing protein (TDRKH), participates in the primary piwi-interacting RNA (piRNA) biogenesis pathway and is required during spermatogenesis to repress transposable elements and prevent their mobilization, which is essential for germline integrity. The family also includes the TDRD2 homolog found in Drosophila melanogaster (dTDRKH), which is also called partner of PIWIs protein, or PAPI, and is involved in Zucchini-mediated piRNA 3'-end maturation. TDRD2 contains two KH domains and one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20412); members share this curated model.
