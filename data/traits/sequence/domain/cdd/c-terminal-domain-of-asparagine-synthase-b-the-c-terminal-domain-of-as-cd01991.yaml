identifier: CDD:cd01991
label: "C-terminal domain of asparagine synthase B. The C-terminal domain of asparagine synthase (or synthetase) B is always associated with an N-terminal amidotransferase domain. Family members that contain this domain catalyze the conversion of aspartate to asparagine. Asparagine synthase B catalyzes the synthesis of asparagine from aspartate, Mg(2+)ATP, and glutamine. The three-dimensional architecture of the N-terminal domain of asparagine synthetase B is similar to that observed for glutamine phosphoribosylpyrophosphate amidotransferase while the molecular motif of the C-domain is reminiscent to that observed for GMP synthetase."
definition: >-
  C-terminal domain of asparagine synthase B. The C-terminal domain of asparagine synthase (or synthetase) B is always associated with an N-terminal amidotransferase domain. Family members that contain this domain catalyze the conversion of aspartate to asparagine. Asparagine synthase B catalyzes the synthesis of asparagine from aspartate, Mg(2+)ATP, and glutamine. The three-dimensional architecture of the N-terminal domain of asparagine synthetase B is similar to that observed for glutamine phosphoribosylpyrophosphate amidotransferase while the molecular motif of the C-domain is reminiscent to that observed for GMP synthetase. — an NCBI CDD conserved domain (cd01991); members share this curated model.
