identifier: CDD:cd15542
label: "PHD finger found in putative E3 ubiquitin-protein ligase UBR7. UBR7, also termed N-recognin-7, is a UBR box-containing protein that belongs to the E3 ubiquitin ligase family that recognizes N-degrons or structurally related molecules for ubiquitin-dependent proteolysis or related processes through the UBR box motif. In addition to the UBR box, UBR7 also harbors a plant homeodomain (PHD) finger. The biochemical properties of UBR7 remain unclear."
definition: >-
