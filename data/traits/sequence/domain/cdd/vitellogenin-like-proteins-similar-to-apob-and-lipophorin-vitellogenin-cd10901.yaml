identifier: CDD:cd10901
label: "Vitellogenin-like proteins similar to ApoB and Lipophorin. Vitellogenin_ApoB_Lipophorin; This family contains sequences from diverse taxa. Vitellogenin, Microsomal triglyceride transfer protein and apolipoprotein B-100. These proteins are all involved in lipid transport. This family contains the LV1n chain from lipovitellin, that contains two structural domains."
