identifier: CDD:cd23792
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin conjugating enzyme E2 D1-D3 and related proteins. The E2D family includes mammalian ubiquitin-conjugating enzyme E2 D1-4 (UBE2D1/SFT/UBC5A/UBCH5/UBCH5A, UBE2D2/PUBC1/UBC4/UBC5B/UBCH4/UBCH5B, UBE2D3/UBC5C/UBCH5C, UBE2D4/HBUCE1/UBCH5D), yeast E2 ubiquitin-conjugating enzyme 4 (UBC4) and 5 (UBC5), as well as plant counterpart ubiquitin-conjugating enzyme E2 8-12 (UBC8/UBCAT4A,  UBC9/UBCAT4B, UBC10-12) and 28-30 (UBC28-30). They are ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. In vitro, UBE2D1-3 (EC 2.3.2.23 and EC 2.3.2.24) catalyze 'Lys-48'-linked polyubiquitination. UBE2D3 also catalyzes 'Lys-11'-linked polyubiquitination. In vitro, UBE2D4 can promote polyubiquitination using all 7 ubiquitin Lys residues but may prefer 'Lys-11' and 'Lys-48'-linked polyubiquitination. Saccharomyces cerevisiae UBC4-5 and Arabidopsis thaliana UBC8-11 mediates the selective degradation of short-lived and abnormal proteins."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin conjugating enzyme E2 D1-D3 and related proteins. The E2D family includes mammalian ubiquitin-conjugating enzyme E2 D1-4 (UBE2D1/SFT/UBC5A/UBCH5/UBCH5A, UBE2D2/PUBC1/UBC4/UBC5B/UBCH4/UBCH5B, UBE2D3/UBC5C/UBCH5C, UBE2D4/HBUCE1/UBCH5D), yeast E2 ubiquitin-conjugating enzyme 4 (UBC4) and 5 (UBC5), as well as plant counterpart ubiquitin-conjugating enzyme E2 8-12 (UBC8/UBCAT4A, UBC9/UBCAT4B, UBC10-12) and 28-30 (UBC28-30). They are ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. In vitro, UBE2D1-3 (EC 2.3.2.23 and EC 2.3.2.24) catalyze 'Lys-48'-linked polyubiquitination. UBE2D3 also catalyzes 'Lys-11'-linked polyubiquitination. In vitro, UBE2D4 can promote polyubiquitination using all 7 ubiquitin Lys residues but may prefer 'Lys-11' and 'Lys-48'-linked polyubiquitination. Saccharomyces cerevisiae UBC4-5 and Arabidopsis thaliana UBC8-11 mediates the selective degradation of short-lived and abnormal proteins. — an NCBI CDD conserved domain (cd23792); members share this curated model.
