identifier: CDD:cd15360
label: "follicle-stimulating hormone receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. The glycoprotein hormone receptors are seven transmembrane domain receptors with a very large extracellular N-terminal domain containing many leucine-rich repeats responsible for hormone recognition and binding. The glycoprotein hormone family includes the three gonadotropins: luteinizing hormone (LH), follicle-stimulating hormone (FSH), chorionic gonadotropin (CG), and a pituitary thyroid-stimulating hormone (TSH). The glycoprotein hormones exert their biological functions by interacting with their cognate GPCRs. Both LH and CG bind to the same receptor, the luteinizing hormone-choriogonadotropin receptor (LHCGR); FSH binds to FSH-R and TSH to TSH-R. FSH-R functions in gonad development and is found in the ovary, testis, and uterus. Defects in this receptor cause ovarian dysgenesis type 1, and also ovarian hyperstimulation syndrome. The FSH-R activation couples to the G(s)-protein and stimulates adenylate cyclase, thereby promoting cAMP production."
definition: >-
  follicle-stimulating hormone receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. The glycoprotein hormone receptors are seven transmembrane domain receptors with a very large extracellular N-terminal domain containing many leucine-rich repeats responsible for hormone recognition and binding. The glycoprotein hormone family includes the three gonadotropins: luteinizing hormone (LH), follicle-stimulating hormone (FSH), chorionic gonadotropin (CG), and a pituitary thyroid-stimulating hormone (TSH). The glycoprotein hormones exert their biological functions by interacting with their cognate GPCRs. Both LH and CG bind to the same receptor, the luteinizing hormone-choriogonadotropin receptor (LHCGR); FSH binds to FSH-R and TSH to TSH-R. FSH-R functions in gonad development and is found in the ovary, testis, and uterus. Defects in this receptor cause ovarian dysgenesis type 1, and also ovarian hyperstimulation syndrome. The FSH-R activation couples to the G(s)-protein and stimulates adenylate cyclase, thereby promoting cAMP production. — an NCBI CDD conserved domain (cd15360); members share this curated model.
