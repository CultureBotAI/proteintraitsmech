identifier: CDD:cd13264
label: "Intersectin Pleckstrin homology (PH) domain. ITSNs, an adaptor protein family, play a role in endo- and exocytosis, actin cytoskeleton rearrangement and signal transduction. There are two human ITSN genes: ITSN1 and ITSN2. They share significant sequence identity and a similar domain structure having both short and long isoforms produced by alternative splicing. The short isoform (ITSN-S) consists of two Eps15 homology domains (EH1 and EH2), a coiled-coil region (CCR) and five Src homology 3 domains (SH3A-E). The EH domains bind to Asn-Pro-Phe motifs and are implicated in endocytosis and vesicle transport. The SH3 domains bind to proline-rich sequences and are commonly found in proteins implicated in cell signalling pathways, cytoskeletal organization and membrane traffic. The long isoform (ITSN-L) contains three additional C-terminal domains, a Dbl homology domain (DH), a Pleckstrin homology domain (PH) and a C2 domain. The tandem DH-PH domains are present in all Dbl family of GEFs. ITSN acts specifically on Cdc42 through its DH domain with no portion of the PH domain making contact with Cdc42. This is in contrast to Dbs which requires the PH domain for full catalytic activity. The ITSN PH domain binds phosphoinositides. C2 domains are usually involved in Ca2+-dependent and Ca2+-independent phospholipid binding. There are more than 30 proteins that interact with ITSNs. ITSN-S is present in mammals, frogs, flies and nematodes, while ITSN-L is present only in vertebrates. PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. They share little sequence conservation, but all have a common fold, which is electrostatically polarized. Less than 10% of PH domains bind phosphoinositide phosphates (PIPs) with high affinity and specificity. PH domains are distinguished from other PIP-binding domains by their specific high-affinity binding to PIPs with two vicinal phosphate groups: PtdIns(3,4)P2, PtdIns(4,5)P2 or PtdIns(3,4,5)P3 which results in targeting some PH domain proteins to the plasma membrane. A few display strong specificity in lipid binding. Any specificity is usually determined by loop regions or insertions in the N-terminus of the domain, which are not conserved across all PH domains. PH domains are found in cellular signaling proteins such as serine/threonine kinase, tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, as well as cytoskeletal associated molecules and in lipid associated enzymes."
definition: >-
  Intersectin Pleckstrin homology (PH) domain. ITSNs, an adaptor protein family, play a role in endo- and exocytosis, actin cytoskeleton rearrangement and signal transduction. There are two human ITSN genes: ITSN1 and ITSN2. They share significant sequence identity and a similar domain structure having both short and long isoforms produced by alternative splicing. The short isoform (ITSN-S) consists of two Eps15 homology domains (EH1 and EH2), a coiled-coil region (CCR) and five Src homology 3 domains (SH3A-E). The EH domains bind to Asn-Pro-Phe motifs and are implicated in endocytosis and vesicle transport. The SH3 domains bind to proline-rich sequences and are commonly found in proteins implicated in cell signalling pathways, cytoskeletal organization and membrane traffic. The long isoform (ITSN-L) contains three additional C-terminal domains, a Dbl homology domain (DH), a Pleckstrin homology domain (PH) and a C2 domain. The tandem DH-PH domains are present in all Dbl family of GEFs. ITSN acts specifically on Cdc42 through its DH domain with no portion of the PH domain making contact with Cdc42. This is in contrast to Dbs which requires the PH domain for full catalytic activity. The ITSN PH domain binds phosphoinositides. C2 domains are usually involved in Ca2+-dependent and Ca2+-independent phospholipid binding. There are more than 30 proteins that interact with ITSNs. ITSN-S is present in mammals, frogs, flies and nematodes, while ITSN-L is present only in vertebrates. PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. They share little sequence conservation, but all have a common fold, which is electrostatically polarized. Less than 10% of PH domains bind phosphoinositide phosphates (PIPs) with high affinity and specificity. PH domains are distinguished from other PIP-binding domains by their specific high-affinity binding to PIPs with two vicinal phosphate groups: PtdIns(3,4)P2, PtdIns(4,5)P2 or PtdIns(3,4,5)P3 which results in targeting some PH domain proteins to the plasma membrane. A few display strong specificity in lipid binding. Any specificity is usually determined by loop regions or insertions in the N-terminus of the domain, which are not conserved across all PH domains. PH domains are found in cellular signaling proteins such as serine/threonine kinase, tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, as well as cytoskeletal associated molecules and in lipid associated enzymes. — an NCBI CDD conserved domain (cd13264); members share this curated model.
