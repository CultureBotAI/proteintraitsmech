identifier: CDD:cd14689
label: "Basic leucine zipper (bZIP) domain of Cyclic AMP-responsive element-binding protein 3 (CREB3) and similar proteins: a DNA-binding and dimerization domain. This subfamily is composed of CREB3 (also called LZIP or Luman), and the CREB3-like proteins CREB3L1 (or OASIS), CREB3L2, CREB3L3 (or CREBH), and CREB3L4 (or AIbZIP). They are type II membrane-associated members of the Basic leucine zipper (bZIP) family of transcription factors, with their N-termini facing the cytoplasm and their C-termini penetrating through the ER membrane. They contain an N-terminal transcriptional activation domain followed bZIP and transmembrane domains, and a C-terminal tail. They play important roles in ER stress and the unfolded protein response (UPR), as well as in many other biological processes such as cell secretion, bone and cartilage formation, and carcinogenesis. bZIP factors act in networks of homo and heterodimers in the regulation of a diverse set of cellular processes. The bZIP structural motif contains a basic region and a leucine zipper, composed of alpha helices with leucine residues 7 amino acids apart, which stabilize dimerization with a parallel leucine zipper domain. Dimerization of leucine zippers creates a pair of the adjacent basic regions that bind DNA and undergo conformational change. Dimerization occurs in a specific and predictable manner resulting in hundreds of dimers having unique effects on transcription."
definition: >-
  Basic leucine zipper (bZIP) domain of Cyclic AMP-responsive element-binding protein 3 (CREB3) and similar proteins: a DNA-binding and dimerization domain. This subfamily is composed of CREB3 (also called LZIP or Luman), and the CREB3-like proteins CREB3L1 (or OASIS), CREB3L2, CREB3L3 (or CREBH), and CREB3L4 (or AIbZIP). They are type II membrane-associated members of the Basic leucine zipper (bZIP) family of transcription factors, with their N-termini facing the cytoplasm and their C-termini penetrating through the ER membrane. They contain an N-terminal transcriptional activation domain followed bZIP and transmembrane domains, and a C-terminal tail. They play important roles in ER stress and the unfolded protein response (UPR), as well as in many other biological processes such as cell secretion, bone and cartilage formation, and carcinogenesis. bZIP factors act in networks of homo and heterodimers in the regulation of a diverse set of cellular processes. The bZIP structural motif contains a basic region and a leucine zipper, composed of alpha helices with leucine residues 7 amino acids apart, which stabilize dimerization with a parallel leucine zipper domain. Dimerization of leucine zippers creates a pair of the adjacent basic regions that bind DNA and undergo conformational change. Dimerization occurs in a specific and predictable manner resulting in hundreds of dimers having unique effects on transcription. — an NCBI CDD conserved domain (cd14689); members share this curated model.
