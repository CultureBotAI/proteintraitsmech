identifier: CDD:cd10512
label: "GH8_endoglucanse_Y. Glycosyl hydrolases family 8. The members are endo-1,4-beta-glucanases (cellulases). Family 8 glycosidases hydrolyze the glycosidic bond via a single displacement mechanism with inversion of the anomeric configuration. They cleave only saccharides with a degree of polymerization of at least 5 glucosyl residues."
definition: >-
