identifier: CDD:cd14408
label: "UBA domain found in salt-inducible kinase 1 (SIK1). SIK1, also called serine/threonine-protein kinase SNF1-like kinase 1 (SNF1LK), is a serine/threonine kinase abundant in adrenal glands. It belongs to the AMP-activated protein kinases (AMPK) family involved in the regulation of metabolism during energy stress. SIK1 is required for myogenic differentiation. It is degraded by the proteasome in myoblasts which is regulated by cAMP signaling. Moreover, SIK1 acts as a class II histone deacetylase (HDAC) kinase, triggering the cytoplasmic export of the HDACs and activation of myocyte enhancer factor 2 (MEF2)-dependent transcription. It also regulates transcription through inhibitory phosphorylation of a family of cAMP responsive element binding protein (CREB) coactivators, called TORCs/CRTCs. In addition, SIK1 links LKB1 to p53-dependent anoikis and suppresses metastasis. It is also involved in a cell sodium-sensing network that regulates active sodium transport through a calcium-dependent process. SIK1 contains an N-terminal protein kinase catalytic domain followed by an ubiquitin-associated (UBA) domain and a putative PEST domain."
definition: >-
  UBA domain found in salt-inducible kinase 1 (SIK1). SIK1, also called serine/threonine-protein kinase SNF1-like kinase 1 (SNF1LK), is a serine/threonine kinase abundant in adrenal glands. It belongs to the AMP-activated protein kinases (AMPK) family involved in the regulation of metabolism during energy stress. SIK1 is required for myogenic differentiation. It is degraded by the proteasome in myoblasts which is regulated by cAMP signaling. Moreover, SIK1 acts as a class II histone deacetylase (HDAC) kinase, triggering the cytoplasmic export of the HDACs and activation of myocyte enhancer factor 2 (MEF2)-dependent transcription. It also regulates transcription through inhibitory phosphorylation of a family of cAMP responsive element binding protein (CREB) coactivators, called TORCs/CRTCs. In addition, SIK1 links LKB1 to p53-dependent anoikis and suppresses metastasis. It is also involved in a cell sodium-sensing network that regulates active sodium transport through a calcium-dependent process. SIK1 contains an N-terminal protein kinase catalytic domain followed by an ubiquitin-associated (UBA) domain and a putative PEST domain. — an NCBI CDD conserved domain (cd14408); members share this curated model.
