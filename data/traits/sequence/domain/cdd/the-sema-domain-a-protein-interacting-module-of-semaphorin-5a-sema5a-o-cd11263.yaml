identifier: CDD:cd11263
label: "The Sema domain, a protein interacting module, of semaphorin 5A (Sema5A). Originally, mouse Sema5A was identified as a protein that induces inhibitory responses during optic nerve development. Recent studies show that Sema5A controls innate immunity in mice. It also has been identified as a candidate gene for causing idiopathic autism in humans. Plexin B3 functions as a binding partner and receptor for Sema5A. Furthermore, Sema5A is also implicated in cancer. The role of the Drosophila Sema5A ortholog, Dsema-5C, in tumorigenicity and metastasis has been reported. Sema5A is highly expressed in human pancreatic cancer cells and is associated with tumor growth, invasion and metastasis. Sema5A belongs to class 5 semaphorin family of proteins, which are transmembrane glycoproteins characterized by unique thrombospondin specific repeats in the extracellular region of the protein. Semaphorins are regulatory molecules involved in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of semaphorin 5A (Sema5A). Originally, mouse Sema5A was identified as a protein that induces inhibitory responses during optic nerve development. Recent studies show that Sema5A controls innate immunity in mice. It also has been identified as a candidate gene for causing idiopathic autism in humans. Plexin B3 functions as a binding partner and receptor for Sema5A. Furthermore, Sema5A is also implicated in cancer. The role of the Drosophila Sema5A ortholog, Dsema-5C, in tumorigenicity and metastasis has been reported. Sema5A is highly expressed in human pancreatic cancer cells and is associated with tumor growth, invasion and metastasis. Sema5A belongs to class 5 semaphorin family of proteins, which are transmembrane glycoproteins characterized by unique thrombospondin specific repeats in the extracellular region of the protein. Semaphorins are regulatory molecules involved in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module. — an NCBI CDD conserved domain (cd11263); members share this curated model.
