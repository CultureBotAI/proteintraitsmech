identifier: CDD:cd09397
label: "LIM domain in proteins of unknown function. The first Lim domain of a LIM domain containing protein: The functions of the proteins are unknown. The members of this family contain two copies of LIM domain. The LIM domain is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein."
definition: >-
  LIM domain in proteins of unknown function. The first Lim domain of a LIM domain containing protein: The functions of the proteins are unknown. The members of this family contain two copies of LIM domain. The LIM domain is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein. — an NCBI CDD conserved domain (cd09397); members share this curated model.
