identifier: CDD:cd03255
label: "ATP-binding cassette domain of the transporters involved in export of lipoprotein and macrolide, and Cell division ATP-binding protein FtsE. This family is comprised of MJ0796 ATP-binding cassette, macrolide-specific ABC-type efflux carrier (MacAB), and proteins involved in cell division (FtsE), and release of lipoproteins from the cytoplasmic membrane (LolCDE). They are clustered together phylogenetically. MacAB is an exporter that confers resistance to macrolides, while the LolCDE system is not a transporter at all. The FtsEX complex resembles an ABC transporter, where FtsE is the ATPase and the membrane subunit FtsX resembles  a permease subunit. But rather than transporting any substrate, the complex acts in cell division by undergoing conformational changes  that alter the activity of cell wall hydrolases located outside the plasma membrane. The complex is widely conserved in bacteria,  but also extremely divergent in sequence between different lineages. The LolCDE complex catalyzes the release of lipoproteins from the cytoplasmic membrane prior to their targeting to the outer membrane."
definition: >-
  ATP-binding cassette domain of the transporters involved in export of lipoprotein and macrolide, and Cell division ATP-binding protein FtsE. This family is comprised of MJ0796 ATP-binding cassette, macrolide-specific ABC-type efflux carrier (MacAB), and proteins involved in cell division (FtsE), and release of lipoproteins from the cytoplasmic membrane (LolCDE). They are clustered together phylogenetically. MacAB is an exporter that confers resistance to macrolides, while the LolCDE system is not a transporter at all. The FtsEX complex resembles an ABC transporter, where FtsE is the ATPase and the membrane subunit FtsX resembles a permease subunit. But rather than transporting any substrate, the complex acts in cell division by undergoing conformational changes that alter the activity of cell wall hydrolases located outside the plasma membrane. The complex is widely conserved in bacteria, but also extremely divergent in sequence between different lineages. The LolCDE complex catalyzes the release of lipoproteins from the cytoplasmic membrane prior to their targeting to the outer membrane. — an NCBI CDD conserved domain (cd03255); members share this curated model.
