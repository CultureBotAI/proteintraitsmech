identifier: CDD:cd14323
label: "UBA domain of eukaryotic protein linking integrin-associated protein with cytoskeleton (PLIC) proteins, Saccharomyces cerevisiae proteins Dsk2p and Gts1p, and similar proteins. The PLIC proteins (or ubiquilins) family contains human homologs of the yeast ubiquitin-like Dsk2 protein, PLIC-1 (also called ubiquilin-1), PLIC-2 (also called ubiquilin-2 or Chap1), PLIC-3 (also called ubiquilin-3) and PLIC-4 (also called ubiquilin-4, Ataxin-1 interacting ubiquitin-like protein, A1Up, Connexin43-interacting protein of 75 kDa, or CIP75), and mouse PLIC proteins. They are ubiquitin-binding adaptor proteins involved in all protein degradation pathways through delivering ubiquitinated substrates to proteasomes. They also promote autophagy-dependent cell survival during nutrient starvation. Saccharomyces cerevisiae Dsk2p is a nuclear-enriched protein that may involve in the ubiquitin-proteasome proteolytic pathway through interacting with K48-linked polyubiquitin and the proteasome. Gts1p, also called protein LSR1, is encoded by a pleiotropic gene GTS1 in budding yeast. The formation of Gts1p-mediated protein aggregates may induce reactive oxygen species (ROS) production and apoptosis. Gts1p also plays an important role in the regulation of heat and other stress responses under glucose-limited or -depleted conditions in either batch or continuous culture."
definition: >-
  UBA domain of eukaryotic protein linking integrin-associated protein with cytoskeleton (PLIC) proteins, Saccharomyces cerevisiae proteins Dsk2p and Gts1p, and similar proteins. The PLIC proteins (or ubiquilins) family contains human homologs of the yeast ubiquitin-like Dsk2 protein, PLIC-1 (also called ubiquilin-1), PLIC-2 (also called ubiquilin-2 or Chap1), PLIC-3 (also called ubiquilin-3) and PLIC-4 (also called ubiquilin-4, Ataxin-1 interacting ubiquitin-like protein, A1Up, Connexin43-interacting protein of 75 kDa, or CIP75), and mouse PLIC proteins. They are ubiquitin-binding adaptor proteins involved in all protein degradation pathways through delivering ubiquitinated substrates to proteasomes. They also promote autophagy-dependent cell survival during nutrient starvation. Saccharomyces cerevisiae Dsk2p is a nuclear-enriched protein that may involve in the ubiquitin-proteasome proteolytic pathway through interacting with K48-linked polyubiquitin and the proteasome. Gts1p, also called protein LSR1, is encoded by a pleiotropic gene GTS1 in budding yeast. The formation of Gts1p-mediated protein aggregates may induce reactive oxygen species (ROS) production and apoptosis. Gts1p also plays an important role in the regulation of heat and other stress responses under glucose-limited or -depleted conditions in either batch or continuous culture. — an NCBI CDD conserved domain (cd14323); members share this curated model.
