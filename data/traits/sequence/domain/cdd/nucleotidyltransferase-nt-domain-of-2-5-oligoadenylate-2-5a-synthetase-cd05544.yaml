identifier: CDD:cd05544
label: "Nucleotidyltransferase (NT) domain of 2'5'-oligoadenylate (2-5A)synthetase (2-5OAS) family proteins. NT_2-5OAS:  2prime, 5prime-oligoadenylate (2-5A) synthetase, 2-5OAS. 2-5OAS are enzymes induced in vertebrates, by interferon during the innate (natural) immune response against RNA virus infections. In the presence of a suitable RNA activator, active 2-5OASs oligomerize ATP into 2-5A. 2-5A activates endoribonuclease L, leading to the degradation of viral RNA. This 2-5OAS system is also implicated in cell growth control, differentiation, and apoptosis. This group is comprised mostly of mammalian 2-5OAS family proteins including human (h), horse, mice, rat, cattle, pig, and dog 2-5OASs. The four major types of genes encoding these proteins are OAS1, OAS2, OAS3, and OAS-like (OASL). Also included in this group are chicken (Ch) 2-5OASs, and marine sponge (Geodia cydonium,) 2-5OAS. The hOAS1 gene encodes several isoforms, hOAS2 encodes two isoforms, and hOAS3 encodes a single enzyme. The human OAS1 and OASL proteins have one conserved OAS domain, hOAS2 has two tandem OAS domains, and hOAS3 has three OAS domains. hOAS1 is active as a tetramer, hOAS2 protein as a dimer, and hOAS3 protein as a monomer. hOASL lacks OAS activity. hOAS1 and hOAS2 require relatively high levels of dsRNA for activation. hOAS3 is activated by lower concentrations of dsRNA. hOAS1 and hOAS2 preferentially synthesize higher order oligomers of 2-5 A, which have a high affinity for binding RNaseL. In contrast, hOAS3 synthesizes dimeric 2-5A molecules, which have a low affinity for RNaseL. The pH optimum for hOAS3 is 7.5, pH optima for hOAS1 and two is 6.5A. These human 2-5OAS also differ in their subcellular localization: hOAS1 associates with the ribosomal fraction, hOAS2 with intracellular membranes such as the nuclear envelope and the endoplasmic reticulum, and hOAS3 with microsomes. 2-5OASs are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are for the most part conserved in these 2-5OAS domains."
definition: >-
  Nucleotidyltransferase (NT) domain of 2'5'-oligoadenylate (2-5A)synthetase (2-5OAS) family proteins. NT_2-5OAS: 2prime, 5prime-oligoadenylate (2-5A) synthetase, 2-5OAS. 2-5OAS are enzymes induced in vertebrates, by interferon during the innate (natural) immune response against RNA virus infections. In the presence of a suitable RNA activator, active 2-5OASs oligomerize ATP into 2-5A. 2-5A activates endoribonuclease L, leading to the degradation of viral RNA. This 2-5OAS system is also implicated in cell growth control, differentiation, and apoptosis. This group is comprised mostly of mammalian 2-5OAS family proteins including human (h), horse, mice, rat, cattle, pig, and dog 2-5OASs. The four major types of genes encoding these proteins are OAS1, OAS2, OAS3, and OAS-like (OASL). Also included in this group are chicken (Ch) 2-5OASs, and marine sponge (Geodia cydonium,) 2-5OAS. The hOAS1 gene encodes several isoforms, hOAS2 encodes two isoforms, and hOAS3 encodes a single enzyme. The human OAS1 and OASL proteins have one conserved OAS domain, hOAS2 has two tandem OAS domains, and hOAS3 has three OAS domains. hOAS1 is active as a tetramer, hOAS2 protein as a dimer, and hOAS3 protein as a monomer. hOASL lacks OAS activity. hOAS1 and hOAS2 require relatively high levels of dsRNA for activation. hOAS3 is activated by lower concentrations of dsRNA. hOAS1 and hOAS2 preferentially synthesize higher order oligomers of 2-5 A, which have a high affinity for binding RNaseL. In contrast, hOAS3 synthesizes dimeric 2-5A molecules, which have a low affinity for RNaseL. The pH optimum for hOAS3 is 7.5, pH optima for hOAS1 and two is 6.5A. These human 2-5OAS also differ in their subcellular localization: hOAS1 associates with the ribosomal fraction, hOAS2 with intracellular membranes such as the nuclear envelope and the endoplasmic reticulum, and hOAS3 with microsomes. 2-5OASs are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are for the most part conserved in these 2-5OAS domains. — an NCBI CDD conserved domain (cd05544); members share this curated model.
