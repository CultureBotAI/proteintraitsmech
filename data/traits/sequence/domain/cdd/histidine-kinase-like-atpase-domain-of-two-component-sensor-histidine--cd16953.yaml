identifier: CDD:cd16953
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Brucella abortus BvrS and Sinorhizobium meliloti ChvG. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) such as Brucella abortus BvrS of the BvrR-BvrS two-component regulatory system (TCS), which controls cell invasion and intracellular survival, as well as Sinorhizobium meliloti and Agrobacterium tumefaciens ChvG of the ChvI-ChvG TCS necessary for endosymbiosis and pathogenicity in plants. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA), an accessory HAMP sensor domain, a periplasmic stimulus-sensing domain, and some also have a sensor N-terminal transmembrane domain."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Brucella abortus BvrS and Sinorhizobium meliloti ChvG. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) such as Brucella abortus BvrS of the BvrR-BvrS two-component regulatory system (TCS), which controls cell invasion and intracellular survival, as well as Sinorhizobium meliloti and Agrobacterium tumefaciens ChvG of the ChvI-ChvG TCS necessary for endosymbiosis and pathogenicity in plants. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA), an accessory HAMP sensor domain, a periplasmic stimulus-sensing domain, and some also have a sensor N-terminal transmembrane domain. — an NCBI CDD conserved domain (cd16953); members share this curated model.
