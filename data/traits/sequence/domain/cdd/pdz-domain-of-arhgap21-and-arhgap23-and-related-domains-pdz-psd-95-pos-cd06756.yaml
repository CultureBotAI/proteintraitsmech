identifier: CDD:cd06756
label: "PDZ domain of ARHGAP21 and ARHGAP23, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of ARHGAP21, ARHGAP23, and related domains. This subfamily includes the GAPs (GTPase activating proteins): ARHGAP21 (Rho GTPase-activating protein 21; also known as Rho GTPase-activating protein 10, Rho-type GTPase-activating protein 21) and ARHGAP23 (Rho GTPase-activating protein 23; also known as Rho-type GTPase-activating protein 23). GAPs deactivate Rho GTPases by accelerating GTP hydrolysis. ARHGAP21/23 interact with a planar cell polarity (PCP) protein Pk1 to regulate a lateral signaling pathway in migrating cells. The ARHGAP21 PDZ domain binds claudin-2. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This ARHGAP21-23-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  PDZ domain of ARHGAP21 and ARHGAP23, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of ARHGAP21, ARHGAP23, and related domains. This subfamily includes the GAPs (GTPase activating proteins): ARHGAP21 (Rho GTPase-activating protein 21; also known as Rho GTPase-activating protein 10, Rho-type GTPase-activating protein 21) and ARHGAP23 (Rho GTPase-activating protein 23; also known as Rho-type GTPase-activating protein 23). GAPs deactivate Rho GTPases by accelerating GTP hydrolysis. ARHGAP21/23 interact with a planar cell polarity (PCP) protein Pk1 to regulate a lateral signaling pathway in migrating cells. The ARHGAP21 PDZ domain binds claudin-2. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This ARHGAP21-23-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd06756); members share this curated model.
