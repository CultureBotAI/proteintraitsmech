identifier: CDD:cd11036
label: "AknT-like proteins. This family is composed of proteins similar to Streptomyces biosynthesis proteins including anthracycline biosynthesis proteins DnrQ and AknT, and macrolide antibiotic biosynthesis proteins TylM3 and DesVIII. Streptomyces peucetius DnrQ is involved in the biosynthesis of carminomycin and daunorubicin (daunomycin) while Streptomyces galilaeus AknT functions in the biosynthesis of aclacinomycin A. Streptomyces fradiae TylM3 is involved in the biosynthesis of tylosin derived from the polyketide lactone tylactone, and Streptomyces venezuelae functions in the biosynthesis of methymycin, neomethymycin, narbomycin, and pikromycin. These proteins are required for the glycosylation of specific substrates during the biosynthesis of specific anthracyclines and macrolide antibiotics. Although members of this family belong to the large cytochrome P450 (P450, CYP) superfamily and show significant similarity to cytochrome P450s, they lack heme-binding sites and are not functional cytochromes."
definition: >-
  AknT-like proteins. This family is composed of proteins similar to Streptomyces biosynthesis proteins including anthracycline biosynthesis proteins DnrQ and AknT, and macrolide antibiotic biosynthesis proteins TylM3 and DesVIII. Streptomyces peucetius DnrQ is involved in the biosynthesis of carminomycin and daunorubicin (daunomycin) while Streptomyces galilaeus AknT functions in the biosynthesis of aclacinomycin A. Streptomyces fradiae TylM3 is involved in the biosynthesis of tylosin derived from the polyketide lactone tylactone, and Streptomyces venezuelae functions in the biosynthesis of methymycin, neomethymycin, narbomycin, and pikromycin. These proteins are required for the glycosylation of specific substrates during the biosynthesis of specific anthracyclines and macrolide antibiotics. Although members of this family belong to the large cytochrome P450 (P450, CYP) superfamily and show significant similarity to cytochrome P450s, they lack heme-binding sites and are not functional cytochromes. — an NCBI CDD conserved domain (cd11036); members share this curated model.
