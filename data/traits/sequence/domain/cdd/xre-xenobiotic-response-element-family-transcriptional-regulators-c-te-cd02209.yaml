identifier: CDD:cd02209
label: "XRE (Xenobiotic Response Element) family transcriptional regulators, C-terminal cupin domain. This family contains transcriptional regulators containing an N-terminal XRE (Xenobiotic Response Element) family helix-turn-helix (HTH) DNA-binding domain and a C-terminal cupin domain. Included in this family is Escherichia coli transcription factor SutR (YdcN) that plays a regulatory role in sulfur utilization; it regulates a set of genes involved in the generation of sulfate and its reduction, the synthesis of cysteine, the synthesis of enzymes containing Fe-S as cofactors, and the modification of tRNA with use of sulfur-containing substrates. This family belongs to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  XRE (Xenobiotic Response Element) family transcriptional regulators, C-terminal cupin domain. This family contains transcriptional regulators containing an N-terminal XRE (Xenobiotic Response Element) family helix-turn-helix (HTH) DNA-binding domain and a C-terminal cupin domain. Included in this family is Escherichia coli transcription factor SutR (YdcN) that plays a regulatory role in sulfur utilization; it regulates a set of genes involved in the generation of sulfate and its reduction, the synthesis of cysteine, the synthesis of enzymes containing Fe-S as cofactors, and the modification of tRNA with use of sulfur-containing substrates. This family belongs to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd02209); members share this curated model.
