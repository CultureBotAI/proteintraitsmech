identifier: CDD:cd18502
label: "BACK (BTB and C-terminal Kelch) domain found in influenza virus NS1A-binding protein (NS1-BP). NS1-BP, also called NS1-binding protein, or Aryl hydrocarbon receptor-associated protein 3, or IVNS1ABP, is a novel protein that interacts with the influenza A virus nonstructural NS1 protein, which is relocalized in the nuclei of infected cells. It plays a role in cell division and in the dynamic organization of the actin skeleton as a stabilizer of actin filaments by association with F-actin through Kelch repeats. It also interacts with alpha-enolase/MBP-1 and is involved in c-Myc gene transcriptional control."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in influenza virus NS1A-binding protein (NS1-BP). NS1-BP, also called NS1-binding protein, or Aryl hydrocarbon receptor-associated protein 3, or IVNS1ABP, is a novel protein that interacts with the influenza A virus nonstructural NS1 protein, which is relocalized in the nuclei of infected cells. It plays a role in cell division and in the dynamic organization of the actin skeleton as a stabilizer of actin filaments by association with F-actin through Kelch repeats. It also interacts with alpha-enolase/MBP-1 and is involved in c-Myc gene transcriptional control. — an NCBI CDD conserved domain (cd18502); members share this curated model.
