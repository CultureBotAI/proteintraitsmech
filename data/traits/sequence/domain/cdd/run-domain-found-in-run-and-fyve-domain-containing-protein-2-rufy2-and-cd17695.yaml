identifier: CDD:cd17695
label: "RUN domain found in RUN and FYVE domain-containing protein 2 (RUFY2) and similar proteins. RUFY2, also called Rab4-interacting protein related, is a novel embryonic factor that contains an N-terminal RUN domain and a C-terminal FYVE domain with two coiled-coil domains in-between. It is present in the nucleus at early stages of embryonic development. It may have both endosomal functions in the cytoplasm and nuclear functions. This model represents the RUN domain of RUFY2."
definition: >-
  RUN domain found in RUN and FYVE domain-containing protein 2 (RUFY2) and similar proteins. RUFY2, also called Rab4-interacting protein related, is a novel embryonic factor that contains an N-terminal RUN domain and a C-terminal FYVE domain with two coiled-coil domains in-between. It is present in the nucleus at early stages of embryonic development. It may have both endosomal functions in the cytoplasm and nuclear functions. This model represents the RUN domain of RUFY2. — an NCBI CDD conserved domain (cd17695); members share this curated model.
