identifier: CDD:cd13929
label: "aromatic prenyltransferases (PTases) of the DMATS/CymD familiy. Members of the DMATS/CymD family of ABBA prenyltransferases prenylate indole, tyrosine, and xanthone derivatives. This family of fungal proteins includes cyclic dipeptide N-prenyltransferase (CdpNPT), Brevianamide F prenyltransferase (ftmPT1), fumigaclavine C synthase (FgaPT1), dimethylallyltryptophan synthase (DMATS) and related proteins. CdpNPT accepts a variety of tryptophan-containing cyclic dipeptides, including L-tryptophan itself, and prenylates these substrates inverse at the N-1 position of the indole group. FtmPT1 catalyzes the prenylation of brevianamide F in the biosynthesis of fumitremorgin-type alkaloids. FgaPT1 catalyses the prenylation of fumigaclavine A. Dimethylallyltryptophan synthases (DMATS) catalyzes the prenylation of L-tryptophan at C-4 of the indole ring during the biosynthesis of ergot alkaloids."
definition: >-
