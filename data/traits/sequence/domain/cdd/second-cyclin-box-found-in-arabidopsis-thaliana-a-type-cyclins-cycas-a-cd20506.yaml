identifier: CDD:cd20506
label: "second cyclin box found in Arabidopsis thaliana A-type cyclins (CycAs) and similar proteins. Plant A-type cyclins (CycAs) correspond to a group of G2/mitotic-specific cyclins that are functionally linked to S- and M-phases of the mitotic cycle, which predicts their involvement also in meiosis. CycAs associate with their partner cyclin-dependent kinases (CDKs) to trigger the kinase activity. They contain two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain."
definition: >-
  second cyclin box found in Arabidopsis thaliana A-type cyclins (CycAs) and similar proteins. Plant A-type cyclins (CycAs) correspond to a group of G2/mitotic-specific cyclins that are functionally linked to S- and M-phases of the mitotic cycle, which predicts their involvement also in meiosis. CycAs associate with their partner cyclin-dependent kinases (CDKs) to trigger the kinase activity. They contain two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20506); members share this curated model.
