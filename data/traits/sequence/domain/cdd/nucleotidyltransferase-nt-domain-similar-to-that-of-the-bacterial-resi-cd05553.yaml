identifier: CDD:cd05553
label: NT_KNTase_like
definition: >-
  Nucleotidyltransferase (NT) domain similar to that of the bacterial resistance protein Staphylococcus aureus kanamycin nucleotidyltransferase; uncharacterized subgroup. NT_KNTase_like: a subgroup of the catalytic nucleotidyltransferase (NT) domains found in proteins similar to the bacterial resistance genes Staphylococcus aureus kanamycin nucleotidyltransferase (SaKNTase) and Escherichia coli (Ec) AadA5, and to the Haemophilus influenzae protein HI0073. HI0073 contains the nucleotide-binding domain of the HI0073/HI0074 two-component NT. Structurally HI0074 is related to the substrate-binding domain of SaKNTase. SaKNTase, EcAadA5, and HI0073 are not found in this subgroup about which little is known. Proteins in this group belong to the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are for the most part conserved in this subgroup
