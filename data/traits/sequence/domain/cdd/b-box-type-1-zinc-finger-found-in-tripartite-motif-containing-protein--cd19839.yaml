identifier: CDD:cd19839
label: "B-box-type 1 zinc finger found in tripartite motif-containing protein 16 (TRIM16) and similar proteins. TRIM16, also termed estrogen-responsive B box protein (EBBP), is a regulator that may play a role in the regulation of keratinocyte differentiation. It may also act as a tumor suppressor by affecting cell proliferation and migration or tumorigenicity in carcinogenesis. TRIM16 belongs to an unclassified TRIM (tripartite motif) family of proteins that do not have RING fingers and thus lack the characteristic tripartite (RING (R), B-box, and coiled coil (CC)) RBCC motif. The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif."
definition: >-
  B-box-type 1 zinc finger found in tripartite motif-containing protein 16 (TRIM16) and similar proteins. TRIM16, also termed estrogen-responsive B box protein (EBBP), is a regulator that may play a role in the regulation of keratinocyte differentiation. It may also act as a tumor suppressor by affecting cell proliferation and migration or tumorigenicity in carcinogenesis. TRIM16 belongs to an unclassified TRIM (tripartite motif) family of proteins that do not have RING fingers and thus lack the characteristic tripartite (RING (R), B-box, and coiled coil (CC)) RBCC motif. The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif. — an NCBI CDD conserved domain (cd19839); members share this curated model.
