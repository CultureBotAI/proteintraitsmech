identifier: CDD:cd16509
label: "RING finger, HC subclass, found in helicase-like transcription factor (HLTF) and similar proteins. HLTF, also known as DNA-binding protein/plasminogen activator inhibitor 1 regulator, HIP116, RING finger protein 80, SWI/SNF-related matrix-associated actin-dependent regulator of chromatin subfamily A member 3, or sucrose nonfermenting protein 2-like 3, is a yeast RAD5 homolog found in mammals. It has both E3 ubiquitin ligase and DNA helicase activities, and plays a pivotal role in the template-switching pathway of DNA damage tolerance. It is involved in Lys-63-linked poly-ubiquitination of proliferating cell nuclear antigen (PCNA) at Lys-164 and in the regulation of DNA damage tolerance. It shows double-stranded DNA translocase activity with 3'-5' polarity, thereby facilitating regression of the replication fork. HLTF contains an N-terminal HIRAN (HIP116 and RAD5 N-terminal) domain, a SWI/SNF helicase domain that is divided into N- and C-terminal parts by an insertion of a C3HC4-type RING-HC finger involved in the poly-ubiquitination of PCNA."
definition: >-
  RING finger, HC subclass, found in helicase-like transcription factor (HLTF) and similar proteins. HLTF, also known as DNA-binding protein/plasminogen activator inhibitor 1 regulator, HIP116, RING finger protein 80, SWI/SNF-related matrix-associated actin-dependent regulator of chromatin subfamily A member 3, or sucrose nonfermenting protein 2-like 3, is a yeast RAD5 homolog found in mammals. It has both E3 ubiquitin ligase and DNA helicase activities, and plays a pivotal role in the template-switching pathway of DNA damage tolerance. It is involved in Lys-63-linked poly-ubiquitination of proliferating cell nuclear antigen (PCNA) at Lys-164 and in the regulation of DNA damage tolerance. It shows double-stranded DNA translocase activity with 3'-5' polarity, thereby facilitating regression of the replication fork. HLTF contains an N-terminal HIRAN (HIP116 and RAD5 N-terminal) domain, a SWI/SNF helicase domain that is divided into N- and C-terminal parts by an insertion of a C3HC4-type RING-HC finger involved in the poly-ubiquitination of PCNA. — an NCBI CDD conserved domain (cd16509); members share this curated model.
