identifier: CDD:cd15131
label: "growth hormone secretagogue receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. Growth hormone secretagogue receptor, GHSR, is also known as GH-releasing peptide receptor (GHRP) or Ghrelin receptor. Ghrelin, the endogenous ligand for GHSR, is an acylated 28-amino acid peptide hormone produced by ghrelin cells in the gastrointestinal tract. Ghrelin, also called hunger hormone, is involved in the regulation of growth hormone release, appetite and feeding, gut motility, lipid and glucose metabolism, and energy balance. It also plays a role in the cardiovascular, immune, and reproductive systems. GHSR couples to G-alpha-11 proteins. Both ghrelin and GHSR are expressed in a wide range of cancer tissues. Recent studies suggested that ghrelin may play a role in processes associated with cancer progression, including cell proliferation, metastasis, apoptosis, and angiogenesis."
