identifier: CDD:cd17329
label: "Multidrug resistance protein MdtH and similar multidrug resistance (MDR) transporters of the Major Facilitator Superfamily. This family is composed of Escherichia coli MdtH and similar multidrug resistance (MDR) transporters from bacteria and archaea, many of which remain uncharacterized. MDR transporters are drug/H+ antiporters (DHA) that mediate the efflux of a variety of drugs and toxic compounds, and confer resistance to these compounds. MdtH confers resistance to norfloxacin and enoxacin. MdtH-like MDR transporters belong to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Multidrug resistance protein MdtH and similar multidrug resistance (MDR) transporters of the Major Facilitator Superfamily. This family is composed of Escherichia coli MdtH and similar multidrug resistance (MDR) transporters from bacteria and archaea, many of which remain uncharacterized. MDR transporters are drug/H+ antiporters (DHA) that mediate the efflux of a variety of drugs and toxic compounds, and confer resistance to these compounds. MdtH confers resistance to norfloxacin and enoxacin. MdtH-like MDR transporters belong to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17329); members share this curated model.
