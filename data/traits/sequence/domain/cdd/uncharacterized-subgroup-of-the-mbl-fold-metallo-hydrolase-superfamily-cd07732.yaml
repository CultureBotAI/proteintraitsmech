identifier: CDD:cd07732
label: "uncharacterized subgroup of the MBL-fold_metallo-hydrolase superfamily; MBL-fold metallo hydrolase domain. Includes functionally uncharacterized Enterococcus faecalis EF2904. Members of the MBL-fold metallohydrolase superfamily are mainly hydrolytic enzymes which carry out a variety of biological functions. The class B metal beta-lactamases (MBLs) for which this fold was named perform only a small fraction of the activities included in this superfamily.Activities carried out by superfamily members include class B beta-lactamases, hydroxyacylglutathione hydrolases, AHL (acyl homoserine lactone) lactonases, persulfide dioxygenases, flavodiiron proteins, cleavage and polyadenylation specificity factors such as the Int9 and Int11 subunits of Integrator, Sdsa1-like and AtsA-like arylsulfatases, 5'-exonucleases human SNM1A and yeast Pso2p, ribonuclease J and ribonuclease Z, cyclic nucleotide phosphodiesterases, insecticide hydrolases, and proteins required for natural transformation competence. Classical members of the superfamily are di-, or less commonly mono-, zinc-ion-dependent hydrolases, however the diversity of biological roles is reflected in variations in the active site metallo-chemistry."
definition: >-
  uncharacterized subgroup of the MBL-fold_metallo-hydrolase superfamily; MBL-fold metallo hydrolase domain. Includes functionally uncharacterized Enterococcus faecalis EF2904. Members of the MBL-fold metallohydrolase superfamily are mainly hydrolytic enzymes which carry out a variety of biological functions. The class B metal beta-lactamases (MBLs) for which this fold was named perform only a small fraction of the activities included in this superfamily.Activities carried out by superfamily members include class B beta-lactamases, hydroxyacylglutathione hydrolases, AHL (acyl homoserine lactone) lactonases, persulfide dioxygenases, flavodiiron proteins, cleavage and polyadenylation specificity factors such as the Int9 and Int11 subunits of Integrator, Sdsa1-like and AtsA-like arylsulfatases, 5'-exonucleases human SNM1A and yeast Pso2p, ribonuclease J and ribonuclease Z, cyclic nucleotide phosphodiesterases, insecticide hydrolases, and proteins required for natural transformation competence. Classical members of the superfamily are di-, or less commonly mono-, zinc-ion-dependent hydrolases, however the diversity of biological roles is reflected in variations in the active site metallo-chemistry. — an NCBI CDD conserved domain (cd07732); members share this curated model.
