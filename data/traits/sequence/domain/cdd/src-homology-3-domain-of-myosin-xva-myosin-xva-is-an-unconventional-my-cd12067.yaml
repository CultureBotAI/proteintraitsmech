identifier: CDD:cd12067
label: "Src Homology 3 domain of Myosin XVa. Myosin XVa is an unconventional myosin that is critical for the normal growth of mechanosensory stereocilia of inner ear hair cells. Mutations in the myosin XVa gene are associated with nonsyndromic hearing loss. Myosin XVa contains a unique N-terminal extension followed by a motor domain, light chain-binding IQ motifs, and a tail consisting of a pair of MyTH4-FERM tandems separated by a SH3 domain, and a PDZ domain. SH3 domains bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs; they play a role in the regulation of enzymes by intramolecular interactions, changing the subcellular localization of signal pathway components and mediate multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Myosin XVa. Myosin XVa is an unconventional myosin that is critical for the normal growth of mechanosensory stereocilia of inner ear hair cells. Mutations in the myosin XVa gene are associated with nonsyndromic hearing loss. Myosin XVa contains a unique N-terminal extension followed by a motor domain, light chain-binding IQ motifs, and a tail consisting of a pair of MyTH4-FERM tandems separated by a SH3 domain, and a PDZ domain. SH3 domains bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs; they play a role in the regulation of enzymes by intramolecular interactions, changing the subcellular localization of signal pathway components and mediate multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12067); members share this curated model.
