identifier: CDD:cd14239
label: "canonical GAT domain found in ADP-ribosylation factor (Arf)-binding proteins GGA1 and GGA2. This subfamily includes GGA1 and GGA2, both of which belong to a family of ubiquitously expressed, monomeric, motif-binding cargo/clathrin adaptor proteins that regulate clathrin-mediated trafficking of cargo proteins from the trans-Golgi network (TGN) to endosomes. GGA1, also called gamma-adaptin-related protein 1, or Golgi-localized gamma ear-containing Arf-binding protein 1, regulates the low-density lipoprotein and sorting receptor LR11/SorLA endocytic traffic and further alters amyloid-beta precursor protein (APP) intracellular distribution and amyloid-beta production. It is also critical for the effects of beta-site APP-cleaving enzyme-1 (BACE1) on amyloid-beta generation. It interacts with BACE1 and promotes its traffic from early endosomes to late endocytic compartments or the TGN. Moreover, GGA1 acts as a clathrin assembly protein with the ability to polymerize clathrin into tubules. GGA2, also called gamma-adaptin-related protein 2, Golgi-localized gamma ear-containing Arf-binding protein 2, or VHS domain and ear domain of gamma-adaptin (Vear), interacts with the acidic cluster-dileucine motif in the cytoplasmic tail of the cation-independent mannose 6-phosphate receptor (CI-MPR) and further plays a major role in the sorting of lysosomal enzymes. It also mediates a vital function that cannot be compensated for by GGA1 and/or GGA3. Both GGA1 and GGA2 have a multidomain structure consisting of an N-terminal VHS (Vps27/Hrs/Stam) domain, a GAT (GGA and TOM) domain, a largely unstructured hinge region that contains clathrin-binding motifs, and a C-terminal GAE (gamma-adaptin ear homology) domain. The GAT domain of GGAs interacts with class I GTP-bound form of Arf proteins, Rabaptin-5, ubiquitin, and/or the tumor susceptibility gene 101 product (TSG101)."
definition: >-
  canonical GAT domain found in ADP-ribosylation factor (Arf)-binding proteins GGA1 and GGA2. This subfamily includes GGA1 and GGA2, both of which belong to a family of ubiquitously expressed, monomeric, motif-binding cargo/clathrin adaptor proteins that regulate clathrin-mediated trafficking of cargo proteins from the trans-Golgi network (TGN) to endosomes. GGA1, also called gamma-adaptin-related protein 1, or Golgi-localized gamma ear-containing Arf-binding protein 1, regulates the low-density lipoprotein and sorting receptor LR11/SorLA endocytic traffic and further alters amyloid-beta precursor protein (APP) intracellular distribution and amyloid-beta production. It is also critical for the effects of beta-site APP-cleaving enzyme-1 (BACE1) on amyloid-beta generation. It interacts with BACE1 and promotes its traffic from early endosomes to late endocytic compartments or the TGN. Moreover, GGA1 acts as a clathrin assembly protein with the ability to polymerize clathrin into tubules. GGA2, also called gamma-adaptin-related protein 2, Golgi-localized gamma ear-containing Arf-binding protein 2, or VHS domain and ear domain of gamma-adaptin (Vear), interacts with the acidic cluster-dileucine motif in the cytoplasmic tail of the cation-independent mannose 6-phosphate receptor (CI-MPR) and further plays a major role in the sorting of lysosomal enzymes. It also mediates a vital function that cannot be compensated for by GGA1 and/or GGA3. Both GGA1 and GGA2 have a multidomain structure consisting of an N-terminal VHS (Vps27/Hrs/Stam) domain, a GAT (GGA and TOM) domain, a largely unstructured hinge region that contains clathrin-binding motifs, and a C-terminal GAE (gamma-adaptin ear homology) domain. The GAT domain of GGAs interacts with class I GTP-bound form of Arf proteins, Rabaptin-5, ubiquitin, and/or the tumor susceptibility gene 101 product (TSG101). — an NCBI CDD conserved domain (cd14239); members share this curated model.
