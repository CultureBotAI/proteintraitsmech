identifier: CDD:cd22892
label: "C-terminal double-RWD domain of kinetochore scaffold 1 and related proteins. Kinetochore scaffold 1 (KNL1 or Knl1, also known as Spc105, Spc7, and Blinkin) coordinates the spindle assembly checkpoint (SAC), a signaling pathway that delays chromosome segregation until all sister chromatids are properly attached to spindle microtubules (MTs). Knl1 is part of the KMN network, a conserved kinetochore protein complex that connects kinetochores to MTs. Knl1 has been shown to play an effective role in decreasing apoptosis and promoting the proliferation of colorectal cancer cells, suggesting that its inhibition may represent a promising therapeutic approach for colorectal cancer patients. Knl1 contains tandem RWD domains, also known as a double-RWD domain, DRWD, which has been shown to bind the Mis12 complex, consisting of Dsn1 and Nsl1, that tethers directly onto the underlying chromatin layer and mediates kinetochore targeting of Knl1. The model corresponds to the C-terminal double-RWD domain (DRWD-C)."
definition: >-
  C-terminal double-RWD domain of kinetochore scaffold 1 and related proteins. Kinetochore scaffold 1 (KNL1 or Knl1, also known as Spc105, Spc7, and Blinkin) coordinates the spindle assembly checkpoint (SAC), a signaling pathway that delays chromosome segregation until all sister chromatids are properly attached to spindle microtubules (MTs). Knl1 is part of the KMN network, a conserved kinetochore protein complex that connects kinetochores to MTs. Knl1 has been shown to play an effective role in decreasing apoptosis and promoting the proliferation of colorectal cancer cells, suggesting that its inhibition may represent a promising therapeutic approach for colorectal cancer patients. Knl1 contains tandem RWD domains, also known as a double-RWD domain, DRWD, which has been shown to bind the Mis12 complex, consisting of Dsn1 and Nsl1, that tethers directly onto the underlying chromatin layer and mediates kinetochore targeting of Knl1. The model corresponds to the C-terminal double-RWD domain (DRWD-C). — an NCBI CDD conserved domain (cd22892); members share this curated model.
