identifier: CDD:cd16642
label: "Modified RING finger, HC subclass (C3HC3D-type), found in tumor necrosis factor (TNF) receptor-associated factor 5 (TRAF5) and similar proteins. TRAF5, also known as RING finger protein 84 (RNF84), is an important signal transducer for a wide range of TNF receptor superfamily members, including tumor necrosis factor receptor 1 (TNFR1), TNFR2, CD40, and other lymphocyte costimulatory receptors, RANK/TRANCE-R, ectodysplasin-A Receptor (EDAR), lymphotoxin-beta receptor (LT-betaR), latent membrane protein 1 (LMP1), and IRE1. It functions as an activator of NF-kappaB, MAPK, and JNK, and is involved in both RANKL- and TNFalpha-induced osteoclastogenesis. It mediates CD40 signaling by associating with the cytoplasmic tail of CD40. It also negatively regulates Toll-like receptor (TLR) signaling and functions as a negative regulator of the interleukin 6 (IL-6) receptor signaling pathway that limits the differentiation of inflammatory CD4(+) T cells. TRAF5 contains an N-terminal domain with a modified C3HC3D-type RING-HC finger and several zinc fingers, and a C-terminal TRAF domain that comprises a coiled coil domain and a conserved TRAF-C domain."
definition: >-
  Modified RING finger, HC subclass (C3HC3D-type), found in tumor necrosis factor (TNF) receptor-associated factor 5 (TRAF5) and similar proteins. TRAF5, also known as RING finger protein 84 (RNF84), is an important signal transducer for a wide range of TNF receptor superfamily members, including tumor necrosis factor receptor 1 (TNFR1), TNFR2, CD40, and other lymphocyte costimulatory receptors, RANK/TRANCE-R, ectodysplasin-A Receptor (EDAR), lymphotoxin-beta receptor (LT-betaR), latent membrane protein 1 (LMP1), and IRE1. It functions as an activator of NF-kappaB, MAPK, and JNK, and is involved in both RANKL- and TNFalpha-induced osteoclastogenesis. It mediates CD40 signaling by associating with the cytoplasmic tail of CD40. It also negatively regulates Toll-like receptor (TLR) signaling and functions as a negative regulator of the interleukin 6 (IL-6) receptor signaling pathway that limits the differentiation of inflammatory CD4(+) T cells. TRAF5 contains an N-terminal domain with a modified C3HC3D-type RING-HC finger and several zinc fingers, and a C-terminal TRAF domain that comprises a coiled coil domain and a conserved TRAF-C domain. — an NCBI CDD conserved domain (cd16642); members share this curated model.
