identifier: CDD:cd12957
label: "Spindle and kinetochore-associated protein 3, N-terminal domain. SKA3, also called RAMA1 or C13orf3, is a component of the SKA complex, which is formed by the association of three subunits (SKA1, SKA2, and SKA3). The SKA complex is essential for accurate cell division. It functions with the Ndc80 network to establish stable kinetochore-microtubule interactions, which are crucial for the highly orchestrated chromosome movements during mitosis. The biological unit is a W-shaped homodimer of the three-subunit complex. SKA3 contributes to SAC (spindle-assembly checkpoint) signaling through its interaction with Bub3. This model represents the N-terminal domain of SKA3, which is involved in interactions with SKA1 and SKA2 to form the SKA complex. The C-terminal portion of SKA3 is involved in creating a microtubule-binding surface."
definition: >-
  Spindle and kinetochore-associated protein 3, N-terminal domain. SKA3, also called RAMA1 or C13orf3, is a component of the SKA complex, which is formed by the association of three subunits (SKA1, SKA2, and SKA3). The SKA complex is essential for accurate cell division. It functions with the Ndc80 network to establish stable kinetochore-microtubule interactions, which are crucial for the highly orchestrated chromosome movements during mitosis. The biological unit is a W-shaped homodimer of the three-subunit complex. SKA3 contributes to SAC (spindle-assembly checkpoint) signaling through its interaction with Bub3. This model represents the N-terminal domain of SKA3, which is involved in interactions with SKA1 and SKA2 to form the SKA complex. The C-terminal portion of SKA3 is involved in creating a microtubule-binding surface. — an NCBI CDD conserved domain (cd12957); members share this curated model.
