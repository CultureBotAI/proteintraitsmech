identifier: CDD:cd12289
label: RRM_LARP6
definition: >-
  RNA recognition motif (RRM) found in La-related protein 6 (LARP6) and similar proteins. This subfamily corresponds to the RRM of LARP6, also termed Acheron (Achn), a novel member of the lupus antigen (La) family. It is expressed predominantly in neurons and muscle in vertebrates. LARP6 functions as a key regulatory protein that may play a role in mediating a variety of developmental and homeostatic processes in animals, including myogenesis, neurogenesis and possibly metastasis. LARP6 binds to Ca2+/calmodulin-dependent serine protein kinase (CASK), and forms a complex with inhibitor of differentiation transcription factors. It is structurally related to the La autoantigen and contains a La motif (LAM), nuclear localization and export (NLS and NES) signals, and an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain)
