identifier: CDD:cd22966
label: "dimerization/docking (D/D) domain found in the DPY30 domain-containing protein (DYDC)-like family. The DYDC-like family includes DYDC1 and DYDC2, as well as Chlamydomonas reinhardtii flagellar radial spoke protein 2 (RSP2) and similar proteins. DYDC1 plays a crucial role during acrosome biogenesis. RSP2 is a calmodulin binding spoke stalk protein required for motility in Chlamydomonas reinhardtii. It binds calmodulin in a calcium-dependent manner. Members of this family contain an N-terminal domain that shows high sequence similarity to the dimerization/docking (D/D) domain of protein DPY-30/SDC1."
definition: >-
  dimerization/docking (D/D) domain found in the DPY30 domain-containing protein (DYDC)-like family. The DYDC-like family includes DYDC1 and DYDC2, as well as Chlamydomonas reinhardtii flagellar radial spoke protein 2 (RSP2) and similar proteins. DYDC1 plays a crucial role during acrosome biogenesis. RSP2 is a calmodulin binding spoke stalk protein required for motility in Chlamydomonas reinhardtii. It binds calmodulin in a calcium-dependent manner. Members of this family contain an N-terminal domain that shows high sequence similarity to the dimerization/docking (D/D) domain of protein DPY-30/SDC1. — an NCBI CDD conserved domain (cd22966); members share this curated model.
