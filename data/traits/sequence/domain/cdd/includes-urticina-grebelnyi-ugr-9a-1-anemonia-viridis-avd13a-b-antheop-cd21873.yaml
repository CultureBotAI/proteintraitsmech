identifier: CDD:cd21873
label: Ugr_9a-1-like
definition: >-
  includes Urticina grebelnyi Ugr 9a-1, Anemonia viridis Avd13a/b, Antheopsis maculata Amc1a peptide actitoxins. This model includes novel peptides isolated from venom of the sea anemone and include Urticina grebelnyi Ugr 9a-1 (also called pi-anemonetoxin (pi-AnmTX) Ugr 9a-1 or Pi-actitoxin-Ugr1a or Ugr 9-1), Antheopsis maculate Amc1a (also called delta-actitoxin-Amc1a, Delta-AITX-Amc1a, AnmTX Ama 9a-1 or peptide toxins Am-1) and Anemonia viridis Avd13b (also called U-actitoxin-Avd13b, AnmTX Avi 9a-1, or peptide toxin AV-2). These peptides belong to structural group 9a. Ugr 9a-1 has an uncommon beta-hairpin structure, stabilized by two S-S bridges. Its precursor protein appears to be processed in the following sequence: release of the signal peptide and of the propeptide, production of six identical 34-residue peptides by cleavage between Arg and Glu, release of four N-terminal and three C-terminal residues from each peptide and hydroxylation of each Pro in position 6 of the resulting 27-residue peptides. Ugr1a has been shown to produce a reversible inhibition effect on both the transient and the sustained current of human acid-sensing ion channel 3 (ASIC3) channels expressed in Xenopus laevis oocytes; it completely blocks the transient component and partially (48%) inhibits the amplitude of the sustained component. In mice, it significantly reversed inflammatory and acid-induced pain
