identifier: CDD:cd16805
label: "RING finger, H2 subclass, found in RING finger protein 150 (RNF150) and similar proteins. RNF150 is a RING finger protein and its polymorphisms may be associated with chronic obstructive pulmonary disease (COPD) risk in the Chinese population. Further studies with larger numbers of participants worldwide are needed for validation of the relationships between RNF150 genetic variants and the pathogenesis of COPD. RNF150 contains an N-terminal signal peptide, a protease-associated (PA) domain, a transmembrane (TM) domain and a C-terminal C3H2C3-type RING-H2 finger domain followed by a putative PEST sequence."
definition: >-
