identifier: CDD:cd16475
label: "RING finger, H2 subclass, found in RING finger proteins RNF121, RNF175 and similar proteins. This subfamily includes RNF121, RNF175 and similar proteins. RNF121 is an E3-ubiquitin ligase present in the endoplasmic reticulum (ER) and cis-Golgi compartments. It is a novel regulator of apoptosis. It also facilitates the degradation and membrane localization of voltage-gated sodium (NaV) channels, and thus plays a role in the quality control of NaV channels during their synthesis and subsequent transport to the membrane. Moreover, RNF121 acts as a broad regulator of nuclear factor kappaB (NF-kappaB) signaling since its silencing also dampens NF-kappaB activation following stimulation of toll-like receptors (TLRs), nod-like receptors (NLRs), RIG-I-like Receptors (RLRs) or after DNA damage. RNF121 contains five conserved transmembrane (TM) domains and a C3H2C2-type RING-H2 finger. RNF175 is an uncharacterized RING finger protein that shows high sequence similarity with RNF121. This family also includes Arabidopsis RING finger E3 ligase RHA2A, RHA2B, and their homologs. RHA2A is a positive regulator of abscisic acid (ABA) signaling during seed germination and early seedling development. RHA2B may play a role in the ubiquitin-dependent proteolysis pathway that respond to proteasome inhibition. All subfamily members contain a C3H2C3-type RING-H2 finger, which is responsible for E3-ubiquitin ligase activity."
definition: >-
  RING finger, H2 subclass, found in RING finger proteins RNF121, RNF175 and similar proteins. This subfamily includes RNF121, RNF175 and similar proteins. RNF121 is an E3-ubiquitin ligase present in the endoplasmic reticulum (ER) and cis-Golgi compartments. It is a novel regulator of apoptosis. It also facilitates the degradation and membrane localization of voltage-gated sodium (NaV) channels, and thus plays a role in the quality control of NaV channels during their synthesis and subsequent transport to the membrane. Moreover, RNF121 acts as a broad regulator of nuclear factor kappaB (NF-kappaB) signaling since its silencing also dampens NF-kappaB activation following stimulation of toll-like receptors (TLRs), nod-like receptors (NLRs), RIG-I-like Receptors (RLRs) or after DNA damage. RNF121 contains five conserved transmembrane (TM) domains and a C3H2C2-type RING-H2 finger. RNF175 is an uncharacterized RING finger protein that shows high sequence similarity with RNF121. This family also includes Arabidopsis RING finger E3 ligase RHA2A, RHA2B, and their homologs. RHA2A is a positive regulator of abscisic acid (ABA) signaling during seed germination and early seedling development. RHA2B may play a role in the ubiquitin-dependent proteolysis pathway that respond to proteasome inhibition. All subfamily members contain a C3H2C3-type RING-H2 finger, which is responsible for E3-ubiquitin ligase activity. — an NCBI CDD conserved domain (cd16475); members share this curated model.
