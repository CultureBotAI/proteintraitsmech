identifier: CDD:cd23614
label: "extracellular domain (ECD) found in bone morphogenetic protein receptor type-2 (BMPR-2) and similar proteins. BMPR2 (EC 2.7.11.30, also called BMP type-2 receptor, or bone morphogenetic protein receptor type II (BMPR-II), or BMP type II receptor) on ligand binding forms a receptor complex consisting of two type II and two type I transmembrane serine/threonine kinases. Type II receptors phosphorylate and activate type I receptors which autophosphorylate, then bind and activate SMAD transcriptional regulators. BMPR2 binds to BMP7, BMP2, and less efficiently, BMP4. The binding is weak, but enhanced by the presence of type I receptors for BMPs. It also mediates the induction of adipogenesis by GDF6. This model corresponds to the extracellular domain (ECD) of BMPR2, which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in bone morphogenetic protein receptor type-2 (BMPR-2) and similar proteins. BMPR2 (EC 2.7.11.30, also called BMP type-2 receptor, or bone morphogenetic protein receptor type II (BMPR-II), or BMP type II receptor) on ligand binding forms a receptor complex consisting of two type II and two type I transmembrane serine/threonine kinases. Type II receptors phosphorylate and activate type I receptors which autophosphorylate, then bind and activate SMAD transcriptional regulators. BMPR2 binds to BMP7, BMP2, and less efficiently, BMP4. The binding is weak, but enhanced by the presence of type I receptors for BMPs. It also mediates the induction of adipogenesis by GDF6. This model corresponds to the extracellular domain (ECD) of BMPR2, which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23614); members share this curated model.
