identifier: CDD:cd00441
label: "FAD binding domain in molybdenum-containing dehydrogenases whose members include xanthine dehydrogenase (XDH), aldehyde oxidase, and carbon monoxide dehydrogenase (COH). These enzymes contain one molybdopterin (MPT) cofactor, two distinct [2Fe-2S] centers, and one FAD cofactor and have highly similar folds despite differences in subunit composition: mammalian XDH and AO forms homodimers, bacterial XDH forms a heterotetramer, and that of COH forms a dimer of trimers. XDH catalyzes the oxidation of hypoxanthine to xanthine followed by oxidation of xanthine to uric acid with concomitant reduction of NAD+. Upon substrate oxidation at the molybdopterin center, electrons are transferred across the two [2Fe-2S] clusters to the FAD where either NAD+ or molecular oxygen is reduced. CO dehydrogenase catalyzes the oxidation of CO with H2O, yielding CO2, two electrons, and two H+. AO oxidizes an aldehyde with H2O and O2 into an acid and H2O2."
definition: >-
  FAD binding domain in molybdenum-containing dehydrogenases whose members include xanthine dehydrogenase (XDH), aldehyde oxidase, and carbon monoxide dehydrogenase (COH). These enzymes contain one molybdopterin (MPT) cofactor, two distinct [2Fe-2S] centers, and one FAD cofactor and have highly similar folds despite differences in subunit composition: mammalian XDH and AO forms homodimers, bacterial XDH forms a heterotetramer, and that of COH forms a dimer of trimers. XDH catalyzes the oxidation of hypoxanthine to xanthine followed by oxidation of xanthine to uric acid with concomitant reduction of NAD+. Upon substrate oxidation at the molybdopterin center, electrons are transferred across the two [2Fe-2S] clusters to the FAD where either NAD+ or molecular oxygen is reduced. CO dehydrogenase catalyzes the oxidation of CO with H2O, yielding CO2, two electrons, and two H+. AO oxidizes an aldehyde with H2O and O2 into an acid and H2O2. — an NCBI CDD conserved domain (cd00441); members share this curated model.
