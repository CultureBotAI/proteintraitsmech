identifier: CDD:cd16935
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Staphylococcus aureus AgrC and Streptococcus pneumoniae ComD which are involved in quorum sensing. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) including Staphylococcus aureus AgrC which is an HK of the accessory gene regulator (agr) quorum sensing two-component regulatory system (TCS) AgrC-AgrA. The agr system plays a part in the transition from persistent to virulent phenotype. This family also includes Streptococcus pneumoniae ComD HK of the ComD-ComE TCS, involved in quorum sensing and genetic competence."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Staphylococcus aureus AgrC and Streptococcus pneumoniae ComD which are involved in quorum sensing. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) including Staphylococcus aureus AgrC which is an HK of the accessory gene regulator (agr) quorum sensing two-component regulatory system (TCS) AgrC-AgrA. The agr system plays a part in the transition from persistent to virulent phenotype. This family also includes Streptococcus pneumoniae ComD HK of the ComD-ComE TCS, involved in quorum sensing and genetic competence. — an NCBI CDD conserved domain (cd16935); members share this curated model.
