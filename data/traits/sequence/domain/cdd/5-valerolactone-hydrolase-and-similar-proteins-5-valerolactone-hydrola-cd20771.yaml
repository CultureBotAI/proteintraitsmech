identifier: CDD:cd20771
label: "5-valerolactone hydrolase and similar proteins. 5-valerolactone hydrolase (CnpC) has been identified as the enzyme responsible for the third step of the degradation pathway for cyclopentanol by Comamonas sp. strain NCIMB 9872. Specifically, it hydrolyzes 5-valerolactone to 5-hydroxyvalerate. It is a member of the nucleophilic attack 6-bladed beta-propeller (N6P) superfamily and is related to vertebrate paraoxonase, an enzyme that hydrolyzes organophosphorous esters."
definition: >-
  5-valerolactone hydrolase and similar proteins. 5-valerolactone hydrolase (CnpC) has been identified as the enzyme responsible for the third step of the degradation pathway for cyclopentanol by Comamonas sp. strain NCIMB 9872. Specifically, it hydrolyzes 5-valerolactone to 5-hydroxyvalerate. It is a member of the nucleophilic attack 6-bladed beta-propeller (N6P) superfamily and is related to vertebrate paraoxonase, an enzyme that hydrolyzes organophosphorous esters. — an NCBI CDD conserved domain (cd20771); members share this curated model.
