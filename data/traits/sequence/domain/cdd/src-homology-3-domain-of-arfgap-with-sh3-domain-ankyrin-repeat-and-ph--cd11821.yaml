identifier: CDD:cd11821
label: "Src homology 3 domain of ArfGAP with SH3 domain, ankyrin repeat and PH domain containing proteins. ASAPs are Arf GTPase activating proteins (GAPs) and they function in regulating cell growth, migration, and invasion. They contain an N-terminal BAR domain, followed by a Pleckstrin homology (PH) domain, an Arf GAP domain, ankyrin (ANK) repeats, and a C-terminal SH3 domain. Vertebrates contain at least three members, ASAP1, ASAP2, and ASAP3, but some ASAP3 proteins do not seem to harbor a C-terminal SH3 domain. ASAP1 and ASAP2 show GTPase activating protein (GAP) activity towards Arf1 and Arf5. They do not show GAP activity towards Arf6, but are able to mediate Arf6 signaling by binding stably to GTP-Arf6. ASAP3 is an Arf6-specific GAP. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of ArfGAP with SH3 domain, ankyrin repeat and PH domain containing proteins. ASAPs are Arf GTPase activating proteins (GAPs) and they function in regulating cell growth, migration, and invasion. They contain an N-terminal BAR domain, followed by a Pleckstrin homology (PH) domain, an Arf GAP domain, ankyrin (ANK) repeats, and a C-terminal SH3 domain. Vertebrates contain at least three members, ASAP1, ASAP2, and ASAP3, but some ASAP3 proteins do not seem to harbor a C-terminal SH3 domain. ASAP1 and ASAP2 show GTPase activating protein (GAP) activity towards Arf1 and Arf5. They do not show GAP activity towards Arf6, but are able to mediate Arf6 signaling by binding stably to GTP-Arf6. ASAP3 is an Arf6-specific GAP. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11821); members share this curated model.
