identifier: CDD:cd11555
label: "uncharacterized nucleobase-cation-symport-1 (NCS1) transporter subfamily; solute-binding domain. NCS1s are essential components of salvage pathways for nucleobases and related metabolites; their known substrates include allantoin, uracil, thiamine, and nicotinamide riboside. NCS1s belong to a superfamily which also contains the solute carrier 5 family sodium/glucose transporters (SLC5s), and solute carrier 6 family neurotransmitter transporters (SLC6s)."
definition: >-
  uncharacterized nucleobase-cation-symport-1 (NCS1) transporter subfamily; solute-binding domain. NCS1s are essential components of salvage pathways for nucleobases and related metabolites; their known substrates include allantoin, uracil, thiamine, and nicotinamide riboside. NCS1s belong to a superfamily which also contains the solute carrier 5 family sodium/glucose transporters (SLC5s), and solute carrier 6 family neurotransmitter transporters (SLC6s). — an NCBI CDD conserved domain (cd11555); members share this curated model.
