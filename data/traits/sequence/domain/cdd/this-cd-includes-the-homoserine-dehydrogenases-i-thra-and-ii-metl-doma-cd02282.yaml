identifier: CDD:cd02282
label: HSDH_I-II
definition: >-
  This CD includes the homoserine dehydrogenases I (ThrA ) and II (MetL) domains (HSDH_I-II) and other related protein domains. In E. coli, the thrA and metL genes encode a bifunctional enzyme (aspartokinase - homoserine dehydrogenase I and II, respectively) required for the biosynthesis of threonine/methionine. Members of this CD appear to contain a Rossmann fold NAD(P)H binding domain and unique catalytic fold with similarities to the glyceraldehyde-3-phosphate dehydrogenase domain; and are members of the NADB_G3PDH superfamily of proteins. The N-terminal, aspartokinase (AA_kinase) domain is not included in this alignment
