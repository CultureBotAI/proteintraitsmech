identifier: CDD:cd12326
label: "RNA recognition motif 1 (RRM1) found in heterogeneous nuclear ribonucleoprotein A0 (hnRNP A0) and similar proteins. This subfamily corresponds to the RRM1 of hnRNP A0 which is a low abundance hnRNP protein that has been implicated in mRNA stability in mammalian cells. It has been identified as the substrate for MAPKAP-K2 and may be involved in the lipopolysaccharide (LPS)-induced post-transcriptional regulation of tumor necrosis factor-alpha (TNF-alpha), cyclooxygenase 2 (COX-2) and macrophage inflammatory protein 2 (MIP-2). hnRNP A0 contains two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), followed by a long glycine-rich region at the C-terminus."
definition: >-
  RNA recognition motif 1 (RRM1) found in heterogeneous nuclear ribonucleoprotein A0 (hnRNP A0) and similar proteins. This subfamily corresponds to the RRM1 of hnRNP A0 which is a low abundance hnRNP protein that has been implicated in mRNA stability in mammalian cells. It has been identified as the substrate for MAPKAP-K2 and may be involved in the lipopolysaccharide (LPS)-induced post-transcriptional regulation of tumor necrosis factor-alpha (TNF-alpha), cyclooxygenase 2 (COX-2) and macrophage inflammatory protein 2 (MIP-2). hnRNP A0 contains two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), followed by a long glycine-rich region at the C-terminus. — an NCBI CDD conserved domain (cd12326); members share this curated model.
