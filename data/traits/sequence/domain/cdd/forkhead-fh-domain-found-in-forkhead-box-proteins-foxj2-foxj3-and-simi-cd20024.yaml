identifier: CDD:cd20024
label: FH_FOXJ2-like
definition: >-
  Forkhead (FH) domain found in Forkhead box proteins, FOXJ2, FOXJ3 and similar proteins. The FOXJ2-like subfamily includes two winged helix transcription factors, FOXJ2 and FOXJ3. FOXJ2, also called Forkhead homologous X (FHX), plays an important role in tumorigenesis, progression, and metastasis of certain cancers. It acts as a transcriptional activator that can bind to two different type of DNA binding sites. FOXJ3 is a transcription factor which regulates sperm function. It transcriptionally activates Mef2c and regulates adult skeletal muscle fiber type identity. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'
