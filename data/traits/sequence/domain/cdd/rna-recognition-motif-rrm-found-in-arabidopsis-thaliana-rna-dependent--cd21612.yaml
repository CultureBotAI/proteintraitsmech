identifier: CDD:cd21612
label: "RNA recognition motif (RRM) found in Arabidopsis thaliana RNA-dependent RNA polymerase 1 (AtRDRP1) and similar proteins. AtRDRP1, also called RNA-directed RNA polymerase 1, is an RNA-dependent direct polymerase involved in antiviral silencing. It is required for the biogenesis of viral secondary siRNAs, process that follows the production of primary siRNAs derived from viral RNA replication. Members in this family contain an RNA recognition motif (RRM), also called RBD (RNA binding domain) or RNP (ribonucleoprotein domain)."
definition: >-
  RNA recognition motif (RRM) found in Arabidopsis thaliana RNA-dependent RNA polymerase 1 (AtRDRP1) and similar proteins. AtRDRP1, also called RNA-directed RNA polymerase 1, is an RNA-dependent direct polymerase involved in antiviral silencing. It is required for the biogenesis of viral secondary siRNAs, process that follows the production of primary siRNAs derived from viral RNA replication. Members in this family contain an RNA recognition motif (RRM), also called RBD (RNA binding domain) or RNP (ribonucleoprotein domain). — an NCBI CDD conserved domain (cd21612); members share this curated model.
