identifier: CDD:cd23836
label: DRWD-C_CENP-O
definition: >-
  C-terminal double-RWD domain of centromere protein O (CENP-O) and related proteins. CENP-O, also called interphase centromere complex protein 36 (ICEN36), or MCM21R, is a component of the CENPA-CAD (nucleosome distal) complex, a complex recruited to centromeres which is involved in assembly of kinetochore proteins, mitotic progression, and chromosome segregation. It may be involved in incorporation of newly synthesized CENPA into centromeres via its interaction with the CENPA-NAC complex. It modulates the kinetochore-bound levels of NDC80 complex. CENP-O contains two RWD domains, also known as a double-RWD domain, DRWD, which is involved in interactions with other kinetochore proteins. The model corresponds to the C-terminal double-RWD domain (DRWD-C)
