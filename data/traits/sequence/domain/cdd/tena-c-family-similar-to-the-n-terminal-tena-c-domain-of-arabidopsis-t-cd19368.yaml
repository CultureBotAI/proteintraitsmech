identifier: CDD:cd19368
label: "TenA_C family similar to the N-terminal TenA_C domain of Arabidopsis thaliana thiamine requiring 2. This TenA family belongs to the TenA_C class as it has a conserved active site Cys residue; the double Glu residues identified in the active site of TenA_E from the archaeon Pyrococcus furiosus is conserved in this family. TenA_C proteins (EC 3.5.99.2) catalyze the hydrolysis of the thiamin breakdown product 4-amino-5-amino-methyl-2-methylpyrimidine (amino-HMP) to 4-amino-5-hydroxymethyl-2-methylpyrimidine (HMP) in a thiamin salvage pathway. Arabidopsis thaliana TH2 is an orphan enzyme thiamin monophosphate phosphatase which has a haloacid dehalogenase (HAD) family domain fused to its TenA_C domain, it's TenA_C domain has thiamin salvage hydrolase activity against amino-HMP. This family includes mostly uncharacterized single-domain TenA_C- like proteins; some however have additional domains such as a HAD family domain or a kinase domain It has also been suggested that TenA proteins act as transcriptional regulators based on changes in gene-expression patterns when TenA is overexpressed in Bacillus subtilis, however this effect may be indirect."
definition: >-
  TenA_C family similar to the N-terminal TenA_C domain of Arabidopsis thaliana thiamine requiring 2. This TenA family belongs to the TenA_C class as it has a conserved active site Cys residue; the double Glu residues identified in the active site of TenA_E from the archaeon Pyrococcus furiosus is conserved in this family. TenA_C proteins (EC 3.5.99.2) catalyze the hydrolysis of the thiamin breakdown product 4-amino-5-amino-methyl-2-methylpyrimidine (amino-HMP) to 4-amino-5-hydroxymethyl-2-methylpyrimidine (HMP) in a thiamin salvage pathway. Arabidopsis thaliana TH2 is an orphan enzyme thiamin monophosphate phosphatase which has a haloacid dehalogenase (HAD) family domain fused to its TenA_C domain, it's TenA_C domain has thiamin salvage hydrolase activity against amino-HMP. This family includes mostly uncharacterized single-domain TenA_C- like proteins; some however have additional domains such as a HAD family domain or a kinase domain It has also been suggested that TenA proteins act as transcriptional regulators based on changes in gene-expression patterns when TenA is overexpressed in Bacillus subtilis, however this effect may be indirect. — an NCBI CDD conserved domain (cd19368); members share this curated model.
