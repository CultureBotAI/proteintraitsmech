identifier: CDD:cd13433
label: "Inactivation gate of the voltage-gated sodium channel alpha subunits. This region is part of the intracellular linker between domains III and IV of the alpha subunits of voltage-gated sodium channels. It is responsible for fast inactivation of the channel and essential for proper physiological function."
