identifier: CDD:cd16911
label: "AfaD-like family of invasins. This family consists of Escherichia coli AfaD, Salmonella SafA and SafD, Yersinia pestis PsaA, Yersinia enterocolitica MyfA, and similar proteins. The afa gene clusters encode an afimbrial adhesive sheath produced by Escherichia coli. The adhesive sheath is composed of two proteins, AfaD and AfaE, which are independently exposed at the bacterial cell surface. AfaE is required for bacterial adhesion to HeLa cells and AfaD for the uptake of adherent bacteria into these cells. Saf-pilin pilus formation proteins SafA and SafD are the major and minor subunits, respectively, of Saf pili, which are often found in clinical isolates of Salmonella and are assembled by the chaperone-usher secretion pathway. PsaA and MyfA are the major subunits of pH 6 antigen (Psa) and Myf fimbrial homopolymers. Also included is the enteroaggregative Escherichia coli AAF/IV pilus tip protein, which is implicated in adhesion as well. During fimbria/pili assembly, polymerization occurs when the N-terminal extension (NTE) of one AfaD-like family monomer is inserted into an adjacent monomer, providing the final beta strand or G-strand, to complete the Ig-like fold, in a mechanism called the donor-strand complementation (DSC) or donor-strand exchange (DSE)."
definition: >-
  AfaD-like family of invasins. This family consists of Escherichia coli AfaD, Salmonella SafA and SafD, Yersinia pestis PsaA, Yersinia enterocolitica MyfA, and similar proteins. The afa gene clusters encode an afimbrial adhesive sheath produced by Escherichia coli. The adhesive sheath is composed of two proteins, AfaD and AfaE, which are independently exposed at the bacterial cell surface. AfaE is required for bacterial adhesion to HeLa cells and AfaD for the uptake of adherent bacteria into these cells. Saf-pilin pilus formation proteins SafA and SafD are the major and minor subunits, respectively, of Saf pili, which are often found in clinical isolates of Salmonella and are assembled by the chaperone-usher secretion pathway. PsaA and MyfA are the major subunits of pH 6 antigen (Psa) and Myf fimbrial homopolymers. Also included is the enteroaggregative Escherichia coli AAF/IV pilus tip protein, which is implicated in adhesion as well. During fimbria/pili assembly, polymerization occurs when the N-terminal extension (NTE) of one AfaD-like family monomer is inserted into an adjacent monomer, providing the final beta strand or G-strand, to complete the Ig-like fold, in a mechanism called the donor-strand complementation (DSC) or donor-strand exchange (DSE). — an NCBI CDD conserved domain (cd16911); members share this curated model.
