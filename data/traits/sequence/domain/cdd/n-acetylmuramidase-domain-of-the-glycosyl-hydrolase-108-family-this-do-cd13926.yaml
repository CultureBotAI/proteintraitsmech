identifier: CDD:cd13926
label: "N-acetylmuramidase domain of the glycosyl hydrolase 108 family. This domain acts as a lysozyme (N-acetylmuramidase), EC:3.2.1.17. It contains a conserved EGGY motif near the N-terminus, the glutamic acid within this motif is essential for catalytic activity. In bacteria, it may activate the secretion of large proteins via the breaking and rearrangement of the peptidoglycan layer during secretion. It is frequently found at the N-terminus of proteins containing a peptidoglycan binding domain."
definition: >-
  N-acetylmuramidase domain of the glycosyl hydrolase 108 family. This domain acts as a lysozyme (N-acetylmuramidase), EC:3.2.1.17. It contains a conserved EGGY motif near the N-terminus, the glutamic acid within this motif is essential for catalytic activity. In bacteria, it may activate the secretion of large proteins via the breaking and rearrangement of the peptidoglycan layer during secretion. It is frequently found at the N-terminus of proteins containing a peptidoglycan binding domain. — an NCBI CDD conserved domain (cd13926); members share this curated model.
