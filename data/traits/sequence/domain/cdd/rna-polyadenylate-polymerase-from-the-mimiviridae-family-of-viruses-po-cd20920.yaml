identifier: CDD:cd20920
label: "RNA polyadenylate polymerase from the Mimiviridae family of viruses. Poly(A) polymerases (PAPs) catalyze the attachment of adenylates to the 3' ends of messenger RNA and other RNAs, forming poly(A) tails. PAP acts as a nucleic acid template-independent NMP-transferase, preferentially utilizing a single species of NTP, namely ATP. The polyadenylation state of an mRNA may correlate with the efficiency of its translation. PAPs from Acanthamoeba polyphaga mimivirus and Megavirus chiliensis, which belong to the Mimiviridae family, are homodimeric and intrinsically self-processive, generating >700 nucleotides long poly(A) tails. Homodimerization is required for PAP activity; monomers are able to bind RNA but are enzymatically inactive. Thus, while other PAPs form heterodimers with processivity factors, the Mimiviridae PAPs become processive upon homodimerization. mRNA polyadenylation in Mimiviridae occurs at hairpin-forming palindromic sequences terminating viral transcripts. The catalytic subunit of Mimiviridae PAPs contains two topologically identical subdomains with a nucleotidyltransferase fold, suggesting that an ancestral duplication was at the origin of these viral PAPs."
definition: >-
  RNA polyadenylate polymerase from the Mimiviridae family of viruses. Poly(A) polymerases (PAPs) catalyze the attachment of adenylates to the 3' ends of messenger RNA and other RNAs, forming poly(A) tails. PAP acts as a nucleic acid template-independent NMP-transferase, preferentially utilizing a single species of NTP, namely ATP. The polyadenylation state of an mRNA may correlate with the efficiency of its translation. PAPs from Acanthamoeba polyphaga mimivirus and Megavirus chiliensis, which belong to the Mimiviridae family, are homodimeric and intrinsically self-processive, generating >700 nucleotides long poly(A) tails. Homodimerization is required for PAP activity; monomers are able to bind RNA but are enzymatically inactive. Thus, while other PAPs form heterodimers with processivity factors, the Mimiviridae PAPs become processive upon homodimerization. mRNA polyadenylation in Mimiviridae occurs at hairpin-forming palindromic sequences terminating viral transcripts. The catalytic subunit of Mimiviridae PAPs contains two topologically identical subdomains with a nucleotidyltransferase fold, suggesting that an ancestral duplication was at the origin of these viral PAPs. — an NCBI CDD conserved domain (cd20920); members share this curated model.
