identifier: CDD:cd08174
label: "Glycerol-1-phosphate dehydrogenase-like. These glycerol-1-phosphate dehydrogenase-like proteins have not been characterized. The protein sequences have high similarity with that of glycerol-1-phosphate dehydrogenase (G1PDH) which plays a role in the synthesis of phosphoglycerolipids in Gram-positive bacterial species. It catalyzes the reversibly reduction of dihydroxyacetone phosphate (DHAP) to glycerol-1-phosphate (G1P) in a NADH-dependent manner. Its activity requires Ni++ ion."
definition: >-
  Glycerol-1-phosphate dehydrogenase-like. These glycerol-1-phosphate dehydrogenase-like proteins have not been characterized. The protein sequences have high similarity with that of glycerol-1-phosphate dehydrogenase (G1PDH) which plays a role in the synthesis of phosphoglycerolipids in Gram-positive bacterial species. It catalyzes the reversibly reduction of dihydroxyacetone phosphate (DHAP) to glycerol-1-phosphate (G1P) in a NADH-dependent manner. Its activity requires Ni++ ion. — an NCBI CDD conserved domain (cd08174); members share this curated model.
