identifier: CDD:cd09622
label: "DOMON-like type 9 carbohydrate binding module at the N-terminus of bacterial sensor histidine kinases. Family 9 carbohydrate-binding modules (CBM9) play a role in the microbial degradation of cellulose and hemicellulose (materials found in plants). The domain has previously been called cellulose-binding domain. The polysaccharide binding sites of CBMs with available 3D structure have been found to be either flat surfaces with interactions formed by predominantly aromatic residues (tryptophan and tyrosine), or extended shallow grooves. CBM9 domains found in this family are located at the N-terminus of bacterial sensor histidine kinases and may constitute or contribute to the ligand-binding moiety."
definition: >-
  DOMON-like type 9 carbohydrate binding module at the N-terminus of bacterial sensor histidine kinases. Family 9 carbohydrate-binding modules (CBM9) play a role in the microbial degradation of cellulose and hemicellulose (materials found in plants). The domain has previously been called cellulose-binding domain. The polysaccharide binding sites of CBMs with available 3D structure have been found to be either flat surfaces with interactions formed by predominantly aromatic residues (tryptophan and tyrosine), or extended shallow grooves. CBM9 domains found in this family are located at the N-terminus of bacterial sensor histidine kinases and may constitute or contribute to the ligand-binding moiety. — an NCBI CDD conserved domain (cd09622); members share this curated model.
