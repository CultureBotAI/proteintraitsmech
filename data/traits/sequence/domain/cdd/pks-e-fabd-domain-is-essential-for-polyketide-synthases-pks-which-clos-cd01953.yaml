identifier: CDD:cd01953
label: PKS_E
definition: >-
  PKS_E. FabD domain is essential for polyketide synthases (PKS) which closely related to fatty acid synthases (FAS).Both are multifunctional enzymes with the same ancestral enzymatic domain structure. Type I PKS are large modular enzyme systems which catalyse the biosynthesis of microcyclic polyketide products through an assembly line of active sites.Individual domains act upon the growing chain and transfer it to downstream domains through a phosphopantetheine linkage. The enediyne PKS (PKSE) is proposed to be involved in the formation of the highly reactive chromophore ring structure (or "warhead") found in all enediynes
