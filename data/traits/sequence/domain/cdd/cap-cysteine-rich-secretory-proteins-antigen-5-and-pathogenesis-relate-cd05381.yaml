identifier: CDD:cd05381
label: "CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain of pathogenesis-related protein 1 (PR-1) family proteins. Members of pathogenesis-related protein 1 (PR-1) family  are among the most abundantly produced proteins in plants on pathogen attack. They are considered hallmarks of hypersensitive response/defense pathways and may act as anti-fungal agents or be involved in cell wall loosening."
definition: >-
  CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain of pathogenesis-related protein 1 (PR-1) family proteins. Members of pathogenesis-related protein 1 (PR-1) family are among the most abundantly produced proteins in plants on pathogen attack. They are considered hallmarks of hypersensitive response/defense pathways and may act as anti-fungal agents or be involved in cell wall loosening. — an NCBI CDD conserved domain (cd05381); members share this curated model.
