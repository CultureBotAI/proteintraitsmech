identifier: CDD:cd00360
label: uL6
definition: >-
  Ribosomal protein L6. uL6, also known as Ribosomal Protein (RP)L6, is universally present in the large subunit of prokaryotic (RPL6) and eukaryotic (RPL9) ribosomes. RPL9 has an unusual structure, comprising two compact globular domains connected by an alpha-helix. RPL9 contains RNA-binding site which interacts with domain V of 23S rRNA. RPL9 is also participate in ribosomal hopping
