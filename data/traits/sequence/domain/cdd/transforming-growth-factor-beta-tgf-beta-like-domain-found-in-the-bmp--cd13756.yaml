identifier: CDD:cd13756
label: TGF_beta_BMPs_GDFs
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in the BMP/GDF family. The BMP/GDF family consists of bone morphogenetic proteins (BMPs), growth and differentiation factors (GDFs) and similar proteins. BMPs are a group of growth factors also known as cytokines and as metabologens. They induce the formation of bone and cartilage and functions as pivotal morphogenetic signals, orchestrating tissue architecture throughout the body. GDFs have functions predominantly in development
