identifier: CDD:cd18326
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 7A (ZBTB7A). ZBTB7A is also called factor binding IST protein 1 (FBI-1), factor that binds to inducer of short transcripts protein 1, HIV-1 1st-binding protein 1, Leukemia/lymphoma-related factor (LRF), POZ and Krueppel erythroid myeloid ontogenic factor, POK erythroid myeloid ontogenic factor, Pokemon, TTF-I-interacting peptide 21 (TIP21), or zinc finger protein 857A (ZNF857A). It is a transcription repressor of key glycolytic genes, including GLUT3, PFKP, and PKM, and its downregulation in human cancer contributes to tumor metabolism. It has been implicated in carcinogenesis and cell differentiation and development. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 7A (ZBTB7A). ZBTB7A is also called factor binding IST protein 1 (FBI-1), factor that binds to inducer of short transcripts protein 1, HIV-1 1st-binding protein 1, Leukemia/lymphoma-related factor (LRF), POZ and Krueppel erythroid myeloid ontogenic factor, POK erythroid myeloid ontogenic factor, Pokemon, TTF-I-interacting peptide 21 (TIP21), or zinc finger protein 857A (ZNF857A). It is a transcription repressor of key glycolytic genes, including GLUT3, PFKP, and PKM, and its downregulation in human cancer contributes to tumor metabolism. It has been implicated in carcinogenesis and cell differentiation and development. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18326); members share this curated model.
