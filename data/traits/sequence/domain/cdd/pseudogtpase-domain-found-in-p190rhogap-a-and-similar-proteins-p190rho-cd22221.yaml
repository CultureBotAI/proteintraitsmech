identifier: CDD:cd22221
label: "pseudoGTPase domain found in p190RhoGAP-A and similar proteins. p190RhoGAP protein A (p190RhoGAP-A), also called Rho GTPase-activating protein 35(RHOGAP35), glucocorticoid receptor DNA-binding factor 1, or glucocorticoid receptor repression factor 1 (GRF-1), or Rho GAP p190A, or p190-A, is a Rho family GTPase-activating protein (GAP) that acts as a key regulator of Rho GTPase signaling and is essential for actin cytoskeletal structure and contractility. It binds several acidic phospholipids which inhibits the Rho GAP activity to promote the Rac GAP activity. This model corresponds to the GTPase-like domain called pseudoGTPase domain that is located at the middle region of p190RhoGAP-A. Rho family GTPase-activating proteins normally have five highly conserved sequence motifs, termed 'G-motifs', required for nucleotide-binding and catalytic activity. PseudoGTPases would consist of a GTPase fold lacking one or more of these G motifs."
definition: >-
  pseudoGTPase domain found in p190RhoGAP-A and similar proteins. p190RhoGAP protein A (p190RhoGAP-A), also called Rho GTPase-activating protein 35(RHOGAP35), glucocorticoid receptor DNA-binding factor 1, or glucocorticoid receptor repression factor 1 (GRF-1), or Rho GAP p190A, or p190-A, is a Rho family GTPase-activating protein (GAP) that acts as a key regulator of Rho GTPase signaling and is essential for actin cytoskeletal structure and contractility. It binds several acidic phospholipids which inhibits the Rho GAP activity to promote the Rac GAP activity. This model corresponds to the GTPase-like domain called pseudoGTPase domain that is located at the middle region of p190RhoGAP-A. Rho family GTPase-activating proteins normally have five highly conserved sequence motifs, termed 'G-motifs', required for nucleotide-binding and catalytic activity. PseudoGTPases would consist of a GTPase fold lacking one or more of these G motifs. — an NCBI CDD conserved domain (cd22221); members share this curated model.
