identifier: CDD:cd17792
label: CtkA
definition: >-
  serine/threonine-protein kinase CtkA and similar proteins. The Helicobacter pylori serine/threonine-protein kinase CtkA (proinflammatory kinase), encoded by the jhp940 gene, has been shown to be secreted by the bacterium and to induce cytokines in gastric epithelial cells. It may play a role in chronic gastric inflammation. CtkA autophosphorylates itself at a threonine residue near the N-terminus and it translocates into cultured human cells. It also enhances phosphorylation of the NF-kappaB p65 subunit at Ser276 in human epithelial cancer cells; phosphorylation at this position is known to activate the transcriptional activity of NF-kappaB
