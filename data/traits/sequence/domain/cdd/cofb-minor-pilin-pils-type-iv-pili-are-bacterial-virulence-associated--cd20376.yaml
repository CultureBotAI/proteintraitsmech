identifier: CDD:cd20376
label: CofB_minor_pilin
definition: >-
  CofB_minor_pilin. PilS; Type IV pili are bacterial virulence-associated adhesins that promote bacterial attachment to host cells. In Salmonella typhi, the structural pilin protein PilS interacts with the cystic fibrosis transmembrane conductance regulator. Mutagenesis studies suggest that residues on an alpha-beta loop and the C terminal disulphide-bonded region of PilS might be involved in binding specificity of the pilus.4QSA_minor_pilin_25-259
