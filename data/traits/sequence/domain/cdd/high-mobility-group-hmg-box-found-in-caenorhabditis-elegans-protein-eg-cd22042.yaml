identifier: CDD:cd22042
label: "high mobility group (HMG)-box found in Caenorhabditis elegans protein egg laying defective 13 (EGL-13) and similar proteins. EGL-13 may act as a transcription factor that is required for uterine cell fate decisions in Caenorhabditis elegans. It controls genes required for the specification and differentiation of O(2) and CO(2)-sensing neurons and for maintaining URX sensory neuronal cell fate."
definition: >-
