identifier: CDD:cd15690
label: "PHD finger 1 found in D4, zinc and double PHD fingers family 1 (DPF1). DPF1, also termed zinc finger protein neuro-d4, or BRG1-associated factor 45B (BAF45B), is encoded by a neuro specific gene, neuro-d4. It may be involved in the transcription regulation of neuro specific gene clusters. DPF1 contains a nuclear localization signal in the N-terminal region, a Cys2His2 (C2H2) zinc finger or Kruppel-type zinc-finger and a sequence of negatively charged amino acids in the central, and a cysteine/histidine-rich region that is composed of two adjacent plant homeodomain (PHD)-fingers (d4-domain) in the C-terminal part of the molecule. The family corresponds to the first PHD finger."
definition: >-
  PHD finger 1 found in D4, zinc and double PHD fingers family 1 (DPF1). DPF1, also termed zinc finger protein neuro-d4, or BRG1-associated factor 45B (BAF45B), is encoded by a neuro specific gene, neuro-d4. It may be involved in the transcription regulation of neuro specific gene clusters. DPF1 contains a nuclear localization signal in the N-terminal region, a Cys2His2 (C2H2) zinc finger or Kruppel-type zinc-finger and a sequence of negatively charged amino acids in the central, and a cysteine/histidine-rich region that is composed of two adjacent plant homeodomain (PHD)-fingers (d4-domain) in the C-terminal part of the molecule. The family corresponds to the first PHD finger. — an NCBI CDD conserved domain (cd15690); members share this curated model.
