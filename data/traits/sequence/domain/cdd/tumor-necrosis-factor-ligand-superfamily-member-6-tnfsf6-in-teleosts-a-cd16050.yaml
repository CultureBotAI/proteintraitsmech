  Tumor necrosis factor ligand superfamily member 6 (TNFSF6) in teleosts, also known as FasL. This family contains TNFSF6 (also known as Fas ligand or FasL, Faslg, gld, CD178, CD95L, CD95-L, PT1LG1), a cytokine involved in cell death, found in teleosts. The interaction of FasL with its receptor TNFRSF6 (also known as fas cell surface death receptor (FasR) or Fas, APT1, CD95, FAS1, APO-1, FASTM, ALPS1A) regulates many of the physiological and pathological processes of programmed cell death (apoptosis). FasL plays a critical role in the induction of apoptosis in cancer cells as well as other cells. Fas/FasL-mediated apoptosis is controlled by various signaling molecules; Fas/FasL binding promotes the recruitment of death domain and activation of Caspase 8 and Caspase 3 to execute the apoptotic events. Apoptosis is necessary for the proper notochord development in vertebrates, and the apoptotic pathway mediated by Fas and FasL has been shown to be involved in notochord cells regression. Chordoma, a rare malignant tumor that recapitulates the notochord phenotype is understood to derive from notochord remnants not correctly regressed during development. Functional studies of fas and fasl homologs genes during notochord formation in the zebrafish indicate that FAS/FASL expression is dysregulated in chordoma and that the downstream Caspase 8 and 3 are mostly inactive in the Skull Bases (SBCs) analyzed, thus implicating FAS/FASL in chordoma tumorigenesis. FasL-like molecules have been identified in lymphocytes, monocyte-macrophages and acidophilic granulocytes, in teleost fish such as gilthead seabream channel catfish, and their phylogenetical and functional implications have been studied, strengthening the suggestion that ectothermic vertebrates possess the molecular machinery required to trigger apoptosis by the FasR/FasL pathway, similar to their mammalian counterparts. — an NCBI CDD conserved domain (cd16050); members share this curated model.
