identifier: CDD:cd16936
label: "Histidine kinase-like ATPase domain of RsbW, an anti sigma-B factor and serine-protein kinase involved in regulating sigma-B during stress in Bacilli, and related domains. This family includes histidine kinase-like ATPase (HATPase) domain of RsbW, an anti sigma-B factor as well as a serine-protein kinase involved in regulating sigma-B during stress in Bacilli. The alternative sigma factor sigma-B is an important regulator of the general stress response of Bacillus cereus and B. subtilis. RsbW is an anti-sigma factor while RsbV is an anti-sigma factor antagonist (anti-anti-sigma factor). RsbW can also act as a kinase on RsbV. In a partner-switching mechanism, RsbW, RsbV, and sigma-B participate as follows: in non-stressed cells, sigma-B is present in an inactive form complexed with RsbW; in this form, sigma-B is unable to bind to RNA polymerase. Under stress, RsbV binds to RsbW, forming an RsbV-RsbW complex, and sigma-B is released to bind to RNA polymerase. RsbW may then act as a kinase on RsbV, phosphorylating a serine residue; RsbW is then released to bind to sigma-B, hence blocking its ability to bind RNA polymerase. A phosphatase then dephosphorylates RsbV so that it can again form a complex with RsbW, leading to the release of sigma-B."
definition: >-
  Histidine kinase-like ATPase domain of RsbW, an anti sigma-B factor and serine-protein kinase involved in regulating sigma-B during stress in Bacilli, and related domains. This family includes histidine kinase-like ATPase (HATPase) domain of RsbW, an anti sigma-B factor as well as a serine-protein kinase involved in regulating sigma-B during stress in Bacilli. The alternative sigma factor sigma-B is an important regulator of the general stress response of Bacillus cereus and B. subtilis. RsbW is an anti-sigma factor while RsbV is an anti-sigma factor antagonist (anti-anti-sigma factor). RsbW can also act as a kinase on RsbV. In a partner-switching mechanism, RsbW, RsbV, and sigma-B participate as follows: in non-stressed cells, sigma-B is present in an inactive form complexed with RsbW; in this form, sigma-B is unable to bind to RNA polymerase. Under stress, RsbV binds to RsbW, forming an RsbV-RsbW complex, and sigma-B is released to bind to RNA polymerase. RsbW may then act as a kinase on RsbV, phosphorylating a serine residue; RsbW is then released to bind to sigma-B, hence blocking its ability to bind RNA polymerase. A phosphatase then dephosphorylates RsbV so that it can again form a complex with RsbW, leading to the release of sigma-B. — an NCBI CDD conserved domain (cd16936); members share this curated model.
