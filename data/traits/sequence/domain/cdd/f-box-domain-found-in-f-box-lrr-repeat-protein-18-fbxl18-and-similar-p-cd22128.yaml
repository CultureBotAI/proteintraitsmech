identifier: CDD:cd22128
label: "F-box domain found in F-box/LRR-repeat protein 18 (FBXL18) and similar proteins. FBXL18, also called F-box and leucine-rich repeat protein 18, is a substrate-recognition component of the SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It promotes glioma progression by promoting K63-linked ubiquitination of Akt. It targets leucine-rich repeat kinase 2 (LRRK2) for proteasomal degradation and attenuates cell toxicity. FBXL18 also regulates apoptosis by mediating ubiquitin-dependent proteasomal degradation of the pro-apoptotic protein FBXL7 that may impact cellular processes involved in cell cycle progression. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box/LRR-repeat protein 18 (FBXL18) and similar proteins. FBXL18, also called F-box and leucine-rich repeat protein 18, is a substrate-recognition component of the SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It promotes glioma progression by promoting K63-linked ubiquitination of Akt. It targets leucine-rich repeat kinase 2 (LRRK2) for proteasomal degradation and attenuates cell toxicity. FBXL18 also regulates apoptosis by mediating ubiquitin-dependent proteasomal degradation of the pro-apoptotic protein FBXL7 that may impact cellular processes involved in cell cycle progression. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22128); members share this curated model.
