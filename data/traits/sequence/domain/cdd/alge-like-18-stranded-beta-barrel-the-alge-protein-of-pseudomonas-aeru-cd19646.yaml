identifier: CDD:cd19646
label: "AlgE-like 18-stranded beta-barrel. The AlgE protein of Pseudomonas aeruginosa is an outer membrane export channel which along with inner membrane proteins, Alg8 and Alg44, transports alginate across the outter membrane.  AlgE is a monomeric 18-stranded beta-barrel characterized by a highly electropositive pore constriction formed by an arginine-rich conduit that is thought to act as a selectivity filter for the negatively charged alginate polymer.  Unlike most other substrate-specific outer membrane proteins where a clear passage through the channel is observed, AlgE's pore constriction is occluded on either side by extracellular loop L2 and an unusually long periplasmic loop, T8 which is thought to regulate AlgE. P. aeruginosa is the predominant pathogen associated with chronic lung infection among cystic fibrosis patients. Alginate production contributes to the persistence of these infections by facilitating microcolony formation during biofilm development, protecting the bacteria from opsonic phagocytosis, and limiting the toxicity of oxygen radicals produced by host macrophages."
definition: >-
  AlgE-like 18-stranded beta-barrel. The AlgE protein of Pseudomonas aeruginosa is an outer membrane export channel which along with inner membrane proteins, Alg8 and Alg44, transports alginate across the outter membrane. AlgE is a monomeric 18-stranded beta-barrel characterized by a highly electropositive pore constriction formed by an arginine-rich conduit that is thought to act as a selectivity filter for the negatively charged alginate polymer. Unlike most other substrate-specific outer membrane proteins where a clear passage through the channel is observed, AlgE's pore constriction is occluded on either side by extracellular loop L2 and an unusually long periplasmic loop, T8 which is thought to regulate AlgE. P. aeruginosa is the predominant pathogen associated with chronic lung infection among cystic fibrosis patients. Alginate production contributes to the persistence of these infections by facilitating microcolony formation during biofilm development, protecting the bacteria from opsonic phagocytosis, and limiting the toxicity of oxygen radicals produced by host macrophages. — an NCBI CDD conserved domain (cd19646); members share this curated model.
