identifier: CDD:cd22107
label: F-box_FBXO38
definition: >-
  F-box domain found in F-box only protein 38 (FBXO38) and similar proteins. FBXO38, also called FBX38, or modulator of KLF7 activity (MoKA), is part of an SCF (SKP1-cullin-F-box) protein ligase complex. It may coactivate the transcription factor Kruppel-like factor 7 (KLF7), but does not seem to promote KLF7 ubiquitination. FBXO38 acts as a crucial regulator of programmed cell death protein-1 (PD-1) protein turnover in T cells by mediating PD-1 ubiquitination and regulating anti-tumor immunity of T cells. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression
