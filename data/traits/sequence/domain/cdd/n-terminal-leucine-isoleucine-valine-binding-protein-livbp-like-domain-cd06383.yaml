identifier: CDD:cd06383
label: "N-terminal leucine-isoleucine-valine binding protein (LIVBP)-like domain of uncharacterized AMPA-like receptors. N-terminal leucine-isoleucine-valine binding protein (LIVBP)-like domain of uncharacterized AMPA-like receptors. While this N-terminal domain belongs to the periplasmic-binding fold type 1 superfamily, the glutamate-binding domain of the iGluR is structurally homologous to the periplasmic-binding fold type 2. The LIVBP-like domain of iGluRs is thought to play a role in the initial assembly of iGluR subunits, but it is not well understood how this domain is arranged and functions in intact iGluR. AMPA receptors consist of four types of subunits (GluR1, GluR2, GluR3, and GluR4) which combine to form a tetramer and play an important roles in mediating the rapid excitatory synaptic current."
definition: >-
  N-terminal leucine-isoleucine-valine binding protein (LIVBP)-like domain of uncharacterized AMPA-like receptors. N-terminal leucine-isoleucine-valine binding protein (LIVBP)-like domain of uncharacterized AMPA-like receptors. While this N-terminal domain belongs to the periplasmic-binding fold type 1 superfamily, the glutamate-binding domain of the iGluR is structurally homologous to the periplasmic-binding fold type 2. The LIVBP-like domain of iGluRs is thought to play a role in the initial assembly of iGluR subunits, but it is not well understood how this domain is arranged and functions in intact iGluR. AMPA receptors consist of four types of subunits (GluR1, GluR2, GluR3, and GluR4) which combine to form a tetramer and play an important roles in mediating the rapid excitatory synaptic current. — an NCBI CDD conserved domain (cd06383); members share this curated model.
