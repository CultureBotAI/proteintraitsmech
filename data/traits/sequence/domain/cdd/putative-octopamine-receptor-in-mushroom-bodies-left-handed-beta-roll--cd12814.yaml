identifier: CDD:cd12814
label: "Putative octopamine receptor in mushroom bodies, left-handed beta-roll. This poorly characterized group contains domains related to the left-handed beta-roll domains of cell surface adhesion proteins, virulence factors, and ice-binding proteins. This group contains proteins identified as a octopamine receptor in mushroom bodies (OAMB) of Culex quinquefasciatus."
definition: >-
  Putative octopamine receptor in mushroom bodies, left-handed beta-roll. This poorly characterized group contains domains related to the left-handed beta-roll domains of cell surface adhesion proteins, virulence factors, and ice-binding proteins. This group contains proteins identified as a octopamine receptor in mushroom bodies (OAMB) of Culex quinquefasciatus. — an NCBI CDD conserved domain (cd12814); members share this curated model.
