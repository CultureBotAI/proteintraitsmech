identifier: CDD:cd16120
label: "Ubiquitin regulatory domain X (UBX) found in FAS associated factor 2 (FAF2, also known as UBXN3B) and similar proteins. UBX domain-containing protein 3B (UBXN3B), also termed protein ETEA, or FAF2, or UBX domain-containing protein 8 (UBXD8), belongs to the UBXD family of proteins that contains the ubiquitin regulatory domain X (UBX) with a beta-grasp ubiquitin-like fold, but without the C-terminal double glycine motif. UBX domain is typically located at the carboxyl terminus of proteins, and participates broadly in the regulation of protein degradation. FAF2 functions as a cofactor of p97 (also known as VCP or Cdc48), which is a homohexameric AAA ATPase (ATPase associated with a variety of activities) involved in a variety of functions ranging from cell-cycle regulation to membrane fusion and protein degradation. The p97-UBXD8 complex destabilizes mRNA by promoting release of ubiquitinated the RNA-binding protein HuR from messenger ribonucleoprotein (mRNP). Moreover, FAF2 is the translation product of a highly expressed gene in the T-cells and eosinophils of atopic dermatitis patients compared with those of normal individuals. A yeast two-hybrid assay showed that FAF2 can interact with Fas."
definition: >-
  Ubiquitin regulatory domain X (UBX) found in FAS associated factor 2 (FAF2, also known as UBXN3B) and similar proteins. UBX domain-containing protein 3B (UBXN3B), also termed protein ETEA, or FAF2, or UBX domain-containing protein 8 (UBXD8), belongs to the UBXD family of proteins that contains the ubiquitin regulatory domain X (UBX) with a beta-grasp ubiquitin-like fold, but without the C-terminal double glycine motif. UBX domain is typically located at the carboxyl terminus of proteins, and participates broadly in the regulation of protein degradation. FAF2 functions as a cofactor of p97 (also known as VCP or Cdc48), which is a homohexameric AAA ATPase (ATPase associated with a variety of activities) involved in a variety of functions ranging from cell-cycle regulation to membrane fusion and protein degradation. The p97-UBXD8 complex destabilizes mRNA by promoting release of ubiquitinated the RNA-binding protein HuR from messenger ribonucleoprotein (mRNP). Moreover, FAF2 is the translation product of a highly expressed gene in the T-cells and eosinophils of atopic dermatitis patients compared with those of normal individuals. A yeast two-hybrid assay showed that FAF2 can interact with Fas. — an NCBI CDD conserved domain (cd16120); members share this curated model.
