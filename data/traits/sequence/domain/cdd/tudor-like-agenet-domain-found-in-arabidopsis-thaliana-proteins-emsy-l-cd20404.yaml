identifier: CDD:cd20404
label: "Tudor-like Agenet domain found in  Arabidopsis thaliana proteins EMSY-LIKE 1-4 (AtEML1-4) and similar proteins. This family includes Arabidopsis thaliana proteins EMSY-LIKE 1-4 (AtEML1-4), histone-lysine N-methyltransferase trithorax-like proteins ATX1-2 (AtATX1-2), histone-lysine N-methyltransferase ASHH3, DNA mismatch repair protein MSH6, and similar proteins. EMSY-like proteins contain an EMSY N-terminal domain, a central Tudor-like Agenet domain, and a C-terminal coiled-coil motif. AtEML1, AtEML2, and likely AtEML4, contribute to RPP7-mediated immunity. Besides this, AtEML1 and AtEML2 participate in a second EDM2-dependent function and affect floral transition. ATX-like proteins are plant counterparts of the Drosophila melanogaster trithorax (TRX) and mammalian mixed-lineage leukemia (MLL1) proteins. ATX1, also called protein SET domain group 27, or trithorax-homolog protein 1 (TRX-homolog protein 1), is a methyltransferase that trimethylates histone H3 at lysine 4 (H3K4me3). It also acts as a histone modifier and as a positive effector of gene expression. ATX1regulates transcription from diverse classes of genes implicated in biotic and abiotic stress responses. It is involved in dehydration stress signaling in both abscisic acid (ABA)-dependent and ABA-independent pathways. ATX2, also called protein SET domain group 30, or trithorax-homolog protein 2 (TRX-homolog protein 2), is involved in dimethylating histone H3 at lysine 4 (H3K4me2). Both ATX1 and ATX2 are multi-domain proteins that consist of an N-terminal Tudor-like Agenet domain, a PWWP domain, FYRN- and FYRC (DAST, domain associated with SET in trithorax) domains, a canonical plant homeodomain (PHD) domain, a non-canonical extended PHD (ePHD) domain, and a C-terminal SET domain. ASHR3, also called protein SET DOMAIN GROUP 7, functions as a histone-lysine N-methyltransferase (EC 2.1.1.43). It contains a SET domain and a Tudor-like Agenet domain. AtMSH6, also called MutS protein homolog 6, is a component of the post-replicative DNA mismatch repair system (MMR). It forms a heterodimer with MutS alpha (MSH2-MSH6 heterodimer) which binds to DNA mismatches thereby initiating DNA repair. AtMSH6 contains a Tudor-like Agenet domain and a MutS domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor-like Agenet domain found in Arabidopsis thaliana proteins EMSY-LIKE 1-4 (AtEML1-4) and similar proteins. This family includes Arabidopsis thaliana proteins EMSY-LIKE 1-4 (AtEML1-4), histone-lysine N-methyltransferase trithorax-like proteins ATX1-2 (AtATX1-2), histone-lysine N-methyltransferase ASHH3, DNA mismatch repair protein MSH6, and similar proteins. EMSY-like proteins contain an EMSY N-terminal domain, a central Tudor-like Agenet domain, and a C-terminal coiled-coil motif. AtEML1, AtEML2, and likely AtEML4, contribute to RPP7-mediated immunity. Besides this, AtEML1 and AtEML2 participate in a second EDM2-dependent function and affect floral transition. ATX-like proteins are plant counterparts of the Drosophila melanogaster trithorax (TRX) and mammalian mixed-lineage leukemia (MLL1) proteins. ATX1, also called protein SET domain group 27, or trithorax-homolog protein 1 (TRX-homolog protein 1), is a methyltransferase that trimethylates histone H3 at lysine 4 (H3K4me3). It also acts as a histone modifier and as a positive effector of gene expression. ATX1regulates transcription from diverse classes of genes implicated in biotic and abiotic stress responses. It is involved in dehydration stress signaling in both abscisic acid (ABA)-dependent and ABA-independent pathways. ATX2, also called protein SET domain group 30, or trithorax-homolog protein 2 (TRX-homolog protein 2), is involved in dimethylating histone H3 at lysine 4 (H3K4me2). Both ATX1 and ATX2 are multi-domain proteins that consist of an N-terminal Tudor-like Agenet domain, a PWWP domain, FYRN- and FYRC (DAST, domain associated with SET in trithorax) domains, a canonical plant homeodomain (PHD) domain, a non-canonical extended PHD (ePHD) domain, and a C-terminal SET domain. ASHR3, also called protein SET DOMAIN GROUP 7, functions as a histone-lysine N-methyltransferase (EC 2.1.1.43). It contains a SET domain and a Tudor-like Agenet domain. AtMSH6, also called MutS protein homolog 6, is a component of the post-replicative DNA mismatch repair system (MMR). It forms a heterodimer with MutS alpha (MSH2-MSH6 heterodimer) which binds to DNA mismatches thereby initiating DNA repair. AtMSH6 contains a Tudor-like Agenet domain and a MutS domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20404); members share this curated model.
