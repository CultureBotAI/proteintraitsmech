identifier: CDD:cd01775
label: "Ras-associating (RA) domain found in PH domain leucine-rich repeat-containing protein phosphatases, fungal adenylate cyclase, and similar proteins. PHLPP represents a novel family of Ser/Thr protein phosphatases, which is involved in two key signaling pathways, the phosphatidylinositol 3-kinase and diacylglycerol signaling pathways, by directly dephosphorylating and inactivating Akt serine-threonine kinases (Akt1, Akt2, Akt3) and protein kinase C (PKC) isoforms. PHLPP contains a putative Ras-associating (RA) domain followed by a pleckstrin homology (PH) domain, a series of leucine-rich repeats and a protein phosphatase 2C (PP2C) domain. Fungal adenylate cyclase regulates developmental processes such as hyphal growth, biofilm formation, and phenotypic switching. It plays an essential role in regulation of cellular metabolism by catalyzing the synthesis of a second messenger, cAMP. Fungal adenylate cyclase has at least four domains, including an N-terminal adenylate cyclase G-alpha binding domain, a Ras-associating (RA) domain, a middle leucine-rich repeat region, and a catalytic domain. The RA domain of adenylate cyclase post-translationally modifies a small GTPase called Ras, which is involved in cellular signal transduction. The activity of adenylate cyclase is stimulated directly by regulatory proteins (Ras1 and Gpa2), peptidoglycan fragments and carbon dioxide."
definition: >-
  Ras-associating (RA) domain found in PH domain leucine-rich repeat-containing protein phosphatases, fungal adenylate cyclase, and similar proteins. PHLPP represents a novel family of Ser/Thr protein phosphatases, which is involved in two key signaling pathways, the phosphatidylinositol 3-kinase and diacylglycerol signaling pathways, by directly dephosphorylating and inactivating Akt serine-threonine kinases (Akt1, Akt2, Akt3) and protein kinase C (PKC) isoforms. PHLPP contains a putative Ras-associating (RA) domain followed by a pleckstrin homology (PH) domain, a series of leucine-rich repeats and a protein phosphatase 2C (PP2C) domain. Fungal adenylate cyclase regulates developmental processes such as hyphal growth, biofilm formation, and phenotypic switching. It plays an essential role in regulation of cellular metabolism by catalyzing the synthesis of a second messenger, cAMP. Fungal adenylate cyclase has at least four domains, including an N-terminal adenylate cyclase G-alpha binding domain, a Ras-associating (RA) domain, a middle leucine-rich repeat region, and a catalytic domain. The RA domain of adenylate cyclase post-translationally modifies a small GTPase called Ras, which is involved in cellular signal transduction. The activity of adenylate cyclase is stimulated directly by regulatory proteins (Ras1 and Gpa2), peptidoglycan fragments and carbon dioxide. — an NCBI CDD conserved domain (cd01775); members share this curated model.
