identifier: CDD:cd14758
label: "Globin sensor domain, coupled to DGC/GGDEF domains; uncharacterized subgroup. Globin-coupled-sensors belonging to this subfamily have a sensor domain coupled to a C-terminal diguanylate cyclase (DGC/GGDEF) domain. DGC/GGDEF likely functions as a c-di-GMP cyclase in the synthesis of the second messenger cyclic-di-GMP (c-di-GMP)."
definition: >-
  Globin sensor domain, coupled to DGC/GGDEF domains; uncharacterized subgroup. Globin-coupled-sensors belonging to this subfamily have a sensor domain coupled to a C-terminal diguanylate cyclase (DGC/GGDEF) domain. DGC/GGDEF likely functions as a c-di-GMP cyclase in the synthesis of the second messenger cyclic-di-GMP (c-di-GMP). — an NCBI CDD conserved domain (cd14758); members share this curated model.
