identifier: CDD:cd17624
label: "phosphoacceptor receiver (REC) domain of PmrA-like OmpR family response regulators. This subfamily contains various OmpR family response regulators including PmrA, BasR, QseB, tctD, and RssB, which are components of two-component regulatory systems (TCSs). The PmrA/PmrB TCS controls transcription of genes that are involved in lipopolysaccharide modification in the outer membrane of bacteria, increasing bacterial resistance to host-derived antimicrobial peptides. The BasS/BasR TCS functions as an iron- and zinc-sensing transcription regulator. The QseB/QseC TCS activates the flagella regulon by activating transcription of FlhDC. The RssA/RssB TCS regulates swarming behavior in Serratia marcescens. OmpR family DNA-binding response regulators contain N-terminal receiver (REC) and C-terminal DNA-binding winged helix-turn-helix effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of PmrA-like OmpR family response regulators. This subfamily contains various OmpR family response regulators including PmrA, BasR, QseB, tctD, and RssB, which are components of two-component regulatory systems (TCSs). The PmrA/PmrB TCS controls transcription of genes that are involved in lipopolysaccharide modification in the outer membrane of bacteria, increasing bacterial resistance to host-derived antimicrobial peptides. The BasS/BasR TCS functions as an iron- and zinc-sensing transcription regulator. The QseB/QseC TCS activates the flagella regulon by activating transcription of FlhDC. The RssA/RssB TCS regulates swarming behavior in Serratia marcescens. OmpR family DNA-binding response regulators contain N-terminal receiver (REC) and C-terminal DNA-binding winged helix-turn-helix effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17624); members share this curated model.
