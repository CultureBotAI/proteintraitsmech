identifier: CDD:cd07091
label: "ALDH subfamily: ALDH families 1and 2, including 10-formyltetrahydrofolate dehydrogenase, NAD+-dependent retinal dehydrogenase 1 and related proteins. ALDH subfamily which includes the NAD+-dependent retinal dehydrogenase 1 (RALDH 1, ALDH1, EC=1.2.1.36), also known as aldehyde dehydrogenase family 1 member A1 (ALDH1A1), in humans, a homotetrameric, cytosolic enzyme that catalyzes the oxidation of retinaldehyde to retinoic acid. Human ALDH1B1 and ALDH2 are also in this cluster; both are mitochrondrial homotetramers which play important roles in acetaldehyde oxidation; ALDH1B1 in response to UV light exposure and ALDH2 during ethanol metabolism. 10-formyltetrahydrofolate dehydrogenase (FTHFDH, EC=1.5.1.6), also known as aldehyde dehydrogenase family 1 member L1 (ALDH1L1), in humans, a multi-domain homotetramer with an N-terminal formyl transferase domain and a C-terminal ALDH domain. FTHFDH catalyzes an NADP+-dependent dehydrogenase reaction resulting in the conversion of 10-formyltetrahydrofolate to tetrahydrofolate and CO2. Also included in this subfamily is the Arabidosis aldehyde dehydrogenase family 2 members B4 and B7 (EC=1.2.1.3), which are mitochondrial, homotetramers that oxidize acetaldehyde and glycolaldehyde, as well as, the Arabidosis cytosolic, homotetramer ALDH2C4 (EC=1.2.1.3), an enzyme involved in the oxidation of sinapalehyde and coniferaldehyde. Also included is the AldA aldehyde dehydrogenase  of Aspergillus nidulans (locus AN0554),  the aldehyde dehydrogenase 2 (YMR170c, ALD5, EC=1.2.1.5) of Saccharomyces cerevisiae, and other similar sequences."
definition: >-
