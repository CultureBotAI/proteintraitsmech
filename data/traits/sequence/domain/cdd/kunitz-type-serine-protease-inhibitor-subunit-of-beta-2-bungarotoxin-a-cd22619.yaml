identifier: CDD:cd22619
label: "Kunitz-type serine protease inhibitor subunit of beta 2-bungarotoxin, and similar proteins. This model includes the Kunitz inhibitor subunit of beta 2-bungarotoxin, a presynaptic neurotoxin of the Bungarus multicinctus venom. Beta-bungarotoxin is a heterodimeric neurotoxin consisting of a phospholipase subunit linked by a disulfide bond to the Kunitz protease inhibitor subunit; the latter subunit is homologous to venom basic protease inhibitors but has no protease inhibitor activity and is non-toxic. The beta-bungarotoxin Kunitz subunit serves to guide the toxin to its site of action on the presynaptic membrane by virtue of a high-affinity interaction with a specific subclass of voltage-sensitive potassium channels. This subfamily also includes Kunitz-type serine protease inhibitor homolog beta-bungarotoxin B1 chain and protease inhibitor-like protein 1 (PILP-1). The B1 chain also has no protease inhibitor activity but blocks voltage-gated potassium channels, while PILP-1 inhibits trypsin. The structures of these domains are similar to those of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  Kunitz-type serine protease inhibitor subunit of beta 2-bungarotoxin, and similar proteins. This model includes the Kunitz inhibitor subunit of beta 2-bungarotoxin, a presynaptic neurotoxin of the Bungarus multicinctus venom. Beta-bungarotoxin is a heterodimeric neurotoxin consisting of a phospholipase subunit linked by a disulfide bond to the Kunitz protease inhibitor subunit; the latter subunit is homologous to venom basic protease inhibitors but has no protease inhibitor activity and is non-toxic. The beta-bungarotoxin Kunitz subunit serves to guide the toxin to its site of action on the presynaptic membrane by virtue of a high-affinity interaction with a specific subclass of voltage-sensitive potassium channels. This subfamily also includes Kunitz-type serine protease inhibitor homolog beta-bungarotoxin B1 chain and protease inhibitor-like protein 1 (PILP-1). The B1 chain also has no protease inhibitor activity but blocks voltage-gated potassium channels, while PILP-1 inhibits trypsin. The structures of these domains are similar to those of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22619); members share this curated model.
