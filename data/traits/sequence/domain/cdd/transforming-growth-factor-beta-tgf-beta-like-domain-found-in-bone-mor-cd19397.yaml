identifier: CDD:cd19397
label: "transforming growth factor beta (TGF-beta) like domain found in bone morphogenetic protein 7 (BMP-7) and similar proteins. BMP-7, also termed osteogenic protein 1 (OP-1), or eptotermin alfa, induces cartilage and bone formation. It may act as the osteoinductive factor responsible for the phenomenon of epithelial osteogenesis and play a role in calcium regulation and bone homeostasis."
definition: >-
