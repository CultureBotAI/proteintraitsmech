label: "basic helix-loop-helix (bHLH) domain found in oligodendrocyte transcription factor 1 (Oligo1) and similar proteins. Oligo1, also termed Class B basic helix-loop-helix protein 6 (bHLHb6), or Class E basic helix-loop-helix protein 21 (bHLHe21), is a bHLH transcription factor that promotes formation and maturation of oligodendrocytes, especially within the brain."
