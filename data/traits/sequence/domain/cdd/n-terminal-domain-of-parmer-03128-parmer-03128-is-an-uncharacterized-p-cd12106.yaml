identifier: CDD:cd12106
label: PARMER_03128_N
definition: >-
  N-terminal domain of PARMER_03128. PARMER_03128 is an uncharacterized protein from Parabacteroides merdae. This model characterizes its N-terminal domain plus that of related proteins from Bacteroidetes. Structurally, they resemble domains found in streptococcal surface proteins such as SpaP
