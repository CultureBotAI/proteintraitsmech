identifier: CDD:cd10598
label: GSA-HemL
definition: >-
  Pyridoxal phosphate (PLP) dependent enzyme: Glutamine-1-semialdehyde aminotransferase/amionomutase. Glutamine-1-semialdehyde aminotransferase/amionomutase (GSA) family. GSA is the last of three enzymes involved in the metabolic conversion of glutamate to 5-aminolevulinate, which is a precursor in heme and cobalamin biosynthesis. This enzyme is absent from mammals, which instead synthesize aminolevulinate from glycine and succinyl-CoA in a reaction catalyzed by a different enzyme. Because no counterpart of glutamate semialdehyde aminomutase exists in animals, the enzyme is a well known target for selective herbicides and antibacterial agents
