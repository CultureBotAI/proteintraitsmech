identifier: CDD:cd21925
label: "CaMKII recognition domain found in Drosophila melanogaster Ether-a-go-go protein (eag) and similar proteins. Eag is a potassium voltage-gated channel protein that mediates the potassium permeability of membranes; potassium current is regulated by Ca2+/calmodulin-dependent protein kinase II (CaMKII) and CASK. It has a role in growth of the perineurial glial layer of the larval peripheral nerve. The model corresponds to a small conserved region of eag, which is responsible for the canonical CaMKII recognition."
definition: >-
  CaMKII recognition domain found in Drosophila melanogaster Ether-a-go-go protein (eag) and similar proteins. Eag is a potassium voltage-gated channel protein that mediates the potassium permeability of membranes; potassium current is regulated by Ca2+/calmodulin-dependent protein kinase II (CaMKII) and CASK. It has a role in growth of the perineurial glial layer of the larval peripheral nerve. The model corresponds to a small conserved region of eag, which is responsible for the canonical CaMKII recognition. — an NCBI CDD conserved domain (cd21925); members share this curated model.
