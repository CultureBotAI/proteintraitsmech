identifier: CDD:cd10227
label: "nucleotide-binding domain (NBD) of the plasmid segregation protein ParM-like domain family. ParM is a plasmid-encoded bacterial homolog of actin, which polymerizes into filaments similar to F-actin, and plays a vital role in plasmid segregation. ParM filaments segregate plasmids paired at midcell into the individual daughter cells. This subfamily also contains Thermoplasma acidophilum Ta0583, an active ATPase at physiological temperatures, which has a propensity to form filaments. ParM-like proteins belong to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains."
definition: >-
  nucleotide-binding domain (NBD) of the plasmid segregation protein ParM-like domain family. ParM is a plasmid-encoded bacterial homolog of actin, which polymerizes into filaments similar to F-actin, and plays a vital role in plasmid segregation. ParM filaments segregate plasmids paired at midcell into the individual daughter cells. This subfamily also contains Thermoplasma acidophilum Ta0583, an active ATPase at physiological temperatures, which has a propensity to form filaments. ParM-like proteins belong to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains. — an NCBI CDD conserved domain (cd10227); members share this curated model.
