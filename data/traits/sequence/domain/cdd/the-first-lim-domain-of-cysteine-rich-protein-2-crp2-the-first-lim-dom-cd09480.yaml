identifier: CDD:cd09480
label: "The first LIM domain of Cysteine Rich Protein 2 (CRP2). The first LIM domain of Cysteine Rich Protein 2 (CRP2): The CRP family members include CRP1, CRP2, CRP3/MLP and TLP. CRP1, CRP2 and CRP3 share a conserved nuclear targeting signal (K/R-K/R-Y-G-P-K), which supports the fact that these proteins function not only in the cytoplasm but also in the nucleus. CRPs control regulatory pathways during cellular differentiation, and involve in complex transcription circuits, and the organization as well as the arrangement of the myofibrillar/cytoskeletal network. CRP2 specifically binds to protein inhibitor of activated STAT-1 (PIAS1) and a novel human protein designed CRP2BP (for CRP2 binding partner). PIAS1 specifically inhibits the STAT-1 pathway and CRP2BP is homologous to members of the histone acetyltransferase family raising the possibility that CRP2 is a modulator of cytokine-controlled pathways or is functionally active in the transcriptional regulatory network. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes."
definition: >-
  The first LIM domain of Cysteine Rich Protein 2 (CRP2). The first LIM domain of Cysteine Rich Protein 2 (CRP2): The CRP family members include CRP1, CRP2, CRP3/MLP and TLP. CRP1, CRP2 and CRP3 share a conserved nuclear targeting signal (K/R-K/R-Y-G-P-K), which supports the fact that these proteins function not only in the cytoplasm but also in the nucleus. CRPs control regulatory pathways during cellular differentiation, and involve in complex transcription circuits, and the organization as well as the arrangement of the myofibrillar/cytoskeletal network. CRP2 specifically binds to protein inhibitor of activated STAT-1 (PIAS1) and a novel human protein designed CRP2BP (for CRP2 binding partner). PIAS1 specifically inhibits the STAT-1 pathway and CRP2BP is homologous to members of the histone acetyltransferase family raising the possibility that CRP2 is a modulator of cytokine-controlled pathways or is functionally active in the transcriptional regulatory network. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes. — an NCBI CDD conserved domain (cd09480); members share this curated model.
