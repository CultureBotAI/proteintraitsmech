identifier: CDD:cd03734
label: "SOCS (suppressors of cytokine signaling) box of CIS (cytokine-inducible SH2 protein) 1-like proteins. Together with the SOCS proteins, the CIS/SOCS family of proteins is characterized by the presence of a C-terminal SOCS box and a central SH2 domain. CIS1, like SOCS1 and SOCS3, is involved in the down-regulation of the JAK/STAT pathway. CIS1 binds to cytokine receptors at STAT5-docking sites, which prohibits recruitment of STAT5 to the receptor signaling complex and results in the down-regulation of activation by STAT5."
definition: >-
  SOCS (suppressors of cytokine signaling) box of CIS (cytokine-inducible SH2 protein) 1-like proteins. Together with the SOCS proteins, the CIS/SOCS family of proteins is characterized by the presence of a C-terminal SOCS box and a central SH2 domain. CIS1, like SOCS1 and SOCS3, is involved in the down-regulation of the JAK/STAT pathway. CIS1 binds to cytokine receptors at STAT5-docking sites, which prohibits recruitment of STAT5 to the receptor signaling complex and results in the down-regulation of activation by STAT5. — an NCBI CDD conserved domain (cd03734); members share this curated model.
