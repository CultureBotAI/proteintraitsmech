identifier: CDD:cd21611
label: RRM_SpPof8_like
definition: >-
  RNA recognition motif (RRM) found in Schizosaccharomyces pombe protein Pof8 and similar proteins. Pof8 is a La-related protein and a constitutive component of telomerase in fission yeast. It regulates telomerase assembly and poly(a)+TERRA expression in fission yeast. Members in this family contain an RNA recognition motif (RRM), also called RBD (RNA binding domain) or RNP (ribonucleoprotein domain)
