identifier: CDD:cd17471
label: "Sugar efflux transporter (Set) family of the Major Facilitator Superfamily of transporters. This family is composed of sugar transporters such as Escherichia coli Sugar efflux transporter SetA, SetB, SetC and other sugar transporters. SetA, SetB, and SetC are involved in the efflux of sugars such as lactose, glucose, IPTG, and substituted glucosides or galactosides. They may be involved in the detoxification of non-metabolizable sugar analogs. The Set family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Sugar efflux transporter (Set) family of the Major Facilitator Superfamily of transporters. This family is composed of sugar transporters such as Escherichia coli Sugar efflux transporter SetA, SetB, SetC and other sugar transporters. SetA, SetB, and SetC are involved in the efflux of sugars such as lactose, glucose, IPTG, and substituted glucosides or galactosides. They may be involved in the detoxification of non-metabolizable sugar analogs. The Set family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17471); members share this curated model.
