identifier: CDD:cd17374
label: "Organic anion transporters of the Major Facilitator Superfamily of transporters. Organic anion transporters (OATs) generally display broad substrate specificity and they facilitate the exchange of extracellular with intracellular organic anions (OAs). Several OATs have been characterized including OAT1-10 and urate anion exchanger 1 (URAT1, also called SLC22A12). Many OATs occur in renal proximal tubules, the site of active drug secretion. OATs mediate the absorption, distribution, and excretion of a diverse array of environmental toxins, and clinically important drugs, including anti-HIV therapeutics, anti-tumor drugs, antibiotics, anti-hypertensives, and anti-inflammatories, and therefore is critical for the survival of the mammalian species. OAT falls into the SLC22 (solute carrier 22) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Organic anion transporters of the Major Facilitator Superfamily of transporters. Organic anion transporters (OATs) generally display broad substrate specificity and they facilitate the exchange of extracellular with intracellular organic anions (OAs). Several OATs have been characterized including OAT1-10 and urate anion exchanger 1 (URAT1, also called SLC22A12). Many OATs occur in renal proximal tubules, the site of active drug secretion. OATs mediate the absorption, distribution, and excretion of a diverse array of environmental toxins, and clinically important drugs, including anti-HIV therapeutics, anti-tumor drugs, antibiotics, anti-hypertensives, and anti-inflammatories, and therefore is critical for the survival of the mammalian species. OAT falls into the SLC22 (solute carrier 22) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17374); members share this curated model.
