identifier: CDD:cd12790
label: "Ras-GTPase Activating Domain of type A plexins. Plexins form a conserved family of transmembrane receptors for semaphorins and may be the ancestors of semaphorins. They are divided into four types (A-D) according to sequence similarity. In vertebrates, there are four type A plexins (A1-A4) that serve as the co-receptors for neuropilins to mediate the signaling of class 3 semaphorins except Sema3E, which signals through Plexin-D1. Plexins serve as direct receptors for several other members of the semaphorin family: class 1 and class 6 semaphorins signal through type A plexins, which mediate diverse biological functions including axon guidance, cardiovascular development, and immune function. Guanylyl cyclase Gyc76C and Off-track kinase (OTK), a putative receptor tyrosine kinase, modulate Sema1a and Plexin-A mediated axon repulsion. In their complex with Sema6s, type A plexins serve as signal-transducing subunits. An increasing number of molecules that interact with the intracellular region of Plexin-A have been identified; among them are IgCAMs (in axon guidance events) and Trem2-DAP12 (in immune responses). Plexins contain a C-terminal RasGAP domain, which functions as an enhancer of the hydrolysis of GTP that is bound to Ras-GTPases. Plexins display GAP activity towards the Ras homolog Rap. Although the Rho (Ras homolog) GTPases are most closely related to members of the Ras family, RhoGAP and RasGAP show no sequence homology at their amino acid level. RasGTPases function as molecular switches in a large number of of signaling pathways. When bound to GTP they are in the on state and when bound to GDP they are in the off state. The RasGAP domain speeds up the hydrolysis of GTP in Ras-like proteins acting as a negative regulator."
definition: >-
  Ras-GTPase Activating Domain of type A plexins. Plexins form a conserved family of transmembrane receptors for semaphorins and may be the ancestors of semaphorins. They are divided into four types (A-D) according to sequence similarity. In vertebrates, there are four type A plexins (A1-A4) that serve as the co-receptors for neuropilins to mediate the signaling of class 3 semaphorins except Sema3E, which signals through Plexin-D1. Plexins serve as direct receptors for several other members of the semaphorin family: class 1 and class 6 semaphorins signal through type A plexins, which mediate diverse biological functions including axon guidance, cardiovascular development, and immune function. Guanylyl cyclase Gyc76C and Off-track kinase (OTK), a putative receptor tyrosine kinase, modulate Sema1a and Plexin-A mediated axon repulsion. In their complex with Sema6s, type A plexins serve as signal-transducing subunits. An increasing number of molecules that interact with the intracellular region of Plexin-A have been identified; among them are IgCAMs (in axon guidance events) and Trem2-DAP12 (in immune responses). Plexins contain a C-terminal RasGAP domain, which functions as an enhancer of the hydrolysis of GTP that is bound to Ras-GTPases. Plexins display GAP activity towards the Ras homolog Rap. Although the Rho (Ras homolog) GTPases are most closely related to members of the Ras family, RhoGAP and RasGAP show no sequence homology at their amino acid level. RasGTPases function as molecular switches in a large number of of signaling pathways. When bound to GTP they are in the on state and when bound to GDP they are in the off state. The RasGAP domain speeds up the hydrolysis of GTP in Ras-like proteins acting as a negative regulator. — an NCBI CDD conserved domain (cd12790); members share this curated model.
