identifier: CDD:cd22205
label: TBD_CPAP
definition: >-
  tubulin-binding domain (PN2-3) found in centrosomal P4.1-associated protein (CPAP) and similar proteins. CPAP, also called centromere protein J (CENP-J), LAG-3-associated protein (LAP), or LYST-interacting protein 1 (LIP1), plays an important role in cell division and centrosome function by participating in centriole duplication. It inhibits microtubule nucleation from the centrosome and is involved in the regulation of slow processive growth of centriolar microtubules. CPAP comprises a tubulin-binding domain (PN2-3), a positively charged microtubule-binding domain (MBD), a coiled-coil dimerization domain, and a C-terminal G box. The model corresponds to PN2-3 domain that sequesters tubulin dimers and destabilizes microtubules both in vitro and in cells
