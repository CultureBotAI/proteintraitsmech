identifier: CDD:cd07219
label: "Patatin-like phospholipase domain containing protein 1. Members of this family share a patatin domain, initially discovered in potato tubers. Some members of PNPLA1 subfamily do not have the lipase consensus sequence Gly-X-Ser-X-Gly which is essential for hydrolase activity.  This family includes PNPLA1 from Homo sapiens and Gallus gallus. Currently, there is no literature available on the physiological role, structure, or enzymatic activity of PNPLA1. It is expressed in various human tissues in low mRNA levels."
definition: >-
  Patatin-like phospholipase domain containing protein 1. Members of this family share a patatin domain, initially discovered in potato tubers. Some members of PNPLA1 subfamily do not have the lipase consensus sequence Gly-X-Ser-X-Gly which is essential for hydrolase activity. This family includes PNPLA1 from Homo sapiens and Gallus gallus. Currently, there is no literature available on the physiological role, structure, or enzymatic activity of PNPLA1. It is expressed in various human tissues in low mRNA levels. — an NCBI CDD conserved domain (cd07219); members share this curated model.
