identifier: CDD:cd11007
label: "Peptidase M35-like domain of uncharacterized proteins. This family contains proteins similar to the M35 Zn2+-metallopeptidases, also known as the deuterolysin family, presumably these are bacterial metalloendopeptidases that have yet to be characterized. Typically, members of this family of extracellular peptidases contain a unique zinc-binding motif (the aspzincin motif), defined by the HExxH + D motif where an aspartic acid is the third zinc ligand; however, members of this family do not contain the GTXDXXYG motif C-terminal to the His zinc ligands that is typical for the M35 proteases. Deuterolysins are highly active towards basic nuclear proteins such as histones and protamines, with a preference for a Lys or Arg residue in the P1' subsite. MEPs specifically cleave peptidyl-lysine bonds (-X-Lys-) in proteins and peptides. Many members of the M35 peptidases display unusual thermostabilities."
definition: >-
  Peptidase M35-like domain of uncharacterized proteins. This family contains proteins similar to the M35 Zn2+-metallopeptidases, also known as the deuterolysin family, presumably these are bacterial metalloendopeptidases that have yet to be characterized. Typically, members of this family of extracellular peptidases contain a unique zinc-binding motif (the aspzincin motif), defined by the HExxH + D motif where an aspartic acid is the third zinc ligand; however, members of this family do not contain the GTXDXXYG motif C-terminal to the His zinc ligands that is typical for the M35 proteases. Deuterolysins are highly active towards basic nuclear proteins such as histones and protamines, with a preference for a Lys or Arg residue in the P1' subsite. MEPs specifically cleave peptidyl-lysine bonds (-X-Lys-) in proteins and peptides. Many members of the M35 peptidases display unusual thermostabilities. — an NCBI CDD conserved domain (cd11007); members share this curated model.
