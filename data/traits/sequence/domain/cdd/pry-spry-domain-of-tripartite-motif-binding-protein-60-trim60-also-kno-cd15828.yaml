identifier: CDD:cd15828
label: "PRY/SPRY domain of tripartite motif-binding protein 60 (TRIM60) also known as RING finger protein 33 (RNF33). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM60, which is also known as RING finger protein 33 (RNF33) or 129 (RNF129). TRIM60 domains are composed of RING/B-box/coiled-coil core and also known as RBCC proteins. Based on its expression profile, RNF33 likely plays an important role in the spermatogenesis process, the development of the pre-implantation embryo, and in testicular functions; Rnf33 is temporally transcribed in the unfertilized egg and the pre-implantation embryo, and is permanently silenced before the blastocyst stage. Mice experiments have shown that RNF33 associates with the cytoplasmic motor proteins, kinesin-2 family members 3A (KIF3A) and 3B (KIF3B), suggesting possible contribution to cargo movement along the microtubule in the expressed sites."
definition: >-
  PRY/SPRY domain of tripartite motif-binding protein 60 (TRIM60) also known as RING finger protein 33 (RNF33). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM60, which is also known as RING finger protein 33 (RNF33) or 129 (RNF129). TRIM60 domains are composed of RING/B-box/coiled-coil core and also known as RBCC proteins. Based on its expression profile, RNF33 likely plays an important role in the spermatogenesis process, the development of the pre-implantation embryo, and in testicular functions; Rnf33 is temporally transcribed in the unfertilized egg and the pre-implantation embryo, and is permanently silenced before the blastocyst stage. Mice experiments have shown that RNF33 associates with the cytoplasmic motor proteins, kinesin-2 family members 3A (KIF3A) and 3B (KIF3B), suggesting possible contribution to cargo movement along the microtubule in the expressed sites. — an NCBI CDD conserved domain (cd15828); members share this curated model.
