identifier: CDD:cd10352
label: "Src homology 2 (SH2) domain found in alpha2-chimerin and beta2-chimerin proteins. Chimerins are a family of phorbol ester- and diacylglycerol-responsive GTPase-activating proteins. Alpha1-chimerin (formerly known as n-chimerin) and alpha2-chimerin are alternatively spliced products of a single gene, as are beta1- and beta2-chimerin. alpha1- and beta1-chimerin have a relatively short N-terminal region that does not encode any recognizable domains, whereas alpha2- and beta2-chimerin both include a functional SH2 domain that can bind to phosphotyrosine motifs within receptors. All of the isoforms contain a GAP domain with specificity in vitro for Rac1 and a diacylglycerol (DAG)-binding C1 domain which allows them to translocate to membranes in response to DAG signaling and anchors them in close proximity to activated Rac. Other C1 domain-containing diacylglycerol receptors including: PKC, Munc-13 proteins, phorbol ester binding scaffolding proteins involved in Ca2+-stimulated exocytosis, and RasGRPs, diacylglycerol-activated guanine-nucleotide exchange factors (GEFs) for Ras and Rap1. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in alpha2-chimerin and beta2-chimerin proteins. Chimerins are a family of phorbol ester- and diacylglycerol-responsive GTPase-activating proteins. Alpha1-chimerin (formerly known as n-chimerin) and alpha2-chimerin are alternatively spliced products of a single gene, as are beta1- and beta2-chimerin. alpha1- and beta1-chimerin have a relatively short N-terminal region that does not encode any recognizable domains, whereas alpha2- and beta2-chimerin both include a functional SH2 domain that can bind to phosphotyrosine motifs within receptors. All of the isoforms contain a GAP domain with specificity in vitro for Rac1 and a diacylglycerol (DAG)-binding C1 domain which allows them to translocate to membranes in response to DAG signaling and anchors them in close proximity to activated Rac. Other C1 domain-containing diacylglycerol receptors including: PKC, Munc-13 proteins, phorbol ester binding scaffolding proteins involved in Ca2+-stimulated exocytosis, and RasGRPs, diacylglycerol-activated guanine-nucleotide exchange factors (GEFs) for Ras and Rap1. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10352); members share this curated model.
