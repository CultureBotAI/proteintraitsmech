identifier: CDD:cd11514
label: "Na(+)- and Cl(-)-dependent dopamine transporter 1; solute-binding domain. DAT1 (also called DAT), is a plasma membrane transport protein that functions at the dopaminergic synapses to transport dopamine from the extracellular space back into the presynaptic nerve terminal. Human DAT1 is encoded by the SLC6A3 gene, and is expressed in the brain. DAT1 may play a role in diseases or disorders related to dopaminergic neurons, including attention-deficit hyperactivity disorder (ADHD), Tourette syndrome, Parkinson's disease, alcoholism, drug abuse, schizophrenia, extraversion, and risky behavior. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
