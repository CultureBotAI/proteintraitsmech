identifier: CDD:cd05419
label: NT_CCAase_class1
definition: >-
  Nucleotidyltransferase (NT) domain of Sulfolobus shibatae and Archeoglobus fulgidus CCA-adding enzyme, class 1, and related proteins. NT_CCAase_class1: catalytic domain of CCA-adding enzyme [ATP (CTP): tRNA nucleotidyltransferase class 1_like, CCAase]. CCAase in a template-independent reaction adds the precise sequence [cytidine(C)-cytidine-adenosine (A)], one nucleotide at a time, onto the 3prime end of tRNA. The class I group of CCAase enzymes is comprised of archaeal sequences and includes Sulfolobus shibatae (Ss) and Archeoglobus fulgidus (Af) CCA-adding enzyme (SsCCA and AfCCA). AfCCA exists as a dimer in solution. In the absence of tRNA, SsCCA is a homodimer; upon binding two tRNAs it forms a tetramer. CCA addition does not require tRNA-induced tetramerization, and a single subunit of SsCCA adds both C and A. CCA-addition appears to be error free under physiological conditions. Class 1 CCAases are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these 2CCAase_class1 NT domains
