identifier: CDD:cd04051
label: "C2 domain present in Soybean genes Regulated by Cold 2 (SRC2)-like proteins. SRC2 production is a response to pathogen infiltration.  The initial response of increased Ca2+ concentrations are coupled to downstream signal transduction pathways via calcium binding proteins.  SRC2 contains a single C2 domain which localizes to the plasma membrane and is involved in Ca2+ dependent protein binding. C2 domains fold into an 8-standed beta-sandwich that can adopt 2 structural arrangements: Type I and Type II, distinguished by a circular permutation involving their N- and C-terminal beta strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances including bind phospholipids, inositol polyphosphates, and intracellular proteins.  Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1.  However, there are a few exceptions to this including RIM isoforms and some splice variants of piccolo/aczonin and intersectin which only have a single C2 domain.  C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions."
definition: >-
  C2 domain present in Soybean genes Regulated by Cold 2 (SRC2)-like proteins. SRC2 production is a response to pathogen infiltration. The initial response of increased Ca2+ concentrations are coupled to downstream signal transduction pathways via calcium binding proteins. SRC2 contains a single C2 domain which localizes to the plasma membrane and is involved in Ca2+ dependent protein binding. C2 domains fold into an 8-standed beta-sandwich that can adopt 2 structural arrangements: Type I and Type II, distinguished by a circular permutation involving their N- and C-terminal beta strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances including bind phospholipids, inositol polyphosphates, and intracellular proteins. Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1. However, there are a few exceptions to this including RIM isoforms and some splice variants of piccolo/aczonin and intersectin which only have a single C2 domain. C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions. — an NCBI CDD conserved domain (cd04051); members share this curated model.
