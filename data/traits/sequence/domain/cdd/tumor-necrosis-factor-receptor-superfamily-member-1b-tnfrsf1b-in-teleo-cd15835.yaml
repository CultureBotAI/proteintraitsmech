identifier: CDD:cd15835
label: "Tumor necrosis factor receptor superfamily member 1B (TNFRSF1B) in teleost; also known as TNFR2. This subfamily of TNFRSF1B (also known as TNFR2, type 2 TNFR, TNFBR, TNFR80, TNF-R75, TNF-R-II, p75, CD120b) is found in teleosts. It binds TNF-alpha, but lacks the death domain (DD) that is associated with the cytoplasmic domain of TNFRSF1A (TNFR1). It is inducible and expressed exclusively by oligodendrocytes, astrocytes, T cells, thymocytes, myocytes, endothelial cells, and in human mesenchymal stem cells. TNFRSF1B protects oligodendrocyte progenitor cells (OLGs) against oxidative stress, and induces the up-regulation of cell survival genes. While pro-inflammatory and pathogen-clearing activities of TNF are mediated mainly through activation of TNFRSF1A, a strong activator of NF-kappaB, TNFRSF1B is more responsible for suppression of inflammation. Although the affinities of both receptors for soluble TNF are similar, TNFRSF1B is sometimes more abundantly expressed and thought to associate with TNF, thereby increasing its concentration near TNFRSF1A receptors, and making TNF available to activate TNFRSF1A (a ligand-passing mechanism). Knockout studies in zebrafish embryos have shown that a signaling balance between TNFRSF1A and TNFRSF1B is required for endothelial cell integrity. TNFRSF1A signals apoptosis through caspase-8, whereas TNFRSF1B signals survival via NF-kB in endothelial cells. In goldfish (Carassius aurutus L.), TNFRSF1B expression is substantially higher than that of TNFRSF1 in tissues and various immune cell types. Both receptors are most robustly expressed in monocytes; mRNA levels of TNFRSF1B are lowest in peripheral blood leukocytes."
definition: >-
  Tumor necrosis factor receptor superfamily member 1B (TNFRSF1B) in teleost; also known as TNFR2. This subfamily of TNFRSF1B (also known as TNFR2, type 2 TNFR, TNFBR, TNFR80, TNF-R75, TNF-R-II, p75, CD120b) is found in teleosts. It binds TNF-alpha, but lacks the death domain (DD) that is associated with the cytoplasmic domain of TNFRSF1A (TNFR1). It is inducible and expressed exclusively by oligodendrocytes, astrocytes, T cells, thymocytes, myocytes, endothelial cells, and in human mesenchymal stem cells. TNFRSF1B protects oligodendrocyte progenitor cells (OLGs) against oxidative stress, and induces the up-regulation of cell survival genes. While pro-inflammatory and pathogen-clearing activities of TNF are mediated mainly through activation of TNFRSF1A, a strong activator of NF-kappaB, TNFRSF1B is more responsible for suppression of inflammation. Although the affinities of both receptors for soluble TNF are similar, TNFRSF1B is sometimes more abundantly expressed and thought to associate with TNF, thereby increasing its concentration near TNFRSF1A receptors, and making TNF available to activate TNFRSF1A (a ligand-passing mechanism). Knockout studies in zebrafish embryos have shown that a signaling balance between TNFRSF1A and TNFRSF1B is required for endothelial cell integrity. TNFRSF1A signals apoptosis through caspase-8, whereas TNFRSF1B signals survival via NF-kB in endothelial cells. In goldfish (Carassius aurutus L.), TNFRSF1B expression is substantially higher than that of TNFRSF1 in tissues and various immune cell types. Both receptors are most robustly expressed in monocytes; mRNA levels of TNFRSF1B are lowest in peripheral blood leukocytes. — an NCBI CDD conserved domain (cd15835); members share this curated model.
