identifier: CDD:cd14286
label: "UBA domain found in ubiquitin carboxyl-terminal hydrolase 24 (UBP24) and similar proteins. UBP24, also called deubiquitinating enzyme 24, ubiquitin thioesterase 24, or ubiquitin-specific-processing protease 24, is a deubiquitinating protein that interacts with damage-specific DNA-binding protein 2 (DDB2) and regulates DDB2 stability. It may also play a role in the pathogenesis of Parkinson's disease (PD). UBP24 proteins contain an N-terminal ubiquitin-associated (UBA) domain and a C-terminal peptidase C19 domain."
definition: >-
  UBA domain found in ubiquitin carboxyl-terminal hydrolase 24 (UBP24) and similar proteins. UBP24, also called deubiquitinating enzyme 24, ubiquitin thioesterase 24, or ubiquitin-specific-processing protease 24, is a deubiquitinating protein that interacts with damage-specific DNA-binding protein 2 (DDB2) and regulates DDB2 stability. It may also play a role in the pathogenesis of Parkinson's disease (PD). UBP24 proteins contain an N-terminal ubiquitin-associated (UBA) domain and a C-terminal peptidase C19 domain. — an NCBI CDD conserved domain (cd14286); members share this curated model.
