identifier: CDD:cd19200
label: "PR-SET domain found in PR domain zinc finger protein 16 (PRDM16), MDS1 and EVI1 complex locus protein and similar proteins. PRDM16 (also termed PR domain-containing protein 16, transcription factor MEL1, or MDS1/EVI1-like gene 1) functions as a transcriptional regulator. PRDM16 is preferentially expressed by hematopoietic and neuronal stem cells. It is closely related to paralog of PRDM3 (also termed MDS1 and EVI1 complex locus protein, ecotropic virus integration site 1 protein, EVI-1, myelodysplasia syndrome 1 protein, myelodysplasia syndrome-associated protein 1, or MECOM) which is a nuclear transcription factor essential for the proliferation/maintenance of hematopoietic stem cells (HSCs). PRDM3 and PRDM16 are both directly linked to various aspects of oncogenic transformation."
definition: >-
  PR-SET domain found in PR domain zinc finger protein 16 (PRDM16), MDS1 and EVI1 complex locus protein and similar proteins. PRDM16 (also termed PR domain-containing protein 16, transcription factor MEL1, or MDS1/EVI1-like gene 1) functions as a transcriptional regulator. PRDM16 is preferentially expressed by hematopoietic and neuronal stem cells. It is closely related to paralog of PRDM3 (also termed MDS1 and EVI1 complex locus protein, ecotropic virus integration site 1 protein, EVI-1, myelodysplasia syndrome 1 protein, myelodysplasia syndrome-associated protein 1, or MECOM) which is a nuclear transcription factor essential for the proliferation/maintenance of hematopoietic stem cells (HSCs). PRDM3 and PRDM16 are both directly linked to various aspects of oncogenic transformation. — an NCBI CDD conserved domain (cd19200); members share this curated model.
