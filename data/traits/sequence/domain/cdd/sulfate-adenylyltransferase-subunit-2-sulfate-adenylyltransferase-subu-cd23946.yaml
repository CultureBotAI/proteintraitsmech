identifier: CDD:cd23946
label: "Sulfate adenylyltransferase subunit 2. Sulfate adenylyltransferase subunits 1 and 2 form ATP sulfurylase (ATPS) that catalyzes the adenylation of sulfate producing adenosine 5'-phosphosulfate (APS) and diphosphate, the first enzymatic step in the sulfur assimilation pathway. APS synthesis involves the formation of a high-energy phosphoric-sulfuric acid anhydride bond driven by GTP hydrolysis by CysN, coupled to ATP hydrolysis by CysD. CysD belongs to the ATP pyrophosphatase (ATP PPase) family of proteins, members of which include PAPS reductase, GMP synthetase, asparagine synthetase, and NAD(+) synthetase. This subunit is responsible for directly forming APS under control of the G protein. A modified version of the P loop (PP-loop), the fingerprint peptide of mononucleotide-binding proteins, is present in the active site of the protein, which appears to be a positively charged cleft containing a number of conserved arginine and lysine residues."
definition: >-
  Sulfate adenylyltransferase subunit 2. Sulfate adenylyltransferase subunits 1 and 2 form ATP sulfurylase (ATPS) that catalyzes the adenylation of sulfate producing adenosine 5'-phosphosulfate (APS) and diphosphate, the first enzymatic step in the sulfur assimilation pathway. APS synthesis involves the formation of a high-energy phosphoric-sulfuric acid anhydride bond driven by GTP hydrolysis by CysN, coupled to ATP hydrolysis by CysD. CysD belongs to the ATP pyrophosphatase (ATP PPase) family of proteins, members of which include PAPS reductase, GMP synthetase, asparagine synthetase, and NAD(+) synthetase. This subunit is responsible for directly forming APS under control of the G protein. A modified version of the P loop (PP-loop), the fingerprint peptide of mononucleotide-binding proteins, is present in the active site of the protein, which appears to be a positively charged cleft containing a number of conserved arginine and lysine residues. — an NCBI CDD conserved domain (cd23946); members share this curated model.
