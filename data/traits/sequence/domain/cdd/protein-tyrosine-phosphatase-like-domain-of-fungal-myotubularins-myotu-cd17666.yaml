identifier: CDD:cd17666
label: "protein tyrosine phosphatase-like domain of fungal myotubularins. Myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. They dephosphorylate the D-3 position of phosphatidylinositol 3-phosphate [PI(3)P] and phosphatidylinositol 3,5-bisphosphate [PI(3,5)P2], generating phosphatidylinositol and phosphatidylinositol 5-phosphate [PI(5)P], respectively. Not all members are catalytically active proteins, some function as adaptors for the active members."
definition: >-
  protein tyrosine phosphatase-like domain of fungal myotubularins. Myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. They dephosphorylate the D-3 position of phosphatidylinositol 3-phosphate [PI(3)P] and phosphatidylinositol 3,5-bisphosphate [PI(3,5)P2], generating phosphatidylinositol and phosphatidylinositol 5-phosphate [PI(5)P], respectively. Not all members are catalytically active proteins, some function as adaptors for the active members. — an NCBI CDD conserved domain (cd17666); members share this curated model.
