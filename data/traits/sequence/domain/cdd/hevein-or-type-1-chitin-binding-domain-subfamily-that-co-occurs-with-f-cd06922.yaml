identifier: CDD:cd06922
label: "Hevein or Type 1 chitin binding domain subfamily that co-occurs with family 18 glycosyl hydrolases. ChtBD1 is a lectin domain found in proteins from plants and fungi that bind N-acetylglucosamine, plant endochitinases, wound-induced proteins, and the alpha subunit of Kluyveromyces lactis killer toxin. This domain is involved in the recognition and/or binding of chitin subunits; it typically occurs N-terminal to glycosyl hydrolase domains in chitinases, together with other carbohydrate-binding domains, or by itself in tandem-repeat arrangements."
definition: >-
  Hevein or Type 1 chitin binding domain subfamily that co-occurs with family 18 glycosyl hydrolases. ChtBD1 is a lectin domain found in proteins from plants and fungi that bind N-acetylglucosamine, plant endochitinases, wound-induced proteins, and the alpha subunit of Kluyveromyces lactis killer toxin. This domain is involved in the recognition and/or binding of chitin subunits; it typically occurs N-terminal to glycosyl hydrolase domains in chitinases, together with other carbohydrate-binding domains, or by itself in tandem-repeat arrangements. — an NCBI CDD conserved domain (cd06922); members share this curated model.
