identifier: CDD:cd20494
label: "peptidase C58-like domain of cytotoxin RtxA and similar proteins. This subfamily includes the C58 peptidase-like domain of Vibrio vulnificus biotype 3 multifunctional autoprocessing RTX (MARTX) toxin, the primary virulence factor of V. vulnificus. MARTX has been shown to be an essential virulence factor contributing to highly inflammatory skin wounds with severe damage affecting every tissue layer. This toxin is a large single-polypeptide composed of repeat sequences that form a pore in eukaryotic cell plasma membranes for the translocation of centrally located effector domains. This C58 family cysteine protease domain usually contains the invariant C/H/D residues that form an active site triad, however, cysteine is not fully conserved in this group."
definition: >-
  peptidase C58-like domain of cytotoxin RtxA and similar proteins. This subfamily includes the C58 peptidase-like domain of Vibrio vulnificus biotype 3 multifunctional autoprocessing RTX (MARTX) toxin, the primary virulence factor of V. vulnificus. MARTX has been shown to be an essential virulence factor contributing to highly inflammatory skin wounds with severe damage affecting every tissue layer. This toxin is a large single-polypeptide composed of repeat sequences that form a pore in eukaryotic cell plasma membranes for the translocation of centrally located effector domains. This C58 family cysteine protease domain usually contains the invariant C/H/D residues that form an active site triad, however, cysteine is not fully conserved in this group. — an NCBI CDD conserved domain (cd20494); members share this curated model.
