identifier: CDD:cd22586
label: "Rcat domain found in E3 ubiquitin-protein ligase ARI1 and similar proteins. This subfamily contains probable RBR-type E3 ubiquitin-protein ligases (EC 2.3.2.31) including Arabidopsis thaliana ARI1, ARI2, and ARI3. They may function as part of E3 complexes, which accept ubiquitin from E2 ubiquitin-conjugating enzymes and then transfer it to substrates. Members of this subfamily contain an RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. This model corresponds to the Rcat domain of ARI1-like proteins that are essential for RBR E3 ligase activity and adopt the same fold as the BRcat domain."
definition: >-
  Rcat domain found in E3 ubiquitin-protein ligase ARI1 and similar proteins. This subfamily contains probable RBR-type E3 ubiquitin-protein ligases (EC 2.3.2.31) including Arabidopsis thaliana ARI1, ARI2, and ARI3. They may function as part of E3 complexes, which accept ubiquitin from E2 ubiquitin-conjugating enzymes and then transfer it to substrates. Members of this subfamily contain an RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. This model corresponds to the Rcat domain of ARI1-like proteins that are essential for RBR E3 ligase activity and adopt the same fold as the BRcat domain. — an NCBI CDD conserved domain (cd22586); members share this curated model.
