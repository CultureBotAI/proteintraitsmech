identifier: CDD:cd19748
label: "basic helix-loop-helix-orange (bHLH-O) domain found in hairy/enhancer-of-split related with YRPW motif protein 1 (HEY1) and similar proteins. HEY1, also termed cardiovascular helix-loop-helix factor 2 (CHF-2), or Class B basic helix-loop-helix protein 31 (bHLHb31), or HES-related repressor protein 1, or hairy and enhancer of split-related protein 1 (HESR-1), or hairy-related transcription factor 1 (HRT-1), is a bHLH-O transcriptional repressor that acts as an essential downstream effector of the Notch signaling pathway and may play a fundamental role in vascular development. HEY1 also participates several cancer-related pathways. It acts as a positive regulator of the tumor suppressor p53."
definition: >-
  basic helix-loop-helix-orange (bHLH-O) domain found in hairy/enhancer-of-split related with YRPW motif protein 1 (HEY1) and similar proteins. HEY1, also termed cardiovascular helix-loop-helix factor 2 (CHF-2), or Class B basic helix-loop-helix protein 31 (bHLHb31), or HES-related repressor protein 1, or hairy and enhancer of split-related protein 1 (HESR-1), or hairy-related transcription factor 1 (HRT-1), is a bHLH-O transcriptional repressor that acts as an essential downstream effector of the Notch signaling pathway and may play a fundamental role in vascular development. HEY1 also participates several cancer-related pathways. It acts as a positive regulator of the tumor suppressor p53. — an NCBI CDD conserved domain (cd19748); members share this curated model.
