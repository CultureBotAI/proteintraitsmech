identifier: CDD:cd08832
label: "ArfGap with dual PH domains. The ADAP subfamily, ArfGAPs with dual pleckstrin homology (PH) domains, includes two members: ADAP1 and ADAP2. Both ADAP1 (also known as centaurin-alpha1, p42(IP4), or PIP3BP) and ADAP2 (centaurin-alpha2) display a GTPase-activating protein (GAP) activity toward Arf6 (ADP-ribosylation factor 6), which is involved in protein trafficking that regulates endocytic recycling, cytoskeleton remodeling, and neuronal differentiation.  ADAP2 has high sequence similarity to the ADAP1 and they both contain a ArfGAP domain at the N-terminus, followed by two PH domains. However, ADAP1, unlike ADAP2, contains a putative N-terminal nuclear localization signal. The PH domains of ADAP1bind to the two second messenger molecules phosphatidylinositol 3,4,5-trisphosphate (PI(3,4,5)P3) and inositol 1,3,4,5-tetrakisphosphate (I(1,3,4,5)P4) with identical high affinity, whereas those of ADAP2 specifically binds phosphatidylinositol 3,4-bisphosphate (PI(3,4)P2) and PI(3,4,5)P3, which are produced by activated phosphatidylinositol 3-kinase. ADAP1 is predominantly expressed in the brain neurons, while ADAP2 is broadly expressed, including the adipocytes, heart, and skeletal muscle but not in the brain. The limited distribution and high expression of ADAP1 in the brain indicates that ADAP1 is important for neuronal functions. ADAP1 has been shown to highly expressed in the neurons and plagues of Alzheimer's disease patients. In other hand, ADAP2 gene deletion has been shown to cause circulatory deficiencies and heart shape defects in zebrafish, indicating that ADAP2 has a vital role in heart development. Taken together, the hemizygous deletion of ADAP2 gene may be contributing to the cardiovascular malformation in patients with neurofibromatosis type 1 (NF1) microdeletions."
definition: >-
