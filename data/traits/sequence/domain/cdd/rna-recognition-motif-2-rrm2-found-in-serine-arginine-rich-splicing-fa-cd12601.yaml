identifier: CDD:cd12601
label: "RNA recognition motif 2 (RRM2) found in serine/arginine-rich splicing factor SRSF1, SRSF9 and similar proteins. This subfamily corresponds to the RRM2 of serine/arginine-rich splicing factor SRSF1, SRSF9 and similar proteins. SRSF1, also termed ASF-1, is a shuttling SR protein involved in constitutive and alternative splicing, nonsense-mediated mRNA decay (NMD), mRNA export and translation. It also functions as a splicing-factor oncoprotein that regulates apoptosis and proliferation to promote mammary epithelial cell transformation. SRSF9, also termed SRp30C, has been implicated in the activity of many elements that control splice site selection, the alternative splicing of the glucocorticoid receptor beta in neutrophils and in the gonadotropin-releasing hormone pre-mRNA. SRSF9 can also interact with other proteins implicated in alternative splicing, including YB-1, rSLM-1, rSLM-2, E4-ORF4, Nop30, and p32. Both, SRSF1 and SRSF9, contain two N-terminal RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), and a C-terminal RS domains rich in serine-arginine dipeptides."
definition: >-
  RNA recognition motif 2 (RRM2) found in serine/arginine-rich splicing factor SRSF1, SRSF9 and similar proteins. This subfamily corresponds to the RRM2 of serine/arginine-rich splicing factor SRSF1, SRSF9 and similar proteins. SRSF1, also termed ASF-1, is a shuttling SR protein involved in constitutive and alternative splicing, nonsense-mediated mRNA decay (NMD), mRNA export and translation. It also functions as a splicing-factor oncoprotein that regulates apoptosis and proliferation to promote mammary epithelial cell transformation. SRSF9, also termed SRp30C, has been implicated in the activity of many elements that control splice site selection, the alternative splicing of the glucocorticoid receptor beta in neutrophils and in the gonadotropin-releasing hormone pre-mRNA. SRSF9 can also interact with other proteins implicated in alternative splicing, including YB-1, rSLM-1, rSLM-2, E4-ORF4, Nop30, and p32. Both, SRSF1 and SRSF9, contain two N-terminal RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), and a C-terminal RS domains rich in serine-arginine dipeptides. — an NCBI CDD conserved domain (cd12601); members share this curated model.
