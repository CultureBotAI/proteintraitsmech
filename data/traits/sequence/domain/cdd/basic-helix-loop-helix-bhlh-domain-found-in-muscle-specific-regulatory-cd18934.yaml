label: "basic helix-loop-helix (bHLH) domain found in muscle-specific regulatory factor 4 (MRF4) and similar proteins. MRF4, also termed Class C basic helix-loop-helix protein 4 (bHLHc4), or myogenic factor 6 (Myf-6), is a bHLH transcription factor associated with myogenesis. It plays a role in skeletal muscle differentiation."
