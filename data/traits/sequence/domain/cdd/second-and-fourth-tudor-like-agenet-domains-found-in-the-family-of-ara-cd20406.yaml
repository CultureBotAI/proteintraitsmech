identifier: CDD:cd20406
label: "second and fourth Tudor-like Agenet domains found in the family of Arabidopsis thaliana DUF724 domain-containing proteins (AtDUFs). The family includes a group of AtDUFs (AtDUF1-3 and AtDUF6-8) that may be involved in the polar growth of plant cells via transportation of RNAs. Members of this family have four Tudor-like Agenet domains, except for AtDUF8, which contains only two copies of the Tudor-like Agenet domain. AtDUF4 and AtDUF5 are not included here due to the lack of a Tudor-like Agenet domain. The model corresponds to the second and fourth Tudor-like Agenet domains in AtDUF1-3 and AtDUF6-7, as well as the first Tudor-like Agenet domain in AtDUF8. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  second and fourth Tudor-like Agenet domains found in the family of Arabidopsis thaliana DUF724 domain-containing proteins (AtDUFs). The family includes a group of AtDUFs (AtDUF1-3 and AtDUF6-8) that may be involved in the polar growth of plant cells via transportation of RNAs. Members of this family have four Tudor-like Agenet domains, except for AtDUF8, which contains only two copies of the Tudor-like Agenet domain. AtDUF4 and AtDUF5 are not included here due to the lack of a Tudor-like Agenet domain. The model corresponds to the second and fourth Tudor-like Agenet domains in AtDUF1-3 and AtDUF6-7, as well as the first Tudor-like Agenet domain in AtDUF8. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20406); members share this curated model.
