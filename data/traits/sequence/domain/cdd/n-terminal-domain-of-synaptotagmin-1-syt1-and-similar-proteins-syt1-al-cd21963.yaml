identifier: CDD:cd21963
label: "N-terminal domain of synaptotagmin-1 (Syt1) and similar proteins. Syt1, also called synaptotagmin I (SytI), or p65, is a calcium sensor that participates in triggering neurotransmitter release at the synapse. It may have a regulatory role in the membrane interactions during trafficking of synaptic vesicles at the active zone of the synapse. Syt1 binds acidic phospholipids with a specificity that requires the presence of both an acidic head group and a diacyl backbone. A Ca(2+)-dependent interaction between synaptotagmin and putative receptors for activated protein kinase C has also been reported. It can bind to at least three additional proteins in a Ca(2+)-independent manner; these are neurexins, syntaxin and AP2. Syt1 also plays a role in dendrite formation by melanocytes. The model corresponds to N-terminal domain of Syt1, which is a recognition domain responsible for the binding of botulinum neurotoxin B (BoNT B)."
definition: >-
  N-terminal domain of synaptotagmin-1 (Syt1) and similar proteins. Syt1, also called synaptotagmin I (SytI), or p65, is a calcium sensor that participates in triggering neurotransmitter release at the synapse. It may have a regulatory role in the membrane interactions during trafficking of synaptic vesicles at the active zone of the synapse. Syt1 binds acidic phospholipids with a specificity that requires the presence of both an acidic head group and a diacyl backbone. A Ca(2+)-dependent interaction between synaptotagmin and putative receptors for activated protein kinase C has also been reported. It can bind to at least three additional proteins in a Ca(2+)-independent manner; these are neurexins, syntaxin and AP2. Syt1 also plays a role in dendrite formation by melanocytes. The model corresponds to N-terminal domain of Syt1, which is a recognition domain responsible for the binding of botulinum neurotoxin B (BoNT B). — an NCBI CDD conserved domain (cd21963); members share this curated model.
