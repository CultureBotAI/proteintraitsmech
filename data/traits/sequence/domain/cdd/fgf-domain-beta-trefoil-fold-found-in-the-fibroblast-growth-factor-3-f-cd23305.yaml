identifier: CDD:cd23305
label: "FGF domain, beta-trefoil fold, found in the fibroblast growth factor 3 (FGF3)-like family. The FGF3-like family includes FGF3-6.  FGF3, also called heparin-binding growth factor 3 (HBGF3), or proto-oncogene Int-2, plays an important role in the regulation of embryonic development, cell proliferation, and cell differentiation. It is required for normal ear development. FGF3 interacts with fibroblast growth factor receptors, FGFR1 and FGFR2. FGF4, also called heparin secretory-transforming protein 1 (HST-1), or HSTF-1, or heparin-binding growth factor 4 (HBGF4), or transforming protein KS3, plays an important role in the regulation of embryonic development, cell proliferation, and cell differentiation. It is required for normal limb and cardiac valve development during embryogenesis. It interacts with FGFR1, FGFR2, FGFR3, and FGFR4. FGF5, also called heparin-binding growth factor 5 (HBGF5), or Smag-82, plays an important role in the regulation of cell proliferation and cell differentiation. It is required for normal regulation of the hair growth cycle. It functions as an inhibitor of hair elongation by promoting progression from anagen, the growth phase of the hair follicle, into catagen the apoptosis-induced regression phase. FGF5 interacts with FGFR1 and FGFR2. FGF6, also called heparin secretory-transforming protein 2 (HST-2), or HSTF-2, or heparin-binding growth factor 6 (HBGF6), plays an important role in the regulation of cell proliferation, cell differentiation, angiogenesis and myogenesis, and is required for normal muscle regeneration. FGF6 interacts with FGFR1, FGFR2, and FGFR4. Affinity between FGFs and their receptors is increased by heparan sulfate glycosaminoglycans that function as coreceptors. Members in this family contain a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  FGF domain, beta-trefoil fold, found in the fibroblast growth factor 3 (FGF3)-like family. The FGF3-like family includes FGF3-6. FGF3, also called heparin-binding growth factor 3 (HBGF3), or proto-oncogene Int-2, plays an important role in the regulation of embryonic development, cell proliferation, and cell differentiation. It is required for normal ear development. FGF3 interacts with fibroblast growth factor receptors, FGFR1 and FGFR2. FGF4, also called heparin secretory-transforming protein 1 (HST-1), or HSTF-1, or heparin-binding growth factor 4 (HBGF4), or transforming protein KS3, plays an important role in the regulation of embryonic development, cell proliferation, and cell differentiation. It is required for normal limb and cardiac valve development during embryogenesis. It interacts with FGFR1, FGFR2, FGFR3, and FGFR4. FGF5, also called heparin-binding growth factor 5 (HBGF5), or Smag-82, plays an important role in the regulation of cell proliferation and cell differentiation. It is required for normal regulation of the hair growth cycle. It functions as an inhibitor of hair elongation by promoting progression from anagen, the growth phase of the hair follicle, into catagen the apoptosis-induced regression phase. FGF5 interacts with FGFR1 and FGFR2. FGF6, also called heparin secretory-transforming protein 2 (HST-2), or HSTF-2, or heparin-binding growth factor 6 (HBGF6), plays an important role in the regulation of cell proliferation, cell differentiation, angiogenesis and myogenesis, and is required for normal muscle regeneration. FGF6 interacts with FGFR1, FGFR2, and FGFR4. Affinity between FGFs and their receptors is increased by heparan sulfate glycosaminoglycans that function as coreceptors. Members in this family contain a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23305); members share this curated model.
