identifier: CDD:cd20399
label: "Tudor domain found in survival of motor neuron-related-splicing factor 30 (SPF30) and similar proteins. SPF30, also called 30 kDa splicing factor SMNrp, SMN-related protein, or survival motor neuron domain-containing protein 1 (SMNDC1), is an essential pre-mRNA splicing factor required for assembly of the U4/U5/U6 tri-small nuclear ribonucleoprotein into the spliceosome. Overexpression of SPF30 causes apoptosis. It contains one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor domain found in survival of motor neuron-related-splicing factor 30 (SPF30) and similar proteins. SPF30, also called 30 kDa splicing factor SMNrp, SMN-related protein, or survival motor neuron domain-containing protein 1 (SMNDC1), is an essential pre-mRNA splicing factor required for assembly of the U4/U5/U6 tri-small nuclear ribonucleoprotein into the spliceosome. Overexpression of SPF30 causes apoptosis. It contains one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20399); members share this curated model.
