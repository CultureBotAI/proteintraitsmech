identifier: CDD:cd23246
label: "catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the family Alphaflexiviridae of positive-sense single-stranded RNA (+ssRNA) viruses, in the order Tymovirales. This group contains the catalytic core domain of RdRp of RNA viruses belonging to the family Alphaflexiviridae, order Tymovirales. Virions within the Alphaflexiviridae family are flexuous filaments, that are 470#800 nm long and 12#13 nm in diameter. They infect plants and plant-infecting fungi. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
