identifier: CDD:cd21757
label: OGA_middle
definition: >-
  middle stalk domain found in protein O-GlcNAcase (OGA) and similar proteins. OGA (EC 3.2.1.169), also called beta-N-acetylglucosaminidase, or beta-N-acetylhexosaminidase, or beta-hexosaminidase, or N-acetyl-beta-D-glucosaminidase, or N-acetyl-beta-glucosaminidase, cleaves GlcNAc from O-glycosylated proteins. It can use p-nitrophenyl-beta-GlcNAc and 4-methylumbelliferone-GlcNAc as substrate (in vitro). OGA contains an N-terminal catalytic hexosaminidase domain, a middle stalk domain, and a C-terminal HAT (histone acetyltransferase) domain. The model corresponds to the middle stalk domain
