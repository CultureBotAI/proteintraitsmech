identifier: CDD:cd18948
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in nuclear receptor coactivator 1 (NCoA-1) and similar proteins. NCoA-1, also termed Class E basic helix-loop-helix protein 74 (bHLHe74), or protein Hin-2, or RIP160, or renal carcinoma antigen NY-REN-52, or steroid receptor coactivator 1 (SRC-1), is a bHLH-PAS nuclear receptor coactivator that directly binds nuclear receptors and stimulates the transcriptional activities in a hormone-dependent fashion."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in nuclear receptor coactivator 1 (NCoA-1) and similar proteins. NCoA-1, also termed Class E basic helix-loop-helix protein 74 (bHLHe74), or protein Hin-2, or RIP160, or renal carcinoma antigen NY-REN-52, or steroid receptor coactivator 1 (SRC-1), is a bHLH-PAS nuclear receptor coactivator that directly binds nuclear receptors and stimulates the transcriptional activities in a hormone-dependent fashion. — an NCBI CDD conserved domain (cd18948); members share this curated model.
