identifier: CDD:cd09239
label: "Protein-interacting, N-terminal, Bro1-like domain of mammalian His-Domain type N23 protein tyrosine phosphatase and related domains. This family contains the N-terminal, Bro1-like domain of mammalian His-Domain type N23 protein tyrosine phosphatase (HD-PTP) and related domains. It belongs to the BRO1_Alix_like superfamily which also includes the Bro1-like domains of mammalian Alix (apoptosis-linked gene-2 interacting protein X), RhoA-binding proteins Rhophilin-1 and -2, Brox, Bro1 and Rim20 (also known as PalA) from Saccharomyces cerevisiae, Ustilago maydis Rim23 (also known as PalC), and related domains. Alix, also known as apoptosis-linked gene-2 interacting protein 1 (AIP1), HD-PTP, Brox, Bro1, Rim20, and Rim23, interact with the ESCRT (Endosomal Sorting Complexes Required for Transport) system. HD-PTP participates in cell migration and endosomal trafficking. Bro1-like domains are boomerang-shaped, and part of the domain is a tetratricopeptide repeat (TPR)-like structure. Bro1-like domains bind components of the ESCRT-III complex: CHMP4 in the case of HD-PTP. The Bro1-like domain of HD-PTP can also bind human immunodeficiency virus type 1 (HIV-1) nucleocapsid. HD-PTP, and some other members of the BRO1_Alix_like  superfamily including Alix, also have a V-shaped (V) domain. In the case of Alix, the V-domain contains a binding site for the retroviral late assembly (L) domain YPXnL motif, which is partially conserved in the V-domain superfamily. HD-PTP is encoded by the PTPN23 gene, a tumor suppressor gene candidate frequently absent in human kidney, breast, lung, and cervical tumors. This family also contains Drosophila Myopic which promotes epidermal growth factor receptor (EGFR) signaling, and Caenorhabditis elegans (enhancer of glp-1) EGO-2 which promotes Notch signaling."
definition: >-
  Protein-interacting, N-terminal, Bro1-like domain of mammalian His-Domain type N23 protein tyrosine phosphatase and related domains. This family contains the N-terminal, Bro1-like domain of mammalian His-Domain type N23 protein tyrosine phosphatase (HD-PTP) and related domains. It belongs to the BRO1_Alix_like superfamily which also includes the Bro1-like domains of mammalian Alix (apoptosis-linked gene-2 interacting protein X), RhoA-binding proteins Rhophilin-1 and -2, Brox, Bro1 and Rim20 (also known as PalA) from Saccharomyces cerevisiae, Ustilago maydis Rim23 (also known as PalC), and related domains. Alix, also known as apoptosis-linked gene-2 interacting protein 1 (AIP1), HD-PTP, Brox, Bro1, Rim20, and Rim23, interact with the ESCRT (Endosomal Sorting Complexes Required for Transport) system. HD-PTP participates in cell migration and endosomal trafficking. Bro1-like domains are boomerang-shaped, and part of the domain is a tetratricopeptide repeat (TPR)-like structure. Bro1-like domains bind components of the ESCRT-III complex: CHMP4 in the case of HD-PTP. The Bro1-like domain of HD-PTP can also bind human immunodeficiency virus type 1 (HIV-1) nucleocapsid. HD-PTP, and some other members of the BRO1_Alix_like superfamily including Alix, also have a V-shaped (V) domain. In the case of Alix, the V-domain contains a binding site for the retroviral late assembly (L) domain YPXnL motif, which is partially conserved in the V-domain superfamily. HD-PTP is encoded by the PTPN23 gene, a tumor suppressor gene candidate frequently absent in human kidney, breast, lung, and cervical tumors. This family also contains Drosophila Myopic which promotes epidermal growth factor receptor (EGFR) signaling, and Caenorhabditis elegans (enhancer of glp-1) EGO-2 which promotes Notch signaling. — an NCBI CDD conserved domain (cd09239); members share this curated model.
