identifier: CDD:cd19074
label: "Shaker potassium channel beta subunit family and similar proteins. This family includes voltage-gated potassium channel subunits, beta-1 (KCAB1B), beta-2 (KCAB2B) and beta-3 (KCAB3B). KCAB1B and KCAB2B are cytoplasmic potassium channel subunits that modulate the characteristics of the channel-forming alpha-subunits. KCAB3B is an accessory potassium channel protein which modulates the activity of the pore-forming alpha subunit. The family also includes Drosophila melanogaster Hk protein, a founding member of aldo-keto reductase family 6 member B1 (AKR6B1), as well as voltage-gated potassium channel subunit beta (KCAB) from Arabidopsis thaliana and Egeria densa, founding members of AKR6C1and AKR6C2, respectively. Hk protein, also called hyperkinetic, is a beta subunit of Shaker (Sh) K+ channels and shows high sequence homology to aldoketoreductase. KCAB, also called Shaker channel b-subunit, or K(+) channel subunit beta, or potassium voltage beta 1, or KV-beta1, or KAB1, is a probable accessory potassium channel protein which modulates the activity of the pore-forming alpha subunit."
definition: >-
  Shaker potassium channel beta subunit family and similar proteins. This family includes voltage-gated potassium channel subunits, beta-1 (KCAB1B), beta-2 (KCAB2B) and beta-3 (KCAB3B). KCAB1B and KCAB2B are cytoplasmic potassium channel subunits that modulate the characteristics of the channel-forming alpha-subunits. KCAB3B is an accessory potassium channel protein which modulates the activity of the pore-forming alpha subunit. The family also includes Drosophila melanogaster Hk protein, a founding member of aldo-keto reductase family 6 member B1 (AKR6B1), as well as voltage-gated potassium channel subunit beta (KCAB) from Arabidopsis thaliana and Egeria densa, founding members of AKR6C1and AKR6C2, respectively. Hk protein, also called hyperkinetic, is a beta subunit of Shaker (Sh) K+ channels and shows high sequence homology to aldoketoreductase. KCAB, also called Shaker channel b-subunit, or K(+) channel subunit beta, or potassium voltage beta 1, or KV-beta1, or KAB1, is a probable accessory potassium channel protein which modulates the activity of the pore-forming alpha subunit. — an NCBI CDD conserved domain (cd19074); members share this curated model.
