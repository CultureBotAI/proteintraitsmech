identifier: CDD:cd19856
label: "double-stranded RNA binding motif of Kanadaptin and similar proteins. Kanadaptin (also known as human lung cancer oncogene 3 protein (HLC-3), kidney anion exchanger adapter protein, or solute carrier family 4 anion exchanger member 1 adapter protein (SLC4A1AP)) is a nuclear protein widely expressed in mammalian tissues. It was originally isolated as a kidney Cl-/HCO3- anion exchanger 1 (kAE1)-binding protein. It is a highly mobile nucleocytoplasmic shuttling and multilocalizing protein. Its role in mammalian cells remains unclear. The double-stranded RNA binding motif (DSRM) is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  double-stranded RNA binding motif of Kanadaptin and similar proteins. Kanadaptin (also known as human lung cancer oncogene 3 protein (HLC-3), kidney anion exchanger adapter protein, or solute carrier family 4 anion exchanger member 1 adapter protein (SLC4A1AP)) is a nuclear protein widely expressed in mammalian tissues. It was originally isolated as a kidney Cl-/HCO3- anion exchanger 1 (kAE1)-binding protein. It is a highly mobile nucleocytoplasmic shuttling and multilocalizing protein. Its role in mammalian cells remains unclear. The double-stranded RNA binding motif (DSRM) is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19856); members share this curated model.
