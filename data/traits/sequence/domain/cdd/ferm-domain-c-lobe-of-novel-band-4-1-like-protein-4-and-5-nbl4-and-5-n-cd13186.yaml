identifier: CDD:cd13186
label: "FERM domain C-lobe of Novel band 4.1-like protein 4 and 5 (NBL4 and 5). NBL4 (also called Erythrocyte protein band 4.1-like 4; Epb4 1l4) plays a role the beta-catenin/Tcf signaling pathway and is thought to be involved in establishing the cell polarity or proliferation. NBL4 may be also involved in adhesion, in cell motility and/or in cell-to-cell communication. No role for NBL5 has been proposed to date. Both NBL4 and NBL5 contain a N-terminal FERM domain which has a cloverleaf tripart structure composed of: (1) FERM_N (A-lobe or F1); (2) FERM_M (B-lobe, or F2); and (3) FERM_C (C-lobe or F3). The C-lobe is a member of the PH superfamily. The FERM domain is found in the cytoskeletal-associated proteins such as ezrin, moesin, radixin, 4.1R, and merlin. These proteins provide a link between the membrane and cytoskeleton and are involved in signal transduction pathways. The FERM domain is also found in protein tyrosine phosphatases (PTPs) , the tyrosine kinases FAK and JAK, in addition to other proteins involved in signaling. This domain is structurally similar to the PH and PTB domains and consequently is capable of binding to both peptides and phospholipids at different sites."
definition: >-
  FERM domain C-lobe of Novel band 4.1-like protein 4 and 5 (NBL4 and 5). NBL4 (also called Erythrocyte protein band 4.1-like 4; Epb4 1l4) plays a role the beta-catenin/Tcf signaling pathway and is thought to be involved in establishing the cell polarity or proliferation. NBL4 may be also involved in adhesion, in cell motility and/or in cell-to-cell communication. No role for NBL5 has been proposed to date. Both NBL4 and NBL5 contain a N-terminal FERM domain which has a cloverleaf tripart structure composed of: (1) FERM_N (A-lobe or F1); (2) FERM_M (B-lobe, or F2); and (3) FERM_C (C-lobe or F3). The C-lobe is a member of the PH superfamily. The FERM domain is found in the cytoskeletal-associated proteins such as ezrin, moesin, radixin, 4.1R, and merlin. These proteins provide a link between the membrane and cytoskeleton and are involved in signal transduction pathways. The FERM domain is also found in protein tyrosine phosphatases (PTPs) , the tyrosine kinases FAK and JAK, in addition to other proteins involved in signaling. This domain is structurally similar to the PH and PTB domains and consequently is capable of binding to both peptides and phospholipids at different sites. — an NCBI CDD conserved domain (cd13186); members share this curated model.
