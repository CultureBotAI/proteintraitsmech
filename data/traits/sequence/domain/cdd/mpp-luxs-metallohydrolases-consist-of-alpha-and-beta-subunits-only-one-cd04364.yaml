identifier: CDD:cd04364
label: Beta_Subunit_Bacterial_MPP_LuxS_metallohydrolase
definition: >-
  MPP/LuxS metallohydrolases consist of alpha- and beta-subunits, only one of which, Beta, harbors the proteolytic active site. Each of the subunits, Alpha and Beta, is a result of fusion of two homologous domains. Each of these two domains is in turn homologous to LuxS. The peptidases coordinate a Zinc ion. They function in a variety of pathways, including mitochondrial and chloroplast presequence cleavage, quorum sensing in bacteria, hemoglobin catabolism in P. falciparum, insulin degradation, alpha-factor production in yeast, and others
