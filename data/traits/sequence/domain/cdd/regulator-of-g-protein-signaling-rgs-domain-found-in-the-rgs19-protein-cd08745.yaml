identifier: CDD:cd08745
label: "Regulator of G protein signaling (RGS) domain found in the RGS19 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS19 protein (also known as GAIP), a member of the RZ subfamily of the RGS protein family. They are a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins play critical regulatory roles as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha-subunits. Deactivation of G-protein signaling is controlled by RGS domains, which accelerate GTPase activity of the alpha subunit by hydrolysis of GTP to GDP, resulting in a reassociation of the alpha-subunit with the beta-gamma-dimer and an inhibition of downstream activity. As a major G-protein regulator, the RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. The RZ subfamily of RGS proteins includes RGS17, RGS20, and its splice variant Ret-RGS. RGS19 participates in regulation of dopamine receptor D2R and D3R, as well as beta-adrenergic receptors ."
definition: >-
  Regulator of G protein signaling (RGS) domain found in the RGS19 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS19 protein (also known as GAIP), a member of the RZ subfamily of the RGS protein family. They are a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins play critical regulatory roles as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha-subunits. Deactivation of G-protein signaling is controlled by RGS domains, which accelerate GTPase activity of the alpha subunit by hydrolysis of GTP to GDP, resulting in a reassociation of the alpha-subunit with the beta-gamma-dimer and an inhibition of downstream activity. As a major G-protein regulator, the RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. The RZ subfamily of RGS proteins includes RGS17, RGS20, and its splice variant Ret-RGS. RGS19 participates in regulation of dopamine receptor D2R and D3R, as well as beta-adrenergic receptors . — an NCBI CDD conserved domain (cd08745); members share this curated model.
