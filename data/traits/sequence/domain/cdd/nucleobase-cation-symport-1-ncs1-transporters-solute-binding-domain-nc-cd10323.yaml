identifier: CDD:cd10323
label: "nucleobase-cation-symport-1 (NCS1) transporters; solute-binding domain. NCS1s are essential components of salvage pathways for nucleobases and related metabolites; their known substrates include allantoin, uracil, thiamine, and nicotinamide riboside. This family includes Microbacterium liquefaciens Mhp1, a transporter that mediates the uptake of indolyl methyl- and benzyl-hydantoins as part of a metabolic salvage pathway for their conversion to amino acids. It also includes various Saccharomyces cerevisiae transporters: Fcy21p (Purine-cytosine permease), vitamin B6 transporter Tpn1, nicotinamide riboside transporter 1 (Nrt1p, also called Thi71p), Dal4p (allantoin permease), Fui1p (uridine permease), and Fur4p (uracil permease). Mhp1 has 12 transmembrane (TM) helices (an inverted topology repeat: TMs1-5 and TMs6-10, and TMs11-12; TMs numbered to conform to the solute carrier 6 family Aquifex aeolicus LeuT). NCS1s belong to a superfamily which also contains the solute carrier 5 family sodium/glucose transporters (SLC5s), and SLC6 neurotransmitter transporters."
definition: >-
  nucleobase-cation-symport-1 (NCS1) transporters; solute-binding domain. NCS1s are essential components of salvage pathways for nucleobases and related metabolites; their known substrates include allantoin, uracil, thiamine, and nicotinamide riboside. This family includes Microbacterium liquefaciens Mhp1, a transporter that mediates the uptake of indolyl methyl- and benzyl-hydantoins as part of a metabolic salvage pathway for their conversion to amino acids. It also includes various Saccharomyces cerevisiae transporters: Fcy21p (Purine-cytosine permease), vitamin B6 transporter Tpn1, nicotinamide riboside transporter 1 (Nrt1p, also called Thi71p), Dal4p (allantoin permease), Fui1p (uridine permease), and Fur4p (uracil permease). Mhp1 has 12 transmembrane (TM) helices (an inverted topology repeat: TMs1-5 and TMs6-10, and TMs11-12; TMs numbered to conform to the solute carrier 6 family Aquifex aeolicus LeuT). NCS1s belong to a superfamily which also contains the solute carrier 5 family sodium/glucose transporters (SLC5s), and SLC6 neurotransmitter transporters. — an NCBI CDD conserved domain (cd10323); members share this curated model.
