identifier: CDD:cd21625
label: "N-terminal domain of the S1 subunit of the Spike (S) protein from murine hepatitis virus and related betacoronaviruses in the A lineage. This subfamily contains the N-terminal domain (NTD) of the S1 subunit of the Spike (S) proteins from betacoronaviruses in the embecovirus subgenera (A lineage), including murine hepatitis virus (MHV), human coronavirus (HCoV) HKU1 and OC43, and bovine CoV (BCoV). MHV is the most common viral pathogen in contemporary laboratory mouse colonies manifesting as a primary infection in the upper respiratory tract, while HCoV-HKU1 causes mild yet prevalent respiratory disease in humans. The CoV S protein is an envelope glycoprotein that plays the most important role in viral attachment, fusion, and entry into host cells, and serves as a major target for the development of neutralizing antibodies, inhibitors of viral entry, and vaccines. It is synthesized as a precursor protein that is cleaved into an N-terminal S1 subunit (~700 amino acids) and a C-terminal S2 subunit (~600 amino acids) that mediates attachment and membrane fusion, respectively. Three S1/S2 heterodimers assemble to form a trimer spike protruding from the viral envelope. The S1 subunit contains a receptor-binding domain (RBD), while the S2 subunit contains a hydrophobic fusion peptide and two heptad repeat regions. S1 contains two structurally independent domains, the N-terminal domain (NTD) and the C-terminal domain (C-domain). Depending on the virus, either the NTD or the C-domain can serve as the receptor-binding domain (RBD). While most CoVs, including SARS-CoV and MERS-CoV use the C-domain to bind their receptors, several CoVs in the A lineage use the NTD to bind their receptors. MHV binds its protein receptor, mouse carcinoembryonic antigen related cell adhesion molecule 1a (mCEACAM1a), through its S1 NTD. BCoV and HCoV-OC43 recognize a sugar moiety, 5-N-acetyl-9-O-acetylneuraminic acid (Neu5,9Ac2), on cell-surface glycoproteins or glycolipids; this binding is also through the S1 NTD. In addition, the S1 NTD contributes to the Spike trimer interface."
definition: >-
  N-terminal domain of the S1 subunit of the Spike (S) protein from murine hepatitis virus and related betacoronaviruses in the A lineage. This subfamily contains the N-terminal domain (NTD) of the S1 subunit of the Spike (S) proteins from betacoronaviruses in the embecovirus subgenera (A lineage), including murine hepatitis virus (MHV), human coronavirus (HCoV) HKU1 and OC43, and bovine CoV (BCoV). MHV is the most common viral pathogen in contemporary laboratory mouse colonies manifesting as a primary infection in the upper respiratory tract, while HCoV-HKU1 causes mild yet prevalent respiratory disease in humans. The CoV S protein is an envelope glycoprotein that plays the most important role in viral attachment, fusion, and entry into host cells, and serves as a major target for the development of neutralizing antibodies, inhibitors of viral entry, and vaccines. It is synthesized as a precursor protein that is cleaved into an N-terminal S1 subunit (~700 amino acids) and a C-terminal S2 subunit (~600 amino acids) that mediates attachment and membrane fusion, respectively. Three S1/S2 heterodimers assemble to form a trimer spike protruding from the viral envelope. The S1 subunit contains a receptor-binding domain (RBD), while the S2 subunit contains a hydrophobic fusion peptide and two heptad repeat regions. S1 contains two structurally independent domains, the N-terminal domain (NTD) and the C-terminal domain (C-domain). Depending on the virus, either the NTD or the C-domain can serve as the receptor-binding domain (RBD). While most CoVs, including SARS-CoV and MERS-CoV use the C-domain to bind their receptors, several CoVs in the A lineage use the NTD to bind their receptors. MHV binds its protein receptor, mouse carcinoembryonic antigen related cell adhesion molecule 1a (mCEACAM1a), through its S1 NTD. BCoV and HCoV-OC43 recognize a sugar moiety, 5-N-acetyl-9-O-acetylneuraminic acid (Neu5,9Ac2), on cell-surface glycoproteins or glycolipids; this binding is also through the S1 NTD. In addition, the S1 NTD contributes to the Spike trimer interface. — an NCBI CDD conserved domain (cd21625); members share this curated model.
