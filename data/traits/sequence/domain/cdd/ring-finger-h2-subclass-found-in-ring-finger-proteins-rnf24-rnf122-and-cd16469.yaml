identifier: CDD:cd16469
label: "RING finger, H2 subclass, found in RING finger proteins RNF24, RNF122, and similar proteins. This subfamily includes RNF24, RNF122, and similar proteins. RNF24 is an intrinsic membrane protein localized in the Golgi apparatus. It specifically interacts with the ankyrin-repeats domains (ARDs) of TRPC1, -3, -4, -5, -6, and -7, and affects TRPC intracellular trafficking without affecting their activity. RNF122 is a RING finger protein associated with HEK 293T cell viability. It is localized to the endoplasmic reticulum (ER) and the Golgi apparatus, and overexpressed in anaplastic thyroid cancer cells. RNF122 functions as an E3 ubiquitin ligase that can ubiquitinate itself and undergo degradation through its RING finger in a proteasome-dependent manner. Both RNF24 and RNF122 contain an N-terminal transmembrane domain and a C-terminal C3H2C3-type RING-H2 finger."
definition: >-
  RING finger, H2 subclass, found in RING finger proteins RNF24, RNF122, and similar proteins. This subfamily includes RNF24, RNF122, and similar proteins. RNF24 is an intrinsic membrane protein localized in the Golgi apparatus. It specifically interacts with the ankyrin-repeats domains (ARDs) of TRPC1, -3, -4, -5, -6, and -7, and affects TRPC intracellular trafficking without affecting their activity. RNF122 is a RING finger protein associated with HEK 293T cell viability. It is localized to the endoplasmic reticulum (ER) and the Golgi apparatus, and overexpressed in anaplastic thyroid cancer cells. RNF122 functions as an E3 ubiquitin ligase that can ubiquitinate itself and undergo degradation through its RING finger in a proteasome-dependent manner. Both RNF24 and RNF122 contain an N-terminal transmembrane domain and a C-terminal C3H2C3-type RING-H2 finger. — an NCBI CDD conserved domain (cd16469); members share this curated model.
