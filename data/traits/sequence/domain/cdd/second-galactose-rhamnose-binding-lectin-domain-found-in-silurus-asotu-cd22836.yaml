identifier: CDD:cd22836
label: "second galactose/rhamnose binding lectin domain found in Silurus asotus rhamnose-binding lectin (RBL) and similar proteins. RBL, also known as Silurus asotus (catfish) roe lectin (SAL), is a lectin that binds L-rhamnose. It also binds monosaccharides possessing steric similarity to the hydroxyl group orientation at C2 and C4 of the pyranose ring structure of L-rhamnose, such as L-mannose and L-lyxose. RBL does not require a Ca2+ ion or free thiol group for its agglutination activity. RBL contains three galactose/rhamnose-binding lectin domains. This model corresponds to the second one."
definition: >-
  second galactose/rhamnose binding lectin domain found in Silurus asotus rhamnose-binding lectin (RBL) and similar proteins. RBL, also known as Silurus asotus (catfish) roe lectin (SAL), is a lectin that binds L-rhamnose. It also binds monosaccharides possessing steric similarity to the hydroxyl group orientation at C2 and C4 of the pyranose ring structure of L-rhamnose, such as L-mannose and L-lyxose. RBL does not require a Ca2+ ion or free thiol group for its agglutination activity. RBL contains three galactose/rhamnose-binding lectin domains. This model corresponds to the second one. — an NCBI CDD conserved domain (cd22836); members share this curated model.
