identifier: CDD:cd13573
label: "Substrate binding domain of uncharacterized ABC-type phosphonate-like transporter; contains the type 2 periplasmic binding fold. This subfamily includes putative periplasmic binding component of an ABC transport system similar to alkylphosphonate binding domain PnhD. These domains are found in PnhD-like proteins that are predicted to function as initial receptors in hypophosphite, phosphonate, or phosphate ABC transport in archaea and eubacteria. They belong to the PBP2 superfamily of periplasmic binding proteins that differ in size and ligand specificity, but have similar tertiary structures consisting of two globular subdomains connected by a flexible hinge. They have been shown to bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap."
definition: >-
  Substrate binding domain of uncharacterized ABC-type phosphonate-like transporter; contains the type 2 periplasmic binding fold. This subfamily includes putative periplasmic binding component of an ABC transport system similar to alkylphosphonate binding domain PnhD. These domains are found in PnhD-like proteins that are predicted to function as initial receptors in hypophosphite, phosphonate, or phosphate ABC transport in archaea and eubacteria. They belong to the PBP2 superfamily of periplasmic binding proteins that differ in size and ligand specificity, but have similar tertiary structures consisting of two globular subdomains connected by a flexible hinge. They have been shown to bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. — an NCBI CDD conserved domain (cd13573); members share this curated model.
