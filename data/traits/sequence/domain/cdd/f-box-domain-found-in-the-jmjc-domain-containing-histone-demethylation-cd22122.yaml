identifier: CDD:cd22122
label: "F-box domain found in the JmjC domain-containing histone demethylation protein (JHDM) family. The JHDM family includes F-box/LRR-repeat proteins FBXL10, FBXL11 and FBXL19. FBXL10 is also called lysine-specific demethylase 2B (KDM2B), CXXC-type zinc finger protein 2 (CXXC2), F-box and leucine-rich repeat protein 10 (FBL10), JmjC domain-containing histone demethylation protein 1B (JHDM1B), Jumonji domain-containing EMSY-interactor methyltransferase motif protein, protein JEMMA, protein-containing CXXC domain 2, [Histone-H3]-lysine-36 demethylase 1B, or NDY1. It is a histone demethylase that catalyzes the demethylation of H3K4me3 and H3K36me2, thereby playing a central role in the histone code. It preferentially binds the transcribed region of ribosomal RNA and represses the transcription of ribosomal RNA genes which inhibits cell growth and proliferation. FBXL10 may also serve as the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. FBXL11, also called KDM2A, CXXC8, F-box and leucine-rich repeat protein 11, F-box protein FBL7, F-box protein Lilina, JmjC domain-containing histone demethylation protein 1A (JHDM1A), or [Histone-H3]-lysine-36 demethylase 1A, is a histone H3 lysine 36 (H3K36) demethylase that regulates epithelial mesenchymal transition (EMT) and the metastasis of ovarian cancer. It plays an essential role in embryonic development and homeostasis by regulating cell proliferation and survival. FBXL11 may also recognize and bind to some phosphorylated proteins and promote their ubiquitination and degradation. It associates with centromeres and represses transcription of small non-coding RNAs that are encoded by the clusters of satellite repeats at the centromere. It is required to sustain centromeric integrity and genomic stability, particularly during mitosis. FBXL19, also called F-box and leucine-rich repeat protein 19, is the substrate-recognition component of an SCF-type E3 ubiquitin ligase complex. It acts as a CpG island-binding protein in mouse embryonic stem (ES) cells and has been shown to associate with the CDK-Mediator complex. It promotes H2Bub1 at the promoters of CpG island-containing genes by interacting with RNF20. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in the JmjC domain-containing histone demethylation protein (JHDM) family. The JHDM family includes F-box/LRR-repeat proteins FBXL10, FBXL11 and FBXL19. FBXL10 is also called lysine-specific demethylase 2B (KDM2B), CXXC-type zinc finger protein 2 (CXXC2), F-box and leucine-rich repeat protein 10 (FBL10), JmjC domain-containing histone demethylation protein 1B (JHDM1B), Jumonji domain-containing EMSY-interactor methyltransferase motif protein, protein JEMMA, protein-containing CXXC domain 2, [Histone-H3]-lysine-36 demethylase 1B, or NDY1. It is a histone demethylase that catalyzes the demethylation of H3K4me3 and H3K36me2, thereby playing a central role in the histone code. It preferentially binds the transcribed region of ribosomal RNA and represses the transcription of ribosomal RNA genes which inhibits cell growth and proliferation. FBXL10 may also serve as the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. FBXL11, also called KDM2A, CXXC8, F-box and leucine-rich repeat protein 11, F-box protein FBL7, F-box protein Lilina, JmjC domain-containing histone demethylation protein 1A (JHDM1A), or [Histone-H3]-lysine-36 demethylase 1A, is a histone H3 lysine 36 (H3K36) demethylase that regulates epithelial mesenchymal transition (EMT) and the metastasis of ovarian cancer. It plays an essential role in embryonic development and homeostasis by regulating cell proliferation and survival. FBXL11 may also recognize and bind to some phosphorylated proteins and promote their ubiquitination and degradation. It associates with centromeres and represses transcription of small non-coding RNAs that are encoded by the clusters of satellite repeats at the centromere. It is required to sustain centromeric integrity and genomic stability, particularly during mitosis. FBXL19, also called F-box and leucine-rich repeat protein 19, is the substrate-recognition component of an SCF-type E3 ubiquitin ligase complex. It acts as a CpG island-binding protein in mouse embryonic stem (ES) cells and has been shown to associate with the CDK-Mediator complex. It promotes H2Bub1 at the promoters of CpG island-containing genes by interacting with RNF20. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22122); members share this curated model.
