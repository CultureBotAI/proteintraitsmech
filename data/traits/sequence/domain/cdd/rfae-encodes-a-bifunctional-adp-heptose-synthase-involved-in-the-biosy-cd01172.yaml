identifier: CDD:cd01172
label: "RfaE encodes a bifunctional ADP-heptose synthase involved in the biosynthesis of the lipopolysaccharide (LPS) core precursor ADP-L-glycero-D-manno-heptose. LPS plays an important role in maintaining the structural integrity of the bacterial outer membrane of gram-negative bacteria. RfaE consists of two domains, a sugar kinase domain, represented here, and a domain belonging to the cytidylyltransferase superfamily."
definition: >-
  RfaE encodes a bifunctional ADP-heptose synthase involved in the biosynthesis of the lipopolysaccharide (LPS) core precursor ADP-L-glycero-D-manno-heptose. LPS plays an important role in maintaining the structural integrity of the bacterial outer membrane of gram-negative bacteria. RfaE consists of two domains, a sugar kinase domain, represented here, and a domain belonging to the cytidylyltransferase superfamily. — an NCBI CDD conserved domain (cd01172); members share this curated model.
