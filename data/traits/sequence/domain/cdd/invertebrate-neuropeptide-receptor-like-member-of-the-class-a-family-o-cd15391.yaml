identifier: CDD:cd15391
label: "invertebrate neuropeptide receptor-like, member of the class A family of seven-transmembrane G protein-coupled receptors. This subgroup includes putative neuropeptide receptor found in invertebrates, which is a member of class A of 7-transmembrane G protein-coupled receptors.  This orphan receptor shares a significant amino acid sequence identity with the neurokinin 1 receptor (NK1R). The endogenous ligand for NK1R is substance P, an 11-amino acid peptide that functions as a vasodilator and neurotransmitter and is released from the autonomic sensory nerve fibers."
definition: >-
  invertebrate neuropeptide receptor-like, member of the class A family of seven-transmembrane G protein-coupled receptors. This subgroup includes putative neuropeptide receptor found in invertebrates, which is a member of class A of 7-transmembrane G protein-coupled receptors. This orphan receptor shares a significant amino acid sequence identity with the neurokinin 1 receptor (NK1R). The endogenous ligand for NK1R is substance P, an 11-amino acid peptide that functions as a vasodilator and neurotransmitter and is released from the autonomic sensory nerve fibers. — an NCBI CDD conserved domain (cd15391); members share this curated model.
