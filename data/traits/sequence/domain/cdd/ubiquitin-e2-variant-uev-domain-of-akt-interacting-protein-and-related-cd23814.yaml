identifier: CDD:cd23814
label: "ubiquitin E2 variant (UEV) domain of  AKT-interacting protein and related proteins. AKTIP, also called Ft1, or fused toes protein homolog, is a component of the FTS/Hook/FHIP complex (FHF complex), which may function to promote vesicle trafficking and/or fusion via the homotypic vesicular protein sorting complex (the HOPS complex). AKTIP regulates apoptosis by enhancing phosphorylation and activation of AKT1. It increases release of TNFSF6 via the AKT1/GSK3B/NFATC1 signaling cascade. AKTIP contains a UEV domain that is homologous to E2 ubiquitin ligases but lacks the conserved cysteine residue required for catalytic activity."
definition: >-
  ubiquitin E2 variant (UEV) domain of AKT-interacting protein and related proteins. AKTIP, also called Ft1, or fused toes protein homolog, is a component of the FTS/Hook/FHIP complex (FHF complex), which may function to promote vesicle trafficking and/or fusion via the homotypic vesicular protein sorting complex (the HOPS complex). AKTIP regulates apoptosis by enhancing phosphorylation and activation of AKT1. It increases release of TNFSF6 via the AKT1/GSK3B/NFATC1 signaling cascade. AKTIP contains a UEV domain that is homologous to E2 ubiquitin ligases but lacks the conserved cysteine residue required for catalytic activity. — an NCBI CDD conserved domain (cd23814); members share this curated model.
