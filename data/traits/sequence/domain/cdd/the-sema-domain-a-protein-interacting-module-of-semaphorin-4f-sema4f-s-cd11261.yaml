identifier: CDD:cd11261
label: "The Sema domain, a protein interacting module, of semaphorin 4F (Sema4F). Sema4F plays role in heterotypic cell-cell contacts and controls cell proliferation and suppresses tumorigenesis. In neurofibromatosis type 1 (NF1) patients, reduced Sema4F level disrupts Schwann cell/axonal interactions. Experiments using a yeast two-hybrid system show that the extreme C-terminus of Sema4F interacts with the PDZ domains of post-synaptic density protein SAP90/PSD-95, indicating possible functional involvement of Semas4F at glutamatergic synapses. Recent work also suggests a role for Sema4F in the injury response of intramedullary axotomized motoneuron. Sema4F belongs to the class 4 transmembrane semaphorin family of proteins. Semaphorins are regulator molecules involved in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of semaphorin 4F (Sema4F). Sema4F plays role in heterotypic cell-cell contacts and controls cell proliferation and suppresses tumorigenesis. In neurofibromatosis type 1 (NF1) patients, reduced Sema4F level disrupts Schwann cell/axonal interactions. Experiments using a yeast two-hybrid system show that the extreme C-terminus of Sema4F interacts with the PDZ domains of post-synaptic density protein SAP90/PSD-95, indicating possible functional involvement of Semas4F at glutamatergic synapses. Recent work also suggests a role for Sema4F in the injury response of intramedullary axotomized motoneuron. Sema4F belongs to the class 4 transmembrane semaphorin family of proteins. Semaphorins are regulator molecules involved in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module. — an NCBI CDD conserved domain (cd11261); members share this curated model.
