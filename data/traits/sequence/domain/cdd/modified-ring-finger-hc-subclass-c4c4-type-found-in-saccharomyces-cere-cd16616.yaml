identifier: CDD:cd16616
label: "Modified RING finger, HC subclass (C4C4-type), found in Saccharomyces cerevisiae amino acid sensor-independent protein Asi1p, Asi3p and similar proteins. Asi1p and Asi3p are inner nuclear membrane proteins that act as negative regulators of SPS (Ssy1-Ptr3-Ssy5)-sensor signaling in yeast. Together with Asi2p, they assemble into an Asi complex that functions in the SPS amino acid sensing pathway involved in degradation of Stp1 and Stp2 transcription factors. Both Asi1p and Asi3p contain five membrane-spanning domains, as well as highly conserved RING fingers at their extreme C termini, which are C4C4-type RING finger motifs whose overall folding is similar to that of the C3HC4-type RING-HC finger."
definition: >-
  Modified RING finger, HC subclass (C4C4-type), found in Saccharomyces cerevisiae amino acid sensor-independent protein Asi1p, Asi3p and similar proteins. Asi1p and Asi3p are inner nuclear membrane proteins that act as negative regulators of SPS (Ssy1-Ptr3-Ssy5)-sensor signaling in yeast. Together with Asi2p, they assemble into an Asi complex that functions in the SPS amino acid sensing pathway involved in degradation of Stp1 and Stp2 transcription factors. Both Asi1p and Asi3p contain five membrane-spanning domains, as well as highly conserved RING fingers at their extreme C termini, which are C4C4-type RING finger motifs whose overall folding is similar to that of the C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd16616); members share this curated model.
