identifier: CDD:cd00805
label: "catalytic core domain of tyrosinyl-tRNA synthetase. Tyrosinyl-tRNA synthetase (TyrRS) catalytic core domain. TyrRS is a homodimer which attaches Tyr to the appropriate tRNA. TyrRS is a class I tRNA synthetases, so it aminoacylates the 2'-OH of the nucleotide at the 3' end of the tRNA. The core domain is based on the Rossman fold and is responsible for the ATP-dependent formationof the enzyme bound aminoacyl-adenylate. It contains the class I characteristic HIGH and KMSKS motifs, which are involved in ATP binding."
definition: >-
  catalytic core domain of tyrosinyl-tRNA synthetase. Tyrosinyl-tRNA synthetase (TyrRS) catalytic core domain. TyrRS is a homodimer which attaches Tyr to the appropriate tRNA. TyrRS is a class I tRNA synthetases, so it aminoacylates the 2'-OH of the nucleotide at the 3' end of the tRNA. The core domain is based on the Rossman fold and is responsible for the ATP-dependent formationof the enzyme bound aminoacyl-adenylate. It contains the class I characteristic HIGH and KMSKS motifs, which are involved in ATP binding. — an NCBI CDD conserved domain (cd00805); members share this curated model.
