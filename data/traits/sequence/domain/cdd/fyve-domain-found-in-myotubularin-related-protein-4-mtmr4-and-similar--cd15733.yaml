identifier: CDD:cd15733
label: "FYVE domain found in myotubularin-related protein 4 (MTMR4) and similar proteins. MTMR4, also termed FYVE domain-containing dual specificity protein phosphatase 2 (FYVE-DSP2), or zinc finger FYVE domain-containing protein 11, is an dual specificity protein phosphatase that specifically dephosphorylates phosphatidylinositol 3-phosphate (PtdIns3P or PI3P). It is localizes to early endosomes, as well as to Rab11- and Sec15-positive recycling endosomes, and regulates sorting from early endosomes. Moreover, MTMR4 is preferentially associated with and dephosphorylated the activated regulatory Smad proteins (R-Smads) in cytoplasm to keep transforming growth factor (TGF) beta signaling in homeostasis. It also functions as an essential negative modulator for the homeostasis of bone morphogenetic protein (BMP)/decapentaplegic (Dpp) signaling. In addition, MTMR4 acts as a novel interactor of the ubiquitin ligase Nedd4 (neural-precursor-cell-expressed developmentally down-regulated 4) and may play a role in the biological process of muscle breakdown. MTMR4 contains an N-terminal PH-GRAM (PH-G) domain, a MTM phosphatase domain, a coiled-coil region, and a C-terminal FYVE domain."
definition: >-
  FYVE domain found in myotubularin-related protein 4 (MTMR4) and similar proteins. MTMR4, also termed FYVE domain-containing dual specificity protein phosphatase 2 (FYVE-DSP2), or zinc finger FYVE domain-containing protein 11, is an dual specificity protein phosphatase that specifically dephosphorylates phosphatidylinositol 3-phosphate (PtdIns3P or PI3P). It is localizes to early endosomes, as well as to Rab11- and Sec15-positive recycling endosomes, and regulates sorting from early endosomes. Moreover, MTMR4 is preferentially associated with and dephosphorylated the activated regulatory Smad proteins (R-Smads) in cytoplasm to keep transforming growth factor (TGF) beta signaling in homeostasis. It also functions as an essential negative modulator for the homeostasis of bone morphogenetic protein (BMP)/decapentaplegic (Dpp) signaling. In addition, MTMR4 acts as a novel interactor of the ubiquitin ligase Nedd4 (neural-precursor-cell-expressed developmentally down-regulated 4) and may play a role in the biological process of muscle breakdown. MTMR4 contains an N-terminal PH-GRAM (PH-G) domain, a MTM phosphatase domain, a coiled-coil region, and a C-terminal FYVE domain. — an NCBI CDD conserved domain (cd15733); members share this curated model.
