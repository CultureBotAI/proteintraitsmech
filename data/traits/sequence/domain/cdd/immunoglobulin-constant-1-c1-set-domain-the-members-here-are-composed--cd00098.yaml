identifier: CDD:cd00098
label: "Immunoglobulin Constant-1 (C1)-set domain. The members here are composed of C1-set domains, classical Ig-like domains resembling the antibody constant domain. Members of the IgC1 family are components of immunoglobulin, T-cell receptors, CD1 cell surface glycoproteins, secretory glycoproteins A/C, and major histocompatibility complex (MHC) class I/II molecules. In immunoglobulins, each chain is composed of one variable domain (IgV) and one or more IgC domains. These names reflect the fact that the variability in sequences is higher in the variable domain than in the constant domain. The IgV domain is responsible for antigen binding, while the IgC domain is involved in oligomerization and molecular interactions. The structures in C1-set are smaller than those in the V-set; they have one beta sheet that is formed by strands A, B, E, and D and the other strands by G, F, C, and C'."
definition: >-
  Immunoglobulin Constant-1 (C1)-set domain. The members here are composed of C1-set domains, classical Ig-like domains resembling the antibody constant domain. Members of the IgC1 family are components of immunoglobulin, T-cell receptors, CD1 cell surface glycoproteins, secretory glycoproteins A/C, and major histocompatibility complex (MHC) class I/II molecules. In immunoglobulins, each chain is composed of one variable domain (IgV) and one or more IgC domains. These names reflect the fact that the variability in sequences is higher in the variable domain than in the constant domain. The IgV domain is responsible for antigen binding, while the IgC domain is involved in oligomerization and molecular interactions. The structures in C1-set are smaller than those in the V-set; they have one beta sheet that is formed by strands A, B, E, and D and the other strands by G, F, C, and C'. — an NCBI CDD conserved domain (cd00098); members share this curated model.
