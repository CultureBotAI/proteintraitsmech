identifier: CDD:cd11989
label: "Second Src homology 3 domain (or SH3B) of Intersectin-1. Intersectin-1 (ITSN1) is an adaptor protein that functions in exo- and endocytosis, actin cytoskeletal reorganization, and signal transduction. It plays a role in clathrin-coated pit (CCP) formation. It binds to many proteins through its multidomain structure and facilitate the assembly of multimeric complexes. ITSN1 localizes in membranous organelles, CCPs, the Golgi complex, and may be involved in the cell membrane trafficking system. It exists in alternatively spliced short and long isoforms. The short isoform contains two Eps15 homology domains (EH1 and EH2), a coiled-coil region and five SH3 domains (SH3A-E), while the long isoform, in addition, contains RhoGEF (also called Dbl-homologous or DH), Pleckstrin homology (PH) and C2 domains. The second SH3 domain (or SH3B) of ITSN1 has been shown to bind WNK and CdGAP. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Second Src homology 3 domain (or SH3B) of Intersectin-1. Intersectin-1 (ITSN1) is an adaptor protein that functions in exo- and endocytosis, actin cytoskeletal reorganization, and signal transduction. It plays a role in clathrin-coated pit (CCP) formation. It binds to many proteins through its multidomain structure and facilitate the assembly of multimeric complexes. ITSN1 localizes in membranous organelles, CCPs, the Golgi complex, and may be involved in the cell membrane trafficking system. It exists in alternatively spliced short and long isoforms. The short isoform contains two Eps15 homology domains (EH1 and EH2), a coiled-coil region and five SH3 domains (SH3A-E), while the long isoform, in addition, contains RhoGEF (also called Dbl-homologous or DH), Pleckstrin homology (PH) and C2 domains. The second SH3 domain (or SH3B) of ITSN1 has been shown to bind WNK and CdGAP. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11989); members share this curated model.
