identifier: CDD:cd20054
label: "Forkhead (FH) domain found in Forkhead box protein K1 (FOXK1) and similar proteins. FOXK1, also called myocyte nuclear factor (MNF), acts as a transcriptional regulator that binds to the upstream enhancer region (CCAC box) of myoglobin genes. It positively regulates Wnt/beta-catenin signaling by translocating dishevelled (DVL) proteins into the nucleus. It also reduces virus replication, probably by binding the interferon stimulated response element (ISRE) to promote antiviral gene expression. In addition, FOXK1 plays important roles in multiple human cancers. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein K1 (FOXK1) and similar proteins. FOXK1, also called myocyte nuclear factor (MNF), acts as a transcriptional regulator that binds to the upstream enhancer region (CCAC box) of myoglobin genes. It positively regulates Wnt/beta-catenin signaling by translocating dishevelled (DVL) proteins into the nucleus. It also reduces virus replication, probably by binding the interferon stimulated response element (ISRE) to promote antiviral gene expression. In addition, FOXK1 plays important roles in multiple human cancers. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20054); members share this curated model.
