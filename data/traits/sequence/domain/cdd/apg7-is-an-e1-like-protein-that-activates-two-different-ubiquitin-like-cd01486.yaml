identifier: CDD:cd01486
label: "Apg7 is an E1-like protein, that activates two different ubiquitin-like proteins, Apg12 and Apg8, and assigns them to specific E2 enzymes, Apg10 and Apg3, respectively. This leads to the covalent conjugation of Apg8 with phosphatidylethanolamine, an important step in autophagy. Autophagy is a dynamic membrane phenomenon for bulk protein degradation in the lysosome/vacuole."
definition: >-
  Apg7 is an E1-like protein, that activates two different ubiquitin-like proteins, Apg12 and Apg8, and assigns them to specific E2 enzymes, Apg10 and Apg3, respectively. This leads to the covalent conjugation of Apg8 with phosphatidylethanolamine, an important step in autophagy. Autophagy is a dynamic membrane phenomenon for bulk protein degradation in the lysosome/vacuole. — an NCBI CDD conserved domain (cd01486); members share this curated model.
