identifier: CDD:cd13700
label: "Substrate binding domain of arginine-specific ABC transporter; type 2 periplasmic-binding protein fold. This group includes domains similar to Escherichia coli arginine third transport system. STM4351 is the high arginine specific periplasmic-binding protein of ABC transport system. STM4351 belongs to the type 2 periplasmic-binding fold protein (PBP2) superfamily, whose members are involved in chemotaxis and uptake of nutrients and other small molecules from the extracellular space as a primary receptor. PBP2 typically comprises of two globular subdomains connected by a flexible hinge and bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. After binding their specific ligand with high affinity, they can interact with a cognate membrane transport complex comprised of two integral membrane domains and two receptor cytoplasmically-located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis."
definition: >-
  Substrate binding domain of arginine-specific ABC transporter; type 2 periplasmic-binding protein fold. This group includes domains similar to Escherichia coli arginine third transport system. STM4351 is the high arginine specific periplasmic-binding protein of ABC transport system. STM4351 belongs to the type 2 periplasmic-binding fold protein (PBP2) superfamily, whose members are involved in chemotaxis and uptake of nutrients and other small molecules from the extracellular space as a primary receptor. PBP2 typically comprises of two globular subdomains connected by a flexible hinge and bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. After binding their specific ligand with high affinity, they can interact with a cognate membrane transport complex comprised of two integral membrane domains and two receptor cytoplasmically-located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis. — an NCBI CDD conserved domain (cd13700); members share this curated model.
