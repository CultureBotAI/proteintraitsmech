identifier: CDD:cd12721
label: "RNA recognition motif (RRM) found in yeast nucleoporin Nup53p and similar proteins. This subgroup corresponds to the RRM of Saccharomyces cerevisiae Nup53p, the ortholog of vertebrate nucleoporin Nup53. A unique property of yeast Nup53p is that it contains an additional Kap121p-binding domain and interacts specifically with the karyopherin Kap121p, which is involved in the assembly of Nup53p into NPCs. Like vertebrate Nup35, yeast Nup53p contains an atypical RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), a C-terminal amphipathic alpha-helix and several FG repeats. The RRM domain lacks the conserved residues that typically bind RNA in canonical RRM domains."
definition: >-
  RNA recognition motif (RRM) found in yeast nucleoporin Nup53p and similar proteins. This subgroup corresponds to the RRM of Saccharomyces cerevisiae Nup53p, the ortholog of vertebrate nucleoporin Nup53. A unique property of yeast Nup53p is that it contains an additional Kap121p-binding domain and interacts specifically with the karyopherin Kap121p, which is involved in the assembly of Nup53p into NPCs. Like vertebrate Nup35, yeast Nup53p contains an atypical RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), a C-terminal amphipathic alpha-helix and several FG repeats. The RRM domain lacks the conserved residues that typically bind RNA in canonical RRM domains. — an NCBI CDD conserved domain (cd12721); members share this curated model.
