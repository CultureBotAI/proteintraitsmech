identifier: CDD:cd23738
label: "RNA-editing substrate-binding complex subunit 10 (RESC10). RESC10 (REMC3, MRB800) is a component of the RNA-editing substrate-binding complex (RESC) that is composed of about 20 components and is involved in kinetoplast RNA processing. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode guide RNAs (gRNAs) involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. 12 of the 18 maxicircle genes are present as cryptogenes whose transcripts require U-insertion/deletion editing, mediated by gRNAs, to restore a protein-coding capacity. RESC interacts with two other complexes, the RNA-editing helicase 2 complex (REH2C) and RNA-editing catalytic complex (RECC) to form an assembly (editosome/holoenzyme) that carries out U-insertion/deletion mRNA editing. RESC10 is predicted (by AlphaFold) to adopt an all-helical structure with a disordered N-terminal region (of about 118 amino acids) that is predicted with low confidence. The rest of the protein is predicted with high confidence and shows a helical repeat structure that resembles proteins containing Armadillo (ARM)/beta-catenin-like repeats and tetratricopeptide (TPR) repeats. Both ARM and TPR repeats are implicated in mediating protein-protein interactions."
definition: >-
  RNA-editing substrate-binding complex subunit 10 (RESC10). RESC10 (REMC3, MRB800) is a component of the RNA-editing substrate-binding complex (RESC) that is composed of about 20 components and is involved in kinetoplast RNA processing. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode guide RNAs (gRNAs) involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. 12 of the 18 maxicircle genes are present as cryptogenes whose transcripts require U-insertion/deletion editing, mediated by gRNAs, to restore a protein-coding capacity. RESC interacts with two other complexes, the RNA-editing helicase 2 complex (REH2C) and RNA-editing catalytic complex (RECC) to form an assembly (editosome/holoenzyme) that carries out U-insertion/deletion mRNA editing. RESC10 is predicted (by AlphaFold) to adopt an all-helical structure with a disordered N-terminal region (of about 118 amino acids) that is predicted with low confidence. The rest of the protein is predicted with high confidence and shows a helical repeat structure that resembles proteins containing Armadillo (ARM)/beta-catenin-like repeats and tetratricopeptide (TPR) repeats. Both ARM and TPR repeats are implicated in mediating protein-protein interactions. — an NCBI CDD conserved domain (cd23738); members share this curated model.
