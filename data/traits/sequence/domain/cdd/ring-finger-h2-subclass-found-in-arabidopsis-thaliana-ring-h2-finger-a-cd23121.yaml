identifier: CDD:cd23121
label: "RING finger, H2 subclass, found in Arabidopsis thaliana RING-H2 finger A1a (RHA1A), A1b (RHA1B) and similar proteins. This subfamily includes Arabidopsis thaliana RHA1A, RHA1B and XERICO. RHA1A is a probable E3 ubiquitin-protein ligase that may possess E3 ubiquitin ligase activity in vitro. RHA1B possesses E3 ubiquitin-protein ligase activity when associated with the E2 enzyme UBC8 in vitro. XERICO functions on abscisic acid homeostasis at post-translational level, probably through ubiquitin/proteasome-dependent substrate-specific degradation. Members of this subfamily contain a C3H2C3-type RING-H2 finger."
definition: >-
  RING finger, H2 subclass, found in Arabidopsis thaliana RING-H2 finger A1a (RHA1A), A1b (RHA1B) and similar proteins. This subfamily includes Arabidopsis thaliana RHA1A, RHA1B and XERICO. RHA1A is a probable E3 ubiquitin-protein ligase that may possess E3 ubiquitin ligase activity in vitro. RHA1B possesses E3 ubiquitin-protein ligase activity when associated with the E2 enzyme UBC8 in vitro. XERICO functions on abscisic acid homeostasis at post-translational level, probably through ubiquitin/proteasome-dependent substrate-specific degradation. Members of this subfamily contain a C3H2C3-type RING-H2 finger. — an NCBI CDD conserved domain (cd23121); members share this curated model.
