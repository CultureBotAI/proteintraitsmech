identifier: CDD:cd23826
label: "ubiquitin E2 variant (UEV) domain of Drosophila melanogaster Morgue and related proteins. Morgue is an F-box/ubiquitin conjugase domain protein important for grim-reaper mediated apoptosis. It contains both an F-box and a UEV domain that is homologous to E2 ubiquitin ligases but lacks the conserved cysteine residue required for catalytic activity."
definition: >-
  ubiquitin E2 variant (UEV) domain of Drosophila melanogaster Morgue and related proteins. Morgue is an F-box/ubiquitin conjugase domain protein important for grim-reaper mediated apoptosis. It contains both an F-box and a UEV domain that is homologous to E2 ubiquitin ligases but lacks the conserved cysteine residue required for catalytic activity. — an NCBI CDD conserved domain (cd23826); members share this curated model.
