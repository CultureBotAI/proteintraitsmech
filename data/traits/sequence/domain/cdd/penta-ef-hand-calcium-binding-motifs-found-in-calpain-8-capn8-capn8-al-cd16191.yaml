identifier: CDD:cd16191
label: "Penta-EF hand, calcium binding motifs, found in calpain-8 (CAPN8). CAPN8, also termed new calpain 2 (nCL-2), or stomach-specific M-type calpain, is a calpain large subunit predominantly expressed in the stomach. It appears to be involved in membrane trafficking in the gastric surface mucus cells (pit cells), via its location at the Golgi and interaction with the beta-subunit of coatomer complex (beta-COP) of vesicles derived from the Golgi. Moreover, CAPN8, together with CAPN9, forms an active protease complex, G-calpain, in which both proteins are essential for stability and activity. The G-Calpain has been implicated in gastric mucosal defense. CAPN8 exists as both a monomer and homo-oligomer, but not as a heterodimer with the conventional calpain regulatory subunit (30K). The monomer and homodimer forms predominate. CAPN8 contains a short N-terminal anchor helix, followed by a calpain cysteine protease (CysPc) domain, a C2-domain-like (C2L) domain, and a C-terminal Ca2+-binding penta-EF-hand (PEF) domain."
definition: >-
  Penta-EF hand, calcium binding motifs, found in calpain-8 (CAPN8). CAPN8, also termed new calpain 2 (nCL-2), or stomach-specific M-type calpain, is a calpain large subunit predominantly expressed in the stomach. It appears to be involved in membrane trafficking in the gastric surface mucus cells (pit cells), via its location at the Golgi and interaction with the beta-subunit of coatomer complex (beta-COP) of vesicles derived from the Golgi. Moreover, CAPN8, together with CAPN9, forms an active protease complex, G-calpain, in which both proteins are essential for stability and activity. The G-Calpain has been implicated in gastric mucosal defense. CAPN8 exists as both a monomer and homo-oligomer, but not as a heterodimer with the conventional calpain regulatory subunit (30K). The monomer and homodimer forms predominate. CAPN8 contains a short N-terminal anchor helix, followed by a calpain cysteine protease (CysPc) domain, a C2-domain-like (C2L) domain, and a C-terminal Ca2+-binding penta-EF-hand (PEF) domain. — an NCBI CDD conserved domain (cd16191); members share this curated model.
