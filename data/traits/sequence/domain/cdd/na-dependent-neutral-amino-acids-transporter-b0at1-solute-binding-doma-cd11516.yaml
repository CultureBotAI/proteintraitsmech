identifier: CDD:cd11516
label: "Na(+)-dependent neutral amino acids transporter, B0AT1; solute-binding domain. B0AT1 (also called HND) transports neutral amino acids. Human B0AT1 is encoded by the SLC6A19 gene. B0AT1 is expressed primarily in the kidney and intestine; it requires collectrin for expression in the kidney, and angiotensin-converting enzyme 2 for expression in the intestine. Interaction with these two proteins implicates B0AT1 in more complex processes such as glomerular structure, exocytosis, and blood pressure control. The autosomal recessive disorder, Hartnup disorder, is caused by mutations in B0AT1. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
definition: >-
  Na(+)-dependent neutral amino acids transporter, B0AT1; solute-binding domain. B0AT1 (also called HND) transports neutral amino acids. Human B0AT1 is encoded by the SLC6A19 gene. B0AT1 is expressed primarily in the kidney and intestine; it requires collectrin for expression in the kidney, and angiotensin-converting enzyme 2 for expression in the intestine. Interaction with these two proteins implicates B0AT1 in more complex processes such as glomerular structure, exocytosis, and blood pressure control. The autosomal recessive disorder, Hartnup disorder, is caused by mutations in B0AT1. This subgroup belongs to the solute carrier 6 (SLC6) transporter family. — an NCBI CDD conserved domain (cd11516); members share this curated model.
