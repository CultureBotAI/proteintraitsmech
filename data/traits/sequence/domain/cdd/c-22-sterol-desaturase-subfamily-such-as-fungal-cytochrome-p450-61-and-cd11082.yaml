identifier: CDD:cd11082
label: "C-22 sterol desaturase subfamily, such as fungal cytochrome P450 61 and plant cytochrome P450 710. C-22 sterol desaturase (EC 1.14.19.41), also called sterol 22-desaturase, is required for the formation of the C-22 double bond in the sterol side chain of delta22-unsaturated sterols, which are present specifically in fungi and plants. This enzyme is also called cytochrome P450 61 (CYP61) in fungi and cytochrome P450 710 (CYP710) in plants. The CYP61/CYP710 subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
