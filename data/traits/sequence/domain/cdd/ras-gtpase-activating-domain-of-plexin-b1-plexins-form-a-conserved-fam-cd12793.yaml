identifier: CDD:cd12793
label: "Ras-GTPase Activating Domain of plexin-B1. Plexins form a conserved family of transmembrane receptors for semaphorins and may be the ancestors of semaphorins. Plexins are divided into four types (A-D) according to sequence similarity. Plexin-B1 serves as the Semaphorin 4D receptor and functions as a regulator of developing neurons and a tumor suppressor protein for melanoma. The Sema4D and plexin-B1 signaling complex regulates dendritic and axonal complexity. The activation of Plexin-B1 by Sema4D produces an acute collapse of axonal growth cones in hippocampal and retinal neurons over the early stages of neurite outgrowth and promotes branching and complexity. As a tumor suppressor, plexin-B1 abrogates activation of the oncogenic receptor, c-Met, by its ligand, hepatocyte growth factor (HGF), in melanoma. Furthermore, plexin-B1 suppresses integrin-dependent migration and activation of pp125FAK and inhibits Rho activity. Plexin-B1 is highly expressed in endothelial cells and its activation by Sema4D elicits a potent proangiogenic response. Plexins contain a C-terminal RasGAP domain, which functions as an enhancer of the hydrolysis of GTP that is bound to Ras-GTPases. Plexins display GAP activity towards the Ras homolog Rap. Although the Rho (Ras homolog) GTPases are most closely related to members of the Ras family, RhoGAP and RasGAP show no sequence homology at their amino acid level. RasGTPases function as molecular switches in a large number of of signaling pathways. When bound to GTP they are in the on state and when bound to GDP they are in the off state. The RasGAP domain speeds up the hydrolysis of GTP in Ras-like proteins acting as a negative regulator."
definition: >-
  Ras-GTPase Activating Domain of plexin-B1. Plexins form a conserved family of transmembrane receptors for semaphorins and may be the ancestors of semaphorins. Plexins are divided into four types (A-D) according to sequence similarity. Plexin-B1 serves as the Semaphorin 4D receptor and functions as a regulator of developing neurons and a tumor suppressor protein for melanoma. The Sema4D and plexin-B1 signaling complex regulates dendritic and axonal complexity. The activation of Plexin-B1 by Sema4D produces an acute collapse of axonal growth cones in hippocampal and retinal neurons over the early stages of neurite outgrowth and promotes branching and complexity. As a tumor suppressor, plexin-B1 abrogates activation of the oncogenic receptor, c-Met, by its ligand, hepatocyte growth factor (HGF), in melanoma. Furthermore, plexin-B1 suppresses integrin-dependent migration and activation of pp125FAK and inhibits Rho activity. Plexin-B1 is highly expressed in endothelial cells and its activation by Sema4D elicits a potent proangiogenic response. Plexins contain a C-terminal RasGAP domain, which functions as an enhancer of the hydrolysis of GTP that is bound to Ras-GTPases. Plexins display GAP activity towards the Ras homolog Rap. Although the Rho (Ras homolog) GTPases are most closely related to members of the Ras family, RhoGAP and RasGAP show no sequence homology at their amino acid level. RasGTPases function as molecular switches in a large number of of signaling pathways. When bound to GTP they are in the on state and when bound to GDP they are in the off state. The RasGAP domain speeds up the hydrolysis of GTP in Ras-like proteins acting as a negative regulator. — an NCBI CDD conserved domain (cd12793); members share this curated model.
