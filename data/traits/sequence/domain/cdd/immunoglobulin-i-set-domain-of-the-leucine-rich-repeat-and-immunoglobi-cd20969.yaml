identifier: CDD:cd20969
label: "Immunoglobulin I-set domain of the Leucine-rich repeat and immunoglobin-like domain-containing protein 1 (Lingo-1). The members here are composed of the immunoglobulin I-set (IgI) domain of the Leucine-rich repeat and immunoglobin-like domain-containing protein 1 (Lingo-1). Human Lingo-1 is a central nervous system-specific transmembrane glycoprotein also known as LERN-1, which functions as a negative regulator of neuronal survival, axonal regeneration, and oligodendrocyte differentiation and myelination. Lingo-1 is a key component of the Nogo receptor signaling complex (RTN4R/NGFR) in RhoA activation responsible for some inhibition of axonal regeneration by myelin-associated factors. The ligand-binding ectodomain of human Lingo-1 contains a bimodular, kinked structure composed of leucine-rich repeat (LRR) and immunoglobulin (Ig)-like modules. Diseases associated with Lingo-1 include mental retardation, autosomal recessive 64 and essential tremor. The Ig superfamily (IgSF) is a heterogenous group of proteins, built on a common fold comprised of a sandwich of two beta sheets. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. Unlike the V-set, one of the distinctive features of I-set domains is the lack of a C\" strand. The structure of the Lingo-1 lacks this strand and thus it belongs to the I-set of the IgSF. I-set domains are found in several cell adhesion molecules (such as VCAM, ICAM, and MADCAM), and are also present in numerous other diverse protein families, including several tyrosine-protein kinase receptors, the hemolymph protein hemolin, the muscle proteins titin, telokin, and twitchin, the neuronal adhesion molecule axonin-1, and the signaling molecule semaphorin 4D that is involved in axonal guidance, immune function and angiogenesis."
definition: >-
  Immunoglobulin I-set domain of the Leucine-rich repeat and immunoglobin-like domain-containing protein 1 (Lingo-1). The members here are composed of the immunoglobulin I-set (IgI) domain of the Leucine-rich repeat and immunoglobin-like domain-containing protein 1 (Lingo-1). Human Lingo-1 is a central nervous system-specific transmembrane glycoprotein also known as LERN-1, which functions as a negative regulator of neuronal survival, axonal regeneration, and oligodendrocyte differentiation and myelination. Lingo-1 is a key component of the Nogo receptor signaling complex (RTN4R/NGFR) in RhoA activation responsible for some inhibition of axonal regeneration by myelin-associated factors. The ligand-binding ectodomain of human Lingo-1 contains a bimodular, kinked structure composed of leucine-rich repeat (LRR) and immunoglobulin (Ig)-like modules. Diseases associated with Lingo-1 include mental retardation, autosomal recessive 64 and essential tremor. The Ig superfamily (IgSF) is a heterogenous group of proteins, built on a common fold comprised of a sandwich of two beta sheets. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. Unlike the V-set, one of the distinctive features of I-set domains is the lack of a C" strand. The structure of the Lingo-1 lacks this strand and thus it belongs to the I-set of the IgSF. I-set domains are found in several cell adhesion molecules (such as VCAM, ICAM, and MADCAM), and are also present in numerous other diverse protein families, including several tyrosine-protein kinase receptors, the hemolymph protein hemolin, the muscle proteins titin, telokin, and twitchin, the neuronal adhesion molecule axonin-1, and the signaling molecule semaphorin 4D that is involved in axonal guidance, immune function and angiogenesis. — an NCBI CDD conserved domain (cd20969); members share this curated model.
