identifier: CDD:cd08119
label: "Tubulin Tyrosine Ligase Like. Tubulin tyrosine ligase-like family, member 15 (TTLL15) is a member of Tubulin-tyrosine ligase (TTL, EC 6.3.2.25) family. TTL catalyses the posttranslational addition of a tyrosine to the carboxy-terminal end of detyrosinated alpha-tubulin in the presense of ATP. TTL requires K and Mg ions for catalysis and uses detyrosinated alpha-tubulin as a substrate. It plays a key role in microtubules assembly. Based on the sequence and functional similarities with glutathione synthetase (GSHase), biotin carboxylase (BC), D-ala D-ala ligase (DD-ligase), and succinyl-CoA synthetase (SCS) families it is concluded that TTL belongs to ATP-grasp superfamily. Tubulin tyrosine ligase-like 15 gene (TTLL15) is found in Caenorhabditis elegans."
definition: >-
  Tubulin Tyrosine Ligase Like. Tubulin tyrosine ligase-like family, member 15 (TTLL15) is a member of Tubulin-tyrosine ligase (TTL, EC 6.3.2.25) family. TTL catalyses the posttranslational addition of a tyrosine to the carboxy-terminal end of detyrosinated alpha-tubulin in the presense of ATP. TTL requires K and Mg ions for catalysis and uses detyrosinated alpha-tubulin as a substrate. It plays a key role in microtubules assembly. Based on the sequence and functional similarities with glutathione synthetase (GSHase), biotin carboxylase (BC), D-ala D-ala ligase (DD-ligase), and succinyl-CoA synthetase (SCS) families it is concluded that TTL belongs to ATP-grasp superfamily. Tubulin tyrosine ligase-like 15 gene (TTLL15) is found in Caenorhabditis elegans. — an NCBI CDD conserved domain (cd08119); members share this curated model.
