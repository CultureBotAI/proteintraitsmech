identifier: CDD:cd05418
label: "Nucleotidyltransferase (NT) domain of  Escherichia coli ppGpp synthetase (RelA) and ppGpp synthetase/hydrolase (SpoT) and related proteins. NT_RelA-SpoT_like: A subgroup, of the catalytic domain found in proteins belonging to the Rel-Spo family. This subgroup includes proteins similar to Escherichia coli ppGpp synthetase (RelA) and ppGpp synthetase/hydrolase (SpoT), Streptococcus dysgalactiae subsp. equisimilis Rel/Spo (SeqRel), Streptomyces coelicolor Rel (ScoRel), and Mycobacterium tuberculosis (MtuRelA), and Arabidopsis thaliana Rel-Spo proteins AtRSH1-,-2,and-3.. Bacterial Rel-Spo family enzymes produce an intracellular signaling alarmone guanosine 5prime, 3prime-polyphosphate [(p)ppGpp] that triggers the stringent response, enabling bacteria to survive extended periods of nutrient limitation. Functional characterization of plant AtRSH1-,-2, and-3, supports that these proteins regulate a rapid (p)ppGpp-mediated response to pathogens and other stresses similar to the bacterial stringent response. In E.coli (p)ppGpp is synthesized, by RelA in response to amino-acid starvation and in association with ribosomes, and by SpoT under carbon limitation and in a ribosome-independent fashion. SpoT has dual functionality, in addition to synthesizing (p)ppGpp, it degrades it by a manganese-dependent (p)ppGpp pyrophosphohydrolase activity; in vivo the degradation activity of SpoT is more abundant than its synthetic activity. In contrast, to Gram-negative E. coli and its close relatives, which have two enzymes involved in (p)ppGpp metabolism, most Gram-positive organisms have a single bifunctional Rel-Spo enzyme (Rel), which both synthesizes and degrades (p)ppGpp. With the exception of ribosome-dependent ScoRel, Rels from Gram-positive organisms can carry out ribosome -independent (p)ppGpp synthesis. However, the presence of ribosomes and uncharged tRNA increases the synthesis of (p)ppGpp by SeqRel and MtuRelA; for MtuRel this effect is regulated by the c-terminus of the protein. For SeqRel, the opposing (p)ppGpp synthesis and degradation activities are located to two domains within the same monomer , and a reciprocal regulatory mechanism ensures the two activities are not co-induced. Such a reciprocal regulation mechanism may be a general feature of these bifunctional enzymes. Many proteins belonging to this subgroup have in association with this catalytic domain, an N-terminal HD domain and C-terminal metal dependent phophohydrolase domain (TGS), some also have a C-terminal ACT regulatory domain. Proteins in this subgroup belong to the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. Two of the three catalytic carboxylates are found in Rel-Spo enzymes, missing is the second carboxylate of the DXD motif. Evidence supports a single-cation synthetase mechanism."
definition: >-
  Nucleotidyltransferase (NT) domain of Escherichia coli ppGpp synthetase (RelA) and ppGpp synthetase/hydrolase (SpoT) and related proteins. NT_RelA-SpoT_like: A subgroup, of the catalytic domain found in proteins belonging to the Rel-Spo family. This subgroup includes proteins similar to Escherichia coli ppGpp synthetase (RelA) and ppGpp synthetase/hydrolase (SpoT), Streptococcus dysgalactiae subsp. equisimilis Rel/Spo (SeqRel), Streptomyces coelicolor Rel (ScoRel), and Mycobacterium tuberculosis (MtuRelA), and Arabidopsis thaliana Rel-Spo proteins AtRSH1-,-2,and-3.. Bacterial Rel-Spo family enzymes produce an intracellular signaling alarmone guanosine 5prime, 3prime-polyphosphate [(p)ppGpp] that triggers the stringent response, enabling bacteria to survive extended periods of nutrient limitation. Functional characterization of plant AtRSH1-,-2, and-3, supports that these proteins regulate a rapid (p)ppGpp-mediated response to pathogens and other stresses similar to the bacterial stringent response. In E.coli (p)ppGpp is synthesized, by RelA in response to amino-acid starvation and in association with ribosomes, and by SpoT under carbon limitation and in a ribosome-independent fashion. SpoT has dual functionality, in addition to synthesizing (p)ppGpp, it degrades it by a manganese-dependent (p)ppGpp pyrophosphohydrolase activity; in vivo the degradation activity of SpoT is more abundant than its synthetic activity. In contrast, to Gram-negative E. coli and its close relatives, which have two enzymes involved in (p)ppGpp metabolism, most Gram-positive organisms have a single bifunctional Rel-Spo enzyme (Rel), which both synthesizes and degrades (p)ppGpp. With the exception of ribosome-dependent ScoRel, Rels from Gram-positive organisms can carry out ribosome -independent (p)ppGpp synthesis. However, the presence of ribosomes and uncharged tRNA increases the synthesis of (p)ppGpp by SeqRel and MtuRelA; for MtuRel this effect is regulated by the c-terminus of the protein. For SeqRel, the opposing (p)ppGpp synthesis and degradation activities are located to two domains within the same monomer , and a reciprocal regulatory mechanism ensures the two activities are not co-induced. Such a reciprocal regulation mechanism may be a general feature of these bifunctional enzymes. Many proteins belonging to this subgroup have in association with this catalytic domain, an N-terminal HD domain and C-terminal metal dependent phophohydrolase domain (TGS), some also have a C-terminal ACT regulatory domain. Proteins in this subgroup belong to the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. Two of the three catalytic carboxylates are found in Rel-Spo enzymes, missing is the second carboxylate of the DXD motif. Evidence supports a single-cation synthetase mechanism. — an NCBI CDD conserved domain (cd05418); members share this curated model.
