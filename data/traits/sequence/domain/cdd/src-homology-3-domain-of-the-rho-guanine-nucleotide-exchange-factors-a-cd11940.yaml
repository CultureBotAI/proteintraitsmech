identifier: CDD:cd11940
label: "Src homology 3 domain of the Rho guanine nucleotide exchange factors ARHGEF5 and ARHGEF19. ARHGEF5, also called ephexin-3 or TIM (Transforming immortalized mammary oncogene), is a potent activator of RhoA and it plays roles in regulating cell shape, adhesion, and migration. It binds to the SH3 domain of Src and is involved in regulating Src-induced podosome formation. ARHGEF19, also called ephexin-2 or WGEF (weak-similarity GEF), is highly expressed in the intestine, liver, heart and kidney. It activates RhoA, Cdc42, and Rac 1, and has been shown to activate RhoA in the Wnt-PCP (planar cell polarity) pathway. It is involved in the regulation of cell polarity and cytoskeletal reorganization. ARHGEF5 and ARHGEF19 contain RhoGEF (also called Dbl-homologous or DH), Pleckstrin Homology (PH), and SH3 domains. The SH3 domains of ARHGEFs play an autoinhibitory role through intramolecular interactions with a proline-rich region N-terminal to the DH domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of the Rho guanine nucleotide exchange factors ARHGEF5 and ARHGEF19. ARHGEF5, also called ephexin-3 or TIM (Transforming immortalized mammary oncogene), is a potent activator of RhoA and it plays roles in regulating cell shape, adhesion, and migration. It binds to the SH3 domain of Src and is involved in regulating Src-induced podosome formation. ARHGEF19, also called ephexin-2 or WGEF (weak-similarity GEF), is highly expressed in the intestine, liver, heart and kidney. It activates RhoA, Cdc42, and Rac 1, and has been shown to activate RhoA in the Wnt-PCP (planar cell polarity) pathway. It is involved in the regulation of cell polarity and cytoskeletal reorganization. ARHGEF5 and ARHGEF19 contain RhoGEF (also called Dbl-homologous or DH), Pleckstrin Homology (PH), and SH3 domains. The SH3 domains of ARHGEFs play an autoinhibitory role through intramolecular interactions with a proline-rich region N-terminal to the DH domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11940); members share this curated model.
