identifier: CDD:cd16224
label: "EF-hand, calcium binding motif, found in reticulocalbin-2 (RCN2). RCN2, also termed calcium-binding protein ERC-55, or E6-binding protein (E6BP), or TCBP-49, is an endoplasmic reticulum resident low-affinity Ca2+-binding protein that has been implicated in immunity, redox homeostasis, cell cycle regulation and coagulation. It is associated with tumorigenesis, in particular with transformation of cells of the cervix induced by human papillomavirus (HPV), through binding to human papillomavirus (HPV) E6 oncogenic protein. It specifically interacts with vitamin D receptor among nuclear receptors. RCN2 contains an N-terminal signal sequence followed by six copies of the EF-hand Ca2+-binding motif, and a C-terminal His-Asp-Glu-Leu (HDEL) tetrapeptide that is required for retention of RCN2 in the endoplasmic reticulum (ER)."
definition: >-
