identifier: CDD:cd11302
label: "GDP-fucose protein O-fucosyltransferase 1. The protein O-fucosyltransferase 1 (Ofut1 or O-FucT-1) adds O-fucose to EGF (epidermal growth factor-like) repeats. The O-fucsosylation of the Notch receptor signaling protein is dependent on this enzyme, which requires GDP-fucose as a substrate. O-fucose residues added to the target of O-FucT-1 may be further elongated by other glycosyltransferases. On top of O-fucosylation, O-FucT-1 may have other functions such as the regulation of the Notch receptor exit from the ER. Six highly conserved cysteines are present in O-FucT-1, which is a soluble ER protein, as well as a DXD-like motif (ERD), conserved in mammals, Drosophila, and C. elegans. Both features are characteristic of several glycosyltransferase families. The membrane-bound pre-protein is released by proteolysis and, as for most glycosyltransferases, is strongly activated by manganese. O-FucT-1 is similar to family 1 glycosyltransferases (GT1)."
definition: >-
  GDP-fucose protein O-fucosyltransferase 1. The protein O-fucosyltransferase 1 (Ofut1 or O-FucT-1) adds O-fucose to EGF (epidermal growth factor-like) repeats. The O-fucsosylation of the Notch receptor signaling protein is dependent on this enzyme, which requires GDP-fucose as a substrate. O-fucose residues added to the target of O-FucT-1 may be further elongated by other glycosyltransferases. On top of O-fucosylation, O-FucT-1 may have other functions such as the regulation of the Notch receptor exit from the ER. Six highly conserved cysteines are present in O-FucT-1, which is a soluble ER protein, as well as a DXD-like motif (ERD), conserved in mammals, Drosophila, and C. elegans. Both features are characteristic of several glycosyltransferase families. The membrane-bound pre-protein is released by proteolysis and, as for most glycosyltransferases, is strongly activated by manganese. O-FucT-1 is similar to family 1 glycosyltransferases (GT1). — an NCBI CDD conserved domain (cd11302); members share this curated model.
