label: "second cyclin box found in Arabidopsis thaliana H-type cyclin (CycH) and similar proteins. CycH associates with and activates the cyclin-dependent kinases, CDK-2 and CDK-3. CycH contains two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain."
definition: >-
  second cyclin box found in Arabidopsis thaliana H-type cyclin (CycH) and similar proteins. CycH associates with and activates the cyclin-dependent kinases, CDK-2 and CDK-3. CycH contains two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20586); members share this curated model.
