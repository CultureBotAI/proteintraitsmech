identifier: CDD:cd05739
label: "Third immunoglobulin (Ig)-like domain of the receptor protein tyrosine phosphatase (RPTP)-F (also known as LAR), type IIa; member of the I-set of IgSF domains. The members here are composed of the third immunoglobulin (Ig)-like domain found in the receptor protein tyrosine phosphatase (RPTP)-F, also known as LAR. LAR belongs to the RPTP type IIa subfamily. Members of this subfamily are cell adhesion molecule-like proteins involved in central nervous system (CNS) development. They have large extracellular portions comprised of multiple Ig-like domains and two to nine fibronectin type III (FNIII) domains and a cytoplasmic portion having two tandem phosphatase domains. Included in this group is Drosophila LAR (DLAR)."
definition: >-
  Third immunoglobulin (Ig)-like domain of the receptor protein tyrosine phosphatase (RPTP)-F (also known as LAR), type IIa; member of the I-set of IgSF domains. The members here are composed of the third immunoglobulin (Ig)-like domain found in the receptor protein tyrosine phosphatase (RPTP)-F, also known as LAR. LAR belongs to the RPTP type IIa subfamily. Members of this subfamily are cell adhesion molecule-like proteins involved in central nervous system (CNS) development. They have large extracellular portions comprised of multiple Ig-like domains and two to nine fibronectin type III (FNIII) domains and a cytoplasmic portion having two tandem phosphatase domains. Included in this group is Drosophila LAR (DLAR). — an NCBI CDD conserved domain (cd05739); members share this curated model.
