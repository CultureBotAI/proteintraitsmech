identifier: CDD:cd23010
label: PM41-like
definition: >-
  Seed maturation protein PM41 and related proteins. Seed maturation is comprised of several developmental processes including the formation of the embryo pattern, the accumulation of reserves, the acquisition of tolerance to desiccation and the entry into dormancy. This cd includes seed maturation protein PM41 from Zea mays and related proteins
