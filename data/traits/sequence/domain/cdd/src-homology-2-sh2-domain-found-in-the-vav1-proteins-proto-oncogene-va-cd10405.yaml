identifier: CDD:cd10405
label: "Src homology 2 (SH2) domain found in the Vav1 proteins. Proto-oncogene vav is a member of the Dbl family of guanine nucleotide exchange factors (GEF) for the Rho family of GTP binding proteins.  All vavs are activated by tyrosine phosphorylation leading to their activation. There are three Vav mammalian family members: Vav1 which is expressed in the hematopoietic system, and Vav2 and Vav3 are more ubiquitously expressed. Vav1 plays a role in T-cell and B-cell development and activation.  It has been identified as the specific binding partner of Nef proteins from HIV-1, resulting in morphological changes, cytoskeletal rearrangements, and the JNK/SAPK signaling cascade, leading to increased levels of viral transcription and replication. Vav1 has been shown to interact with Ku70, PLCG1, Lymphocyte cytosolic protein 2, Janus kinase 2, SIAH2, S100B, Abl gene, ARHGDIB, SHB, PIK3R1, PRKCQ, Grb2, MAPK1, Syk, Linker of activated T cells, Cbl gene and EZH2. Vav proteins are involved in several processes that require cytoskeletal reorganization, such as the formation of the immunological synapse (IS), phagocytosis, platelet aggregation, spreading, and transformation.  Vavs function as guanine nucleotide exchange factors (GEFs) for the Rho/Rac family of GTPases. Vav family members have several conserved motifs/domains including: a leucine-rich region, a leucine-zipper, a calponin homology (CH) domain, an acidic domain, a Dbl-homology (DH) domain, a pleckstrin homology (PH) domain, a cysteine-rich domain, 2 SH3 domains, a proline-rich region, and a SH2 domain.  Vavs are the only known Rho GEFs that have both the DH/PH motifs and SH2/SH3 domains in the same protein. The leucine-rich helix-loop-helix (HLH) domain is thought to be involved in protein heterodimerization with other HLH proteins and it may function as a negative regulator by forming inactive heterodimers. The CH domain  is usually involved in the association with filamentous actin, but in Vav it controls NFAT stimulation, Ca2+ mobilization, and its transforming activity. Acidic domains are involved in protein-protein interactions and contain regulatory tyrosines. The DH domain is a GDP-GTP exchange factor on Rho/Rac GTPases. The PH domain in involved in interactions with GTP-binding proteins, lipids and/or phosphorylated serine/threonine residues.  The SH3 domain is involved in localization of proteins to specific sites within the cell interacting with protein with proline-rich sequences. The SH2 domain mediates a high affinity interaction with tyrosine phosphorylated proteins. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in the Vav1 proteins. Proto-oncogene vav is a member of the Dbl family of guanine nucleotide exchange factors (GEF) for the Rho family of GTP binding proteins. All vavs are activated by tyrosine phosphorylation leading to their activation. There are three Vav mammalian family members: Vav1 which is expressed in the hematopoietic system, and Vav2 and Vav3 are more ubiquitously expressed. Vav1 plays a role in T-cell and B-cell development and activation. It has been identified as the specific binding partner of Nef proteins from HIV-1, resulting in morphological changes, cytoskeletal rearrangements, and the JNK/SAPK signaling cascade, leading to increased levels of viral transcription and replication. Vav1 has been shown to interact with Ku70, PLCG1, Lymphocyte cytosolic protein 2, Janus kinase 2, SIAH2, S100B, Abl gene, ARHGDIB, SHB, PIK3R1, PRKCQ, Grb2, MAPK1, Syk, Linker of activated T cells, Cbl gene and EZH2. Vav proteins are involved in several processes that require cytoskeletal reorganization, such as the formation of the immunological synapse (IS), phagocytosis, platelet aggregation, spreading, and transformation. Vavs function as guanine nucleotide exchange factors (GEFs) for the Rho/Rac family of GTPases. Vav family members have several conserved motifs/domains including: a leucine-rich region, a leucine-zipper, a calponin homology (CH) domain, an acidic domain, a Dbl-homology (DH) domain, a pleckstrin homology (PH) domain, a cysteine-rich domain, 2 SH3 domains, a proline-rich region, and a SH2 domain. Vavs are the only known Rho GEFs that have both the DH/PH motifs and SH2/SH3 domains in the same protein. The leucine-rich helix-loop-helix (HLH) domain is thought to be involved in protein heterodimerization with other HLH proteins and it may function as a negative regulator by forming inactive heterodimers. The CH domain is usually involved in the association with filamentous actin, but in Vav it controls NFAT stimulation, Ca2+ mobilization, and its transforming activity. Acidic domains are involved in protein-protein interactions and contain regulatory tyrosines. The DH domain is a GDP-GTP exchange factor on Rho/Rac GTPases. The PH domain in involved in interactions with GTP-binding proteins, lipids and/or phosphorylated serine/threonine residues. The SH3 domain is involved in localization of proteins to specific sites within the cell interacting with protein with proline-rich sequences. The SH2 domain mediates a high affinity interaction with tyrosine phosphorylated proteins. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10405); members share this curated model.
