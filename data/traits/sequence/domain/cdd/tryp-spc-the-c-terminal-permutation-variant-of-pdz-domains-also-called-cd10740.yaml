identifier: CDD:cd10740
label: Tryp_SPc_PDZ_C_DegS
definition: >-
  Tryp_SPc. The C-terminal permutation variant of PDZ domains, also called DHR (Dlg homologous region) or GLGF (after a conserved sequence motif), bind C-terminal polypeptides, though binding to internal (non-C-terminal) polypeptides and to lipids has been demonstrated. Heterodimerization through PDZ-PDZ domain interactions adds to the domain's versatility, and PDZ domain-mediated interactions may be modulated dynamically through target phosphorylation. This CD contains the structural subgroup with the C-terminal beta-strand forming the peptide-binding groove base. This permutation variant (PDZ_C) is found in all three kingdoms of life, and many appear to co-occur with protease domains such as the lineage specific ATP-dependent LON serine proteases of Bacilli. Also included in this CD is a small subgroup of archaeal metalloprotase PDZ domains that cluster with a third structural type with a more extensive C-terminal permutation
