identifier: CDD:cd12642
label: "RNA recognition motif (RRM) found in transformer-2 protein homolog alpha (TRA-2 alpha) and similar proteins. This subgroup corresponds to the RRM of TRA2-alpha or TRA-2-alpha, also termed transformer-2 protein homolog A, a mammalian homolog of Drosophila transformer-2 (Tra2). TRA2-alpha is a 40-kDa serine/arginine-rich (SR) protein (SRp40) that specifically binds to gonadotropin-releasing hormone (GnRH) exonic splicing enhancer on exon 4 (ESE4) and is necessary for enhanced GnRH pre-mRNA splicing. It strongly stimulates GnRH intron A excision in a dose-dependent manner. In addition, TRA2-alpha can interact with either 9G8 or SRp30c, which may also be crucial for ESE-dependent GnRH pre-mRNA splicing. TRA2-alpha contains a well conserved RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), flanked by the N- and C-terminal arginine/serine (RS)-rich regions."
definition: >-
  RNA recognition motif (RRM) found in transformer-2 protein homolog alpha (TRA-2 alpha) and similar proteins. This subgroup corresponds to the RRM of TRA2-alpha or TRA-2-alpha, also termed transformer-2 protein homolog A, a mammalian homolog of Drosophila transformer-2 (Tra2). TRA2-alpha is a 40-kDa serine/arginine-rich (SR) protein (SRp40) that specifically binds to gonadotropin-releasing hormone (GnRH) exonic splicing enhancer on exon 4 (ESE4) and is necessary for enhanced GnRH pre-mRNA splicing. It strongly stimulates GnRH intron A excision in a dose-dependent manner. In addition, TRA2-alpha can interact with either 9G8 or SRp30c, which may also be crucial for ESE-dependent GnRH pre-mRNA splicing. TRA2-alpha contains a well conserved RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), flanked by the N- and C-terminal arginine/serine (RS)-rich regions. — an NCBI CDD conserved domain (cd12642); members share this curated model.
