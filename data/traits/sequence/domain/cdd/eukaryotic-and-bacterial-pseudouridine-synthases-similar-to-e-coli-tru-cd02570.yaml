identifier: CDD:cd02570
label: "Eukaryotic and bacterial pseudouridine synthases similar to E.  coli TruA. This group consists of eukaryotic and bacterial pseudouridine synthases similar to E.  coli TruA, Pseudomonas aeruginosa truA and human pseudouridine synthase-like 1 (PUSL1). Pseudouridine synthases catalyze the isomerization of specific uridines in an RNA molecule to pseudouridines (5-ribosyluracil, psi).  No cofactors are required. E. coli TruA makes psi38/39 and/or 40 in tRNA.  psi38 and psi39 in tRNAs are highly phylogenetically conserved.  P. aeruginosa truA is required for induction of type III secretory genes and may act through modifying tRNAs critical for the expression of type III genes or their regulators."
definition: >-
  Eukaryotic and bacterial pseudouridine synthases similar to E. coli TruA. This group consists of eukaryotic and bacterial pseudouridine synthases similar to E. coli TruA, Pseudomonas aeruginosa truA and human pseudouridine synthase-like 1 (PUSL1). Pseudouridine synthases catalyze the isomerization of specific uridines in an RNA molecule to pseudouridines (5-ribosyluracil, psi). No cofactors are required. E. coli TruA makes psi38/39 and/or 40 in tRNA. psi38 and psi39 in tRNAs are highly phylogenetically conserved. P. aeruginosa truA is required for induction of type III secretory genes and may act through modifying tRNAs critical for the expression of type III genes or their regulators. — an NCBI CDD conserved domain (cd02570); members share this curated model.
