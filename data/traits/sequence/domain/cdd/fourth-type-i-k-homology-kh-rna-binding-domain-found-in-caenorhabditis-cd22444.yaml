identifier: CDD:cd22444
label: KH-I_CeGLD3_rpt4
definition: >-
  fourth type I K homology (KH) RNA-binding domain found in Caenorhabditis elegans defective in germ line development protein 3 (CeGLD-3) and similar proteins. CeGLD-3, also called germline development defective 3, is a Bicaudal-C (Bic-C) homolog that is involved in the translational control of germline-specific mRNAs during embryogenesis. It interacts with the cytoplasmic poly(A)-polymerase GLD-2. The two proteins cooperate to recognize target mRNAs and convert them into a polyadenylated, translationally active state. CeGLD-3 contains four K-homology (KH) RNA-binding domains, which are divergent KH domains that lacks the RNA-binding GXXG motif. The model corresponds to the fourth one
