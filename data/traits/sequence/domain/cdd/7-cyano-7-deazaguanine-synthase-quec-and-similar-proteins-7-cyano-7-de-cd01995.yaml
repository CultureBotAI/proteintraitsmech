identifier: CDD:cd01995
label: "7-cyano-7-deazaguanine synthase QueC and similar proteins. 7-cyano-7-deazaguanine synthase (EC 6.3.4.20) is also called 7-cyano-7-carbaguanine synthase, preQ(0) synthase, or queuosine biosynthesis protein QueC. It catalyzes the ATP-dependent conversion of 7-carboxy-7-deazaguanine (CDG) to 7-cyano-7-deazaguanine (preQ(0)), as part of the biosynthesis pathway of queuosine (Q). Q is one of the most complex modifications occurring at the wobble position of tRNAs with GUN anticodons, and is implicated in a number of biological activities, including accuracy of decoding, virulence, and cellular differentiation. This subfamily belongs to the adenine nucleotide alpha hydrolase (AANH) superfamily that also includes other N-type ATP PPases and ATP sulfurylases. It forms an alpha/beta/alpha fold which binds to the adenosine group."
definition: >-
  7-cyano-7-deazaguanine synthase QueC and similar proteins. 7-cyano-7-deazaguanine synthase (EC 6.3.4.20) is also called 7-cyano-7-carbaguanine synthase, preQ(0) synthase, or queuosine biosynthesis protein QueC. It catalyzes the ATP-dependent conversion of 7-carboxy-7-deazaguanine (CDG) to 7-cyano-7-deazaguanine (preQ(0)), as part of the biosynthesis pathway of queuosine (Q). Q is one of the most complex modifications occurring at the wobble position of tRNAs with GUN anticodons, and is implicated in a number of biological activities, including accuracy of decoding, virulence, and cellular differentiation. This subfamily belongs to the adenine nucleotide alpha hydrolase (AANH) superfamily that also includes other N-type ATP PPases and ATP sulfurylases. It forms an alpha/beta/alpha fold which binds to the adenosine group. — an NCBI CDD conserved domain (cd01995); members share this curated model.
