identifier: CDD:cd18137
label: "helical lid domain of DNA polymerase III subunits gamma and tau. DNA polymerase III subunit gamma/tau is part of the DNA polymerase III holoenzyme. Gamma and tau subunits are isoforms, both containing the helical lid domain. Gamma interacts with the delta subunit to transfer the beta subunit on the DNA while tau serves as a scaffold to help in the dimerization of the core complex. Both are members of the clamp-loader clade of the AAA+ superfamily."
definition: >-
  helical lid domain of DNA polymerase III subunits gamma and tau. DNA polymerase III subunit gamma/tau is part of the DNA polymerase III holoenzyme. Gamma and tau subunits are isoforms, both containing the helical lid domain. Gamma interacts with the delta subunit to transfer the beta subunit on the DNA while tau serves as a scaffold to help in the dimerization of the core complex. Both are members of the clamp-loader clade of the AAA+ superfamily. — an NCBI CDD conserved domain (cd18137); members share this curated model.
