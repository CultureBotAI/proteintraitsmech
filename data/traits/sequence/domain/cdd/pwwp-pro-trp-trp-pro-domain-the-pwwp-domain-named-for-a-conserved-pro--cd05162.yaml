identifier: CDD:cd05162
label: "PWWP (Pro-Trp-Trp-Pro) domain. The PWWP domain, named for a conserved Pro-Trp-Trp-Pro motif, is a small domain consisting of 100-150 amino acids and is composed of a five-stranded antiparallel beta-barrel followed by a helical region. It is found in numerous proteins that are involved in cell division, growth, and differentiation. Most PWWP-domain proteins seem to be nuclear, often DNA-binding, proteins that function as transcription factors regulating a variety of developmental processes. PWWP domains specifically recognize DNA and histone methylated lysines at the level of the nucleosome. Based on the fact that other regions of PWWP-domain proteins are responsible for nuclear localization and DNA-binding, is likely that the PWWP domain acts as a site for protein-protein binding interactions, influencing chromatin remodeling and thereby regulating transcriptional processes. Some PWWP-domain proteins have been linked to cancer or other diseases; some are known to function as growth factors."
