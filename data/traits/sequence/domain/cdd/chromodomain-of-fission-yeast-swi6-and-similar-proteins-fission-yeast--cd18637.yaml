identifier: CDD:cd18637
label: "chromodomain of fission yeast Swi6, and similar proteins. Fission yeast Swi6 protein is a structural and functional homolog of mammalian HP1 (heterochromatin protein 1) and is involved in the chromatin structure by binding to centromeres, telomeres, and the silent mating-type locus. Swi6 contains a N-terminal chromo (CHRromatin Organization MOdifier) domain and a C-terminal chromo shadow domain (CSD). Swi6 binds histone H3 tails methylated at Lys- and the cohesion subunit Psc3, leading to silencing the genes and sister chromatid cohesion. It is also involved in the repression of the silent mating-type loci MAT2 and MAT3. Swi6 may compact MAT2/3 into a heterochromatin-like conformation which represses the transcription of these silent cassettes. chromodomains mediate the interaction of the heterochromatin with other heterochromatin proteins, thereby affecting chromatin structure (e.g. Drosophila and human heterochromatin protein (HP1) and mammalian modifier 1 and modifier 2). CSDs have only been found in proteins that also possess a chromodomain."
definition: >-
  chromodomain of fission yeast Swi6, and similar proteins. Fission yeast Swi6 protein is a structural and functional homolog of mammalian HP1 (heterochromatin protein 1) and is involved in the chromatin structure by binding to centromeres, telomeres, and the silent mating-type locus. Swi6 contains a N-terminal chromo (CHRromatin Organization MOdifier) domain and a C-terminal chromo shadow domain (CSD). Swi6 binds histone H3 tails methylated at Lys- and the cohesion subunit Psc3, leading to silencing the genes and sister chromatid cohesion. It is also involved in the repression of the silent mating-type loci MAT2 and MAT3. Swi6 may compact MAT2/3 into a heterochromatin-like conformation which represses the transcription of these silent cassettes. chromodomains mediate the interaction of the heterochromatin with other heterochromatin proteins, thereby affecting chromatin structure (e.g. Drosophila and human heterochromatin protein (HP1) and mammalian modifier 1 and modifier 2). CSDs have only been found in proteins that also possess a chromodomain. — an NCBI CDD conserved domain (cd18637); members share this curated model.
