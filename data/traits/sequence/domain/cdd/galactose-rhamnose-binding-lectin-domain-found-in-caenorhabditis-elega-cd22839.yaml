identifier: CDD:cd22839
label: "galactose/rhamnose binding lectin domain found in Caenorhabditis elegans latrophilin-like protein 1 (LAT1) and similar proteins. LAT1 plays a role in the establishment of anterior-posterior polarity in tissues during embryogenesis. It is required for the alignment of the mitotic spindles and division planes. It may have a role in cell death events and play an essential role in normal defection and oocyte fertilization. LAT1 is involved in sperm function. it operates in pharyngeal pumping during feeding. LAT1 contains a galactose/rhamnose binding lectin domain at the N-terminus."
definition: >-
  galactose/rhamnose binding lectin domain found in Caenorhabditis elegans latrophilin-like protein 1 (LAT1) and similar proteins. LAT1 plays a role in the establishment of anterior-posterior polarity in tissues during embryogenesis. It is required for the alignment of the mitotic spindles and division planes. It may have a role in cell death events and play an essential role in normal defection and oocyte fertilization. LAT1 is involved in sperm function. it operates in pharyngeal pumping during feeding. LAT1 contains a galactose/rhamnose binding lectin domain at the N-terminus. — an NCBI CDD conserved domain (cd22839); members share this curated model.
