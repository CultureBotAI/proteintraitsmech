identifier: CDD:cd11854
label: "Src homology 3 domain of yeast cell fusion protein Fus1p. Fus1p is required at the cell surface for cell fusion during the mating response in yeast. It requires Bch1p and Bud7p, which are Chs5p-Arf1p binding proteins, for localization to the plasma membrane. It acts as a scaffold protein to assemble a cell surface complex which is involved in septum degradation and inhibition of the NOG pathway to promote cell fusion. The SH3 domain of Fus1p interacts with Bin1p, a formin that controls the assembly of actin cables in response to Cdc42 signaling. It has been shown to bind the motif, R(S/T)(S/T)SL, instead of PxxP motifs. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of yeast cell fusion protein Fus1p. Fus1p is required at the cell surface for cell fusion during the mating response in yeast. It requires Bch1p and Bud7p, which are Chs5p-Arf1p binding proteins, for localization to the plasma membrane. It acts as a scaffold protein to assemble a cell surface complex which is involved in septum degradation and inhibition of the NOG pathway to promote cell fusion. The SH3 domain of Fus1p interacts with Bin1p, a formin that controls the assembly of actin cables in response to Cdc42 signaling. It has been shown to bind the motif, R(S/T)(S/T)SL, instead of PxxP motifs. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11854); members share this curated model.
