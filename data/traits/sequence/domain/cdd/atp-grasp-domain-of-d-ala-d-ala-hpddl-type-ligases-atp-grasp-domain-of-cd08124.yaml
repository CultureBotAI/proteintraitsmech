identifier: CDD:cd08124
label: ATP-G_DDala_HpDdl
definition: >-
  ATP-grasp domain of D-ala-D-ala (HpDdl type) ligases. ATP-grasp domain of D-ala-D-ala (HpDdl type) ligases. D-alanine:D-alanine ligase (Ddl, EC 6.3.2.4) is a bacterial cell wall synthesizing enzyme that catalyzes the ligation of two D-alanines in the presence of ATP. This group represents HpDdl (Halicobacter pylori D-ala-D-ala) type of enzymes that are sensitive to vancomycin. These enzymes convert ATP to ADP during ligation raction where carboxylate substrate is D-alanine and amine or thiol substrate is also D-alanine. Sequence and structure analysis confirms that w-loop residues define the active site and covers the substrate-binding cleft
