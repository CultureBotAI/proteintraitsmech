identifier: CDD:cd14416
label: "UBA-like domain found in nascent polypeptide-associated complex subunit alpha domain-containing protein 1 (NACAD). The subfamily includes a group of uncharacterized proteins mainly found in vertebrates. Their biological function remains unknown, but they show high sequence similarity to the nascent polypeptide-associated complex (NAC) subunit alpha (NACA) that exists as part of several protein complexes playing a role in proliferation, apoptosis, or degradation. Like NACA, NACAD contains an NAC domain and a C-terminal ubiquitin-associated (UBA) domain."
definition: >-
  UBA-like domain found in nascent polypeptide-associated complex subunit alpha domain-containing protein 1 (NACAD). The subfamily includes a group of uncharacterized proteins mainly found in vertebrates. Their biological function remains unknown, but they show high sequence similarity to the nascent polypeptide-associated complex (NAC) subunit alpha (NACA) that exists as part of several protein complexes playing a role in proliferation, apoptosis, or degradation. Like NACA, NACAD contains an NAC domain and a C-terminal ubiquitin-associated (UBA) domain. — an NCBI CDD conserved domain (cd14416); members share this curated model.
