identifier: CDD:cd02575
label: "Pseudouridine synthase, similar to Escherichia coli TruD. This group consists of bacterial pseudouridine synthases similar to Escherichia coli TruD. Pseudouridine synthases catalyze the isomerization of specific uridines in an RNA molecule to pseudouridines (5-ribosyluracil, psi).  E. coli TruD makes the highly phylogenetically conserved psi13 in tRNAs."
definition: >-
  Pseudouridine synthase, similar to Escherichia coli TruD. This group consists of bacterial pseudouridine synthases similar to Escherichia coli TruD. Pseudouridine synthases catalyze the isomerization of specific uridines in an RNA molecule to pseudouridines (5-ribosyluracil, psi). E. coli TruD makes the highly phylogenetically conserved psi13 in tRNAs. — an NCBI CDD conserved domain (cd02575); members share this curated model.
