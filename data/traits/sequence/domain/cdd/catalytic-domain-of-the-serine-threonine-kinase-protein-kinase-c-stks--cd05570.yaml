identifier: CDD:cd05570
label: "Catalytic domain of the Serine/Threonine Kinase, Protein Kinase C. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. PKCs are classified into three groups (classical, atypical, and novel) depending on their mode of activation and the structural characteristics of their regulatory domain. PKCs undergo three phosphorylations in order to take mature forms. In addition, classical PKCs depend on calcium, DAG (1,2-diacylglycerol), and in most cases, phosphatidylserine (PS) for activation. Novel PKCs are calcium-independent, but require DAG and PS for activity, while atypical PKCs only require PS. PKCs phosphorylate and modify the activities of a wide variety of cellular proteins including receptors, enzymes, cytoskeletal proteins, transcription factors, and other kinases. They play a central role in signal transduction pathways that regulate cell migration and polarity, proliferation, differentiation, and apoptosis. Also included in this subfamily are the PKC-like proteins, called PKNs. The PKC subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Protein Kinase C. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. PKCs are classified into three groups (classical, atypical, and novel) depending on their mode of activation and the structural characteristics of their regulatory domain. PKCs undergo three phosphorylations in order to take mature forms. In addition, classical PKCs depend on calcium, DAG (1,2-diacylglycerol), and in most cases, phosphatidylserine (PS) for activation. Novel PKCs are calcium-independent, but require DAG and PS for activity, while atypical PKCs only require PS. PKCs phosphorylate and modify the activities of a wide variety of cellular proteins including receptors, enzymes, cytoskeletal proteins, transcription factors, and other kinases. They play a central role in signal transduction pathways that regulate cell migration and polarity, proliferation, differentiation, and apoptosis. Also included in this subfamily are the PKC-like proteins, called PKNs. The PKC subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05570); members share this curated model.
