identifier: CDD:cd22464
label: "type I K homology (KH) RNA-binding domain found in Arabidopsis thaliana zinc finger CCCH domain-containing proteins AtC3H36, AtC3H52 and similar proteins. The family corresponds to a group of plant CCCH family zinc finger proteins, such as AtC3H36 and AtC3H52, which contain one K homology (KH) RNA-binding domain.  They may play important roles in RNA processing as RNA-binding proteins in animals. They may also have an effective role in stress tolerance."
definition: >-
  type I K homology (KH) RNA-binding domain found in Arabidopsis thaliana zinc finger CCCH domain-containing proteins AtC3H36, AtC3H52 and similar proteins. The family corresponds to a group of plant CCCH family zinc finger proteins, such as AtC3H36 and AtC3H52, which contain one K homology (KH) RNA-binding domain. They may play important roles in RNA processing as RNA-binding proteins in animals. They may also have an effective role in stress tolerance. — an NCBI CDD conserved domain (cd22464); members share this curated model.
