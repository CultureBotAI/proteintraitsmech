label: FAP276
definition: >-
  Chlamydomonas reinhardtii flagellum-associated protein 276 (FAP276), and similar proteins. The family includes Chlamydomonas reinhardtii FAP276 and similar proteins. Flagellum-associated protein 276 (FAP276) is an inner junction (IJ) protein that acts as a component of the decorated ciliary doublet microtubule, which reveals the identities, positions, repeat lengths, and interactions of 38 associated proteins, including 33 microtubule inner proteins (MIPs). FAP276, together with PArkin Co-Regulated Gene (PACRG), FAP20, and FAP52, forms an IJ complex of the cilia, which is an interaction hub that involves tubulin post-translational modifications
