identifier: CDD:cd17688
label: "RUN domain found in small G protein signaling modulator 3 (SGSM3) and similar proteins. SGSM3, also called RUN and TBC1 domain-containing protein 3 (RUTBC3), or Merlin-Associated Protein (MAP), or Rab-GTPase-activating protein-like protein (RabGAPLP), may play a cooperative role in NF2-mediated growth suppression of cells. This model contains the RUN domain of SGSM3."
definition: >-
