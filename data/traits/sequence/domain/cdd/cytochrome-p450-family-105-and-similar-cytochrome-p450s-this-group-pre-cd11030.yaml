identifier: CDD:cd11030
label: "cytochrome P450 family 105 and similar cytochrome P450s. This group predominantly contains bacterial cytochrome P450s, including those belonging to families 105 (CYP105) and 165 (CYP165). Also included in this group are fungal family 55 proteins (CYP55). CYP105s are predominantly found in bacteria belonging to the phylum Actinobacteria and the order Actinomycetales, and are associated with a wide variety of pathways and processes, from steroid biotransformation to production of macrolide metabolites. CYP105A1 catalyzes two sequential hydroxylations of vitamin D3 with differing specificity and cytochrome P450-SOY (also known as CYP105D1) has been shown to be capable of both oxidation and dealkylation reactions. CYP105D6 and CYP105P1, from the filipin biosynthetic pathway, perform highly regio- and stereospecific hydroxylations. Other members of this group include, but are not limited to: CYP165D3 (also called OxyE) from the teicoplanin biosynthetic gene cluster of Actinoplanes teichomyceticus, which is responsible for the phenolic coupling of the aromatic side chains of the first and third peptide residues in the teicoplanin peptide; Micromonospora griseorubida cytochrome P450 MycCI that catalyzes hydroxylation at the C21 methyl group of mycinamicin VIII, the earliest macrolide form in the postpolyketide synthase tailoring pathway; and Fusarium oxysporum CYP55A1 (also called nitric oxide reductase cytochrome P450nor) that catalyzes an unusual reaction, the direct electron transfer from NAD(P)H to bound heme. The CYP105-like group belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 family 105 and similar cytochrome P450s. This group predominantly contains bacterial cytochrome P450s, including those belonging to families 105 (CYP105) and 165 (CYP165). Also included in this group are fungal family 55 proteins (CYP55). CYP105s are predominantly found in bacteria belonging to the phylum Actinobacteria and the order Actinomycetales, and are associated with a wide variety of pathways and processes, from steroid biotransformation to production of macrolide metabolites. CYP105A1 catalyzes two sequential hydroxylations of vitamin D3 with differing specificity and cytochrome P450-SOY (also known as CYP105D1) has been shown to be capable of both oxidation and dealkylation reactions. CYP105D6 and CYP105P1, from the filipin biosynthetic pathway, perform highly regio- and stereospecific hydroxylations. Other members of this group include, but are not limited to: CYP165D3 (also called OxyE) from the teicoplanin biosynthetic gene cluster of Actinoplanes teichomyceticus, which is responsible for the phenolic coupling of the aromatic side chains of the first and third peptide residues in the teicoplanin peptide; Micromonospora griseorubida cytochrome P450 MycCI that catalyzes hydroxylation at the C21 methyl group of mycinamicin VIII, the earliest macrolide form in the postpolyketide synthase tailoring pathway; and Fusarium oxysporum CYP55A1 (also called nitric oxide reductase cytochrome P450nor) that catalyzes an unusual reaction, the direct electron transfer from NAD(P)H to bound heme. The CYP105-like group belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd11030); members share this curated model.
