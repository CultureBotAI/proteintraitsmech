identifier: CDD:cd17087
label: "RING finger- and WD40-associated ubiquitin-like (RAWUL) domain found in DREB2A-interacting protein (DRIP) and similar proteins. Dehydration-Responsive Element-Binding Protein 2A (DREB2A) regulates the expression of stress-inducible genes via the dehydration-responsive elements and requires posttranslational modification for its activation. DREB2A-Interacting Protein (DRIP) contains a RING finger, and a RING finger- and WD40-associated ubiquitin-like (RAWUL) domain. DRIP interacts with DREB2A and functions as a E3 ubiquitin ligases that negatively regulates DREB2A expression."
definition: >-
  RING finger- and WD40-associated ubiquitin-like (RAWUL) domain found in DREB2A-interacting protein (DRIP) and similar proteins. Dehydration-Responsive Element-Binding Protein 2A (DREB2A) regulates the expression of stress-inducible genes via the dehydration-responsive elements and requires posttranslational modification for its activation. DREB2A-Interacting Protein (DRIP) contains a RING finger, and a RING finger- and WD40-associated ubiquitin-like (RAWUL) domain. DRIP interacts with DREB2A and functions as a E3 ubiquitin ligases that negatively regulates DREB2A expression. — an NCBI CDD conserved domain (cd17087); members share this curated model.
