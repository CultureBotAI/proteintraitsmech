identifier: CDD:cd16419
label: "sucrose-phosphate synthase; belongs to the haloalcanoic acid dehalogenase (HAD) superfamily. Sucrose phosphate synthase (SPS; EC 2.4.1.14) also known as UDP-glucose-fructose-phosphate glucosyltransferase, catalyzes the transfer of a hexosyl group from UDP-glucose to D-fructose 6-phosphate to form UDP and D-sucrose-6-phosphate, this is the rate limiting step of sucrose synthesis. Members of this family belong to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase (C-Cl bond hydrolysis), azetidine hydrolase (C-N bond hydrolysis); phosphonoacetaldehyde hydrolase (C-P bond hydrolysis), phosphoserine phosphatase and phosphomannomutase (CO-P bond hydrolysis), P-type ATPases (PO-P bond hydrolysis) and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases."
definition: >-
  sucrose-phosphate synthase; belongs to the haloalcanoic acid dehalogenase (HAD) superfamily. Sucrose phosphate synthase (SPS; EC 2.4.1.14) also known as UDP-glucose-fructose-phosphate glucosyltransferase, catalyzes the transfer of a hexosyl group from UDP-glucose to D-fructose 6-phosphate to form UDP and D-sucrose-6-phosphate, this is the rate limiting step of sucrose synthesis. Members of this family belong to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase (C-Cl bond hydrolysis), azetidine hydrolase (C-N bond hydrolysis); phosphonoacetaldehyde hydrolase (C-P bond hydrolysis), phosphoserine phosphatase and phosphomannomutase (CO-P bond hydrolysis), P-type ATPases (PO-P bond hydrolysis) and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases. — an NCBI CDD conserved domain (cd16419); members share this curated model.
