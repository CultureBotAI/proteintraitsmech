identifier: CDD:cd16794
label: "Degenerated RING finger found in protein RMD5 homolog A (RMD5A). RMD5A is one of the vertebrate homologs of yeast Rmd5p. The biological function of RMD5A remains unclear. RMD5A contains a Lissencephaly type-1-like homology motif (LisH), a C-terminal to LisH motif (CTLH) domain, and a degenerated RING finger that is characterized by lacking the second, fifth, and sixth Zn2+ ion-coordinating residues compared with the classic C3H2C3-/C3HC4-type RING fingers."
definition: >-
  Degenerated RING finger found in protein RMD5 homolog A (RMD5A). RMD5A is one of the vertebrate homologs of yeast Rmd5p. The biological function of RMD5A remains unclear. RMD5A contains a Lissencephaly type-1-like homology motif (LisH), a C-terminal to LisH motif (CTLH) domain, and a degenerated RING finger that is characterized by lacking the second, fifth, and sixth Zn2+ ion-coordinating residues compared with the classic C3H2C3-/C3HC4-type RING fingers. — an NCBI CDD conserved domain (cd16794); members share this curated model.
