identifier: CDD:cd07816
label: "Ligand-binding bet_v_1 domain of major pollen allergen of white birch (Betula verrucosa), Bet v 1, and related proteins. This family includes the ligand binding domain of Bet v 1 (the major pollen allergen of white birch, Betula verrucosa) and related proteins. In addition to birch Bet v 1, this family includes other plant intracellular pathogenesis-related class 10 (PR-10) proteins, norcoclaurine synthases (NCSs), cytokinin binding proteins (CSBPs), major latex proteins (MLPs), and ripening-related proteins. It belongs to the SRPBCC (START/RHO_alpha_C/PITP/Bet_v1/CoxG/CalC) domain superfamily of proteins that bind hydrophobic ligands. SRPBCC domains have a deep hydrophobic ligand-binding pocket. Members of this family binds a diverse range of ligands. Bet v 1 can bind brassinosteroids, cytokinins, flavonoids and fatty acids. Hyp-1, a PR-10 from Hypericum perforatum/St. John's wort, catalyzes the condensation of two molecules of emodin to the bioactive naphthodianthrone hypericin. NCSs catalyze the condensation of dopamine and 4-hydroxyphenylacetaldehyde to (S)-norcoclaurine, the first committed step in the biosynthesis of benzylisoquinoline alkaloids such as morphine. The role of MLPs is unclear; however, they are associated with fruit and flower development and in pathogen defense responses. A number of PR-10 proteins in this subgroup, including Bet v 1, have in vitro RNase activity, the biological significance of which is unclear. Bet v 1 family proteins have a conserved glycine-rich P (phosphate-binding)-loop proximal to the entrance of the ligand-binding pocket. However, its conformation differs from that of the canonical P-loop structure found in nucleotide-binding proteins. Several PR-10 members including Bet v1 are allergenic. Cross-reactivity of Bet v 1 with homologs from plant foods results in birch-fruit syndrome."
definition: >-
  Ligand-binding bet_v_1 domain of major pollen allergen of white birch (Betula verrucosa), Bet v 1, and related proteins. This family includes the ligand binding domain of Bet v 1 (the major pollen allergen of white birch, Betula verrucosa) and related proteins. In addition to birch Bet v 1, this family includes other plant intracellular pathogenesis-related class 10 (PR-10) proteins, norcoclaurine synthases (NCSs), cytokinin binding proteins (CSBPs), major latex proteins (MLPs), and ripening-related proteins. It belongs to the SRPBCC (START/RHO_alpha_C/PITP/Bet_v1/CoxG/CalC) domain superfamily of proteins that bind hydrophobic ligands. SRPBCC domains have a deep hydrophobic ligand-binding pocket. Members of this family binds a diverse range of ligands. Bet v 1 can bind brassinosteroids, cytokinins, flavonoids and fatty acids. Hyp-1, a PR-10 from Hypericum perforatum/St. John's wort, catalyzes the condensation of two molecules of emodin to the bioactive naphthodianthrone hypericin. NCSs catalyze the condensation of dopamine and 4-hydroxyphenylacetaldehyde to (S)-norcoclaurine, the first committed step in the biosynthesis of benzylisoquinoline alkaloids such as morphine. The role of MLPs is unclear; however, they are associated with fruit and flower development and in pathogen defense responses. A number of PR-10 proteins in this subgroup, including Bet v 1, have in vitro RNase activity, the biological significance of which is unclear. Bet v 1 family proteins have a conserved glycine-rich P (phosphate-binding)-loop proximal to the entrance of the ligand-binding pocket. However, its conformation differs from that of the canonical P-loop structure found in nucleotide-binding proteins. Several PR-10 members including Bet v1 are allergenic. Cross-reactivity of Bet v 1 with homologs from plant foods results in birch-fruit syndrome. — an NCBI CDD conserved domain (cd07816); members share this curated model.
