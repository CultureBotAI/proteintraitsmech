identifier: CDD:cd21049
label: "N-terminal dimerization domain (NDD) found in cytoplasmic dynein 1 heavy chain 1 (DYNC1H1) and similar proteins. DYNC1H1, also called cytoplasmic dynein heavy chain 1 (DHC1), or cytosolic dynein heavy chain (DYHC), acts as a motor for the intracellular retrograde motility of vesicles and organelles along microtubules. It has ATPase activity. DYNC1H1 also plays a role in mitotic spindle assembly and metaphase plate congression. The model corresponds to N-terminal dimerization domain (NDD) of DYNC1H1."
definition: >-
  N-terminal dimerization domain (NDD) found in cytoplasmic dynein 1 heavy chain 1 (DYNC1H1) and similar proteins. DYNC1H1, also called cytoplasmic dynein heavy chain 1 (DHC1), or cytosolic dynein heavy chain (DYHC), acts as a motor for the intracellular retrograde motility of vesicles and organelles along microtubules. It has ATPase activity. DYNC1H1 also plays a role in mitotic spindle assembly and metaphase plate congression. The model corresponds to N-terminal dimerization domain (NDD) of DYNC1H1. — an NCBI CDD conserved domain (cd21049); members share this curated model.
