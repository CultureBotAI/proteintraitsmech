identifier: CDD:cd10993
label: "RNAP_ECF_sig_24_70_BhoD_FecI. Sigma 24 Extra-cytoplasmic function (ECF) sigma factors and Sigma 70 sigma factors respond to environmental stress within E.coli as well as more specific sigma factors BhoD from Bordetella homesii and FecI from Candidatus nitrospira defluvii. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. The most C-terminal domain of sigma 70 includes conserved regions 4.1 and 4.2, which contain four alpha helices that are arranged as a pair of HtH motifs."
definition: >-
  RNAP_ECF_sig_24_70_BhoD_FecI. Sigma 24 Extra-cytoplasmic function (ECF) sigma factors and Sigma 70 sigma factors respond to environmental stress within E.coli as well as more specific sigma factors BhoD from Bordetella homesii and FecI from Candidatus nitrospira defluvii. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. The most C-terminal domain of sigma 70 includes conserved regions 4.1 and 4.2, which contain four alpha helices that are arranged as a pair of HtH motifs. — an NCBI CDD conserved domain (cd10993); members share this curated model.
