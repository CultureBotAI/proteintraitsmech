identifier: CDD:cd18924
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in upstream stimulatory factor 1 (USF1) and similar proteins. USF1, also termed Class B basic helix-loop-helix protein 11 (bHLHb11), or major late transcription factor 1, is a bHLHzip transcription factor that binds to a symmetrical DNA sequence (E-boxes) (5'-CACGTG-3') that is found in a variety of viral and cellular promoters. It is ubiquitously expressed and involved in the transcription activation of various functional genes implicated in lipid and glucose metabolism, stress response, immune response, cell cycle control and tumour suppression. USF-1 recruits chromatin remodeling enzymes and interact with co-activators and the members of the transcription pre-initiation complex. Genetic polymorphisms of USF1 are associated with some metabolic and cardiovascular diseases, like diabetes, atherosclerosis, coronary artery calcifications and familial combined hyperlipidaemia (FCHL)."
