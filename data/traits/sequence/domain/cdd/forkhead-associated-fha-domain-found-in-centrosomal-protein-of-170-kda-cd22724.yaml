identifier: CDD:cd22724
label: "forkhead associated (FHA) domain found in centrosomal protein of 170 kDa (Cep170) and similar proteins. Cep170, also called Cep170A, KARP-1-binding protein, or KARP1-binding protein, is a protein that localizes to centrosomes as well as spindle microtubules and plays a role in microtubule organization and microtubule assembly. It is required for centriole subdistal appendage assembly. Cep170 is phosphorylated during M phase and interacts with Polo-like kinase 1 (Plk1). The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in centrosomal protein of 170 kDa (Cep170) and similar proteins. Cep170, also called Cep170A, KARP-1-binding protein, or KARP1-binding protein, is a protein that localizes to centrosomes as well as spindle microtubules and plays a role in microtubule organization and microtubule assembly. It is required for centriole subdistal appendage assembly. Cep170 is phosphorylated during M phase and interacts with Polo-like kinase 1 (Plk1). The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22724); members share this curated model.
