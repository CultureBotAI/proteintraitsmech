identifier: CDD:cd20040
label: FH_FOXA3
definition: >-
  Forkhead (FH) domain found in Forkhead box protein A3 (FOXA3) and similar proteins. FOXA3, also called hepatocyte nuclear factor 3-gamma (HNF-3-gamma or HNF-3G), fork head-related protein FKH H3, or transcription factor 3G (TCF-3G), acts as an essential transcriptional regulator engaged in adipogenesis and energy metabolism. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'
