identifier: CDD:cd16676
label: "RING finger, H2 subclass, found in RING finger protein 122 (RNF122) and similar proteins. RNF122 is a RING finger protein associated with HEK 293T cell viability. It is localized to the endoplasmic reticulum (ER) and the Golgi apparatus, and overexpressed in anaplastic thyroid cancer cells. RNF122 functions as an E3 ubiquitin ligase that can ubiquitinate itself and undergo degradation through its RING finger in a proteasome-dependent manner. It interacts with calcium-modulating cyclophilin ligand (CAML), which is not a substrate, but a stabilizer of RNF122. RNF122 contains an N-terminal transmembrane domain and a C-terminal C3H2C3-type RING-H2 finger."
definition: >-
  RING finger, H2 subclass, found in RING finger protein 122 (RNF122) and similar proteins. RNF122 is a RING finger protein associated with HEK 293T cell viability. It is localized to the endoplasmic reticulum (ER) and the Golgi apparatus, and overexpressed in anaplastic thyroid cancer cells. RNF122 functions as an E3 ubiquitin ligase that can ubiquitinate itself and undergo degradation through its RING finger in a proteasome-dependent manner. It interacts with calcium-modulating cyclophilin ligand (CAML), which is not a substrate, but a stabilizer of RNF122. RNF122 contains an N-terminal transmembrane domain and a C-terminal C3H2C3-type RING-H2 finger. — an NCBI CDD conserved domain (cd16676); members share this curated model.
