identifier: CDD:cd13132
label: "Eukaryotic members of the multidrug and toxic compound extrusion (MATE) family. The integral membrane proteins from the MATE family are involved in exporting metabolites across the cell membrane and are responsible for multidrug resistance (MDR) in many bacteria and animals. MATE has also been identified as a large multigene family in plants, where the proteins are linked to disease resistance. A number of family members are involved in the synthesis of peptidoglycan components in bacteria. This subfamily, which is restricted to eukaryotes, contains vertebrate solute transporters responsible for secretion of cationic drugs across the brush border membranes, yeast proteins located in the vacuole membrane, and plant proteins involved in disease resistance and iron homeostatis under osmotic stress."
definition: >-
  Eukaryotic members of the multidrug and toxic compound extrusion (MATE) family. The integral membrane proteins from the MATE family are involved in exporting metabolites across the cell membrane and are responsible for multidrug resistance (MDR) in many bacteria and animals. MATE has also been identified as a large multigene family in plants, where the proteins are linked to disease resistance. A number of family members are involved in the synthesis of peptidoglycan components in bacteria. This subfamily, which is restricted to eukaryotes, contains vertebrate solute transporters responsible for secretion of cationic drugs across the brush border membranes, yeast proteins located in the vacuole membrane, and plant proteins involved in disease resistance and iron homeostatis under osmotic stress. — an NCBI CDD conserved domain (cd13132); members share this curated model.
