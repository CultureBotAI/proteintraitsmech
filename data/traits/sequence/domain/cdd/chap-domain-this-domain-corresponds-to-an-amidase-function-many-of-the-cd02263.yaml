label: CHAP
definition: >-
  CHAP domain. This domain corresponds to an amidase function. Many of these proteins are involved in cell wall metabolism of bacteria. This domain is found at the N-terminus of proteins, where is functions as a glutathionylspermidine amidase EC:3.5.1.78
