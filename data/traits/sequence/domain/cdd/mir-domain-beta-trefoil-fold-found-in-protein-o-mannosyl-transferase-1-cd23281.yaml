identifier: CDD:cd23281
label: "MIR domain, beta-trefoil fold, found in protein O-mannosyl-transferase 1 (POMT1) and similar proteins. POMT1 (EC 2.4.1.109), also called dolichyl-phosphate-mannose--protein mannosyltransferase 1, belongs to the glycosyltransferase 39 family. It transfers mannosyl residues to the hydroxyl group of serine or threonine residues. Coexpression of both POMT1 and POMT2 is necessary for enzyme activity, expression of either POMT1 or POMT2 alone is insufficient. It is essentially dedicated to O-mannosylation of alpha-DAG1 and few other proteins, but not of cadherins and protocaherins. POMT1 contains a MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  MIR domain, beta-trefoil fold, found in protein O-mannosyl-transferase 1 (POMT1) and similar proteins. POMT1 (EC 2.4.1.109), also called dolichyl-phosphate-mannose--protein mannosyltransferase 1, belongs to the glycosyltransferase 39 family. It transfers mannosyl residues to the hydroxyl group of serine or threonine residues. Coexpression of both POMT1 and POMT2 is necessary for enzyme activity, expression of either POMT1 or POMT2 alone is insufficient. It is essentially dedicated to O-mannosylation of alpha-DAG1 and few other proteins, but not of cadherins and protocaherins. POMT1 contains a MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23281); members share this curated model.
