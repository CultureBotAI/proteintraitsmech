identifier: CDD:cd20826
label: "protein kinase C conserved region 1 (C1 domain) found in tensin-2 like (TNS2-like) proteins. The TNS2-like group includes TNS2, and variants of TNS1 and TNS3. Tensin-2 (TNS2), also called C1 domain-containing phosphatase and tensin (C1-TEN), or tensin-like C1 domain-containing phosphatase (TENC1), is an essential component for the maintenance of glomerular basement membrane (GBM) structures. It regulates cell motility and proliferation. It may have phosphatase activity. TNS2 reduces AKT1 phosphorylation, lowers AKT1 kinase activity and interferes with AKT1 signaling. Tensin-1 (TNS1) plays a role in fibrillar adhesion formation. It may be involved in cell migration, cartilage development and in linking signal transduction pathways to the cytoskeleton. Tensin-3 (TNS3), also called tensin-like SH2 domain-containing protein 1 (TENS1), or tumor endothelial marker 6 (TEM6), may play a role in actin remodeling. It is involved in the dissociation of the integrin-tensin-actin complex. Typical TNS1 and TNS3 do not contain C1 domains, but some isoforms/variants do. Members of this family contain an N-terminal region with a zinc finger (C1 domain), a protein tyrosine phosphatase (PTP)-like domain and a protein kinase 2 (C2) domain, and a C-terminal region with SH2 and pTyr binding (PTB) domains. This model corresponds to C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in tensin-2 like (TNS2-like) proteins. The TNS2-like group includes TNS2, and variants of TNS1 and TNS3. Tensin-2 (TNS2), also called C1 domain-containing phosphatase and tensin (C1-TEN), or tensin-like C1 domain-containing phosphatase (TENC1), is an essential component for the maintenance of glomerular basement membrane (GBM) structures. It regulates cell motility and proliferation. It may have phosphatase activity. TNS2 reduces AKT1 phosphorylation, lowers AKT1 kinase activity and interferes with AKT1 signaling. Tensin-1 (TNS1) plays a role in fibrillar adhesion formation. It may be involved in cell migration, cartilage development and in linking signal transduction pathways to the cytoskeleton. Tensin-3 (TNS3), also called tensin-like SH2 domain-containing protein 1 (TENS1), or tumor endothelial marker 6 (TEM6), may play a role in actin remodeling. It is involved in the dissociation of the integrin-tensin-actin complex. Typical TNS1 and TNS3 do not contain C1 domains, but some isoforms/variants do. Members of this family contain an N-terminal region with a zinc finger (C1 domain), a protein tyrosine phosphatase (PTP)-like domain and a protein kinase 2 (C2) domain, and a C-terminal region with SH2 and pTyr binding (PTB) domains. This model corresponds to C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20826); members share this curated model.
