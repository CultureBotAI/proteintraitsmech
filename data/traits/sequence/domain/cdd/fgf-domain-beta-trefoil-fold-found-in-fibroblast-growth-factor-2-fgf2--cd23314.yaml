identifier: CDD:cd23314
label: "FGF domain, beta-trefoil fold, found in fibroblast growth factor 2 (FGF2) and similar proteins. FGF2, also called basic fibroblast growth factor (bFGF), or heparin-binding growth factor 2 (HBGF2), acts as a ligand for fibroblast growth factor receptors, FGFR1, FGFR2, FGFR3, and FGFR4. It also acts as an integrin ligand which is required for FGF2 signaling. FGF2 plays an important role in the regulation of cell survival, cell division, cell differentiation, and cell migration. It functions as a potent mitogen in vitro. It can induce angiogenesis. FGF2 contains a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
