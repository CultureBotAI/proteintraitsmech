identifier: CDD:cd11398
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in Saccharomyces cerevisiae centromere-binding protein 1 (CBP-1) and similar proteins. CBP-1, also termed centromere promoter factor 1 (CPF1), or centromere-binding factor 1 (CBF1), is a bHLHzip protein that is required for chromosome stability and methionine prototrophy. It binds as a homodimer to the centromere DNA elements I (CDEI, GTCACATG) region of the centromere that is required for optimal centromere function."
definition: >-
  basic Helix-Loop-Helix-zipper (bHLHzip) domain found in Saccharomyces cerevisiae centromere-binding protein 1 (CBP-1) and similar proteins. CBP-1, also termed centromere promoter factor 1 (CPF1), or centromere-binding factor 1 (CBF1), is a bHLHzip protein that is required for chromosome stability and methionine prototrophy. It binds as a homodimer to the centromere DNA elements I (CDEI, GTCACATG) region of the centromere that is required for optimal centromere function. — an NCBI CDD conserved domain (cd11398); members share this curated model.
