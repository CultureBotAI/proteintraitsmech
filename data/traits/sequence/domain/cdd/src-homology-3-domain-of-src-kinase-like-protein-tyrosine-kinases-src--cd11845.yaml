identifier: CDD:cd11845
label: "Src homology 3 domain of Src kinase-like Protein Tyrosine Kinases. Src subfamily members include Src, Lck, Hck, Blk, Lyn, Fgr, Fyn, Yrk, Yes, and Brk. Src (or c-Src) proteins are cytoplasmic (or non-receptor) PTKs which are anchored to the plasma membrane. They contain an N-terminal SH4 domain with a myristoylation site, followed by SH3 and SH2 domains, a tyr kinase domain, and a regulatory C-terminal region containing a conserved tyr. They are activated by autophosphorylation at the tyr kinase domain, but are negatively regulated by phosphorylation at the C-terminal tyr by Csk (C-terminal Src Kinase). However, Brk lacks the N-terminal myristoylation sites. Src proteins are involved in signaling pathways that regulate cytokine and growth factor responses, cytoskeleton dynamics, cell proliferation, survival, and differentiation. They were identified as the first proto-oncogene products, and they regulate cell adhesion, invasion, and motility in cancer cells, and tumor vasculature, contributing to cancer progression and metastasis. Src kinases are overexpressed in a variety of human cancers, making them attractive targets for therapy. They are also implicated in acute inflammatory responses and osteoclast function. Src, Fyn, Yes, and Yrk are widely expressed, while Blk, Lck, Hck, Fgr, Lyn, and Brk show a limited expression pattern. This subfamily also includes Drosophila Src42A, Src oncogene at 42A (also known as Dsrc41) which accumulates at sites of cell-cell or cell-matrix adhesion, and participates in Drosphila development and wound healing. It has been shown to promote tube elongation in the tracheal system, is essential for proper cell-cell matching during dorsal closure, and regulates cell-cell contacts in developing Drosophila eyes. The SH3 domain of Src kinases contributes to substrate recruitment by binding adaptor proteins/substrates, and regulation of kinase activity through an intramolecular interaction. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
