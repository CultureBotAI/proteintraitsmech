identifier: CDD:cd18340
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 40 (KLHL40). KLHL40, also called Kelch repeat and BTB domain-containing protein 5 (KBTBD5) or sarcosynapsin, is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex that acts as a key regulator of skeletal muscle development. Mutations in KLHL40 may cause severe autosomal-recessive nemaline myopathy. KLHL40 contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 40 (KLHL40). KLHL40, also called Kelch repeat and BTB domain-containing protein 5 (KBTBD5) or sarcosynapsin, is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex that acts as a key regulator of skeletal muscle development. Mutations in KLHL40 may cause severe autosomal-recessive nemaline myopathy. KLHL40 contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18340); members share this curated model.
