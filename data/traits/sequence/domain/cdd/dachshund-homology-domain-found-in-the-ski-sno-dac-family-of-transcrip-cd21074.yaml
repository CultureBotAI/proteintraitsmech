identifier: CDD:cd21074
label: "Dachshund-homology domain found in the Ski/Sno/Dac family of transcriptional regulators. The Dachshund-homology domain (DHD), also known as the N-terminal Ski/Sno/Dac domain, adopts a mixed alpha/beta structure containing a helix-turn-helix motif, similar to features found in the forkhead/winged-helix family of DNA binding proteins. It contains a conserved CLPQ motif and can bind co-factors. Its structure suggests that it may also bind DNA. Members of this family include the Ski protein, Ski-like protein (Sno), and Dachshund proteins. Ski may play a role in terminal differentiation of skeletal muscle cells but not in the determination of cells to the myogenic lineage. It functions as a repressor of transforming growth factor-beta (TGF-beta) signaling. Ski-like protein, also known as SKIL or Sno, is the ski proto-oncogene homolog. It may have regulatory roles in cell division or differentiation in response to extracellular signals. Dachshund proteins are essential components of a regulatory network controlling cell fate determination. They have been implicated in eye, limb, brain, and muscle development."
definition: >-
  Dachshund-homology domain found in the Ski/Sno/Dac family of transcriptional regulators. The Dachshund-homology domain (DHD), also known as the N-terminal Ski/Sno/Dac domain, adopts a mixed alpha/beta structure containing a helix-turn-helix motif, similar to features found in the forkhead/winged-helix family of DNA binding proteins. It contains a conserved CLPQ motif and can bind co-factors. Its structure suggests that it may also bind DNA. Members of this family include the Ski protein, Ski-like protein (Sno), and Dachshund proteins. Ski may play a role in terminal differentiation of skeletal muscle cells but not in the determination of cells to the myogenic lineage. It functions as a repressor of transforming growth factor-beta (TGF-beta) signaling. Ski-like protein, also known as SKIL or Sno, is the ski proto-oncogene homolog. It may have regulatory roles in cell division or differentiation in response to extracellular signals. Dachshund proteins are essential components of a regulatory network controlling cell fate determination. They have been implicated in eye, limb, brain, and muscle development. — an NCBI CDD conserved domain (cd21074); members share this curated model.
