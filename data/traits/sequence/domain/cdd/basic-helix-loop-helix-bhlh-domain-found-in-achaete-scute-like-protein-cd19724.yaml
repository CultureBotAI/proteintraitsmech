identifier: CDD:cd19724
label: "basic helix-loop-helix (bHLH) domain found in achaete-scute-like proteins, ASCL3-5, and similar proteins. This subfamily includes three ASCL family of transcription factors, ASCL-3, ASCL-4 and ASCL-5. ASCL-3, also termed Class A basic helix-loop-helix protein 42 (bHLHa42), or bHLH transcriptional regulator Sgn-1, or achaete-scute homolog 3 (ASH-3), is specifically localized in the duct cells of the salivary glands. It may act as transcriptional repressor that inhibits myogenesis. ASCL-4, also termed Class A basic helix-loop-helix protein 44 (bHLHa44), or achaete-scute homolog 4 (ASH-4), or Hash4, may be involved in skin development. ASCL-5, also termed Class A basic helix-loop-helix protein 47 (bHLHa47), or achaete-scute homolog 5 (ASH-5), is an uncharacterized bHLH transcription factor that is close related to ASCL-3 and ASCL-4."
definition: >-
  basic helix-loop-helix (bHLH) domain found in achaete-scute-like proteins, ASCL3-5, and similar proteins. This subfamily includes three ASCL family of transcription factors, ASCL-3, ASCL-4 and ASCL-5. ASCL-3, also termed Class A basic helix-loop-helix protein 42 (bHLHa42), or bHLH transcriptional regulator Sgn-1, or achaete-scute homolog 3 (ASH-3), is specifically localized in the duct cells of the salivary glands. It may act as transcriptional repressor that inhibits myogenesis. ASCL-4, also termed Class A basic helix-loop-helix protein 44 (bHLHa44), or achaete-scute homolog 4 (ASH-4), or Hash4, may be involved in skin development. ASCL-5, also termed Class A basic helix-loop-helix protein 47 (bHLHa47), or achaete-scute homolog 5 (ASH-5), is an uncharacterized bHLH transcription factor that is close related to ASCL-3 and ASCL-4. — an NCBI CDD conserved domain (cd19724); members share this curated model.
