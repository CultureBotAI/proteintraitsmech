label: "Pertactin-like passenger domains (virulence factors), C-terminal, subgroup 1, of autotransporter proteins of the type V secretion system of Gram-negative bacteria. This subgroup includes the passenger domains of Neisseria and Haemophilus IgA1 proteases, SPATEs (serine protease autotransporters secreted by Enterobacteriaceae), Bordetella pertacins, and nonprotease autotransporters, TibA and similar AIDA-like proteins."
