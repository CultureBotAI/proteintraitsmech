identifier: CDD:cd09926
label: "Src homology 2 domain found in cancer-related signaling adaptor protein CRK. SH2 domain in the CRK proteins.  CRKI (SH2-SH3) and CRKII (SH2-SH3-SH3) are splicing isoforms of the oncoprotein CRK.  CRKs regulate transcription and cytoskeletal reorganization for cell growth and motility by linking tyrosine kinases to small G proteins. The SH2 domain of CRK associates with tyrosine-phosphorylated receptors or components of focal adhesions, such as p130Cas and paxillin. CRK transmits signals to small G proteins through effectors that bind its SH3 domain, such as C3G, the guanine-nucleotide exchange factor (GEF) for Rap1 and R-Ras, and DOCK180, the GEF for Rac6. The binding of p130Cas to the CRK-C3G complex activates Rap1, leading to regulation of cell adhesion, and activates R-Ras, leading to JNK-mediated activation of cell proliferation, whereas the binding of CRK DOCK180 induces Rac1-mediated activation of cellular migration. The activity of the different splicing isoforms varies greatly with CRKI displaying substantial transforming activity, CRKII less so, and phosphorylated CRKII with no biological activity whatsoever.  CRKII has a linker region with a phosphorylated Tyr and an additional C-terminal SH3 domain. The phosphorylated Tyr creates a binding site for its SH2 domain which disrupts the association between CRK and its SH2 target proteins.  In general SH2 domains are involved in signal transduction.  They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 domain found in cancer-related signaling adaptor protein CRK. SH2 domain in the CRK proteins. CRKI (SH2-SH3) and CRKII (SH2-SH3-SH3) are splicing isoforms of the oncoprotein CRK. CRKs regulate transcription and cytoskeletal reorganization for cell growth and motility by linking tyrosine kinases to small G proteins. The SH2 domain of CRK associates with tyrosine-phosphorylated receptors or components of focal adhesions, such as p130Cas and paxillin. CRK transmits signals to small G proteins through effectors that bind its SH3 domain, such as C3G, the guanine-nucleotide exchange factor (GEF) for Rap1 and R-Ras, and DOCK180, the GEF for Rac6. The binding of p130Cas to the CRK-C3G complex activates Rap1, leading to regulation of cell adhesion, and activates R-Ras, leading to JNK-mediated activation of cell proliferation, whereas the binding of CRK DOCK180 induces Rac1-mediated activation of cellular migration. The activity of the different splicing isoforms varies greatly with CRKI displaying substantial transforming activity, CRKII less so, and phosphorylated CRKII with no biological activity whatsoever. CRKII has a linker region with a phosphorylated Tyr and an additional C-terminal SH3 domain. The phosphorylated Tyr creates a binding site for its SH2 domain which disrupts the association between CRK and its SH2 target proteins. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd09926); members share this curated model.
