identifier: CDD:cd14258
label: "Prodomain of the Clostridium Csp proteases. CspB is a subtilisin-like serine protease that plays a vital role in Clostridium difficile spore germination. The prodomain modeled here is required for proper folding of the protein, and it remains tigthly bound to the enzyme and blocks its active site after being proteolytic cleavage via autoprocessing. Inhibition of CpsB activity may be lifted as a reaction to the germination signal."
definition: >-
  Prodomain of the Clostridium Csp proteases. CspB is a subtilisin-like serine protease that plays a vital role in Clostridium difficile spore germination. The prodomain modeled here is required for proper folding of the protein, and it remains tigthly bound to the enzyme and blocks its active site after being proteolytic cleavage via autoprocessing. Inhibition of CpsB activity may be lifted as a reaction to the germination signal. — an NCBI CDD conserved domain (cd14258); members share this curated model.
