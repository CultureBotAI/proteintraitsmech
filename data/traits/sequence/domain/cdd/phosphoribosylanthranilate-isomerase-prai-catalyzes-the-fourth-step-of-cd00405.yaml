identifier: CDD:cd00405
label: "Phosphoribosylanthranilate isomerase (PRAI) catalyzes the fourth step of the tryptophan biosynthesis, the conversion of N-(5'- phosphoribosyl)-anthranilate (PRA) to 1-(o-carboxyphenylamino)- 1-deoxyribulose 5-phosphate (CdRP). Most PRAIs are monomeric, monofunctional and thermolabile, but in some thermophile organisms PRAI is dimeric for reasons of stability and in others it is fused to other components of the tryptophan biosynthesis pathway to form multifunctional enzymes."
definition: >-
  Phosphoribosylanthranilate isomerase (PRAI) catalyzes the fourth step of the tryptophan biosynthesis, the conversion of N-(5'- phosphoribosyl)-anthranilate (PRA) to 1-(o-carboxyphenylamino)- 1-deoxyribulose 5-phosphate (CdRP). Most PRAIs are monomeric, monofunctional and thermolabile, but in some thermophile organisms PRAI is dimeric for reasons of stability and in others it is fused to other components of the tryptophan biosynthesis pathway to form multifunctional enzymes. — an NCBI CDD conserved domain (cd00405); members share this curated model.
