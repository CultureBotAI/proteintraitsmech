identifier: CDD:cd11781
label: "First Src Homology 3 domain of Sorbin and SH3 domain containing (Sorbs) proteins and similar domains. This family, also called the vinexin family, is composed predominantly of adaptor proteins containing one sorbin homology (SoHo) and three SH3 domains. Members include the first SH3 domains of Sorbs1 (or ponsin), Sorbs2 (or ArgBP2), Vinexin (or Sorbs3), and similar domains. They are involved in the regulation of cytoskeletal organization, cell adhesion, and growth factor signaling. Members of this family bind multiple partners including signaling molecules like c-Abl, c-Arg, Sos, and c-Cbl, as well as cytoskeletal molecules such as vinculin and afadin. They may have overlapping functions. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  First Src Homology 3 domain of Sorbin and SH3 domain containing (Sorbs) proteins and similar domains. This family, also called the vinexin family, is composed predominantly of adaptor proteins containing one sorbin homology (SoHo) and three SH3 domains. Members include the first SH3 domains of Sorbs1 (or ponsin), Sorbs2 (or ArgBP2), Vinexin (or Sorbs3), and similar domains. They are involved in the regulation of cytoskeletal organization, cell adhesion, and growth factor signaling. Members of this family bind multiple partners including signaling molecules like c-Abl, c-Arg, Sos, and c-Cbl, as well as cytoskeletal molecules such as vinculin and afadin. They may have overlapping functions. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11781); members share this curated model.
