identifier: CDD:cd19584
label: "serpin family O, viral serpin-3. This group of viral serpins are from the Orthopoxvirus branch (cowpox, ectromelia, vaccinia, variola, and rabbitpox) and corresponding to clade O which contains the viral serpin-3 (SPI-3-like) serpins. The other is clade N which contains viral serpin-1 (SPI-1-like) and viral serpin-2 (SPI-2-like) serpins. SPI-3 is an N-glycosylated bifunctional protein that acts as both a proteinase inhibitor and a suppressor of infected cell-cell fusion. SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
definition: >-
  serpin family O, viral serpin-3. This group of viral serpins are from the Orthopoxvirus branch (cowpox, ectromelia, vaccinia, variola, and rabbitpox) and corresponding to clade O which contains the viral serpin-3 (SPI-3-like) serpins. The other is clade N which contains viral serpin-1 (SPI-1-like) and viral serpin-2 (SPI-2-like) serpins. SPI-3 is an N-glycosylated bifunctional protein that acts as both a proteinase inhibitor and a suppressor of infected cell-cell fusion. SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans. — an NCBI CDD conserved domain (cd19584); members share this curated model.
