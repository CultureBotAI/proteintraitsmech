identifier: CDD:cd16966
label: "Alpha-kinase domain of alpha-protein kinases 2 and 3. Alpha-protein kinases 2 (ALPK2) and 3 (ALPK3) are also called heart alpha-protein kinase (HAK) and muscle alpha-protein kinase (MAK), respectively. They both contain a C-terminal alpha-kinase domain and two immunoglobulin (Ig)-like domains. Loss of function mutations in ALPK3 can cause early-onset and familial cardiomyopathy in humans. The ALPK2 gene may also be a novel candidate gene for inherited hypertension in Dahl rats. Alpha-kinase is an atypical protein kinase catalytic domain with no detectable similarity to conventional protein serine/threonine kinases. The alpha-kinase family was named after the unique mode of substrate recognition by its initial members, the Dictyostelium heavy chain kinases, which targeted protein sequences that adopt an alpha-helical conformation. More recently, alpha-kinases were found to also target residues in non-helical regions."
definition: >-
  Alpha-kinase domain of alpha-protein kinases 2 and 3. Alpha-protein kinases 2 (ALPK2) and 3 (ALPK3) are also called heart alpha-protein kinase (HAK) and muscle alpha-protein kinase (MAK), respectively. They both contain a C-terminal alpha-kinase domain and two immunoglobulin (Ig)-like domains. Loss of function mutations in ALPK3 can cause early-onset and familial cardiomyopathy in humans. The ALPK2 gene may also be a novel candidate gene for inherited hypertension in Dahl rats. Alpha-kinase is an atypical protein kinase catalytic domain with no detectable similarity to conventional protein serine/threonine kinases. The alpha-kinase family was named after the unique mode of substrate recognition by its initial members, the Dictyostelium heavy chain kinases, which targeted protein sequences that adopt an alpha-helical conformation. More recently, alpha-kinases were found to also target residues in non-helical regions. — an NCBI CDD conserved domain (cd16966); members share this curated model.
