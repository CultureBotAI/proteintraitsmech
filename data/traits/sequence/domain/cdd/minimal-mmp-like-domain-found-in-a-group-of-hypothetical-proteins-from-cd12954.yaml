identifier: CDD:cd12954
label: "Minimal MMP-like domain found in a group of hypothetical proteins from alphaproteobacteria and actinobacteria. The subfamily includes some uncharacterized bacterial proteins which show high sequence similarity with Thermus thermophilus hypothetical protein TTHA0227. However, they do not contain the conserved HExxH (x could be any amino acid) motif. They may not have any zinc metallo-peptidase activity."
definition: >-
  Minimal MMP-like domain found in a group of hypothetical proteins from alphaproteobacteria and actinobacteria. The subfamily includes some uncharacterized bacterial proteins which show high sequence similarity with Thermus thermophilus hypothetical protein TTHA0227. However, they do not contain the conserved HExxH (x could be any amino acid) motif. They may not have any zinc metallo-peptidase activity. — an NCBI CDD conserved domain (cd12954); members share this curated model.
