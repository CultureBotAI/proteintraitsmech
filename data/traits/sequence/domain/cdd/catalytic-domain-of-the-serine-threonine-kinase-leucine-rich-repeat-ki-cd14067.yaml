identifier: CDD:cd14067
label: "Catalytic domain of the Serine/Threonine Kinase, Leucine-Rich Repeat Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. LRRK1 is one of two vertebrate LRRKs which show complementary expression in the brain. It can form heterodimers with LRRK2, and may influence the age of onset of LRRK2-associated Parkinson's disease. LRRKs are also classified as ROCO proteins because they contain a ROC (Ras of complex proteins)/GTPase domain followed by a COR (C-terminal of ROC) domain of unknown function. In addition, LRRKs contain a catalytic kinase domain and protein-protein interaction motifs including a WD40 domain, LRRs and ankyrin (ANK) repeats. LRRKs possess both GTPase and kinase activities, with the ROC domain acting as a molecular switch for the kinase domain, cycling between a GTP-bound state which drives kinase activity and a GDP-bound state which decreases the activity. The LRRK1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Leucine-Rich Repeat Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. LRRK1 is one of two vertebrate LRRKs which show complementary expression in the brain. It can form heterodimers with LRRK2, and may influence the age of onset of LRRK2-associated Parkinson's disease. LRRKs are also classified as ROCO proteins because they contain a ROC (Ras of complex proteins)/GTPase domain followed by a COR (C-terminal of ROC) domain of unknown function. In addition, LRRKs contain a catalytic kinase domain and protein-protein interaction motifs including a WD40 domain, LRRs and ankyrin (ANK) repeats. LRRKs possess both GTPase and kinase activities, with the ROC domain acting as a molecular switch for the kinase domain, cycling between a GTP-bound state which drives kinase activity and a GDP-bound state which decreases the activity. The LRRK1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14067); members share this curated model.
