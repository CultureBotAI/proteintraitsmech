identifier: CDD:cd18191
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in armadillo repeat-containing protein 5 (ARMC5). ARMC5 plays a role in steroidogenesis, and modulates the expression and cortisol production of steroidogenic enzymes. It negatively regulates adrenal cells survival. It contains armadillo (ARM) repeats and a BTB domain, which is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in armadillo repeat-containing protein 5 (ARMC5). ARMC5 plays a role in steroidogenesis, and modulates the expression and cortisol production of steroidogenic enzymes. It negatively regulates adrenal cells survival. It contains armadillo (ARM) repeats and a BTB domain, which is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18191); members share this curated model.
