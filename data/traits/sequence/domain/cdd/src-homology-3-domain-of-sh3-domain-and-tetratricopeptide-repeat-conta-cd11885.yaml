identifier: CDD:cd11885
label: "Src Homology 3 domain of SH3 domain and tetratricopeptide repeat-containing (SH3TC) proteins and similar domains. This subfamily is composed of vertebrate SH3TC proteins and hypothetical fungal proteins containing BAR and SH3 domains. Mammals contain two SH3TC proteins, SH3TC1 and SH3TC2. The function of SH3TC1 is unknown. SH3TC2 is localized in Schwann cells in the peripheral nervous system, where it interacts with Rab11 and plays a role in peripheral nerve myelination. Mutations in SH3TC2 are associated with Charcot-Marie-Tooth disease type 4C, a severe hereditary peripheral neuropathy with symptoms that include progressive scoliosis, delayed age of walking, muscular atrophy, distal weakness, and reduced nerve conduction velocity. SH3 domains bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs; they play a role in the regulation of enzymes by intramolecular interactions, changing the subcellular localization of signal pathway components and mediate multiprotein complex assemblies."
definition: >-
