identifier: CDD:cd03114
label: "methylmalonic aciduria associated protein. Methylmalonyl Co-A mutase-associated GTPase MeaB and its human homolog, methylmalonic aciduria associated protein (MMAA) are metallochaperones that function as a G-protein chaperone that assists AdoCbl cofactor delivery to the methylmalonyl-CoA mutase (MCM) and reactivation of the enzyme during catalysis. A member of the family, Escherichia coli ArgK, was previously thought to be a membrane ATPase which is required for transporting arginine, ornithine and lysine into the cells by the arginine and ornithine (AO system) and lysine, arginine and ornithine (LAO) transport systems."
definition: >-
  methylmalonic aciduria associated protein. Methylmalonyl Co-A mutase-associated GTPase MeaB and its human homolog, methylmalonic aciduria associated protein (MMAA) are metallochaperones that function as a G-protein chaperone that assists AdoCbl cofactor delivery to the methylmalonyl-CoA mutase (MCM) and reactivation of the enzyme during catalysis. A member of the family, Escherichia coli ArgK, was previously thought to be a membrane ATPase which is required for transporting arginine, ornithine and lysine into the cells by the arginine and ornithine (AO system) and lysine, arginine and ornithine (LAO) transport systems. — an NCBI CDD conserved domain (cd03114); members share this curated model.
