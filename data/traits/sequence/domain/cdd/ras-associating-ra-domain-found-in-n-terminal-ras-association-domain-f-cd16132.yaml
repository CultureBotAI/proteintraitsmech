identifier: CDD:cd16132
label: "Ras-associating (RA) domain found in N-terminal Ras-association domain family 10 (RASSF10). RASSF10 is a member of a family of N-terminus RASSF7-10 proteins. RASSF7-10 has an RA domain at the N-terminus and lacks a conserved SARAH (Salvador/RASSF/Hpo) motif adjacent to the RA domain that is found in members of the RASSF1-6 family. RA domain of N-terminal RASSF protein family has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. RASSF10 is expressed in a wide variety of tissues and its expression in human thyroid, pancreas, placenta, heart, lung and kidney has been observed. RASSF10 is the most frequently methylated of the N-terminal RASSFs in some cancers such as in childhood acute lymphoblastic leukemia and both, thyroid cancer cell lines and primary thyroid carcinomas."
definition: >-
