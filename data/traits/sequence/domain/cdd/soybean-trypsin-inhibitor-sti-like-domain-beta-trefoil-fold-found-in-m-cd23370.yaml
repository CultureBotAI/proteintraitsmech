identifier: CDD:cd23370
label: "soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Murraya koenigii miraculin-like protein (MkMLP) and similar proteins. This subfamily includes Theobroma cacao 21 kDa seed protein (TcASP) and Murraya koenigii miraculin-like protein (MkMLP). TcASP shows homology to the soybean trypsin inhibitor (Kunitz) family of protease inhibitors. MkMLP is closer to miraculin, a taste modifying protein, rather than classical Kunitz family members like soybean Kunitz-type trypsin inhibitor (STI). MkMLP is functionally unstable at higher temperatures. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Murraya koenigii miraculin-like protein (MkMLP) and similar proteins. This subfamily includes Theobroma cacao 21 kDa seed protein (TcASP) and Murraya koenigii miraculin-like protein (MkMLP). TcASP shows homology to the soybean trypsin inhibitor (Kunitz) family of protease inhibitors. MkMLP is closer to miraculin, a taste modifying protein, rather than classical Kunitz family members like soybean Kunitz-type trypsin inhibitor (STI). MkMLP is functionally unstable at higher temperatures. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23370); members share this curated model.
