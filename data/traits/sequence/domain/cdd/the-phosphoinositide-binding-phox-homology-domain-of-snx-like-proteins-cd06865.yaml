identifier: CDD:cd06865
label: "The phosphoinositide binding Phox Homology domain of SNX-like proteins. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions. Sorting nexins (SNXs) make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway. Some SNXs are localized in early endosome structures such as clathrin-coated pits, while others are located in late structures of the endocytic pathway. This subfamily is composed of uncharacterized proteins, predominantly from plants, with similarity to sorting nexins. A few members show a similar domain architecture as a subfamily of sorting nexins, containing a Bin/Amphiphysin/Rvs (BAR) domain, which detects membrane curvature, C-terminal to the PX domain. The PX-BAR structural unit is known to determine specific membrane localization."
definition: >-
  The phosphoinositide binding Phox Homology domain of SNX-like proteins. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions. Sorting nexins (SNXs) make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway. Some SNXs are localized in early endosome structures such as clathrin-coated pits, while others are located in late structures of the endocytic pathway. This subfamily is composed of uncharacterized proteins, predominantly from plants, with similarity to sorting nexins. A few members show a similar domain architecture as a subfamily of sorting nexins, containing a Bin/Amphiphysin/Rvs (BAR) domain, which detects membrane curvature, C-terminal to the PX domain. The PX-BAR structural unit is known to determine specific membrane localization. — an NCBI CDD conserved domain (cd06865); members share this curated model.
