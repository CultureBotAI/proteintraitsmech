identifier: CDD:cd14831
label: "AP-1 complex subunit sigma. AP-1 complex sigma subunit is part of the heterotetrameric adaptor protein (AP)-1 complex which consists of one large gamma-, one beta-, one mu-, and one sigma-subunit. AP complexes link the cytosolic domains of the cargo proteins to the protein coat that induces vesicle budding in the donor compartment during vesicle transport. In the case of AP-1 the coat protein is clathrin. AP-1 binds the phospholipid  PI(4)P which plays a role in its localisation to the trans-Golgi network (TGN)/endosome. The sigma subunit is comprised of a single longin domain and plays a role in binding dileucine-based sorting signals."
definition: >-
  AP-1 complex subunit sigma. AP-1 complex sigma subunit is part of the heterotetrameric adaptor protein (AP)-1 complex which consists of one large gamma-, one beta-, one mu-, and one sigma-subunit. AP complexes link the cytosolic domains of the cargo proteins to the protein coat that induces vesicle budding in the donor compartment during vesicle transport. In the case of AP-1 the coat protein is clathrin. AP-1 binds the phospholipid PI(4)P which plays a role in its localisation to the trans-Golgi network (TGN)/endosome. The sigma subunit is comprised of a single longin domain and plays a role in binding dileucine-based sorting signals. — an NCBI CDD conserved domain (cd14831); members share this curated model.
