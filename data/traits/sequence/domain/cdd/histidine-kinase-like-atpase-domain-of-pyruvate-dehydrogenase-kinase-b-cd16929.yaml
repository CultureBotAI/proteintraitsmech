identifier: CDD:cd16929
label: "Histidine kinase-like ATPase domain of pyruvate dehydrogenase kinase, branched-chain alpha-ketoacid dehydrogenase kinase and related domains. This family includes the histidine kinase-like ATPase (HATPase) domains of all four PDK isoforms (pyruvate dehydrogenase kinases 1-4) that have been described in mammals, and other PDKs including Saccharomyces Pkp1p and Pkp2p. PDKs and phosphatases tightly regulate the mitochondrial pyruvate dehydrogenase complex (PDC) by reversible phosphorylation. PDC catalyzes the oxidative decarboxylation of pyruvate to acetyl-CoA, connecting glycolysis and the TCA acid cycle. Also included in this family is mammalian branched-chain alpha-ketoacid dehydrogenase kinase (BDK), a mitochondrial protein kinase that phosphorylates a subunit of the branched-chain a-ketoacid dehydrogenase (BCKD) complex, which catalyzes the oxidative decarboxylation of branched-chain alpha-ketoacids derived from leucine, isoleucine, and valine, a rate-limiting step in the oxidative degradation of these branched-chain amino acids."
definition: >-
  Histidine kinase-like ATPase domain of pyruvate dehydrogenase kinase, branched-chain alpha-ketoacid dehydrogenase kinase and related domains. This family includes the histidine kinase-like ATPase (HATPase) domains of all four PDK isoforms (pyruvate dehydrogenase kinases 1-4) that have been described in mammals, and other PDKs including Saccharomyces Pkp1p and Pkp2p. PDKs and phosphatases tightly regulate the mitochondrial pyruvate dehydrogenase complex (PDC) by reversible phosphorylation. PDC catalyzes the oxidative decarboxylation of pyruvate to acetyl-CoA, connecting glycolysis and the TCA acid cycle. Also included in this family is mammalian branched-chain alpha-ketoacid dehydrogenase kinase (BDK), a mitochondrial protein kinase that phosphorylates a subunit of the branched-chain a-ketoacid dehydrogenase (BCKD) complex, which catalyzes the oxidative decarboxylation of branched-chain alpha-ketoacids derived from leucine, isoleucine, and valine, a rate-limiting step in the oxidative degradation of these branched-chain amino acids. — an NCBI CDD conserved domain (cd16929); members share this curated model.
