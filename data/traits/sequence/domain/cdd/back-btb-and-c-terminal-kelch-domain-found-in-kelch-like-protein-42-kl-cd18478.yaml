identifier: CDD:cd18478
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 42 (KLHL42). KLHL42, also called Cullin-3-binding protein 9 (Ctb9), or Kelch domain-containing protein 5, is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex required for mitotic progression and cytokinesis. The BCR(KLHL42) E3 ubiquitin ligase complex mediates the ubiquitination and subsequent degradation of KATNA1. KLHL42 is involved in microtubule dynamics throughout mitosis."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 42 (KLHL42). KLHL42, also called Cullin-3-binding protein 9 (Ctb9), or Kelch domain-containing protein 5, is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex required for mitotic progression and cytokinesis. The BCR(KLHL42) E3 ubiquitin ligase complex mediates the ubiquitination and subsequent degradation of KATNA1. KLHL42 is involved in microtubule dynamics throughout mitosis. — an NCBI CDD conserved domain (cd18478); members share this curated model.
