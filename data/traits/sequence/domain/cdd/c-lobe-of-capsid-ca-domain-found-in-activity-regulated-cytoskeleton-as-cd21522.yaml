identifier: CDD:cd21522
label: Arc_CA_C_like
definition: >-
  C-lobe of capsid (CA) domain found in activity-regulated cytoskeleton-associated protein (Arc) and similar proteins. Arc, also called activity-regulated gene 3.1 protein (Arg3.1), is a flexible modular protein capable of reversible self-oligomerization. It is released from neurons in extracellular vesicles and regulates synaptic plasticity that self-assembles into virion-like capsids that encapsulate RNAs and mediate intercellular RNA transfer in the nervous system. Arc displays a bi-lobar configuration which exhibits homology to the capsid-forming Gag proteins from retroviruses, suggesting that Arc originated from the Ty3/Gypsy retrotransposon lineage. The model corresponds to C-lobe of Arc capsid (CA) domain, consisting of five alpha helices
