identifier: CDD:cd13763
label: TGF_beta_BMP3_like
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in bone morphogenetic protein 3 (BMP-3), growth/differentiation factor 10 (GDF10) and similar proteins. The family includes BMP-3 (also known as BMP-3A or osteogenin) and GDF10 (also known as BMP-3B). BMP-3 negatively regulates bone density. It antagonizes the ability of certain osteogenic BMPs to induce osteoprogenitor differentitation and ossification. GDF10 is a growth factor involved in osteogenesis and adipogenesis
