identifier: CDD:cd20067
label: "Forkhead (FH) domain found in Forkhead box protein P4 (FOXP4) and similar proteins. FOXP4, also called Forkhead-related protein-like A, is a transcriptional repressor that represses lung-specific expression. It is not required for T cell development, but is necessary for normal T cell cytokine recall responses to antigen following pathogenic infection. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein P4 (FOXP4) and similar proteins. FOXP4, also called Forkhead-related protein-like A, is a transcriptional repressor that represses lung-specific expression. It is not required for T cell development, but is necessary for normal T cell cytokine recall responses to antigen following pathogenic infection. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20067); members share this curated model.
