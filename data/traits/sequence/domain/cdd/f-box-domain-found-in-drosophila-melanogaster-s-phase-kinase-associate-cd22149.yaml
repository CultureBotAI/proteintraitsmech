identifier: CDD:cd22149
label: "F-box domain found in Drosophila melanogaster S-phase kinase-associated protein 2 (DmSKP2) and similar proteins. DmSKP2 is a Drosophila F-box protein that regulates cell proliferation by targeting Dacapo (Dap) for ubiquitination and proteasome-mediated degradation. It plays a role in maintaining diploidy of mitotic cells during development. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Drosophila melanogaster S-phase kinase-associated protein 2 (DmSKP2) and similar proteins. DmSKP2 is a Drosophila F-box protein that regulates cell proliferation by targeting Dacapo (Dap) for ubiquitination and proteasome-mediated degradation. It plays a role in maintaining diploidy of mitotic cells during development. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22149); members share this curated model.
