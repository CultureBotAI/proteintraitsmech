identifier: CDD:cd23661
label: "universal stress protein Rv2623 and similar proteins, USP repeat 2. Mycobacterium tuberculosis universal stress protein Rv2623 regulates mycobacterial growth in vitro and in vivo and is required for the entry of the tubercle bacillus into the chronic phase of infection in the host. In addition, Rv2623 binds ATP and the growth-regulatory attribute of this USP is dependent on its ATP-binding activity. Rv2623 is thought to function as an ATP-dependent signaling intermediate in a pathway that promotes persistent infection. The universal stress protein Usp is a small cytoplasmic bacterial protein whose expression is enhanced when the cell is exposed to stress agents. Usp enhances the rate of cell survival during prolonged exposure to such conditions, and may provide a general \"stress endurance\" activity. The crystal structure of Haemophilus influenzae Usp reveals an alpha/beta fold similar to that of the Methanococcus jannaschii MJ0577 protein, which binds ATP, although Usp lacks ATP-binding activity."
definition: >-
  universal stress protein Rv2623 and similar proteins, USP repeat 2. Mycobacterium tuberculosis universal stress protein Rv2623 regulates mycobacterial growth in vitro and in vivo and is required for the entry of the tubercle bacillus into the chronic phase of infection in the host. In addition, Rv2623 binds ATP and the growth-regulatory attribute of this USP is dependent on its ATP-binding activity. Rv2623 is thought to function as an ATP-dependent signaling intermediate in a pathway that promotes persistent infection. The universal stress protein Usp is a small cytoplasmic bacterial protein whose expression is enhanced when the cell is exposed to stress agents. Usp enhances the rate of cell survival during prolonged exposure to such conditions, and may provide a general "stress endurance" activity. The crystal structure of Haemophilus influenzae Usp reveals an alpha/beta fold similar to that of the Methanococcus jannaschii MJ0577 protein, which binds ATP, although Usp lacks ATP-binding activity. — an NCBI CDD conserved domain (cd23661); members share this curated model.
