identifier: CDD:cd16612
label: "RING finger, HC subclass, found in tripartite motif-containing protein 72 (TRIM72) and similar proteins. TRIM72, also known as Mitsugumin-53 (MG53), is a muscle-specific protein that plays a central role in cell membrane repair by nucleating the assembly of the repair machinery at muscle injury sites. It is required in repair of alveolar epithelial cells under plasma membrane stress failure. It interacts with dysferlin to regulate sarcolemmal repair. Upregulation of TRIM72 develops obesity, systemic insulin resistance, dyslipidemia, and hyperglycemia, as well as induces diabetic cardiomyopathy through transcriptional activation of the peroxisome proliferation-activated receptor alpha (PPAR-alpha) signaling pathway. Compensation for the absence of AKT signaling by ERK signaling during TRIM72 overexpression leads to pathological hypertrophy. Moreover, TRIM72 functions as a novel negative feedback regulator of myogenesis by targeting insulin receptor substrate-1 (IRS-1). It is transcriptionally activated by the synergism of myogenin (MyoD) and myocyte enhancer factor 2 (MEF2). TRIM72 belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain."
definition: >-
  RING finger, HC subclass, found in tripartite motif-containing protein 72 (TRIM72) and similar proteins. TRIM72, also known as Mitsugumin-53 (MG53), is a muscle-specific protein that plays a central role in cell membrane repair by nucleating the assembly of the repair machinery at muscle injury sites. It is required in repair of alveolar epithelial cells under plasma membrane stress failure. It interacts with dysferlin to regulate sarcolemmal repair. Upregulation of TRIM72 develops obesity, systemic insulin resistance, dyslipidemia, and hyperglycemia, as well as induces diabetic cardiomyopathy through transcriptional activation of the peroxisome proliferation-activated receptor alpha (PPAR-alpha) signaling pathway. Compensation for the absence of AKT signaling by ERK signaling during TRIM72 overexpression leads to pathological hypertrophy. Moreover, TRIM72 functions as a novel negative feedback regulator of myogenesis by targeting insulin receptor substrate-1 (IRS-1). It is transcriptionally activated by the synergism of myogenin (MyoD) and myocyte enhancer factor 2 (MEF2). TRIM72 belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain. — an NCBI CDD conserved domain (cd16612); members share this curated model.
