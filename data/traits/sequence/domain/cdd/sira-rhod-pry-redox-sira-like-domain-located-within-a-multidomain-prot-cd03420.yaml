identifier: CDD:cd03420
label: "SirA_RHOD_Pry_redox.    SirA-like domain located within a multidomain protein of unknown function. Other domains include RHOD (rhodanese homology domain), and Pry_redox (pyridine nucleotide-disulphide oxidoreductase) as well as a C-terminal domain that corresponds to COG2210.  This fold is referred to as a two-layered alpha/beta sandwich, structurally similar to that of translation initiation factor 3."
definition: >-
  SirA_RHOD_Pry_redox. SirA-like domain located within a multidomain protein of unknown function. Other domains include RHOD (rhodanese homology domain), and Pry_redox (pyridine nucleotide-disulphide oxidoreductase) as well as a C-terminal domain that corresponds to COG2210. This fold is referred to as a two-layered alpha/beta sandwich, structurally similar to that of translation initiation factor 3. — an NCBI CDD conserved domain (cd03420); members share this curated model.
