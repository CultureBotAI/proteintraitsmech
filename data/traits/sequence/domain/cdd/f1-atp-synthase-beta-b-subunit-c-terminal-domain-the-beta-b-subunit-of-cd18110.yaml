identifier: CDD:cd18110
label: "F1-ATP synthase beta (B) subunit, C-terminal domain. The beta (B) subunit of the F1 complex of F0F1-ATP synthase, C-terminal domain. The F-ATP synthase (also called FoF1-ATPase) is found in bacterial plasma membranes, mitochondrial inner membranes and in chloroplast thylakoid membranes. It has also been found in the archaea Methanosarcina barkeri. It uses a proton gradient to drive ATP synthesis and hydrolyzes ATP to build the proton gradient. The extrinsic membrane domain, F1, is composed of alpha, beta, gamma, delta and epsilon subunits with a stoichiometry of 3:3:1:1:1. The beta subunit of ATP synthase is catalytic."
definition: >-
  F1-ATP synthase beta (B) subunit, C-terminal domain. The beta (B) subunit of the F1 complex of F0F1-ATP synthase, C-terminal domain. The F-ATP synthase (also called FoF1-ATPase) is found in bacterial plasma membranes, mitochondrial inner membranes and in chloroplast thylakoid membranes. It has also been found in the archaea Methanosarcina barkeri. It uses a proton gradient to drive ATP synthesis and hydrolyzes ATP to build the proton gradient. The extrinsic membrane domain, F1, is composed of alpha, beta, gamma, delta and epsilon subunits with a stoichiometry of 3:3:1:1:1. The beta subunit of ATP synthase is catalytic. — an NCBI CDD conserved domain (cd18110); members share this curated model.
