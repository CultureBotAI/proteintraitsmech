identifier: CDD:cd06122
label: "Thermus thermophilus TTHA0104 and related proteins, cupin domain. This family contains bacterial proteins including TTHA0104 (also called TT1209), a putative antibiotic synthesis protein from Thermus thermophilus. TTHA0104 is a cupin-like protein. The cupins are a functionally diverse superfamily originally discovered based on the highly conserved motif found in germin and germin-like proteins.  This conserved motif forms a beta-barrel fold found in all of the cupins, giving rise to the name cupin (cupa is the Latin term for small barrel)."
definition: >-
  Thermus thermophilus TTHA0104 and related proteins, cupin domain. This family contains bacterial proteins including TTHA0104 (also called TT1209), a putative antibiotic synthesis protein from Thermus thermophilus. TTHA0104 is a cupin-like protein. The cupins are a functionally diverse superfamily originally discovered based on the highly conserved motif found in germin and germin-like proteins. This conserved motif forms a beta-barrel fold found in all of the cupins, giving rise to the name cupin (cupa is the Latin term for small barrel). — an NCBI CDD conserved domain (cd06122); members share this curated model.
