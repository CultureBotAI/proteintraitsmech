identifier: CDD:cd06066
label: "Endopeptidases that belong to the bidirectional NAD-linked hydrogenase group. This group of endopeptidases are highly specific carboxyl-terminal protease (HoxW protease) which releases a 24-amino-acid peptide from HoxH prior to progression of subunit assembly. These bidirectional hydrogenases are heteropentamers encoded by the hox (hydrogen oxidation) genes, in which complex HoxEFU shows the diaphorase activity, and HoxYH constitutes the NiFe-hydrogenase."
definition: >-
  Endopeptidases that belong to the bidirectional NAD-linked hydrogenase group. This group of endopeptidases are highly specific carboxyl-terminal protease (HoxW protease) which releases a 24-amino-acid peptide from HoxH prior to progression of subunit assembly. These bidirectional hydrogenases are heteropentamers encoded by the hox (hydrogen oxidation) genes, in which complex HoxEFU shows the diaphorase activity, and HoxYH constitutes the NiFe-hydrogenase. — an NCBI CDD conserved domain (cd06066); members share this curated model.
