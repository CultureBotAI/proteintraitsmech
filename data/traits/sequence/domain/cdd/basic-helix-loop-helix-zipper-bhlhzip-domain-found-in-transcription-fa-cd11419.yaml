identifier: CDD:cd11419
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in transcription factor AP-4 (TFAP4) and similar proteins. TFAP4, also termed activating enhancer-binding protein 4, or Class C basic helix-loop-helix protein 41 (bHLHc41), is a bHLHzip transcription factor that activates both viral and cellular genes involved in the regulation of cellular proliferation, stemness, and epithelial-mesenchymal transition by binding to the symmetrical DNA sequence 5'-CAGCTG-3'."
definition: >-
  basic Helix-Loop-Helix-zipper (bHLHzip) domain found in transcription factor AP-4 (TFAP4) and similar proteins. TFAP4, also termed activating enhancer-binding protein 4, or Class C basic helix-loop-helix protein 41 (bHLHc41), is a bHLHzip transcription factor that activates both viral and cellular genes involved in the regulation of cellular proliferation, stemness, and epithelial-mesenchymal transition by binding to the symmetrical DNA sequence 5'-CAGCTG-3'. — an NCBI CDD conserved domain (cd11419); members share this curated model.
