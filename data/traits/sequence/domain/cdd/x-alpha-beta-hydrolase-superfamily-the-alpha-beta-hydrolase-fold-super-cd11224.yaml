label: abhydrolase_1_child_132
definition: >-
  x. alpha/beta hydrolase superfamily. The alpha/beta hydrolase fold/superfamily is among the largest known. The catalytic domain occurs in a wide range of proteins, including lipases, amidases, esterases, hydroxynitrile lyases, dehalogenases, and epoxide hydrolases. The subunit size and oligomeric structure vary greatly within the superfamily; most utilize a catalytic triad of residues that are located in loops between conserved secondary structure elements for catalysis
