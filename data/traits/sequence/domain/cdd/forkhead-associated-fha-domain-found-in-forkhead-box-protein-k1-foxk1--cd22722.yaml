identifier: CDD:cd22722
label: "forkhead associated (FHA) domain found in forkhead box protein K1 (FOXK1) and similar proteins. FOXK1, also called myocyte nuclear factor (MNF), acts as a transcriptional regulator that binds to the upstream enhancer region (CCAC box) of the myoglobin gene. It positively regulates Wnt/beta-catenin signaling by translocating DVL into the nucleus. It also reduces virus replication, probably by binding the interferon stimulated response element (ISRE) to promote antiviral gene expression. In addition, FOXK1 plays important roles in multiple human cancers. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in forkhead box protein K1 (FOXK1) and similar proteins. FOXK1, also called myocyte nuclear factor (MNF), acts as a transcriptional regulator that binds to the upstream enhancer region (CCAC box) of the myoglobin gene. It positively regulates Wnt/beta-catenin signaling by translocating DVL into the nucleus. It also reduces virus replication, probably by binding the interferon stimulated response element (ISRE) to promote antiviral gene expression. In addition, FOXK1 plays important roles in multiple human cancers. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22722); members share this curated model.
