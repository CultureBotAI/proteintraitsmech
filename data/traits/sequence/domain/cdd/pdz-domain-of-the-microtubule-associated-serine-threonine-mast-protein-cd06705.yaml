identifier: CDD:cd06705
label: "PDZ domain of the microtubule-associated serine-threonine (MAST) protein kinase family. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of MAST family kinases, including MAST1-4. These MAST proteins contain a DUF1908 domain, a serine/threonine kinase domain, a AGC-kinase C-terminal domain, and a PDZ domain; MAST family member MASTL is a shorter protein lacking the PDZ domain. The PDZ domain gives the MAST family the capacity to scaffold its own kinase activity. These kinases are implicated in the inhibition of neurite outgrowth and regeneration in cultured cells. Their binding partners include microtubules, beta2-syntrophin, TNF receptor-associated factor 6 (TRAF6), cAMP-regulated phosphoprotein (ARPP-16), and PTEN. This family also includes Caenorhabditis elegans KIN-4 MAST kinase, a key longevity factor acting through binding PTEN phosphatase, and Drosophila Drop out which regulates dynein-dependent transport during embryonic development. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This MAST-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  PDZ domain of the microtubule-associated serine-threonine (MAST) protein kinase family. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of MAST family kinases, including MAST1-4. These MAST proteins contain a DUF1908 domain, a serine/threonine kinase domain, a AGC-kinase C-terminal domain, and a PDZ domain; MAST family member MASTL is a shorter protein lacking the PDZ domain. The PDZ domain gives the MAST family the capacity to scaffold its own kinase activity. These kinases are implicated in the inhibition of neurite outgrowth and regeneration in cultured cells. Their binding partners include microtubules, beta2-syntrophin, TNF receptor-associated factor 6 (TRAF6), cAMP-regulated phosphoprotein (ARPP-16), and PTEN. This family also includes Caenorhabditis elegans KIN-4 MAST kinase, a key longevity factor acting through binding PTEN phosphatase, and Drosophila Drop out which regulates dynein-dependent transport during embryonic development. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This MAST-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd06705); members share this curated model.
