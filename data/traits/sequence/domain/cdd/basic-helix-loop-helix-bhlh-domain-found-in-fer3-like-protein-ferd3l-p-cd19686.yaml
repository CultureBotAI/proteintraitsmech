identifier: CDD:cd19686
label: "basic helix-loop-helix (bHLH) domain found in Fer3-like protein (FERD3L), pancreas transcription factor 1 subunit alpha (PTF1A) and similar proteins. The family corresponds to a group of bHLH transcription factors, including FERD3L and PTF1A. FERD3L, also termed basic helix-loop-helix protein N-twist, or Class A basic helix-loop-helix protein 31 (bHLHa31), or nephew of atonal 3 (NATO3), or Neuronal twist (NTWIST), is expressed in the developing central nervous system (CNS). It regulates floor plate (FP) cells development. FP is a critical organizing center located at the ventral-most midline of the neural tube. FERD3L binds to the E-box and functions as inhibitor of transcription. PTF1A, also termed Class A basic helix-loop-helix protein 29 (bHLHa29), or pancreas-specific transcription factor 1a, or bHLH transcription factor p48, or p48 DNA-binding subunit of transcription factor PTF1 (PTF1-p48), is implicated in the cell fate determination in various organs. It binds to the E-box consensus sequence 5'-CANNTG-3' and plays a role in early and late pancreas development and differentiation."
definition: >-
