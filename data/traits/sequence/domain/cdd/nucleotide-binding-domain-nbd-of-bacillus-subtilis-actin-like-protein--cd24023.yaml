identifier: CDD:cd24023
label: "nucleotide-binding domain (NBD) of Bacillus subtilis actin-like protein Alp7A and similar proteins from the ParM domain family. The family corresponds to a group of uncharacterized proteins similar to Bacillus subtilis actin-like protein Alp7A, a plasmid partitioning protein that functions in plasmid segregation. The subfamily also includes Bacillus thuringiensis ParM hybrid fusion protein."
definition: >-
