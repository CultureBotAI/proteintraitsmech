label: "basic helix-loop-helix (bHLH) domain found in T-cell acute lymphocytic leukemia protein 2 (TAL-2) and similar proteins. TAL-2, also termed Class A basic helix-loop-helix protein 19 (bHLHa19), is a bHLH transcription factor essential for the normal brain development. It has been implicated in T-cell acute lymphoblastic leukemia."
