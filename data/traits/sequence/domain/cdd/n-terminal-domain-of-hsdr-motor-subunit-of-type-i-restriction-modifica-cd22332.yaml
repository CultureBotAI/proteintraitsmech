identifier: CDD:cd22332
label: "N-terminal domain of HsdR motor subunit of type I restriction-modification enzyme EcoR124I and similar systems. The N-terminal endonuclease-like domain of HsdR motor subunit of type I restriction-modification enzyme EcoR124I belongs to a wider superfamily of PDDEXK nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  N-terminal domain of HsdR motor subunit of type I restriction-modification enzyme EcoR124I and similar systems. The N-terminal endonuclease-like domain of HsdR motor subunit of type I restriction-modification enzyme EcoR124I belongs to a wider superfamily of PDDEXK nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22332); members share this curated model.
