label: cytochrome_C_prime
definition: >-
  Cytochrome C', also class IIa cytochrome c, occurs in various photosynthetic, nitrogen-fixating and denitrifying bacteria. Their exact biological role is unknown, but they display unusual ligand binding properties, forming complexes with nitric oxide and carbon monoxide, but not with oxygen. Cytochrome C's are homodimers, with each monomer having a protoheme IX prosthetic group, which is covalently bound through thioester linkage of two cysteine residues with heme vinyl groups. They significantly differ from mitochondrial c-type cytochromes in the way how and where they ligate heme, and in their overall structure
