identifier: CDD:cd07483
label: "Peptidase S8 family domain in Subtilisin_Novo-like proteins. Subtilisins are a group of alkaline proteinases originating from different strains of Bacillus subtilis.  Novo is one of the strains that produced enzymes belonging to this group.  The enzymes obtained from the Novo and BPN' strains are identical.  The Carlsburg and Novo subtilisins are thought to have arisen from a common ancestral protein.  They have similar peptidase and esterase activities, pH profiles, catalyze transesterification reactions, and are both inhibited by diispropyl fluorophosphate, though they differ in 85 positions in the amino acid sequence.  Members of the peptidases S8 and S35 clan include endopeptidases, exopeptidases and also a tripeptidyl-peptidase. The S8 family has an Asp/His/Ser catalytic triad similar to that found in trypsin-like proteases, but do not share their three-dimensional structure and are not homologous to trypsin. The S53 family contains a catalytic triad Glu/Asp/Ser with an additional acidic residue Asp in the oxyanion hole, similar to that of subtilisin.. The stability of these enzymes may be enhanced by calcium, some members have been shown to bind up to 4 ions via binding sites with different affinity. Some members of this clan contain disulfide bonds. These enzymes can be intra- and extracellular, some function at extreme temperatures and pH values."
definition: >-
  Peptidase S8 family domain in Subtilisin_Novo-like proteins. Subtilisins are a group of alkaline proteinases originating from different strains of Bacillus subtilis. Novo is one of the strains that produced enzymes belonging to this group. The enzymes obtained from the Novo and BPN' strains are identical. The Carlsburg and Novo subtilisins are thought to have arisen from a common ancestral protein. They have similar peptidase and esterase activities, pH profiles, catalyze transesterification reactions, and are both inhibited by diispropyl fluorophosphate, though they differ in 85 positions in the amino acid sequence. Members of the peptidases S8 and S35 clan include endopeptidases, exopeptidases and also a tripeptidyl-peptidase. The S8 family has an Asp/His/Ser catalytic triad similar to that found in trypsin-like proteases, but do not share their three-dimensional structure and are not homologous to trypsin. The S53 family contains a catalytic triad Glu/Asp/Ser with an additional acidic residue Asp in the oxyanion hole, similar to that of subtilisin.. The stability of these enzymes may be enhanced by calcium, some members have been shown to bind up to 4 ions via binding sites with different affinity. Some members of this clan contain disulfide bonds. These enzymes can be intra- and extracellular, some function at extreme temperatures and pH values. — an NCBI CDD conserved domain (cd07483); members share this curated model.
