identifier: CDD:cd21472
label: CylC-like
definition: >-
  cyanobacterial acyl halogenase CylC and similar proteins. CylC has been characterized as a halogenase involved in the biosynthesis of cylindrocyclophane; another member, cyanobacterial NocO, has recently been implicated in the biosynthesis of chlorosphaerolactylates and nocuolactylates, NocO had been suggested to play a role in the synthesis of natural oxadiazines such as nocuolin A (NoA, exhibits anti-proliferative activity against human cancer cell lines). Members are also similar to cyanobacterial ColD and ColE, putative acyl halogenases involved in columbamide biosynthesis
