identifier: CDD:cd04513
label: "Glycosylasparaginase and similar proteins. Glycosylasparaginase catalyzes the hydrolysis of the glycosylamide bond of asparagine-linked glycoproteins. This enzyme is an amidase located inside lysosomes. Mutation of this gene in humans causes a genetic disorder known as aspartylglycosaminuria (AGU). The glycosylasparaginase precursor undergoes autoproteolysis through an N-O or N-S acyl rearrangement of the peptide bond, which leads to the cleavage of a peptide bond between an Asp and a Thr. This proteolysis step generates an exposed N-terminal catalytic threonine and activates the enzyme."
definition: >-
  Glycosylasparaginase and similar proteins. Glycosylasparaginase catalyzes the hydrolysis of the glycosylamide bond of asparagine-linked glycoproteins. This enzyme is an amidase located inside lysosomes. Mutation of this gene in humans causes a genetic disorder known as aspartylglycosaminuria (AGU). The glycosylasparaginase precursor undergoes autoproteolysis through an N-O or N-S acyl rearrangement of the peptide bond, which leads to the cleavage of a peptide bond between an Asp and a Thr. This proteolysis step generates an exposed N-terminal catalytic threonine and activates the enzyme. — an NCBI CDD conserved domain (cd04513); members share this curated model.
