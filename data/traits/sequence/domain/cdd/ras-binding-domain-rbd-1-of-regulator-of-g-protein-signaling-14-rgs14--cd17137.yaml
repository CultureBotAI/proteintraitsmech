identifier: CDD:cd17137
label: "Ras-binding domain (RBD) 1 of regulator of G protein signaling 14 (RGS14). RGS12 (regulator of G protein signaling 14) is a RGS protein with a multidomain structure that allows it to interact with binding partners from multiple signaling pathways. RGS proteins belong to a large family of GTPase-accelerating proteins (GAPs) which act as key inhibitors of G-protein-mediated cell responses in eukaryotes. RGS14 contains an N-terminal RGS domain, two tandem Ras-binding domains (RBDs) and a G protein regulatory (GPR, also referred to as a GoLoco) motif. RGS14 binds activated H-Ras-GTP through its first RBD and interacts with Rap2-GTP and RAF kinases by the second tandem RBD. RBD is structurally similar to the beta-grasp fold of ubiquitin, a common structure involved in protein-protein interactions. RGS14 modulates neuronal physiology and all of its binding partners have roles in synaptic plasticity."
definition: >-
  Ras-binding domain (RBD) 1 of regulator of G protein signaling 14 (RGS14). RGS12 (regulator of G protein signaling 14) is a RGS protein with a multidomain structure that allows it to interact with binding partners from multiple signaling pathways. RGS proteins belong to a large family of GTPase-accelerating proteins (GAPs) which act as key inhibitors of G-protein-mediated cell responses in eukaryotes. RGS14 contains an N-terminal RGS domain, two tandem Ras-binding domains (RBDs) and a G protein regulatory (GPR, also referred to as a GoLoco) motif. RGS14 binds activated H-Ras-GTP through its first RBD and interacts with Rap2-GTP and RAF kinases by the second tandem RBD. RBD is structurally similar to the beta-grasp fold of ubiquitin, a common structure involved in protein-protein interactions. RGS14 modulates neuronal physiology and all of its binding partners have roles in synaptic plasticity. — an NCBI CDD conserved domain (cd17137); members share this curated model.
