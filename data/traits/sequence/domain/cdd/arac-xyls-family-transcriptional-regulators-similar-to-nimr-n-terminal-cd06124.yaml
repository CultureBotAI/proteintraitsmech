identifier: CDD:cd06124
label: "AraC/XylS family transcriptional regulators similar to NimR, N-terminal cupin domain. This family contains mostly bacterial proteins containing an AraC/XylS family helix-turn-helix (HTH) DNA-binding domain C-terminal to a cupin domain, and may be possible transcriptional regulators. Included in this family is Escherichia coli HTH-type transcriptional regulator NimR (also called YeaM) that negatively regulates expression of the nimT operon and its own expression. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  AraC/XylS family transcriptional regulators similar to NimR, N-terminal cupin domain. This family contains mostly bacterial proteins containing an AraC/XylS family helix-turn-helix (HTH) DNA-binding domain C-terminal to a cupin domain, and may be possible transcriptional regulators. Included in this family is Escherichia coli HTH-type transcriptional regulator NimR (also called YeaM) that negatively regulates expression of the nimT operon and its own expression. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd06124); members share this curated model.
