label: "AKR5B family of aldo-keto reductase (AKR). Pseudomonas putida morphine 6-dehydrogenase (M6DH) is a founding member of the aldo-keto reductase family 5 member B1 (AKR5B1). M6DH (EC 1.1.1.218), also called naloxone reductase, oxidizes the C-6 hydroxy group of morphine and codeine."
