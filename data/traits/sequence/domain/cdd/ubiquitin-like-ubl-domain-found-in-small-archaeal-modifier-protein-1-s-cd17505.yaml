identifier: CDD:cd17505
label: "ubiquitin-like (Ubl) domain found in small archaeal modifier protein 1 (SAMP1). Ubiquitin-like small archaeal modifier protein 1 (SAMP1) shows a beta-grasp fold of Ub, suggesting that this archaeal Ubl molecule is more closely related to eukaryotic Ub and Ubls than to its prokaryotic counterpart. Several Ub-like structural features such as an N-terminal single lysine residue and di-glycine motif at the C-terminus, spatially isolated, implicate formation of a poly-SAMPylated chainpoly-SAMPylation. SAMP1 can form covalent conjugates with its protein targets through an isopeptide linkage via their C-terminal diglycine motif in a streamlined archaeal E1-dependent pathway. It is involved in sulfur transfer during molybdenum cofactor biosynthesis much like MoaD. This family also includes proteins such as Thermoplasma acidophilum TA0895 and others, all closely related to proteins MoaD."
definition: >-
  ubiquitin-like (Ubl) domain found in small archaeal modifier protein 1 (SAMP1). Ubiquitin-like small archaeal modifier protein 1 (SAMP1) shows a beta-grasp fold of Ub, suggesting that this archaeal Ubl molecule is more closely related to eukaryotic Ub and Ubls than to its prokaryotic counterpart. Several Ub-like structural features such as an N-terminal single lysine residue and di-glycine motif at the C-terminus, spatially isolated, implicate formation of a poly-SAMPylated chainpoly-SAMPylation. SAMP1 can form covalent conjugates with its protein targets through an isopeptide linkage via their C-terminal diglycine motif in a streamlined archaeal E1-dependent pathway. It is involved in sulfur transfer during molybdenum cofactor biosynthesis much like MoaD. This family also includes proteins such as Thermoplasma acidophilum TA0895 and others, all closely related to proteins MoaD. — an NCBI CDD conserved domain (cd17505); members share this curated model.
