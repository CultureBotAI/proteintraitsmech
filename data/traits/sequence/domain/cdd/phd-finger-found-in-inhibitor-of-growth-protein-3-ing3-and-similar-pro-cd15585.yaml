identifier: CDD:cd15585
label: "PHD finger found in inhibitor of growth protein 3 (ING3) and similar proteins. ING3, also termed p47ING3, is one member of the inhibitor of growth (ING) family of type II tumor suppressors. It is ubiquitously expressed and has been implicated in transcription modulation, cell cycle control, and the induction of apoptosis. It is an important subunit of human NuA4 histone acetyltransferase complex, which regulates the acetylation of histones H2A and H4. Moreover, ING3 promotes ultraviolet (UV)-induced apoptosis through the Fas/caspase-8-dependent pathway in melanoma cells. It physically interacts with subunits of E3 ligase Skp1-Cullin-F-boxprotein complex (SCF complex) and is degraded by the SCF (F-box protein S-phase kinase-associated protein 2, Skp2)-mediated ubiquitin-proteasome system. It also acts as a suppression factor during tumorigenesis and progression of hepatocellular carcinoma (HCC). ING3 contains an N-terminal ING domain and a C-terminal plant homeodomain (PHD) finger."
definition: >-
  PHD finger found in inhibitor of growth protein 3 (ING3) and similar proteins. ING3, also termed p47ING3, is one member of the inhibitor of growth (ING) family of type II tumor suppressors. It is ubiquitously expressed and has been implicated in transcription modulation, cell cycle control, and the induction of apoptosis. It is an important subunit of human NuA4 histone acetyltransferase complex, which regulates the acetylation of histones H2A and H4. Moreover, ING3 promotes ultraviolet (UV)-induced apoptosis through the Fas/caspase-8-dependent pathway in melanoma cells. It physically interacts with subunits of E3 ligase Skp1-Cullin-F-boxprotein complex (SCF complex) and is degraded by the SCF (F-box protein S-phase kinase-associated protein 2, Skp2)-mediated ubiquitin-proteasome system. It also acts as a suppression factor during tumorigenesis and progression of hepatocellular carcinoma (HCC). ING3 contains an N-terminal ING domain and a C-terminal plant homeodomain (PHD) finger. — an NCBI CDD conserved domain (cd15585); members share this curated model.
