identifier: CDD:cd14706
label: "Basic leucine zipper (bZIP) domain of CREBZF/Zhangfei transcription factor and similar proteins: a DNA-binding and dimerization domain. CREBZF (also called Zhangfei, ZF, LAZip, or SMILE) is a neuronal bZIP transcription factor that is involved in the infection cycle of herpes simplex virus (HSV) and related cellular processes. It suppresses the ability of the HSV transactivator VP16 to initiate the viral replicative cycle. CREBZF has also been implicated in the regulation of the human nerve growth factor receptor trkA and the tumor suppressor p53. bZIP factors act in networks of homo and heterodimers in the regulation of a diverse set of cellular processes. The bZIP structural motif contains a basic region and a leucine zipper, composed of alpha helices with leucine residues 7 amino acids apart, which stabilize dimerization with a parallel leucine zipper domain. Dimerization of leucine zippers creates a pair of the adjacent basic regions that bind DNA and undergo conformational change. Dimerization occurs in a specific and predictable manner resulting in hundreds of dimers having unique effects on transcription."
definition: >-
  Basic leucine zipper (bZIP) domain of CREBZF/Zhangfei transcription factor and similar proteins: a DNA-binding and dimerization domain. CREBZF (also called Zhangfei, ZF, LAZip, or SMILE) is a neuronal bZIP transcription factor that is involved in the infection cycle of herpes simplex virus (HSV) and related cellular processes. It suppresses the ability of the HSV transactivator VP16 to initiate the viral replicative cycle. CREBZF has also been implicated in the regulation of the human nerve growth factor receptor trkA and the tumor suppressor p53. bZIP factors act in networks of homo and heterodimers in the regulation of a diverse set of cellular processes. The bZIP structural motif contains a basic region and a leucine zipper, composed of alpha helices with leucine residues 7 amino acids apart, which stabilize dimerization with a parallel leucine zipper domain. Dimerization of leucine zippers creates a pair of the adjacent basic regions that bind DNA and undergo conformational change. Dimerization occurs in a specific and predictable manner resulting in hundreds of dimers having unique effects on transcription. — an NCBI CDD conserved domain (cd14706); members share this curated model.
