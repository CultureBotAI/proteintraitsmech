identifier: CDD:cd20904
label: Mit1CII
definition: >-
  Mit1CII is the N-terminal of Chromatin Remodeling Factor Mit1. Mit1CII binds Chp2, a HP1 (Heterochromatin protein 1) homologs that function in heterochromatic gene silencing, and is recruited to heterochromatin for gene expression silencing. Mit1 is part of the Snf2/Hdac Repressive Complex (SHREC). SHREC is the fission yeast NuRD equivalent within S. pombe heterochromatin, that plays a major role in transcriptional gene silencing (TGS). SHREC consists of the nucleosome remodeler Mit1, the histone deacetylase Clr3 and the MBD-like protein Clr2, which are all connected by the scaffolding subunit Clr1
