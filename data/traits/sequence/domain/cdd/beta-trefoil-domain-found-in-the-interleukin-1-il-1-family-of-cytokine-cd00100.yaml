identifier: CDD:cd00100
label: "beta-trefoil domain found in the interleukin-1 (IL-1) family of cytokines. The IL-1 family of cytokines comprises 11 members, including 7 pro-inflammatory agonists (IL-1alpha, IL-1beta, IL-18, IL-33, IL-36alpha, IL-36beta, IL-36gamma) and 4 defined or putative antagonists (IL-1R antagonist (IL-1Ra), IL-36Ra, IL-37, and IL-38) exerting anti-inflammatory activities. These members can have complimentary or distinct biological functions. All family members share a common structure at the C-terminus, which is comprised by of a typical beta-trefoil fold consisting of 12-beta-strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  beta-trefoil domain found in the interleukin-1 (IL-1) family of cytokines. The IL-1 family of cytokines comprises 11 members, including 7 pro-inflammatory agonists (IL-1alpha, IL-1beta, IL-18, IL-33, IL-36alpha, IL-36beta, IL-36gamma) and 4 defined or putative antagonists (IL-1R antagonist (IL-1Ra), IL-36Ra, IL-37, and IL-38) exerting anti-inflammatory activities. These members can have complimentary or distinct biological functions. All family members share a common structure at the C-terminus, which is comprised by of a typical beta-trefoil fold consisting of 12-beta-strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd00100); members share this curated model.
