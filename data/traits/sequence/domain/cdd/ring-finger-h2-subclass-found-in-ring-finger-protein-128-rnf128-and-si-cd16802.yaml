  RING finger, H2 subclass, found in RING finger protein 128 (RNF128) and similar proteins. This subfamily includes RING finger proteins RNF128, RNF133, RNF148, and similar proteins, which belong to a larger PA-TM-RING ubiquitin ligase family that has been characterized by containing an N-terminal signal peptide, a protease-associated (PA) domain, a transmembrane (TM) domain and a C-terminal C3H2C3-type RING-H2 finger followed by a putative PEST sequence. RNF128, also known as gene related to anergy in lymphocytes protein (GRAIL), is a type 1 transmembrane E3 ubiquitin-protein ligase that is a critical regulator of adaptive immunity and development. It inhibits cytokine gene transcription, is expressed in anergic CD4+ T cells, and has been implicated in primary T cell activation, survival, and differentiation, as well as in T cell anergy and oral tolerance. It induces T cell anergy through the ubiquitination activity of its cytosolic RING finger. It regulates expression of the costimulatory molecule CD40L on CD4 T cells, and ubiquitinates the costimulatory molecule CD40 ligand (CD40L) during the induction of T cell anergy. Moreover, RNF128 interacts with the luminal/extracellular portion of both CD151 and the related tetraspanin CD81 via its PA domain, which promoted ubiquitination of cytosolic lysine residues. It also down-modulates the expression of CD83 (previously described as a cell surface marker for mature dendritic cells) on CD4 T cells. Furthermore, Rho guanine dissociation inhibitor (RhoGDI) has been identified as a potential substrate of RNF128, suggesting a role for Rho effector molecules in T cell anergy. In addition, RNF128 plays a role in environmental stress responses. It promotes environmental salinity tolerance in euryhaline tilapia. RNF133 is a testis-specific endoplasmic reticulum-associated E3 ubiquitin ligase that is mainly present in the cytoplasm of elongated spermatids. It may play a role in sperm maturation through an ER-associated degradation (ERAD) pathway. RNF148 is a testis-specific E3 ubiquitin ligase that is abundantly expressed in testes and slightly expressed in pancreas. Its expression is regulated by histone deacetylases. — an NCBI CDD conserved domain (cd16802); members share this curated model.
