identifier: CDD:cd15641
label: "PHD finger found in lysine-specific demethylase PHF2. PHF2, also termed GRC5, or PHD finger protein 2, is a histone lysine demethylase ubiquitously expressed in various tissues. It contains a plant homeodomain (PHD) finger and a JmjC domain and plays an important role in adipogenesis. The PHD finger domain can recognize trimethylated histone H3 lysine 4 (H3K4me3). PHF2 also has dimethylated histone H3 lysine 9(H3K9me2) demethylase activity and acts as a coactivator of several metabolism-related transcription factors. Moreover, it can demethylate ARID5B and further forms a complex with demethylated ARD5B to bind the promoter regions of target genes. The overexpression of PHF2 is involved in the progression of esophageal squamous cell carcinoma (ESCC)."
definition: >-
