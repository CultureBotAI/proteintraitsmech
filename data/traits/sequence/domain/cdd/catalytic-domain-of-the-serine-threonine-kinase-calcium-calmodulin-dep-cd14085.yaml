identifier: CDD:cd14085
label: "Catalytic domain of the Serine/Threonine kinase, Calcium/calmodulin-dependent protein kinase Type IV. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. CaMKs are multifunctional calcium and calmodulin (CaM) stimulated STKs involved in cell cycle regulation. There are several types of CaMKs including CaMKI, CaMKII, and CaMKIV. CaMKs contain an N-terminal catalytic domain and a C-terminal regulatory domain that harbors a CaM binding site. CaMKIV is found predominantly in neurons and immune cells. It is activated by the binding of calcium/CaM and phosphorylation by CaMKK (alpha or beta). The CaMKK-CaMKIV cascade participates in regulating several transcription factors like CREB, MEF2, and retinoid orphan receptors. It also is implicated in T-cell development and signaling, cytokine secretion, and signaling through Toll-like receptors, and is thus, pivotal in immune response and inflammation. The CaMKIV subfamily is part of a larger superfamily that includes the catalytic domains of other protein kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, Calcium/calmodulin-dependent protein kinase Type IV. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. CaMKs are multifunctional calcium and calmodulin (CaM) stimulated STKs involved in cell cycle regulation. There are several types of CaMKs including CaMKI, CaMKII, and CaMKIV. CaMKs contain an N-terminal catalytic domain and a C-terminal regulatory domain that harbors a CaM binding site. CaMKIV is found predominantly in neurons and immune cells. It is activated by the binding of calcium/CaM and phosphorylation by CaMKK (alpha or beta). The CaMKK-CaMKIV cascade participates in regulating several transcription factors like CREB, MEF2, and retinoid orphan receptors. It also is implicated in T-cell development and signaling, cytokine secretion, and signaling through Toll-like receptors, and is thus, pivotal in immune response and inflammation. The CaMKIV subfamily is part of a larger superfamily that includes the catalytic domains of other protein kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14085); members share this curated model.
