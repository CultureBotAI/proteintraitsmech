identifier: CDD:cd23395
label: "C-terminal receptor binding domain, beta-trefoil fold, found in Clostridium botulinum chimeric BoNT/DC neurotoxin and similar proteins. Botulinum toxin (BoNT) causes flaccid paralysis by inhibiting neurotransmitter (acetylcholine) release from the presynaptic membranes of nerve terminals of eukaryotic host skeletal and autonomic nervous system, with frequent heart or respiratory failure. BoNT/DC, also called D/C mosaic BoNT, is a BoNT subtype that is essentially a hybrid of the BoNT/C (about one-third) and BoNT/D (about two-thirds) serotypes. It is a pathogenic agent causing bovine botulism which exhibits the highest toxic activity to mice and possesses immunological specificity. BoNT/DC comprises three domains which are involved in catalysis (LC), translocation (HCT), and host receptor binding (HCR). The HCR domain is responsible for the highly specific targeting of the neurotoxin to neuronal cell membranes. It is a proven target for anti-BoNT antibody and vaccine development. The HCR domain of BoNT/DC is very similar to BoNT/C based on sequence. However, its crystal structure clearly shows that its HCR domain is more similar to BoNT/B than BoNT/C, which has been confirmed by functional studies. BoNT/DC does not share protein receptor with BoNT/C. Instead, it shares synaptotagmin (Syt) I and II as receptors with BoNT/B, despite their low sequence similarity. This model corresponds to C-terminal HCR domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  C-terminal receptor binding domain, beta-trefoil fold, found in Clostridium botulinum chimeric BoNT/DC neurotoxin and similar proteins. Botulinum toxin (BoNT) causes flaccid paralysis by inhibiting neurotransmitter (acetylcholine) release from the presynaptic membranes of nerve terminals of eukaryotic host skeletal and autonomic nervous system, with frequent heart or respiratory failure. BoNT/DC, also called D/C mosaic BoNT, is a BoNT subtype that is essentially a hybrid of the BoNT/C (about one-third) and BoNT/D (about two-thirds) serotypes. It is a pathogenic agent causing bovine botulism which exhibits the highest toxic activity to mice and possesses immunological specificity. BoNT/DC comprises three domains which are involved in catalysis (LC), translocation (HCT), and host receptor binding (HCR). The HCR domain is responsible for the highly specific targeting of the neurotoxin to neuronal cell membranes. It is a proven target for anti-BoNT antibody and vaccine development. The HCR domain of BoNT/DC is very similar to BoNT/C based on sequence. However, its crystal structure clearly shows that its HCR domain is more similar to BoNT/B than BoNT/C, which has been confirmed by functional studies. BoNT/DC does not share protein receptor with BoNT/C. Instead, it shares synaptotagmin (Syt) I and II as receptors with BoNT/B, despite their low sequence similarity. This model corresponds to C-terminal HCR domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23395); members share this curated model.
