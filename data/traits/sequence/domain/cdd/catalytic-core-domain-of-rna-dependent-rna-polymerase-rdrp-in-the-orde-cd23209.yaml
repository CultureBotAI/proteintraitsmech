identifier: CDD:cd23209
label: "catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the order Hepelivirales of positive-sense single-stranded RNA [(+)ssRNA] viruses. This group contains the catalytic core domain of RdRp of RNA viruses belonging to the order Hepelivirales, class Alsuviricetes. This Hepelivirales order consists of four families: Alphatetraviridae, Benyviridae, Hepeviridae, and Matonaviridae. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
definition: >-
