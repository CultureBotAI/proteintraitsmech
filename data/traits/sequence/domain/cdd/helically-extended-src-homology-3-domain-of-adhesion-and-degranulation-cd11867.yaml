identifier: CDD:cd11867
label: "Helically extended Src Homology 3 domain of Adhesion and Degranulation-promoting Adaptor Protein. ADAP, also called Fyn T-binding protein (FYB) or SLP-76-associated protein (SLAP), is expressed mainly in hematopoietic cells but not in B cells. It is required for the proliferation of mature T-cells and plays an important role in T-cell activation, TCR-induced integrin clustering, and T-cell adhesion. ADAP has been shown to bind many partners including SLP-76, Fyn, Src, SKAP1, SKAP2, dynein, Ena/VASP, Carma1, among others. It is connected to cytoskeleton via its binding to Ena and VASP, which impacts actin cytoskeletal remodeling upon TCR ligation. The SH3 domain of ADAP adopts an altered fold referred to as a helically extended SH3 (hSH3) domain characterized by clusters of positive charges. The hSH3 domain can no longer bind conventional proline-rich peptides, instead, it functions as a novel lipid interaction domain and can bind acidic lipids such as phosphatidylserine, phosphatidylinositol, phosphatidic acid, and polyphosphoinositides."
definition: >-
  Helically extended Src Homology 3 domain of Adhesion and Degranulation-promoting Adaptor Protein. ADAP, also called Fyn T-binding protein (FYB) or SLP-76-associated protein (SLAP), is expressed mainly in hematopoietic cells but not in B cells. It is required for the proliferation of mature T-cells and plays an important role in T-cell activation, TCR-induced integrin clustering, and T-cell adhesion. ADAP has been shown to bind many partners including SLP-76, Fyn, Src, SKAP1, SKAP2, dynein, Ena/VASP, Carma1, among others. It is connected to cytoskeleton via its binding to Ena and VASP, which impacts actin cytoskeletal remodeling upon TCR ligation. The SH3 domain of ADAP adopts an altered fold referred to as a helically extended SH3 (hSH3) domain characterized by clusters of positive charges. The hSH3 domain can no longer bind conventional proline-rich peptides, instead, it functions as a novel lipid interaction domain and can bind acidic lipids such as phosphatidylserine, phosphatidylinositol, phosphatidic acid, and polyphosphoinositides. — an NCBI CDD conserved domain (cd11867); members share this curated model.
