identifier: CDD:cd02974
label: "Alkyl hydroperoxide reductase F subunit (AhpF) N-terminal domain (NTD) family, N-terminal TRX-fold subdomain; AhpF is a homodimeric flavoenzyme which catalyzes the NADH-dependent reduction of the peroxiredoxin AhpC, which in turn catalyzes the reduction of hydrogen peroxide and organic hydroperoxides. AhpF contains an NTD forming two contiguous TRX-fold subdomain similar to Pyrococcus furiosus protein disulfide oxidoreductase (PfPDO). It also contains a catalytic core similar to TRX reductase containing FAD and NADH binding domains with an active site disulfide. The proposed mechanism of action of AhpF is similar to a TRX/TRX reductase system. The flow of reducing equivalents goes from NADH -> catalytic core of AhpF -> NTD of AhpF -> AhpC -> peroxide substrates. The N-terminal TRX-fold subdomain of AhpF NTD is redox inactive, but is proposed to contain an important residue that aids in the catalytic function of the redox-active CXXC motif contained in the C-terminal TRX-fold subdomain."
definition: >-
  Alkyl hydroperoxide reductase F subunit (AhpF) N-terminal domain (NTD) family, N-terminal TRX-fold subdomain; AhpF is a homodimeric flavoenzyme which catalyzes the NADH-dependent reduction of the peroxiredoxin AhpC, which in turn catalyzes the reduction of hydrogen peroxide and organic hydroperoxides. AhpF contains an NTD forming two contiguous TRX-fold subdomain similar to Pyrococcus furiosus protein disulfide oxidoreductase (PfPDO). It also contains a catalytic core similar to TRX reductase containing FAD and NADH binding domains with an active site disulfide. The proposed mechanism of action of AhpF is similar to a TRX/TRX reductase system. The flow of reducing equivalents goes from NADH -> catalytic core of AhpF -> NTD of AhpF -> AhpC -> peroxide substrates. The N-terminal TRX-fold subdomain of AhpF NTD is redox inactive, but is proposed to contain an important residue that aids in the catalytic function of the redox-active CXXC motif contained in the C-terminal TRX-fold subdomain. — an NCBI CDD conserved domain (cd02974); members share this curated model.
