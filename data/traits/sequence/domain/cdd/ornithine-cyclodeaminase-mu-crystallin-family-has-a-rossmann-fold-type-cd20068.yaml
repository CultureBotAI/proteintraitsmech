definition: >-
  ornithine cyclodeaminase/mu-crystallin family has a Rossmann fold-type NAD-binding domain,. The ornithine cyclodeaminase/mu-crystallin family has a Rossmann fold-type NAD-binding domain, and includes such proteins as Pseudomonas ornithine cyclodeaminase which catalyses the deamination of ornithine to proline (EC 4.3.1.12) , archaeal alanine dehydrogenase, and mu-crystallin
