identifier: CDD:cd20267
label: "LYR (leucine-tyrosine-arginine) motif found in LYR motif-containing protein 7 (LYRM7) and similar proteins. LYRM7 is an assembly factor required for Rieske iron sulfur (Fe-S) protein UQCRFS1 incorporation into the cytochrome b-c1 (CIII) complex. It functions as a chaperone, binding to this subunit within the mitochondrial matrix and stabilizing it prior to its translocation and insertion into the late CIII dimeric intermediate within the mitochondrial inner membrane. LYRM7 mutations cause a multifocal cavitating leukoencephalopathy with a distinct and recognizable magnetic resonance imaging (MRI) pattern. LYRM7 belongs to the Complex1_LYR-like superfamily that consists of proteins of diverse functions that are exclusively found in eukaryotes and contain the conserved tripeptide 'LYR' close to the N-terminus."
definition: >-
  LYR (leucine-tyrosine-arginine) motif found in LYR motif-containing protein 7 (LYRM7) and similar proteins. LYRM7 is an assembly factor required for Rieske iron sulfur (Fe-S) protein UQCRFS1 incorporation into the cytochrome b-c1 (CIII) complex. It functions as a chaperone, binding to this subunit within the mitochondrial matrix and stabilizing it prior to its translocation and insertion into the late CIII dimeric intermediate within the mitochondrial inner membrane. LYRM7 mutations cause a multifocal cavitating leukoencephalopathy with a distinct and recognizable magnetic resonance imaging (MRI) pattern. LYRM7 belongs to the Complex1_LYR-like superfamily that consists of proteins of diverse functions that are exclusively found in eukaryotes and contain the conserved tripeptide 'LYR' close to the N-terminus. — an NCBI CDD conserved domain (cd20267); members share this curated model.
