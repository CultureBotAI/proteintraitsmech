identifier: CDD:cd19078
label: "AKR13C family of aldo-keto reductase (AKR). The AKR13C family includes Helicobacter pyroli aldehyde reductase (AKR13C1) and Thermotoga maritima aldo-keto reductase (AKR13C2). Aldehyde reductase (EC 1.1.1.21), also called aldose reductase, is a cytosolic NADPH-dependent oxidoreductase that catalyzes the reduction of a variety of aldehydes and carbonyls, including monosaccharides."
definition: >-
  AKR13C family of aldo-keto reductase (AKR). The AKR13C family includes Helicobacter pyroli aldehyde reductase (AKR13C1) and Thermotoga maritima aldo-keto reductase (AKR13C2). Aldehyde reductase (EC 1.1.1.21), also called aldose reductase, is a cytosolic NADPH-dependent oxidoreductase that catalyzes the reduction of a variety of aldehydes and carbonyls, including monosaccharides. — an NCBI CDD conserved domain (cd19078); members share this curated model.
