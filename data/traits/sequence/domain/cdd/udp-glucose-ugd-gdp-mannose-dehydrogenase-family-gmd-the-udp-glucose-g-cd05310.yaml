identifier: CDD:cd05310
label: MGDP_dh
definition: >-
  UDP-glucose (UGD) /GDP-mannose dehydrogenase family (GMD). The UDP-glucose/GDP-mannose dehydrogenaseses are a small group of enzymes which possesses the ability to catalyse the NAD-dependent 2-fold oxidation of an alcohol to an acid without the release of an aldehyde intermediate. These enzymes contain 2 similar domains in a Rossmann fold connected by a long alpha helix. The N-terminal domain of P. aeruginosa GMD contans a complete dinucleotide binding motif, while the second, C-terminal domain has incomplete motif. Bacteria UDG has an N-terminal NAD(+) binding domain in a Rossmann fold, and a C-terminal UDP-sugar binding domain connected by a long central alpha helix. UGD catalyzes the NAD-dependent oxidation of UDP-glucose to UDP-gluconuronic acid
