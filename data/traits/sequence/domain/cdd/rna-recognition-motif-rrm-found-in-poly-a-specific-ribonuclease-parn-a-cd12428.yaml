identifier: CDD:cd12428
label: "RNA recognition motif (RRM) found in poly(A)-specific ribonuclease PARN and similar proteins. The subfamily corresponds to the RRM of PARN, also termed deadenylating nuclease, or deadenylation nuclease, or polyadenylate-specific ribonuclease, a processive poly(A)-specific 3'-exoribonuclease involved in the decay of eukaryotic mRNAs. It specifically binds both, the poly(A) tail at the 3' end and the 7-methylguanosine (m7G) cap located at the 5' end of eukaryotic mRNAs, and catalyzes the 3'- to 5'-end deadenylation of single-stranded mRNA with a free 3' hydroxyl group both in the nucleus and in the cytoplasm. PARN belongs to the DEDD superfamily of exonucleases. It contains a nuclease domain, an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), and an R3H domain. PARN exists as a homodimer. The nuclease domain is involved in the dimerization. RRM and R3H domains are essential for the RNA-binding."
definition: >-
  RNA recognition motif (RRM) found in poly(A)-specific ribonuclease PARN and similar proteins. The subfamily corresponds to the RRM of PARN, also termed deadenylating nuclease, or deadenylation nuclease, or polyadenylate-specific ribonuclease, a processive poly(A)-specific 3'-exoribonuclease involved in the decay of eukaryotic mRNAs. It specifically binds both, the poly(A) tail at the 3' end and the 7-methylguanosine (m7G) cap located at the 5' end of eukaryotic mRNAs, and catalyzes the 3'- to 5'-end deadenylation of single-stranded mRNA with a free 3' hydroxyl group both in the nucleus and in the cytoplasm. PARN belongs to the DEDD superfamily of exonucleases. It contains a nuclease domain, an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), and an R3H domain. PARN exists as a homodimer. The nuclease domain is involved in the dimerization. RRM and R3H domains are essential for the RNA-binding. — an NCBI CDD conserved domain (cd12428); members share this curated model.
