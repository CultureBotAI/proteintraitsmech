identifier: CDD:cd16488
label: "Modified RING finger, H2 subclass (C3H3C2-type), found in WD repeat-containing protein mio and its homologs. This subfamily contains Mio, WDR24, WDR59, and their counterparts Sea4, Sea2, and Sea3 from yeast, respectively. Mio/Sea4, Sea2/WDR24, and Sea3/WDR59 are components of the GATOR2 complex, which also includes another two subunits, Seh1and Sec13. GATOR2 and GATOR1, which is composed of three subunits, DEPDC5, Nprl2, and Nprl3, form the Rag-interacting complex GATOR (GAP Activity Towards Rags). Inhibition of GATOR1 subunits makes mTORC1 signaling resistant to amino acid deprivation. In contrast, inhibition of GATOR2 subunits suppresses mTORC1 signaling and GATOR2 negatively regulates DEPDC5. All subfamily members contain an N-terminal WD40 domain and a C-terminal RING-H2 finger with an unusual arrangement of zinc-coordinating residues. The cysteines and histidines in the RING-H2 finger are arranged as a modified C3H3C2-type, rather than the canonical C3H2C3-type."
definition: >-
  Modified RING finger, H2 subclass (C3H3C2-type), found in WD repeat-containing protein mio and its homologs. This subfamily contains Mio, WDR24, WDR59, and their counterparts Sea4, Sea2, and Sea3 from yeast, respectively. Mio/Sea4, Sea2/WDR24, and Sea3/WDR59 are components of the GATOR2 complex, which also includes another two subunits, Seh1and Sec13. GATOR2 and GATOR1, which is composed of three subunits, DEPDC5, Nprl2, and Nprl3, form the Rag-interacting complex GATOR (GAP Activity Towards Rags). Inhibition of GATOR1 subunits makes mTORC1 signaling resistant to amino acid deprivation. In contrast, inhibition of GATOR2 subunits suppresses mTORC1 signaling and GATOR2 negatively regulates DEPDC5. All subfamily members contain an N-terminal WD40 domain and a C-terminal RING-H2 finger with an unusual arrangement of zinc-coordinating residues. The cysteines and histidines in the RING-H2 finger are arranged as a modified C3H3C2-type, rather than the canonical C3H2C3-type. — an NCBI CDD conserved domain (cd16488); members share this curated model.
