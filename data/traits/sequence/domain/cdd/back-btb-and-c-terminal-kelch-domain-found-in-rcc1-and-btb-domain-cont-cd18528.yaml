identifier: CDD:cd18528
label: "BACK (BTB and C-terminal Kelch) domain found in RCC1 and BTB domain-containing protein 1 (RCBTB1). RCBTB1, also called chronic lymphocytic leukemia deletion region gene 7 protein (CLLD7), or CLL deletion region gene 7 protein, or regulator of chromosome condensation and BTB domain-containing protein 1, or E4.5, is a novel chromosome condensation regulator-like guanine nucleotide exchange factor (GEF) that may be involved in cell cycle regulation by chromatin remodeling. It may also function as a tumor suppressor that regulates pathways of DNA damage/repair and apoptosis. Moreover, RCBTB1 acts as a putative substrate adaptor for a cullin3 (CUL3) E3 ligase complex that mediates the ubiquitination and subsequent proteasomal degradation of target proteins. Biallelic mutations in RCBTB1 may cause isolated and syndromic retinal dystrophy."
definition: >-
