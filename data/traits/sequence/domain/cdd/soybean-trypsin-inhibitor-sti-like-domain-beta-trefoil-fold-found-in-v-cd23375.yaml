identifier: CDD:cd23375
label: "soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Vitis vinifera miraculin-like protein (VvMLP) and similar proteins. This subfamily includes VvMLP, Synsepalum dulcificum miraculin (SdMIR), and Arabidopsis thaliana Kunitz trypsin inhibitor 5 (AtKTI5, also known as AtKTI2). VvMLP exhibits significant homology to miraculin. However, it exists as a monomer in solution with no detectable taste-modifying activity. It can act as a moderate trypsin inhibitor. SdMIR has the property of modifying a sour taste into a sweet taste. This alteration of taste perception persists for many minutes. AtKTI5 can inhibit both serine proteases and cysteine proteases. It may be involved in the modulation of the proteases that participate in the hydrolysis of dietary proteins in the gut of spider mites. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Vitis vinifera miraculin-like protein (VvMLP) and similar proteins. This subfamily includes VvMLP, Synsepalum dulcificum miraculin (SdMIR), and Arabidopsis thaliana Kunitz trypsin inhibitor 5 (AtKTI5, also known as AtKTI2). VvMLP exhibits significant homology to miraculin. However, it exists as a monomer in solution with no detectable taste-modifying activity. It can act as a moderate trypsin inhibitor. SdMIR has the property of modifying a sour taste into a sweet taste. This alteration of taste perception persists for many minutes. AtKTI5 can inhibit both serine proteases and cysteine proteases. It may be involved in the modulation of the proteases that participate in the hydrolysis of dietary proteins in the gut of spider mites. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23375); members share this curated model.
