identifier: CDD:cd18297
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Ankyrin repeat and BTB/POZ domain-containing protein 2 (ABTB2) and similar proteins. This family includes ABTB2, BTBD11, plant ARM repeat protein interacting with ABF2 (ARIA), and similar proteins. ABTB2, also called bood POZ containing gene type 2 (BPOZ-2), is a scaffold protein that controls the degradation of many biological proteins ranging from embryonic development to tumor progression. It may be involved in the initiation of hepatocyte growth. ABTB2 functions as an adaptor protein for the E3 ubiquitin ligase scaffold protein Cullin-3. It directly binds to eukaryotic elongation factor 1A1 (eEF1A1) to promote eEF1A1 ubiquitylation and degradation, and prevent translation. The BTBD11 gene has been recently identified as an all-trans retinoic acid (atRA)-responsive gene that lies downstream of atRA and its receptors in the regulation of neurite outgrowth and cell adhesion in neural as well as non-neural tissues. ARIA is an armadillo (ARM) repeat and BTB domain-containing protein that acts as a positive regulator of ABA response via the modulation of the transcriptional activity of ABF2. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Ankyrin repeat and BTB/POZ domain-containing protein 2 (ABTB2) and similar proteins. This family includes ABTB2, BTBD11, plant ARM repeat protein interacting with ABF2 (ARIA), and similar proteins. ABTB2, also called bood POZ containing gene type 2 (BPOZ-2), is a scaffold protein that controls the degradation of many biological proteins ranging from embryonic development to tumor progression. It may be involved in the initiation of hepatocyte growth. ABTB2 functions as an adaptor protein for the E3 ubiquitin ligase scaffold protein Cullin-3. It directly binds to eukaryotic elongation factor 1A1 (eEF1A1) to promote eEF1A1 ubiquitylation and degradation, and prevent translation. The BTBD11 gene has been recently identified as an all-trans retinoic acid (atRA)-responsive gene that lies downstream of atRA and its receptors in the regulation of neurite outgrowth and cell adhesion in neural as well as non-neural tissues. ARIA is an armadillo (ARM) repeat and BTB domain-containing protein that acts as a positive regulator of ABA response via the modulation of the transcriptional activity of ABF2. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18297); members share this curated model.
