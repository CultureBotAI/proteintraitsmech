identifier: CDD:cd16755
label: "RING finger, HC subclass, found in tripartite motif-containing protein 9 (TRIM9) and similar proteins. TRIM9, human ortholog of rat Spring, also known as RING finger protein 91 (RNF91), is a brain-specific E3 ubiquitin-protein ligase collaborating with an E2 ubiquitin conjugating enzyme UBCH5b. TRIM9 plays an important role in the regulation of neuronal functions and participates in the neurodegenerative disorders through its ligase activity. It interacts with the WD repeat region of beta-transducin repeat-containing protein (beta-TrCP) through its N-terminal degron motif depending on the phosphorylation status, and thus negatively regulates nuclear factor-kappaB (NF-kappaB) activation in the NF-kappaB pro-inflammatory signaling pathway. Moreover, TRIM9 acts as a critical catalytic link between Netrin-1 and the exocytic soluble NSF attachment receptor protein (SNARE) machinery in murine cortical neurons. It promotes SNARE-mediated vesicle fusion and axon branching in a Netrin-dependent manner. TRIM9 belongs to the C-I subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a COS (carboxyl-terminal subgroup one signature) box, a fibronectin type III (FN3) domain, and a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain."
definition: >-
  RING finger, HC subclass, found in tripartite motif-containing protein 9 (TRIM9) and similar proteins. TRIM9, human ortholog of rat Spring, also known as RING finger protein 91 (RNF91), is a brain-specific E3 ubiquitin-protein ligase collaborating with an E2 ubiquitin conjugating enzyme UBCH5b. TRIM9 plays an important role in the regulation of neuronal functions and participates in the neurodegenerative disorders through its ligase activity. It interacts with the WD repeat region of beta-transducin repeat-containing protein (beta-TrCP) through its N-terminal degron motif depending on the phosphorylation status, and thus negatively regulates nuclear factor-kappaB (NF-kappaB) activation in the NF-kappaB pro-inflammatory signaling pathway. Moreover, TRIM9 acts as a critical catalytic link between Netrin-1 and the exocytic soluble NSF attachment receptor protein (SNARE) machinery in murine cortical neurons. It promotes SNARE-mediated vesicle fusion and axon branching in a Netrin-dependent manner. TRIM9 belongs to the C-I subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a COS (carboxyl-terminal subgroup one signature) box, a fibronectin type III (FN3) domain, and a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain. — an NCBI CDD conserved domain (cd16755); members share this curated model.
