identifier: CDD:cd23296
label: "beta-trefoil domain found in interleukin-1 beta (IL-1 beta) and similar proteins. IL-1 beta, also called catabolin, is a potent inflammatory cytokine that activates the inflammatory process. It was initially discovered as the major endogenous pyrogen. It induces prostaglandin synthesis, neutrophil influx and activation, T-cell activation and cytokine production, B-cell activation and antibody production, and fibroblast proliferation and collagen production. IL-1 beta promotes Th17 differentiation of T-cells and synergizes with IL12/interleukin-12 to induce IFN-gamma synthesis from T-helper 1 (Th1) cells. It plays a role in angiogenesis by inducing vascular endothelial growth factor (VEGF) production synergistically with tumor necrosis factor (TNF) and IL-6. IL-1 beta contains a C-terminal beta-trefoil domain, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  beta-trefoil domain found in interleukin-1 beta (IL-1 beta) and similar proteins. IL-1 beta, also called catabolin, is a potent inflammatory cytokine that activates the inflammatory process. It was initially discovered as the major endogenous pyrogen. It induces prostaglandin synthesis, neutrophil influx and activation, T-cell activation and cytokine production, B-cell activation and antibody production, and fibroblast proliferation and collagen production. IL-1 beta promotes Th17 differentiation of T-cells and synergizes with IL12/interleukin-12 to induce IFN-gamma synthesis from T-helper 1 (Th1) cells. It plays a role in angiogenesis by inducing vascular endothelial growth factor (VEGF) production synergistically with tumor necrosis factor (TNF) and IL-6. IL-1 beta contains a C-terminal beta-trefoil domain, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23296); members share this curated model.
