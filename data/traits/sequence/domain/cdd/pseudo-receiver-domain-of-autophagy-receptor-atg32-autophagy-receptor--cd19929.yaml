identifier: CDD:cd19929
label: "pseudo receiver domain of autophagy receptor Atg32. Autophagy receptor Atg32 is a single-pass outer mitochondrial membrane protein that is required for the selective autophagy of mitochondria, called mitophagy, in yeast. It mediates ubiquitin-independent mitophagy in response to nitrogen deprivation. It recruits the autophagy machinery to mitochondria, facilitating mitochondrial capture in phagophores, the precursors to autophagosomes. Whereas mammals have at least 7 different autophagy receptors, yeast only has one. Little is known about the structure of Atg32; it contains a binding region for the selective autophagy scaffolding protein Atg11 and an Atg8-interacting motif (AIM). Limited proteolysis has identified a structured domain, a pseudo receiver (psREC) domain, within the cytosolic region of Atg32 that is essential for the induction of mitophagy. psREC domains lack the metal-binding, phosphorylatable asp, and active site residues of canonical REC domains and are thought to function in protein-protein interactions."
definition: >-
  pseudo receiver domain of autophagy receptor Atg32. Autophagy receptor Atg32 is a single-pass outer mitochondrial membrane protein that is required for the selective autophagy of mitochondria, called mitophagy, in yeast. It mediates ubiquitin-independent mitophagy in response to nitrogen deprivation. It recruits the autophagy machinery to mitochondria, facilitating mitochondrial capture in phagophores, the precursors to autophagosomes. Whereas mammals have at least 7 different autophagy receptors, yeast only has one. Little is known about the structure of Atg32; it contains a binding region for the selective autophagy scaffolding protein Atg11 and an Atg8-interacting motif (AIM). Limited proteolysis has identified a structured domain, a pseudo receiver (psREC) domain, within the cytosolic region of Atg32 that is essential for the induction of mitophagy. psREC domains lack the metal-binding, phosphorylatable asp, and active site residues of canonical REC domains and are thought to function in protein-protein interactions. — an NCBI CDD conserved domain (cd19929); members share this curated model.
