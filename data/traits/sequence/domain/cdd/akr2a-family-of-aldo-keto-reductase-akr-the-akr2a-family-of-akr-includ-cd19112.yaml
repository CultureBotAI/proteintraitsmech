identifier: CDD:cd19112
label: "AKR2A family of aldo-keto reductase (AKR). The AKR2A family of AKR includes AKR2A1 (NADP-dependent D-sorbitol-6-phosphate dehydrogenase or NADP-S6PDH) from Malus domestica, and  AKR2A2 (NADPH-dependent mannose-6-phosphate reductase or NADPH-M6PR) from Apium graveolens. NADP-S6PDH (EC 1.1.1.200), also called aldose-6-phosphate reductase [NADPH], synthesizes sorbitol-6-phosphate, a key intermediate in the synthesis of sorbitol which is a major photosynthetic product in many members of the Rosaceae family. NADPH-M6PR (EC 1.1.1.224), also called NADPH-dependent M6P reductase, is a key enzyme involved in mannitol biosynthesis."
definition: >-
  AKR2A family of aldo-keto reductase (AKR). The AKR2A family of AKR includes AKR2A1 (NADP-dependent D-sorbitol-6-phosphate dehydrogenase or NADP-S6PDH) from Malus domestica, and AKR2A2 (NADPH-dependent mannose-6-phosphate reductase or NADPH-M6PR) from Apium graveolens. NADP-S6PDH (EC 1.1.1.200), also called aldose-6-phosphate reductase [NADPH], synthesizes sorbitol-6-phosphate, a key intermediate in the synthesis of sorbitol which is a major photosynthetic product in many members of the Rosaceae family. NADPH-M6PR (EC 1.1.1.224), also called NADPH-dependent M6P reductase, is a key enzyme involved in mannitol biosynthesis. — an NCBI CDD conserved domain (cd19112); members share this curated model.
