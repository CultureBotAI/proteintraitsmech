identifier: CDD:cd08175
label: "Glycerol-1-phosphate dehydrogenase (G1PDH) catalyzes the reversible reduction of dihydroxyacetone phosphate (DHAP) to glycerol-1-phosphate (G1P) in an NADH-dependent manner. Glycerol-1-phosphate dehydrogenase (G1PDH) plays a role in the synthesis of phosphoglycerolipids in Gram-positive bacterial species. It catalyzes the reversibly reduction of dihydroxyacetone phosphate (DHAP) to glycerol-1-phosphate (G1P) in a NADH-dependent manner. Its activity requires a Ni++ ion. In Bacillus subtilis, it has been described as AraM gene in L-arabinose (ara) operon. AraM protein forms homodimer."
definition: >-
  Glycerol-1-phosphate dehydrogenase (G1PDH) catalyzes the reversible reduction of dihydroxyacetone phosphate (DHAP) to glycerol-1-phosphate (G1P) in an NADH-dependent manner. Glycerol-1-phosphate dehydrogenase (G1PDH) plays a role in the synthesis of phosphoglycerolipids in Gram-positive bacterial species. It catalyzes the reversibly reduction of dihydroxyacetone phosphate (DHAP) to glycerol-1-phosphate (G1P) in a NADH-dependent manner. Its activity requires a Ni++ ion. In Bacillus subtilis, it has been described as AraM gene in L-arabinose (ara) operon. AraM protein forms homodimer. — an NCBI CDD conserved domain (cd08175); members share this curated model.
