identifier: CDD:cd00492
label: Trp_repressor
definition: >-
  Trp repressor. Trp repressor: Bacterial DNA repressor that binds several semi-palindromic operons. Binding of corepressor L-trp is necessary for binding DNA operator. There are no direct hydrogen bonds to DNA bases to explain specificity, which is likely determined by several factors, including sequence-dependent structural variations in the B-DNA backbone
