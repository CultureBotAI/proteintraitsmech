identifier: CDD:cd05203
label: "NAD binding domain of 6-phosphogluconate dehydrogenase and related proteins. The NAD binding domain of 6-phosphogluconate dehydrogenase adopts a Rossmann fold.  6-PGDH catalyzes the oxidative decarboxylation of 6-phosphogluconate to ribulose 5-phosphate with NADP+ as an electron acceptor, as part of the pentose phosphate pathway.  6-PGDH is a homodimer in which monomers act independently. 6-PGDH has about a 1000-fold greater Km for NADP+ vs. NAD+."
definition: >-
  NAD binding domain of 6-phosphogluconate dehydrogenase and related proteins. The NAD binding domain of 6-phosphogluconate dehydrogenase adopts a Rossmann fold. 6-PGDH catalyzes the oxidative decarboxylation of 6-phosphogluconate to ribulose 5-phosphate with NADP+ as an electron acceptor, as part of the pentose phosphate pathway. 6-PGDH is a homodimer in which monomers act independently. 6-PGDH has about a 1000-fold greater Km for NADP+ vs. NAD+. — an NCBI CDD conserved domain (cd05203); members share this curated model.
