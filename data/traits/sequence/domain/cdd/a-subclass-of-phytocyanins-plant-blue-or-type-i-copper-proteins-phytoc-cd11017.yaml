identifier: CDD:cd11017
label: Phytocyanin_like_1
definition: >-
  A subclass of phytocyanins, plant blue or type I copper proteins. Phytocyanins are plant blue or type I copper proteins. They are involved in electron transfer reactions with the Cu center transitioning between the oxidized Cu(II) form and the reduced Cu(I) form. Phytocyanins are classified into four groups: stellacyanin, plantacyanin, uclacyanin and early nodulin groups. Members of this unknown subgroup appear to have lost the T1 copper binding site
