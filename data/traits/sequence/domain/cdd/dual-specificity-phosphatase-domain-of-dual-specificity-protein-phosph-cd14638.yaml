identifier: CDD:cd14638
label: "dual specificity phosphatase domain of dual specificity protein phosphatase 1. Dual specificity protein phosphatase 1 (DUSP1), also called mitogen-activated protein kinase (MAPK) phosphatase 1 (MKP-1), functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). Like other MKPs, it deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. It belongs to the class I subfamily and is a mitogen- and stress-inducible nuclear MKP. Human MKP-1 dephosphorylates MAPK1/ERK2, regulating its activity during the meiotic cell cycle. Although initially MKP-1 was considered to be ERK-specific, it has been shown that MKP-1 also dephosphorylates both JNK and p38 MAPKs. DUSP1/MKP-1 is involved in various functions, including proliferation, differentiation, and apoptosis in normal cells. It is a central regulator of a variety of functions in the immune, metabolic, cardiovascular, and nervous systems. It contains an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, and a C-terminal catalytic dual specificity phosphatase domain."
definition: >-
  dual specificity phosphatase domain of dual specificity protein phosphatase 1. Dual specificity protein phosphatase 1 (DUSP1), also called mitogen-activated protein kinase (MAPK) phosphatase 1 (MKP-1), functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). Like other MKPs, it deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. It belongs to the class I subfamily and is a mitogen- and stress-inducible nuclear MKP. Human MKP-1 dephosphorylates MAPK1/ERK2, regulating its activity during the meiotic cell cycle. Although initially MKP-1 was considered to be ERK-specific, it has been shown that MKP-1 also dephosphorylates both JNK and p38 MAPKs. DUSP1/MKP-1 is involved in various functions, including proliferation, differentiation, and apoptosis in normal cells. It is a central regulator of a variety of functions in the immune, metabolic, cardiovascular, and nervous systems. It contains an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, and a C-terminal catalytic dual specificity phosphatase domain. — an NCBI CDD conserved domain (cd14638); members share this curated model.
