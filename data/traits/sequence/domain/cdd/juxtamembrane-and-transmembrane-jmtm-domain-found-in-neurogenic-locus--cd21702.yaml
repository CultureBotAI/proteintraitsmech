identifier: CDD:cd21702
label: "juxtamembrane and transmembrane (JMTM) domain found in neurogenic locus notch homolog protein 1 (Notch1) and similar proteins. Neurogenic locus notch homolog protein 1 (Notch1), also called translocation-associated notch protein TAN-1, functions as a receptor for membrane-bound ligands Jagged-1 (JAG1), Jagged-2 (JAG2) and Delta-1 (DLL1) to regulate cell-fate determination. It affects the implementation of differentiation, proliferation and apoptotic programs. It is also involved in angiogenesis, and also negatively regulates endothelial cell proliferation and migration and angiogenic sprouting. This model corresponds to the juxtamembrane and transmembrane (JMTM) domain of Notch1, which comprises an extended coil, a transmembrane helix (TM), and a beta-strand."
definition: >-
  juxtamembrane and transmembrane (JMTM) domain found in neurogenic locus notch homolog protein 1 (Notch1) and similar proteins. Neurogenic locus notch homolog protein 1 (Notch1), also called translocation-associated notch protein TAN-1, functions as a receptor for membrane-bound ligands Jagged-1 (JAG1), Jagged-2 (JAG2) and Delta-1 (DLL1) to regulate cell-fate determination. It affects the implementation of differentiation, proliferation and apoptotic programs. It is also involved in angiogenesis, and also negatively regulates endothelial cell proliferation and migration and angiogenic sprouting. This model corresponds to the juxtamembrane and transmembrane (JMTM) domain of Notch1, which comprises an extended coil, a transmembrane helix (TM), and a beta-strand. — an NCBI CDD conserved domain (cd21702); members share this curated model.
