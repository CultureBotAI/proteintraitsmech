identifier: CDD:cd06878
label: "The phosphoinositide binding Phox Homology domain of Sorting Nexin 25. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions. Sorting nexins (SNXs) make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway. The function of SNX25 is not yet known. It has been found in exosomes from human malignant pleural effusions. SNX25 shows the same domain architecture as SNX13 and SNX14, containing an N-terminal PXA domain, a regulator of G protein signaling (RGS) domain, a PX domain, and a C-terminal domain that is conserved in some SNXs."
definition: >-
  The phosphoinositide binding Phox Homology domain of Sorting Nexin 25. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions. Sorting nexins (SNXs) make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway. The function of SNX25 is not yet known. It has been found in exosomes from human malignant pleural effusions. SNX25 shows the same domain architecture as SNX13 and SNX14, containing an N-terminal PXA domain, a regulator of G protein signaling (RGS) domain, a PX domain, and a C-terminal domain that is conserved in some SNXs. — an NCBI CDD conserved domain (cd06878); members share this curated model.
