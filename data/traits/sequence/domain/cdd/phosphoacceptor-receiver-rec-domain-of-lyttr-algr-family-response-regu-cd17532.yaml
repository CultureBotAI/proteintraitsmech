identifier: CDD:cd17532
label: "phosphoacceptor receiver (REC) domain of LytTR/AlgR family response regulators similar to AlgR. Members of the LytTR/AlgR family of response regulators contain a REC domain and a unique LytTR DNA-binding output domain that lacks the helix-turn-helix motif and consists mostly of beta-strands. Transcriptional regulators with the LytTR-type output domains are involved in biosynthesis of extracellular polysaccharides, fimbriation, expression of exoproteins, including toxins, and quorum sensing. Included in this AlgR-like group of LytTR/AlgR family response regulators are Streptococcus agalactiae sensory transduction protein LytR, Pseudomonas aeruginosa positive alginate biosynthesis regulatory protein AlgR, Bacillus subtilis sensory transduction protein LytT, and Escherichia coli transcriptional regulatory protein BtsR, which are members of two-component regulatory systems. LytR and LytT are components of regulatory systems that regulate genes involved in cell wall metabolism. AlgR positively regulates the algD gene, which codes for a GDP-mannose dehydrogenase, a key enzyme in the alginate biosynthesis pathway. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of LytTR/AlgR family response regulators similar to AlgR. Members of the LytTR/AlgR family of response regulators contain a REC domain and a unique LytTR DNA-binding output domain that lacks the helix-turn-helix motif and consists mostly of beta-strands. Transcriptional regulators with the LytTR-type output domains are involved in biosynthesis of extracellular polysaccharides, fimbriation, expression of exoproteins, including toxins, and quorum sensing. Included in this AlgR-like group of LytTR/AlgR family response regulators are Streptococcus agalactiae sensory transduction protein LytR, Pseudomonas aeruginosa positive alginate biosynthesis regulatory protein AlgR, Bacillus subtilis sensory transduction protein LytT, and Escherichia coli transcriptional regulatory protein BtsR, which are members of two-component regulatory systems. LytR and LytT are components of regulatory systems that regulate genes involved in cell wall metabolism. AlgR positively regulates the algD gene, which codes for a GDP-mannose dehydrogenase, a key enzyme in the alginate biosynthesis pathway. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17532); members share this curated model.
