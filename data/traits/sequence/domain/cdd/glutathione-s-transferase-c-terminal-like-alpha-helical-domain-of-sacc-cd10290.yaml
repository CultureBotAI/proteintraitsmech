identifier: CDD:cd10290
label: "Glutathione S-transferase C-terminal-like, alpha helical domain of Saccharomycetales Methionyl-tRNA synthetase. Glutathione S-transferase (GST) C-terminal domain family, Saccharomycetales Methionyl-tRNA synthetase (MetRS) subfamily; This model characterizes the GST_C-like domain found in the N-terminal region of Saccharomycetales MetRS. Aminoacyl-tRNA synthetases (aaRSs) comprise a family of enzymes that catalyze the coupling of amino acids with their matching tRNAs. This involves the formation of an aminoacyl adenylate using ATP, followed by the transfer of the activated amino acid to the 3'-adenosine moiety of the tRNA. AaRSs may also be involved in translational and transcriptional regulation, as well as in tRNA processing. MetRS is a class I aaRS, containing a Rossman fold catalytic core. It recognizes the initiator tRNA as well as the Met-tRNA for protein chain elongation. The GST_C-like domain of MetRS from Saccharomycetales is involved in protein-protein interactions, to mediate the formation of the the MetRS-Arc1p-GluRS ternary complex which is considered an evolutionary intermediate between prokaryotic aaRS and the multi-aaRS complex found in higher eukaryotes. AaRSs from prokaryotes, which are active as dimers, do not contain this GST_C-like domain."
