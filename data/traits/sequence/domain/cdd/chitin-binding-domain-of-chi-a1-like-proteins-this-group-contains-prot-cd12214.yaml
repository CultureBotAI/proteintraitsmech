identifier: CDD:cd12214
label: "chitin-binding domain of Chi A1-like proteins. This group contains proteins related to the chitin binding domain of chitinase A1 (ChiA1) of Bacillus circulans WL-12. Glycosidase ChiA1 hydrolyzes chitin and is comprised of several domains: the C-terminal chitin binding domain, an N-terminal and catalytic domain, and 2 fibronectin type III-like domains. Chitinases function in invertebrates in the degradation of old exoskeletons, in fungi to utilize chitin in cell walls, and in bacteria which use chitin as an energy source. Bacillus circulans WL-12 ChiA1 facilitates invasion of fungal cell walls. The ChiAi chitin binding domain is required for the specific recognition of insoluble chitin. although topologically and structurally related, ChiA1 lacks the characteristic aromatic residues of Erwinia chrysanthemi endoglucanase Z (CBD(EGZ))."
definition: >-
  chitin-binding domain of Chi A1-like proteins. This group contains proteins related to the chitin binding domain of chitinase A1 (ChiA1) of Bacillus circulans WL-12. Glycosidase ChiA1 hydrolyzes chitin and is comprised of several domains: the C-terminal chitin binding domain, an N-terminal and catalytic domain, and 2 fibronectin type III-like domains. Chitinases function in invertebrates in the degradation of old exoskeletons, in fungi to utilize chitin in cell walls, and in bacteria which use chitin as an energy source. Bacillus circulans WL-12 ChiA1 facilitates invasion of fungal cell walls. The ChiAi chitin binding domain is required for the specific recognition of insoluble chitin. although topologically and structurally related, ChiA1 lacks the characteristic aromatic residues of Erwinia chrysanthemi endoglucanase Z (CBD(EGZ)). — an NCBI CDD conserved domain (cd12214); members share this curated model.
