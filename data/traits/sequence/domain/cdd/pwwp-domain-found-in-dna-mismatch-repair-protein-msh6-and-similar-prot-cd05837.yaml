identifier: CDD:cd05837
label: "PWWP domain found in DNA mismatch repair protein MSH6 and similar proteins. MSH6, also called G/T mismatch-binding protein (GTBP or GTMBP), MutS protein homolog 6, or MutS-alpha 160 kDa subunit (p160), is a mismatch repair protein homologous to bacterial MutS. It is a component of the post-replicative DNA mismatch repair system (MMR). It heterodimerizes with MSH2 to form MutS alpha, which binds to DNA mismatches thereby initiating DNA repair. When bound, MutS alpha bends the DNA helix and shields approximately 20 base pairs, and recognizes single base mismatches and dinucleotide insertion-deletion loops (IDL) in the DNA. After mismatch binding, it forms a ternary complex with the MutL alpha heterodimer, which is thought to be responsible for directing the downstream MMR events, including strand discrimination, excision, and resynthesis. Mutations in MSH6 have been linked to increased cancer susceptibility, particularly in hereditary nonpolyposis colorectal cancer in humans. MSH6 contains a PWWP domain, but its role in MSH6 remains unclear. MSH6 orthologs found in Saccharomyces cerevisiae, Caenorhabditis elegans, and Arabidopsis thaliana lack the PWWP domain. PWWP domains typically recognize DNA and histone methylated lysines."
definition: >-
  PWWP domain found in DNA mismatch repair protein MSH6 and similar proteins. MSH6, also called G/T mismatch-binding protein (GTBP or GTMBP), MutS protein homolog 6, or MutS-alpha 160 kDa subunit (p160), is a mismatch repair protein homologous to bacterial MutS. It is a component of the post-replicative DNA mismatch repair system (MMR). It heterodimerizes with MSH2 to form MutS alpha, which binds to DNA mismatches thereby initiating DNA repair. When bound, MutS alpha bends the DNA helix and shields approximately 20 base pairs, and recognizes single base mismatches and dinucleotide insertion-deletion loops (IDL) in the DNA. After mismatch binding, it forms a ternary complex with the MutL alpha heterodimer, which is thought to be responsible for directing the downstream MMR events, including strand discrimination, excision, and resynthesis. Mutations in MSH6 have been linked to increased cancer susceptibility, particularly in hereditary nonpolyposis colorectal cancer in humans. MSH6 contains a PWWP domain, but its role in MSH6 remains unclear. MSH6 orthologs found in Saccharomyces cerevisiae, Caenorhabditis elegans, and Arabidopsis thaliana lack the PWWP domain. PWWP domains typically recognize DNA and histone methylated lysines. — an NCBI CDD conserved domain (cd05837); members share this curated model.
