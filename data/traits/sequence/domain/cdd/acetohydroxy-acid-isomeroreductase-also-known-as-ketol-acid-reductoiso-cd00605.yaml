identifier: CDD:cd00605
label: "Acetohydroxy acid isomeroreductase (also known as ketol acid reductoisomerase) N-terminal domain: Enzyme in the biosynthetic pathway of the branched amino acids Ile, Leu, and Val, found only in plants and microorganisms. Enzyme is unique in that it catalyzes two reactions: an isomerization (alkyl migration), followed by an NADPH-dependent reduction. The N-terminal domain contains the NAPDH-binding site. A divalent metal ion is required for each reaction.  Enzyme has two substrates: 2-acetolactate, which is the precursor of Val or Leu, and 2-aceto-2-hydroxybutyrate, which is the precursor of Ile. Enzyme functions as a homodimer."
definition: >-
  Acetohydroxy acid isomeroreductase (also known as ketol acid reductoisomerase) N-terminal domain: Enzyme in the biosynthetic pathway of the branched amino acids Ile, Leu, and Val, found only in plants and microorganisms. Enzyme is unique in that it catalyzes two reactions: an isomerization (alkyl migration), followed by an NADPH-dependent reduction. The N-terminal domain contains the NAPDH-binding site. A divalent metal ion is required for each reaction. Enzyme has two substrates: 2-acetolactate, which is the precursor of Val or Leu, and 2-aceto-2-hydroxybutyrate, which is the precursor of Ile. Enzyme functions as a homodimer. — an NCBI CDD conserved domain (cd00605); members share this curated model.
