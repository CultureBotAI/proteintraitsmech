identifier: CDD:cd23988
label: "alpha-N-acetylneuraminide alpha-2,8-sialyltransferase 4. ST8Sia4 is a polysialyltransferase that can synthesize polysialic acid on neural cell adhesion molecules (NCAMs). ST8Sia4 catalyzes longer polysialicacid formation of NCAMs than ST8Sia2. ST8Sia family members are alpha-N-acetylneuraminide alpha-2,8-sialyltransferases that catalyze an alpha-2,8-linkage between sialic acid and the terminal sialic acid residues of glycochains, by transfering sialic acid from CMP-Sia and they belong to the glycosyltransferase family 29 (GT29)."
definition: >-
  alpha-N-acetylneuraminide alpha-2,8-sialyltransferase 4. ST8Sia4 is a polysialyltransferase that can synthesize polysialic acid on neural cell adhesion molecules (NCAMs). ST8Sia4 catalyzes longer polysialicacid formation of NCAMs than ST8Sia2. ST8Sia family members are alpha-N-acetylneuraminide alpha-2,8-sialyltransferases that catalyze an alpha-2,8-linkage between sialic acid and the terminal sialic acid residues of glycochains, by transfering sialic acid from CMP-Sia and they belong to the glycosyltransferase family 29 (GT29). — an NCBI CDD conserved domain (cd23988); members share this curated model.
