identifier: CDD:cd20747
label: nigritoxin_C
definition: >-
  C-termincal domain of domain of nigritoxin, a bacterial toxin for crustaceans and insects. This family contains the C-terminal domain of nigritoxin expressed in Vibrio nigripulchritudo, a bacterial pathogen affecting shrimp. Nigritoxin is lethal for organisms within the Tetraconata and non-toxin to other animals. It shows significant sequence identity with antifeeding prophage 18 (Afp18), a partially characterized toxin found in the entomopathogenic bacteria Serratia entomophila and in the fish pathogen Yersinia ruckeri, suggesting that nigritoxin may display toxicity against organisms beyond the known target, Litopenaeus stylirostris shrimp. Structure studies show that nigritoxin represents an entirely unique protein fold, indicating that Afp18 and nigritoxin do not possess the same biological functions. Nigritoxin is comprised of three domains: N-terminal, C-terminal and central domains. This C-terminal domain contains two unique structural features: two large loops, each composed of two antiparallel strands that project out of the globular surface like "rabbit ears", and the larger beta-sheet concave side contains a large and positively charged patch at the protein surface that has yet to be characterized. The C-terminal domain may be involved in cell death induction through apoptotic mechanisms
