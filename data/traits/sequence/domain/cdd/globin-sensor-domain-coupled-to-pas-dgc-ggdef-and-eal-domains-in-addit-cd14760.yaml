identifier: CDD:cd14760
label: "Globin sensor domain; coupled to PAS, DGC/GGDEF and EAL domains. In addition to the N-terminal sensing domain, globin-coupled-sensors in this bacterial subfamily have a signal-sensing PAS domain, and diguanylate cyclase (DGC/GGDEF) and EAL domains. The latter two domains are involved in the synthesis and degradation of c-di-GMP, respectively, and may be involved in regulating cell surface adhesiveness, and in the transition between planktonic and biofilm growth modes."
definition: >-
  Globin sensor domain; coupled to PAS, DGC/GGDEF and EAL domains. In addition to the N-terminal sensing domain, globin-coupled-sensors in this bacterial subfamily have a signal-sensing PAS domain, and diguanylate cyclase (DGC/GGDEF) and EAL domains. The latter two domains are involved in the synthesis and degradation of c-di-GMP, respectively, and may be involved in regulating cell surface adhesiveness, and in the transition between planktonic and biofilm growth modes. — an NCBI CDD conserved domain (cd14760); members share this curated model.
