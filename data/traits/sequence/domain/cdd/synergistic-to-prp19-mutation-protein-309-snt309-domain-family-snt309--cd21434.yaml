identifier: CDD:cd21434
label: "synergistic to PRP19 mutation protein 309 (SNT309) domain family. SNT309, also called pre-mRNA-splicing factor SNT309, or PRP19-associated complex protein 25 (NTC25), is involved in pre-mRNA splicing by stabilizing the NTC (or PRP19-associated complex). As a component of the NTC complex, it associates to the spliceosome to mediate conformational rearrangement or to stabilize the structure of the spliceosome after U4 snRNA dissociation, which leads to spliceosome maturation."
definition: >-
  synergistic to PRP19 mutation protein 309 (SNT309) domain family. SNT309, also called pre-mRNA-splicing factor SNT309, or PRP19-associated complex protein 25 (NTC25), is involved in pre-mRNA splicing by stabilizing the NTC (or PRP19-associated complex). As a component of the NTC complex, it associates to the spliceosome to mediate conformational rearrangement or to stabilize the structure of the spliceosome after U4 snRNA dissociation, which leads to spliceosome maturation. — an NCBI CDD conserved domain (cd21434); members share this curated model.
