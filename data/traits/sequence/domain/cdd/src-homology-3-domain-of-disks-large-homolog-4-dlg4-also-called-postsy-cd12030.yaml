identifier: CDD:cd12030
label: "Src Homology 3 domain of Disks Large homolog 4. DLG4, also called postsynaptic density-95 (PSD95) or synapse-associated protein 90 (SAP90), is a scaffolding protein that clusters at synapses and plays an important role in synaptic development and plasticity. It is responsible for the membrane clustering and retention of many transporters and receptors such as potassium channels and PMCA4b, a P-type ion transport ATPase, among others. DLG4 is a member of the MAGUK (membrane-associated guanylate kinase) protein family, which is characterized by the presence of a core of three domains: PDZ, SH3, and guanylate kinase (GuK). The GuK domain in MAGUK proteins is enzymatically inactive; instead, the domain mediates protein-protein interactions and associates intramolecularly with the SH3 domain. DLG4 contains three PDZ domains. The SH3 domain of DLG4 binds and clusters the kainate subgroup of glutamate receptors via two proline-rich sequences in their C-terminal tail. It also binds AKAP79/150 (A-kinase anchoring protein). SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Disks Large homolog 4. DLG4, also called postsynaptic density-95 (PSD95) or synapse-associated protein 90 (SAP90), is a scaffolding protein that clusters at synapses and plays an important role in synaptic development and plasticity. It is responsible for the membrane clustering and retention of many transporters and receptors such as potassium channels and PMCA4b, a P-type ion transport ATPase, among others. DLG4 is a member of the MAGUK (membrane-associated guanylate kinase) protein family, which is characterized by the presence of a core of three domains: PDZ, SH3, and guanylate kinase (GuK). The GuK domain in MAGUK proteins is enzymatically inactive; instead, the domain mediates protein-protein interactions and associates intramolecularly with the SH3 domain. DLG4 contains three PDZ domains. The SH3 domain of DLG4 binds and clusters the kainate subgroup of glutamate receptors via two proline-rich sequences in their C-terminal tail. It also binds AKAP79/150 (A-kinase anchoring protein). SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12030); members share this curated model.
