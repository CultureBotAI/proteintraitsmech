identifier: CDD:cd17910
label: "chemotaxis protein CheC, Class II. This family contains class II CheC proteins found in proteobacteria, which diverge from class I CheCs in sequence conservation and lack critical well-conserved residues for CheD binding. These proteins are likely to be dedicated phosphatases. The class II cheC genes are not found in chemotaxis operons, but in operons containing more archetypical two-component signaling components, non-signaling operons, or as orphans. Thus, class II CheCs appear to be involved in non-chemotactic two component systems. Class II CheCs lack the first of the two phosphatase active sites of class I CheCs, and retain the second active site of class I CheCs."
definition: >-
  chemotaxis protein CheC, Class II. This family contains class II CheC proteins found in proteobacteria, which diverge from class I CheCs in sequence conservation and lack critical well-conserved residues for CheD binding. These proteins are likely to be dedicated phosphatases. The class II cheC genes are not found in chemotaxis operons, but in operons containing more archetypical two-component signaling components, non-signaling operons, or as orphans. Thus, class II CheCs appear to be involved in non-chemotactic two component systems. Class II CheCs lack the first of the two phosphatase active sites of class I CheCs, and retain the second active site of class I CheCs. — an NCBI CDD conserved domain (cd17910); members share this curated model.
