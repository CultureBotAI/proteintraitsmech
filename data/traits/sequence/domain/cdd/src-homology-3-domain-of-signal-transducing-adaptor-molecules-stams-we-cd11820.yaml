identifier: CDD:cd11820
label: "Src homology 3 domain of Signal Transducing Adaptor Molecules. STAMs were discovered as proteins that are highly phosphorylated following cytokine and growth factor stimulation. They function in cytokine signaling and surface receptor degradation, as well as regulate Golgi morphology. They associate with many proteins including Jak2 and Jak3 tyrosine kinases, Hrs, AMSH, and UBPY. STAM adaptor proteins contain VHS (Vps27, Hrs, STAM homology), ubiquitin interacting (UIM), and SH3 domains. There are two vertebrate STAMs, STAM1 and STAM2, which may be functionally redundant; vertebrate STAMs contain ITAM motifs. They are part of the endosomal sorting complex required for transport (ESCRT-0). STAM2 deficiency in mice did not cause any obvious abnormality, while STAM1 deficiency resulted in growth retardation. Loss of both STAM1 and STAM2 in mice proved lethal, indicating that STAMs are important for embryonic development. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of Signal Transducing Adaptor Molecules. STAMs were discovered as proteins that are highly phosphorylated following cytokine and growth factor stimulation. They function in cytokine signaling and surface receptor degradation, as well as regulate Golgi morphology. They associate with many proteins including Jak2 and Jak3 tyrosine kinases, Hrs, AMSH, and UBPY. STAM adaptor proteins contain VHS (Vps27, Hrs, STAM homology), ubiquitin interacting (UIM), and SH3 domains. There are two vertebrate STAMs, STAM1 and STAM2, which may be functionally redundant; vertebrate STAMs contain ITAM motifs. They are part of the endosomal sorting complex required for transport (ESCRT-0). STAM2 deficiency in mice did not cause any obvious abnormality, while STAM1 deficiency resulted in growth retardation. Loss of both STAM1 and STAM2 in mice proved lethal, indicating that STAMs are important for embryonic development. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11820); members share this curated model.
