identifier: CDD:cd11686
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-fold modifier-conjugating enzyme 1 (UFC1) and related proteins. UFC1, also known as Ufm1-conjugating enzyme 1, participates in a ubiquitin-like (UBL) post translation modification enzymatic cascade known as UFMylation, that allows modification by a UBL-type modifier named ubiquitin-fold modifier (UFM1). UBLs are covalently attached to the target proteins or phospholipids through reaction cascades in a manner similar to the ubiquitination pathway. The UFMylation cascade consists of the ubiquitin-like modifier-activating enzyme (UBA5, an E1-like enzyme), UFM1-conjugating enzyme 1 (UFC1, an E2-like enzyme), and the UFM1-specific ligase (UFL1, an E3-like enzyme). UFM1 is synthesized in a precursor form which is then cleaved at the C-terminus to expose a Gly residue. The mature UFM1 is then activated by UBA5, then transferred to UFC1, and finally UFM1 is covalently conjugated with the target protein via UFL1."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-fold modifier-conjugating enzyme 1 (UFC1) and related proteins. UFC1, also known as Ufm1-conjugating enzyme 1, participates in a ubiquitin-like (UBL) post translation modification enzymatic cascade known as UFMylation, that allows modification by a UBL-type modifier named ubiquitin-fold modifier (UFM1). UBLs are covalently attached to the target proteins or phospholipids through reaction cascades in a manner similar to the ubiquitination pathway. The UFMylation cascade consists of the ubiquitin-like modifier-activating enzyme (UBA5, an E1-like enzyme), UFM1-conjugating enzyme 1 (UFC1, an E2-like enzyme), and the UFM1-specific ligase (UFL1, an E3-like enzyme). UFM1 is synthesized in a precursor form which is then cleaved at the C-terminus to expose a Gly residue. The mature UFM1 is then activated by UBA5, then transferred to UFC1, and finally UFM1 is covalently conjugated with the target protein via UFL1. — an NCBI CDD conserved domain (cd11686); members share this curated model.
