identifier: CDD:cd12068
label: "Src Homology 3 domain of Myosin XVb. Myosin XVb, also called KIAA1783, was named based on its similarity with myosin XVa. It is a transcribed and unprocessed pseudogene whose predicted amino acid sequence contains mutated or deleted amino acid residues that are normally conserved and important for myosin function. The related myosin XVa is important for normal growth of mechanosensory stereocilia of inner ear hair cells. Myosin XVa contains a unique N-terminal extension followed by a motor domain, light chain-binding IQ motifs, and a tail consisting of a pair of MyTH4-FERM tandems separated by a SH3 domain, and a PDZ domain. SH3 domains bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs; they play a role in the regulation of enzymes by intramolecular interactions, changing the subcellular localization of signal pathway components and mediate multiprotein complex assemblies."
