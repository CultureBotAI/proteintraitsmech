identifier: CDD:cd14225
label: "Catalytic domain of the protein kinase, Dual-specificity tYrosine-phosphorylated and -Regulated Kinase 4. Dual-specificity PKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine (S/T) as well as tyrosine residues on protein substrates. DYRK4 is a testis-specific kinase with restricted expression to postmeiotic spermatids. It may function during spermiogenesis, however, it is not required for male fertility. DYRK4 has also been detected in a human teratocarcinoma cell line induced to produce postmitotic neurons. It may have a role in neuronal differentiation. DYRKs autophosphorylate themselves on tyrosine residues and phosphorylate their substrates exclusively on S/T residues. They play important roles in cell proliferation, differentiation, survival, and development. The DYRK4 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the protein kinase, Dual-specificity tYrosine-phosphorylated and -Regulated Kinase 4. Dual-specificity PKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine (S/T) as well as tyrosine residues on protein substrates. DYRK4 is a testis-specific kinase with restricted expression to postmeiotic spermatids. It may function during spermiogenesis, however, it is not required for male fertility. DYRK4 has also been detected in a human teratocarcinoma cell line induced to produce postmitotic neurons. It may have a role in neuronal differentiation. DYRKs autophosphorylate themselves on tyrosine residues and phosphorylate their substrates exclusively on S/T residues. They play important roles in cell proliferation, differentiation, survival, and development. The DYRK4 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14225); members share this curated model.
