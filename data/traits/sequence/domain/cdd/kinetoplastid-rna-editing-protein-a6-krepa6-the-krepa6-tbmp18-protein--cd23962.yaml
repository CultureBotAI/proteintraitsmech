identifier: CDD:cd23962
label: "Kinetoplastid RNA Editing Protein A6 (KREPA6). The KREPA6 (TbMP18) protein is a component of the KREPA RNA editing catalytic complex (RECC) in parasitic protozoans. Kinetoplastid RNA editing (KRE) proteins occur as pairs or sets of related proteins in multiple complexes. KREPA complex is composed of six components (KREPA1-6), which share a conserved C-terminal region containing an oligonucleotide-binding (OB)-fold-like domain. KREPA6 is the smallest of six editosome proteins that have OB-folds. Inactivation of KREPA6 expression results in disruption and ultimate loss of 20S editosomes and inhibition of procyclic form cell growth. KREPA6 is essential for the structural integrity and presence of 20S editosomes and for cell viability."
definition: >-
  Kinetoplastid RNA Editing Protein A6 (KREPA6). The KREPA6 (TbMP18) protein is a component of the KREPA RNA editing catalytic complex (RECC) in parasitic protozoans. Kinetoplastid RNA editing (KRE) proteins occur as pairs or sets of related proteins in multiple complexes. KREPA complex is composed of six components (KREPA1-6), which share a conserved C-terminal region containing an oligonucleotide-binding (OB)-fold-like domain. KREPA6 is the smallest of six editosome proteins that have OB-folds. Inactivation of KREPA6 expression results in disruption and ultimate loss of 20S editosomes and inhibition of procyclic form cell growth. KREPA6 is essential for the structural integrity and presence of 20S editosomes and for cell viability. — an NCBI CDD conserved domain (cd23962); members share this curated model.
