identifier: CDD:cd22622
label: "Kunitz-type domain 2 (KD2) of hepatocyte growth factor activator inhibitor type 2 (HAI-2), and similar proteins. This model includes Kunitz domain 2 (KD2) of hepatocyte growth factor activator inhibitor type 2 (HAI-2 or HAI2, also known as placental bikunin or Kunitz-type protease inhibitor 2). HAI-2 is composed of two Kunitz domains that strongly inhibit many serine proteases with sub-nanomolar affinities. It has been found to be a natural tumor suppressor in renal cell carcinoma, breast cancer and prostate cancer, the loss of which leads to tumor growth and progression attributable at least in part to increased MET signaling. HAI-2 is a specific substrate of mesotrypsin which is up-regulated with progression in prostate cancers and shown to contribute to invasion and metastasis; these activities of mesotrypsin may in part be mediated through cleavage and inactivation of HAI-2, resulting in increases in hetatocyte growth factor/scatter factor (HGF/SF) activation and MET signaling. HAI-2 is a physiological inhibitor of hepsin and matriptase, two type II transmembrane serine proteases that, like HGF activator, can convert latent pro-HGF/SF into the two-chain active signaling heterodimer. KD2 is similar to KD1, whose structure is similar to those of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  Kunitz-type domain 2 (KD2) of hepatocyte growth factor activator inhibitor type 2 (HAI-2), and similar proteins. This model includes Kunitz domain 2 (KD2) of hepatocyte growth factor activator inhibitor type 2 (HAI-2 or HAI2, also known as placental bikunin or Kunitz-type protease inhibitor 2). HAI-2 is composed of two Kunitz domains that strongly inhibit many serine proteases with sub-nanomolar affinities. It has been found to be a natural tumor suppressor in renal cell carcinoma, breast cancer and prostate cancer, the loss of which leads to tumor growth and progression attributable at least in part to increased MET signaling. HAI-2 is a specific substrate of mesotrypsin which is up-regulated with progression in prostate cancers and shown to contribute to invasion and metastasis; these activities of mesotrypsin may in part be mediated through cleavage and inactivation of HAI-2, resulting in increases in hetatocyte growth factor/scatter factor (HGF/SF) activation and MET signaling. HAI-2 is a physiological inhibitor of hepsin and matriptase, two type II transmembrane serine proteases that, like HGF activator, can convert latent pro-HGF/SF into the two-chain active signaling heterodimer. KD2 is similar to KD1, whose structure is similar to those of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22622); members share this curated model.
