identifier: CDD:cd11651
label: "Fungal protein kinase domain similar to the N-terminus of YPK1. This fungal domain family includes the N-terminal region of the Saccharomyces cerevisiae AGC kinases YPK1 and YPK2, which were found to be essential for the proliferation of yeast. YPK1 is required for cell growth and acts as a downstream kinase in the sphingolipid-mediated signaling pathway of yeast. It also plays a role in efficient endocytosis and in the maintenance of cell wall integrity."
definition: >-
  Fungal protein kinase domain similar to the N-terminus of YPK1. This fungal domain family includes the N-terminal region of the Saccharomyces cerevisiae AGC kinases YPK1 and YPK2, which were found to be essential for the proliferation of yeast. YPK1 is required for cell growth and acts as a downstream kinase in the sphingolipid-mediated signaling pathway of yeast. It also plays a role in efficient endocytosis and in the maintenance of cell wall integrity. — an NCBI CDD conserved domain (cd11651); members share this curated model.
