identifier: CDD:cd12137
label: "Globin_X (GbX). Zebrafish globin X (GbX) is expressed at low levels in neurons of the central nervous system, and appears to be associated with the sensory system. GbX is likely to be attached to the cell membrane via S-palmitoylation and N-myristoylation. It's unlikely to have a true respiratory function as it is membrane-associated. It has been suggested that it may protect the lipids in the cell membrane from oxidation or act as a redox-sensing or signaling protein. Zebrafish GbX is hexacoordinate, and displays cooperative O2 binding."
definition: >-
  Globin_X (GbX). Zebrafish globin X (GbX) is expressed at low levels in neurons of the central nervous system, and appears to be associated with the sensory system. GbX is likely to be attached to the cell membrane via S-palmitoylation and N-myristoylation. It's unlikely to have a true respiratory function as it is membrane-associated. It has been suggested that it may protect the lipids in the cell membrane from oxidation or act as a redox-sensing or signaling protein. Zebrafish GbX is hexacoordinate, and displays cooperative O2 binding. — an NCBI CDD conserved domain (cd12137); members share this curated model.
