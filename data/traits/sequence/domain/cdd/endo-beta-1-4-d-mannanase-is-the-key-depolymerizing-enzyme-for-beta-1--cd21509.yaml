label: "Endo-beta-1,4-D-mannanase is the key depolymerizing enzyme for beta-1,4-mannan polymers present in plants, plant seeds, and some algae. It belongs to the glycoside hydrolase (GH) family 5 enzymes. Beta-mannanases are one of the three major enzymes degrading mannan, the the main component of hemicellulose."
definition: >-
