identifier: CDD:cd22808
label: "N-terminal SNARE complex binding domain found in complexins I and II. Complexins (CPXs, also called synaphins) are small, cytosolic proteins that bind to the soluble N-ethylmaleimide-sensitive factor attachment protein receptor (SNARE) complex to regulate synaptic vesicle exocytosis. Complexins I and II, also called synaphin-2 and synaphin-1, respectively, are highly homologous hydrophilic proteins that are enriched in neurons where they colocalize with syntaxin and SNAP25. They regulate the sequential interactions of alpha-SNAP and synaptotagmins with the SNAP receptor during exocytosis. They preferentially bind to syntaxin within the SNARE core complex containing SNAP25, VAMP2 and STX1A. This model corresponds to the N-terminal SNARE complex binding domain of complexins I and II."
definition: >-
