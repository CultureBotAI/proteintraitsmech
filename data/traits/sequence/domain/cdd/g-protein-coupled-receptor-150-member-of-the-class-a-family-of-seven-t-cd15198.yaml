identifier: CDD:cd15198
label: "G protein-coupled receptor 150, member of the class A family of seven-transmembrane G protein-coupled receptors. GPR150 is an orphan receptor closely related to the oxytocin and vasopressin receptors. Its endogenous ligand is not known. These receptors share a significant amino acid sequence similarity, suggesting that they have a common evolutionary origin."
definition: >-
  G protein-coupled receptor 150, member of the class A family of seven-transmembrane G protein-coupled receptors. GPR150 is an orphan receptor closely related to the oxytocin and vasopressin receptors. Its endogenous ligand is not known. These receptors share a significant amino acid sequence similarity, suggesting that they have a common evolutionary origin. — an NCBI CDD conserved domain (cd15198); members share this curated model.
