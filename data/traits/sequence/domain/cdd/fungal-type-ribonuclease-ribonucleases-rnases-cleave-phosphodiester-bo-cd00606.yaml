identifier: CDD:cd00606
label: fungal_RNase
definition: >-
  fungal type ribonuclease. Ribonucleases (RNAses) cleave phosphodiester bonds in RNA and are essential for both non-specific RNA degradation and for numerous forms of RNA processing. The members of this CD belong to the superfamily of microbial ribonucleases which are predominantly guanyl specific nucleases. Guanyl specific RNAses are endonucleases which split RNA phosphodiester bonds at the 3' oxygen end of guanosine residues to yield oligonucleotides with the guanosine-2',3'-cyclophosphate at the 3' end and the hydroxyl group at the 5' end. The terminal guanosine-2,3'-cyclophosphate is hydrolysed by guanyl RNAses to give guanosine-3'-phosphate. The alignment also contains ribotoxins, a fungal group of cytotoxins, specifically cleaving the sarcin/ricin loop (SRL) structure of the 23-28S rRNA and therefore being very potent inhibitors of protein synthesis
