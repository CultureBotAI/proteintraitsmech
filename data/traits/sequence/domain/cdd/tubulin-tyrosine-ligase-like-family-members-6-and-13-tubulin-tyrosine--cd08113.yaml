identifier: CDD:cd08113
label: "Tubulin tyrosine ligase-like family, members 6 and 13. Tubulin tyrosine ligase-like family, member 6 and 13 (TTLL6, TTLL13) are members of Tubulin-tyrosine ligase (TTL, EC 6.3.2.25) family. TTL catalyses the posttranslational addition of a tyrosine to the carboxy-terminal end of detyrosinated alpha-tubulin in the presense of ATP. TTL requires K and Mg ions for catalysis and uses detyrosinated alpha-tubulin as a substrate. It plays a key role in microtubules assembly. Based on the sequence and functional similarities with glutathione synthetase (GSHase), biotin carboxylase (BC), D-ala D-ala ligase (DD-ligase), and succinyl-CoA synthetase (SCS) families it is concluded that TTL belongs to ATP-grasp superfamily. Human tubulin tyrosine ligase-like 6 gene (TTLL6) maps to chromosome region 17q21.32 whereas TTLL13 maps to chromosome region 15q26.1. TTLL6 is predominantly expressed in testis and low expression was detected in stomach and brain. It is involved in cell apoptosis and may also play a role in it may play a role in sexual organ differentiation, seasonal reproduction, spermatogenesis, and male fertility."
