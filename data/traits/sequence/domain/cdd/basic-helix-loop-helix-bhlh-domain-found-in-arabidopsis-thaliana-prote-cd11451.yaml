identifier: CDD:cd11451
label: "basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana protein transparent testa 8 (TT8) and similar proteins. The family includes several bHLH transcription factors from Arabidopsis thaliana, such as TT8, EGL1, and GL3. TT8, also termed AtbHLH42, or EN 32, is involved in the control of flavonoid pigmentation and plays a key role in regulating leucoanthocyanidin reductase (BANYULS) and dihydroflavonol-4-reductase (DFR). EGL1, also termed AtbHLH2, or EN 30, or AtMYC146, or protein enhancer of GLABRA 3, is involved in epidermal cell fate specification and regulates negatively stomata formation but promotes trichome formation. GL3, also termed AtbHLH1, or AtMYC6, or protein shapeshifter, or EN 31, is involved in epidermal cell fate specification. It regulates negatively stomata formation, but, in association with TTG1 and MYB0/GL1, promotes trichome formation, branching and endoreplication."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana protein transparent testa 8 (TT8) and similar proteins. The family includes several bHLH transcription factors from Arabidopsis thaliana, such as TT8, EGL1, and GL3. TT8, also termed AtbHLH42, or EN 32, is involved in the control of flavonoid pigmentation and plays a key role in regulating leucoanthocyanidin reductase (BANYULS) and dihydroflavonol-4-reductase (DFR). EGL1, also termed AtbHLH2, or EN 30, or AtMYC146, or protein enhancer of GLABRA 3, is involved in epidermal cell fate specification and regulates negatively stomata formation but promotes trichome formation. GL3, also termed AtbHLH1, or AtMYC6, or protein shapeshifter, or EN 31, is involved in epidermal cell fate specification. It regulates negatively stomata formation, but, in association with TTG1 and MYB0/GL1, promotes trichome formation, branching and endoreplication. — an NCBI CDD conserved domain (cd11451); members share this curated model.
