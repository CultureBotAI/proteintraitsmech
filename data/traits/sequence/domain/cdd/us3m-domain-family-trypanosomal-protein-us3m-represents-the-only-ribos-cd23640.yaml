label: "uS3m domain family. Trypanosomal protein uS3m represents the only ribosomal protein encoded by the mitochondrial DNA. It is rich in hydrophobic amino acids and may serve as a hydrophobic core in the protein shell. uS3m is a component of Trypanosoma mitoribosome small subunits (SSUs)."
definition: >-
  uS3m domain family. Trypanosomal protein uS3m represents the only ribosomal protein encoded by the mitochondrial DNA. It is rich in hydrophobic amino acids and may serve as a hydrophobic core in the protein shell. uS3m is a component of Trypanosoma mitoribosome small subunits (SSUs). — an NCBI CDD conserved domain (cd23640); members share this curated model.
