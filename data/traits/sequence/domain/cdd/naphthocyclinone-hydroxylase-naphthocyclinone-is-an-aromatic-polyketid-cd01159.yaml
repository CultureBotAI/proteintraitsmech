identifier: CDD:cd01159
label: "Naphthocyclinone hydroxylase. Naphthocyclinone is an aromatic polyketide and an antibiotic, which is active against Gram-positive bacteria.  Polyketides are secondary metabolites, which have important biological functions such as antitumor, immunosupressive or antibiotic activities. NcnH is a hydroxylase involved in the biosynthesis of naphthocyclinone and possibly other polyketides."
definition: >-
