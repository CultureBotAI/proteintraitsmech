identifier: CDD:cd09586
label: "SAM domain of USH1G. SAM (sterile alpha motif) domain of USH1G (Usher syndrome type-1G protein) proteins (also known as SANS) is a putative protein-protein interaction domain. Members of this group have an N-terminal ankyrin repeat region and C-terminal SAM domain. USH1G is expressed in the hair bundles of the inner ear sensory cells. It can form a functional network with USH1B (myosin VIIa), USH1C (harmonin b), USH1F (protocadherin-related 15), and USH1D (cadherin 23). The SAM domain of the USH1G protein is involved in synergetic interactions with the PDZ domain of harmonin. Such interactions contribute to the stability of harmonin. The network is required for the correct cohesion of the hair bundle. Mutations in the ush1g gene lead to Usher syndrome type 1G. This syndrome is the cause of deaf-blindness in humans."
definition: >-
  SAM domain of USH1G. SAM (sterile alpha motif) domain of USH1G (Usher syndrome type-1G protein) proteins (also known as SANS) is a putative protein-protein interaction domain. Members of this group have an N-terminal ankyrin repeat region and C-terminal SAM domain. USH1G is expressed in the hair bundles of the inner ear sensory cells. It can form a functional network with USH1B (myosin VIIa), USH1C (harmonin b), USH1F (protocadherin-related 15), and USH1D (cadherin 23). The SAM domain of the USH1G protein is involved in synergetic interactions with the PDZ domain of harmonin. Such interactions contribute to the stability of harmonin. The network is required for the correct cohesion of the hair bundle. Mutations in the ush1g gene lead to Usher syndrome type 1G. This syndrome is the cause of deaf-blindness in humans. — an NCBI CDD conserved domain (cd09586); members share this curated model.
