identifier: CDD:cd00485
label: YrdC
definition: >-
  YrdC-type RNA-binding domain. This domain has been shown to preferentially bind to dsRNA and is implicated in translational regulation. The three subfamilies are: YrdC/YciO, SUA5, HypF. HypF is an accessory protein that plays a regulatory role in hydrogenase maturation. SUA5 has been identified as a suppressor of a translation initiation defect. It plays a regulatory role, but its exact function remains unclear. The YrdC protein is known to exist as a monomer
