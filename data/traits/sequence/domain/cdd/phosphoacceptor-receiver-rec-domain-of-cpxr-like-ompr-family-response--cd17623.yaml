identifier: CDD:cd17623
label: "phosphoacceptor receiver (REC) domain of CpxR-like OmpR family response regulators. CpxR is part of the CpxA/CpxR two-component regulatory system that mediates envelope stress responses that is key for virulence and antibiotic resistance in several Gram negative pathogens. CpxR is a transcription factor/response regulator that controls the expression of numerous genes, including those of the classical porins OmpF and OmpC. It belongs to the OmpR family of DNA-binding response regulators that contain N-terminal receiver (REC) and C-terminal DNA-binding winged helix-turn-helix effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
