identifier: CDD:cd18937
label: "basic helix-loop-helix (bHLH) domain found in myogenic factor 5 (Myf-5) and similar proteins. Myf-5, also termed Class C basic helix-loop-helix protein 2 (bHLHc2), is a nuclear bHLH transcriptional activator that promotes transcription of muscle-specific target genes and plays a role in muscle specification and differentiation. It also acts as an RNA-binding protein which enhances Ccnd1/Cyclin D1 mRNA translation during myogenesis."
definition: >-
  basic helix-loop-helix (bHLH) domain found in myogenic factor 5 (Myf-5) and similar proteins. Myf-5, also termed Class C basic helix-loop-helix protein 2 (bHLHc2), is a nuclear bHLH transcriptional activator that promotes transcription of muscle-specific target genes and plays a role in muscle specification and differentiation. It also acts as an RNA-binding protein which enhances Ccnd1/Cyclin D1 mRNA translation during myogenesis. — an NCBI CDD conserved domain (cd18937); members share this curated model.
