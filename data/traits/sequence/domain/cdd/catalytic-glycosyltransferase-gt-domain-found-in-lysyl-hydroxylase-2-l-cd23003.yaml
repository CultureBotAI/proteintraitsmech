identifier: CDD:cd23003
label: "catalytic glycosyltransferase (GT) domain found in lysyl hydroxylase 2 (LH2) and similar proteins. Lysyl hydroxylase 2 (LH2; EC 1.14.11.4), also called procollagen-lysine,2-oxoglutarate 5-dioxygenase 2 (PLOD2), forms hydroxylysine residues in -Xaa-Lys-Gly- sequences in collagens. These hydroxylysines serve as sites of attachment for carbohydrate units and are essential for the stability of the intermolecular collagen cross-links. The model corresponds to the N-terminal conserved domain of LH2, which shows high sequence similarity with catalytic glycosyltransferase (GT) domain of LH3."
definition: >-
  catalytic glycosyltransferase (GT) domain found in lysyl hydroxylase 2 (LH2) and similar proteins. Lysyl hydroxylase 2 (LH2; EC 1.14.11.4), also called procollagen-lysine,2-oxoglutarate 5-dioxygenase 2 (PLOD2), forms hydroxylysine residues in -Xaa-Lys-Gly- sequences in collagens. These hydroxylysines serve as sites of attachment for carbohydrate units and are essential for the stability of the intermolecular collagen cross-links. The model corresponds to the N-terminal conserved domain of LH2, which shows high sequence similarity with catalytic glycosyltransferase (GT) domain of LH3. — an NCBI CDD conserved domain (cd23003); members share this curated model.
