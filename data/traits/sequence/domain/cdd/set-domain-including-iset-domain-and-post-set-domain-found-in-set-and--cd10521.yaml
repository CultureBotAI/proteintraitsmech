identifier: CDD:cd10521
label: "SET domain (including iSET domain and post-SET domain) found in SET and MYND domain-containing protein 5 (SMYD5) and similar proteins. SMYD5 (also termed protein NN8-4AG, or retinoic acid-induced protein 15) functions as histone lysine methyltransferase that mediates H4K20me3 at heterochromatin regions. It plays an important role in chromosome integrity by regulating heterochromatin and repressing endogenous repetitive DNA elements during differentiation. In zebrafish embryogenesis, it plays pivotal roles in both primitive and definitive hematopoiesis."
definition: >-
  SET domain (including iSET domain and post-SET domain) found in SET and MYND domain-containing protein 5 (SMYD5) and similar proteins. SMYD5 (also termed protein NN8-4AG, or retinoic acid-induced protein 15) functions as histone lysine methyltransferase that mediates H4K20me3 at heterochromatin regions. It plays an important role in chromosome integrity by regulating heterochromatin and repressing endogenous repetitive DNA elements during differentiation. In zebrafish embryogenesis, it plays pivotal roles in both primitive and definitive hematopoiesis. — an NCBI CDD conserved domain (cd10521); members share this curated model.
