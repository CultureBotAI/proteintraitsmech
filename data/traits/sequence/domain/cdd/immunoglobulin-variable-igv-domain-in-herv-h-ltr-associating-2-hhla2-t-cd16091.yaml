identifier: CDD:cd16091
label: "Immunoglobulin Variable (IgV) domain in HERV-H LTR-associating 2 (HHLA2). The members here are composed of the immunoglobulin variable (IgV) region in HERV-H LTR-associating 2 (HHLA2; also known as B7-H7/B7 homolog 7). HHLA2 is a member of the B7 family of immune regulatory proteins. Mature human HHLA2 consists of an extracellular domain (ECD) with three immunoglobulin-like domains, a transmembrane segment, and a cytoplasmic domain. HHLA2 is widely expressed in human cancers including non-small cell lung carcinoma (NSCLS), triple negative breast cancer (TNBC), and melanoma, but has limited expression on normal tissues. Interestingly, unlike other members of B7 family, HHLA2 is not expressed in mice or rats. HHLA2 functions as a T cell coinhibitory molecules as it inhibits the proliferation of activated CD4(+) and CD8(+) T cells and their cytokine production. Furthermore, HHLA2 is constitutively expressed on the surface of human monocytes and is induced on B cells after stimulation, however it is not inducible on T cells."
definition: >-
  Immunoglobulin Variable (IgV) domain in HERV-H LTR-associating 2 (HHLA2). The members here are composed of the immunoglobulin variable (IgV) region in HERV-H LTR-associating 2 (HHLA2; also known as B7-H7/B7 homolog 7). HHLA2 is a member of the B7 family of immune regulatory proteins. Mature human HHLA2 consists of an extracellular domain (ECD) with three immunoglobulin-like domains, a transmembrane segment, and a cytoplasmic domain. HHLA2 is widely expressed in human cancers including non-small cell lung carcinoma (NSCLS), triple negative breast cancer (TNBC), and melanoma, but has limited expression on normal tissues. Interestingly, unlike other members of B7 family, HHLA2 is not expressed in mice or rats. HHLA2 functions as a T cell coinhibitory molecules as it inhibits the proliferation of activated CD4(+) and CD8(+) T cells and their cytokine production. Furthermore, HHLA2 is constitutively expressed on the surface of human monocytes and is induced on B cells after stimulation, however it is not inducible on T cells. — an NCBI CDD conserved domain (cd16091); members share this curated model.
