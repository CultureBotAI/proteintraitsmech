identifier: CDD:cd21064
label: "NURR (N-terminal unit for RNA recognition) domain found in heterogeneous nuclear ribonucleoproteins hnRNPQ, hnRNPR and similar proteins. The family includes hnRNPQ and hnRNPR. hnRNPQ, also termed glycine- and tyrosine-rich RNA-binding protein (GRY-RBP), or NS1-associated protein 1 (NSAP1), or Synaptotagmin-binding, cytoplasmic RNA-interacting protein (SYNCRIP), is a highly conserved RNA-binding protein that mediates the exosomal partition of a set of miRNAs. It acts as a component of the hepatocyte exosomal miRNA sorting machinery. hnRNPR is a highly conserved RNA-binding protein that belongs to the heterogeneous nuclear ribonucleoprotein (hnRNP) family. hnRNP plays an important role in processing of precursor mRNA in the nucleus. hnRNPR acts as a general positive regulator of MHC class I expression."
definition: >-
  NURR (N-terminal unit for RNA recognition) domain found in heterogeneous nuclear ribonucleoproteins hnRNPQ, hnRNPR and similar proteins. The family includes hnRNPQ and hnRNPR. hnRNPQ, also termed glycine- and tyrosine-rich RNA-binding protein (GRY-RBP), or NS1-associated protein 1 (NSAP1), or Synaptotagmin-binding, cytoplasmic RNA-interacting protein (SYNCRIP), is a highly conserved RNA-binding protein that mediates the exosomal partition of a set of miRNAs. It acts as a component of the hepatocyte exosomal miRNA sorting machinery. hnRNPR is a highly conserved RNA-binding protein that belongs to the heterogeneous nuclear ribonucleoprotein (hnRNP) family. hnRNP plays an important role in processing of precursor mRNA in the nucleus. hnRNPR acts as a general positive regulator of MHC class I expression. — an NCBI CDD conserved domain (cd21064); members share this curated model.
