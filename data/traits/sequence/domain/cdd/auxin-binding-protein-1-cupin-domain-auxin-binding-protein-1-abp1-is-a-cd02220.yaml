identifier: CDD:cd02220
label: "auxin-binding protein 1, cupin domain. Auxin-binding protein 1 (ABP1) is a soluble glycoprotein receptor that binds the plant hormone auxin, indole-3-acetic acid (IAA). ABP1 belongs to the ancient and functionally diverse germin/seed storage 7S protein superfamily. It is an important mediator of auxin action in plants and is essential for cell cycle control. Cellular auxin responses typically depend on auxin concentrations that mainly result from intercellular auxin transport and auxin biosynthesis, as well as metabolism. The functional inactivation of ABP1 results in cell cycle arrest, showing that ABP1 plays a critical role in cell cycle regulation, acting at both the G1/S and G2/M checkpoints. ABP1 is ubiquitous among green plants, found mainly within the endoplasmic reticulum (ER) and in smaller quantities at the cell surface associated with the plasma membrane. In Arabidopsis thaliana, ABP1 null mutations result in embryonic lethality while decreased ABP1 expression leads to severe retardation of leaf growth."
definition: >-
  auxin-binding protein 1, cupin domain. Auxin-binding protein 1 (ABP1) is a soluble glycoprotein receptor that binds the plant hormone auxin, indole-3-acetic acid (IAA). ABP1 belongs to the ancient and functionally diverse germin/seed storage 7S protein superfamily. It is an important mediator of auxin action in plants and is essential for cell cycle control. Cellular auxin responses typically depend on auxin concentrations that mainly result from intercellular auxin transport and auxin biosynthesis, as well as metabolism. The functional inactivation of ABP1 results in cell cycle arrest, showing that ABP1 plays a critical role in cell cycle regulation, acting at both the G1/S and G2/M checkpoints. ABP1 is ubiquitous among green plants, found mainly within the endoplasmic reticulum (ER) and in smaller quantities at the cell surface associated with the plasma membrane. In Arabidopsis thaliana, ABP1 null mutations result in embryonic lethality while decreased ABP1 expression leads to severe retardation of leaf growth. — an NCBI CDD conserved domain (cd02220); members share this curated model.
