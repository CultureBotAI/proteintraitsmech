identifier: CDD:cd12669
label: RRM1_Nop12p_like
definition: >-
  RNA recognition motif 1 (RRM1) found in yeast nucleolar protein 12 (Nop12p) and similar proteins. This subgroup corresponds to the RRM1 of Nop12p which is encoded by YOL041C from Saccharomyces cerevisiae. It is a novel nucleolar protein required for pre-25S rRNA processing and normal rates of cell growth at low temperatures. Nop12p shares high sequence similarity with nucleolar protein 13 (Nop13p). Both, Nop12p and Nop13p, are not essential for growth. However, unlike Nop13p that localizes primarily to the nucleolus but also present in the nucleoplasm to a lesser extent, Nop12p is localized to the nucleolus. Nop12p contains two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains)
