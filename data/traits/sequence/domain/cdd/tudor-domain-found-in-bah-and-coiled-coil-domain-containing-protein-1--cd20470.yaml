identifier: CDD:cd20470
label: "Tudor domain found in BAH and coiled-coil domain-containing protein 1 (BAHCC1) and similar proteins. BAHCC1, also called Bromo adjacent homology domain-containing protein 2 (BAHD2), or BAH domain-containing protein 2, may function as a transcriptional regulator. BAHCC1 contains one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor domain found in BAH and coiled-coil domain-containing protein 1 (BAHCC1) and similar proteins. BAHCC1, also called Bromo adjacent homology domain-containing protein 2 (BAHD2), or BAH domain-containing protein 2, may function as a transcriptional regulator. BAHCC1 contains one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20470); members share this curated model.
