identifier: CDD:cd19616
label: "fatty acid binding protein 11 similar to zebrafish FABP11. This group includes zebrafish FABP11a and FABP11b, Senegalese sole FABP11, and similar proteins. The two copies of the fabp11 gene in the zebrafish genome may have resulted from a fish-specific whole genome duplication event.  Fabp11a transcripts have been detected in the liver, brain, heart, testis, muscle, ovary and skin of adult zebrafish while fabp11b transcripts have been found in the brain, heart, ovary and eye in adult tissues. This subgroup belongs to the intracellular fatty-acid binding protein (FABP) family, members of which are small proteins that bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
