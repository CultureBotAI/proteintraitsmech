identifier: CDD:cd14566
label: "dual specificity phosphatase domain of class II mitogen-activated protein kinase phosphatase. Mitogen-activated protein kinase (MAPK) phosphatases (MKPs) are eukaryotic dual-specificity phosphatases (DUSPs) that act on MAPKs and function as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). They deactivate MAPKs by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. Based on sequence homology, subcellular localization and substrate specificity, 10 MKPs can be subdivided into three subfamilies (class I-III). Class II MKPs consist of DUSP6/MKP-3, DUSP7/MKP-X and DUSP9/MKP-4, and are ERK-selective cytoplasmic MKPs. All MKPs contain an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, and a C-terminal catalytic dual specificity phosphatase domain."
definition: >-
  dual specificity phosphatase domain of class II mitogen-activated protein kinase phosphatase. Mitogen-activated protein kinase (MAPK) phosphatases (MKPs) are eukaryotic dual-specificity phosphatases (DUSPs) that act on MAPKs and function as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). They deactivate MAPKs by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. Based on sequence homology, subcellular localization and substrate specificity, 10 MKPs can be subdivided into three subfamilies (class I-III). Class II MKPs consist of DUSP6/MKP-3, DUSP7/MKP-X and DUSP9/MKP-4, and are ERK-selective cytoplasmic MKPs. All MKPs contain an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, and a C-terminal catalytic dual specificity phosphatase domain. — an NCBI CDD conserved domain (cd14566); members share this curated model.
