identifier: CDD:cd11467
label: "basic helix-loop-helix (bHLH) domain found in Drosophila melanogaster protein daughterless (Da) and similar proteins. Da is a nuclear bHLH transcription factor that is a sole E protein ortholog essential for both neurogenesis and sex determination in Drosophila. Da is expressed in a broad range of tissues and is involved in diverse developmental processes such as oogenesis, sex determination and neurogenesis depending on its bHLH-binding partners. Da and achaete-scute complex (AS-C) form heterodimers that act as transcriptional activators of neural cell fates and are involved in sex determination."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Drosophila melanogaster protein daughterless (Da) and similar proteins. Da is a nuclear bHLH transcription factor that is a sole E protein ortholog essential for both neurogenesis and sex determination in Drosophila. Da is expressed in a broad range of tissues and is involved in diverse developmental processes such as oogenesis, sex determination and neurogenesis depending on its bHLH-binding partners. Da and achaete-scute complex (AS-C) form heterodimers that act as transcriptional activators of neural cell fates and are involved in sex determination. — an NCBI CDD conserved domain (cd11467); members share this curated model.
