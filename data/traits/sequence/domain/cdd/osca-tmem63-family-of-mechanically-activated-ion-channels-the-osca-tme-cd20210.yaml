label: "OSCA/TMEM63 family of mechanically activated ion channels. The OSCA/TMEM63 family is evolutionarily conserved in plants, mammals, flies and many other eukaryotes and may represent one of the largest family of mechanically activated ion channels that convert mechanical forces into electric signals, thus confering mechanosensitivity to cells."
