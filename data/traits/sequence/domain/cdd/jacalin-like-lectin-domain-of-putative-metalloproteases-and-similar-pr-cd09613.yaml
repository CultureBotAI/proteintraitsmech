identifier: CDD:cd09613
label: "Jacalin-like lectin domain of putative metalloproteases and similar proteins. Members of this family, which appears restricted to fungi, co-occur with protein domains that contain an HExxH motif characteristic of metallopeptidases. They have not been functionally characterized."
definition: >-
  Jacalin-like lectin domain of putative metalloproteases and similar proteins. Members of this family, which appears restricted to fungi, co-occur with protein domains that contain an HExxH motif characteristic of metallopeptidases. They have not been functionally characterized. — an NCBI CDD conserved domain (cd09613); members share this curated model.
