identifier: CDD:cd02799
label: "tRNA-binding-domain-containing EMAP2-like proteins. This family contains a diverse fraction of tRNA binding proteins, including Caenorhabditis elegans methionyl-tRNA synthetase (CeMetRS), human tyrosyl- tRNA synthetase (hTyrRS), Saccharomyces cerevisiae Arc1p, human p43 and EMAP2.  CeMetRS and hTyrRS aminoacylate their cognate tRNAs.  Arc1p is a transactivator of yeast methionyl-tRNA and glutamyl-tRNA synthetases.  This domain has general tRNA binding properties.  In a subset of this family this domain has the added capability of a cytokine. For example the p43 component of the Human aminoacyl-tRNA synthetase complex is cleaved to release EMAP-II cytokine. EMAP-II has multiple activities during apoptosis, angiogenesis and inflammation and participates in malignant transformation. A EMAP-II-like cytokine also is released from hTyrRS upon cleavage. The active cytokine heptapeptide locates to this domain."
definition: >-
  tRNA-binding-domain-containing EMAP2-like proteins. This family contains a diverse fraction of tRNA binding proteins, including Caenorhabditis elegans methionyl-tRNA synthetase (CeMetRS), human tyrosyl- tRNA synthetase (hTyrRS), Saccharomyces cerevisiae Arc1p, human p43 and EMAP2. CeMetRS and hTyrRS aminoacylate their cognate tRNAs. Arc1p is a transactivator of yeast methionyl-tRNA and glutamyl-tRNA synthetases. This domain has general tRNA binding properties. In a subset of this family this domain has the added capability of a cytokine. For example the p43 component of the Human aminoacyl-tRNA synthetase complex is cleaved to release EMAP-II cytokine. EMAP-II has multiple activities during apoptosis, angiogenesis and inflammation and participates in malignant transformation. A EMAP-II-like cytokine also is released from hTyrRS upon cleavage. The active cytokine heptapeptide locates to this domain. — an NCBI CDD conserved domain (cd02799); members share this curated model.
