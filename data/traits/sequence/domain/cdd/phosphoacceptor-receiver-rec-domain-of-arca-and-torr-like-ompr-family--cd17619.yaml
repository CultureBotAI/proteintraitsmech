identifier: CDD:cd17619
label: "phosphoacceptor receiver (REC) domain of ArcA- and TorR-like OmpR family response regulators. This subfamily includes Escherichia coli TorR and ArcA, both OmpR family response regulators that mediate adaptation to changes in various respiratory growth conditions. The TorS-TorR two-component system (TCS) is responsible for the tight regulation of the torCAD operon, which encodes the trimethylamine N-oxide (TMAO) reductase respiratory system in response to anaerobic conditions and the presence of TMAO. The ArcA-ArcB TCS is involved in cell growth during anaerobiosis. ArcA is a global regulator that controls more than 30 operons involved in redox regulation (the Arc modulon). OmpR family DNA-binding response regulators are characterized by a REC domain and a winged helix-turn-helix (wHTH) DNA-binding output effector domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of ArcA- and TorR-like OmpR family response regulators. This subfamily includes Escherichia coli TorR and ArcA, both OmpR family response regulators that mediate adaptation to changes in various respiratory growth conditions. The TorS-TorR two-component system (TCS) is responsible for the tight regulation of the torCAD operon, which encodes the trimethylamine N-oxide (TMAO) reductase respiratory system in response to anaerobic conditions and the presence of TMAO. The ArcA-ArcB TCS is involved in cell growth during anaerobiosis. ArcA is a global regulator that controls more than 30 operons involved in redox regulation (the Arc modulon). OmpR family DNA-binding response regulators are characterized by a REC domain and a winged helix-turn-helix (wHTH) DNA-binding output effector domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17619); members share this curated model.
