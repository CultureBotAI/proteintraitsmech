identifier: CDD:cd14766
label: "Caenorhabditis elegans globin GLB-25, and related globins. The C. elegans genome contains 33 genes encoding globins that are all transcribed. These are very diverse in gene and protein structure and are localized in a variety of cells. The C. elegans globin GLB-25 (locus tag T06A1.3), like the majority of them, was expressed in neuronal cells in the head and tail portions of the body and in the nerve cord."
definition: >-
  Caenorhabditis elegans globin GLB-25, and related globins. The C. elegans genome contains 33 genes encoding globins that are all transcribed. These are very diverse in gene and protein structure and are localized in a variety of cells. The C. elegans globin GLB-25 (locus tag T06A1.3), like the majority of them, was expressed in neuronal cells in the head and tail portions of the body and in the nerve cord. — an NCBI CDD conserved domain (cd14766); members share this curated model.
