identifier: CDD:cd12993
label: "Laminin G domain repeat 2 of Gas6-like proteins;. Gas6 consists of a vitamin K-dependent gamma-carboxyglutamic acid (Gla) containing domain followed by four epidermal growth factor-like (EG) domains and a pair of laminin G-like (LG) domains. It binds to and activates  receptor tyrosine kinases (RTKs) Axl, Sky, and Mer via its LamG domains.  This interaction is mediated by LamG domains.  The tandem repeat of LamG domains of Gas6 is highly homologous to the human sex hormone-binding globulin (SHBG). SBHG is a homodimer and each monomer comprises two laminin G-like domains. It transports sex steroids in the blood and regulates their access to target tissues. Repeat1 of SBHG mediates dimerisation abd steroid binding. In general, proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold."
definition: >-
  Laminin G domain repeat 2 of Gas6-like proteins;. Gas6 consists of a vitamin K-dependent gamma-carboxyglutamic acid (Gla) containing domain followed by four epidermal growth factor-like (EG) domains and a pair of laminin G-like (LG) domains. It binds to and activates receptor tyrosine kinases (RTKs) Axl, Sky, and Mer via its LamG domains. This interaction is mediated by LamG domains. The tandem repeat of LamG domains of Gas6 is highly homologous to the human sex hormone-binding globulin (SHBG). SBHG is a homodimer and each monomer comprises two laminin G-like domains. It transports sex steroids in the blood and regulates their access to target tissues. Repeat1 of SBHG mediates dimerisation abd steroid binding. In general, proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold. — an NCBI CDD conserved domain (cd12993); members share this curated model.
