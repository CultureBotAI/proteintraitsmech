identifier: CDD:cd21862
label: "Q domain found in acyl-CoA-binding domain-containing protein 3 (ACBD3) and similar proteins. ACBD3, also called Golgi resident protein GCP60, or Golgi complex-associated protein 1 (GOCAP1), or Golgi phosphoprotein 1 (GOLPH1), or PBR- and PKA-associated protein 7, or peripheral benzodiazepine receptor-associated protein PAP7, is a Golgi resident protein involved in the maintenance of Golgi structure by interacting with giantin, affecting protein transport between the endoplasmic reticulum and Golgi. It functions as an adaptor protein and signaling hub across cellular signaling pathways. It recruits PI4KB to the Golgi apparatus membrane; enhances the enzyme activity of PI4KB activity via its membrane recruitment thereby increasing the local concentration of the substrate in the vicinity of the kinase. The model corresponds to a conserved glutamine rich region called Q domain of ACBD3, which is responsible for the binding of the N-terminal region of phosphatidylinositol 4-kinase beta (PI4KB)."
definition: >-
  Q domain found in acyl-CoA-binding domain-containing protein 3 (ACBD3) and similar proteins. ACBD3, also called Golgi resident protein GCP60, or Golgi complex-associated protein 1 (GOCAP1), or Golgi phosphoprotein 1 (GOLPH1), or PBR- and PKA-associated protein 7, or peripheral benzodiazepine receptor-associated protein PAP7, is a Golgi resident protein involved in the maintenance of Golgi structure by interacting with giantin, affecting protein transport between the endoplasmic reticulum and Golgi. It functions as an adaptor protein and signaling hub across cellular signaling pathways. It recruits PI4KB to the Golgi apparatus membrane; enhances the enzyme activity of PI4KB activity via its membrane recruitment thereby increasing the local concentration of the substrate in the vicinity of the kinase. The model corresponds to a conserved glutamine rich region called Q domain of ACBD3, which is responsible for the binding of the N-terminal region of phosphatidylinositol 4-kinase beta (PI4KB). — an NCBI CDD conserved domain (cd21862); members share this curated model.
