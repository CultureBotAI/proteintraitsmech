identifier: CDD:cd10152
label: "Staphylococcus aureus copper-sensitive operon repressor (CsoR), and related domains; this family was previously known as part of DUF156. This domain family includes Staphylococcus aureus CsoR (SaCsoR). SaCsoR is Cu(I)-inducible, and regulates the expression of genes involved in copper homeostasis; it represses a genetically unlinked copA-copZ operon. copA encodes a copper efflux P-type ATPase, and copZ, a copper chaperone. This family belongs to a larger superfamily that contains various transcriptional regulators that respond to different stressors such as Cu(I), Ni(I), sulfite, and formaldehyde, and includes Mycobacterium tuberculosis CsoR (MtCsoR), Bacillus subtilis CsoR, and Thermus thermophilus CsoR. The latter three proteins do not belong to this family. CsoRs form homotetramers (dimer of dimers). In MtCsoR, within each dimer, two Cys residues on opposite subunits, along with a His residue, bind the Cu(I) ion (forming a triagonal S2N coordination complex, C-H-C). These residues are conserved in the majority of members of this superfamily, including this family, and a conserved Tyr and a Glu residue that facilitate allosteric regulation of DNA binding for CsoRs are also well conserved."
definition: >-
  Staphylococcus aureus copper-sensitive operon repressor (CsoR), and related domains; this family was previously known as part of DUF156. This domain family includes Staphylococcus aureus CsoR (SaCsoR). SaCsoR is Cu(I)-inducible, and regulates the expression of genes involved in copper homeostasis; it represses a genetically unlinked copA-copZ operon. copA encodes a copper efflux P-type ATPase, and copZ, a copper chaperone. This family belongs to a larger superfamily that contains various transcriptional regulators that respond to different stressors such as Cu(I), Ni(I), sulfite, and formaldehyde, and includes Mycobacterium tuberculosis CsoR (MtCsoR), Bacillus subtilis CsoR, and Thermus thermophilus CsoR. The latter three proteins do not belong to this family. CsoRs form homotetramers (dimer of dimers). In MtCsoR, within each dimer, two Cys residues on opposite subunits, along with a His residue, bind the Cu(I) ion (forming a triagonal S2N coordination complex, C-H-C). These residues are conserved in the majority of members of this superfamily, including this family, and a conserved Tyr and a Glu residue that facilitate allosteric regulation of DNA binding for CsoRs are also well conserved. — an NCBI CDD conserved domain (cd10152); members share this curated model.
