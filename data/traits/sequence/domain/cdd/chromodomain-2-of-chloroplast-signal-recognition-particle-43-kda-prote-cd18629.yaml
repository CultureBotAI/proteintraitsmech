identifier: CDD:cd18629
label: "chromodomain 2 of chloroplast signal recognition particle 43 kDa protein, and similar proteins. This subgroup includes the chromodomain 2 of chloroplast SRP43 (cpSRP43), and similar proteins. CpSRP43 is a component of the chloroplast signal recognition particle (SRP) pathway. It forms a stable complex with cpSRP54 (cpSRP complex) which is required for the efficient posttranslational transport of members of the nuclearly encoded light harvesting chlorophyll-a/b-binding proteins (LHCPs) to the thylakoid membrane. Chromatin organization modifier (chromo) domain is a conserved region of around 50 amino acids found in a variety of chromosomal proteins, which appear to play a role in the functional organization of the eukaryotic nucleus. Experimental evidence implicates the chromodomain in the binding activity of these proteins to methylated histone tails and maybe RNA. May occur as single instance, in a tandem arrangement or followed by a related chromo shadow domain."
definition: >-
  chromodomain 2 of chloroplast signal recognition particle 43 kDa protein, and similar proteins. This subgroup includes the chromodomain 2 of chloroplast SRP43 (cpSRP43), and similar proteins. CpSRP43 is a component of the chloroplast signal recognition particle (SRP) pathway. It forms a stable complex with cpSRP54 (cpSRP complex) which is required for the efficient posttranslational transport of members of the nuclearly encoded light harvesting chlorophyll-a/b-binding proteins (LHCPs) to the thylakoid membrane. Chromatin organization modifier (chromo) domain is a conserved region of around 50 amino acids found in a variety of chromosomal proteins, which appear to play a role in the functional organization of the eukaryotic nucleus. Experimental evidence implicates the chromodomain in the binding activity of these proteins to methylated histone tails and maybe RNA. May occur as single instance, in a tandem arrangement or followed by a related chromo shadow domain. — an NCBI CDD conserved domain (cd18629); members share this curated model.
