identifier: CDD:cd18940
label: bHLH_TS_OLIG2
definition: >-
  basic helix-loop-helix (bHLH) domain found in oligodendrocyte transcription factor 2 (Oligo2) and similar proteins. Oligo2, also termed Class B basic helix-loop-helix protein 1 (bHLHb1), or Class E basic helix-loop-helix protein 19 (bHLHe19), or protein kinase C-binding protein 2, or protein kinase C-binding protein RACK17, is a bHLH transcription factor that is required for oligodendrocyte and motor neuron specification in the spinal cord, as well as for the development of somatic motor neurons in the hindbrain. It cooperates with OLIG1 to establish the MN progenitors (pMN) domain of the embryonic neural tube
