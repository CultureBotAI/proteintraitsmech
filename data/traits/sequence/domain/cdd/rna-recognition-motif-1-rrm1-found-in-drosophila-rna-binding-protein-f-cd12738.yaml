identifier: CDD:cd12738
label: "RNA recognition motif 1 (RRM1) found in Drosophila RNA-binding protein Fusilli and similar proteins. This subgroup corresponds to the RRM1 of RNA-binding protein Fusilli which is encoded by Drosophila fusilli (fus) gene. Loss of Fusilli activity causes lethality during embryogenesis in flies. Drosophila Fusilli can regulate endogenous fibroblast growth factor receptor 2 (FGFR2) splicing and functions as a splicing factor. Fusilli contains three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), an N-terminal domain with unknown function and a C-terminal domain particularly rich in alanine, glutamine, and serine."
definition: >-
  RNA recognition motif 1 (RRM1) found in Drosophila RNA-binding protein Fusilli and similar proteins. This subgroup corresponds to the RRM1 of RNA-binding protein Fusilli which is encoded by Drosophila fusilli (fus) gene. Loss of Fusilli activity causes lethality during embryogenesis in flies. Drosophila Fusilli can regulate endogenous fibroblast growth factor receptor 2 (FGFR2) splicing and functions as a splicing factor. Fusilli contains three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), an N-terminal domain with unknown function and a C-terminal domain particularly rich in alanine, glutamine, and serine. — an NCBI CDD conserved domain (cd12738); members share this curated model.
