identifier: CDD:cd06177
label: "Nucleoside:H(+) symporter family of the Major Facilitator Superfamily of transporters. The prototypical members of the Nucleoside:H(+) symporter (NHS) family are Escherichia coli nucleoside permease NupG and xanthosine permease. Nucleoside:H(+) symporters are proton-driven transporters that facilitate the import of nucleosides across the cytoplasmic membrane. NupG is a broad-specificity transporter of purine and pyrimidine nucleosides. Xanthosine permease is involved in the uptake of xanthosine and other nucleosides such as inosine, adenosine, cytidine, uridine and thymidine. The NHS family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
