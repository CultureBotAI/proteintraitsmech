identifier: CDD:cd17620
label: "phosphoacceptor receiver (REC) domain of KdpE-like OmpR family response regulators. KdpE is a component of the KdpD/KdpE two-component system (TCS) and is activated when histidine kinase KdpD senses a drop in external K+ concentration or upshift in ionic osmolarity, resulting in the expression of a heterooligomeric transporter KdpFABC. In addition, the KdpD/KdpE TCS is also an adaptive regulator involved in the virulence and intracellular survival of pathogenic bacteria. KdpE is a member of the OmpR family of DNA-binding response regulators that contain REC and winged helix-turn-helix (wHTH) DNA-binding output effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of KdpE-like OmpR family response regulators. KdpE is a component of the KdpD/KdpE two-component system (TCS) and is activated when histidine kinase KdpD senses a drop in external K+ concentration or upshift in ionic osmolarity, resulting in the expression of a heterooligomeric transporter KdpFABC. In addition, the KdpD/KdpE TCS is also an adaptive regulator involved in the virulence and intracellular survival of pathogenic bacteria. KdpE is a member of the OmpR family of DNA-binding response regulators that contain REC and winged helix-turn-helix (wHTH) DNA-binding output effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17620); members share this curated model.
