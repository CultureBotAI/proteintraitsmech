identifier: CDD:cd19709
label: bHLH_TS_TCF23_OUT
definition: >-
  basic helix-loop-helix (bHLH) domain found in transcription factor 23 (TCF-23) and similar proteins. TCF-23, also termed Class A basic helix-loop-helix protein 24 (bHLHa24), is a bHLH transcription factor that is essential for progesterone-dependent decidualization. The mouse homolog is also called ovary, uterus and testis protein (OUT), which is expressed predominantly in the reproductive organs such as the uterus, ovary and testis. It shows an Id-like inhibitory activity and functions as a negative regulator of bHLH factors through the formation of a functionally inactive heterodimeric complex. OUT inhibits the formation of TCF3 and MYOD1 homodimers and heterodimers, but lacks DNA binding activity. OUT is involved in the regulation or modulation of smooth muscle contraction of the uterus during pregnancy and particularly around the time of delivery. It also plays a role in the inhibition of myogenesis. Unlike typical bHLH factors, OUT proteins do not bind E-box (CANNTG) or N-box DNA sequences and inhibit DNA binding of homo- and heterodimers consisting of E12 and MyoD in gel mobility shift assays
