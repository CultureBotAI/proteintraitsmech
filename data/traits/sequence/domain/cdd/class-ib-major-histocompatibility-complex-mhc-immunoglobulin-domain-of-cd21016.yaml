identifier: CDD:cd21016
label: "Class Ib major histocompatibility complex (MHC) immunoglobulin domain of T10, T22, and similar proteins; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the Class Ib major histocompatibility complex (MHC) immunoglobulin domain of the murine H-2T-encoded T10, T22, and similar proteins.  T10 and T22 are highly related nonclassical major histocompatibility complex (MHC) class Ib proteins that bind to certain gammadelta T cell receptors (TCRs) in the absence of other components.  Classical MHC class I (class Ia) molecules participate in immune responses by presenting peptide antigens to cytolytic alpha beta T cells. Many nonclassical MHC class I (class Ib) molecules have distinct antigen-binding capabilities, suggesting that they have evolved for specific tasks that are distinct from those of MHC class Ia. Members of the IgC family are components of immunoglobulin, T-cell receptors, CD1 cell surface glycoproteins, secretory glycoproteins A/C, and major histocompatibility complex (MHC) class I/II molecules. In immunoglobulins, each chain is composed of one variable domain (IgV) and one or more IgC domains. These names reflect the fact that the variability in sequences is higher in the variable domain than in the constant domain. The IgV domain is responsible for antigen binding, and the IgC domain is involved in oligomerization and molecular interactions."
definition: >-
  Class Ib major histocompatibility complex (MHC) immunoglobulin domain of T10, T22, and similar proteins; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the Class Ib major histocompatibility complex (MHC) immunoglobulin domain of the murine H-2T-encoded T10, T22, and similar proteins. T10 and T22 are highly related nonclassical major histocompatibility complex (MHC) class Ib proteins that bind to certain gammadelta T cell receptors (TCRs) in the absence of other components. Classical MHC class I (class Ia) molecules participate in immune responses by presenting peptide antigens to cytolytic alpha beta T cells. Many nonclassical MHC class I (class Ib) molecules have distinct antigen-binding capabilities, suggesting that they have evolved for specific tasks that are distinct from those of MHC class Ia. Members of the IgC family are components of immunoglobulin, T-cell receptors, CD1 cell surface glycoproteins, secretory glycoproteins A/C, and major histocompatibility complex (MHC) class I/II molecules. In immunoglobulins, each chain is composed of one variable domain (IgV) and one or more IgC domains. These names reflect the fact that the variability in sequences is higher in the variable domain than in the constant domain. The IgV domain is responsible for antigen binding, and the IgC domain is involved in oligomerization and molecular interactions. — an NCBI CDD conserved domain (cd21016); members share this curated model.
