identifier: CDD:cd16775
label: "RING finger, HC subclass, found in RING finger protein 19A (RNF19A) and similar proteins. RNF19A, also known as double ring-finger protein (Dorfin) or p38, is a transmembrane (TM) domain-containing RBR-type E3 ubiquitin-protein ligase that localizes to the ubiquitylated inclusions in Parkinson's disease (PD), dementia with Lewy bodies, multiple system atrophy, and amyotrophic lateral sclerosis (ALS). It interacts with Psmc3, a protein component of the 19S regulatory cap of the 26S proteasome, and further participates in the ubiquitin-proteasome system in acrosome biogenesis, spermatid head shaping, and development of the head-tail coupling apparatus and tail. It modulates the ubiquitination and degradation of calcium-sensing receptor (CaR), which may contribute to a general mechanism for CaR quality control during biosynthesis. Moreover, RNF19A can also ubiquitylate mutant superoxide dismutase 1 (SOD1), the causative gene of familial ALS. It may associate with endoplasmic reticulum-associated degradation (ERAD) pathway, which is related to the pathogenesis of neurodegenerative disorders, such as PD or Alzheimer's disease. RNF19A contains an RBR domain followed by three TMs. The RBR domain was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been corrected as RING-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR (RING1-BRcat-Rcat) domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase function to facilitate the ubiquitination reaction. This model corresponds to the RING domain, a C3HC4-type RING-HC finger required for RBR-mediated ubiquitination."
definition: >-
  RING finger, HC subclass, found in RING finger protein 19A (RNF19A) and similar proteins. RNF19A, also known as double ring-finger protein (Dorfin) or p38, is a transmembrane (TM) domain-containing RBR-type E3 ubiquitin-protein ligase that localizes to the ubiquitylated inclusions in Parkinson's disease (PD), dementia with Lewy bodies, multiple system atrophy, and amyotrophic lateral sclerosis (ALS). It interacts with Psmc3, a protein component of the 19S regulatory cap of the 26S proteasome, and further participates in the ubiquitin-proteasome system in acrosome biogenesis, spermatid head shaping, and development of the head-tail coupling apparatus and tail. It modulates the ubiquitination and degradation of calcium-sensing receptor (CaR), which may contribute to a general mechanism for CaR quality control during biosynthesis. Moreover, RNF19A can also ubiquitylate mutant superoxide dismutase 1 (SOD1), the causative gene of familial ALS. It may associate with endoplasmic reticulum-associated degradation (ERAD) pathway, which is related to the pathogenesis of neurodegenerative disorders, such as PD or Alzheimer's disease. RNF19A contains an RBR domain followed by three TMs. The RBR domain was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been corrected as RING-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR (RING1-BRcat-Rcat) domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase function to facilitate the ubiquitination reaction. This model corresponds to the RING domain, a C3HC4-type RING-HC finger required for RBR-mediated ubiquitination. — an NCBI CDD conserved domain (cd16775); members share this curated model.
