identifier: CDD:cd22502
label: "type I K homology (KH) RNA-binding domain found in ankyrin repeat domain-containing protein 17 (ANKRD17) and similar proteins. ANKRD17, also called ankyrin repeat protein 17, or gene trap ankyrin repeat protein (GTAR), or serologically defined breast cancer antigen NY-BR-16, is a ubiquitously expressed ankyrin factor essential for the vascular integrity during embryogenesis. It may be directly involved in the DNA replication process and play pivotal roles in cell cycle and DNA regulation. It is also involved in innate immune defense against bacteria and viruses."
definition: >-
  type I K homology (KH) RNA-binding domain found in ankyrin repeat domain-containing protein 17 (ANKRD17) and similar proteins. ANKRD17, also called ankyrin repeat protein 17, or gene trap ankyrin repeat protein (GTAR), or serologically defined breast cancer antigen NY-BR-16, is a ubiquitously expressed ankyrin factor essential for the vascular integrity during embryogenesis. It may be directly involved in the DNA replication process and play pivotal roles in cell cycle and DNA regulation. It is also involved in innate immune defense against bacteria and viruses. — an NCBI CDD conserved domain (cd22502); members share this curated model.
