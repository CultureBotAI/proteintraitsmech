identifier: CDD:cd20819
label: "protein kinase C conserved region 1 (C1 domain) found in differentially expressed in FDCP 8 (DEF-8) and similar proteins. DEF-8 positively regulates lysosome peripheral distribution and ruffled border formation in osteoclasts. It is involved in bone resorption. DEF-8 contains a protein kinase C conserved region 1 (C1) domain followed by a putative zinc-RING and/or ribbon. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in differentially expressed in FDCP 8 (DEF-8) and similar proteins. DEF-8 positively regulates lysosome peripheral distribution and ruffled border formation in osteoclasts. It is involved in bone resorption. DEF-8 contains a protein kinase C conserved region 1 (C1) domain followed by a putative zinc-RING and/or ribbon. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20819); members share this curated model.
