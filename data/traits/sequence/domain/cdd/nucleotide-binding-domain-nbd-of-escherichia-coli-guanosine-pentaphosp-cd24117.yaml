identifier: CDD:cd24117
label: "nucleotide-binding domain (NBD) of Escherichia coli guanosine pentaphosphate phosphohydrolase (EcGppA) and similar proteins. EcGppA (EC 3.6.1.40), also called guanosine-5'-triphosphate,3'-diphosphate pyrophosphatase, or pppGpp-5'-phosphohydrolase, catalyzes the conversion of guanosine pentaphosphate (pppGpp) to guanosine tetraphosphate (ppGpp). pppGpp is a cytoplasmic signaling molecule which together with ppGpp controls the 'stringent response', an adaptive process that allows bacteria to respond to amino acid starvation, resulting in the coordinated regulation of numerous cellular activities. EcGppA also has exopolyphosphatase activity, catalyzing the release of orthophosphate by processive hydrolysis of the phosphoanyhydride bonds of polyphosphate chains. Unlike other PPX/GppA family members containing one PPX/GppA homolog, E. coli possesses two homologs, EcGppA and EcPPX, which are indistinguishable in their domain arrangement."
definition: >-
  nucleotide-binding domain (NBD) of Escherichia coli guanosine pentaphosphate phosphohydrolase (EcGppA) and similar proteins. EcGppA (EC 3.6.1.40), also called guanosine-5'-triphosphate,3'-diphosphate pyrophosphatase, or pppGpp-5'-phosphohydrolase, catalyzes the conversion of guanosine pentaphosphate (pppGpp) to guanosine tetraphosphate (ppGpp). pppGpp is a cytoplasmic signaling molecule which together with ppGpp controls the 'stringent response', an adaptive process that allows bacteria to respond to amino acid starvation, resulting in the coordinated regulation of numerous cellular activities. EcGppA also has exopolyphosphatase activity, catalyzing the release of orthophosphate by processive hydrolysis of the phosphoanyhydride bonds of polyphosphate chains. Unlike other PPX/GppA family members containing one PPX/GppA homolog, E. coli possesses two homologs, EcGppA and EcPPX, which are indistinguishable in their domain arrangement. — an NCBI CDD conserved domain (cd24117); members share this curated model.
