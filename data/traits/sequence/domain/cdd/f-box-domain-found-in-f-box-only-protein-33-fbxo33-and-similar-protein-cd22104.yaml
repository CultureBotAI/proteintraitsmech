identifier: CDD:cd22104
label: "F-box domain found in F-box only protein 33 (FBXO33) and similar proteins. FBXO33, also called FBX33, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. It exerts similar functions as F-box involved in polyQ pathogenesis (FipoQ) in modulating the ubiquitination and solubility of expanded SCA3-polyQ proteins. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 33 (FBXO33) and similar proteins. FBXO33, also called FBX33, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. It exerts similar functions as F-box involved in polyQ pathogenesis (FipoQ) in modulating the ubiquitination and solubility of expanded SCA3-polyQ proteins. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22104); members share this curated model.
