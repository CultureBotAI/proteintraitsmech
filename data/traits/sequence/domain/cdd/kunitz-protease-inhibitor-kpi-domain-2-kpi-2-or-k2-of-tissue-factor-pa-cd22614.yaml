identifier: CDD:cd22614
label: "Kunitz protease inhibitor (KPI) domain 2 (KPI-2 or K2) of tissue factor pathway inhibitor (TFPI). This model represents the second Kunitz-type domain (K2 or KPI-2) of tissue factor pathway inhibitor (TFPI or TFPI1), also known as extrinsic pathway inhibitor (EPI) or lipoprotein-associated coagulation inhibitor (LACI). TFPI down-regulates the extrinsic coagulation pathway via inhibition of activated factor X (FXa or Xa) and FVIIa (VIIa). It inhibits activated FXa via a \"slow-tight binding mechanism\", i.e. rapid formation of a loose FXa-TFPI complex that then slowly isomerizes to a tight FXa-TFPI* complex. Subsequent inhibition of FVIIa is facilitated by the presence of tissue factor (TF) and FXa, which together rapidly and efficiently form a quaternary FXa-TFPI-TF-FVIIa complex in which the activity of FXa and FVIIa are inhibited. TFPI consists of 3 Kunitz-type protease inhibitor (KPI) domains in a tandem arrangement; the K2 domain is exposed on functionally active TFPI pools in circulation in blood, in platelets, and attached to the endothelium. While the K1 (or KPI-1) domain of TFPI has been shown to bind and inhibit FVIIa, the K2 domain inhibits FXa by binding directly to the active site and forming a FXa:TFPI complex. A close interaction between the TFPI K2 domain and the FXa active site is essential for the FXa inhibitory action of TFPI and for the formation of an inactive TF/FVIIa/FXa/TFPI complex which then prevents FXa generation. Thus, blockage of K2 would prevent TFPI binding to both FXa and FVIIa/TF, and fully abolish TFPI inhibition of the coagulation cascade. The structure of the K2 domain is similar to those of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  Kunitz protease inhibitor (KPI) domain 2 (KPI-2 or K2) of tissue factor pathway inhibitor (TFPI). This model represents the second Kunitz-type domain (K2 or KPI-2) of tissue factor pathway inhibitor (TFPI or TFPI1), also known as extrinsic pathway inhibitor (EPI) or lipoprotein-associated coagulation inhibitor (LACI). TFPI down-regulates the extrinsic coagulation pathway via inhibition of activated factor X (FXa or Xa) and FVIIa (VIIa). It inhibits activated FXa via a "slow-tight binding mechanism", i.e. rapid formation of a loose FXa-TFPI complex that then slowly isomerizes to a tight FXa-TFPI* complex. Subsequent inhibition of FVIIa is facilitated by the presence of tissue factor (TF) and FXa, which together rapidly and efficiently form a quaternary FXa-TFPI-TF-FVIIa complex in which the activity of FXa and FVIIa are inhibited. TFPI consists of 3 Kunitz-type protease inhibitor (KPI) domains in a tandem arrangement; the K2 domain is exposed on functionally active TFPI pools in circulation in blood, in platelets, and attached to the endothelium. While the K1 (or KPI-1) domain of TFPI has been shown to bind and inhibit FVIIa, the K2 domain inhibits FXa by binding directly to the active site and forming a FXa:TFPI complex. A close interaction between the TFPI K2 domain and the FXa active site is essential for the FXa inhibitory action of TFPI and for the formation of an inactive TF/FVIIa/FXa/TFPI complex which then prevents FXa generation. Thus, blockage of K2 would prevent TFPI binding to both FXa and FVIIa/TF, and fully abolish TFPI inhibition of the coagulation cascade. The structure of the K2 domain is similar to those of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22614); members share this curated model.
