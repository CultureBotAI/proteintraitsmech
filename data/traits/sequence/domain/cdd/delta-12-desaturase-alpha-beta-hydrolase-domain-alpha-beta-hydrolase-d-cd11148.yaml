label: hyd_delt_12_desat
definition: >-
  delta 12 desaturase alpha/beta hydrolase domain. alpha/beta hydrolase domain of delta 12 desaturase. In yeast cells, delta 12 desaturase converts oleic acid to linoleic acid. The specific function of the alpha/beta hydrolase domain in this protein remains unknown
