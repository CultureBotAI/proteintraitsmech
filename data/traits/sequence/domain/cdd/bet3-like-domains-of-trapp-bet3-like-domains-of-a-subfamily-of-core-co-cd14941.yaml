identifier: CDD:cd14941
label: TRAPPC_bet3-like
definition: >-
  Bet3-like domains of TRAPP. Bet3-like domains of a subfamily of core components of the trafficking protein particle complex (TRAPP) include TRAPPC3, TRAPPC5, and TRAPPC6A. TRAPP complexes play a key role in the regulation of ER-to-Golgi and intra-Golgi transport by tethering the vesicle membrane to the target membrane. TRAPPs are large multimeric protein complexes which contain six core subunits that belong to two distinct structural families, the bet3-like family and the sedlin-like family
