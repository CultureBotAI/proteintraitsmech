identifier: CDD:cd19700
label: "basic helix-loop-helix (bHLH) domain found in twist-related protein 2 (TWIST2) and similar proteins. TWIST2, also termed Class A basic helix-loop-helix protein 39 (bHLHa39), or Dermis-expressed protein 1, or Dermo-1, is a bHLH transcription factor that regulates the development of mesenchymal tissues and plays a critical role in embryogenesis. It binds to the E-box consensus sequence 5'-CANNTG-3' as a heterodimer and inhibits transcriptional activation by MYOD1, MYOG, MEF2A and MEF2C."
definition: >-
  basic helix-loop-helix (bHLH) domain found in twist-related protein 2 (TWIST2) and similar proteins. TWIST2, also termed Class A basic helix-loop-helix protein 39 (bHLHa39), or Dermis-expressed protein 1, or Dermo-1, is a bHLH transcription factor that regulates the development of mesenchymal tissues and plays a critical role in embryogenesis. It binds to the E-box consensus sequence 5'-CANNTG-3' as a heterodimer and inhibits transcriptional activation by MYOD1, MYOG, MEF2A and MEF2C. — an NCBI CDD conserved domain (cd19700); members share this curated model.
