identifier: CDD:cd11484
label: "nucleobase-cation-symport-1 (NCS1) transporter CobB-like; solute-binding domain. This NCS1 subfamily includes Escherichia coli CodB (cytosine permease), and the Saccharomyces cerevisiae transporters: Fcy21p (Purine-cytosine permease), and vitamin B6 transporter Tpn1. NCS1s are essential components of salvage pathways for nucleobases and related metabolites; their known substrates include allantoin, uracil, thiamine, and nicotinamide riboside. NCS1s belong to a superfamily which also contains the solute carrier 5 family sodium/glucose transporters (SLC5s), and solute carrier 6 family neurotransmitter transporters (SLC6s)."
definition: >-
