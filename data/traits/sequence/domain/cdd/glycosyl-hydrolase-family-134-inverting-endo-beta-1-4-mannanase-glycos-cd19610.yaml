identifier: CDD:cd19610
label: "glycosyl hydrolase family 134 inverting endo-beta-1,4-mannanase. glycosyl hydrolase family 134 beta-mannanase (E.C. 3.2.1.78) differs from other mannanases in as it has a hen egg white lysozyme fold and cleaves beta-1,4-mannans with inversion of sterochemistry. Beta-mannosidases are enzymes involved in seed germination and the degradation of the hemicellulose fraction of soft- and hardwoods."
