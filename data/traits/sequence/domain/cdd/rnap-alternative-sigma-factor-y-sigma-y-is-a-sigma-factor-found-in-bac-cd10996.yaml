identifier: CDD:cd10996
label: RNAP_SigY
definition: >-
  RNAP alternative sigma factor Y. Sigma Y is a sigma factor found in Bacillus subtilis. It is a member of the ECF (extra-cytoplasmic function) sigma factor subfam of the Sigma 70 family. The operon coding for SigY contains 6 genes. Transcription of this operon is initiated upon nitrogen starvation of B. subtilis. It is likely that the sigY operon will be upreg-ulated by its own sigma factor. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. The most C-terminal domain of sigma 70 includes conserved regions 4.1 and 4.2, which contain four alpha helices that are arranged as a pair of HtH motifs
