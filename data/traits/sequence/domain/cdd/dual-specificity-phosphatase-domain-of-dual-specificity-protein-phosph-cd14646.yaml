identifier: CDD:cd14646
label: "dual specificity phosphatase domain of dual specificity protein phosphatase 16. Dual specificity protein phosphatase 16 (DUSP16), also called mitogen-activated protein kinase (MAPK) phosphatase 7 (MKP-7), functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). Like other MKPs, it deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. It belongs to the class III subfamily and is a JNK/p38-selective cytoplasmic MKP. DUSP16/MKP-7 plays an essential role in perinatal survival and selectively controls the differentiation and cytokine production of myeloid cells. It is acetylated by Mycobacterium tuberculosis Eis protein, which leads to the inhibition of JNK-dependent autophagy, phagosome maturation, and ROS generation, and thus, initiating suppression of host immune responses. DUSP16/MKP-7 contains an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, and a C-terminal catalytic dual specificity phosphatase domain."
definition: >-
  dual specificity phosphatase domain of dual specificity protein phosphatase 16. Dual specificity protein phosphatase 16 (DUSP16), also called mitogen-activated protein kinase (MAPK) phosphatase 7 (MKP-7), functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). Like other MKPs, it deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. It belongs to the class III subfamily and is a JNK/p38-selective cytoplasmic MKP. DUSP16/MKP-7 plays an essential role in perinatal survival and selectively controls the differentiation and cytokine production of myeloid cells. It is acetylated by Mycobacterium tuberculosis Eis protein, which leads to the inhibition of JNK-dependent autophagy, phagosome maturation, and ROS generation, and thus, initiating suppression of host immune responses. DUSP16/MKP-7 contains an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, and a C-terminal catalytic dual specificity phosphatase domain. — an NCBI CDD conserved domain (cd14646); members share this curated model.
