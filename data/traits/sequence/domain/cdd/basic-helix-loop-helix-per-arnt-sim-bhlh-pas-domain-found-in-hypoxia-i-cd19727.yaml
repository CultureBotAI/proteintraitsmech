label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in hypoxia-inducible factor 1-alpha (HIF1a) and similar proteins. HIF1a, also termed HIF-1-alpha, or HIF1-alpha, or ARNT-interacting protein, or Basic-helix-loop-helix-PAS protein MOP1, or Class E basic helix-loop-helix protein 78 (bHLHe78), or Member of PAS protein 1, or PAS domain-containing protein 8 (PASD8), functions as a master transcriptional regulator of the adaptive response to hypoxia."
