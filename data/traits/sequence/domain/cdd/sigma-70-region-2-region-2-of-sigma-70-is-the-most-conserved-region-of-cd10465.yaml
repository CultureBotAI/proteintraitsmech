identifier: CDD:cd10465
label: "Sigma-70 region 2. Region 2 of sigma-70 is the most conserved region of the entire protein. All members of this class of sigma-factor contain region 2. The high conservation is due to region 2 containing both the -10 promoter recognition helix at regions 2.3 -2.4 and the primary core RNA polymerase binding determinant. The core binding helix, interacts with the clamp domain of the largest polymerase subunit, beta prime. The aromatic residues of the recognition helix, found at the C-terminus of this domain are thought to mediate strand separation, thereby allowing transcription initiation. Regions 2.4-2.5 (and also 3.1) are part of the ND2 (an N-terminal domain) consisting of three alpha helices which fold into an alpha-helical bundle, and regions in domain 2 up to region 2.4 are part of the ND1 (N-terminal domain) which consists of eight alpha helices and four HtH motifs in its entirety. Region 2.2 is also known to bind to the essential promoter site called a Pribnow Box of the DNA template that is being transcribed. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription."
definition: >-
  Sigma-70 region 2. Region 2 of sigma-70 is the most conserved region of the entire protein. All members of this class of sigma-factor contain region 2. The high conservation is due to region 2 containing both the -10 promoter recognition helix at regions 2.3 -2.4 and the primary core RNA polymerase binding determinant. The core binding helix, interacts with the clamp domain of the largest polymerase subunit, beta prime. The aromatic residues of the recognition helix, found at the C-terminus of this domain are thought to mediate strand separation, thereby allowing transcription initiation. Regions 2.4-2.5 (and also 3.1) are part of the ND2 (an N-terminal domain) consisting of three alpha helices which fold into an alpha-helical bundle, and regions in domain 2 up to region 2.4 are part of the ND1 (N-terminal domain) which consists of eight alpha helices and four HtH motifs in its entirety. Region 2.2 is also known to bind to the essential promoter site called a Pribnow Box of the DNA template that is being transcribed. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. — an NCBI CDD conserved domain (cd10465); members share this curated model.
