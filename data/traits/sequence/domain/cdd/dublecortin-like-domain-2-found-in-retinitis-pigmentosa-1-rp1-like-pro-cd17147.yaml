identifier: CDD:cd17147
label: "Dublecortin-like domain 2 found in retinitis pigmentosa 1 (RP1)-like protein. RP1, also termed oxygen-regulated protein 1, is a member of doublecortin (DCX) superfamily that contains double tandem repeats of the DCX domains. RP1 is associated with retinitis pigmentosa, which is a type of inherited blindness. DCX is a microtubule-associated protein (MAP) with a stable ubiquitin-like tertiary fold. Microtubules are key components of cytoskeleton that are involved in cell movement, shape determination, division and transport. The RP1 protein is expressed in photoreceptors that is required for correct stacking of outer segment discs. RP1 protein interacts with many of the same cytoskeleton related proteins that other members of the DCX family interact with."
definition: >-
  Dublecortin-like domain 2 found in retinitis pigmentosa 1 (RP1)-like protein. RP1, also termed oxygen-regulated protein 1, is a member of doublecortin (DCX) superfamily that contains double tandem repeats of the DCX domains. RP1 is associated with retinitis pigmentosa, which is a type of inherited blindness. DCX is a microtubule-associated protein (MAP) with a stable ubiquitin-like tertiary fold. Microtubules are key components of cytoskeleton that are involved in cell movement, shape determination, division and transport. The RP1 protein is expressed in photoreceptors that is required for correct stacking of outer segment discs. RP1 protein interacts with many of the same cytoskeleton related proteins that other members of the DCX family interact with. — an NCBI CDD conserved domain (cd17147); members share this curated model.
