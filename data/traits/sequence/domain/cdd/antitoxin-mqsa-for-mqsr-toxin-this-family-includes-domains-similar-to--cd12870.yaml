identifier: CDD:cd12870
label: "antitoxin MqsA for MqsR toxin. This family includes domains similar to the antitoxin MqsA that binds motility quorum-sensing regulator MqsR, a toxin that is highly upregulated in persisters (dormant cells found in biofilms that are a source of antibiotic resistance), thus forming a unique toxin:antitoxin (TA) pair. MqsA neutralizes MsqR toxicity. It binds its own promoter as well as those of genes important for E. coli physiology, such as mcbR and spy. It also binds zinc and has been shown to coordinate DNA via its C-terminal domain. This family also includes the B. subtilis YokU protein, which is functionally uncharacterized."
