identifier: CDD:cd14070
label: "Catalytic domain of the Serine/Threonine Kinase, Hormonally up-regulated Neu-associated kinase (also called MAK-V). STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. HUNK/MAK-V was identified from a mammary tumor in an MMTV-neu transgenic mouse. It is required for the metastasis of c-myc-induced mammary tumors, but is not necessary for c-myc-induced primary tumor formation or normal development. It is required for HER2/neu-induced tumor formation and maintenance of the cells' tumorigenic phenotype. It is over-expressed in aggressive subsets of ovary, colon, and breast carcinomas. HUNK interacts with synaptopodin, and may also play a role in synaptic plasticity. The HUNK subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Hormonally up-regulated Neu-associated kinase (also called MAK-V). STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. HUNK/MAK-V was identified from a mammary tumor in an MMTV-neu transgenic mouse. It is required for the metastasis of c-myc-induced mammary tumors, but is not necessary for c-myc-induced primary tumor formation or normal development. It is required for HER2/neu-induced tumor formation and maintenance of the cells' tumorigenic phenotype. It is over-expressed in aggressive subsets of ovary, colon, and breast carcinomas. HUNK interacts with synaptopodin, and may also play a role in synaptic plasticity. The HUNK subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14070); members share this curated model.
