label: "DEXXQ-box helicase domain of HELZ. Helicase with zinc finger (HELZ) acts as a helicase that plays a role in RNA metabolism during development. HELZ is a member of the family I class of RNA helicases of the  DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXXQ-box helicase domain of HELZ. Helicase with zinc finger (HELZ) acts as a helicase that plays a role in RNA metabolism during development. HELZ is a member of the family I class of RNA helicases of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd18077); members share this curated model.
