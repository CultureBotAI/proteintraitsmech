label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 8 (KLHL8). KLHL8 is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex. The BCR(KLHL8) ubiquitin ligase complex mediates ubiquitination and degradation of RAPSN."
definition: >-
