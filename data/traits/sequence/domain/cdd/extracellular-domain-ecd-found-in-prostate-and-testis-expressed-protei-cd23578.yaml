identifier: CDD:cd23578
label: "extracellular domain (ECD) found in prostate and testis expressed protein 2 (PATE2) and similar proteins. PATE2 (also called PATE-like protein M (PATE-M)) is a member of the prostate and testis expression (PATE)-like family of proteins that likely play important roles in reproductive and neuronal physiology. They are expressed mainly in the male genital tract and involved in sperm-oolemma fusion and penetration, but not sperm-zona binding. PATE2 contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in prostate and testis expressed protein 2 (PATE2) and similar proteins. PATE2 (also called PATE-like protein M (PATE-M)) is a member of the prostate and testis expression (PATE)-like family of proteins that likely play important roles in reproductive and neuronal physiology. They are expressed mainly in the male genital tract and involved in sperm-oolemma fusion and penetration, but not sperm-zona binding. PATE2 contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23578); members share this curated model.
