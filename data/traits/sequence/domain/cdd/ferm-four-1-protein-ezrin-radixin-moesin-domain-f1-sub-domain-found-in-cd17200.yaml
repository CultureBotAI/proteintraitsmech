identifier: CDD:cd17200
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM domain-containing protein 4B (FRMD4B). FRMD4B, also termed GRP1-binding protein GRSP1, interacts with the coil-coil domain of ARF exchange factor GRP1 to form the Grsp1-Grp1 complex that co-localizes with cortical actin rich regions in response to stimulation of CHO-T cells with insulin or epidermal growth factor (EGF). FRMD4B contains a FERM protein interaction domain as well as two coiled coil domains and may therefore function as a scaffolding protein. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM domain-containing protein 4B (FRMD4B). FRMD4B, also termed GRP1-binding protein GRSP1, interacts with the coil-coil domain of ARF exchange factor GRP1 to form the Grsp1-Grp1 complex that co-localizes with cortical actin rich regions in response to stimulation of CHO-T cells with insulin or epidermal growth factor (EGF). FRMD4B contains a FERM protein interaction domain as well as two coiled coil domains and may therefore function as a scaffolding protein. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17200); members share this curated model.
