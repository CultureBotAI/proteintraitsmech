identifier: CDD:cd09266
label: "mu-homology domain (MHD) of Scr homology 3 (SH3)-domain growth factor receptor-bound 2 (GRB2)-like (endophilin) interacting protein 1 (also known as endophilin-3-interacting protein, SGIP1) and similar proteins. This family corresponds to the MHD found in mammalian neuronal-specific transcript SGIP1 and similar proteins. Unlike other members in this family, SGIP1 does not contain EFC/F-BAR domain, but does have a proline-rich domain (PRD) and a C-terminal MHD. It is an endophilin-interacting protein that plays an obligatory role in the regulation of energy homeostasis, and is also involved in clathrin-mediated endocytosis by interacting with phospholipids and eps15."
definition: >-
  mu-homology domain (MHD) of Scr homology 3 (SH3)-domain growth factor receptor-bound 2 (GRB2)-like (endophilin) interacting protein 1 (also known as endophilin-3-interacting protein, SGIP1) and similar proteins. This family corresponds to the MHD found in mammalian neuronal-specific transcript SGIP1 and similar proteins. Unlike other members in this family, SGIP1 does not contain EFC/F-BAR domain, but does have a proline-rich domain (PRD) and a C-terminal MHD. It is an endophilin-interacting protein that plays an obligatory role in the regulation of energy homeostasis, and is also involved in clathrin-mediated endocytosis by interacting with phospholipids and eps15. — an NCBI CDD conserved domain (cd09266); members share this curated model.
