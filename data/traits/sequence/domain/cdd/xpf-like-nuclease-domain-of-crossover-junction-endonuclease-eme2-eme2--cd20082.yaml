identifier: CDD:cd20082
label: "XPF-like nuclease domain of crossover junction endonuclease EME2. EME2 interacts with MUS81 to form a DNA structure-specific endonuclease which cleaves substrates such as 3'-flap structures. MUS81-EME2 is responsible for fork cleavage and restart in human cells. The MUS81-EME2 protein, whose actions are restricted to S phase, is also responsible for telomere maintenance in telomerase-negative ALT (Alternative Lengthening of Telomeres) cells. The nuclease domain of EME2 is a nuclease-like domain which is involved in targeting the MUS81-EME2 heterodimer complex to DNA."
definition: >-
  XPF-like nuclease domain of crossover junction endonuclease EME2. EME2 interacts with MUS81 to form a DNA structure-specific endonuclease which cleaves substrates such as 3'-flap structures. MUS81-EME2 is responsible for fork cleavage and restart in human cells. The MUS81-EME2 protein, whose actions are restricted to S phase, is also responsible for telomere maintenance in telomerase-negative ALT (Alternative Lengthening of Telomeres) cells. The nuclease domain of EME2 is a nuclease-like domain which is involved in targeting the MUS81-EME2 heterodimer complex to DNA. — an NCBI CDD conserved domain (cd20082); members share this curated model.
