identifier: CDD:cd24042
label: "nucleotide-binding domain (NBD) of Arabidopsis thaliana apyrases 3-6 (AtAPY3-6) and similar proteins. Apyrase (APY; EC 3.6.1.5), also called ATP-diphosphatase, ATP-diphosphohydrolase, adenosine diphosphatase, ADPase, NTPDase, or nucleoside triphosphate diphosphohydrolase, catalyzes the hydrolysis of phosphoanhydride bonds of nucleoside tri- and di-phosphates (NTPs and NDPs). AtAPY3-5 exhibits a single putative N-terminal transmembrane domain typical of type II membrane proteins, whereas AtAPY6 appears to possess both an N- and a C- terminal transmembrane domain and to be type IV-A membrane protein. AtAPY5 exhibits the highest specific activities for NDPs of all the Arabidopsis apyrases. AtAPY4 may have the lowest NDPase activity, exhibiting a substrate preference for CTP. AtAPY6 plays an endo-apyrase role and is important in pollen exine formation."
definition: >-
  nucleotide-binding domain (NBD) of Arabidopsis thaliana apyrases 3-6 (AtAPY3-6) and similar proteins. Apyrase (APY; EC 3.6.1.5), also called ATP-diphosphatase, ATP-diphosphohydrolase, adenosine diphosphatase, ADPase, NTPDase, or nucleoside triphosphate diphosphohydrolase, catalyzes the hydrolysis of phosphoanhydride bonds of nucleoside tri- and di-phosphates (NTPs and NDPs). AtAPY3-5 exhibits a single putative N-terminal transmembrane domain typical of type II membrane proteins, whereas AtAPY6 appears to possess both an N- and a C- terminal transmembrane domain and to be type IV-A membrane protein. AtAPY5 exhibits the highest specific activities for NDPs of all the Arabidopsis apyrases. AtAPY4 may have the lowest NDPase activity, exhibiting a substrate preference for CTP. AtAPY6 plays an endo-apyrase role and is important in pollen exine formation. — an NCBI CDD conserved domain (cd24042); members share this curated model.
