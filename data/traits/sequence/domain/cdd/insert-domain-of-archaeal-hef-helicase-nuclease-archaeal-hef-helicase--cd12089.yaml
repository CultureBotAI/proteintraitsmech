identifier: CDD:cd12089
label: "insert domain of Archaeal Hef helicase/nuclease. Archaeal Hef helicase/nuclease, originally identified in the hyperthermophilic archaeon Pyrococcus furiosus, contains an N-terminal SF2 helicase domain and a C-terminal XPF/Mus81-type nuclease domain. Hef has been shown to process flap- or fork-DNA structures, and that both helicase and nuclease domain independently recognize branched DNA, with a strong preference for the forked DNA. The SF2 helicase domain is comprised of 3 structural domains, the 2 generally conserved helicase domains and a helical domain inserted between the two domains. This domain which is not present in all SF2 helicases, has been shown to play an important role in branched structure processing."
definition: >-
  insert domain of Archaeal Hef helicase/nuclease. Archaeal Hef helicase/nuclease, originally identified in the hyperthermophilic archaeon Pyrococcus furiosus, contains an N-terminal SF2 helicase domain and a C-terminal XPF/Mus81-type nuclease domain. Hef has been shown to process flap- or fork-DNA structures, and that both helicase and nuclease domain independently recognize branched DNA, with a strong preference for the forked DNA. The SF2 helicase domain is comprised of 3 structural domains, the 2 generally conserved helicase domains and a helical domain inserted between the two domains. This domain which is not present in all SF2 helicases, has been shown to play an important role in branched structure processing. — an NCBI CDD conserved domain (cd12089); members share this curated model.
