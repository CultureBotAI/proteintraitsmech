identifier: CDD:cd24024
label: "nucleotide-binding domain (NBD) of Bacillus subtilis plasmid segregating actin AlfA and similar proteins from the ParM domain family. The family corresponds to a group of uncharacterized proteins similar to Bacillus subtilis plasmid segregating actin AlfA that forms ATP-dependent filaments both in vivo and in vitro. Unlike ParM, AlfA forms stable filaments that remain assembled indefinitely in the ADP-bound state, and it is structurally polar but grows at equal rates from both ends. In addition, AlfA lacks the canonical actin subdomain IIb, which plays important structural and functional roles in all other actins. Also, AlfA polymerization interfaces have diverged extensively from other actins, and AlfA binds ATP through completely novel interactions with the adenosine base."
definition: >-
  nucleotide-binding domain (NBD) of Bacillus subtilis plasmid segregating actin AlfA and similar proteins from the ParM domain family. The family corresponds to a group of uncharacterized proteins similar to Bacillus subtilis plasmid segregating actin AlfA that forms ATP-dependent filaments both in vivo and in vitro. Unlike ParM, AlfA forms stable filaments that remain assembled indefinitely in the ADP-bound state, and it is structurally polar but grows at equal rates from both ends. In addition, AlfA lacks the canonical actin subdomain IIb, which plays important structural and functional roles in all other actins. Also, AlfA polymerization interfaces have diverged extensively from other actins, and AlfA binds ATP through completely novel interactions with the adenosine base. — an NCBI CDD conserved domain (cd24024); members share this curated model.
