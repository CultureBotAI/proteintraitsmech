identifier: CDD:cd18644
label: "chromodomain of polycomb. CHRomatin Organization Modifier (chromo) domain of the PcG (polycomb-group) chromodomain protein Polycomb (Pc) from Drosophila melanogaster, anthropod, worm, and sea cucumber, and similar proteins. Pc is a component of the Polycomb-group (PcG) multiprotein PRC1 complex, a complex class required to maintain the transcriptionally repressive state of many genes, including Hox genes, throughout development. The core subunits of PRC1 are polycomb (Pc), polyhomeotic (Ph), posterior sex combs (Psc), and sex comb extra (Sce, also known as dRing). Polycomb (Pc) plays a role in modulating life span in flies, it negatively regulates longevity."
