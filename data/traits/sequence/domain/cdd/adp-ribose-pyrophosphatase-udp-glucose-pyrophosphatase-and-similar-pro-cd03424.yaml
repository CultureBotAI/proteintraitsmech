identifier: CDD:cd03424
label: "ADP-ribose pyrophosphatase, UDP-glucose pyrophosphatase, and similar proteins. ADP-ribose pyrophosphatase (ADPRase) ( NUDIX (Nucleoside diphosphate-linked moiety X)) motif 5; Nudt5) catalyzes the hydrolysis of ADP-ribose and a variety of additional ADP-sugar conjugates to AMP and ribose-5-phosphate. In humans, there are four distinct ADPRase activities, three putative cytosolic enzymes (ADPRase-I, -II, and -Mn) and a single mitochondrial enzyme (ADPRase-m). Human ADPRase-II is also referred to as NUDT5. It lacks the N-terminal target sequence unique to mitochondrial ADPRase. The different cytosolic types are distinguished by their specificities for substrate and specific requirement for metal ions. NUDT5 forms a homodimer. It also contains a highly conserved 23-residue NUDIX motif (GX5EX7REUXEEXGU, where U = I, L or V) which functions as a metal binding site/catalytic site. In addition to the NUDIX motif, there are additional conserved amino acid residues, distal from the signature sequence, that correlate with substrate specificity. UDP-glucose pyrophosphatase (UGPPase) (EC 3.6.1.45; also known as nucleoside diphosphate-linked moiety X)) motif 14; Nudt14) hydrolyzes the pyrophosphate of the nucleoside diphosphate sugar to generate glucose-1-P and UMP. In mammals, UDP-glucose is the glucosyl donor for the synthesis of the storage polysaccharide glycogen. UGPPase, as a regulator of UDP-glucose, could play a regulatory role, but it has been shown to prefer ADP-ribose over UDP-glucose. Like other members of the NUDIX hydrolase superfamily, it requires a divalent cation, such as Mg2+, for its activity. It also contains a highly conserved 23-residue NUDIX motif (GX5EX7REUXEEXGU, where U = I, L or V) which functions as a metal binding site/catalytic site."
definition: >-
  ADP-ribose pyrophosphatase, UDP-glucose pyrophosphatase, and similar proteins. ADP-ribose pyrophosphatase (ADPRase) ( NUDIX (Nucleoside diphosphate-linked moiety X)) motif 5; Nudt5) catalyzes the hydrolysis of ADP-ribose and a variety of additional ADP-sugar conjugates to AMP and ribose-5-phosphate. In humans, there are four distinct ADPRase activities, three putative cytosolic enzymes (ADPRase-I, -II, and -Mn) and a single mitochondrial enzyme (ADPRase-m). Human ADPRase-II is also referred to as NUDT5. It lacks the N-terminal target sequence unique to mitochondrial ADPRase. The different cytosolic types are distinguished by their specificities for substrate and specific requirement for metal ions. NUDT5 forms a homodimer. It also contains a highly conserved 23-residue NUDIX motif (GX5EX7REUXEEXGU, where U = I, L or V) which functions as a metal binding site/catalytic site. In addition to the NUDIX motif, there are additional conserved amino acid residues, distal from the signature sequence, that correlate with substrate specificity. UDP-glucose pyrophosphatase (UGPPase) (EC 3.6.1.45; also known as nucleoside diphosphate-linked moiety X)) motif 14; Nudt14) hydrolyzes the pyrophosphate of the nucleoside diphosphate sugar to generate glucose-1-P and UMP. In mammals, UDP-glucose is the glucosyl donor for the synthesis of the storage polysaccharide glycogen. UGPPase, as a regulator of UDP-glucose, could play a regulatory role, but it has been shown to prefer ADP-ribose over UDP-glucose. Like other members of the NUDIX hydrolase superfamily, it requires a divalent cation, such as Mg2+, for its activity. It also contains a highly conserved 23-residue NUDIX motif (GX5EX7REUXEEXGU, where U = I, L or V) which functions as a metal binding site/catalytic site. — an NCBI CDD conserved domain (cd03424); members share this curated model.
