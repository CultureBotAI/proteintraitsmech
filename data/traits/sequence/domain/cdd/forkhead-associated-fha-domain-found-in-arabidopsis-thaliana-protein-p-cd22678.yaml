identifier: CDD:cd22678
label: "forkhead associated (FHA) domain found in Arabidopsis thaliana protein phosphatase 2C 70 (AtPP2C70) and similar proteins. AtPP2C70, also called kinase-associated protein phosphatase, or protein ROOT ATTENUATED GROWTH 1, dephosphorylates the serine/threonine receptor-like kinase RLK5. It may function as a signaling component in a pathway involving RLK5. It acts as a negative regulator of the CLAVATA1 signaling in plant development by binding and dephosphorylating CLAVATA1. It is also a component of a signaling pathway which mediates adaptation to NaCl stress. It contains an FHA domain, which is a small phosphopeptide recognition module."
definition: >-
