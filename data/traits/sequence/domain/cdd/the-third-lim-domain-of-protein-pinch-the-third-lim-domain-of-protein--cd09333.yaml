identifier: CDD:cd09333
label: "The third LIM domain of protein PINCH. The third LIM domain of protein PINCH:  PINCH plays pivotal roles in the assembly of focal adhesions (FAs), regulating diverse functions in cell adhesion, growth, and differentiation through LIM-mediated protein-protein interactions. PINCH comprises an array of five LIM domains that interact with integrin-linked kinase (ILK), Nck2 (also called Nckbeta or Grb4) and other interaction partners.  These interactions are essential for triggering the FA assembly and for relaying diverse mechanical and biochemical signals between Cell-extracellular matrix and the actin cytoskeleton.  LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes."
definition: >-
  The third LIM domain of protein PINCH. The third LIM domain of protein PINCH: PINCH plays pivotal roles in the assembly of focal adhesions (FAs), regulating diverse functions in cell adhesion, growth, and differentiation through LIM-mediated protein-protein interactions. PINCH comprises an array of five LIM domains that interact with integrin-linked kinase (ILK), Nck2 (also called Nckbeta or Grb4) and other interaction partners. These interactions are essential for triggering the FA assembly and for relaying diverse mechanical and biochemical signals between Cell-extracellular matrix and the actin cytoskeleton. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes. — an NCBI CDD conserved domain (cd09333); members share this curated model.
