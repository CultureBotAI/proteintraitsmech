identifier: CDD:cd17908
label: "flagellar protein FliM. This family contains bacterial flagellar protein FliM which is localized in the flagellar switch complex along with FliG and FliY; all are present in many copies, and together they correspond structurally to the C-ring of the flagellar basal body. FliM does not contain the CheC consensus sequence of the phosphatase active site ([DS]xxxExxNx(22)P) and is not a CheY-P phosphatase. FliM sits in the center of the rotor with the N-terminal region interacting with the signaling protein, phosphorylated CheY (CheY-P). The activated form of CheY destabilizes the parallel arrangement of FliM molecules, and perturbs FliG alignment in a process that may reflect the onset of rotation switching. This suggests a model of C-ring assembly in which intermolecular contacts among FliG domains provide a template for FliM assembly. Recent data show that binding of FliM to spermine synthase, SpeE, contributes to flagellar motility, an association that is unique to Helicobacter species."
definition: >-
  flagellar protein FliM. This family contains bacterial flagellar protein FliM which is localized in the flagellar switch complex along with FliG and FliY; all are present in many copies, and together they correspond structurally to the C-ring of the flagellar basal body. FliM does not contain the CheC consensus sequence of the phosphatase active site ([DS]xxxExxNx(22)P) and is not a CheY-P phosphatase. FliM sits in the center of the rotor with the N-terminal region interacting with the signaling protein, phosphorylated CheY (CheY-P). The activated form of CheY destabilizes the parallel arrangement of FliM molecules, and perturbs FliG alignment in a process that may reflect the onset of rotation switching. This suggests a model of C-ring assembly in which intermolecular contacts among FliG domains provide a template for FliM assembly. Recent data show that binding of FliM to spermine synthase, SpeE, contributes to flagellar motility, an association that is unique to Helicobacter species. — an NCBI CDD conserved domain (cd17908); members share this curated model.
