identifier: CDD:cd13260
label: "RAS p21 protein activator (GTPase activating protein) 1 Pleckstrin homology (PH) domain. RASA1 (also called RasGap1 or p120) is a member of the RasGAP family of GTPase-activating proteins. RASA1 contains N-terminal SH2-SH3-SH2 domains, followed by two C2 domains, a PH domain, a RasGAP domain, and a BTK domain. Splice variants lack the N-terminal domains. It is a cytosolic vertebrate protein that acts as a suppressor of RAS via its C-terminal GAP domain function, enhancing the weak intrinsic GTPase activity of RAS proteins resulting in the inactive GDP-bound form of RAS, allowing control of cellular proliferation and differentiation. Additionally, it is involved in mitogenic signal transmission towards downstream interacting partners through its N-terminal SH2-SH3-SH2 domains. RASA1 interacts with a number of proteins including: G3BP1, SOCS3, ANXA6, Huntingtin, KHDRBS1, Src, EPHB3, EPH receptor B2, Insulin-like growth factor 1 receptor, PTK2B, DOK1, PDGFRB, HCK, Caveolin 2, DNAJA3, HRAS, GNB2L1 and NCK1. PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. They share little sequence conservation, but all have a common fold, which is electrostatically polarized. Less than 10% of PH domains bind phosphoinositide phosphates (PIPs) with high affinity and specificity. PH domains are distinguished from other PIP-binding domains by their specific high-affinity binding to PIPs with two vicinal phosphate groups: PtdIns(3,4)P2, PtdIns(4,5)P2 or PtdIns(3,4,5)P3 which results in targeting some PH domain proteins to the plasma membrane. A few display strong specificity in lipid binding. Any specificity is usually determined by loop regions or insertions in the N-terminus of the domain, which are not conserved across all PH domains. PH domains are found in cellular signaling proteins such as serine/threonine kinase, tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, as well as cytoskeletal associated molecules and in lipid associated enzymes."
definition: >-
  RAS p21 protein activator (GTPase activating protein) 1 Pleckstrin homology (PH) domain. RASA1 (also called RasGap1 or p120) is a member of the RasGAP family of GTPase-activating proteins. RASA1 contains N-terminal SH2-SH3-SH2 domains, followed by two C2 domains, a PH domain, a RasGAP domain, and a BTK domain. Splice variants lack the N-terminal domains. It is a cytosolic vertebrate protein that acts as a suppressor of RAS via its C-terminal GAP domain function, enhancing the weak intrinsic GTPase activity of RAS proteins resulting in the inactive GDP-bound form of RAS, allowing control of cellular proliferation and differentiation. Additionally, it is involved in mitogenic signal transmission towards downstream interacting partners through its N-terminal SH2-SH3-SH2 domains. RASA1 interacts with a number of proteins including: G3BP1, SOCS3, ANXA6, Huntingtin, KHDRBS1, Src, EPHB3, EPH receptor B2, Insulin-like growth factor 1 receptor, PTK2B, DOK1, PDGFRB, HCK, Caveolin 2, DNAJA3, HRAS, GNB2L1 and NCK1. PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. They share little sequence conservation, but all have a common fold, which is electrostatically polarized. Less than 10% of PH domains bind phosphoinositide phosphates (PIPs) with high affinity and specificity. PH domains are distinguished from other PIP-binding domains by their specific high-affinity binding to PIPs with two vicinal phosphate groups: PtdIns(3,4)P2, PtdIns(4,5)P2 or PtdIns(3,4,5)P3 which results in targeting some PH domain proteins to the plasma membrane. A few display strong specificity in lipid binding. Any specificity is usually determined by loop regions or insertions in the N-terminus of the domain, which are not conserved across all PH domains. PH domains are found in cellular signaling proteins such as serine/threonine kinase, tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, as well as cytoskeletal associated molecules and in lipid associated enzymes. — an NCBI CDD conserved domain (cd13260); members share this curated model.
