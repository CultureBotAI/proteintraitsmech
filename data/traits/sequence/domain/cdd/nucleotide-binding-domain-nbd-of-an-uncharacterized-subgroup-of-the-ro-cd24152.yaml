identifier: CDD:cd24152
label: "nucleotide-binding domain (NBD) of an uncharacterized subgroup of the ROK family. This subfamily is composed of uncharacterized proteins belonging to the the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities. Members of this subfamily lack the cysteine-rich zinc-binding motif, which presents in other ROK families."
definition: >-
  nucleotide-binding domain (NBD) of an uncharacterized subgroup of the ROK family. This subfamily is composed of uncharacterized proteins belonging to the the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities. Members of this subfamily lack the cysteine-rich zinc-binding motif, which presents in other ROK families. — an NCBI CDD conserved domain (cd24152); members share this curated model.
