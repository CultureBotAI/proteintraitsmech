identifier: CDD:cd17594
label: "phosphoacceptor receiver (REC) domain of VirG-like OmpR family response regulators. VirG is part of the VirA/VirG two-component system that regulates the expression of virulence (vir) genes. The histidine kinase VirA senses a phenolic wound response signal, undergoes autophosphorylation, and phosphorelays to the VirG response regulator, which induces transcription of the vir regulon. VirG belongs to the OmpR family of DNA-binding response regulators that contain N-terminal receiver (REC) and C-terminal DNA-binding winged helix-turn-helix effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of VirG-like OmpR family response regulators. VirG is part of the VirA/VirG two-component system that regulates the expression of virulence (vir) genes. The histidine kinase VirA senses a phenolic wound response signal, undergoes autophosphorylation, and phosphorelays to the VirG response regulator, which induces transcription of the vir regulon. VirG belongs to the OmpR family of DNA-binding response regulators that contain N-terminal receiver (REC) and C-terminal DNA-binding winged helix-turn-helix effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17594); members share this curated model.
