identifier: CDD:cd00502
label: "Type I 3-dehydroquinase, (3-dehydroquinate dehydratase or DHQase). Type I 3-dehydroquinase, (3-dehydroquinate dehydratase or DHQase). Catalyzes the cis-dehydration of 3-dehydroquinate via a covalent imine intermediate to produce dehydroshikimate. Dehydroquinase is the third enzyme in the shikimate pathway, which is involved in the biosynthesis of aromatic amino acids. Type I DHQase exists as a homodimer. Type II 3-dehydroquinase also catalyzes the same overall reaction, but is unrelated in terms of sequence and structure, and utilizes a completely different reaction mechanism."
definition: >-
  Type I 3-dehydroquinase, (3-dehydroquinate dehydratase or DHQase). Type I 3-dehydroquinase, (3-dehydroquinate dehydratase or DHQase). Catalyzes the cis-dehydration of 3-dehydroquinate via a covalent imine intermediate to produce dehydroshikimate. Dehydroquinase is the third enzyme in the shikimate pathway, which is involved in the biosynthesis of aromatic amino acids. Type I DHQase exists as a homodimer. Type II 3-dehydroquinase also catalyzes the same overall reaction, but is unrelated in terms of sequence and structure, and utilizes a completely different reaction mechanism. — an NCBI CDD conserved domain (cd00502); members share this curated model.
