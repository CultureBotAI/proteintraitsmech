identifier: CDD:cd23783
label: "RWD domain of Saccharomyces cerevisiae translation termination inhibitor protein ITT1 and related proteins. ITT1 is a novel protein inhibiting translation termination in Saccharomyces cerevisiae. It modulates the efficiency of translation termination, resulting in the readthrough of all three types of nonsense codons UAA, UAG and UGA. ITT1 modulates the efficiency of translation termination through physical interactions with two release factors eRF1 (Sup45) and eRF3 (Sup35). Deletion of the ITT1 gene increases yeast sensitivity to heavy metal, by modulating URE2 expression at the protein level; URE2 expression is critical to cell survival under heavy metal stress."
definition: >-
  RWD domain of Saccharomyces cerevisiae translation termination inhibitor protein ITT1 and related proteins. ITT1 is a novel protein inhibiting translation termination in Saccharomyces cerevisiae. It modulates the efficiency of translation termination, resulting in the readthrough of all three types of nonsense codons UAA, UAG and UGA. ITT1 modulates the efficiency of translation termination through physical interactions with two release factors eRF1 (Sup45) and eRF3 (Sup35). Deletion of the ITT1 gene increases yeast sensitivity to heavy metal, by modulating URE2 expression at the protein level; URE2 expression is critical to cell survival under heavy metal stress. — an NCBI CDD conserved domain (cd23783); members share this curated model.
