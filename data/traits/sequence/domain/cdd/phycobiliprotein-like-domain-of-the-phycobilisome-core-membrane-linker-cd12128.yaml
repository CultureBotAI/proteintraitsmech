identifier: CDD:cd12128
label: PBP_PBS-LCM
definition: >-
  Phycobiliprotein-like domain of the phycobilisome core-membrane linker polypeptide. phycobilisomes (PBSs) are the main light-harvesting complex in cyanobacteria and red algae, they consist of a central core and radiating rods and function to harvest and channel light energy toward the photosynthetic reaction centers (RCs) within the membrane. They are comprised of phycobiliproteins or chromophorylated proteins (PBPs) maintained together by linker polypeptides. LCM is a chromophore-bearing PBS linker protein; it facilitates PBS assembly and functionally connects the PBS to the chlorophyll-containing core-complexes in the photosynthetic membrane. In addition to being a linker polypeptide that stabilizes the PBS architecture, the LCM also serves as a terminal energy acceptor. The single phycocyanobilin (PCB) chromophore of LCM are one of two terminal energy transmitters that transfer excitations from the hundreds of chromophores of the PBS to the RCs within the membrane
