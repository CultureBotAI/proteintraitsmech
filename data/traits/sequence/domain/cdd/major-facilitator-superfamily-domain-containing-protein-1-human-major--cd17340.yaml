identifier: CDD:cd17340
label: "Major facilitator superfamily domain-containing protein 1. Human major facilitator superfamily domain-containing protein 1 (MFSD1) is also called smooth muscle cell-associated protein 4 (SMAP-4). The function of MFSD1 is still unknown. Its expression is affected by altered nutrient intake. During starvation, expression of MFSD1 is downregulated in anterior brain sections in mice while it is upregulated in the brainstem. In mice raised on high-fat diet, MFSD1 is specifically downregulated in brainstem and hypothalamus. MFSD1 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Major facilitator superfamily domain-containing protein 1. Human major facilitator superfamily domain-containing protein 1 (MFSD1) is also called smooth muscle cell-associated protein 4 (SMAP-4). The function of MFSD1 is still unknown. Its expression is affected by altered nutrient intake. During starvation, expression of MFSD1 is downregulated in anterior brain sections in mice while it is upregulated in the brainstem. In mice raised on high-fat diet, MFSD1 is specifically downregulated in brainstem and hypothalamus. MFSD1 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17340); members share this curated model.
