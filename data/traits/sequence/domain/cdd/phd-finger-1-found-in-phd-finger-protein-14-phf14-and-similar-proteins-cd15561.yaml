identifier: CDD:cd15561
label: "PHD finger 1 found in PHD finger protein 14 (PHF14) and similar proteins. PHF14 is a novel nuclear transcription factor that controls the proliferation of mesenchymal cells by directly repressing platelet-derived growth factor receptor-alpha (PDGFRalpha) expression. It also acts as an epigenetic regulator and plays an important role in the development of multiple organs in mammals. PHF14 contains three canonical plant homeodomain (PHD) fingers and a non-canonical extended PHD (ePHD) finger, Cys2HisCys5HisCys2His. It can interact with histones through its PHD fingers. The model corresponds to the first PHD finger."
definition: >-
  PHD finger 1 found in PHD finger protein 14 (PHF14) and similar proteins. PHF14 is a novel nuclear transcription factor that controls the proliferation of mesenchymal cells by directly repressing platelet-derived growth factor receptor-alpha (PDGFRalpha) expression. It also acts as an epigenetic regulator and plays an important role in the development of multiple organs in mammals. PHF14 contains three canonical plant homeodomain (PHD) fingers and a non-canonical extended PHD (ePHD) finger, Cys2HisCys5HisCys2His. It can interact with histones through its PHD fingers. The model corresponds to the first PHD finger. — an NCBI CDD conserved domain (cd15561); members share this curated model.
