identifier: CDD:cd09526
label: "SAM domain of Samd3 subfamily. SAM (sterile alpha motif) domain of the Samd3 subfamily is a putative protein-protein interaction domain. Proteins of this subfamily have a SAM domain at the N-terminus. SAM is a widespread domain in signaling and regulatory proteins. In many cases SAM mediates dimerization/oligomerization. Exact function of proteins belonging to this subfamily is unknown."
definition: >-
  SAM domain of Samd3 subfamily. SAM (sterile alpha motif) domain of the Samd3 subfamily is a putative protein-protein interaction domain. Proteins of this subfamily have a SAM domain at the N-terminus. SAM is a widespread domain in signaling and regulatory proteins. In many cases SAM mediates dimerization/oligomerization. Exact function of proteins belonging to this subfamily is unknown. — an NCBI CDD conserved domain (cd09526); members share this curated model.
