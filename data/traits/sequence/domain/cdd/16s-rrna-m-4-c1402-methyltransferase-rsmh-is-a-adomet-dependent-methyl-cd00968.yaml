identifier: CDD:cd00968
label: RsmH
definition: >-
  16S rRNA m(4)C1402 methyltransferase. RsmH is a AdoMet-dependent methyltransferase (MTase) specific for N(4)-methylation of C1402 in 16S rRNA. The N(4), 2'-O-dimethylcytidine (m(4)Cm) at position 1402 of the Escherichia coli 16S rRNA directly interacts with the P-site codon of the mRNA. RsmH is conserved in almost all bacterial species. Thsi group also contains human METTL15 and its relatives
