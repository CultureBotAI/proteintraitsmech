identifier: CDD:cd10827
label: "circularly permuted third PDZ domain (PDZ3) of Saccharomyces cerevisiae pro-apoptotic serine protease Nma111p and related domains. Third PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of the HtrA-type protease Saccharomyces cerevisiae Nma111p (also known as Ynm3p), and related domains. Nma111p is a nuclear serine protease which mediates apoptosis through proteolysis of the apoptotic inhibitor Bir1p. Nma111p is composed of two protease domains and four PDZ domains; its N-terminal half is comprised of a protease domain, followed by two PDZ domains, and its C-terminal half has a similar domain arrangement. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as A, B, C, alpha-helix 1, beta-strands D, E,  alpha-helix 2 and beta-strand F. This ScNma111-like PDZ3 domain is a circularly permuted PDZ domain which places beta-strand A on the C-terminus. Another permutation places both beta-strands A and B on the C-terminus."
definition: >-
  circularly permuted third PDZ domain (PDZ3) of Saccharomyces cerevisiae pro-apoptotic serine protease Nma111p and related domains. Third PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of the HtrA-type protease Saccharomyces cerevisiae Nma111p (also known as Ynm3p), and related domains. Nma111p is a nuclear serine protease which mediates apoptosis through proteolysis of the apoptotic inhibitor Bir1p. Nma111p is composed of two protease domains and four PDZ domains; its N-terminal half is comprised of a protease domain, followed by two PDZ domains, and its C-terminal half has a similar domain arrangement. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. This ScNma111-like PDZ3 domain is a circularly permuted PDZ domain which places beta-strand A on the C-terminus. Another permutation places both beta-strands A and B on the C-terminus. — an NCBI CDD conserved domain (cd10827); members share this curated model.
