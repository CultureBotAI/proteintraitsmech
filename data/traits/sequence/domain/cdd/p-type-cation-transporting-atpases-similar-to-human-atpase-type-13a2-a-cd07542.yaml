identifier: CDD:cd07542
label: "P-type cation-transporting ATPases, similar to human ATPase type 13A2 (ATP13A2) protein and Saccharomyces cerevisiae Ypk9p. Saccharomyces cerevisiae Yph9p localizes to the yeast vacuole and may play a role in sequestering heavy metal ions, its deletion confers sensitivity for growth for cadmium, manganese, nickel or selenium. Human ATP13A2 (PARK9/CLN12) is a lysosomal transporter with zinc as the possible substrate. Mutation in the ATP13A2 gene has been linked to Parkinson's disease and Kufor-Rakeb syndrome, and to neuronal ceroid lipofuscinoses. ATP13A3/AFURS1 is a candidate gene for oculo auriculo vertebral spectrum (OAVS), being one of nine genes included in a 3q29 microduplication in a patient with OAVS. Mutation in the human ATP13A4 may be involved in a speech-language disorder. This subfamily also includes zebrafish ATP13A2 a lysosome-specific transmembrane ATPase protein of unknown function which plays a crucial role during embryonic development, its deletion is lethal.  This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle."
definition: >-
  P-type cation-transporting ATPases, similar to human ATPase type 13A2 (ATP13A2) protein and Saccharomyces cerevisiae Ypk9p. Saccharomyces cerevisiae Yph9p localizes to the yeast vacuole and may play a role in sequestering heavy metal ions, its deletion confers sensitivity for growth for cadmium, manganese, nickel or selenium. Human ATP13A2 (PARK9/CLN12) is a lysosomal transporter with zinc as the possible substrate. Mutation in the ATP13A2 gene has been linked to Parkinson's disease and Kufor-Rakeb syndrome, and to neuronal ceroid lipofuscinoses. ATP13A3/AFURS1 is a candidate gene for oculo auriculo vertebral spectrum (OAVS), being one of nine genes included in a 3q29 microduplication in a patient with OAVS. Mutation in the human ATP13A4 may be involved in a speech-language disorder. This subfamily also includes zebrafish ATP13A2 a lysosome-specific transmembrane ATPase protein of unknown function which plays a crucial role during embryonic development, its deletion is lethal. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle. — an NCBI CDD conserved domain (cd07542); members share this curated model.
