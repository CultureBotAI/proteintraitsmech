identifier: CDD:cd07277
label: "The phosphoinositide binding Phox Homology domain of uncharacterized proteins containing PX and RUN domains. The PX domain is a phosphoinositide (PI) binding module involved in targeting proteins to PI-enriched membranes. Members in this subfamily are uncharacterized proteins containing an N-terminal RUN domain and a C-terminal PX domain. PX domain harboring proteins have been implicated in highly diverse functions such as cell signaling, vesicular trafficking, protein sorting, lipid modification, cell polarity and division, activation of T and B cells, and cell survival. In addition to protein-lipid interaction, the PX domain may also be involved in protein-protein interaction. The RUN domain is found in GTPases in the Rap and Rab families and may play a role in Ras-like signaling pathways."
definition: >-
  The phosphoinositide binding Phox Homology domain of uncharacterized proteins containing PX and RUN domains. The PX domain is a phosphoinositide (PI) binding module involved in targeting proteins to PI-enriched membranes. Members in this subfamily are uncharacterized proteins containing an N-terminal RUN domain and a C-terminal PX domain. PX domain harboring proteins have been implicated in highly diverse functions such as cell signaling, vesicular trafficking, protein sorting, lipid modification, cell polarity and division, activation of T and B cells, and cell survival. In addition to protein-lipid interaction, the PX domain may also be involved in protein-protein interaction. The RUN domain is found in GTPases in the Rap and Rab families and may play a role in Ras-like signaling pathways. — an NCBI CDD conserved domain (cd07277); members share this curated model.
