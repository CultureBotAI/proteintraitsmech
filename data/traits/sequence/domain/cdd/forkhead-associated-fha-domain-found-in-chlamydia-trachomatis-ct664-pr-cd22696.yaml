identifier: CDD:cd22696
label: "forkhead associated (FHA) domain found in Chlamydia trachomatis Ct664 protein and similar proteins. This subfamily corresponds to a group of uncharacterized FHA domain-containing proteins which show high sequence similarity with Chlamydia trachomatis Ct664 protein. Ct664 situates within the type III secretion system cluster that also encodes an STPK (CT673 in C. trachomatis), suggesting a role of CT664 in the chlamydial type III secretion system by mediating phosphorylation-dependent protein-protein interactions. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in Chlamydia trachomatis Ct664 protein and similar proteins. This subfamily corresponds to a group of uncharacterized FHA domain-containing proteins which show high sequence similarity with Chlamydia trachomatis Ct664 protein. Ct664 situates within the type III secretion system cluster that also encodes an STPK (CT673 in C. trachomatis), suggesting a role of CT664 in the chlamydial type III secretion system by mediating phosphorylation-dependent protein-protein interactions. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22696); members share this curated model.
