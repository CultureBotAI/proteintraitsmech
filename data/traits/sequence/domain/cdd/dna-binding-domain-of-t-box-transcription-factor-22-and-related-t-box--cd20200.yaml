identifier: CDD:cd20200
label: "DNA-binding domain of T-box transcription factor 22 and related T-box proteins. TBX22 is a transcriptional regulator involved in developmental processes. Mutations in the T-Box transcription factor gene TBX22 are found in X-linked Cleft Palate with or without Ankyloglossia syndrome (CPX syndrome). TBX22 mutation is also associated with cleft lip and palate, and tooth agenesis. This subgroup belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is Brachyury (also known as TBXT, or T). T-box family members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns."
definition: >-
  DNA-binding domain of T-box transcription factor 22 and related T-box proteins. TBX22 is a transcriptional regulator involved in developmental processes. Mutations in the T-Box transcription factor gene TBX22 are found in X-linked Cleft Palate with or without Ankyloglossia syndrome (CPX syndrome). TBX22 mutation is also associated with cleft lip and palate, and tooth agenesis. This subgroup belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is Brachyury (also known as TBXT, or T). T-box family members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns. — an NCBI CDD conserved domain (cd20200); members share this curated model.
