identifier: CDD:cd19385
label: TGF_beta_TGFB2
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in transforming growth factor beta-2 (TGF-beta-2) and similar proteins. TGF-beta-2, also termed BSC-1 cell growth inhibitor, or cetermin, or glioblastoma-derived T-cell suppressor factor (G-TSF), or polyergin, is a polypeptide member of the transforming growth factor beta superfamily of cytokines. It is a secreted protein that performs many cellular functions and has a vital role during embryonic development. It can suppress the effects of interleukin-2 dependent T-cell growth
