identifier: CDD:cd18201
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 10 (ZBTB10). ZBTB10, also called zinc finger protein RIN ZF, is an mRNA target of miR-27a and a transcriptional repressor of Specificity protein (Sp) expression. The microRNA-27a:ZBTB10-specificity protein pathway is involved in follicle stimulating hormone-induced VEGF, Cox2, and survivin expression in ovarian epithelial cancer cells. ZBTB10 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 10 (ZBTB10). ZBTB10, also called zinc finger protein RIN ZF, is an mRNA target of miR-27a and a transcriptional repressor of Specificity protein (Sp) expression. The microRNA-27a:ZBTB10-specificity protein pathway is involved in follicle stimulating hormone-induced VEGF, Cox2, and survivin expression in ovarian epithelial cancer cells. ZBTB10 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18201); members share this curated model.
