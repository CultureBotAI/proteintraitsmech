identifier: CDD:cd10210
label: "nucleotide-binding domain (NBD) of actin-related protein6 (Arp6) and similar proteins. Arp6, also called actin-like protein 6, is required for formation and/or maintenance of proper nucleolar structure and function, plays a dual role in the regulation of ribosomal DNA (rDNA) transcription. In the presence of high glucose, Arp6 maintains active rDNA transcription through H2A.Z deposition and under glucose starvation, it is required for the repression of rDNA transcription, and this function may be independent of H2A.Z. Arp6 is also required for telomere silencing in both fission and budding yeast. It is a component of the budding yeast and Arabidopsis SWR1 complex (SWR1C) and the human SWI2/SNF2-related CBP activator protein (SRCAP) chromatin remodeling complexes which catalyze the exchange of the histone H2A with the H2AZ. Drosophila Arp6 colocalizes with HP1 (heterochromatin protein 1) in the pericentric heterochromatin, and vertebrate Arp6 also interacts with HP1. Human Arp6 is encoded by the ACTR6 gene. Arabidopsis thaliana ACTIN RELATED PROTEIN 6/EARLY IN SHORT DAYS 1/SUPPRESSOR OF FRIGIDA 3 (encoded by ARP6/ESD1/SUF3) participates in regulating several leaf and flower development stages. It is needed for Flowering locus C (FLC, the master repressor of flowering) and FLC-like gene expression in the shoot and root apex, and for the activity of the floral repressor pathway."
definition: >-
  nucleotide-binding domain (NBD) of actin-related protein6 (Arp6) and similar proteins. Arp6, also called actin-like protein 6, is required for formation and/or maintenance of proper nucleolar structure and function, plays a dual role in the regulation of ribosomal DNA (rDNA) transcription. In the presence of high glucose, Arp6 maintains active rDNA transcription through H2A.Z deposition and under glucose starvation, it is required for the repression of rDNA transcription, and this function may be independent of H2A.Z. Arp6 is also required for telomere silencing in both fission and budding yeast. It is a component of the budding yeast and Arabidopsis SWR1 complex (SWR1C) and the human SWI2/SNF2-related CBP activator protein (SRCAP) chromatin remodeling complexes which catalyze the exchange of the histone H2A with the H2AZ. Drosophila Arp6 colocalizes with HP1 (heterochromatin protein 1) in the pericentric heterochromatin, and vertebrate Arp6 also interacts with HP1. Human Arp6 is encoded by the ACTR6 gene. Arabidopsis thaliana ACTIN RELATED PROTEIN 6/EARLY IN SHORT DAYS 1/SUPPRESSOR OF FRIGIDA 3 (encoded by ARP6/ESD1/SUF3) participates in regulating several leaf and flower development stages. It is needed for Flowering locus C (FLC, the master repressor of flowering) and FLC-like gene expression in the shoot and root apex, and for the activity of the floral repressor pathway. — an NCBI CDD conserved domain (cd10210); members share this curated model.
