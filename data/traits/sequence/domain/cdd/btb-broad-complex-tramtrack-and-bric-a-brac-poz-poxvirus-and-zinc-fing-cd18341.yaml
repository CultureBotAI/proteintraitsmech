identifier: CDD:cd18341
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 41 (KLHL41). KLHL41 is also called Kel-like protein 23, Kelch repeat and BTB domain-containing protein 10 (KBTBD10), Kelch-related protein 1 (Krp1), or sarcosine. It is a novel kelch-related protein that is involved in pseudopod elongation in transformed cells. It is also involved in skeletal muscle development and differentiation. It regulates proliferation and differentiation of myoblasts and plays a role in myofibril assembly by promoting lateral fusion of adjacent thin fibrils into mature, wide myofibrils. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 41 (KLHL41). KLHL41 is also called Kel-like protein 23, Kelch repeat and BTB domain-containing protein 10 (KBTBD10), Kelch-related protein 1 (Krp1), or sarcosine. It is a novel kelch-related protein that is involved in pseudopod elongation in transformed cells. It is also involved in skeletal muscle development and differentiation. It regulates proliferation and differentiation of myoblasts and plays a role in myofibril assembly by promoting lateral fusion of adjacent thin fibrils into mature, wide myofibrils. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18341); members share this curated model.
