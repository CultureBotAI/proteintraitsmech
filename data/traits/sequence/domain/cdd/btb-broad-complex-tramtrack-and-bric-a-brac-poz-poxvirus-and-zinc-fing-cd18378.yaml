identifier: CDD:cd18378
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in KCNB/Kv2 subfamily of Shab-type voltage-dependent potassium channels. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. The potassium voltage-gated channel subfamily Kv3, also known as subfamily C, contains two alpha subunit members, Kv2.1 (KCNB1) and Kv2.2 (KCNB2), which are orthologs of the Shab gene in Drosophila. They are delayed-rectifier potassium currents in various neurons, although their physiological roles often remain elusive. Kv2/KCNB subfamily alpha subunits form functional homo- or hetero-tetrameric channels (with other alpha subunits) through their BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in KCNB/Kv2 subfamily of Shab-type voltage-dependent potassium channels. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. The potassium voltage-gated channel subfamily Kv3, also known as subfamily C, contains two alpha subunit members, Kv2.1 (KCNB1) and Kv2.2 (KCNB2), which are orthologs of the Shab gene in Drosophila. They are delayed-rectifier potassium currents in various neurons, although their physiological roles often remain elusive. Kv2/KCNB subfamily alpha subunits form functional homo- or hetero-tetrameric channels (with other alpha subunits) through their BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif. — an NCBI CDD conserved domain (cd18378); members share this curated model.
