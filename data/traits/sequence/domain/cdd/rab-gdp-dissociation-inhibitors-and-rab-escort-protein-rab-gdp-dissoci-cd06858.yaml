identifier: CDD:cd06858
label: "Rab GDP dissociation inhibitors and Rab escort protein. Rab GDP dissociation inhibitors (GDI) and Rab escort protein (REP) are homologous and both bind RabGTPase, a key regulator of intracellular vesicular transport, but they have different functions during recycling of Rab proteins between membrane compartments. GDI retrieves RabGTPase from the membranes and REP assists in Rab prenylation which targets Rab to the membrane."
definition: >-
  Rab GDP dissociation inhibitors and Rab escort protein. Rab GDP dissociation inhibitors (GDI) and Rab escort protein (REP) are homologous and both bind RabGTPase, a key regulator of intracellular vesicular transport, but they have different functions during recycling of Rab proteins between membrane compartments. GDI retrieves RabGTPase from the membranes and REP assists in Rab prenylation which targets Rab to the membrane. — an NCBI CDD conserved domain (cd06858); members share this curated model.
