identifier: CDD:cd07280
label: "The phosphoinositide binding Phox Homology domain of the fungal protein YPT35. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions such as cell signaling, vesicular trafficking, protein sorting, and lipid modification, among others. This subfamily is composed of YPT35 proteins from the fungal subkingdom Dikarya. The PX domain is involved in targeting of proteins to PI-enriched membranes, and may also be involved in protein-protein interaction. The PX domain of YPT35 binds to phosphatidylinositol 3-phosphate (PI3P). It also serves as a protein interaction domain, binding to members of the Yip1p protein family, which localize to the ER and Golgi. YPT35 is mainly associated with endosomes and together with Yip1p proteins, may be involved in a specific function in the endocytic pathway."
definition: >-
