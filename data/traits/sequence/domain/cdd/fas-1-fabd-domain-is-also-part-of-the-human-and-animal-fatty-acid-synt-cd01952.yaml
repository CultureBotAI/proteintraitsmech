identifier: CDD:cd01952
label: FAS_1
definition: >-
  FAS_1. FabD domain is also part of the human and animal fatty acid synthase (FAS). The human FAS is a dimmer of two identical multifunctional proteins arranged in antiparallel configuration. FAS catalyzes the synthesis of long chain saturated fatty acid - palmitate, in the presence of acetyl-CoA as the primer, malonyl-CoA as the two-carbon donor, and NADPH as the source of various intermediates produced
