identifier: CDD:cd21626
label: "N-terminal domain of the S1 subunit of the Spike (S) protein from Middle East respiratory syndrome-related coronavirus and related betacoronaviruses in the C lineage. This subfamily contains the N-terminal domain (NTD) of the S1 subunit of the Spike (S) proteins from betacoronaviruses in the merbecovirus subgenera (C lineage), including the highly pathogenic human coronavirus (CoV), Middle East respiratory syndrome (MERS)-related CoV, and related bat CoVs. The CoV S protein is an envelope glycoprotein that plays the most important role in viral attachment, fusion, and entry into host cells, and serves as a major target for the development of neutralizing antibodies, inhibitors of viral entry, and vaccines. It is synthesized as a precursor protein that is cleaved into an N-terminal S1 subunit (~700 amino acids) and a C-terminal S2 subunit (~600 amino acids) that mediates attachment and membrane fusion, respectively. Three S1/S2 heterodimers assemble to form a trimer spike protruding from the viral envelope. The S1 subunit contains a receptor-binding domain (RBD), while the S2 subunit contains a hydrophobic fusion peptide and two heptad repeat regions. S1 contains two structurally independent domains, the N-terminal domain (NTD) and the C-terminal domain (C-domain). Depending on the virus, either the NTD or the C-domain can serve as the receptor-binding domain (RBD). Most CoVs, including MERS-CoV, use the C-domain to bind their receptors. Despite using the C-domain as its receptor, neutralizing antibodies targeting MERS-CoV S1-NTD have been reported, including human antibody CDC2-A2, murine antibodies G2 and 5F9, and macaque antibodies FIB-H1 and JC57-13. G2 has been shown to strongly disrupt the attachment of MERS-CoV S to its receptor, dipeptidyl peptidase-4 (DPP4). In addition, the S1 NTD contributes to the Spike trimer interface."
definition: >-
  N-terminal domain of the S1 subunit of the Spike (S) protein from Middle East respiratory syndrome-related coronavirus and related betacoronaviruses in the C lineage. This subfamily contains the N-terminal domain (NTD) of the S1 subunit of the Spike (S) proteins from betacoronaviruses in the merbecovirus subgenera (C lineage), including the highly pathogenic human coronavirus (CoV), Middle East respiratory syndrome (MERS)-related CoV, and related bat CoVs. The CoV S protein is an envelope glycoprotein that plays the most important role in viral attachment, fusion, and entry into host cells, and serves as a major target for the development of neutralizing antibodies, inhibitors of viral entry, and vaccines. It is synthesized as a precursor protein that is cleaved into an N-terminal S1 subunit (~700 amino acids) and a C-terminal S2 subunit (~600 amino acids) that mediates attachment and membrane fusion, respectively. Three S1/S2 heterodimers assemble to form a trimer spike protruding from the viral envelope. The S1 subunit contains a receptor-binding domain (RBD), while the S2 subunit contains a hydrophobic fusion peptide and two heptad repeat regions. S1 contains two structurally independent domains, the N-terminal domain (NTD) and the C-terminal domain (C-domain). Depending on the virus, either the NTD or the C-domain can serve as the receptor-binding domain (RBD). Most CoVs, including MERS-CoV, use the C-domain to bind their receptors. Despite using the C-domain as its receptor, neutralizing antibodies targeting MERS-CoV S1-NTD have been reported, including human antibody CDC2-A2, murine antibodies G2 and 5F9, and macaque antibodies FIB-H1 and JC57-13. G2 has been shown to strongly disrupt the attachment of MERS-CoV S to its receptor, dipeptidyl peptidase-4 (DPP4). In addition, the S1 NTD contributes to the Spike trimer interface. — an NCBI CDD conserved domain (cd21626); members share this curated model.
