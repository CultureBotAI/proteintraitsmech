identifier: CDD:cd19569
label: "serpin family B member 10, bomapin. Bomapin (also called proteinase inhibitor 10/PI10) is a hematopoietic- and myeloid leukaemia-specific protease inhibitor which is thought to augment proliferation or apoptosis of leukemia cells, depending on growth factor availability. Bomapin is expressed only in bone marrow, leukocytes of patients with myeloid leukaemia that correspond to myeloid progenitors, and promyelocytic leukaemia cell lines (HL60, THP1, and AML-193), but it is not present in terminally differentiated leukocytes. The ovalbumin family of serpins (ov-serpins) is a family of closely related proteins, whose members can be secreted (ovalbumin), cytosolic (leukocyte elastase inhibitor, LEI), or targeted to both compartments (plasminogen activator inhibitor 2, PAI-2). It also characterized by N- and C-terminal extensions, the absence of a signal peptide, and a Ser rather than an Asn residue at the penultimate position. The ov-serpins corresponds to clade B of the serpin superfamily. In general, SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants can cause blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
definition: >-
  serpin family B member 10, bomapin. Bomapin (also called proteinase inhibitor 10/PI10) is a hematopoietic- and myeloid leukaemia-specific protease inhibitor which is thought to augment proliferation or apoptosis of leukemia cells, depending on growth factor availability. Bomapin is expressed only in bone marrow, leukocytes of patients with myeloid leukaemia that correspond to myeloid progenitors, and promyelocytic leukaemia cell lines (HL60, THP1, and AML-193), but it is not present in terminally differentiated leukocytes. The ovalbumin family of serpins (ov-serpins) is a family of closely related proteins, whose members can be secreted (ovalbumin), cytosolic (leukocyte elastase inhibitor, LEI), or targeted to both compartments (plasminogen activator inhibitor 2, PAI-2). It also characterized by N- and C-terminal extensions, the absence of a signal peptide, and a Ser rather than an Asn residue at the penultimate position. The ov-serpins corresponds to clade B of the serpin superfamily. In general, SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants can cause blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans. — an NCBI CDD conserved domain (cd19569); members share this curated model.
