identifier: CDD:cd22440
label: "type I K homology (KH) RNA-binding domain found in KHDC1-like family. The KHDC1-like family corresponds to a group of structurally related proteins characterized by an atypical RNA-binding KH domain. They are unique to eutherian mammals and specifically expressed in oocytes and/or embryonic stem cells. Family members include KH homology domain-containing protein 1 (KHDC1), KHDC1-like protein (KHDC1L), KHDC3-like protein (KHDC3L, also called ES cell-associated transcript 1 protein or ECAT1), developmental pluripotency-associated 5 protein (DPPA5, also called embryonal stem cell-specific gene 1 protein or ESG-1), Oocyte-expressed protein (OOEP, also called KH homology domain-containing protein 2 or KHDC2, or Oocyte- and embryo-specific protein 19 or OEP19). KHDC3L is essential for human oocyte maturation and pre-implantation development of the resulting embryos. DPPA5 is involved in the maintenance of embryonic stem (ES) cell pluripotency. OOEP plays an essential role for zygotes to progress beyond the first embryonic cell divisions."
definition: >-
  type I K homology (KH) RNA-binding domain found in KHDC1-like family. The KHDC1-like family corresponds to a group of structurally related proteins characterized by an atypical RNA-binding KH domain. They are unique to eutherian mammals and specifically expressed in oocytes and/or embryonic stem cells. Family members include KH homology domain-containing protein 1 (KHDC1), KHDC1-like protein (KHDC1L), KHDC3-like protein (KHDC3L, also called ES cell-associated transcript 1 protein or ECAT1), developmental pluripotency-associated 5 protein (DPPA5, also called embryonal stem cell-specific gene 1 protein or ESG-1), Oocyte-expressed protein (OOEP, also called KH homology domain-containing protein 2 or KHDC2, or Oocyte- and embryo-specific protein 19 or OEP19). KHDC3L is essential for human oocyte maturation and pre-implantation development of the resulting embryos. DPPA5 is involved in the maintenance of embryonic stem (ES) cell pluripotency. OOEP plays an essential role for zygotes to progress beyond the first embryonic cell divisions. — an NCBI CDD conserved domain (cd22440); members share this curated model.
