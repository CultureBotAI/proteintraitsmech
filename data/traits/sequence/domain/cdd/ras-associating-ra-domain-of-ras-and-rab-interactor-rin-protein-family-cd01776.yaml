identifier: CDD:cd01776
label: "Ras-associating (RA) domain of Ras and Rab interactor (Rin) protein family. Family of Ras-interaction/interference (Rin) proteins, also known as Ras and Rab interactors, is composed of Rin1, Rin2, and Rin3, which have multifunctional domains, including SH2 and proline-rich domains in the N-terminal region, and RH, VPS9, and RA domains in the C-terminal region. RA domain-containing proteins function by interacting with Ras proteins directly or indirectly and are involved in several different functions ranging from tumor suppression to being oncoproteins. Ras proteins are small GTPases that are involved in cellular signal transduction. The RA domain has the beta-grasp ubiquitin-like (Ubl) fold with low sequence similarity to ubiquitin; ubiquitin is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair. The RA domains of Rin1, Rin2, and Rin3 are well conserved and they all have Ras binding characteristics."
definition: >-
  Ras-associating (RA) domain of Ras and Rab interactor (Rin) protein family. Family of Ras-interaction/interference (Rin) proteins, also known as Ras and Rab interactors, is composed of Rin1, Rin2, and Rin3, which have multifunctional domains, including SH2 and proline-rich domains in the N-terminal region, and RH, VPS9, and RA domains in the C-terminal region. RA domain-containing proteins function by interacting with Ras proteins directly or indirectly and are involved in several different functions ranging from tumor suppression to being oncoproteins. Ras proteins are small GTPases that are involved in cellular signal transduction. The RA domain has the beta-grasp ubiquitin-like (Ubl) fold with low sequence similarity to ubiquitin; ubiquitin is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair. The RA domains of Rin1, Rin2, and Rin3 are well conserved and they all have Ras binding characteristics. — an NCBI CDD conserved domain (cd01776); members share this curated model.
