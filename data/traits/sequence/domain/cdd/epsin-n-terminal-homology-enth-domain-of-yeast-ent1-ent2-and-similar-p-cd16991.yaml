identifier: CDD:cd16991
label: "Epsin N-Terminal Homology (ENTH) domain of Yeast Ent1, Ent2, and similar proteins. This subfamily is composed of the two orthologs of epsin in Saccharomyces cerevisiae, Epsin-1 (Ent1 or Ent1p) and Epsin-2 (Ent2 or Ent2p), and similar proteins. Yeast single epsin knockouts, either Ent1 and Ent2, are viable while the double knockout is not. Yeast epsins are required for endocytosis and localization of actin. Ent2 also plays a signaling role during cell division. The ENTH domain of Ent2 interacts with the septin organizing, Cdc42 GTPase activating protein, Bem3, leading to increased cytokinesis failure when overexpressed. Yeast epsins contain an Epsin N-Terminal Homology (ENTH) domain, an evolutionarily conserved protein module found primarily in proteins that participate in clathrin-mediated endocytosis. ENTH domain is highly similar to the N-terminal region of the AP180 N-Terminal Homology (ANTH_N) domain. ENTH and ANTH_N domains are structurally similar to the VHS domain and are composed of a superhelix of eight alpha helices. ENTH domains bind both, inositol phospholipids with preference for PtdIns(4,5)P2, and proteins, and contribute to the nucleation and formation of clathrin coats on membranes. ENTH domains also function in the development of membrane curvature through lipid remodeling during the formation of clathrin-coated vesicles. ENTH and ANTH (E/ANTH)-containing proteins have recently been shown to function with adaptor protein-1 and GGA adaptors at the Trans-Golgi Network, which suggests that E/ANTH domains are universal components of the machinery for clathrin-mediated membrane budding."
definition: >-
  Epsin N-Terminal Homology (ENTH) domain of Yeast Ent1, Ent2, and similar proteins. This subfamily is composed of the two orthologs of epsin in Saccharomyces cerevisiae, Epsin-1 (Ent1 or Ent1p) and Epsin-2 (Ent2 or Ent2p), and similar proteins. Yeast single epsin knockouts, either Ent1 and Ent2, are viable while the double knockout is not. Yeast epsins are required for endocytosis and localization of actin. Ent2 also plays a signaling role during cell division. The ENTH domain of Ent2 interacts with the septin organizing, Cdc42 GTPase activating protein, Bem3, leading to increased cytokinesis failure when overexpressed. Yeast epsins contain an Epsin N-Terminal Homology (ENTH) domain, an evolutionarily conserved protein module found primarily in proteins that participate in clathrin-mediated endocytosis. ENTH domain is highly similar to the N-terminal region of the AP180 N-Terminal Homology (ANTH_N) domain. ENTH and ANTH_N domains are structurally similar to the VHS domain and are composed of a superhelix of eight alpha helices. ENTH domains bind both, inositol phospholipids with preference for PtdIns(4,5)P2, and proteins, and contribute to the nucleation and formation of clathrin coats on membranes. ENTH domains also function in the development of membrane curvature through lipid remodeling during the formation of clathrin-coated vesicles. ENTH and ANTH (E/ANTH)-containing proteins have recently been shown to function with adaptor protein-1 and GGA adaptors at the Trans-Golgi Network, which suggests that E/ANTH domains are universal components of the machinery for clathrin-mediated membrane budding. — an NCBI CDD conserved domain (cd16991); members share this curated model.
