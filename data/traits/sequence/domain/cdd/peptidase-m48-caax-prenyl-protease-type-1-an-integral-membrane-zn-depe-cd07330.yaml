identifier: CDD:cd07330
label: "Peptidase M48 CaaX prenyl protease type 1, an integral membrane, Zn-dependent protein. This family of M48 CaaX prenyl protease 1-like family includes a number of well characterized genes such as those found in Taenia solium metacestode (TsSte24p), Arabidopsis (AtSte24), yeast Ste24p and human (Hs Ste24p) as well as several uncharacterized genes such as YhfN, some of which also containing tetratricopeptide (TPR) repeats. All members of this family contain the zinc metalloprotease motif (HEXXH), likely exposed on the cytoplasmic side. They are thought to be intimately associated with the endoplasmic reticulum (ER), regardless of whether their genes possess the conventional signal motif (KKXX) in the C-terminal. Proteins in this family proteolytically remove the C-terminal three residues of farnesylated proteins. The gene ZmpSte24, also known as FACE-1 in humans, a member of this family, is involved in the post-translational processing of prelamin A to mature lamin A, a major component of the nuclear envelope. ZmpSte24 deficiency causes an accumulation of prelamin A leading to lipodystrophy and other disease phenotypes while mutations in the protein lead to diseases of lamin processing (laminopathies), such as premature aging disease progeria and metabolic disorders. Some of these mutations map to the peptide-binding site."
definition: >-
  Peptidase M48 CaaX prenyl protease type 1, an integral membrane, Zn-dependent protein. This family of M48 CaaX prenyl protease 1-like family includes a number of well characterized genes such as those found in Taenia solium metacestode (TsSte24p), Arabidopsis (AtSte24), yeast Ste24p and human (Hs Ste24p) as well as several uncharacterized genes such as YhfN, some of which also containing tetratricopeptide (TPR) repeats. All members of this family contain the zinc metalloprotease motif (HEXXH), likely exposed on the cytoplasmic side. They are thought to be intimately associated with the endoplasmic reticulum (ER), regardless of whether their genes possess the conventional signal motif (KKXX) in the C-terminal. Proteins in this family proteolytically remove the C-terminal three residues of farnesylated proteins. The gene ZmpSte24, also known as FACE-1 in humans, a member of this family, is involved in the post-translational processing of prelamin A to mature lamin A, a major component of the nuclear envelope. ZmpSte24 deficiency causes an accumulation of prelamin A leading to lipodystrophy and other disease phenotypes while mutations in the protein lead to diseases of lamin processing (laminopathies), such as premature aging disease progeria and metabolic disorders. Some of these mutations map to the peptide-binding site. — an NCBI CDD conserved domain (cd07330); members share this curated model.
