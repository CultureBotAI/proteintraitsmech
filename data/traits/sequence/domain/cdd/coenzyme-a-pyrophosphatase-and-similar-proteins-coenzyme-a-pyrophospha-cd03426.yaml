identifier: CDD:cd03426
label: "coenzyme A pyrophosphatase and similar proteins. Coenzyme A pyrophosphatase (CoAse; EC 3.6.1.1), also called nucleoside diphosphate-linked moiety X)) motif 7, is a member of the NUDIX hydrolase superfamily, functions to catalyze the elimination of oxidized inactive CoA, which can inhibit CoA-utilizing enzymes. The need of CoAses mainly arises under conditions of oxidative stress. CoAse has a conserved NUDIX fold and requires a single divalent cation for catalysis. In addition to a signature NUDIX motif G[X5]E[X7]REUXEEXGU, where U is Ile, Leu, or Val, CoAse contains an additional motif upstream called the NuCoA motif (LLTXT(SA)X3RX3GX3FPGG) which is postulated to be involved in CoA recognition. CoA plays a central role in lipid metabolism. It is involved in the initial steps of fatty acid sythesis in the cytosol, in the oxidation of fatty acids and the citric acid cycle in the mitochondria, and in the oxidation of long-chain fatty acids in peroxisomes. CoA has the important role of activating fatty acids for further modification into key biological signalling molecules."
