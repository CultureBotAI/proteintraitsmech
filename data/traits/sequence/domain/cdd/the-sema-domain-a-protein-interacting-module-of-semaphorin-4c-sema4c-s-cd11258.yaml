identifier: CDD:cd11258
label: "The Sema domain, a protein interacting module, of semaphorin 4C (Sema4C). Sema4C acts as a Plexin B2 ligand to regulate the development of cerebellar granule cells and to modulate ureteric branching in the developing kidney. The binding of Sema4C to Plexin B2 results  the phosphorylation of downstream regulator ErbB-2 and the plexin protein itself. The cytoplasmic region of Sema4C binds a neurite-outgrowth-related protein SFAP75, suggesting that Sema4C may also play a role in neural function. Sema4C belongs to the class 4 transmembrane semaphorin family of proteins. Semaphorins are regulatory molecules in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of semaphorin 4C (Sema4C). Sema4C acts as a Plexin B2 ligand to regulate the development of cerebellar granule cells and to modulate ureteric branching in the developing kidney. The binding of Sema4C to Plexin B2 results the phosphorylation of downstream regulator ErbB-2 and the plexin protein itself. The cytoplasmic region of Sema4C binds a neurite-outgrowth-related protein SFAP75, suggesting that Sema4C may also play a role in neural function. Sema4C belongs to the class 4 transmembrane semaphorin family of proteins. Semaphorins are regulatory molecules in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module. — an NCBI CDD conserved domain (cd11258); members share this curated model.
