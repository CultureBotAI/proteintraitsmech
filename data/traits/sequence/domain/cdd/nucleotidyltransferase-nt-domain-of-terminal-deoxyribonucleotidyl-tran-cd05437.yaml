identifier: CDD:cd05437
label: "Nucleotidyltransferase (NT) domain of terminal deoxyribonucleotidyl transferase and related proteins. NT_PolXc_TdT_like: A subgroup of the Polymerase X family DNA polymerase domain containing proteins similar to human terminal deoxyribonucleotidyl transferase (TdT). TdT participates in NHEJ repair of intermediates in V(D)J recombination, contributing to the junctional variability of heavy chain genes. TdT is a DNA template-independent polymerase; it can also act as a DNA-independent RNA polymerases. TdT has an N-terminal BRCT (BRCA1 C-terminal) domain through which it interacts with end-joining factors, Ku, and the XRCC4: DNA ligase IV complex. TdT expression is restricted to primary lymphoid tissues. Proteins in this subgroup are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these PolXc_TdT_like NT domains."
definition: >-
  Nucleotidyltransferase (NT) domain of terminal deoxyribonucleotidyl transferase and related proteins. NT_PolXc_TdT_like: A subgroup of the Polymerase X family DNA polymerase domain containing proteins similar to human terminal deoxyribonucleotidyl transferase (TdT). TdT participates in NHEJ repair of intermediates in V(D)J recombination, contributing to the junctional variability of heavy chain genes. TdT is a DNA template-independent polymerase; it can also act as a DNA-independent RNA polymerases. TdT has an N-terminal BRCT (BRCA1 C-terminal) domain through which it interacts with end-joining factors, Ku, and the XRCC4: DNA ligase IV complex. TdT expression is restricted to primary lymphoid tissues. Proteins in this subgroup are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these PolXc_TdT_like NT domains. — an NCBI CDD conserved domain (cd05437); members share this curated model.
