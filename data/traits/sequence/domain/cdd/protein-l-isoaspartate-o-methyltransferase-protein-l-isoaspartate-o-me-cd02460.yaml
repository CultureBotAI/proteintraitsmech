  protein-L-isoaspartate O-methyltransferase. protein-L-isoaspartate O-methyltransferase is a repair enzyme that catalyzes the methyl esterification of L-isoaspartyl residues in peptides and proteins that result from spontaneous decomposition of L-aspartyl and L-asparaginyl residues
