identifier: CDD:cd09429
label: "The third LIM domain of Four and a half LIM domains protein 1 (FHL1). The third LIM domain of Four and a half LIM domains protein 1 (FHL1):  FHL1 is heavily expressed in skeletal and cardiac muscles. It plays important roles in muscle growth, differentiation, and sarcomere assembly by acting as a modulator of transcription factors. Defects in FHL1 gene are responsible for a number of Muscular dystrophy-like muscle disorders. It has been detected that FHL1 binds to Myosin-binding protein C, regulating myosin filament formation and sarcomere assembly. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes."
definition: >-
