identifier: CDD:cd14595
label: "protein tyrosine phosphatase-like pseudophosphatase domain of myotubularin related phosphoinositide phosphatase 11. Myotubularin related phosphoinositide phosphatase 11 (MTMR11), also called cisplatin resistance-associated protein (hCRA) in humans, is enzymatically inactive and contains a C-terminal coiled-coil domain and an N-terminal PH-GRAM domain. In general, myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. MTMR11 is a pseudophosphatase that lacks the catalytic cysteine in its catalytic pocket."
definition: >-
  protein tyrosine phosphatase-like pseudophosphatase domain of myotubularin related phosphoinositide phosphatase 11. Myotubularin related phosphoinositide phosphatase 11 (MTMR11), also called cisplatin resistance-associated protein (hCRA) in humans, is enzymatically inactive and contains a C-terminal coiled-coil domain and an N-terminal PH-GRAM domain. In general, myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. MTMR11 is a pseudophosphatase that lacks the catalytic cysteine in its catalytic pocket. — an NCBI CDD conserved domain (cd14595); members share this curated model.
