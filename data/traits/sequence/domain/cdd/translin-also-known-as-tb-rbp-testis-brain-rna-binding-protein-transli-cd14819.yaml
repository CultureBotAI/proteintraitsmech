identifier: CDD:cd14819
label: "Translin, also known as TB-RBP (testis brain RNA-binding protein). Translin (also known as TB-RBP for Testis Brain RNA-binding protein, a mouse ortholog), is a paralog of its binding partner protein TRAX (translin-associated factor-X) and together they form oligomeric complexes known as C3PO proteins (for component 3 promoter of  RNA-induced silencing complex or RISC).  DNA damage has been proposed to stimulate transport of Translin into nuclei. It binds to RNA and single-stranded DNA, and its selectivity is modulated by interactions with GTP and TRAX. Translin may also regulate dendritic trafficking of BDNF RNAs as well as function as a key activator of siRNA-mediated silencing in drosophila. Translin and Trax participate in a variety of nucleic acid metabolism pathways in addition to RNAi and have been implicated in a wide range of biological activities, including mRNA processing, cell growth regulation, spermatogenesis, neuronal development/function, genome stability regulation and carcinogenesis; however, their precise role in some of the processes remains unclear."
definition: >-
