identifier: CDD:cd08619
label: "Catalytic domain of phosphatidylinositol-specific phospholipase C, X domain containing proteins found in plants. The CD corresponds to the catalytic domain present in uncharacterized plant phosphatidylinositol-specific phospholipase C, X domain containing proteins (PI-PLCXD). The typical eukaryotic phosphoinositide-specific phospholipase C (PI-PLC, EC 3.1.4.11) has a multidomain organization that consists of a PLC catalytic core domain, and various regulatory domains. The catalytic core domain is assembled from two highly conserved X- and Y-regions split by a divergent linker sequence. In contrast, plant PI-PLCXDs contain a single TIM-barrel type catalytic domain, X domain, and are more closely related to bacterial PI-PLCs, which participate in Ca2+-independent PI metabolism, hydrolyzing the membrane lipid phosphatidylinositol (PI) to produce phosphorylated myo-inositol and diacylglycerol (DAG). Although the biological function of plant PI-PLCXDs still remains unclear, it may distinct from that of typical eukaryotic PI-PLCs."
definition: >-
  Catalytic domain of phosphatidylinositol-specific phospholipase C, X domain containing proteins found in plants. The CD corresponds to the catalytic domain present in uncharacterized plant phosphatidylinositol-specific phospholipase C, X domain containing proteins (PI-PLCXD). The typical eukaryotic phosphoinositide-specific phospholipase C (PI-PLC, EC 3.1.4.11) has a multidomain organization that consists of a PLC catalytic core domain, and various regulatory domains. The catalytic core domain is assembled from two highly conserved X- and Y-regions split by a divergent linker sequence. In contrast, plant PI-PLCXDs contain a single TIM-barrel type catalytic domain, X domain, and are more closely related to bacterial PI-PLCs, which participate in Ca2+-independent PI metabolism, hydrolyzing the membrane lipid phosphatidylinositol (PI) to produce phosphorylated myo-inositol and diacylglycerol (DAG). Although the biological function of plant PI-PLCXDs still remains unclear, it may distinct from that of typical eukaryotic PI-PLCs. — an NCBI CDD conserved domain (cd08619); members share this curated model.
