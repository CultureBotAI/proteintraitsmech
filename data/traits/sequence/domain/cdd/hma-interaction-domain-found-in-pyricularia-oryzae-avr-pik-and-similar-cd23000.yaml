identifier: CDD:cd23000
label: "HMA interaction domain found in Pyricularia oryzae AVR-Pik and similar proteins. Microbial plant pathogens secrete effector proteins that can be recognized by plant intracellular nucleotide-binding leucine-rich repeat (NLR) receptors, initiating an immune response. AVR-Pik protein is an effector from the rice blast fungus Pyricularia oryzae (also known as Magnaporthe oryzae). It binds and stabilizes rice heavy metal-associated (HMA)-domain containing NLR proteins to co-opt their function to suppress immunity. AVR-Pik adopts a six-stranded beta-sandwich structure. There are four AVR-Pik alleles, AVR-PikA, AVR-PikC, AVR-PikD, AVR-PikE."
definition: >-
  HMA interaction domain found in Pyricularia oryzae AVR-Pik and similar proteins. Microbial plant pathogens secrete effector proteins that can be recognized by plant intracellular nucleotide-binding leucine-rich repeat (NLR) receptors, initiating an immune response. AVR-Pik protein is an effector from the rice blast fungus Pyricularia oryzae (also known as Magnaporthe oryzae). It binds and stabilizes rice heavy metal-associated (HMA)-domain containing NLR proteins to co-opt their function to suppress immunity. AVR-Pik adopts a six-stranded beta-sandwich structure. There are four AVR-Pik alleles, AVR-PikA, AVR-PikC, AVR-PikD, AVR-PikE. — an NCBI CDD conserved domain (cd23000); members share this curated model.
