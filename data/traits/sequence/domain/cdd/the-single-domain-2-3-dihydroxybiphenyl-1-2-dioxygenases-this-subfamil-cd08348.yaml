identifier: CDD:cd08348
label: "The single-domain 2,3-dihydroxybiphenyl 1,2-dioxygenases. This subfamily contains Rhodococcus globerulus P6 BphC2-RGP6 and BphC3-RGP6, and similar proteins. BphC catalyzes the extradiol ring cleavage reaction of 2,3-dihydroxybiphenyl, yielding 2-hydroxy-6-oxo-6-phenylhexa-2,4-dienoic acid. This is the third step in the polychlorinated biphenyls (PCBs) degradation pathway (bph pathway). This subfamily of BphCs belongs to the type I extradiol dioxygenase family, which require a metal in the active site in its catalytic mechanism. Most type I extradiol dioxygenases are activated by Fe(II). Polychlorinated biphenyl degrading bacteria demonstrate a multiplicity of BphCs. For example, three types of BphC enzymes have been found in Rhodococcus globerulus (BphC1-RGP6 - BphC3-RGP6), all three enzymes are type I extradiol dioxygenases. BphC2-RGP6 and BphC3-RGP6 are one-domain dioxygenases, which form hexamers. BphC1-RGP6 has an internal duplication, it is a two-domain dioxygenase which forms octamers, its two domains do not belong to this subfamily."
definition: >-
  The single-domain 2,3-dihydroxybiphenyl 1,2-dioxygenases. This subfamily contains Rhodococcus globerulus P6 BphC2-RGP6 and BphC3-RGP6, and similar proteins. BphC catalyzes the extradiol ring cleavage reaction of 2,3-dihydroxybiphenyl, yielding 2-hydroxy-6-oxo-6-phenylhexa-2,4-dienoic acid. This is the third step in the polychlorinated biphenyls (PCBs) degradation pathway (bph pathway). This subfamily of BphCs belongs to the type I extradiol dioxygenase family, which require a metal in the active site in its catalytic mechanism. Most type I extradiol dioxygenases are activated by Fe(II). Polychlorinated biphenyl degrading bacteria demonstrate a multiplicity of BphCs. For example, three types of BphC enzymes have been found in Rhodococcus globerulus (BphC1-RGP6 - BphC3-RGP6), all three enzymes are type I extradiol dioxygenases. BphC2-RGP6 and BphC3-RGP6 are one-domain dioxygenases, which form hexamers. BphC1-RGP6 has an internal duplication, it is a two-domain dioxygenase which forms octamers, its two domains do not belong to this subfamily. — an NCBI CDD conserved domain (cd08348); members share this curated model.
