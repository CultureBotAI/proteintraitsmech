identifier: CDD:cd13415
label: "Tumor necrosis factor receptor superfamily member 13B (TNFRSF13B), also known as transmembrane activator and calcium modulator and cyclophilin ligand interactor (TACI). TNFRSF13B (also known as transmembrane activator and calcium modulator and cyclophilin ligand interactor (TACI), CVID, RYZN, CD267, CVID2, TNFRSF14B) is mainly expressed on B cells and binds strongly to B cell activating factor (BAFF) and weakly to a proliferation-inducing ligand (APRIL). TACI-APRIL interactions induce B-cell differentiation, whereas TACI-BAFF ligation negatively regulates B-cell functions. In humans, TACI is expressed on memory B cells and TACI mutations are detected in 8-10% of common variable immunodeficiency (CVID) patients, making it the most frequently mutated gene for the disease. Coexisting morbidities in CVID include bronchiectasis, autoimmunity, and malignancies. However, TNFRSF13B/TACI defects alone do not result in CVID but may also be found frequently in distinct clinical phenotypes, including benign lymphoproliferation and IgG subclass deficiencies. Over-expression of TACI has been detected in multiple myeloma and thyroid carcinoma; correlative analyses suggest that TACI expression is a useful prognostic marker for lymphoma."
