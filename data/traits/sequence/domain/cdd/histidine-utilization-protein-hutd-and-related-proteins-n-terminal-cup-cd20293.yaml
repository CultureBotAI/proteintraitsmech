identifier: CDD:cd20293
label: "histidine utilization protein HutD and related proteins, N-terminal cupin domain. This model represents the N-terminal domain of a bicupin protein HutD, involved in histidine utilization (Hut) in Pseudomonas species. Although a metal binding site is not found in Pseudomonas fluorescens (PfluHutD), a binding pocket for ligands is located in the middle of the N-terminal cupin domain near the metal binding sites; N-formyl-l-glutamate (FG, a Hut pathway intermediate) has been identified as a potential ligand in vivo. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  histidine utilization protein HutD and related proteins, N-terminal cupin domain. This model represents the N-terminal domain of a bicupin protein HutD, involved in histidine utilization (Hut) in Pseudomonas species. Although a metal binding site is not found in Pseudomonas fluorescens (PfluHutD), a binding pocket for ligands is located in the middle of the N-terminal cupin domain near the metal binding sites; N-formyl-l-glutamate (FG, a Hut pathway intermediate) has been identified as a potential ligand in vivo. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd20293); members share this curated model.
