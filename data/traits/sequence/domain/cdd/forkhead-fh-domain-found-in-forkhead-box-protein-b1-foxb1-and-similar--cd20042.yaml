identifier: CDD:cd20042
label: "Forkhead (FH) domain found in Forkhead box protein B1 (FOXB1) and similar proteins. FOXB1, also called transcription factor FKH-5, is a winged helix transcription factor that controls development of mammary glands and regions of the central nervous system (CNS) that regulate the milk-ejection reflex. It is essential for access of mammillothalamic axons to the thalamus. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein B1 (FOXB1) and similar proteins. FOXB1, also called transcription factor FKH-5, is a winged helix transcription factor that controls development of mammary glands and regions of the central nervous system (CNS) that regulate the milk-ejection reflex. It is essential for access of mammillothalamic axons to the thalamus. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20042); members share this curated model.
