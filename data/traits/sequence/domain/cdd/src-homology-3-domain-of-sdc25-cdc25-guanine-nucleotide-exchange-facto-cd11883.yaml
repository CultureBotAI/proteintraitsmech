identifier: CDD:cd11883
label: "Src Homology 3 domain of Sdc25/Cdc25 guanine nucleotide exchange factors. This subfamily is composed of the Saccharomyces cerevisiae guanine nucleotide exchange factors (GEFs) Sdc25 and Cdc25, and similar proteins. These GEFs regulate Ras by stimulating the GDP/GTP exchange on Ras. Cdc25 is involved in the Ras/PKA pathway that plays an important role in the regulation of metabolism, stress responses, and proliferation, depending on available nutrients and conditions. Proteins in this subfamily contain an N-terminal SH3 domain as well as REM (Ras exchanger motif) and RasGEF domains at the C-terminus. SH3 domains bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs; they play a role in the regulation of enzymes by intramolecular interactions, changing the subcellular localization of signal pathway components and mediate multiprotein complex assemblies."
