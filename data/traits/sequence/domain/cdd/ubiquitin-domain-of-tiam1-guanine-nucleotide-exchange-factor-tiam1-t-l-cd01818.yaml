identifier: CDD:cd01818
label: TIAM1_RBD
definition: >-
  Ubiquitin domain of Tiam1 guanine nucleotide exchange factor. Tiam1 (T lymphoma invasion and metastasis 1) a guanine nucleotide exchange factor that activates Rac, is an important regulator of Rho GTPase functions in tumor cells including regulation of cell shape and invasiveness in epithelial cells and fibroblasts. TIAM1 has an RBD (Ras-binding domain) similar to that of Raf kinase as well as PH (pleckstrin homology), PDZ, and RhoGEF domains
