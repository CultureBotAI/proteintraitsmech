identifier: CDD:cd02634
label: "Phosphoribosylglycinamide synthetase, C domain. Phosphoribosylglycinamide synthetase, C domain. Phosphoribosylglycinamide synthetase catalyzes the second step in the de novo biosynthesis of purine. The reaction catalyzed by Phosphoribosylglycinamide synthetase is the ATP-dependent addition of 5-phosphoribosylamine to glycine to form 5'phosphoribosylglycinamide. This domain is related to the C-terminal domain of biotin carboxylase/carbamoyl phosphate synthetase (see pfam02787)."
definition: >-
  Phosphoribosylglycinamide synthetase, C domain. Phosphoribosylglycinamide synthetase, C domain. Phosphoribosylglycinamide synthetase catalyzes the second step in the de novo biosynthesis of purine. The reaction catalyzed by Phosphoribosylglycinamide synthetase is the ATP-dependent addition of 5-phosphoribosylamine to glycine to form 5'phosphoribosylglycinamide. This domain is related to the C-terminal domain of biotin carboxylase/carbamoyl phosphate synthetase (see pfam02787). — an NCBI CDD conserved domain (cd02634); members share this curated model.
