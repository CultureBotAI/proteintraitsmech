identifier: CDD:cd12145
label: "C-terminal domain of the Y-family polymerase Rev1. Rev1 is a eukaryotic translesion synthesis (TLS) polymerase; TLS is a process that allows the bypass of a variety of DNA lesions. TLS polymerases lack proofreading activity and have low fidelity and low processivity. They use damaged DNA as templates and insert nucleotides opposite the lesions. Rev1 has both structural and enzymatic roles. Structurally, it is believed to interact with other nonclassical polymerases and replication machinery to act as a scaffold. The C-terminal domain modeled here is essential for TLS and has been shown to mediate interactions with the Rev7 subunit of the B-family TLS polymerase Pol zeta (Rev3/Rev7), as well as with the RIRs (Rev1-interacting regions) of polymerases kappa, iota, and eta. Rev1 is known to actively promote the introduction of mutations, potentially making it a significant target for cancer treatment."
definition: >-
  C-terminal domain of the Y-family polymerase Rev1. Rev1 is a eukaryotic translesion synthesis (TLS) polymerase; TLS is a process that allows the bypass of a variety of DNA lesions. TLS polymerases lack proofreading activity and have low fidelity and low processivity. They use damaged DNA as templates and insert nucleotides opposite the lesions. Rev1 has both structural and enzymatic roles. Structurally, it is believed to interact with other nonclassical polymerases and replication machinery to act as a scaffold. The C-terminal domain modeled here is essential for TLS and has been shown to mediate interactions with the Rev7 subunit of the B-family TLS polymerase Pol zeta (Rev3/Rev7), as well as with the RIRs (Rev1-interacting regions) of polymerases kappa, iota, and eta. Rev1 is known to actively promote the introduction of mutations, potentially making it a significant target for cancer treatment. — an NCBI CDD conserved domain (cd12145); members share this curated model.
