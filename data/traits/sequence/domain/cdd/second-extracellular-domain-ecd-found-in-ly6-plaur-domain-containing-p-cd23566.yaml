identifier: CDD:cd23566
label: "second extracellular domain (ECD) found in Ly6/PLAUR domain-containing protein 5 (LYPD5) and similar proteins. LYPD5 (also called Haldisin (human antigen with LU-domains expressed in skin)) is a novel differentiation marker of stratum granulosum in squamous epithelia. LYPD5 contains two extracellular domains (ECDs) that belong to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). This model corresponds to the second ECD."
definition: >-
  second extracellular domain (ECD) found in Ly6/PLAUR domain-containing protein 5 (LYPD5) and similar proteins. LYPD5 (also called Haldisin (human antigen with LU-domains expressed in skin)) is a novel differentiation marker of stratum granulosum in squamous epithelia. LYPD5 contains two extracellular domains (ECDs) that belong to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). This model corresponds to the second ECD. — an NCBI CDD conserved domain (cd23566); members share this curated model.
