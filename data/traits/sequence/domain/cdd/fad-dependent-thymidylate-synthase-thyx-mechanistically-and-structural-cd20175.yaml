identifier: CDD:cd20175
label: "FAD-dependent thymidylate synthase (ThyX), mechanistically and structurally unrelated to thymidylate synthase (ThyA). This family contains FAD-dependent thymidylate synthase (also known as ThyX, Thy1, FDTS or thymidylate synthase complementing protein), found in many microbial genomes including several human pathogens, but absent in humans. This protein is mechanistically and structurally unrelated to thymidylate synthase (TS or ThyA) found in mammals. ThyA and ThyX both produce de novo thymidylate or deoxythymidine 5'-monophosphate (dTMP), an essential DNA precursor. The classic ThyA catalyzes the reductive methylation of deoxyuridine 5'-monophosphate (dUMP) to form dTMP, with methylenetetrahydrofolate (CH2H4folate) serving as a one-carbon donor and as the source of reductive power. On the other hand, ThyX contains FAD, tightly bound by a novel fold, that mediates hydride transfer from NADPH during catalysis. Consequently, CH2H4folate serves only as a carbon donor and tetrahydrofolate (and not dihydrofolate as in the case of ThyA) is produced. The differences between the ThyX and ThyA is used for mechanism-based drugs to selectively inhibit FDTS and not have much effect on human and other eukaryotic TS. ThyX has been pursued for the development of new antibacterial agents against Mycobacterium tuberculosis, the causative agent of the widespread infectious disease tuberculosis (TB). It is also an attractive target for designing specific antibiotic drugs against many diseases such as ulcers, periodontal disease, and Lyme's disease, as well as biological warfare agents such as anthrax, botulism, and typhus."
