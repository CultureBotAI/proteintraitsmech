identifier: CDD:cd09544
label: "SAM domain of EPH-A3 subfamily of tyrosine kinase receptors. SAM (sterile alpha motif) domain of EPH-A3 subfamily of receptor tyrosine kinases is a C-terminal putative protein-protein interaction domain. This domain is located in the cytoplasmic region of EPH-A3 receptors and appears to mediate cell-cell initiated signal transduction. EPH-A3 receptors bind SH2/SH3 containing adaptor protein Nck1 and this adaptor is a key factor in EPH-A3 mediated signaling. However SAM domain is not implemented in this interaction. Activation of EPH-A3 receptors inhibits outgrowth and cell migration. Mutations in SAM domain may play a role in development of hepatocellular carcinoma. Expression of EPH-A3 is associated with lymphocytic leukemia and defines the subset of rhabdomyosarcoma tumors. EPH-A3 receptors are attractive targets for drug design."
