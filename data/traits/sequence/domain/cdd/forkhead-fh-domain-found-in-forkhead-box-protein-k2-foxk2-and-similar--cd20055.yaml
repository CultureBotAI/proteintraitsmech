identifier: CDD:cd20055
label: "Forkhead (FH) domain found in Forkhead box protein K2 (FOXK2) and similar proteins. FOXK2, also called cellular transcription factor ILF-1 or interleukin enhancer-binding factor 1, is a transcriptional regulator that recognizes the core sequence 5'-TAAACA-3'. It binds to NFAT-like motifs (purine-rich) in the IL2 promoter. It also binds to the HIV-1 long terminal repeat. FOXK2 may be involved in both, positive and negative regulation of important viral and cellular promoter elements. In addition, FOXK2 plays a critical role in suppressing tumorigenesis. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein K2 (FOXK2) and similar proteins. FOXK2, also called cellular transcription factor ILF-1 or interleukin enhancer-binding factor 1, is a transcriptional regulator that recognizes the core sequence 5'-TAAACA-3'. It binds to NFAT-like motifs (purine-rich) in the IL2 promoter. It also binds to the HIV-1 long terminal repeat. FOXK2 may be involved in both, positive and negative regulation of important viral and cellular promoter elements. In addition, FOXK2 plays a critical role in suppressing tumorigenesis. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20055); members share this curated model.
