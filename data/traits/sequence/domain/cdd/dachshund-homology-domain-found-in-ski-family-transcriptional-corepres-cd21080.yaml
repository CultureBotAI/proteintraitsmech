identifier: CDD:cd21080
label: "Dachshund-homology domain found in SKI family transcriptional corepressors, Skor1, Skor2 and similar proteins. Skor1, also known as functional Smad-suppressing element on chromosome 15 (Fussel-15), LBX1 corepressor 1, or ladybird homeobox corepressor 1, acts as a transcriptional corepressor of LBX1 and inhibits BMP signaling. Skor2, also known as functional Smad-suppressing element on chromosome 18 (Fussel-18), LBX1 corepressor 1-like protein, or ladybird homeobox corepressor 1-like protein, exhibits transcriptional repressor activity. It acts as a transforming growth factor-beta (TGF-beta) antagonist in the nervous system. The Dachshund-homology domain (DHD), also known as the N-terminal Ski/Sno/Dac domain, adopts a mixed alpha/beta structure containing a helix-turn-helix motif, similar to features found in the forkhead/winged-helix family of DNA binding proteins. It contains a conserved CLPQ motif and can bind co-factors. Its structure suggests that it may also bind DNA."
definition: >-
  Dachshund-homology domain found in SKI family transcriptional corepressors, Skor1, Skor2 and similar proteins. Skor1, also known as functional Smad-suppressing element on chromosome 15 (Fussel-15), LBX1 corepressor 1, or ladybird homeobox corepressor 1, acts as a transcriptional corepressor of LBX1 and inhibits BMP signaling. Skor2, also known as functional Smad-suppressing element on chromosome 18 (Fussel-18), LBX1 corepressor 1-like protein, or ladybird homeobox corepressor 1-like protein, exhibits transcriptional repressor activity. It acts as a transforming growth factor-beta (TGF-beta) antagonist in the nervous system. The Dachshund-homology domain (DHD), also known as the N-terminal Ski/Sno/Dac domain, adopts a mixed alpha/beta structure containing a helix-turn-helix motif, similar to features found in the forkhead/winged-helix family of DNA binding proteins. It contains a conserved CLPQ motif and can bind co-factors. Its structure suggests that it may also bind DNA. — an NCBI CDD conserved domain (cd21080); members share this curated model.
