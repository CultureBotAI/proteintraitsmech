identifier: CDD:cd23390
label: "C-terminal receptor binding domain, beta-trefoil fold, found in Clostridium botulinum neurotoxin type C (BoNT/C) and similar proteins. BoNT/C, also called bontoxilysin-C1, is botulinum toxin that causes flaccid paralysis by inhibiting neurotransmitter (acetylcholine) release from the presynaptic membranes of nerve terminals of the eukaryotic host skeletal and autonomic nervous system, with frequent heart or respiratory failure. BoNT/C is unique among characterized BoNTs in having 2 substrates, syntaxin (STX) and SNAP25. Unlike most BoNTs, precursor of BoNT/C seems not to have a proteinaceous co-receptor, and instead recognizes 2 different complex polysialylated gangliosides found on neural tissue probably in synaptic vesicles. Moreover, BoNT/C usually does not cause diseases in humans, but type C strains can be responsible for infant botulism. It has been shown to be a suitable drug for the treatment of dystonia. BoNT/C comprises three domains which are involved in catalysis (LC), translocation (HCT), and host receptor binding (HCR). The HCR domain is responsible for the highly specific targeting of the neurotoxin to neuronal cell membranes. It is a proven target for anti-BoNT antibody and vaccine development. This model corresponds to C-terminal HCR domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  C-terminal receptor binding domain, beta-trefoil fold, found in Clostridium botulinum neurotoxin type C (BoNT/C) and similar proteins. BoNT/C, also called bontoxilysin-C1, is botulinum toxin that causes flaccid paralysis by inhibiting neurotransmitter (acetylcholine) release from the presynaptic membranes of nerve terminals of the eukaryotic host skeletal and autonomic nervous system, with frequent heart or respiratory failure. BoNT/C is unique among characterized BoNTs in having 2 substrates, syntaxin (STX) and SNAP25. Unlike most BoNTs, precursor of BoNT/C seems not to have a proteinaceous co-receptor, and instead recognizes 2 different complex polysialylated gangliosides found on neural tissue probably in synaptic vesicles. Moreover, BoNT/C usually does not cause diseases in humans, but type C strains can be responsible for infant botulism. It has been shown to be a suitable drug for the treatment of dystonia. BoNT/C comprises three domains which are involved in catalysis (LC), translocation (HCT), and host receptor binding (HCR). The HCR domain is responsible for the highly specific targeting of the neurotoxin to neuronal cell membranes. It is a proven target for anti-BoNT antibody and vaccine development. This model corresponds to C-terminal HCR domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23390); members share this curated model.
