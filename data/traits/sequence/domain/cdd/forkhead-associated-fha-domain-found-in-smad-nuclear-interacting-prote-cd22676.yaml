identifier: CDD:cd22676
label: "forkhead associated (FHA) domain found in Smad nuclear-interacting protein 1 (SNIP1), FHA domain-containing protein DDL, and similar proteins. SNIP1 is an FHA domain-containing protein required for pre-mRNA splicing as a component of the spliceosome. It inhibits NF-kappaB signaling by competing for its binding to the C/H1 domain of CBP/p300 transcriptional co-activators. It is involved in microRNA (miRNA) biogenesis. SNIP1 is a regulator of the cell cycle and cyclin D1 expression and may be involved in cyclin-D1/CCND1 mRNA stability through the SNARP complex which associates with both the 3'end of the CCND1 gene and its mRNA. This family also includes Arabidopsis thaliana FHA domain-containing protein DDL and similar proteins. DDL, also called protein DAWDLE, is involved in the microRNA (miRNA) and short interfering RNA (siRNA) biogenesis. It may facilitate DCL1 to access or recognize primary miRNAs. DDL binds RNA non-specifically. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in Smad nuclear-interacting protein 1 (SNIP1), FHA domain-containing protein DDL, and similar proteins. SNIP1 is an FHA domain-containing protein required for pre-mRNA splicing as a component of the spliceosome. It inhibits NF-kappaB signaling by competing for its binding to the C/H1 domain of CBP/p300 transcriptional co-activators. It is involved in microRNA (miRNA) biogenesis. SNIP1 is a regulator of the cell cycle and cyclin D1 expression and may be involved in cyclin-D1/CCND1 mRNA stability through the SNARP complex which associates with both the 3'end of the CCND1 gene and its mRNA. This family also includes Arabidopsis thaliana FHA domain-containing protein DDL and similar proteins. DDL, also called protein DAWDLE, is involved in the microRNA (miRNA) and short interfering RNA (siRNA) biogenesis. It may facilitate DCL1 to access or recognize primary miRNAs. DDL binds RNA non-specifically. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22676); members share this curated model.
