identifier: CDD:cd18433
label: "third BRCT domain of Schizosaccharomyces pombe S-M checkpoint control protein Rad4 and similar proteins. Rad4, also termed P74, or protein cut5, is an essential component for DNA replication and the checkpoint control system which couples S and M phases. It may directly or indirectly interact with chromatin proteins to form the complex required for the initiation and/or progression of DNA synthesis. Rad4 contains four BRCT repeats. The family corresponds to the third repeat."
definition: >-
  third BRCT domain of Schizosaccharomyces pombe S-M checkpoint control protein Rad4 and similar proteins. Rad4, also termed P74, or protein cut5, is an essential component for DNA replication and the checkpoint control system which couples S and M phases. It may directly or indirectly interact with chromatin proteins to form the complex required for the initiation and/or progression of DNA synthesis. Rad4 contains four BRCT repeats. The family corresponds to the third repeat. — an NCBI CDD conserved domain (cd18433); members share this curated model.
