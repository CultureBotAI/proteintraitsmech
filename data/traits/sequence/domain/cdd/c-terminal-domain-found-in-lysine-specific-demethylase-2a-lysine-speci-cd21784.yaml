identifier: CDD:cd21784
label: "C-terminal domain found in Lysine-specific demethylase 2A. Lysine-specific demethylase 2A (KDM2A) is also called CXXC-type zinc finger protein 8, F-box and leucine-rich repeat protein 11 (FBXL11), F-box protein FBL7, F-box protein Lilina, F-box/LRR-repeat protein 11, JmjC domain-containing histone demethylation protein 1A (Jhdm1a), or [Histone-H3]-lysine-36 demethylase 1A. It is a ubiquitously expressed histone H3 lysine 36 (H3K36) demethylase that has been implicated in gene silencing, cell cycle, cell growth, and cancer development. It acts as a key negative regulator of gluconeogenic gene expression and plays a critical role in the invasiveness, proliferation, and anchorage-independent growth of non-small cell lung cancer (NSCLC) cells, as well as in the osteo/dentinogenic differentiation of Mesenchymal stem cells (MSCs). KDM2A regulates rRNA transcription in response to starvation and functions as a negative regulator of NF-kappaB. It is a heterochromatin-associated and HP1-interacting protein that promotes Heterochromatin Protein 1 (HP1) localization to chromatin. It is specifically recruited to CpG islands to define a unique chromatin architecture, which requires direct and specific interaction with linker DNA. It also functions as a H3K4 demethylase that regulates cell proliferation through p15 (INK4B) and p27 (Kip1) in stem cells from apical papilla (SCAPs). KDM2A belongs to the JmjC domain-containing histone demethylase family. KDM2A consists of two Jumonji domains (JmjN and JmjC), a CXXC zinc-finger domain, a plant homeodomain (PHD) finger, an F-box domain, followed by an antagonist of mitotic exit network protein 1 (AMN1) domain. This model corresponds to a small conserved region in KDM2A between the JmjC domain and the CXXC zinc-finger domain, which has been called the C-terminal domain by literature."
definition: >-
  C-terminal domain found in Lysine-specific demethylase 2A. Lysine-specific demethylase 2A (KDM2A) is also called CXXC-type zinc finger protein 8, F-box and leucine-rich repeat protein 11 (FBXL11), F-box protein FBL7, F-box protein Lilina, F-box/LRR-repeat protein 11, JmjC domain-containing histone demethylation protein 1A (Jhdm1a), or [Histone-H3]-lysine-36 demethylase 1A. It is a ubiquitously expressed histone H3 lysine 36 (H3K36) demethylase that has been implicated in gene silencing, cell cycle, cell growth, and cancer development. It acts as a key negative regulator of gluconeogenic gene expression and plays a critical role in the invasiveness, proliferation, and anchorage-independent growth of non-small cell lung cancer (NSCLC) cells, as well as in the osteo/dentinogenic differentiation of Mesenchymal stem cells (MSCs). KDM2A regulates rRNA transcription in response to starvation and functions as a negative regulator of NF-kappaB. It is a heterochromatin-associated and HP1-interacting protein that promotes Heterochromatin Protein 1 (HP1) localization to chromatin. It is specifically recruited to CpG islands to define a unique chromatin architecture, which requires direct and specific interaction with linker DNA. It also functions as a H3K4 demethylase that regulates cell proliferation through p15 (INK4B) and p27 (Kip1) in stem cells from apical papilla (SCAPs). KDM2A belongs to the JmjC domain-containing histone demethylase family. KDM2A consists of two Jumonji domains (JmjN and JmjC), a CXXC zinc-finger domain, a plant homeodomain (PHD) finger, an F-box domain, followed by an antagonist of mitotic exit network protein 1 (AMN1) domain. This model corresponds to a small conserved region in KDM2A between the JmjC domain and the CXXC zinc-finger domain, which has been called the C-terminal domain by literature. — an NCBI CDD conserved domain (cd21784); members share this curated model.
