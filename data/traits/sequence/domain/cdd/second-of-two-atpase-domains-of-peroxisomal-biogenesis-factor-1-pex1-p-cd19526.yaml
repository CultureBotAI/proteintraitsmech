identifier: CDD:cd19526
label: "second of two ATPase domains of Peroxisomal biogenesis factor 1 (PEX1). PEX1(also known as Peroxin-1)/PEX6 is a protein unfoldase; PEX1 and PEX6 form a heterohexameric Type-2 AAA-ATPase complex and are essential for peroxisome biogenesis as they are required for the import of folded proteins into the peroxisomal matrix. PEX-1 is required for stability of PEX5. This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
definition: >-
  second of two ATPase domains of Peroxisomal biogenesis factor 1 (PEX1). PEX1(also known as Peroxin-1)/PEX6 is a protein unfoldase; PEX1 and PEX6 form a heterohexameric Type-2 AAA-ATPase complex and are essential for peroxisome biogenesis as they are required for the import of folded proteins into the peroxisomal matrix. PEX-1 is required for stability of PEX5. This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion. — an NCBI CDD conserved domain (cd19526); members share this curated model.
