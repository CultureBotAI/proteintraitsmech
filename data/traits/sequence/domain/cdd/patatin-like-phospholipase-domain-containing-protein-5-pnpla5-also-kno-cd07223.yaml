identifier: CDD:cd07223
label: "Patatin-like phospholipase domain containing protein 5. PNPLA5, also known as GS2L (GS2-like), plays a role in regulation of adipocyte differentiation. PNPLA5 is expressed in brain tissue in high mRNA levels and low levels in liver tissue. There is no concrete evidence in support of the enzymatic activity of GS2L. This family includes patatin-like proteins: GS2L (GS2-like) and PNPLA5 (Patatin-like phospholipase domain-containing protein 5) reported exclusively in mammals."
definition: >-
  Patatin-like phospholipase domain containing protein 5. PNPLA5, also known as GS2L (GS2-like), plays a role in regulation of adipocyte differentiation. PNPLA5 is expressed in brain tissue in high mRNA levels and low levels in liver tissue. There is no concrete evidence in support of the enzymatic activity of GS2L. This family includes patatin-like proteins: GS2L (GS2-like) and PNPLA5 (Patatin-like phospholipase domain-containing protein 5) reported exclusively in mammals. — an NCBI CDD conserved domain (cd07223); members share this curated model.
