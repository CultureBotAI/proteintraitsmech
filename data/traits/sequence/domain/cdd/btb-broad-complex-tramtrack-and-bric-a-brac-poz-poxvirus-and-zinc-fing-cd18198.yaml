identifier: CDD:cd18198
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 7 (ZBTB7). There are three ZBTB7 isoforms: ZBTB7A, ZBTB7B, and ZBTB7C. ZBTB7A is a transcription repressor of key glycolytic genes, including GLUT3, PFKP, and PKM, and its downregulation in human cancer contributes to tumor metabolism. ZBTB7B is a transcriptional regulator of extracellular matrix gene expression. ZBTB7C is a transcriptional repressor with a pro-oncogenic role that relies upon binding to p53 and inhibition of its transactivation function. ZBTB7 isoforms contain a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 7 (ZBTB7). There are three ZBTB7 isoforms: ZBTB7A, ZBTB7B, and ZBTB7C. ZBTB7A is a transcription repressor of key glycolytic genes, including GLUT3, PFKP, and PKM, and its downregulation in human cancer contributes to tumor metabolism. ZBTB7B is a transcriptional regulator of extracellular matrix gene expression. ZBTB7C is a transcriptional repressor with a pro-oncogenic role that relies upon binding to p53 and inhibition of its transactivation function. ZBTB7 isoforms contain a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18198); members share this curated model.
