identifier: CDD:cd01943
label: "MAK32 kinase.  MAK32 is a protein found primarily in fungi that is necessary for the structural stability of L-A particles.  The L-A virus particule is a specialized compartment for the transcription and replication of double-stranded RNA, known to infect yeast and other fungi.  MAK32 is part of the host machinery used by the virus to multiply."
definition: >-
  MAK32 kinase. MAK32 is a protein found primarily in fungi that is necessary for the structural stability of L-A particles. The L-A virus particule is a specialized compartment for the transcription and replication of double-stranded RNA, known to infect yeast and other fungi. MAK32 is part of the host machinery used by the virus to multiply. — an NCBI CDD conserved domain (cd01943); members share this curated model.
