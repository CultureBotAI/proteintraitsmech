identifier: CDD:cd23508
label: "class II hydrophobins. Class II hydrophobins are a unique group of fungal proteins that can self-assemble into a monolayer on hydrophilic:hydrophobic interfaces. The monolayer is not fibrillar and it is not associated with formation of amyloid-structures, nor with large conformational changes. This subfamily includes Trichoderma reesei class II hydrophobins HFBI and HFBII, and Neurospora crassa class II hydrophobin NC2. HFBI and HFBII are responsible for spore hydrophobicity and protection. They form highly ordered monolayer films and crystalline fibrils. NC2 is a highly surface active protein that can form protein layers on a water:air interface that stabilize air bubbles. This subfamily also includes Cryphonectria parasitica cryparin and Ophiostoma ulmi cerato-ulmin (CU, also known as Dutch elm disease toxin). Cryparin is an abundant cell-surface protein from the chestnut blight fungus, Cryphonectria parasitica. CU has been implicated in Dutch elm disease pathogenesis. It is also a hydrophobin protein with high surface activity that acts as a parasitic fitness factor."
