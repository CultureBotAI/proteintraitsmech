identifier: CDD:cd02275
label: "G6PD. Glucose 6-phosphate dehydrogenase (G6PD) is the first enzyme of the pentose phosphate pathway and in many organisms, including mammals, is NADP+ dependent. For these species, G6PD, together with 6-phosphogluconate dehydrogenase (6PGDH), the second dehydrogenase of the pathway, generates NADPH for reductive biosynthesis or to combat oxidative stress. Severe G6PD deficiency in humans causes chronic non-spherocytic haemolytic anaemia. G6PD from the microorganism L. mesenteroides has dual coenzyme specificity. In both the NADP+ and the NAD+ reaction, the oxidation of glucose 6-phosphate by G6PD involves general base abstraction of a proton from the C1-OH, thereby allowing transfer of the hydride from C1 to the C4 position of the nicotinamide ring of the coenzyme. L. mesenteroides G6PD is a homodimer, where as the active human enzyme exists as either a dimer or a dimer:dimer complex pending varying physiological conditions. Bifunctional enzymes, glucose (hexose) 6-phosphate dehydrogenase-6-phosphogluconolactonases, with both G6PD and 6PGDH activity, are found in several vertebrates and a few Plasmodium species. These enzymes are encoded by the 6PGDH gene (devb/NagB) positioned either N-terminal (Plasmodium) or C-terminal (vertebrates) of the G6PD gene. Members of the G6PD CD contain a Rossmann fold NAD(P)H binding domain and unique catalytic/dimerization fold with similarities to the glyceraldehyde-3-phosphate dehydrogenase domain and are members of the NADB_G3PDH superfamily of proteins. Flanking 6PGDH domains are not included in this alignment."
definition: >-
  G6PD. Glucose 6-phosphate dehydrogenase (G6PD) is the first enzyme of the pentose phosphate pathway and in many organisms, including mammals, is NADP+ dependent. For these species, G6PD, together with 6-phosphogluconate dehydrogenase (6PGDH), the second dehydrogenase of the pathway, generates NADPH for reductive biosynthesis or to combat oxidative stress. Severe G6PD deficiency in humans causes chronic non-spherocytic haemolytic anaemia. G6PD from the microorganism L. mesenteroides has dual coenzyme specificity. In both the NADP+ and the NAD+ reaction, the oxidation of glucose 6-phosphate by G6PD involves general base abstraction of a proton from the C1-OH, thereby allowing transfer of the hydride from C1 to the C4 position of the nicotinamide ring of the coenzyme. L. mesenteroides G6PD is a homodimer, where as the active human enzyme exists as either a dimer or a dimer:dimer complex pending varying physiological conditions. Bifunctional enzymes, glucose (hexose) 6-phosphate dehydrogenase-6-phosphogluconolactonases, with both G6PD and 6PGDH activity, are found in several vertebrates and a few Plasmodium species. These enzymes are encoded by the 6PGDH gene (devb/NagB) positioned either N-terminal (Plasmodium) or C-terminal (vertebrates) of the G6PD gene. Members of the G6PD CD contain a Rossmann fold NAD(P)H binding domain and unique catalytic/dimerization fold with similarities to the glyceraldehyde-3-phosphate dehydrogenase domain and are members of the NADB_G3PDH superfamily of proteins. Flanking 6PGDH domains are not included in this alignment. — an NCBI CDD conserved domain (cd02275); members share this curated model.
