identifier: CDD:cd17689
label: "RUN domain found in sorting nexin-29 (SNX29) and similar proteins. SNX29, also called RUN domain-containing protein 2A (RUNDC2A), belongs to the sorting nexin family. Sorting nexins are a large group of proteins that are localized in the cytoplasm and have the potential for membrane association either through their lipid-binding PX domain, a phospholipid-binding motif, or through protein-protein interactions with membrane-associated protein complexes. Some sorting nexin family members have been shown to facilitate protein sorting. This model contains the RUN domain of SNX29."
definition: >-
  RUN domain found in sorting nexin-29 (SNX29) and similar proteins. SNX29, also called RUN domain-containing protein 2A (RUNDC2A), belongs to the sorting nexin family. Sorting nexins are a large group of proteins that are localized in the cytoplasm and have the potential for membrane association either through their lipid-binding PX domain, a phospholipid-binding motif, or through protein-protein interactions with membrane-associated protein complexes. Some sorting nexin family members have been shown to facilitate protein sorting. This model contains the RUN domain of SNX29. — an NCBI CDD conserved domain (cd17689); members share this curated model.
