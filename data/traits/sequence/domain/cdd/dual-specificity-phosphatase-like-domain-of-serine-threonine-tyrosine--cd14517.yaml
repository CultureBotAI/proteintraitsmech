identifier: CDD:cd14517
label: "dual specificity phosphatase-like domain of serine/threonine/tyrosine interacting like 1. Serine/threonine/tyrosine interacting like 1 (STYXL1), also known as DUSP24 and MK-STYX, is a catalytically inactive phosphatase with homology to the mitogen-activated protein kinase (MAPK) phosphatases (MKPs). STYXL1 plays a role in regulating pathways by competing with active phosphatases for binding to MAPKs. Similar to MKPs, STYXL1 contains an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, however its C-terminal dual specificity phosphatase-like domain is a pseudophosphatase missing the catalytic cysteine."
definition: >-
  dual specificity phosphatase-like domain of serine/threonine/tyrosine interacting like 1. Serine/threonine/tyrosine interacting like 1 (STYXL1), also known as DUSP24 and MK-STYX, is a catalytically inactive phosphatase with homology to the mitogen-activated protein kinase (MAPK) phosphatases (MKPs). STYXL1 plays a role in regulating pathways by competing with active phosphatases for binding to MAPKs. Similar to MKPs, STYXL1 contains an N-terminal Cdc25/rhodanese-like domain, which is responsible for MAPK-binding, however its C-terminal dual specificity phosphatase-like domain is a pseudophosphatase missing the catalytic cysteine. — an NCBI CDD conserved domain (cd14517); members share this curated model.
