identifier: CDD:cd07978
label: "histone-fold domain found in transcription initiation factor TFIID subunit 13 (TAF13) and similar proteins. TAF13, also called TATA Binding Protein (TBP) associated factor 13, transcription initiation factor TFIID 18 kDa subunit, TAF(II)18, TAFII-18, or TAFII18, is a component of the DNA-binding general RNA polymerase II transcription factor IID (TFIID) complex that is composed of TATA binding protein (TBP) and a number of TBP-associated factors (TAFs). TFIID is one of the general transcription factors required for accurate and regulated initiation by RNA polymerase II. It plays a central role in mediating promoter responses to various activators and repressors. TAF13 interacts with TBP, and more strongly with TAF10 and TAF11."
definition: >-
  histone-fold domain found in transcription initiation factor TFIID subunit 13 (TAF13) and similar proteins. TAF13, also called TATA Binding Protein (TBP) associated factor 13, transcription initiation factor TFIID 18 kDa subunit, TAF(II)18, TAFII-18, or TAFII18, is a component of the DNA-binding general RNA polymerase II transcription factor IID (TFIID) complex that is composed of TATA binding protein (TBP) and a number of TBP-associated factors (TAFs). TFIID is one of the general transcription factors required for accurate and regulated initiation by RNA polymerase II. It plays a central role in mediating promoter responses to various activators and repressors. TAF13 interacts with TBP, and more strongly with TAF10 and TAF11. — an NCBI CDD conserved domain (cd07978); members share this curated model.
