identifier: CDD:cd16291
label: "Integrator complex subunit 11, and related proteins; MBL-fold metallo-hydrolase domain. Integrator is a metazoan-specific multisubunit, multifunctional protein complex composed of 14 subunits named Int1-Int14 (Integrator subunits). This subgroup includes Int11 (also known as cleavage and polyadenylation-specific factor (CPSF) 3-like protein, and protein related to CPSF subunits of 68 kDa (RC-68)). Integrator complex has been implicated in a variety of Pol II transcription events including 3' end processing of snRNA, transcription initiation, promoter-proximal pausing, termination of protein-coding transcripts, and in HVS pre-miRNA 3' end processing. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions."
definition: >-
  Integrator complex subunit 11, and related proteins; MBL-fold metallo-hydrolase domain. Integrator is a metazoan-specific multisubunit, multifunctional protein complex composed of 14 subunits named Int1-Int14 (Integrator subunits). This subgroup includes Int11 (also known as cleavage and polyadenylation-specific factor (CPSF) 3-like protein, and protein related to CPSF subunits of 68 kDa (RC-68)). Integrator complex has been implicated in a variety of Pol II transcription events including 3' end processing of snRNA, transcription initiation, promoter-proximal pausing, termination of protein-coding transcripts, and in HVS pre-miRNA 3' end processing. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions. — an NCBI CDD conserved domain (cd16291); members share this curated model.
