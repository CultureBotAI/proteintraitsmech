identifier: CDD:cd16164
label: "OCRE domain found in angiogenic factor VG5Q and similar proteins. VG5Q, also called angiogenic factor with G patch and FHA domains 1 (AGGF1), or G patch domain-containing protein 7, or vasculogenesis gene on 5q protein, functions as a potent angiogenic factor in promoting angiogenesis through interacting with TWEAK (also known as TNFSF12), which is a member of the tumor necrosis factor (TNF) superfamily that induces angiogenesis in vivo. VG5Q can bind to the surface of endothelial cells and promote cell proliferation, suggesting that it may act in an autocrine fashion. The chromosomal translocation t(5;11) and the E133K variant in VG5Q are associated with Klippel-Trenaunay syndrome (KTS), a disorder characterized by diverse effects in the vascular system. In addition to a forkhead-associated (FHA) domain and a G-patch motif, VG5Q contains an N-terminal OCtamer REpeat (OCRE) domain that is characterized by a 5-fold, imperfectly repeated octameric sequence."
definition: >-
  OCRE domain found in angiogenic factor VG5Q and similar proteins. VG5Q, also called angiogenic factor with G patch and FHA domains 1 (AGGF1), or G patch domain-containing protein 7, or vasculogenesis gene on 5q protein, functions as a potent angiogenic factor in promoting angiogenesis through interacting with TWEAK (also known as TNFSF12), which is a member of the tumor necrosis factor (TNF) superfamily that induces angiogenesis in vivo. VG5Q can bind to the surface of endothelial cells and promote cell proliferation, suggesting that it may act in an autocrine fashion. The chromosomal translocation t(5;11) and the E133K variant in VG5Q are associated with Klippel-Trenaunay syndrome (KTS), a disorder characterized by diverse effects in the vascular system. In addition to a forkhead-associated (FHA) domain and a G-patch motif, VG5Q contains an N-terminal OCtamer REpeat (OCRE) domain that is characterized by a 5-fold, imperfectly repeated octameric sequence. — an NCBI CDD conserved domain (cd16164); members share this curated model.
