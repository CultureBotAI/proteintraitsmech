identifier: CDD:cd08193
label: "5-hydroxyvalerate dehydrogenase (HVD) catalyzes the oxidation of 5-hydroxyvalerate to 5-oxovalerate with NAD+ as cofactor. 5-hydroxyvalerate dehydrogenase (HVD) is an iron-containing (type III) NAD-dependent alcohol dehydrogenase. It plays a role in the cyclopentanol metabolism biochemical pathway. It catalyzes the oxidation of 5-hydroxyvalerate to 5-oxovalerate with NAD+ as cofactor. This cyclopentanol (cpn) degradation pathway is present in some bacteria which can use cyclopentanol as sole carbon source. In Comamonas sp. strain NCIMB 9872, this enzyme is encoded by the CpnD gene."
definition: >-
  5-hydroxyvalerate dehydrogenase (HVD) catalyzes the oxidation of 5-hydroxyvalerate to 5-oxovalerate with NAD+ as cofactor. 5-hydroxyvalerate dehydrogenase (HVD) is an iron-containing (type III) NAD-dependent alcohol dehydrogenase. It plays a role in the cyclopentanol metabolism biochemical pathway. It catalyzes the oxidation of 5-hydroxyvalerate to 5-oxovalerate with NAD+ as cofactor. This cyclopentanol (cpn) degradation pathway is present in some bacteria which can use cyclopentanol as sole carbon source. In Comamonas sp. strain NCIMB 9872, this enzyme is encoded by the CpnD gene. — an NCBI CDD conserved domain (cd08193); members share this curated model.
