identifier: CDD:cd12039
label: "Src Homology 3 domain of Membrane Protein, Palmitoylated 3 (or MAGUK p55 subfamily member 3). MPP3 is a scaffolding protein that colocalizes with MPP5 and CRB1 at the subdpical region adjacent to adherens junctions and may function in photoreceptor polarity. It interacts with some nectins and regulates their trafficking and processing. Nectins are cell-cell adhesion proteins involved in the establishment apical-basal polarity at cell adhesion sites. It is one of seven vertebrate homologs of the Drosophila Stardust protein, which is required in establishing cell polarity, and it contains two L27 domains followed by the core of three domains characteristic of MAGUK (membrane-associated guanylate kinase) proteins: PDZ, SH3, and guanylate kinase (GuK). The GuK domain in MAGUK proteins is enzymatically inactive; instead, the domain mediates protein-protein interactions and associates intramolecularly with the SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Membrane Protein, Palmitoylated 3 (or MAGUK p55 subfamily member 3). MPP3 is a scaffolding protein that colocalizes with MPP5 and CRB1 at the subdpical region adjacent to adherens junctions and may function in photoreceptor polarity. It interacts with some nectins and regulates their trafficking and processing. Nectins are cell-cell adhesion proteins involved in the establishment apical-basal polarity at cell adhesion sites. It is one of seven vertebrate homologs of the Drosophila Stardust protein, which is required in establishing cell polarity, and it contains two L27 domains followed by the core of three domains characteristic of MAGUK (membrane-associated guanylate kinase) proteins: PDZ, SH3, and guanylate kinase (GuK). The GuK domain in MAGUK proteins is enzymatically inactive; instead, the domain mediates protein-protein interactions and associates intramolecularly with the SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12039); members share this curated model.
