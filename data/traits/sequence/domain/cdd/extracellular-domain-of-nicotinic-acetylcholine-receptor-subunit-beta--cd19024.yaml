identifier: CDD:cd19024
label: "extracellular domain of nicotinic acetylcholine receptor subunit beta 1 (CHRNB1). This subfamily contains the extracellular domain of nicotinic acetylcholine receptor subunit beta 1 (beta1), encoded by the CHRNB1 gene. It is a muscle type subunit found predominantly in the neuromuscular junction (NMJ), but also in other tissues and cell lines such as adrenal glands, carcinomas, brain, and lung. Simultaneous mRNA and protein expression of beta1 nAChR subunit is present in human placenta and skeletal muscle. The beta1 nAChR subunit forms a heteropentamer with either (alpha1)2, gamma and delta subunits in embryonic type or (alpha1)2, epsilon and delta subunits in adult type receptors. nAChRs containing beta1 subunits have been attributed to efficient clustering and anchoring of the receptors to the cytoskeleton which is important for formation of synapses in the NMJ. Mutations in the transmembrane domain region of this gene are associated with slow-channel congenital myasthenic syndrome (CMS)."
definition: >-
  extracellular domain of nicotinic acetylcholine receptor subunit beta 1 (CHRNB1). This subfamily contains the extracellular domain of nicotinic acetylcholine receptor subunit beta 1 (beta1), encoded by the CHRNB1 gene. It is a muscle type subunit found predominantly in the neuromuscular junction (NMJ), but also in other tissues and cell lines such as adrenal glands, carcinomas, brain, and lung. Simultaneous mRNA and protein expression of beta1 nAChR subunit is present in human placenta and skeletal muscle. The beta1 nAChR subunit forms a heteropentamer with either (alpha1)2, gamma and delta subunits in embryonic type or (alpha1)2, epsilon and delta subunits in adult type receptors. nAChRs containing beta1 subunits have been attributed to efficient clustering and anchoring of the receptors to the cytoskeleton which is important for formation of synapses in the NMJ. Mutations in the transmembrane domain region of this gene are associated with slow-channel congenital myasthenic syndrome (CMS). — an NCBI CDD conserved domain (cd19024); members share this curated model.
