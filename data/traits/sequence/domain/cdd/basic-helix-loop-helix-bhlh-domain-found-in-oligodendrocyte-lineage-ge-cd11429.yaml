identifier: CDD:cd11429
label: "basic helix-loop-helix (bHLH) domain found in Oligodendrocyte lineage genes (OLIG) family of transcription factors. The OLIG family includes three bHLH transcription factors, Oligo1-3, which are expressed in both the developing and mature central nervous system. Oligo1 and Oligo2 are expressed in a nervous tissue-specific manner, but Oligo3 is found mainly in non-neural tissues. Oligo (also known as Olig) have key roles in the specification of motor neurons, dorsal interneurons, and oligodendrocytes. Oligo1, also termed Class B basic helix-loop-helix protein 6 (bHLHb6), or Class E basic helix-loop-helix protein 21 (bHLHe21), promotes formation and maturation of oligodendrocytes, especially within the brain. Oligo2, also termed Class B basic helix-loop-helix protein 1 (bHLHb1), or Class E basic helix-loop-helix protein 19 (bHLHe19), or protein kinase C-binding protein 2, or protein kinase C-binding protein RACK17, is required for oligodendrocyte and motor neuron specification in the spinal cord, as well as for the development of somatic motor neurons in the hindbrain. It cooperates with OLIG1 to establish the MN progenitors (pMN) domain of the embryonic neural tube. Oligo3, also termed Class B basic helix-loop-helix protein 7 (bHLHb7), or Class E basic helix-loop-helix protein 20 (bHLHe20), is expressed in the ventricular zone of the dorsal alar plate of the hindbrain and involved in regulating the development of dorsal and ventral spinal cord. It may determine the distinct specification program of class A neurons in the dorsal part of the spinal cord and suppress specification of class B neurons. This family also includes two OLIG-related bHLH transcription factors, bHLHe22 and bHLHe23. bHLHe22, also termed Class B basic helix-loop-helix protein 5 (bHLHb5), or trinucleotide repeat-containing gene 20 protein, is a neural-specific transcriptional repressor that is expressed in both excitatory (unipolar brush cells) and inhibitory neurons (cartwheel cells) of the dorsal cochlear nucleus (DCN) during development. It is important for the proper development and/or survival of a number of neural cell types. bHLHe23, also termed Class B basic helix-loop-helix protein 4 (bHLHb4), is expressed in rod bipolar cells and is required for rod bipolar cell maturation. bHLHe23 have roles in spinal interneuron differentiation by mechanisms linked to the Notch signaling pathway. It modulates the expression of genes required for the differentiation and/or maintenance of pancreatic and neuronal cell types."
