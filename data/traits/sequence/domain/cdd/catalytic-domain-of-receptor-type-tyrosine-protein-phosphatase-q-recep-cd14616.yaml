identifier: CDD:cd14616
label: "catalytic domain of receptor-type tyrosine-protein phosphatase Q. Receptor-type tyrosine-protein phosphatase Q (PTPRQ or R-PTP-Q), also called phosphatidylinositol phosphatase PTPRQ, belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPRQ is a member of the R3 subfamily of receptor-type phosphotyrosine phosphatases (RPTP), characterized by a unique modular composition consisting of multiple extracellular fibronectin type III (FN3) repeats (18 in PTPRQ) and a single (most RPTP subtypes have two) cytoplasmic catalytic PTP domain. It displays low tyrosine-protein phosphatase activity; rather, it functions as a phosphatidylinositol phosphatase required for auditory processes. It regulates the levels of phosphatidylinositol 4,5-bisphosphate (PIP2) in the basal region of hair bundles. It can dephosphorylate a broad range of phosphatidylinositol phosphates, including phosphatidylinositol 3,4,5-trisphosphate and most phosphatidylinositol monophosphates and diphosphates."
