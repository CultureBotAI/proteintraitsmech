identifier: CDD:cd05103
label: "Catalytic domain of the Protein Tyrosine Kinase, Vascular Endothelial Growth Factor Receptor 2. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. VEGFR2 (or Flk1) binds the ligands VEGFA, VEGFC, VEGFD and VEGFE. VEGFR2 signaling is implicated in all aspects of normal and pathological vascular endothelial cell biology. It induces a variety of cellular effects including migration, survival, and proliferation. It is critical in regulating embryonic vascular development and angiogenesis. VEGFR2 is the major signal transducer in pathological angiogenesis including cancer and diabetic retinopathy, and is a target for inhibition in cancer therapy. The carboxyl terminus of VEGFR2 plays an important role in its autophosphorylation and activation. VEGFR2 is a member of the VEGFR subfamily of proteins, which are receptor PTKs (RTKs) containing an extracellular ligand-binding region with seven immunoglobulin (Ig)-like domains, a transmembrane segment, and an intracellular catalytic domain. The binding of VEGFRs to their ligands, the VEGFs, leads to receptor dimerization, activation, and intracellular signaling. The VEGFR2 subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Protein Tyrosine Kinase, Vascular Endothelial Growth Factor Receptor 2. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. VEGFR2 (or Flk1) binds the ligands VEGFA, VEGFC, VEGFD and VEGFE. VEGFR2 signaling is implicated in all aspects of normal and pathological vascular endothelial cell biology. It induces a variety of cellular effects including migration, survival, and proliferation. It is critical in regulating embryonic vascular development and angiogenesis. VEGFR2 is the major signal transducer in pathological angiogenesis including cancer and diabetic retinopathy, and is a target for inhibition in cancer therapy. The carboxyl terminus of VEGFR2 plays an important role in its autophosphorylation and activation. VEGFR2 is a member of the VEGFR subfamily of proteins, which are receptor PTKs (RTKs) containing an extracellular ligand-binding region with seven immunoglobulin (Ig)-like domains, a transmembrane segment, and an intracellular catalytic domain. The binding of VEGFRs to their ligands, the VEGFs, leads to receptor dimerization, activation, and intracellular signaling. The VEGFR2 subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05103); members share this curated model.
