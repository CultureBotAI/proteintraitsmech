identifier: CDD:cd11362
label: "Ribonuclease PH. Ribonuclease PH (RNase PH)-like 3'-5' exoribonucleases are enzymes that catalyze the 3' to 5' processing and decay of RNA substrates. Structurally all members of this family form hexameric rings (trimers of dimers). Bacterial RNase PH forms a homohexameric ring, and removes nucleotide residues following the -CCA terminus of tRNA."
definition: >-
  Ribonuclease PH. Ribonuclease PH (RNase PH)-like 3'-5' exoribonucleases are enzymes that catalyze the 3' to 5' processing and decay of RNA substrates. Structurally all members of this family form hexameric rings (trimers of dimers). Bacterial RNase PH forms a homohexameric ring, and removes nucleotide residues following the -CCA terminus of tRNA. — an NCBI CDD conserved domain (cd11362); members share this curated model.
