identifier: CDD:cd10358
label: "Src homology 2 domain found in protein-tyrosine kinase-6 (PTK6) which is also known as breast tumor kinase (Brk). Human protein-tyrosine kinase-6 (PTK6, also known as breast tumor kinase (Brk)) is a member of the non-receptor protein-tyrosine kinase family and is expressed in two-thirds of all breast tumors. PTK6 (9). PTK6 contains a SH3 domain, a SH2 domain, and catalytic domains. For the case of the non-receptor protein-tyrosine kinases, the SH2 domain is typically involved in negative regulation of kinase activity by binding to a phosphorylated tyrosine residue near to the C terminus. The C-terminal sequence of PTK6 (PTSpYENPT where pY is phosphotyrosine) is thought to be a self-ligand for the SH2 domain. The structure of the SH2 domain resembles other SH2 domains except for a centrally located four-stranded antiparallel beta-sheet (strands betaA, betaB, betaC, and betaD). There are also differences in the loop length which might be responsible for PTK6 ligand specificity. There are two possible means of regulation of PTK6: autoinhibitory with the phosphorylation of Tyr playing a role in its negative regulation and autophosphorylation at this site, though it has been shown that PTK6 might phosphorylate signal transduction-associated proteins Sam68 and signal transducing adaptor family member 2 (STAP/BKS) in vivo. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 domain found in protein-tyrosine kinase-6 (PTK6) which is also known as breast tumor kinase (Brk). Human protein-tyrosine kinase-6 (PTK6, also known as breast tumor kinase (Brk)) is a member of the non-receptor protein-tyrosine kinase family and is expressed in two-thirds of all breast tumors. PTK6 (9). PTK6 contains a SH3 domain, a SH2 domain, and catalytic domains. For the case of the non-receptor protein-tyrosine kinases, the SH2 domain is typically involved in negative regulation of kinase activity by binding to a phosphorylated tyrosine residue near to the C terminus. The C-terminal sequence of PTK6 (PTSpYENPT where pY is phosphotyrosine) is thought to be a self-ligand for the SH2 domain. The structure of the SH2 domain resembles other SH2 domains except for a centrally located four-stranded antiparallel beta-sheet (strands betaA, betaB, betaC, and betaD). There are also differences in the loop length which might be responsible for PTK6 ligand specificity. There are two possible means of regulation of PTK6: autoinhibitory with the phosphorylation of Tyr playing a role in its negative regulation and autophosphorylation at this site, though it has been shown that PTK6 might phosphorylate signal transduction-associated proteins Sam68 and signal transducing adaptor family member 2 (STAP/BKS) in vivo. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10358); members share this curated model.
