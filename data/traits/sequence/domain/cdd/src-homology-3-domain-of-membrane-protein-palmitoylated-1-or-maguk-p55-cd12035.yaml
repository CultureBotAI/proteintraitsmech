identifier: CDD:cd12035
label: "Src Homology 3 domain of Membrane Protein, Palmitoylated 1 (or MAGUK p55 subfamily member 1)-like proteins. This subfamily includes MPP1, CASK (Calcium/calmodulin-dependent Serine protein Kinase), Caenorhabditis elegans lin-2, and similar proteins. MPP1 and CASK are scaffolding proteins from the MAGUK (membrane-associated guanylate kinase) protein family, which is characterized by the presence of a core of three domains: PDZ, SH3, and guanylate kinase (GuK). In addition, they also have the Hook (Protein 4.1 Binding) motif in between the SH3 and GuK domains. The GuK domain in MAGUK proteins is enzymatically inactive; instead, the domain mediates protein-protein interactions and associates intramolecularly with the SH3 domain. CASK and lin-2 also contain an N-terminal calmodulin-dependent kinase (CaMK)-like domain and two L27 domains. MPP1 is ubiquitously-expressed and plays roles in regulating neutrophil polarity, cell shape, hair cell development, and neural development and patterning of the retina. CASK is highly expressed in the mammalian nervous system and plays roles in synaptic protein targeting, neural development, and gene expression regulation. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
