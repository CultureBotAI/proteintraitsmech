identifier: CDD:cd02298
label: CHMSA-DH
definition: >-
  CHMSA-DH. The CHMSA-DH CD includes the oxidoreductase, 4-carboxy-2-hydroxymuconate-6-semialdehyde dehydrogenase involved in the protocatechuate 4,5-cleavage pathway of Sphingomonas paucimobilis SYK-6; and other related sequences. Members of this CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the glucose-fructose oxidoreductase superfamily of proteins
