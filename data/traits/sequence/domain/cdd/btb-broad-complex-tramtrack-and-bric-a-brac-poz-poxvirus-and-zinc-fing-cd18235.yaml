identifier: CDD:cd18235
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like proteins, KLHL2 and KLHL3. The family includes Kelch-like proteins, KLHL2 and KLHL3. KLHL2 is a novel actin-binding protein predominantly expressed in brain. It plays a role in the reorganization of the actin cytoskeleton, and promotes growth of cell projections in oligodendrocyte precursors. KLHL2 and KLHL3 each functions as a component of an E3 ubiquitin ligase complex that mediates the ubiquitination of target proteins. They contain a BTB domain and kelch repeat domains, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like proteins, KLHL2 and KLHL3. The family includes Kelch-like proteins, KLHL2 and KLHL3. KLHL2 is a novel actin-binding protein predominantly expressed in brain. It plays a role in the reorganization of the actin cytoskeleton, and promotes growth of cell projections in oligodendrocyte precursors. KLHL2 and KLHL3 each functions as a component of an E3 ubiquitin ligase complex that mediates the ubiquitination of target proteins. They contain a BTB domain and kelch repeat domains, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18235); members share this curated model.
