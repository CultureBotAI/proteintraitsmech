identifier: CDD:cd16604
label: "RING finger, HC subclass, found in tripartite motif-containing protein 47 (TRIM47) and similar proteins. TRIM47, also known as gene overexpressed in astrocytoma protein (GOA) or RING finger protein 100 (RNF100), belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, a B-box, and two coiled coil domains, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain. It plays an important role in the process of dedifferentiation that is associated with astrocytoma tumorigenesis. This subfamily also includes RING finger protein 135 (RNF135). RNF135, also known as RIG-I E3 ubiquitin ligase (REUL) or Riplet, is a widely expressed E3 ubiquitin-protein ligase that consists of an N-terminal C3HC4-type RING-HC finger and C-terminal B30.2/SPRY and PRY motifs, but lacks the B-box and coiled-coil domains that are also typically present in TRIM proteins. RNF135 serves as a specific retinoic acid-inducible gene-I (RIG-I)-interacting protein that ubiquitinates RIG-I and specifically stimulates RIG-I-mediated innate antiviral activity to produce antiviral type-I interferon (IFN) during the early phase of viral infection. It also has been identified as a bio-marker and therapy target of glioblastoma. It associates with the ERK signal transduction pathway and plays a role in glioblastoma cell proliferation, migration and cell cycle."
definition: >-
  RING finger, HC subclass, found in tripartite motif-containing protein 47 (TRIM47) and similar proteins. TRIM47, also known as gene overexpressed in astrocytoma protein (GOA) or RING finger protein 100 (RNF100), belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, a B-box, and two coiled coil domains, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain. It plays an important role in the process of dedifferentiation that is associated with astrocytoma tumorigenesis. This subfamily also includes RING finger protein 135 (RNF135). RNF135, also known as RIG-I E3 ubiquitin ligase (REUL) or Riplet, is a widely expressed E3 ubiquitin-protein ligase that consists of an N-terminal C3HC4-type RING-HC finger and C-terminal B30.2/SPRY and PRY motifs, but lacks the B-box and coiled-coil domains that are also typically present in TRIM proteins. RNF135 serves as a specific retinoic acid-inducible gene-I (RIG-I)-interacting protein that ubiquitinates RIG-I and specifically stimulates RIG-I-mediated innate antiviral activity to produce antiviral type-I interferon (IFN) during the early phase of viral infection. It also has been identified as a bio-marker and therapy target of glioblastoma. It associates with the ERK signal transduction pathway and plays a role in glioblastoma cell proliferation, migration and cell cycle. — an NCBI CDD conserved domain (cd16604); members share this curated model.
