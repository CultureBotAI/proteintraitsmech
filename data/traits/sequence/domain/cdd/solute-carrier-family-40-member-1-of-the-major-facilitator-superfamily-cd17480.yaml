identifier: CDD:cd17480
label: MFS_SLC40A1_like
definition: >-
  Solute carrier family 40 member 1 of the Major Facilitator Superfamily of transporters. Solute carrier family 40 member 1 (SLC40A1 or SLC11A3) is also called ferroportin-1 (FPN1) or iron-regulated transporter 1 (IREG1). In the presence of a ferroxidase (hephaestin and/or ceruloplasmin), SLC40A1 acts as an iron exporter ferroportin releases Fe(2+) from cells into plasma, thereby maintaining iron homeostasis. Specially, it is involved in iron export from duodenal epithelial cell and also in the transfer of iron between maternal and fetal circulation. The transport activity of SLC40A1 is suppressed by the peptide hormone hepcidin. This family also includes a bacterial homologue of SLC40A1 (Bdellovibrio bacteriovorus ferroportin). It adopts the major facilitator superfamily fold, but undergoes an intra-domain conformational rearrangement during the transport cycle. SLC40A1 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement
