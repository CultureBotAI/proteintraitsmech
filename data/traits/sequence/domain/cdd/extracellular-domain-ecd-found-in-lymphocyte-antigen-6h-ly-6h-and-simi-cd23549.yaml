identifier: CDD:cd23549
label: TFP_LU_ECD_Ly6H
definition: >-
  extracellular domain (ECD) found in lymphocyte antigen 6H (Ly-6H) and similar proteins. Ly-6H may act as a modulator of nicotinic acetylcholine receptors (nAChRs) activity. In vitro it inhibits alpha-3:beta-4-containing nAChRs maximum response. Ly-6H may play a role in the intracellular trafficking of alpha-7-containing nAChRs and may inhibit their expression at the cell surface. It seems to inhibit alpha-7/CHRNA7 signaling in hippocampal neurons. Ly-6H contains an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)
