identifier: CDD:cd21671
label: "synaptotagmin-like mitochondrial-lipid-binding protein (SMP) domain found in maintenance of mitochondrial morphology protein 1 (Mmm1) and similar proteins. Maintenance of mitochondrial morphology protein 1 (Mmm1), also called mitochondrial outer membrane protein Mmm1, or yeast mitochondrial escape protein 6 (YME6), is a mitochondrial outer membrane protein essential for establishing and maintaining the structure of mitochondria and maintenance of mtDNA nucleoids. It is a component of the ER-mitochondrion encounter structure/ mitochondrial distribution and morphology (ERMES/Mdm) complex, which serves as a molecular tether to connect the endoplasmic reticulum and mitochondria. Components of this complex are involved in the control of mitochondrial shape and protein biogenesis, and function in nonvesicular lipid trafficking between the ER and mitochondria. The Mdm12-Mmm1 subcomplex functions in the major beta-barrel assembly pathway that is responsible for biogenesis of all outer membrane beta-barrel proteins, and acts in a late step after the SAM complex. The Mdm10-Mdm12-Mmm1 subcomplex further acts in the TOM40-specific pathway after the action of the Mdm12-Mmm1 complex.  This model corresponds to the SMP domain of Mmm1, which may be implicated in lipid transport."
definition: >-
  synaptotagmin-like mitochondrial-lipid-binding protein (SMP) domain found in maintenance of mitochondrial morphology protein 1 (Mmm1) and similar proteins. Maintenance of mitochondrial morphology protein 1 (Mmm1), also called mitochondrial outer membrane protein Mmm1, or yeast mitochondrial escape protein 6 (YME6), is a mitochondrial outer membrane protein essential for establishing and maintaining the structure of mitochondria and maintenance of mtDNA nucleoids. It is a component of the ER-mitochondrion encounter structure/ mitochondrial distribution and morphology (ERMES/Mdm) complex, which serves as a molecular tether to connect the endoplasmic reticulum and mitochondria. Components of this complex are involved in the control of mitochondrial shape and protein biogenesis, and function in nonvesicular lipid trafficking between the ER and mitochondria. The Mdm12-Mmm1 subcomplex functions in the major beta-barrel assembly pathway that is responsible for biogenesis of all outer membrane beta-barrel proteins, and acts in a late step after the SAM complex. The Mdm10-Mdm12-Mmm1 subcomplex further acts in the TOM40-specific pathway after the action of the Mdm12-Mmm1 complex. This model corresponds to the SMP domain of Mmm1, which may be implicated in lipid transport. — an NCBI CDD conserved domain (cd21671); members share this curated model.
