identifier: CDD:cd21621
label: "RNA recognition motif 2 (RRM2) found in Schizosaccharomyces pombe mRNA export factor Crp79, meiotically up-regulated gene 28 protein (Mug28) and similar proteins. Crp79, also called meiotic expression up-regulated protein 5 (Mug5), or polyadenylate-binding protein crp79, or PABP, or poly(A)-binding protein, is an auxiliary mRNA export factor that binds the poly(A) tail of mRNA and is involved in the export of mRNA from the nucleus to the cytoplasm. Mug28 is a meiosis-specific protein that regulates spore wall formation. Members in this family contain three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). The model corresponds to the second RRM motif."
definition: >-
  RNA recognition motif 2 (RRM2) found in Schizosaccharomyces pombe mRNA export factor Crp79, meiotically up-regulated gene 28 protein (Mug28) and similar proteins. Crp79, also called meiotic expression up-regulated protein 5 (Mug5), or polyadenylate-binding protein crp79, or PABP, or poly(A)-binding protein, is an auxiliary mRNA export factor that binds the poly(A) tail of mRNA and is involved in the export of mRNA from the nucleus to the cytoplasm. Mug28 is a meiosis-specific protein that regulates spore wall formation. Members in this family contain three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). The model corresponds to the second RRM motif. — an NCBI CDD conserved domain (cd21621); members share this curated model.
