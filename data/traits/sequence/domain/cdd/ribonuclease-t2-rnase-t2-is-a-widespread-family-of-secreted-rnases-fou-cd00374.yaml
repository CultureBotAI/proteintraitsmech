label: "Ribonuclease T2 (RNase T2) is a widespread family of secreted RNases found in every organism examined thus far.  This family includes RNase Rh, RNase MC1, RNase LE, and self-incompatibility RNases (S-RNases).  Plant T2 RNases are expressed during leaf senescence in order to scavenge phosphate from ribonucleotides. They are also expressed in response to wounding or pathogen invasion. S-RNases are thought to prevent self-fertilization by acting as selective cytotoxins of \"self\" pollen."
definition: >-
  Ribonuclease T2 (RNase T2) is a widespread family of secreted RNases found in every organism examined thus far. This family includes RNase Rh, RNase MC1, RNase LE, and self-incompatibility RNases (S-RNases). Plant T2 RNases are expressed during leaf senescence in order to scavenge phosphate from ribonucleotides. They are also expressed in response to wounding or pathogen invasion. S-RNases are thought to prevent self-fertilization by acting as selective cytotoxins of "self" pollen. — an NCBI CDD conserved domain (cd00374); members share this curated model.
