identifier: CDD:cd20269
label: "LYR (leucine-tyrosine-arginine) motif found in LYR motif-containing protein 9 (LYRM9) and similar proteins. LYRM9 is an uncharacterized LYR motif-containing protein that belongs to the Complex1_LYR-like superfamily which consists of proteins of diverse functions that are exclusively found in eukaryotes and contain the conserved tripeptide 'LYR' close to the N-terminus."
definition: >-
