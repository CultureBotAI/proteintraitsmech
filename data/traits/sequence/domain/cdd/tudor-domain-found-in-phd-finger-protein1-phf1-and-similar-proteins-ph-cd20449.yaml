identifier: CDD:cd20449
label: "Tudor domain found in PHD finger protein1 (PHF1) and similar proteins. PHF1, also called Polycomb-like protein 1 (PCL1), together with JARID2 and AEBP2, associates with the Polycomb repressive complex 2 (PRC2), which is the major H3K27 methyltransferase that regulates pluripotency, differentiation, and tumorigenesis, through catalysis of histone H3 lysine 27 trimethylation (H3K27me3) on chromatin. PHF1 is essential in epigenetic regulation and genome maintenance. It acts as a dual reader of lysine trimethylation at lysine 36 of histone H3 and lysine 27 of histone variant H3t. Moreover, PHF1 is required for efficient H3-K27 trimethylation (H3K27me3) and Hox gene silencing. It can mediate deposition of the repressive H3K27me3 mark and acts as a cofactor in early DNA-damage response. PHF1 consists of an N-terminal Tudor domain followed by two PHD domains, and a C-terminal MTF2 domain. Its Tudor domain selectively binds to histone H3K36me3."
definition: >-
  Tudor domain found in PHD finger protein1 (PHF1) and similar proteins. PHF1, also called Polycomb-like protein 1 (PCL1), together with JARID2 and AEBP2, associates with the Polycomb repressive complex 2 (PRC2), which is the major H3K27 methyltransferase that regulates pluripotency, differentiation, and tumorigenesis, through catalysis of histone H3 lysine 27 trimethylation (H3K27me3) on chromatin. PHF1 is essential in epigenetic regulation and genome maintenance. It acts as a dual reader of lysine trimethylation at lysine 36 of histone H3 and lysine 27 of histone variant H3t. Moreover, PHF1 is required for efficient H3-K27 trimethylation (H3K27me3) and Hox gene silencing. It can mediate deposition of the repressive H3K27me3 mark and acts as a cofactor in early DNA-damage response. PHF1 consists of an N-terminal Tudor domain followed by two PHD domains, and a C-terminal MTF2 domain. Its Tudor domain selectively binds to histone H3K36me3. — an NCBI CDD conserved domain (cd20449); members share this curated model.
