identifier: CDD:cd05743
label: "Immunoglobulin (Ig)-like domain of the human basement membrane heparan sulfate proteoglycan perlecan and similar proteins. The members here are composed of the immunoglobulin (Ig)-like domain of the human basement membrane heparan sulfate proteoglycan perlecan, also known as HSPG2, and similar proteins. Perlecan consists of five domains: domain I has three putative heparan sulfate attachment sites, domain II has four LDL receptor-like repeats, and one Ig-like repeat, domain III resembles the short arm of laminin chains, domain IV has multiple Ig-like repeats (21 repeats in human perlecan), and domain V resembles the globular G domain of the laminin A chain and internal repeats of EGF. Perlecan may participate in a variety of biological functions including cell binding, LDL-metabolism, basement membrane assembly and selective permeability, calcium binding, and growth- and neurite-promoting activities."
definition: >-
