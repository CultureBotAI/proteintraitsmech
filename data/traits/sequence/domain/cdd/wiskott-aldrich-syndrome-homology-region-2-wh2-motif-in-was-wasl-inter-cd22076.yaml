identifier: CDD:cd22076
label: "Wiskott Aldrich syndrome homology region 2 (WH2 motif) in WAS/WASL-interacting protein family member 1. This family contains the Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2) in WAS/WASL-interacting protein family (WIPF, also known as WASP-interacting protein or WIP) member 1 (WIPF1). WIPF1 is a ubiquitously expressed proline-rich multidomain protein and is a binding partner and chaperone of WASP. It stabilizes actin filaments and regulates actin organization and polymerization which are associated with cell migration and invasion. Mutations in the WIPF1 binding site of WASP or in WIPF1 itself cause Wiskott-Aldrich syndrome (WAS), a rare X-linked recessive disease characterized by eczema, thrombocytopenia, immune deficiency, and bloody diarrhea. Aberrant expression of WIPF1 contributes to the invasion and metastasis of several malignancies such breast cancer, glioma and colorectal cancer; it has been identified as an oncoprotein in human pancreatic ductal adenocarcinoma (PDAC) and is associated with poor survival."
definition: >-
  Wiskott Aldrich syndrome homology region 2 (WH2 motif) in WAS/WASL-interacting protein family member 1. This family contains the Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2) in WAS/WASL-interacting protein family (WIPF, also known as WASP-interacting protein or WIP) member 1 (WIPF1). WIPF1 is a ubiquitously expressed proline-rich multidomain protein and is a binding partner and chaperone of WASP. It stabilizes actin filaments and regulates actin organization and polymerization which are associated with cell migration and invasion. Mutations in the WIPF1 binding site of WASP or in WIPF1 itself cause Wiskott-Aldrich syndrome (WAS), a rare X-linked recessive disease characterized by eczema, thrombocytopenia, immune deficiency, and bloody diarrhea. Aberrant expression of WIPF1 contributes to the invasion and metastasis of several malignancies such breast cancer, glioma and colorectal cancer; it has been identified as an oncoprotein in human pancreatic ductal adenocarcinoma (PDAC) and is associated with poor survival. — an NCBI CDD conserved domain (cd22076); members share this curated model.
