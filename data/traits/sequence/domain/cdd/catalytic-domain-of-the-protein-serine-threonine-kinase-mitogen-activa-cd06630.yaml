identifier: CDD:cd06630
label: "Catalytic domain of the Protein Serine/Threonine Kinase, Mitogen-Activated Protein (MAP)/Extracellular signal-Regulated Kinase (ERK) Kinase Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MEKK1 is a MAPK kinase kinase (MAPKKK or MKKK) that phosphorylates and activates activates the ERK1/2 and c-Jun N-terminal kinase (JNK) pathways by activating their respective MAPKKs, MEK1/2 and MKK4/MKK7, respectively. MEKK1 is important in regulating cell survival and apoptosis. MEKK1 also plays a role in cell migration, tissue maintenance and homeostasis, and wound healing. The MEKK1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Protein Serine/Threonine Kinase, Mitogen-Activated Protein (MAP)/Extracellular signal-Regulated Kinase (ERK) Kinase Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MEKK1 is a MAPK kinase kinase (MAPKKK or MKKK) that phosphorylates and activates activates the ERK1/2 and c-Jun N-terminal kinase (JNK) pathways by activating their respective MAPKKs, MEK1/2 and MKK4/MKK7, respectively. MEKK1 is important in regulating cell survival and apoptosis. MEKK1 also plays a role in cell migration, tissue maintenance and homeostasis, and wound healing. The MEKK1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd06630); members share this curated model.
