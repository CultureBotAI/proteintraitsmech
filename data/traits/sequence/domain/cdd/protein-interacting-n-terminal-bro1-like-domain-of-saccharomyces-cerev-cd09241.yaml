identifier: CDD:cd09241
label: "Protein-interacting, N-terminal, Bro1-like domain of Saccharomyces cerevisiae Rim20 and related proteins. This family contains the N-terminal, Bro1-like domain of Saccharomyces cerevisiae Rim20 (also known as PalA) and related proteins. It belongs to the BRO1_Alix_like superfamily which also includes the Bro1-like domains of mammalian Alix (apoptosis-linked gene-2 interacting protein X), His-Domain type N23 protein tyrosine phosphatase (HD-PTP, also known as PTPN23), RhoA-binding proteins Rhophilin-1 and -2, Brox, Saccharomyces cerevisiae Bro1, Ustilago maydis Rim23 (also known as PalC), and related domains. Alix, HD-PTP, Brox, Bro1, Rim20, and Rim23, interact with the ESCRT (Endosomal Sorting Complexes Required for Transport) system. Rim20 and Rim23 participate in the response to the external pH via the Rim101 pathway. Bro1-like domains are boomerang-shaped, and part of the domain is a tetratricopeptide repeat (TPR)-like structure. Bro1-like domains bind components of the ESCRT-III complex: Snf7 in the case of Rim20. RIM20, and some other members of the BRO1_Alix_like  superfamily including Alix, also have a V-shaped (V) domain. In the case of Alix, the V-domain is a dimerization domain that also contains a binding site for the retroviral late assembly (L) domain YPXnL motif, which is partially conserved in the V-domain superfamily. Rim20 localizes to endosomes under alkaline pH conditions. By binding Snf7, it may bring the protease Rim13 (a YPxL-containing transcription factor) into proximity with Rim101, and thus aid in the proteolytic activation of the latter. Rim20 and other intermediates in the Rim101 pathway play roles in the pathogenesis of fungal corneal infection during Candida albicans keratitis."
definition: >-
  Protein-interacting, N-terminal, Bro1-like domain of Saccharomyces cerevisiae Rim20 and related proteins. This family contains the N-terminal, Bro1-like domain of Saccharomyces cerevisiae Rim20 (also known as PalA) and related proteins. It belongs to the BRO1_Alix_like superfamily which also includes the Bro1-like domains of mammalian Alix (apoptosis-linked gene-2 interacting protein X), His-Domain type N23 protein tyrosine phosphatase (HD-PTP, also known as PTPN23), RhoA-binding proteins Rhophilin-1 and -2, Brox, Saccharomyces cerevisiae Bro1, Ustilago maydis Rim23 (also known as PalC), and related domains. Alix, HD-PTP, Brox, Bro1, Rim20, and Rim23, interact with the ESCRT (Endosomal Sorting Complexes Required for Transport) system. Rim20 and Rim23 participate in the response to the external pH via the Rim101 pathway. Bro1-like domains are boomerang-shaped, and part of the domain is a tetratricopeptide repeat (TPR)-like structure. Bro1-like domains bind components of the ESCRT-III complex: Snf7 in the case of Rim20. RIM20, and some other members of the BRO1_Alix_like superfamily including Alix, also have a V-shaped (V) domain. In the case of Alix, the V-domain is a dimerization domain that also contains a binding site for the retroviral late assembly (L) domain YPXnL motif, which is partially conserved in the V-domain superfamily. Rim20 localizes to endosomes under alkaline pH conditions. By binding Snf7, it may bring the protease Rim13 (a YPxL-containing transcription factor) into proximity with Rim101, and thus aid in the proteolytic activation of the latter. Rim20 and other intermediates in the Rim101 pathway play roles in the pathogenesis of fungal corneal infection during Candida albicans keratitis. — an NCBI CDD conserved domain (cd09241); members share this curated model.
