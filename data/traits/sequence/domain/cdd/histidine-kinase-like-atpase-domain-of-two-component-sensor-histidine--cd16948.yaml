identifier: CDD:cd16948
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Bacillus subtilis BceS, YxdK, and Bacillus thuringiensis YvcQ. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) such as Bacillus subtilis BceS and Bacillus thuringiensis YvcQ, the HKs of the two-component regulatory system (TCSs) BceS-BceR and YvcQ-YvcP, repsectively, which are both involved in regulating bacitracin resistance. It also includes the HATPase domain of YxdK, the HK of YxdK-YxdJ TCS involved in sensing antimicrobial compounds."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Bacillus subtilis BceS, YxdK, and Bacillus thuringiensis YvcQ. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) such as Bacillus subtilis BceS and Bacillus thuringiensis YvcQ, the HKs of the two-component regulatory system (TCSs) BceS-BceR and YvcQ-YvcP, repsectively, which are both involved in regulating bacitracin resistance. It also includes the HATPase domain of YxdK, the HK of YxdK-YxdJ TCS involved in sensing antimicrobial compounds. — an NCBI CDD conserved domain (cd16948); members share this curated model.
