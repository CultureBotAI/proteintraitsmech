identifier: CDD:cd17127
label: "ubiquitin-like (Ubl) domain found in TRAF family member-associated NF-kappaB activator (TANK)-binding kinase 1 (TBK1). TBK1, also termed NF-kappa-B-activating kinase, or T2K, or TANK-binding kinase 1, is an interferon regulatory factor-activating kinase that is a non-canonical member of IKK family. It plays a role in regulating innate immunity, inflammation and oncogenic signaling. TBK1 is involved in the regulation of type I interferons and of nuclear factor-kappaB (NF-kappaB) signal transduction. It regulates factors such as IRF3 and IRF7, promoting antiviral activity in the interferon signaling pathways. It modulates inflammatory hyperalgesia by regulating MAP kinases and NF-kappaB dependent genes. Moreover, TBK1 acts as a central player in the intracellular nucleic acid-sensing pathways involved in antiviral signaling. Dysregulation of TBK1 activity is often associated with autoimmune diseases and cancer. TBK1 contains an N-terminal protein kinase domain followed a ubiquitin-like (Ubl) domain, and a C-terminal elongated helical domain. The Ubl domain acts as a protein-protein interaction domain, and has been implicated in regulating kinase activity, which modulates interactions in the interferon pathway."
definition: >-
  ubiquitin-like (Ubl) domain found in TRAF family member-associated NF-kappaB activator (TANK)-binding kinase 1 (TBK1). TBK1, also termed NF-kappa-B-activating kinase, or T2K, or TANK-binding kinase 1, is an interferon regulatory factor-activating kinase that is a non-canonical member of IKK family. It plays a role in regulating innate immunity, inflammation and oncogenic signaling. TBK1 is involved in the regulation of type I interferons and of nuclear factor-kappaB (NF-kappaB) signal transduction. It regulates factors such as IRF3 and IRF7, promoting antiviral activity in the interferon signaling pathways. It modulates inflammatory hyperalgesia by regulating MAP kinases and NF-kappaB dependent genes. Moreover, TBK1 acts as a central player in the intracellular nucleic acid-sensing pathways involved in antiviral signaling. Dysregulation of TBK1 activity is often associated with autoimmune diseases and cancer. TBK1 contains an N-terminal protein kinase domain followed a ubiquitin-like (Ubl) domain, and a C-terminal elongated helical domain. The Ubl domain acts as a protein-protein interaction domain, and has been implicated in regulating kinase activity, which modulates interactions in the interferon pathway. — an NCBI CDD conserved domain (cd17127); members share this curated model.
