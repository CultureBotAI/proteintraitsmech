identifier: CDD:cd18419
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium voltage-gated channel subfamily D member 3 (KCND3). KCND3, also called voltage-gated potassium channel subunit Kv4.3, is a pore-forming subunit of voltage-gated rapidly inactivating A-type potassium channels. Mutations in KCND3 cause spinocerebellar ataxia. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. KCND3 is an alpha subunit that forms functional homo- or hetero-tetrameric channels (with other Kv4/KCND alpha subunits) through its BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif. It is modulated by cytoplasmic KChIPs/KCNIPs (Kv-channel interacting proteins), which are small calcium binding proteins with  EF-hand-like domains."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium voltage-gated channel subfamily D member 3 (KCND3). KCND3, also called voltage-gated potassium channel subunit Kv4.3, is a pore-forming subunit of voltage-gated rapidly inactivating A-type potassium channels. Mutations in KCND3 cause spinocerebellar ataxia. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. KCND3 is an alpha subunit that forms functional homo- or hetero-tetrameric channels (with other Kv4/KCND alpha subunits) through its BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif. It is modulated by cytoplasmic KChIPs/KCNIPs (Kv-channel interacting proteins), which are small calcium binding proteins with EF-hand-like domains. — an NCBI CDD conserved domain (cd18419); members share this curated model.
