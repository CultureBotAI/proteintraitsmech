identifier: CDD:cd18092
label: SpoU-like_TrmH
definition: >-
  SAM-dependent tRNA methylase related to TrmH. TrmH catalyzes the transfer of the methyl group from S-adenosyl-L-methionine (AdoMet) to the 2'-OH group of the ribose of the universally conserved guanosine 18 (G18) position in tRNA. It is part of the SpoU family of MTases, a subfamily of the SPOUT methyltransferase superfamily. The SPOUT methyltransferase superfamily is a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot
