identifier: CDD:cd22031
label: "high mobility group (HMG)-box found in group E SRY-related high-mobility group (HMG) box (Sox) transcription factors. SoxE transcription factors includes three members: Sox8, Sox9, and Sox10. They function as important transcriptional regulators of neural differentiation and nervous system development. They regulate mammalian development directing sex determination, gliogenesis, pancreas specification and neural crest development. SOX-8 is specifically expressed by M cells in the intestinal epithelium. It acts as a transcription factor necessary for the maintenance of spermatogenesis. It may play a role in central nervous system, limb and facial development. SOX-9 is involved in cell differentiation, sex determination, and tumorigenesis. It plays a role in chondrocyte differentiation and skeletal development. SOX-10 plays a central role in the development of melanocytes and glial cells from neural crest precursors."
