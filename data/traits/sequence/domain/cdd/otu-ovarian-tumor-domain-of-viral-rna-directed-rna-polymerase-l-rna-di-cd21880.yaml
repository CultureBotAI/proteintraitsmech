identifier: CDD:cd21880
label: "OTU (ovarian tumor) domain of viral RNA-directed RNA polymerase L. RNA-directed RNA polymerase L is also called protein L, large structural protein, replicase, transcriptase, or ubiquitin thioesterase. It displays RNA-directed RNA polymerase (EC 2.7.7.48), deubiquitinase (DUB)/ubiquitin thiolesterase (EC 3.4.19.12), and deISGylating activities. It is a viral homolog of ovarian tumor protease (vOTU) that has been implicated in the downregulation of type I interferon immune response by removing post-translational modifying proteins ubiquitin (Ub) and the Ub-like interferon-simulated gene 15 (ISG15) from host cellular proteins. The attachment of Ub and ISG15 to cellular proteins mediates important innate antiviral responses, and their removal inhibits these antiviral pathways. This subfamily belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad."
definition: >-
  OTU (ovarian tumor) domain of viral RNA-directed RNA polymerase L. RNA-directed RNA polymerase L is also called protein L, large structural protein, replicase, transcriptase, or ubiquitin thioesterase. It displays RNA-directed RNA polymerase (EC 2.7.7.48), deubiquitinase (DUB)/ubiquitin thiolesterase (EC 3.4.19.12), and deISGylating activities. It is a viral homolog of ovarian tumor protease (vOTU) that has been implicated in the downregulation of type I interferon immune response by removing post-translational modifying proteins ubiquitin (Ub) and the Ub-like interferon-simulated gene 15 (ISG15) from host cellular proteins. The attachment of Ub and ISG15 to cellular proteins mediates important innate antiviral responses, and their removal inhibits these antiviral pathways. This subfamily belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad. — an NCBI CDD conserved domain (cd21880); members share this curated model.
