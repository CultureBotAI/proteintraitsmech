identifier: CDD:cd06088
label: "KOW motif of Ribosomal Protein L14. RPL14 is a component of the large ribosomal subunit in both archaea and eukaryotes with KOW motif at its N terminal. KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4. Auto-antibodies to RPL14 in humans have been associated with systemic lupus erythematosus . Although RPL14 is well conserved, it is not found in all archaea, and therefore it is presumably not essential."
definition: >-
  KOW motif of Ribosomal Protein L14. RPL14 is a component of the large ribosomal subunit in both archaea and eukaryotes with KOW motif at its N terminal. KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4. Auto-antibodies to RPL14 in humans have been associated with systemic lupus erythematosus . Although RPL14 is well conserved, it is not found in all archaea, and therefore it is presumably not essential. — an NCBI CDD conserved domain (cd06088); members share this curated model.
