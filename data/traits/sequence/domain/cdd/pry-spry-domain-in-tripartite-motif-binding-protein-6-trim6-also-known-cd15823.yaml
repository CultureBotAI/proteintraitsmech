identifier: CDD:cd15823
label: "PRY/SPRY domain in tripartite motif-binding protein 6 (TRIM6), also known as RING finger protein 89 (RNF89). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM6, also known as RING finger protein 89 (RNF89). TRIM6 domain is composed of RING/B-box/coiled-coil core and also known as RBCC protein. It is selectively expressed in embryonic stem (ES) cells and interacts with the proto-oncogene product Myc, maintaining the pluripotency of the ES cells. TRIM6, together with E2 Ubiquitin conjugase (UbE2K) and K48-linked poly-Ub chains, is critical for the IkappaB kinase epsilon (IKKepsilon) branch of type I interferon (IFN-I) signaling pathway and subsequent establishment of a protective antiviral response."
