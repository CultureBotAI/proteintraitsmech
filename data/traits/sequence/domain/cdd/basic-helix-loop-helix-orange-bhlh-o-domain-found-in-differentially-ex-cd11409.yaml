identifier: CDD:cd11409
label: "basic helix-loop-helix-orange (bHLH-O) domain found in differentially expressed in chondrocytes protein (DEC) family. The DEC family includes two bHLH-O transcriptional repressors, DEC1 and DEC2, which are widely expressed in both embryonic and adult tissues and have been implicated in apoptosis, cell proliferation, and circadian rhythms, as well as malignancy in various cancers. They mediate the circadian rhythm by negatively regulating the activity of the clock genes and clock-controlled genes. They are induced by CLOCK:BMAL1 heterodimer via the CACGTG E-box in the promoter."
definition: >-
  basic helix-loop-helix-orange (bHLH-O) domain found in differentially expressed in chondrocytes protein (DEC) family. The DEC family includes two bHLH-O transcriptional repressors, DEC1 and DEC2, which are widely expressed in both embryonic and adult tissues and have been implicated in apoptosis, cell proliferation, and circadian rhythms, as well as malignancy in various cancers. They mediate the circadian rhythm by negatively regulating the activity of the clock genes and clock-controlled genes. They are induced by CLOCK:BMAL1 heterodimer via the CACGTG E-box in the promoter. — an NCBI CDD conserved domain (cd11409); members share this curated model.
