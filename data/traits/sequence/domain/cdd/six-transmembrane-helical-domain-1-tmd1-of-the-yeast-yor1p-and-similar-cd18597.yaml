identifier: CDD:cd18597
label: "Six-transmembrane helical domain 1 (TMD1) of the yeast Yor1p and similar proteins; ABCC subfamily. This group includes the six-transmembrane domain 1 (TMD1) of the yeast Yor1p, an oligomycin resistance ABC transporter, and similar proteins. Members of this group belong to the MRP (multidrug resistance-associated protein) subfamily (ABCC). In addition to Yor1p, yeast ABCC (also termed MRP/CFTR) subfamily also comprises five other members (Ycf1p, Bpt1p, Ybt1p/Bat1p, Nft1p, and Vmr1p), which are not included in this group. Yor1p is a plasma membrane ATP-binding transporter that mediates export of many different organic anions including oligomycin. While Yor1p has been shown to localize to the plasma membrane, the other 4 members (Ycf1p, Bpt1p, Ybt1p/Bat1p, Nft1p and Vmr1p) have been shown to localize to the vacuolar membrane."
definition: >-
  Six-transmembrane helical domain 1 (TMD1) of the yeast Yor1p and similar proteins; ABCC subfamily. This group includes the six-transmembrane domain 1 (TMD1) of the yeast Yor1p, an oligomycin resistance ABC transporter, and similar proteins. Members of this group belong to the MRP (multidrug resistance-associated protein) subfamily (ABCC). In addition to Yor1p, yeast ABCC (also termed MRP/CFTR) subfamily also comprises five other members (Ycf1p, Bpt1p, Ybt1p/Bat1p, Nft1p, and Vmr1p), which are not included in this group. Yor1p is a plasma membrane ATP-binding transporter that mediates export of many different organic anions including oligomycin. While Yor1p has been shown to localize to the plasma membrane, the other 4 members (Ycf1p, Bpt1p, Ybt1p/Bat1p, Nft1p and Vmr1p) have been shown to localize to the vacuolar membrane. — an NCBI CDD conserved domain (cd18597); members share this curated model.
