identifier: CDD:cd21690
label: "GIPC homology 2 (GH2) domain-like family. The GIPC (GAIP C-terminus-interacting protein) family of proteins mediate endocytosis by tethering cargo proteins to the motor myosin VI. This model represents the C-terminal GIPC homology 2 or GH2 domain (plus the linker to the PDZ domain located N-terminally of GH2), which mediates the interaction with myosin VI and is involved in homodimerization in the autoinhibited state. The family also includes DEAH box protein 8 (DHX8) and similar proteins. DHX8 (a human homolog of yeast Prp22), also called RNA helicase HRH1, is an ATP-dependent RNA helicase involved in pre-mRNA splicing as a component of the spliceosome. It facilitates nuclear export of spliced mRNA by releasing the RNA from the spliceosome. DHX8 contains a GH2-like domain at the N-terminus, which shows high sequence similarity with the GH2 domain found in GIPC proteins."
definition: >-
  GIPC homology 2 (GH2) domain-like family. The GIPC (GAIP C-terminus-interacting protein) family of proteins mediate endocytosis by tethering cargo proteins to the motor myosin VI. This model represents the C-terminal GIPC homology 2 or GH2 domain (plus the linker to the PDZ domain located N-terminally of GH2), which mediates the interaction with myosin VI and is involved in homodimerization in the autoinhibited state. The family also includes DEAH box protein 8 (DHX8) and similar proteins. DHX8 (a human homolog of yeast Prp22), also called RNA helicase HRH1, is an ATP-dependent RNA helicase involved in pre-mRNA splicing as a component of the spliceosome. It facilitates nuclear export of spliced mRNA by releasing the RNA from the spliceosome. DHX8 contains a GH2-like domain at the N-terminus, which shows high sequence similarity with the GH2 domain found in GIPC proteins. — an NCBI CDD conserved domain (cd21690); members share this curated model.
