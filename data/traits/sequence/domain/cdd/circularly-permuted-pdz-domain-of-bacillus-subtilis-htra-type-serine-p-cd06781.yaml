identifier: CDD:cd06781
label: "circularly permuted PDZ domain of Bacillus subtilis HtrA-type serine proteases HtrA, HtrB, and YyxA and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of Bacillus subtilis HtrA/YkdA, HtrB/YvtA and YyxA/YycK, and related domains. HtrA-type serine proteases participate in folding and degradation of aberrant proteins, and in processing and maturation of native proteins. HtrA, HtrB, and YyxA have a single transmembrane domain at the N-terminus and a PDZ domain at the C-terminus. Expression of htrA and htrB genes is induced both by heat shock and by secretion stress (by a common) mechanism; yyxA is neither heat shock nor secretion stress inducible. HtrA and HtrB may have overlapping cellular functions; YyxA may have a cellular function distinct from the other two proteases or have the same function but under different conditions. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as A, B, C, alpha-helix 1, beta-strands D, E,  alpha-helix 2 and beta-strand F. This BsHtrA-like PDZ domain is a circularly permuted PDZ domain which places beta-strand A on the C-terminus. Another permutation exists in the PDZ superfamily which places both beta-strands A and B on the C-terminus."
definition: >-
  circularly permuted PDZ domain of Bacillus subtilis HtrA-type serine proteases HtrA, HtrB, and YyxA and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of Bacillus subtilis HtrA/YkdA, HtrB/YvtA and YyxA/YycK, and related domains. HtrA-type serine proteases participate in folding and degradation of aberrant proteins, and in processing and maturation of native proteins. HtrA, HtrB, and YyxA have a single transmembrane domain at the N-terminus and a PDZ domain at the C-terminus. Expression of htrA and htrB genes is induced both by heat shock and by secretion stress (by a common) mechanism; yyxA is neither heat shock nor secretion stress inducible. HtrA and HtrB may have overlapping cellular functions; YyxA may have a cellular function distinct from the other two proteases or have the same function but under different conditions. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. This BsHtrA-like PDZ domain is a circularly permuted PDZ domain which places beta-strand A on the C-terminus. Another permutation exists in the PDZ superfamily which places both beta-strands A and B on the C-terminus. — an NCBI CDD conserved domain (cd06781); members share this curated model.
