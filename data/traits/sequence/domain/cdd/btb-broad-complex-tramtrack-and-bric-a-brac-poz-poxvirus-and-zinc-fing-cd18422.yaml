identifier: CDD:cd18422
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium voltage-gated channel subfamily G member 3 (KCNG3). KCNG3, also called voltage-gated potassium channel subunit Kv6.3 or voltage-gated potassium channel subunit Kv10.1, is an electrically silent modulatory subunit that can form functional heterotetrameric channels with KCNB1 (also known as Kv2.1), and further promotes a reduction in the rate of activation and inactivation of the delayed rectifier voltage-gated potassium channel KCNB1. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. KCNG3 is a regulatory alpha subunit that cannot form a functional homo-tetrameric channel. It forms hetero-tetrameric channels (with other functional alpha subunits) through its BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium voltage-gated channel subfamily G member 3 (KCNG3). KCNG3, also called voltage-gated potassium channel subunit Kv6.3 or voltage-gated potassium channel subunit Kv10.1, is an electrically silent modulatory subunit that can form functional heterotetrameric channels with KCNB1 (also known as Kv2.1), and further promotes a reduction in the rate of activation and inactivation of the delayed rectifier voltage-gated potassium channel KCNB1. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. KCNG3 is a regulatory alpha subunit that cannot form a functional homo-tetrameric channel. It forms hetero-tetrameric channels (with other functional alpha subunits) through its BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif. — an NCBI CDD conserved domain (cd18422); members share this curated model.
