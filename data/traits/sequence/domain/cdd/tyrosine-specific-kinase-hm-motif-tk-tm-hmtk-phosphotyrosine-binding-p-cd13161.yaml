identifier: CDD:cd13161
label: "Tyrosine-specific kinase/HM-motif TK (TM/HMTK) Phosphotyrosine-binding (PTB) PH-like fold. TK kinases catalyzes the transfer of the terminal phosphate of ATP to a specific tyrosine residue on its target protein. TK kinases play significant roles in development and cell division. Tyrosine-protein kinases can be divided into two subfamilies: receptor tyrosine kinases, which have an intracellular tyrosine kinase domain, a transmembrane domain and an extracellular ligand-binding domain; and non-receptor (cytoplasmic) tyrosine kinases, which are soluble, cytoplasmic kinases. In HMTK the conserved His-Arg-Asp sequence within the catalytic loop is replaced by a His-Met sequence. TM/HMTK have are 2-3 N-terminal PTB domains. PTB domains in TKs are thought to function analogously to the membrane targeting (PH, myristoylation) and pTyr binding (SH2) domains of Src subgroup kinases. PTB domains have a common PH-like fold and are found in various eukaryotic signaling molecules. This domain was initially shown to binds peptides with a NPXY motif with differing requirements for phosphorylation of the tyrosine, although more recent studies have found that some types of PTB domains can bind to peptides lack tyrosine residues altogether. In contrast to SH2 domains, which recognize phosphotyrosine and adjacent carboxy-terminal residues, PTB-domain binding specificity is conferred by residues amino-terminal to the phosphotyrosine. PTB domains are classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains. This cd is part of the Dab-like subgroup."
definition: >-
  Tyrosine-specific kinase/HM-motif TK (TM/HMTK) Phosphotyrosine-binding (PTB) PH-like fold. TK kinases catalyzes the transfer of the terminal phosphate of ATP to a specific tyrosine residue on its target protein. TK kinases play significant roles in development and cell division. Tyrosine-protein kinases can be divided into two subfamilies: receptor tyrosine kinases, which have an intracellular tyrosine kinase domain, a transmembrane domain and an extracellular ligand-binding domain; and non-receptor (cytoplasmic) tyrosine kinases, which are soluble, cytoplasmic kinases. In HMTK the conserved His-Arg-Asp sequence within the catalytic loop is replaced by a His-Met sequence. TM/HMTK have are 2-3 N-terminal PTB domains. PTB domains in TKs are thought to function analogously to the membrane targeting (PH, myristoylation) and pTyr binding (SH2) domains of Src subgroup kinases. PTB domains have a common PH-like fold and are found in various eukaryotic signaling molecules. This domain was initially shown to binds peptides with a NPXY motif with differing requirements for phosphorylation of the tyrosine, although more recent studies have found that some types of PTB domains can bind to peptides lack tyrosine residues altogether. In contrast to SH2 domains, which recognize phosphotyrosine and adjacent carboxy-terminal residues, PTB-domain binding specificity is conferred by residues amino-terminal to the phosphotyrosine. PTB domains are classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains. This cd is part of the Dab-like subgroup. — an NCBI CDD conserved domain (cd13161); members share this curated model.
