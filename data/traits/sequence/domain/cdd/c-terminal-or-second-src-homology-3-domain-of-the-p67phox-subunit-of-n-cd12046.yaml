identifier: CDD:cd12046
label: "C-terminal (or second) Src Homology 3 domain of the p67phox subunit of NADPH oxidase. p67phox, also called Neutrophil cytosol factor 2 (NCF-2), is a cytosolic subunit of the phagocytic NADPH oxidase complex (also called Nox2 or gp91phox) which plays a crucial role in the cellular response to bacterial infection. NADPH oxidase catalyzes the transfer of electrons from NADPH to oxygen during phagocytosis forming superoxide and reactive oxygen species. p67phox plays a regulatory role and contains N-terminal TPR, first SH3 (or N-terminal or central SH3), PB1, and C-terminal SH3 domains. It binds, via its C-terminal SH3 domain, to a proline-rich region of p47phox and upon activation, this complex assembles with flavocytochrome b558, the Nox2-p22phox heterodimer. Concurrently, RacGTP translocates to the membrane and interacts with the TPR domain of p67phox, which leads to the activation of NADPH oxidase. The PB1 domain of p67phox binds to its partner PB1 domain in p40phox, and this facilitates the assembly of p47phox-p67phox at the membrane. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  C-terminal (or second) Src Homology 3 domain of the p67phox subunit of NADPH oxidase. p67phox, also called Neutrophil cytosol factor 2 (NCF-2), is a cytosolic subunit of the phagocytic NADPH oxidase complex (also called Nox2 or gp91phox) which plays a crucial role in the cellular response to bacterial infection. NADPH oxidase catalyzes the transfer of electrons from NADPH to oxygen during phagocytosis forming superoxide and reactive oxygen species. p67phox plays a regulatory role and contains N-terminal TPR, first SH3 (or N-terminal or central SH3), PB1, and C-terminal SH3 domains. It binds, via its C-terminal SH3 domain, to a proline-rich region of p47phox and upon activation, this complex assembles with flavocytochrome b558, the Nox2-p22phox heterodimer. Concurrently, RacGTP translocates to the membrane and interacts with the TPR domain of p67phox, which leads to the activation of NADPH oxidase. The PB1 domain of p67phox binds to its partner PB1 domain in p40phox, and this facilitates the assembly of p47phox-p67phox at the membrane. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12046); members share this curated model.
