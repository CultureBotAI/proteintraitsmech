identifier: CDD:cd10364
label: "Src homology 2 (SH2) domain found in Lyn. Lyn is a member of the Src non-receptor type tyrosine kinase family of proteins and is expressed in the hematopoietic cells, in neural tissues, liver, and adipose tissue. There are two alternatively spliced forms of Lyn.  Lyn plays an inhibitory role in myeloid lineage proliferation. Following engagement of the B cell receptors, Lyn undergoes rapid phosphorylation and activation, triggering a cascade of signaling events mediated by Lyn phosphorylation of tyrosine residues within the immunoreceptor tyrosine-based activation motifs (ITAM) of the receptor proteins, and subsequent recruitment and activation of other kinases including Syk, phospholipase C2 (PLC2) and phosphatidyl inositol-3 kinase. These kinases play critical roles in proliferation, Ca2+ mobilization and cell differentiation. Lyn plays an essential role in the transmission of inhibitory signals through phosphorylation of tyrosine residues within the immunoreceptor tyrosine-based inhibitory motifs (ITIM) in regulatory proteins such as CD22, PIR-B and FC RIIb1. Their ITIM phosphorylation subsequently leads to recruitment and activation of phosphatases such as SHIP-1 and SHP-1 which further down modulate signaling pathways, attenuate cell activation and can mediate tolerance. Lyn also plays a role in the insulin signaling pathway. Activated Lyn phosphorylates insulin receptor substrate 1 (IRS1) leading to an increase in translocation of Glut-4 to the cell membrane and increased glucose utilization. It is the primary Src family member involved in signaling downstream of the B cell receptor. Lyn plays an unusual, 2-fold role in B cell receptor signaling; it is essential for initiation of signaling but is also later involved in negative regulation of the signal. Lyn has a unique N-terminal domain, an SH3 domain, an SH2 domain, a kinase domain and a regulatory tail, as do the other members of the family. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in Lyn. Lyn is a member of the Src non-receptor type tyrosine kinase family of proteins and is expressed in the hematopoietic cells, in neural tissues, liver, and adipose tissue. There are two alternatively spliced forms of Lyn. Lyn plays an inhibitory role in myeloid lineage proliferation. Following engagement of the B cell receptors, Lyn undergoes rapid phosphorylation and activation, triggering a cascade of signaling events mediated by Lyn phosphorylation of tyrosine residues within the immunoreceptor tyrosine-based activation motifs (ITAM) of the receptor proteins, and subsequent recruitment and activation of other kinases including Syk, phospholipase C2 (PLC2) and phosphatidyl inositol-3 kinase. These kinases play critical roles in proliferation, Ca2+ mobilization and cell differentiation. Lyn plays an essential role in the transmission of inhibitory signals through phosphorylation of tyrosine residues within the immunoreceptor tyrosine-based inhibitory motifs (ITIM) in regulatory proteins such as CD22, PIR-B and FC RIIb1. Their ITIM phosphorylation subsequently leads to recruitment and activation of phosphatases such as SHIP-1 and SHP-1 which further down modulate signaling pathways, attenuate cell activation and can mediate tolerance. Lyn also plays a role in the insulin signaling pathway. Activated Lyn phosphorylates insulin receptor substrate 1 (IRS1) leading to an increase in translocation of Glut-4 to the cell membrane and increased glucose utilization. It is the primary Src family member involved in signaling downstream of the B cell receptor. Lyn plays an unusual, 2-fold role in B cell receptor signaling; it is essential for initiation of signaling but is also later involved in negative regulation of the signal. Lyn has a unique N-terminal domain, an SH3 domain, an SH2 domain, a kinase domain and a regulatory tail, as do the other members of the family. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10364); members share this curated model.
