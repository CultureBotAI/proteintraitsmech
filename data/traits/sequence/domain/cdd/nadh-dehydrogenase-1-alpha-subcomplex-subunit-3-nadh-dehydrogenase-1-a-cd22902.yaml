identifier: CDD:cd22902
label: NDUFA3
definition: >-
  NADH dehydrogenase 1 alpha subcomplex subunit 3. NADH dehydrogenase 1 alpha subcomplex subunit 3 (NDUFA3) is a subunit of the of NADH:ubiquinone oxidoreductase (Respiratory complex I), which is a redox-driven proton pump that plays an important role in creating the electrochemical gradient that powers mitochondrial adenosine triphosphate synthesis. Subunit NDUFA3 is a single-pass membrane protein and is considered an accessory subunit. NDUFA3, along with subunit NDUFA5, have been shown to be necessary for assembly and/or stability of the matrix arm of human mitochondrial complex I
