identifier: CDD:cd24144
label: "Biogenesis of lysosome-related organelles complex 1 subunit CNL1. Biogenesis of lysosome-related organelles complex 1 (BLOC-1) subunit CNL1, also called CNO-like protein 1, is part of a complex that is involved in endosomal cargo sorting. BLOC-1 is an endosomal Rab-GAP (GTPase-activating protein) adapter complex that is composed of at least BLI1, BLS1, CNL1, KXD1, SNN1 and VAB2. Saccharomyces cerevisiae CLN1 is believed to be the homolog to the cappuccino (cno) subunit of the BLOC-1 complex in higher eukaryotes."
definition: >-
