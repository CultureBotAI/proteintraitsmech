identifier: CDD:cd23675
label: KPAF2
definition: >-
  kinetoplast polyadenylation factor 2 (KPAF2). KPAF2 is a component of the kinetoplast polyadenylation complex (KPAC) and plays a role in mRNA 3' adenylation/uridylation (addition of A/U-heteropolymers, referred to as A/U-tailing), during kinetoplast RNA processing. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode guide RNAs (gRNAs) involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. Kinetoplast RNA processing include 5' modification, 3'-5' degradation, internal sequence changes by U-insertion/deletion mRNA editing, and nontemplated 3' extensions. In T. brucei, mitochondrial RNA 3' modifications can be categorized into U-tailing by RET1 terminal uridyltransferase TUTase (gRNAs and rRNAs), A-tailing by KPAP1 poly(A) polymerase (most mRNAs), and A/U-extensions which require both enzymes and a complex of kinetoplast polyadenylation factors 1 and 2 (KPAF1/2). Pre-editing addition of the short (A) tail protects the edited transcript against 3'-5' degradation. KPAF1/2 induces the post-editing addition of A/U-heteropolymers by KPAP1 and RET1, which renders mRNA competent for translation. The KPAC complex includes KPAP1, KPAF1/2, and two additional factors KPAF3 and KPAF4. The latter two factors are involved in the pre-editing A-tailing function of KPAC: KPAF3 binds to and stabilizes the mRNA, and KPAF4 binds the A-tail impeding mRNA degradation. KPAF1-4 contain pentatricopeptide repeat (PPR) RNA-binding motifs
