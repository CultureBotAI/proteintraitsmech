identifier: CDD:cd22830
label: "galactose/rhamnose binding lectin domain found in Drosophila melanogaster Latrophilin Cirl and similar proteins. Latrophilin Cirl (calcium-independent receptor for latrotoxin) is an adhesion-type G-protein-coupled receptor (aGPCR) that acts as a molecular sensor and signal transducer that detects and converts mechanical stimuli into a metabotropic response. It functions in mechanosensory neurons by modulating ionotropic receptor currents, the initiating step of cellular mechanosensation. The model corresponds to a galactose/rhamnose-binding lectin domain found at the N-terminus of Latrophilin Cirl."
definition: >-
  galactose/rhamnose binding lectin domain found in Drosophila melanogaster Latrophilin Cirl and similar proteins. Latrophilin Cirl (calcium-independent receptor for latrotoxin) is an adhesion-type G-protein-coupled receptor (aGPCR) that acts as a molecular sensor and signal transducer that detects and converts mechanical stimuli into a metabotropic response. It functions in mechanosensory neurons by modulating ionotropic receptor currents, the initiating step of cellular mechanosensation. The model corresponds to a galactose/rhamnose-binding lectin domain found at the N-terminus of Latrophilin Cirl. — an NCBI CDD conserved domain (cd22830); members share this curated model.
