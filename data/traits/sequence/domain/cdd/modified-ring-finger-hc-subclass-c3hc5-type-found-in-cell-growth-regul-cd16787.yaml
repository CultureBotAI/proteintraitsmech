identifier: CDD:cd16787
label: "Modified RING finger, HC subclass (C3HC5-type), found in cell growth regulator with RING finger domain protein 1 (CGRRF1) and similar proteins. CGRRF1, also known as cell growth regulatory gene 19 protein (CGR19) or RING finger protein 197 (RNF197), functions as a novel biomarker to monitor endometrial sensitivity and response to insulin-sensitizing drugs, such as metformin, in the context of obesity. CGRRF1 contains a C-terminal modified C3HC5-type RING-HC finger, which is distinguished from typical C3HC4 RING-HC finger due to the existence of the additional cysteine residue in the middle portion of the RING finger domain."
definition: >-
  Modified RING finger, HC subclass (C3HC5-type), found in cell growth regulator with RING finger domain protein 1 (CGRRF1) and similar proteins. CGRRF1, also known as cell growth regulatory gene 19 protein (CGR19) or RING finger protein 197 (RNF197), functions as a novel biomarker to monitor endometrial sensitivity and response to insulin-sensitizing drugs, such as metformin, in the context of obesity. CGRRF1 contains a C-terminal modified C3HC5-type RING-HC finger, which is distinguished from typical C3HC4 RING-HC finger due to the existence of the additional cysteine residue in the middle portion of the RING finger domain. — an NCBI CDD conserved domain (cd16787); members share this curated model.
