identifier: CDD:cd11043
label: "plant cytochrome P450s similar to cytochrome P450 family 90, subfamily A, polypeptide 1, cytochrome P450 family 90, subfamily B, polypeptide 1, and cytochrome P450 family 90, subfamily D, polypeptide 2. This family is composed of plant cytochrome P450s including: Arabidopsis thaliana cytochrome P450s 85A1 (CYP85A1 or brassinosteroid-6-oxidase 1), 90A1 (CYP90A1), 88A3 (CYP88A3 or ent-kaurenoic acid oxidase 1), 90B1 (CYP90B1 or Dwarf4 or steroid 22-alpha-hydroxylase), and 90C1 (CYP90C1 or 3-epi-6-deoxocathasterone 23-monooxygenase); Oryza sativa cytochrome P450s 90D2 (CYP90D2 or C6-oxidase), 87A3 (CYP87A3), and 724B1 (CYP724B1 or dwarf protein 11); and Taxus cuspidata cytochrome P450 725A2 (CYP725A2 or taxane 13-alpha-hydroxylase). These enzymes are monooxygenases that catalyze oxidation reactions involved in steroid or hormone biosynthesis. CYP85A1, CYP90D2, and CYP90C1 are involved in brassinosteroids biosynthesis, while CYP88A3 catalyzes three successive oxidations of ent-kaurenoic acid, which is a key step in the synthesis of gibberellins. This family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
