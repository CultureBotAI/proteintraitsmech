identifier: CDD:cd23312
label: "FGF domain, beta-trefoil fold, found in oxygen-regulated protein 1 (ORP1) and similar proteins. ORP1, also called retinitis pigmentosa 1 protein, or retinitis pigmentosa RP1 protein, is a microtubule-associated protein that regulates the stability and length of the microtubule-based axoneme of photoreceptors. It is required for the differentiation of photoreceptor cells. It plays a role in the organization of the outer segment of rod and cone photoreceptors ensuring the correct orientation and higher-order stacking of outer segment disks along the photoreceptor axoneme. Members in this family may contain one or two fibroblast growth factor (FGF) domain(s) in the middle region. The FGF domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  FGF domain, beta-trefoil fold, found in oxygen-regulated protein 1 (ORP1) and similar proteins. ORP1, also called retinitis pigmentosa 1 protein, or retinitis pigmentosa RP1 protein, is a microtubule-associated protein that regulates the stability and length of the microtubule-based axoneme of photoreceptors. It is required for the differentiation of photoreceptor cells. It plays a role in the organization of the outer segment of rod and cone photoreceptors ensuring the correct orientation and higher-order stacking of outer segment disks along the photoreceptor axoneme. Members in this family may contain one or two fibroblast growth factor (FGF) domain(s) in the middle region. The FGF domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23312); members share this curated model.
