identifier: CDD:cd17099
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in tyrosine-protein phosphatase non-receptors PTPN14, PTPN21, and similar proteins. This family includes tyrosine-protein phosphatase non-receptors PTPN14 and PTPN21, both of which are protein-tyrosine phosphatase (PTP). They belong to the FERM family of PTPs characterized by a conserved N-terminal FERM domain and a C-terminal PTP catalytic domain with an intervening sequence containing an acidic region and a putative SH3 domain-binding sequence.  The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). PTPN14 plays a role in the nucleus during cell proliferation. PTPN21 interacts with a Tec tyrosine kinase family member, the epithelial and endothelial tyrosine kinase (Etk, also known as Bmx), modulates Stat3 activation, and plays a role in the regulation of cell growth and differentiation."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in tyrosine-protein phosphatase non-receptors PTPN14, PTPN21, and similar proteins. This family includes tyrosine-protein phosphatase non-receptors PTPN14 and PTPN21, both of which are protein-tyrosine phosphatase (PTP). They belong to the FERM family of PTPs characterized by a conserved N-terminal FERM domain and a C-terminal PTP catalytic domain with an intervening sequence containing an acidic region and a putative SH3 domain-binding sequence. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). PTPN14 plays a role in the nucleus during cell proliferation. PTPN21 interacts with a Tec tyrosine kinase family member, the epithelial and endothelial tyrosine kinase (Etk, also known as Bmx), modulates Stat3 activation, and plays a role in the regulation of cell growth and differentiation. — an NCBI CDD conserved domain (cd17099); members share this curated model.
