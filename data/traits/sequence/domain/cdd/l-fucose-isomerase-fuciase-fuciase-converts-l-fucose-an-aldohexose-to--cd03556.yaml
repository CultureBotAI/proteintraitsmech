identifier: CDD:cd03556
label: "L-fucose isomerase (FucIase); FucIase converts L-fucose, an aldohexose, to its ketose form, which prepares it for aldol cleavage (similar to the isomerization of glucose during glycolysis). L-fucose (or 6-deoxy-L-galactose) is found in blood group determinants as well as in various oligo- and polysaccharides, and glycosides in mammals, bacteria and plants."
definition: >-
