identifier: CDD:cd20017
label: "Forkhead (FH) domain found in the Forkhead box protein C (FOXC) subfamily. The FOXC subfamily includes two winged helix transcription factors, FOXC1 (also called Forkhead-related protein FKHL7, or Forkhead-related transcription factor 3) and FOXC2 (also called Forkhead-related protein FKHL14, or Mesenchyme fork head protein 1). FOXC1 is a DNA-binding transcriptional factor that plays a role in a broad range of cellular and developmental processes such as the development of the eyes, bones, cardiovascular system, kidneys, and skin. FOXC2 acts as a transcriptional activator that might be involved in the formation of special mesenchymal tissues. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in the Forkhead box protein C (FOXC) subfamily. The FOXC subfamily includes two winged helix transcription factors, FOXC1 (also called Forkhead-related protein FKHL7, or Forkhead-related transcription factor 3) and FOXC2 (also called Forkhead-related protein FKHL14, or Mesenchyme fork head protein 1). FOXC1 is a DNA-binding transcriptional factor that plays a role in a broad range of cellular and developmental processes such as the development of the eyes, bones, cardiovascular system, kidneys, and skin. FOXC2 acts as a transcriptional activator that might be involved in the formation of special mesenchymal tissues. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20017); members share this curated model.
