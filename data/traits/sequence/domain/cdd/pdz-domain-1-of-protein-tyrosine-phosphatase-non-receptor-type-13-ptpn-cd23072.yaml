identifier: CDD:cd23072
label: "PDZ domain 1 of protein tyrosine phosphatase non-receptor type 13 (PTPN13), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 1 of PTPN13 [also known as Fas-associated protein-tyrosine phosphatase 1 (FAP-1), protein-tyrosine phosphatase 1E (PTP-E1), and protein-tyrosine phosphatase (PTPL1)], and related domains. PTPN13 regulates negative apoptotic signaling and mediates phosphoinositide 3-kinase (PI3K) signaling. PTPN13 has five PDZ domains. Proteins known to interact with PTPN13 PDZ domains include: PLEKHA1 and PLEKHA2 via PTPN13-PDZ domain 1, Fas receptor and thyroid receptor-interacting protein 6 via PTPN13-PDZ domain 2, nerve growth factor receptor and protein kinase N2 via PTPN13-PDZ domain 3, PDZ and LIM domain 4 (PDLIM4) via PTPN13-PDZ domains 2 and 4, and brain calpain-2 via PTPN13-PDZ domains 3, 4 and 5. Calpain-2-mediated PTPN13 fragments may be involved in abnormal tau aggregation and increased risk for Alzheimer's disease. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This PTPN13 family PDZ1 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  PDZ domain 1 of protein tyrosine phosphatase non-receptor type 13 (PTPN13), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 1 of PTPN13 [also known as Fas-associated protein-tyrosine phosphatase 1 (FAP-1), protein-tyrosine phosphatase 1E (PTP-E1), and protein-tyrosine phosphatase (PTPL1)], and related domains. PTPN13 regulates negative apoptotic signaling and mediates phosphoinositide 3-kinase (PI3K) signaling. PTPN13 has five PDZ domains. Proteins known to interact with PTPN13 PDZ domains include: PLEKHA1 and PLEKHA2 via PTPN13-PDZ domain 1, Fas receptor and thyroid receptor-interacting protein 6 via PTPN13-PDZ domain 2, nerve growth factor receptor and protein kinase N2 via PTPN13-PDZ domain 3, PDZ and LIM domain 4 (PDLIM4) via PTPN13-PDZ domains 2 and 4, and brain calpain-2 via PTPN13-PDZ domains 3, 4 and 5. Calpain-2-mediated PTPN13 fragments may be involved in abnormal tau aggregation and increased risk for Alzheimer's disease. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This PTPN13 family PDZ1 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd23072); members share this curated model.
