identifier: CDD:cd11305
label: "C-terminal domain of alpha dystroglycan. Dystroglycan is a glycoprotein widely distributed in skeletal muscle and other tissues; the pre-protein is cleaved into two subunits (alpha and beta) that form a complex which links the extracellular matrix to the cytoskeleton. This C-terminal domain of the alpha-subunit appears to contact neighboring cadherin-like repeats of alpha dystroglycan, and may also be involved in interactions with other components of the dystrophin-dystroglycan-complex (DGC). DGC has been shown to interact with extracellular matrix components such as laminin, perlecan and m-agrin, suggesting that the complex may play various different roles depending on the extracellular ligand."
definition: >-
  C-terminal domain of alpha dystroglycan. Dystroglycan is a glycoprotein widely distributed in skeletal muscle and other tissues; the pre-protein is cleaved into two subunits (alpha and beta) that form a complex which links the extracellular matrix to the cytoskeleton. This C-terminal domain of the alpha-subunit appears to contact neighboring cadherin-like repeats of alpha dystroglycan, and may also be involved in interactions with other components of the dystrophin-dystroglycan-complex (DGC). DGC has been shown to interact with extracellular matrix components such as laminin, perlecan and m-agrin, suggesting that the complex may play various different roles depending on the extracellular ligand. — an NCBI CDD conserved domain (cd11305); members share this curated model.
