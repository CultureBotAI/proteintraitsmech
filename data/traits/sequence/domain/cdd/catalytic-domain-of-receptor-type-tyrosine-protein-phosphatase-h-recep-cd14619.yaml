identifier: CDD:cd14619
label: "catalytic domain of receptor-type tyrosine-protein phosphatase H. Receptor-type tyrosine-protein phosphatase H (PTPRH or R-PTP-H), also known as stomach cancer-associated protein tyrosine phosphatase 1 (SAP-1), belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPRH is a member of the R3 subfamily of receptor-type phosphotyrosine phosphatases (RPTP), characterized by a unique modular composition consisting of multiple extracellular fibronectin type III (FN3) repeats and a single (most RPTP subtypes have two) cytoplasmic catalytic PTP domain. It is localized specifically at microvilli of the brush border in gastrointestinal epithelial cells. It plays a role in intestinal immunity by regulating CEACAM20 through tyrosine dephosphorylation. It is also a negative regulator of integrin-mediated signaling and may contribute to contact inhibition of cell growth and motility."
