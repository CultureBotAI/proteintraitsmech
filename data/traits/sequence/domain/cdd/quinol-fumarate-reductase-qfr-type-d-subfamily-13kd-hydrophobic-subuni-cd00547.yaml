identifier: CDD:cd00547
label: "Quinol:fumarate reductase (QFR) Type D subfamily, 13kD hydrophobic subunit D; QFR couples the reduction of fumarate to succinate to the oxidation of quinol to quinone, the opposite reaction to that catalyzed by the related protein, succinate:quinine oxidoreductase (SQR). QFRs oxidize low potential quinols such as menaquinol and are involved in anaerobic respiration with fumarate as the terminal electron acceptor. SQR and QFR share a common subunit arrangement, composed of a flavoprotein catalytic subunit, an iron-sulfur protein and one or two hydrophobic transmembrane subunits. Members of this subfamily are classified as Type D as they contain two transmembrane subunits (C and D) and no heme groups.  The structural arrangement allows efficient electron transfer between the catalytic subunit, through iron-sulfur centers, and the transmembrane subunit containing the electron donor (quinol). The quinone binding site resides in the transmembrane subunits."
definition: >-
  Quinol:fumarate reductase (QFR) Type D subfamily, 13kD hydrophobic subunit D; QFR couples the reduction of fumarate to succinate to the oxidation of quinol to quinone, the opposite reaction to that catalyzed by the related protein, succinate:quinine oxidoreductase (SQR). QFRs oxidize low potential quinols such as menaquinol and are involved in anaerobic respiration with fumarate as the terminal electron acceptor. SQR and QFR share a common subunit arrangement, composed of a flavoprotein catalytic subunit, an iron-sulfur protein and one or two hydrophobic transmembrane subunits. Members of this subfamily are classified as Type D as they contain two transmembrane subunits (C and D) and no heme groups. The structural arrangement allows efficient electron transfer between the catalytic subunit, through iron-sulfur centers, and the transmembrane subunit containing the electron donor (quinol). The quinone binding site resides in the transmembrane subunits. — an NCBI CDD conserved domain (cd00547); members share this curated model.
