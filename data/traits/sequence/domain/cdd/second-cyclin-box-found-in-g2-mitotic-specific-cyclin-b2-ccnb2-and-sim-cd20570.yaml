identifier: CDD:cd20570
label: CYCLIN_CCNB2_rpt2
definition: >-
  second cyclin box found in G2/mitotic-specific cyclin-B2 (CCNB2) and similar proteins. CCNB2 is essential for the control of the cell cycle at the G2/M (mitosis) transition. It is required for progression through meiosis. CCNB2 contains two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain
