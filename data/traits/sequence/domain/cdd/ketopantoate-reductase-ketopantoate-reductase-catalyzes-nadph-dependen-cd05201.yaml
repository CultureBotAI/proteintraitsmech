label: "ketopantoate reductase. ketopantoate reductase catalyzes NADPH-dependent reduction of ketopantoate to pantoate, as part of the pantothenate biosynthesis pathway. The N-terminus is a Rossmann fold nucleotide binding domain, and is a member of  6-phosphogluconate dehydrogenase-like superfamily"
definition: >-
  ketopantoate reductase. ketopantoate reductase catalyzes NADPH-dependent reduction of ketopantoate to pantoate, as part of the pantothenate biosynthesis pathway. The N-terminus is a Rossmann fold nucleotide binding domain, and is a member of 6-phosphogluconate dehydrogenase-like superfamily — an NCBI CDD conserved domain (cd05201); members share this curated model.
