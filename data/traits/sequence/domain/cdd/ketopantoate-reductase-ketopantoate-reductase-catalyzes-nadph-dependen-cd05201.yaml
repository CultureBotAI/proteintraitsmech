identifier: CDD:cd05201
label: ketopantoate_reductase
definition: >-
  ketopantoate reductase. ketopantoate reductase catalyzes NADPH-dependent reduction of ketopantoate to pantoate, as part of the pantothenate biosynthesis pathway. The N-terminus is a Rossmann fold nucleotide binding domain, and is a member of 6-phosphogluconate dehydrogenase-like superfamily
