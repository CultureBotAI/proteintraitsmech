identifier: CDD:cd18381
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in KCNF/Kv5 subfamily of potassium voltage-gated channels. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. The potassium voltage-gated channel subfamily Kv5, also known as subfamily F, only contains KCNF1 (also known as Kv5.1 or kH1), which functions as a regulatory alpha-subunit of voltage-gated potassium channel that when coassembled with Kv2.1 can modulate gating in a physiologically relevant manner. It forms hetero-tetrameric channels (with other alpha subunits) through its BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in KCNF/Kv5 subfamily of potassium voltage-gated channels. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. The potassium voltage-gated channel subfamily Kv5, also known as subfamily F, only contains KCNF1 (also known as Kv5.1 or kH1), which functions as a regulatory alpha-subunit of voltage-gated potassium channel that when coassembled with Kv2.1 can modulate gating in a physiologically relevant manner. It forms hetero-tetrameric channels (with other alpha subunits) through its BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif. — an NCBI CDD conserved domain (cd18381); members share this curated model.
