identifier: CDD:cd15215
label: "orphan G protein-coupled receptor 101, member of the class A family of seven-transmembrane G protein-coupled receptors. Gpr101, an orphan GPCR, is predominantly expressed in the brain within discrete nuclei and is predicted to couple to the stimulatory G(s) protein, a potent activator of adenylate cyclase. GPR101 has been implicated in mediating the actions of GnRH-(1-5), a pentapeptide formed by metallopeptidase cleavage of the decapeptide gonadotropin-releasing hormone (GnRH), which plays a critical role in the regulation of the hypothalamic-pituitary-gonadal axis. GnRH-(1-5) acts on GPR101 to stimulate epidermal growth factor (EFG) release and EFG-receptor (EGFR) phosphorylation, leading to enhanced cell migration and invasion in the Ishikawa endometrial cancer cell line. Furthermore, these effects of GnRH-(1-5) are also dependent on enzymatic activation of matrix metallopeptidase-9 (MMP-9). GPR101 is a member of the class A family of GPCRs, which includes receptors for hormones, neurotransmitters, sensory stimuli, and a variety of other ligands. All GPCRs have a common structural architecture comprising of seven-transmembrane (TM) alpha-helices interconnected by three extracellular and three intracellular loops. A general feature of GPCR signaling is agonist-induced conformational changes in the receptors, leading to activation of the heterotrimeric G proteins, which consist of the guanine nucleotide-binding G-alpha subunit and the dimeric G-beta-gamma subunits. The activated G proteins then bind to and activate numerous downstream effector proteins, which generate second messengers that mediate a broad range of cellular and physiological processes."
