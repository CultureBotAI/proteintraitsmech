identifier: CDD:cd10522
label: "SET domain found in Legionella pneumophila type IV secretion system effector LegAS4 and similar proteins. LegAS4 is a type IV secretion system effector of Legionella pneumophila. It contains a SET domain that is involved in the modification of Lys4 of histone H3 (H3K4) in the nucleolus of the host cell, thereby enhancing heterochromatic rDNA transcription. It also contains an ankyrin repeat domain of unknown function at its C-terminal region."
definition: >-
  SET domain found in Legionella pneumophila type IV secretion system effector LegAS4 and similar proteins. LegAS4 is a type IV secretion system effector of Legionella pneumophila. It contains a SET domain that is involved in the modification of Lys4 of histone H3 (H3K4) in the nucleolus of the host cell, thereby enhancing heterochromatic rDNA transcription. It also contains an ankyrin repeat domain of unknown function at its C-terminal region. — an NCBI CDD conserved domain (cd10522); members share this curated model.
