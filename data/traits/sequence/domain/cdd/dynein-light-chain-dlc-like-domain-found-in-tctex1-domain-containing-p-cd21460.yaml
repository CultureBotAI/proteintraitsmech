label: "dynein light chain (DLC)-like domain found in Tctex1 domain-containing protein 3 (TCTEX1D3) and similar proteins. Tctex1 domain-containing protein 3 (TCTEX1D3), also called T-complex testis-specific protein 3, or T-complex-associated testis-expressed protein 3 (Tcte-3), may be an accessory component of axonemal dynein and cytoplasmic dynein 1.  The model corresponds to the dynein light chain (DLC)-like domain of TCTEX1D3."
definition: >-
  dynein light chain (DLC)-like domain found in Tctex1 domain-containing protein 3 (TCTEX1D3) and similar proteins. Tctex1 domain-containing protein 3 (TCTEX1D3), also called T-complex testis-specific protein 3, or T-complex-associated testis-expressed protein 3 (Tcte-3), may be an accessory component of axonemal dynein and cytoplasmic dynein 1. The model corresponds to the dynein light chain (DLC)-like domain of TCTEX1D3. — an NCBI CDD conserved domain (cd21460); members share this curated model.
