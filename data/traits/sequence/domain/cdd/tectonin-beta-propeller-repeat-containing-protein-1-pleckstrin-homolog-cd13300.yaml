identifier: CDD:cd13300
label: "Tectonin beta-propeller repeat-containing protein 1 Pleckstrin homology (PH) domain, repeat 1. TECPR1 is a tethering factor involved in autophagy. It promotes the autophagosome fusion with lysosomes by associating with both the ATG5-ATG12 conjugate and phosphatidylinositol-3-phosphate (PtdIns3P) present at the surface of autophagosomes. TECPR1 is also involved in selective autophagy against bacterial pathogens, by being required for phagophore/preautophagosomal structure biogenesis and maturation. It contains 2 DysFN (Dysferlin domains of unknown function, N-terminal), 2 Hyd_WA domains that is a probably beta-propeller, a PH-like domain, a TECPR domain, and a DysFC (C-terminal). The PH domain mediates the binding to phosphatidylinositol-3-phosphate (PtdIns3P). Binding to the ATG5-ATG12 conjugate exposes the PH domain, allowing the association with PtdIns3P. PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. They share little sequence conservation, but all have a common fold, which is electrostatically polarized. Less than 10% of PH domains bind phosphoinositide phosphates (PIPs) with high affinity and specificity. PH domains are distinguished from other PIP-binding domains by their specific high-affinity binding to PIPs with two vicinal phosphate groups: PtdIns(3,4)P2, PtdIns(4,5)P2 or PtdIns(3,4,5)P3 which results in targeting some PH domain proteins to the plasma membrane. A few display strong specificity in lipid binding. Any specificity is usually determined by loop regions or insertions in the N-terminus of the domain, which are not conserved across all PH domains. PH domains are found in cellular signaling proteins such as serine/threonine kinase, tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, as well as cytoskeletal associated molecules and in lipid associated enzymes."
definition: >-
  Tectonin beta-propeller repeat-containing protein 1 Pleckstrin homology (PH) domain, repeat 1. TECPR1 is a tethering factor involved in autophagy. It promotes the autophagosome fusion with lysosomes by associating with both the ATG5-ATG12 conjugate and phosphatidylinositol-3-phosphate (PtdIns3P) present at the surface of autophagosomes. TECPR1 is also involved in selective autophagy against bacterial pathogens, by being required for phagophore/preautophagosomal structure biogenesis and maturation. It contains 2 DysFN (Dysferlin domains of unknown function, N-terminal), 2 Hyd_WA domains that is a probably beta-propeller, a PH-like domain, a TECPR domain, and a DysFC (C-terminal). The PH domain mediates the binding to phosphatidylinositol-3-phosphate (PtdIns3P). Binding to the ATG5-ATG12 conjugate exposes the PH domain, allowing the association with PtdIns3P. PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. They share little sequence conservation, but all have a common fold, which is electrostatically polarized. Less than 10% of PH domains bind phosphoinositide phosphates (PIPs) with high affinity and specificity. PH domains are distinguished from other PIP-binding domains by their specific high-affinity binding to PIPs with two vicinal phosphate groups: PtdIns(3,4)P2, PtdIns(4,5)P2 or PtdIns(3,4,5)P3 which results in targeting some PH domain proteins to the plasma membrane. A few display strong specificity in lipid binding. Any specificity is usually determined by loop regions or insertions in the N-terminus of the domain, which are not conserved across all PH domains. PH domains are found in cellular signaling proteins such as serine/threonine kinase, tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, as well as cytoskeletal associated molecules and in lipid associated enzymes. — an NCBI CDD conserved domain (cd13300); members share this curated model.
