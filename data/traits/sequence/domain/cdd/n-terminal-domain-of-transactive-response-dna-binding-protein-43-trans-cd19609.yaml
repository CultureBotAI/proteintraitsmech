identifier: CDD:cd19609
label: "N-terminal domain of transactive response DNA-binding protein 43. Transactive response DNA-binding protein of 43 kDa (TDP-43) is a nuclear DNA/RNA-binding protein involved in gene transcription and mRNA processing, transport, and translational regulation. It is vital to pre-mRNA and microRNA processing and regulates stress granule activity through the differential regulation of G3BP and TIA-1. It also forms aggregates implicated in amyotrophic lateral sclerosis. The N-terminal domain of TDP-43 is required for its physiological functions and pathological aggregation."
definition: >-
  N-terminal domain of transactive response DNA-binding protein 43. Transactive response DNA-binding protein of 43 kDa (TDP-43) is a nuclear DNA/RNA-binding protein involved in gene transcription and mRNA processing, transport, and translational regulation. It is vital to pre-mRNA and microRNA processing and regulates stress granule activity through the differential regulation of G3BP and TIA-1. It also forms aggregates implicated in amyotrophic lateral sclerosis. The N-terminal domain of TDP-43 is required for its physiological functions and pathological aggregation. — an NCBI CDD conserved domain (cd19609); members share this curated model.
