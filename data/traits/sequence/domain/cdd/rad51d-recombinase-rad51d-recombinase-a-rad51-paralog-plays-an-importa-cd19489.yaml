identifier: CDD:cd19489
label: "RAD51D recombinase. RAD51D recombinase, a RAD51 paralog, plays an important role in DNA repair by homologous recombination (HR). HR is an important error-free repair mechanism for chromosomal double-strand break (DSB) which otherwise leads to cell cycle arrest and death. RAD51D, together with the other RAD51 paralogs, RAD51B, RAD51C, XRCC3, and XRCC2, helps recruit RAD51 to the break site."
definition: >-
  RAD51D recombinase. RAD51D recombinase, a RAD51 paralog, plays an important role in DNA repair by homologous recombination (HR). HR is an important error-free repair mechanism for chromosomal double-strand break (DSB) which otherwise leads to cell cycle arrest and death. RAD51D, together with the other RAD51 paralogs, RAD51B, RAD51C, XRCC3, and XRCC2, helps recruit RAD51 to the break site. — an NCBI CDD conserved domain (cd19489); members share this curated model.
