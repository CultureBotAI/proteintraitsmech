identifier: CDD:cd21982
label: "high mobility group (HMG)-box found in HMG domain-containing protein 4 (HMGXB4) and similar proteins. HMGXB4, also called HMG box-containing protein 4, high mobility group protein 2-like 1 (HMG2L1), or protein HMGBCG, is a non-histone chromosomal protein that negatively regulates Wnt/beta-catenin signaling during development. It plays a role in the hematopoietic system."
