label: "high mobility group (HMG)-box found in sex determining region Y (SRY)-box 7 (SOX7) and similar proteins. SOX-7 is an endothelial-associated transcription factor that acts as a tumor suppressor in a number of cancer types. It binds the DNA sequence 5'-AACAAT-3'. SOX-7 belongs to the group F of SRY-related high-mobility group (HMG) box (Sox) transcription factors."
