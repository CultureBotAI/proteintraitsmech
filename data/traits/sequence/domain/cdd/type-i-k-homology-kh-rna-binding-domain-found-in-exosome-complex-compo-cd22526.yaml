identifier: CDD:cd22526
label: "type I K homology (KH) RNA-binding domain found in exosome complex component Rrp40 and similar proteins. Rrp40, also called exosome component 3 (EXOSC3), or ribosomal RNA-processing protein 40, is a non-catalytic component of the RNA exosome complex which has 3'-->5' exoribonuclease activity and participates in a multitude of cellular RNA processing and degradation events. Mutations of EXOSC3 gene are associated with neurological diseases. Members in this subfamily contain a divergent KH domain that lacks the RNA-binding GXXG motif."
definition: >-
  type I K homology (KH) RNA-binding domain found in exosome complex component Rrp40 and similar proteins. Rrp40, also called exosome component 3 (EXOSC3), or ribosomal RNA-processing protein 40, is a non-catalytic component of the RNA exosome complex which has 3'-->5' exoribonuclease activity and participates in a multitude of cellular RNA processing and degradation events. Mutations of EXOSC3 gene are associated with neurological diseases. Members in this subfamily contain a divergent KH domain that lacks the RNA-binding GXXG motif. — an NCBI CDD conserved domain (cd22526); members share this curated model.
