identifier: CDD:cd12842
label: IGCP_Hfx_cass2
definition: >-
  integron gene cassette protein (IGCP) Hfx_cass2 and similar proteins. This family contains the unique integron gene cassette protein Hfx_cass2 and similar proteins that have yet to be characterized. The structure of Hfx_cass2 depicts a homodimer incorporating a compact all-alpha fold of six helical segments with a core central bundle of helices. It has a surface cleft reminiscent of an enzyme active site. This family may allow an assessment of the impact of the integron/gene cassette system on the emergence of new phenotypes, such as drug resistance or virulence
