identifier: CDD:cd14371
label: "CUE domain found in CTC-interacting domain proteins CID5, CID6, CID7 and similar proteins. CID7 is encoded by ubiquitously expressed gene CID7. It contains an N-terminal PABC-interacting domain (PAM2 or PABP-interacting motif 2) which is also found in the human Paip1 and Paip2. At this point, it functions as an interaction partner of the PABC domain of Arabidopsis thaliana Poly(A)-binding proteins. It also harbors an ubiquitin-associated (UBA)-like CUE domain and a C-terminal small MutS-related (SMR) domain. CID5 and CID6 are encoded by gene CID5, CID6, respectively. CID5 is only expressed in immature siliques. The biological function of CID5 and CID6 remain unclear."
definition: >-
  CUE domain found in CTC-interacting domain proteins CID5, CID6, CID7 and similar proteins. CID7 is encoded by ubiquitously expressed gene CID7. It contains an N-terminal PABC-interacting domain (PAM2 or PABP-interacting motif 2) which is also found in the human Paip1 and Paip2. At this point, it functions as an interaction partner of the PABC domain of Arabidopsis thaliana Poly(A)-binding proteins. It also harbors an ubiquitin-associated (UBA)-like CUE domain and a C-terminal small MutS-related (SMR) domain. CID5 and CID6 are encoded by gene CID5, CID6, respectively. CID5 is only expressed in immature siliques. The biological function of CID5 and CID6 remain unclear. — an NCBI CDD conserved domain (cd14371); members share this curated model.
