identifier: CDD:cd17674
label: "SWIB domain found in BRG1-associated factor 60A (BAF60A) and similar proteins. BAF60A, also termed SWI/SNF-related matrix-associated actin-dependent regulator of chromatin subfamily D member 1 (SMARCD1), or 60 kDa BRG-1/Brm-associated factor subunit A, or SWI/SNF complex 60 kDa subunit, is a core subunit of the SWI/SNF chromatin-remodeling complex that activates the transcription of fatty acid oxidation genes during fasting. BAF60A is involved in chromatin remodeling and hepatic lipid metabolism. It mediates critical interactions between nuclear receptors and the BRG1 chromatin-remodeling complex for transactivation. It is also a key component of the transcriptional control in cardiac progenitors. Moreover, BAF60A interacts with p53 to recruit the SWI/SNF complex, suggesting that the SWI/SNF chromatin remodeling complex is involved in the suppression of tumors."
definition: >-
