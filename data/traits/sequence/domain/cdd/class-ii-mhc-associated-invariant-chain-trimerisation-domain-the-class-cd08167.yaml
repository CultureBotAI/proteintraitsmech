identifier: CDD:cd08167
label: "Class II MHC-associated invariant chain trimerisation domain. The class II associated invariant chain peptide is required for folding and localisation of MHC class II heterodimers. This domain is involved in trimerisation of the ectoderm and interferes with DM/class II binding. The trimeric protein forms a cylindrical shape which is thought to be important for interactions between the invariant chain and class II molecules."
definition: >-
  Class II MHC-associated invariant chain trimerisation domain. The class II associated invariant chain peptide is required for folding and localisation of MHC class II heterodimers. This domain is involved in trimerisation of the ectoderm and interferes with DM/class II binding. The trimeric protein forms a cylindrical shape which is thought to be important for interactions between the invariant chain and class II molecules. — an NCBI CDD conserved domain (cd08167); members share this curated model.
