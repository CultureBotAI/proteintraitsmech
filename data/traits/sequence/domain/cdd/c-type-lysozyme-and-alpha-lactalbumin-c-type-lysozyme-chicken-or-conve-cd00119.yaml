identifier: CDD:cd00119
label: "C-type lysozyme and alpha-lactalbumin. C-type lysozyme (chicken or conventional type, 1,4-beta-N-acetylmuramidase) and alpha-lactalbumin (lactose synthase B protein, LA). They have a close evolutionary relationship and similar tertiary structure, however, functionally they are quite different. Lysozymes have primarily bacteriolytic function; hydrolysis of peptidoglycans of prokaryotic cell walls and transglycosylation. LA is a calcium-binding metalloprotein that is expressed exclusively in the mammary gland during lactation. LA is the regulatory subunit of the enzyme lactose synthase. The association of LA with the catalytic component of lactose synthase, galactosyltransferase, alters the acceptor substrate specificity of this glycosyltransferase, facilitating biosynthesis of lactose. Some lysozymes have evolved into digestive enzymes, both in mammals and invertebrates."
definition: >-
