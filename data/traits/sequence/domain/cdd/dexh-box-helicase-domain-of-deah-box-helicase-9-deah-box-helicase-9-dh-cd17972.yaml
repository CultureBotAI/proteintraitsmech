identifier: CDD:cd17972
label: "DEXH-box helicase domain of DEAH-box helicase 9. DEAH-box helicase 9 (DHX9, also known as ATP-dependent RNA helicase A or RHA and leukophysin or LKP) plays an important role in many cellular processes, including regulation of DNA replication, transcription, translation, microRNA biogenesis, RNA processing and transport, and maintenance of genomic stability. DHX9 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of DEAH-box helicase 9. DEAH-box helicase 9 (DHX9, also known as ATP-dependent RNA helicase A or RHA and leukophysin or LKP) plays an important role in many cellular processes, including regulation of DNA replication, transcription, translation, microRNA biogenesis, RNA processing and transport, and maintenance of genomic stability. DHX9 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17972); members share this curated model.
