identifier: CDD:cd15587
label: "PHD finger found in yeast orthologs of ING tumor suppressor family. The yeast orthologs of the plant homeodomain (PHD) finger-containing ING tumor suppressor family consists of chromatin modification-related protein YNG1 (Yng1p), YNG2 (Yng2p), and transcriptional regulatory protein PHO23 (Pho23p). Yng1p, also termed ING1 homolog 1, is one of the components of the NuA3 histone acetyltransferase (HAT) complex. Its PHD finger binding to H3 Trimethylated at K4 (H3K4me3) promotes NuA3 H3 HAT activity at K14 of H3 on chromatin. Yng2p, also termed ESA1-associated factor 4, or ING1 homolog 2, is a subunit of the NuA4 HAT complex. It plays a critical role in intra-S-phase DNA damage response. Pho23p is part of the Rpd3/Sin3 histone deacetylase (HDAC) complex. It is required for the normal function of Rpd3 in the silencing of rDNA, telomeric, and mating-type loci. Yng1p and Pho23p inhibit p53-dependent transcription. In contrast, Yng2p has the opposite effect. All family members contain an N-terminal ING histone-binding domain and a C-terminal PHD finger."
definition: >-
  PHD finger found in yeast orthologs of ING tumor suppressor family. The yeast orthologs of the plant homeodomain (PHD) finger-containing ING tumor suppressor family consists of chromatin modification-related protein YNG1 (Yng1p), YNG2 (Yng2p), and transcriptional regulatory protein PHO23 (Pho23p). Yng1p, also termed ING1 homolog 1, is one of the components of the NuA3 histone acetyltransferase (HAT) complex. Its PHD finger binding to H3 Trimethylated at K4 (H3K4me3) promotes NuA3 H3 HAT activity at K14 of H3 on chromatin. Yng2p, also termed ESA1-associated factor 4, or ING1 homolog 2, is a subunit of the NuA4 HAT complex. It plays a critical role in intra-S-phase DNA damage response. Pho23p is part of the Rpd3/Sin3 histone deacetylase (HDAC) complex. It is required for the normal function of Rpd3 in the silencing of rDNA, telomeric, and mating-type loci. Yng1p and Pho23p inhibit p53-dependent transcription. In contrast, Yng2p has the opposite effect. All family members contain an N-terminal ING histone-binding domain and a C-terminal PHD finger. — an NCBI CDD conserved domain (cd15587); members share this curated model.
