identifier: CDD:cd02061
label: Tansposase_INTc
definition: >-
  Transposases/Integrases (IN) superfamily; includes the IS4 transposases, Mu transposases, and retroviral integrases. These enzymes catalyze the movement of DNA segments to new locations within and between genomes. The process consist of three steps: (1) recognition of specific DNA sequences at the ends of mobile elements, and their pairing to form synaptic complexes; (2) nicking of the DNA at each end of the mobile elements to liberate the 3'OH ends of the elements from the DNA strands in which they were embedded; and (3) promotion of direct attacks of these cleaved DNA ends on two phosphodiester bonds at new DNA sites, thereby joining the elements' genome to a new segment of DNA. Water serves as the attacking nucleophile in the nicking step, whereas the elements' 3' hydroxyls do so in the DNA joining step (called DNA strand transfer). Both reactions are catalyzed by the same divalent cation-bound active site, which contains a highly conserved DDE motif
