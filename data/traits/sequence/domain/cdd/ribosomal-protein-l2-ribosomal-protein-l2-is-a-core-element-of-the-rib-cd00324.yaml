identifier: CDD:cd00324
label: "Ribosomal protein L2. Ribosomal protein L2 is a core element of the ribosomal large subunit that is highly conserved among all three kingdoms. Ribosomes are the particles that catalyze mRNA-directed protein synthesis in all organisms. Ribosomes consist of a large and a small subunit, which assemble during the initiation stage of protein synthesis. Ribosomal protein L2 contacts almost every domain of the large subunit rRNA and participates in an intersubunit bridge with the small subunit rRNA. L2 is a primary RNA-binding protein and plays an important role in ribosome assembly. Other functional activities of L2 beside the assembly of the ribosomal subunits have been studied such as tRNA binding to the A- and P-sites, peptidyltransferase activity, peptide-bond formation and transcription."
definition: >-
  Ribosomal protein L2. Ribosomal protein L2 is a core element of the ribosomal large subunit that is highly conserved among all three kingdoms. Ribosomes are the particles that catalyze mRNA-directed protein synthesis in all organisms. Ribosomes consist of a large and a small subunit, which assemble during the initiation stage of protein synthesis. Ribosomal protein L2 contacts almost every domain of the large subunit rRNA and participates in an intersubunit bridge with the small subunit rRNA. L2 is a primary RNA-binding protein and plays an important role in ribosome assembly. Other functional activities of L2 beside the assembly of the ribosomal subunits have been studied such as tRNA binding to the A- and P-sites, peptidyltransferase activity, peptide-bond formation and transcription. — an NCBI CDD conserved domain (cd00324); members share this curated model.
