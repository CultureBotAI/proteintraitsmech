identifier: CDD:cd07124
label: "Delta(1)-pyrroline-5-carboxylate dehydrogenase, RocA. Delta(1)-pyrroline-5-carboxylate dehydrogenase (EC=1.5.1.12 ), RocA: a proline catabolic enzyme of the aldehyde dehydrogenase (ALDH) protein superfamily. The proline catabolic enzymes, proline dehydrogenase and Delta(1)-pyrroline-5-carboxylate dehydrogenase (P5CDH), catalyze the two-step oxidation of proline to glutamate; P5CDH catalyzes the oxidation of glutamate semialdehyde, utilizing NAD+ as the electron acceptor. In some bacteria, the two enzymes are fused into the bifunctional flavoenzyme, proline utilization A (PutA). In this CD, monofunctional enzyme sequences such as seen in the Bacillus subtilis RocA P5CDH are also present. These enzymes play important roles in cellular redox control, superoxide generation, and apoptosis."
definition: >-
