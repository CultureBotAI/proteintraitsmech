identifier: CDD:cd08320
label: "Pyrin death domain found in NALP proteins. Pyrin Death Domain found in NALP (NACHT, LRR and PYD domains) proteins including NALP1 (CARD7, NLRP1), NALP3 (NLRP3, Cryopyrin, CIAS1), and NALP12 (NLRP12, Monarch-1), among others. Mammals contains at least 14 NALP proteins, named NALP1-14 (or NLRP1-14). NALPs are members of the NBS-LRR family of proteins possessing a tripartite domain structure including a C-terminal LRR (leucine-rich repeats), a central nucleotide-binding site (NBS) domain or NACHT (for neuronal apoptosis inhibitor protein, CIITA, HET-E and TP1), and an N-terminal protein-protein interaction domain, which is a Pyrin domain in the case of NALPs. The NBS-LRR family is also referred to as the NLR (Nod-like Receptor) or CATERPILLAR (for CARD, transcription enhancer, R-(purine)-binding, pyrin, lots of LRRs) family. NALP1 contains an additional Caspase activation and recruitment domain (CARD) at the C-terminus. NALP1 and NALP3 are both involved in the assembly of the 'inflammasome', a multiprotein platform which is formed in response to infection or injury and is responsible for caspase-1 activation and regulation of IL-1beta maturation. NALP1-inflammasomes recognize specific substances while NALP3-inflammasomes responds to many diverse triggers. Mutations in the NALP3 gene are associated with a broad spectrum of autoinflammatory disorders including Muckle-Wells Syndrome (MWS), familial cold autoinflammatory syndrome (FCAS), and chronic neurologic cutaneous and articular syndrome (CINCA). NALP12 functions as a negative regulator of inflammation. In general, Pyrin is a subfamily of the Death Domain (DD) superfamily and functions in several signaling pathways. DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD and DED (Death Effector Domain). They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes."
definition: >-
  Pyrin death domain found in NALP proteins. Pyrin Death Domain found in NALP (NACHT, LRR and PYD domains) proteins including NALP1 (CARD7, NLRP1), NALP3 (NLRP3, Cryopyrin, CIAS1), and NALP12 (NLRP12, Monarch-1), among others. Mammals contains at least 14 NALP proteins, named NALP1-14 (or NLRP1-14). NALPs are members of the NBS-LRR family of proteins possessing a tripartite domain structure including a C-terminal LRR (leucine-rich repeats), a central nucleotide-binding site (NBS) domain or NACHT (for neuronal apoptosis inhibitor protein, CIITA, HET-E and TP1), and an N-terminal protein-protein interaction domain, which is a Pyrin domain in the case of NALPs. The NBS-LRR family is also referred to as the NLR (Nod-like Receptor) or CATERPILLAR (for CARD, transcription enhancer, R-(purine)-binding, pyrin, lots of LRRs) family. NALP1 contains an additional Caspase activation and recruitment domain (CARD) at the C-terminus. NALP1 and NALP3 are both involved in the assembly of the 'inflammasome', a multiprotein platform which is formed in response to infection or injury and is responsible for caspase-1 activation and regulation of IL-1beta maturation. NALP1-inflammasomes recognize specific substances while NALP3-inflammasomes responds to many diverse triggers. Mutations in the NALP3 gene are associated with a broad spectrum of autoinflammatory disorders including Muckle-Wells Syndrome (MWS), familial cold autoinflammatory syndrome (FCAS), and chronic neurologic cutaneous and articular syndrome (CINCA). NALP12 functions as a negative regulator of inflammation. In general, Pyrin is a subfamily of the Death Domain (DD) superfamily and functions in several signaling pathways. DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD and DED (Death Effector Domain). They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes. — an NCBI CDD conserved domain (cd08320); members share this curated model.
