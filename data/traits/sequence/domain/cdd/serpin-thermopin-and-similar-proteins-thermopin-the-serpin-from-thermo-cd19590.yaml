identifier: CDD:cd19590
label: "serpin thermopin and similar proteins. Thermopin, the serpin from Thermobifida fusca, functions as an irreversible proteinase inhibitor with resistance to polymerization at high temperatures. The crystal structure of the cleaved thermopin was found to adopt the canonical serpin fold, supporting its inclusion as a classical inhibitory member of the serpin superfamily. A detailed structural comparison revealed unique features, including charge-stabilizing interactions, a deleted element of secondary structure (the G helix), and a C-terminal \"tail\" that interacts with the top of the A beta sheet and plays an important role in the folding/unfolding of the molecule. These unique features provide structural and biophysical evidence as to how this unusual serpin member has adapted to remain functional in an extreme environment. SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
definition: >-
  serpin thermopin and similar proteins. Thermopin, the serpin from Thermobifida fusca, functions as an irreversible proteinase inhibitor with resistance to polymerization at high temperatures. The crystal structure of the cleaved thermopin was found to adopt the canonical serpin fold, supporting its inclusion as a classical inhibitory member of the serpin superfamily. A detailed structural comparison revealed unique features, including charge-stabilizing interactions, a deleted element of secondary structure (the G helix), and a C-terminal "tail" that interacts with the top of the A beta sheet and plays an important role in the folding/unfolding of the molecule. These unique features provide structural and biophysical evidence as to how this unusual serpin member has adapted to remain functional in an extreme environment. SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans. — an NCBI CDD conserved domain (cd19590); members share this curated model.
