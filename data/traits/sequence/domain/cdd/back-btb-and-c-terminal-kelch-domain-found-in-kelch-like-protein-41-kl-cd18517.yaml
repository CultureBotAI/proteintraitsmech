identifier: CDD:cd18517
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 41 (KLHL41). KLHL41, also called Kel-like protein 23, or Kelch repeat and BTB domain-containing protein 10, or Kelch-related protein 1 (Krp1), or sarcosine, is a novel kelch related protein that is involved in pseudopod elongation in transformed cells. It is also involved in skeletal muscle development and differentiation. It regulates proliferation and differentiation of myoblasts and plays a role in myofibril assembly by promoting lateral fusion of adjacent thin fibrils into mature, wide myofibrils."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 41 (KLHL41). KLHL41, also called Kel-like protein 23, or Kelch repeat and BTB domain-containing protein 10, or Kelch-related protein 1 (Krp1), or sarcosine, is a novel kelch related protein that is involved in pseudopod elongation in transformed cells. It is also involved in skeletal muscle development and differentiation. It regulates proliferation and differentiation of myoblasts and plays a role in myofibril assembly by promoting lateral fusion of adjacent thin fibrils into mature, wide myofibrils. — an NCBI CDD conserved domain (cd18517); members share this curated model.
