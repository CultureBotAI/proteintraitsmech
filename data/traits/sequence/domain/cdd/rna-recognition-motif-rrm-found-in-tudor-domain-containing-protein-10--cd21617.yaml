label: "RNA recognition motif (RRM) found in Tudor domain-containing protein 10 (TDRD10) and similar proteins. TDRD10 is widely expressed and localized both to the nucleus and cytoplasm and may play general roles like regulation of RNA metabolism. It contains a Tudor domain and a RNA recognition motif (RRM)."
definition: >-
  RNA recognition motif (RRM) found in Tudor domain-containing protein 10 (TDRD10) and similar proteins. TDRD10 is widely expressed and localized both to the nucleus and cytoplasm and may play general roles like regulation of RNA metabolism. It contains a Tudor domain and a RNA recognition motif (RRM). — an NCBI CDD conserved domain (cd21617); members share this curated model.
