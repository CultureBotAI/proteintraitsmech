identifier: CDD:cd22910
label: "histone-fold domain found in histone H2B and similar proteins. Histone H2B is a core component of the nucleosome, which wraps and compacts DNA into chromatin, limiting DNA accessibility to the cellular machineries which require DNA as a template. Histones thereby play a central role in transcription regulation, DNA repair, DNA replication, and chromosomal stability. DNA accessibility is regulated via a complex set of post-translational modifications of histones, also called the histone code, and nucleosome remodeling. The nucleosome is a histone octamer containing two molecules each of H2A, H2B, H3 and H4, assembled in one H3-H4 heterotetramer and two H2A-H2B heterodimers. The octamer wraps approximately 147 bp of DNA. Some histone H2B family members have broad antibacterial activity, which may contribute to the formation of the functional antimicrobial barrier of the colonic epithelium, and to the bactericidal activity of amniotic fluid."
definition: >-
  histone-fold domain found in histone H2B and similar proteins. Histone H2B is a core component of the nucleosome, which wraps and compacts DNA into chromatin, limiting DNA accessibility to the cellular machineries which require DNA as a template. Histones thereby play a central role in transcription regulation, DNA repair, DNA replication, and chromosomal stability. DNA accessibility is regulated via a complex set of post-translational modifications of histones, also called the histone code, and nucleosome remodeling. The nucleosome is a histone octamer containing two molecules each of H2A, H2B, H3 and H4, assembled in one H3-H4 heterotetramer and two H2A-H2B heterodimers. The octamer wraps approximately 147 bp of DNA. Some histone H2B family members have broad antibacterial activity, which may contribute to the formation of the functional antimicrobial barrier of the colonic epithelium, and to the bactericidal activity of amniotic fluid. — an NCBI CDD conserved domain (cd22910); members share this curated model.
