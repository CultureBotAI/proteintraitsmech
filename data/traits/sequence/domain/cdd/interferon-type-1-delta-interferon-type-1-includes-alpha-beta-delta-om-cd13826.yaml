identifier: CDD:cd13826
label: IF-delta
definition: >-
  Interferon type 1 delta. Interferon type 1; includes alpha, beta, delta, omega, kappa, and tau interferons. Type I interferons belong to the larger helical cytokine superfamily, which includes growth hormones, interleukins, several colony-stimulating factors, and several other regulatory molecules. All function as regulators of cellular activty by interacting with cell-surface receptors and activating various signalling pathways. Interferons produce antiviral and antiproliferative responses in cells. Receptor specificity determines function of the various members of the family
