identifier: CDD:cd00206
label: "Snake toxin domain. The snake toxin domain is present in short and long neurotoxins, cytotoxins and short toxins, and in other miscellaneous venom peptides. The toxin acts by binding to the nicotinic acetylcholine receptors in the postsynaptic membrane of skeletal muscles and preventing the binding of acetylcholine, thereby blocking the excitation of muscles. This domain contains 60-75 amino acids that are fixed by 4-5 disulfide bridges and is nearly all beta sheets; it exists as either a monomer or a dimer. The snake toxin domain exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold), which also includes extracellular domain (ECD) found in Ly-6 antigen/uPA receptor-like (LU) superfamily."
definition: >-
  Snake toxin domain. The snake toxin domain is present in short and long neurotoxins, cytotoxins and short toxins, and in other miscellaneous venom peptides. The toxin acts by binding to the nicotinic acetylcholine receptors in the postsynaptic membrane of skeletal muscles and preventing the binding of acetylcholine, thereby blocking the excitation of muscles. This domain contains 60-75 amino acids that are fixed by 4-5 disulfide bridges and is nearly all beta sheets; it exists as either a monomer or a dimer. The snake toxin domain exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold), which also includes extracellular domain (ECD) found in Ly-6 antigen/uPA receptor-like (LU) superfamily. — an NCBI CDD conserved domain (cd00206); members share this curated model.
