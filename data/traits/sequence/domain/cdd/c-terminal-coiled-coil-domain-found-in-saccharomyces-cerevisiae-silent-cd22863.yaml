identifier: CDD:cd22863
label: Sir4_CC_C
definition: >-
  C-terminal coiled coil domain found in Saccharomyces cerevisiae silent information regulator 4 (Sir4p) and similar proteins. Sir4p is a regulatory protein that plays important roles in silent chromatin at telomeric and silent mating type loci. It physically interacts with another two silent information regulators, Sir2p and Sir3p, to form a complex that may regulate chromatin structure. The C-terminus of Sir4p is critical for its functions in vivo. This model corresponds to the C-terminal coiled coil domain of Sir4. Coiled coil dimerization is essential for telomeric and mating type silencing in Saccharomyces cerevisiae
