identifier: CDD:cd06291
label: "ligand binding domain of the lacI-like transcription regulator from a novel metal-reducing bacterium Alkaliphilus Metalliredigens (strain Qymf) and its close homologs. This group includes the ligand binding domain of the lacI-like transcription regulator from a novel metal-reducing bacterium Alkaliphilus metalliredigens (strain Qymf) and its close homologs. Qymf is a strict anaerobe that could be grown in the presence of borax and its cells are straight rods that produce endospores. This group is a member of the LacI-GalR family repressors that are composed of two functional domains: an N-terminal HTH (helix-turn-helix) domain, which is responsible for the DNA-binding specificity, and a C-terminal ligand-binding domain, which is homologous to the sugar-binding domain of ABC-type transport systems that contain the type 1 periplasmic binding protein-like fold. As also observed in the periplasmic binding proteins, the C-terminal domain of the bacterial transcription repressor undergoes a conformational change upon ligand binding which in turn changes the DNA binding affinity of the repressor."
definition: >-
  ligand binding domain of the lacI-like transcription regulator from a novel metal-reducing bacterium Alkaliphilus Metalliredigens (strain Qymf) and its close homologs. This group includes the ligand binding domain of the lacI-like transcription regulator from a novel metal-reducing bacterium Alkaliphilus metalliredigens (strain Qymf) and its close homologs. Qymf is a strict anaerobe that could be grown in the presence of borax and its cells are straight rods that produce endospores. This group is a member of the LacI-GalR family repressors that are composed of two functional domains: an N-terminal HTH (helix-turn-helix) domain, which is responsible for the DNA-binding specificity, and a C-terminal ligand-binding domain, which is homologous to the sugar-binding domain of ABC-type transport systems that contain the type 1 periplasmic binding protein-like fold. As also observed in the periplasmic binding proteins, the C-terminal domain of the bacterial transcription repressor undergoes a conformational change upon ligand binding which in turn changes the DNA binding affinity of the repressor. — an NCBI CDD conserved domain (cd06291); members share this curated model.
