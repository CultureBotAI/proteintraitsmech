identifier: CDD:cd09627
label: "Domon-like domain of UDP-N-acetylenolpyruvoylglucosamine reductase. UDP-N-acetylenolpyruvoylglucosamine reductase (murB) catalyzes an essential step in peptidoglycan biosynthesis, the reduction of UDP-N-acetylglucosamine-enolpyruvate to UDP-N-acetylmuramate. A subset of these FAD-dependent enzymes contains a C-terminal DOMON-like domain. DOMON domains can be found in all three kindgoms of life and are a diverse group of ligand binding domains that have been shown to interact with sugars and hemes; initially DOMON domains were suspected to confer protein-protein interactions. The DOMON-like domain in murB may bind a heme."
definition: >-
  Domon-like domain of UDP-N-acetylenolpyruvoylglucosamine reductase. UDP-N-acetylenolpyruvoylglucosamine reductase (murB) catalyzes an essential step in peptidoglycan biosynthesis, the reduction of UDP-N-acetylglucosamine-enolpyruvate to UDP-N-acetylmuramate. A subset of these FAD-dependent enzymes contains a C-terminal DOMON-like domain. DOMON domains can be found in all three kindgoms of life and are a diverse group of ligand binding domains that have been shown to interact with sugars and hemes; initially DOMON domains were suspected to confer protein-protein interactions. The DOMON-like domain in murB may bind a heme. — an NCBI CDD conserved domain (cd09627); members share this curated model.
