identifier: CDD:cd15167
label: "orphan G protein-coupled receptor 171, member of the class A family of seven-transmembrane G protein-coupled receptors. GPR171 is phylogenetically related to the P2Y family of purinergic G protein-coupled receptors. The P2Y receptor family is composed of eight subtypes, which are activated by naturally occurring extracellular nucleotides such as ATP, ADP, UTP, UDP, and UDP-glucose. A recent study has been reported that the peptide LENSSPQAPARRLLPP (BigLEN) activates GPR17 to regulate body weight in mice; however the biological role of the receptor remains unknown. GPR171 is a member of the class A G protein-coupled receptor superfamily, which all have a common structural architecture comprising of seven-transmembrane (TM) alpha-helices interconnected by three extracellular and three intracellular loops. A common feature of GPCR signaling is agonist-induced conformational changes in the receptors, which then activate the heterotrimeric G proteins. G-proteins regulate a variety of cellular functions including metabolic enzymes, ion channels, and transporters, among many others."
definition: >-
  orphan G protein-coupled receptor 171, member of the class A family of seven-transmembrane G protein-coupled receptors. GPR171 is phylogenetically related to the P2Y family of purinergic G protein-coupled receptors. The P2Y receptor family is composed of eight subtypes, which are activated by naturally occurring extracellular nucleotides such as ATP, ADP, UTP, UDP, and UDP-glucose. A recent study has been reported that the peptide LENSSPQAPARRLLPP (BigLEN) activates GPR17 to regulate body weight in mice; however the biological role of the receptor remains unknown. GPR171 is a member of the class A G protein-coupled receptor superfamily, which all have a common structural architecture comprising of seven-transmembrane (TM) alpha-helices interconnected by three extracellular and three intracellular loops. A common feature of GPCR signaling is agonist-induced conformational changes in the receptors, which then activate the heterotrimeric G proteins. G-proteins regulate a variety of cellular functions including metabolic enzymes, ion channels, and transporters, among many others. — an NCBI CDD conserved domain (cd15167); members share this curated model.
