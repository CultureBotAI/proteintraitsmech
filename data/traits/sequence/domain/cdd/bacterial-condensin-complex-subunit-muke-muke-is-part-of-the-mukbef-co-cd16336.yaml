identifier: CDD:cd16336
label: MukE
definition: >-
  bacterial condensin complex subunit MukE. MukE is part of the MukBEF condensin complex that is mainly found in proteobacteria and is involved in chromosome organization and condensation. The complex is believed to serve as a part of the chromosome scaffold rather than a bulk DNA packing protein. MukE and MukF form a stable complex with each other and dynamically associate with MukB, a member of the SMC protein family. MukEF does not bind DNA on its own but modulates MukB-DNA activity. The stoichiometry of the MukEF complex is MukE4F2
