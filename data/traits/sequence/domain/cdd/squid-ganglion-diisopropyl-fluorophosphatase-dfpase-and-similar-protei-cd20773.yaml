identifier: CDD:cd20773
label: "squid ganglion diisopropyl-fluorophosphatase (DFPase) and similar proteins. DFPase is a phosphotriesterase capable of hydrolyzing the organophosphates diisopropylfluorophosphate, soman, sarin, tabun, and cyclosarin (chemical warfare agents). The biological function of the enzyme isolated from the squid head ganglion is not known. It is a member of a subfamily of the N6P (Nucleophilic attack 6-bladed beta-propeller) superfamily, a set of enzymes including and related to vertebrate paraoxonase, an enzyme that hydrolyses organophosphorous esters. The proteins in this family are composed of six beta-propeller repeats that form a closed structure, similar to WD40- and NHL-repeat containing protein families. Some family members are also referred to as the calcium-dependent phosphotriesterases."
definition: >-
