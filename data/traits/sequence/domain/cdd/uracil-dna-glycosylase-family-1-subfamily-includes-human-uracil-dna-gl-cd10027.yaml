identifier: CDD:cd10027
label: "Uracil DNA glycosylase family 1 subfamily, includes Human uracil DNA glycosylase and similar proteins. Uracil DNA glycosylase family 1 is the most efficient of all uracil-DNA glycosylases (UDGs, also known as UNGs) and shows a specificity for uracil in DNA. UDG catalyzes the removal of uracil from DNA to initiate the DNA base excision repair pathway. Uracil in DNA can arise as a result of mis-incorporation of dUMP residues by DNA polymerase or deamination of cytosine. Uracil mispaired with guanine in DNA is one of the major pro-mutagenic events, causing G:C->A:T mutations. Thus, UDG is an essential enzyme for maintaining the integrity of genetic information. UDGs have been classified into various families on the basis of their substrate specificity, conserved motifs, and structural similarities. Although these families demonstrate different substrate specificities, often the function of one enzyme can be complemented by the other."
definition: >-
  Uracil DNA glycosylase family 1 subfamily, includes Human uracil DNA glycosylase and similar proteins. Uracil DNA glycosylase family 1 is the most efficient of all uracil-DNA glycosylases (UDGs, also known as UNGs) and shows a specificity for uracil in DNA. UDG catalyzes the removal of uracil from DNA to initiate the DNA base excision repair pathway. Uracil in DNA can arise as a result of mis-incorporation of dUMP residues by DNA polymerase or deamination of cytosine. Uracil mispaired with guanine in DNA is one of the major pro-mutagenic events, causing G:C->A:T mutations. Thus, UDG is an essential enzyme for maintaining the integrity of genetic information. UDGs have been classified into various families on the basis of their substrate specificity, conserved motifs, and structural similarities. Although these families demonstrate different substrate specificities, often the function of one enzyme can be complemented by the other. — an NCBI CDD conserved domain (cd10027); members share this curated model.
