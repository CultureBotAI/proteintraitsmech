identifier: CDD:cd18304
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Mac-2-binding protein (MAC2BP/M2BP). M2BP is also called galectin-3-binding protein, basement membrane autoantigen p105, lectin galactoside-binding soluble 3-binding protein (LGALS3BP), or tumor-associated antigen 90K. It promotes integrin-mediated cell adhesion and may stimulate host defense against viruses and tumor cells. It contains a scavenger receptor cysteine-rich domain, followed by BTB and BACK domains. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Mac-2-binding protein (MAC2BP/M2BP). M2BP is also called galectin-3-binding protein, basement membrane autoantigen p105, lectin galactoside-binding soluble 3-binding protein (LGALS3BP), or tumor-associated antigen 90K. It promotes integrin-mediated cell adhesion and may stimulate host defense against viruses and tumor cells. It contains a scavenger receptor cysteine-rich domain, followed by BTB and BACK domains. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18304); members share this curated model.
