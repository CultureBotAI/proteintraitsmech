identifier: CDD:cd02697
label: "M20 Zn-peptidases include exopeptidases. Peptidase M20 family; uncharacterized subfamily. These hypothetical proteins have been inferred by homology to be exopeptidases: carboxypeptidases, dipeptidases and a specialized aminopeptidase. In general, the peptidase hydrolyzes the late products of protein degradation in order to complete the conversion of proteins to free amino acids. Members of this subfamily may bind metal ions such as zinc."
definition: >-
  M20 Zn-peptidases include exopeptidases. Peptidase M20 family; uncharacterized subfamily. These hypothetical proteins have been inferred by homology to be exopeptidases: carboxypeptidases, dipeptidases and a specialized aminopeptidase. In general, the peptidase hydrolyzes the late products of protein degradation in order to complete the conversion of proteins to free amino acids. Members of this subfamily may bind metal ions such as zinc. — an NCBI CDD conserved domain (cd02697); members share this curated model.
