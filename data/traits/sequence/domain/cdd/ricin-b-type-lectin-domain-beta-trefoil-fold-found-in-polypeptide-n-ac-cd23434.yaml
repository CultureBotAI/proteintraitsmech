identifier: CDD:cd23434
label: "ricin B-type lectin domain, beta-trefoil fold, found in polypeptide N-acetylgalactosaminyltransferase 2 (GALNT2) and similar proteins. GALNT2 (EC 2.4.1.41), also called polypeptide GalNAc transferase 2, GalNAc-T2, pp-GaNTase 2, protein-UDP acetylgalactosaminyltransferase 2, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 2, catalyzes the initial reaction in O-linked oligosaccharide biosynthesis, the transfer of an N-acetyl-D-galactosamine residue to a serine or threonine residue on the protein receptor. GALNT2 has a broad spectrum of substrates for peptides such as EA2, Muc5AC, Muc1a, Muc1b. It is probably involved in O-linked glycosylation of the immunoglobulin A1 (IgA1) hinge region. It is also involved in O-linked glycosylation of APOC-III, ANGPTL3 and PLTP. It participates in the regulation of HDL-C metabolism. GALNT2 comprises a glycosyltransferase region and a ricin B-type lectin domain. The glycosyltransferase region contains two conserved domains, domain A (also called GT1 motif) and domain B (also called Gal/GalNAc-T motif). This model corresponds to the ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ricin B-type lectin domain binds to GalNAc and contributes to the glycopeptide specificity."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in polypeptide N-acetylgalactosaminyltransferase 2 (GALNT2) and similar proteins. GALNT2 (EC 2.4.1.41), also called polypeptide GalNAc transferase 2, GalNAc-T2, pp-GaNTase 2, protein-UDP acetylgalactosaminyltransferase 2, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 2, catalyzes the initial reaction in O-linked oligosaccharide biosynthesis, the transfer of an N-acetyl-D-galactosamine residue to a serine or threonine residue on the protein receptor. GALNT2 has a broad spectrum of substrates for peptides such as EA2, Muc5AC, Muc1a, Muc1b. It is probably involved in O-linked glycosylation of the immunoglobulin A1 (IgA1) hinge region. It is also involved in O-linked glycosylation of APOC-III, ANGPTL3 and PLTP. It participates in the regulation of HDL-C metabolism. GALNT2 comprises a glycosyltransferase region and a ricin B-type lectin domain. The glycosyltransferase region contains two conserved domains, domain A (also called GT1 motif) and domain B (also called Gal/GalNAc-T motif). This model corresponds to the ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ricin B-type lectin domain binds to GalNAc and contributes to the glycopeptide specificity. — an NCBI CDD conserved domain (cd23434); members share this curated model.
