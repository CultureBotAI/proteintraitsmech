identifier: CDD:cd04165
label: "GTP binding protein 1 (GTPBP1)-like family includes GTPBP2. Mammalian GTP binding protein 1 (GTPBP1), GTPBP2, and nematode homologs AGP-1 and CGP-1 are GTPases whose specific functions remain unknown. In mouse, GTPBP1 is expressed in macrophages, in smooth muscle cells of various tissues and in some neurons of the cerebral cortex; GTPBP2 tissue distribution appears to overlap that of GTPBP1. In human leukemia and macrophage cell lines, expression of both GTPBP1 and GTPBP2 is enhanced by interferon-gamma (IFN-gamma). The chromosomal location of both genes has been identified in humans, with GTPBP1 located in chromosome 22q12-13.1 and GTPBP2 located in chromosome 6p21-12. Human glioblastoma multiforme (GBM), a highly-malignant astrocytic glioma and the most common cancer in the central nervous system, has been linked to chromosomal deletions and a translocation on chromosome 6. The GBM translocation results in a fusion of GTPBP2 and PTPRZ1, a protein involved in oligodendrocyte differentiation, recovery, and survival. This fusion product may contribute to the onset of GBM."
definition: >-
  GTP binding protein 1 (GTPBP1)-like family includes GTPBP2. Mammalian GTP binding protein 1 (GTPBP1), GTPBP2, and nematode homologs AGP-1 and CGP-1 are GTPases whose specific functions remain unknown. In mouse, GTPBP1 is expressed in macrophages, in smooth muscle cells of various tissues and in some neurons of the cerebral cortex; GTPBP2 tissue distribution appears to overlap that of GTPBP1. In human leukemia and macrophage cell lines, expression of both GTPBP1 and GTPBP2 is enhanced by interferon-gamma (IFN-gamma). The chromosomal location of both genes has been identified in humans, with GTPBP1 located in chromosome 22q12-13.1 and GTPBP2 located in chromosome 6p21-12. Human glioblastoma multiforme (GBM), a highly-malignant astrocytic glioma and the most common cancer in the central nervous system, has been linked to chromosomal deletions and a translocation on chromosome 6. The GBM translocation results in a fusion of GTPBP2 and PTPRZ1, a protein involved in oligodendrocyte differentiation, recovery, and survival. This fusion product may contribute to the onset of GBM. — an NCBI CDD conserved domain (cd04165); members share this curated model.
