identifier: CDD:cd18873
label: "bifunctional NMN adenylyltransferase/ADP-ribose pyrophosphatase and similar proteins. Bacterial NadM-Nudix is a bifunctional enzyme containing a nicotinamide mononucleotide (NMN) adenylyltransferase (NMNAT) and an ADP-ribose pyrophosphatase (ADPRase) domain. NMNAT was initially identified as an NAD+ synthase that catalyzes the reversible conversion of NMN to NAD+ in the final step of both the de novo biosynthesis and salvage pathways in most organisms across all three kingdoms of life ADPRase is a member of the NUDIX family proteins, catalyzes the metal-induced and concerted general acid-base hydrolysis of ADP ribose (ADPR) into AMP and ribose-5'-phosphate (R5P). Additional members in this cd include bacterial transcriptional regulator, NrtR, which represses the transcription of NAD biosynthetic genes in vitro and adenosine diphosphate ribose (ADPR), as well as NadQ, a NUDIX-like ATP-responsive regulator of NAD biosynthesis. Members of the NUDIX hydrolase superfamily catalyze the hydrolysis of NUcleoside DIphosphates linked to other moieties, X. Enzymes belong to this superfamily requires a divalent cation, such as Mg2+ or Mn2+ for their activity and contain a highly conserved 23-residue NUDIX motif (GX5EX7REUXEEXGU, U=I, L or V) which functions as metal binding and catalytic site. Substrates of NUDIX hydrolase include intact and oxidatively damaged nucleoside triphosphates, dinucleoside polyphosphates, nucleotide-sugars and dinucleotide enzymes. These substrates are metabolites or cell signaling molecules that require regulation during different stages of the cell cycle or during periods of stress. In general, the role of the NUDIX hydrolase is to sanitize the nucleotide pools and to maintain cell viability, thereby serving as surveillance & \"house-cleaning\" enzymes. Substrate specificity is used to define families within the superfamily. Differences in substrate specificity are determined by the N-terminal extension or by residues in variable loop regions. Mechanistically, substrate hydrolysis occurs by a nucleophilic substitution reaction, with variation in the numbers and roles of divalent cations required."
definition: >-
  bifunctional NMN adenylyltransferase/ADP-ribose pyrophosphatase and similar proteins. Bacterial NadM-Nudix is a bifunctional enzyme containing a nicotinamide mononucleotide (NMN) adenylyltransferase (NMNAT) and an ADP-ribose pyrophosphatase (ADPRase) domain. NMNAT was initially identified as an NAD+ synthase that catalyzes the reversible conversion of NMN to NAD+ in the final step of both the de novo biosynthesis and salvage pathways in most organisms across all three kingdoms of life ADPRase is a member of the NUDIX family proteins, catalyzes the metal-induced and concerted general acid-base hydrolysis of ADP ribose (ADPR) into AMP and ribose-5'-phosphate (R5P). Additional members in this cd include bacterial transcriptional regulator, NrtR, which represses the transcription of NAD biosynthetic genes in vitro and adenosine diphosphate ribose (ADPR), as well as NadQ, a NUDIX-like ATP-responsive regulator of NAD biosynthesis. Members of the NUDIX hydrolase superfamily catalyze the hydrolysis of NUcleoside DIphosphates linked to other moieties, X. Enzymes belong to this superfamily requires a divalent cation, such as Mg2+ or Mn2+ for their activity and contain a highly conserved 23-residue NUDIX motif (GX5EX7REUXEEXGU, U=I, L or V) which functions as metal binding and catalytic site. Substrates of NUDIX hydrolase include intact and oxidatively damaged nucleoside triphosphates, dinucleoside polyphosphates, nucleotide-sugars and dinucleotide enzymes. These substrates are metabolites or cell signaling molecules that require regulation during different stages of the cell cycle or during periods of stress. In general, the role of the NUDIX hydrolase is to sanitize the nucleotide pools and to maintain cell viability, thereby serving as surveillance & "house-cleaning" enzymes. Substrate specificity is used to define families within the superfamily. Differences in substrate specificity are determined by the N-terminal extension or by residues in variable loop regions. Mechanistically, substrate hydrolysis occurs by a nucleophilic substitution reaction, with variation in the numbers and roles of divalent cations required. — an NCBI CDD conserved domain (cd18873); members share this curated model.
