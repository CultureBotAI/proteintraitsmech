identifier: CDD:cd11607
label: "C-terminal domain of DENR and related proteins. DENR (density regulated protein), together with MCT-1 (multiple copies T cell malignancies), has been shown to have similar function as eIF2D translation initiation factor (also known as ligatin), which is involved in the recruitment and delivery of aminoacyl-tRNAs to the P-site of the eukaryotic ribosome in a GTP-independent manner."
definition: >-
  C-terminal domain of DENR and related proteins. DENR (density regulated protein), together with MCT-1 (multiple copies T cell malignancies), has been shown to have similar function as eIF2D translation initiation factor (also known as ligatin), which is involved in the recruitment and delivery of aminoacyl-tRNAs to the P-site of the eukaryotic ribosome in a GTP-independent manner. — an NCBI CDD conserved domain (cd11607); members share this curated model.
