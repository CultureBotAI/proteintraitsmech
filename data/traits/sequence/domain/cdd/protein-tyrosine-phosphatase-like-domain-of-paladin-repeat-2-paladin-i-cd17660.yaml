identifier: CDD:cd17660
label: "protein tyrosine phosphatase-like domain of paladin, repeat 2. Paladin is a putative phosphatase, which in mouse is expressed in endothelial cells during embryonic development and in arterial smooth muscle cells in adults. It has been suggested to be an antiphosphatase that regulates the activity of specific neural crest regulatory factors and thus, modulates neural crest cell formation and migration. Paladin contains two tyrosine-protein phosphatase domains. This model represents repeat 2."
definition: >-
  protein tyrosine phosphatase-like domain of paladin, repeat 2. Paladin is a putative phosphatase, which in mouse is expressed in endothelial cells during embryonic development and in arterial smooth muscle cells in adults. It has been suggested to be an antiphosphatase that regulates the activity of specific neural crest regulatory factors and thus, modulates neural crest cell formation and migration. Paladin contains two tyrosine-protein phosphatase domains. This model represents repeat 2. — an NCBI CDD conserved domain (cd17660); members share this curated model.
