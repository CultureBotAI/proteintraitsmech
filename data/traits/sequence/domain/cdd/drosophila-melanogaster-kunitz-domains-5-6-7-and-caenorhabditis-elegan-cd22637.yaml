identifier: CDD:cd22637
label: "Drosophila melanogaster Kunitz domains 5, 6, 7, and Caenorhabditis elegans Kunitz domain 5 of papilin, and similar domains. This model includes Kunitz domains from papilins with multiple Kunitz domains, such as Drosophila melanogaster Kunitz domains 5, 6, 7, and Caenorhabditis elegans Kunitz domain 5 of papilin, among others. Papilins are essential for embryonic development. D. melanogaster papilin is an essential extracellular matrix (ECM) protein that influences cell rearrangements. It may act by modulating metalloproteinases action during organogenesis and is able to non-competitively inhibit procollagen N-proteinase, an ADAMTS metalloproteinase. C. elegans papilin (also called abnormal cell migration protein 6) mig-6 encodes long (MIG-6L) and short (MIG-6S) isoforms of the extracellular matrix protein papilin, each required for distinct aspects of distal tip cell (DTC) migration and both isoforms have an N-terminal papilin cassette, lagrin repeats and six C-terminal Kunitz-type serine proteinase inhibitory domains. It plays a role in embryogenesis, the second phase of distal cell tip migration and is required for distribution of the metalloproteinase, mig-17, during organogenesis. These domains are similar to Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor) that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  Drosophila melanogaster Kunitz domains 5, 6, 7, and Caenorhabditis elegans Kunitz domain 5 of papilin, and similar domains. This model includes Kunitz domains from papilins with multiple Kunitz domains, such as Drosophila melanogaster Kunitz domains 5, 6, 7, and Caenorhabditis elegans Kunitz domain 5 of papilin, among others. Papilins are essential for embryonic development. D. melanogaster papilin is an essential extracellular matrix (ECM) protein that influences cell rearrangements. It may act by modulating metalloproteinases action during organogenesis and is able to non-competitively inhibit procollagen N-proteinase, an ADAMTS metalloproteinase. C. elegans papilin (also called abnormal cell migration protein 6) mig-6 encodes long (MIG-6L) and short (MIG-6S) isoforms of the extracellular matrix protein papilin, each required for distinct aspects of distal tip cell (DTC) migration and both isoforms have an N-terminal papilin cassette, lagrin repeats and six C-terminal Kunitz-type serine proteinase inhibitory domains. It plays a role in embryogenesis, the second phase of distal cell tip migration and is required for distribution of the metalloproteinase, mig-17, during organogenesis. These domains are similar to Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor) that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22637); members share this curated model.
