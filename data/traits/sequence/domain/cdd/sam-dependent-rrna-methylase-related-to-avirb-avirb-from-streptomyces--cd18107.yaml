identifier: CDD:cd18107
label: "SAM-dependent rRNA methylase related to AviRb. AviRb from Streptomyces viridochromogenes methylates the 2'-O atom of U2479 of the 23S ribosomal RNA. AviRb is a member of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot."
definition: >-
  SAM-dependent rRNA methylase related to AviRb. AviRb from Streptomyces viridochromogenes methylates the 2'-O atom of U2479 of the 23S ribosomal RNA. AviRb is a member of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot. — an NCBI CDD conserved domain (cd18107); members share this curated model.
