identifier: CDD:cd14834
label: "AP-3 complex subunit sigma. AP-3 complex sigma subunit is part of the heterotetrameric adaptor protein (AP)-1 complex which consists of one large delta-, one beta-, one mu-, and one sigma-subunit. AP complexes link the cytosolic domains of the cargo proteins to the protein coat that induces vesicle budding in the donor compartment during vesicle transport. AP-3 binds the coat protein clathrin and the phospholipid  PI(3)P and it is localized in the endosome. The sigma subunit is comprised of a single longin domain and plays a role in binding dileucine-based sorting signals."
definition: >-
  AP-3 complex subunit sigma. AP-3 complex sigma subunit is part of the heterotetrameric adaptor protein (AP)-1 complex which consists of one large delta-, one beta-, one mu-, and one sigma-subunit. AP complexes link the cytosolic domains of the cargo proteins to the protein coat that induces vesicle budding in the donor compartment during vesicle transport. AP-3 binds the coat protein clathrin and the phospholipid PI(3)P and it is localized in the endosome. The sigma subunit is comprised of a single longin domain and plays a role in binding dileucine-based sorting signals. — an NCBI CDD conserved domain (cd14834); members share this curated model.
