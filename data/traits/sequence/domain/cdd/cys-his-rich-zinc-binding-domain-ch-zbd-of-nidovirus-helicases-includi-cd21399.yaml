identifier: CDD:cd21399
label: "Cys/His rich zinc-binding domain (CH/ZBD) of nidovirus helicases including coronavirus Nsp13 and arterivirus Nsp10, and related proteins. Helicases catalyze NTP-dependent unwinding of nucleic acid duplexes into single strands and are classified based on the arrangement of conserved motifs into six superfamilies. This nidovirus family includes Severe Acute Respiratory Syndrome coronavirus (SARS) non-structural protein 13 (SARS-Nsp13) and equine arteritis virus (EAV) Nsp10 helicase, and belongs to helicase superfamily 1 (SF1). The CH/ZBD has 3 zinc-finger (ZnF1-3) motifs. SARS-Nsp13 is a component of the viral RNA synthesis replication and transcription complex (RTC). The SARS-Nsp13 CH/ZBD is indispensable for helicase activity and interacts with SARS-Nsp12, the RNA-dependent RNA polymerase. SARS-Nsp12 can enhance the helicase activity of SARS-Nsp13. SARS-Nsp13 and EAV Nsp10 are multidomain proteins; their other domains include a 1B regulatory domain and a SF1 helicase core."
definition: >-
  Cys/His rich zinc-binding domain (CH/ZBD) of nidovirus helicases including coronavirus Nsp13 and arterivirus Nsp10, and related proteins. Helicases catalyze NTP-dependent unwinding of nucleic acid duplexes into single strands and are classified based on the arrangement of conserved motifs into six superfamilies. This nidovirus family includes Severe Acute Respiratory Syndrome coronavirus (SARS) non-structural protein 13 (SARS-Nsp13) and equine arteritis virus (EAV) Nsp10 helicase, and belongs to helicase superfamily 1 (SF1). The CH/ZBD has 3 zinc-finger (ZnF1-3) motifs. SARS-Nsp13 is a component of the viral RNA synthesis replication and transcription complex (RTC). The SARS-Nsp13 CH/ZBD is indispensable for helicase activity and interacts with SARS-Nsp12, the RNA-dependent RNA polymerase. SARS-Nsp12 can enhance the helicase activity of SARS-Nsp13. SARS-Nsp13 and EAV Nsp10 are multidomain proteins; their other domains include a 1B regulatory domain and a SF1 helicase core. — an NCBI CDD conserved domain (cd21399); members share this curated model.
