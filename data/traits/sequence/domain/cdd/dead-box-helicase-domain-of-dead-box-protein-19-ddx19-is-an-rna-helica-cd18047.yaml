identifier: CDD:cd18047
label: "DEAD-box helicase domain of DEAD box protein 19. DDX19 is an RNA helicase involved in both mRNA (mRNA) export from the nucleus into the cytoplasm and in mRNA translation. DDX19 functions in the nucleus in resolving RNA:DNA hybrids (R-loops). Activation of a DNA damage response pathway dependent upon the ATR kinase, a major regulator of replication fork progression, stimulates translocation of DDX19 from the cytoplasm into the nucleus. Only nuclear Ddx19 is competent to resolve R-loops. DDX19 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of DEAD box protein 19. DDX19 is an RNA helicase involved in both mRNA (mRNA) export from the nucleus into the cytoplasm and in mRNA translation. DDX19 functions in the nucleus in resolving RNA:DNA hybrids (R-loops). Activation of a DNA damage response pathway dependent upon the ATR kinase, a major regulator of replication fork progression, stimulates translocation of DDX19 from the cytoplasm into the nucleus. Only nuclear Ddx19 is competent to resolve R-loops. DDX19 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd18047); members share this curated model.
