identifier: CDD:cd12837
label: EcCorA-like_u1
definition: >-
  uncharacterized subgroup of the Escherichia coli Mg2+ transporter CorA_like subfamily. A uncharacterized subgroup of the Escherichia coli CorA-Salmonella typhimurium ZntB_like family (EcCorA_ZntB-like) family of the MIT superfamily of essential membrane proteins involved in transporting divalent cations (uptake or efflux) across membranes. The EcCorA_ZntB-like family includes the Mg2+ transporters Escherichia coli and Salmonella typhimurium CorAs, which can also transport Co2+, and Ni2+. Structures of the intracellular domain of EcCorA_ZntB-like family members, Vibrio parahaemolyticus and Salmonella typhimurium ZntB, form funnel-shaped homopentamers, the tip of the funnel is formed from two C-terminal transmembrane (TM) helices from each monomer, and the large opening of the funnel from the N-terminal cytoplasmic domains. The GMN signature motif of the MIT superfamily occurs just after TM1, mutation within this motif is known to abolish Mg2+ transport through Salmonella typhimurium CorA. Natural variants such as GVN and GIN, such as occur in some ZntB family proteins, may be associated with the transport of different divalent cations, such as zinc and cadmium. The functional diversity of MIT transporters may also be due to minor structural differences regulating gating, substrate selection, and transport
