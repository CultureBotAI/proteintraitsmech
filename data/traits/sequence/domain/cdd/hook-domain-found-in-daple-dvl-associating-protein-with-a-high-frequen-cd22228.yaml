label: "Hook domain found in Daple (Dvl-associating protein with a high frequency of leucine residues) and similar proteins. Protein Daple, also called coiled-coil domain-containing protein 88C (CCDC88C), or Hook-related protein 2 (HkRP2), is a novel non-receptor nucleotide exchange factor (GEF) required for activation of guanine nucleotide-binding proteins (G-proteins) during non-canonical Wnt signaling."
