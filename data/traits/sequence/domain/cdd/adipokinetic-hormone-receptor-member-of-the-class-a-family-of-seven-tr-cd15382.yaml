identifier: CDD:cd15382
label: "adipokinetic hormone receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. Adipokinetic hormone (AKH) is a lipid-mobilizing hormone that is involved in control of insect metabolism. Generally, AKH behaves as a typical stress hormone by mobilizing lipids, carbohydrates and/or certain amino acids such as proline. Thus, it utilizes the body's energy reserves to fight the immediate stress problems and subdue processes that are less important. Although AKH is known to responsible for regulating the energy metabolism during insect flight, it is also found in insects that have lost its functional wings and predominantly walk for their locomotion. AKH is structurally related to the mammalian gonadotropin-releasing hormone (GnRH) and they share a common ancestor. Both GnRH and AKH receptors are members of the class A of the seven-transmembrane, G-protein coupled receptor (GPCR) superfamily."
definition: >-
