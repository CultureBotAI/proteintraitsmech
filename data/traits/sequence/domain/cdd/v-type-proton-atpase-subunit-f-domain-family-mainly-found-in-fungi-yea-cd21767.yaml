identifier: CDD:cd21767
label: "V-type proton ATPase subunit f domain family mainly found in fungi. Yeast vacuolar H+-ATPase, also called V-ATPase, is a rotary motor enzyme that are organized in two sectors: a cytoplasmic V1-ATPase and a membrane embedded Vo proton channel. The family corresponds to V-ATPase subunit f, a component of the Vo that includes subunits a, d, e, f and the c-ring."
definition: >-
  V-type proton ATPase subunit f domain family mainly found in fungi. Yeast vacuolar H+-ATPase, also called V-ATPase, is a rotary motor enzyme that are organized in two sectors: a cytoplasmic V1-ATPase and a membrane embedded Vo proton channel. The family corresponds to V-ATPase subunit f, a component of the Vo that includes subunits a, d, e, f and the c-ring. — an NCBI CDD conserved domain (cd21767); members share this curated model.
