label: V-ATPase_f
definition: >-
  V-type proton ATPase subunit f domain family mainly found in fungi. Yeast vacuolar H+-ATPase, also called V-ATPase, is a rotary motor enzyme that are organized in two sectors: a cytoplasmic V1-ATPase and a membrane embedded Vo proton channel. The family corresponds to V-ATPase subunit f, a component of the Vo that includes subunits a, d, e, f and the c-ring
