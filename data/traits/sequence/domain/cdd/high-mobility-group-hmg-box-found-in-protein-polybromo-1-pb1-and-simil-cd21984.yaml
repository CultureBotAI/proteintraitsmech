identifier: CDD:cd21984
label: "high mobility group (HMG)-box found in protein polybromo-1 (PB1) and similar proteins. PB1, also called BRG1-associated factor 180 (BAF180), or polybromo-1D, is a subunit of the PBAF (polybromo/Brg1-associated factor) chromatin-remodeling complex required for kinetochore localization during mitosis and the transcription of estrogen-responsive genes. It is involved in transcriptional activation and repression of select genes by chromatin remodeling. It acts as a negative regulator of cell proliferation."
definition: >-
  high mobility group (HMG)-box found in protein polybromo-1 (PB1) and similar proteins. PB1, also called BRG1-associated factor 180 (BAF180), or polybromo-1D, is a subunit of the PBAF (polybromo/Brg1-associated factor) chromatin-remodeling complex required for kinetochore localization during mitosis and the transcription of estrogen-responsive genes. It is involved in transcriptional activation and repression of select genes by chromatin remodeling. It acts as a negative regulator of cell proliferation. — an NCBI CDD conserved domain (cd21984); members share this curated model.
