identifier: CDD:cd22525
label: "type I K homology (KH) RNA-binding domain found in exosome complex component Rrp4 from eukaryote. The subfamily corresponds to ribosomal RNA-processing protein 4 (Rrp4) mainly from eukaryote. Rrp4, also called exosome component 2 (EXOSC2), or ribosomal RNA-processing protein 4, is a non-catalytic component of the RNA exosome complex which has 3'-->5' exoribonuclease activity and participates in a multitude of cellular RNA processing and degradation events. Mutations in EXOSC2 gene are associated with a novel syndrome characterized by retinitis pigmentosa, progressive hearing loss, premature aging, short stature, mild intellectual disability and distinctive gestalt. Members in this subfamily contain a divergent KH domain that lacks the RNA-binding GXXG motif."
definition: >-
  type I K homology (KH) RNA-binding domain found in exosome complex component Rrp4 from eukaryote. The subfamily corresponds to ribosomal RNA-processing protein 4 (Rrp4) mainly from eukaryote. Rrp4, also called exosome component 2 (EXOSC2), or ribosomal RNA-processing protein 4, is a non-catalytic component of the RNA exosome complex which has 3'-->5' exoribonuclease activity and participates in a multitude of cellular RNA processing and degradation events. Mutations in EXOSC2 gene are associated with a novel syndrome characterized by retinitis pigmentosa, progressive hearing loss, premature aging, short stature, mild intellectual disability and distinctive gestalt. Members in this subfamily contain a divergent KH domain that lacks the RNA-binding GXXG motif. — an NCBI CDD conserved domain (cd22525); members share this curated model.
