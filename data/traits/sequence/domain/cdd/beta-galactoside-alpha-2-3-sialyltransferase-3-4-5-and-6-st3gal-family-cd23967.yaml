identifier: CDD:cd23967
label: "beta-galactoside alpha-2,3-sialyltransferase 3,4,5 and 6. ST3GAL family transfers sialic acid from CMP-Sia to the terminalgalactose residues of glycochains through an 2,3-linkage. ST3GAL3 and 4 utilize bothGalbeta1,3GlcNAc and Galbeta1,4GlcNAc, mainly on glycoproteins and oligosaccharidesas acceptor substrates. ST3GAL5 is also known as GM3 ganglioside synthase. ST3GAL6 utilizes the Galbeta1,4GlcNAc on glycoproteins and glycolipids as an acceptor. Members of this family belong to glycosyltransferase family 29 (GT29)."
definition: >-
  beta-galactoside alpha-2,3-sialyltransferase 3,4,5 and 6. ST3GAL family transfers sialic acid from CMP-Sia to the terminalgalactose residues of glycochains through an 2,3-linkage. ST3GAL3 and 4 utilize bothGalbeta1,3GlcNAc and Galbeta1,4GlcNAc, mainly on glycoproteins and oligosaccharidesas acceptor substrates. ST3GAL5 is also known as GM3 ganglioside synthase. ST3GAL6 utilizes the Galbeta1,4GlcNAc on glycoproteins and glycolipids as an acceptor. Members of this family belong to glycosyltransferase family 29 (GT29). — an NCBI CDD conserved domain (cd23967); members share this curated model.
