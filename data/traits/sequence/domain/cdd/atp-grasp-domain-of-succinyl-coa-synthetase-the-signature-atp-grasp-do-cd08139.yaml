identifier: CDD:cd08139
label: ATP-G_SCS
definition: >-
  ATP-grasp domain of succinyl-CoA synthetase. The signature ATP-grasp domain of ATP-grasp superfamily is found at the N-terminal end of the beta subunit of succinyl CoA synthetase (SCS). SCS catalyzes the formation of succinyl-CoA from succinate and coenzyme A in the presence of ATP via a phosphohistidine intermediate; this reaction is reversible. In animals, two different isoforms exists, ATP-specific (EC 6.2.1.5) and GTP-specific (EC 6.2.1.4). The two isoforms consists of same alpha subunit but different beta subunit. Escherichia coli SCS is heterotetramer that consists of two alpha-beta dimers. SCS is homologus to ATP citrate lyase and Acetyl CoA synthetase
