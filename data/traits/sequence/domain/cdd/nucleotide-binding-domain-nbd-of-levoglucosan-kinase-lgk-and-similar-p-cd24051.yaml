identifier: CDD:cd24051
label: "nucleotide-binding domain (NBD) of levoglucosan kinase (LGK) and similar proteins. LGK (EC 2.7.1.232) catalyzes the transfer of a phosphate group from ATP to levoglucosan (1,6-anhydro-beta-D-glucopyranose, LG) to yield glucose 6-phosphate in the presence of magnesium ion and ATP. In addition to the canonical kinase phosphotransfer reaction, the conversion requires cleavage of the 1,6-anhydro ring to allow ATP-dependent phosphorylation of the sugar O-6 atom."
definition: >-
  nucleotide-binding domain (NBD) of levoglucosan kinase (LGK) and similar proteins. LGK (EC 2.7.1.232) catalyzes the transfer of a phosphate group from ATP to levoglucosan (1,6-anhydro-beta-D-glucopyranose, LG) to yield glucose 6-phosphate in the presence of magnesium ion and ATP. In addition to the canonical kinase phosphotransfer reaction, the conversion requires cleavage of the 1,6-anhydro ring to allow ATP-dependent phosphorylation of the sugar O-6 atom. — an NCBI CDD conserved domain (cd24051); members share this curated model.
