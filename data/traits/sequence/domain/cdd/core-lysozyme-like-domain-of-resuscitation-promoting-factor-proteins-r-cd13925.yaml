identifier: CDD:cd13925
label: "core lysozyme-like domain of resuscitation-promoting factor proteins. Resuscitation-promoting factor (RPF) proteins, found in various (G+C)-rich Gram-positive bacteria, act to reactivate cultures from stationary phase. This protein shares elements of the structural core of lysozyme and related proteins. Furthermore, it shares a conserved active site glutamate which is required for activity, and has a polysaccharide binding cleft that corresponds to the peptidoglycan binding cleft of lysozyme. Muralytic activity of Rpf in Micrococcus luteus correlates with resuscitation, supporting a mechanism dependent on cleavage of peptidoglycan by RPF."
definition: >-
  core lysozyme-like domain of resuscitation-promoting factor proteins. Resuscitation-promoting factor (RPF) proteins, found in various (G+C)-rich Gram-positive bacteria, act to reactivate cultures from stationary phase. This protein shares elements of the structural core of lysozyme and related proteins. Furthermore, it shares a conserved active site glutamate which is required for activity, and has a polysaccharide binding cleft that corresponds to the peptidoglycan binding cleft of lysozyme. Muralytic activity of Rpf in Micrococcus luteus correlates with resuscitation, supporting a mechanism dependent on cleavage of peptidoglycan by RPF. — an NCBI CDD conserved domain (cd13925); members share this curated model.
