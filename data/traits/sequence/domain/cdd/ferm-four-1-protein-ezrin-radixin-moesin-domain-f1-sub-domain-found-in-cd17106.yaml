identifier: CDD:cd17106
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in erythrocyte membrane protein band 4.1-like proteins. The family includes erythrocyte membrane protein band 4.1-like proteins EPB41L1/4.1N, EPB41L2/4.1G, and EPB41L3/4.1B. They belong to the skeletal protein 4.1 family that is involved in cellular processes such as cell adhesion, migration and signaling. EPB41L1 is a cytoskeleton-associated protein that may serve as a tumor suppressor in solid tumors. EPB41L2 is involved in cellular processes such as cell adhesion, migration and signaling. EPB41L3 also acts as a tumor suppressor implicated in a variety of meningiomas and carcinomas. Members in this family contain a FERM domain, a spectrin and actin binding (SAB) domain, and a C-terminal domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in erythrocyte membrane protein band 4.1-like proteins. The family includes erythrocyte membrane protein band 4.1-like proteins EPB41L1/4.1N, EPB41L2/4.1G, and EPB41L3/4.1B. They belong to the skeletal protein 4.1 family that is involved in cellular processes such as cell adhesion, migration and signaling. EPB41L1 is a cytoskeleton-associated protein that may serve as a tumor suppressor in solid tumors. EPB41L2 is involved in cellular processes such as cell adhesion, migration and signaling. EPB41L3 also acts as a tumor suppressor implicated in a variety of meningiomas and carcinomas. Members in this family contain a FERM domain, a spectrin and actin binding (SAB) domain, and a C-terminal domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17106); members share this curated model.
