identifier: CDD:cd18527
label: BACK_BTBD11
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in BTB/POZ domain-containing protein 11 (BTBD11). BTBD11, also termed ankyrin repeat and BTB/POZ domain-containing protein BTBD11, is a BTB-domain-containing Kelch-like protein. Its function remains unclear. The BTBD11 gene has been identified as an all-trans retinoic acid-responsive gene that may play a role in neural development
