identifier: CDD:cd12069
label: "Src Homology 3 domain of Rho GTPase-activating protein 27. Rho GTPase-activating proteins (RhoGAPs or ARHGAPs) bind to Rho proteins and enhance the hydrolysis rates of bound GTP. ARHGAP27, also called CAMGAP1, shows GAP activity towards Rac1 and Cdc42. It binds the adaptor protein CIN85 and may play a role in clathrin-mediated endocytosis. It contains SH3, WW, Pleckstin homology (PH), and RhoGAP domains. SH3 domains bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs; they play a role in the regulation of enzymes by intramolecular interactions, changing the subcellular localization of signal pathway components and mediate multiprotein complex assemblies."
