identifier: CDD:cd06552
label: "ASC-1 homology domain, subfamily similar to Escherichia coli Yqfb. The ASCH domain, a small beta-barrel domain found in all three kingdoms of life, resembles the RNA-binding PUA domain and may also interact with RNA. ASCH has been proposed to function as an RNA-binding domain during coactivation, RNA-processing and the regulation of prokaryotic translation."
definition: >-
  ASC-1 homology domain, subfamily similar to Escherichia coli Yqfb. The ASCH domain, a small beta-barrel domain found in all three kingdoms of life, resembles the RNA-binding PUA domain and may also interact with RNA. ASCH has been proposed to function as an RNA-binding domain during coactivation, RNA-processing and the regulation of prokaryotic translation. — an NCBI CDD conserved domain (cd06552); members share this curated model.
