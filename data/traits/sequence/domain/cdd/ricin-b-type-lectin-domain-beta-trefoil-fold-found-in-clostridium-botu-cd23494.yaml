identifier: CDD:cd23494
label: "ricin B-type lectin domain, beta-trefoil fold, found in Clostridium botulinum hemagglutinating protein HA17 and similar proteins. The hemagglutinin (HA) component of the progenitor toxin protects the structural integrity of the neurotoxin. It may increase internalization of the neurotoxin into the bloodstream of the host. The hemagglutinin complex, composed of HA-70 (also known as HA3), HA-33 (also known as HA1) and HA-17 (also known as HA2), agglutinates erythrocytes, whereas the individual components do not. HA-33 is involved in recognition of cell-surface carbohydrates. HA-17 and HA-70 are involved in paracellular barrier disruption by E-cadherin binding. HA-17 contains a ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Clostridium botulinum hemagglutinating protein HA17 and similar proteins. The hemagglutinin (HA) component of the progenitor toxin protects the structural integrity of the neurotoxin. It may increase internalization of the neurotoxin into the bloodstream of the host. The hemagglutinin complex, composed of HA-70 (also known as HA3), HA-33 (also known as HA1) and HA-17 (also known as HA2), agglutinates erythrocytes, whereas the individual components do not. HA-33 is involved in recognition of cell-surface carbohydrates. HA-17 and HA-70 are involved in paracellular barrier disruption by E-cadherin binding. HA-17 contains a ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23494); members share this curated model.
