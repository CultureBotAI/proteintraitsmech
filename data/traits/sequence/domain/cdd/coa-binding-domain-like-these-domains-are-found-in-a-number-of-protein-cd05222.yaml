identifier: CDD:cd05222
label: "CoA binding domain_like.  These domains are found in a number of proteins including succinyl CoA synthetases, malate and ATP-citrate ligases. It has a Rossmann fold that binds the ADP component of CoA. Succinyl-CoA synthase (SCS) catalyzes the conversion of  succinyl-CoA +  Pi + NDP to succinate + CoA + NTP. The functional unit is a dimer with each subunit having an alpha, CoA-binding domain in a Rossmann fold and a beta subunit that confers nucleotide specificity."
definition: >-
  CoA binding domain_like. These domains are found in a number of proteins including succinyl CoA synthetases, malate and ATP-citrate ligases. It has a Rossmann fold that binds the ADP component of CoA. Succinyl-CoA synthase (SCS) catalyzes the conversion of succinyl-CoA + Pi + NDP to succinate + CoA + NTP. The functional unit is a dimer with each subunit having an alpha, CoA-binding domain in a Rossmann fold and a beta subunit that confers nucleotide specificity. — an NCBI CDD conserved domain (cd05222); members share this curated model.
