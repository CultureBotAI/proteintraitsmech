identifier: CDD:cd14761
label: "Globin sensor domain of Geobacter sulfurreducens globin-coupled-sensor and related proteins. GsGCS is a GCS of unknown function, comprised of an N-terminal globin sensor domain and a C- terminal transmembrane signal-transduction domain. For GCSs in general, the first signal O2 binds to/dissociates from the heme iron complex inducing a structural change in the globin domain, which is then transduced to the functional domain, switching on (or off) the function of the latter. Ferric GsGCS is bis-histidyl hexa-coordinated (provided by a His residue located at the E11 topological site, as distinct from the E7 site). Ferrous GsGCS is a penta- and hexa-coordinated mixture. The C-terminal domains of other members of this subfamily include histidine kinase, and PsiE domains."
definition: >-
  Globin sensor domain of Geobacter sulfurreducens globin-coupled-sensor and related proteins. GsGCS is a GCS of unknown function, comprised of an N-terminal globin sensor domain and a C- terminal transmembrane signal-transduction domain. For GCSs in general, the first signal O2 binds to/dissociates from the heme iron complex inducing a structural change in the globin domain, which is then transduced to the functional domain, switching on (or off) the function of the latter. Ferric GsGCS is bis-histidyl hexa-coordinated (provided by a His residue located at the E11 topological site, as distinct from the E7 site). Ferrous GsGCS is a penta- and hexa-coordinated mixture. The C-terminal domains of other members of this subfamily include histidine kinase, and PsiE domains. — an NCBI CDD conserved domain (cd14761); members share this curated model.
