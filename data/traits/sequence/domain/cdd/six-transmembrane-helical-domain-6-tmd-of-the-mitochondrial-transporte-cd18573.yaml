identifier: CDD:cd18573
label: "Six-transmembrane helical domain (6-TMD) of the mitochondrial transporter ABCB10 (subfamily B, member 10) and similar proteins. This group includes the 6-TM subunit of the ABC10 (also known as ABC mitochondrial erythroid, ABC-me, mABC2, or ABCBA), which is one of the three ATP-binding cassette (ABC) transporters found in the inner membrane of mitochondria, with the nucleotide-binding domains (NBDs) inside the mitochondrial matrix. In mammals, ABCB10 is essential for erythropoiesis and for protection of mitochondria against oxidative stress. ABC transporters typically consist of two transmembrane domains (TMDs) and two nucleotide-binding domains (NBDs). The sequences and structures of the TMDs are quite varied between the different type of transporters, suggesting significant structural diversity of the translocated substrates, while NBDs are conserved among all ABC transporters. The two NBDs together bind and hydrolyze ATP, thereby providing the driving force for transport, while the TMDs participate in substrate recognition and translocation across the lipid membrane."
definition: >-
  Six-transmembrane helical domain (6-TMD) of the mitochondrial transporter ABCB10 (subfamily B, member 10) and similar proteins. This group includes the 6-TM subunit of the ABC10 (also known as ABC mitochondrial erythroid, ABC-me, mABC2, or ABCBA), which is one of the three ATP-binding cassette (ABC) transporters found in the inner membrane of mitochondria, with the nucleotide-binding domains (NBDs) inside the mitochondrial matrix. In mammals, ABCB10 is essential for erythropoiesis and for protection of mitochondria against oxidative stress. ABC transporters typically consist of two transmembrane domains (TMDs) and two nucleotide-binding domains (NBDs). The sequences and structures of the TMDs are quite varied between the different type of transporters, suggesting significant structural diversity of the translocated substrates, while NBDs are conserved among all ABC transporters. The two NBDs together bind and hydrolyze ATP, thereby providing the driving force for transport, while the TMDs participate in substrate recognition and translocation across the lipid membrane. — an NCBI CDD conserved domain (cd18573); members share this curated model.
