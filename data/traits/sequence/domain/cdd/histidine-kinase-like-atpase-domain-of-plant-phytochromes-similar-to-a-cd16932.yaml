identifier: CDD:cd16932
label: "Histidine kinase-like ATPase domain of plant phytochromes similar to Arabidopsis thaliana Phytochrome A, B, C, D and E. This family includes the histidine kinase-like ATPase (HATPase) domains of plant red/far-red photoreceptors, the phytochromes, and includes the Arabidopsis thaliana phytochrome family phyA-phyE. Following red light absorption, biologically inactive forms of phytochromes convert to active forms, which rapidly convert back to inactive forms upon far-red light irradiation. Phytochromes can be considered as having an N-terminal photosensory region to which a bilin chromophore is bound, and a C-terminal output region, which includes the HATPase domain represented here, and is involved in dimerization and presumably contributes to relaying the light signal to downstream signaling events."
definition: >-
