identifier: CDD:cd20058
label: "Forkhead (FH) domain found in Forkhead box protein N2 (FOXN2). FOXN2, also called human T-cell leukemia virus enhancer factor (HTLF), is a potential tumor suppressor that can facilitate replication fork reversal. It acts as a transcription factor that binds to the purine-rich region in human T-cell leukemia virus long terminal repeat (HTLV-I LTR). It may be a potential therapeutic and radiosensitization target for lung cancer. FOXN2 has also been found to be down-regulated in breast cancer, where it regulates migration, invasion, and epithelial-mesenchymal transition. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein N2 (FOXN2). FOXN2, also called human T-cell leukemia virus enhancer factor (HTLF), is a potential tumor suppressor that can facilitate replication fork reversal. It acts as a transcription factor that binds to the purine-rich region in human T-cell leukemia virus long terminal repeat (HTLV-I LTR). It may be a potential therapeutic and radiosensitization target for lung cancer. FOXN2 has also been found to be down-regulated in breast cancer, where it regulates migration, invasion, and epithelial-mesenchymal transition. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20058); members share this curated model.
