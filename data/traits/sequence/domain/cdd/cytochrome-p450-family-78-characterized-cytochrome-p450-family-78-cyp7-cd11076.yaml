identifier: CDD:cd11076
label: "cytochrome P450 family 78. Characterized cytochrome P450 family 78 (CYP78 or Cyp78) proteins include: CYP78A5, which is expressed in leaf, flora and embryo, and has been reported to stimulate plant organ growth in Arabidopsis thaliana and to regulate plant architecture, ripening time, and fruit mass in tomato; Glycine max CYP78A10 that functions in regulating seed size/weight and pod number; and Physcomitrella patens CYP78A27 or CYP78A28, which together, are essential in bud formation. The CYP78 family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
