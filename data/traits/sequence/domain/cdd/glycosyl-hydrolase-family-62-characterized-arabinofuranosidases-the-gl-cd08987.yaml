identifier: CDD:cd08987
label: "Glycosyl hydrolase family 62, characterized arabinofuranosidases. The glycosyl hydrolase family 62 (GH62) includes eukaryotic (mostly fungal) and prokaryotic enzymes which are characterized arabinofuranosidases (alpha-L-arabinofuranosidases; EC 3.2.1.55) that specifically cleave either alpha-1,2 or alpha-1,3-L-arabinofuranose side chains from xylans. These enzymes show significantly different substrate preference with rather low specific activity towards natural substrates and differ in catalytic efficiency. They do not act on xylose moieties in xylan that are adorned with an arabinose side chain at both O2 and O3 positions, nor do they display any non-specific arabinofuranosidase activity. The synergistic action in biomass degradation makes GH62 promising candidates for biotechnological improvements of biofuel production and in various biorefinery applications. These enzymes also contain carbohydrate binding modules (CBMs) that bind cellulose or xylan."
definition: >-
  Glycosyl hydrolase family 62, characterized arabinofuranosidases. The glycosyl hydrolase family 62 (GH62) includes eukaryotic (mostly fungal) and prokaryotic enzymes which are characterized arabinofuranosidases (alpha-L-arabinofuranosidases; EC 3.2.1.55) that specifically cleave either alpha-1,2 or alpha-1,3-L-arabinofuranose side chains from xylans. These enzymes show significantly different substrate preference with rather low specific activity towards natural substrates and differ in catalytic efficiency. They do not act on xylose moieties in xylan that are adorned with an arabinose side chain at both O2 and O3 positions, nor do they display any non-specific arabinofuranosidase activity. The synergistic action in biomass degradation makes GH62 promising candidates for biotechnological improvements of biofuel production and in various biorefinery applications. These enzymes also contain carbohydrate binding modules (CBMs) that bind cellulose or xylan. — an NCBI CDD conserved domain (cd08987); members share this curated model.
