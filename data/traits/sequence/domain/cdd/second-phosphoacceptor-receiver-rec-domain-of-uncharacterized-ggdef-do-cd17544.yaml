identifier: CDD:cd17544
label: "second phosphoacceptor receiver (REC) domain of uncharacterized GGDEF domain proteins. This family is composed of uncharacterized PleD-like response regulators that contain two N-terminal REC domains and a C-terminal diguanylate cyclase output domain with the characteristic GGDEF motif at the active site. Unlike PleD which contains a REC-like adaptor domain, the second REC domain of these uncharacterized GGDEF domain proteins, described in this model, contains characteristic metal-binding and active site residues. PleD response regulators are global regulators of cell metabolism in some important human pathogens. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  second phosphoacceptor receiver (REC) domain of uncharacterized GGDEF domain proteins. This family is composed of uncharacterized PleD-like response regulators that contain two N-terminal REC domains and a C-terminal diguanylate cyclase output domain with the characteristic GGDEF motif at the active site. Unlike PleD which contains a REC-like adaptor domain, the second REC domain of these uncharacterized GGDEF domain proteins, described in this model, contains characteristic metal-binding and active site residues. PleD response regulators are global regulators of cell metabolism in some important human pathogens. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17544); members share this curated model.
