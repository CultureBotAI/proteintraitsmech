identifier: CDD:cd16641
label: "Modified RING finger, HC subclass (C3HC3D-type), found in tumor necrosis factor (TNF) receptor-associated factor 4 (TRAF4) and similar proteins. TRAF4, also known as cysteine-rich domain associated with RING and Traf domains protein 1, metastatic lymph node gene 62 protein (MLN 62), or RING finger protein 83 (RNF83), is a member of the TRAF protein family, which mainly function in the immune system, where they mediate signaling through tumor necrosis factor receptors (TNFRs) and interleukin-1/Toll-like receptors (IL-1/TLRs). It also plays a critical role in nervous system, as well as in carcinogenesis. TRAF4 promotes the growth and invasion of colon cancer through the Wnt/beta-catenin pathway. It contributes to the TNFalpha-induced activation of the 70 kDa ribosomal protein S6 kinase (p70s6k) signaling pathway, and activation of transforming growth factor beta (TGF-beta)-induced SMAD-dependent signaling and non-SMAD signaling in breast cancer. It also enhances osteosarcoma cell proliferation and invasion by the Akt signaling pathway. Moreover, TRAF4 is a novel phosphoinositide-binding protein modulating tight junctions and favoring cell migration. TRAF4 contains an N-terminal domain with a modified C3HC3D-type RING-HC finger and several zinc fingers, and a C-terminal TRAF domain that comprises a coiled coil domain and a conserved TRAF-C domain."
definition: >-
  Modified RING finger, HC subclass (C3HC3D-type), found in tumor necrosis factor (TNF) receptor-associated factor 4 (TRAF4) and similar proteins. TRAF4, also known as cysteine-rich domain associated with RING and Traf domains protein 1, metastatic lymph node gene 62 protein (MLN 62), or RING finger protein 83 (RNF83), is a member of the TRAF protein family, which mainly function in the immune system, where they mediate signaling through tumor necrosis factor receptors (TNFRs) and interleukin-1/Toll-like receptors (IL-1/TLRs). It also plays a critical role in nervous system, as well as in carcinogenesis. TRAF4 promotes the growth and invasion of colon cancer through the Wnt/beta-catenin pathway. It contributes to the TNFalpha-induced activation of the 70 kDa ribosomal protein S6 kinase (p70s6k) signaling pathway, and activation of transforming growth factor beta (TGF-beta)-induced SMAD-dependent signaling and non-SMAD signaling in breast cancer. It also enhances osteosarcoma cell proliferation and invasion by the Akt signaling pathway. Moreover, TRAF4 is a novel phosphoinositide-binding protein modulating tight junctions and favoring cell migration. TRAF4 contains an N-terminal domain with a modified C3HC3D-type RING-HC finger and several zinc fingers, and a C-terminal TRAF domain that comprises a coiled coil domain and a conserved TRAF-C domain. — an NCBI CDD conserved domain (cd16641); members share this curated model.
