identifier: CDD:cd17575
label: "phosphoacceptor receiver (REC) domain of WspR response regulator and similar proteins. The GGDEF response regulator WspR is part of the Wsp system that is homologous to chemotaxis systems and also includes the membrane-bound receptor protein WspA. In response to growth on surfaces, WspR is phosphorylated by the Wsp signal transduction complex and is activated, functioning as a diguanylate cyclase (DGC) that catalyzes c-di-GMP synthesis. WspR is a hybrid response regulator-diguanylate cyclase, containing an N-terminal REC domain and a C-terminal GGDEF domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of WspR response regulator and similar proteins. The GGDEF response regulator WspR is part of the Wsp system that is homologous to chemotaxis systems and also includes the membrane-bound receptor protein WspA. In response to growth on surfaces, WspR is phosphorylated by the Wsp signal transduction complex and is activated, functioning as a diguanylate cyclase (DGC) that catalyzes c-di-GMP synthesis. WspR is a hybrid response regulator-diguanylate cyclase, containing an N-terminal REC domain and a C-terminal GGDEF domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17575); members share this curated model.
