identifier: CDD:cd16472
label: "RING finger, H2 subclass, found in RING finger proteins RNF38, RNF44, and similar proteins. This subfamily includes RING finger proteins RNF38, RNF44, and similar proteins. RNF38 is a nuclear E3 ubiquitin protein ligase that plays a role in regulating p53. RNF44 is an uncharacterized RING finger protein that shows high sequence similarity to RNF38. Both RNF38 and RNF44 contain a coiled-coil motif, a KIL motif (Lys-X2-Ile/Leu-X2-Ile/Leu, X can be any amino acid), and a C3H2C3-type RING-H2 finger. In addition, RNF38 harbors two potential nuclear localization signals."
definition: >-
