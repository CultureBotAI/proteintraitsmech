label: "The MopB_PHLH CD includes a group of related uncharacterized putative hydrogenase-like homologs (PHLH) of molybdopterin binding (MopB) proteins. This CD is of the PHLH region homologous to the catalytic molybdopterin-binding subunit of MopB homologs."
definition: >-
