identifier: CDD:cd14231
label: "canonical GAT domain found in uncharacterized Golgi-localized gamma ear-containing Arf-binding protein (GGA)-like proteins mainly found in plants. The family includes a group of uncharacterized plant proteins containing an N-terminal VHS (Vps27p/Hrs/STAM)-domain and a GAT (GGA and TOM1) domain. Both domains are also present in Golgi-localized gamma ear-containing Arf-binding proteins (GGAs), which belong to a family of ubiquitously expressed, monomeric, motif-binding cargo/clathrin adaptor proteins that regulate clathrin-mediated trafficking of cargo proteins from the trans-Golgi network (TGN) to endosomes. In contrast to GGA proteins, members in this family do not have either a GAE (gamma-adaptin ear homology) domain or a clathrin-binding motif. The canonical GAT domain is a monomeric three-helix bundle that binds ubiquitin."
definition: >-
  canonical GAT domain found in uncharacterized Golgi-localized gamma ear-containing Arf-binding protein (GGA)-like proteins mainly found in plants. The family includes a group of uncharacterized plant proteins containing an N-terminal VHS (Vps27p/Hrs/STAM)-domain and a GAT (GGA and TOM1) domain. Both domains are also present in Golgi-localized gamma ear-containing Arf-binding proteins (GGAs), which belong to a family of ubiquitously expressed, monomeric, motif-binding cargo/clathrin adaptor proteins that regulate clathrin-mediated trafficking of cargo proteins from the trans-Golgi network (TGN) to endosomes. In contrast to GGA proteins, members in this family do not have either a GAE (gamma-adaptin ear homology) domain or a clathrin-binding motif. The canonical GAT domain is a monomeric three-helix bundle that binds ubiquitin. — an NCBI CDD conserved domain (cd14231); members share this curated model.
