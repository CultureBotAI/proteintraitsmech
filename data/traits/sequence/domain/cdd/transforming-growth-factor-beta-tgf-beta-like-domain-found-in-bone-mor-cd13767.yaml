identifier: CDD:cd13767
label: TGF_beta_BMP9_like
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in bone morphogenetic proteins, BMP-9, BMP-10 and similar proteins. The family includes BMP9 (also known as GDF2) and BMP10. BMP-9 is a potent circulating inhibitor of angiogenesis. It signals through the type I activin receptor ACVRL1 but not other activin receptor-like kinases (ALKs). BMP-10 is required for maintaining the proliferative activity of embryonic cardiomyocytes by preventing premature activation of the negative cell cycle regulator CDKN1C/p57KIP and maintaining the required expression levels of cardiogenic factors such as MEF2C and NKX2-5. It inhibits endothelial cell migration and growth. It may reduce cell migration and cell matrix adhesion in breast cancer cell lines
