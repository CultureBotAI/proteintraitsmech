identifier: CDD:cd05072
label: "Catalytic domain of the Protein Tyrosine Kinase, Lyn. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Lyn is a member of the Src subfamily of proteins, which are cytoplasmic (or non-receptor) PTKs. Lyn is expressed in B lymphocytes and myeloid cells. It exhibits both positive and negative regulatory roles in B cell receptor (BCR) signaling. Lyn, as well as Fyn and Blk, promotes B cell activation by phosphorylating ITAMs (immunoreceptor tyr activation motifs) in CD19 and in Ig components of BCR. It negatively regulates signaling by its unique ability to phosphorylate ITIMs (immunoreceptor tyr inhibition motifs) in cell surface receptors like CD22 and CD5. Lyn also plays an important role in G-CSF receptor signaling by phosphorylating a variety of adaptor molecules. Src kinases contain an N-terminal SH4 domain with a myristoylation site, followed by SH3 and SH2 domains, a tyr kinase domain, and a regulatory C-terminal region containing a conserved tyr. They are activated by autophosphorylation at the tyr kinase domain, but are negatively regulated by phosphorylation at the C-terminal tyr by Csk (C-terminal Src Kinase). The Lyn subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Protein Tyrosine Kinase, Lyn. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Lyn is a member of the Src subfamily of proteins, which are cytoplasmic (or non-receptor) PTKs. Lyn is expressed in B lymphocytes and myeloid cells. It exhibits both positive and negative regulatory roles in B cell receptor (BCR) signaling. Lyn, as well as Fyn and Blk, promotes B cell activation by phosphorylating ITAMs (immunoreceptor tyr activation motifs) in CD19 and in Ig components of BCR. It negatively regulates signaling by its unique ability to phosphorylate ITIMs (immunoreceptor tyr inhibition motifs) in cell surface receptors like CD22 and CD5. Lyn also plays an important role in G-CSF receptor signaling by phosphorylating a variety of adaptor molecules. Src kinases contain an N-terminal SH4 domain with a myristoylation site, followed by SH3 and SH2 domains, a tyr kinase domain, and a regulatory C-terminal region containing a conserved tyr. They are activated by autophosphorylation at the tyr kinase domain, but are negatively regulated by phosphorylation at the C-terminal tyr by Csk (C-terminal Src Kinase). The Lyn subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05072); members share this curated model.
