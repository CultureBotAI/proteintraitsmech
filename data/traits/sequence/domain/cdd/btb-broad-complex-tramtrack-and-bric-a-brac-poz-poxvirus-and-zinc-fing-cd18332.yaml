identifier: CDD:cd18332
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in B-cell CLL/lymphoma 6 member B protein (BCL6B). BCL6B is also called Bcl6-associated zinc finger protein, zinc finger protein 62, or zinc finger and BTB domain-containing protein 28 (ZBTB28). It is a sequence-specific transcriptional repressor in association with BCL-6. It may function in a narrow stage or be related to some events in the early B-cell development. BCL6B plays an important role as a potential tumor suppressor in gastric cancer; it is found preferentially methylated in gastric cancer. It also inhibits both colorectal cancer growth and hepatocellular carcinoma metastases. BCL6B contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in B-cell CLL/lymphoma 6 member B protein (BCL6B). BCL6B is also called Bcl6-associated zinc finger protein, zinc finger protein 62, or zinc finger and BTB domain-containing protein 28 (ZBTB28). It is a sequence-specific transcriptional repressor in association with BCL-6. It may function in a narrow stage or be related to some events in the early B-cell development. BCL6B plays an important role as a potential tumor suppressor in gastric cancer; it is found preferentially methylated in gastric cancer. It also inhibits both colorectal cancer growth and hepatocellular carcinoma metastases. BCL6B contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18332); members share this curated model.
