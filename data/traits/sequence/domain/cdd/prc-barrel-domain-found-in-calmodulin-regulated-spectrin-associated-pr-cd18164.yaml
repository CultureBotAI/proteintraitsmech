identifier: CDD:cd18164
label: PRC_CAMSAPs_like
definition: >-
  PRC-barrel domain found in calmodulin-regulated spectrin-associated proteins (CAMSAPs), patronin and similar proteins. The family includes mammalian calmodulin-regulated spectrin-associated proteins, CAMSAP1-3, Drosophila melanogaster patronin, and similar proteins. CAMSAP1 is a microtubule-binding protein that plays a role in the regulation of cell morphology and cytoskeletal organization. It may regulate neurite outgrowth through interaction with spectrin. CAMSAP2 (also known as CAMSAP1L1) and CAMSAP3 (also known as Nezha) are microtubule minus-end binding proteins that may regulate non-centrosomal microtubule dynamics and organization. They may also be involved in regulation of the organization of cellular organelles including the Golgi and the early endosomes through the microtubule cytoskeleton. CAMSAP3 is specifically required for the biogenesis and the maintenance of zonula adherens by anchoring the minus-end of microtubules to zonula adherens and by recruiting the kinesin KIFC3 to those junctional sites. Drosophila melanogaster patronin, also termed short spindle protein 4, is involved in mitotic spindle assembly, as well as the regulation of microtubule severing. It mediates a switch from kinesin-13-dependent poleward flux to anaphase B spindle elongation. CAMSAP proteins carry an N-terminal region that includes the CH domain, a central region including a predicted coiled-coil and C-terminal PRC-barrel domain
