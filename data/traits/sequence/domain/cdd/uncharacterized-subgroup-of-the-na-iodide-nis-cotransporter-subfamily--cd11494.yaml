identifier: CDD:cd11494
label: "uncharacterized subgroup of the Na(+)/iodide (NIS) cotransporter subfamily; putative solute-binding domain. Proteins belonging to the same subfamily as this uncharacterized subgroup include i) NIS, which transports I-, and other anions including ClO4-, SCN-, and Br-, ii) SMVT, which transports biotin, pantothenic acid and lipoate, and iii) the Na(+)/monocarboxylate cotransporters, SMCT1 and 2. SMCT1 is a high-affinity transporter while SMCT2 is a low-affinity transporter. This subgroup belongs to the solute carrier 5 (SLC5) transporter family."
definition: >-
  uncharacterized subgroup of the Na(+)/iodide (NIS) cotransporter subfamily; putative solute-binding domain. Proteins belonging to the same subfamily as this uncharacterized subgroup include i) NIS, which transports I-, and other anions including ClO4-, SCN-, and Br-, ii) SMVT, which transports biotin, pantothenic acid and lipoate, and iii) the Na(+)/monocarboxylate cotransporters, SMCT1 and 2. SMCT1 is a high-affinity transporter while SMCT2 is a low-affinity transporter. This subgroup belongs to the solute carrier 5 (SLC5) transporter family. — an NCBI CDD conserved domain (cd11494); members share this curated model.
