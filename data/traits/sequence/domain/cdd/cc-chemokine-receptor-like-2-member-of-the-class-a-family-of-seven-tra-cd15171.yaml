identifier: CDD:cd15171
label: "CC chemokine receptor-like 2, member of the class A family of seven-transmembrane G protein-coupled receptors. Chemokine (CC-motif) receptor-like 2 (CCRL2) is a member of the atypical chemokine receptor family. CCRL2, like other atypical receptors, has an alteration in the conserved DRYLAIV motif in the third intracellular loop, which is essential for GPCR coupling and signaling. CCR2L is expressed in most hematopoietic cells and many lymphoid organs as well as in heart and lung. CCRL2 was initially reported to promote chemotaxis and calcium fluxes in responses to chemokines (CCL2, CCL5, CCL7, and CCL8); however, these results are still controversial. More recently, chemerin, a chemotactic agonist of CMKLR1 (chemokine-like receptor-1) and GPR1, was identified as a novel non-signaling ligand for both human and mouse CCRL2. Chemokines are principal regulators for leukocyte trafficking, recruitment, and activation. Chemokine family membership is defined on the basis of sequence homology and on the presence of variations on a conserved cysteine motif, which allows the family to further divide into four subfamilies (CC, CXC, XC, and CX3C)."
definition: >-
  CC chemokine receptor-like 2, member of the class A family of seven-transmembrane G protein-coupled receptors. Chemokine (CC-motif) receptor-like 2 (CCRL2) is a member of the atypical chemokine receptor family. CCRL2, like other atypical receptors, has an alteration in the conserved DRYLAIV motif in the third intracellular loop, which is essential for GPCR coupling and signaling. CCR2L is expressed in most hematopoietic cells and many lymphoid organs as well as in heart and lung. CCRL2 was initially reported to promote chemotaxis and calcium fluxes in responses to chemokines (CCL2, CCL5, CCL7, and CCL8); however, these results are still controversial. More recently, chemerin, a chemotactic agonist of CMKLR1 (chemokine-like receptor-1) and GPR1, was identified as a novel non-signaling ligand for both human and mouse CCRL2. Chemokines are principal regulators for leukocyte trafficking, recruitment, and activation. Chemokine family membership is defined on the basis of sequence homology and on the presence of variations on a conserved cysteine motif, which allows the family to further divide into four subfamilies (CC, CXC, XC, and CX3C). — an NCBI CDD conserved domain (cd15171); members share this curated model.
