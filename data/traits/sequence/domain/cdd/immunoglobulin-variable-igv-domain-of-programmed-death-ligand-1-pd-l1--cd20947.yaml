identifier: CDD:cd20947
label: "Immunoglobulin Variable (IgV) domain of Programmed death ligand 1 (PD-L1). The members here are composed of the immunoglobulin variable (IgV) domain of Programmed death ligand 1 (PD-L1; also known as Cluster of Differentiation 274 (CD274)). PD-L1 is a cell-surface ligand that competes with PD-L2 for binding to the immunosuppressive receptor programmed death-1 (PD-1). PD-1 is a member of the B7 family that plays an important role in negatively regulating immune responses upon interaction with its two ligands, PD-L1 or PD-L2. Like PD-L2, PD-L1 interacts with PD-1 and suppresses T cell proliferation and cytokine production. The PD-1 receptor is expressed on the surface of activated T cells, while PD-L1 is expressed on cancer cells. When PD-1 and PD-L1 bind together, they form a molecular shield protecting tumor cells from being destroyed by the immune system. Thus, inhibiting the binding of PD-L1 to PD-1 with an antibody leads to killing of tumor cells by T cells. PD-1 inhibitors (such as Pembrolizumab, Nivolumab, and Cemiplimab) and  PD-L1 inhibitors (such as Atezolizumab, Avelumab, and Durvalumab ) are an emerging class of immunotherapy that stimulate lymphocytes against tumor cells."
definition: >-
  Immunoglobulin Variable (IgV) domain of Programmed death ligand 1 (PD-L1). The members here are composed of the immunoglobulin variable (IgV) domain of Programmed death ligand 1 (PD-L1; also known as Cluster of Differentiation 274 (CD274)). PD-L1 is a cell-surface ligand that competes with PD-L2 for binding to the immunosuppressive receptor programmed death-1 (PD-1). PD-1 is a member of the B7 family that plays an important role in negatively regulating immune responses upon interaction with its two ligands, PD-L1 or PD-L2. Like PD-L2, PD-L1 interacts with PD-1 and suppresses T cell proliferation and cytokine production. The PD-1 receptor is expressed on the surface of activated T cells, while PD-L1 is expressed on cancer cells. When PD-1 and PD-L1 bind together, they form a molecular shield protecting tumor cells from being destroyed by the immune system. Thus, inhibiting the binding of PD-L1 to PD-1 with an antibody leads to killing of tumor cells by T cells. PD-1 inhibitors (such as Pembrolizumab, Nivolumab, and Cemiplimab) and PD-L1 inhibitors (such as Atezolizumab, Avelumab, and Durvalumab ) are an emerging class of immunotherapy that stimulate lymphocytes against tumor cells. — an NCBI CDD conserved domain (cd20947); members share this curated model.
