identifier: CDD:cd22156
label: "F-box domain found in Arabidopsis thaliana actin-related protein 8 (AtARP8) and similar proteins. AtARP8, also called F-box protein ARP8, is an F-box protein localized to the nucleolus in Arabidopsis. Unlike other plant nuclear actin-related proteins (ARPs), ARP8 is unique in having an F-box domain and an actin homology domain. It may play a role in nucleolar functions. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Arabidopsis thaliana actin-related protein 8 (AtARP8) and similar proteins. AtARP8, also called F-box protein ARP8, is an F-box protein localized to the nucleolus in Arabidopsis. Unlike other plant nuclear actin-related proteins (ARPs), ARP8 is unique in having an F-box domain and an actin homology domain. It may play a role in nucleolar functions. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22156); members share this curated model.
