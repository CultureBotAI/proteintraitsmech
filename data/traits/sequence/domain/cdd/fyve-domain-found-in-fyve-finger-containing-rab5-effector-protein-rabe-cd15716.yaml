identifier: CDD:cd15716
label: "FYVE domain found in FYVE finger-containing Rab5 effector protein rabenosyn-5 (Rbsn-5) and similar proteins. Rbsn-5, also termed zinc finger FYVE domain-containing protein 20, is a novel Rab5 effector that is complexed to the Sec1-like protein VPS45 and recruited in a phosphatidylinositol-3-kinase-dependent fashion to early endosomes. It also binds to Rab4 and EHD1/RME-1, two regulators of the recycling route, and is involved in cargo recycling to the plasma membrane. Moreover, Rbsn-5 regulates endocytosis at the apical side of the wing epithelium and plays a role of the apical endocytic trafficking of Fmi in the establishment of planar cell polarity (PCP)."
definition: >-
  FYVE domain found in FYVE finger-containing Rab5 effector protein rabenosyn-5 (Rbsn-5) and similar proteins. Rbsn-5, also termed zinc finger FYVE domain-containing protein 20, is a novel Rab5 effector that is complexed to the Sec1-like protein VPS45 and recruited in a phosphatidylinositol-3-kinase-dependent fashion to early endosomes. It also binds to Rab4 and EHD1/RME-1, two regulators of the recycling route, and is involved in cargo recycling to the plasma membrane. Moreover, Rbsn-5 regulates endocytosis at the apical side of the wing epithelium and plays a role of the apical endocytic trafficking of Fmi in the establishment of planar cell polarity (PCP). — an NCBI CDD conserved domain (cd15716); members share this curated model.
