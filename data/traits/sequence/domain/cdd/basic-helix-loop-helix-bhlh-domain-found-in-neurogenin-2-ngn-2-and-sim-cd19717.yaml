identifier: CDD:cd19717
label: "basic helix-loop-helix (bHLH) domain found in neurogenin-2 (NGN-2) and similar proteins. NGN-2, also termed Class A basic helix-loop-helix protein 8 (bHLHa8), or protein atonal homolog 4 (ATOH4), is a neural-specific bHLH transcription factor required for sensory neurogenesis. It activates transcription by binding to the E box (5'-CANNTG-3')."
definition: >-
