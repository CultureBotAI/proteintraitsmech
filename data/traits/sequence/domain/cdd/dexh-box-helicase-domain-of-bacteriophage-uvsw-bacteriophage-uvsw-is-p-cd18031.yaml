identifier: CDD:cd18031
label: "DEXH-box helicase domain of bacteriophage UvsW. Bacteriophage UvsW is part of the WXY system that repairs DNA damage by a process that involves homologous recombination. UvsW is a member of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of bacteriophage UvsW. Bacteriophage UvsW is part of the WXY system that repairs DNA damage by a process that involves homologous recombination. UvsW is a member of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd18031); members share this curated model.
