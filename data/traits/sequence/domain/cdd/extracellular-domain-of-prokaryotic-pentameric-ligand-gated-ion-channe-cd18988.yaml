identifier: CDD:cd18988
label: "extracellular domain of prokaryotic pentameric ligand-gated ion channels (pLGIC). This family contains extracellular domain (ECD) of bacterial pentameric ligand-gated ion channels (pLGICs), including ones from Gloebacter violaceus (GLIC) and Erwinia chrysanthemi (ELIC).  These prokaryotic homologs of Cys-loop receptors have been useful in understanding their eukaryotic counterparts. The largely beta-sheet ECD in this family is similar to other pLGICs, but lacks the cysteine loop and an intracellular domain. While most pLGICs undergo desensitization on prolonged exposure to the agonist, GLIC is activated by protons, but does not desensitize, even at proton concentrations eliciting maximal electrophysiological response (pH 4.5). Studies show that GLIC activation is inhibited by most general anaesthetics at clinical concentrations, including xenon which has been used in clinical practice as a potent gaseous anesthetic for decades. Xenon binding sites have been identified in three distinct regions of the TMD: in a large intra-subunit cavity, in the pore, and at the interface between adjacent subunits."
definition: >-
  extracellular domain of prokaryotic pentameric ligand-gated ion channels (pLGIC). This family contains extracellular domain (ECD) of bacterial pentameric ligand-gated ion channels (pLGICs), including ones from Gloebacter violaceus (GLIC) and Erwinia chrysanthemi (ELIC). These prokaryotic homologs of Cys-loop receptors have been useful in understanding their eukaryotic counterparts. The largely beta-sheet ECD in this family is similar to other pLGICs, but lacks the cysteine loop and an intracellular domain. While most pLGICs undergo desensitization on prolonged exposure to the agonist, GLIC is activated by protons, but does not desensitize, even at proton concentrations eliciting maximal electrophysiological response (pH 4.5). Studies show that GLIC activation is inhibited by most general anaesthetics at clinical concentrations, including xenon which has been used in clinical practice as a potent gaseous anesthetic for decades. Xenon binding sites have been identified in three distinct regions of the TMD: in a large intra-subunit cavity, in the pore, and at the interface between adjacent subunits. — an NCBI CDD conserved domain (cd18988); members share this curated model.
