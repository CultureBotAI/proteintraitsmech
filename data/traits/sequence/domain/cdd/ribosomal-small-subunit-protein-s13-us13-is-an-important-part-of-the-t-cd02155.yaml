identifier: CDD:cd02155
label: "Ribosomal small subunit protein S13. uS13 is an important part of the translation process which is universally present in the small subunit of prokaryotic (S13) and eukaryotic (S18) ribosomes. The ribosome small subunit is one of the two subunits of ribosome organelles that use mRNA as a template for protein synthesis in a process called translation. The small subunits of bacteria and eukaryotes have the same shape of head, body, platform, beak, and shoulder. The ribosomal protein uS13 is located at the head region of the small subunit and interacts with the large ribosomal subunit and P site-bound tRNA through its extended C terminus. uS13 provides a direct link between the tRNA-binding site and the movements in the head of the small subunit seen during translocation, therefore plays a key role in the maintenance of a stable pretranslocational ribosome complex and multiple steps of the translation cycle. uS13 is involved in forming bridges between small and large ribosomal subunits which is highly conserved in all domains of life."
definition: >-
  Ribosomal small subunit protein S13. uS13 is an important part of the translation process which is universally present in the small subunit of prokaryotic (S13) and eukaryotic (S18) ribosomes. The ribosome small subunit is one of the two subunits of ribosome organelles that use mRNA as a template for protein synthesis in a process called translation. The small subunits of bacteria and eukaryotes have the same shape of head, body, platform, beak, and shoulder. The ribosomal protein uS13 is located at the head region of the small subunit and interacts with the large ribosomal subunit and P site-bound tRNA through its extended C terminus. uS13 provides a direct link between the tRNA-binding site and the movements in the head of the small subunit seen during translocation, therefore plays a key role in the maintenance of a stable pretranslocational ribosome complex and multiple steps of the translation cycle. uS13 is involved in forming bridges between small and large ribosomal subunits which is highly conserved in all domains of life. — an NCBI CDD conserved domain (cd02155); members share this curated model.
