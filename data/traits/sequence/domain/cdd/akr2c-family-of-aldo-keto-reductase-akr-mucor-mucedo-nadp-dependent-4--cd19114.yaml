identifier: CDD:cd19114
label: "AKR2C family of aldo-keto reductase (AKR). Mucor mucedo NADP-dependent 4-dihydromethyl-trisporate dehydrogenase (TDH), also called 4-dihydromethyltrisporate dehydrogenase, or 4-dihydromethyl-TA dehydrogenase, is a founding member of aldo-keto reductase family 2 member C1 (AKR2C1). It is involved in the biosynthesis of trisporic acid, the sexual hormone of zygomycetes, which induces the first steps of zygophore development. TDH catalyzes the NADP-dependent oxidation of (+) mating-type specific precursor 4-dihydromethyl-trisporate to methyl-trisporate."
definition: >-
  AKR2C family of aldo-keto reductase (AKR). Mucor mucedo NADP-dependent 4-dihydromethyl-trisporate dehydrogenase (TDH), also called 4-dihydromethyltrisporate dehydrogenase, or 4-dihydromethyl-TA dehydrogenase, is a founding member of aldo-keto reductase family 2 member C1 (AKR2C1). It is involved in the biosynthesis of trisporic acid, the sexual hormone of zygomycetes, which induces the first steps of zygophore development. TDH catalyzes the NADP-dependent oxidation of (+) mating-type specific precursor 4-dihydromethyl-trisporate to methyl-trisporate. — an NCBI CDD conserved domain (cd19114); members share this curated model.
