identifier: CDD:cd17992
label: "DEXH/Q-box helicase domain of RecG. ATP-dependent DNA helicase RecG plays a critical role in recombination and DNA repair. It is a member of the DEAD-like helicases superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH/Q-box helicase domain of RecG. ATP-dependent DNA helicase RecG plays a critical role in recombination and DNA repair. It is a member of the DEAD-like helicases superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17992); members share this curated model.
