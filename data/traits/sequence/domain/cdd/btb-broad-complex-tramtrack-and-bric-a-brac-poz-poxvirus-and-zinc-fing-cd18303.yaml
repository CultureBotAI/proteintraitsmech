identifier: CDD:cd18303
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in rabankyrin-5 (Rank-5). Rank-5, also called ankyrin repeat and FYVE domain-containing protein 1 (ANKFY1) or ankyrin repeats hooked to a zinc finger motif (ANKHZN), is a Rab5 effector that regulates and coordinates different endocytic mechanisms. It contains an N-terminal BTB domain, followed by a BACK domain, several ankyrin (ANK) repeats and a C-terminal FYVE domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in rabankyrin-5 (Rank-5). Rank-5, also called ankyrin repeat and FYVE domain-containing protein 1 (ANKFY1) or ankyrin repeats hooked to a zinc finger motif (ANKHZN), is a Rab5 effector that regulates and coordinates different endocytic mechanisms. It contains an N-terminal BTB domain, followed by a BACK domain, several ankyrin (ANK) repeats and a C-terminal FYVE domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18303); members share this curated model.
