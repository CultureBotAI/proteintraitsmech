identifier: CDD:cd23144
label: "RING finger, HC subclass, found in Arabidopsis thaliana protein XB3 homolog 1 (XBAT31) and similar proteins. XBAT31, also called ankyrin repeat domain and RING finger-containing protein XBAT31, or RING-type E3 ubiquitin transferase XB31, has no E3 ubiquitin-protein ligase activity observed when associated with the E2 enzyme UBC8 in vitro. XBAT31 contains a typical C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in Arabidopsis thaliana protein XB3 homolog 1 (XBAT31) and similar proteins. XBAT31, also called ankyrin repeat domain and RING finger-containing protein XBAT31, or RING-type E3 ubiquitin transferase XB31, has no E3 ubiquitin-protein ligase activity observed when associated with the E2 enzyme UBC8 in vitro. XBAT31 contains a typical C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd23144); members share this curated model.
