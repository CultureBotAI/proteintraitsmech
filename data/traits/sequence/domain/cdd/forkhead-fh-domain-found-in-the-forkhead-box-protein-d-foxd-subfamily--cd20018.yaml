identifier: CDD:cd20018
label: "Forkhead (FH) domain found in the Forkhead box protein D (FOXD) subfamily. The FOXD subfamily includes four winged helix transcription factors, FOXD1-4. FOXD1, also called Forkhead-related protein FKHL8 or Forkhead-related transcription factor 4 (FREAC-4), is involved in transcriptional activation of Placental Growth Factor (PGF) and the complement component (C3) genes. It plays an important role in early embryonic development and organogenesis, and functions as an oncogene in several cancers. FOXD2, also called Forkhead-related protein FKHL17 or Forkhead-related transcription factor 9 (FREAC-9), is a probable transcription factor involved in embryogenesis and somatogenesis. FOXD3, also called HNF3/FH transcription factor genesis, acts as a transcriptional repressor that binds to the consensus sequence 5'-A[AT]T[AG]TTTGTTT-3'. It also acts as a transcriptional activator. It promotes development of neural crest cells from neural tube progenitors and restricts neural progenitor cells to the neural crest lineage while suppressing interneuron differentiation. FOXD3 is required for maintenance of pluripotent cells in the pre-implantation and peri-implantation stages of embryogenesis. FOXD4, also called Forkhead-related protein FKHL9 or Forkhead-related transcription factor 5 (FREAC-5), is essential for establishing neural cell fate and for neuronal differentiation. The family also includes Forkhead box protein D4-like proteins, FOXD4L1-6. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in the Forkhead box protein D (FOXD) subfamily. The FOXD subfamily includes four winged helix transcription factors, FOXD1-4. FOXD1, also called Forkhead-related protein FKHL8 or Forkhead-related transcription factor 4 (FREAC-4), is involved in transcriptional activation of Placental Growth Factor (PGF) and the complement component (C3) genes. It plays an important role in early embryonic development and organogenesis, and functions as an oncogene in several cancers. FOXD2, also called Forkhead-related protein FKHL17 or Forkhead-related transcription factor 9 (FREAC-9), is a probable transcription factor involved in embryogenesis and somatogenesis. FOXD3, also called HNF3/FH transcription factor genesis, acts as a transcriptional repressor that binds to the consensus sequence 5'-A[AT]T[AG]TTTGTTT-3'. It also acts as a transcriptional activator. It promotes development of neural crest cells from neural tube progenitors and restricts neural progenitor cells to the neural crest lineage while suppressing interneuron differentiation. FOXD3 is required for maintenance of pluripotent cells in the pre-implantation and peri-implantation stages of embryogenesis. FOXD4, also called Forkhead-related protein FKHL9 or Forkhead-related transcription factor 5 (FREAC-5), is essential for establishing neural cell fate and for neuronal differentiation. The family also includes Forkhead box protein D4-like proteins, FOXD4L1-6. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20018); members share this curated model.
