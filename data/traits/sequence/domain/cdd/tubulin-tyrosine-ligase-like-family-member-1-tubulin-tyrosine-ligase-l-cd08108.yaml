identifier: CDD:cd08108
label: "Tubulin tyrosine ligase-like family, member 1. Tubulin tyrosine ligase-like family, member 1 (TTLL1) is a member of Tubulin-tyrosine ligase (TTL, EC 6.3.2.25) family. TTL catalyses the posttranslational addition of a tyrosine to the carboxy-terminal end of detyrosinated alpha-tubulin in the presense of ATP. TTL requires K and Mg ions for catalysis and uses detyrosinated alpha-tubulin as a substrate. It plays a key role in microtubules assembly. Based on the sequence and functional similarities with glutathione synthetase (GSHase), biotin carboxylase (BC), D-ala D-ala ligase (DD-ligase), and succinyl-CoA synthetase (SCS) families it is concluded that TTL belongs to ATP-grasp superfamily. Molecular mass study of neuronal tubulin polyglutamylase protein complex combined with the structural model of TTLL1 suggests that TTLL1 protein is the catalytic unit of neuronal tubulin polyglutamylase. Human tubulin tyrosine ligase-like 1 gene (TTLL1) maps to chromosome region 22q13.1 and encodes for a 423 amino acid protein."
definition: >-
  Tubulin tyrosine ligase-like family, member 1. Tubulin tyrosine ligase-like family, member 1 (TTLL1) is a member of Tubulin-tyrosine ligase (TTL, EC 6.3.2.25) family. TTL catalyses the posttranslational addition of a tyrosine to the carboxy-terminal end of detyrosinated alpha-tubulin in the presense of ATP. TTL requires K and Mg ions for catalysis and uses detyrosinated alpha-tubulin as a substrate. It plays a key role in microtubules assembly. Based on the sequence and functional similarities with glutathione synthetase (GSHase), biotin carboxylase (BC), D-ala D-ala ligase (DD-ligase), and succinyl-CoA synthetase (SCS) families it is concluded that TTL belongs to ATP-grasp superfamily. Molecular mass study of neuronal tubulin polyglutamylase protein complex combined with the structural model of TTLL1 suggests that TTLL1 protein is the catalytic unit of neuronal tubulin polyglutamylase. Human tubulin tyrosine ligase-like 1 gene (TTLL1) maps to chromosome region 22q13.1 and encodes for a 423 amino acid protein. — an NCBI CDD conserved domain (cd08108); members share this curated model.
