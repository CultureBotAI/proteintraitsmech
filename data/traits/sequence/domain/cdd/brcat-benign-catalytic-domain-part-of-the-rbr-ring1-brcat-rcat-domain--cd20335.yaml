identifier: CDD:cd20335
label: "BRcat (benign-catalytic) domain, part of the RBR (RING1-BRcat-Rcat) domain. The RBR family of RING-type E3 ligases are characterized by containing an RBR domain, which was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. It is composed of an extended RING domain (RING1) followed by an in-between RING (IBR) domain and the catalytic domain, which is structurally an IBR domain but is commonly designated as RING2. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently, where the IBR and RING2 domains have been renamed as BRcat and Rcat domains, respectively. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. The BRcat domain adopts the same fold as the Rcat domain while lacking the catalytic cysteine residue and ubiquitination activity. RBR family members play roles in protein quality control and can indirectly regulate transcription. Evidence suggests that RBR proteins are often parts of cullin-containing ubiquitin ligase complexes. The model corresponds to the BRcat domain."
definition: >-
  BRcat (benign-catalytic) domain, part of the RBR (RING1-BRcat-Rcat) domain. The RBR family of RING-type E3 ligases are characterized by containing an RBR domain, which was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. It is composed of an extended RING domain (RING1) followed by an in-between RING (IBR) domain and the catalytic domain, which is structurally an IBR domain but is commonly designated as RING2. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently, where the IBR and RING2 domains have been renamed as BRcat and Rcat domains, respectively. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. The BRcat domain adopts the same fold as the Rcat domain while lacking the catalytic cysteine residue and ubiquitination activity. RBR family members play roles in protein quality control and can indirectly regulate transcription. Evidence suggests that RBR proteins are often parts of cullin-containing ubiquitin ligase complexes. The model corresponds to the BRcat domain. — an NCBI CDD conserved domain (cd20335); members share this curated model.
