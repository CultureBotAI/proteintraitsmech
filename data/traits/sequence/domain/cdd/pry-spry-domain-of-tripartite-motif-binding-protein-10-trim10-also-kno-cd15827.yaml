identifier: CDD:cd15827
label: "PRY/SPRY domain of tripartite motif-binding protein 10 (TRIM10) also known as hematopoietic RING finger 1 (HERF1). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM10, also known as RING finger protein 9 (RNF9) or hematopoietic RING finger 1 (HERF1). TRIM10 domain is composed of RING/B-box/coiled-coil core and also known as RBCC protein. TRIM10/HERF1 is predominantly expressed during definitive erythropoiesis and in embryonic liver, and minimally expressed in adult liver, kidney, and colon. It is critical for erythroid cell differentiation and its down-regulation leads to cell death; inhibition of TRIM10 expression blocks terminal erythroid differentiation, while its over-expression in erythroid cells induces beta-major globin expression and erythroid differentiation."
