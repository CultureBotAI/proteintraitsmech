identifier: CDD:cd22157
label: "F-box domain found in Arabidopsis thaliana F-box/WD-40 repeat-containing protein 1 (AtFBW1) and similar proteins. AtFBW1, also called WD-40-associated F-box protein 1, is an F-box protein that contains four WD-40 repeats, which are separated from each other by a spacer region. Like other F-box proteins, AtFBW1 may be a component of SCF (Skp1 Cdc53 F-box protein) E3 ubiquitin ligase complexes, which may mediate the ubiquitination and subsequent proteasomal degradation of target proteins. This subfamily also contains many F-box only proteins that do not have any WD repeat. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
