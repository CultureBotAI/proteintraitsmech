identifier: CDD:cd08537
label: "Sterile alpha motif (SAM)/Pointed domain of ESE-1 like ETS transcriptional regulators. SAM Pointed domain of ESE-1-like (Epithelium-Specific ETS) subfamily of ETS transcriptional regulators is a putative protein-protein interaction domain. SAM Pointed domain of ESE-1 provides a potential docking site for signaling kinase Pak1 in humans. ESE-1 factors are involved in regulation of gene expression in different types of epithelial cells. ESE-1 is expressed in many different organs including intestine, stomach, pancreas, lungs, kidneys, and prostate. The DNA binding consensus motif for ESE-1 consists of a purine-rich GGA[AT] core sequence. The expression profile of these factors is altered in epithelial cancers if compared to normal tissues. Members of this subfamily are potential targets for cancer therapy."
