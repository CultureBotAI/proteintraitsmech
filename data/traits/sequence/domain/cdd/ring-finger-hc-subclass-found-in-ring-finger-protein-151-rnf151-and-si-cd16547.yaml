identifier: CDD:cd16547
label: "RING finger, HC subclass, found in RING finger protein 151 (RNF151) and similar proteins. RNF151 is a testis-specific RING finger protein that interacts with dysbindin, a synaptic and microtubular protein that binds brain snapin, a SNARE-binding protein that mediates intracellular membrane fusion in both neuronal and non-neuronal cells. Thus, it may be involved in acrosome formation of spermatids by interacting with multiple proteins participating in membrane biogenesis and microtubule organization. RNF151 contains a C3HC4-type RING finger domain, a putative nuclear localization signal (NLS), and a TNF receptor associated factor (TRAF)-type zinc finger domain."
definition: >-
  RING finger, HC subclass, found in RING finger protein 151 (RNF151) and similar proteins. RNF151 is a testis-specific RING finger protein that interacts with dysbindin, a synaptic and microtubular protein that binds brain snapin, a SNARE-binding protein that mediates intracellular membrane fusion in both neuronal and non-neuronal cells. Thus, it may be involved in acrosome formation of spermatids by interacting with multiple proteins participating in membrane biogenesis and microtubule organization. RNF151 contains a C3HC4-type RING finger domain, a putative nuclear localization signal (NLS), and a TNF receptor associated factor (TRAF)-type zinc finger domain. — an NCBI CDD conserved domain (cd16547); members share this curated model.
