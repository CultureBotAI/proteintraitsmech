identifier: CDD:cd23593
label: "extracellular domain (ECD) found in Drosophila melanogaster Target of wit (Twit) and similar proteins. Twit is a GPI-anchored membrane ligand of the Ly6 family that participates in retrograde signalling as a downstream target of the bone morphogenetic protein (BMP) pathway receptor encoded by Wishful thinking (Wit). It acts in neurons, regulating spontaneous neurotransmitter release during the maturation of larval neuromuscular junctions. Twit contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in Drosophila melanogaster Target of wit (Twit) and similar proteins. Twit is a GPI-anchored membrane ligand of the Ly6 family that participates in retrograde signalling as a downstream target of the bone morphogenetic protein (BMP) pathway receptor encoded by Wishful thinking (Wit). It acts in neurons, regulating spontaneous neurotransmitter release during the maturation of larval neuromuscular junctions. Twit contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23593); members share this curated model.
