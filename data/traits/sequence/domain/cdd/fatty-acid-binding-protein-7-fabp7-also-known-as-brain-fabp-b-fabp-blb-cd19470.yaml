identifier: CDD:cd19470
label: "Fatty acid binding protein 7. FABP7 (also known as brain FABP, B-FABP,  BLBP, brain lipid binding protein) is highly expressed in glial cells through development of the nervous system. In the developing brain, FABP7 is required for the establishment of the radial glial fiber system, which is involved in the migration of immature neurons. This subgroup belongs to the intracellular fatty-acid binding protein (FABP) family, members of which are small proteins that bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
definition: >-
