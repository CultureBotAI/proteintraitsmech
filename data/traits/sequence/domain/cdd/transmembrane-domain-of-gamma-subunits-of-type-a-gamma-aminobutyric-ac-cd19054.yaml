identifier: CDD:cd19054
label: "transmembrane domain of gamma subunits of type-A gamma-aminobutyric acid receptor (GABAAR). This family contains transmembrane (TM) domain of the gamma subunit of type-A beta-aminobutyric acid receptor (GABAAR), which includes gamma1-gamma3 in vertebrates. The transmembrane region consists of four transmembrane-spanning alpha-helical segments (M1-M4) that are linked by loops. The intracellular loop that links M1 and M2 determines the ion selectivity of the channel. GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. Studies show upregulating or preserving GABAA gamma1/3 and gamma2 receptors may protect neurons against neurofibrillary pathology in Alzheimer's disease. Pathogenic missense and truncating variants in GABRG2 have been associated with spectrum of epilepsies, from Dravet syndrome to milder simple febrile seizures. Polymorphisms in GABG3 show consistent evidence of alcohol dependence."
