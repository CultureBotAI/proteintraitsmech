identifier: CDD:cd20373
label: Med15_ABD2
definition: >-
  Mediator of RNA polymerase II transcription subunit 15 (Med15) activator-binding domain (ABD) 2. Yeast Med15 contains four structured domains at its N-terminal: a KIX domain and activator-binding domains (ABDs) 1; 2; and 3 that are recognized by Gcn4 activator protein. Yeast Gcn4 activates transcription by interacting its tandem activation domains (ADs) and Med15_ABDs on its target. Gcn4_ADs bind the Med15_ABDs in nonspecific multiple orientations that forms a dynamic fuzzy protein-protein interface. This binding strategy might be representative of many activators that target multiple coactivators
