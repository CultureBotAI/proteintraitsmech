identifier: CDD:cd14599
label: "catalytic domain of tyrosine-protein phosphatase non-receptor type 14. Tyrosine-protein phosphatase non-receptor type 14 (PTPN14), also called protein-tyrosine phosphatase pez, belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPN14 is a potential tumor suppressor and plays a regulatory role in the Hippo and Wnt/beta-catenin signaling pathways. It contains an N-terminal FERM domain and a C-terminal catalytic PTP domain, separated by a long intervening sequence."
definition: >-
  catalytic domain of tyrosine-protein phosphatase non-receptor type 14. Tyrosine-protein phosphatase non-receptor type 14 (PTPN14), also called protein-tyrosine phosphatase pez, belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPN14 is a potential tumor suppressor and plays a regulatory role in the Hippo and Wnt/beta-catenin signaling pathways. It contains an N-terminal FERM domain and a C-terminal catalytic PTP domain, separated by a long intervening sequence. — an NCBI CDD conserved domain (cd14599); members share this curated model.
