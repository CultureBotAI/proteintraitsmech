identifier: CDD:cd06117
label: "Subgroup of Escherichia coli (Ec) 2-methylcitrate synthase (2MCS)_like. 2MCS catalyzes the condensation of propionyl-coenzyme A (PrCoA) and oxalacetate (OAA) to form 2-methylcitrate and coenzyme A (CoA) during propionate metabolism. Citrate synthase (CS) catalyzes the condensation of acetyl coenzyme A (AcCoA) and OAA to form citrate and coenzyme A (CoA), the first step in the citric acid cycle (TCA or Krebs cycle). This group contains proteins similar to the E. coli 2MCS, EcPrpC.  EcPrpC is one of two CS isozymes in the gram-negative E. coli. EcPrpC is a dimeric (type I ) CS; it is induced during growth on propionate and prefers PrCoA as a substrate, but has a partial CS activity with AcCoA. This group also includes Salmonella typhimurium PrpC and Ralstonia eutropha (Re) 2-MCS1 which are also induced during growth on propionate, prefer PrCoA as substrate, but can also can use AcCoA. Re 2-MCS1 at a low rate can use butyryl-CoA and valeryl-CoA. A second Ralstonia eutropha 2MCS is also found in this group, Re 2-MCS2, which is induced on propionate. This group contains proteins which functions exclusively as either a CS or a 2MCS, as well as those with relaxed specificity which have dual functions as both a CS and a 2MCS."
definition: >-
  Subgroup of Escherichia coli (Ec) 2-methylcitrate synthase (2MCS)_like. 2MCS catalyzes the condensation of propionyl-coenzyme A (PrCoA) and oxalacetate (OAA) to form 2-methylcitrate and coenzyme A (CoA) during propionate metabolism. Citrate synthase (CS) catalyzes the condensation of acetyl coenzyme A (AcCoA) and OAA to form citrate and coenzyme A (CoA), the first step in the citric acid cycle (TCA or Krebs cycle). This group contains proteins similar to the E. coli 2MCS, EcPrpC. EcPrpC is one of two CS isozymes in the gram-negative E. coli. EcPrpC is a dimeric (type I ) CS; it is induced during growth on propionate and prefers PrCoA as a substrate, but has a partial CS activity with AcCoA. This group also includes Salmonella typhimurium PrpC and Ralstonia eutropha (Re) 2-MCS1 which are also induced during growth on propionate, prefer PrCoA as substrate, but can also can use AcCoA. Re 2-MCS1 at a low rate can use butyryl-CoA and valeryl-CoA. A second Ralstonia eutropha 2MCS is also found in this group, Re 2-MCS2, which is induced on propionate. This group contains proteins which functions exclusively as either a CS or a 2MCS, as well as those with relaxed specificity which have dual functions as both a CS and a 2MCS. — an NCBI CDD conserved domain (cd06117); members share this curated model.
