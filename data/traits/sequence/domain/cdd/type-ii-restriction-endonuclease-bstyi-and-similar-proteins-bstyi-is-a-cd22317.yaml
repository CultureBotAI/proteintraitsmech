identifier: CDD:cd22317
label: "type II restriction endonuclease BstYI and similar proteins. BstYI is a thermophilic PDDExK-family restriction endonuclease with specificities that overlap those of BamHI and BglII; it cleaves the degenerate hexanucleotide R-G-A-T-C-Y (R = A or G, Y = T or C) and is part of a larger superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  type II restriction endonuclease BstYI and similar proteins. BstYI is a thermophilic PDDExK-family restriction endonuclease with specificities that overlap those of BamHI and BglII; it cleaves the degenerate hexanucleotide R-G-A-T-C-Y (R = A or G, Y = T or C) and is part of a larger superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22317); members share this curated model.
