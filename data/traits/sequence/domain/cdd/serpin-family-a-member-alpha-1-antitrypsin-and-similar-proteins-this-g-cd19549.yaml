identifier: CDD:cd19549
label: "serpin family A member, alpha-1-antitrypsin and similar proteins. This group contains proteins similar to alpha-1-antitrypsin (also called A1AT, A1A, AAT, alpha1-proteinase inhibitor/A1PI, alpha1-antiproteinase/A1AP, and serum trypsin inhibitor), a protease inhibitor that belongs to the serpin superfamily. It is encoded in humans by the SERPINA1 gene. When the blood contains inadequate amounts of A1AT or functionally defective A1AT (such as in alpha-1 antitrypsin deficiency), neutrophil elastase is excessively free to break down elastin, degrading the elasticity of the lungs, which results in respiratory complications, such as chronic obstructive pulmonary disease. Normally, A1AT leaves its site of origin, the liver, and joins the systemic circulation; defective A1AT can fail to do so, building up in the liver, which results in cirrhosis. This group belongs to the clade A of the serpin superfamily, which includes the classical serine proteinase inhibitors, alpha-1-antitrypsin and alpha-1-antichymotrypsin, protein C inhibitor, kallistatin, and non-inhibitory serpins, like corticosteroid and thyroxin binding globulins. In general, SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
