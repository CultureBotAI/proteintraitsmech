identifier: CDD:cd19466
label: "fatty acid binding protein 3. FABP3 (also known as heart-type fatty acid binding protein, H-FABP, MDGI, O-FABP) is a cytosolic protein mainly expressed in cardiac and skeletal muscle cells. In these tissues, it plays an important role in fatty acid transportation, cell growth, cell signaling, and gene transcription. This subgroup belongs to the intracellular fatty-acid binding protein (FABP) family, members of which are small proteins that bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
definition: >-
