identifier: CDD:cd17170
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM and PDZ domain-containing protein 4 (FRMPD4). FRMPD4, also termed PDZ domain-containing protein 10, or PSD-95-interacting regulator of spine morphogenesis (Preso), is a multiscaffolding protein that modulates both Homer1 and postsynaptic density protein 95 activity. It can associate with the tetratricopeptide repeat (TPR) motif-containing adaptor protein LGN. Moreover, FRMPD4 is asymmetrically distributed in the cytosol and nuclei of neural stem/progenitor cells in the adult brain, suggesting a significant role in cell differentiation via association with cell polarity machinery. FRMPD4 contains a WW domain, a PDZ domain, and a FERM domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain of the FERM domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM and PDZ domain-containing protein 4 (FRMPD4). FRMPD4, also termed PDZ domain-containing protein 10, or PSD-95-interacting regulator of spine morphogenesis (Preso), is a multiscaffolding protein that modulates both Homer1 and postsynaptic density protein 95 activity. It can associate with the tetratricopeptide repeat (TPR) motif-containing adaptor protein LGN. Moreover, FRMPD4 is asymmetrically distributed in the cytosol and nuclei of neural stem/progenitor cells in the adult brain, suggesting a significant role in cell differentiation via association with cell polarity machinery. FRMPD4 contains a WW domain, a PDZ domain, and a FERM domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain of the FERM domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17170); members share this curated model.
