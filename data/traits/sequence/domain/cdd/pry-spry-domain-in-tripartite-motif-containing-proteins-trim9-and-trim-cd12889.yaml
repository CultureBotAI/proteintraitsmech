identifier: CDD:cd12889
label: "PRY/SPRY domain in tripartite motif-containing proteins, TRIM9 and TRIM67. This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM9 proteins. TRIM9 protein is expressed mainly in the cerebral cortex, and functions as an E3 ubiquitin ligase. It has been shown that TRIM9 is localized to the neurons in the normal human brain and its immunoreactivity in affected brain areas in Parkinson's disease and dementia with Lewy bodies is severely decreased, possibly playing an important role in the regulation of neuronal function and participating in pathological process of Lewy body disease through its ligase. TRIM67 negatively regulates Ras activity via degradation of 80K-H, leading to neural differentiation, including neuritogenesis."
definition: >-
