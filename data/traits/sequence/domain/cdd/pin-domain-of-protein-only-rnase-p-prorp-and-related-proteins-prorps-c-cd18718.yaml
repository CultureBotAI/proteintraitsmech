identifier: CDD:cd18718
label: "PIN domain of protein-only RNase P (PRORP) and related proteins. PRORPs catalyze the maturation of the 5' end of precursor tRNAs in eukaryotes. This family includes human PRORP, also known as proteinaceous RNase P and mitochondrial RNase P protein subunit 3 (MRPP3), and Arabidopsis thaliana PRORP1-3, PRORP1 localizes to the chloroplast and the mitochondria, and PRORP2 and PRORP3 localize to the nucleus. This subfamily belongs to the PRORP-Zc3h12a-like PIN family which in addition includes Zc3h12a (also known as MCPIP1/MCP induced protein 1 and Regnase-1), Caenorhabditis elegans REGE-1 (REGnasE-1), Zc3h12b-d (also known as Regnase-2-4), N4BP1, and NYNRIN (also known as CGIN1). The PIN (PilT N terminus) domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its active center, consisting of three highly conserved catalytic residues which coordinate metal ions; in some members, additional metal coordinating residues can be found while some others lack several of these key catalytic residues. The PIN active site is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons."
definition: >-
  PIN domain of protein-only RNase P (PRORP) and related proteins. PRORPs catalyze the maturation of the 5' end of precursor tRNAs in eukaryotes. This family includes human PRORP, also known as proteinaceous RNase P and mitochondrial RNase P protein subunit 3 (MRPP3), and Arabidopsis thaliana PRORP1-3, PRORP1 localizes to the chloroplast and the mitochondria, and PRORP2 and PRORP3 localize to the nucleus. This subfamily belongs to the PRORP-Zc3h12a-like PIN family which in addition includes Zc3h12a (also known as MCPIP1/MCP induced protein 1 and Regnase-1), Caenorhabditis elegans REGE-1 (REGnasE-1), Zc3h12b-d (also known as Regnase-2-4), N4BP1, and NYNRIN (also known as CGIN1). The PIN (PilT N terminus) domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its active center, consisting of three highly conserved catalytic residues which coordinate metal ions; in some members, additional metal coordinating residues can be found while some others lack several of these key catalytic residues. The PIN active site is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons. — an NCBI CDD conserved domain (cd18718); members share this curated model.
