identifier: CDD:cd18018
label: "DEAH-box helicase domain of RecQ4 and similar proteins. ATP-dependent DNA helicase Q4 (RecQ4) is part of the RecQ family of highly conserved DNA repair helicases that is part of the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. Mutations cause Rothmund-Thomson/RAPADILINO/Baller-Gerold syndrome."
definition: >-
  DEAH-box helicase domain of RecQ4 and similar proteins. ATP-dependent DNA helicase Q4 (RecQ4) is part of the RecQ family of highly conserved DNA repair helicases that is part of the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. Mutations cause Rothmund-Thomson/RAPADILINO/Baller-Gerold syndrome. — an NCBI CDD conserved domain (cd18018); members share this curated model.
