identifier: CDD:cd22243
label: akirin-1
definition: >-
  akirin-1. Akirins are small, highly conserved eumetazoan nuclear proteins that play a role in immune response and tumorigenesis. It is believed that they act as a connector between a variety of transcription factors and major chromatin remodeling complexes. Akirin-1 is one of the two orthologs in vertebrates that plays a role in immunity, myogenesis and meiosis
