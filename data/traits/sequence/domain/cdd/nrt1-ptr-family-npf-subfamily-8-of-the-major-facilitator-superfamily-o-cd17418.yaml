identifier: CDD:cd17418
label: "NRT1/PTR family (NPF), subfamily 8 of the Major Facilitator Superfamily of transporters. The plant Nitrate transporter/Peptide transporter (NRT1/PTR) family (NPF) is related to the POT (proton-coupled oligopeptide transporter), Peptide transporter (PepT/PTR), or Solute Carrier 15 (SLC15) family in animals. In contrast to related animal and bacterial counterparts, the plant proteins transport a wide variety of substrates including nitrate, peptides, amino acids, dicarboxylates, glucosinolates, as well as the plant hormones indole-3-acetic acid (IAA) and abscisic acid (ABA). A recent study identified eight subfamilies within this family, named NPF1-NPF8. NPF8 contains the Arabidopsis dipeptide transporters AtNPF8.1 (PTR1), AtNPF8.2 (PTR5), and AtNPF8.3 (PTR2), as well as tonoplast-localized transporters AtNPF8.4 (PTR4) and AtNPF8.5 (PTR6). Oryza sativa NRT1 (now called OsNPF8.9) is a low-affinity nitrate transporter. NPF8 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  NRT1/PTR family (NPF), subfamily 8 of the Major Facilitator Superfamily of transporters. The plant Nitrate transporter/Peptide transporter (NRT1/PTR) family (NPF) is related to the POT (proton-coupled oligopeptide transporter), Peptide transporter (PepT/PTR), or Solute Carrier 15 (SLC15) family in animals. In contrast to related animal and bacterial counterparts, the plant proteins transport a wide variety of substrates including nitrate, peptides, amino acids, dicarboxylates, glucosinolates, as well as the plant hormones indole-3-acetic acid (IAA) and abscisic acid (ABA). A recent study identified eight subfamilies within this family, named NPF1-NPF8. NPF8 contains the Arabidopsis dipeptide transporters AtNPF8.1 (PTR1), AtNPF8.2 (PTR5), and AtNPF8.3 (PTR2), as well as tonoplast-localized transporters AtNPF8.4 (PTR4) and AtNPF8.5 (PTR6). Oryza sativa NRT1 (now called OsNPF8.9) is a low-affinity nitrate transporter. NPF8 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17418); members share this curated model.
