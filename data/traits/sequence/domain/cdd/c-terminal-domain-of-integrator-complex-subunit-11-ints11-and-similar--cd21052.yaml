identifier: CDD:cd21052
label: IntS11_CTD
definition: >-
  C-terminal domain of Integrator complex subunit 11 (IntS11) and similar proteins. IntS11, also termed cleavage and polyadenylation-specific factor 3-like protein, or CPSF3-like protein, or protein related to CPSF subunits of 68 kDa, or RC-68, is a catalytic component of the Integrator (INT) complex, a complex involved in the small nuclear RNAs (snRNA) U1 and U2 transcription and in their 3'-box-dependent processing. It forms a stable complex with Integrator complex subunit 9 (IntS9) through their C-terminal domains (CTDs). IntS9-IntS11 interaction is crucial for the role of INT in snRNA 3'-end processing
