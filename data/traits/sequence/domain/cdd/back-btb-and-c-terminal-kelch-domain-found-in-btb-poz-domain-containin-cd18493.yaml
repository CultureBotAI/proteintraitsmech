label: "BACK (BTB and C-terminal Kelch) domain found in BTB/POZ domain-containing protein 17 (BTBD17). BTBD17, also termed galectin-3-binding protein-like, is a BTB-domain-containing Kelch-like protein. Its function remains unclear. It may be involved in hepatocellular carcinoma development and progression."
