identifier: CDD:cd21771
label: "nuclear export signal 2 (NES2) and nuclear import signal (NLS) domains found in carbohydrate-responsive element-binding protein (ChREBP), and similar proteins. ChREBP, also called class D basic helix-loop-helix protein 14 (bHLHd14), Max-like protein (MLX) interactor or MIO, MLX-interacting protein-like (MLXIPL), WS basic-helix-loop-helix leucine zipper protein (WS-bHLH), or Williams-Beuren syndrome chromosomal region 14 protein (WBSCR14), is a large transcription factor that functions at two levels, nuclear localization and DNA binding. It binds to the canonical and non-canonical E box sequences 5'-CACGTG-3'. It also binds DNA as a heterodimer with TCFL4/MLX. ChREBP contains functional domains, including two nuclear export signals, NES1 and NES2, and a nuclear import signal (NLS) in the N-terminal region. This model corresponds to NES2 and NLS domains."
definition: >-
  nuclear export signal 2 (NES2) and nuclear import signal (NLS) domains found in carbohydrate-responsive element-binding protein (ChREBP), and similar proteins. ChREBP, also called class D basic helix-loop-helix protein 14 (bHLHd14), Max-like protein (MLX) interactor or MIO, MLX-interacting protein-like (MLXIPL), WS basic-helix-loop-helix leucine zipper protein (WS-bHLH), or Williams-Beuren syndrome chromosomal region 14 protein (WBSCR14), is a large transcription factor that functions at two levels, nuclear localization and DNA binding. It binds to the canonical and non-canonical E box sequences 5'-CACGTG-3'. It also binds DNA as a heterodimer with TCFL4/MLX. ChREBP contains functional domains, including two nuclear export signals, NES1 and NES2, and a nuclear import signal (NLS) in the N-terminal region. This model corresponds to NES2 and NLS domains. — an NCBI CDD conserved domain (cd21771); members share this curated model.
