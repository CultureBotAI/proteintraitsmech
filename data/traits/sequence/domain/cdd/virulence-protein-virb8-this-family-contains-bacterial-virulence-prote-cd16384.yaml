identifier: CDD:cd16384
label: VirB8_like
definition: >-
  virulence protein VirB8. This family contains bacterial virulence protein VirB8 and similar proteins which consist of cytoplasmic, transmembrane, and periplasmic regions. VirB8 is an essential assembly factor of type IV secretion system (T4SS) channel proteins that are highly diverse in function relative to other bacterial secretion systems. T4SS proteins are important virulence factors for many Gram-negative pathogens, such as Agrobacterium, Brucella, Legionella, and Helicobacter. This family also includes the conjugal transfer protein family TrbF, a family of proteins known to be involved in conjugal transfer. The TrbF protein is thought to compose part of the pilus required for transfer. This domain has a similar fold to the nuclear transport factor-2 (NTF2) protein
