identifier: CDD:cd22962
label: "dimerization/docking (D/D) domain found in Arabidopsis thaliana cytosolic enolase 3 (ENO3) and similar proteins. Enolase (EC 4.2.1.11), also known as phosphopyruvate hydratase, is a metalloenzyme responsible for catalyzing the conversion of 2-phosphoglycerate (2-PG) to phosphoenolpyruvate (PEP), the ninth and penultimate step of glycolysis. The subfamily includes Arabidopsis thaliana ENO3, also called ENOC, 2-phospho-D-glycerate hydro-lyase 3, or 2-phosphoglycerate dehydratase 3. It contains an N-terminal domain which shows high sequence similarity to the dimerization/docking (D/D) domains of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1."
definition: >-
  dimerization/docking (D/D) domain found in Arabidopsis thaliana cytosolic enolase 3 (ENO3) and similar proteins. Enolase (EC 4.2.1.11), also known as phosphopyruvate hydratase, is a metalloenzyme responsible for catalyzing the conversion of 2-phosphoglycerate (2-PG) to phosphoenolpyruvate (PEP), the ninth and penultimate step of glycolysis. The subfamily includes Arabidopsis thaliana ENO3, also called ENOC, 2-phospho-D-glycerate hydro-lyase 3, or 2-phosphoglycerate dehydratase 3. It contains an N-terminal domain which shows high sequence similarity to the dimerization/docking (D/D) domains of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1. — an NCBI CDD conserved domain (cd22962); members share this curated model.
