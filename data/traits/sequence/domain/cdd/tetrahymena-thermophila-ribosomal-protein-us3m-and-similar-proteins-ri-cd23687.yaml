identifier: CDD:cd23687
label: "Tetrahymena thermophila ribosomal protein uS3m and similar proteins. Ribosomal protein uS3m, also called Ymf64, is a component of small subunit (SSU) in Tetrahymena thermophila mitochondrial ribosome (mitoribosome), which reveals an assembly of 94-ribosomal proteins and four-rRNAs with an additional protein mass of ~700 kDa on the small subunit (SSU); the large subunit lacks 5S rRNA. uS3m assembles together with mS31and mS92 to produce a full S3 protein."
definition: >-
  Tetrahymena thermophila ribosomal protein uS3m and similar proteins. Ribosomal protein uS3m, also called Ymf64, is a component of small subunit (SSU) in Tetrahymena thermophila mitochondrial ribosome (mitoribosome), which reveals an assembly of 94-ribosomal proteins and four-rRNAs with an additional protein mass of ~700 kDa on the small subunit (SSU); the large subunit lacks 5S rRNA. uS3m assembles together with mS31and mS92 to produce a full S3 protein. — an NCBI CDD conserved domain (cd23687); members share this curated model.
