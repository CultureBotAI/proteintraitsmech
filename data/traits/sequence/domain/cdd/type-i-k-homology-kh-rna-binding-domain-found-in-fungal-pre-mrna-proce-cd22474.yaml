identifier: CDD:cd22474
label: "type I K homology (KH) RNA-binding domain found in fungal pre-mRNA-processing ATP-dependent RNA helicase PRP5 and similar proteins. PRP5 is an ATP-dependent RNA helicase involved spliceosome assembly and in nuclear splicing. It catalyzes an ATP-dependent conformational change of U2 snRNP. PRP5 interacts with the U2 snRNP and HSH155. Members in this subfamily contain a divergent KH domain that lacks the RNA-binding GXXG motif."
definition: >-
  type I K homology (KH) RNA-binding domain found in fungal pre-mRNA-processing ATP-dependent RNA helicase PRP5 and similar proteins. PRP5 is an ATP-dependent RNA helicase involved spliceosome assembly and in nuclear splicing. It catalyzes an ATP-dependent conformational change of U2 snRNP. PRP5 interacts with the U2 snRNP and HSH155. Members in this subfamily contain a divergent KH domain that lacks the RNA-binding GXXG motif. — an NCBI CDD conserved domain (cd22474); members share this curated model.
