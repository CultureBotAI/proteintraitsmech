identifier: CDD:cd12948
label: "NOPS domain, including C-terminal coiled-coil region, in polypyrimidine tract-binding protein (PTB)-associated-splicing factor (PSF) and similar proteins. This model contains the NOPS (NONA and PSP1) domain PSF (also termed proline- and glutamine-rich splicing factor, or 100 kDa DNA-pairing protein (POMp100), or 100 kDa subunit of DNA-binding p52/p100 complex), with a long helical C-terminal extension. PSF is a multifunctional protein that mediates diverse activities in the cell. It is ubiquitously expressed and highly conserved in vertebrates. PSF binds not only RNA but also single-stranded DNA (ssDNA) as well as double-stranded DNA (dsDNA) and facilitates the renaturation of complementary ssDNAs. Additionally, it promotes the formation of D-loops in superhelical duplex DNA, and is involved in cell proliferation. PSF can also interact with multiple factors. It is an RNA-binding component of spliceosomes and binds to insulin-like growth factor response element (IGFRE). Moreover, PSF functions as a transcriptional repressor interacting with Sin3A and mediating silencing through the recruitment of histone deacetylases (HDACs) to the DNA binding domain (DBD) of nuclear hormone receptors. As an RNA-binding component of spliceosomes, PSF binds to the insulin-like growth factor response element (IGFRE), and acts as an independent negative regulator of the transcriptional activity of the porcine P-450 cholesterol side-chain cleavage enzyme gene (P450scc) IGFRE. PSF is an essential pre-mRNA splicing factor and is dissociated from PTB and binds to U1-70K and serine-arginine (SR) proteins during apoptosis. In addition, PSF forms a heterodimer with the nuclear protein p54nrb, also known as non-POU domain-containing octamer-binding protein (NONO). The PSF/p54nrb complex displays a variety of functions, such as DNA recombination and RNA synthesis, processing, and transport. PSF contains two conserved RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), which are responsible for interactions with RNA and for the localization of the protein in speckles. It also contains an N-terminal region rich in proline, glycine, and glutamine residues, which may play a role in interactions recruiting other molecules. The NOPS domain specifically binds to the second RNA recognition motif (RRM2) domain of the partner DBHS protein via a substantial interaction surface. Its highly conserved C-terminal residues are critical for functional DBHS dimerization while the highly conserved C-terminal helical extension, forming a right-handed antiparallel heterodimeric coiled-coil, is essential for localization of these proteins to subnuclear bodies."
definition: >-
  NOPS domain, including C-terminal coiled-coil region, in polypyrimidine tract-binding protein (PTB)-associated-splicing factor (PSF) and similar proteins. This model contains the NOPS (NONA and PSP1) domain PSF (also termed proline- and glutamine-rich splicing factor, or 100 kDa DNA-pairing protein (POMp100), or 100 kDa subunit of DNA-binding p52/p100 complex), with a long helical C-terminal extension. PSF is a multifunctional protein that mediates diverse activities in the cell. It is ubiquitously expressed and highly conserved in vertebrates. PSF binds not only RNA but also single-stranded DNA (ssDNA) as well as double-stranded DNA (dsDNA) and facilitates the renaturation of complementary ssDNAs. Additionally, it promotes the formation of D-loops in superhelical duplex DNA, and is involved in cell proliferation. PSF can also interact with multiple factors. It is an RNA-binding component of spliceosomes and binds to insulin-like growth factor response element (IGFRE). Moreover, PSF functions as a transcriptional repressor interacting with Sin3A and mediating silencing through the recruitment of histone deacetylases (HDACs) to the DNA binding domain (DBD) of nuclear hormone receptors. As an RNA-binding component of spliceosomes, PSF binds to the insulin-like growth factor response element (IGFRE), and acts as an independent negative regulator of the transcriptional activity of the porcine P-450 cholesterol side-chain cleavage enzyme gene (P450scc) IGFRE. PSF is an essential pre-mRNA splicing factor and is dissociated from PTB and binds to U1-70K and serine-arginine (SR) proteins during apoptosis. In addition, PSF forms a heterodimer with the nuclear protein p54nrb, also known as non-POU domain-containing octamer-binding protein (NONO). The PSF/p54nrb complex displays a variety of functions, such as DNA recombination and RNA synthesis, processing, and transport. PSF contains two conserved RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), which are responsible for interactions with RNA and for the localization of the protein in speckles. It also contains an N-terminal region rich in proline, glycine, and glutamine residues, which may play a role in interactions recruiting other molecules. The NOPS domain specifically binds to the second RNA recognition motif (RRM2) domain of the partner DBHS protein via a substantial interaction surface. Its highly conserved C-terminal residues are critical for functional DBHS dimerization while the highly conserved C-terminal helical extension, forming a right-handed antiparallel heterodimeric coiled-coil, is essential for localization of these proteins to subnuclear bodies. — an NCBI CDD conserved domain (cd12948); members share this curated model.
