identifier: CDD:cd15613
label: "PHD finger found in plant Alfin1-like (AL) proteins. AL proteins are ubiquitously expressed nuclear proteins existing only in plants. They are involved in chromatin regulation by binding to tri- and dimethylated histone H3 at lysine 4 (H3K4me3/2), the active histone markers, through their plant homeodomain (PHD) fingers."
definition: >-
