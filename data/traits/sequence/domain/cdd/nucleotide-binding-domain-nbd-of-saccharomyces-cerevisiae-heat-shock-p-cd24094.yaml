identifier: CDD:cd24094
label: "nucleotide-binding domain (NBD) of Saccharomyces cerevisiae heat shock protein homolog Sse and similar proteins. The subgroup includes two Saccharomyces cerevisiae heat shock protein homologs, Sse1 and Sse2. They may have calcium-dependent calmodulin-binding activities. Both Sse1 and Sse2 belong to the 105/110 kDa heat shock protein (HSP105/110) subfamily of the HSP70-like family, and includes proteins believed to function generally as co-chaperones of HSP70 chaperones, acting as nucleotide exchange factors (NEFs), to remove ADP from their HSP70 chaperone partners during the ATP hydrolysis cycle. HSP70 chaperones assist in protein folding and assembly, and can direct incompetent \"client\" proteins towards degradation. Like HSP70 chaperones, HSP105/110s have an N-terminal nucleotide-binding domain (NBD) and a C-terminal substrate-binding domain (SBD). For HSP70 chaperones, the nucleotide sits in a deep cleft formed between the two lobes of the NBD. The two subdomains of each lobe change conformation between ATP-bound, ADP-bound, and nucleotide-free states. ATP binding opens up the substrate-binding site; substrate-binding increases the rate of ATP hydrolysis. Hsp70 chaperone activity is also regulated by J-domain proteins."
definition: >-
  nucleotide-binding domain (NBD) of Saccharomyces cerevisiae heat shock protein homolog Sse and similar proteins. The subgroup includes two Saccharomyces cerevisiae heat shock protein homologs, Sse1 and Sse2. They may have calcium-dependent calmodulin-binding activities. Both Sse1 and Sse2 belong to the 105/110 kDa heat shock protein (HSP105/110) subfamily of the HSP70-like family, and includes proteins believed to function generally as co-chaperones of HSP70 chaperones, acting as nucleotide exchange factors (NEFs), to remove ADP from their HSP70 chaperone partners during the ATP hydrolysis cycle. HSP70 chaperones assist in protein folding and assembly, and can direct incompetent "client" proteins towards degradation. Like HSP70 chaperones, HSP105/110s have an N-terminal nucleotide-binding domain (NBD) and a C-terminal substrate-binding domain (SBD). For HSP70 chaperones, the nucleotide sits in a deep cleft formed between the two lobes of the NBD. The two subdomains of each lobe change conformation between ATP-bound, ADP-bound, and nucleotide-free states. ATP binding opens up the substrate-binding site; substrate-binding increases the rate of ATP hydrolysis. Hsp70 chaperone activity is also regulated by J-domain proteins. — an NCBI CDD conserved domain (cd24094); members share this curated model.
