identifier: CDD:cd23166
label: "ASDURF. ASDURF is a beta-type subunit of the prefoldin-like complex (PFDL) that is part of the PAQosome (Particle for Arrangement of Quaternary structure) complex. The PAQosome is a cochaperone that assists the chaperone HSP90 in assembly of large protein complexes, like RNA polymerase I. Prefoldin is a hexameric molecular chaperone complex, found in both eukaryotes and archaea, that binds and stabilizes newly synthesized polypeptides allowing them to fold correctly. The complex contains two alpha and four beta subunits, the two subunits being evolutionarily related."
definition: >-
  ASDURF. ASDURF is a beta-type subunit of the prefoldin-like complex (PFDL) that is part of the PAQosome (Particle for Arrangement of Quaternary structure) complex. The PAQosome is a cochaperone that assists the chaperone HSP90 in assembly of large protein complexes, like RNA polymerase I. Prefoldin is a hexameric molecular chaperone complex, found in both eukaryotes and archaea, that binds and stabilizes newly synthesized polypeptides allowing them to fold correctly. The complex contains two alpha and four beta subunits, the two subunits being evolutionarily related. — an NCBI CDD conserved domain (cd23166); members share this curated model.
