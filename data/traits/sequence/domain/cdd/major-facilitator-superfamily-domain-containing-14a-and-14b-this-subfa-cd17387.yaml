identifier: CDD:cd17387
label: "Major facilitator superfamily domain-containing 14A and 14B. This subfamily is composed of major facilitator superfamily domain-containing 14A (MFSD14A) and MFSD14B, and similar proteins. MFSD14A and MFSD14B are also called hippocampus abundant transcript 1 protein (HIAT1) and hippocampus abundant transcript-like protein 1 (HIATL1), respectively. They are both ubiquitously expressed with HIAT1 highly expressed intestis and HIATL1 most abundantly expressed in skeletal muscle. Gene disruption of MFSD14A causes globozoospermia and infertility in male mice. It has bee suggested that MFSD14A may transport a solute from the bloodstream that is required for spermiogenesis. The function of MFSD14B is unknown. The MFSD14 subfamily belongs to the Eukaryotic Solute carrier 46 (SLC46)/Bacterial Tetracycline resistance (TetA) -like (SLC46/TetA-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Major facilitator superfamily domain-containing 14A and 14B. This subfamily is composed of major facilitator superfamily domain-containing 14A (MFSD14A) and MFSD14B, and similar proteins. MFSD14A and MFSD14B are also called hippocampus abundant transcript 1 protein (HIAT1) and hippocampus abundant transcript-like protein 1 (HIATL1), respectively. They are both ubiquitously expressed with HIAT1 highly expressed intestis and HIATL1 most abundantly expressed in skeletal muscle. Gene disruption of MFSD14A causes globozoospermia and infertility in male mice. It has bee suggested that MFSD14A may transport a solute from the bloodstream that is required for spermiogenesis. The function of MFSD14B is unknown. The MFSD14 subfamily belongs to the Eukaryotic Solute carrier 46 (SLC46)/Bacterial Tetracycline resistance (TetA) -like (SLC46/TetA-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17387); members share this curated model.
