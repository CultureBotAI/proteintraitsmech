identifier: CDD:cd16203
label: "EF-hand motif found in phosphoinositide phospholipase C epsilon 1 (PI-PLC-epsilon1). PI-PLC-epsilon1, also termed 1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase epsilon-1, or pancreas-enriched phospholipase C, or phospholipase C-epsilon-1 (PLC-epsilon-1), is dominant in connective tissues and brain. It has been implicated in carcinogenesis, such as in bladder and intestinal tumor, oesophageal squamous cell carcinoma, gastric adenocarcinoma, murine skin cancer, head and neck cancer. PI-PLC-epsilon1 contains an N-terminal CDC25 homology domain with a guanyl-nucleotide exchange factor (GFF) activity, a pleckstrin homology (PH) domain, four atypical EF-hand motifs, a PLC catalytic core domain, a C2 domain, and at least one and perhaps two C-terminal predicted RA (Ras association) domains that are implicated in the binding of small GTPases, such as Ras or Rap, from the Ras family. The PLC catalytic core domain is a TIM barrel with two highly conserved regions (X and Y) split by a highly degenerate linker sequence. There is only one PI-PLC-epsilon isozyme. It is directly activated by G alpha(12/13), G beta gamma, and activated members of  Ras and Rho small GTPases."
definition: >-
  EF-hand motif found in phosphoinositide phospholipase C epsilon 1 (PI-PLC-epsilon1). PI-PLC-epsilon1, also termed 1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase epsilon-1, or pancreas-enriched phospholipase C, or phospholipase C-epsilon-1 (PLC-epsilon-1), is dominant in connective tissues and brain. It has been implicated in carcinogenesis, such as in bladder and intestinal tumor, oesophageal squamous cell carcinoma, gastric adenocarcinoma, murine skin cancer, head and neck cancer. PI-PLC-epsilon1 contains an N-terminal CDC25 homology domain with a guanyl-nucleotide exchange factor (GFF) activity, a pleckstrin homology (PH) domain, four atypical EF-hand motifs, a PLC catalytic core domain, a C2 domain, and at least one and perhaps two C-terminal predicted RA (Ras association) domains that are implicated in the binding of small GTPases, such as Ras or Rap, from the Ras family. The PLC catalytic core domain is a TIM barrel with two highly conserved regions (X and Y) split by a highly degenerate linker sequence. There is only one PI-PLC-epsilon isozyme. It is directly activated by G alpha(12/13), G beta gamma, and activated members of Ras and Rho small GTPases. — an NCBI CDD conserved domain (cd16203); members share this curated model.
