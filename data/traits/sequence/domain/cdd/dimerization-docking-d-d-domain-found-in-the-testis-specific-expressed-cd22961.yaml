identifier: CDD:cd22961
label: "dimerization/docking (D/D) domain found in the testis-specific expressed protein 55 (TEX55)-like family. The TEX55-like family includes TEX55, F-box/LRR-repeat protein 13 (FBXL13), adenylate kinase isoenzymes AK5 and AK8, as well as uncharacterized EF-hand calcium-binding domain-containing protein 10 (EFCAB10), and protein VEST-1. TEX55, also called testis-specific conserved cAMP-dependent type II PK-anchoring protein (TSCPA), is a putative A-kinase anchoring protein (AKAP) that is dispensable for male fertility. FBXL13, also called F-box and leucine-rich repeat protein 13, or dynein regulatory complex subunit 6 (DRC6), is a component of the nexin-dynein regulatory complex (N-DRC), a key regulator of ciliary/flagellar motility which maintains the alignment and integrity of the distal axoneme and regulates microtubule sliding in motile axonemes. It may also function as a substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. AK5 and AK8 act as nucleoside monophosphate (NMP) kinases that catalyze the reversible transfer of the terminal phosphate group between nucleoside triphosphates and monophosphates. Members of this family contain a conserved helical bundle domain that shows high sequence similarity to the dimerization/docking (D/D) domains of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1."
definition: >-
  dimerization/docking (D/D) domain found in the testis-specific expressed protein 55 (TEX55)-like family. The TEX55-like family includes TEX55, F-box/LRR-repeat protein 13 (FBXL13), adenylate kinase isoenzymes AK5 and AK8, as well as uncharacterized EF-hand calcium-binding domain-containing protein 10 (EFCAB10), and protein VEST-1. TEX55, also called testis-specific conserved cAMP-dependent type II PK-anchoring protein (TSCPA), is a putative A-kinase anchoring protein (AKAP) that is dispensable for male fertility. FBXL13, also called F-box and leucine-rich repeat protein 13, or dynein regulatory complex subunit 6 (DRC6), is a component of the nexin-dynein regulatory complex (N-DRC), a key regulator of ciliary/flagellar motility which maintains the alignment and integrity of the distal axoneme and regulates microtubule sliding in motile axonemes. It may also function as a substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. AK5 and AK8 act as nucleoside monophosphate (NMP) kinases that catalyze the reversible transfer of the terminal phosphate group between nucleoside triphosphates and monophosphates. Members of this family contain a conserved helical bundle domain that shows high sequence similarity to the dimerization/docking (D/D) domains of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1. — an NCBI CDD conserved domain (cd22961); members share this curated model.
