identifier: CDD:cd19379
label: TGF_beta_GSDF
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in Danio rerio gonadal somatic cell derived factor (GSDF) and similar proteins. GSDF is a new member of transforming growth factor beta (TGF-beta) superfamily. It is a teleost- and gonad-specific growth factor that controls sex determination in some fish and plays an important role in mediating germ cell/soma signaling
