identifier: CDD:cd16812
label: "RING-CH finger, H2 subclass (C4HC3-type), found in membrane-associated RING-CH7 (MARCH7). MARCH7, also known as membrane-associated RING finger protein 7, membrane-associated RING-CH protein VII (MARCH-VII), RING finger protein 177 (RNF177), or axotrophin, is a ubiquitin E3 ligase expressed in multiple types of cells and tissues, including stem cells and precursor cells, and is predominantly localized on the plasma membrane and cytoplasm. MARCH7 is involved in T cell proliferation and neuronal development. It also participates in the regulation of cytoskeleton re-organization, cellular migration and invasion, cell proliferation, and tumorigenesis in ovarian carcinoma cells. Moreover, MARCH7 modulates nuclear factor kappaB (NF-kappaB) and Wnt/beta-catenin pathways. It has been identified as an authentic target of miR-101. Furthermore, it ubiquitinates tau protein in vitro, impairing microtubule binding. Unlike other MARCH proteins, MARCH7 is predicted to have no transmembrane spanning region. It harbors a C4HC3-type RING-CH finger, also known as vRING or RINGv, a variant of C3H2C3-type RING-H2 finger, that is responsible for its E3 activity."
definition: >-
  RING-CH finger, H2 subclass (C4HC3-type), found in membrane-associated RING-CH7 (MARCH7). MARCH7, also known as membrane-associated RING finger protein 7, membrane-associated RING-CH protein VII (MARCH-VII), RING finger protein 177 (RNF177), or axotrophin, is a ubiquitin E3 ligase expressed in multiple types of cells and tissues, including stem cells and precursor cells, and is predominantly localized on the plasma membrane and cytoplasm. MARCH7 is involved in T cell proliferation and neuronal development. It also participates in the regulation of cytoskeleton re-organization, cellular migration and invasion, cell proliferation, and tumorigenesis in ovarian carcinoma cells. Moreover, MARCH7 modulates nuclear factor kappaB (NF-kappaB) and Wnt/beta-catenin pathways. It has been identified as an authentic target of miR-101. Furthermore, it ubiquitinates tau protein in vitro, impairing microtubule binding. Unlike other MARCH proteins, MARCH7 is predicted to have no transmembrane spanning region. It harbors a C4HC3-type RING-CH finger, also known as vRING or RINGv, a variant of C3H2C3-type RING-H2 finger, that is responsible for its E3 activity. — an NCBI CDD conserved domain (cd16812); members share this curated model.
