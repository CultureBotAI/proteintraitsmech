identifier: CDD:cd20556
label: "cyclin box found in CDK5 and ABL1 enzyme substrate (CABLES) family. The CABLES family includes CABLES1 and CABLES2. CABLES1, also called interactor with CDK3 1 (Ik3-1), is a cyclin-dependent kinase binding protein that enhances cyclin-dependent kinase tyrosine phosphorylation by non-receptor tyrosine kinases, such as that of CDK5 by activated ABL1, which leads to increased CDK5 activity and is critical for neuronal development, and that of CDK2 by WEE1, which leads to decreased CDK2 activity and growth inhibition. CABLES2, also called interactor with CDK3 2 (Ik3-2), acts as a proapoptotic factor involved in both p53-mediated and p53-independent apoptotic pathways. Both, CABLES1 and CABLES2, contain one cyclin box. The cyclin box is a protein binding domain."
definition: >-
  cyclin box found in CDK5 and ABL1 enzyme substrate (CABLES) family. The CABLES family includes CABLES1 and CABLES2. CABLES1, also called interactor with CDK3 1 (Ik3-1), is a cyclin-dependent kinase binding protein that enhances cyclin-dependent kinase tyrosine phosphorylation by non-receptor tyrosine kinases, such as that of CDK5 by activated ABL1, which leads to increased CDK5 activity and is critical for neuronal development, and that of CDK2 by WEE1, which leads to decreased CDK2 activity and growth inhibition. CABLES2, also called interactor with CDK3 2 (Ik3-2), acts as a proapoptotic factor involved in both p53-mediated and p53-independent apoptotic pathways. Both, CABLES1 and CABLES2, contain one cyclin box. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20556); members share this curated model.
