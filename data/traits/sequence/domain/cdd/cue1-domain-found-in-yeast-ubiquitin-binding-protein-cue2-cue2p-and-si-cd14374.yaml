identifier: CDD:cd14374
label: CUE1_Cue2p_like
definition: >-
  CUE1 domain found in yeast ubiquitin-binding protein CUE2 (Cue2p) and similar proteins. Cue2p, also called coupling of ubiquitin conjugation to ER degradation protein 2, is encoded by the open reading frame (ORF) YKL090W. It is involved in the intramolecular monoubiquitination that serves as a regulatory signal in a variety of cellular processes in yeast. Cue2p contains two tandem CUE domains at the N-terminus. Both of them can bind monoubiquitin independently. This model corresponds to the first CUE domain
