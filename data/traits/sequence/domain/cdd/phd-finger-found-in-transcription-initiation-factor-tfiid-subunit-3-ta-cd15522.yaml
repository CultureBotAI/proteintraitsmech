identifier: CDD:cd15522
label: "PHD finger found in transcription initiation factor TFIID subunit 3 (TAF3). TAF3 (also termed 140 kDa TATA box-binding protein-associated factor, TBP-associated factor 3, transcription initiation factor TFIID 140 kDa subunit (TAF140), or TAFII-140, is an integral component of TFIID) is a general initiation factor (GTF) that plays a key role in preinitiation complex (PIC) assembly through core promoter recognition. The interaction of H3K4me3 with TAF3 directs global TFIID recruitment to active genes, which regulates gene-selective functions of p53 in response to genotoxic stress. TAF3 is highly enriched in embryonic stem cells and is required for endoderm lineage differentiation and prevents premature specification of neuroectoderm and mesoderm. Moreover, TAF3, along with TRF3, forms a complex that is essential for myogenic differentiation. TAF3 contains a plant homeodomain (PHD) finger. This family also includes Drosophila melanogaster BIP2 (Bric-a-brac interacting protein 2) protein, which functions as an interacting partner of D. melanogaster p53 (Dmp53)."
definition: >-
  PHD finger found in transcription initiation factor TFIID subunit 3 (TAF3). TAF3 (also termed 140 kDa TATA box-binding protein-associated factor, TBP-associated factor 3, transcription initiation factor TFIID 140 kDa subunit (TAF140), or TAFII-140, is an integral component of TFIID) is a general initiation factor (GTF) that plays a key role in preinitiation complex (PIC) assembly through core promoter recognition. The interaction of H3K4me3 with TAF3 directs global TFIID recruitment to active genes, which regulates gene-selective functions of p53 in response to genotoxic stress. TAF3 is highly enriched in embryonic stem cells and is required for endoderm lineage differentiation and prevents premature specification of neuroectoderm and mesoderm. Moreover, TAF3, along with TRF3, forms a complex that is essential for myogenic differentiation. TAF3 contains a plant homeodomain (PHD) finger. This family also includes Drosophila melanogaster BIP2 (Bric-a-brac interacting protein 2) protein, which functions as an interacting partner of D. melanogaster p53 (Dmp53). — an NCBI CDD conserved domain (cd15522); members share this curated model.
