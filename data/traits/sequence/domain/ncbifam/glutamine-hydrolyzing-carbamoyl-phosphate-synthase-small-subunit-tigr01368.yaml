label: "glutamine-hydrolyzing carbamoyl-phosphate synthase small subunit"
definition: >-
  glutamine-hydrolyzing carbamoyl-phosphate synthase small subunit (carA) — a protein domain modelled by the NCBIfam sequence-profile HMM TIGR01368 (equivalog_domain); catalyses carbamoyl-phosphate synthase (glutamine-hydrolyzing); associated with carbamoyl-phosphate synthase (glutamine-hydrolyzing) activity, 'de novo' pyrimidine nucleobase biosynthetic process, L-glutamine metabolic process.
