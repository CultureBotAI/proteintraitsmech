identifier: NCBIfam:TIGR00693
label: "thiamine phosphate synthase"
definition: >-
  thiamine phosphate synthase (thiE) — a protein domain modelled by the NCBIfam sequence-profile HMM TIGR00693 (equivalog_domain); catalyses thiamine phosphate synthase; associated with thiamine-phosphate diphosphorylase activity, thiamine biosynthetic process.
