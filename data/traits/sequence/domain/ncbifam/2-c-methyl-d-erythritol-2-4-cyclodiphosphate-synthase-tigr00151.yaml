definition: >-
  2-C-methyl-D-erythritol 2,4-cyclodiphosphate synthase (ispF) — a protein domain modelled by the NCBIfam sequence-profile HMM TIGR00151 (equivalog_domain); catalyses 2-C-methyl-D-erythritol 2,4-cyclodiphosphate synthase; associated with 2-C-methyl-D-erythritol 2,4-cyclodiphosphate synthase activity, isopentenyl diphosphate biosynthetic process, methylerythritol phosphate pathway.
