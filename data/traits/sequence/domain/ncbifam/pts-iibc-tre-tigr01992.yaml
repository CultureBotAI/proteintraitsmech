identifier: NCBIfam:TIGR01992
label: "PTS system trehalose-specific EIIBC component"
definition: >-
  PTS system trehalose-specific EIIBC component (treP) — a protein domain modelled by the NCBIfam sequence-profile HMM TIGR01992 (equivalog_domain); catalyses protein-N(pi)-phosphohistidine--trehalose phosphotransferase; associated with protein-N(PI)-phosphohistidine-carbohydrate phosphotransferase activity, phosphoenolpyruvate-dependent sugar phosphotransferase system, trehalose transmembrane transporter activity, trehalose transport.
