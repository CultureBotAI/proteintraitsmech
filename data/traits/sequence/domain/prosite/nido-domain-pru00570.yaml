identifier: PROSITE:PRU00570
label: NIDO domain
definition: >-
  NIDO domain profile. The ~180-residue NIDO domain is an extracellular domain of unknown function, found in nidogen (entactin) and hypothetical proteins. The NIDO domain is found in association with other domains, such as nidogen G2 beta-barrel (see <PDOC50993>), thyroglobulin type-1 (see <PDOC00377>), LDLRB (see <PDOC51120>), AMOP (see <PDOC50856>), EGF-like (see <PDOC00021>), VWFD, IPT/TIG, or sushi/CCP/SCR (see <PDOC50923>) [1-4].
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
