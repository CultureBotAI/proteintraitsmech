identifier: PROSITE:PRU00674
label: Colipase family
definition: >-
  Colipase is a small protein of ~100 amino acids that functions as a cofactor for pancreatic lipase. It also binds to the bile-salt covered triacylglycerol interface thus allowing the enzyme to anchor itself to the water-lipid interface. Colipases contain ten cysteines involved in five disulfide bonds.
