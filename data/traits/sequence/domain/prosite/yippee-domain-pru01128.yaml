identifier: PROSITE:PRU01128
label: Yippee domain
definition: >-
  Yippee domain profile. The Yippee-like (YPEL) family proteins share homology to drosophila Yippee, a zinc finger binding protein. YPEL proteins are found in essentiallly all the eukaryotes and hence they must play important roles in the maintenance of life. Subcellular localization of all YPEL proteins to the centrosomes and the mitotic apparatus suggest their role in the mitosis-associated function. YPEL proteins contain a Yippee domain, which is a putative zinc-finger-like, metal-binding domain.
