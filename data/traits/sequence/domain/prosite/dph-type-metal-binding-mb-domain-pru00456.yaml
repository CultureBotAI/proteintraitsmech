identifier: PROSITE:PRU00456
label: DPH-type metal-binding (MB) domain
definition: >-
  DPH-type metal-binding (MB) domain profile. Diphthamide is a unique post-translationally modified histidine residue found only in translation elongation factor 2 (eEF-2). It is conserved from archaebacteria to humans and serves as the target for diphteria toxin and Pseudomonas exotoxin A. These two toxins catalyze the transfer of ADP-ribose to diphtamide on eEF-2, thus inactivating eEF-2, halting cellular protein synthesis, and causing cell death.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
