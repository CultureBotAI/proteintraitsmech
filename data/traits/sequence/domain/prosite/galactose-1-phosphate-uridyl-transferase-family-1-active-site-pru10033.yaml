identifier: PROSITE:PRU10033
label: Galactose-1-phosphate uridyl transferase family 1 active site
definition: >-
  Galactose-1-phosphate uridyl transferase signatures. Galactose-1-phosphate uridyl transferase (EC 2.7.7.12) (galT) catalyzes the transfer of an uridyldiphosphate group on galactose (or glucose) 1-phosphate. During the reaction, the uridyl moiety links to a histidine residue. In the Escherichia coli enzyme, it has been shown that two histidine residues separated by a single proline residue are essential for enzyme activity. The first one is a ligand to a zinc ion and the second act as a nucleophile.
