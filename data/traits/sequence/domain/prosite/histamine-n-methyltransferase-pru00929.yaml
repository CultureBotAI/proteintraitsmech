identifier: PROSITE:PRU00929
label: Histamine N-methyltransferase
definition: >-
  Histamine N-methyltransferase (EC 2.1.1.8) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to histamine to form N(tau) methylhistamine and S-adenosyl-L-homocysteine.
