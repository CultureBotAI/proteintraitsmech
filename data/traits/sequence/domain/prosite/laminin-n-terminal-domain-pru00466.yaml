identifier: PROSITE:PRU00466
label: Laminin N-terminal domain
definition: >-
  Laminin N-terminal (LN) domain profile. Laminin is a large molecular weight glycoprotein present only in basement membranes in almost every animal tissue. Each laminin is a heterotrimer assembled from alpha, beta and gamma chain subunits, secreted and incorporated into cell-associated extracellular matrices.
