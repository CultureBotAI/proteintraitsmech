identifier: PROSITE:PRU01004
label: Prokaryotic molybdopterin oxidoreductases 4Fe-4S domain
definition: >-
  The Mo/W bis-MGD oxydoreductases contains a domain that coordinates a [4Fe-4S] cluster. The cluster is ligated either by four Cys residues or three Cys residues and one His residue.
