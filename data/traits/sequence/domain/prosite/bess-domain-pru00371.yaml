identifier: PROSITE:PRU00371
label: BESS domain
definition: >-
  BESS domain profile. The BESS domain is a ~40 amino acid module that has been named after the three proteins that originally defined the domain: Boundary element associated factor 32, Su(var)3-7, and Stonewall. The BESS domain directs a variety of protein-protein interactions, including interactions with itself, with Dorsal, and with a TBP-associated factor. It is found in a single copy in drosophila proteins and is often associated with the MADF domain (see <PDOC51029>).
