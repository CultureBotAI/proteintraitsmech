identifier: PROSITE:PRU00989
label: 4Fe-4S domain
definition: >-
  The low-potential [4Fe-4S]2(+)/1(+) cluster is involved in the reductive reactivation of CoFeSP and is able to transfer electrons to cob(II)amide from NiFe-containing carbon monoxyde dehydrogenase (CODH), pyruvate:ferredoxin oxydoreductase or reduced ferredoxins.
