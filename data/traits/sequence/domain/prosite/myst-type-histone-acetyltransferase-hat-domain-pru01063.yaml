identifier: PROSITE:PRU01063
label: MYST-type histone acetyltransferase (HAT) domain
definition: >-
  The MYST-type HAT domain contains three regions: a central region associated with acetyl-CoA cofactor binding and catalysis in addition to flanking N- and C-terminal regions harboring respectively a C2HC-type zinc finger and a helix-turn-helix DNA-binding motif.
