identifier: PROSITE:PRU01420
label: Interferon (IFN) type-I family
definition: >-
  Type I IFNs are widespread in vertebrates from fish to mammals and include the IFN-alpha family of subtypes, a single IFN-beta and several poorly defined single gene products (IFN-epsilon, IFN-tau, IFN-kappa, IFN- omega, IFN-delta and IFN-zeta. Type I IFNs have diverse effects on innate and adaptive immune cells during infection with viruses, bacteria, parasites and fungi, directly and/or indirectly through the induction of other mediators. Type I IFNs are important for host defence against viruses
