identifier: PROSITE:PRU01360
label: TonB-dependent receptor proteins
definition: >-
  TonB-dependent receptors (TBDRs) are transport proteins found at the outer membrane (OM) to allow Gram-negative bacteria to uptake scarce resources from competitive environments with very high affinity. All of them share the same basic architecture, a C-terminal membrane-embedded 22-strand antiparallel beta-barrel domain that is sealed by a conserved N-terminal globular 'plug' domain (also called 'cork' or 'hatch').
