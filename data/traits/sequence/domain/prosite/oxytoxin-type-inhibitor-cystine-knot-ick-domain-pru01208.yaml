label: Oxytoxin-type inhibitor cystine knot (ICK) domain
definition: >-
  Oxytoxins are disulphide-rich polypeptides that contain five disulfide bridges and block L-, N- and P/Q-type voltage-sensitive calcium ion channels (VSCCs) .
