identifier: PROSITE:PRU00583
label: CENPB-type HTH domain
definition: >-
  The CENPB-type HTH domain is a DNA-binding, helix-turn-helix (HTH) domain of about 70-75 amino acids, present in eukaryotic centromere proteins and transposases.
