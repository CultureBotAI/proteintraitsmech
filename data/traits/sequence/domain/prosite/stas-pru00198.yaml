identifier: PROSITE:PRU00198
label: STAS
definition: >-
  STAS domain profile. The STAS domain is found in the C-terminal cytoplasmic part of anion transporters from eukaryotes and many bacteria, as well as in the bacterial anti-sigma-factor antagonists (ASAs). It was named STAS after sulfate transporters and anti-sigma-factor antagonist.
