identifier: PROSITE:PRU01116
label: GW domain
definition: >-
  GW domain profile. The GW domain or cell wall targeting (CWT) signal is a module of about 80-90 amino acids named for a conserved Gly-Trp (GW) dipeptide. GW domains have only been identified in Gram-positive bacteria and form a small protein family. They are divergent members of the SH3 family (see <PDOC50002>). However, GW domains are unlikely to mimic SH3 domains functionally, as their potential peptide-binding sites are destroyed or blocked. GW domains may constitute a motif for cell-surface anchoring in Listeria and other Gram-positive bacteria.
