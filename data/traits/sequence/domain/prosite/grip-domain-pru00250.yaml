identifier: PROSITE:PRU00250
label: GRIP domain
definition: >-
  GRIP domain profile. Golgins are Golgi-localized proteins that have an extended coiled-coil conformation, and play an important role in maintaining Golgi structure in all eukaryotic cells from yeast to humans. A subset of the golgins contain a carboxy-terminal region, called the GRIP domain, that mediates binding to Golgi membranes. The GRIP domain was named after the four proteins in which it is found and about which something has been reported (golgin-97, RanBP2-alpha, Imh1p and p230/golgin-245).
