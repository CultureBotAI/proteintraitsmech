identifier: PROSITE:PRU00489
label: MT-A70-like family
definition: >-
  MT-A70-like family profile. N6-methyladenosine (m6A) is present at internal sites in eukaryotic mRNA. It is present only within a defined sequence context that has been shown to be conserved across species from plants to man. Despite its ubiquity and conserved sequence specificity, the functional significance of this modification remains a mystery.
