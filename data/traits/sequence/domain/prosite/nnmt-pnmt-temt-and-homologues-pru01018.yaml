identifier: PROSITE:PRU01018
label: NNMT, PNMT, TEMT and homologues.
definition: >-
  Function: Nicotinamide N-methyltransferase (EC 2.1.1.1) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to nicotinamide to form 1-methylnicotinamide and S-adenosyl-L-homocysteine. Phenylethanolamine N-methyltransferase (EC 2.1.1.28) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to phenylethanolamine to form N-methylphenylethanolamine and S-adenosyl-L homocysteine. Amine N-methyltransferase (EC 2.1.1.49) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to an amine to form a methylated amine and S-adenosyl-L-homocysteine. Thioether S-methyltransferase (EC 2.1.1.96) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to dimethyl sulfide to form trimethylsulfonium and S-adenosyl-L-homocysteine.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
