identifier: PROSITE:PRU01336
label: Coronavirus (CoV) Nsp3 Y domain
definition: >-
  The Y domains including Y1 and CoV-Y may form higher-order oligomeric complexes and play a role in pore formation in double-membrane vesicles (DMVs) that serve as the central hubs for viral RNA replication. Specific membrane binding might be a conserved activity of the Y domain.
