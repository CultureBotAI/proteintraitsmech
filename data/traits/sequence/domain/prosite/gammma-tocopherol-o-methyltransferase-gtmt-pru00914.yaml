identifier: PROSITE:PRU00914
label: Gammma-tocopherol O-methyltransferase (gTMT)
definition: >-
  Tocopherol O-methyltransferase (EC 2.1.1.95) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to gamma- tocopherol to form alpha-tocopherol and S-adenosyl-L-homocysteine. The cyanobacterial orthologue sll0418 (EC 2.1.1.295) methylates 2-methyl-6- phytyl-1,4-benzoquinone/2-methyl-6-solanyl-1,4-benzoquinone (MPBQ/MSBQ) to yield 2,3-dimethyl-5-phytylbenzoquinone/2,3-dimethyl/plastoquinol-9.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
trait_axis: SEQUENCE
trait_category: SEQ_DOMAIN
term_kind: CLASS
mapping_status: SEEDED
