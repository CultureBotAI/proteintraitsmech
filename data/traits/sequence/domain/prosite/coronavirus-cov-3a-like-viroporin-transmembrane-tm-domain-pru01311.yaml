identifier: PROSITE:PRU01311
label: Coronavirus (CoV) 3a-like viroporin transmembrane (TM) domain
definition: >-
  3a-like accessory proteins are transmembrane proteins of the viroporin family that form ion channels in the host membrane and have been implicated in inducing apoptosis, pathogenicity, and virus release. 3a-like viroporins contain a transmembrane domain (TM) and a cytosolic domain (CD).
