identifier: PROSITE:PRU00484
label: GTF2I-like repeat
definition: >-
  GTF2I-like repeat profile. The GTF2I-like repeats are specific to the TFII-I family of transcription factors and have a putative helix-loop-helix (HLH) structure with an unusually large loop of around 40 residues. The transcription factors of the TFII-I family contain both a putative leucine zipper (LZ) and GTF2I-like repeats. They are the main candidates for the pathology of Wiliams-Beuren syndrome (WBS), a neurological disorder associated with physical, behavioral, and cognitive abnormalities. GTF2I-like repeats are likely to be involved in DNA binding [1-5].
