identifier: PROSITE:PRU00775
label: Phycobilisome (PBS) linker domain
definition: >-
  Phycobilisome (PBS) linker domain profile. Phycobilisomes (PBSs) are the major light-harvesting systems in cyanobacteria and red algae. PBS is a supercomplex that is composed of a core complex and multiple peripheral rod complexes. Typically, the core consists of two or five cylinders lying on the membrane with, in most cases, multiple rods radiating from the core to form a hemidiscoidal structure. The building units of the core cylinders and the peripheral rods are trimeric and hexameric discs, in which a monomer consists of a pair of related phycobiliproteins (PBPs), such as phycorerythrins, phycoerythrocyanins, phycocyanins, and allophycocyanins.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
