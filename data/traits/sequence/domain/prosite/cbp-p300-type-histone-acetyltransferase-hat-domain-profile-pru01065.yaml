identifier: PROSITE:PRU01065
label: CBP/p300-type histone acetyltransferase (HAT) domain profile
definition: >-
  CREB-binding protein (CBP)/p300 proteins are involved in various physiological events including proliferation, differentiation and apoptosis. CBP/p300 proteins contain several well-defined protein-interaction domains as well as a centrally located 380-residue HAT domain.
