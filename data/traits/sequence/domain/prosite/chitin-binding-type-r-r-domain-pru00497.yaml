identifier: PROSITE:PRU00497
label: Chitin-binding type R&R domain
definition: >-
  Chitin-binding type R&R domain signature and profile. Insect cuticle is composed of proteins and chitin. The cuticular proteins seem to be specific to the type of cuticle (flexible or stiff) that occur at stages of the insect development. The proteins found in the flexible cuticle of larva and pupa of different insects share a conserved C-terminal section; such a region is also found in the soft endocuticle of adults insects as well as in other cuticular proteins including in arachnids. This conserved motif of 35-36 amino acids is known as the R&R consensus since it was first recognized by Rebers and Riddiford. N-terminal to the consensus is a region of hydrophilic amino acids.
