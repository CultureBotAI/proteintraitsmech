identifier: PROSITE:PRU01310
label: Streptococcus antigen I/II alanine-rich (Ag I/II A) repeat
definition: >-
  The Streptococcus Ag I/II A repeat forms a long alpha-helix that intimately intertwines into a left-handed supercoiled structure with the P repeat polyproline II (PPII) helix to form an unusually long and narrow stalk.
