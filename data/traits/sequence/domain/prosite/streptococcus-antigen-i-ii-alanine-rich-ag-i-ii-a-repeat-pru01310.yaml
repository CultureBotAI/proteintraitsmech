identifier: PROSITE:PRU01310
label: Streptococcus antigen I/II alanine-rich (Ag I/II A) repeat
definition: >-
  Streptococcus antigen I/II alanine-rich (Ag I/II A) repeat profile. The genus Streptococcus is a heterogeneous group of Gram-positive bacteria that can be part of the natural microbiota. Various streptococci are commonly isolated from the oral cavity, intestines, or female reproductive tracts in healthy humans. These colonizing streptococci are often commensal organisms that persist without causing disease.
