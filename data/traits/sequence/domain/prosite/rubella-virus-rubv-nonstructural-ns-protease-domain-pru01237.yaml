identifier: PROSITE:PRU01237
label: Rubella virus (RUBV) nonstructural (NS) protease domain
definition: >-
  Rubella virus (RUBV) nonstructural (NS) protease domain profile. Rubella is an infectious disease that is well characterized by rashes. It is often confused with measles that also cause rashes. Confoundingly, rubella is also known as German measles, and measles is also known as rubeola. However, rubella and measles are different diseases caused by different viruses. The Rubella virus (RUBV) is the etiological agent of the Rubella disease and belongs to the genus, Rubivirus, of the newly created family, Matonaviridae. RUBV is a group VI virus with a single-stranded positive- sense RNA genome enclosed by an icosahedral capsid.
