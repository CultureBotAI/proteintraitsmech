identifier: PROSITE:PRU00654
label: ERV/ALR sulfhydryl oxidase domain
definition: >-
  ERV/ALR sulfhydryl oxidase domain profile. The ~100-residue ERV/ALR sulfhydryl oxidase domain is a versatile module adapted for catalysis of disulfide bond formation in various organelles and biological settings. The ERV/ALR sulfhydryl oxidase domain has a Cys-X-X-Cys dithiol/disulfide motif adjacent to a bound FAD cofactor, enabling transfer of electrons from thiol substrates to non-thiol electron acceptors. ERV/ALR family members differ in their N- or C-terminal extensions, which typically contain at least one additional disulfide bond, the hypothesized 'shuttle' disulfide.
