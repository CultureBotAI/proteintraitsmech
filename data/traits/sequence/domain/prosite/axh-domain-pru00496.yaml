identifier: PROSITE:PRU00496
label: AXH domain
definition: >-
  AXH domain profile. The AXH (ataxin-1 and HMG-box protein 1) domain is a module of ~130 amino acids, which has been identified in ATX1 and in the apparently unrelated transcription factor HBP1. It is found in many vertebrate and invertebrate proteins. It has been suggested that the AXH domain is a molecular scaffold domain engaged in multiple protein-protein interactions and in RNA binding.
