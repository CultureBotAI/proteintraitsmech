identifier: PROSITE:PRU00594
label: CBM20 (carbohydrate binding type-20) domain
definition: >-
  CBM20 (carbohydrate binding type-20) domain profile. Carbohydrate-binding modules (CBM) have been classified into more than 40 families according to sequence homology. Several amylolytic enzymes share a conserved region of 90-130 amino acid residues, the CBM20 domain. It is mainly found C-terminal to the catalytic domain and has been shown to bind granular starch.
