identifier: PROSITE:PRU10091
label: Ubiquitin carboxyl-terminal hydrolase family 1 cysteine active-site
definition: >-
  Ubiquitin carboxyl-terminal hydrolases family 1 cysteine active site. Ubiquitin carboxyl-terminal hydrolases (EC 3.4.19.12) (UCH) (deubiquitinating enzymes) are thiol proteases that recognize and hydrolyze the peptide bond at the C-terminal glycine of ubiquitin. These enzymes are involved in the processing of poly-ubiquitin precursors as well as that of ubiquinated proteins.
