identifier: PROSITE:PRU00066
label: DEP
definition: >-
  DEP domain profile. The DEP domain is a globular domain of about 80 residues that is found in more than 50 proteins involved in G protein signaling pathways. It has been named after the three proteins (Dishevelled, Egl-10, and Pleckstrin) in which it was initially identified. It has been proposed that the DEP domain could play a selective role in targeting DEP domain-containing proteins to specific subcellular membranous sites, perhaps even to specific G protein-coupled signaling pathways.
