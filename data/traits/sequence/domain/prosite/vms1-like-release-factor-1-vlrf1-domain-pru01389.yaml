identifier: PROSITE:PRU01389
label: Vms1-like release factor 1 (VLRF1) domain
definition: >-
  Vms1-like release factor 1 (VLRF1) domain profile. Stalling of ribosomes engaged in protein synthesis can lead to significant defects in the function of newly synthesized proteins and thereby impair protein homeostasis. Ribosomal surveillance pathways scan for ribosomes that are transiently paused or terminally stalled owing to structural elements in mRNAs or nascent chain sequences. Ribosome-associated quality control (RQC) provides a rescue pathway for eukaryotic cells to process faulty proteins after translational stalling of cytoplasmic ribosomes.
