identifier: PROSITE:PRU00153
label: PLD phosphodiesterase
definition: >-
  Phospholipase D phosphodiesterase active site profile. Phospholipase D (PLD) is an ubiquitous enzyme found in bacteria, fungi, plants and mammals. PLD is involved in vesicle formation, protein transport, signal transduction and mitosis. It catalyzes the breakdown of phosphatidylcholine into choline and the putative second messenger phosphatidic acid, which in turn is broken down into two second messengers (diacylglycerol and lysophosphatidic acid). PLD also catalyzes a phosphatidyl transfer reaction using primary alcohols as nucleophilic acceptors to produce phosphatidylalcohols.
