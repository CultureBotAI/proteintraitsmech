identifier: PROSITE:PRU01098
label: Glycosyl hydrolases family 16 (GH16) domain
definition: >-
  The glycosyl hydrolases family 16 (GH16) contains functionally heterogeneous members, including beta-agarases, endo-1,3-beta-glucanases (laminarinases), endo-beta-1,3-1,4-glucanases (lichenases), kappa- carrageenases, endo-beta-galactosidases and xyloglucan endotransferases.
