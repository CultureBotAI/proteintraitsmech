identifier: PROSITE:PRU00957
label: tRNA (guanine-N(7)-)-methyltransferase
definition: >-
  tRNA (guanine-N(7)-)-methyltransferase (EC 2.1.1.33) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to tRNA to form tRNA containing N(7)-methylguanine and S-adenosyl-L-homocysteine.
