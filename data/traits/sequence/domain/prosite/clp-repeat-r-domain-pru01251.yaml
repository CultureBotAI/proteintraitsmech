identifier: PROSITE:PRU01251
label: Clp repeat (R) domain
definition: >-
  Clp repeat (R) domain profile. Molecular chaperones recognize unfolded or misfolded proteins by binding to hydrophobic surface patches not normally exposed in the native proteins. Members of the Clp/Hsp100 family of chaperones are present in eubacteria and within organelles of all eukaryotes, promoting disaggregation and disassembly of protein complexes and participating in energy-dependent protein degradation. The ClpA, ClpB, and ClpC subfamilies of the Clp/Hsp100 ATPases contain a conserved N-terminal domain of ~150 amino acids, which in turn consists of two repeats of ~75 residues.
