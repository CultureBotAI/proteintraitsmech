identifier: PROSITE:PRU10115
label: Hydroxymethylglutaryl-coenzyme A lyase active site
definition: >-
  Hydroxymethylglutaryl-coenzyme A lyase active site. 3-hydroxy-3-methylglutaryl-coenzyme A lyase (HMG-CoA lyase or HL) (EC 4.1.3.4) catalyzes the transformation of HMG-CoA into acetyl-CoA and acetoacetate. In vertebrates it is a mitochondrial enyme which is involved in ketogenesis and in leucine catabolism. In some bacteria, such as Pseudomonas mevalonii, it is involved in mevalonate catabolism (gene mvaB). A cysteine has been shown, in mvaB, to be required for the activity of the enzyme. The region around this residue is perfectly conserved and is used as a signature pattern.
