identifier: PROSITE:PRU00085
label: Ferritin-like diiron domain
definition: >-
  Proteins containing a ferritin-like diiron domain possess the ability to catalyze oxidation of Fe(2+) to Fe(3+) by O2, i.e. ferroxidase activity.
