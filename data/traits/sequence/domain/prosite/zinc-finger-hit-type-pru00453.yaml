identifier: PROSITE:PRU00453
label: Zinc finger HIT-type
definition: >-
  Zinc finger HIT-type profile. The HIT-type zinc finger contains 7 conserved cysteines and one histidine that can potentially coordinate two zinc atoms. It has been named after the first protein that originally defined the domain: the yeast HIT1 protein. The HIT-type zinc finger displays some sequence similarities to the MYND-type zinc finger (see <PDOC50865>). The function of this domain is unknown but it is mainly found in nuclear proteins involved in gene regulation and chromatin remodeling.
