identifier: PROSITE:PRU01281
label: EutK-Ctail domain
definition: >-
  EutK-Ctail domain profile. Bacterial microcompartments (BMCs) are large proteinaceous structures comprised of a roughly icosahedral shell and a series of encapsulated enzymes. They function as organelles by sequestering particular metabolic processes within the cell. A shell or capsid, which is composed of a few thousand protein subunits, surrounds a series of sequentially acting enzymes and controls the diffusion of substrates and products (including toxic or volatile intermediates) into and out of the lumen. One BMC, which is dedicated to ethanolamine utilization (Eut), is present in several bacteria, including Salmonella enterica and Escherichia coli.
