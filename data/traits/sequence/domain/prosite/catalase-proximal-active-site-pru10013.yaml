identifier: PROSITE:PRU10013
label: Catalase proximal active site
definition: >-
  Catalase signatures and profile. Catalase (EC 1.11.1.6) or more correctly, hydroperoxidase is a heme-containing enzyme, present in all aerobic cells, that decomposes hydrogen peroxide to molecular oxygen and water. Its main function is to protect cells from the toxic effects of hydrogen peroxide. In eukaryotic organisms and in some prokaryotes catalase is a molecule composed of four identical subunits. Each of the subunits binds one protoheme IX group.
