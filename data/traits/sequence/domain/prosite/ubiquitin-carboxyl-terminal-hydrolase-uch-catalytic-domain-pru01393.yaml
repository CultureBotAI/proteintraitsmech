identifier: PROSITE:PRU01393
label: Ubiquitin carboxyl-terminal hydrolase (UCH) catalytic domain
definition: >-
  Ubiquitin C-terminal hydrolases (UCHs) are deubiquitinating enzymes which hydrolyze C-terminal esters and amides of ubiquitin. They have a catalytic core domain consisting of about 230 amino acids.
