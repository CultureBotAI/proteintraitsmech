identifier: PROSITE:PRU00607
label: Gamma-glutamyl hydrolase domain
definition: >-
  Gamma-glutamyl hydrolase domain profile. Gamma-glutamyl hydrolase (GGH) (EC 3.4.19.9) is an enzyme that cleaves gamma-linked glutamyl bonds. With a substrate such as folyl penta-gamma-glutamate, the enzyme acts as an endopeptidase. GGH is a central enzyme in the metabolism of folic acid and antifolyl poly-gamma-glutamates. Folate is an essential co-factor of enzymes for the biosynthesis of DNA precursors and several amino acids. In mammals, the activity of GGH against antifolate drugs is involved in resistance to anticancer therapy. Mammalian GGH is located in the lysosomes and in plants the enzyme is located in the vacuoles.
