identifier: PROSITE:PRU00375
label: ZP domain
definition: >-
  The zona pellucida (ZP) domain is a protein polymerization module of ~260 amino acid module, which is found at the C-terminus of many secreted eukaryotic glycoproteins that play fundamental roles in development, hearing, immunity, and cancer.
