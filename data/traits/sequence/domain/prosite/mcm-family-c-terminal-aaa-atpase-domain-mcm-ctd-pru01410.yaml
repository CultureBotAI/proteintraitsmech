identifier: PROSITE:PRU01410
label: MCM family C-terminal AAA(+) ATPase domain (MCM-CTD)
definition: >-
  The MCM-CTD contains the canonical Walker A (WA) motif to localize binding of nucleoside triphosphates (NTPs), the Walker B (WB) motif to hydrolyze NTPs, and two DNA binding loops for DNA translocation.
