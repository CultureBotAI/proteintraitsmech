identifier: PROSITE:PRU01410
label: MCM family C-terminal AAA(+) ATPase domain (MCM-CTD)
definition: >-
  MCM family signature and C-terminal AAA(+) ATPase domain (MCM-CTD) profile. Proteins shown to be required for the initiation of eukaryotic DNA replication share a highly conserved domain of about 210 amino-acid residues. The latter shows some similarities with that of various other families of DNA- dependent ATPases. Eukaryotes seem to possess a family of six proteins that contain this domain. They were first identified in yeast where most of them have a direct role in the initiation of chromosomal DNA replication by interacting directly with autonomously replicating sequences (ARS). They were thus called 'minichromosome maintenance proteins' with gene symbols prefixed by MCM.
