identifier: PROSITE:PRU00248
label: WWE domain
definition: >-
  WWE domain profile. The WWE domain is a ~80-residue globular domain occuring in two functional classes of proteins, namely those associated with ubiquitination and those associated with poly-ADP ribosylation. The former class includes its combinations with the HECT-type E3 ligases (see <PDOC50237>), the classic RING or the RING-H2 domains (see <PDOC00449>), and the ubiquitin-binding UBA domain (see <PDOC50030>). Analogous to the ubiquitin ligases, eukaryotic poly-ADP ribose polymerases (EC 2.4.2.30) (PARPs) covalently modify proteins through the addition of multiple ADP-ribose moieties and participate in functions such as DNA repair and chromatin dynamics.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
