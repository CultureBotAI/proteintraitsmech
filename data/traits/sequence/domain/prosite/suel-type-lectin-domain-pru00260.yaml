identifier: PROSITE:PRU00260
label: SUEL-type lectin domain
definition: >-
  SUEL-type lectin domain profile. Lectins bind to specific carbohydrate residues of glycoproteins and glycolipids present at the cell surface. This allow them to agglutinate a variety of cellular types. On the basis of sequence similarity and common characteristics such as sugar binding specificity, conserved carbohydrate recognition domains, and ion requirement the different lectins can be grouped in different categories, like C-type, I-type, galectins, pentraxins and P-type lectin.
