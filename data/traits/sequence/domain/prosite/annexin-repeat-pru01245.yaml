identifier: PROSITE:PRU01245
label: Annexin repeat
definition: >-
  Annexins are a group of calcium-binding proteins that associate reversibly with membranes. Each of these proteins consist of a unique N- terminal domain followed by four or eight copies (in annexin A6) of a conserved segment of approximately 70 residues. Each of the repeats has the potential to have a type II Ca(2+)-binding bipartite motif, located on two different alpha-helices (GxGT-(38-40 residues)-D/E), but typically some of them are non-functional.
