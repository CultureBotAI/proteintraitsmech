identifier: PROSITE:PRU01140
label: Zinc finger C2H2 AKAP95-type
definition: >-
  Zinc finger C2H2 AKAP95-type profile. A-kinase (or PKA)-anchoring protein AKAP95 is a member of the AKAP-family that binds to regulatory subunits of protein kinase A (PKA) and localizes PKA to various distinct locations and structures within cells. AKAP95 is a zinc- finger protein implicated in mitotic chromosome condensation by acting as a targeting molecule for the condensin complex. In addition to anchoring the regulatory subunit (RII) of cyclic adenosine monophosphate (cAMP)-dependent protein kinase (PKA), AKAP95 binds chromatin at mitosis. It harbours two zinc fingers, designated ZF1 and ZF2. ZF1 mediates the binding of AKAP95 to DNA.
