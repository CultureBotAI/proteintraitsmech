identifier: PROSITE:PRU01439
label: FANTASTIC FOUR (FAF) domain
definition: >-
  FANTASTIC FOUR (FAF) domain profile. Plant development and environmental adaptation are governed by complex regulatory networks, in which small, plant-specific proteins often function as modulatory components. The FANTASTIC FOUR (FAF) protein family represents one such group of regulatory proteins. FAF proteins, despite their simple structure, are crucial regulators of developmental processes. FAF genes were first identified in Arabidopsis thaliana and encode small proteins that are highly conserved across land plants and share a FAF domain of ~50 amino acids.
