identifier: PROSITE:PRU01439
label: FANTASTIC FOUR (FAF) domain
definition: >-
  FAF genes were first identified in Arabidopsis thaliana and encode small proteins that are highly conserved across land plants and share a FAF domain of ~50 amino acids. Since their initial identification in Arabidopsis thaliana, FAF domain-containing proteins have been linked to shoot apical meristem maintenance, organ initiation, and developmental timing, positioning them as modulators that fine-tune growth-related signaling pathways.
