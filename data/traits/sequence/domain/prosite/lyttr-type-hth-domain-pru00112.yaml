identifier: PROSITE:PRU00112
label: LytTR-type HTH domain
definition: >-
  The LytTR ('litter') HTH domain is a DNA-binding, potential winged helix-turn-helix (wHTH) domain present in bacterial transcriptional regulators of the algR/agrA/lytR family.
