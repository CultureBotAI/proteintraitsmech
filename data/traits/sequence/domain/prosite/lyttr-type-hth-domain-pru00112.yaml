identifier: PROSITE:PRU00112
label: LytTR-type HTH domain
definition: >-
  LytTR-type HTH domain profile. The LytTR ('litter') HTH domain is a DNA-binding, potential winged helix-turn-helix (wHTH) domain of about 100 amino acids, present in bacterial transcriptional regulators of the algR/agrA/lytR family. It is named after Bacillus subtilis LytT and Staphylococcus aureus lytR response regulators, involved in the regulation of cell autolysis. The LytTR domain is found in several bacterial cytoplasmic proteins that regulate the production of important virulence factors, like extracellular polysaccharides, toxins and bacteriocins.
