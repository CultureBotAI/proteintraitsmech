identifier: PROSITE:PRU00973
label: Agenet-like domain
definition: >-
  Agenet-like domain profile. Fragile X Mental Retardation Protein (FMRP), and its autosomal paralogues, Fragile X mental Retardation syndrome-related protein 1 and 2 (FXR1 and FXR2), comprise a family of RNA-binding proteins. It is thought that the FRMP family of proteins contributes to the regulation of protein synthesis at sites where mRNAs are locally translated in response to stimuli. These proteins are highly similar to one another and also retain highly conserved domain architecture.
