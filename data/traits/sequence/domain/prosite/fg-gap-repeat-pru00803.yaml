identifier: PROSITE:PRU00803
label: FG-GAP repeat
definition: >-
  FG-GAP repeat profile. Integrins are cell adhesion receptors that transmit bidirectional signals across the plasma membrane and link the extracellular environment to the actin cytoskeleton. Integrins are formed from alpha and beta subunits. The N-terminal region of alpha subunits contains seven 60 amino acids sequence repeats which fold into a beta-propeller domain. Integrins bind ligands at the interface between the alpha subunit beta-propeller domain and beta subunit I domain. These domains associate over a large interface to form the integrin head. The seven FG-GAP repeat domain is also found in the enzyme phosphatidylinositol phospholipase D.
