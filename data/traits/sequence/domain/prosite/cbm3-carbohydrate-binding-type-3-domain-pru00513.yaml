identifier: PROSITE:PRU00513
label: CBM3 (carbohydrate binding type-3) domain
definition: >-
  CBM3 (carbohydrate binding type-3) domain profile. Carbohydrate-binding modules (CBM) have been classified into more than 40 families according to sequence homology. Several cellulolytic enzymes share a conserved region of about 150 amino acid residues, the CBM3 domain. It has been classified in three different subtypes, termed family IIIa, IIIb and IIIc. The family IIIa (scaffoldin) and IIIb (mainly free enzymes) are closely similar in their primary structures and both types bind strongly to crystalline cellulose.
