identifier: PROSITE:PRU00169
label: Response regulatory domain
definition: >-
  Response regulatory domain profile. Most prokaryotic signal-transduction systems and a few eukaryotic pathways use phosphotransfer schemes involving two conserved components, a histidine protein kinase (HK) (see <PDOC50109>) and a response regulator protein (RR). The HK, which is regulated by environmental stimuli, autophosphorylates at a histidine residue, creating a high-energy phosphoryl group that is subsequently transferred to an aspartate residue in the RR. Most RRs consist of two domains: a conserved N-terminal regulatory domain and a variable C- terminal effector domain.
