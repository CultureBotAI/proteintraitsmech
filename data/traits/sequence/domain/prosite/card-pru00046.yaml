identifier: PROSITE:PRU00046
label: CARD
definition: >-
  CARD caspase recruitment domain profile. The apoptotic signal coming from ligand-induced oligomerization of death receptors is mediated by a number of adaptor proteins containing specialized interaction domains. Besides the caspase recruitment domain (CARD), this group is formed by the death domain (DD) (see <PDOC50017>) and the death effector domain (DED) (see <PDOC50168>).
