identifier: PROSITE:PRU10134
label: Adenylosuccinate synthetase active site
definition: >-
  Adenylosuccinate synthetase signatures. Adenylosuccinate synthetase (EC 6.3.4.4) plays an important role in purine biosynthesis, by catalyzing the GTP-dependent conversion of IMP and aspartic acid to AMP. Adenylosuccinate synthetase has been characterized from various sources ranging from Escherichia coli (gene purA) to vertebrate tissues. In vertebrates, two isozymes are present - one involved in purine biosynthesis and the other in the purine nucleotide cycle.
