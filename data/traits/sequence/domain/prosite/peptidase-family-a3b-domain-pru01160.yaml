identifier: PROSITE:PRU01160
label: Peptidase family A3B domain
definition: >-
  Peptidase family A3B domain profile. Rice tungro bacilliform virus (RTBV) is a pararetrovirus, and a member of the family Caulimoviridae in the genus Tungrovirus. RTBV has a long open reading frame that encodes a large polyprotein (P3). P3 contains a putative movement protein (MP), the capsid protein (CP), the aspartate protease (PR) and the reverse transcriptase (RT) with a ribonuclease H activity. PR is a member of the cluster of retroviral proteases and serves to proteolytically process P3. The sequence DSGS is believed to be the RTBV protease active site. The RTBV PR domain forms peptidase family A3 subfamily B.
