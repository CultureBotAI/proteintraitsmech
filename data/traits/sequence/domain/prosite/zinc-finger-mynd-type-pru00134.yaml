identifier: PROSITE:PRU00134
label: Zinc finger MYND-type
definition: >-
  Zinc finger MYND-type signature and profile. The MYND-type zinc finger was called after the three best characterized members of the family (MYeloid translocation protein 8 (MTG8/ETO), Nervy protein and Deaf-1). In MTG8 and Bop proteins this domain is important for the recruitment of a repressive complexe containing histone deacetylase (HDAC) activity. In M2-type chronic leukemia where AML1 is fused to MTG8, AML1, normaly a transcriptional activator, is converted into a transcriptional repressor. The MYND domain of MTG8 is essential for this conversion and seems to function by recruiting the nuclear co-repressor N-CoR/mSin3A and HDACs complexes to DNA sites specified by AML1.
