identifier: PROSITE:PRU00579
label: Rho GTPase-binding/formin homology 3 (GBD/FH3) domain
definition: >-
  The GBD/FH3 domain is approximately 380 residues in length. Its role appears to be twofold. On one hand the N-terminal region of formins is involved in subcellular localization through interaction with diverse targets. On the other hand the GBD/FH3 domain is involved in regulation of activation by releasing of an intramolecular interaction between the DAD and the N-terminus.
