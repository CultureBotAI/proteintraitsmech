identifier: PROSITE:PRU00449
label: AN1-type
definition: >-
  Zinc finger AN1-type profile. This domain was first identified as a putative zinc finger found in the protein encoded by the Xenopus laevis An1 maternal mRNA. The AN1-type zinc finger contains six conserved cysteines and two histidines that could potentially coordinate 2 zinc atoms.
