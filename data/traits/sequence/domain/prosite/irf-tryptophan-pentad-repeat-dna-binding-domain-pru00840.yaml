identifier: PROSITE:PRU00840
label: IRF tryptophan pentad repeat DNA-binding domain
definition: >-
  The IRF tryptophan pentad repeat DNA-binding domain has an alpha/ beta architecture comprising a cluster of three alpha-helices (alpha1-alpha3) flanked on one side by a mixed four-stranded beta-sheet (beta1-beta4). It forms a helix-turn-helix motif that binds to ISRE consensus sequences found in target promoters.
