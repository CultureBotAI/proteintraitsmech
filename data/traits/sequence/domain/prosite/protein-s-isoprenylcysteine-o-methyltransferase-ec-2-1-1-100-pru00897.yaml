identifier: PROSITE:PRU00897
label: Protein-S-isoprenylcysteine O-methyltransferase (EC 2.1.1.100)
definition: >-
  Protein-S-isoprenylcysteine O-methyltransferase (EC 2.1.1.100) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to a protein C-terminal S-farnesyl-L-cysteine to form a protein C-terminal S- farnesyl-L-cysteine methyl ester and S-adenosyl-L-homocysteine.
