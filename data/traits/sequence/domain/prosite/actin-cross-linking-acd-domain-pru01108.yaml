identifier: PROSITE:PRU01108
label: Actin cross-linking (ACD) domain
definition: >-
  Actin cross-linking (ACD) domain profile. Actin cross-linking domains (ACDs) are distinct domains found in several bacterial toxins, including the Vibrio cholerae MARTX toxin. ACDs are enzyme ligases that catalyze the formation of an irreversible iso-peptide bond on two actin molecules in an ATP- and Mg/Mn(2+)-dependent manner. Cross-linking depletes the cellular pool of G-actin leading to actin cytoskeleton depolymerization.
