identifier: PROSITE:PRU01027
label: Alphavirus core protein (CP) domain
definition: >-
  Alphavirus core protein (CP) domain profile. Togaviruses are enveloped animal viruses containing a single-stranded RNA- genome of positive polarity. They can cause a variety of diseases, such as encephalitis, fever, arthritis and rash. Togaviruses of the alphavirus group consist of a nucleoprotein core, a lipid membrane bilayer which envelopes the core, and glycoprotein spikes on the surface of the membrane. The core contains the genomic RNA and the core protein (CP). CP is located at the N-terminal end of the viral structural polyprotein, which is translated from a subgenomic RNA. It is followed in the polyprotein by the E3-E2-6K-E1 proteins.
