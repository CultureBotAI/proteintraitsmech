identifier: PROSITE:PRU00393
label: IclR-type HTH domain
definition: >-
  The iclR-type HTH domain is a DNA-binding, winged helix-turn-helix (wHTH) domain of about 60 amino acids present in transcription regulators of the iclR family, involved in carbon metabolism in eubacteria and archaea.
