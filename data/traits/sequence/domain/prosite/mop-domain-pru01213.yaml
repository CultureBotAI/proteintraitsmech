identifier: PROSITE:PRU01213
label: Mop domain
definition: >-
  Mop domain profile. Mop domains, which occur in a variety of bacterial and archeal proteins specifically bind molybdate (or tungstate). The simplest mop-containing proteins are the so-called molbindins, consisting entirely of either one or two mop domains. The physiological role of these proteins is unclear, although they have been implicated in molybdate storage and homeostasis. Other mop- containing proteins are ModC, a component of the high affinity ABC transporter, and ModE, the molybdate-dependent transcriptional regulator.
