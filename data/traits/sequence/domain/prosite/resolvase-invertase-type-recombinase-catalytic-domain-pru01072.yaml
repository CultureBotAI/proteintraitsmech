identifier: PROSITE:PRU01072
label: Resolvase/invertase-type recombinase catalytic domain
definition: >-
  The serine recombinases or resolvase/invertase family groups enzymes which share the following structural characteristics: an N-terminal catalytic and dimerization domain that contains a conserved serine residue involved in the transient covalent attachment to DNA, and a C-terminal helix-turn-helix DNA-binding domain
