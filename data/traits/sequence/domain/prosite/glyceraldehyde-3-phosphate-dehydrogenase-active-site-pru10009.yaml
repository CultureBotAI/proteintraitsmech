identifier: PROSITE:PRU10009
label: Glyceraldehyde 3-phosphate dehydrogenase active site
definition: >-
  Glyceraldehyde 3-phosphate dehydrogenase active site. Glyceraldehyde 3-phosphate dehydrogenase (EC 1.2.1.12) (GAPDH) is a tetrameric NAD-binding enzyme common to both the glycolytic and gluconeogenic pathways. A cysteine in the middle of the molecule is involved in forming a covalent phosphoglycerol thioester intermediate. The sequence around this cysteine is totally conserved in eubacterial and eukaryotic GAPDHs and is also present, albeit in a variant form, in the otherwise highly divergent archaebacterial GAPDH.
