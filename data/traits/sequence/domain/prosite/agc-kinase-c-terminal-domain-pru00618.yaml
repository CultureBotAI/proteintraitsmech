identifier: PROSITE:PRU00618
label: AGC-kinase C-terminal domain
definition: >-
  AGC kinase proteins are characterized by three conserved phosphorylation sites that critically regulate their function. The first one is located in an activation loop in the center of the kinase domain. The two other phosphorylation sites are located outside the kinase domain in a conserved region on its C-terminal side, the AGC-kinase C-terminal domain. These sites serves as phosphorylation-regulated switches to control both intra- and inter-molecular interactions. Without these priming phosphorylations, the kinases are catalytically inactive.
