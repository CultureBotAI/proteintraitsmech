identifier: PROSITE:PRU00931
label: Phospholipid methyltransferases (EC 2.1.1.17 and EC=2.1.1.71) family
definition: >-
  Phosphatidylethanolamine N-methyltransferase (EC 2.1.1.17) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to phosphatidylethanolamine to form phosphatidyl-N-methylethanolamine and S- adenosyl-L-homocysteine. Phosphatidyl-N-methylethanolamine N-methyltransferase (EC 2.1.1.71) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to phosphatidyl-N-methylethanolamine to form phosphatidyl-N- dimethylethanolamine and S-adenosyl-L-homocysteine. It also transfers a methyl group from S-adenosyl-L-methionine (SAM) to phosphatidyl-N- dimethylethanolamine to form phosphatidylcholine and S-adenosyl-L- homocysteine.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
