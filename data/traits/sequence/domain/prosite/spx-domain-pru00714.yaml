identifier: PROSITE:PRU00714
label: SPX domain
definition: >-
  SPX domain profile. Hydrophilic and poorly conserved SPX (SYG1, Pho81 and XPR11) domains, of about 180 residues, are found at the N-termini of various proteins, particularly signal transduction proteins. There are proteins harboring the SPX domain in all major eukaryotic kingdoms. SPX domains are composed of three subdomains, which are separated by two areas of low similarity. They are often (1) variable in sequence, (2) split due to insertions, or (3) fragmented due to deletions. The tripartite SPX domain could function as a sensor for inorganic phosphate (Pi) level and is most likely a domain for protein interaction.
