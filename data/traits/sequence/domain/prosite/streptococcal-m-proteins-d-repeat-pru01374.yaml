identifier: PROSITE:PRU01374
label: Streptococcal M proteins D repeat
definition: >-
  M proteins belong to a family of fibrous streptococcal surface proteins which represent major virulence factors due to their antiphagocytic activities. All M proteins share a common framework that includes a conserved signal peptide, a hypervariable amino terminus, a less variable central domain, and a highly conserved C-terminus. A number of repeat sequences (A, B, C and D repeats) follow the hypervariable region. Sequence conservation increases from the A repeats to D repeats.
