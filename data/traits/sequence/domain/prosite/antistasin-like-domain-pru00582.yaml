identifier: PROSITE:PRU00582
label: Antistasin-like domain
definition: >-
  Antistasin-like domain profile. Antistatin is a small, disulphide cross-linked serine protease inhibitor isolated from the salivary glands of the Mexican leech. It is a potent anticoagulant by virtue of its ability to inhibit factor Xa in the coagulation cascade. Antistatin also exhibits a strong antimetastatic activity. It contains internal repeats of a 25-26 amino acid sequence with a highly conserved pattern of 6 cysteine (Cys) and 2 glycine residues. Many metazoan proteins share sequence homology with this antistasin-like domain.
