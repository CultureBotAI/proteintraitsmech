identifier: PROSITE:PRU00582
label: Antistasin-like domain
definition: >-
  Antistatin is a small, disulphide cross-linked serine protease inhibitor isolated from the salivary glands of the Mexican leech. Many metazoan proteins share sequence homology with this antistasin-like domain.
