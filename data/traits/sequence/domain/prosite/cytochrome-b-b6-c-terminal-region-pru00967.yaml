identifier: PROSITE:PRU00967
label: Cytochrome b/b6 C-terminal region
definition: >-
  Cytochrome b/b6 profiles. In the mitochondrion of eukaryotes and in aerobic prokaryotes, cytochrome b is a component of respiratory chain complex III (EC 1.10.2.2) - also known as the bc1 complex or ubiquinol-cytochrome c reductase. This complex is the middle component of the mitochondrial respiratory chain, coupling the transfer of electrons from ubihydroquinone to cytochrome c with the generation of a proton gradient across the mitochondrial membrane. Every bc1 complex contains three common subunits with active redox centers (cytochrome b, cytochrome c1, and the "Rieske" [2Fe-2S] protein (ISP) (see <PDOC00177>)).
