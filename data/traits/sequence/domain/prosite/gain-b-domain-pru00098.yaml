identifier: PROSITE:PRU00098
label: GAIN-B domain
definition: >-
  The ~320-residue GAIN domain is an ancient domain that exists in primitive ancestor organisms, and is conserved in all adhesion-G-protein- coupled receptors (aGPCRs), all polycystic kidney disease 1 (PKD1)-like proteins and in other membrane-associated proteins like the sea urchin receptor for egg jelly protein (REJ). Functionally, the GAIN domain is both necessary and sufficient for autoproteolysis, suggesting an autoproteolytic mechanism whereby the overall GAIN domain fine-tunes the chemical environment.
