identifier: PROSITE:PRU01378
label: Peptidase family M32 domain
definition: >-
  The M32 family of Zn-dependent metallocarboxypeptidases (MCPs) contains a group of hydrolases, which although being broadly distributed among prokaryotic organisms, are only present in a few eukaryotes including some green algae and trypanosomatids.
