identifier: PROSITE:PRU00328
label: HRDC domain
definition: >-
  HRDC domain profile. The helicase and RNaseD C-terminal (HRDC) domain is an 80-amino acid domain usually found at the C-terminus of RecQ helicases and RNase D homologs from various organisms, including human, yeast and bacteria. The HRDC domain is involved in the binding of DNA to specific DNA structures (e.g. long-forked duplexes and Holliday junctions) that are formed during replication, recombination or transcription.
