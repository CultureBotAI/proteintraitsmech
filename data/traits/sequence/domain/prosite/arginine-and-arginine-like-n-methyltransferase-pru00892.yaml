identifier: PROSITE:PRU00892
label: Arginine and arginine-like N-methyltransferase.
definition: >-
  Guanidinoacetate N-methyltransferase (EC 2.1.1.2) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to guanidinoacetate to form creatine and S-adenosyl-L-homocysteine.
