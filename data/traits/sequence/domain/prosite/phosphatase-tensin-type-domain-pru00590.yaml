identifier: PROSITE:PRU00590
label: phosphatase tensin-type domain
definition: >-
  Tensin phosphatase and C2 domain profiles. Tensins constitute an eukaryotic family of lipid phosphatases that are defined by the presence of two adjacent domains: a lipid phosphatase domain and a C2-like domain. The tensin-type C2 lacks the canonical Ca(2+) ligands found in classical C2 domains (see <PDOC00380>), and in this respect it is similar to the C2 domains of PKC-type. The tensin-type C2 domain can bind phospholipid membranes in a Ca(2+) independent manner.
