identifier: PROSITE:PRU00836
label: HIG1 domain
definition: >-
  HIG1 domain profile. The hypoxia induced gene 1 (HIG1) or hypoglycemia/hypoxia inducible mitochondrial protein (HIMP1) is up-regulated by stresses of the microenvironment such as low oxygen or low glucose conditions. HIG1 is a mitochondrial inner membrane protein, which is ubiquitously expressed. It is predicted to be an integral membrane protein consisting of two hydrophobic helices, 21-23 residues in length that might tend to form a hairpin-like loop across the bilayer. HIG1 could be implied in apoptotic or cytoprotective signals. HIG1 is a member of a well conserved eukaryote protein family.
