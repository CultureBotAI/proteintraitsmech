identifier: PROSITE:PRU00657
label: Dicer double-stranded RNA-binding fold domain
definition: >-
  A typical eukaryotic Dicer consists of a helicase domain, a domain of unknown function, and a PAZ domain at the amino (N)-terminus as well as two ribonuclease III domains and a dsRNA-binding domain (dsRBD) at the carboxy (C)-terminus.
