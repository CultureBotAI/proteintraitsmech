identifier: PROSITE:PRU00356
label: Precorrin-6x reductase domain
definition: >-
  Precorrin-6x reductase domain profile. Cobalamins (vitamin B12), both as deoxyadenosylcobalamin and methylcobalamin, are involved as cofactors in a variety of enzymatic reactions and are synthesized by some bacteria and archaea. About thirty enzymes are required to manufacture cobalamins, some of the most complex nonpolymeric molecules biosynthesized in the cell. Cobalamin biosynthesis can be divided into three distinct sections.
