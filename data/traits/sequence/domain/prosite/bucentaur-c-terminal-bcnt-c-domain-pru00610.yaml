identifier: PROSITE:PRU00610
label: Bucentaur C-terminal (BCNT-C) domain
definition: >-
  Bucentaur C-terminal (BCNT-C) domain profile. Vertebrate BCNT (named after Bucentaur) protein is found in the nucleus and cytosol. Gene duplication of the ancestral BCNT gene leads to the h-type BCNT or craniofacial development protein 1 (CFDP1) gene and the ruminant-specific p97BCNT or craniofacial development protein 2 (CFDP2) gene. The h-type BCNT proteins contain a highly conserved 82-amino acid region at the C-terminus (BCNT-C) that is not present in p97BCNT. Instead ruminant p97BCNT contains a region derived from the endonuclease domain of a retrotransposable element RTE-1.
