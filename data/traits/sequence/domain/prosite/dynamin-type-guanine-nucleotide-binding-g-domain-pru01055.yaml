identifier: PROSITE:PRU01055
label: Dynamin-type guanine nucleotide-binding (G) domain
definition: >-
  Members of the dynamin GTPase family catalyze diverse membrane remodelling events in endocytosis, cell division, and plastid maintenance. The dynamin-type G domain consists of a central eight-stranded beta-sheet surrounded by seven alpha-helices and two one-turn helices. It contains the five canonical guanine nucleotide binding motifs (G1-5).
