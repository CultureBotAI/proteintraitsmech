identifier: PROSITE:PRU01431
label: PITP-like domain
definition: >-
  PITP-like domain profile. Phosphatidylinositol transfer proteins (PITPs) constitute a highly conserved family of proteins found in many organisms, including mammals, Caenorhabditis elegans (worms), Drosophila melanogaster (flies), and Dictyostelium discoideum (slime molds), but not in yeasts or plants. The PITP family is one of the two families of phosphoinositide transfer proteins that can bind and exchange one molecule of either phosphatidylinositol or phosphatidylcholine and facilitate the transfer of these lipids between different membrane compartments; the other is the structurally unrelated Sec14p family.
