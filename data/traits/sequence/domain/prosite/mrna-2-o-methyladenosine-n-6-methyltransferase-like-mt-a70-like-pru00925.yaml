identifier: PROSITE:PRU00925
label: mRNA (2'-O-methyladenosine-N(6)-)-methyltransferase-like (MT-A70-like)
definition: >-
  mRNA (2'-O-methyladenosine-N(6)-)-methyltransferase (EC 2.1.1.62) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to m(7)G(5')pppAm to form m(7)G(5')pppm(6)Am and S-adenosyl-L-homocysteine.
