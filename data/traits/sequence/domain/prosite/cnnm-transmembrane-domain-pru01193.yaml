identifier: PROSITE:PRU01193
label: CNNM transmembrane domain
definition: >-
  CNNM transmembrane domain profile. Proteins in the ancient conserved domain protein/cyclin M (CNNM) family are integral membrane proteins that are conserved from bacteria to humans. CNNM family members influence metal ion homeostasis through mechanisms that may not involve direct membrane transport of the ions. Structurally, CNNMs are complex proteins that contain an extracellular N-terminal domain preceding a transmembrane domain, a "Bateman module", which consists of two cystathionine- beta-synthase (CBS) domains (see <PDOC51371>), and a C-terminal cNMP (cyclic nucleotide monophosphate) binding domain (see <PDOC00691>).
