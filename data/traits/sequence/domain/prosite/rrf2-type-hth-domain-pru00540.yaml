identifier: PROSITE:PRU00540
label: Rrf2-type HTH domain
definition: >-
  Rrf2-type HTH domain profile. The rrf2-type HTH domain is a DNA-binding, winged helix-turn-helix (wHTH) domain of about 130 residues present in transcription regulators of the rrf2 family. This family of bacterial regulators is named after Desulfovibrio vulgaris rrf2, a regulator of the hmc operon which encodes iron-sulfur-containing proteins as well as other proteins involved in electron transport. Other rrf2-type HTH proteins are regulators of genes involved in nitrite or iron metabolism, or nitric oxide detoxification.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
