identifier: PROSITE:PRU00540
label: Rrf2-type HTH domain
definition: >-
  The rrf2-type HTH domain is a putative DNA-binding, winged helix-turn-helix (wHTH) domain of about 130 residues present in transcription regulators of the rrf2 family, involved in nitrite or iron metabolism. The C-terminal part of the domain contains 3 conserved cysteine residues that may bind an Fe-S cluster.
