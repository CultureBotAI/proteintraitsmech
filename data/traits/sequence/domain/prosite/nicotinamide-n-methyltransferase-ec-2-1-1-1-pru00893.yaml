identifier: PROSITE:PRU00893
label: Nicotinamide N-methyltransferase (EC 2.1.1.1)
definition: >-
  Nicotinamide N-methyltransferase (EC 2.1.1.1) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to nicotinamide to form 1-methylnicotinamide and S-adenosyl-L-homocysteine.
