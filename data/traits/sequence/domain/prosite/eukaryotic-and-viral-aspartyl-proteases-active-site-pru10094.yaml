identifier: PROSITE:PRU10094
label: Eukaryotic and viral aspartyl proteases active site
definition: >-
  Eukaryotic and viral aspartyl proteases signature and profiles. Aspartyl proteases (APs), also known as acid proteases, (EC 3.4.23.-) are a widely distributed family of proteolytic enzymes known to exist in vertebrates, fungi, plants, retroviruses and some plant viruses. APs use an Asp dyad to hydrolyze peptide bonds.
