identifier: PROSITE:PRU00521
label: G protein-coupled receptors family 1
definition: >-
  G-protein coupled receptors family 1 signature and profile. G-protein coupled receptors (also called R7G) are an extensive group of hormones, neurotransmitters, odorants and light receptors which transduce extracellular signals by interaction with guanine nucleotide- binding (G) proteins. The receptors that are currently known to belong to this family are listed below.
