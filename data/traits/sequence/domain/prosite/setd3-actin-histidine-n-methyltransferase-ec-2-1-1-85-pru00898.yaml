identifier: PROSITE:PRU00898
label: SETD3 actin-histidine N-methyltransferase (EC 2.1.1.85)
definition: >-
  SETD3 Actin-histidine N-methyltransferase (EC 2.1.1.85) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to L-histidine-[actin] to form N(tele)-methyl-L-histidine-[actin] and S-adenosyl-L-homocysteine.
