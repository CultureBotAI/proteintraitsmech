identifier: PROSITE:PRU00849
label: Sox C-terminal domain
definition: >-
  Bioinformatic analysis of the C-termini of subgroup F Sox family members from different species including humans, mice, rat, chicken and Xenopus revealed three conserved blocks including highly conserved residues. They were termed proline, charged, and serine according to the predominance of the respective amino acids. The charged block comprises a strong transactivating domain.
