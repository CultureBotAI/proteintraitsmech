identifier: PROSITE:PRU00071
label: Zinc finger Dof-type
definition: >-
  Like other zinc fingers the Dof domain has a dual activity: it binds DNA in a sequence-specific manner with the core binding site formed by the AAAG sequence and it can also mediates protein-protein interaction.
