identifier: PROSITE:PRU00350
label: Somatomedin B (SMB) domain
definition: >-
  The SMB domain of vitronectin has been demonstrated to interact with both the urokinase receptor and the plasminogen activator inhibitor-1 (PAI-1) and the conserved cysteines of the NPP1 somatomedin B-like domain have been shown to mediate homodimerization.
