identifier: PROSITE:PRU00990
label: (+)RNA virus helicase core domain
definition: >-
  (+)RNA virus helicase core domain profile. Helicases have been classified in 6 superfamilies (SF1-SF6). All of the proteins bind ATP and, consequently, all of them carry the classical Walker A (phosphate-binding loop or P-loop) (see <PDOC00017>) and Walker B (Mg2+-binding aspartic acid) motifs. The two largest superfamilies, commonly referred to as SF1 and SF2 (see <PDOC51192>), share similar patterns of seven conserved sequence motifs, some of which are separated by long poorly conserved spacers.
