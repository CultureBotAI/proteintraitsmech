identifier: PROSITE:PRU00882
label: DM13 domain
definition: >-
  DM13 domain profile. The DM13 domain has been identified in animal proteins containing a DOMON domain (see <PDOC50836>) likely to function as cytochromes involved in as yet unidentified redox reactions potentially related to protein hydroxylation or oxidative cross-linking. However, it is also found in bacteria. The DM13 domain contains a nearly absolutely conserved cysteine, which can be potentially involved in a redox reaction either as a nacked thiol group or by binding a prosthetic group like heme.
