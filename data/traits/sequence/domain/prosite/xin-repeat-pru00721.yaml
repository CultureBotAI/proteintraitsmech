identifier: PROSITE:PRU00721
label: Xin repeat
definition: >-
  Xin repeat profile. Xin (which means heart in Chinese) repeats are 16 amino acid tandem repeats found in all vertebrates, including mammals, birds, amphibians and fishes. They are present in at least two different muscle proteins, Xin and the closely related Xin-repeat protein 2 (XIRP2). The Xin repeat is an actin- binding motif, capable of binding to actin filaments and organizing microfilaments into loose networks. A minimum of 3 Xin repeats is required for the binding to actin filaments. The consensus sequence of the Xin repeats is G-D-V-[KQRS]-x(2)-[RKT]-W-L-F-E-T-[QRKT]-P-L-D.
