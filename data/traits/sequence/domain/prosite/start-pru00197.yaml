identifier: PROSITE:PRU00197
label: START
definition: >-
  START domain profile. The StAR-related lipid-transfer (START) domain is an about 200-210 residue lipid-binding motif, which is primarily involved in eukaryotic signaling mediated by lipid binding. Representatives of the START domain family have been shown to bind different ligands such as sterols (StAR protein) and phosphatidylcholine (PC-TP). Ligand binding by the START domain can also regulate the activities of other domains that co-occur with the START domain in multidomain proteins such as Rho-GAP, the homeodomain (see <PDOC00027>), and the thioesterase domain.
