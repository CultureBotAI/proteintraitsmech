identifier: PROSITE:PRU00351
label: Pannexin family
definition: >-
  Pannexin family profile. The pannexin family combines invertebrate gap junction proteins (innexins) and their vertebrate homologs. Gap junctions are composed of membrane proteins, which form a channel permeable for ions and small molecules connecting cytoplasm of adjacent cells. Although gap junctions provide similar functions in all multicellular organisms, until recently it was believed that vertebrates and invertebrates use unrelated proteins for this purpose. While the connexins family of gap junction proteins (see <PDOC00341>) is well- characterized in vertebrates, no homologs heve been found in invertebrates.
