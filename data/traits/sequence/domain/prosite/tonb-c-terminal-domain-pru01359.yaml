identifier: PROSITE:PRU01359
label: TonB C-terminal domain
definition: >-
  The TonB protein plays an essential role in the energy transduction system to drive active transport across the outer membrane (OM) using the proton-motive force of the cytoplasmic membrane of Gram-negative bacteria. The C-terminal domain (CTD) of TonB protein is known to interact with the conserved TonB box motif of TonB-dependent OM transporters, which likely induces structural changes in the OM transporters.
