identifier: PROSITE:PRU00407
label: Nuclear hormone receptors DNA-binding domain
definition: >-
  Nuclear hormone receptors DNA-binding domain signature and profile. Nuclear hormone receptors are ligand-activated transcription factors that regulate gene expression by interacting with specific DNA sequences upstream of their target genes. In vertebrates, these proteins regulate diverse biological processes such as pattern formation, cellular differentiation and homeostasis.
