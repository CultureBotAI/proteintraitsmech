identifier: PROSITE:PRU00144
label: Chitin-binding type-2 domain
definition: >-
  Chitin-binding type-2 domain profile. The species distribution of the chitin-binding type-2 domain is complementary to the chitin-binding type-1 domain (see <PDOC00025>). The type-2 is mainly found in animal and baculovirus proteins while the type-1 is found in plant and fungi. Type-2 is characterized by having a 6-cysteine motif: C-x(13,20)-C-x(5,6)-C-x(9,19)-C-x(10,14)-C-x(4,14)-C and several aromatic residues.
