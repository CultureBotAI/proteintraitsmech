identifier: PROSITE:PRU01380
label: Zinc finger reverse gyrase N-terminal-type
definition: >-
  Reverse gyrase (RG) is an ATP-dependent topoisomerase that is only found in archaeal and bacterial hyperthermophiles (above 80 degre C) and thermophiles (65-80 degre C). RGs share a modular structure with an N- terminal cysteine-rich region (a zinc finger) preceding a helicase domain that is followed by a C-terminal topoisomerase domain. The helicase domain is subdivided into H1 and H2 domains that are flexibly linked. Some RG topoisomerase domains also include a cysteine-rich region that has been proposed to form a second zinc finger. The two zinc-finger motifs are found to be important to the structure stability maintenance of RG at high temperature. The N-terminal zinc finger firmly attaches the H1 domain to the topoisomerase domain and may contribute to double-strand DNA (dsDNA) binding.
