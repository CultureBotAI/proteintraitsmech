identifier: PROSITE:PRU00609
label: Glutamine amidotransferase (GATase) type 2 domain
definition: >-
  GATases are enzymes that catalyze the removal of the ammonia group from glutamine and transfer this group to a substrate to form a new carbon-nitrogen group. In the GATase type 2 domain the active site is formed by a cysteine present at the N-terminal extremity.
