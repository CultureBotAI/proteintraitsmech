identifier: PROSITE:PRU01243
label: Alt a 1 (AA1)-like domain
definition: >-
  AA1-like proteins are fungal toxins that can induce plant defense responses and cell death. They may contribute to virulence by protecting the cell wall, thus allowing fungal growth to be maintained and preventing the recognition of degraded beta-1,3-glucan by the plant. AA1 proteins comprise ~150 amino acids and contain two pairs of highly conserved disulfide bonds.
