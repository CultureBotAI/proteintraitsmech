identifier: PROSITE:PRU10140
label: Glycosyl hydrolases family 9 (GH9) active site D
definition: >-
  Three conserved regions in these enzymes are centered on conserved residues which have been shown to be important for the catalytic activity. The first region contains the characteristic DAGD motif, where the C-terminal D acts as the catalytic base that extracts a proton from the nucleophilic water.
