identifier: PROSITE:PRU01039
label: Mu-type HTH domain
definition: >-
  Mu-type HTH domain profile. Transposons are mobile genetic elements that move from one DNA site to another within their host's genome, often with profound biological consequences. The Mu genome is the largest and most efficient transposon known. The Mu transposase (MuA) is a multidomain protein, which is responsible for translocation of the Mu genome. Mu transposase can be divided into three structurally distinct domains, each with specific functions. The amino- terminal domain (30 kDa) is responsible for sequence-specific DNA binding and can further be subdivided into two separate subdomains, which bind an internal activation sequence (IAS) and the ends of the phage genome, respectively.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
