identifier: PROSITE:PRU00838
label: SCA7 domain
definition: >-
  SCA7 domain profile. SAGA (Spt-Ada-Gcn5 acetyltransferase), a coactivator complex involved in chromatin remodelling, harbors both histone acetylation and deubiquitination activities. ATXN7/Sgf73 and ATXN7L3, two subunits of the SAGA deubiquitination module, contain an ~50-residue SCA7 domain characterized by an atypical zinc- finger (ZnF) with a Cys-X(9,10)-Cys-X(5)-Cys-X(2)-His motif, which is characterized by a long sequence insertion between the first two zinc coordinating residues. The SCA7 domain is found exclusively in members of the ATXN7 gene family, which includes two distinct subunits of SAGA complexes: ATXN7 and ATXN7L3 orthologues.
