identifier: PROSITE:PRU01172
label: Pentraxin (PTX) domain
definition: >-
  Pentraxins (earlier also termed pentaxins), named for their homopentameric quaternary structure, are a superfamily of multifunctional conserved proteins that are characterized by a cyclic multimeric structure and by the presence in their carboxyl-terminal of an ~200 aa-long conserved domain, called pentraxin (PTX) domain.
