identifier: PROSITE:PRU01200
label: pG2 pseudoGTPase domain
definition: >-
  pG1 and pG2 pseudoGTPase domains profiles. GTPases bind to guanosine triphosphate (GTP), hydrolyze gamma-phosphate, release guanosine diphosphate (GDP) and then rebind GTP, a process termed 'GTPase cycling'. This cycling, and consequent signal transduction, is regulated by GTPase activating proteins (GAPs) (for GTP hydrolysis) and guanine nucleotide exchange factors (GEFs) (for GDP release). The Ras superfamily of small GTPases consists of five subgroups (Ras, Rho, Rab, Ran and Arf) that act as molecular switches in broad and diverse cellular pathways and processes.
