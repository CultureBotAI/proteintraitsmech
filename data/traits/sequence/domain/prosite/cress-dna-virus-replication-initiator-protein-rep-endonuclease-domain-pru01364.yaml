identifier: PROSITE:PRU01364
label: CRESS-DNA virus replication initiator protein (Rep) endonuclease domain
definition: >-
  The Rep endonuclease domain is characterized by rolling circle replication (RCR) motifs I through III, which are important for RCR initiation and termination. Motif I, UUTU (U denotes hydrophobic residues), is thought to be involved in the recognition of the origin of replication. Motif II, HU(H/Q), is involved in the coordination of divalent metal ions, Mg(2+) or Mn(2+), which are essential for endonuclease activity at the origin of replication. Motif III (YxxK, where x is any amino acid) is involved in dsDNA cleavage and subsequent covalent attachment of the Rep through the catalytic tyrosine residue to the 5' end of the cleaved product.
