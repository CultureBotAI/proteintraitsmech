identifier: PROSITE:PRU00469
label: Zinc finger TFIIB-type
definition: >-
  Zinc finger TFIIB-type profile. In eukaryotes the initiation of transcription of protein encoding genes by the polymerase II complexe (Pol II) is modulated by general and specific transcription factors. The general transcription factors operate through common promoters elements (such as the TATA box). At least seven different proteins associate to form the general transcription factors: TFIIA, -IIB, -IID, -IIE, -IIF, -IIG, and -IIH.
