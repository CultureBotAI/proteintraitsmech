identifier: PROSITE:PRU01348
label: Ketosynthase family 3 (KS3) domain
definition: >-
  Ketoacyl synthases (KSs) (more officially 3-oxoacyl synthases and also known as beta-ketoacyl synthases) are the condensing enzymes that catalyze the reaction of acyl-coenzyme A (acyl-CoA) or acyl-acyl carrier protein (acyl-ACP) with malonyl-CoA, malonyl-ACP, or occasionally other substrates.
