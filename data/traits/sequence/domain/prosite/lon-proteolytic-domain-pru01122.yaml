identifier: PROSITE:PRU01122
label: Lon proteolytic domain
definition: >-
  The Lon proteolytic domain forms peptidase family S16 of clan SJ. It has a serine-lysine catalytic dyad in which a lysine assists the catalytic serine in proteolytic cleavage.
