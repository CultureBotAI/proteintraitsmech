identifier: PROSITE:PRU01029
label: Pestivirus nonstructural protein 2 (NS2) protease domain
definition: >-
  The C-terminal-most domain of NS2 is a cysteine autoprotease responsible for NS2-3 cleavage. The catalytic triad is formed by His, Glu, and Cys. The pestivirus NS2 protease domain contains five Cys and one His organized in a linear fashion, suggesting the presence of a mononuclear ZnB site. The pestivirus NS2 protease domain forms peptidase family C74.
