identifier: PROSITE:PRU00433
label: Cytochrome c domain
definition: >-
  C-type cytochrome superfamily profiles. In proteins belonging to the c-type cytochrome family, the heme group is covalently attached by thioether bonds to two conserved cysteine residues located in the cytochrome c center. Cytochromes c typically function in electron transfer, but c-type cytochrome centers are also found in the active sites of many enzymes, and in eukaryotic cells, cytochrome c has also a role in apoptosis.
