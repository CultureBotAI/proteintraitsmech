identifier: PROSITE:PRU01264
label: DEUBAD (DEUBiquitinase ADaptor) domain
definition: >-
  DEUBAD (DEUBiquitinase ADaptor) domain profile. Protein ubiquitination is a fundamental mechanism that affects nearly all aspects of cellular life. Deubiquitinating enzymes (DUBs) play important roles in ubiquitin (Ub) signaling by Ub cleavage from adducts. The Ub C-terminal hydrolase (UCH) family of deubiquitinases (DUBs) contains four members including UCH37 (also called ubiquitin carboxy-terminal hydrolase isozyme L5, UCHL-5) and BAP1 which share high similarity in the catalytic domain (UCH) and the C-terminal region, termed the UCH37-like domain (ULD), responsible for binding interaction partners.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
