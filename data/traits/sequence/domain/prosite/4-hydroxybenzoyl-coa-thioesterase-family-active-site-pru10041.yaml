identifier: PROSITE:PRU10041
label: 4-hydroxybenzoyl-CoA thioesterase family active site
definition: >-
  4-hydroxybenzoyl-CoA thioesterase family active site. 4-hydroxybenzoyl-CoA thioesterase (EC 3.1.2.23) is an enzyme from Pseudomonas CBS-3, a soil-dwelling microbe that survives on 4-chlorobenzoate as its sole carbon source. This enzyme catalyzes the last of the three steps in the pathway from 4-chlorobenzoate to hydroxybenzoate, the cleavage of the thioester bond of 4-hydroxybenzoyl-CoA to form hydroxybenzoate.
