identifier: PROSITE:PRU00648
label: Signal peptide
definition: >-
  Twin arginine translocation (Tat) signal profile. The twin-arginine translocation (Tat) pathway serves the role of transporting folded proteins across energy-transducing membranes. Homologs of the genes that encode the transport apparatus occur in archaea, bacteria, chloroplasts, and plant mitochondria. In bacteria, the Tat pathway catalyzes the export of proteins from the cytoplasm across the inner/cytoplasmic membrane. In chloroplasts, the Tat components are found in the thylakoid membrane and direct the import of proteins from the stroma. The Tat pathway acts separately from the general secretory (Sec) pathway, which transports proteins in an unfolded state.
