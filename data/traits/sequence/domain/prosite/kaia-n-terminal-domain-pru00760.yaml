identifier: PROSITE:PRU00760
label: KaiA N-terminal domain
definition: >-
  KaiA N- and C-terminal domain profiles. Cyanobacteria are the most primitive organisms known to exhibit circadian rhythms. KaiA, kaiB and kaiC (see <PDOC51146>) constitute the circadian clock machinery in cyanobacteria, and kaiA activates kaiBC expression whereas kaiC represses it. Apparent homologues of kaiB and kaiC are found among noncyanobacterial eubacteria and the archaea. However kaiA appears confined within the cyanobacteria, which are the only prokaryotes with demonstrated circadian rhythms.
