identifier: PROSITE:PRU01368
label: Alphaherpesvirus glycoprotein L (gL) domain
definition: >-
  Two glycoprotein complexes are conserved throughout the three herpesvirus subfamilies: the trimeric glycoprotein B (gB) that functions as a membrane fusogen and the heterodimeric glycoprotein H/glycoprotein L (gH/gL), the role of which is less clearly defined. The intrinsic structural plasticity of gH/gL enables it to function as a signal integration machine that can accept diverse regulatory inputs and convert them into a "trigger" signal that activates the fusogenic ability of gB.
