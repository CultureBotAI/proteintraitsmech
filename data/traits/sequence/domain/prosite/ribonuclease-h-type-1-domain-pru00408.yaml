identifier: PROSITE:PRU00408
label: Ribonuclease H type-1 domain
definition: >-
  Ribonuclease (RNase) H type-I and type-2 domains profiles. Ribonuclease H (RNase H) (EC 3.1.26.4), one member of the ribonuclease family, recognizes and cleaves the RNA strand of RNA-DNA heteroduplexes. The enzyme is widely present in all three kingdoms of living organisms, including bacteria, archaea, and eukaryotes, and their counterpart domains are also found in reverse transcriptases (RTs) from retroviruses and retroelements. RNases H are classified into two evolutionarily unrelated families, type-I and type-II RNase H, with common structural features of the catalytic domain but different range of substrates for enzymatic cleavage.
