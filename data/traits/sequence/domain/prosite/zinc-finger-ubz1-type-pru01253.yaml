identifier: PROSITE:PRU01253
label: Zinc finger UBZ1-type
definition: >-
  The ubiquitin-binding zinc finger (UBZ) is a type of zinc- coordinating beta-beta-alpha fold domain found mainly in proteins involved in DNA repair and transcriptional regulation. UBZ domains coordinate a zinc ion with cysteine or histidine residues; depending on their amino acid sequence, UBZ domains are classified into several families. Type 1 UBZs are CCHH-type zinc fingers found in tandem UBZ domains of TAX1-binding protein 1 (TAX1BP1).
