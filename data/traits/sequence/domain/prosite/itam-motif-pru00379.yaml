identifier: PROSITE:PRU00379
label: ITAM motif
definition: >-
  The ITAM is an immunoreceptor tyrosine-based activation motif. Phosphorylation of the two ITAM tyrosines is a critical event in signal transduction. This phosphorylation was found to reflect activation of the src family kinase Lyn and Syk.
