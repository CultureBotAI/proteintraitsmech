identifier: PROSITE:PRU00074
label: EAL
definition: >-
  EAL domain profile. The EAL domain is an around 250-amino acid signaling domain. It is made of four conserved regions and has been named EAL according to a conserved sequence within the second of these regions. The EAL domain is found in a large number of eubacterial multi-domain proteins involved in signal transduction.
