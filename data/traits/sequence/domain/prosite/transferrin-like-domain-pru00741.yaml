identifier: PROSITE:PRU00741
label: Transferrin-like domain
definition: >-
  The transferrin family is a group of glycosylated proteins found in both vertebrates and invertebrates. Most family members contain two transferrin-like domains of around 340 amino acids, the result of an ancient duplication event.
