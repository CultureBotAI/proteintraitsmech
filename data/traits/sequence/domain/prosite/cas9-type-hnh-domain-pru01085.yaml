identifier: PROSITE:PRU01085
label: Cas9-type HNH domain
definition: >-
  Cas9-type HNH domain profile. The CRISPR (clustered regularly interspaced short palindromic repeat)-Cas (CRISPR associated) system is a naturally occuring, adaptative microbial immune system for defense against invading phages and other mobile genetic elements. Type II CRISPR-Cas systems use an RNA-guided DNA endonuclease, Cas9, to generate double strand breaks in invasive DNA during an adaptative bacterial immune response. Cas9 proteins are abundant across the bacterial kingdom, but vary widely in both sequence and size.
