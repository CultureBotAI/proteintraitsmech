identifier: PROSITE:PRU00995
label: Toprim domain
definition: >-
  Toprim domain profile. The Toprim (topoisomerase-primase) domain is a structurally conserved domain of ~100 amino acids that is found in bacterial DnaG-type primases, small primase-like proteins from bacteria and archaea, type IA and type II topoisomerases, bacterial and archaeal nucleases of the OLD family and bacterial DNA repair proteins of the RecR/M family.
