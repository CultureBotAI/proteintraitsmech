identifier: PROSITE:PRU00401
label: RPEL repeat
definition: >-
  RPEL (RPxxxEL) repeats have been shown to be required for unpolymerized actin binding and proteins containing RPEL repeats are able to modify cell shape and/or are important in the regulation of gene expression by the actin cytoskeleton.
