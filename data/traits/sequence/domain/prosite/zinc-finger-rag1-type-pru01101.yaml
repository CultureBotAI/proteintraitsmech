identifier: PROSITE:PRU01101
label: Zinc finger RAG1-type
definition: >-
  Zinc finger RAG1-type profile. The development of B and T cells depends on the rearrangement of variable (V), diversity (D), and joining (J) gene segments to produce mature Ig and T cell receptor coding regions. This rearrangement process, known as V(D)J recombination is initiated by the complex, multi-domain proteins RAG1 and RAG2. The RAG proteins catalyze DNA cleavage in the first phase of the reaction using a recombination signal sequence (RSS) that flanks V, D and J segments.
