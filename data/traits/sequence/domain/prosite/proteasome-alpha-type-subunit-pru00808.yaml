identifier: PROSITE:PRU00808
label: Proteasome alpha-type subunit
definition: >-
  Proteasome alpha-type subunit signature and profile. The proteasome (or macropain) (EC 3.4.25.1) is a multicatalytic proteinase complex that seems to be involved in an ATP/ubiquitin-dependent nonlysosomal proteolytic pathway. The core of this 2.5 MDa enzyme complex is formed by the 20S proteasome (core particle, CP), a barrel-shaped protease of about 700 KDa that associates with one or two 19S regulatory complexes. The 20S proteasome subunits can be classified, on the basis of sequence similarities, into two related families, alpha and beta (see <PDOC00668>). The 20S proteasome is ubiquitous in archaea and in eukaryotes. In bacteria, the 20S has been found only in actinomycetes.
