identifier: PROSITE:PRU00064
label: Death
definition: >-
  Death domain profile. The death domain (FAS/TNF cytosolic interaction domain) has first been described as a region in the cytoplasmic tail of the 75 Kd TNF receptor (TNFR-1) (see <PDOC00561>) which is involved in TNF-mediated cell death signaling. A corresponding region is found in the cytoplasmic tail of FAS/APO1 another surface receptor inducing apoptotic cell death. This region mediates self-association of these receptors, thus giving the signal to downstream events leading to apoptosis.
