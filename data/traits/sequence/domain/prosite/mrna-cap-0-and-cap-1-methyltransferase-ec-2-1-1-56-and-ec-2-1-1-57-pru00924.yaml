identifier: PROSITE:PRU00924
label: mRNA cap 0 and cap 1 methyltransferase (EC 2.1.1.56 and EC 2.1.1.57)
definition: >-
  mRNA (guanine-N(7))-methyltransferase (EC 2.1.1.56) is an enzyme that transfers a methyl group from SAM to G(5')pppR-RNA to form m(7)G(5')pppR-RNA and SAH. mRNA (nucleoside-2'-O-)-methyltransferase (EC 2.1.1.57) is an enzyme that transfers a methyl group from SAM to m(7)G(5')pppR-RNA to form m(7)G(5')pppRm-RNA and SAH.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
