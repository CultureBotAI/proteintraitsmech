identifier: PROSITE:PRU01073
label: DNA-binding recombinase domain
definition: >-
  DNA-binding recombinase domain profile. The large serine recombinases (LSRs) are DNA-rearranging enzymes that are members of the serine recombinase or resolvase/invertase superfamily. Most resolvases/invertases have a catalytic domain of ~150 residues at their amino terminus (see <PDOC00334>), followed by a small, helix-turn-helix (HTH) DNA- binding domain. The LSRs share a similar amino-terminal catalytic domain, but have much larger carboxyl-terminal regions that range in size from ~300 residues to ~550 residues. The C-terminal region of the LSRs is comprised of multiple structural domains and is responsible for coordination of unique LSRs activities.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
