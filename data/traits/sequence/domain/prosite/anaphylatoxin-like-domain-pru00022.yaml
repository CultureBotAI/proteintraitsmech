identifier: PROSITE:PRU00022
label: Anaphylatoxin-like domain
definition: >-
  Anaphylatoxin domain signature and profile. Anaphylatoxins are mediators of local inflammatory process that act by inducing smooth muscle contraction. There are three different anaphylatoxins: C3a, C4a and C5a. They are peptides of about 75 amino-acid residues that are derived from the proteolytic degradation of complement C3, C4 and C5 and which contains six disulfide-bonded cysteines (see the schematic representation below).
