identifier: PROSITE:PRU00871
label: Arterivirus nsp2 cysteine protease (AV CP) domain
definition: >-
  The AV CP is an unusual Cys protease with amino acid sequence similarities to both papain-like and chymotrypsin-like proteases. The catalytic dyad is composed of Cys and His residues. The AV CP domain forms peptidase family C33.
