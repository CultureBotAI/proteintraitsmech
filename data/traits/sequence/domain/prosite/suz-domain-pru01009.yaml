identifier: PROSITE:PRU01009
label: SUZ domain
definition: >-
  SUZ domain profile. The SUZ domain is found in a wide range of eukaryotes including animals, fungi, Dictyostelium, plants, and the apicomplexan Plasmodium falciparum. The SUZ domain shows a strong association with known RNA-binding domains: it is fused with R3H (see <PDOC51061>) and RRM domains and RGG repeats in previously characterized multidomain RNA-binding proteins:
