identifier: PROSITE:PRU00952
label: tRNA (adenine(57)-N(1)/adenine(58)-N(1) or adenine(58)-N(1))-
definition: >-
  tRNA (adenine(58)-N(1))-methyltransferase (EC 2.1.1.220) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to adenine(58) in tRNA to form N(1)-methyladenine(58) in tRNA and S-adenosyl-L- homocysteine. tRNA (adenine(57)-N(1)/adenine(58)-N(1))-methyltransferase (EC=2.1.1.219) is an enzyme that transfers a methyl group from the S-adenosyl-L-methionine (SAM) to adenine(57)/adenine(58) in tRNA to form N(1)-methyladenine57/N(1)- methyladenine58 in tRNA and S-adenosyl-L- homocysteine.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
