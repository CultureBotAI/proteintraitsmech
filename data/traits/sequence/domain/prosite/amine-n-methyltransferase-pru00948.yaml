identifier: PROSITE:PRU00948
label: Amine N-methyltransferase
definition: >-
  Amine N-methyltransferase (EC 2.1.1.49) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to an amine to form a methylated amine and S-adenosyl-L-homocysteine.
