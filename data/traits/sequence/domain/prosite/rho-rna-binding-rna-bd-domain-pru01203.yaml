identifier: PROSITE:PRU01203
label: Rho RNA-binding (RNA-BD) domain
definition: >-
  Rho RNA-binding (RNA-BD) domain profile. The Rho factor is a ring-shaped ATP-dependent homo-hexameric helicase that mediates transcription termination in most prokaryotic cells by disengaging the transcription elongation complex formed by the RNA polymerase, DNA, and the nascent RNA transcript. Rho binds either single-stranded DNA or RNA with similar affinities and has the highest affinity towards cytidine-containing nucleic acids. Remarkably, Rho becomes activated only when it is bound to RNA. Rho protomers have an RNA-binding region at the N-terminus linked by a connector loop to a C-terminal ATPase domain.
