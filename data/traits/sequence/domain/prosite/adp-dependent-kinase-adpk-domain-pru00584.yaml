identifier: PROSITE:PRU00584
label: ADP-dependent kinase (ADPK) domain
definition: >-
  ADP-dependent kinase (ADPK) domain profile. Although ATP is the most common phosphoryl group donor for kinases, certain hyperthermophilic archaea, such as Thermococcus litoralis and Pyrococcus furiosus, utilize unusual ADP-dependent glucokinases (ADPGKs) and phosphofructokinases (ADPPKKs) in their glycolytic pathways [1-3]. ADPGKs and ADPPFKs exhibit significant similarity, and form an ADP-dependent kinase (ADPK) family, which was tentatively named the PFKC family. A ~460-residue ADPK domain is also found in a bifunctional ADP-dependent gluco/phosphofructo- kinase (ADP-GK/PFK) from Methanococcus jannaschii as well as in homologous hypothetical proteins present in several eukaryotes.
