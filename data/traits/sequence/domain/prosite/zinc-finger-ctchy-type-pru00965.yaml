identifier: PROSITE:PRU00965
label: Zinc finger CTCHY-type
definition: >-
  Zinc finger CHY-type and CTCHY-type profiles. Pirh2 is an eukaryotic ubiquitin protein ligase, which has been shown to promote p53 degradation in mammals. Pirh2 physically interacts with p53 and promotes ubiquitination of p53 independently of MDM2. Like MDM2, Pirh2 is thought to participate in an autoregulatory feedback loop that controls p53 function. Pirh2 proteins contain three distinct zinc fingers, the CHY-type, the CTCHY-type which is C-terminal to the CHY-type zinc finger and a RING finger (see <PDOC00449>). The CHY-type zinc finger has no known functions but the region encompassing the CTCHY-type zinc finger is required for binding to p53 in mammals.
