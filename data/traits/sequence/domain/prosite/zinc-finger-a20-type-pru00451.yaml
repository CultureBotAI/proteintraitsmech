identifier: PROSITE:PRU00451
label: Zinc finger A20-type
definition: >-
  Zinc finger A20-type profile. NF-kappaB transcription factors mediate the effects of pro-inflammatory cytokines such as TNF-alpha and interleukin-1 beta. Failure to downregulate NF-kappaB transcriptional activity results in chronic inflammation and cell death. It has been shown that A20 protein can downregulates NF-kappaB signaling by targeting receptor interacting protein (RIP), an essential mediator of the proximal TNF receptor 1 (TNFR1) signalling complex, to the proteasome.
