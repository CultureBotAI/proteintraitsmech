identifier: PROSITE:PRU00545
label: Scorpion short toxin chloride channel inhibitor subfamily
definition: >-
  Short scorpion toxin chloride channel inhibitors are short-chain neurotoxins (SCNs), which block small-conductance chloride channels. They are 30-40-residue long and contain four intramolecular disulfide bridges, which have been assigned as C1-C4, C2-C6, C3-C7 and C5-C8.
