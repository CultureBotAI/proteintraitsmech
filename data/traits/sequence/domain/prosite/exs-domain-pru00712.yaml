identifier: PROSITE:PRU00712
label: EXS domain
definition: >-
  EXS domain profile. The EXS domain was named after the yeast ERD1, the human XPR1, and the yeast SYG1. In contrast to the SYG1 and XPR1 proteins, which have both a SPX and EXS domain, the majority of proteins in yeast having one of these domains do not harbor the other. In Arabidopsis, only the members of the PHO1 proteins family possess both a SPX and EXS domain. The function of the EXS domain is unknown, although it could be involved in either phosphate transport or sensing or in sorting proteins to endomembrane.
