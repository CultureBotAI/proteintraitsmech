identifier: PROSITE:PRU00520
label: Acylphosphatase-like domain
definition: >-
  Acylphosphatase-like domain signatures and profile. Acylphosphatase (EC 3.6.1.7) catalyzes the hydrolysis of various acyl phosphate carboxyl-phosphate bonds such as carbamyl phosphate, succinyl phosphate, 1,3-diphosphoglycerate, etc. The physiological role of this enzyme is not yet clear. Acylphosphatase is a small protein of around 100 amino-acid residues. Two different isoenzymes are expressed in mammalian tissues: muscle type (MT) acylphosphatase is prevalently found in the skeletal muscle and heart, whereas the organ common type (CT) acylphosphatase is expressed in erythrocytes, brain and testis.
