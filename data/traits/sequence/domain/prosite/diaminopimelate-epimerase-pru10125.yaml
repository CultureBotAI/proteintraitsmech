label: Diaminopimelate epimerase
definition: >-
  Diaminopimelate epimerase signature. Diaminopimelate epimerase (EC 5.1.1.7) catalyzes the isomeriazation of L,L- to D,L-meso-diaminopimelate in the biosynthetic pathway leading from aspartate to lysine.
