identifier: PROSITE:PRU01143
label: Zinc finger CCHHC-type
definition: >-
  Zinc finger CCHHC-type profile. Zinc finger (ZF) proteins are a large family of metalloproteins that utilize zinc for structural purposes. Zinc coordinates to a combination of cysteine thiol and histidine imidazole residues within the ZF polypetide sequence resulting in a folded and functional protein. The CCHHC family of ZFs is a small family of "nonclassical" ZFs that are essential for the development of the central nervous system. These proteins have up to seven putative zinc- binding sequences, usually arranged in sets of two or more sequences. The CCHHC-type zinc finger is able to bind specific double-stranded DNA sequences.
