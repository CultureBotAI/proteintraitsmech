identifier: PROSITE:PRU00703
label: CBS domain
definition: >-
  CBS domains act as autoinhibitory regulatory units in some proteins and activate or further inhibit protein function upon binding to adenosine nucleotides (AMP, ADP, ATP, S-adenosyl methionine, NAD, diadenosine polyphosphates).
