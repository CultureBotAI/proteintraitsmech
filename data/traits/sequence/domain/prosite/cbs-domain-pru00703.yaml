identifier: PROSITE:PRU00703
label: CBS domain
definition: >-
  CBS domain profile. CBS domains contain about 60 amino acid residues and occur as tandem pairs in a variety of proteins in bacteria, archaea, and eukaryotes. They are mainly found in proteins that are regulated by adenosyl metabolites. Depending on the protein in which they occur, CBS domains have been proposed to affect multimerization and sorting of proteins, channel gating, and ligand binding. However, recent experiments revealing that CBS domains can bind adenosine-containing ligands such ATP, AMP, or S-adenosylmethionine have led to the hypothesis that CBS domains function as sensors of intracellular metabolites.
