identifier: PROSITE:PRU00455
label: Zinc finger SIAH-type
definition: >-
  Zinc finger SIAH-type profile. SINA/Siah family proteins represent mammalian homologs of the Drosophila SINA (seven in absentia) protein. SINA is required for R7 photoreceptor cell differentiation within the sevenless pathway. Members of this family are E3 ubiquitin ligases that regulate ubiquitination and protein degradation. Siahs are known to recognize several target proteins including Deleted in Colorectal Cancer (DCC), synaptophysin and Numb and promote their degradation.
