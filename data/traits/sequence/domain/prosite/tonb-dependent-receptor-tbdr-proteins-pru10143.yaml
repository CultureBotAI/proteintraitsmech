identifier: PROSITE:PRU10143
label: TonB-dependent receptor (TBDR) proteins
definition: >-
  The C-terminal domain (CTD) of TonB protein has a globular structure of ~100 residues and interacts with a conserved TonB box motif located at the N-terminus of TBDRs, which likely induces structural changes in the outer membrane transporters.
