identifier: PROSITE:PRU01273
label: SWIB/MDM2 domain
definition: >-
  SWIB/MDM2 domain profile. The SWIB/MDM2 domain is largely common in Eukaryota and SWIB/MDM2 proteins have been localized to the mitochondria, nucleus, chloroplast, and cytoplasm within a variety of organisms. Two broad groups of SWIB/MDM2 domains have been identified. The first group is involved in p53 binding and identified in MDM2 oncoproteins.
