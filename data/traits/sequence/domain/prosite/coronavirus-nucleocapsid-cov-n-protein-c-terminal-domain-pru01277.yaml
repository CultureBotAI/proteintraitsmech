identifier: PROSITE:PRU01277
label: Coronavirus nucleocapsid (CoV N) protein C-terminal domain
definition: >-
  CoV N proteins contain two structured domains: the N-terminal domain (NTD; also called RBD), which is responsible for RNA binding, and the C- terminal domain (CTD; also called DD), which mediates oligomerization and RNA binding.
