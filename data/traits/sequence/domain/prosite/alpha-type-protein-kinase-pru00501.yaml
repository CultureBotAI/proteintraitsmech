identifier: PROSITE:PRU00501
label: Alpha-type protein kinase
definition: >-
  Alpha-type protein kinase domain profile. The alpha-kinases were initially identified because of the experimentally observed ability of EF-2 kinase to phosphorylate elongation factor-2. It was shown that the EF-2 kinase and the myosin heavy chain kinase A (MHCK A) share a conserved region of about 250 amino acids, the alpha-kinase domain. The name alpha-kinase was suggested for the family according to existing evidence that eIF-2 and MHCK A phosphorylate amino acids located within alpha- helices whereas classical kinase proteins phosphorylate amino acids within loops. Alpha-kinases are multi-domain proteins with a wide variety of domains present in the family.
