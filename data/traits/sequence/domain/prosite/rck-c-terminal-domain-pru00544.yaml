identifier: PROSITE:PRU00544
label: RCK C-terminal domain
definition: >-
  The C-terminal part of the regulators of K+ conductance (RCK) domain is less conserved among RCK domains, being absent in some. It is predicted to bind unidentified ligands and to regulate sulfate, sodium and other transporters. It forms an extention of the dimer interface and further stabilizes the RCK homodimer.
