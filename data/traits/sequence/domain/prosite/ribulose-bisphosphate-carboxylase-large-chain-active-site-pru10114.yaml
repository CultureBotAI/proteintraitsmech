identifier: PROSITE:PRU10114
label: Ribulose bisphosphate carboxylase large chain active site
definition: >-
  Ribulose bisphosphate carboxylase large chain active site. Ribulose bisphosphate carboxylase (EC 4.1.1.39) (RuBisCO) catalyzes the initial step in Calvin's reductive pentose phosphate cycle in plants as well as purple and green bacteria. It consists of a large catalytic unit and a small subunit of undetermined function. In plants, the large subunit is coded by the chloroplastic genome while the small subunit is encoded in the nuclear genome. Molecular activation of RuBisCO by CO2 involves the formation of a carbamate with the epsilon-amino group of a conserved lysine residue. This carbamate is stabilized by a magnesium ion.
