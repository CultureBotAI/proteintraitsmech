identifier: PROSITE:PRU00365
label: L27 domain
definition: >-
  The L27 domain is a specific protein-protein interaction module capable of forming heteromeric complexes that can integrate multiple scaffold proteins into supramolecular assemblies required for establishment and maintenance of cell polarity.
