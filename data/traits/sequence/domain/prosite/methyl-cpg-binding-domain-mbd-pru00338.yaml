identifier: PROSITE:PRU00338
label: Methyl-CpG-binding domain (MBD)
definition: >-
  Methyl-CpG-binding domain (MBD) profile. Methylation at CpG dinucleotide, the most common DNA modification in eukaryotes, has been correlated with gene silencing associated with various phenomena such as genomic imprinting, transposon and chromosome X inactivation, differenciation, and cancer. Effects of DNA methylation are mediated through proteins which bind to symmetrically methylated CpGs. Such proteins contain a specific domain of ~70 residues, the methyl-CpG-binding domain (MBD), which is linked to additional domains associated with chromatin, such as the bromodomain (see <PDOC00550>), the AT hook motif,the SET domain (see <PDOC50280>), or the PHD finger (see <PDOC50016>).
