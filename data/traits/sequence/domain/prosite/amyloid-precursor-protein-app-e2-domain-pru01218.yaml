identifier: PROSITE:PRU01218
label: Amyloid precursor protein (APP) E2 domain
definition: >-
  The E2 domain forms an antiparallel dimer. E2 dimerization is a dynamic and reversible process and heparin binding to E2 shifts the association-dissociation equilibrium in favor of dimer.
