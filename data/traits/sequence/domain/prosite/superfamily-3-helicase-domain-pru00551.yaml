identifier: PROSITE:PRU00551
label: Superfamily 3 helicase domain
definition: >-
  Superfamily 3 helicase domain profile. Helicases have been classified in 5 superfamilies (SF1-SF5). All of the proteins bind ATP and, consequently, all of them carry the classical Walker A (phosphate-binding loop or P-loop) (see <PDOC00017>) and Walker B (Mg2+-binding aspartic acid) motifs. Superfamily 3 consists of helicases encoded mainly by small RNA and DNA viruses and some large nucleocytoplasmic DNA viruses. Small viruses are very dependent on the host-cell machinery to replicate. SF3 helicase in small DNA viruses is associated with an origin-binding domain.
