identifier: PROSITE:PRU01011
label: Hemopexin repeat
definition: >-
  Hemopexin domain signature and hemopexin repeat profile. Hemopexin is a serum glycoprotein that binds heme and transports it to the liver for breakdown and iron recovery, after which the free hemopexin returns to the circulation. Structurally hemopexin consists of two similar halves of approximately two hundred amino acid residues connected by a histidine-rich hinge region. Each half is itself formed by the repetition of a basic unit of some 35 to 45 residues. Hemopexin-like domains have been found in two other types of proteins:
