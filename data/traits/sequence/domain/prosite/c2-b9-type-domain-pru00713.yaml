identifier: PROSITE:PRU00713
label: C2 B9-type domain
definition: >-
  The B9-type C2 domain is found in ciliary basal body associated proteins. B9-type C2 domain proteins show a very simple architecture with nearly all members being composed of just the C2 domain.
