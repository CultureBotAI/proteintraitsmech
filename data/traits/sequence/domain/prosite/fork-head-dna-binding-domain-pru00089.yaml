identifier: PROSITE:PRU00089
label: Fork-head DNA-binding domain
definition: >-
  Fork head domain signatures and profile. It has been shown that some eukaryotic transcription factors contain a conserved domain of about 100 amino-acid residues, called the fork head domain (but also known as a "winged helix"), which is involved in DNA-binding. Proteins known to contain this domain are listed below.
