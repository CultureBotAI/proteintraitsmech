identifier: PROSITE:PRU00241
label: Rubredoxin-like domain
definition: >-
  Rubredoxin-like domain profile. The rubredoxin-like domain is a 45- to 55-residue domain containing one iron atom tetrahedrally coordinated to four cysteinyl residues (Fe(S-Cys)4 center). It is involved in electron transfer processes.
