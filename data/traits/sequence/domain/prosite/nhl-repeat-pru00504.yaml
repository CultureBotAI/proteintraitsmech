identifier: PROSITE:PRU00504
label: NHL repeat
definition: >-
  NHL repeat profile. The NHL repeat was defined by amino acid sequence homologies among Ncl-1, HT2A and Lin-41 proteins. NHL is a conserved structural motif present in a large family of growth regulator. Many NHL containing proteins have additional domains such as a RING finger (see <PDOC00449>), a B-box zinc finger (see <PDOC50119>) or a coiled-coil motif. According to structural model analysis the NHL domain could be involved in protein-protein interaction.
