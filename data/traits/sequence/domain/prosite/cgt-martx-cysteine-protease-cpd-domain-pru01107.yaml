identifier: PROSITE:PRU01107
label: CGT/MARTX cysteine protease (CPD) domain
definition: >-
  The clostridial glucosylating toxins (CGTs) produced by Gram- positive bacteria and the multifunctional-autoprocessing RTX (MARTX) toxins of Gram-negative bacteria carry an embedded cysteine protease domain (CPD) that is regulated by a unique allosteric activation mechanism. The CGT/MARTX CPD catalytic dyad is composed of one His and one Cys residue.
