identifier: PROSITE:PRU00806
label: Gnk2-homologous domain
definition: >-
  The Gnk2-homologous domain is composed of two alpha-helices and a five stranded beta-sheet, which forms a compact single-domain architecture with an alpha+beta-fold. It contains a C-X(8)-C-X(2)-C motif. Cysteine residues form three intramolecular disulfide bridges: C1-C5, C2-C3, and C4-C6.
