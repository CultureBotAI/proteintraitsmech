identifier: PROSITE:PRU00519
label: Elongation factor 1 (EF-1) gamma C-terminal domain
definition: >-
  The eukaryotic elongation factor 1 (EF-1) gamma chain is a protein of about 410 to 440 residues, which consists of two independent domains, a glutathione S-transferase (GST) homologous N-terminal region responsible for the interaction with EF-1 alpha and a highly conserved exceptionally protease resistant ~160 residue C-terminal domain.
