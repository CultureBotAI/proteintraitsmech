identifier: PROSITE:PRU00437
label: G5 domain
definition: >-
  G5 domain profile. The G5 domain (named after its conserved glycine residues) is a module of ~80 residues that is found in a variety of enzymes such as Streptococcal IgA peptidases and various glycosyl hydrolases in bacteria. It is found in one to seven copies in association with other domains, such as LysM, bacterial Ig- like, M23 and M26 peptidases, F5/8 type C, vanW or transglycosylase-like. The G5 domain contains a few highly conserved residues. None of these conserved residues are the polar types of amino acids found in active sites, so it seems unlikely this region has an enzymatic function. However, in nearly all cases the G5 domain is associated with a known enzymatic domain.
