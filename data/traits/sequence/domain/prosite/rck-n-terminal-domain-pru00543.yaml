identifier: PROSITE:PRU00543
label: RCK N-terminal domain
definition: >-
  Largely involved in redox-linked regulation of potassium channels, the N-terminal part of the regulators of K+ conductance (RCK) domain is predicted to be an active dehydrogenase at least in some cases. Certain bind nicotinamide adenine dinucleotide (NAD) through a glycine motif, but for many RCK domains the ligand is unknown.
