identifier: PROSITE:PRU00731
label: PAW domain
definition: >-
  PAW domain profile. The PAW domain (present in PNGases and other worm proteins) is found as a single copy at the C-terminus of metazoan peptide:N-glycanase (PNGase) and in multiple copies in hypothetical Caenorhabditis elegans proteins peptide:N- glycanases (PNGases). The C-terminal PAW domain of PNGase binds to the mannose moieties of N-linked oligosaccharide chains.
