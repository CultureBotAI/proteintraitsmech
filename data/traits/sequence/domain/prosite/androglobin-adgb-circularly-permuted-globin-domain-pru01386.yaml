identifier: PROSITE:PRU01386
label: Androglobin (Adgb) circularly permuted globin domain
definition: >-
  Adgb has a unique modular architecture, possessing an N-terminal calpain-like domain, an internal, circular permuted globin domain, and an IQ calmodulin-binding motif.
