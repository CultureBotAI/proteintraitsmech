identifier: PROSITE:PRU01352
label: Glycosyl hydrolases family 81 (GH81) domain
definition: >-
  Glycosyl hydrolases family 81 (GH81) domain profile. Glycoside hydrolases (GHs, EC 3.2.1.-) form a widespread group of enzymes that hydrolyze the glycoside bond between monosaccharide units or between a carbohydrate and an aglycone moiety. GHs can act specifically as exo-cleaving enzymes to remove the sugar units from the ends of chains and release small sugar products, or endo-cleaving enzymes to act within the polysaccharide chain and produce oligosaccharides. The GH family 81 (GH81) includes proteins with endo-beta-1,3-glucanase widely distributed in plants, fungi, bacteria, archaea and viruses. GH81 proteins show rather diverse physiological roles.
