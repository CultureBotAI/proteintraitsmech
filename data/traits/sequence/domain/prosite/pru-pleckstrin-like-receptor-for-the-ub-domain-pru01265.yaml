identifier: PROSITE:PRU01265
label: Pru (pleckstrin-like receptor for the Ub) domain
definition: >-
  Pru (pleckstrin-like receptor for the Ub) domain profile. In eukaryotes, selective protein degradation is performed primarily by the ubiquitin-proteasome pathway, in which substrate proteins are marked by covalently attached ubiquitin chains that mediate recognition by the proteasome. Rpn13 (also called ADRM1) is a subunit of the proteasome that serves as a receptor for both ubiquitin and Uch37, one of the proteasome's three deubiquitinating enzymes. Rpn13 binds ubiquitin though a conserved amino-terminal region termed the pleckstrin-like receptor for the Ub (Pru) domain (also known as the ubiquitin-binding domain, or UBD), which binds K48- linked diubiquitin.
