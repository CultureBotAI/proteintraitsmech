identifier: PROSITE:PRU00844
label: FIP-RBD domain
definition: >-
  FIP-RBD domain profile. The Rab11 GTPase regulates recycling of internalized plasma membrane receptors and is essential for completion of cytokinesis. A family of Rab11 interacting proteins (FIPs) that conserve a C-terminal Rab-binding domain (RBD) selectively recognize the active form of Rab11. FIPs are diverse in sequence length and composition toward their N-termini, presumably a feature that underpins their specific roles in Rab11-mediated vesicle trafficking. They have been divided into three subfamilies (classe I, II, and III)on the basis of domain architecture.
