identifier: PROSITE:PRU00399
label: Runt domain
definition: >-
  Runt domain profile. The Runt domain is a ~128 amino acid region that is characteristic of the RUNX family of heterodimeric eukaryotic transcription factors. The family includes genes from drosophila, chicken and mammals that are involved in a wide range of developmental processes, from sex determination and neurogenesis in drosophila to hematopoiesis and osteoblast differentiation in mouse and human. The Runt domain confers DNA binding ability to the consensus core PyGPyGGT and mediates the interaction of mammalian RUNX proteins with the beta-subunit, designated core-binding factor beta (CBFbeta), which increases the DNA binding affinity of the heterodimer.
