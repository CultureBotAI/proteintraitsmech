identifier: PROSITE:PRU00399
label: Runt domain
definition: >-
  The Runt domain confers DNA binding ability to the consensus core PyGPyGGT and mediates the interaction of mammalian RUNX proteins with the beta-subunit, designated core-binding factor beta (CBFbeta), which increases the DNA binding affinity of the heterodimer.
