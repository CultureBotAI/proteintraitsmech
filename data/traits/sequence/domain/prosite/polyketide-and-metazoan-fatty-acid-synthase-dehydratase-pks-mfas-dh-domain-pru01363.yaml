identifier: PROSITE:PRU01363
label: Polyketide and metazoan fatty acid synthase dehydratase (PKS/mFAS DH) domain
definition: >-
  Polyketide and metazoan fatty acid synthase dehydratase (PKS/mFAS DH) domain profile. The fundamental polymers of biology-proteins, DNA, and RNA-are products of repetitive condensation of simple amino acid or nucleotide building blocks and are comparatively easy to assemble. However, other biomolecules require additional reactions beyond condensation of building blocks. Examples are the fatty acids and the polyketide and nonribosomal peptide secondary metabolites. These molecules are produced by complex enzyme assembly lines that include multiple catalytic domains. Modular polyketide synthases (PKSs) systems are thought to share a common ancestor with metazoan fatty acid synthases (mFAS).
