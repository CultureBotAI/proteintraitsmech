identifier: PROSITE:PRU00710
label: Invertebrate defensins family
definition: >-
  Invertebrate defensins family profile. Invertebrate defensins are a family of cysteine-rich antimicrobial peptides, primarily active against Gram-positive bacteria. These defensins have been found in arthropods (insects, ticks, spiders and scorpions), in bivalve molluscs and in a fungus. These peptides range in length from 32 to 51 amino acids. There are six conserved cysteines all involved in intrachain disulfide bonds. A schematic representation of peptides from the invertebrate defensin family is shown below.
