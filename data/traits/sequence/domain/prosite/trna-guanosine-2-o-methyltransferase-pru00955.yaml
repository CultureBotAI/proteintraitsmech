identifier: PROSITE:PRU00955
label: tRNA guanosine-2'-O-methyltransferase
definition: >-
  tRNA guanosine-2'-O-methyltransferase (EC 2.1.1.34) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to tRNA to form tRNA containing 2'-O-methylguanosine and S-adenosyl-L-homocysteine.
