identifier: PROSITE:PRU01252
label: Chalaropsis (Ch)-type lyzozyme domain
definition: >-
  The Ch-type lysozymes family GH25 domain exhibits both beta-1,4-N- acetylmuramidase and beta-1,4-N,6-O-diacetylmuramidase activities and its evolutionary spread is diverse, comprising bacterial, viral (mainly phage) and eukaryotic representatives.
