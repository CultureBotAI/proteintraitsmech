identifier: PROSITE:PRU01248
label: Core-binding (CB) domain
definition: >-
  Core-binding (CB) domain profile. Tyrosine-type site-specific recombinases mediate a wide range of important genetic rearrangement reactions. They catalyze functionally diverse processes, including integration and excision of phages from their host chromosomes, conjugative transposition, partioning of phage, bacterial and plasmid genomes during cell division, antigenic phase variation, dissemination of antibiotic- and antiseptic-resistance gene cassettes, and relaxation of DNA supercoils. Tyrosine recombinases have two or three domains, depending upon whether the system includes regulated integration and excision reactions.
