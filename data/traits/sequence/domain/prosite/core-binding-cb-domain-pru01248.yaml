identifier: PROSITE:PRU01248
label: Core-binding (CB) domain
definition: >-
  The core-binding (CB) domain, which interacts primarily with the major groove on the attachment site and facilitates binding to the core DNA sequence, is widely conserved among viral, eubacterial and archaeal recombinases. It is also involved in protein-protein interactions.
