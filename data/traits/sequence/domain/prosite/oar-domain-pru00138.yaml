identifier: PROSITE:PRU00138
label: OAR domain
definition: >-
  OAR domain profile. This 14 amino acid motif has been identified within the C-terminal region of several Paired-like homeodomain (HD) (see <PDOC00027>) containing proteins. It was named OAR domain after the initials of otp, aristaless, and rax.
