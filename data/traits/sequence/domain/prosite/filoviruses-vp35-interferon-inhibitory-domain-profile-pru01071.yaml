identifier: PROSITE:PRU01071
label: Filoviruses VP35 interferon inhibitory domain profile
definition: >-
  Filoviruses VP35 interferon inhibitory (IID) domain profile. The Filoviridae family of viruses, which includes marburgvirus (MARV) and ebolavirus (EBOV), can cause intermittent outbreaks that often result in high fatality rates. The family consists of five species of EBOV, Zaire, Reston, Sudan, Tai Forest, and Bundibugyo; one species of MARV; and a proposed genus Cuevavirus possessing a single species Lloviu cuevavirus. MARV and EBOV share a common genome organization but show important differences in replication complex formation, cell entry, host tropism, transcriptional regulation, and immune evasion.
