identifier: PROSITE:PRU00249
label: SPOC domain
definition: >-
  SPOC domain profile. Split end (spen) proteins have been identified in worms, flies and vertebrates and appear to play a similar role in each organism: they regulate expression of key transcriptional effectors in diverse signaling pathways. Spen proteins vary widely in size (90-600 kDa), but are nevertheless characterized by three repeated N-terminal RNA recognition motifs (RRMs) (see <PDOC00030>) and a highly conserved C-terminal SPOC domain (Spen Paralog and Ortholog C-terminal domain), of ~165 amino acids.
