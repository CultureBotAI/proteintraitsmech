identifier: PROSITE:PRU00592
label: G protein gamma domain
definition: >-
  G-protein gamma subunit profile. Guanine nucleotide-binding proteins (G proteins) act as intermediaries in the transduction of signals generated by transmembrane receptors. G proteins consist of three subunits (alpha, beta, and gamma). The alpha subunit binds to and hydrolyzes GTP; the functions of the beta and gamma subunits are less clear but they seem to be required for the replacement of GDP by GTP as well as for membrane anchoring and receptor recognition.
