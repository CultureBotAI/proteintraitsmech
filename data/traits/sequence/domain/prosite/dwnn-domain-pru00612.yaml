identifier: PROSITE:PRU00612
label: DWNN domain
definition: >-
  The ~75-residue DWNN (Domain With No Name) domain is highly conserved through eukaryotic species but is absent in prokaryotes. The DWNN domain may act as an ubiquitin-like modifier, possibly playing a role in the regulation of the splicing machinery.
