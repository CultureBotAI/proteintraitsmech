identifier: PROSITE:PRU00634
label: Thrombospondin type-3 (TSP3) repeat
definition: >-
  The calcium-binding TSP3 repeats are a tandem of aspartic acid-rich motifs, which resembles EF hands in the acidic side chains. But unlike EF hands, the calcium-binding loops of the TSP3 repeats are not flanked by secondary structure elements. The individual calcium-binding repeats are linked by disulfide bonds to each other.
