identifier: PROSITE:PRU01053
label: IRG-type guanine nucleotide-binding (G) domain
definition: >-
  The p47 or immunity-related GTPases (IRG) are at least as old as the vertebrates. The IRG proteins are an essential resistance system in the mouse for immunity against pathogens that enter the cell via a vacuole. Despite its importance for the mouse, the IRG resistance system is absent from humans because it has been lost during the divergent evolution of the primates. The IRG proteins appear to be accompanied phylogenetically by homologous proteins, named 'quasi IRG' (IRGQ) proteins, that probably lack nucleotide binding or hydrolysis function, and that may form regulatory heterodimers with functional IRG proteins.
