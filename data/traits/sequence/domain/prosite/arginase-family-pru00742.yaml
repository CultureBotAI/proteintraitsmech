identifier: PROSITE:PRU00742
label: Arginase family
definition: >-
  Arginase family signature and profile. Arginase family proteins are ureohydrolases with important roles in arginine/agmatine metabolism, the urea cycle, histidine degradation, and other pathways. The family includes arginase and evolutionary related enzymes of about 300 amino acids that typically contain two manganese ions in the active site.
