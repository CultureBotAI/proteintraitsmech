identifier: PROSITE:PRU01356
label: CFEM) domain
definition: >-
  CFEM domain profile. The CFEM (Common in Fungal Extracellular Membrane) protein domain is unique to fungi, but it is not found in all fungi. Many CFEM domain proteins have been found exclusively from Ascomycota and Basidiomycota, and they were found to be enriched in pathogenic fungi. The CFEM domain is found primarily in glycosylphosphatidylinositol (GPI)-anchored cell-wall proteins, and present in one or more copies, normally with one copy near the N terminus of proteins. CFEM-containing proteins are involved in differentiation, stress response and pathogenicity.
