identifier: PROSITE:PRU00553
label: PXA domain
definition: >-
  PXA domain profile. The PX-associated (PXA) domain is a ~200-amino acid module of unknown function. Perhaps it is required for protein-protein interaction and/or filament formation. In addition to the phosphoinositide-binding PX (see <PDOC50195>) domain, the PXA domain can also be associated with a transmembrane domain and RGS (see <PDOC50132>), which binds to activated G- alpha subunits and is responsible for GTPase activating protein (GAP) function.
