identifier: PROSITE:PRU00341
label: MANSC domain
definition: >-
  MANSC domain profile. The MANSC (motif at N terminus with seven cysteines) domain is a module with a well-conserved seven cysteine motif that is present at the N terminus of higher multicellular animal membrane and extracellular proteins. It is possible that some of the cysteine residues in the MANSC domain form structurally important disulfide bridges. Five classes of proteins contain single copies of the MANSC domain:
