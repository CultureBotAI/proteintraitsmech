identifier: PROSITE:PRU01182
label: MPN (Mpr1, Pad1 N-terminal) domain
definition: >-
  MPN+ domain-containing proteins are classified as metalloenzymes responsible for isopeptidase activity. These proteins contain a conserved glutamate (E) and a JAMM (Jab1/MPN/Mov34 metalloenzyme) motif, typically consisting of a canonical sequence (H-x-H-x[7]-S-x[2]-D) and coordinating a zinc ion. MPN- domains are recognizable by the absence of essential Zn(2+)- coordinating residues that are required for catalytic function. In protein complexes, an MPN+ domain can associate with MPN- domains for purposes that are not well understood.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
