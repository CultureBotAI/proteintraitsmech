identifier: PROSITE:PRU01102
label: Dockerin domain
definition: >-
  The dockerin domains consist of about 70 amino acid residues and contain two duplicated segments, each of about 22 amino acid residues. It binds tenaciously to the cohesin modules of the scaffoldin subunit of the cellulosome.
