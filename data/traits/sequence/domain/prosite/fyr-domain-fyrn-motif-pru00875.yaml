identifier: PROSITE:PRU00875
label: FYR domain FYRN motif
definition: >-
  The FYRN and FYRC regions are not separate independently folded domains, but are components of a distinct protein module, The FYRN and FYRC motifs both form part of a single folded module (the FYR domain), which adopts an alpha+beta fold.
