identifier: PROSITE:PRU01307
label: Coronavirus (CoV) Nsp1 globular domain
definition: >-
  Nsp1 is a characteristic feature of AlphaCoVs and BetaCoVs, which exhibits both functional conservation and mechanistic diversity in inhibiting host gene expression and antiviral responses. Although the sequence homologies among CoV Nsp1 proteins are low, the core structures share a relatively conserved domain.
