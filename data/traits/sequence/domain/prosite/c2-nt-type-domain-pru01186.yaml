identifier: PROSITE:PRU01186
label: C2 NT-type domain
definition: >-
  C2 NT-type domain profile. The C2 domain is one of the most prevalent eukaryotic lipid-binding domains deployed in diverse functional contexts (see <PDOC00380>). Many C2 domains bind directly to membrane lipids and display a wide range of lipid selectivity, with preference for anionic phosphatidylserine (PS) and phosphatidylinositol-phosphates (PIPs).
