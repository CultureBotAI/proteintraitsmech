identifier: PROSITE:PRU00810
label: PAH domain
definition: >-
  PAH domain profile. The paired amphipathic helix (PAH) domain is a protein-protein interaction domain present in eukaryotic proteins implied in transcription down- regulation, such as the SIN3 family of proteins. This domain occurs generally in repeats at the N-terminus of the protein containing it. Sin3a is the central component of a transcriptional co-repressor complex that comprises the histone deacetylase (HDAC) 1 and 2. The three PAH domains of Sin3a associate with numerous DNA-binding proteins enabling the recruitment of the Sin3 complex to chromatin.
