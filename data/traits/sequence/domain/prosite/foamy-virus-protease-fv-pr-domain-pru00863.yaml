identifier: PROSITE:PRU00863
label: Foamy virus protease (FV PR) domain
definition: >-
  Foamy virus protease (FV PR) domain profile. Spumaviruses or foamy viruses (FVs) are a group of complex retroviruses that have been isolated from a number of animal species and are believed to be apathogenic in their animal host. FVs express a pol-specific transcript that codes for a Pol polyprotein that consists of the protease (PR), reverse transcriptase, robonuclease H , and the integrase domains. Retrovriral PRs belong to the family of aspartic proteases and are active as homodimers, with the active site triplets (Asp-Thr/Ser-Gly; D-T/S-G) from both chain contributing to the symetric active site of the enzyme.
