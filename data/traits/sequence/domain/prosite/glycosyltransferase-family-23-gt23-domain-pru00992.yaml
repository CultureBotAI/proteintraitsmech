identifier: PROSITE:PRU00992
label: Glycosyltransferase family 23 (GT23) domain
definition: >-
  Glycosyltransferase family 23 (GT23) domain profile. The fucosylation of glycoconjugates in mammalian organisms is related to a wide variety of biological preocesses, including cell adhesion, blood antigens, and some severe diseases including cancer metastasis, congenital disorders of glycosylation, and various microbial and virus infections. Fucosylation via alpha1,2-, alpha1,3- alpha1,4-, and alpha1,6-linkages, and protein O-fucosylation are accomplished by the cation of specific individual fucosyltransferases.
