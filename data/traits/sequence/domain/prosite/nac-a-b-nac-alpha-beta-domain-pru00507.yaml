identifier: PROSITE:PRU00507
label: NAC-A/B (NAC-alpha/beta) domain
definition: >-
  NAC A/B domain profile. In eukaryote, the Nascent polypeptide-Associated Complex (NAC) is a heterodimeric cytosolic protein complex composed of NAC alpha and NAC beta. NAC binds reversibly to the ribosome where it is in contact with nascent chains as they emerge from the ribosome. But the cellular function of NAC seems to be much more diverse as it is also involved in transcription regulation and mitochondrial translocation. Alpha and beta NACs share homology with each other, both contain a NAC A/B domain. In archaea no beta NAC proteins are found; the complex is an homodimer of NAC alpha.
