identifier: PROSITE:PRU00818
label: Phytocyanin domain
definition: >-
  Phytocyanin domain profile. Among the blue copper proteins with a single type I (or "blue") mononuclear copper site, the plant-specific phytocyanins constitute a distinct subfamily that can be further subdivided into the families of uclacyanins, stellacyanins, plantacyanins, and early nodulins. Stellacyanins have a blue copper coordinated by two His, one Cys and one Gln. In plantacyanins and uclacyanins, the ligands of the type-I Cu sites are two His, one Cys and one Met. Early nodulins lack amino acid residues that coordinate Cu, so they are believed to be involved in unknown processes without binding Cu. Phytocyanins are found in chloropasts of higher plants.
