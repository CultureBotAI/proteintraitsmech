identifier: PROSITE:PRU00606
label: CobBQ-type glutamine amidotransferase (GATase) domain
definition: >-
  GATases are enzymes that catalyze the removal of the ammonia group from glutamine and transfer this group to a substrate to form a new carbon- nitrogen group. The catalytic Cys is located in a Cys-His active site that resembles that of GATases type 1.
