identifier: PROSITE:PRU00539
label: RdRp
definition: >-
  RNA-directed RNA polymerase catalytic domain profiles. RNA-directed RNA polymerase (RdRp) (EC 2.7.7.48) is an essential protein encoded in the genomes of all RNA containing viruses with no DNA stage. It catalyses synthesis of the RNA strand complementary to a given RNA template, but the precise molecular mechanism remains unclear. The postulated RNA replication process is a two-step mechanism. First, the initiation step of RNA synthesis begins at or near the 3' end of the RNA template by means of a primer-independent (de novo) mechanism. The de novo initiation consists in the addition of a nucleotide tri-phosphate (NTP) to the 3'-OH of the first initiating NTP.
