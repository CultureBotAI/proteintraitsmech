identifier: PROSITE:PRU00605
label: Glutamine amidotransferase (GATase) type 1 domain
definition: >-
  GATases are enzymes that catalyze the removal of the ammonia group from glutamine and transfer this group to a substrate to form a new carbon-nitrogen group. In the GATase type 1 domain the catalytic cysteine is located in a triad of Cys-His-Glu that forms the active site.
