identifier: PROSITE:PRU00061
label: Pyrin domain
definition: >-
  DAPIN domain profile. The DAPIN (Domain in Apoptosis and INterferon response) domain is an 80-100- residue domain which is found in the N-terminus of diverse vertebrate and vertebrate-specific viral proteins involved in apoptosis, cancer, inflammation, and immune response. The DAPIN domain can be found alone or in association with other domains like CARD (see <PDOC50209>, NACHT, HIN- 200 (see <PDOC50834>), LRR, SPRY, Caspase (see <PDOC00864>) or Zinc finger B- box (see <PDOC50119>). It has been proposed that the DAPIN domain might have an adaptor function, coupling apoptosis and immune disorders.
