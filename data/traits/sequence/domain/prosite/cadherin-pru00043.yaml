definition: >-
  Cadherin domain signature and profile. Cadherins are a family of animal glycoproteins responsible for calcium- dependent cell-cell adhesion. Cadherins preferentially interact with themselves in a homophilic manner in connecting cells; thus acting as both receptor and ligand. A wide number of tissue-specific forms of cadherins are known, for example:
