identifier: PROSITE:PRU00670
label: MOSC domain
definition: >-
  MOSC domain profile. The molybdenum cofactor (MOCO) sulfurase C-terminal (MOSC) domain is a conserved region of about 125-170 residues present in diverse metal-sulfur cluster biosynthesis proteins from both prokaryotes and eukaryotes. MOSC domains occur either as stand-alone forms such as the bacterial YiiM proteins, or fused to other domains such as a NifS-like catalytic domain in MOCO sulfurase. The MOSC domain is predicted to be a sulfur-carrier domain that receives sulfur abstracted by the pyridoxal phosphate-dependent NifS-like enzymes, on its conserved cysteine, and delivers it for the formation of diverse sulfur-metal clusters.
