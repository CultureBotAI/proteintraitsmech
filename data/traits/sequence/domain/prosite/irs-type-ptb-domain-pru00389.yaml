identifier: PROSITE:PRU00389
label: IRS-type PTB domain
definition: >-
  IRS-type PTB domain has an average length of about 100 amino acids. It binds to the insulin receptor through the Asn-Pro-Xaa-Tyr(P) motif found in many tyrosine-phosphorylated proteins.
