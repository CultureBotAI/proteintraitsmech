identifier: PROSITE:PRU01404
label: Bacterial Rho GTPase-activating protein (GAP) domain
definition: >-
  Bacterial Rho GTPase-activating protein (GAP) domain profile. Manipulation of the actin cytoskeleton in eukaryotic cells is one of the principal virulence strategies used by bacterial pathogens. Because they are master regulators of actin cytoskeleton dynamics, the Rho family of small GTPases are frequent targets for bacterial cytotoxins. Like other G proteins, Rho GTPases are molecular switches that are controlled through nucleotide exchange and are active in the GTP form and inactive in the GDP form.
