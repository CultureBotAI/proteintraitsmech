identifier: PROSITE:PRU00709
label: KIND domain
definition: >-
  KIND domain profile. The KIND (kinase non-catalytic C-lobe domain) is a putative protein interaction domain, which has been identified as being similar to the C- terminal protein kinase catalytic fold (C lobe) (see <PDOC00100>). Its presence at the N-terminus of signalling proteins and the absence of the active site residues in the catalytic and activation loops suggest that it folds independently and is likely to be non-catalytic. The occurence of the domain only in metazoa implies that it has evolved from the catalytic protein kinase domain into an interaction domain possibly by keeping the substrate- binding features.
