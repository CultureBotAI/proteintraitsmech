identifier: PROSITE:PRU01215
label: Gid-type RING finger
definition: >-
  Gid-type RING finger profile. The two major antagonistic pathways of carbon metabolism in cells, glycolysis and gluconeogenesis, are tigthly regulated. In yeast, the switch from gluconeogenesis to glycolysis is brought about by proteasomal degradation of the gluconeogenetic enzyme fructose-1.6-bisphosphate. The ubiquitin ligase responsible for polyubiquitylation of fructose-1,6-bisphophate is the Gid (glucose induced degradation deficient) complex. This complex consists of seven subunits of which two, Gid2/Rmd5 and Gid9/Fyv10, contain a degenerated RING finger domain (see <PDOC00449>) providing E3 ligase activity. The two subunits form the heterodimaric E3 ligase unit of the Gid complex.
