identifier: PROSITE:PRU01417
label: Vacuolar protein sorting 10 protein (Vps10p) domain
definition: >-
  The Vps10p domain is formed by three structural units: a large N- terminal beta-propeller and two cysteine-knots called 10CCa and 10CCb, which constitute the so-called 10CC (ten conserved cysteines) module. The Vps10p propeller has a wide, open tunnel lined by ten edge strands running parallel to the propeller axis, thus providing ample opportunity for beta-sheet extension to capture extended peptides threaded into the tunnel. The C- terminal elongated 10CC module that partly wraps around the 'bottom' face of the propeller contains five conserved disulfide bridges and is a major ligand-binding region.
