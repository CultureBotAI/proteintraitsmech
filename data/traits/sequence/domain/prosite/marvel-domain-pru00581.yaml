identifier: PROSITE:PRU00581
label: MARVEL domain
definition: >-
  The ~130-residue MAL and related proteins for vesicle trafficking and membrane link (MARVEL) domain is a module with a four transmembrane-helix architecture that has been identified in proteins of the myelin and lymphocyte (MAL), physins, gyrins and occludin families.
