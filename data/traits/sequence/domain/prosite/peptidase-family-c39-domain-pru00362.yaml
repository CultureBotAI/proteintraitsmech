identifier: PROSITE:PRU00362
label: Peptidase family C39 domain
definition: >-
  Peptidase family C39 domain profile. ABC transporters belong to the ATP-Binding Cassette (ABC) superfamily which uses the hydrolysis of ATP to energize diverse biological import and export systems (see <PDOC00185>). ABC transporters are constituted at least of two conserved regions: a highly conserved ATP binding cassette (ABC) and a less conserved transmembrane domain (TMD) (see <PDOC00364>). These regions can be found on the same protein (mostly bacterial exporters and eukaryotes) or on two different ones (mostly bacterial importers). Nevertheless, in a wide range of ABC exporters, an additional protease domain of about 130 amino acid residues is found to be fused to the TMD and the NBD.
