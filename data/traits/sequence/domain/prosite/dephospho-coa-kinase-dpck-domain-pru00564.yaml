identifier: PROSITE:PRU00564
label: Dephospho-CoA kinase (DPCK) domain
definition: >-
  Dephospho-CoA kinase (DPCK) domain profile. Dephospho-coenzyme A kinase (DPCK) (EC 2.7.1.24) catalyzes the final step in coenzyme A (CoA) biosynthesis, the phosphorylation of the 3'-hydroxyl group of ribose using ATP as a phosphate donor. DPCK is present in a wide range of organisms, including bacteria, fungi, plants and animals. Whereas bacterial DPCK is found in stand-alone form, mammalian DPCK is associated with another enzyme of the CoA biosynthetic pathway, phosphopantetheine adenylyltransferase (PPAT) (EC 2.7.7.3), in bifunctional coenzyme A synthase (CoA synthase).
