identifier: PROSITE:PRU00157
label: Pre-SET
definition: >-
  Pre-SET, post-SET and SET domain profiles. The SET domain is an 130- to 140-amino acid, evolutionary well conserved sequence motif that was initially characterized in the Drosophila proteins Su(var)3-9, Enhancer-of-zeste and Trithorax. In addition to these chromosomal proteins modulating gene activities and/or chromatin structure, the SET domain is found in proteins of diverse functions ranging from yeast to mammals, but also including some bacteria and viruses.
