identifier: PROSITE:PRU00323
label: Link domain
definition: >-
  Link domain signature and profile. The Link domain is a hyaluronan(HA)-binding region found in proteins of vertebrates that are involved in the assembly of extracellular matrix, cell adhesion, and migration. It is about 100 amino acids in length. The structure has been shown to consist of two alpha helices and two antiparallel beta sheets arranged around a large hydrophobic core similar to that of C-type lectin <See PDOC00537>. As shown in the schematic representation this domain contains four conserved cysteines involved in two disulfide bonds.
