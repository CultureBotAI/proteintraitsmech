identifier: PROSITE:PRU00397
label: PARP catalytic domain
definition: >-
  PARP catalytic and alpha-helical domains profiles. Poly(ADP-ribose) polymerases (PARP) (EC 2.4.2.30) are a family of enzymes present in eukaryotes which catalyzes the poly(ADP-ribosyl)ation of a limited number of proteins involved in chromatin architecture, DNA repair, or in DNA metabolism including PARP itself. PARP, also known as poly(ADP-ribose) synthase and poly(ADP-ribose) transferase, transfers the ADP-ribose moiety from its substrate, nicotinamide adenine dinucleotide (NAD), to carboxylate groups of aspartic and glutamic residues.
