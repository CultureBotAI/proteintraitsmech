identifier: PROSITE:PRU01127
label: hSac2 domain
definition: >-
  hSac2 domain profile. Sac2 is an evolutionarily conserved protein in multicellular organisms from nematode to human. Sac2 orthologues are also found in fungi genera such as Aspergillus species and Yarrowia lipolytica, but is absent in Saccharomyces cerevisiae. Sac2 is a phosphatidylinositol (PI) 4-phosphatase that specifically hydrolyzes phosphatidylinositol 4-phosphate (PI(4)P) to phosphatidylinositol. Besides the conserved N-terminal Sac1 domain (see <PDOC00978>), Sac2 contains a unique homology domain, homology Sac2 (hSac2), followed by a proline-rich C-terminal portion with various lengths in different species.
