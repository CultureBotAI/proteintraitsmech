identifier: PROSITE:PRU00242
label: Cytochrome b561 domain
definition: >-
  Cytochrome b561 domain profile. Cytochromes b561 constitute a class of intrinsic membrane proteins containing two heme molecules that are involved in ascorbate (vitamin C) regeneration. They have been suggested to function as electron transporters, shuttling electrons across membranes from ascorbate to an acceptor molecule. The one- electron oxidation product of ascorbate, monodehydro-ascorbate (MDHA) has been shown to function as an electon acceptor for mammalian and plant cytochromes b561. The cytochrome b561-catalyzed reduction of MDHA results in the regeneration of the fully reduced ascorbate molecule.
