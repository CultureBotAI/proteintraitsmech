identifier: PROSITE:PRU01271
label: Coronavirus spike (S) glycoprotein S2 subunit heptad repeat 1 (HR1) region
definition: >-
  The S2 subunit contains two 4-3 heptad repeats (HRs) of hydrophobic residues, HR1 and HR2, typical of coiled coils, separated by an ~170-aa-long intervening domain. The S2 subunit is expected to present rearrangement of its HRs to form a stable 6-helix bundle fusion core.
