identifier: PROSITE:PRU00624
label: SANT domain
definition: >-
  The SANT domain is a protein-protein interaction module, which can bind to histone-tails. Although SANT domains show remarkable sequence and structural similarity to the DNA-binding helix-turn-helix (HTH) domain of the myb-like tandem repeat (see <PRU00625>), their function is not DNA binding.
