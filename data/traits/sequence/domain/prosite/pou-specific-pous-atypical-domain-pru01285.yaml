identifier: PROSITE:PRU01285
label: POU-specific (POUs) atypical domain
definition: >-
  HNF1alpha (MODY3 gene product, the most commonly mutated MODY protein) and HNF1beta (hepatocyte nuclear factor 1beta; also known as vHNF1 or TCF2) (MODY5 gene product) are atypical members of the POU transcription factors. Their atypical POUs domains have at least one additional alpha-helix at the N-terminus, and the second helix and adjacent loop of their POUh domains are much longer, creating a more extensive interface between the POUs and POUh domains.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
