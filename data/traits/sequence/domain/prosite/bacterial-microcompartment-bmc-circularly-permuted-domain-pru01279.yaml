identifier: PROSITE:PRU01279
label: Bacterial microcompartment (BMC) circularly permuted domain
definition: >-
  Bacterial microcompartments (BMCs) are large virion-sized protein assemblies comprised of specific enzymes encased within a protein shell. The shells of all BMCs are architecturally similar, being composed of homohexamers of proteins containing a single BMC domain, homotrimer of proteins containing two BMC domains (that resemble the hexamers in size and shape) and pentamers of proteins containing one BMV domain that assemble into an icosahedral shell. Some instances of the BMC shell domain reveal a circular permutation in which a highly similar tertiary structure is built from secondary structure elements occurring in a different order.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
