identifier: PROSITE:PRU01387
label: TNF domain
definition: >-
  TNF ligands share a common structural motif, the TNF homology domain (THD), which binds to cysteine-rich domains (CRDs) of TNF receptors. The THD is a 150 amino acid long sequence containing a conserved framework of aromatic and hydrophobic residues.
