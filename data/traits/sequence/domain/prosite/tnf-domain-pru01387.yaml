label: TNF domain
definition: >-
  Tumor necrosis factor (TNF) homology domain (THD) signature and profile. The tumor necrosis factor (TNF) superfamily, composed of 19 ligands and 29 receptors, plays highly diversified roles in the body. All members of the TNF superfamily, without exception, exhibit pro-inflammatory activity, in part through activation of the transcription factor NF-kappaB. Ligands and receptors of the TNF superfamilies are examples of signal transducers whose integrated actions impinge principally on the development, homeostasis and adaptative responses of the immune system. The TNF ligand family comprises 18 genes encoding 19 type II (i.e.
