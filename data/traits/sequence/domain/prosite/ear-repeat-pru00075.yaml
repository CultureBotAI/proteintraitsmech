identifier: PROSITE:PRU00075
label: EAR repeat
definition: >-
  EAR repeat profile. Most of the hereditary idiopathic epilepsies are due to mutation in ion channels expressed in brain. Recently two non-ion channel genes LGI1 and VGLR1 have emerged as important causes of specific epilepsy syndromes. The product of these two genes share a conserved repeated region of about 44 amino acid residues, the EAR repeat (for epilepsy-associated repeat), which has also been called the Epitempin (EPTP) repeat. The EAR repeats tend to be present in seven copies per proteins.
