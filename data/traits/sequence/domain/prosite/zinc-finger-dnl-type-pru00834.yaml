identifier: PROSITE:PRU00834
label: Zinc finger DNL-type
definition: >-
  Zinc finger DNL-type profile. Mitochondrial functions rely on the correct transport of resident proteins synthesized in the cytosol to mitochondria. Protein import into mitochondria is mediated by membrane protein complexes, protein translocators, in the outer and inner mitochondrial membranes, in cooperation with their assistant proteins in the cytosol, intermembrane space and matrix.
