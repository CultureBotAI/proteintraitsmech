identifier: PROSITE:PRU00832
label: APO domain
definition: >-
  All members of the APO gene family contain an ~100 amino acid residue-spanning region (APO motif 1) with conserved Cys, His, Gly, and acidic and basic amino acids. This highly conserved APO1 motif is duplicated at the C terminus (designated APO motif 2). The conserved Cys in both motifs could provide ligands for tetranuclear Fe-S centers.
