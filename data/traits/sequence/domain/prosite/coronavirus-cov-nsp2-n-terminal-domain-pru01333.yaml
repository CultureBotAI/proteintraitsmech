identifier: PROSITE:PRU01333
label: Coronavirus (CoV) Nsp2 N-terminal domain
definition: >-
  The Nsp2 N-terminal domain contains ten alpha-helices and fourteen beta-sheets with three zinc fingers (ZnFs), belonging to the C2H2, C4, and C2HC types, respectively. The three zinc fingers are not involved in binding nucleic acids directly but may play other unknown functions. The interaction of Nsp2 and nucleic acid is mainly dependent on a large positively charged region on the electrostatic surface of the Nsp2 N-terminal domain.
