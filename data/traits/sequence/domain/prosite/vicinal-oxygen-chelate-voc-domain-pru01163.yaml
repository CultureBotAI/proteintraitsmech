identifier: PROSITE:PRU01163
label: Vicinal oxygen chelate (VOC) domain
definition: >-
  Vicinal oxygen chelate (VOC) domain profile. The vicinal oxygen chelate (VOC) family of enzymes catalyzes a highly diverse set of chemistries that derives from one common mechanistic trait: bidentate coordination to a divalent metal center by a substrate or intermediate or transition state through vicinal oxygen atoms. The array of reactions catalyzed by this family is mediated structurally by a common fold and protein-chelating residues that secure and localize a metal ion. The common fold has topological symmetry being comprised of two BetaAlphaBetaBetaBeta units that form an incompletely closed barrel of beta-sheet about the metal ion (see <PDB:1F9Z>).
