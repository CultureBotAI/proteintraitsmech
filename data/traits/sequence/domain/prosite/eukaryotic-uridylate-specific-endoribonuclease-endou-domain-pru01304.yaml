identifier: PROSITE:PRU01304
label: Eukaryotic uridylate-specific endoribonuclease (EndoU) domain
definition: >-
  Eukaryotic uridylate-specific endoribonuclease (EndoU) domain profile. EndoU is a family of metal-dependent endoribonucleases that is broadly conserved among eukaryotes. EndoU family members have RNA-binding and endoribonuclease activities and appear to be involved in many aspects of biology, including small nucleolar RNA biogenesis, endoplasmic reticulum (ER) network formation, immune response, and neurodegeneration:
