identifier: PROSITE:PRU01288
label: xRRM domain
definition: >-
  xRRM domain profile. La and La-related proteins (LaRPs) comprise an ancient superfamily of proteins that are conserved in nearly all eukaryotes, except Plasmodium. These proteins are broadly involved in critical processes of RNA use and metabolism in the nucleus and the cytoplasm. The LaRP superfamily is distinguished by a conserved bipartite RNA-binding unit called the La-module, composed by a Lupus antigen motif (LaM) (see <PDOC50961>) followed by an RNA-Recognition motif (RRM) (see <PDOC00030>). Beyond this, each LaRP family is characterized by distinct family specific domains and motifs that contribute to structure and function.
