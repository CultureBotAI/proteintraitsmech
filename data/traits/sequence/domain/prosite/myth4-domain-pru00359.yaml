identifier: PROSITE:PRU00359
label: MyTH4 domain
definition: >-
  MyTH4 domain profile. The myosin tail homology 4 (MyTH4) domain is a ~150 amino acid module which has been identified in different branches of the myosin superfamily and in a microtubule motor protein from plants (kinesin-like calmodulin binding protein; KLCBP). The MyTH4 domain is found in one or two copies associated with other domains, such as myosin head, kinesin motor, FERM (see <PDOC00566>), PH (see <PDOC50003>), SH3 (see <PDOC50002>) and IQ (see <PDOC50096>).
