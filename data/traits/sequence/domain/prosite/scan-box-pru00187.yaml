identifier: PROSITE:PRU00187
label: SCAN box
definition: >-
  SCAN box profile. This domain of around 80 amino acid residues has been called LeR because it is a leucine rich region, or SCAN box from the first letter of the names of the four proteins initially found to contain it (SRE-ZBP, CTfin-51, AW-1, Number 18 cDNA). The SCAN box is essentially found in the N-terminal part of transcription factors containing a zinc finger of the C2H2 type (see <PDOC00028>). These proteins can either activate or repress transcription, although isolated recombinant SCAN boxes do not modulate significantly the transcription.
