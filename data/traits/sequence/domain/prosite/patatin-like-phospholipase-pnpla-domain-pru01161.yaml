identifier: PROSITE:PRU01161
label: Patatin-like phospholipase (PNPLA) domain
definition: >-
  Patatin-like phospholipase (PNPLA) domain profile. The patatin glycoprotein is a nonspecific lipid acyl hydrolase that is found in high concentrations in mature potato tubers. Patatin is reported to play a role in plant signaling, to cleave fatty acids from membrane lipids, and to act as defense against plant parasites. Proteins encoding a patatin-like phospholipase (PNPLA) domain are ubiquitously distributed across all life forms, including eukaryotes and prokaryotes, and are observed to participate in a miscellany of biological roles, including sepsis induction, host colonization, triglyceride metabolism, and membrane trafficking.
