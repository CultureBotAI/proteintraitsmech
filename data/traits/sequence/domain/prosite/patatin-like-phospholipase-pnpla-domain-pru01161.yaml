label: Patatin-like phospholipase (PNPLA) domain
definition: >-
  PNPLA domain containing proteins display lipase and transacylase properties and appear to have major roles in the regulation of lipid metabolism. The PNPLA domain has a Ser-Asp catalytic dyad.
