identifier: PROSITE:PRU01322
label: PBC domain
definition: >-
  The PBC class of TALE homeodomain proteins includes the products of the vertebrate Pbx1, Pbx2, Pbx3 and Pbx4, Caenorhabditis elegans ceh-20, ceh-40 and ceh-60 and the Drosophila extradenticle (exd) genes. The sequence similarity between the PBC proteins extends downstream of the homeodomain for about 15 amino acids, and upstream of the homeodomain is a 180-amino acid dimerization domain termed PBC. The PBC domain can be further subdivided into an A and B region.
