identifier: PROSITE:PRU00947
label: Putrescine N-methyltransferase
definition: >-
  Putrescine N-methyltransferase (EC 2.1.1.53) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to putrescine to form N-methylputrescine and S-adenosyl-L-homocysteine.
