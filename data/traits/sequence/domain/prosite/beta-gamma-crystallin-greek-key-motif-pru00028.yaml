identifier: PROSITE:PRU00028
label: Beta/gamma crystallin 'Greek key' motif
definition: >-
  Crystallins beta and gamma 'Greek key' motif profile. Crystallins are the dominant structural components of the eye lens. Among the different type of crystallins, the beta and gamma crystallins form a family of related proteins. Structurally, beta and gamma crystallins are composed of two similar domains which, in turn, are each composed of two similar motifs with the two domains connected by a short connecting peptide. Each motif, which is about forty amino acid residues long, is folded in a distinctive 'Greek key' motif, composed of four antiparallel beta-strands: a, b, c, and d (see <PDB:1A45>).
