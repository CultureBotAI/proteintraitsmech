identifier: PROSITE:PRU00091
label: Zinc finger FYVE/FYVE-related type
definition: >-
  Zinc finger FYVE/FYVE-related type profile. The FYVE domain has been named after the first letter of the first four proteins in which it was found (Fab1, YOTB/ZK632.12, Vac1, and EEA1). It is a cysteine-rich domain of about 70 amino acids that coordinates two Zn2+ ions. The FYVE domain is found in several eukaryotic non-nuclear proteins involved in distinct cellular functions, including vesicle transport, signal transduction and cytoskeletal regulation. FYVE domains are generally found in one copy but two copies can also be found. Positions of FYVE domains in different proteins vary from the extreme N-terminus to the extreme C-terminus.
