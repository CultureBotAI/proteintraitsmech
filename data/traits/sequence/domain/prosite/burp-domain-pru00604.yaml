identifier: PROSITE:PRU00604
label: BURP domain
definition: >-
  The BURP domain is a ~230-residue module, which is found in the C- terminal part of a number of plant cell wall proteins. It is possible that the BURP domain represents a general motif for localization of proteins within the cell wall matrix.
