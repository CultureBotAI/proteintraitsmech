identifier: PROSITE:PRU01351
label: PADR1 zinc-binding domain
definition: >-
  The PADR1 zinc-binding domain is involved in protein-protein interactions that orchestrate PARP-1 activation and are critical to the DNA- dependent stimulation of PARP-1. It relays the DNA binding signal from the first two zinc fingers to the catalytic C terminus by helping to establish the active form of the enzyme.
