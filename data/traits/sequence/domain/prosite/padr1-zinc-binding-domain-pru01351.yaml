identifier: PROSITE:PRU01351
label: PADR1 zinc-binding domain
definition: >-
  PADR1 zinc-binding domain profile. Poly(ADP-ribose) polymerase-1 (PARP-1) is a chromatin-associated enzyme involved in multiple cellular processes including DNA repair, cell cycle control, apoptotic signaling, and transcriptional regulation. Stimulated by binding to nicked DNA, PARP-1 catalyzes poly(ADP-ribosyl)ation of the acceptor proteins using NAD(+) as a substrate. PARP-1 has a modular architecture composed of multiple, independently folded domains. The PARP-1 polypeptide is generally described in three major segments that represent the biochemical activities and functional roles of the enzyme: the DNA-binding domain (DBD), the automodification domain, and the catalytic domain.
