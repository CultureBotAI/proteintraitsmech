identifier: PROSITE:PRU01433
label: UPF1-type helicase core domain
definition: >-
  UPF1-type helicase core domain profile. Helicases use ATP to bind or remodel nucleic acids, nucleic acid-protein complexes, or both. All forms of cellular life and many viruses encode helicases, which constitute one of the largest classes of enzymes. Virtually all biological processes involving DNA or RNA employ one or more helicases. Helicases have been classified into six superfamilies (SF1-SF6) and subsequent subfamilies. SF1 and SF2 are the largest groups of RNA and DNA helicases generally acting as monomers or dimers while SF3-SF6 encompass multimeric ring-shaped helicases.
