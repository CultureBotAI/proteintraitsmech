identifier: PROSITE:PRU01177
label: HD-related output (HDOD) domain
definition: >-
  Proteins containing the HDOD are widespread in diverse bacteria; it can be present as a stand-alone domain, and also associated with other domains, such as response regulatory (RR), GGDEF, and EAL, suggesting a role in regulation and signaling.
