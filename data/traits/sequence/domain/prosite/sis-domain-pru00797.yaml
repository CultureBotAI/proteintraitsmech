identifier: PROSITE:PRU00797
label: SIS domain
definition: >-
  SIS domain profile. The sugar isomerase (SIS) domain is a phosphosugar-binding module that is found in a variety of eubacterial, archaebacterial and eukaryotic proteins that have a role in phosphosugar isomerization or regulation. In enzymes, the SIS domain can have a catalytic function as an isomerase and bind to phosphorylated sugars. In bacterial transcriptional regulators of the rpiR family, the domain seems to bind substrates implicated in the genes for sugar metabolism that are controlled by the regulator.
