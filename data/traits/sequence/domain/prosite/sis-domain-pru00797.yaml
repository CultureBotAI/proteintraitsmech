identifier: PROSITE:PRU00797
label: SIS domain
definition: >-
  The sugar isomerase (SIS) domain is a phosphosugar-binding module that is found in a variety of eubacterial, archaebacterial and eukaryotic glycolytic proteins that have a role in phosphosugar isomerization or regulation.
