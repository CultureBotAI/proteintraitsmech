identifier: PROSITE:PRU01257
label: Invertebrate (I)-type lysozyme domain
definition: >-
  I-type lysozymes have been identified in phylogenetically diverse organisms, including mollusca, nematoda, annelida, arthropoda and echinodermata. I-type lysozymes play an important role in immunity and digestion in invertebrates and are usually regarded as the first barrier against pathogens. I-type lysozymes exert multiple activities, such as muramidase, isopeptidase, chitinase, and non-enzymatic antibacterial activities.
