identifier: PROSITE:PRU00349
label: DeoR-type HTH domain
definition: >-
  The deoR-type HTH domain is a DNA-binding, helix-turn-helix (HTH) domain of about 50-60 amino acids present in transcription regulators of the deoR family, involved in sugar catabolism.
