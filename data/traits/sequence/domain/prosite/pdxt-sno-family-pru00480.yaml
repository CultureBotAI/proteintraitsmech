identifier: PROSITE:PRU00480
label: PdxT/SNO family
definition: >-
  PdxS/SNZ and pdxT/SNO proteins form a complex which serves as a glutamine amidotransferase to supply ammonia as a source of the ring nitrogen of vitamin B6. PdxT/SNO appear to encode the glutaminase subunit, which produces ammonia from glutamine.
