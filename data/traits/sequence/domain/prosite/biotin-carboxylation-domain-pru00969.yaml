identifier: PROSITE:PRU00969
label: Biotin carboxylation domain
definition: >-
  Biotin carboxylation (BC) domain profile. Biotin-dependent carboxylase enzymes perform a two step reaction. Enzyme-bound biotin is first carboxylated by bicarbonate and ATP and the carboxyl group temporarily bound to biotin is subsequently transferred to an acceptor substrate such as pyruvate or acetyl-CoA. The first step is mediated by the BC domain common to all biotin-dependent carboxylases. The BC domain can be divided in three subdomains (N-terminal, central and C-terminal). The N-terminal region provides part of the active site; the central region corresponds to the ATP-grasp domain (see <PDOC50975>), which is common to many ATP-dependent enzymes involved in macromolecular synthesis.
