identifier: PROSITE:PRU00411
label: LuxR-type HTH domain
definition: >-
  LuxR-type HTH domain signature and profile. The luxR-type HTH domain is a DNA-binding, helix-turn-helix (HTH) domain of about 65 amino acids, present in transcription regulators of the LuxR/FixJ family of response regulators. The domain is named after Vibrio fischeri luxR, a transcriptional activator for quorum-sensing control of luminescence. LuxR-type HTH domain proteins occur in bacteria and in chloroplasts of algae. The DNA-binding HTH domain is usually located in the C-terminal part; the N-terminal part can contain an autoinducer binding domain or a response regulatory domain (see <PDOC50110>).
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
