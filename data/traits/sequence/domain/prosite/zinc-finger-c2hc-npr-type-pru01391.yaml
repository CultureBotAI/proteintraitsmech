identifier: PROSITE:PRU01391
label: Zinc finger C2HC NPR-type
definition: >-
  A prominent feature of NPR proteins is the presence of a conserved cysteine cluster within the BTB domain. These cysteine residues together with a conserved histidine (C-X-D-X(2,3)-C-X-H-X(2)-C) form a zinc finger motif that bridges the BTB domain with the ANKs.
