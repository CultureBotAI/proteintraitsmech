identifier: PROSITE:PRU00851
label: SGF29 C-terminal domain
definition: >-
  SGF29 C-terminal domain profile. Eukaryotic SGF29 is a component of histone acetyltransferase (HAT) complexes TATA-binding protein-free TAF-containing (TFTC) and SPT3-TAF9-GCN5- acetyltransferase (STAGA) or SPT-ADA-GCN5-acetyltransferase (SAGA). The SGF29 C-terminal domain contains a double Tudor-like motif that selectively binds the H3K4me2/3 lysine methylation site on the N terminus of histone H3.
