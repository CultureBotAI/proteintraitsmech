identifier: PROSITE:PRU01212
label: GRASP-type PDZ domain
definition: >-
  Essentially all GRASPs contain a conserved N-terminal GRASP region, which comprises two tandem PDZ domains (PDZ1 and PDZ2), a classical protein- peptide interaction domain, and is responsible for GRASP homo-oligomerization and for the attachment to the Golgi membrane.
