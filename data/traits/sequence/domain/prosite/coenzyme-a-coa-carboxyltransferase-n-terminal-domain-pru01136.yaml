identifier: PROSITE:PRU01136
label: Coenzyme A (CoA) carboxyltransferase N-terminal domain
definition: >-
  The N- and C-terminal domains of the carboxyltransferase share similar polypeptide backbone folds, with a central beta-beta-alpha superhelix. The CoA molecule is mostly associated with the N-terminal domain. In bacterial acetyl coenzyme A carboxylase the N and C domains are encoded by two different polypeptides.
