identifier: PROSITE:PRU00113
label: HYR domain
definition: >-
  HYR domain profile. The HYR (HYalin Repeat) domain is an extracellular domain of about 80-100 amino acids. It has been named after the hyalin protein, which is composed exclusively of repeats of this domain.
