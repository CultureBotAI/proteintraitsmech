identifier: PROSITE:PRU00630
label: APSES-type HTH DNA_binding domain
definition: >-
  The APSES (ASM-1, Phd1, StuA, EFG1, and Sok2) domain is an ~110- residue sequence-specific DNA-binding domain found in a family of fungal transcription factors that regulate development or cell cycle progression.
