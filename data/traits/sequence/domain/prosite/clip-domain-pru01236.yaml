identifier: PROSITE:PRU01236
label: Clip domain
definition: >-
  Clip domain profile. Some biological processes such as blood coagulation in mammals or development and immune responses in invertebrates occur after the amplification of a recognition signal by serine proteases (SP) (see <PDOC00124>) that are organized in cascades. These SPs are characterized by a modular organization comprising a C-terminal catalytic domain and one or several N-terminal domains (CUB, EGF-like, LDL, CCP, or clip) and are activated in a very specific order. Clip-domain SP (see <PDOC00124>) is an important SP family involved in many biological processes, which is only found in invertebrates.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
