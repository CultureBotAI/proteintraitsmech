identifier: PROSITE:PRU00436
label: CTF/NF-I DNA-binding domain
definition: >-
  CTF/NF-I DNA-binding domain signature and profile. Nuclear factor I (NF-I) or CCAAT box-binding transcription factor (CTF) (also known as TGGCA-binding proteins) are a family of vertebrate nuclear proteins which recognize and bind, as dimers, the palindromic DNA sequence 5'-TTGGCNNNNNGCCAA-3'. CTF/NF-I binding sites are present in viral and cellular promoters and in the origin of DNA replication of Adenovirus type 2.
