identifier: PROSITE:PRU01070
label: Prokaryotic N-terminal methylation
definition: >-
  Gram-negative bacteria produce pilin which are characterized by the presence of a very short leader peptide of 6 to 7 residues, followed by a methylated N-terminal phenylalanine residue and by a highly conserved sequence of about 24 hydrophobic residues. This class of pilin is often referred to as NMePhe or type-4 pili.
