identifier: PROSITE:PRU01051
label: Bms1-type guanine nucleotide-binding (G) domain
definition: >-
  Bms1p and Tsr1p represent a new family of factors required for ribosome biogenesis. They are each independently required for 40S ribosomal subunit biogenesis. Bms1p, a protein required for pre-rRNA processing, contains an evolutionarily conserved G domain with five conserved polypeptide loops designated G1 through G5, which form contact sites with the guanine nucleotide or coordinate the Mg(2+) ion. Tsr1p lacks a P-loop and is not predicted to bind GTP.
