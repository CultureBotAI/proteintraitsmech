identifier: PROSITE:PRU00626
label: CRM domain
definition: >-
  CRM domain profile. The CRM domain is an ~100-amino acid RNA-binding domain. The name chloroplast RNA splicing and ribosome maturation (CRM) has been suggested to reflect the functions established for the four characterized members of the family (CRS1, CAF1, CAF2 and YhbY). The CRM domain is found in eubacteria, archaea, and plants. The CRM domain is represented as a stand-alone protein in archaea and bacteria, and in single- and multidomain proteins in plants.
