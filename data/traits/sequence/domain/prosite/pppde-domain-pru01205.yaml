identifier: PROSITE:PRU01205
label: PPPDE domain
definition: >-
  The PPPDE domain has a papain-like fold, in which a catalytic dyad is formed by a conserved N-terminal histidine residue on a beta-strand (beta2) and a conserved C-terminal cysteine residue on a following alpha- helix (alpha3).
