identifier: PROSITE:PRU01247
label: Flp-type tyrosine recombinase domain
definition: >-
  The yeast Flp recombinase is a tyrosine site-specific recombinase responsible for the control of plasmid copy number. All members of the tyrosine, or lambda integrase family of site-specific recombinases proceed via a 3' covalent phosphotyrosine intermediate to catalyze a variety of DNA rearrangements, including insertions, deletions, and inversions, depending on the location and orientation of cognate recombination target sites.
