identifier: PROSITE:PRU01323
label: YebF/Cmi domain
definition: >-
  ColM-producing strains are protected from the toxin that they produce by coexpression of a specific immunity protein, named Cmi. Cmi is anchored in the cytoplasmic membrane with an alpha-helix and contains a periplasmic domain that shows sequence similarity to YebF-like proteins which are known to be secreted into the external medium by some Gram-negative bacteria. The YebF/Cmi domain is typified by two cysteine residues, required for Cmi folding and structure stabilization.
