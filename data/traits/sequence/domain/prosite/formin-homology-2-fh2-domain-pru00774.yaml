identifier: PROSITE:PRU00774
label: Formin homology-2 (FH2) domain
definition: >-
  Formin homology-2 (FH2) domain profile. Formin proteins participate in a wide range of cytoskeletal processes in all eukaryotes. They promote nucleation and elongation of the actin filament, and thus are key regulators for this process. The defining feature of formins is a highly conserved ~400 residue region, the Formin Homology-2 (FH2) domain, which forms a head-to-tail ring-shaped dimer, and directly binds to the actin filament at its barbed end. The FH2 domain catalyzes the nucleation and elongation of actin filament, preventing capping proteins from binding to the barbed end.
