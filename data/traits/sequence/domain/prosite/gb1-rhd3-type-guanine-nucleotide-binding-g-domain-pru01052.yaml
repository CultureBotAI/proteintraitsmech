identifier: PROSITE:PRU01052
label: GB1/RHD3-type guanine nucleotide-binding (G) domain
definition: >-
  The GB1/RHD3 GTPase family contains a large G domain (~230 amino acids). The GB1/RHD3-type G domain has a low intrinsic affinity for nucleotide and often depends on nucleotide-dependent homodimerization to facilitate GTP hydrolysis.
