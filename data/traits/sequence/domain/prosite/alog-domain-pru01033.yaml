identifier: PROSITE:PRU01033
label: ALOG domain
definition: >-
  ALOG domain profile. The 125-residue ALOG (Arabidopsis LSH1 and oryza G1) domain is rich in basic amino acids, especially arginine, and is highly conserved among land plants. Members of the ALOG family of proteins function as key developmental regulators. It has been proposed that the ALOG domain originated from the N- terminal DNA-binding domains of integrases belonging to the tyrosine recombinase superfamily encoded by a distinct type of DIRS1-like LTR retrotransposon found in several eukaryotes. Secondary structure predictions revealed an all-alpha helical domain with four conserved helices.
