identifier: PROSITE:PRU01131
label: Zinc finger FLZ-type
definition: >-
  Zinc finger FLZ-type profile. Zinc fingers are a ubiquitous class of protein domain with considerable variation in structure and function. The FCS-type zinc finger is a highly diverged group of C2-C2 zinc finger which is present in animals, prokaryotes and viruses, but not in plant. It is named after the conserved phenylalanine and serine residues associated with the third cysteine. The FCS-type zinc finger is a structurally diverse family which accommodate both nucleic-protein and protein-protein interaction zinc fingers. The FCS-Like Zinc finger (FLZ) domain is a plant specific domain found in all taxa except algae.
