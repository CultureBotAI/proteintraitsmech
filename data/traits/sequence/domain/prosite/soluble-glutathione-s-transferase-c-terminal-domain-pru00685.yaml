identifier: PROSITE:PRU00685
label: Soluble glutathione S-transferase C-terminal domain
definition: >-
  Soluble glutathione S-transferase N- and C-terminal domain profiles. Glutathione S-transferases (GSTs) (EC 2.5.1.18) are involved in detoxification of xenobiotic compounds and in the biosynthesis of important metabolites. Two distinct superfamilies of GST isoenzymes exist. The larger superfamily comprises cytosolic, or soluble, dimeric enzymes that are principally, but not exclusively, involved in biotransformation of toxic xenobiotics and endobiotics. The other superfamily is composed of microsomal proteins primarily involved in arachidonic acid metabolism.
