identifier: PROSITE:PRU00320
label: Psq-type HTH domain
definition: >-
  Psq-type HTH domain profile. The psq-type HTH domain is a DNA-binding, helix-turn-helix (HTH) domain of about 50 amino acids present in eukaryotic proteins of the Pipsqueak family. This family is named after the Drosophila pipsqueak protein, containing a DNA-binding domain that consists of four tandem repeats of the psq motif. Proteins of the Pipsqueak family occur in vertebrates, insects, nematodes, and fungi. Three subgroups of the family have been described: BTB, E93 and CENP-B.
