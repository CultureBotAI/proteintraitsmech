identifier: PROSITE:PRU00268
label: S5 double stranded RNA-binding domain
definition: >-
  Ribosomal protein S5 signature and profile. Ribosomal protein S5 is one of the proteins from the small ribosomal subunit. In Escherichia coli, S5 is known to be important in the assembly and function of the 30S ribosomal subunit. Mutations in S5 have been shown to increase translational error frequencies.
