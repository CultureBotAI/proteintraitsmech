identifier: PROSITE:PRU00653
label: Insulin-like growth factor binding protein N-terminal domain
definition: >-
  Insulin-like growth factor binding protein (IGFBP) N-terminal domain signature and profile. The insulin-like growth factors (IGF-I and IGF-II) bind to specific binding proteins in extracellular fluids with high affinity. These IGF-binding proteins (IGFBP) prolong the half-life of the IGFs and have been shown to either inhibit or stimulate the growth promoting effects of the IGFs on cells culture. They seem to alter the interaction of IGFs with their cell surface receptors. The IGFBP family comprises six proteins (IGFBP-1 to -6) that bind to IGFs with high affinity. The precursor forms of all six IGFBPs have secretory signal peptides.
