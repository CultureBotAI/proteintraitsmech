identifier: PROSITE:PRU00732
label: SEP domain
definition: >-
  SEP domain profile. The SEP (after shp1, eyc and p47) domain is an eukaryotic domain, which occurs frequently and mainly in single units. Almost all proteins containing a SEP domain are succeeded closely by a UBX domain (see <PDOC50033>). The function of the SEP domain is as yet unknown but it has been proposed to act as a reversible competitive inhibitor of the lysosomal cysteine protease cathepsin L.
