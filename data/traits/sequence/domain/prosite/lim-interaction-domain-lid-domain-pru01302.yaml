identifier: PROSITE:PRU01302
label: LIM interaction domain (LID) domain
definition: >-
  It can bind the LIM domains of different LMO and LIM-HD proteins (which have sequence identities of as low as 35% within the LIM domains) but not to the LIM domains from other proteins, such as the LIM kinases, which have closely related LIM domains.
