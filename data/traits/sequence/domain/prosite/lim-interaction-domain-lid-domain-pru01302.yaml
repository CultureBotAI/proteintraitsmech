identifier: PROSITE:PRU01302
label: LIM interaction domain (LID) domain
definition: >-
  LIM interaction domain (LID) domain profile. LMO (LIM-only) and LIM-HD (LIM-homeodomain) proteins are closely related protein families that have roles in determining cell fate, and are required for the correct development of many different organs and tissue types. These proteins all contain a pair of closely spaced LIM domains (see <PDOC00382>) near their N-termini that mediate protein-protein interactions, including binding to the ~30-residue LID (LIM interaction domain) of the Ldb (LIM domain-binding protein) family of ubiquitously expressed cofactors.
