identifier: PROSITE:PRU01342
label: DEK C-terminal (DEK-C) domain
definition: >-
  DEK C-terminal (DEK-C) domain profile. The DEK-C domain was first detected in the C-terminal region of the chromatin- associated protein DEK. The DEK-C domain is able to bind DNA and induce protein-protein interactions, but its function remains unknown.
