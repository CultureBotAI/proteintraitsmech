identifier: PROSITE:PRU00188
label: SEA domain
definition: >-
  SEA domain profile. The SEA domain has been named after the first three proteins in which it was identified (Sperm protein, Enterokinase and Agrin). SEA domains consist of about 120 residues, of which about 80 residues are highly conserved. The SEA domains always exist in the extracellular region and often are accompanied by an-O-linked glycochain at the N-terminal side. The SEA domain is found in one or more copies in mosaic extracellular or transmembrane proteins. A subclass of proteins with the SEA domain fold exists as heterodimers generated by autoproteolytic cleavage between a serine and a glycine at a characteristic GSVVV sequence.
