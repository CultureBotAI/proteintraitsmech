identifier: PROSITE:PRU00847
label: BRX domain
definition: >-
  BRX domain profile. BREVIS RADIX (BRX) controls the extent of cell proliferation and elongation in the growth zone of the root type. BRX is a member of a small group of highly conserved proteins, the BRX protein family, which is only found in multicellular plants. Four regions of high conservation can be distinguished in BRX family proteins. BRX family proteins contain four highly conserved domains of initially unknown function; most characteristically, a tandem repeat of 55 amino acids termed the BRX domain, which has been shown to mediate homo- and heterotypic protein-protein interactions. The BRX domain is predicted to form an alpha-helical structure.
