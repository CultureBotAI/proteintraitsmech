identifier: PROSITE:PRU01341
label: UPF1 cysteine-histidine-rich (CH-rich) domain
definition: >-
  In its N-terminal region, Upf1 has a conserved cysteine-histidine- rich (CH-rich) domain, while centrally it possesses the seven conserved motifs characteristic of eukaryotic group I RNA helicases. The Upf1 CH-rich domain has a cis-inhibitory effect on the ATPase activity and is also the region that binds Upf2.
