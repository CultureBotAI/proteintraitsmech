identifier: PROSITE:PRU01147
label: DOG1 domain
definition: >-
  DOG1 domain profile. The DELAY OF GERMINATION1 (DOG1) protein is a positive regulator for the establishment and maintenance of primary seed dormancy in plants. DOG1 is involved in transducing maternal environmental conditions during seed development into effects on seed dormancy and in the loss of dormancy through dry after-ripening or moist chilling. DOG1 belongs to a small family of proteins that can be classified into five distinct clades (1-5). Of these, DOG1-like proteins in clades 1-4 have a similar architecture to DOG1, sharing the same domain.
