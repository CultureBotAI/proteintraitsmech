identifier: PROSITE:PRU00294
label: Arfaptin homology (AH) domain
definition: >-
  Arfaptin homology (AH) domain profile. The arfaptin homology domain (AH) is an about 210-residue region of homology, which has been identified between PICK1 and arfaptins. The AH domain can be found alone or in association with other domains such as PDZ (see <PDOC50106>). The AH domain of arfaptin has been shown to dimerize and to bind Arf and Rho family GTPases.
