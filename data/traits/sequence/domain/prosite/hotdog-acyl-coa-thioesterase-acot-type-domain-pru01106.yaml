identifier: PROSITE:PRU01106
label: HotDog acyl-CoA thioesterase (ACOT)-type domain
definition: >-
  HotDog acyl-CoA thioesterase (ACOT)-type domain profile. The HotDog domain is widespread in eukaryotes, bacteria, and archaea and is involved in a range of cellular processes, from thioester hydrolysis, to phenylacetic acid degradation and transcriptional regulation of fatty acid biosynthesis. The HotDog domain has a mixed alpha+beta fold structure, which adopts a five- to seven-stranded antiparallel beta-sheet as the 'bun' wrapping around a central alpha-helix sausage.
