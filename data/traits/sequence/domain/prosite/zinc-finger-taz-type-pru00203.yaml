identifier: PROSITE:PRU00203
label: Zinc finger TAZ-type
definition: >-
  Zinc finger TAZ-type profile. Cyclic-AMP response element binding protein (CBP) and the related protein p300 are large nuclear molecules that interact with transcriptional activators and repressors. They belong to a class of protein containing an histone acetyltransferase activity, which suggests a role in chromatin remodeling. They have been implicated in biological function as diverse as cell growth, differentiation, or apoptosis.
