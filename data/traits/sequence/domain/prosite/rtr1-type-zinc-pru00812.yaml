identifier: PROSITE:PRU00812
label: RTR1-type zinc
definition: >-
  The eukaryotic protein family Rtr1/RPAP2 interacts with the C- terminal domain CTD of RNA polymerase II (RNAPII). It has been shown in yeast that Rtr1 is a CTD phosphatase that regulates RNAPII during the transition from serine 5 to serine 2 phosphorylation. Rtr1 proteins are poorly conserved overall, but they share a motif with three strictly conserved Cys residues and another residue conserved as His (in most fungi) or Cys (in animals and S. pombe), suggestive of a zinc finger motif (C-x(4)-C-x(n)-C-x(3)-[CH], where n ranges from 30 to 50).
