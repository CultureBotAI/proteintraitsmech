identifier: PROSITE:PRU10054
label: Alpha-L-fucosidase putative active site
definition: >-
  Alpha-L-fucosidase putative active site. Alpha-L-fucosidase (EC 3.2.1.51) is a lysosomal enzyme responsible for hydrolyzing the alpha-1,6-linked fucose joined to the reducing-end N-acetylglucosamine of the carbohydrate moieties of glycoproteins. Deficiency of alpha-L-fucosidase results in the lysosomal storage disease fucosidosis.
