identifier: PROSITE:PRU00257
label: Cro/C1-type HTH domain
definition: >-
  Cro/C1-type HTH domain profile. The cro/C1-type HTH domain is a DNA-binding, helix-turn-helix (HTH) domain of about 50-60 residues present in transcriptional regulators. The domain is named after the transcriptional repressors cro and C1 of temperate bacteriophages 434 and lambda, respectively. Besides in bacteriophages, cro/C1-type regulators are present in prokaryotes and in eukaryotes. The helix-turn-helix DNA-binding motif is generally located in the N-terminal part of these transcriptional regulators. The C-terminal part may contain an oligomerization domain, e.g. C1 repressors and CopR act as dimers, while SinR is a tetramer.
