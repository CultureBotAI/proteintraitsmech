identifier: PROSITE:PRU01064
label: Rtt109-type histone acetyltransferase (HAT) domain
definition: >-
  Rtt109, also known as KAT11, is a recently characterized fungal- specific HAT that modifies histone H3 lysine 56 (H3K56) to promote genome stability and resistance to a variety of DNA-damaging agents.
