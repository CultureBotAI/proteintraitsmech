identifier: PROSITE:PRU01133
label: Translationally controlled tumor protein (TCTP) domain
definition: >-
  The translationally controlled tumor proteins (TCTPs, such as p21, p23 and histamine releasing factor (HRF)) are a highly conserved and abundantly expressed family of eukaryotic proteins that are implicated in a variety of cellular functions, including microtubule stabilization, cell cycle, apoptosis, and cytokine release.
