identifier: PROSITE:PRU01077
label: F-BAR domain
definition: >-
  F-BAR domain profile. All eukaryotic cells are surrounded by a plasma membrane, and they also contain multiple membrane-based organelles and structures inside cells. Thus membrane remodeling is likely to be important for most cellular activities and development. The Bin-Amphiphysin-Rvs (BAR) domain superfamily of proteins has been found to play a major role in remodeling cellular membranes linked with organelle biogenesis, membrane trafficking, cell division, cell morphology and cell migration. The BAR domain superfamily of proteins is evolutionarily conserved with representative members present from yeast to man.
