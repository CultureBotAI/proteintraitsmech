identifier: PROSITE:PRU00858
label: RFX-type winged-helix DNA-binding domain
definition: >-
  The characteristic RFX-type HTH DNA binding domain has been recruited into otherwise very divergent regulatory factors functioning in a diverse spectrum of unrelated systems, including regulation of the mitotic cell cycle in fission yeast, the control of the immune response in mammals, and infection by human hepatitis B virus.
