identifier: PROSITE:PRU01041
label: GP-PDE domain
definition: >-
  GP-PDE domain profile. The glycerophosphodiester phosphodiesterases (GD-PDEs) were initially characterized in bacteria, where they have functional roles for production of metabolic carbon and phosphate sources from glycerophosphodiesters and in adherence to and degradation of mammalian host-cell membranes. Mammalian GP- GDEs have been identified more recently and shown to be implicated in several physiological functions. GD-PDEs are involved in glycerol metabolism and catalyze the reaction of glycerophosphodiester and water to alcohol and sn-glycerol-3-phosphate.
