identifier: PROSITE:PRU00680
label: Glycosyl hydrolases family 22 (GH22) domain
definition: >-
  Alpha-lactalbumin, a regulatory protein in milk, and lysozyme (EC 3.2.1.17) C (chicken type), which acts as a bacteriolytic enzyme, belong to a family of proteins with eight conserved cysteines that form four disulfide bonds. Alpha-lactalbumin lacks the enzymatic activity and the corresponding Glu and Asp residues. Alpha-lactalbumin binds a calcium ion, while most lysozyme C do not bind calcium.
