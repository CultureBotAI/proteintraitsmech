identifier: PROSITE:PRU01124
label: CULT (for Cereblon domain of Unknown activity, binding cellular Ligands and
definition: >-
  The thalidomide-binding region of cereblon is a conserved domain, CULT, carrying several invariant cysteine and tryptophan residues. The nature of the binding pocket, an aromatic cage of three tryptophan residues, suggests a role in the recognition of cationic ligands.
