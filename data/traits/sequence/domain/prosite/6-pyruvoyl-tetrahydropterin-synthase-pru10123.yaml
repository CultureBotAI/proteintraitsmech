identifier: PROSITE:PRU10123
label: 6-pyruvoyl tetrahydropterin synthase
definition: >-
  6-pyruvoyl tetrahydropterin synthase signatures. 6-pyruvoyl tetrahydropterin synthase (EC 4.2.3.12) (PTPS) catalyzes the second step in the biosynthesis of tetrahydrobiopterin (BH4); a complex rearrangement of 7,8-dihydroneopterin triphosphate into 6-pyruvoyl tetrahydropterin.
