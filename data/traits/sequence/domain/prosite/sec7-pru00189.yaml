identifier: PROSITE:PRU00189
label: SEC7
definition: >-
  SEC7 domain profile. The SEC7 domain was named after the first protein found to contain such a region. SEC7 family proteins are guanine nucleotide exchange factor (GEF) specific for the ADP-rybosylation factors (ARF), a Ras-like GTPases which is important for vesicular protein trafficking. Although SEC7 proteins are highly divergent in their overall sequence they share a common region of roughly 200 amino acids known as the SEC7 domain. Proteins containing a SEC7 domain are found in fungi, animals and plants.
