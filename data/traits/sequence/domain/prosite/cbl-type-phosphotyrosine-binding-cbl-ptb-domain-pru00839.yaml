identifier: PROSITE:PRU00839
label: Cbl-type phosphotyrosine-binding (Cbl-PTB) domain
definition: >-
  Cbl-type phosphotyrosine-binding (Cbl-PTB) domain profile. Cbl (Casitas B-lineage lymphoma) is an adaptor protein that functions as a negative regulator of many signalling pathways that start from receptors at the cell surface. The evolutionarily conserved amino-terminal region of Cbl (Cbl-N) binds to phosphorylated tyrosine residues and has cell-transforming activity. The N-terminal Cbl-type phosphotyrosine-binding (Cbl-PTB) domain is composed of three interacting domains: a four-helix bundle (4H), an EF-hand- like calcium-binding domain (see <PDOC00018>), and a divergent SH2-like domain (see <PDOC50001>).
