identifier: PROSITE:PRU00037
label: BTB domain
definition: >-
  BTB domain profile. The BTB domain (Broad-Complex, Tramtrack and Bric a brac) is also known as the POZ domain (POxvirus and Zinc finger). It is a homodimerization domain occurring at the N-terminus of proteins containing multiple copies of either zinc fingers of the C2H2 type (see <PDOC00028>) or Kelch repeats. Many BTB proteins are transcriptional regulators that are thought to act through the control of chromatin structure.
