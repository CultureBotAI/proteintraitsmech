identifier: PROSITE:PRU00171
label: RGS
definition: >-
  RGS domain profile. Regulators of G-protein signaling (RGS) proteins are a family of highly diverse, multifunctional signaling proteins that are found in eukaryotic species ranging from yeast to mammals. They act as GTPase activating proteins (GAPs) that reduce the signal transmitted by the receptor-activated (GTP bound) G-alpha subunit by rapidly returning it to the inactive state (GDP bound). Although they are a diverse group of proteins, all RGS family members share a conserved 120 amino acid domain, the RGS domain. The RGS domain binds to activated G-alpha subunits and is responsible for GAP function.
