identifier: PROSITE:PRU00457
label: Integrase catalytic domain
definition: >-
  Integrase catalytic domain profile. The retroviral integrase is the enzyme responsible for the insertion of a DNA copy of the viral genome into host DNA, an essential step in the replication cycle of viruses. Integrases comprise three functional and structural domains: the central core domain, which contains the catalytic residues, an N-terminal zinc finger (see <PDOC50876>) and a C-terminal DNA binding domain (see <PDOC51027>).
