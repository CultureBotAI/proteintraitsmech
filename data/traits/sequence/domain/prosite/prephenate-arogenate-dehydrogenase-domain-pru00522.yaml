identifier: PROSITE:PRU00522
label: Prephenate/arogenate dehydrogenase domain
definition: >-
  Prephenate dehydrogenase (EC 1.3.1.12) (PDH), arogenate dehydrogenase (EC 1.3.1.43) (ADH) and cyclohexadienyl dehydrogenase (which can accept both prephenate and arogenate as substrate) are dehydrogenases of different intermediates for the biosynthesis of tyrosine.
