identifier: PROSITE:PRU01005
label: ShKT domain
definition: >-
  In venomous creatures, the ShKT domain may have been modified to give rise to potent ion channel blockers, whereas the incorporation of this domain into plant oxidoreductases and prolyl hydroxylases and into worm astacin-like metalloproteases and trypsin-like serines protaeses produced enzymes with potential channel-modulatory activity.
