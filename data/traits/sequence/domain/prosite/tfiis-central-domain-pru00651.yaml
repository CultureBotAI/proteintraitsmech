identifier: PROSITE:PRU00651
label: TFIIS central domain
definition: >-
  The transcription factor IIS (TFIIS) is a modular factor that comprises an N-terminal domain, a central domain, and a C-terminal TFIIS-type zinc finger. The central domain is conserved in TFIIS homologues and interacts with RNA polymerase II.
