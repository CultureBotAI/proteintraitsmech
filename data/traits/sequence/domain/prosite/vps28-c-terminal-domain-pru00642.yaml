identifier: PROSITE:PRU00642
label: VPS28 C-terminal domain
definition: >-
  The C-terminal domain of VPS28 is characterized by a high-sequence conservation throughout all kingdoms of life. It serves as an adaptor module linked to the ESCRT-I complex that connects its function to other components of the VPS machinery, including ESCRT-III VPS20.
