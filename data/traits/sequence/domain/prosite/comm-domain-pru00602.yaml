identifier: PROSITE:PRU00602
label: COMM domain
definition: >-
  The proteins designated as COMMD or COMM domain containing 1-10 are extensively conserved in multicellular eukaryotic organisms. The protein family is defined by the presence of a C-terminal motif termed COMM domain, which functions as an interface for protein-protein interactions.
