identifier: PROSITE:PRU01266
label: Radical SAM core domain
definition: >-
  Radical SAM core domain profile. The Radical S-adenosylmethionine (SAM) superfamily is an ancient and diverged group found from all three domains of life. Radical SAM proteins share an unusual Fe-S cluster associated with generation of a free radical by reductive cleavage of SAM and often provide an anaerobic or oxygen-independent mechanism that is found as an aerobic reaction in other proteins.They catalyze diverse reactions, including unusual methylations, isomerization, sulfur insertion, ring formation, anaerobic oxidation and protein radical formation. Radical SAM proteins function in DNA precursor, vitamin, cofactor, antibiotic and herbicide biosynthesis and in biodegradation pathways.
