identifier: PROSITE:PRU01266
label: Radical SAM core domain
definition: >-
  The radical SAM enzymes biochemically characterized to date have in common the cleavage of the [4Fe-4S]1+-SAM complex to [4Fe-4S]2+-Met and the 5'-deoxyadenosyl radical, which abstracts a hydrogen atom from the substrate to initiate a radical mechanism.
