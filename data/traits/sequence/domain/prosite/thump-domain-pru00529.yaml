identifier: PROSITE:PRU00529
label: THUMP domain
definition: >-
  THUMP domain profile. The THUMP (after thiouridine synthases, RNA methylases and pseudouridine synthases) domain is a module of 100-110 amino acid residues which is involved RNA metabolism. It is shared by enzymes that are predicted to carry out at least three unrelated types of RNA-modification, namely methylation, pseudouridylation and thiouridylation. The THUMP domain can occur in stand- alone form or in association with a variety of catalytic domains, like methylase, pseudo U-synthase or rhodanese (see <PDOC00322>). THUMP is an ancient domain with predicted RNA-binding capacity that probably functions by delivering a variety of RNA modification enzymes to their targets.
