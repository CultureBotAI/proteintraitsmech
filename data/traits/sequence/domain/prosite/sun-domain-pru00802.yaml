identifier: PROSITE:PRU00802
label: SUN domain
definition: >-
  SUN proteins are anchored in the inner nuclear envelope by their transmembrane segment and oriented in the membrane such that the C-terminal SUN domain is located in the space between the inner and outer nuclear membrane. Here, the SUN domain can interact with the C-terminal tail of an outer nuclear envelope protein that binds to the cytoskeleton, including the centrosome.
