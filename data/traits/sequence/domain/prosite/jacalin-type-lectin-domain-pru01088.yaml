identifier: PROSITE:PRU01088
label: Jacalin-type lectin domain
definition: >-
  Jacalin-type lectin domain profile. Lectins, a well-known class of carbohydrate-binding proteins, are known to be important in a variety of biological processes, mediated through their carbohydrate specificities. Plant lectins are broadly divided into six classes based on their subunit folds. These are legume lectins (see <PDOC00278>), jacalin-related lectins (JRLs), monocot mannose-binding lectins (see <PDOC50927>), trefoil lectins, cyanovirin-N lectin, and hevein domain lectins. JRLs derive their name from jacalin, the first member to be identified from the seed of jackfruit.
