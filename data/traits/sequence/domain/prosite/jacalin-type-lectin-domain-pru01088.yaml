identifier: PROSITE:PRU01088
label: Jacalin-type lectin domain
definition: >-
  Based on the known sugar specificity, the jacalin-type lectin domain can be broadly divided into two classes: (1) the galactose-specific domains and (2) the mannose/glucose-specific domains.
