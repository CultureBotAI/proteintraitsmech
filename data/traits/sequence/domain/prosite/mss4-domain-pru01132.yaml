label: Mss4 domain
definition: >-
  Although it was first proposed to function as a guanine exchange factor (GEF) for Rab GTPases, it was soon described as a quite inefficient GEF and was thus suggested to function rather as a chaperone, protecting nucleotide free Rabs from degradation, than as a GEF.
