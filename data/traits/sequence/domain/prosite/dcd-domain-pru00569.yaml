identifier: PROSITE:PRU00569
label: DCD domain
definition: >-
  DCD domain profile. The DCD domain is found in plant proteins involved in development and cell death. The DCD domain is an ~130 amino acid long stretch that contains several mostly invariable motifs. These include a FGLP and a LFL motif at the N- terminus and a PAQV and a PLxE motif towards the C-terminus of the domain. The DCD domain is present in proteins with different architectures. Some of these proteins contain additional recognizable motifs, like the KELCH repeats or the ParB domain.
