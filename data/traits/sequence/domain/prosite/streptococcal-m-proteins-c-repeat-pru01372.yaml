identifier: PROSITE:PRU01372
label: Streptococcal M proteins C repeat
definition: >-
  M proteins belong to a family of fibrous streptococcal surface proteins which represent major virulence factors due to their antiphagocytic activities. The C repeats are present in all M proteins, although the number of repeat sequences varies from two (M6) to four (M12). The conserved repetitive C units are responsible for several biological activities of M and M-like proteins.
