label: Zinc finger C2HC LYAR-type
definition: >-
  Ly-1 antibody reactive clone (Lyar), which is known to be expressed abundantly in the testis, encodes a nucleolar protein that contain a LYAR- type C2HC zinc finger motif and three nuclear localization signals.
