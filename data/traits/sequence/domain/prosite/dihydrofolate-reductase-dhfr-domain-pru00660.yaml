label: Dihydrofolate reductase (DHFR) domain
definition: >-
  Dihydrofolate reductases (DHFRs) (EC 1.5.1.3) are ubiquitous enzymes which catalyze the NADPH-linked reduction of 7,8-dihydrofolate to 5,6,7,8- tetrahydrofolate.
