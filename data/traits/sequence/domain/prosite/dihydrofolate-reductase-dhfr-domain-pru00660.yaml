identifier: PROSITE:PRU00660
label: Dihydrofolate reductase (DHFR) domain
definition: >-
  Dihydrofolate reductase (DHFR) domain signature and profile. Dihydrofolate reductases (DHFRs) (EC 1.5.1.3) are ubiquitous enzymes which catalyze the NADPH-linked reduction of 7,8-dihydrofolate to 5,6,7,8- tetrahydrofolate. DHFRs are also capable of catalyzing the NADPH-linked reduction of folate to 7,8-dihydrofolate, but at a lesser rate, which varies among species. They can be inhibited by a number of antagonists such as trimethroprim and methotrexate which are used as antibacterial or anticancerous agents.
