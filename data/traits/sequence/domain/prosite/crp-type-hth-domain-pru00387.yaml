identifier: PROSITE:PRU00387
label: Crp-type HTH domain
definition: >-
  Crp-type HTH domain signature and profile. The crp-type HTH domain is a DNA-binding, winged helix-turn-helix (wHTH) domain of about 70-75 amino acids present in transcription regulators of the crp-fnr family, involved in the control of virulence factors, enzymes of aromatic ring degradation, nitrogen fixation, photosynthesis, and various types of respiration. The crp-fnr family is named after the first members identified in E.coli: the well characterized cyclic AMP receptor protein CRP or CAP (catabolite activator protein) and the fumarate and nitrate reductase regulator Fnr. crp-type HTH domain proteins occur in most bacteria and in chloroplasts of red algae.
