identifier: PROSITE:PRU00403
label: Stonin homology domain (SHD)
definition: >-
  The ~140 amino-acid SHD domain may be unique to members of the stonin family, which are supposed to be endocytotic proteins involved in clathrin-mediated endocytosis at synapses. Its function is not yet known.
