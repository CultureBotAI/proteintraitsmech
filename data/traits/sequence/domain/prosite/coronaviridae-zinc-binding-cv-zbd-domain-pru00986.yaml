identifier: PROSITE:PRU00986
label: Coronaviridae zinc-binding (CV ZBD) domain
definition: >-
  The ZBD is comprised of about 80 to 100 residues, including 12 to 13 conserved Cys/His residues. It consists of a RING-like module and treble- cleft zinc finger, together coordinating three Zn atoms.
