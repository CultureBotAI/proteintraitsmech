identifier: PROSITE:PRU01223
label: Hypovirulence-associated virus (HAV) papain-like protease p48 domain
definition: >-
  The HAV papain-like protease p48 is a cysteine protease, which forms the peptidase family C8. A Cys and a His catalytic residue are essential for autocatalytic cleavage between the cleavage site residues Gly and Ala located at the C-terminus of the domain.
