identifier: PROSITE:PRU01362
label: DNA ADP-ribosyl transferase (DarT) domain
definition: >-
  DNA ADP-ribosyl transferase (DarT) domain profile. ADP-ribosylation is a chemical modification of macromolecules via transfer of an ADP-ribose (ADPr) moiety from NAD(+) onto molecular targets (usually proteins). ADP-ribosyltransferases use NAD(+) to catalyse substrate ADP- ribosylation, and thereby regulate cellular pathways or contribute to toxin- mediated pathogenicity of bacteria. Reversible ADP-ribosylation of DNA on thymidine bases occurs through the DarT-DarG toxin-antitoxin system, which is found in a variety of bacteria (including global pathogens such as Mycobacterium tuberculosis, enteropathogenic Escherichia coli and Pseudomonas aeruginosa).
