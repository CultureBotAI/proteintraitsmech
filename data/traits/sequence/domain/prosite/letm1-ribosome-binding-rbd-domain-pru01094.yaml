identifier: PROSITE:PRU01094
label: Letm1 ribosome-binding (RBD) domain
definition: >-
  Letm1 ribosome-binding (RBD) domain profile. Mitochondrial ribosomes synthesize core subunits of the inner membrane respiratory chain complexes. In mitochondria, ribosomes are mainly membrane associated and translation is tightly coupled to the inner mitochondrial membrane. Mdm38/Letm1 is a conserved membrane receptor for mitochondrial ribosomes and specifically involved in respiratory chain biogenesis.
