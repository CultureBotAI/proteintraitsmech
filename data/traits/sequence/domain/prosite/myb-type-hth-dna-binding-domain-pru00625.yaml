identifier: PROSITE:PRU00625
label: Myb-type HTH DNA-binding domain
definition: >-
  The myb-type HTH domain is a DNA-binding, helix-turn-helix (HTH) domain of ~55 amino acids, typically occurring in a tandem repeat in eukaryotic transcription factors. Some single myb-like domains can be involved in other functions, such as protein-binding, but several single myb-like domains bind DNA (see <PRU00133>).
