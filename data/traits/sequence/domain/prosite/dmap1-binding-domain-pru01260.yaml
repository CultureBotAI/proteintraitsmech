identifier: PROSITE:PRU01260
label: DMAP1-binding domain
definition: >-
  DMAP1-binding domain profile. The DNA methyltransferase 1 (DNMT1) is a multifunctional protein that is a critical DNA methyltransferase important for chromatin structure and gene silencing as well as methyltransferase-independent transcriptional repression. DNMT1 is composed of multiple functional domains. The N-terminal regulatory region contains conserved domains, including the DNA methyltransferase- associated protein 1 (DMAP1)-binding domain, the PCNA (proliferating cell nuclear antigen) binding domain (PBD) and the replication foci targeting sequence (RFTS) which control the subnuclear localization of DNMT1.
