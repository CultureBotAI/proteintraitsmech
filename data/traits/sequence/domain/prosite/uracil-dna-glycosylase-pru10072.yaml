identifier: PROSITE:PRU10072
label: Uracil-DNA glycosylase
definition: >-
  Uracil-DNA glycosylase signature. Uracil-DNA glycosylase (EC 3.2.2.-) (UNG) is a DNA repair enzyme that excises uracil residues from DNA by cleaving the N-glycosylic bond. Uracil in DNA can arise as a result of misincorportation of dUMP residues by DNA polymerase or deamination of cytosine.
