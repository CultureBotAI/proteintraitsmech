identifier: PROSITE:PRU00304
label: DENN domain
definition: >-
  The tripartite DENN domain is composed of three distinct modules which are always associated due to functional and/or structural constraints: upstream DENN or uDENN, the better conserved central or core or cDENN, and downstream or dDENN regions. The function of DENN domain remains to date unclear, although it appears to represent a good candidate for a GTP/GDP exchange activity.
