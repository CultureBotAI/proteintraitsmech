identifier: PROSITE:PRU00587
label: Munc13-homology domain 1 (MHD1)
definition: >-
  The MHD1 domain is present in a wide variety of proteins from Arabidopsis thaliana, C. elegans, Drosophila melanogaster, mouse, rat and human, some of which may function in a Munc13-like manner to regulate membrane trafficking.
