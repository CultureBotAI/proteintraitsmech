identifier: PROSITE:PRU01429
label: NCOA4 HERC2-binding domain (HBD)
definition: >-
  NCOA4 mainly contains an N-terminal coiled-coil domain that mediates the self-polymerization of NCOA4, a HECT and RLD-containing E3 ubiquitin protein ligase 2 (HERC2)-binding domain (HBD), and a C-terminal ferritin- binding motif (FBM). The HBD of NCOA4 sense the cellular iron level and is responsible for binding to HERC2 in an iron-sulfur cluster-dependent manner.
