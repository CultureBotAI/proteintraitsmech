identifier: PROSITE:PRU01002
label: WRC domain
definition: >-
  The WRC domain contains two distinctive features, namely a putative nuclear localization signal and a zinc-finger motif consisting of the conserved spacing of three Cys and one His residues (C3H motif). It has been suggested that the WRC domain functions in DNA binding.
