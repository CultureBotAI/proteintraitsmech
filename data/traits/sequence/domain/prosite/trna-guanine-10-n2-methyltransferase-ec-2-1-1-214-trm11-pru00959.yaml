identifier: PROSITE:PRU00959
label: tRNA (guanine(10)-N2)-methyltransferase (EC 2.1.1.214) (TRM11)
definition: >-
  tRNA (guanine(10)-N(2))-methyltransferase (EC 2.1.1.214) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to guanine(10) in tRNA to form N(2)-methylguanine(10) in tRNA and S-adenosyl-L- homocysteine.
