identifier: PROSITE:PRU10023
label: Chalcone and stilbene synthases active site
definition: >-
  Chalcone and stilbene synthases active site. Chalcone synthases (CHS) (EC 2.3.1.74) and stilbene synthases (STS) (formerly known as resveratrol synthases) are related plant enzymes. CHS is an important enzyme in flavanoid biosynthesis and STS a key enzyme in stilbene- type phyloalexin biosynthesis. Both enzymes catalyze the addition of three molecules of malonyl-CoA to a starter CoA ester (a typical example is 4-coumaroyl-CoA), producing either a chalcone (with CHS) or stilbene (with STS).
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
