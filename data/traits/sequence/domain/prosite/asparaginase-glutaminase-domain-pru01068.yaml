identifier: PROSITE:PRU01068
label: Asparaginase / glutaminase domain
definition: >-
  Asparaginase (EC 3.5.1.1), glutaminase (EC 3.5.1.2) and glutaminase- asparaginase (EC 3.5.1.38) are aminohydrolases that catalyze the hydrolysis of asparagine (or glutamine) to aspartate (or glutamate) and ammonia.
