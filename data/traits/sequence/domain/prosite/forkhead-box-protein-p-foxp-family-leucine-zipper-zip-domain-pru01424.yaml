label: Forkhead box protein P (FoxP) family leucine zipper (ZIP) domain
definition: >-
  FoxP subfamily members contain a zinc finger (ZF) that likely binds DNA, and a Leucine Zipper (ZIP), known to form antiparallel coiled-coil dimers, in addition to their forkhead domain.
