identifier: PROSITE:PRU01397
label: PEHE domain
definition: >-
  The PEHE domain, named after four highly conserved characteristic amino acidic residues (P, E, H, E) is found in subunits of two protein complexes, MSL and NSL, involved in histone acetylation in both vertebrates and invertebrates.
