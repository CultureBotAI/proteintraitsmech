identifier: PROSITE:PRU00636
label: PET domain
definition: >-
  PET domain profile. The PET domain is a ~110 amino acid motif in the N-terminal part of LIM domain proteins. The domain was described in Drosophila proteins involved in cell differentiation and is named after Prickle, Espinas and Testin. PET domain proteins contain about three zinc-binding LIM domains (see <PDOC00382>) and are found among metazoans. The PET domain has been suggested to play a role in protein-protein interactions with proteins involved in planar polarity signaling or organisation of the cytoskeleton.
