identifier: PROSITE:PRU01282
label: ArsC family
definition: >-
  Arsenate reductase arsC family profile. Several bacterial taxon have a chromosomal resistance system, encoded by the ars operon, for the detoxification of arsenate, arsenite, and antimonite. This system transports arsenite and antimonite out of the cell. Arsenate, however, must first be reduced to arsenite before it is extruded. ArsC is an ~150-residue arsenate reductase that uses reduced glutathione (GSH) to convert arsenate to arsenite with a redox active cysteine residue in the active site. ArsC forms an active quaternary complex with GSH, arsenate, and glutaredoxin 1 (Grx1). The three ligands must be present simultaneously for reduction to occur.
