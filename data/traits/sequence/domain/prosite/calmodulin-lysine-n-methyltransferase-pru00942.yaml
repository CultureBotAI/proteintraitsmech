identifier: PROSITE:PRU00942
label: Calmodulin-lysine N-methyltransferase
definition: >-
  Calmodulin-lysine N-methyltransferase (EC 2.1.1.60) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to calmodulin L-lysine to form calmodulin N(6)-methyl-L-lysine and S-adenosyl-L- homocysteine.
