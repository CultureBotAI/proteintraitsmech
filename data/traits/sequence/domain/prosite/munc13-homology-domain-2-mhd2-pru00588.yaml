identifier: PROSITE:PRU00588
label: Munc13-homology domain 2 (MHD2)
definition: >-
  Munc13-homology domains 1 and 2 (MHD1 and MHD2) profiles. Munc13 proteins constitute a family of three highly homologous molecules (Munc13-1, Munc13-2 and Munc13-3) with homology to Caenorhabditis elegans unc-13p. Munc13 proteins contain a phorbol ester-binding C1 domain (see <PDOC00379>) and two C2 domains, which are Ca2+/phospholipid binding domains (see <PDOC00380>). Sequence analyses have uncovered two regions called Munc13 homology domains 1 (MHD1) and 2 (MHD2) that are arranged between two flanking C2 domains. MHD1 and MHD2 domains are present in a wide variety of proteins from Arabidopsis thaliana, C.
