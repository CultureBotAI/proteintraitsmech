identifier: PROSITE:PRU10021
label: Chloramphenicol acetyltransferase active site
definition: >-
  Chloramphenicol acetyltransferase active site. Chloramphenicol O-acetyltransferase (CAT) (EC 2.3.1.28) catalyzes the acetyl-CoA dependent acetylation of chloramphenicol (Cm), an antibiotic which inhibits prokaryotic peptidyltransferase activity. Acetylation of Cm by CAT inactivates the antibiotic. A histidine residue, located in the C-terminal section of the enzyme, plays a central role in its catalytic mechanism. We derived a signature pattern from the region surrounding this active site residue.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
