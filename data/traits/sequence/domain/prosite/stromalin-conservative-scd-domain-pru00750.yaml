identifier: PROSITE:PRU00750
label: Stromalin conservative (SCD) domain
definition: >-
  Stromalins are represented in several organisms from yeast to humans and are characterized by the stromalin conservative domain (SCD), an 86 amino acid motif found in all proteins of the family described to date.
