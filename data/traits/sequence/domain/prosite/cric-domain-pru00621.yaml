identifier: PROSITE:PRU00621
label: CRIC domain
definition: >-
  CRIC domain profile. The multidomain protein Connector enhancer of kinase suppressor of ras (Connector enhancer of KSR) (CNK) functions as a scaffold in several signal cascades and acts on proliferation, differenciation and apoptosis. CNK connects upstream activators and downstream targets of Ras- and Rho-dependent signaling pathways and may allow cross-talks between these pathways. In invertebrates, CNK is expressed as one isoform, whereas in mammals there exists CNK1, CNK2A, and its splice variant CNK2B.
