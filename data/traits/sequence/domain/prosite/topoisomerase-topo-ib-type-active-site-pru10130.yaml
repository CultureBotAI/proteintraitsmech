identifier: PROSITE:PRU10130
label: Topoisomerase (Topo) IB-type active site
definition: >-
  The RKKRH/N "catalytic pentad", conserved in all members of the topo IB family, catalyzes the attack of the active site tyrosine nucleophile on the scissile phosphodiester.
