identifier: PROSITE:PRU01254
label: Zinc finger UBZ2-type
definition: >-
  The ubiquitin-binding zinc finger (UBZ) is a type of zinc- coordinating beta-beta-alpha fold domain found mainly in proteins involved in DNA repair and transcriptional regulation. UBZ domains coordinate a zinc ion with cysteine or histidine residues; depending on their amino acid sequence, UBZ domains are classified into several families. Type 2 UBZs are CCHC-type zinc fingers found in FAAP20 which is a subunit of the Fanconi anemia (FA) core complex.
