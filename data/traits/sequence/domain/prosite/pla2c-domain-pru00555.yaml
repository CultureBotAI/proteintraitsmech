label: PLA2c domain
definition: >-
  The PLA2c domain is the catalytic lipase domain in cytosolic phospholipase A2 (cPLA2) (EC 3.1.1.4) and lysophospholipase or phospholipase B (PLB) (EC 3.1.1.5) of vertebrates and fungi.
