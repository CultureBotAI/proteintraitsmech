identifier: PROSITE:PRU00852
label: RWP-RK domain
definition: >-
  The RWP-RK putative DNA-binding domain has been named after its most striking feature, the invariant R-W-P-x-R-K motif. It could be involved in the regulation of genes controlled by nitrogen status.
