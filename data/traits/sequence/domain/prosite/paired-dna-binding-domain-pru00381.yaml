identifier: PROSITE:PRU00381
label: Paired DNA-binding domain
definition: >-
  Paired DNA-binding domain signature and profile. The paired domain is a ~126 amino acid DNA-binding domain, which is found in eukaryotic transcription regulatory proteins involved in embryogenesis. The domain was originally described as the 'paired box' in the Drosophila protein paired (prd). The paired DNA-binding domain is generally located in the N-terminal part. An octapeptide and/or a homeodomain (see <PDOC00027>) can occur C-terminal to the paired DNA-binding domain, as well as a Pro-Ser-Thr- rich C-terminus. Paired DNA-binding domain proteins can function as transcription repressors or activators.
