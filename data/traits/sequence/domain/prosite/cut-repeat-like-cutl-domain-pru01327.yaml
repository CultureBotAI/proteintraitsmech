identifier: PROSITE:PRU01327
label: CUT repeat-like (CUTL) domain
definition: >-
  CUT repeat-like (CUTL) domain profile. SATB (Special AT-rich binding protein) family proteins have emerged as key regulators that integrate higher-order chromatin organization with the regulation of gene expression. SATB family chromatin organizers are involved in long-range enhancer function, extension of chromatin modifications and dynamic tethering of chromatin loops, and play diverse and important roles in regulating the dynamic equilibrium of apoptosis, cell invasion, metastasis, proliferation, angiogenesis, and immune modulation.
