identifier: PROSITE:PRU00867
label: SEFIR domain
definition: >-
  The SEFIR domain (after SEFs and IL17Rs) is a conserved sequence segment identified in transmembrane receptors (including SEFs, IL17Rs) and soluble factors (including CIKS/ACT1) in eukaryotes and bacteria. It is related to the TIR domain. The similarity between the SEFIR and TIR domains involves the conserved boxes 1 and 2 of the TIR domain that are implicated in homotypic dimerization, but there is no sequence similarity between SEFIR domains and the TIR sequence box 3.
