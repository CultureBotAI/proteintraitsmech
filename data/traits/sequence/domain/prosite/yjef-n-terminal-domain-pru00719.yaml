identifier: PROSITE:PRU00719
label: YjeF N-terminal domain
definition: >-
  YjeF N-terminal domain profile. The YjeF N-terminal domains occur either as single proteins or fusions with other domains and are commonly associated with enzymes. In bacteria and archaea, YjeF N-terminal domains are often fused to a YjeF C-terminal domain with high structural homology to the members of a ribokinase-like superfamily (see <PDOC00806>) and/or belong to operons that encode enzymes of diverse functions: pyridoxal phosphate biosynthetic protein PdxJ; phosphopanteine- protein transferase; ATP/GTP hydrolase; and pyruvate-formate lyase 1- activating enzyme. In plants, the YjeF N-terminal domain is fused to a C- terminal putative pyridoxamine 5'-phosphate oxidase.
