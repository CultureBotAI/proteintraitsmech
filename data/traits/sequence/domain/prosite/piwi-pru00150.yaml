identifier: PROSITE:PRU00150
label: Piwi
definition: >-
  Piwi domain profile. The Piwi box (or Sting domain) is an about 40 to 80 amino-acid conserved region, which was first identified in the C-terminal part of Drosophila Piwi and Sting proteins, and of related proteins from human, Caenorhabditis elegans, Arabidopsis thaliana, fission yeast and Dictyostelium discoideum. It was later recognized that this conserved region is part of a larger 300-amino-acid domain, called Piwi, which is also found in some prokaryotic proteins of unknown function.
