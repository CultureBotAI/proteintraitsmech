identifier: PROSITE:PRU00262
label: Ras-binding domain
definition: >-
  Ras-binding domain (RBD) profile. Ras and heterotrimeric G proteins' alpha subunits are signal-transducing GTPases that cycle between inactive GDP-bound and active GTP-bound forms. The activities of these GTPases are regulated in part by GTPase-activating protein (GAPs) that stimulate hydrolysis of GTP, and guanine nucleotide exchange factors (GEFs) that stimulate GDP release. Ras and G alpha GTPases are prolific signalling molecules interacting with a spectrum of effector molecules and acting through more than one signalling pathway. The Ras-binding domain (RBD) is an independent domain of about 75 residues, which is sufficient for GTP-dependent binding of Ras and other G alpha GTPases.
