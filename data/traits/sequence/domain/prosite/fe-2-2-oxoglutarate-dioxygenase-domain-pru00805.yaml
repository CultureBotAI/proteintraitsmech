identifier: PROSITE:PRU00805
label: Fe(2+) 2-oxoglutarate dioxygenase domain
definition: >-
  Fe(2+) 2-oxoglutarate dioxygenase domain profile. Enzymes with the Fe(2+) and 2-oxoglutarate (2OG)-dependent dioxygenase domain typically catalyse the oxidation of an organic substrate using a dioxygen molecule, mostly by using ferrous iron as the active site cofactor and 2OG as a cosubstrate which is decarboxylated to succinate and CO2. Iron 2OG dioxygenase domain proteins are widespread among eukaryotes and bacteria. In metazoans, prolyl hydroxylases containing the domain act as oxygen sensors and catalyse the hydroxylation of conserved prolyl residues in hypoxia-inducible transcription factor (HIF) alpha.
