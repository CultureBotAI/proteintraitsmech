identifier: PROSITE:PRU00110
label: HPt domain
definition: >-
  Histidine-containing phosphotransfer (HPt) domain profile. Most prokaryotic signal-transduction systems and a few eukaryotic pathways use phosphotransfer schemes involving two conserved components, a histidine protein kinase (HK) (see <PDOC50109>) and a response regulator protein (RR) (see <PDOC50110>). The HK, which is regulated by environmental stimuli, autophosphorylates at a histidine residue, creating a high-energy phosphoryl group that is subsequently transferred to an aspartate residue in the RR domain. Phosphorylation induces a conformational change in RR that results in activation of an associated domain that effects the response.
