identifier: PROSITE:PRU01176
label: HD-GYP domain
definition: >-
  The HD-GYP domain is likely to be a conserved scaffold whose main role is to allow protein-protein interactions with partner GGDEF domains while achieving (a) different function(s) through diversification of the active-site cavity and the N-terminal regulatory domains.
