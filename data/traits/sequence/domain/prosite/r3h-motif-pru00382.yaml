identifier: PROSITE:PRU00382
label: R3H motif
definition: >-
  R3H domain profile. The R3H domain is a conserved sequence motif found in proteins from a diverse range of organisms including eubacteria, green plants, fungi and various groups of metazoans, but not in archaea and Escherichia coli. The R3H domain contains an invariant arginine and a highly conserved histidine, that are separated by three residues. It also displays a conserved pattern of hydrophobic residues, prolines and glycines. It can be found alone, in association with AAA domain (see <PDOC00572>) or with various DNA/RNA binding domains like DSRM, KH, G-patch (see <PDOC50174>), PHD (see <PDOC50016>), DEAD box (see <PDOC00039>), or RRM (see <PDOC00030>).
