identifier: PROSITE:PRU00773
label: Phytochelatin synthase (PCS) domain
definition: >-
  Phytochelatins (PCs) are synthesized posttranslationally by the PC synthase (PCS) (EC 2.3.2.15), a gamma-glutamylcysteine (gamma-EC) transpeptidase. PC synthesis is proposed to have two distinct steps: (Step1) formation of gamma-EC concomitant with the cleavage of Gly from GSH; and (Step 2) transfer of the gamma-EC unit to an acceptor GSH molecule or an oligomeric PC peptide (PCn).
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
