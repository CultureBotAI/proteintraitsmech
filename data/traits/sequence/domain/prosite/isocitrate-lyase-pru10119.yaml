identifier: PROSITE:PRU10119
label: Isocitrate lyase
definition: >-
  Isocitrate lyase signature. Isocitrate lyase (EC 4.1.3.1) is an enzyme that catalyzes the conversion of isocitrate to succinate and glyoxylate. This is the first step in the glyoxylate bypass, an alternative to the tricarboxylic acid cycle in bacteria, fungi and plants.
