identifier: PROSITE:PRU00804
label: RNA-recognition motif (RRM) Nup35-type domain
definition: >-
  RNA-recognition motif (RRM) Nup35-type domain profile. The nuclear pore complex (NPC) mediates the transport of macromolecules across the nuclear envelope (NE). The NPC is composed of a relatively small number of proteins (~30), termed nucleoporins or Nups. The vertebrate nuclear pore protein Nup35, the ortholog of Saccharomyces cerevisiae Nup53p, is suggested to interact with the NE membrane and to be required for nuclear morphology. The highly conserved region between vertebrate Nup35 and yeast Nup53p is predicted to contain an RNA-recognition motif (RRM) domain (see <PDOC00030>).
