identifier: PROSITE:PRU00943
label: '[Cytochrome c]-lysine N-methyltransferase'
definition: >-
  [Cytochrome c]-lysine N-methyltransferase (EC 2.1.1.59) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to [cytochrome c]-L-lysine to form [cytochrome c]-N(6)-methyl-L-lysine and S- adenosyl-L-homocysteine.
