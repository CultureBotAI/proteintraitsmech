identifier: PROSITE:PRU00303
label: Prokaryotic membrane lipoprotein lipid attachment site
definition: >-
  Prokaryotic membrane lipoprotein lipid attachment site profile. In prokaryotes, membrane lipoproteins are synthesized with a precursor signal peptide, which is cleaved by a specific lipoprotein signal peptidase (signal peptidase II). The peptidase recognizes a conserved sequence and cuts upstream of a cysteine residue to which a glyceride-fatty acid lipid is attached. Some of the proteins known to undergo such processing currently include (for recent listings see):
