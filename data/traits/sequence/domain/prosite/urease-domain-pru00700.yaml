identifier: PROSITE:PRU00700
label: Urease domain
definition: >-
  Urease domain signatures and profile. Urease (EC 3.5.1.5) is a nickel-binding enzyme that catalyzes the hydrolysis of urea to carbon dioxide and ammonia. Historically, it was the first enzyme to be crystallized (in 1926). It is mainly found in plant seeds, microorganisms and invertebrates. In plants, urease is a hexamer of identical chains. In bacteria, it consists of either two or three different subunits (alpha, beta and gamma).
