identifier: PROSITE:PRU01402
label: GTP-binding protein-like domain (GLD)
definition: >-
  It has been assumed that GLDs are functionally GTPases but the efficient hydrolysis of GTP, ATP, UTP and CTP shows that GLDs should be classified not as GTPases but as NTPases.
