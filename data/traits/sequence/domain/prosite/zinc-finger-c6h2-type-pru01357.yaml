identifier: PROSITE:PRU01357
label: Zinc finger C6H2-type
definition: >-
  The C6H2-type zinc finger is essential for the normal processing function of MetAP1 and may be important for the proper functional alignment of MetAP1 on the ribosomes. It is a protein-protein interaction domain.
