identifier: PROSITE:PRU10076
label: Pyrrolidone-carboxylate peptidase glutamic acid active site
definition: >-
  Pyrrolidone-carboxylate peptidase active sites. Pyrrolidone-carboxylate peptidase (EC 3.4.19.3) (PYRase) (also known as pyroglutamyl peptidase) is the enzyme that selectively removes pyroglutamate (pGlu) from the N-terminus of proteins and peptides.
