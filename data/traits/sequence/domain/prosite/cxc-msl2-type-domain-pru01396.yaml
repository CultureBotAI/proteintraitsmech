identifier: PROSITE:PRU01396
label: CXC MSL2-type domain
definition: >-
  CXC MSL2-type domain profile. Organisms with different numbers of sex chromosomes between males and females face the problem of an unequal dosage of genes from sex chromosomes. In humans and fruit flies, two X chromosomes define the female sex, whereas males have only one X in addition to the Y chromosome. This unbalanced situation diminishes the vitality of the organism and therefore generated an evolutionary pressure to compensate for the reduced dosage of X chromosomal genes. In mammals and fruit flies, this is achieved by selective transcriptional activation of X chromosomal genes through histone acetylation.
