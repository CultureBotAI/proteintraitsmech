identifier: PROSITE:PRU00345
label: MarR-type HTH domain
definition: >-
  The marR-type HTH domain is a DNA-binding, winged helix-turn-helix (wHTH) domain of about 135 amino acids present in transcription regulators of the marR/slyA family, involved in the development of antibiotic resistance.
