identifier: PROSITE:PRU00384
label: EMI domain
definition: >-
  EMI domain profile. The EMI domain, first named after its presence in proteins of the EMILIN family, is a small cysteine-rich module of ~75 amino acids. The EMI domain is most often found at the N-terminus of metazoan extracellular proteins that are forming or are compatible with multimer formation. It is found in association with other domains, such as C1q (see <PDOC00857>), laminin-type EGF-like, collagen-like, FN3 (see <PDOC50853>), WAP (see <PDOC00026>), ZP (see <PDOC00577>) or FAS1 (see <PDOC50213>). It has been suggested that the EMI domain could be a protein-protein interaction module, as the EMI domain of EMILIN-1 was found to interact with the C1q domain of EMILIN-2.
