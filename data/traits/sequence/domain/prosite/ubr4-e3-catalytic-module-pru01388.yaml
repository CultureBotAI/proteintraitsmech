identifier: PROSITE:PRU01388
label: UBR4 E3 catalytic module
definition: >-
  UBR4 E3 catalytic module profile. Covalent attachment of the small protein ubiquitin (Ub), typically to lysine residues in protein substrates, regulates a host of cellular processes and is catalyzed by E3 ligases (E3s). Fundamental arms of the Ub system are the N- degron and C-degron pathways, which control proteasomal or autophagic substrate degradation based on the identity of their N- or C-terminal amino acid. The regulated degradation of substrates by the N-/C-degron pathways affects multiple cellular processes, including the elimination of misfolded or mislocalized proteins, maintenance of protein complex stoichiometry, DNA repair, apoptosis, metabolite sensing and neurodevelopment.
