identifier: PROSITE:PRU00465
label: 2Fe-2S ferredoxin-type domain
definition: >-
  2Fe-2S ferredoxin-type iron-sulfur binding domain signature and profile. Ferredoxins are small, acidic, electron transfer proteins that are ubiquitous in biological redox systems. They have either 4Fe-4S, 3Fe-4S, or 2Fe-2S cluster. Among them, ferredoxin with one 2Fe-2S cluster per molecule are present in plants, animals, and bacteria, and form a distinct 2Fe-Ferredoxin family. They are proteins of around one hundred amino acids with four conserved cysteine residues to which the 2Fe-2S cluster is ligated. This conserved region is also found as a domain in various metabolic enzymes.
