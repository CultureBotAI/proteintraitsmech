identifier: PROSITE:PRU01151
label: Pyruvate carboxyltransferase domain
definition: >-
  Pyruvate carboxyltransferase domain profile. Pyruvate carboxylase (EC 6.4.1.1) (PC), a member of the biotin-dependent enzyme family, is involved in the gluconeogenesis by mediating the carboxylation of pyruvate to oxaloacetate. Biotin-dependent carboxylase enzymes perform a two step reaction. Enzyme-bound biotin is first carboxylated by bicarbonate and ATP and the carboxyl group temporarily bound to biotin is subsequently transferred to an acceptor substrate such as pyruvate. PC has three functional domains: a biotin carboxylase (BC) domain (see <PDOC50979>), a carboxyltransferase (CT) domain which perform the second part of the reaction and a biotinyl domain (see <PDOC50968>).
