label: Hydroxymethylglutaryl-coenzyme A synthase active site
definition: >-
  Hydroxymethylglutaryl-coenzyme A synthase active site. Hydroxymethylglutaryl-coenzyme A synthase (EC 2.3.3.10) (HMG-CoA synthase) catalyzes the condensation of acetyl-CoA with acetoacetyl-CoA to produce HMG- CoA and CoA.
