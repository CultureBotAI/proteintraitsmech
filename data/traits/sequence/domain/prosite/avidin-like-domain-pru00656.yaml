identifier: PROSITE:PRU00656
label: Avidin-like domain
definition: >-
  Avidin and streptavidin both form homotetrameric complexes of noncovalently associated chains. Each chain forms a very strong and specific non-covalent complex with one molecule of biotin. The dimeric bacterial avidin sub-family members that bind biotin with high affinity exhibit a dimeric (1-4 dimer) rather than a tetrameric structure. The fibropellin avidin-like domain forms a homotetramer incapable of binding biotin.
