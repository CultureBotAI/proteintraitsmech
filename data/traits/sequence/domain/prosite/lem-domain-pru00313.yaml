identifier: PROSITE:PRU00313
label: LEM domain
definition: >-
  LEM and LEM-like domain profiles. The LEM (LAP2, emerin, MAN1) domain is a globular module of approximately 40 amino acids, which is mostly found in the nucleoplasmic portions of metazoan inner nuclear membrane proteins. The LEM domain has been shown to mediate binding to BAF (barrier-to-autointegration factor) and BAF-DNA complexes. BAF dimers bind to double-stranded DNA non-specifically and thereby bridge DNA molecules to form a large, discrete nucleoprotein complex.
