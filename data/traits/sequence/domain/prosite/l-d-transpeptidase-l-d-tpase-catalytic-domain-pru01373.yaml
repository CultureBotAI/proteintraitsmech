identifier: PROSITE:PRU01373
label: L,D-transpeptidase (L,D-TPase) catalytic domain
definition: >-
  L,D-transpeptidase (L,D-TPase) catalytic domain profile. Virtually all bacteria possess a peptidoglycan (PG) layer that encapsulates the cytoplasmic membrane and provides shape and rigidity to the cell. Considered as a vital bacterial "organelle", the PG is essential for cellular growth and viability. Mature PG comprises aminosugar strands with alternating N-acetylmuramic acid and N-acetylglucosamine units and peptide moieties that are cross-linked to one another. The final step of PG biosynthesis in bacteria involves cross-linking of peptide side chains. This step is catalyzed by L,D- and D,D-transpeptidases that generate 3->3 and 4->3 transpeptide linkages, respectively.
