identifier: PROSITE:PRU01432
label: Lipin/Ned1/Smp2 (LNS2) domain
definition: >-
  The lipin/Ned1/Smp2 (LNS2) domain of 180 amino acids, originally characterized as the Mg(2+)-dependent catalytic domain of PA phosphatases (lipins), is catalytically inactive in Nir proteins and RdgBalpha that exhibit substitutions for a critical catalytic aspartate residue and another Mg(2+)-coordinating residue. Nevertheless, the LNS2 domain retains the ability to bind PA, with two conserved lysine residues shown to be essential for this interaction.
