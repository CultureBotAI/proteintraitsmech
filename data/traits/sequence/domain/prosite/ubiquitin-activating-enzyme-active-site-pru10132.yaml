identifier: PROSITE:PRU10132
label: Ubiquitin-activating enzyme active site
definition: >-
  Ubiquitin-activating enzyme signatures. Ubiquitin-activating enzyme (E1 enzyme) activates ubiquitin by first adenylating with ATP its C-terminal glycine residue and thereafter linking this residue to the side chain of a cysteine residue in E1, yielding an ubiquitin-E1 thiolester and free AMP. Later the ubiquitin moiety is transferred to a cysteine residue on one of the many forms of ubiquitin- conjugating enzymes (E2).
