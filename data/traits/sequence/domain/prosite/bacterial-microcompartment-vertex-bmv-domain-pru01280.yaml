identifier: PROSITE:PRU01280
label: Bacterial microcompartment vertex (BMV) domain
definition: >-
  Bacterial microcompartments (BMCs) are large virion-sized protein assemblies comprised of specific enzymes encased within a protein shell. The shells of all BMCs are architecturally similar, being composed of homohexamers of proteins containing a single BMC domain, homotrimer of proteins containing two BMC domains (that resemble the hexamers in size and shape) and pentamers of proteins containing one BMV domain that assemble into an icosahedral shell.
