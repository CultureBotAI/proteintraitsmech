identifier: PROSITE:PRU00557
label: Vitellogenin domain
definition: >-
  The vitellogenin (VTG) protein, a major lipoprotein in many oviparous animals, is a precursor of a lipid-binding product found in the yolk of egg-laying animals, and involved in lipid and metal storage. At the N-terminal, it contains a sequence of about 670 amino acids (LV1n chain), which is also conserved in other large lipoproteins, such as microsomal triglyceride transfer protein (MTP) and apolipoprotein B-100 (apoB)
