identifier: PROSITE:PRU01412
label: MCM10 C-terminal domain (MCM10-CTD)
definition: >-
  The MCM10 CTD, although not present in unicellular eukaryotes, is conserved among metazoan species from nematodes to humans. The CTD contains a winged helix domain (WH) and two zinc chelating motifs, a CCCH zinc-finger (ZnF2) and a CCCC zinc-ribbon (ZnR). ssDNA binds only to ZnF2, whose structure is unique to MCM10. The ZnR is not involved in DNA binding.
