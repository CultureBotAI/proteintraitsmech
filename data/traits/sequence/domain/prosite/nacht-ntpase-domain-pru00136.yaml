identifier: PROSITE:PRU00136
label: NACHT-NTPase domain
definition: >-
  NACHT-NTPase domain profile. The NACHT domain is a 300 to 400 residue predicted nucleoside triphosphatase (NTPase) domain, which is found in animal, fungal and bacterial proteins. The NACHT domain has been named after NAIP, CIITA, HET-E and TP1. It is found in association with other domains, such as the CARD domain (see <PDOC50209>), the DAPIN domain (see <PDOC50824>), the HEAT repeat (see <PDOC50077>), the WD repeat (see <PDOC00574>), the leucine-rich repeat (LRR) or the BIR repeat (see <PDOC00987).
