identifier: PROSITE:PRU01093
label: Class I myosin tail homology (TH1) domain
definition: >-
  Class I myosin tail homology (TH1) domain profile. Class I myosins (Myo1s) are widely expressed in eukaryotic cells. Myo1s exist as monomers and can sense cellular mechanical forces and function as tension- sensitive anchors or transporters. Each Myo1 contains from N terminus to C terminus, a motor domain (see <PDOC51456>), a neck region consisting of several calmodulin (CaM)-binding IQ motifs (see <PDOC50096>) and a tail region. All Myo1s contain a tail homology (TH1) domain featuring an embedded pleckstrin-homology (PH) domain (see <PDOC50003>) capable of binding to lipid membranes.
