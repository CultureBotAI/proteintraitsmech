label: TFG box
definition: >-
  The strongly conserved TFG box sequence motif [RKH]-x(2,5)-E-x(0-2)-[RK]-x(3,4)-[DE]-TFG contained in Lsm13-15, but not Lsm16, homologs succeed the DFDF-x(7)-F motif and is also predicted to be of helical nature.
