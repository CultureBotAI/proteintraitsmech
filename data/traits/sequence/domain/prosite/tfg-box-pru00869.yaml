identifier: PROSITE:PRU00869
label: TFG box
definition: >-
  DFDF domain and FFD and TFG boxes profiles. Sm and Sm-like proteins of the RNA-binding Lsm (like Sm) domain family are found in all domains of life and are generally involved in important RNA- processing tasks. Lsm13-16 homologs share a domain organization consisting of a divergent N-terminal Lsm domain and a central or C-terminal consensus motif DFDF-x(7)-F closely preceded and followed by further phenylalanines and charged aspartates/glutamates and arginines/lysines/histidines. The variable seven-residue tract of this consensus motif usually contains an asparagine at the third or fourth position except of one sequence where the asparagine is replaced by a glycine.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
