identifier: PROSITE:PRU00629
label: K-box domain
definition: >-
  The 80-amino acid K-box domain was originally identified as a region with low but significant similarity to a region of keratin, which is part of the coiled-coil sequence constituting the central rod-shaped domain of keratin.
