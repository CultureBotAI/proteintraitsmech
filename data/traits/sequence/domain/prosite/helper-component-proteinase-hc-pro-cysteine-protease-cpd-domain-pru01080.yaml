identifier: PROSITE:PRU01080
label: Helper-component proteinase (HC-Pro) cysteine protease (CPD) domain
definition: >-
  The HC-Pro CPD domain has a protease activity that autocatalytically cleaves a Gly-Gly dipeptide at its own C terminus to release HC-Pro from the rest of the viral polyprotein.
