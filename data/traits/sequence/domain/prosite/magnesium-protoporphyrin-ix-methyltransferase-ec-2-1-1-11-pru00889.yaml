identifier: PROSITE:PRU00889
label: Magnesium protoporphyrin IX methyltransferase (EC 2.1.1.11)
definition: >-
  Magnesium protoporphyrin IX methyltransferase (EC 2.1.1.11) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to magnesium protoporphyrin IX to form magnesium protoporphyrin IX 13-methyl ester and S-adenosyl-L-homocysteine.
