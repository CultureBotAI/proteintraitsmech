identifier: PROSITE:PRU01250
label: ClpX zinc binding (ZB) domain
definition: >-
  ClpX zinc binding (ZB) domain profile. Molecular chaperones and proteases are part of an essential quality control machinery in the cell, which ensures the conformational integrity of proteins under conditions of normal growth as well as under stress. Prokaryotic and organellar ClpX is a molecular chaperone which can also work as a specificity factor for the ClpP protease. The chaperone ClpX associates with the serine protease ClpP to form ClpXP, a cylindrical structure that is similar to the 26S proteasome. ClpX binds and, subsequently, unfolds and translocates substrate proteins into the ClpP chamber in an ATP-dependent manner.
