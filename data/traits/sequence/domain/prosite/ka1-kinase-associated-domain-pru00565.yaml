identifier: PROSITE:PRU00565
label: KA1 (kinase-associated) domain
definition: >-
  Kinase associated domain 1 (KA1) profile. Members of the KIN2/PAR-1/MARK kinase subfamily are conserved from yeast to human and share the same domain organisation: an N-terminal kinase domain and a C-terminal kinase associated domain 1 (KA1). Some members of the KIN1/PAR-1/MARK family also contain an UBA domain (see <PDOC50030>). Members of this kinase subfamily are involved in various biological processes such as cell polarity, cell cycle control, intracellular signaling, microtubule stability and protein stability. The function of the KA1 domain is not yet known.
