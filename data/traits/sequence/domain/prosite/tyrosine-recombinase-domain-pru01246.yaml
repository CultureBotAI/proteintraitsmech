identifier: PROSITE:PRU01246
label: Tyrosine recombinase domain
definition: >-
  Tyrosine-type site-specific recombinases catalyze a variety of sequence-specific DNA rearrangement in biological systems, including the integration and excision of phage genomes into and out of their bacterial hosts, conjugative transposition, resolution of catenated DNA circles, regulation of plasmid copy number, DNA excision to control gene expression for nitrogen fixation in Anabaena and DNA inversions controlling expression of cell surface proteins or DNA replication.
