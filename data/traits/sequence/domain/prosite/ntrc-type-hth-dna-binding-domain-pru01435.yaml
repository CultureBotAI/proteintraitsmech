identifier: PROSITE:PRU01435
label: NtrC-type HTH DNA-binding domain
definition: >-
  The NtrC-type HTH DNA-binding domain often binds to two high- affinity cooperative binding sites located ~100 bp upstream of the sigma(54)- binding site. The NtrC-type HTH DNA-binding domain consists of three well- defined alpha-helices: the dimerization helix, the first helix of the HTH, and the recognition helix, in keeping with general naming conventions for HTH proteins.
