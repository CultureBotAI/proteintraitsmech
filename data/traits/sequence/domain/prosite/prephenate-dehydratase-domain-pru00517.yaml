identifier: PROSITE:PRU00517
label: prephenate dehydratase domain
definition: >-
  Prephenate dehydratase domain signatures and profile. Prephenate dehydratase (EC 4.2.1.51) (PDT) catalyzes the decarboxylation of prephenate into phenylpyruvate. In microorganisms PDT is involved in the terminal pathway of the biosynthesis of phenylalanine. In some bacteria such as Escherichia coli PDT is part of a bifunctional enzyme (P-protein) that also catalyzes the transformation of chorismate into prephenate (chorismate mutase, see <PDOC51167>) while in other prokaryotes it is a monofunctional enzyme. Fungal and plant PDT seem to be monofunctional enzymes as well.
