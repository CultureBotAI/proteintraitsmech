identifier: PROSITE:PRU00675
label: P-II protein family
definition: >-
  P-II protein family signatures and profile. P-II family proteins are regulators of nitrogen metabolism, with a length of ~110 amino acid residues, found throughout the bacteria and most archaea. P-II proteins sense cellular 2-oxoglutarate as an indicator for nitrogen limitation and bind and respond to ATP. The family is named after the P-II protein (gene glnB), a bacterial protein important for the control of glutamine synthetase. In nitrogen-limiting conditions, when the ratio of glutamine to 2-ketoglutarate decreases, P-II is uridylylated on a tyrosine residue to form P-II-UMP. P-II-UMP allows the deadenylation of glutamine synthetase (GS), thus activating the enzyme.
