identifier: PROSITE:PRU00763
label: AP endonucleases family 2
definition: >-
  Endonuclease 4 related enzymes play a role in DNA repair. These nucleases cleave phosphodiester bonds at apurinic or apyrimidinic sites (AP sites) to produce new 5'-ends that are base-free deoxyribose 5-phosphate residues.
