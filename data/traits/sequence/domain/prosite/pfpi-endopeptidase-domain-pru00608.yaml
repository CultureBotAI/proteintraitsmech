identifier: PROSITE:PRU00608
label: PfpI endopeptidase domain
definition: >-
  PfpI endopeptidase domain profile. Pyrococcus furiosus protease I (PfpI) (EC 3.2.-.-) is an intracellular cysteine peptidase, characterized by its stability and proposed to represent the predominant proteolytic activity of this thermophilic archaebacterium. Pfpi-like proteins have been found in bacteria, archaea, in some plants and in amoebas.
