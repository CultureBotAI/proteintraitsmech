identifier: PROSITE:PRU00831
label: MABP domain
definition: >-
  MABP domain profile. A key aspect of eukaryotic intracellular trafficking is the sorting of cell- surface proteins into multi-vesicular endosomes or bodies (MVBs), which eventually fuse with the lysosome, where they are degraded by lipases and peptidases. This is the primary mechanism for down-regulation of signaling via transmembrane receptors and removal of misfolded or defective membrane proteins. This process is also utilized by several viruses (e.g. HIV-1) to facilitate budding of their virions from the cell-membrane.
