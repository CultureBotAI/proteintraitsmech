identifier: PROSITE:PRU00052
label: cheW-like
definition: >-
  CheW-like domain profile. The CheW-like domain is an around 150-residue domain that is found in proteins involved in the two-component signaling systems regulating bacterial chemotaxis. Two components systems are composed of a receptor kinase, which monitors the environmental conditions and its substrate, the response regulator, which acts as a binary switch depending on the phosphorylation state.
