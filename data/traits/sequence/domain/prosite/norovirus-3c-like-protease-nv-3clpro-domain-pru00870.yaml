identifier: PROSITE:PRU00870
label: Norovirus 3C-like protease (NV 3CLpro) domain
definition: >-
  Norovirus 3C-like protease (NV 3CLpro) domain profile. Noroviruses (NVs; formerly "Norwalk-like viruses"), which belong to the Caliciviridae, are the major causative agents of nonbacterial acute gastroenteritis in humans. The NV genome, which consists of positive-sense, single-stranded RNA, contains three open reading frames (ORFs). The first ORF produces a polyprotein that is processed by the viral 3C-like protease into six nonstructural proteins.
