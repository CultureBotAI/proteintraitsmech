identifier: PROSITE:PRU01114
label: VASt domain
definition: >-
  VASt domain profile. The VASt (VAD1 Analog of StAR-related lipid transfer) domain is conserved across eukaryotes and is structurally related to Bet v1-like domains (see <PDOC00437>), including START lipid-binding domains (see <PDOC50848>). The ~190-amino acid VASt domain is predominantly associated with lipid binding domains such as GRAM, C2 (see <PDOC00380>) and PH (see <PDOC50003>) domains. The VASt domain is likely to have a function in binding large hydrophobic ligands and may be specific for sterol.
