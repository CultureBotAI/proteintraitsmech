identifier: PROSITE:PRU01416
label: GPN-loop GTPase domain
definition: >-
  GPN-loop GTPases are assembly chaperones for RNA polymerase II (Pol II) and other protein complexes. This family of conserved GTPases has been named GPN-loop GTPases due to the presence of a conserved Gly-Pro-Asn motif inserted into the GTPase core-fold. GPN-loop GTPases form homo- and heterodimers.
