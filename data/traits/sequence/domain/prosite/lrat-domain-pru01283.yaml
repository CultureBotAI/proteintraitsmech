identifier: PROSITE:PRU01283
label: LRAT domain
definition: >-
  The NlpC/P60 LRAT-type family includes lecithin-retinol acyltransferase (LRAT), nematode developmental regulator Egl-26, class II tumor suppressor H-rev107 and proteins from poxviruses and animal positive- strand RNA viruses, which share a common catalytic domain fold and an unconventional active site. Several members of the NlpC/P60 LRAT-type family are able to act as transferases/esterases utilizing glycerophospholipids as acyl donors.
