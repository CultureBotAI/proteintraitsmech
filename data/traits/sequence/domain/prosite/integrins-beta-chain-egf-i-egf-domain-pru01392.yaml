identifier: PROSITE:PRU01392
label: Integrins beta chain EGF (I-EGF) domain
definition: >-
  The C-terminus of the extracellular region of all the integrin beta chains has four cysteine-rich tandem repeats of forty amino acids, which are variants of the EGF-like domain, termed integrin- or I-EGF domains. I-EGF repeats in the integrin beta subunit stalk region relay activation signals to the ligand-binding headpiece.
