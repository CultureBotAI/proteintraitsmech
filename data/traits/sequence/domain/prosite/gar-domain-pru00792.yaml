identifier: PROSITE:PRU00792
label: GAR domain
definition: >-
  GAR domain profile. The Gas2-related (GAR) domain was named after Gas2 (growth arrest specific 2) and is common in plakin family members and Gas2 family members. The GAR domain comprises ~57 amino acids and has been shown to bind to microtubules.
