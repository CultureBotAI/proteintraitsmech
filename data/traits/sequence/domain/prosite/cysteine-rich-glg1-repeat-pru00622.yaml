identifier: PROSITE:PRU00622
label: Cysteine-rich GLG1 repeat
definition: >-
  Cysteine-rich GLG1 repeat. The Golgi apparatus protein 1 (GLG1), which is located in Golgi cisterns of various cell types, can bind fibroblast growth factor and E-selectin. Sixteen cysteine-rich GLG1 repeats form the core of the protein and are located in the lumen. The C-terminal part of GLG1 is composed of a transmembrane region and a short cytoplasmic tail. The Cys-rich GLG1 repeat is a ~60 amino acid module that contains 4 Cys residues, which can form intrachain disulfide bridges.
