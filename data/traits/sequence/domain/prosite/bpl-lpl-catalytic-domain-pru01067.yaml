identifier: PROSITE:PRU01067
label: BPL/LPL catalytic domain
definition: >-
  Biotinyl protein ligase (BPL) and lipoyl protein ligase (LPL) catalytic domain profile. Biotin and lipoic acid are the covalently bound cofactors of various multicomponent enzyme complexes that catalyze key metabolic reactions. In these enzymes complexes, biotin and lipoic acid are attached via amide linkage through their carboxyl group and the epsilon-amino group of a specific lysine residue of a protein module known respectively as the biotinyl and the lipoyl domain (see <PDOC50968>).
