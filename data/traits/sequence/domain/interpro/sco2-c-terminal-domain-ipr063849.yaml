identifier: InterPro:IPR063849
label: "SCO2, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of SCO2 (SNOWY COTYLEDON 2), a protein disulphide-isomerase found in the chloroplast thylakoid membrane of plants. This C-terminal region is designated as CR-type-like and contains two CXXCXGXG motifs, which are similar to CR-type zinc-fingers. The protein binds zinc and catalyses the rearrangement of disulphide bonds in proteins. SCO2 is involved in chloroplast development in cotyledons and interacts with LHCB1 proteins during thylakoid biogenesis. The protein is related to the DnaJ family but lacks the J domain.
