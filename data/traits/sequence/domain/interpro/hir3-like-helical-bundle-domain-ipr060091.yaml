identifier: InterPro:IPR060091
label: "HIR3-like, helical bundle domain"
definition: >-
  This entry represents a helical bundle domain found in histone transcription regulator 3 (HIR3) fungal proteins and in plant Calcineurin-binding protein 1 (CABIN1). This domain consists of multiple α-helices arranged in a bundle structure and is involved in protein-protein interactions within chromatin regulatory complexes. CABIN1 may be required for replication-independent chromatin assembly. This domain is found in eukaryotes and likely mediates protein complex formation during chromatin remodelling processes. HIR3 belongs to the HIR3/CABIN1 family and has a role in nucleosome assembly pathways that are required for heterochromatin integrity and proper chromosome segregation. The protein is involved in chromatin organisation and transcriptional regulation. HIR3 is a component of the HIR complex and is localised to the nucleus. In yeast, HIR3 is a repressor of histone gene transcription. It also has a role in nucleosome assembly.
