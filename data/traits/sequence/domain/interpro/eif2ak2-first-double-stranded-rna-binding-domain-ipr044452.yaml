identifier: InterPro:IPR044452
label: EIF2AK2, first double-stranded RNA binding domain
definition: >-
  Eukaryotic translation initiation factor 2-alpha kinase 2 (EIF2AK2), also known as PKR, is an IFN-induced dsRNA-dependent serine/threonine-protein kinase that phosphorylates the alpha subunit of eukaryotic translation initiation factor 2 (EIF2S1/eIF-2-alpha) and plays a key role in the innate immune response to viral infection. It is also involved in the regulation of signal transduction, apoptosis, cell proliferation and differentiation. EIF2AK2 proteins contain two to three double-stranded RNA binding motifs (DSRMs). This entry represents the first DSRM of EIF2AK2.
