identifier: InterPro:IPR022220
label: "Hemolytic toxin, N-terminal domain"
definition: >-
  This domain is found in Hemolysin in bacteria. The domain is found in association with . Bacterial hemolysins are exotoxins that attack blood cell membranes and cause cell rupture by mechanisms not clearly defined. Some of them cause cytolysis by forming heptameric pores in target host membranes.
