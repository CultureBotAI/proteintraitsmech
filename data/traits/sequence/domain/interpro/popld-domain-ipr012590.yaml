identifier: InterPro:IPR012590
label: "POPLD domain"
definition: >-
  Ribonucleases P/MRP protein subunit POP1 is a subunit common to both ribonuclease P, a ribonucleoprotein complex that generates mature tRNA molecules by cleaving their 5'-ends, and MRP ribonuclease complex, which cleaves pre-rRNA sequences. This domain is found towards the C-terminal of POP1.
