identifier: InterPro:IPR057476
label: "Cux, N-terminal domain"
definition: >-
  This domain is found at the N-terminal in Homeobox protein cut-like (Cux) 1 and 2 and similar eukaryotic proteins. This domain is predicted to adopt an α-helical configuration. Cux1 (also known as Cutl1) and Cux2 are transcription factors involved in the control of neuronal differentiation in the brain. They regulate dendrite development, branching, and synaptogenesis, particularly in cortical layers II-III, and play a role in cell cycle progression. Cux1 and Cux2 proteins carry distinct biochemical functions. Cux2 and Cux1 can perform the CCAAT-displacement activity. However, Cux2 is unlikely to execute transcriptional regulatory functions that require stable interaction with DNA. In fungi, Cux1 is known as CASP (COY1) and may also be involved in intra-Golgi transport. Cux proteins contain an N-terminal autoinhibitory domain, a coiled-coil region, three CUT domains (C1, C2, C3), a homeodomain, and a C-terminal repression domain. The CUT domains mediate DNA binding with distinct affinities and kinetics depending on their combination, while the homeodomain further contributes to DNA recognition. Cux1 is expressed in several isoforms due to alternative splicing and proteolytic processing. The shorter p110 Cux1 isoform, generated by proteolytic cleavage, lacks the N-terminal region and has different DNA binding and regulatory properties.
