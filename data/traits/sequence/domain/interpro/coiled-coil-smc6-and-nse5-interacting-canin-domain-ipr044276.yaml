identifier: InterPro:IPR044276
label: "Coiled-coil SMC6 And NSE5 INteracting (CANIN) domain"
definition: >-
  This domain is found at the C terminus of the SMC5-SMC6 complex localization factor 2 (SFL2, also known as NSE6 and FAM178A) which bridges the interaction between SMC6 and SFL1 (NSE5), being responsible for targeting the SMC5/6 complex to double-strand DNA breaks (DSBs) repair sites. It is suggested to be a regulatory element in SMC5/6 complex dynamics by locking its coiled-coiled arms together, thus being named as Coiled-coil And Nse INteracting (CANIN) domain. This domain is essential for the interaction with SFL1. It forms a U-shaped structure that seems to be structurally conserved in eukaryotes. This domain is also found in FAM178B protein.
