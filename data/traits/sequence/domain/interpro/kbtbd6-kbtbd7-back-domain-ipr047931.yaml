identifier: InterPro:IPR047931
label: "KBTBD6/KBTBD7, BACK domain"
definition: >-
  This entry represents the BACK domain of KBTBD6 and KBTBD7. KBTBD6 and KBTBD7 are substrate adaptors of a cullin-3 RING ubiquitin ligase complex that mediates ubiquitylation and proteasomal degradation of T-lymphoma and metastasis gene 1 (TIAM1), a RAC1-specific guanine exchange factor (GEF), by cooperating with gamma-aminobutyric acid receptor-associated proteins (GABARAP), which regulates RAC1 signal transduction and downstream biological processes including the organisation of the cytoskeleton, cell migration and cell proliferation. KBTBD7 may also act as a new transcriptional activator in mitogen-activated protein kinase (MAPK) signalling.
