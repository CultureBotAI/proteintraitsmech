identifier: InterPro:IPR013229
label: PEGA
definition: >-
  This domain is found in both archaea and bacteria and has similarity to S-layer (surface layer) proteins. It is named after the characteristic PEGA sequence motif found in this domain. The secondary structure of this domain is predicted to be β-strands.
