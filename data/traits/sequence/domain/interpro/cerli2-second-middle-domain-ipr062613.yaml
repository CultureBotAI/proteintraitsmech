identifier: InterPro:IPR062613
label: "CERLI2, second middle domain"
definition: >-
  This entry represents the second middle domain found in CERLI2 (cytosolically exposed rhoptry leaflet interacting protein 2) and related proteins from apicomplexan parasites. CERLI2 is a rhoptry surface protein that plays an important role in rhoptry physiology and is essential for merozoite invasion of host erythrocytes. The protein localises to the cytosolic face of the rhoptry bulb membrane in merozoites. The specific function of this domain remains to be determined. This domain contains a β-sheet connect to an α-helix.
