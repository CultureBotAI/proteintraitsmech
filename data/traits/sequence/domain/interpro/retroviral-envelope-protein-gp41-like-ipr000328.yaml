identifier: InterPro:IPR000328
label: Retroviral envelope protein GP41-like
definition: >-
  This entry represents envelope proteins from a variety of retroviruses. It includes the GP41 subunit of the envelope protein complex from Human immunodeficiency virus (HIV) and Simian-Human immunodeficiency virus (SIV), which mediate membrane fusion during viral entry. It has a core composed of a six-helix bundle and is folded by its trimeric N- and C-terminal heptad-repeats (NHR and CHR). Derivatives of this protein prevent HIV-1 from entering cell lines and primary human CD4+ cells in vitro, making it an attractive subject of gene therapy studies against HIV and related retroviruses. The entry also represents envelope proteins from Bovine immunodeficiency virus, Feline immunodeficiency virus and Equine infectious anemia virus (EIAV), as well as the Gp36 protein from Mouse mammary tumor virus (MMTV) and Human endogenous retrovirus (HERV).
