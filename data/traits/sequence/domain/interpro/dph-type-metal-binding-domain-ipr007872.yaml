identifier: InterPro:IPR007872
label: "DPH-type metal-binding domain"
definition: >-
  This entry represents the DPH-type metal binding domain consists of a three-stranded β-sandwich with one sheet comprising two parallel strands: (i) β1 and (ii) β6 and one antiparallel strand: β5. The second sheet in the β-sandwich is comprised of strands β2, β3, and β4 running anti-parallel to each other. The two β-sheets are separated by a short stretch α-helix. It can be found in proteins such as DPH3 and DPH4. This domain is also found associated with N-terminal domain of heat shock protein DnaJ domain. Diphthamide is a unique post-translationally modified histidine residue found only in translation elongation factor 2 (eEF-2). It is conserved from archaea to humans and serves as the target for diphteria toxin and Pseudomonas exotoxin A. These two toxins catalyse the transfer of ADP-ribose to diphtamide on eEF-2, thus inactivating eEF-2, halting cellular protein synthesis, and causing cell death. The biosynthesis of diphtamide is dependent on at least five proteins, DPH1 to -5, and a still unidentified amidating enzyme. DPH3 and DPH4 share a conserved region, which encode a putative zinc finger, the DPH-type or CSL-type (after the the final conserved cysteine of the zinc finger and the next two residues) MB domain contains a Cys-X-Cys...Cys-X2-Cys motif which tetrahedrically coordinates both Fe and Zn. The Fe containing DPH-type MBD has an electron transfer activity.
