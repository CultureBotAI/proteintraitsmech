identifier: InterPro:IPR018640
label: "HvfC, N-terminal domain"
definition: >-
  This entry describes the N-terminal domain in HvfC, NGO_1945, BufC1 and various other proteins partnered with MNIO family peptide modification enzymes. HvfC, as described in Haemophilus influenzae, is a partner protein to the multinuclear nonheme iron-dependent oxidase (MNIO) enzyme HvfB and participates in post-translational modification that converts the precursor protein HvfA (Haemophilus virulence factor A) into a copper-binding metallophore and a contributor to the cell's ability to invade host cells and survive as an intracellular pathogen. The related protein NGO_1945 occurs in a similar genomic context and was previously suggested to be a DNA-binding protein. It comprises residues 31 to 117 as a helical bundle with 4 main helices. The C-terminal is represented by .
