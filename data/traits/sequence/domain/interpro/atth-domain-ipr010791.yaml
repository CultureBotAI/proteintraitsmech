identifier: InterPro:IPR010791
label: "AttH domain"
definition: >-
  This domain is found in bacterial and fungal proteins that contain the AttH-like fold characterised by two flattened, orthogonally packed, β-barrels of lipocalin-like topology. Proteins containing this domain include (also known as NE1406), an all-β protein with an AttH-like fold.
