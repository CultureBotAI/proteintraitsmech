identifier: InterPro:IPR064388
label: "Sll1863-like stress response domain"
definition: >-
  The founding member of this entry, sll1863 from Synechocystis sp. PCC 6803, was identified first as a salt stress-induced protein and later as a more general stress-induced protein. The sequence has a high concentration of both positively and negatively charged residues, alternating with strongly hydrophobic residues. This domain is found either as standalone or in combination with other domains.
