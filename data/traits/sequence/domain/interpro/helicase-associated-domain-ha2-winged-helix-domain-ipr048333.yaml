identifier: InterPro:IPR048333
label: "Helicase associated domain (HA2), winged-helix domain"
definition: >-
  The helicase associated domain (HA2) has an all α-helical fold and consists of a N-terminal winged-helix (WH) domain and a C-terminal degenerate helical-bundle domain, referred to as the ratchet-like domain. These domains collaborate with RecA domains at the N-terminal in completing an RNA binding channel to allow the helicases to keep a stable grip on the RNA and assure its correct function. This entry represents the WH domain, which connects the N- (RecA domains) and C-terminal domains (ratchet-like and OB-fold) of helicases.
