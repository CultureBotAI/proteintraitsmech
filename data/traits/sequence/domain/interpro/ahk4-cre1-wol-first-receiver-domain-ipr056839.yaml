identifier: InterPro:IPR056839
label: "AHK4/CRE1/WOL, first receiver domain"
definition: >-
  This entry represents the first receiver domain found in AtHK4 (also known as CRE1 and WOL) from Arabidopsis thaliana, CRE1 from Medicago truncatula and its homologues from plants such as AtHK2, AtHK3, OsHK5 and OsHK6. AtHK4/CRE1 is a cytokinin (CK) receptor. Alternative splicing of AtHK4/CRE1 results in fine-tuning the cytokinin signalling pathway. It functions as a histidine kinase and transmits the stress signal to a downstream MAPK cascade. This domain mediates dimerisation through 3D domain swapping, which suggests that a considerable change of conformation must occur upon the phosphorylation reaction to allow HPt (histidine-containing phosphotransfer protein) binding.
