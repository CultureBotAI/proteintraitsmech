identifier: InterPro:IPR063938
label: "NXF1, RNA-binding domain"
definition: >-
  This entry represents the RNA-binding domain found at the N-terminal of Nuclear RNA export factor 2 from Drosophila melanogaster and similar proteins from insects. NXF2 forms a complex with piwi and Nxt1 which acts as effectors of cotranscriptional transposon silencing.
