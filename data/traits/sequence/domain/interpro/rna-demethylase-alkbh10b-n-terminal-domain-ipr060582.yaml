identifier: InterPro:IPR060582
label: "RNA demethylase ALKBH10B, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of RNA demethylase ALKBH10B from Arabidopsis thaliana and similar plant sequences. ALKBH10B is an alpha-ketoglutarate-dependent dioxygenase that specifically demethylates N6-methyladenosine in mRNA, affecting floral transition by stabilising mRNAs of flowering time regulators FT, SPL3 and SPL9. The N-terminal region contains a coiled-coil domain and disordered regions that may be involved in protein interactions or substrate recognition. ALKBH10B belongs to the AlkB family of DNA/RNA repair enzymes and requires iron and 2-oxoglutarate as cofactors for its catalytic activity. The specific function of this N-terminal domain is unknown.
