definition: >-
  This entry represents a domain from a family of uncharacterised proteins in the Archaea. The domain is predominantly found in members of the Methanobacteriota phylum, specifically within the Halobacteria class. Proteins containing this domain are typically integral membrane proteins with two transmembrane helices. The domain is approximately 60-70 amino acids in length. This domain is sometimes associated with .
