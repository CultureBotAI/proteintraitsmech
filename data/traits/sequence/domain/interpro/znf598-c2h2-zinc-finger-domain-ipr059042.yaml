identifier: InterPro:IPR059042
label: "ZNF598, C2H2 zinc finger domain"
definition: >-
  This C2H2 zinc finger domain is found in human E3 ubiquitin-protein ligase ZNF598 and other animal proteins. ZNF598 plays a key role in the ribosome quality control (RQC), a pathway that takes place when the ribosome has stalled during translation, leading to degradation of nascent peptide chains. ZNF598 is activated when ribosomes are stalled following translation of prematurely polyadenylated mRNAs. Independently of its role in RQC, this protein may also act as a negative regulator of interferon-stimulated gene expression. ZNF598 is associates with eukaryotic initiation factor 4E (eIF4E) homologous protein from mammalian (m4EHP) through binding to Grb10-interacting GYF protein 2 (GIGYF2). The m4EHP-GIGYF2 complex functions as a translational repressor and is essential for normal embryonic development of mammalian.
