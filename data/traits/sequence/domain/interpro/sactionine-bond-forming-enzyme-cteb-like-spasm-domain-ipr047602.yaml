identifier: InterPro:IPR047602
label: "Sactionine bond-forming enzyme CteB-like, SPASM domain"
definition: >-
  This entry represents the C-terminal iron-sulfur cluster-binding SPAM domain of CteB and similar sequences mainly found in Clostridia but also in other prokaryotic species. Sactionine bond-forming enzyme CteB from Clostridium thermocellum ( ) is a radical S-adenosylmethionine (SAM) enzyme that catalyses the formation of the requisite thioether bridge between a cysteine and the α-carbon of an opposing amino acid that is required in sactipeptide biosynthesis. Radical SAM enzymes are characterised by a conserved CxxxCxxC motif, which coordinates the conserved iron-sulfur cluster that is involved in the reductive cleavage of SAM and generates a 5'-deoxyadenosyl radical, which in turn abstracts a hydrogen from the appropriately positioned carbon atom of the substrate. Radical SAM (RS) enzymes with a C-terminal SPASM domain contain at least one other iron-sulfur cluster. CteB contains two auxillary 4Fe-4S clusters in its SPASM domain.
