identifier: InterPro:IPR057310
label: "Period circadian protein homolog PER 1-3, bHLH-like domain"
definition: >-
  This domain is found in the family of Period circadian protein homologs (PER1, PER2, PER3) found in vertebrates, such as PER2 in human and PER2 in mouse. This domain is a bHLH domain which is known to interact with DNA. It is more closely related to Circadian locomoter output cycles protein kaput (Clock). PER proteins (PER 1-3) are transcriptional repressors which form the core component of the circadian clock. They play a critical role in rhythm generation, whereas delays imposed by post-translational modifications are important for determining the period of the rhythms. The core clock genes: PER1/2/3 and CRY1/2 form the negative limb of the feedback loop and interact with the CLOCK|NPAS2-BMAL1|BMAL2 heterodimer inhibiting its activity and thereby negatively regulating their own expression.
