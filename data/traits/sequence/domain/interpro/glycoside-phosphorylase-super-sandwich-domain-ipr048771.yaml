identifier: InterPro:IPR048771
label: "Glycoside phosphorylase, super sandwich domain"
definition: >-
  Glycoside phosphorylases catalyse the phosphorolysis of oligosaccharides into sugar phosphates. This domain is the second of four domains (nDom2) found in the L. phytofermentans SOGP (sophoro-oligosaccharide beta-1,2-gluco-phosphorylase) and similar bacterial proteins. This domain shows structural similarity to the first domain nDom1, suggesting a possible duplication event. The third domain is the catalytic GH94 domain.
