identifier: InterPro:IPR040477
label: "Lysine-specific demethylase 4-like, Tudor domain"
definition: >-
  This is the tudor domain found in lysine-specific demethylase 4A-C (KDM4A, also known as JMJD2A-C, respectively). KDM4A/B are histone demethylases that specifically demethylate 'Lys-9' and 'Lys-36' residues of histone H3, while KDM4B specifically demethylates 'Lys-9'. Structure and function analysis indicate that this domain can recognize equally well two unrelated histone peptides, H3K4me3 and H4K20me3, by means of two very different binding mechanisms. KDM4 belongs to the conserved iron (II)-dependent jumonji-domain demethylase subfamily that is essential during development. Vertebrate KDM4A-C proteins contain a conserved double tudor domain (DTD). This entry also includes PHD finger protein 19 (PHF19), Metal-response element-binding transcription factor 2 (MTF2) and PHD finger protein 1 (PHF1) which are polycomb group (PcG) proteins that specifically binds histone H3 trimethylated at 'Lys-36' and recruits the PRC2 complex. PHD finger protein 20-like protein 1 negative regulator of proteasomal degradation of a set of methylated proteins is also included in this entry.
