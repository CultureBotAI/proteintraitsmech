identifier: InterPro:IPR010926
label: Class I myosin tail homology domain
definition: >-
  Class I myosins (Myo1s) are widely expressed in eukaryotic cells. Myo1s exist as monomers and can sense cellular mechanical forces and function as tension- sensitive anchors or transporters. Each Myo1 contains from N terminus to C terminus, a motor domain, a neck region consisting of several calmodulin (CaM)-binding IQ motifs and a tail region. All Myo1s contain a tail homology (TH1) domain featuring an embedded pleckstrin-homology (PH) domain capable of binding to lipid membranes. In addition, Myo1s with long tails also contain a TH2 (or GPA) domain and a C-terminal TH3 (or SH3) domain, the latter of which may be responsible for binding to cargos. All Myo1s are capable of bridging actin cytoskeletons with lipid membranes by using their motor heads and tail TH1 domains. The TH1 domain is an extended PH domain capable of binding to lipids.
