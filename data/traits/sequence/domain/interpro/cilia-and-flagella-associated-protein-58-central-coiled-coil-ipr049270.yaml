identifier: InterPro:IPR049270
label: "Cilia- and flagella-associated protein 58, central coiled coil"
definition: >-
  This domain is found in Cilia- and flagella-associated protein 58 (CFAP58) and related eukaryotic proteins. The human CFAP58 protein has an essential role in the assembly and organisation of the sperm flagellar axoneme. This domain forms a parallel coiled coil that in the C. reinhardtii axonemal structure lays on the doublet microtubule surface and interacts with the N terminus of the MIA coiled coil ( ).
