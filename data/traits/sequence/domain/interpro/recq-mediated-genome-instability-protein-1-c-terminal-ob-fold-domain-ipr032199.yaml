identifier: InterPro:IPR032199
label: RecQ-mediated genome instability protein 1, C-terminal OB-fold domain
definition: >-
  The dissolvasome is a protein complex that consists of BLM, a RecQ helicase that is product of the gene mutated in Bloom syndrome, topoisomerase IIIalpha (Top3alpha) and the RMI (RecQ-mediated genome instability) subcomplex, comprised of RMI1 and RMI2. The dissolvasome acts on double Holliday junction intermediates in homologous recombination, creating non-crossover products in a process termed 'dissolution'. This entry represents the C-terminal oligo-nucleotide binding domain of Recq-mediated genome instability protein RMI1. This domain interacts with RMI2-OB folds to make up the RMI core complex. The RMI core interface is crucial for dissolvasome assembly and may have additional cellular roles as a docking hub for other proteins.
