identifier: InterPro:IPR047216
label: "Putative endonuclease DUF559, bacteria"
definition: >-
  This entry represents the DUF559 found mainly in bacteria, including the uncharacterised proteins HI_1162/HI_0925 from Haemophilus influenzae and YcjD from Escherichia coli. It is a putative endonuclease of unknown function, which belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI.
