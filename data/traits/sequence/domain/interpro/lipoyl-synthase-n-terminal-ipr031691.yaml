identifier: InterPro:IPR031691
label: "Lipoyl synthase, N-terminal"
definition: >-
  This domain is found in the N terminus of lipoyl synthases. Lipoyl synthase is an iron-sulphur protein. It is localised to mitochondria in yeast and Arabidopsis. It generates lipoic acid, a thiol antioxidant that is linked to a specific Lys as prosthetic group for the pyruvate and alpha-ketoglutarate dehydrogenase complexes and the glycine-cleavage system.
