identifier: InterPro:IPR040886
label: "TRIF, N-terminal"
definition: >-
  The N-terminal domain of TRIF/TICAM-1 has a structure that consists of eight antiparallel helices. This domain believed to be involved in self-regulation of TRIF by interacting with its TIR domain.
