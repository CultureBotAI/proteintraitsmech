identifier: InterPro:IPR037814
label: Cellobionic acid phosphorylase, N-terminal
definition: >-
  Cellobionic acid phosphorylase (CBAP) is an intracellular enzyme from cellulolytic fungus and bacterium belonging to the glycoside hydrolase family 94 (GH94). It catalyzes the reversible phosphorolysis of cellobionic acid into glucose 1-phosphate and gluconic acid. The glycoside hydrolase family 94 (previously known as glycosyltransferase family 36) includes cellobiose phosphorylase, cellodextrin phosphorylase, chitobiose phosphorylase ([ec:2.4.1.-]), amongst other members. Their N-terminal domain is involved in oligomerization and may play a role in catalysis, but it is separate from the catalytic domain - an (α/α)(6) barrel).
