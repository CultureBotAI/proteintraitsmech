identifier: InterPro:IPR024929
label: Nucleolar GTP-binding protein 2, circularly permuted GTPase motif
definition: >-
  This entry represents the circularly permuted GTPase motif of Nucleolar GTP-binding protein 2 (GNL2, also known as NGP-1) from animals and fungi. GNL2 is a GTPase that associates with pre-60S ribosomal subunits in the nucleolus and is required for their nuclear export and maturation. This group of proteins also includes Nuclear/nucleolar GTPase 2 (NUG2) from plants.
