identifier: InterPro:IPR059806
label: "YmdA, beta-sandwich domain"
definition: >-
  This entry represents a small β-sandwich domain that comprises most of the YmdA protein. YmdA is an uncharacterised protein of approximately 103-106 amino acids found in Escherichia coli and Salmonella. The protein shows similarity to the N-terminal region of FimA/PapA family fimbrial proteins. YmdA is encoded as part of the csgBAC/ymdA operon and is under the control of the CsgD transcription factor. YmdA is also part of the stress-responsive ymdAB-clsC operon, and overexpression of YmdA inhibits biofilm formation. The protein contains a signal peptide suggesting it is secreted. The function of this protein remains to be determined.
