identifier: InterPro:IPR048739
label: "Centrosomal protein CEP104, N-terminal domain"
definition: >-
  This is the N-terminal all-β domain of CEP104, which is structurally similar to domains of intraflagellar transport protein 25 (IFT25), DNA repair protein XRCC1 and anaphase-promoting complex APC subunit 10, which is implicated in Cep97 binding. Centrosomal protein CEP104 localises to the distal end of centrioles that interacts through its N- and C-terminal region, respectively, with the distal end proteins Cep97 and CP110. It is required for ciliogenesis and for structural integrity at the ciliary tip, being involved in regulating microtubule length in cilia. This is a multidomain protein that consists of an N-terminal all-β domain, a central all α-helical HEAT repeat domain and a C-terminal array of four zinc finger domains.
