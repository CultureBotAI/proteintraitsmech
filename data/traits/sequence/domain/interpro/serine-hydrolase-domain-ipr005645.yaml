identifier: InterPro:IPR005645
label: "Serine hydrolase domain"
definition: >-
  This domain is found in a number of enzymes possessing esterase and hydrolase activity. This domain can be found in budding yeast Fsh1/2/3, fission yeast Dfr1 and the human OVCA2 protein. Fsh1/2/3 are putative serine hydrolases. Dfr1 is a dihydrofolate reductase (DHFR). OVCA2 is a putative serine-hydrolase that has been linked to cancers. Proteins containing this domain also includes Aspergillus terreus esterase LovG, which catalyzes the release of covalently bound dihydromonacolin L from LovB during lovastatin biosynthesis.
