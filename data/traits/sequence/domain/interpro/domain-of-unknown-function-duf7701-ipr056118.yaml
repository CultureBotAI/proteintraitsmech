identifier: InterPro:IPR056118
label: "Domain of unknown function DUF7701"
definition: >-
  This domain is found in uncharacterised proteins mainly from bacteria. It is predicted to adopt an α-helical structure with a highly conserved DVHDxWxxW sequence motif which may constitute a ligand binding site. This domain is likely to form a homodimer. Investigation of STRING networks suggests this protein may functionally interact with a likely octameric membrane complex.
