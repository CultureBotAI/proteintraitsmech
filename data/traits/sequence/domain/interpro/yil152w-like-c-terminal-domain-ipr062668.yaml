identifier: InterPro:IPR062668
label: "YIL152W-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of YIL152W and similar uncharacterised proteins from Saccharomycetaceae. Some related proteins are required for respiratory growth. The function of this domain remains to be determined.
