identifier: InterPro:IPR056340
label: "Carboxypeptidase Rv3627c-like, N-terminal domain"
definition: >-
  This is the short N-terminal domain of Carboxypeptidase Rv3627c from Mycobacterium tuberculosis and similar sequences found in actinobacteria. This domain is predicted to form an α-helix. Carboxypeptidase Rv3627c cleaves terminal D-alanine from peptidoglycan in the mycobacterial cell wall. It exerts important effects on mycobacterial cell morphology and cell division.
