identifier: InterPro:IPR041654
label: "Styrene monooxygenase StyA, putative substrate binding domain"
definition: >-
  This domain is found in the 46kDa FAD-specific styrene epoxidase (SMOA, also known as StyA) protein, comprises a part of the styrene monooxygenase (SMO) two-component flavoprotein monooxygenase enzyme. Structural analysis indicates that SMOA monomer comprises two globular domains spanned by a long α-helix. This domain contains a putative substrate binding site.
