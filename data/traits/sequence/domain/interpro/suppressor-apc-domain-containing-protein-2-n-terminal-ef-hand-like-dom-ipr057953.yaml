identifier: InterPro:IPR057953
label: "Suppressor APC domain-containing protein 2, N-terminal EF-hand-like domain"
definition: >-
  This entry represents the EF-hand-like fold found at the N-terminal end of suppressor APC domain-containing protein 2 (SAPC2) and related proteins in animals. In humans, SAPC2 plays a role in planar mitotic spindle orientation. It is also involved in positive regulation of cell proliferation and tumour cell growth. The EF-hand fold is a helix-loop-helix motif that binds calcium. SAPC2 is expressed in many primary gastric carcinoma. It is expressed preferentially in M and G1 phases, compared to S and G2 phases.
