identifier: InterPro:IPR062961
label: "PlmA-like, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain of approximately 95 residues found in cyanobacterial PlmA-type GntR family transcriptional regulators. The domain is located C-terminal to the DNA-binding GntR domain. PlmA (all1076) has plasmid maintenance functions in Anabaena and interacts with the PII-PipX complex as part of the nitrogen regulatory network. In Synechocystis, the homologue Sll1961 interacts with thioredoxin and is involved in regulating phycobilisome degradation. The specific function of this C-terminal domain remains to be determined.
