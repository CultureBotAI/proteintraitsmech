identifier: InterPro:IPR037901
label: "HCLS1-binding protein 3, PX domain"
definition: >-
  Hematopoietic lineage cell-specific protein-1 (HS1) binding protein 3 (HS1BP3) associates with HS1 proteins through their SH3 domains, suggesting a role in mediating signaling. It has been reported that HS1BP3 might affect the IL-2 signaling pathway in hematopoietic lineage cells. Mutations in HS1BP3 may also be associated with familial Parkinson disease and essential tremor. This entry represents the PX domain of HS1BP3. In general, the PX domain interacts with PIs and plays a role in targeting proteins to PI-enriched membranes.
