identifier: InterPro:IPR062196
label: "S-layer protein A, sixth immunoglobulin-like domain"
definition: >-
  This entry represents the sixth immunoglobulin-like domain of S-layer protein A (SlaA) found in Sulfolobales archaea. SlaA is a large glycosylated protein that forms part of the highly ordered outer cell wall sheath structure. The protein contains multiple N-linked glycosylation sites and is secreted to the S-layer. The full-length protein forms mushroom-shaped unit cells together with SlaB subunits. The specific function of this C-terminal immunoglobulin-like domain within the S-layer structure remains to be determined.
