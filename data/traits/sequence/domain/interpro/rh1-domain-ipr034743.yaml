identifier: InterPro:IPR034743
label: "RH1 domain"
definition: >-
  This is the RILP homology 1 (RH1) protein-protein interaction domain found at the N-terminal of Rab36-binding proteins including Rab interacting lysosomal proteins (RILP), RILP1/2 NK-interacting protein 3 (JIP3) and NK-interacting protein 4 (JIP4). This domain binds to the myosin Va globular tail domain (MyoVa-GTD). The RH1 (RILP homology 1) protein-protein interaction domain is found in the following animal Rab36-binding proteins: Rab interacting lysosomal proteins (RILP), RILP-like 1 (RILP-L1), RILP-like 2 (RILP-L2), JNK-interacting protein 3 (JIP3), JNK-interacting protein 4 (JIP4). It binds to the myosin Va globular tail domain (MyoVa-GTD) in mainly hydrophobic interactions. The RH1 domain adopts an all-helical structure and forms a homodimer with a four-helix bundle conformation to interact with MyoVa-GTD. The RH1 homodimer is structurally separated into two parts, the N-terminal four-helix bundle formed by alpha2 and alpha3N and the C-terminal coiled-coil formed by alpha3C. The four-helix bundle in the RH1 dimer is mainly stabilised by forming a hydrophobic core. The N-terminal small helix (alpha1) and its following loop pack on alpha2 from the same molecule and alpha3 from the neighbouring molecule and thus contribute to the bundle stability. The RH1 homodimer is further strengthened by a coiled coil formed by the C-terminal half of the alpha3-helix.
