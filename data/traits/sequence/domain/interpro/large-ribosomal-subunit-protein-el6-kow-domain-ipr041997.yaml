identifier: InterPro:IPR041997
label: "Large ribosomal subunit protein eL6, KOW domain"
definition: >-
  Large ribosomal subunit protein eL6 (RPL6) contains a KOW motif and has an extra ribosomal role regulating the DNA damage response. KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4.
