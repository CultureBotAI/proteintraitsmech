identifier: InterPro:IPR063219
label: "Rhizobiales growth-associated beta-sandwich domain"
definition: >-
  This entry represents a tandemly repeated β-sandwich domain found in Alphaproteobacteria (Rhizobiales and Burkholderiales). The domain has structural similarity to carboxypeptidase regulatory domains (clan CL0287). It is typically found in 2-3 copies in proteins. In Sinorhizobium meliloti, family members include RgsD, which is part of the Rgs (Rhizobiales-specific growth and septation) protein system that interacts with the Tol-Pal complex to promote unipolar growth and cell division. These proteins are essential for viability in several Rhizobiales species.
