identifier: InterPro:IPR035682
label: "Phosphonate metabolism protein, MBL domain"
definition: >-
  Escherichia coli PhnP catalyzes the hydrolysis of 5-phospho-D-ribose-1,2-cyclic phosphate to D-ribose-1,5-bisphosphate, a step in the C-P lyase pathway. PhnP belonsg to the metallo-beta-lactamase (MBL)-fold metallo-hydrolase superfamily.
