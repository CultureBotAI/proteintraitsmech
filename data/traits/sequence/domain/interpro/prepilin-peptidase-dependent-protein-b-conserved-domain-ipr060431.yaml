identifier: InterPro:IPR060431
label: "Prepilin peptidase-dependent protein B, conserved domain"
definition: >-
  This entry represents the prepilin peptidase-dependent protein B (PpdB) family found in Escherichia coli, Haemophilus influenzae and other Gram-negative bacteria. These proteins typically contain a single N-terminal transmembrane helix. PpdB proteins possess a characteristic N-terminal leader sequence that is cleaved by prepilin peptidase, followed by N-methylation of the N-terminal phenylalanine residue. The proteins contain the conserved N-methylation site motif. PpdB has been identified as a component shared between type 4 fimbriae, DNA transfer systems, filamentous phage and protein secretion apparatus, suggesting involvement in the formation of surface-associated protein complexes. These proteins are likely involved in type II secretion systems, though their specific function remains to be fully characterised.
