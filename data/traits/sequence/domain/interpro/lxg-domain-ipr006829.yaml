identifier: InterPro:IPR006829
label: "LXG domain"
definition: >-
  This domain is present at the N-terminal region of a group of polymorphic toxin proteins in bacteria. LXG toxins mediate intraspecies competition in biofilms and may also help to avoid warfare between strains in biofilms.
