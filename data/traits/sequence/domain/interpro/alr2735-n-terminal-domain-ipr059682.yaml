identifier: InterPro:IPR059682
label: "Alr2735, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Alr2735 proteins found in cyanobacteria. Alr2735 proteins are found in Nostoc species. The full-length Alr2735 protein is approximately 210 amino acids. The specific function of this N-terminal domain remains to be determined. It contains an helical fold.
