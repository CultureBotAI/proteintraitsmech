identifier: InterPro:IPR049757
label: "Type III secretion protein HrpP-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Pseudomonas syringae HrpP ( ), a type III secretion system (T3SS) substrate specificity switch-domain protein that has an atypical T3SS translocation signal. HrpP is required for the export of pathogenicity factors into plant cells. This protein contains a C-terminal domain similar to the globular C-terminal substrate-switching (SS) domain, also called the type III secretion substrate specificity switch (T3S4) domain, of Yersinia pestis YscP. Members of this group are found in gammaproteobacteria.
