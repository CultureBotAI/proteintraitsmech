identifier: InterPro:IPR055006
label: "S-layer protein, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of S-layer protein SlpA from Lactobacillus amylovorus and related proteins. This domain adopts unusual topology composed of β-strands arranged in a barrel-sandwich fold.
