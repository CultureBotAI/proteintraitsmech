identifier: InterPro:IPR054397
label: "LicP, N-terminal prodomain"
definition: >-
  LicP is a class II LanP protease that is involved in the biosynthesis of the lantibiotic lichenicidin. This enzyme is an extracellularly located serine protease expressed by some strains of Bacillus licheniformis and undergoes a self-cleavage maturation resulting in two fragments, the N-terminal prodomain (this entry) and the C-terminal catalytic protease domain. The prodomain folds into a single compact domain consisting of four antiparallel β-strands interconnected with two α-helices.
