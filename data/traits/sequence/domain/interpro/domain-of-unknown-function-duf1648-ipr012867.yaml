label: "Domain of unknown function DUF1648"
definition: >-
  This domain is found in proteins expressed by bacterial and archaeal species. One such protein is immunity protein SdpI ( ) from Bacillus subtilis, which provides protection for the cell against the toxic effects of its own SdpC killing factor, and also functions as a receptor/signal transduction protein.
