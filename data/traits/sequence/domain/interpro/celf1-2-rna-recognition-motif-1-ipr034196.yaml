identifier: InterPro:IPR034196
label: "CELF1/2, RNA recognition motif 1"
definition: >-
  The human CELF family has six members, which can be divided into two subfamilies based on their phylogeny: CELF1-2 and CELF3-6. This entry represents the RNA recognition motif 1 (RRM1) of CELF-1 and CELF-2 protein. CELF-1 and CELF-2 belong to the CELF (CUGBP and ETR-3 Like Factor)/Bruno-like protein family, whose members play important roles in the regulation of alternative splicing and translation. CELF-1 and CELF-2 share sequence similarity to the Drosophila Bruno protein and binds to the Bruno response elements (cis-acting sequences in the 3'-untranslated region (UTR) ofoskar mRNA). The human CELF-1 (also known as CUG-BP or BRUNOL-2) binds to RNA substrates and recruits PARN deadenylase. It preferentially targets UGU-rich mRNA elements. CELF-1 has been implicated in onset of type 1 myotonic dystrophy (DM1), a neuromuscular disease associated with an unstable CUG triplet expansion in the 3'-UTR (3'-untranslated region) of the DMPK (myotonic dystrophy protein kinase) gene. CELF-1 contain three highly conserved RNA recognition motifs (RRMs): two consecutive RRMs (RRM1 and RRM2) situated in the N-terminal region followed by a linker region and the third RRM (RRM3) close to the C terminus of the protein. Proteins containing this motif also include Drosophila melanogaster Bruno protein, which plays a central role in regulation of Oskar (Osk) expression in flies. It mediates repression by binding to regulatory Bruno response elements (BREs) in the Osk mRNA 3' UTR. The full-length Bruno protein contains three RRMs, two located in the N-terminal half of the protein and the third near the C terminus, separated by a linker region.
