identifier: InterPro:IPR062102
label: "Fluoroquinolone efflux ABC transporter, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain of approximately 45 residues found in the ATP-binding subunit of fluoroquinolone efflux ABC transporters in bacteria. This domain is located C-terminal to the ABC transporter ATPase domain. In Mycobacterium tuberculosis, the Rv2688c protein containing this domain forms part of an ABC transporter complex that confers resistance to fluoroquinolone antibiotics including ciprofloxacin. The specific function of this C-terminal domain remains to be determined.
