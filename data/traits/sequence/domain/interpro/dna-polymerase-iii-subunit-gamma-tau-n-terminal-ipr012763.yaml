identifier: InterPro:IPR012763
label: DNA polymerase III, subunit gamma/ tau, N-terminal
definition: >-
  This entry represents the well-conserved first N-terminal domain of DnaX (also known as DNA polymerase III subunit gamma/tau), approx. 365 aa. The full-length product of the dnaX gene in Escherichia coli encodes the DNA polymerase III tau subunit. A translational frameshift leads to early termination and a truncated protein subunit gamma, about 1/3 shorter than tau and present in roughly equal amounts. This frameshift mechanism is not necessarily universal for species with DNA polymerase III but appears conserved in the extreme thermophile Thermus thermophilus. This domain is also found in protein STICHEL and STICHEL-like (STI) from Arabidopsis, which share sequence similarity with DNA polymerase III gamma/tau subunits. STI is nuclear-localized and does not participate in genome duplication; it is a key regulator of trichome branching through an endoreduplication-independent pathway.
