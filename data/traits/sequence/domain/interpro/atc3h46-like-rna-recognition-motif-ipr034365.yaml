identifier: InterPro:IPR034365
label: "AtC3H46-like, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) found in AtC3H46, a putative RNA-binding protein that contains an RNA recognition motif (RRM) and a CCCH class of zinc finger, typically C-X8-C-X5-C-X3-H. It may possess ribonuclease activity.
