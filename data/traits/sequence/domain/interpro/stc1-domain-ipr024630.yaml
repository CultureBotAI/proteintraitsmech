identifier: InterPro:IPR024630
label: "Stc1 domain"
definition: >-
  The domain contains 8 conserved cysteines that may bind to zinc. In S. pombe, proteins containing the domain act as protein linkers, which link the chromatin modifying CLRC complex to RNAi by tethering it to the RITS complex. This domain has a slightly different arrangement of its CxxC pairs from the LIM domain, hence it is not part of that family. The tandem zinc-finger structure could mediate protein-protein interactions.
