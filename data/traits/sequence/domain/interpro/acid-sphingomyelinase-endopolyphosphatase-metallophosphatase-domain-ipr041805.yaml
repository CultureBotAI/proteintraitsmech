identifier: InterPro:IPR041805
label: "Acid sphingomyelinase/endopolyphosphatase, metallophosphatase domain"
definition: >-
  Acid sphingomyelinase (ASMase) is a ubiquitously expressed phosphodiesterase which hydrolyses sphingomyelin in acid pH conditions to form ceramide, a bioactive second messenger, as part of the sphingomyelin signalling pathway. ASMase is localised at the noncytosolic leaflet of biomembranes (for example the luminal leaflet of endosomes, lysosomes and phagosomes, and the extracellular leaflet of plasma membranes). ASMase-deficient humans develop Niemann-Pick disease. This disease is characterised by lysosomal storage of sphingomyelin in all tissues. Although ASMase-deficient mice are resistant to stress-induced apoptosis, they have greater susceptibility to bacterial infection. The latter correlates with defective phagolysosomal fusion and antibacterial killing activity in ASMase-deficient macrophages.
