identifier: InterPro:IPR063300
label: "PEG10/RTL1, C-terminal capsid-like domain"
definition: >-
  This is a domain found in a group of retrotransposon-derived proteins from animals, including PEG10, RTL1 and retrotransposon Gag-like 3/5/6. PEG10 binds its own mRNA and self-assembles into virion-like capsids. RTL1 plays an essential role in capillaries endothelial cells for the maintenance of feto-maternal interface and for development of the placenta. RTL3 plays a role in postnatal myogenesis, may be involved in the regulation of satellite cells self-renewal. This entry represents the C-terminal capsid-like domain.
