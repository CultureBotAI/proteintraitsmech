identifier: InterPro:IPR034219
label: "ZCRB1, RNA recognition motif"
definition: >-
  ZCRB1 is a novel multi-functional nuclear factor that may be involved in morphine dependence, cold/heat stress, and hepatocarcinoma. It is located in the nucleoplasm, but outside the nucleolus. ZCRB1 is one of the components of U11/U12 snRNPs that bind to U12-type pre-mRNAs and form a di-snRNP complex, simultaneously recognizing the 5' splice site and branchpoint sequence. ZCRB1 is characterised by an RNA recognition motif (RRM), and a CCHC-type zinc finger motif. In addition, it contains core nucleocapsid motifs, and Lys- and Glu-rich domains. This entry represents the RNA recognition motif (RRM) of ZCRB1.
