identifier: InterPro:IPR058708
label: "AHC1, C-terminal"
definition: >-
  This entry describes the C-terminal domain in AHC1 proteins found in Saccharomycetes. AHC1 proteins are involved in chromatin interaction and potential signal transduction processes. They are part of ADA histone acetyltransferase complex involved in repair of replication-born double-strand DNA breaks. AHC1 has no known orthologues in other eukaryotic organisms. This domain adopts an α-helical fold.
