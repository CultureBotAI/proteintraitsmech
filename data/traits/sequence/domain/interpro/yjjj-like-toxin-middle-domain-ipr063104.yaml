identifier: InterPro:IPR063104
label: "YjjJ-like toxin, middle domain"
definition: >-
  This entry represents the middle domain of YjjJ-like toxins, approximately 110 residues in length. The domain is found between a small N-terminal region and a C-terminal HipA-like domain ( ). In Escherichia coli K12, YjjJ is a toxin that causes filamentous cell morphology when overexpressed and binds DNA. The toxic effect of YjjJ is neutralised by the non-cognate antitoxin HipB. The domain is found predominantly in Proteobacteria.
