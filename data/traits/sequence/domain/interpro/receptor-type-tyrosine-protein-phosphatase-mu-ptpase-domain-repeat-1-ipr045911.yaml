identifier: InterPro:IPR045911
label: "Receptor-type tyrosine-protein phosphatase mu, PTPase domain, repeat 1"
definition: >-
  Receptor-type tyrosine-protein phosphatase mu (R-PTP-mu) belongs to the type 2B subfamily of receptor protein tyrosine phosphatases (RPTPs), which belong to the larger family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs catalyze the dephosphorylation of phosphotyrosine peptides. R-PTP-mu is a homophilic cell adhesion molecule expressed in cells which display a cellular network such as neurons and glia in the central nervous system. It is required for neurite outgrowth. Loss of this protein contributes to tumor cell migration and dispersal of human glioblastomas. It contains an extracellular region with an Meprin-A5 (neuropilin)-mu (MAM) domain, an immunoglobulin (Ig) domain, and four fibronectin type III (FN3) repeats, a transmembrane domain, and an intracellular segment with a juxtamembrane domain similar to the cytoplasmic domain of classical cadherins and two tandem PTP domains.
