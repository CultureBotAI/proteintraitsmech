identifier: InterPro:IPR037640
label: SMOC-2, extracellular calcium-binding domain
definition: >-
  SMOC-2 is a ubiquitously expressed matricellular protein that enhances the response to angiogenic growth factors, mediate cell adhesion, keratinocyte migration, and metastasis. It is also associated with vitiligo and craniofacial and dental defects. Moreover, SMOC-2 acts as an Arf1 GTPase-activating protein (GAP) that interacts with clathrin heavy chain (CHC) and clathrin assembly protein CALM and functions in the retrograde, early endosome/trans-Golgi network (TGN) pathway in a clathrin- and AP-1-dependent manner.
