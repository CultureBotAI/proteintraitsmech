identifier: InterPro:IPR059551
label: "YqeJ, C-terminal domain"
definition: >-
  This entry represents the C-terminal helical domain of umcharactersed YqeJ proteins found in enterobacterales. YqeJ proteins are membrane-associated with a transmembrane helix. YqeJ is approximately 160 amino acids. The specific function of this domain remains to be determined.
