identifier: InterPro:IPR054476
label: "E3 ubiquitin-protein ligase listerin, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of E3 ubiquitin-protein ligase listerin from Saccharomyces cerevisiae (Ltn1) and similar eukaryotic proteins. Ltn1 is a component of the ribosome quality control complex (RQC), a ribosome-associated complex that mediates ubiquitination and extraction of incompletely synthesised nascent chains for proteasomal degradation. This domain is predominantly composed of α-helices that are arranged into HEAT repeats, each consisting of two antiparallel α-helices that pack against each other in a repeating array.
