identifier: InterPro:IPR038040
label: AT-rich interactive domain-containing protein 1B, ARID domain
definition: >-
  AT-rich interactive domain-containing protein 1B (ARID1B or BAF250b) is part of the SWI/SNF-like ATP-dependent chromatin remodelling complex that regulates gene expression through regulating nucleosome remodelling. In humans there are two BAF250 isoforms, BAF250a/ARID1A and BAF250b/ARID1B. Both BAF250a and BAF250b bind DNA non-specifically. BAF250b is also a component of the BAF, SWI/SNF-like EBAFb, npBAF and nBAF complexes, which remodel chromatin. ARID1B exhibits tumour-suppressor activities in pancreatic cancer cell lines [ , [cite:]]. Mutations in the ARID1B gene cause Coffin-Siris syndrome, exhibiting developmental defects, and haplo-insufficiency of ARID1B, a frequent cause of intellectual disability. Moreover, mutations in the ARID1B gene have been found in many cancers. This entry represents the ARID/BRIGHT DNA binding domain of ARI1B. It binds DNA in a non-sequence-specific manner similar to ARID1A.
