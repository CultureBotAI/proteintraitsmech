identifier: InterPro:IPR060406
label: "SLMAP-like, first coiled-coil"
definition: >-
  This entry represents the first coiled-coil (CC1) domain found in STRIPAK-associated proteins including sarcolemmal membrane-associated protein (SLMAP) and TRAF3-interacting JNK-activating modulator (T3JAM/TRAF3IP3). In SLMAP, this domain is responsible for binding suppressor of IKBKE 1 (SIKE1), facilitating the formation of the extended (SIKE1:SLMAP)STRIPAK complex that regulates Hippo signalling and cell growth control. In T3JAM/TRAF3IP3, this domain is part of an adapter protein that specifically interacts with TRAF3 to promote JNK activation. Both proteins function as tail-anchored membrane proteins with C-terminal transmembrane helices and extensive coiled-coil regions. SLMAP is critical for myoblast fusion and localises to multiple cellular membranes, including the sarcolemma, centrosomes, and endoplasmic reticulum. T3JAM plays essential roles in both innate and adaptive immunity, mediating TCR-stimulated activation by recruiting MAP2K1 to the Golgi apparatus during T-cell development. It facilitates LPS-induced TLR4 translocation to lipid rafts in macrophage-mediated inflammation and recruits TRAF3 to MAVS within mitochondria for antiviral interferon production.
