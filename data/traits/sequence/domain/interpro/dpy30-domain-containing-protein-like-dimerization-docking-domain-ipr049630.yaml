identifier: InterPro:IPR049630
label: "DPY30 domain-containing protein-like, dimerization/docking domain"
definition: >-
  The DYDC-like family includes DYDC1 and DYDC2 proteins. DYDC1 plays a crucial role during acrosome biogenesis. RSP2 is a calmodulin binding spoke stalk protein required for motility in Chlamydomonas reinhardtii. It binds calmodulin in a calcium-dependent manner. Members of this entry contain an N-terminal domain that shows high sequence similarity to the dimerization/docking (D/D) domain of protein DPY-30/SDC1.
