identifier: InterPro:IPR048750
label: "Coiled-coil domain-containing protein 138, C-terminal domain"
definition: >-
  This is the C-terminal domain of coiled-coil domain-containing protein 138 (CCDC138), which adopts an α-solenoid structure. CCDC138 function is not yet clear. However, it has been localised to basal bodies, suggesting to play a role in centrosomal and ciliary biology.
