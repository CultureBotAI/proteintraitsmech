identifier: InterPro:IPR062441
label: "MPS3-like, helical domain"
definition: >-
  This entry represents a helical domain found in MPS3 and related fungal SUN domain-containing proteins. The domain contains predicted α-helical regions and coiled-coil elements. MPS3 is a component of the LINC complex that connects the spindle pole body with the nuclear envelope and regulates telomere movement during meiosis. This helical domain precedes the C-terminal SUN domain that is responsible for protein-protein interactions. The specific function of this domain remains to be determined.
