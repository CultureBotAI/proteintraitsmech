identifier: InterPro:IPR020575
label: "Heat shock protein Hsp90, N-terminal"
definition: >-
  Prokaryotes and eukaryotes respond to heat shock and other forms of environmental stress by inducing synthesis of heat-shock proteins (hsp). The 90kDa heat shock protein, Hsp90, is one of the most abundant proteins in eukaryotic cells, comprising 1-2% of cellular proteins under non-stress conditions. Its contribution to various cellular processes including signal transduction, protein folding, protein degradation and morphological evolution has been extensively studied. The full functional activity of Hsp90 is gained in concert with other co-chaperones, playing an important role in the folding of newly synthesised proteins and stabilisation and refolding of denatured proteins after stress. Apart from its co-chaperones, Hsp90 binds to an array of client proteins, where the co-chaperone requirement varies and depends on the actual client. This entry represents the histidine kinase-like ATPase (HATPase) domain Hsp90 from eukaryotes and its bacterial homologues, known as HtpG (High temperature protein G).
