identifier: InterPro:IPR048322
label: "Nuclear cap binding complex subunit CBP66, second domain"
definition: >-
  This entry represents the second domain of the CBP66 component of the trypanosoma nuclear cap binding complex. Trypanosomes have a different cap 4 structure for mRNAs. CBP66 is part of the complex that recognises this cap.
