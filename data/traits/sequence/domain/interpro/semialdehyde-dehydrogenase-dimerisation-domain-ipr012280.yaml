identifier: InterPro:IPR012280
label: Semialdehyde dehydrogenase, dimerisation domain
definition: >-
  This domain contains N-acetyl-glutamine semialdehyde dehydrogenase (AgrC), which is involved in arginine biosynthesis, and aspartate-semialdehyde dehydrogenase, an enzyme involved in the biosynthesis of various amino acids from aspartate. It also contains the yeast and fungal Arg5,6 protein, which is cleaved into the enzymes N-acety-gamma-glutamyl-phosphate reductase and acetylglutamate kinase. These are also involved in arginine biosynthesis. All proteins in this entry contain a dimerisation domain of semialdehyde dehydrogenase.
