identifier: InterPro:IPR049488
label: "TetR transcriptional regulator TM_1030-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of the TetR family Transcriptional regulator TM_1030 from Thermotoga maritima ( ) and similar sequences from bacteria. TM_1030 shows high similarity to members of the TetR family at the N-terminal DNA-binding domain ( ). However, differences are much greater in the C-terminal regulatory domain, which shows an all-helical structure.
