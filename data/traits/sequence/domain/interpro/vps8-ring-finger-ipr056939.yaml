identifier: InterPro:IPR056939
label: "Vps8, RING finger"
definition: >-
  Vps8 is one of the Golgi complex components necessary for vacuolar sorting. It is the core component of the endosomal tethering complex CORVET (class C core vacuole/endosome tethering). Vps8 co-operates with Vps21-GTP to mediate endosomal clustering in a reaction that is dependent on Vps3. Vps8 is the only CORVET subunit that is enriched on late endosomes, suggesting that it is a marker for the maturation of late endosomes. These proteins consist of a β-propeller at the N-terminal followed by a long, central TPR domain and a RING zinc finger at the C-terminal. This entry represents the RING zinc finger found in Vps8 from mammals and similar sequences mainly found in vertebrates.
