identifier: InterPro:IPR059026
label: "Lipoprotein LpqB, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of LpqB from Mycobacterium tuberculosis. This domain is predicted to adopt an α-β configuration. LpqB may modulate activity of the MtrAB system in controlling homeostasis of the cell wall and cell division. It partially restores antibiotic resistance to M.smegmatis in which this gene has been disrupted.
