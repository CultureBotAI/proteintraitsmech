identifier: InterPro:IPR024724
label: "Molybdenum cofactor biosynthesis protein F, N-terminal"
definition: >-
  This entry represents the N-terminal domain of MoaF. Molybdenum cofactor biosynthesis protein F (MoaF) is essential for the production of the monoamine-inducible 30kDa protein in Klebsiella. It is necessary for reconstituting organoautotrophic growth in Ralstonia eutropha. MoaF is conserved in proteobacteria and some lower eukaryotes. The operon regulating the Moa genes is responsible for molybdenum cofactor biosynthesis.
