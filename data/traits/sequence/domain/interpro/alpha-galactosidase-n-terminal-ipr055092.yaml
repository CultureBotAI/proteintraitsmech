identifier: InterPro:IPR055092
label: "Alpha-galactosidase, N-terminal"
definition: >-
  This domain is found at the N-terminal of Alpha-galactosidase from Thermotoga maritima (GalA), which hydrolyses the short-chain alpha-galactosaccharides raffinose, melibiose and stachyose. This GH36 enzyme is organised into three domains: an N-terminal β-sandwich fold domain (this entry), a canonical (β/α)8-fold domain housing the active site ( ), and a C-terminal β-sandwich domain with a Greek-key motif.
