identifier: InterPro:IPR062117
label: "Interleukin-9 receptor, C-terminal domain"
definition: >-
  This entry represents the C-terminal cytoplasmic domain of interleukin-9 receptors found in vertebrates. This domain encompasses the transmembrane region. Interleukin-9 receptors are type I cytokine receptors that play important roles in immune responses against parasites. The cytoplasmic domain contains the Box 1 motif which is required for JAK interaction and activation. The receptors belong to the type I cytokine receptor type 4 subfamily and contain a fibronectin type-III domain in their extracellular region. The specific function of this C-terminal domain remains to be determined.
