identifier: InterPro:IPR061923
label: "Peptidase family S64"
definition: >-
  This entry includes SSY5 from fungi, a protein that is involved in the processing of membrane bound transcription factor Stp1. The processing causes the signalling domain of Stp1 to be passed to the nucleus where several permease genes are induced. The permeases are important for uptake of amino acids, and processing of tp1 only occurs in an amino acid-rich environment. This entry represents the peptidase domain that is related to the trypsin family (MEROPS:S1) and has a typical trypsin-like catalytic triad.
