identifier: InterPro:IPR058907
label: "Broad-specificity ulvan lyase, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Broad-specificity ulvan lyase from Formosa agariphila P29) and similar prokaryotic sequences. P29 is involved in the degradation of ulvan, a major cell wall polysaccharide from green seaweeds of the genus Ulva. The N-terminal domain is rich in α-helices and adopts an (α/α)6 toroid structure, which forms the catalytic core of the enzyme. In contrast to other known ulvan lyases (PL24, PL25, and PL28 families) that have predominantly β-sheet structures, this domain has a helical-rich architecture. This domain is typically followed by a C-terminal β-sandwich domain ( ). Together, these domains enable the enzyme to catalyse the endolytic cleavage of the glycosidic bond between rhamnose-3-sulfate (Rha3S) and uronic acids (glucuronic acid or iduronic acid). The distinct structural fold of this domain contributes to the broad substrate specificity of these enzymes, which can degrade not only ulvan but also glycosaminoglycans like chondroitin sulfate and heparan sulfate.
