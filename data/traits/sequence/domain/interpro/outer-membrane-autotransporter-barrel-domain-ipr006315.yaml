label: Outer membrane autotransporter barrel domain
definition: >-
  The secretion of protein products occurs by a number of different pathways in bacteria and several secretion mechanisms have been described for Gram-negative bacteria, an increasing number employ a highly efficient but simple mechanism first described for the immunoglobulin A1 (IgA1) proteases.
