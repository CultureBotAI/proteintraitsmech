identifier: InterPro:IPR012492
label: "Protein RED, C-terminal"
definition: >-
  This domain is found at the C terminus of Red protein. This and related proteins are thought to be localised to the nucleus, and contain a RED repeat which consists of a number of RE and RD sequence elements. The function of Red protein is unknown, but efficient sequestration to nuclear bodies suggests that its expression may be tightly regulated or that the protein self-aggregates extremely efficiently.
