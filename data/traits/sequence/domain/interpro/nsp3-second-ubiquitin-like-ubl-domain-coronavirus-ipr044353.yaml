identifier: InterPro:IPR044353
label: "NSP3, second ubiquitin-like (Ubl) domain, coronavirus"
definition: >-
  Nsp3 comprises various domains of functional and structural importance for virus replication, the organization of which differs between CoV genera, due to duplication or absence of some domains. Two ubiquitin-like domains, Ubl1 and Ubl2 (Nsp3a and the N-terminal domain of Nsp3d), exist within Nsp3 of all CoVs. The known functional roles of Nsp3a Ubl in CoVs are related to single-stranded (ssRNA) binding and interacting with the nucleocapsid (N) protein. Nsp3d Ubl is immediately adjacent to the N terminus of the PLpro (or PL2Pro) domain in CoV polyproteins, and it may play a critical role in protease regulation and stability as well as in viral infection. In addition to the four β-strands and two α-helices that are common to ubiquitin-like folds, the Nsp3a Ubl domain contains two short helices. The Nsp3d Ubl domain comprises five β-strands, one α-helix, and one 3(10)-helix. This entry represents a domain covering the entire CoV Nsp3a and Nsp3d second Ubl domain. Its exact function is unclear, but it might act as a modulator helping the PL2pro recognise its specific targets during coronavirus infection. Non-structural protein NSP3 is a multi-domain protein, the largest product of coronavirus ORF1a which encodes the poyprotein 1a/1ab (pp1a/1ab). NSP3 is released from pp1a/1ab by the papain-like protease domain(s), which is (are) part of NSP3 itself. NSP3 plays many roles in the viral life cycle. It can act as a scaffold protein to interact with itself and to bind other viral Nsps or host proteins. In particular, Nsp3 is essential for the formation of the the replication/ transcription complex (RTC). The RTC associates with host ER membranes producing convoluted membranes and double-membrane vesicles. It is also involved in post-translational modifications of host proteins…
