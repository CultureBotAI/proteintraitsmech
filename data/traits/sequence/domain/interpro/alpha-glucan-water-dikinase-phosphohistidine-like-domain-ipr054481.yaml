identifier: InterPro:IPR054481
label: "Alpha-glucan water dikinase, phosphohistidine-like domain"
definition: >-
  This domain is found in Alpha-glucan water dikinase (GWD1) and its homologues. This enzyme is involved in the incorporation of phosphate into starch-like alpha-V, with preferred C-6 position of glucose units. It acts as an overall regulator of starch mobilisation and it is required for starch degradation. The domain represented by this entry is predicted to adopt a globular structure consisting of a β-barrel decorated with α-helices. This domain has a significant sequence and structural similarity to phosphohistidine domain found in phosphate dikinases and PEP:sugar phosphotransferases.
