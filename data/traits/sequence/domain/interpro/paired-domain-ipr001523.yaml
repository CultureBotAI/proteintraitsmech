identifier: InterPro:IPR001523
label: Paired domain
definition: >-
  The paired domain is an approximately 126 amino acid DNA-binding domain, which is found in eukaryotic transcription regulatory proteins involved in embryogenesis. The domain was originally described as the 'paired box' in the Drosophila protein paired (prd). The paired domain is generally located in the N-terminal part. An octapeptide and/or a homeodomain can occur C-terminal to the paired domain, as well as a Pro-Ser-Thr-rich C terminus. Paired domain proteins can function as transcription repressors or activators. The paired domain contains three subdomains, which show functional differences in DNA-binding. The crystal structures of prd and Pax proteins show that the DNA-bound paired domain is bipartite, consisting of an N-terminal subdomain (PAI or NTD) and a C-terminal subdomain (RED or CTD), connected by a linker. PAI and RED each form a three-helical fold, with the most C-terminal helices comprising a helix-turn-helix (HTH) motif that binds the DNA major groove. In addition, the PAI subdomain encompasses an N-terminal β-turn and β-hairpin, also named 'wing', participating in DNA-binding. The linker can bind into the DNA minor groove. Different Pax proteins and their alternatively spliced isoforms use different (sub)domains for DNA-binding to mediate the specificity of sequence recognition. Some proteins known to contain a paired domain: Drosophila paired (prd), a segmentation pair-rule class protein. Drosophila gooseberry proximal (gsb-p) and gooseberry distal (gsb-d), segmentation polarity class proteins. Drosophila Pox-meso and Pox-neuro proteins. The Pax proteins: Mammalian protein Pax1, which may play a role in the formation of segmented structures in the embryo. In mouse, mutations in Pax1 produce the undulated phenotype, characterised by vertebral malformat…
