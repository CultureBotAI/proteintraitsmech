identifier: InterPro:IPR044324
label: "Nonstructural protein 15, middle domain, deltacoronavirus"
definition: >-
  The unique coronavirus transcription/replication machinery comprised of multiple virus-encoded non structural proteins (NSP) plays a vital role during initial and intermediate phases of the viral life cycle. NSP15 forms a hexamer made of dimers of trimers which is suggested to be a functional unit, responsible for the endoribonuclease activity. The NSP15 monomer consists of three domains: N-terminal, middle and C-terminal. The catalytic function of NSP15 resides in the C-terminal NendoU domain. The active site carries six key residues conserved among SARS-CoV-2, SARS-CoV and MERS-CoV, suggesting that its activity is important for sustained replication in the host. This entry represents the middle domain of NSP15 from deltacoronaviruses. This domain is formed by ten β strands organised into three β hairpins. It creates concave surfaces that may serve as interaction hubs with other proteins and RNA. Coronavirus Nsp15 from Severe Acute Respiratory Syndrome Coronavirus (SARS-CoV), human Coronavirus 229E (HCoV229E), and Murine Hepatitis Virus (MHV) form a functional hexamer. This middle domain harbours residues involved in hexamer formation and in trimer stability. Oligomerization of Porcine DeltaCoronavirus (PDCoV) Nsp15 differs from that of the other coronaviruses; it has been shown to exist as a dimer and a monomer in solution and that it inhibits type I interferon production independently of its endoribonuclease activity.
