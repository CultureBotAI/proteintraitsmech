identifier: InterPro:IPR032302
label: "THO complex subunit 2, N-terminal domain"
definition: >-
  This entry represents the N terminus of THO complex subunit 2 (THO2, THOC2). THO/TREX, a nuclear protein complex conserved from yeast to humans, plays an important role in mRNP biogenesis connecting transcription elongation, mRNA export and preventing genetic instability. THO could be relevant to different mRNA processing steps, including the 3'-end formation, transcript release and export.
