identifier: InterPro:IPR023163
label: "SMc04008-like domain"
definition: >-
  This domain was determined from the crystal structures of the proteins of unknown function from Rhizobium meliloti (Sinorhizobium meliloti) and Alcanivorax borkumensis . The domain is found in a family, which consists of several short bacterial proteins of around 100 residues in length. The function of this domain is unknown.
