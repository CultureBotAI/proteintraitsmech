identifier: InterPro:IPR037322
label: EDEM3, PA domain
definition: >-
  EDEM3 is involved in endoplasmic reticulum-associated degradation (ERAD). It accelerates the glycoprotein degradation by catalyzing mannose trimming from Man8GlcNAc2 to Man7GlcNAc2 in the N-glycans. This entry represents the PA (protease associated) domain of EDEM3. The function of this domain is not clear.
