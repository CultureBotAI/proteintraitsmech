identifier: InterPro:IPR055389
label: "L-arabinose isomerase, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of L-arabinose isomerases, AraA, which is composed of a central parallel β-sheet packed with α-helices on both sides and with topology similar to the topology of the middle domain. This entry includes L-arabinose isomerases, AraA, ( ). These enzymes catalyse the reaction: L-arabinose => L-ribulose. This reaction is the first step in the pathway of L-arabinose utilisation as a carbon source after entering the cell L-arabinose is converted into L-ribulose by the L-arabinose isomerases enzyme.
