identifier: InterPro:IPR029291
label: "DNA binding protein Tfx, C-terminal"
definition: >-
  Tfx has an N-terminal basic domain with a helix-turn-helix motif for DNA binding and a C-terminal acidic domain possibly for transcriptional activation. This is the C-terminal region of Tfx-like DNA-binding proteins.
