identifier: InterPro:IPR007275
label: YTH domain
definition: >-
  The YTH (YT521-B homology) domain has been suggested to be an evolutionarily conserved m6A-dependent RNA binding domain. Proteins containing this domain includes mammalian YTHD and YTDC proteins, Arabidopsis CPSF30 (At1g30460), budding yeast Pho92 and fission yeast Mmi1. In Saccharomyces cerevisiae, Pho92 is a post-transcriptional regulator that regulates Pho4 mRNA stability by binding to the 3'-UTR in a phosphate-dependent manner. Its YTH domain exhibits RNA-binding activity. In Schizosaccharomyces pombe, Mmi1 has been identified as eliminating meiosis-specific mRNAs.
