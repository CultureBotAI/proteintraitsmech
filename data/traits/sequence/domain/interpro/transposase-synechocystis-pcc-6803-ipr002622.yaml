identifier: InterPro:IPR002622
label: "Transposase, Synechocystis PCC 6803"
definition: >-
  Transposase proteins are necessary for efficient DNA transposition. This entry includes insertion sequences from Synechocystis sp. (strain PCC 6803) three of which are characterised as homologous to bacterial IS5- and IS4- and to several members of the IS630-Tc1-mariner superfamily.
