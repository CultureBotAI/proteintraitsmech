identifier: InterPro:IPR040865
label: "Primase X"
definition: >-
  This domain is found in non-catalytic subunit of the archaeal eukaryotic-type primase, PriX. Detailed sequence analysis combined with structural analysis of a truncated PriX protein from the hyperthermophilic archaeon Sulfolobus solfataricus shows that, PriX is essential for the survival of the organism and that it is homologous to the C-terminal domain of archaeal and eukaryotic large primase subunits PriL. Highly conserved PriX homologues are present in many members of the phylum Crenarchaeota.
