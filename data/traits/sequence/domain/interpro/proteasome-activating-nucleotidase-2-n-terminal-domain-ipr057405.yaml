identifier: InterPro:IPR057405
label: "Proteasome-activating nucleotidase 2, N-terminal domain"
definition: >-
  This entry represents the N-termnal domain of archaeal Proteasome-activating nucleotidase 2 (PAN-2, previously known as Putative 26S proteasome regulatory subunit homologue, PRS2) and similar proteins. The function of this domain is unknown and it may be found in association with an AAA-ATPase domain ( ). The 26S proteasome is a large multiprotein complex involved in the regulated degradation of ubiquitinated proteins. This complex can be divided in two sub-complexes, the core particle (CP, 20S) and the regulatory particle (RP, 19S). The RP consists of 19 subunits organised in two sub-structures, the base and lid complexes. The base consists of a ring of six AAA-ATPases. The C-terminal end of these ATPases dock into pockets present between the α-subunits of the CP.
