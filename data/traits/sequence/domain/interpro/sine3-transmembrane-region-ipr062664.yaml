identifier: InterPro:IPR062664
label: "SINE3, transmembrane region"
definition: >-
  This entry represents a transmembrane region containing the KASH domain found in SINE3 (SUN-interacting nuclear envelope protein 3) from Brassicaceae plants. SINE3 is a single-pass membrane protein that localises to the nuclear envelope. It interacts with SUN1 and SUN2 proteins via its KASH domain. The KASH domain mediates nuclear envelope targeting and binding to the SUN proteins.
