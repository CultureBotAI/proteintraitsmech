identifier: InterPro:IPR030642
label: "Nephrocystin-1, SH3 domain"
definition: >-
  Nephronophthisis (NPHP) is a hereditary cystic kidney disorder that causes renal failure in children and young adults and can be associated with various extrarenal disorders, including retinitis pigmentosa. Six NPHP genes have been identified, one of which, Nephrocystin-1 (NPHP1), is localised to the ciliary transition zone of epithelial cells or its analogous structure, connecting cilia of retinal photoreceptors. It also plays an essential role in photoreceptor intraflagellar transport and in later steps of sperm morphogenesis in mice. Nephrocystin contains an SH3 domain involved in signaling pathways that regulate cell adhesion and cytoskeletal organization. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs.
