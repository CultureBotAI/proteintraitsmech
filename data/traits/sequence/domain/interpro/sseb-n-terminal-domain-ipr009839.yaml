identifier: InterPro:IPR009839
label: "SseB, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of SseB. SseB appears to be found exclusively in Enterobacteria. SseB enhances serine-sensitivity in Escherichia coli and is part of the Salmonella pathogenicity island 2 (SPI-2) translocon.
