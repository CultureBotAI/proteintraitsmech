identifier: InterPro:IPR056304
label: "Lipase-like, C-terminal domain"
definition: >-
  This domain is found in lipases from Staphylococcus hyicus (Lip) and related proteins. Lip has a broad substrate specificity hydrolysing a variety of triglycerides and phosphatidylcholines. This domain is also found in uncharacterised sequences from plants, fungi and a few sequences from Platyhelminthes. It adopts a fold typical for α/β hydrolases.
