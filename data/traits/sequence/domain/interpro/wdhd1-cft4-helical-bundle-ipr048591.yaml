identifier: InterPro:IPR048591
label: "WDHD1/CFT4, helical bundle"
definition: >-
  This domain is found at the C-terminal end of DNA polymerase alpha-binding protein CTF4 from Baker's yeast and its homologue MCL1 from budding yeast, while in its human orthologue WDHD1 it is found before the HMG box domain at the C-terminal. This domain folds into a helical extension that is linked to the β-propeller domain ( ) which together form the SepB domain described in. The helical bundle protrudes from one face of the disk-shaped trimer formed by the protein. It is essential for binding of dynamic partner proteins, such as Pol alpha-primase. WDHD1 is an adaptor molecule crucial for DNA replication. It is a core replisome component that acts as a replication initiation factor. It binds directly to the CMG complex and functions as a hub to recruit additional proteins to the replication fork. CTF4 is an accessory factor for DNA replication that plays a role in accurately duplicating the genome in vivo.
