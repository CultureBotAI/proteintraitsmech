identifier: InterPro:IPR049073
label: "Type VI secretion system spike protein VgrG3-like, C-terminal"
definition: >-
  This domain is found in a group of proteins from tailed bacteriophages and prophages mainly found in proteobacteria and firmicutes, including Type VI secretion system spike protein VgrG3 from Vibrio cholerae ( ). VgrG3 degrades the peptidoglycan cell wall of rival bacteria via its C-terminal region through its muramidase activity. This domain adopts a canonical T4-lysozyme-like fold showing eight α-helices and two 3-10 helices, which pack against a three-stranded antiparallel β-sheet ( ).
