identifier: InterPro:IPR009084
label: B transposition protein, C-terminal
definition: >-
  Bacteriophage Mu can integrate into the host bacterial genome and replicate via transposition. Mu requires the activity of four proteins for DNA transposition. Two of these proteins are the phage-encoded A and B transposition proteins, while the other two are host-specified accessory factors HU and IHF. These four proteins can form nucleoprotein complexes (transposomes), which enable strand transfer. The stable protein-DNA intermediate is subsequently disassembled prior to DNA replication by host proteins. The Mu B transposition protein is an ATP-dependent, DNA-binding protein required for target capture and immunity, as well as for activating transpososome function. The C-terminal domain of the B transposition protein is believed to be involved in both DNA-binding and protein-protein contacts with the Mu A transposition protein. The structure of the C-terminal domain consists of four helices in an irregular array.
