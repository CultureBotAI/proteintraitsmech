identifier: InterPro:IPR032472
label: "Argonaute linker 2 domain"
definition: >-
  ArgoL2 is the second linker domain in eukaryotic argonaute proteins. It starts with two α-helices aligned orthogonally to each other followed by a β-strand involved in linking the two lobes, the PAZ lobe and the Piwi lobe of argonaute to each other. Linker 2 together with the N, PAZ and L1 domains form a compact global fold. Numerous residues from Piwi, L1 and L2 linkers direct the path of the phosphate backbone of nucleotides 7-9, thus allowing DNA-slicing.
