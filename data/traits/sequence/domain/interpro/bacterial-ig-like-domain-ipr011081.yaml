identifier: InterPro:IPR011081
label: "Bacterial Ig-like domain"
definition: >-
  This entry represents a bacterial domain with an Ig-like fold. These domains are found in a variety of bacterial surface proteins such as Beta-L-arabinobiosidase and Exo-beta-1,6-galactobiohydrolase.
