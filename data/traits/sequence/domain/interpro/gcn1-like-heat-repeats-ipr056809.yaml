identifier: InterPro:IPR056809
label: "GCN1-like, HEAT repeats"
definition: >-
  This region of HEAT repeats is found in eIF-2-alpha kinase activator GCN1 from Saccharomyces cerevisiae and similar fungal sequences. GCN1 is a ribosome collision sensor that activates a translation quality control pathway when a ribosome has stalled during translation.
