identifier: InterPro:IPR032088
label: "Starter unit:ACP transacylase, SAT domain"
definition: >-
  This entry describes the starter unit:acyl-carrier protein (ACP) transacylase (SAT) domain in nonreducing polyketide synthases (NR-PKSs), polyketide synthases (PKSs), and fatty acid synthases, mostly found in fungi. The SAT domain selects an acyl group as the primer for biosynthesis. SAT selects the hexanoyl starter unit from a pair of specialised fungal fatty acid synthase subunits (HexA/HexB) and transfers it onto the polyketide synthase A acyl-carrier protein to prime polyketide chain elongation. The SAT domain adopts a globular structure with an α/β-hydrolase core fold. It contains a ferredoxin-like subdomain in addition to the core fold. The active site of the SAT domain is likely to be located in a cleft between the α/β-hydrolase core fold and this ferredoxin-like subdomain.
