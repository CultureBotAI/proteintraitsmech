identifier: InterPro:IPR019894
label: "Patatin-related protein"
definition: >-
  Patatins are plant storage proteins capable of phospholipase activity (see ). This entry is found in a family of bacterial proteins of unknown function that contain an N-terminal patatin domain. Regions of strong sequence conservation are separated by regions of significant sequence and length variability. The proteins in this entry are distributed sporadically among bacteria.
