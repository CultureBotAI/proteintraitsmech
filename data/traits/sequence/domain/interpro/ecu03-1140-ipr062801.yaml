identifier: InterPro:IPR062801
label: ECU03_1140
definition: >-
  This entry represents ECU03_1140 found in microsporidia, particularly Encephalitozoon species. These are small, uncharacterised proteins found in microsporidian parasites, which are obligate intracellular eukaryotic pathogens. The proteins show structural similarity to the Stn1 domain. The function of this protein family remains to be determined.
