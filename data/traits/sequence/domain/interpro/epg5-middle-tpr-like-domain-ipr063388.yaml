identifier: InterPro:IPR063388
label: "Epg5, middle TPR-like domain"
definition: >-
  This entry represents a middle TPR-like domain in EPG5 (Ectopic P granules protein 5 homolog). EPG5 is involved in autophagy and is a large 2282 amino acid protein found in Aedes aegypti. The domain shares structural similarity with TPR motifs but may have diverged sequence characteristics. This domain is found across eukaryotes including vertebrates, arthropods and nematodes. The function of this domain remains to be determined.
