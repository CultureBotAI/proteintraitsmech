identifier: InterPro:IPR058768
label: "MCM9, N-terminal domain"
definition: >-
  This domain is found N-terminal in the DNA helicase MCM9 and related proteins. MCM9 is a component of MCM8/MCM9 complex which is involved in homologous recombination repair pathway. Its dysfunction can cause genome instability. MCM8/MCM9 complex forms a 3:3 hetero-hexamer in an alternating pattern. The MCM8/MCM9 complex is dispensable for DNA replication and S phase progression.
