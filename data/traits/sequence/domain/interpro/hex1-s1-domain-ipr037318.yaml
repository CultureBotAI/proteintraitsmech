identifier: InterPro:IPR037318
label: "Hex1, S1 domain"
definition: >-
  Hex1 is the major component of the Woronin body in filamentous fungi and it has an essential function in conidia production and secondary metabolism in A. flavus. Hex1 may also play an important role in the invasion of A. flavus to the host. The Woronin body is a dense vesicle and plays a vital role in filamentous fungi cell integrity. When cell damage occurs, Woronin bodies seal the septal pore to prevent further cytoplasmic bleeding. Hex1 protein self-assembles to form the solid core of the Woronin body vesicle. The Hex1 sequence and structure are similar to eukaryotic initiation factor 5A (eIF5A), suggesting they share a common ancestor during evolution. All members of the EF superfamily to which Hex1 belongs, contain an S1 domain, which has been shown to bind RNA or single-stranded DNA and often interacts with the ribosome.
