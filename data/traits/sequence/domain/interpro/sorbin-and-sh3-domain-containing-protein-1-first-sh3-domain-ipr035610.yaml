identifier: InterPro:IPR035610
label: "Sorbin and SH3 domain-containing protein 1, first SH3 domain"
definition: >-
  This entry represents the first SH3 domain of Sorbin and SH3 domain-containing protein 1. Sorbin and SH3 domain-containing protein 1 (also known as c-Cbl associated protein CAP or ponsin) belongs to a family of adaptor protein containing two other members, ArgBP2 and vinexin. It has an N-terminal sorbin homology (SoHo) domain and three C-terminal SH3 domain (Src homology domain 3). It has been implicated in insulin signalling and is required for insulin-stimulated glucose transport. CAP binds to the major endocytic factor dynamin and affects the actin cytoskeleton organisation.
