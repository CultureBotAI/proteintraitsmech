identifier: InterPro:IPR057137
label: "Plastid division protein CDP1-like, 2nd alpha solenoid domain"
definition: >-
  This entry represents the second α-helical solenoid domain of Plastid division protein CDP1, chloroplastic and Protein ACCUMULATION AND REPLICATION OF CHLOROPLASTS 6, chloroplastic (ARC6) from Arabidopsis thaliana and similar sequences mainly from plants and cyanobacteria. This domain is usually found next . Armadillo/beta-catenin-like (ARM) repeat is a specific subclass of α-helical solenoid domains. ARM repeats are composed of tandem three-helix bundles that form a superhelical structure, primarily facilitating protein-protein interactions. ARM repeats are predominantly found in plastid division regulators (PDR), where they play a crucial role in the coordination and regulation of plastid division in plants. This group of proteins function as key components of the plastid division machinery, which is responsible for the constriction and division of plastids, including chloroplasts and non-green plastids. It includes proteins such as FtsZ, ARC6, DRP5B, and MinE. ARC6 and PARC6 are essential for the chloroplast replication process, which implies the assembly and constriction of the tubulin-like FtsZ ring on the stromal surface of the inner envelope membrane (IEM) and the dynamin-like ARC5 ring on the cytosolic surface of the outer envelope membrane (OEM). They are also involved in stromule biogenesis and may contribute to plant gravitropism. ARC6 facilitates FtsZ ring assembly and promotes the recruitment of MCD1, which is essential for forming the chloroplast Z-ring. CDP1, on the other hand, is required for the localisation of PDV1 and the correct formation of the FtsZ ring in non-green plastids.
