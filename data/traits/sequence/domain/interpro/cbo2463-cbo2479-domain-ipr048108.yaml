identifier: InterPro:IPR048108
label: "CBO2463/CBO2479 domain"
definition: >-
  This domain occurs in proteins encoded typically between known subunits of the selenocysteine-containing D-proline reductase complex, a key contributor to Stickland metabolism. In Stickland metabolism, amino acids proline or glycine, or other compounds such as betaine or sarcosine, can be reduced, enabling energy-generating oxidation of various substrates such as other amino acids. Some members of this protein family have two copies of this domain.
