identifier: InterPro:IPR041480
label: "Cysteine-rich interdomain region 1 gamma"
definition: >-
  Rosetting is the capacity of infected RBCs to bind uninfected RBCs, which is consistently associated with severe malaria in African children. The rosette-forming PfEMP1 adhesins, namely IT4/R29, Palo Alto 89F5 VarO, 3D7/PF13_0003 and IT4/var60, belong to a specific sub-group called groupA/UpsA var genes and all four present a specific Duffy Binding-Like and and Cysteine-Rich Interdomain Region (DBL1alpha1-CIDR1gamma) double domain Head region found at the extracellular region of PfEMP1. This entry represents the CIDR1gamma domain which increases the binding affinity to VarO (Palo Alto VarO parasites).
