identifier: InterPro:IPR063597
label: "Cilia and flagella-associated protein 70, middle TPR-like domain"
definition: >-
  This entry represents the middle TPR-like domain of human cilia and flagella-associated protein 70 (CFAP70). CFAP70 is an axoneme-binding protein that plays a role in the regulation of ciliary motility and cilium length. The protein localises to the cilium axoneme and flagellum, with particular concentration at the base of the outer dynein arm. The specific function of this domain remains to be determined. Glycosomal targeting signal receptor from Leishmania major (PEX5), a receptor that mediates glycosomal import of proteins containing a C-terminal PTS1-type tripeptide glycosomal targeting signal (SKL-type), is also included in this entry.
