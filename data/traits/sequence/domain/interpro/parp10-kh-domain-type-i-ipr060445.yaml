identifier: InterPro:IPR060445
label: "PARP10, KH-domain type I"
definition: >-
  This eukaryotic type KH domain is found in human Protein mono -ADP-ribosyltransferase PARP10 and similar proteins from vertebrates. PARP10 mediates mono-ADP-ribosylation of glutamate and aspartate residues on target proteins and is involved in translation DNA synthesis in response to DNA damage.
