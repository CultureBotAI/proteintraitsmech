identifier: InterPro:IPR014705
label: "Synaptotagmin-17, C2B domain"
definition: >-
  Synaptotagmin-17 (SYT17) belongs to the synaptotagmin family, which is a group of membrane-trafficking proteins that contain two C-terminal C2 domains. Although synaptotagmins have been found to have a unique N-terminal domain that is involved in membrane anchoring (e.g., synaptotagmin) or specific ligand binding (e.g., rabphilin-3A and Doc2, ), SYT17 does not contain this domain. This protein is highly expressed in brain and kidney (B/K). Despite the lack of a transmembrane domain, it is tightly bound to the membrane fraction after treatment with high concentration of salt or high pH. Deletion and mutation analyses indicate that the cysteine cluster at the N terminus is essential for membrane localisation of SYT17. When wild-type SYT17 is expressed in PC12 cells, SYT17 proteins are localised mainly to the perinuclear region (trans-Golgi network), whereas mutant SYT17 carrying Cys-to-Ala substitutions are cytosolic. This entry represents the second and C-terminal C2 domain (C2B), responsible for the binding to phosphatidyl-inositol-3,4,5-triphosphate (PIP3) in the absence of calcium ions and to phosphatidylinositol bisphosphate (PIP2) in their presence. It also regulates also the recycling step of synaptic vesicles. This domain folds into an eight-standed β-sandwich with a Type I arrangement that shows a circular permutation involving their N- and C-terminal β-strands.
