identifier: InterPro:IPR018538
label: "Helicase HerA, barrel domain"
definition: >-
  The HAS barrel is named after HerA, which is a DNA helicase able to utilise either 3' or 5' single-stranded DNA extensions for loading and subsequent DNA duplex unwinding. It forms a complex with NurA nuclease, this complex has the 5'-3' DNA end resection activity and is essential for cell viability in the crenarchaeon Sulfolobus islandicus. This domain is found in the N-terminal region of HerA and is implicated in the assembly of the catalytic toroid and docking of accessory subunits.
