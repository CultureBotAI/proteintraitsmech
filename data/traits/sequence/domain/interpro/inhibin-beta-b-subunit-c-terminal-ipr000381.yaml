identifier: InterPro:IPR000381
label: "Inhibin, beta B subunit, C-terminal"
definition: >-
  Inhibins and activins are glycoproteins, secreted by the gonads, that belong to the transforming growth factor beta family. They participate in differentiation and growth of diverse cell types. Inhibin inhibits secretion of follicle-stimulating hormone by the pituitary. Inhibin has two isoforms, A and B, with the same alpha subunit but different beta subunits. Inhibin A is a dimer of alpha and beta A subunits, inhibin B is a dimer of alpha and beta B subunits. Activin A is a dimer of beta A subunits, activin AB is a dimer of beta A and beta B chains. This entry represents the C-terminal domain of INHBB.
