identifier: InterPro:IPR058071
label: "WalR, receiver domain"
definition: >-
  This entry represents the phosphoacceptor receiver (REC) domain of Transcriptional regulatory protein WalR from Bacillus subtilis (also known as YycF) and similar proteins predominantly found in firmicutes. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. WalR is a member of the two-component regulatory system WalK/WalR involved in the regulation of the ftsAZ operon, the yocH, ykvT, cwlO, lytE, ydjM, yjeA, yoeB genes and the tagAB and tagDEF operons. It is essential for cell wall metabolism. In Streptococcus pneumoniae, this protein inhibits transcription of fabT, probably acting in an unphosphorylated form, thereby playing a role in the regulation of fatty acid biosynthesis. WalR belongs to the OmpR family of response regulators, which are characterised by a REC domain and a winged helix-turn-helix effector domain involved in DNA binding.
