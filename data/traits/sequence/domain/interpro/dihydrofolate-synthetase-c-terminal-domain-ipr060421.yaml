identifier: InterPro:IPR060421
label: "Dihydrofolate synthetase, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of yeast Dihydrofolate synthetase (FOL3), a glutamate-adding enzyme which catalyses the binding of the first glutamyl side chain to dihydropteroate. Leads to the de novo synthesis of tetrahydrofolate. This domain shows high similarity to . Members are mainly found in fungi, plants and bacteria.
