identifier: InterPro:IPR000863
label: Sulfotransferase domain
definition: >-
  This entry includes a range of sulfotransferase proteins including flavonol 3-sulfotransferase, aryl sulfotransferases, alcohol sulfotransferases, estrogen sulfotransferases and phenol-sulphate phenol sulfotransferase. These enzymes are responsible for the transfer of sulphate groups to specific compounds and function via an SN2-like mechanism through a trigonal bipyramidal transition state and have important roles in detoxification, hormone regulation, and cell signaling across all kingdoms of life. The domain adopts a characteristic fold consisting of a central β-sheet flanked by α-helices, with conserved PAPS-binding loop (PSB) and 3' phosphate binding (PB) regions. The domain contains a highly conserved catalytic lysine in the PSB region and a conserved serine in the PB helix.
