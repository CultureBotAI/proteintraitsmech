identifier: InterPro:IPR028671
label: "Syntaxin-2, SNARE motif"
definition: >-
  Syntaxin-2 (STX2), also known as epimorphin, belongs to the syntaxin family, which is a group of the membrane integrated proteins participating in exocytosis. Syntaxins are associated with various intracellular membrane compartments and have been implicated in various physiological processes such as axonal growth and cell division. STX2 is essential for epithelial morphogenesis. It may mediate Ca2+-regulation of exocytosis acrosomal reaction in sperm. This entry represents the SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptor) motif of STX2, which consist of coiled-coil helices.
