identifier: InterPro:IPR002018
label: "Carboxylesterase, type B"
definition: >-
  Higher eukaryotes have many distinct esterases. Among the different types are those which act on carboxylic esters ( ). Carboxyl-esterases have been classified into three categories (A, B and C) on the basis of differential patterns of inhibition by organophosphates. The sequence of a number of type-B carboxylesterases indicates that the majority are evolutionary related. As is the case for lipases and serine proteases, the catalytic apparatus of esterases involves three residues (catalytic triad): a serine, a glutamate or aspartate and a histidine.
