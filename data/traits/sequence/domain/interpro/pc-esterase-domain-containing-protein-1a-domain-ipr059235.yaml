identifier: InterPro:IPR059235
label: "PC-esterase domain-containing protein 1A domain"
definition: >-
  This entry represents a domain found in a group of uncharacterised proteins from mammals, including human PC-esterase domain-containing protein 1A (Pced1). Members of this group belong to the SGNH_hydrolase subfamily. SGNH hydrolases are a diverse family of lipases and esterases. The tertiary fold of the enzyme is substantially different from that of the α/β hydrolase family and unique among all known hydrolases; its active site closely resembles the Ser-His-Asp(Glu) triad found in other serine hydrolases.
