identifier: InterPro:IPR020956
label: "Transcription factor Aft1, osmotic stress domain"
definition: >-
  This region is found in the transcription factor Aft1 which is required for a wide range of stress responses. The OSM domain has been shown to be involved in the osmotic stress response. This entry also includes Aft1 homologues from related fungal species. Atf1 is a bZIP family transcription factor found in the postharvest pathogen Penicillium expansum (blue mould rot fungus). It positively regulates vegetative growth, reproduction, and osmotic stress response. Interestingly, disruption of Atf1 enhances tolerance to oxidative, cell wall, and membrane stresses, suggesting a complex regulatory role in stress responses. The protein contains a characteristic bZIP domain comprising a basic DNA-binding motif and a leucine-zipper region required for dimerisation.
