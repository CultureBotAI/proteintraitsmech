identifier: InterPro:IPR056433
label: "DmsR-like, N-terminal"
definition: >-
  This domain is found at the N-terminal of Dimethyl sulfoxide reductase transcriptional activator from Haloferax volcanii (DmsR), Transcriptional regulator NarO from Haloferax volcanii, and similar proteins from halobacteria. DmsR is required for anaerobic respiration on dimethyl sulfoxide (DMSO). NarO activates transcription of the denitrifying genes under anaerobic conditions. This domain is predicted to adopt an α-β structure. It is often found associated with .
