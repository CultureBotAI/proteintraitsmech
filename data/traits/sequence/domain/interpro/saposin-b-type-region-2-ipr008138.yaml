identifier: InterPro:IPR008138
label: "Saposin B type, region 2"
definition: >-
  Saposins are small lysosomal proteins that serve as activators of various lysosomal lipid-degrading enzymes. They probably act by isolating the lipid substrate from the membrane surroundings, thus making it more accessible to the soluble degradative enzymes. All mammalian saposins are synthesized as a single precursor molecule (prosaposin) which contains four Saposin-B domains, yielding the active saposins after proteolytic cleavage, and two Saposin-A domains that are removed in the activation reaction. The Saposin-B domains also occur in other proteins, many of them active in the lysis of membranes.
