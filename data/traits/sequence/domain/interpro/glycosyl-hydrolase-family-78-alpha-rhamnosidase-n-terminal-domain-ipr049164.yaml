identifier: InterPro:IPR049164
label: "Glycosyl hydrolase family 78 alpha-rhamnosidase, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in a group of fungal and bacterial alpha-rhamnosidase sequences that belong to the Glycosyl hydrolase family 78. This domain is involved in dimerisation of the enzyme.
