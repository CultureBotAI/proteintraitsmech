identifier: InterPro:IPR024459
label: "Anti-CBASS protein Acb1-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of Anti-CBASS protein Acb1 from Sphingomonas paeninsulae and similar sequences from tailed bacteriophages and bacterial prophages. Abc1 counteracts or regulates the endogenous CBASS (cyclic oligonucleotide-based antiphage signalling system) antiviral defence system. It is a phosphodiesterase that enables metal-independent hydrolysis of the host cyclic di- and trinucleotide CBASS signals such as 3'3'-cGAMP, 3'3'cUA, and 3'3'3'-cAAA. This domain is also found covering the whole length of the protein in many uncharacterised sequences.
