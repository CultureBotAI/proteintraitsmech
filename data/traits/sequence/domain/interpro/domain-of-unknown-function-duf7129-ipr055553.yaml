identifier: InterPro:IPR055553
label: "Domain of unknown function DUF7129"
definition: >-
  This domain is found in a group of small proteins mainly from Halobacteria. It contains highly conserved cysteine residues arranged in two CxxC motifs that likely coordinate zinc. The first motif could be more broadly defined as YECxxCG. This domain is predicted to adopt zinc ribbon fold.
