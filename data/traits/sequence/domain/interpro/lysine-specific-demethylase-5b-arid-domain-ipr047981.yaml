identifier: InterPro:IPR047981
label: "Lysine-specific demethylase 5B, ARID domain"
definition: >-
  This entry represents the ARID DNA-binding domain of KDM5B. KDM5B (also termed Cancer/testis antigen 31 (CT31), Histone demethylase JARID1B, PLU-1, or retinoblastoma-binding protein 2 homolog 1 (RBP2-H1 or RBBP2H1A)) is a member of the JARID subfamily within the JmjC proteins. It has a restricted expression pattern in the testis, ovary, and transiently in the mammary gland of pregnant females and has been shown to be upregulated in breast cancer, prostate cancer, and lung cancer, suggesting a potential role in tumorigenesis. KDM5B acts as a histone demethylase that catalyses the removal of trimethylation of lysine 4 on histone H3 (H3K4me3), induced by polychlorinated biphenyls (PCBs). It also mediates demethylation of H3K4me2 and H3K4me1. Moreover, KDM5B functions as a negative regulator of hematopoietic stem cell (HSC) self-renewal and progenitor cell activity. KDM5B has also been shown to interact with the DNA binding transcription factors BF-1 and PAX9, as well as TIEG1/KLF10 (transforming growth factor-beta inducible early gene-1/Kruppel-like transcription factor 10), and possibly function as a transcriptional corepressor. KDM5B contains the catalytic JmjC domain, JmjN, an AT-rich interacting domain (ARID, also known as BRIGHT), and a Cys5HisCys2 zinc finger, as well as three plant homeodomain (PHD) fingers.
