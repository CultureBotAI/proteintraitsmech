identifier: InterPro:IPR044556
label: "Endonuclease II-like, GIY-YIG domain"
definition: >-
  This is the GIY-YIG domain present in Bacteriophage T4 endonuclease II (EndoII) and related proteins. EndoII is encoded by gene denA and catalyses the initial step in degradation of host DNA, which allows scavenging of host-derived nucleotides for phage DNA synthesis. It binds to two DNA substrates as an X-shaped tetrameric structure composed as a dimer of dimers. Divalent metal-ion cofactors are required for their catalytic events, but not for the substrates binding.
