identifier: InterPro:IPR033806
label: CDI toxin, Bp1026b-like
definition: >-
  Contact-dependent growth inhibition (CDI) toxins are expressed by Gram-negative bacteria as part of a mechanism to inhibit the growth of neighbouring bacteria. CDI is mediated by the CdiB/CdiA two-partner secretion system. CdiA secretion is dependent on the outer membrane protein CdiB. The growth inhibitory activity resides within the C-terminal region of CdiA. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered. This entry represents the C-terminal toxin domain of CdiA effector proteins. A wide variety of C-terminal toxin domains appear to exist; this particular example from Burkholderia pseudomallei 1026b and other bacteria appears to function as a Mg 2+ -dependent RNAse cleaving tRNA, most likely in the aminoacyl acceptor stem.
