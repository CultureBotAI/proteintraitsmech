identifier: InterPro:IPR056743
label: "TRM5/TYW2-like, methyltransferase domain"
definition: >-
  This is the methyltransferase domain of TRM5/TYW2 proteins, SAM-dependent methyltransferases that are involved in tRNA methylation. Members are found in all cellular organisms.
