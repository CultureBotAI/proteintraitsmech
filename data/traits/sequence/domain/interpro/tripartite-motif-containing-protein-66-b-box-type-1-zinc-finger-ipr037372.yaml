identifier: InterPro:IPR037372
label: "Tripartite motif-containing protein 66, B-box type 1 zinc finger"
definition: >-
  Tripartite motif-containing protein 66 (TRIM66, also known as transcriptional intermediary factor 1 delta, TIF1delta) binds to HP1 (heterochromatin protein 1) and is expressed by elongating spermatids. It displays a potent trichostatin A (TSA)-sensitive repression function; TSA is a specific inhibitor of histone deacetylases. Moreover, TRIM66 plays an important role in heterochromatin-mediated gene silencing during postmeiotic phases of spermatogenesis. It functions as a negative regulator of postmeiotic genes acting through HP1 isotype gamma (HP1gamma) complex formation and centromere association. TRIM66 belongs to an unclassified TRIM (tripartite motif) family of proteins that do not have RING fingers and thus lack the characteristic tripartite (RING (R), B-box, and coiled coil (CC)) RBCC motif.
