identifier: InterPro:IPR006821
label: Intermediate filament head, DNA-binding domain
definition: >-
  This entry represents the N-terminal head domain of intermediate filaments. Intermediate filament heads bind DNA. Vimentin heads are able to alter nuclear architecture and chromatin distribution, and the liberation of heads by HIV-1 protease liberates may play an important role in HIV-1 associated cytopathogenesis and carcinogenesis. Phosphorylation of the head region can affect filament stability. The head has been shown to interaction with the rod domain of the same protein.
