identifier: InterPro:IPR009694
label: "Domain of unknown function DUF1281"
definition: >-
  This entry describes a domain of unkown function found generally at the N-terminal of YubA and YubB in enterobacteriaceae. This domain is mostly found in Escherichia coli, Salmonella typhimurium and Shigella species. This domain is usually found in association with . YubA and YubB have not been fully functionally characterised. YubB was identified as undecaprenyl diphosphate phosphatase (UPPP) due to its association with cell wall synthesis and bacitracin resistance when disrupted. YubA was inferred to be a transporter, possibly related to cell wall synthesis, based on its predicted membrane protein structure and its genomic association with the UPPP gene. These experiments were done using transposon mutagenesis.
