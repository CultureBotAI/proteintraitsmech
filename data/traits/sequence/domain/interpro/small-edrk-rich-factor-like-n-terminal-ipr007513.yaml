identifier: InterPro:IPR007513
label: "Small EDRK-rich factor-like, N-terminal"
definition: >-
  This entry represents the N-terminal domain of Small EDRK-rich factors (SERFs), including SERF1/2 from human. Proteins containing this domain are short proteins that are rich in aspartate, glutamate, lysine and arginine. SERF1/2 are positive regulators of amyloid protein aggregation and proteotoxicity; they induce conformational changes in amyloid proteins, driving them into compact formations preceding the formation of aggregates.
