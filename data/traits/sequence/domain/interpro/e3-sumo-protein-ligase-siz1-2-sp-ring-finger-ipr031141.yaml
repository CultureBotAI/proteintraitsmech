identifier: InterPro:IPR031141
label: "E3 SUMO-protein ligase SIZ1/2, SP-RING finger"
definition: >-
  SIZ1/2 are small ubiquitin-like modifier (SUMO) E3 ligase found in plants and fungi. In plants, SIZ1 regulates plant growth and responses to multiple environmental stimuli, such as phosphate starvation or low temperature. It is also required for salicylic acid and PAD4-mediated R gene signalling, which in turn confers innate immunity in Arabidopsis. It promotes FLC expression by repressing FLD activity through sumoylation and positively controls nitrogen assimilation by promoting sumoylation of nitrate reductases in Arabidopsis. In yeast, it acts as an E3 ligase mediating SUMO/Smt3 attachment to septins and PCNA and may be involved in chromosome maintenance. This entry represents the SP-RING finger of SIZ1, a specific variant of RING finger.
