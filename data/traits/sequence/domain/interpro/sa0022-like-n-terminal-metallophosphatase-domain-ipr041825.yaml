identifier: InterPro:IPR041825
label: "SA0022-like, N-terminal metallophosphatase domain"
definition: >-
  This entry represents the N-terminal metallophosphatase domain of a group of uncharacterised proteins from firmicutes. SA0022 is an uncharacterised Staphylococcus aureus UshA-like protein with two putative domains, an N-terminal metallophosphatase domain and a C-terminal nucleotidase domain. SA0022 also contains a putative C-terminal cell wall anchor domain. The N-terminal metallophosphatase domain belongs to a large superfamily of distantly related metallophosphatases (MPPs) that includes: Mre11/SbcD-like exonucleases, Dbr1-like RNA lariat debranching enzymes, YfcE-like phosphodiesterases, purple acid phosphatases (PAPs), YbbF-like UDP-2,3-diacylglucosamine hydrolases, and acid sphingomyelinases (ASMases).
