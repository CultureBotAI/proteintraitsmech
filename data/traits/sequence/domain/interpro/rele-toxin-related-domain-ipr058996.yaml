identifier: InterPro:IPR058996
label: "RelE toxin-related domain"
definition: >-
  This entry represents a domain fond at the N-terminal end in a family of uncharacterised proteins in halobacteria. The domain is approximately 100-130 amino acids in length. This domain shows structural similarity to the ribonuclease Colicin-E5 and RelE-like toxins.
