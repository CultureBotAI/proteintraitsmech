identifier: InterPro:IPR020783
label: Large ribosomal subunit protein uL11, C-terminal
definition: >-
  This entry represents the C-terminal domain of uL11. The domain consists of a three-helical bundle and a short parallel two-stranded β-ribbon, with an overall α3-β4-α4-α5-β5 topology. All five secondary structure elements contribute to a conserved hydrophobic core. The domain is characterised by two extended loops that are disordered in the absence of the RNA but have defined structures in the complex. Ribosomal protein uL11 (also known as L12 in mammals and yeast) is one of the proteins from the large ribosomal subunit. In Escherichia coli, uL11 is known to bind directly to the 23S rRNA and plays a significant role during initiation, elongation, and termination of protein synthesis. It belongs to a family of ribosomal proteins which, on the basis of sequence similarities, groups bacteria, plant chloroplast, red algal chloroplast, cyanelle and archaeabacterial uL11; and mammalian, plant and yeast L12 (YL15). uL11 is a protein of 140 to 165 amino-acid residues and consists of a 23S rRNA binding C-terminal domain and an N-terminal domain that directly contacts protein synthesis factors. These two domains are joined by a flexible linker that allows inter-domain movement during protein synthesis. While the C-terminal domain of uL11 binds RNA tightly, the N-terminal domain makes only limited contacts with RNA and is proposed to function as a switch that reversibly associates with an adjacent region of RNA. In E. coli, the C-terminal half of uL11 has been shown to be in an extended and loosely folded conformation and is likely to be buried within the ribosomal structure. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino…
