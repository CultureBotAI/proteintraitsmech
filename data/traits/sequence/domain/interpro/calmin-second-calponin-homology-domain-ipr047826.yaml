identifier: InterPro:IPR047826
label: "Calmin, second calponin homology domain"
definition: >-
  Calmin, also called calponin-like transmembrane domain protein, is a protein with calponin homology (CH) and transmembrane domains expressed in maturing spermatogenic cells. It may be involved in the development and/or maintenance of neuronal functions. Calmin contains two copies of the CH domain. This entry represents the second CH domain. CH domains are actin filament (F-actin) binding motifs.
