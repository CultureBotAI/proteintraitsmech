identifier: InterPro:IPR044131
label: Dual specificity tyrosine-phosphorylation-regulated kinase 1A/1B, catalytic domain
definition: >-
  Dual specificity tyrosine-phosphorylation-regulated kinase 1A (DYRK1A) ( ) phosphorylates serine, threonine and tyrosine residues in proteins such as CRY2, FOXO1 and SIRT1. It can be activated by tyrosine autophosphorylation. DYRK1A play a role in a signaling pathway regulating nuclear functions of cell proliferation. DYRK1A is a neurogenesis regulator and plays an important role in altered brain development in Down syndrome. This entry represents the catalytic domain found in DYRK1A and DYRK1B.
