identifier: InterPro:IPR049483
label: "Fas-associated factor 1/2-like, UAS domain"
definition: >-
  This entry represents the UAS domain from a group of eukaryotic proteins, including human Fas-associated factor 1 and 2 (FAF1/2). FAF1 is a ubiquitin-binding protein required for the progression of DNA replication forks by targeting DNA replication licensing factor CDT1 for degradation. FAF2 plays an important role in endoplasmic reticulum-associated degradation (ERAD) that mediates ubiquitin-dependent degradation of misfolded endoplasmic reticulum proteins. It is involved in stress granule disassembly. UAS domain in these proteins was shown as a motif interacting long-chain unsaturated fatty acids.
