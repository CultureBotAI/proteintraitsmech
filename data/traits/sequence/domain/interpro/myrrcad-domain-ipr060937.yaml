identifier: InterPro:IPR060937
label: "MyrrCad domain"
definition: >-
  This domain appears at or near the C terminus in expanded paralogous families of proteins in Mycoplasma and Candidatus Mycoplasma. Proteins with this domain typically show an N-terminal sequence region followed by a repeat region, highly variable in length and similar to the leucine-rich repeat. The central region of this domain resembles α-helical hydrophobic transmembrane segments. The domain ends with a cluster of basic residues, suggesting an orientation in which the C-terminal residues of the domain face the cytosol. The coinage "MyrrCad", rendered without full capitalisation because it is an acronym rather than an amino acid sequence motif, signifies "MYcoplasma Repeat-Rich protein C-terminal Anchor Domain"
