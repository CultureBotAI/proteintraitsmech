identifier: InterPro:IPR060277
label: "CNOT10, TPR domain"
definition: >-
  This entry represents a region of tetratricopeptide repeats (TPR) in CNOT10, a component of the CCR4-NOT complex. The protein contains multiple TPR repeats (this entry and ) that likely mediate protein-protein interactions within the complex. CNOT10 is part of the CCR4-NOT complex, a major cellular mRNA deadenylase linked to various cellular processes including bulk mRNA degradation, miRNA-mediated repression, translational repression during translational initiation and general transcription regulation. CNOT10 is essential for the integrity of the CCR4-NOT complex and for degradation of many mRNAs.
