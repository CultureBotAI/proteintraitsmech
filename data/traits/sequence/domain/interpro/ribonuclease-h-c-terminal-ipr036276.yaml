identifier: InterPro:IPR036276
label: "Ribonuclease H, C-terminal"
definition: >-
  The C-terminal region of Ribonuclease H which adopts a SAM domain-like fold, consisting of a bundle of four/five helices. These residues may have a role in providing a docking site for other proteins or enzymes in the replication fork.
