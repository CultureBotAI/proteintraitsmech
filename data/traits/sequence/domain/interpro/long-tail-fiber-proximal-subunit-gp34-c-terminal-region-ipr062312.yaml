identifier: InterPro:IPR062312
label: "Long-tail fiber proximal subunit gp34, C-terminal region"
definition: >-
  This entry represents the C-terminal region of the long-tail fibre proximal subunit gp34, found in T4-like bacteriophages (Tevenvirinae). The long-tail fibres of T4 are approximately 1600 Angstroms long with a kink in the middle that divides the fibre into proximal and distal halves. The gp34 protein forms the proximal half of the fibre and assembles as a trimer with a stoichiometry of gp34:gp37:gp36:gp35 of 3:3:3:1. This C-terminal region is located downstream of the Gp34_2nd domain and forms a β spiral.
