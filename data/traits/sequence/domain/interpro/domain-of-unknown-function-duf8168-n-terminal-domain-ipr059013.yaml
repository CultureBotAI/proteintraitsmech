label: "Domain of unknown function (DUF8168), N-terminal domain"
definition: >-
  This entry represents the N-terminal domain from a family of uncharacterised proteins found predominantly in Proteobacteria that contain two domains, the C-terminal is represented by . The proteins are distributed among various orders including Burkholderiales, Rhodobacterales, and Hyphomicrobiales. The proteins in this family are typically around 240 to 250 amino acids in length.
