identifier: InterPro:IPR060378
label: "PRAME-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain in PRAME and similar proteins including LCR14 and OOG3 mainly from animals. PRAME proteins are involved in various cellular processes, primarily through its role as a substrate-recognition component of Cul2-RING E3 ubiquitin-protein ligase complexes. These complexes mediate the ubiquitination and subsequent degradation of target proteins, including truncated selenoproteins. PRAME proteins also function as transcriptional repressors, particularly inhibiting retinoic acid signaling, which affects cell proliferation, differentiation, and apoptosis. Additionally, they are involved in regulating pluripotency in embryonic stem cells and play roles in immune signaling pathways by modulating NF-kappa-B signaling.
