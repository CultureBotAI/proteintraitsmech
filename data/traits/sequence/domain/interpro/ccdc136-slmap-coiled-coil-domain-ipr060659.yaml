identifier: InterPro:IPR060659
label: "CCDC136/SLMAP, coiled-coil domain"
definition: >-
  This entry represents CCDC136. CCDC136 is a coiled-coil domain-containing protein required for acrosome formation during spermatogenesis and fertilisation. The protein localises to the acrosome membrane and is expressed at high levels in testis in an age-dependent manner. CCDC136 proteins contain multiple coiled-coil regions and a single transmembrane domain near the C-terminal. These proteins are found across mammals including primates, rodents, and carnivores within the Eutheria. The function of this coiled-coil domain remains to be determined. This entry also represents a coiled-coil region found at the C-terminal of Sarcolemmal membrane-associated protein (SLMAP) from mammals.
