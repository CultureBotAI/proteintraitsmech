identifier: InterPro:IPR047398
label: "Forkhead box protein K2, forkhead associated domain"
definition: >-
  This entry represents the forkhead associated (FHA) domain of human FOXK2 and similar sequences predominantly found in vertebrates. The FHA domain is a small phosphopeptide recognition module. Forkhead box protein K2 (FOXK2) is a transcriptional regulator that recognises the core sequence 5'-TAAACA-3'. It binds to NFAT-like motifs (purine-rich) in the IL2 promoter. FOXK2 is required for cell proliferation and survival. It functions as a chromatin-targeting factor for BAP1 (BRCA1-associated protein 1) that recruits BAP1 via its FHA domain in a phosphorylation-dependent manner. BAP1 functions as a corepressor at FOXK2 target genes. FOXK2 is a key regulator of metabolic reprogramming towards aerobic glycolysis playing a role in gluconeogenesis during overnight fasting, when lactate from white adipose tissue and muscle is the main substrate. It also binds to the HIV-1 long terminal repeat. FOXK2 may be involved in both, positive and negative regulation of important viral and cellular promoter elements. In addition, FOXK2 plays a critical role in suppressing tumourigenesis.
