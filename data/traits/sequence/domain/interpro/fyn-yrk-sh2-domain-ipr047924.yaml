identifier: InterPro:IPR047924
label: "Fyn/Yrk, SH2 domain"
definition: >-
  This entry represents the SH2 domain of Fyn and Yrk, which is involved in signal transduction. SH2 domains typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localise to tyrosine phosphorylated sites. Fyn and Yrk (Yes-related kinase) are members of the Src subfamily of proteins, which are cytoplasmic (or non-receptor) PTKs. Fyn is involved in the control of cell growth and is required in diverse pathways, including T and B cell receptor signalling, integrin-mediated signalling, growth factor and cytokine receptor signalling, platelet activation, ion channel function, cell adhesion, axon guidance, fertilisation, entry into mitosis, and differentiation of natural killer cells, oligodendrocytes and keratinocytes. Fyn, together with Lck, plays a critical role in T-cell signal transduction by phosphorylating ITAM (immunoreceptor tyr activation motif) sequences on T-cell receptors, ultimately leading to the proliferation and differentiation of T-cells. In addition, Fyn is involved in the myelination of neurons, and is implicated in Alzheimer's and Parkinson's diseases. Yrk has been detected only in chickens. It is primarily found in neuronal and epithelial cells and in macrophages. It may play a role in inflammation and in response to injury.
