identifier: InterPro:IPR054743
label: "PA2794-like, C-terminal"
definition: >-
  This domain is found at the C-terminal of Exo-alpha-sialidase from Pseudomonas aeruginosa (PA2794, ), which adopts a trimeric structure, partly held together by an immunoglobulin-like trimerisation domain, represented in this entry, that is C-terminal to the sialidase domain.
