identifier: InterPro:IPR058030
label: "TRIM8/14/16/25/29/45/65, coiled-coil region"
definition: >-
  This entry represents a long helical region connecting domains in TRIM proteins such as TRIM16, TRIM29, TRIM25, TRIM 65, TRIM47, TRIM8 and TRIM14. Many members of this entry act as E3 ubiquitin-protein ligases. The TRIM Coiled-Coil (TRIM_CC) domain is a long helical region found in Tripartite Motif (TRIM) proteins, which are part of the RING finger E3 ubiquitin ligase family. This domain plays a crucial role in protein-protein interactions, particularly in the dimerisation and self-association of TRIM proteins.
