identifier: InterPro:IPR026966
label: "Neurofascin/L1/NrCAM, C-terminal domain"
definition: >-
  This is the very C-terminal region of nervous system cell adhesion molecules neuroglian, neurofascin, neural adhesion molecule L1, NrCAM and NgCAM. It lies upstream of the IG and Fn3 domains and has the highly conserved motif FIGEY. The function is not known.
