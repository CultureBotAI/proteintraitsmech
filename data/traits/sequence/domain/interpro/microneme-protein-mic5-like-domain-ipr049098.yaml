identifier: InterPro:IPR049098
label: "Microneme protein MIC5-like domain"
definition: >-
  Microneme protein MIC5 is found in Apicomplexa and expressed as a preproprotein which is proteolytically processed to a proprotein by the signal peptidase before being further processed in a post-Golgi compartment to the mature protein. The structure of MIC5 was determined in Toxoplasma gondii and it revealed that it is a subtilisin propeptide mimic and a potent inhibitor of TgSUB1. This protein adopts a subtilisin-like prodomain structure, which consists of an open-sandwich antiparallel-α/antiparallel-β fold.
