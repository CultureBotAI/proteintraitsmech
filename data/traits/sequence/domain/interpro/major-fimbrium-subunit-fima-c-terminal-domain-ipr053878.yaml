identifier: InterPro:IPR053878
label: "Major fimbrium subunit FimA, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Major fimbrium subunit FimA from Porphyromonas gingivalis and similar sequences from Bacteroidales. It folds into a Ig-like β-sandwich having the characteristic features of the FimA superfamily. FimA is the structural subunit of the fimbriae, which are filamentous appendages on the cell surface. Fimbriae of P.gingivalis are recognised as a major virulence factor as they mediate cell adhesion and play an important role in invasion of periodontal tissues.
