identifier: InterPro:IPR010308
label: "TRP, C-terminal"
definition: >-
  This entry represents the C-terminal domain of transient receptor potential channel-like proteins. The family includes several fungal flavin carrier proteins, which may be responsible for the transport of FAD into the endoplasmatic reticulum lumen, where it is required for oxidative protein folding. The family also includes the TRP-like ion channel pkd2, which acts as a key signaling component in the regulation of cell shape and cell wall synthesis through interaction with GTPase Rho1.
