identifier: InterPro:IPR025721
label: "Exosome complex component, N-terminal domain"
definition: >-
  This entry represents a domain found in the N-terminal region of some exosome complex components, including ribosomal RNA-processing protein 4 (RRP4) and CSL4. It is a G-rich domain which structurally is a rudimentary single hybrid fold with a permuted topology.
