identifier: InterPro:IPR059002
label: "IBH1-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of Transcription factor IBH1 from Oryza sativa and similar plant proteins. IBH1 is an atypical and probable non DNA-binding bHLH transcription factor that acts as a negative regulator of cell elongation and plant development. This domain is predicted to fold into two α-helices.
