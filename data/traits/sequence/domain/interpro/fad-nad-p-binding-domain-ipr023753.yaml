identifier: InterPro:IPR023753
label: FAD/NAD(P)-binding domain
definition: >-
  This entry describes the FAD binding domain which has a nested NADH binding domain and is found in both class I and class II oxidoreductases. this domain seems to include contains the pair of redox-active cysteines involved in the transfer of reducing equivalents from the FAD cofactor to the substrate. FAD flavoproteins belonging to the family of pyridine nucleotide-disulphide oxidoreductases (glutathione reductase, trypanothione reductase, lipoamide dehydrogenase, mercuric reductase, thioredoxin reductase, and alkyl hydroperoxide reductase) share sequence similarity with a number of other flavoprotein oxidoreductases, in particular with ferredoxin-NAD+ reductases involved in the oxidative metabolism of a variety of hydrocarbons (rubredoxin reductase, putidaredoxin reductase, terpredoxin reductase, ferredoxin-NAD+ reductase components of benzene 1,2-dioxygenase, toluene 1,2-dioxygenase, chlorobenzene dioxygenase, and biphenyl dioxygenase), NADH oxidase and NADH peroxidase. Comparison of the crystal structures of human glutathione reductase and Escherichia coli thioredoxin reductase reveals different locations of their active sites, suggesting that the enzymes diverged from an ancestral FAD/NAD(P)H reductase and acquired their disulphide reductase activities independently. Despite functional similarities, oxidoreductases of this family show no sequence similarity with adrenodoxin reductases and flavoprotein pyridine nucleotide cytochrome reductases (FPNCR). Assuming that disulphide reductase activity emerged later, during divergent evolution, the family can be referred to as FAD-dependent pyridine nucleotide reductases, FADPNR. To date, 3D structures of glutathione reductase, thioredoxin reductase, mercuric reductase, lipoamide dehydrogenase, trypanothione reductase and…
