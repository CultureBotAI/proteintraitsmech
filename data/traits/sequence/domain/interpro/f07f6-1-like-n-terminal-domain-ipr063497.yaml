identifier: InterPro:IPR063497
label: "F07F6.1-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of F07F6.1 and similar uncharacterised proteins from nematodes. The domain shows structural similarity to RNA-binding domains and the full-length proteins are predicted to have nucleic acid binding properties.
