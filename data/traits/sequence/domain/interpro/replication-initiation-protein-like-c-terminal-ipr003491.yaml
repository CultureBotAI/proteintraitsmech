identifier: InterPro:IPR003491
label: "Replication initiation protein-like, C-terminal"
definition: >-
  Plasmid replication is initiated by the replication initiation factor (REP). This entry represents the C-terminal domain of Replication initiation protein from Staphylococcus aureus and similar proteins mainly found in firmicutes and proteobacteria. Many members are probable specific topoisomerase that make a sequence-specific single-stranded nick in the plasmid DNA at the origin of replication. Putative DNA relaxase NicK from Bacillus subtilis, which is involved in the transfer of the integrative and conjugative element ICEBs1 and probably mediates conjugation of ICEBs1 by nicking at oriT on the conjugative element and facilitates the translocation of a single strand of ICEBs1 DNA through a transmembrane conjugation pore into the recipient cell.
