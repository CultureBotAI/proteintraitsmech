identifier: InterPro:IPR060096
label: "PF3D7_0210200, 7th domain"
definition: >-
  This entry represents the 7th domain found in PF3D7_0210200 proteins from Plasmodium falciparum. This domain is characterised by a helical structure with a short β-sheet adjacent to the C-terminal region. The full-length protein is a large uncharacterised polypeptide that contains coiled coil regions and has been identified as a possible malaria vaccine candidate. Database annotations suggest the protein may be involved in DNA binding and homologous recombination processes. The function of this 7th domain remains to be determined.
