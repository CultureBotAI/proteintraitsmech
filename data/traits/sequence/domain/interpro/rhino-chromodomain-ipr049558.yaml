identifier: InterPro:IPR049558
label: "Rhino, chromodomain"
definition: >-
  This is the chromo domain found at the N-terminal of Drosophila melanogaster Rhino (also known as heterochromatin protein 1-like, ), and similar proteins from Drosophila sp. Rhino is a female-specific protein that affects chromosome structure and egg polarity that is required for germline PIWI-interacting RNA (piRNA) production. In Drosophila the RDC (rhino, deadlock, and cutoff) complex, composed of rhino, the protein deadlock (Del) and the Rai1-like transcription termination cofactor cutoff (Cuff) binds to chromatin of dual-strand piRNA clusters, special genomic regions, which encode piRNA precursors. The RDC complex is anchored to H3K9me3-marked chromatin in part via the H3K9me3-binding activity of Rhino, and is required for transcription of piRNA precursors. Chromodomain is a conserved region of about 50 amino acids, found in a variety of chromosomal proteins, and which appears to play a role in the functional organisation of the eukaryotic nucleus. This domain is implicated in the binding, of the proteins in which it is found, to methylated histone tails and maybe RNA. The chromodomain may occur as a single instance, in a tandem arrangement, or followed by a related chromo shadow domain.
