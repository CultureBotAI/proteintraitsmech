identifier: InterPro:IPR055105
label: "FKRP, stem domain"
definition: >-
  This entry represents the N-terminal domain of the fukutin-related protein (also known as ribitol 5-phosphate transferase FKRP). Alpha-Dystroglycan (alpha-DG) is a highly-glycosylated surface membrane protein. Defects in the O-mannosyl glycan of alpha-DG cause dystroglycanopathy, a group of congenital muscular dystrophies. The core M3 O-mannosyl glycan contains tandem ribitol-phosphate (RboP), a characteristic feature first found in mammals. Fukutin and fukutin-related protein (FKRP), whose mutated genes underlie dystroglycanopathy, sequentially transfer RboP from cytidine diphosphate-ribitol (CDP-Rbo) to form a tandem RboP unit in the core M3 glycan. FKRP is composed of two domains, the N-terminal stem domain and the C-terminal catalytic domain. The overall structure of the stem domain is similar to that of the catalytic domain of polypeptide GalNAc transferase 10 (ppGalNAcT-10). However, the HxD motif of ppGalNAcT-10, which is critical to its catalytic reaction, was not conserved. Therefore, the stem domain of FKRP would not have glycosyltransferase activity despite its overall structural similarity to ppGalNAcT-10.
