identifier: InterPro:IPR056880
label: "MEIOB-like, N-terminal"
definition: >-
  This domain is found at the N-terminal end of human Meiosis-specific with OB domain-containing protein (MEIOB). This domain is predicted to adopt an OB fold. This domain is also found in Protein hold'em which is the MEIOB homologue in Drosophila. Mutations in this protein result in reduced meiotic crossover formation and sensitivity to the DNA-damaging agent methyl methanesulfonate. MEIOB is a single-stranded DNA-binding protein required for homologous recombination in meiosis I. It is required for double strand breaks repair and crossover formation and promotion of faithful and complete synapsis. MEIOB binds to single-stranded DNA and exhibits 3'-5' exonuclease activity. MEIOB forms a complex with RPA and with SPATA22, and these three proteins co-localize in foci that are associated with meiotic chromosomes.
