identifier: InterPro:IPR058184
label: "AgmC-like, N-terminal domain"
definition: >-
  This entry includes surface proteins from Myxococcales with a wide variety of architectures but a shared N-terminal domain of 400 amino acids. The founding member, (AAO22852.1) from Myxococcus xanthus, was named AgmC because its loss of function affects adventurous gliding motility. Some proteins included in this entry have a MYXO-CTERM protein-sorting signal, for directing Cys side-chain lipid modification, cleavage distal to the Cys, transit of the outer membrane, and C-terminal lipid anchoring on the external face of the outer membrane.
