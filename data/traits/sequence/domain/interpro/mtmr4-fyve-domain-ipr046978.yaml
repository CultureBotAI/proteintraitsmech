identifier: InterPro:IPR046978
label: "MTMR4, FYVE domain"
definition: >-
  Myotubularin-related protein 4 (MTMR4) is a member of the myotubularin (MTM) family. It is the only family member that possesses a FYVE domain (a zinc finger domain) at its C terminus. MTMR4 has dual-specificity phosphatase activity that specifically dephosphorylates the D-3 position of phosphatidylinositol 3-phosphate and phosphatidylinositol 3,5-bisphosphate, generating phosphatidylinositol and phosphatidylinositol 5-phosphate. MTMR4 has a unique distribution to endosomes and has been shown to function in early and recycling endosomes; through phosphatidylinositol 3-phosphate turnover in phagosome membranes regulates phagocytosis and phagosome maturation. MTMR4 attenuates TGF-beta signalling by dephosphorylating intracellular signalling mediator R-Smads. Similarly, it acts as a negative modulator for the homeostasis of bone morphogenetic proteins (BMPs) signalling. This entry represents the C-terminal FYVE domain of MTMR4. The myotubularin family constitutes a large group of conserved proteins, with 14 members in humans consisting of myotubularin (MTM1) and 13 myotubularin-related proteins (MTMR1-MTMR13). Orthologues have been found throughout the eukaryotic kingdom, but not in bacteria. MTM1 dephosphorylates phosphatidylinositol 3-monophosphate (PI3P) to phosphatidylinositol and phosphatidylinositol 3,5-bisphosphate [PI(3,5)P2] to phosphatidylinositol 5-monophosphate (PI5P) [ , ,. The substrate phosphoinositides (PIs) are known to regulate traffic within the endosomal-lysosomal pathway. MTMR1, MTMR2, MTMR3, MTMR4, and MTMR6 have also been shown to utilise PI(3)P as a substrate, suggesting that this activity is intrinsic to all active family members. On the other hand, six of the MTM family members encode for catalytically inactive phosphatases. Inactive myotubularin…
