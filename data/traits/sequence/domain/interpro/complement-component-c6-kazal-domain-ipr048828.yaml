identifier: InterPro:IPR048828
label: "Complement component C6, KAZAL domain"
definition: >-
  Factor I-like modules (FIMs) are present in complement proteins C6, C7, and factor I, and participate in protein-protein interactions that critical to the progress of a complement-mediated immune response. Complement component C6 contains a FIM pair at the C-terminal, FIM1 and FIM2, each of them consists of a small N-terminal FOLN subdomain and a larger C-terminal KAZAL domain. This entry represents the KAZAL domain of FIM1.
