identifier: InterPro:IPR059115
label: "Rib domain"
definition: >-
  The region featured in this entry is found repeated in a number of bacterial surface proteins, such as Rib ( ) and C protein alpha-antigen ( ). Rib domain-containing surface proteins are found associated with invasive strains and elicit protective immunity in animal models. Structures of single Rib domains of differing length reveal a rare case of domain atrophy through deletion of 2 core antiparallel strands, resulting in the loss of an entire sheet of the β-sandwich from an immunoglobulin-like fold.
