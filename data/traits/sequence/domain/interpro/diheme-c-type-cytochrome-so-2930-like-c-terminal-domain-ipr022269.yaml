identifier: InterPro:IPR022269
label: "Diheme c-type cytochrome SO_2930-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal region of a group of uncharacterised diheme c-type cytochrome proteins found in the same species as the protein members of, usually as the adjacent gene or in a fusion protein. SO_2930 from Shewanella putrefaciens and HNE_0200 from Hyphomonas neptunium are included in this entry. Sometimes two members of this family are with a single member of. The specific function of these proteins is unknown.
