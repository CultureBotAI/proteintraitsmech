identifier: InterPro:IPR031639
label: "Annelid erythrocruorin linker subunit, C-terminal"
definition: >-
  This domain is found in linker subunits of the giant extracellular hemoglobin (erythrocruorin) respiratory complex in annelid worms. In Lumbricus terrestris, the erythrocruorin complex consists of 144 hemoglobin subunits and 36 non-hemoglobin ('linker') subunits that are crucial for the formation of the complete complex. This C-terminal globular domain in linker subunits is involved in trimerization, and also interacts with globins and other C-terminal globular linker domains of neighbouring trimers.
