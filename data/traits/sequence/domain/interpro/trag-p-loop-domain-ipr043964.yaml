identifier: InterPro:IPR043964
label: "TraG, P-loop domain"
definition: >-
  This entry represents the P-loop domain found in the TraG conjugation protein (also known as Type IV (T4S) secretion system-coupling protein VirD4) and related proteins such as VirB4. T4S system is composed of VirB1-11 and VirD4 proteins, thus, known as VirB/D T4S system and is responsible of protein delivery into host cells, DNA transfer and toxin release, important for survival and pathogenesis. VirB4, VirB11, and VirD4 are cytoplasmic ATPases that provide energy for substrate transfer. VirD4 is also termed coupling protein as it recruits T4S system substrates to the VirB1-11 secretion channel. VirB4 is the most conserved member of the T4S and essential for the system functions. This domain is also found CAG pathogenicity island protein 23 (CagE) from Helicobacter pylori, another example of Type IV secretion system which translocates effector proteins into gastric epithelial cells.
