identifier: InterPro:IPR018785
label: "Cysteine-rich DPF motif domain"
definition: >-
  This entry represents the cysteine-rich DPF motif domain (CDPF1) in CDPF1-containing proteins found in a range of organisms, including human, chicken and Drosophila. It contains between six and eight highly conserved cysteine residues and a characteristic DPF sequence motif. The function of this protein has not been clarified yet.
