identifier: InterPro:IPR002491
label: "ABC transporter periplasmic binding domain"
definition: >-
  ATP binding cassette (ABC) transporters are a ubiquitous family of importer and exporter proteins that consist of two α-helical transmembrane (TM) domains, which form a translocation pathway, and two cytoplasmic ABC domains, which power the transport reaction through binding and hydrolysis of ATP. In addition most bacterial importers employs a periplasmic substrate-binding protein (PBP) that delivers the ligand to the extracellular gate of the TM domains. These proteins bind their substrates selectively and with high affinity, which is thought to ensure the specificity of the transport reaction. Binding proteins in Gram-negative bacteria are present within the periplasm, whereas those in Gram-positive bacteria are tethered to the cell membrane via the acylation of a cysteine residue that is an integral component of a lipoprotein signal sequence. The cobalamin (vitamin B12) and the iron transport systems share many common attributes and probably evolved from the same origin. The structure of the periplasmic-binding domain is composed of two subdomains, each consisting of a central β-sheet and surrounding α-helices, linked by a rigid α-helix. The substrate binding site is located in a cleft between the two α/β subdomains. Some protein known to contain an iron siderophore/cobalamin periplasmic- binding domain are listed below: Escherichia coli vitamin B12 transport protein btuF. It is the periplasmic binding protein for the vitamin B12 transporter btuCD. Escherichia coli ferrichrome-binding periplasmic protein (fhuD). It binds iron(III)-hydroxamates. Staphylococcus aureus ferric hydroxamate receptor 2 (fhuD2). Escherichia coli ferrienterobactin-binding periplasmic protein fepB. It binds ferrienterobactin; part of the binding-protein-dependent transport system for uptake o…
