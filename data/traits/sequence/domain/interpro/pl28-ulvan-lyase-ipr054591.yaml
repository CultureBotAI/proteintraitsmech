identifier: InterPro:IPR054591
label: "PL28 ulvan lyase"
definition: >-
  This entry includes sequences from the PL28 family of ulvan lyases. These enzymes degrade ulvan next to either epimer of uronic acid. They adopt a β-sandwich structure with a jelly-roll topology containing a deep positively charged cleft that defines the substrate binding site. This domain is found as standalone or in combination with other domains.
