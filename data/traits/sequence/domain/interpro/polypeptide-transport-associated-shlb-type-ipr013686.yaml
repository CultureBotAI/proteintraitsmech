identifier: InterPro:IPR013686
label: "Polypeptide-transport-associated, ShlB-type"
definition: >-
  The POTRA domain (for polypeptide-transport-associated domain) is found towards the N terminus of ShlB family proteins. ShlB is important in the secretion and activation of the haemolysin ShlA. It has been postulated that the POTRA domain has a chaperone-like function over ShlA; it may fold back into the C-terminal β-barrel channel.
