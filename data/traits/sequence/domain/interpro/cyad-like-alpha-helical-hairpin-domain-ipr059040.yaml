identifier: InterPro:IPR059040
label: "CyaD-like, alpha-helical hairpin domain"
definition: >-
  This domain is found in the Protein CyaD from Bordetella pertussis and related proteins from proteobacteria, including Hemolysin secretion protein D from Escherichia coli (HlyD). CyaD is necessary for transport of calmodulin-sensitive adenylate cyclase-hemolysin (cyclolysin), a bifunctional protein with both adenylate cyclase and hemolytic activities. These functions contribute to the virulence of Bordetella pertussis by disrupting host cell signalling through elevated cyclic AMP levels. The cyaD gene is part of a cluster downstream of the cyaA gene, along with cyaB and cyaE. These genes encode proteins required for the export of adenylate cyclase-hemolysin. CyaD works alongside CyaB (an ATP-binding protein) and CyaE (an outer membrane factor) to form a functional export system for cyclolysin. HlyD is involved in the transport of hemolysin A.
