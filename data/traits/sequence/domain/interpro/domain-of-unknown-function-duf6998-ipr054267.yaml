definition: >-
  This domain is found in uncharacterised bacterial proteins either standalone or in combination with other domains. It shares significant sequence similarity with PvuII endonucleases ( ) and is predicted to adopt similar structure. The predicted structures, however, do not suggest similarity in the active site architecture.
