identifier: InterPro:IPR057013
label: "EGF-like domain-containing protein ComC, LRR domain"
definition: >-
  This entry represents the N-terminal region of EGF-like domain containing protein ComC from Dictyostelium discoideum and similar sequences from amoebas and some plant species. ComC regulates aggregation, inhibiting lagC and activating lagD expression. The function of this domain, which is predicted to consist of leucine-rich repeats (LRR), is unknown.
