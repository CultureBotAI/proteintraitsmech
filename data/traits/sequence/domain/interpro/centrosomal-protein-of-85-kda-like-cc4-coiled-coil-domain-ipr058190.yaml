identifier: InterPro:IPR058190
label: "Centrosomal protein of 85 kDa-like, CC4 coiled-coil domain"
definition: >-
  This domain is found in human Centrosomal protein of 85 kDa (CEP85) and similar animal proteins. CEP85 functions as a regulator of centriole duplication through a direct interaction with STIL, a key factor involved in the early steps of centriole formation. This entry represents the coiled-coil domain within the C-terminal region (cc4) that binds directly to the STIL N-terminal domain.
