identifier: InterPro:IPR062534
label: "Outer cell wall protein, domain 7"
definition: >-
  This entry represents the seventh domain of the outer cell wall protein from Bacillales and Clostridia. The outer cell wall protein binds to the middle cell wall protein. The specific function of this domain remains to be determined.
