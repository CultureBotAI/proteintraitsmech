identifier: InterPro:IPR056117
label: "Domain of unknown function DUF7700"
definition: >-
  This domain is usually found in tandem in uncharacterised bacterial proteins. It is predicted to adopt a globular structure consisting of a curved anti-parallel β-sheet and α-helices packed on one side of it. It contains highly conserved aspartate and histidine residues that may constitute a metal binding site.
