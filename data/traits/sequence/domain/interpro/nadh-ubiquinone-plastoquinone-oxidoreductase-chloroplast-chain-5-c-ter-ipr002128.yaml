identifier: InterPro:IPR002128
label: "NADH:ubiquinone/plastoquinone oxidoreductase, chloroplast chain 5, C-terminal"
definition: >-
  This domain represents a C-terminal extension of NADH-Ubiquinone/plastoquinone (complex I) chains (see ). Chain 5 is a component of complex I which catalyses the transfer of two electrons from NADH to ubiquinone in a reaction that is associated with proton translocation across the membrane.
