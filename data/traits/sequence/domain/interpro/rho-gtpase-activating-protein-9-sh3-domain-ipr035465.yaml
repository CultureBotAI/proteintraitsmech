identifier: InterPro:IPR035465
label: "Rho GTPase-activating protein 9, SH3 domain"
definition: >-
  Rho GTPase-activating proteins (RhoGAPs or ARHGAPs) bind to Rho proteins and enhance the hydrolysis rates of bound GTP. ARHGAP9 functions as a GAP for Rac and Cdc42, but not for RhoA. It negatively regulates cell migration and adhesion. It also acts as a docking protein for the MAP kinases Erk2 and p38alpha, and may facilitate cross-talk between the Rho GTPase and MAPK pathways to control actin remodeling. It contains SH3, WW, Pleckstin homology (PH), and RhoGAP domains.
