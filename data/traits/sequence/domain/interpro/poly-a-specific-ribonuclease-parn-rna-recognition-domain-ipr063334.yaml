identifier: InterPro:IPR063334
label: "Poly(A)-specific ribonuclease PARN, RNA-recognition domain"
definition: >-
  This RNA-recognition domain (RRM) is found at the C-terminal end of Poly(A)-specific ribonuclease PARN from Arabidopsis thaliana, a 3'-exoribonuclease that has a preference for poly(A) tails of mRNAs, thereby efficiently degrading poly(A) tails. It is essential for early development, possibly by participating in silencing certain maternal mRNAs translationally and may have a pivotal role in stress response. This domain is predicted to show an α-β configuration.
