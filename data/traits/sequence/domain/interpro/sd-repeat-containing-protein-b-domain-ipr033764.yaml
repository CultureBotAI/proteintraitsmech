identifier: InterPro:IPR033764
label: "SD-repeat containing protein, B domain"
definition: >-
  SD-repeat containing (Sdr) proteins are surface proteins that play an important role in Staphylococcus aureus adhesion and pathogenesis. They are characterised by the presence of a structural region, named R region, mainly composed of repeating Ser-Asp dipeptides. The Sdr family members share a conserved structural organisation. They all start with a short N-terminal signal sequence followed by an A region for ligand binding, the characteristic R region of variable length, an LPXTG cell wall-anchoring motif, a hydrophobic membrane region, and sometimes a cytoplasmic tail. In addition, SdrC, SdrE and SdrD have several additional B domains inserted between region A and R. The B domain often exists as a series of repeats which may act as a spacer. This entry represents the B domain found in some Sdr family members.
