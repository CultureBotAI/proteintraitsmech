identifier: InterPro:IPR058607
label: "Protein capicua homolog-like, high mobility group box"
definition: >-
  This entry represents the high mobility group (HMG)-box found in protein capicua homolog (Cic) and similar animal proteins. Cic is a transcriptional repressor which plays a role in development of the central nervous system. It is involved in brain development together with ATXN1 and ATXN1L.
