identifier: InterPro:IPR027357
label: "DOCKER domain"
definition: >-
  Rho guanosine triphosphatases (GTPases) are critical regulators of cell motility, polarity, adhesion, cytoskeletal organisation, proliferation, gene expression, and apoptosis. Conversion of these biomolecular switches to the activated GTP-bound state is controlled by two families of guanine nucleotide exchanges factors (GEFs). DH-PH proteins are a large group of Rho GEFs comprising a catalytic Dbl homology (DH) domain with an adjacent pleckstrin homology (PH) domain within the context of functionally diverse signalling modules. The evolutionarily distinct and smaller family of DOCK (dedicator of cytokinesis) or CDM (CED-5, DOCK1180, Myoblast city) proteins activate either Rac or Cdc42 to control cell migration, morphogenesis, and phagocytosis. DOCK proteins share the DOCK-type C2 domain (also termed the DOCK-homology region (DHR)-1 or CDM-zizimin homology 1 (CZH1) domain and the DOCKER domain (also termed the DHR-2 or CZH2 domain). The DOCK-type C2 domain is located toward the N terminus. The DOCKER domain is a GEF catalytic domain of ~400 residues situated within the C terminus. The structure of the DOCKER domain differs from that of other GEF catalytic domains. It is organised into three lobes of roughly equal size (lobes A, B, and C), with the Rho-family binding site and catalytic centre generated entirely from lobes B and C. Lobe A is formed from an antiparallel array of α helices. Through extensive contacts with lobe B, lobe A stabilises the DHR2 domain. Lobe B adopts an unusual architecture of two antiparallel β sheets disposed in a loosely packed orthogonal arrangement, whereas lobe C comprises a four-helix bundle. This entry represents the DOCKER domain.
