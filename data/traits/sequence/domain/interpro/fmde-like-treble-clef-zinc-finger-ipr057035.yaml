identifier: InterPro:IPR057035
label: "FmdE-like, treble clef zinc finger"
definition: >-
  This treble clef zinc finger is found C-terminal in some members of FmdE family that are implicated in microbial methanogenesis, including from Syntrophus aciditrophicus. This domain follows the α/β core domain ( ) and contains four invariant cysteine residues that coordinate the zinc atom.
