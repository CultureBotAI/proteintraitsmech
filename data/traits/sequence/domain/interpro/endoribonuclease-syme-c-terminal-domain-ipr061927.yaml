identifier: InterPro:IPR061927
label: "Endoribonuclease SymE, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Endoribonuclease SymE, found in enterobacterales. SymE is a toxin component of a toxin-antitoxin system that cleaves RNA, inhibiting protein synthesis under stress conditions.
