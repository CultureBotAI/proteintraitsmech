identifier: InterPro:IPR021991
label: "UHRF1, tandem tudor domain"
definition: >-
  TTD, tandem tudor domain within UHRF1 preferentially binds H3 histone tails trimethylated at Lys-9. It specifically recognises H3 tail peptides with the heterochromatin-associated modification state of trimethylated lysine 9 and unmodified lysine 4 (H3K4me0/K9me3).
