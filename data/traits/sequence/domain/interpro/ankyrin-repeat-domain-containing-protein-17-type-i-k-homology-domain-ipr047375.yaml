identifier: InterPro:IPR047375
label: "Ankyrin repeat domain-containing protein 17, type I K homology domain"
definition: >-
  This entry represents the type I K homology (KH) RNA-binding domain found at the C-terminal of ANKRD17 and similar proteins from animals. They contain ankyrin repeats at the N-terminal. ANKRD17, also called ankyrin repeat protein 17, or gene trap ankyrin repeat protein (GTAR), or serologically defined breast cancer antigen NY-BR-16, is a ubiquitously expressed ankyrin factor essential for the vascular integrity during embryogenesis. It may be directly involved in the DNA replication process and play pivotal roles in cell cycle and DNA regulation. It is also involved in innate immune defence against bacteria and viruses.
