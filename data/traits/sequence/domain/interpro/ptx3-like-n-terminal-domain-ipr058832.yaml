identifier: InterPro:IPR058832
label: "PTX3-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of human Pentraxin-related protein PTX3 and similar sequences from vertebrates. PTX3 plays a role in the regulation of innate resistance to pathogens, inflammatory reactions, possibly clearance of self-components and female fertility. This domain, which is often found associated with and , is predicted to show an all-α structure.
