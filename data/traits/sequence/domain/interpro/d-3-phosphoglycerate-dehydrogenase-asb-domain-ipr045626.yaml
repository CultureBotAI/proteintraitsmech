identifier: InterPro:IPR045626
label: "D-3-phosphoglycerate dehydrogenase, ASB domain"
definition: >-
  This entry represents the allosteric substrate binding domain (also known as intervening domain) of type 1 D-3-phosphoglycerate dehydrogenases, located between the substrate-binding and regulatory domains. It serves as an anion-binding site and may function as an allosteric site for the control of enzyme activity. Phosphoglycerate dehydrogenases (PGDH) have at least two different structural domains: the nucleotide binding and the substrate binding. There are three types of PGDH: type 3 enzymes are composed only of these two domains, type2 enzymes contain an extra C-terminal regulatory domain (ACT domain), type 1 enzymes contain both the regulatory domain and an extra allosteric domain. This entry represents the type 1 enzyme. Interestingly, this type of PGDH is found in bacteria such as Mycobacterium, Bacillus subtilis, Corynebacterium, plants such as Arabidopsis, and higher order eukaryotes, including mammals. The PGDHs from E. coli and some lower eukaryotes, such as yeast and Neurospora, belong to the type2 PGDH and are not included in this entry.
