identifier: InterPro:IPR062015
label: "Uncharacterised protein ML2630"
definition: >-
  This entry represents a region of approximately 88 amino acids found in protein ML2630 from Mycobacterium leprae (residues 36-123 of 123 amino acids) which is disordered. The protein shows sequence similarity to Rv0007 and ML0007 from Mycobacteria. The function of this entry remains to be determined.
