identifier: InterPro:IPR029295
label: Snf2, ATP coupling domain
definition: >-
  This domain lies within the catalytic subunit (Snf2) of the yeast SWI/SNF chromatin remodelling complex. It binds histones and is required for mobilising nucleosomes. This domain is conserved and can also be found in Snf2 homologues, such as Sth1.
