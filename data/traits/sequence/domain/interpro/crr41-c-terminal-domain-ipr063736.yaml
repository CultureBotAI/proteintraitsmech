identifier: InterPro:IPR063736
label: "CRR41, C-terminal domain"
definition: >-
  This entry represents the C-terminal helical bundle of CRR41 (chlororespiratory reduction 41), a nucleus-encoded biogenesis factor for the chloroplast NAD(P)H dehydrogenase-like (NDH) complex found in plants. This region contains a predicted coiled-coil motif. The function of this domain remains to be determined. CRR41 is localised to the chloroplast stroma and is required for both formation and activity of the NDH complex. The full-length protein functions in assembly or stabilisation of the NDH complex, probably involved together with NdhO and NdhH in the formation of an NDH subcomplex A assembly intermediate.
