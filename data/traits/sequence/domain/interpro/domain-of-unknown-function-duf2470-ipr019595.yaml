identifier: InterPro:IPR019595
label: "Domain of unknown function DUF2470"
definition: >-
  This entry represents an uncharacterised domain that can be found in a group of putative haem-iron utilisation proteins, such as HugZ from H. pylori and non-canonical heme oxygenase HOZ form Arabidopsis. HOZ is a dimeric β-barrel protein that binds to heme and catalyses its degradation to produce biliverdin. This domain can also be found in C-terminal of the glutamyl-tRNA reductase-binding (GluTRBP) protein from Arabidopsis. GluTRBP is involved in the regulation of glutamyl-tRNA reductase (GluTR) which is important for the synthesis and distribution of 5-aminolevulinate, a precursor in heme and chlorophyll biosynthesis. GluTRBP is necessary for efficient photosynthetic electron transport in chloroplasts.
