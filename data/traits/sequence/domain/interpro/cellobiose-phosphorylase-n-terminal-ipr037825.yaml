identifier: InterPro:IPR037825
label: "Cellobiose phosphorylase, N-terminal"
definition: >-
  Cellobiose phosphorylase ( ) or cellobiose:phosphate alpha-D-glucosyltransferase, or CepA belongs to the glycoside hydrolase family 94 (previously known as glycosyltransferase family 36). This N-terminal domain is involved in oligomerisation and may play a role in catalysis, but it is separate from the catalytic domain - an (α/α)(6) barrel. Cellobiose phosphorylase participates in the degradation of cellulose, it catalyses the phosphate dependent hydrolysis of cellobiose into alpha-D-glucose-1-phosphate and D-glucose, a reversible reaction.
