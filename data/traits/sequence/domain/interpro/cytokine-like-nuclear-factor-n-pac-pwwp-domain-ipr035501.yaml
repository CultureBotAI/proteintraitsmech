identifier: InterPro:IPR035501
label: "Cytokine-like nuclear factor N-PAC, PWWP domain"
definition: >-
  The PWWP domain is an essential part of the cytokine-like nuclear factor N-PAC protein, also known as NP60 or GLYR1, which enhances the activity of MAP2K4 and MAP2K6 kinases to phosphorylate p38-alpha. NPAC/GLYR1 is a nucleosome-destabilizing factor that is recruited to genes during transcriptional activation and facilitates Pol II transcription through nucleosomes. It is a KDM1B demethylase cofactor that stimulates H3K4me1 and H3K4me2 demethylation. In addition to the PWWP domain, NP60 also contains an AT-hook and a C-terminal NAD-binding domain alpha. The PWWP domain, named for a conserved Pro-Trp-Trp-Pro motif, is a small domain consisting of 100-150 amino acids. The PWWP domain is found in numerous proteins that are involved in cell division, growth and differentiation. Most PWWP-domain proteins seem to be nuclear, often DNA-binding proteins, that function as transcription factors regulating a variety of developmental processes.
