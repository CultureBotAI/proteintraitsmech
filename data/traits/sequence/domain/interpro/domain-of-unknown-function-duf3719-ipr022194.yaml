identifier: InterPro:IPR022194
label: "Domain of unknown function DUF3719"
definition: >-
  This domain is found in eukaryotes, and is approximately 70 amino acids in length. There is a conserved HLR sequence motif. There are two completely conserved residues (W and H) that may be functionally important. This domain is present in proteins such as primary cilium assembly protein FAM149B1.
