identifier: InterPro:IPR035396
label: "Alpha-L-rhamnosidase, six-hairpin glycosidase domain"
definition: >-
  The six-hairpin glycoside transferase domain contains up to seven α-hairpins arranged in closed circular array. Proteins containing this domain include bacterial rhamnosidase A and B enzymes. L-Rhamnose is abundant in biomass as a common constituent of glycolipids and glycosides, such as plant pigments, pectic polysaccharides, gums or biosurfactants. Some rhamnosides are important bioactive compounds. For example, terpenyl glycosides, the glycosidic precursor of aromatic terpenoids, act as important flavouring substances in grapes. Other rhamnosides act as cytotoxic rhamnosylated terpenoids, as signal substances in plants or play a role in the antigenicity of pathogenic bacteria.
