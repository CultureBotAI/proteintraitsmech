identifier: InterPro:IPR058480
label: "Protein of unknown function DUF8167, N-terminal domain"
definition: >-
  This entry represents the N-terminal integral membrane domain of a family of uncharacterised proteins from halophilic archaea that contain four domains. These proteins are typically around 400 amino acids in length. This domain contains three predicted transmembrane helices.
