identifier: InterPro:IPR002656
label: Acyltransferase 3 domain
definition: >-
  This entry represents the acyltransferase domain present in a wide range of acyltransferase enzymes, including, mainly, bacterial proteins which catalyse the transfer of acyl groups, other than amino-acyl, from one compound to another, such as Glucans biosynthesis protein C (OPGC) or protein OatA from Listeria monocytogenes serovar 1/2a and Staphylococcus aureus, an integral membrane protein which is responsible for O-acetylation at the C6-hydroxyl group of N-acetylmuramyl residues, forming the corresponding N,6-O-diacetylmuramic acid of the peptidoglycan, a modification that determines lysozyme resistance. The pathogenic bacteria, Staphylococcus aureus, is able to cause persistent infections due to its ability to resist the immune defence system. Lysozyme, a cell wall-lytic enzyme, is one of the first defence compounds induced in serum and tissues after the onset of infection. This entry also includes NolL proteins. NolL-dependent acetylation is specific for the fucosyl penta-N-acetylglucosamine species. In addition, the NolL protein caused elevated production of lipo-chitin oligosaccharides (LCOs). The NolL protein obtained from Rhizobium loti (Mesorhizobium loti) functions as an acetyl transferase. This domain is also present in eukaryotic proteins, namely O-acyltransferase like protein (OACYL) from mouse and RHY1 (Regulator of hypoxia-inducible factor 1) and NRF6 (Nose resistant to fluoxetine protein 6) from Caenorhabditis elegans.
