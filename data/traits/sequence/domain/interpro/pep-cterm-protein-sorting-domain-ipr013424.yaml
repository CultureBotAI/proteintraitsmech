identifier: InterPro:IPR013424
label: "PEP-CTERM protein-sorting domain"
definition: >-
  This entry describes a 25-residue motif that includes an invariant Pro-Glu-Pro (PEP) motif, a thirteen-residue strongly hydrophobic sequence likely to span the membrane, and a five-residue strongly basic motif that often contains four Arg residues. In most cases, this motif is found within nine residues of the C-terminal end of the protein. Proteins containing this motif typically have signal sequences at the N-terminal.
