identifier: InterPro:IPR042747
label: "IRAK3, death domain"
definition: >-
  This entry represents the death Domain (DD) of IRAK3 (also known as IRAK-M). IRAKs are essential components of innate immunity and inflammation in mammals and other vertebrates. They are involved in signal transduction pathways involving IL-1 and IL-18 receptors, Toll-like receptors(TLRs), nuclear factor-kappaB (NF-kB), and mitogen-activated protein kinases (MAPKs). IRAKs contain an N-terminal DD domain and a C-terminal kinase domain. IRAK3 is an inactive kinase present only in macrophages in an inducible manner. It is a negative regulator of TLR signalling and it contributes to the attenuation of NF-kB activation. DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signalling pathways and can recruit other proteins into signalling complexes.
