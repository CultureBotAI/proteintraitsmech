identifier: InterPro:IPR048629
label: "Inositol-tetrakisphosphate 1-kinase, preATP-grasp domain"
definition: >-
  This entry represents the preATP-grasp domain of a smalll group of proteins from Entamoeba, including Inositol-tetrakisphosphate 1-kinase from Entamoeba histolytica (ITPK1). ITPK1 can phosphorylate various inositol polyphosphate such as Ins(3,4,5,6)P4 or Ins(1,3,4)P3. Phosphorylates Ins(3,4,5,6)P4 at position 1 to form Ins(1,3,4,5,6)P5 which may play a regulatory function. It may also act as an isomerase.
