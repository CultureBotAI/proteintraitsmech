identifier: InterPro:IPR058062
label: "SCO7613, C-terminal domain"
definition: >-
  This entry describes a conserved region found at the C-terminal of large but variable-length hydrophobic proteins found mostly in members of the Actinomycetes such as Streptomyces, Micromonospora, Actinoplanes, and Nocardioides. The founding member, SCO7613 from Streptomyces coelicolor, is among a limited set of proteins directly regulated by the response regulator transcription factor MacR (Morphogenesis and ACtinorhodin Regulator, SCO2120).
