identifier: InterPro:IPR007318
label: "Phospholipid methyltransferase"
definition: >-
  This entry includes Saccharomyces cerevisiae phospholipid methyltransferase , which has a broad substrate specificity of unsaturated phospholipids, and related enzymes such as methanethiol S-methyltransferase, which catalyses the methylation of methanethiol to yield dimethylsulphide (a volatile compound important in climate regulation).
