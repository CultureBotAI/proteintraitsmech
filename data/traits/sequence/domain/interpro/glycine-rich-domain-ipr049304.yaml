identifier: InterPro:IPR049304
label: "Glycine-rich domain"
definition: >-
  This glycine rich region forms a compact hexagonal lattice of polyglycine helices in a variety of bacterial and phage surface proteins, including Collagen-like protein 4 from Acanthamoeba polyphaga mimivirus and Gene 32 protein from Mycobacterium phage D29.
