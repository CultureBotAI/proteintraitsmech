label: "SMARCC, SWIRM-associated domain"
definition: >-
  This conserved domain can be found after the SWIRM and SANT domains in SWI/SNF complex subunits SMARCC1 (BAF155) and SMARCC2 (BAF170). The function of this domain is not clear.
