identifier: InterPro:IPR060104
label: "Coiled-coil domain-containing protein 157, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of coiled-coil domain-containing protein 157 (CCDC157). This domain is found in vertebrates and precedes the main coiled-coil regions of the protein. CCDC157 proteins contain extensive coiled-coil domains and disordered regions. The proteins show tissue-enhanced expression in testis and are found throughout various tissues. It is essential for sperm differentiation and has been associated with oligoasthenoteratozoospermia-related mutations. It is also an important factor for the fusion of transport carriers to Golgi membranes.
