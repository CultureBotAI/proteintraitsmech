identifier: InterPro:IPR054416
label: "Glutathione S-transferase UstS-like , C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of a group of Glutathione transferases (GST) mainly found in fungi and bacteria, including Glutathione S-transferase-like protein ustS from Aspergillus flavus, Beta-etherase from Sphingobium sp. (LigE) and from Phanerodontia chrysosporium (GTE1). UstS is part of the gene cluster that mediates the biosynthesis of the secondary metabolite ustiloxin B, an antimitotic tetrapeptide. LigE is able to degrade various dimeric lignin compounds. GTE1 is capable of binding nonsubstrate ligands derived from lignin degradation.
