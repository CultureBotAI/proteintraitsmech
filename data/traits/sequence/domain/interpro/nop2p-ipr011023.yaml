identifier: InterPro:IPR011023
label: Nop2p
definition: >-
  This domain is found in archaeal, bacterial and eukaryotic proteins. It is found in the homologues of human 28S rRNA (cytosine(4447)-C(5))-methyltransferase that specifically methylates the C5 position of cytosine 4447 in 28S rRNA and is required for efficient rRNA processing and 60S ribosomal subunit biogenesis. It is also found in the bacterial homologues of the E.coli Ribosomal RNA small subunit methyltransferase F that specifically methylates the cytosine at position 1407 (m5C1407) of 16S rRNA.
