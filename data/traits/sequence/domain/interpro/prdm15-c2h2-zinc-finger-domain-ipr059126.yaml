identifier: InterPro:IPR059126
label: "PRDM15, C2H2 zinc finger domain"
definition: >-
  This C2H2 zinc finger domain is found in the human PR domain zinc finger protein 15 (PRDM15) and related proteins from vertebrates. PRDM15 plays an essential role as a chromatin factor that modulates the transcription of upstream regulators of WNT and MAPK-ERK signaling to safeguard naive pluripotency. The PRDM family members are characterised by the presence of a N-terminal PR (PRDI-BF1 and RIZ1 homology) domain followed by multiple zinc fingers which confer DNA binding activity. PR domains are only distantly related to the classical SET methyltransferase domains. They are involved in epigenetic regulation of gene expression through their intrinsic histone methyltransferase activity or via interactions with other chromatin modifying enzymes.
