identifier: InterPro:IPR063209
label: "Contractile injection system associated ATPase, helical domain"
definition: >-
  This entry represents a helical domain found in ATPases associated with contractile injection systems, predominantly in Bacillota and Actinomycetota. The domain is located between N-terminal winged helix domains ( ) and ATPase catalytic domains ( ). Family member SCO4259 from Streptomyces coelicolor is part of the extracellular contractile injection system required for developmentally regulated cell death. The domain likely functions as a helical linker connecting regulatory and catalytic regions. The specific function of this domain remains to be determined.
