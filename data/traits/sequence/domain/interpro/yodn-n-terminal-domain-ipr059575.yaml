identifier: InterPro:IPR059575
label: "YodN, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of YodN (gene BSU19670) from Bacillus subtilis, which is required for efficient spore germination in response to both L-alanine and a mixture of L-asparagine, D-glucose, D-fructose and potassium ions (AGFK). The specific function of this domain remains to be determined.
