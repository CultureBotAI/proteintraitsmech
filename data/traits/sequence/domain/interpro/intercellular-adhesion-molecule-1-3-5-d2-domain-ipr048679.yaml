identifier: InterPro:IPR048679
label: "Intercellular adhesion molecule 1/3/5, D2 domain"
definition: >-
  Intercellular adhesion moleculea (ICAMs) promote intercellular adhesion and are important in inflammation, immune responses and in intracellular signalling events. They belong to the Ig-like superfamily and differ in their cell expression patterns and numbers of Ig-like domains (ICAM-2 and ICAM-4 have two, ICAM-1 and ICAM-3 have five and ICAM-5 has nine). Domain 2 (D2), represented in this entry, is most similar between ICAM-1, 3 and 5.
