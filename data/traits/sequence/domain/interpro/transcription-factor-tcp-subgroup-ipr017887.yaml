identifier: InterPro:IPR017887
label: "Transcription factor TCP subgroup"
definition: >-
  The TCP domain has been named after its first characterised members (TB1, CYC and PCFs). So far, members of the TCP family have only been found in plants and function in processes related to cell proliferation. The TCP domain is probably involved in DNA-binding and protein-protein interactions. The TCP domain is predicted to form a non-canonical basic-Helix-Loop-Helix (bHLH). The main conserved features of the TCP domain are: two short stretches of residues in the basic region, hydrophobic residues along the apolar face of both α-helices, a tryptophan in helix II, and a helix-breaking glycine in the loop between the helices. However the residues in the loop and the hydrophilic residues of the helices are not as well conserved. TCP domains form two subfamilies: one closely related to CYC and TB1, and another more related to the PCFs. The basic region of the CYC/TB1 subfamily contains a putative bipartite nuclear localisation signal (NLS) while the basic region of the PCF subfamily contains only a portion of a bipartite NLS.
