identifier: InterPro:IPR056008
label: "Domain of unknown function DUF7586"
definition: >-
  This domain is found in bacterial uncharacterised proteins that probably belong to the penicillin-binding protein-type class of thioesterases. This domain is predicted to fold into a meander β-barrel consisting of eight antiparallel β-strands. It contains a semi-conserved GxWxW sequence motif near the N terminus.
