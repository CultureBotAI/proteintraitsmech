identifier: InterPro:IPR062103
label: "PARP10, first KH-domain"
definition: >-
  This eukaryotic type KH domain is found in human Protein mono -ADP-ribosyltransferase PARP10 and similar proteins. PARP10 mediates mono-ADP-ribosylation of glutamate and aspartate residues on target proteins and is involved in translesion DNA synthesis in response to DNA damage. PARP10 contains three KH domains arranged in tandem. The domain represented by this entry is the first of the array.
