identifier: InterPro:IPR057327
label: "RNA-binding protein vts1-like, alpha-helical domain"
definition: >-
  This domain is found in RNA-binding protein vts1 from Aspergillus fumigatus and related proteins from animals and fungi, including zinc finger CCHC domain-containing protein 2 (ZCCHC2), protein Smaug homolog 1 (SMAG1) from vertebrates and germline survival defective-1 from C. elegans. Vts1 is involved in post-transcriptional regulation through transcript degradation. This domain is predicted to adopt an all-α configuration.
