identifier: InterPro:IPR049043
label: "RIOX1/NO66-like, C-terminal winged helix domain"
definition: >-
  This domain is found in Ribosomal oxygenase 1 from humans (RIOX1), Bifunctional lysine-specific demethylase and histidyl-hydroxylase NO66 from Drosophila melanogaster and similar proteins from animals. RIOX1 catalyse histidine-hydroxylation in ribosomal protein rpL28. The protein shows a JmjC domain followed by an helical dimerisation domain and a C-terminal winged-helix (WH)-domain (this entry).
