identifier: InterPro:IPR048672
label: "Nonstructural protein 13, zinc-binding domain, coronavirus"
definition: >-
  Nonstructural protein 13 (NSP13) is encoded by the replicase polyprotein 1a/ab of coronaviruses and released after a proteolytic process. It plays a critical role catalysing the unwinding of duplex oligonucleotides into single strands in an NTP-dependent manner. It In SARS-CoV, it has been shown that NSP12 directly interacts with NSP13 and enhances its helicase activity. NSP13 is a multidomain protein consisting of a N-terminal zinc-binding domain (ZBD), a stalk domain that connects the ZBD with the 1B domain and the helicase domain (that contains two RecA1 and RecA2 domains). ZBD, stalk and 1B domains are unique to nidovirus helicases. NSP13 adopts a triangular pyramid shape in which the two RecA1 and A2 and 1B domains form the triangular base while N-terminal ZBD and stalk domains are arranged at the apex of the pyramid. Recently, it has been reported that SARS-CoV-2 NSP13 acts as an interferon antagonist. It is involved in type I interferon (IFN-I) response as it binds and blocks TBK1 phosphorylation to inhibit interferon regulatory factor 3 (IRF3) which results in decreased IRF3 activation. This entry represents the ZBD of NSP13, which is critically involved in nidovirus replication and transcription, modulating the ATPase/helicase activity in cis. It includes conserved cysteines and histidines involved in three zinc-binding sites.
