identifier: InterPro:IPR034496
label: "TIAR, RNA recognition motif 3"
definition: >-
  This entry represents the RNA recognition motif 3 (RRM3) of TIA-1 and nucleolysin TIAR (TIA-1-related protein), proteins that share high sequence similarity. TIA-1 is the 40kDa isoform of T-cell-restricted intracellular antigen-1 (TIA-1, also known as Cytotoxic granule associated RNA binding protein TIA1), a cytotoxic granule-associated RNA-binding protein mainly found in the granules of cytotoxic lymphocytes. TIA-1 regulate alternative pre-mRNA splicing by promoting the use of suboptimal 5' splice sites followed by uridine-rich intronic enhancer sequences. It can be phosphorylated by a serine/threonine kinase that is activated during Fas-mediated apoptosis, and functions as the granule component responsible for inducing apoptosis in cytolytic lymphocyte (CTL) targets. TIAR is a cytotoxic granule-associated RNA-binding protein that shows high sequence similarity with TIA-1. TIAR plays a critical role in transcriptional and posttranscriptional regulation of gene expression. It binds to target mRNA and DNA via its RNA recognition motif (RRM) domains and is involved in both splicing regulation and translational repression via the formation of stress granules. TIAR is composed of three N-terminal highly homologous RNA recognition motifs (RRMs) and a glutamine-rich C-terminal auxiliary domain containing a lysosome-targeting motif. Its RRMs are involved in binding to U-rich RNA, but with unequal contributions. RRM2 of TIAR is the major RNA- and DNA-binding domain.
