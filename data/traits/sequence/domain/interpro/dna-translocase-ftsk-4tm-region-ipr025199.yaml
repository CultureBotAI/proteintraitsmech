identifier: InterPro:IPR025199
label: "DNA translocase FtsK, 4TM region"
definition: >-
  This entry represents the integral membrane domain of the FtsK DNA tranlocases. During sporulation in Bacillus subtilis, the SpoIIIE protein is believed to form a translocation pore at the leading edge of the nearly closed septum. The E. coli FtsK protein is homologous to SpoIIIE, and can free chromosomes trapped in vegetative septa.
