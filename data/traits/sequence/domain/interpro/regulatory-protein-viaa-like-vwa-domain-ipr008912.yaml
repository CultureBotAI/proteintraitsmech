identifier: InterPro:IPR008912
label: "Regulatory protein ViaA-like, vWA domain"
definition: >-
  This entry represents the VWA type domain found in Regulatory protein ViaA and similar sequences. It is found as part of a CO oxidising (Cox) system operon in several bacteria. ViaA is a component of the RavA-ViaA chaperone complex, which may act on the membrane to optimise the function of some of the respiratory chains. ViaA stimulates the ATPase activity of RavA.
