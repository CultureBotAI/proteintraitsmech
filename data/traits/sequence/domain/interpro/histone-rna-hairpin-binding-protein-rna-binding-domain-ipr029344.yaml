identifier: InterPro:IPR029344
label: Histone RNA hairpin-binding protein, RNA-binding domain
definition: >-
  This entry represents the RNA-binding domain of histone RNA hairpin-binding protein, also known as SLBP. Proteins containing this domain include SLBP1 and SLBP2 from Xenopus laevis. SLBP1 binds the 5' side of the stem-loop structure of replication-dependent histone pre-mRNAs and contributes to efficient 3'-end processing by stabilising the complex between histone pre-mRNA and U7 small nuclear ribonucleoprotein (snRNP), via the histone downstream element (HDE). It plays an important role in targeting mature histone mRNA from the nucleus to the cytoplasm and to the translation machinery. It stabilises mature histone mRNA and could be involved in cell-cycle regulation of histone gene expression.
