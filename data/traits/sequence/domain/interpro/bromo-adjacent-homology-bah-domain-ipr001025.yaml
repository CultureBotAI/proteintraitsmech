identifier: InterPro:IPR001025
label: Bromo adjacent homology (BAH) domain
definition: >-
  The BAH (bromo-adjacent homology) is commonly found in chromatin-associated proteins. It is found in proteins such as eukaryotic DNA (cytosine-5) methyltransferases , the origin recognition complex 1 (Orc1) proteins, as well as several proteins involved in transcriptional regulation. The BAH domain appears to act as a protein-protein interaction module specialised in gene silencing, as suggested for example by its interaction within yeast Orc1p with the silent information regulator Sir1p. The BAH module might therefore play an important role by linking DNA methylation, replication and transcriptional regulation.
