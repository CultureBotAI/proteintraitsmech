identifier: InterPro:IPR063705
label: "Alpha-lytic protease pro, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the pro region of Alpha-lytic proteases. The pro region acts as foldase. Members of this entry fold into an α/β structure composed of a mixed β-sheet with strand order 123 and two α-helices. The N- and C-terminal domains of Alpha-lytic protease are homologous and structurally very similar.
