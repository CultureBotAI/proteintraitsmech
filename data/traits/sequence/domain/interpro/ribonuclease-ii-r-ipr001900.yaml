label: Ribonuclease II/R
definition: >-
  This entry represents the catalytic domain of ribonuclease II. It includes characterised and related sequences to exoribonuclease II (RNase II) and ribonuclease R, a bacterial 3' --> 5' exoribonuclease homologous to RNase II.
