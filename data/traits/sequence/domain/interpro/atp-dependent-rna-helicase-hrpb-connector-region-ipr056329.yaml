identifier: InterPro:IPR056329
label: "ATP-dependent RNA helicase HrpB, connector region"
definition: >-
  This domain is found in ATP-dependent RNA helicase HrpB from Escherichia coli and similar proteins predominantly found in proteobacteria. It is a connector element (CON) found N-terminal to. The DExH-box group of NTPases/helicases in bacteria predominantly comprises DEAH/RHA-like proteins and it was divided into three groups: HrpA-like, HrpB-like, and Z5898-like proteins, referring to three corresponding E.coli factors. While motifs II of HrpA- and Z5898-like proteins conform to the DEAH fingerprint of DEAH/RHA enzymes, motif II of HrpB-like helicases comprises the sequence Asp-Glu-Phe/Tyr-His, which is more closely related to the corresponding motif in Ski2-like enzymes.
