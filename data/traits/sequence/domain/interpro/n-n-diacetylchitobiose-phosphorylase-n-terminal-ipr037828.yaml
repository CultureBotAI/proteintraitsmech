identifier: InterPro:IPR037828
label: "N,N'-diacetylchitobiose phosphorylase, N-terminal"
definition: >-
  Chitobiose phosphorylase belongs to the glycoside hydrolase family 94 (previously known as glycosyltransferase family 36). This N-terminal domain is involved in oligomerization and may play a role in catalysis, but it is separate from the catalytic domain - an (α/α)(6) barrel]. Chitobiose phosphorylase catalyzes the reversible phosphate dependent hydrolysis of chitobiose [(GlcNAc)2] into alpha-GlcNAc-1-phosphate and GlcNAc. In some organisms, ChBP may be involved in the production of GlcNac-6-phosphate in intracellular pathways.
