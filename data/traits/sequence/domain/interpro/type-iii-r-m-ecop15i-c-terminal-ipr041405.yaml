identifier: InterPro:IPR041405
label: "Type III R-M EcoP15I, C-terminal"
definition: >-
  This domain is found in the Type III restriction-modification EcoP15I complex, present in E. coli. The Mod subunits function as a dimer with ModA recognizing the DNA and ModB methylating the target adenine base. This domain is found in the C-terminal of the ModB subunit.
