label: "SAM-dependent methyltransferase TRM5/TYW2-type"
definition: >-
  This entry represents a domain found in the Trm5/Tyw2-type methyltransferase. Trm5 and Tyw2 are S-adenosylmethionine-dependent methyltransferases involved in tRNA methylation.
