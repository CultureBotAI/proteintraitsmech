identifier: InterPro:IPR031774
label: "SF3A3 domain"
definition: >-
  This entry represents a domain found in the SF3A3 protein, which is s component of the SF3a splicing factor complex of the mature U2 snRNP (small nuclear ribonucleoprotein particle). This domain can also be found in SF3A3 yeast homologues, Prp9 and Sap61. In budding yeasts, SF3a complex shows a bifurcated assembly structure of three subunits, Prp9 (subunit 3), Prp11 (subunit 2) and Prp21 (subunit 1). Prp9 and Prp21 were not thought to interact with each other but the alpha1 helix of Prp9 does make important contacts with the SURP2 domain of Prp21, thus the two do interact via a bidentate-binding mode. Prp9 harbours a major binding site for stem-loop IIa of U2 snRNA.
