identifier: InterPro:IPR006086
label: XPG-I domain
definition: >-
  This entry represents a domain found on Xeroderma Pigmentosum Complementation Group G (XPG) protein. XPG is a DNA endonuclease involved in DNA excision repair. The internal XPG (XPG-I) domain contains many cysteine and glutamate amino acid residues that are frequently found in various enzyme active sites of DNA nucleases. The I domain, together with the N-terminal, forms the catalytic domain that contains the active site.
