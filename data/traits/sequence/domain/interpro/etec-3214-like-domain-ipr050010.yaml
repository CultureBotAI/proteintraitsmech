identifier: InterPro:IPR050010
label: "ETEC_3214-like domain"
definition: >-
  This entry represents a domain found in a protein of unknown function encoded by ETEC_3214 in E.coli. This protein is strongly upregulated by CfaD, an AraC-like transcriptional regulator that plays a key role in virulence gene expression by enterotoxigenic Escherichia coli (ETEC).
