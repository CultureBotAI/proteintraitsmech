identifier: InterPro:IPR024639
label: "DNA polymerase epsilon subunit B, N-terminal"
definition: >-
  This domain is found in the N-terminal of DNA polymerase epsilon subunit B proteins. It contains a single completely conserved phenylalanine residue that may be functionally important. It forms a primarily α helical structure in which four helices are arranged in two hairpins with connecting loops containing β strands which form a short parallel sheet. DNA polymerase epsilon is required in DNA replication for synthesis of the leading strand. The N-terminal domain has close structural relation to AAA+ protein C-terminal domains.
