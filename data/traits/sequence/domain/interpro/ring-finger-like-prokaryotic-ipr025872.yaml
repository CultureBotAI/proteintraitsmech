identifier: InterPro:IPR025872
label: "RING finger-like, prokaryotic"
definition: >-
  This entry represents an uncharacterised domain in predicted RING finger proteins found sporadically in bacteria and archaea. They are associated with other components of the ubiquitin-based signaling and degradation system, including ubiquitin and the E1 and E2 proteins. The bacterial versions contain transmembrane helices.
