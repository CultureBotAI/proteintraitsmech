identifier: InterPro:IPR005273
label: "Uracil-DNA glycosylase family 4"
definition: >-
  Uracil-DNA glycosylase (UDG) removes uracil from DNA to initiate DNA base excision repair. UDGs were classified into families 1, 2 and 3 on the basis of sequence similarity. Thermophilic UDGs have been identify more recently and they have been classified as a new UDG family, family 4. The enzymes of family 4 Uracil-DNA glycosylase (UDG), found in thermophilic organisms, are thermostable enzymes. Uracil-DNA glycosylases (UDGs) are DNA repair enzymes that catalyze the removal of mismatched uracil from DNA to initiate DNA base excision repair pathway. The Thermus thermophilus enzyme TTUDGA removes uracil from both, ssDNA and dsDNA, but not thymine from a G:T mismatch. These details suggest that the mechanism by which Family 4 UDGs remove uracils from DNA is similar to that of Family 1 enzymes. The thermostability of the enzyme may be linked to the presence of an iron-sulfur cluster, salt-bridges and ion pairs on the molecular surface as well as prolines on loops and turns, as commonly found in the Family 4 enzymes. Uracil in DNA can arise as a result of mis-incorporation of dUMP residues by DNA polymerase or deamination of cytosine. Uracil mispaired with guanine in DNA is one of the major pro-mutagenic events, causing G:C->A:T mutations.
