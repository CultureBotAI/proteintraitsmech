label: "Type I restriction enzyme HindI endonuclease subunit-like, C-terminal"
definition: >-
  This domain is found at the C-terminal of Type I restriction enzyme HindI endonuclease subunit (also known as R protein) from Haemophilus influenzae and related sequences from bacteria and archaea. This domain is typically between 255 to 340 amino acids in length and its function is unknown. This domain is found associated with , .
