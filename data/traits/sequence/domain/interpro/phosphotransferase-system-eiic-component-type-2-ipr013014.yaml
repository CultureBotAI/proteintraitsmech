identifier: InterPro:IPR013014
label: "Phosphotransferase system, EIIC component, type 2"
definition: >-
  The phosphoenolpyruvate-dependent sugar phosphotransferase system (PTS) is a major carbohydrate transport system in bacteria. The PTS catalyses the phosphorylation of incoming sugar substrates and coupled with translocation across the cell membrane, makes the PTS a link between the uptake and metabolism of sugars. The general mechanism of the PTS is the following: a phosphoryl group from phosphoenolpyruvate (PEP) is transferred via a signal transduction pathway, to enzyme I (EI) which in turn transfers it to a phosphoryl carrier, the histidine protein (HPr). Phospho-HPr then transfers the phosphoryl group to a sugar-specific permease, a membrane-bound complex known as enzyme 2 (EII), which transports the sugar to the cell. EII consists of at least three structurally distinct domains IIA, IIB and IIC. These can either be fused together in a single polypeptide chain or exist as two or three interactive chains, formerly called enzymes II (EII) and III (EIII). According to sequence analyses, the PTS EIIC domain can be divided in five groups: The PTS EIIC type 1 domain is found in the Glucose class of PTS and has an average length of about 80 amino acids. The PTS EIIC type 2 domain is found in the Mannitol class of PTS and has an average length of about 90 amino acids. The PTS EIIC type 3 domain is found in the Lactose class of PTS and has an average length of about 100 amino acids. The PTS EIIC type 4 domain is found in the Mannose class of PTS and has an average length of about 160 amino acids. The PTS EIIC type 5 domain is found in the Sorbitol class of PTS and has an average length of about 190 amino acids. This entry represents the type 2 domain.
