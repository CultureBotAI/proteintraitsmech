identifier: InterPro:IPR060851
label: "Athe_2463 domain"
definition: >-
  This entry represents an uncharacterised protein domain in Bacillota. It is usually found at the N-terminal domain. This entry includes Athe_2463 from Caldicellulosiruptor bescii, becomes highly abundant during growth on the five-carbon sugar xylose or on xylan, a beta-1,4 xylose polymer.
