identifier: InterPro:IPR057413
label: "Integrator complex subunit 6-like, beta-barrel domain"
definition: >-
  This entry represents a domain found in the human Integrator complex subunit 6 (INTS6) and related proteins, including its paralogue Integrator complex subunit 6-like (INTS6L). The domain represented by this entry folds into a β-barrel structure with topological similarity to SPOC domains. INTS6 is a component of the Integrator (INT) complex, a complex that is involved in the small nuclear RNAs (snRNA) U1 and U2 transcription and in their 3'-box-dependent processing. INTS6 and other subunits bind to and position PP2A phosphatase to dephosphorylate the C-terminal domain of Pol II subunit RPB1. In the inactive closed conformation of the INT-PP2A complex, INTS6 blocks the PP2A phosphatase active site.
