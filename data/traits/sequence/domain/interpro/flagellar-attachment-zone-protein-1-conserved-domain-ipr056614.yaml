identifier: InterPro:IPR056614
label: "Flagellar attachment zone protein 1, conserved domain"
definition: >-
  This entry represents a conserved domain found twice in FAZ1 from Trypanosoma brucei and similar sequences mainly from trypanosomatids. This domain is found near the central region and at the very C-terminal of FAZ1. At least 50% of the T. cruzi genome is repetitive sequence, consisting mostly of large gene families of surface proteins, retrotransposons, and subtelomeric repeats.
