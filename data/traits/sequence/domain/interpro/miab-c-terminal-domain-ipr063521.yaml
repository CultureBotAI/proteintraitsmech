identifier: InterPro:IPR063521
label: "MiaB, C-terminal domain"
definition: >-
  This domain is found C-terminal in the tRNA-2-methylthio-N(6) -dimethylallyladenosine synthase (MiaB) from Mycobacterium avium and related proteins. MiaB catalyses the methylthiolation of N6-(dimethylallyl)adenosine (i6A), leading to the formation of 2-methylthio-N6-(dimethylallyl) adenosine (ms2i6A) at position 37 in tRNAs that read codons beginning with uridine. This entry also covers uncharacterised bacterial proteins annotated as transmembrane proteins.
