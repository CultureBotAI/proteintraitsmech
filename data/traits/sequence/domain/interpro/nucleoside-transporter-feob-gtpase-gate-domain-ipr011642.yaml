identifier: InterPro:IPR011642
label: "Nucleoside transporter/FeoB GTPase, Gate domain"
definition: >-
  This domain is responsible for determining nucleoside specificity in the human sodium/nucleoside cotransporter proteins CNT1 and CNT2 (e.g. ). In the FeoB proteins (e.g. ), which are believed to be Fe 2+ transporters, it includes the membrane pore region, so the function of this domain is likely to be more general than just nucleoside specificity. It may represent the pore and gate, with a wide potential range of specificity. Hence its name - Gate.
