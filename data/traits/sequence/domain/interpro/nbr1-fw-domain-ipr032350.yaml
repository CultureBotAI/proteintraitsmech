identifier: InterPro:IPR032350
label: "Nbr1, FW domain"
definition: >-
  This entry represents the FW domain found in Nbr1 and similar eukaryotic proteins, including JOKA2 from Solanum tuberosum. In the fungus Chaetomium thermophilum it has been shown to bind the alpha-mannosidase Ams1, a cargo of selective autophagy in both budding yeast and fission yeast, and delivers Ams1 to the vacuole by autophagy in heterologous fission yeast. The FW domain has also been shown to interact with the microtubule-associated protein MAP1B. Structurally, the FW domain adopts an immunoglobulin-like β-sandwich structure and recognises the quaternary structure of the Ams1 tetramer. Nbr1 (next to BRCA1) is an ubiquitin-binding autophagy adapter that participates in different processes including host defense or intracellular homeostasis. Nbr1-like molecules contain an N-terminal PB1 domain, one (animals, plants) or more (fungi) ZZ domains, an FW domain, and a C-terminal UBA domain. JOKA2 activates ATG8CL-mediated selective autophagy, and contributes to defense against the fungal pathogen Phytophtora infestans.
