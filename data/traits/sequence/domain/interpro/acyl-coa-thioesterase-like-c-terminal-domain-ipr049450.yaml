label: "Acyl-CoA thioesterase-like, C-terminal domain"
definition: >-
  This entry contains a wide variety of enzymes, principally thioesterases, including Acyl-coenzyme A thioesterase 8 from Mus musculus (ACOT8). These enzymes are part of the Hotdog fold superfamily. This domain represents the C-terminal domain in a pair of HotDog domains, usually found with .
