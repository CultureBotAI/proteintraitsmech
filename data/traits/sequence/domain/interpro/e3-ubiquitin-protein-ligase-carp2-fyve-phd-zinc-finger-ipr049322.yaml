identifier: InterPro:IPR049322
label: "E3 ubiquitin-protein ligase CARP2, FYVE/PHD zinc finger"
definition: >-
  This entry represents the FYVE/PHD zinc finger form E3 ubiquitin-protein ligase RFFL, also known as Caspase regulator 2 (CARP2). This domain is also found in similar proteins from vertebrates. CARP2 is a novel caspase regulator that regulates the p53 signalling pathway through degrading 14-3-3 sigma and stabilising MDM2.
