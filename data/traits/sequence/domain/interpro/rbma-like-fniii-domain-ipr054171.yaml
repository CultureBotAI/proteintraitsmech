identifier: InterPro:IPR054171
label: "RbmA-like, FnIII domain"
definition: >-
  This entry represents both fibronectin type III (FnIII) domains found in Vibrio cholerae scaffolding protein RbmA, a biofilm matrix protein essential for both maintenance of rugose colony morphology and development of wild-type biofilm architecture. RbmA contains two FnIII domains connected by a linker segment. The two folds run antiparallel to each other but do not form extensive interactions. Each FnIII domain shows a β-sandwich comprised of three β-sheets plus four β-sheets.
