identifier: InterPro:IPR048524
label: "Lysosome-associated membrane glycoprotein 2-like, transmembrane domain"
definition: >-
  This domain is found in Lysosome-associated membrane glycoprotein 2 from humans (Lamp2) and similar proteins from vertebrates. Lamp2 is an integral membrane protein that plays an important role in chaperone-mediated autophagy (CMA), targeting pertinent proteins for lysosomal degradation. This protein is organised into two conserved luminal domains, a single transmembrane (TM) domain (this entry) and a short C-terminal cytosolic tail. It adopts a trimeric configuration, and the transmembrane domains of the three monomers form a three-helical bundle structure.
