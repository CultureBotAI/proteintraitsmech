identifier: InterPro:IPR015168
label: SsuA/THI5-like
definition: >-
  This domain is found in NMT1/THI5 family proteins. These proteins are proposed to be required for the biosynthesis of the pyrimidine moiety of thiamine. This domain is also found in aliphatic sulfonates-binding protein SsuA, which is part of a transport system for aliphatic sulfonates.
