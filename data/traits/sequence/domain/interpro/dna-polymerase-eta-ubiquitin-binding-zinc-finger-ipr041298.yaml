identifier: InterPro:IPR041298
label: "DNA polymerase eta, ubiquitin-binding zinc finger"
definition: >-
  This entry represents type 3 UBZ found in DNA polymerase eta. It is important in the recruitment of the polymerase to the stalled replication machinery in translesion synthesis. The UBZ domain adopts a classical C2H2 zinc-finger structure characterised by a β-β-α fold. The ubiquitin-binding zinc finger (UBZ) is a type of zinc-coordinating β-β-α fold domain found mainly in proteins involved in DNA repair and transcriptional regulation. UBZ domains coordinate a zinc ion with cysteine or histidine residues; depending on their amino acid sequence, UBZ domains are classified into several families. Type 1 UBZs are CCHH-type zinc fingers found in tandem UBZ domains of TAX1-binding protein 1 (TAX1BP1), type 2 UBZs are CCHC-type zinc fingers found in FAAP20 which is a subunit of the Fanconi anemia (FA) core complex, type 3 UBZs are CCHH-type zinc fingers found only in the Y-family translesion polymerase eta, and type 4 UBZs are CCHC-type zinc fingers found in Y-family translesion polymerase kappa, Werner helicase-interacting protein 1 (WRNIP1), and Rad18.
