identifier: InterPro:IPR060221
label: "Cytochalasin cluster regulator ccsR-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain with a Delta-Endotoxin fold found in Cytochalasin cluster regulator ccsR from Aspergillus clavatus and similar proteins from fungi. CcsR is a transcription factor that regulates gene clusters mediating cytochalasin biosynthesis. The specific function of this domain remains to be determined.
