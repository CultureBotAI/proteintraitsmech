identifier: InterPro:IPR063245
label: "FAR1, PH domain"
definition: >-
  This entry represents a pleckstrin homology (PH) domain found in FAR1 and related cyclin-dependent kinase inhibitors. PH domains typically bind phosphoinositides and are involved in membrane localisation and protein-protein interactions. This PH domain is located in the C-terminal region of FAR1, which is required for oriented cell polarisation in response to mating pheromones. FAR1 functions as an inhibitor of the CDC28-CLN cyclin-dependent kinase complex and is essential for G1 cell cycle arrest during the mating response. The domain is found in FAR1 orthologues across Saccharomycotina yeasts. The specific role of this PH domain in FAR1's mating functions remains to be determined.
