identifier: InterPro:IPR039392
label: "Gingipain, N-terminal"
definition: >-
  Gingipain, produced by Porphyromonas gingivalis, exemplifies the peptidase family C25. P. gingivalis is one of the primary Gram-negative pathogens that causes periodontitis, a disease also associated with other diseases such as diabetes and cardiovascular disease. The gingipain subgroup contains extracellular Arg- and Lys-specific proteinases called Arg-gingipain (Rgp) and Lys-gingipain (Kgp); RgpA and RgpB are Arg-specific gingipains encoded by two closely related genes, rgpA and rgpB, while Lys-specific gingipain is encoded by the single kgp gene. Mutant studies have shown that, among the large quantities of proteolytic enzymes produced by P. gingivalis, these three proteases are major virulence factors of this bacterium. All three genes encode an N-terminal pre-pro fragment, followed by the protease domain; however, rgpA and kgp also encode additional C-terminal HA (hemaglutinin/adhesion) subunits which consist of several sequence-related adhesion domains. Although unique, their cysteine protease active site residues (His and Cys) forming the catalytic dyad, are well-conserved, cleaving the C-terminal peptide bond with Arg or Lys residues. Gingipains are evolutionarily related to other highly specific proteases including caspases, clostripain, legumains, and separase. Gingipains function by dysregulating host defense and inflammatory responses, and degrading host proteins, e.g. tissue, cells, matrix, plasma and immunological proteins. It has been suggested that they enhance gingival crevicular fluid (GCF) production through activation of the kallikrein/kinin pathways, thus increasing vascular permeability and causing gingival inflammation, a distinctive feature of periodontitis. RgpA and RgpB are also able to cleave and activate coagulation factors IX and X in order…
