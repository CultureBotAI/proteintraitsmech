identifier: InterPro:IPR046843
label: "LonB, AAA+ ATPase LID domain, archaeal-type"
definition: >-
  The species-specific Lon-insertion domain (LID) is characteristic of Lon proteases (also known as endopeptidase La) and is fused to the AAA module. Bacterial and eukaryotic Lons (LonA) have a LID at the N-terminal of AAA module; in archaeal Lons (LonB) the LID, represented in this entry, is inserted within the AAA module in a series of transmembrane segments known as the membrane-anchoring region (MA). In the Lon-like protease LonC, which does not have ATPase activity, the LID is also within the AAA-like module similar to LonBs; in this case, it is predicted to contain coiled-coil regions rather than transmembrane segments.
