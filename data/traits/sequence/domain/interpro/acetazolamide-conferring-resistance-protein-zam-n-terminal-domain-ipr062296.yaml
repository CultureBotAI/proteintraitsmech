identifier: InterPro:IPR062296
label: "Acetazolamide conferring resistance protein zam, N-terminal domain"
definition: >-
  This entry represents an N-terminal domain of approximately 55 residues found in Acetazolamide conferring resistance protein zam and related proteins. The domain precedes the OB_RNB domain ( ) and is followed by CSD2 ( ), RNB ( ), and S1 ( ) domains. Members include the Zam protein (sll1910) from Synechocystis PCC 6803, which confers resistance to the carbonic anhydrase inhibitor acetazolamide. These proteins function as 3'-5' exoribonucleases involved in bulk RNA degradation. The specific function of this cyanobacteria-specific N-terminal domain remains to be determined.
