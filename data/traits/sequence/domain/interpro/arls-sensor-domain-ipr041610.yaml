identifier: InterPro:IPR041610
label: "ArlS, sensor domain"
definition: >-
  This entry represents the N-terminal extracellular sensor domain of the ArlS protein from S. aureus. ArlS is a member of the two-component regulatory system ArlS/ArlR involved in the regulation of adhesion, autolysis, multidrug resistance and virulence. It recognises LL-37 antimicrobial peptide (Matilla et. al., FEMS Microbiology Reviews, fuab043, 45, 2021, 1. https://doi.org/10.1093/femsre/fuab043).
