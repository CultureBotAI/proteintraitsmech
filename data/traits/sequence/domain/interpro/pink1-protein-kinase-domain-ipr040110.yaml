identifier: InterPro:IPR040110
label: PINK1, protein kinase domain
definition: >-
  PINK1 is a mitochondrial serine/threonine kinase that acts as a sensor of mitochondrial damage. It phosphorylates ubiquitin (Ub) and the Ub-like domain (UBL) of the E3 Ub ligase parkin at Ser65. The phosphorylation of Ub and the parkin UBL facilitates the transition from the autoinhibition state to the catalytically active state in parkin. Upon mitochondrial damage, PINK1 accumulates on the outer mitochondrial membrane (OMM), where it may recruit and activate Parkin. PINK1 has also been shown to phosphorylate Miro, a component of the primary motor/adaptor complex that anchors kinesin to the mitochondrial surface. The phosphorylation of Miro activates proteasomal degradation of Miro in a Parkin-dependent manner.
