identifier: InterPro:IPR000845
label: Nucleoside phosphorylase domain
definition: >-
  Phosphorylases with this domain include: Purine nucleoside phosphorylase ( ) (PNP) from most bacteria (gene deoD), which catalyses the cleavage of guanosine or inosine to respective bases and sugar-1-phosphate molecules. Uridine phosphorylase ( ) (UdRPase) from bacteria (gene udp) and mammals, which catalyses the cleavage of uridine into uracil and ribose-1-phosphate, the products of the reaction are used either as carbon and energy sources or in the rescue of pyrimidine bases for nucleotide synthesis. 5'-methylthioadenosine phosphorylase ( ) (MTA phosphorylase) from Sulfolobus solfataricus. Purine nucleoside phosphorylase ( ) (PNP) from mammals as well as from some bacteria (gene deoD). This enzyme catalyzes the cleavage of guanosine or inosine to respective bases and sugar-1-phosphate molecules. 5'-methylthioadenosine phosphorylase ( ) (MTA phosphorylase) from eukaryotes.
