identifier: InterPro:IPR025824
label: OB-fold nucleic acid binding domain
definition: >-
  This entry represents OB-fold domains that bind to nucleic acids. They are found in exonuclease VII (ExoVII) large subunit proteins. ExoVII is composed of two non-identical subunits. ExoVII is a single-strand-specific exonuclease which degrades ssDNA from both 3-prime and 5-prime ends. ExoVII plays a role in methyl-directed mismatch repair in vivo. ExoVII may also guard the genome from mutagenesis by removing excess ssDNA, since the build up of ssDNA would lead to SOS induction and PolIV-dependent mutagenesis.
