identifier: InterPro:IPR063087
label: "TRAPPC10, first Ig-like domain"
definition: >-
  This entry represents the first Ig-like domain of TRAPPC10 from animals. TRAPPC10 is a subunit of the TRAPP II complex and function in late Golgi trafficking as a membrane tether. This domain contains an insertion in the middle region, according to structure predictions, consisting of disordered loops and 2 β-strands.
