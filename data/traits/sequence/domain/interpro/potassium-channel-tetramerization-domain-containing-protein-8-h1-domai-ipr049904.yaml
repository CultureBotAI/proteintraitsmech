identifier: InterPro:IPR049904
label: "Potassium channel tetramerization domain-containing protein 8, H1 domain"
definition: >-
  Potassium channel tetramerization domain-containing protein 8 (KCTD8), a BTB/POZ domain-containing protein, is an auxiliary subunit of gamma-aminobutyric acid type B (GABA-B) receptors that determine the pharmacology and kinetics of the receptor response. It generates largely non-desensitising receptor responses. KCTD8 consists of an N-terminal BTB domain followed by a region called the H1 domain. The BTB domain mediates interaction with the receptor. The H1 domain, which possesses a β-propeller-like fold, engages in interactions with G-protein β and γ subunits. In the related protein KCTD12, the H1 domain is also responsible for desensitisation. This entry corresponds to the H1 domain of KCTD8, which may not be involved in desensitisation.
