identifier: InterPro:IPR048931
label: "Selenocysteine-specific elongation factor, second winged helix domain"
definition: >-
  This domain is found in Selenocysteine-specific elongation factor from Escherichia coli (SelB) and similar bacterial sequences. SelB is a translation factor necessary for the incorporation of selenocysteine into proteins. The C-terminal region of this protein in bacteria shows four winged-helix (WH) domains arranged in tandem, which form two globular structures. This entry represents the third WH domain. Each WH domain has an α/β structure consisting of three α-helices and a twisted three-stranded antiparallel β-sheet.
