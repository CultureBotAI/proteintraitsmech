identifier: InterPro:IPR028057
label: DrrA phosphatidylinositol 4-phosphate binding domain
definition: >-
  This domain binds to phosphatidylinositol 4-phosphate (PtdIns4P or PI4P) lipids on the cytosolic surface of the phagosomal membrane. It is found in Legionella pneumophila DrrA (also known as sidM), a protein involved in the redirection of endoplasmic reticulum-derived vesicles to the Legionella-containing vacuoles (an intracellular replicative organelle) through the recruitment and activation of the host small guanosine triphosphatase (GTPase) Rab1.
