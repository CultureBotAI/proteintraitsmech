identifier: InterPro:IPR063689
label: "Alpha-2-macroglobulin, Ig-like domain 4"
definition: >-
  This entry represents an Ig-like domain found in some alpha-2-macroglobulin homologues from gamma and betaproteobacteria. It is located next to the A2M_BRD domain. Alpha-2-macroglobulins are large protease inhibitors that protect cells from host peptidases. Some bacterial homologues lack the conserved thioester bond characteristic of eukaryotic alpha-2- macroglobulins.
