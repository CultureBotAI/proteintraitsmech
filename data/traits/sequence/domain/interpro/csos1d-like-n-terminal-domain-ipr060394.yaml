identifier: InterPro:IPR060394
label: "CsoS1D-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal of carboxysome shell protein CsoS1D and similar proteins from bacteria, including Bacterial microcompartment protein trimer-2 (BMC-T2), Bacterial microcompartment protein trimer-3 (BMC-T3) and Carboxysome shell protein CcmP. This domain has a BMC (bacterial microcompartment) fold ( ). CsoS1D is part of the carboxysome shell, a polyhedral inclusion where RuBisCO (ribulose bisphosphate carboxylase, cbbL-cbbS) is sequestered. It may control transport of RuBisCO reactants in and out of the carboxysome. BMC-T2/3 are minor component of the bacterial microcompartment (BMC) shell. There are 20 BMC-T pseudohexamers per BMC, composed of mixed BMC-T1, BMC-T2 and BMC-T3. The shell facets are 20-30 Angstroms thick, with 1 of the stacked BMC-T trimers protruding to the exterior. CcmP is thought to be part of the carboxysome shell, a polyhedral inclusion where RuBisCO (ribulose bisphosphate carboxylase) is sequestered.
