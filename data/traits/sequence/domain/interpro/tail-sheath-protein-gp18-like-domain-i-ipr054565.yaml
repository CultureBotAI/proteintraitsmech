label: "Tail sheath protein Gp18-like, domain I"
definition: >-
  This entry represents domain I from bacteriophage tail sheath protein Gp18, a protein that surrounds the central non-contractile tail tube of the tail sheath from bacteriophages, which contracts during infection. These proteins consist of three domains, domains I, II ( ) and III (which consists of and ). Domains I and II form the protease-resistant fragment.
