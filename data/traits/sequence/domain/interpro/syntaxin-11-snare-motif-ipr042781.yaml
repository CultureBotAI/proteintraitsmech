identifier: InterPro:IPR042781
label: "Syntaxin 11, SNARE motif"
definition: >-
  This entry represents the SNARE motif found in Syntaxin 11. Syntaxin-11 (STX11) belongs to the syntaxin family, which is a group of the membrane integrated proteins participating in exocytosis. Syntaxins are associated with various intracellular membrane compartments and have been implicated in various physiological processes such as axonal growth and cell division. STX11 is associated with SNAP-23 on late endosomes and the trans-Golgi network. Mutations in STX11 gene cause familial hemophagocytic lymphohistiocytosis 4 (FHL4), a rare disorder characterised by immune dysregulation with hypercytokinemia, defective function of natural killer cell, and massive infiltration of several organs by activated lymphocytes and macrophages.
