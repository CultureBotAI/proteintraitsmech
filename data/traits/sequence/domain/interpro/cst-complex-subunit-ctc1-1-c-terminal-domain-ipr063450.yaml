identifier: InterPro:IPR063450
label: "CST complex subunit CTC1,1 C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of CTC1. CTC1 is one of the three components of the CST complex that assists Shelterin to protect the ends of telomeres from attack by DNA-repair mechanisms. Mutations in human CTC1 have been recognised as contributing to cerebroretinal microangiopathy.
