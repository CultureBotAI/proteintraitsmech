identifier: InterPro:IPR041803
label: "RNA polymerase II degradation factor 1, CUE domain"
definition: >-
  DEF1, also called RRM3-interacting protein 1, is an RNA Polymerase II (RNAPII) degradation factor that may be required to couple arrested RNAPII to the proteasome to facilitate its degradation. It also has a role modulating RNA polymerase II transcription. It contains a CUE domain that is responsible for the binding of ubiquitin.
