identifier: InterPro:IPR056276
label: "AtC3H46-like, PABC-like domain"
definition: >-
  This PABC-like domain is found N-terminal in Zinc finger CCCH domain-containing protein 46 (AtC3H46) from Arabidopsis thaliana and related proteins specific to plants. AtC3H46 is know to possess RNA-binding and ribonuclease activities in vitro.
