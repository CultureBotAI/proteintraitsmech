identifier: InterPro:IPR059999
label: "Non-structural protein 3, intracellular membrane remodeller domain, Arterivirus"
definition: >-
  This domain is present in subunit Nsp3 of RNA-arteriviruses, such as porcine arterivirus PRRSV and equine arterivirus EAV. Nsp3 proteins are localized to the ER and appear to be essential for formation of double-membrane vesicles that originate from the ER during the life-cycle of the virus. Arterivirus Nsp3 is a predicted tetra-spanning transmembrane protein containing four transmembrane helices, with the N- and C-terminal of the protein residing in the cytoplasm. It contains a cluster of four highly conserved cysteine residues that are predicted to reside in the first luminal domain of the protein. These conserved cysteines play a key role in the formation of double-membrane vesicles (DMVs); mutagenesis of each completely blocked DMV formation.
