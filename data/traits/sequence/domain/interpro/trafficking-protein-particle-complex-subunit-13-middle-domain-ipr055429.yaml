identifier: InterPro:IPR055429
label: "Trafficking protein particle complex subunit 13, middle domain"
definition: >-
  This entry represents the middle domain of TRAPPC13 which is predicted to adopt a β-sandwich fold. Trafficking protein particle complex subunit 13 (TRAPPC13) is involved in regulating autophagy and survival in response to small molecule compound-induced Golgi stress. It is the mammal homologue of Trs65 from yeast, part of TRAPPII complex which interacts with COPI-coated vesicles in mammalian cells and aids in endosome-to-Golgi transport.
