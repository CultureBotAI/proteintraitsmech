identifier: InterPro:IPR047935
label: "BTBD7, second BTB/POZ domain"
definition: >-
  This entry represents the second BTB/POZ domain of BTBD7. BTB/POZ domain-containing protein 7 (BTBD7) is a crucial regulator that is essential for region-specific epithelial cell dynamics and branching morphogenesis, especially for branching of embryonic mammalian salivary glands and lungs. It has been implicated in various cancers. BTBD7 contains two BTB domains and a BACK domain.
