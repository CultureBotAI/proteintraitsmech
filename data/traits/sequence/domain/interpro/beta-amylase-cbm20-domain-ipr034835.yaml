identifier: InterPro:IPR034835
label: "Beta-amylase, CBM20 domain"
definition: >-
  Beta-amylase has, in addition to its C-terminal CBM20 domain, an N-terminal catalytic domain belonging to glycosyl hydrolase family 14, which hydrolyzes the alpha-1,4-glucosidic bonds of starch, yielding beta-maltose from the nonreducing end of the substrate. Beta-amylase is found in both plants and microorganisms, however the plant members lack a C-terminal CBM20 domain and are not included in this group.
