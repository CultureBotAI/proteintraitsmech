identifier: InterPro:IPR013681
label: "Myelin transcription factor 1"
definition: >-
  This domain is found in the myelin transcription factor 1 (MYT1) of chordates. MYT1 contains C2HC zinc finger domains and is expressed in developing neurons of the central nervous system where it is involved in the selection of neuronal precursor cells.
