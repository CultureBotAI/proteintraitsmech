identifier: InterPro:IPR058699
label: "LARP4/4B, RNA recognition motif"
definition: >-
  This RNA recognition motif (RRM) is found in La-related protein 4 (LARP4) and LARP4B predominantly from animals. LARP4 binds to the poly-A tract of mRNA molecules and plays a role in the regulation of mRNA translation and in the regulation of cell morphology and cytoskeletal organisation. This domain is not present in other La-related proteins. It is found next to .
