identifier: InterPro:IPR060090
label: "Histone transcription regulator 3, helical domain"
definition: >-
  This entry represents a helical domain from histone transcription regulator 3 (HIR3) fungal proteins. This domain is predominantly α-helical in structure. The specific function of this helical domain remains to be determined, but it likely contributes to the protein's role in chromatin remodelling and nucleosome assembly. HIR3 belongs to the HIR3/CABIN1 family and has a role in nucleosome assembly pathways that are required for heterochromatin integrity and proper chromosome segregation. The protein is involved in chromatin organisation and transcriptional regulation. HIR3 is a component of the HIR complex and is localised to the nucleus. In yeast, HIR3 is a repressor of histone gene transcription. It also has a role in nucleosome assembly.
