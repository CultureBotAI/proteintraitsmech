identifier: InterPro:IPR053843
label: "DnaD, N-terminal domain"
definition: >-
  DnaD is a primosomal protein that remodels supercoiled plasmids. It binds to supercoiled forms and converts them to open forms without nicking. The DnaD N-terminal domain has a scaffold-forming activity. This domain adopts a classical winged helix fold decorated with extensions at both termini.
