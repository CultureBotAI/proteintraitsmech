identifier: InterPro:IPR040668
label: "TraI, 2B/2B-like domain"
definition: >-
  This is the 2B and 2B-like sub-domain found in TraI, a relaxase of F-family plasmids. It contains four domains: a trans-esterase domain that executes the nicking and covalent attachment of the T-strand to the relaxase, a vestigial helicase domain (carrying the 2B/2B-like sub-domain) that operates as an ssDNA-binding domain, an active 5' to 3' helicase domain, and a C-terminal domain that functions as a recruitment platform for relaxosome components.
