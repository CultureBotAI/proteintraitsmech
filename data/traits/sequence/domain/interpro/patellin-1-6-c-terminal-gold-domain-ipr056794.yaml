identifier: InterPro:IPR056794
label: "Patellin-1-6, C-terminal GOLD domain"
definition: >-
  This GOLD domain is found at the C-terminal end of Patellin-1-6 from Arabidopsis thaliana (PATL1-6) and similar plant proteins. PATL1 is a carrier protein that may be involved in membrane -trafficking events associated with cell plate formation during cytokinesis. It binds to some hydrophobic molecules and promotes their transfer between the different cellular sites. This domain is predicted to adopt a compact β-sandwich fold.
