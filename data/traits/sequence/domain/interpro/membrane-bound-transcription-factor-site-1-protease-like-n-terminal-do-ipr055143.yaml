identifier: InterPro:IPR055143
label: "Membrane-bound transcription factor site-1 protease-like, N-terminal domain"
definition: >-
  This entry represents a domain found N-terminal in a family of membrane bound serine proteases from animals and plants, including the human member Membrane-bound transcription factor site-1 protease (MBTP1). Members of this family are involved in regulated intramembrane proteolysis (RIP) of various substrates, playing a crucial role in cellular signalling and regulation. These proteases cleave after hydrophobic or small residues, with a preference for Arg or Lys at the P4 position. They are responsible for the proteolytic activation of sterol regulatory element-binding proteins (SREBPs), cyclic AMP-dependent transcription factors (ATF6 and ATF6B), and other factors like BDNF, GNPTAB, and FAM20C. This activation process is essential for lipid homeostasis, lysosome biogenesis, osteoblast differentiation, and ER stress response. Additionally, they regulate M6P-dependent trafficking of lysosomal enzymes and are involved in collagen trafficking through the activation of CREB3L2/BBF2H7.
