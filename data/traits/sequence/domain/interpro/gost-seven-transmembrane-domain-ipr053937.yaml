identifier: InterPro:IPR053937
label: "GOST, seven transmembrane domain"
definition: >-
  This entry represents the transmembrane domain of a group of related proteins that share the same domain architecture, termed GOST (GOLD domain seven-transmembrane helix) proteins, including TMEM87A/B, GPR107/GPR108 from human and the homologues from yeast, PTM1. This entry also includes plant proteins, CAND6/7. Some members of this entry, such as TMEM87A/B, do not signal as a GPCR.
