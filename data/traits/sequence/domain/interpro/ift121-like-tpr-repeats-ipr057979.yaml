identifier: InterPro:IPR057979
label: "IFT121-like, TPR repeats"
definition: >-
  This region of tetratricopeptide (TPR)-like repeats is found towards the C-terminal end of IFT121. IFT121 (also known as WDR35) is a component of the IFT complex A (IFT-A), which is required for retrograde ciliary transport and entry into cilia of G protein-coupled receptors that is involved in ciliogenesis and ciliary protein trafficking. This protein plays a role in cilia assembly and maintenance. IFT121 contains a zinc finger with rubredoxin-like fold. Knock-out IFT121 cells showed defective retrograde trafficking within cilia.
