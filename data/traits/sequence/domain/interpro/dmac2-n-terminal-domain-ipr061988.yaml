identifier: InterPro:IPR061988
label: "DMAC2, N-terminal domain"
definition: >-
  This entry represents the N-terminal helix-turn-helix domain of DMAC2 (distal membrane-arm assembly complex protein 2), also known as ATP synthase subunit s-like protein. DMAC2 is a mitochondrial protein required for the assembly of the NADH:ubiquinone oxidoreductase complex (complex I). This protein is involved in the assembly of the distal region of complex I and interacts with incompletely assembled complex I. DMAC2 belongs to the ATP synthase subunit s family and contains a leucine-rich repeat-like (LRR) domain superfamily fold. This domain precedes the LRR-like region. The function of this domain remains to be determined. Members are mainly found in mammals.
