identifier: InterPro:IPR058209
label: "Serine/threonine-protein kinase BSK1-like, TPR repeats"
definition: >-
  This region of tetratricopeptide (TPR)-like repeats is found at the C-terminal end of Serine/threonine-protein kinase BSK1 from Arabidopsis thaliana and similar eukaryotic proteins. BSK1 acts as a positive regulator of brassinosteroid signalling downstream of the receptor kinase BRI1. This region is also found at the N-terminal end of Heat shock protein STI1 from Saccharomyces cerevisiae and its homologue from Dictyostelium discoideum. These proteins may play a role in mediating the heat shock response of some HSP70 genes.
