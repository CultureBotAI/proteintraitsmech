label: "Cupin fold metalloprotein WbuC, cupin domain"
definition: >-
  This entry represents the cupin domain of cupin fold metalloprotein WbuC family member and similar proteins found mainly in Proteobacteria and Bacteroidetes. These proteins contain 1 or 2 copies of the domain.
