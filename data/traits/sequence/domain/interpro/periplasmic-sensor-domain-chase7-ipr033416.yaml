identifier: InterPro:IPR033416
label: "Periplasmic sensor domain CHASE7"
definition: >-
  CHASE7 is a conserved periplasmic sensor domain found in histidine kinases and diguanylate cyclases/phosphodiesterases, including the diguanylate cyclase DgcQ (YedQ) that regulates biofilm formation and motility in Escherichia coli.
