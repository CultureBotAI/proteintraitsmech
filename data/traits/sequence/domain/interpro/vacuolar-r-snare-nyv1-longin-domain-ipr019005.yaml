identifier: InterPro:IPR019005
label: "Vacuolar R-SNARE Nyv1, longin domain"
definition: >-
  SNARE-mediated fusion typically results in the formation a complex consisting of three Q-SNAREs and one R-SNARE. R-SNAREs that contain a profilin-like fold in their N-terminal domains have been termed longins. The genome of the yeast Saccharomyces cerevisiae encodes five R-SNAREs of which three (Sec22, Ykt6, and Nyv1) have the longin domain. It is important to note that the given longin domain (LD) is not restricted to R-SNAREs and has been identified in a variety of proteins. This entry represents the N-terminal longin domain of Nyv1. This domain contains a YXXomega-like sorting motif (Y31GTI34), which is responsible for the AP3-dependent vacuolar localization of Nyv1.
