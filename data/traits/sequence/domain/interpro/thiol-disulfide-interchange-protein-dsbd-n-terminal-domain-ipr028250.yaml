identifier: InterPro:IPR028250
label: "Thiol:disulfide interchange protein DsbD, N-terminal domain"
definition: >-
  Folding of secreted proteins within the periplasm of Escherichia coli requires the formation of disulfide bonds, a process that is dependent on the Dsb (disulfide bond) proteins. The reduction of Dsb proteins DsbC, DsbE, and DsbG occurs by transport of electrons from cytoplasmic thioredoxin to the C-terminal thioredoxin-like domain of DsbD (DsbDC). The N-terminal domain of DsbD (DsbDN) is capable of forming disulfides with oxidized DsbC, DsbE, or DsbG as well as with reduced DsbD. This entry represents DsbDN.
