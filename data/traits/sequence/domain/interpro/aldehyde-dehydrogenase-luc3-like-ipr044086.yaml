identifier: InterPro:IPR044086
label: "Aldehyde dehydrogenase LUC3-like"
definition: >-
  This entry represents the aldehyde dehydrogenase domain found in FUS7 and LUC3 proteins. FUS7 is part of the gene cluster that mediates the biosynthesis of the mycotoxin fusarin C. LUC3 is part of the gene cluster that mediates the biosynthesis of the mycotoxin lucilactaene and the lucilactaene-related compound NG-391 that act as cell cycle inhibitors with potent growth inhibitory activity against malarial parasites and moderate growth inhibitory activity against cancer cells. They have no activity against bacteria and fungi. LUC3 is important for lucilactaene biosynthesis and performs the oxidation of the C-20 alcoholic analogue prelucilactaene G into a carboxylic derivative that has still to be identified.
