identifier: InterPro:IPR003672
label: CobN/magnesium chelatase
definition: >-
  This entry contains a domain common to the cobN protein and to magnesium protoporphyrin chelatase. CobN may play a role in cobalt insertion reactions and is implicated in the conversion of precorrin-2 to cobyrinic acid in cobalamin biosynthesis. Magnesium protoporphyrin chelatase is involved in chlorophyll biosynthesis as the third subunit of light-independent protochlorophyllide reductase in bacteria and plants. This domain is found either standalone or in combination with .
