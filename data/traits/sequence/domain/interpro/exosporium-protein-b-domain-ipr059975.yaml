identifier: InterPro:IPR059975
label: "Exosporium protein B domain"
definition: >-
  This entry represents the CsxB domain found in exosporium proteins of Clostridium species. CsxB is a 151 amino acid protein localised to the exosporium of the spore wall in Clostridium sporogenes. The protein was identified by mass spectrometry and is part of the spore surface protein complement. The function of this domain remains to be determined.
