identifier: InterPro:IPR056889
label: "NET2A-D/KIP1-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of Protein NETWORKED 2A/B/C/D from Arabidopsis thaliana (NET2A/B/C/D), Kinase-interacting protein 1 (KIP1) from Petunia integrifolia and similar plant proteins. This domain is predicted to have an all-α helical configuration. Plant-specific Networked 2 (NET2) family of actin-binding proteins localise to the actin cytoskeleton and specify different membrane compartments. NET2A, the founding member of this family, associates with F-actin at the plasma membrane in growing pollen tubes. This protein is anchored at the plasma membrane and predominates at cell junctions, the plasmodesmata, and is probably involved in mediating actin-membrane interactions. KIP1, another member of the NET2 family, interacts very strongly with PRK1-K , a receptor-like kinase of petunia, and is probably involved in the receptor-like kinase-mediated signal transduction pathway.
