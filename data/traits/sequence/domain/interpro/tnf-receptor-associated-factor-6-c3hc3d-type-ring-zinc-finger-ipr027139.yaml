identifier: InterPro:IPR027139
label: TNF receptor-associated factor 6, C3HC3D-type RING zinc finger
definition: >-
  TNF receptor-associated factor 6 (TRAF6) regulates a diverse array of processes, including adaptive immunity, innate immunity, bone metabolism and tissue development. It is a unique member of the TRAF family of adaptor proteins in that it is involved in both the TNF receptor superfamily and the interleukin-1 receptor (IL-1R)/Toll-like receptor (TLR) superfamily signal transduction pathways. TRAF6 possesses ubiquitin ligase activity that controls the activation of IKK and NF-kappaB. TRAF6 contains a RING finger domain, five zinc finger domains, and a TRAF domain. This entry represents the modified C3HC3D-type (HC subclass) RING zinc finger of TRAF6.
