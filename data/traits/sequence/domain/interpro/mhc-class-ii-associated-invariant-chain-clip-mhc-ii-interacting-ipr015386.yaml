identifier: InterPro:IPR015386
label: MHC class II-associated invariant chain/CLIP, MHC II-interacting
definition: >-
  This domain is found in MHC class II-associated invariant chain (Ii), and in class II invariant chain-associated peptide (CLIP), and is required for association with class II major histocompatibility complex (MHC II) in the MHC II processing pathway. Ii plays a critical role in the assembly of the MHC, as well as in MHC II antigen processing by stabilising peptide-free class II alpha/beta heterodimers in a complex soon after their synthesis and directing transport of the complex from the endoplasmic reticulum to compartments where peptide loading of class II takes place. In antigen-presenting cells (APCs), loading of MHC II molecules with peptides is regulated by Ii, which blocks MHC II antigen-binding sites in pre-endosomal compartments. Several factors modulate the surface expression of MHC II molecules via post-Golgi mechanisms, including CLIP. The Invariant chain contains a single transmembrane domain. Ii first assembles into a trimer and then associates with three class II alpha/beta MHC heterodimers. Although the membrane-proximal region of the Ii luminal domain is structurally disordered, the C-terminal segment of the luminal domain is largely α-helical and contains a major interaction site for the Ii trimer.
