identifier: InterPro:IPR055797
label: "DUF7373, N-terminal"
definition: >-
  This domain is found at the N-terminal of uncharacterised proteins from actinomycetes. It is predicted to adopt a seven-stranded antiparallel β-sheet with similarity to Mog1p/PsbP-like domains. Some proteins containing this domain have a lipoprotein attachment motif at the N-terminal end suggesting they may be associated with the membrane. This domain is usually found in two copies that share little sequence similarity to each other.
