identifier: InterPro:IPR047506
label: "E3 ubiquitin-protein ligase UBR7-like, UBR-box"
definition: >-
  This entry represents the UBR-box of UBR7 and similar eukaryotic proteins. Proteins in this entry include the putative E3 ubiquitin-protein ligase UBR7, which is found in mammalian spermatozoa, particularly the acrosomal cap and sperm acrosome. UBR7 is a RING-type E3 ubiquitin ligase of the Arg/N-end rule degradation pathway. It recognizes and binds to proteins bearing specific N-terminal residues that are destabilizing according to the N-end rule, leading to their ubiquitination and subsequent degradation. It may play an important role in spermiogenesis and fertilisation. Homologues are found in plants and fungi, including the uncharacterised protein Mlo2 from fission yeasts. Both UBR7 and Mlo2 contain both a PHD-type and an UBR-type zinc finger.
