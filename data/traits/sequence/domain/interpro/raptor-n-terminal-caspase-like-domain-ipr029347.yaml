identifier: InterPro:IPR029347
label: "Raptor, N-terminal CASPase-like domain"
definition: >-
  Human Raptor is involved in the control of the mammalian target of rapamycin complex 1 (mTORC1) activity which regulates cell growth and survival, and autophagy in response to nutrient and hormonal signals. It functions as a scaffold for recruiting mTORC1 substrates. All Raptor orthologs contain a unique conserved region in their N-terminal half (raptor N-terminal conserved, also called the RNC domain) followed by three HEAT (huntingtin, elongation factor 3, A subunit of protein phosphatase 2A and TOR1) repeats and seven WD-40 repeats near the C terminus.
