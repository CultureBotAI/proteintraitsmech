identifier: InterPro:IPR061943
label: "AIM39, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in AIM39 (Altered inheritance of mitochondria protein 39) family proteins from fungi. AIM39 proteins are mitochondrial membrane proteins that contain a mitochondrial transit peptide, a transmembrane domain, and this conserved C-terminal domain. The proteins are single-pass membrane proteins localised to mitochondrial membranes. AIM39 belongs to a family involved in mitochondrial inheritance processes. The specific function of this C-terminal domain remains to be determined. This domain covers most of the structure and is found downstream a coiled coil and a disordered region.
