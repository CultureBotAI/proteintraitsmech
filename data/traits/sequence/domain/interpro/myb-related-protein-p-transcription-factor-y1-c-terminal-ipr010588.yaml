identifier: InterPro:IPR010588
label: "Myb-related protein P/transcription factor Y1, C-terminal"
definition: >-
  This entry represents the C terminus of plant P/Y1 proteins. Members of this entry are transcriptional regulators of genes encoding enzymes for flavonoid biosynthesis. P protein plays a role in the pathway leading to the production of a red phlobaphene pigment, and P proteins are homologous to the DNA-binding domain of myb-like transcription factors. This domain is associated with domain.
