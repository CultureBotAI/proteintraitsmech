identifier: InterPro:IPR055076
label: "Exo-oligoalginate lyase, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of Exo-oligoalginate lyase from Saccharophagus degradans (Alg17C) and similar sequences from proteobacteria. Alg17C catalyses the depolymerisation of alginate through an exolytic mode of action, via a beta-elimination mechanism. This protein consists of two major domains, an N-terminal imperfect α-barrel ( ) and a C-terminal β-sheet domain (, followed by a smaller all-β domain which is represented in this entry.
