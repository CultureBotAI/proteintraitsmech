identifier: InterPro:IPR002711
label: HNH endonuclease
definition: >-
  HNH endonuclease is found in bacteria and viruses. This entry represents the catalytic core of these enzymes that folds into a typical ββα-fold. It spans the conserved catalytic HNH motif and the Zn-binding site. This minimal catalytic core is found in site-specific homing endonucleases, restriction enzymes, pyocins, colicins and anaredoxins. Bacterial HNH domains are known to act as both site-specific DNA nucleases (in homing nucleases for example, or in the RNA-guided DNA endonuclease Cas9), as well as non-specific nucleases (in colicins, a subgroup of bacterial toxins).
