identifier: InterPro:IPR054057
label: "Campylobacter invasion antigen D, C-terminal"
definition: >-
  This entry represents the C-terminal domain of Campylobacter invasion antigen D from Campylobacter jejuni (CiaD) and similar sequences mainly found in Campylobacterales. C. jejuni utilizes a cell binding and effector delivery mechanism to invade host cells. The Cia proteins (effectors) are exported from the bacterium's flagellar T3SS and are involved in enhancing C. jejuni cell invasion. This domain shows a pair of highly conserved C-terminal α-helices. Many members of the family also contain an N-terminal T3SS signal.
