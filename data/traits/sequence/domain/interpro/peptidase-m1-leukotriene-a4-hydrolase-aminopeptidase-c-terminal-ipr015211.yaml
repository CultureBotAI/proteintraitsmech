label: Peptidase M1, leukotriene A4 hydrolase/aminopeptidase C-terminal
definition: >-
  This C-terminal domain is found in peptidases belonging to MEROPS peptidase family M1, particularly: aminopeptidase-1 of Caenorhabditis elegans, aminopeptidase O, aminopeptidase B and the bifunctional leukotriene A4 (LTA-4) hydrolase/aminopeptidase.
