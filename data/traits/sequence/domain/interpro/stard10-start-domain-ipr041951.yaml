identifier: InterPro:IPR041951
label: "STARD10, START domain"
definition: >-
  This entry represents the steroidogenic acute regulatory protein (StAR)-related lipid transfer (START) domain of STARD10 (also known as CGI-52, PTCP-like, and SDCCAG28). STARD10 binds phophatidylcholine and phosphatidylethanolamine. It may function in the liver in the export of phospholipids into bile. It is concentrated in the sperm flagellum, and may play a role in energy metabolism. In the mammary gland it may participate in the enrichment of lipids in milk, and be a potential marker of differentiation. Its expression is induced in this gland during gestation and lactation. It is overexpressed in mammary tumours from Neu/ErbB2 transgenic mice, in several breast carcinoma cell lines, and in 35% of primary human breast cancers, and may cooperate with c-erbB receptor signaling in breast oncogenesis. It is a potential marker of disease outcome in breast cancer; loss of STARD10 expression in breast cancer strongly predicts an aggressive disease course. The lipid transfer activity of STRAD10 is downregulated by phosphorylation of its Ser284 by CK2 (casein kinase 2).
