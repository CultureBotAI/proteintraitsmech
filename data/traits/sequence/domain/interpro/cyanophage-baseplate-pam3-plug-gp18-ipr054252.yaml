identifier: InterPro:IPR054252
label: "Cyanophage baseplate Pam3 plug gp18"
definition: >-
  This family, previously known as DUF6983, represents Cyanophage baseplate Pam3 plug gp18 and related proteins. Gp18 has structural similarity to a component of the baseplate Complex for Myoviridae Phage XM1. The cyanophage Pam3 has a substantially simpler molecular organisation than the prototypical, contractile-tail bacteriophage T4, but it retains the essential elements required for DNA injection. The baseplate of Pam3 contains six protein components: the trimeric spike gp20, the trimeric hub gp19, the baseplate wedge (six heterotriplexes of gp22-gp23), the plug of six gp18 monomers, and the fibers (12 trimers of gp24) . The plug gp18 consists of two-layered β-sheets and a C-terminal α-helix, resembling the immunoglobin fold. Each plug monomer is embedded between the two C-terminal helices of the tube initiator, forming a 'plug' to fix the core helical bundle of the wedge onto the hub.
