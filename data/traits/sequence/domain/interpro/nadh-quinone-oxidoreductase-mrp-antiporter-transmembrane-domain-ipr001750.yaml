identifier: InterPro:IPR001750
label: "NADH:quinone oxidoreductase/Mrp antiporter, transmembrane domain"
definition: >-
  This entry represents the transmembrane segments of subunits NuoL/ND5, NuoM/ND4, and NuoN/ND2 of the NADH:quinone oxidoreductase (complex I), Mrp antiporters subunits A and D, and in membrane subunits of hydrogenase complexes, such as hydrogenase-4 and F420H2 dehydrogenase. Mrp-type antiporters comprise the cation/proton antiporter family 3 (CPA3), commonly referred to as Mrp. They are the products of operons that carry either six or seven genes (mrpA-G), and form complexes containing all subunits. They have Na(+)/H(+) antiporter activity. Two of the Mrp proteins, MrpA and MrpD, resemble NuoL/ND5, NuoM/ND4, NuoN/ND2, the homologous subunits that constitute the membrane-embedded, proton-translocating core of complex I. They also resemble subunits of membrane-bound hydrogenases, such as HyfB, HyfD and HyfF from E.coli and F420H2 dehydrogenasa (FPO complex) subunits L, N and M.
