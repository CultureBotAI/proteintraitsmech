identifier: InterPro:IPR029444
label: "Integrator complex subunit 5, C-terminal"
definition: >-
  This entry represents the C-terminal of the integrator complex subunit 5 (INTS5). The integrator complex is involved in the small nuclear RNAs (snRNA) U1 and U2 transcription and in their 3'-box-dependent processing.
