identifier: InterPro:IPR061976
label: "TcsH, C-terminal DRBD"
definition: >-
  This domain is found in Hemorrhagic toxin (TcsH) produced by Paeniclostridium sordellii and related proteins from Clostridia lineage. TcsH is a multidomain protein and the domain represented by this entry occupies the C-terminal part of a region referred as DRBD and responsible for a combined transmembrane delivery and receptor-binding.
