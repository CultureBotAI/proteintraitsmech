identifier: InterPro:IPR034880
label: "La-related protein 6, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of LARP6. LARP6 (also known as acheron) is a novel member of the lupus antigen (La) family. LARP6 has been found to regulate the stability and translation of collagen mRNAs by binding to a stem-loop structure in the 5'UTR of type I and type III collagen mRNAs. It can also bind to the developmental transcription factor CASK-C and form a complex with Id (inhibitor of differentiation) transcription factors. It shuttles between the nucleus and cytoplasm and participates in the nuclear export of collagen mRNAs. LARP6 is structurally related to the La autoantigen and contains a La motif (LAM), nuclear localization and export (NLS and NES) signals, and an RNA recognition motif (RRM).
