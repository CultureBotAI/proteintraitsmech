identifier: InterPro:IPR049484
label: "Transcriptional regulator Rv0078-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of bacterial transcriptional regulators of the TetR family, including from Mycobacterium tuberculosis (Rv0078) and from Myxococcus xanthus. This is the all-helical ligand-binding domain, which interacts with the respective effector molecule and transmits the signal to the DNA binding domain ( ).
