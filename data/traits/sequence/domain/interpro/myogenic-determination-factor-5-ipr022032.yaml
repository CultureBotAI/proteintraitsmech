identifier: InterPro:IPR022032
label: "Myogenic determination factor 5"
definition: >-
  This domain is found in eukaryotes, is approximately 70 amino acids in length, and contains a conserved CSD sequence motif. It is found in association with , . This domain is found in Myogenic factor 5 (Myf5) and Myoblast determination protein 1 (MyoD1). Myf5 is responsible for directing cells to the skeletal myocyte lineage during development. Myf5 is likely to act in a similar way to the other MRF4 proteins such as MyoD which perform the same function.
