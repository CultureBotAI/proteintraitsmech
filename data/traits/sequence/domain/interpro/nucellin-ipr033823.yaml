identifier: InterPro:IPR033823
label: Nucellin
definition: >-
  Nucellin (MEROPS identifier A01.073) is an important regulator of a nucellar cell's progressive degradation after ovule fertilisation. This degradation is a characteristic of programmed cell death. Nucellin is a plant aspartic endopeptidase specifically expressed in nucellar cells during degradation. The enzyme is characterised by having two aspartic endopeptidase catalytic site motifs, Asp-Thr-Gly-Ser in the N-terminal and Asp-Ser-Gly-Ser in the C-terminal region, and two other regions nearly identical to two regions of plant aspartic proteases. An aspartic endopeptidase is a bilobal enzyme, with each lobe contributing a catalytic Asp residue, with an extended active site cleft localised between the two lobes of the molecule. One lobe may be evolved from the other through an ancient gene-duplication event. Although the three-dimensional structures of the two lobes are very similar, the amino acid sequences are more divergent, except for the conserved catalytic site motif. This entry represents the peptidase domain of nucellin.
