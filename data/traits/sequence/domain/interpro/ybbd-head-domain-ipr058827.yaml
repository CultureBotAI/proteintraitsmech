identifier: InterPro:IPR058827
label: "YbbD, head domain"
definition: >-
  This domain is found in the Putative uncharacterized protein YbbD from E. coli and related proteins. It is predicted to fold into a simple structure composed of a three-stranded antiparallel β-sheet containing an extended loop between first and second strands. This domain is usually preceded by a hydrophobic helix. Some homologues contain two copies of this domain.
