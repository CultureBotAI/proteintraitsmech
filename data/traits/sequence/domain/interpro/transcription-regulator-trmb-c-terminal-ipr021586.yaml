identifier: InterPro:IPR021586
label: "Transcription regulator TrmB, C-terminal"
definition: >-
  This domain is found at the C-terminal end of HTH-type sugar sensing transcriptional regulator TrmB from the hyperthermophilic archaea Thermococcus litoralis and Pyrococcus furiosus and in similar prokaryotic sequences. TrmB is an alpha-glucoside sensing transcriptional regulator. The protein is the transcriptional repressor for a gene cluster encoding trehalose/maltose ABC transporter. A nonreducing glucosyl residue is shared by all substrates bound to TrmB which suggests that its a common recognition motif.
