identifier: InterPro:IPR033910
label: Glutamyl-tRNA synthetase
definition: >-
  This entry represents the discriminating Glutamyl-tRNA synthetase (GluRS) catalytic core domain. The discriminating form of GluRS is only found in bacteria and cellular organelles. GluRS is a monomer that attaches Glu to the appropriate tRNA. Like other class I tRNA synthetases, GluRS aminoacylates the 2'-OH of the nucleotide at the 3' end of the tRNA. The core domain is based on the Rossman fold and is responsible for the ATP-dependent formation of the enzyme bound aminoacyl-adenylate. It contains the characteristic class I 'HIGH' and 'KMSKS' motifs, which are involved in ATP binding. Glutamate-tRNA ligase (also known as glutamyl-tRNA synthetase; ) is a class I aminoacyl-tRNA synthetase. This enzyme shares similarities with glutaminyl-tRNA synthetase in terms of structure and catalytic properties. Glutamyl-tRNA synthetase (GluRS) and glutaminyl-tRNA synthetase (GlnRS) are grouped in the GlxRS subclass because of the shared evolutionary pathway of their catalytic domains. The catalytic domain of Glx subfamily is believed to be more ancient, having evolved from a common GluRS ancestor that contained only the catalytic domain. Anticodon binding domains of extant bacterial and eukaryotic/archeal GlxRS appeared independently at a later stage, with the anticodon-binding domain of bacterial GlnRS being acquired by an unique horizontal gene transfer event from the eukaryotic kingdom. Bacterial GluRS are divided into two groups -discriminatory GluRS (D-GluRS) and non-discriminatory GluRS (ND-GluRS). While D-GluRS exclusively catalyses the transfer of Glu to tRNA(Glu), the ND-GluRS can also glutamylate tRNA(Gln) forming Glu-tRNAGln. The misacylated product is then transformed to Gln-tRNA(Gln) by an enzyme known as glutamyl-tRNA(Gln) amidotransferase. The bacterial GluRS structu…
