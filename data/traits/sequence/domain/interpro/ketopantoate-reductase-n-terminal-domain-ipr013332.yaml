identifier: InterPro:IPR013332
label: "Ketopantoate reductase, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of KPR and related proteins, including ketoisovalerate reductase. This domain contains an α/β-fold of the Rossmann type. Ketopantoate reductase (KPR; ), also known as 2-dehydropantoate 2-reductase or ApbA/PanE, catalyses the NADPH-dependent reduction of ketopantoate to pantoate, an essential step in the biosynthesis of pantothenate (vitamin B5) and coenzyme A. The enzyme consists of two domains: an N-terminal domain containing a Rossmann fold responsible for NADP(H) binding , and a C-terminal domain composed of α-helices that belongs to the 6-phosphogluconate dehydrogenase C-terminal domain-like superfamily. The active site is located in the cleft between the two domains, where substrate binding and hydride transfer occur. In bacteria such as Escherichia coli and Salmonella typhimurium, KPR is encoded by the panE gene, which is allelic with apbA. The enzyme functions as a monomer in E. coli, whereas in Staphylococcus aureus it forms a stable dimer exhibiting positive cooperativity with respect to NADPH. In Salmonella, ApbA is also required for thiamine synthesis via the alternative pyrimidine biosynthetic pathway.
