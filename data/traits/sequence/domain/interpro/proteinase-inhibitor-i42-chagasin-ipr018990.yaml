identifier: InterPro:IPR018990
label: "Proteinase inhibitor I42, chagasin"
definition: >-
  Chagasin is a reversible inhibitor of papain-like cysteine proteases. Chagasin has a β-barrel structure, which is a unique variant of the immunoglobulin fold with homology to human CD8alpha.
