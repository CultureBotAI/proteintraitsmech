identifier: InterPro:IPR056887
label: "Nesprin-1/2 domain"
definition: >-
  This domain is found in human Nesprin-1/2 (SYNE1, SYNE2) and similar sequences from vertebrates. It is found towards the C-terminal end of the protein between spectrin repeats ( ). Its specific function is unknown. SYNE1 is a a multi-isomeric modular protein which forms a linking network between organelles and the actin cytoskeleton to maintain the subcellular spatial organisation. This protein has been associated with several severe disorders. SYNE1 and SYNE2 mediate centrosome migration and are both essential for ciliogenesis. SYNE2 assemble with SUN2 in arrays of transmembrane actin-associated nuclear (TAN) lines which are bound to F-actin cables and couple the nucleus to retrograde actin flow during actin-dependent nuclear movement.
