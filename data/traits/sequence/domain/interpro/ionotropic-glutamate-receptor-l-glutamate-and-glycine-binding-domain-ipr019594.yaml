label: Ionotropic glutamate receptor, L-glutamate and glycine-binding domain
definition: >-
  This region, sometimes called the S1 domain, is the luminal domain just upstream of the first, M1, transmembrane region of transmembrane ion-channel proteins, and binds L-glutamate and glycine in the ionotropic glutamate receptor NMDA. It is found in association with .
