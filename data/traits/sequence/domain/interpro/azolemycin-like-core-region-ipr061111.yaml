identifier: InterPro:IPR061111
label: "Azolemycin-like, core region"
definition: >-
  The azolemycin precursor peptide, AzmA, contains a mature (core) peptide region derived from the sequence VVSTCTI. Examining genomic context from that RiPP precursor peptides related to AzmA are much more similar in the leader peptide region than in the core region, and that the proper length for the percursor peptide is probably about 36 amino acids.
