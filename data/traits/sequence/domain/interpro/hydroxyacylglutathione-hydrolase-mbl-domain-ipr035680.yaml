identifier: InterPro:IPR035680
label: "Hydroxyacylglutathione hydrolase, MBL domain"
definition: >-
  Hydroxyacylglutathione hydrolase is also known as glyoxalase II, S-2-hydroxylacylglutathione hydrolase, hydroxyacylglutathione hydrolase, or acetoacetylglutathione hydrolase. In the second step of the glyoxalase system this enzyme hydrolyzes S-d-lactoylglutathione to d-lactate and regenerates glutathione in the process. It has broad substrate specificity for glutathione thiol esters, hydrolyzing a number of these species to their corresponding carboxylic acids and reduced glutathione. Glyoxalase II belongs to the metallo-beta-lactamase (MBL)-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions. The enzyme consists of two domains. The first domain folds into a four-layered β sandwich, similar to that seen in the metallo-beta-lactamases. The second domain is predominantly α-helical. The active site contains a binuclear zinc-binding site and a substrate-binding site extending over the domain interface.
