identifier: InterPro:IPR001607
label: Zinc finger, UBP-type
definition: >-
  This entry represents UBP-type zinc finger domains, which display some similarity with the Zn-binding domain of the insulinase family. The UBP-type zinc finger domain is found only in a small subfamily of ubiquitin C-terminal hydrolases (deubiquitinases or UBP), All members of this subfamily are isopeptidase-T, which are known to cleave isopeptide bonds between ubiquitin moieties. Some of the proteins containing an UBP zinc finger include: Human ubiquitin carboxyl-terminal hydrolase 13 (UBPD), Homo sapiens Ubiquitin carboxyl-terminal hydrolase 5, Homo sapiens Ubiquitin carboxyl-terminal hydrolase, Social amoeba Ubiquitin carboxyl-terminal hydrolase 8, Saccharomyces cerevisiae Ubiquitin carboxyl-terminal hydrolase 14, Saccharomyces cerevisiae Zinc finger (Znf) domains are relatively small protein motifs which contain multiple finger-like protrusions that make tandem contacts with their target molecule. Some of these domains bind zinc, but many do not; instead, they bind other metals, such as iron, or no metal at all. For example, some family members form salt bridges to stabilise the finger-like folds. They were first identified as a DNA-binding motif in transcription factor TFIIIA from Xenopus laevis (African clawed frog); however, they are now recognised to bind DNA, RNA, protein and/or lipid substrates. Their binding properties depend on the amino acid sequence of the finger domains and of the linker between fingers, as well as on the higher-order structures and the number of fingers. Znf domains are often found in clusters, where fingers can have different binding specificities. There are many superfamilies of Znf motifs, varying in both sequence and structure. They display considerable versatility in binding modes, even between members of the same class (e.g., some…
