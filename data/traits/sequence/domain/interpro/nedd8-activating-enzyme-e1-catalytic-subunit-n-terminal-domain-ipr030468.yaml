identifier: InterPro:IPR030468
label: "NEDD8-activating enzyme E1 catalytic subunit, N-terminal domain"
definition: >-
  This group of proteins includes NEDD8-activating enzyme E1 catalytic subunit (Uba3) from fungi, plants and invertebrates. In budding yeasts, it is a catalytic subunit of the dimeric Uba3-Ula1 E1 enzyme that activates NEDD8/Rub1 before neddylation, the process by which the ubiquitin-like protein NEDD8 is conjugated to its target proteins. In C.elegans, Uba3 (also known as rfl-1) is required for cytokinesis and mitotic spindle orientation. In mammals, it down-regulates steroid receptor activity and is necessary for cell cycle progression. This entry represents the N-terminal domain of Uba3.
