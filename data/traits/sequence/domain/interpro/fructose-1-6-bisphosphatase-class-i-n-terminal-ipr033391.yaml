identifier: InterPro:IPR033391
label: "Fructose-1-6-bisphosphatase class I, N-terminal"
definition: >-
  Fructose-1,6-bisphosphatase (FBPase) is a critical regulatory enzyme in gluconeogenesis that catalyses the removal of 1-phosphate from fructose 1,6-bis-phosphate to form fructose 6-phosphate. Five different classes (or types) of FBPases have been identified based on their amino acid sequences, with class I most widely distributed among living organisms. This entry represents the N terminus of the FBPase class 1 family.
