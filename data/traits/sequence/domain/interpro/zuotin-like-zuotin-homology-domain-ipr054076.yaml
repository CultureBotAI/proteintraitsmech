identifier: InterPro:IPR054076
label: "Zuotin-like, zuotin homology domain"
definition: >-
  This domain is found in Zuotin from Saccharomyces cerevisiae (ZUO1) and in similar eukaryotic sequences. ZUO1 is a component of the ribosome-associated complex (RAC), a heterodimeric chaperone complex involved in the regulation of accurate translation termination and in folding or maintaining nascent polypeptides in a folding-competent state. This entry represents its zuotin homology domain (ZHD), which is functionally important for association with ribosomes. It folds into four helices, including a three helix bundle. It is normally found C-terminal to the DnaJ domain ( ).
