identifier: InterPro:IPR008659
label: Yeast cell wall synthesis Kre9/Knh1, C-terminal
definition: >-
  This entry represents the C-terminal domain of the Knh1 protein, which is a glycoprotein that is involved in cell wall beta 1,6-glucan synthesis. Proteins containing this domain also include functional homologue of Knh1, Kre9. In Saccharomyces cerevisiae, a kre9 null mutation leads to severe growth defects, aberrant multi-budded morphology, and mating defects. Over-expression of Knh1 suppresses growth defects of a kre9 null mutant. Knh1 is required for propionic acid resistance.
