identifier: InterPro:IPR025812
label: tRNA methyltransferase 10 homolog C, TRM10-type domain
definition: >-
  Mitochondrial RNase P (mtRNase P) cleaves tRNA molecules in their 5'-ends and consists of 3 components: a tRNA methyltransferase (MRPP1/TRMT10), a dehydrogenase/reductase-family member (MRPP2/HSD17B10), and MRPP3 (KIAA03910). This entry includesTRMT10C, which is a metazoa homologue to yeast TRM10, a tRNA m1G methyltransferase responsible for modification at position 9. In humans there are three TRM10 orthologues. Mutations in TRMT10C cause mitochondrial disease. Mitochondrial ribonuclease P protein 1 homolog from Drosophila melanogaster is also included in this group. This entry represents the SAM-dependent methyltransferase TRM10-type domain.
