identifier: InterPro:IPR040847
label: "Mind bomb, SH3 repeat domain"
definition: >-
  The REP domain of Mind bomb which serves as the substrate recognition domain for a second, membrane-distal epitope of the Notch ligand (C-box). Although the first Mib repeat of REP may play a dominant role in ligand binding, the two repeats appear to cooperate in the engagement of the Jag1 tail. Mind bomb (Mib) proteins are large, multi-domain E3 ligases that promote ubiquitination of the cytoplasmic tails of Notch ligands. The structure and functional analysis, show that Mib1 contains two independent substrate recognition domains that engage two distinct epitopes from the cytoplasmic tail of the ligand Jagged1, one in the intracellular membrane proximal region and the other near the C terminus. REP domains have a five-stranded anti-parallel twisted β sheet topology similar to that of SH3 domains.
