identifier: InterPro:IPR056764
label: "EIF2B subunit epsilon/gamma, LbH domain"
definition: >-
  This entry represents the central Left-handed parallel beta-Helix (LbH) domain of Translation initiation factor eIF-2B subunit epsilon/gamma (EIF2B3/5) and similar proteins from cellular organisms. These proteins function as as components of the translation initiation factor 2B (eIF2B) complex, which catalyses the exchange of GDP for GTP on eukaryotic initiation factor 2 (eIF2) gamma subunit. EIF2B is a complex multimeric protein consisting of five subunits, alpha, beta, gamma, delta, epsilon.
