identifier: InterPro:IPR021673
label: "RIG-I-like receptor, C-terminal regulatory domain"
definition: >-
  Intracellular RIG-I-like receptors (RLRs: retinoic acid-inducible gene I, RIG-I; melanoma differenciation-associated gene 5, MDA-5; and laboratory of genetics and physiology 2, LGP2) recognise viral RNAs as pathogen-associated molecular patterns (PAMPs) and initiate an antiviral immune response. RLRs belong to the superfamily 2 (SF2) helicases or ATPases. Among SF2 ATPases, RIG-I, MDA5, and LGP2 possess a unique domain structure. RIG-I and MDA5 consist of two N-terminal caspase activation and recruitment domains (CARDs), a central SF2 type DECH box ATPase domain (consisting of two RecA-like helicase domains, Hel1 and Hel2, and an insert domain, Hel2i), and a C-terminal regulatory (CTR) domain. LGP2 lacks the two N-terminal CARDs but contains the DECH box domain, as well as the CTR domain. The CTR domain helps recognise non-self RNAs within the cellular environment. To facilitate the detection of a broad range of non-self RNA targets, each RLR contains a similar but divergent CTR domain that mediates RLR-specific interactions between bound nucleic acids or neighbouring patterns. The RLR CTR domain is a globular, slightly flattened domain with a concave and a convex side. It is structurally organised in three leaves consisting of two four-stranded (β1, β2, β9, β10 and β5, β6, β7, β8) and one two-stranded (β3, β4) antiparallel β-sheets. Small helical turns connect the three β-sheets. The two four stranded β-sheets are laterally connected by two protruding loops, each containing two highly conserved cysteine residues. Together, the four thiol groups of these cysteines coordinate a zinc ion.
