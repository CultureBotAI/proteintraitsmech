identifier: InterPro:IPR033929
label: "Tensin, phosphotyrosine-binding domain"
definition: >-
  PTB domains are classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains. This entry refers to the PTB domain found in Tensin, part of the Dab-like subgroup. The phosphotyrosine-binding domain (PTB, also phosphotyrosine-interaction or PI domain) of tensin tends to be found at the C terminus. Tensin is a multi-domain protein that binds to actin filaments and functions as a focal-adhesion molecule (focal adhesions are regions of plasma membrane through which cells attach to the extracellular matrix). Human tensin has actin-binding sites, an SH2 domain and a region similar to the tumour suppressor PTEN. The PTB domain interacts with the cytoplasmic tails of beta integrin by binding to an NPXY motif. The PTB domain is also found in the epidermal growth factor receptor kinase substrate 8 (EPS8).
