identifier: InterPro:IPR056411
label: "Cysteinyl-tRNA ligase, anticodon binding domain"
definition: >-
  This entry represents the C-terminal anticodon binding domain from Cysteinyl-tRNA ligase mainly from bacteria and archaea, but also from plants. The entry also includes the C-terminal domain of YqeB from B. subtilis. Cysteine-tRNA ligase (also known as Cysteinyl-tRNA synthetase) is an alpha monomer and belongs to class Ia. It is highly specific despite not possessing the amino acid editing activity characteristic of many other tRNA ligases.
