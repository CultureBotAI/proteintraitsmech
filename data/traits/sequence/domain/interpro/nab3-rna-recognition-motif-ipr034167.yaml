identifier: InterPro:IPR034167
label: Nab3, RNA recognition motif
definition: >-
  This entry represents the RNA recognition motif (RRM) of Nab3p (also known as Hmd1p), an acidic nuclear polyadenylated RNA-binding protein that is essential for cell viability. Nab3p is predominantly localised within the nucleoplasm and essential for growth in budding yeast. It plays an important role in the maintenance of CLN3 mRNA levels. It is part of the Nrd1 complex (Nrd1p-Nab3p-Sen1p) that directs the termination and processing of short RNA polymerase II transcripts and regulates cellular response to nutrient availability. This group of proteins also includes Uncharacterized RNA-binding protein C3H8.09c from Schizosaccharomyces pombe, the ortologous protein in fission yeast.
