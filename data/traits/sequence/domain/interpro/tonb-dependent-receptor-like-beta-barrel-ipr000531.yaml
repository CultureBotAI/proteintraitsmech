identifier: InterPro:IPR000531
label: "TonB-dependent receptor-like, beta-barrel"
definition: >-
  This entry represents the β-barrel domain which contains the plug domain ( ). This β-barrel domain is also found in vitamin B12 transporter BtuB and ferric citrate outer membrane transporter FecA, among others. TonB proteins are bacterial membrane proteins that play a crucial role in energy-dependent active transport systems. They have an N-terminal plug domain which acts as the channel gate, blocking the pore until the channel is bound by a ligand when it undergoes conformational changes and opens the channel and a C-terminal β-barrel domain. In Escherichia coli, the TonB protein interacts with outer membrane receptor proteins that carry out high-affinity binding and energy-dependent uptake of specific substrates into the periplasmic space. These substrates are either poorly permeable through the porin channels or are encountered at very low concentrations. In the absence of TonB, these receptors bind their substrates but do not carry out active transport. TonB-dependent regulatory systems consist of six components: a specialised outer membrane-localised TonB-dependent receptor (TonB-dependent transducer) that interacts with its energising TonB-ExbBD protein complex, a cytoplasmic membrane-localised anti-sigma factor and an extracytoplasmic function (ECF)-subfamily sigma factor. The TonB complex senses signals from outside the bacterial cell and transmits them via two membranes into the cytoplasm, leading to transcriptional activation of target genes. Energy for active transport is again obtained through physical interaction with TonB. The proteins that are currently known or presumed to interact with TonB include BtuB, CirA, FatA, FcuT, FecA, FhuA, FhuE, FepA which is important for iron uptake and allows the bacterium to extract iron from the environment, FptA, HemR,…
