identifier: InterPro:IPR044038
label: "dATP/dGTP diphosphohydrolase, N-terminal"
definition: >-
  This entry represents the N-terminal region of dATP/dGTP diphosphohydrolase (SHab15497_00040), an Acinetobacter phage protein that catalyses the hydrolysis of dGTP into dGMP, which is needed among others for the first step of biosynthesis of dZTP (2-amino-2'-deoxyadenosine-5'-triphosphate).
