identifier: InterPro:IPR044549
label: Transcription factor IBH1-like, bHLH domain
definition: >-
  This entry represents the bHLH domain found in a group of transcription factors from plants, including IBH1 (ILI1-BINDING BHLH 1), IBHL1 and related proteins such as UPBEAT1, PAR1 and PAR2 from Arabidopsis. IBH1 (also known as AtbHLH158) and IBHL1 are atypical and probable non DNA-binding bHLH transcription factors that act as transcriptional repressors that negatively regulate cell and organ elongation in response to gibberellin (GA) and brassinosteroid (BR) signaling. IBH1 forms heterodimer with BHLH49, thus inhibiting DNA binding of BHLH49. Another atypical transcription factors included in this entry are PAR1 (also termed AtbHLH165) and PAR2 (also termed AtbHLH166) that act as negative regulators of a variety of shade avoidance syndrome (SAS) responses. UPBEAT1 (also known as AtbHLH151 or EN 146), modulates the balance between cellular proliferation and differentiation in root growth.
