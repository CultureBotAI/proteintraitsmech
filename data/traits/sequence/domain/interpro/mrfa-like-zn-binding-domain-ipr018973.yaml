identifier: InterPro:IPR018973
label: "MrfA-like Zn-binding domain"
definition: >-
  This is the C-terminal domain in MrfA (Mitomycin repair factor A, also known as YprA in Bacillus subtilis) Zn+2-binding domain (MZB, also referred to as DUF1998) which contains a conserved four-cysteine signature motif. These four Cys reside in a short coil between two α-helices and form a metal ion-binding site. This domain is frequently found at the C-terminal of ndNTPases, however, it is also found encoded in a standalone gene, downstream of putative helicase domain-encoding genes associated with the bacterial anti-phage defence system DISARM. MrfA is a DNA helicase that supports repair of mitomycin C-induced DNA damage. MrfA homologues are widely distributed in bacteria and are also present in archaea, fungi and plants. The MrfA-homologue in yeast, Hrq1, also reduces mitomycin C sensitivity. Hrq1 has high similarity to human RecQ4 and was therefore assigned to the RecQ-like helicase family. MrfA homologues appear to be missing in enterobacteria; however, certain pathogenic Escherichia coli and Salmonella strains harbour Z5898-like helicases with this domain.
