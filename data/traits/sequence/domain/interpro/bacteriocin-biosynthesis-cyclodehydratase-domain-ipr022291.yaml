identifier: InterPro:IPR022291
label: "Bacteriocin biosynthesis, cyclodehydratase domain"
definition: >-
  A subset of microcins has been recently described in which the amino acid side chains of cysteine, serine and threonine from a ribosomally produced precursor undergo heterocyclization to generate a product with thiazole or (methyl)oxazole moieties. This small bacteriocins are called TOMMs (thiazole/oxazole-modified microcins). A trimeric complex is reponsible for the formation of these heterocycle-containing metabolites, consisting of a zinc-tetrathiolate containing cyclodehydratase, a flavin mononucleotide-dependent dehydrogenase and a docking scaffold protein. This entry represents a ThiF-like domain of a fusion protein found in clusters associated with the production of TOMMs. This domain is thought to act as a cyclodehydratase, as do members of the SagC family modelled by .
