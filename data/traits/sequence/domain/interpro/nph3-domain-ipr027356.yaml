identifier: InterPro:IPR027356
label: "NPH3 domain"
definition: >-
  The NRL (for NPH3/RPT2-Like) family is formed by signaling molecules specific to higher plants. Several regions of sequence and predicted structural conservation define members of the NRL family, with three domains being most notable: an N-terminal BTB domain, a centrally located NPH3 domain, and a C-terminal coiled coil domain. The function of the NPH3 domain is not yet known. Some proteins known to contain a NPH3 domain include: Arabidopsis non-phototropic hypocotyl 3 (NPH3), may function as an adapter or scaffold protein in plants. Arabidopsis root-phototropisme 2 (RPT2), a signal transducer involved in phototropic response and stomatal opening in association with phototropin 1 (phot1). Phototropic-responsive NPH3 family protein NPY1-5, which may act as a substrate-specific adapters of an E3 ubiquitin-protein ligase complex (CUL3-RBX1-BTB) which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. They play an essential role in auxin-mediated organogenesis and in root gravitropic responses through the control of PIN proteins. Oriza coleoptile phototropism 1 (CPT1), the rice orthologue of NPH3. It is required for phototropism of coleoptiles and lateral translocation of auxin. This entry represents the NPH3 domain.
