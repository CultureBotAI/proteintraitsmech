identifier: InterPro:IPR058986
label: "Swc3, C-terminal domain"
definition: >-
  This is the C-terminal domain of Swc3, a component of the SWR1 complex, which mediates the ATP-dependent exchange of histone H2A for the H2A variant HZT1 leading to transcriptional regulation of selected genes by chromatin remodelling. Proteins in this entry are mainly found in Pichiomycetes and Saccharomycetes.
