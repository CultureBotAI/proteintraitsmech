identifier: InterPro:IPR031844
label: "Voltage-gated hydrogen channel 1, C-terminal membrane-localisation domain"
definition: >-
  This entry represents the short C-terminal region of voltage-gated proton channel 1 proteins in higher eukaryotes. This domain is necessary for achieving the dimeric architecture, two monomers form a dimer via parallel α-helical coiled-coil interaction. This domain is also essential for localising the protein to an intracellular membrane.
