identifier: InterPro:IPR014908
label: "Nucleoporin, Nup133/Nup155-like, N-terminal"
definition: >-
  Nucleoporins are the main components of the nuclear pore complex (NPC) in eukaryotic cells, and mediate bidirectional nucleocytoplasmic transport, especially of mRNA and proteins. RNA undergoing nuclear export first encounters the basket of the nuclear pore and many nucleoporins are accessible on the basket side of the pore. The S. Cerevisiae Nup-170, equivalent to the human Nup-155, contains two structural domains: an N-terminal β-propeller and a C-terminal α-helical domain. This entry represents the N-terminal domain of nucleoporin 133 (Nup133) and other nucleoporins, including Nup155, Nup15 and Nup170. It forms a seven-bladed β propeller structure.
