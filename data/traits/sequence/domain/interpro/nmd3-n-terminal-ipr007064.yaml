identifier: InterPro:IPR007064
label: "Nmd3, N-terminal"
definition: >-
  Nmd3 acts as an adapter for the XPO1/CRM1-mediated export of the 60S ribosomal subunit. This N-terminal region contains four conserved CXXC motifs that could be metal binding.
