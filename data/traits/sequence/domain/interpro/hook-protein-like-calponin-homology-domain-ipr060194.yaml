identifier: InterPro:IPR060194
label: "Hook protein-like, calponin-homology domain"
definition: >-
  This entry represents an N-terminal calponin homology domain found in apicomplexan hook like proteins. The CH domain of other HOOK proteins mediates binding to microtubules.
