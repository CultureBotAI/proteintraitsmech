identifier: InterPro:IPR053959
label: "YvlB/LiaX, N-terminal domain"
definition: >-
  This entry represents a small domain found at the N-terminal of the uncharacterised protein YvlB from Bacillus subtilis, the putative adhesin domain-containing protein LiaX from Enterococcus faecalis and similar prokaryotic sequences. In some members, this domain occurs as a fusion of ZnR+DUF2089-HTH+SHOCT-like, where it is found at the C-terminal of DUF2089. LiaX from is involved in cell membrane remodeling, perhaps acting by negative modulation of the liaFSR and liaXYZ gene clusters, thereby regulating content and localization of anionic phospholipids. It binds to the antibiotic daptomycin (DAP) and to cationic antimicrobial peptides, such as human LL-37, likely functioning as a sensor that activates the cell envelope stress response.
