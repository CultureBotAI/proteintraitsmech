identifier: InterPro:IPR054164
label: "Restriction endonuclease BpuSI, specificity domain"
definition: >-
  This domain is found at the C-terminal of the restriction endonuclease BpuSI from Bacillus pumilus and similar bacterial sequences. BpuSI is a Type IIG restriction endonuclease that consists of three functional domains: an N-terminal domain , a N-6 DNA methylase domain and a C-terminal specificity domain (TRD, this entry), which includes a final domain with a mixed α/β structure and unknown function.
