identifier: InterPro:IPR040870
label: "HEN1, double-stranded RNA binding domain 2"
definition: >-
  This domain is found in HEN1 proteins from Arabidopsis. Structural characterization revealed that small RNA substrate binds to two double-stranded RNA (dsRNA)-specific binding domains, dsRBD1 and dsRBD2. This entry relates to dsRBD2 which together with dsRBD1 forms a strong grip on the duplex region of the small RNA substrate, and these interactions help position the other duplex terminus towards the MTase domain.
