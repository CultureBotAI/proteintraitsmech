identifier: InterPro:IPR062275
label: "AtoS, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of signal transduction histidine-protein kinase AtoS, found in bacteria. This sensor kinase is part of a two- component regulatory system involved in short-chain fatty acid metabolism.
