identifier: InterPro:IPR060516
label: "Mitochondrial nucleoid-associated protein 1, zinc finger domain"
definition: >-
  This entry represents a small zinc finger domain found at the N-terminal of mitochondrial nucleoid-associated protein 1 (MTNAP1) from vertebrates. While the full-length protein has established functions in mitochondrial DNA regulation, the specific role of this N-terminal zinc finger domain remains to be determined. Mitochondrial nucleoid-associated protein 1 (MTNAP1, previously known as C17orf80) has been identified as is a mitochondrial membrane-associated protein that interacts with nucleoids. It is a critical regulator of mitochondrial DNA abundance that binds double-stranded DNA throughout the mitochondrial genome without sequence specificity. MTNAP1 controls mitochondrial DNA copy number by promoting its replication and plays important roles in mitochondrial metabolism and cell proliferation. The protein is localised to mitochondrial nucleoids in the matrix and is retained in nucleoids under mitochondrial DNA replication stress. MTNAP1 is a single-pass type I membrane protein anchored in the mitochondrial inner membrane. MTNAP1 also plays important roles in mitochondrial metabolism and cell proliferation.
