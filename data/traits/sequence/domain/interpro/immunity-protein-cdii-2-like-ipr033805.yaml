identifier: InterPro:IPR033805
label: "Immunity protein CdiI-2-like"
definition: >-
  CDI toxins are expressed by Gram-negative bacteria as part of a mechanism to inhibit the growth of neighbouring cells. Secretion of the CdiA effector protein is dependent on the outer membrane protein CdiB. An additional small immunity protein (CdiI) protects cells from autoinhibition. They are intracellular proteins that inactivate the toxin/effector protein. This entry represents the inhibitor of the CdiA effector protein from Burkholderia pseudomallei 1026b (which is a tRNAse).
