identifier: InterPro:IPR048668
label: "Cytokine receptor common subunit beta, N-terminal"
definition: >-
  This entry represents the first Ig-like domain of human IL3RB ( ) and similar sequences from vertebrates. Cytokine receptor common subunit beta (IL3RB) is a cell surface receptor that plays a role in immune response and controls the production and differentiation of haematopoietic progenitor cells into lineage-restricted cells. It participates in the signalling pathways of interleukin-3, interleukin-5 and granulocyte-macrophage colony-stimulating factor/CSF2 which have overlapping activities on haematopoietic cells and have been implicated in the pathogenesis of allergic diseases of the lung. IL3RB consists of four extracellular domains with an Ig-like fold.
