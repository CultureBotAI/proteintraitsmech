identifier: InterPro:IPR049414
label: "VopL, C-terminal dimerization domain"
definition: >-
  The VopL C-terminal dimerization domain (VCD) is found in Vibrio parahaemolyticus protein L (VopL, ), an actin nucleation factor that induces stress fibres when injected into eukaryotic host cells. VCD shows a mainly α-helical fold, forms a U-shaped dimer and interacts with the pointed end of the actin nucleus, contributing to the nucleation activity directly.
