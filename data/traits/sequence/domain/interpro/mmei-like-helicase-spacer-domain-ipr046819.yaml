identifier: InterPro:IPR046819
label: "MmeI-like, helicase spacer domain"
definition: >-
  Type IIL Restriction-Modification Enzyme MmeI is a large enzyme that integrates DNA recognition and methyltransferase and endonuclease activities within the same polypeptide. This entry also includes DNA methyltransferase A, a MmeI homologue that lacks endonuclease activity. MmeI is composed of five domains. An N-terminal endonuclease domain (residues 1-155), connects to a DNA-methyltransferase domain (MTase, residues 301-320) via a multi-helical spacer (residues 156-300). These are followed by the target recognition domain (TRD, residues 621-825), and a final C-terminal helical bundle (residues 826-919). The endonuclease cuts the two DNA strands at one site simultaneously with enzyme bound at two sites interacting to accomplish the cleavage. This domain corresponds to the multi-helical spacer. It is thought to play a key role in positioning the endonuclease cleavage domain correctly.
