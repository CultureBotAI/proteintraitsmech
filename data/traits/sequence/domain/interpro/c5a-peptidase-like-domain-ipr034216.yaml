label: "C5a peptidase-like domain"
definition: >-
  Streptococcal cell-wall C5a peptidase (SCP; MEROPS identifier S08.020) is a highly specific endopeptidase and adhesin/invasin containing a subtilisin domain (peptidase family S8, subfamily S8A). The peptidase cleaves complement component C5a. The subtilisin-like domain is located at the N-terminal and contains a PA (protease-associated) domain inserted into a loop ( ). There are three fibronectin type III (Fn) domains at the C terminus. SCP binds to integrins with the help of Arg-Gly-Asp motifs, which are thought to stabilise conformational changes required for substrate binding. This domain is also found in other characterised peptidases, most of them also binding to the bacterial cell wall, including cell envelope peptidase A (S08.027) and PrtA (S08.064) from Streptocccus spp. which are virulence factors; lactocepins (S08.019, S08.018, S08.118,S08.147) from Lactobacilli, which are multi-domain proteins; collagenolytic endopeptidase from Geobacillus (S08.142); and SufA (S08.138) from Finegoldia which is fibrinolytic. The subtilisin family is one of the largest serine peptidase families characterised to date. Over 200 subtilisins are presently known, more than 170 of which have their complete amino acid sequence. It is widespread, being found in eubacteria, archaebacteria, eukaryotes and viruses. The vast majority of the family are endopeptidases, although there is an exopeptidase, tripeptidyl peptidase. Structures have been determined for several members of the subtilisin family: they exploit the same catalytic triad as the chymotrypsins, although the residues occur in a different order (HDS in chymotrypsin and DHS in subtilisin), but the structures show no other similarity. Some subtilisins are mosaic proteins, while others contain N- and C-terminal extensions that s…
