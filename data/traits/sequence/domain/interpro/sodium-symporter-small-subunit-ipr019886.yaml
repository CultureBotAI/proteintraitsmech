identifier: InterPro:IPR019886
label: "Sodium symporter small subunit"
definition: >-
  Proteins matched by this entry are highly hydrophobic bacterial proteins of about 90 amino acids in length. They are usually found immediately upstream (sometimes fused to) a member of the solute:sodium symporter family, and are therefore putative sodium:solute symporter small subunits. They tend to be found in aquatic bacteria, especially those from marine or other high salt environments.
