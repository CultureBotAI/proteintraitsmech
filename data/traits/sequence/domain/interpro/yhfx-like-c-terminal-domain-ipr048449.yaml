label: "YhfX-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of a group of bacterial proteins, including the uncharacterised protein YhfX from Escherichia coli, which may be related to DNA recombination. The function of this domain is still unknown. It is often found associated to .
