identifier: InterPro:IPR022159
label: "Tuftelin interacting protein, N-terminal domain"
definition: >-
  This domain is found in septin and tuftelin-interacting protein (STIP) and tuftelin-interacting protein 11 (TFIP11). STIP is essential for embryogenesis in Caenorhabditis elegans. Tuftelin-interacting protein 11 is a component of the spliceosome involved in spliceosome disassembly. TFIP11 was first identified in a yeast two-hybrid screening as a protein interacting with tuftelin, one of the presumed enamel matrix proteins.
