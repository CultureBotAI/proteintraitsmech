identifier: InterPro:IPR055108
label: "Syntrophin, C-terminal PH domain"
definition: >-
  This entry represents the C-terminal PH domain found in syntrophin proteins. The syntrophin family are intracellular membrane-associated proteins that interact with both ion channels and signalling proteins. As such, syntrophins appear to be important for linking ion channels to intracellular signalling pathways. Syntrophins are concentrated at postsynaptic sites at the neuromuscular junction and may be involved in clustering acetylcholine receptors. In muscle and non-muscle tissues, syntrophin is associated with dystrophin, utrophin, and two homologues of the dystrophin carboxy-terminal region.
