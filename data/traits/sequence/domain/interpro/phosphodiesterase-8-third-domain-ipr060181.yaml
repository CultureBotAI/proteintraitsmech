identifier: InterPro:IPR060181
label: "Phosphodiesterase 8, third domain"
definition: >-
  This entry represents a small bihelical domain that forms the third domain in phosphodiesterase 8A (PDE8A) and 8B (PDE8B). PDE8A and PDE8B are high affinity cAMP-specific phosphodiesterases that hydrolyse the second messenger cAMP. These enzymes are insensitive to the non-selective phosphodiesterase inhibitor IBMX. The proteins typically contain an N-terminal PDE8A_N domain, followed by PAS, this bihelical domain, and the catalytic PDEase domain. This entry is predominantly found in vertebrates, particularly in mammals, birds, and fish. The specific function of this bihelical domain remains to be determined.
