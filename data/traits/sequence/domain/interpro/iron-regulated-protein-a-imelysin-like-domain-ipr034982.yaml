identifier: InterPro:IPR034982
label: "Iron-regulated protein A, imelysin-like domain"
definition: >-
  Putative iron-regulated protein A (IrpA), found mainly in Bacteriodes, proteobacteria and cyanobacteria, contains a domain similar to insulin-cleaving membrane protease (imelysin, ICMP) protein. IrpA has been shown to be essential for growth under iron-deficient conditions in the cyanobacteria Synechococcus sp. The conserved GxHxxE motif is similar to other known imelysin-like proteins that are regulated by iron, such as ICMP and EfeO.
