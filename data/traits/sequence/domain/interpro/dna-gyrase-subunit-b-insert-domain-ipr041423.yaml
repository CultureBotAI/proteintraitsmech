identifier: InterPro:IPR041423
label: "DNA gyrase subunit B insert domain"
definition: >-
  This is the insert domain found in DNA gyrase B subunit proteins. Studies indicate that the insert has two functions, acting as a steric buttress to pre-configure the primary DNA-binding site, and serving as a relay that may help coordinate communication between different functional domains.
