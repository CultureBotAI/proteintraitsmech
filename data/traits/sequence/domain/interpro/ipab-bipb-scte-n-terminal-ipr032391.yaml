identifier: InterPro:IPR032391
label: "IpaB/BipB/SctE, N-terminal"
definition: >-
  This entry represents the N-terminal coiled-coil region of the invasin IpaB, BipB and SipB. IpaB (also known as SctE) from Shigella sp., which forms a pore with IpaC and is inserted into the host cell membrane through the Mxi/Spa apparatus during cell contact. BipB from Burkholderia sp., which plays a role in the bacterium-induced formation of multinucleated giant cell (MNGC), which is formed after host cell fusion, as well as in the intercellular spreading of bacteria and in the induction of apoptosis in macrophages. BipB may act in concert with other effector proteins to induce fusion of host cell membranes. SipB (also known as SPI-1 type 3 secretion system translocon protein SctE) from Salmonella sp., which is required for entry into the host cell through presentation or delivery of SipC at the host cell plasma membrane. This domain is homologous in activity to the pore-forming toxins of other Gram-negative pathogens, such as colicin Ia.
