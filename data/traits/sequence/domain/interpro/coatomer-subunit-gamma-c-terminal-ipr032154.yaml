identifier: InterPro:IPR032154
label: "Coatomer subunit gamma, C-terminal"
definition: >-
  This entry represents the very C-terminal domain of the eukaryotic Coatomer subunit gamma proteins. It acts as a platform domain to the C-terminal appendage. It carries one single protein/protein interaction site, which is the binding site for ARFGAP2 or ADP-ribosylation factor GTPase-activating protein. COPI-coated vesicles mediate retrograde transport from the Golgi back to the ER and intra-Golgi transport. The gamma subunit is part of one of two subcomplexes that make up the heptameric coatomer complex along with the beta, delta and zeta subunits.
