identifier: InterPro:IPR058753
label: "Otogelin-like/Mucin, TIL domain"
definition: >-
  This entry describes a trypsin inhibitor-like (TIL) cysteine rich domain found in Otogelin, Otogelin-like proteins and some Mucin proteins from eukaryotes. The TIL domain is characterised by the presence of five disulphide bonds (two of which are located on either side of the reactive site) in a single small protein domain of 61-62 residues. Otogelin is a structurally complex glycoprotein with specialised roles in the inner ear membranes. While it shares some structural similarities with mucins, including von Willebrand factor-like domains and cysteine-rich regions, it differs in its glycosylation patterns and functions. Otogelin undergoes primarily N-glycosylation and plays a critical role in the organisation of the extracellular matrix within the inner ear. Otogelin proteins are specific to the acellular membranes of the inner ear. Otogelin and Otogelin-like proteins are potentially involved in the anchoring of otoconial membranes and cupulae to the underlying neuroepithelia in the vestibule. They may also play a role in the organisation and stabilisation of the fibrillar network that composes the tectorial membrane in the cochlea. Additionally, these proteins might be involved in mechanotransduction processes, which are crucial for the conversion of mechanical stimuli in neural signals in the auditory system. Mucins like MUC5B and MUC19 are heavily O-glycosylated, gel-forming proteins that provide lubrication and protective barriers on mucosal epithelial surfaces.
