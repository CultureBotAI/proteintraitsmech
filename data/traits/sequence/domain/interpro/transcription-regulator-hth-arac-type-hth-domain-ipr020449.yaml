identifier: InterPro:IPR020449
label: "Transcription regulator HTH, AraC- type, HTH domain"
definition: >-
  Numerous bacterial transcription regulatory proteins bind DNA via a helix-turn-helix (HTH) motif. These proteins are very diverse, but for convenience may be grouped into subfamilies on the basis of sequence similarity. One such family groups together a range of proteins, including AppY, EnvY, ExsA, FapR, MmsR, RhaR, RhaS, Rns, SoxS, and VirF. Although the sequences belonging to this family differ somewhat in length, in each case the HTH motif, represented by this entry, is situated towards the C terminus.
