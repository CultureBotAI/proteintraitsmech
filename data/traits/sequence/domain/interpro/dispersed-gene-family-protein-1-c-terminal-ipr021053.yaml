identifier: InterPro:IPR021053
label: "Dispersed gene family protein 1, C-terminal"
definition: >-
  Dispersed gene family protein 1 (DGF-1) of Trypanosoma cruzi is one of the most abundant proteins in T. cruzi genome. It seems to have a preferential expression in amastigotes (intracellular replicative forms that develop in the mammalian host). The function of this protein is not yet clear, however, it is likely to play a role in cell-to-cell interactions or signal transduction. This entry represents the C-terminal domain on this protein.
