identifier: InterPro:IPR056591
label: "ELP3-like, N-terminal domain"
definition: >-
  This domain is found N-terminal in Elongator complex protein 3 (ELP3) and related proteins. ELP3 is required for multiple modifications of tRNA. In the elongation complex, it acts as a tRNA uridine(34) acetyltransferase. It may also act as a lysine acetyltransferase by mediating acetylation of target proteins. The domain represented by this entry is predicted to fold into a globular structure consisting of two nearly orthogonal α-helical hairpins.
