identifier: InterPro:IPR054395
label: "Capsid protein, C-terminal domain, fungal virus"
definition: >-
  This domain is found at the C-terminal end of Capsid protein from Penicillium chrysogenum virus (P2), which self-assembles to form an icosahedral capsid with a T=1 symmetry. It is organised into two domains with similar α-β topology.
