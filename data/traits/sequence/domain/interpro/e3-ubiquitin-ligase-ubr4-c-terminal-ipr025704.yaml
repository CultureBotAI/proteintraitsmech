identifier: InterPro:IPR025704
label: "E3 ubiquitin ligase UBR4, C-terminal"
definition: >-
  Proteins containing this domain includes E3 ubiquitin ligase UBR4 from animals, auxin transport protein BIG from plants and protein purity of essence from fruit flies. UBR4, also known as p600, is a member of the N-recognin family, which contains proven and predicted E3 ligases that recognize and degrade proteins containing destabilizing N termini. It is involved in anoikis, viral transformation and protein degradation. It also has roles in neurogenesis, neuronal migration, neuronal signaling and survival in mammalian brains. BIG is required for auxin efflux and polar auxin transport (PAT) influencing auxin-mediated developmental responses (e.g. cell elongation, apical dominance, lateral root production, inflorescence architecture, general growth and development). Auxin transport protein is also involved in the elongation of the pedicels and stem internodes through auxin action, the expression/modulation of light-regulated genes, repression of CAB1 and CAB3 genes in etiolated seedlings, etc. Protein purity of essence, found in Drosophila melanogaster, has a role in growth of the perineurial glial layer of the larval peripheral nerve and it may have a role in male fertility and eye development or function.
