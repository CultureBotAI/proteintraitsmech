identifier: InterPro:IPR047265
label: "Transcription factor PIF1-like, basic helix-loop-helix domain"
definition: >-
  This entry represents the basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana phytochrome interacting factors (PIFs) and similar transcription factors from plants, including ALC, PIL1, SPATULA, and UNE10. PIFs (PIF1/3/4/5/6/7) have been shown to control light-regulated gene expression. They directly bind to the photoactivated phytochromes and are degraded in response to light signals. ALC, also termed protein ALCATRAZ, is required for the dehiscence of fruit, especially for the separation of the valve cells from the replum. It promotes the differentiation of a strip of labile non-lignified cells sandwiched between layers of lignified cells. PIL1 is involved in responses to transient and long-term shade. It is required for the light-mediated inhibition of hypocotyl elongation and necessary for rapid light-induced expression of the photomorphogenesis- and circadian-related gene APRR9. PIL1 seems to play a role in multiple PHYB responses, such as flowering transition and petiole elongation. SPATULA plays a role in floral organogenesis. It promotes the growth of carpel margins and of pollen tract tissues derived from them. UNE10 is required during the fertilization of ovules by pollen.
