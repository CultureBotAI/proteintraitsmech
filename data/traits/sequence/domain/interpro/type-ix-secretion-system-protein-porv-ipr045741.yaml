identifier: InterPro:IPR045741
label: "Type IX secretion system protein PorV"
definition: >-
  This entry represents the PorV protein. The Bacteroidete T9SS contains at least 15 proteins. PorQ, PorU, PorV and PorZ form a cell surface-exposed attachment complex that proteolytically removes the substrate CTD following transport and covalently links some substrate proteins to a lipopolysaccharide anchor. A pool of PorV proteins in the outer membrane is thought to shuttle substrate proteins from the translocon to the attachment complex. The PorV protein has a membrane β barrel topology.
