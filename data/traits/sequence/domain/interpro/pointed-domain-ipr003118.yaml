identifier: InterPro:IPR003118
label: Pointed domain
definition: >-
  The highly conserved PNT (or Pointed) domain is found within a subset of the Ets transcription factors, including mammalian Ets-1, Ets-2, Erg, Fli-1, GABPalpha, and Tel, as well as Drosophila Pnt-P2 and Yan. The PNT domain is structurally related to the larger group of SAM domains through a common tertiary arrangement of four α-helices. A role in protein-protein association has been established for the PNT domain.
