identifier: InterPro:IPR038722
label: "Ner, winged helix-turn-helix DNA-binding domain"
definition: >-
  This entry represent the winged helix-turn-helix DNA-binding found in Ner, a transcriptional regulator from Escherichia phage Mu. This domain can also be found in sugar fermentation stimulation protein B (sfsB), also known as Ner-like protein, from Escherichia coli.
