identifier: InterPro:IPR040625
label: "Restriction endonuclease, SH3 domain"
definition: >-
  This is an N-terminal β-barrel domain found in the Hpy99I protomer region. Hpy99I is a type II restriction endonuclease (REase) found in the gastric pathogen Helicobacter pylori. The β-barrel domain has the SH3-domain fold. Deletion of the β-barrel domain drastically reduced the activity of Hpy99I.
