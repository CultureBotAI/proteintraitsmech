identifier: InterPro:IPR063728
label: "TSET complex tstB/TSAUCER-like domain"
definition: >-
  This entry represents a region of ARM-type repeats found in tstB (also known as TSAUCER), a component of the TSET complex. The TSET complex is a heterohexameric membrane trafficking complex that may function in plasma membrane turnover. Members are found across amoebozoa and plants. In plants, homologous proteins are known as TASH3 (TPLATE-associated SH3 domain-containing protein 3) and are components of the related TPLATE complex. These proteins typically contain a C-terminal SH3 domain ( ).
