identifier: InterPro:IPR047298
label: "Survival motor neuron protein, Tudor domain, eumetazoa"
definition: >-
  This entry represents the central, highly conserved Tudor domain of SMN and similar animal proteins. This domain is required for U snRNP assembly and Sm protein binding and has been shown to bind arginine-glycine-rich motifs in an methylarginine-dependent manner. Survival motor neuron protein (SMN) is part of a multimeric SMN complex that includes spliceosomal Sm core proteins and plays a catalyst role in the assembly of small nuclear ribonucleoproteins (snRNPs), the building blocks of the spliceosome. Mutations in human SMN lead to motor neuron degeneration and spinal muscular atrophy.
