label: "GINS subunit, domain A"
definition: >-
  This entry represents an α-helical domain found in the DNA replication complex GINS proteins. The GINS complex is essential for initiation of DNA replication in Xenopus egg extracts. In eukaryotes, GINS consists of four different subunits (Sld5, Psf1, Psf2, and Psf3), while in archaea it forms as a tetramer of two subunits (Gins15 and Gins23). Only Gins23 is included in this entry. GINS associates with MCM (Minichromosome Maintenance) and Cdc45 to form the CMG (Cdc45-MCM-GINS) complex, which functions as the replicative helicase essential for DNA unwinding during replication. The archaeal GINS complex has a more symmetrical structure compared to its eukaryotic counterpart, and this is reflected in the archaeal CMG containing two copies of Cdc45. In Sulfolobus, the Gins15 subunit interacts with Cdc45 through its C-terminal B domain, while Gins23 interacts with the N-terminal domains of MCM. Electron microscopy of GINS shows that it forms a ring-like structure, reminiscent of the structure of PCNA, the DNA polymerase delta replication clamp. The eukaryotic GINS subunits are homologous. The four subunits of the complex consist of two domains each, termed the α-helical (A) and β-strand (B) domains. The A and B domains of Sld5/Psf1 are permuted with respect to Psf1/Psf3. DNA replication in eukaryotes results from a highly coordinated interaction between proteins, often as part of protein complexes, and the DNA template. One of the key early steps leading to DNA replication is formation of the pre-replication complex, or pre-RC. The pre-RC is formed by the sequential binding of the origin recognition complex (ORC), Cdc6 and Cdt1 proteins, and the MCM complex. Activation of the pre-RC into the initiation complex (IC) is achieved via the action of S-phase kinases, eventually l…
