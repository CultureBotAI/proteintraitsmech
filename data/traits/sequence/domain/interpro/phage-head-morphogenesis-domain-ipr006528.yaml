identifier: InterPro:IPR006528
label: "Phage head morphogenesis domain"
definition: >-
  This domain is found in proteins found in the tailed bacteriophages Caudovirales and in bacterial prophages, internally or toward the C terminus. Minor head protein GP7 from Bacillus phage SPP1 is required for viral head morphogenesis. Gp7 binds the viral DNA inside the capsid and the portal protein and may control the DNA exit from the virion.
