identifier: InterPro:IPR049383
label: "3-octaprenyl-4-hydroxybenzoate carboxy-lyase-like, N-terminal domain"
definition: >-
  This domain is found N-terminal in 3-octaprenyl-4-hydroxybenzoate carboxy-lyase from Escherichia coli (UbiD) and similar sequences from cellular organisms. This enzyme catalyses the third reaction in ubiquinone biosynthesis and requires Mn2+ for optimal activity. This domain is also found in a number of decarboxylase enzymes such as bacterial Gallate decarboxylase, Pyrrole-2-carboxylic acid decarboxylase and Phenolic acid decarboxylase; and yeast Ferulic acid decarboxylase 1.
