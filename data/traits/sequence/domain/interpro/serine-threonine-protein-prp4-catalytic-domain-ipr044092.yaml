identifier: InterPro:IPR044092
label: Serine/threonine-protein PRP4, catalytic domain
definition: >-
  PRP4 phosphorylates a number of factors involved in the formation of active spliceosomes, which catalyse pre-mRNA splicing. It phosphorylates PRP6 and PRP31, components of the U4/U6-U5 tri-small nuclear ribonucleoprotein (snRNP), during spliceosomal complex formation. In fission yeast, PRP4 phosphorylates the splicing factor PRP1 (U5-102 kD in mammals). Thus, PRP4 plays a key role in regulating spliceosome assembly and pre-mRNA splicing. It also plays an important role in mitosis by acting as a spindle assembly checkpoint kinase that is required for chromosome alignment and the recruitment of the checkpoint proteins MPS1, MAD1, and MAD2 at kinetochores. This entry represents the catalytic domain of PRP4.
