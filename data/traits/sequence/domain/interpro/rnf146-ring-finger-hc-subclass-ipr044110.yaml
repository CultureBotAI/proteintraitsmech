identifier: InterPro:IPR044110
label: "RNF146, RING finger, HC subclass"
definition: >-
  RNF146 is a poly(ADP-ribose)-directed E3 ligase that regulates axin degradation and Wnt signalling. It contains an N-terminal RING domain followed by a WWE domain that binds iso-ADPr. RNF146 is a RING E3 ligase whose activities are regulated by non-covalent ligand binding. This entry represents the N-terminal C3HC4-type RING-HC finger found in RNF146.
