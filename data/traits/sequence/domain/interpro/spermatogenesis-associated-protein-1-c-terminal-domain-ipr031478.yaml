identifier: InterPro:IPR031478
label: "Spermatogenesis-associated protein 1, C-terminal domain"
definition: >-
  The spermatogenesis associated 1 (SPATA1) protein is thought to be involved in spermatogenesis and is a potential marker for male fertility. This entry represents the C-terminal domain of SPATA1.
