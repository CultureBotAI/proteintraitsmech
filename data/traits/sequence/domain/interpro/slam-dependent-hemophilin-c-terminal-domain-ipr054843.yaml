identifier: InterPro:IPR054843
label: "Slam-dependent hemophilin, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Slam-dependent hemophilins found in Acinetobacter baumannii, Haemophilus influenzae and related Gram-negative bacteria, which consists of a β-barrel. Hemophilins are part of a high affinity heme acquisition system. It functions as a hemophore that acquires heme from human hemoglobin and delivers the heme to its cognate receptor, HphR, facilitating transport of heme across the bacterial outer membrane. It can also acquire heme complexed to human serum albumin. It plays a supporting role for full virulence, acting as an accessory factor that enhances the process of heme uptake.
