identifier: InterPro:IPR008745
label: "Domain of unknown function DUF1717"
definition: >-
  The domain is found towards the N terminus of the polyprotein of Apple stem grooving virus (strain P-209) (ASGV), Citrus tatter leaf virus and from Apple stem grooving virus (strain Korea) (ASGV) (Pear black necrotic leaf spot virus). It is a putative RNA-directed RNA polymerase/helicase: replicates genomic RNA, and might as well transcribe a subgenomic RNA coding for coat protein.
