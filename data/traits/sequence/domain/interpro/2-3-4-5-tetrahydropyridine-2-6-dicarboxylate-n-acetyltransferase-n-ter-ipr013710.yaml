identifier: InterPro:IPR013710
label: 2,3,4,5-tetrahydropyridine-2,6-dicarboxylate N-acetyltransferase, N-terminal
definition: >-
  This domain is found at the N terminus of t2,3,4,5-tetrahydropyridine-2,6-dicarboxylate N-acetyltransferase (DapH) which catalyses the acylation of L-2-amino-6-oxopimelate to 2-N-acetyl-6-oxopimelate in the meso-diaminopimelate/lysine biosynthetic pathway of bacteria, blue-green algae, and plants. The N-terminal domain as defined here contains three α-helices and two twisted hairpin loops.
