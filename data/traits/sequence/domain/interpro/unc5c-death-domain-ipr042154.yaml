identifier: InterPro:IPR042154
label: "UNC5C, death domain"
definition: >-
  This entry represents the death domain (DD) found in Uncoordinated-5C (UNC5C), which is a receptor for the secreted netrin-1 and plays a role in axonal guidance, angiogenesis, and apoptosis. It belongs to the UNC-5 family. UNC5C plays a critical role in the development of spinal accessory motor neurons. Methylation of the UNC5C gene is associated with early stages of colorectal carcinogenesis. UNC5 proteins are transmembrane proteins with an extracellular domain consisting of two immunoglobulin repeats, two thrombospondin type-I modules and an intracellular region containing a ZU-5 domain, UPA domain and a DD. DDs (Death domains) are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes.
