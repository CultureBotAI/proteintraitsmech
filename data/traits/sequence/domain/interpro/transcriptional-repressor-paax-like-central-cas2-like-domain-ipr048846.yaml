identifier: InterPro:IPR048846
label: "Transcriptional repressor PaaX-like, central Cas2-like domain"
definition: >-
  This entry represents the central domain of the Transcriptional repressor PaaX from Escherichia coli and similar bacterial proteins. PaaX is involved in metabolism of phenylacetic acid. This domain is structurally related to the Cas2 ribonuclease domain, suggesting that these proteins may degrade mRNAs to carry out regulation.
