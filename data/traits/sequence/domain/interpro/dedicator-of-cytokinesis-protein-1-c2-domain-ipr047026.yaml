identifier: InterPro:IPR047026
label: "Dedicator of cytokinesis protein 1, C2 domain"
definition: >-
  DOCK1, also called Dock180, is a class A DOCK and an atypical guanine nucleotide exchange factor (GEF). DOCK1 interacts with the scaffold protein Elmo and the resulting complex functions upstream of Rac in many biological events including phagocytosis of apoptotic cells, cell migration and invasion. Class A DOCKs contain a C2 domain and additionally, an SH3 domain at the N-terminal region and a PxxP motif at the C-terminal; they are specific GEFs for Rac. This entry represents the C2 domain of DOCK1. This domain has been shown to bind phosphatidylinositol-3, 4, 5-triphosphate (PtdIns(3,4,5)P3).
