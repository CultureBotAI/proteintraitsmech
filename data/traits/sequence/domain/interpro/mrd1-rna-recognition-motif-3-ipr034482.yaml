identifier: InterPro:IPR034482
label: "Mrd1, RNA recognition motif 3"
definition: >-
  This entry represents the RNA recognition motif 3 (RRM3) of Mrd1. It is well-conserved in yeast, and its homologues exist in all eukaryotes. Mrd1 is present in the nucleolus and the nucleoplasm. It interacts with the 35 S precursor rRNA (pre-rRNA) and U3 small nucleolar RNAs (snoRNAs). Mrd1 is essential for the initial processing at the A0-A2 cleavage sites in the 35 S pre-rRNA. It contains 5 conserved RNA recognition motifs (RRMs), which may play an important structural role in organizing specific rRNA processing events.
