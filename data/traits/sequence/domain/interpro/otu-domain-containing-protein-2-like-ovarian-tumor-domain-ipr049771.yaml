identifier: InterPro:IPR049771
label: "OTU domain-containing protein 2-like, ovarian tumor domain"
definition: >-
  This entry represents the OTU (ovarian tumor) domain of OTU domain-containing protein 2 from Saccharomyces cerevisiae (OTU2), Ubiquitin thioesterase otu2 from Schizosaccharomyces pombe and similar proteins from ascomycetes. The S. pombe OTU2 is an ubiquitin thioesterase/hydrolase ( ) that can remove conjugated ubiquitin from protein substrates and may therefore play an important regulatory role at the level of protein turnover by preventing degradation. The fungal OTU2 belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as a catalytic triad.
