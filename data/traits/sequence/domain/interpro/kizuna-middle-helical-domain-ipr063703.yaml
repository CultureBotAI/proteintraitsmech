identifier: InterPro:IPR063703
label: "Kizuna, middle helical domain"
definition: >-
  This entry represents a helical domain found in some members of the centrosomal protein kizuna mainly in some vertebrates. This domain is not present in all kizuna proteins, being absent in mammals and aves. Kizuna is a centrosomal protein required for establishing mitotic centrosome architecture and stabilising the pericentriolar material around the centriole. Kizuna localises to the centrosome and cilium basal body. Some kizuna proteins also contain an N-terminal domain. The specific function of this domain remains to be determined.
