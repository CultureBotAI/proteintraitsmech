identifier: InterPro:IPR033082
label: Death-inducer obliterator 1, PHD finger
definition: >-
  The human death-inducer obliterator (Dido) gene encodes three splicing variants: Dido1, 2, and 3. Dido1, the shortest isoform, is a putative transcription factor that plays an important role in regulating embryonic stem cell maintenance. It has been implicated in apoptosis and development and is a tumour suppressor. This entry represents the highly conserved plant homeodomain (PHD) finger, which is responsible for the binding of histone H3 with a higher affinity for trimethylated lysine 4 (H3K4me3) and necessary to modulate cell differentiation and division.
