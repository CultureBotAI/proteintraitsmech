identifier: InterPro:IPR056228
label: "ABCC10-like, N-terminal domain"
definition: >-
  This domain is found N-terminal in the ABC transporter C family member 10 (ABCC10) from Arabidopsis thaliana and related proteins. ABCC10 is likely to pump for glutathione S-conjugates. This is a transmembrane domain whose function is unknown.
