identifier: InterPro:IPR056984
label: "Repressor Rok, winged helix domain"
definition: >-
  This entry represents the C-terminal domain of repressor Rok from Bacillus subtilis. This domain shows a typical winged helix fold, with a novel DNA recognition mechanism different from other winged helix proteins or xenogeneic silencers. Rok is a nucleoid-associated protein that functions as a transcriptional repressor in Bacillus subtilis, binding preferentially to A+T-rich DNA sequences. Rok represses genes for cell surface and extracellular functions, including the competence transcription factor comK. The Rok protein is functionally analogous to H-NS nucleoid-associated proteins found in Gram-negative bacteria, helping to silence horizontally acquired genes that are typically A+T-rich. Rok protein contains an N-terminal oligomerisation domain represented by and a C-terminal winged-helix domain represented by .
