identifier: InterPro:IPR060089
label: "Ras guanine nucleotide exchange factor W, alpha-helical domain"
definition: >-
  This entry represents a domain found in Ras guanine nucleotide exchange factor W (GefW) from Dictyostelium discoideum and similar RasGEFs mostly found in lower eukaryotes such as social amoebae, microalgae, and protists. RasGEFs promote the exchange of Ras-bound GDP for GTP. Social amoebae encode at least 25 RasGEF proteins, which have been found to be important in development and chemotaxis. This entry also includes putative guanylate cyclase domain-containing proteins. The properties of guanylate cyclases, characterised in diatoms, have been shown to be similar to those in lower eukaryotes and are linked to metabolic processes. In protists, cGMP signalling via guanylate cyclases is a master regulator of diverse functions, including motility, invasion, and egress from host cells. This domain adopts an α-helical fold.
