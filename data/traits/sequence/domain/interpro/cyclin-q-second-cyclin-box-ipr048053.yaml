identifier: InterPro:IPR048053
label: "Cyclin-Q, second cyclin box"
definition: >-
  The CCNM family proteins, also called ancient conserved domain proteins (ACDPs), are evolutionarily conserved Mg2 transporters. CCNM, also called cyclin-Q (CCNQ), or CDK10-activating cyclin, or cyclin-related protein FAM58A, associates with CDK10 to promote its kinase activity. These proteins contain two cyclin boxes, the second one corresponds to this entry. The cyclin box is a protein binding domain.
