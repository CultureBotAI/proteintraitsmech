identifier: InterPro:IPR048416
label: "Distal tail protein pb9, A domain, C-terminal"
definition: >-
  This entry includes phage distal tail proteins which form a hexameric ring located at the tail tube end, such as pb9 from bacteriophage T5. pb9 consists of two domains, A and B. Domain A adopts a split barrel fold and includes residues 1 to 82-172 to 205. This entry covers the C-terminal region of the A domain.
