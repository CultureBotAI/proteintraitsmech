identifier: InterPro:IPR041749
label: "NadR, nicotinamide/nicotinate mononucleotide adenylyltransferase domain"
definition: >-
  The NadR protein is a bifunctional enzyme possessing both NMN adenylytransferase (NMNAT) and ribosylnicotinamide kinase (RNK) activities. Its function is essential for the growth and survival of H. influenzae and thus may present a new highly specific anti-infectious drug target. The N-terminal domain that hosts the NMNAT activity is closely related to archaeal NMNAT. The bound NAD at the active site of the NMNAT domain reveals several critical interactions between NAD and the protein. The NMNAT domain of hiNadR defines yet another member of the pyridine nucleotide adenylyltransferase.
