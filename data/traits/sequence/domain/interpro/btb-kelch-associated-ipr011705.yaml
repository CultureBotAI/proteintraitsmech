identifier: InterPro:IPR011705
label: BTB/Kelch-associated
definition: >-
  This domain is found associated with BTB/POZ domain ( ) and Kelch repeats ( ). BTB (broad-complex, tramtrack and bric a brac) is a Kelch related domain, also known as the POZ domain. BTB proteins are divided into subgroups depending on what domain lies at the C terminus. Despite the divergence in sequences, the BTB fold is highly conserved. BTB-Kelch proteins have Kelch repeats that form a β-propeller that can interact with actin filaments. BTB and C-terminal Kelch (BACK) together constitute a novel conserved domain, which is thought to have a possible role in substrate orientation in Cullin3-based E3 ligase complexes. Four domains, namely the BTB domain, a kelch domain, a BACK domain, and an intervening region (IVR) make up the aryl hydrocarbon receptor (AHR); a ligand-activated transcription factor. This entry represents the domain associated with BTB and Kelch.
