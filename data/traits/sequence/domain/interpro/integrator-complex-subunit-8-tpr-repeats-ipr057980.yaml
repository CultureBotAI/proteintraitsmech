identifier: InterPro:IPR057980
label: "Integrator complex subunit 8, TPR repeats"
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found towards the C-terminal end of human Integrator complex subunit 8 (INTS8) and similar animal sequences. Integrator complex subunit 8 (INTS8) is a component of the multiprotein complex Integrator, which is responsible for the endonucleolytic cleavage in the small nuclear RNAs (snRNA) U1 and U2 transcription and in their 3'-box-dependent processing. The Integrator is an RNA polymerase II complex which contains at least 12 novel subunits and core RNAPII subunits. Two of the Integrator subunits share similarity with subunits of the cleavage and polyadenylation specificity factor (CPSF) complex. Integrator has been shown to be recruited to the U1 and U2 snRNA genes, and to mediate the snRNAs' 3' end processing. The Integrator complex is evolutionarily conserved in metazoans, and directly interacts with the C-terminal domain of the RNA polymerase II largest subunit.
