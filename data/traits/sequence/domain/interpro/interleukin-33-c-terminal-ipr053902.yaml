identifier: InterPro:IPR053902
label: "Interleukin 33, C-terminal"
definition: >-
  This entry represents a β-trefoil-related domain found at the C-terminal of interleukin-33 (IL33) from vertebrates. This protein binds to and signals through IL1RL1/ST2 and its stimulation leads to the recruitment of MYD88, IRAK1, IRAK4, and TRAF6, followed by phosphorylation of MAPK3/ERK1 and/or MAPK1/ERK2, MAPK14, and MAPK8. It also serves as a warning signal between cells at times of injury or cell death.
