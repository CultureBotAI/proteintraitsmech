identifier: InterPro:IPR059043
label: "M02D8_5-like, fourth CUB domain"
definition: >-
  This entry represents the fourth occurrence of the CUB domain in a family of uncharacterised proteins present in nematodes. These uncharacterised nematode proteins contain multiple consecutive repeats of the CUB domain, represented by distinct entries: first , second , third , fourth , fifth , sixth , and seventh . The CUB domain (Complement C1r/C1s, Uegf, Bmp1) is a structural motif of approximately 110 amino acids, typically found in extracellular and plasma membrane-associated proteins, many of which are regulated during development. CUB domains are thought to mediate oligomerisation as well as substrate and partner recognition.
