identifier: InterPro:IPR061876
label: "Domain of unknown function DUF8815"
definition: >-
  This entry represents a C-terminal domain of approximately 125 residues found in multi-domain proteins that contain the DUF7408 domain. Structural similarity searches identify this as a member of the galactose-binding domain-like superfamily. This family is found in Bacillota, particularly Bacillales (including Paenibacillus and Bacillaceae) and Clostridia, as well as some Chloroflexota. The function of this domain remains to be determined.
