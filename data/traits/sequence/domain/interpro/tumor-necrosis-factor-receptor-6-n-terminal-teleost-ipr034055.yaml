identifier: InterPro:IPR034055
label: "Tumor necrosis factor receptor 6, N-terminal, teleost"
definition: >-
  This entry represents the N-terminal domain of TNFRSF6/Fas from teleosts. TNF-receptors are modular proteins. The N-terminal extracellular part contains a cysteine-rich region responsible for ligand-binding. This region is composed of small modules of about 40 residues containing 6 conserved cysteines; the number and type of modules can vary in different members of the family. Tumor necrosis factor receptor superfamily member 6 (TNFRSF6), also known as Fas cell surface death receptor (FasR) or Fas, APT1, CD95, FAS1, APO-1, FASTM, ALPS1A, contains a death domain and plays a central role in the physiological regulation of programmed cell death. It has been implicated in the pathogenesis of various malignancies and diseases of the immune system. The receptor interacts with the Fas ligand (FasL), allowing the formation of a death-inducing signalling complex that includes Fas-associated death domain protein (FADD), caspase 8, and caspase 10; autoproteolytic processing of the caspases in the complex triggers a downstream caspase cascade, leading to apoptosis. This receptor has also been shown to activate NF-kappaB, MAPK3/ERK1, and MAPK8/JNK, and is involved in transducing the proliferating signals in normal diploid fibroblast and T cells. In channel catfish and the Japanese rice fish medaka, homologues of Fas receptor (FasR), as well as FADD and caspase 8, have been identified and characterised, and likely constitute the teleost equivalent of the death-inducing signalling complex (DISC). FasL/FasR are involved in the initiation of apoptosis and suggest that mechanisms of cell-mediated cytotoxicity in teleosts are similar to those used by mammals; presumably, the mechanism of apoptosis induction via death receptors was evolutionarily established during the appearance of verte…
