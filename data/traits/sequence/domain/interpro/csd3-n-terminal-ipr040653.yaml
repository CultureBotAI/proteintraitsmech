identifier: InterPro:IPR040653
label: "Csd3, N-terminal"
definition: >-
  Csd3 (also known as HdpA) is a bi-functional enzyme with delta, delta-endopeptidase activity and delta, delta-carboxypeptidase activity. The N-terminal domain is also known as domain 1 and is composed of an α/β fold consisting of a five-stranded antiparallel β-sheet and three short α-helices. Domain 1 blocks the active-site cleft of the LytM domain, with the protruding helix alpha-3 contributing to the Zn2+ coordination sphere. The fold of domain 1 is very remotely related to monellin/cystatin superfamily proteins, some of which act as inhibitors of cysteine peptidases.
