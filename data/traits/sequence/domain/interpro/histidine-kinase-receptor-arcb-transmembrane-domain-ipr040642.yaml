identifier: InterPro:IPR040642
label: "Histidine kinase receptor ArcB, transmembrane domain"
definition: >-
  Histidine kinase receptors (HKRs) are part of a two-component system, in which an HKR in the bacterial inner membrane transmits a signal to a response regulator located in the cytoplasm. This is a trans-membrane domain (TM) found in ArcB (class 2, aerobic respiratory control sensor). ArcB has two TM helices connected by a short periplasmic loop. TM domain structures suggests a loose helical packing which provides an inherent flexibility in the TM domains and that this is perhaps essential to the mechanism of signal transduction across the membrane.
