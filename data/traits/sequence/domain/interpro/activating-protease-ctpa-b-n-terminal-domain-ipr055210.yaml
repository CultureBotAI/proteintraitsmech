identifier: InterPro:IPR055210
label: "Activating protease CtpA/B, N-terminal domain"
definition: >-
  This domain is found N-terminal of Carboxy-terminal processing protease CtpA, CtpB and related proteins. CtpB is involved in signal transduction pathway leading to the proteolytic activation of the mother cell transcription factor pro-sigma-K during sporulation. This domain contains auto-cleavage site at which it is proteolytically cleaved. The remaining part in the mature enzyme is involved in dimerisation.
