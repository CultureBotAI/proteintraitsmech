identifier: InterPro:IPR049550
label: "RecBCD enzyme subunit RecD, N-terminal domain"
definition: >-
  This domain is found in RecBCD enzyme subunit RecD from Escherichia coli and in similar proteins mostly found in gammaproteobacteria. RecD is a 5'-3' helicase that comprises three domains. This entry represents the N-terminal domain of RecD, which forms the principal interface between RecD and domain 2B of RecC and leads to the conformational change in RecD that has significant effects on the conformation of the RecC subunit.
