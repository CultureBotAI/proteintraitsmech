identifier: InterPro:IPR041358
label: "Rubisco accumulation factor 1, alpha-helical domain"
definition: >-
  This is the N-terminal α helical domain found in Rubisco accumulation factor1 (Raf1). Raf1 from Arabidopsis thaliana consists of an N-terminal alpha-domain, a flexible linker segment and a C-terminal β-sheet domain that mediates dimerization. The α-domains mediate the majority of functionally important contacts with RbcL (Rubisco large subunits) by bracketing each RbcL dimer at the top and bottom. The alpha-domain alone is essentially inactive.
