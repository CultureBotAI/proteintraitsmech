identifier: InterPro:IPR004968
label: "DNA primase/nucleoside triphosphatase, C-terminal"
definition: >-
  This domain is found at the C terminus of phage P4 alpha protein and related proteins. Phage P4 DNA replication depends on the product of the alpha gene, which has origin recognition ability, DNA helicase activity, and DNA primase activity. The structure of the protein can be summarised as follows: The N terminus provides the primase activity, the central region is the helicase/nucleoside triphosphatase domain and the ori DNA recognition resides in the C-terminal 1/3 of the protein. The domain is also found at the C terminus of a number of proteins from orthopox viruses including vaccinia virus D5. D5 encodes a 90kDa protein that is transiently expressed at early times after infection. It has an nucleoside triphosphatase activity which is independent of common nucleic acid cofactors and it can hydrolyse all the common ribo- and deoxyribonucleoside triphosphates to diphosphates in the presence of a divalent cation.
