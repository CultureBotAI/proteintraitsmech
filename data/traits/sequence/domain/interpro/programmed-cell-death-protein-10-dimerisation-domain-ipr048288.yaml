identifier: InterPro:IPR048288
label: "Programmed cell death protein 10, dimerisation domain"
definition: >-
  This entry represents the N-terminal dimerisation domain of human Programmed cell death protein 10 (PDCD10/CCM3) and similar animal proteins. PDCD10 is part of the CCM complex and is required for neuronal migration. Outside of this complex, it is crucial in vascularization and in angiogenesis as it functions in vessel permeability and stability. This protein plays an essential role in early embryonic angiogenesis and cardiovascular development. PDCD10/CCM3 interacts with a variety of proteins, including paxillin, membrane receptor vascular epidermal growth factor receptor 2, CCM complex component CCM2 and germinal centre kinase III proteins (GCKIII). PDCD10/CCM3 contains an N-terminal dimerisation domain and a C-terminal focal adhesion targeting-homology (FAT-H) domain. This domain is also found at the C-terminal of GCKIIIs (STK24/MST3, STK25, STK26/MST4), which adopts a closely related fold. GCKIIIs are involved in the regulation of apoptosis, cell proliferation, polarity, migration, and cytoskeleton remodelling. This domain mediates homo and heterodimerisation. PDCD10/CCM3 forms a heterodimer with GCKIIIs analogous to CCM3 homodimer.
