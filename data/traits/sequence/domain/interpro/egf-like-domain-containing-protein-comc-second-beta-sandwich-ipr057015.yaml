identifier: InterPro:IPR057015
label: "EGF-like domain-containing protein ComC, second beta-sandwich"
definition: >-
  This entry represents the second β-sandwich domain found in EGF-like domain containing protein ComC from amoebas. This protein regulates aggregation, inhibiting lagC and activating lagD expression. The function of this domain is unknown.
