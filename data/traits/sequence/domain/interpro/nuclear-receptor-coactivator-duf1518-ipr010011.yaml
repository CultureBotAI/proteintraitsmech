identifier: InterPro:IPR010011
label: Nuclear receptor coactivator, DUF1518
definition: >-
  This conserved domain of unknown function is usually found tandemly repeated in the nuclear receptor coactivator family (NCOA1/2/3), also known as the SRC/p160 nuclear receptor coactivator family, which are ligand-dependent transcription factors. NCOA1 directly binds nuclear receptors and stimulates the transcriptional activities in a hormone-dependent fashion. It is involved in the coactivation of different nuclear receptors, such as for steroids (PGR, GR and ER), retinoids (RXRs), thyroid hormone (TRs) and prostanoids (PPARs). It is also involved in coactivation mediated by STAT3, STAT5A, STAT5B and STAT6 transcription factors. It plays a central role in creating multisubunit coactivator complexes that act via remodeling of chromatin, and possibly acts by participating in both chromatin remodeling and recruitment of general transcription factors. It can be regulated by sumoylation and ubiquitination.
