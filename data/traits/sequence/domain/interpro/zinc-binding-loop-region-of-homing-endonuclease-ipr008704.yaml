identifier: InterPro:IPR008704
label: "Zinc-binding loop region of homing endonuclease"
definition: >-
  This domain is the short zinc-binding loops region of a number of much longer chain homing endonucleases. Such loops are probably stabilised by the zinc and may be viewed as small but separate domains. The common structural feature of these domains is that at least three zinc ligands lie very close to each other in the sequence and are not incorporated into regular secondary structural elements. The biological roles played by these small zinc-binding domains are presently unknown.
