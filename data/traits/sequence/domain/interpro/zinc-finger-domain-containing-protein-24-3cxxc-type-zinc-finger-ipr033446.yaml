label: "Zinc finger domain-containing protein 24, 3CxxC-type zinc finger"
definition: >-
  This entry represents the Znf-3CxxC domain in ZCCHC24. Zinc finger domain-containing protein 24 (ZCCHC24) encodes a protein containing two zinc finger domains from the Znf-CCHC and Znf-3CxxC superfamilies. This protein contains a 3CxxC-type zinc finger ( ) next to the C-terminal domain ( ), these subdomains are represented by .
