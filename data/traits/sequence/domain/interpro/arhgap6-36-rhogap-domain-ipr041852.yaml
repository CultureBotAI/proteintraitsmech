identifier: InterPro:IPR041852
label: "ARHGAP6/36, RhoGAP domain"
definition: >-
  This entry represent the RhoGAP domain found in ARHGAP6 and ARHGAP36. Rho GTPase activating protein 6 (ARHGAP6/RHOGAP6) shows GAP activity towards RhoA, but not towards Cdc42 and Rac1. ARHGAP6 is often deleted in microphthalmia with linear skin defects syndrome (MLS); MLS is a severe X-linked developmental disorder. ARHGAP36 is a potent antagonist of PKA signalling.
