identifier: InterPro:IPR055140
label: "Thiolase, C-terminal domain 2"
definition: >-
  This domain is found C-terminal in a group of thiolases from all cellular organisms that are not included in . Thiolases are essential CoA-dependent enzymes in lipid metabolism. This domain folds into a four-stranded antiparallel β-sheet with α-helices packed on one side.
