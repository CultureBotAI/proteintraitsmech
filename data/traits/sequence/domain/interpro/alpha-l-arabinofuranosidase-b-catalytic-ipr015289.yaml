identifier: InterPro:IPR015289
label: Alpha-L-arabinofuranosidase B, catalytic
definition: >-
  This domain, found in fungal alpha-L-arabinofuranosidase B, adopts a β-sandwich fold similar to that of concanavalin A-like lectins/glucanase. The β-sandwich fold consists of two anti-parallel β-sheets with seven and six strands, respectively. In addition, there are four helices outside of the β-strands. The β-sandwich strands are closely packed and curved with a jelly roll topology, creating a small catalytic pocket. The domain catalyses the hydrolysis of alpha-1,2-, alpha-1,3- and alpha-1,5-L-arabinofuranosidic bonds in L-arabinose-containing hemicelluloses such as arabinoxylan and L-arabinan.
