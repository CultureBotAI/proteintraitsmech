identifier: InterPro:IPR059550
label: "NADH-ubiquinone oxidoreductase 21.3 kDa subunit, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the NADH-ubiquinone oxidoreductase 21.3 kDa subunit (NUJM), found in fungi. This domain follows three transmembrane regions in the protein sequence. NUJM is a subunit of mitochondrial respiratory complex I, which catalyses the transfer of electrons from NADH to ubiquinone whilst translocating protons across the inner mitochondrial membrane. Complex I is composed of approximately 40 different subunits. The specific function of this domain remains to be determined.
