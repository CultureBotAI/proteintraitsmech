identifier: InterPro:IPR062970
label: "RgtA-type glycosyltransferase-like, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain of approximately 110 residues found exclusively in cyanobacterial glycosyltransferases. The domain is located C-terminal to PMT-type glycosyltransferase domains. Members include proteins annotated as RgtA/B/C/D glycosyltransferases, which are involved in rhamnose-glucose polysaccharide biosynthesis, and undecaprenyl phosphate-alpha-linked glycosyltransferases. The specific function of this C-terminal domain remains to be determined.
