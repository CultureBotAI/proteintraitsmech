identifier: InterPro:IPR048631
label: "Protein translocase subunit SecDF, P1 domain, N-terminal"
definition: >-
  This domain is found in protein translocase subunit SecDF from Thermus thermophilus, which belongs to the RND superfamily. SecDF shows 12 transmembrane (TM) regions and 6 periplasmic regions (P1-P6). This entry represents the N-terminal region of the base subdomain of the P1 domain, that is located in the N- terminal half of the polypeptide, also known as SecD region. This domain folds into a pseudo-symmetrical antiparallel β-sheet that rearranges to a β-barrel architecture during ion transport. This domain, which covers the TM region, is related to and usually appears associated with and .
