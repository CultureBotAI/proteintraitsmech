label: "SH3 fold domain associated with phage DNA polymerases"
definition: >-
  This is an SH3 fold domain related to nucleic acid binding toxins of uncharacterised function, usually associated with a divergent Family B DNA polymerase in group 1/PhiKZ-like phages.
