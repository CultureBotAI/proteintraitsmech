identifier: InterPro:IPR007794
label: Ribosome receptor lysine/proline rich
definition: >-
  The ribosome receptor is an integral endoplasmic reticulum protein that has been suggested to be involved in secretion. This highly conserved region is found towards the C terminus of the transmembrane domain. The function is unclear.
