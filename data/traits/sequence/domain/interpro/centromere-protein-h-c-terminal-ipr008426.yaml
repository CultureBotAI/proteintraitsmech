identifier: InterPro:IPR008426
label: Centromere protein H, C-terminal
definition: >-
  Chromosome segregation in eukaryotes requires the kinetochore, a multi-protein structure that assembles on centromeric DNA, and which acts to link chromosomes to spindle microtubules. Kinetochore structure and composition is highly conserved among vertebrates. The inner kinetochore is essential for kinetochore assembly, and is involved in chromosome segregation via regulation of the spindle. Inner kinetochore components include the multi-subunit CENP-H/I complex, which may function, in part, in directing centromere protein A (CENP-A) deposition to centromeres, where CENP-A is a centromere-specific histone H3 variant required for the organisation of centromeric chromatin during interphase. The CENP-H/I complex contains three functional classes of proteins: CENP-H class (includes CENP-H, -I, -K, -L) CENP-M class (includes CENP-M) CENP-O class (includes CENP-O, -P, -Q, -R, -50) CENP-H is required for the localisation of CENP-C, but not CENP-A, to the centromere. However, it may be involved in the incorporation of newly synthesised CENP-A into centromeres via its interaction with the CENP-A/CENP-HI complex. CENP-H contains a coiled-coil structure and a nuclear localisation signal. CENP-H is specifically and constitutively localised in kinetochores throughout the cell cycle, and may play a role in kinetochore organisation and function throughout the cell cycle. Studies show that CENP-H may be associated with certain human cancers. This entry represents the C-terminal domain of CENP-H. Proteins containing this domain also include Schizosaccharomyces pombe Kinetochore protein Fta3, which is a subunit of the Sim4 complex. This complex is required for loading the DASH complex onto the kinetochore via interaction with dad1. Fta2, Fta3 and Fta4 associate with the central core and…
