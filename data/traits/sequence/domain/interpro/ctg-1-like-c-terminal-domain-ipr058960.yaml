identifier: InterPro:IPR058960
label: "Ctg-1-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of Protein ctg-1 from Caenorhabditis elegans and similar proteins mainly found in nematodes. Ctg-1 is a probable vesicle trafficking protein that functions in uterine cells to promote basement membrane (BM) mobility and BM gap formation during tissue remodelling. This domain, normally found associated to , is predicted to adopt an all-β fold.
