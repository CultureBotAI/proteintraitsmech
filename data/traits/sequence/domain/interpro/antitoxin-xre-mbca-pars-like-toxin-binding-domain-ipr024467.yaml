identifier: InterPro:IPR024467
label: "Antitoxin Xre/MbcA/ParS-like, toxin-binding domain"
definition: >-
  This entry represents the C-terminal domain of antitoxin components of a type II toxin-antitoxin (TA) system, including Xre from Pseudomonas putida, MbcA from Mycobacterium sp. and ParS from Sphingobium sp.. This domain interacts with the toxin component (RES, MbcT and ParT respectively) and sterically blocks its active site, neutralizing its effect.
