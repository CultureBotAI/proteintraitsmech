identifier: InterPro:IPR056547
label: "NUP160, helical domain"
definition: >-
  This entry represents the central helical domain of NUP160, from animals. NUP160 is one of up to 60 proteins that constitute the Nuclear Pore Complex (NPC) as a component of the NUP107-160 subcomplex. NUP160, in conjunction with NUP133, interacts with NUP98 and NUP153, mediating mRNA export. NUP160 depletion could restore autophagy and inhibit fibrosis and inflammatory response in high glucose-treated. NUP160 mutations have been associated with Steroid-Resistant Nephrotic Syndrome (SRNS). Silencing Drosophila NUP160 specifically in nephrocytes results in functional abnormalities, reduced cell size and nuclear volume, as well as a disorganised nuclear membrane structure.
