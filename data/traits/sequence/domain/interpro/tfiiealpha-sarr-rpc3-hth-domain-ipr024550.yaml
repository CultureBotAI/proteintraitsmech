identifier: InterPro:IPR024550
label: "TFIIEalpha/SarR/Rpc3 HTH domain"
definition: >-
  The general transcription factor TFIIE has an essential role in eukaryotic transcription initiation, together with RNA polymerase II and other general factors. Human TFIIE consists of two subunits, TFIIE-alpha and TFIIE-beta, and joins the preinitiation complex after RNA polymerase II and TFIIF.
