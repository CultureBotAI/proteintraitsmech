identifier: InterPro:IPR015206
label: "3-mercaptopyruvate sulfurtransferase, C-terminal domain"
definition: >-
  This entry represents a domain found in putative 3-mercaptopyruvate sulphurtransferases from Trypanosomatida (kinetoplastids). This domain adopts a structure consisting of a four-stranded antiparallel β-sheet and an α-helix, arranged in a β(2)-α-β(2) fashion, and bearing a remarkable structural similarity to the FK506-binding protein class of peptidylprolyl cis/trans-isomerase. It may be involved in mediating protein folding and sulfurtransferase-protein interactions.
