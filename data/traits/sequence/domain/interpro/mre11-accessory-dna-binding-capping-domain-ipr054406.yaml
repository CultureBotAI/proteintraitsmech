identifier: InterPro:IPR054406
label: "Mre11, accessory DNA binding capping domain"
definition: >-
  This entry represents the accessory DNA binding capping domain found in Thermotoga maritima Mre11. Mre11, together with Rad50, form the MR protein complex involved in DNA double-strand break repair. This domain forms the nuclease module with the phosphodiesterase domain at the N-terminal.
