identifier: InterPro:IPR060549
label: "CEP131, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in Centrosomal protein of 131 kDa (CEP131) mainly from animals. CEP131 proteins are required for cilium formation, intraciliary transport, and transition zone assembly. Its function is unknown.
