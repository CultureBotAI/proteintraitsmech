identifier: InterPro:IPR002532
label: Hantavirus glycoprotein Gc, N-terminal domain
definition: >-
  This entry represents the polyprotein region which forms the N-terminal region of Gc glycoprotein. It has been shown that the N-terminal region of glycoprotein Gc has the conserved CNP motif, suggested to be an integrin-binding motif. Gc protein has a typical class II fusion protein fold consisting of a central β-sandwich domain (termed domain I) made of eight β-strands arranged in two antiparallel β-sheets, domain II which has an elongated shape with two subdomains (a central, opened β-barrel proximal to domain I and a distal β-sandwich 'tip'), and domain III, which has an Ig-like fold. This entry represents the N-terminal region of Gc containing the central and dimerisation domains (which includes domain I and II). The medium (M) genome segment of Hantaviruses (family Bunyaviridae) encodes the two virion glycoproteins, Gn and Gc (also known as G1 and G2, respectively) as a polyprotein precursor. Gn and Gc forms homotetramers at the surface of the virion, which attach the virion to host cell receptors including integrin beta3/ITGB3 and induce internalization, predominantly through clathrin-dependent endocytosis.
