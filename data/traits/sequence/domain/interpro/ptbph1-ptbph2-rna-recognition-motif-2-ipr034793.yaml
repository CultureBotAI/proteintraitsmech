identifier: InterPro:IPR034793
label: "PTBPH1/PTBPH2, RNA recognition motif 2"
definition: >-
  This entry represents the RNA recognition motif 2 (RRM2) of polypyrimidine tract-binding protein homologue 1 (PTBPH1) and 2 from plants (AtPTB1 and AtPTB2 in Arabidopsis respectively). PTBPH1 and PTBPH2 show significant sequence similarity to polypyrimidine tract binding protein (PTB) that is an important negative regulator of alternative splicing in mammalian cells. They are splicing factors that negatively regulate splicing of a mini-exon splicing reporter and affect alternative splicing of endogenous genes differentially. Both, PTBPH1 and PTBPH2, contain three RNA recognition motifs (RRM).
