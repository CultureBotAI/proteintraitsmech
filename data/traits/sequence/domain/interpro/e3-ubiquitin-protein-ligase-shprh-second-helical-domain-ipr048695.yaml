label: "E3 ubiquitin-protein ligase SHPRH, second helical domain"
definition: >-
  This entry represents the second helical domain found after the first helical domain and before the zinc finger, towards the C-terminal of the E3 ubiquitin-protein ligase SHPRH, a protein involved in DNA repair.
