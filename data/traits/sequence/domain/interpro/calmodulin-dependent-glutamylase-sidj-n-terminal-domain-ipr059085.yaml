identifier: InterPro:IPR059085
label: "Calmodulin-dependent glutamylase SidJ, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of SidJ. Calmodulin-dependent glutamylase SidJ (SidJ) proteins function as calmodulin-dependent glutamylases. These proteins facilitate the attachment of glutamate moieties to specific catalytic residues on target proteins such as SdeA, SdeB, SdeC, and SidE. This modification is essential for the mono-ADP-ribosyltransferase activity of SdeA and inhibits its ubiquitinating activity. The glutamylase activity of these proteins is dependent on the presence of host calmodulin, highlighting its role in host-pathogen interactions. Additionally, these proteins may possess deubiquitinase activity, potentially reversing substrate ubiquitination mediated by SdeA by cleaving the phosphodiester bond linking phosphoribosylated ubiquitin to protein substrates.
