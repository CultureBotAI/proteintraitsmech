identifier: InterPro:IPR040447
label: "Rrp7, RRM-like N-terminal domain"
definition: >-
  Ribosomal RNA-processing protein 7 (RRP7) is an essential protein in yeast that is involved in pre-rRNA processing and ribosome assembly. It is speculated to be required for correct assembly of rpS27 into the pre-ribosomal particle. This domain corresponds to the N-terminal RNA-binding domain found in the Rrp7 protein. It has an RRM-like fold with a circular permutation.
