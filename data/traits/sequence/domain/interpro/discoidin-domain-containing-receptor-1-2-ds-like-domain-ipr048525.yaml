identifier: InterPro:IPR048525
label: "Discoidin domain-containing receptor 1/2, DS-like domain"
definition: >-
  Discoidin domain-containing receptor 1/2 (DDR1/2) are receptor tyrosine kinases (RTKs) whose activating ligands are various collagens and consist of extracellular domains comprising the N-terminal discoidin domain (DS, ) followed by a DS-like domain and the cytoplasmic kinase domain ( ). Impairment in signalling by DDR1 and DDR2 is associated with the progression of various human diseases, including fibrosis, atherosclerosis and cancer, therefore, inhibition of signalling using monoclonal antibodies (mAbs) may be an useful therapy. This entry represents the DS-like domain, which mediates binding to triple-helical collagen together with the DS domain and contains the epitopes of all mAbs.
