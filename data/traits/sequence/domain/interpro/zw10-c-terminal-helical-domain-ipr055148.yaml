identifier: InterPro:IPR055148
label: "ZW10, C-terminal helical domain"
definition: >-
  This entry represents the last of the α-helical repeat domains of Zw10 protein. Zw10 protein, in the context of the conserved Rod-Zwilch-Zw10 (RZZ) complex, is required for correct metaphase check-pointing during mitosis and it is also important in vesicle transport between Golgi and ER as part of a second complex together with the conserved conserved RINT1/Tip20p and NAG/Sec39p proteins. Zw10 is the metazoan homologue of yeast Dsl1, both included in the complexes associated with tethering containing helical rods (CATCHR) family, sharing structural features.
