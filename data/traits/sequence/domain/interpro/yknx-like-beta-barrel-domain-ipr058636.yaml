identifier: InterPro:IPR058636
label: "YknX-like, beta-barrel domain"
definition: >-
  This domain is found in the putative efflux system component YknX from Bacillus subtilis and related proteins. YknX is a component of an unusual four-component transporter YknWXYZ, which is required for protection against the killing factor SdpC (sporulation-delaying protein). YknX interacts with YknYZ. The domain represented by this entry folds into a six-stranded closed β-barrel with a greek-key topology which has a structural similarity to the C-terminal domain of alanine racemase. This domain is interrupted by the barrel-sandwich hybrid domain which is inserted after the first β-strand of the barrel.
