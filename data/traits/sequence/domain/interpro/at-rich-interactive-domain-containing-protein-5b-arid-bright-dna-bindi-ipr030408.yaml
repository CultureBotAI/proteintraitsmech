identifier: InterPro:IPR030408
label: "AT-rich interactive domain-containing protein 5B, ARID/BRIGHT DNA binding domain"
definition: >-
  This entry represents the AT-rich ARID/BRIGHT DNA binding domain of ARID5B. ARID5B, also known as modulator recognition factor-2 (Mrf-2), is a member of the AT-rich interaction domain (ARID) family of transcription factors. Human ARID5B forms complex with PHF2, a jmjC demethylase; this complex serves as a signal-sensing modulator of histone methylation and gene transcription. It facilitates chondrogenesis by recruiting the histone demethylase PHF2 to Sox9-regulated genes. Mouse Mrf-2 is required for adipogenesis and to maintain normal functions in mature adipocytes.
