identifier: InterPro:IPR047505
label: "F-box only protein 11, F-box domain"
definition: >-
  This entry represents the F-box domain of UBR11 and similar animal proteins. This domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. F-box only protein 11 (FBXO11, also called UBR6 and VIT-1) is an E3 ubiquitin ligase and a type II methyltransferase, which functions as a key regulator of tumour initiation and progression. FBXO11 is a substrate recognition component of a SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins, such as DTL/CDT2, BCL6 and PRDM1/BLIMP1. FBXO11 does not bind N-terminal signals. In humans, the gene encoding this protein has been associated to intellectual developmental disorders.
