identifier: InterPro:IPR047267
label: "Oligophrenin-1, BAR domain"
definition: >-
  This entry represents the BAR domain found at the N-terminal of OPHN1. This domain is normally associated with dimerisation, induction of membrane bending and curvature, and protein-protein interactions. Oligophrenin-1 (OPHN1) is a GTPase activating protein (GAP) with activity towards RhoA, Rac, and Cdc42, that is expressed in developing spinal cord and in adult brain areas with high plasticity. It plays a role in regulating the actin cytoskeleton as well as morphology changes in axons and dendrites, and may also function in modulating neuronal connectivity. Mutations in the OPHN1 gene cause X-linked mental retardation associated with cerebellar hypoplasia, lateral ventricle enlargement and epilepsy. This protein also contains a Pleckstrin homology (PH) domain ( ), and a Rho GAP domain ( ).
