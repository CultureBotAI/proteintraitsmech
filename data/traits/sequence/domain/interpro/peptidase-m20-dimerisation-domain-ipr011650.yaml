identifier: InterPro:IPR011650
label: "Peptidase M20, dimerisation domain"
definition: >-
  This domain consists of 4 β-strands and two α-helices which make up the dimerisation surface of members of the MEROPS peptidase family M20. This family includes a range of zinc exopeptidases: carboxypeptidases, dipeptidases and specialised aminopeptidases.
