identifier: InterPro:IPR058109
label: "FlcA, C-terminal"
definition: >-
  This entry represents the C-terminal domain in FlcA. This domain contains TPR repeats. In spirochetes, flagella are located within the periplasm. FlcA is one of several structural proteins involved in the formation of the flagellar collar. The conserved N-terminal domain of about 40 amino acids and the C-terminal region domain of about 650 amino acids are separated by a long and variable-length stretch of low-complexity sequence.
