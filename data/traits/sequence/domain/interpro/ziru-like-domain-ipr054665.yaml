identifier: InterPro:IPR054665
label: "ZirU-like domain"
definition: >-
  This entry represents a domain that covers the whole protein length in ZirU from Salmonella , which shares with ZirS the property of requiring ZirT for its type Vb-like secretion and is homologous to immunoglobulin superfamily members. It is also found at the C-terminal end of several uncharacterised proteins. Members of this group are specific to enterobacterales.
