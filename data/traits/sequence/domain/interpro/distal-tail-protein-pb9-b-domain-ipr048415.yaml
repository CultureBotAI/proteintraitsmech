identifier: InterPro:IPR048415
label: "Distal tail protein pb9, B domain"
definition: >-
  This entry includes phage distal tail proteins which form a hexameric ring located at the tail tube end, such as pb9 from bacteriophage T5. pb9 consists of two domains, A and B. This entry represents domain B which adopts an OB fold and is inserted in domain A.
