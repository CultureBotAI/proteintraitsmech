label: "Cilia- and flagella-associated protein 47 domain"
definition: >-
  This domain is found in human Cilia- and flagella-associated protein 47 (CFAP47) and similar proteins mainly from animals. CFAP47 plays a role in flagellar formation and sperm motility. This domain is usually found associated with .
