identifier: InterPro:IPR057971
label: "Pleckstrin homology domain-containing family A member 4-7, TBCA domain"
definition: >-
  This entry represents the tubulin chaperone cofactor A (TBCA) domain in Pleckstrin homology (PH) domain-containing proteins, mostly found in eukaryotes. The TBCA fold displays three α-helices forming an antiparallel bundle. Human TBCA functions as a molecular chaperone for beta-tubulin. PH domain-containing proteins, such as PKHA7, are crucial for the biogenesis and maintenance of zonula adherens, a type of cell-cell junction. The specific function of the TBCA domain in PH domain-containing proteins has not been elucidated yet.
