identifier: InterPro:IPR057220
label: "Domain of unknown function DUF7898"
definition: >-
  This entry describes the N-terminal domain of unknown function of DNA polymerase theta subunit (PolQ) majoritarily from fungal and and yeast proteins. Structural predictions suggest that this family adopts Helix-Helix-Helix (HHH) motifs. Proteins containing HHH motifs are typically associated with DNA-binding functions. These structural elements are often found in enzymes involved in DNA metabolism, such as DNA polymerases and helicases.
