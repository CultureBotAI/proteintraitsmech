identifier: InterPro:IPR060617
label: "SAGA-associated factor 11-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of SAGA-associated factor 11 eukaryotic proteins. Sgf11 is a subunit of the transcription coactivator SAGA complex in Saccharomyces cerevisiae. The SAGA complex is a multisubunit protein complex involved in transcriptional regulation. SAGA combines proteins involved in interactions with DNA-bound activators and TATA-binding protein (TBP), as well as enzymes for histone acetylation and deubiquitylation.
