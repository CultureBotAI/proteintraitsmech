identifier: InterPro:IPR006140
label: D-isomer specific 2-hydroxyacid dehydrogenase, NAD-binding domain
definition: >-
  A number of NAD-dependent 2-hydroxyacid dehydrogenases which seem to be specific for the D-isomer of their substrate have been shown to be functionally and structurally related. All contain a glycine-rich region located in the central section of these enzymes, this region corresponds to the NAD-binding domain. This domain is inserted into the catalytic domain. The catalytic domain is described in ( ).
