label: "Domain of unknown function DUF7041"
definition: >-
  This is a domain of unknown function predominantly found at the N-terminal of sequences from ticks, spiders and similar sequences from arthropods. According to structure predictions this domain may adopt an α-helical bundle fold similar to Ty3 transposon capsid-like proteins.
