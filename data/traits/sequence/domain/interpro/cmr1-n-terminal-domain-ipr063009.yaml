identifier: InterPro:IPR063009
label: "Cmr1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the Cmr1 protein including from Porphyromonas gulae which is a member of the canonical (type III-A to III-D) type III CRISPR-Cas system. The Cmr1 occupies the top of the head of the effector complex.
