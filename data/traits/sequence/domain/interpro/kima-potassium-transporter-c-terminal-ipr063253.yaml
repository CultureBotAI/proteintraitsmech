identifier: InterPro:IPR063253
label: "KimA potassium transporter, C-terminal"
definition: >-
  This entry represents the C-terminal cytoplasmic domain of approximately 130 residues found in KimA and related potassium transporters in bacteria, predominantly in Actinomycetota and Bacillota. This domain is located C-terminal to the transmembrane amino acid permease domain. The structure consists of β-strand-α-helix motifs forming a parallel five-stranded β-sheet flanked by four helices. In the KimA homodimer, the cytoplasmic domains are swapped, with each domain positioned beneath the opposite transmembrane domain, contributing to dimer stability. The domain fold shows similarity to phosphopantetheine adenylyltransferases that bind nucleotides, suggesting this domain may provide a binding site for cyclic di-AMP, which inhibits potassium uptake activity. The specific function of this domain remains to be determined.
