identifier: InterPro:IPR019496
label: "FMR1-interacting protein 1, conserved domain"
definition: >-
  FMR1-interacting protein 1 (Nufip1) has been implicated in the assembly of the large subunit of the ribosome and in telomere maintenance. It is known to bind RNA and is phosphorylated upon DNA damage. This entry represents a conserved domain found within Nufip1. Some proteins containing this region also contain a CCCH zinc finger.
