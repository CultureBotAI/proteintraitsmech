identifier: InterPro:IPR063600
label: "Cilia and flagella-associated protein 70, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of human cilia and flagella-associated protein 70 (CFAP70) and similar proteins from eukaryotes. CFAP70 is an axoneme-binding protein that plays a role in the regulation of ciliary motility and cilium length. The protein localises to the cilium axoneme and flagellum, with particular concentration at the base of the outer dynein arm. The specific function of this domain remains to be determined. This domain contains a C2-like fold.
