identifier: InterPro:IPR054043
label: "Cell invasion protein SipA, C-terminal actin binding domain"
definition: >-
  This domain is found at the C-terminal end of Cell invasion protein SipA (Salmonella Invasion protein A) from Salmonella typhimurium. SipA actin-binding protein that interferes with host cell actin cytoskeleton, and reduce the critical concentration for the formation of F-actin, contributing to bacterial invasion. This domain adopts a a compact, heart-shaped fold dominated by a helical secondary structure. It is responsible for the actin-binding and polymerisation activities of the protein.
