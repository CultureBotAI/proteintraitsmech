identifier: InterPro:IPR056319
label: "NOMO, seventh transthyretin-like domain"
definition: >-
  This entry represents a domain centrally located in BOS complex subunit NOMO1-3 from vertebrates. This domain is also found in the homologue Nicotinic receptor-associated protein 4 from Caenorhabditis elegans. NOMO family of proteins includes NOMO1, NOMO2, NOMO3. These proteins are components of the multi-pass translocon (MPT) complex that mediates insertion of multi-pass membrane proteins into the lipid bilayer of membranes. They play an important role in the protein topogenesis and cells lacking these components show reduced multipass protein stability. NOMO proteins are multidomain proteins.
