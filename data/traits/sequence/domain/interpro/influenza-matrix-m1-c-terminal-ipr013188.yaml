identifier: InterPro:IPR013188
label: Influenza matrix M1, C-terminal
definition: >-
  Matrix protein (M1) of Influenza virus is a bifunctional membrane/RNA-binding protein that mediates the encapsidation of RNA-nucleoprotein cores into the membrane envelope. It is therefore required that M1 binds both membrane and RNA simultaneously. M1 is comprised of two domains connected by a linker sequence. The C-terminal domain contains α-helical structure and appears to be involved in growth and virulence of the virus.
