identifier: InterPro:IPR061721
label: "Domain of unknown function DUF8660"
definition: >-
  This entry represents a family of small proteins of approximately 67 residues found in Cyanobacteriota, predominantly in Synechococcales. One member is also found in Paulinella, a cercozoan amoeba that possesses a cyanobacterium-derived chromatophore. Structural analysis indicates these proteins adopt an SH3 barrel-like fold. The function of this family remains to be determined.
