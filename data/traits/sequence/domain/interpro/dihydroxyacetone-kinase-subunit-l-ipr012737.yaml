identifier: InterPro:IPR012737
label: Dihydroxyacetone kinase, subunit L
definition: >-
  Two types of dihydroxyacetone kinase (glycerone kinase) are described. In yeast and a few bacteria, e.g. Citrobacter freundii, the enzyme is a single chain that uses ATP as phosphoryl donor and is designated . By contrast, Escherichia coli and many other bacterial species have a multisubunit form ( ) with a phosphoprotein donor related to PTS transport proteins. This entry represents the ADP-binding subunit of the PTS-dependent dihydroxyacetone kinase.
