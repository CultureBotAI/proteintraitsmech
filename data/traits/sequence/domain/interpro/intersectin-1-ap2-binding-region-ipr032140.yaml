identifier: InterPro:IPR032140
label: "Intersectin-1, AP2 binding region"
definition: >-
  This entry represents an unstructured region found in the intersectin 1 proteins, lying between the first pair of SH3 domains, that binds to the clathrin adaptor AP2. This binding forms an intersectin-AP2 complex that functions as an important regulator of clathrin-mediated SV recycling in synapses.
