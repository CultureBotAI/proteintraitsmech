identifier: InterPro:IPR048358
label: "EZH1/2, MCSS domain"
definition: >-
  This entry represents the MCSS domain found in the middle region of the metazoan Histone-lysine N-methyltransferases EZH1/2. It makes contacts with the adjacent SANT domain and the Vefs domain from EED. Additionally, this domain contains a zinc-binding motif and contributes two cysteine residues for a second one, formed with two cysteines from the SANT domain. The Polycomb Repressive Complex 2 (PRC2) is a chromatin modifying complex that consists of three core components: EED, SUZ12 and one of the two histone H3K27 methyltransferases, EZH1 or EZH2. The PRC2 complex catalyses di- and trimethylation of histone H3 lysine 27 (H3K37me2/3), which has a repressive role. Even though EZH1 and EZH2 form similar PRC2 complexes, they exhibit contrasting repressive roles. In terms of their expression in mice, EZH1 is more abundant in nonproliferative adult organs, while EZH2 expression is tightly associated with proliferation.
