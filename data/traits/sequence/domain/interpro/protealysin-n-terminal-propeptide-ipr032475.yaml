identifier: InterPro:IPR032475
label: "Protealysin, N-terminal propeptide"
definition: >-
  This entry represents the N-terminal propeptide of protealysin ( ), a protease belongs the M4 family of peptidases that are commonly known as thermolysin-like proteases (TLPs). All TLPs are synthesised as precursors containing N-terminal propeptides, and these propeptides are cleaved during maturation of the enzymes. The primary structure of these N-terminal propeptides can be used to classify TLP into two groups: the classical TLPs with long propeptide (approximately 200 amino acids) and the protealysin-type TLPs with short propeptide (approximately 50 amino acids). The propeptides of protealysin may act as an inhibitor that blocks the substrate-binding site and fixes the "open" conformation of the active site, which is unfavourable for catalysis. The PPL-motif (XXPP(Y/H)XL, where X is a hydrophobic residue) identified in this domain interacts with the S' subsites of the active centre being a critical element of the propeptide-catalytic domain interface.
