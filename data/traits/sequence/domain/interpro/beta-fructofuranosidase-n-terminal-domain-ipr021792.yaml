label: Beta-fructofuranosidase, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of beta-fructofuranosidase (also known as vacuolar invertase) ( ), which is involved in the hydrolysis of terminal non-reducing beta-D-fructofuranoside residues in beta-D-fructofuranosides.
