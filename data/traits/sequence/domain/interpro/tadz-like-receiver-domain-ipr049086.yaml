identifier: InterPro:IPR049086
label: "TadZ-like, receiver domain"
definition: >-
  This domain is found at the N-terminal of TadZ from Eubacterium rectale and similar bacterial proteins. TadZ is is an essential component of the Tad secretion system that probably functions as a localization factor. This protein is composed of two domains, both of which have lost its active sites. This entry represents the N-terminal atypical receiver domain (ARD), which is structurally similar to the RD of response regulators such as the chemotaxis protein CheY.
