identifier: InterPro:IPR063895
label: "Mitochondrial protein TAR1 domain"
definition: >-
  This entry includes the TAR1 (transcript antisense to ribosomal RNA) protein found in fungi and plants. In Saccharomyces cerevisiae, TAR1 is encoded on the antisense strand of the nuclear 25S rDNA and localises to mitochondria. The protein may be involved in mitochondrial DNA stability or mitochondrial gene expression regulation at the post-transcriptional level. These proteins are disordered and in TAR1 this entry covers the full length while in other members it represents a domain. In plants, the domain is found in senescence-associated proteins.
