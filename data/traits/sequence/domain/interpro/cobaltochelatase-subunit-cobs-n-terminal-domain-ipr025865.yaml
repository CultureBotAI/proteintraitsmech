identifier: InterPro:IPR025865
label: "Cobaltochelatase subunit CobS N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the CobS subunit of cobaltochelatase. The domain contains two completely conserved residues (P and F) that may be functionally important. Cobaltochelatase belongs to the AAA+ superfamily of proteins and functions in cobalamin biosynthesis.
