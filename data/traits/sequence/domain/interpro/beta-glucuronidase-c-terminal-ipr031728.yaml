identifier: InterPro:IPR031728
label: "Beta-glucuronidase, C-terminal"
definition: >-
  This domain is found at the C terminus of beta-glucuronidase. Its function is not yet known. Beta-glucuronidase hydrolyses beta-glucuronosyl and 4-O-methyl-beta-glucuronosyl residues of arabinogalactan-protein.
