label: "YtxK-like, N-terminal helical domain"
definition: >-
  This entry represents the N-terminal helical domain found in YtxK from B. subtilis ( ), which is a restriction-modification system methylation subunit. Homologues of YtxK are primarily found in Firmicutes.
