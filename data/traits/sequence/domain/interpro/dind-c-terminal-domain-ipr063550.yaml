identifier: InterPro:IPR063550
label: "DinD, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of approximately 130-150 amino acids found in the DNA damage-inducible protein D (DinD) and related bacterial proteins. This domain is found C-terminal to a Bro-N domain. The specific function of this C-terminal domain remains to be determined. DinD is induced by DNA damage as part of the SOS response. The full-length DinD protein is essential for survival at high temperature and for normal cell morphology in stationary phase.
