identifier: InterPro:IPR041949
label: "STARD7, START domain"
definition: >-
  This entry represents the steroidogenic acute regulatory protein (StAR)-related lipid transfer (START) domain of STARD7 (also known as gestational trophoblastic tumor 1/GTT1). The gene encoding STARD7 is overexpressed in choriocarcinoma. STARD7 appears to be involved in the intracellular trafficking of phosphatidycholine (PtdCho) to mitochondria. STARD7 was shown to be surface active and to interact differentially with phospholipid monolayers, it showed a preference for phosphatidylserine, cholesterol, and phosphatidylglycerol.
