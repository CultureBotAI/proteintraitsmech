identifier: InterPro:IPR033745
label: "Mitochondria fission protein Fis1, cytosolic domain"
definition: >-
  Fis1, along with Dnm1 and Mdv1, is an essential protein in mediating mitochondrial fission. Dnm1 and Fis1 are highly conserved, with a common mechanism in disparate species. In mutants of these proteins, mitochondrial fission is impaired, resulting in networks of undivided mitochondria. Fis1 appears to act via the recruitment of division complexes to the mitochondrial outer membrane. Dnm1 is recruited to mitochondria via interactions with the adaptor proteins Caf4 and Mdv1, which bind directly to Fis1. The Fis1 N terminus is cytosolic and tethered to the mitochondrial outer membrane via a C-terminal transmembrane domain. The cytosolic domain of Fis1 forms a six-helix bundle, in which the central four helices consist of two tandem tetratricopeptide repeat (TPR)-like motifs, known to mediate protein-protein interactions.
