identifier: InterPro:IPR034825
label: "CID8-like protein, RNA recognition motif 2"
definition: >-
  This entry represents the RNA recognition motif 2 (RRM2) domain found in A. thaliana CID8, CID9, CID10, CID11, CID12, CID13 and mainly their plant homologues. These highly related RNA-binding proteins contain an N-terminal PAM2 domain (PABP-interacting motif 2), two RNA recognition motifs (RRMs) and a basic region that resembles a bipartite nuclear localization signal. The biological role of this family remains unclear.
