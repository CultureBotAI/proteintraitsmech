identifier: InterPro:IPR034193
label: "Proteinase K-like catalytic domain"
definition: >-
  This domain is found in some members of peptidase family S8 (subtilisins), such as PCSK9 (proprotein convertase subtilisin/kexin type 9; MEROPS identifier S08.039), proteinase K (S08.054), proteinase T (S08.061) from the fungus Tritirachium album Limber, and other subtilisin-like serine endopeptidases. PCSK9 post-translationally regulates hepatic low-density lipoprotein receptors (LDLRs) by binding to LDLRs on the cell surface, leading to their degradation, and is a target for drugs for hypercholesterolaemia. The binding site of PCSK9 has been localised to the epidermal growth factor-like repeat A (EGF-A) domain of the LDLR. Characterised proteinases K are secreted endopeptidases that are not substrate-specific and function in a wide variety of species in different pathways. It can hydrolyse keratin and other proteins with subtilisin-like specificity. The number of calcium-binding motifs found in these differs. The subtilisin family is one of the largest serine peptidase families characterised to date. Over 200 subtilisins are presently known, more than 170 of which have their complete amino acid sequence. It is widespread, being found in eubacteria, archaebacteria, eukaryotes and viruses. The vast majority of the family are endopeptidases, although there is an exopeptidase, tripeptidyl peptidase. Structures have been determined for several members of the subtilisin family: they exploit the same catalytic triad as the chymotrypsins, although the residues occur in a different order (HDS in chymotrypsin and DHS in subtilisin), but the structures show no other similarity. Some subtilisins are mosaic proteins, while others contain N- and C-terminal extensions that show no sequence similarity to any other known protein.
