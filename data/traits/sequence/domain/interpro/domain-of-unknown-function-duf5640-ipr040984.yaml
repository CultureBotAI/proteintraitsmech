label: "Domain of unknown function DUF5640"
definition: >-
  This domain is composed of eight antiparallel β strands and carries a G-X-W motif in the N-terminal region. The conserved glycine-X-tryptophan (G-X-W) motif is characteristic for the lipocalin family.
