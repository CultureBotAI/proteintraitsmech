identifier: InterPro:IPR060502
label: "GH172, middle domain"
definition: >-
  This domain is found the middle region of members of GH172 family. These proteins contain three homologous domains which are structurally very similar and adopt a jelly-roll β-sandwich. Some of these proteins are structurally characterised such as DFA I synthase/hydrolase from Bifidobacterium dentium and Exo-alpha-D-arabinofuranosidase from Microbacterium arabinogalactanolyticum . They assemble into trimeric structures that can also form other higher orders of organisation. This domain is usually found associated with .
