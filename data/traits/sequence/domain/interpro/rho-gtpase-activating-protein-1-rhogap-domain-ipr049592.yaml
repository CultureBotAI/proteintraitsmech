identifier: InterPro:IPR049592
label: "Rho GTPase-activating protein 1, RhoGAP domain"
definition: >-
  This entry represents the C-terminal RhoGAP domain found in ARHGAP1 proteins in animals. ARHGAP1 , also known as RhoGAP-1 or p50RhoGAP, contains a C-terminal RhoGAP domain and an N-terminal Sec14 domain , which binds phosphatidylinositol 3,4,5-trisphosphate (PtdIns(3,4,5)P3). It is ubiquitously expressed and preferentially active on Cdc42. This subgroup also contains closely related Rho GTPase-activating protein 68F (RhoGAP68F) from fruit fly. Small GTPases cluster into distinct families, and all act as molecular switches, active in their GTP-bound form but inactive when GDP-bound. The Rho family of GTPases activates effectors involved in a wide variety of developmental processes, including regulation of cytoskeleton formation, cell proliferation and the JNK signalling pathway. GTPases generally have a low intrinsic GTPase hydrolytic activity but there are family-specific groups of GAPs that enhance the rate of GTP hydrolysis by several orders of magnitude.
