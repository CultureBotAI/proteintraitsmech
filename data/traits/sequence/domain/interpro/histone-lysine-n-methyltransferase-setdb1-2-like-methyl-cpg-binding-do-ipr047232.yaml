identifier: InterPro:IPR047232
label: "Histone-lysine N-methyltransferase SETDB1/2-like, methyl-CpG binding domains"
definition: >-
  This entry represents the methyl-CpG binding domains (MBD) of SETDB1/2 and similar animal proteins. This group of proteins also includes the SETDB1 homologues Histone-lysine N-methyltransferase eggless from Drosophila melanogaster, and Histone-lysine N-methyltransferase met-2 Caenorhabditis elegans. SETDB1 is a member of the histone-lysine N-methyltransferase Suvar3-9 subfamily. Members of this subfamily trimethylate 'Lys-9' of histone H3. H3 'Lys-9' trimethylation represents a specific tag for epigenetic transcriptional repression by recruiting HP1 (CBX1, CBX3 and/or CBX5) proteins to methylated histones. This enzyme mainly functions in euchromatin regions, thereby playing a central role in the silencing of euchromatic genes. H3 'Lys-9' trimethylation is coordinated with DNA methylation. It probably forms a complex with MBD1 and ATF7IP that represses transcription and couples DNA methylation and histone 'Lys-9' trimethylation. SETDB2 is a histone methyltransferase involved in left-right axis specification in early development and mitosis. It specifically trimethylates 'Lys-9' of histone H3 (H3K9me3), a specific tag for epigenetic transcriptional repression that recruits HP1 (CBX1, CBX3 and/or CBX5) proteins to methylated histones. SETDB2 contributes to H3K9me3 in both the interspersed repetitive elements and centromere-associated repeats. This protein plays a role in chromosome condensation and segregation during mitosis.
