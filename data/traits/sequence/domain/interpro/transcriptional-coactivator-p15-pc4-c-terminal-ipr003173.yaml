identifier: InterPro:IPR003173
label: Transcriptional coactivator p15 (PC4), C-terminal
definition: >-
  This entry represents a ssDNA binding domain found at the C-terminal end of YdbC from Lactococcus lactis, Activated RNA polymerase II transcriptional coactivator p15 from humans and other PC4 family members. YdbC, which adopts a dimeric fold, shows a concave four-stranded antiparallel sheet followed by a C-terminal helix in a similar configuration to PC4. p15 has a bipartite structure composed of an amino-terminal regulatory domain and a carboxy-terminal cryptic DNA-binding domain. The DNA-binding activity of the carboxy-terminal is disguised by the amino-terminal p15 domain. Activity is controlled by protein kinases that target the regulatory domain. Its interaction with the tumor suppressor protein p53 may play a role in certain neurodegenerative diseases.
