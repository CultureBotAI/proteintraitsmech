identifier: InterPro:IPR056992
label: "Argonaute protein hrde-1/Nuclear RNAi defective-3 protein-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of Argonaute protein hrde-1 (HRDE1, also known as C16C10.3) and nuclear RNAi defective-3 protein (NRDE-3) from Caenorhabditis elegans and relates sequences from nematodes. This domain is predicted to adopt an α/β configuration. HRDE1 is an argonaute protein which is involved in the endogenous small interfering RNA (endo-siRNA) pathway and is required for RNA-mediated gene silencing (RNAi) in the germline. It plays a key role in transgenerational epigenetic inheritance and germline immortality. NRDE-3 transports small interfering RNAs (siRNAs) from the cytoplasm to the nucleus. It is required for RNA interference (RNAi) in nuclei and also for exogenous RNAi-induced H3K27 methylation.
