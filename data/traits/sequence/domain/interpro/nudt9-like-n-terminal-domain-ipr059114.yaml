identifier: InterPro:IPR059114
label: "NUDT9-like, N-terminal domain"
definition: >-
  This domain is found towards the N-terminal end of ADP-ribose pyrophosphatase, mitochondrial (NUDT9) and towards the C-terminal of Transient receptor potential cation channel subfamily M member 2 (TRPM2) and similar animal sequences. This domain, which has an α-β configuration, is often found associated to a catalytic C-terminal Nudix domain. NUDT9 hydrolyses ADP-ribose (ADPR) to AMP and ribose 5'-phosphate. TRPM2 is a nonselective, voltage-independent cation channel that mediates Na+ and Ca2+ influx, leading to increased cytoplasmic Ca2+ levels. It functions as a ligand-gated ion channel, gated by intracellular adenosine diphosphate ribose (ADP-ribose), Ca2+, warm temperature, and oxidative stress. This entry also include Protein ced-11 from Caenorhabditis elegans, which plays a major role in programmed cell death.
