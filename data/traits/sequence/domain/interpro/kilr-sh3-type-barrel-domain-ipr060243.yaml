identifier: InterPro:IPR060243
label: "KilR, SH3-type barrel domain"
definition: >-
  This entry represents a domain of approximately 73 amino acids that adopts an SH3-type barrel fold structure. The domain is found in KilR proteins. The proteins are found in bacteria and viruses, including prophage sequences. The domain is responsible for the cell division inhibitory activity. KilR causes inhibition of cell division. At high levels of expression, it can also abolish the rod shape of the cells. Division inhibition by KilR can be relieved by overexpression of the cell division protein FtsZ.
