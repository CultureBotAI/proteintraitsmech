identifier: InterPro:IPR045292
label: "NDUFB9, LYR domain"
definition: >-
  NDUFB9, also called LYR motif-containing protein 3 (LYRM3), is an accessory subunit of the mitochondrial membrane respiratory chain NADH dehydrogenase (complex I), and is believed to be not involved in catalysis. In general, accessory subunits are integral for assembly and function of Complex I, which functions in the transfer of electrons from NADH to the respiratory chain. NDUFB9 belongs to the Complex1_LYR-like superfamily that consists of proteins of diverse functions that are exclusively found in eukaryotes and contain the conserved tripeptide 'LYR' close to the N terminus.
