identifier: InterPro:IPR057489
label: "Menorin, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Menorin from C. elegans and related sequences mainly from nematodes. This domain may adopt a β-sandwich fold comprising 14 antiparallel β-strands. Menorin is involved in generation of neurons and regulation of dendrite extension.
