identifier: InterPro:IPR060149
label: "Cell division protein CdvB, C-terminal domain"
definition: >-
  This entry represents the C-terminal helix-turn-helix (HTH) domain of the archaeal cell division protein CdvB. This domain is found in thermophilic archaea including Sulfolobaceae, Desulfurococcaceae, and Pyrodictiaceae. The specific function of this domain remains to be determined. CdvA, CdvB, and CdvC form a complex that polymerises between segregating nucleoids during cell division. This complex plays a crucial role in maintaining the structure that becomes progressively smaller as the cell constricts. The full-length CdvB protein is part of the archaeal cell division machinery and functions as an ESCRT-III homologue that polymerises between segregating nucleoids during cell division. The C-terminal HTH domain (residues approximately 213-261) is necessary and sufficient for interaction with CdvA.
