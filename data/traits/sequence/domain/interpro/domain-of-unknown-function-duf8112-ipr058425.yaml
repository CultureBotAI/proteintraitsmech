identifier: InterPro:IPR058425
label: "Domain of unknown function DUF8112"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins found predominantly in the class Halobacteria within the Archaea domain. The proteins containing this domain are primarily distributed among various genera such as Halorubrum, Halalkalicoccus, and Natronococcus. The domain is typically found in proteins ranging from 90 to 250 amino acids in length. These domains contain to CXXC motifs suggesting they are zinc binding domains.
