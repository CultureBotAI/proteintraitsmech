identifier: InterPro:IPR061456
label: "Serine/threonine-protein kinase B/F, N-terminal domain"
definition: >-
  This entry represents the N-terminal short domain of Serine/threonine-protein kinase B/F from Synechocystis sp. (SKPB/F) and similar proteins from cyanobacteria. SKPB is thought to be required for cell motility, but not for phototaxis. Most proteins with this N-terminal domain are protein serine/threonine protein kinases that resemble eukaryotic ribosomal protein S6 kinase and the Mycobacterium tuberculosis serine/threonine protein kinases PknA and PknB, although those proteins lack this domain. Some, however, are protein serine/threonine phosphatases. Members of this domain family have a highly conserved CxxPxC and CxxCG motifs at the two ends of this N-terminal region.
