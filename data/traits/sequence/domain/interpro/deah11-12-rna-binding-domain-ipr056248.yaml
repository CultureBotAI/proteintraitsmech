label: "DEAH11/12, RNA-binding domain"
definition: >-
  This presumed RNA binding domain (RBD) is found in ATP-dependent RNA helicase DEAH11 and DEAH12 from Arabidopsis thaliana and similar sequences from plants. Its specific function is unknown.
