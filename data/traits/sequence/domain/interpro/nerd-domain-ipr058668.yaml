identifier: InterPro:IPR058668
label: "NERD domain"
definition: >-
  This domain is found in Zinc finger CCCH domain-containing protein 19 (NERD) from Arabidopsis thaliana and similar plant proteins. NERD plays a central role in integrating RNA silencing and chromatin signals in the 21 nt siRNA-dependent DNA methylation on the cytosine pathway leading to transcriptional gene silencing of specific sequences. This domain is predicted to show an α-β configuration.
