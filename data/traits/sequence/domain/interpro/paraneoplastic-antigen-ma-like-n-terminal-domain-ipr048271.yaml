identifier: InterPro:IPR048271
label: "Paraneoplastic antigen Ma-like, N-terminal domain"
definition: >-
  This domain resembles an RNA-binding RRM domain in AlphaFold structure predictions. This domain is found at the N-terminal of various of paraneoplastic Ma antigens (PNMA) and similar proteins. The paraneoplastic Ma antigens (PNMA) have been identified using sera from patients with paraneoplastic neurological syndromes. This entry includes paraneoplastic antigen PNMA1, PNMA2, PNMA3, PNMA4 (also known as modulator of apoptosis 1 or MOAP-1) and some paraneoplastic antigen-like proteins (PNMA5 and PNMA6). PNMA4/MOAP-1 has a role in death receptor-dependent apoptosis, and it also plays a role in autophagy as it promotes phagophore closure via association with ATG8 proteins. Zinc finger CCHC domain-containing protein 12 (ZCCHC12, also known as Sizn1 in mouse), also a member of this entry, is a transcriptional coactivator in the bone morphogenetic protein (BMP)-signaling pathway. It positively modulates BMP signaling by interacting with SMAD1 and associating with CBP in the transcription complex. It contributes to the BMP-induced enhancement of cholinergic-neuron-specific gene expression. This protein may be a potential molecular marker of papillary thyroid carcinoma.
