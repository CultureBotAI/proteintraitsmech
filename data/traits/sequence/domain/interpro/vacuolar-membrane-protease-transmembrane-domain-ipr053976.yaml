identifier: InterPro:IPR053976
label: "Vacuolar membrane protease, transmembrane domain"
definition: >-
  This entry includes fungal vacuolar membrane proteases, such as PFF1 from yeast, which may be involved in vacuolar sorting and osmoregulation. It is the homologue of human ERMP1. According to AlphaFold structure predictions, these proteins consist of a M28 peptidase domain ( ) at the N-terminal, a central transmembrane domain (TM) and a C-terminal domain with an elongated β-sandwich-like fold ( ), similar to the Mu homology domain (MHD) ( ). This entry represents the TM domain of PFF1 and its fungal homologues.
