identifier: InterPro:IPR047417
label: "MUS81, winged helix domain"
definition: >-
  This entry represents the winged helix (WH) domain of MUS81, which is responsible for DNA binding. It comprises four helices and two β-strands. Mus81 is a crossover junction endonuclease that interacts with Eme1 (essential meiotic structure-specific endonuclease 1) and Eme2 to form a DNA structure-specific endonuclease with substrate preference for branched DNA structures with a 5'-end at the branch nick. The typical substrates include 3'-flap structures, replication forks and nicked Holliday junctions. Mus81 may be required in mitosis for the processing of stalled or collapsed replication forks.
