identifier: InterPro:IPR063964
label: "Tincar, transmembrane helical domain"
definition: >-
  This entry represents five transmembrane helices from the transmembrane domain of Tincar, a multi-pass membrane protein found in Drosophila melanogaster. The domain contains multiple transmembrane helices that span the membrane eight times, creating both extracellular and cytoplasmic regions, with a large insertion after the first thre helices. Tincar is involved in eye morphogenesis and may be essential for normal differentiation of ommatidial cells. The protein is expressed in various developmental contexts including cardioblasts, neural tissues, and eye imaginal discs. The transmembrane architecture suggests a role in cellular signalling or transport across the membrane.
