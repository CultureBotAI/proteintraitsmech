identifier: InterPro:IPR048863
label: "Pre-mRNA-splicing helicase BRR2-like, plug domain"
definition: >-
  This entry represents the plug domain from the Brr2 RNA helicase from yeast and its homologues, such as U5 small nuclear ribonucleoprotein 200 kDa helicase from human. The Brr2 helicase provides the key remodelling activity for spliceosome catalytic activation, during which it disrupts the U4/U6 di-snRNP (small nuclear RNA protein). The plug domain is a small α-helical bundle domain, found near the N-terminal of the Brr2 protein.
