identifier: InterPro:IPR059102
label: "PHF7/G2E3-like, PHD zinc finger domain"
definition: >-
  This PHD zinc finger domain is found in human E3 ubiquitin-protein ligase PHF7 and G2/M phase-specific E3 ubiquitin-protein ligase (G2E3),its fly orthologue Pineapple eye protein (PIE) and similar animal E3 ubiquitin-protein ligases. PHF7 ubiquitinates histone H4. G2E3 accepts ubiquitin from an E2 ubiquitin-conjugating enzyme in the form of a thioester and then directly transfers the ubiquitin to targeted substrates. It is essential in early embryonic development to prevent apoptotic death. PIE is required for survival of imaginal disk cells possibly by regulation of cell apoptosis and for germline stem cell self-renewal through mediation of BMP signalling.
