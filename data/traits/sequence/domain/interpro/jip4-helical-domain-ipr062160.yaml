identifier: InterPro:IPR062160
label: "JIP4, helical domain"
definition: >-
  This entry represents a helical domain found in JIP4 (Jumonji- interacting protein 4) and related proteins from yeasts. The protein is extensively phosphorylated at multiple serine residues and is associated with spliceosomal complexes. These proteins are classified under eggNOG group ENOG502RISH in eukaryotes. The function of this helical domain remains to be determined.
