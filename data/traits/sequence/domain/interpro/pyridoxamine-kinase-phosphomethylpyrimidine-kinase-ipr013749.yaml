identifier: InterPro:IPR013749
label: "Pyridoxamine kinase/Phosphomethylpyrimidine kinase"
definition: >-
  Enzymes in this family belong to the ribokinase superfamily. Pyridoxamine kinase phosphorylates B6 vitamers and functions in a salvage pathway. Phosphomethylpyrimidine kinase is part of the thiamine pyrophosphate (TPP) synthesis pathway. TPP is an essential cofactor for many enzymes.
