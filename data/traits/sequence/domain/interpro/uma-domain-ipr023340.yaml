identifier: InterPro:IPR023340
label: "UMA domain"
definition: >-
  This entry represents the UMA domain, which contains a conserved proline followed by a hydrophobic residue in the N terminus and a nearly absolutely conserved glutamate at the C terminus. It is predicted to adopt an α+β fold. A key aspect of eukaryotic intracellular trafficking is the sorting of cell-surface proteins into multi-vesicular endosomes or bodies (MVBs), which eventually fuse with the lysosome, where they are degraded by lipases and peptidases. This is the primary mechanism for down-regulation of signaling via transmembrane receptors and removal of misfolded or defective membrane proteins. This process is also utilised by several viruses (e.g. HIV-1) to facilitate budding of their virions from the cell-membrane. Studies in animals and fungi have shown that it depends on an intricate series of interactions, which is initiated via ubiquitination (typically one or more mono-ubiquitinations) of the cytoplasmic tails of membrane proteins by specific E3 ligases. Ubiquitinated membrane proteins are then captured into endosomes by the ESCRT system and prevented from being recycled back to the plasma membrane via the retrograde trafficking system. The ESCRT system also folds the endosomal membranes into invaginations that are concentrated in these ubiquitinated targets and catalyzes their abscission into intra-luminal-vesicles inside the endosome. This largely seals the fate of these membrane proteins as targets for lysosomal degradation. The ESCRT system is comprised of 4 major protein complexes, ESCRT-0 to ESCRT-III, which are successively involved in the above-described steps. ESCRT-I contains three subunits that are conserved between yeast and animals, namely the inactive E2-ligase protein TSG101/VPS23, VPS28 and VPS37. Additionally, both yeast and metazoan ESCRT…
