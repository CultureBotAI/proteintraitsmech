identifier: InterPro:IPR040815
label: "Nas2, N-terminal"
definition: >-
  This entry represents the N-terminal domain of Nas2, which is a proteosome assembly chaperone. Nas2 bivalently binds the proteasome Rpt5 subunit. The Nas2 N-terminal helical domain masks the Rpt1-interacting surface of Rpt5.
