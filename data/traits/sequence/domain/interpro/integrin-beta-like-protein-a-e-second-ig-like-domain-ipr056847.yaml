identifier: InterPro:IPR056847
label: "Integrin beta-like protein A-E, second Ig-like domain"
definition: >-
  This entry represents the second Ig-like domain (according to structure predictions) of Integrin beta-like proteins A-E (SibA-E) from Dictyostelium discoideum and similar sequences from lower eukaryotes and some bacterial species. The SibA (Similar to Integrin Beta) protein is a type I transmembrane protein, and its cytosolic, transmembrane and extracellular domains contain features also found in integrin beta chains. This protein is involved in cellular adhesion to substrate or phagocytic particles. The conserved cytosolic domain of SibA interacts with talin, a well-characterised partner of mammalian integrins. Based on these similarities it was speculated that the cellular adhesion mechanisms are similar in Dictyostelium and in mammalian cells, and that observations in the Dictyostelium model system can be extrapolated to mammalian cells.
