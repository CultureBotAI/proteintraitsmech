identifier: InterPro:IPR041193
label: "CysA, C-terminal regulatory domain"
definition: >-
  ABC (ATP-binding cassette) transporters share a common architecture comprising two variable hydrophobic transmembrane domains (TMDs) that form the translocation pathway and two conserved hydrophilic ABC-ATPases that hydrolyze ATP. This is the C-terminal regulatory domain found at the ATPase subunit of CysA, a putative sulfate ABC transporter from Alicyclobacillus acidocaldarius. The regulatory domain of CysA is built up of an elongated β-barrel composed of two β-sandwiches that form a common hydrophobic core.
