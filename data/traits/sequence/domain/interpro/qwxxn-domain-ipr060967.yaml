identifier: InterPro:IPR060967
label: "QWxxN domain"
definition: >-
  The QWxxN domain is about 125 amino acids long, and appears typically as the conserved core region in up to 9 tandem repeats, each about 200 amino acids long. Proteins with this domain are known so far only in the genus Enterococcus, and may reach over 3000 amino acids in length.
