identifier: InterPro:IPR022575
label: "Neurogenic differentiation factor, domain of unknown function"
definition: >-
  This domain is found in Neurogenic differentiation factor 1 from Mus musculus (NeuroD1) and similar proteins from animals. Neuronal basic helix-loop-helix (bHLH) transcription factors such as neuroD and neurogenin have been shown to play important roles in neuronal development and its absence leads to serious diseases. This domain is found C-terminal to the less specific helix-loop-helix DNA binding domain .
