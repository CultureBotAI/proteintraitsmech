identifier: InterPro:IPR055527
label: "Domain of unknown function DUF7101"
definition: >-
  This is a domain found in a group on uncharacterised proteins from fungi. The function of this domain is unknown. According to structural predictions, this domain likely adopts an α-β-β-β-β-α fold. This domain is usually found associated with an α-helical domain at the N-terminal and a β-propeller at the C-terminal .
