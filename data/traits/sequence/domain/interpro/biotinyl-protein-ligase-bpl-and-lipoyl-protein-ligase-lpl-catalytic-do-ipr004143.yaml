identifier: InterPro:IPR004143
label: Biotinyl protein ligase (BPL) and lipoyl protein ligase (LPL), catalytic domain
definition: >-
  This entry represents the catalytic domain of a group of lipoyl ligases/lipoyltransferases, such as Lipoate-protein ligase A/B (LipA/B) from E.coli and mammalian lipoyltransferases. These proteins catalyse the transfer of the lipoyl group from lipoyl-AMP to the specific lysine residue of lipoyl domains of lipoate-dependent enzymes. Lipoic acid is an essential cofactor of the alpha-ketoacid dehydrogenase complexes and the glycine cleavage system. Biotin and lipoic acid are the covalently bound cofactors of various multicomponent enzyme complexes that catalyse key metabolic reactions. In these enzymes complexes, biotin and lipoic acid are attached via amide linkage through their carboxyl group and the ε-amino group of a specific lysine residue of a protein module known respectively as the biotinyl and the lipoyl domain. Covalent attachment of biotin and lipoic acid to these enzyme complexes occurs post-translationally, and it is mediated by biotinylating and lipoylating protein enzymes, which specifically recognise the biotinyl and lipoyl domains, ensuring their correct post-translational modification. Lipoylating and biotinylating enzymes are evolutionarily related protein families containing a homologous catalytic module. Amino acid sequence conservation between the catalytic modules of biotinyl protein ligases (BPLs) and lipoyl protein ligases (LPLs) is very low, and mainly affects residues that are important for the scaffold of the structure, such as those contributing to the hydrophobic core. Despite the poor overall sequence similarity, a single lysine residue is strictly conserved in all LPL and BPL sequences. This lysine residue is likely to bind specifically to the carbonyl oxygen of the carboxyl group of biotin or at the end of the hydrogen- carbon tail of the…
