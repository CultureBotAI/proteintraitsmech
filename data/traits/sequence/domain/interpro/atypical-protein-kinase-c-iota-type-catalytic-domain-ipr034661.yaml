identifier: InterPro:IPR034661
label: Atypical protein kinase C iota type, catalytic domain
definition: >-
  PKCs are classified into three groups (classical, atypical, and novel) depending on their mode of activation and the structural characteristics of their N-terminal regulatory domain. Atypical protein kinases C (aPKCs) have a PB1 and an atypical C1 domain, which only accepts phosphatidylserine. In mammals there are two aPKC isoforms, zeta and iota/lambda (iota is the human orthologue and lambda the mouse orthologue). aPKCs are involved in many cellular functions including proliferation, migration, apoptosis, polarity maintenance and cytoskeletal regulation. They also play a critical role in the regulation of glucose metabolism and in the pathogenesis of type 2 diabetes. PKC-iota is directly implicated in carcinogenesis. It is critical to oncogenic signalling mediated by Ras and Bcr-Abl. The PKC-iota gene is the target of tumour-specific gene amplification in many human cancers, and has been identified as a human oncogene. In addition to its role in transformed growth, PKC-iota also promotes invasion, chemoresistance, and tumour cell survival. Expression profiling of PKC-iota is a prognostic marker of poor clinical outcome in several human cancers. PKC-iota also plays a role in establishing cell polarity, and has critical embryonic functions.
