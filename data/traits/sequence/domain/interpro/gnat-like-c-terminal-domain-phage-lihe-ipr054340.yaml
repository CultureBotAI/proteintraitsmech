identifier: InterPro:IPR054340
label: "GNAT-like, C-terminal domain, phage-lihe"
definition: >-
  This domain is found at the C-terminal of a group of proteins from tailed bacteriophages and bacterial prophages, including some predicted GNAT family N-acetyltransferase. It has been characterised as part of a nucleic acid modifying system in certain phages. This system may modify tRNAs that are encoded adjacent to the system on the genome.
