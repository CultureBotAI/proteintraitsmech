identifier: InterPro:IPR028666
label: "Sorting nexin-17, FERM domain, N-terminal subdomain"
definition: >-
  SNX17 contains a PX (Phox homology) domain and a FERM (Band 4.1, ezrin, radixin, moesin) domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). Sorting nexin-17 (SNX17) belongs to the sorting nexin family, which contains a conserved PX (phox homology) domain that may be responsible for binding to specific phosphoinositides. SNX17 is a critical regulator of endosomal recycling of numerous receptors, channels, and other transmembrane proteins. It binds to Asn-Pro-Xaa-Tyr (NPxY) sequences in the cytoplasmic tails of cargo such as LDL receptors and the amyloid precursor protein. SNX17 also affects T cell activation by regulating T cell receptor and integrin recycling.
