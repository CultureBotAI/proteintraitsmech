identifier: InterPro:IPR014840
label: "Hpc2-related domain"
definition: >-
  HPC2 (Histone promoter control 2) is required for cell-cycle regulation of histone transcription. It regulates transcription of the histone genes during the S-phase of the cell cycle by repressing transcription at other cell cycle stages. HPC2 mutants display synthetic interactions with FACT complex which allows RNA Pol II to elongate through nucleosomes.
