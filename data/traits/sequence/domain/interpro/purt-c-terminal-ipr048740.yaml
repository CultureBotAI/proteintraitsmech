identifier: InterPro:IPR048740
label: "PurT, C-terminal"
definition: >-
  Formate-dependent phosphoribosylglycinamide formyltransferase (PurT) is involved in de novo purine biosynthesis. PurT belongs to the ATP-grasp superfamily of enzymes and catalyses the transfer of formate to 5-phospho-ribosyl-glycinamide (GAR), producing 5-phospho-ribosyl-N-formylglycinamide (FGAR). This entry represents the C-terminal domain which has a rudiment single hybrid motif consisting of a sandwich of half-barrel shaped β-sheets.
