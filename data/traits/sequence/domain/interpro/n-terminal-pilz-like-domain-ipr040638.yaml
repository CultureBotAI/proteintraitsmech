identifier: InterPro:IPR040638
label: "N-terminal PilZ-like domain"
definition: >-
  This domain is found in PilZ domain-containing proteins from Deltaproteobacteria, such as from Geobacter sulfurreducens. This domain is located N-terminal to a canonical PilZ domain, with a PilZ-related structure comprising the β-barrel fold, lacking the C-terminal α-helix and both c-d-GMP-binding motifs. This domain also has a N-terminal loop that forms a short α-helix (3 residues).
