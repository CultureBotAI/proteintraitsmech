label: "Phage L5-like integrase, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of Integrase from Mycobacterium phage L5, which is required for integration of the phage into the host genome by site-specific recombination. This domain is often found associated with . This group also includes many prophages mainly found in actinomycetes.
