identifier: InterPro:IPR056549
label: "Nucleolar protein 4, helical domain"
definition: >-
  This domain is found in human Nucleolar protein 4 (NOL4), Nucleolar protein 4-like (NOL4L) and similar animal sequences. This domain is predicted to form an α-helical bundle. NOL4 has been identified as a methylation target for cervical and head and neck cancer. NOL4L was first identified in acute myeloid leukaemia and was shown to be involved in cell progression in neuroblastoma. NOL4L effects gene expression in the PI3K/AKT pathway and is critical for tumor progression and metastasis in ovarian cancer cells.
