identifier: InterPro:IPR025309
label: "KTSC domain"
definition: >-
  This short domain is named after lysine tRNA synthetase C-terminal domain. It is found at the C terminus of some lysyl tRNA synthetases and also as a single domain protein in bacterial proteins. The domain is about 60 amino acids in length and contains a reasonably conserved YXY motif in the centre of the sequence. The function of this domain is unknown, but it could be an RNA binding domain.
