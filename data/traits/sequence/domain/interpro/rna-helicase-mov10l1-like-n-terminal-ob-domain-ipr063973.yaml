identifier: InterPro:IPR063973
label: "RNA helicase Mov10l1-like, N-terminal OB domain"
definition: >-
  This oligonucleotide/oligosaccharide binding (OB) domain is found at the N-terminal of RNA helicase Mov10l1, its paralogue Cancer/testis antigen 55 from human and similar animal proteins. MOV10L1 is required during spermatogenesis to repress transposable elements and prevent their mobilisation, which is essential for germline integrity.
