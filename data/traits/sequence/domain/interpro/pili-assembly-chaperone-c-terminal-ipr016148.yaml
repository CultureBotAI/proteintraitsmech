identifier: InterPro:IPR016148
label: "Pili assembly chaperone, C-terminal"
definition: >-
  Most Gram-negative bacteria possess a supramolecular structure - the pili - on their surface, which mediates attachment to specific receptors. Many interactive subunits are required to assemble pili, but their assembly only takes place after translocation across the cytoplasmic membrane. Periplasmic chaperones assist pili assembly by binding to the subunits, thereby preventing premature aggregation. Pili chaperones are structurally, and possibly evolutionarily, related to the immunoglobulin superfamily: they contain two globular domains, with a topology identical to an immunoglobulin fold. This entry represents the C-terminal domain of pili assembly chaperone PapD consisting of an Ig-like fold containing seven β-strands arranged in two sheets with a Greek key topology.
