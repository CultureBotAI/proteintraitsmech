identifier: InterPro:IPR040678
label: "AbrB, C-terminal"
definition: >-
  This is the C-terminal domain of AbrB protein from Bacillus subtilis. AbrB is a transition state regulator. Functions of AbrB include biofilm formation, antibiotic production, competence development, extracellular enzyme production, motility, and sporulation. The C-terminal domain is responsible for multimerization and, to a lesser extent than the N-terminal domain, also contributes in DNA binding.
