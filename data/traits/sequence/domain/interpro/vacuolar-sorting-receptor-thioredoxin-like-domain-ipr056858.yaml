identifier: InterPro:IPR056858
label: "Vacuolar sorting receptor, thioredoxin-like domain"
definition: >-
  This entry represents the thioredoxin (TRX)-like domain found in vacuolar sorting receptors (VSRs) from plants. These proteins are involved in clathrin-coated vesicles sorting from Golgi apparatus to vacuoles. This domain is located in the central region of VSRs, between the N-terminal protease-associated (PA) domain ( ) and the C-terminal epidermal growth factor (EGF)-like ( ) domains. The domain has a thioredoxin-like fold but its exact function in VSRs is not fully understood. It may be involved in protein-protein interactions or potentially in disulfide bond isomerisation of cargo proteins. It contains multiple disulfide bonds, including a CxxxC motif that is structurally conserved with the CxxC active site motif found in canonical thioredoxins, and is involved in intermolecular interactions that contribute to the formation of VSR trimers, which may be important for VSR function. It may play a role in the pH and calcium-dependent binding and release of cargo proteins by VSRs during vacuolar protein sorting.
