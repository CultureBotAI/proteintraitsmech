identifier: InterPro:IPR063169
label: "GtrB-like, C-terminal hairpin"
definition: >-
  This entry represents a C-terminal β-hairpin domain of approximately 60 residues found in bacterial polyisoprenyl-phosphate glycosyltransferases. The crystal structure of GtrB from Synechocystis reveals that this domain bridges interactions between adjacent subunits in the tetrameric assembly. Polyisoprenyl-phosphate glycosyltransferases catalyse the first step in extracellular glycosylation by attaching sugars to lipid carriers such as undecaprenyl-phosphate in bacteria or dolichol phosphate in eukaryotes. This C-terminal domain is always located following two transmembrane helices and plays a structural role in maintaining the oligomeric state of these enzymes.
