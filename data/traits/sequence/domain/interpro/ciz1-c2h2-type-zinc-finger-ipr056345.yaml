identifier: InterPro:IPR056345
label: "CIZ1, C2H2-type zinc finger"
definition: >-
  This C2H2-type zinc finger domain is found in human Cip1-interacting zinc finger protein (CIZ1), its orthologue from Drosophila Zinc finger protein on ecdysone puffs and similar animal proteins. CIZ1 may regulate the subcellular localisation of CIP/WAF1.
