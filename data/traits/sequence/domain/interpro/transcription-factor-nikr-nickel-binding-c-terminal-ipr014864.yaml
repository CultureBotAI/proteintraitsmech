identifier: InterPro:IPR014864
label: "Transcription factor, NikR, nickel binding C-terminal"
definition: >-
  NikR is a transcription factor that regulates nickel uptake. It consists of two dimeric DNA binding domains separated by a tetrameric regulatory domain that binds nickel. This protein corresponds to the C-terminal regulatory domain which contains four nickel binding sites at the tetramer interface.
