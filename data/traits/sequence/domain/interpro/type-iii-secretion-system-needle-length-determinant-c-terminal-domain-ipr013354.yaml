identifier: InterPro:IPR013354
label: "Type III secretion system needle length determinant, C-terminal domain"
definition: >-
  Proteins with this domain include YscP of the Yersinia type III secretion system and equivalent proteins in other pathogenic bacterial type III secretion systems. The entry describes the conserved C-terminal region. The N-terminal regions are poorly conserved, variable in length and often contain low-complexity sequences.
