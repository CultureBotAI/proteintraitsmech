identifier: InterPro:IPR058486
label: "Domain of unknown function DUF8173"
definition: >-
  This entry represents an α-helical domain from a family of uncharacterised prokaryotic proteins. The domain is approximately 180 amino acids in length. Proteins containing this domain are predicted to be integral membrane proteins, as suggested by the presence of multiple transmembrane helices.
