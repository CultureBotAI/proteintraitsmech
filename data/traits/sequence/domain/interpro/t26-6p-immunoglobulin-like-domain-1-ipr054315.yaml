label: "T26-6p, immunoglobulin-like domain 1"
definition: >-
  This domain is found at the N-terminal in T26-6p from Thermococcus and similar archaeal sequences. T26-6p has three domains: two β- sandwich with two sheets made of four antiparallel β-strands (this entry and ) and a bundle of five α-helices ( ).
