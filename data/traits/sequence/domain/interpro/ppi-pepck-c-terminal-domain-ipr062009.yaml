identifier: InterPro:IPR062009
label: "PPi-PEPCK, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of PPi-type phosphoenolpyruvate carboxykinase (PPi-PEPCK). PPi-PEPCK is an inorganic pyrophosphate-dependent enzyme that regulates carbon flow in central metabolism by fixing carbon dioxide to phosphoenolpyruvate to produce oxaloacetate. The full-length enzyme can also produce pyruvate and diphosphate from phosphoenolpyruvate and phosphate. PPi-PEPCK proteins are found as monomers and trimers, and can form heterotrimers. The enzyme is localised to the cytosol. This C-terminal domain contains a predicted coiled-coil motif. The function of this domain remains to be determined.
