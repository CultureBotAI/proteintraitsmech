identifier: InterPro:IPR061852
label: "Transcription activator of adhesion 4, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of Transcription activator of adhesion 4 from Verticillium dahliae (VTA4) and similar fungal proteins. VTA4 is a transcription activator that controls cell adhesion. It is predicted to adopt an α/β structure.
