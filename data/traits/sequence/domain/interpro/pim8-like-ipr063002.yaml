identifier: InterPro:IPR063002
label: PIM8-like
definition: >-
  This domain is found in the immunity protein PIM8 from Leptospira interrogans and related proteins. PIM8 is a part of a toxin/antitoxin system in which PT8 is a toxin protein possessing antibacterial and antifungal activity.
