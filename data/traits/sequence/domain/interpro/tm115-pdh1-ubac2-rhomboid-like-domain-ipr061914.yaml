identifier: InterPro:IPR061914
label: "TM115/pdh1/UBAC2, rhomboid-like domain"
definition: >-
  This entry represents an integral membrane domain similar to rhomboid proteases, found in Transmembrane protein 115 from human and its homologues, such as Pdh1 from S.pombe, Ubiquitin-associated domain-containing protein 2 (UBAC2) and its homologues. These proteins are classified as pseudoproteases, as they are inactive members of the rhomboid-family.
