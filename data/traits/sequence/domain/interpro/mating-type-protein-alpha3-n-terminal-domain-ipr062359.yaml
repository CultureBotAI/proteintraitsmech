identifier: InterPro:IPR062359
label: "Mating-type protein alpha3, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain in yeast mating-type proteins, exemplified by Kluyveromyces lactis ALPHA3. The domain spans approximately 210 amino acids and is related to bZIP domain-containing proteins. Mating-type proteins are sequence- specific DNA-binding proteins that function as master switches in yeast differentiation by controlling gene expression in a cell type-specific manner. The ALPHA3 protein is required for efficient mating as an alpha-cell and is present only in alpha-cells and a/alpha diploid cells. This domain can span a large portion of smaller proteins or be found as an N-terminal region in larger mating-type proteins.
