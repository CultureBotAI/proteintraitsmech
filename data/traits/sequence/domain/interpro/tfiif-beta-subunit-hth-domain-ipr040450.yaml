identifier: InterPro:IPR040450
label: "TFIIF beta subunit, HTH domain"
definition: >-
  Accurate transcription in vivo requires at least six general transcription initiation factors, in addition to RNA polymerase II. Transcription initiation factor IIF (TFIIF) is a tetramer consisting of two large subunits (TFIIF alpha or RAP74) and two small subunits (TFIIF beta or RAP30). The beta subunit of TFIIF is required for recruitment of RNA polymerase II onto the promoter.
