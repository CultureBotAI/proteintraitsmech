identifier: InterPro:IPR063059
label: "KOW domain associated with HD domain"
definition: >-
  This entry represents a KOW domain found at the C terminus of HD domain-containing proteins, predominantly from Bacillota. The proteins contain N-terminal HD domains with metal-dependent phosphohydrolase activity. KOW domains are small domains of approximately 60-70 amino acids. The specific function of this C-terminal KOW domain in HD domain-containing proteins remains to be determined.
