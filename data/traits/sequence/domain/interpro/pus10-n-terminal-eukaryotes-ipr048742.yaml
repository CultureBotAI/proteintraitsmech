identifier: InterPro:IPR048742
label: "Pus10, N-terminal, eukaryotes"
definition: >-
  This entry represents the N-terminal domain of eukaryotic tRNA pseudouridine synthase Pus10. Pus10 has different functions depending on its subcellular location: involved in miRNA processing in the nucleus and acts as a tRNA pseudouridylate synthase in the cytoplasm. This domain functions as an accessory RNA-binding domain regarding the presence of a THUMP domain, similarly to other pseudouridine synthases. The N-terminal domain of eukaryotic Pus10 (this entry) is much larger than that of archaeal Pus10, while both groups of proteins belong to .
