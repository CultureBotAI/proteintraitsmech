identifier: InterPro:IPR007699
label: "SGS domain"
definition: >-
  The SGT1-specific (SGS) domain is a module of ~90 amino acids, which was initially identified in eukaryotic Sgt1 proteins. It was latter also found in calcyclin-binding proteins. The SGS domain has been shown to bind to proteins of the S100 family, which are thought to function as sensors of calcium ion concentration in the cell. In budding yeasts, Sgt1 is required for both SCF (Skp1p/Cdc53p-Cullin-F-box)-mediated ubiquitination, cyclic AMP pathway activity and kinetochore function. Its Schizosaccharomyces pombe homologue, Git7, is required for glucose and cyclic AMP signaling, cell wall integrity, and septation. Its two homologues in Arabidopsis, SGT1a and SGT1b, can complement two yeast temperature-sensitive sgt1 mutant alleles, suggesting that fundamental cellular function(s) of yeast SGT1in SCF-mediated protein ubiquitylation. Moreover, SGT1a and SGT1b can act as cochaperones with HSP90 and HSC70 and function in regulating multiple resistance (R) genes and environmental responses. The SGS domain of SGT1 is a key determinant of the HSC70-SGT1 association. Calcyclin (S100A6) is a member of the S100A family of calcium binding proteins and appears to play a role in cell proliferation.
