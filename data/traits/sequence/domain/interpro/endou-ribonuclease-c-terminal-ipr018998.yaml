identifier: InterPro:IPR018998
label: EndoU ribonuclease, C-terminal
definition: >-
  This entry represents the EndoU domain found at the C-terminal of EndoU endoribonucleases, which carries out a conserved RNA processing function. The EndoU domain cleaves RNA at uridylates and release 2',3'-cyclic phosphodiester ends. The EndoU domain is an α/β domain, that contains nine α-helices and three antiparallel β-sheets; the latter are clustered on one side of the domain, whereas the α-helices are largely on the other side. It contains a conserved trio of catalytic residues, two histidines and a lysine. EndoU is a family of metal-dependent endoribonucleases that is broadly conserved among eukaryotes. EndoU family members have RNA-binding and endoribonuclease activities and appear to be involved in many aspects of biology, including small nucleolar RNA biogenesis, endoplasmic reticulum (ER) network formation, immune response, and neurodegeneration: Xenopus laevis endoribonuclease XendoU is responsible for processing the intron encoded U16 and U86 small nucleolar RNAs (snoRNAs). Human EndoU, also known as PP11 (placental protein 11), has an endoribonuclease activity with placental tissue specificity. Drosophila melanogaster CG2145 and DendoU endoribonucleases. Caenorhabditis elegans endu-2 regulates nucleotide metabolism and germ cell proliferation in response to nucleotide imbalance and other genotoxic stress.
