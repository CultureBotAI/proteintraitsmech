identifier: InterPro:IPR035704
label: "SNX8/Mvp1, PX domain"
definition: >-
  Sorting nexin-8 (SNX8) belongs to the sorting nexin family, which contains a conserved PX (phox homology) domain that is responsible for binding to specific phosphoinositides. It may play a role in intracellular protein transport from early endosomes to the trans-Golgi network. SNX8 yeast counterpart, Mvp1, is required for sorting proteins to the vacuole. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions. Sorting nexins (SNXs) make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway. Some SNXs are localized in early endosome structures such as clathrin-coated pits, while others are located in late structures of the endocytic pathway.
