identifier: InterPro:IPR049780
label: "Kinesin-like protein KIF1A/B, pleckstrin homology domain"
definition: >-
  This entry represents the pleckstrin homology (PH) domain located at the C-terminal end of human Kinesin-like protein KIF1A and KIF1B and similar proteins from animals, including the KIF1A homologue Kinesin-like protein unc-104 from Drosophila melanogaster. KIF1A and KIF1B bind to RAB3 proteins through the adaptor protein mitogen-activated protein kinase (MAPK) -activating death domain (MADD; also calledDENN), which was first identified as a RAB3 guanine nucleotide exchange factor (GEF). Members of this group have an N-terminal motor domain, followed by a coiled-coil domain, and a C-terminal PH domain. PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. The specificity of this domain is usually determined by loop regions or insertions at the N terminus of the domain, which are not conserved across all PH domains.
