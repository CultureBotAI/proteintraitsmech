identifier: InterPro:IPR064050
label: "TGF-alpha/betacellulin-like, EGF domain"
definition: >-
  This entry represents the EGF-like domain found in transforming growth factor alpha (TGFA) and betacellulin (BTC) in vertebrates. These are mitogenic polypeptides that bind to the EGF receptor (EGFR) and promote cell proliferation. The domain contains six conserved cysteine residues that form three disulphide bonds in a 1-3, 2-4, 5-6 pattern characteristic of EGF-like domains. TGF-alpha acts synergistically with TGF-beta to promote anchorage-independent cell proliferation.
