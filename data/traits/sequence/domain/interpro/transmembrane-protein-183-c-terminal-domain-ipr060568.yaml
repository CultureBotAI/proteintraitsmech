identifier: InterPro:IPR060568
label: "Transmembrane protein 183, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of transmembrane protein 183 (TMEM183) proteins found in animals. These proteins are single-pass membrane proteins that have a single transmembrane helix located near the C-terminal region. Many members contain an F-box-like domain and are associated with SCF ubiquitin ligase complexes. The proteins show tissue-specific expression patterns and may be involved in protein stability regulation. The specific function of this C-terminal domain remains to be determined.
