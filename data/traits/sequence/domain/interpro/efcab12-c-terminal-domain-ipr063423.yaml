identifier: InterPro:IPR063423
label: "EFCAB12, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of EF-hand calcium-binding domain-containing protein 12 (EFCAB12). The full-length EFCAB12 protein contains an EF-hand calcium-binding domain that binds calcium ions. The protein is found in mammals and other vertebrates, and shows tissue- enhanced expression in choroid plexus and fallopian tube in humans. The full-length protein interacts with FHL3 and contains disordered regions in addition to the structured EF-hand domain. The specific function of this C-terminal domain remains to be determined.
