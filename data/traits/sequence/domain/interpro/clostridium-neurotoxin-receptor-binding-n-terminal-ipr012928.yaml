identifier: InterPro:IPR012928
label: Clostridium neurotoxin, receptor binding N-terminal
definition: >-
  The Clostridium neurotoxin family is composed of tetanus neurotoxin and seven serotypes of botulinum neurotoxin. These toxins act as inhibitors of neurotransmitter release. The structure of the botulinum neurotoxin reveals a four domain protein. The N-terminal catalytic domain, the central translocation domain and two receptor binding domains. This domain is the N-terminal receptor binding domain, which is comprised of two seven-stranded β-sheets sandwiched together to form a jelly role motif. The role of this domain in receptor binding appears to be indirect.
