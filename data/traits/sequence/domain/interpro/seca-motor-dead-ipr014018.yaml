identifier: InterPro:IPR014018
label: "SecA motor DEAD"
definition: >-
  SecA is a cytoplasmic protein of 800 to 960 amino acid residues. The eubacterial secA protein plays an important role in protein export. It interacts with the secY and secE components of the protein translocation system. It has a central role in coupling the hydrolysis of ATP to the transfer of proteins across the membrane. SecA is a superfamily 2 (SF2) helicase that adapted to translocate proteins. It contains the characteristic DEAD/DEXH ATPase core structure with the seven SF2 motifs.
