identifier: InterPro:IPR032264
label: "Menaquinone biosynthesis protein MenD, middle domain"
definition: >-
  This entry represents the middle domain of menaquinone biosynthesis protein MenD, an enzyme that belongs to the thiamine pyrophosphate (TPP) enzyme family, but is not captured by . This enzyme is necessary for the first step of the biosynthesis of menaquinone, or vitamin K2, an important cofactor in electron transport in bacteria.
