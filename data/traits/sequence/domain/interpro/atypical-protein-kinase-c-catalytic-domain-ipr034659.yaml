identifier: InterPro:IPR034659
label: Atypical protein kinase C, catalytic domain
definition: >-
  PKCs are classified into three groups (classical, atypical, and novel) depending on their mode of activation and the structural characteristics of their N-terminal regulatory domain. Atypical protein kinases C (aPKCs) have a PB1 and an atypical C1 domain, which only accepts phosphatidylserine. In mammals there are two aPKC isoforms, zeta and iota/lambda (iota is the human orthologue and lambda the mouse orthologue). aPKCs are involved in many cellular functions including proliferation, migration, apoptosis, polarity maintenance and cytoskeletal regulation. They also play a critical role in the regulation of glucose metabolism and in the pathogenesis of type 2 diabetes. This entry consists mainly of invertebrate aPKCs. In Drosophila, aPKC is also involved in polarity maintenance, cytoskeletal regulation and cell cycle progression, and proliferation.
