identifier: InterPro:IPR048021
label: UlaG-like, metallo-hydrolase domain
definition: >-
  UlaG is essential for L-ascorbate utilization under anaerobic conditions; it is a manganese-dependent l-ascorbate-6-P lactonase that catalyses the hydrolysis of L-ascorbate-6-phosphate to 3-keto-L-gulonate-6-phosphate. This entry represents the metallo-hydrolase domain which belongs to the MBL-fold metallo-hydrolase superfamily.
