identifier: InterPro:IPR049122
label: "A2MG, CUB domain"
definition: >-
  This domain is found in a group of proteins predominantly found in beta and gammaproteobacteria, such as alpha-2-macroglobulin (A2MG) from Salmonella typhimurium, a protein that protects the bacterial cell from host peptidases. A2MG is composed of 13 domains, 12 of them folding as beta sandwiches. This entry represents the CUB (complement C1r/C1s, Uegf, Bmp1) domain, which is connected to the TED domain ( ).
