identifier: InterPro:IPR058801
label: "PDZD8, N-terminal domain"
definition: >-
  This domain is found in the human PDZD8 and related proteins from animals and some fungal species. The domain represented by this entry shares similarity to the so-called TULIPs (Tubular lipid binding proteins) domain fold, which is characteristic of a superfamily of lipid-binding proteins known as Aha1/BPI domain-like. PDZ domain-containing protein 8 (PDZD8) is a multidomain, membrane-associated protein primarily localised to the endoplasmic reticulum (ER). This protein connects endoplasmic reticulum and mitochondria membranes, and the PDZD8-dependent endoplasmic reticulum-mitochondria membrane tethering is essential for endoplasmic reticulum-mitochondria Ca2+ transfer. PDZD8 utilises distinct domains to interact with Rab7-GTP and the ER transmembrane protein Protrudin and together these components localise to an ER-late endosome membrane contact sites.
