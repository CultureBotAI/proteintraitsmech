identifier: InterPro:IPR058783
label: "IREH1/IRE-like, N-terminal domain"
definition: >-
  This domain is found towards the N-terminal end of Probable serine/threonine protein kinase IREH1 and IRE from Arabidopsis thaliana and similar plant sequences. IREH1 may be involved in root hair elongation. IRE modulates root tip growth and may play a common role in the tip growth of plant cells. This domain is predicted to fold as an helical bundle.
