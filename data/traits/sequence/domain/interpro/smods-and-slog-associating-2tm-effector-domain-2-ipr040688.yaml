identifier: InterPro:IPR040688
label: "SMODS and SLOG-associating 2TM effector domain 2"
definition: >-
  The SLATT domain contains two transmembrane helices. SLATT domains are generally predicted to function as pore-forming effectors in a class of conflict systems which are reliant on the production of second messenger nucleotide or nucleotide derivatives. SLATT domains are predicted to initiate cell suicide responses upon their activation. This SLATT family is the only prokaryotic SLATT family to exist as a standalone domain, with no as-yet discernable genome associations.
