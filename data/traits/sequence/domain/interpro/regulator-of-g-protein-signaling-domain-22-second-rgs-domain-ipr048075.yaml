identifier: InterPro:IPR048075
label: "Regulator of G protein signaling domain 22, second RGS domain"
definition: >-
  This entry represents the second RGS domain from RGS22, which contains at least 3 copies of this domain in vertebrates and exists in multiple splicing variants. Rgs22 is a testis-specific regulator of G-protein signaling involved in human and mouse spermiogenesis. It interacts with guanine nucleotide binding protein GNA12/13. It has been shown to inhibit pancreatic adenocarcinoma cell migration through the G12/13 alpha subunit/F-actin pathway.
