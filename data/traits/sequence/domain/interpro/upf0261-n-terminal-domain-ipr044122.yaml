identifier: InterPro:IPR044122
label: "UPF0261, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of ToMV resistance protein Tm-1 and the uncharacterised UPF0261 proteins. The tomato resistance protein Tm-1, which inhibits replication complex formation through its binding to tomato mosaic virus (ToMV) replication proteins. It contains an ATP-binding site required for interaction with ToMV proteins.
