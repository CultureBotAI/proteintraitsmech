identifier: InterPro:IPR063656
label: "Claspin, C-terminal"
definition: >-
  This entry represents the C-terminal region of Claspin, a protein required for checkpoint-mediated cell cycle arrest in response to DNA replication stress or DNA damage. This protein is found in metazoans including vertebrates and insects. The full-length Claspin protein functions as an adapter that facilitates ATR- dependent phosphorylation of CHEK1 and BRCA1, and associates with replisome components including the MCM2-7 complex and TIMELESS. This region of Claspin contains CHEK1-binding motifs (CKBD).
