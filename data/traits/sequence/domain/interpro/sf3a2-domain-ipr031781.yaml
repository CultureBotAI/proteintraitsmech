identifier: InterPro:IPR031781
label: "SF3A2 domain"
definition: >-
  This entry represents a domain found in the SF3A2 protein, which is a component of the SF3a splicing factor complex of the mature U2 snRNP (small nuclear ribonucleoprotein particle). This domain can also be found in SF3A2 yeast homologues, Prp11 and Sap62. In budding yeasts, SF3a complex shows a bifurcated assembly structure of three subunits, Prp9 (subunit 3), Prp11 (subunit 2) and Prp21 (subunit 1).
