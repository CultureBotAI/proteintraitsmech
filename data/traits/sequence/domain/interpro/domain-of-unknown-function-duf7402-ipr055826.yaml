identifier: InterPro:IPR055826
label: "Domain of unknown function DUF7402"
definition: >-
  This entry represents the domain of unknown function found in bacterial and fungal sequences, including some F5/8 type C domain-containing proteins such as Swissprot:A0A4V0YDU8. This domain may adopt a galactose-binding domain-like fold. This domain is found in several copies, predominantly between two and six times, and it is found in association with PIG-L (Pfam:PF02585) domain.
