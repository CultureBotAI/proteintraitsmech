identifier: InterPro:IPR033921
label: DPS-like protein, ferritin-like diiron-binding domain
definition: >-
  Dps-like proteins are members of the broad superfamily of ferritin-like diiron-carboxylate proteins, which are non-haem iron storage proteins. The Dps-like protein from Sulfolobus solfataricus is structurally related to a class of DNA-binding protein from starved cells (Dps). It has been experimentally characterised and shown to self-assemble into a hollow dodecameric protein cage having tetrahedral symmetry, which uses H2O2 to oxidize Fe(II) to Fe(III), storing the oxide as a mineral core on the interior surface of the protein cage. Members of the Dps-like family may therefore be involved in the mitigation of oxidative damage. This entry represents the ferritin-like diiron-binding domain of Dps-like proteins from archaea and bacteria. Many of the conserved residues of a diiron centre are present in this domain.
