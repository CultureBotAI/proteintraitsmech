identifier: InterPro:IPR008824
label: RuvB-like, AAA+ ATPase domain
definition: >-
  This entry represents the N-terminal domain of RuvB-like proteins. It adotps a Rossman fold (αβα sandwich). The RuvB protein makes up part of the RuvABC resolvasome which catalyses the resolution of Holliday junctions that arise during genetic recombination and DNA repair. Branch migration is catalysed by the RuvB protein that is targeted to the Holliday junction by the structure specific RuvA protein. RuvB is part of the AAA+ superfamily of ATPases. The AAA+ superfamily of ATPases is found in all kingdoms of living organisms where they participate in diverse cellular processes including membrane fusion, proteolysis and DNA replication. Although the terms AAA+ and AAA are often used loosely and interchangeably, the classical AAA family members are distinguished by their possession of the SRH region in the AAA module. Many AAA+ proteins are involved in similar processes to those of AAA proteins (facilitation of protein folding and unfolding, assembly or disassembly of proteins complexes, protein transport and degradation), but others function in replication, recombination, repair and transcription. For a review see.
