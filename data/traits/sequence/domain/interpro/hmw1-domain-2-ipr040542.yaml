identifier: InterPro:IPR040542
label: "HMW1 domain 2"
definition: >-
  This domain is found in Actinobacillus pleuropneumoniae HMW1C (ApHMW1C). HMW1 adhesin is an N-linked glycoprotein that mediates adherence to respiratory epithelium through N-glycosylation of protein acceptor sites and O-glycosylation of sugar acceptor sites. This domain forms an all alpha domain (AAD) when combined with the N-terminal domain. The AAD interacts extensively with the C-terminal GT-B fold in order to create a unique groove with the potential to accommodate the acceptor protein.
