identifier: InterPro:IPR019236
label: Phosphatidate phosphatase APP1, catalytic domain
definition: >-
  This entry represents the catalytic domain of Phosphatidate phosphatase APP1 from yeast. This domain has a weak sequence similarity to the haloacid dehalogenase-like domain. APP1 catalyses the dephosphorylation of phosphatidate to yield diacylglycerol and may play a role in vesicular trafficking through its phosphatidate phosphatase activity at cortical actin patches.
