identifier: InterPro:IPR062123
label: "TMIGD3, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in TMIGD3 proteins which comprises a single transmembrane helix. TMIGD3 is a transmembrane protein that plays a suppressive role in osteosarcoma malignancy by inhibiting NF-kappa-B activity. The protein is localised to the membrane and is expressed in lung and bone tissues. TMIGD3 undergoes alternative splicing to produce multiple isoforms. While the full-length protein has demonstrated tumour suppressor activity, the specific function of this C-terminal domain remains to be determined.
