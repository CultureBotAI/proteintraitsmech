identifier: InterPro:IPR021567
label: "Lens epithelium-derived growth factor, integrase-binding domain"
definition: >-
  Lens epithelium-derived growth factor (LEDGF), also known as transcriptional co-activator p75, is a chromatin-associated protein that protects cells from stress-induced apoptosis. It is the binding partner of HIV-1 integrase in human cells. The integrase binding domain (IBD) of LEDGF is a compact right-handed bundle composed of five α-helices. The residues essential for the interaction with the integrase are present in the inter-helical loop regions of the bundle structure. The integrase binding domain is not unique to LEDGF, as a second human protein, hepatoma-derived growth factor-related protein 2 (HRP2), contains a homologous sequence.
