identifier: InterPro:IPR060262
label: "UvrABC system protein B, third helical domain"
definition: >-
  This entry represents the third helical domain of UvrB proteins, which are essential components of the UvrABC nucleotide excision repair system. This small helical domain contributes to the overall architecture of the UvrB protein. The domain is found across diverse bacterial taxa and in archaea. In Eubacteria and some Archaea, the first steps in nucleotide excision repair are carried out by the coordinated action of the UvrA, UvrB, and UvrC proteins. A damage recognition complex composed of 2 UvrA and 2 UvrB subunits scans DNA for abnormalities. Upon binding of the UvrA(2)B(2) complex to a putative damaged site, the DNA wraps around one UvrB monomer. DNA wrap is dependent on ATP binding by UvrB and probably causes local melting of the DNA helix, facilitating insertion of UvrB β-hairpin between the DNA strands. Then UvrB probes one DNA strand for the presence of a lesion. If a lesion is found the UvrA subunits dissociate and the UvrB-DNA preincision complex is formed. This complex is subsequently bound by UvrC and the second UvrB is released. If no lesion is found, the DNA wraps around the other UvrB subunit that will check the other stand for damage.
