identifier: InterPro:IPR053919
label: "Treslin, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Treslin, the metazoan counterpart of Sld3 from yeast, which are the hub proteins mediating protein associations critical for the helicase formation. Treslin, as Sld3, interacts with TopBP1 in a Cdk2-dependent manner, which then collaborate in the Cdk2-mediated loading of Cdc45 onto replication origins. Treslin and Sld3 differ in their molecular sizes and amino acid sequences, however, they share a conserved Sld3/Treslin domain (STD). According to their similarities, it has been suggested that helicase activation in mammals has diverged in complexity during evolution from that in yeasts and may involve additional partners that interact with TopBP1. This N-terminal domain is also referred to as conserved in Treslins (CIT), which has a von Willebrand factor type A (vWA) fold and its function in replication is not clear.
