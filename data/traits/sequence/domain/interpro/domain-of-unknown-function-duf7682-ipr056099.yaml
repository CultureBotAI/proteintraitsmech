identifier: InterPro:IPR056099
label: "Domain of unknown function DUF7682"
definition: >-
  This entry represents a small zinc-binding domain found to the N-terminal of proteins that belong to the ParE toxin superfamily. The exact function of this domain is unknown. The zinc ligands are composed of the Cys and His in the N-terminal CGH motif and the Cys residues in the C-terminal CHXC motif.
