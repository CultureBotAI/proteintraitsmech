identifier: InterPro:IPR042153
label: VDR, DNA-binding domain
definition: >-
  This entry represents the DNA-binding domain of vitamin D receptors (VDR). It is composed of two C4-type zinc fingers. Each zinc finger contains a group of four Cys residues which coordinates a single zinc atom. VDR interacts with a VDR response element, a direct repeat of GGTTCA DNA site with 3 bp spacer upstream of the target gene, and modulates the rate of transcriptional initiation.
