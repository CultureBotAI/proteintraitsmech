identifier: InterPro:IPR023885
label: "4Fe4S-binding SPASM domain"
definition: >-
  This domain contains regions binding additional 4Fe4S clusters found in various radical SAM proteins C-terminal to the domain described by . Radical SAM enzymes with this domain tend to be involved in protein modification, including anaerobic sulphatase maturation proteins, a quinohemoprotein amine dehydrogenase biogenesis protein, the Pep1357-cyclizing radical SAM enzyme, and various bacteriocin biosynthesis proteins. SkfB from Bacillus subtilis , which catalyses the formation of the thioether bond required for production of the sporulation killing factor SkfA, also contains this domain. The motif CxxCxxxxxCxxxC is nearly invariant for members of this family, although PqqE has a variant form. This domain has been named SPASM for Subtilosin, PQQ, Anaerobic Sulphatase, and Mycofactocin.
