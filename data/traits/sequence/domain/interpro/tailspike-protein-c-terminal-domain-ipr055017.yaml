identifier: InterPro:IPR055017
label: "Tailspike protein, C-terminal domain"
definition: >-
  This entry represents the Concanavalin-like C-terminal domain of Tail fibre protein from Escherichia phage vB_EcoP_G7C ( ), also known as domain 6 (d6) of the tailspike receptor-binding protein (RBP) gp63.1. This domain is structurally similar to carbohydrate-binding domains and is putatively involved in substrate binding. This β-sandwich fold consists of two antiparallel β-sheets, each containing six strands ( ).
