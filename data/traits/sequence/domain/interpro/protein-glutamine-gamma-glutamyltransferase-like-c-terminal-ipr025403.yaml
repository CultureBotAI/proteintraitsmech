identifier: InterPro:IPR025403
label: "Protein-glutamine gamma-glutamyltransferase-like, C-terminal"
definition: >-
  This entry represents a domain found at the C-terminal end a group of prokaryotic proteins, including Protein-glutamine gamma-glutamyltransferase from Pseudomonas aeruginosa (TgpA) and similar proteins that contain a transglutaminase core domain ( ). TgpA displays transglutaminase activity in vitro and plays a critical role in the viability of the bacteria. It might contribute to an essential function linked to the cell wall. This domain is also found in may uncharacterised sequences that lack the ransglutaminase-like domain. The function of this domain, previously known as DUF4129, is unknown. It has a conserved TXXE motif.
