identifier: InterPro:IPR063620
label: "Ethanolamine utilisation protein EutQ, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Ethanolamine utilisation protein EutQ, which adopts a cupin fold. The eut operon of Salmonella typhimurium encodes proteins involved in ethanolamine degradation and is essential during anoxic growth on ethanolamine and tetrathionate. EutQ is an acetate kinase necessary to drive flux through the pathway under physiological conditions, preventing a buildup of acetaldehyde. The ATP generated by EutQ may be used as a substrate for EutT, the ATP-dependent corrinoid adenosyltransferase, and for the EutA ethanolamine ammonia-lyase reactivase. Proteins in this entry belong to the cupin superfamily with a conserved jelly roll-like β-barrel fold capable of homodimerization. In contrast to the metal-binding catalytic cupins, the EutQ family does not possess the histidine residues that are responsible for metal coordination in the oxidoreductase and epimerase classes of cupins.
