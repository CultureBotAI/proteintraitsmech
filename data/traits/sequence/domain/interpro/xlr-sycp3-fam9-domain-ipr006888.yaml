identifier: InterPro:IPR006888
label: "XLR/SYCP3/FAM9 domain"
definition: >-
  This entry represents a conserved region found in the members of the FAM9 and XLR/SYCP3 families. SYCP3, also known as COR1, is a component of the transverse filaments of synaptonemal complexes (SCS), formed between homologous chromosomes during meiotic prophase.
