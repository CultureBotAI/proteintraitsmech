identifier: InterPro:IPR060061
label: "Agl23 flippase-associated protein-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Agl23 from the extremely halophilic archaea Haloarcula hispanica (also known as Dpm4, ( ), a putative flippase-associated protein involved in hexose-dolichol phosphate (hexose-DolP) translocation across membranes. Agl23 (also known as HAH_2016) is a multi-spanning membrane protein with 11 predicted transmembrane helices. It is required for both N- and O-glycosylation of S-layer glycoproteins. Deletion of Agl23 leads to accumulation of all four species of hexose-DolP in the membrane and complete loss of glycosylation. However, both N- and O-linked glycans can be synthesised in vitro when the membrane barrier is disrupted, suggesting that Agl23 controls the accessibility of hexose-DolPs to glycosyltransferases rather than directly catalysing glycan assembly. The C-terminal domain shows structural similarity to methyltransferase domains.
