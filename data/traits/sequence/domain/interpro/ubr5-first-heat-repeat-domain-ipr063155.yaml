identifier: InterPro:IPR063155
label: "UBR5, first HEAT repeat domain"
definition: >-
  This domain is found in the human E3 ubiquitin ligase UBR5 and related proteins, including the Drosophila melanogaster homologue E3 ubiquitin-protein ligase hyd. UBR5 is a nuclear E3 ligase that ubiquitinates a vast range of substrates for proteasomal degradation and has been identified as an important regulator of oncogenes. This domain is located central and it plays a role of a scaffold that holds protein interaction domains.
