identifier: InterPro:IPR055160
label: "PilE-like, C-terminal"
definition: >-
  This domain is found at the C-terminal of Type IV pili fiber building block protein from Francisella tularensis (PilE), which adopts the canonical Type IVa pilin fold, with an helix embedded in a four-stranded anti-parallel β-sheet.
