identifier: InterPro:IPR025139
label: "Domain of unknown function DUF4062"
definition: >-
  This presumed domain is functionally uncharacterised. This domain family is found in bacteria, archaea and eukaryotes, and is approximately 80 amino acids in length. There is a conserved SST sequence motif. This domain can be found in telomerase protein component 1 (TEP1), which is a component of the telomerase ribonucleoprotein complex that is essential for the replication of chromosome termini.
