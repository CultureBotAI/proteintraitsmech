identifier: InterPro:IPR062002
label: "Inner membrane protein YabI-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of YabI and related inner membrane proteins belonging to the DedA family. It follows the N-terminal VTT domain ( ). These are multi-pass membrane proteins with six predicted transmembrane helices. In Escherichia coli, YabI has been implicated in FtsZ-dependent cytokinesis and response to ionising radiation. The family is restricted to Enterobacterales. The specific function of this domain remains to be determined.
