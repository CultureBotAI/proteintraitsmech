identifier: InterPro:IPR007867
label: Glucose-methanol-choline oxidoreductase, C-terminal
definition: >-
  The glucose-methanol-choline (GMC) oxidoreductases are FAD flavoproteins oxidoreductases. These enzymes include a variety of proteins; choline dehydrogenase (CHD), methanol oxidase (MOX) and cellobiose dehydrogenase which share a number of regions of sequence similarities. The function of this C-terminal conserved domain is not yet known.
