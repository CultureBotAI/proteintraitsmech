identifier: InterPro:IPR028676
label: "Syntaxin-17, SNARE motif"
definition: >-
  Syntaxin-17 (STX17) belongs to the syntaxin family, which is a group of the membrane integrated proteins participating in exocytosis. Syntaxins are associated with various intracellular membrane compartments and have been implicated in various physiological processes such as axonal growth, cell division and autophagosome-lysosome fusion. STX17 is required to maintain the architecture of ER-Golgi intermediate compartment and Golgi. STX17 is also involved in the fusion of autophagosomes with endosomes/lysosomes. Its unique C-terminal hairpin structure mediated by two tandem transmembrane domains is essential for its association with the autophagosomal membrane. This entry represents the SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptor) motif of STX17, which consist of coiled-coil helices.
