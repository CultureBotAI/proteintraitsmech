identifier: InterPro:IPR046822
label: "BLOC-2 complex member HPS6, C-terminal domain"
definition: >-
  This entry represents the C-terminal α-solenoid domain of the HPS6 protein. This entry includes BLOC-2 complex, Hps6 subunit, which may regulate the synthesis and function of lysosomes and of highly specialized organelles. It acts as cargo adapter for the dynein-dynactin motor complex to mediate the transport of lysosomes from the cell periphery to the perinuclear region. Hsp6 facilitates retrograde lysosomal trafficking by linking the motor complex to lysosomes, and perinuclear positioning of lysosomes is crucial for the delivery of endocytic cargos to lysosomes, for lysosome maturation and function.
