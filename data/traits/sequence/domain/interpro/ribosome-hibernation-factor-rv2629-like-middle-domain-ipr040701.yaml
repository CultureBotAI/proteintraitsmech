identifier: InterPro:IPR040701
label: "Ribosome hibernation factor Rv2629-like, middle domain"
definition: >-
  This entry represents the middle domain of Uncharacterized protein Rv2629 from Mycobacterium tuberculosis and similar ribosome hibernation factors from actinomycetes. Rv2629 is a Balon homologue that bind to ribosomes in an mRNA-independent manner. Members of this group contain a well-conserved 'FP' motif in the catalytic loop.
