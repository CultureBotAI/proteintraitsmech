identifier: InterPro:IPR046767
label: "Putative adhesive domain (group 8)"
definition: >-
  The structure model of this domain resembles the C-terminal domains of the Streptococcus intermedius antigen I/II (AgI/II). The N-terminal domain of AgI/II (also called adhesin P1, antigen B or PAc) folds towards the stalk, where it gets locked in place. Given that this domain is found N-terminal to repeating stalk domains in bacterial surface proteins, the domain is suggested to have a potential protein binding function.
