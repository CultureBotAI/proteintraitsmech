label: "Domain of unknown function DUF7339"
definition: >-
  This entry represents an uncharacterised protein domain found in bacteriophage proteins, particularly those infecting Lactococcus species. The domain is approximately 115 amino acids in length. It is found in a small number of bacterial proteins as well.
