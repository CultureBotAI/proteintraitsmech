identifier: InterPro:IPR025857
label: "MacB-like periplasmic core domain"
definition: >-
  This entry represents the periplasmic core domain found in a variety of ABC transporters. The structure of this family has been solved for the MacB protein. Some structural similarity was found to the periplasmic domain of the AcrB multidrug efflux transporter.
