identifier: InterPro:IPR049055
label: "NDC10, N-terminal domain"
definition: >-
  Kinetochores link centromeric DNA to spindle microtubules and ensure faithful chromosome segregation during mitosis. In point-centromere yeasts, the CBF3 complex Skp1-Ctf13-(Cep3)(2)-(Ndc10)recognizes a conserved centromeric DNA element through contacts made by Cep3 and NDC10. This entry represents the N-terminal domain of NDC10.
