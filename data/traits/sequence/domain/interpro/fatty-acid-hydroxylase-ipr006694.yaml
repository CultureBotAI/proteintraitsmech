identifier: InterPro:IPR006694
label: "Fatty acid hydroxylase"
definition: >-
  This entry includes fatty acid and carotene hydroxylases and sterol desaturases. Beta-carotene hydroxylase is involved in zeaxanthin synthesis by hydroxylating beta-carotene, but the enzyme may be involved in other pathways. This family includes C-5 sterol desaturase and C-4 sterol methyl oxidase (SMO). Members of this family are involved in cholesterol biosynthesis and biosynthesis a plant cuticular wax. These enzymes contain two copies of a HXHH motif, involved in coordination of two iron atoms in the catalytic centre. Members of this family are ER integral membrane proteins with a mushroom-like structure consisting of four transmembrane helices (TM1-TM4) that anchor them to the membrane, capped by a cytosolic domain containing the unique histidine-coordinating di metal centre. The plant SMO amino acid sequences possess three histidine-rich motifs (HX3H, HX2HH and HX2HH), characteristic of the small family of membrane-bound non-haem iron oxygenases that are involved in lipid oxidation.
