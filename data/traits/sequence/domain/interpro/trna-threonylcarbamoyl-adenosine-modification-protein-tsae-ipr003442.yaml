identifier: InterPro:IPR003442
label: tRNA threonylcarbamoyl adenosine modification protein TsaE
definition: >-
  Members of this entry have a conserved nucleotide-binding motif GXXGXGKT and a nucleotide-binding fold. Member protein YjeE of Haemophilus influenzae (HI0065) was shown to have ATPase activity. The protein has a nucleotide-binding fold with a four-stranded parallel β-sheet flanked by antiparallel β-strands on each side. The topology of the β-sheet is unique among P-loop proteins and has features of different families of enzymes. ADP has been shown to bind to the P-loop in the presence of Mg2+. Recently YjeE has been renamed as TsaE. It is responsible for tRNA threonylcarbamoyl adenosine modification together with proteins TsaB, TsaC, and TsaD, and probably forms a complex with them.
