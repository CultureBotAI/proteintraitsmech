identifier: InterPro:IPR025351
label: "Pvc16, N-terminal"
definition: >-
  Contractile injection systems (CISs) are cell-puncturing nanodevices that share ancestry with contractile tail bacteriophages. Photorhabdus virulence cassette (PVC) represents one group of extracellular CISs that are present in both bacteria and archaea. This entry represents the N-terminal domain of TPvc16, which forms part of a contractile injection system. This domain alone in Pvc16 is able to produce PVC particles with normal length but without the outer sheath, indicating the main function of this N-terminal domain in terminating the tube growth.
