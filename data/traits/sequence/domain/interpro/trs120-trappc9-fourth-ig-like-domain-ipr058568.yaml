identifier: InterPro:IPR058568
label: "Trs120/TRAPPC9, fourth Ig-like domain"
definition: >-
  This entry represents the fourth Ig-like domain found in the middle region of Saccharomyces cerevisiae Trafficking protein particle complex II-specific subunit 120 (Trs120), human Trafficking protein particle complex subunit 9 (TRAPPC9) and similar eukaryotic proteins. Trs120 is a subunit specific to the TRAPP II complex along with Trs65p and Trs130p(TRAPPC10). It is suggested that Trs120p is required for the stability of the Trs130p subunit, suggesting that these two proteins might interact in some way. It is likely that there is a complex function for TRAPP II in multiple pathways. TRAPPC9, an activator of NF-kappa-B through increased phosphorylation of the IKK complex, may function in neuronal cells differentiation and is associated with an intellectual developmental disorder.
