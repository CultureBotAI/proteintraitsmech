identifier: InterPro:IPR046838
label: "BREX system Lon protease-like BrxL, N-terminal"
definition: >-
  This entry represents the N-terminal domain of BREX system Lon protease-like protein BrxL from Bacillus cereus and similar proteins. BrxL is part of a type 1 BREX system, which contains a C-terminal Lon-like protease domain ( ). BREX systems (bacteriophage exclusion) provide immunity against bacteriophage, a system that allows phage adsorption but prevents phage DNA replication, without degradation of the phage DNA.
