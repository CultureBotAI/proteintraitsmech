identifier: InterPro:IPR032009
label: "Stomatal closure-related actin-binding protein, coiled-coil domain"
definition: >-
  This entry represents the two coiled-coil dimerisation domains of plant-specific actin-binding proteins or SCABs, CC1 and CC2, both of which contribute independently to dimerisation. CC1 is also required for actin binding, indicating that SCAB1 is a bivalent actin cross-linker, since CC1 adopts an antiparallel helical hairpin that further dimerises into a four-helix bundle. SCAB proteins bind, bundle and stabilise actin filaments and regulate stomatal movement.
