identifier: InterPro:IPR047738
label: "SAV_2336-like, N-terminal"
definition: >-
  This entry describes an N-terminal domain shared by SAV_2336 from Streptomyces avermitilis ( ) whose C-terminal region suggests restriction enzyme activity, and other proteins with unrelated C-terminal regions. A member protein was also identified in a kanamycin biosynthetic gene cluster, while N-terminal regions of two other member proteins were named Trypco1 in a bioinformatic study of predicted bacterial conflict systems. Members of this group are predominantly found in actinomycetes and cyanobacteria.
