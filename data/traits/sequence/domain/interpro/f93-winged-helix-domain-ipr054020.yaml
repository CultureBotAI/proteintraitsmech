identifier: InterPro:IPR054020
label: "F93, winged-helix domain"
definition: >-
  This entry represents a WH-like domain found in a putative transcription factor called F-93 from Sulfolobus spindle-shaped viruses (SSVs) and related proteins. Members of this family appear to be related to MarR and PadR families of prokaryotic transcription factors.
