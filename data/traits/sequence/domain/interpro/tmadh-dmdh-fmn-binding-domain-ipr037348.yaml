identifier: InterPro:IPR037348
label: TMADH/DMDH, FMN-binding domain
definition: >-
  This entry represents the FMN-binding domain found in trimethylamine dehydrogenase (TMADH) and histamine dehydrogenase (HD). TMADH is an iron-sulfur flavoprotein that catalyzes the oxidative demethylation of trimethylamine to form dimethylamine and formaldehyde. The protein forms a symmetrical dimer with each subunit containing one 4Fe-4S cluster and one FMN cofactor. It contains a unique flavin, in the form of a 6-S-cysteinyl FMN which is bent by ~25 degrees along the N5-N10 axis of the flavin isoalloxazine ring. This modification of the conformation of the flavin is thought to facilitate catalysis. The closely related histamine dehydrogenase catalyzes oxidative deamination of histamine.
