identifier: InterPro:IPR041068
label: "Methyltransferase, fungal type, helix-turn-helix domain"
definition: >-
  This helix-turn-helix domain is found in polyketide synthases (PKSs) in fungi. They are multidomain enzymes that biosynthesise a wide range of natural products. Proteins containing this domain include citrinin polyketide synthases which contain a C-methyltransferase (CMeT) domain that adds one or more S-adenosylmethionine (SAM)-derived methyl groups to the carbon framework.
