identifier: InterPro:IPR000485
label: AsnC-type HTH domain
definition: >-
  The asnC-type HTH domain is a DNA-binding, helix-turn-helix (HTH) domain of about 60 amino acids present in transcription regulators of the asnC/lrp family. This family of prokaryotic regulators is named after Escherichia coli asnC and Leucine-responsive Regulatory Protein (lrp), which are a regulator of asparagine synthesis and a global regulator of various operons, respectively. AsnC/lrp-like proteins are present in bacteria and archaea. The DNA-binding asnC-type HTH domain occurs usually in the N-terminal part. The C-terminal part can contain an effector-binding domain and/or an oligomerisation domain.
