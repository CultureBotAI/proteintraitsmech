identifier: InterPro:IPR032367
label: "Protein quaking, putative nuclear localisation signal"
definition: >-
  This entry represents the very C-terminal region of quaking proteins that is purported to be the nuclear localisation signal. Quaking is a RNA-binding protein that plays a central role in myelinisation.
