label: "RNA-binding protein 12B, RNA recognition motif 4"
definition: >-
  This entry represents the RRM4 of RBM12B which contains five distinct RNA binding motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). Its biological role remains unclear.
