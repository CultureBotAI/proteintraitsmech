identifier: InterPro:IPR062283
label: "Thermolabile hemolysin, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain (NTD) of thermolabile hemolysins, also known as Vibrio dual lipase/transferases (VDLTs). VDLTs are virulence factors secreted by Vibrio pathogens that disrupt host membrane structures through phospholipase A2, lysophospholipase, esterase and glycerophospholipid:cholesterol acyltransferase activities. The NTD is approximately 110 residues in length and packs closely against the C-terminal SGNH/GDSL catalytic domain ( ). VDLTs are found in pathogenic Vibrio species including V. alginolyticus, V. parahaemolyticus, V. cholerae and V. vulnificus. The function of this N-terminal domain remains to be determined.
