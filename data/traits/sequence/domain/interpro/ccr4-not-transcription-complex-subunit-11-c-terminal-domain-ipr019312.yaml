identifier: InterPro:IPR019312
label: CCR4-NOT transcription complex subunit 11, C-terminal domain
definition: >-
  The CCR4-NOT complex plays a key role in mRNA decay in all eukaryotes, thereby contributing importantly to gene expression regulation. Human C2ORF29 proteins, also known as CNOT11, is a component of the CCR4-NOT complex. CNOT11 interacts with the first amino acids of CNOT1 and with CNOT10 and is required for the association of CNOT10 with the CCR4-NOT complex. This entry represents its C-terminal domain.
