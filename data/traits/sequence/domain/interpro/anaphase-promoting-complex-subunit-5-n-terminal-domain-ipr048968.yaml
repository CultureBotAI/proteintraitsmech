identifier: InterPro:IPR048968
label: "Anaphase-promoting complex subunit 5, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of Anaphase-promoting complex subunit 5 from human (Apc5), a component of the anaphase promoting complex/cyclosome (APC/C), a cell cycle-regulated E3 ubiquitin ligase that controls progression through mitosis and the G1 phase of the cell cycle. This domain has an α-helical fold [1-4]. It is normally found in association with .
