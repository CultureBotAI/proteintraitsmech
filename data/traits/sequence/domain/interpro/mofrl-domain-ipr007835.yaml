identifier: InterPro:IPR007835
label: "MOFRL domain"
definition: >-
  The MOFRL(multi-organism fragment with rich Leucine) domain is found in bacteria and eukaryotes. The function of this domain is not clear, although it exists in some putative enzymes such as reductases and kinases.
