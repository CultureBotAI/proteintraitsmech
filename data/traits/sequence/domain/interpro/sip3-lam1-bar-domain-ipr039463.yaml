identifier: InterPro:IPR039463
label: "Sip3/Lam1, BAR domain"
definition: >-
  This entry represents the BAR domain found in a group of fungal proteins including Sip3 and Lam1 from budding yeasts. They contain an N-terminal BAR domain followed by a Pleckstrin Homology (PH) domain. Sip3 interacts with SNF1 protein kinase and activates transcription when anchored to DNA. It may function in the SNF1 pathway. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions including organelle biogenesis, membrane trafficking or remodeling, and cell division and migration.
