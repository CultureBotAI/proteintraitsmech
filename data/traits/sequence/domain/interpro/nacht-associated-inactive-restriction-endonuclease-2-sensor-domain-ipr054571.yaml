identifier: InterPro:IPR054571
label: "NACHT-associated inactive Restriction Endonuclease 2 sensor domain"
definition: >-
  This entry represents a predicted sensor domain in bacterial NACHT conflict systems. It is likely to bind a ligand which could contribute to activation of enzymatic domains additionally fused to the N terminus of the NACHT module.
