identifier: InterPro:IPR040795
label: "Non-structural protein 2, gammacoronavirus"
definition: >-
  Avian infectious bronchitis virus (IBV) is a gammacoronavirus that belongs to Group III of coronaviruses. As all coronaviruses, they have a large genome containing the replicase gene consisting of two large ORFs, ORF1a and 1b that encode two replicase polyproteins ppa1a/1ab, which are then autoproteolytically processed into 15 or 16 matured nonstructural proteins to achieve viral genomic replication, assembly and maturation. This group contains avian viruses and differs from the other groups in that they do not encode the essential pathogenic factor nonstructural protein 1 (NSP1) and instead start with NSP2. IBV NSP2 is one of the first replicase proteins to be translated and processed in the viral life cycle. NSP2 is a weak protein kinase R (PKR) antagonist, which may suggest that it plays a role in interfering with intracellular immunity.
