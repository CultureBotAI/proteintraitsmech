identifier: InterPro:IPR032867
label: DYW domain
definition: >-
  This entry represents a highly conserved C-terminal DYW domain found in some plant pentatricopeptide repeat (PPR) proteins. This domain contains a characteristic zinc binding motif (CXXC, HXE), which has been shown to bind zinc ions. The glutamate residue of the HXE motif is catalytically required in the reaction catalysed by cytidine deaminase. This domain is required for RNA editing, a process that deaminates specific cytidines (C) to uridines (U).
