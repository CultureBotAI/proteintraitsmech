identifier: InterPro:IPR048921
label: "Bc2l-C, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of Lectin from Burkholderia cenocepacia (Bc2l-C) and similar sequences from proteobacteria. Bc2l-C is a soluble lectin involved in bacterial adhesion and subsequent deadly infection of the host. It has two domains: a C-terminal domain and this domain, which adopts a compact jellyroll architecture composed of 11 β-strands and a short helix. It shows specificity for fucosylated human histo-blood group epitopes H-type 1, Lewis b, and Lewis Y.
