identifier: InterPro:IPR058259
label: "Putative Zn2Cys6 domain"
definition: >-
  This entry represents a domain that contains a probable binuclear Zn2+ cluster, in which two Zn2+ atoms are bound by six cysteine residues. This domain is similar to PPR1 transcription factor and related Zn2Cys6 DNA-binding domains but elaborated by additional structural elements. The residues probably involved in Zn2+ coordination are highly conserved but some homologues may have lost the zinc binding properties of the second site.
