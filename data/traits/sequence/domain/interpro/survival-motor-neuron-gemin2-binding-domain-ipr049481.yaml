identifier: InterPro:IPR049481
label: "Survival Motor Neuron, Gemin2-binding domain"
definition: >-
  Survival Motor Neuron (SMN) protein forms the oligomeric core of a multi-protein complex that functions in spliceosomal snRNP biogenesis. It has three highly conserved domains: a short N-terminal segment responsible for binding with high affinity to Gemin2 (a protein involved in snRNP assembly), therefore, called Gemin2-binding domain (G2-BD), a central Tudor domain ( ) that recognises symmetric dimethylarginine (sDMA) modifications in proteins involved in RNA processing, and a C-terminal domain, referred to as the 'YG-box' domain. This is the Gemin2-binding domain (G2-BD) of SMN proteins.
