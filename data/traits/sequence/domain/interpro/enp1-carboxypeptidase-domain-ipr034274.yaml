identifier: InterPro:IPR034274
label: "ENP1, carboxypeptidase domain"
definition: >-
  This entry represents the carboxypeptidase domain found in gamma-D-glutamyl-L-diamino acid endopeptidase 1 (also known as ENP1, ( ); MEROPS identifier M14.008). ENP1 is a member of subfmaily M14C of the M14 family of metallocarboxypeptidases (MCPs). However, it has an exceptional type of activity of hydrolyzing the gamma-D-Glu-(L)meso-diaminopimelic acid (gamma-D-Glu-Dap) bond of L-Ala-gamma-D-Glu-(L)meso-diaminopimelic acid and L-Ala-gamma-D-Glu-(L)meso-diaminopimelic acid(L)-D-Ala peptides. ENP1 has a different substrate specificity and cellular role than MpaA (MpaA does not belong to this group). ENP1 hydrolyzes the gamma-D-Glu-Dap bond of MurNAc-tripeptide and MurNAc-tetrapeptide, as well as the amide bond of free tripeptide and tetrapeptide. ENP1 is active on spore cortex peptidoglycan, and is produced at stage IV of sporulation in forespore and spore integuments.
