identifier: InterPro:IPR057525
label: "U3 small nucleolar RNA-associated protein 20, C-terminal"
definition: >-
  This region of tetratricopeptide-like (TPR) repeats is found at the C-terminal end of eukaryotic proteins including U3 small nucleolar RNA-associated protein 20 from yeast and the human homologue, also known as Small subunit processome component 20 homolog or DRIM (Down-Regulated In Metastasis). DRIM is differentially expressed in metastatic and non-metastatic human breast carcinoma cells. Proteins of this entry are involved in processing of non-coding RNA as components of the small-subunit (SSU) processome; SSU processome is involved in the biogenesis of the 18S rRNA. UTP20 is a huge α-solenoid that functions as a scaffold. This domain is often found C-terminal to .
