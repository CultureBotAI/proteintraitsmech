identifier: InterPro:IPR058778
label: "FAR1-related sequence 11-like, HTH-like domain"
definition: >-
  This entry represents an uncharacterised domain in FAR1-related sequence 11 proteins from plants. This domain contains a helix-turn-helix structure. This domain is also found in the putative protein FAR1-related sequence 10 from Arabidopsis thaliana. FAR1 proteins are involved in the regulation of light-mediated developmental processes. These proteins are putative transcription activators that play a role in controlling plant development in response to light signals. These proteins are likely to participate in the transcriptional regulation of genes that are essential for light perception and signal transduction pathways, thereby influencing various aspects of plant growth and adaptation to environmental light conditions. This domain is adjacent to the N-terminal FAR1 DNA-binding domain ( ) and the putative core transposase domain ( ).
