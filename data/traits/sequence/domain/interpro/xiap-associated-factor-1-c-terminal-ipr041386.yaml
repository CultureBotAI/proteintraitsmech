label: XIAP-associated factor 1, C-terminal
definition: >-
  XIAP-associated factor 1 (XAF1) is a 301-amino acid interferon (INF)-inducible pro-apoptotic protein. This entry represents the C-terminal domain which is functionally identified as XIAP(RING)-binding domain of XAF1.
