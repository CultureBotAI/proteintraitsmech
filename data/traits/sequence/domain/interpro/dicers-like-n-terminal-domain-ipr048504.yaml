identifier: InterPro:IPR048504
label: "Dicers-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of hypothetical proteins from yeast, that are thought to be the noncanonical Dicers found in these organisms. These proteins adopt a homodimer assembly similar to bacterial ribonuclease III but extended by a unique N-terminal domain that consists of five α-helices.
