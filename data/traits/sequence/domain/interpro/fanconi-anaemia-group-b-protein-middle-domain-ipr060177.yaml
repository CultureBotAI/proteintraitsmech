identifier: InterPro:IPR060177
label: "Fanconi anaemia group B protein, middle domain"
definition: >-
  This entry represents a middle domain of the Fanconi anaemia group B protein (FANCB). The specific function of this middle domain remains to be determined. FANCB (also known as FAAP95) is a DNA repair protein required for FANCD2 ubiquitination that is a component of the Fanconi anemia (FA) core complex. The FA core complex composed of FANCA, FANCB, FANCC, FANCE, FANCF, FANCG, FANCL and FANCM, mediates FANCD2 ubiquitination, a key activation step in the FA DNA damage response pathway. The FANCB and the FA pathway also play a critical role in germ cell development and in the maintenance of hematopoietic stem cell function. FA is a recessive genetic disorder characterised by congenital abnormalities, progressive bone marrow failure and cancer susceptibility. Eight proteins (FANCA, B, C, E, F, G, L and M) encoded by the FA causative genes have been demonstrated to form the FA nuclear core complex. FANCB is localised to the nucleus and is involved in interstrand cross-link repair. Mutations in FANCB cause Fanconi anaemia complementation group B, a disorder characterised by bone marrow failure, developmental abnormalities and cancer predisposition
