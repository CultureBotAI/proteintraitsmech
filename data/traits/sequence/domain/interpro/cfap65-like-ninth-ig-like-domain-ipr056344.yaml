identifier: InterPro:IPR056344
label: "CFAP65-like, ninth Ig-like domain"
definition: >-
  This entry represents the ninth Ig-like domain of CFAP65 and related sequences. This domain is also found in hydrocephalus-inducing protein, which is required for ciliary motility. Cilia-Flagella-Associated Protein 65 (CFAP65) is involved in the structural and functional integrity of cilia and flagella. This protein is implicated in the process of flagellar formation and is essential for proper sperm motility, suggesting a role in reproductive biology. CFAP65's function in flagellar assembly indicates its importance in the motility and sensory functions of cilia and flagella across different species.
