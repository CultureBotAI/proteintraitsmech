identifier: InterPro:IPR059405
label: "Domain of unknown function DUF8361"
definition: >-
  This domain is found in uncharacterised proteins from bacteria and eukaryotes. It is predicted to fold into a globular structure composed of a mixed β-sheet and α-helices packed on both sides of it. It contains several conserved cysteine residues which are predicted to form disulfide bonds. In addition, there highly conserved aspartate, glutamate and histidine residues suggesting that some members may have enzymatic activity.
