identifier: InterPro:IPR046699
label: "ARG and Rhodanese-Phosphatase-superfamily-associated domain"
definition: >-
  ARPP-1 (ARG and Rhodanese-Phosphatase-superfamily-associated Protein domain 1) shows a distinguishing group of absolutely conserved residues, including a cysteine and a glutamine, suggestive of enzymatic activity. Structural predictions reveal a core β-sheet comprised of a duplicated four-stranded β-meander with a β-barrel domain bearing the absolutely conserved residues inserted into the first repeat. The unifying biochemical theme across its conserved contextual genome linkages is the presence of molecules with sugar moieties (ADPr, nucleotides, and polysaccharides). In genome contexts linking ARPP-1 with ARG and other counter viral ribosylation domains, ARPP is predicted to act on ribose moieties coming from ADPr. The presence of the conserved cysteine suggests that it could function analogous to the recently characterised SRAP domain by forming covalent cross-links with sugars.
