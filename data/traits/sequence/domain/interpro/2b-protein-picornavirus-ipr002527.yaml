identifier: InterPro:IPR002527
label: "2B protein, picornavirus"
definition: >-
  Poliovirus infection leads to drastic alterations in membrane permeability late during infection. Proteins 2B and 2BC enhance membrane permeability. Protein 2B plays an essential role in the virus replication cycle by acting as a viroporin, forming pores in the host endoplasmic reticulum membrane that trigger the release of Ca2+ into the cytoplasm of infected cells. The resulting elevated cytoplasmic calcium levels are thought to stimulate membrane trafficking, facilitating the transport of viral ER-associated proteins to viroplasms, the cytoplasmic sites of viral genome replication.
