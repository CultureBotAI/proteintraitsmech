identifier: InterPro:IPR055407
label: "Conjugative transposon TraM, C-terminal"
definition: >-
  This domain is found at the C-terminal end of Conjugative transposon TraM protein and similar proteins found in a proposed transfer region of a class of conjugative transposon from bacteroidetes. This domain is predicted to show a β-barrel structure.
