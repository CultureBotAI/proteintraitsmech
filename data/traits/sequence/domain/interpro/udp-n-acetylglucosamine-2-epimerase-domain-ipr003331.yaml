identifier: InterPro:IPR003331
label: "UDP-N-acetylglucosamine 2-epimerase domain"
definition: >-
  This entry represents a domain found in the bacterial UDP-N-acetylglucosamine 2-epimerase WecB, which is involved in the enterobacterial common antigen biosynthesis. It can also be found in the N-terminal region of the mammalian bifunctional protein GNE, which has both the UDP-N-acetylglucosamine 2-epimerase and the N-acetylmannosamine kinase functions. GNE catalyses the first two steps of sialic acid biosynthesis in the cytosol.
