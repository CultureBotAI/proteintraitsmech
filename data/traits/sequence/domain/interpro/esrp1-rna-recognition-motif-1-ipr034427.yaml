identifier: InterPro:IPR034427
label: "ESRP1, RNA recognition motif 1"
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of epithelial splicing regulatory protein 1 (ESRP1). ESRP1 has been identified as an epithelial cell type-specific regulator of fibroblast growth factor receptor 2 (FGFR2) splicing. It is required for expression of epithelial FGFR2-IIIb and the regulation of CD44, CTNND1 (p120-Catenin) and ENAH (hMena) splicing. It enhances epithelial-specific exons of CD44 and ENAH, silences mesenchymal exons of CTNND1, or both within FGFR2. ESRP1 has been shown to function as a tumour suppressor in colon cancer cells, due to its ability to bind to the 5' UTR of several cancer-related genes and regulate their translation. However, high ESRP1 expression has been linked to colorectal cancer progression. ESRP1 contains three RNA recognition motifs (RRMs).
