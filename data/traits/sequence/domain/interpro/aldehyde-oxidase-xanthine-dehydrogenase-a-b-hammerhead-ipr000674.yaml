identifier: InterPro:IPR000674
label: "Aldehyde oxidase/xanthine dehydrogenase, a/b hammerhead"
definition: >-
  Aldehyde oxidase ( ) catalyses the conversion of an aldehyde in the presence of oxygen and water to an acid and hydrogen peroxide. The enzyme is a homodimer, and requires FAD, molybdenum and two 2FE-2S clusters as cofactors. Xanthine dehydrogenase ( ) catalyses the hydrogenation of xanthine to urate, and also requires FAD, molybdenum and two 2FE-2S clusters as cofactors. This activity is often found in a bifunctional enzyme with xanthine oxidase ( ) activity too. The enzyme can be converted from the dehydrogenase form to the oxidase form irreversibly by proteolysis or reversibly through oxidation of sulphydryl groups. The aldehyde oxidase and xanthine dehydrogenase, a/b hammerhead domain is an evolutionary conserved protein domain. This entry includes also the a/b hammerhead domain of the Nicotine 6-hydroxylase ndhL that is involved in the degradation of nicotine.
