identifier: InterPro:IPR037336
label: DEP domain-containing mTOR-interacting protein, DEP domain 2
definition: >-
  DEP domain-containing mTOR-interacting protein (DEPTOR) is an mTOR inhibitor that plays pivotal roles in the pathogenesis and progression of many tumours. This entry represents the second DEP domain of DEPTOR. Its function is not clear.
