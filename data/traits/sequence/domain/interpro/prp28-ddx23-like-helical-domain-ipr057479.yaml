identifier: InterPro:IPR057479
label: "PRP28/DDX23-like, helical domain"
definition: >-
  This short domain is found in DDX23, Pre-mRNA-splicing ATP-dependent RNA helicase (PRP28) and related proteins. This domain adopts an α-helical structure and is usually associated with and . The PRP28 and DDX23 proteins are ATP-dependent RNA helicases that play a crucial role in pre-mRNA splicing. These helicases are involved in destabilising the U1/5'-splice site duplex, allowing effective competition for the 5'-splice site by the U6 snRNA, thereby facilitating the switch between U1 and U6 at the 5'-splice site. Additionally, they may act to unwind the U4/U6 base-pairing interaction within the U4/U6/U5 snRNP, aiding the first covalent step of splicing. The phosphorylated form of some of these proteins is required for spliceosomal B complex formation and helps suppress the formation of aberrant R-loops during transcription. They are components of the U5 snRNP and the U4/U6-U5 tri-snRNP complexes, interacting with various other spliceosomal proteins.
