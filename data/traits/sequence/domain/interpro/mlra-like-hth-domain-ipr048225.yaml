identifier: InterPro:IPR048225
label: "MlrA-like, HTH domain"
definition: >-
  This entry represents the N-terminal HTH domain of MlrA. Many MlrA-like proteins in this group appear to lack the long dimerisation helix seen in the N-terminal domains of typical MerR-like proteins. The HTH transcription regulator MlrA (merR-like regulator A), also known as YehV, has been shown to control cell-cell aggregation by co-regulating the expression of curli and extracellular matrix production in Escherichia coli and Salmonella typhimurium. Its close homologue, CarA from Myxococcus xanthus (not included in this entry), is involved in activation of the carotenoid biosynthesis genes by light. MlrA is part of a signalling cascade that regulates curli biosynthesis. The cascade is composed of two c-di-GMP control modules, in which c-di-GMP controlled by the DgcE/PdeH pair (module I) regulates the activity of the DgcM/PdeR pair (module II), which in turn regulates activity of the transcription factor MlrA. These proteins belong to the MerR superfamily of transcription regulators that promote expression of several stress regulon genes by reconfiguring the spacer between the -35 and -10 promoter elements. Their conserved N-terminal domains contain HTH motifs that mediate DNA binding, while the dissimilar C-terminal domains bind specific coactivator molecules.
