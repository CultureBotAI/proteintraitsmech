identifier: InterPro:IPR024781
label: "Merozoite surface protein, C-terminal"
definition: >-
  Merozoite surface protein 7 (MSP7, ) is a protein of the malaria parasite that has been found to be associated with processed fragments from the MSP1 protein in a complex involved in red blood cell invasion. This entry represents a C-terminal domain found in MSP7 and other Plasmodium merozoite surface proteins.
