identifier: InterPro:IPR037304
label: TNF receptor-associated factor 3, MATH domain
definition: >-
  Tumor necrosis factor (TNF) receptor associated factor 3 (TRAF3) is a highly versatile regulator that positively controls type I interferon production, but negatively regulates mitogen-activated protein (MAP) kinase activation and non-canonical nuclear factor-kB signalling. It is a critical regulator of both innate and adaptive immune responses. TRAF3 plays a role in the regulation of B-cell survival, in the regulation of antiviral responses, and in T-cell dependent immune responses. It is required for normal antibody isotype switching from IgM to IgG. Differences in the ubiquitination of TRAF3 are the key to the selective production of type I interferons versus proinflammatory cytokines. TRAF3 contains a RING finger domain, five zinc finger domains, and a TRAF domain. The TRAF domain can be divided into a more divergent N-terminal α helical region (TRAF-N), and a highly conserved C-terminal MATH subdomain (TRAF-C) with an eight-stranded β-sandwich structure. TRAF-N mediates trimerization while TRAF-C interacts with receptors.
