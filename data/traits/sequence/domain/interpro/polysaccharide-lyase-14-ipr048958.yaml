identifier: InterPro:IPR048958
label: "Polysaccharide lyase 14"
definition: >-
  This protein family includes Alginate lyase from the mollusc Aplysia kurodai (AkAly30) and similar proteins from all cellular organisms. AkAly30 degrades alginate by cleaving the glycosidic bond through a β-elimination reaction. This enzyme adopts a β-jelly roll fold comprising two antiparallel β-sheets. Some β strands of the first sheet twist to form an electropositive-rich cavity where the substrates are believed to be located.
