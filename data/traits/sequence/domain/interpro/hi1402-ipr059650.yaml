identifier: InterPro:IPR059650
label: HI1402
definition: >-
  This entry represents a domain covering the whole length of HI1402 found in bacteria. Members are found across diverse bacterial lineages including Pseudomonadota, particularly in Gammaproteobacteria and Betaproteobacteria. The function of HI1402 remains to be determined. This domain can also be found at the C-terminal in putative phage tail proteins. This domain contains an all-helical fold.
