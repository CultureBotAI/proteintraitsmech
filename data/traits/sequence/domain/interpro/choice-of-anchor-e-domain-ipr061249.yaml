identifier: InterPro:IPR061249
label: "Choice-of-anchor E domain"
definition: >-
  This entry represents a domain just over 100 amino acids long and usually found in tandem copies. Members appear to be extracellular proteins that have some C-terminal anchoring domain, usually PEP-CTERM but occasionally a type IX secrection (T9SS) recognition domain.
