identifier: InterPro:IPR061277
label: "Rha78A-like, N-terminal immunoglobulin domain"
definition: >-
  This domain is found at the N-terminal of Alpha-L-rhamnosidase from Streptomyces avermitilis (Rha78A) and similar proteins. This domain adopts an immunoglobulin-like (Ig-like) fold. This domain is also found in the middle region of Bifunctional sulfatase/alpha-L-rhamnosidase. Rha78A is able to degrade p-nitrophenyl-alpha-L-rhamnopyranoside in vitro. Alpha-L-rhamnosidase enzymes are primarily involved in the degradation of complex polysaccharides. L-Rhamnose is abundant in biomass as a common constituent of glycolipids and glycosides, such as plant pigments, pectic polysaccharides, gums or biosurfactants. Some rhamnosides are important bioactive compounds. For example, terpenyl glycosides, the glycosidic precursors of aromatic terpenoids, act as important flavouring substances in grapes. Other rhamnosides act as cytotoxic rhamnosylated terpenoids, as signal substances in plants or play a role in the antigenicity of pathogenic bacteria. Some proteins are also capable of releasing L-rhamnose from a variety of plant-derived compounds, including citrus flavonoids and arabinogalactan-proteins. The presence of a carbohydrate-binding module (CBM67) in some proteins suggests a specialised domain for L-rhamnose recognition, which is calcium-dependent for its ligand binding.
