identifier: InterPro:IPR060479
label: "EFCAB5, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of EFCAB5 (EF-hand calcium-binding domain-containing protein 5) and related proteins. EFCAB5 is a large protein of approximately 1400-1500 amino acids found in vertebrates, with tissue-enriched expression in testis. The full-length protein contains an EF-hand calcium-binding domain in its central region, whilst this C-terminal domain represents a distinct structural unit. The protein undergoes extensive alternative splicing, with some isoforms lacking portions of this C-terminal region. The full-length EFCAB5 protein has been identified as a phosphoprotein, though the specific function of this C-terminal domain remains to be determined.
