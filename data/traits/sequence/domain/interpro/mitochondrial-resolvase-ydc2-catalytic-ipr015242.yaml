identifier: InterPro:IPR015242
label: "Mitochondrial resolvase Ydc2, catalytic"
definition: >-
  This domain forms a ribonuclease H fold consisting of two β sheets and one α helix, arranged as a β-α-β motif. Each β sheet has five strands, arranged in a 32145 order, with the second strand being antiparallel to the rest. They are capable of resolving Holliday junctions and cleave DNA after 5'-CT-3, and 5'-TT-3, sequences. This entry also includes a domain found in the mitochondrial RNA-splicing protein MRS1 which is involved in the excision of group I introns.
