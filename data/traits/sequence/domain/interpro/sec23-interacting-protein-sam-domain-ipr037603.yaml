identifier: InterPro:IPR037603
label: SEC23-interacting protein, SAM domain
definition: >-
  SEC23IP contains an N-terminal proline-rich region, a central region containing a SAM domain and a C-terminal region with a predicted metal-binding domain. It interacts with Sec23p/Sec24p, which is a component of the COPII-coated vesicles complex involved in protein export from the endoplasmic reticulum. The proline-rich region plays an essential role in this interaction. This entry represents the SAM domain, which is a potential protein-protein interaction domain.
