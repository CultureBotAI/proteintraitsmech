identifier: InterPro:IPR063067
label: "Transfer protein TraSA, N-terminal domain"
definition: >-
  This entry represents an N-terminal domain of approximately 120 residues found in FtsK/SpoIIIE family conjugal transfer proteins in Actinomycetes. This domain is located N-terminal to the FtsK_SpoIIIE ATPase domain ( ). These proteins are related to TraSA conjugal transfer proteins. The domain is structurally related to FtsK_alpha ( ). The function of this domain remains to be determined.
