identifier: InterPro:IPR033907
label: Endolysin/autolysin
definition: >-
  Endolysins and autolysins are found in viruses and bacteria, respectively. The ds DNA phages of eubacteria use endolysins or muralytic enzymes in conjunction with hollin, a small membrane protein, to degrade the peptidoglycan found in bacterial cell walls. Similarly, bacteria produce autolysins to facilitate the biosynthesis of its cell wall hetropolymer peptidoglycan and cell division. Both endolysin and autolysin enzymes cleave the glycosidic beta 1,4-bonds between the N-acetylmuramic acid and the N-acetylglucosamine of the peptidoglycan. This entry represents the lysozyme domain found in endolysins, autolysins and lysozymes.
