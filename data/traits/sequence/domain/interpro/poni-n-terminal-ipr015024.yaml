identifier: InterPro:IPR015024
label: "PoNi, N-terminal"
definition: >-
  This entry represents the N-terminal domain of the PoNe immunity proteins (PoNi), which antagonise the DNAse toxin PoNe (Polymorphic Nuclease effector). PoNi proteins may directly interact with PoNe.
