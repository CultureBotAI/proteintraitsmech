identifier: InterPro:IPR047899
label: "Peptidase inhibitor R3HDML, CAP domain"
definition: >-
  This entry represents the CAP domain of Peptidase inhibitor R3HDML from Mus musculus, which has been described as a putative regulator of skeletal muscle development, and similar sequences from vertebrates. The R3HDML gene may be associated with clinical dimensions of schizophrenia. The wider family of CAP domain containing proteins includes plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins (CRISPs), and allergen 5 from vespid venom, among others. CAP superfamily proteins exhibit diverse roles encompassing various processes, such as modulating the production of the extracellular matrix and facilitating branching morphogenesis, potentially acting as either proteases or protease inhibitors. They are also implicated in regulating ion channels associated with fertility, exerting tumour-suppressive or pro-oncogenic effects in different tissues, including the prostate, and participating in cell-cell adhesion during fertilisation..
