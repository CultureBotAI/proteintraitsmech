identifier: InterPro:IPR060123
label: "Coenzyme F430 synthetase CfbE, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of coenzyme F430 synthetase CfbE, found in methanogenic and methanotrophic Archaea. The specific function of this domain remains to be determined. CfbE is 472 amino acids and catalyses the final step in coenzyme F430 biosynthesis, forming the carbocyclic F ring by intramolecular C-C bond formation from 15,17(3)-seco-F430-17(3)-acid using ATP. Coenzyme F430 is the unique nickel-containing tetrapyrrole prosthetic group of methyl-coenzyme M reductase, which plays a key role in methanogenesis and anaerobic methane oxidation. CfbE belongs to the MurCDEF family of ligases and contains an N-terminal catalytic domain
