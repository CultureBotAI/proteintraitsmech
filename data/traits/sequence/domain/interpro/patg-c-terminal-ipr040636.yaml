identifier: InterPro:IPR040636
label: "PatG, C-terminal"
definition: >-
  This is the C-terminal domain of Prochloron sp. PatG, which processes the precursor peptide to yield the cyclic Patellamide. The C-terminal domain of PatG is 56% structurally homologous to the C-terminal domain of PatA.
