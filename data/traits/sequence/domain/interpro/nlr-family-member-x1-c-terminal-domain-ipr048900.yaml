identifier: InterPro:IPR048900
label: "NLR family member X1, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of NLR family member X1 from humans (NLRX1) and similar proteins from vertebrates. NLRX1 is both a proinflammatory activator that stimulates the production of reactive oxygen species (ROS) via TNFalpha activation and is able to down-regulate inflammatory responses through interaction with the mitochondrial antiviral signalling adaptor and TRAF6-IKK. This domain is organised into a three subdomains: an N-terminal helical domain, a central LRR motifs and a C-terminal three-helix bundle. The interaction of this domain with RNA ligands plays a key role in NLRX1-mediated ROS activation.
