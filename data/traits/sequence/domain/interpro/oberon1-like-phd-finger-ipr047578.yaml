identifier: InterPro:IPR047578
label: "OBERON1-like, PHD finger"
definition: >-
  This entry represents the plant homeodomain (PHD) finger domain of Protein OBERON 1 (OBE1, or potyvirus VPg-interacting protein 2) from Arabidopsis thaliana and similar sequences from streptophytes. OBE1, which acts together with Protein OBERON 2, is involved in the maintenance and/or establishment of the meristems. They interact with potyvirus VPg-interacting proteins (PVIP1 and 2) and act as central regulators in auxin-mediated control of development. PHD fingers can recognise the unmodified and modified histone H3 tail, and some have been found to interact with non-histone proteins.
