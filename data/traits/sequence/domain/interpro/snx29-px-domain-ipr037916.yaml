identifier: InterPro:IPR037916
label: "SNX29, PX domain"
definition: >-
  SNX29 contains an N-terminal RUN domain and a C-terminal PX domain. This entry represents the PX domain. In addition to protein-lipid interaction, the PX domain may also be involved in protein-protein interaction. The RUN domain is found in GTPases in the Rap and Rab families and may play a role in Ras-like signaling pathways.
