identifier: InterPro:IPR057250
label: "Zinc finger C2HC, NPR-type"
definition: >-
  This entry represents the C2HC zinc finger found in NPR1 and related proteins. The nonexpressor of pathogenesis-related genes 1 (NPR1) is a master regulator of the defence transcriptome induced by the plant immune signal salicylic acid (SA). It encodes a protein with two protein-protein interaction domains: a BTB/POZ domain at the N-terminal and an ankyrin repeat domain in the central region. In response to SA-induced redox changes, NPR1 protein is released from a quiescent oligomer to translocate into the nucleus, where it serves as a coactivator in complex with transcription factors (TFs), such as TGAs, a family of basic leucine zipper (bZIP) TGACG motif-binding transcription factors. NPR1 is the founding member of a unique family of proteins divided into three functionally distinct clades. Each of the three clades contains two family members with functional redundancy. In the first clade, NPR1 and NPR2 are SA receptors and act as transcriptional co-activators in plant immunity. In the second clade, NPR3 and NPR4 are also SA receptors and serve as transcriptional co-repressors in plant defence. In the third clade, NPR5/BOP2 and NPR6/BOP1 are involved in plant growth and development. A prominent feature of NPR proteins is the presence of a conserved cysteine cluster within the BTB domain. These cysteine residues, together with a conserved histidine (C-X-D-X(2,3)-C-X-H-X(2)-C) form a zinc finger motif that bridges the BTB domain with the ANKs.
