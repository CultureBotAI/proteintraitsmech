identifier: InterPro:IPR031334
label: "Piezo non-specific cation channel, cap domain"
definition: >-
  This is an extracellular domain at the C terminus of Piezo, or FAM38 mechanosensitive non-specific cation channel protein. These proteins form a channel whose conductance is higher for Li+, intermediate for Na+ and lowest for Li+. Divalent ions except for Mn2+ permeate the channel but more slowly than monovalent ions and can reduce K+ currents. These channels have a homotrimeric three-blade propeller-shaped structure that use a cap-motion and plug-and-latch mechanism to gate their ion-conducting pathways. Each protomer consists of 38 TM helices that form unusual non-planar blades, and an extracellular cap-like structure, the latter represented in this entry. This domain is embedded in the centre of the trimer and may control the transmembrane constriction site suggested to act as a transmembrane gate. This domain adopts a distinctive β-sandwich fold. Members of this entry are found in animals and plants.
