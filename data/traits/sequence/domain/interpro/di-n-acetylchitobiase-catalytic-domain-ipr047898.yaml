identifier: InterPro:IPR047898
label: "Di-N-acetylchitobiase, catalytic domain"
definition: >-
  This entry represents the catalytic domain of human Di-N-acetylchitobiase (DIAC) and similar sequences from vertebrates. DIAC (also known as chitobiase) is a lysosomal glycosidase that hydrolyses the reducing-end N-acetylglucosamine from the chitobiose core of oligosaccharides during the ordered degradation of asparagine-linked glycoproteins in eukaryotes. DIAC can only do so if the asparagine that joins the oligosaccharide to protein is previously removed by a glycosylasparaginase. DIAC is therefore the final step in the lysosomal degradation of the protein/carbohydrate linkage component of asparagine-linked glycoproteins. The catalytic domain of DIAC is an eight-stranded α/β barrel fold similar to that of other family 18 glycosyl hydrolases such as hevamine and chitotriosidase.
