label: "Pfc11, Rna14/15 interacting domain"
definition: >-
  This entry represents the Rna14/15 interacting domain (Rna14/15-ID) of Pfc11 from yeast. Pfc11 is a multidomain protein that links transcriptional elongation, 3'-end processing, and transcription termination.
