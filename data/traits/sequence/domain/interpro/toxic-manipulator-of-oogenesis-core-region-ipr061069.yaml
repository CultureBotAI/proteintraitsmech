identifier: InterPro:IPR061069
label: "Toxic manipulator of oogenesis, core region"
definition: >-
  This entry represents the conserved core region of surface-exposed or secreted protein TomO from the Wolbachia endosymbiont of Drosophila melanogaster and its homologues from other species of Wolbachia. TomO contains also a separately described hydrophobic tail region that it shares with WD_0630 and its orthologues. In addition, some TomO proteins contain an ankyrin repeat domain or a lipase domain. TomO (Toxic Manipulator of Oogenesis) was found to colocalise with host (Drosophila) RNA-binding proteins and to reverse the sterility of female fruit flies carrying the sex-lethal (sxl) mutation.
