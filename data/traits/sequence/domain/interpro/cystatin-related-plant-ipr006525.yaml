identifier: InterPro:IPR006525
label: "Cystatin-related, plant"
definition: >-
  Sequences with this domain represent a family similar in sequence and probably homologous to a large family of cysteine proteinase inhibitors, or cystatins, as described by . These proteins are only found in dicots. Cystatins may help plants resist attack by insects.
