identifier: InterPro:IPR063924
label: "SUV2, middle domain"
definition: >-
  This entry represents the middle TPR domain of SUV2 (SENSITIVE TO UV 2) proteins found in plants. SUV2 is a DNA damage response protein required for tolerance to various DNA-damaging agents and cell cycle checkpoint control. The full-length protein contains a nuclear localisation signal and coiled-coil region in this N-terminal domain, followed by a C-terminal phosphatase tensin-type domain. SUV2 functions in G2/M cell cycle arrest in response to DNA damage and aluminium-dependent root growth inhibition.
