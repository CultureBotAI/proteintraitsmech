identifier: InterPro:IPR048861
label: "Cellulose synthase subunit B-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of Cellulose Synthase Subunit B (BscB) from Cereibacter sphaeroides and similar sequences from alphaproteobacteria. BscB, involved in bacterial cellulose biosynthesis, is organised into two periplasmic carbohydrate binding domains and two α/β-domains similar to the flavodoxin-fold (FD1 and FD2). This entry represents FD2.
