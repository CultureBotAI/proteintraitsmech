identifier: InterPro:IPR002566
label: Msp4/OMP-like
definition: >-
  This entry includes a number of bacterial surface antigens expressed on the surface of pathogens. The Anaplasma marginale surface proteins are targets of protective immune responses but are antigenically polymorphic. They display a β-barrel like fold.
