identifier: InterPro:IPR047240
label: "Pre-mRNA splicing factor component CDC5L/Cef1, second SANT/myb-like domain"
definition: >-
  This entry represents the second DNA-binding myb-like domain of CDC5/Cef1. The N-terminal myb-like domains are necessary for cell viability but not for PRP19/Prp19p association. This entry includes cell division cycle 5-like protein (CDC5L) from human and its orthologues from yeast, Cef1, DNA-binding proteins involved in cell cycle control. They function in pre-mRNA splicing as components of the PRP19-CDC5L complex (Prp19p-Cef1 in yeast), which constitutes an integral part of the spliceosome and is required for activating pre-mRNA splicing. CDC5L is a DNA-binding protein The PRP19-CDC5L complex may also play a role in the response to DNA damage (DDR).
