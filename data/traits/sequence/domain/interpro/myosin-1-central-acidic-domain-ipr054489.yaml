identifier: InterPro:IPR054489
label: "Myosin-1, central acidic domain"
definition: >-
  This is the CA domain (central acidic domain) found at the C-terminal of myosin-1 from S.pombe and similar fungal sequences. Myo-1 localizes to actin patches which assemble at sites of endocytosis. The CA domain binds and activates Arp2/3, however, this interaction is dispensable for endocytosis. Mammalian orthologues, such as the human Myo1e, do not contain CA domains.
