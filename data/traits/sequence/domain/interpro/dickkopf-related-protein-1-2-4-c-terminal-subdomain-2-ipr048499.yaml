identifier: InterPro:IPR048499
label: "Dickkopf-related protein 1/2/4, C-terminal subdomain 2"
definition: >-
  Dickkopf-related proteins are cysteine-rich secretory proteins and highly conserved inhibitors of the canonical Wnt signalling pathway, which play key roles in many essential biological processes. The C-terminal domain is described as two subdomains, each consisting of three antiparallel β-strands that are connected by a long loop which contains a short α-helix. This domain is strongly conserved in Dkk1, Dkk2 and Dkk4, and directly contacts LRP6. This entry represents the second subdomain. In Dkk3 these residues differ and is consistent with studies indicating that Dkk3 is a divergent family member that does not inhibit Wnt signalling. This domain share significant sequence similarity to the colipase fold.
