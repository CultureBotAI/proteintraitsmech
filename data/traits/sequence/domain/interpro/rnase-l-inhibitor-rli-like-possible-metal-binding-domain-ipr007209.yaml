identifier: InterPro:IPR007209
label: "RNase L inhibitor RLI-like, possible metal-binding domain"
definition: >-
  This is part of a possible metal-binding domain in endoribonuclease RNase L inhibitor. It is found at the N-terminal end of RNase L inhibitor proteins, adjacent to the 4Fe-4S binding domain, . Also often found adjacent to in uncharacterised proteins. The RNase L system plays a major role in the anti-viral and anti-proliferative activities of interferons. It is a component of the multifactor complex (MFC) involved in translation initiation and it is required for the processing and nuclear export of the 60S and 40S ribosomal subunits, playing a role in ribosome biogenesis [ , . Inhibitory activity requires concentration-dependent association of RLI with RNase L.
