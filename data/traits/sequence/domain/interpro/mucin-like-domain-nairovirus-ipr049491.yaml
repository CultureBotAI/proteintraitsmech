identifier: InterPro:IPR049491
label: "Mucin-like domain, nairovirus"
definition: >-
  This is the mucin-like domain (MLD) located at the N-terminal of the glycoprotein precursor complex (GPC), encoded in the M segment of nairoviruses genome. It contains a furin cleavage site which separates MLD from GP38 ( ).
