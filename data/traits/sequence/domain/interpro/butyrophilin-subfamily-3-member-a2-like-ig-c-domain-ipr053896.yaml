identifier: InterPro:IPR053896
label: "Butyrophilin subfamily 3 member A2-like, Ig-C domain"
definition: >-
  This domain is found in proteins from B7 family, including Butyrophilin subfamily 3 member A1/A2 (BTN3A1/A2) and similar proteins. BTN3A2 is a protein that plays a role in T-cell responses in the adaptive immune response. BTN3A2 shows two extracellular domains: an N-terminal Ig-V like domain ( ) and a C-terminal Ig-C type domain that is located in the centre of the protein sequence.
