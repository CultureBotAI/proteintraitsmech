identifier: InterPro:IPR062238
label: "TnsB, HTH-like domain"
definition: >-
  This entry represents the second domain of Transposon Tn7 transposition protein TnsB. TnsB is a sequence-specific DNA-binding protein that recognises sequences necessary for recombination at both left and right ends of Tn7. This is a HTH-like domain.
