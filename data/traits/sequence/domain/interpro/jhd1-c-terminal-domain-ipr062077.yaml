identifier: InterPro:IPR062077
label: "JHD1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of JHD1 (JmjC domain- containing histone demethylation protein 1), found in Saccharomycetaceae. JHD1 is a histone demethylase that specifically demethylates lysine-36 of histone H3, playing a role in chromatin regulation and transcriptional elongation. The protein contains an N-terminal PHD-type zinc finger and a central JmjC domain that mediates the demethylase activity. The specific function of this C-terminal domain remains to be determined.
