identifier: InterPro:IPR055264
label: "BOD1/SHG1 domain"
definition: >-
  This domain is found at the N-terminal of Biorientation of chromosomes in cell division protein 1-like 1 (BODL1) from animals, and covers the whole length of the protein sequence in its paralogues BD1L2/BOD1 and the orthologues from yeast SHG1. BOD1L1 is a component of the fork protection machinery required to protect stalled/damaged replication forks from uncontrolled DNA2-dependent resection. It acts by stabilising RAD51 at stalled replication forks and protecting RAD51 nucleofilaments from the antirecombinogenic activities of FBH1 and BLM. BOD1L2 and BOD1 that are required for proper chromosome biorientation through the detection or correction of syntelic attachments in mitotic spindles. The Shg1 subunit is one of the eight subunits of the COMPASS complex, complex associated with SET1, conserved in yeasts and in other eukaryotes up to humans. It is associated with the region of the Set1 protein that is N-terminal to the C-terminal, ie Set1-560-900. The function of Shg1 seems to be to slightly inhibit histone 3 lysine 4 (H3K4) di- and tri-methylation, and it is a pioneer protein. The COMPASS complex functions to methylate the fourth lysine of Histone 3 and for silencing of genes close to the telomeres of chromosomes.
