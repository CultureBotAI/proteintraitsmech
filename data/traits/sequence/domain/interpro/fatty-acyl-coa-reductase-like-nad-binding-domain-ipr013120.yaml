identifier: InterPro:IPR013120
label: "Fatty acyl-CoA reductase-like, NAD-binding domain"
definition: >-
  This entry represents the C-terminal NAD-binding region of the fatty acyl-coenzyme A reductases (FARs) from plants and animals. FARs catalyse the reduction of fatty acyl-CoA to fatty alcohols. Proteins containing this domain also include funagal non-ribosomal peptide synthetases and non-reducing polyketide synthases. Non-ribosomal peptide synthetases are part of the gene cluster that mediates the biosynthesis of the lipopeptide antibiotics leucinostatins. Non-reducing polyketide synthases are involved in the secondary metabolite biosynthesis. Proteins containing this domain also include L-2-aminoadipate reductase from yeast and carboxylic acid reductase (Car) from bacteria. It is also found in Isonitrile lipopeptide synthase that is involved in the biosynthesis of a unique class of isonitrile lipopeptides that function as virulence factors in M.tuberculosis and have a role in metal acquisition.
