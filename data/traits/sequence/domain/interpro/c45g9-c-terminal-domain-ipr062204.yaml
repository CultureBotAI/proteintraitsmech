identifier: InterPro:IPR062204
label: "C45G9, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain found in uncharacterised proteins from nematodes, particularly Caenorhabditis elegans. The domain is found in proteins such as C45G9.4 and C45G9.9 that are largely disordered in their N-terminal regions but contain this structured C-terminal domain. These proteins are classified under eggNOG group ENOG502THM3 in eukaryotes. The function of this domain remains to be determined.
