identifier: InterPro:IPR028924
label: "Permuted single zf-CXXC unit"
definition: >-
  This is a permuted version of a single unit of the zf-CXXC domain that is detected in the Demeter-like proteins and ROS1 (REPRESSOR OF SILENCING 1) from plants. Demeter and ROS1 proteins catalyse the release of 5-methylcytosine (5-meC) from DNA by a glycosylase/lyase mechanism. Structural comparisons show that the mono-CXXC is homologous to the structural-zinc binding domain of medium chain dehydrogenases. The classical zf-CXXC domain binds nonmethyl-CpG dinucleotides.
