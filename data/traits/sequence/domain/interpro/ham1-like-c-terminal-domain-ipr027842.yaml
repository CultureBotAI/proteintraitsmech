identifier: InterPro:IPR027842
label: "HAM1-like, C-terminal domain"
definition: >-
  This entry represents a domain found at the C-terminal end of the putative cell signalling protein HAM1 from Cryptococcus neoformans and similar fungal sequences. HAM1 may act as a negative regulator of mating during vegetative growth. Proteins with this domain often also contain an N-terminal domain ( ).
