identifier: InterPro:IPR019933
label: "DivIVA domain"
definition: >-
  This entry describes a domain found in Bacillus subtilis cell division initiation protein DivIVA, and homologues, toward the N terminus. It is also found as a repeated domain in other proteins. This domain forms a parallel coiled-coil which is capped with two unique crossed and intertwined loops, exposing hydrophobic and positively charged residues that are essential for membrane binding. In addition to lipid binding, this domain can participate in self-assembly to form filamentous structures.
