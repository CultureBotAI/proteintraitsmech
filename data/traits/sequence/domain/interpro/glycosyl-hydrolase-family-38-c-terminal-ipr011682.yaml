identifier: InterPro:IPR011682
label: Glycosyl hydrolase family 38, C-terminal
definition: >-
  Glycoside hydrolase family 38 comprises enzymes with only one known activity; alpha-mannosidase. This domain is found at the C terminus of glycosyl hydrolases from family 38. O-Glycosyl hydrolases are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website.
