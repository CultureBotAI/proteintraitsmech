identifier: InterPro:IPR021032
label: "Duffy-antigen binding, N-terminal"
definition: >-
  This entry represents the N terminus of the Duffy-antigen binding protein and is thought to bind to the human erythrocytes Duffy blood group determinant. These domains are found in eukaryotic proteins and are approximately 70 amino acids in length.
