identifier: InterPro:IPR015758
label: "Ral guanine nucleotide dissociation stimulator, RA domain"
definition: >-
  RalGDS family members can act both as Ras effectors and as guanine nucleotide exchange factors (GEFs) for Ral. They act downstream of Ras and bind to the GTP-bound active form of Ras or Ras family members. They also promote the GDP to GTP exchange for Ral small GTPase, member of the Ras family. Due to their double action, the RalGDS proteins bridge Ras and Ral. RalGDS belongs to the Ral GDP dissociation stimulator (RalGDS) family. It has been linked to cancer. This entry represents the RA domain found at the C-terminal end of RalGDS. It has a β-grasp ubiquitin-like fold.
