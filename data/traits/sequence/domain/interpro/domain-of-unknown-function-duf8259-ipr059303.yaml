identifier: InterPro:IPR059303
label: "Domain of unknown function DUF8259"
definition: >-
  This domain is found in uncharacterised proteins mainly from Planctomycetia. It contains four pairs of highly conserved cysteine residues that are probably involved in zinc coordination. This domain is predicted to contain two zinc ribbon domains inserted one into the other.
