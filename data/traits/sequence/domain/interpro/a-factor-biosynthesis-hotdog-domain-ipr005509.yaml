identifier: InterPro:IPR005509
label: "A-factor biosynthesis hotdog domain"
definition: >-
  The AfsA family are key enzymes in A-factor biosynthesis, which is essential for streptomycin production and resistance. This domain is distantly related to the thioester dehydratase FabZ family and therefore has a Hotdog domain.
