identifier: InterPro:IPR057724
label: "Tectonic-1-3, N-terminal domain"
definition: >-
  This is domain is found N-terminal in tectonic proteins (TCTN1-3) It contains a number of conserved cysteine residues predicted to form disulfide bonds. Although function of this domain is currently unknown, studies on TCTN2 suggest that it is indispensable for its functions. TCTN1, TCTN2, and TCTN3 are members of the tectonic protein family that play crucial roles in ciliogenesis and ciliary function. While they share some common functions, each protein also has specific roles in the process of cilia formation and maintenance. These proteins interact with several other ciliopathy proteins, forming a complex known as the Tectonic ciliopathy complex. This complex is required for hedgehog signalling transduction and regulation of ciliary membrane composition.
