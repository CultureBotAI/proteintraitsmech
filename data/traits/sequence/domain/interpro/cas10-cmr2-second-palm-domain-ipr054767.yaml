identifier: InterPro:IPR054767
label: "Cas10/Cmr2, second palm domain"
definition: >-
  This entry represents the second palm domain of Cas10 subunit (named Csm1 in Type III-A and Cmr2 in III-B systems) from type III CRISPR-Cas systems. This domain contains a conserved GGDD motif that is important for DNA polymerase activity.
