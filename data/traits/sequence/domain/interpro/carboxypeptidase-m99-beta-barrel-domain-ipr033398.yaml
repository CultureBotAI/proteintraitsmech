identifier: InterPro:IPR033398
label: "Carboxypeptidase M99, beta-barrel domain"
definition: >-
  This is the central, β-barrel domain of the metallo-carboxypeptidase that maintains helical cell-shape in Helicobacter. It shows a novel fold. It has a highly positively charged surface which contributes to a high overall isoelectric point. A calcium-binding channel is formed from residues in the C-terminal Ig-like domain in conjunction with some of the long side-chains of residues from strands β14 and β18 of this domain.
