identifier: InterPro:IPR055557
label: "Domain of unknown function DUF7133"
definition: >-
  This domain is found in uncharacterised sequences from bacteria. It is predicted to form a a six-bladed β-propeller with significant similarity to glucose/sorbosone dehydrogenases. Proteins in this entry contain a well-conserved C-terminal domain that features a putative cytochrome c-type haem binding motif CXXCH.
