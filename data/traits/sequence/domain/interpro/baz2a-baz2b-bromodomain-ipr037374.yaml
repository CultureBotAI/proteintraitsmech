identifier: InterPro:IPR037374
label: "BAZ2A/BAZ2B, bromodomain"
definition: >-
  Bromo adjacent to zinc finger 2A (BAZ2A) and 2B (BAZ2B) were identified as a novel human bromodomain genes by cDNA library screening. They may play roles in transcriptional regulation. Human BAZ2A (also known as Tip5) is part of a complex termed NoRC (nucleolar remodeling complex), which induces nucleosome sliding and may play a role in the regulation of the rDNA locus. Bromodomains are 110 amino acid long domains, that are found in many chromatin associated proteins. Bromodomains can interact specifically with acetylated lysine.
