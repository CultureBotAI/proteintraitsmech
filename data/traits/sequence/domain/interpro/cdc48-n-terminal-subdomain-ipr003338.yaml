identifier: InterPro:IPR003338
label: "CDC48, N-terminal subdomain"
definition: >-
  This entry represents the amino-terminal subdomain. The CDC48 N-terminal domain is a protein domain found in AAA ATPases including cell division protein 48 (CDC48), VCP-like ATPase (VAT) and N-ethylmaleimide sensitive fusion protein. It is a substrate recognition domain which binds polypeptides, prevents protein aggregation, and catalyses refolding of permissive substrates. It is composed of two equally sized subdomains. The amino-terminal subdomain forms a double-psi β-barrel whose pseudo-twofold symmetry is mirrored by an internal sequence repeat of 42 residues. The carboxy-terminal subdomain forms a novel six-stranded β-clamp fold. Together these subdomains form a kidney-shaped structure.
