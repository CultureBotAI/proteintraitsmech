identifier: InterPro:IPR056369
label: "Cytoplasmic tRNA 2-thiolation protein 1-like, ATP-binding domain"
definition: >-
  This entry includes human cytoplasmic tRNA 2-thiolation protein 1, also called cytosolic thiouridylase subunit 1 (CTU1) and ATP-binding domain-containing protein 3 (ATPBD3). CTU1 plays a central role in 2-thiolation of mcm(5)S(2)U at tRNA wobble positions of tRNA(Lys), tRNA(Glu) and tRNA(Gln). It directly binds tRNAs and probably acts by catalysing adenylation of tRNAs, an intermediate required for 2-thiolation. This group of proteins belongs to the nucleotide alpha hydrolase (AANH) superfamily that includes N-type ATP PPases and ATP sulfurylases. This entry represent the adenosine binding domain which forms an α/β/α fold. This entry also includes tRNA 2-thiolation protein NcsA from Haloferax volcanii and probable sulfurtransferases from archaea. NcsA is required for thiolation of mcm5S2U at the wobble uridine position of tRNA specific for lysine (tRNA(Lys)). It may also act as a sulfurtransferase that transfers sulfur from thiocarboxylated SAMP2 onto the uridine of tRNA at wobble position. NcsA is required for cell growth at elevated temperatures.
