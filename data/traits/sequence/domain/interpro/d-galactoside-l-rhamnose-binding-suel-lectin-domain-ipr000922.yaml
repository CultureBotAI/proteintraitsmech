identifier: InterPro:IPR000922
label: D-galactoside/L-rhamnose binding SUEL lectin domain
definition: >-
  The D-galactoside binding lectin purified from sea urchin (Anthocidaris crassispina) eggs exists as a disulphide-linked homodimer of two subunits; the dimeric form is essential for hemagglutination activity. The sea urchin egg lectin (SUEL) forms a new class of lectins. Although SUEL was first isolated as a D-galactoside binding lectin, it was latter shown that it binds to L-rhamnose preferentially. L-rhamnose and D-galactose share the same hydroxyl group orientation at C2 and C4 of the pyranose ring structure. A cysteine-rich domain homologous to the SUEL protein has been identified in the following proteins: Plant beta-galactosidases (lactases). Mammalian latrophilin, the calcium independent receptor of alpha-latrotoxin (CIRL). The galactose-binding lectin domain is not required for alpha-latratoxin binding. Human lectomedin-1. Rhamnose-binding lectin (SAL) from catfish (Silurus asotus, Namazu) eggs. This protein is composed of three tandem repeat domains homologous to the SUEL lectin domain. All cysteine positions of each domain are completely conserved. The hypothetical B0457.1, F32A7.3A and F32A7.3B proteins from Caenorhabditis elegans. The human KIAA0821 protein.
