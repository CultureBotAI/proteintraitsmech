identifier: InterPro:IPR011096
label: "FTP domain"
definition: >-
  The fungalysin/thermolysin propeptide (FTP) domain is found in both the bacterial M4 peptidase propeptide and the fungal M36 propeptide. Its exact function is not clear, but it is likely to either inhibit the peptidase, so as to prevent its premature activation, or to have a chaperone activity. Both of these roles have been ascribed to the M4 and M36 propeptides.
