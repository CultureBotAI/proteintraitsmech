identifier: InterPro:IPR045676
label: "Domain of unknown function DUF6194"
definition: >-
  This entry represents a domain found in members of a biosynthetic gene cluster (BGC). This BGC (BGC0001597) is described by MIBiG as an example of the polyketide biosynthetic class. It includes a member from the fluvirucin B2 biosynthetic gene cluster from Actinomadura fulva subsp. indica. Members of this group are predominantly found in bacteria. This domain is predicted to adopt an α-β configuration.
