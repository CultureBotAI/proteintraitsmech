label: "RsbT co-antagonist protein RsbRD, N-terminal domain"
definition: >-
  This domain is found at the N terminus of a number of anti-sigma-factor antagonist proteins including Bacillus subtilis RsbRD ( ). These proteins are negative regulators of the general stress transcription factor sigma(B).
