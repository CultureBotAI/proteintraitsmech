identifier: InterPro:IPR049138
label: "Fanconi-associated nuclease 1, SAP subdomain, metazoa"
definition: >-
  This domain is found in Fanconi-associated nuclease 1 from humans (Fan1) and similar proteins mainly from chordates. Fan1 is involved in the processing of DNA interstrand crosslinks (ICLs) and therefore in the maintenance of genomic stability and prevention of tissue decline in multiple organs. FAN1 consists of an SAP-containing N-terminal domain, a middle tetratricopeptide repeat domain (TPR) and a C-terminal viral replication and repair nuclease domain (VRR_nuc domain, ). This entry represents the SAP subdomain, part of the N-terminal domain. It consists of four α-helices.
