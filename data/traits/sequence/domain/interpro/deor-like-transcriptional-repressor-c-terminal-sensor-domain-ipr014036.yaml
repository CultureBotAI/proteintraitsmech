identifier: InterPro:IPR014036
label: "DeoR-like transcriptional repressor, C-terminal sensor domain"
definition: >-
  DeoR-like transcription repressors occur in diverse bacteria and archaea, as regulators of sugar and nucleoside metabolic systems. The effector molecules for DeoR-like regulators are generally phosphorylated intermediates of the relevant metabolic pathway. The C-terminal sensor domain of DeoR-like transcription repressors represents a catalytically inactive version of the ISOCOT fold, but retains the substrate binding site. This sensor domain binds the inducer and often acts as an oligomerization domain. It senses diverse sugar derivatives such as deoxyribose nucleoside (in the case of DeoR), tagatose phosphate (LacR), galactosamine (AgaR), myo-inositol (Bacillus IolR) and L-ascorbate (UlaR). GlpR controls both fructose and glucose metabolic enzymes through transcriptional repression of the glpR-pfkB operon and kdgK1 during growth on glycerol.
