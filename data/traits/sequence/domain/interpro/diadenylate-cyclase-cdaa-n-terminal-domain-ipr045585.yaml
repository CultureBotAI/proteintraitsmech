identifier: InterPro:IPR045585
label: "Diadenylate cyclase CdaA, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in diadenylate cyclase CdaA. This domain shows three helical transmembrane regions. Diadenylate cyclase catalyses the condensation of 2 ATP molecules into cyclic di-AMP (c-di-AMP), a signaling compound secreted into the host's cytosol by bacterial pathogens, such as Listeria monocytogenes. This compound triggers the cytosolic surveillance pathway (CSP), a host pathway of innate immunity. Apart from a role in the establishment of bacterial infection, c-di-AMP seems to be involved in coordinating bacterial growth, cell wall stability, and responses to stress. Most bacteria possess one diadenylate cyclase (DAC) enzyme (CdaA, also called YbbP and DacA), while Bacillus subtilis has two additional DACs (CdaS, also called YojJ and DacB) and DisA. This entry includes CdaA from B.subtilis, which produces the c-di-AMP required for cell wall homeostasis but harmful in excess.
