identifier: InterPro:IPR055449
label: "INO80 complex subunit 3-like, middle region"
definition: >-
  This entry represents the middle region of a group of fungal sequences that are homologues of the INO80 complex subunit 3 (Iec3) from S.pombe. They differ in this region that is absent on the S.pombe homologue which only consists of an α-helix. According to structure predictions, this section may adopt an arrangement of short helices connected by loops. The C-terminal region is disordered.
