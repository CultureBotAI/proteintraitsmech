identifier: InterPro:IPR045608
label: "Trypsin-co-occurring domain 2"
definition: >-
  Trypsin-like peptidase effector in the classical NTP-dependent ternary system (vWA-MoxR-VMAP) frequently co-occurs with one of two proteins (Trypco1 or Trypco2) which are mostly mutually exclusively. This entry also includes a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000949) is described by MIBiG as an example of the following biosynthetic class, NRP (non-ribosomal peptide). It includes a member from the A-500359 A biosynthetic gene cluster from Streptomyces griseus and appears to be predominantly found in bacteria.
