identifier: InterPro:IPR035024
label: "PLC-gamma, N-terminal SH2 domain"
definition: >-
  This entry represents the N-terminal SH2 domain of phosphatidylinositol-4, 5-bisphosphate phosphodiesterase gamma (PLC-gamma). PLC-gamma is a signaling molecule that is recruited to the C-terminal tail of the receptor upon autophosphorylation of a highly conserved tyrosine. PLC-gamma is composed of a pleckstrin homology (PH) domain followed by an elongation factor (EF) domain, two catalytic regions of PLC domains that flank two tandem SH2 domains (N-SH2, C-SH2), and ending with a SH3 domain and C2 domain. N-SH2 domain-mediated interactions represent a crucial step in transmembrane signaling by receptor tyrosine kinases.
