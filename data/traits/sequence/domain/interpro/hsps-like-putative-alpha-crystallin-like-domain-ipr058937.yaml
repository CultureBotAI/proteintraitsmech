identifier: InterPro:IPR058937
label: "Hsps-like, putative, alpha-crystallin-like domain"
definition: >-
  This entry describes the alpha-crystallin-like domain in putative Heat shock proteins (Hsps) mostly found in plants. Hsps are small stress induced proteins with monomeric masses between 12-43 kDa, whose common feature is the alpha-crystallin domain. Hsps are generally active as large oligomers consisting of multiple subunits, and are believed to be ATP-independent chaperones that prevent aggregation and are important in refolding in combination with other Hsps. This domain is predicted to contain 3-4 β-strands forming two antiparallel sheets.
