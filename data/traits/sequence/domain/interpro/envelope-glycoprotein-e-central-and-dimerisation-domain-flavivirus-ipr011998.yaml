identifier: InterPro:IPR011998
label: Envelope glycoprotein E, central and dimerisation domain, flavivirus
definition: >-
  Flaviviruses and alphaviruses are arthropod-borne, enveloped RNA viruses that cause infections in vertebrate hosts. These viruses have two envelope glycoproteins (also known as 'spike' glycoproteins), one that undergoes proteolytic cleavage to prime the virus (glycoproteins M and P62 in flaviviruses and alphaviruses, respectively), and the other to mediate receptor binding and fusion (glycoproteins E and E1 in flaviviruses and alphaviruses, respectively). Glycoprotein E/E1 is comprised of three domains: domain I (dimerisation domain) is a β-barrel, domain II (central domain) is an elongated β-stranded and α-helical domain, and domain III (immunoglobulin-like domain) is an IgC-like β-sandwich. This entry represents the intertwined central and dimerisation domains found in flaviviral glycoprotein E.
