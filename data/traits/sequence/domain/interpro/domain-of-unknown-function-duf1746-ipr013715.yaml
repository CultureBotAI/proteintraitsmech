identifier: InterPro:IPR013715
label: "Domain of unknown function DUF1746"
definition: >-
  This is a fungal domain of unknown function. This domain can be found in DSC E3 ubiquitin ligase complex subunit 4 (Dsc4) from S. pombe. It is a component of the DSC E3 ubiquitin ligase complex required for the sre1 transcriptional activator proteolytic cleavage to release the soluble transcription factor from the membrane in low oxygen or sterol conditions. The complex plays also an important role in the multivesicular body (MVB) pathway and functions in a post-endoplasmic reticulum pathway for protein degradation. This domain is also found in GLD1 from S. cerevisiae, also a component of the DSC E3 ubiquitin ligase complex involved in the targeting of the DSC complex to the Golgi apparatus and endosome membranes via the AP3 pathway to ubiquitinate Golgi/endosome membrane proteins.
