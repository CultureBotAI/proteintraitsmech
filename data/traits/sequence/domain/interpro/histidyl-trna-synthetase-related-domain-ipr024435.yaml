identifier: InterPro:IPR024435
label: "Histidyl tRNA synthetase-related domain"
definition: >-
  This entry represents the histidyl-tRNA synthetase-related (HisRS-related) domain, found largely in Gcn2 protein kinases. In yeast, Gcn2 phosphorylates the alpha subunit of eukaryotic initiation factor-2 (eIF-2) when the cells face the starvation for amino acids. The HisRS-related domain is required for activation of Gcn2 kinase function.
