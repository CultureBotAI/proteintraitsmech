identifier: InterPro:IPR058710
label: "PPi-type phosphoenolpyruvate carboxykinase lobe 2 domain"
definition: >-
  This entry represents the second lobe domain of PPi-type phosphoenolpyruvate carboxykinase (PEPCK) enzymes from lower eukaryotes and bacteria. This domain is not catalytic. These enzymes play a crucial role in regulating the carbon flow of central metabolism. They are inorganic pyrophosphate (PPi)-dependent and are involved in the fixation of carbon dioxide (CO2) to phosphoenolpyruvate, resulting in the production of oxaloacetate. Additionally, they can catalyse the conversion of phosphoenolpyruvate and phosphate into pyruvate and diphosphate. The family members can function as monomers or trimers and are capable of forming heterotrimers with other family members, thereby contributing to metabolic flexibility and regulation.
