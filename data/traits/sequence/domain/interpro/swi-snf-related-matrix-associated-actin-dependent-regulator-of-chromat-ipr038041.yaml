identifier: InterPro:IPR038041
label: "SWI/SNF-related matrix-associated actin-dependent regulator of chromatin subfamily D 1, SWIB domain"
definition: >-
  SWI/SNF-related matrix-associated actin-dependent regulator of chromatin subfamily D member 1 (SMARCD1 or BAF60A) is a component of several complexes that remodel chromatin, a mechanism by which selected genes are transcriptionally activated or repressed. The complexes are SWI/SNF, which changes chromatin structure by altering DNA-histone contacts within a nucleosome in an ATP-dependent manner; BAF; and the npBAF and nBAF, which are neuron-specific. SMARCD1 also interacts with the BRG1/SMARCA4 chromatin-remodeling complex. This entry also includes Brahma-associated protein of 60kDa (BAP60) from Drosophila melanogaster which anchors the Brahma complex to a specific promoter site. The Brahma complex is the equivalent of the yeast SWI/SNF complex. This entry represents the SWIB domain of SMARCD1.
