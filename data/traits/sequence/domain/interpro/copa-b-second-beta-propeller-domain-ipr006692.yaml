identifier: InterPro:IPR006692
label: COPA/B, second beta-propeller domain
definition: >-
  This entry represents the second β-propeller found in Coatomer subunits alpha and beta (COPA1-3, COPB2 and COB21-3), from eukaryotes. Coatomer complexes function in the sorting and trafficking of proteins between subcellular organelles.Coat protein I (COPI)-coated vesicles mediate retrograde transport from the Golgi to the endoplasmic reticulum (ER), as well as transport within the Golgi. The Coatomer protein complex subunit beta 2 (COPB2) is involved in the formation of the COPI coatomer protein complex. COPB2 is a vital oncogene in many cancer types that regulates multiple biological behaviours of tumor cells, including proliferation, survival, tumourigenesis, invasion, and metastasis. COPA constitutes part of COPI, playing a role in the retrograde transport of cargo proteins between the Golgi and the ER and the movement of vesicles within the Golgi. Proteins synthesised on the ribosome and processed in the endoplasmic reticulum are transported from the Golgi apparatus to the trans-Golgi network (TGN), and from there via small carrier vesicles to their final destination compartment. This traffic is bidirectional, to ensure that proteins required to form vesicles are recycled. Vesicles have specific coat proteins (such as clathrin or coatomer) that are important for cargo selection and direction of transfer. While clathrin mediates endocytic protein transport, and transport from ER to Golgi, coatomers primarily mediate intra-Golgi transport, as well as the reverse Golgi to ER transport of dilysine-tagged proteins. For example, the coatomer COP1 (coat protein complex 1) is responsible for reverse transport of recycled proteins from Golgi and pre-Golgi compartments back to the ER, while COPII buds vesicles from the ER to the Golgi. Coatomers reversibly associate with Go…
