identifier: InterPro:IPR040942
label: "Minimal CRISPR polymerase domain"
definition: >-
  This entry represents the minimal version of the CRISPR polymerase domain. It is predicted to generate cyclic nucleotides, potentially sensed by CARF domains which in turn activate various effector domain including HEPN RNases, CARF sensor and effectors are found in conserved genome contexts. It is part of a broader class of conflict systems reliant on the production of second messenger nucleotide or nucleotide derivatives. This implicates CRISPR polymerase of the Type III CRISPR/Cas systems in a nucleotide synthetase functional role.
