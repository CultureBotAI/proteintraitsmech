identifier: InterPro:IPR020012
label: "FimV, LysM domain"
definition: >-
  This entry represents the LysM domain in FimV from Pseudomonas aeruginosa, TspA of Neisseria meningitidis, and related proteins. FimV is an inner membrane protein that plays a role in twitching motility, type IV pilus assembly, and type II secretion in bacteria like Pseudomonas aeruginosa. Disruption of FimV blocks twitching motility from type IV pili, which suggests a role in peptidoglycan layer remodelling required by type IV fimbrial systems. The C-terminal of FimV proteins is represented by . In between is a highly variable, often repeat-filled region rich in the negatively charged amino acids Asp and Glu.
