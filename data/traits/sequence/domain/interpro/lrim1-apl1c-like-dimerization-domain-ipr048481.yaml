identifier: InterPro:IPR048481
label: "LRIM1/APL1C-like, dimerization domain"
definition: >-
  This entry represents the C-terminal coiled-coil dimerisation region of the anopheles proteins LRIM1, APL1C and similar sequences mainly found in Anopheles gambiae and Anopheles coluzzii. In LRIM1, this region heterodimerises with a region of the APL1C protein. LRIM1 and APL1C are members of a family of proteins secreted by mosquitoes that contain an N-terminal LRR domain followed by a cysteine-rich region and a variable C terminus.
