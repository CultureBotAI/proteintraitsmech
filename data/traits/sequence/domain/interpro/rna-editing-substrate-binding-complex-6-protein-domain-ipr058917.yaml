identifier: InterPro:IPR058917
label: "RNA-editing substrate-binding complex 6 protein domain"
definition: >-
  This domain is found in the RNA-editing substrate-binding complex 6 protein (RESC6, ) from Trypanosoma brucei, a component of RESC which together with RECC forms the editosome that orchestrates guide RNA (gRNA)-programmed editing to recode cryptic mitochondrial transcripts into messenger RNAs. RESC stabilises gRNAs and engages mRNAs. The RNA-editing catalytic complex (RECC) fulfills gRNA-programmed mRNA cleavage, uridine insertion or deletion, and religation reactions. RESC is a heterogenous assembly of ~18 proteins that enclose gRNAs and mRNAs. RESC6 is composed of HEAT repeats. RESC6 is part of the six-member RESC-A subcomplex, which stabilises gRNAs by binding to their 3' ends. RESC6 forms a heterodimer with RESC5 through hydrogen bonds and hydrophobic contacts, creating a positively charged crevice that likely facilitates RNA binding. RESC6 also interacts with other RESC proteins, such as RESC1, and RESC2, to stabilise the overall structure of the complex and mediate RNA editing processes.
