identifier: InterPro:IPR041482
label: "LSDAT, prokaryote"
definition: >-
  The SLOG superfamily contains a specific form of the Rossmannoid fold, and is involved in a range of nucleotide-related functions. This domain, LSDAT (LOG-Smf/DprA in TRPM), is part of the SLOG superfamily. It is fused to or operonically associating with SLATT domain in diverse prokaryotes. It is predicted to function as ligand sensor in conjunction with the SLATT transmembrane domain.
