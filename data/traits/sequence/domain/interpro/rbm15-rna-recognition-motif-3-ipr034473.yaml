identifier: InterPro:IPR034473
label: "RBM15, RNA recognition motif 3"
definition: >-
  This entry represents the RNA recognition motif 3 (RRM3) of RBM15. RNA-binding motif protein 15 (RBM15), also termed one-twenty two protein 1 (OTT1), is a novel mRNA export factor and component of the NXF1 pathway. It binds to NXF1 and serves as receptor for the RNA export element RTE. It also possesses mRNA export activity and can facilitate the access of DEAD-box protein DBP5 to mRNA at the nuclear pore complex (NPC).
