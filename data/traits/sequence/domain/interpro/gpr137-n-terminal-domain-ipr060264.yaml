identifier: InterPro:IPR060264
label: "GPR137, N-terminal domain"
definition: >-
  This entry represents the N-terminal lumenal domain of GPR137 animal proteins. This domain is located in the lysosomal lumen and contains N-linked glycosylation sites that are characteristic of proteins with proper membrane topology. The N-terminal region precedes the first transmembrane helix and establishes the lumenal orientation of the protein within lysosomal membranes. The glycosylation sites in this domain likely contribute to protein stability and proper folding within the lysosomal environment. The specific function of this domain remains to be determined. GPR137 proteins are integral membrane proteins mainly found across vertebrates that may regulate MTORC1 complex translocation to lysosomes and play roles in autophagy.
