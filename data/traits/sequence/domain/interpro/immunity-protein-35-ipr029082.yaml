identifier: InterPro:IPR029082
label: "Immunity protein 35"
definition: >-
  This entry represents a predicted immunity protein with an α+β fold and a conserved tryptophan residue. Proteins containing this domain are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a protease domain such as Tox-PL1 and Ntox40. In some instances, it is also fused to a papain-like toxin, ADP-ribosyl glycohydrolase and a S8-like peptidase. Based on these associations the domain is likely to be a protease inhibitor.
