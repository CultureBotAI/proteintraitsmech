identifier: InterPro:IPR035813
label: "Secreted frizzled-related protein 3, NTR domain"
definition: >-
  Secreted frizzled-related proteins (Sfrps) are soluble proteins containing an Netrin (NTR) domain C-terminal to a cysteine-rich Frizzled domain. They show diverse functions and are thought to work in Wnt signaling indirectly, as modulators or antagonists by binding Wnt ligands, and directly, via the Wnt receptor, Frizzled. SFRP3 (also known as FRZB) regulates chondrocyte maturation and long bone development. It is an antagonist of Wnt8 signalling.
