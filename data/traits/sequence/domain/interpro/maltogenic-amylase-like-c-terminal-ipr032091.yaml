identifier: InterPro:IPR032091
label: "Maltogenic amylase-like, C-terminal"
definition: >-
  This domain is found at the C terminus of maltogenic amylase and other glycosidases, such as trehalose synthase/amylase TreS. Maltogenic amylases hydrolyse starch material and are central to carbohydrate metabolism. TreS catalyses the reversible interconversion of maltose and trehalose by transglucosylation.
