identifier: InterPro:IPR047509
label: "E3 ubiquitin-protein ligase UBR4-like, UBR-box"
definition: >-
  This entry represents the UBR-box of human UBR4 and similar proteins predominantly found in vertebrates and arthropods. E3 ubiquitin-protein ligase UBR4, also called N-recognin-4, retinoblastoma-associated factor of 600 kDa, is a RING-type E3 ubiquitin ligase of the Arg/N-end rule degradation pathway. It recognises and binds to proteins bearing specific N-terminal residues that are destabilising according to the N-end rule, leading to their ubiquitination and subsequent degradation. UBR4 acts as a multifunctional protein with roles in anoikis, viral transformation, and protein degradation, as well as in neurogenesis, neuronal migration, neuronal signalling, and survival. The homologue from Drosophila melanogaster protein purity of essence is also included in this group of proteins.
