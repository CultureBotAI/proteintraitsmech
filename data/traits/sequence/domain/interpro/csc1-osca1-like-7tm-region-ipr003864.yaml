identifier: InterPro:IPR003864
label: CSC1/OSCA1-like, 7TM region
definition: >-
  This entry represents the seven transmembrane domain region of plant OSCA1, yeast PHM7 and RSN1 and CSC1-like protein 1 (also known as TRANSMEMBRANE PROTEIN 63A). Members of this entry are mechanosensitive calcium-permeable ion channels consisting of an N-terminal transmembrane domain (RSN1_TM), a cytosolic domain and a 7TM region at the C-terminal. This domain is found in eukaryotic transmembrane proteins that are involved in diverse functions, including phosphate metabolism ( ) and spore wall assembly ( ).
