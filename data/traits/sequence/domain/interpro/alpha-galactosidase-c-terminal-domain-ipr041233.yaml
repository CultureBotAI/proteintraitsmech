identifier: InterPro:IPR041233
label: "Alpha galactosidase, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of alpha galactosidase enzymes, also known as Melibiases. It is also found in isomalto-dextranase (IMD) from Arthrobacter globiformis.
