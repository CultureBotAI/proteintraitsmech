identifier: InterPro:IPR012941
label: "Phenol hydroxylase-like, C-terminal dimerisation domain"
definition: >-
  Phenol hydroxylase is a homodimer which hydroxylates phenol to catechol, or similar products. The enzyme is comprised of three domains. The first two domains form the active site. The third domain, this domain, is involved in forming the dimerisation interface. The domain adopts a thioredoxin-like fold. Protein containing this domain also include 3-hydroxybenzoate 4-monooxygenase from Comamonas testosteroni. This domain is also found in a number of FAD-dependent monooxygenases such as ankC, ucdD, terD and other related proteins.
