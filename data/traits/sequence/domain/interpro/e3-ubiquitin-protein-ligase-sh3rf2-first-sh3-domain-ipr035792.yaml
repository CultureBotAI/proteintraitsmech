identifier: InterPro:IPR035792
label: "E3 ubiquitin-protein ligase SH3RF2, first SH3 domain"
definition: >-
  SH3RF2 is also called POSHER (POSH-eliminating RING protein) or HEPP1 (heart protein phosphatase 1-binding protein). It acts as an anti-apoptotic regulator of the JNK pathway by binding to and promoting the degradation of SH3RF1 (or POSH), a scaffold protein that is required for pro-apoptotic JNK activation. It may also play a role in cardiac functions together with protein phosphatase 1. SH3RF2 contains an N-terminal RING finger domain and three SH3 domains. This entry represents the first SH3 domain, located at the N-terminal half, of SH3RF2.
