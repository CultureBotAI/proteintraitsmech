identifier: InterPro:IPR031345
label: "Type 9 secretion system plug protein, N-terminal domain"
definition: >-
  This is the N-terminal domain of Type IX secretion system plug protein. This entry represents the plug protein from the type IX secretion system from bacterioidetes. It can be bound to SprA β-barrel when SprA is not in a complex with PorV. The plug protein mutant neither has gliding defect nor is defective in T9SS secretion. When PorV is not bound to SprA, the plug prevents leakage of small molecules through the SprA pore.
