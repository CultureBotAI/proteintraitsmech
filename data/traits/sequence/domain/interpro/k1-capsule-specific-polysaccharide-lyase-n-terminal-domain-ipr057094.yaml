identifier: InterPro:IPR057094
label: "K1 capsule-specific polysaccharide lyase, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of K1 capsule-specific polysaccharide lyase and related proteins. The N-terminal domain is known as a particle-binding domain. It folds into an open β-barrel structure the curvature of which is completed by an α-helix. Structurally, this domain is very similar to collagen XVIII trimerization domain ( ). K1-lyase functions as a receptor binding protein (RBP) and mediates the attachment to the host capsular exopolysaccharides. This enzyme possesses a lyase activity that specifically degrades the K1-type polysaccharides of Klebsiella pneumoniae capsule.
