identifier: InterPro:IPR032330
label: "Elongation factor G-binding protein, C-terminal treble-clef zinc-finger"
definition: >-
  This entry represents the C-terminal domain of the FusB ( ) from Staphylococcus aureus. FusB is an elongation factor G (EF-G) binding protein that is linked to the fusidic acid (FA) resistance in S. aureus. FusB forms an extended four-cysteine zinc-finger with a unique structural fold. It binds to the C terminus of EF-G through its C-terminal zinc-finger. FusB release ribosomes by competing with them for EF-G.
