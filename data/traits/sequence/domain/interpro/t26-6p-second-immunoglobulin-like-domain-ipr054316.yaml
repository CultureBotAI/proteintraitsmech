label: "T26-6p, second immunoglobulin-like domain"
definition: >-
  This domain is found in T26-6p from Thermococcus and similar archaeal sequences. T26-6p has three domains: two β- sandwich with two sheets made of four antiparallel β-strands ( and this entry) and a bundle of five α-helices ( ).
