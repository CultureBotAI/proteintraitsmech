identifier: InterPro:IPR034177
label: "PPARGC1B, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of PPARGC1B (also known as PGC-1beta or PERC), which is one of the members of the PGC-1 transcriptional coactivators family, including PGC-1alpha and PGC-1-related coactivator (PRC). PGC-1beta is a tissue-specifically expressed coactivator of selective nuclear receptors and plays a nonredundant role in controlling mitochondrial oxidative energy metabolism and affects both insulin sensitivity and mitochondrial biogenesis, and functions in a number of oxidative tissues.
