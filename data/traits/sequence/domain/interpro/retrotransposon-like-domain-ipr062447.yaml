identifier: InterPro:IPR062447
label: "Retrotransposon-like domain"
definition: >-
  This entry represents a domain found in retrotransposon-like proteins from worms. Proteins in this group have predicted aspartic protease activity ( ). Some family members also contain CCHC-type zinc finger domains ( ). The specific function of this domain remains to be determined.
