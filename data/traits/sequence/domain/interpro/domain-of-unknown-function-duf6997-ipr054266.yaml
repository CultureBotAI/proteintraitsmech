label: "Domain of unknown function DUF6997"
definition: >-
  This domain is found C-terminal in a group of uncharacterised proteins mainly bacterial. It usually follows winged helix domain . This domain is related to PD-(D/E)XK nucleases and it is predicted to adopt the same structure with similar active site architecture.
