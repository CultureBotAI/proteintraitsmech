identifier: InterPro:IPR063588
label: "Cellulose biosynthesis protein BcsE, N-terminal domain"
definition: >-
  This entry includes members involved in cellulose biosynthesis such as BcsE proteins found in Salmonella typhimurium. They consist of a N-terminal NTPase catalytically incompetent nucleoside triphosphatase domain followed by a REC (phosphorylation-incompetent receiver domain) and a C-terminal GGDEF (degenerate diguanylate cyclase domain). The REC and GGDEF domains were firstly described as the GIL domain. BcsE proteins are not essential for cellulose synthesis but is critical for maximal cellulose production. Cellulose production in enterobacteria is controlled by a two-tiered c-di-GMP-dependent system involving BcsE and the PilZ domain containing glycosyltransferase BcsA. This domain forms a membrane-proximal head-to-head dimer of P-loop nucleotide NTPase-like modules.
