identifier: InterPro:IPR027865
label: "C5orf34-like, C-terminal"
definition: >-
  This is the C-terminal domain of a family of eukaryotic proteins, including the human uncharacterised protein C5orf34, which has been reported to be correlated with an unfavorable prognosis of patients from a variety of human malignancies. This domain was previously known as DUF4520. It is predicted to show an α/β configuration.
