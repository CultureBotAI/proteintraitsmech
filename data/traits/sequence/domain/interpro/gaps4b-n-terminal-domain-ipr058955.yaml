identifier: InterPro:IPR058955
label: "GAPS4b, N-terminal domain"
definition: >-
  This entry represents the N-terminal helical domain of the GAPS4b protein from Vibrio furnissii ( ), which is the second component of the GAPS4 anti-phage defence system found within mobile Gamma-Mobile-Trio (GMT) genomic islands. The helical N-terminal domain likely plays a role in protein-protein interactions, possibly facilitating the interaction between GAPS4a and GAPS4b, or in target recognition during phage infection. The GAPS4 system has been experimentally demonstrated to provide protection against various coliphages, reducing phage plaque formation by several orders of magnitude. While GAPS4a contains a PD-(D/E)xK phosphodiesterase domain that likely mediates nucleolytic activity, this domain may be involved in the specificity and regulation of the defence system. This domain can also be found in CD-NTase-associated protein 4-like DNA endonuclease domain-containing protein ( ) in the middle region of the protein, usually next to .
