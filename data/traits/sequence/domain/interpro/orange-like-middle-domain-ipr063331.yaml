identifier: InterPro:IPR063331
label: "ORANGE-like, middle domain"
definition: >-
  This entry represents the middle domain of ORANGE (OR) proteins, which are found in land plants (Embryophyta). ORANGE proteins are chloroplast-localised regulators of carotenoid biosynthesis that function through post-transcriptional regulation of phytoene synthase (PSY). A conserved arginine residue within this domain region is critical for carotenoid accumulation; substitution to histidine promotes carotenoid overaccumulation in both Arabidopsis and melon. The proteins are related to the DnaJ family but lack the J domain, and possess a C-terminal CR-type-like zinc finger region. The specific function of this middle domain remains to be determined.
