identifier: InterPro:IPR058730
label: "ZFPL1-like, U-box domain"
definition: >-
  This domain is found immediately C-terminal to in ZFPL1 mostly from metazoa and uncharacterised plant proteins. This domain is predicted to adopt a U-box configuration. Zinc finger protein-like 1 (ZFPL1) is required for cis-Golgi integrity and efficient ER to Golgi transport, possibly via its interaction with GOLGA2/GM130.
