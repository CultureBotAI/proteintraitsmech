identifier: InterPro:IPR054573
label: "Phosphatase PP2A regulatory subunit A/Splicing factor 3B subunit 1-like, HEAT repeat"
definition: >-
  This entry represents HEAT repeats found in serine/threonine-protein phosphatase 2A 65 kDa regulatory subunit A (PP2ARA) and Splicing factor 3B subunit 1. PP2AR serves as a scaffolding molecule to coordinate the assembly of the catalytic subunit and a variable regulatory B subunit. It is required for proper chromosome segregation and for centromeric localisation of SGO1 in mitosis. SF3B1 is a component of the splicing factor SF3B complex, which is important for anchoring the spliceosome to precursor mRNA. SF3B1 binds to pre-mRNA on both sides of the intron branch site region. This subunit is required for 'A' splicing complex assembly (formed by the stable binding of U2 snRNP to the branchpoint sequence in pre-mRNA) and 'E' splicing complex assembly.
