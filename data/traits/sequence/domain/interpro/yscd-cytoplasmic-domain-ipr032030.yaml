identifier: InterPro:IPR032030
label: "YscD, cytoplasmic domain"
definition: >-
  This entry represents the cytoplasmic domain of YscD from Yersinia enterocolitica and similar proteins from bacteria. This domain consists of a forkhead-associated (FHA) fold. The FHA domain is a small phosphopeptide recognition module. Due to the lack of the conserved residues that are required for binding phosphothreonine, the cytoplasmic domain of YscD protein is therefore unlikely to function as a true FHA domain. YscD is a single-pass inner membrane protein required for the export process of the Yop proteins. It is an essential component of the type III secretion system. YscD contains an N-terminal cytoplasmic domain, a transmembrane linker and a large periplasmic region formed by the three BON domains, and. YscD forms part of the inner membrane component of the bacterial type III secretion injectosome apparatus.
