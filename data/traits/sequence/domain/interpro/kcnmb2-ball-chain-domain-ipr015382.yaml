identifier: InterPro:IPR015382
label: "KCNMB2, ball/chain domain"
definition: >-
  This domain is found in the cytoplasmic N terminus of KCNMB2, the beta-2 subunit of large conductance calcium and voltage-activated potassium channels. It is responsible for the fast inactivation of these channels.
