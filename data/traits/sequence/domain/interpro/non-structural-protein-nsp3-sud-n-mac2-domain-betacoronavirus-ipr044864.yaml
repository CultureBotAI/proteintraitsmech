identifier: InterPro:IPR044864
label: "Non-structural protein NSP3, SUD-N (Mac2) domain, betacoronavirus"
definition: >-
  This entry represents the N-terminal region of the SUD domain (SUD-N or Mac2) found in non-structural protein NSP3, the product of ORF1a in group 2 (beta) coronaviruses. It is found in human SARS-CoV and SARS-CoV-2 polyprotein 1a and 1ab, and in related coronavirus polyproteins. SUD consists of three globular domains separated by short linker peptide segments: SUD-N, SUD-M, and SUD-C. Among these, SUD-N and SUD-M are macrodomains. The SUD-N domain is a related macrodomain which also binds G-quadruplexes. While SUD-N is specific to the NSP3 of SARS and betacoronaviruses of the sarbecovirus subgenera (B lineage), SUD-M is present in most NSP3 proteins except the NSP3 from betacoronaviruses of the embecovirus subgenera (A lineage). SUD-M, despite its name, is not specific to SARS. SUD-C adopts a frataxin-like fold, has structural similarity to DNA-binding domains of DNA-modifying enzymes, binds single-stranded RNA, and regulates the RNA binding behavior of the SUD-M macrodomain. SARS-CoV Nsp3 contains a third macrodomain (the X-domain). The X-domain may function as a module binding poly(ADP-ribose); however, SUD-N and SUD-M do not bind ADP-ribose, as the triple glycine sequence involved in its binding is not conserved in these. Nsp3c-N and Nsp3c-M each display a typical α/β/α Macro domain fold, in spite of the complete absence of sequence similarities. The central β-sheet with six β-strands in the order β1-β6-β5-β2-β4-β3 is flanked by two (or three) helices on either side. Only the last strand, β3, is antiparallel to the other strands. Currently, most known functions of Nsp3c-N/M are connected with RNA binding. All the residues important for binding ADP-ribose and for de-MARylation/de-PARylation activity are not conserved in Nsp3c-N/M; therefore Nsp3c-N/M cannot bind ADP-…
