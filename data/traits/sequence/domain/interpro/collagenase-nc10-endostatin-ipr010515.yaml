identifier: InterPro:IPR010515
label: "Collagenase NC10/endostatin"
definition: >-
  NC10 stands for Non-helical region 10 and is taken from . A mutation in this region in is associated with an increased risk of prostrate cancer. This domain is cleaved from the precursor and forms endostatin. Endostatin is a key tumour suppressor and has been used highly successfully to treat cancer. It is a potent angiogenesis inhibitor. Endostatin is a C-terminal fragment of collagen XV/XVIII, a proteoglycan/collagen found in vessel walls and basement membranes. This domain has a compact globular fold similar to that of C-type lectins. Endostatin XVIII is monomeric and contains a heparin-binding epitope and zinc binding sites while endostatin XV is trimeric and contains neither of these sites. The generation of endostatin or endostatin-like collagen XV/XVIII fragments is catalyzed by proteolytic enzymes within the protease-sensitive hinge region of the C-terminal domain. Endostatin inhibits endothelial cell migration in vitro and appears to be highly effective in murine in vivo studies.
