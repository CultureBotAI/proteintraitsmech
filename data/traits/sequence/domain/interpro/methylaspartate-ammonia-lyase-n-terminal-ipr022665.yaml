identifier: InterPro:IPR022665
label: "Methylaspartate ammonia-lyase, N-terminal"
definition: >-
  Methylaspartate ammonia-lyase catalyses the second step of fermentation of glutamate. It is a homodimer. This domain represents the N-terminal region of methylaspartate ammonia-lyase. This domain is structurally related to. This domain is associated with the catalytic domain .
