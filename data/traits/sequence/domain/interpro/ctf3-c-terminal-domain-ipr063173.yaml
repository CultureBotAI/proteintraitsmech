identifier: InterPro:IPR063173
label: "CTF3, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of CTF3 (inner kinetochore subunit CTF3) and related proteins found in fungi. CTF3 is a component of the central kinetochore which mediates attachment of centromeres to the mitotic spindle and is required for proper chromosome segregation. The protein is part of a heterotrimeric kinetochore subcomplex consisting of CTF3, MCM16 and MCM22, which forms part of the larger constitutive centromere-associated network (CCAN). CTF3 belongs to the CENP-I/CTF3 family and contains multiple HEAT repeats. The specific function of this C-terminal domain remains to be determined.
