identifier: InterPro:IPR019391
label: "Storkhead-box protein, winged-helix domain"
definition: >-
  In humans the Storkhead-box protein controls polyploidization of extravillus trophoblast and is implicated in pre-eclampsia. This entry represents the conserved N-terminal winged-helix domain (WHD), which is likely to bind DNA.
