identifier: InterPro:IPR063623
label: "Regulatory protein PchR, N-terminal domain"
definition: >-
  This is the N-terminal domain of the regulatory protein PchR from Pseudomonas aeruginosa and similar bacterial sequences. PchR controls the expression of genes involved in siderophore (iron-chelating molecules) uptake. It acts as both an activator and repressor of gene expression, with its function dependent on the binding of the iron-loaded siderophore pyochelin. This domain may adopt a β-barrel structure similar to the cupin superfamily.
