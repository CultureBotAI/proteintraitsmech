identifier: InterPro:IPR008722
label: "Outer membrane porin F, N-terminal"
definition: >-
  This entry represents the N-terminal presumed membrane spanning domain of the outer membrane porin F (OprF). This domain is involved in channel formation and is thought to form an 8-stranded β-barrel. OprF has porin activity and can form water-filled pores of variable size. Pseudomonas aeruginosa OprF exists in two different conformations, with the majority two-domain conformation that has no porin activity and the minority one-domain conformation with high porin activity and presumably consisting of a large β barrel.
