identifier: InterPro:IPR059897
label: "Zinc finger transcription factor ace1/sltA, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of zinc finger transcription factor ace1 and sltA. ACE1 is a Cys2-His2 transcription factor found in fungi that binds to the promoter of the cbh1 gene and activates transcription. The protein localises to the nucleus and contains three C2H2-type zinc finger domains in its C-terminal region. SLTA is a transcription factor that contributes to azole resistance by coregulating the expression of the drug target erg11A and the drug efflux pump mdr1. The specific function of this N-terminal domain remains to be determined.
