identifier: InterPro:IPR063144
label: "Uncharacterised protein YfaP, N-terminal Ig-like domain"
definition: >-
  This entry represents the N-terminal Ig-like domain found in uncharacterised proteins related to YfaP from Escherichia coli. This domain follows a signal peptide and precedes the C-terminal DUF2135 domain ( ). In Pseudomonas aeruginosa, the homologue PA4492 (MagA) has been associated with copper stress response and an alpha-macroglobulin complex. The family is found predominantly in Beta and Gammaproteobacteria. The function of this domain remains to be determined.
