identifier: InterPro:IPR057326
label: "Ketoreductase domain"
definition: >-
  The ketoreductase (KR) domain is a conserved catalytic domain in various enzyme systems involved in fatty acid and polyketide biosynthesis. It is present in: Mammalian fatty acid synthases (FAS) Polyketide synthases (PKS) Fungal 6-methylsalicylic acid synthase Bacterial phthioceranic/hydroxyphthioceranic acid synthases 3-oxoacyl-[acyl-carrier-protein] reductase FabG Diacetyl reductase [(S)-acetoin forming] Acetoacetyl-CoA reductase Hydroxynaphthalene reductase-like protein Arp2 The ketoreductase (KR) domain is a conserved catalytic domain that belongs to the short-chain dehydrogenase/reductase (SDR) superfamily and contains a Rossmann fold, which is crucial for binding the NADPH cofactor. Its primary function is to catalyse the NADPH-dependent reduction of beta-keto groups to beta-hydroxy groups during the biosynthesis of fatty acids, polyketides, and related compounds. The specific substrates and products can vary depending on the enzyme.
