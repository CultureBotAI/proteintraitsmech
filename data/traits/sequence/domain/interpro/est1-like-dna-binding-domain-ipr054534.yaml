identifier: InterPro:IPR054534
label: "EST1-like, DNA-binding domain"
definition: >-
  This entry represents a DNA/RNA binding domain found in a group of worm sequences, such as from C.elegans, which are related to Est1A from human (SMG6), defined as 14-3-3-like proteins involved in nonsense-mediated mRNA decay (NMD) pathway.
