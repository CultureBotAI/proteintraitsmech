identifier: InterPro:IPR060519
label: "IL27RA, third fibronectin type-III domain"
definition: >-
  This entry represents the third fibronectin type-III domain of interleukin-27 receptor subunit alpha (IL27RA) and related cytokine receptors found in vertebrates. The protein contains multiple fibronectin type-III domains in its extracellular region. The specific function of this individual domain remains to be determined. IL27RA is a type I membrane protein that serves as a receptor for IL-27 and requires IL6ST/GP130 to mediate signal transduction. IL27RA belongs to the type I cytokine receptor family and is involved in regulation of Th1-type immune responses.
