identifier: InterPro:IPR022581
label: "Spt5 transcription elongation factor, N-terminal"
definition: >-
  This is the very acidic N-terminal domain of the early transcription elongation factor Spt5. The Spt5-Spt4 complex regulates early transcription elongation by RNA polymerase II and has an imputed role in pre-mRNA processing via its physical association with mRNA capping enzymes. The actual function of this N-terminal domain is not known although it is dispensable for binding to Spt4, nor is it essential for RNA polymerase II binding.
