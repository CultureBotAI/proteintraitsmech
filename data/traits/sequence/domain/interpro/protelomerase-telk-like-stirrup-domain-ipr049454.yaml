identifier: InterPro:IPR049454
label: "Protelomerase TelK-like, stirrup domain"
definition: >-
  This domain is found in Protelomerase from Klebsiella phage phiKO2 (TelK) and similar proteins from tailed bacteriophages and bacterial prophages mainly from Gammaproteobacteria. TelK is a hairpin telomere resolvase with DNA cleavage-rejoining activity that resolves the catenated circular dimer produced from the bidirectional replication of a chromosome. The core of the TelK monomer consists of an N-terminal domain and a catalytic domain connected by a long α-helical linker. However, there are two extensions of the protein: a C-terminal DNA binding domain named the stirrup and an N-terminal core binding domain. This entry represents the stirrup domain, which shows α-helical and β-hairpin segments, that binds to DNA using the winged helix-turn-helix motif and contacts the DNA flanking the cleavage site, extending the DNA binding interface. It is essential for the orientation and extent of DNA bending and for the refolding of cleaved DNA strands into hairpins.
