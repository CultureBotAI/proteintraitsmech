identifier: InterPro:IPR057424
label: "Doublecortin domain-containing protein 1-like, ubiquitin domain"
definition: >-
  This is the ubiquitin domain found in DCDC1 and similar proteins from animals. Doublecortin domain-containing protein 1 (DCDC1), also known as DCDC5, is a member of doublecortin (DCX) family. It is a microtubule-associated protein (MAP) with stable double tandem DCX repeats of ubiquitin-like tertiary fold. DCDC1 is expressed during mitosis and is involved in coordinating late cytokinesis. DCDC1 interacts with cytoplasmic dynein and Rab8, as well as with the Rab8 nucleotide exchange factor Rabin8.
