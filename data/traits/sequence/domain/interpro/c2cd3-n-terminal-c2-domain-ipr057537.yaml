identifier: InterPro:IPR057537
label: "C2CD3, N-terminal C2 domain"
definition: >-
  This entry represents the N-terminal C2 domain found in C2 domain-containing protein 3 (C2CD3), which contain multiple C2 domains. C2CD3 is a component of the centrioles that acts as a positive regulator of centriole elongation and is required for primary cilium formation. It promotes assembly of centriolar distal appendage C2 domains typically function as calcium-dependent membrane-targeting modules.
