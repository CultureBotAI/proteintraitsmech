identifier: InterPro:IPR061967
label: "Teflon, middle domain"
definition: >-
  This entry represents the middle domain of the protein teflon from Drosophila melanogaster and similar proteins from diptera. Teflon is required for proper segregation of autosomal bivalents at meiosis I in males and is localised to the nucleus and chromosomes. Teflon is expressed at highest levels in testis and is specifically required in the male germ line prior to spermatocyte stage S4. The function of this domain remains to be determined.
