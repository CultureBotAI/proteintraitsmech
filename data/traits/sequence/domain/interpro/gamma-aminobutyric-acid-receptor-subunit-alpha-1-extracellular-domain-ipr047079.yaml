identifier: InterPro:IPR047079
label: "Gamma-aminobutyric acid receptor subunit alpha-1, extracellular domain"
definition: >-
  This entry represents the extracellular domain (ECD) of gamma-aminobutyric acid receptor subunit alpha-1 (GABAAR-A1), a protein that is encoded by the GABRA1 gene in humans. The alpha-1 subunits form heteropentamers with other GABAAR subunits, most broadly expressed as combination of two alpha1, beta1, gamma. Mutations in this gene cause familial juvenile myoclonic epilepsy, sporadic childhood absence epilepsy type 4, and idiopathic familial generalized epilepsy. Polymorphisms in GABRA1 are also significantly associated with schizophrenia. GABRA1 has also been associated with methamphetamine abuse. The GABRA1 receptor is the specific target of the z-drug class of nonbenzodiazepine hypnotic agents and is responsible for their hypnotic and hallucinogenic effects.
