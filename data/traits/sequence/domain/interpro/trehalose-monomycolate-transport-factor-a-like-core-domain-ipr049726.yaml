identifier: InterPro:IPR049726
label: "Trehalose monomycolate transport factor A-like, core domain"
definition: >-
  TtfA (trehalose monomycolate transport factor A) plays a role in the transport of trehalose monomycolate across the inner membrane, potentially by forming a complex with the atypical lipid transporter MmpL3. Trehalose monomycolate is a component of the mycobacterial envelope. The core domain of TtfA shows strong structural similarity to class I type III secretion system (T3SS) chaperones, and TtfA may play other roles besides assisting in mycolate transport, given its phylogenetic distribution. This domain is only found in actinobacteria, in which the high sequence identity is found in homologues from mycobacteria. However, TtfA homologues are also found in other mycolic acid-producing bacteria such as corynebacteria, nocardia, or rhodococcus. Unexpectedly, although less conserved, TtfA homologues were also identified in non-producing mycolic acid bacteria, such as pseudonocardia or streptomyces.
