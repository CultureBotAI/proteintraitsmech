identifier: InterPro:IPR063599
label: "Defect at low temperature protein 1, C-terminal cytoplasmic domain"
definition: >-
  This entry represents the C-terminal cytoplasmic domain of DLT1 (Defect at low temperature protein 1), a membrane protein found in yeasts. The domain spans approximately is located on the cytoplasmic side of the membrane following two transmembrane regions. DLT1 is required for growth under high-pressure and low-temperature conditions and belongs to the DLT1 protein family. Deletion of DLT1 results in sensitivity to 6-azauracil and mycophenolic acid. The protein is present at approximately 1200 molecules per cell in logarithmic phase cultures. The specific function of this C-terminal cytoplasmic domain remains to be determined.
