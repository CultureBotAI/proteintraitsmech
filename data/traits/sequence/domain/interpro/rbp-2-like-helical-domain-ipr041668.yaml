identifier: InterPro:IPR041668
label: "RBP-2-like, helical domain"
definition: >-
  This is a helical coiled-coil domain found in reticulocyte-binding protein 2 (RBP-2), reticulocyte-binding protein homologue 5 (RH5) and related proteins. RH5 is a Plasmodium falciparum protein essential for erythrocyte invasion.
