identifier: InterPro:IPR043476
label: "Yro2-like, 7TM domain"
definition: >-
  This entry represents the seven-transmembrane α-helices (TM) domain found in the yeast Yro2 protein and its closely related proteins. Although the exact function of these proteins is unknown, they show strong sequence homology to the family of microbial rhodopsins, also known as type I rhodopsins, comprising the light-driven inward chloride pump halorhodopsin (HR), the outward proton pump bacteriorhodopsin (BR). This entry includes the Opsin-like protein carO, which is involved in the biosynthesis of neurosporaxanthin, a carboxylic apocarotenoid acting as an essential protective pigment and leading to orange pigmentation.
