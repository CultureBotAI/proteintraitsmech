identifier: InterPro:IPR048858
label: "Oligosaccharyl transferase, peripheral 1 domain"
definition: >-
  This domain is found in Oligosaccharyl transferase from Pyrococcus furiosus (OST, also known as AglB-L) and similar archaeal sequences. OST catalyses the co-translational transfer of an oligosaccharide from a lipid donor to an asparagine residue in nascent polypeptide chains. This protein is organised into four regions: a N-terminal half , the central core (CC) domain that includes the IS (insert) domain ( ) and two peripheral domains, P1 (this entry) and P2 ( ). This domain, which consists mainly of β-strands, encircles the central core domain.
