identifier: InterPro:IPR060105
label: "SSO2105-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of SSO2105, an uncharacterised protein from Saccharolobus solfataricus. This region shows structural similarity to the miniature CRISPR-Cas12f1 proteins, which are compact RNA-guided DNA endonucleases that function as asymmetric homodimers for DNA cleavage. However, SSO2105 is not part of a CRISPR system and lacks the guide RNA binding capability of Cas12f1 proteins. The specific function of this domain remains to be determined. This entry is also found in the Uncharacterized protein APE_1276 and APE_1804 from Aeropyrum pernix and in putative transposases bacterial proteins.
