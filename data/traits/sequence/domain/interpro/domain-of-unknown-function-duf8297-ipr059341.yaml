label: "Domain of unknown function DUF8297"
definition: >-
  This domain is found in uncharacterised proteins mainly from Mycoplasma. It is predicted to fold into a β-sandwich. It contains two pairs of conserved cysteine residues that are predicted to form disulfide bonds.
