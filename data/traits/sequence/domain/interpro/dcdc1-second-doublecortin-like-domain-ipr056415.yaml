identifier: InterPro:IPR056415
label: "DCDC1, second doublecortin-like domain"
definition: >-
  This is the second doublecortin-like domain (DCX2) of DCDC1. This domain shows an ubiquitin-like fold. Doublecortin domain-containing protein 1 (DCDC1), also known as DCDC5, is a member of doublecortin (DCX) family. It is a microtubule-associated protein (MAP) with stable double tandem DCX repeats of ubiquitin-like tertiary fold. DCDC1 is expressed during mitosis and is involved in coordinating late cytokinesis. DCDC1 interacts with cytoplasmic dynein and Rab8, as well as with the Rab8 nucleotide exchange factor Rabin8.
