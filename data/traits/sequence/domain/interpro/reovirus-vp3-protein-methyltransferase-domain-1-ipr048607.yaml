identifier: InterPro:IPR048607
label: "Reovirus VP3 protein, methyltransferase domain 1"
definition: >-
  Cytoplasmic polyhedrosis virus (CPV) has a turreted single-layer capsid consisting of 12 pentameric turrets on the five-fold vertices. Each turret has one Turret protein (TP), also known as VP3 ( ), which shows a polyhedrin-binding domain (PBD), a guanylyltransferase (GTase) domain ( ), two methyltransferase domains and a bridge domain ( ). This entry represents the first methyltransferase domain (MTase-1), which has the small brace domain inserted on it.
