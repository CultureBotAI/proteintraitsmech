identifier: InterPro:IPR049510
label: "RssB-like, receiver domain"
definition: >-
  This entry represents the receiver domain (REC) found in the probable two-component response regulator RssB from Pseudomonas aeruginosa ( , ) and similar sequences mainly found in pseudomonadales. RssB contains a REC domain (this entry) and a PP2C-type protein phosphatase output domain ( ). REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. Escherichia RssB, which is not included in this group, is a ClpX adaptor protein which alters ClpX specificity by mediating a specific interaction between ClpX and the substrates such as RpoS, an RNA polymerase sigma factor.
