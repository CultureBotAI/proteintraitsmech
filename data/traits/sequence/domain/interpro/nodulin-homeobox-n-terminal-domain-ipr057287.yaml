identifier: InterPro:IPR057287
label: "Nodulin homeobox, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of Nodulin homeobox (Ndx) from Arabidopsis thaliana and related plant proteins. Ndx regulates COOLAIR, a set of antisense transcripts originating from the 3' end of FLOWERING LOCUS C. It associates with single-stranded DNA that is part of an RNA-DNA hybrid, or R-loop, that covers the COOLAIR promoter. This domain is predicted to contain an array of α-helices.
