label: "Distal tail component, second carbohydrate binding domain"
definition: >-
  This entry represents the second putative carbohydrate binding domain (CBM2) of the distal tail component from Lactobacillus phage J-1 ( , Dit), which is involved in host recognition. This domain folds into a β-sandwich with two β-sheets gathering 12 β-strands. It usually appears associated to .
