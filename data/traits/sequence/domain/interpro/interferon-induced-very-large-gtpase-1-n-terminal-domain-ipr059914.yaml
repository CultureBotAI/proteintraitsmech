identifier: InterPro:IPR059914
label: "Interferon-induced very large GTPase 1, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of mouse Interferon-induced very large GTPase 1 (GVIN1 or VLIG-1) and similar proteins mainly found in vertebrates. Members of this group play a role in conserved immune functions. This domain is predicted to adopt an all-alpha structure.
