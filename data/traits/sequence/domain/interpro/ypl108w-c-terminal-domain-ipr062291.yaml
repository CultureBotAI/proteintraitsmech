identifier: InterPro:IPR062291
label: "YPL108W, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in YPL108W and related uncharacterised proteins from fungi. YPL108W is an uncharacterised 168-residue protein from Saccharomyces cerevisiae that localises to the cytoplasm. The protein contains a disordered N-terminal region followed by and this structured C-terminal domain. YPL108W shows interaction with DUS4, a tRNA dihydrouridine synthase, though the functional significance of this interaction remains unclear. The function of this domain remains to be determined.
