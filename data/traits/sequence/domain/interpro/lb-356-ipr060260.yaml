identifier: InterPro:IPR060260
label: LB_356
definition: >-
  This entry represents a domain covering the full length of LB_356 proteins found primarily in Leptospira and related bacteria. LB_356 is a protein of approximately 530 amino acids. The protein is also found in some Flavobacteriaceae and other bacterial groups. The function of this protein remains to be determined. It contains a GDSL fold.
