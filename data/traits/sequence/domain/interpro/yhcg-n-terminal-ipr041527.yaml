identifier: InterPro:IPR041527
label: "YhcG, N-terminal"
definition: >-
  This domain can be found at the N terminus of YhcG from E.coli. YhcG was identified in association with DNA processing enzymes, including the restriction complexes HsdMRS and McrABC, the integrases IntF and IntS, and the recombinase PinE.
