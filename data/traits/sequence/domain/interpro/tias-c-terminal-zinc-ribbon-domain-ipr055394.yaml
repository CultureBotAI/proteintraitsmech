identifier: InterPro:IPR055394
label: "TiaS, C-terminal zinc ribbon domain"
definition: >-
  This entry represents the zinc ribbon domain (ZRD) found at the the C-terminal of tRNA(Ile2) 2-agmatinylcytidine synthetase TiaS. TiaS is an archaeal ATP-dependent agmatine transferase that catalyses the formation of 2-agmatinylcytidine (agm2C) at the wobble position (C34) of tRNA(Ile2) [1-3]. This modified base specifically recognises AUA codons. TiaS consists of four domains, the TCKD domain ( ) at the N-terminal followed by the FLD domain ( ), an OB fold domain and a C-terminal ZRD. The ZRD domain is responsible for the recognition of the acceptor arm of tRNA(Ile2).
