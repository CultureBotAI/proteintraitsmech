identifier: InterPro:IPR063394
label: "FMR1 neighbor protein, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of FMR1 neighbor protein (FMR1NB). FMR1NB is a transmembrane protein found in mammals that is expressed specifically in testis and in various cancer types including melanoma, sarcoma, lung, breast, bladder, oesophageal and ovarian cancers. The protein contains two transmembrane helices and this C-terminal domain is predicted to be cytoplasmic. The protein has been identified as a cancer/testis antigen and sarcoma antigen. The specific function of this C-terminal domain remains to be determined.
