identifier: InterPro:IPR040878
label: "IL-40-like, Ig domain"
definition: >-
  This Ig domain is found in tandem in IL-40 (also known as C17orf99), which is found across mammalian species. It is a B cell-associated cytokine that plays important roles in humoral immune responses and may also play a role in B cell development. It is expressed in bone marrow and fetal liver and its expression is also induced in peripheral B cells upon activation. This domain is also found in many proteins from animals, apart from mammals.
