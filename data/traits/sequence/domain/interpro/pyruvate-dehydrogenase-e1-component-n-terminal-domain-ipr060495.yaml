identifier: InterPro:IPR060495
label: "Pyruvate dehydrogenase E1 component, N-terminal domain"
definition: >-
  This entry represents a small hairpin region found at the N-terminal of pyruvate dehydrogenase E1 component (AceE). The pyruvate dehydrogenase complex catalyses the overall conversion of pyruvate to acetyl-CoA and carbon dioxide. The E1 component is a thiamine diphosphate-dependent enzyme that catalyses the decarboxylation of pyruvate with formation of acetyl-dihydrolipoamide. The full-length E1 component forms homodimers and contains a N-terminal small hairpin domain, a transketolase domain ( ), a middle domain ( ), and a C-terminal domain ( ). In some bacteria such as Corynebacterium glutamicum, the E1 component is part of an unusual ODH/PDH supercomplex.
