identifier: InterPro:IPR047326
label: "PLEKHM1, RUN domain"
definition: >-
  This entry represents the RUN domain of PLEKHM1 and similar proteins from animals. PH domain-containing family M member 1 (PLEKHM1), also called 162 kDa adapter protein (AP162), may act as a multivalent adapter protein that regulates Rab7-dependent and HOPS complex-dependent fusion events in the endolysosomal system and couples autophagic and the endocytic trafficking pathways. In case of infection, this protein contributes to Salmonella typhimurium pathogenesis by supporting the integrity of the Salmonella-containing vacuole (SCV) probably in concert with the HOPS complex and Rab7. In humans, mutations in the gene encoding for this protein are associated to osteopetrosis, a bone disorder characterised by increased skeletal mass due to defective osteoclast function.
