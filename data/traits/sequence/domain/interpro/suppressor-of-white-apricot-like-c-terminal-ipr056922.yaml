identifier: InterPro:IPR056922
label: "SUPPRESSOR-OF-WHITE-APRICOT-like, C-terminal"
definition: >-
  This domain is found at the C-terminal end of SUPPRESSOR-OF -WHITE-APRICOT from Arabidopsis thaliana (SWAP1), a member of the SWAP1-SFPS-RRC1 splicing factor complex that modulates photomorphogenesis by regulating the gene expression and pre-messenger RNA alternative splicing of a large number of genes, including those involved in plant responses to light signalling.
