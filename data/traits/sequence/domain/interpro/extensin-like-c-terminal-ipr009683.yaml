identifier: InterPro:IPR009683
label: "Extensin-like, C-terminal"
definition: >-
  This entry represents the C terminus (approx. 120 residues) of a number of bacterial extensin-like proteins. Extensins are cell wall glycoproteins normally associated with plants, where they strengthen the cell wall in response to mechanical stress.
