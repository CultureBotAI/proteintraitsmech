identifier: InterPro:IPR009836
label: "GRDP1/2 domain"
definition: >-
  This entry represents a domain found towards the N-terminal end of Arabidopsis Glycine-rich domain-containing protein 1 and 2 (GRDP1/2) and in similar eukaryotic proteins. Glycine-rich domain-containing proteins (GRDPs) play a regulatory role in abscisic acid (ABA) signalling and tolerance to abiotic stress during germination. They may be involved in the regulation of the ABI transcriptional factors and in the development of stress responses.
