identifier: InterPro:IPR008707
label: "PilY1, beta-propeller domain"
definition: >-
  This domain is found in homologues of Type IV pilus biogenesis factor PilY1. PilY1 is involved in pilus assembly, twitching motility and adhesion to host cells. It regulates surface-activated virulence possibly by acting as a surface-attachment mechanosensor. This domain has been shown to adopt a β-propeller structure.
