identifier: InterPro:IPR046846
label: "PKAT, KLD domain"
definition: >-
  This is the Kringle-like domain (KLD) found in Melanocyte protein PMEL, Transmembrane glycoprotein NMB (GPNMB) and Transmembrane protein 130 (TMEM130), which is downstream the PKD domain. It contains six highly conserved cysteine residues that form the disulphide bonds of mature PMEL dimers and promotes PMEL functional amyloid formation. This domain is perfectly conserved in PMEL and GPNMB which suggests that GPNMB also forms dimers. PMEL and GPNMB, together with TMEM130 (its most ancient paralogue), have a conserved domain architecture and have been recently described as the PKAT (PKD- and KLD-Associated Transmembrane) protein family. PMEL and GPNMB share overlapping phenotypes and disease associations, such as melanin-based pigmentation, cancer, neurodegenerative disease and glaucoma. PKD PMEL/NMB proteins are involved in melanosome morphogenesis and pigmentation. Proteins such as the melanocyte protein PMEL form physiological amyloids that are crucial for the development of melanosomes, the organelles responsible for melanin production. They facilitate the transition of premelanosomes from stage I to stage II by assembling amyloidogenic fragments into fibrillar sheets, which help shape the vesicle. In later stages, the amyloid matrix acts as a scaffold for eumelanin precursor accumulation, aiding in pigment formation. Additionally, these proteins may help prevent pigmentation-associated toxicity by sequestering harmful intermediates of the eumelanin biosynthesis pathway.
