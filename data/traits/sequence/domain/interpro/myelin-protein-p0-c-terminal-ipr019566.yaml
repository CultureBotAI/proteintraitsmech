identifier: InterPro:IPR019566
label: "Myelin protein P0, C-terminal"
definition: >-
  The myelin sheath is a multi-layered membrane, unique to the nervous system, that functions as an insulator to greatly increase the velocity of axonal impulse conduction. Myelin protein P0 (MYP0), is a major component of the myelin sheath in peripheral nerves. It comprises a an immunoglobulin (Ig)-like extracellular domain, a single transmembrane helix, and a cytoplasmic extension in the C terminus. It is postulated that MYP0 is a structural element in the formation and stabilisation of peripheral nerve myelin, which mediates adhesion between adjacent myelin wraps and ultimately drives myelin compaction. MYP0 consists of an immunoglobulin (Ig)-like extracellular domain, a single transmembrane helix, and a cytoplasmic extension of about 69 amino acids is the C terminus. Several peripheral neuropathies have been related to MYP0. This entry represents the extracellular domain found at the C-terminal end of MYPO in chordates. This domain of about 69 amino acids is the region that interacts with the protein p65. The crystal structure of this domain showed a v-type immunoglobulin fold consisting of nine antiparallel β strands forming a barrel-like shape. It is associated to the membrane of Schwann cells and contributes to its physical properties, although these interactions can be directly affected by ions.
