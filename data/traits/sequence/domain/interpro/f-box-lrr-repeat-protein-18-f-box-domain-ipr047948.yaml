identifier: InterPro:IPR047948
label: "F-box/LRR-repeat protein 18, F-box domain"
definition: >-
  In general, F-box proteins share a F-box motif and also have either WD40 repeat domains, LRR domains or various other domains. F-box proteins recruit specific substrates for ubiquitination via different protein-protein interaction domains, such as WD40 repeats and leucine rich repeats (LRRs). This entry represents the F-box domain of F-box/LRR repeat protein 18 (FBXL18). This protein is a component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. The SCF-Fbxl18 complex has been shown to ubiquitinate FBXL7 and LRRK2 and promote their degradation through the proteasome pathway. By mediating ubiquitin-dependent proteasomal degradation of the pro-apoptotic protein FBXL7 that may impact cellular processes involved in cell cycle progression. It promotes glioma progression by promoting K63-linked ubiquitination of Akt.
