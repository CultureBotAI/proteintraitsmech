identifier: InterPro:IPR032476
label: "Carnitine O-palmitoyltransferase, N-terminal"
definition: >-
  This domain is found at the N terminus of carnitine O-palmitoyltransferases. It functions as a regulatory domain and is linked to the catalytic domain via two transmembrane regions.
