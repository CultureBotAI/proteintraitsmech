identifier: InterPro:IPR049299
label: "Thioredoxin 2, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of thioredoxin 2, which is a zinc finger domain, unusual in thioredoxin proteins. Thio2 reduces disulfide bonds and is an efficient electron donor for the essential enzyme ribonucleotide reductase. This domain may mediate protein-protein interactions. Proteins containing this domain are found predominantly in proteobacteria. This domain is structurally similar to Rubredoxin-like zinc-fingers.
