identifier: InterPro:IPR010954
label: "Chorismate mutase, Firmicutes/Deinococcus"
definition: >-
  This entry represents the chorismate mutase (CM) domains N-terminally fused to the first enzyme in the chorismate pathway, 2-dehydro-3-deoxyphosphoheptanoate aldolase (DAHP synthetase, AroA) which are found in some Gram-positive species and Deinococcus. Only in Deinococcus, where this domain is the sole CM domain in the genome can a trusted assignment of function be made. In the other species there is at least one other CM domain present. The similarity between the Deinococcus gene and the others in this clade is sufficiently strong (~44% identity), that the whole clade can be trusted to be functional. The possibility exists, however, that in the Gram-positive species the fusion to the first enzyme in the pathway has evolved a separate, regulatory role.
