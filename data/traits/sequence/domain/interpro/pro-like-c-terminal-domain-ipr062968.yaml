identifier: InterPro:IPR062968
label: "Pro-like, C-terminal domain"
definition: >-
  This domain is found in uncharacterised bacterial proteins. It has a detectable similarity to the C-terminal domain of the pro region of extracellular bacterial alpha-lytic protease which acts as a foldase.
