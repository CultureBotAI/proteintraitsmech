identifier: InterPro:IPR000777
label: Human immunodeficiency virus 1, envelope glycoprotein Gp120
definition: >-
  The envelope glycoprotein Gp160 of HIV1 is cleaved into the surface protein Gp120 and the transmembrane protein Gp41. The entry of HIV requires interaction of viral Gp120 with the CD4 glycoprotein and a chemokine receptor on the cell surface. This entry represents the GP120 core protein, which is released after Gp160 is proteolytically cleaved in the trans-Golgi and activated by cellular furin or furin-like proteases to produce gp120 and gp41.
