identifier: InterPro:IPR059981
label: "ComC, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of ComC, a competence protein involved in DNA transqformation in Haemophilus influenzae. This domain adopts a ferredoxin-like fold consisting of an α-β sandwich with four-stranded antiparallel β-sheets flanked by two α-helices. The protein is 173 amino acids in length and is found predominantly in Pasteurellaceae within Gammaproteobacteria. While ComC is involved in genetic competence for DNA uptake, the specific function of this C-terminal domain remains to be determined.
