identifier: InterPro:IPR006972
label: "Translocator protein BipB-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Translocator protein BipB from Burkholderia pseudomallei and similar proteins predominantly found in proteobacteria. BipB plays a role in the bacterium-induced formation of multinucleated giant cell (MNGC), which is formed after host cell fusion, as well as in the intercellular spreading of bacteria and in the induction of apoptosis in macrophages. This domain covers most of the protein sequence in SPI-2 type 3 secretion system translocon protein SctE from Salmonella typhimurium, a component of the type III secretion system 2 (SPI-2 T3SS), also called injectisome, which is used to inject bacterial effector proteins into eukaryotic host cells (Probable). SseC/SctE2 and SseD/SctB2 are inserted into the host membrane where they form a pore and allow the translocation of effector proteins into the cytosol of target cells.
