identifier: InterPro:IPR054081
label: "Lin-28A-like, second zinc knuckle"
definition: >-
  This domain is found at the C-terminal of human protein lin-28 homolog A and B (Lin-28A/B). Lin28A is an RNA-binding protein that inhibits processing of pre-let-7 miRNAs and regulates translation of mRNAs that control developmental timing, pluripotency and metabolism. This interaction requires the zinc-knuckle domains of Lin-28A. Lin-28B is also a suppressor of miRNA biogenesis, including that of let-7 and possibly of miR107, miR-143 and miR-200c. It binds primary let-7 transcripts (pri-let-7), including pri-let-7g and pri-let-7a-1, and sequester them in the nucleolus, away from the microprocessor complex, hence preventing their processing into mature miRNA. This entry represents the second zinc-knuckle domain.
