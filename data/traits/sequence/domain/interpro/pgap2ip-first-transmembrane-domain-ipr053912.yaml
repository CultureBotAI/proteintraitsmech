identifier: InterPro:IPR053912
label: "PGAP2IP, first transmembrane domain"
definition: >-
  This domain is found in the human PGAP2-interacting protein (PGAP2IP) and its homologues in yeast CWH43. PGAP2IP is composed of three domains. Two of these domains are predicted to adopt very similar structure consisting of six transmembrane helices, which suggests a possible duplication event in these proteins. These two domains have significant similarity to domains belonging to major facilitator superfamily (MFS). The PGAP2IP yeast homologue, CWH43, is involved in the remodeling of the lipid moiety of GPI anchors to ceramides.
