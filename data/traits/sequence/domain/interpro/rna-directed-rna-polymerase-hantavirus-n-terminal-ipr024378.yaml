identifier: InterPro:IPR024378
label: "RNA-directed RNA polymerase, hantavirus, N-terminal"
definition: >-
  This domain is found in the RNA-directed RNA polymerase. It is located towards the N terminus and is approximately 40 amino acids in length. There is a conserved MFNLKF sequence motif. There are two completely conserved residues (E and P) that may be functionally important.
