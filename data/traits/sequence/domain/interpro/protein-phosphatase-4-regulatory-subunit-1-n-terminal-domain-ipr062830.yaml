identifier: InterPro:IPR062830
label: "Protein phosphatase 4 regulatory subunit 1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of protein phosphatase 4 regulatory subunit 1 (PPFR-1). PPFR-1 is a regulatory subunit of serine/threonine-protein phosphatase PP4 that plays a role in meiosis and embryonic mitosis. PPFR-1 regulates microtubule severing during oocyte meiosis II by dephosphorylating and activating MEI-1, a component of the katanin microtubule severing complex. The protein associates with catalytic subunit PPH-4.1 and interacts with MEL-26 via its C-terminal region. PPFR-1 is found in nematodes and localises to the cytoplasm during meiosis and mitosis. The specific function of this N-terminal domain remains to be determined. This domain contains a TPR-like fold.
