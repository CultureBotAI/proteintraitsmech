identifier: InterPro:IPR034109
label: "U7 snRNA-associated Sm-like protein LSM11, middle domain"
definition: >-
  This entry represents the middle domain of Lsm11. LSM11 is an essential component of the U7 snRNP complex that processes histone pre-mRNAs through 3'-end cleavage. This protein contains a C-terminal Sm domain required for U7 snRNA binding and snRNP assembly, while the N-terminal domain is essential for histone pre-mRNA cleavage activity. The N-terminal region contains multiple disordered regions and is subject to phosphorylation and sumoylation. LSM11 interacts with ZNF473, and amino acids 63-82 are sufficient for this interaction. The protein is required for cell cycle progression from G1 to S phase and mutations in LSM11 cause Aicardi-Goutieres syndrome, an interferonopathy characterised by defective histone processing leading to cGAS-STING pathway activation.
