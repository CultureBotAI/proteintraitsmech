identifier: InterPro:IPR056520
label: "KDM8, N-terminal"
definition: >-
  This entry represents the N-terminal domain of human Bifunctional peptidase and arginyl-hydroxylase JMJD5 (also known as KDM8) and similar proteins, which consists of ARM repeats. KDM8 functions both as an endopeptidase and 2-oxoglutarate-dependent monooxygenase.
