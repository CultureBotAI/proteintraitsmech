identifier: InterPro:IPR055070
label: "Epidermin leader peptide-processing serine protease EpiP, N-terminal propeptide"
definition: >-
  This entry represents the propeptide domain found at the N-terminal of peptidases belonging to MEROPS family S8A, subtilisins, including Epidermin leader peptide-processing serine protease EpiP from Staphylococcus epidermidis (EpiP). This propeptide is removed by proteolytic cleavage, which activates the enzyme.
