identifier: InterPro:IPR012419
label: "Cas1p, 10 TM acyl transferase domain"
definition: >-
  Cas1p protein of Cryptococcus neoformans is required for the synthesis of O-acetylated glucuronoxylomannans, a consitutent of the capsule, and is critical for its virulence. This entry represents the multi TM domain of the Cas1p, which was unified with the 10 TM Sugar Acyltransferase superfamily. This superfamily is comprised of members from the OatA, MdoC, OpgC, NolL and GumG families in addition to the Cas1p family. The Cas1p protein has a N-terminal PC-esterase domain with the opposing acyl esterase activity.
