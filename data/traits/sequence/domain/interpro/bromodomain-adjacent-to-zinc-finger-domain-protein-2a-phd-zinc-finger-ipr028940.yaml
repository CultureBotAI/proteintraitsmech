identifier: InterPro:IPR028940
label: "Bromodomain adjacent to zinc finger domain protein 2A, PHD zinc finger"
definition: >-
  Bromodomain adjacent to zinc finger domain protein 2A (BAZ2A, also known as TIP5 or WALp3) is an epigenetic regulator. It forms the nucleolar remodeling complex (NoRC) with ATPase SNF2h, which mediates silencing of a fraction of rDNA by recruiting histone-modifying enzymes and DNA methyltransferases, leading to heterochromatin formation and transcriptional silencing. BAZ2A contains a TAM (TIP5/ARBP/MBD) domain, a DDT domain, four AT-hooks, BAZ 1 and BAZ 2 motifs, a WAKZ (WSTF/Acf1/KIAA0314/ZK783.4) motif, a plant homeodomain (PHD) finger, and a bromodomain. The C-terminal bromodomain, which is found in many chromatin-associated proteins and has been shown to bind to acetylated histone tails. The bromodomain cooperates with an adjacent PHD finger to recruit HDAC1, DNMT1, DNMT3, and SNF2h to rDNA. This entry represents the PHD zinc finger of BAZ2A.
