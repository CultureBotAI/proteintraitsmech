identifier: InterPro:IPR001330
label: Prenyltransferase alpha-alpha toroid domain
definition: >-
  The entry includes enzymes involved in the biosynthesis of various terpenes and the prenylation of proteins. Terpene cyclases/mutases catalyse the cyclisation of squalene or oxidosqualene into various triterpenes, such as lanosterol, beta-amyrin, and hopene, which are crucial for sterol biosynthesis and other metabolic pathways. Protein prenyltransferase subunit beta enzymes facilitate the transfer of farnesyl or geranylgeranyl groups to specific cysteine residues in target proteins, which is essential for their proper localisation and function. These processes are vital for cellular functions, including membrane integrity, signal transduction, and stress responses.
