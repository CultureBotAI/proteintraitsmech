identifier: InterPro:IPR062174
label: "DCT6, central helical domain"
definition: >-
  This entry represents the central helical domain found in DCT6 proteins. DCT6 (Daf-16/foxo controlled, germline tumor- affecting protein 6) may have a role in tumor suppression. The domain is found in nematodes including Caenorhabditis elegans and Caenorhabditis briggsae. DCT6 proteins are controlled by the DAF-16/FOXO transcription factor pathway.
