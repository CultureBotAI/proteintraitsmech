identifier: InterPro:IPR046159
label: "Domain of unknown function DUF6161"
definition: >-
  This presumed domain is functionally uncharacterised. It is found mainly in proteins from Proteobacteria, and is typically between 206 and 231 amino acids in length. There are two conserved sequence motifs: HLA and LFSR.
