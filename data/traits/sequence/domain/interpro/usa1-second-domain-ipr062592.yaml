identifier: InterPro:IPR062592
label: "USA1, second domain"
definition: >-
  This entry represents the second domain of USA1 and related proteins found in yeasts. USA1 is a scaffold protein of the endoplasmic reticulum-associated degradation (ERAD) pathway involved in the ubiquitin-dependent degradation of misfolded ER proteins. USA1 functions as a scaffold within the HRD1 complex, recruiting DER1 and regulating HRD1 activity in both ERAD-L and ERAD-M pathways.
