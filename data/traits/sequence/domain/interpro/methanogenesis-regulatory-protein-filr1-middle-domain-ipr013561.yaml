identifier: InterPro:IPR013561
label: "Methanogenesis regulatory protein FilR1, middle domain"
definition: >-
  This archaeal domain of unknown function has been found at the middle of Methanogenesis regulatory protein FilR1 and at the C-terminal of several transcriptional regulators of the ArsR family (see ). FilR1 is a member of the two-component regulatory system FilI/FilRs which is involved in the regulation of methanogenesis.
