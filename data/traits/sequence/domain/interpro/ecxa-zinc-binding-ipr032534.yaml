identifier: InterPro:IPR032534
label: "EcxA, zinc-binding"
definition: >-
  This domain is found in a group of bacterial proteins, including EcxA from Escherichia coli, one of the two components of the metalloprotease AB5 Toxin EcxAB, which functions as an endopeptidase. This region carries the highly characteristic met-zincin motif HExxHxxGxxH, the extended zinc-binding domain of metallopeptidases.
