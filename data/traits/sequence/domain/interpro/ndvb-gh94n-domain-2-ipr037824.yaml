identifier: InterPro:IPR037824
label: "NdvB, GH94N domain 2"
definition: >-
  Cyclic beta 1-2 glucan synthetases, known as NdvB in Agrobacterium tumefaciens and ChvB in Rhizobium meliloti, belong to the glycoside hydrolase family 94 (previously known as glycosyltransferase family 36). NdvB is required for the synthesis of cyclic beta-(1,2)-glucans, which play a role in interactions between bacteria and plants. This is the second of the two tandemly repeated GH94-N-terminal-like domains in these enzymes.
