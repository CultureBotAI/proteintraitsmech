identifier: InterPro:IPR056218
label: "THSD1, second Ig-like domain"
definition: >-
  This domain is found in the human Thrombospondin type-1 domain-containing protein 1 (THSD1) and similar proteins mainly found in vertebrates. THSD1 is involved in endothelial cell to extracellular matrix adhesion. THSD1 forms a multimeric protein complex with FAK/talin/ vinculin, wherein THSD1 promotes talin binding to FAK but not to vinculin, a key step in nascent adhesion assembly. The domain represented by this entry is predicted to adopt Ig-like β-sandwich. Thrombospondins are multimeric multidomain glycoproteins that function at cell surfaces and in the extracellular matrix milieu. They act as regulators of cell interactions in vertebrates. They are divided into two subfamilies, A and B, according to their overall molecular organisation. The subgroup A proteins TSP-1 and -2 contain an N-terminal domain, a VWFC domain, three TSP1 repeats, three EGF-like domains, TSP3 repeats and a C-terminal domain. They are assembled as trimer. The subgroup B thrombospondins, designated TSP-3, -4, and COMP (cartilage oligomeric matrix protein, also designated TSP-5) are distinct in that they contain unique N-terminal regions, lack the VWFC domain and TSP1 repeats, contain four copies of EGF-like domains, and are assembled as pentamers. EGF, TSP3 repeats and the C-terminal domain are thus the hallmark of a thrombospondin.
