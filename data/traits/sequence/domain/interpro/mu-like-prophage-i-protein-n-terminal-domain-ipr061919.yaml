identifier: InterPro:IPR061919
label: "Mu-like prophage I protein, N-terminal domain"
definition: >-
  This domain is found in various viral Mu-like prophage I proteins, including Protease I, which is involved in virion assembly and maturation. This protein cleaves the portal protein to yield mature procapsids competent for DNA packaging. This domain has a similarity to domain members of the Peptidase clan SH.
