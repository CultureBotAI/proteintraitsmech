identifier: InterPro:IPR016090
label: Phospholipase A2-like, central domain
definition: >-
  Proteins containing this domain include eukaryotic phospholipase A2 enzymes (PLA2; ), small lipolytic enzymes that release fatty acids from the second carbon group of glycerol, usually in a metal-dependent reaction, to generate lysophospholipid (LysoPL) and a free fatty acid (FA). The resulting products are either dietary or used in synthetic pathways for leukotrienes and prostaglandins. Often, arachidonic acid is released as a free fatty acid and acts as a second messenger in signalling networks. These enzymes enable the hydrolysis of fatty acids and lysophospholipids by hydrolysing the 2-ester bond of 1,2-diacyl-3-sn-phosphoglycerides. Phospholipase A2 (PLA2 or PLA2G1B) is a small lipolytic enzyme that releases fatty acids from the second carbon group of glycerol. It is involved in a number of physiologically important cellular processes, such as the liberation of arachidonic acid from membrane phospholipids. It plays a pivotal role in the biosynthesis of prostaglandin and other mediators of inflammation. PLA2 has four to seven disulphide bonds and binds a calcium ion that is essential for activity. Within the active enzyme, the alpha amino group is involved in a conserved hydrogen-bonding network linking the N-terminal region to the active site. The side chains of two conserved residues, His and Asp, participate in the catalytic network. Many PLA2's are widely distributed in snakes, lizards, bees, and mammals. In mammals, there are at least four forms: pancreatic, membrane-associated, as well as two less well characterised forms. The venom of most snakes contains multiple forms of PLA2. Some of them are presynaptic neurotoxins, which inhibit neuromuscular transmission by blocking acetylcholine release from the nerve termini. Some of the proteins in this family a…
