identifier: InterPro:IPR003440
label: Glycosyl transferase 48 domain
definition: >-
  This entry represents a domain found in glycosyltransferase 48 enzymes , including various 1,3-beta-glucan synthase components such as Gls1, Gls2 and Gls3 from yeast. 1,3-beta-glucan synthase also known as callose synthase catalyses the formation of a beta-1,3-glucan polymer that is a major component of the fungal cell wall. The reaction catalysed is:- UDP-glucose + {1,3-beta-D-glucosyl}(N) = UDP + {1,3-beta-D-glucosyl}(N+1). This domain is often found in combination with . The biosynthesis of disaccharides, oligosaccharides and polysaccharides involves the action of hundreds of different glycosyltransferases. These enzymes catalyse the transfer of sugar moieties from activated donor molecules to specific acceptor molecules, forming glycosidic bonds. A classification of glycosyltransferases using nucleotide diphospho-sugar, nucleotide monophospho-sugar and sugar phosphates ([ec:2.4.1.-]) and related proteins into distinct sequence-based families has been described. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. The same three-dimensional fold is expected to occur within each of the families. Because 3-D structures are better conserved than sequences, several of the families defined on the basis of sequence similarities may have similar 3-D structures and therefore form 'clans'.
