identifier: InterPro:IPR057821
label: "XPB-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of TFIIH basal transcription factor complex helicase/translocase XPB subunit from Trypanosoma brucei and related proteins from similar species. This domain is predicted to adopt an α/β configuration. This domain is found next to and appears to be unique in XBP in Trypanosoma. XPB, also known as Ssl2, Ercc3, RepB, Rad25 or haywire, is a core subunit of the eukaryotic basal transcription factor complex TFIIH, which plays a dual role in transcription and DNA repair. It is involved in nucleotide excision repair of DNA and in RNA transcription by RNA polymerase II. TFIIH is a multiprotein complex composed of a 7-subunit core, including XPB, p62, p52, p44, p34 and TTDA, associated with a 3-subunit CDK-activating kinase module consisting of MAT1, cyclin H and Cdk7. XPB functions by opening DNA either around the RNA transcription start site or at sites of DNA damage. It is also required for spliced leader RNA gene transcription by RNA polymerase II, where TFIIH plays an essential role in transcription initiation. Once the pre-initiation complex has been established, TFIIH is necessary for promoter opening and promoter escape, processes that depend on the ATPase activity of XPB.
