identifier: InterPro:IPR054360
label: "Internalin K, domain D2"
definition: >-
  This entry represents domain D2 of the surface-associated internalin InlK from Listeria monocytogenes, also present in similar proteins mainly found in Bacilli. InlK interacts with the highly conserved major vault protein (MVP), the main component of cytoplasmic ribonucleoproteic particules named vaults that are widely expressed in all eukaryotic organisms. Thus, it plays a key role in the listerial infection process. In the structure of this protein, this domain is located at the elbow and has a β-sandwich-like fold.
