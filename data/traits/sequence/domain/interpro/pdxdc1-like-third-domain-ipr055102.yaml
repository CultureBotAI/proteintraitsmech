identifier: InterPro:IPR055102
label: "PDXDC1-like, third domain"
definition: >-
  This entry represents a domain found towards the C-terminal of Pyridoxal-dependent decarboxylase domain-containing protein 1 (PDXDC1). PDXDC1 has been associated with the modulation of prepulse inhibition of acoustic startle, perhaps through the metabolism of catecholamine neurotransmitters. The function of this domain is unknown.
