identifier: InterPro:IPR057720
label: "YTH1-like, RRM domain"
definition: >-
  This RRM domain is found in the YTH domain-containing family protein 1 (YTH1) from Cryphonectria parasitica and similar fungal proteins. YTH1 specifically recognises and binds N6-methyladenosine (m6A)-containing mRNAs, and regulates their stability and processing.
