identifier: InterPro:IPR008737
label: "Putative aspartic peptidase, DUF1758"
definition: >-
  This is a domain found in a group of proteins of unknown function. Most members of this entry are found in arthropods and nematodes. It seems likely that these proteins act as aspartic peptidases.
