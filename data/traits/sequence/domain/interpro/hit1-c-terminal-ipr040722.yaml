identifier: InterPro:IPR040722
label: "Hit1, C-terminal"
definition: >-
  This domain is found in Hit1 protein (Hit1p) present in Saccharomyces cerevisiae and similar proteins from ascomycetes. Hit1p contributes to C/D small nucleolar RNPs (snoRNPs) stability and pre-RNA maturation kinetics by associating with U3 snoRNA precursors and influencing its 3'-end processing. Snu13p-Rsa1p-Hit1p heterotrimer binds C/D snoRNAs. C/D snoRNAs are essential for the biogenesis of ribosomes and spliceosomes. The domain adopts a Pac-Hit fold that forms a claw which locks the α1 helix of Rsa1p, while the Rsa1p α2 helix packs against the exposed surface of the Hit1p Pac-Hit domain α3 helix.
