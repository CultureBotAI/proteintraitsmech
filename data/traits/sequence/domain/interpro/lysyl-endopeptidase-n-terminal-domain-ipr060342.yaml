identifier: InterPro:IPR060342
label: "Lysyl endopeptidase, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of lysyl endopeptidase found in Pseudomonas species and related bacteria. This domain corresponds to the pro-peptide region (residues 25-211) of the lysyl endopeptidase precursor. The pro-peptide is removed by autocatalytic processing to generate the mature, active enzyme. This domain likely plays a role in proper protein folding and may be involved in regulating the activation of the protease. The mature enzyme is a virulence factor involved in corneal infections. This domain shows some similarity to the structures of the nucleoplasmin superfamily.
