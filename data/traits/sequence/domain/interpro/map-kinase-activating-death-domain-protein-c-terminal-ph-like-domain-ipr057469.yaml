identifier: InterPro:IPR057469
label: "MAP kinase-activating death domain protein, C-terminal PH-like domain"
definition: >-
  This entry represents a C-terminal pleckstrin homology (PH)-like domain found in human MAP kinase-activating death domain (MADD) and similar animal proteins. MADD proteins function as adaptor proteins in cell death and MAP kinase signalling pathways.
