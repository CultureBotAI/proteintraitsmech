identifier: InterPro:IPR047408
label: "Forkhead box protein O1, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXO1 and similar sequences from vertebrates. The FH domain is a winged helix DNA-binding domain. Forkhead box protein O1 (FOXO1) is a transcription factor that is the main target of insulin signaling and regulates metabolic homeostasis in response to oxidative stress. It binds to the insulin response element (IRE) with the consensus sequence 5'-TT[G/A]]TTTTG-3' and the related Daf-16 family binding element (DBE) with the consensus sequence 5'-TT[G/A]]TTTAC-3'. FOXO1 is ubiquitinated by Skp2 which promotes its proteasomal degradation. This effect of Skp2 requires Akt-specific phosphorylation of FOXO1. Skp2 inhibits transactivation of FOXO1 which abolishes the inhibitory effect of FOXO1 on cell proliferation and survival.
