identifier: InterPro:IPR032735
label: "BROMI, middle region"
definition: >-
  This entry represents the middle domain of BROMI, which may consist of an α-solenoid. The Broad-minded family of proteins is essential for the proper response to Sonic hedgehog (Shh) signalling during neural tube development. Members of the Broad-minded family collaborate with cyclin-dependent kinase 20 (CDK20) to regulate the structure of the primary cilium. They are involved in the coordination of the ciliary membrane and axoneme assembly, which is crucial for the activation of the GLI2 transcription factor in response to Shh signalling. It interacts with CCRK/CDK20, which phosphorylates and activates the intestinal cell kinase (ICK)/CILK1 kinase, to regulate the change in direction of the IFT machinery at the ciliary tip. Mutations in this protein in humans cause ciliopathies.
