identifier: InterPro:IPR033036
label: "Doublecortin domain-containing protein 2, doublecortin-like domain 2"
definition: >-
  Doublecortin domain-containing protein 2 (DCDC2) interacts with the mediator of Wnt signalling dishevelled. The overexpression of DCDC2 inhibits beta-catenin-dependent Wnt signalling. It also plays an important role in hair cell kinocilia and supporting cell primary cilia length regulation, likely via its role in microtubule formation and stabilisation. It also affects length and signalling of primary cilia in neurons and has been associated with learning disabilities. Genetic variation in humans is associated with neonatal sclerosing cholangitis, a rare biliary disease leading to liver transplantation in childhood. This entry represents the doublecortin-like domain 2 of DCDC2.
