identifier: InterPro:IPR024742
label: "Glycogen debranching enzyme, bacterial and archaeal type, N-terminal"
definition: >-
  This domain is found in bacteria and archaea glycogen debranching enzyme, and is typically between 218 and 229 amino acids in length. Glycogen debranching enzyme catalyses the debranching of amylopectin in glycogen. This is done by transferring three glucose subunits of glycogen from one parallel chain to another. This has the effect of enabling the glucose residues to become more accessible for glycolysis.
