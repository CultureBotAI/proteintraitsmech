identifier: InterPro:IPR026337
label: "Alpha-ketoglutarate-HExxH-type peptide, beta-hydroxylase domain"
definition: >-
  Sequences belonging to this entry include C-terminal extension regions shared by members of the FxsB family of radical SAM/SPASM proteins that perform post-translational modifications to FxSxx-COOH family RiPP precursor proteins, but also additional proteins from bacteria that lack an FxSxx-COOH modification system. Members of this entry that are not fused to a radical SAM domain, have a HEXXH motif that hinted at metalloprotease activity. However, the domain recently was shown instead to function as an alpha-ketoglutarate (aKG)-dependent non-heme iron beta-hydroxylase ('H') domain.
