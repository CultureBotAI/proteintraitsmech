identifier: InterPro:IPR048839
label: "Spermatogenesis-associated protein 2, PUB-like domain"
definition: >-
  This domain is found at the N-terminal of Spermatogenesis-associated protein 2 from humans (SPATA2) ( ) and similar proteins from animals. This protein interacts with the deubiquitinase CYLD through its non-canonical PUB domain and activates CYLD-mediated hydrolysis of ubiquitin chains. This entry represents the PUB-like domain which folds into a globular α-helical structure.
