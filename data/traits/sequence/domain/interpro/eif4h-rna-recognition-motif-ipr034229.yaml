identifier: InterPro:IPR034229
label: "eIF4H, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of eIF-4H, which, together with elf-4B/eIF-4G, serves as the accessory protein of RNA helicase eIF-4A. eIF-4H contains a well conserved RNA recognition motif (RRM). It stimulates protein synthesis by enhancing the helicase activity of eIF-4A in the initiation step of mRNA translation.
