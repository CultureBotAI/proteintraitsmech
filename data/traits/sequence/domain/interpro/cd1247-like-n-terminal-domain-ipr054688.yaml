identifier: InterPro:IPR054688
label: "CD1247-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of CD1247 from Clostridioides difficile and similar proteins from in Gram-positive anaerobes. Most members share a C-terminal region with two CxxC motifs likely to have zinc-binding activity.
