identifier: InterPro:IPR062070
label: "Merozoite surface protein 9, helical domain"
definition: >-
  This entry represents a small helical domain in merozoite surface protein 9 (MSP9) found in Plasmodium species. During the asexual blood stage, MSP9 is involved in the sialic acid-independent merozoite invasion of host erythrocytes by binding to host SLC4A1/Band 3 protein. The protein forms a complex with MSP1, MSP6, MSP7 and MSP3, where MSP6 and MSP9 mediate binding to the host erythrocyte. MSP9 contains tandem repeats and coiled-coil regions, and localises to the merozoite surface at the time of schizont rupture.
