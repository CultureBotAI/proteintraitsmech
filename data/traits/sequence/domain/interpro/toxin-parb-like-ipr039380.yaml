identifier: InterPro:IPR039380
label: Toxin-ParB-like
definition: >-
  This entry represents a toxin domain with similarity to the N-terminal domain of ParB, a DNA-binding component of the prokaryotic parABS partitioning system and related proteins. Toxins are found at the C terminus of polymorphic toxin system members.
