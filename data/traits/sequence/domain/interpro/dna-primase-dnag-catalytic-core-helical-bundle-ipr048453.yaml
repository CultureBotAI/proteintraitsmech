identifier: InterPro:IPR048453
label: "DNA primase DnaG, catalytic core, helical bundle"
definition: >-
  This domain is found in DNA primase from Staphylococcus aureus (DnaG) and similar proteins from Staphylococcus. DnaG is an RNA polymerase that catalyses the synthesis of short RNA molecules used as primers for DNA polymerase during DNA replication. This entry represents the helical bundle (HB) found at the C-terminal of the catalytic core of DnaG.
