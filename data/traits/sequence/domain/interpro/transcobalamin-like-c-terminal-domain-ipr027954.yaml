identifier: InterPro:IPR027954
label: "Transcobalamin-like, C-terminal domain"
definition: >-
  This domain of is found at the C-terminal of transcobalamin (TC), a vitamin B12-binding protein that transports cobalamin (Cbl/vitamin B12) into cells. TC consists of two domains, α and β, both of which contribute to Cbl binding, resulting in sub-picomolar affinity. This entry corresponds to the β-domain. This domain is also found in several uncharacterised proteins, like , that have an LPXTG-cell wall anchor at their C terminus, a polysaccharide lyase or glycosyltransferase structure associated with them in the middle region, as well as this domain at the N terminus.
