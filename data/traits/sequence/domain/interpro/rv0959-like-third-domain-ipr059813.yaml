identifier: InterPro:IPR059813
label: "Rv0959-like, third domain"
definition: >-
  This entry represents the third domain found in Rv0959 and related uncharacterised proteins from Mycobacterium tuberculosis complex species. The domain is found in proteins of approximately 672 amino acids that also contain a von Willebrand factor type A (VWA) domain. The proteins containing this domain are found in Mycobacterium tuberculosis (Rv0959), Mycobacterium bovis (Mb0984), and other members of the M. tuberculosis complex. These proteins have been detected by mass spectrometry in M. tuberculosis, confirming their expression. One study suggests plasma membrane localisation for the M. tuberculosis protein. The full-length proteins show a disordered N-terminal region enriched in basic and acidic residues, followed by structured domains including a VWA domain and this third domain. The function of these proteins and this specific domain remains to be determined.
