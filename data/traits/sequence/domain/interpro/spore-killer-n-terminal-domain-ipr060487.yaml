identifier: InterPro:IPR060487
label: "Spore killer, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of spore killer 1/2/3/4 (SPOK1,2,3,4) proteins, found in ascomycete fungi. The N-terminal region contains a coiled-coil domain and disordered regions. The specific function of this N-terminal domain remains to be determined. SPOK1, SPOK3 and SPOK4 promotes unequal transmission of alleles from the parental zygote to progeny spores by acting as poison/antidote system, leading to poisoning of progeny that do not inherit the allele. SPOK1 can suppress meiotic drive by the P.anserina SPOK2, SPOK3 and SPOK4 proteins. SPOK4 can suppress meiotic drive by the P.comata SPOK1 protein. The full-length SPOK2 proteins act as meiotic drivers that promote unequal transmission of alleles by functioning as poison/antidote systems. These proteins are localised to both the cytoplasm and nucleus and may possess DNA nuclease activity that leads to spore killing, as well as kinase activity that confers resistance to the nuclease activity.
