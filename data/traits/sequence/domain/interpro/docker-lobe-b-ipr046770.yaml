identifier: InterPro:IPR046770
label: "DOCKER, Lobe B"
definition: >-
  This entry represents a conserved region within a number of eukaryotic dedicator of cytokinesis proteins (DOCK), which are guanine nucleotide exchange factors (GEFs), that activate some small GTPases by exchanging bound GDP for free GTP such as Rac. DOCK proteins are required during several cellular processes, such as cell motility and phagocytosis. These proteins have a DOCK-homology region 1 (DHR-1, also known as DOCK-type C2 domain) at the N-terminal and a DHR-2 (also known as DOCKER domain) at the C-terminal. The DOCKER domain ( ) is a GEF catalytic domain organised into three lobes, A, B and C, with the Rho-family binding site and catalytic centre generated entirely from lobes B and C. This entry represents Lobe B, which adopts an unusual architecture of two antiparallel β-sheets disposed in a loosely packed orthogonal arrangement. This lobe changes its position relative to lobe C and the bound GTPase, which suggests that lobe B distinguishes between the switch 1 conformations of the small GTPases Rac1 and Cdc42.
