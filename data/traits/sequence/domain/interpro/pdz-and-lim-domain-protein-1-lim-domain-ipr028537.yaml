identifier: InterPro:IPR028537
label: "PDZ and LIM domain protein 1, LIM domain"
definition: >-
  This entry represents the C-terminal Lim domain of PDLIM1, which function as an adaptor or scaffold to support the assembly of multimeric protein. This domain shows two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. PDZ and LIM domain protein 1 (PDZ-LIM1, also known as CLP-36) is a member of the PDZ-LIM family of adapter proteins that have been implicated in cytoskeleton organisation, neuronal signalling, cell lineage specification, organ development, and oncogenesis. Several PDZ-LIM proteins are predominantly expressed in striated muscle. However, CLP36 is expressed in several nonmuscle tissues. CLP36 binds to alpha-actinin-1 and may direct alpha-actinin-1 to specific actin structures. CLP36 also recruits the Clik1 kinase to actin stress fibres in nonmuscle cells.
