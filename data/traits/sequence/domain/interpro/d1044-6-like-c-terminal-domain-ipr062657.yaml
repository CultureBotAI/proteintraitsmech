identifier: InterPro:IPR062657
label: "D1044.6-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of zinc finger protein 318-like proteins found in nematodes, including uncharacterised protein D1044.6. The protein is predicted to be localised to the nucleoplasm and belongs to the zinc finger containing protein family.
