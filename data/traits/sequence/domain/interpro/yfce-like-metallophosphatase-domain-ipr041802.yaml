identifier: InterPro:IPR041802
label: "YfcE-like, metallophosphatase domain"
definition: >-
  YfcE is a manganase-dependent metallophosphatase, found in bacteria and archaea, that cleaves bis-p-nitrophenyl phosphate, thymidine 5'-monophosphate-p-nitrophenyl ester, and p-nitrophenyl phosphorylcholine, but is unable to hydrolyze 2',3 ' or 3',5' cyclic nucleic phosphodiesters, and various phosphomonoesters, including p-nitrophenyl phosphate. This entry also includes the Bacilus subtilis YsnB and Methanococcus jannaschii MJ0936 proteins. This domain belongs to the metallophosphatase (MPP) superfamily.
