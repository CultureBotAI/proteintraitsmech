identifier: InterPro:IPR034300
label: "NADP transhydrogenase beta-like domain"
definition: >-
  NAD(P) transhydrogenase catalyses the transfer of reducing equivalents between NAD(H) and NADP(H), coupled to the translocation of protons across a membrane. It is an integral membrane protein found in most organisms except for yeasts, plants and some bacterial species. In bacterial species it is located in the cytoplasmic membrane, while in mitochondria it is located in the inner membrane. Under most physiological conditions this enzyme synthesises NADPH, driven by consumption of the proton electrochemical gradient. The resulting NADPH is subsequently used for biosynthetic reactions or the reduction of glutathione. Bacterial NADP(H) transhydrogenases consist of two subunits, an alpha subunit with an NAD(H)-binding domain and a beta subunit with an NADP(H)-binding domain. This entry corresponds to the beta subunit of NADP transhydrogenase in prokaryotes, and either the protein N- or C-terminal domain in eukaryotes.
