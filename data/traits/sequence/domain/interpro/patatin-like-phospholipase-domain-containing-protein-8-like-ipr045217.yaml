identifier: InterPro:IPR045217
label: Patatin-like phospholipase domain containing protein 8-like
definition: >-
  Patatin-like phospholipase domain containing protein 8 (PNPLA8, also known as iPLA2-gamma) is a Ca-independent myocardial phospholipase which maintains mitochondrial integrity. In humans, it is predominantly expressed in heart tissue. iPLA2-gamma can catalyse both phospholipase A1 and A2 reactions (PLA1 and PLA2 respectively). This family includes PNPLA8 (iPLA2-gamma) from mammals and AtPLAI from Arabidopsis.
