identifier: InterPro:IPR062928
label: "Pyridoxal-dependent enzyme, C-terminal putative HTH domain"
definition: >-
  This entry represents a C-terminal domain of approximately 65 residues found in pyridoxal phosphate (PLP)-dependent enzymes. The domain is found C-terminal to pyridoxal-dependent decarboxylase and aminotransferase class V domains. Proteins containing this domain include glutamate decarboxylases and aspartate aminotransferases. This family is found almost exclusively in Actinomycetota. The function of this domain remains to be determined.
