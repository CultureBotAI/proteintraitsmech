identifier: InterPro:IPR029442
label: "GyrI-like small molecule binding domain"
definition: >-
  This entry represents a small molecule binding domain in a number of different bacterial transcription activators and DNA gyrase inhibitors (GyrI). In members of the GyrI superfamily this domain originated from a dimeric version of an SHS2 module that has been adapted for small-molecule binding. Members of the GyrI superfamily with this domain include a family of secreted forms that is found only in animals and the bacterial pathogen Leptospira.
