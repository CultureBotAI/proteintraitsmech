identifier: InterPro:IPR064180
label: "FILTED putative surface-anchoring domain"
definition: >-
  FILTED, a domain named for one well-conserved motif, is a predicted integral membrane domain about 100 amino acids in length, regularly found as the most C-terminal domain of multi-domain proteins. Proteins containing this domain often are repetitive protein, and often contain domains typical of surface-exposed proteins that in other contexts may have C-terminal protein-sorting signals that direct cleavage and covalent attachment of a new form of C-terminal anchor. The taxonomic range appears limited to lineages (Firmicutes, Archaea) with no outer membrane.
