identifier: InterPro:IPR006644
label: Dystroglycan-type cadherin-like
definition: >-
  In animals, cadherin domain-containing proteins are adhesion molecules that modulate a wide variety of processes including cell polarization and migration but they have also been identified in yeast and magnetotactic bacteria. Crystal structures have revealed that multiple cadherin domains form Ca 2+ -dependent rod-like structures with a conserved Ca 2+ -binding pocket at the domain-domain interface.
