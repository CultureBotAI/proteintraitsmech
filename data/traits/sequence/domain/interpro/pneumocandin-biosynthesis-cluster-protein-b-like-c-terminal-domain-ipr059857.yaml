identifier: InterPro:IPR059857
label: "Pneumocandin biosynthesis cluster protein B-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in Pneumocandin biosynthesis cluster protein B and related proteins such as Echinocandin B biosynthetic cluster protein J and Hypothemycin biosynthesis cluster protein hpm4. GloB is part of gene cluster that mediates the biosynthesis of pneumocandins, lipohexapeptides of the echinocandin family that prevent fungal cell wall formation by non-competitive inhibition of beta-1,3-glucan synthase. The function of this C-terminal is unknown.
