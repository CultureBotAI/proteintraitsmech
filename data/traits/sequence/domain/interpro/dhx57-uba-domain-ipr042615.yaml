identifier: InterPro:IPR042615
label: "DHX57, UBA domain"
definition: >-
  DHX57, also called DEAH box protein 57, is a multi-domain protein with an N-terminal ubiquitin-association (UBA) domain, a zinc finger domain, a RWD domain, a DEAD-like helicase domain and two C-terminal helicase associated domains. Although the precise biological function of DHX57 remains unclear, it may function as a putative ATP-dependent RNA helicase.
