identifier: InterPro:IPR056603
label: "GATOR1 complex protein NPRL3, C-terminal HTH domain"
definition: >-
  This domain is found at the C-terminal end of GATOR1 complex protein NPRL3 (NPRL3) and similar proteins, mainly found in animals and fungi. As a component of the GATOR1 complex, NPRL3 functions as an inhibitor of the amino acid-sensing branch of the mTORC1 pathway. This domain shows an helix-turn-helix (HTH) configuration.
