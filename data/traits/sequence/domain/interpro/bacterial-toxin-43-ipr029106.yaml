definition: >-
  This entry represents a predicted RNase toxin found in bacterial polymorphic toxin systems. The toxin possesses an α+β fold with two conserved histidine residues. This entry represents a predicted RNase toxin found in bacterial polymorphic toxin systems. The toxin possesses an α+β fold with two conserved histidine residues. In bacterial polymorphic toxin systems, the toxin is usually exported by the type 2 or TcdB/TcaC-type secretion system. A of this, the Pseudomonas RhsT-C has been experimentally characterised.
