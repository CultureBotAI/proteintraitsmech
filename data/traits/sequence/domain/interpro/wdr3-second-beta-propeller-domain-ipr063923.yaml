identifier: InterPro:IPR063923
label: "WDR3, second beta-propeller domain"
definition: >-
  This is the second β-propeller domain of WDR3 from animals and its homologues in eukaryotes. It is part of the small subunit (SSU) processome, the first precursor of the small eukaryotic ribosomal subunit.
