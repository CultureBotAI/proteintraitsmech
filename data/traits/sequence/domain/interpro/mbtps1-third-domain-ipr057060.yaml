identifier: InterPro:IPR057060
label: "MBTPS1, third domain"
definition: >-
  This domain is found in the family of serine proteases such as MBTPS1 and SBT6.1 that are involved in regulated intramembrane proteolysis (RIP) of various substrates, playing a crucial role in cellular signalling and regulation. This domain is predicted to fold into a globular structure with an Ig-like fold. MBTPS1 proteases cleave after hydrophobic or small residues, with a preference for Arg or Lys at the P4 position. They are responsible for the proteolytic activation of sterol regulatory element-binding proteins (SREBPs), cyclic AMP-dependent transcription factors (ATF6 and ATF6B), and other factors like BDNF, GNPTAB, and FAM20C. In plants, SBT6.1 participate in stress response signalling and cell wall remodelling by processing factors like BZIP17 and pectinesterases.
