identifier: InterPro:IPR013537
label: Acetyl-CoA carboxylase, central domain
definition: >-
  This region is found in various eukaryotic acetyl-CoA carboxylases, N-terminal to the catalytic domain. Enzymes containing this domain ( ) are involved in the synthesis of long-chain fatty acids, as they catalyses the rate limiting step in this process.
