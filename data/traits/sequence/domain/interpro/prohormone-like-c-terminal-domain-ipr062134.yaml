identifier: InterPro:IPR062134
label: "Prohormone-like, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain found in insect prohormone proteins. The domain is approximately 50-60 amino acids in length and contains bioactive peptides that are cleaved from the precursor protein. In prohormone-1 from Apis mellifera, this domain contains brain peptides including LRNQLDIGDLQ and SYWKQCAFNAVSCF-amide. In allatostatin C from Camponotus floridanus, it contains the peptide LRSQLDIGDLQ and allatostatin C which inhibits juvenile hormone biosynthesis. These peptides are secreted and contain disulphide bonds essential for their structure and function. The specific function of this domain structure remains to be determined.
