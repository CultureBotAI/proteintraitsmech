identifier: InterPro:IPR063486
label: "Y3IP1/CEST, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the Y3IP1/CEST protein family found in plants. This domain is found in combination with a C-terminal domain . The full-length protein localises to the chloroplast thylakoid membrane. Y3IP1 interacts with the plastid-encoded Ycf3 protein and participates in photosystem I assembly. The specific function of this domain remains to be determined.
