identifier: InterPro:IPR010060
label: "Non-ribosomal peptide synthase"
definition: >-
  This entry represents a region of 171 amino acids long and contains three very highly conserved regions. At the N terminus is a nearly invariant lysine (position 11) followed by xxxRxxPxxGxGYG in which the proline and the first glycine are invariant. This is followed approximately 22 residues later by the motif FNYLG. Near the C terminus of the domain is the sequence TxSD where the serine and aspartate are nearly invariant. This domain appears to be located immediately downstream from a condensation domain, and is followed primarily by the end of the molecule or another condensation domain (or, in a few cases, it is followed by , an AMP-binding module). The converse is not true, domains are not always followed by this domain, which implicates this domain in possible post-condensation modification events. This region has so far been found in a variety of peptide synthases including Bacitracin synthetase 1 Gramicidin S synthetase 1 Linear gramicidin synthetase subunit A Surfactin synthetase subunit 1 Tyrocidine synthetase 1 It is also found in Vanchrobactin synthetase VabF which is involved in the synthesis of the siderophore vanchrobactin.
