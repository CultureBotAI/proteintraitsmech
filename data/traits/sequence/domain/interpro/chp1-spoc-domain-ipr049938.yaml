identifier: InterPro:IPR049938
label: "Chp1, SPOC domain"
definition: >-
  This entry represents the SPOC domain of Chp1 that is involved in developmental signaling and has also been proposed to be a phosphorylation binding module. Chromodomain-containing protein 1 (Chp1) is required for RNA interference-dependent heterochromatin formation in fission yeast. Chp1 is a member of the RNA-induced transcriptional silencing (RITS) complex which maintains the heterochromatin regions and plays a role in stabilizing microtubules which allows accurate chromosome segregation.
