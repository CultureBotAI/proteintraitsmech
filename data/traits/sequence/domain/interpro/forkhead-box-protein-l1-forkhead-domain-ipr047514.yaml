identifier: InterPro:IPR047514
label: "Forkhead box protein L1, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of FOXL1 and similar proteins from animals. The FH domain is a winged helix DNA-binding domain. Forkhead box protein L1 (FOXL1), also called Forkhead-related protein FKHL11 or Forkhead-related transcription factor 7 (FREAC-7), acts as a transcription factor required for proper proliferation and differentiation in the gastrointestinal epithelium. In zebrafish has been proposed as a regulator of neural development. It may play a critical role in suppressing tumorigenesis.
