identifier: InterPro:IPR028112
label: "DNA polymerase III PolC-type, N-terminal domain I"
definition: >-
  This entry represent the first N-terminal domain, NI domain, of the DNA polymerase III PolC subunit A. DNA polymerase PolC-type III enzyme functions as the 'replicase' in low G + C Gram-positive bacteria. It has been predicted that the N terminus of PolC folds into two globular domains, NI and NII. A predicted patch of elecrostatic potential at the surface of this domain suggests a possible involvement in nucleic acid binding. This domain is associated with DNA polymerase III, alpha subunit and DNA polymerase III PolC-like, N-terminal domain II.
