identifier: InterPro:IPR054775
label: "2-Component system ADP-ribosyltransferase domain"
definition: >-
  This entry represents the 2CompART domain, which coupled with its partner 2CompARG (represented by ), forms a two-domain T-A-like association in the duplex-forming systems likely functioning as the principal effector of these systems in bacteroidetes. One is likely to function as the antitoxin, regulating the toxin activity of the other.
