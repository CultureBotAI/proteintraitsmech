identifier: InterPro:IPR062911
label: "Peptidase S8 propeptide domain"
definition: >-
  This entry represents the propeptide domain of subtilisin-like serine proteases (peptidase S8 family) found in Bacteroidota. The domain is located at the N terminus of the protein preceding the catalytic peptidase S8 domain. These proteases are typically secreted via the type IX secretion system, as indicated by the presence of a C-terminal T9SS sorting signal. The propeptide domain functions as an intramolecular chaperone that assists in the folding of the catalytic domain and maintains the protease in an inactive state until it is cleaved. In Flavobacterium psychrophilum, S8 family serine proteases secreted by the type IX secretion system are required for virulence.
