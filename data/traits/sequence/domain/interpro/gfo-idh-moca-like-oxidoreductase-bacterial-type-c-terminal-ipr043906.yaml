identifier: InterPro:IPR043906
label: "Gfo/Idh/MocA-like oxidoreductase, bacterial type, C-terminal"
definition: >-
  This entry represents a domain found in a group of predicted bacterial oxidoreductases. Proteins containing this domain are related to the GFO/IDH/MOCA family members that function as NAD(P)-dependent oxidoreductases. This domain is an α/β-domain that contributes to the substrate binding and catalysis.
