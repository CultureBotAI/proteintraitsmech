identifier: InterPro:IPR047886
label: ARHGAP20-like, RhoGAP domain
definition: >-
  This entry represents the RhoGAP (GTPase-activator protein (GAP) for Rho-like small GTPases) domain of ARHGAP20-like proteins. ARHGAP20, also known as KIAA1391 and RA-RhoGAP, contains a RhoGAP, a RA, and a PH domain, and ANXL repeats. ARHGAP20 is thought to function in rearrangements of the cytoskeleton and cell signalling events that occur during spermatogenesis. It is activated by Rap1 and induces inactivation of Rho, which in turn leads to neurite outgrowth. Small GTPases cluster into distinct families, and all act as molecular switches, active in their GTP-bound form but inactive when GDP-bound. The Rho family of GTPases activates effectors involved in a wide variety of developmental processes, including regulation of cytoskeleton formation, cell proliferation and the JNK signalling pathway. GTPases generally have a low intrinsic GTPase hydrolytic activity but there are family-specific groups of GAPs that enhance the rate of GTP hydrolysis by several orders of magnitude. This entry also includes T-cell activation Rho GTPase-activating protein (TAGAP), a Rho GTPase-activating protein that plays an important regulatory role during T-cell activation. Single nucleotide polymorphisms (SNPs) in TAGAP have been associated with different autoimmune diseases, such as rheumatoid arthritis, celiac disease and Crohn's disease.
