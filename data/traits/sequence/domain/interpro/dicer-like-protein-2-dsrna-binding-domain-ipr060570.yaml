identifier: InterPro:IPR060570
label: "Dicer-like protein 2, dsRNA binding domain"
definition: >-
  This domain is found at the C-terminal end of Dicer-like protein 2 from Pyricularia oryzae (DCL2) and related proteins. DCL2 is involved in cleaving double-stranded RNA in the RNA interference (RNAi) pathway. It is part of a broad host defence response against viral infection and transposons.
