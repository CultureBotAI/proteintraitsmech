identifier: InterPro:IPR060399
label: "RNA exonuclease 3, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of RNA exonuclease 3 (REXO3) from Aspergillus fumigatus, Emericella nidulans and close homologues from fungi. REXO3 is a 3' to 5' exoribonuclease required for proper 3' end maturation of MRP RNA and U5L snRNA. The protein contains a C-terminal exonuclease domain that carries the nuclease activity. This N-terminal domain precedes the catalytic domain and contains disordered regions. The protein is found in both the cytoplasm and nucleus. The specific function of this N-terminal domain remains to be determined.
