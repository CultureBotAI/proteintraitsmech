identifier: InterPro:IPR059567
label: "YdfE, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of YdfE proteins found primarily in enterobacterales. YdfE is a protein of approximately 306 amino acids that is classified in the COG0847 group. YdfE may be a pseudogene product in some strains due to IS2 element insertion. The function of this domain remains to be determined.
