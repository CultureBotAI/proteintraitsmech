identifier: InterPro:IPR048331
label: "PcRGLX/YetA-like, C-terminal alpha/alpha toroid domain"
definition: >-
  This entry includes Exo-rhamnogalacturonan lyase from Penicillium chrysogenum 31B (PcRGLX) and YetA from B. subtilis, which is functionally uncharacterised. This entry represents the C-terminal α/α-toroid domain. Members of this entry share a 3 domain architecture.
