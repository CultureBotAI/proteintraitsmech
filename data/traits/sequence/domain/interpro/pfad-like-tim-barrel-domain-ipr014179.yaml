identifier: InterPro:IPR014179
label: "PfaD-like, TIM-barrel domain"
definition: >-
  The protein PfaD is part of a four-gene locus, similar to polyketide biosynthesis systems, which is responsible for omega-3 polyunsaturated fatty acid biosynthesis in several high pressure and/or cold-adapted bacteria. Several other members of the entry are found in loci presumed to act in polyketide biosynthesis per se. This entry represents the C-terminal domain of Polyunsaturated fatty acid synthase subunit B/C (PFA2/3) and polyketide biosynthesis proteins BaeE, PksE and ThaF.
