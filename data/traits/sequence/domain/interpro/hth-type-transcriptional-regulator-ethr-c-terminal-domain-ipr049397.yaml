identifier: InterPro:IPR049397
label: "HTH-type transcriptional regulator EthR, C-terminal domain"
definition: >-
  HTH-type transcriptional regulator EthR is involved in the repression of the monooxygenase EthA which is responsible of the formation of the active metabolite of ethionamide (ETH). It is responsible for the low sensitivity of the human pathogen Mycobacterium tuberculosis to ethionamide. It consists of a DNA-binding HTH domain at the N-terminal and a C-terminal helical domain that binds its ligand (this entry).
