identifier: InterPro:IPR062818
label: ATG41
definition: >-
  This entry represents autophagy-related protein 41 (ATG41) from yeasts. ATG41 is involved in autophagosome formation and interacts with ATG9. ATG41 localises to preautophagosomal structure membranes and shows peri-mitochondrial distribution.
