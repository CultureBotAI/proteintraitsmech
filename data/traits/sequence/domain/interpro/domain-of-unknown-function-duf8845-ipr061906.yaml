identifier: InterPro:IPR061906
label: "Domain of unknown function DUF8845"
definition: >-
  This entry represents a domain found in uncharacterised proteins from Bacteroidota, particularly in Flavobacteriaceae. These proteins are approximately 200 amino acids in length and are predicted to be membrane-associated. STRING analysis shows these proteins are functionally associated with sigma-70 factors ( and ) and other regulatory proteins. The function of this protein family remains to be determined.
