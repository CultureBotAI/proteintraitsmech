identifier: InterPro:IPR013713
label: Exportin-2, central domain
definition: >-
  Exportin-2, also known as CAS, is an export receptor for importin-alpha. It binds strongly to importin alpha only in the presence of RanGTP, forming an importin alpha/CAS/RanGTP complex. Exportin-2 mediates importin-alpha re-export from the nucleus to the cytoplasm after import substrates have been released into the nucleoplasm. This domain is found in exportin-2 and related proteins, such as exportin-7/8. This domain contains HEAT repeats.
