identifier: InterPro:IPR057947
label: "Exportin-7/Ran-binding protein 17, TPR domain"
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found in human Exportin-7 (XPO7, also known as RAN binding protein 16), Ran-binding protein 17 (RBP17) and similar eukaryotic proteins. XPO7 mediates the nuclear export of proteins with broad substrate specificity. Exportins bind cargo molecules in the nuclei and transport them through nuclear pores to the cytoplasm, a process that requires RanGTP. XPO7 mediates the nuclear export of proteins with broad substrate specificity. They bind cooperatively to its cargo and to the GTPase Ran in its active GTP-bound form.
