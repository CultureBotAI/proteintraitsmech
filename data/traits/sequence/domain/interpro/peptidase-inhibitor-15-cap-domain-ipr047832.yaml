identifier: InterPro:IPR047832
label: "Peptidase inhibitor 15, CAP domain"
definition: >-
  This entry represents the CAP domain of peptidase inhibitor 15 (PI15) protein, also known as cysteine-rich secretory protein 8 (CRISP-8), or SugarCrisp. It is a serine protease inhibitor which displays weak inhibitory activity against trypsin and may play a role in facial patterning during embryonic development. The PI15 gene is a candidate gene for abdominal aortic internal elastic lamina ruptures in the rat. The cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins (CAP) superfamily proteins are found in a wide range of organisms, including prokaryotes and non-vertebrate eukaryotes, The nine subfamilies of the mammalian CAP superfamily include: the human glioma pathogenesis-related 1 (GLIPR1), Golgi associated pathogenesis related-1 (GAPR1) proteins, peptidase inhibitor 15 (PI15), peptidase inhibitor 16 (PI16), cysteine-rich secretory proteins (CRISPs), CRISP LCCL domain containing 1 (CRISPLD1), CRISP LCCL domain containing 2 (CRISPLD2), mannose receptor like and the R3H domain containing like proteins. Members are most often secreted and have an extracellular endocrine or paracrine function and are involved in processes including the regulation of extracellular matrix and branching morphogenesis, potentially as either proteases or protease inhibitors; in ion channel regulation in fertility; as tumour suppressor or pro-oncogenic genes in tissues including the prostate; and in cell-cell adhesion during fertilisation. The overall protein structural conservation within the CAP superfamily results in fundamentally similar functions for the CAP domain in all members, yet the diversity outside of this core region dramatically alters the target specificity and, thus, the biological consequences. The Ca2-chelating function would fit with the variou…
