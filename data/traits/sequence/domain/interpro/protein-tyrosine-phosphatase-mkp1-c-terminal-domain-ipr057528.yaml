identifier: InterPro:IPR057528
label: "Protein-tyrosine-phosphatase MKP1, C-terminal domain"
definition: >-
  This domain represents the unique C-terminal extension found in plant Mitogen-activated protein kinase phosphatases (MPKs). The domain shows homology to members of the actin-binding gelsolin family, with highest similarity to villin. The domain is found across diverse plant species including Arabidopsis, maize, tomato and Medicago, suggesting it represents a plant-specific feature of MKPs. The function of this domain is currently unknown but may link stress response signalling to cytoskeleton dynamics. This domain is not found in MKPs from other organisms, making it a defining feature of the plant MPK family. MKP1 from Arabidopsis thaliana acts as a negative regulator of MPK6 and MPK3 signalling, modulates defence response by repressing salicylic acid (SA) production, camalexin biosynthesis and SNC1-mediated responses and acts as a negative regulator of MPK6-mediated pathogen-associated molecular pattern (PAMP) responses, including MPK6 and MPK3 activation, accumulation of extracellular reactive oxygen species and inhibition of seedling growth. It is also involved in UV-B stress tolerance.
