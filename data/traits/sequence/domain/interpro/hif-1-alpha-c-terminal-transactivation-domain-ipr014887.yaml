identifier: InterPro:IPR014887
label: "HIF-1 alpha, C-terminal transactivation domain"
definition: >-
  This entry corresponds to the C-terminal transactivation domain of HIF1A and similar sequences from vertebrates. Hypoxia inducible factor-1 alpha (HIF-1 alpha) plays a key role in cellular response to low oxygen tension, as well as in embryonic vascularisation, tumour angiogenesis and pathophysiology of ischaemic disease.
