identifier: InterPro:IPR058740
label: "MurL, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of MurL (UDP-N-acetyl-alpha-D-muramoyl-L-alanyl-L-glutamate epimerase. This N-terminal domain likely participates in ATP binding and substrate recognition. The paper describing MurL indicates that the enzyme has no putative conserved domains or cofactor binding domains currently identified, suggesting this group may have significant interest for bacterial cell wall biosynthesis. Members of this group are found in bacteria and some eukaryotic species. MurL is an ATP-dependent enzyme that catalyses the epimerisation of the terminal L-glutamate residue in UDP-MurNAc-L-Ala-L-Glu to D-glutamate, functioning in conjunction with MurD2-a non-canonical MurD ligase that incorporates L-Glu rather than D-Glu. This alternative pathway enables the incorporation of D-glutamate into peptidoglycan in bacteria that lack glutamate racemases or D-amino acid aminotransferases. The reaction catalysed by MurL requires Mg 2+ and results in the production of AMP, suggesting that substrate activation occurs via adenylation. Notably, the reaction is irreversible, as MurL cannot convert UDP-MurNAc-L-Ala-D-Glu back to the L-form. MurL is found in some Gammaproteobacteria, including Xanthomonas, Stenotrophomonas, and Lysobacter, as well as in certain rare actinobacteria such as Micromonospora and Salinispora.
