identifier: InterPro:IPR062471
label: "TP0260, third domain"
definition: >-
  This entry represents a domain of approximately 110 residues found in proteins from Spirochaetota. The domain is named after the Treponema pallidum TP0260 protein. These proteins typically contain two SH3 domains followed by this domain. The function of this domain remains to be determined.
