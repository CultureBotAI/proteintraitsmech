identifier: InterPro:IPR049427
label: "Acyl-ACP thioesterase-like, C-terminal domain"
definition: >-
  This entry represents a domain found in various acyl-acyl carrier protein (ACP) thioesterases (TE) and similar proteins. These proteins terminate fatty acyl group extension via hydrolysing an acyl group on a fatty acid. Members of this entry are usually composed of a pair of tandem HotDog domains. This entry represents the C-terminal one of the pair.
