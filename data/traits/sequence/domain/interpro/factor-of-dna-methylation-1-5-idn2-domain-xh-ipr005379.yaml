identifier: InterPro:IPR005379
label: "Factor of DNA methylation 1-5/IDN2 , domain XH"
definition: >-
  The XH (rice gene X Homology) domain is found in a family of plant proteins including Oryza sativa (Rice) and Arabidopsis FDM1-5/IDN2. These proteins usually contain an XS domain ( ) that is also found in the PTGS protein SGS3. As the XS and XH domains are fused in most of these proteins, these two domains may interact. The XH domain is between 124 and 145 residues in length and contains a conserved glutamate residue that may be functionally important. FDM1-5 and IDN2 are components of RNA-directed DNA methylation pathway (RdDM).
