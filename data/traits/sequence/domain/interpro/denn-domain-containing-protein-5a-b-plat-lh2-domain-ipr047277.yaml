identifier: InterPro:IPR047277
label: "DENN domain-containing protein 5A/B, PLAT/LH2 domain"
definition: >-
  This entry represents the PLAT/LH2 domain of DENN domain-containing proteins 5A/B (DEN5A/B) and similar animal proteins that belong to the RAB6 interacting protein 1 (Rab6IP1) family. PLAT/LH2 domains consist of an eight stranded β-barrel. In RabIP1, this domain may participate in lipid-mediated modulation of Rab6IP1's function via its generally proposed function of mediating interaction with lipids or membrane bound proteins. This entry includes DENN domain-containing proteins 5A/B (DEN5A/B) from humans and similar animal proteins that belong to the RAB6 interacting protein 1 (Rab6IP1) family. DEN5A/B are guanine nucleotide exchange factors (GEFs) which may activate RAB6A and RAB39A and/or RAB39B. They promote the exchange of GDP to GTP, converting inactive GDP-bound Rab proteins into their active GTP-bound form. DEN5A is involved in the negative regulation of neurite outgrowth.
