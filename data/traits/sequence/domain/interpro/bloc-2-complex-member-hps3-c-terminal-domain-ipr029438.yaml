identifier: InterPro:IPR029438
label: "BLOC-2 complex member HPS3, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of BLOC-2 complex member HPS3. In human HPS3, this region carries a number of tyrosine sorting motifs and the second of two di-leucine sorting boxes at residues 711-717, as well as the ER membrane-retention signal KKPL at residues 1000-1003. Hermansky-Pudlak syndrome caused by mutations in HPS3 gene is a genetically heterogeneous autosomal recessive disorder characterised by oculocutaneous albinism, bleeding due to platelet storage pool deficiency, and lysosomal storage defects.
