identifier: InterPro:IPR062413
label: "NOCA-1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of NOCA-1 (Non-centrosomal microtubule array protein 1). NOCA-1 plays a role in the assembly of microtubule arrays in the germline and is required for microtubule stability and anchorage by binding to microtubule minus ends. The protein is recruited to hemidesmosomes in early embryonic elongation to direct the nucleation and growth of non-centrosomal microtubules. The full-length protein contains an N-terminal disordered region and a central coiled-coil domain. The specific function of this C-terminal domain remains to be determined.
