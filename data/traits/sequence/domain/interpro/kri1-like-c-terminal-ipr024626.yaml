identifier: InterPro:IPR024626
label: "Kri1-like, C-terminal"
definition: >-
  The yeast member of the Kri1-like family (Kri1p) is found to be required for 40S ribosome biogenesis in the nucleolus. This entry represents the C-terminal domain of this protein family.
