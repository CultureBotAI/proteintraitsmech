identifier: InterPro:IPR032569
label: Nucleophosmin, C-terminal
definition: >-
  This domain, approximately 50 residues in length, is mainly found in C-terminal region of nucleophosmin from animals. Nucleophosmin (also known as NPM1/B23) is a multifunctional protein that is involved in a number of cellular activities, such as ribosome maturatation and export, centrosome duplication, and response to stress stimuli. Although it shuttles rapidly between the nucleus and the cytoplasm, a large fraction of NPM1/B23 resides in the nucleoli. Mutations of the NPM1 gene has been linked to acute myeloid leukemia.
