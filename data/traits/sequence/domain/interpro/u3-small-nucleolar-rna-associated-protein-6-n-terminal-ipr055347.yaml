identifier: InterPro:IPR055347
label: "U3 small nucleolar RNA-associated protein 6, N-terminal"
definition: >-
  This entry represents the N-terminal segment of UTP6 proteins. This region contains repeats related to TPR superfamily repeats . Utp6 is a component of the small subunit (SSU) processome containing the U3 snoRNA that is involved in processing of pre-18S rRNA.
