identifier: InterPro:IPR058848
label: "Endo-acting ulvan lyase, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of ulvan lyase. Endo-acting ulvan lyases are enzymes that play a crucial role in the degradation of ulvan, a major polysaccharide component of the cell walls of green seaweeds belonging to the Ulvales order. These enzymes specifically catalyse the endolytic cleavage of the glycosidic bond between 3-sulfated rhamnose (Rha3S) and uronic acids such as D-glucuronic acid (GlcA) or L-iduronic acid (IduA). This reaction results in the formation of oligosaccharides with unsaturated 4-deoxy-L-threo-hex-4-enopyranosiduronic acid (deltaUA) at the non-reducing end. The enzymatic activity ultimately breaks down the ulvan polysaccharide into smaller disaccharides and tetrasaccharides, facilitating further degradation and utilisation of the polysaccharide components.
