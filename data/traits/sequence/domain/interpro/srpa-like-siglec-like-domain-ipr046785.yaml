identifier: InterPro:IPR046785
label: "SrpA-like, SigLec-like domain"
definition: >-
  This entry represents a domain found at the N-terminal end of platelet-binding glycoprotein from Streptococcus sanguinis (SrpA), Streptococcal hemagglutinin from Streptococcus gordonii (Hsa) and other proteins from Firmicutes and Actinobacteria. These proteins are involved in hemagglutination and adherence to ghst glycoproteins. This entry includes a Thr-Arg motif conserved across homologous carbohydrate-binding adhesins that may orient the sialic acid moiety of carbohydrate ligands.
