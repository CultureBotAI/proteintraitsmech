identifier: InterPro:IPR057667
label: "Sleeping Beauty transposase, HTH domain"
definition: >-
  This entry represents the helix-turn-helix (HTH) domain, also known as PAI subdomain, found in Sleeping Beauty transposase and homologues. This domain improves the enzyme structural stability and transposon DNA-binding.
