identifier: InterPro:IPR029388
label: "Domain of unknown function DUF4650"
definition: >-
  This domain lies to the C terminus of the ubiquitin-specific peptidase-like proteins from veterbrates. Many peptidases require exosites (a secondary binding site that is remote from the active site) to recognise physiological substrates. This domain might be acting as the exosite for the peptidase.
