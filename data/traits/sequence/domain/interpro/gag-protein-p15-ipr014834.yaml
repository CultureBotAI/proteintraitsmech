identifier: InterPro:IPR014834
label: "Gag protein p15"
definition: >-
  This entry represents Gag p15, a viral membrane-binding matrix protein that is α-helical in structure. As part of the Gag polyprotein, p15 forms the outer shell of the core of the virus, lining the inner surface of the viral membrane. The Gag polyprotein also encodes additional structural proteins, including capsid protein p26, which forms the conical core of the virus that encapsulates the genomic RNA-nucleocapsid complex, nucleocapsid protein p11, which encapsulates and protects the viral dimeric unspliced genomic RNA through its zinc fingers, and p9, which plays a role in budding of the assembled particle by interacting with PDCD6IP/AIP1.
