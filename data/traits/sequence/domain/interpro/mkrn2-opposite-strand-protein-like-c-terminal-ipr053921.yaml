identifier: InterPro:IPR053921
label: "MKRN2 opposite strand protein-like, C-terminal"
definition: >-
  This domain is functionally uncharacterised and is found in animals, including the functionally uncharacterised human MKRN2 opposite strand protein (MKRN2OS). There is a single completely conserved residue C that may be functionally important. This domain is predicted to be structurally similar to peptidase C97 domain ( ).
