identifier: InterPro:IPR054101
label: "TMEM87A/B, GOLD domain"
definition: >-
  This entry represents the GOLD (Golgi-dynamics) domain of TMEM87A and TMEM87B. Members of this entry are evolutionary related to GPR107 and GPR108. Together with GPR180, TMEM145, TMEM181 and WLS, they have been described as GOST proteins (for GOLD domain seven-transmembrane helix proteins) given they share the same domain architecture consisting of a GOLD domain atop of a membrane-spanning seven-transmembrane helix domain. TMEM87s localise to the Golgi and have suggested roles in protein trafficking to and from the Golgi. TMEM87 has been proposed to act as mechanosensitive ion channels, however, structural and functional analysis suggest that they do not act as ion channels or G-protein coupled receptors.
