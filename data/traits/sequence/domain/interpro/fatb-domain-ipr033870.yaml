identifier: InterPro:IPR033870
label: FatB domain
definition: >-
  Proteins with this domain are periplasmic binding proteins involved in siderophore-mediated iron uptake in some eubacterial species, such as FatB in Vibrio anguillarum and CeuE in Campylobacter coli. FatB is encoded in Vibrio anguillarum plasmid pJM1, which harbours the genes for the biosynthesis of the siderophore anguibactin and the ferric anguibactin transport proteins FatD, C, B and A. FatB is a periplasmic lipoprotein and may not be essential for ferric anguibactin transport as Vibrio anguillarum plasmid pJM1 seems to carry two ABC transporter systems participating in siderophore transport.
