identifier: InterPro:IPR060589
label: "Sialate O-acetylesterase, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of sialate O- acetylesterase (SIAE) and similar animal proteins. SIAE catalyses the removal of O-acetyl ester groups from position 9 of sialic acids, playing a role in the regulation of acetylated sialoglycoconjugates. The enzyme functions as a disulphide-linked heterodimer consisting of a small N-terminal subunit and a large C-terminal subunit derived from a single precursor by proteolytic cleavage. It shows catalytic activity in sialic acid metabolism. The protein occurs in different isoforms with lysosomal and cytosolic localisations that have distinct tissue expression patterns. The specific function of this domain is unknown.
