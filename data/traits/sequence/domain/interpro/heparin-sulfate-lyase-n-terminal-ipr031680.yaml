identifier: InterPro:IPR031680
label: "Heparin-sulfate lyase, N-terminal"
definition: >-
  This is the N-terminal domain of heparin-sulfate lyase. It is a toroid-like domain. Heparin-sulfate lyase specifically cleaves heparan sulfate-rich regions of acidic polysaccharides.
