identifier: InterPro:IPR048842
label: "Endo-alpha-N-acetylgalactosaminidase-like, helical bundle domain"
definition: >-
  This domain is found in endo-alpha-N-acetylgalactosaminidase from Bifidobacterium longum subsp. longum and similar bacterial proteins. This protein belongs to the Glycoside Hydrolase Family 101 ( ) and is related to endo-alpha-N-acetylgalactosaminidase from Streptococcus pneumoniae, a virulence factor. It hydrolyses the T-antigen disaccharide from extracellular host glycoproteins to aid colonisation. This entry represents the helical bundle domain, which consists of three α-helices ( )
