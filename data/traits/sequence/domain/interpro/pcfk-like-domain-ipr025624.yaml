identifier: InterPro:IPR025624
label: "PcfK-like domain"
definition: >-
  This is a conserved domain found in uncharcaterised proteins, including the Enterococcus faecalis PcfK , which is functionally uncharacterised. There are two completely conserved residues (D and L) that may be functionally important.
