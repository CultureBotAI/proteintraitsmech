identifier: InterPro:IPR056503
label: "Dystrophin-1-like, spectrin repeat domain"
definition: >-
  This domain is found in Dystrophin-1 from Caenorhabditis elegans (Dys-1) and similar worm sequences. Dys-1 plays a role in cholinergic transmission and as a functional partner of dystrobrevin (Dyb-1), necessary for muscle maintenance. It is required for neuronal positioning.
