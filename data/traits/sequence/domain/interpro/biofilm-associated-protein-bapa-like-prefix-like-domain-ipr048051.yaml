identifier: InterPro:IPR048051
label: "Biofilm-associated protein BapA-like, prefix-like domain"
definition: >-
  This entry represents the N-terminal domain of two largely unrelated repetitive proteins, both named Biofilm-associated protein BapA (from Salmonella enterica and from Paracoccus denitrificans), which share homology domains at the two ends. Both lack a typical signal peptide for translocation by Sec, and instead depend on type I secretion for export and for contribution to biofilm formation. The conserved prefix (N-terminal) domain is shared by a number of other large, repetitive proteins of proteobacteria thought to be associated with adhesion or biofilm formation.
