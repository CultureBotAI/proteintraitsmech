identifier: InterPro:IPR020992
label: "Tail specific protease, C-terminal"
definition: >-
  This entry represents the C-terminal domain of tail-specific protease Prc, involved in the cleavage of a C-terminal peptide of 11 residues from the precursor form of penicillin-binding protein 3 (PBP3). This protease belongs to MEROPS serine peptidase family S41A (C-terminal processing peptidase-1, clan SK). This domain is typically between 88 to 187 amino acids in length.
