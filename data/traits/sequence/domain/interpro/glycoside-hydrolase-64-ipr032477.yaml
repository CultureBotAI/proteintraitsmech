identifier: InterPro:IPR032477
label: "Glycoside hydrolase 64"
definition: >-
  This entry represents the glycoside hydrolase family 64 (GH64) domain, whose members are laminaripentaose-producing 'inverting' beta-1,3-glucanases. These enzymes cleave the beta-1,3-bonds found in a variety of beta-1,3-glucans such as laminarin or pachyman. 'Inverting' enzymes utilize a single-displacement reaction where an activated water molecule performs a nucleophilic attack at the sugar C-1 while concomitant aglycone departure is achieved by protonation of the glycosidic oxygen. This domain is composed of a barrel subdomain comprising mainly β-strands and a mixed (α/β) subdomain comprising helices and β-strands. It takes the form of a crescent, with a wide-open groove present for ligand binding. This wide groove is located between the β-barrel subdomain and the mixed α/β subdomain and the ligand-binding cleft in it is lined by negatively charged residues. Two strictly conserved catalytic residues, a Glu and an Asp, lie one-third of the way down the groove and act as an acid catalyst and a base catalyst, respectively. This domain is found at the N-terminal of glucan endo-1,3-beta-glucosidase; in Streptomyces matensis laminaripentaose hydrolase (SmLPHase), which cleaves a long-chain polysaccharide, beta-1,3-glucan, including laminarin, into a specific pentasaccharide oligomer laminaripentaose; in beta-1,3-glucanase from Paenibacillus barengoltzii (PbBgl64A), a multi-domain protein which consists of an N-terminal CBM56 domain and a C-terminal GH64 domain and in Clostridium beijerinckii glucanallin, composed of a BetaGamma-crystallin domain, a GH64 domain, and a CBM56 domain.
