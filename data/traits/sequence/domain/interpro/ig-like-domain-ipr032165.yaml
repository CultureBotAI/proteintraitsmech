identifier: InterPro:IPR032165
label: "Ig-like domain"
definition: >-
  This domain of around 100 residues is found mainly at the C terminus of some uncharacterised proteins in various Bacteroides and Parabacteroides species and other bacterial proteins. The function of this domain remains unknown. It has an Ig like fold.
