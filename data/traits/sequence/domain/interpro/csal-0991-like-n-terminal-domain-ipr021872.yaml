identifier: InterPro:IPR021872
label: "Csal_0991-like, N-terminal domain"
definition: >-
  This entry represents a domain found at the N-terminal end of the probable membrane-anchored ferredoxin csal_0991 from Chromohalobacter salexigensis and similar sequences from proteobacteria. Csal_0991 participates in the electron transfer process during N,N-dimethylglycine (DMG) degradation to sarcosine. This domain was previously known as DUF3483. It is often found associated with and .
