identifier: InterPro:IPR020481
label: "Intracellular proteinase inhibitor BsuPI"
definition: >-
  This is a bacterial domain which has been named BsuPI in Bacillus subtilis. This domain is found in , where it has been suggested to regulate the major intracellular proteinase (ISP-1) activity in vivo. The structure of proteins in this family adopt a β barrel topology.
