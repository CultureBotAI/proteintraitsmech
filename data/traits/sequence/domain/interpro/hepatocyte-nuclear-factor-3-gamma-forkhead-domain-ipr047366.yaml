identifier: InterPro:IPR047366
label: "Hepatocyte nuclear factor 3-gamma, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXA3 and similar sequences from vertebrates. The FH domain is a winged helix DNA-binding domain. Hepatocyte nuclear factor 3-gamma (FOXA3) acts as an essential transcriptional regulator engaged in adipogenesis and energy metabolism. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'.
