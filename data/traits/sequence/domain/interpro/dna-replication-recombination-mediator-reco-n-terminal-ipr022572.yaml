identifier: InterPro:IPR022572
label: "DNA replication/recombination mediator RecO, N-terminal"
definition: >-
  This entry represents the N-terminal domain of the bacterial recombination protein O (RecO). This domain of RecO adopts a typical OB-fold DNA-binding structure; it contains two three-stranded β sheets with strand B1 common between both sheets. The RecO OB-fold is unusual in that it interacts primarily with the DNA backbone and is capable of binding ss and dsDNA. It is found in association with .
