identifier: InterPro:IPR011761
label: ATP-grasp fold
definition: >-
  The ATP-grasp superfamily currently includes 17 groups of enzymes, catalysing ATP-dependent ligation of a carboxylate containing molecule to an amino or thiol group-containing molecule. They contribute predominantly to macromolecular synthesis. ATP-hydrolysis is used to activate a substrate. For example, DD-ligase transfers phosphate from ATP to D-alanine on the first step of catalysis. On the second step the resulting acylphosphate is attacked by a second D-alanine to produce a DD dipeptide following phosphate elimination. The ATP-grasp domain contains three conserved motifs, corresponding to the phosphate binding loop and the Mg(2+) binding site. The fold is characterised by two α-β subdomains that grasp the ATP molecule between them. Each subdomain provides a variable loop that forms part of the active site, with regions from other domains also contributing to the active site, even though these other domains are not conserved between the various ATP-grasp enzymes.
