identifier: InterPro:IPR048701
label: "CIP2A, N-terminal"
definition: >-
  Cancerous inhibitor of PP2A (CIP2A) functions via protein binding through interactions with many other proteins including MYC, polo like kinase (PLK1) and NIMA protein. It is an inhibitor of PP2A, a tumour suppressor. CIP2A binds to PP2A and inhibits its phosphatase functions resulting in tumourigenesis transformation of cells. This is the N-terminal HEAT repeats domain, which can be subdivided into tip, stem and C-dimerisation subdomains; the latter is responsible for CIP2A dimerisation.
