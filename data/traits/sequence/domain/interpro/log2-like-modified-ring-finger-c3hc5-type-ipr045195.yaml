identifier: InterPro:IPR045195
label: "LOG2-like, modified RING finger, C3HC5-type"
definition: >-
  This entry represent the C3HC5-type RING-HC finger found in the probable E3 ubiquitin-protein ligase LOG2 and LOG2-like Ubiquitin Ligases (LUL1-4) from Arabidopsis. LOG2 (also known as AtAIRP3) is a predicted E3 ubiquitin ligase that interact with GDU1 and is involved in the regulation of amino acid export from plant cells. It also functions in ABA-mediated drought stress responses. This domain is distinguished from typical C3HC4 RING-HC finger due to the existence of the additional cysteine residue in the middle portion of the RING finger domain.
