identifier: InterPro:IPR035522
label: "Sho1, SH3 domain"
definition: >-
  Sho1 is a yeast membrane protein that regulates adaptation to high salt conditions by activating the HOG (high-osmolarity glycerol) pathway. High salt concentrations lead to the localization to the membrane of the MAPKK Pbs2, which is then activated by the MAPKKK Ste11 and in turn, activates the MAPK Hog1. Pbs2 is localized to the membrane though the interaction of its PxxP motif with the SH3 domain of Sho1.
