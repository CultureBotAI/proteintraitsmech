identifier: InterPro:IPR063587
label: "Fra a 1-associated protein, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Fra a 1-associated protein (FaAP), found in plants. FaAP interacts with Fra a 1 allergen proteins, including FRAA1E, FRAA2 and FRAA3. Fra a 1 proteins are major allergens in strawberry. The protein is approximately 193 residues in length and contains an N-terminal disordered region (residues 1-27).
