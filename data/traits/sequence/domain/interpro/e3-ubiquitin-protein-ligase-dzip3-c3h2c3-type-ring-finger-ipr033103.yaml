identifier: InterPro:IPR033103
label: E3 ubiquitin-protein ligase DZIP3, C3H2C3-type RING finger
definition: >-
  DZIP3 is a RNA-binding ubiquitin-protein ligase that targets H2AK119 (lysine 119 of histone H2A). It interacts with CARM1 (coactivator-associated arginine methyltransferase 1) through its RING domain and may act as a coactivator of ERalpha target gene expression . This entry represents the C-terminal C3H2C3-type RING-H2 finger of DZIP3.
