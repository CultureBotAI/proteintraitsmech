identifier: InterPro:IPR047342
label: "AP-4 complex accessory subunit RUSC2, RUN domain"
definition: >-
  This entry represents the RUN domain of RUSC2 and similar proteins from vertebrates. AP-4 complex accessory subunit RUSC2, also called RUN and SH3 domain-containing protein 2, is a novel interacting molecule for the active GTP-bound conformation of Rab1. It may function as a link between the targeting of endoplasmic reticulum derived vesicles, triggered by the Rab1 GTPase and a signalling pathway regulated by molecules containing SH3 and/or poly-proline regions.
