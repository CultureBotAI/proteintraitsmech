identifier: InterPro:IPR049407
label: "Ubiquitin carboxyl-terminal hydrolase 38-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of Ubiquitin carboxyl-terminal hydrolase 38 from humans (Usp38) and similar proteins predominantly found in vertebrates. Usp38 is a deubiquitinating enzyme that plays a role in various cellular processes, including DNA repair, cell cycle regulation, and immune response. This domain forms ARM repeats. It is often associated to .
