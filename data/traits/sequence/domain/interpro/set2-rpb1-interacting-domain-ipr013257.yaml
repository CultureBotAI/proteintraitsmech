identifier: InterPro:IPR013257
label: Set2 Rpb1 interacting domain
definition: >-
  The SRI (Set2 Rpb1 interacting) domain mediates RNA polymerase II interaction and couples histone H3K36 methylation with transcript elongation. This domain is conserved from yeast to humans. Members of this family form a compact, closed three-helix bundle, with an up-down-up topology. The first and second helices are antiparallel to each other and are of similar length; the third helix, which is packed across helices α1 and α2 is slightly shorter, consisting of only 15 amino acids. Most conserved hydrophobic residues are largely buried in the interior of the structure and form an extensive and contiguous hydrophobic core that stabilises the packing of the three-helix bundle. This domain mediates RNA polymerase II interaction and couples histone H3K36 methylation with transcript elongation. This domain is also found in ATP-dependent DNA helicase Q5 (RECQ5), which enables REQ5 tointeract with Pol II.
