identifier: InterPro:IPR055088
label: "Fibulin, C-terminal Ig-like domain"
definition: >-
  This entry represents a C-terminal Ig-like domain found in fibulin proteins mainly from vertebrates. This Ig-like domain seems most closely related to the cadherin domain . Fibulins are a family of extracellular matrix glycoproteins characterised by a fibulin-type C-terminal domain preceded by tandem calcium-binding epidermal growth factor (EGF)-like modules. They are involved in protein-protein interaction with the components of basement membrane and extracellular matrix proteins.
