identifier: InterPro:IPR024733
label: "Alpha-N-acetylglucosaminidase, tim-barrel domain"
definition: >-
  Alpha-N-acetylglucosaminidase is a lysosomal enzyme that is required for the stepwise degradation of heparan sulphate. Mutations on the alpha-N-acetylglucosaminidase gene can lead to mucopolysaccharidosis type IIIB (MPS IIIB; or Sanfilippo syndrome type B), characterised by neurological dysfunction but relatively mild somatic manifestations. Alpha-N-acetylglucosaminidase is composed of three domains. This entry represents the central domain, which has a tim barrel fold.
