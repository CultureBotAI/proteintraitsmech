identifier: InterPro:IPR057992
label: "E3 ubiquitin-protein ligase synoviolin-like, TPR repeats"
definition: >-
  This region of tetratricopeptide (TPR)-like repeats is found at the N-terminal end of human E3 ubiquitin-protein ligase synoviolin (SYVN1), ERAD-associated E3 ubiquitin-protein ligase HRD1 from Saccharomyces cerevisiae, and E3 ubiquitin-protein ligase AMFR, and similar proteins mainly found in animals. SYVN1 accepts ubiquitin specifically from endoplasmic reticulum-associated UBC7 E2 ligase and transfers it to substrates, promoting their degradation. It is a component of the endoplasmic reticulum quality control system. AMFR mediates the polyubiquitination of lysine and cysteine residues on target proteins, such as CD3D, CYP3A4, CFTR, INSIG1, SOAT2/ACAT2 and APOB for proteasomal degradation.
