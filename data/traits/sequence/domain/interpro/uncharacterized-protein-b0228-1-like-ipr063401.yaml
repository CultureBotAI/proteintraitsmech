identifier: InterPro:IPR063401
label: "Uncharacterized protein B0228.1-like"
definition: >-
  This entry represents uncharacterised protein B0228.1 from Caenorhabditis elegans and related proteins found in nematodes. In C. elegans, protein B0228.1 is expressed in larval stages according to Bgee database. The function of these proteins remains to be determined.
