identifier: InterPro:IPR054007
label: "MCM3 winged helix domain"
definition: >-
  This entry represents the C-terminal winged helix domain found in yeast DNA replication licensing factor MCM3. This protein acts as a component of the MCM2-7 complex (MCM complex) which is the putative replicative helicase essential for 'once per cell cycle' DNA replication initiation and elongation in eukaryotic cells.
