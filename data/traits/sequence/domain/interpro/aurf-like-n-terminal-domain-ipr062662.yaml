identifier: InterPro:IPR062662
label: "AurF-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of AurF-like transcription factors. AurF is a transcription factor that regulates the expression of gene clusters mediating the biosynthesis of aurovertins, fungal polyketides that exhibit potent inhibition of adenosine triphosphate synthase. AurF belongs to the POU transcription factor family, class-3 subfamily. These transcription factors are found in fungi, particularly in Ascomycota, and are involved in regulating secondary metabolite biosynthesis pathways. The specific function of this N-terminal domain remains to be determined.
