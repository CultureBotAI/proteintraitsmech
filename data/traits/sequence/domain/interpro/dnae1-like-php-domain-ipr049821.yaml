identifier: InterPro:IPR049821
label: "DnaE1-like, PHP domain"
definition: >-
  DNA polymerase III alpha subunits (PolIIIAs) that contain an N-terminal PHP domain have been classified into four basic groups based on genome composition, phylogenetic, and domain structural analysis: polC, dnaE1, dnaE2, and dnaE3. The PHP (also called histidinol phosphatase-2/HIS2) domain is associated with several types of DNA polymerases, such as PolIIIA and family X DNA polymerases, standalone histidinol phosphate phosphatases (HisPPases), and a number of uncharacterised protein families. DNA polymerase III holoenzyme is one of the five eubacterial DNA polymerases that are responsible for the replication of the DNA duplex. PolIIIA core enzyme catalyses the reaction for polymerising both DNA strands. DnaE1 is the longest compared to DnaE2 and DnaE3. A unique motif was also identified in dnaE1 and dnaE3 genes. This entry represents the PHP domain of DnaE1 type of the DNA polymerase III alpha subunit.
