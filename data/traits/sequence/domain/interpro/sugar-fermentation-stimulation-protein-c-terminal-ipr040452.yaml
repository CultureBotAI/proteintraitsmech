identifier: InterPro:IPR040452
label: "Sugar fermentation stimulation protein, C-terminal"
definition: >-
  Sugar fermentation stimulation protein is probably a regulatory factor involved in maltose metabolism. SfsA has been shown to bind DNA and it contains a helix-turn-helix motif that probably binds DNA at its C terminus.
