identifier: InterPro:IPR056871
label: "E3 ubiquitin-protein ligase TTC3, winged helix turn helix domain"
definition: >-
  This domain is found in human E3 ubiquitin-protein ligase TTC3, which catalyses the formation of 'Lys-48'-polyubiquitin chains and regulates Akt signalling, TGFB1-induced epithelial-mesenchymal transition and myofibroblast differentiation, neuronal differentiation and cell proliferation. This domain is predicted to adopt a winged helix-turn-helix (wHTH) fold.
