identifier: InterPro:IPR035583
label: "Tyrosine-protein kinase ITK, SH3 domain"
definition: >-
  ITK (also known as Tsk or Emt) is a member of the Tec family, which is a group of nonreceptor tyrosine kinases containing Src homology protein interaction domains (SH3, SH2) N-terminal to the catalytic tyr kinase domain. It also contains an N-terminal pleckstrin homology (PH) domain, which binds the products of PI3K and allows membrane recruitment and activation, and the Tec homology (TH) domain, which contains proline-rich and zinc-binding regions. This entry represents the SH3 domain of ITK.
