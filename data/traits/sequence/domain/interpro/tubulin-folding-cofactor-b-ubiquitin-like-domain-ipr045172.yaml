identifier: InterPro:IPR045172
label: Tubulin-folding cofactor B, ubiquitin-like domain
definition: >-
  Tubulin-folding cofactor B (TBCB) is one of the protein cofactors A through E that is required for the folding of tubulins prior to their incorporation into microtubules and heterodimer assembly. These cofactors are involved in the biogenesis and degradation of alpha and beta tubulins to maintain concentrated soluble pools, required for cell homeostasis. TBCB comprises an N-terminal ubiquitin-like (Ubl) domain and a C-terminal cytoskeleton-associated protein with glycine-rich segment (CAP-Gly) domain. The Ubl domain of TBCB is essential for proper folding and assembly of tubulin alpha. It has a β-grasp Ubl fold, a common structure involved in protein-protein interactions. Ubiquitin (Ub) is a protein modifier in eukaryotes that is involved in various cellular processes, including transcriptional regulation, cell cycle control, and DNA repair. TBC-A through E are necessary for the biogenesis of microtubules and for cell viability.
