identifier: InterPro:IPR013253
label: "Spc7 kinetochore protein domain"
definition: >-
  This domain is found in cell division proteins which are required for kinetochore-spindle association. Proteins containing this domain include budding yeast Spc105 and fission yeast Spc7. Spc7 is a component of the NMS (Ndc80-MIND-Spc7) super complex, which has a role in kinetochore function during late meiotic prophase and throughout the mitotic cell cycle. Spc105 and Kre28 forms a kinetochore complex, which is required for kinetochore binding by a discrete subset of kMAPs (BIM1, BIK1 and SLK19) and motors (CIN8, KAR3).
