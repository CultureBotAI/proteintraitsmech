identifier: InterPro:IPR056313
label: "Antitoxin Xre/MbcA/ParS-like, N-terminal"
definition: >-
  This entry represents the N-terminal domain of a group of bacterial sequences related to the antitoxin components of a type II toxin-antitoxin (TA) system Xre/MbcA/ParS. This domain may adopt an α-helical fold.
