identifier: InterPro:IPR062443
label: "NPP-16, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of NPP-16/NUP50 nuclear pore complex proteins. The domain is approximately 60-65 amino acids in length and is found in nucleoporin proteins involved in nuclear transport. NPP-16/NUP50 is a component of the nuclear pore complex that plays a direct role in nuclear protein import and is required for anoxia-induced prophase arrest. The protein interacts with importin beta and various RNA polymerase III components. The domain is found particularly in nematodes, and is distinct from the C-terminal RanBD1 domain. The specific function of this domain remains to be determined.
