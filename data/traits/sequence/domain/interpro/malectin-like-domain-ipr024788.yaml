identifier: InterPro:IPR024788
label: "Malectin-like domain"
definition: >-
  Malectin is a membrane-anchored protein of the endoplasmic reticulum that recognises and binds Glc2-N-glycan. The domain is found on a number of plant receptor kinases and is distantly related to malectin domains.
