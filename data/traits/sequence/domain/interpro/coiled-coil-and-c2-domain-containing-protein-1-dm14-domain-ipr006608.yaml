identifier: InterPro:IPR006608
label: "Coiled-coil and C2 domain-containing protein 1, DM14 domain"
definition: >-
  This is a short helical domain found in multiple copies in most members of this entry. In CC2D1A/B proteins is present four times. Its function is not yet known. This entry includes coiled-coil and C2 domain-containing protein 1A/B (CC2D1A/B, also known as Freud-1/2). CC2D1A is involved in many pathways, including nuclear factor kappaB, PDK1/Akt, cAMP/PKA, Notch and bone morphogenetic protein. It is a calcium-regulated repressor of serotonine receptor 5-HT1A and dopamine-D2 receptor expression. CC2D1B binds to the 5-HT1A DRE and represses the human 5-HT1A receptor gene to regulate its expression in non-serotonergic cells and neurons. CC2D1A and CC2D1B have also been shown to interact with the CHMP4 family of proteins, the major subunit of the ESCRT-III complex. They may regulate degradation and signaling of EGFR and TLR4. CC2D1A and CC2D1B share conserved domains, including several DM14 domains that are specific to this protein family, a C-terminal helix-loop-helix domain, and a C2 domain. The CC2D1A C2 domain is thought to be calcium insensitive and it lacks several acidic residues that mediate calcium binding of the PKC C2 domain. In addition, it contains a poly-basic insert that is not present in calcium-dependent C2 domains and may function as a nuclear localization signal. The CC2D1B C2 domain appears to be essential for its DNA binding and repressor function; it may mediate protein-protein interactions.
