identifier: InterPro:IPR023083
label: Glycerol-3-phosphate O-acyltransferase, alpha-helical bundle, N-terminal
definition: >-
  Stromal glycerol-3-phosphate acyltransferases (GPAT) are responsible for the selective incorporation of saturated and unsaturated fatty-acyl chains into chloroplast membranes, which is an important determinant of a plant's ability to tolerate chilling temperatures. This entry represents the N-terminal four α helical bundle found in these proteins.
