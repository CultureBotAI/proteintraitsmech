identifier: InterPro:IPR044068
label: "Core-binding domain"
definition: >-
  This entry represents the CB domain, which contains four major α-helices, arranged in an orthogonally crossed conformation. Tyrosine-type site-specific recombinases mediate a wide range of important genetic rearrangement reactions. They catalyse functionally diverse processes, including integration and excision of phages from their host chromosomes, conjugative transposition, partitioning of phage, bacterial and plasmid genomes during cell division, antigenic phase variation, dissemination of antibiotic- and antiseptic-resistance gene cassettes, and relaxation of DNA supercoils. Tyrosine recombinases have two or three domains, depending upon whether the system includes regulated integration and excision reactions. The C-terminal catalytic domain contains six active site amino acids, RK(H/K)R(H/W)Y, required for catalysis. The core-binding (CB) domain, which interacts primarily with the major groove on the attachment site and facilitates binding to the core DNA sequence, is widely conserved among viral, eubacterial and archaeal recombinases. It is also involved in protein-protein interactions. Some recombinases, like lambda Int and IntDOT, have an additional amino-terminal domain that recognises sites, called arm-type sites, that flank the crossover region and gives directionality to the recombination reaction.
