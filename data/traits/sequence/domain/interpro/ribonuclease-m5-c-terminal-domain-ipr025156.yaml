identifier: InterPro:IPR025156
label: "Ribonuclease M5, C-terminal domain"
definition: >-
  This domain lies at the C terminus of ribonuclease M5. The N-terminal domain of this enzyme is a Toprim domain. Ribonuclease M5 is required for correct processing of both the 5' and 3' ends of 5S rRNA precursor. It cleaves both sides of a double-stranded region yielding mature 5S rRNA in one step.
