identifier: InterPro:IPR032834
label: "Sensor histidine kinase NatK-like, C-terminal domain"
definition: >-
  This domain is found C-terminal in NatK from Bacillus subtilis and similar sensor histidine kinases. NatK is part of the two-component regulatory system NatK-NatR that regulates expression of the natAB operon encoding an ABC transporter for sodium ion extrusion.
