identifier: InterPro:IPR056287
label: "AIR9, PH-like domain"
definition: >-
  This is a PH-like domain found at the C-terminal of AIR9 from Arabidopsis thaliana and similar proteins from plants that often have 9/11 repetitions of . It may adopt a partly opened β-barrel topology that is capped by an α-helix. Interaction between AIR9 and POK1 is important for division plane orientation and plant growth in Arabidopsis thaliana.
