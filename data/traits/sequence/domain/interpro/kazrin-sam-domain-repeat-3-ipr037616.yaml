identifier: InterPro:IPR037616
label: "Kazrin, SAM domain repeat 3"
definition: >-
  The long isoform of kazrin contains three copies (repeats) of SAM domain. This entry represents the repeat 3. Kazrin is a periplakin-interacting protein associated with desmosomes and the keratinocyte plasma membrane. In Xenopus embryos, loss of kazrin causes defects in cell adhesion that affect axial elongation, notochord differentiation and epidermal morphogenesis. The kazrin protein has several isoforms. Kazrin A, B, C and D are associated with cell junctions and embryonic development, while kazrin E is shown to interact with microtubules and involved in epidermal differentiation and desmosome formation. Kazrin F is involved in cervical cancer tumorigenesis.
