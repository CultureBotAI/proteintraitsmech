identifier: InterPro:IPR061279
label: "Afadin, forkhead associated domain"
definition: >-
  This is the FHA domain of afardin. FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine. Afadin, also termed ALL1-fused gene from chromosome 6 protein (AF-6), is involved in many fundamental signalling cascades in cells. In addition, it is involved in oncogenesis and metastasis. AFDN belongs to the adhesion system, probably together with the E-cadherin-catenin system, that plays a role in the organisation of homotypic, interneuronal, and heterotypic cell-cell adherens junctions. Afadin has multiple domains: from the N terminus to the C terminus it has two Ras-associated (RA) domains, a forkhead-associated domain, a dilute domain, a PDZ domain, three proline-rich domains, and an F-actin binding domain. RA domain-containing proteins function by interacting with Ras proteins directly or indirectly and are involved in several different functions ranging from tumor suppression to being oncoproteins. Ras proteins are small GTPases that are involved in cellular signal transduction. The RA domain has a β-grasp ubiquitin-like (Ubl) fold with low sequence similarity to ubiquitin (Ub). Afadin is abundant at cadherin-based adherens junctions in epithelial cells, endothelial cells, and fibroblasts.
