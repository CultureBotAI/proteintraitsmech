identifier: InterPro:IPR008146
label: Glutamine synthetase, catalytic domain
definition: >-
  This entry represents the C-terminal catalytic domain of GS enzymes. Glutamine synthetase (GS) plays an essential role in the metabolism of nitrogen by catalysing the condensation of glutamate and ammonia to form glutamine. There seem to be three different classes of GS: Class I enzymes (GSI) are specific to prokaryotes, and are oligomers of 12 identical subunits. The activity of GSI-type enzyme is controlled by the adenylation of a tyrosine residue. The adenylated enzyme is inactive (see ). Class II enzymes (GSII) are found in eukaryotes and in bacteria belonging to the Rhizobiaceae, Frankiaceae, and Streptomycetaceae families (these bacteria have also a class-I GS). GSII are octamer of identical subunits. Plants have two or more isozymes of GSII, one of the isozymes is translocated into the chloroplast. Class III enzymes (GSIII) have been found in Bacteroides fragilis. in Butyrivibrio fibrisolvens. It is a hexamer of identical chains and in some protozoa. It is much larger (about 700 amino acids) than the GSI (450 to 470 amino acids) or GSII (350 to 420 amino acids) enzymes. While the three classes of GS's are clearly structurally related, the sequence similarities are not so extensive.
