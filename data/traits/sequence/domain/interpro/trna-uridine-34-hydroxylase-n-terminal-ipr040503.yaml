identifier: InterPro:IPR040503
label: "tRNA uridine(34) hydroxylase, N-terminal"
definition: >-
  This domain is found at the N terminus of tRNA uridine(34) hydroxylase TrhO from bacteria. TrhO (also known as YceA in E. coli) catalyzes oxygen-dependent 5-hydroxyuridine (ho5U) modification at position 34 in tRNAs, the first step in 5-carboxymethoxyuridine (cmo5U) biosynthesis. This domain can also be found in rhodanese-like domain-containing proteins from eukaryotes.
