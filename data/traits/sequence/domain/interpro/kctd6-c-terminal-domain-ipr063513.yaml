identifier: InterPro:IPR063513
label: "KCTD6, C-terminal domain"
definition: >-
  This domain is found C-terminal in the BTB/POZ domain-containing protein KCTD6. KCTD6 is a probable substrate-specific adapter of a BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex that mediates ubiquitination and subsequent proteasomal degradation of target proteins. KCTD6 promotes the ubiquitination of HDAC1 in a manner dependent on KCTD6:KCTD11 oligomerisation. It can function as an antagonist of the Hedgehog pathway by affecting the nuclear transfer of transcription factor GLI1, probably by down-regulating HDAC1 to keep GLI1 acetylated and inactive. KCTD6 inhibits cell growth and tumorigenicity in medulloblastoma. It is also involved in regulating protein levels of ANK1 isoform Mu17, probably through CUL3-dependent proteasomal degradation.
