identifier: InterPro:IPR022651
label: "S-layer protein, outer domain"
definition: >-
  This entry represents the outer domain of archaeal S-layer proteins. Members of this family are found in (for example) Pyrococcus horikoshii (split into two tandem reading frames), Methanocaldococcus jannaschii (Methanococcus jannaschii), and related species. Some local similarity can be found to other S-layer protein families. This domain has the central domain inserted.
