identifier: InterPro:IPR024011
label: "Natural product biosynthesis luciferase-like monooxygenase domain"
definition: >-
  This entry describes a type of bacterial luciferase-like monooxygenase (LLM) domain that regularly occurs within large non-ribosomal protein synthases/polyketide synthases, as well as smaller proteins. Luciferase-like monooxygenases include members that bind either FMN or F420. FMN is the more likely binding partner in the case of proteins containing this particular domain, since many are from species that lack F420 biosynthesis capability. This domain covers the whole length of the protein in many members of this group, including the monooxygenase MupA from Pseudomonas fluorescens and Siderophore biosynthesis protein from Agrobacterium fabrum.
