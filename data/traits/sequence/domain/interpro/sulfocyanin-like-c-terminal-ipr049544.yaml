identifier: InterPro:IPR049544
label: "Sulfocyanin-like, C-terminal"
definition: >-
  This entry reprsents the C-terminal domain in Sulfocyanin from Sulfolobus acidocaldarius (SoxE) and similar archaeal and bacterial proteins probably involved in electron transfer. Sulfocyanin is a blue copper protein with a putative membrane anchoring hydrophobic motif at the N terminus. It may substitute for cytochrome C in electron transfer reactions in archaea.
