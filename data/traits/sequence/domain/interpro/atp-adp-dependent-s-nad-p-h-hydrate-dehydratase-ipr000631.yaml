identifier: InterPro:IPR000631
label: ATP/ADP-dependent (S)-NAD(P)H-hydrate dehydratase
definition: >-
  Hydration of NAD(P)H to NAD(P)HX, which inhibits several dehydrogenases, is corrected by an ATP-dependent dehydratase and an epimerase. The ATP-dependent dehydratase has been identified as the product of the vertebrate Carkd (carbohydrate kinase domain) gene. Variants of this enzyme leads to deficient NADHX repair mitochondrial dysfunction in humans, associated with a lethal neurometabolic disorder in early childhood. In E. coli, it is found as the C-terminal domain of a bifunctional enzyme (YjeF) that also includes the epimerase and uses ADP instead of ATP. These enzymes are widespread in eukaryotes, prokaryotes, and archaea.
