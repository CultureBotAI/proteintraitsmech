identifier: InterPro:IPR054330
label: "Pch2-like, N-terminal domain"
definition: >-
  Pch2/TRIP13 belongs to a family of proteins known as AAA-ATPases and via an adaptor protein binds to the closed form of MAD2. Pch2/TRIP13 then unfolds a part of the MAD2 protein, converting MAD2 into the open form. The C.elegans ortholog Pch2 forms a stable hexamer and its structure consists of a N-terminal domain and a AAA-ATPase module composed of two subdomains. This entry represents the N-terminal domain that consists of a four-stranded β-sheet and an α-helix packed on it. The structure of this domain ( ) shows a clear relationship to the N-terminal substrate recognition domains of a AAA+ classic remodeller sub-family that includes NSF, p97, and PEX1.
