identifier: InterPro:IPR034403
label: "Srp1, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) found in Srp1 from Schizosaccharomyces pombe. It plays a role in the pre-mRNA splicing process, but not essential for growth. Srp1 is closely related to the SR protein family found in metazoa. It contains an N-terminal RNA recognition motif (RRM), a glycine hinge and a RS domain in the middle, and a C-terminal domain. Some family members also contain another RRM domain.
