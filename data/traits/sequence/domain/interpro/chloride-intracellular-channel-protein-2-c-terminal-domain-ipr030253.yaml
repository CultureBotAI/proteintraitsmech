identifier: InterPro:IPR030253
label: Chloride intracellular channel protein 2, C-terminal domain
definition: >-
  Chloride intracellular channel (CLIC) proteins are multifunctional and participate in a wide variety of signaling activities. CLIC proteins are able to convert from a water-soluble state to a membrane channel state. Chloride intracellular channel protein 2 (CLIC-2) is found in in most tissues except the brain, and is highly expressed in the lung, spleen, skeletal muscle and myocardium. It inhibits cardiac ryanodine receptor Ca2+ release channels. It contains an intramolecular disulfide bond and exists as a monomer regardless of redox conditions. This is the C-terminal helical domain.
