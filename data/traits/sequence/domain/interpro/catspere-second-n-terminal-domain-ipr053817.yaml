identifier: InterPro:IPR053817
label: "CATSPERE, second N-terminal domain"
definition: >-
  This entry includes CATSPERE, the auxiliary subunit epsilon of the CatSper complex, a complex involved in sperm cell hyperactivation. This process is needed for sperm motility, which is essential late in the preparation of sperm for fertilisation. This is a multi-domain protein which has a similar domain organisation as the other auxiliary subunits, beta, gamma and delta. The epsilon subunit has two N-terminal domains (NTD1/2); this entry represents the second one (NTD2).
