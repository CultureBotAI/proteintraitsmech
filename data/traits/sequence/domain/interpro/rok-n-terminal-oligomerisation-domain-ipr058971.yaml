identifier: InterPro:IPR058971
label: "Rok, N-terminal oligomerisation domain"
definition: >-
  This entry represents the N-terminal oligomerisation domain of the Rok (regulator of ComK) protein. The N-terminal domain is involved in protein dimerisation and contributes to the formation of DNA bridges, allowing Rok to compact DNA and silence genes. Rok is a nucleoid-associated protein that functions as a transcriptional repressor in Bacillus subtilis, binding preferentially to A+T-rich DNA sequences. Rok represses genes for cell surface and extracellular functions, including the competence transcription factor comK. The Rok protein is functionally analogous to H-NS nucleoid-associated proteins found in Gram-negative bacteria, helping to silence horizontally acquired genes that are typically A+T-rich. Rok protein contains an N-terminal oligomerisation domain represented by and a C-terminal winged-helix domain represented by .
