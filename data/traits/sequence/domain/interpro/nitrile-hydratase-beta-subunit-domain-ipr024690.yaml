identifier: InterPro:IPR024690
label: "Nitrile hydratase beta subunit domain"
definition: >-
  This entry represents the C-terminal domain of nitrile hydratase (NHase) beta subunit. Beta subunit consists of an N-terminal helical domain and a C-terminal SH3-like domain , ]. Thiocyanate hydrolase (SCNase) is a member of the NHase family, comprises alpha, beta and gamma subunits which share sequence similarities with NHase beta subunit C-terminal, beta subunit N-terminal and NHase alpha subunit, respectively. Nitrile hydratases are unusual metalloenzymes that catalyse the hydration of nitriles to their corresponding amides. They are used as biocatalysts in acrylamide production, one of the few commercial scale bioprocesses, as well as in environmental remediation for the removal of nitriles from waste streams. Nitrile hydratases are composed of two subunits, alpha and beta, and they contain one iron atom per alpha beta unit.
