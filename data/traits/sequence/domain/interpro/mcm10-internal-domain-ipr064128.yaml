label: "MCM10, internal domain"
definition: >-
  This entry represents the MCM10 internal domain (MCM10-ID). MCM10 is composed of three domains, the N-terminal (NTD), internal (ID), and C-terminal (CTD) domains, each containing distinct functional regions involved in DNA binding and/or protein-protein contacts. The structural integrity of ID and CTD is dependent on the presence of bound zinc. The ID is the most highly conserved region of MCM10 and mediates both protein-DNA and protein-protein interactions. The MCM10-ID is composed of an oligonucleotide/oligosaccharide binding (OB)-fold followed in tandem by a variant and highly basic CCCH-type zinc finger (ZnF1), which form a unified DNA binding platform capable of binding ss- and dsDNA. DNA spans both the hydrophobic β barrel of the OB-fold and the electrostatic, extended loop of the zinc finger. In addition to DNA binding motifs, the ID contains specific sites that contact Pol alpha, PCNA and MCM2-7. Association with Pol alpha occurs via a hydrophobic patch termed the heat shock protein 10 (Hsp10)-like motif, whereas PCNA binds to a noncanonical PCNA interacting peptide (PIP) box, QxxM/I/LxxF/YF/Y. Eukaryotic DNA replication is carried out by large multiprotein machines that coordinate DNA unwinding and synthesis at the replication fork. Minichromosome Maintenance protein 10 (MCM10) is exclusive to eukaryotes and is essential to both initiation and elongation phases of chromosomal DNA replication. MCM10 works as scaffold protein that can interact with many proteins, such as DNA polymerase alpha (pol alpha) and DNA primase, some subunits of Cdc45-Mcm2-7-GINS helicase (CMG) complex, and PCNA. In addition, MCM10 binds both single-stranded (ss) and double-stranded (ds) DNA. MCM10 does not have a preference for particular DNA sequences or topological structures, but its…
