identifier: InterPro:IPR035855
label: "STAT3, SH2 domain"
definition: >-
  STAT3 is a member of the STAT protein family. STAT3 mediates the expression of a variety of genes in response to cell stimuli, and plays a key role in many cellular processes such as cell growth and apoptosis. STAT3 has been shown to interact with Rho GTPases Three alternatively spliced transcript variants encoding distinct isoforms have been described. STAT3 activation is required for self-renewal of embryonic stem cells (ESCs) and is essential for the differentiation of the TH17 helper T cells. Mutations in the STAT3 gene result in hyperimmunoglobulin E syndrome and human cancers. STAT proteins have a dual function: signal transduction and activation of transcription. When cytokines are bound to cell surface receptors, the associated Janus kinases (JAKs) are activated, leading to tyrosine phosphorylation of the given STAT proteins. Phosphorylated STATs form dimers, translocate to the nucleus, and bind specific response elements to activate transcription of target genes. STAT proteins contain an N-terminal domain (NTD), a coiled-coil domain (CCD), a DNA-binding domain (DBD), an α-helical linker domain (LD), an SH2 domain, and a transactivation domain (TAD). The SH2 domain is necessary for receptor association and tyrosine phosphodimer formation. There are seven mammalian STAT family members which have been identified: STAT1, STAT2, STAT3, STAT4, STAT5 (STAT5A and STAT5B), and STAT6.
