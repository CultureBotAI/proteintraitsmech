identifier: InterPro:IPR006511
label: "Short internodes, C-terminal"
definition: >-
  These sequences contain a tightly conserved small domain found in Short internodes (SHI) and related plant proteins. SHI proteins also contain a well-conserved adjacent N-terminal putative zinc finger domain ( ). SHI may act as a negative regulator of GA responses through transcriptional control.
