identifier: InterPro:IPR048422
label: "NOA1/YqeH-like, C-terminal domain"
definition: >-
  This entry is found at the C terminus of Nitric oxide-associated protein 1 (NOA1) from animals and rice, BPG2 from Arabidopsis and YqeH from B. subtilis. YqeH is an orthologue of NOA1. This domain folds into a β-sandwich structure with significant similarity to proteins members of the RsmA/CsrA translational regulators family that bind to RNA ( ). The residues for RNA recognition in these proteins are conserved in members of this entry, suggesting that these may be involved in nucleic acid recognition.
