identifier: InterPro:IPR060562
label: "SERAC1, N-terminal"
definition: >-
  This entry represents a domain found towards the N-terminal end of SERAC1 (Serine active site-containing protein 1) and related proteins. This domain forms a small α-helical bundle. SERAC1 is found in eukaryotes and facilitates serine transport from cytosol to mitochondria by stabilising sideroflexin-1. The full-length protein plays important roles in phosphatidylglycerol remodelling and mitochondrial DNA maintenance. SERAC1 localises to the endoplasmic reticulum and endoplasmic reticulum-mitochondria interface.
