identifier: InterPro:IPR035734
label: "VAV3 protein, second SH3 domain"
definition: >-
  VAV3 is ubiquitously expressed and functions as a phosphorylation-dependent guanine nucleotide exchange factor (GEF) for RhoA, RhoG, and Rac1. It has been implicated to function in the hematopoietic, bone, cerebellar, and cardiovascular systems. VAV3 is essential in axon guidance in neurons that control blood pressure and respiration. It is overexpressed in prostate cancer cells and it plays a role in regulating androgen receptor transcriptional activity. VAV proteins contain several domains that enable their function: N-terminal calponin homology (CH), acidic, RhoGEF (also called Dbl-homologous or DH), Pleckstrin Homology (PH), C1 (zinc finger), SH2, and two SH3 domains.
