identifier: InterPro:IPR056299
label: "CFAP61, dimerisation domain"
definition: >-
  This entry represents a domain found at the C-terminal of the FAD reductase domain of cilia and flagella associated protein 61 (CFAP61), which may be involved in dimerisation. CFAP61 is located at the midpiece of the sperm, where it apparently functions in flagellum formation.
