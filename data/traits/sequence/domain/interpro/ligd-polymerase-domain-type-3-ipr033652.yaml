identifier: InterPro:IPR033652
label: "LigD polymerase domain, type 3"
definition: >-
  This entry represents a subgroup of polymerase (Pol) domains of bacterial LigD proteins. The LigD Pol domain belongs to the archaeal/eukaryal primase (AEP) superfamily. In prokaryotes, LigD along with Ku is required for non-homologous end joining (NHEJ)-mediated repair of DNA double-strand breaks (DSB). NHEJ-mediated DNA DSB repair is error-prone. It has been suggested that LigD Pol contributes to NHEJ-mediated repair DSB repair in vivo, by filling in short 5'-overhangs with ribonucleotides; the filled in termini would then be sealed by the associated LigD ligase domain, resulting in short stretches of RNA incorporated into the genomic DNA. The Pol domains of Pseudomonas aeruginosa (PaeLigD; ) and Mycobacterium tuberculosis (MtLigD; ) are stimulated by manganese, are error-prone, and prefer adding rNTPs to dNTPs in vitro. However, this subgroup of domains is distinct from PaeLigD and MtLigD, and awaits functional characterization.
