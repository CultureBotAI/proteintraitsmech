identifier: InterPro:IPR054356
label: "Peptidoglycan muramidase Tse3, N-terminal domain"
definition: >-
  This entry represents the catalytic domain found in Peptidoglycan muramidase Tse3. Tse3 is a toxin secreted by the H1 type VI (H1-T6SS) secretion system into the periplasm of recipient cells. This protein degrades peptidoglycan via muramidase activity. Tse3 is composed of a small N-terminal domain, which contains seven α-helices packed in a rod-like helical repeat motif, and a C-terminal catalytic domain ( ).
