identifier: InterPro:IPR057335
label: "Selenocysteine-specific elongation factor, beta-barrel domain"
definition: >-
  This domain is found in Selenocysteine-specific elongation factor from Escherichia coli (SelB) and similar bacterial proteins. SelB is a translation factor necessary for the incorporation of selenocysteine into proteins. It probably replaces EF-Tu for the insertion of selenocysteine directed by the UGA codon.
