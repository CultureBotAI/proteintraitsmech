identifier: InterPro:IPR025114
label: Beta-carotene isomerase D27-like, C-terminal
definition: >-
  Beta-carotene isomerase D27 (also known as Protein DWARF-27) from plants is involved in strigolactones biosynthesis. It is a beta-carotene isomerase that converts all-trans-beta-carotene into 9-cis-beta-carotene, which is cleaved by CCD7 into a 9-cis-configured aldehyde. This is an iron-containing protein that localises in chloroplasts and is expressed mainly in vascular cells of shoots and roots. This entry also includes some uncharacterised proteins from bacteria. This entry represents the C-terminal domain of Beta-carotene isomerase D27 that may contain an iron binding domain.
