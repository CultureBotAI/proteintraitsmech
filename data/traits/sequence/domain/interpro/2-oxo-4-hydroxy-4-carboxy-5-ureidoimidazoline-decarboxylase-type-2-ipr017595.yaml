identifier: InterPro:IPR017595
label: "2-oxo-4-hydroxy-4-carboxy-5-ureidoimidazoline decarboxylase, type 2"
definition: >-
  Previously thought to only proceed spontaneously, the decarboxylation of 2-oxo-4-hydroxy-4-carboxy-5-ureidoimidazoline (OHCU) has been recently been shown to be catalysed by this protein in Mus musculus (Mouse). Homologues of this protein are found adjacent to and fused with uricase in a number of prokaryotes, represented by this entry. This entry is a separate (but related) from that represented by .
