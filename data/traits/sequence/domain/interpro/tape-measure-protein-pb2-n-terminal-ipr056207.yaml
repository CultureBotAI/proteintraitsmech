identifier: InterPro:IPR056207
label: "Tape measure protein PB2, N-terminal"
definition: >-
  This entry represents the N-terminal conserved region of the Tape measure protein PB2 and related proteins found mainly in T5-like phages. PB2 functions as a tape measure protein that serves as a base for tail tube protein polymerisation and acts as a template for tail length determination. This protein fills the tail tube with its long coiled-coil domain and is expelled during the conformation changes that follow T5 binding to host FhuA receptor. The tape measure protein N-terminal region is organised within the tail tube in a three-stranded parallel α-helical coiled coil which makes direct contact with the genomic DNA.
