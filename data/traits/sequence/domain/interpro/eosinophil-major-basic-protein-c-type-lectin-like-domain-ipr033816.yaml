identifier: InterPro:IPR033816
label: "Eosinophil major basic protein, C-type lectin-like domain"
definition: >-
  This is a C-type lectin-like domain (CTLD) of the type found in the human proteins eosinophil major basic protein (EMBP) and prepro major basic protein homologue (MBPH). CTLD refers to a domain homologous to the carbohydrate-recognition domains (CRDs) of the C-type lectins. Eosinophils and basophils carry out various functions in allergic, parasitic, and inflammatory diseases. EMBP is stored in eosinophil crystalloid granules and is released upon degranulation. EMBP is also expressed in basophils. The proform of EMBP is expressed in placental X cells and breast tissue and increases significantly during human pregnancy. The proform inhibits the metallopeptidase pregnancy-associated plasma protein A and is considered to be a peptidase inhibitor (MEROPS identifier I63.001). EMBP has cytotoxic properties and damages bacteria and mammalian cells, in vitro, as well as, helminth parasites. EMBP deposition has been observed in the inflamed tissue of allergy patients in a variety of diseases including asthma, atopic dermatitis, and rhinitis. In addition to its cytotoxic functions, EMBP activates cells and stimulates cytokine production. EMBP has been shown to bind the proteoglycan heparin. The binding site is similar to the carbohydrate binding site of other classical CTLD, such as mannose-binding protein (MBP1), however, heparin binding to EMBP is calcium ion independent. MBPH has reduced potency in cytotoxic and cytostimulatory assays compared with EMBP.
