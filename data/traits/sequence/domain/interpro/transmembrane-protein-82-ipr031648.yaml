identifier: InterPro:IPR031648
label: "Transmembrane protein 82"
definition: >-
  This entry represents a domain covering the whole length of Transmembrane protein 82 (TMEM82) which is predicted to contain transmembrane helices. This domain can also cover transmembrane regions in uncharacterised proteins from metazoa.
