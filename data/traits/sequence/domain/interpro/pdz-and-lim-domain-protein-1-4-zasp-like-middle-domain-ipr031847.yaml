identifier: InterPro:IPR031847
label: "PDZ and LIM domain protein 1-4/Zasp-like, middle domain"
definition: >-
  This presumed domain is found in eukaryotes, and is typically between 121 and 170 amino acids in length, but is functionally uncharacterised. It is found in the middle region of Zasp-like proteins, including Zasp from Drosophila and its orthologue from human ZASP/LIM domain-binding protein 3, and it is usually found in association with (PDZ) and (LIM), and often contains the Zasp-like motif. Zasp is a regulator of cell matrix adhesion having two related functions, one upstream of Actn organizing the Z line and the other downstream of integrins regulating assembly of integrin adhesion sites. It is also required for the formation of myotendinous junctions in muscles.
