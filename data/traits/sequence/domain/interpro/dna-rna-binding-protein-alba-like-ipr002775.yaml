identifier: InterPro:IPR002775
label: DNA/RNA-binding protein Alba-like
definition: >-
  Members of this group include the archaeal protein Alba, eukaryotic RPP25L, Ribonucleases P/MRP protein subunit POP6 and Rpp25. The Alba domain is closely related to the RNA-binding versions of the IF3-C fold such as YhbY and IF3-C. The eukaryotic lineages of the Alba family are principally involved in RNA metabolism, suggesting that the ancestral function of the IF3-C fold was related to RNA interaction. Alba has been shown to bind DNA and affect DNA supercoiling in a temperature dependent manner. It is regulated by acetylation (alba = acetylation lowers binding affinity) by the Sir2 protein. Alba is proposed to play a role in establishment or maintenance of chromatin architecture and thereby in transcription repression. For further information see.
