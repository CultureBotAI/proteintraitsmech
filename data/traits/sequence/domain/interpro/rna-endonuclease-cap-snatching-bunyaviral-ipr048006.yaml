identifier: InterPro:IPR048006
label: "RNA endonuclease, cap-snatching, bunyaviral"
definition: >-
  This entry represents a domain from an RNA endonuclease region associated with cap-snatching for mRNA production by RNA viruses. This domain usually is part of a multifunctional protein, the L protein responsible for RNA-dependent RNA polymerase activity. Cap-snatching is a viral alternative to synthesizing a eukaryotic-like mRNA cap itself. Members of this group are found in bunyavirales.
