identifier: InterPro:IPR024098
label: Transcription factor EB, bHLHzip domain
definition: >-
  The MiT/TFE family of basic helix-loop-helix leucine zipper transcription factors includes MITF (microphthalmia-associated transcription factor) and related family members TFE3, TFEB and TFEC. The transcription factors heterodimerize with each other and recognise the same DNA sequences. They recognise and bind E-box sequences (3'-CANNTG-5'). TFEB is a transcription factor that acts as a master regulator of lysosomal biogenesis, autophagy, lysosomal exocytosis, lipid catabolism, energy metabolism and immune response. In association with TFE3, TFEB activates the expression of CD40L in T-cells, thereby playing a role in T-cell-dependent antibody responses in activated CD4+ T-cells and thymus-dependent humoral immunity. It also plays a role in the signal transduction processes required for normal vascularisation of the placenta. It is involved in the cellular response to amino acid availability by acting downstream of mTOR: in the presence of nutrients, TFEB phosphorylation by MTOR promotes its cytosolic retention and subsequent inactivation, while upon starvation or lysosomal stress, inhibition of mTOR induces TFEB dephosphorylation, resulting in nuclear localization and transcription factor activity. This entry represents the basic Helix-Loop-Helix-zipper (bHLHzip) domain of TFEB.
