identifier: InterPro:IPR053900
label: "C5orf34-like domain"
definition: >-
  This entry represents a domain found in a family of eukaryotic proteins, including the human uncharacterised protein C5orf34, which has been reported to be correlated with an unfavorable prognosis of patients from a variety of human malignancies. This domain appears C-terminal to and and N-terminal to . This domain is predicted to show an α/β configuration with high structural similarity to a polo box.
