identifier: InterPro:IPR014015
label: "Helicase, superfamily 3, DNA virus"
definition: >-
  Helicases have been classified in 5 superfamilies (SF1-SF5). All of the proteins bind ATP and, consequently, all of them carry the classical Walker A (phosphate-binding loop or P-loop) and Walker B (Mg2+-binding aspartic acid) motifs. Superfamily 3 consists of helicases encoded mainly by small DNA viruses and some large nucleocytoplasmic DNA viruses. Small viruses are very dependent on the host-cell machinery to replicate. SF3 helicase in small viruses is associated with an origin-binding domain. By pairing a domain that recognises the ori with a helicase, the virus can bypass the host-cell-based regulation pathway and initiate its own replication. The protein binds to the viral ori leading to origin unwinding. Cellular replication proteins are then recruited to the ori and the viral DNA is replicated. In SF3 helicases the Walker A and Walker B motifs are separated by spacers of rather uniform, and relatively short, length. In addition to the A and B motifs this family is characterised by a third motif (C) which resides between the B motif and the C terminus of the conserved region. This motif consists of an Asn residue preceded by a run of hydrophobic residues. Several structures of SF3 helicases have been solved. They all possess the same core α/β fold, consisting of a five-stranded parallel β-sheet flanked on both sides by several α-helices. In contrast to SF1 and SF2 helicases, which have RecA-like core folds, the strand connectivity within the α/β core domain is that of AAA+ proteins. The SF3 helicase proteins assemble into a hexameric ring. Some proteins known to contain an SF3 helicase domain are listed below: Polyomavirus large T antigen. It initiates DNA unwinding and replication via interactions with the viral origin of replication. Papillomavirus E1 protein.…
