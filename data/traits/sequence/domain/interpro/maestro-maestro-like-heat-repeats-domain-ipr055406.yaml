identifier: InterPro:IPR055406
label: "Maestro/Maestro-like, HEAT-repeats domain"
definition: >-
  This entry represents a HEAT-repeats domain found in maestro and maestro heat-like repeat-containing proteins, including Maestro heat-like repeat -containing protein family member 2B from mouse (MROH2B, also known as SPIF), which may play a role in the process of sperm capacitation. This region is found at the C-terminal of MROH2B and other members of this entry, while in maestro it represents almost the whole length.
