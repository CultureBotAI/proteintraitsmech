identifier: InterPro:IPR013209
label: "Lipin/Ned1/Smp2 (LNS2)"
definition: >-
  This domain is found in lipins and lipin homologues from Saccharomyces cerevisiae (Smp2) and from Schizosaccharomyces pombe (Ned1). Smp2 (also known as PAH1) is involved in plasmid maintenance and respiration and has been identified as a Mg2+-dependent phosphatidate phosphatase that contains a haloacid dehalogenase (HAD)-like domain. Lipin proteins are phosphatidate phosphatases which catalyse the dephosphorylation of phosphatidic acid to diacylglycerol, the penultimate step in triacylglycerol synthesis. They are involved in adipose tissue development and insulin resistance.
