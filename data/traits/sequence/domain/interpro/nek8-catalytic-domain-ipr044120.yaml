identifier: InterPro:IPR044120
label: Nek8, catalytic domain
definition: >-
  This entry represents the catalytic domain of Nek8. Nek8 contains an N-terminal kinase catalytic domain and a C-terminal RCC1 (regulator of chromosome condensation) domain. Nek8 human mutations have been shown to cause major organ developmental defects due to altered ciliogenesis and cell differentiation/proliferation through deregulation of the Hippo pathway. Nek8 is one in a family of 11 different Neks (Nek1-11) that are involved in cell cycle control.
