identifier: InterPro:IPR047580
label: DNA polymerase gamma, palm domain
definition: >-
  This entry represents the palm domain of human DNA polymerase gammaA (Pol gammaA), the catalytic subunit of the mitochondrial DNA polymerase, and similar proteins from animals and fungi. This subunit possesses both polymerase and proofreading exonuclease activities, and together with the accessory subunit, Pol gammaB, constitute the Pol gamma holoenzyme. This protein is important for mitochondrial DNA maintenance and mutation of the catalytic subunit of Pol gamma is implicated in more than 30 human diseases. The holoenzyme is a heterotrimer containing one Pol gammaA subunit and a dimeric Pol gammaB subunit. The Pol gammaA belongs to classA polymerases and its palm domain adopts a canonical polymerase configuration. DNA-dependent DNA polymerases can be classified into six main groups based upon phylogenetic relationships with E. coli polymerase I (classA), E. coli polymerase II (class B), E.coli polymerase III (class C), euryarchaeota polymerase II (class D), human polymerase beta (class X), E. coli UmuC/DinB and eukaryotic RAP 30/Xeroderma pigmentosum variant (class Y). The structure of these polymerases resembles in overall morphology a cupped human right hand, with fingers (which bind an incoming nucleotide and interact with the single-stranded template), palm (which harbors the catalytic amino acid residues and also binds an incoming dNTP) and thumb (which binds double-stranded DNA) subdomains.
