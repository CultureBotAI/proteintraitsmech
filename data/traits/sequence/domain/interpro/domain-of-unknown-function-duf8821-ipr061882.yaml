identifier: InterPro:IPR061882
label: "Domain of unknown function DUF8821"
definition: >-
  This entry represents a family of uncharacterised proteins of approximately 145 residues found in Bacillota (particularly Paenibacillaceae and Bacillaceae) and Actinomycetota (including Streptomycetaceae). The proteins occur as single-domain proteins. While computationally annotated as phage tail proteins in UniProt, there is no experimental evidence supporting this function, and the annotation likely reflects genomic proximity to prophage regions rather than demonstrated function. The function of this family remains to be determined.
