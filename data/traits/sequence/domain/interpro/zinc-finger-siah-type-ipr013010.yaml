identifier: InterPro:IPR013010
label: Zinc finger, SIAH-type
definition: >-
  SINA/Siah family proteins represent mammalian homologs of the Drosophila SINA (seven in absentia) protein. SINA is required for R7 photoreceptor cell differentiation within the sevenless pathway. Members of this family are E3 ubiquitin ligases that regulate ubiquitination and protein degradation. Siahs are known to recognise several target proteins including Deleted in Colorectal Cancer (DCC), synaptophysin and Numb and promote their degradation. SINA/Siah sequences are highly conserved from plants to mammals. Whereas the N terminus and RING domain of Siah bind E2 proteins, the C terminus can be considered as a substrate- and cofactor-interaction domain (substrate-binding domain, SBD) that interacts with a number of proteins, some of which are degraded. The SBD domain displays some sequence similarities with the C-terminal region of TRAF proteins. It contains a cysteine-rich region, the SIAH-type zinc finger, with eight totally conserved Cys and His residues that coordinate two zinc atoms. The crystal structure of SIAH-type zinc finger has been solved. It folds in two subdomains, each one binding one zinc atom and consisting of two β-strands and an α-helix. Zinc finger (Znf) domains are relatively small protein motifs which contain multiple finger-like protrusions that make tandem contacts with their target molecule. Some of these domains bind zinc, but many do not; instead, they bind other metals, such as iron, or no metal at all. For example, some family members form salt bridges to stabilise the finger-like folds. They were first identified as a DNA-binding motif in transcription factor TFIIIA from Xenopus laevis (African clawed frog); however, they are now recognised to bind DNA, RNA, protein and/or lipid substrates. Their binding properties depend on the amino aci…
