identifier: InterPro:IPR062032
label: "Transcriptional activator POG1, N-terminal"
definition: >-
  This entry represents the N-terminal region of transcriptional activator POG1 and related proteins in yeasts. POG1 promotes cell cycle recovery after pheromone-induced G1 arrest by working with cyclin CLN2. The protein binds promoters of genes involved in cell cycle regulation and spindle assembly. POG1 is localised to the nucleus and is regulated by the SBF complex during cell division. The function of this region remains to be determined.
