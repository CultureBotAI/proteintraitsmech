identifier: InterPro:IPR047266
label: "N-lysine methyltransferase KMT5A-like, SET domain"
definition: >-
  This entry represents the SET domain of KMT5A. This entry includes a group of animal proteins that belong to the class V-like SAM-binding methyltransferase superfamily and contain the SET domain usually flanked by other domains forming the so-called pre- and post-SET regions. The enzymes belonging to this class all N-methylate lysine in proteins. Most of them are histone methyltransferases ( ), including human N-lysine methyltransferase KMT5A (also known as PR-Set7), which is a nucleosomal histone-lysine N-methyltransferase that specifically monomethylates 'Lys-20' of histone H4 (H4K20me1). It plays a central role in the silencing of euchromatic genes.
