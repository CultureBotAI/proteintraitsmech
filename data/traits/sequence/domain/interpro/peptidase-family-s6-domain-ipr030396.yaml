identifier: InterPro:IPR030396
label: Peptidase family S6 domain
definition: >-
  Autotransporters (ATs) represent a large superfamily of virulence factors produced by Gram-negative bacteria. ATs have evolved a unique export mechanism. Initially the protein is synthetised with an N-terminal leader peptide directing the protein to the periplasm via the signal recognition particle. Once across the inner membrane, the C-terminal domain form a β-barrel structure allowing the passenger domain to escape to the external medium, where it is released proteolytically from the cell. The 300-residue peptidase family S6 domain is found in a subfamily of autotransporters including: Neisseria gonorrhoeae IgA-specific serine endopeptidase autotransporter. Haemophilus influenzae immunoglobulin A1 protease autotransporter. Enteropathogenic Escherichia coli serine protease EspC. Enterohemorrhagic Escherichia coli serine protease EspP. Enteroaggregative Escherichia coli plasmid-encoded toxin (Pet). Uropathogenic Escherichia coli serine protease Sat autotransporter. Pathogenic Escherichia coli hemoglobin-binding protease Hbp autotransporter. Avian pathogenic Escherichia coli temperature-sensitive hemagglutinin Tsh autotransporter. Avian pathogenic Escherichia coli Vat. Shigella flexneri serine protease Pic autotransporter. Shigella flexneri serine protease SepA autotransporter. The peptidase family S6 domain mediates intermolecular autoproteolysis, resulting in release of the passenger domain from the bacterial surface. It has a globular shape including six β strands rolled into a barrel-like structure with several long β hairpins over its surface. The catalytic triad is composed of Ser, Asp, and His. The peptidase family S6 is a member of the SA (chymotrypsin) clan.
