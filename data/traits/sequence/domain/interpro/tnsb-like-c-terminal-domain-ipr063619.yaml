identifier: InterPro:IPR063619
label: "TnsB-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Transposon Tn7 transposition protein TnsB and similar proteins, including Transposase for transposon Tn552 from Staphylococcus aureus. TnsB is a sequence-specific DNA-binding protein that recognises sequences necessary for recombination at both left and right ends of Tn7.
