identifier: InterPro:IPR060009
label: "Glycosyltransferase WbsX, N-terminal domain"
definition: >-
  Members of this family are found in within O-antigen biosynthesis clusters in Gram-negative bacteria, where they are predicted to function as glycosyltransferases. This entry represents the N-terminal domain, which has a TIM-barrel fold. It is found associated with at the C-terminal.
