identifier: InterPro:IPR054769
label: "Internalin J, EF-hand domain"
definition: >-
  This entry represents the N-terminal EF-hand domain present in Internalin J proteins from Listeria species. InlJ is involved in several steps of L.monocytogenes infection by both intravenous and oral infection.
