identifier: InterPro:IPR053887
label: "Major capsid protein V20, C-terminal domain"
definition: >-
  This is the C-terminal domain of major capsid protein V20 from Sputnik virophage. This domain folds into a β-sandwich with a jelly-roll topology. V20 is a major capsid protein from Sputnik virophage. This is a dsDNA virus, referred to as a virophage, that is co-assembled with Mimivirus in the host amoeba. The capsid is organized into a T = 27 lattice in which there are 260 trimeric capsomers and 12 pentameric capsomers. The trimeric capsomers consist of three double jelly-roll major capsid proteins creating pseudohexameric capsomer symmetry.
