identifier: InterPro:IPR031234
label: "Latrophilin-1, , transmembrane domain"
definition: >-
  Latrophilins are a family of secretin-like GPCRs that can be subdivided into 3 subtypes: Latrophilin-1 (LPH1), -2 (LPH2), and -3 (LPH3). LPH1, also known as Adhesion G protein-coupled receptor L1 (Adgrl1), is a brain-specific calcium independent receptor of alpha-latrotoxin (LTX), a neurotoxin present in black widow spider venom which triggers massive exocytosis from presynaptic nerve terminals. It is the affinity of this form of the receptor for LTX that gives the family its name. Two endogenous ligands for latrophilins have been described, teneurin-2 and FLRT3. LPH1 has been shown to bind Lasso (a splice variant of teneurin-2). LPH1 and Lasso interact across intercellular and synaptic junctions, suggesting an involvement in synaptic functions. Latrophilins are potential synaptic cell-adhesion molecules that interact trans-synaptically with teneurins and FLRTs. This entry represents the seven-transmembrane helix domain of LPH1.
