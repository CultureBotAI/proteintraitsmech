identifier: InterPro:IPR062659
label: "Bag of marbles protein, helical domain"
definition: >-
  This entry represents a helical domain in Bag of marbles (BAM) protein found in Drosophila. BAM is required to initiate both male and female gametogenesis. The protein functions as a regulatory component of a deubiquitinase complex with otu, which deubiquitinates K63-linked polyubiquitinated proteins and regulates the IMD immune signalling pathway. BAM forms complexes with bgcn involved in 3'-UTR- dependent translational repression of mRNAs including mei-P26, nanos and shg/E-cadherin. The protein localises to the cytoplasm and is expressed in cystoblasts and early cystocytes during gametogenesis. BAM contains a central region required for ubiquitin binding and a C- terminal PEST sequence targeting it for degradation. Disruption results in sterility with abnormal cysts containing excess cells that fail to differentiate into gametes.
