identifier: InterPro:IPR058238
label: "Class I lanthipeptide leader domain"
definition: >-
  This entry represents a homology domain found regularly as a leader peptide, ending with a GlyGly dipeptide (a leader peptide cleavage site), of putative lanthipeptides (probably lantibiotics in most cases) encoded in the vicinity of a class I lanthionine synthase, or LanC. The designation L1a reflects model construction for class I lantibiotics (L1), first in a possible series (L1a), from the lanthipeptide RiPP collection. Because the leader peptide may reflect constraints on cleavage and export, it may be expected that some members of this group undergo modifications other than lanthionine bridge formation, or no special modifications at all. Proteins in this entry are mainly found in bacteroidetes.
