identifier: InterPro:IPR056386
label: "B-cell receptor CD22, first Ig-like domain"
definition: >-
  This is the first immunoglobulin-like (Ig-like) domain found in human B-cell receptor CD22 and similar sequences from vertebrates. CD22 plays a role in various aspects of B-cell biology including differentiation, antigen presentation, and trafficking to bone marrow. CD22 binds to alpha 2,6-linked sialic acid residues of surface molecules such as CD22 itself, CD45 and IgM in a cis configuration as well as ligands on other cells as an adhesion molecule in a trans configuration.
