identifier: InterPro:IPR046332
label: "Small ubiquitin-related modifier 1, Ubl domain"
definition: >-
  This entry represents the ubiquitin-like (Ubl) domain found in small ubiquitin-related modifier 1 (SUMO1) and similar proteins from animals. SUMO1 is a binding partner of the RAD51/52 nucleoprotein filament proteins, which mediate DNA strand exchange. Its conjugation to cellular proteins has been implicated in multiple important cellular processes, such as nuclear transport, cell cycle control, oncogenesis, inflammation, and the response to virus infection.
