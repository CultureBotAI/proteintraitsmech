identifier: InterPro:IPR057932
label: "Nesprin-1/3, spectrin repeats region"
definition: >-
  This entry represents a region of spectrin repeats found in human Nesprin-1/3 (SYNE1/3) and similar proteins from vertebrates. SYNE1 is a multi-isomeric modular protein which forms a linking network between organelles and the actin cytoskeleton to maintain the subcellular spatial organisation. This protein has been associated with several severe disorders. SYNE3 plays a role in the regulation of aortic epithelial cell morphology, and is required for flow-induced centrosome polarisation and directional migration in aortic endothelial cells.
