identifier: InterPro:IPR040784
label: "Glycogen debranching enzyme, C-terminal domain"
definition: >-
  This is the C-terminal domain of the glycogen debranching enzyme GlgX. GlgX hydrolyzes alpha-1,6-glycosidic linkages of phosphorylase-limit dextrin containing only three or four glucose subunits produced by glycogen phosphorylase. Sequence analysis suggests that GlgX is a debranching enzyme belonging to the glycoside hydrolase GH-13 family in the CAZy database.
