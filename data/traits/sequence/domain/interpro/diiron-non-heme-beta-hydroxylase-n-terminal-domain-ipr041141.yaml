identifier: InterPro:IPR041141
label: "Diiron non-heme beta-hydroxylase, N-terminal domain"
definition: >-
  This is the N-terminal domain found in Diiron non-heme beta-hydroxylase (CmlA). CmlA catalyzes beta-hydroxylation of the precursor molecule l-p-aminophenylalanine (l-PAPA) to form l-p-aminophenylserine. Structural analysis indicate that the N-terminal domain facilitates dimerization and has a mixed α-β topology. Furthermore, a projecting 'dimerization arm' (residues 108-146) from the N-terminal domain of CmlA mediates the interaction between the monomers.
