identifier: InterPro:IPR033708
label: Isoleucyl tRNA synthetase type 1, anticodon-binding domain
definition: >-
  This domain is found in isoleucyl tRNA synthetases (IleRS), which belong to the class Ia aminoacyl tRNA synthetases. It lies C-terminal to the catalytic core domain, and recognizes and specifically binds to the tRNA anticodon. IleRS catalyzes the transfer of isoleucine to the 3'-end of its tRNA.
