identifier: InterPro:IPR047084
label: "Glucosamine-fructose-6-phosphate aminotransferase, isomerising, N-terminal domain"
definition: >-
  This entry represents the domain found at the N-terminal end of GFAT, the glutaminase domain, which shows a four-layer structure with two antiparallel β-sheets sandwiched between layers of α-helices. Glucosamine:fructose-6-phosphate aminotransferase (GFAT or GlmS, ) catalyses the formation of glucosamine 6-phosphate and is the first and rate-limiting enzyme of the hexosamine biosynthetic pathway. The final product of the hexosamine pathway, UDP-N-acetyl glucosamine, is an active precursor of numerous macromolecules containing amino sugars. This family of sequences belong to the MEROPS peptidase family C44 (clan PB(C)), and are classified as non-peptidase homologues.
