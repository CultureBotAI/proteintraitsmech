identifier: InterPro:IPR034633
label: "Ribonucleoprotein PTB-binding 1, RNA recognition motif 1"
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of RAVER1. Ribonucleoprotein PTB-binding 1 (RAVER1) interacts with the polypyrimidine tract-binding protein (PTB), which is an important regulator of alternative splicing. It has four PTB-Raver1 interacting motifs (PRIs) that bind to the helical face of the second RNA recognition motif (RRM2) in PTB. It contains three N-terminal RRMs and an extended Pro-rich C terminus that contains four conserved PTB-Raver1 interacting motifs (PRIs) with the consensus sequence [S/G][I/L]LGxxP. It also contains a long proline rich region, two nuclear localization sequences (NLS), and a putative nuclear export sequence (NES). RAVER1 also binds to cytoskeletal components like alpha-actinin and vinculin/metavinculin. It may play an important role for the regulation of neuronal synaptic plasticity.
