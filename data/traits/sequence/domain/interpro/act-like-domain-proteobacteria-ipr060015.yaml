identifier: InterPro:IPR060015
label: "ACT-like domain, proteobacteria"
definition: >-
  This entry represents an ACT domain, a small molecule binding module with a characteristic β-α-β-β-α-β fold. Members of this clan typically form dimers or higher-order oligomers, with ligand binding often occurring at the domain interfaces. These domains function as regulatory modules that bind amino acids or other small molecules, enabling allosteric control of enzyme activity, transcription regulation, or metabolic pathways. This domain is found in proteins from alphaproteobacteria and gammaproteobacteria.
