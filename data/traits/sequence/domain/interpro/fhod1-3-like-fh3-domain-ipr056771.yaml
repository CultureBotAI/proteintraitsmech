identifier: InterPro:IPR056771
label: "FHOD1/3-like, FH3 domain"
definition: >-
  This is the FH3 domain of FH1/FH2 domain-containing proteins 1 and 3 from human and related sequences, including ELMOA, Formin-G and Formin-C from Dictyostelium discoideum. FHOD1 is required for the assembly of F-actin structures, such as stress fibres and depends on the Rho-ROCK cascade for its activity. It contributes to the coordination of microtubules with actin fibres and plays a role in elongation. This domain consists of armadillo repeats and mediates the interactions with spectrin repeat 12 (SR12) from Nesprin.
