identifier: InterPro:IPR056759
label: "Dynein axonemal heavy chain 2/5/8, coiled-coil domain"
definition: >-
  This entry represents a coiled-coil region found in Dynein axonemal heavy chains 2/5/8 and related proteins, including Dynein gamma and Dynein-1-beta heavy chain. These proteins are involved in sperm and flagella motility. DYH2 is part of the axonemal inner dynein arm complex and plays a central role in ciliary beat.
