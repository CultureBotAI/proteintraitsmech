identifier: InterPro:IPR062182
label: "Nonsense-mediated decay protein 4, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of NMD4 (nonsense- mediated decay protein 4), found in Saccharomycetaceae. NMD4 is involved in nonsense-mediated decay of mRNAs containing premature stop codons. The protein is localised to the cytoplasm and contains a PIN domain. The specific function of this C-terminal domain remains to be determined.
