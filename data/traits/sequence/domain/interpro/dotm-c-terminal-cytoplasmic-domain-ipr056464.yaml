identifier: InterPro:IPR056464
label: "DotM, C-terminal cytoplasmic domain"
definition: >-
  This entry represents the C-terminal cytoplasmic domain of DotM from Legionella pneumophila and related proteins found mainly in gammaproteobacteria. DotM is a component of Type 4B secretion (T4BS) system that translocates over 300 effectors into the host cell during infection. The DotM cytoplasmic domain adopts an α-helical structure consisting of 13 α-helices. In the membrane-embedded T4 coupling complex (T4CC), DotM makes extensive contacts with DotL and also interacts with the DotN and DotZ proteins. The DotLMNYZ components form a hetero-pentameric core of the T4CC complex from which the flexible IcmSW module protrudes. These hetero-pentameric complexes assemble and form an inner membrane channel for effectors to pass through.
