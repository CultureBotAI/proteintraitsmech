identifier: InterPro:IPR063755
label: "Endolysin A domain"
definition: >-
  This entry represents a conserved domain found at the N-terminal of Endolysin A from the Mycobacterium phage D29, which participates with the holin protein in the sequential events which lead to the programmed host cell lysis releasing the mature viral particles. Once the holin has permeabilised the host cell membrane, the endolysin can reach the periplasm and break down the peptidoglycan layer.
