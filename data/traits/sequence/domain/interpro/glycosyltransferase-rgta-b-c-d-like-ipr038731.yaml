identifier: InterPro:IPR038731
label: "Glycosyltransferase RgtA/B/C/D-like"
definition: >-
  This entry represents a group of glycosyltransferases, including RgtA/B/C/D from Rhizobium leguminosarum bv. viciae. RgtA/B/C/D are involved in the modification of the lipopolysaccharide (LPS) inner core.
