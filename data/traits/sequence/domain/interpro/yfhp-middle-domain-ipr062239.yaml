identifier: InterPro:IPR062239
label: "YfhP, middle domain"
definition: >-
  This entry represents the middle domain of YfhP protein found in Bacillus and related Gram-positive bacteria. YfhP proteins are multidomain transmembrane proteins with an N-terminal YdjM domain ( ), this middle domain, and a C-terminal α/β plait domain ( ). The function of this middle domain remains to be determined.
