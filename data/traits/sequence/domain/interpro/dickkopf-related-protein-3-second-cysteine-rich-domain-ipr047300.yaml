identifier: InterPro:IPR047300
label: "Dickkopf-related protein 3, second cysteine-rich domain"
definition: >-
  This entry represents the second cysteine-rich (Cys-2) domain of Dkk3 and similar proteins from vertebrates. This domain is closely similar to those in the colipase family; it has been suggested that the Cys-2 domain of Dkks may enable interaction with lipids in order to regulate Wnt function. Dickkopf 3 (Dkk3) is a secreted protein which, in contrast to Dkk1, Dkk2, and Dkk4, does not interact with LRP5/6 (low-density lipoprotein receptor related protein 5 and 6), and thus is a divergent family member that is not considered a true Wnt signalling antagonist. The role of Dkk proteins in cancer is considered mainly tumour suppressive since they are usually down-regulated in cancer cells. Dkk3 links heat shock factor 1 (HSF1) and YAP/TAZ signalling to control aggressive behaviours in cancer-associated fibroblasts; it does so via canonical Wnt signalling. Dkks 1-4 each possesses an N-terminal signal peptide and contains two conserved cysteine-rich domains (Cys-1 and Cys-2) separated by a linker region. Each domain possesses 10 conserved cysteine residues.
