identifier: InterPro:IPR054478
label: "E3 ubiquitin-protein ligase listerin, ubiquitin conjugating domain"
definition: >-
  This entry represents a domain that structurally resembles the ubiquitin conjugating enzyme domain and the RWD domain . This domain is somewhat smaller and apparently lacks the conserved cysteine that is used for ubiquitin conjugation. This domain is commonly found in the LTN1 family that comprises E3 ubiquitin-protein ligases involved in the ribosome quality control complex (RQC). The RQC is a ribosome-associated complex that targets incompletely synthesized nascent chains for proteasomal degradation. Members of the LTN1 family are responsible for ubiquitinating stalled nascent chains on the 60S ribosomal subunit, a process facilitated by the recruitment of NEMF in some species. This ubiquitination signals the recruitment of cellular machinery such as VCP/p97, TER94/VCP, or CDC48, depending on the organism, to extract and degrade the incomplete translation products. The LTN1 family plays a crucial role in maintaining protein synthesis fidelity by ensuring the removal of defective ribosomal products, thereby preventing the accumulation of potentially toxic protein fragments within the cell.
