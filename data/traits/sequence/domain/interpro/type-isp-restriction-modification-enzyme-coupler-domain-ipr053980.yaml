identifier: InterPro:IPR053980
label: "Type ISP restriction-modification enzyme, coupler domain"
definition: >-
  Type ISP restriction-modification (RM) enzymes cleave random DNA between distant target sites when two enzymes collide following convergent ATP-driven translocation. This entry represents the all-helical coupler domain of type ISP RM enzymes, which links the ATPase to the MTase and the C-terminal TRD (target recognition domain) domains and seems to play a key role in transferring conformational strain during initiation.
