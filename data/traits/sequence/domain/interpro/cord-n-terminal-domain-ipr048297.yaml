identifier: InterPro:IPR048297
label: "CORD, N-terminal domain"
definition: >-
  This domain is found at the N-terminal in Protein CORTICAL MICROTUBULE DISORDERING (CORD) proteins found in plants. This domain is predicted to adopt a globular structure that folds into a barrel similar to OB-fold barrels. CORD proteins are microtubule-associated proteins that are required, redundantly with CORD2, for the formation of the pitted secondary cell wall of metaxylem vessels. CORD1 from Arabidopsis thaliana controls the disorganisation of the parallel cortical microtubule network by modulating microtubule attachment to the plasma membrane in metaxylem vessel cells; this mechanism probably relies on disruption of interactions between ARAC10/ROP11 and cortical microtubules.
