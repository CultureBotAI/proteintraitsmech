identifier: InterPro:IPR059984
label: "PRR11, second helical domain"
definition: >-
  This entry represents the second helical domain of PRR11 (Proline-rich protein 11), found in vertebrates. The specific function of this second helical domain remains to be determined. PRR11 is a cell cycle regulatory protein that plays a critical role in cell cycle progression. The full-length protein is ubiquitously expressed and shows increased expression from G1 to G2/M phase. PRR11 is localised to both the cytoplasm and nucleus and is subject to rapid proteasomal degradation involving FBXW7-specific phosphorylated phosphodegron motifs. The protein contains multiple disordered regions, proline-rich sequences, and regulatory motifs including D-box and KEN box degradation signals.
