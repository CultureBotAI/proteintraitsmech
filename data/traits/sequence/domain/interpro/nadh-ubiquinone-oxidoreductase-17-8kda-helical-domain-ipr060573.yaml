identifier: InterPro:IPR060573
label: "NADH-ubiquinone oxidoreductase 17.8kDa, helical domain"
definition: >-
  This entry represents the helical domain found in the 17.8 kDa subunit of NADH-ubiquinone oxidoreductase subunit (Nuo17.8) and similar fungal proteins. This domain contains a single transmembrane helix that anchors the protein in the mitochondrial inner membrane. Nuo17.8 is involved in electron transfer from NADH to ubiquinone as part of the respiratory chain. The domain, which is involved in membrane insertion and stability within the Complex I assembly, facilitates the protein's integration into the mitochondrial inner membrane as a single-pass transmembrane protein. Complex I comprises approximately 40 different subunits working together in respiratory electron transport.
