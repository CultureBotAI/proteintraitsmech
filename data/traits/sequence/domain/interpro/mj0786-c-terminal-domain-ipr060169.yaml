identifier: InterPro:IPR060169
label: "MJ0786, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of MJ0786 uncharacterised proteins found in methanogenic archaea. This domain is found across various methanogenic lineages including Methanosarcinaceae, Methanobacteriaceae, Methanosphaera, and Methanococcales. The function of this C-terminal domain remains to be determined. This domain is also found at the C-terminal of putative Segregation and condensation protein B proteins.
