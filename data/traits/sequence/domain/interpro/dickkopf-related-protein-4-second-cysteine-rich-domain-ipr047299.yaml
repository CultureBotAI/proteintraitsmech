identifier: InterPro:IPR047299
label: "Dickkopf-related protein 4, second cysteine-rich domain"
definition: >-
  This entry represents the second cysteine-rich (Cys-2) domain of Dkk4 and similar proteins from chordates. This domain is closely similar to those in the colipase family; it has been suggested that the Cys-2 domain of Dkks may enable interaction with lipids in order to regulate Wnt function. Dickkopf 4 (Dkk4) is a secreted protein which directly binds to LRP5/6 (low-density lipoprotein receptor related protein 5 and 6), and is an inhibitor of Wnt/beta-catenin signalling. Dkk4, which is upregulated by the activated Wnt pathway, contributes to tumour malignancy in variable tumours, promoting tumour cell invasion and progression. Aberrant accumulation of Dkk4 has been shown to promote tumour progression by forming the immune suppressive microenvironment in gastrointestinal stromal tumour, and thus Dkk4 may be used as a tumour biomarker for prognosis prediction and recurrence monitoring. Dkk4 belongs to the Dickkopf (Dkk) family that comprises a discrete class of secreted Wnt inhibitors that are expressed in a variety of tissues and organs, and are required for many developmental processes, including segmentation, endoderm development, limb polarity, neural crest differentiation, kidney morphogenesis, sex determination and brain development. Dkks 1-4 each possesses an N-terminal signal peptide and contains two conserved cysteine-rich domains (Cys-1 and Cys-2) separated by a linker region. Each domain possesses 10 conserved cysteine residues..
