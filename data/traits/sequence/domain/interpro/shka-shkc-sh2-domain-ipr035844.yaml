identifier: InterPro:IPR035844
label: "ShkA/ShkC, SH2 domain"
definition: >-
  This entry represents the SH2 domain found in shkA (also known as SHK1) and shkC from Dictyostelium discoideum. ShkA is a dual-specificity kinase is required for proper chemotaxis. Its SH2 domain is required for its plasma membrane/cortex localization and the proper function of SHK1. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites.
