identifier: InterPro:IPR061951
label: "Topoisomerase I damage affected protein 7 domain"
definition: >-
  This entry represents a conserved domain found in TDA7 and related proteins in fungi, particularly Saccharomycetaceae. TDA7 proteins are single-pass membrane proteins localised to the vacuole membrane. TDA7 is involved in cellular responses to topoisomerase I damage, and its disruption leads to cell death when overexpressing camptothecin mimetic TOP1 mutants. The protein is regulated during the cell cycle and undergoes post-translational modifications. The specific function of this domain remains to be determined.
