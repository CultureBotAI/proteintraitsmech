identifier: InterPro:IPR047843
label: "Wntless-like, transmembrane domain"
definition: >-
  Protein wntless (WLS) regulates Wnt proteins sorting and secretion in a feedback regulatory mechanism. This reciprocal interaction plays a key role in the regulation of expression, subcellular location, binding and organelle-specific association of Wnt proteins. It also plays an important role in establishment of the anterior-posterior body axis formation during development. This protein is homologous to GPR180, TMEM145, and TMEM181, which have been described as GOST proteins (for GOLD domain seven-transmembrane helix proteins) together with TMEM87A/B, GPR107, and GPR108, as they share the same domain architecture consisting of a GOLD domain atop of a membrane-spanning seven-transmembrane helix domain. This entry represents the seven-transmembrane domain of protein wntless (WLS) from Drosophila and its homologues.
