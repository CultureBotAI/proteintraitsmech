identifier: InterPro:IPR048219
label: "Potassium voltage-gated channel subfamily A member 7, BTB/POZ domain"
definition: >-
  This entry represents the BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Potassium voltage-gated channel subfamily A member 7 (KCNA7) and similar sequences from vertebrates. KCNA7, also called voltage-gated potassium channel subunit Kv1.7, mediates transmembrane potassium transport in excitable membranes. Assuming opened or closed conformations in response to the voltage difference across the membrane, the protein forms a tetrameric potassium-selective channel through which potassium ions may pass in accordance with their electrochemical gradient. KCNA7 plays an important role in the repolarization of cell membranes. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. KCNA7 is an alpha subunit that forms functional homo- or hetero-tetrameric channels (with other Kv1/KCNA alpha subunits) through its BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif.
