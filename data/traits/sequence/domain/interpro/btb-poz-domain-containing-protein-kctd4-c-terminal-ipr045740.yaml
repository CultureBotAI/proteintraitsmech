identifier: InterPro:IPR045740
label: "BTB/POZ domain-containing protein KCTD4, C-terminal"
definition: >-
  This entry represents the C-terminal region of BTB/POZ domain-containing protein KCTD4. This domain is highly variable among the BTB domain-containing KCTD proteins and it has been proposed that it could play a role in binding or recruiting diverse protein targets involved in different cellular processes, such us ubiquitination, cell proliferation or control of G-protein coupled receptors, among others.
