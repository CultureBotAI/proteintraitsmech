identifier: InterPro:IPR024602
label: "Conserved oligomeric Golgi complex, subunit 2, N-terminal"
definition: >-
  This entry represents the N-terminal domain of subunit 2 of the COG complex. The COG complex comprises eight proteins COG1-8 and plays critical roles in Golgi structure and function and it is involved in retrograde vesicular trafficking within the Golgi apparatus.. COG complex,together with exocyst, Golgi-associated retrograde protein (GARP) and Dsl1 complexes, is a member of the CATHR (complexes associated with tethering containing helical rods) family sharing an evolutionary origin and structural features.
