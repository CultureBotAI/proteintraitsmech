identifier: InterPro:IPR031335
label: "Glycosyl hydrolase family 63, C-terminal"
definition: >-
  Enzymes belonging to glycosyl hydrolase family 63 catalyse the specific cleavage of the non-reducing terminal glucose residue from Glc(3)Man(9)GlcNAc(2). Mannosyl oligosaccharide glucosidase is the first enzyme in the N-linked oligosaccharide processing pathway. This entry represents the C-terminal catalytic domain.
