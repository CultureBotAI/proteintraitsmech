identifier: InterPro:IPR025525
label: hAT-like transposase-like
definition: >-
  This is a domain found in a number of hAT-like transposases, such as protein DAYSLEEPER (At3g42170) from Arabidopsis. Protein DAYSLEEPER is essential for plant development and can also regulate global gene expression. This entry also includes some uncharacterised fungal proteins.
