identifier: InterPro:IPR013902
label: "Mug135-like, C-terminal domain"
definition: >-
  This entry represents a conserved domain found at the C-terminal end of certain meiotically up-regulated gene products (MUG) from fungi, including Meiotically up-regulated gene 135 protein from Schizosaccharomyces pombe (Mug135, also known as Tdk1, ). Mug135 is a killer meiotic driver (KMD), a selfish genetic element that by selectively kills meiotic products lacking its gene, thereby promoting its own propagation. This protein exists in a nontoxic tetrameric form during vegetative growth and meiosis but transforms into a distinct toxic form in spores.
