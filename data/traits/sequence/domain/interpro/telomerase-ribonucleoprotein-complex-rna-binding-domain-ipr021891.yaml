identifier: InterPro:IPR021891
label: Telomerase ribonucleoprotein complex - RNA-binding domain
definition: >-
  Telomeres in most organisms are comprised of tandem simple sequence repeats. The total length of telomeric repeat sequence at each chromosome end is determined in a balance of sequence loss and sequence addition. One major influence on telomere length is the enzyme telomerase. It is a reverse transcriptase that adds these simple sequence repeats to chromosome ends by copying a template sequence within the RNA component of the enzyme. The RNA binding domain of telomerase - TRBD - is made up of twelve α helices and two short β sheets. How telomerase and associated regulatory factors physically interact and function with each other to maintain appropriate telomere length is poorly understood. It is known however that TRBD is involved in formation of the holoenzyme (which performs the telomere extension) in addition to recognition and binding of RNA.
