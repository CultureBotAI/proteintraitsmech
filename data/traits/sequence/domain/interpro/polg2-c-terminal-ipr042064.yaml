identifier: InterPro:IPR042064
label: "POLG2, C-terminal"
definition: >-
  This entry represents the C-terminal domain of mitochondrial DNA polymerase gamma B subunit (also known as POLG2), which is required for processivity. Polymerase gamma replicates and repairs mitochondrial DNA. The C-terminal domain of its B subunit is strikingly similar to the anticodon-binding domain of glycyl tRNA synthetase.
