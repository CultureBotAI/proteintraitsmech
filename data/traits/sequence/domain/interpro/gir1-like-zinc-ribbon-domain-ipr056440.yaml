identifier: InterPro:IPR056440
label: "GIR1-like, zinc ribbon domain"
definition: >-
  This domain is found in the Protein GL2-INTERACTING REPRESSOR 1 and 2 (GIR1/2), and Protein salt-induced and EIN3/EIL1-dependent 1 (SIED1) from Arabidopsis thaliana and related plant proteins. Proteins containing this domain are involved in the modulation of root hair development and act as negative regulators in this process. They may function as adapter proteins, interacting with other proteins to control gene expression related to root hair formation. Additionally, some proteins are implicated in ethylene-dependent salt stress responses, where they play a role in reducing the accumulation of reactive oxygen species, thereby protecting the plant from oxidative damage. This domain contains a pair of conserved cysteine residues and is predicted to adopt a fold typical for zinc-ribbon domains.
