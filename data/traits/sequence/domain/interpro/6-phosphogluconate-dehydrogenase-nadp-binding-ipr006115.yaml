identifier: InterPro:IPR006115
label: 6-phosphogluconate dehydrogenase, NADP-binding
definition: >-
  6-Phosphogluconate dehydrogenase ( ) (6PGD) is an oxidative carboxylase that catalyses the decarboxylating reduction of 6-phosphogluconate into ribulose 5-phosphate in the presence of NADP. This reaction is a component of the hexose mono-phosphate shunt and pentose phosphate pathways (PPP). Prokaryotic and eukaryotic 6PGD are proteins of about 470 amino acids whose sequence are highly conserved. The protein is a homodimer in which the monomers act independently: each contains a large, mainly α-helical domain and a smaller β-α-β domain, containing a mixed parallel and anti-parallel six-stranded β-sheet. NADP is bound in a cleft in the small domain, the substrate binding in an adjacent pocket.
