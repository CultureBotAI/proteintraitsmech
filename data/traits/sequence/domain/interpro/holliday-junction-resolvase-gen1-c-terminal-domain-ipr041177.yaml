identifier: InterPro:IPR041177
label: "Holliday junction resolvase Gen1, C-terminal domain"
definition: >-
  This is the C-terminal domain found in GEN1 resolvase. It is composed of three-strand antiparallel β sheets and four α helices. GEN1 protein, a member of the XPG/Rad2 family of structure-selective endonucleases, is specialized for the cleavage of Holliday junction recombination intermediates. Structural comparison indicates that the C-terminal domain is similar to a series of chromobox homology proteins. Functional analysis indicates that the chromodomain provides an additional DNA binding site necessary for efficient HJ cleavage, and its truncation severely hampers GEN1's catalytic activity.
