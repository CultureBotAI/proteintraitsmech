identifier: InterPro:IPR060910
label: "Exosortase-dependent surface domain 3 XDD3"
definition: >-
  XDD3 (exosortase-dependent surface domain 3) is the third in a series of domains or full-length proteins that appear always, or nearly always, to have a C-terminal sorting signal such as PEP-CTERM or VPLPA-CTERM that is recognized and processed by an XrtA or another exosortase. Proteins sorted by exosortase are predicted to be cleaved near the C terminus, lipid-modified at that site, and anchored through that modification into the outer leaflet of the outer membrane.
