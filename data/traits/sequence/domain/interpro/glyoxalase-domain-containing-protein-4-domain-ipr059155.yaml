identifier: InterPro:IPR059155
label: "Glyoxalase domain-containing protein 4 domain"
definition: >-
  This domain is found in Glyoxalase domain- containing protein 4 from humans (GLOD4) and similar proteins from vertebrates and some species of arthropods. This protein seem to be involved in metabolic detoxification. The specific function of this domain is still unknown.
