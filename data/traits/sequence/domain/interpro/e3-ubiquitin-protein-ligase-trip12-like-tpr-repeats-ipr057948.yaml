identifier: InterPro:IPR057948
label: "E3 ubiquitin-protein ligase TRIP12-like, TPR repeats"
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found at the N-terminal end of human E3 ubiquitin-protein ligase TRIP12 and similar eukaryotic proteins, including Ufd4 from budding yeasts and UPL3/4 from Arabidopsis. TRIP12 is involved in the ubiquitin fusion degradation pathway and regulation of DNA repair , ]. This protein plays an important role in nervous system development and function. UPL3 is involved in ubiquitination and subsequent proteasomal degradation of target proteins and in the repression of the endoreduplication process and the cell morphogenesis in the trichomes.
