identifier: InterPro:IPR007850
label: RCSD
definition: >-
  Proteins containing this region include Caenorhabditis elegans, UNC-89. This region is found repeated in UNC-89 and shows conservation in prolines, lysines and glutamic acids. Proteins with RCSD are involved in muscle M-line assembly, but the function of this region RCSD is not clear.
