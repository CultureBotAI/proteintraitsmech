identifier: InterPro:IPR057274
label: "Crescentin, N-terminal domain"
definition: >-
  This entry represents the short N-terminal domain of intermediate filament-like cell shape determinant crescentin (CreS) found in caulobacterales. According to structure predictions, this domain adopts an α-helical configuration. CreS is the bacterial equivalent to Intermediate Filament (IF) proteins from eukaryotes. Its cytoskeletal function is required for the vibrioid and helical shapes of Caulobacter crescentus in which it was seen that without CreS, the cells adopt a straight-rod morphology. This protein, similarly to IF proteins, can assemble itself into filaments in vitro with no need of energy or additional cofactors. In vivo, it forms a helical structure that colocalises with the inner cell curvatures beneath the cytoplasmic membrane. CreS possesses the typical tripartite IF-like domain architecture found in IF proteins, which contains a coiled-coil rod domain with short head (N-terminal) and tail (C-terminal) domains.
