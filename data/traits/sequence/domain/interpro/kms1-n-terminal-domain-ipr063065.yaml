identifier: InterPro:IPR063065
label: "KMS1, N-terminal domain"
definition: >-
  This entry represents the N-terminal cytoplasmic domain of KMS1 (Killing Me Slowly 1) and related proteins found in eukaryotes. KMS1 is an endoplasmic reticulum membrane protein involved in the early secretory pathway, required for correct export of secretory products from the ER and maintenance of ER integrity. The protein is a multi-pass transmembrane protein belonging to the VMP1 family. This N-terminal domain precedes the six transmembrane helices and is located in the cytoplasm.
