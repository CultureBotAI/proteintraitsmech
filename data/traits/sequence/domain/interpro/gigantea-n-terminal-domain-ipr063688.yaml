identifier: InterPro:IPR063688
label: "GIGANTEA, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of GIGANTEA proteins found in plants. The full-length GIGANTEA protein is involved in regulation of circadian rhythm and photoperiodic flowering. GIGANTEA belongs to a distinct protein family and is localised to both the nucleus and cytoplasm. The protein stabilises photoreceptors ADO1/ZTL and ADO3, and interacts with multiple transcription factors and regulatory proteins via its N-terminal region. GIGANTEA shows circadian expression patterns with peak levels occurring 8-10 hours into the light period. A crystal structure is available for a large portion of the Arabidopsis protein ( ) showing predominantly helical architecture. While the full-length protein has well-characterised roles in circadian clock regulation and flowering control, the specific function of this domain remains to be determined.
