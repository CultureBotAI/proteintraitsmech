identifier: InterPro:IPR022643
label: Orn/DAP/Arg decarboxylase 2, C-terminal
definition: >-
  These enzymes are collectively known as group IV decarboxylases. Pyridoxal-dependent decarboxylases acting on ornithine, lysine, arginine and related substrates can be classified into two different families on the basis of sequence similarities. Members of this family while most probably evolutionary related, do not share extensive regions of sequence similarities. The proteins contain a conserved lysine residue which is known, in mouse ODC, to be the site of attachment of the pyridoxal-phosphate group. The proteins also contain a stretch of three consecutive glycine residues and has been proposed to be part of a substrate-binding region. This entry represents the C-terminal region of the Orn/DAP/Arg decarboxylases.
