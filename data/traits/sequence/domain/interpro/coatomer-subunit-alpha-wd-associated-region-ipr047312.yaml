identifier: InterPro:IPR047312
label: "Coatomer subunit alpha, WD Associated Region"
definition: >-
  This entry represents the WD-associated region of coatomer subunit alpha which consists of a β-propeller and an α-solenoid.. This group represents coatomer subunit alpha, a component of the coatomer, which is a cytosolic protein complex involved in biosynthetic protein transport from the endoplasmic reticulum in eukaryotic cells. Coatomer complexes are hetero-oligomers composed of at least an alpha, beta, beta', gamma, delta, epsilon and zeta subunit. It is a heptameric complex that can polymerize into a cage to deform the membrane into a bud. In mammals, the coatomer can only be recruited by membranes associated to ADP-ribosylation factors (ARFs), which are small GTP-binding proteins; the complex also influences the Golgi structural integrity, as well as the processing, activity, and endocytic recycling of LDL receptors. Structural studies show the homo-oligomerization of this protein plays a key role in the stability of the coat complex. It is composed of β-propellers and extended α-solenoids. In humans, defects in its expression are related to primary immunodeficiencies that lead to immune dysregulation, arthritis and interstitial lung disease. This protein has also been related to Alzheimer's disease.
