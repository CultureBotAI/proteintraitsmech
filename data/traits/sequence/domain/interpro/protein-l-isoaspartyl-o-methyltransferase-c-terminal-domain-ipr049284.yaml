identifier: InterPro:IPR049284
label: "Protein-L-isoaspartyl O-methyltransferase, C-terminal domain"
definition: >-
  Protein-L-isoaspartyl O-methyltransferase (PIMT) from Thermotoga maritima is a conserved and nearly ubiquitous enzyme involved in the repair of proteins damaged by age-related isoaspartyl formation. PIMT consists of three domains. This entry represents its C-terminal domain, which shows a five-stranded β meander flanked on both sides by α-helices. Its function is unknown.
