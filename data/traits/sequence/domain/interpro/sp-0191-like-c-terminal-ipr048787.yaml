identifier: InterPro:IPR048787
label: "SP_0191-like, C-terminal"
definition: >-
  This entry represents a domain predominantly found in streptococcus. Members include a lipoprotein from Streptococcus pneumoniae, whose structure is known and consists of six-stranded antiparallel β-sheet packed on one side with helices. The function of this domain is unknown. This domain is always found C-terminal to a lipoprotein lipid attachment site suggesting that it may be associated with the membrane.
