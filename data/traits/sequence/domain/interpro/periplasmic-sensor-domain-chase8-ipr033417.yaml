identifier: InterPro:IPR033417
label: "Periplasmic sensor domain CHASE8"
definition: >-
  CHASE8 is a conserved periplasmic sensor domain found in histidine kinases, diguanylate cyclases/phosphodiesterases and methyl-accepting chemotaxis proteins, including the diguanylate cyclase DgcN (YfiN) that regulates biofilm formation and motility in Escherichia coli. In Pseudomonas aeruginosa, CHASE8 is the sensor domain in the diguanylate cyclase TpbB that regulates biofilm formation by controlling the levels of extracellular DNA.
