identifier: InterPro:IPR041357
label: "LegC3 N-terminal, Legionellaceae"
definition: >-
  LegC3 (also known as Kinectin 1) is an effector protein secreted by Legionella pneumophila which is believed to act by inhibiting vacuolar fusion. The N-terminal domain of LegC3 is composed of a long discontinuous coiled-coil capped by an antiparallel four-helix bundle that is rigidly connected to the coiled-coil segment. The features responsible for fusion inhibition are located mainly within the N-terminal domain, as this domain alone is sufficient to inhibit vacuole fusion.
