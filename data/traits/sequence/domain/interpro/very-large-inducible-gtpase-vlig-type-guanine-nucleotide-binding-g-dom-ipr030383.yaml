identifier: InterPro:IPR030383
label: Very large inducible GTPASE (VLIG)-type guanine nucleotide-binding (G) domain
definition: >-
  This is the VLIG-type GTPase domain found in the human Up-regulator of cell proliferation (URGCP), Interferon-induced very large GTPase 1 (GVINP1) and related proteins. URGCP may be involved in cell cycle progression through the regulation of cyclin D1 expression. This protein is thought to play an important role in development of gastric cancer. GVINP1 is a member of the very large inducible GTPases family, which are strongly induced by interferons. GVINP1 contributes to cell-autonomous resistance against pathogens, including bacteria, viruses, and protozoa. The P-loop guanosine triphosphatases (GTPases) control a multitude of biological processes, ranging from cell division, cell cycling, and signal transduction, to ribosome assembly and protein synthesis. GTPases exert their control by interchanging between an inactive GDP-bound state and an active GTP-bound state, thereby acting as molecular switches. The common denominator of GTPases is the highly conserved guanine nucleotide-binding (G) domain that is responsible for binding and hydrolysis of guanine nucleotides. The very large inducible GTPase (VLIG) family contributes to the cellular response to both type I and type II interferons (IFNs). Phylogenetically, the VLIG family is relatively old, since there are representatives in zebrafish and salmon. The potential GTP-binding activity of mouse VLIG-1, the prototype VLIG, possesses a classical GTP-binding sequence motif. The G1 or P-loop (G- x(4)-G-K-S) and G3 (D-x(2)-G) motifs are both present in a canonical form. The G4 motif ([NT]-K-x-D), associated in canonical GTPases with contact to the guanine base, is not immediately apparent.
