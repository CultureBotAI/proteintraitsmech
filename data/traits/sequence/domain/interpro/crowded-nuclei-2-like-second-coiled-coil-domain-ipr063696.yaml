identifier: InterPro:IPR063696
label: "CROWDED NUCLEI 2-like, second coiled-coil domain"
definition: >-
  This entry represents the second coiled-coil domain found in CRWN (CROWDED NUCLEI) proteins in flowering plants. This domain is found C-terminal to the CRWN N-terminal domain . Proteins in this entry also include NMCP1A/B from rice. NMCP1B, also known as OsNMCP1, regulates drought resistance and root growth through chromatin accessibility. CRWN proteins are components of SUN-protein-containing LINC complexes that link the nucleoskeleton and cytoskeleton. These proteins are required for nuclear size control and heterochromatin organisation.
