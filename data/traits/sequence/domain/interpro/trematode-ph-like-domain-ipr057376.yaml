identifier: InterPro:IPR057376
label: "Trematode, PH-like domain"
definition: >-
  This entry represents an uncharacterised family of PH-like domains found in trematode proteins. Trematodes are a class of flatworms. They are obligate internal parasites with a complex life cycle requiring at least two hosts.
