identifier: InterPro:IPR041952
label: "STARD11, START domain"
definition: >-
  This entry represents the steroidogenic acute regulatory protein (StAR)-related lipid transfer (START) domain of STARD11. STARD11 is also known as Collagen type IV alpha-3-binding protein, or COL4A3BP. STARD11 acts as a non-vesicular ceramide-carrier protein. STARD11 is synthesized from two major transcripts: a long one encoding Goodpasture-antigen-binding protein (GPBP), also named CERTL; and a shorter one lacking one exon, GPBPdelta26/CERT (also known as CERT). It is likely that these two carry out different functions in specific sub-cellular locations. GPBP/CERTL exists in multiple isoforms originating from alternative translation initiation sites and post-translational modifications. Recombinant STARD11 binds and phosphorylates Goodpasture antigen, the C-terminal region of the alpha3 chain of collagen IV, which is involved in the autoimmune disease Goodpasture disease.
