identifier: InterPro:IPR057049
label: "PARP14-like, eighth type I KH domain"
definition: >-
  This domain is found in human Protein mono-ADP-ribosyltransferase PARP14 and related proteins including mono-ADP-ribosyltransferase PARP9. It is a KH domain found eighth in PARP14. PARP14 is a large multidomain protein which in the N-terminal half contains a series of consecutive RRM and KH domains that are known to be nucleic acid-binding. PARP14 is involved in multiple signaling pathways linked to cancer, inflammation, and infection. PARP14 is an ADP-ribosyltransferase that mediates mono-ADP-ribosylation of glutamate residues on target proteins. In contrast to PARP1 and PARP2, it is not able to mediate poly-ADP-ribosylation. PARP9 in association with E3 ligase DTX3L, plays a role in DNA damage repair and in immune responses including interferon-mediated antiviral defenses. It suppresses PARP14-mediated STAT6 ADP-ribosylation. During DNA repair, PARP1 recruits PARP9/BAL1-DTX3L complex to DNA damage sites via PARP9 binding to ribosylated PARP1. PARP9 is a multidomain protein, predicted to contain only a single KH domain.
