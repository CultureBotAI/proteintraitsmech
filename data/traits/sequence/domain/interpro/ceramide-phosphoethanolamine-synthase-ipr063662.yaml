identifier: InterPro:IPR063662
label: "Ceramide phosphoethanolamine synthase"
definition: >-
  This entry represents ceramide phosphoethanolamine synthases found in insects. The prototype member Cpes from Drosophila melanogaster is a multi-pass membrane protein that catalyses the biosynthesis of ceramide phosphoethanolamine through transfer of a phosphoethanolamine head group from CDP-ethanolamine to the primary hydroxyl of ceramide. The enzyme requires Mn2 as a cofactor and localises primarily to the Golgi apparatus membrane. Cpes belongs to the CDP-alcohol phosphatidyltransferase class-I family and represents a unique ethanolamine phosphotransferase operating in the Golgi lumen. This entry is involved in sphingolipid metabolism and is found across insects. In some members, this entry may represent a domain associated with varied C-terminal domains.
