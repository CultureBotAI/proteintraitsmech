identifier: InterPro:IPR021961
label: "Type IV methyl-directed restriction enzyme EcoKMcrB subunit, DNA-binding domain"
definition: >-
  This entry represents the DNA-binding domain found at the N-terminal of Type IV methyl-directed restriction enzyme EcoKMcrB subunit (mcrB, also known as 5-methylcytosine-specific restriction enzyme B McrB) from E. coli. McrB recognises N4- and C5-methylcytosine (and 5-hydroxy-methylcytosines) produced by a broad range of DNA methylases and acts against 5-methylcytosine (5mC) preceded by a purine residue.
