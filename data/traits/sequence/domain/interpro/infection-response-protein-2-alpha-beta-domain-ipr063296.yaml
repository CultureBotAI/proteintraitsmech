identifier: InterPro:IPR063296
label: "Infection response protein 2, alpha/beta domain"
definition: >-
  This entry represents a domain of infection response protein 2 (IRG-2), found in nematodes. This domain comprises approximately 160 amino acids (in C. elegans IRG-2) and is part of proteins involved in innate immunity. The full-length IRG-2 protein confers resistance to virulent strains of Gram-negative bacterium Pseudomonas aeruginosa via the zip-2 pathway. IRG-2 is induced as part of immune responses to translational inhibition arising from P. aeruginosa infection or exposure to cycloheximide. While the full-length protein has been characterised functionally, the specific function of this N-terminal domain remains to be determined. The domain is found across nematode species within the IRG-2 protein.
