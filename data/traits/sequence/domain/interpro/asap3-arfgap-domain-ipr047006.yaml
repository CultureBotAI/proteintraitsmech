identifier: InterPro:IPR047006
label: "ASAP3, ArfGAP domain"
definition: >-
  The Arf GAPs (GTPase-activating proteins) are a family of multidomain proteins with the common function of accelerating the hydrolysis of GTP bound to Arf proteins. ASAP proteins are a subtype of Arf GAPs. ASAP3 (Arf-GAP with SH3 domain, ANK repeat and PH domain-containing protein 3, also known as ACAP4, DDEFL1 (Development and Differentiation Enhancing Factor-Like 1), or centaurin beta-6), is a focal adhesion-associated Arf GAP that functions in cell migration and invasion of cancers. It is an Arf6-specific GTPase activating protein (GAP) and is co-localized with Arf6 in ruffling membranes upon EGF stimulation. ASAP3 promotes cell proliferation, being implicated in the pathogenesis of hepatocellular carcinoma and plays a role in regulating cell migration and invasion. ASAP3 (Arf-GAP with SH3 domain, ANK repeat and PH domain-containing protein 3) contains an N-terminal BAR domain, followed by a Pleckstrin homology (PH) domain, an Arf GAP domain and ankyrin (ANK) repeats. Unlike ASAP1 and ASAP2, ASAP3 do not have an SH3 domain at the C-terminal. This entry represents the ArfGAP domain of ASAP3. Similar to ASAP1, the GAP activity of ASAP3 is strongly enhanced by PIP2 via PH domain. Like ASAP1, ASAP3 associates with focal adhesions and circular dorsal ruffles. However, unlike ASAP1, ASAP3 does not localize to invadopodia or podosomes. ASAP1 and 3 have been implicated in oncogenesis, as ASAP1 is highly expressed in metastatic breast cancer and ASAP3 in hepatocellular carcinoma.
