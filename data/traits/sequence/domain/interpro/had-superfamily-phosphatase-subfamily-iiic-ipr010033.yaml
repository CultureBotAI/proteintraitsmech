identifier: InterPro:IPR010033
label: "HAD-superfamily phosphatase, subfamily IIIC"
definition: >-
  This entry represents the IIIC subfamily of the Haloacid Dehalogenase (HAD) superfamily of aspartate nucleophile hydrolases. Subfamily III, which includes subfamily IIIA ( ) and subfamily IIIB ( ) contains sequences which do not contain either of the insert domains between the 1st and 2nd conserved catalytic motifs, subfamily I ( , , , and ), or between the 2nd and 3rd, subfamily II ( , and ). Subfamily IIIC contains five relatively distantly related clades: a family of viral proteins ( ), a family of eukaryotic proteins called MDP-1 and a family of archaeal proteins most closely related to MDP-1 ( ), a family of bacteria including the Streptomyces FkbH protein ( ), and a small clade including the Pasteurella multocida BcbF and EcbF proteins. The overall lack of species overlap among these clades may indicate a conserved function, but the degree of divergence between the clades and the differences in architecture outside of the domain in some clades warns against such a conclusion. No member of this subfamily is characterised with respect to function, however the MDP-1 protein is a characterised phosphatase. All of the characterised enzymes within subfamily III are phosphatases, and all of the active site residues characteristic of HAD-superfamily phosphatases are present in subfamily IIIC.
