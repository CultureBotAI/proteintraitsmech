identifier: InterPro:IPR061908
label: "Domain of unknown function DUF8847"
definition: >-
  This family represents a small domain of approximately 69 amino acids found in uncharacterised proteins from Actinobacteria, particularly Streptomyces, Micromonospora, and Pseudonocardiaceae. It contains a conserved FxGGpxDG sequence motif. This domain is predicted to fold into an open five-stranded β-barrel.
