identifier: InterPro:IPR043866
label: "E3 ubiquitin-protein ligase TTC3/DZIP3 domain"
definition: >-
  This domain is found in E3 ubiquitin-protein ligase TTC3 and DZIP3, its function is unknown. TTC3 mediates ubiquitination and degradation of phosphorylated Akt, which seems to be its preferable target. DZIP3 is able to bind RNA through a Lys-rich region, which enhances its ubiquitination activity. It is suggested that RNA-binding proteins or ribonucleoprotein particles (RNPs) might be physiological targets for this enzyme, which could be important during viral infections as the ubiquitin process also mediates virus budding, especially for those replicating through RNA intermediates.
