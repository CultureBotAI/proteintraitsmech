identifier: InterPro:IPR039445
label: "Transcriptional regulator DauR-like, HTH domain"
definition: >-
  This domain is a helix-turn-helix domain that is likely to act as a DNA-binding domain. This domain can be found in DauR, a transcriptional regulator that represses the dauBAR operon in Pseudomonas aeruginosa.
