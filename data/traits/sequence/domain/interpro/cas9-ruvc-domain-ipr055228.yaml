identifier: InterPro:IPR055228
label: "Cas9, RuvC domain"
definition: >-
  This entry represent a RuvC endonuclease domain found in CRISPR-Cas9 from Streptococcus pyogenes and related sequences, mainly from firmicutes. This domain, and the HNH ( ) domain of Cas9, are used to cleave the DNA strands complementary (target) and non-complementary (non-target) to the crRNA, respectively. This domain is related to .
