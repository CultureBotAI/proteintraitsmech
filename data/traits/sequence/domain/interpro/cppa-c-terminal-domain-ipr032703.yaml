identifier: InterPro:IPR032703
label: "CppA, C-terminal domain"
definition: >-
  This is the C-terminal domain of the CppA protein found mainly in species of Streptococcus. CppA is a putative C3-glycoprotein degrading proteinase, involved in pathogenicity.
