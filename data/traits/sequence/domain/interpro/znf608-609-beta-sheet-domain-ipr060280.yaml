identifier: InterPro:IPR060280
label: "ZNF608/609, beta-sheet domain"
definition: >-
  This entry represents a small β-sheet domain found in Zinc finger proteins 608 and 609 (ZNF608/ZNF609) and similar animal transcription factors. ZNF608 represses the expression of ZNF609, which in turn represses recombination-activating gene 1 (Rag1) and Rag2 expression in thymocytes. Interestingly, ZNF609 generates circular RNA (Cir-ZNF609), a novel kind of noncoding RNA that form loop structures without 5'-3' polarities and polyadenylated tails. Cir-ZNF609 has been found to regulate myoblast proliferation and AKT3 expression. Cir-ZNF609 has also been linked to vascular endothelial dysfunction.
