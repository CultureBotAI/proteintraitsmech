identifier: InterPro:IPR021933
label: "SERRATE/Ars2, N-terminal"
definition: >-
  This domain can be found in the N terminus of the SERRATE (SE) from plants and its homologue, Ars2, from animals. They play a role in nuclear RNA metabolism. They interact with the nuclear cap-binding complex (CBC) and mediates interactions with diverse RNA processing and transport machineries in a transcript-dependent manner. Interestingly, the plant SERRATE does not have the RNA recognition motif (RRM) domain found in metazoans and S. pombe.
