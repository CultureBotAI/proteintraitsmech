identifier: InterPro:IPR049737
label: "BTB/POZ domain-containing protein 6-A-like, BTB and C-terminal Kelch domain"
definition: >-
  This entry represents the BACK (BTB and C-terminal Kelch) domain found in BTB/POZ domain-containing protein 6-A from Danio rerio (Btbd6a) and similar sequences from animals. Btbd6a is an adapter protein for the cul3 E3 ubiquitin-protein ligase complex. It promotes the export of zbtb16/plzf from the nucleus to the cytoplasm, targets zbtb16/plzf for ubiquitination and degradation and up-regulates neurog1 expression and antagonises zbtb16/plzf, to promote neurogenesis. This protein is required for proper embryogenesis and plays an essential evolutionarily-conserved role during neuronal development
