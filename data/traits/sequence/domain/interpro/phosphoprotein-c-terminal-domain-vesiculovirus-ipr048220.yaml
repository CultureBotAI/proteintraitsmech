identifier: InterPro:IPR048220
label: "Phosphoprotein, C-terminal domain, vesiculovirus"
definition: >-
  This entry represents the C-terminal domain of the P protein (phosphoprotein) of plant viruses belonging to the Rhabdoviridae family such as Vesicular stomatitis Indiana virus (VSV). The family Rhabdoviridae belongs to the order Mononegavirales, which are nonsegmented negative-stranded RNA viruses (NNVs). The genomes of NNVs are encapsidated by their nucleocapsid (N) proteins to form N-RNA complexes which serves as a template for transaction and replication. The C-terminal of P protein binds the nucleocapsid. The P protein is an essential component of the RNA polymerase transcription and replication complex; it plays multiple roles in transcription and translation, which include acting as a chaperone of nascent nucleoprotein (N), and as a cofactor of the viral polymerase (L) where P forms a two-subunit polymerase with a large catalytic subunit (L) and stabilizes the polymerase on its template of N-RNA.
