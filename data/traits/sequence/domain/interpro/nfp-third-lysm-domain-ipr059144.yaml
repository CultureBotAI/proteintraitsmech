identifier: InterPro:IPR059144
label: "NFP, third LysM domain"
definition: >-
  This entry represents the third LysM domain (LysM3) found in NFP from Medicago truncatula and related plant proteins. LysM3 also plays a role in infection, although a less important role than that of LysM2. NFP/NFR5 class of receptors are crucial for initial lipochitooligosaccharide (LCO) perception and essential for LCO-mediated root nodule symbiosis. LysM receptor like kinases (LysM-RLKs) are only present in the plant kingdom and they usually have 3 LysM domains (LysM1, LysM2, LysM3) in their extracellular region. The LysM (lysin motif) domain is a small globular domain, approximately 40 amino acids long. It is a widespread protein module involved in binding peptidoglycan in bacteria and chitin in eukaryotes. The domain was originally identified in enzymes that degrade bacterial cell walls, but proteins involved in many other biological functions also contain this domain. It has been reported that the LysM domain functions as a signal for specific plant-bacteria recognition in bacterial pathogenesis. Many of these enzymes are modular and are composed of catalytic units linked to one or several repeats of LysM domains. LysM domains are found in bacteria and eukaryotes. The LysM domain adopts a β-α-α-β fold, according to structure predictions and the crystal structure
