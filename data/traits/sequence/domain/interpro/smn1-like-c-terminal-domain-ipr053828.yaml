identifier: InterPro:IPR053828
label: "SMN1-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in 5'-nucleotidase SMN1 and putative Zn2-dependent 5'-nucleotidases including a nucleotidase from Candida albicans ( ) and a secreted protein ARB_01864 ( ) from Arthroderma benhamiae. This domain adopts a four-layered structure with a five-stranded β-sheet forming the structural core . 5'-nucleotidase SMN1 catalyses the hydrolysis of nucleotide monophosphates, releasing inorganic phosphate and the corresponding nucleoside. This enzyme is thought to play a role in the adaptive response to phosphate limitation, enabling cells to scavenge phosphate from nucleotide substrates when environmental phosphate is scarce.
