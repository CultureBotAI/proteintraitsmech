label: "Protein of unknown function DUF6177"
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000360) is described by MIBiG as an example of the following biosynthetic class, NRP (non-ribosomal peptide). It includes a member from the GE81112 biosynthetic gene cluster from Streptomyces sp. L-49973 and appears to be predominantly found in Actinobacteria.
