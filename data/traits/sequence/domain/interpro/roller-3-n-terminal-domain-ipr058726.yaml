identifier: InterPro:IPR058726
label: "Roller-3, N-terminal domain"
definition: >-
  This entry represents the N-terminal α-helical domain from Roller-3 proteins. According to ECOD this domain shows structural similarity to . Roller-3 is involved in the development and locomotion of organisms. It plays a crucial role in larval development and is thought to contribute to the establishment of posterior morphology during development. Despite containing a protein kinase domain (not this entry), this domain is predicted to be catalytically inactive, suggesting that the family may function through mechanisms other than traditional kinase activity.
