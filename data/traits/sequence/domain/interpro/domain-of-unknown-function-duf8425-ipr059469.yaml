label: "Domain of unknown function DUF8425"
definition: >-
  This domain is found in uncharacterised bacterial proteins. It is predicted to fold into an α-helical structure with similarity to 8-oxoguanine DNA glycosylase-like domains such as and . The structural similarity extends to the active site architecture with some of the active site residues conserved.
