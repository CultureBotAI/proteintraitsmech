label: "Transcriptional regulator TetR, C-terminal, Proteobacteria type"
definition: >-
  This domain can be found in the C terminus of a group of putative tetracycline repressors mostly from Proteobacteria. This domain can also be found in AefR transcriptional regulator from P. syringae.
