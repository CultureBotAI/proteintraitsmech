identifier: InterPro:IPR006887
label: "Serine/threonine-protein phosphatase 4 regulatory subunit 3-like, central domain"
definition: >-
  This entry represents a domain found in Serine/threonine-protein phosphatase 4 regulatory subunit 3A/B/C from humans (P4R3A/B/C, also known as SMEK homologue 1/2/3) and similar proteins from eukaryotes. P4R3B is a regulatory subunit of serine/threonine-protein phosphatase 4 (PP4) that form a complex with its catalytic subunit (PP4c) and regulate its activity. PP4c is involved in developmental progression, chemotaxis, expression of stress response genes and cell movement. The specific function of this domain is still unknown.
