identifier: InterPro:IPR056883
label: "Nephrocystin 3, helical domain"
definition: >-
  This entry represents a mostly helical domain found in nephrocystin-3 (NPHP3) and related proteins from animals. NPHP3 is a protein required for normal ciliary development and function. It inhibits disheveled-1-induced canonical Wnt-signalling activity and may also play a role in the control of non-canonical Wnt signalling which regulates planar cell polarity. Loss of the NPHP3 function results in situs inversus, congenital heart defects, and embryonic lethality in mice.
