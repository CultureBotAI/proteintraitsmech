identifier: InterPro:IPR056446
label: "HPS5, TPR domain, insects"
definition: >-
  This entry represents the TPR domain found at the C-terminal of HPS5 protein from insects, a component of the biogenesis of lysosome-related organelles complex-2 (BLOC-2). Its mutation or absence has been linked to eye-colour mutations. The function of this domain is unknown.
