identifier: InterPro:IPR026345
label: "Adhesin isopeptide-forming adherence domain"
definition: >-
  This entry represents a domain with a conserved Lys and Asn that form an intramolecular isopeptide bond. The domain is found in a variety of proteins, including cell-surface adhesins and members of the Antigen I/II family.
