identifier: InterPro:IPR046523
label: "U3 small nucleolar RNA-associated protein 20 domain"
definition: >-
  This region of tetratricopeptide-like (TPR) repeats is found towards the C-terminal the U3 small nucleolar RNA-associated protein 20 (UTP20) from yeast and its human homologue, also known as Small subunit processome component 20 homolog or DRIM (Down-Regulated In Metastasis) ( ). DRIM is differentially expressed in metastatic and non-metastatic human breast carcinoma cells. Proteins of this entry are involved in processing of non-coding RNA as components of the small-subunit (SSU) processome; SSU processome is involved in the biogenesis of the 18S rRNA. UTP20 is a huge α-solenoid that functions as a scaffold.
