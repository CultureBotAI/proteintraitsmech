identifier: InterPro:IPR022750
label: "Interferon regulatory factor 2-binding protein 1/2-like, zinc finger"
definition: >-
  Interferon regulatory factor 2-binding protein 1 and 2 (IRF-2BP1/2) and their homologue IRF-2BP-like (also known as IRF-2BPL or C14orf4) ( ) are nuclear transcriptional repressor proteins that bind to the C-terminal repression domain of IRF-2 and can inhibit both enhancer-activated and basal transcription. They contain N-terminal zinc finger and C-terminal RING finger domains. Mutations in IRF2BP2 are responsible for a Familial Form of Common Variable Immunodeficiency Disorder (CVID), one of the most frequently diagnosed forms of primary immunodeficiency characterised by low quantity of IgG and IgA and poor specific antibody production. IRF2BPL may play a role in the development of the central nervous system and in neuronal maintenance. This entry represents the N-terminal zinc finger domain of IRF-2BP1 and IRF-2BP2.
