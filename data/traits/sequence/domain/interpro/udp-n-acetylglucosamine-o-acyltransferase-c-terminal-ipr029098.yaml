identifier: InterPro:IPR029098
label: "UDP N-acetylglucosamine O-acyltransferase, C-terminal"
definition: >-
  This is the C-terminal domain of UDP N-acetylglucosamine O-acyltransferase. This enzyme is a zinc-dependent enzyme that catalyses the deacetylation of UDP-3-O-((R)-3-hydroxymyristoyl)-N-acetylglucosamine to form UDP-3-O-(R-hydroxymyristoyl)glucosamine and acetate.
