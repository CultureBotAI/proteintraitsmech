identifier: InterPro:IPR015210
label: Type II restriction enzyme NaeI
definition: >-
  This restriction endonuclease NaeI domain adopts a secondary structure consisting of nine α-helices, six 3-10 helices and 13 β-strands. NaeI binds two GCC-CGG recognition sequences to cleave DNA into blunt-ended products. There are four classes of restriction endonucleases: types I, II, III and IV. All types of enzymes recognise specific short DNA sequences and carry out the endonucleolytic cleavage of DNA to give specific double-stranded fragments with terminal 5'-phosphates. They differ in their recognition sequence, subunit composition, cleavage position, and cofactor requirements, as summarised below: Type I enzymes ( ) cleave at sites remote from recognition site; require both ATP and S-adenosyl-L-methionine to function; multifunctional protein with both restriction and methylase ( ) activities. Type II enzymes ( ) cleave within or at short specific distances from recognition site; most require magnesium; single function (restriction) enzymes independent of methylase. Type III enzymes ( ) cleave at sites a short distance from recognition site; require ATP (but doesn't hydrolyse it); S-adenosyl-L-methionine stimulates reaction but is not required; exists as part of a complex with a modification methylase methylase ( ). Type IV enzymes target methylated DNA. Type II restriction endonucleases ( ) are components of prokaryotic DNA restriction-modification mechanisms that protect the organism against invading foreign DNA. These site-specific deoxyribonucleases catalyse the endonucleolytic cleavage of DNA to give specific double-stranded fragments with terminal 5'-phosphates. Of the 3000 restriction endonucleases that have been characterised, most are homodimeric or tetrameric enzymes that cleave target DNA at sequence-specific sites close to the recognition site. For h…
