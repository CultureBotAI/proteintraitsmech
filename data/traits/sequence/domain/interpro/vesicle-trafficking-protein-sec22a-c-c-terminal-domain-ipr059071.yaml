identifier: InterPro:IPR059071
label: "Vesicle-trafficking protein SEC22a/c, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of human SEC22a and SEC22c and similar animals proteins. This domain is found associated to and is predicted to fold into four α helices. This domain is not found in other SEC22 proteins such as SEC22b and Vesicle-associated membrane protein 7. Vesicle-trafficking protein SEC22a and SEC22c are involved in vesicle transport between the ER and the Golgi complex.
