identifier: InterPro:IPR046883
label: "Type VI secretion system, FHA domain-containing protein, C-terminal domain"
definition: >-
  This entry represents a presumed domain found at the C-terminal of a group of proteins thought to be expressed in a Type VI secretion system locus in proteobacteria. These proteins contain an N-terminal FHA domain. The function of this domain is unknown.
