identifier: InterPro:IPR056452
label: "DNA topoisomerase 3-beta, zinc ribbon domain"
definition: >-
  This domain is found in human DNA topoisomerase 3-beta (TOP3B) and related proteins predominantly from animals and plants. TOP3B, a recently identified member of the topoisomerase superfamily, is essential for chromosome stability, including in cancer cells. The domain represented by this entry is predicted to adopt a zinc ribbon fold. It contains a pair of invariant CxxC sequence motifs.
