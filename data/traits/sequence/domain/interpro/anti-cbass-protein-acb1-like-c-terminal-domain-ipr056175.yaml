identifier: InterPro:IPR056175
label: "Anti-CBASS protein Acb1-like, C-terminal domain"
definition: >-
  This domain is found at the N terminus end of Anti-CBASS protein Acb1 from Sphingomonas paeninsulae, covering the whole length of the protein in Bacteriophage T4 and in related sequences from tailed bacteriophages and proteobacterial prophages. Abc1 counteracts or regulates the endogenous CBASS (cyclic oligonucleotide-based antiphage signalling system) antiviral defence system. It is a phosphodiesterase that enables metal-independent hydrolysis of the host cyclic di- and trinucleotide CBASS signals such as 3'3'-cGAMP, 3'3'cUA, and 3'3'3'-cAAA.
