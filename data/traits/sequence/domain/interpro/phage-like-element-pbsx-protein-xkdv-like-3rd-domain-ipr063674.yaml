identifier: InterPro:IPR063674
label: "Phage-like element PBSX protein XkdV-like, 3rd domain"
definition: >-
  This entry represents the third domain of phage-like element PBSX protein XkdV from Bacillus subtilis and related Bacillales. XkdV is part of the PBSX prophage element and shows similarity to protein YqcC from the same organism. This domain is also found in phage tail fibre proteins and phage-related proteins. In XkdV, the domain is part of a multi-domain architecture that includes (XkdV_N). The function of this domain remains to be determined. This domain is also found in the middle region of the Uncharacterized protein YqcC.
