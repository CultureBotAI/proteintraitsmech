identifier: InterPro:IPR060253
label: "TP_0324, N-terminal domain"
definition: >-
  This entry represents the N-terminal region of TP_0324 proteins. This domain contains a structure with multiple repeating modules comprising five β-sheets followed by a loop, and forms a long hydrophobic groove. The domain is found predominantly in Spirochaetota, with representatives in Treponema and Spirochaeta genera within Spirochaetales order. The function of this domain remains to be determined.
