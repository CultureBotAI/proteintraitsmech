identifier: InterPro:IPR047014
label: "Myelin P0 protein, Ig-like domain"
definition: >-
  This entry represents the immunoglobulin (Ig)-like domain of myelin protein zero (P0), a myelin membrane adhesion molecule. P0 accounts for over 50% of the total protein in peripheral nervous system (PNS) myelin. P0 is a single-pass transmembrane glycoprotein with a highly basic intracellular domain and an Ig domain. The extracellular domain of P0 (P0-ED) is similar to the Ig variable domain, carrying one acceptor sequence for N-linked glycosylation. P0 plays a role in membrane adhesion in the spiral wraps of the myelin sheath. It is thought that homophilic interactions of the P0 extracellular domain mediate membrane juxtaposition in the extracellular space of PNS myelin.
