identifier: InterPro:IPR057350
label: "Thrombomodulin-like domain"
definition: >-
  This domain is found in human Thrombomodulin (THBD) and similar animal proteins. THBD is an endothelial cell receptor that plays a critical role in regulating several physiological processes including hemostasis, coagulation, fibrinolysis, inflammation, and angiogenesis. This domain adopts a mainly β configuration. This entry also includes Endoliasin, a cell surface glycoprotein that plays diverse roles in biological processes including angiogenesis, immune response modulation, and tissue remodeling. It enhances pericyte proliferation through positive modulation of PDGF receptor signaling and acts as a scaffold for factor X, facilitating coagulation activation via the TF-factor VIIa complex. Endoliasin interacts with the insulin receptor (INSR), inhibiting its autophosphorylation in response to insulin, while also regulating inflammatory responses in macrophages by promoting proinflammatory cytokine production. Notably, it exhibits differential effects on cell proliferation, negatively regulating T-cell proliferation while enhancing proliferation in stromal cells.
