identifier: InterPro:IPR049516
label: "FAD-dependent protein, C-terminal domain-like"
definition: >-
  This domain is found towards the C-terminal of a group of bacterial, archaeal and plant FAD-linked dehydrogenases, whose exact function is not yet clear. This domain is inserted in the FAD/NAD(P)-binding domain.
