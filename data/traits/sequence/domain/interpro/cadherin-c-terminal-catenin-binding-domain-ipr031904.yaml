identifier: InterPro:IPR031904
label: "Cadherin, C-terminal catenin-binding domain"
definition: >-
  This is the cytoplasmic catenin-binding domain found at the C terminus of cadherin. This domain binds to the ARM domain of beta-catenin, a catenin that plays a crucial role in the regulation of cell-cell adhesion at adherens junctions (AJs).
