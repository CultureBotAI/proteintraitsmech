identifier: InterPro:IPR041984
label: "Rsc8/Ssr1/Ssr2, zinc finger, ZZ-type"
definition: >-
  This entry represents the ZZ-type zinc finger found in budding yeast Rsc8 and related proteins, such as Ssr1/Ssr2 from fission yeasts. Rsc8 is a component of the RSC complex, which is closely related to the SWI/SNF complex and is involved in remodeling chromatin structure. The ZZ motif coordinates a zinc ion and most likely participates in ligand binding or molecular scaffolding.
