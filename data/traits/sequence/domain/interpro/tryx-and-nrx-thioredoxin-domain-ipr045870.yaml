identifier: InterPro:IPR045870
label: TryX and NRX, thioredoxin domain
definition: >-
  This entry represents the thioredoxin domain found in tryparedoxin (TryX) from trypanosomes and nucleoredoxin (NRX) from animals and plants. They belong to the Thioredoxin (TRX) family, whose members are evolutionary conserved proteins involved in various biologic processes by regulating the response to oxidative stress. TryX and NRX are disulfide oxidoreductases that alter the redox state of target proteins via the reversible oxidation of an active centre CXXC motif. TryX is involved in the regulation of oxidative stress in parasitic trypanosomatids by reducing TryX peroxidase, which in turn catalyses the reduction of hydrogen peroxide and organic hydroperoxides. TryX derives reducing equivalents from reduced trypanothione, a polyamine peptide conjugate unique to trypanosomatids, which is regenerated by the NADPH-dependent flavoprotein trypanothione reductase.
