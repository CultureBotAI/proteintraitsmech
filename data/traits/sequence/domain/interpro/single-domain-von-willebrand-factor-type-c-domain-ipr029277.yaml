identifier: InterPro:IPR029277
label: "Single domain Von Willebrand factor type C domain"
definition: >-
  This entry represents the von Willebrand factor type C (SVWC) domain. The canonical pattern of most von Willebrand factor type C (VWC) domains is of ten cysteines, however proteins in this entry, largely but not exclusively of arthropod proteins, contains only eight. SVWC domain containing proteins respond to environmental challenges, such as bacterial infection and nutritional status. They also are involved in anti-viral immunity, and all of these functions seem linked to SVWC expression being induced by Dicer2.
