identifier: InterPro:IPR064066
label: "NLRC3, LRR domain"
definition: >-
  This entry represents the LRR domain found in the human NLR family CARD domain-containing protein 3 (NLRC3) and related proteins. NLRC3 is a negative regulator of the innate immune response. It Attenuates signalling pathways activated by Toll-like receptors and the DNA sensor STING/TMEM173 in response to pathogen- associated molecular patterns, such as intracellular poly(dA:dT), but not poly(I:C), or in response to DNA virus infection, including that of Herpes simplex virus 1.
