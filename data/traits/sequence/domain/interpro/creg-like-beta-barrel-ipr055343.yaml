identifier: InterPro:IPR055343
label: "CREG-like, beta-barrel"
definition: >-
  This entry represents the β-barrel domain found in CREG (cellular repressor of E1A-stimulated genes) proteins from animals and closely homologues from plants, fungi and bacteria. CREG is a secreted glycoprotein that inhibits proliferation and enhances differentiation of human embryonal carcinoma cells. This domain has similarity to FMN-binding split barrel domains ( ). It forms a tight homodimer that, unlike its closely related structural homologues, it does not bind flavin mononucleotide as the putative flavin mononucleotide-binding pocket in CREG is sterically blocked by a loop and several key bulky residues. The structure of this domain from bacterial and plant proteins, revealed that it is involved in heme binding, such as and.
