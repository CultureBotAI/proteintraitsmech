identifier: InterPro:IPR010420
label: "CASTOR/POLLUX/SYM8 ion channel, conserved domain"
definition: >-
  This entry represents a short region in the middle of proteins that belong to the CASTOR/POLLUX/SYM8 family of ion channels, which are found in plants. They have been implicated in modulating the nuclear membrane envelope potential. Proteins containing this domain also include uncharacterised bacterial proteins.
