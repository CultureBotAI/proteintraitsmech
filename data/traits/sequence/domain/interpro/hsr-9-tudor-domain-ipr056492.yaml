identifier: InterPro:IPR056492
label: "Hsr-9, Tudor domain"
definition: >-
  This entry represents the tandem Tudor domains of Hsr-9 (also known as TP53-binding protein 1) from C. elegans and similar proteins mainly from nematodes. Hsr-9 may have a role in DNA double-strand break repair following gamma-irradiation.
