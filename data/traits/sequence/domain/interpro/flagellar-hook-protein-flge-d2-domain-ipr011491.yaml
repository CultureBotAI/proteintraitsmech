identifier: InterPro:IPR011491
label: "Flagellar hook protein FlgE, D2 domain"
definition: >-
  This domain is found in several bacterial FlgE flagellar hook proteins. The flagellar hook is a short, curved, extracellular structure located between the basal body and the filament.
