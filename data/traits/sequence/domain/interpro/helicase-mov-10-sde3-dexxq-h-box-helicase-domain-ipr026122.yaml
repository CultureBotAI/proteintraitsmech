identifier: InterPro:IPR026122
label: Helicase MOV-10/SDE3, DEXXQ/H-box helicase domain
definition: >-
  This entry represents DEXXQ/H-box helicase domain in RNA helicase MOV-10 from animals and Probable RNA helicase SDE3 from plants. MOV-10 (moloney leukemia virus 10 protein) is the human homologue of Drosophila melanogaster Armitage (armi). Human MOV-10 is a 5' to 3' RNA helicase required for RNA-mediated gene silencing by the RNA-induced silencing complex (RISC). It has been shown to interact with fragile X messenger ribonucleoprotein 1 (FMRP) and regulates miRNA-mediated translational repression by AGO2. Interestingly, it interacts with retrotransposons and acts as a potent inhibitor of retrotransposition in cells. This protein is required for RNA-directed transcription and replication of the human hepatitis delta virus (HDV). It interacts with small capped HDV RNAs derived from genomic hairpin structures that mark the initiation sites of RNA-dependent HDV RNA transcription.
