identifier: InterPro:IPR028657
label: Sorting nexin-6, BAR domain
definition: >-
  Sorting nexins (SNXs) are a diverse group of cellular trafficking proteins that are unified by the presence of a phospholipid-binding motif, the PX domain. The ability of these proteins to bind specific phospholipids, as well as their propensity to form protein-protein complexes, points to a role for these proteins in membrane trafficking and protein sorting. SNX6 was found to interact with members of the transforming growth factor-beta family of receptor serine/threonine kinases. Strong heteromeric interactions were also seen among SNX1, -2, -4, and -6, suggesting the formation in vivo of oligomeric complexes. SNX6 forms a stable complex with SNX1 and may be a component of the retromer complex, a membrane coat multimeric complex required for endosomal retrieval of lysosomal hydrolase receptors to the Golgi, acting as a mammalian equivalent of yeast Vsp17p. It also plays roles in enhancing the degradation of EGFR and in regulating the activity of Na,K-ATPase through its interaction with Translationally Controlled Tumor Protein (TCTP). SNX6 is localized in the cytoplasm where it is thought to target proteins to the trans-Golgi network. In addition, SNX6 was found to be translocated from the cytoplasm to nucleus by Pim-1, an oncogene product of serine/threonine kinase. This translocation is not affected by Pim-1-dependent phosphorylation, but the functional significance is unknown. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions. This entry represents the BAR domain is SNX6.
