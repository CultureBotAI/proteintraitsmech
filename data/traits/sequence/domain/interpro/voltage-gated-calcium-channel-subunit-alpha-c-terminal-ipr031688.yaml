label: "Voltage-gated calcium channel subunit alpha, C-terminal"
definition: >-
  This entry represents the C-terminal region of voltage-gated calcium channel subunit alpha in vertebrates and arthropods. The exact function of this domain is not known. This region lies immediately downstream from the CDB motif.
