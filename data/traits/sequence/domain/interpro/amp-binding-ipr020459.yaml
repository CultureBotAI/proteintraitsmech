identifier: InterPro:IPR020459
label: AMP-binding
definition: >-
  A number of prokaryotic and eukaryotic enzymes, which appear to act via an ATP-dependent covalent binding of AMP to their substrate, share a region of sequence similarity. This region is a Ser/Thr/Gly-rich domain that is further characterised by a conserved Pro-Lys-Gly triplet. The family of enzymes includes Pyochelin synthase PchF and various other closely-related synthases.
