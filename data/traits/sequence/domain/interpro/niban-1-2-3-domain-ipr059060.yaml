identifier: InterPro:IPR059060
label: "Niban 1/2/3 domain"
definition: >-
  This domain is found towards the C-terminal end of human Protein Niban 2 and similar animal proteins, including Niban 1 and 3. Niban2 may play a role in apoptosis suppression and promote melanoma cell invasion in vitro. This entry represents the C-terminal region of the helix bundle domain, which shows a distorted L-shape.
