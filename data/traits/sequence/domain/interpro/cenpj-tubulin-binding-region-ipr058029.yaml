identifier: InterPro:IPR058029
label: "CENPJ, tubulin-binding region"
definition: >-
  This region, also known as PN2-3 domain, is found in the human Centrosomal P4.1-associated protein (CPAP, also known as CENPJ). The region represented by this entry binds and caps the longitudinal surface of the tubulin beta-subunit. This binding site also targeted by fungal and bacterial peptide-like inhibitors of the vinca domain, sharing a very similar binding mode with these compounds. Members of this group are mainly found in vertebrates and arthropods. CENPJ is involved in centriole-length regulation. It allows persistent slow growth of the centriolar microtubule plus end and its overexpression leads to abnormally long microtubules. CENPJ not only inhibits microtubule nucleation from the centrosome, but acts as a microtubule plus-end tracking protein that stabilises centriolar microtubules and inhibits microtubule polymerisation and extension from the distal ends of centrioles.
