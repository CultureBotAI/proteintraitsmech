identifier: InterPro:IPR010723
label: "HemN, C-terminal"
definition: >-
  This domain is found in the C-terminal region of oxygen-independent coproporphyrinogen-III oxidases (HemN). This enzyme catalyses the oxygen-independent conversion of coproporphyrinogen-III to protoporphyrinogen-IX, one of the last steps in haem biosynthesis. The function of this domain is unclear, but comparison to other proteins containing a radical SAM domain suggest it may be a substrate binding domain.
