identifier: InterPro:IPR015230
label: "Carbapenam-3-carboxylate synthase, N-terminal"
definition: >-
  This domain is found in the N-terminal of carbapenam-3-carboxylate synthase (carA), and is composed of two antiparallel six-stranded β-sheets that form a sandwich, flanked on each side by two α-helices.
