identifier: InterPro:IPR063106
label: "Spp1/CFP1, noncanonical C3H-type zinc finger"
definition: >-
  This domain is a noncanonical C3H-type zinc finger found C-terminal to the PHD domain in Spp1/CFP1 proteins. Unlike typical CCCH zinc fingers which use a C-X(7-9)-C-X(4-6)-C-X(3-4)-H motif, this domain employs a C-X(4)-C-X(10)-C-X(3)-H sequence to coordinate a single zinc ion. The domain is required for structural stability of the N-terminal region of Spp1. Spp1 is a component of the COMPASS/Set1C complex that methylates histone H3 at lysine 4. The adjacent PHD domain recognises H3K4me3 while this zinc finger provides structural support.
