identifier: InterPro:IPR037775
label: "C2CD3, C2 domain"
definition: >-
  C2cd3 is a novel C2 domain-containing protein specific to vertebrates. C2cd3 functions in regulator of cilia formation, Hedgehog signaling, and mouse embryonic development. Mutations in C2cd3 mice resulted in lethality in some cases and exencephaly, a twisted body axis, and pericardial edema in others. It is required for centriole elongation. Mutations in the human C2cd3 gene cause Orofaciodigital syndrome 14, which is characterised by malformations of the face, oral cavity, and digits. It plays an important part in centriolar distal appendage assembly and ciliary vesicle docking in mammals. C2 domains fold into an 8-standed β-sandwich that can adopt 2 structural arrangements: type I and type II, distinguished by a circular permutation involving their N- and C-terminal β strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances including bind phospholipids, inositol polyphosphates, and intracellular proteins. Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1. However, there are a few exceptions to this including RIM isoforms and some splice variants of piccolo/aczonin and intersectin which only have a single C2 domain. C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions.
