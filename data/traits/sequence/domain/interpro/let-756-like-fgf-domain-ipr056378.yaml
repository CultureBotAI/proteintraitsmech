identifier: InterPro:IPR056378
label: "Let-756-like, FGF domain"
definition: >-
  This entry represents the FGF domain of Protein let-756 from Caenorhabditis elegans and similar sequences from invertebrates. Let-756 negatively regulates membrane protrusion from body wall muscles during larval development. This domain is predicted to adopt a β-trefoil fold.
