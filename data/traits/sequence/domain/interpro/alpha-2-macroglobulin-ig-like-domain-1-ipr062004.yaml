identifier: InterPro:IPR062004
label: "Alpha-2-macroglobulin, Ig-like domain 1"
definition: >-
  This entry represents the first Ig-like macroglobulin domain found at the N-terminal of some alpha-2-macroglobulin homologues from gamma and betaproteobacteria. It precedes the MG2 domain ( ). Alpha-2-macroglobulins are large protease inhibitors that protect cells from host peptidases. Some bacterial homologues lack the conserved thioester bond characteristic of eukaryotic alpha-2-macroglobulins.
