identifier: InterPro:IPR056930
label: "Transposon Tf2-1-like, C-terminal"
definition: >-
  This is the C-terminal region of Transposon Tf2-1 polyprotein from Schizosaccharomyces pombe (Tf2-1) and similar fungal sequences. This region is predicted to adopt an all-α structure. Members of this group are specific to Schizosaccharomyces. The Tf2-1 polyprotein encodes several functional domains that act in concert during retrotransposition. The aspartyl protease (PR) mediates proteolytic cleavage of the Gag and Gag-Pol polyproteins after assembly of the virus-like particle (VLP). The capsid protein (CA) forms the structural shell of the VLP, encapsulating the genomic RNA-nucleocapsid complex and targeting it to the nucleus, where the pre-integration complex (PIC) containing integrase and the newly synthesised dsDNA must transit the nuclear membrane. Reverse transcriptase/ribonuclease H (RT) is a multifunctional enzyme that converts the RNA genome into dsDNA within the VLP, possessing both DNA polymerase activity (able to copy DNA or RNA templates) and RNase H activity (cleaving RNA from RNA-DNA heteroduplexes during plus-strand synthesis). This conversion produces a linear dsDNA copy flanked by long terminal repeats (LTRs). Unlike typical LTR retrotransposons and retroviruses, Tf2 does not require a tRNA primer; instead, it employs a self-priming mechanism in which the first 11 bp of the mRNA anneal to the primer binding site and are cleaved by RNase H to initiate minus-strand cDNA synthesis. Finally, integrase (IN) catalyses integration of the dsDNA into the host genome.
