identifier: InterPro:IPR041889
label: "Ecdysone receptor, ligand-binding domain"
definition: >-
  The ecdysone receptor (EcR) belongs to the superfamily of nuclear receptors (NRs) of ligand-dependent transcription factors. Ecdysone receptor is present only in invertebrates and regulates the expression of a large number of genes during development and reproduction. EcR functions as a heterodimer by partnering with ultraspiracle protein (USP), the orthologue of the vertebrate retinoid X receptor (RXR). The natural ligands of ecdysone receptor are ecdysteroids, the endogenous steroidal hormones found in invertebrates. In addition, insecticide bisacylhydrazine, used against pests, has shown to act on EcR. EcR must be dimerised with a USP for high-affinity ligand binding to occur. The ligand binding triggers a conformational change in the C-terminal part of the EcR ligand-binding domain that leads to transcriptional activation of genes controlled by EcR. Like other members of the nuclear receptor (NR) superfamily of ligand-activated transcription factors, ecdysone receptors have a central well conserved DNA binding domain (DBD), a variable N-terminal domain, a non-conserved hinge and a C-terminal ligand binding domain (LBD). This entry represent the LBD domain of the ecdysone receptor.
