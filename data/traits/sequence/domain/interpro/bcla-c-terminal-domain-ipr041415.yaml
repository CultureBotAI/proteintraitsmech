identifier: InterPro:IPR041415
label: "BclA, C-terminal domain"
definition: >-
  This is the C-terminal domain of BclA (Bacillus collagen-like protein of anthracis) which is expressed on spores of Bacillus species. Trimers of the C-terminal domain (CTD) form the tips of the spore's hair-like nap and are the immunodominant target of vertebrate antibodies and drive trimerization. Structure analysis indicate the C-terminal region of the peptide folding into an all-β structure with a jelly-fold topology, similar to the first human complement C1q, a member of the tumor necrosis factor (TNF)-like family. The C-terminal globular domain has been shown to be located on the exterior of the exosporium, and therefore is critical in determining the immunogenicity of the spore in a mammalian host.
