identifier: InterPro:IPR021854
label: "WASH1, WAHD domain"
definition: >-
  This entry represents the N-terminal WAHD domain (N-terminal WASH homology regions) of the WASH1 protein, which is a component of the WASH complex that is present at the surface of endosomes and activates the Arp2/3-mediated F-actin polymerisation. This domain covers the conserved WHD1/EVH1 and WHD2 domains. WASH1 interact with FAM21 via its WHD1 domain and binds to tubulin through its WHD2 domain. The WASH complex consists of several subunits: F-actin-capping protein subunit alpha (CAPZA1, CAPZA2 or CAPZA3), F-actin-capping protein subunit beta (CAPZB), WASH (WASH1, WASH2P, WASH3P, WASH4P, WASH5P or WASH6P), FAM21 (FAM21A, FAM21B or FAM21C), KIAA1033, KIAA0196 (strumpellin) and CCDC53.
