identifier: InterPro:IPR046435
label: NSP14, guanine-N7-methyltransferase domain, coronavirus
definition: >-
  The unique coronavirus (CoV) transcription/replication machinery comprised of multiple virus-encoded non structural proteins (NSP) plays a vital role during initial and intermediate phases of the viral life cycle. This entry represents NSP14, encoded as part of polyprotein pp1ab and excised by NSP5. Its N-terminal exoribonuclease (ExoN) domain plays a proofreading role for prevention of lethal mutagenesis, and the C-terminal domain functions as an S-adenosyl methionine (SAM)-dependent (guanine-N7) methyl transferase (N7-MTase) for mRNA capping. NSP14 forms the nsp14-nsp10 complex involved in RNA viral proofreading. This is the NSP14 N7-MTase domain, which comprises a total of twelve β-strands and five α-helices and exhibits a noncanonical MTase fold with a rare β-sheet insertion and a peripheral zinc finger. The fold presents a central five-stranded β-sheet made up of four parallel strands and one antiparallel strand. The central β-sheet is sandwiched between a single α-helix and three long loops punctuated by two small helices. A zinc finger (ZF) motif is located between strand β11 and helix α4 and is important for the proper folding of this region. The cap-precursor guanosine-P3-adenosine-5',5'-triphosphate (GpppA) and SAM bind in proximity in a highly constricted pocket between two β-sheets to accomplish methyl transfer. In comparison with the conventional SAM-binding motif [DEY]-x-G-x-G-x-G, the corresponding conserved motif in CoV N7-MTase is D-x-G-x-P-x-[GA] [ , [:29279395], , , , ].
