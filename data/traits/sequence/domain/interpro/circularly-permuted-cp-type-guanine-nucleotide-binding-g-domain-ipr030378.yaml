identifier: InterPro:IPR030378
label: Circularly permuted (CP)-type guanine nucleotide-binding (G) domain
definition: >-
  The P-loop guanosine triphosphatases (GTPases) control a multitude of biological processes, ranging from cell division, cell cycling, and signal transduction, to ribosome assembly and protein synthesis. GTPases exert their control by interchanging between an inactive GDP-bound state and an active GTP-bound state, thereby acting as molecular switches. The common denominator of GTPases is the highly conserved guanine nucleotide-binding (G) domain that is responsible for binding and hydrolysis of guanine nucleotides. The TRAFAC (named after translation factors) class includes an atypical family characterised by a circularly permuted (CP) order of the GTPase motifs within the G domain: the normal G1-G2-G3-G4-G5 orientation of the G domain has been rearranged to G4(N/T-K-x-D)-G5(T/G-C/S-A)-G1(Walker A, P-loop)-G2(T)-G3(Walker B). Despite such a variation (in motif order) observed at the primary sequence level, which should lead to different topological connections between the secondary structure elements, the three dimensional fold is well preserved. In addition, the GTP-binding site too is well conserved. It has been proposed that the CP-type G domain has evolved due to the duplication of a classical GTPase domain followed by deletion of both N- and C-terminal regions. The CP- type G domain is unlikely to exist as a single domain and is accompanied by at least one additional domain. The CP-type G domain has a typical G domain fold with a central seven-stranded β-sheet (six parallel strands, one antiparallel strand) surrounded by six α-helices. This entry reprsents the entire CP-type G domain. Some proteins known to contain a CP-type G domain are listed below: Bacterial YjeQ (RsgA), composed of a N-terminal oligonucleotide/ oligosaccharide binding (OB-fold) RNA-binding doma…
