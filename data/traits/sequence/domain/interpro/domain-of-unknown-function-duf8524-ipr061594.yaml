identifier: InterPro:IPR061594
label: "Domain of unknown function DUF8524"
definition: >-
  This entry represents a domain of approximately 90-100 residues found in spirochaetes, particularly Treponema species. The domain is located between an N-terminal helix-turn-helix domain and a C-terminal domain in these proteins. The function of this domain remains to be determined.
