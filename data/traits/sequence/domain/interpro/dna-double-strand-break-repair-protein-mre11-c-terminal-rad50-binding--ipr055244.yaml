identifier: InterPro:IPR055244
label: "DNA double-strand break repair protein Mre11, C-terminal Rad50-binding domain, archaea"
definition: >-
  Communication between Mre11 and Rad50 in the MR complex is critical for the sensing, damage signalling, and repair of DNA double-strand breaks. Mre11 protein consists of an N-terminal core domain and a C-terminal domain linked by an extended connecting loop. The C-terminal domain of Mre11 (this entry) is composed of three α-helices and binds to the C-terminal part of the Rad50 coiled-coil.
