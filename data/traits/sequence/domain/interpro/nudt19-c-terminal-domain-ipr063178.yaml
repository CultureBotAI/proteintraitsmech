identifier: InterPro:IPR063178
label: "NUDT19, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain found in NUDT19 (acyl-coenzyme A diphosphatase) proteins in vertebrates. NUDT19 is a peroxisomal enzyme that hydrolyses fatty acyl-CoA to yield acyl-4'-phosphopantetheine and adenosine 3',5'-bisphosphate. The catalytic activity resides in the N-terminal Nudix hydrolase domain, while the protein contains a C-terminal peroxisomal targeting signal (PTS1). The specific function of this C-terminal domain, which lies between the Nudix domain and the PTS1 signal, remains to be determined.
