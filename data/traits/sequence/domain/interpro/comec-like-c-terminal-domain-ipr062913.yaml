identifier: InterPro:IPR062913
label: "ComEC-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of ComEC, a competence protein found in bacteria. ComEC is an inner membrane protein involved in natural transformation, the process by which bacteria take up exogenous DNA from their environment. The protein is found predominantly in Bacteroidota. ComEC typically contains an N-terminal DUF4131 domain ( ) followed by a central competence domain ( ), and this C-terminal domain. The domain architecture and arrangement are highly conserved across family members. The function of this domain remains to be determined.
