label: "Domain of unknown function DUF7074"
definition: >-
  This domain is found in a group of uncharacterised plant proteins. It is predicted to adopt a globular structure with a Cystatin-like topology consisting of a curved four-stranded β-sheet and an α-helix packed on the concave side of it.
