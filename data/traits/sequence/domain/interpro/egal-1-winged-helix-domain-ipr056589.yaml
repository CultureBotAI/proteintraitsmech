identifier: InterPro:IPR056589
label: "Egal-1, winged helix domain"
definition: >-
  This entry represents a winged-helix domain found in three copies in the C. elegans protein Egalitarian (Egal-1). This protein functions as part of a complex with BicaudalD (BicD) and dynein light chain (Dlc-1) to recruit the dynein motor complex to specific cargoes and regulate dynein activity. It interacts with both the BicD-1 and Dlc-1 proteins. Genetic disruption of egal-1 leads to defects in hyp7 nuclear migration, similar to defects seen when disrupting bicd-1 or components of dynein. The egal-1 phenotype is enhanced when combined with a nud-2 mutant, but not enhanced by bicd-1, suggesting egal-1 and bicd-1 function in the same genetic pathway. A model is proposed where BicD-1, Egal-1 and Dlc-1 form a complex that is recruited by the nuclear envelope protein UNC-83. This complex then helps recruit the dynein motor to the nuclear envelope to regulate nuclear migration.
