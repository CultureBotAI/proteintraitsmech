identifier: InterPro:IPR042697
label: "Nuclear receptor-binding protein 2, pseudokinase domain"
definition: >-
  This entry represents the pseudokinase domain found in nuclear receptor binding protein 2 (NRBP2). This domain shows similarity to protein kinases but lacks crucial residues for catalytic activity and/or ATP binding. NRBP2 may be involved in neural progenitor cell survival.
