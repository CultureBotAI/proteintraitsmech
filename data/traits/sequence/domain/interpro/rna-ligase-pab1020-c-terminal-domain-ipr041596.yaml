identifier: InterPro:IPR041596
label: "RNA ligase Pab1020, C-terminal domain"
definition: >-
  This is the C-terminal region of RNA ligase Pab1020 present in Pyrococcus abyssi. Pab1020 catalyzes the nucleotidylation of oligo-ribonucleotides in an ATP-dependent reaction. This region contains both a dimerization domain and a C-terminal domain.
