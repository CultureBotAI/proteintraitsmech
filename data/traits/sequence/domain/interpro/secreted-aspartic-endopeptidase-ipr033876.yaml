identifier: InterPro:IPR033876
label: Secreted aspartic endopeptidase
definition: >-
  SAPs (Secreted aspartic proteinases) are secreted from a group of pathogenic fungi, predominantly Candida species. They are secreted from the pathogen to degrade host proteins. SAP is one of the most significant extracellular hydrolytic enzymes produced by C. albicans. SAP proteins, encoded by a family of 10 SAP genes. All 10 SAP genes of C. albicans encode preproenzymes, approximately 60 amino acid longer than the mature enzyme, which are processed when transported via the secretory pathway. The mature enzymes contain sequence motifs typical for all aspartyl proteinases, including the two conserved aspartate residues other active site and conserved cysteine residues implicated in the maintenance of the three-dimensional structure. Most Sap proteins contain putative N-glycosylation sites, but it remains to be determined which Sap proteins are glycosylated. A variety of fungal secreted aspartic peptidases are included in this entry: barrierpepsin (MEROPS identifier A01.015) candidapepsin SAP1 (A01.014) candidapepsin SAP2 (A01.060) candidapepsin SAP3 (A01.061) candidapepsin SAP4 (A01.062) candidapepsin SAP5 (A01.063) candidapepsin SAP6 (A01.064) candidapepsin SAP7 (A01.065) candidapepsin SAP8 (A01.066) candidapepsin SAP9 (A01.067) candidapepsin SAP10 (A01.085) candiparapsin (A01.038) canditropsin (A01.037) yapsin-1 (A01.030) yapsin-2 (A01.031) These are not all products secreted by pathogenic fungi. Barrierpepsin and yapsins are secreted by Sacchomyces cervisiae. Barrierpepsin is secreted by yeasts of mating type a and processes the alpha-mating factor at the Leu-Lys bond, thereby inactivating it. This is mechanism for optimizing the concentration of the mating factor. Yapsin-1 releases alpha-mating factor from its precursor. Aspartyl proteases (APs), also known as acid…
