identifier: InterPro:IPR047977
label: "UBL3-like, ubiquitin-like domain, metazoan"
definition: >-
  This entry represents the ubiquitin-like domain of UBL3 (Ubiquitin-like protein 3) from metazoan. UBL3, also termed membrane-anchored ubiquitin-fold protein (MUB), or protein HCG-1, belongs to a newly described MUB protein family with structural homology with ubiquitin. UBL3 has been described a regulator of protein sorting to small extracellular vesicles. UBL3 also regulates sorting of MHC II and CD86 in human dendritic cells (DCs) and macrophages. UBL3 proteins have a β-grasp ubiquitin-like (Ubl) domain with longer N- and C-termini and extended loops. The Ubl domain contains a C-terminal CAAX-box, a canonical motif for protein prenylation, which is modified through protein lipidation with a hydrophobic membrane anchor. The lipidation and membrane localisation inhibit attachment of MUBs to target proteins.
