identifier: InterPro:IPR046989
label: "Unconventional myosin-IXb, RA domain"
definition: >-
  Myosin-IXb, also termed myosin-9b (Myo9b), is a motor protein with a Rho GTPase activating domain (RhoGAP); it is an actin-dependent motor protein of the unconventional myosin IX class [ . It is expressed abundantly in tissues of the immune system, like lymph nodes, thymus, and spleen and in several immune cells including dendritic cells, macrophages and CD4. Myosin-IXb contains a Ras-associating (RA) domain, a motor domain, a protein kinase C conserved region 1 (C1), and a RhoGAP domain. This entry represents the RA domain, which is located at its head domain and has the β-grasp ubiquitin-like fold with unknown function. Myosin-IXb acts as a motorized signalling molecule that links Rho signalling to the dynamic actin cytoskeleton. It regulates leukocyte migration by controlling RhoA signalling. Myosin-IXb is also involved in the development of autoimmune diseases, including rheumatoid arthritis, systemic lupus erythematosus and type 1 diabetes. Moreover, Myosin-IXb is a ROBO-interacting protein that suppresses RhoA activity in lung cancer cells.
