identifier: InterPro:IPR019887
label: "Transcription regulator AsnC/Lrp, ligand binding domain"
definition: >-
  The many bacterial transcription regulation proteins which bind DNA through a 'helix-turn-helix' motif can be classified into subfamilies on the basis of sequence similarities. One such family is the AsnC/Lrp subfamily. The Lrp family of transcriptional regulators appears to be widely distributed among bacteria and archaea, as an important regulatory system of the amino acid metabolism and related processes. This entry represents the C-terminal regulatory ligand binding domain of the transcription regulator AsnC/Lrp. Structurally this domain has a dimeric α/β barrel fold. This domain binds almost exclusively amino acids, but also 4-hydroxyphenylpyruvate and kynurenine (Matilla et. al., FEMS Microbiology Reviews, fuab043, 45, 2021, 1. https://doi.org/10.1093/femsre/fuab043).
