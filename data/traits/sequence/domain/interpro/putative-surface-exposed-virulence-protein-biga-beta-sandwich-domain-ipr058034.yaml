identifier: InterPro:IPR058034
label: "Putative surface-exposed virulence protein BigA, beta-sandwich domain"
definition: >-
  This entry represents a β-sandwich domain found in Putative surface-exposed virulence protein BigA from Salmonella typhimurium and similar proteins from proteobacteria. This domain is found adjacent to the C-terminal autotransporter domain and is part of the passenger domain that is transported through the autotransporter barrel. While the autotransporter domain forms a β-barrel for translocation, the specific function of this β-sandwich domain remains to be determined. BigA is an autotransporter protein characterised by a C-terminal outer membrane barrel that facilitates the transport of its passenger domain across the membrane. The N-terminal region contains a variable passenger domain, which is translocated through the barrel. After export, the passenger domain may undergo auto-catalytic cleavage, cleavage by an external protease, or remain uncleaved, depending on the specific protein.
