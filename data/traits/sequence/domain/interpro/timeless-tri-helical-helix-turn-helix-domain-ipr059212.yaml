identifier: InterPro:IPR059212
label: "TIMELESS, tri-helical helix-turn-helix domain"
definition: >-
  This helix-turn-helix (HTH) domain is found twice in human Protein timeless homolog (TIMELESS), which plays an important role in the control of DNA replication, maintenance of replication fork stability, maintenance of genome stability throughout normal DNA replication, DNA repair and in the regulation of the circadian clock. This domain binds to both single-stranded DNA and double-stranded DNA, and has high affinity for DNA sequences rich in guanine that form G-quadruplex structures. This domain is also found in TIMELESS from Drosophila melanogaster. The timeless gene in Drosophila melanogaster is involved in circadian rhythm control. Drosophila contains two paralogues, dTIM and dTIM2, acting in clock/photoreception and chromosome integrity/photoreception respectively. The mammalian TIMELESS (TIM) protein, originally identified based on its similarity to Drosophila dTIM, interacts with the clock proteins dCRY and dPER and is essential for circadian rhythm generation and photo-entrainment in the fly. However, phylogenetic sequence analysis has demonstrated that dTIM2 is likely to be the orthologue of mammalian TIM and other widely conserved TIM-like proteins in eukaryotes. These proteins include Saccharomyces cerevisiae Tof1, Schizosaccharomyces pombe Swi1, and Caenorhabditis elegans TIM. These proteins are not involved in the core clock mechanism, but instead play important roles in chromosome integrity, efficient cell growth and/or development, with the exception of dTIM-2, that has an additional function in retinal photoreception. Saccharomyces cerevisiae Tof1 is a subunit of a replication-pausing checkpoint complex (Tof1-Mrc1-Csm3) that acts at the stalled replication fork to promote sister chromatid cohesion after DNA damage, facilitating gap repair of damaged DNA…
