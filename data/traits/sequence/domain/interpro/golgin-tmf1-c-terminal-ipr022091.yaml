identifier: InterPro:IPR022091
label: "Golgin TMF1, C-terminal"
definition: >-
  This is the C-terminal region of TATA element modulatory factor 1 (TMF1, also known as ARA160 and golgin TMF1) from human and its homologues. These proteins contain a number of leucine zippers that could potentially form coiled coil structures. TMF1 is a potential coactivator of the androgen receptor. It also mediates STAT3 degradation. These proteins are evolutionarily conserved golgins that may play critical roles in two RAB6-dependent retrograde transport processes: one from endosomes to the Golgi and the other from the Golgi to the ER. This entry represents the Rab6-binding domain.Originally, this protein was cloned as a factor that binds the HIV-1 TATA element and inhibits transcriptional activation by the TATA-binding protein (TBP). This is the origin of its name, but it was characterised in a viral context (HIV-1 LTR), not in regulation of endogenous genes.
