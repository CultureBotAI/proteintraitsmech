identifier: InterPro:IPR040801
label: "Ski2, N-terminal domain"
definition: >-
  This domain is the N-terminal extended region found in the Ski2 protein. Ski2 is the helicase component of the SKI complex, a multiprotein complex that assists the RNA-degrading exosome during the mRNA decay and quality-control pathways, required for the cytoplasmic functions of the exosome, including RNA turnover, surveillance, and interference. Ski2, Ski3, and Ski8 assemble in a tetramer with 1:1:2 stoichiometry.
