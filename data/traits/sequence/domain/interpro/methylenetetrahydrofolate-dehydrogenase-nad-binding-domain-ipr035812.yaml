identifier: InterPro:IPR035812
label: "Methylenetetrahydrofolate dehydrogenase, NAD-binding domain"
definition: >-
  Methylene-tetrahydrofolate (m-THF) is a versatile carrier of activated one-carbon units. The oxidation of metabolic intermediate methylene-THF to methenyl-THF requires the enzyme methylene-tetrahydrofolate dehydrogenase (m-THF DH). In eukaryotes, m-THF DH is typically found as part of a multifunctional protein. NADP-dependent m-THF DHs in mammals, birds and yeast are components of a trifunctional enzyme with DH, cyclohydrolase, and synthetase activities. Certain eukaryotic cells also contain homodimeric bifunctional DH/cyclodrolase form. In bacteria, monofunctional DH, as well as bifunctional DH/cyclodrolase are found. In addition, yeast (S. cerevisiae) also express an monofunctional DH. This family contains only the monofunctional DHs from yeast.
