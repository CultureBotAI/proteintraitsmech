identifier: InterPro:IPR025743
label: "Type VI secretion system component TssM1, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of the Type VI secretion component TssM1 from Pseudomonas aeruginosa, which plays a role in the release of toxins targeting both eukaryotic and prokaryotic species, plays an essential role in stabilization of assembled TssK1 structure at a fixed perimembrane site and forms part of the tip complex. This domain is also found in bacterial IcmF (intracellular multiplication and human macrophage-killing) proteins and is usually found N-terminal to .
