identifier: InterPro:IPR010373
label: "Domain of unknown function DUF968"
definition: >-
  This is a domain found at the C-terminal of a family of uncharacterised prophage proteins that are also found in bacteria. They have been predicted to have the His-Me finger nuclease domain and may act as a recombinase that participates in DNA repair and replication.
