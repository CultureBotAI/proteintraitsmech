identifier: InterPro:IPR060333
label: "NLRC5, middle domain"
definition: >-
  This domain is found in the human protein NLRC5, a probable regulator of the NF-kappa-B and type I interferon signalling pathways, and similar sequences from vertebrates. It plays a role in homeostatic control of innate immunity and in antiviral defence mechanisms. This domain is predicted to show an HTH-like fold followed by β-sheet.
