identifier: InterPro:IPR049568
label: "Mst2, SARAH domain"
definition: >-
  This entry represents the C-terminal SARAH (Salvador-RassF-Hippo) domain found in human Mst2 and similar sequences from vertebrates. Mst2, also called serine/threonine-protein kinase 3 (STK3) or STE20-like kinase Mst2, is a STE20 family stress-activated, pro-apoptotic serine/threonine-protein kinase which, following caspase-cleavage, enters the nucleus and induces chromatin condensation. It is a key component of the Hippo signalling pathway which plays a pivotal role in organ size control and tumour suppression by restricting proliferation and promoting apoptosis. This C-terminal SARAH domain is known to mediate the homodimerisation of MST2. Like MST1, MST2 can also form heterodimers with other proteins containing SARAH domains.
