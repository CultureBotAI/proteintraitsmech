identifier: InterPro:IPR056845
label: "Zer-1-like, leucine-rich repeats region"
definition: >-
  This region of leucine-rich repeats (LRR) is found in Zyg eleven-related protein 1 from Caenorhabditis elegans (Zer-1), human Protein zer-1 homolog and similar eukaryotic proteins. C. elegans Zer-1 functions as a target recruitment subunit in the E3 ubiquitin ligase complex zer-1-cul-2-elc-1. Its human homologue serves as substrate adapter subunit in the E3 ubiquitin ligase complex ZYG11B-CUL2-Elongin BC and acts to target substrates bearing N-terminal degrons for proteasomal degradation with the first four residues of substrates being the key recognition elements.
