identifier: InterPro:IPR047243
label: "BRCA1-associated protein, RING finger, H2 subclass"
definition: >-
  This entry represents the RING finger, H2 subclass found in BRAP2 and it homologues. This entry includes human BRCA1-associated protein (BRAP/BRAP2, also known as impedes mitogenic signal propagation (IMP), RING finger protein 52, or renal carcinoma antigen NY-REN-63) and its homologues from yeast ETP1. BRAP2 is a cytoplasmic protein interacting with the two functional nuclear localization signal (NLS) motifs of BRCA1, a nuclear protein linked to breast cancer. It also binds to the SV40 large T antigen NLS motif and the bipartite NLS motif found in mitosin. BRAP2 serves as a cytoplasmic retention protein and plays a role in the regulation of nuclear protein transport. These proteins contain an N-terminal RNA recognition motif (RRM), also known as RBD (RNA binding domain) or RNP (ribonucleoprotein domain), followed by a C3H2C3-type RING-H2 finger and a UBP-type zinc finger.
