identifier: InterPro:IPR009996
label: "Regulatory protein YycH"
definition: >-
  The YycFG two-component system is the only signal transduction system in Bacillus subtilis known to be essential for cell viability. This system is highly conserved in low-G+C Gram-positive bacteria, regulating important processes such as cell wall homeostasis, cell membrane integrity, and cell division. Four other genes, yycHIJK, are organised within the same operon with yycF and yycG in B. subtilis. This entry represents a domain found in the YycH proteins. YycH plays a role in signal transduction and is found immediately downstream of the essential histidine kinase YycG. YycG forms a two component system together with its cognate response regulator YycF. PhoA fusion studies have shown that YycH is transported across the cytoplasmic protein. It is postulated that YycH functions as an antagonist to YycG. The molecule is made up of three domains, and has a novel three-dimensional structure. The N-terminal domain features a calcium binding site and the central domain contains two conserved loop regions. YycI and YycH proteins interact to control the activity of the YycG kinase. Both YycI and YycH proteins are localized outside the cytoplasm and attached to the membrane by an N-terminal transmembrane sequence. Bacterial two-hybrid data showed that the YycH, YycI, and the kinase YycG form a ternary complex. The data suggest that YycH and YycI control the activity of YycG in the periplasm and that this control is crucial in regulating important cellular processes.
