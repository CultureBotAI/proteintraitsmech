identifier: InterPro:IPR048343
label: "Centromere/kinetochore protein zw10, C-terminal domain"
definition: >-
  This entry represents a domain found towards the C terminus of Zw10, consisting of the conserved α-helical bundle. Zw10 protein, in the context of the conserved Rod-Zwilch-Zw10 (RZZ) complex, is required for correct metaphase check-pointing during mitosis and it is also important in vesicle transport between Golgi and ER as part of a second complex together with the conserved conserved RINT1/Tip20p and NAG/Sec39p proteins. Zw10 is the metazoan homologue of yeast Dsl1, both included in the complexes associated with tethering containing helical rods (CATCHR) family, sharing structural features.
