identifier: InterPro:IPR047329
label: "Sorting nexin-29, RUN domain"
definition: >-
  This entry represents the RUN domain of SNX29 and similar animal proteins. Sorting nexin-29 (SNX29) belongs to the sorting nexin family. Sorting nexins are a large group of proteins that are localized in the cytoplasm and have the potential for membrane association either through their lipid-binding PX domain, a phospholipid-binding motif, or through protein-protein interactions with membrane-associated protein complexes. Some sorting nexin family members have been shown to facilitate protein sorting.
