identifier: InterPro:IPR060690
label: "ERVK-8-like, RNaseH-like domain"
definition: >-
  This domain is found C-terminal to in human Endogenous retrovirus group K member 8 Pol protein (ERVK-8), which converts the viral RNA genome into double-stranded viral DNA early post infection. This domain degrades the RNA template and specifically removes the RNA primer from the RNA/DNA hybrid.
