identifier: InterPro:IPR049960
label: "SpoV, N-terminal"
definition: >-
  This entry represents a domain found at the N-terminal of a group of proteins from Streptococcus pyogenes (Group A Streptotoccus), including SpyM3_0132 ( ), named SpoV (streptococcal peptide controlling virulence), and tandem proteins Spy0169 and SPy0170. The N-terminal region is well conserved among members of this family, while C-terminal regions may be unrelated.
