identifier: InterPro:IPR045533
label: "GTPase-associated adaptor domain"
definition: >-
  This entry represents an adaptor domain in the GTPase-centric systems of NTP-dependent conflict systems that directly couples the effector to the GAP1 component. It is predicted to adopt an α-helical fold.
