identifier: InterPro:IPR063294
label: "Y4jQ, C-terminal putative histidine kinase domain"
definition: >-
  This entry represents the C-terminal domain of uncharacterised protein y4jQ from Sinorhizobium fredii and related bacteria, including Planctomycetota and Bacillota. The domain shows structural similarity to histidine kinase domains.
