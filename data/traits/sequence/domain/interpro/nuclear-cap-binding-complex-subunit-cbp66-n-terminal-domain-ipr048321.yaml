identifier: InterPro:IPR048321
label: "Nuclear cap binding complex subunit CBP66, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the CBP66 component of the trypanosoma nuclear cap binding complex. Trypanosomes have a different cap 4 structure for mRNAs. CBP66 is part of the complex that recognises this cap. This domain adopts an RRM-like structure.
