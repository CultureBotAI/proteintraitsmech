identifier: InterPro:IPR029390
label: "AP-3 complex subunit beta, C-terminal domain"
definition: >-
  This domain lies at the C terminus of the clathrin-adaptor protein complex-3 beta-1 subunit. The AP-3 complex is associated with the Golgi region of the cell, as well as with more peripheral structures. Loss of functional AP-3 complex leads to defects in the function of lysosomes and lysosome-related organelles. The AP-3 complex seems to be involved in the trafficking of lysosomal membrane proteins from endosomes.
