identifier: InterPro:IPR020454
label: "Diacylglycerol/phorbol-ester binding"
definition: >-
  This entry represents the N-terminal region of PKC, known as C1. It has been shown to bind PE and DAG in a phospholipid and zinc-dependent fashion. The C1 region contains one or two copies (depending on the isozyme of PKC) of a cysteine-rich domain, which is about 50 amino-acid residues long, and which is essential for DAG/PE-binding. The DAG/PE-binding domain binds two zinc ions; the ligands of these metal ions are probably the six cysteines and two histidines that are conserved in this domain.
