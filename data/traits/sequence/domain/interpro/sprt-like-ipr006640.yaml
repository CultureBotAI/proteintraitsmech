identifier: InterPro:IPR006640
label: SprT-like
definition: >-
  This entry represents a domain found in SprT ( ), which is a regulator of bolA gene in stationary phase. The majority of members contain the metallopeptidase zinc binding signature which has a HExxH motif, however there is no evidence for them being metallopeptidases.
