identifier: InterPro:IPR044039
label: "Domain of unknown function DUF5745"
definition: >-
  This is a domain of unknown function with homology to the CH domain. This domain can be found in CEP95 CEP95 is localised to the centrosome and the spindle pole. Its function is not clear. It is phosphorylated upon DNA damage, probably by ATM or ATR.
