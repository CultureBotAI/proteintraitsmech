identifier: InterPro:IPR042144
label: "IPS1, CARD domain"
definition: >-
  This entry represents the CARD domain found in IPS1, also known as mitochondrial antiviral-signaling protein (MAVS). IPS1 is an adaptor protein that plays an important role in interferon induction in response to viral infection. It is crucial in triggering innate immunity and in developing adaptive immunity against viral pathogens. The CARD of IPS-1 associates with the CARDs of two RNA helicases, RIG-I and MDA5, which bind viral DNA in the cytoplasm during the initial stage of intracellular antiviral response, leading to the induction of type I interferons. In general, CARDs are death domains (DDs) found associated with caspases. They are known to be important in the signaling pathways for apoptosis, inflammation, and host-defense mechanisms. DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including PYRIN and DED (Death Effector Domain). They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes.
