identifier: InterPro:IPR059413
label: "Domain of unknown function DUF8369"
definition: >-
  This domain is found in uncharacterised fungal proteins. It is predicted to fold into an α/β structure composed of a four-stranded antiparallel β-sheet packed on both sides with α-helices. It also contains a long α-hairpin, stabilised by conserved interactions, which is inserted after the first strand and may be functionally important. In addition, it contains a highly conserved KTGYx(5-6)[FW]DLD sequence motif which may constitute a part of a binding interface.
