identifier: InterPro:IPR049560
label: "SAM-dependent methyltransferase RsmB-F/NOP2-type, catalytic core"
definition: >-
  The catalytic domain of ribosomal RNA cysteine methyltransferases is highly conserved in archaeal, bacterial and eukaryotic proteins. It is located at the C-terminal end in ribosomal RNA methyltransferase B (RsmB, Sun, Fmu) and Nop2 and towards the N-terminal in RsmF. Escherichia coli RsmB methylates cytosine C967 in 16S rRNA. RsmF is a multi-site-specific methyltransferase. Nop2 methylates cytosine C2870 in the 25S rRNA of S. cerevisiae and is critical for 60S biogenesis.
