identifier: InterPro:IPR058251
label: "Probable treble clef zinc finger"
definition: >-
  This domain is found in uncharacterised fungal proteins. It contains three highly conserved cysteine and histidine residues that may be involved in metal coordination. It probably a variant of treble clef zinc fingers.
