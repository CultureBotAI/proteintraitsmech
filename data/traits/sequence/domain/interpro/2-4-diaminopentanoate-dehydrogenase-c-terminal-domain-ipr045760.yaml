identifier: InterPro:IPR045760
label: "2,4-diaminopentanoate dehydrogenase, C-terminal domain"
definition: >-
  This entry represents the C-terminal presumed domain found in 2,4-diaminopentanoate dehydrogenase (DAPDH, also known as ORD) from Acetoanaerobium sticklandii (formerly known as Clostridium sticklandii). This enzyme is involved in the ornithine fermentation pathway. It catalyzes the oxidative deamination of (2R,4S)-2,4-diaminopentanoate (DAP) to yield 2-amino-4-ketopentanoate (AKP). The N-terminal domain has a Rossmann fold.
