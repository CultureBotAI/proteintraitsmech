identifier: InterPro:IPR047316
label: "Mucolipin-1, extracytosolic/lumenal domain"
definition: >-
  This entry represents the extracytosolic/lumenal domain (ELD), a linker located between the first two transmembrane segments (S1 and S2), of ML1 and similar proteins found in vertebrates. It forms a tight tetramer that is crucial for full-length ML1 assembly and localisation. Mucolipin-1 (ML1), also called transient receptor potential channel mucolipin 1 (TRPML1), is a Ca2-releasing cation channel that mediates the calcium signaling and homeostasis of lysosomes. Mutations in this protein in humans are associated with mucolipidosis type IV.
