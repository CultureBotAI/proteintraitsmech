identifier: InterPro:IPR062150
label: "BTN2-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of BTN2 and related proteins. BTN2 is a V-SNARE binding protein that facilitates specific protein retrieval from late endosome to the Golgi and is involved in pH homeostasis. This domain is found in proteins localised to the cytoplasm and late endosome. The function of this domain remains to be determined. This entry also includes Curing of [URE3] protein 1.
