identifier: InterPro:IPR047483
label: "Lysine-specific demethylase 4B, first Tudor domain"
definition: >-
  This entry represents the first Tudor domain of KDM4B, which is a methyl-lysine reader domain. Lysine-specific demethylase 4B, also known as JMJD2B, or JmjC domain-containing histone demethylation protein 3B (JHDM3B), specifically antagonizes the tri-methyl group from H3K9 in pericentric heterochromatin and reduces H3K36 methylation in mammalian cells. It plays an essential role in the growth regulation of cancer cells by modulating the G1-S transition and promotes cell-cycle progression through the regulation of cyclin-dependent kinase 6 (CDK6). It interacts with heat shock protein 90 (Hsp90) and its stability can be regulated by Hsp90. KDM4B also functions as a direct transcriptional target of p53, which induces its expression through promoter binding. Moreover, KDM4B expression can be controlled by hypoxia-inducible factor 1alpha (HIF1alpha) in colorectal cancer and estrogen receptor alpha (ERalpha) in breast cancer. It is also involved in bladder, lung, and gastric cancer. Members of this entry contains jmjN and jmjC domains in the N-terminal region, followed by a canonical plant homeodomain (PHD) domain, a noncanonical extended PHD domain, and tandem Tudor domains.
