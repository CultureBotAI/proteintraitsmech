identifier: InterPro:IPR048848
label: "Complement component 3, CUB domain, second segment"
definition: >-
  Complement C3 is major component in the both the classical and alternative complement activation pathways. C3 is cleaved into two chains (alpha and beta) by C3 convertases. C3 is a multidomain protein. This entry represents the second segment of the CUB domain, which is completed by the first segment of the CUB domain, represented in . The CUB domain is interrupted by the TE domain. The CUB, TE and MG8 domains form a massive, tightly packed super domain. This domain is also found in venom factors, also known as Complement C3 homologues. These are complement-activating proteins with structural and functional similarities to complement component C3b, the activated form of C3.
