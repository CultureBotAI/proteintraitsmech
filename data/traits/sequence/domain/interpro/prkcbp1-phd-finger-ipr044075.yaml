identifier: InterPro:IPR044075
label: "PRKCBP1, PHD finger"
definition: >-
  PRKCBP1, also known as ZMYND8, is a chromatin reader that recognises dual histone modifications such as histone H3.1 dimethylated at 'Lys-36' and histone H4 acetylated at 'Lys-16' (H3.1K36me2-H4K16ac) and histone H3 methylated at 'Lys-4' and histone H4 acetylated at 'Lys-14' (H3K4me1-H3K14ac). It was first identified as a receptor for activated C-kinase (RACK)-like protein involved in PKC signaling cascade. It also has been identified as a formin homology-2-domain containing protein 1 (FHOD1)-binding protein that may be involved in FHOD1-regulated actin polymerisation and transcription. It acts as a transcriptional corepressor for KDM5D and EZH2. ZMYND8 recognizes acetylated histone H4 and recruits the NuRD chromatin remodeling complex to damaged chromatin for transcriptional repression and double-strand break repair by homologous recombination. Moreover, PRKCBP1 may function as a REST co-repressor 2 (RCOR2) interacting factor; the RCOR2/ZMYND8 complex which might be involved in the regulation of neural differentiation. PRKCBP1 contains a plant homeodomain (PHD) finger, a bromodomain, and a proline-tryptophan-tryptophan-proline (PWWP) domain. This entry represents the PHD finger domain.
