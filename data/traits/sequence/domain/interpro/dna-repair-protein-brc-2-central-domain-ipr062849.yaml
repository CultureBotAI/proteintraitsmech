identifier: InterPro:IPR062849
label: "DNA repair protein brc-2, central domain"
definition: >-
  This entry represents the central domain of BRC-2 (DNA repair protein brc-2), found in Caenorhabditis species. The specific function of this central domain remains to be determined. This domain may adopt an OB-fold structure. BRC-2 is a BRCA2- related protein required for homologous recombination repair of DNA double-strand breaks and chromosome integrity. The protein contains an N-terminal BRCA2 repeat-like region ( ) that mediates interaction with RAD-51 and stabilisation of RAD-51-DNA filaments, a central domain ( ), and this C-terminal domain that is required for single-stranded DNA binding. BRC-2 functions by targeting RAD-51 to DNA damage sites and blocking ATP hydrolysis by RAD-51, thereby promoting homologous recombination.
