identifier: InterPro:IPR048386
label: "ARC105/Med15 mediator subunit, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of the Med15 subunit of the ARC-Mediator co-activator. In addition, Med15 is a critical transducer of gene activation signals that control early metazoan development. This domain is structurally similar to the RWD domain.
