identifier: InterPro:IPR043735
label: "Domain of unknown function DUF5680"
definition: >-
  Proteins containing this domain can be found in bacteria and archaea. In some of the proteins this domain is associated with an N-terminal HTH domain, suggesting that they are transcriptional regulators. This suggests that this may be a previously unidentified ligand binding domain.
