identifier: InterPro:IPR047377
label: "Tudor domain-containing protein 1, second Tudor domain"
definition: >-
  This entry represents the second Tudor domain of TDRD1 and similar proteins found in vertebrates. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. TDRD1, also called cancer/testis antigen 41.1 (CT41.1), plays a central role during spermatogenesis by participating in the repression transposable elements and preventing their mobilization, which is essential for germline integrity. It acts via the piRNA metabolic process, which mediates the repression of transposable elements during meiosis by forming complexes composed of piRNAs and Piwi proteins, and governs the methylation and subsequent repression of transposons. TDRD1 might play an important role in human prostate cancer development and, therefore, it has been suggested as a prostate cancer biomarker. As a cancer/testis antigen, TDRD1 might have long-term potential to be a therapeutic target for prostate cancer immunotherapy. TDRD1 contains four Tudor domains.
