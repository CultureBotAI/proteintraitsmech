identifier: InterPro:IPR034364
label: "PABP, RNA recognition motif 1"
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of type I poly(A)-binding proteins (PABPs). Poly(A)-binding proteins (PABPs) are highly conserved proteins that bind to the poly(A) tail present at the 3' ends of most eukaryotic mRNAs. These highly conserved proteins are found only in eukaryotes; single-celled eukaryotes each have a single PABP, whereas humans have five and Arabidopis has eight. In humans, three lineages of PABP proteins are observed: cytoplasmic PABPs (PABPC1, PABPC3, and iPABP); nuclear PABP (PABPN1); and X-linked PABP (PABPC5). The mammalian PABPs contain four RNA recognition motifs (RRMs). RRM 1 and 2 are primarily responsible for the high-affinity binding to homopolymeric adenosines, while RRMs 3 and 4 can bind to nonhomopolymeric AU sequences. Proteins containing this motif include: Polyadenylate-binding protein 1 (PABP-1 or PABPC1): PABP-1 is the major cytoplasmic PABP isoform in adult mouse somatic cells. It is able to bind simultaneously to the cap-binding complex subunit eIF4G and to the poly(A) tail. Therefore, it has been suggested to play a role in altering the structure and/or function of the translation termination complex. It may have additional functions within the eukaryotic mRNA transcriptome. PABP-1 possesses an A-rich sequence in its 5'-UTR and allows binding of PABP and blockage of translation of its own mRNA. Polyadenylate-binding protein 3 (PABP-3 or PABPC3): PABP-3 is a testis-specific poly(A)-binding protein specifically expressed in round spermatids. It is mainly found in mammalian and may play an important role in the testis-specific regulation of mRNA homeostasis. PABP-3 shows significant sequence similarity to PABP-1. However, it binds to poly(A) with a lower affinity than PABP-1. Dislike PABP-1, PABP-3 lacks the A-…
