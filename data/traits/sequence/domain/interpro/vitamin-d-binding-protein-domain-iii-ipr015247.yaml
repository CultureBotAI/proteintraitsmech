identifier: InterPro:IPR015247
label: "Vitamin D binding protein, domain III"
definition: >-
  This domain is predominantly found in Vitamin D binding proteins, and adopts a multihelical structure. It is required for formation of an actin 'clamp', allowing the protein to bind to actin.
