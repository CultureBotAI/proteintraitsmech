identifier: InterPro:IPR011970
label: "Lytic murein transglycosylase"
definition: >-
  Proteins of this entries are closely related to the MltB family lytic murein transglycosylases described by and are likewise all proteobacterial, although that family and this one form clearly distinct clades. Several species have one member of each family. Many proteins of this entry(unlike the MltB family) contain an additional C-terminal domain, a putative peptidoglycan binding domain, not included in region described by this model. Many sequences appear to contain N-terminal lipoprotein attachment sites, as does Esherichia coli MltB in .
