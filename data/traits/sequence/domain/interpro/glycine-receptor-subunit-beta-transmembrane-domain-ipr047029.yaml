identifier: InterPro:IPR047029
label: "Glycine receptor subunit beta, transmembrane domain"
definition: >-
  Glycine receptors (GlyR) are ligand-gated chloride channels that function as major inhibitory neurotransmitters (NT) in the adult vertebrate central nervous system (CNS). Glycinergic synapses have a well-established role in the processing of motor and sensory information that controls movement, vision and audition. Strychnine acts as a competitive antagonist of glycine binding, thereby reducing the activity of inhibitory neurons. Whilst glycine is the principal physiological agonist at GlyRs, taurine and beta-alanine also behave as agonists. This entry represents the transmembrane (TM) domain of the beta subunit of GlyR. It consists of four transmembrane-spanning α-helical segments (M1-M4) that are linked by loops. The intracellular loop that links M1 and M2 determines the ion selectivity of the channel.
