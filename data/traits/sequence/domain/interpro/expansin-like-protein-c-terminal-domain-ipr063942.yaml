identifier: InterPro:IPR063942
label: "Expansin-like protein, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in expansin-like proteins 2/7/8/9 from Dictyostelium discoideum and similar proteins mainly found in amoebozoa and bacteroidetes. These proteins belong to the expansin family but are unlikely to encode proteins with typical expansin activity. This domain is not present in all expansin proteins, as they contain different lengths. Expansin-like proteins in Dictyostelium are secreted or membrane-associated and may serve to lubricate cellulose microfibril movement during cell growth and wall extension. Some family members are expressed during development, particularly at the migrating slug stage. The specific function of this domain remains to be determined.
