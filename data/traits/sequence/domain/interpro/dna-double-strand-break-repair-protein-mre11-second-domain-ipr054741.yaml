identifier: InterPro:IPR054741
label: "DNA double-strand break repair protein Mre11, second domain"
definition: >-
  This entry represents the second calcineurin-like nuclease domain of DNA double-strand break repair protein Mre11 from Pyrococcus furiosus and similar archaeal proteins. Mre11, also known as Mre11 nuclease, is part of the Rad50/Mre11 complex, which is involved in the early steps of DNA double-strand break (DSB) repair. This domain consists of a β-sheet and two α-helices.
