identifier: InterPro:IPR015344
label: Vibrio cholerae neuraminidase, lectin-like domain
definition: >-
  These lectin-like domains is are found in Vibrio cholerae neuraminidase (VCNA) and similar sequences. This enzyme plays a significant role in the pathogenesis of cholera by removing sialic acid from higher order gangliosides to unmask GM1, the receptor for cholera toxin. The domains flank a central β-propeller catalytic domain. They are thought to be involved in binding sialic acid, helping to target the enzyme to sialic acid-rich environments and thereby enhancing its catalytic efficiency.
