identifier: InterPro:IPR047334
label: "RUN and FYVE domain-containing protein 3, RUN domain"
definition: >-
  This entry represents the RUN domain of RUFY3 and similar proteins from vertebrates. RUN and FYVE domain-containing protein 3 (RUFY3), also called Single axon-regulated protein (Singar), is an N-terminal RUN domain and a C-terminal FYVE domain containing protein predominantly expressed in the brain. It suppresses formation of surplus axons for neuronal polarity. Unlike other RUFY proteins, RUFY3 can associate with the GTP-bound active form of Rab5. RUFY3 plays a role in the formation of F-actin-enriched protrusive structures at the cell periphery, in cytoskeletal organisation, and in the generation of neuronal polarity formation and axon growth. This protein promotes gastric cancer cell migration and invasion in a PAK1-dependent manner.
