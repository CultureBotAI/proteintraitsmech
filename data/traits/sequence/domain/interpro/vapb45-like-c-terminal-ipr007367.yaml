identifier: InterPro:IPR007367
label: "VapB45-like, C-terminal"
definition: >-
  This entry (ex DUF433) includes a group of uncharacterised proteins, including VapB45 from Mycobacterium tuberculosis. VapB45 is possibly the antitoxin component of a type II toxin-antitoxin (TA) module. Its cognate toxin is VapC45. This entry also includes AF_0609 (Archaeoglobus fulgidus), y4eO (Sinorhizobium fredii), MT2366 and Rv2308 (Mycobacterium tuberculosis). This entry covers the full length of AF_0609 but covers the C-terminal in VapB45, y4eO and MT2366 and Rv2308.
