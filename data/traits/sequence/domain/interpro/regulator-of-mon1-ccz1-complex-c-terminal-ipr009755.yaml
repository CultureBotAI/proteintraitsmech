identifier: InterPro:IPR009755
label: "Regulator of MON1-CCZ1 complex, C-terminal"
definition: >-
  This entry represents the α-helical C terminus (approximately 160 residues) of RMC1, which is a component of the CCZ1-MON1 RAB7A guanine exchange factor (GEF). This domain serves as a scaffold for CCZ1-MON1 recruitment and bridges the membrane and GEF complex.
