identifier: InterPro:IPR046909
label: "Cyclic-phosphate processing, Receiver domain"
definition: >-
  This is a divergent version of the Receiver (Rec) domain linked to different NAD /ADPr-processing enzymes. Unlike conventional Rec domains, cREC is never found in two-component Histidine Kinase signalling systems. Instead, it is found in association with NAD -processing systems that generate or recognise cyclic nucleotides. Known Rec domains process phosphoester linkages by means of catalytic aspartate residues that are also conserved in cREC. Accordingly, it is predicted that members of this entry are cADPr or 2'-3' cyclic nucleotide-processing enzymes.
