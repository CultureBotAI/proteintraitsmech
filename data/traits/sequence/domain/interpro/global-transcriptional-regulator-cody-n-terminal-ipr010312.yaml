identifier: InterPro:IPR010312
label: Global transcriptional regulator CodY, N-terminal
definition: >-
  This entry represents N-terminal domain of several bacterial Global transcriptional regulator CodY proteins. CodY has been found to repress the dipeptide transport operon (dpp) of Bacillus subtilis in nutrient-rich conditions. The CodY protein also has a repressor effect on many genes in Lactococcus lactis during growth in milk.
