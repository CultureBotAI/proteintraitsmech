identifier: InterPro:IPR062343
label: "FlaEY, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Regulatory protein FlaEY, a transcriptional regulator that functions in trans to modulate the level of transcription of flagellin genes and several genes encoding chemotaxis functions. The protein is temporally controlled and was originally thought to be two separate proteins (flaE and flaY). The specific function of this domain is unknown. It may adopt an α-helical structure.
