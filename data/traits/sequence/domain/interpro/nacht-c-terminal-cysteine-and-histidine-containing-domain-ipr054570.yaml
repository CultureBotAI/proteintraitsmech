label: "NACHT, C-terminal Cysteine and Histidine-containing domain"
definition: >-
  This is a domain discovered C-terminal to HEAT repeat modules, observed in some bacterial NACHT conflict systems. These domains feature highly conserved cysteine and histidine residues.
