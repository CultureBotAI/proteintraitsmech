identifier: InterPro:IPR021870
label: "Major vault protein, shoulder domain"
definition: >-
  The major vault protein is the major polypeptide component of a large cellular ribonuclear protein complex found in the cytoplasm of eukaryotic cells. Several roles for vaults have been proposed. Vault proteins have been associated with development of multi-drug resistance. They have also being implicated in the regulation of several cellular processes including transport mechanisms, signal transmission and immune responses. This domain is found in the Major Vault Protein and has been called the shoulder domain. This family includes two bacterial proteins and . This suggests that some bacteria may possess vault particles.
