identifier: InterPro:IPR041607
label: "HU domain fused to wHTH, Ig, or Glycine-rich motif"
definition: >-
  This entry represents the HU domains predominantly observed in the bacteroidetes lineage with a predicted role in recognition and possible interception of the DNA of parasitic elements, a counter-conflict strategy preventing incorporation of these elements into the host genome.
