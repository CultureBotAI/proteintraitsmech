identifier: InterPro:IPR059523
label: "FimE, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of FimE proteins. The domain adopts an immunoglobulin-like fold structure. FimE proteins are components of the fimbrium tip and are required for incorporation of FimC and FimD into fimbriae. The proteins contribute to bacterial adhesion and host cell interaction. The specific function of this domain remains to be determined.
