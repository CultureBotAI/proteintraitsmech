identifier: InterPro:IPR048784
label: "Phage tail base-plate attachment protein, N0 domain"
definition: >-
  Caudo_bapla16 is a family of ORF16 tail-phage P2-like proteins that forms part of the base-plate at the tip of the phage tail. The whole base-plate complex is involved in host recognition and attachment, and consists of several proteins derived from consecutive open-reading-frames. This entry represents the N0 domain.
