identifier: InterPro:IPR048491
label: XMAP215/Dis1/CLASP, TOG domain
definition: >-
  This is the tubulin-binding TOG domain of two related families of microtubules (MTs) regulatory proteins, XMAP215/Dis1 and Cytoplasmic Linker ASsociated Proteins CLASP. XMAP215/Dis1 family includes Stu2 from S. cerevisiae, S. pombe Alp14 and Dis1, A. thaliana MOR1, C. elegans Zyg9, D. melanogaster MiniSpindles (MSPS) and human ch-TOG (also known as Cytoskeleton-associated protein 5), which have conserved roles in promoting the assembly of microtubules. CLASP proteins promote MT rescue and suppress MT catastrophe events.
