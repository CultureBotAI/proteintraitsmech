identifier: InterPro:IPR037611
label: "Tumour protein p63, SAM domain"
definition: >-
  The transcription factor p63 shares protein sequence similarity with the tumour suppressor p53. It plays an important part in maintaining the progenitor basal cell populations in stratified epithelium. It is also involved in heart development and human reproduction. Two p63 isoforms, the "trans-activating" isoforms and "truncated" isoforms, have been identified in humans. These isoforms may have different roles in skin, heart and germ line. This entry represents the SAM domain of tumour protein p63. SAM domain is a putative protein-protein interaction domain. Mutations in the SAM domain of p63 are found in AEC (ankyloblepharonectodermal dysplasia-clefting) syndrome patients.
