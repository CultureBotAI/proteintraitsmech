identifier: InterPro:IPR049871
label: "Sensor-kinase BvgS-like, second periplasmic domain"
definition: >-
  This entry represents the second of the two tandem periplasmic solute-binding domains of Virulence sensor protein BvgS from Bordetella pertussis and related proteins mainly found in proteobacteria. These domains are homologous to bacterial periplasmic-binding proteins (PBPs), a transmembrane region followed successively by a cytoplasmic PAS (Per/ARNT/SIM), a histidine-kinase (HK), a receiver and a histidine phosphotransfer (Hpt) domains. The sensor protein BvgS can autophosphorylate and phosphorylate the response regulator BvgA. The BvgAS phosphorelay controls the expression of virulence factors in response to certain environmental stimuli in Bordetella pertussis. Its close homologue from Escherichia coli Sensor protein EvgS , a member of the two-component regulatory system EvgS/EvgA, is involved in adaptation to low pH environments and the control of acid resistance genes. This domain of BvgS belongs to the type 2 periplasmic-binding fold protein (PBP2) superfamily, whose members are involved in chemotaxis and uptake of nutrients and other small molecules from the extracellular space as a primary receptor. PBP2 typically comprises two globular subdomains connected by a flexible hinge and bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. After binding their specific ligand with high affinity, they can interact with a cognate membrane transport complex comprised of two integral membrane domains and two receptor cytoplasmically-located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energised by ATP hydrolysis.
