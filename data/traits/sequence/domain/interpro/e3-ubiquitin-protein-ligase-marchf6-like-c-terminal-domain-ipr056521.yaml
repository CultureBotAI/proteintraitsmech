identifier: InterPro:IPR056521
label: "E3 ubiquitin-protein ligase MARCHF6-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of human E3 ubiquitin-protein ligase MARCHF6, its homologue in Schizosaccharomyces pombe Doa10 and similar eukaryotic sequences. MARCHF6 promotes 'Lys-48'-linked ubiquitination of target proteins, leading to their proteasomal degradation. This domain is predicted to adopt an all α-helical structure.
