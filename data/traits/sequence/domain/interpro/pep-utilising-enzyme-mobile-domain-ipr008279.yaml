identifier: InterPro:IPR008279
label: PEP-utilising enzyme, mobile domain
definition: >-
  A number of enzymes that catalyse the transfer of a phosphoryl group from phosphoenolpyruvate (PEP) via a phospho-histidine intermediate have been shown to be structurally related. All these enzymes share the same catalytic mechanism: they bind PEP and transfer the phosphoryl group from it to a histidine residue. This domain is a "swivelling" β/β/α domain which is thought to be mobile in all proteins known to contain it. It is often found associated with the pyruvate phosphate dikinase, PEP/pyruvate-binding domain ( ) at its N terminus.
