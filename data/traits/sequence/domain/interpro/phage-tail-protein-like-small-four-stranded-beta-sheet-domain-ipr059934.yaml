identifier: InterPro:IPR059934
label: "Phage tail protein-like, small four-stranded beta-sheet domain"
definition: >-
  This entry represents a small domain found in phage tail proteins, particularly in tail fibers and depolymerases. The domain forms a four-stranded β-sheet structure and is approximately 65-70 amino acids in length. This domain is found in various phage proteins involved in host recognition and attachment, including capsule-specific depolymerases from Klebsiella phages that degrade host bacterial capsular polysaccharides. The domain appears in different positions within these proteins and is often found in combination with other domains such as pectin lyase-like domains, K1-lyase domains, and phage head-binding domains. In depolymerase proteins, this domain may contribute to the overall structural scaffold or play a role in substrate recognition, though its specific function remains to be determined.
