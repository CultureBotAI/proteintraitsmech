identifier: InterPro:IPR021027
label: "Transposase, putative, helix-turn-helix domain"
definition: >-
  This entry represents an N-terminal helix-turn-helix domain found in a variety of putative transposases, such as A625R from Paramecium bursaria Chlorella virus 1 and in RNA-guided DNA endonucleases, including TnpB from Deinococcus radiodurans, an RNA-guided dsDNA endonuclease that cleaves DNA downstream of the 5'-TTGAT-3' transposon-associated motif (TAM) guided by RNA derived from the right-end element of its insertion sequence element. This domain is usually associated with and .
