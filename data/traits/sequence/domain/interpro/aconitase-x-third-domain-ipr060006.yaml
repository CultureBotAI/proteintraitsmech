identifier: InterPro:IPR060006
label: "Aconitase X, third domain"
definition: >-
  This entry represents the third domain of aconitase X (AcnX, also known as Phosphomevalonate dehydratase large subunit), which corresponds to domain 4 in the canonical four-domain architecture of the aconitase superfamily. This domain has a characteristic β-barrel structure created by eight or nine β-strands with α-helices packed at one side. In AcnX Type II enzymes from archaea and some bacteria, this domain exists as a separate small subunit of approximately 24 kDa, whilst in Type I enzymes it is located at the N-terminal of a single polypeptide chain. The domain contains critical cysteine residues that coordinate the iron-sulphur cluster essential for catalysis. Type I enzymes utilise a [2Fe-2S] cluster whilst Type II enzymes contain a [3Fe-4S] cluster, both differing from the [4Fe-4S] clusters found in other aconitase family members. This domain is crucial for the unique catalytic properties that distinguish AcnX enzymes in amino acid and isoprenoid metabolism pathways.
