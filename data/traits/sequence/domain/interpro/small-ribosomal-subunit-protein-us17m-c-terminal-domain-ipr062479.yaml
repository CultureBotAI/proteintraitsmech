identifier: InterPro:IPR062479
label: "Small ribosomal subunit protein uS17m, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the small ribosomal subunit protein uS17m found in mitochondria. The uS17 protein is a component of the mitochondrial ribosome small subunit which comprises a 12S rRNA and approximately 30 distinct proteins. This C-terminal domain is found in metazoan mitochondrial ribosomes. The protein belongs to the universal ribosomal protein uS17 family and functions as a structural constituent of the ribosome involved in mitochondrial translation.
