identifier: InterPro:IPR056203
label: "Cds6, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Cds6 from H. pylori ( ), a cell shape-determining protein that plays key roles in alteration of cross-linking or by trimming of peptidoglycan muropeptides. It is also involved in deglycosylation of the flagellar protein FlaA. This domain adopts NTF2-like topology. This domain contains a putative binding pocket for pseudaminic acid suggesting this domain may function as pseudaminase.
