label: "Domain of unknown function DUF6321"
definition: >-
  This presumed domain is functionally uncharacterised. This domain family is predominantly found in bacteria and viruses, and is approximately 80 amino acids in length. It has a conserved sequence GGLxxxGRxxY and a conserved tryptophan residue at the C-terminal.
