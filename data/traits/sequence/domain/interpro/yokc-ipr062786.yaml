identifier: InterPro:IPR062786
label: YokC
definition: >-
  This entry represents YokC from the SPbeta prophage of Bacillus subtilis. Related proteins are annotated as group-specific proteins in phage genomes. YokC is found in proteins across diverse bacterial phyla including Bacillales, Cyanobacteriota, and Pseudomonadota, as well as in bacteriophages. The function of this protein remains to be determined. However, it shows structural similarity to CdiL immunity proteins suggesting a role in toxin-antitoxin systems.
