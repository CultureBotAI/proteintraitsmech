identifier: InterPro:IPR015396
label: Acyl-CoA dehydrogenase, C-terminal, bacterial-type
definition: >-
  This entry represents a domain found at the C-terminal end of Acyl-coenzyme A dehydrogenase from Escherichia coli (FadE) and similar proteins mainly found in bacteria. FadE catalyses the dehydrogenation of acyl-coenzymes A (acyl-CoAs) to 2-enoyl-CoAs, the first step of the beta-oxidation cycle of fatty acid degradation. This domain seems to be essential for its function.
