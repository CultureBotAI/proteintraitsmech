identifier: InterPro:IPR058669
label: "Importin-7/11-like, TPR repeats"
definition: >-
  This region of tetratricopeptide (TPR)-like repeats is found at the C-terminal end of human Importin-7/11 and similar eukaryotic proteins. IPO7/11 function in nuclear protein import as nuclear transport receptors.
