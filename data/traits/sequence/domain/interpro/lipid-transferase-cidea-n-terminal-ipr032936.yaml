identifier: InterPro:IPR032936
label: Lipid transferase CIDEA, N-terminal
definition: >-
  CIDEA is a member of the CIDE (cell-death-inducing DFF45-like effector) family. CIDEA is associated with lipid droplets and insulin sensitivity in humans. It is a lipid transferase that promotes unilocular lipid droplet formation by mediating lipid droplet fusion. It has an important role in the development of obesity and diabetes in rodents. It can also act as a transcriptional coactivator of C/EBPbeta in mammary glands to control milk lipid secretion. This entry represents the N-terminal domain of CIDE-A.
