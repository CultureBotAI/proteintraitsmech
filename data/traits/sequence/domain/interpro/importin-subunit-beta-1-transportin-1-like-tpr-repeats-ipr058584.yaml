identifier: InterPro:IPR058584
label: "Importin subunit beta-1/Transportin-1-like, TPR repeats"
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found in human Importin subunit beta-1 (IMB1).Transportin-1 (TNPO1) and similar eukaryotic proteins. IMB1 functions in nuclear protein import, either in association with an adapter protein, or by acting as autonomous nuclear transport receptor. Acting autonomously, serves itself as NLS receptor. TNPO1 functions in nuclear protein import as nuclear transport receptor. It serves as receptor for nuclear localisation signals (NLS) in cargo substrates.
