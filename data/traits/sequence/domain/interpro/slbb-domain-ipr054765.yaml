identifier: InterPro:IPR054765
label: "SLBB domain"
definition: >-
  This entry represents a set of soluble ligand-binding β-grasp domain (SLBB) domains from bacterial and eukaryotic NADH:ubiquinone oxidoreductases, including human NDUFV1, and bacterial polysaccharide export proteins, such as Wza from Escherichia coli. This domain has been proposed to bind soluble cofactors.
