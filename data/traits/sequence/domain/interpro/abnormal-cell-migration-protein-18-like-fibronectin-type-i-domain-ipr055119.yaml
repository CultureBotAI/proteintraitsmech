identifier: InterPro:IPR055119
label: "Abnormal cell migration protein 18-like, fibronectin type I domain"
definition: >-
  This entry represents a domain that structurally resembles the fibronectin type 1 repeat. This domain is found in Abnormal cell migration protein 18 (Mig-18) from Caenorhabditis elegans and other uncharacterised nematode proteins. Mig-18 is required for the directional control of distal tip cell migration during gonadogenesis, probably by recruiting fibulin fbl-1 to the gonad basement membrane.
