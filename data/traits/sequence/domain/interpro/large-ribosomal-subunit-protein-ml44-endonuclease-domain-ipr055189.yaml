identifier: InterPro:IPR055189
label: "Large ribosomal subunit protein mL44, endonuclease domain"
definition: >-
  Large ribosomal subunit protein mL44 (RM44) is a component of the 39S subunit of mitochondrial ribosome. It may play a role in the assembly/stability of nascent mitochondrial polypeptides exiting the ribosome. This entry represents the endonuclease (RNase III-like) domain of RM44.
