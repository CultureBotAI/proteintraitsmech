identifier: InterPro:IPR049581
label: "Slit-Robo GTPase Activating Protein 3, F-BAR domain"
definition: >-
  This entry represents a F-BAR domain present in SLIT-ROBO Rho GTPase-activating protein 3 (SrGAP3). Slit-Robo GTPase Activating Proteins (SrGAPs) are Rho GAPs that interact with Robo1, the transmembrane receptor of Slit proteins. Slit proteins are secreted proteins that control axon guidance and the migration of neurons and leukocytes. Vertebrates contain three isoforms of SrGAPs. SrGAP3, also called MEGAP (MEntal disorder associated GTPase-Activating Protein), is a Rho GAP with activity towards Rac1 and Cdc42. The association between SrGAP3 haploinsufficiency and mental retardation is under debate. SrGAP3 contains an N-terminal F-BAR domain, a Rho GAP domain, and a C-terminal SH3 domain. F-BAR domains form banana-shaped dimers with a positively-charged concave surface that binds to negatively-charged lipid membranes. They are dimerisation modules that bind and bend membranes and are found in proteins involved in membrane dynamics and actin reorganisation.
