identifier: InterPro:IPR040664
label: "AFL, C-terminal"
definition: >-
  This domain is found in Archaeoglobus fulgidus lipase (AFL). The domain consists of a layer of seven β-sheet. When the domain is combined with the proximal domain, which is also a layer of seven β-sheet, they form a β sandwich. The combination of these two domains is known as the C-terminal domain. It is likely that the C-terminal domain plays an important role in substrate specificity, catalytic efficiency but also attributes partly to AFLs stability.
