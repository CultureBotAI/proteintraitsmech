identifier: InterPro:IPR061283
label: "Ephrin, cysteine rich domain"
definition: >-
  This entry represents the cysteine-rich domain found in ephrin proteins. Ephrins are important cell surface proteins that act as ligands for Eph receptor tyrosine kinases There are 10 EphA receptors and six EphB receptors, distinguished on sequence difference and binding preferences. They interact with the six glycosylphosphatidylinositol-linked ephrin-A ligands and the three transmembrane ephrin-B ligands, respectively. The Eph receptors, which bind a group of cell-membrane-anchored ligands known as ephrins, represent the largest subfamily of receptor tyrosine kinases (RTKs). These receptors and their ephrin ligands control a diverse array of cell-cell interactions in the nervous and vascular systems. Upon ephrin binding, the Eph kinase domain is activated, initiating "forward" signalling in the receptor-expressing cells. Simultaneously, signals are induced in the ligand-expressing cells, a phenomenon referred to as "reverse" signalling. The extracellular region of Eph receptors contains a conserved 180-amino-acid N-terminal ligand-binding domain (LBD), which is both necessary and sufficient for binding to ephrin ligands. An adjacent cysteine-rich region may be involved in the receptor-receptor oligomerisation often observed upon ligand binding, whereas the two fibronectin type III repeats have yet to be assigned a clear biological function. The cytoplasmic region contains a kinase domain, a sterile alpha motif (SAM) domain, and a PDZ-binding motif. The LBD is unique to this family of RTKs and shares no significant amino acid sequence homology with other known proteins. The Eph LBD forms a compact globular structure that folds into a jellyroll β-sandwich composed of 11 antiparallel β-strands. Two antiparallel β-sheets with the typical left-handed twist pack against ea…
