identifier: InterPro:IPR054346
label: "ARG and Rhodanese-Phosphatase-superfamily-associated domain 2"
definition: >-
  ARPP-2 (ARG and Rhodanese-Phosphatase-superfamily-associated Protein domain 2) shows a distinguishing group of absolutely conserved residues distinct from ARPP-1. ARPP-2 is typically found fused to a C-terminal HTH domain and adjacent to a Rot/TROVE domain fused to a vWA domain.
