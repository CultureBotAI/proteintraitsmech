identifier: InterPro:IPR046903
label: "Mab-21-like, nucleotidyltransferase domain"
definition: >-
  This entry represents the N-terminal nucleotidyltransferase domain of Mab-21 and Mab-21 like proteins and related proteins from animals. In Caenorhabditis elegans, these proteins are required for several aspects of embryonic development. This entry also includes inositol 1,4,5-triphosphate receptor-interacting proteins, which are predicted to contain a partial Mab-21 domain.
