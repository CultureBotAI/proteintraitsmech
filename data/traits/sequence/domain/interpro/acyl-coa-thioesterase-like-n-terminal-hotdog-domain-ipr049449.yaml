identifier: InterPro:IPR049449
label: "Acyl-CoA thioesterase-like, N-terminal HotDog domain"
definition: >-
  This entry contains a wide variety of enzymes, principally acyl-CoA thioesterases, including Acyl-CoA thioesterase 2 from Escherichia coli (TesB,) and human Acyl-coenzyme A thioesterase 8 (ACOT8,). These enzymes are part of the Hotdog fold superfamily. This is the N-terminal of a pair of HotDog domains. In some instances, such as in in acyl-CoA hydrolase 2 from Arabidopsis thaliana, this domain is found in the central region.
