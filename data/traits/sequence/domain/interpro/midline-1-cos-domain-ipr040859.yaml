identifier: InterPro:IPR040859
label: "Midline-1, COS domain"
definition: >-
  This entry represents the COS domain found in the C-I subfamily of the tripartite motif (TRIM) family of E3 ubiquitin ligases. The C-1 subfamily includes MID1 (TRIM18), MID2 (TRIM1), TRIM9, TNL (TRIM67), TRIM36 and TRIFIC (TRIM46). The C-I subfamily contains C-terminal FNIII and B30.2 domains which are associated with microtubules. C-I subfamily members also contain a relatively conserved region of approximately 60 amino acids, termed the C-terminal subgroup One Signature (COS) domain.
