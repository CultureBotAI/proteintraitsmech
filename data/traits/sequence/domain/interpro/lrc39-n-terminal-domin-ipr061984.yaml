identifier: InterPro:IPR061984
label: "LRC39, N-terminal domin"
definition: >-
  This entry represents the N-terminal helix of Leucine-rich repeat-containing protein 39 (LRC39), a component of the sarcomeric M-band which plays a role in myocyte response to biomechanical stress. It may regulate expression of other M-band proteins via an SRF-dependent pathway and is important for normal contractile function in heart.
