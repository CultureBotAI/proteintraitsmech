identifier: InterPro:IPR025946
label: "CABIT domain"
definition: >-
  The CABIT domain (for 'cysteine-containing, all- in Themis') is found twice in a newly identified gene family that has three mammalian homologues (Themis, Icb1 and 9130404H23Rik). These proteins function downstream of tyrosine kinase signalling and interact with GRB2. In addition to their CABIT domains, the proteins also share a highly conserved proline-rich region. In contrast, Fam59A, Fam59B and related proteins from mammals to cnidarians (including the insect Serrano proteins), have a single copy of the CABIT domain, a proline-rich region and often a C-terminal SAM (sterile-motif) domain. Multiple-sequence alignment has predicted that the CABIT domain adopts an all-strand structure with at least 12 strands, ie a dyad of six-stranded β-barrel units. The CABIT domain contains a nearly absolutely conserved cysteine residue which is likely to be central to its function.
