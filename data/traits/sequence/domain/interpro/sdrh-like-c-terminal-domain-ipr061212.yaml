identifier: InterPro:IPR061212
label: "SdrH-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of SdrH from Staphylococcus epidermidis ( ) and similar staphylococcal proteins, SdrH is one of three MSCRAMM family proteins, but is atypical in lacking a recognisable LPXTG-like C-terminal recognition sequence for cell wall anchoring. This domain is C-terminal to the repetitive, low-complexity region that is a feature of all members of this group. That repetitive region consists mostly of Ser-Asp dipeptides in S. epidermidis but has radically different compositions in other species.
