identifier: InterPro:IPR047413
label: "Forkhead box protein P3, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXP3 and similar sequences from vertebrates. The FH domain is a winged helix DNA-binding domain. Forkhead box protein P3 (FOXP3) is a transcriptional regulator which is crucial for the development and inhibitory function of regulatory T-cells (Treg), which are required for maintaining self-tolerance. It may also have intrinsic regulatory function in conventional T (Tconv) cells. A deletion of the Forkhead domain arising from a frameshift mutation in mouse FOXP3 is linked to the autoimmune disorder scurfy, and a similar congenital disease in humans is known as IPEX (immune dysregulation, polyendocrinopathy, enteropathy, X-linked syndrome).
