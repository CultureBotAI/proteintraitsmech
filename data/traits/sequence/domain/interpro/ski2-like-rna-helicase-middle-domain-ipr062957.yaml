identifier: InterPro:IPR062957
label: "Ski2-like RNA helicase, middle domain"
definition: >-
  This entry represents a domain of approximately 110 residues found in cyanobacterial Ski2-like DEAD-box RNA helicases. The domain is positioned between the Helicase_C domain ( ) and the C-terminal DSHCT domain ( ). The parent proteins are annotated as Ski2-like antiviral proteins in some cyanobacteria; in eukaryotes, Ski2 helicases function in RNA surveillance and degradation pathways. Transcriptomic studies have shown that one family member (Slr0451 in Synechocystis sp. PCC 6803) is redox-responsive. This domain is found exclusively in cyanobacteria. The function of this domain remains to be determined.
