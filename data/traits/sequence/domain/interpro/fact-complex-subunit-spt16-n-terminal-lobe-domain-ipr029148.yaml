identifier: InterPro:IPR029148
label: "FACT complex subunit SPT16, N-terminal lobe domain"
definition: >-
  This entry represents the N-terminal lobe domain of Spt16. Its structure is similar to the RuvC/RNase H family. It may act as a protein-protein interaction domain presumably with partners outside of the FACT complex. The C-terminal lobe of NTD is structurally similar to aminopeptidases, and the most highly conserved surface residues line a cleft equivalent to the aminopeptidase substrate-binding site in peptidase family M24 ( ). SPT16 is a component of the FACT (facilitator of chromatin transcription) complex, a general chromatin factor that acts to reorganise nucleosomes. In budding yeasts, the N-terminal domain (NTD) of SPT16 includes a smaller N-terminal lobe (residues 1-175) and a larger C-terminal lobe (residues 176-447).
