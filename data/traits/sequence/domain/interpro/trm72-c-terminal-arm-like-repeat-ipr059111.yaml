identifier: InterPro:IPR059111
label: "Trm72, C-terminal ARM-like repeat"
definition: >-
  This entry represents the C-terminal ARM repeat region of tRNA (32-2'-O)-methyltransferase regulator trm732 from Schizosaccharomyces pombe and similar proteins from ascomycetes. Together with methyltransferase Trm7, Trm732 methylates the 2'-O-ribose of nucleotides at position 32 of the anticodon loop of substrate tRNAs. This domain is predicted to be composed of an α solenoid structure consisting of repeating pairs of α helices. This entry is often found associated with , and .
