identifier: InterPro:IPR059154
label: "D-glucuronyl C5-epimerase, beta-sandwich domain"
definition: >-
  This domain is found centrally in D-glucuronyl C5-epimerase from humans (Glce) and similar proteins involved in glycan metabolism and heparin biosynthesis in animals. Glce is essential for the reversible epimerisation of D-glucuronic acid (GlcA) into L-iduronic acid (IdoA), contributing to generate functional protein-binding motifs to ensure polymer function. This protein consists of three intertwined domains. This entry represents a classical β-sandwich domain that consists predominantly of a convex four-stranded β-sheet and a concave seven-stranded β-sheet. It is inserted between two of the helices of the C-terminal α-barrel domain (whose most C-terminal region is represented by ).
