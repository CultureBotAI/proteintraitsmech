identifier: InterPro:IPR041121
label: "SDH, C-terminal"
definition: >-
  This domain is found in the C-terminal region of Shikimate 5'-dehydrogenase (SDH) present in Methanocaldococcus jannaschii. SDH catalyses the NADPH-dependent reduction of 3-dehydroshikimate to shikimate in the shikimate pathway. The domain is found just after the C-terminal domain which is responsible for NADP binding.
