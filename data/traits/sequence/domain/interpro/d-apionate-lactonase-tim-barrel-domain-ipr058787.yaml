identifier: InterPro:IPR058787
label: "D-apionate lactonase, TIM barrel domain"
definition: >-
  This entry represents the central TIM barrel domain of ApnL. This domain is likely the catalytic domain and contains the active site of the enzyme. The TIM barrel fold is a common structural motif in many enzymes that catalyse diverse reactions. This domain can also be found C-terminal in uncharacterised proteins or in other positions. D-apionate lactonase (ApnL) hydrolyses D-apionolactone to D-apionate. The protein is involved in D-apiose catabolism pathways in bacteria. D-apiose is a branched pentose found in the cell walls of higher plants.
