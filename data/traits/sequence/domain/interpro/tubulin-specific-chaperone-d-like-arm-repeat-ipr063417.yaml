identifier: InterPro:IPR063417
label: "Tubulin-specific chaperone D-like, ARM repeat"
definition: >-
  This region is found at the N-terminal end of human Tubulin -specific chaperone D (TBCD), which is required for tubulin complex assembly and involved in the regulation of microtubule polymerisation or depolymerisation. It is predicted to fold into ARM-like repeats.
