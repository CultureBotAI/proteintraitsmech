identifier: InterPro:IPR019451
label: "RNA polymerase II assembly factor Rtp1, C-terminal"
definition: >-
  This domain is found towards the C-terminal of required for the nuclear transport of RNA pol II protein (Rtp1). Rtp1 is required for the nuclear localisation of RNA polymerase II. This domain is also found in transport and Golgi organisation protein 6 (Tango6).
