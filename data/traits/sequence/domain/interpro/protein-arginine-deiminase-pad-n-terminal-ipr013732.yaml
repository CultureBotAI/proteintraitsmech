identifier: InterPro:IPR013732
label: Protein-arginine deiminase (PAD), N-terminal
definition: >-
  This entry represents the first immunoglobulin-like non-catalytic domain of protein-arginine deiminase. Protein arginine deiminases (PADs) use a nucleophilic cysteine to hydrolyze guanidinium groups on arginine residues to form citrulline. This reaction, known as citrullination or deimination, results in the loss of positive charge, thereby affecting protein function and altering protein-protein and protein-nucleic acid interactions. Humans encode five PADs, designated PADs 1-4 and PAD6, which regulate numerous cellular processes. PADs are dysregulated in inflammatory diseases and cancer. PAD6 does not bind Ca2+ and is inactive in vitro assays against standard PADs substrate. The PAD2 monomer consists of two immunoglobulin-like domains, IgG1 (residues 1-115) and IgG2 (residues 116-295), as well as a C-terminal catalytic domain (residues 296-665).
