identifier: InterPro:IPR040787
label: "Cas12a, REC1 domain"
definition: >-
  Cpf1, also known as CRISPR-associated endonuclease Cas12a, is an RNA-guided endonuclease of a type V CRISPR-Cas system. Cpf1 adopts a bilobed architecture consisting of an α-helical recognition (REC) lobe and a nuclease (NUC) lobe, with the small CRISPR RNAs (crRNAs)-target DNA heteroduplex bound to the positively charged, central channel between the two lobes. The REC lobe consists of the REC1 and REC2 domains where REC1 comprises 13 α helices, and REC2 comprises ten α helices and two β strands that form a small antiparallel sheet. This entry represents REC1 domain.
