identifier: InterPro:IPR034063
label: "Fervidolysin domain"
definition: >-
  This entry refers to a domain found in fervidolysin as well as other serine peptidases. Fervidolysin (MEROPS identifier S08.021) which is found in the thermophilic bacterium Fervidobacterium pennivorans is an extracellular subtilisin-like keratinase. It contains a signal peptide, a propeptide, and a catalytic region. The tertiary structure of fervidolysin is similar to that of subtilisin. It contains a Asp/His/Ser catalytic triad and is a member of the peptidase S8 (subtilisin and kexin) family. The catalytic triad is similar to that found in trypsin-like proteases, but it does not share their three-dimensional structure and are not homologous to trypsin. Serine acts as a nucleophile, aspartate as an electrophile, and histidine as a base. The S53 family contains a catalytic triad Glu/Asp/Ser with an additional acidic residue Asp in the oxyanion hole, similar to that of subtilisin. The serine residue here is the nucleophilic equivalent of the serine residue in the S8 family, while glutamic acid has the same role here as the histidine base. However, the aspartic acid residue that acts as an electrophile is quite different. In S53, it follows glutamic acid, while in S8 it precedes histidine. The stability of these enzymes may be enhanced by calcium; some members have been shown to bind up to 4 ions via binding sites with different affinity. There is a great diversity in the characteristics of their members: some contain disulfide bonds, some are intracellular while others are extracellular, some function at extreme temperatures, and others at high or low pH values.
