identifier: InterPro:IPR042818
label: "RIbeta, dimerization/docking domain"
definition: >-
  This entry represents the dimerization/docking (D/D) domain of RIbeta, the Type I beta Regulatory subunit of cAMP-dependent protein kinase. RIbeta is expressed highly in the brain and is associated with hippocampal function. The R subunit contains an N-terminal dimerisation/docking (D/D) domain, a linker with an inhibitory sequence, and two c-AMP binding domains. The D/D domain dimerises to form a four-helix bundle that serves as a docking site for A-kinase-anchoring proteins (AKAPs), which facilitates the localisation of PKA to specific sites in the cell. cAMP-dependent protein kinase (PKA) is a serine/threonine kinase (STK), catalysing the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The inactive PKA holoenzyme is a heterotetramer composed of two phosphorylated and active catalytic subunits with a dimer of regulatory (R) subunits. Activation is achieved through the binding of the important second messenger cAMP to the R subunits, which leads to the dissociation of PKA into the R dimer and two active subunits. There are two classes of R subunits, RI and RII; each exists as two isoforms (alpha and beta) from distinct genes. These functionally non-redundant R isoforms allow for specificity in PKA signalling. RI subunits are pseudo-substrates as they do not contain a phosphorylation site in their inhibitory site unlike RII subunits. PKA is present ubiquitously in cells and interacts with many different downstream targets. It plays a role in the regulation of diverse processes such as growth, development, memory, metabolism, gene expression, immunity, and lipolysis.
