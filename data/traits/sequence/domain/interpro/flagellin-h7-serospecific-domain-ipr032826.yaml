identifier: InterPro:IPR032826
label: "Flagellin, H7-serospecific domain"
definition: >-
  This domain is typically between 125 and 147 amino acids in length, and is found in some flagellins. There are two completely conserved G residues that may be functionally important. Flagellin is the subunit protein which polymerizes to form the filaments of bacterial flagella.
