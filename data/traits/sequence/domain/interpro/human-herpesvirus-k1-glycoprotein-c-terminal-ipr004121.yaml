identifier: InterPro:IPR004121
label: "Human herpesvirus K1 glycoprotein, C-terminal"
definition: >-
  Current genotyping systems for Human herpesvirus 8 (HHV-8) are based on the highly variable gene encoding the K1 glycoprotein. This entry represents the C-terminal region of the K1 glycoprotein.
