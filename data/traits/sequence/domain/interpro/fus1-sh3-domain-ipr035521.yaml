identifier: InterPro:IPR035521
label: "Fus1, SH3 domain"
definition: >-
  Fus1 is required at the cell surface for cell fusion during the mating response in yeast. It requires Bch1 and Bud7, which are Chs5-Arf1 binding proteins, for localization to the plasma membrane. It acts as a scaffold protein to assemble a cell surface complex which is involved in septum degradation and inhibition of the NOG pathway to promote cell fusion.
