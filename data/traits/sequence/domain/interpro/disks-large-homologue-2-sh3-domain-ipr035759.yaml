identifier: InterPro:IPR035759
label: "Disks Large homologue 2, SH3 domain"
definition: >-
  DLG2 (also known as PSD-93) is a scaffolding protein that clusters at synapses and plays an important role in synaptic development and plasticity. The DLG2 delta isoform binds inwardly rectifying potassium Kir2 channels, which determine resting membrane potential in neurons. It regulates the spatial and temporal distribution of Kir2 channels within neuronal membranes. DLG2 is a member of the MAGUK (membrane-associated guanylate kinase) protein family, which is characterised by the presence of a core of three domains: PDZ, SH3, and guanylate kinase (GuK). The GuK domain in MAGUK proteins is enzymatically inactive; instead, the domain mediates protein-protein interactions and associates intramolecularly with the SH3 domain. DLG2 contains three PDZ domains.
