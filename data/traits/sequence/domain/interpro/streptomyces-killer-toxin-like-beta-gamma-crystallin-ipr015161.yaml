identifier: InterPro:IPR015161
label: "Streptomyces killer toxin-like, beta/gamma crystallin"
definition: >-
  This domain consists of a beta-gamma-crystallin fold, wherein nine β-strands are connected by loop, and are separated into two sheets, each sheet forming the Greek key motif. The two Greek key motifs face each other in the global topology. The three-dimensional structure of the molecule is a 'sandwich'-shaped β-barrel structure: hydrophobic side-chains are packed in the large interface area of the β-sheets. In Streptomyces killer toxin-like protein domain confers a cytocidal effect to the toxin, causing cell death in both budding and fission yeasts, and morphological changes in yeasts and filamentous fungi. This domain is also found in chitin-biding antifungal proteins.
