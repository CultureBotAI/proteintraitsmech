identifier: InterPro:IPR060698
label: "DNAJC15, N-terminal transmembrane region"
definition: >-
  This entry represents the N-terminal transmembrane region of DNAJC15 (DnaJ homolog subfamily C member 15) found in metazoa. DNAJC15 is a mitochondrial inner membrane protein that acts as a negative regulator of the mitochondrial respiratory chain and prevents mitochondrial hyperpolarisation. The protein functions as an import component of the TIM23 translocase complex and stimulates the ATPase activity of HSPA9. The protein is highly expressed in heart, liver and kidney tissues.
