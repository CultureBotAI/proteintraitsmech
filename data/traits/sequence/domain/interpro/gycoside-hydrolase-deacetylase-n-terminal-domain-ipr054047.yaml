identifier: InterPro:IPR054047
label: "Gycoside hydrolase/deacetylase, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of a group of predicted glycoside hydrolase/deacetylases from Thermococcales. This enzyme is predicted to have two domains: an N-terminal domain with a typical glycoside hydrolase 57 family (β/α)7-barrel fold (this entry) and a C-terminal domain composed of α-helical bundles ( ).
