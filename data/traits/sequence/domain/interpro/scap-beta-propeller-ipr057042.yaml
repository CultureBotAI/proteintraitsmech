identifier: InterPro:IPR057042
label: "SCAP, beta-propeller"
definition: >-
  This entry represents the β-propeller domain found at the C-terminal of SCAP (Sterol regulatory element-binding protein cleavage-activating protein). This domain is involved in the interaction with SREBP. Members of this entry are specific to animals. SCAP is a key player in the sterol regulatory element-binding protein (SREBP) pathway that controls the cellular homeostasis of sterol. It consists of a luminal domain, eight transmembrane segments from which TM2-TM6 corresponds to the SSD and a WD40 domain at the C-terminal.
