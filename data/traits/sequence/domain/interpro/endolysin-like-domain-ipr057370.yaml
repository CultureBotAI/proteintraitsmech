identifier: InterPro:IPR057370
label: "Endolysin-like domain"
definition: >-
  This domain is found in a group of uncharacterised phage and bacterial proteins. It is related to domains that are members of the NlpC/P60 and Bacteriophage peptidoglycan hydrolase families of papain-like cysteine proteases, and, respectively. This domain is probably catalytically active as it contains highly conserved cysteine and histidine residues. Some members of this entry are circularly permuted, and their N-terminal two β-strands occupy the position of the C-terminal strands in other members.
