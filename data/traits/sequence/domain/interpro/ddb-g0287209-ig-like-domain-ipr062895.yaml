label: "DDB_G0287209, Ig-like domain"
definition: >-
  This entry represents an Ig-like domain of transmembrane domain-containing protein DDB_G0287209 from Dictyostelium discoideum. This protein is predicted to be a multi-pass membrane protein localised to cellular membranes and contains multiple transmembrane helical regions.
