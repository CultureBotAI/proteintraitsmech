identifier: InterPro:IPR059998
label: "Spliceosome-associated protein CWC27, C-terminal"
definition: >-
  CWC27, also called antigen NY-CO-10, or probable inactive peptidyl-prolyl cis-trans isomerase CWC27, or PPIase CWC27, or serologically defined colon cancer antigen 10, is part of the spliceosome and plays a role in pre-mRNA splicing. It is a probable inactive PPIase with no peptidyl-prolyl cis-trans isomerase activity. This entry corresponds to the C-terminal domain of CWC27, which interacts with CWC22 MIF4G domain.
