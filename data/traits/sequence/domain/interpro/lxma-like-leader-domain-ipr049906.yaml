identifier: InterPro:IPR049906
label: "LxmA-like, leader domain"
definition: >-
  This entry represents the N-terminal leader domain found in a family of ribosomally synthesized and post-translationally modified peptides (RiPPs) mainly from actinomycetes whose lanthionine moiety is created by a novel class of enzyme, including LxmA. This group also includes a number of other RiPPs that much lower sequence similarity outside the leader peptide region.
