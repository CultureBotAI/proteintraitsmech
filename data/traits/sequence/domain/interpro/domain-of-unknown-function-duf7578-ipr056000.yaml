label: "Domain of unknown function DUF7578"
definition: >-
  This domain is found in uncharacterised Trypanosoma proteins. It is sometimes found in tandem. This domain is predicted to adopt a globular structure consisting of α-helices with some similarity to SAM domains. This domain is found associated with and . Members of this family are frequently interrupted by non-LTR retrotransposons inserted at exactly the same relative position.
