identifier: InterPro:IPR062019
label: "Uroplakin-3b-like protein 1/2, transmembrane region"
definition: >-
  This entry represents the transmembrane region found at the C-terminal of Uroplakin-3b-like protein 1/2. Uroplakin-3b-like proteins are members of the uroplakin-3 family and are localised to cellular membranes.
