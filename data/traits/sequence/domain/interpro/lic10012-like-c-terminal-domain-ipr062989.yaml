identifier: InterPro:IPR062989
label: "LIC10012-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of a group of uncharacterised proteins from Leptospira, including LIC10012 from Leptospira interrogans. Members of this entry of putative surface-exposed proteins are found broadly throughout the genus Leptospira, and appear to have a VWA (von Willebrand factor type A) domain in the middle region. This domain may adopt an OB fold.
