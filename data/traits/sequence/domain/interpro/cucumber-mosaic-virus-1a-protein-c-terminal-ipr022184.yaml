label: Cucumber mosaic virus 1a protein C-terminal
definition: >-
  This domain family is found in viruses, and is approximately 90 amino acids in length. It is found in association with , . and contains a conserved GLG sequence motif. 1a protein is the major virulence factor of the (Cucumber mosaic virus. The Ns strain of CMV causes necrotic lesions to Nicotiana spp. while other strains cause systemic mosaic. The determinant of the pathogenesis of these different strains is the specific amino acid residue at the 461 residue of the 1a protein.
