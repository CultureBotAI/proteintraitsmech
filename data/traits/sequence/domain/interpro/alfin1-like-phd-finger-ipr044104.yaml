identifier: InterPro:IPR044104
label: "Alfin1-like, PHD finger"
definition: >-
  This entry represents the PHD finger found in ALFIN (AL) proteins, which are ubiquitously expressed nuclear proteins existing only in plants. They are involved in chromatin regulation by binding to tri- and dimethylated histone H3 at lysine 4 (H3K4me3/2), the active histone markers, through their plant homeodomain (PHD) fingers.
