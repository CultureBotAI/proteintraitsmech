label: "Nicotinate phosphoribosyltransferase, N-terminal domain"
definition: >-
  Nicotinate phosphoribosyltransferase is the rate limiting enzyme that catalyses the first reaction in the NAD salvage synthesis. This is the N-terminal domain of the enzyme.
