identifier: InterPro:IPR057812
label: "YKFC, SH3b2 domain"
definition: >-
  This entry represents the second of two N-terminal bacterial SH3 (SH3b2) domains found in bacterial dipeptidyl-peptidases VI such as Gamma-D-glutamyl-L-lysine dipeptidyl-peptidase (YKFC). YKFC consist of three domains ( ), the N-terminal SH3b1 ( ), SH3b2 and a C-terminal NlpC/P60 ( ). The active site is located at the SH3b1-NlpC/P60 interface, whereas the SH3b2 domain is distal to it.
