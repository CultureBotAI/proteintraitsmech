identifier: InterPro:IPR041034
label: "Phosphoinositide phosphatase, C-terminal"
definition: >-
  This domain is found in the C-terminal region of effector protein SidP present in Legionella longbeachae. SidP functions as a PI-3-phosphatase specifically hydrolyzing PI(3)P and PI(3,5)P2. This C-terminal domain is rich with glutamate residues.
