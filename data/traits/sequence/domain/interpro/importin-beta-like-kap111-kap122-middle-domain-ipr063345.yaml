identifier: InterPro:IPR063345
label: "Importin beta-like KAP111/KAP122, middle domain"
definition: >-
  This entry represents the middle domain of importin beta-like protein KAP122 found in yeasts. KAP122 is a nuclear transport factor involved in protein transport between the cytoplasm and nucleoplasm. The protein is required for nuclear import of transcription factor IIA subunits (TOA1 and TOA2) and the ribonucleotide reductase small subunit (RNR2-RNR4 heterodimer). KAP122 belongs to the importin beta family and associates with the nuclear pore complex. The specific function of this middle domain remains to be determined.
