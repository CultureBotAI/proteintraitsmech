identifier: InterPro:IPR060741
label: "EFCAB4A/Rab-44, helical region"
definition: >-
  This entry represents the helical region in EF-hand calcium-binding domain-containing protein 4A (EFCAB4A/CRACR2B). This region is located downstream of the paired EF-hand domains and forms an extended helical structure. The specific function of this post-EF-hand helical region remains to be determined. This entry also includes an helical region in Ras-related protein Rab-44. EFCAB4A belongs to the EFCAB4 family and plays a role in store-operated calcium entry (SOCE). The protein functions as a calcium release-activated calcium channel regulator in vertebrates.
