identifier: InterPro:IPR041628
label: "ChlI/MoxR, AAA lid domain"
definition: >-
  This entry represents the α-helical AAA+ lid domain that is found to the C terminus of AAA domains. Proteins containing this domain include magnesium-chelatase subunits, such as ChlI and ChlD. The plant magnesium-chelatase is a complex of three subunits, CHLI, CHLD and CHLH. The reaction takes place in two steps, with an ATP-dependent activation followed by an ATP-dependent chelation step. This domain can also be found in MoxR, a putative AAA-type ATPase enzymatic complex assembly chaperone.
