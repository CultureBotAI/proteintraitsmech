identifier: InterPro:IPR061556
label: "Domain of unknown function DUF8486"
definition: >-
  This entry represents an N-terminal putative sensor domain found in histidine kinase proteins. This domain precedes the histidine kinase A (HisKA) phosphoacceptor domain and the histidine kinase ATPase C-terminal domain. The domain is approximately 145-155 residues in length. This family is found predominantly in Bacteroidota, particularly in the orders Flavobacteriales, Cytophagales and Sphingobacteriales. The function of this sensor domain remains to be determined.
