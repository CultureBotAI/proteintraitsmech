identifier: InterPro:IPR028917
label: "Tox-GHH2 domain"
definition: >-
  This entry represents the HNH/Endonuclease VII fold present in bacterial polymorphic toxin systems with a characteristic s[AGP]HH signature motif. In bacterial polymorphic toxin systems, the toxin is exported by the type 2 or type secretion system.
