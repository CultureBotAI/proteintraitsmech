identifier: InterPro:IPR045331
label: "MITD1, N-terminal domain"
definition: >-
  The MIT domain forms an asymmetric three-helix bundle. It is found in vacuolar sorting proteins, spastin (probable ATPase involved in the assembly or function of nuclear protein complexes), and a sorting nexin, which may play a role in intracellular trafficking. MIT domain-containing protein 1, together with components of the ESCRT-III complex, is required for efficient abscission at the end of cytokinesis.
