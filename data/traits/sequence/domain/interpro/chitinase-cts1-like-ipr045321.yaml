identifier: InterPro:IPR045321
label: "Chitinase Cts1-like"
definition: >-
  This entry represents a domain found in a group of chitinase-like proteins mostly form fungi and plants, including Cts1 from budding yeasts, CHIB1 from Arabidopsis and XIP-I from wheat and rice. Cts1 is required for cell separation during growth of S. cerevisiae. XIP-I is a xylanase inhibitor that does not exhibit chitinolytic activity but shows specificities towards fungal GH11 xylanases.
