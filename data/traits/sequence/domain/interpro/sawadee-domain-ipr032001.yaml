identifier: InterPro:IPR032001
label: SAWADEE domain
definition: >-
  The SAWADEE domain, found in plant homeobox proteins SHH1 and SHH2, has a tudor-like fold and binds chromatin. SHH1 protein is involved in RNA-directed DNA methylation (RdDM).
