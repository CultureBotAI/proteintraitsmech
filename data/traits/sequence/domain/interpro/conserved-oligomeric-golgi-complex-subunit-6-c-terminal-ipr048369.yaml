identifier: InterPro:IPR048369
label: "Conserved Oligomeric Golgi complex subunit 6, C-terminal"
definition: >-
  This entry represents the α-helical bundle found at the C-terminal of COG6. COG6 is a component of the peripheral membrane conserved oligomeric Golgi (COG) complex that is involved in intra-Golgi protein trafficking. COG is located at the cis-Golgi and it is required for normal Golgi morphology and localisation. It regulates tethering of retrograde intra-Golgi vesicles and consists of one octamer comprising two tetramers (COG1-4 and COG5-8). COG subunits belong to the Complex Associated with Tethering Containing Helical Rods (CATCHRs) family which also includes subunits from the evolutionary related GARP (Golgi-Associated Retrograde Protein), exocyst and Dsl1 complexes. CATCHRs proteins share a structural fold consisting of α-helical bundles in tandem at the C-terminal and a coiled-coil region at the N-terminal.
