identifier: InterPro:IPR062338
label: "Adaptation to cold protein C, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of AtcC, a protein essential for cold adaptation in Shewanella oneidensis and related proteobacteria. AtcC forms part of a protein network that includes AtcJ, a J-domain co-chaperone of the DnaK (Hsp70) chaperone system, and AtcB. AtcC interacts directly with both AtcJ and AtcB. Deletion of atcC results in dramatically reduced growth at low temperature (7 degrees C). The specific function of this domain remains to be determined.
