identifier: InterPro:IPR024962
label: YukD-like
definition: >-
  This entry represents a domain found standalone in proteins such as YukD and N-terminal in multidomain proteins. YukD adopts a ubiquitin-like fold. Usually, ubiquitin covalently binds to protein and flags them for protein degradation; however conjugation assays have indicated that the classical YukD lacks the capacity for covalent bond formation with other proteins. In firmicutes (Gram-positive bacteria), the YukD-like proteins are standalone versions and the YukD-like family is associated in conserved gene neighbourhoods with members of the ESAT-6 export pathway (also called Type VII secretion system or ESX), suggesting a role for YukD in regulating this export system. In actinobacteria, YukD-like proteins are often fused to a transporter involved in the ESAT-6/ESX secretion pathway. Members of the YukD family are also associated in gene neighbourhoods with other enzymatic members of the ubiquitin signaling and degradation pathway such as the E1, E2 and E3 trienzyme complex that catalyse ubiquitin transfer to substrates, and the JAB family metallopeptidases that are involved in its release. This suggests that a subset of the YukD family in bacteria are conjugated to target proteins and released from proteins as in the eukaryotic ubiquitin-mediated signaling and degradation pathway.
