identifier: InterPro:IPR041077
label: "MALT1 immunoglobulin-like domain"
definition: >-
  This is an immunoglobulin-like domain which can be found in the mucosa-associated lymphoid tissue lymphoma translocation 1 (MALT1) paracaspase. Malt1 is a key component of the Carma1/Bcl10/MALT1 signalosome and is critical for NF-kB signaling in multiple contexts. The MALT1 C-terminal Ig domain is suggested to recruit key factors to promote NF-kB activation. It is also proposed to undergo Lys63-linked ubiquitylation via TRAF6 in potentially nine different lysines to recruit the IKK complex.
