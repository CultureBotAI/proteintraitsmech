identifier: InterPro:IPR048387
label: "T-box transcription factor 2/3, repressor domain"
definition: >-
  This entry represents the repressor domain (RD) found at the C-terminal of T-box transcription factors 2 and 3 (TBX2 and TBX3), which are homologous. T-box genes are highly conserved and encode transcription factors that are involved in morphogenesis and organogenesis of both invertebrates and vertebrates. However, TBX2 is strongly re-expressed in adults which suggests a role in non-developmental processes.
