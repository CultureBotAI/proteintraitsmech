identifier: InterPro:IPR007340
label: Opacity-associated protein A, LysM-like domain
definition: >-
  The OapA domain gets its name from the Haemophilus influenzae protein OapA, which is required for the expression of colony opacity, thus opacity- associated protein A. The OapA protein is required for efficient nasopharyngeal mucosal colonization, and its expression is associated with a distinctive transparent colony phenotype. OapA is thought to be a secreted protein, and its expression exhibits high-frequency phase variation. The OapA protein contains a C-terminal OapA domain, which in the E. coli protein YtfB has been shown to bind to peptidoglycan. A screen to identify factors that affect cell division in E. coli discovered that overproducing a fragment of YtfB, including its OapA domain, caused cells to grow as long filaments. OapA domains are commonly associated with other domains that are involved in breaking peptidoglycan cross-links such as. The OapA domain is distantly related to another peptidoglycan binding domain. This domain is also found in the cell wall peptidoglycan (PG) DD-endopeptidases ShyA and ShyB essential for cell growth and elongation.
