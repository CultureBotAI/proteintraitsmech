identifier: InterPro:IPR063360
label: "Teflon, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the Teflon protein from Drosophila melanogaster and similar proteins from diptera. Teflon proteins are specifically required in male Drosophila for proper segregation of autosomal bivalents at meiosis I. The proteins are expressed in the male germ line prior to spermatocyte stage S4 and localise to male meiotic chromosomes. Teflon may function as a bridging molecule maintaining adhesion to hold autosome bivalents together via heterochromatic connections. This domain precedes C-terminal C2H2-type zinc finger domains. This family arose from a Drosophilid-specific gene duplication that generated the related rgr gene. The specific function of this domain remains to be determined.
