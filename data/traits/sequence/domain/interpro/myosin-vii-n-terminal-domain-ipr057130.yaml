identifier: InterPro:IPR057130
label: "Myosin VII, N-terminal domain"
definition: >-
  This entry represents a small 5-stranded β-barrel domain found at the N-terminal end of some animal myosin VII proteins. Myosin-VII proteins are actin-based motor molecules with ATPase activity, playing crucial roles in intracellular movements and cellular projections. They function as single-molecule cargo transporters, maintaining tension in actin filaments. In the retina, they are involved in the renewal of photoreceptor disks and the regulation of opsin transport. In the inner ear, they contribute to the differentiation, morphogenesis, and organisation of cochlear hair cell bundles, essential for normal hearing. Additionally, they play roles in epithelial brush border differentiation and microvilli organisation [ . , , ].
