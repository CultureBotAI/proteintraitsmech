identifier: InterPro:IPR049398
label: "ETF-QO/FixC, ubiquinone-binding"
definition: >-
  Electron transfer flavoprotein-ubiquinone oxidoreductase (ETF-QO) is a a 4Fe4S flavoprotein located in the inner mitochondrial membrane and catalyses ubiquinone (UQ) reduction. It forms a single structural domain with three functional regions (that bind FAD, the 4Fe4S cluster, and UQ) which are closely packed and share structural elements. This domain includes the residues involved in UQ binding. This domain is also found in FixC proteins from bacteria ( ], which share similarities with ETF-QO.
