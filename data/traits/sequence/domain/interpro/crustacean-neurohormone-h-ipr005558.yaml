identifier: InterPro:IPR005558
label: "Crustacean neurohormone H"
definition: >-
  Arthropod express a family of neuropeptides which so far consist of the following types of neurohormones: Crustacean hyperglycemic hormone (CHH). CHH is primarily involved in blood sugar regulation, but also plays a role in the control of molting and reproduction. Molt-inhibiting hormone (MIH). MIH inhibits Y-organs where molting hormone (ecdysteroid) is secreted. A molting cycle is initiated when MIH secretion diminishes or stops. Gonad-inhibiting hormone (GIH), also known as vitellogenesis-inhibiting hormone (VIH) because of its role in inhibiting vitellogenesis in female animals. Mandibular organ-inhibiting hormone (MOIH). MOIH represses the synthesis of methyl farnesoate, the precursor of insect juvenile hormone III in the mandibular organ. Ion transport peptide (ITP) from locust. ITP stimulates salt and water reabsorption and inhibits acid secretion in the ileum of the locust. These neurohormones are peptides of 70 to 80 residues which are processed from larger size precursors. They contain six conserved cysteines that are involved in disulphide bonds, as shown in the following schematic representation. Crustacean neurohormone H proteins are referred to as precursor-related peptides as they are typically co-transcribed and translated with the CHH neurohormone ( ). However, in some species this neuropeptide is synthesized as a separate protein. Furthermore, neurohormone H can undergo proteolysis to give rise to 5 different neuropeptides.
