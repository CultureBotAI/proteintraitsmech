identifier: InterPro:IPR040453
label: "Mnd1, HTH domain"
definition: >-
  This HTH domain is found in Mnd1 from S. cerevisiae. The Mnd1 protein forms a complex with Hop2 to promote homologous chromosome pairing and meiotic double-strand break repair.
