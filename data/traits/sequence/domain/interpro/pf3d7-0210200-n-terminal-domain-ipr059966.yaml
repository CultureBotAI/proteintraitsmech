identifier: InterPro:IPR059966
label: "PF3D7_0210200, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in Plasmodium falciparum protein PF3D7_0210200. The domain adopts a tetracycline repressor-like fold with a predicted helix-turn-helix structure. The full-length protein is 2588 amino acids and contains predicted coiled-coil regions and multiple disordered regions. The protein is localised to the merozoite and a peptide fragment has been identified as a potential malaria vaccine candidate. The function of this N-terminal domain remains to be determined.
