identifier: InterPro:IPR027916
label: "Rhoptry, kinase-like domain"
definition: >-
  This entry represents the kinase-like domain found in the Rhoptry (ROP) pseudokinases ROP4, ROP5, ROP17 AND ROP18 and kinases from the intracellular parasite Toxoplasma gondii. ROP17 and ROP18 are protein kinases that function as virulence factors. In ROP18, this domain adopts the canonical protein kinase domain-fold with a predominantly α-helical C-terminal lobe and a smaller N-terminal lobe containing a central β-sheet. ROP4 is localised to the rhoptries, secretory organelles at the apical end of the parasite, and is secreted from the parasite during host cell invasion. It has a typical bi-lobed protein kinase fold, but lack catalytic activity. ROP5 is a pseudokinase that is essential for virulence in type I lineages of Toxoplasma gondii. It plays a critical role in promoting parasite survival within mouse monocytes and is required for the parasite's resistance to innate immune responses triggered by interferon-gamma (IFN-γ) in mice. ROP5 reduces the accumulation of immunity-related GTPases (IRGs), including IRGA6 (IIGP1) and IRGB6 (TGTP1/TGTP2), on the parasitophorous vacuole membrane, thereby limiting IRG-mediated killing of the parasite by mouse cells. It also regulates the activity of ROP18, an active kinase that directly targets IRGs to block their function and prevent parasite clearance. Additionally, ROP5 acts as an allosteric inhibitor of mouse IRGA6 (IIGP1). Notably, ROP5 does not affect IFN-γ-mediated parasite killing in human cells, which lack the diverse IRG repertoire found in mice.
