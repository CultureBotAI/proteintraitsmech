identifier: InterPro:IPR060715
label: "MAP_0585-like, C-terminal"
definition: >-
  This entry represents the C-terminal region of a group of proteins from mycobacteria, including MAP_0585 from Mycolicibacterium paratuberculosis . The protein has been studied as a vaccine component but is otherwise uncharacterised. The C-terminal region is enriched with proline and glycine residues.
