identifier: InterPro:IPR014877
label: Exportin-1, C-terminal
definition: >-
  CRM1 (also known as exportin1) mediates the nuclear export of proteins bearing a leucine-rich nuclear export signal (NES). CRM1 forms a complex with the NES containing protein and the small GTPase Ran. This entry represents the C-terminal domain of CRM1. It forms an α helical structure formed by six helical hairpin motifs that are structurally similar to the HEAT repeat, but share little sequence similarity to the HEAT repeat.
