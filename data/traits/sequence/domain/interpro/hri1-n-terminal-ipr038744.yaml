identifier: InterPro:IPR038744
label: "Hri1, N-terminal"
definition: >-
  Saccharomyces cerevisiae Hri1 (Hrr25-interacting protein 1, YLR301w) is a non-essential gene product named for its interaction with the yeast protein kinase Hrr25. It has also been characterised as an interaction partner for Sec72p, but does not seem to be required for protein translocation into the ER. It may be a cytosolic protein. Hri1p contains a tandem repeat of a structural unit that forms a β-barrel with structural similarity to nitrobindin. This N-terminal repeat is involved in homodimerization and may contain a ligand binding site.
