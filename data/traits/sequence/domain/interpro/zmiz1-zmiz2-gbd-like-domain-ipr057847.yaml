identifier: InterPro:IPR057847
label: "ZMIZ1/ZMIZ2, GBD-like domain"
definition: >-
  This domain is found in the human Zinc finger MIZ domain-containing protein 1/2 (ZMIZ1 and ZMIZ2) and related proteins. This domain is predicted to fold into a β-sandwich with a topology typical for galactose-binding domains. It is closely related to . It is frequently found in combination with . ZMIZ1 is a transcriptional regulator that functions as a direct cofactor of Notch1, modulating Notch target gene expression through interaction with the RAM1 domain via its N-terminal tetratricopeptide repeat (TPR) domain ( ). It has been shown that ZMIZ1 and Notch1 cooperatively recruit one another to chromatin through direct TPR-mediated interaction, leading to a modest increase in activating histone marks and a corresponding reduction in repressive marks. In addition to its role in Notch signalling, ZMIZ1 enhances ligand-dependent transcriptional activity of the androgen receptor (AR) and promotes AR sumoylation,. It also acts as a coactivator in the TGF-beta signalling pathway by potentiating the transcriptional activity of the SMAD3/SMAD4 complex.
