identifier: InterPro:IPR062042
label: "COASY, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of approximately 150 residues found in COASY (bifunctional coenzyme A synthase) in vertebrates. This domain is located N-terminal to the CTP_transf_like domain ( ) and CoaE domain ( ). COASY catalyses the fourth and fifth steps of CoA biosynthesis. Mutations in COASY cause neurodegeneration with brain iron accumulation (NBIA6) and pontocerebellar hypoplasia type 12 (PCH12).
