identifier: InterPro:IPR056806
label: "Stabilin-1/2, EGF-like domain"
definition: >-
  This entry represents EGF-like domains found in Stabilin-1 and 2 (STAB1/2), proteins that act as a scavenger receptors for acetylated low density lipoproteins. They bind Gram-positive and Gram-negative bacteria and may play a role in defence against bacterial infection. These proteins are also involved in the delivery of newly synthesised CHID1/SI-CLP (stabilin-1 interacting chitinase-like protein) from the biosynthetic compartment to the endosomal/lysosomal system. Members of this group are mainly found in vertebrates.
