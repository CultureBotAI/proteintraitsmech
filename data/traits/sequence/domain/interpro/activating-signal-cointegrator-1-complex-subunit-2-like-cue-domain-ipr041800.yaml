identifier: InterPro:IPR041800
label: "Activating signal cointegrator 1 complex subunit 2-like, CUE domain"
definition: >-
  This entry represents the CUE domain found in human ASCC2 and related eukaryotic proteins. ASCC2 is a ubiquitin-binding protein involved in DNA repair and rescue of stalled ribosomes. It plays a role in DNA damage repair as component of the ASCC complex.
