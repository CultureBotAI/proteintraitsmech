identifier: InterPro:IPR023584
label: "Ribosome recycling factor domain"
definition: >-
  The ribosome recycling factor or ribosome release factor (RRF) dissociates ribosomes from mRNA after termination of translation, and is essential for bacterial growth. Thus ribosomes are 'recycled' and ready for another round of protein synthesis. This entry represents a domain found in ribosome recycling factors.
