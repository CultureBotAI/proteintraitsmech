identifier: InterPro:IPR047373
label: "Mask-like, type I K homology"
definition: >-
  This entry represents the type I KH domain of Mask and similar proteins mainly found in arthropods and nematodes. Mask, also called multiple ankyrin repeat single KH domain-containing protein, is a large ankyrin repeat and KH domain-containing protein involved in Drosophila receptor tyrosine kinase signalling. It acts as a mediator of receptor tyrosine kinase (RTK) signalling and may act either downstream of MAPK or transduce signalling through a parallel branch of the RTK pathway. Mask is required for the development and organisation of indirect flight muscle sarcomeres by regulating the formation of M line and H zone and the correct assembly of thick and thin filaments in the sarcomere.
