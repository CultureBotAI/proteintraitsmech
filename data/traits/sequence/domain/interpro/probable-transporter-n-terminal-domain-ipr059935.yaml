identifier: InterPro:IPR059935
label: "Probable transporter, N-terminal domain"
definition: >-
  This entry represents an N-terminal transmembrane helix of a Probable transporter found in uncharacterised bacterial proteins. This domain is usually found in combination with a probable periplasmic core domain similar to the domain of MacB ABC transporter proteins.
