identifier: InterPro:IPR062938
label: "PAP2 superfamily phosphatase-like, transmembrane extension domain"
definition: >-
  This entry represents a C-terminal transmembrane extension domain of PAP2 superfamily phosphatases. The region is approximately 90-150 residues in length and is composed of additional transmembrane α-helices. These phosphatases belong to the phosphatidic acid phosphatase type 2 family and catalyse the dephosphorylation of phosphatidic acid and other phospholipids. Some family members are glycerophosphodiester phosphodiesterases. This transmembrane extension is found downstream of the PAP2 catalytic domain. The region is found predominantly in Bacteria, particularly in Bacillota. This domain can also be found independently, covering the whole length of uncharacterised proteins.
