identifier: InterPro:IPR021869
label: "Ribonuclease Zc3h12a-like, NYN domain"
definition: >-
  This domain is found in the Zc3h12a protein and NEDD4-binding protein 1 (N4BP1). Zc3h12a has been shown to be a ribonuclease that controls the stability of a set of inflammatory genes. This domain belongs to the PIN domain superfamily and it has also been identified as part of the NYN domain family. N4BP1 is a potent suppressor of cytokine production that acts as a regulator of innate immune signalling and inflammation. It acts as a restriction factor against some viruses, such as HIV-1. N4BP1 restricts HIV-1 replication by binding to HIV-1 mRNAs and mediating their degradation via its ribonuclease activity.
