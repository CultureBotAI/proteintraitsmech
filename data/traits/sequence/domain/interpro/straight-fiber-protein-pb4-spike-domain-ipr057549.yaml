identifier: InterPro:IPR057549
label: "Straight fiber protein PB4, spike domain"
definition: >-
  This entry represents the Straight fiber protein PB4 spike found in Escherichia phage T5 and other tailed bacteriophages and some bacterial prophages. The T5 PB4 spike forms a hetero trimer containing several small distinct subdomains some of which defining a β-helix, others are β-prism. PB4 along with PB3, forms the central straight fibre, bearing the receptor binding protein PB5 at its C-terminal. Upon PB5 binding to the host receptor FhuA, the central fibre reorganises and undergoes structural rearrangements that lead to its bending, bringing PB3 close to the host membrane for anchoring. In this process the PB4 spike undergoes structural rearrangement as well.
