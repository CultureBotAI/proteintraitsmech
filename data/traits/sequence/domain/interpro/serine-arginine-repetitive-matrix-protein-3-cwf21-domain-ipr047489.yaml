identifier: InterPro:IPR047489
label: "Serine/arginine repetitive matrix protein 3, cwf21 domain"
definition: >-
  This entry represents the cwf21 domain of SRRM3 and similar proteins mainly found in vertebrates. This domain is involved in mRNA splicing. It binds directly to the spliceosomal protein Prp8. Serine/arginine repetitive matrix protein 3 (SRRM3) may play a role in regulating breast cancer cell invasiveness. It may also be involved in RYBP-mediated breast cancer progression. SRRM3 contains a cwf21 domain at the N-terminal.
