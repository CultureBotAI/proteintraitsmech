identifier: InterPro:IPR056424
label: "Gem-associated protein 5, second beta-propeller domain"
definition: >-
  This entry represents the second β-propeller found in Gem-associated protein 5 (GEMI5) from vertebrates and its orthologue from Drosophila melanogaster, Protein rigor mortis (RIG). The β-propellers in GEMI5 bind small nuclear RNAs (snRNAs) playing a critical role in the assembly of the heptameric Sm protein core on snRNAs and the biogenesis of small nuclear ribonucleoproteins (snRNPs). Apart of being a component of the survival motor neuron (SMN) complex, it is a nuclear receptor-interacting protein required for the response to steroid hormone ecdysone during larval development in which this domain acts as a specific protein-protein interaction domain. GEMI5 is a component of the survival of motor neurons (SMN) complex, that binds small nuclear RNAs (snRNAs). The SMN complex assembles the heptameric Sm protein core on snRNAs playing a critical role in the biogenesis of small nuclear ribonucleoproteins (snRNPs). GEMI5 is also implicated in translation control, and gene expression reprogramming. GEMI5 from animals share a domain architecture consisting of two N-terminal β-propellers followed by a TPR domain and a C-terminal RNA-binding domain.
