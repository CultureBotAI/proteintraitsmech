identifier: InterPro:IPR049046
label: "Non-reducing end beta-L-arabinofuranosidase-like, GH127 middle domain"
definition: >-
  This entry represents the first of two β-sandwich domains found in Non-reducing end beta-L-arabinofuranosidase from Bifidobacterium longum ( also known as Beta-AFase). This domain shows a similarity to C-terminal domains of GH44, GH27, and GH39 enzymes. Beta-AFase, an unusual beta-L-arabinofuranosidase enzyme ( ), releases l-arabinose from the l-arabinofuranose (Araf)-beta1,2-Araf disaccharide and also transglycosylates 1-alkanols with retention of the anomeric configuration. Terminal beta-l-arabinofuranosyl residues have been found in arabinogalactan proteins from a number of different plant species. Beta-l-Arabinofuranosyl linkages with 1-4 arabinofuranosides are also found in the sugar chains of extensin and solanaceous lectins, hydroxyproline (Hyp)2-rich glycoproteins that are widely observed in plant cell wall fractions. The critical residue for catalytic activity is Glu-338, in a ET/SCAS sequence context.
