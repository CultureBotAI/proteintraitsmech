identifier: InterPro:IPR013512
label: 1-deoxy-D-xylulose 5-phosphate reductoisomerase, N-terminal
definition: >-
  This domain is found at the N terminus of bacterial and plant 1-deoxy-D-xylulose 5-phosphate reductoisomerases. It is responsible for the binding to NADPH. 1-deoxy-D-xylulose 5-phosphate reductoisomerase synthesises 2-C-methyl-D-erythritol 4-phosphate from 1-deoxy-D-xylulose 5-phosphate in a single step by intramolecular rearrangement and reduction and is responsible for terpenoid biosynthesis in some organisms. In Arabidopsis thaliana 1-deoxy-D-xylulose 5-phosphate reductoisomerase is the first committed enzyme of the non-mevalonate pathway for isoprenoid biosynthesis. The enzyme requires Mn2+, Co2+ or Mg2+ for activity, with the first being most effective. The structure of this enzyme has been solved, showing the protein forms a dimeric assembly and contains a metal ion in the active site.
