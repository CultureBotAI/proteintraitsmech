identifier: InterPro:IPR057263
label: "C-terminal of Roc, COR-B domain"
definition: >-
  This entry corresponds to COR-B, located at the C-terminal of COR. COR-B serves as the main dimerisation interface in the full-length LRRK2 structure. It interacts with the kinase domain, which is essential for LRRK2 kinase activity. COR-B consists of four flanked helices, a central seven-stranded antiparallel β-sheet, and a hairpin motif. This entry also describes related serine/theronine-protein kinases and cyclic GMP-binding protein C. The C-terminal of Roc domain, COR, along with Roc functions as the putative regulator of kinase activity. It functions as a proper GTP-binding protein with a low GTPase activity somehow stimulating the kinase activity. COR is divided in two subdomains: COR-A and COR-B. The Roc-COR tandem is found in Roco-containing proteins from bacterias and eukaryotes. Its most prominent member is the leucine-rich repeat kinase 2 LRRK2. It also contains Leucine-rich repeat kinase 1 LRKK1, Death-associated protein kinase 1 DAPK1 and Malignant fibrous histiocytoma amplified sequence 1 MFHAS1.
