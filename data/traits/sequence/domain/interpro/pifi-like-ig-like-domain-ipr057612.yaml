identifier: InterPro:IPR057612
label: "PIFI-like, Ig-like domain"
definition: >-
  PIFI is required during nonphotochemical quenching and is involved in NAD(P)H dehydrogenase complex-mediated chlororespiratory electron transport. This predicted immunoglobulin-like (Ig-like) domain is found in Protein POST-ILLUMINATION CHLOROPHYLL FLUORESCENCE INCREASE, chloroplastic from Arabidopsis thaliana (PIFI) and similar plant proteins.
