identifier: InterPro:IPR040814
label: "Activity-regulated cytoskeleton-associated protein, C-lobe"
definition: >-
  This entry represents the C-lobe domain of the Activity-regulated cytoskeleton-associated protein (Arc). The Arc protein modulates the trafficking of AMPA-type glutamate receptors. This protein is associated with cognitive diseases. This protein has a bi-lobar architecture that is similar to the capsid domain of HIV gag protein consisting of a N-lobe, and a C-lobe, which have four and five α-helices, connected by a short non-helical segment. This protein was originated from the Ty3/Gypsy retrotransposon family and domesticated in higher vertebrates for synaptic functions.
