identifier: InterPro:IPR058918
label: "Kalirin/TRIO-like, spectrin repeats"
definition: >-
  This entry represents a region of spectrin repeats found in human Kalirin (KALRN) and similar proteins from animals. KALRN activates specific Rho GTPase family members, thereby inducing various signalling mechanisms that regulate neuronal shape, growth, and plasticity, through their effects on the actin cytoskeleton. TRIO is a guanine nucleotide exchange factor (GEF) for RHOA and RAC1 GTPases involved in coordinating actin remodelling, which is necessary for cell migration and growth. It plays a key role in the regulation of neurite outgrowth and lamellipodia formation.
