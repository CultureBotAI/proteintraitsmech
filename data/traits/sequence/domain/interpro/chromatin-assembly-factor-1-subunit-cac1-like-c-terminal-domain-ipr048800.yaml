identifier: InterPro:IPR048800
label: "Chromatin assembly factor 1 subunit Cac1-like, C-terminal domain"
definition: >-
  Chromatin assembly factor 1 (CAF-1) is a histone H3-H4 chaperone that deposits newly synthesized histone (H3-H4)2 tetramers during nucleosome assembly. CAF-1 complex is composed of several subunits. This entry represents the C-terminal domain of subunit Cac1 from yeast (also known as Chromatin assembly factor 1 subunit p90 or RLF2) and similar proteins from fungi and plants. This domain adopts a winged helix fold and binds to DNA in a sequence-independent manner. This domain was also found to mediate the (H3-H4)2 tetramerization.
