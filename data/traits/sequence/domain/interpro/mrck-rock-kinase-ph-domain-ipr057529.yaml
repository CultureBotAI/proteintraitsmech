identifier: InterPro:IPR057529
label: "MRCK/ROCK kinase, PH domain"
definition: >-
  This entry represents a pleckstrin homology (PH) domain found in Serine/threonine-protein kinase MRCK alpha/beta/gamma, in Rho-associated protein kinase 1/2 (ROCK1/2) and similar sequences mainly found in animals. MRCK (myotonic dystrophy kinase-related Cdc42-binding kinase) forms part of a tripartite C1-PH-CNH regulatory module. The PH domain is distinguished by a loop insertion between strands β6 and β7 that packs against the CNH domain. The domain contains conserved basic residues in the β1-β2 loop that may be involved in membrane binding. This PH domain shows weak binding to phosphoinositides with a preference for di-phosphorylated PIPs. The domain architecture of MRCK proteins includes an N-terminal kinase domain, a coiled-coil region, and C-terminal C1, PH and CNH domains arranged in a tripartite module that helps localise the protein to membranes. Human Serine/threonine-protein kinase MRCK alpha/gamma are important downstream effectors of CDC42 and play a role in the regulation of cytoskeleton reorganisation and cell migration. Rho-associated protein kinase 1/2 are key regulator of the actin cytoskeleton and cell polarity.
