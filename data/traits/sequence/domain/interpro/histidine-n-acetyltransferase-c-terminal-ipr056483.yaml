identifier: InterPro:IPR056483
label: "Histidine N-acetyltransferase, C-terminal"
definition: >-
  This entry represents the C-terminal domain of Histidine N-acetyltransferase HISAT from ectothermic vertebrates and the orthologue from human, NAT16. HISAT is responsible for the N-acetyl-histidine (NAH) synthesis, which is a major constituent of brain and lens of ectothermic vertebrates. NAT16, unlike fish HISAT, has only trace enzyme activity for NAH synthesis.
