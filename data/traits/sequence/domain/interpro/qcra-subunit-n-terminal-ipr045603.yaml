identifier: InterPro:IPR045603
label: "QcrA subunit, N-terminal"
definition: >-
  This entry represents the N-terminal region of the bacterial QcrA subunit (also known as Cytochrome bc1 complex Rieske iron-sulfur subunit) which is part of respiratory complex III. This entry includes anchoring transmembrane helical regions.
