identifier: InterPro:IPR029863
label: "Myelin protein zero-like protein 2, Ig-like domain"
definition: >-
  Myelin protein zero-like protein 2 (MPZL2), also known as epithelial V-like antigen (EVA), is a transmembrane protein that contains an extracellular immunoglobulin (Ig)-like V-type (variable) structural domain, and therefore has a putative role in cell adhesion. In mice Mpzl2 can compensate for the deficiency of Cadm1 (cell adhesion molecule-1) in the earlier spermatogenic cells. It is is expressed in the thymus and in several epithelial structures early in embryogenesis, and therefore it may participate in the earliest phases of thymus organogenesis. This entry represents the immunoglobulin (Ig)-like domain of MPZL2.
