identifier: InterPro:IPR021064
label: "Estrogen receptor beta-like, N-terminal"
definition: >-
  This entry represents the N-terminal domain of Estrogen receptor beta (ER-beta) and similar proteins from eukaryotes. This domain has approximately 110 amino acids in length and is usually found in association with , . There is a conserved IPS sequence motif and there are two completely conserved residues (Y and W) that may be functionally important. ER-beta is a nuclear hormone receptor that binds estrogens with an affinity similar to that of ER-alpha, and activates expression of reporter genes containing estrogen response elements in an estrogen-dependent manner. ER-beta acts as a transcription factor once bound to its ligand and it can dimerise with ER-alpha. In humans, these receptors may play an important role in the development, treatment, and prognosis of breast cancer and other disorders such as osteoporosis, delayed bone age and continuous growth in adulthood, and multiple ovarian cysts in women. This entry algo includes Estrogen receptor gamma (ER-gamma) from Micropogonias undulatus (Atlantic croaker).
