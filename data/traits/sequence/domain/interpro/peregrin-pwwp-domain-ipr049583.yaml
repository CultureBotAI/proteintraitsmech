identifier: InterPro:IPR049583
label: "Peregrin, PWWP domain"
definition: >-
  This entry represents a PWWP domain found in human Peregrin (BRPF1) and similar proteins from vertebrates. BRPF1, also called protein Br140, is a multi-domain protein that binds histones, mediates monocytic leukemic zinc-finger protein (MOZ)-dependent histone acetylation, and is required for Hox gene expression and segmental identity. It is a close partner of the MOZ histone acetyltransferase (HAT) complex and a novel Trithorax group (TrxG) member with a central role during development. It contains a plant homeodomain (PHD) zinc finger followed by a non-canonical extended PHD (ePHD) finger, C2HC5HC2H, a bromodomain, and a proline-tryptophan-tryptophan-proline (PWWP) domain. The PHD finger binds to methylated lysine 4 of histone H3 (K4H3), the bromodomain interacts with acetylated lysines on N-terminal tails of histones and other proteins, and the PWWP domain shows histone-binding and chromatin association properties.
