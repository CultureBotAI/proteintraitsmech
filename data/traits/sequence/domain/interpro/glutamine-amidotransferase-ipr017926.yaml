identifier: InterPro:IPR017926
label: "Glutamine amidotransferase"
definition: >-
  Glutamine amidotransferase (GATase) enzymes catalyse the removal of the ammonia group from glutamine and then transfer this group to a substrate to form a new carbon-nitrogen group. The GATase domain exists either as a separate polypeptidic subunit or as part of a larger polypeptide fused in different ways to a synthase domain. Two classes of GATase domains have been identified: class-I (also known as trpG-type or triad) and class-II (also known as purF-type or Ntn). Class-I (or type 1) GATase domains have been found in the following enzymes: The second component of anthranilate synthase (AS). AS catalyses the biosynthesis of anthranilate from chorismate and glutamine. AS is generally a dimeric enzyme: the first component can synthesize anthranilate using ammonia rather than glutamine, whereas component II provides the GATase activity. In some bacteria and in fungi the GATase component of AS is part of a multifunctional protein that also catalyses other steps of the biosynthesis of tryptophan. The second component of 4-amino-4-deoxychorismate (ADC) synthase, a dimeric prokaryotic enzyme that functions in the pathway that catalyses the biosynthesis of para-aminobenzoate (PABA) from chorismate and glutamine. The second component (gene pabA) provides the GATase activity. CTP synthase. CTP synthase catalyses the final reaction in the biosynthesis of pyrimidine, the ATP-dependent formation of CTP from UTP and glutamine. CTP synthase is a single chain enzyme that contains two distinct domains; the GATase domain is in the C-terminal section. GMP synthase (glutamine-hydrolyzing). GMP synthase catalyses the ATP-dependent formation of GMP from xanthosine 5'-phosphate and glutamine. GMP synthase is a single chain enzyme that contains two distinct domains; the GATase domain is in…
