identifier: InterPro:IPR060382
label: "ATRAID, C-terminal region"
definition: >-
  This entry represents the C-terminal helix of ATRAID (all-trans retinoic acid-induced differentiation factor) found in vertebrates. This entry represents the transmembrane region and cytoplasmic tail of the protein. ATRAID (All-trans retinoic acid-induced differentiation factor), also known as APR3, is a membrane protein that functions as a proliferation suppressor. It plays a role in inducing the cell cycle arrest via inhibiting CCND1 expression in all-trans-retinoic acid (ATRA) signal pathway. ATRAID promotes osteoblast cell differentiation and terminal mineralisation, and forms a transporter complex with SLC37A3 for nitrogen-containing bisphosphonates. ATRAID localises to the nuclear envelope, cell membrane, and lysosome membrane.
