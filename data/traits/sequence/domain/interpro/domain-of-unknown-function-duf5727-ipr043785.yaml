definition: >-
  This entry represents a conserved domain of unknown function found in Platyhelminthes, closely related to glycosylphosphatidylinositol (GPI)-anchored protein GP50, known as Diagnostic antigen GP50. GP50 is a family of highly expressed antigens exclusive to tapeworms.
