identifier: InterPro:IPR042716
label: "E3 ubiquitin-protein ligase RNF114, RING finger, HC subclass"
definition: >-
  RNF114 (also known as Znf313) is a p21(WAF1)-targeting ubiquitin E3 ligase that interacts with X-linked inhibitor of apoptosis (XIAP)-associated factor 1 (XAF1) and may play a role in p53-mediated cell-fate decisions. It is involved in immune response to double-stranded RNA in disease pathogenesis. Moreover, RNF114 interacts with A20 and modulates its ubiquitination. It negatively regulates nuclear factor-kappaB (NF-kappaB)-dependent transcription and positively regulates T-cell activation. RNF114 may play a putative role in the regulation of immune responses, since it corresponds to a novel psoriasis susceptibility gene, ZNF313. RNF114, together with three closely related proteins: RNF125, RNF138 and RNF166, forms a novel family of ubiquitin ligases with a C3HC4-type RING-HC finger, a C2HC-, and two C2H2-type zinc fingers, as well as a ubiquitin interacting motif (UIM).
