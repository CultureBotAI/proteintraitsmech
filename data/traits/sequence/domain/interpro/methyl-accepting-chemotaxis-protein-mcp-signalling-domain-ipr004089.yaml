identifier: InterPro:IPR004089
label: Methyl-accepting chemotaxis protein (MCP) signalling domain
definition: >-
  Methyl-accepting chemotaxis proteins (MCPs) are a family of bacterial receptors that mediate chemotaxis to diverse signals, responding to changes in the concentration of attractants and repellents in the environment by altering swimming behaviour. Environmental diversity gives rise to diversity in bacterial signalling receptors, and consequently there are many genes encoding MCPs. For example, there are four well-characterised MCPs found in Escherichia coli: Tar (taxis towards aspartate and maltose, away from nickel and cobalt), Tsr (taxis towards serine, away from leucine, indole and weak acids), Trg (taxis towards galactose and ribose) and Tap (taxis towards dipeptides). This entry represents the signalling domain found in several methyl-accepting chemotaxis proteins. This C-terminal signalling domain dimerises into a four-helix bundle and interacts with CheA through the adaptor protein CheW.
