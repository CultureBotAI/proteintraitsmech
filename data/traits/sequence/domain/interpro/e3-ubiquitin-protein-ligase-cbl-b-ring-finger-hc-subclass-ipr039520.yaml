identifier: InterPro:IPR039520
label: "E3 ubiquitin-protein ligase CBL-B, RING finger, HC subclass"
definition: >-
  CBL-B, also known as RNF56, has been identified as a regulator of antigen-specific, T cell-intrinsic, peripheral immune tolerance, a state also known as clonal anergy. It may inhibit activation of the p85 subunit of phosphoinositide 3-kinase (PI3K), protein kinase C-theta (PKC-theta) and negatively regulates T-cell receptor-induced transcription factor nuclear factor kappaB (NF-kappaB) activation. In addition, CBL-B may target multiple signaling molecules involved in transforming growth factor (TGF)-beta-mediated transactivation pathways.
