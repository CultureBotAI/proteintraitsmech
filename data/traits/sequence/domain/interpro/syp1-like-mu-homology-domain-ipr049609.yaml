identifier: InterPro:IPR049609
label: "Syp1-like, mu-homology domain"
definition: >-
  This entry represents the mu-homology domain (MHD) present in the endocytic adaptor Suppressor of yeast profilin deletion from Saccharomyces cerevisiae (Syp1) and similar fungal proteins. Syp1 is a yeast protein with multiple biological functions. It was originally identified as a suppressor of a yeast profiling deletion and later as a suppressor of arf3delta (Arf3 is the yeast homologue of Arf6, a mammalian regulator of endocytosis). Syp1 can bind to septins and physically link with cell polarity factors. It also directly binds to the endocytic adaptor/scaffold protein Ede1, and plays a role in endocytosis. Further studies show that Syp1 is itself an endocytic adaptor protein contributing to stress responses. Its mu-homology domain at the C-terminal binds to the cargo protein Mid2, a transmembrane stress sensor protein, and mediates Mid2 internalisation. In addition, Syp1 contains an EFC/F-BAR domain which can induce membrane tubulation.
