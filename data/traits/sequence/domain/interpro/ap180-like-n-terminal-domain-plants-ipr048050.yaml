identifier: InterPro:IPR048050
label: "AP180-like N-terminal domain, plants"
definition: >-
  This entry represents the N-terminal region of ANTH domains of plant clathrin coat assembly protein AP180 and similar proteins. Arabidopsis thaliana AP180 (At-AP180, also known as PICALM6) is a binding partner of plant alphaC-adaptin; it functions as a clathrin assembly protein that promotes the formation of cages with an almost uniform size distribution. In addition to At-AP180, Arabidopsis thaliana contains many ANTH domain containing proteins labelled as putative clathrin assembly proteins included in this entry such as At4g02650 (also known as PICALM5B), At1g03050 (also known as PICALM5A), At5g10410, At2g25430, and At1g33340, among others, that may play an important role in clathrin-mediated endocytosis, proper cell wall assembly and morphogenesis. PICALM5A/B are required for the pollen tube plasma membrane integrity via recycling ANXUR kinases. ANTH domains bind both inositol phospholipids and proteins, and contribute to the nucleation and formation of clathrin coats on membranes. The ANTH domain is a unique module whose N-terminal half is structurally similar to the Epsin N-Terminal Homology (ENTH) and Vps27/Hrs/STAM (VHS) domains, containing a superhelix of eight α-helices. In addition, it contains a coiled-coil C-terminal half with structural similarity to spectrin repeats. It binds phosphoinositide PtdIns(4,5)P2 at a short conserved motif K[X]9[K/R][H/Y] between helices 1 and 2.
