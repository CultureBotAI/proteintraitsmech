identifier: InterPro:IPR009906
label: "D-glutamate cyclase-like domain"
definition: >-
  This entry represents a domain found at the N-terminal of mitochondrial D-glutamate cyclase, which converts D-glutamate to 5-oxo-D-proline. This domain is also found in numerous uncharacterised proteins from bacteria.
