identifier: InterPro:IPR057095
label: "K1 capsule-specific polysaccharide lyase, rider domain"
definition: >-
  This entry represents the so-called rider domain of K1 capsule-specific polysaccharide lyase and related proteins. The rider domain folds into a β-barrel, participates in polysaccharide binding to both carbohydrate-binding sites of the enzyme and makes an important contribution to the structural stability of the trimeric K1-lyase ( ). K1-lyase functions as a receptor binding protein (RBP) and mediates the attachment to the host capsular exopolysaccharides. This enzyme possesses a lyase activity that specifically degrades the K1-type polysaccharides of Klebsiella pneumoniae capsule.
