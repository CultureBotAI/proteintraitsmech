identifier: InterPro:IPR056459
label: "DOP1-like, TPR domain"
definition: >-
  This entry represents a domain found near the C-terminal end of DOP1 (A/B) from vertebrates, DOP1 homolog from Drosophila melanogaster and Caenorhabditis elegans ortholog (pad-1). DOP1 homologues are found in mammals, where they may play a role in regulating membrane trafficking of cargo proteins. Together with ATP9A and MON2, it regulates SNX3 retromer-mediated endosomal sorting of WLS away from lysosomal degradation. These are long proteins consisting of tetratricopeptide (TPRs) repeats.
