identifier: InterPro:IPR006491
label: "Plasmodium yoelii subtelomeric PYST-C2"
definition: >-
  These sequences represent a domain found in a paralogous gene family of Plasmodium yoelii preferentially located in the subtelomeric regions of the chromosomes. There are no obvious homologues to these genes in any other organism. The proteins often contain an N-terminal yoelii-specific domain such as PYST-C1.
