identifier: InterPro:IPR001715
label: Calponin homology domain
definition: >-
  A number of actin-binding proteins, including spectrin, alpha-actinin and fimbrin, contain a 250 amino acid stretch called the actin binding domain (ABD). The ABD has probably arisen from duplication of a domain which is also found in a single copy in a number of other proteins like calponin or the vav proto-oncogene and has been called calponin homology (CH) domain. A detailed analysis of The CH domain-containing proteins has shown that they can be divided in three groups: The fimbrin family of monomeric actin cross-linking molecules containing two ABDs Dimeric cross-linking proteins (alpha-actinin, beta-spectrin, filamin, etc.) and monomeric F-actin binding proteins (dystrophin, utrophin) each containing one ABD Proteins containing only a single amino terminal CH domain Each single ABD, comprising two CH domains, is able to bind one actin monomer in the filament. The N-terminal CH domain has the intrinsic ability to bind actin, albeit with lower affinity than the complete ABD, whereas the C-terminal CH bind actin extremely weakly or not at all. Nevertheless both CH domains are required for a fully functional ABD; the C-terminal CH domain contributing to the overall stability of the complete ABD through inter-domain helix-helix interactions. Some of the proteins containing a single CH domain also bind to actin, although this has not been shown to be via the single CH domain alone. In addition, the CH domain occurs also in a number of proteins not known to bind actin, a notable example being the vav protooncogene. The resolution of the 3D structure of various CH domains has shown that the conserved core consist of four major α-helices. Proteins containing a calponin domain include: Calponin, which is involved in the regulation of contractility and organisation of the a…
