identifier: InterPro:IPR007016
label: "O-antigen ligase-related domain"
definition: >-
  This entry represents a domain found in a group of bacterial proteins that is involved in the synthesis of O-antigen, a lipopolysaccharide found in the outer membrane in Gram-negative bacteria. This family includes O-antigen ligases such as E. coli RfaL (also known as WaaL). This entry also includes PilO ( ), which is an oligosaccharyltransferases involved in O-linked protein glycosylation.
