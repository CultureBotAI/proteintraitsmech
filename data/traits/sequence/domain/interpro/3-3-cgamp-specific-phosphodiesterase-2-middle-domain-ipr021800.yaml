identifier: InterPro:IPR021800
label: "3'3'-cGAMP-specific phosphodiesterase 2, middle domain"
definition: >-
  This domain is found in the middle region of 3'3'-cGAMP-specific phosphodiesterase 2 (CGAP2) from Vibrio cholerae and similar bacterial sequences. This domain may be related to the GAF domain. CGAP2 is a phosphodiesterase (PDE) that catalyses the hydrolysis of 3'3'-cyclic GMP-AMP (3'3'-cGAMP), leading to linear 5'-pApG. It counteracts the function of the 3'3'-cGAMP synthase DncV, and is involved in the modulation of intracellular 3'3'-cGAMP levels. It enhances bacterial chemotaxis and inhibits intestinal colonisation in vivo, therefore, it exerts a crucial role in regulating bacterial infectivity through catalysing 3'3'-cGAMP degradation. It is specific for 3'3'-cGAMP since it cannot degrade other cGAMP linkage isomers (3'2'-, 2'3'-, and 2'2'-cGAMPs). This protein is also able to hydrolyse c-di-GMP but not c-di-AMP.
