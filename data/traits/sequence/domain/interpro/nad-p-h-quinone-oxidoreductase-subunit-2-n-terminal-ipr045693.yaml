identifier: InterPro:IPR045693
label: "NAD(P)H-quinone oxidoreductase subunit 2, N-terminal"
definition: >-
  This domain represents the N-terminal domain of NAD(P)H-quinone oxidoreductase subunit 2 (or subunit B, NdhB), part of the P-module (pumping) of the photosynthetic complex I mostly from plants and cyanobacteria, which is structurally and functionally related to the respiratory complex I from mitochondria and bacteria. NdhB is involved in the electron transfer between photosynthetic complex I and photosystem I.
