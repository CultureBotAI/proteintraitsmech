identifier: InterPro:IPR063681
label: "Sperm transmembrane protein 9, third EGF-like domain"
definition: >-
  This entry represents the third EGF-like domain of the sperm transmembrane protein SPE-9 from Caenorhabditis elegans. This domain contains the characteristic disulphide bonding pattern of EGF-like domains. SPE-9 is required for fertilisation and contains five EGF-like domains in total. Mutation of the central cysteine residue to tyrosine in this protein completely abolishes fertilisation function, indicating the critical importance of proper disulphide bond formation. The protein is expressed in spermatids and localised to the sperm cell surface.
