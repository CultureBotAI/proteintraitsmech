identifier: InterPro:IPR013420
label: "Type I-B CRISPR-associated protein Cas8b/Csh1, C-terminal"
definition: >-
  This entry is found in the C-terminal 2/3 region of a family of type I-B CRISPR-associated protein Cas8b/Csh1 of the Hmari subtype,. Except for some sequences from halophilic archaea, this domain contains a pair of CXXC motifs. The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
