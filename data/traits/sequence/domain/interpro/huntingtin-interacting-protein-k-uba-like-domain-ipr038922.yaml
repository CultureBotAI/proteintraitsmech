identifier: InterPro:IPR038922
label: "Huntingtin-interacting protein K, UBA-like domain"
definition: >-
  HYPK, also called Huntingtin yeast partner K or Huntingtin yeast two-hybrid protein K, is an intrinsically unstructured Huntingtin (HTT)-interacting protein with chaperone-like activity. It is involved in regulating cell growth, cell cycle, unfolded protein response, and cell death. Proteins matched by this entry contain an N-terminal ubiquitin-associated (UBA) region that shows high sequence similarity with that of eukaryotic nascent polypeptide-associated complex proteins (NAC), which is one of the cytosolic chaperones that contact the nascent polypeptide chains as they emerge from the ribosome and assist in post-translational processes.
