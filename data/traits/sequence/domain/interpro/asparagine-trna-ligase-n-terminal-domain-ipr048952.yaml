identifier: InterPro:IPR048952
label: "Asparagine--tRNA ligase, N-terminal domain"
definition: >-
  This domain is found at the N-terminal domain of the eukaryotic cytoplasmic protein Asparagine--tRNA ligase (AsnRS, also known as NARS1). AsnRS is essential for protein translation and has been related to autoimmune and neurological diseases. Unlike its bacterial homologues, this protein has a conserved N-terminal extension, represented in this entry, connected by an unstructured tether to the part of the enzyme that has homologues within eukaryotes and prokaryotes: an anticodon-binding domain ( ), a hinge region (HR), and a catalytic domain ( ). This domain folds into two α-helices and three β-strands that form a parallel/antiparallel mixed β-sheet and has a characteristic lysine-rich helical motif that interacts with tRNA. It also shows chemokine activity through its interaction with C-C chemokine receptor 3 (CCR3) and the promotion of NRS-CCR3-mediated proinflammatory signalling.
