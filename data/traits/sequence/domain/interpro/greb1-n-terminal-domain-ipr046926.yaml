identifier: InterPro:IPR046926
label: "GREB1, N-terminal domain"
definition: >-
  This entry represents a the N-terminal domain of GREB1 and similar proteins, whose function is not yet known. Structure predictions suggest that it may have an α/β fold. GREB1 (gene regulated in breast cancer 1 protein) is a ESR1 (estrogen receptor 1)-upregulated protein that may regulate estrogen action and it is associated with estrogen-stimulated cell proliferation. It acts as a regulator of hormone-dependent cancer growth in breast, ovarian and prostate cancers. This protein may be a target to inhibit tumour-promoting pathways both downstream and independent of ESR1 as a possible treatment strategy.
