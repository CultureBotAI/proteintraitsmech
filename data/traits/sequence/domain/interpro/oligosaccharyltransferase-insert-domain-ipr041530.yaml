identifier: InterPro:IPR041530
label: "Oligosaccharyltransferase insert domain"
definition: >-
  This is a domain found in the oligosaccharyltransferase AGLB (Dolichyl-phosphooligosaccharide-protein glycotransferase 1) from P. furiosus. This is an oligosaccharyltransferase which catalyses the transfer of a heptasaccharide, containing one hexouronate and two pentose residues, onto peptides in an Asn-X-Thr/Ser-motif-dependent manner. This domain is inserted into the central core (CC) domain and hence is referred to as the insert (IS) domain. This IS domain contains a disulphide bond.
