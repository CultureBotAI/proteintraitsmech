identifier: InterPro:IPR041709
label: "Elongation factor Tu (EF-Tu), GTP-binding domain"
definition: >-
  This entry represents the GTP-binding domain found in translation elongation factor EF-Tu and its homologues from bacteria, mitochondria, and chloroplasts. EF-Tu is one of several GTP-binding translation factors found in the larger family of GTP-binding elongation factors. The eukaryotic counterpart, eukaryotic translation elongation factor 1 (eEF-1 alpha), is excluded from this entry. EF-Tu is one of the most abundant proteins in bacteria, as well as one of the most highly conserved, and in a number of species the gene is duplicated with identical function. When bound to GTP, EF-Tu can form a complex with any (correctly) aminoacylated tRNA except those for initiation and for selenocysteine, in which case EF-Tu is replaced by other factors. Transfer RNA is carried to the ribosome in these complexes for protein translation.
