identifier: InterPro:IPR058719
label: "Cell growth-regulating nucleolar protein-like, winged helix domain"
definition: >-
  This entry represents the C-terminal winged helix domain (WHD) found in the LYAR family of proteins, including mammal Cell growth-regulating nucleolar protein (LYAR), and similar sequences mainly found in animals and plants. LYAR plays a crucial role in ribosome biogenesis and transcription regulation. Members of this family are involved in the processing of pre-rRNA to produce mature rRNAs, essential for ribosome assembly. They also participate in transcription regulation by binding to specific DNA motifs and repressing the expression of certain genes, including those involved in oxidative stress response and globin production. Additionally, LYAR proteins modulate the antiviral innate immune response by interacting with IRF3 and inhibiting its DNA-binding activity. They also influence NF-kappa-B-mediated expression of pro-inflammatory cytokines and promote phagocytosis in retinal pigment epithelial cells. The N-terminal zinc-finger domain is critical for their function in rRNA production and pre-60S particle formation. G-patch domain-containing protein 1 from Arabidopsis thaliana (GDP1), also included in this entry, is involved in ribosome biogenesis, required for normal progression of rRNA processing.
