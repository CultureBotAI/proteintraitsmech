identifier: InterPro:IPR000959
label: POLO box domain
definition: >-
  A subgroup of serine/threonine protein kinases, Polo or Polo-like kinases play multiple roles during the cell cycle. Polo kinases are required at several key points through mitosis, starting from control of the G2/M transition through phosphorylation of Cdc25C and mitotic cyclins. They are also involved in meiosis I as regulators of kinetochore function. Polo kinases are characterised by an amino terminal catalytic domain, and a carboxy terminal non-catalytic domain consisting of three blocks of conserved sequences known as polo boxes which form one single functional domain. The domain is named after its founding member encoded by the polo gene of Drosophila melanogaster. This domain of around 70 amino acids has been found in species ranging from yeast to mammals. Polo boxes appear to mediate interaction with multiple proteins through protein:protein interactions; some but not all of these proteins are substrates for the kinase domain of the molecule. The crystal structure of the polo domain of the murine protein, Sak, is dimeric, consisting of two α-helices and two six-stranded β-sheets. The topology of one polypeptide subunit of the dimer consists of, from its N-to C terminus, an extended strand segment, five β-strands, one α-helix (A) and C-terminal β-strand. β-strands from one subunit form a contiguous antiparallel β-sheet with β-strands from the second subunit. The two β-sheets pack with crossing angle of 110 degrees, orienting the hydrophobic surfaces inward and the hydrophilic surfaces outward. Helix A, which is colinear with β-strand 6 of the same polypeptide, buries a large portion of the non-overlapping hydrophobic β-sheet surfaces. Interactions involving helices A comprise a majority of the hydrophobic core structure and also the dimer interface. Point mutat…
