identifier: InterPro:IPR045509
label: "HD-associated domain"
definition: >-
  This entry represents a domain that is found C-terminal to the HD domain found in the EF1143 protein and O67745_AQUAE. According to the Aravind-Koonin classification of HD-domain proteins, proteins containing this domain belong to cluster 1.
