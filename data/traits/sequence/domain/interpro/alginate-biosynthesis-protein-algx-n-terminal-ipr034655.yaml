identifier: InterPro:IPR034655
label: Alginate biosynthesis protein AlgX, N-terminal
definition: >-
  The alginate biosynthesis protein AlgX appears to be directly involved in the O-acetylation of alginate, an exopolysaccharide that is associated with the formation of persistent biofilms, such as those by mucoid strains of Pseudomonas aeruginosa that affect patients suffering from cystic fibrosis. This N-terminal catalytic domain resembles SGNH hydrolases, though with a permuted topology. The active site matches that of the SGNH hydrolases, is well conserved, and has been verified experimentally. AlgX also contains a C-terminal carbohydrate binding domain.
