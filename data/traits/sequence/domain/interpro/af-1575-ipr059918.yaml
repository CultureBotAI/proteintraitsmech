identifier: InterPro:IPR059918
label: AF_1575
definition: >-
  This entry represents a domain found in AF_1575 family of uncharacterised proteins found predominantly in archaea and some bacteria. The proteins are approximately 200-250 amino acids in length and contain predicted signal peptides, suggesting they are secreted or membrane-associated. The function of this protein family remains to be determined.
