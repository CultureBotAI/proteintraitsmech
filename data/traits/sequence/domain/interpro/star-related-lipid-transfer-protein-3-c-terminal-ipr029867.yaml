identifier: InterPro:IPR029867
label: StAR-related lipid transfer protein 3, C-terminal
definition: >-
  StAR-related lipid transfer protein 3 (STARD3, also known as MLN64) is an integral membrane protein localised to the late endosome and plasma membrane. It may function as a mediator of cholesterol transport from endosomal membranes to the plasma membrane and/or mitochondria. It contains an N-terminal membrane-spanning domain that shares homology with the MENTHO protein and a C-terminal steroidogenic acute regulatory protein (StAR)-related lipid transfer (START) domain that binds lipids, including sterols. Its transport to the late endosome is regulated by binding to 14-3-3.
