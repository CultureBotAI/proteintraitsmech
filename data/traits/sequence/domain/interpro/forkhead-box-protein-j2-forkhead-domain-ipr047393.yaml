identifier: InterPro:IPR047393
label: "Forkhead box protein J2, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXJ2 and similar sequences from vertebrates. The FH domain is a winged helix DNA-binding domain. Forkhead box protein J2 (FOXJ2) plays an important role in tumourigenesis, progression, and metastasis of certain cancers. It acts as a transcriptional activator that can bind to two different type of DNA binding sites. It is specifically expressed in meiotic spermatocytes in adult mouse testes and appears to promote meiotic progression during spermatogenesis. FOXJ2 may play a role in maintenance and survival of developing and adult neurons and it is important in inflammatory response.
