identifier: InterPro:IPR047237
label: "DCC-interacting protein 13-alpha/beta, PTB domain"
definition: >-
  This entry represents the PTB domain of DPA13A/B. PTB domains have a common PH-like fold and are found in various eukaryotic signalling molecules. This entry includes DCC-interacting protein 13-alpha/beta from humans (DIP13A/B, also known as APPL1/2) and similar proteins predominantly found in vertebrates. DIP13A/B are multifunctional adapter proteins that bind to various membrane receptors, nuclear factors and signalling proteins to regulate many processes, such as cell proliferation, immune response, endosomal trafficking and cell metabolism. DIP13B may also affect adult neurogenesis in hippocampus and olfactory system via regulating the sensitivity of glucocorticoid receptor.
