identifier: InterPro:IPR057403
label: "Aladin, seven-bladed propeller"
definition: >-
  This entry represents the seven-bladed β-propeller of Aladin and related proteins from eukaryotic organisms. Aladin (adracalin) is a nuclear envelope WD-repeat protein. It is encoded by the AAAS gene in humans. Aladin is a component of the nuclear pore complex, where it forms a heterodimer with nucleoporin NDC1. It regulates Aurora A localisation to ensure robust mitotic spindle formation. There are two ALADIN-NDC1 dimers in each inner ring subunit, one on the cytoplasmic side and the other on the nuclear side. The ALADIN β-propellers are located in close proximity to the nuclear envelope. One side of the ALADIN β-propeller is targeted by 15 achalasia-addisonianism-alacrima syndrome (AAAS)-derived mutations. These mutations either alter the structure or damage the interaction of ALADIN with other proteins.
