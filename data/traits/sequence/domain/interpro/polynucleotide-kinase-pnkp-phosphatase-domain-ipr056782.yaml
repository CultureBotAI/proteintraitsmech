identifier: InterPro:IPR056782
label: "Polynucleotide kinase, PNKP phosphatase domain"
definition: >-
  This entry represents the C-terminal domain of the bifunctional enzyme polynucleotide kinase/phosphatase, PNKP (also known as PseT) from Enterobacteria phage T4. The PNKP phosphatase domain can catalyse the hydrolytic removal of the 3'-phosphoryl of DNA, RNA and deoxynucleoside 3'-monophosphates. Members of this group are found in tailed bacteriophages and bacterial prophages.
