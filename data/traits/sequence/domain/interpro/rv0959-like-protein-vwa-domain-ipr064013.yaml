identifier: InterPro:IPR064013
label: "Rv0959-like protein, vWA domain"
definition: >-
  This is the von Willebrand factor type A (VWA) domain found at the C-terminal of a group of proteins found in Mycobacterium tuberculosis complex species. The function of these proteins or this domain remains to be determined.
