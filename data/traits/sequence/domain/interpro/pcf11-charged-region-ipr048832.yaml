identifier: InterPro:IPR048832
label: "PCF11, charged region"
definition: >-
  This entry represents the charged region found in the Pre-mRNA cleavage complex 2 protein (Pcf11) from human and the orthologues from vertebrates. PCF11 is a subunit and an essential component of the pre-mRNA cleavage complex II (CFII), the orthologue of yeast cleavage and polyadenylation factor IA (CFIA), which is involved in pre-mRNA 3' end processing and in transcription termination. PCF11-mediated termination is essential for vertebrate development.
