identifier: InterPro:IPR049377
label: "Factor H binding protein, N-terminal"
definition: >-
  Factor H binding protein (also known as GNA1870) is a surface exposed lipoprotein in Neisseria meningitidis that is a potent antigen and a potential candidate for a vaccine against meningococcal disease. The structure of the N-terminal domain consists of a more unusual taco-shaped β-barrel fold characterised by higher intrinsic flexibility than the C-terminal one. Members of this group of proteins are mainly found in betaproteobacteria.
