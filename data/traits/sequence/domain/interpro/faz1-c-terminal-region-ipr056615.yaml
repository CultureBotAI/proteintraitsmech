identifier: InterPro:IPR056615
label: "FAZ1, C-terminal region"
definition: >-
  The entry represents a repeats-containing region found towards the C-terminal end of FAZ1 from Trypanosoma brucei brucei and related proteins mainly found in lower eukaryotes. FAZ1 is a component of FAZ filament that is required for correct FAZ assembly and attachment. These repeats consist of 36x14aa repeats in T.brucei and T.cruzi while in the Leishmania major LmjF34.0690 orthologue there are 70x14aa repeats.
