identifier: InterPro:IPR053857
label: "CRISPR system endoribonuclease Csx1-like, CARF domain"
definition: >-
  CRISPR system endoribonuclease Csx1 is a metal-independent, endoribonuclease that acts selectively on ssRNA and cleaves specifically after adenosines, as part of the type III-B CRISP-Cas system, and is homologous to Csm6, sharing the same domain domain architecture consisting of a CARF domain at the N-terminal that is relatively well conserved, and a HEPN nuclease domain at the C-terminal. This entry represents the CARF (CRISPR-associated Rossmann fold) domain, which binds and cleaves the cyclic oligoadenylate molecule (cA) that then activates the HEPN domain. This domain is also found in the CRISPR-associated protein MJ1674.
