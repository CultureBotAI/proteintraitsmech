identifier: InterPro:IPR062912
label: "DNA polymerase III alpha subunit, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain of approximately 74 residues found in DNA polymerase III alpha subunits from Bacteroidota species. The domain is located C-terminal to the PHP domain ( ), DNA polymerase III alpha domain ( ), DNA polymerase III fingers domain ( ) and HHH domain ( ). DNA polymerase III is the main replicative enzyme in bacteria. The specific function of this C-terminal domain remains to be determined.
