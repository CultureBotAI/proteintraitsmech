identifier: InterPro:IPR058842
label: "E3 ubiquitin-protein ligase DCST1-like, C-terminal domain"
definition: >-
  This RING zinc finger domain is found at the C-terminal end of human E3 ubiquitin-protein ligase DCST1 and DSCT2 and related proteins mostly from animals. DCST1 mediates 'Lys-48'-linked ubiquitination of STAT2 and induces its proteasomal degradation thereby negatively regulating type-I-interferon signalling. DSCT1 and DSCT2 are also thought to be essential sperm cell-surface protein required for sperm-egg fusion and fertilisation.
