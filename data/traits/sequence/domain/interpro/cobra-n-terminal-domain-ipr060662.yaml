identifier: InterPro:IPR060662
label: "COBRA, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of COBRA family proteins. In Arabidopsis thaliana, members of the family are all extracellular glycosyl-phosphatidyl inositol-anchored proteins (GPI-linked). COBRA is involved in determining the orientation of cell expansion, probably by playing an important role in cellulose deposition. It may act by recruiting cellulose synthesising complexes to discrete positions on the cell surface.
