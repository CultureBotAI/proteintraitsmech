identifier: InterPro:IPR061254
label: "Putative surface protein MAG1430-like, central domain"
definition: >-
  This entry represents a well-conserved central region of putative proteins from the Mycoplasmatota. Member proteins have apparent N-terminal signal-anchor sequences but are not lipoproteins. The family is highly divergent, but the motif S[FY]ANDxxGxL[FY]L is extremely well conserved. The function is unknown.
