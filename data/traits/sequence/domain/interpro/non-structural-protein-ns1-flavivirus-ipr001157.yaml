identifier: InterPro:IPR001157
label: "Non-structural protein NS1, flavivirus"
definition: >-
  The Flavivirus genome polypepetide contains the capsid protein C (core protein), the matrix protein (envelope protein M), the major envelope protein E, a number of small non structural proteins (NS1, NS2A, NS2B, NS4A and NS4B), helicase and RNA-directed polymerase (NS5).
