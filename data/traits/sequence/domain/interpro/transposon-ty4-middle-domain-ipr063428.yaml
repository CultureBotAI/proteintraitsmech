identifier: InterPro:IPR063428
label: "Transposon Ty4, middle domain"
definition: >-
  This entry represents a middle domain found in transposon Ty4 Gag-Pol polyproteins from Saccharomyces cerevisiae. The specific function of this domain remains to be determined. Ty4 retrotransposons belong to the copia elements and are mobile genetic entities that replicate via an RNA intermediate and reverse transcription. The capsid protein is the structural component of virus-like particles, forming the shell that encapsulates the retrotransposon dimeric RNA genome.
