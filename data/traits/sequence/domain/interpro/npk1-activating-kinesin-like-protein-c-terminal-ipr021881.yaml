identifier: InterPro:IPR021881
label: "NPK1-activating kinesin-like protein, C-terminal"
definition: >-
  This domain is found at the C terminus of plant kinesin-like proteins NACK1 and NACK2. NACK1 (NPK1-activating kinesin-like protein 1) is key regulator of plant cytokinesis. NACK2 (TETRASPORE) is required for male meiotic cytokinesis.
