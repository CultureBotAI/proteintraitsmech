identifier: InterPro:IPR054178
label: "Lpg0393-like, VPS9-like domain"
definition: >-
  This entry represents the N-terminal domain of Lpg0393 and related proteins. Lpg0393 ( ) consists of two domains both of which are composed of α-helices. The N-terminal domain contains of seven helices and makes roughly a 90-degree angle with the C-terminal domain, that forms a helical bundle structure. The N-terminal domain is similar to Vps9 domain of Rabex-5. Lpg0393 exhibits a GEF activity toward Rab5, Rab21 and Rab22, and this activity is associated with a VPS9-like domain of the protein.
