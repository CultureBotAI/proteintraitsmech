identifier: InterPro:IPR000322
label: Glycoside hydrolase family 31, TIM barrel domain
definition: >-
  This entry corresponds to the second domain of family 31 enzymes and adopts a TIM-barrel fold. O-Glycosyl hydrolases are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. Glycoside hydrolase family 31 comprises enzymes with several known activities; alpha-glucosidase, alpha-galactosidase; glucoamylase, sucrase-isomaltase; isomaltase; alpha-xylosidase; alpha-glucan lyase.
