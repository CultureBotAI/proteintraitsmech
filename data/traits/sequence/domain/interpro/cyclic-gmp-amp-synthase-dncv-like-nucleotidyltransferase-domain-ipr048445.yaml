identifier: InterPro:IPR048445
label: "Cyclic GMP-AMP synthase DncV-like, nucleotidyltransferase domain"
definition: >-
  This is the nucleotidyltransferase domain of DncV from Vibrio cholerae (also known as Cyclic GMP-AMP synthase) and related proteins. DncV catalyses the synthesis of 3'3'-cyclic GMP-AMP (3'3'-cGAMP) from GTP and ATP. It is part of the CBASS (cyclic oligonucleotide-based antiphage signalling system) which provides immunity against bacteriophage. This protein is required for efficient V.cholerae intestinal colonisation and and down-regulates the colonisation-influencing process of chemotaxis.
