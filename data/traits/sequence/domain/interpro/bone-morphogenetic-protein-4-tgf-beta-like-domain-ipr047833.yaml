identifier: InterPro:IPR047833
label: "Bone morphogenetic protein 4, TGF-beta-like domain"
definition: >-
  This entry represents the TGF-beta-like domain found at the C-terminal of Bone morphogenetic protein 4 (BMP4). BMP4 induces cartilage and bone formation. It also acts in mesoderm induction, tooth development, limb formation and fracture repair. It regulates a plethora of developmental processes, including the dorsal-ventral axis and neural patterning.
