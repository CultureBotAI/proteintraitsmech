identifier: InterPro:IPR014263
label: "Methanolan biosynthesis EpsI"
definition: >-
  This entry represents a domain that covers the whole protein sequence in EpsI from Methylobacillus sp. 12S. EpsI is encoded immediately downstream of the multiple-membrane-spanning putative transporter EpsH, and is predicted to be a periplasmic protein involved in, but not required for, expression of the exopolysaccharide methanolan. In a number of other species, protein homologues to EpsI are encoded either next to epsH or, more often, combined in a fused gene.
