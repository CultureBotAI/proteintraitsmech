identifier: InterPro:IPR046488
label: "Transcription factor tau subunit sfc3/Tfc3, C-terminal"
definition: >-
  This domain is found in a group of fungal transcription factors, including Tfc3 from budding yeast andSfc3 from fission yeasts. Tfc3 (also known as Tau138) is one of three subunits of the tauB subcomplex of yeast transcription factor IIIC (TFIIIC) that binds boxB DNA promoter sites of tRNA and similar genes. TFIIIC assembles the initiation complex TFIIIB-TFIIIC-tDNA, sufficient for RNA polymerase III recruitment and function. Tfc3 is essential for cell viability as it is required for RNA polymerase III-mediated transcription.
