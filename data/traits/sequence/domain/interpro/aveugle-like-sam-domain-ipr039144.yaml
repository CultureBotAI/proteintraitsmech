identifier: InterPro:IPR039144
label: "Aveugle-like, SAM domain"
definition: >-
  The SAM (sterile alpha motif) domain of aveugle-like proteins is a protein-protein interaction domain. In Drosophila, the aveugle (AVE) protein (also known as HYP (Hyphen)) is involved in normal photoreceptor differentiation, and required for epidermal growth factor receptor (EGFR) signaling between ras and raf genes during eye development and wing vein formation. SAM domain of the HYP(AVE) protein interacts with SAM domain of CNK, the multidomain scaffold protein connector enhancer of kinase suppressor of Ras. CNK/HYP(AVE) complex interacts with KSR (kinase suppressor of Ras) protein. This interaction leads to stimulation of Ras-dependent Raf activation. Proteins containing this domain also includes vertebrate AVE homologues - Samd10 and Samd12. Their function is unknown.
