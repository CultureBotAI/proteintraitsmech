identifier: InterPro:IPR034014
label: "Pol III subunit C11, C-terminal zinc ribbon"
definition: >-
  The C-terminal zinc ribbon domain of subunit C11 in RNA polymerase (Pol) III (RPC11) is required for intrinsic transcript cleavage. RPC11 is also involved in Pol III termination. Eukaryote genomes are transcribed by three nuclear RNA polymerases (Pol I, II and III) that share some subunits. RPC11 is homologous to RPB9 of Pol II and RPA12 of Pol I. RPC11 C-terminal zinc ribbon is homologous to Pol II elongation factor TFIIS domain III. RPC11 has two zinc-binding domains separated by a flexible linker.
