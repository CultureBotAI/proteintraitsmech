identifier: InterPro:IPR025750
label: "DPF1-3, N-terminal domain"
definition: >-
  This putative domain has been detected on requiem/DPF family proteins. It was identified as an adaptor molecule that links nuclear factor kappa-light-chain-enhancer of activated B cells (NF-kappa-B) dimer RelB/p52 and switch/sucrose-nonfermentable (SWI/SNF) chromatin remodeling factor.
