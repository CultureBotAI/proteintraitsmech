identifier: InterPro:IPR054555
label: "Type III secretion system effector HopBF1-like"
definition: >-
  This entry includes HopBF1 family of bacterial type III secretion system (T3SS) effectors identified as eukaryotic-specific HSP90 protein kinases. HopBF1 ( ) adopts a minimal and atypical protein kinase fold such that it is recognized by HSP90 as a host client. Utilizing this "betrayal-like" mechanism to achieve specificity, HopF1 phosphorylates and inactivates eukaryotic HSP90 by inhibiting the chaperone's ATPase activity. This prevents activation of immune receptors that trigger hypersensitive response in plants, thereby inducing severe disease symptoms in plants infected by certain plant pathogens.
