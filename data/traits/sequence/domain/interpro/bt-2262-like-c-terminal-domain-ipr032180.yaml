identifier: InterPro:IPR032180
label: "BT_2262-like, C-terminal domain"
definition: >-
  This entry represents a domain found at the C-terminal end of proteins found in Bacteroidetes, including BT_2262 from Bacteroides thetaiotaomicron ( ), a small outer membrane lipoprotein located on the periphery of the SusCD complex, which is essential for the import of oligosaccharides and for glycan degradation. This domain shows an eight-stranded β-barrel with structural similarity to lipid binding domains. Its specific function remains unknown.
