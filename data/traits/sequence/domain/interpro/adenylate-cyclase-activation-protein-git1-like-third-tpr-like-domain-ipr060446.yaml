identifier: InterPro:IPR060446
label: "Adenylate cyclase activation protein git1-like, third TPR-like domain"
definition: >-
  This entry represents the third domain of yeast adenylate cyclase activation protein git1 and similar fungal sequences. Git1 is involved in the glucose/cAMP signalling pathway and is required for maintaining basal cAMP levels and for producing a glucose-triggered cAMP response. This protein interacts with adenylate cyclase (cyr1) and localises to the cytoplasm, nucleus, and spindle pole body. Git1 contains Munc13 homology domains which are characteristic of proteins involved in vesicle priming and membrane trafficking. This entry also includes the Exocytic regulator ync13 from S.pombe, which is involved in secondary septum formation during cytokinesis. The specific function of this TPR-like fold domain remains to be determined.
