identifier: InterPro:IPR058720
label: "CHMP7, N-terminal winged helix domain"
definition: >-
  This entry represents the N-terminal of two tandem winged helix domains found in the Charged Multivesicular Body Protein 7 family. The second is found in . The Charged Multivesicular Body Protein 7 family is involved in the endosomal sorting pathway and plays a crucial role during cell division. This family is characterised by its function in recruiting the ESCRT-III complex to the nuclear envelope during late anaphase. The ESCRT-III complex, in conjunction with SPAST, facilitates the sealing of the nuclear envelope and the disassembly of the mitotic spindle. Additionally, members of this family are recruited to the reforming nuclear envelope during anaphase by LEMD2. The proteins in this family belong to the SNF7 family and have interactions with other proteins such as CHMP4B and LEMD2.
