identifier: InterPro:IPR034538
label: "ACF, RNA recognition motif 1"
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of ACF. ACF (APOBEC-1-stimulating protein, also known as ASP) is an RNA-binding subunit of a core complex that interacts with apoB mRNA to facilitate C to U RNA editing. It may also act as an apoB mRNA recognition factor and chaperone, and play a key role in cell growth and differentiation. ACF shuttles between the cytoplasm and nucleus.
