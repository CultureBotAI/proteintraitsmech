identifier: InterPro:IPR018657
label: LarA-like, N-terminal
definition: >-
  This entry represents the N-terminal domain of LarA and related proteins. LarA is a nickel-dependent lactate racemase from the larA-E operon of Lactobacillus plantarum, whereas LarB, LarC and LarE are accessory proteins required for the incorporation of Ni in the lactate racemase apoprotein. LarA contains 18 β-strands and 16 α-helices arranged in a novel fold composed of two domains of similar size.
