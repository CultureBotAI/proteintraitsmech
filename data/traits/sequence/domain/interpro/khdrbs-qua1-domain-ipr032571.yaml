identifier: InterPro:IPR032571
label: "KHDRBS, Qua1 domain"
definition: >-
  The Qua1 domain can be found in the N-terminal region of the KHDRBS (KH-domain containing, RNA-binding, signal transduction-associated) proteins. This domain is a homodimerisation domain necessary for the function of KHDRBS1 (also known as Sam68) in alternative splicing.
