identifier: InterPro:IPR056819
label: "Acyl-CoA-binding domain-containing protein 4-6, C-terminal"
definition: >-
  This entry represents a long α-helix found at the C terminus of the cytosolic acyl-CoA-binding domain-containing proteins 4/5 (ACBP4/5) from Arabidopsis and ACBP6 from rice. They play a role in the biosynthesis of membrane lipids including galactolipids and phospholipids. They bind medium- and long-chain acyl-CoA esters with very high affinity. ACBPs also play a role in stress responses, such as drought, cold, heat, salinity, oxidative stress, and pathogen attacks. These proteins have a Kelch repeats β-propeller in the middle region and an acyl CoA binding domain at the N-terminal ( ).
