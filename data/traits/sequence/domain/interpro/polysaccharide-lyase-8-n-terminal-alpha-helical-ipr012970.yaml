label: "Polysaccharide lyase 8, N-terminal alpha-helical"
definition: >-
  This α-helical domain is found in a group of secreted bacterial lyase enzymes ( ) capable of acting on hyaluronan and chondroitin in the extracellular matrix of host tissues, contributing to the invasive capacity of the pathogen.
