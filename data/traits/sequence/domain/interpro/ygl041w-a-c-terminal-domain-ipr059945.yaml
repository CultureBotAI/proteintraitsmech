identifier: InterPro:IPR059945
label: "YGL041W-A, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of YGL041W-A and its homologues from fungi. YGL041W-A is an uncharacterised mitochondrial protein in Saccharomyces cerevisiae. The protein contains a predicted mitochondrial transit peptide at the N-terminal and this domain is located at the C-terminal after a disordered region. The function of this domain remains to be determined.
