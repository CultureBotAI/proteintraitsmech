identifier: InterPro:IPR017585
label: "Flagella basal body P-ring formation protein FlgA, SAF domain"
definition: >-
  This entry describes a conserved C-terminal region of the flagellar basal body P-ring formation protein FlgA. FlgA, is required for P-ring assembly in bacterial flagella of taxa such as Salmonella enterica or Escherichia coli. It consists of two domains, a SAF domain and a β-barrel domain responsible for binding to FlgI, a P-ring component protein. SAF domain is structurally similar to antifreeze protein Type III and related proteins that share in common the so-called β-clip fold.
