identifier: InterPro:IPR041928
label: "UBAC2, UBA domain"
definition: >-
  UBAC2 is a ubiquitin-associated domain (UBA)-domain containing protein encoded by gene UBAC2 (or PHGDHL1), a risk gene for Behcet's disease (BD). It may play an important role in the development of BD through its transcriptional modulation. UBAC2 contains an N-terminal rhomboid-like domain and a C-terminal UBA domain. This entry represents the UBA domain.
