identifier: InterPro:IPR041411
label: "Linalool dehydratase/isomerase"
definition: >-
  This (α,α)6 barrel fold domain is found in linalool dehydratase/isomerase (Ldi, ) and linalool isomerase (Lis) from the betaproteobacterium Castellaniella defragrans 65Phen and Thauera linaloolentis 47Lol, respectively. Ldi mineralizes monoterpenes coupled to anaerobic denitrification. The periplasmic enzyme reversibly catalyses the isomerisation from the primary alkenol geraniol into the tertiary alkenol (S)-linalool and its dehydration to beta-myrcene. Each monomer is built up of a classical (α,α)6 barrel fold composed of six inner helices. Structural data of Ldi revealed the terpene binding site between two monomers inside a hydrophobic channel, and three catalytic clusters involved in catalysis.
