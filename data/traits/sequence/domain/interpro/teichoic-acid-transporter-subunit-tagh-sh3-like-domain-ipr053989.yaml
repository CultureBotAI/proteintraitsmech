identifier: InterPro:IPR053989
label: "Teichoic acid transporter subunit TagH, SH3-like domain"
definition: >-
  This domain is found in TagH from Staphylococcus epidermidis, the ATPase subunit of the two-component transporter TagGH, which is involved in the synthesis of bacterial polysaccharides-wall teichoic acids. This entry represents the middle SH3-like subdomain that consists of a twisted antiparallel β-sheet and two β-hairpins tightly packed forming a barrel structure. It is usually found C-terminal to and N-terminal to .
