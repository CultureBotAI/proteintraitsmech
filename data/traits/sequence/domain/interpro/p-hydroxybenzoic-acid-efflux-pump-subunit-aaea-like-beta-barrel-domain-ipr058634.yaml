identifier: InterPro:IPR058634
label: "p-hydroxybenzoic acid efflux pump subunit AaeA-like, beta-barrel domain"
definition: >-
  This domain is found in the AaeA protein which is a component of the p-hydroxybenzoic acid (pHBA) efflux pump in Escherichia coli and related bacterial proteins, including Multidrug resistance protein MdtN and Multidrug export protein EmrA from Escherichia coli. AaeA forms an efflux pump with AaeB, which functions to export certain aromatic carboxylic acids from the cell. The AaeAB efflux system serves as a 'metabolic relief valve' to alleviate toxic effects of imbalanced metabolism by eliminating specific compounds when they accumulate to high levels in the cell. The domain represented in this entry folds into a six-stranded closed β-barrel with a greek-key topology which has a structural similarity to the C-terminal domain of alanine racemase. This domain is interrupted by the barrel-sandwich hybrid domain which is inserted after the first β-strand of the barrel.
