identifier: InterPro:IPR041372
label: "Cas3, C-terminal"
definition: >-
  This is the C-temrinal domain of the Cas3 proteins. The C-terminal domain (CTD) is shown to completely wrap ssDNA inside the helicase. Deletion of the CTD (aa 819-924) reduced CRISPR interference. It is suggested that the CTD regulates the N-terminal HD nuclease activity by functioning as a substrate filter.
