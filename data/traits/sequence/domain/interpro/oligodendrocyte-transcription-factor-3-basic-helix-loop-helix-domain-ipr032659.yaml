identifier: InterPro:IPR032659
label: "Oligodendrocyte transcription factor 3, basic helix-loop-helix domain"
definition: >-
  Oligodendrocyte transcription factor 3 (Olig3) is a basic-helix-loop-helix (bHLH) transcription factor that coordinatess the specification of dorsal neurons in the spinal cord. It marks the dorsal neuroepithelium of the hindbrain and is essential for the development of brainstem nuclei. This entry represents the bHLH (basic Helix-Loop-Helix) domain of Olig3, which is approximately 60 amino acids long and consists of a DNA-binding basic region followed by two α-helices separated by a variable loop region (HLH). The HLH domain promotes dimerisation, allowing the formation of homo- or heterodimeric complexes between different family members. Many bHLH proteins have been shown to act as transcriptional regulators.
