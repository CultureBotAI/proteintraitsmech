identifier: InterPro:IPR008629
label: GUN4-like
definition: >-
  GUN4 is a porphyrin-binding protein involved in chlorophyll biosynthesis regulation and intracellular signaling, found in aerobic photosynthetic organisms. It has been implicated in retrograde signalling between the chloroplast and nucleus. GUN4 can bind protoporphyrin IX (PIX) and magnesium protoporphyrin IX (MgPIX), substrate and product of the Mg-chelatase, as well as heme and cobalt protoporphyrin IX (CoPIX). It may play a role in protecting plants from reactive oxygen species (ROS)-mediated damage.
