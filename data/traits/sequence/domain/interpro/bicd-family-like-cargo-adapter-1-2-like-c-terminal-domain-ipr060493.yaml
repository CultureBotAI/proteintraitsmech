identifier: InterPro:IPR060493
label: "BICD family-like cargo adapter 1/2-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of BICD family-like cargo adapter 1/2 (BICDL1/2) proteins, mainly found in vertebrates and arthropods. BICDL1 is a cytoplasmic protein involved in Golgi to secretory granule transport and vesicle transport along microtubules. It contains extensive coiled-coil regions and function as dynein adapters. The specific function of this domain is not known.
