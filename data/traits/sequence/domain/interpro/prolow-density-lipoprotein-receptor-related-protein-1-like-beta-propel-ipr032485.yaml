identifier: InterPro:IPR032485
label: "Prolow-density lipoprotein receptor-related protein 1-like, beta-propeller domain"
definition: >-
  This is a β-propeller domain found in Prolow-density lipoprotein receptor-related protein 1 (LRP1) from human, an endocytic receptor involved in endocytosis and in phagocytosis of apoptotic cells. LRP1 is involved in cellular lipid homeostasis and in the plasma clearance of chylomicron remnants and activated LRPAP1 (alpha 2-macroglobulin), as well as the local metabolism of complexes between plasminogen activators and their endogenous inhibitors. It acts as an LRPAP1 alpha-2-macroglobulin receptor.
