identifier: InterPro:IPR058631
label: "Teashirt homolog 1-3-like, homeodomain"
definition: >-
  This entry represents the homeodomain of human Teashirt homolog 3 (TSHZ3) and similar proteins from vertebrates. TSHZ3 is a transcriptional regulator involved in developmental processes. It associates with chromatin in a region surrounding the CASP4 transcriptional start site(s). This domain is often found associated with .
