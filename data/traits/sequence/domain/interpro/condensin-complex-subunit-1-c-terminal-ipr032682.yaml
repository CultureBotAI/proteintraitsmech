identifier: InterPro:IPR032682
label: "Condensin complex subunit 1, C-terminal"
definition: >-
  This entry represents the conserved C-terminal domain of Cnd1. It is also found in non-SMC subunit D3 of condensin II, a second condensin complex present in vertebrates. Condensin subunit 1 (known as Cnd1 in Schizosaccharomyces pombe (Fission yeast), and XCAP-D2 in Xenopus laevis laevis) represents one of the non-SMC subunits in the complex. This subunit is phosphorylated at several sites by Cdc2. This phosphorylation process increases the supercoiling activity of condensin. Condensin is a multi-subunit protein complex that acts as an essential regulator of chromosome condensation. It contains both SMC (structural maintenance of chromosomes) and non-SMC subunits. Condensin plays an important role during mitosis in the compaction and resolution of chromosomes to remove and prevent catenations that would otherwise inhibit segregation. This is thought to be achieved by the introduction of positive supercoils into relaxed DNA in the presence of type I topoisomerases and converts nicked DNA into positive knotted forms in the presence of type II topoisomerases. During interphase condensin promotes clustering of dispersed loci into subnuclear domains and inhibits associations between homologues. In meiosis, condensin has been shown to influence the number of crossover events by regulating programmed double-strand breaks. Roles in gene regulation and lymphocyte development have also been defined.
