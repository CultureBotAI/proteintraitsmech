identifier: InterPro:IPR046439
label: "Zinc finger, RZ-type"
definition: >-
  This entry represents the RZ type zinc finger domain, found in NFX1-type zinc finger-containing protein 1 (ZNFX1) and E3 ubiquitin-protein ligase RNF213 from humans and other eukaryotic proteins. It contains two conserved histidine residues and four conserved cysteine residues in a CHC3H motif. It can bind divalent transition metals, with a preference for Zn2+. ZNFX1 is an RNA-binding protein that initiates the antiviral response and is required to restrict the replication of RNA viruses. RNF213 is a giant multifunctional E3 ligase containing more than 5000 amino acids and is the only known protein possessing both AAA+ ATPase and E3 ligase activities in the human proteome. RNF213 can catalyse the ubiquitination of lipopolysaccharide and is crucial for antibacterial immunity in mammals. Some bacteria, S. flexneri for example, have evolved different strategies to evade ubiquitination-mediated host immune defences during infection. It secretes IpaH family E3 effectors, which exploit the host's ubiquitination system to promote the ubiquitination and subsequent degradation of key host proteins essential for ubiquitination-mediated antibacterial responses. The complex of RNF213 and IpaH1.4 E3 effector has been determined.
