identifier: InterPro:IPR017874
label: "CRIC domain"
definition: >-
  The multi-domain protein Connector enhancer of kinase suppressor of ras (Connector enhancer of KSR) (CNK) functions as a scaffold in several signal cascades and acts on proliferation, differentiation and apoptosis. CNK connects upstream activators and downstream targets of Ras- and Rho-dependent signalling pathways and may allow cross-talk between these pathways. In invertebrates, CNK is expressed as one isoform, whereas in mammals there exists CNK1, CNK2A, and its splice variant CNK2B. CNK proteins consist of one sterile alpha motif (SAM) domain (see , ) one conserved region in CNK (CRIC) domain, one PSD-96/Dlg-A/ZO-1 (PDZ) domain (see , ) and one pleckstrin homology (PH) domain (see , . The CRIC domain is enriched in leucine residues and functions as a protein-protein interaction domain.
