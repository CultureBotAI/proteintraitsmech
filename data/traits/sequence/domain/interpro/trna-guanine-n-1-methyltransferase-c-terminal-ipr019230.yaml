identifier: InterPro:IPR019230
label: "tRNA (guanine-N(1)-)-methyltransferase, C-terminal"
definition: >-
  This domain, found in various hypothetical prokaryotic proteins, has no known function. It is also found at the C-terminal of a few prokaryotic tRNA (guanine-N(1)-)-methyltransferases. It has a Rossmanoid fold, with a deep trefoil knot in its C-terminal region. Proteins of this family are members of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterised by a deep trefoil knot.
