identifier: InterPro:IPR048562
label: "Lysine-specific demethylase 6A/B-like, C-terminal helical domain"
definition: >-
  This entry represents the C-terminal helical domain of human Lysine-specific demethylase 6A/B and similar animal sequences. This domain is localised adjacent the JmjC domain ( ). Histone lysine (K) demethylases (KDMs) catalyse the demethylation of lysine residue from histone tails. This entry includes KDM6 subfamily that contains a conserved catalytic Jumonji C (JmjC) domain and includes KDM6A (also known as UTX), KDM6B (also known as JMJD3) and the related histone demethylase UTY (also known as KMD6C).
