identifier: InterPro:IPR062041
label: "Apolipoprotein B100, insert 8"
definition: >-
  This domain is found in the human Apolipoprotein B100 and related proteins. Apolipoprotein B100 (apoB100), one of the largest proteins in the genome, is the primary structural and functional component of the Low-density lipoprotein (LDL). ApoB100 functions as a recognition signal for the cellular binding and internalization of LDL particles by the apoB/E receptor. The domain represented by this entry is described as insert 8. It is enriched in proline residues and forms an extended non-compact all-β structure.
