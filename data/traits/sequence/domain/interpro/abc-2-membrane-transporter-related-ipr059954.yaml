identifier: InterPro:IPR059954
label: "ABC-2 membrane transporter-related"
definition: >-
  This domain is found in uncharacterised bacterial proteins. It shares similarity with members of the ABC-2 membrane transporter superfamily. It is predicted to contain six transmembrane helices. This model doesn't include the last C-terminal helix.
