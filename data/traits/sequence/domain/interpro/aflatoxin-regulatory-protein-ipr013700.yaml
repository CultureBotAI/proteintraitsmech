identifier: InterPro:IPR013700
label: Aflatoxin regulatory protein
definition: >-
  This domain is found in the aflatoxin regulatory protein (AflR) and related fungal sequences. AflR is involved in the regulation of the biosynthesis of aflatoxin in the fungal genus Aspergillus. It occurs together with the fungal Zn(2)-Cys(6) binuclear cluster domain ( ). Aflatoxins belong to a family of decaketides that are produced as secondary metabolites by Aspergillus flavus and Aspergillus parasiticus. The aflatoxin biosynthetic pathway involves several enzymatic steps that appear to be regulated by the aflR genes in A. flavus and A. parasiticus. AflR encodes a protein that contains a cysteine-rich motif. Several fungal transcriptional activator proteins contain this motif, which binds DNA in a zinc-dependent fashion (occurs in fungal transcriptional regulatory proteins).
