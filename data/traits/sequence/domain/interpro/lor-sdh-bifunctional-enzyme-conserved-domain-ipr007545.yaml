identifier: InterPro:IPR007545
label: "LOR/SDH bifunctional enzyme, conserved domain"
definition: >-
  Lysine-oxoglutarate reductase/Saccharopine dehydrogenase (LOR/SDH) is a bifunctional enzyme. This conserved region is commonly found immediately N-terminal to saccharopine dehydrogenase conserved region ( ) in eukaryotes. It is also found in Bifunctional arginine dihydrolase/ornithine cyclodeaminase ArgZ and ArgE involved in a cyanobacterial arginine utilization pathway that produces glutamate and enables cellular adaptation to nitrogen fluctuations.
