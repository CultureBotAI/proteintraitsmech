identifier: InterPro:IPR008011
label: Complex 1 LYR protein domain
definition: >-
  Proteins containing this domain include an accessory subunit of the higher eukaryotic NADH dehydrogenase complex. In Saccharomyces cerevisiae, the Isd11 protein ( ) has been shown to play a role in Fe/S cluster biogenesis in mitochondria. This group of proteins was named LYR after a highly conserved tripeptide motif close to the N terminus of these proteins.
