identifier: InterPro:IPR057565
label: "Transcription elongation regulator 1-like, third WW domain"
definition: >-
  This entry corresponds to the third WW domain of human Transcription Elongation Regulator 1 (TCRG1) and similar animal proteins. The WW domains within these proteins are responsible for binding to Pro-rich domains, facilitating further protein-protein interactions. TCRG1 (also known as CA150) contains three N-terminal WW domains and six consecutive FF domains ( ). WW and FF domains are versatile modules that mediate protein-protein interactions. TCRG1 is a transcription elongation factor that interacts with the splicing factor SF1 and with the phosphorylated C-terminal repeat domain (CTD) of RNA polymerase II (RNAPII) through its WW and FF domains, respectively. It regulates transcription elongation in a TATA box-dependent manner. They bind the phosphorylated C-terminal of RNA polymerase II and mediate interactions with other proteins such as HTATSF1.
