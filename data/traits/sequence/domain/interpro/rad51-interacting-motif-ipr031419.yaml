identifier: InterPro:IPR031419
label: "RAD51 interacting motif"
definition: >-
  This motif interacts with RAD51, a protein that plays an important role in mitotic and meiotic recombination, and in DNA repair. This motif is found C-terminal in RAD51-associated protein 1 (RAD51AP1) and 2 (RAD51AP2).
