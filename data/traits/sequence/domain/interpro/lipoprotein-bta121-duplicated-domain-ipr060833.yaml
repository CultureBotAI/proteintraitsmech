identifier: InterPro:IPR060833
label: "Lipoprotein BTA121, duplicated domain"
definition: >-
  This entry describes an uncharacterised domain found mostly in Borrelia. It appears from 2 to 14 times in surface lipoproteins such as BTA121 of Borrelia turicatae. It contains an helical fold.
