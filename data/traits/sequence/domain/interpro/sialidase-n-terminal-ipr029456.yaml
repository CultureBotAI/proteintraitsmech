identifier: InterPro:IPR029456
label: "Sialidase, N-terminal"
definition: >-
  This domain is found in the N-terminal of sialidases. Sialidases catalyse hydrolysis of alpha-(2->3)-, alpha-(2->6)-, alpha-(2->8)- glycosidic linkages of terminal sialic acid residues in oligosaccharides, glycoproteins, glycolipids, colominic acid and synthetic substrates. In some bacteria, sialidases have been suggested to be pathogenic factors in microbial infections.
