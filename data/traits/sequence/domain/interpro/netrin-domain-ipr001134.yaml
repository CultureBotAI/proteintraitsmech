identifier: InterPro:IPR001134
label: Netrin domain
definition: >-
  The netrin (NTR) module is an about 130-residue domain found in the C-terminal parts of netrins, complement proteins C3, C4, and C5, secreted frizzled-related proteins, and type I procollagen C-proteinase enhancer proteins (PCOLCEs), as well as in the N-terminal parts of tissue inhibitors of metalloproteinases (TIMPs). The proteins harboring the NTR domain fulfill diverse biological roles ranging from axon guidance, regulation of Wnt signalling, to the control of the activity of metalloproteinases. The NTR domain can be found associated to other domains such as CUB, WAP, Kazal, Kunitz, Ig-like, laminin N-terminal, laminin-type EGF or frizzled. The NTR domain is implicated in inhibition of zinc metalloproteinases of the metzincin family. The NTR module is a basic domain containing six conserved cysteines, which are likely to form internal disulphide bonds, and several conserved blocks of hydrophobic residues (including an YLLLG-like motif). The NTR module consists of a β-barrel with two terminal α-helices packed side by side against the face of the β-barrel (see ).
