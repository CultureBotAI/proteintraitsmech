identifier: InterPro:IPR000873
label: "AMP-dependent synthetase/ligase domain"
definition: >-
  This domain is found in a number of prokaryotic and eukaryotic enzymes, which act via an ATP-dependent covalent binding of AMP to their substrate, share a region of sequence similarity. This region is a Ser/Thr/Gly-rich domain that is further characterised by a conserved Pro-Lys-Gly triplet. This group of enzymes includes luciferase, long chain fatty acid Co-A ligase, long-chain fatty acid transport proteins that also function as acyl-CoA ligases, acetyl-CoA synthetase and various other closely-related synthetases.
