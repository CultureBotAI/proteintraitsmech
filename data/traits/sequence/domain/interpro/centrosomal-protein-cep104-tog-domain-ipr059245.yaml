identifier: InterPro:IPR059245
label: "Centrosomal protein CEP104, TOG domain"
definition: >-
  This entry represents the central tubulin-binding TOG domain, consisting of HEAT repeats. Centrosomal protein CEP104 localises to the distal end of centrioles that interacts through its N- and C-terminal region, respectively, with the distal end proteins Cep97 and CP110. It is required for ciliogenesis and for structural integrity at the ciliary tip, being involved in regulating microtubule length in cilia. This is a multidomain protein that consists of an N-terminal all-β domain, a central all-α-helical TOG domain and a C-terminal array of four zinc fingers domain.
