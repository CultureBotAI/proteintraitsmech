identifier: InterPro:IPR054354
label: "Dynein 2 heavy chain 1, cytoplasmic, ATPase lid domain"
definition: >-
  Dyneins are microtubule-based AAA(+) motor complexes that power ciliary beating, cell division, cell migration and intracellular transport and comprise cytoplasmic and axonemal isoforms. They consist of a motor domain that contains a ring-shaped head with six AAA-domains, a coiled-coil stalk with a microtubule binding domain (MTBD) and a linker. This entry represents the lid domain found at the C-terminal of the third AAA+ ATPase domain in human Cytoplasmic dynein 2 heavy chain 1 (DYNC2H1) and similar eukaryotic sequences.
