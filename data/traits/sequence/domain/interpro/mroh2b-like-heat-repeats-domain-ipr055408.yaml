identifier: InterPro:IPR055408
label: "MROH2B-like, HEAT-repeats domain"
definition: >-
  This entry represents a HEAT-repeats domain from Maestro heat-like repeat-containing protein family member 2B (MROH2B, also known as SPIF and MRO2B) from mouse, Protein SHOOT GRAVITROPISM 6 from Arabidopsis thaliana (SGR6) and similar sequences mainly found in animals and plants. SPIF may play a role in the process of sperm capacitation. SGR6 is involved in inflorescence stems gravitropism, by modulating vacuolar membrane (VMs) dynamics in gravity-sensing cells (e.g. endodermal cells) during the amyloplast sedimentation process.
