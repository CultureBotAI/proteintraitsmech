identifier: InterPro:IPR014878
label: "THAP4-like, heme-binding domain"
definition: >-
  Nitrobindins (Nbs), constituting a heme-protein family spanning from bacteria to Homo sapiens, display an all-β-barrel structural organization. Proteins containing this domain are putatively related to fatty acid-binding proteins (FABPs). This domain can be found in THAP4 from mammals and At1g79260 from Arabidopsis. THAP4 catalyses the heme-based conversion of peroxynitrite into nitrate/NO3- in vitro. At1g79260 is a nitrophorin-like heme-binding protein that may reversibly bind nitric oxide (NO) and be involved in NO transport. This entry also includes the β-barrel domain of Caenorhabditis elegans protein male abnormal 7 (Mab-7) which plays an important role in determining body shape and sensory ray morphology.
