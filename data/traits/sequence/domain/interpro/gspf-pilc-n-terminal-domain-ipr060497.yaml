identifier: InterPro:IPR060497
label: "GspF/PilC, N-terminal domain"
definition: >-
  This entry represents the N-terminal cytoplasmic domain of Type II secretion system protein F (GspF) and Type IV pilus assembly protein PilC. This domain precedes the main T2SSF domain which contains multiple transmembrane helices. GspF and PilC proteins are essential inner membrane components that play critical roles in protein secretion and pilus assembly. The full-length proteins form homodimers or homotetramers and interact with secretion ATPases. In Type IV pilus systems, PilC controls both pilus assembly and disassembly and is important for PilB localisation and ATPase activity.
