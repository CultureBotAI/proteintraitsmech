identifier: InterPro:IPR060205
label: "PCNA-interacting partner, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of PCNA-interacting partner (PARI). The specific function of this N-terminal domain remains to be determined. PARI is required to suppress inappropriate homologous recombination and plays a central role in DNA repair and maintenance of genomic stability. The protein antagonises homologous recombination by interfering with RAD51-DNA homologous recombination structure formation. PARI binds single-strand DNA and poly(A) homopolymers and interacts with RAD51, PCNA and PARP1. The protein localises to both cytoplasm and nucleus and is expressed in testis, gastrointestinal tract and immune system tissues.
