identifier: InterPro:IPR056222
label: "PH domain"
definition: >-
  This domain is found in uncharacterised fungal proteins. It shares significant sequence similarity to known Pleckstrin homology domains (PH-domains) and it is predicted to adopt similar structure. Proteins containing this domain also contain a DH-domain located N-terminal to the PH-domain and are likely members of the Dbl family of guanine nucleotide exchange factors.
