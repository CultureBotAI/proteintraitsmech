identifier: InterPro:IPR056533
label: "KIF21A/B, first helical domain"
definition: >-
  This domain is found in human Kinesin-like protein KIF21A/B and similar eukaryotic sequences. KIF21A is a processive microtubule plus-end directed motor protein involved in neuronal axon guidance. It is recruited by KANK1 to cortical microtubule stabilising complexes (CMSCs) at focal adhesions (FAs) rims where it promotes microtubule capture and stability. It controls microtubule polymerisation rate at axonal growth cones and suppresses microtubule growth without inducing microtubule disassembly once it reaches the cell cortex. Mutations in this protein are associated with ocular abnormalities. This domain, which is found associated to , and , is predicted to fold into two long α-helices.
