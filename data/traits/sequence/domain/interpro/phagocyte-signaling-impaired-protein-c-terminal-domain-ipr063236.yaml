identifier: InterPro:IPR063236
label: "Phagocyte signaling-impaired protein, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of Phagocyte signaling-impaired protein from Drosophila melanogaster (Psidin), a non-catalytic subunit of the NatB complex which catalyses acetylation of the N-terminal methionine residues of proteins beginning with Met-Asp or Met-Glu. This protein is required both for the phagocytic degradation of internalized bacteria and for the induction of Defensin in the fat body. Within the phagocytic blood cells, it plays a role in detection of infection and activation of the humoral immune response. This domain shows an all-α configuration.
