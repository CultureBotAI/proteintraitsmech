identifier: InterPro:IPR034027
label: "Reprolysin domain, adamalysin-type"
definition: >-
  This entry includes the reprolysin-like domain found in snake venom metallopeptidases such as adamalysin and membrane-anchored metalloendopeptidases known as ADAMs (A Disintegrin And Metalloprotease), which are glycoproteins and play roles in cell signaling, cell fusion, and cell-cell interactions. Peptidase activity depends on the presence of an extended zinc-binding motif known as HEXXHXXGXXH in which the histidines are zinc ligands, the glutamic acid is a catalytic residue and the glycine maintains an important turn. There are a number of proteins in which one or more of these essential residues are not conserved, and these do not have proteolytic activity.
