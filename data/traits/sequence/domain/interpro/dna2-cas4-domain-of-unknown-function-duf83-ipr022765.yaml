identifier: InterPro:IPR022765
label: "Dna2/Cas4, domain of unknown function DUF83"
definition: >-
  This entry represents an uncharacterised domain found in several proteins, including DNA replication helicase Dna2, clustered regularly interspaced short palindromic repeats (CRISPR)-associated exonuclease Cas4 and putative RecB family exonuclease proteins. Dna2 is a DNA replication factor with single-stranded DNA-dependent ATPase, ATP-dependent nuclease, (5'-flap endonuclease) and helicase activities. Cas4 has been shown to be a 5' to 3' single stranded DNA exonuclease in Sulfolobus solfataricus.
