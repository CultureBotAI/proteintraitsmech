identifier: InterPro:IPR024428
label: Endosialidase, beta-propeller domain
definition: >-
  This entry represents the β propeller domain of endosialidases, which consists of catalytically active part of the enzymes. This core domain forms stable SDS-resistant trimers. There is a nested β barrel domain in this domain. This domain is typically between 443 and 460 amino acids in length.
