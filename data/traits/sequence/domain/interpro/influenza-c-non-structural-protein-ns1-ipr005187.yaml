identifier: InterPro:IPR005187
label: "Influenza C non-structural protein NS1"
definition: >-
  The influenza C virus genome consists of seven single-stranded RNA segments. The shortest RNA segment encodes a 286 amino acid non-structural protein NS1. This protein contains 6 conserved cysteines that may be functionally important, perhaps binding to a metal ion.
