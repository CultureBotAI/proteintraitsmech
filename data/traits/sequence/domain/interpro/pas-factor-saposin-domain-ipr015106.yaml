identifier: InterPro:IPR015106
label: "Pas factor saposin domain"
definition: >-
  Members of this entry adopt a compact structure comprising five α helices. Charged and polar residues are exposed mostly on the surface, while most of the hydrophobic residues are buried inside the hydrophobic core of the helical bundle. The precise function of this domain is unknown, but it is has been shown to induce secretion of periplasmic proteins, especially collagenase.
