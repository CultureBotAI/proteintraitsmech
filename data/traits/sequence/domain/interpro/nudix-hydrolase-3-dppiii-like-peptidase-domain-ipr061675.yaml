identifier: InterPro:IPR061675
label: Nudix hydrolase 3/DPPIII-like, peptidase domain
definition: >-
  This entry represents the peptidase domain of Nudix hydrolase 3 from plants and the related members from bacteria. The structure of Dipeptidyl peptidase III (DPP III) from the thermophilic bacteria Caldithrix abyssi has been determined and it shows that it is a two-domain zinc exopeptidase, and a member of the M49 family. Like other DPPs III, it cleaves dipeptides from the N-terminal of its substrates but differently from human, yeast and Bacteroides thetaiotaomicron (mesophile) orthologues. Instead, it has the pentapeptide zinc binding motif (HEISH) in the active site instead of the hexapeptide (HEXXGH). NUDT3 from plants maintains a housecleaning role to eliminate toxic oxidised nucleotides (like 8-oxo-dGTP) similar to the E. coli MutT.
