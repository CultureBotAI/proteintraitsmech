identifier: InterPro:IPR018537
label: "Peptidoglycan binding domain"
definition: >-
  This entry represents a peptidoglycan binding domain frequently found at the C terminus of proteins containing a N-terminal domain, predominantly in bacteria and virus, including Glycoside hydrolase family 108 protein from Salmonella typhi (TtsA, ). TtsA is a specific muramidase that facilitates toxin transport through the peptidoglycan layer. The C-terminal domain confers substrate specificity and typhoid toxin secretion functions. It shows of 6 antiparallel α-helices that organise into a helix bundle.
