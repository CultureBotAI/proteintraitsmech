identifier: InterPro:IPR047031
label: "Glycine receptor subunit beta, extracellular domain"
definition: >-
  Glycine receptors (GlyR) are ligand-gated chloride channels that function as major inhibitory neurotransmitters (NT) in the adult vertebrate central nervous system (CNS). Glycinergic synapses have a well-established role in the processing of motor and sensory information that controls movement, vision and audition. Strychnine acts as a competitive antagonist of glycine binding, thereby reducing the activity of inhibitory neurons. Whilst glycine is the principal physiological agonist at GlyRs, taurine and beta-alanine also behave as agonists. This entry represents the extracellular domain (ECD) of the beta subunit of GlyR.
