identifier: InterPro:IPR016188
label: "PurM-like, N-terminal domain"
definition: >-
  This entry represents a structural domain with a core structure consisting of β-α-β-α-β(2), which is found in two enzymes of the purine biosynthetic pathway: at the N-terminal of aminoimidazole ribonucleotide (AIR) synthetase (PurM), as well as the N1 and N2 domains of formylglycinamide ribonucleotide (FGAR) amidotransferase (PurL) (PurM-like module). PurM and PurL utilise ATP to activate the oxygen of an amide within their substrate toward nucleophilic attack by a nitrogen. PurM uses the product of PurL, formylglycinamidine ribonucleotide (FGAM) and ATP to make AIR, ADP and P(i). It is also found as domains 1 and 3 in phosphoribosylformylglycinamidine synthase II (smPurL) ( ) (carries a duplication: tandem repeats of two PurM-like units arranged like the PurM subunits in the dimer). This domain is also found at the N-terminal of thiamine monophosphate kinase ( ) (ThiL). ThiL phosphorylates thiamine monophosphate to form thiamine pyrophosphate, an essential cofactor that is synthesized de novo by Salmonella typhimurium.
