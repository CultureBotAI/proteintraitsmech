identifier: InterPro:IPR043760
label: "Pycsar effector protein domain"
definition: >-
  This entry represents a domain found in the effector protein from Pycsar system. This domain is found either standalone or in combination with HD domain . Pycsar (pyrimidine cyclase system for antiphage resistance) provides immunity against bacteriophage and consists of a pyrimidine cyclase (PycC), which synthesizes cyclic nucleotides in response to infection and an effector protein. Cyclic nucleotides serve as specific second messenger signals, which activate the adjacent effector, leading to bacterial cell death and abortive phage infection.
