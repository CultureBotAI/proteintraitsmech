identifier: InterPro:IPR018402
label: "Malonate/sodium symporter MadM subunit, N-terminal"
definition: >-
  This entry represent the N-terminal domain of the malonate/sodium symporter MadM subunit The MSS family includes the monobasic malonate:Na+ symporter of Malonomonas rubra. It consists of two integral membrane proteins, MadL and MadM.The transporter is believed to catalyze the electroneutral reversible uptake of H+-malonate with one Na+, and both subunits have been shown to be essential for activity.
