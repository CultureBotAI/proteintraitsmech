identifier: InterPro:IPR001826
label: "RHS protein, conserved region"
definition: >-
  This entry represents a conserved region found in RHS (Rearrangement hotspot) proteins. RHS (Rearrangement hotspot) proteins are distantly related to the wall-associated protein A (WapA) and mediate intercellular competition. The protein sequences comprise highly conserved 141kDa domain containing multiple tandem 22-residue repeats, the YD-peptide repeats that define this protein family. Rhs/YD-repeat proteins are widely distributed suggesting that they play a fundamental role in biology. Rhs C-terminal regions (Rhs-CT) are highly divergent. Rhs-CT regions share sequence identity with toxic effector domains of contact-dependent growth inhibition (CDI) systems, which shows that these proteins inhibit the growth of neighboring cells in a contact-dependent manner.
