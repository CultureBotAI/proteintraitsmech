identifier: InterPro:IPR012908
label: GPI inositol-deacylase PGAP1-like alpha/beta domain
definition: >-
  This domain is found in GPI inositol-deacylase PGAP1 and related proteins. It is found toward the N terminus and it is a lipase domain with a typical α/β/α hydrolase architecture. PGAP1 is an endoplasmic reticulum membrane protein with a catalytic serine-containing motif that is conserved in a number of lipases. PGAP1 functions as a GPI inositol-deacylase; this deacylation is important not only for the efficient transport of GPI-anchored proteins from the endoplasmic reticulum to the Golgi body but also for efficient degradation of misfolded GPI-anchored proteins in the ER.
