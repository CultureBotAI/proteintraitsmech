identifier: InterPro:IPR042720
label: "Piccolo, FYVE-related domain 1"
definition: >-
  Protein piccolo, also known as aczonin, is a neuron-specific presynaptic active zone scaffolding protein that mainly interacts with a detergent-resistant cytoskeletal-like subcellular fraction and is involved in the organization of the interplay between neurotransmitter vesicles, the cytoskeleton, and the plasma membrane at synaptic active zones. It binds profilin, an actin-binding protein implicated in actin cytoskeletal dynamics. It also functions as a presynaptic low-affinity Ca2 sensor and has been implicated in Ca2 regulation of neurotransmitter release.
