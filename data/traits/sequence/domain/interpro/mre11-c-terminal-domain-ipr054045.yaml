identifier: InterPro:IPR054045
label: "Mre11, C-terminal domain"
definition: >-
  This entry represents the helix-turn-helix domain of Mre11 from Thermotoga maritima and similar proteins. Mre11, together with Rad50, form the MR protein complex involved in DNA double-strand break repair. This domain binds Rad50 and attaches flexibly to the nuclease domain which allows large conformational changes.
