identifier: InterPro:IPR048477
label: "YceM-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of putative oxidoreductase YceM from Escherichia coli and similar bacterial sequences. It adopts an α/β structure consisting of a central five-stranded parallel β-sheet packed on both sides with helices. It is often associated with.
