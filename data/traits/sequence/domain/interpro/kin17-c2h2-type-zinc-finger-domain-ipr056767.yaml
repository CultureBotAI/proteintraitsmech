identifier: InterPro:IPR056767
label: "KIN17, C2H2-type zinc finger domain"
definition: >-
  This entry represents the C2H2-type zinc finger domain is found at the N terminus of KIN17 , which is involved in RNA binding, and related eukaryotic proteins. KIN17 is an essential, highly conserved nuclear protein that functions in DNA replication, DNA repair and cell cycle control.
