identifier: InterPro:IPR048990
label: "Metalloprotease StcE, beta-sandwich domain"
definition: >-
  This domain is found in metalloprotease StcE from Escherichia coli and similar proteins predominantly found in gammaproteobacteria. StcE is a virulence factor that contributes to intimate adherence to host cells. This enzyme is organised into three distinct globular domains, IG, M and C, that are packed against each other to show an overall T-shape. This entry represents a region that is located within the domain IG. This region folds independently as a mixed, eight-stranded β-sandwich and contains an additional β-strand followed by a perpendicular arrangement of two α-helices in its N terminus. It is also known as the INS domain. This entry also covers a disordered region that has been described as D1.
