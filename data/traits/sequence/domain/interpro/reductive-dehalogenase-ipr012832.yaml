identifier: InterPro:IPR012832
label: "Reductive dehalogenase"
definition: >-
  This entry represents the C-terminal domain in corrin and 8-iron Fe-S cluster-containing reductive dehalogenase found primarily in halorespiring microorganisms such as Dehalococcoides ethenogenes which contains as many as 17 enzymes of this type with varying substrate ranges. One example of a characterised enzyme is the tetrachloroethene reductive dehalogenase ( ) which also acts on trichloroethene converting it to dichloroethene.
