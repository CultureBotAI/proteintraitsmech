identifier: InterPro:IPR056353
label: "Microprotein domain, apicomplexa 4"
definition: >-
  This domain covers the whole length of uncharacterised microproteins encoded by small open reading frames (smORFs) from apicomplexa, including from the parasite Babesia bovis, and is found at the C-terminal end of longer uncharacterised proteins from related species.
