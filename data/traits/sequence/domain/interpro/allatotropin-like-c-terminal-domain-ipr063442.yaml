identifier: InterPro:IPR063442
label: "Allatotropin-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of allatotropin precursor proteins found in insects, particularly Lepidoptera and found in Manduca sexta. Allatotropin is a neuropeptide that stimulates juvenile hormone synthesis and acts as a cardioregulatory neurohormone. The mature allatotropin peptide is processed from the N-terminal region of the precursor, while this C-terminal domain comprises the remaining portion of the precursor protein. The domain is approximately 40 amino acids in length and is found in species across Noctuidae, Papilionoidea, and other lepidopteran families. The specific function of this C-terminal domain remains to be determined.
