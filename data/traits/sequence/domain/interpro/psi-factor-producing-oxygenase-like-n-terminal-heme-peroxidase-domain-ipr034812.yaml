identifier: InterPro:IPR034812
label: Psi-factor producing oxygenase-like, N-terminal heme peroxidase domain
definition: >-
  This entry represents the N-terminal heme peroxidase domain of Psi-factor producing oxygenase and related proteins. Oxylipins may be synthesized via multi step processes that consist of dioxygenation and isomerization of the intermediately formed hydroperoxy fatty acid. These processes are typically catalyzed by two distinct enzyme classes: dioxygenases and cytochrome P450 enzymes. In fungi both enzymatic activities are combined in a single bifunctional enzyme and are known as are named Psi-factor producing oxygenases (Ppo). These enzymes consist of an N-terminal heme peroxidase domain and a C-terminal cytochrome P450 domain. These fungal enzymes, related to animal heme peroxidases, catalyze the oxygenation of linoleate and similar targets. They are responsible for the synthesis of various fatty acid-derived oxylipins. Linoleate diol synthase from Gaeumannomyces graminis catalyzes the dioxygenation of linoleic acid to (8R)-hydroperoxylinoleate and isomerization of the resulting hydroperoxide to (7S,8S)-dihydroxylinoleate. Other members are 5,8-linoleate dioxygenase (ppoA) and linoleate 10R-dioxygenase (ppoC).
