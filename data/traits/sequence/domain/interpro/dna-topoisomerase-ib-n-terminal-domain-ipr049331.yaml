identifier: InterPro:IPR049331
label: "DNA topoisomerase IB, N-terminal domain"
definition: >-
  This is the N-terminal of Type I topoisomerase from Deinococcus radiodurans and similar bacterial sequences. This small-sized protein modify DNA topology by cleaving and resealing one strand of duplex DNA. This domain comprises three α-helices plus a five strand antiparallel β-sheet. It is found associated with .
