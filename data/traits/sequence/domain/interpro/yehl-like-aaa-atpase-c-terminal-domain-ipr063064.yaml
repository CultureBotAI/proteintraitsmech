identifier: InterPro:IPR063064
label: "YehL-like AAA+ ATPase, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain of approximately 130 residues found in YehL-like AAA+ ATPases in bacteria, predominantly in Actinomycetes (Streptomyces, Micromonospora) and Proteobacteria. This domain follows the N-terminal AAA_5 ATPase domain ( ). YehL belongs to the CbbQ/NirQ/NorQ/GvpN subfamily of AAA+ ATPases. The specific function of this C-terminal domain remains to be determined.
