identifier: InterPro:IPR060535
label: "Aq_493, helical needle domain"
definition: >-
  This domain is found in uncharacterised bacterial proteins including Uncharacterized protein aq_493 from Aquifex aeolicus. These proteins share a global similarity to MCE lipid transporter proteins and are likely to have similar function. This domain represents the helical needle region which assembles to form a tunnel used for transport.
