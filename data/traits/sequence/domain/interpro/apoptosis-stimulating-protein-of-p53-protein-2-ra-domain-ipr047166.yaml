identifier: InterPro:IPR047166
label: "Apoptosis-stimulating protein of p53 protein 2, RA domain"
definition: >-
  This entry represents the RA domain of ASPP2. ASPP2, also termed Bcl2-binding protein (Bbp), or renal carcinoma antigen NY-REN-51, or tumour suppressor p53-binding protein 2 (53BP2), or p53-binding protein 2 (p53BP2), is a member of ASPP protein family and it functions as a tumour suppressor. ASPP2 binds to p53 and enhances p53-mediated transcription of proapoptotic genes. ASSP2 contains a RA domain at the N-terminal. The RA domain is a ubiquitin-like domain and RA domain-containing proteins are involved in several different functions ranging from tumour suppression to being oncoproteins. All p53 amino acids that are important for ASPP2 binding are mutated in human cancer, and ASPP2 is frequently downregulated in these tumour cells.
