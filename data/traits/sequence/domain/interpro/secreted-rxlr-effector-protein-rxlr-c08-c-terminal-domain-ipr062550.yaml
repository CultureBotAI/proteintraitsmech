identifier: InterPro:IPR062550
label: "Secreted RxLR effector protein RXLR-C08, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of RxLR effector proteins found in oomycetes. This domain can also be found in other positions within some proteins. RxLR effectors are secreted proteins that suppress pattern-triggered immunity in plant hosts. The proteins are characterised by the presence of a canonical dEER motif and may contain the RxLR translocation motif. These effectors are secreted and localise to the host Golgi apparatus and P-bodies. Expression is up-regulated in spores and the proteins play important roles in virulence during plant infection.
