identifier: InterPro:IPR058502
label: "PLL-like beta propeller"
definition: >-
  This domain, previously known as DUF8189, is found in the L-fucose-binding lectins PHL and PLLs(1-5) from various Photorhabdus species and their homologues. This domain forms a seven-bladed β-propeller. Each blade makes a W-motif composed of four antiparallel β-strands (β1-β4) connected by β-turns and loops. The C- and N-terminal are located on the same side of the torus and create a cap of the inner cavity of the torus. With the exception of PLL3s, which is a monomer, these domains assemble into either homo-dimeric or homo-tetrameric structures connected with an inter-subunit disulphide bridge. Besides L-fucose or fucosylated saccharides, some of these domains bind to the unusual O-methylated disaccharide 3,6-O-Me2-d-Glcβ1-4(2,3-O-Me2)-l-Rhaα (MGMR).
