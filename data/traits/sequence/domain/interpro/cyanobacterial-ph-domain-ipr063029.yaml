identifier: InterPro:IPR063029
label: "Cyanobacterial PH domain"
definition: >-
  This entry represents a PH (pleckstrin homology) domain of approximately 100 residues found exclusively in marine picocyanobacteria. The domain is present in small uncharacterised proteins of around 140 residues, where it comprises essentially the entire structured region. Some family members are annotated as putative secreted or membrane proteins. The domain is restricted to members of the Synechococcales order, including Prochlorococcus, Synechococcus, and Cyanobium species. The function of this domain remains to be determined.
