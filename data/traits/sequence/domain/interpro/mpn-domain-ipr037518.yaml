identifier: InterPro:IPR037518
label: "MPN domain"
definition: >-
  The MPN (Mpr1, Pad1 N-terminal) domain (also known as the Mov34, JAB, PAD-1, or JAMM (JAB1/MPN/Mov34 metalloenzyme) domain) is a widespread 120 amino acid protein module found in archaea, bacteria and eukaryotes. In eukaryotes the MPN domain is found in subunits of several multiprotein complexes, including the proteasome, whereas in eubacteria and archaea, the MPN domain is usually found in single domain proteins. Within the MPN domain super-family, two main subclasses have been characterised: the MPN+ and MPN- domain-containing proteins. MPN+ domain-containing proteins are classified as metalloenzymes responsible for isopeptidase activity. These proteins contain a conserved glutamate (E) and a JAMM (Jab1/MPN/Mov34 metalloenzyme) motif, typically consisting of a canonical sequence (H-x-H-x-S-x-D) and coordinating a zinc ion. The E and JAMM motifs specify a catalytic centre essential for selective hydrolysis of linkages, contained between ubiquitin/ubiquitin-like proteins and target proteins or between ubiquitin monomers within a polymeric chain. MPN- domains are recognisable by the absence of essential Zn(2+)-coordinating residues that are required for catalytic function. In protein complexes, an MPN+ domain can associate with MPN- domains for purposes that are not well understood. The MPN domain is composed of a five-stranded mixed β-sheet with strand order 21345 sandwiched between two α-helices. There is a second, smaller three-stranded parallel β-sheet formed by residues at the N and C termini and in the loop between the first two strands of the main sheet. MPN domains often form part of larger proteins. The N and C termini of the structure are close in space, allowing it to be easily inserted into a multidomain protein. The histidine and aspartate residues of the J…
