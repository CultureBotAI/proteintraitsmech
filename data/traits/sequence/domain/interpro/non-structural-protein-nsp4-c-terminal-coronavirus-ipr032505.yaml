identifier: InterPro:IPR032505
label: "Non-structural protein NSP4, C-terminal, coronavirus"
definition: >-
  This is the C-terminal domain of the coronavirus non-structural protein NSP4. NSP4 is encoded by ORF1a/1ab and proteolytically released from the pp1a/1ab polyprotein. It is a membrane-spanning protein which is thought to anchor the viral replication-transcription complex (RTC) to modified endoplasmic reticulum membranes. This predominantly α-helical domain is involved in protein-protein interactions. It has been shown that in betacoronavirus, the coexpression of NSP3 and NSP4 results in a membrane rearrangement to induce double-membrane vesicles (DMVs) and convoluted membranes (CMs), playing a critical role in SARS-CoV replication. There are two well conserved amino acid residues (H120 and F121) in NSP4 among betacoronavirus, which were demonstrated to be essential for membrane rearrangements during interaction with NSP3. This suggests that the specific details of the interaction between these two proteins varies among different coronavirus.
