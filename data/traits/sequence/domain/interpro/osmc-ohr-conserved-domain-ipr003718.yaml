identifier: InterPro:IPR003718
label: "OsmC/Ohr conserved domain"
definition: >-
  This is a conserved domain of peroxiredoxins that includes osmotically inducible protein C (OsmC), a stress-induced protein found in Escherichia coli. This entry also contains organic hydroperoxide resistance protein (Ohr), that has a novel pattern of oxidative stress regulation. The transcription of the osmC gene of E. coli is regulated as a function of the phase of growth and is induced during the late exponential phase when the growth rate slows before entry into stationary phase. The transcription is initiated by two overlapping promoters, osmCp1 and osmCp2. Ohr from Xanthomonas campestris pv. phaseoli is highly induced by organic hydroperoxides, weakly induced by H2O2, and not induced at all by a superoxide generator. OHR may be a new type of organic hydroperoxide detoxification protein.
