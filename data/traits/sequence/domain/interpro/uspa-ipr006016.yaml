identifier: InterPro:IPR006016
label: UspA
definition: >-
  This entry represents a domain found in the universal stress protein UspA, which is a small cytoplasmic bacterial protein whose expression is enhanced when the cell is exposed to stress agents. UspA enhances the rate of cell survival during prolonged exposure to such conditions, and may provide a general "stress endurance" activity. The crystal structure of Haemophilus influenzae UspA reveals an α/β fold similar to that of the Methanocaldococcus jannaschii (Methanococcus jannaschii) MJ0577 protein, which binds ATP, though UspA lacks ATP-binding activity. Proteins containing this domain include the TeaD protein from Halomonas elongata. TeaD regulates the ectoine uptake by the transporter TeaABC. TeaD shows an ATP-dependent oligomerisation.
