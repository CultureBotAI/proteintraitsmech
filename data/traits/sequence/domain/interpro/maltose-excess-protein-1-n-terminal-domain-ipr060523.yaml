identifier: InterPro:IPR060523
label: "Maltose excess protein 1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of maltose excess protein 1 (MEX1). The protein is found in plants and contains a chloroplast transit peptide for targeting to the plastid. The specific function of this N-terminal domain remains to be determined. MEX1 is a maltose transporter essential for the conversion of starch to sucrose in leaves at night, via the export of maltose from the chloroplast. Together with pGlcT, it contributes significantly to the export of starch degradation products from chloroplasts. The protein is localised to the chloroplast inner membrane and contains multiple transmembrane helices. MEX1 is also required for root cap cell formation.
