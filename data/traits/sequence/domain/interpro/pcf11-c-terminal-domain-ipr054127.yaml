identifier: InterPro:IPR054127
label: "Pcf11, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Pcf11, a CCHC zinc-finger domain which contains a conserved interface for potential binding partners. Mutational studies revealed that mutations in key residues in this conserved region disrupt 3'-end processing. Pfc11 is a highly conserved multidomain protein that links transcriptional elongation, 3'-end processing, and transcription termination.
