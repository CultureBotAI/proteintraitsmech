identifier: InterPro:IPR048945
label: "Ras association domain-containing protein 8/10, RA domain"
definition: >-
  This entry includes RASSF8 and RASSF10, members of the N-terminal RASSF7-10 protein family. RASSF7-10 has an RA-domain at the N-terminal and lacks a conserved SARAH (Salvador/RASSF/Hpo) motif adjacent to the RA domain that is found in members of the RASSF1-6 family. The RA domain of N-terminal RASSF proteins family has the β-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. RASSF8 has been described as a potential tumor suppressor. RASSF8 might have a role in the regulation of cell-cell adhesion and cell growth. RASSF10 is one of the N-terminal RASSF proteins, characterised by an RA domain in the N terminus. It is expressed in a range of tissues, and has been shown to function as a tumour suppressor in a number of studies. This entry represents the RA domain of RASSF8/10. The Ras association domain (RASSF) proteins are named due to the presence of a Ras association (RA) domain in their N or C terminus that can potentially interact with the Ras GTPase family of proteins. These GTPases control a variety of cellular processes, such as membrane trafficking, apoptosis, and proliferation. RASSF proteins contain several other functional domains that modulate associations with other proteins. RASSF proteins with the RA domain at the C terminus (which are termed C-terminal or classical RASSF) usually also include a Salvador-RASSF-Hippo (SARAH) domain involved in several protein-protein interactions and for homo- and heterodimerisation of RASSF isoforms. N-terminal RASSF proteins (with the RA domain in the N terminus) do not usually contain a SARAH domain. At least 10 RASSF family members have been characterised (with multiple splice variants), many of which have been shown to play a role in tumour suppression. RASSF proteins also act as scaffolding agents in…
