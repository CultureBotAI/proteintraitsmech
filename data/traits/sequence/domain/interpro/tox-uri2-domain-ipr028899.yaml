identifier: InterPro:IPR028899
label: "Tox-URI2 domain"
definition: >-
  This entry represents a predicted URI nuclease fold present in bacterial polymorphic toxin systems. In bacterial polymorphic toxin systems, the toxin is exported by the type 2 or type 6 secretion system.
