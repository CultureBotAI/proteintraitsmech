label: "Domain of unknown function DUF8811"
definition: >-
  This entry represents a C-terminal domain of approximately 220 residues found in subtilisin-like serine peptidases in Actinomycetota. This domain is typically located C-terminal to the Peptidase_S8 catalytic domain ( ) and PA domain ( ). The function of this domain remains to be determined.
