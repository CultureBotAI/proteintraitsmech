identifier: InterPro:IPR046811
label: "RNA-directed RNA polymerase, thumb subdomain, flavivirus"
definition: >-
  Flaviviruses produce a large polyprotein from the ssRNA genome, encoding structural proteins required for virus assembly and non-structural (NS1-5) proteins involved in replication of the viral genome. This polyprotein is cleaved by viral and cellular proteases to produce mature viral proteins. NS5 is the largest mature viral protein and contains a N-terminal methyltransferase (MTase) domain separated by a short linker from the C-terminal RNA-directed RNA polymerase domain (RdRp) that adopts a characteristic right-handed fingers-palm-thumb fold and possesses a number of short regions and motifs homologous to other RdRps. This entry represents the thumb domain of NS5 RdRp. NS5 binds to a the stem loop A (SLA) at the 5' extremity of Flavivirus genome and regulates translation of the viral genome.
