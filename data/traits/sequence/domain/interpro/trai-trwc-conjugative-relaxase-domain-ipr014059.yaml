identifier: InterPro:IPR014059
label: "TraI/TrwC, conjugative relaxase domain"
definition: >-
  This is the conjugative relaxase domain found in the N-terminal region of TraI and TrwC. TrwC is a relaxase-helicase that acts in plasmid R388 conjugation. The relaxase domain has DNA cleavage and strand transfer activities. Members of this family are typically found near other genes characteristic of conjugative plasmids and appear to identify integrated plasmids when found in bacterial chromosomes.
