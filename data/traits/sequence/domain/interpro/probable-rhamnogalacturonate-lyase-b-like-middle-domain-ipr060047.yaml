identifier: InterPro:IPR060047
label: "Probable rhamnogalacturonate lyase B-like, middle domain"
definition: >-
  This entry represents a middle domain found in rhamnogalacturonate lyase enzymes, including rhamnogalacturonate lyase B and rhamnogalacturonate lyase C. This domain can be found next to the N-terminal or at the C-terminal in . Probable rhamnogalacturonate lyase B and C secreted enzymes catalyse the eliminative cleavage of L-alpha-rhamnopyranosyl-(1->4)- alpha-D-galactopyranosyluronic acid bonds in rhamnogalacturonan I domains of pectin . The enzymes are found in fungal species including Aspergillus oryzae, Aspergillus nidulans, and Aspergillus fumigatus. The full-length proteins are involved in pectin catabolic processes and cell wall organisation.
