identifier: InterPro:IPR000877
label: Proteinase inhibitor I12, Bowman-Birk
definition: >-
  This family of eukaryotic proteinase inhibitors, belongs to MEROPS inhibitor family I12, clan IF. They predominantly inhibit serine peptidases of the S1 family. They play a role in defense response against pathogens and insects, but they also have been studied as therapeutic treatment in cancer and inflammatory disorders. Exceptionally, cowpea trypsin inhibitor inhibits a cathepsin L-like cysteine proteinase CPL-1 from the nematode Heterodera glycines. The Bowman-Birk inhibitor family is one of the numerous families of serine proteinase inhibitors. They have a duplicated structure and generally possess two distinct inhibitory sites. These inhibitors are primarily found in plants and in particular in the seeds of legumes as well as in cereal grains. In cereals they exist in two forms, one of which is a duplication of the basic structure. Proteins of the Bowman-Birk inhibitor family of serine proteinase inhibitors interact with the enzymes they inhibit via an exposed surface loop that adopts the canonical proteinase inhibitory conformation. The resulting non-covalent complex renders the proteinase inactive. This inhibition mechanism is common for the majority of serine proteinase inhibitor proteins and many analogous examples are known. A particular feature of the Bowman-Birk inhibitor protein, however, is that the interacting loop is a particularly well-defined disulphide-linked short β-sheet region.
