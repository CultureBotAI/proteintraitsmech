identifier: InterPro:IPR049097
label: "Mitochondrial dynamics protein MID51-like, C-terminal domain"
definition: >-
  This entry represents the cytosolic domain of mitochondrial dynamics protein MID51 and similar proteins predominantly found in vertebrates. MID51 promotes the recruitment and association of the fission mediator dynamin-related protein 1 (DNM1L) to the mitochondrial surface to drive mitochondrial fission. This entry represents the cytosolic domain, which adopts a nucleotidyltransferase fold with a mixed α/β topology configured into two lobes separated by a deep cleft.
