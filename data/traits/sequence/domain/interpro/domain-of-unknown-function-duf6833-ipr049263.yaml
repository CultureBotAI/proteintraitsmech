label: "Domain of unknown function DUF6833"
definition: >-
  This domain is found primarily in sequences from tailed bacteriophages and proteobacterial prophages, including Pseudomonas phage LUZ7. It folds into an helical hairpin and forms an obligatory dimeric structure. Its function is unknown.
