identifier: InterPro:IPR001199
label: "Cytochrome b5-like heme/steroid binding domain"
definition: >-
  Cytochrome b5 is a membrane-bound hemoprotein which acts as an electron carrier for several membrane-bound oxygenases. There are two homologous forms of b5, one found in microsomes and one found in the outer membrane of mitochondria. Two conserved histidine residues serve as axial ligands for the heme group. The structure of a number of oxidoreductases consists of the juxtaposition of a heme-binding domain homologous to that of b5 and either a flavodehydrogenase or a molybdopterin domain. These enzymes are: Lactate dehydrogenase (EC 1.1.2.3), an enzyme that consists of a flavodehydrogenase domain and a heme-binding domain called cytochrome b2. Nitrate reductase (EC 1.7.1.-), a key enzyme involved in the first step of nitrate assimilation in plants, fungi and bacteria. Consists of a molybdopterin domain, a heme-binding domain called cytochrome b557, as well as a cytochrome reductase domain. Sulfite oxidase (EC 1.8.3.1), which catalyses the terminal reaction in the oxidative degradation of sulfur-containing amino acids. Also consists of a molybdopterin domain and a heme-binding domain. Yeast acyl-CoA desaturase 1 (EC 1.14.19.1; gene OLE1). This enzyme contains a C-terminal heme-binding domain. Yeast Scs7 (YMR272c), a sphingolipid alpha-hydroxylase. Proteins containing a cytochrome b5-like domain also include: TU-36B, a Drosophila muscle protein of unknown function. Fission yeast hypothetical protein SpAC1F12.10c (C1F12.10c). Yeast Irc21 (YMR073c), a putative protein with unknown function.
