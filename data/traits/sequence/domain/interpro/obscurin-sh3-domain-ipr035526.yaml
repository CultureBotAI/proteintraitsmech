identifier: InterPro:IPR035526
label: "Obscurin, SH3 domain"
definition: >-
  Obscurin is a giant muscle protein that is concentrated at the peripheries of Z-disks and M-lines. It binds small ankyrin I, a component of the sarcoplasmic reticulum (SR) membrane. It is associated with the contractile apparatus through binding with titin and sarcomeric myosin. It plays important roles in the organization and assembly of the myofibril and the SR. Obscurin has been observed as alternatively-spliced isoforms. The major isoform in skeletal muscle, approximately 800kDa in size, is composed of many adhesion modules and signaling domains. Obscurin harbors 49 Ig and 2 FNIII repeats at the N terminus, a complex middle region with additional Ig domains, an IQ motif, and a conserved SH3 domain near RhoGEF and PH domains, and a non-modular C terminus with phosphorylation motifs. The obscurin gene also encodes two kinase domains, which are not part of the 800kDa form of the protein, but is part of smaller spliced products present in heart muscle.
