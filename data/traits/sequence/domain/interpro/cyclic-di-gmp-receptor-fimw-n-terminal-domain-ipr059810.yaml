identifier: InterPro:IPR059810
label: "Cyclic-di-GMP receptor FimW, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of FimW, a cyclic-di- GMP receptor protein from Pseudomonas aeruginosa, and related proteobacteria. The full-length protein is 607 amino acids and contains this N-terminal domain followed by a PilZ-like domain that binds c-di-GMP and a C-terminal β-barrel domain. FimW is a high-affinity cyclic-di-GMP binding protein that regulates type IV pili (T4P) elongation. It is required for T4P- mediated surface attachment and walking motility during the early phases of surface colonisation. The protein forms dimers in the presence of c-di-GMP and localises to cell poles upon surface contact in a c-di-GMP-dependent manner. The function of this domain remains to be determined.
