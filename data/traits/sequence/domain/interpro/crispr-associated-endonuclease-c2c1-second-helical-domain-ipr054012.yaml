identifier: InterPro:IPR054012
label: "CRISPR-associated endonuclease C2c1, second helical domain"
definition: >-
  This entry represents the second helical domain (REC2) from CRISPR-associated endonuclease C2c1 (also known as Cas12b). This domain, together with the first helical domain (helical-I or REC1) forms the α-recognition (REC) lobe, which recognises a 20bp guide:target heteroduplex in RNAs. C2c1 is a class 2 type V-B effector protein that was shown to be active for target DNA cleavage in vivo and in vitro. In contrast to Cpf1, this enzyme cleavage activity requires both crRNA and tracrRNA. The structure of C2c1 consists of an α-helical recognition (REC) lobe, including Helical-I and Helical-II, and a NUC lobe, including OBD, RuvC, and two Nuc domains.
