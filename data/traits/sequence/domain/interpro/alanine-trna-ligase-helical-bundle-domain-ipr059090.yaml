identifier: InterPro:IPR059090
label: "Alanine--tRNA ligase, helical bundle domain"
definition: >-
  This domain is found in Alanine--tRNA ligase, mitochondrial from Saccharomyces cerevisiae (ALA1), which catalyses the attachment of alanine to tRNA(Ala) in a two-step reaction: alanine is first activated by ATP to form Ala-AMP and then transferred to the acceptor end of tRNA(Ala). This domain is predicted to adopt an α configuration.
