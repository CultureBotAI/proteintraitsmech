identifier: InterPro:IPR055162
label: "RET, cysteine rich domain"
definition: >-
  RET is a single transmembrane-spanning receptor tyrosine kinase (RTK) that plays critical roles in the development of vertebrates. Structural analysis indicate that the ligand-binding RET ectodomain (RET-ECD) contains four consecutive cadherin-like domains (CLD1-CLD4) followed by a membrane-proximal cysteine-rich domain (CRD, represented by this entry).
