identifier: InterPro:IPR031993
label: "Domain of unknown function DUF4789"
definition: >-
  This presumed domain is functionally uncharacterised. This domain is found in arthropods, and is typically between 87 and 100 amino acids in length. There is a conserved GPC sequence motif. There are two completely conserved C residues that may be functionally important.
