identifier: InterPro:IPR061806
label: "Domain of unknown function DUF8745"
definition: >-
  This entry represents an N-terminal domain of approximately 175 residues found in putative signal transduction proteins. Some members are annotated as histidine kinases or HSP90-like ATPases, and one example contains a HATPase_c domain suggesting these proteins function in two-component signalling systems. This domain may represent a sensor input domain. This family is found almost exclusively in Actinomycetota, particularly Streptomyces. The function of this domain remains to be determined.
