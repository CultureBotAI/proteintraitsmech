identifier: InterPro:IPR049158
label: "PfEMP1, CIDRalpha1 domain"
definition: >-
  This domain is found in the surface protein PfEMP from Plasmodium falciparum. PfEMP1 is essential for the virulence of this organism. This protein interacts with the endothelial protein C receptor (EPCR) through its cysteine-rich interdomain region (CIDRalpha1), represented in this entry. This domain show binding surfaces that are conserved in shape and bonding potential, despite dramatic sequence diversity. The domain is built around a long three-helical core bundle, with a four-stranded β-sheet on one side and two α-helices on the opposite side.
