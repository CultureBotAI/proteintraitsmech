identifier: InterPro:IPR041002
label: "RK-1-like defensin"
definition: >-
  This entry includes RK-1, a defensin like peptide from rabbit kidney. It also includes some rat alpha defensins. RK-1 has antimicrobial activity against E.coli and activates ion channel activity.
