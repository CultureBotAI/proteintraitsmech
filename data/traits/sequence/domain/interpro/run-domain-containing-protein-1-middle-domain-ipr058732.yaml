identifier: InterPro:IPR058732
label: "RUN domain-containing protein 1, middle domain"
definition: >-
  This domain is found in human RUNDC1 and similar proteins mainly found in animals. This domain is predicted to adopt an all-α configuration. RUN domain-containing protein 1 (RUNDC1) is thought to play a role as p53/TP53 inhibitor and as such may have oncogenic activity.
