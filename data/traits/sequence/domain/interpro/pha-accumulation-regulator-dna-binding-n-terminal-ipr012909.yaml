identifier: InterPro:IPR012909
label: "PHA accumulation regulator DNA-binding, N-terminal"
definition: >-
  This domain is found at the N terminus of the polyhydroxyalkanoate (PHA) synthesis regulators. These regulators have been shown to directly bind DNA and PHA. The invariant nature of this domain compared to the C-terminal domain(s) suggests that it contains the DNA-binding function.
