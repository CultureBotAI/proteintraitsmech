identifier: InterPro:IPR047469
label: "Diacylglycerol kinase alpha, second protein kinase C conserved region 1"
definition: >-
  This entry represents the second protein kinase C conserved region 1 (C1 domain) of DAG kinase alpha and similar proteins from vertebrates. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn2-binding sites. Diacylglycerol (DAG) kinase ( ) is a lipid kinase that phosphorylates diacylglycerol to form phosphatidic acid. DAG kinase alpha, also called 80 kDa diacylglycerol kinase, or diglyceride kinase alpha (DGK-alpha), converts the second messenger diacylglycerol into phosphatidate upon cell stimulation, initiating the resynthesis of phosphatidylinositols and attenuating protein kinase C activity. This protein plays a role in cell cycle progression. DAG kinase alpha acts as a negative modulator of diacylglycerol-based signals during T cell activation. It is involved in cancer development as it has been found upregulated in several types of cancer which leads to hyporesponsiveness or anergy of T cells, a mechanism used by tumours to avoid the immune system. This protein is also important for the generation of phosphatidic acid required for tubular recycling endosome (TRE) biogenesis. It is classified as a type I DAG kinase (DGK), containing EF-hand structures that bind Ca2 and a recoverin homology domain, in addition to C1 and catalytic domains that are present in all DGKs. As a type I DGK, it is regulated by calcium binding. DAG kinase alpha contains two copies of the C1 domain which are essential for plasma membrane targeting of the protein in intact cells.
