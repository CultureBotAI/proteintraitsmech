identifier: InterPro:IPR058467
label: "Domain of unknown function DUF8154"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in halophilic archaea. The proteins containing this domain are found predominantly in the Halobacteria class, including families such as Haloferacaceae, Haloarculaceae, and Natrialbaceae. The domain is approximately 160 amino acids in length.
