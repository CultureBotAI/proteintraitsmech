identifier: InterPro:IPR022783
label: "GCF, C-terminal"
definition: >-
  This entry represents the C-terminal domain of GCF2 its homologues, as well as in a number of other proteins including Tuftelin-interacting protein 11. While the function of the domain is unknown, some of the proteins it is found in are reported to be involved in pre-mRNA splicing. This domain is also found in Sip1, a septin interacting protein.
