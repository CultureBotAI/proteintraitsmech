identifier: InterPro:IPR015217
label: "Invasin, domain 3"
definition: >-
  This domain adopts a structure consisting of an immunoglobulin-like β-sandwich, with seven strands in two β-sheets, arranged in a Greek-key topology. It forms part of the extracellular region of the protein, which can be expressed as a soluble protein (Inv497) that binds integrins and promotes subsequent uptake by cells when attached to bacteria.
