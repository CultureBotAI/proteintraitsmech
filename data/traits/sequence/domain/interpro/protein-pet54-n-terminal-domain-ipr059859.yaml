identifier: InterPro:IPR059859
label: "Protein PET54, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in protein PET54 from Saccharomyces cerevisiae and related fungi. PET54 is a mitochondrial translational activator protein that functions in RNA processing and translation regulation. The protein is localised to the mitochondrial inner membrane as a peripheral membrane protein. PET54 is involved in the excision of intron aI5-beta from pre-mRNA for cytochrome c oxidase I and plays a role in promoting the translation of COX3. The protein contains an RNA recognition motif and binds to mRNA 5'-UTR regions and pre-mRNA intronic sequences. The function of this N-terminal domain remains to be determined.
