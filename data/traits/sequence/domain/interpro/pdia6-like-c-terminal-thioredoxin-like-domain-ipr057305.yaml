identifier: InterPro:IPR057305
label: "PDIA6-like, C-terminal thioredoxin-like domain"
definition: >-
  This entry represents the C-terminal thioredoxin domain found in human Protein disulfide-isomerase A6 (PDIA6) and similar eukaryotic proteins such as PDI 2-2 and 2-3 in arabidopsis and PDI 2-3 in rice. Protein disulfide-isomerase (PDI) is an enzyme primarily located in the endoplasmic reticulum of eukaryotes and the periplasm of bacteria. It catalyses the formation, isomerisation, and reduction or oxidation of disulfide bonds between cysteine residues within proteins as they fold. PDI plays a crucial role in protein folding by allowing proteins to quickly find the correct arrangement of disulfide bonds in their fully folded state. Additionally, PDI functions as a chaperone, assisting in the folding of misfolded proteins and their subsequent degradation. In the immune system, PDI is involved in loading antigenic peptides into MHC class I molecules and plays a role in the assembly of the MHC I complex with high-affinity antigens. PDI also participates in redox signalling in some organisms, such as chloroplasts of unicellular algae.
