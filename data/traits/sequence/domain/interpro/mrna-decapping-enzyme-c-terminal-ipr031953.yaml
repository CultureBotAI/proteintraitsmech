identifier: InterPro:IPR031953
label: "mRNA-decapping enzyme, C-terminal"
definition: >-
  This entry represents the C-terminal domain of animal mRNA-decapping enzyme DCP1 that is responsible for its trimerisation. DCP1 trimerisation is required for its incorporation into active decapping complexes and for efficient mRNA decapping in vivo. The structure of this domain has been revealed.
