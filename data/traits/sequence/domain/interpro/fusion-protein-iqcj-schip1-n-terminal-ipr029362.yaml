identifier: InterPro:IPR029362
label: "Fusion protein IQCJ-SCHIP1, N-terminal"
definition: >-
  IQCJ-SCHIP1 is a fusion protein bridging two adjacent genes that encode distinct proteins, IQCJ, a novel IQ motif containing protein and SCHIP1, a schwannomin interacting protein. Its unique calmodulin-binding IQ motif at the N terminus is not shared with its shorter isoform SCHIP1, suggesting a distinctive function for this protein. It is localised to cytoplasm and actin-rich regions, and in differentiated PC12 cells is seen in neurite extension. IQCJ-SCHIP1 may play a role in action potential conduction in myelinated cells through the organisation of molecular complexes at nodes of Ranvier and axon initial segments.
