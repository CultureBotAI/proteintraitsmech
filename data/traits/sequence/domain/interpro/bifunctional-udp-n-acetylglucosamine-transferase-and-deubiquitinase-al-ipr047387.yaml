identifier: InterPro:IPR047387
label: "Bifunctional UDP-N-acetylglucosamine transferase and deubiquitinase ALG13, OTU domain"
definition: >-
  This entry represents the OTU domain of the bifunctional UDP-N-acetylglucosamine transferase and deubiquitinase ALG13 and similar sequences from vertebrates. Bifunctional UDP-N-acetylglucosamine transferase and deubiquitinase ALG13 is also called asparagine-linked glycosylation 13 homologue, glycosyltransferase 28 domain-containing protein 1 (GLT28D1), or UDP-N-acetylglucosamine transferase subunit ALG13 homologue. It displays both glycosyltransferase ( ) and deubiquitinase (DUB)/ubiquitin thioesterase ( ) activities. With ALG14, it forms a UDP-N-acetylglucosamine transferase that catalyses the second step of eukaryotic N-linked glycosylation in the endoplasmic reticulum. ALG13 variants cause a form of early infantile epileptic encephalopathy known as EIEE36 refractory seizures, neurodevelopmental impairment, and poor prognosis. Given the essential role of ALG13 in glycosylation, it is also considered a congenital disorder of glycosylation (CDG). ALG13 belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad.
