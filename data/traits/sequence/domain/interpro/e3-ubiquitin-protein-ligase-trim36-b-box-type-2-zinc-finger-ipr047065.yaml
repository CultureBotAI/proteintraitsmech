identifier: InterPro:IPR047065
label: "E3 ubiquitin-protein ligase Trim36, B-box-type 2 zinc finger"
definition: >-
  The tripartite motif-containing protein (Trim) family is defined by the presence of a common domain structure composed of a RING finger, a B-box, and a coiled-coil motif. Trim36 is a E3 ubiquitin-protein ligase that mediates ubiquitination and subsequent proteasomal degradation of target proteins. It interacts with centromere protein-H, one of the kinetochore proteins and is involved in chromosome segregation and cell cycle regulation. This protein has been associated with anencephaly. It may play a role in the acrosome reaction and fertilisation. This entry represents the B-box-type 2 zinc finger of Trim36, which is characterised by a CHC3H2 zinc-binding consensus motif.
