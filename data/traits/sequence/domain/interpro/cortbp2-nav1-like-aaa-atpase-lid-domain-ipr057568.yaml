identifier: InterPro:IPR057568
label: "CortBP2/NAV1-like, AAA+ ATPase lid domain"
definition: >-
  This ATPase lid domain is found towards the C-terminal end of human Cortactin-binding protein 2 (CortBP2), Neuron navigator 1 (NAV1) and similar animal proteins. CortBP2 regulates the dendritic spine distribution of CTTN/cortactin in hippocampal neurones and thus controls dendritic spinogenesis and dendritic spine maintenance. NAV1 may be involved in neuronal migration and neurite outgrowth.
