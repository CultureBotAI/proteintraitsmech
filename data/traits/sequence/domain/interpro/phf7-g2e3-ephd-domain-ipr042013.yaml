identifier: InterPro:IPR042013
label: "PHF7/G2E3, ePHD domain"
definition: >-
  This entry represents the ePHD domain found in PHF7 and G2E3. PHF7 ubiquitinates histone H4. G2E3 accepts ubiquitin from an E2 ubiquitin-conjugating enzyme in the form of a thioester and then directly transfers the ubiquitin to targeted substrates. It is essential in early embryonic development to prevent apoptotic death. PIE is required for survival of imaginal disk cells possibly by regulation of cell apoptosis and for germline stem cell self-renewal through mediation of BMP signalling.
