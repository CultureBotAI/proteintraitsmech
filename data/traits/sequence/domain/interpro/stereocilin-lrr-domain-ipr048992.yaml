identifier: InterPro:IPR048992
label: "Stereocilin, LRR domain"
definition: >-
  Stereocilin is expressed in the sensory hair cells and is associated with the stereocilia, the stiff microvilli forming the structure for mechanoreception of sound stimulation. It is essential for the formation of horizontal top connectors in hair cells, which leads to deafness when it is defective. This is a large secreted protein containing a large leucine-rich region.
