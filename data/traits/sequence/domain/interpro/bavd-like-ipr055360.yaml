identifier: InterPro:IPR055360
label: bAvd-like
definition: >-
  This entry includes accessory variability determinant bAvd protein from Bordetella phage BPP-1 and similar sequences from tailed bacteriophages and proteobacterial prophages. bAvd proteins are encoded by diversity-generating retroelements (DGR). They transfer coding information from a template region through an RNA intermediate to a protein-encoding variable region and generates protein sequence variation to provide the phage with the capacity to adapt to its host. The reverse transcription by the DGR is carried out by a complex of reverse transcriptase bRT and bAvd proteins. bAvd forms a positively charged pentameric, barrel-shaped structure, with one end narrower than the other.
