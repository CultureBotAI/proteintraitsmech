identifier: InterPro:IPR062721
label: "Sperm-specific protein Don juan"
definition: >-
  This entry represents a domain found in Don juan (dj) sperm-specific proteins in Drosophilidae. This domain contains an unusual repetitive amino acid motif consisting of tandem DPCK(K/R)K repeats. The specific function of this region remains to be determined. Don juan is expressed exclusively in post-meiotic male germ cells and localises predominantly to the nucleus, with a fraction associated with mitochondria. The full-length protein may be involved in mitochondrial differentiation within the flagellum.
