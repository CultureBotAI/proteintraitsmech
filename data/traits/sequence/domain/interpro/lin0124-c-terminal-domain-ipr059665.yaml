identifier: InterPro:IPR059665
label: "Lin0124, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Lin0124 proteins. The domain forms a coiled-coil structure and is found in bacteria, particularly in Bacillota including Listeria. The function of this domain remains to be determined.
