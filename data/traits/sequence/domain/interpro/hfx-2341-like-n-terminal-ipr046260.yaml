identifier: InterPro:IPR046260
label: "HFX_2341-like, N-terminal"
definition: >-
  This domain is found at the N-terminal of HFX_2341 from Haloferax mediterranei ( ) and similar archaeal proteins. HFX_2341 is a general regulator that affects many metabolic genes and genes of unknown function and is involved in cas gene regulation. It has a significant structural similarity to several CRISPR-associated proteins from archaea specially to Csa3a from Sulfolobus solfataricus. This domain, which has a conserved sequence motif HxxPxxG and a conserved Asparagine residue, is usually associated with an helix-turn-helix domain. It was previously known as DUF6293.
