identifier: InterPro:IPR031905
label: "Flotillin, C-terminal domain"
definition: >-
  Flotillin is a family of lipid-membrane-associated proteins found in bacteria, archaea and eukaryotes. Flotillins in vertebrates are associated with sphingolipids and cholesterol-enriched membrane microdomains, known as lipid-rafts. These rafts, along with other membrane components, are important in cell-signalling. This entry includes flotillin-1 (also known as reggie-2), flotillin-2 (also known as reggie-1) and their homologues. They play a role in various cellular processes such as insulin signaling, T cell activation, membrane trafficking, phagocytosis, and epidermal growth factor receptor signaling. Flotillins in other organisms have roles in viral pathogenesis, endocytosis, and membrane shaping. In bacteria, these proteins are found in membrane microdomains that may be equivalent to eukaryotic membrane rafts. Similarly to eukaryotic flotillin proteins, flotillins in bacteria play an essential role in organizing and maintaining the correct architecture of the functional membrane microdomains.
