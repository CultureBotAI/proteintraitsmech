identifier: InterPro:IPR056502
label: "KIAA0319-like, C-terminal domain"
definition: >-
  This domain is found in human Dyslexia-associated protein KIAA0319 and related animal proteins. KIAA0319 is involved in neuronal migration during development of the cerebral neocortex. This protein probably function in a cell autonomous and a non-cell autonomous manner and plays a role in appropriate adhesion between migrating neurons and radial glial fibers. This domain is found C-terminal and it is predicted to adopt an α/β structure with some similarity to NOTCH heterodimerisation domain.
