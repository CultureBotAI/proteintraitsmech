identifier: InterPro:IPR061586
label: "Domain of unknown function DUF8516"
definition: >-
  This entry represents an N-terminal domain found preceding the Peptidase_M23 domain in spirochaetes, particularly Treponema species. The domain consists of a pair of long α helices and is approximately 115 residues in length. The function of this domain remains to be determined.
