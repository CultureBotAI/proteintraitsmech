identifier: InterPro:IPR060639
label: "EvC complex member EVC, C-terminal domain"
definition: >-
  This entry represents the C-terminal cytoplasmic domain of EvC complex member EVC and similar animal proteins. This cytoplasmic domain likely mediates protein-protein interactions within the EvC complex, though its specific function remains to be determined. It contains some disordered regions and compositional bias regions. EVC is a single-pass membrane protein that forms part of the EvC complex composed of EFCAB7, IQCE, EVC2 and EVC. The complex localises at the base of primary cilia and positively regulates ciliary Hedgehog signalling. EVC is involved in endochondral growth and skeletal development. Mutations in EVC cause Ellis-van Creveld syndrome, characterised by chondrodystrophy, polydactyly, ectodermal dysplasia and cardiac anomalies.
