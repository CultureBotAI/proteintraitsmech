identifier: InterPro:IPR060413
label: "Transcription factor KpeA/SAT20-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of KpeA transcription factors and Satratoxin biosynthesis SC3 cluster transcription factor SAT20 found in fungi. These proteins contain a Zn(2)-C6 fungal-type DNA-binding domain and and function as transcriptional regulators involved in secondary metabolism and conidiation. KpeA regulates kojic acid production by negatively controlling kojR and kojA expression and also affects conidial development by regulating central developmental pathway genes including brlA, abaA, and wetA. The protein requires six conserved cysteine residues for proper function in coordinating zinc ions for DNA binding. KpeA is nuclear-localised and represents a unique member of the Zn(2)-C6 transcription factor family. SAT20 is a transcriptional regulator that may regulate the expression of the satratoxin biosynthesis SC3 cluster, one of the 3 clusters involved in the biosynthesis of satratoxins, trichothecene mycotoxins that are associated with human food poisonings.
