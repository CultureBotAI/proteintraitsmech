identifier: InterPro:IPR019572
label: "Ubiquitin-activating enzyme, SCCH domain"
definition: >-
  Ubiquitin-activating enzyme (E1 enzyme) activates ubiquitin by first adenylating with ATP its C-terminal glycine residue and thereafter linking this residue to the side chain of a cysteine residue in E1, yielding an ubiquitin-E1 thiolester and free AMP. Later the ubiquitin moiety is transferred to a cysteine residue on one of the many forms of ubiquitin-conjugating enzymes (E2). This domain carries the last of five conserved cysteines that is part of the active site of the enzyme, responsible for ubiquitin thiolester complex formation, the active site being represented by the sequence motif PICTLKNFP. Not all proteins in this entry contain a functional active site. The catalytic cysteine domain contains the E1 active site cysteine, and is divided in two half-domains, FCCH and SCCH, for 'first' and 'second' catalytic cysteine half-domain, respectively. This domain represents the domain 5 found in Ub-activating enzyme E1, the SCCH in which resides the catalytic cysteine. This domain has an α-helical structure and likely to exist in equilibrium of open (adenylation active) and closed (thioester bond formation active) conformations. SCCH, FCCH (the first catalytic cysteine half-domain) and UFD (ubiquitin fold domain) are connected to the AAD (active adenylation domain) through flexible loops that allow the conformational changes and rotations of these domains essential for catalysis of Ub activation and transfer of activated UB from E1 to E2.
