identifier: InterPro:IPR035089
label: "Tail sheath protein, subtilisin-like domain"
definition: >-
  This entry represents the second domain in a variety of phage tail sheath proteins, including Tail sheath protein from Bacteriophage T4 and Cis2 from Halogeometricum borinquense (Hbor_38820, ,). According to ECOD this domain has a subtilisin-like structure.
