identifier: InterPro:IPR047914
label: "TagK-like, C-terminal domain"
definition: >-
  This entry represents a presumed domain found at the C-terminal of TagK-like proteins, mainly from Enterobacterales and Burkholderiales. Members of this entry are involved in type VI secretion system (T6SS) and were initially identified in Gram-negative proteobacterium Burkholderia pseudomallei.
