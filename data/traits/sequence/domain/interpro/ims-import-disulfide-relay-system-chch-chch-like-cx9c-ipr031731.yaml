identifier: InterPro:IPR031731
label: "IMS import disulfide relay-system, CHCH-CHCH-like Cx9C"
definition: >-
  CX9C is the first half of a twin Cx9C motif in eukaryotic proteins. The function of this motif is to import nuclear-encoded mitochondrial intermembrane-space-proteins into the IMS (intermembrane space), as these latter lack a mitochondrial targeting sequence. The Cx9C proteins have a disulfide-bonded α-hairpin conformation. Cx9C-containing proteins are thus putative substrates for the Mia40-dependent thiol-disulfide exchange mechanism that carries out an oxidative folding process resulting in the proteins being trapped in the IMS.
