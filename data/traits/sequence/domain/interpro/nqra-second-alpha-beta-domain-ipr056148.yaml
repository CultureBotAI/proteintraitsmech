identifier: InterPro:IPR056148
label: "NqrA, second alpha/beta domain"
definition: >-
  This domain is found in several bacterial Na(+)-translocating NADH-quinone reductase subunit A (NqrA) proteins. The Na(+)-translocating NADH: ubiquinone oxidoreductase (Na(+)-NQR) generates an electrochemical Na(+) potential driven by aerobic respiration. This domain has an α/β structure and binds an FMN cofactor. It is often found associated with and .
