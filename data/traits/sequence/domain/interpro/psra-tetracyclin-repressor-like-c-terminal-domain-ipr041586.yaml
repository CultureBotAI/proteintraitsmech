identifier: InterPro:IPR041586
label: "PsrA, tetracyclin repressor-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain present in the Pseudomonas aeruginosa PsrA which regulates the fadBA5 beta-oxidation operon. Functional analysis of PsrA indicated its importance in regulating b-oxidative enzymes. It has also been suggested that PsrA, a member of the TetR family of repressors, could affect global gene expression including activation of rpoS. TetR family regulators are involved in the transcriptional control of multidrug efflux pumps, pathways for the biosynthesis of antibiotics, response to osmotic stress and toxic chemicals, control of catabolic pathways, differentiation processes, and pathogenicity. The TetR proteins identified in overm ultiple genera of bacteria and archaea share a common helix-turn-helix (HTH) structure in their DNA-binding domain. However, TetR proteins can work in different ways: they can bind a target operator directly to exert their effect (e.g. TetR binds Tet(A) gene to repress it in the absence of tetracycline), or they can be involved in complex regulatory cascades in which the TetR protein can either be modulated by another regulator or TetR can trigger the cellular response. TetR regulates the expression of the membrane-associated tetracycline resistance protein, TetA, which exports the tetracycline antibiotic out of the cell before it can attach to the ribosomes and inhibit protein synthesis. TetR blocks transcription from the genes encoding both TetA and TetR in the absence of antibiotic. The C-terminal domain is multi-helical and is interlocked in the homodimer with the helix-turn-helix (HTH) DNA-binding domain.
