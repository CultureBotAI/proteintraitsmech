identifier: InterPro:IPR048461
label: "Dermonecrotic toxin-like, C2 domain"
definition: >-
  Dermonecrotic toxin (ToxA), also known as Pasteurella multocida toxin (PMT), inhibits osteoblastic differentiation in mammals and birds. Its N-terminal region binds to target cells, while its C-terminal region, with a Trojan horse-like shape, carries the intracellularly active moiety. The latter consists of three distinct domains: C1 ( ), C2 and C3 ( ). This entry represents the larger of these domains, the central region C2, which has 18 helices and nine β-strands and is organised into two subdomains with typical α-β structures characteristic of nucleotide-binding proteins. This domain is also found in the multifunctional-autoprocessing repeats-in-toxin (MARTX) toxin from Vibrio vulnificus, responsible for the disruption of host innate immune defences during infection.
