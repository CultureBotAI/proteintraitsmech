identifier: InterPro:IPR063969
label: "Hamartin, coiled-coil"
definition: >-
  This entry represents the coiled-coil region of Hamartin (also known as TSC1) from animals, that interacts with TSC2. TSC1 is the non-catalytic component of the TSC-TBC complex, a multiprotein complex that acts as a negative regulator of the canonical mTORC1 complex. This complex acts as a GTPase-activating protein (GAP) for the small GTPase RHEB, a direct activator of the protein kinase activity of m TORC1.
