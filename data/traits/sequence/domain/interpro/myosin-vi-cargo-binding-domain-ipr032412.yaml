identifier: InterPro:IPR032412
label: "Myosin VI, cargo binding domain"
definition: >-
  This entry represents the C-terminal cargo binding domain (CBD) of myosin-VI. Several adaptor proteins have been reported to interact specifically with the CBD, thus defining the specific subcellular functions of myosin VI. The crystal structure determination of the myosin VI CBD/Dab2 (an endocytic adaptor protein Disabled-2 that is a cargo) complex shows that the CBD forms a cargo-induced dimer, suggesting that the motor undergoes monomer-to-dimer conversion that is dependent upon cargo binding. In the absence of cargo, myosin VI exists as a stable monomer. This cargo binding-mediated monomer-to-dimer conversion mechanism adopted by myosin VI may be shared by other unconventional myosins, such as myosin VII and myosin X.
