identifier: InterPro:IPR060644
label: "Proheparin-binding EGF-like growth factor, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Proheparin-binding EGF-like growth factor (HBEGF) and similar proteins from vertebrates. HBEGF is a growth factor that mediates its effects via EGFR, ERBB2 and ERBB4 receptors and promotes smooth muscle cell proliferation. The full-length protein is initially synthesised as a transmembrane precursor containing a signal peptide, an N-terminal propeptide, the mature growth factor region with an EGF-like domain, a transmembrane region, and this C-terminal cytoplasmic domain. The specific function of this domain is unknown.
