identifier: InterPro:IPR006517
label: "Phage terminase large subunit-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of a group of proteins from tailed bacteriophages that are typically about 400-500 amino acids in length, although some members are considerably shorter. Most proteins in this family have an apparent P-loop nucleotide-binding sequence toward the N terminus, consistent with the ATPase activity of phage terminase large subunit (TerL). The assignment as TerL is suggested by gene context in numerous phage as well as by homology to better characterised families of TerL. This domain is also found in bacterial prophages.
