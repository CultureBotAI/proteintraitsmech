identifier: InterPro:IPR060553
label: "Endosomal transmembrane epsin interactor 1/2, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain found in human endosomal transmembrane epsin interactor 1/2 (ENTREP1/2) and related proteins mainly from vertebrates. ENTREP1 functions as an activator of the E3 ubiquitin protein ligase ITCH in receptor ubiquitination. This domain is located in the cytoplasmic region towards the C-terminal end of these single-pass membrane proteins and is preceded by a disordered region. The specific function of this domain remains to be determined.
