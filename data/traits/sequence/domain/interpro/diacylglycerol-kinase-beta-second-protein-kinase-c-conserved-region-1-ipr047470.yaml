identifier: InterPro:IPR047470
label: "Diacylglycerol kinase beta, second protein kinase C conserved region 1"
definition: >-
  This entry represents the second protein kinase C conserved region 1 (C1 domain) of DAG kinase beta and similar proteins from vertebrates. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn2-binding sites. Diacylglycerol (DAG) kinase is a lipid kinase that phosphorylates diacylglycerol to form phosphatidic acid. DAG kinase beta, also called 90 kDa diacylglycerol kinase, or diglyceride kinase beta (DGK-beta), exhibits high phosphorylation activity for long-chain diacylglycerols. It is classified as a type I DAG kinase (DGK), containing EF-hand structures that bind Ca2 and a recoverin homology domain, in addition to C1 and catalytic domains that are present in all DGKs. As a type I DGK, it is regulated by calcium binding. DAG kinase beta contains two copies of the C1 domain, which bind DAG and phorbol esters. This enzyme is specifically expressed in brain and regulates neuron-specific morphological changes including neurite branching and neurite spine formation.
