identifier: InterPro:IPR048232
label: "Tetraspanin-6/7, EC2 domain"
definition: >-
  Tetraspanins are transmembrane proteins with 4 transmembrane segments. Both the N- and C-terminal ends lie on the intracellular side of the membrane. Tetraspanins are involved in diverse processes and their various functions may relate to their ability to act as molecular facilitators. Tetraspanins associate laterally with one another and cluster dynamically with numerous partner domains in membrane microdomains, forming a network of multimolecular complexes, the 'tetraspanin web'. This entry represents the extracellular domain (EC2) between the 3rd and 4th transmembrane segment, also referred to as the large extracellular loop (LEL) from tetraspanin-6 (TSN-6, also known as transmembrane 4 superfamily 6) and tetraspanin-7 (TSN-7, also known as transmembrane 4 superfamily 2). TNS-7 has been identified to be involved in some forms of X-linked mental impairments.
