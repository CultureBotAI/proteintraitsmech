identifier: InterPro:IPR013787
label: "S100/CaBP-9k-type, calcium binding, subdomain"
definition: >-
  The calcium-binding domain found in S100 and CaBP-9k proteins is a subfamily of the EF-hand calcium-binding domain. S100s are small dimeric acidic calcium and zinc-binding proteins abundant in the brain, with S100B playing an important role in modulating the proliferation and differentiation of neurons and glia cells. S100 proteins have two different types of calcium-binding sites: a low affinity one with a special structure, and a 'normal' EF-hand type high-affinity site. Calbindin-D9k (CaBP-9k) also belong to this family of proteins, but it does not form dimers. CaBP-9k is a cytosolic protein expressed in a variety of tissues. Although its precise function is unknown, it appears to be under the control of the steroid hormones oestrogen and progesterone in the female reproductive system. In the intestine, CaBP-9k may be involved in calcium absorption by mediating intracellular diffusion. This entry represents a subdomain of the calcium-binding domain found in S100, CaBP-9k, and related proteins.
