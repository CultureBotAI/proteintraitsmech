identifier: InterPro:IPR000084
label: "PE-PGRS family, N-terminal"
definition: >-
  This family is named after a PE motif near to the amino terminus. The carboxyl terminus of this family are variable and fall into several classes. The largest class of PE proteins is the highly repetitive PGRS class which have a high glycine content. The function of these proteins is uncertain but it has been suggested that they may be related to antigenic variation of Mycobacterium tuberculosis and also immune modulation. The human pathogen Mycobacterium tuberculosis harbours a large number of genes that encode proteins whose N-terminals contain the characteristic motifs Pro-Glu (PE) or Pro-Pro-Glu (PPE). These proteins are exported to the bacterial surface via type VII secretion systems known as ESX. A subgroup of the PE proteins contains polymorphic GC-rich sequences (PGRS), while a subgroup of the PPE proteins contains major polymorphic tandem repeats (MPTR). The function of most of these proteins remains unknown. However, the PE_PGRS proteins from Mycobacterium marinum are secreted by components of the ESX-5 system that belongs to the recently defined type VII secretion systems. It has also been reported that the PE_PGRS family of proteins contains multiple calcium-binding and glycine-rich sequence motifs GGXGXD/NXUX. This sequence repeat constitutes a calcium-binding parallel β-roll or parallel β-helix structure and is found in RTX toxins secreted by many Gram-negative bacteria. PPE51 member has been described as a small molecule-selective channel required for the uptake of nutrients across the outer mycomembrane. This protein transports glycerol and glucose as well as maltose and lactose disaccharides. It is involved in sensitivity to M.tuberculosis growth inhibitory agrichemical 3,3-bis-di(methylsulfonyl)propionamide (3bMP1) and sensitivity to bactericidal thio…
