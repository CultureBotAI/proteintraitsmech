identifier: InterPro:IPR047249
label: "TP53-binding protein 1-like, first BRCT domain"
definition: >-
  This entry represents the BRCT domain of TP53BP1 and its orthologues. It corresponds to the first BRCT domain of TP53BP1 and hsr-9. This entry includes TP53-binding protein 1 (TP53BP1, also known as p53BP1 or 53BP1) and its orthologues, such as DNA repair protein RAD9 from S.cerevisiae and Crb2 from S.pombe. TP53BP1 is a double-strand break (DSB) repair protein involved in response to DNA damage, telomere dynamics and class-switch recombination (CSR) during antibody genesis. TP53BP1 and its homologue from C.elegans hsr-9 contain two tandem BRCT domains, while the fungal orthologues contain one BRCT domain. Crb2, is a checkpoint mediator required for the cellular response to DNA damage.
