identifier: InterPro:IPR041252
label: "RL domain"
definition: >-
  The RRM-like (RL) domain is found in the N-terminal region of the polyA polymerase PAPD1. It contributes to PAPD1 dimerization and has a fold similar to RNP-type RBDs.
