identifier: InterPro:IPR055024
label: "Endo-beta-N-acetylglucosaminidase EndoS, helical bundle"
definition: >-
  This entry represents a three-helical up-and-down bundle domain of EndoS from Streptococcus pyogenes and similar bacterial proteins. EndoS is involved in immune evasion mechanisms and possesses a specific endoglycosidase activity that targets IgG antibodies.
