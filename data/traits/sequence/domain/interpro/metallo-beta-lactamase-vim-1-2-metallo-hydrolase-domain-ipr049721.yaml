identifier: InterPro:IPR049721
label: "Metallo-beta-lactamase VIM-1/2, metallo-hydrolase domain"
definition: >-
  This entry represents the metallo-hydrolase domain found in the metallo-beta-lactamases VIM-1 from Pseudomonas aeruginosa, VIM-2 from Escherichia coli, and similar VIM (Verona integron-encoded metallo-beta-lactamase)-type proteins from gammaproteobacteria. These proteins are class B beta-lactamases that confer resistance to the beta-lactam antibiotics, including penicillins, cephalosporins and carbapenems via hydrolysis of the beta-lactam ring. VIM-type metallo-beta-lactamases (MBLs) are integron-associated and are widely distributed acquired MBLs. MBLs (class B of the Ambler beta-lactamase classification) have been divided into three subclasses B1, B2 and B3, based on their sequence and structural relationships, and on their substrates, with the B1 and B2 MBLs being most closely related to each other. This subgroup of VIM-type MBLs belongs to the B1 subclass. B1 enzymes are most active with two zinc ions bound in the active site, and have a broad-spectrum substrate profile.
