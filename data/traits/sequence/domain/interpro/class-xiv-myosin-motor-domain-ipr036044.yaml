identifier: InterPro:IPR036044
label: "Class XIV myosin, motor domain"
definition: >-
  Class XIV myosins localise to plasma membranes of the intracellular parasites and are involved in cell invasion and egress from infected cells. Myosin A (MyoA) has been established as a component of the glideosome complex important in motility and cell invasion, whereas MyoB is not associated with the glideosome. These myosins are characterised by a catalytic 'head', a modified 'neck', and the absence of a 'tail' region. This entry represents the catalytic (head) domain, which binds actin and hydrolyses ATP.
