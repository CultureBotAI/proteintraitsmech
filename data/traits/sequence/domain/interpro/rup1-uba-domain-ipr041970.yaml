identifier: InterPro:IPR041970
label: "Rup1, UBA domain"
definition: >-
  Rup1 mediates the association of Rsp5 and Ubp2. The N-terminal UBA domain is responsible for antagonizing Rsp5 function, as well as bridging the Rsp5-Ubp2 interaction.
