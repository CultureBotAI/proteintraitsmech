identifier: InterPro:IPR048357
label: "Malate synthase G, alpha-beta insertion domain"
definition: >-
  Malate synthase (MS) catalyses the aldol condensation of glyoxylate with acetyl-CoA to form malate as part of the second step of the glyoxylate bypass and an alternative to the tricarboxylic acid cycle in bacteria, fungi and plants. There have been identified two isoforms, A and G (MSA and MSG, respectively) that differ in size and is attributed to an inserted α/β domain in MSG that may have regulatory function. Members of the isoform G family are only found in bacteria. This entry represents the α/β insertion domain from MSG, which buttressed one side of the TIM-barrel domain.
