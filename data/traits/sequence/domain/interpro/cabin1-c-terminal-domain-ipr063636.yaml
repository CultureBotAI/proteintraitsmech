identifier: InterPro:IPR063636
label: "CABIN1, C-terminal domain"
definition: >-
  This entry represents the C-terminal TPR-containing region of calcineurin-binding protein 1 (CABIN1) found in plants. CABIN1 is a component of the HIRA complex, which also includes UBN1, UBN2, ASF1A and HIRA. The HIRA complex is involved in replication-independent chromatin assembly and deposition of histone H3.3. CABIN1 proteins contain multiple TPR repeats and an HIR3_bundle domain.
