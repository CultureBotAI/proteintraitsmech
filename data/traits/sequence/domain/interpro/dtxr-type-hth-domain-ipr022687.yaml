identifier: InterPro:IPR022687
label: DTXR-type, HTH domain
definition: >-
  The DtxR-type HTH domain is a DNA-binding, winged helix-turn-helix (wHTH) domain of about 65 residues present in metalloregulators of the DtxR/MntR family. The family is named after Corynebacterium diphtheriae DtxR, an iron-specific diphtheria toxin repressor, and Bacillus subtilis MntR, a manganese transport regulator. Iron-responsive metalloregulators such as DtxR and IdeR occur in Gram-positive bacteria of the high GC branch, while manganese-responsive metalloregulators like MntR are described in diverse genera of Gram-positive and Gram-negative bacteria and also in Archaea.The metalloregulators like DtxR/MntR contain the DNA-binding DtxR-type HTH domain usually in the N-terminal part. The C-terminal part contains a dimerisation domain with two metal-binding sites, although the primary metal-binding site is less conserved in the Mn(II)-regulators. Fe(II)-regulated proteins contain an SH3-like domain as a C-terminal extension, which is absent in Mn(II)-regulated MntR. Metal-ion dependent regulators orchestrate the virulence of several important human pathogens. The DtxR protein regulates the expression of diphtheria toxinin response to environmental iron concentrations. Furthermore, DtxR and IdeR control iron uptake. Homeostasis of manganese, which is an essential nutrient, is regulated by MntR. A typical DtxR-type metalloregulator binds two divalent metal effectors per monomer, upon which allosteric changes occur that moderate binding to the cognate DNA operators. Iron-bound DtxR homodimers bind to an interrupted palindrome of 19 bp, protecting a sequence of ~30 bp. The crystal structures of iron-regulated and manganese-regulated repressors show that the DNA binding domain contains three α-helices and a pair of antiparallel β-strands. Helices 2 and 3 comprise the he…
