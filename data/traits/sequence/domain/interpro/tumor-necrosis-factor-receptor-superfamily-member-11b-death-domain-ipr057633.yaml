identifier: InterPro:IPR057633
label: "Tumor necrosis factor receptor superfamily member 11B, Death domain"
definition: >-
  This entry represents the Death domains found in two tandem copies at the C-terminal of human Tumor Necrosis Factor Receptor Superfamily Member 11B (TNF11B, also known as osteoprotegerin, OPG) and similar proteins from vertebrates. Death domains typically form an antiparallel α-helical bundle with 6-7 helices arranged in a conserved topology. In TNFRSF11B, these domains mediate homodimerisation, which is essential for ligand binding and inhibition of osteoclastogenesis.. The tumour necrosis factor (TNF) receptor (TNFR) superfamily comprises more than 20 type-I transmembrane proteins. Family members are defined based on similarity in their extracellular domain -a region that contains many cysteine residues arranged in a specific repetitive pattern. The cysteines allow formation of an extended rod-like structure, responsible for ligand binding. Upon receptor activation, different intracellular signalling complexes are assembled for different members of the TNFR superfamily, depending on their intracellular domains and sequences. Activation of TNFRs can therefore induce a range of disparate effects, including cell proliferation, differentiation, survival, or apoptotic cell death, depending upon the receptor involved. TNFRs are widely distributed and play important roles in many crucial biological processes, such as lymphoid and neuronal development, innate and adaptive immunity, and maintenance of cellular homeostasis. Drugs that manipulate their signalling have potential roles in the prevention and treatment of many diseases, such as viral infections, coronary heart disease, transplant rejection, and immune disease. TNF receptors 11A and 11B mediate the effects of receptor activator for NF-kappa-B ligand (RANKL), an essential osteoclast regulatory factor. The receptors h…
