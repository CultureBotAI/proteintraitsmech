identifier: InterPro:IPR047938
label: "Orphan adhesion receptor GPR128, 7TM domain"
definition: >-
  GPR128, also known as Adhesion G-protein coupled receptor G7 (AGRG7), is an orphan receptor of the adhesion family (subclass B2) that belongs to class B GPCRs. Expression of GPR128 was detected in the mouse intestinal mucosa and is thought to be involved in energy balance, as its knockout mice showed a decrease in body weight gain and an increase in intestinal contraction frequency compared to wild-type controls. The adhesion receptors are characterised by the presence of large N-terminal extracellular domains containing multiple adhesion motifs, which play critical roles in cell-cell adhesion and cell-matrix interactions, that are coupled to a class B seven-transmembrane domain (7tmB). These include, for example, EGF (epidermal growth factor)-like domains in CD97, Celsr1 (cadherin family member), Celsr2, Celsr3, EMR1 (EGF-module-containing mucin-like hormone receptor-like 1), EMR2, or EMR3. Furthermore, almost all adhesion receptors, except GPR123, contain an evolutionarily conserved GPCR- autoproteolysis inducing (GAIN) domain that undergoes autoproteolytic processing at the GPCR proteolysis site (GPS) motif located immediately N-terminal to the first transmembrane region, to generate N- and C-terminal fragments (NTF and CTF), which may serve important biological functions. This entry represents the 7tmB domain of GPR128/AGRG7.
