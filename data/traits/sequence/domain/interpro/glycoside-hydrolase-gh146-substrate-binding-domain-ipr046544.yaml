identifier: InterPro:IPR046544
label: "Glycoside hydrolase GH146, substrate-binding domain"
definition: >-
  This domain is found C-terminal in zinc-dependent retaining glycoside hydrolase family GH146 where it is directly involved in substrate binding. This substrate binding domain is usually associated with , . Members of GH146 family share with family GH127 a common catalytic domain and an active site structure that is centred around an unusual Zn(Cys)3(Glu) coordination complex.
