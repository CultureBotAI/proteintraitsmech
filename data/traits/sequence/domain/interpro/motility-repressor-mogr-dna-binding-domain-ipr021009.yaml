identifier: InterPro:IPR021009
label: "Motility repressor MogR, DNA-binding domain"
definition: >-
  This domain family is found in bacteria, and is approximately 150 amino acids in length. MogR is involved in the transcriptional repressor of flagellar motility genes, such as flaA, during extracellular growth at 37 degrees Celsius and during intracellular infection. It binds directly to gene promoter region and probably prevents RNA polymerase binding. At low temperatures, MogR repression activity is modulated by the DegU response regulator in an unknown mechanism. MogR is required for full virulence. MogR binds AT rich flagellar gene promoter regions upstream of the flagellar gene. These regions follow the pattern 5'-TTTTNNNNNAAAA-3'. This domain is the DNA binding domain of MogR.
