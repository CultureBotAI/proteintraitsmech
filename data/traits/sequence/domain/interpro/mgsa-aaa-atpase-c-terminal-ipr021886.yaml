identifier: InterPro:IPR021886
label: "MgsA AAA+ ATPase, C-terminal"
definition: >-
  The MgsA protein possesses DNA-dependent ATPase and ssDNA annealing activities. MgsA contributes to the recovery of stalled replication forks and therefore prevents genomic instability caused by aberrant DNA replication. Additionally, MgsA may play a role in chromosomal segregation. This is consistent with a report that MgsA co-localises with the replisome and affects chromosome segregation. This domain represents the C-terminal region of MgsA. The structure of MgsA has been solved. This domain is also found in the ATPase WRNIP1 which functions as a modulator of initiation or reinitiation events during DNA polymerase delta-mediated DNA synthesis.
