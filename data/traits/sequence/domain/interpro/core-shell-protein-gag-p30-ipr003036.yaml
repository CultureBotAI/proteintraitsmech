identifier: InterPro:IPR003036
label: Core shell protein Gag P30
definition: >-
  Gag polyprotein plays a role in budding and is processed by the viral protease during virion maturation outside the cell. It can be cleaved into 4 chains: matrix protein p15, RNA-binding phosphoprotein p12, capsid protein p30 and nucleocapsid protein p10. This entry represents the capsid protein p30.
