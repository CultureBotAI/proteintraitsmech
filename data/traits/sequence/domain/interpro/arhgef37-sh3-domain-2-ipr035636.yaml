identifier: InterPro:IPR035636
label: "ARHGEF37, SH3 domain 2"
definition: >-
  ARHGEF37 (Rho guanine nucleotide exchange factor 37) contains a RhoGEF [or Dbl homology (DH)] domain followed by a Bin/Amphiphysin/Rvs (BAR) domain, and two C-terminal SH3 domains. Its specific function is unknown. This entry represents the second SH3 domain of ARHGEF37.
