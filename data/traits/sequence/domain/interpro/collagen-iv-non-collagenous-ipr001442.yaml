identifier: InterPro:IPR001442
label: Collagen IV, non-collagenous
definition: >-
  Collagens are major components of the extracellular matrices of all metazoan life and play crucial roles in developmental processes and tissue homeostasis. Collagens are composed of three polypeptide chains (alpha chains) that fold together to form the characteristic triple helical collagenous domain. Some types of triple helical protomers contain genetically identical alpha chains forming homotrimers, whereas others contain two or three different alpha chains forming heterotrimers. The sequences required to form a collagenous domain are Gly-X-Y repeats in which the X and Y positions are frequently proline and hydroxyproline. Glycine is required every third residue as it is the only amino acid small enough to pack into the central core of the triple helix. The triple helix-forming parts are surrounded by non-collagenous (NC) domains of variable sequence, size, and shape. Even if the triple helical parts represent the most striking feature of collagens, tissue specificity as well as defined binding of non-collagens seem to be encoded in the NC domains. The terminal NC domains are excised, modified, or incorporated directly into the final suprastructure, depending on protomer type and function. Type IV collagen is one of the major constituents of basement membranes, a specialised form of extracellular matrix underlying epithelia that compartmentalises tissues and provides molecular signals for influencing cell behaviour. Each type IV chain contains a long triple-helical collagenous domain flanked by a short 7S domain of 25 residues and a globular non-collagenous NC1 domain of ~230 residues at the N and C terminus, respectively. In protomer assembly, the NC1 domains (monomers) of three chains interact, forming an NC1 trimer, to select and register chains for triple helix…
