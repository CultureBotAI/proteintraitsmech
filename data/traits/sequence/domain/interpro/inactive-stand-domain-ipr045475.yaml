identifier: InterPro:IPR045475
label: "Inactive STAND domain"
definition: >-
  This is the inactive P-loop NTPase domain of AAA+ NTPases that belong to the STAND subfamily known as inactive STAND (iSTAND). iSTAND is a component of the MoxR-vWA-iSTAND ternary systems of NTP-dependent conflict systems. The iSTAND component shows clear architectural parallels to the VMAP of the vWA-MoxR-VMAP systems.
