identifier: InterPro:IPR056513
label: "INO80 complex subunit F"
definition: >-
  This entry represents the helical region from INO80 subunit F (also known as TCF3 fusion partner, TFTP or amida) from vertebrates and its orthologues from fungi, including S. pombe Hap2 and Ino80 complex HMG box subunit Nht1. It plays an important role in p53-independent cellular apoptosis and it also plays a role in cell arrest and spermatogenesis. It is likely a regulatory component of the chromatin remodelling INO80 complex.
