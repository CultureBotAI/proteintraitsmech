identifier: InterPro:IPR057946
label: "ZFYVE26-like, TPR repeats"
definition: >-
  This region of tetratricopeptide (TPR)-like repeats is found in ZFYVE26 and similar proteins mainly found in animals. Zinc finger FYVE domain-containing protein 26 (ZFYVE26, also known as SPG15) is a phosphatidylinositol 3-phosphate-binding protein recruited to the midbody during cytokinesis and required for the abcission step in cytokinesis (cleaving of the midbody in two). It may also be required for efficient homologous recombination DNA double-strand break repair. Mutations in ZFYVE26 cause spastic paraplegia 15, autosomal recessive (SPG15), which is a form of spastic paraplegia, a neurodegenerative disorder characterised by a slow, gradual, progressive weakness and spasticity of the lower limbs.
