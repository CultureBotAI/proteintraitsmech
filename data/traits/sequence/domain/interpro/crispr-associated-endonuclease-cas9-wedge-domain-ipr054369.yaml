identifier: InterPro:IPR054369
label: "CRISPR-associated endonuclease Cas9, wedge domain"
definition: >-
  In the type II CRISPR-Cas system, the Cas9 effector nuclease associates with dual guide RNAs (crRNA and trans-activating crRNA (tracrRNA)) and cleaves double-stranded DNA targets complementary to the crRNA guide. Cas9 is composed of multiple domains. This entry represents the so-called wedge (WED) domain that is found in Campylobacter jejuni CRISPR-associated endonuclease Cas9, one of the smallest Cas9 orthologues, and similar proteins specific to Campylobacterales. The WED domain is involved in the recognition of PAM-containing duplex formed by the target and non-target DNA strands. It consists of a β-hairpin packed with two short α-helices ( ).
