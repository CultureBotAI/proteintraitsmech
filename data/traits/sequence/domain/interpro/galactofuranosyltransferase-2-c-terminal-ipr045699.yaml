identifier: InterPro:IPR045699
label: "Galactofuranosyltransferase-2, C-terminal"
definition: >-
  This entry represents the C-terminal domain of the enzyme Galactofuranosyltransferase GlfT2 ( ) predominantly found in bacteria of the class Actinomycetia. This protein is involved in the synthesises of the galactan portion of the peptidoglycan complex of the mycobacteria cell wall. This domain consists of eight α-helices, five of which immediately follow the glycosyltransferase (GT) domain. Three helices at the most C-terminal region of the polypeptide chain wrap around these core helices to complete the domain. The surface-exposed hydrophobic residues may also contribute to the specificity and affinity binding of UDP donors. As the activity of this protein contributes to an essential process for mycobacterial viability, interest in this enzyme as potencial therapeutic target has increased in recent years.
