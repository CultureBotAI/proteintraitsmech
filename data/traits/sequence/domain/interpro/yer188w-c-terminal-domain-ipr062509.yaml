identifier: InterPro:IPR062509
label: "YER188W, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the uncharacterised protein YER188W from Saccharomyces cerevisiae. YER188W is induced under anaerobic growth conditions. The function of this domain remains to be determined.
