label: "PKHD-type hydroxylase C-terminal domain"
definition: >-
  This is the C-terminal domain found in PKHD-type hydroxylase enzymes. Family members are found mostly in bacteria and carry the 2OG-Fe(II) oxygenase domain ( ).
