identifier: InterPro:IPR042823
label: "E3 ubiquitin-protein ligase Dma1/Dma2, RING finger, H2 subclass"
definition: >-
  Proteins containing this domain include one Schizosaccharomyces pombe protein Dma1 (SpDma1p), two Saccharomyces cerevisiae proteins, Dma1 (ScDma1p) and Dma2 (ScDma2p), and their homologues from fungi. They are related to the mammalian CHFR/RNF8 family of ubiquitin ligases. SpDma1p functions to prevent mitotic exit and cytokinesis during spindle checkpoint arrest by inhibiting septation initiation network (SIN) signalling. ScDma1p and ScDma2p, also known as checkpoint forkhead associated with RING domains-containing protein 1 and 2 respectively, seem to be functionally redundant. They are involved in proper septin ring positioning and cytokinesis.
