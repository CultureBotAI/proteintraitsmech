identifier: InterPro:IPR048485
label: "Conserved oligomeric Golgi complex subunit 5, helical domain"
definition: >-
  This entry represents an α-helical bundle domain found in COG5. This domain is found at the C-terminal of yeast sequences (such as or ) and centrally located in animals, plants and similar fungal proteins. Cog5 is a component of the conserved oligomeric Golgi (COG) complex which is involved in intra-Golgi protein trafficking and consists of eight subunits arranged in two lobes bridged by Cog1. Cog5 is a member of the complexes associated with tethering containing helical rods (CATCHR) fold family, which is homologous to subunits of other multisubunit tethering complexes (MTCs) such as Dsl1, exocyst and Golgi-associated retrograde protein (GARP) complexes. COG5 is located in the smaller B lobe together with subunits 6-8, and interacts with subunits 1 and 7.
