identifier: InterPro:IPR062181
label: "PTTG1IP2, C-terminal helix"
definition: >-
  This entry represents the C-terminal helical domain of PTTG1IP2, a member of the PTTG1IP protein family. PTTG1IP2 is a single-pass type I membrane protein with a signal peptide, extracellular domain, transmembrane helix, and cytoplasmic C-terminal region. The protein is expressed in testis and male germ line stem cells, according to Bgee database The function of this C-terminal helical domain remains to be determined.
