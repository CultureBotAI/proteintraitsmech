identifier: InterPro:IPR041382
label: "Bacterial dipeptidyl-peptidase SH3 domain"
definition: >-
  This is the first of two N-terminal bacterial SH3 (SH3b) domains found in bacterial dipeptidyl-peptidases VI such as gamma-D-glutamyl-L-diamino acid endopeptidases. The first SH3b domain plays an important role in defining substrate specificity by contributing to the formation of the active site, such that only murein peptides with a free N-terminal alanine are allowed.
