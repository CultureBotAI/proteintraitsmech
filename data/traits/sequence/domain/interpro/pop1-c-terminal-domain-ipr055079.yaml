identifier: InterPro:IPR055079
label: "POP1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of human Ribonuclease P/MRP protein subunit POP1 and similar proteins mainly found in animals. POP1 is a component of Ribonuclease P that cleaves the 5' leader from precursor tRNAs. The C-terminal domain of POP1 interacts with H1 RNA and has a stabilizing role. This domain adopts a β-barrel structure that is structurally very similar to the C-terminal β-barrel domains of eIF2 gamma, EF-Tu and tRNA thiouridylase MnmA.
