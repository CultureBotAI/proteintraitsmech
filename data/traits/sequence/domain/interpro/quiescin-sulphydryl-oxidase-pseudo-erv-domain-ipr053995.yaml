identifier: InterPro:IPR053995
label: "Quiescin sulphydryl oxidase, pseudo-Erv domain"
definition: >-
  Quiescin sulphydryl oxidase (QSOX) family of enzymes is the only known example of conserved concatenation of disulphide-generating and disulphide-transferring modules within a single polypeptide. Formation and transfer of disulphide bonds in QSOX are mediated by redox-active cysteine pairs in a canonical Cys-X-X-Cys pattern. One of these pair is in the N-terminal thioredoxin-like domain (Trx1). Another is in the C-terminal flavin adenine dinucleotide (FAD)-binding domain (Erv) related to the mitochondrial enzyme Erv1. The middle domain, the so-called pseudo-Erv domain, bridges the Trx1 and Erv domains and is structurally similar to the Erv domain.
