identifier: InterPro:IPR057933
label: "Nesprin-3 domain"
definition: >-
  This region is found in human Nesprin-3 (SYNE3), a component of the LINC (LInker of Nucleoskeleton and Cytoskeleton) complex involved in the connection between the nuclear lamina and the cytoskeleton. SYNE3 plays a role in the regulation of aortic epithelial cell morphology, and is required for flow-induced centrosome polarisation and directional migration in aortic endothelial cells.
