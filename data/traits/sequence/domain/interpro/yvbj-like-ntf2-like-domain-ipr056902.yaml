identifier: InterPro:IPR056902
label: "YvbJ-like, NTF2-like domain"
definition: >-
  This domain is found in Uncharacterized membrane protein YvbJ from Bacillus subtilis and related proteins found in firmicutes. YvbJ is thought to contain a pair of NTF2-like domains toward the C terminus. This domain is the first in the pair.
