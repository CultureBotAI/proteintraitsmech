identifier: InterPro:IPR040979
label: "Vid27, N-terminal"
definition: >-
  This entry represents the N-terminal domain of Vid27. This region may contain a PH domain. Vid27 is a cytoplasmic protein of unknown function, possibly regulates import of fructose-1,6-bisphosphatase into Vacuolar Import and Degradation (Vid) vesicles and is not essential for proteasome-dependent degradation of fructose-1,6-bisphosphatase (FBPase).
