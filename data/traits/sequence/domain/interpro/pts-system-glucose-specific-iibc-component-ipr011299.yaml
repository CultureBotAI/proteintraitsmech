identifier: InterPro:IPR011299
label: PTS system glucose-specific IIBC component
definition: >-
  This entry represents the combined B and C domains of the PTS transport system enzyme II specific for glucose transport. Many of the genes in this family also include an A domain as part of the same polypeptide and thus should be given the name 'PTS system, glucose-specific IIABC component' while the Bacillus subtilus enzyme also contains an enzyme III domain which appears to act independently of the enzyme II domains. This group is most closely related to the N-acetylglucosamine-specific PTS enzymes ( ).
