identifier: InterPro:IPR058158
label: "Phage FDXHR zinc binding domain"
definition: >-
  This entry represents a small family of uncharacterised phage proteins. According to structure predictions this domain contains two zinc binding clusters. This domain contains a highly conserved sequence motif FDXHR where X can be any amino acid.
