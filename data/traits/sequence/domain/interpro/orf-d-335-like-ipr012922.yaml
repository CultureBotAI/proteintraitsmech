label: "ORF D-335-like"
definition: >-
  The sequences featured in this family are similar to a probable integrase ( ) expressed by the SSV1 virus of the archaeon Sulfolobus shibatae. This protein may be necessary for the integration of the virus into the host genome by a process of site-specific recombination.
