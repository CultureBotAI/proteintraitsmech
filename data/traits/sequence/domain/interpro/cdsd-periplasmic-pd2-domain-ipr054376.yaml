identifier: InterPro:IPR054376
label: "CdsD, periplasmic PD2 domain"
definition: >-
  This domain is found in CdsD from Chlamydia trachomatis ( ) and similar sequences from Chlamydia. CdsD is a structural contact-dependent secretion (Cds) protein that form part of the basal body of the type III secretion system (T3SS) injectisome of the bacteria. The periplasmic part of this protein contains at least 3 domains: PD1, PD2 (represented in this entry) and PD3 ( ), all of them sharing the same α-β-β-α-β topology, known as the BON fold, in which the two antiparallel α-helices are on the same side of a three stranded β-sheet.
