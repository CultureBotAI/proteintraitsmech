identifier: InterPro:IPR033419
label: "Gammaproteobacterial periplasmic sensor domain GAPES3"
definition: >-
  GAPES3 (GAmmaproteobacterial PEriplasmic Sensor) domain is a periplasmic sensor domain found in diguanylate cyclases/phosphodiesterases, including the c-di-GMP phosphodiesterases PdeK (YhjK) of Escherichia coli and HmsP of Yersinia pestis.
