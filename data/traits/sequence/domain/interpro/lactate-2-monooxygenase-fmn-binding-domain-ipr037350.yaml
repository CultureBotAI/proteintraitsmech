identifier: InterPro:IPR037350
label: Lactate 2-monooxygenase, FMN-binding domain
definition: >-
  Lactate 2-monooxygenase (LMO) is a FMN-containing enzyme that catalyzes the conversion of L-lactate and oxygen to acetate, carbon dioxide, and water. LMO is a member of the family of alpha-hydroxy acid oxidases. It is thought to be a homooctamer with two- and four- fold axes in the centre of the octamer.
