identifier: InterPro:IPR048539
label: "Carboxysome Shell Carbonic Anhydrase, catalytic domain"
definition: >-
  Carboxysome Shell Carbonic Anhydrase is a bacterial carbonic anhydrase localised in the carboxysome, where it converts bicarbonate ions to carbon dioxide for use in carbon fixation. It contains three domains: an N-terminal domain composed primarily of four α-helices; a catalytic domain containing a tightly bound zinc ion and a C-terminal domain with weak structural similarity to the catalytic domain. This entry represents the catalytic domain, consisting of a central five-stranded mixed β-sheet with two helices flanking one side of the sheet and one helix flanking the other side.
