identifier: InterPro:IPR054388
label: "T6SS, Phospholipase effector Tle1-like, C-terminal domain"
definition: >-
  This entry represents a domain found in the type VI secretion system (T6SS) Phospholipase effector Tle1 from Pseudomonas aeruginosa ( ) and similar proteins from proteobacteria. Tle1, which hydrolyse membrane phospholipids, is organised into two distinct parts, the phospholipase catalytic module ( ) and the putative membrane-anchoring module (this entry), that can be divided into three independent domains: a three α-helix bundle, a six α-helix bundle and an α/β mixed fold with a two-layer sandwich structure.
