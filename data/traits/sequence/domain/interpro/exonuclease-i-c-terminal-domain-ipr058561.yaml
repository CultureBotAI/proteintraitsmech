identifier: InterPro:IPR058561
label: "Exonuclease I, C-terminal domain"
definition: >-
  This entry represents the ExoI C-terminal α-helical domain found in bacterial exonuclease I. In bacteria, exonuclease I (ExoI) is a monomeric processive 3'-5' exonuclease that degrades single-stranded DNA. The enzyme has been implicated as primarily being involved in repairing frameshift mutations. ExoI consists of three domains: an N-terminal nuclease domain with homology to the proofreading domain of E. coli DNA polymerase I and other DnaQ superfamily enzymes, a central domain with a portion that resembles an SH3 domain fold and a C-terminal α-helical domain. While a typical SH3-like domain consists of five or six antiparallel β-strands that form a compact β-barrel, the β-barrel of the SH3-like domain in ExoI is surrounded by α-helices, resulting in a substantially elaborated fold.
