identifier: InterPro:IPR063807
label: "5-methylcytosine-modifying enzyme 1, C-terminal"
definition: >-
  This entry represents the C-terminal catalytic domain of CMD1 (5-methylcytosine-modifying enzyme 1) and related TET family dioxygenases found in algae and fungi, particularly Chlorophyta and some Basidiomycota. CMD1 is a dioxygenase that catalyses the conversion of 5-methylcytosine (5mC) to 5-glyceryl-methylcytosine (5gmC) using L-ascorbate (vitamin C) as a substrate. This C-terminal domain contains the active site and binds iron as a cofactor. The domain is approximately 280 amino acids in length and contains critical catalytic residues including histidine and aspartate residues that coordinate the iron centre. This domain is responsible for the unique dioxygenase activity that conjugates glyceryl moieties from vitamin C to DNA methylation marks.
