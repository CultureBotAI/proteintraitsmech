identifier: InterPro:IPR046524
label: "Domain of unknown function (DUF6701), first Ig-like domain"
definition: >-
  This entry represents an uncharacterised domain found in a wide range of bacterial cell surface proteins. It is predicted to adopt a β-sandwich with Ig-like topology. Many members contain a pair of conserved cysteine residues that are predicted to form a disulphide bond.
