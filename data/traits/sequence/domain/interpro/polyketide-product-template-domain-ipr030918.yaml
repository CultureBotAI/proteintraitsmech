identifier: InterPro:IPR030918
label: "Polyketide product template domain"
definition: >-
  This entry represents the product template (PT) domain of type I polyketide synthases (PKS) and non-reducing PKs from fungi. This domain resembles the dehydratase domain represented by ( ). There is a conserved dehydratase active site (His in the first hot dog domain, Asp in the second hot dog domain) found in proteins in both entries.
