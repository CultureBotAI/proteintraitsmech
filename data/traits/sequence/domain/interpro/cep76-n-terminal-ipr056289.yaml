identifier: InterPro:IPR056289
label: "CEP76, N-terminal"
definition: >-
  This entry represents a domain found at the N-terminal of centrosomal protein of 76 kDa, a protein involved in regulation of centriole duplication to limit centriole duplication to once per cell cycle by preventing centriole reduplication.
