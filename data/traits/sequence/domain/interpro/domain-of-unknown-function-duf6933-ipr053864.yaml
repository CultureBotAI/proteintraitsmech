identifier: InterPro:IPR053864
label: "Domain of unknown function DUF6933"
definition: >-
  This domain is found mainly in bacterial uncharacterised proteins. It is typically between 150 and 160 amino acids in length. It is remotely related to ribonuclease H-like nucleases but it is unlikely to possess any enzymatic activity.
