identifier: InterPro:IPR055393
label: "EDC4-like protein pdc1, beta-propeller domain"
definition: >-
  This entry represents the β-propeller domain of the enhancer of mRNA-decapping protein 4-like protein pdc1 from yeast. This protein is required for the assembly of processing bodies (P-bodies), cytoplasmic RNA granules where mRNA decay occurs. While evidence suggests pdc1 interacts with proteins Edc3 and Dcp2 through its terminal domains to achieve functional P-bodies, the function of this domain remains unknown. This entry also includes the β-propeller domain of pdc1's paralogue, the uncharacterised protein YAG9 (or eti1) from yeast, which localises to P-bodies and interacts with exonuclease Exo2 but whose function remains unknown.
