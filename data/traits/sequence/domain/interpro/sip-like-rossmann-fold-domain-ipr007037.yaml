identifier: InterPro:IPR007037
label: "SIP-like, Rossmann fold domain"
definition: >-
  This entry represents the domain found C-terminal in SIPs, mostly found in gram-negative bacteria such as which could belong to SIP subgroup I. This domain has a three-layer αβα architecture with a Rossmann fold topology. This entry also includes Mycobactin import ATP-binding/permease protein IrtA, where this domain is found in the N-terminal region in between and . Siderophore-interacting proteins (SIPs) are flavin-dependent enzymes that catalyse the release of iron from the siderophore complex by facilitating the reduction of Fe(III) to Fe(II). Structural and kinetic studies of these enzymes have identified two different families: the ferric siderophore reductases (FSRs) and the SIPs. FSRs contain an iron-sulphur cluster, which is absent in SIPs. SIPs can be further classified into two subgroups, which differ in cofactor preference. Subgroup I is characterised by having a longer α-helical C-terminal and preferring NADH, while subgroup II SIPs have an extended N-terminal and utilise NADPH. Mycobactin import ATP-binding/permease protein IrtA is part of the IrtAB complex, an ATP-binding cassette (ABC) transporter that plays a crucial role in iron acquisition in Mycobacterium tuberculosis. IrtAB is responsible for importing iron-loaded siderophores called mycobactins and carboxymycobactins into the bacterial cell.
