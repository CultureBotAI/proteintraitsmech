identifier: InterPro:IPR059489
label: "IsaA-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of bacterial transglycosylase enzymes, including IsaA and SceD proteins found in Staphylococcus species. These enzymes are able to cleave peptidoglycan and affect clumping and separation of bacterial cells. The domain adopts a lysozyme-like fold structure. SceD proteins are required for normal growth under stressful conditions and are essential for nasal colonisation in S. aureus. The proteins are secreted and expression is regulated by multiple two-component systems including LytSR, SaeRS and YycFG. While the full-length proteins have demonstrated peptidoglycan hydrolytic activity, the specific function of this N-terminal domain remains to be determined.
