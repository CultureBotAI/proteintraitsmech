identifier: InterPro:IPR054433
label: "RNA-dependent RNA polymerase, thumb domain, ribovirus"
definition: >-
  This helical bundle domain, known as the thumb domain, is found in the RNA-dependent RNA polymerase (RdRp) of viruses, C-terminal to the palm domain. This domain is larger than the thumb domains of other viral ssRNA RdRPs.
