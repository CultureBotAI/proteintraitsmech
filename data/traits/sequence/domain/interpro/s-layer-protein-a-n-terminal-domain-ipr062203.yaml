identifier: InterPro:IPR062203
label: "S-layer protein A, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of S-layer protein A (SlaA) found in Sulfolobales archaea. SlaA is a large glycosylated protein that forms part of the highly ordered outer cell wall sheath structure. The protein contains multiple N-linked glycosylation sites and is secreted to the S-layer. The full-length protein forms mushroom-shaped unit cells together with SlaB subunits. The specific function of this N-terminal immunoglobulin-like domain within the S-layer structure remains to be determined.
