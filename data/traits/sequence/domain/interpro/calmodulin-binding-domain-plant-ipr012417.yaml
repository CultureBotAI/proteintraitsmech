identifier: InterPro:IPR012417
label: Calmodulin-binding domain, plant
definition: >-
  This domain is found repeated in a number of plant calmodulin-binding proteins (such as , and ). It is thought to represent a calmodulin-binding domain. Binding of the proteins to calmodulin depends on the presence of calcium ions. Proteins containing this domain are thought to be involved in various processes, such as plant defence responses and stolonisation or tuberization.
