identifier: InterPro:IPR005329
label: Sorting nexin, N-terminal
definition: >-
  Sorting nexins (SNXs) are hydrophilic molecules that are localised in the cytoplasm and have the potential for membrane association either through their lipid-binding PX domains or through protein-protein interactions with membrane-associated protein complexes. Indeed, several of the SNXs require several targeting motifs for their appropriate cellular localisation. In almost every case studied, mammalian SNXs can be shown to have a role in protein sorting, with the most commonly used experimental model being plasma-membrane receptor endocytosis and sorting through the endosomal pathway. However, it is equally probable that SNXs sort vesicles that are not derived from the plasma membrane, and have a function in the accurate targeting of these vesicles and their cargo. The N-terminal domain appears to be specific to sorting nexins 1 and 2. SNX1 and SNX2 are members of the retromer complex involved in protein sorting within the endocytic pathway. SNX1 is both membrane-associated and cytosolic, where it probably exists as a tetramer in large protein complexes and may hetero-oligomerize with SNX2.
