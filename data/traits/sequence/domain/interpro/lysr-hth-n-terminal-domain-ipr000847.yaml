identifier: InterPro:IPR000847
label: LysR, HTH, N-terminal domain
definition: >-
  This entry represents the N-terminal domain found in members of the transcription regulator LysR family. This domain acquires a helix-turn-helix fold which is known to be common in proteins that bind DNA . The LysR-type transcriptional regulators (LTTRs) form one of the largest and most diverse families of bacterial regulators. These proteins are widely distributed and contribute to various aspects of bacterial metabolism and physiology. LTTRs are typically homotetramers, with each subunit consisting of an N-terminal DNA-binding domain and a C-terminal effector-binding domain connected by a long helix LTTRs generally function as dual-function repressor-activators, often negatively regulating their own expression while activating other genes. They respond to cellular signals by binding small-molecule ligands (effectors), which induce conformational changes altering DNA interactions and contact with RNA polymerase. Some well-studied members of the LysR family include: AmpR: regulator of β-lactamase expression CatM and CatR: involved in aromatic compound degradation CysB: regulator of cysteine biosynthesis MetR: methionine biosynthesis regulator NhaR: sodium/proton antiporter regulator
