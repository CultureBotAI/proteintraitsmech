identifier: InterPro:IPR034939
label: "Gallate dioxygenase, N-terminal"
definition: >-
  Gallate Dioxygenase (galA/DesB) catalyzes the oxidization and subsequent ring-opening of gallate, an intermediate in the degradation of the aromatic compound, syringate. The reaction product of gallate dioxygenase is 4-oxalomesaconate. The amino acid sequence of the N-terminal and C-terminal regions of gallate dioxygenase exhibits homology with the sequence of PCA 4,5-dioxygenase B (catalytic) and A subunits, respectively. This entry represents the N-terminal domain, which is similar to the B subunit of PCA 4,5-dioxygenase (or LigAB). The enzyme is estimated to be a homodimer according to the Escherichia coli enzyme. LigAB-like enzymes are usually composed of two subunits, designated A and B, which form a tetramer composed of two copies of each subunit. In this group, the subunits A and B are fused to make a single polypeptide chain. The dimer interface may resemble the tetramer interface of classical LigAB enzymes. Gallate Dioxygenase belongs to the class III extradiol dioxygenase family, a group of enzymes which use a non-heme Fe(II) to cleave aromatic rings between a hydroxylated carbon and an adjacent non-hydroxylated carbon.
