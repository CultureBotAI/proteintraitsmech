identifier: InterPro:IPR059027
label: "DDX21/DDX50 dimerisation domain"
definition: >-
  This entry represents the dimerisation domain in DEAD box helicase DDX21/DDX50 proteins. DDX21/DDX50 are involved in various aspects of RNA metabolism, including ribosomal RNA processing, pre-mRNA splicing, and RNA folding. These proteins act as sensors of transcriptional status for RNA polymerase I and II, promoting rRNA transcription and processing. They bind various RNAs, such as rRNAs, snoRNAs, and mRNAs, and are essential for ribosome biogenesis in chloroplasts. Additionally, they play a role in antiviral responses by acting as viral restriction factors, promoting the activation of signalling pathways following viral RNA stimulation. They are also involved in preventing R-loop-associated DNA damage and transcription-associated genomic instability. The Q motif, unique to these proteins, controls ATP binding and hydrolysis, which is crucial for their helicase activity. The dimerisation domain has a LAAALA conserved sequence which is necessary for dimerisation. This domain is essential for ATP dependent dsRNA unwinding and G-quadruplex remodelling.
