identifier: InterPro:IPR026340
label: ThiI, thiazole biosynthesis domain
definition: >-
  The tRNA sulfurtransferase ThiI protein of Escherichia coli is a bifunctional protein in which most of the length of the protein is responsible for sulfurtransferase activity in 4-thiouridine modification to tRNA ( ). This rhodanese-like C-terminal domain, by itself, is able to synthesize the thiazole moiety during thiamin biosynthesis. Note that the invariant Cys residue in this domain is unusual in being required for both activities of the bifunctional ThiI protein.
