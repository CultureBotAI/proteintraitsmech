identifier: InterPro:IPR029441
label: "Integron-associated effector binding protein"
definition: >-
  Cass2 from Vibrio cholerae is an integron-associated protein that has been shown to bind cationic drug compounds with submicromolar affinity. Cass2 has been proposed to be representative of a larger family of independent effector-binding proteins associated with lateral gene transfer within Vibrio and other closely-related species. The structure of Cass2 defines a monomeric β-barrel protein with a fold related to the effector-binding portion of AraC/XylS transcription activators ( ). This domain is also found in BrlR from Pseudomonas aeruginosa which is a receptor for both cyclic di-GMP and pyocyanin. It contains the pyocyanin-binding site ( ).
