identifier: InterPro:IPR049649
label: "Lipoprotein DVU_2496-like, C-terminal domain"
definition: >-
  This entry represents a domain found C-terminal in DVU_2496 from Desulfovibrio vulgaris ( ) and related bacterial proteins. In contrast to the N-terminal region, this domain is more conserved. The N-terminal region frequently contains a lipoprotein lipid attachment site.
