identifier: InterPro:IPR059681
label: "PopC secretion inhibitor"
definition: >-
  This entry represents the α-β plait fold domain found in PopD, a PopC secretion inhibitor from Myxococcus xanthus. PopD forms a cytoplasmic complex with PopC and inhibits PopC secretion and activity in non-starving cells. The protein is approximately 156 amino acids in length and contains a disordered N-terminal region. This domain is predominantly found in Myxococcota, particularly within the Cystobacterineae.
