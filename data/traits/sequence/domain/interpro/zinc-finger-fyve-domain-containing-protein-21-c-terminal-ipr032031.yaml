identifier: InterPro:IPR032031
label: "Zinc finger FYVE domain-containing protein 21, C-terminal"
definition: >-
  Zinc finger FYVE domain-containing protein 21 (ZF21) regulates focal adhesions and cell migration binds by binding multiple factors that promote disassembly of focal adhesions (FAs) such as FAK, beta-tubulin, m-calpain, and SHP-2. This is the C-terminal domain of ZF21. It has a PH-like fold and is required for the regulation of focal adhesions and in cell migration.
