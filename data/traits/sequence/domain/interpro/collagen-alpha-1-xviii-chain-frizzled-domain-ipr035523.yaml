identifier: InterPro:IPR035523
label: "Collagen alpha-1(XVIII) chain, frizzled domain"
definition: >-
  Collagen XVIII (C18) regulates major cellular functions such as the differential epithelial morphogenesis of early lung and kidney development. It exists as three amino terminal end variants with specific amino terminal polypeptide modules. Variant 3 (V3C18) contains a frizzled module which carries structural identity with the extracellular cysteine-rich domain of the frizzled receptors. V3C18 can be proteolytically processed into a cell surface frizzled module-containing 50kDa glycoprotein precursor capable of inhibiting Wnt/beta-catenin signaling, whereas full-length V3C18 is unable to inhibit Wnt signaling.
