identifier: InterPro:IPR034268
label: "RBM25, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of RBM25, which is a RNA-binding protein that acts as a regulator of alternative pre-mRNA splicing. It localizes to the nuclear speckles and associates with multiple splicing components, including splicing cofactors SRm160/300, U snRNAs, assembled splicing complexes, and spliced mRNAs. It may play an important role in pre-mRNA processing by coupling splicing with mRNA 3'-end formation. It can activate proapoptotic Bcl-xS 5'ss by binding to the exonic splicing enhancer, CGGGCA, and stabilize the pre-mRNA-U1 snRNP through interaction with hLuc7A, a U1 snRNP-associated factor. It has been shown to function in cardiac sodium channel splicing regulation of human heart failure. RBM25 contains a well conserved RNA recognition motif (RRM), at the N terminus, a RE/RD-rich (ER) central region, and a C-terminal proline-tryptophan-isoleucine (PWI) motif.
