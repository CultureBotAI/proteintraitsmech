identifier: InterPro:IPR047575
label: Sm domain
definition: >-
  This entry represents a domain found in Sm, Lsm (like-Sm) and Hfq proteins that belong to a large family of proteins from all cellular organisms and are involved in numerous processes associated with RNA processing and gene expression regulation. The Sm and Lsm proteins are found in archaea and eukaryotes, whereas Hfq proteins exist in bacteria and in the archaea Methanocaldococcus jannaschii. The eukaryotic Sm and Lsm proteins form heteroheptameric complexes and play essential roles in splicing and mRNA decapping. In contrast, prokaryotic Hfq proteins associate in homohexamers and are involved in post-transcriptional regulation of gene expression. Lsm archaeal proteins (SmAPs) form homoheptamers and interact with polynucleotide phosphorylase P and uridine-rich RNA sequences and are probably involved in the processing of tRNAs. All these proteins contain the Sm domain that spans ~60-70 residues in length and folds into an open five-stranded β-barrel capped on one side with an α-helix. This domain contains two conserved sequence motifs, Sm1 and Sm2. The Sm domain is responsible for both protein oligomerisation and specific RNA binding.
