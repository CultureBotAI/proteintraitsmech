identifier: InterPro:IPR015848
label: Polyribonucleotide nucleotidyltransferase, RNA-binding domain
definition: >-
  The PH (phosphorolytic) domain is responsible for 3'-5' exoribonuclease activity, although in some proteins this domain has lost its catalytic function. An active PH domain uses inorganic phosphate as a nucleophile, adding it across the phosphodiester bond between the end two nucleotides in order to release ribonucleoside 5'-diphosphate (rNDP) from the 3' end of the RNA substrate. PH domains can be found in bacterial/organelle RNases and PNPases (polynucleotide phosphorylases), as well as in archaeal and eukaryotic RNA exosomes, the later acting as nano-compartments for the degradation or processing of RNA (including mRNA, rRNA, snRNA and snoRNA). Bacterial/organelle PNPases share a common barrel structure with RNA exosomes, consisting of a hexameric ring of PH domains that act as a degradation chamber, and an S1-domain/KH-domain containing cap that binds the RNA substrate (and sometimes accessory proteins) in order to regulate and restrict entry into the degradation chamber. Unstructured RNA substrates feed in through the pore made by the S1 domains, are degraded by the PH domain ring, and exit as nucleotides via the PH pore at the opposite end of the barrel. This entry represents an RNA-binding domain found in bacterial and organelle PNPases, but not in exosomes. It usually occurs in combination with PH domain 1 ( ) and PH domain 2 ( ), both of which are found in PNPases and exosomes. The core structure of the RNA-binding domain consists of a DNA/RNA-binding 3-helical bundle.
