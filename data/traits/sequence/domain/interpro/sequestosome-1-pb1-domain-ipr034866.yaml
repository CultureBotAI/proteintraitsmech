identifier: InterPro:IPR034866
label: "Sequestosome-1, PB1 domain"
definition: >-
  The PB1 domain is an essential part of p62 scaffold protein (alias sequestosome 1, SQSTM) involved in cell signaling, receptor internalization, and protein turnover. It binds ubiquitinated substrates and aid their aggregation and degradation by macroautophagy.
