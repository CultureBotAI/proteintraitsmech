identifier: InterPro:IPR060070
label: "Competence protein ComGC, C-terminal domain"
definition: >-
  This entry represents the C-terminal region of Competence protein ComGC from Streptococcus pneumoniae and similar proteins mainly from firmicutes. ComGC, also known as Major pilin ComGC, is a major component of the type IV-like pilus (T4P) that is required for transformation. This domain is found associated with .
