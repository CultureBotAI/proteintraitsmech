identifier: InterPro:IPR058606
label: "Protein capicua homolog-like, C-terminal tri-helical domain"
definition: >-
  This helix-turn-helix (HTH) domain is found at the C-terminal of mouse Protein capicua homolog (Cic) and similar proteins found in animals. Cic is a transcriptional repressor which plays a role in development of the central nervous system. It is involved in brain development together with ATXN1 and ATXN1L.
