identifier: InterPro:IPR062135
label: "MEP-1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of MEP-1 (MOG interacting and ectopic P-granules protein 1). MEP-1 is a nuclear zinc finger protein that plays a broad role in development, specifically in the SynMuvB genetic pathway that negatively regulates vulval cell fate specification. The protein is required for fem-3 3'-UTR-mediated repression in the regulation of the sperm/oocyte switch and acts by regulating the translation of fem-3 mRNA through binding to its 3'-UTR. MEP-1 interacts with multiple proteins including MOG proteins, histone deacetylases and components of chromatin remodelling complexes. The protein is expressed in the germline and somatic cells and is localised to the nucleus. The specific function of this N-terminal domain remains to be determined.
