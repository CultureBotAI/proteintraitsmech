identifier: InterPro:IPR060613
label: "Probable acyl-activating enzyme 17/18-like, SAM domain"
definition: >-
  This SAM domain is found at the N-terminal end of the probable acyl-activating enzymes 17 and 18 from Arabidopsis thaliana (AAE17/18) and similar proteins mainly found in plants, including Hexanoyl-CoA synthase from Cannabis sativa (AAE1). This entry represents the probable acyl-activating enzymes 17 and 18 from Arabidopsis thaliana (AAE17/18) and similar proteins mainly found in plants, including Hexanoyl-CoA synthase from Cannabis sativa (AAE1). AAE18 may be involved in the peroxisomal activation of 2,4-dichlorophenoxybutyric acid (2,4-DB), a precursor of active auxins that inhibit root growth. AAE1 is an acyl-activating enzyme that catalyses the conversion of hexanoic acid to hexanoyl-CoA, precursor of the cannabinoid pathway.
