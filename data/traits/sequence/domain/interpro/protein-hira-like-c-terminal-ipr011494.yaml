identifier: InterPro:IPR011494
label: Protein HIRA-like, C-terminal
definition: >-
  This entry represents a domain found at the C-terminal end of the HIRA proteins, which mediates homooligomerization. The Hira proteins are found in a range of eukaryotes and are implicated in the assembly of repressive chromatin, including Hir1/2 from yeast and the orthologue from human, HIRA (also known as TUP1-like enhancer of split protein 1). These proteins contain a WD40 repeat at the N-terminal a central B domain and a C domain at the C-terminal. HIRA/Hir1/2 cooperate with ASF1A to promote replication-independent chromatin assembly. It is also required for the periodic repression of histone gene transcription during the cell cycle and for the formation of senescence-associated heterochromatin foci (SAHF) and efficient senescence-associated cell cycle exit. Human HIRA is associated with the the DiGeorge syndrome, a developmental disorder.
