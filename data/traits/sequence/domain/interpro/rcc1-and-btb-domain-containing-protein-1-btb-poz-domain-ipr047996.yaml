identifier: InterPro:IPR047996
label: "RCC1 and BTB domain-containing protein 1, BTB/POZ domain"
definition: >-
  This entry represents the BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in human RCC1 and BTB domain-containing protein 1 (RCBTB1) and similar sequences from vertebrates. RCBTB1 is also called chronic lymphocytic leukemia deletion region gene 7 protein (CLLD7), CLL deletion region gene 7 protein, regulator of chromosome condensation and BTB domain-containing protein 1, or E4.5. It is a novel chromosome condensation regulator-like guanine nucleotide exchange factor that may be involved in cell cycle regulation by chromatin remodelling. It may also function as a tumour suppressor that regulates pathways of DNA damage/repair and apoptosis. RCBTB1 may also be a substrate adaptor for a cullin3 (CUL3) E3 ligase complex that mediates the ubiquitination and subsequent proteasomal degradation of target proteins. Biallelic mutations in RCBTB1 may cause isolated and syndromic retinal dystrophy. It contains an RCC1 repeat, a BTB domain, and a BACK domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids.
