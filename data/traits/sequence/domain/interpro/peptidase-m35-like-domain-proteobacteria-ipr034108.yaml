identifier: InterPro:IPR034108
label: "Peptidase M35-like domain, Proteobacteria"
definition: >-
  This family contains the peptidase domain of uncharacterised proteins from Proteobacteria similar to the Zn 2+ -metallopeptidases in peptidase family M35 (Asp-zincins), also known as the deuterolysin family. Peptidase family M35 contains metalloendopeptidases known as Asp-zincins, in which a single catalytic zinc ion is ligated by two histidines in an HExxH motif and an aspartic acid in a GTXDXXYG or similar motif C-terminal to the HExxH motif. The glutamic acid in the HExxH motif is a catalytic residue.
