identifier: InterPro:IPR019331
label: "FAM192A/Fyv6, N-terminal"
definition: >-
  This entry represents the N-terminal domain of the mammalian PIP30/FAM192A protein and the fungal Fyv6 protein. PIP30/FAM192A acts as a regulator of PA28-gamma, a nuclear activator of the 20S proteasome. PIP30 favours PA28-gamma interaction with the 20S proteasome while inhibiting its association with coilin, a central component of nuclear Cajal bodies. Fyv6 is a splicing factor that acts during exon ligation and promotes usage of consensus, branch point distal 3' splice sites. It is involved in telomere length regulation and required for survival upon exposure to K1 killer toxin. It promotes fully efficient non-homologous end-joining (NHEJ) by a mechanism activated in postdiauxic/stationary phase.
