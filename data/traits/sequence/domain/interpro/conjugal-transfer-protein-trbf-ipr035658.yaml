identifier: InterPro:IPR035658
label: "Conjugal transfer protein TrbF"
definition: >-
  TrbF is known to be involved in conjugal transfer. It is thought to compose part of the pilus required for transfer. This domain is similar to the type IV secretion system (T4ASS) component VirB8 and possibly has a similar fold to the nuclear transport factor-2 (NTF-2)-like superfamily.
