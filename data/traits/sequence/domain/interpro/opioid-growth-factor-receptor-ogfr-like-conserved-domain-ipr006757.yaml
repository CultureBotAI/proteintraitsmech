identifier: InterPro:IPR006757
label: Opioid growth factor receptor (OGFr)-like, conserved domain
definition: >-
  Opioid peptides act as growth factors in neural and non-neural cells and tissues, in addition to serving in neurotransmission/neuromodulation in the nervous system. The opioid growth factor receptor is an integral membrane protein associated with the nucleus. This conserved domain is situated at the N terminus of the member proteins with a series of imperfect repeats lying immediately to its C-terminal. This domain is also found at the C-terminal of Deubiquitinase USP1 from Simkania negevensis, an effector protein secreted into the host cytoplasm that counteracts ubiquitin-based antibacterial defenses. It shows deubiquitinase activity, able to cleave di-ubiquitin of different linkage types.
