identifier: InterPro:IPR049026
label: "Baseplate wedge protein gp6-like, N-terminal helical domain"
definition: >-
  This domain is found in Baseplate wedge protein gp6 from Enterobacteria phage T4 ( ) and similar sequences from tailed bacteriophages and bacterial prophages. Gp6 is a protein involved in tail assembly. This entry represents its N-terminal helical domain.
