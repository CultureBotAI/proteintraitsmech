identifier: InterPro:IPR041170
label: "RING/Ubox-like zinc-binding domain"
definition: >-
  This is a RING zinc finger domain found in parkin proteins. Parkin consists of a ubiquitin-like (Ubl) domain and a 60-amino acid linker followed by RING0 and three additional zinc finger domains characteristic of the RBR family. This entry relates to RING1 zinc binding domain. The RING1 domain displays the C3HC4 cross-brace motif characteristic of RING domains. The N-terminal Ubl domain binds to RING1.
