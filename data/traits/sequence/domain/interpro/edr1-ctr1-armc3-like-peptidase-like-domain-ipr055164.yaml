identifier: InterPro:IPR055164
label: "EDR1/CTR1/ARMC3-like, peptidase-like domain"
definition: >-
  This entry represents a peptidase-like domain mainly found in plant proteins, including serine/threonine-protein kinases EDR1 and CTR1 from Arabidopsis thaliana. EDR1 regulates disease resistance and ethylene-induced senescence, and is also involved in stress response signaling and cell death regulation. CTR1 acts as a negative regulator in the ethylene response pathway. It phosphorylates the cytosolic C-terminal domain of EIN2, preventing the signaling in the absence of ethylene. This entry also includes proteins from animals, such as ARMC3, which is essential for male fertility and sperm motility. During spermatogenesis, promotes the autophagic degradation of excessive ribosomes, providing energy resources for mitochondria and thus ensuring sperm flagellar motility.
