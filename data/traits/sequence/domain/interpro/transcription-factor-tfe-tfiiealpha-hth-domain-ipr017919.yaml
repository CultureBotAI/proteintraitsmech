identifier: InterPro:IPR017919
label: "Transcription factor TFE/TFIIEalpha HTH domain"
definition: >-
  Initiation of eukaryotic mRNA transcription requires melting of promoter DNA with the help of the general transcription factors TFIIE and TFIIH. In higher eukaryotes, the general transcription factor TFIIE consists of two subunits: the large alpha subunit and the small beta. TFIIE beta has been found to bind to the region where the promoter starts to open to be single-stranded upon transcription initiation by RNA polymerase II. The approximately 120-residue central core domain of TFIIE beta plays a role in double-stranded DNA binding of TFIIE. The TFIIE β-central core DNA-binding domain consists of three helices with a β-hairpin at the C terminus, resembling the winged helix proteins. It shows a novel double-stranded DNA-binding activity where the DNA-binding surface locates on the opposite side to the previously reported winged helix motif by forming a positively charged furrow. Archaea contain a TFIIE homologue, called TFE, which corresponds to the N-terminal half of TFIIEalpha. It appears that archaeal TFE corresponds to the minimal essential region of eukaryotic TFIIEalpha. In archaea TFE contains an N-terminal, weakly conserved, helix-turn-helix (HTH) motif within a leucine-rich region and a C-terminal zinc ribbon. It has been proposed that the TFE/IIEalpha-type HTH domain acts as a bridging factor or adapter between the TATA box-binding protein, the polymerase, and possibly promoter DNA. The TFE/IIEalpha-type HTH domain adopts a winged HTH (winged helix) fold, comprising three α-helices and three β-strands in the canonical order α1-β1-α2-α3-β2-β3. Conserved residues within helices α1-α3 form the tightly packed hydrophobic core of the winged helix domain. A specific feature of the structure is the extension of the canonical winged helix fold at the N and C…
