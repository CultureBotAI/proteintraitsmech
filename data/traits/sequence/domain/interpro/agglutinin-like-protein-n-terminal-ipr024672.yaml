identifier: InterPro:IPR024672
label: "Agglutinin-like protein, N-terminal"
definition: >-
  This entry represents the N-terminal domain of yeast alpha-agglutinin and agglutinin-like (ALS) proteins. The ALS glycoproteins have been associated with binding of host-cell surface proteins and small peptides of random sequence, the formation of biofilms and amyloid fibers. The N-terminal domains of Candida albicans ALS3 and ALS9 were shown to be involved in peptide binding. The ligand recognition of these domains relies on a motif capable of binding the flexible C terminus of peptides in extended conformation. In baker's yeast alpha-agglutinin, this domain was implicated in high affinity binding to a-agglutinin that mediates cell-cell contact during mating.
