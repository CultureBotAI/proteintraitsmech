identifier: InterPro:IPR032443
label: "RAWUL domain"
definition: >-
  The RAWUL domain is found at the C terminus of poly-comb group RING finger proteins. It contains a variant ubiquitin-like fold with a distinct conserved surface region. The conserved surface found in this domain is responsible for interaction with Cbx members of the PRC1 (polycomb repression complex 1) and homodimer formation.
