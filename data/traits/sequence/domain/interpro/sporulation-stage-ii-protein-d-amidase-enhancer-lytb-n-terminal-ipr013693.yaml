identifier: InterPro:IPR013693
label: "Sporulation stage II protein D, amidase enhancer LytB N-terminal"
definition: >-
  This domain is found in the stage II sporulation protein SpoIID. SpoIID is necessary for membrane migration as well as for some of the earlier steps in engulfment during bacterial endospore formation. The domain is also found in amidase enhancer proteins. Amidases, like SpoIID, are cell wall hydrolases.
