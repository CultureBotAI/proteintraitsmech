identifier: InterPro:IPR046845
label: "Meiosis-specific protein ASY3-like, coiled-coil"
definition: >-
  This entry represents coiled-coil domain of ASY3 and PAIR3. This entry represents a group of plant meiosis-specific proteins, such as AtASY3 from Arabidopsis and PAIR3 from rice. They are coiled-coil domain proteins required for normal meiosis. PAIR3 is an axial element and part of the synaptonemal complex (SC) that forms between homologous chromosomes during meiosis. Members of this family are homologues of SYCP2 from vertebrates and fungal Red1/Red10.
