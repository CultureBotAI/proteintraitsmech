identifier: InterPro:IPR015224
label: Talin, central
definition: >-
  This domain adopts a structure consisting of five α-helices that fold into a bundle. It contains a vinculin binding site (VBS) composed of a hydrophobic surface spanning five turns of helix four. Activation of the VBS causes subsequent recruitment of vinculin, which enables maturation of small integrin/talin complexes into more stable adhesions. Formation of the complex between VBS and vinculin requires prior unfolding of this middle domain: once released from the talin hydrophobic core, the VBS helix is then available to induce the 'bundle conversion' conformational change within the vinculin head domain thereby displacing the intramolecular interaction with the vinculin tail, allowing vinculin to bind actin.
