identifier: InterPro:IPR060652
label: "RCAS1, C-terminal"
definition: >-
  This entry represents the C-terminal region of RCAS1 proteins, also known as EBAG9 (Estrogen receptor-binding fragment-associated gene 9), found in mammals. RCAS1 proteins are approximately 213 amino acids in length and contain a single-pass type III transmembrane domain and a C-terminal coiled-coil domain. The proteins are localised to the Golgi apparatus membrane. RCAS1 may participate in suppression of cell proliferation and induction of apoptotic cell death through activation of interleukin-1-beta converting enzyme-like proteases. The protein controls cell surface expression of tumour-associated O-linked glycan antigens. RCAS1 forms homodimers and the coiled-coil domain is necessary for homodimerisation. The protein is widely expressed and is regulated by oestrogen. RCAS1 serves as a prognostic marker for cancers including adenocarcinomas of the lung and breast cancers, and is overexpressed in many carcinomas. The protein contains several phosphorylation sites.
