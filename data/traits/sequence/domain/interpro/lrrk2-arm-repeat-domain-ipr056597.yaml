identifier: InterPro:IPR056597
label: "LRRK2, ARM repeat domain"
definition: >-
  This entry represents the armadillo repeat (ARM) found at the N-terminal end of Leucine-rich repeat serine/threonine-protein kinase 2 (LRRK2) from eukaryotes. The domain adopts an ARM-like fold, consisting of a right-handed superhelix formed by two curved layers of repeated helical structural units. A patch of negatively charged residues within the ARM domain has been pointed to contribute to complex formation by binding a positive residue in Rab switch 1 region. ARM domain is also suggested to form connections between adjacent microtubules. Also included in this entry is the armadillo repeat domain of Protein aardvark from Dictyostelium discoideum, a component of the junctional complex, both involved in cell adhesion and signalling. LRRK2 is a serine/threonine-protein kinase which phosphorylates a broad range of proteins involved in multiple processes such as neuronal plasticity, primary ciliogenesis, autophagy, and vesicle trafficking. Mutations in LRRK2 are the most common genetic cause of Parkinson's disease. LRRK2 phosphorylates a group of Rab GTPase proteins, including Rab29.
