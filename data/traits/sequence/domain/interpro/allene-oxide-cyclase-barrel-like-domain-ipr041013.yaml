identifier: InterPro:IPR041013
label: Allene oxide cyclase barrel-like domain
definition: >-
  This is an allene oxide cyclase barrel like domain found in spirotetronate cyclases such as AbyU, a Diels-Alderase enzyme. It is comprised of two eight-stranded antiparallel β-barrels. Proteins containing this domain include PyrI4 from Streptomyces rugosporus. PyrI4 is a spiro-conjugate synthase involved in the biosynthesis of the spirotetramate antibiotics pyrroindomycins.
