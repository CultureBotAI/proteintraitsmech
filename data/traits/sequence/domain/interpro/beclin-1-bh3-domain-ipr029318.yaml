identifier: InterPro:IPR029318
label: "Beclin-1, BH3 domain"
definition: >-
  Beclin 1 is a tumour suppressor that coordinately regulates the autophagy and membrane trafficking involved in several physiological and pathological processes. The BH3 domain of Beclin 1 is bound to, and inhibited by Bcl-2 or Bcl-XL. This interaction enables Bcl-2 to function not only as an antiapoptotic protein, but also as an antiautophagy protein.
