identifier: InterPro:IPR033099
label: Interleukin enhancer-binding factor 3, first DSRM
definition: >-
  Interleukin enhancer-binding factor 3 (IFL3, also known as DRBP76, MPP4, NFAR, nuclear factor of activated T-cells 90 kDa (NF90), or translational control protein 80) is a RNA-binding protein that plays an essential role in the biogenesis of circular RNAs (circRNAs) which are produced by back-splicing circularization of pre-mRNAs. Within the nucleus, promotes circRNAs processing by stabilizing the regulatory elements residing in the flanking introns of the circularized exons. The alternative splicing of the ILF3 gene generates two ubiquitous proteins, interleukin enhancer binding factor 3 (IFL3) and Nuclear Factor 90 (NF90). They have an identical N-terminal domain of 701 amino acids and a specific C-terminal domain of 210 and 15 amino acids, respectively. NF90 and its isoforms are involved in transcription, translation, mRNA export and microRNA biogenesis. They are involved in DNA and RNA virus replication.
