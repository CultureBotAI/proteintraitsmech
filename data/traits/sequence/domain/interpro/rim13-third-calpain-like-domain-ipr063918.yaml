identifier: InterPro:IPR063918
label: "RIM13, third calpain-like domain"
definition: >-
  This entry represents the third calpain-like domain of RIM13 calpain-like protease, found in Saccharomycetes and related fungal proteins. The full-length RIM13 protein is required for proteolytic cleavage of the transcriptional repressor RIM101 in response to alkaline ambient pH, which is necessary for sporulation and invasive growth. RIM13 belongs to the peptidase C2 family and contains an N-terminal calpain catalytic domain with active site residues. The protein interacts with SNF7 which may recruit RIM13 to its substrate. The function of this middle domain remains to be determined.
