identifier: InterPro:IPR059705
label: "ARB_05566, C-terminal domain"
definition: >-
  This entry represents the C-terminal in ARB_05566-like secreted proteins found in fungal species. The protein contains a signal peptide (residues 1-15) followed by a mature secreted protein of 175 residues. The representative protein from Arthroderma benhamiae has been identified by mass spectrometry and confirmed to be secreted. This domain is found predominantly in fungi, particularly in Ascomycota and Basidiomycota species. The function of this protein remains to be determined.
