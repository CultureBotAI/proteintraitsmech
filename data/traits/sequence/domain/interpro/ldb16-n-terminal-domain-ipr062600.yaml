identifier: InterPro:IPR062600
label: "LDB16, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the LDB16 protein family found in fungi. LDB16 is a multi-pass membrane protein that localises to the endoplasmic reticulum membrane and lipid droplets. The protein may be involved in protein-linked oligosaccharide phosphorylation, as deletion reduces the negative charge of the cell surface. This N-terminal domain contains multiple transmembrane helices and is part of the membrane-embedded region of the protein. LDB16 is a component of the Seipin complex involved in lipid droplet formation and organisation. The function of this specific domain remains to be determined.
