identifier: InterPro:IPR032734
label: "DDB1- and CUL4-associated factor 15, WD40 repeat-containing domain"
definition: >-
  DCAFs, Ddb1- and Cul4-associated factors, are substrate receptors for the Cul4-Ddb1 Ubiquitin Ligase. There are 18 different factors, the majority of which are WD40-repeat-proteins. DDB1- and CUL4-associated factor 15 (DCAF15) is the substrate-recognition component of the DCX(DCAF15) complex, a cullin-4-RING E3 ubiquitin-protein ligase complex that mediates ubiquitination and degradation of target proteins, and acts as a regulator of the natural killer (NK) cells effector functions. Aryl sulfonamide anticancer agents appear to promote binding of DCAF15 to the RNA-recognition motif (RRM) of RBM39, which suggests that derivatives of the aryl-sulfonamides may be used to target other RRM-containing proteins. This entry represents the WD40 repeat-containing N-terminal domain found in DCAF15 and similar animal proteins.
