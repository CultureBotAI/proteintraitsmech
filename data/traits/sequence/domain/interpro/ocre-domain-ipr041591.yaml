identifier: InterPro:IPR041591
label: "OCRE domain"
definition: >-
  The OCtamer REpeat (OCRE) has been annotated as a 42-residue sequence motif with 12 tyrosine residues in the spliceosome trans-regulatory elements RBM5 and RBM10 (RBM [RNA-binding motif]), which are known to regulate alternative splicing of Fas and Bcl-x pre-mRNA transcripts. The structure of the domain consists of an anti-parallel arrangement of six β strands.
