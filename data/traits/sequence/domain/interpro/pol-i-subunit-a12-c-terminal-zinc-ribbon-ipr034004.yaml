identifier: InterPro:IPR034004
label: "Pol I subunit A12, C-terminal zinc ribbon"
definition: >-
  The C-terminal zinc ribbon domain of subunit A12 in RNA polymerase (Pol) I (RPA12) is involved in intrinsic transcript cleavage. Eukaryote genomes are transcribed by three nuclear RNA polymerases (Pol I, II and III) that share some subunits. RPA12 in Pol I, RPB9 in Pol II, RPC11 in Pol III and TFS in archaea are distantly related to each other and to the TFIIS elongation factor of Pol II. RPA12 has two zinc-binding domains separated by a flexible linker.
