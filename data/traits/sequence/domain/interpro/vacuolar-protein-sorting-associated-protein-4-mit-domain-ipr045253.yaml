identifier: InterPro:IPR045253
label: "Vacuolar protein sorting-associated protein 4, MIT domain"
definition: >-
  This entry represents the MIT domain found in vacuolar protein sorting-associated protein 4. The molecular function of the MIT domain is unclear. There are two mammalian VPS4 isoforms, VPS4A and VPS4B. They belong to the AAA ATPase family. VPS4A is a central regulator for early endosome trafficking. VSP4 interacts with the ESCRT complex, which directs multiple cellular membrane remodelling events, ranging from the biogenesis of multivesicular bodies and exosomes to the final membrane abscission stage of cytokinesis. The viral budding via host ESCRT complex can also be regulated by VPS4.
