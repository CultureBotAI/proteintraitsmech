identifier: InterPro:IPR041816
label: "Lariat debranching enzyme, N-terminal metallophosphatase domain"
definition: >-
  Dbr1 is an RNA lariat debranching enzyme that hydrolyzes 2'-5' phosphodiester bonds at the branch points of excised intron lariats. This entry represents the N-terminal metallophosphatase domain of Dbr1. This domain belongs to the metallophosphatase (MPP) superfamily.
