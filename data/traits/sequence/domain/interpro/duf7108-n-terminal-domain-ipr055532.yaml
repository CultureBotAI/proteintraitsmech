identifier: InterPro:IPR055532
label: "DUF7108, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of the uncharacterised protein HVO_0731 from Haloferax volcanii and similar proteins from halobacteria. It has several conserved motifs RLTR/KLxR and LVxHPxEW and is predicted to adopt an α-β structure. The function of this domain is unknown.
