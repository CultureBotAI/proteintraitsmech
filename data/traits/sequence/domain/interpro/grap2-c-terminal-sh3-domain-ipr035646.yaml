identifier: InterPro:IPR035646
label: "GRAP2, C-terminal SH3 domain"
definition: >-
  GRAP2 (also called GADS) is expressed specifically in the hematopoietic system. It plays an important role in T cell receptor (TCR) signaling by promoting the formation of the SLP-76:LAT complex, which couples the TCR to the Ras pathway. It also has roles in antigen-receptor and tyrosine kinase mediated signaling. GRAP2 is unique from other GRB2-like adaptor proteins in that it can be regulated by caspase cleavage.
