identifier: InterPro:IPR005167
label: Bunyavirus glycoprotein G1
definition: >-
  Bunyavirus has three genomic segments: small (S), middle-sized (M), and large (L). The S segment encodes the nucleocapsid and a non-structural protein. The M segment codes for two glycoproteins, G1 (also known as Gc) and G2 (also known as G2), and another non-structural protein (NSm). The L segment codes for an RNA polymerase. This entry represents the polyprotein region forming the G1 glycoprotein, which is the viral attachment protein. It interacts with the G2 polyprotein ( ).
