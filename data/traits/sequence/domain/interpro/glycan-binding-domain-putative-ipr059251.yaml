identifier: InterPro:IPR059251
label: "Glycan binding domain, putative"
definition: >-
  This domain is found in uncharacterised fungal proteins. It is predicted to fold into an α/β structure with a significant similarity to domains members of Yeast killer toxin-like superfamily. This domain contains several conserved cysteine residues which similarly to other members of this superfamily are probably involved in disulfide bond formation. This domain is frequently found following SGNH hydrolase-type esterase domain .
