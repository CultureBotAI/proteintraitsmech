identifier: InterPro:IPR063624
label: "NUDT19-like, Nudix domain"
definition: >-
  This entry represents the Nudix hydrolase domain found in NUDT19 (acyl-coenzyme A diphosphatase) proteins in animals, fungi and bacteria. NUDT19 is a peroxisomal enzyme that hydrolyses fatty acyl-CoA to yield acyl-4'-phosphopantetheine and adenosine 3',5'-bisphosphate. The catalytic activity resides in the N-terminal Nudix hydrolase domain, while the protein contains a C-terminal peroxisomal targeting signal (PTS1). This domain is also found in Putative nudix hydrolase 7 from worms.
