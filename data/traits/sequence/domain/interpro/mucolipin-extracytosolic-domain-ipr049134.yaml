identifier: InterPro:IPR049134
label: "Mucolipin, extracytosolic domain"
definition: >-
  Mucolipins 1-3 are ion channel proteins that belong to the transient receptor potential (TRP) superfamily of cation channels and are the major Ca2-permeable channels on late endosomes and lysosomes (LEL). This entry represents the extracytosolic domain (ECD), which consists of two β-sheets and two extracytosolic helices that tetramerize into a ring that caps the extracytosolic side of the channel.
