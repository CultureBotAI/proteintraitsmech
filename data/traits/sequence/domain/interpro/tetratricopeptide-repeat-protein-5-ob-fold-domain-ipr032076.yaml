identifier: InterPro:IPR032076
label: "Tetratricopeptide repeat protein 5, OB fold domain"
definition: >-
  This OB fold domain is located at the C terminus of tetratricopeptide repeat protein 5 (TTC5) and is required for effective p53 response. TTC5 can activate the p53 pathway and inhibit AP-1 transcriptional activity.
