identifier: InterPro:IPR059860
label: "YopA, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of YopA, an uncharacterised protein from Bacillus subtilis. YopA is a single-pass membrane protein (gene BSU20960) derived from the SPbeta prophage in Bacillus subtilis strain 168. The protein is predicted to be localised to the cell membrane with a transmembrane helix. This domain is the third of three domains in the multi-domain protein and is associated with prophage elements. The specific function of this domain remains to be determined.
