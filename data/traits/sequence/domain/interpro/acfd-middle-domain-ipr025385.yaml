label: "AcfD, middle domain"
definition: >-
  This entry represents a middle domain of putative lipoprotein AcfD, found in bacteria. AcfD (accessory colonisation factor D) is involved in bacterial colonisation and adherence. This entry includes Putative lipoprotein YghJ.
