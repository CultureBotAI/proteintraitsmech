identifier: InterPro:IPR056677
label: "Domain of unknown function DUF7775"
definition: >-
  This domain is found in uncharacterised insect proteins mainly from clade Diptera. It is predicted to fold into a four helical bundle which shares detectable similarity to Marvel-like domains. Some proteins contain two copies of this domain. It is likely to be associated with membrane.
