identifier: InterPro:IPR009852
label: "Centromere protein J, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain found in members of the T complex protein 10 family. This domain contains unusual G repeats. Centromere protein J (also known as Centrosomal-P4.1-associated-protein, CPAP), a member of the TCP10 family, plays an important role in cell division and centrosome function by participating in centriole duplication. It inhibits microtubule nucleation from the centrosome and depolymerises taxol-stabilised microtubules. It may also be involved in the control of centriolar-microtubule growth by acting as a regulator of tubulin release. T-complex is involved in spermatogenesis in mice. This domain, also known as TCP and G-box, is essential for the tethering of pericentriolar material (PCM), the principle site for microtubule nucleation and anchoring. It adopts an extended single-layer antiparallel β-sheet configuration. Mutations in this region are associated with primary microcephaly.
