identifier: InterPro:IPR006794
label: Transcriptional activator, Zfx/Zfy domain
definition: >-
  Zfx and Zfy are transcription factors implicated in mammalian sex determination. This region is found N-terminal to multiple copies of a C2H2 Zinc finger. This region has been shown to activate transcription when fused to a GAL4 DNA binding domain.
