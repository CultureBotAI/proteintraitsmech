identifier: InterPro:IPR062619
label: "Uncharacterized protein C09G5.7, middle domain"
definition: >-
  This entry represents a domain found in uncharacterized protein C09G5.7 from Caenorhabditis elegans. C09G5.7 is expressed in adult organism and contains multiple disordered regions with compositional bias for basic, acidic, and polar residues. The complete protein shows similarity to other uncharacterised proteins and PHD-type domain-containing proteins across nematodes. The function of this domain remains to be determined. This domain contains a small helix connected to a β-sheet.
