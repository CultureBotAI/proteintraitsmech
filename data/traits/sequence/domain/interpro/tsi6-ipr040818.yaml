identifier: InterPro:IPR040818
label: Tsi6
definition: >-
  Tsi6 inhibits the NADase activity of Tse6, an integral membrane toxin from Pseudomonas aeruginosa. The Tsi6 immunity protein adopts an all-α-helical fold that binds to a surface of Tse6.
