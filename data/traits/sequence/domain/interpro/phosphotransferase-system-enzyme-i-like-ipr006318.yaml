identifier: InterPro:IPR006318
label: Phosphotransferase system, enzyme I-like
definition: >-
  Most proteins with this domain are known or deduced to function as the phosphoenolpyruvate-protein phosphotransferases (or enzyme I) of PTS sugar transport systems. Enzyme I transfers the phosphoryl group from phosphoenolpyruvate (PEP) to the phosphoryl carrier protein (HPr). This domain is also found in enzyme I-Ntr, which transfers the phosphoryl group from PEP to the phosphoryl carrier protein NPr, and is involved in regulating nitrogen metabolism, indicating that not all phosphotransferase system components are associated directly with sugar transport. In Xanthomonas campestris, FruB is a multiphosphoryl transfer protein involved in fructose transport that consists of three domains: a fructose-specific enzyme-IIA-like N-terminal domain, followed by an HPr-like domain and an enzyme-I-like C-terminal domain, represented by this entry.
