identifier: InterPro:IPR024952
label: "Lipoprotein LPP20-like domain"
definition: >-
  This entry represents a domain covering almost the full length of LPP20, which belongs to the non-essential class of lipoproteins. It is also found in close homologues, and associated to other domains in a related group of sequences that have not yet been experimentally characterised.
