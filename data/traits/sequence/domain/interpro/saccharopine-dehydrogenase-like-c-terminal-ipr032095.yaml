identifier: InterPro:IPR032095
label: "Saccharopine dehydrogenase-like, C-terminal"
definition: >-
  This entry represents the C-terminal domain of saccharopine dehydrogenase and related proteins. In some organisms this enzyme is found as a bifunctional polypeptide with lysine ketoglutarate reductase. The saccharopine dehydrogenase can also function as a saccharopine reductase.
