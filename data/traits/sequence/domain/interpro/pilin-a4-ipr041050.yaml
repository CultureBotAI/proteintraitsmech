identifier: InterPro:IPR041050
label: "Pilin A4"
definition: >-
  This domain is found in the major pilin protein PilA. PilA4 binds to PilMNO forming a complex with a well-defined platform linking the cytoplasmic PilM protein to pilus subunits in the periplasm. It is comprised of one α-helix and 4 β-sheets.
