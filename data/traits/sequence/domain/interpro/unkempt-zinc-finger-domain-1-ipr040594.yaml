identifier: InterPro:IPR040594
label: "Unkempt, zinc finger domain 1"
definition: >-
  This is a CCCH zinc finger domain found in Unkempt N-terminal region. Unkempt is an evolutionary conserved RNA-binding protein that regulates translation of its target genes and is required for the establishment of the early bipolar neuronal morphology. It carries six CCCH zinc fingers (Znfs) forming two compact clusters, Znf1-3 and Znf4-6, that recognize distinct trinucleotide RNA substrates. These clusters, recognize an unexpectedly short stretch of RNA sequence-only three consecutive ribonucleotides-with a varying degree of specificity. Znf1-3 binds to the UUA motif of RNA substrates.
