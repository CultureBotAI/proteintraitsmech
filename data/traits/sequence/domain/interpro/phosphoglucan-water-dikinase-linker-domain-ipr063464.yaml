identifier: InterPro:IPR063464
label: "Phosphoglucan water dikinase, linker domain"
definition: >-
  This entry represents a linker domain of approximately 200 residues found in phosphoglucan water dikinase (PWD/GWD3) in Viridiplantae. This domain is located between the N-terminal starch-binding CBM20 domain and the phosphohistidine domain GWD1_pHisD. PWD phosphorylates starch at the C-3 position of glucose units during starch degradation. The specific function of this linker domain remains to be determined.
