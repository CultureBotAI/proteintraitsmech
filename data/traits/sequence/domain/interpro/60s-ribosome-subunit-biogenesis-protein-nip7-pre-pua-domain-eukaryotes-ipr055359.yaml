identifier: InterPro:IPR055359
label: "60S ribosome subunit biogenesis protein Nip7, pre-PUA domain, eukaryotes"
definition: >-
  Human 60S ribosome subunit biogenesis protein NIP7 homologue (also known as KD93) is essential in the accurate processing of pre-rRNA. The overall fold of KD93 consists of two interlinked α/β domains. The C-terminal domain resembles the PUA domain of some RNA modification enzymes, especially that of archaeosine tRNA-ribosyltransferase (ArcTGT), suggesting a possible molecular function related to RNA binding. This entry represents the N-terminal, pre-PUA domain of NIP7 from eukaryotes.
