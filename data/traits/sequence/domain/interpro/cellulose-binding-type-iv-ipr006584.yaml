label: Cellulose binding, type IV
definition: >-
  This entry represents a type IV cellulose binding domain. It is a sub-domain of the carbohydrate-binding module, family 6 ( ). Regarding the function, it shows endohydrolysis of 1,4-beta-d-xylosidic linkages in xylans.
