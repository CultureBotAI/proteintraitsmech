identifier: InterPro:IPR048751
label: "Coiled-coil-domain-containing protein 138, coiled-coil"
definition: >-
  This is the coiled-coil region of coiled-coil domain-containing protein 138 (CCDC138), whose function is not yet clear. However, it has been localised to basal bodies, suggesting to play a role in centrosomal and ciliary biology.
