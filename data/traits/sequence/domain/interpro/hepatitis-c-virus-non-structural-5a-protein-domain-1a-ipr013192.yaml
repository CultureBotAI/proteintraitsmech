identifier: InterPro:IPR013192
label: Hepatitis C virus, Non-structural 5a protein, domain 1a
definition: >-
  The exact function of the Hepatitis C non-structural 5A (NS5A) protein is not known, but it is an active component of the replicase, regulates replication and modulates a range of cellular processes including innate immunity and dysregulated cell growth. NS5A is organised into three domains, labelled I, II and III. Domain I contains a zinc-binding motif and an amphipathic N-terminal helix which promotes membrane association. Mutations disrupting either the membrane anchor or zinc binding are lethal for RNA replication. This entry represents the 1a domain of NS5A. It binds zinc, which is thought to be crucial for fold maintenance and is essential for replicase function.
