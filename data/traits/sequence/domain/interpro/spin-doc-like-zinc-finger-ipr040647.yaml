identifier: InterPro:IPR040647
label: "SPIN-DOC-like, zinc-finger"
definition: >-
  This entry describes a C2H2-type zinc finger domain found in SPIN1 docking protein (SPIN-DOC), Epm2a-interacting protein 1 (Epm2aip1), and general transcription factor II-I 2A-B. SPIN-DOC regulates Spindlin1 (SPIN1) by disrupting its ability to read histone methylation marks, leading to its dissociation from chromatin. Epm2aip1, a glycogen synthase (GS)-associated protein, is involved in liver insulin sensitivity, where GS plays a key role. Proteins containing this domain are involved in transcriptional regulation and chromatin modification. They stabilise SPIN1 and enhance its binding to histone H3 trimethylated at both Lys-4 and Lys-9, and also promote poly-ADP-ribosylation following DNA damage by facilitating PARP1 activity. Family members interact with SPIN1, SPIN2A/B, SPIN3, SPIN4, TCF7L2, and PARP1, supporting a broad regulatory role in gene expression and chromatin dynamics.
