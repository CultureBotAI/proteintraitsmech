identifier: InterPro:IPR048528
label: "Lysosome-associated membrane glycoprotein 2-like, luminal domains"
definition: >-
  This domain is found in a group of animal proteins that includes Lysosome-associated membrane glycoprotein 2 from humans (Lamp2). Lamp2 is an integral membrane protein that plays an important role in chaperone-mediated autophagy (CMA), targeting pertinent proteins for lysosomal degradation. This protein is organised into two conserved luminal domains (this entry), a single transmembrane (TM) domain, and a short C-terminal cytosolic tail. It adopts a trimeric configuration.
