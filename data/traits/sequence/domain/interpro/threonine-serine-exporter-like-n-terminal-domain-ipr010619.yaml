identifier: InterPro:IPR010619
label: Threonine/serine exporter-like, N-terminal domain
definition: >-
  This entry represents a domain found in ThrE family members, found in bacteria, fungi and some archaeal species. ThrE is a family of proteins that catalyse the export of L-threonine from the cell. has been characterised as being necessary for this export. The domain exhibits 10 putative TMs and catalyses the proton-motive-force-dependent efflux of threonine and serine.
