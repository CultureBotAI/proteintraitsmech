identifier: InterPro:IPR039429
label: "Serine hydroxymethyltransferase-like domain"
definition: >-
  Proteins containing this domain include serine hydroxymethyltransferase, alpha-methylserine aldolase and fluorothreonine transaldolase. Serine hydroxymethyltransferase (SHMT) is a pyridoxal phosphate-dependent enzyme that catalyzes the reversible conversion of serine and tetrahydrofolate to glycine and methylenetetrahydrofolate. This reaction generates single carbon units for purine, thymidine, and methionine biosynthesis. It belongs to the aspartate aminotransferase superfamily (fold type I). The pyridoxal-P group is attached to a lysine residue around which the sequence is highly conserved in all forms of the enzyme. SHMT catalyses the transfer of a hydroxymethyl group from N5, N10- methylene tetrahydrofolate to glycine, resulting in the formation of serine and tetrahydrofolate. Both eukaryotic and prokaryotic SHMT enzymes form tight obligate homodimers and the mammalian enzyme forms a homotetramer. Fluorothreonine transaldolase catalyzes the final step in 4-fluorothreonine biosynthesis. It mediates a L-threonine/fluoroaceldehyde to 4-fluoro-L-threonine/acetaldehyde crossover reaction. It shares protein sequence similarity with SHMT. Alpha-methylserine aldolase catalyses the reversible interconversion of alpha-methyl-L-serine to L-alanine and formaldehyde. This enzyme also catalysed alanine racemization.
