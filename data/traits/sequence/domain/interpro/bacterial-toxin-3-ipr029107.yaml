identifier: InterPro:IPR029107
label: "Bacterial toxin 3"
definition: >-
  This entry represents a predicted RNase toxin found in bacterial polymorphic toxin systems. The toxin possesses an all-β fold and conserved aspartate, arginine, histidine and cysteine residues that is usually exported by the Photorhabdus virulence cassette (PVC)-type export system.
