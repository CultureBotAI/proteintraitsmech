identifier: InterPro:IPR037940
label: "MALT1, death domain"
definition: >-
  MALT1 (MEROPS identifier C14.026) is a paracaspase that cleaves its substrates on the C-terminal side of an arginine residue. It is a key regulator of antigen-induced NF-kappaB activation in the adaptive immune response. Upon antigen stimulation MALT1 acts as a scaffold for a protein complex formed with CARMA1 (also known as CARD11) and Bcl10, the CBM complex. The CBM complex links AgR (antigen receptor) triggering to NF-kappaB activation. This entry represents the death domain of MALT1.
