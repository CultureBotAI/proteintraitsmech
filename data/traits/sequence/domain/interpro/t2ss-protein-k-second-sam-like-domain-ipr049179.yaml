identifier: InterPro:IPR049179
label: "T2SS protein K, second SAM-like domain"
definition: >-
  This entry represents a SAM-like domain found in proteins involved in the Type II protein secretion system (T2SS), including Type II secretion system protein K from Escherichia coli. The T2SK family includes proteins such as ExeK, PulK, OutX and XcpX. They consist of three domains, two of which are arranged in tandem and share structural similarity to SAM-like domains. This entry represents the second SAM-like domain.
