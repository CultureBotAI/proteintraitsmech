identifier: InterPro:IPR048918
label: "Single-stranded-DNA-specific exonuclease RecJ, C-terminal domain, deinococcus"
definition: >-
  This domain is found at the C terminus of Single-stranded-DNA- specific exonuclease RecJ from Deinococci. This protein has four domains that form a molecule with an O-like structure. The fourth domain (this entry) binds the C-terminal region of Single-stranded DNA-binding protein to efficiently process broken DNA ends for homologous recombination.
