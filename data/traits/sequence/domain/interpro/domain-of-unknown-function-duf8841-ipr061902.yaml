label: "Domain of unknown function DUF8841"
definition: >-
  This entry represents a domain found in probable transcriptional regulators from Actinomycetota predominantly in the genus Streptomyces. These proteins contain an N-terminal helix-turn-helix DNA-binding domain followed by this domain. The function of this domain is unknown.
