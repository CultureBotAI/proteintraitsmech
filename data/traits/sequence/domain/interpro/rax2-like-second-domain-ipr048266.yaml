identifier: InterPro:IPR048266
label: "Rax2-like, second domain"
definition: >-
  Diploid yeast cells repeatedly polarise and bud from their poles, due probably to the presence of highly stable membrane markers, and Rax2 is one such marker. It is inherited immutably at the cell cortex for multiple generations, and has a half-life exceeding several generations. The persistent inheritance of cortical protein markers would provide a means of coupling a cell's history with the future development of a precise morphogenetic form. Both Rax1 and Rax2 localise to the distal pole as well as to the division site and they interact both with each other and with Bud8p and Bud9p in the establishment and/or maintenance of the cortical markers for bipolar budding. Thus Rax2 is likely to control cell polarity during vegetative growth, and in fission yeast this is done by regulating the localisation of for3p. Rax2 is not involved in responses that require a reorientation of the direction of already established hyphal growth (tropisms). This entry represents the second domain of Rax2 and Polarized growth protein L1 which are structurally similar. This domain is inserted within a β-propeller domain.
