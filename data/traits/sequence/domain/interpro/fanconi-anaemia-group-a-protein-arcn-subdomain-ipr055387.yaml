identifier: InterPro:IPR055387
label: "Fanconi anaemia group A protein, arcN subdomain"
definition: >-
  This entry represents the N-terminal half of the arc-shaped C-terminal domain of Fanconi anaemia group A protein (FANCA), named arcN, which interacts with the C-terminal half of a second FANCA molecule in a head-to-tail manner to form a pseudo-symmetric dimeric interface. The C-terminal domain of FANCA (arcN and arcC halves) consists of HEAT repeats. Fanconi anemia (FA) is a human disorder characterised by cancer susceptibility and cellular sensitivity to DNA crosslinks and other damages. The FA complex repairs the interstrand cross-linking (ICL) lesions and coordinates activities of the downstream DNA repair pathway including nucleotide excision repair, translesion synthesis, and homologous recombination. It is required for the monoubiquitylation of FANCD2 and FANCI heterodimer. The FA core complex consists of FANCA, FANCB, FANCC, FANCE, FANCF, FANCG, FANCL, FANCM, FANCT (UBET2), FAAP100 and FAAP24.
