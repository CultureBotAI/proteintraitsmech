identifier: InterPro:IPR062362
label: "Small ribosomal subunit protein uS15, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of uS15 (universal ribosomal protein S15), found in both cytoplasmic and mitochondrial forms. The domain spans approximately 56 residues and contains the RNA-binding region characteristic of the S15/NS1 superfamily. uS15 is a component of the small ribosomal subunit and functions as a structural constituent of the ribosome during protein synthesis. The mitochondrial form (uS15m) is imported into mitochondria and incorporates into the mitochondrial ribosome small subunit. This N-terminal domain is essential for RNA binding and ribosome assembly. The domain is conserved across eukaryotes.
