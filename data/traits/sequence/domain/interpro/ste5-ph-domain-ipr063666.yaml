identifier: InterPro:IPR063666
label: "STE5, PH domain"
definition: >-
  This entry represents the PH domain found in the middle region of STE5 from S.cerevisiae. STE5 is a component of the pheromone signal transduction pathway. It mediates pheromone signals acting between STE20 and STE11 and it is essential for pheromone-induced transcription of FUS1. It acts as a scaffold for each of the MAP kinases prior to signalling. The intramolecular interaction of PH and VWA domains blocks activation of the assembled signalling cascade (Ste11p, Ste7p and Fus3p).
