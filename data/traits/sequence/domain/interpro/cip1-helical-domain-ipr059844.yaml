identifier: InterPro:IPR059844
label: "CIP1, helical domain"
definition: >-
  This entry represents an α-helical domain found in CIP1 proteins. CIP1 is a cyclin-dependent kinase inhibitor that acts on the CDC28/CLN2 complex and negatively regulates the G1/S phase transition. The protein is induced by environmental stress and contributes to osmostress-induced transitory G1 delay. CIP1 localises to both cytoplasm and nucleus, with nuclear localisation occurring upon osmotic stress. This helical domain is located between disordered regions in the protein. The specific function of this helical domain remains to be determined.
