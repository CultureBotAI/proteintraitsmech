identifier: InterPro:IPR014872
label: "Dicistrovirus, capsid-polyprotein, C-terminal"
definition: >-
  This domain is found in Picornaviruses that include Cripavirus capsid proteins, (which are positive stranded ssRNA viruses) such as Cricket paralysis virus (CRPV). It forms an all β sheet structure.
