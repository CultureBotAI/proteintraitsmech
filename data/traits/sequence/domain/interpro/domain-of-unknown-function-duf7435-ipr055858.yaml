identifier: InterPro:IPR055858
label: "Domain of unknown function DUF7435"
definition: >-
  This entry represents a family of uncharacterised proteins found in Mycobacterium phages. The family members are typically around 67 amino acids in length. Structure prediction suggests these proteins form a small compact domain composed of four β-strands followed by an α-helix. The domain possibly shows weak structural similarity to integrase arm-type binding domain.
