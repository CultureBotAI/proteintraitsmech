identifier: InterPro:IPR062351
label: "Mitoshell, first helical domain"
definition: >-
  This entry represents the first helical domain in mitoshell proteins involved in male meiotic processes in insects. Mitoshell proteins are required for male meiotic cytokinesis through involvement in regulation of mitochondrial aggregation and fusion, astral spindle assembly and contractile ring formation. The specific function of this domain remains to be determined.
