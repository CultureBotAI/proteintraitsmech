identifier: InterPro:IPR028047
label: "Latrotoxin, C-terminal domain"
definition: >-
  A toxin domain present in arthropod alphaproteobacterial endosymbionts, and also at the C termini of the latrotoxins of the black widow spider. The domain is characterised by a conserved, hydrophobic helix and is predicted to associate with the cell membrane.
