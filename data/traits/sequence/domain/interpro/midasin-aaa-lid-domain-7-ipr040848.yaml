identifier: InterPro:IPR040848
label: "Midasin, AAA lid domain 7"
definition: >-
  This entry represents the α helical AAA+ lid domain that is found to the C terminus of AAA domains. This lid domain is found in midasin proteins. Midasin (MDN1, REA1) is a is a member of the AAA(+) family of ATPases. It is a nuclear chaperone required for maturation and nuclear export of pre-60S ribosome subunits.
