identifier: InterPro:IPR054729
label: "Telomere ends associated, middle domain"
definition: >-
  This entry represents a presumed domain, mostly α-helical, found near the middle region of protein telomere ends associated (Tea) found in Drosophila species and related fly sequences. Tea protects telomeres from fusion and it likely functions as a component of the MTV complex along with moi and ver. The complex binds single-stranded DNA in a sequence-independent manner and can protect it from DNA degradation.
