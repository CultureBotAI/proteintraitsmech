identifier: InterPro:IPR049370
label: "Fimbrium tip subunit Fim1C-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of the putative fimbrium tip subunit Fim1C from Parabacteroides distasonis (SwissProt: ), and similar proteins from bacteroidetes. Fim1C is thought to be a component of the fimbrium tip that plays a role on the mediation of cell adhesion and biofilm formation. This domain shows a transthyretin-like fold that contains seven core β-strands arranged in two β-sheets.
