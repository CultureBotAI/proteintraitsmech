identifier: InterPro:IPR045794
label: "Trypsin-co-occurring domain 1"
definition: >-
  Trypsin-like peptidase effector in the classical NTP-dependent ternary system (vWA-MoxR-VMAP) frequently co-occurs with one of two proteins (Trypco1 or Trypco2) which are mostly mutually exclusively. This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000703) is described by MIBiG as an example of the following biosynthetic class, saccharide, in particular the kanamycin biosynthetic gene cluster from Streptomyces kanamyceticus.
