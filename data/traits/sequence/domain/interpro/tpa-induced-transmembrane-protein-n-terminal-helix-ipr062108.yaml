identifier: InterPro:IPR062108
label: "TPA-induced transmembrane protein, N-terminal helix"
definition: >-
  This entry represents the N-terminal helix of the TPA-induced transmembrane protein (TTMP) and related proteins found in vertebrates, which is likely the transmembrane region. TTMP is a single-pass type I membrane protein that localises to the endoplasmic reticulum and cell membrane. The full-length protein has a role in LIPH-mediated synthesis of 2-acyl lysophosphatidic acid (LPA), which is necessary for hair formation and growth. TTMP is detected predominantly in the skin, with strongest expression in the inner root sheath of the hair follicle. Loss-of-function variants in TTMP cause autosomal recessive hypotrichosis (HYPT15), characterised by sparse to absent scalp and body hair. The protein is up-regulated by TPA treatment at the promoter level. The specific function of this N-terminal helical domain remains to be determined.
