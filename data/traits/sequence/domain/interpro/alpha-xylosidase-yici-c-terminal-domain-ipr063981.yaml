identifier: InterPro:IPR063981
label: "Alpha-xylosidase YicI, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of alpha-xylosidase YicI and related glycoside hydrolase family 31 enzymes . The domain comprises an antiparallel β-sandwich fold consisting of two sheets of five β-strands each. The domain shows structural similarity to carbohydrate-binding domains and may play a role in substrate binding. In YicI, this domain is positioned at the vertices of the triangular-shaped hexamer and makes its major interaction with the catalytic β-α-barrel at a conserved region.
