identifier: InterPro:IPR025940
label: Toxin SpoIISA, type II toxin-antitoxin system, C-terminal domain
definition: >-
  SpoIISA is a toxin which causes lysis of vegetatively growing cells. It forms part of a type II toxin-antitoxin system, where the SpoIISB protein acts as an antitoxin. It is a transmembrane protein, with a cytoplasmic domain accounting for approximately two-thirds of the protein. The structure of the cytoplasmic domain resembles that of the GAF domain. SpoIISB binds to the cytoplasmic domain of SpoIISA with high affinity. This entry represents the cytoplasmic domain.
