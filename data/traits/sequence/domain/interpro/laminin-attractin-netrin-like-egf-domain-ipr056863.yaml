identifier: InterPro:IPR056863
label: "Laminin/attractin/netrin-like, EGF domain"
definition: >-
  This entry represents EGF-like domains found in laminin subunits (LMN alpha, beta, gamma), attractin (ATRN), netrins (NET) and related animal proteins. ATRN is involved in the initial immune cell clustering during inflammatory response and may regulate chemotactic activity of chemokines. It may play a role in melanocortin signalling pathways that regulate energy homeostasis and hair colour. It was thought to have dipeptidase activity but it was shown later to lack that activity. Laminins are crucial for the formation of stable basement membranes and organising receptor complexes and cytoskeletal components. Netrins control guidance of central nervous system commissural axons and peripheral motor axons, serving as survival factors and regulating apoptosis.
