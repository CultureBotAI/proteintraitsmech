identifier: InterPro:IPR025261
label: "Atos-like, conserved domain"
definition: >-
  This domain is found in the central region of Drosophila Atos, its homologues from mammals, Atos homologue protein A/B (ATOSA/B, formerly known as FAM241) and S.pombe C3H8.04 (SPACC3H8.04), the orthologue of human ATOSA which, from a high-throughput knockout screening, was identified as a protein required for meiotic chromosome segregation. Atos is a transcriptional regulator that synchronizes transcriptional and translational programs to promote macrophage invasion of tissues. It induces transcriptional expression of metabolic enzymes as well as of the translational regulator pths/DDX47. With pths/DDX47, adjusts transcription and translation of a subset of OXPHOS genes to increase mitochondrial bioenergetics and allow macrophage tissue invasion.
