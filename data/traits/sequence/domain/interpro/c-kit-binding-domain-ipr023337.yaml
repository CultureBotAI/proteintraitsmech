identifier: InterPro:IPR023337
label: "c-Kit-binding domain"
definition: >-
  This entry represents the c-Kit binding domain found in metazoan Spread (Sprouty-related, EVH1 domain-containing) proteins. This domain has been shown to be necessary for Spread-1 phosphorylation and is not similar to other previously reported tyrosine kinase interacting domains, such as SH2 or c-Met binding domains. Despite being matched by this signature, Spread-3 family members contain inactive c-Kit binding domains as an arginine residue essential for c-Kit binding is mutated to glycine.
