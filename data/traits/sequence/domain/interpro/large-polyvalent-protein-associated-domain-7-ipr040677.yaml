identifier: InterPro:IPR040677
label: "Large polyvalent protein-associated domain 7"
definition: >-
  This domain contains conserved aspartate and phenylalanine residues. It is widely present in polyvalent proteins and gene neighbourhoods of conjugative elements. This domain is also known as PTox1.
