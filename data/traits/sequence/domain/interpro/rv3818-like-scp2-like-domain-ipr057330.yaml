label: "Rv3818-like, SCP2-like domain"
definition: >-
  This domain is found in the putative Rieske 2Fe-2S iron-sulfur protein Rv3818 from Mycobacterium tuberculosis and similar actinobacterial proteins. Rv3818 was identified as a high-confidence drug target. This domain is predicted to adopt an α-β configuration and is usually found associated with and .
