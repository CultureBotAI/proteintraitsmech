identifier: InterPro:IPR018993
label: FGFR1 oncogene partner (FOP), N-terminal dimerisation domain
definition: >-
  Fibroblast growth factor receptor 1 (FGFR1) oncogene partner (FOP) is a centrosomal protein that is involved in anchoring microtubules to centrosomes. This domain includes a Lis-homology motif. It forms an α-helical bundle and is involved in dimerisation.
