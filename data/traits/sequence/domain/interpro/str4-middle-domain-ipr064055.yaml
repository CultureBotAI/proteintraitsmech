identifier: InterPro:IPR064055
label: "STR4, middle domain"
definition: >-
  This entry represents the rhodanese domain found in the middle region of STR4/TROL (thylakoid rhodanese-like) proteins in land plants (Embryophyta). STR4/TROL localises to the chloroplast thylakoid membrane. The STR4/TROL protein anchors ferredoxin-NADP reductase to thylakoid membranes and is required for efficient linear electron flow. The specific function of this domain, also found in bacterial uncharacterised proteins, remains to be determined.
