identifier: InterPro:IPR007421
label: "Schlafen, AlbA_2 domain"
definition: >-
  This entry represents the AlbA clan of DNA-binding domains. This is the AlbA_2 domain from the Schlafen (SLFN) family of proteins which are important in cell differentiation and defense against viruses. This domain is present at the N-terminal of all SLFN proteins and includes the SLFN box, a sequence unique to these proteins that may form a dimer interface. The AlbA_2 domain is RNA-binding and RNase region as it contains the highly conserved catalytic glutamic acid residues.
