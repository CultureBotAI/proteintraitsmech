identifier: InterPro:IPR048390
label: "Long-tail fiber proximal subunit, trimerization domain"
definition: >-
  The long tail fibers of bacteriophage T4 consist of rigid proximal and distal parts, connected by a hinge region. The proximal half- fiber is formed by a parallel homo-trimer of the Long-tail fiber proximal subunit Gp34. This entry represents a region of the C-terminal domain, which forms a long triple β-helix made up of parallel β-strands and is responsible for trimerisation.
