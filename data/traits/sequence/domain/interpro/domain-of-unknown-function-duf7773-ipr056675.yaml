identifier: InterPro:IPR056675
label: "Domain of unknown function DUF7773"
definition: >-
  This domain is found in uncharacterised worm proteins mainly from clade Rhabditida. It contains a number of highly conserved cysteine residues that are predicted to form disulfide bonds. This domain is predicted to fold into a four-stranded antiparallel meander decorated with α-helices.
