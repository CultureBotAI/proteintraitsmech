identifier: InterPro:IPR033648
label: "AAR2, C-terminal domain"
definition: >-
  This entry consists of the C-terminal domain of eukaryotic Aar2 and Aar2-like proteins. This domain consists of 9 α-helices, 1 π-helix and 1 3(10)-helix. Aar2 is a U5 small nuclear ribonucleoprotein (snRNP) particle assembly factor and part of Prp8, which forms a large complex containing U5 snRNA, Snu114, and seven Sm proteins (B, D1, D2, D3, E, F and G). Upon import of the complex into the nucleus, Aar2 phosphorylation leads to its release from Prp8 and replacement by Brr2p, thus playing an important role in Brr2p regulation and possibly safeguarding against non-specific RNA binding to Prp8. Aar2p binds directly with the RNaseH-like domain in the C-terminal region of Prp8p. In yeast, Aar2 protein is involved in splicing pre-mRNA of the a1 cistron and other genes important for cell growth.
