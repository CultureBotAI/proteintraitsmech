identifier: InterPro:IPR015040
label: "Bcl-x interacting, BH3 domain"
definition: >-
  This domain is a long α helix, required for interaction with Bcl-x. It is found in BAM, Bim and Bcl2-like protein 11. This domain is also known as the BH3 domain between residues 146 and 161.
