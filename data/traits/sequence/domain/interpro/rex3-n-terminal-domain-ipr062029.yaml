identifier: InterPro:IPR062029
label: "REX3, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in RNA exonuclease 3 (REX3), which are 3' to 5' exoribonucleases involved in RNA processing. REX3 proteins are required for proper 3' end maturation of MRP RNA and U5L snRNA. The N-terminal domain precedes the catalytic exonuclease domain and may play a role in protein folding, substrate recognition, or regulatory functions. The domain is conserved across fungal species and is found in cytoplasmic and nuclear RNA exonucleases of the REXO1/REXO3 family. The specific function of this N-terminal domain remains to be determined.
