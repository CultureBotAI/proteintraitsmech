identifier: InterPro:IPR002942
label: RNA-binding S4 domain
definition: >-
  The S4 domain is a small domain consisting of 60-65 amino acid residues that was detected in the bacterial small ribosomal subunit protein uS4, eukaryotic ribosomal uS4 (also known as S9), two families of pseudouridine synthases, a novel family of predicted RNA methylases, a yeast protein containing a pseudouridine synthetase and a deaminase domain, bacterial tyrosyl-tRNA synthetases, and a number of uncharacterised, small proteins that may be involved in translation regulation. The S4 domain probably mediates binding to RNA.
