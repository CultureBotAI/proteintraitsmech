label: "CCR4-NOT transcription complex subunit 1, CAF1-binding domain"
definition: >-
  This is the CAF1-binding domain of CCR4-NOT transcription complex subunit 1, which is a scaffolding component of the CCR4-NOT complex. This domain adopts a MIF4G (middle portion of eIF4G) fold.
