identifier: InterPro:IPR047777
label: "LapA-like, retention module"
definition: >-
  This entry represents the N-terminal retention module found in giant adhesin LapA of Pseudomonas fluorescens, the ice-binding giant adhesin of an Antarctic bacterium and other very large repetitive proteins from proteobacteria with C-terminal regions that make them substrates for type I secretion systems.
