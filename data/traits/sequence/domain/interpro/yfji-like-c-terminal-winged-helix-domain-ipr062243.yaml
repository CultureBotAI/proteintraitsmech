identifier: InterPro:IPR062243
label: "YfjI-like, C-terminal winged helix domain"
definition: >-
  This entry represents a C-terminal winged helix-turn-helix domain found in YfjI-like proteins. The domain is approximately 60-70 residues in length and is found downstream of a DUF3987 domain ( ). In Escherichia coli K12, YfjI is encoded within the CP4-57 prophage. The family is predominantly found in Proteobacteria. The function of this domain remains to be determined.
