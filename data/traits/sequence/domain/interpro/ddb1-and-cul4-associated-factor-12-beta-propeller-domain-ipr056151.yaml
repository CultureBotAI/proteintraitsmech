identifier: InterPro:IPR056151
label: "DDB1- and CUL4-associated factor 12, beta-propeller domain"
definition: >-
  This entry represents the β-propeller domain found in DDB1- and CUL4-associated factor 12 proteins (DCAF12) as well as DCAF12-like proteins 1 and 2 (DCAF12L1 and DCAF12L2) from animals. DCAF proteins have been hypothesised to play important roles during spermatogenesis due to their high level of conservation in mammals and testis enrichment. Mutations in DCAF12L1 has only been associated to male infertility in humans but not in mice. In insects, mutations in the DCAF12 homolog impairs larval development. The function of this domain is unknown.
