identifier: InterPro:IPR002130
label: Cyclophilin-type peptidyl-prolyl cis-trans isomerase domain
definition: >-
  Cyclophilins exhibit peptidyl-prolyl cis-trans isomerase (PPIase) activity, accelerating protein folding by catalysing the cis-trans isomerisation of proline imidic peptide bonds in oligopeptides. They also have protein chaperone-like functions and are the major high-affinity binding proteins for the immunosuppressive drug cyclosporin A (CSA) in vertebrates. Cyclophilins are found in all prokaryotes and eukaryotes, and have been structurally conserved throughout evolution, implying their importance in cellular function. They share a common 109 amino acid cyclophilin-like domain (CLD) and additional domains unique to each member of the family. The CLD domain contains the PPIase activity, while the unique domains are important for selection of protein substrates and subcellular compartmentalisation. This entry represents the core β-barrel cyclophilin-like domain.
