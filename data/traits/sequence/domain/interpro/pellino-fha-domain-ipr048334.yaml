identifier: InterPro:IPR048334
label: Pellino, FHA domain
definition: >-
  Pellino proteins are E3 ubiquitin ligases that play important roles in immunity, being involved in Toll-like signalling pathways, and associate with the kinase domain of the Pelle Ser/Thr kinase. Mammalian pellinos have been shown to mediate polyubiquitination of interleukin-1 receptor-associated kinase (IRAK). They consist of a forkhead-associated (FHA) domain at the N-terminal and a RING domain at the C-terminal. This entry represents the FHA domain, which is sufficient to interact with the ubiquitination substrates, such as IRAK1. This domain contains an unusual 'wing-like' appendage.
