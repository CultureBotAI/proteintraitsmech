identifier: InterPro:IPR059974
label: "Ubiquitin carboxyl-terminal hydrolase 47, ubiquitin-like domain"
definition: >-
  This domain is found at the N-terminal of human Ubiquitin carboxyl-terminal hydrolase 47 (USP47) and similar proteins. USP47 is a ubiquitin-specific protease that specifically deubiquitinates monoubiquitinated DNA polymerase beta, playing a role in base-excision repair. It functions as a regulator of cell growth and genome integrity. This domain is predicted to adopt an ubiquitin-like fold.
