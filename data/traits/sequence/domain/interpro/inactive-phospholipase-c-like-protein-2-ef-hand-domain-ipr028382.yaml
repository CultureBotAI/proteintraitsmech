identifier: InterPro:IPR028382
label: Inactive phospholipase C-like protein 2, EF-hand domain
definition: >-
  A group of phospholipase C-related, catalytically inactive proteins have been identified as novel inositol 1,4,5-trisphosphate binding proteins with a domain organisation similar to phospholipase C-delta, but lacking the enzymatic activity. These inactive phospholipase C-like (PLCL) proteins consists of at least two types of proteins (PLCL-1 and PLCL2). Inactive phospholipase C-like protein 1 is an inositol 1,4,5-trisphosphate binding protein with a domain organisation similar to phospholipase C-delta, but lacking the enzymatic activity. It is involved in inositol phospholipid-based intracellular signaling and it is essential for the function of GABA(A) receptors. Similar to PLCL-1, PLCL-2 may be involved in both inositol 1,4,5-trisphosphate-mediated and gamma-amino butyric acid-related signaling. This entry represents the EF-hand domain of PLCL-2.
