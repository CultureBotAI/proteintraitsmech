identifier: InterPro:IPR060180
label: "Up-regulator of cell proliferation-like, N-terminal"
definition: >-
  This domain is found in functionally diverse proteins such as Up-regulator of cell proliferation (URGCP), Interferon-induced very large GTPase 1 and Caspase recruitment domain-containing protein 6. This domain is predicted to adopt an all α structure. URGCP is involved in cell cycle progression through the regulation of cyclin D1 expression. This protein is thought to play an important role in development of gastric cancer.
