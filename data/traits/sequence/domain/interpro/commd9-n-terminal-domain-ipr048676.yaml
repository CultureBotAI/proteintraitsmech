identifier: InterPro:IPR048676
label: "COMMD9, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of COMM domain-containing protein 9 from humans and similar proteins from vertebrates. COMMD9 contains a conserved and unique motif termed the COMM (copper metabolism gene MURR1, ) domain at the C-terminal, which functions as an interface for protein-protein interactions. This domain shows a globular structure that consists of a six-helix bundle with a meander topology.
