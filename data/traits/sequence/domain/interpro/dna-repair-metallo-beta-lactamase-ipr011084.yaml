identifier: InterPro:IPR011084
label: "DNA repair metallo-beta-lactamase"
definition: >-
  The metallo-beta-lactamase fold contains five sequence motifs. The first four motifs are found in and are common to all metallo-beta-lactamases. The fifth motif appears to be specific to function. This entry represents the fifth motif from metallo-beta-lactamases involved in DNA repair.
