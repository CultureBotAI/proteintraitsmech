identifier: InterPro:IPR013929
label: "RPAP1, C-terminal"
definition: >-
  This entry represents the C-terminal region that contains the motif GLHHH. This region is conserved from yeast to humans. In Saccharomyces cerevisiae (Bakers yeast), inhibition of RNA polymerase II-associated protein 1 (RPAP1) synthesis leads to global changes in gene expression that closely resemble those observed upon loss of the RNAPII subunit Rpb11. RPAP1 forms an interface between the RNA polymerase II enzyme and chaperone or scaffolding proteins, suggesting its essential role in linking RNA polymerase II to regulators involved in protein complex formation. Furthermore, it is required for the interaction of the RNA polymerase II complex with acetylated histone H3, indicating a function in the coordination between transcription and chromatin modification.
