identifier: InterPro:IPR057512
label: "RTG2, C-terminal domain"
definition: >-
  This domain is found C-terminal in the yeast Retrograde regulation protein 2 (RTG2) and related proteins. This domain shares significant similarity with known HD/PDEase domains and it is predicted to adopt similar structure. RTG2 is required for controlling the interorganelle communication between mitochondria, peroxisomes, and the nucleus.
