identifier: InterPro:IPR048729
label: "Schlafen, GTPase-like domain"
definition: >-
  This domain is found in groups II and III of Schlafen (SLFN) proteins, which follows the AlbA_2 domain ( ). In group II, this is the C-terminal domain, while in group III members it localises in the central region, followed by a C-terminal helicase domain ( ). This domain has been described as a GTPase-like domain and it contains the SLFN-specific SWADL motif. SLFN proteins are involved in the control of cell proliferation, induction of immune responses, and the regulation of viral replication. Mouse and human members are regulated by interferons. In SLFN12, this is the C-terminal domain which contains crucial residues for interaction with PDE3A. By analogy with dynamin and MxB, this domain in SLFN12 may contribute to chromatin and actin cytoskeleton interactions, involved in cell differentiation. SLFN proteins share common domains and a high degree of homology, however, they have specific and sometimes, opposing effects in some cancer types.
