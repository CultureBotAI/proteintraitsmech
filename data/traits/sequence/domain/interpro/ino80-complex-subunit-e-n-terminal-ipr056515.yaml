identifier: InterPro:IPR056515
label: "INO80 complex subunit E, N-terminal"
definition: >-
  INO80 complex subunit E (INO80E) is specific to metazoan. It is a putative regulatory component of the chromatin remodeling INO80 complex, which is involved in transcriptional regulation, DNA replication and probably DNA repair. Human INO80E is the orthologue of INO80 complex subunit 3 (Iec3) from S.pombe, however, they are represented in different models. This entry represents the helical region found at the N-terminal end.
