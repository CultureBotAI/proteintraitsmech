identifier: InterPro:IPR057036
label: "Endo-acting ulvan lyase, beta-trefoil domain"
definition: >-
  This entry represents the β-trefoil domain found in endo-acting ulvan lyase mainly found in bacteroidota. Ulvan lyases degrade the main polysaccharide component of green seaweed cell walls. This domain binds to ulvan.
