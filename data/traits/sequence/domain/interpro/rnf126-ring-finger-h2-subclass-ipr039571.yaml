identifier: InterPro:IPR039571
label: "RNF126, RING finger, H2 subclass"
definition: >-
  RNF126 is a Bag6-dependent E3 ubiquitin ligase that is involved in the mislocalized protein (MLP) pathway of quality control. It regulates the retrograde sorting of the cation-independent mannose 6-phosphate receptor (CI-MPR). Moreover, RNF126 promotes cancer cell proliferation by targeting the tumour suppressor p21 for ubiquitin-mediated degradation, and could be a novel therapeutic target in breast and prostate cancers. It is also able to ubiquitinate cytidine deaminase (AID), a poorly soluble protein that is essential for antibody diversification. In addition, RNF126 and the related protein, RNF115 associate with the epidermal growth factor receptor (EGFR) and promote ubiquitination of EGFR, suggesting they play a role in the ubiquitin-dependent sorting and downregulation of membrane receptors. RNF126 contains an N-terminal BCA2 zinc-finger domain (BZF), the AKT-phosphorylation sites, and the C-terminal C3H2C3-type RING-H2 finger. This entry represents the C3H2C3-type RING-H2 finger.
