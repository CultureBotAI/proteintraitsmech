identifier: InterPro:IPR040827
label: "Arcadin 1"
definition: >-
  Arcadin-1 is encoded by arcade gene cluster which also encodes cernactin. Crenactin is a filament-forming protein from the crenarchaeon Pyrobaculum calidifontis which shows exceptional similarity to eukaryotic F-actin. Arcadin-1 on the other hand does not seem to be related to any known eukaryotic actin binding proteins nor does it affect crenactin polymerisation.
