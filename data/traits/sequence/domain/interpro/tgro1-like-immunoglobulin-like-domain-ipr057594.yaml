label: "TgrO1-like, immunoglobulin-like domain"
definition: >-
  This immunoglobulin-like domain (Ig-like) is found twice in Tiger protein O1 from Dictyostelium discoideum (TgrO1) and similar sequences from lower eukaryotes. Its specific function is unknown.
