identifier: InterPro:IPR053883
label: "DUF3097, N-terminal domain"
definition: >-
  This entry represents a domain found at the N-terminal of a group of uncharacterised proteins mainly found in Actinomycetes. Members of this group are thought to have a nuclease function. This domain is predicted to show high structural similarity with a Tudor domain.
