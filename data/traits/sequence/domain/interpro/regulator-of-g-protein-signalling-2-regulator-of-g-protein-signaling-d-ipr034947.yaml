identifier: InterPro:IPR034947
label: "Regulator of G-protein signalling 2, regulator of G protein signaling domain"
definition: >-
  RGS2 is a member of B/R4 subfamily of RGS family, a diverse group of multifunctional proteins that regulate cellular signalling events downstream of G-protein coupled receptors (GPCRs). Signaling is initiated when GPCRs bind to their ligands, triggering the replacement of GDP bound to the G-alpha subunits of heterotrimeric G proteins with GTP. RGSs inhibit signal transduction by increasing the GTPase activity of G protein alpha subunits, thereby driving them into their inactive GDP-bound form. This activity defines them as GTPase activating proteins (GAPs). RGS2 blocks Gq-alpha mediated signalling. It lacks Gs-alpha GAP activity, but can directly inhibit the activity of several adenylyl cyclase isoforms. RGS2 is involved in the regulation of multiple G-protein linked signaling pathways. It plays a crucial role in the pathogenesis of cardiovascular diseases. This entry represents the regulator of G protein signaling (RGS) domain found in RGS2. RGS shows an all-α structure.
