identifier: InterPro:IPR049268
label: "PaaA-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of PaaA from Enterobacter agglomerans ( ), an enzyme involved in post-translational modification and host immunity. PaaA is composed of two domains: an N-terminal domain, represented in this entry, which folds into a globular domain and has similarity to RiPP precursor peptide recognition elements or RREs (PDBe: ) and a C-terminal THIF-type NAD/FAD binding fold ( ).
