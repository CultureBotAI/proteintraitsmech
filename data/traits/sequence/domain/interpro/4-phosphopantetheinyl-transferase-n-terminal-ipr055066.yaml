identifier: InterPro:IPR055066
label: "4'-phosphopantetheinyl transferase, N-terminal"
definition: >-
  This domain is found at the N-terminal end of human 4'-phosphopantetheinyl transferase (also known as L-aminoadipate-semialdehyde dehydrogenase-phosphopantetheinyl transferase, AASDHPPT), which catalyses the post-translational modification of target proteins by phosphopantetheine. This protein consists of two nearly identical domains (this entry and ) connected by a short linker region. Both domains fold into a pair of β-sheets connected by a loop region.
