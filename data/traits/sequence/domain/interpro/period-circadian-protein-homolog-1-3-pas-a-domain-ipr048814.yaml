identifier: InterPro:IPR048814
label: "Period circadian protein homolog 1-3, PAS-A domain"
definition: >-
  This domain is found in Period circadian protein homolog 1-3 from Mus musculus (Per1-3) and similar proteins predominantly found in vertebrates. This entry represents the first PAS domain (PAS-A) present in this protein. This domain shows a five-stranded antiparallel β-sheet covered on one face by α-helices. PER proteins (PER 1-3) are transcriptional repressors which form the core component of the circadian clock. They play a critical role in rhythm generation, whereas delays imposed by post-translational modifications are important for determining the period of the rhythms. The core clock genes: PER1/2/3 and CRY1/2 form the negative limb of the feedback loop and interact with the CLOCK|NPAS2-BMAL1|BMAL2 heterodimer inhibiting its activity and thereby negatively regulating their own expression.
