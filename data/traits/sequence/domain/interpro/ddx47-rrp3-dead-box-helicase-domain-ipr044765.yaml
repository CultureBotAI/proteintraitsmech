identifier: InterPro:IPR044765
label: DDX47/Rrp3, DEAD-box helicase domain
definition: >-
  This entry represents the DEAD-box helicase domain found in DDX47 from animals and Rrp3 from yeasts. This domain contains the ATP-binding region. Rrp3 is involved in rRNA processing. DDX47 (also called E4-DEAD box protein) can shuttle between the nucleus and the cytoplasm, and has an RNA-independent ATPase activity. DDX47 is involved in ribosome biogenesis.
