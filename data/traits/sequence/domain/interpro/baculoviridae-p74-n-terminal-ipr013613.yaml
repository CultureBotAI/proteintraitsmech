identifier: InterPro:IPR013613
label: "Baculoviridae p74 N-terminal"
definition: >-
  This domain is found at the N terminus of P74 occlusion-derived virus (ODV) envelope proteins which are required for oral infectivity. The envelope proteins are found in baculoviruses which are insect pathogens. The C terminus of P74 is anchored to the membrane whereas the N terminus is exposed to the virion surface. Furthermore P74 is unusual for a virus envelope protein as it lacks an N-terminal localisation signal sequence. Also see .
