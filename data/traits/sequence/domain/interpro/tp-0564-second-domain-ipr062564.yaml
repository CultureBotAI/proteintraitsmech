identifier: InterPro:IPR062564
label: "TP_0564, second domain"
definition: >-
  This entry represents an integral membrane domain of approximately 210 residues found in proteins from Spirochaetota, particularly Treponema and Spirochaeta species. The domain is named after the Treponema pallidum TP_0564 protein. This domain contains multiple transmembrane helices and is flanked by an N-terminal aminopeptidase-related domain and a C-terminal Ig-like fold domain, which are likely periplasmic. The function of this domain remains to be determined.
