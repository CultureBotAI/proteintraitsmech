identifier: InterPro:IPR047522
label: "Crossover junction endonuclease EME1, XPF-like nuclease domain, vertebrates"
definition: >-
  This entry represents the XPF-like nuclease domain of crossover junction endonuclease EME1 and similar proteins from vertebrates. This domain is a nuclease-like domain which is involved in targeting the MUS81-EME1 heterodimer complex to DNA. Crossover junction endonuclease EME1, also called MMS4 homologue (hMMS4), interacts with MUS81 to form a DNA structure-specific endonuclease with substrate preference for branched DNA structures with a 5'-end at the branch nick. Its typical substrates include 3'-flap structures, replication forks and nicked Holliday junctions. EME1 may be required in mitosis for the processing of stalled or collapsed replication forks.
