identifier: InterPro:IPR024091
label: "LnmK-like bifunctional acyltransferase/decarboxylase domain"
definition: >-
  The founding member of this family, LnmK from Streptomyces atroolivaceus, is a bifunctional enzyme that apparently carries out acyltransferase and decarboxylase reactions at the same active site. LnmK belongs to a polyketide biosynthetic gene cluster for leinamycin biosynthesis. This domain may occur in free-standing proteins such as LnmK, or in large, multidomain polyketide synthases or other contexts.
