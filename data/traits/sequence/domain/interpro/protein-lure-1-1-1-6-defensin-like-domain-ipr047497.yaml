identifier: InterPro:IPR047497
label: "Protein LURE 1.1-1.6, defensin-like domain"
definition: >-
  This entry represents the defensin-like (DEFL) domain of AtLURE1.1-1.6 and similar sequences found in Arabidopsis. This domain adopts a typical structure characterised by cysteine-stabilized α/β scaffold. LURE1.1-1.6 from Arabidopsis thaliana are pollen tube attractants guiding pollen tubes to the ovular micropyle. AtLURE1.2 attracts specifically pollen tubes from A. thaliana, but not those from A. lyrata. It triggers endocytosis of MDIS1 in the pollen tube tip.
