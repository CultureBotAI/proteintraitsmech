identifier: InterPro:IPR056224
label: "FIGL1, N-terminal domain"
definition: >-
  This domain is found N-terminal in the ATPase family AAA domain-containing protein FIGL1 from Arabidopsis thaliana and similar plant proteins. FIGL1 is involved in DNA double-strand break repair via homologous recombination (HR). This protein Limits class II meiotic crossover formation by regulating the invasion step of meiotic HR. This domain is predicted to fold into a three-helical bundle and precedes the AAA domain and separated from it via a disordered linker.
