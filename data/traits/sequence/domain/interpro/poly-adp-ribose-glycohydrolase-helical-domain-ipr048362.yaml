identifier: InterPro:IPR048362
label: "Poly (ADP-ribose) glycohydrolase, helical domain"
definition: >-
  Poly(ADP-ribose) glycohydrolase (PARG), is a ubiquitously expressed exo- and endoglycohydrolase which mediates oxidative and excitotoxic neuronal death. It catalyses hydrolysis of the O-glycosidic linkages of ADP-ribose polymers, which reverses the effects of poly(ADP-ribose). This entry represents the helical domain of PARG from animals, plants and some fungal species that precedes the PARG catalytic domain.
