identifier: InterPro:IPR062602
label: "ELG1, C-terminal domain 2"
definition: >-
  This entry represents the C-terminal domain of telomere length regulation protein ELG1. ELG1 is involved in the negative control of telomere length and in telomeric silencing through a replication-mediated pathway. The protein may have a role in Okazaki fragment maturation and is required for S-phase progression. ELG1 is a component of the RFC-like ELG1-RFC complex which appears to have a role in DNA replication, replication fork re-start, recombination and repair.
