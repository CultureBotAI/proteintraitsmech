identifier: InterPro:IPR013149
label: "Alcohol dehydrogenase-like, C-terminal"
definition: >-
  This entry represents the cofactor-binding domain in alcohol dehydrogenases, which is normally found towards the C-terminal. Structural studies indicate that it forms a classical Rossman fold that reversibly binds NAD(H). This entry also includes NADP-dependent quinone oxidoreductase ( ), an enzyme found in bacteria (gene qor), in yeast and in mammals, where, in some species such as rodents, it has been recruited as an eye lens protein and is known as zeta-crystallin. The sequence of quinone oxidoreductase is distantly related to that of other zinc-containing alcohol dehydrogenases, and it lacks the zinc-ligand residues. The torpedo fish and mammalian synaptic vesicle membrane protein vat-1 is related to qor. Other related NADP-dependent oxidoreductases are represented by this entry, such as Enoyl-[acyl-carrier-protein], probable D-xylulose and Prostaglandin reductases. Alcohol dehydrogenase ( ) (ADH) catalyses the reversible oxidation of alcohols to their corresponding acetaldehyde or ketone with the concomitant reduction of NAD: alcohol + NAD = aldehyde or ketone + NADH Currently three structurally and catalytically different types of alcohol dehydrogenases are known: Zinc-containing 'long-chain' alcohol dehydrogenases. Insect-type, or 'short-chain' alcohol dehydrogenases. Iron-containing alcohol dehydrogenases. Zinc-containing ADH's are dimeric or tetrameric enzymes that bind two atoms of zinc per subunit. One of the zinc atoms is essential for catalytic activity while the other is not. Both zinc atoms are coordinated by either cysteine or histidine residues; the catalytic zinc is coordinated by two cysteines and one histidine. Zinc-containing ADH's are found in bacteria, mammals, plants, and in fungi. In many species there is more than one isozyme (for example, hum…
