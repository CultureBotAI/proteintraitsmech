identifier: InterPro:IPR028918
label: "Tox-ART-HYE1 domain"
definition: >-
  This entry represents a domain containing characteristic histidine, tyrosine and glutamate residues that comprise the active site. It is found in a predicted toxin of the ADP-ribosyltransferase superfamily present in bacterial polymorphic toxin systems.
