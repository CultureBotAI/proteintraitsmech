identifier: InterPro:IPR060270
label: "Lipoteichoic acid synthase, N-terminal domain"
definition: >-
  This entry represents the N-terminal transmembrane domain of lipoteichoic acid synthase-like proteins. Lipoteichoic acid synthase catalyses the polymerisation of lipoteichoic acid polyglycerol phosphate and is required for staphylococcal growth and cell division. The protein contains an N-terminal transmembrane domain with five predicted transmembrane helices followed by a large extracellular catalytic domain. The N-terminal domain is proteolytically cleaved to release the catalytic domain. This domain is found in Gram-positive bacteria including Bacillus and Staphylococcus species. The specific function of this transmembrane domain remains to be determined.
