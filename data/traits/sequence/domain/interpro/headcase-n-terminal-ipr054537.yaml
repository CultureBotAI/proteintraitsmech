identifier: InterPro:IPR054537
label: "Headcase, N-terminal"
definition: >-
  This domain is found towards the N-terminal of Drosophila headcase protein and the human headcase protein homologue. Drosophila headcase protein is involved in dendrite pruning and is a branching inhibitor during tracheal development. It also promotes cell survival and niche maintenance in the Drosophila testis. Human headcase protein may play an important role in human carcinogenesis and it could be considered as an interesting therapeutic agent against Wnt-dependent tumor progression.
