identifier: InterPro:IPR054562
label: "LysX/ArgX, preATP-grasp domain"
definition: >-
  This entry represents the preATP-grasp domain found at the N-terminal of archaeal LysX and similar proteins. LysX catalyses the ATP-dependent formation of a covalent bond between the amino group of alpha-aminoadipate (AAA) and the gamma-carboxyl group of the C-terminal glutamate residue in LysW. ArgX catalyses the ATP-dependent formation of a covalent bond between the amino group of glutamate and the gamma-carboxyl group of the C-terminal glutamate residue in LysW.
