identifier: InterPro:IPR060312
label: "TP_0593-like, N-terminal domain"
definition: >-
  This entry represents the PAS domain at the N-terminal found in TP_0593, an uncharacterised protein from Treponema pallidum. TP_0593 is a 677 amino acid multi-pass membrane protein with three predicted transmembrane helices localised to the cell membrane. The protein is annotated in COG3064 and contains a disordered region. This domain is found predominantly in Spirochaetota. The function of this domain remains to be determined.
