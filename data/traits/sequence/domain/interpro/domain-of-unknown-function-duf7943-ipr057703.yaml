identifier: InterPro:IPR057703
label: "Domain of unknown function DUF7943"
definition: >-
  This domain is found in uncharacterised bacterial proteins. It is predicted to fold into an alpha- helical bundle. This domain is found in the hypothetical protein ESA_00282 from Cronobacter sakazakii that plays a significant role in biofilm formation and bacterial adhesion. This protein contributes to the adhesion of C. sakazakii to biotic surfaces, such as intestinal epithelial cells and play a role in the pathogenesis.
