identifier: InterPro:IPR030259
label: "Chloride intracellular channel protein 1, C-terminal domain"
definition: >-
  This entry represents the C-terminal, α-helical domain of CLIC1. Intracellular chloride ion channel proteins (CLICs) has been shown to exist in both soluble and integral membrane forms. Chloride intracellular channel protein 1 (CLIC1) can insert into membranes and form chloride ion channels. Membrane insertion seems to be redox-regulated and may occur only under oxydising conditions. Channel activity has been shown to have a strong pH dependence. The soluble form of CLIC1 is monomeric and structurally homologous to the glutathione S-transferase superfamily, with a redox-active site resembling glutaredoxin. CLIC1 (also known as NCC27) is involved in regulation of the cell cycle.
