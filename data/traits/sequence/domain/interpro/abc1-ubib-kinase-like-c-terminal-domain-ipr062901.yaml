identifier: InterPro:IPR062901
label: "ABC1/UbiB kinase-like, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain of approximately 70 residues found in bacterial ABC1/UbiB family proteins. This domain is always located C-terminal to an ABC1 kinase-like domain and frequently also follows a UbiB helical domain. ABC1/UbiB proteins are atypical protein kinases involved in ubiquinone (coenzyme Q) biosynthesis, catalysing modification reactions on prenylated molecules rather than phosphorylating protein substrates. The specific function of this domain remains to be determined.
