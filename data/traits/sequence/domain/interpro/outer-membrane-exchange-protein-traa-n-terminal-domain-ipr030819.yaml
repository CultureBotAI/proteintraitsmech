identifier: InterPro:IPR030819
label: "Outer membrane exchange protein TraA, N-terminal domain"
definition: >-
  In Myxococcus xanthus, the TraA (MXAN_6895) and TraB (MXAN_6898) proteins (encoded within the traAB operon) serve as a bacterial transfer system required for contact-dependent exchange of outer membrane proteins. They are required in both donor and recipient cells. This entry represents the N-terminal domain of TraA. This domain is suggested to be similar to the PA14 domain ( ); the processed PA14 domain may serve as a receptor for ligand binding.
