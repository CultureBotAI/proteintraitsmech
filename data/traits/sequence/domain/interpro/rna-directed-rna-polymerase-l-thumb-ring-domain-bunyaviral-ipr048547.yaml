identifier: InterPro:IPR048547
label: "RNA-directed RNA polymerase L, thumb ring domain, bunyaviral"
definition: >-
  This entry represents the thumb ring domain of RNA-directed RNA polymerase L from Bunyavirus La Crosse (L) ( , ) and similar sequences from Bunyavirales. This domain adopts an α/β structure that is structurally similar to the influenza PB2 N1 and N2 domains.
