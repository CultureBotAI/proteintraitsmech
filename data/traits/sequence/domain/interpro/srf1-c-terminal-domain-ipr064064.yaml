identifier: InterPro:IPR064064
label: "SRF1, C-terminal domain"
definition: >-
  This entry represents a C-terminal helical domain found in SRF1 (SPO14 regulatory factor 1) and related proteins in fungi. SRF1 is a regulator of phospholipase D in Saccharomyces cerevisiae. The function of this domain remains to be determined.
