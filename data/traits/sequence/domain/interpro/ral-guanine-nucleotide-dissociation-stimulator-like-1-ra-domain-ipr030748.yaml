identifier: InterPro:IPR030748
label: "Ral guanine nucleotide dissociation stimulator-like 1, RA domain"
definition: >-
  RalGDS family members can act both as Ras effectors and as guanine nucleotide exchange factors (GEFs) for Ral. They act downstream of Ras and bind to the GTP-bound active form of Ras or Ras family members. They also promote the GDP to GTP exchange for Ral small GTPase, member of the Ras family. Due to their double action, the RalGDS proteins bridge Ras and Ral. RGL1 (RalGDS-like 1) belongs to the Ral GDP dissociation stimulator (RalGDS) family. It is a binding partner for small G-proteins. The function of RGL1 is not clear. This entry represents the RA domain found at the C-terminal end of RGL1. It has a β-grasp ubiquitin-like fold.
