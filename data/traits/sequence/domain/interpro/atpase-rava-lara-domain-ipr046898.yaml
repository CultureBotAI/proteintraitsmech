identifier: InterPro:IPR046898
label: "ATPase RavA, LARA domain"
definition: >-
  This entry represents the LARA (LdcI Associating domain of RavA) domain of bacterial regulatory ATPase RavA (Regulatory ATPase variant A). It adopts an unique fold which consists of a compact antiparallel β-barrel-like structure formed by six β-strands and one α-helix. This domain mediates the interaction between RavA and LdcI (inducible lysine decarboxylase) which form a cage-like complex proposed to assist assembly of specific respiratory complexes in E. coli.
