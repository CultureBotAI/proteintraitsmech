identifier: InterPro:IPR058800
label: "KKT2/KKT3, zinc finger domain"
definition: >-
  This domain is found centrally in the Kinetoplastid kinetochore proteins KKT2 and KKT3 and related proteins. It plays a critical role in mediating the centromere localisation of KKT2 and KKT3.
