identifier: InterPro:IPR041624
label: "Rhamnogalacturonan I lyase beta-sheet domain"
definition: >-
  This is the β-sheet domain found in rhamnogalacturonan (RG) lyases, which are responsible for an initial cleavage of the RG type I (RG-I) region of plant cell wall pectin. Polysaccharide lyase family 11 carrying this domain, such as YesW ( ) and YesX ( ), cleave glycoside bonds between rhamnose and galacturonic acid residues in RG-I through a beta-elimination reaction.
