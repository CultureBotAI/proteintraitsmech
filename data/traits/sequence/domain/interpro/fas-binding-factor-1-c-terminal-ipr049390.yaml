identifier: InterPro:IPR049390
label: "Fas-binding factor 1, C-terminal"
definition: >-
  This entry represents a domain found at the C-terminal end of human Fas-binding factor 1 (FBF1) and similar animal sequences. FBF1 is a keratin-binding protein required for epithelial cell polarisation. It is involved in apical junction complex (AJC) assembly via its interaction with PARD3 and required for ciliogenesis. Intraflagellar transport (IFT) machinery is required for the assembly and maintenance of cilia. Fas-binding factor 1 (FBF1) is a transition fibre protein required for the ciliary import of assembled IFT particles at the ciliary base. FBF1, also known as albatross, has also being shown to be involved in regulating polarization in epithelial cells.
