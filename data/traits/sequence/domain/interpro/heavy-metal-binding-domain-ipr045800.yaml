identifier: InterPro:IPR045800
label: Heavy metal binding domain
definition: >-
  This entry represents a metal-binding domain found in single or multiple copies at the N-terminal region of a wide variety of copper or other heavy metal binding transporters and other proteins predominantly found in bacteria. Some members of this entry are: Cation efflux system protein CusB from Escherichia coli, which mediates resistance to copper and silver. Copper-exporting P-type ATPase from Legionella pneumophila, which couples the hydrolysis of ATP with the export of copper. Silver exporting P-type ATPase SilB/P from Salmonella typhimurium, a component of the silver cation-efflux system that confers resistance to silver.
