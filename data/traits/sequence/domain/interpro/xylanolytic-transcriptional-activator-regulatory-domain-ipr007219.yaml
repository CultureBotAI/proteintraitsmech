identifier: InterPro:IPR007219
label: Xylanolytic transcriptional activator, regulatory domain
definition: >-
  This domain is present in the large family of fungal zinc cluster transcription factors that contain an N-terminal GAL4-like C6 zinc binuclear cluster DNA-binding domain, including Xylanolytic transcriptional activator (XnlR) and related transcriptional factors. It has been suggested that this region plays a regulatory role and it is between the DNA-binding domain and the C-terminal acidic region. XlnR is involved in the regulation of extracellular cellulolytic and xylanolytic genes and in the regulation of the intracellular activities of D-xylose catabolic genes in the pentose catabolic pathway (PCP) in response to the presence of D-xylose.
