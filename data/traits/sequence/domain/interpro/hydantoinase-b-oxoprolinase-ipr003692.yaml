identifier: InterPro:IPR003692
label: Hydantoinase B/oxoprolinase
definition: >-
  An appreciable fraction of the sulphur present in mammals occurs in the form of glutathione. The synthesis of glutathione and its utilization take place by the reactions of the gamma-glutamyl cycle, which include those catalysed by gamma-glutamylcysteine and glutathione synthetases, gamma-glutamyl transpeptidase, cysteinylglycinase, gamma-glutamyl cyclotransferease, and 5-oxoprolinase. This domain is found in N-methylhydantoinase B, which converts hydantoin to N-carbamyl-amino acids, and in 5-oxoprolinase which catalyses the formation of L-glutamate from 5-oxo-L-proline. These enzymes are part of the oxoprolinase family.
