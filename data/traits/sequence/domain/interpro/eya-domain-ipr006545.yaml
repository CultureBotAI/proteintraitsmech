identifier: InterPro:IPR006545
label: EYA domain
definition: >-
  The Eyes absent proteins are members of a conserved regulatory network implicated in the development of the eye, muscle, kidney and ear. Eyes absent is a nuclear transcription factor, acting through interaction with homeodomain-containing Sine oculis (also known as Six) proteins. Eyes absent is also a protein tyrosine phosphatase, It does not resemble the classical tyrosine phosphatases that use cysteine as a nucleophile and proceed by means of a thiol-phosphate intermediate. Rather, Eyes absent is the prototype for a class of protein tyrosine phosphatases that use a nucleophilic aspartic acid in a metal-dependent reaction. Furthermore, the phosphatase activity of Eyes absent contributes to its ability to induce eye formation in drosophila. Thus, Eyes absent belongs to the phosphatase subgroup of the haloacid dehalogenase (HAD) superfamily and appears to act as a nuclear transcriptional coactivator with intrinsic phosphatase activity. The Eyes absent proteins contain a divergent 200-300 residue long N-terminal region and a conserved C-terminal domain of approximately 270 residues, the EYA domain, which is critical for activity and believed to participate in protein-protein interactions.
