identifier: InterPro:IPR000555
label: JAB1/MPN/MOV34 metalloenzyme domain
definition: >-
  This domain is known as the MPN domain, PAD-1-like domain, JABP1 domain or JAMM domain. Proteins with this domain include proteasome regulatory subunits, eukaryotic initiation factor 3 (eIF3) subunits and regulators of transcription factors. They are metalloenzymes that function as the ubiquitin isopeptidase/deubiquitinase in the ubiquitin-based signalling and protein turnover pathways in eukaryotes. Versions of the domain in prokaryotic cognates of the ubiquitin-modification pathway are predicted to have a similar role. The archaeal (H. volcanii) JAMM domain containing protein, HvJAMM1, cleaves ubiquitin-like small archaeal modifier proteins (SAMP1/2) from protein conjugates. The bacterial JAMM domain containing protein QbsD from Pseudomonas fluorescens cleaves the C-terminal amino acid residues of the sulfur carrier protein QbsE prior to the formation of the carboxy-terminal thiocarboxylate.
