identifier: InterPro:IPR043630
label: "Sgo0707, N-terminal domain"
definition: >-
  This entry represents a domain that is found at the N terminus of the bacterial cell surface Sgo0707 protein. This domain is called the N1 domain and is involved in host colonisation. The N1 domain comprises a putative binding cleft with a single cysteine located in its centre and exhibits an unexpected structural similarity to the variable domains of the streptococcal Antigen I/II adhesins.
