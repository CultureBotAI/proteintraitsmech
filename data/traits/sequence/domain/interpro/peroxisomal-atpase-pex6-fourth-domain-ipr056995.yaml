identifier: InterPro:IPR056995
label: "Peroxisomal ATPase PEX6, fourth domain"
definition: >-
  This domain is found in the yeast Peroxisomal ATPase PEX6 and related fungal proteins. PEX6 is a component of the PEX1-PEX6 AAA ATPase complex, a protein dislocase complex that mediates the ATP-dependent extraction of the PEX5 receptor from peroxisomal membranes, an essential step for PEX5 recycling. The domain represented in this entry is predicted to adopt a globular structure with some topological similarity to AAA ATPase p97.
