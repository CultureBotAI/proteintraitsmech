identifier: InterPro:IPR063694
label: "SET-binding protein/ASH1L"
definition: >-
  This entry includes SET-binding protein (SETBP1) and its paralogue Histone-lysine N-methyltransferase ASH1L. These proteins are found in vertebrates and other metazoans and are predicted to enable histone H3K4 methyltransferase activity. They may be involved in regulation of DNA-templated transcription. This entry covers the full length of SETBP1, a nuclear protein that interacts with SET and is implicated in myeloid malignancies. This entry represents the N-terminal disordered region in ASH1L which is a histone methyltransferase involved in H3K36 trimethylation.
