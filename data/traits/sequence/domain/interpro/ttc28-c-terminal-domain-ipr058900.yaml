identifier: InterPro:IPR058900
label: "TTC28, C-terminal domain"
definition: >-
  This domain is found towards the C-terminal end of human Tetratricopeptide repeat protein 28 (TTC28) and similar sequences mainly found in animals. TTC28 may be involved in the condensation of spindle midzone microtubules during mitosis, leading to the formation of midbody. This domain is predicted to show an α-β configuration.
