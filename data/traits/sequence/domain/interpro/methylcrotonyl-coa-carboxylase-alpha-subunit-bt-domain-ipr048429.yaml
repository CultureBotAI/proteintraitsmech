identifier: InterPro:IPR048429
label: "Methylcrotonyl-CoA carboxylase, alpha-subunit, BT domain"
definition: >-
  This entry represents a domain found in the Biotin-dependent 3-methylcrotonyl-coenzyme A carboxylase alpha1 subunit (AccA1) from Mycobacterium tuberculosis, the biotin-containing alpha subunit of 3-methylcrotonyl-CoA carboxylase (MCC) from Pseudomonas aeruginosa and in similar bacterial proteins. AccA1 is a component of a biotin-dependent acyl-CoA carboxylase complex. This subunit catalyses the ATP-dependent carboxylation of the biotin carried by the biotin carboxyl carrier (BCC) domain, resulting in the formation of carboxyl biotin. 3-Methylcrotonyl-CoA carboxylase (MCC) is essential for the metabolism of leucine, and is also involved in terpenoid metabolism. The alpha subunit contains the N-terminal biotin carboxylase (BC), the C-terminal biotin carboxyl carrier protein (BCCP) domains, and a domain that mediates BC-CT interactions (BT domain, this entry). This domain shows a central α-helix surrounded by a seven-stranded, highly-twisted anti-parallel β-sheet, with an overall structure that has great similarity with the β-barrel of the BT domain of the human MCC.
