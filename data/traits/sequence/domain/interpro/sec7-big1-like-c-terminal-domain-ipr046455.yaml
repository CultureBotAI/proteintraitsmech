identifier: InterPro:IPR046455
label: "Sec7/BIG1-like, C-terminal domain"
definition: >-
  This is the C-terminal domain of Sec7 and BIG1-like proteins (brefeldin A-inhibited guanine nucleotide-exchange protein). In Sec7, it has been described as HDS4 (homology downstream of Sec7) which mediates Sec7 dimerization.
