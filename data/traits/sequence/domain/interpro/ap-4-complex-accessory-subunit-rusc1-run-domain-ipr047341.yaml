identifier: InterPro:IPR047341
label: "AP-4 complex accessory subunit RUSC1, RUN domain"
definition: >-
  This entry represents the RUN domain of RUSC1 and similar proteins from vertebrates. AP-4 complex accessory subunit RUSC1, also called RUN and SH3 domain-containing protein 1, may act as a signaling adapter that translocates to the nuclear envelope and regulates neurotrophin-induced neurite outgrowth.
