identifier: InterPro:IPR047037
label: "Secretin receptor, 7TM"
definition: >-
  The secretin-like GPCRs include secretin, calcitonin, parathyroid hormone/parathyroid hormone-related peptides and vasoactive intestinal peptide, all of which activate adenylyl cyclase and the phosphatidyl-inositol-calcium pathway. These receptors contain seven transmembrane regions, in a manner reminiscent of the rhodopsins and other receptors believed to interact with G-proteins (however there is no significant sequence identity between these families, the secretin-like receptors thus bear their own unique '7TM' signature). Their N-terminal is probably located on the extracellular side of the membrane and potentially glycosylated. This N-terminal region contains a long conserved region which allows the binding of large peptidic ligand such as glucagon, secretin, VIP and PACAP; this region contains five conserved cysteines residues which could be involved in disulphide bond. The C-terminal region of these receptor is probably cytoplasmic. Every receptor gene in this family is encoded on multiple exons, and several of these genes are alternatively spliced to yield functionally distinct products. Secretin is a polypeptide secreted by entero-endocrine S cells in the small intestine, is involved in maintaining body fluid balance. This polypeptide regulates the secretion of bile and bicarbonate into the duodenum from the pancreatic and biliary ducts, as well as regulates the duodenal pH by the control of gastric acid secretion. In addition to regulating the pH of the duodenal content, secretin plays a central role in diet induced thermogenesis: acts as a non-sympathetic brown fat (BAT) activator mediating prandial thermogenesis, which consequently induces satiation. Studies with secretin receptor-null mice indicate that secretin plays a role in regulating renal water reabs…
