identifier: InterPro:IPR034007
label: "C-type lectin-like domain, bacterial"
definition: >-
  This is a bacterial subgroup of the C-type lectin-like (CTLD) domain, a subgroup of bacterial protein domains homologous to the carbohydrate-recognition domains (CRDs) of the C-type lectins. Many CTLDs are calcium-dependent carbohydrate-binding modules; other CTLDs bind protein ligands, lipids, and inorganic surfaces, including CaCO3 and ice. Bacterial CTLDs within this group are functionally uncharacterised. Animal C-type lectins are involved in such functions as extracellular matrix organisation, endocytosis, complement activation, pathogen recognition, and cell-cell interactions. CTLDs may bind a variety of carbohydrate ligands, including mannose, N-acetylglucosamine, galactose, N-acetylgalactosamine, and fucose. CTLDs associate with each other through several different surfaces to form dimers, trimers, or tetramers from which ligand-binding sites project in different orientations. In some CTLDs a loop extends to the adjoining domain to form a loop-swapped dimer.
