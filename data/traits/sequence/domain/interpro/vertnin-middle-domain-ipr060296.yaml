identifier: InterPro:IPR060296
label: "Vertnin, middle domain"
definition: >-
  This entry represents the middle domain of Vertnin, a transcription factor found in vertebrates. While the full-length protein has established roles in vertebral development and transcriptional regulation, the specific function of this middle domain remains to be determined. Vertnin protein regulates development of thoracic vertebrae and functions as a transcriptional repressor that modulates gene expression during embryonic patterning. Vertnin localises to the nucleus and is highly expressed during early embryonic development.
