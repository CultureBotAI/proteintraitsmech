identifier: InterPro:IPR047857
label: "Snurportin-1, m3G cap-binding domain"
definition: >-
  Snurportin-1 (SPN1 or SNUPN) is a nuclear import adaptor for m3G-capped spliceosomal U small nucleoproteins (snRNPs), which are assembled in the cytoplasm. After capping and assembly, the U snRNPs are transported into the nucleus by SPN1 and importin beta; SPN1 is then returned to the cytoplasm by exportin 1 (CRM1), which also transports the non-capped U snRNPs. The U snRNPs are essential elements of the spliceosome, which catalyses the excision of introns and the ligation of exons to form a mature mRNA. SPN1 contains two domains, an N-terminal importin beta-binding (IBB) domain and a C-terminal m3G cap-binding domain, which is represented in this entry.
