identifier: InterPro:IPR054348
label: "Protein M, C-terminal"
definition: >-
  This domain is found in proteins from Mycoplasmaceae, including Uncharacterized protein MG281 from Mycoplasma genitalium, also known as protein M. This virulence protein consists of two domains and N- and C-terminal fragments. This entry represents the C-terminal region, which is probably disordered.
