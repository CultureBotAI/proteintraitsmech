identifier: InterPro:IPR011969
label: "Clan AA aspartic peptidase, C-terminal"
definition: >-
  Proteins containing this domain are aspartic endopeptidases belonging to MEROPS family A32 and MEROPS clan AA (from conservation of the DTG motif that include the active site aspartic acid and the fold which is similar to retropepsin). This entry describes the well-conserved C-terminal domain, of approximately 120 amino acid residues. The poorly conserved, variable length N-terminal region usually contains a predicted transmembrane helix. In the peptidase from Rickettsia conorii , the active site Asp has been identified by site-directed mutagenesis and the protein is active only as a homodimer. Aspartic peptidases, also known as aspartyl proteases ([ec:3.4.23.-]), are widely distributed proteolytic enzymes known to exist in vertebrates, fungi, plants, protozoa, bacteria, archaea, retroviruses and some plant viruses. All known aspartic peptidases are endopeptidases. A water molecule, activated by two aspartic acid residues, acts as the nucleophile in catalysis. Aspartic peptidases can be grouped into five clans, each of which shows a unique structural fold. Peptidases in clan AA are either bilobed (family A1 or the pepsin family) or are a homodimer (all other families in the clan, including retropepsin from HIV-1/AIDS). Each lobe consists of a single domain with a closed β-barrel and each lobe contributes one Asp to form the active site. Most peptidases in the clan are inhibited by the naturally occurring small-molecule inhibitor pepstatin. Clan AC contains the single family A8: the signal peptidase 2 family. Members of the family are found in all bacteria. Signal peptidase 2 processes the premurein precursor, removing the signal peptide. The peptidase has four transmembrane domains and the active site is on the periplasmic side of the cell membrane. Cleavage occurs on…
