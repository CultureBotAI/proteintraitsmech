identifier: InterPro:IPR025682
label: "CpXC domain"
definition: >-
  This presumed domain is functionally uncharacterised. This domain is found mainly in bacterial proteins, and is typically between 122 and 134 amino acids in length. It contains four conserved cysteines forming two CpXC motifs.
