identifier: InterPro:IPR018805
label: "Cell wall protein YJL171C/Tos1, C-terminal"
definition: >-
  This entry represents a domain found in a group of fungal cell wall proteins, including Probable circularly permuted 1,3-beta-glucanase Tos1 and YJL171C from budding yeasts. They contain 5 highly conserved cysteines, two of which form a characteristic CGC sequence motif. This proteins are related to glycosyl hydrolases.
