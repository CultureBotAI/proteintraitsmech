identifier: InterPro:IPR051620
label: "ORF904-like, C-terminal domain"
definition: >-
  This family represents a novel class of multifunctional replicative enzymes that combine ATPase, primase and DNA polymerase activities within a single polypeptide chain. ORF904 from Sulfolobus islandicus plasmid pRN1 demonstrates all three enzymatic activities and is essential for autonomous plasmid replication. Proteins in this family are characterised by the presence of three distinct functional domains: an N-terminal region containing primase and DNA polymerase activities with sequence similarity to family X DNA polymerases and archaeal primases, and a C-terminal region harbouring ATPase activity with a conserved Walker A motif (A/G X4GK S/T) essential for nucleotide binding and ATP hydrolysis. The DNA polymerase domain shows preference for double-stranded DNA templates and demonstrates processive synthesis, while the primase domain synthesises short RNA primers on single-stranded DNA templates. The ATPase domain exhibits DNA-dependent ATP hydrolysis activity. This unique domain architecture allows a single protein to perform multiple essential replication functions typically distributed among separate enzymes in larger replicons, representing an evolutionary adaptation to the constraints of small genetic elements.
