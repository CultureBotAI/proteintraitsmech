identifier: InterPro:IPR013871
label: "Cysteine-rich secretory protein"
definition: >-
  This entry is found on Crisp proteins which contain and has been termed the Crisp domain. It is found in the mammalian reproductive tract and the venom of reptiles, and has been shown to regulate ryanodine receptor Ca2+ signalling. It contains 10 conserved cysteines which are all involved in disulphide bonds and is structurally related to the ion channel inhibitor toxins BgK and ShK.
