identifier: InterPro:IPR048894
label: "Infectious salmon anemia virus nucleoprotein, C-terminal"
definition: >-
  This entry represents a domain found in the nucleoprotein from the orthomyxovirus Infectious salmon anemia virus. This protein is similar to that in Influenza virus and consists of a head and a body domain. This entry represents the tail loop which plays a role in oligomerisation. It folds into an extended β-hairpin that protrudes into a deep pocket in a neighbouring subunit to mediate dimer formation.
