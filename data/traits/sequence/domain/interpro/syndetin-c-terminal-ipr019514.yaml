identifier: InterPro:IPR019514
label: "Syndetin, C-terminal"
definition: >-
  The function of this domain is not known, but it is found at the C terminus of syndetin (VPS50), a unique component of the endosome-associated retrograde protein (EARP) complex. The EARP complex otherwise shares four of its five subunits with the Golgi-associated retrograde protein (GARP) complex. The EARP complex is localized to recycling endosomes where it acts as a tethering complex for recycling of plasma membrane receptors.
