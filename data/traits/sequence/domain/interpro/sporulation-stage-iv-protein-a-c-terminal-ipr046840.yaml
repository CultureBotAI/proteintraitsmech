identifier: InterPro:IPR046840
label: "Sporulation stage IV protein A, C-terminal"
definition: >-
  The stage IV sporulation protein A is an ATPase that has a role at an early stage in the morphogenesis of the spore coat and is required for proper coat localisation to the forespore. A comparative genome analysis of all sequenced genomes of Firmicutes shows that the proteins are strictly conserved among the sub-set of endospore-forming species. This protein contains an ATPase domain at the N-terminal, a structural middle domain and a C-terminal domain that is key for targeting SpoIVA to the outer forespore membrane. This entry represents the C-terminal domain of SpoIVA, which plays a key role in targeting the protein to the outer forespore membrane, in particular the five hydrophobic residues at the extreme C-terminal are essential for this function. Structure predictions suggest that it has three conserved α-helices followed by a β-hairpin.
