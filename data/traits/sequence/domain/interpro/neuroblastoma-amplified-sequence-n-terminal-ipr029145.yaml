identifier: InterPro:IPR029145
label: "Neuroblastoma-amplified sequence, N-terminal"
definition: >-
  This entry represents the N-terminal domain of the neuroblastoma-amplified sequence (NBAS). This domain can also be found at the N terminus of several WD40-containing proteins. NBAS from human is over-expressed in neuroblastoma cells.
