identifier: InterPro:IPR034202
label: "Subtilisin Carlsberg-like catalytic domain"
definition: >-
  This entry includes prokaryote proteins with a subtilisin-like domain. Subtilisin is a serine endopeptidase in peptidase family S8, subfamily S8A. Characterised peptidases in this entry include subtilisin Carlsberg (S08.001), TK-subtilisin (S08.129), subtilisin PB92 (S08.003) and subtilisin BPN' (S08.034). TK-subtilisin is secreted from the hyperthermophilic archaeon Thermococcus kodakaraensis as an inactive precursor. TK-subtilisin matures from pro-TK-subtilisin upon autoprocessing and degradation of the propeptide. Unlike other subtilisins, the folding of the unprocessed form of pro-TK-subtilisin is induced by Ca 2+ binding, which is almost completed prior to autoprocessing. Ca 2+ is required for activity, unlike the bacterial subtilisins. The propeptide is not required for folding of the mature domain, unlike the bacterial subtilases, because of the stability produced from Ca 2+ binding. Subtilisin BPN'/Novo is extremely similar in structure to subtilisin Carlsberg, though it has a 30% difference in amino acid sequence. The substrate binding regions are also similar, and two possible Ca 2+ binding sites have been identified. Subtilisin Carlsberg possesses the highest commercial importance as a proteolytic additive for detergents. Subtilisin Pb92, the serine protease from the alkalophilic Bacillus strain PB92, also contains two calcium ions and the overall folding of the polypeptide chain closely resembles that of the subtilisins. The subtilisin family is one of the largest serine peptidase families characterised to date. Over 200 subtilisins are presently known, more than 170 of which have their complete amino acid sequence. It is widespread, being found in eubacteria, archaebacteria, eukaryotes and viruses. The vast majority of the family are endopeptidases, althou…
