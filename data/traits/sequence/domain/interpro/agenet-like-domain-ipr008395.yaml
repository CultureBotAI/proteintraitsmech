identifier: InterPro:IPR008395
label: "Agenet-like domain"
definition: >-
  Fragile X messenger ribonucleoprotein 1 (FMR1/FMRP), and its autosomal paralogues, RNA-binding proteins FXR1/2 (Fragile X-related protein 1/2), comprise a family of RNA-binding proteins that are involved the regulation of alternative mRNA splicing, mRNA stability, mRNA dendritic transport and postsynaptic local protein synthesis of a subset of mRNAs, playing a crucial role in neuronal development and synaptic plasticity. These proteins are highly similar to one another and also retain highly conserved domain architecture. The three ribonucleoprotein K homology (KH) domains and the cluster of arginine and glycine residues that constitute the RGG box, comprise a large region that is important for RNA binding and polyribosome association. In addition, two Agenet-like domains exist in tandem within the N-terminal regions of FMRP family proteins. The Agenet-like domain belongs to the "Royal" domain superfamily which contains also the Tudor, chromo, MBT, PWWP and plant Agenet domains. Biochemical analysis of the tandem Agenet-like domains reveals their ability to preferentially recognise trimethylated peptides in a sequence-specific manner. The Tudor/Agenet-like domain folds into a bent four-stranded antiparallel β-sheet with a fifth strand closing the cavity of the sheet, similar to a thumb across a semiclosed hand. This domain is also found plant proteins, such as AGDP1 from Arabidopsis, which is required for transcriptional silencing, non-CG DNA methylation and H3K9 dimethylation (H3K9me2) at some loci. It preferentially occupies long transposons and specifically recognizes the histone H3 'Lys-9' methylation (H3K9me) marks, with a stronger affinity for dimethylated H3K9 (H3K9me2). Plant DUF724 domain-containing proteins are also members of this entry, and they may be invo…
