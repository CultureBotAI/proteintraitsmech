identifier: InterPro:IPR018620
label: "Ubiquitin 3 binding protein But2, C-terminal"
definition: >-
  This entry represents the C-terminal domain of ubiquitin 3 binding proteins (But2). But2 is conserved in yeasts. It binds to Uba3 and is involved in the NEDD8 signalling pathway. This entyr also includes the C-terminal domain in Small cysteine-rich protein 1 (scp1) and related uncharacterised but2-like proteins. Scp1 is a putative secreted effector that affects plant immune responses. In some members this domain can be found next to .
