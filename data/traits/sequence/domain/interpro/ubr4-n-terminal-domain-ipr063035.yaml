identifier: InterPro:IPR063035
label: "UBR4, N-terminal domain"
definition: >-
  This domain is found at the N terminus of the E4 ubiquitin-protein ligase UBR4 from Caenorhabditis elegans and related proteins. This domain is composed of α-helical ARM repeats and is involved in a dimer formation.
