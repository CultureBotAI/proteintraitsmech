identifier: InterPro:IPR061511
label: "Zinc-binding protein AdcA, N-terminal domain"
definition: >-
  This entry represents a domain found in at the N-terminal end of Zinc-binding protein AdcA from Streptococcus pyogenes and Zinc-binding lipoprotein AdcA from Streptococcus pneumoniae, and covering the whole protein sequence of the homologue in Bacillus subtilis High-affinity zinc uptake system protein ZnuA. AdcA has been shown to function in the ATP-binding cassette (ABC) uptake of Zn2+ and Mn2+ and in competence for genetic transformation and adhesion. It belongs to the TroA superfamily of helical backbone metal receptor proteins that share a distinct fold and ligand binding mechanism. AdcA proteins comprised of two globular subdomains connected by a long α helix and they bind their ligand in the cleft between these domains. In addition, many of these proteins have a low complexity region containing metal binding histidine-rich motif (repetitive HDH sequence). ZnuA is part of the ABC transport system ZnuABC also involved in zinc import. ZnuABC-mediated zinc transport is required for comF expression and competence development.
