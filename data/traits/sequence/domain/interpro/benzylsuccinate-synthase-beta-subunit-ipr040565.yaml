identifier: InterPro:IPR040565
label: "Benzylsuccinate synthase beta subunit"
definition: >-
  Proteins containing this domain include benzylsuccinate synthase beta subunit found in bacteria. BssB acts as a regulator of activation and may additionally be involved in regulating access to the enzyme's active site. It adopts a fold similar to that of a high potential iron-sulfur protein (HiPIP) and resembles the single small subunit of HPAD, which is known as the HpdC or HPADgamma in that system.
