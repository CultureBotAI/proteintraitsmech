identifier: InterPro:IPR028244
label: "Putative type VI secretion system, Rhs element associated Vgr domain"
definition: >-
  Rsh (rearrangement hot-spot) elements are repetitious sequences identified in certain Escherichia coli strains. These elements are genetic composites, each containing a Rhs core sequence that is conserved from one element to another. As reservoirs of sequence repetition, Rhs elements mediate major chromosomal rearrangements. Eight distinct Rhs elements have identified in E. coli strains. This domain is found in putative type VI secretion system Rhs element-associated Vgr proteins from Proteobacteria.
