identifier: InterPro:IPR049779
label: "Kinesin-like protein KIF1A, forkhead associated domain"
definition: >-
  This entry represents the forkhead associated (FHA) domain found in human Kinesin-like protein KIF1A and similar proteins from vertebrates. This domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine KIF1A, also called axonal transporter of synaptic vesicles (ATSV), microtubule-based motor KIF1A, Unc-104- and KIF1A-related protein, or Unc-104, is an axonal transporter of synaptic vesicles, which is mutated in hereditary sensory and autonomic neuropathy type 2. It is also required for neuronal dense core vesicle (DCV) transport to dendritic spines and axons. The calcium-dependent interaction with CALM1 increases vesicle motility, and the interaction with the scaffolding proteins PPFIA2 and TANC2 recruits DCVs to synaptic sites.
