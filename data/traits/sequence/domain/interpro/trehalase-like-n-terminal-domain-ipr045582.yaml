identifier: InterPro:IPR045582
label: "Trehalase-like, N-terminal domain"
definition: >-
  This presumed domain is found at the N-terminal region of bacterial and archaeal trehalases which catalyse the hydrolysis of alpha,alpha-trehalose into two molecules of D-glucose, followed by the glycoside hydrolase domain. This domain is also found in the uncharacterised protein C4H3.03c from S. pombe. Members of this entry belong to the glycosyl hydrolase 15 family . The function of this domain is not clear.
