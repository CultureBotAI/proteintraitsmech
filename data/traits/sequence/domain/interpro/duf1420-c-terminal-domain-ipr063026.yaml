identifier: InterPro:IPR063026
label: "DUF1420, C-terminal domain"
definition: >-
  This entry consists of several hypothetical putative lipoproteins which seem to be found specifically in the bacterium Leptospira interrogans. This entry represents the C-terminal domain which may adopt an α/β fold consisting of four β-strands decorated with four α-helices.
