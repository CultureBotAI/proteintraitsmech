identifier: InterPro:IPR049474
label: "Flagellar hook-associated protein 1, D3 domain"
definition: >-
  This entry includes Flagellar hook-associated protein 1 from Burkholderia pseudomallei (the causing agent of melioidosis) ( , known as FlgK or HAP1) and similar sequences predominantly found in betaproteobacteria. FlgK is one of three HAPs that form the hook-filament junction and has structural similarity to flagellin. This protein has a multidomain fold comprising an elongated α-helical scaffold core, and depending on the bacterial species, a variable number of smaller domains. FlgK has two β-sandwich domains protruding from the large α-helical core, referred to as D2 and D3 domains in, with the second one (D3) represented in this entry. FlgK has cytotoxic effects suggesting an important role in pathogenesis and is highly immunogenic. Domains D2 and D3 have been identified as epitopes with increased immunogenic potential for vaccine development.
