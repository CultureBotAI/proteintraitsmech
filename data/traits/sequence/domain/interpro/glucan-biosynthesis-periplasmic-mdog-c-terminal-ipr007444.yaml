identifier: InterPro:IPR007444
label: Glucan biosynthesis, periplasmic, MdoG C-terminal
definition: >-
  Membrane-derived oligosaccharides (MDO) are members of a family of glucans found in the periplasmic space of Gram-negative bacteria. MdoG has been shown to be necessary for the synthesis of MDO, but its exact function is not known yet. MdoD, an MdoG paralog, is a twin-arginine-dependent periplasmic protein that controls osmoregulated periplasmic glucan backbone structures. This entry represents the functional portion of the protein and excludes the N-terminal signal sequence.
