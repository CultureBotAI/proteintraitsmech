identifier: InterPro:IPR062674
label: "Inner kinetochore subunit CNN1, N-terminal domain"
definition: >-
  This entry represents the N-terminal region of CNN1, the budding yeast homologue of CENP-T. This region is found in fungi. CNN1 is a component of the inner kinetochore constitutive centromere-associated network (CCAN). This N-terminal region mediates interaction with the outer kinetochore NDC80 complex subunits SPC24 and SPC25, and with the KNL1 complex. Phosphorylation of this region by MPS1 kinase regulates the interaction with the NDC80 complex.
