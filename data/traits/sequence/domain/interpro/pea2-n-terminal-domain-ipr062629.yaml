identifier: InterPro:IPR062629
label: "PEA2, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of PEA2, a protein localised to sites of polarised growth in fungi. PEA2 is required for efficient mating and bipolar budding and is a component of the polarisome complex. The protein localises to cellular bud sites, bud necks, bud tips, and mating projection tips. PEA2 is involved in establishment of cell polarity, regulation of actin cytoskeleton organisation, and filamentous growth. The protein undergoes phosphorylation at serine residues and interacts with myosin V. The specific function of this N-terminal domain remains to be determined.
