identifier: InterPro:IPR013585
label: Protocadherin
definition: >-
  The structure of protocadherins is similar to that of classic cadherins, but they also have some unique features associated with the cytoplasmic domains. They are expressed in a variety of organisms and are found in high concentrations in the brain where they seem to be localised mainly at cell-cell contact sites. Their expression seems to be developmentally regulated.
