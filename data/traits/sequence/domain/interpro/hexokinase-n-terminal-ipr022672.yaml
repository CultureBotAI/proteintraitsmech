identifier: InterPro:IPR022672
label: Hexokinase, N-terminal
definition: >-
  Hexokinase is an important enzyme that catalyses the ATP-dependent conversion of aldo- and keto-hexose sugars to the hexose-6-phosphate (H6P). The enzyme can catalyse this reaction on glucose, fructose, sorbitol and glucosamine, and as such is the first step in a number of metabolic pathways. The addition of a phosphate group to the sugar acts to trap it in a cell, since the negatively charged phosphate cannot easily traverse the plasma membrane. The enzyme is widely distributed in eukaryotes. There are three isozymes of hexokinase in yeast Hxk1, Hxk2, and Glk1 (or PI, PII and glucokinase, respectively): isozymes PI and PII phosphorylate both aldo- and keto-sugars; glucokinase is specific for aldohexoses. All three isozymes contain two domains. There have been described two hexokinase-like proteins in yeast, namely Putative glucokinase-2 (Emi2) and N-acetylglucosamine kinase (YLR446W). Structural studies of yeast hexokinase reveal a well-defined catalytic pocket that binds ATP and hexose, allowing easy transfer of the phosphate from ATP to the sugar. Vertebrates contain four hexokinase isozymes, designated I to IV, where types I to III contain a duplication of the two-domain yeast-type hexokinases. Both the N- and C-terminal halves bind hexose and H6P, though in types I an III only the C-terminal half supports catalysis, while both halves support catalysis in type II. The N-terminal half is the regulatory region. Type IV hexokinase is similar to the yeast enzyme in containing only the two domains, and is sometimes incorrectly referred to as glucokinase. The different vertebrate isozymes differ in their catalysis, localisation and regulation, thereby contributing to the different patterns of glucose metabolism in different tissues. Whereas types I to III can phosphoryla…
