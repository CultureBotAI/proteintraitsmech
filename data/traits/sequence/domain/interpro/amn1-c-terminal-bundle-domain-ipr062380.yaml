identifier: InterPro:IPR062380
label: "AMN1, C-terminal bundle domain"
definition: >-
  This entry represents a C-terminal helical bundle domain found in AMN1 proteins, spanning approximately 110 amino acids. This domain is found in fungi and is located after the disordered N-terminal region. AMN1 is an antagonist of the mitotic exit network, acting as a negative regulator required for multiple cell cycle checkpoints. The protein acts in daughter cells to inhibit the mitotic exit pathway once the mitotic exit network has executed its function. AMN1 localises to both the cytoplasm and nucleus and interacts with TEM1 to interfere with TEM1-CDC5 association. The specific function of this domain remains to be determined.
