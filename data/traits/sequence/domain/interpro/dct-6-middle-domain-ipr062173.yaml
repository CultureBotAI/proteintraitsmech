identifier: InterPro:IPR062173
label: "DCT-6, middle domain"
definition: >-
  This entry represents the middle domain of DCT-6 proteins found in nematodes. DCT-6 proteins are DAF-16/FOXO controlled, germline tumour-affecting proteins that may have a role in tumour suppression. The domain has a lipocalin-like fold structure. While the full-length DCT-6 protein is involved in tumour regulation, the specific function of this middle domain remains to be determined.
