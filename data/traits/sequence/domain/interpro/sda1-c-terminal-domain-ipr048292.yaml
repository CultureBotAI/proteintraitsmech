identifier: InterPro:IPR048292
label: "SDA1, C-terminal domain"
definition: >-
  This entry includes SDA1 and its homologues. SDA1 is a Saccharomyces cerevisiae protein which is involved in the control of the actin cytoskeleton, essential for cell viability. It is a HEAT repeat-containing protein, required for 60S pre-ribosomal subunits export to the cytoplasm and may also be required for 60S ribosomal subunit maturation and accumulation. This entry represents the C-terminal region of SDA1 proteins.
