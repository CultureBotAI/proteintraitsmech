identifier: InterPro:IPR058556
label: "V(D)J recombination-activating protein 1, ZnH2 domain"
definition: >-
  This entry represents the ZnH2 domain of RAG1 (V(D)J recombination-activating protein 1). The RAG complex, consisting of two RAG1 and two RAG2 proteins is a multi-protein complex that mediates DNA cleavage during V(D)J (variable-diversity-joining) recombination. RAG1 mediates DNA-binding to the conserved recombination signal sequences (RSS). Many of the proteins in this group are fragments. Solution of the structure of the complex of RAG1 and RAG2 shows that each protein dimerises with itself and each pair then complexes together to from the RAG1-RAG2 V(D)J recombinase enzyme. The different structural elements in RAG1 for are: an N-terminal nonamer-binding domain ( ); a dimerisation and DNA-binding domain (this entry); an extended pre-RNase H domain ( ); the catalytic RNase H domain ( ); a ZnC2 domain ( ); and ZnH2 domain ( ); and a three-helix C-terminal domain ( ).
