identifier: InterPro:IPR056089
label: "Domain of unknown function DUF7672"
definition: >-
  This entry represents a domain of unknown function in uncharacterised proteins found in bacteria (Bacteroidota and Chloroflexi). The proteins are likely to be integral membrane proteins with two transmembrane α-helices. Structural modelling suggests that these proteins form a dimeric arrangement with pairs of α helices tilted at approximately a 45-degree angle compared to the lipid membrane. Based on the positive inside rule, it is likely that the N- and C-terminal of these proteins have a cytoplasmic location. Given the geometry of the protein complex, it may not span the entire membrane. This domain can also be found at the C-terminal in bacterial proteins.
