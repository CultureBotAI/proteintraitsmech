identifier: InterPro:IPR046863
label: "Copper-binding protein MbnP-like domain"
definition: >-
  This entry represents a domain found in MbnP from methanobactin producer Methylosinus trichosporium Strain OB3b ( ) and similar bacterial proteins. MbnP is a copper-binding protein and may be a methanobactin copper release protein.
