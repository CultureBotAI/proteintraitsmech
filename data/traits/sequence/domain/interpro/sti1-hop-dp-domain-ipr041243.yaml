identifier: InterPro:IPR041243
label: "STI1/HOP, DP domain"
definition: >-
  This entry corresponds to the Asp/Pro-rich domains (DP) of STI1/HOP and similar proteins, including TIC40, a co-chaperone during protein import into chloroplasts. STI1/HOP proteins are cochaperones that belong to the foldosome, a system consisting in Hsp70 and Hsp90 chaperones. STI1/HOP acts as an adapter protein capable of transferring client proteins from the first to the second molecular chaperone. This domain is found in two copies in STI1, named DP1 and DP2, while in others is present in one copy, such as Hsp70-Hsp90 organising protein from P. falciparum. This domain (and specifically DP2 from STI1), is involved in client activation.
