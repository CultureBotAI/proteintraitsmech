identifier: InterPro:IPR004150
label: NAD-dependent DNA ligase, OB-fold
definition: >-
  DNA ligases catalyse the crucial step of joining the breaks in duplex DNA during DNA replication, repair and recombination, utilizing either ATP or NAD(+) as a cofactor. This family is a small domain found after the adenylation domain DNA_ligase_N in NAD+-dependent ligases ( ). OB-fold domains generally are involved in nucleic acid binding.
