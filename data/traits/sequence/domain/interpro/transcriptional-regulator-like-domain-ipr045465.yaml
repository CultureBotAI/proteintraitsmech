identifier: InterPro:IPR045465
label: "Transcriptional regulator-like domain"
definition: >-
  This domain, previously known as DUF6499, is found in transcriptional regulators and similar proteins mainly found in proteobacteria. This domain is found in association with the DNA binding domain in many proteins. It is predicted to adopt an all-α structure.
