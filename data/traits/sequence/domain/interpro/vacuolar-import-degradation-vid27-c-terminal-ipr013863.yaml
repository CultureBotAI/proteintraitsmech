identifier: InterPro:IPR013863
label: "Vacuolar import/degradation Vid27, C-terminal"
definition: >-
  Vid27 is a cytoplasmic protein of unknown function, possibly regulates import of fructose-1,6-bisphosphatase into Vacuolar Import and Degradation (Vid) vesicles and is not essential for proteasome-dependent degradation of fructose-1,6-bisphosphatase (FBPase). This entry represents the C-terminal region of Vid27, which is predicted to contain a WD40 repeat domain.
