identifier: InterPro:IPR024970
label: Maelstrom domain
definition: >-
  Maelstrom is a germ-plasm component protein that is involved in the piRNA pathway, though its precise function is not known. This protein contains a novel domain, known as the Maelstrom domain, which adopts the RNaseH fold. Maelstrom is essential for Piwi-mediated silencing and acts downstream of or in parallel to H3K9me3 in Drosophila.
