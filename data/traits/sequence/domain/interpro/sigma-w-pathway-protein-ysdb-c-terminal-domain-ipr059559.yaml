identifier: InterPro:IPR059559
label: "Sigma-w pathway protein YsdB, C-terminal domain"
definition: >-
  This entry represents the globular domain located at the C-terminal end of YsdB, a sigma-W pathway protein from Bacillus subtilis. YsdB may mediate a negative feedback loop that down-regulates expression of the sigma-W regulon following activation of sigma-W in response to cell envelope stress. The protein might interact with and inhibit the protease PrsW, or could bind to the anti-sigma-W factor RsiW, thereby protecting it from PrsW-mediated cleavage. YsdB is expressed under control of the sigma-W factor.
