label: "Domain of unknown function DUF8488"
definition: >-
  This entry represents the fourth domain found in some glycosyl hydrolase family 2 proteins. This immunoglobulin-like domain follows the N-terminal ( ), catalytic ( ) and C-terminal ( ) domains characteristic of this family. The domain is approximately 85-110 residues in length. These proteins include exo-beta-1,4-galactosidases involved in degrading galactan substituents from plant cell wall polysaccharides. The family is found in diverse bacteria including Bacteroidota and Bacillota. The function of this domain remains to be determined.
