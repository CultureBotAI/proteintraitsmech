identifier: InterPro:IPR027805
label: "Transposase, Helix-turn-helix domain"
definition: >-
  This domain is the probable DNA-binding region of transposase enzymes, necessary for efficient DNA transposition. Most of the members derive from the IS superfamily IS5 and rather fewer from IS4.
