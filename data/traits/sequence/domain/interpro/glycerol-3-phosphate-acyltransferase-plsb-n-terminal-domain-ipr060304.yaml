identifier: InterPro:IPR060304
label: "Glycerol-3-phosphate acyltransferase PlsB, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of glycerol-3-phosphate acyltransferase PlsB. This N-terminal domain spans approximately residues 8-210 and precedes the main catalytic acyltransferase domain containing the essential HXXXXD motif. The enzyme is found in Gammaproteobacteria. The specific function of this N-terminal domain remains to be determined. PlsB is a glycerol-3-phosphate acyltransferase (GPAT) from E. coli that catalyses the first step of phospholipid biosynthesis by transferring an acyl group from acyl-CoA to sn-glycerol 3-phosphate to form 1-acyl-sn-glycero-3-phosphate. The enzyme is involved in CDP-diacylglycerol biosynthesis and belongs to the GPAT/DAPAT family. PlsB is localised to the inner membrane as a peripheral membrane protein on the cytoplasmic side, where membrane synthesis depends on allosteric control of this enzyme. PlsB regulation plays an important role in the phospholipid synthesis pathway and is part of the response to certain stress signals. In many other bacteria, PlsB is not found, and appears to be replaced by a two-enzyme system for 1-acyl-glycerol-3-phosphate biosynthesis, the PlsX/Y system. GPATs are classified into four isoforms in mammals; GPAT1 and GPAT2 are localised in the mitochondrial outer membrane, whereas GPAT3 and GPAT4 are localised in the endoplasmic reticulum membrane. This entry includes the mitochondrial isoform GPAT.
