identifier: InterPro:IPR054392
label: "VipD-like, C-terminal domain"
definition: >-
  This domain is found in VipD from Legionella pneumophila (effector vacuolar protein sorting inhibitor protein D, ), which localises to early endosomal membranes and alters their lipid and protein composition. This process protects the pathogen from endosomal fusion. VipD adopts a two-domain fold, with a N-terminal domain homologous to patatin ( ) and a C-terminal domain (this entry) that contains ten α-helices and two short β-strands. VipD localises to early endosomes via this domain.
