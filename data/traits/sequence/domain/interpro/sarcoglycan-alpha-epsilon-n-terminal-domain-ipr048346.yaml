identifier: InterPro:IPR048346
label: "Sarcoglycan alpha/epsilon, N-terminal domain"
definition: >-
  Sarcoglycans are a subcomplex of transmembrane proteins which are part of the dystrophin-glycoprotein complex. They are expressed in the skeletal, cardiac and smooth muscle. Although numerous studies have been conducted on the sarcoglycan subcomplex in skeletal and cardiac muscle, the manner of the distribution and localisation of these proteins along the non junctional sarcolemma is not clear. This entry represents the N-terminal domain of alpha and epsilon members.
