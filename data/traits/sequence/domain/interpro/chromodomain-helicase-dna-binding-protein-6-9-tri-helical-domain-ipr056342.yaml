identifier: InterPro:IPR056342
label: "Chromodomain-helicase-DNA-binding protein 6-9, tri-helical domain"
definition: >-
  This domain is found in human Chromodomain-helicase-DNA-binding proteins 6-9 (CHD6-9) which are DNA-dependent ATPases that play a role in chromatin remodelling and transcriptional regulation. CHD8 acts as a transcription repressor by remodelling chromatin structure and recruiting histone H1 to target genes. It suppresses p53/TP53-mediated apoptosis by recruiting histone H1 and preventing p53/TP53 transactivation activity. It also acts as a negative regulator of Wnt signalling pathway by regulating beta-catenin (CTNNB1) activity. CHD6 regulates transcription by disrupting nucleosomes in a largely non-sliding manner which strongly increases the accessibility of chromatin. It activates transcription of specific genes in response to oxidative stress through interaction with NFE2L2. CHD9 acts as a transcriptional coactivator for PPARA and possibly other nuclear receptors. This domain is predicted to form a tri-helical structure, with a three-membered α-helical bundle and a two-stranded antiparallel β-sheet. Members of this family are predominantly found in vertebrates.
