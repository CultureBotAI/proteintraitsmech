identifier: InterPro:IPR021722
label: "YvbH-like, oligomerisation domain"
definition: >-
  This domain is found at the C terminus of a group of bacterial uncharacterised proteins. This domain is composed of a helical hairpin that appears to mediate oligomerization based on the known structure.
