label: "Ras association domain-containing protein 7, RA domain"
definition: >-
  The Ras association domain (RASSF) proteins are named due to the presence of a Ras association (RA) domain in their N or C terminus that can potentially interact with the Ras GTPase family of proteins. These GTPases control a variety of cellular processes, such as membrane trafficking, apoptosis, and proliferation. RASSF proteins contain several other functional domains that modulate associations with other proteins. RASSF proteins with the RA domain at the C terminus (which are termed C-terminal or classical RASSF) usually also include a Salvador-RASSF-Hippo (SARAH) domain involved in several protein-protein interactions and for homo- and heterodimerisation of RASSF isoforms. N-terminal RASSF proteins (with the RA domain in the N terminus) do not usually contain a SARAH domain. At least 10 RASSF family members have been characterised (with multiple splice variants), many of which have been shown to play a role in tumour suppression. RASSF proteins also act as scaffolding agents in microtubule stability, regulate mitotic cell division, control cell migration and cell adhesion, and modulate NF-KB activity and the duration of inflammation. Loss of RASSF expression through promoter methylation has been shown in numerous types of cancer, including leukemia, melanoma, breast and prostate cancer. RASSF7 is one of the N-terminal RASSF proteins, characterised by an RA domain in the N terminus. It was previously known as HRC1 (HRAS1-related cluster protein 1), and is predicted to exist as at least three isoforms as a result of alternative splicing. RASSF7 has been shown to promote mitosis through the regulation of spindle formation. There is conflicting evidence on the methylation of the RASSF7 promoter, and subsequently on the status of RASSF7 as a tumour suppressor. This entr…
