identifier: InterPro:IPR059900
label: "Bacteriophage T4 protein Y07C, C-terminal domain"
definition: >-
  This entry represents the The C-terminal domain of Y07C protein family found in T4-like bacteriophages. Y07C is an uncharacterised protein of 136 amino acids (16.0 kDa) found in the segB-ipI intergenic region of bacteriophage T4.
