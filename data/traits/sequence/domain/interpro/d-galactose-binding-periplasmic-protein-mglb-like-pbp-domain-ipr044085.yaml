identifier: InterPro:IPR044085
label: D-galactose-binding periplasmic protein MglB-like, PBP domain
definition: >-
  This entry represents the PBP (periplasmic binding protein) domain found in a group of glucose/galactose-binding proteins, including MglB (a D-galactose-binding periplasmic protein) from E. coli. They belong to the periplasmic binding protein superfamily which consists of two α/β globular domains connected by a three-stranded hinge. This Venus flytrap-like domain undergoes transition from an open to a closed conformational state upon ligand binding. Moreover, this group of proteins are homologous to the ligand-binding domain of eukaryotic receptors such as glutamate receptor (GluR) and DNA-binding transcriptional repressors such as LacI and GalR.
