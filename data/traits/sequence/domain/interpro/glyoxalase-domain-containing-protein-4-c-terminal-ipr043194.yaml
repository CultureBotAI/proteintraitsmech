identifier: InterPro:IPR043194
label: "Glyoxalase domain-containing protein 4, C-terminal"
definition: >-
  This entry represents the C-terminal domain of GLOD4. Glyoxalase domain-containing protein 4 (GLOD4) contains the vicinal oxygen chelate (VOC) domain. The function of GLOD4 is not clear. The C. elegans member in this entry, known as glyoxalase 1 or CeGly, has been shown to be involved in the MG modifications of mitochondrial proteins and mitochondrial ROS production.
