identifier: InterPro:IPR063273
label: "Type IV pili machinery localization factor FimV, N-terminal TPR region"
definition: >-
  This entry represents a small TPR region found in the fimbrial assembly protein FimV from Acinetobacter species. FimV proteins are involved in type IV pilus biogenesis and are predicted to be inner membrane proteins. In Acinetobacter baumannii, the protein encoded by locus A1S_0425 contributes to abiotic surface colonisation and biofilm formation.
