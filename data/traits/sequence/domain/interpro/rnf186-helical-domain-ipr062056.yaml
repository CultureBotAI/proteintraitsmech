identifier: InterPro:IPR062056
label: "RNF186, helical domain"
definition: >-
  This entry represents a helical domain found in the C-terminal region of E3 ubiquitin-protein ligase RNF186. This domain spans approximately 55 residues and contains two predicted transmembrane helices. RNF186 is localised to the endoplasmic reticulum membrane where it functions as an E3 ubiquitin ligase involved in ER stress-mediated apoptosis and autophagy regulation. The protein ubiquitinates several targets including BNIP1, ATF6, EPHB2 and Sestrin-2. While the N-terminal RING finger domain provides the catalytic activity, the specific function of this helical domain remains to be determined.
