identifier: InterPro:IPR032240
label: "CRISPR-associated endonuclease Cas9, REC lobe"
definition: >-
  The REC lobe of Cas9 includes the REC1 and REC2 domains. REC1 forms an elongated, α-helical structure consisting of 25 α helices and two β-sheets, whereas REC2 inserted within REC1 adopts a six-helix bundle structure. The REC lobe and the NUC lobe of Cas9 fold to present a positively charged groove at their interface which accommodates the negatively charged sgRNA:target DNA heteroduplex. CRISPR (clustered regularly interspaced short palindromic repeat)-Cas system occurs naturally in bacteria as a defence against invasion by phages or other mobile genetic elements. Cas9 is targeted to specific genomic locations by sgRNAs or single guide RNAs, in order to complex with invading DNA in order to cleave it and render it inactive.
