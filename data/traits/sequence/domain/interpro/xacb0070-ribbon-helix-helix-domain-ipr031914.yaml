identifier: InterPro:IPR031914
label: "XACb0070, ribbon-helix-helix domain"
definition: >-
  This ribbon-helix-helix domain can be found in the XACb0070 protein from Xanthomonas axonopodis pv. citri. It binds to DNA and may be a part of a toxin-antitoxin system.
