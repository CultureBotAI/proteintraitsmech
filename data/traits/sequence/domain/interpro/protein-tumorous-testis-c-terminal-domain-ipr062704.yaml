identifier: InterPro:IPR062704
label: "Protein tumorous testis, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in tumorous testis (tut) found in Drosophila species. This RNA-binding protein forms a complex with bam and bgcn, involved in 3'UTR-dependent regulation of mRNAs. The protein preferentially binds a long isoform of mei-P26 transcripts and is involved in promoting germline stem cell lineage differentiation and mitosis-to-meiosis transition. The protein contains an RRM domain required for binding mei-P26 mRNA 3'UTR and a C-terminal domain. The protein is localised to the cytoplasm. Disruption results in male sterility.
