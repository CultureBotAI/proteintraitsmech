identifier: InterPro:IPR034163
label: "Aspergillopepsin-like catalytic domain"
definition: >-
  This entry represents the peptidase domain found in a group of aspartic endopeptidases of fungal origin, including aspergillopepsin (MEROPS ientifier A01.016), rhizopuspepsin (A01.012), endothiapepsin (A01.017) and penicillopepsin (A01.011). Aspergillopepsin from A. fumigatus is involved in invasive aspergillosis owing to its elastolytic activity and aspergillopepsins from the mold A. saitoi are used in the fermentation industry. The members in this entry have an optimal acidic pH (5.5) and cleave protein substrates with similar specificity to that of porcine pepsin A, preferring hydrophobic residues at P1 and P1' in the cleavage site. This group of aspartate proteases is classified by MEROPS as the peptidase family A1 (pepsin A, clan AA). Aspartyl proteases (APs), also known as acid proteases, ([ec:3.4.23.-]) are a widely distributed family of proteolytic enzymes known to exist in vertebrates, fungi, plants, retroviruses and some plant viruses. APs use an Asp dyad to hydrolyze peptide bonds. APs found in eukaryotic cells are α/β monomers composed of two asymmetric lobes ("bilobed"). Each of the lobes provides a catalytic Asp residue, positioned within the hallmark motif Asp-Thr/Ser-Gly, to the active site. The N- and C-terminal domains, although structurally related by a 2-fold axis, have only limited sequence homology except the vicinity of the active site. This suggests that the enzymes evolved by an ancient duplication event. The enzymes specifically cleave bonds in peptides which have at least six residues in length with hydrophobic residues in both the P1 and P1' positions. The active site is located at the groove formed by the two lobes, with an extended loop projecting over the cleft to form an 11-residue flap, which encloses substrates and inhibitors in the ac…
