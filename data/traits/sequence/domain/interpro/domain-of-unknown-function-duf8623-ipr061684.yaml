identifier: InterPro:IPR061684
label: "Domain of unknown function DUF8623"
definition: >-
  This entry represents a C-terminal immunoglobulin-like domain of approximately 100 residues found in cyanobacterial proteins. These proteins contain an N-terminal NTF2-like domain followed by this Ig-like C-terminal domain. Proteomic studies have shown that one family member (Slr2144 in Synechocystis sp. PCC 6803) accumulates under salt stress and hexane stress conditions and is localised to the periplasm. The family is found exclusively in cyanobacteria, including Nostocales and Oscillatoriophycideae. The function of this domain remains to be determined.
