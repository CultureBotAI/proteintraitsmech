identifier: InterPro:IPR049412
label: "Minor capsid protein V18-like, jelly roll domain"
definition: >-
  This entry represents the single jelly-roll domain of Sputnik virus minor capsid proteins V18. Sputnik is a dsDNA virus, referred to as a virophage, that is coassembled with Mimivirus in the host amoeba. It is an icosahedral virus and its capsid contains a major protein (V20) and two minor proteins (V18/19).
