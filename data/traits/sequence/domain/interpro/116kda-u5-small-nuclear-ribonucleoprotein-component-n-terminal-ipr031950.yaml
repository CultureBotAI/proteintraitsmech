identifier: InterPro:IPR031950
label: "116kDa U5 small nuclear ribonucleoprotein component, N-terminal"
definition: >-
  This entry represents the N-terminal domain of U5 small nuclear ribonucleoprotein (snRNP) protein (U5-116kDa). It is also found in Snu114p, a 114kDa protein homologous to U5-116kDa that has been identified in Saccharomyces cerevisiae. Both proteins seem to have a role in pre-mRNA splicing process.
