identifier: InterPro:IPR033043
label: "FAS-associated factor 1-like, UBX domain"
definition: >-
  FAS-associated factor 1 (FAF1) is a multidomain protein involved in various biological processes, including regulation of apoptosis and NFkappaB activity, and ubiquitination and proteasomal degradation. It has been linked to cancer, asbestos-induced mesotheliomas, and Parkinson's disease. FAF1 contains multiple ubiquitin-related domains, including ubiquitin-associated (UBA), ubiquitin-like 1 and 2 (UBL1, UBL2), and ubiquitin regulatory X (UBX) domains. FAF1 interacts with polyubiquitinated proteins via its N-terminal UBA domain and with valosin containing protein (VCP) via its C-terminal UBX domain. This entry represents the UBX domain as found in FAF1 and homologues. The UBX domain has a β-grasp fold similar to that of ubiquitin; however, UBX lacks the C-terminal double glycine motif and is thus unlikely to be conjugated to other proteins.
