identifier: InterPro:IPR062003
label: "TIGD5, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain found in TIGD5 (Tigger transposable element-derived protein 5) in animals. TIGD5 belongs to the tigger transposable element derived protein family and localises to the nucleus. The protein contains an N-terminal HTH psq-type domain ( ), a CENPB-type HTH domain ( ), and one or two DDE-1 endonuclease domains ( ). This C-terminal domain is located after the DDE transposase domains and is predicted to fold into an α-helical hairpin. TIGD5 has been implicated as a potential tumour suppressor and autism risk variant. However, the specific function of this domain remains to be determined.
