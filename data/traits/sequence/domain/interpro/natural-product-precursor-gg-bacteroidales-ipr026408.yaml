identifier: InterPro:IPR026408
label: "Natural product precursor, GG-Bacteroidales"
definition: >-
  Sequences in this domain include a leader peptide region, up to and including a Gly-Gly cleavage motif, and about 15 additional residues, usually Cys-rich, from a family of predicted ribosomal natural product precursors. Many of these are associated with peptide-modifying radical SAM enzymes.
