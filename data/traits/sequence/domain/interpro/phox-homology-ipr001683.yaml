identifier: InterPro:IPR001683
label: Phox homology
definition: >-
  This domain is found in Sorting nexin and related proteins. Sorting nexins (SNXs) are a diverse family of proteins characterised by the presence of a phosphoinositide-binding PX domain, which mediates their association with endosomal membranes. They play essential roles in membrane trafficking, endosomal sorting and signal transduction across eukaryotes. SNX1 functions in retrograde transport from endosomes to the trans-Golgi network as a core component of the retromer complex, facilitating the retrieval of cargo receptors such as the cation-independent mannose-6-phosphate receptor. SNX2 shares functional similarity with SNX1 and also participates in retromer-mediated retrograde trafficking, with partial redundancy between the two proteins in endosome-to-Golgi transport. SNX3 is a smaller sorting nexin that regulates the recycling of specific cargo proteins, including Wntless, which is essential for Wnt secretion, and transferrin receptor, thereby contributing to iron homeostasis. SNX4 is involved in endosomal recycling pathways, where it promotes transferrin receptor recycling and prevents its degradation, and additionally participates in autophagosome assembly by regulating the trafficking of the phospholipid scramblase ATG9A. The PX (phox) domain occurs in a variety of eukaryotic proteins and has been implicated in highly diverse functions, including cell signalling, vesicular trafficking, protein sorting and lipid modification. PX domains are important phosphoinositide-binding modules that exhibit varying lipid-binding specificities. The PX domain is approximately 120 residues in length and folds into a three-stranded β-sheet followed by three α-helices and a proline-rich region. This region immediately precedes a membrane-interaction loop and spans approximately e…
