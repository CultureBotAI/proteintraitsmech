identifier: InterPro:IPR017461
label: "Conserved hypothetical domain CHP03009, planctomycetes"
definition: >-
  This domain is found, so far, only in the Planctomycetes (Pirellula sp. strain 1 and Gemmata obscuriglobus), in up to four proteins per genome, and may be duplicated within a protein. The function is unknown.
