identifier: InterPro:IPR029119
label: "Adenine DNA glycosylase, C-terminal"
definition: >-
  This entry represents the C-terminal domain of MutY. Its structure is similar to the NUDIX fold, which is an α/β/α sandwich. Adenine DNA glycosylase (called MutY in bacteria and hMYH in humans) initiates repair of A-oxoG to C-G by removing the inappropriately paired adenine base from the DNA backbone. MutY belongs to a structural superfamily of proteins (the NUDIX hydrolase superfamily) that hydrolyse a wide range of organic pyrophosphates. Enzymes belonging to this superfamily require a divalent cation, such as Mg2+ or Mn2+ for their activity. They are also recognized by a highly conserved 23-residue nudix motif (GX5EX7REUXEEXGU, where U = I, L or V). However, DNA glycosylase does not seem to contain this signature motif. DNA glycosylase consists of 2 domains: the N-terminal domain contains the catalytic properties of the enzyme and the C-terminal domain affects substrate (oxoG) binding and enzymatic turnover. The C-terminal domain is highly similar to MutT, based on secondary structure and topology, despite low sequence identity. MutT sanitizes the nucleotide precursor pool by hydrolyzing oxo-dGTP to oxo-dGMO and inorganic pyrophosphate. The similarity strongly suggests that the two proteins share a common evolutionary origin.
