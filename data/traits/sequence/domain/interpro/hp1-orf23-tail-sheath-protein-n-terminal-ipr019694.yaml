identifier: InterPro:IPR019694
label: "HP1 ORF23 tail sheath protein, N-terminal"
definition: >-
  This entry is represented an N-terminal domain of Bacteriophage HP1, Orf23 putative tail sheath protein. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches. These proteins is a component of a contractile injection system related to phage sheath proteins.
