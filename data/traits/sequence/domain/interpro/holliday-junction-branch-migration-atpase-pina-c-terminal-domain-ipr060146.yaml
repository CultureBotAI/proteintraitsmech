identifier: InterPro:IPR060146
label: "Holliday junction branch migration ATPase PINA, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Holliday junction branch migration ATPase PINA (PINA) found in thermophilic archaea. The domain is found in Thermoproteota including Sulfolobaceae, Desulfurococcaceae, and Pyrodictiaceae. The specific function of this domain remains to be determined. The full-length PINA protein promotes Holliday junction branch migration and unwinds Y-shaped DNA in an ATP-dependent manner. PINA coordinates with Hjc resolvase and Hjm helicase in DNA recombination and repair processes. PINA contains an N-terminal PIN domain represented by , a middle AAA+ ATPase domain ( ) and a C-terminal domain.
