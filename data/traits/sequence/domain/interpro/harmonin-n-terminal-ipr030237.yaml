identifier: InterPro:IPR030237
label: "Harmonin, N-terminal"
definition: >-
  This entry represents the N-terminal protein-binding module of Harmonin. It binds specifically to a short internal peptide fragment of the Cadherin 23 cytoplasmic domain, a component of the Usher protein network. Harmonin is a F-actin binding protein that can be found in hair cell stereocilia and sensory cell microvilli. In the hair cells of the inner ear, harmonin is an upper tip-link density (UTLD) component that is necessary for normal hearing.
