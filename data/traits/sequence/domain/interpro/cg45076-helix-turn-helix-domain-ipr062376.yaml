identifier: InterPro:IPR062376
label: "CG45076, helix-turn-helix domain"
definition: >-
  This entry represents a helix-turn-helix (HTH) domain found in the uncharacterised protein CG45076 and related proteins from insects. The domain is approximately 30-40 amino acids in length and is found in proteins relate to transcription factors. CG45076 undergoes alternative splicing and contains experimentally confirmed phosphorylation sites. The proteins containing this domain show extensive disordered regions outside the conserved domain. The specific function of this helix-turn-helix domain remains to be determined.
