identifier: InterPro:IPR018962
label: "Domain of unknown function DUF1995"
definition: >-
  This entry includes proteins from bacteria and plants. This domain can be found in a chloroplastic protein, LOW PSII ACCUMULATION 3 (LPA3, At1g73060), from Arabidopsis. LPA3 is involved in assisting chlorophyll a binding protein psbC assembly within photosystem II (PSII). This domain can also be found in some putative adenylate kinases, such as At5g35170 from Arabidopsis and Os08g0288200 from rice.
