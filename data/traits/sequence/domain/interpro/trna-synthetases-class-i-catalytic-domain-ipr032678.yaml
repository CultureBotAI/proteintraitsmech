identifier: InterPro:IPR032678
label: "tRNA synthetases class I, catalytic domain"
definition: >-
  This entry represents the catalytic (Rossmann-fold) domain found in cysteinyl tRNA synthetases which is responsible for the ATP-dependent formation of the enzyme bound aminoacyl-adenylate. It contains the characteristic class I HIGH and KMSKS motifs, which are involved in ATP binding. Cysteine-tRNA ligase (also known as cysteinyl-tRNA synthetase) is an alpha monomer and belongs to class Ia. It aminoacylates the 2'-OH of the nucleotide at the 3' of the appropriate tRNA. It is highly specific despite not possessing the amino acid editing activity characteristic of many other tRNA ligases.
