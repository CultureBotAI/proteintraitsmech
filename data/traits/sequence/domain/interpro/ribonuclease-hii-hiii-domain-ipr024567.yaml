identifier: InterPro:IPR024567
label: Ribonuclease HII/HIII domain
definition: >-
  The entry represents the Rnase H type-II domain. Ribonuclease H (RNase H) is a member of the ribonuclease family, which recognises and cleaves the RNA strand of RNA-DNA heteroduplexes. The enzyme is widely present in all three kingdoms of living organisms, including bacteria, archaea, and eukaryotes, and their counterpart domains are also found in reverse transcriptases (RTs) from retroviruses and retroelements. RNases H are classified into two evolutionarily unrelated families, type-I and type-II RNase H, with common structural features of the catalytic domain but different range of substrates for enzymatic cleavage. There appears to be three evolutionarily distinct lineages of cellular Rnase H enzymes. Type-I or RNase HI domains have been found in all Eukarya, one Archaea, many Eubacteria, a few non-LTR retroposons and all LTR retrotransposons. Type II enzymes consist of RNase HII (rnhB) and HIII (rnhC), which are homologous enzymes. RNase HII can be found in Archaea, Eubacteria and all Eukarya, while RNase HIII appears only in some Eubacteria. In eukaryotes and all Archaea, RNase HII enzymes may constitute the bulk of all Rnase H activity, while the reverse is true in Eubacteria like E. coli where RNase HI is the major source of RNH activity. All LTR retrotransposons acquired an enzymatically weak RNase H domain that is missing an important catalytic residue found in all other RNase H enzymes. Vertebrate retroviruses appear to have reacquired their RNase H domains, which are catalytically more active, but their ancestral RNase H domains (found in other LTR retrotransposons) have degenerated to give rise to the tether domain unique to vertebrate retrovirus. Reverse transcriptase (RT) is a modular enzyme carrying polymerase and ribonuclease H (RNase H) activities…
