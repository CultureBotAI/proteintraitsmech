identifier: InterPro:IPR025807
label: "Adrift-type ribose 2-O-methyltransferase domain"
definition: >-
  In higher eukaryotes, including insects, vertebrates and their viruses, mRNA and snRNA 5'-ends are modified by the addition of methyl groups to the first and/or the second transcribed nucleotides. Methylation of the ribose on the second transcribed position is termed cap2, and the enzyme responsible is the cap-specific mRNA (nucleoside-2'-O-)-methyltransferase or cap methyltransferase 2. In Drosophila, this protein was originally known as adrift, and was isolated as a gene required for pathfinding on the segmental nerve.
