identifier: InterPro:IPR046526
label: "Domain of unknown function DUF6591"
definition: >-
  This presumed domain is functionally uncharacterised. This domain family is found in bacteria, mainly Firmicutes and Actinobacteria, and is approximately 80 amino acids in length. It contains a highly conserved tryptophan residue and the conserved sequence YxxxxxxY.
