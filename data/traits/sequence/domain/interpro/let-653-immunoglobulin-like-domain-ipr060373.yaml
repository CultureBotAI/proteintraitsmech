identifier: InterPro:IPR060373
label: "Let-653, immunoglobulin-like domain"
definition: >-
  This immunoglobulin-like (Ig-like) domain is found in Protein let-653 from Caenorhabditis elegans and similar sequences from nematodes and arthropods. Let-653 is required for epithelial tube development and shaping and involved in the morphogenesis and function of the three unicellular tubes of the excretory system, the canal cell, the duct cell and the pore cell.
