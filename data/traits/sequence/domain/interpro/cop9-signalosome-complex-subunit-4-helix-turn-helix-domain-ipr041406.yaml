identifier: InterPro:IPR041406
label: "COP9 signalosome complex subunit 4, helix turn helix domain"
definition: >-
  Cullin-RING E3 ubiquitin ligases (CRLs) are regulated by the eight-subunit COP9 signalosome (CSN). Enzymatically, CSN functions as an isopeptidase that removes the ubiquitin-like activator NEDD8 from CRLs, but it can also bind deneddylated CRLs and maintain them in an inactive state. The CSN subunits CSN1, CSN2, CSN3, CSN4, CSN7 and CSN8, share a common domain composition: an N-terminal array of tandem α-helical tetratricopeptide/-like repeats, a 34 residue motif, followed by a PCI domain, which encompasses a WH subdomain, a linker, and one or two α-helices at the C terminus.
