identifier: InterPro:IPR063373
label: "Frv operon regulatory protein FrvR, third domain"
definition: >-
  This entry represents the third domain of FrvR and related bifunctional regulatory proteins. FrvR contains an N-terminal HTH DNA-binding domain ( ) and a C-terminal PTS EIIA type-2 domain ( ), and may be involved in regulating transcription of the frv operon. The family shows similarity to BglG-type antiterminators, which regulate sugar utilisation operons through RNA-binding and antitermination mechanisms. The family is found in Enterobacterales, Lactobacillales and Bacillales. The specific function of this third domain remains to be determined.
