identifier: InterPro:IPR061917
label: "SSDP, dimerisation domain"
definition: >-
  This entry represents the dimerisation domain of SSDPs (single-stranded DNA binding proteins). SSDPs enable sequence-specific single stranded DNA binding activity. Together with Chip/LIM-domain binding protein (LDB), it forms a ChiLS complex that controls numerous cell-fate decisions in animal cells, by mediating transcription of developmental control genes via remote enhancers. This complex binds to NPFxD motifs within the nuclear Wnt signaling factor Pygopus (Pygo) and Osa/ARID1A, a chromatin-binding subunit of the BAF transcriptional activator complex. This entry also includes transcriptional corepressor LEUNIG from plants, which is related to SSDPs as they share significant sequence similarity.
