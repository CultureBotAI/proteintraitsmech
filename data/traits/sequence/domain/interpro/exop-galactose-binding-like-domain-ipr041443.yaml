identifier: InterPro:IPR041443
label: "ExoP, galactose-binding-like domain"
definition: >-
  This is the C-terminal domain found in ExoP (exo-1,3/1,4-beta-glucanase) from Pseudoalteromonas. This domain contains a β-sandwich fold which is common in glycosyl hydrolases (GH7, 11, 12 and 16) and in some 23 carbohydrate-binding modules. It is suggested that the main role of this domain is to provide structural stability necessary for ExoP activity, however no substrate-binding role has been shown.
