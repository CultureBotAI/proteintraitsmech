identifier: InterPro:IPR063304
label: "Cancer/testis antigen 55, N-terminal"
definition: >-
  This entry represents the N-terminal domain of cancer/testis antigen 55 (CT55), found in vertebrates. The full-length CT55 protein plays a role in spermatogenesis, possibly acting in the regulation of the autophagy pathway. CT55 interacts with GABARAP and LAMP2, and localises to the cytoplasm, acrosome and flagellum in spermatocytes and spermatids. Deficiency of CT55 causes male infertility in humans and mice. The C-terminal region of CT55 contains an S1- like RNA-binding domain ( ). The specific function of this N-terminal domain remains to be determined. This domain is also found in RNA helicase Mov10l1 proteins. This domain can be found in other positions and multiple times. This domain contains an OB-like fold.
