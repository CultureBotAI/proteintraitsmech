identifier: InterPro:IPR015098
label: "EBP50, C-terminal"
definition: >-
  This entry represents the C-terminal domain of EBP50 and similar proteins from vertebrates. This region comprises a mostly disordered region and the EBD. Association of Ezrin allows interaction of EBP50 with FERM (four-point one ERM) domains, resulting in the activation of Ezrin-radixin-moesin (ERM), with subsequent cytoskeletal modulation and cellular growth control. This entry includes NHERF-1 and NHERF-2. These proteins, which consist of two PDZ domains and a carboxy-terminal ezrin binding domain (EBD), function as a scaffolding protein for the glutamate transporter GLAST. NHERF1 interacts with GLAST during ER export, while NHERF2 interacts with GLAST in the secretory pathway from the ER-Golgi intermediate compartment to the plasma membrane.
