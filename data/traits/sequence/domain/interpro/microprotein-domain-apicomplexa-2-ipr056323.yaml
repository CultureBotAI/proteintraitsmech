identifier: InterPro:IPR056323
label: "Microprotein domain, apicomplexa 2"
definition: >-
  This domain covers the whole length of uncharacterised microproteins encoded by small open reading frames (smORFs) from apicomplexa, including from the parasite Babesia bovis, and is found centrally located in longer uncharacterised proteins from related species.
