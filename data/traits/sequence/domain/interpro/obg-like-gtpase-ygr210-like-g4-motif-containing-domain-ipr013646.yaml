identifier: InterPro:IPR013646
label: "Obg-like GTPase YGR210-like, G4 motif-containing domain"
definition: >-
  This domain is part of the G domain found at the C-terminal of in archaeal and eukaryotic GTPases. Members of this entry form a subfamily within the Obg family of GTPases, and includes YGR210 from yeasts and its homologues from archaea. This domain contains the NKxD motif, known as the G4 motif. The P-loop guanosine triphosphatases (GTPases) control a multitude of biological processes, ranging from cell division, cell cycling, and signal transduction, to ribosome assembly and protein synthesis. GTPases exert their control by interchanging between an inactive GDP-bound state and an active GTP-bound state, thereby acting as molecular switches. The common denominator of GTPases is the highly conserved guanine nucleotide-binding (G) domain that is responsible for binding and hydrolysis of guanine nucleotides. Within the translation factor-related (TRAFAC) class of P-loop GTPases, the OBG family comprises a group of high-molecular mass GTPases conserved from bacteria to eukaryotes. The OBG family consists of: Obg from bacteria and eukaryotes. DRG from eukaryotes and archaea. DRG proteins may regulate fundamental cellular processes through RNA binding. Nog1 from eukaryotes and archaea. It is involved in the assembly of the large ribosomal subunit. Yyaf/YchF from bacteria and eukaryotes. It consists of a central G domain, flanked by a coiled-coil domain and a TGS (ThrRS, GTPase, SpoT) domain. Members of this subfamily bind and hydrolyse ATP more efficiently than GTP. Ygr210 from archaea and fungi. The OBG-type G domain has a mononucleotide binding fold typical for the P-loop NTPases. A six-stranded mostly parallel β-sheet is flanked by α-helices on both sides. The OBG-type G domain contains five characteristic sequence motifs, termed G1-G5, involved in nucleotide binding and…
