identifier: InterPro:IPR060750
label: "Tri6-like, C2H2 zinc finger domain"
definition: >-
  This entry represents a domain covering the three zinc-finger C2H2 domains in Tri6 and HepR found in fungi. Tri6 is part of the core trichothecene biosynthesis cluster. It is a zinc finger DNA-binding protein that functions as a pathway-specific transcription factor and positively regulates the other Tri genes. HepR is part of the gene cluster that mediates the biosynthesis of heptelidic acid (HA), a sesquiterpene lactone that acts as an inhibitor of glyceraldehyde-3-phosphatedehydrogenase (GAPDH) and a growth inhibitor of the salt-tolerant lactic acid bacteria in soy sauce brewing.
