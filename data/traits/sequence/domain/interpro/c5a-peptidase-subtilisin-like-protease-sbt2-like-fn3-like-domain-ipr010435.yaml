identifier: InterPro:IPR010435
label: C5a peptidase/Subtilisin-like protease SBT2-like, Fn3-like domain
definition: >-
  This is a Fn3-like domain found as the first of three on streptococcal C5a peptidase (SCP), a subtilisin-like, highly specific protease and adhesin/invasin that acts as an essential GAS virulence factor for the rapid dissemination of bacteria in soft tissues. This domain is also found at the C-terminal of subtilisin-like protease SBT2 from Arabidopsis and in PI-II-type proteinase.
