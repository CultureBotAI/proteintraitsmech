identifier: InterPro:IPR035849
label: "Fes/Fps/Fer, SH2 domain"
definition: >-
  The Fps family consists of members Fps/Fes and Fer/Flk/Tyk3. They are cytoplasmic protein-tyrosine kinases implicated in signaling downstream from cytokines, growth factors and immune receptors. Fes/Fps/Fer contains three coiled-coil regions, an SH2 (Src-homology-2) and a TK (tyrosine kinase catalytic) domain signature. This entry represents the SH2 domain. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites.
