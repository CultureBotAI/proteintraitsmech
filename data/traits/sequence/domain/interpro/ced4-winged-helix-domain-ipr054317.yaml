identifier: InterPro:IPR054317
label: "CED4, winged-helix domain"
definition: >-
  This entry represents a winged-helix-like domain (WHD) found at the C-terminal of CED4 and similar proteins from nematodes. CDE4 together with EGL1, CED9, and CED3, forms a crucial component of the apoptotic signalling cascade necessary for triggering programmed cell death during both embryonic and postembryonic development. Molecular dynamics studies indicate that this WH domain may regulate CED4 dissociation from CED9.
