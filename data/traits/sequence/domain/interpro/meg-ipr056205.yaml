identifier: InterPro:IPR056205
label: Meg
definition: >-
  This entry includes Maternally expressed gene (Meg) family of proteins, a multigene family expressed in maize that encodes cysteine-rich proteins. The founding member of the family, Meg1, is required for normal development of the basal endosperm transfer cell layer and is involved in the allocation of maternal nutrients to growing seeds. Expansion of Meg family involves potentially adaptive functional and structural transitions. In most members this entry covers the full length, while in Meg5 it is found at the C-terminal.
