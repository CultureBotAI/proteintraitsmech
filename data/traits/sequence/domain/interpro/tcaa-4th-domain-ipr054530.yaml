identifier: InterPro:IPR054530
label: "TcaA, 4th domain"
definition: >-
  This entry represents the fourth domain of the TcaA proteins that adopt an Ig-like fold. TcaA plays a major role in decreasing resistance to glycopeptide antibiotics. In the uncharacterised membrane protein YvbJ, thi entry covers the third and fourth domains.
