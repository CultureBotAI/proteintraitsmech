identifier: InterPro:IPR047704
label: "GPS-CTERM domain"
definition: >-
  This entry represents the GPS-CTERM domain found at the C-terminal of proteins from actinomycetes, such as Nocardia and Streptomyces. It usually follows the SCO2322-like domain. This is an apparent novel protein-sorting domain.
