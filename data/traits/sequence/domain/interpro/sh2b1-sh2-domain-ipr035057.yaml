identifier: InterPro:IPR035057
label: "SH2B1, SH2 domain"
definition: >-
  This entry represents the SH2 domain of SH2B adapter protein 1. SH2B adapter protein 1 (SH2B1) belongs to the SH2B family of adapter proteins. It promotes insulin expression and glucose metabolism in beta-cells in mice. It is also involved in brain-derived neurotrophic factor-induced neurite outgrowth. SH2B family contains three members of adaptor proteins: SH2B1, 2 and 3. Typical SH2B proteins contain a SH2 (Src homology 2) and a PH (pleckstrin homology) domain. They serve as adaptors involved in signalling by the receptors for growth factors, such as insulin-like growth factor 1, platelet-derived growth factor and nerve growth factor.
