identifier: InterPro:IPR033439
label: "Chromosome partition protein MukF, winged-helix domain"
definition: >-
  This entry represents the N-terminal winged helix-turn-helix domain of MukF. MukF is involved in chromosome condensation, segregation and cell cycle progression. MukE along with MukF interact with MukB in vivo forming a complex, which is required for chromosome condensation and segregation in Escherichia coli. The Muk complex appears to be similar to the SMC-ScpA-ScpB complex in other prokaryotes where MukB is the homologue of SMC.
