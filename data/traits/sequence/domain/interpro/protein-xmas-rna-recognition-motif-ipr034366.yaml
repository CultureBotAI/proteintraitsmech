identifier: InterPro:IPR034366
label: "Protein xmas, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) found in Xmas, the Drosophila homologue of yeast Sac3p protein. Together with E(y)2, the Drosophila homologue of yeast Sus1p protein, Xmas is part of the nuclear pore complex (NPC)-associated TREX-2/AMEX complex that is required in the regulation of mRNA transport and also involved in the efficient transcription regulation of the heat-shock protein 70 (hsp70) loci. This group of proteins are found in insects and contain an N-terminal RNA recognition motif (RRM), followed by a PCI domain.
