identifier: InterPro:IPR048513
label: "Dicer, partner-binding domain"
definition: >-
  This domain is found in endoribonuclease Dicer from animals. This entry represents the partner-binding domain (PBD), which folds into a four-helical bundle. It is is responsible for the interactions with the dsRNA-binding proteins that support the enzymatic activity of Dicer. Dicer endoribonuclease plays a central role in short dsRNA-mediated post-transcriptional gene silencing. It cleaves naturally occurring long dsRNAs and short hairpin pre-microRNAs (miRNA) into fragments of twenty-one to twenty-three nucleotides with 3' overhang of two nucleotides, producing respectively short interfering RNAs (siRNA) and mature microRNAs. Dicer shows two N-terminal helicase domains ( ), a dimerisation domain ( ), a platform domain ( ), a PAZ domain ( ), two RNase III a/b domains ( ) and a dsRNA-binding domain in its C-terminal region ( ).
