identifier: InterPro:IPR022150
label: "AKNA domain"
definition: >-
  This domain can be found in microtubule organization protein AKNA (also known as AT-hook-containing transcription factor) in eukaryotes, and is approximately 110 amino acids in length. AKNA which regulates the expression of the costimulatory molecules on lymphocytes and lays a key role in cell delamination by regulating the microtubule organization. This domain can also be found in AKNAD1 (AKNA Domain Containing 1). It has been linked to type-2 diabetes.
