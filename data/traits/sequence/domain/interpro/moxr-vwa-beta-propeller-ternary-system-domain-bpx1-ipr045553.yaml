identifier: InterPro:IPR045553
label: "MoxR-vWA-beta-propeller ternary system domain bpX1"
definition: >-
  This domain is known as bpX1. Most members of this entry belong to the phylum Bacteroidetes. This entry represents an uncharacterised domain found in the MoxR-vWA-β-propeller ternary system, a class of NTP-dependent biological conflict systems.
