identifier: InterPro:IPR045687
label: "GPI ethanolamine phosphate transferase 2, C-terminal"
definition: >-
  This entry corresponds to the C-terminal transmembrane region of the GPI ethanolamine phosphate transferase 2 (PIGG/GPI7). These proteins are involved in the pathway glycosylphosphatidylinositol-anchor biosynthesis. In humans, this enzyme has been related to disorders leading to including intellectual disability (ID), seizures, and facial dysmorphism. In yeast it is known as las21, and it is essential for cell separation.
