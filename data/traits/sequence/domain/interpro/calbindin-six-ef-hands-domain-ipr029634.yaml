identifier: InterPro:IPR029634
label: Calbindin, six-EF hands domain
definition: >-
  Calbindin (also known as calbindin D28) is a major calcium-binding and buffering protein that is associated with Alzheimer's disease. It plays an important role in preventing a neuronal death as well as maintaining calcium homeostasis. This protein contains six EF-hand motifs in a single globular domain (this entry), where EF-hands 1, 3, 4, 5 bind four calcium ions with high affinity.
