identifier: InterPro:IPR005192
label: "Glycoside hydrolase, family 49, C-terminal"
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. Dextranase ( ) and isopullulanase ( ) are members of glycoside hydrolase family 49 ( ). Dextranase hydrolyses alpha-1,6-glycosidic bonds in dextran polymers. This entry corresponds to the C-terminal of the pectate lyase like domain.
