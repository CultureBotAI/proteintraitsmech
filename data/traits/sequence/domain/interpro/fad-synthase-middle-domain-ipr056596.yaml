identifier: InterPro:IPR056596
label: "FAD synthase, middle domain"
definition: >-
  This domain is found centrally located in FAD synthase (FLAD1) and similar sequences mainly found in animals. FLAD1 catalyses the adenylation of flavin mononucleotide (FMN) to form flavin adenine dinucleotide (FAD) coenzyme. In FLAD1, this domain is found C-terminal to and N-terminal to . This domain, which is predicted to show an α-β configuration, is also found C-terminal in plant and fungal uncharacterised proteins such as YMR178W from Saccharomyces cerevisiae and prokaryotic sequences like AF_2251 from Archaeoglobus fulgidus. The function of these proteins is unknown.
