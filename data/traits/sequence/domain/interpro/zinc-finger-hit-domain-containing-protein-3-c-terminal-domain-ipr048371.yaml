identifier: InterPro:IPR048371
label: Zinc finger HIT domain-containing protein 3, C-terminal domain
definition: >-
  This domain is found at the C-terminal of Zinc finger HIT domain-containing protein 3 from human (ZNHIT3) ( ), a cofactor of the RNA-binding nuclear protein NUFIP1. This domain consists of five α-helices and is responsible for binding to NUFIP1.
