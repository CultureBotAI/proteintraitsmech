identifier: InterPro:IPR056824
label: "GPI inositol-deacylase, transmembrane domain"
definition: >-
  This domain is found at the C-terminal end of GPI inositol-deacylase (BST1, also known as PGAP1) and related proteins from vertebrates and fungi. This transmembrane domain (TMD) consists of 10 transmembrane helices that are mostly perpendicular to the membrane, with the exception of a long TMH4 which crosses the membrane diagonally. PGAP1 is an endoplasmic reticulum membrane protein with a catalytic serine-containing motif that is conserved in a number of lipases. PGAP1 functions as a GPI inositol-deacylase; this deacylation is important not only for the efficient transport of GPI-anchored proteins from the endoplasmic reticulum to the Golgi body but also for efficient degradation of misfolded GPI-anchored proteins in the ER.
