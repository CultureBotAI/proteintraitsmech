identifier: InterPro:IPR003206
label: Diol/glycerol dehydratase, large subunit
definition: >-
  This entry represents the large subunit of adenosylcobalamin-dependent diol dehydratases ( ) and glycerol dehydratases ( ). These enzymes are produced by some enterobacteria in response to growth substances. The enzyme have an TIM β/α barrel fold. Inactivated holoenzymes are reactivated by their own reactivating factors that mediate the ATP-dependent exchange of an enzyme-bound, damaged cofactor for free adenosylcobalamin through intermediary formation of apoenzyme. The reactivation takes place in two steps: (a) ADP-dependent cobalamin release and (b) ATP-dependent dissociation of the resulting apoenzyme-reactivating factor complexes.
