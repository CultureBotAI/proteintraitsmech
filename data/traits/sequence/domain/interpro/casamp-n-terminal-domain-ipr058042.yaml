identifier: InterPro:IPR058042
label: "CASAMP, N-terminal domain"
definition: >-
  This entry represents the N-terminal of human Calmodulin-regulated spectrin-associated protein 1-3 (CASAMP1-3,) and similar animal proteins, including the homologues from Caenorhabditis elegans and Drosophila melanogaster Patronin. This domain is a presumed calponin-homology (CH) domain. The calmodulin-regulated spectrin-associated (CAMSAP) proteins are defined by a CKK domain that binds microtubules. It includes CAMSAPs from vertebrates and Patronin from invertebrates. CAMSAP1 is the representative member. It contains a conserved region, CC1, that binds to both spectrin and Ca2+/calmodulin in vitro and links spectrin-binding to neurite outgrowth. Patronin binds to and protects the MT minus-end against depolymerization. CAMSAP2 is a key microtubule-organising protein that specifically binds the minus end of non-centrosomal microtubules and regulates their dynamics and organisation. CAMSAP proteins carry an N-terminal region that includes two CH domains represented by and , a central region including a predicted coiled-coil, and a C-terminal CKK domain , which is involved in binding CAMSAP proteins to microtubules.
