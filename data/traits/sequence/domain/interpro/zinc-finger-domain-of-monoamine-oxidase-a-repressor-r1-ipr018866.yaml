identifier: InterPro:IPR018866
label: "Zinc-finger domain of monoamine-oxidase A repressor R1"
definition: >-
  R1 is a transcription factor repressor that inhibits monoamine oxidase A gene expression. This domain is a four-CXXC zinc finger putative DNA-binding domain found at the C-terminal end of R1. The domain carries 12 cysteines of which four pairs are of the CXXC type.
