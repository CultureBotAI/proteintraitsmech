identifier: InterPro:IPR049573
label: Protein tyrosine phosphatase domain-containing protein 1, PTP domain
definition: >-
  This entry represents the protein tyrosine phosphatase (PTP) domain present in protein tyrosine phosphatase domain-containing protein 1 (PTPDC1). PTPDC1 is an uncharacterised non-receptor class protein-tyrosine phosphatase (PTP) that may play roles in cilia formation and/or maintenance. PTPs catalyse the dephosphorylation of phosphotyrosine peptides.
