identifier: InterPro:IPR058582
label: "NusA-like, second KH domain"
definition: >-
  This entry represents the second K homology (KH) domain found in NusA transcription termination factors. KH domains bind RNA and can function in RNA recognition. NusA binds to RNA polymerase alpha subunit and promotes termination at certain RNA hairpin structures. In prokaryotes, the N-terminal RNA polymerase-binding domain (NTD) is connected through a flexible hinge helix to three globular domains, the S1 and two K-homology (KH), KH1 and KH2. The KH domains of NusA belong to the type II KH RNA-binding domain superfamily. NusA, or N utilisation substance protein A, is a multidomain regulator of transcript elongation in bacteria and archaea. Bacterial NusA interacts with elongating complexes and the nascent RNA transcript in ways that stimulate pausing and termination, but that can be switched to antipausing and antitermination by other accessory proteins. It is also involved in both DNA repair and damage tolerance pathways.
