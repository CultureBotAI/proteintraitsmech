identifier: InterPro:IPR057242
label: "PCFS4-like, zinc finger domain"
definition: >-
  This zinc finger domain is found in the homologues of polyadenylation and cleavage factor homolog 4 (PCFS4) including PCFS1, PCFS5 and other RNA-binding proteins in eukaryotes. This domain contains three highly conserved cysteine residues and histidine. Its structure is predicted to be similar to known Treble clef zinc finger domains. PCFS4 is known to promote flowering by suppressing FLC-mediated inhibition of flowering through the regulation of FCA pre-mRNA alternative processing. This protein regulates mRNA maturation, including alternative polyadenylation, splicing or transcription initiation of stress-associated genes.
