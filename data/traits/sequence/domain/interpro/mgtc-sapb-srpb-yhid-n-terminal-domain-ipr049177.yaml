identifier: InterPro:IPR049177
label: "MgtC/SapB/SrpB/YhiD, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in a group of similar bacterial proteins, including Protein MgtC from Salmonella typhimurium and Protein SapB from Bacillus subtilis. MgtC is a virulence factor required for growth in low Mg2+ medium and for intramacrophage survival. It may be involved in regulating membrane potential by activating Na+/K+-ATPase.
