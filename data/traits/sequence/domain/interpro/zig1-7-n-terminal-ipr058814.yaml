identifier: InterPro:IPR058814
label: "ZIG1/7, N-terminal"
definition: >-
  This entry represents the N-terminal immunoglobulin domain of the Zwei Ig-1 and 7 (ZIG1 and ZIG7) proteins, which contain two immunoglobulin domains. Members of this group are specific to nematodes. ZIG proteins are either secreted or membrane-associated molecules that play important roles in maintaining the structure of the nervous system after development is complete. These proteins function to prevent neuronal displacement caused by mechanical stress from body movements. ZIG proteins have been shown to counteract mechanical forces that cause axon displacement in the ventral nerve cord of Caenorhabditis elegans, ensuring that neural circuits remain correctly positioned throughout the animal's life
