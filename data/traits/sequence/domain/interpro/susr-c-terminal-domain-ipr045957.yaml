identifier: InterPro:IPR045957
label: "SusR, C-terminal domain"
definition: >-
  This entry (previously known as DUF6377) represents the C-terminal domain of the Starch utilization system regulator SusR from Bacteroides thetaiotaomicron (SusR) and similar proteins from bacteroidetes. SusR is a transcriptional activator that regulates the maltose-dependent expression of starch utilisation system (Sus) genes. It works in conjunction with MalR to provide coordinated regulation of the starch utilisation system. This region contains the DNA-binding region that promotes transcription of the Sus operon.
