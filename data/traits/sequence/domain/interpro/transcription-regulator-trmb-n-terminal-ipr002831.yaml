identifier: InterPro:IPR002831
label: "Transcription regulator TrmB, N-terminal"
definition: >-
  This entry represents the N-terminal DNA-binding domain found in HTH-type sugar sensing transcriptional regulator TrmB from the hyperthermophilic archaea Pyrococcus furiosus and similar prokaryotic sequences. This domain contains a winged-helix-turn-helix (wHTH). TrmB, is a protein of 38,800 apparent molecular weight, that is involved in the maltose-specific regulation of the trehalose/maltose ABC transport operon in Thermococcus litoralis. TrmB has been shown to be a maltose-specific repressor, and this inhibition is counteracted by maltose and trehalose. TrmB binds maltose and trehalose half-maximally at 20 uM and 0.5 mM sugar concentration, respectively. Other members of this family are annotated as either transcriptional regulators or hypothetical proteins.
