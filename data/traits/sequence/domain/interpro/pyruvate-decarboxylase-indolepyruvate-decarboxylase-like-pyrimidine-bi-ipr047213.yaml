identifier: InterPro:IPR047213
label: "Pyruvate decarboxylase/indolepyruvate decarboxylase-like, pyrimidine-binding domain"
definition: >-
  The thiamine pyrophosphate (TPP) family has a thiamin diphosphate-binding fold consisting of two different functional modules, the pyridine-binding (Pyr) and pyrophosphate-binding (PP) modules. This entry represents the PYR-binding domain found at the N-terminal of pyruvate decarboxylase (PDC), indolepyruvate decarboxylase (IPDC) and related proteins. The PYR domain is found in many key metabolic enzymes which use TPP (also known as thiamine diphosphate) as a cofactor. TPP binds in the cleft formed by a PYR domain and a PP domain. The PYR domain, binds the aminopyrimidine ring of TPP, the PP domain binds the diphosphate residue. The PYR and PP domains have a common fold, but do not share strong sequence conservation. Most TPP-dependent enzymes have the PYR and PP domains on the same subunit although these domains can be alternatively arranged in the primary structure. TPP-dependent enzymes are multisubunit proteins, the smallest catalytic unit being a dimer-of-active sites, for many the active sites lie between PP and PYR domains on different subunits.
