identifier: InterPro:IPR049200
label: "Sfum_1244-like, C-terminal domain"
definition: >-
  This entry (previously known as DUF6866) represents the C-terminal α-helical domain found in Sfum_1244 from the selenoprotein-rich species Syntrophobacter fumaroxidans, which are uncharacterised proteins that occur primarily in Pseudomonadota and Thermodesulfobacteriota. The function of these proteins is unknown.
