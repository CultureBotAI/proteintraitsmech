identifier: InterPro:IPR055022
label: "Halocin C8-like, N-terminal domain"
definition: >-
  This is a presumed domain found at the N-terminal of halocin C8 and similar sequences from archaea. Halocins are bacteriocin-like proteins or peptides produced by many species of the family Halobacteriaceae. Halocin C8 is derived from the C terminus of a 283 amino-acid prepro-protein (ProC8). The N-terminal peptide of ProC8, known as Immunity protein HalI, acts as an immunity protein for halocin-C8. It is able to block the halocin-C8 activity by sequestering the activity of halocin-C8 through specific and direct binding. Halocin C8, excreted by the Halobacterium, has a very wide activity spectrum. When a sensitive strain of Halorubrum saccharovorum was exposed to halocin C8, the treated cells swelled at the initial stage, the cell wall appeared to be nicked and the cytoplasm was then extruded out, and the whole cell was eventually completely lysed.
