identifier: InterPro:IPR062170
label: "PET494, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in PET494 COX3 mRNA-specific translational activators. Members are required for the expression of the mitochondrial gene for cytochrome c oxidase subunit III (COX3). The proteins are associated with the mitochondrial inner membrane as peripheral membrane proteins and regulate mitochondrial translation. The family is found in Saccharomycetaceae yeasts.
