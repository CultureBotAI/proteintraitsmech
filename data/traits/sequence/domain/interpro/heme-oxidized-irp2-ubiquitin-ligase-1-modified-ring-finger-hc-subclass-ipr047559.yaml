identifier: InterPro:IPR047559
label: "Heme-oxidized IRP2 ubiquitin ligase 1, modified RING finger, HC subclass"
definition: >-
  This entry represents the RING domain of HOIL1 and similar proteins from animals. It is a modified C3HC3D-type RING-HC finger required for RBR-mediated ubiquitination. Heme-oxidized IRP2 ubiquitin ligase 1 (HOIL-1) is also called RanBP-type and C3HC4-type zinc finger-containing protein 1, HBV-associated factor 4 and RING finger protein 54 (RNF54). Together with the E3 ubiquitin-protein ligase RNF31 (also known as HOIP) and SHANK-associated RH domain interacting protein (SHARPIN), it forms the E3-ligase complex (also known as linear-ubiquitin-chain assembly complex LUBAC) that regulates NF-kappaB activity and apoptosis through conjugation of linear polyubiquitin chains to NF-kappaB essential modulator (also known as NEMO or IKBKG). HOIL-1 plays a crucial role in TNF-alpha-mediated NF-kappaB activation. It also functions as an ubiquitin-protein ligase E3 that interacts with not only PKCbeta but also PKCzeta. It can recognise heme-oxidised IRP2 (iron regulatory protein 2) and is thought to affect the turnover of oxidatively damaged proteins. HOIL-1 contains an N-terminal ubiquitin-like (UBL) domain and an Npl4 zinc-finger (NZF) domain, which regulate the interaction with the LUBAC subunit RNF31 and ubiquitin, respectively. The NZF domain belongs to RanBP2-type zinc finger (zf-RanBP2) domain superfamily. In addition, HOIL-1 has an RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD (two RING fingers and a DRIL (double RING finger linked)) domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism th…
