identifier: InterPro:IPR012927
label: "Effector protease OspD3-like, N-terminal"
definition: >-
  This domain is present in the N-terminal region of the ShET2 enterotoxin and the Effector protease OspD3 from Shigella flexneri, Ankyrin repeat protein A (ARPA) from Escherichia coli and related sequences from bacteria. OspD3 is an effector protease that disrupts necroptosis in host cells by mediating proteolytic cleavage of host RIPK1 and RIPK3. ShET2/EspL2 protein was found to confer toxigenicity in Ussing chamber assays, and the N-terminal region was found to be important for its enterotoxic effect. The N-terminal domain is a cysteine-type peptidase with a Cys/His/Asp catalytic triad that cleaves within the receptor-interacting protein homotypic interaction motifs found within host adaptor proteins such as receptor-interacting serine/threonine protein kinases RIPK1 and RIPK3, TIR-domain-containing adapter-inducing interferon beta and Z-DNA-binding protein 1, inactivating them and thus inhibiting necroptosis and inflammatory signalling. The toxin is injected into the host cell by the type III secretion system. Most proteins containing this domain are annotated as putative enterotoxins, but one member ( ) is a regulator of acetyl CoA synthetase, and ARPA ( ) is annotated as ankyrin-like regulatory proteins and contain Ank repeats ( ).
