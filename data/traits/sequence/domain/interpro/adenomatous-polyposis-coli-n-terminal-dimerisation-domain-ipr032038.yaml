identifier: InterPro:IPR032038
label: "Adenomatous polyposis coli, N-terminal dimerisation domain"
definition: >-
  This entry represents the N-terminal, coiled-coil dimerisation domain of the adenomatosis polyposis coli (APC) tumour-repressor proteins. It plays a key role in the regulation of cellular levels of the oncogene product beta-catenin. Coiled-coil regions are binding repeats that in this case bind to the armadillo repeat region of beta-catenin.
