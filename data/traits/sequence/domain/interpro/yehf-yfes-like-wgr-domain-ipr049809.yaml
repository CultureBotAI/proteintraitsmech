identifier: InterPro:IPR049809
label: "YehF/YfeS-like, WGR domain"
definition: >-
  This entry represents the WGR domain found in Escherichia coli YehF and YfeS, and related uncharacterised bacterial proteins. YehF was first described as a putative molybdate metabolism regulator, however, this role hasn't been confirmed. YehF has been implicated in selenate reduction. This domain appears to occur in single-domain proteins and in a variety of domain architectures, together with ATP-dependent DNA ligase domains, WD40 repeats, leucine-rich repeats, and other domains. It has been proposed to function as a nucleic acid-binding domain.
