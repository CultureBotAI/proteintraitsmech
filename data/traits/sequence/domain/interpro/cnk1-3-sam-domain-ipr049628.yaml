identifier: InterPro:IPR049628
label: "CNK1-3, SAM domain"
definition: >-
  This entry represents the SAM domain of connector enhancer of kinase suppressor of ras (CNK). CNK proteins are multidomain scaffold proteins containing a few protein-protein interaction domains and are required for connecting Rho and Ras signaling pathways. In Drosophila, the SAM domain of CNK is known to interact with the SAM domain of the Aveugle protein, forming a heterodimer. Mutation of the SAM domain in human CNK1 abolishes the ability to cooperate with the Ras effector, supporting the idea that this interaction is necessary for proper Ras signal transduction.
