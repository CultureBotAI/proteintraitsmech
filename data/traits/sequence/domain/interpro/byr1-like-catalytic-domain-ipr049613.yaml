identifier: InterPro:IPR049613
label: Byr1-like, catalytic domain
definition: >-
  This entry represents the protein kinase (PK) catalytic domain present in Protein kinase byr1 from Schizosaccharomyces pombe, Dual specificity protein kinase FUZ7 from Ustilago maydis, Serine/threonine-protein kinase STE7 from Saccharomyces cerevisiae and similar fungal proteins. PKs catalyse the transfer of the gamma-phosphoryl group from ATP to serine/threonine (ST) or tyrosine residues on protein substrates. Byr1 phosphorylates its downstream target, the MAPK Spk1, and is regulated by Byr2. The Spk1 cascade is pheromone-responsive and is essential for sporulation and sexual differentiation in fission yeast. FUZ7 phosphorylates and activates its target, the MAPK Crk1, which is required in mating and virulence in U.maydis. STE7 is thought to be phosphorylated by the Ste11 protein kinase and to phosphorylate the FUS3 and or KSS1 kinases.
