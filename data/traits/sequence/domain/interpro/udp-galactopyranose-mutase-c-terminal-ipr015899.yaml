identifier: InterPro:IPR015899
label: UDP-galactopyranose mutase, C-terminal
definition: >-
  UDP-galactopyranose mutase ( ) is involved in the conversion of UDP-GALP into UDP-GALF through a 2-keto intermediate, and contains FAD as a cofactor. The gene is known as glf, ceoA, and rfbD. It is known experimentally in Escherichia coli, Mycobacterium tuberculosis, and Klebsiella pneumoniae.
