identifier: InterPro:IPR048550
label: "KRR1 small subunit processome component, first KH domain, eukaryotes"
definition: >-
  This is the first K homology domain (KH1) found in KRR1 small subunit processome component from Saccharomyces cerevisiae and similar eukaryotic sequences. Ribosomal RNA assembly protein KRR1 is required for 40S ribosome biogenesis. It is involved in nucleolar processing of pre-18S ribosomal RNA and ribosome assembly in Saccharomyces cerevisiae. In Schizosaccharomyces pombe it is known as Mis3.
