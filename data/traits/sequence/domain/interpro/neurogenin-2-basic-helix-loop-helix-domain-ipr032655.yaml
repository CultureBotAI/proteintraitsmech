identifier: InterPro:IPR032655
label: "Neurogenin-2, basic helix-loop-helix domain"
definition: >-
  Neurogenin-2 (Ngn-2) is a basic helix-loop-helix transcription factor that is involved in neuronal differentiation. It is required for sensory neurogenesis. Interestingly, ectopic expression of the neural Ngn-2 is sufficient to induce rapid and efficient differentiation of embryonic stem cells (ESCs) into mature glutamatergic neurons. This entry represents the basic helix-loop-helix (bHLH) domain of Ngn-2.
