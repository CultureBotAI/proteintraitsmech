identifier: InterPro:IPR024981
label: "Domain of unknown function DUF3887"
definition: >-
  This domain is found in bacteria and archaea, and is approximately 90 amino acids in length. This domain can be found in N-terminal of the EstD protein from Thermotoga maritima. EstD exhibits significant esterase activity with a preference for short acyl chain esters (C4-C8).
