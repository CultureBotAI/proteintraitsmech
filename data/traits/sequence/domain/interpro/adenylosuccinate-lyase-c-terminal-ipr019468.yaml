identifier: InterPro:IPR019468
label: "Adenylosuccinate lyase C-terminal"
definition: >-
  Adenylosuccinate lyase catalyses two steps in the synthesis of purine nucleotides: the conversion of succinylaminoimidazole-carboxamide ribotide into aminoimidazole-carboxamide ribotide (the fifth step of de novo IMP biosynthesis); the formation of adenosine monophosphate (AMP) from adenylosuccinate (the final step in the synthesis of AMP from IMP). This entry represents the seven α-helical, C-terminal domain of adenylosuccinate lyase. It is also found in other enzymes, like in 3-carboxy-cis,cis-muconate cycloisomerase.
