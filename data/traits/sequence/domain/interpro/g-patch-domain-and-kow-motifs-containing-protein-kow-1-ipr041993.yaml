identifier: InterPro:IPR041993
label: "G-patch domain and KOW motifs-containing protein, KOW 1"
definition: >-
  GPKOW is also known as T54 protein or MOS2 homologue. It contains one G-patch domain and two KOW motifs. GPKOW is a nuclear protein that is regulated by catalytic (C) subunit of Protein Kinase A (PKA) and binds RNA in vivo. PKA may be involved in regulating multiple steps in post-transcriptional processing of pre-mRNAs. The KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4.
