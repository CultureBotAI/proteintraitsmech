identifier: InterPro:IPR060255
label: "BigA, third pectate lyase-like domain"
definition: >-
  This entry represents the third domain of BigA proteins. The domain adopts a pectate lyase-like fold structure. BigA proteins are putative surface-exposed virulence proteins found in bacteria, predominantly in Pseudomonadota including Gammaproteobacteria and Betaproteobacteria. The proteins contain an autotransporter domain. The specific function of this domain remains to be determined. BigA is an autotransporter protein characterised by a C-terminal outer membrane barrel that facilitates the transport of its passenger domain across the membrane. The N-terminal region contains a variable passenger domain, which is translocated through the barrel. After export, the passenger domain may undergo auto-catalytic cleavage, cleavage by an external protease, or remain uncleaved, depending on the specific protein.
