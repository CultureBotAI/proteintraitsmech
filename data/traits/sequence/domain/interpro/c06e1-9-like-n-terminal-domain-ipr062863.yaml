identifier: InterPro:IPR062863
label: "C06E1.9-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of C06E1.9 and similar proteins found predominantly in nematodes. The full-length proteins show similarity to ASCC2 (Activating Signal Cointegrator 1 Complex Subunit 2) and contain CUE domains. The function of this domain remains to be determined.
