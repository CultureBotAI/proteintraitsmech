identifier: InterPro:IPR040536
label: "ASP external chaperone"
definition: >-
  This domain is found in ASP external chaperone (ASPCH, also known as ORF 2), a protein encoded just downstream of asp (A. sobria serine protease) which is required for the production of the active form of the Aeromonas extracellular serine protease (ASP) and essential for its proper folding.
