identifier: InterPro:IPR044399
label: "Myoglobin-like, M family globin domain"
definition: >-
  This entry represents the M family of globin domain which includes chimeric (FHbs/flavohemoglobins) and single-domain globins: FHbs, Ngbs/neuroglobins, Cygb/cytoglobins, GbE/avian eye specific globin E, GbX/globin X, amphibian GbY/globin Y, Mb/myoglobin, HbA/hemoglobin-alpha, HbB/hemoglobin-beta, SDgbs/single-domain globins related to FHbs, and Adgb/androglobin. The M family exhibits the canonical secondary structure of hemoglobins, a 3-over-3 α-helical sandwich structure (3/3 Mb-fold), built by eight α-helical segments (named A through H). In Adgbs, the globin domain is split into two: helices C-H are followed by helices A-B and the two parts are separated by the IQ calmodulin-binding motif. Although rearranged, the globin domain of most Adgbs contains a number of conserved residues which play critical roles in heme-coordination and gas ligand binding. Globins are haem-containing proteins involved in binding and/or transporting oxygen. They belong to a very large and well studied family that is widely distributed in many organisms. Globins have evolved from a common ancestor and can be divided into three groups: single-domain globins, and two types of chimeric globins, flavohaemoglobins and globin-coupled sensors. Bacteria have all three types of globins, while archaea lack flavohaemoglobins, and eukaryotes lack globin-coupled sensors. Several functionally different haemoglobins can coexist in the same species. The major types of globins include: Haemoglobin (Hb): tetramer of two alpha and two beta chains, although embryonic and foetal forms can substitute the alpha or beta chain for ones with higher oxygen affinity, such as gamma, delta, epsilon or zeta chains. Hb transports oxygen from lungs to other tissues in vertebrates. Hb proteins are also present in unicellula…
