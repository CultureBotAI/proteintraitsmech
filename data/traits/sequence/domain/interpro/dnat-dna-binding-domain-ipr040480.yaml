identifier: InterPro:IPR040480
label: "DnaT, DNA-binding domain"
definition: >-
  This domain is found in E.coli primosomal protein 1 (Pp1). PP1 domain (residues 84-153) in can bind to different types of ssDNA, which is fundamental for its physiological substrate bindings. Functional analysis indicate that both N and C termini are essential to having the cooperative effect in binding ssDNA. The ssDNA bound complex displays a spiral filament assembly that is adopted by many proteins that are involved in DNA replication, such as DnaA, RecA and PriB. This domain is similar to except that it contains an extra loop at the N terminus (84-99). Structural analysis indicate that this extra loop might be essential for the stabilisation of the three-helix bundle.
