identifier: InterPro:IPR035552
label: "Mti1, SH3 domain"
definition: >-
  This entry represents the N-terminal SH3 domain found in the Saccharomyces cerevisiae protein Mti1 (Myosin tail region-interacting protein, also known as bbc1) and similar proteins. Mti1 interacts with and regulates type I myosins in yeast, Myo3 and Myo5, which are involved in actin cytoskeletal reorganization. It also binds and inhibits Las17, a WASp family protein that functions as an activator of the Arp2/3 complex.
