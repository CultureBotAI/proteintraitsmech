identifier: InterPro:IPR042981
label: "RING finger protein 11, RING-H2 finger"
definition: >-
  RING finger protein 11 (RNF11) is an E3 ubiquitin-protein ligase that acts both as an adaptor and a modulator of itch-mediated control of ubiquitination events underlying membrane traffic. It is the downstream of an enzymatic cascade for the ubiquitination of specific substrates. It is also a molecular adaptor of homologous to E6-associated protein C terminus (HECT)-type ligases. RNF11 has been implicated in the regulation of several signaling pathways. It enhances the transforming growth factor receptor (TGFR) signaling by both abrogating Smurf2-mediated receptor ubiquitination and by promoting the Smurf2-mediated degradation of AMSH (associated molecule with the SH3 domain of STAM), a de-ubiquitinating enzyme that enhances transforming growth factor-beta (TGF-beta) signalling and epidermal growth factor receptor (EGFR) endosomal recycling. It also acts directly on Smad4 to enhance Smad4 function, and plays a role in prolonged TGF-beta signalling. Moreover, RNF11 functions as a critical component of the A20 ubiquitin-editing protein complex that negatively regulates tumor necrosis factor (TNF)-mediated nuclear factor (NF)-kappaB activation. It also interacts with Smad anchor for receptor activation (SARA) and the endosomal sorting complex required for transport (ESCRT)-0 complex, thus participating in the regulation of lysosomal degradation of EGFR. Furthermore, RNF11 acts as a novel GGA cargo actively participating in regulating the ubiquitination of the GGA protein family. In addition, RNF11 functions together with TAX1BP1 to target TANK-binding kinase 1 (TBK1)/IkappaB kinase IKKi, and further restricts antiviral signaling and type I interferon (IFN)-beta production.
