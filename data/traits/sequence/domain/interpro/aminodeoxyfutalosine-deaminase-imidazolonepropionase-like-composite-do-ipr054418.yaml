identifier: InterPro:IPR054418
label: "Aminodeoxyfutalosine deaminase/Imidazolonepropionase-like, composite domain, N-terminal"
definition: >-
  This entry represents the N-terminal segment of the composite domain usually found in metal-dependent hydrolases, including Imidazolonepropionase from Paracoccus denitrificans (HUTI) and Aminodeoxyfutalosine deaminase from Deinococcus radiodurans (MQNX). HUTI catalyses the hydrolytic cleavage of the carbon-nitrogen bond in imidazolone-5-propanoate to yield N-formimidoyl-L-glutamat and MQNX the deamination of aminodeoxyfutalosine (AFL) into futalosine (FL). The composite domain is interrupted by the catalytic α/β barrel domain ( ). It has a pseudo-barrel fold.
