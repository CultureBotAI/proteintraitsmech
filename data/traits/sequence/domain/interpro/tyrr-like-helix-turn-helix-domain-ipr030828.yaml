identifier: InterPro:IPR030828
label: TyrR-like, helix-turn-helix domain
definition: >-
  This entry describes the C-terminal DNA-binding helix-turn-helix domain of several regulators of aromatic amino acid metabolism. Examples include TyrR in Escherichia coli and in Haemophilus influenzae, and PhhR in Pseudomonas putida. Most members of this family have a sigma-54 interaction domain. The TyrR protein of Escherichia coli can act both as a repressor and as an activator of transcription.
