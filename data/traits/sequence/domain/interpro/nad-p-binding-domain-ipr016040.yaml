identifier: InterPro:IPR016040
label: "NAD(P)-binding domain"
definition: >-
  This entry represents NAD- and NADP-binding domains with a core Rossmann-type fold, which consists of 3-layers α/β/α, where the six β-strands are parallel in the order 321456. Many different enzymes contain an NAD/NADP-binding domain, including: C-terminal domain of alcohol dehydrogenases Tyrosine-dependent oxidoreductases (also known as short-chain dehydrogenases) N-terminal domain of glyceraldehyde-3-phosphate dehydrogenase NAD-binding domain of formate/glycerate dehydrogenases N-terminal domain of sirohaem synthase N-terminal domain of lactate dehydrogenase N-terminal domain of 6-phosphogluconate dehydrogenase (the β-sheet is extended to 8 strands) C-terminal domain of amino acid dehydrogenases (an extra N-terminal helix displaces the C-terminal helix NAD-binding domain of certain potassium channels C-terminal domain of the transcriptional repressor Rex Ornithine cyclodeaminase CoA-binding N-terminal domain of the alpha chain of succinyl-CoA synthetase
definition_source: InterPro
