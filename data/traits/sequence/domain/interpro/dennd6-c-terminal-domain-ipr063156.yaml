identifier: InterPro:IPR063156
label: "DENND6, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain of approximately 65 residues found in DENND6A and DENND6B proteins in metazoans. This domain follows the tripartite DENN domain which comprises the uDENN, cDENN and dDENN subdomains. DENND6 proteins function as guanine nucleotide exchange factors (GEFs) for RAB14, with GEF activity mediated by the DENN domain. The specific function of this C-terminal domain remains to be determined.
