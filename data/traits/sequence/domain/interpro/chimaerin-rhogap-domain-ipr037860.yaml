identifier: InterPro:IPR037860
label: Chimaerin, RhoGAP domain
definition: >-
  This entry represents the RhoGAP (GTPase-activator protein [GAP] for Rho-like small GTPases) domain of chimaerins. Chimaerin is a family of GTPase activating proteins for the small G-protein Rac. Chimaerin family members have been implicated in development, neuritogenesis and cancer.
