identifier: InterPro:IPR055174
label: "Pus10, THUMP domain, archaeal"
definition: >-
  This entry represents the THUMP domain found in Pus10 proteins from archaea. Pus10 is a tRNA pseudouridine synthase responsible for the synthesis of pseudouridine from uracil-54 and uracil-55 in the psi GC loop of transfer RNAs.
