identifier: InterPro:IPR059905
label: "STT4, N-terminal"
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found at the N-terminal of yeast Phosphatidylinositol 4-kinase STT4, which acts in the first committed step in the production of the second messenger inositol 1,4,5-trisphosphate.
