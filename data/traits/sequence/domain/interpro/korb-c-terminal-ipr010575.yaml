identifier: InterPro:IPR010575
label: KorB, C-terminal
definition: >-
  This domain is found in several KorB transcriptional repressor proteins. The korB gene is a major regulatory element in the replication and maintenance of broad host-range plasmid RK2. It negatively controls the replication gene trfA, the host-lethal determinants kilA and kilB, and the korA-korB operon. This family is found in conjunction with .
