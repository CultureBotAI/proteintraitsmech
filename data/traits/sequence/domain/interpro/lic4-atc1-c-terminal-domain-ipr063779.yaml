identifier: InterPro:IPR063779
label: "LIC4/ATC1, C-terminal domain"
definition: >-
  This entry represents a coiled-coil domain found at the C-terminal domain of LIC4/ATC1 proteins. These proteins are involved in cation homeostasis and regulation of cation stress signalling cascades. LIC4/ATC1 proteins are also involved in bipolar budding in yeast. The proteins are nuclear phosphoproteins whose nuclear localisation is modulated by calcineurin. The domain is found in fungi. The specific function of this coiled-coil domain remains to be determined.
