identifier: InterPro:IPR062137
label: "Transcriptional repressor DdrO-like, C-terminal dimerisation domain"
definition: >-
  This entry represents the C-terminal dimerisation domain of DdrO, a transcriptional repressor that controls the radiation and desiccation response in Deinococcota bacteria. This domain adopts a novel fold consisting of three α helices and is required for DdrO dimerisation. The N-terminal region of DdrO contains a helix-turn-helix DNA-binding domain ( ), connected to this C-terminal domain by a flexible linker. DdrO binds to radiation/desiccation response motif (RDRM) sites and represses stress-induced genes. Following DNA damage, the metalloprotease IrrE cleaves DdrO in the loop between the last two helices of this domain, abolishing both dimerisation and DNA binding. The cleavage site is hidden in the DdrO dimer, suggesting that IrrE cleaves monomers or induces a conformational change to access the site.
