identifier: InterPro:IPR006151
label: "Quinate/shikimate 5-dehydrogenase/glutamyl-tRNA reductase"
definition: >-
  This entry represents a domain found in shikimate and quinate dehydrogenases, as well as glutamyl-tRNA reductases. Shikimate 5-dehydrogenase ( ) catalyses the conversion of shikimate to 5-dehydroshikimate. This reaction is part of the shikimate pathway which is involved in the biosynthesis of aromatic amino acids. Quinate 5-dehydrogenase catalyses the conversion of quinate to 5-dehydroquinate. This reaction is part of the quinate pathway where quinic acid is exploited as a source of carbon in prokaryotes and microbial eukaryotes. Both the shikimate and quinate pathways share two common pathway metabolites, 3-dehydroquinate and dehydroshikimate. Glutamyl-tRNA reductase ( ) catalyses the first step of tetrapyrrole biosynthesis in plants, archaea and most bacteria. The dimeric enzyme has an unusual V-shaped architecture where each monomer consists of three domains linked by a long 'spinal' α-helix. The central catalytic domain specifically recognises the glutamate moiety of the substrate.
