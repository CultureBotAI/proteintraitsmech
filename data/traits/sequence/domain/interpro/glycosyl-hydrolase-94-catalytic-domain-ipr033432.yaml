identifier: InterPro:IPR033432
label: "Glycosyl hydrolase 94, catalytic domain"
definition: >-
  This is the catalytic region of the superfamily of enzymes referred to as GH94, formerly known as glycosyltransferase family GT36. ChbP is a chitobiose phosphorylase that catalyses the reversible phosphorolysis of chitobiose into alpha-GlcNAc-1-phosphate and GlcNAc with inversion of the anomeric configuration. The full-length enzyme comprises a β sandwich domain and an (α/α)(6) barrel domain. The α-helical barrel component of the domain, represented in this entry, is the catalytic region.
