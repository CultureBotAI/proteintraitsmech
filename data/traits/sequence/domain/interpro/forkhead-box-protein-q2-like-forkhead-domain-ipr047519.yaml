identifier: InterPro:IPR047519
label: "Forkhead box protein Q2-like, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXQ2 and similar sequences from animals. The FH domain is a winged helix DNA-binding domain. Forkhead box protein (FOXQ2) is the neurogenic ectoderm specification transcription factor that controls aboral development in cnidarians and anterior identity in bilaterians. It plays essential roles in epidermal development and central brain patterning. The foxQ2 gene is absent in placental mammals.
