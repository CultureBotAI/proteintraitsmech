identifier: InterPro:IPR035632
label: "UBASH3B, SH3 domain"
definition: >-
  This entry represents the SH3 domain of UBASH3B. The TULA family includes two members termed p70/STS-1/TULA-2 and UBASH3A/STS-2/TULA/Cbl-InteractingProtein 4 (CLIP4). TULA proteins contain an N-terminal UBA domain, a central SH3 domain, and a C-terminal histidine phosphatase domain. They bind c-Cbl (a multidomain adaptor and an E3 ubiquitinligase) through the SH3 domain and to ubiquitin via UBA.
