identifier: InterPro:IPR063569
label: "Coiled-coil domain-containing protein SCD2, C-terminal"
definition: >-
  This entry represents the C-terminal domain of Coiled-coil domain-containing protein SCD2 from Arabidopsis thaliana and similar plant sequences. This domain may adopt an all-helical fold consisting of eigth α-helices. SCD2 is involved in growth and development through its role in cytokinesis and polarised cell expansion. It is required for plasma membrane internalisation and functions in clathrin-mediated membrane trafficking, including plasma membrane endocytosis. SCD2 localises to the cell membrane as a peripheral membrane protein and to clathrin-coated vesicles. The protein contains predicted coiled-coil regions and disordered regions.
