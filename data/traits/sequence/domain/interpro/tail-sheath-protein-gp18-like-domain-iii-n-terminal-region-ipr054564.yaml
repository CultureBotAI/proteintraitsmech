identifier: InterPro:IPR054564
label: "Tail sheath protein Gp18-like, domain III N-terminal region"
definition: >-
  This entry represents the N-terminal segment of domain III from the phage tail sheath protein Gp18 y similar sequences. Domain III is completed by with an overall structure consisting of a β-sheet with five parallel and one anti-parallel β-strands plus six α-helices, which surround the β-sheet.
