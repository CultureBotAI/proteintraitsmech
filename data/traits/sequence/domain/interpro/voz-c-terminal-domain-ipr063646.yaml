identifier: InterPro:IPR063646
label: VOZ, C-terminal domain
definition: >-
  This entry represents a DNA-binding domain found towards the C-terminal of transcription factor VOZ1 and VOZ2 from plants. VOZ proteins are vascular plant transcription factors that regulate flowering downstream of phytochrome B signalling.
