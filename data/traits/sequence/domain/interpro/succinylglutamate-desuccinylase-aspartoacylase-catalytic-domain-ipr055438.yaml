identifier: InterPro:IPR055438
label: Succinylglutamate desuccinylase/Aspartoacylase, catalytic domain
definition: >-
  This entry represents the catalytic domain found in Succinylglutamate desuccinylase (AstE), aspartoacylase (AspA) and related enzymes. AstE catalyses the fifth and last step in arginine catabolism by the arginine succinyltransferase pathway whereas AspA cleaves acylaspartate into a fatty acid and aspartate. Mutations in human AspA lead to Canavan disease. The domain represented by this entry contains the residues which are essential for catalysis and has structural similarity to catalytic domains of enzymes that are members of the Zn-dependent exopeptidases clan.
