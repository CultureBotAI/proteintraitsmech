identifier: InterPro:IPR017880
label: "KilA, N-terminal"
definition: >-
  The N-terminal module of the D6R/N1R proteins defines a novel, conserved DNA-binding domain (the KilA-N domain) that is found in a wide range of proteins of large bacterial and eukaryotic DNA viruses. The KilA-N domain is suggested to be homologous to the fungal DNA-binding APSES domain. The KilA-N and APSES domains may also share a common fold with the nucleic acid-binding modules of the LAGLIDADG nucleases and the N-terminal domains of the tRNA endonuclease. This domain is also found in host range factor p28 from poxvirus, a RING-finger E3 ubiquitin ligase which catalyses the formation of both 'Lys-48'- and 'Lys-63'-linked polyubiquitin chains. p28 plays an important role in virulence by acting as an anti-apoptotic factor.
