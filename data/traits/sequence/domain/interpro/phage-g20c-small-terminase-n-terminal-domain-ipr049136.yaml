identifier: InterPro:IPR049136
label: "Phage G20C small terminase, N-terminal domain"
definition: >-
  This entry represents the N-terminal helix-turn-helix domain of the terminase small subunit (TerS) from Thermus phage G20c ( ), which oligomerises into a nonamer that binds DNA, stimulates terminase large subunit (TerL) ATPase activity, and inhibits TerL nuclease activity ( ).
