identifier: InterPro:IPR054363
label: "Glycosyl hydrolase family 95, catalytic domain"
definition: >-
  This entry represents the central catalytic domain of proteins from the GH95 family of glycosyl hydrolases, including Alpha-1,2-fucosidase 2 from Arabidopsis thaliana, which catalyses the hydrolysis of an alpha-1,2-linked fucose. A member of this family, FucOB from A. muciniphila was shown to hydrolyse all three types of H antigen structures to obtain the afucosylated Bombay phenotype. This domain shows an (α/α)6 helical barrel topology.
