identifier: InterPro:IPR041862
label: "Endoplasmic reticulum resident protein 44, second TRX-like domain b"
definition: >-
  This entry represents the second redox inactive TRX-like domain b found in endoplasmic reticulum resident protein 44 (ERp44). ERp44 is an endoplasmic reticulum (ER)-resident protein that is induced during stress and retrieves some ER-resident enzymes and immature oligomers of secretory proteins from the Golgi [4]. It contains three thioredoxin (Trx)-like domains (a, b, and b'), followed by a C-terminal extension (C tail), with the domain a containing a unique CRFS motif whose cysteine (Cys29) forms mixed disulfide bonds with client proteins to promote their thiol-dependent retention. Through these reversible mixed disulfides, ERp44 mediates the ER localisation of Ero1alpha, a protein that oxidizes protein disulfide isomerases into their active form, and prevents the secretion of unassembled cargo proteins with unpaired cysteines. Additionally, ERp44 modulates the activity of inositol 1,4,5-triphosphate type I receptor (IP3R1), an intracellular channel protein that mediates calcium release from the ER to the cytosol. Similar to PDI, the b domain of ERp44 is likely involved in binding to substrates. Interestingly, the interactions between ERp44 and client proteins are pH-dependent.
