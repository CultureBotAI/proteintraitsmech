identifier: InterPro:IPR010907
label: "Calcium-mediated lectin"
definition: >-
  This entry represents calcium-mediated lectins. Structures have been determined for both fucose-binding lectin II (PA-IIL) and mannose-specific lectin II (RS-IIL). These proteins have homologous structures, their monomers consisting of a 9-stranded β sandwich with Greek-key topology. Each monomer contains two calcium ions that mediate an exceptionally high binding affinity to the monosaccharide ligand in a recognition mode unique among carbohydrate-protein interactions. In Pseudomonas aeruginosa, PA-IIL contributes to the pathogenic virulence of the bacterium, functioning as a tetramer when binding fucose. In the plant pathogen Ralstonia solanacearum (Pseudomonas solanacearum), RS-IIL recognises fucose, but displays much higher affinity to mannose and fructose, which is opposite to the preference of PA-IIL. This entry also includes Thrombocorticin which binds to fucose and mannose in a calcium-dependent manner. This protein acts as an agonist for human thrombopoietin receptor MPL.
