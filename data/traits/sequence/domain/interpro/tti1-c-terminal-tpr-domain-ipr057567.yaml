identifier: InterPro:IPR057567
label: "TTI1, C-terminal TPR domain"
definition: >-
  This entry represents the TPR domain found at the C-terminal of TELO2-interacting protein 1 homologue (TTI1) from animals and yeast. This domain binds to HEAT repeats of the ATM PIKK. TTI1 binds to TELO2 and TTI2 proteins to form the TTT complex, which plays a role in the assembly and stability of all phosphatidylinositol 3-kinase-related protein kinases (PIKKs), pivotal proteins in various pathways related to cell metabolism, proliferation and differentiation. The TTT complex is involved in the cellular resistance to DNA damage stresses, like ionizing radiation (IR), ultraviolet (UV) and mitomycin C (MMC). Budding yeast TTI1 is a subunit of the ASTRA complex, which is involved in chromatin remodelling.
