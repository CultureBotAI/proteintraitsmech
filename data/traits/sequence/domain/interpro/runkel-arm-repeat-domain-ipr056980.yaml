identifier: InterPro:IPR056980
label: "RUNKEL, ARM-repeat domain"
definition: >-
  This is the C-terminal domain of Serine/threonine-protein kinase RUNKEL from Arabidopsis thaliana and related plant sequences. It consists of ARM repeats. RUNKEL is an essential protein that regulates phragmoplast microtubule organisation during cell plate expansion in cytokinesis during cell division, both somatic and syncytial.
