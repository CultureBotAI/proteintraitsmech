identifier: InterPro:IPR022135
label: "Distal-less-like homeobox protein, N-terminal domain"
definition: >-
  This domain is found in eukaryotes, and is approximately 80 amino acids in length. It is found in association with . It is found at the N terminus of a homeobox protein involved in embryonic development and adult neural regeneration.
