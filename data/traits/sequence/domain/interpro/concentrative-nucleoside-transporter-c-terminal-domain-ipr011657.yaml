label: "Concentrative nucleoside transporter C-terminal domain"
definition: >-
  The concentrative nucleoside transporter (CNT) (TC 2.A.41) family includes , which is a purine-specific Na + -nucleoside cotransporter localised to the bile canalicular membrane. It also includes , a Na + -dependent nucleoside transporter selective for pyrimidine nucleosides and adenosine, which also transports the anti-viral nucleoside analogues AZT and ddC. This entry covers the C terminus of this family of transporters.
