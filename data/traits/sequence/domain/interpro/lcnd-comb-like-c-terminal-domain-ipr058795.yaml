identifier: InterPro:IPR058795
label: "LcnD/ComB-like, C-terminal domain"
definition: >-
  This domain is found in the Lactococcin A secretion protein LcnD from Lactococcus lactis and related proteins, including Transport protein ComB and Mesentericin Y105 secretion protein MesE. The domain represented in this entry folds into a six-stranded closed β-barrel with a greek-key topology which has a structural similarity to the C-terminal domain of alanine racemase. This domain is interrupted by the barrel-sandwich hybrid domain which is inserted after the first β-strand of the barrel. This model does not include the N-terminal strand. LcnD is a protein involved in the secretion system of lactococcin A. As a part of this system it interacts with LcnC. ComB belongs to the membrane fusion protein family and is required for induction of competence for genetic transformation. The full-length protein contains a single transmembrane helix and is localised to the cell membrane. ComB shows homology to lactococcin A secretion proteins and is classified in the MesE/LcnD family.
