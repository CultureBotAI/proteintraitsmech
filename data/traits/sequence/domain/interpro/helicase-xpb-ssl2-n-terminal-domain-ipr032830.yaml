identifier: InterPro:IPR032830
label: "Helicase XPB/Ssl2, N-terminal domain"
definition: >-
  This domain is found in the N-terminal region of XPB/Ssl2. XPB/Ssl2 is a component of RNA polymerase transcription factor TFIIH holoenzyme required for DNA unwinding during transcription initiation. It plays a dual role in transcription and DNA repair.
