identifier: InterPro:IPR058052
label: "ERCC6L2-like, DEXH-box helicase domain"
definition: >-
  This domain contains the ATP-binding region in human ERCC6L2 and similar proteins from eukaryotes, including Switch 2 from Arabidopsis thaliana, which is thought to be a chromatin remodelling factor. ERCC excision repair 6 like 2 (ERCC6L2, also known as RAD26L) is a member of the DEAD-like helicase superfamily, a diverse group of proteins involved in ATP-dependent RNA or DNA unwinding. ERCC6L2 may contribute to both DNA repair and mitochondrial function, and in humans, mutations in the ERCC6L2 gene are linked to bone marrow failure syndrome 2. This protein plays a role in DNA double-strand break (DSB) repair by restricting DNA end resection, thereby contributing to the maintenance of genomic stability.
