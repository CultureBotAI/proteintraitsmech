identifier: InterPro:IPR059978
label: "Cephalotoxin, second domain"
definition: >-
  This entry represents the C-terminal domain in Cephalotoxin-like protein. The Cephalotoxin-like protein is a secreted protein found in the coral Acropora millepora and is a component of the organic matrix of the aragonitic skeleton. The full-length protein contains 473 amino acids and includes coiled-coil regions. This domain is composed by β-sheets and α-helices. The function of this domain remains to be determined.
