identifier: InterPro:IPR057377
label: "Connectase MJ0548-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of Connectase MJ0548 from Methanocaldococcus jannaschii and similar archaeal sequences. This protein is a sequence-specific protein ligase. MJ0548 is a distant, monomeric proteasome homologue which connects proteins in a sequence-specific manner. It shows a mainly β structure and one α-helix.
