identifier: InterPro:IPR037635
label: VTS1, SAM domain
definition: >-
  VTS1 participates in regulation of transcript stability and degradation, and may be involved in vacuolar protein transport regulation. In budding yeasts, VTS1 induces mRNA degradation via the major deadenylation-dependent mRNA decay pathway; VTS1 recruits CCR4/POP2/NOT deadenylase complex to target mRNA. The recruitment is the initial step resulting in poly(A) tail removal transcripts. The SAM (sterile alpha motif) domain of VTS1 is a C-terminal RNA binding domain. This domain interacts with stem-loop structures of mRNA.
