identifier: InterPro:IPR055563
label: "Cell division protein A, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of CdpA (Cell division protein A, HVO_0739, ) from Haloferax volcanii and similar archaeal proteins. CdpA is a ring assembly and anchor protein. It forms part of an anchor complex linked to FtsZ2 and other cell division proteins. This domain, which is predicted to show four transmembrane helices, possibly together with the linker region of CdpA, are important for CdpA midcell localisation, FtsZ1 ring condensation, and FtsZ2 ring assembly and positioning. In CdpA and other members of this group, this domain is found associated with . In some other members these domains are associated with repeats of . AlphaFold predicts a confident dimeric structure for this domain.
