identifier: InterPro:IPR041364
label: "Rubredoxin binding domain"
definition: >-
  This is the C-terminal domain found in rubredoxin reductase (RdxR) present in Pseudomonas aeruginosa. RdxR are important in prokaryotes as they allow for the metabolism of inert n-alkanes and RdxR is also crucial for archaea and anaerobic bacteria in the response to oxidative stress. This domain is known to recognise and bind to rubredoxin.
