identifier: InterPro:IPR048970
label: "Single-stranded DNA binding protein Ssb-like, OB fold"
definition: >-
  This entry represents the OB fold domain of single-stranded DNA binding protein Ssb from archaea and its homologues from mammals and plants such as the SOSS complex subunits B1 and B2. Members of this entry have a simple domain organisation consisting of a single DNA-binding OB fold coupled to a flexible C-terminal tail. The ssDNA recognition is modulated by base-stacking of three key aromatic residues in archaeal Ssb, in contrast with the OB domain of the human homologue hSSB1.
