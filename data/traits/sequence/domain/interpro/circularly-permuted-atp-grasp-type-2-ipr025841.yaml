identifier: InterPro:IPR025841
label: "Circularly permuted ATP-grasp type 2"
definition: >-
  Circularly permuted ATP-grasp prototyped by Roseiflexus RoseRS_2616 that is associated in gene neighbourhoods with a GCS2-like COOH-NH2 ligase, α/β hydrolase fold peptidase, GAT-II -like amidohydrolase, and M20 peptidase. Members of this family are predicted to be involved in the biosynthesis of small peptides.
