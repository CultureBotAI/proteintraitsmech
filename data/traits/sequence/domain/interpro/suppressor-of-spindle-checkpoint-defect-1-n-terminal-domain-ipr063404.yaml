identifier: InterPro:IPR063404
label: "Suppressor of spindle checkpoint defect 1, N-terminal domain"
definition: >-
  This entry represents the N-terminal TPR-like domain found in suppressor of spindle checkpoint defect 1 (such-1) and related proteins. Such-1 belongs to the APC5 family and is a component of the anaphase promoting complex/cyclosome (APC/C), a cell cycle-regulated E3 ubiquitin ligase that controls progression through mitosis and the G1 phase of the cell cycle. The APC/C complex acts by mediating ubiquitination and subsequent degradation of target proteins. This domain is found in nematodes in proteins such as such-1 and gfi-3 in Caenorhabditis elegans, which are required for the metaphase to anaphase transition in meiosis. The specific function of this N-terminal domain remains to be determined.
