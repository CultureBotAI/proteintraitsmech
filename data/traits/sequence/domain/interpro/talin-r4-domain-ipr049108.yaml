identifier: InterPro:IPR049108
label: "Talin, R4 domain"
definition: >-
  Talin is a cytoskeletal protein that plays a critical role in the formation of cell adhesions and regulation of integrin signalling. It activates integrins, couples them to F-actin, and recruits vinculin to focal adhesions. It is a long protein comprising an N-terminal globular head and a long C-terminal rod which has 13 helical bundles (R1-R13) organized into a compact cluster of four-helical bundles (R2-R4) within a linear chain of five-helical bundles. Nine of the helical bundles contain vinculin-binding sites (VBS), one of them is R4, represented in this entry.
