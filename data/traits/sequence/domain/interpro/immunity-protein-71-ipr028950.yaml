identifier: InterPro:IPR028950
label: "Immunity protein 71"
definition: >-
  This entry represents a predicted immunity protein with a mostly α-helical fold and conserved arginine and phenylalanine residues. Proteins containing this domain are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, which usually contains toxin domains of the Ntox48 family. This domain is often fused to the Imm72 immunity domain.
