identifier: InterPro:IPR006642
label: Rad18, zinc finger UBZ4-type
definition: >-
  The ubiquitin-binding zinc finger (UBZ) is a type of zinc-coordinating β-β-α fold domain found mainly in proteins involved in DNA repair and transcriptional regulation. UBZ domains coordinate a zinc ion with cysteine or histidine residues; depending on their amino acid sequence, UBZ domains are classified into several families. Type 1 UBZs are CCHH-type zinc fingers found in tandem UBZ domains of TAX1-binding protein 1 (TAX1BP1), type 2 UBZs are CCHC-type zinc fingers found in FAAP20 which is a subunit of the Fanconi anemia (FA) core complex, type 3 UBZs are CCHH-type zinc fingers found only in the Y-family translesion polymerase eta, and type 4 UBZs are CCHC-type zinc fingers found in Y-family translesion polymerase kappa, Werner helicase-interacting protein 1 (WRNIP1), and Rad18. This entry represents type 4 UBZ found in RAD18. The domain is a potential zinc finger for nucleic acid binding and a putative nucleotide binding sequence. Human RAD18 accumulates very rapidly and remains for a long period of time at sites of different types of DNA damage, and is required of DNA. RAD18 appears to respond to DNA damage in two distinct ways: replication-dependent and replication-independent. The RAD18-type zinc finger located in the middle of RAD18 is responsible for the replication-independent accumulation of RAD18 following DNA damage, while a second zinc finger, SAP-type, is responsible for replication-dependent accumulation.
