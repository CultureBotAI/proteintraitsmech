identifier: InterPro:IPR059669
label: "AtcB, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of adaptation to cold protein B (AtcB) found primarily in Shewanella and related marine bacteria. AtcB is a protein of approximately 252 amino acids that modulates RNA polymerase activity and is involved in cold adaptation. The protein interacts with RNA polymerase subunits RpoB and RpoC and with AtcC. AtcB is part of the atcJABC operon and deletion leads to reduced growth at low temperature. The function of this specific domain remains to be determined.
