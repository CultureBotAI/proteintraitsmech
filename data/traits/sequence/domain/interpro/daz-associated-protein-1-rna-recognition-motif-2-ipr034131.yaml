identifier: InterPro:IPR034131
label: DAZ-associated protein 1, RNA recognition motif 2
definition: >-
  This entry represents the RNA recognition motif 2 of DAZAP1. DAZAP1, initially identified as a binding partner of Deleted in Azoospermia (DAZ), is a multi-functional ubiquitous RNA-binding protein expressed most abundantly in the testis and is essential for normal cell growth, development, and spermatogenesis. DAZAP1 is a shuttling protein whose acetylated form is predominantly nuclear and the nonacetylated form is in cytoplasm. DAZAP1 also functions as a translational regulator that activates translation in an mRNA-specific manner. It also interacts with numerous hnRNPs, including hnRNP U, hnRNP U like-1, hnRNPA1, hnRNPA/B, and hnRNP D, suggesting DAZAP1 might associate and cooperate with hnRNP particles to regulate adenylate-uridylate-rich elements (AU-rich element or ARE)-containing mRNAs. DAZAP1 contains two N-terminal RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), and a C-terminal proline-rich domain. This entry also includes the orthologue from Drosophila melanogaster Heterogeneous nuclear ribonucleoprotein 27C (Rbp7).
