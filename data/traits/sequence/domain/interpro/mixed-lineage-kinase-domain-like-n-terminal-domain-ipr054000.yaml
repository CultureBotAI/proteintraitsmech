identifier: InterPro:IPR054000
label: "Mixed lineage kinase domain-like, N-terminal domain"
definition: >-
  Mixed-lineage kinase domain-like (MLKL) is crucial for necroptosis, permeabilising membranes via its N-terminal domain upon phosphorylation of its kinase-like domain by RIP3. The MLKL N-terminal domain forms a four-helical up-and-down bundle that is sufficient to induce liposome leakage and a fifth C-terminal helix that inhibits this activity.
