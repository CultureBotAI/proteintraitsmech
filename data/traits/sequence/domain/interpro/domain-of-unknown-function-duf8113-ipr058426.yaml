identifier: InterPro:IPR058426
label: "Domain of unknown function DUF8113"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in archaea. The proteins containing this domain are predominantly found in the class Halobacteria, which includes genera such as Halorubrum, Haloarculaceae, and Haloferacaceae. These proteins are typically found in extreme halophilic environments. The proteins in this family generally range from 88 to 138 amino acids in length. AlphaFold3 predicts this protein can form a homodimer (ipTM=0.81 pTM=0.81) which is composed of a four stranded β sheet with a pair of helices packed on one side and two stacked pairs of helices on the other.
