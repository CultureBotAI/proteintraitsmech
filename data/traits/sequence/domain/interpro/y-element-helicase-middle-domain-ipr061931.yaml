identifier: InterPro:IPR061931
label: "Y' element helicase, middle domain"
definition: >-
  This entry represents the middle helical domain of Y' element ATP-dependent helicases from Saccharomyces cerevisiae. These helicases catalyse DNA unwinding and are involved in telomerase- independent telomere maintenance. The proteins are induced in the absence of telomerase TLC1 and belong to the yeast subtelomeric Y' repeat subfamily of helicases. The helicases contain helicase ATP-binding and C-terminal domains in addition to this middle domain.
