identifier: InterPro:IPR046352
label: MTMR3, protein tyrosine phosphatase domain
definition: >-
  This entry represents the protein tyrosine phosphatase domain of Myotubularin-related protein 3 (MTMR3). MTMR3 specifically dephosphorylates the D-3 position of phosphatidylinositol 3-phosphate and phosphatidylinositol 3,5-bisphosphate, generating phosphatidylinositol and phosphatidylinositol 5-phosphate. It may also de-phosphorylate proteins phosphorylated on Ser, Thr, and Tyr residues. This enzyme has shown to play a regulatory role in the regulation of abscission, the final step of mitosis, and innate immune responses to viral DNA through the modulation of STING trafficking.
