identifier: InterPro:IPR061814
label: "Domain of unknown function DUF8753"
definition: >-
  This entry represents an N-terminal domain of approximately 90 residues found in proteins annotated as quinate 5-dehydrogenase. This domain is structurally distinct from the C-terminal catalytic region. This family is found in bacteria, predominantly Bacillota (especially Clostridia) and Pseudomonadota. The function of this domain remains to be determined.
