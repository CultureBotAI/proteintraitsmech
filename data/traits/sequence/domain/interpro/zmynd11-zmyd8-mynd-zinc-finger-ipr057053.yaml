identifier: InterPro:IPR057053
label: "ZMYND11/ZMYD8, MYND zinc finger"
definition: >-
  This entry represents the MYND zinc finger from ZMYND11 and ZMYND8 from human and related sequences. These are chromatin readers that recognise methylated histones; ZMYND11 recognises H3.3 trimethylated at 'Lys-36' (H3.3K36me3) and regulates RNA polymerase II elongation. ZMYND8 recognises histone H3.1 dimethylated at 'Lys-36' and histone H4 acetylated at 'Lys-16' and histone H3 methylated at 'Lys-4' and histone H4 acetylated at 'Lys-14'.
