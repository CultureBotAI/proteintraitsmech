identifier: InterPro:IPR049730
label: "SNF2/RAD5-like, C-terminal helicase domain"
definition: >-
  This entry represents the C-terminal helicase domain of yeast DNA repair and recombination protein RAD54 and similar sequences from all domains in life. The Sucrose Non-Fermenting (SNF) family includes chromatin-remodeling factors, such as CHD proteins and SMARCA proteins, recombination proteins Rad54, and many others. They are DEAD-like helicases belonging to superfamily (SF)2, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. Similar to SF1 helicases, SF2 helicases do not form toroidal structures like SF3-6 helicases. Their helicase core consists of two similar protein domains that resemble the fold of the recombination protein RecA.
