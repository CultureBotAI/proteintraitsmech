label: HpcH/HpaI aldolase/citrate lyase domain
definition: >-
  This domain is found in a number of proteins, including 2-keto-3-deoxy-L-rhamnonate aldolase, 5-keto-4-deoxy-D-glucarate aldolase and citrate lyase subunit beta. This domain has a TIM-barrel fold.
