identifier: InterPro:IPR063644
label: "Sperm-activating peptide, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain found in sperm-activating peptide precursor proteins from Strongylocentrotus purpuratus. This precursor protein contains multiple copies of speract and speract-like peptides that cause stimulation of sperm respiration and motility through intracellular alkalinisation, transient elevations of cAMP, cGMP and calcium levels in sperm cells. The specific function of this C-terminal domain remains to be determined. This domain contains a pectate lyase-like fold.
