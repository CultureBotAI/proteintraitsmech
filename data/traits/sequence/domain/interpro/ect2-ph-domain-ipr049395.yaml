identifier: InterPro:IPR049395
label: "ECT2, PH domain"
definition: >-
  ECT2 (Epithelial Cell Transforming Sequence 2) is a guanine nucleotide exchange factor (GEF) that catalyses the exchange of GDP for GTP. It is a cell cycle regulator that plays key roles in cytokinesis. ECT2 contains triple copies of the BRCT domain (BRCT0, BRCT1 and BRCT2 at the N-terminal, separated from the C-terminal DH and PH domains by a linker of about 100 residues. This entry represents the PH domain. The BRCT and DH-PH domains mediate intra-molecular interactions that restrains ETC2 activity during interphase.
