identifier: InterPro:IPR034892
label: "NADPH oxidase regulator NoxR, PB1 domain"
definition: >-
  The PB1 domain is present in the Epichloe festucae NoxR protein (NADPH oxidase regulator), a key regulator of NADPH oxidase isoform, NoxA. NoxA is essential for growth control of the fungal endophyte in plant tissue in the process of symbiotic interaction between a fungi and its plant host. The Epichloe festucae p67(phox)-like regulator, NoxR, is dispensable in culture but essential in plants for the symbiotic interaction. The PB1 domain of NoxR is essential for localization to the hyphal tip.
