identifier: InterPro:IPR060664
label: "Retinitis pigmentosa 9 protein, C-terminal"
definition: >-
  This entry represents the C-terminal region of retinitis pigmentosa 9 protein (RP9), also known as Pim-1-associated protein (PAP-1). The full-length protein is found in mammals and is localised to the nucleus. RP9 is thought to be a target protein for the PIM1 kinase and may play roles in B-cell proliferation. The protein contains a central CCHC-type zinc finger domain and phosphorylation sites for PIM1 kinase in the C-terminal region. Mutations in human RP9 cause retinitis pigmentosa 9, an autosomal dominant retinal dystrophy. The specific function of this C-terminal domain remains to be determined.
