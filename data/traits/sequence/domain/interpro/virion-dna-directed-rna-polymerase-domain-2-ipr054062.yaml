identifier: InterPro:IPR054062
label: "Virion DNA-directed RNA polymerase domain 2"
definition: >-
  This domain is found in Virion DNA-directed RNA polymerase from Bacteriophage N4 (vRNAP), which is injected into the host upon infection and transcribes the phage early genes from promoters that have a 5-bp stem-3 nt loop hairpin structure. This entry represents a region located C-terminal to the mini-vRNAP, which possesses all RNAP functions.
