identifier: InterPro:IPR015646
label: Nuclear factor of activated T-cells 5, Rel homology domain, DNA-binding domain
definition: >-
  Nuclear factor of activated T-cells 5 (NFAT5) is a member of the nuclear factors of activated T cells (NFAT) of transcription factors. Proteins belonging to this family play a central role in inducible gene transcription during the immune response. This protein regulates gene expression induced by osmotic stress in mammalian cells. NFAT5, regulated by DDX5/DDX17, plays a role in the migratory capacity of breast cancer cells. Unlike monomeric members of this protein family, this protein exists as a homodimer and forms stable dimers with DNA elements. Five transcript variants encoding three different isoforms have been identified for this gene. NFAT proteins appear to be regulated primarily at the level of their subcellular localisation. They are found exclusively in the cytoplasm of resting T cells, and consist of 2 components: a pre-existing cytoplasmic component that translocates into the nucleus on calcium mobilisation, and an inducible nuclear component comprising members of the activating protein-1 (AP-1) family of transcription factors. In response to antigen receptor signalling, the calcium-regulated phosphatase calcineurin acts directly to dephosphorylate NFAT proteins, causing their rapid translocation from the cytoplasm to the nucleus, where they cooperatively bind their target. The Rel homology domain (RHD) is found in a family of eukaryotic transcription factors, which includes NF-kappaB, Dorsal, Relish, NFAT, among others. The RHD is composed of two structural domains: the N-terminal DNA binding domain that is similar to that found in P53, the C-terminal domain has an immunoglobulin-like fold (See ) that functions as a dimerisation domain. This entry represents the N-terminal DNA binding domain.
