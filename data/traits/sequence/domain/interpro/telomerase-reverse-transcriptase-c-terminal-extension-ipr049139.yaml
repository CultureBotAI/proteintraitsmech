identifier: InterPro:IPR049139
label: "Telomerase reverse transcriptase, C-terminal extension"
definition: >-
  This domain is found at the C-terminal of Telomerase reverse transcriptase (TERT), a ribonucleoprotein enzyme essential for the replication of chromosome termini in most eukaryotes. This entry represents the C-terminal extension (also known as the thumb domain), which forms an α-helical bundle ( ). There are three conserved motifs in this domain involved in nucleic acid binding. In humans, single mutations localised within this portion of telomerase are associated with several bone marrow failure syndromes.
