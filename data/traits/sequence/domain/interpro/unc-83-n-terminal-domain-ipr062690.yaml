identifier: InterPro:IPR062690
label: "UNC-83 ,N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of UNC-83 proteins, which are components of LINC complexes involved in nuclear migration. The domain is approximately 85-90 amino acids in length. UNC-83 functions as a cargo-specific adaptor that connects the nuclear envelope to the microtubule cytoskeleton and is essential for proper nuclear migration during development. The protein interacts with kinesin-1 light chain proteins and dynein complexes to regulate nuclear transport along microtubules. The domain is found in nematodes and is distinct from the C-terminal KASH domain that mediates nuclear envelope targeting. The specific function of this N-terminal domain remains to be determined.
