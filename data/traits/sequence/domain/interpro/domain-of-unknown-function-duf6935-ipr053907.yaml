label: "Domain of unknown function DUF6935"
definition: >-
  This is a domain found in uncharacterised bacterial proteins either as standalone or in combination with other domains. It is remotely related to soluble lipid-binding protein MlaC and it is predicted to adopt a similar structure with a typical NTF2-like topology.
