identifier: InterPro:IPR021122
label: "RNA ligase domain, REL/Rln2"
definition: >-
  This entry represents the RNA ligase domain. RNA ligase enzyme repairs RNA strand breaks in nicked DNA:RNA and RNA:RNA but not in DNA:DNA duplexes. Members of this RNA ligase family include: RNA editing ligase 1 (REL1), which is essential for RNA editing and may be active in U-deletion editing. RNA editing ligase 2 (REL2), which may be active in U-insertion editing. RnlB RNA ligase 2 (or Rnl2), second RNA ligase of Enterobacteria phage T4 (Bacteriophage T4); unlike RNA ligase 1, RnlB prefers doule stranded substrates. For the RNA-editing ligases Rel1 and Rel2 from Trypanosoma brucei brucei, Mg(2+) may play an important role both for nucleic acid binding and for activation of the nucleophile.
