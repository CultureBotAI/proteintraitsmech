identifier: InterPro:IPR028727
label: Chromodomain-helicase-DNA-binding protein 5, DEAH-box helicase domain
definition: >-
  There are nine members of the Chromodomain, Helicase, DNA-binding (CHD) family. They are characterised by two chromodomains arranged in tandem, N-terminal to the ATPase/helicase domain. Chromodomains are comprised of a β-sheet folded against an α-helix that collectively mediates binding to methyl-lysine residues. Chromodomain-helicase-DNA-binding protein 5 (CHD5) is a chromatin-remodeling protein that binds DNA through histones and regulates gene transcription. It is thought to specifically recognize and bind trimethylated 'Lys-27' (H3K27me3) and non-methylated 'Lys-4' of histone H3 and plays a role in the development of the nervous system by activating the expression of genes promoting neuron terminal differentiation. In parallel, it may also positively regulate the trimethylation of histone H3 at 'Lys-27' thereby specifically repressing genes that promote the differentiation into non-neuronal cell lineages. As a tumor suppressor, it regulates the expression of genes involved in cell proliferation and differentiation. CHD5 is almost exclusively expressed in brain and testis. It probably regulates histone hyperacetylation and the replacement of histones by transition proteins in chromatin, being required for spermatogenesis and chromatin condensation. CHD5 plays a role in the development of the nervous system.
