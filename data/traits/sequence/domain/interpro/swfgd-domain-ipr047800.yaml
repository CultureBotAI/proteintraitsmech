identifier: InterPro:IPR047800
label: "SWFGD domain"
definition: >-
  This entry represents a small (29 amino acids long) uncharacterised domain that is named after its conserved SWFGD motif. This domain is found in protein sequences containing a DUF2171 domain or a BON domain, suggesting a possible involvement in attachment to phospholipid membranes. Two copies of the SWFGD domain may be found in a single protein.
