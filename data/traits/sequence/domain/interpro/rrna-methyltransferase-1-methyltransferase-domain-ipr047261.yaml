identifier: InterPro:IPR047261
label: "rRNA methyltransferase 1, methyltransferase domain"
definition: >-
  This entry represents the methyltransferase domain of MRM1. This entry includes rRNA methyltransferase 1, mitochondrial (MRM1) from mammals and yeast, and similar proteins from eukaryotes, which are SpoU-type (class IV) methyltransferases. MRM1 from humans is a S-adenosyl-L-methionine-dependent 2'-O-ribose methyltransferase that catalyses the formation of 2'-O-methylguanosine at position 1145 (Gm1145) in the 16S mitochondrial large subunit ribosomal RNA (mtLSU rRNA), a universally conserved modification in the peptidyl transferase domain of the mtLSU rRNA.
