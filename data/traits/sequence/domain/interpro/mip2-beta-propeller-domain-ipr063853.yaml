identifier: InterPro:IPR063853
label: "MIP2, beta-propeller domain"
definition: >-
  This entry represents the β-propeller domain found at the N-terminal of MAG2-interacting protein 2 (MIP2) from Arabidopsis thaliana and related plant sequences. MIP2 is essential for the proper maturation of seed storage proteins in plants. It forms a complex in the endoplasmic reticulum with MAG2, ZW10/MIP1, and MIP3. This complex is likely involved in the efficient transport of seed storage proteins, ensuring their correct processing and delivery within the cell. The coordinated action of these proteins is crucial for the development and storage of nutrients in seeds, which are vital for plant reproduction and growth.
