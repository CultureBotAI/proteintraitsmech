identifier: InterPro:IPR027992
label: "Possible tRNA binding domain"
definition: >-
  This domain, found at the C terminus of tRNA(Met) cytidine acetyltransferase, may be involved in tRNA-binding. tRNA(Met) cytidine acetyltransferase TmcA catalyses the formation of N(4)-acetylcytidine (ac4C) at the wobble position of tRNA(Met), by using acetyl-CoA as an acetyl donor and ATP (or GTP).
