identifier: InterPro:IPR048468
label: "MACPF protein, D2 domain"
definition: >-
  This domain is found in proteins of the membrane-attack complex/perforin (MACPF) family from Bacteroidetes. These transmembrane pore- forming proteins are organised into three structured domains: an MACPF domain and two C-terminal domains, D2 and D3. This entry represents the D2 domain, which adopts an α/β fold.
