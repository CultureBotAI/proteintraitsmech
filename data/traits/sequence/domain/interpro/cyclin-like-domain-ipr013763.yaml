identifier: InterPro:IPR013763
label: "Cyclin-like domain"
definition: >-
  This cyclin-like domain is found in cyclins, but it is also found as the core domain in transcription factor IIB (TFIIB) and in the retinoblastoma tumour suppressor. It consists of a duplication of a fold consisting of 5 helices, one of them surrounded by the others.
