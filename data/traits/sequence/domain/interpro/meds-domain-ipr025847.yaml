identifier: InterPro:IPR025847
label: "MEDS domain"
definition: >-
  The MEDS (MEthanogen/methylotroph DcmR Sensory) domain is prototyped by DcmR and is likely to function with the PocR domain in certain organisms in sensing hydrocarbon derivatives The MEDS domain occurs fused to Histidine Kinase and as standalone version. Sequence analysis shows that it is a catalytically inactive version of the P-loop NTPase domain of the RecA superfamily.
