identifier: InterPro:IPR049104
label: "Tail spike protein-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Tail spike protein from Shigella phage Sf6 ( ). This protein specifically mediates the attachment to their hosts. Its structure revealed a conserved architecture with a central, right-handed β-helix. The C-terminal domain adopts a β-sandwich fold and is reminiscent of viral capsid proteins ( ).
