identifier: InterPro:IPR056795
label: "PAC1-like, LisH-like dimerisation domain"
definition: >-
  This entry represents a presumed LisH-like dimerisation domain found at the N terminus of the Nuclear distribution protein PAC1 and related proteins, including Lissencephaly-1 homolog (Lis1) and Nuclear distribution protein nudF. PAC1 is the yeast homologue of Lis1, which positively regulates the activity of the minus-end directed microtubule motor protein dynein. Lis1 is required for neuronal cell differentiation and is involved in the regulation of nuclear migration in hypodermal precursor cells.
