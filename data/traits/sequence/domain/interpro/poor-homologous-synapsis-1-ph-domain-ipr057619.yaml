identifier: InterPro:IPR057619
label: "Poor homologous synapsis 1, PH domain"
definition: >-
  This entry represents a pleckstrin homology (PH) domain found in Poor Homologous Synapsis from Arabidopsis thaliana (PHS1) and similar plant proteins. PHS1 is required for accurate chromosome segregation in meiosis and for pairing to occur between homologous chromosomes. It acts in early recombination steps and ensures pairing fidelity and proper repair of meiotic DNA double-strand-breaks.
