identifier: InterPro:IPR042137
label: Vertebrate SNX3, PX domain
definition: >-
  This entry represents the PX domain found in Sorting nexin-3 (SNX3) from vertebrates. In budding yeasts, Snx3 homologue has been shown to associate with early endosomes through a PX domain-mediated interaction with phosphatidylinositol-3-phosphate (PI3P). It associates with the retromer complex, a membrane coat multimeric complex required for endosomal retrieval of lysosomal hydrolase receptors to the Golgi, and functions as a cargo-specific adaptor for the retromer. SNX3 is required for the formation of multivesicular bodies, which function as transport intermediates to late endosomes. It also promotes cell surface expression of the amiloride-sensitive epithelial Na+ channel (ENaC), which is critical in sodium homeostasis and maintenance of extracellular fluid volume. The Phox Homology (PX) domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions. Sorting nexins (SNXs) make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds phosphoinositides (PIs) and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway.
