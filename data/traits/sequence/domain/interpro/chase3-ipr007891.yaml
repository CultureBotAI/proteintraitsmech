identifier: InterPro:IPR007891
label: CHASE3
definition: >-
  CHASE3 is an extracellular sensory domain, which is present in various classes of transmembrane receptors that are upstream of signal transduction pathways in bacteria. Specifically, CHASE3 domains are found in histidine kinases, adenylate cyclases, methyl-accepting chemotaxis proteins and predicted diguanylate cyclases/phosphodiesterases. This domain recognises pyrene (Matilla et.al., FEMS Microbiology Reviews, fuab043, 45, 2021, 1. https://doi.org/10.1093/femsre/fuab043).
