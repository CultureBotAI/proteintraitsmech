identifier: InterPro:IPR062157
label: "COS11, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in COS111 F-box proteins from fungi. The domain is found in COS111 proteins from Debaryomyces hansenii and Candida albicans, as well as related F-box domain-containing proteins from other fungal species. COS111 proteins are F-box proteins involved in the ubiquitin conjugation pathway. The N-terminal domain precedes the characteristic F-box domain found in these proteins. F-box proteins function as substrate recognition components of SCF ubiquitin-protein ligase complexes. This entry is found in fungal F-box proteins within the Debaryomycetaceae family and related taxa. The function of this specific domain remains to be determined.
