identifier: InterPro:IPR057448
label: "BCL-11A-like, CCHC zinc finger"
definition: >-
  This CCHC zinc finger domain is found N-terminal in the human B-cell lymphoma/leukemia 11A (BCL-11A) and related proteins including its paralogue, which shares significant similarities in structure and function, B-cell lymphoma/leukemia 11B (BCL-11B) and the Zinc finger protein 296 (ZNF296). The zinc finger represented by this entry is a variant of the classical C2H2 zinc fingers. BCL11B is a key regulator of both the differentiation and survival of T-lymphocytes during thymocyte development in mammals. It is essential for modulating the responsiveness of haematopoietic stem cells to chemotactic signals by controlling the expression of CCR7 and CCR9 receptors, which guide progenitor cell migration from the bone marrow to the thymus. In activated CD4+ T-lymphocytes, BCL11B enhances the expression interleukin-2 by regulating the IL2 promoter. It also functions as a tumour suppressor in T-cell lymphomas, potentially acting within the P53-signalling pathway, and represses transcription through direct binding to a GC-rich response element independently of TFCOUP2. BCL11A is involved in the regulation of the developmental switch from gamma- to beta-globin. This protein is associated with the BAF SWI/SNF chromatin remodelling complex. BCL11A specifically binds to 5'-GGCCGG-3' sequences and functions mainly as a transcriptional repressor.
