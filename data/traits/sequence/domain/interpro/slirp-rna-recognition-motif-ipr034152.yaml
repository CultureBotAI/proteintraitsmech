identifier: InterPro:IPR034152
label: "SLIRP, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of SLIRP, a widely expressed small steroid receptor RNA activator (SRA) binding protein, which binds to STR7, a functional substructure of SRA. SLIRP is localized predominantly to the mitochondria and plays a key role in modulating several nuclear receptor (NR) pathways. It functions as a co-repressor to repress SRA-mediated nuclear receptor co-activation. It modulates SHARP- and SKIP-mediated co-regulation of NR activity. The RNA recognition motif of SLIRP is required for SLIRP's corepression activities.
