identifier: InterPro:IPR047410
label: "Forkhead box protein O6, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXO6 and similar sequences from vertebrates. The FH domain is a winged helix DNA-binding domain. Forkhead box protein O6 (FOXO6) is a transcriptional activator of the Hippo signaling that regulates skull growth, odontogenesis and face morphology. FOXO6 can regulate diabetes-induced oxidative stress. It may play an important role on tumour invasion, metastasis and prognosis. FOXO6 knockdown inhibits cell proliferation and represses the migration and invasion of colorectal cancer cells, which also alters cellular metabolism by inhibiting glycolysis and promoting mitochondrial respiration, therefore, it is a potential target for colorectal cancer therapy. All FOXOs bind to the consensus sequence 5'-GTAAACAA-3', known as the DAF-16 family member-binding element, which includes the core sequence 5'-(A/C)AA(C/T)A-3' recognized by all FOX family members.
