identifier: InterPro:IPR054711
label: "eIF3a, PCI domain, TPR-like region"
definition: >-
  This entry represents the TPR-like region of the PCI domain of the Eukaryotic translation initiation factor 3 subunit A from Saccharomyces cerevisiae (eIF3a) and similar eukaryotic sequences. eIF3a is the RNA-binding component of the eukaryotic translation initiation factor 3 (eIF-3) complex, which is involved in protein synthesis of a specialized repertoire of mRNAs, stimulates binding of mRNA and methionyl-tRNAi to the 40S ribosome, and specifically targets and initiates translation of a subset of mRNAs involved in cell proliferation. This region folds into flatly arranged helical repeats.
