identifier: InterPro:IPR054309
label: "Nitric oxide reductase subunit B, cytochrome c-like domain"
definition: >-
  This domain is found in Nitric oxide reductase subunit B from Pseudomonas aeruginosa (NorB) and similar bacterial sequences. NorB is the large component of the anaerobic respiratory chain that transforms nitrate to dinitrogen (denitrification). This entry represents the cytochrome C-like domain of NorB, which has 12 α-helices in the transmembrane region with two heme irons and one non-heme iron.
