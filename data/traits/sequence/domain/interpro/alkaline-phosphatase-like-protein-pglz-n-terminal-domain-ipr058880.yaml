identifier: InterPro:IPR058880
label: "Alkaline phosphatase-like protein PglZ, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the PglZ protein (Alkaline phosphatase-like protein PglZ), part of the BREX (bacteriophage exclusion) systems that provide immunity against bacteriophages. This domain is found in type 2 BREX systems, previously called the phage growth limitation (Pgl) system, that confers protection against bacteriophage phiC31. The bacteria allows one cycle of phage infection, but subsequent cycles are impaired. PglZ likely functions as an antitoxin component of a type II toxin-antitoxin system, inhibiting the toxic activity of its cognate toxin PglX. Members of this group are found in actinomycetes and some species from proteobacteria and planctomycetes. This domain is found associated with and .
