identifier: InterPro:IPR032291
label: "Extracellular endo-alpha-(1->5)-L-arabinanase, C-terminal"
definition: >-
  Bacillus subtilis extracellular endo-alpha-(1->5)-L-arabinanase Abn2 comprises two domains, an N-terminal catalytic domain, with a 3D fold similar to that observed for other endo-1,5-alpha-L-arabinanases, and an additional C-terminal domain. This entry represents the C-terminal domain. It is around 100 residues in length and its function is unknown.
