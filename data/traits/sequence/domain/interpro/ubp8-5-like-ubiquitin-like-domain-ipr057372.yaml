identifier: InterPro:IPR057372
label: "UBP8/5-like, ubiquitin-like domain"
definition: >-
  This domain is found in UBP5 and UBP8 from Arabidopsis thaliana and similar plant proteins. This domain is often found associated with. Ubiquitin carboxyl-terminal hydrolases 5 and 8 (UBP5 and UBP8) recognise and hydrolyse the peptide bond at the C-terminal Gly of ubiquitin. In Arabidopsis thaliana, UBP5 is involved in the processing of poly-ubiquitin precursors as well as that of ubiquitinated proteins. In Oryza sativa subsp. japonica, UBP5 does not possess deubiquitinating enzyme activity in vitro.
