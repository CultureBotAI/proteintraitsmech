identifier: InterPro:IPR056991
label: "Thrombospondin type-1 domain-containing protein 7A/ 7B, C-terminal TSP1 domain"
definition: >-
  This entry represents the C-terminal Thrombospondin type-1 (TSP1) domain of Thrombospondin type-1 domain-containing protein 7A and 7B from vertebrates. THSD7A is a neural protein that affects endothelial migration and vascular patterning during development. THSD7A is a membrane-associated N-glycoprotein with a soluble form, the latter promotes endothelial cell migration during angiogenesis via a FAK-dependent mechanism which implies that it may be a novel neuroangiogenic factor. THSD7A has been associated with membranous nephropathy.
