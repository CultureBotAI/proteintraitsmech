identifier: InterPro:IPR041336
label: "DNA mitochondrial polymerase, exonuclease domain"
definition: >-
  This domain belongs to human mitochondrial DNA polymerase (Pol-gamma). Pol-gamma has a catalytic subunit, Pol gamma-A, which possesses both polymerase and proofreading exonuclease activities and an accessory subunit, Pol gamma-B, which accelerates polymerization rate and suppresses exonuclease activity. This domain is the exonuclease domain of the catalytic subunit, Pol gamma-A.
