identifier: InterPro:IPR048300
label: "TACO1/YebC-like, second and third domains"
definition: >-
  This entry represents a domain found in transcriptional regulators. In mammals, it activates the transcription of mitochondrially-encoded COX1. In bacteria, it negatively regulates the quorum-sensing response regulator by binding to its promoter region. This entry represents the second and third domains in this protein, with one domain nested within the other.
