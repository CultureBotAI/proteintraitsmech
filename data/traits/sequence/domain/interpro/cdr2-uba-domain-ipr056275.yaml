identifier: InterPro:IPR056275
label: "Cdr2, UBA domain"
definition: >-
  The protein kinase Cdr2 from S.pombe promotes mitotic entry by organising cortical oligomeric nodes that lead to inhibition of Wee1 which itself inhibits the cyclin-dependent kinase Cdk1. Cdr2 may act as a dosage-dependent regulator of cell size by sequestering its substrate Wee1 in cytoplasmic clusters, away from Cdk1 in the nucleus. This protein consists of a kinase domain at the N-terminal, followed by a ubiquitin-associated domain (UBA) and a KA1 domain at the C-terminal. This entry represents the UBA domain which is thought to be necessary for kinase activity.
