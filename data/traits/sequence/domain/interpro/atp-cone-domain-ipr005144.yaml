identifier: InterPro:IPR005144
label: "ATP-cone domain"
definition: >-
  The ATP-cone is an evolutionarily mobile, ATP-binding regulatory domain which is found in a variety of proteins including ribonucleotide reductases, phosphoglycerate kinases and transcriptional regulators. In ribonucleotide reductase protein R1 ( ) from Escherichia coli this domain is located at the N terminus, and is composed mostly of helices. It forms part of the allosteric effector region and contains the general allosteric activity site in a cleft located at the tip of the N-terminal region. This site binds either ATP (activating) or dATP (inhibitory), with the base bound in a hydrophobic pocket and the phosphates bound to basic residues. Substrate binding to this site is thought to affect enzyme activity by altering the relative positions of the two subunits of ribonucleotide reductase.
