identifier: InterPro:IPR029115
label: "Bacterial toxin 23"
definition: >-
  This entry represents a predicted RNase toxin found in bacterial polymorphic toxin systems. The toxin possesses an all-β fold and conserved ND and DxxR motifs and a histidine residue. In bacterial polymorphic toxin systems, the toxin is exported by the type 2 or TcdB/TcaC secretion system.
