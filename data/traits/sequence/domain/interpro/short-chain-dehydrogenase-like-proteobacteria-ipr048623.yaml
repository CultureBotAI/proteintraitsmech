identifier: InterPro:IPR048623
label: "Short chain dehydrogenase-like, proteobacteria"
definition: >-
  This family of uncharacterised proteins from proteobacteria appear to be related to other short-chain dehydrogenase enzymes. They are rather short having a Rossmann fold domain which consists of only four β-strands. Proteins in this family are primarily found in Proteobacteria.
