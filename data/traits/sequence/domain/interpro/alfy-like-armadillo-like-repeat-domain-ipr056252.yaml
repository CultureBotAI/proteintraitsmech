identifier: InterPro:IPR056252
label: "Alfy-like, armadillo-like repeat domain"
definition: >-
  This entry represents a region of armadillo-like repeats found in human WD repeat and FYVE domain-containing protein 3 (WDFY3, also known as Alfy) and similar eukaryotic sequences. Alfy is required for selective macroautophagy (aggrephagy). It is important for normal brain development. This domain is also found in BEACH domain-containing protein lvsA involved in myosin-independent cytokinesis and early steps of phagocytosis. Another proteins containing this domain is SPIRRIG which is involved in cell morphogenesis.
