identifier: InterPro:IPR056423
label: "BPM/SPOP, BACK domain"
definition: >-
  This entry represent the BACK domain present in BPM proteins from plants, SPOP from animals and related sequences. BPM proteins are part of the Cullin E3 ubiquitin ligase complexes playing a role as substrate-specific adaptors of CUL3-based E3 ligases in the ubiquitin-proteasome pathway. They bind at least three families of transcription factors: ERF/AP2 class I, homeobox-leucine zipper and R2R3 MYB, playing an important role in plant flowering, seed development and abiotic stress response. SPOP, also known as HIB homologue 1 or Roadkill homologue 1 in humans, is an adaptor protein that forms a complex with Cul3, cullin-RING-based BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex, and is involved in ubiquitination of BMI1, H2AFY, and the death-associated protein 6 (DAXX). This domain is involved in dimerisation together with the BTB domain ( ), resulting in linear higher-order oligomers.
