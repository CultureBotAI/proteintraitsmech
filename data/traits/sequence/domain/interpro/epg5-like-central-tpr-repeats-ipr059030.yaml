identifier: InterPro:IPR059030
label: "Epg5-like, central TPR repeats"
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found in Ectopic P granules protein 5 homolog from Drosophila melanogaster (Epg5) and similar proteins mainly from animals. Epg5 plays a role in late steps of autophagy.
