identifier: InterPro:IPR062921
label: "VapE, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of VapE proteins, conserved across diverse bacterial species including Clostridium, Bacillus, Staphylococcus, and Enterococcus species. VapE proteins have been detected in biofilm-associated contexts, though the specific function of this N-terminal domain remains to be determined. The designation virulence-associated reflects the original nomenclature, but a direct role in virulence remains uncertain.
