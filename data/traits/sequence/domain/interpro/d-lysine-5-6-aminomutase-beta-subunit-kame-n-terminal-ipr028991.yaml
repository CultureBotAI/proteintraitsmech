identifier: InterPro:IPR028991
label: D-lysine 5,6-aminomutase beta subunit KamE, N-terminal
definition: >-
  D-lysine 5,6-aminomutase beta subunit KamE catalyses the 1,2-migration of the D-lysine epsilon amino group to the δ-carbon with concomitant reverse migration of a hydrogen atom to produce 2,5-diaminohexanoic acid.
