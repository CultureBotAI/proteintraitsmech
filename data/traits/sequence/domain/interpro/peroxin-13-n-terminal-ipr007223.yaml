identifier: InterPro:IPR007223
label: Peroxin 13, N-terminal
definition: >-
  Peroxin-13 is a component of the PEX13-PEX14 docking complex, a translocon channel that specifically mediates the import of peroxisomal cargo proteins bound to PEX5 receptor. This complex forms a large import pore which can be opened to a diameter of about 9 nm. Members of this group of proteins also contain an SH3 domain.
