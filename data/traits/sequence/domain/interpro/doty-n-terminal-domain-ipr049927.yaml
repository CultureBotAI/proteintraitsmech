identifier: InterPro:IPR049927
label: "DotY, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of DotY, which is responsible for interaction with DotZ. DotY and DotZ are integral parts of the T4CC and play significant roles in the translocation of effectors into eukaryotic host cells. They are unique to the Legionella genus.. DotY is a component of membrane-embedded T4 coupling complex (T4CC), which consists of the DotL ATPase, the DotM and DotN proteins, and DotY and DotZ. The DotLMNYZ hetero-pentamer and plays an essential role in the recruitment and delivery of effectors to the Type IV secretion (T4S) machinery in Legionella pneumophila, a bacterial pathogen that utilizes a T4S system to inject effector proteins into human macrophages.
