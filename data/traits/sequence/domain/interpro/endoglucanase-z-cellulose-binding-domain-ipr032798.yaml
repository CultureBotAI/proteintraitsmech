identifier: InterPro:IPR032798
label: "Endoglucanase Z, cellulose-binding domain"
definition: >-
  This C-terminal domain belongs to the CAZy family of carbohydrate-binding domains that are associated with glycosyl-hydrolases. It is suggested to bind cellulose. Proteins containing this domain include endoglucanase Z from Erwinia chrysanthemi.
