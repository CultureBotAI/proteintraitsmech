identifier: InterPro:IPR044083
label: (R)-stereoselective amidase RamA-like
definition: >-
  This entry represents a domain found in RamA (also known as MCI3434), which is a R-amidase that hydrolyses (R,S)-piperazine-2-tert-butylcarboxamide to form (R)-piperazine-2-carboxylic acid. It does so with strict R-stereoselectively. Its preferred substrates are carboxamide compounds which have the amino or imino group connected to their β- or γ-carbon. RamA belongs to a larger nitrilase superfamily comprised of nitrile- or amide-hydrolysing enzymes and amide-condensing enzymes, which depend on a Glu-Lys-Cys catalytic triad. Members of the nitrilase superfamily generally form homomeric complexes, the basic building block of which is a homodimer.
