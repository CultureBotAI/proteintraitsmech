label: "Anti-bacteriophage protein B, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of anti-bacteriophage protein B (AbpB), found in bacteria. AbpB is a probable helicase that provides resistance to bacteriophage infection.
