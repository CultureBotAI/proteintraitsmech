identifier: InterPro:IPR033724
label: "PET testin"
definition: >-
  Testin contains a PET domain at the N terminus and three C-terminal LIM domains. It is a cytoskeleton associated focal adhesion protein that localizes along actin stress fibres, at cell-cell contact areas, and at focal adhesion plaques. Testin interacts with a variety of cytoskeletal proteins, including zyxin, mena, VASP, talin, and actin and is involved in cell motility and adhesion events. Knockout mice experiments have revealed a tumour repressor function.. The entry represents the testin PET domain. It is a protein-protein interaction domain and PET containing proteins serve as adaptors or scaffolds to support the assembly of multimeric protein complexes.
