identifier: InterPro:IPR049498
label: "Cmr1-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal RRM domain of CRISPR system Cmr subunit Cmr1-1 from P. furiosus. Cmr1 is part of the Cmr complex, an RNA-guided endonuclease that cleaves foreign RNA targets as part of the CRISPR prokaryotic defence system.
