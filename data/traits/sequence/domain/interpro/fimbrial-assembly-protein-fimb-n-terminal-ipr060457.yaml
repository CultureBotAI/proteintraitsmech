identifier: InterPro:IPR060457
label: "Fimbrial assembly protein FimB, N-terminal"
definition: >-
  This entry represents the N-terminal region of FimB family of fimbrial assembly proteins found in proteobacteria. FimB is involved in fimbrium biogenesis and is part of the fimbrial gene region that varies between class I and class II strains. The protein appears to be membrane-associated based on its hydrophobic character. The specific molecular mechanism by which FimB contributes to fimbrial assembly is unknown.
