identifier: InterPro:IPR024468
label: "Sec16, N-terminal"
definition: >-
  Sec16 is a multi-domain vesicle coat protein. The overall function of Sec16 is in mediating the movement of protein-cargo between the organelles of the secretory pathway. The yeast protein Sec16 plays a key role in the formation of coat protein II vesicles, which mediate protein transport from the endoplasmic reticulum (ER) to the Golgi apparatus. This entry represents the N terminus of the Sec16 protein found in fungi. Over-expression of truncated mutants of only the N terminus are lethal, and this portion does not appear to be essential for function so may act as a stabilising region.
