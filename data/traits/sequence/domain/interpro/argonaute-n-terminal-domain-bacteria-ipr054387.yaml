identifier: InterPro:IPR054387
label: "Argonaute, N-terminal domain, bacteria"
definition: >-
  This domain is found at the N-terminal bacterial Argonaute (Ago). Ago binds small RNA or DNA guides, which provide base-pairing specificity for the recognition and cleavage of complementary nucleic acid targets. Bacterial Ago uses 5'-hydroxylated guide RNAs to recognise and cleave single-stranded target sequences rather than the 5'-phosphorylated guides used by all known Argonautes. Bacterial Ago adopts a bilobed structure; an N-terminal and a PAZ domain constitute one lobe, the second one consists of a middle (MID) domain and the catalytic PIWI domain. This N-terminal domain adopts an α/β structure consisting of four-stranded β-sheet and two helices. Compared to other Argonaute proteins, this N-terminal domain differs in both its secondary structure and its orientation relative to the MID/PIWI lobe.
