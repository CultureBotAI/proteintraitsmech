identifier: InterPro:IPR013881
label: "Pre-mRNA-splicing factor 3 domain"
definition: >-
  This entry represents a domain that is located centrally in mammal U4/U6 small nuclear ribonucleoprotein Prp3 and Protein RDM16 from Arabidopsis thaliana and towards the N-terminal end in Prp3 from yeast. Pre-mRNA processing factor 3 (PRP3) is a U4/U6-associated splicing factor. It plays a key role in the recognition of the snRNA duplex. Defects in PRPF3 are the cause of retinitis pigmentosa type 18 (RP18). RP leads to degeneration of retinal photoreceptor cells. In Arabidposis thaliana, protein RDM16 acts as a pre-mRNA splicing factor and functions in RNA-directed DNA methylation by influencing Pol V transcript levels. This domain shows an α-helical structure.
