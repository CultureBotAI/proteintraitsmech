identifier: InterPro:IPR048954
label: "PorZ, N-terminal beta-propeller domain"
definition: >-
  This domain is found at the N-terminal of PorZ (also known as Immunoreactive 84kD antigen PG93) from Porphyromonas gingivalis and in similar proteins predominantly found in Bacteroidetes. PorZ is an essential component of the type-IX secretion system (T9SS) machinery. It consists of three domains. This entry represents the first domain, which folds into a seven-stranded β-propeller.
