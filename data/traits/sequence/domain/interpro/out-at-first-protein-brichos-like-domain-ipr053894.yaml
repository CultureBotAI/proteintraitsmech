identifier: InterPro:IPR053894
label: "Out at first protein, BRICHOS-like domain"
definition: >-
  This entry represents the BRICHOS-like domain found at the N-terminal of Out at first protein (OAF) protein family. OAF is vital for proper neuronal development and hatching. The gene that encodes this protein, has a promoter which may help mediate regulation of neighbouring genes. An alternative name for this protein is HCV NS5A-transactivated protein 13 target protein 2, which stands for Hepatitis C virus nonstructural 5A-transactivated protein 13 target protein 2. NS5A inhibits double-stranded-RNA-activated protein kinase (PKR) activity, which is thought to allow Hepatitis C Virus replication to continue in the presence of an alpha interferon (IFN) induced antiviral response.
