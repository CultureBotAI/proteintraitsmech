identifier: InterPro:IPR061536
label: "Domain of unknown function DUF8466"
definition: >-
  This entry represents a small domain of unknown function. It includes Porphyromonas gingivalis protein PGN_1290 which was found to be down-regulated in a GppX mutant. This domain is composed of a four stranded β sheet (strand order 1-4-3-2) with two α helices packed on one side. AlphaFold3 suggests these proteins form confident homodimers ( ipTM=0.9 pTM=0.92).
