identifier: InterPro:IPR035834
label: "SH3 domain-containing protein 19, SH3 domain 1"
definition: >-
  SH3 domain-containing protein 19 (also known as Eve-1 or EBP) exists in multiple alternatively spliced isoforms. The longest isoform contains five SH3 domain in the C-terminal region and seven proline-rich motifs in the N-terminal region. Eve-1 interacts with ADAMs (A disintegrin and metalloprotease) and is required for ectodomain shedding of epidermal growth factor receptor ligands. It inhibits Ras signaling. This entry represents the first SH3 domain of Eve1.
