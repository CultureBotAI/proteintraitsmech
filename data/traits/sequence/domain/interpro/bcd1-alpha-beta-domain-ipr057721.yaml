identifier: InterPro:IPR057721
label: "BCD1, alpha/beta domain"
definition: >-
  This domain is found in Box C/D snoRNA protein 1 from Saccharomyces cerevisiae (BCD1), which is required for box C/D snoRNAs accumulation involved in snoRNA processing, snoRNA transport to the nucleolus and ribosome biogenesis. This domain shows an α-β configuration and is often found associated with .
