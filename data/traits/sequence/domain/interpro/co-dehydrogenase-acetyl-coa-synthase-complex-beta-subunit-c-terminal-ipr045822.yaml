identifier: InterPro:IPR045822
label: "CO dehydrogenase/acetyl-CoA synthase complex beta subunit , C-terminal"
definition: >-
  Acetyl-CoA synthase/CO dehydrogenase (ACS/CODH) is a bifunctional enzyme that catalyses the reversible reduction of CO2 to CO (CODH activity, the beta subunit) and the synthesis or degradation of acetyl-CoA (catalysed by ACS, the alpha subunit). This domain represents the middle and C-terminal regions of CODH which have an α/β Rossmann-like fold.
