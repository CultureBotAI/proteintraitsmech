identifier: InterPro:IPR055124
label: "ATP-dependent RNA helicase DDX60, PIN-like domain"
definition: >-
  This domain is found N-terminal in human ATP-dependent RNA helicase DDX60 (also known as DEAD-box RNA helicase) and similar sequences from animals and fungi. This domain adopts a globular structure with a significant structural similarity to PIN domains. DDX60 binds ssRNA, dsRNA and dsDNA and can promote the binding of RIGI to dsRNA. DDX60 is non-essential in mammals but it is required for the cell fitness in kinetoplastids and trypanosomatids and plays a specific role in translation initiation in these parasites. In Trypanosoma cruzi, k-DDX60 binds both to the head and the body of the 40S ribosome subunit. It is also involved in the stabilization of the 43S PIC and the remodelling of the 43S PIC mRNA channel.
