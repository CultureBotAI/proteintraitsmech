identifier: InterPro:IPR062084
label: "DF190-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the putative defensin-like protein 190 from Arabidopsis thaliana (DF190) and similar plant proteins. This domain is predicted to adopt a fold consisting of three β-strands and a short α-helix.
