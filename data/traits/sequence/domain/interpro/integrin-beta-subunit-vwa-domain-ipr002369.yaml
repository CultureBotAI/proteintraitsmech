identifier: InterPro:IPR002369
label: "Integrin beta subunit, VWA domain"
definition: >-
  This domain corresponds to the integrin beta VWA domain. Integrin beta subunits consist of an extracellular domain with a head region, a stalk/leg section, a transmembrane domain, and a cytoplasmic tail. The head region contains a β-I-like domain inserted into a hybrid domain, connected to a plexin-semaphorin-integrin (PSI). C-terminal to the PSI domain is an A-domain, which has been predicted to adopt a Rossmann fold similar to that of the alpha subunit, but with additional loops between the second and third β strands. This domain is referred to as VWA. Many VWA domains bind metal ions via a noncontiguous sequence motif called metal ion-dependent adhesion site (MIDAS). This is followed by a β-subunit stalk/leg section that contains four cysteine-rich integrin epidermal growth factor-like (I-EGF) modules,, ]. Finally, this is followed by the β-ankle TM domain and a cytoplasmic tail. Integrins are the major metazoan receptors for cell adhesion to extracellular matrix proteins and, in vertebrates, also play important roles in certain cell-cell adhesions, make transmembrane connections to the cytoskeleton, and activate many intracellular signalling pathways. An integrin receptor is a heterodimer composed of alpha and beta subunits. Each subunit crosses the membrane once, with most of the polypeptide residing in the extracellular space, and has two short cytoplasmic domains. Some members of this family have EGF repeats at the C terminus and also have a VWA domain inserted within the integrin domain at the N-terminal. Most integrins recognise relatively short peptide motifs and, in general, require an acidic amino acid to be present. Ligand specificity depends upon both the alpha and beta subunits. There are at least 18 types of alpha and 8 types of beta subunits recognised…
