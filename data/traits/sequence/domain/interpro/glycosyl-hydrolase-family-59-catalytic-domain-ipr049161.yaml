identifier: InterPro:IPR049161
label: "Glycosyl hydrolase family 59, catalytic domain"
definition: >-
  This entry represents the catalytic domain found in a group of proteins from animals, fungi and bacteria that belong to the Glycoside hydrolase family 59 . This family comprises enzymes with only one known activity: galactocerebrosidase. Globoid cell leukodystrophy (Krabbe disease) is a severe, autosomal recessive disorder that results from deficiency of galactocerebrosidase (GALC) activity. GALC is responsible for the lysosomal catabolism of certain galactolipids, including galactosylceramide and psychosine. O-Glycosyl hydrolases are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website.
