label: "Neurobeachin/BDCP, DUF4704"
definition: >-
  This domain of unknown function is found in eukaryotes, on neurobeachin and BEACH domain-containing proteins (BDCPs). Mutations in this proteins are associated with Lipopolysaccharide-responsive and beige-like anchor (LRBA) deficiency.
