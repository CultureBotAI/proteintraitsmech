identifier: InterPro:IPR057827
label: "WW domain, fungi"
definition: >-
  This entry represents a set of WW domains that are found in a large family of fungal RasGEF domain-containing proteins. This domain is found close to the N-terminal of the proteins adjacent to an SH3 domain .
