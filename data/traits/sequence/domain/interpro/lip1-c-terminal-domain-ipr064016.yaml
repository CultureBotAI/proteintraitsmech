identifier: InterPro:IPR064016
label: "LIP1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of ceramide synthase subunit LIP1, found in fungi. LIP1 (also known as Lip1p) is an essential regulatory subunit of ceramide synthase (CerS), a multicomponent enzyme complex that also contains two catalytic subunits, Lag1 and Lac1. CerS catalyses the synthesis of ceramides, which play a crucial role as basic building blocks of sphingolipids and as signalling molecules mediating cell fate. LIP1 is a single-pass type II transmembrane protein localised to the endoplasmic reticulum membrane, and its essential function resides within the transmembrane or luminal part of the protein. It contains two conserved disulphide bonds and several residues critical for complex activity, and structural studies indicate that this domain plays a role in the enzymatic function of the complex.
