identifier: InterPro:IPR034236
label: "Caa3-type Cytochrome c oxidase subunit II, cupredoxin domain"
definition: >-
  Cytochrome c oxidase (CcO), the terminal oxidase in the respiratory chains of most bacteria, is a multi-chain transmembrane protein located in the inner membrane of the cell membrane of prokaryotes. It catalyzes the reduction of O 2 and simultaneously pumps protons across the membrane. The four-subunit Caa3-type CcO is unusual in that the subunits are encoded as fused polypeptides: the subunit I with III (I/III) and the subunit II with the soluble electron donor, cytochrome c (II/c). Subunit II/c consists of a two N-terminal transmembrane (TM) helices anchoring a cupredoxin domain that contains the electron accepting homo-binuclear copper (CuA)-centre, and a C-terminal fusion to a cytochrome c domain. This entry represents the cupredoxin domain.
