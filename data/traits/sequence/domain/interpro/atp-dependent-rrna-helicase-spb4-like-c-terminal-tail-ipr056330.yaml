identifier: InterPro:IPR056330
label: "ATP-dependent rRNA helicase SPB4-like, C-terminal tail"
definition: >-
  This domain is found at the C-terminal end of ATP-dependent rRNA helicase SPB4 from Saccharomyces cerevisiae and similar sequences mainly from fungi and some animal species. SPB4 is involved in the biogenesis of 60S ribosomal subunits. It is is organised into four domains: dual RecA domains ( and ), a C-terminal extension and a C-terminal tail (CTT, this entry). This domain forms a V-shaped α-helical structure.
