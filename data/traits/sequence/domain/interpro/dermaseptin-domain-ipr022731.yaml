identifier: InterPro:IPR022731
label: "Dermaseptin domain"
definition: >-
  This entry represents the dermaseptin domain found in dermaseptin precursor polypeptides and similar proteins from tree frogs. Dermaseptin proteins are used in eukaryotes as an antimicrobial agent. Dermaseptins are typically between 30 to 76 amino acids in length. This domain is found associated with a propeptide. The full-length protein is almost completely defined in an α helical domain. It creates high levels of disorder at the level of the phospholipid head group of bacterial membranes suggesting that it partitions into the bilayer where it severely disrupts membrane packing.
