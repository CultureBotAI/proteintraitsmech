identifier: InterPro:IPR015073
label: "Domain of unknown function DUF1883"
definition: >-
  This domain corresponds to a predicted ligand-binding domain of the PPC-like β-sandwich fold. It has been observed in conserved gene neighbourhoods with diverse nucleotide-activated effector and related conflict systems, which potentially recognises invasive molecules and initiates system responses or directly triggers directly-associated effector domains.
