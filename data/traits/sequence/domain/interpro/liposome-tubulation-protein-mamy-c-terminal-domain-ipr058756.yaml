identifier: InterPro:IPR058756
label: "Liposome tubulation protein MamY, C-terminal domain"
definition: >-
  This entry represents the C-terminal α-helical domain of Liposome tubulation protein MamY and similar proteins from rhodospirillales. The magnetosome MamY family is involved in the formation of mature magnetosomes by causing tubulation when interacting with magnetosome-derived liposomes. It binds preferentially to cardiolipin, a key component of bacterial membranes, which enhances tubulation. The family may also play a role in the constriction of the cell inner membrane. Additionally, it is suggested to function in collaboration with proteins MamX, MamZ, and Mms6, potentially contributing to biomineralisation processes.
