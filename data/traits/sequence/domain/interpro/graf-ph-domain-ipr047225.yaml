identifier: InterPro:IPR047225
label: "GRAF, PH domain"
definition: >-
  This entry represents the PH domain of GRAF family of proteins. Graf is an essential component of the CLIC (clathrin-independent carrier)/GEEC (GPI-anchored protein-enriched early endocytic compartment) endocytic pathway. It plays a critical role during development; it is essential for normal mushroom body (MB) development and, therefore, the formation of olfactory long-term memories. During embryo cellularization, it is required for maintaining and regulating the rate of actomyosin ring constriction. OPHN1 is a RhoGAP involved in X-linked mental disabilities, epilepsy, rostral ventricular enlargement, and cerebellar hypoplasia. Affected individuals have morphological abnormalities of their brain with enlargement of the cerebral ventricles and cerebellar hypoplasia. OPHN1 negatively regulates RhoA, Cdc42, and Rac1 in neuronal and non-neuronal cells. GRAF1 sculpts the endocytic membranes of the CLIC/GEEC (clathrin-independent carriers/GPI-enriched early endosomal compartments) endocytic pathway. It strongly interacts with dynamin and inhibition of dynamin abolishes CLIC/GEEC endocytosis. Its mutations are linked to leukaemia. GRAF2, GRAF3 and oligophrenin are likely to play similar roles during clathrin-independent endocytic events.
