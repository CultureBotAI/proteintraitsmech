identifier: InterPro:IPR010841
label: "Elongation factor G-binding protein, N-terminal"
definition: >-
  This domain can be found in the N terminus of the FusB ( ), FusC ( ), and FusD ( ) proteins from Staphylococcus aureus. They are elongation factor G (EF-G) binding proteins that are linked to the fusidic acid (FA) resistance in S. aureus.
