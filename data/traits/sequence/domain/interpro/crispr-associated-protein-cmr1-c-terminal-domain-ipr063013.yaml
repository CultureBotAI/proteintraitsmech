identifier: InterPro:IPR063013
label: "CRISPR-associated protein Cmr1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the Cmr1 protein which is a member of the cannonical (type III-A to III-D) type III CRISPR-Cas system. The Cmr1 occupies the top of the head of the effector complex.
