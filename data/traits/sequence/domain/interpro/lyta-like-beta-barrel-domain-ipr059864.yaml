identifier: InterPro:IPR059864
label: "LytA-like, beta-barrel domain"
definition: >-
  This entry represents a small β-barrel domain belonging to the OB-fold superfamily found in membrane-bound lipoproteins such as LytA and YqiH from Bacillus subtilis. LytA may play a role in the secretion of LytB and LytC autolysins and is subject to repression by LytR. These proteins are lipid-anchored to the cell membrane through N-palmitoyl and S-diacylglycerol cysteine modifications. The specific function of this β-barrel domain remains to be determined.
