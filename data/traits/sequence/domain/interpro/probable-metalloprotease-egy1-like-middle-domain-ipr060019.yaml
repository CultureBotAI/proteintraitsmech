identifier: InterPro:IPR060019
label: "Probable metalloprotease EGY1-like, middle domain"
definition: >-
  This entry represents the middle domain of EGY3 proteins, which are probable zinc metalloproteases localised to the chloroplast membrane. The domain is found predominantly in land plants, with representatives across Magnoliopsida including both rosids and asterids, as well as monocots. It is positioned between the N-terminal coiled-coil region and the C-terminal transmembrane helices. The specific function of this domain remains to be determined. This domain is also found in the middle region of putative Peptidase M50 domain-containing protein in cyanobacteria EGY1/2/3 proteins belong to the peptidase M50B family and are multi-pass membrane proteins involved in chloroplast development. EGY1 is an ATP-independent metalloprotease required for the development of both thylakoid grana and a well-organised lamellae system in chloroplast.
