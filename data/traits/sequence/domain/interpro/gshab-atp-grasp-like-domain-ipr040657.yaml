identifier: InterPro:IPR040657
label: "GshAB, ATP-grasp-like domain"
definition: >-
  Glutathione biosynthesis is achieved in most organisms via a conserved two-step approach relying on the capacity of two independent and unrelated ligases to perform peptide synthesis coupled to ATP hydrolysis. In a first and rate-limiting step, gamma-glutamylcysteine ligase (gamma-ECL) (or GshA; ) uses l-glutamate and l-cysteine to form gamma-glutamylcysteine (gamma-EC), which, in a second step, is condensed with glycine to glutathione by glutathione synthetase (GS) (or GshB; ). However, several pathogenic and free-living bacteria carry out glutathione biosynthesis based on a single enzyme that catalyses both the gamma-ECL and the GS reactions. Such bifunctional glutathione-synthesizing enzymes have been termed gamma-GCS-GS, GshF or GshAB. Hybrid GshF contains a typical gammaproteobacterial gamma-ECL fused to an ATP-grasp-like domain. The ATP-grasp-like module is responsible for the ensuing formation of glutathione from gamma-glutamylcysteine and glycine. The ATP-grasp-like domain has an antiparallel β-sheet in the GshF structures in contrast to all structurally characterised members of the ATP-grasp superfamily.
