identifier: InterPro:IPR055225
label: "DNAJC11-like, beta-barrel domain"
definition: >-
  This entry represents a large β-barrel domain found in the central region of DNAJC11 from humans and its orthologues. DNAJC11 is a mitochondrial outer membrane protein involved in mitochondrial biogenesis and in the response to microenvironment changes and requirements. The J-domain mediates its mitochondrial localisation, while the C-terminal domain is critical for protein-protein interactions. The function of this domain is believed to be involved in protein-protein interactions. However, its exact function is unknown. This entry also includes Chaperone protein dnaJ 13 (also known as OWL1) from Arabidopsis thaliana, involved in perception of very low light fluences.
