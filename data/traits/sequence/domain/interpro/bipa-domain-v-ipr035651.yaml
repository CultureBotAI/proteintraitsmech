identifier: InterPro:IPR035651
label: "BipA, domain V"
definition: >-
  This domain describes the C-terminal portion of BipA (or TypA) having homology to the domain V of the elongation factors EF-G. A member of the ribosome binding GTPase superfamily, BipA is widely distributed in bacteria and chloroplasts. It has been implicated in regulating a variety of cellular processes, including bacterial virulence and various stress responses. BipA is phosphorylated on a tyrosine residue under some cellular conditions. BipA contains domains that are homologous EF-G domain I, II, III, V. This entry represent the domain that is homologous to domain V.
