label: "Membrane-associated sensor domain MASE3"
definition: >-
  MASE3 (Membrane-Associated SEnsor) is an integral membrane sensor domain of unknown specificity found in histidine kinases, diguanylate cyclases and protein phosphatases in various bacteria and archaea.
