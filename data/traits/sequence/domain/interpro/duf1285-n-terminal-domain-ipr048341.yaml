identifier: InterPro:IPR048341
label: "DUF1285, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of several hypothetical bacterial proteins, including SPO0140 from Ruegeria pomeroyi ( ). It folds into a β-meander-α-helix- β-meander core bound to a twisted mixed six-stranded β-sheet. Its specific function is unknown.
