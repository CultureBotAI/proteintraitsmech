label: "Probable sensor domain DacZ_P"
definition: >-
  This is a probable sensor domain found at the N-terminal of bacterial diadenylate cyclases, which are typically followed by the DAC ( ) domain. It is distantly related to PK_C ( ) and it consists of four α-helices and five β-strands according to structure predictions.
