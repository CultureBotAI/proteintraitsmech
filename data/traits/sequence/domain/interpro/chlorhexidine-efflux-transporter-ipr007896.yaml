identifier: InterPro:IPR007896
label: "Chlorhexidine efflux transporter"
definition: >-
  This entry represents a conserved pair of two transmembrane α-helices. All members carry the two pairs of TMs. BTP is a form of drug efflux pump, that actively tranports chlorhexidine out of the cell. Chlorhexidine, a bisbiguanide antimicrobial agent, is commonly used as an antiseptic and disinfectant in hospitals, and there is an increasing problem with resistance to it in some pathogenic bacteria. BTP is localised in the cytoplasmic membrane.
