identifier: InterPro:IPR031403
label: Sbe2/Sbe22, C-terminal domain
definition: >-
  This entry represents a domain found at the C-terminal of Sbe2 and its paralogue, Sbe22 from budding yeast. They are involved in bud growth and yeast cell wall formation. They may be involved in the transport of cell wall components from the Golgi apparatus to the cell surface periphery. This domain is predicted to adopt a globular structure with similarity to TBC domains.
