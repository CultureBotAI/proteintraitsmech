identifier: InterPro:IPR041318
label: "pEK499_p136 HEPN domain"
definition: >-
  This entry represents pEK499_p136-like HEPN domain from bacteria. The HEPN superfamily is comprised of all α-helical domains that were first identified as being associated with DNA polymerase β-type nucleotidyltransferases in prokaryotes and animal Sacsin proteins. Members of this entry are embedded within a large predicted operon along with genes encoding the core components of the phage growth limitation (Pgl) system that was first characterised as a defence system against lysogenic phages (e.g. phiC31) in Streptomyces coelicolor.
