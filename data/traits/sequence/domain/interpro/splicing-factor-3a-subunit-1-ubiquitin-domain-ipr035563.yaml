identifier: InterPro:IPR035563
label: "Splicing factor 3A subunit 1, ubiquitin domain"
definition: >-
  Mammalian splicing factor SF3a consists of three subunits of 60, 66, and 120kDa and functions early during pre-mRNA splicing by converting the U2 snRNP to its active form. The 120kDa subunit (SF3a120) has a carboxy-terminal ubiquitin-like domain and two SWAP (suppressor-of-white-apricot) domains, referred to collectively as the SURP module, at its amino-terminus. This entry represents the C-terminal ubiquitin domain.
