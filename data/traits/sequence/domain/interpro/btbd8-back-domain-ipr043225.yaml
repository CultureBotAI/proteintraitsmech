identifier: InterPro:IPR043225
label: "BTBD8, BACK domain"
definition: >-
  BTBD8 is a BTB-domain-containing Kelch-like protein that may play a role in developmental process. It may also act as a protein-protein adaptor in a transcription complex and thus may be involved in brain development. This entry represents the BACK domain of BTBD8.
