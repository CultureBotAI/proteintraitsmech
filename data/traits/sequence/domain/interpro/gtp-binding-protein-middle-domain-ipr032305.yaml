identifier: InterPro:IPR032305
label: "GTP-binding protein, middle domain"
definition: >-
  This entry represents a domain found in a group of GTP-binding proteins. Proteins containing this domain includes GTPase HflX, which associates with the 50S ribosomal subunit and may have a role during protein synthesis or ribosome biogenesis. This function of this domain is not known.
