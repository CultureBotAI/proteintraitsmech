identifier: InterPro:IPR033473
label: "Atos-like, C-terminal"
definition: >-
  This domain can be found in the C-terminal of Drosophila Atos and its homologues from mammals, Atos homologue protein A/B (ATOSA/B, formerly known as FAM241) and is referred to as the chromosome segregation domain. Atos is a transcriptional regulator that synchronizes transcriptional and translational programs to promote macrophage invasion of tissues. It induces transcriptional expression of metabolic enzymes as well as of the translational regulator pths/DDX47. With pths/DDX47, adjusts transcription and translation of a subset of OXPHOS genes to increase mitochondrial bioenergetics and allow macrophage tissue invasion.
