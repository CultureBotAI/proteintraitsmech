identifier: InterPro:IPR062567
label: "Ergosterol biosynthesis protein 29, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of ERG29 from Saccharomyces cerevisiae and related fungal sequences. ERG29 is part of the third module of ergosterol biosynthesis pathway that includes the late steps of the pathway. ERG29 regulates the activity of the iron-containing C4-methylsterol oxidase ERG25.
