identifier: InterPro:IPR053940
label: "UTP25, NTP hydrolase-like domain"
definition: >-
  UTP25 (U3 small nucleolar RNA-associated protein 25) is a DEAD-box RNA helicase-like protein component of the ribosomal small subunit processome for the biogenesis of ribosomes, which functions in pre-ribosomal RNA (pre-rRNA) processing. U3 small nucleolar RNA-associated protein 25 homologue (UTP25, also known as Digestive organ expansion factor (DEF)) from animals is essential for embryonic development in part through the regulation of p53 pathway and controls the expansion growth of digestive organs and liver. UTP25 mediates, with CAPN3, the proteasome-independent degradation of p53/TP53. These proteins display limited sequence similarity to DEAD-box RNA helicases, having alternative residues at the Walker A and DEAD-box sites, but conservation of structural and other key residues. Members of this entry consist of two domains; this entry represents the bigger one, towards the N-terminal which is structurally related to NTPases, lacking the conserved motifs typically found in helicases (WalkerA/B motifs and motif Q). The C-terminal domain is represented in and is required and sufficient for the interaction of UTP25 with Utp3. UTP25 interacts with nucleolar protein Nop19 in S. cerevisiae, and Nop19p is essential for the incorporation of Utp25p into pre-ribosomes.
