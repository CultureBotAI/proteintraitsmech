identifier: InterPro:IPR056414
label: "DAAF9, CobW C-like domain"
definition: >-
  This domain is found in the human DAAF9 and related proteins. It binds newly synthesised outer dynein arm complexes. It shares a significant sequence similarity with the C-terminal domain of CobW and it is predicted to adopt a similar structure consisting of a flat antiparallel β-sheet and two α-helices packed on it. Dynein axonemal assembly factor 9 DNAAF9 (Shulin) is a dynein axonemal assembly factor that regulates the transport and activation of outer dynein arms (ODAs) in cilia. It binds and inhibits ODAs in the cytoplasm, maintaining them in a closed conformation until they are delivered to cilia. It may interact with ARL-3. This GTP-dependent interaction might ensure spatiotemporal control of dynein function, critical for proper ciliary beating in multiciliated cells such as airway epithelia. Dysregulation of DNAAF9 is linked to primary ciliary dyskinesia (PCD), characterised by impaired mucociliary clearance and respiratory defects.
