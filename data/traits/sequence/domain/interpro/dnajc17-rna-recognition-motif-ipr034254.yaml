identifier: InterPro:IPR034254
label: "DNAJC17, RNA recognition motif"
definition: >-
  The entry represents the RNA recognition motif (RRM) of eukaryotic DnaJ homologue subfamily C member 17 (DNAJC17) and similar proteins. DnaJ/Hsp40 (heat shock protein 40) proteins are highly conserved and play crucial roles in protein translation, folding, unfolding, translocation, and degradation. They act primarily by stimulating the ATPase activity of Hsp70s, an important chaperonine family.
