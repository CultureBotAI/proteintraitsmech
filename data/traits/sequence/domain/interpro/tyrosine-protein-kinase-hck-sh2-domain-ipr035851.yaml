identifier: InterPro:IPR035851
label: "Tyrosine-protein kinase HCK, SH2 domain"
definition: >-
  HCK is a member of the Src non-receptor type tyrosine kinase (SFK) family. HCK is expressed as two isoforms, p59Hck and p61Hck, in phagocytes. It plays an important role in the regulation of innate immune responses, including neutrophil, monocyte, macrophage and mast cell functions, phagocytosis, cell survival and proliferation, cell adhesion and migration. Like the other members of the Src family the SH2 domain in addition to binding the target, also plays an autoinhibitory role by binding to its C-terminal tail. The Src non-receptor type tyrosine kinase (SFK) family members have an unique N-terminal domain, an SH3 domain, an SH2 domain, a kinase domain and a regulatory tail. The SH2 domain of SFKs is involved in kinase autoinhibition and T-cell receptor signaling. The binding SH2 domains to phosphotyrosine (pY) sites is critical for the autoinhibition and substrate recognition of the SFKs.
