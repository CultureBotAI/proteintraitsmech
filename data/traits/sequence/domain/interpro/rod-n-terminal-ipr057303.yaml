identifier: InterPro:IPR057303
label: "Rod, N-terminal"
definition: >-
  This entry represents the predicted β-propeller domain found at the N-terminal of Rod from Drosophila and related sequences from arthropods. Rod, the orthologue of human KNTC1, is the major subunit of the Rod-Zw10-Zwilch (RZZ) complex. RZZ is an essential component of the outer kinetochore during mitosis and helps monitor and correct kinetochore-microtubule attachments during pro-metaphase, thus, regulating mitotic progression.
