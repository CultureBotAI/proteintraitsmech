identifier: InterPro:IPR012744
label: Nitrite reductase [NAD(P)H] large subunit, NirB
definition: >-
  This entry describes NirB, the large subunit of nitrite reductase [NAD(P)H] (the assimilatory nitrite reductase), which associates with NirD, the small subunit ( ). In a few bacteria such as Klebsiella pneumoniae and in fungi, the two regions are fused.
