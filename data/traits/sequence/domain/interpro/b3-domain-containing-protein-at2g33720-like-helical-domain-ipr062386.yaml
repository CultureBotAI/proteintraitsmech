identifier: InterPro:IPR062386
label: "B3 domain-containing protein At2g33720-like, helical domain"
definition: >-
  This entry represents a small helical domain found in B3 domain-containing proteins such as At2g33720 in plant transcription factors. This domain is typically found in two copies upstream of the B3 domain in proteins of the B3 superfamily. The domain is approximately 40 amino acids in length and is predicted to adopt a helical structure. B3 domain-containing proteins function as DNA-binding transcription factors involved in transcriptional regulation. The specific function of this helical domain remains to be determined.
