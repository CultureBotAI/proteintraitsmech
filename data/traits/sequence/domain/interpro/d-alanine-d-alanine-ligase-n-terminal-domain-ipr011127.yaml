identifier: InterPro:IPR011127
label: "D-alanine--D-alanine ligase, N-terminal domain"
definition: >-
  This entry represents the N-terminal region of the D-alanine--D-alanine ligase enzyme which is thought to be involved in substrate binding. D-Alanine is one of the central molecules of the cross-linking step of peptidoglycan assembly. There are three enzymes involved in the D-alanine branch of peptidoglycan biosynthesis: the pyridoxal phosphate-dependent D-alanine racemase (Alr), the ATP-dependent D-alanine:D-alanine ligase (Ddl), and the ATP-dependent D-alanine:D-alanine-adding enzyme (MurF).
