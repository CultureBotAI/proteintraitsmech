identifier: InterPro:IPR045962
label: "Domain of unknown function DUF6382"
definition: >-
  This domain of unknown function is present at the N terminaus of uncharacterised proteins predominantly found in Firmicutes, which also contain a FHA (Forkhead-associated) domain. It is approximately 160 amino acids in length and contains a conserved sequence YxI/V motif and a Proline conserved residue.
