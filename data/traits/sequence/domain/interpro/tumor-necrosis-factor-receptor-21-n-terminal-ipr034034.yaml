identifier: InterPro:IPR034034
label: "Tumor necrosis factor receptor 21, N-terminal"
definition: >-
  Tumor necrosis factor receptor superfamily member 21 (TNFRSF21), also known as death receptor 6 (DR6), CD358, or BM-018, plays a role in neuronal apoptosis, including apoptosis in response to amyloid peptides derived from APP, and is required for both normal cell body death and axonal pruning. It also acts as a regulator of pyroptosis sa it recruits CASP8 in response to reactive oxygen species (ROS) and subsequent oxidation, leading to activation of gasdermin C (GSDMC). DR6 negatively regulates neuron, axon, and oligodendrocyte survival, hinders axondendrocyte and oligodendrocyte regeneration and its inhibition has a neuroprotective effect in nerve injury. It activates nuclear factor kappa-B (NFkB) and mitogen-activated protein kinase 8 (MAPK8, also called c-Jun N-terminal kinase 1), and induces cell apoptosis by associating with TNFRSF1A-associated via death domain (TRADD), which is known to mediate signal transduction of tumor necrosis factor receptors. TNFRSF21 plays a role in T-helper cell activation, and may be involved in inflammation and immune regulation. It binds alpha-amyloid precursor protein (APP); when released, APP binds in an autocrine/paracrine manner to activate a caspase-dependent self-destruction program that removes unnecessary or connectionless axons. Increasing beta-catenin levels in brain endothelium upregulates TNFRSF21 and TNFRSF19, indicating that these death receptors are downstream target genes of Wnt/beta-catenin signaling, which has been shown to be required for blood-brain barrier development. DR6 is up-regulated in numerous solid tumors as well as in tumor vascular cells, including ovarian cancer and may be a clinically useful diagnostic and predictive serum biomarker for some adult sarcoma subtypes. This entry represents the N-terminal…
