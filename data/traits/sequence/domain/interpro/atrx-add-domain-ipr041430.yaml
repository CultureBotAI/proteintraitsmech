identifier: InterPro:IPR041430
label: "ATRX, ADD domain"
definition: >-
  This is a cysteine-rich domain termed ADD (ATRX-DNMT3-DNMT3L, AD-DATRX) found in ATRX proteins. The ADD domain of ATRX, in which most syndrome-causing mutations occur, engages the N-terminal tail of histone H3 through two rigidly orientated binding pockets, one for unmodified Lys4 and the other for di- or trimethylated Lys9. Mutations in the ATRX ADD domain cause mislocalisation of ATRX protein to heterochromatin, and this may contribute to understanding the underlying aetiology of ATRX syndrome. Structural analysis of the ADD domain of ATRX revealed that it contains a PHD zinc-finger domain packed against a GATA-like zinc finger. The same structure is also found in the DNMT3 DNA methyltransferases and DNMT3L.
