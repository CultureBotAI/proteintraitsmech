identifier: InterPro:IPR060540
label: "tRNA(Ile)-lysidine synthase, SCL domain"
definition: >-
  This domain is found in tRNA(Ile)-lysidine synthase (TilS) from Bacteroidota only. TilS modifies cytidine into lysidine at the first anticodon of tRNA(Ile). This modification switches tRNA(Ile) from a methionine-specific to an isoleucine-specific tRNA. This domain is also known as the stem contact-like (SCL) domain because it makes contacts with the tRNA stem.
