identifier: InterPro:IPR024372
label: Proteasome component Ecm29, N-terminal
definition: >-
  Ecm29 is an adapter/scaffolding protein that tethers the proteasome core particle to the regulatory particle, stabilising the interaction between these two components. This entry represents a HEAT-repeats containing domain found at the N-terminal of ECM29. The N-terminal half of the protein binds the endocytic components Vps11, Rab11-FIP4, and rabaptin. The proteasome (or macropain) ( ) is a multicatalytic proteinase complex in eukaryotes and archaea, and in some bacteria, that is involved in an ATP/ubiquitin-dependent non-lysosomal proteolytic pathway. In eukaryotes the 20S proteasome is composed of 28 distinct subunits which form a highly ordered ring-shaped structure (20S ring) of about 700kDa. Proteasome subunits can be classified on the basis of sequence similarities into two groups, alpha (A) and beta (B). The proteasome consists of four stacked rings composed of α/β/β/α subunits. There are seven different alpha subunits and seven different beta subunits. Three of the seven beta subunits are peptidases, each with a different specificity. Subunit beta1c (MEROPS identifier T01.010) has a preference for cleaving glutaminyl bonds ("peptidyl-glutamyl-like" or "caspase-like"), subunit beta2c (MEROPS identifier T01.011) has a preference for cleaving arginyl and lysyl bonds ("trypsin-like"), and subunit beta5c (MEROPS identifier T01.012) cleaves after hydrophobic amino acids ("chymotrypsin-like"). The proteasome subunits are related to N-terminal nucleophile hydrolases, and the catalytic subunits have an N-terminal threonine nucleophile.
