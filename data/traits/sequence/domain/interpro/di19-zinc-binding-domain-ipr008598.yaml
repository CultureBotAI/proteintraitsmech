identifier: InterPro:IPR008598
label: "Di19, zinc-binding domain"
definition: >-
  This zinc-binding domain is found in Di19 proteins, animal E3 ubiquitin-protein ligases (RNF114/KCMF1/RNF138/RNF125/RNF166) and transcriptional repressors (ZEB1/ZEB2). KCMF1 and RNF114 are E3 ubiquitin-protein ligases, while ZEB1 represses transcription by binding to the E box (5'-CANNTG-3'). In RNF114, this domain has been shown to be essential for mono-ADPr-dependent recruitment to DNA lesions. Protein dehydration-induced19 (Di19) increases the sensitivity of plants to environmental stress, such as salinity, drought, osmotic stress and cold. The protein is also induced by an increased supply of stress-related hormones such as abscisic acid ABA and ethylene. Di19 has been found to be strongly expressed in both the roots and leaves of Arabidopsis thaliana during progressive drought. It is phosphorylated by AtCPK11 in a Ca(2+)-dependent manner
