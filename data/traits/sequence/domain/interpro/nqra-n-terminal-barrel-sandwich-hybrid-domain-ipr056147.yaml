identifier: InterPro:IPR056147
label: "NqrA, N-terminal barrel-sandwich hybrid domain"
definition: >-
  This domain is found N-terminal in several bacterial Na(+)-translocating NADH-quinone reductase subunit A (NqrA) proteins. The Na(+)-translocating NADH: ubiquinone oxidoreductase (Na(+)-NQR) generates an electrochemical Na(+) potential driven by aerobic respiration. This domain has a significant similarity to known barrel-sandwich hybrid domains. It is often found associated with and .
