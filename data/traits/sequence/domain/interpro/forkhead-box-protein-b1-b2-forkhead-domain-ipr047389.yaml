identifier: InterPro:IPR047389
label: "Forkhead box protein B1/B2, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXB1/B2 and similar sequences predominantly found in vertebrates. The FH domain is a winged helix DNA-binding domain. Forkhead box protein B1 (FOXB1) is a transcription factor expressed by neural progenitor cells in specific regions of the embryonic neuroepithelium. It is essential for the mammillary nuclei maintenance. FOXB1 negatively regulates the proliferation of oligodendrocyte progenitors and promotes oligodendrocyte maturation. Forkhead box protein B2 (FOXB2) may act as a transcription factor. It may also act as a tumour suppressor. It has been found to inhibit the malignant characteristics of the pancreatic cancer cell line Panc-1 in vitro.
