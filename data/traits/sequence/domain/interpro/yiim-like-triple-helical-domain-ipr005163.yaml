identifier: InterPro:IPR005163
label: "YiiM-like, triple helical domain"
definition: >-
  This small triple helical domain has been predicted to assume a topology similar to helix-turn-helix domains. These domains are found at the C-terminal of proteins related to the YiiM protein ( ) from Escherichia coli.
