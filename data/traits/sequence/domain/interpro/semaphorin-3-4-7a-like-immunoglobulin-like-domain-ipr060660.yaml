identifier: InterPro:IPR060660
label: "Semaphorin-3/4/7A-like, immunoglobulin-like domain"
definition: >-
  This immunoglobulin-like (Ig-like) domain is found in human Semaphorin-3/4/7A (SEMA3/4/7A) and similar sequences. SEMA3F may play a role in cell motility and cell adhesion. SEMA4A is a cell surface receptor for PLXNB1, PLXNB2, PLXNB3 and PLXND1 that plays an important role in cell-cell signalling and it also regulates glutamatergic and GABAergic synapse development. SEMA7A plays an important role in integrin-mediated signalling and functions both in regulating cell migration and immune responses. It promotes formation of focal adhesion complexes, axon growth in the embryonic olfactory bulb and attachment, spreading and dendrite outgrowth in melanocytes.
