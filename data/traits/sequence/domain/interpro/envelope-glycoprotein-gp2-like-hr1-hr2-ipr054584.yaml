identifier: InterPro:IPR054584
label: "Envelope glycoprotein GP2-like, HR1-HR2"
definition: >-
  This entry spans heptad repeats 1 and 2 of the glycoprotein (GP) from Ebola and Marburg viruses. Viral infection involves the formation of a trimer-of-hairpins structure (three HR1s helices, buttressed by three HR2 helices lying in antiparallel orientation). This domain may have been acquired via horizontal transfer from retroviruses.
