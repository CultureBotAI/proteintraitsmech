identifier: InterPro:IPR059305
label: "Domain of unknown function DUF8261"
definition: >-
  This domain is found exclusively in uncharacterised proteins from Legionellales species. It contains several highly conserved cysteine residues which are predicted to form disulfide bonds. It is composed of two repeats predicted to consist of a small three-stranded antiparallel β-sheet and an α-helix packed on it.
