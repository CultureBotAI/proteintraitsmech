identifier: InterPro:IPR057088
label: "GLRG_09195, thioredoxin-like"
definition: >-
  This domain is found in a group of uncharacterised fungal proteins, including uncharacterised protein GLRG_09195 from Colletotrichum graminicola. It is predicted to adopt a thioredoxin-like fold. It can be found in association with . It is also found in fungal uncharacterised 2OG-Fe(II) oxygenase and isochorismatase domain proteins.
