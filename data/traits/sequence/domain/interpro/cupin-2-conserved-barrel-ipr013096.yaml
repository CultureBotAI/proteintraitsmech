identifier: InterPro:IPR013096
label: "Cupin 2, conserved barrel"
definition: >-
  This entry represents the conserved barrel domain of the cupin superfamily (cupa is the Latin term for a small barrel). The cupin domain found in gentisate 1,2-dioxygenase, H2HPP isomerase, (S)-ureidoglycine aminohydrolase and related proteins. This domain is a conserved β-barrel scaffold that supports diverse catalytic functions while maintaining a common structural core. In these enzymes, the cupin fold typically coordinates a metal ion and provides the framework for substrate binding and catalysis, allowing each protein to act on chemically distinct metabolites in aromatic compound degradation and nitrogen metabolism.
