identifier: InterPro:IPR008816
label: Glycine zipper 2TM domain
definition: >-
  This domain includes a putative transmembrane region, composed of two α-helices, that contains glycine zipper motifs. Most members of this group of proteins are found in Proteobacteria, including several Rickettsia genus specific 17kDa surface antigen proteins.
