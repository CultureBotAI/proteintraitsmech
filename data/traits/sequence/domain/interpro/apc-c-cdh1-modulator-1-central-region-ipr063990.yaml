identifier: InterPro:IPR063990
label: "APC/C-CDH1 modulator 1, central region"
definition: >-
  This entry represents a conserved central region found in APC/C-CDH1 modulator 1 (Acm1) proteins from Saccharomycetaceae yeasts. The full-length Acm1 protein is a negative regulator of Cdh1, the activator protein that controls the ubiquitin ligase activity of the anaphase promoting complex/cyclosome (APC/C), which is required for exit from mitosis, cytokinesis and formation of prereplicative complexes in G1. Acm1 interacts with Cdh1 and the 14-3-3 proteins Bmh1 and Bmh2. The protein is expressed just prior to initiation of DNA replication. This region is the central inhibitory region (CIR). It plays a crucial role in inhibiting Cdh1, and it interacts with the WD40 domain of Cdh1.
