identifier: InterPro:IPR037935
label: MAX gene-associated protein, basic Helix-Loop-Helix-zipper domain
definition: >-
  MAX gene-associated protein (MGA) is a dual-specificity transcription factor, acting as a repressor or an activator and binding to 5'-AATTTCACACCTAGGTGTGAAATT-3'. MGA regulates genes targeted by MYC-MAX, suppressing transcriptional activation by MYC and inhibiting MYC-dependent cell transformation. MGA binds DNA via a T-Box. MGA is a component of the MLL1 complex. This entry represents the basic Helix-Loop-Helix-zipper (bHLHzip) domain found in MGA.
