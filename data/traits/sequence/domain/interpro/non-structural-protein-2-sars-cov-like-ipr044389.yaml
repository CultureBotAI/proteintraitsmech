identifier: InterPro:IPR044389
label: "Non-structural protein 2, SARS-CoV-like"
definition: >-
  The functions of NSP2 remain unclear. SARS-CoV NSP2, rather than playing a role in viral replication, may be involved in altering the host cell environment; deletion of NSP2 from the SARS-CoV genome results in only a modest reduction in viral titers, and it has been shown to interact with two host proteins, prohibitin 1 (PHB1) and PHB2 which have been implicated in cellular functions, including cell-cycle progression, cell migration, cellular differentiation, apoptosis, and mitochondrial biogenesis. MHV NSP2, also known as p65, different from SARS-CoV NSP2, may play an important role in the viral life cycle. This entry represents non-structural protein 2 (NSP2) from Severe acute respiratory syndrome coronavirus (SARS-CoV) and betacoronaviruses in the sarbecovirus subgenera (B lineage). In SARS-CoV-2, this protein coopts the GIGYF2/4EHP complex, which suppresses IFN-beta and, therefore, leads to evasion of a cellular innate immune response.
