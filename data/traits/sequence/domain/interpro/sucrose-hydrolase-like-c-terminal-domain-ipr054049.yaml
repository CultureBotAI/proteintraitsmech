identifier: InterPro:IPR054049
label: "Sucrose hydrolase-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of Sucrose hydrolase from Xanthomonas campestris (SupH, ) and similar bacterial sequences. SupH shows a central domain that consists of an eight-stranded α/β barrel. This β-stranded domain is located on a side of the barrel fold.
