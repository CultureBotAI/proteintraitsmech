identifier: InterPro:IPR007329
label: FMN-binding
definition: >-
  This conserved region includes the FMN-binding site of the NqrC protein as well as the NosR and NirI regulatory proteins. This domain is post-translationally flavinylated and may facilitate electron transfer, resembling multiheme cytochromes. It is also found in NADH:(hydroxy)cinnamate reductase subunit CrdB that catalyzes the reduction of the double bond in cinnamate, p-coumarate, caffeate, and ferulate under anaerobic conditions with NADH or methyl viologen as the electron donor.
