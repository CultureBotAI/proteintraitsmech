identifier: InterPro:IPR022140
label: "Kinesin-like KIF1-type"
definition: >-
  This domain is found in kinesin-like proteins and is approximately 50 amino acids in length. It is found in some kinesin-3 family members, such as KIF1, KIF13, KIF28 and unc-104.
