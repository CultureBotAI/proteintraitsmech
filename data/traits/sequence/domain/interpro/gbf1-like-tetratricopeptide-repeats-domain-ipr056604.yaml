identifier: InterPro:IPR056604
label: "GBF1-like, tetratricopeptide repeats domain"
definition: >-
  This region of predicted tetratricopeptide repeats (TPR) are found at the C-terminal end of Golgi-specific brefeldin A-resistance guanine nucleotide exchange factor 1 (GBF1) and similar eukaryotic proteins. GBF1 is involved in trafficking in the early secretory pathway and required for the assembly of the Golgi apparatus. This entry is often found associated with and .
