identifier: InterPro:IPR025178
label: "Lnb, N-terminal periplasmic domain"
definition: >-
  This domain, previously known as DUF4105, is found N-terminal in Lipoprotein N-acyltransferase Lnb from Bacteroides and related uncharacterised bacterial proteins. Lnb functions as a lipoprotein N-acyltransferase in its native cell enviroument. It is composed of two domains, N-terminal (this entry) and C-terminal α-helical transmembrane domain. The domain represented by this entry contains a highly conserved histidine residue and a well-conserved NCT motif. Its predicted structure has a significant similarity to the papain-like cysteine peptidases. In addition, the putative catalytic triad Asn-His-Cys is highly conserved. This domain is also found in combination with other domains.
