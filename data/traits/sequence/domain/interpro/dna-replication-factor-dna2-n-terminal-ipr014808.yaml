identifier: InterPro:IPR014808
label: "DNA replication factor Dna2, N-terminal"
definition: >-
  This entry represents N-terminal domain of the DNA replication factor Dna2. Dna2 and its plant homologue JHS1 are DNA replication factors with single-stranded DNA-dependent ATPase, ATP-dependent nuclease, (5'-flap endonuclease) and helicase activities. It is required for Okazaki fragment processing and is involved in DNA repair pathways. The helicase activity is weak and its function remains unclear.
