identifier: InterPro:IPR049324
label: "Capsid protein, N-terminal domain, fungal virus"
definition: >-
  This domain is found at the N-terminal end of Capsid protein from Penicillium chrysogenum virus (P2, ), which self-assembles to form an icosahedral capsid with a T=1 symmetry. It is organised into two domains with similar α-β morphology.
