identifier: InterPro:IPR040685
label: "Annexin-like domain"
definition: >-
  This annexin-like domain can be found in astrotactin 2 (Astn-2), an integral membrane perforin-like protein linked to the planar cell polarity pathway in hair cells. The annexin-like domain is closest in fold to repeat three of human annexin V and similarly binds calcium, yet shares no sequence homology with it. Notably, this ASTN-2 annexin-like domain is closer in structure to human annexin repeat 3 than human annexin repeat 3 is to repeat 1. Annexin-like domains are known for their capacity to remodel membranes, triggered by calcium binding, and have also been suggested to be involved in the formation of pores in membranes both are possible biological roles of the ASTN-2 annexin-like domain.
