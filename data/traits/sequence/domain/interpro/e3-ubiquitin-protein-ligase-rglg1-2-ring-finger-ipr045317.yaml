identifier: InterPro:IPR045317
label: E3 ubiquitin-protein ligase RGLG1/2, RING finger
definition: >-
  This entry represents the RING finger found in a group of plant E3 ubiquitin-protein ligases, including RGLG1/2 from Arabidopsis. RGLG1 is a ubiquitously expressed E3 ubiquitin-protein ligase that interacts with UBC13 and, together with UBC13, catalyses the formation of K63-linked polyubiquitin chains, which is involved in DNA damage repair. It also regulates apical dominance by acting on the auxin transport proteins abundance. RGLG1 has overlapping functions with its closest sequelog, RGLG2. They both function as RING E3 ligases that interact with ethylene response factor 53 (ERF53) in the nucleus and negatively regulate the plant drought stress response. All members in this family contain a Von Willebrand factor type A (vWA) domain and a C3HC4-type RING-HC finger.
