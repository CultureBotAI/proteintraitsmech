identifier: InterPro:IPR028012
label: "Transcription regulator Rua1, C-terminal"
definition: >-
  This entry represents a domain that can be found at the C terminus of fungal proteins such as meiotic expression up-regulated protein 26 from Schizosaccharomyces pombe, Ecm8 from Saccharomyces cerevisiae and Rua1 from Ustilago maydis. Rua1 is a transcription factor and part of the gene cluster that mediates the biosynthesis of the glycolipid biosurfactant ustilagic acid (UA).
