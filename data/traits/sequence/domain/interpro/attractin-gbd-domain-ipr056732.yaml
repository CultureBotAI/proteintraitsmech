identifier: InterPro:IPR056732
label: "Attractin, GBD domain"
definition: >-
  This entry represents a domain found towards the C terminus of attractin (ATRN) and attractin-like proteins. ATRN is involved in the initial immune cell clustering during inflammatory response and may regulate chemotactic activity of chemokines. It may play a role in melanocortin signalling pathways that regulate energy homeostasis and hair color. It was thought to have dipeptidase activity but it was shown later to lack that activity. This domain is predicted to adopt a β-sandwich fold similar to galactose-binding domains.
