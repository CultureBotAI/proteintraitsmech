identifier: InterPro:IPR049029
label: "Baseplate wedge protein gp6, domain II, first"
definition: >-
  This entry represents the first part of Domain II from Baseplate wedge protein gp6 from Enterobacteria phage T4 and similar sequences predominantly from tailed bacteriophages. Baseplate structural protein gp6 is located next to the tail tube and is an intermediate (or inner) baseplate protein involved in tail assembly. Two molecules of gp6 form a complex with gp25 and gp7 which is involved sheath contraction.
