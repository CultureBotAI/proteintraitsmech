identifier: InterPro:IPR049175
label: "FAM171, C-terminal"
definition: >-
  This is the C-terminal domain of a family of proteins that includes FAM171A1, FAM171A2 and FAM171B. FAM171A1 is a type 1 transmembrane glycoprotein also known as astroprincin (APCN) due to abundant expression in astrocytes. APCN is also expressed in placental trophoblasts, skeletal and heart muscle, kidney and pancreas. APCN is involved in the regulation of the cytoskeletal dynamics, playing a role in actin stress fibre formation.
