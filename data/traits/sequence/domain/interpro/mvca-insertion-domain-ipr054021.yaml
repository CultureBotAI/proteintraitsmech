identifier: InterPro:IPR054021
label: "MvcA insertion domain"
definition: >-
  This entry represents the insertion domain of MvcA , the MavC paralogue A of bacterial effector MavC from Legionella pneumophila. MvcA catalyses the reverse reaction of MavC, removing Ub from Ube2N through hydrolysis which regulates MavC activity. MvcA is similar at sequence and structural levels to MavC, and it exhibits deamidase activity toward ubiquitin. This domain is crucial for substrate recognition.
