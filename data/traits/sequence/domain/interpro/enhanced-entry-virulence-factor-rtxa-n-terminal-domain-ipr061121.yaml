identifier: InterPro:IPR061121
label: "Enhanced entry virulence factor RtxA, N-terminal domain"
definition: >-
  This entry represents the N-terminal, non-repetitive portion of the Legionella virulence factor RxtA, named for the presence of tandem repeats-in-toxin (RTX) domains. RtxA can be four to six thousand amino acids long. In some isolates, the toxin is divided into two tandem ORFs but presumably re-form by recombination. RtxA is involved in adherence and cell entry.
