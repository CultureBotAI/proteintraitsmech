identifier: InterPro:IPR055457
label: "OST48, N-terminal domain"
definition: >-
  This is the N-terminal domain of OST48 subunits from animals and plants and the orthologue from yeast Wbp1. This domain is distantly related to the IFT52 N-terminal domain. Members of this entry are involved in asparagine-linked protein glycosylation. In particular, dolichyl-diphosphooligosaccharide-protein glycosyltransferase (DDOST/OST48), also known as oligosaccharyltransferase, transfers the high-mannose sugar GlcNAc(2)-Man(9)-Glc(3) from a dolichol-linked donor to an asparagine acceptor in a consensus Asn-X-Ser/Thr motif in nascent polypeptide chains, the first step in protein N-glycosylation. In most eukaryotes, the DDOST complex is composed of three subunits, which in humans are described as a 48kD subunit, ribophorin I, and ribophorin II. However, the yeast DDOST appears to consist of six subunits (alpha, beta, gamma, delta, epsilon, zeta). The yeast beta subunit is a 45kD polypeptide, previously discovered as the Wbp1 protein, with known sequence similarity to the human 48kD subunit and the other orthologues.
