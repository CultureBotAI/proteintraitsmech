identifier: InterPro:IPR015153
label: "EF-hand domain, type 1"
definition: >-
  Like other EF hand domains, this domain forms a helix-loop-helix motif, though since it does not contain the canonical pattern of calcium binding residues found in many EF hand domains, it does not bind calcium ions. The main function of this domain is the provision of specificity in beta-dystroglycan recognition, though in dystrophin it serves an additional role: stabilisation of the WW domain, enhancing dystroglycan binding.
