identifier: InterPro:IPR048005
label: "Beta-alanine-activating enzyme, AMP-binding domain"
definition: >-
  This entry representes the N-terminal AMB-binding domain (also known as adenylation domain) present in human Beta-alanine-activating enzyme (AASDH) and similar proteins mainly found in vertebrates. AASDH, also known as Acyl-CoA synthetase family member 4 (ACSF4), comprises a putative AMP-binding domain similar to those of bacterial non-ribosomal peptide synthetases, a putative phosphopantetheine attachment site, and a C-terminal PQQDH (pyrroloquinoline quinone dehydrogenase)-related domain.
