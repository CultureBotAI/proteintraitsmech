label: "Mannanase, galactose-binding domain-like"
definition: >-
  This is a galactose-binding domain-like found at the C-terminal of alkaline mannanases, such as from Bacillus sp. JAMB-602 and related bacterial sequences which belong to the Glycoside Hydrolase Family 5 ( ).
