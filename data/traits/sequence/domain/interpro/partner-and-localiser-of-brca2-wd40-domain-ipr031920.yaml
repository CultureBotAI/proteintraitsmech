identifier: InterPro:IPR031920
label: "Partner and localiser of BRCA2, WD40 domain"
definition: >-
  This domain is found at the C terminus of partner and localiser of BRCA2 (PALB2). It is a seven-bladed WD40-type β-propeller. It binds to the N terminus of BRCA2.
