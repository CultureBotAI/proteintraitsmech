label: "CD-NTase-associated protein 16, NUDIX domain"
definition: >-
  This entry represents the NUDIX domain found in CD-NTase-associated protein 16 (Cap16), an effector protein of a CBASS antivirus system which provides immunity against bacteriophages [. It responds to antiviral nucleotide second messenger signaling and induce cell death, similarly to Cap15 and Cap14.
