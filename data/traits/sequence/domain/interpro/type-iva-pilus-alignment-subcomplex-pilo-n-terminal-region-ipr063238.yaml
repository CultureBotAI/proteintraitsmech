identifier: InterPro:IPR063238
label: "Type IVa pilus alignment subcomplex PilO, N-terminal region"
definition: >-
  This entry represents the N-terminal region of PilO, which comprises a short cytoplasmic peptide of approximately 20 residues followed by a single transmembrane segment. PilO is a component of the type IVa pilus (T4P) alignment subcomplex found in bacteria with type IV pili. The cytoplasmic N-terminal peptide of PilN (the structurally similar partner of PilO) binds to the cytoplasmic protein PilM, anchoring PilM to the inner membrane. The transmembrane segment anchors PilO in the inner membrane and connects the cytoplasmic and periplasmic portions of the protein. Together with PilN, PilO forms part of the alignment subcomplex that spans the cell envelope from the cytoplasm to the outer membrane secretin complex, linking the cytoplasmic motor ATPases to the pilus assembly machinery.
