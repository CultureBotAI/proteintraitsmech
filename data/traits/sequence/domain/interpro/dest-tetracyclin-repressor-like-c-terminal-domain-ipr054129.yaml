identifier: InterPro:IPR054129
label: "DesT tetracyclin repressor-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of DesT from Pseudomonas aeruginosa ( ) and similar bacterial transcriptional regulators such as the HTH-type transcriptional repressor FabR. DesT is involved in the control of the unsaturated:saturated fatty acid ratio available for membrane lipid synthesis. This region folds into six helices that create the ligand-binding domain. It is normally found associated with .
