identifier: InterPro:IPR059969
label: "NcaA domain"
definition: >-
  This entry represents a conserved domain found in the middle region of NcaA (Nuclear coactivator of AtrR), from fungi. This domain is flanked by large disordered regions at either sides. NcaA is a transcription factor required for normal voriconazole resistance in Aspergillus fumigatus. The protein contributes to the function of AtrR and regulates expression of the AtrR target gene abcG1. NcaA interacts with AtrR and is localised to the nucleus. The specific function of this C-terminal domain remains to be determined.
