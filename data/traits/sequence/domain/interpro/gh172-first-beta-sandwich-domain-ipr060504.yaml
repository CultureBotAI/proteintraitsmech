identifier: InterPro:IPR060504
label: "GH172, first beta-sandwich domain"
definition: >-
  This entry represents a domain found in GH172 family of enzymes. These proteins contain a pair of homologous structurally similar domains which adopt jelly-roll β-sandwich. They assemble into a trimeric structure that can form other higher-order assemblies. This domain is usually associated with .
