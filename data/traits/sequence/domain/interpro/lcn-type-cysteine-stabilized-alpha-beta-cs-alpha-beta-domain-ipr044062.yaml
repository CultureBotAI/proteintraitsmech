identifier: InterPro:IPR044062
label: LCN-type cysteine-stabilized alpha/beta (CS-alpha/beta) domain
definition: >-
  This entry represents the LCN-type CS-α/β domain consisting of one or two short segments of α-helix and a triple-stranded β-sheet which are held together by two disulfide bridges and connected by variable regions forming loops. Neurotoxins of the birtoxin family are also included in this group, although they possess three disulfide bridges instead of the usual four disulfide bridges of other members of the group and they are uniquely shorter than other LCNs. Scorpion venoms comprise complex mixtures of neurotoxins (low molecular weight proteins), cardiotoxins, hemolytic toxins, antimicrobial peptides, enzymes (such as hyaluronidase, acetylcholinesterase, phospholipase and metalloproteinases), lipides, nucleotides, mucopolysaccharides and biogenic amines. Neurotoxins can be classified as either short- or long-chain toxins, which share a common structural motif, named cysteine-stabilized α-helix/β-sheet (CS-α/β). Short-chain neurotoxins (SCNs) usually contain 30-40 residues and three or four disulphide bridges. Most of the short chain toxins block voltage-dependent or Ca+2-activated K+ channels. Most long-chain neurotoxins (LCNs) are composed of 60-70 residues and are cross-linked by four disulphide bridges. The long chain or voltage-gated sodium channels scorpion neurotoxins (NaScTxs) can be classified either as alpha-toxins, which slow down Na+ channel inactivation, or beta-toxins, which affect the channel activation process. Both types make the inactivation of the sodium channel incomplete.
