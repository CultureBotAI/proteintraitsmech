identifier: InterPro:IPR022537
label: "TRSP domain"
definition: >-
  This domain occurs C-terminal to phosphoribosyl transferase domain , and has a highly conserved GXXE and TRSP signatures. It is found in bacteria. These genes are found in the biosynthetic operon associated with the Ter stress response operon and are predicted to be involved in the biosynthesis of a ribo- nucleoside involved in stress response.
