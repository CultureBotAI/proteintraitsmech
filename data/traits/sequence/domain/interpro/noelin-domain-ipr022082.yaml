identifier: InterPro:IPR022082
label: "Noelin domain"
definition: >-
  This domain is found in eukaryotes, and is approximately 100 amino acids in length. The family is found in association with . There are two conserved sequence motifs: SAQ and VQN. It is found in Noelin, a glycoprotein which is secreted mainly by postmitotic neurogenic tissues in the developing central and peripheral nervous systems, first appearing after neural tube closure.
