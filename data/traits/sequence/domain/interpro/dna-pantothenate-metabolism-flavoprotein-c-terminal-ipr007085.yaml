identifier: InterPro:IPR007085
label: "DNA/pantothenate metabolism flavoprotein, C-terminal"
definition: >-
  This entry represents the C-terminal domain found in DNA/pantothenate metabolism flavoproteins, which affects synthesis of DNA and pantothenate metabolism. These proteins contain ATP, phosphopantothenate, and cysteine binding sites. The structure of this domain has been determined in human phosphopantothenoylcysteine (PPC) synthetase and as the PPC synthase domain (CoaB) from the Escherichia coli coenzyme A bifunctional protein CoaBC. This domain adopts a 3-layer α/β/α fold with mixed β-sheets, which topologically resembles a combination of Rossmann-like and ribokinase-like folds. The structure of these proteins predicts a ping pong mechanism with initial formation of an acyladenylate intermediate, followed by release of pyrophosphate and attack by cysteine to form the final products PPC and AMP.
