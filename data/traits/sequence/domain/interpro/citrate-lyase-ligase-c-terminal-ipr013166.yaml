identifier: InterPro:IPR013166
label: Citrate lyase ligase, C-terminal
definition: >-
  [Citrate (pro-3S)-lyase] ligase ( ), also known as citrate lyase ligase, is responsible for acetylation of the prosthetic group (2-(5''-phosphoribosyl)-3'-dephosphocoenzyme-A) of the gamma subunit of citrate lyase. It converts the inactive thiol form of the enzyme to the active form. In Clostridium sphenoides, citrate lyase ligase actively degrades citrate. In Clostridium sporosphaeroides and Lactococcus lactis, however, the enzyme is under stringent regulatory control. The enzyme's activity in anaerobic bacteria is modulated by phosphorylation and dephosphorylation. The proteins in this entry represent the C-terminal domain of citrate lyase ligase.
