identifier: InterPro:IPR063701
label: "ARC, AAA+ ATPase lid domain"
definition: >-
  This entry represents the ATPase lid domain of Proteasome-associated ATPases and AAA ATPase forming ring-shaped complexes (ARC). They are responsible for recognising, binding, unfolding and translocation of pupylated proteins into the bacterial 20S proteasome core particle.
