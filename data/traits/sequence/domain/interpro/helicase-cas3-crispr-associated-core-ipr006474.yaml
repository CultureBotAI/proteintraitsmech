identifier: InterPro:IPR006474
label: "Helicase Cas3, CRISPR-associated, core"
definition: >-
  The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA. This entry represents a highly conserved core region found in the Cas3 family of proteins. These proteins are found in association with CRISPR repeat elements in a broad range of bacteria and archaea. Cas3 is one of four protein families (Cas1 to Cas4) that are associated with CRISPR elements and always occur near a repeat cluster, usually in the order cas3-cas4-cas1-cas2. Cas3 proteins have motifs characteristic of helicases from superfamily 2 and contain a DEAD/DEAH box region and a conserved C-terminal domain. Some but not all Cas3 family members have an N-terminal HD domain region, although these sequences are not included within this group. These Cas proteins may be involved in DNA metabolism or gene expression.
