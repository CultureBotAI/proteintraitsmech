identifier: InterPro:IPR056420
label: "Gem-associated protein 5, RBS domain"
definition: >-
  This entry represents the RNA-binding domains RBS1 and RBS2 found at the C-terminal of Gem-associated protein 5 (GEMI5) from vertebrates. The RBS1 domain is involved in the recognition of viral IRES elements and cellular RNAs. This domain is intrinsically unstructured and interacts with RNA through conserved Arg and aromatic residues. GEMI5 is a component of the survival of motor neurons (SMN) complex, that binds small nuclear RNAs (snRNAs). The SMN complex assembles the heptameric Sm protein core on snRNAs playing a critical role in the biogenesis of small nuclear ribonucleoproteins (snRNPs). GEMI5 is also implicated in translation control, and gene expression reprogramming. GEMI5 from animals share a domain architecture consisting of two N-terminal β-propellers followed by a TPR domain and a C-terminal RNA-binding domain.
