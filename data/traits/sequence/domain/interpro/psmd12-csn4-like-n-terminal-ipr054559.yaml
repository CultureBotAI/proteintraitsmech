identifier: InterPro:IPR054559
label: "PSMD12/CSN4-like, N-terminal"
definition: >-
  The 26S proteasome consists of a 20S proteolytic core particle (CP) and a 19S regulatory particle (RP). The RP can be further divided into two subcomplexes, a base and a peripheral lid. The RP lid is structurally similar to the COP9 signalosome (CSN). The core CSN subunits (CSN4/5/7/6) show a remarkable one-to-one sequence correspondence with those of the RP lid (RPN5/11/9/8), suggesting a common ancestry and architecture. This entry represents the N-terminal region of PSMD12/RPN5 and CSN4 subunits, which consists of helical repeats.
