label: "Phosphoprotein, C-terminal domain, cytorhabdovirus"
definition: >-
  This entry represents the C-terminal domain of lettuce necrotic yellows virus phosphoprotein (PP) ( ) and similar sequences from cytorhabdovirus. This protein adopts a lollipop-shaped structure comprising five helices.
