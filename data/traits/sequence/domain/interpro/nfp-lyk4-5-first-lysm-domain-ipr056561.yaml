identifier: InterPro:IPR056561
label: "NFP/LYK4/5, first LysM domain"
definition: >-
  This entry represents the first LysM domain found in proteins from plants, including the NFP from Medicago truncatula and LYK4/5 from Arabidopsis thaliana. The LysM domain adopt a β-α-α-β fold. NFP/NFR5 class of receptors are crucial for initial lipochitooligosaccharide (LCO) perception and essential for LCO-mediated root nodule symbiosis. LysM receptor like kinases (LysM-RLKs) are only present in the plant kingdom and they usually have 3 LysM domains (LysM1, LysM2, LysM3) in their extracellular region. LYK4 is a chitin-binding protein and contributes to chitin-triggered immunity. LYK5 has been identified as a receptor with a very high affinity to chitooligosaccharides. Receptors recognising Nod factors and chitin have a very similar structure but contain two diverging motifs in the LysM1 domain that are necessary for discriminating between immunity and symbiotic functions. The LysM (lysin motif) domain is a small globular domain, approximately 40 amino acids long. It is a widespread protein module involved in binding peptidoglycan in bacteria and chitin in eukaryotes. The domain was originally identified in enzymes that degrade bacterial cell walls, but proteins involved in many other biological functions also contain this domain. It has been reported that the LysM domain functions as a signal for specific plant-bacteria recognition in bacterial pathogenesis. Many of these enzymes are modular and are composed of catalytic units linked to one or several repeats of LysM domains. LysM domains are found in bacteria and eukaryotes. The LysM domain adopts a β-α-α-β fold, according to structure predictions and the crystal structure
