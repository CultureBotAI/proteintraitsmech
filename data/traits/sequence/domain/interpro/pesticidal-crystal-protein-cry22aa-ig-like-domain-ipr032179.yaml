identifier: InterPro:IPR032179
label: "Pesticidal crystal protein Cry22Aa, Ig-like domain"
definition: >-
  This domain can be found in Pesticidal crystal protein Cry22Aa from Bacillus thuringiensis, a protein with a toxic effect on several insect larvae. It is also present in Chitinase 60 from Moritella marina ( ), responsible for degradation of krill chitin. BT_2262 from Bacteroides thetaiotaomicron ( ) contains this domain at the N-terminal end. This entry represents the bacterial immunoglobulin-like domain.
