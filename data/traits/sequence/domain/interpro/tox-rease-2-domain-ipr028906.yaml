identifier: InterPro:IPR028906
label: "Tox-REase-2 domain"
definition: >-
  This entry represents a restriction endonuclease fold present in bacterial polymorphic toxin systems. In bacterial polymorphic toxin systems, the toxin is exported by the type 2, type 7 or PrsW-peptidase dependent secretion system.
