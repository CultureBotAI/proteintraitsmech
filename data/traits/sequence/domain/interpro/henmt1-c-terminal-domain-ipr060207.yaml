identifier: InterPro:IPR060207
label: "HENMT1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in HENMT1 proteins from animals. HENMT1 is a small RNA 2'-O-methyltransferase that adds methyl groups to the 3'-end of piRNAs, protecting them from degradation and ensuring their stability for gametogenesis. The enzyme uses S-adenosyl-L- methionine as a cofactor and requires magnesium ions for catalytic activity. HENMT1 proteins are cytoplasmic and localise to P granules during meiosis. These proteins are found across vertebrates including birds, mammals, and other taxa within the Euteleostomi. The function of this C-terminal domain remains to be determined.
