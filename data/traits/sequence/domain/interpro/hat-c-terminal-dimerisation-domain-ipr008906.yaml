identifier: InterPro:IPR008906
label: HAT, C-terminal dimerisation domain
definition: >-
  This dimerisation domain is found at the C terminus of the transposases of elements belonging to the Activator superfamily (hAT element superfamily). The isolated dimerisation domain forms extremely stable dimers in vitro.
