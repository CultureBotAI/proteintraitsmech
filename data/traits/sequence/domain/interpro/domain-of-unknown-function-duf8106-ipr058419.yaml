identifier: InterPro:IPR058419
label: "Domain of unknown function DUF8106"
definition: >-
  This entry represents a domain from a family of uncharacterised domain in the Halobacteria class of Archaea. The proteins in this family are predominantly found in various families within the Halobacteriales order, including Natrialbaceae, Haloferacaceae, and Haloarculaceae. The domain is typically found in proteins ranging from 58 to 130 amino acids in length. A reviewed protein containing this domain is found in Haloferax volcanii. This domain contains two CXXC motifs suggesting it is likely to be zinc binding.
