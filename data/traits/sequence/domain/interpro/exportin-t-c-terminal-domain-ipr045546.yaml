identifier: InterPro:IPR045546
label: "Exportin-T, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Exportin-T, involved in RanGTP interaction. It consists of TPRs. Exportin-T (Xpot) mediates the nuclear export of aminoacylated tRNAs. Its budding yeast homologue, known as Los1, is involved in nuclear export of pre-tRNA and in re-export of mature tRNAs. It binds to RanGTP and mature tRNAs cooperatively to form a nuclear export complex.
