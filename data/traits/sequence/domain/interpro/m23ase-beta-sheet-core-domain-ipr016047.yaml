identifier: InterPro:IPR016047
label: "M23ase, beta-sheet core domain"
definition: >-
  This entry represents the duplicated hybrid domain found in the M23 peptidase family in bacteria, which includes various peptidoglycan hydrolases with diverse specificities. Many members, such as Lysostaphin , are Gly-Gly endopeptidases, while others like Protease LasA have broader substrate specificity. The duplicated hybrid motif is a structural motif that is found in certain glucose-permease-like enzymes and consists of a half-barrel β-sheet of eight strands that is sandwiched with two 3-stranded β-sheets. Enzymes displaying this motif include domain IIa of the glucose-specific permease from bacteria, which is part of the phosphoenolpyruvate:sugar phosphotransferase system (PTS), a bacterial and mycoplasma system responsible for the uptake of some sugars and their concomitant phosphorylation. This structural motif is also found in peptidoglycan hydrolase LytM in Staphylococcus aureus , a member of peptidase family M23, although it contains an extra N-terminal, non-conserved β-sheet subdomain. Peptidase M23 is a family of zinc-dependent metallopeptidases that play crucial roles in bacterial cell wall metabolism and peptidoglycan remodelling. These enzymes are characterised by a conserved β-sheet core. The family includes both glycyl-glycine endopeptidases and enzymes with broader substrate specificity, such as D,L-endopeptidases. M23 peptidases contain two conserved catalytic motifs: H(x)nD and HxH, which coordinate a zinc ion. These enzymes play vital roles in bacterial physiology, including cell growth, division, and virulence, and have potential applications as antimicrobial agents against drug-resistant pathogens. This domain is also found in Leukocyte cell-derived chemotaxin-2 homolog which is is required for the formation of somatosensory dendritic arbo…
