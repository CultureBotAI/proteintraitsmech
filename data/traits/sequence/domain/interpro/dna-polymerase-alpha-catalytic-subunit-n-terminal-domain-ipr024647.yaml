label: "DNA polymerase alpha catalytic subunit, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of DNA polymerase alpha catalytic subunit (the DNA polymerase alpha complex is composed of four subunits). This domain is approximately 70 amino acids in length and it contains a specific labile site.
