identifier: InterPro:IPR048436
label: MASE12
definition: >-
  This is the membrane-associated sensor domain 12 (MASE12), found (predicted) in c-di-GMP phosphodiesterases and histidine kinases. This domain has conserved aromatic residues in the transmembrane segments, which suggests that its ligand could be a molecule with one or more aromatic rings.
