identifier: InterPro:IPR037552
label: "Outer dense fibre protein 1, alpha crystallin domain"
definition: >-
  ODF1 is a component of the outer dense fibres (ODF), which are cytoskeletal structures specifically found in the sperm tails of vertebrates. ODF1 has been assigned to the heat shock protein family based on its overall structural features and especially on its conserved alpha-crystallin domain, and it is also known as HSPB10. ODF1 is essential for tight linkage of sperm head to tail and is essential for male fertility. This entry represents the alpha crystallin domain (ACD) of ODF1.
