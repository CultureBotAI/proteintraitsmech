identifier: InterPro:IPR013422
label: "CRISPR-associated protein Cas5, N-terminal"
definition: >-
  The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA. This entry represents a shared N-terminal region, of about 43 amino acids in length, found in a number of Cas proteins. This region is widely distributed and was designated Cas5. Proteins containing this region are generally 210 to 265 amino acids in length and show little or no homology between their C-terminal regions. The best characterised protein in this entry is DevS ( ) from Myxococcus xanthus, a Cas protein that appears to participate in a species-specific developmental pathway. Cas5 is found within a cluster of three cas genes associated with CRISPR structures in many bacterial species, named cas1B, cas5 and cas6.
