identifier: InterPro:IPR047365
label: "PTM/DIR17-like, Tudor domain"
definition: >-
  This entry represents the Tudor domain of PTM and DIR17 from Arabidopsis thaliana. AtPTM, also called DDT domain-containing protein 1, or PHD type transcription factor with transmembrane domains, is a membrane-bound transcription factor required for plastid-to-nucleus retrograde signalling.
