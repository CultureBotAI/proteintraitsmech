identifier: InterPro:IPR010330
label: "Competence protein CoiA, nuclease-like domain"
definition: >-
  This entry represents a domain found in the Competence protein CoiA from Bacillus subtilis and related proteins. This domain has a detectable similarity to PD-(D/E)XK nuclease superfamily and is predicted to adopt a similar structure. CoiA falls within a competence-specific operon in Streptococcus. It is required for optimal transformation. Competence is the ability of a cell to take up exogenous DNA from its environment, resulting in transformation. It is widespread among bacteria and is probably an important mechanism for the horizontal transfer of genes. DNA usually becomes available by the death and lysis of other cells. Competent bacteria use components of extracellular filaments called type 4 pili to create pores in their membranes and pull DNA through the pores into the cytoplasm. This process, including the development of competence and the expression of the uptake machinery, is regulated in response to cell-cell signalling and/or nutritional conditions.
