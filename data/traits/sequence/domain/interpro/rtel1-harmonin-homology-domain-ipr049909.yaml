label: "Rtel1, harmonin homology domain"
definition: >-
  This entry represents a domain which appears to be similar to the N-terminal domain of the scaffolding protein harmonin, and therefore, it has been named as the harmonin homology domain (HHD), found C-terminal of these proteins. In human and some other mammals as well as in some fish species, this domain is found as two tandem ones, referred to as HHD1 and HHD2 (or HNL1/2), while in plants and arthropods it is found as a single domain. HHD1/2 may mediate protein-protein interactions. It has been shown that the HHD1 domain from the human protein mediates interaction of RTEL1 with SLX4, which prevents replication-transcription collision through R-loop dissolution. Mutations in these domain are associateδ with Hoyeraal-Hreidarsson syndrome and pulmonary fibrosis. Regulator of telomere elongation helicase 1 (Rtel1) is the animal functional analogue of yeast Srs2, which is a DNA helicase and DNA-dependent ATPase involved in DNA repair and checkpoint recovery. Rtel1 is an essential DNA helicase that disassembles a variety of DNA secondary structures to facilitate DNA replication, repair, and recombination processes, and to maintain both telomeric and genomic stability. It is recruited by Trf2 to telomeres in S phase to promote T-Loop unwinding. It is also required for the export and the correct cytoplasmic trafficking of the small nuclear (sn) RNA pre-U2, a component of the major spliceosome complex. Human Rtel1 is implicated in the etiology of Dyskeratosis congenital (DC, is an inherited bone marrow failure and cancer predisposition syndrome). Point mutations in its helicase domains, and truncations which result in loss of its C terminus have been discovered in DC families. It acts as anti-recombinase and antagonises homologous recombination by promoting the disassembly of…
