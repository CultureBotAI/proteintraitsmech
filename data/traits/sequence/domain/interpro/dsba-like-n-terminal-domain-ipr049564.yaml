definition: >-
  This domain is found at the N-terminal end of Putative secreted protein from Corynebacterium diphtheriae (DsbA, ). It is usually found associated with . Its specific function is unknown. It adopts an α/β structure with a central antiparallel β-sheet and α-helices packed on it.
