identifier: InterPro:IPR062066
label: "IGSF6, transmembrane helix"
definition: >-
  This entry represents the transmembrane helix found at the C-terminal of IGSF6 proteins from vertebrates and precedes a predicted disordered region. The specific function of this domain remains to be determined. IGSF6 is a single-pass type I transmembrane protein of the immunoglobulin superfamily that contains an extracellular V-set domain. IGSF6 is expressed in immune tissues including peripheral blood lymphocytes, spleen and lymph nodes. The protein can be induced by TNF and GM-CSF in dendritic cells and down-regulated by PMA and ionomycin in monocytes.
