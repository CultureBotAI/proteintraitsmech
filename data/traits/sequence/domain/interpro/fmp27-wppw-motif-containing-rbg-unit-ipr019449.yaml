identifier: InterPro:IPR019449
label: "FMP27, WPPW motif-containing RBG unit"
definition: >-
  This entry represents a RBG module within FMP27 that contains the conserved HQR and WPPW sequence motifs. Fungal proteins FMP27 (also known as Hob1) and Hob2 (YPR117W) are tube-forming lipid transport proteins which bind to phosphatidylinositols and affects phosphatidylinositol-4,5-bisphosphate (PtdIns-4,5-P2) distribution. They belong to the repeating β-groove (RBG) superfamily together with VPS13, ATG2, SHIP164, Csf1/BLTP1 proteins, which are all conserved lipid transfer proteins containing long hydrophobic grooves. They all share the same structure consisting of multiple repeating modules comprising five β-sheets followed by a loop.
