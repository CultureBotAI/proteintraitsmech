identifier: InterPro:IPR001632
label: "G-protein beta subunit-like, WD40 repeats"
definition: >-
  This entry represents a region of WD40 repeats found in the G protein beta subunit, Chromatin assembly factor 1 subunit B, Notchless protein homolog and similar proteins mainly found in eukaryotes. G protein beta subunit assumes a barrel-shaped β-propeller structure containing WD-40 repeats preceded by an N-terminal α helix. The beta subunit forms a stable dimer with the gamma subunit. The alpha subunit only contacts the beta subunit in the dimer, lying on the opposite face from the gamma subunit. RGS proteins that contain GGL (G protein gamma-like) domains can interact with beta subunits to form novel dimers that prevent gamma subunit binding, and may prevent heterotrimer formation by inhibiting alpha subunit binding Guanine nucleotide binding proteins (G-proteins) are membrane-associated, heterotrimeric proteins composed of three subunits: alpha ( ), beta ( ) and gamma ( ). G proteins and their receptors (GPCRs) form one of the most prevalent signalling systems in mammalian cells, regulating systems as diverse as sensory perception, cell growth and hormonal regulation. At the cell surface, the binding of ligands such as hormones and neurotransmitters to a GPCR activates the receptor by causing a conformational change, which in turn activates the bound G protein on the intracellular-side of the membrane. The activated receptor promotes the exchange of bound GDP for GTP on the G protein alpha subunit. GTP binding changes the conformation of switch regions within the alpha subunit, which allows the bound trimeric G protein (inactive) to be released from the receptor, and to dissociate into active alpha subunit (GTP-bound) and beta/gamma dimer. The alpha subunit and the beta/gamma dimer go on to activate distinct downstream effectors, such as adenylyl cyclase, phosphodie…
