identifier: InterPro:IPR001633
label: "EAL domain"
definition: >-
  This domain is found in diverse bacterial signalling proteins. It is called EAL after its conserved residues. The EAL domain has been shown to stimulate degradation of a second messenger, cyclic di-GMP, and is a good candidate for a diguanylate phosphodiesterase function. Together with the GGDEF domain, EAL might be involved in regulating cell surface adhesiveness in bacteria. The domain contains many conserved acidic residues that could participate in metal binding and might form the phosphodiesterase active site. It often but not always occurs along with and domains that are also found in many signalling proteins .
