identifier: InterPro:IPR042787
label: M3K14, catalytic domain
definition: >-
  STKs catalyse the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MAP3K14 (also known as NIK) phosphorylates and activates Inhibitor of NF-KappaB Kinase (IKK) alpha, which is a regulator of NF-kB proteins, a family of transcription factors which are critical in many cellular functions including inflammatory responses, immune development, cell survival, and cell proliferation, among others. NIK is essential in the IKKalpha-mediated non-canonical NF-kB signaling pathway, in which IKKalpha processes the IkB-like C terminus of NF-kB2/p100 to produce p52, allowing the p52/RelB dimer to migrate to the nucleus where it regulates gene transcription.
