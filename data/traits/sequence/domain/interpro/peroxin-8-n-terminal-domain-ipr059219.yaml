identifier: InterPro:IPR059219
label: "Peroxin 8, N-terminal domain"
definition: >-
  This domain is found towards the N-terminal end of the Peroxisomal biogenesis factor 8 protein (PEX8), Peroxisomal membrane protein PEX17 and related proteins from fungal species. PEX17 is involved in peroxisome biosynthesis. This protein is required for the import of a subset of matrix proteins into peroxisomes. PEX8 is essential component of the machinery required for the import of both PTS1 and PTS2 (and perhaps all) peroxisomal matrix proteins. Binding of PEX8 to the N terminus of PEX5 cargo receptor induces a conformational change of the TPR domains and decrease their binding affinity to cargo, facilitating the release of the PTS1 proteins within the peroxisome.
