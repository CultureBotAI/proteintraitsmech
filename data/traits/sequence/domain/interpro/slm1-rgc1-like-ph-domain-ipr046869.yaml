identifier: InterPro:IPR046869
label: "SLM1/RGC1-like, PH domain"
definition: >-
  This entry represents a PH domain found in a variety of fungal proteins, including SLM1/2 and RGC1/2. This domain is known to bind phosphatidylinositides, however, in RGC1/2 (also known as Ask10 and Ypr115w, respectively) this domain is interrupted by long insertions which suggests that they bind different ligands.
