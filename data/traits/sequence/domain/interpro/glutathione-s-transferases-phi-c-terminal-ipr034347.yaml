identifier: InterPro:IPR034347
label: "Glutathione S-transferases Phi, C-terminal"
definition: >-
  This entry represents the C-terminal α helical domain found in the Phi subfamily (also known as GSTF) of the glutathione S-transferase (GST) family. GSTF had long been regarded as plant specific but has also been found in basidiomycete fungi. GSTs are cytosolic dimeric proteins involved in cellular detoxification by catalyzing the conjugation of glutathione (GSH) with a wide range of endogenous and xenobiotic alkylating agents, including carcinogens, therapeutic drugs, environmental toxins, and products of oxidative stress. The GST fold contains an N-terminal thioredoxin-fold domain and a C-terminal α helical domain, with an active site located in a cleft between the two domains. GSH binds to the N-terminal domain while the hydrophobic substrate occupies a pocket in the C-terminal domain.
