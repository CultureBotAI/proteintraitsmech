identifier: InterPro:IPR060097
label: "PF3D7_0210200, sixth domain"
definition: >-
  This entry represents the sixth domain of Plasmodium falciparum protein PF3D7_0210200 and related proteins. The domain adopts a helix hairpin structure. The protein contains predicted coiled-coil regions and multiple disordered regions. The protein is localised to the merozoite, and a peptide fragment has been identified as a potential malaria vaccine candidate. The function of this domain remains to be determined.
