identifier: InterPro:IPR037598
label: TFCP2L1, SAM domain
definition: >-
  TFCP2L1 (also known as LBP9) is involved in transcriptional regulation from early development to terminal differentiation. In mice, it is required for proper maturation of the duct of the salivary gland and the kidney. In humans, it is involved in the regulation of P450scc (the cholesterol side-chain cleavage enzyme, cytochrome) in placental JEG-3 cells. TFCP2L1 is also involved in establishment and maintenance of pluripotency in embryonic stem cells through formation of complex transcriptional networks with the other transcription factors, OCT4, SOX2, and NANOG.
