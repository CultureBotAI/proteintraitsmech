identifier: InterPro:IPR013429
label: "Putative regulatory protein FmdB, zinc ribbon domain"
definition: >-
  This entry represents a putative zinc β-ribbon domain of about 41 amino acids found in several small proteins in a wide range of bacteria. The region usually begins with the initiator Met and contains two CxxC motifs separated by 17 amino acids. One protein in this entry has been noted as a putative regulatory protein, designated FmdB. Most proteins in this entry have a C-terminal region containing a highly degenerate sequence.
