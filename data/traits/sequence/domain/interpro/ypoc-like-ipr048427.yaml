identifier: InterPro:IPR048427
label: YpoC-like
definition: >-
  This entry represents the structural domain of the uncharacterised protein YpoC from Bacillus subtilis and related proteins primarily found in Bacillota. They are predicted to adopt a globular structure consisting mainly of α-helices.
