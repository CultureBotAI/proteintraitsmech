identifier: InterPro:IPR049464
label: "Conjugal transfer protein-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of the transfer protein TraM from Enterococcus faecalis and similar proteins from bacilli. Its structure is similar to this of the conjugative type IV secretion systems (T4SS) VirB8 proteins from Agrobacterium tumefaciens and to the transfer protein TcpC from Clostridium perfringens. It shows two anti-parallel α-helices and an anti-parallel, highly curved β-sheet, made up of five β-strands.
