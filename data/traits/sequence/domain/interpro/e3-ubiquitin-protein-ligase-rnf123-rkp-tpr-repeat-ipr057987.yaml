identifier: InterPro:IPR057987
label: "E3 ubiquitin-protein ligase RNF123/RKP, TPR repeat"
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found in human E3 ubiquitin-protein ligase RNF123 and similar eukaryotic proteins including E3 ubiquitin-protein ligase RKP from plants. RNF123 is the catalytic subunit of the KPC complex and functions as an E3 ubiquitin-protein ligase that promotes the ubiquitination and proteasome-mediated degradation of CDKN1B, a cyclin-dependent kinase inhibitor involved in the G0-G1 transition of the cell cycle. In addition to its E3 ligase activity, RNF123 also acts as an inhibitor of innate antiviral signalling mediated by DDX58 and IFIH1, functioning independently of its ligase activity. RKP is an E3 ubiquitin-protein ligase that promotes the ubiquitination and proteasomal degradation of KRP1 and KRP2.
