identifier: InterPro:IPR034928
label: "Matrin-3, RNA recognition motif 1"
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of Matrin 3. Matrin 3 (MATR3 or P130) is an RNA- and DNA-binding nuclear matrix protein found to be associated with neural and muscular degenerative diseases. It contains a bipartite nuclear localization signal (NLS), two zinc finger domains and two RNA recognition motifs (RRM). It has been found to regulate alternative splicing and play a role in mRNA stabilization. It also functions as a co-factor for HIV-1 Rev in regulating post-transcriptional viral gene expression.
