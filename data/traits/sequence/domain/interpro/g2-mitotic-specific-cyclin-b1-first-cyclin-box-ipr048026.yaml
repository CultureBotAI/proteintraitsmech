identifier: InterPro:IPR048026
label: "G2/mitotic-specific cyclin-B1, first cyclin box"
definition: >-
  CCNB1 (G2/mitotic-specific cyclin-B1) is essential for the control of the cell cycle at the G2/M (mitosis) transition, required for embryo development. Over-expression of human CCNB1 has been found in numerous cancers and has been associated with tumor aggressiveness. CCNB1 contains two cyclin boxes, the first one is represented in this entry. The cyclin box is a protein binding domain.
