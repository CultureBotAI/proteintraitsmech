identifier: InterPro:IPR005521
label: Attacin, C-terminal
definition: >-
  This domain is found in attacin, sarcotoxin and diptericin. All members of these proteins are insect antibacterial proteins which are induced by the fat body and subsequently secreted into the hemolymph where they act synergistically to kill the invading microorganism.
