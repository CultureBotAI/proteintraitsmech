identifier: InterPro:IPR032456
label: "CAAX prenyl protease 1, N-terminal"
definition: >-
  This entry represents the N-terminal five transmembrane α-helices domain of CAAX prenyl protease 1 (also known as Ste24 in budding yeast). Ste24 is a zinc metalloprotease catalysing two proteolytic steps in the maturation of yeast mating pheromone a-factor. The structures of Ste24 and its human homologue, ZMPSTE24, have been revealed.
