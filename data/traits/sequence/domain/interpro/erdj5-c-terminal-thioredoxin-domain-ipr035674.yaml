identifier: InterPro:IPR035674
label: "ERdj5, C-terminal thioredoxin domain"
definition: >-
  ERdj5, also known as JPDI and macrothioredoxin, is a protein containing an N-terminal DnaJ domain and four redox-active TRX domains. This entry represents the three TRX domains located at the C-terminal half of the protein. ERdj5 is a ubiquitous protein localised in the endoplasmic reticulum (ER) and is abundant in secretory cells. Its transcription is induced during ER stress. It interacts with BiP through its DnaJ domain in an ATP-dependent manner. BiP, an ER-resident member of the Hsp70 chaperone family, functions in ER-associated degradation and protein translocation. Also included in this entry is the single complete TRX domain of an uncharacterised protein from Tetraodon nigroviridis.
