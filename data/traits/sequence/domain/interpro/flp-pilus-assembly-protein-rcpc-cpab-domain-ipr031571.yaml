identifier: InterPro:IPR031571
label: "Flp pilus assembly protein RcpC/CpaB domain"
definition: >-
  This entry represents a domain found in the putative pilus assembly protein RcpC and RcpC-like protein CpaB. RcpC is a bacterial protein expressed from the tight-adherence tad locus. The Tad machine assembles type IVb pili, and RcpC could have a role modifying the Flp pilin. It is an auxiliary protein that sits in the inner membrane and interacts with TadB and TadZ, an AAA ATPase. A recent study has identified two tandem β-clip domains in RcpC95. β-Clip domains are known to interact with carbohydrate moieties in other systems.
