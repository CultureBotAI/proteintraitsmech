identifier: InterPro:IPR034075
label: "Glr3161-like, domain"
definition: >-
  This entry refers to a domain found in predominantly uncharacterised, non-peptidase homologues from family S8 (subtilisin) in which one or more active site residues are not conserved. Included within this entry is the Glr3161 protein from Gloeobacter violaceus, in which the catalytic histidine has been replaced. This domain is part of a family of domains found in serine peptidases belonging to the MEROPS peptidase families S8 (subfamilies S8A (subtilisin) and S8B (kexin)) and S53 (sedolisin), both of which are members of clan SB.
