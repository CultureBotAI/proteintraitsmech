identifier: InterPro:IPR057249
label: "Androglobin, circularly permuted globin domain"
definition: >-
  This entry represents the circularly permuted globin-like domain found in Androglobin. Androglobin is a multidomain protein with a key role in spermatogenesis. It is required for sperm flagellum formation and maturation of elongating spermatids, both essential for male fertility. Unlike classical globins, the androglobin globin domain has a rearranged sequence that folds into α-helices, resulting in a different topology while maintaining the overall globin fold. A disulfide bond, similar to that found in neuroglobin, forms a closed loop around the haem pocket, taking the place of androglobin's missing CD loop. This unique structural feature further supports the haem pocket structure and likely contributes to its stability. The androglobin globin-like domain displays unusual ligand binding properties. It binds nitric oxide as a five-coordinate complex, which is rare among globins and similar to other haem proteins with nitric oxide storage functions. The haem iron is likely bis-histidyl six-coordinate, potentially allowing it to bind dioxygen, carbon monoxide, and nitric oxide. It exhibits rapid autoxidation and high nitrite reductase activity, suggesting a role in nitric oxide homeostasis or buffering rather than oxygen transport.
