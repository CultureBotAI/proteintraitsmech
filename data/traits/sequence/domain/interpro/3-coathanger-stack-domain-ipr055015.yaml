identifier: InterPro:IPR055015
label: "3-coathanger stack domain"
definition: >-
  This entry represents a domain which is frequently found as C-terminal of a larger protein, typically with Gly-Cys-Xaa(-Xaa) as the last three (or four) amino acids, or just upstream from type IX secretion system (T9SS) C-terminal sorting signal domain. In from Spirosoma taeanense, a member of this group, this domain is predicted to adopt all-β structure for with the backbone resembling a stack of three wire coathangers, the first of which is the most poorly conserved.
