identifier: InterPro:IPR041414
label: "RamQ-like, middle-like domain"
definition: >-
  This entry represents the middle domain in Corrinoid activation enzyme RamQ. It can also be found at the N-terminal in [Co(II) methylated amine-specific corrinoid protein] reductase (RamA). RamQ is involved in the degradation of the quaternary amines L-proline betaine and L-carnitine. RamA is required for the activation of corrinoid-dependent methylamine methyltransferase reactions during methanogenesis.
