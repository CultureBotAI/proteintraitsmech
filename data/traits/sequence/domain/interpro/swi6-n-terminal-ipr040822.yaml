identifier: InterPro:IPR040822
label: "Swi6, N-terminal"
definition: >-
  This is a putative DNA binding domain found in Swi6, which is part of a complex involved in cell-cycle-dependent transcription. This domain comprises four α helices and five β strands arranged in a mixed α/β fold.
