identifier: InterPro:IPR006719
label: DEC-1 protein, N-terminal
definition: >-
  The defective chorion-1 gene (dec-1) in Drosophila encodes follicle cell proteins necessary for proper eggshell assembly. Multiple products of the dec-1 gene are formed by alternative RNA splicing and proteolytic processing. Cleavage products include S80 (80kDa) which is incorporated into the eggshell, and further proteolysis of S80 gives S60 (60kDa). This domain is present at the N-terminal of these proteins.
