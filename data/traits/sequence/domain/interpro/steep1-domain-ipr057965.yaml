identifier: InterPro:IPR057965
label: "STEEP1 domain"
definition: >-
  This domain is found towards the N-terminal end of human STING ER exit protein (STEEP1) and similar eukaryotic sequences. This domain adopts an all-β configuration. STEEP1 is a molecular adapter that stimulates membrane curvature formation and subsequent endoplasmic reticulum exit site establishment by recruiting PI3K complex I, leading to COPII vesicle-mediated transport. STEEP interacts with STING and enables STING signaling by promoting ER exit.
