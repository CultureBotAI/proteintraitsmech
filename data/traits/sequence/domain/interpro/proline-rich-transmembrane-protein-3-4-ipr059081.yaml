identifier: InterPro:IPR059081
label: "Proline-rich transmembrane protein 3/4"
definition: >-
  This domain is found in human Proline-rich transmembrane protein 3 (PRRT3) and 4 (PRRT4) and similar animal proteins. This domain is predicted to adopt an all-α configuration. The specific function of these proteins has not been elucidated yet.
