identifier: InterPro:IPR040892
label: "RPN1, N-terminal"
definition: >-
  The 26S proteasome is the major ATP-dependent protease in eukaryotes which plays a key role in intracellular protein degradation. This domain is found at the N terminus of the 26S proteasome regulatory subunit RPN1 (also known as 26S proteasome non-ATPase regulatory subunit 2 (PSMD2)). The domain is formed by an array of α-helices.
