label: "Domain of unknown function DUF7305"
definition: >-
  This domain is found in uncharacterised prokaryotic proteins most of which likely associated with proteins located in pilBC operon. It is frequently found inserted in . This domain is predicted to adopt a single-stranded right-handed beta-helix with similarity to ice-binding proteins and other adhesive domains.
