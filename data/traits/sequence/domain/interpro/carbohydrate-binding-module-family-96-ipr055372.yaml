identifier: InterPro:IPR055372
label: "Carbohydrate-binding module family 96"
definition: >-
  This entry represents a CBM domain, a member of the family, found in functionally diverse multi-domain proteins including tRNA nuclease WapA, alginate lyase from Defluviitalea phaphyphila, chondroitinase from Dysgonomonas sp. The CBM96 domain from the latter proteins, has been structurally characterised. It folds into a β-sandwich with a significant structural similarity to nucleoplasmin ( , ).
