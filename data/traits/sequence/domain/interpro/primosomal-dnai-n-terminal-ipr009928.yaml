identifier: InterPro:IPR009928
label: "Primosomal DnaI, N-terminal"
definition: >-
  This entry represents the N terminus (approximately 120 residues) of bacterial primosomal DnaI proteins, although one family member appears to be of viral origin. DnaI is one of the components of the Bacillus subtilis replication restart primosome, and is required for the DnaB75-dependent loading of the DnaC helicase.
