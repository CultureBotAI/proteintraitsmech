identifier: InterPro:IPR021418
label: "THO complex, subunitTHOC2, C-terminal"
definition: >-
  THO and TREX form a eukaryotic complex which functions in messenger ribonucleoprotein metabolism and plays a role in preventing the transcription-associated genetic instability. Tho2, along with four other subunits forms THO. This entry represents a conserved domain found towards the C terminus of these proteins.
