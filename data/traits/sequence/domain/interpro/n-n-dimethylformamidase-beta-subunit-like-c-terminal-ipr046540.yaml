identifier: InterPro:IPR046540
label: "N,N-dimethylformamidase beta subunit-like, C-terminal"
definition: >-
  This entry represents a domain found at the C-terminal of bacterial proteins, including N,N-dimethylformamidase beta (DMFA2) subunit from Paracoccus, the large subunit of dimethylformamidase (DMFase), an enzyme containing a Fe3 ion in the active site that catalyses the hydrolytic cleavage of the amide bond in N,N-dimethyl formamide. This domain is described as domain III, which adopts an α/β/α fold, with five β-strands that are parallel and sandwiched between α-helices. This domain is also found in some uncharacterised fungal sequences.
