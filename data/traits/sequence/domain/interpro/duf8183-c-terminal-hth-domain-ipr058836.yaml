identifier: InterPro:IPR058836
label: "DUF8183, C-terminal HTH domain"
definition: >-
  This entry represents a presumed helix-turn-helix (HTH) domain of unknown function found in uncharacterised proteins in archaea. The domain is typically around 60-70 amino acids in length. DUF8183 contains a SycN-like N-terminal domain and an HTH C-terminal domain .
