identifier: InterPro:IPR030399
label: Pestivirus NS2, peptidase C74
definition: >-
  Pestiviruses are animal pathogens that are recognised as a separate genus of the family Flaviviridae. The pestiviral genome is a single-stranded RNA of positive polarity. It is translated into a large polyprotein, which is cotranslationally and posttranslationally processed by viral and cellular proteases. Pestivirus nonstructural protein 2 (NS2) is predicted to have a multidomain organisation. The C-terminal-most domain of NS2 is a cysteine autoprotease responsible for NS2-3 cleavage. The catalytic triad is formed by His, Glu, and Cys. The pestivirus NS2 protease domain contains five Cys and one His organised in a linear fashion, suggesting the presence of a mononuclear ZnB site. The pestivirus NS2 protease domain forms peptidase family C74. The entry represents the entire pestivirus NS2 protease domain.
