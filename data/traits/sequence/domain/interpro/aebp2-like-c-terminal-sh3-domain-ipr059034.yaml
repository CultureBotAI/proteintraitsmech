identifier: InterPro:IPR059034
label: "AEBP2-like, C-terminal SH3 domain"
definition: >-
  This domain is found at the C-terminal end of human Zinc finger protein AEBP2 and similar sequences mainly found in animals, including Zinc finger protein jing. This domain shows a mainly β configuration. AEBP2 acts as an accessory subunit for the core Polycomb repressive complex 2, which mediates histone H3K27 trimethylation on chromatin leading to transcriptional repression of the affected target gene. Zinc finger protein jing from D. melanogaster is required for Egfr pathway function and MAPK activity in CNS midline and tracheal placodes and for CNS axon development and tracheal tubule development. It is also required for other processes such as the establishment of the primary axon scaffold in the brain and for lateral positioning of longitudinal glia, longitudinal axons and neurons, glial survival, regenerative growth in leg imaginal disks and the initiation of anterior migration of border cells of the ovary.
