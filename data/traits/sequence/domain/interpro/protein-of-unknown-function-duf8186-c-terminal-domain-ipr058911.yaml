label: "Protein of unknown function DUF8186, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in a family of uncharacterised proteins from Halobacteria. The proteins in this family are typically around 550-580 amino acids in length. This domain is predicted to adopt an Ig-like fold.
