identifier: InterPro:IPR040157
label: Max dimerization protein 1, basic Helix-Loop-Helix-zipper domain
definition: >-
  MXD1, also known as MAD, binds Max to form a repressive transcription factor. It antagonizes MYC transcriptional activity by competing for MAX. It has also been shown to regulate rRNA synthesis. This entry represents the basic Helix-Loop-Helix-zipper (bHLHzip) domain of MXD1. The N-terminal basic region of this domain mediates high-affinity DNA-binding to specific hexanucleotide sequences.
