identifier: InterPro:IPR034406
label: "RBMS3, RNA recognition motif 2"
definition: >-
  This entry represents the RNA recognition motif 2 (RRM2) of RBMS3 (RNA-binding motif, single-stranded-interacting protein 3). RBMS3 contains two RNA binding motifs and is closely related to the structure of the c-myc gene single-strand binding proteins (MSSPs). RBMS3 has been shown to exhibit tumour suppressor function via regulation of c-Myc and to bind/stabilize RNA in vitro. It may posttranscriptionally regulate the transforming growth factor beta receptor pathway. RBMS3 regulates the expression of Ptf1a (pancreas transcription factor 1 alpha subunit).
