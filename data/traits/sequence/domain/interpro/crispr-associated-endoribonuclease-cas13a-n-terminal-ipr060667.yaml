identifier: InterPro:IPR060667
label: "CRISPR-associated endoribonuclease Cas13a, N-terminal"
definition: >-
  This is the N-terminal domain of CRISPR-associated endoribonucleases known as Cas13a which are involved in the CRISPR adaptive immune system, which provides defense against mobile genetic elements such as viruses, transposable elements, and conjugative plasmids. Cas13a is part of the type VI-A CRISPR-Cas system and functions as an RNA-targeting endonuclease that cleaves target single-stranded RNA in a crRNA-dependent manner. Activation of these proteins for non-specific RNA degradation, also known as collateral RNA degradation, is triggered by the binding of a viable target RNA. The protein contains two HEPN-like folds that are involved in RNA cleavage activity represented by and . These domains undergo conformational changes upon RNA binding that are critical for their function.
