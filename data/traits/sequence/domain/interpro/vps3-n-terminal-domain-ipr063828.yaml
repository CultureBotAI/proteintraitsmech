identifier: InterPro:IPR063828
label: "VPS3, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of vacuolar protein sorting-associated protein 3 (VPS3) from Saccharomyces cerevisiae and related fungal sequences. VPS3 proteins are involved in vacuolar protein sorting. The full-length VPS3 protein is required for sorting and processing of soluble vacuolar proteins, integrity of vacuolar morphology, efficient segregation of vacuolar material during the cell cycle, vacuolar acidification, and assembly of the vacuolar H(+)-ATPase. VPS3 is a component of the CORVET tethering complex and localises to the cytoplasm. The specific function of this N-terminal domain remains to be determined.
