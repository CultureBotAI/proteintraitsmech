identifier: InterPro:IPR057439
label: "Angiopoietin-1/2/4 domain"
definition: >-
  This presumed domain is found in Angiopoietin-1, 2 and 4 (ANG-1/2/4) and similar animal sequences. This domain, which is predicted to adopt an α-helical configuration, is often associated with . Angiopoietin-1 (ANG-1) plays an important role in the regulation of angiogenesis, endothelial cell survival, proliferation, migration, adhesion and cell spreading, reorganisation of the actin cytoskeleton and maintenance of vascular quiescence. It is required for normal angiogenesis and heart development during embryogenesis.
