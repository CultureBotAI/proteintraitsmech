identifier: InterPro:IPR005097
label: "Saccharopine dehydrogenase, NADP binding domain"
definition: >-
  This entry represents the NADP binding domain of saccharopine dehydrogenase. In some organisms, this enzyme is found as a bifunctional polypeptide with lysine ketoglutarate reductase. The saccharopine dehydrogenase can also function as a saccharopine reductase. Saccharopine dehydrogenase ( ) catalyses the condensation of l-alpha-aminoadipate-delta-semialdehyde (AASA) with l-glutamate to give an imine, which is reduced by NADPH to give saccharopine. Saccharopine is an intermediate in lysine metabolism. Homospermidine synthase (HSS) ( ) catalyses the synthesis of the polyamine homospermidine from 2 putrescine molecules in an NAD + -dependent reaction. HSS evolved from the alternative spermidine biosynthetic pathway enzyme carboxyspermidine dehydrogenase and the structure of HSS is related to lysine metabolic enzymes.
