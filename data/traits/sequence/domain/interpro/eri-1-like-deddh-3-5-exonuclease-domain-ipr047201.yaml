identifier: InterPro:IPR047201
label: ERI-1-like, DEDDh 3'-5' exonuclease domain
definition: >-
  This entry represents the DEDDh-type DnaQ-like 3'-5' exonuclease domain from human 3'-5' exoribonucleases 1-3 (ERI-1-3, ERI-1 is also known as 3'hExo), ERI-1 from C.elegans, RNA-binding protein csdA from Aspergillus fumigatus and related proteins from eukaryotes and bacteria. ERI-1-3 are DEDDh-type DnaQ-like 3'-5' exonucleases containing three conserved sequence motifs termed ExoI, ExoII and ExoIII, with a specific Hx(4)D conserved pattern at ExoIII. These motifs are clustered around the active site and contain four conserved acidic residues that serve as ligands for the two metal ions required for catalysis. ERI-1 has been implicated in the degradation of small interfering RNAs (RNAi). 3'hExo participates in the degradation of histone mRNAs. CsdA regulates secondary metabolite production. This entry also includes Snipper (Snp) from Drosophila ( , ) which is a non-essential exonuclease that efficiently degrades structured RNA and DNA substrates as long as there is a minimum of 2 nucleotides in the 3' overhang to initiate degradation. Snp is not a functional homologue of either ERI-1 or 3'hExo.
