identifier: InterPro:IPR006073
label: GTP binding domain
definition: >-
  Several proteins have recently been shown to contain the 5 structural motifs characteristic of GTP-binding proteins. These include murine DRG protein; GTP1 protein from Schizosaccharomyces pombe; OBG protein from Bacillus subtilis; ferrous iron transport protein B and several others.
