identifier: InterPro:IPR063979
label: "M157, Ig-like domain"
definition: >-
  This entry represents the Ig-like α3 domain of M157, a divergent form of MHC class I-like proteins which is the protein product of the mouse cytomegalovirus. This protein is unique in its ability to engage both activating (Ly49H) and inhibitory (Ly49I) natural killer cell receptors. M157 is involved in intra- and intermolecular interactions within and between its domains to form a compact MHC-like molecule.
