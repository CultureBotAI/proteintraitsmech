identifier: InterPro:IPR040445
label: "Potassium channel, inwardly rectifying, transmembrane domain"
definition: >-
  Inwardly-rectifying potassium channels (Kir) are the principal class of two-TM domain potassium channels. They are characterised by the property of inward-rectification, which is described as the ability to allow large inward currents and smaller outward currents. Inwardly rectifying potassium channels (Kir) are responsible for regulating diverse processes including: cellular excitability, vascular tone, heart rate, renal salt flow, and insulin release. To date, around twenty members of this superfamily have been cloned, which can be grouped into six families by sequence similarity, and these are designated Kir1.x-6.x. Cloned Kir channel cDNAs encode proteins of between ~370-500 residues, both N- and C-termini are cytoplasmic, and the N terminus lacks a signal sequence. Kir channel alpha subunits possess only 2TM domains linked with a P-domain. The two 'transmembrane passes' place the C-terminal tail on the cytoplasmic side of the membrane. It is thought that four Kir subunits assemble to form a tetrameric channel complex, which may be hetero- or homomeric.
