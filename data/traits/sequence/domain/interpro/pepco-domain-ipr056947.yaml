identifier: InterPro:IPR056947
label: "Pepco domain"
definition: >-
  This entry represents a small domain co-occurring with peptidases like Trypsin, Caspase, and MPTase. The domain is homologous to Trypco1 and Trypco2 from MoxR-vWA-based ternary systems typically seen in multicellular bacteria. Peptidase cleavage of Pepco superfamily domains may trigger assembly into multimeric complexes, leading to cell suicide akin to processes seen in metazoan apoptosis.
