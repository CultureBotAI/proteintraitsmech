identifier: InterPro:IPR046059
label: "Domain of unknown function DUF6017"
definition: >-
  This presumed domain is functionally uncharacterised. It is found to the C terminus of a helix-turn-helix domain which strongly suggests that it is a transcriptional regulatory protein as HTH domains often bind to a ligand. This domain family is mainly found in firmicutes, and is approximately 150 amino acids in length.
