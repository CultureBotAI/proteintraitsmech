label: "NS1 nuclease, NS1-Nuc domain, Parvovirus"
definition: >-
  This entry represents the NS1-Nuc domain found mainly in the Parvoviridae family of viruses. The PV NS1-Nuc domain consists of a central five-stranded antiparallel β-sheet surrounded by clusters of α-helices (see ). The central β-sheet forms a cleft that embraces the endonuclease active site. The NS1-Nuc domain structure reveals an overall fold that is canonical to the HUH superfamily of endonucleases that are involved in rolling-circle replication, which contain signature motif HUH, also known as motif 2, and motif YUxxYx(2-3)K, also known as motif 3 (where Y is tyrosine, U is hydrophobic residue, x is any residue, and K is lysine). Divalent metal ions are required for DNA cleavage activities for the HUH-superfamily of endonucleases. The catalytic centre of HUH-endonucleases is composed of four residues. Unlike the two characteristic histidine residues, the third catalytic residue is changeable (either Glu or His). The fourth residue is a tyrosine, which is highly conserved in HUH-endonucleases. The family Parvoviridae is a group of small (18-26nm diameter), non-enveloped, and autonomously replicating icosahedral viruses containing a single-stranded linear DNA genome ranging from 4-6 kb in length, with terminal hairpins [E1]. The parvoviral single-stranded DNA genome contains two open reading frames (ORFs), one encoding nonstructural (NS) proteins, the other capsid proteins. All parvoviruses encode a nonstructural protein NS1 (termed Rep in adeno-associated virus [AAV]) that is essential for viral DNA replication and packaging of viral DNA into capsid. It may play other versatile roles, for example, in the transactivation of viral and cellular gene expression, DNA damage response, cell cycle arrest, apoptosis, and/or the modulation of innate immunity. The N terminus o…
