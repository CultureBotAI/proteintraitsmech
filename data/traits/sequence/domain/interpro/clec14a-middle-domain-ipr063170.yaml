identifier: InterPro:IPR063170
label: "CLEC14A, middle domain"
definition: >-
  This entry represents a conserved domain found in the middle region of C-type lectin entry 14 member A (CLEC14A) proteins. This domain is located between the N-terminal C-type lectin domain and the C-terminal EGF-like domain in vertebrate CLEC14A proteins. CLEC14A is a single-pass type I membrane protein involved in cell migration, angiogenesis and lymphangiogenesis. The protein is expressed on the external side of the plasma membrane and can bind extracellular matrix proteins. The full-length protein participates in vascular endothelial growth factor receptor signalling pathways. The specific function of this middle domain remains to be determined.
