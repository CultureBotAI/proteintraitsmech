identifier: InterPro:IPR057653
label: "YeeW-like domain"
definition: >-
  This domain is found covering the whole length of Protein YeeW from Escherichia coli and at the N-terminal end of sequences that also have . It likely forms a homodimeric structure composed of three β-strands provided by each monomer, with one strand swapped with the other monomer. Members of this group are proteobacterial proteins likely to be phage derived.
