identifier: InterPro:IPR045820
label: "CLEC16A, C-terminal"
definition: >-
  This entry represents a PH-like domain found at the C terminus of CLEC16A. CLEC16A (C-Type Lectin Domain Containing 16A) an evolutionarily conserved endosomal membrane protein required for trafficking of fluid-phase and receptor-mediated endocytic cargos. It is required for mitophagy, autophagy and endosome maturation. This protein has been identified as a susceptibility gene for autoimmune diseases like type 1 diabetes, multiple sclerosis and adrenal dysfunction. It has an inhibitory role in autophagy, probably by activating the mTOR pathway.
