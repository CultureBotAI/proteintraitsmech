identifier: InterPro:IPR041057
label: "ZHX, C2H2 finger domain"
definition: >-
  This is a C2H2 zinc-finger domain found in ZHX proteins such as ZHX1. ZHXs are multidomain proteins comprising two C2H2 zinc finger motifs and five homeodomains. Both homeodomains and zinc fingers are short protein modules involved in protein-DNA and/or protein-protein interactions; they are frequently associated with roles in transcriptional regulation. All members of the ZHX family are reported to be able to form both homo- and heterodimers via the region containing homeodomain 1. ZHX1 is a transcriptional repressor which is ubiquitously expressed. It interacts with nuclear factor Y subunit A (NFYA) and DNA methyl transferase 3B (DNMT3B) for its repression activity. Changes in expression profiles of rat ZHX1 ortholog have been associated with glomerular disease. In addition to the five homeodomains, ZHX1, which also contains of two N-terminal C2H2 zincfingers forms homodimers via homeodomain and can also form heterodimers with ZHX3.
