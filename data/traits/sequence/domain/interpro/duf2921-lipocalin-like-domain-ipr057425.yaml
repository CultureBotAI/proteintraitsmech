identifier: InterPro:IPR057425
label: "DUF2921, lipocalin-like domain"
definition: >-
  This entry represents an eight-stranded flattened β barrel domain which shows structural similarity to the lipocalin fold. The domain shows is found in three copies towards the N terminus of DUF2921 family proteins.
