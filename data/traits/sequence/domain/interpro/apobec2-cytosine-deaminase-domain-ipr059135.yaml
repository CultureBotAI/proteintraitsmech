identifier: InterPro:IPR059135
label: "APOBEC2, cytosine deaminase domain"
definition: >-
  This entry represents a domain found standalone in APOBEC2 and homologous to known CMP/dCMP-type deaminase domains. APOBEC2 is a highly conserved (slow-evolving) family of AID/APOBEC-like deaminases found in most vertebrates including cartilaginous fishes. APOBEC2 is poorly understood in terms of their molecular functions and substrate specificity. While APOBEC2 is structurally similar to other cytidine deaminases, most data suggest it does not possess significant deaminase activity in vivo or in vitro. Its primary biological action is believed to be at the transcriptional or epigenetic level, not through direct RNA or DNA editing. It binds specific motifs within gene promoters, and at the same time, it interacts with the histone deacetylase complex, which is involved in transcriptional repression through histone modification. Because the genes that are repressed are involved in the specification of non-muscle cell fates, it was suggested that APOBEC2 plays a role in cell fate specification. The AID/APOBEC are deaminases that function in RNA/DNA editing. The AID/APOBEC family contains several subfamilies: AID, APOBEC1, APOBEC2, APOBEC3, APOBEC4 and APOBEC5. AID/APOBEC deaminases (AADs) convert cytidine to uridine in single-stranded nucleic acids. They are involved in numerous mutagenic processes, including those underpinning vertebrate innate and adaptive immunity. APOBEC were suggested to originate from ancestral AID genes expressed in the lymphocytes of jawless fish over 500 million years ago. Gene duplication and diversification of AID structure and function, probably contributed to the evolutionary process leading to genes that encode the APOBEC proteins of amphibians, birds, and tetrapods including primates.
