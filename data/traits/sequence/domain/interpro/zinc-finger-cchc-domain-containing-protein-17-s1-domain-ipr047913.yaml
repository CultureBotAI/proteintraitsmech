identifier: InterPro:IPR047913
label: "Zinc finger CCHC domain-containing protein 17, S1 domain"
definition: >-
  This entry represents the S1 domain of metazoan ZCCHC17 (also known as pNO40) family. ZCCHC17 is a nucleolar protein with an N-terminal S1 RNA binding domain, a CCHC type zinc finger, and clusters of basic amino acids representing a potential nucleolar targeting signal. This protein was identified through a yeast two-hybrid interaction screen of a human kidney cDNA library using the pinin (pnn) protein as bait. ZCCHC17 is thought to play a role in ribosome maturation and/or biogenesis and has been identified as a regulator of synaptic gene expression in Alzheimer's disease. The S1 domain was originally identified in ribosomal protein S1 but is found in a large number of RNA-associated proteins. The structure of the S1 RNA-binding domain from the Escherichia coli polynucleotide phosphorylase has been determined using NMR methods and consists of a five-stranded antiparallel β barrel. Conserved residues on one face of the barrel and adjacent loops form the putative RNA-binding site.
