identifier: InterPro:IPR056435
label: "DNA polymerase delta/zeta catalytic subunit, N-terminal domain"
definition: >-
  This domain is found towards the N-terminal of DNA polymerase delta catalytic subunit (DPOD or POL3) and DNA polymerase zeta catalytic subunit (DPOZ or REV3) from Saccharomyces cerevisiae and similar eukaryotic protein sequences. POL3 is the catalytic component of DNA polymerase delta (DNA polymerase III), which participates in chromosomal DNA replication. REV3 is a nonessential DNA polymerase required for DNA damage induced mutagenesis. This domain shows an α-β configuration.
