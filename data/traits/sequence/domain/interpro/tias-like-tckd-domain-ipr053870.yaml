identifier: InterPro:IPR053870
label: "TiaS-like, TCKD domain"
definition: >-
  This is the TCKD domain found in tRNA(Ile2) 2-agmatinylcytidine synthetase TiaS and related proteins. TiaS is an ATP-dependent agmatine transferase that catalyses the formation of 2-agmatinylcytidine (agm2C) at the wobble position (C34) of tRNA(Ile2). It consists of four domains, the TCKD domain at the N-terminal followed by the FLD domain, an OB fold domain and a zinc ribbon domain (ZRD) domain at the C-terminal. This domain is responsible for ATP binding.
