identifier: InterPro:IPR034900
label: "LARP4B, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of LARP4B (also known as LARP5), a cytosolic protein that co-sediments with polysomes and accumulates upon stress induction in cellular stress granules. It can interact with the cytosolic poly(A) binding protein 1 (PABPC1) and the receptor for activated C Kinase (RACK1), a component of the 40S ribosomal subunit. LARP5 may function as a stimulatory factor of translation through bridging mRNA factors of the 3' end with initiating ribosomes. Like other La-related proteins (LARPs) family members, LARP5 contains a La motif (LAM) and an RNA recognition motif (RRM).
