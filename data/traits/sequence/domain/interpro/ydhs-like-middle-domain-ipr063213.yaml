identifier: InterPro:IPR063213
label: "YdhS-like, middle domain"
definition: >-
  This entry represents a middle domain found in YdhS-like proteins. The domain is located between an N-terminal NAD-binding domain and a small C-terminal region. Family members are classified as COG4529 and some are annotated as FAD-dependent urate hydroxylases in the InterPro resource. In Escherichia coli K12, YdhS is encoded within a region corresponding to Salmonella pathogenicity island 2. The family is found predominantly in Gram-negative bacteria. The function of this domain remains to be determined.
