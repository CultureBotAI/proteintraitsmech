identifier: InterPro:IPR005546
label: "Autotransporter beta-domain"
definition: >-
  This entry represents a domain found at the C-terminal of the bacterial autotransporter proteins it occurs in. Secretion of protein products occurs by a number of different pathways in bacteria. One of these pathways known as the type V pathway was first described for the IgA1 protease. The protein component that mediates secretion through the outer membrane is contained within the secreted protein itself, hence the proteins secreted in this way are called autotransporters. This family corresponds to the presumed integral membrane β-barrel domain that transports the protein.
