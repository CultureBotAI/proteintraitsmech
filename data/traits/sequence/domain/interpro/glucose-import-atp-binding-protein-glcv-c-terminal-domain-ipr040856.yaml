identifier: InterPro:IPR040856
label: "Glucose import ATP-binding protein GlcV, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in the glucose import ATP-binding protein GlcV, specifically the upper part of this domain, which comprises a three-stranded anti-parallel β-sheet and two small anti-parallel β-strands. The full C-terminal domain (residues 243-353) contains only beta-strands, forming an elongated barrel-shaped structure composed of two parts. The overall structure is very similar to that of the C-terminal domain of MalK from T. litoralis, though the function of the C-terminal domain in GlcV remains unclear. GlcV forms part of the ABC transporter complex GlcSTUV, which is involved in glucose uptake, and is responsible for energy coupling to the transport system. As a free subunit, GlcV exhibits constitutive ATPase activity in vitro.
