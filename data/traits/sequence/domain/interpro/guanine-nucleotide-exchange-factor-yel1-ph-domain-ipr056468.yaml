identifier: InterPro:IPR056468
label: "Guanine-nucleotide exchange factor YEL1, PH domain"
definition: >-
  This entry represents a PH domain found in the YEL1 family proteins. The YEL1 family comprises guanine-nucleotide exchange factors (GEFs) for ARF3, a small GTPase involved in vesicle transport and actin cytoskeleton organisation. Members of the YEL1 family are essential for the correct localisation of ARF3 to specific cellular sites, such as the bud neck and tip in yeast. They play a crucial role in the polarisation of actin patches, which are important for processes like endocytosis and cell shape determination. The conserved function across different species suggests a fundamental role in cellular dynamics related to membrane trafficking and cytoskeletal arrangements.
