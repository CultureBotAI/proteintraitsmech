label: "Rv1157c-like, C-terminal domain"
definition: >-
  This entry represents the conserved C-terminal region of surface-exposed actinobacterial member proteins such as NFA_47630 from Nocardia farcinica ( ,) and ML1506 from Mycobacterium leprae ( ,), both tested or discussed as vaccine candidates, and Rv1157c from Mycobacterium tuberculosis ( ,), which was shown to be subject to glycosylation in an alanine and proline-rich region located N-terminal to this domain.
