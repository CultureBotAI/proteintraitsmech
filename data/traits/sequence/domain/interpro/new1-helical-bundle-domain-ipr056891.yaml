identifier: InterPro:IPR056891
label: "NEW1, helical bundle domain"
definition: >-
  This is the helical bundle (HB) domain found in the [NU+] prion formation protein 1 (NEW1) from S. cerevisiae, a translation termination and ribosome biogenesis factor. NEW1 is an ATP binding cassette protein that cosediments with polysomes and is required for biogenesis of the small ribosomal subunit.
