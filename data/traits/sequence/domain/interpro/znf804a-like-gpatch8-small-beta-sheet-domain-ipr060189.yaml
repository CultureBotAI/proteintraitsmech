identifier: InterPro:IPR060189
label: "ZNF804A-like/GPATCH8, small beta-sheet domain"
definition: >-
  This entry represents a small β sheet domain found in ZNF804A and similar animal proteins including G patch domain-containing protein 8 (GPATCH8). ZNF804A is localised to neuronal compartments, including dendritic spines, growth cones and synapses. ZNF804A protein is involved in positive regulation of neuron projection development and gene expression. GPATCH8 is a nuclear protein containing a G-patch domain and a C2H2-type zinc finger that functions as an RNA splicing factor involved in quality control of branchpoint selection during pre-mRNA splicing. GPATCH8 interacts with the DEAH-box RNA helicase DHX15 and functionally opposes SUGP1 in regulating 3' splice site recognition, with GPATCH8-regulated splicing events showing stronger branchpoints. The protein is required for aberrant splicing induced by mutant SF3B1 in hematologic malignancies, and its silencing corrects approximately one-third of SF3B1 mutant-dependent splicing defects. GPATCH8 also interacts with ATXN1, the protein implicated in spinocerebellar ataxia type 1. A missense variant (p.A979P) in the serine-rich region has been identified as a candidate for juvenile-onset hyperuricemia.
