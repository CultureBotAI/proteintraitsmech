identifier: InterPro:IPR034181
label: Pre-mRNA-splicing factor Cwc2, RNA recognition motif
definition: >-
  This entry represents the RNA recognition motif (RRM) of yeast protein Cwc2, also termed Cwf2, one of the components of the Prp19-associated complex [nineteen complex (NTC)]. that can bind to RNA. NTC is composed of the scaffold protein Prp19 and a number of associated splicing factors, and plays a crucial role in intron removal during premature mRNA splicing in eukaryotes. Cwc2 functions as an RNA-binding protein that can bind both small nuclear RNAs (snRNAs) and pre-mRNA in vitro. It interacts directly with the U6 snRNA to link the NTC to the spliceosome during pre-mRNA splicing.
