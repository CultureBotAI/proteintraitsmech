identifier: InterPro:IPR057904
label: "Nal1, C-terminal domain"
definition: >-
  This entry represents the C-terminal in Nal1 found in rice and related plant proteins. The C-terminal of Nal1 has been determined to have serine protease activity. It consists of two perpendicular six-stranded β-barrel subdomains, and the putative catalytic triad is composed of H233, D291 and S385. This entry also includes peptidases from bacterial proteins. Narrow leaf 1 (Nal1) is a serine protease with pleiotropic roles in plant development, affecting several agronomic traits including leaf width, plant height, root architecture, and grain yield. Nal1 regulates lateral leaf growth by modulating basipetal polar auxin transport and vascular patterning, which are essential for proper leaf development. It also influences photosynthetic efficiency by regulating carboxylation activity, thereby impacting the rate of photosynthesis. In addition, Nal1 degrades the TOPLESS-related corepressor OsTPR2, thereby modulating the expression of downstream genes involved in hormone signalling pathways. Nal1 proteins also contribute to the determination of panicle and spikelet numbers, traits that are directly associated with grain productivity.
