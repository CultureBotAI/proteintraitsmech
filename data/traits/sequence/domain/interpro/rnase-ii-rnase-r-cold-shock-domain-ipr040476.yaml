identifier: InterPro:IPR040476
label: "RNase II/RNase R, cold shock domain"
definition: >-
  Crystallographic structure analysis of E. coli wild-type RNase II revealed that the amino-terminal region starts with an α-helix followed by two consecutive five-stranded anti-parallel β-barrels, identified as cold-shock domains (CSD1 and CSD2). This entry relates to CSD2 which lacks the typical sequence motifs RNPI and RNPII but contributes to RNA binding.
