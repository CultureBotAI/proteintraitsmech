identifier: InterPro:IPR044064
label: "Zinc finger ZBR-type domain"
definition: >-
  The anaphase-promoting complex or cyclosome (APC/C) is a multisubunit E3 ligase enzyme that regulates cell division by promoting timely ubiquitin-mediated proteolysis of key cell-cycle regulatory proteins. Emi1/Fbx5 (early mitotic inhibitor 1; gene symbol, FBX05) and Emi2/Erp1/Fbx43 (endogenous meiotic inhibitor 2 or Emi1-related protein 1; gene symbol, FBX043) constitute the Emi/Erp protein family of APC/C inhibitors against the APC/C function, which controls cell division progress. Emi1 and Emi2 share the F-box and DB motifs, the zinc-binding region (ZBR) with the in-between-RING (IBR) topology and the C6HC-type zinc-binding motif, and the C-terminal region with a conserved 14-residue sequence ending in the RL residues, termed the RL tail. This entry represents the ZBR-type zinc finger which is arranged in a central, twisted, four-stranded β-sheet and coordinates two zinc ions on opposite ends of the sheet. One zinc is chelated by the β1-β2 and β3-β4 loops and the other by the β2-β3 loop and a loop following β4. The ZBR finger displays an In-Between-RING (IBR) domain topology.
