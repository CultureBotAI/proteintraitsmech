identifier: InterPro:IPR041821
label: "CG11883-like, N-terminal metallophosphatase domain"
definition: >-
  This entry represents the metallophosphatase domain of Drosophila melanogaster CG11883 and related proteins. CG11883 is an uncharacterised Drosophila melanogaster UshA-like protein with two domains, an N-terminal metallophosphatase domain and a C-terminal nucleotidase domain. The N-terminal metallophosphatase domain belongs to a large superfamily of distantly related metallophosphatases (MPPs) that includes: Mre11/SbcD-like exonucleases, Dbr1-like RNA lariat debranching enzymes, YfcE-like phosphodiesterases, purple acid phosphatases (PAPs), YbbF-like UDP-2,3-diacylglucosamine hydrolases, and acid sphingomyelinases (ASMases).
