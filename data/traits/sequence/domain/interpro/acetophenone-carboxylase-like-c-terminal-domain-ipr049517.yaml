identifier: InterPro:IPR049517
label: "Acetophenone carboxylase-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of acetophenone carboxylase subunits. According to ECOD this domain adopts a reverse ferredoxin fold. This domain is also found in a wide range of related enzymes subunits, such as 5-oxoprolinase, in which it is found in the central region.
