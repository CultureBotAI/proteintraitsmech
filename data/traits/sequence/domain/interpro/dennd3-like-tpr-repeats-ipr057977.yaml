identifier: InterPro:IPR057977
label: "DENND3-like, TPR repeats"
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found in human DENN domain-containing protein 3 (DENND3) and similar proteins from vertebrates. DENND3 is a guanine nucleotide exchange factor (GEF) that promotes the exchange of GDP to GTP, converting inactive GDP-bound RAB12 into its active GTP-bound form.
