identifier: InterPro:IPR025874
label: "Double zinc ribbon"
definition: >-
  This entry represents a pair of zinc ribbon domains found in diverse sequences including double zinc ribbon and ankyrin repeat-containing protein 1 from Danio rerio (Dzank1) and similar sequences from animals and uncharacterised proteins from bacteria and archaea. Dzank1 is required for the intracellular transport of organelles and vesicles, and is essential for the photoreceptor's outer segments formation, maintenance and function.
