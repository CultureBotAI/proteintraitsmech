identifier: InterPro:IPR056497
label: "Dynein axonemal assembly factor 5, HEAT-repeat domain"
definition: >-
  This entry represents a domain found in the central region of Dynein axonemal assembly factor 5 (DAAF5) from animals, which consists of HEAT repeats. DAAF5 is a cytoplasmic protein involved in the delivery of the dynein machinery to the motile cilium. It is required for the assembly of the axonemal dynein inner and outer arms, two structures attached to the peripheral outer doublet A microtubule of the axoneme, that play a crucial role in cilium motility.
