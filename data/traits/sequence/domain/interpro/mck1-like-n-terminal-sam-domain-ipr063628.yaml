identifier: InterPro:IPR063628
label: "MCK1-like, N-terminal SAM domain"
definition: >-
  This domain is found at the N-terminal of Mitogen-activated protein kinase kinae kinase MCK1 from Pyricularia oryzae, bck1 from Aspergillus fumigatus and similar sequences from fungi. These are mitogen-activated kinase kinase kinases (MAPKKKs), part of the cell wall integrity (CWI) signalling pathway and responsible for the maintaining of cell-wall integrity balance. MCK1 is part of the MCK1-MKK2-MPS1 MAP kinase (MAPK) signal transduction cascade that is essential for appressorium formation, penetration and invasive growth.
