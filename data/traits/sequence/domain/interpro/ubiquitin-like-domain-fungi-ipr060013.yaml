identifier: InterPro:IPR060013
label: "Ubiquitin-like domain, fungi"
definition: >-
  This entry represents a ubiquitin-like domain found in a family of large fungal proteins. This centrally positioned domain shows structural similarity to known ubiquitin-like domains. These proteins also contain a UCH domain ( ) suggesting they may function as deubiquitinating enzymes.
