identifier: InterPro:IPR006563
label: "POX domain"
definition: >-
  This domain in found exclusively in plant proteins, associated with homeobox domain which may suggest these proteins are homeodomain transcription factors. Proteins containing this domain include BEL1-like homeodomain protein 1 (BLH1) from Arabidopsis thaliana. BLH1 interacts with KNAT2 and KNAT5 and affects plant development.
