identifier: InterPro:IPR056047
label: "Cysteine repeat modular protein A-like, DUF7630"
definition: >-
  This presumed domain is found in Cysteine repeat modular protein A from Toxoplasma gondii (CRMPA), uncharacterised sequences from Plasmodium falciparum and similar sequences from lower eukaryotes. CRMPA is required for triggering rhoptry secretion and plays a role in host cell invasion. This domain may adopt a TNF receptor-like fold.
