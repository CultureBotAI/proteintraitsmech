identifier: InterPro:IPR054035
label: "Acylamino-acid-releasing enzyme-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of Acylamino-acid-releasing enzyme from Aeropyrum pernix (APH) and similar archaeal sequences. APH catalyses the removal of an N-acylated amino acid from peptides. This domain folds as a regular seven-bladed β-propeller.
