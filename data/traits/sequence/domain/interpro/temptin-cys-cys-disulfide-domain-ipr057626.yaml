identifier: InterPro:IPR057626
label: "Temptin, Cys/Cys disulfide domain"
definition: >-
  This domain is found in Temptin and similar proteins in eukaryotes and bacteria. This domain contains two highly conserved cysteines that are predicted to form a disulphide bond. It is also enriched with conserved acidic residues. Temptin is a component of the complex of water-borne protein pheromones that stimulates attraction and mating behaviour. It modulates pheromone signalling by direct binding to attractin.
