identifier: InterPro:IPR013190
label: "Glycosyl hydrolase family 98, C-terminal"
definition: >-
  This domain can be found in the C terminus of the blood-group-substance endo-1,4-beta-galactosidase EabC from Clostridium perfringens, which is a member of the glycosyl hydrolase family 98. EabC is an endo-beta-galactosidase capable of releasing both the blood group A trisaccharide (A-Tri; GalNAcalpha1-->3(Fucalpha1-->2)Gal) and B trisaccharide (B-Tri; Galalpha1-->3(Fucalpha1-->2)Gal) glycotopes from blood group A- and B-containing glycoconjugates, respectively. This domain is not expected to form part of the catalytic activity.
