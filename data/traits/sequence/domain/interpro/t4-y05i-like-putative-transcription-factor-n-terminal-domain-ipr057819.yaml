identifier: InterPro:IPR057819
label: "T4 y05I-like putative transcription factor, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of family of uncharacterised phage protein that includes T4 y05I protein . The family also includes homologues from T2 and T6 phage among others. These proteins contain two domains. These domains appear to be related to those found in the eukaryotic PurA transcription factor. This N-terminal presumably single stranded DNA binding domain contains two copies of a PurA-like repeat. The C-terminal domain contains a single copy that may mediate dimerisation in an analogous fashion to PurA.
