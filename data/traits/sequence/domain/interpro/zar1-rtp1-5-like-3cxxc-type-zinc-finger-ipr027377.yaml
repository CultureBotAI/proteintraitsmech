identifier: InterPro:IPR027377
label: "ZAR1/RTP1-5-like, 3CxxC-type zinc finger"
definition: >-
  This is a domain with several pairs of CxxC motifs, referred to as 3CxxC-type zinc finger which is found in 3CxxC-type zinc finger proteins, such as zygote arrest protein 1 (ZAR1) and its homologues, ZAR1-like proteins, and receptor-transporting proteins 1-5 (RTP1-5). Only one pair of cysteines is associated with a highly conserved histidine residue. ZAR1 is essential for female fertility and oocyte-to-embryo transition by coordinating maternal mRNA storage, translation and degradation. It is a mRNA-binding protein that mediates formation of MARDO (mitochondria-associated ribonucleoprotein domain), a membraneless compartment that stores maternal mRNAs in oocytes. This entry represents the C-terminal zinc-finger which interacts with mRNAs. Mammalian RTP1 and RTP2 are accessory proteins to mammalian odorant receptors (ORs) and play significant roles in the translocation of ORs to the plasma membrane. They are expressed in the olfactory sensory neurons and facilitate OR trafficking to the cell-surface membrane and ligand-induced responses in heterologous cells. The functions of RTP3, RTP4 and RTP5 are not clear.
