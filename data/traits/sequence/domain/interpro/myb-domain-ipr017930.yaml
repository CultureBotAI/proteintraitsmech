identifier: InterPro:IPR017930
label: "Myb domain"
definition: >-
  The myb-type HTH domain is a DNA-binding, helix-turn-helix (HTH) domain of approximately 55 amino acids, typically occurring in a tandem repeat in eukaryotic transcription factors. The domain is named after the retroviral oncogene v-myb, and its cellular counterpart c-myb, which encode nuclear DNA-binding proteins that specifically recognise the sequence YAAC(G/T)G. Myb proteins contain three tandem repeats of 51 to 53 amino acids, termed R1, R2 and R3. This repeat region is involved in DNA-binding and R2 and R3 bind directly to the DNA major groove. The major part of the first repeat is missing in retroviral v-Myb sequences and in plant myb-related (R2R3) proteins. A single myb-type HTH DNA-binding domain occurs in TRF1 and TRF2. The 3D-structure of the myb-type HTH domain forms three α-helices. The second and third helices connected via a turn comprise the helix-turn-helix motif. Helix 3 is termed the recognition helix as it binds the DNA major groove, like in other HTHs.
