identifier: InterPro:IPR056473
label: "Utp10/HEAT1, HEAT-repeats domain"
definition: >-
  This entry represents a HEAT-repeats domain found in HEATR1, Utp10 and similar eukaryotic proteins. Proteins in this entry contain an armadillo-type fold, and a BP28, C-terminal domain. It includes HEAT repeat -containing protein 1 (HEATR1) from human and its orthologues from fungi, U3 small nucleolar RNA-associated protein 10 (Utp10), which is a HEAT-repeat containing protein involved in nucleolar processing of pre-18S ribosomal RNA. Utp10 is also involved in 40S ribosome maturation. HEATR1 is a ribosome biogenesis factor required for recruitment of Myc to nucleoli. It is involved in nucleolar processing of pre-18S ribosomal RNA and it is required for optimal pre-ribosomal RNA transcription by RNA polymerase I. HEATR1 plays a role in neuronal-lineage cell proliferation.
