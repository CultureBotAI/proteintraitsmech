label: "DNA ligase 3, BRCT domain"
definition: >-
  The BRCT domain of DNA ligase 3 (LIG3) binds to the C-terminal BRCT domain of the scaffolding protein X-ray repair cross-complementing protein 1 (XRCC1) and mediates homo- and heterodimerisation.
