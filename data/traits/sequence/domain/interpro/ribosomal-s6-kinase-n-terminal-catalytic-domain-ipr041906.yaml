identifier: InterPro:IPR041906
label: "Ribosomal S6 kinase, N-terminal catalytic domain"
definition: >-
  This entry represents the N-terminal catalytic domain of Ribosomal S6 kinase (RSK). There are four RSK isoforms (RSK1-4) from distinct genes present in vertebrates. Their most striking feature is the presence of two functional and non-identical phosphotransferase domains. RSKs contain an N-terminal kinase domain (NTD) that is characteristics of the AGC family and a C-terminal kinase domain (CTD) that is characteristics of the CAMK family. They are activated by signaling inputs from extracellular regulated kinase (ERK) and phosphoinositide dependent kinase 1 (PDK1). ERK phosphorylates and activates the CTD of RSK, serving as a docking site for PDK1, which phosphorylates and activates the NTD, which in turn phosphorylates all known RSK substrates. RSKs act as downstream effectors of mitogen-activated protein kinase (MAPK) and play key roles in mitogen-activated cell growth, differentiation, and survival.
