identifier: InterPro:IPR019159
label: "CCDC93, coiled-coil domain"
definition: >-
  This entry represents the coiled-coil domain found in CCDC93. Human CCDC93 is part of the COMMD/CCDC22/CCDC93 (CCC) complex that interacts with the multisubunit WASH complex, which is required for endosomal deposition of F-actin and cargo trafficking in conjunction with the retromer. The CCC complex controls Notch activation by modulating its intracellular trafficking.
