identifier: InterPro:IPR056153
label: "IFT122/SMU1, beta-propeller domain"
definition: >-
  This entry represents a β-propeller found at the N-terminal end of IFT122 and at the C-terminal of SMU1. Members of this group are found in eukaryotes and bacteria. Intraflagellar transport protein 122 homolog (IFT122) is one of the core components (together with WDR19/IFT144 and IFT140) of the IFT-A complex which is required for retrograde ciliary transport and entry into cilia of G protein-coupled receptors (GPCRs), being involved in cilia function and/or assembly. IFT-A polymerises interacts with IFT-B, and uses an array of β-propeller and TPR domains to create 'carriages' of the IFT train that engage TULP adaptor proteins. Human WD40 repeat-containing protein SMU1 is involved in pre-mRNA splicing as a component of the spliceosome, and is required for normal accumulation of IK.
