identifier: InterPro:IPR057030
label: "E3 ubiquitin-protein ligase listerin, tetratricopeptide repeats region"
definition: >-
  This region of predicted tetratricopeptide repeats (TPR) is found in E3 ubiquitin-protein ligase listerin from Neurospora crassa (Rkr-1) and similar fungal proteins. Rkr-1 is a component of the ribosome quality control complex (RQC), a ribosome-associated complex that mediates ubiquitination and extraction of incompletely synthesised nascent chains for proteasomal degradation.
