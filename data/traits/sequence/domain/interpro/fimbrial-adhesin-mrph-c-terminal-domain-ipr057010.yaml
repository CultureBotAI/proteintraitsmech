identifier: InterPro:IPR057010
label: "Fimbrial adhesin MrpH, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of fimbrial adhesin MrpH and related proteins from bacteria. MrpH is associated to strain virulence and is involved in surface adherence, biofilm formation and autoaggregation, essential for bladder and kidney colonization. This domain attaches to bacterial fimbrial tip.
