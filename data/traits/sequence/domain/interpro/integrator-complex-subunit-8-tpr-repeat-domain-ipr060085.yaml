identifier: InterPro:IPR060085
label: "Integrator complex subunit 8, TPR repeat domain"
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found centrally in human Integrator complex subunit 8 (INTS8) and similar animal sequences. INTS8 is a component of the integrator complex, a multiprotein complex that terminates RNA polymerase II transcription in the promoter-proximal region of genes. The Integrator is an RNA polymerase II complex which contains at least 12 novel subunits and core RNAPII subunits. Two of the Integrator subunits share similarity with subunits of the cleavage and polyadenylation specificity factor (CPSF) complex. Integrator has been shown to be recruited to the U1 and U2 snRNA genes, and to mediate the snRNAs' 3' end processing. The Integrator complex is evolutionarily conserved in metazoans, and directly interacts with the C-terminal domain of the RNA polymerase II largest subunit.
