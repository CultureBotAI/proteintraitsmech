identifier: InterPro:IPR055427
label: "Trafficking protein particle complex subunit 13, N-terminal"
definition: >-
  This entry represents the N-terminal domain, which may adopt a β-sandwich fold with an insertion at the very N-terminal consisting of a short β-strand and α-helix connected by a long loop. Trafficking protein particle complex subunit 13 (TRAPPC13) is involved in regulating autophagy and survival in response to small molecule compound-induced Golgi stress. It is the mammal homologue of Trs65 from yeast, part of TRAPPII complex which interacts with COPI-coated vesicles in mammalian cells and aids in endosome-to-Golgi transport.
