identifier: InterPro:IPR033852
label: Cytosolic aminopeptidase 1/4
definition: >-
  The entry includes the peptidase M14-like domain of cytosolic carboxypeptidase 1 (CCP1; MEROPS identifier M14.028), also known as Nna-1 (Nervous system Nuclear protein induced by Axotomy) or ATP/GTP binding protein (AGTPBP-1), and ATP/GTP-binding protein-like 1 (also known as CCP4). The peptidase M14 family of metallocarboxypeptidases are zinc-binding carboxypeptidases (CPs) which hydrolyze single, C-terminal amino acids from polypeptide chains, and have a recognition site for the free C-terminal carboxyl group, which is a key determinant of specificity. CCP1-like proteins are active metallopeptidases that are thought to act on cytosolic proteins such as alpha-tubulin, to remove a C-terminal tyrosine. CCP1-like proteins from the different phyla are highly diverse, but they all contain a unique N-terminal conserved domain right before the CP domain. It has been suggested that this N-terminal domain might act as a folding domain. CCP1 is widely expressed in the developing and adult nervous systems, including cerebellar Purkinje and granule neurons, miral cells of the olfactory bulb and retinal photoreceptors. CCP1 is also induced in axotomized motor neurons. Mutations in CCP1 cause Purkinje cell degeneration (pcd). The CCP1 CP domain is required to prevent the retinal photoreceptor loss and cerebellar ataxia phenotypes of pcd mice, and a functional zinc-binding domain is needed for CCP1 to support neuron survival in these mice.
