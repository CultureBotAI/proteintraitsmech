identifier: InterPro:IPR034398
label: "Prp24, RNA recognition motif2"
definition: >-
  This entry represents the RNA recognition motif 2 (RRM2) of Prp24. Prp24 is an RNA-binding protein with four well conserved RNA recognition motifs (RRMs). It facilitates U6 RNA base-pairing with U4 RNA during spliceosome assembly. Prp24 specifically binds free U6 RNA primarily with RRM 1 and 2 and facilitates pairing of U6 RNA bases with U4 RNA bases.
