identifier: InterPro:IPR015426
label: Acetaldehyde dehydrogenase, C-terminal
definition: >-
  This C-terminal domain is found in prokaryotic acetaldehyde dehydrogenases, it adopts a structure consisting of an α-β-α-β(3) core, which mediates dimerisation of the protein. The acetaldehyde dehydrogenase family of bacterial enzymes catalyses the formation of acetyl-CoA from acetaldehyde in the 3-hydroxyphenylpropinoate degradation pathway. It occurs as a late step in the meta-cleavage pathways of a variety of compounds, including catechol, biphenyl, toluene, salicylate.
