identifier: InterPro:IPR044096
label: Isoamylase 2, catalytic domain
definition: >-
  This entry represents the catalytic domain found in plant Isoamylase 2 (ISA2), which is a Isoamylase-type debranching enzyme (ISA ) that plays a major role in amylopectin synthesis. Arabidopsis contains three isoamylase-like proteins (AtISA1, AtISA2 and AtISA3) together with one LDA protein (AtLDA). In potato tubers, it has been shown that isoamylase is heteromultimeric and that two isoamylase proteins, ISA1 and ISA2, associate with each other to form a single isoamylase enzyme in vivo. The heteromultimeric isoamylase may function during starch synthesis to suppress the initiation of glucan molecules.
