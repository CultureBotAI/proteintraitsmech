identifier: InterPro:IPR047966
label: "Pleckstrin homology domain-containing family F member 2, FYVE domain"
definition: >-
  This entry represents the FYVE domain present in human Pleckstrin homology domain-containing family F member 2 (PLEKHF2) and similar sequences from vertebrates. PLEKHF2, also termed Phafin-2 ,or endoplasmic reticulum-associated apoptosis-involved protein containing PH and FYVE domains (EAPF), is a ubiquitously expressed endoplasmic reticulum-associated protein that facilitates tumour necrosis factor alpha (TNF-alpha)-triggered cellular apoptosis through endoplasmic reticulum (ER)-mitochondrial apoptotic pathway. It is an endosomal phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) effector, as well as an interactor of the endosomal-tethering protein EEA1. It regulates endosome fusion upstream of Rab5. PKHF2 also functions as a novel regulator of endocytic epidermal growth factor receptor (EGFR) degradation through a role in endosomal fusion.
