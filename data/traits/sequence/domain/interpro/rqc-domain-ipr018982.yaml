identifier: InterPro:IPR018982
label: RQC domain
definition: >-
  This entry represents the RQC domain, which is a DNA-binding domain found only in RecQ family enzymes. RecQ family helicases can unwind G4 DNA, and play important roles at G-rich domains of the genome, including the telomeres, rDNA, and immunoglobulin switch regions. This domain has a helix-turn-helix structure and acts as a high affinity G4 DNA binding domain. Binding of RecQ to Holliday junctions involves both the RQC and the HRDC domains.
