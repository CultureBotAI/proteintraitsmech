identifier: InterPro:IPR048688
label: "CofB-like, pilin domain"
definition: >-
  This domain is found in CofB from Escherichia coli and in similar proteins predominantly from gammaproteobacteria. CofB is a minor pilin, required for assembly of Type IV pili. This entry represents the pilin domain, which is located in the N-terminal region of the protein. It shows a canonical T4b pilin fold seen in the major pilins, with an α-helical backbone and a five-stranded antiparallel β-sheet.
