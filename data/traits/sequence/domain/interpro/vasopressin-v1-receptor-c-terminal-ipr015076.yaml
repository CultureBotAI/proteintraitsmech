identifier: InterPro:IPR015076
label: "Vasopressin V1 receptor, C-terminal"
definition: >-
  This is the conserved C-terminal domain of Vasopressin V1a/b receptors (V1R), which is involved in receptor trafficking and facilitates the interaction between the intracellular loops of the receptor, the G proteins and coupling to phospholipase C. This domain is unstructured and may reflect a conformational plasticity that may be necessary for proper function of V1R.
