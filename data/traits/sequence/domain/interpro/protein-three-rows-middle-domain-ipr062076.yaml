identifier: InterPro:IPR062076
label: "Protein three rows, middle domain"
definition: >-
  This entry represents the middle domain of protein three rows (THR). The full-length protein is required specifically for chromosome disjunction during all mitoses and is involved in formation and maintenance of epithelial structures. THR interacts with PIM and SSE and is proteolytically cleaved after the metaphase-to-anaphase transition. The protein localises to the cytoplasm during interphase and is distributed throughout the cell during early mitosis. THR is found in Diptera and plays essential roles in mitotic sister chromatid segregation and epithelial morphogenesis. The specific function of this middle domain remains to be determined. This domain contains a TPR-like fold.
