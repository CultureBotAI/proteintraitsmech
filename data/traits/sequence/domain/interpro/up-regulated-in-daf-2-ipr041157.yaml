label: "Up-regulated in Daf-2"
definition: >-
  This entry includes C. elegans PUD-1 and PUD-2, two proteins up-regulated in daf-2 (loss-of-function) (PUD), which are homologous 17kDa proteins with similar β-sandwich folds that further associate with each other into a V-shaped heterodimer.
