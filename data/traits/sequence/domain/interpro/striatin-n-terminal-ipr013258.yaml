identifier: InterPro:IPR013258
label: "Striatin, N-terminal"
definition: >-
  This domain is associated with the N terminus of striatin. Striatin is an intracellular protein which has a caveolin-binding motif, a coiled-coil structure, a calmodulin-binding site, and a WD ( ) repeat domain. It acts as a scaffold protein and is involved in signalling pathways.
