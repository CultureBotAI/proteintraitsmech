identifier: InterPro:IPR043612
label: "Non-structural protein NSP4, N-terminal, coronavirus"
definition: >-
  Nonstructural protein 4 (NSP4/nsp4) is encoded by ORF1a/1ab and proteolytically released from the pp1a/1ab polyprotein in coronaviruses (CoVs). It is a membrane-spanning protein which is thought to anchor the viral replication-transcription complex (RTC) to modified endoplasmic reticulum membranes which forms double-membrane vesicles (DMVs) or convoluted membranes (CMs). NSP4 is required for RTC formation. This is the N-terminal domain of the coronavirus NSP4 which represents the membrane spanning region, covering four transmembrane regions.
