identifier: InterPro:IPR063618
label: "tRNA methyltransferase TrmJ, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of tRNA (cytidine/uridine-2'-O-)-methyltransferase TrmJ (formerly YfhQ). TrmJ catalyses 2'-O-methylation of cytidine or uridine at position 32 in tRNA, producing Cm32 or Um32 modifications. The enzyme belongs to the SPOUT methyltransferase superfamily, with the N-terminal catalytic domain followed by this C-terminal domain which contributes to tRNA substrate recognition. TrmJ functions as a homodimer. The family is found predominantly in proteobacteria.
