identifier: InterPro:IPR046469
label: "S-adenosyl-l-methionine hydroxide adenosyltransferase, N-terminal domain"
definition: >-
  The S-adenosyl-L-methionine (SAM) hydroxide adenosyltransferase family groups several fluorinase and chlorinase enzymes whose common feature is that they mediate nucleophilic reactions of their respective halide ions to the C-5' carbon of SAM. These enzymes utilise a rigorously conserved amino acid side chain triad (Asp-Arg-His) which may have a role in activating water to hydroxide ion. Structural studies indicate that the protein is a homotrimer, with each monomer being composed of N- and C-terminal domains. The N-terminal domain has a central seven-stranded β-sheet, which combines parallel and antiparallel strands sandwiched between α-helices. The C-terminal domain forms a β-barrel with a greek-key topology. SAM is bound at the interface between the C-terminal domain of one monomer and the N-terminal domain of the neighbouring monomer, with a total of three molecules bound by the trimer. This group of proteins, which are predominantly found in prokaryotes, used to be known as DUF62. This entry represents the N-terminal domain of these enzymes.
