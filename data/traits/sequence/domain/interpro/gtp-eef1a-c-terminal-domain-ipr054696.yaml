identifier: InterPro:IPR054696
label: "GTP-eEF1A, C-terminal domain"
definition: >-
  This entry represents a β-barrel domain that is found C-terminal in Elongation factor 1-alpha (eEF1A) and similar proteins from all cellular organisms. eEF1A promotes the GTP-dependent binding of aminoacyl-tRNA to the A-site of ribosomes during protein biosynthesis.
