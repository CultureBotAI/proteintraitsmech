identifier: InterPro:IPR040805
label: "KAHRP, N-terminal"
definition: >-
  This entry represents a domain found at the N-terminal in the knob-associated histidine-rich protein (KAHRP). KAHRP found in protozoan parasites such as Plasmodium falciparum, is involved in both rigidifying the host cell and the formation of cytoadherent knob structures.
