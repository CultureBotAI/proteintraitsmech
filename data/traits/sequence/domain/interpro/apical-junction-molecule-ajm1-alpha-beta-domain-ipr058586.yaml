identifier: InterPro:IPR058586
label: "Apical junction molecule ajm1, alpha/beta domain"
definition: >-
  This domain is found in the Apical junction molecule Ajm-1 from C. elegans and related proteins. It is predicted to fold into an α/β structure with significant similarity to domains members of CcmS-like superfamily. Ajm-1 controls adherens junction integrity in C.elegans and is required for the correct rate and completion of elongation of the embryos.
