identifier: InterPro:IPR060403
label: "APC1, N-terminal domain, nematodes"
definition: >-
  This entry represents the N-terminal domain of anaphase-promoting complex subunit 1 proteins (APC1) found in nematodes. This domain adopts a lipocalin-like fold consisting of a β-barrel. This domain forms part of the multi-domain architecture of APC1. The specific function of this domain remains to be determined. In C. elegans, APC1/MAT-2 is also involved in embryonic anterior-posterior axis formation and regulation of neurotransmitter receptors in postmitotic neurones. APC1 is the largest of the subunits of the anaphase-promoting complex or cyclosome. The anaphase-promoting complex is a multiprotein subunit E3 ubiquitin ligase complex that controls segregation of chromosomes and exit from mitosis in eukaryotes. The APC/C complex mediates ubiquitination and degradation of target proteins and is essential for the metaphase to anaphase transition during both meiosis and mitosis. Infection of human fibroblasts with human cytomegalovirus (HCMV) leads to cell cycle dysregulation, which is associated with the inactivation of the anaphase-promoting complex.
