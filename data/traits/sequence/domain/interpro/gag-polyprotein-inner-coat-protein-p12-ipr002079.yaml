identifier: InterPro:IPR002079
label: "Gag polyprotein, inner coat protein p12"
definition: >-
  The retroviral p12 protein is a proline rich virion structural protein found in the inner coat. p12 is associated with pathogenicity of the virus. It is a constituent of the pre-integration complex (PIC) and mediates its integration.
