identifier: InterPro:IPR056294
label: "CFAP184, CAP-like domain"
definition: >-
  This entry represents a domain whose function is unknown found in Cilia- and flagella-associated protein 184 (also known as CCDC96, ) from Tetrahymena thermophila and similar sequences. CFAP184 forms a complex with CFAP263, and acts as a regulator of ciliary beating that connects radial spoke 3 (RS3) to the inner dynein arm (IDA) and the nexin-dynein regulatory complex (N-DRC). This domain may have a CAP-like (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) fold according to structure predictions and comparison.
