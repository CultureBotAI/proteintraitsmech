identifier: InterPro:IPR000593
label: IQGAP, helical domain
definition: >-
  This helical domain can be found towards the C terminus of the IQGAP family members, including human IQGAP1/2/3 and its fungal homologues, S. cerevisiae Iqg1 and S. pombe Rng2. Some members function in cytoskeletal remodelling. Human IQGAP1 is a scaffolding protein that can assemble multi-protein complexes involved in cell-cell interaction, cell adherence, and movement via actin/tubulin-based cytoskeletal reorganization. IQGAP1 is also a regulator of the MAPK and Wnt/beta-catenin signaling pathways. Iqg1 and Rng2 are required for actomyosin ring construction during cytokinesis.
