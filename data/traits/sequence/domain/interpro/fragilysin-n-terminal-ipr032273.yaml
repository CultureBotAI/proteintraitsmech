identifier: InterPro:IPR032273
label: "Fragilysin, N-terminal"
definition: >-
  This entry represents the N-terminal domain of fragilysin, which is an extracellular metalloprotease toxin from B. fragilis, an oportunistic pathogen of human gut. This domain inhibits fragilysin and is cleaved in a mature, virulent form.
