identifier: InterPro:IPR024974
label: "Sde2, ubiquitin domain"
definition: >-
  Sde2 (silencing defective 2) is a ubiquitin-fold-containing splicing regulator that supports splicing of selected pre-mRNAs in an intron-specific manner in Schizosaccharomyces pombe. Sde2 is translated as inactive precursor proteins harbouring the ubiquitin-fold domain linked through an invariant GGKGG motif to a C-terminal domain. The Sde2 protein has a ubiquitin-fold at its N-terminal, represented in this entry, which must be cleaved by the ubiquitin-specific proteases (USPs) Ubp5 and Ubp15. After cleavage, the C-terminal domain of Sde2, which starts with a lysine, gets incorporated into the spliceosome.
