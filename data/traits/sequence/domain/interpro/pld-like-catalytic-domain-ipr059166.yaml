identifier: InterPro:IPR059166
label: "PLD-like, catalytic domain"
definition: >-
  This entry represents a putative catalytic domain of uncharacterised hypothetical proteins with similarity to phospholipase D (PLD, ). PLD enzymes hydrolyse phospholipid phosphodiester bonds to yield phosphatidic acid and a free polar head group. They can also catalyse transphosphatidylation of phospholipids to acceptor alcohols. Proteins represented by this entry contain one or two copies of the HKD motif (H-x-K-x(4)-D, where x represents any amino acid residue) that characterises the PLD superfamily. This domain can be found at the N-terminal or in the middle region of these proteins.
