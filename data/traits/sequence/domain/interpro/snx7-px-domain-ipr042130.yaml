identifier: InterPro:IPR042130
label: "SNX7, PX domain"
definition: >-
  Sorting nexin-7 (SNX7) belongs to the sorting nexin family, which contains a conserved PX (phox homology) domain that is responsible for binding to specific phosphoinositides. It may be involved in several stages of intracellular trafficking. The Phox Homology (PX) domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions. Sorting nexins (SNXs) make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds phosphoinositides (PIs) and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway.
