identifier: InterPro:IPR026851
label: DNA replication ATP-dependent helicase/nuclease Dna2/JHS1, DEXXQ-box helicase domain
definition: >-
  Dna2 and its plant homologue JHS1 are DNA replication factors with single-stranded DNA-dependent ATPase, ATP-dependent nuclease, (5'-flap endonuclease) and helicase activities. It is required for Okazaki fragment processing and is involved in DNA repair pathways. The helicase activity is weak and its function remains unclear. This entry represents DEXXQ-box helicase domain of DNA2 and homologues. It contains the ATP-binding region.
