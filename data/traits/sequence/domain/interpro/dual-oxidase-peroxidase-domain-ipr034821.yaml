identifier: InterPro:IPR034821
label: "Dual oxidase, peroxidase domain"
definition: >-
  Animal heme peroxidases of the dual-oxidase like subfamily play vital roles in the innate mucosal immunity of gut epithelia. They provide reactive oxygen species which help control infection. One innate immune mechanism is ROS (reactive oxygen species) production by NADPH oxidases of the NOX/DUOX (NADPH oxidase/dual oxidase) family. NOX enzymes consist of one NADPH oxidase domain and most often produce O2- (superoxide). Dual oxidases (DUOX) are enzymes that contain an NADPH oxidase domain that produces hydrogen peroxide (H2O2) and a peroxidase domain that can utilize H2O2 to carry out a variety of reactions.
