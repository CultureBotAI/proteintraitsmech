identifier: InterPro:IPR061179
label: "WIAG-tail domain"
definition: >-
  This 80-amino acid domain occurs in proteins from bacilli in a single copy at the C terminus. In most proteins, the domain immediately follows a long, variable run of tandem 10-amino acid repeats. The domain is named for its C-terminal motif, WIAxGx, hence the name WIAG-tail.
