identifier: InterPro:IPR049903
label: "Potassium channel tetramerization domain-containing protein 16, H1 domain"
definition: >-
  Potassium channel tetramerisation domain-containing protein 16 (KCTD16) is a BTB/POZ domain-containing protein that is an auxiliary subunit of gamma-aminobutyric acid type B (GABA-) receptors associated with mood disorders. It interacts with amyloid beta precursor protein (APP), a type I transmembrane protein involved in a variety of cellular processes such as cell adhesion and axon guidance. KCTD16 generates largely non-desensitising receptor responses. KCTD16 consists of an N-terminal BTB domain followed by a region called the H1 domain. The BTB domain mediates interaction with the receptor. The H1 domain, found at the C terminus, which possesses a β-propeller-like fold, engages in interactions with G-protein β and γ subunits. In the related protein KCTD12, the H1 domain is also responsible for desensitisation. This entry corresponds to the H1 domain of KCTD16, which may not be involved in desensitisation.
