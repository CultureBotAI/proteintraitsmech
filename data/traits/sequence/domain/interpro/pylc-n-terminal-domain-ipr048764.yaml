identifier: InterPro:IPR048764
label: "PylC, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of archaeal PylC (3-methyl-D-ornithine--L-lysine ligase) and similar sequences from prokaryotes. PylC, an ATP-grasp enzyme composed of three domains, is required for the biosynthesis of pyrrolysine. This domain is composed of a central four-stranded β-sheet that is faced on both sides by two helices. It shows an adenine binding pocket that has not been observed in any homologous structure determined before.
