identifier: InterPro:IPR041027
label: "FtsK alpha domain"
definition: >-
  FtsK is a DNA translocase that coordinates chromosome segregation and cell division in bacteria. In addition to its role as activator of XerCD site-specific recombination, FtsK can translocate double-stranded DNA (dsDNA) rapidly and directionally and reverse direction. FtsK can be split into three domains called alpha (this entry), beta and gamma. The alpha and beta domains contain the core ATPase machinery of the DNA translocase.
