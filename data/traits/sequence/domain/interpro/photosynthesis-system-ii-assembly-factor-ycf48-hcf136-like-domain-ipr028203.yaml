identifier: InterPro:IPR028203
label: "Photosynthesis system II assembly factor Ycf48/Hcf136-like domain"
definition: >-
  This entry represents a domain found in the photosynthesis system II assembly factor YCF48/HCF136 and associated proteins. The photosynthesis system II (PSII) is a multi-subunit pigment-protein complex responsible for water oxidation during oxygenic photosynthesis. PSII can be found in the thylakoid membrane of chloroplasts and cyanobacteria. Its assembly is regulated by PSII assembly factors including Ycf48/Hcf136, Psb27 and Psb28. Ycf48/Hcf136 contains the BNR repeats and can be found predominantly in the thykaloid membrane. Ycf48/Hcf136 is required for assembly and repair of an early intermediate in PSII assembly that includes D2 (psbD) and cytochrome b559. This domain can also be found in some YCF48-like proteins that may not affect PSII activity.
