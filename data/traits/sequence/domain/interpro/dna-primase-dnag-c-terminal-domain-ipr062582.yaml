identifier: InterPro:IPR062582
label: "DNA primase DnaG, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain of approximately 80 residues found cyanobacterial DnaG DNA primases. The domain is located C-terminal to the DnaB-binding domain ( ). DnaG is an RNA polymerase that synthesises short RNA primers for DNA polymerase during DNA replication. Mutagenesis of a cysteine residue in this C-terminal region of Synechococcus elongatus DnaG results in cells containing fewer chromosomes, suggesting this domain influences DNA replication.
