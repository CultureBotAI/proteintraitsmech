identifier: InterPro:IPR043717
label: "Domain of unknown function DUF5658"
definition: >-
  This domain can be found in a family of proteins from bacteria, archaea and viruses. Proteins containing this domain are typically between 101 and 135 amino acids in length. There is a completely conserved aspartate and a conserved EXNP motif that may be functionally important.
