identifier: InterPro:IPR056338
label: "Cap15-like, TM helices"
definition: >-
  This entry includes CD-NTase-associated protein 15 from Yersinia aleksiciae (Cap15, ), an effector protein of a CBASS antivirus system. These proteins occur in conserved genome contexts with the SMODS nucleotide synthetase. Cap15 consists of two transmembrane segments (TM) at the N-terminal, represented in this entry, and a compact eight-stranded β-barrel scaffold that forms a cyclic dinucleotide receptor domain ( ) which oligomerises upon activation. Activated Cap15 binds the cyclic nucleotide second messenger 3',3'-cGAMP, relocalises throughout the cell and specifically induces rupture of the inner membrane.
