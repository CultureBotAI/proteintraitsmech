identifier: InterPro:IPR047421
label: "RNA-binding protein FXR2, first Tudor-like Agenet domain"
definition: >-
  FXR2 contains two copies of the Tudor-like Agenet domain which contain an aromatic cage with potential for binding methylated lysine. This entry corresponds to the first Agenet domain. FXR2 is an RNA-binding protein that associates with polyribosomes, predominantly with 60S large ribosomal subunits and recognises methylated lysine and bind H4K20me1/2/3. It is one of the autosomal paralogues of FMRP protein, part of a family of RNA-binding proteins that are involved the regulation of alternative mRNA splicing, mRNA stability, mRNA dendritic transport and postsynaptic local protein synthesis of a subset of mRNAs, playing a crucial role in neuronal development and synaptic plasticity, involved in the development of fragile X syndrome (FXS). They are highly similar to one another and also retain highly conserved domain architecture comprising two tandem Tudor Agenet-like domains at the N-terminal, three ribonucleoprotein K homology (KH) domains and a cluster of arginine and glycine residues that constitute the RGG box. The KH domains and RGG box constitute a large region that is important for RNA binding and polyribosome association. FRX2 has been shown to specifically regulate hippocampal neurogenesis by reducing the stability of Noggin mRNA.
