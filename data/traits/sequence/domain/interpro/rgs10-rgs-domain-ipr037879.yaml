identifier: InterPro:IPR037879
label: RGS10, RGS domain
definition: >-
  RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS10 protein. RGS10 is a member of the RGS proteins family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS10 is one of the smallest proteins of the RGS family; its structure is little more than the RGS domain. As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis.
