identifier: InterPro:IPR047075
label: "Paxillin/TGFB1I1, LIM domain 1"
definition: >-
  Paxillin is a cytoskeletal protein involved in actin-membrane attachment at sites of cell adhesion to the extracellular matrix (focal adhesion). Extensive tyrosine phosphorylation occurs during integrin-mediated cell adhesion, embryonic development, fibroblast transformation and following stimulation of cells by mitogens that operate through the 7TM family of G-protein-coupled receptors. Paxillin binds in vitro to the focal adhesion protein vinculin, as well as to the SH3 domain of c-Src, and, when tyrosine phosphorylated, to the SH2 domain of v-Crk. An N-terminal region has been identified that supports the binding of both vinculin and the focal adhesion tyrosine kinase, pp125Fak. Paxillin is a 68kDa protein containing multiple domains, including four tandem C-terminal LIM domains (each of which binds 2 zinc ions); an N-terminal proline-rich domain, which contains a consensus SH3 binding site; and three potential Crk-SH2 binding sites. The predicted structure of paxillin suggests that it is a unique cytoskeletal protein capable of interaction with a variety of intracellular signalling and structural molecules important in growth control and the regulation of cytoskeletal organisation. This entry includes the transforming growth factor beta-1-induced transcript 1 (TGFB1I1, also known as Hic-5). Hic-5 functions as a molecular adapter coordinating multiple protein-protein interactions at the focal adhesion complex and in the nucleus. Leupaxin is a transcriptional coactivator for androgen receptor (AR) and serum response factor (SRF). This entry represents the first Lim domain of Paxillin and similar animal proteins, which function as an adaptor or scaffold to support the assembly of multimeric protein complexes. This domain shows two characteristic zinc finger motifs. Th…
