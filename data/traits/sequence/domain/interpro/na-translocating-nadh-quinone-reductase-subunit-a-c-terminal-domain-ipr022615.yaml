identifier: InterPro:IPR022615
label: Na(+)-translocating NADH-quinone reductase subunit A, C-terminal domain
definition: >-
  This domain is found in bacterial Na(+)-translocating NADH-quinone reductase subunit A (NQRA) proteins. The Na(+)-translocating NADH: ubiquinone oxidoreductase (Na(+)-NQR) generates an electrochemical Na(+) potential driven by aerobic respiration. The function of this domain has not been characterised.
