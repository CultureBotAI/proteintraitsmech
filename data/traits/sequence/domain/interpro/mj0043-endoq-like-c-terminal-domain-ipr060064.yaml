identifier: InterPro:IPR060064
label: "MJ0043/EndoQ-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Pyrococcus furiosus EndoQ (, its homologue MJ0043 from Methanocaldococcus jannaschii and related proteins from methanogenic archaea. It can also be found C-terminal or at the middle region in putative bacterial DNA helicases. MJ0043 is a 785 amino acid protein (gene MJ0043) that undergoes protein self-splicing involving post-translational excision of an intervening intein region and this domain represents the second part of the mature protein after intein removal. EndoQ is a lesion-specific endonuclease which is assumed to be involved in DNA repair pathways in Thermococcales. It recognises a deaminated base and hydrolyses the phosphodiester bond 5' to the site of the lesion. Initially identified as a hypoxanthine-specific endonuclease, it has now been shown that EndoQ also recognises uracil, xanthine, and apurinic/apyrimidinic (AP) sites in DNA, and that a homologue in Bacillus pumilus shares functional properties of the archaeal EndoQs.
