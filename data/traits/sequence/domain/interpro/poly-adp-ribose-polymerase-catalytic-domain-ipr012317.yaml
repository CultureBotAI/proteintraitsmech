identifier: InterPro:IPR012317
label: Poly(ADP-ribose) polymerase, catalytic domain
definition: >-
  Poly(ADP-ribose) polymerases (PARP) are a family of enzymes present in eukaryotes, which catalyse the poly(ADP-ribosyl)ation of a limited number of proteins involved in chromatin architecture, DNA repair, or in DNA metabolism, including PARP itself. PARP, also known as poly(ADP-ribose) synthetase and poly(ADP-ribose) transferase, transfers the ADP-ribose moiety from its substrate, nicotinamide adenine dinucleotide (NAD), to carboxylate groups of aspartic and glutamic residues. Whereas some PARPs might function in genome protection, others appear to play different roles in the cell, including telomere replication and cellular transport. PARP-1 is a multifunctional enzyme. The polypeptide has a highly conserved modular organisation consisting of an N-terminal DNA-binding domain, a central regulating segment, and a C-terminal or F region accommodating the catalytic centre. The F region is composed of two parts: a purely α-helical N- terminal domain (alpha-hd), and the mixed α/β C-terminal catalytic domain bearing the putative NAD binding site. Although proteins of the PARP family are related through their PARP catalytic domain, they do not resemble each other outside of that region, but rather, they contain unique domains that distinguish them from each other and hint at their discrete functions. Domains with which the PARP catalytic domain is found associated include zinc fingers, SAP, ankyrin, BRCT, Macro, SAM, WWE and UIM domains. The alpha-hd domain is about 130 amino acids in length and consists of an up-up-down-up-down-down motif of helices. It is thought to relay the activation signal issued on binding to damaged DNA. The PARP catalytic domain is about 230 residues in length. Its core consists of a five-stranded antiparallel β-sheet and four-stranded mixed β-sheet.…
