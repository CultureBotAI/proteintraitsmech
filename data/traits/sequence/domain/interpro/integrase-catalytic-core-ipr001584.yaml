identifier: InterPro:IPR001584
label: Integrase, catalytic core
definition: >-
  The retroviral integrase is the enzyme responsible for the insertion of a DNA copy of the viral genome into host DNA, an essential step in the replication cycle of viruses. Integrases comprise three functional and structural domains: the central core domain, which contains the catalytic residues, an N-terminal zinc finger and a C-terminal DNA binding domain. The integrase catalytic domain catalyses a series of reactions to integrate the viral genome into a host chromosome. In the first step, it removes two 3' end nucleotides from each strand of the linear viral DNA, leaving overhanging CA-OH ends. In the second step, the processed 3' ends are covalently joined to the 5' ends of the target DNA. In the third step, which probably involves additional cellular enzymes, unpaired nucleotides at the viral 5' ends are removed and the ends are joined to the target site 3' ends, generating an integrated provirus flanked by five base-pair direct repeats of the target site DNA. The crystal structure of the catalytic domain shows a dimeric structure, with each monomer containing a five-stranded β-sheet and six α-helices. This fold is characteristic of the polynucleotidyltransferase superfamily whose members include RNase H, the bacteriophage Mu transposase, and the E. coli Holliday junction resolving enzyme, RuvC. The catalytic domain of integrase contains the DD35E triad motif. As in other DNA-binding proteins containing this motif, these acidic residues coordinate a divalent Mg2+ in the resting enzyme. Substituting any one of these residues abolishes both processing and integration activities of integrase. The integrase catalytic domain is also found in various transposase proteins.
