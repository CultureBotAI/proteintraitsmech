identifier: InterPro:IPR021692
label: "Antibacterial effector protein Tle3, C-terminal"
definition: >-
  This entry represents the C-terminal domain of Antibacterial effector protein Tle3 from Pseudomonas aeruginosa and similar sequences from proteobacteria. Tle3 is toxic once delivered in the periplasm of prey bacteria.
