identifier: InterPro:IPR055267
label: "Aerolysin-like, C-terminal"
definition: >-
  This entry represents the C-terminal region of Aerolysin from Aeromonas sobria and similar sequences mainly from proteobacteria, animals and plants. This protein is a cytolytic toxin that forms pores in host membranes after proteolytic removal of a C-terminal propeptide, leading to destruction of the membrane permeability barrier and cell death. The pores are formed by transmembrane β-strands and are approximately 3 nm in diameter.
