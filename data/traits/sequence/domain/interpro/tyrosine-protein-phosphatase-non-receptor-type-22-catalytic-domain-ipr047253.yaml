identifier: InterPro:IPR047253
label: "Tyrosine-protein phosphatase non-receptor type 22, catalytic domain"
definition: >-
  This entry represents the catalytic domain of PTN22. Tyrosine-protein phosphatase non-receptor type 22 (PTPN22) belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs ( ) catalyse the dephosphorylation of phosphotyrosine peptides. PTPN22 is expressed in hematopoietic cells and it functions as a key regulator of immune homeostasis by inhibiting T-cell receptor signalling through the direct dephosphorylation of Src family kinases (Lck and Fyn), ITAMs of the TCRz/CD3 complex, and other signalling molecules. Mutations in the PTPN22 gene are associated with multiple connective tissue and autoimmune diseases including type 1 diabetes mellitus, rheumatoid arthritis, and systemic lupus erythematosus. PTPN22 contains an N-terminal catalytic PTP domain and four proline-rich regions at the C-terminal.
