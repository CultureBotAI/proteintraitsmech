identifier: InterPro:IPR022583
label: "Microcystin synthetase, domain of unknown function"
definition: >-
  This domain of unknown function is found in cyanobacteria and is approximately 40 amino acids in length. It is found in association with , , , and and contains a conserved YAN motif. This region is found in microcystin synthetase, which is one of a number of proteins involved in microcystin toxin synthesis. Microcystins form a large family of small cyclic heptapeptides harbouring extensive modifications in amino acid residue composition and functional group chemistry. These peptide hepatotoxins contain a range of non-proteinogenic amino acids and unusual peptide bonds, and are typically N-methylated. They are synthesized on large enzyme complexes consisting of non-ribosomal peptide synthetases and polyketide synthases.
