identifier: InterPro:IPR037316
label: Yen1, H3TH domain
definition: >-
  Yen1 is an endonuclease which resolves Holliday junctions by the introduction of symmetrically related cuts across the junction point, to produce nicked duplex products in which the nicks can be readily ligated. This entry represents the H3TH domain of Yen1. The H3TH domain has an extended loop with at least three turns between the first two helices, and only three of the four helices appear to be conserved. Together with the helical arch and network of amino acids interacting with metal binding ions, the H3TH region defines a positively charged active-site DNA-binding groove in structure-specific 5' nucleases.
