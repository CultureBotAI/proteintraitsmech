identifier: InterPro:IPR044397
label: "NendoU domain, porcine torovirus-like"
definition: >-
  Nidovirus endoribonucleases (NendoUs) are uridylate-specific endoribonucleases, which release a cleavage product containing a 2',3'-cyclic phosphate at the 3' terminal end and are widely conserved among this order. This entry represents the NendoU domain from toroviruses including Breda virus 1, Berne virus, Porcine torovirus and related viruses. This domain is related to the NendoU domain found in Nsp15 from coronaviruses and Nsp11 from arteriviruses, which participate in the viral replication process and in the evasion of the host immune system.
