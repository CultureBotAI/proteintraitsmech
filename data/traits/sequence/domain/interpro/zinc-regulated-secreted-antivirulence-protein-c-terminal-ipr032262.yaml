identifier: InterPro:IPR032262
label: "Zinc-regulated secreted antivirulence protein, C-terminal"
definition: >-
  This entry represents the C-terminal domain of ZirS, zinc-regulated secreted protein, that is part of a type V-like secretion system. The domain adopts a bacterial Ig-like fold. This domain interacts with its transporter ZirT, and ZirS also interacts directly with ZirU, the third component of this antivirulence complex. ZirT is the zinc-regulated transporter through which ZirS is secreted.
