identifier: InterPro:IPR063672
label: "Uncharacterised protein TP_0391, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of uncharacterised protein TP_0391 from Treponema pallidum and similar sequences from Spirochaetales. The full-length protein is 466 amino acids long and contains a predicted signal peptide. function of this domain remains to be determined.
