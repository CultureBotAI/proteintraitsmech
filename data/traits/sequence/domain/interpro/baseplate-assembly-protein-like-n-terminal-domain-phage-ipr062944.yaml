identifier: InterPro:IPR062944
label: "Baseplate assembly protein-like, N-terminal domain, phage"
definition: >-
  This entry represents an N-terminal domain of approximately 130 residues found in putative phage baseplate assembly proteins. According to STRING, proteins containing this domain are functionally associated with other phage structural proteins including Phage_base_V ( ), Phage_sheath_1C ( ), Phage_T4_gp19 ( ), and eCIS_core ( ). This domain is found in bacteria, predominantly Actinomycetota (especially Streptomyces) and Pseudomonadota. The function of this domain remains to be determined.
