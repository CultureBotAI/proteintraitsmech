identifier: InterPro:IPR028819
label: Nuclear receptor coactivator 1, basic helix-loop-helix
definition: >-
  This entry represents the N-terminal basic helix-loop-helix (bHLH) domain of NCOA1. Nuclear receptor coactivator 1 (NCOA1, also known as SRC-1) belongs to the SRC/p160 nuclear receptor coactivator family, which contains proteins that are ligand-dependent transcription factors. These receptors can function as molecular switches. NCOA1 directly binds nuclear receptors and stimulates the transcriptional activities in a hormone-dependent fashion. It is involved in the coactivation of different nuclear receptors, such as for steroids (PGR, GR and ER), retinoids (RXRs), thyroid hormone (TRs) and prostanoids (PPARs). It is also involved in coactivation mediated by STAT3, STAT5A, STAT5B and STAT6 transcription factors. It plays a central role in creating multisubunit coactivator complexes that act via remodeling of chromatin, and possibly acts by participating in both chromatin remodeling and recruitment of general transcription factors. It can be regulated by sumoylation and ubiquitination.
