identifier: InterPro:IPR024961
label: "Type II secretion system protein GspC, N-terminal"
definition: >-
  This is the N-terminal region of GspC proteins, which is part of the Type II secretion system. The region is made up of a short N-terminal cytoplasmic domain that is followed by the single transmembrane helix, a Pro-rich linker, and the so-called homology region domain in the periplasm. This inner membrane GspC interacts with the outer membrane secretin GspD via periplasmic domains, an interaction which is critical for the effectiveness of type II secretion. This domain can also be found in GspN from Pseudomonas aeruginosa. The type II secretion system (T2SS) is one of several extracellular secretion systems in gram-negative bacteria. It delivers toxins and a range of hydrolytic enzymes including proteases, lipases and carbohydrate-active enzymes to the cell surface or extracellular space. T2SS systems are composed of 11 to 15 different proteins, which are generally called GspA to GspO and GspS. The T2SS spans the two bacterial membranes and ensures secretion of folded proteins across the outer membrane pore formed by GspD. The inner membrane complex contains GspC, GspL, GspM, and GspF. The cytoplasmic domains of GspL and GspF interact with an ATPase, GspE. GspE is thought to energize the formation of a short pseudopilus by several pilin-like proteins, GspG to GspK. GspD has been shown to interact with the inner membrane component GspC.
