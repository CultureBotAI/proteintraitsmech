identifier: InterPro:IPR060374
label: "RelA/SpoT, RIS domain"
definition: >-
  This entry represents the Ribosome-InterSubunit (RIS) domains found in RelA/SpoT proteins, adjacent to the ACT domain. The RIS domain is part of the binding interface between the C-terminal region and the ribosome, bridging the large and the small ribosomal subunits. RIS contains a four-stranded β-sheet and a short α-helix. RelA/SpoT-homologue proteins (RHS) mediate the stringent response in bacteria which enables its metabolic adaptation under stress conditions. These enzymes synthesise the second messenger (p)ppGpp, which is a regulatory metabolite of the stringent response characterised by growth arrest and the modulation of gene expression in response to various nutritional stresses.
