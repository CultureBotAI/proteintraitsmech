identifier: InterPro:IPR058670
label: "Phosphotyrosine protein phosphatase domain"
definition: >-
  This entry represents the Phosphotyrosine Protein Phosphatase PTPase domain from plant proteins, including Protein SEEDLING PLASTID DEVELOPMENT 1 from Arabidopsis thaliana (SPD1, ) and similar uncharacterised sequences from bacteria. While it shares limited sequence similarity with known plant protein tyrosine phosphatase PTPs (such as AtPTP1 in Arabidopsis), its conserved structural features suggest a related Phosphotyrosine function. Unlike classical PTPs, part of a well-defined family, PTPases may include enzymes that are not structurally related but still can dephosphorylate Phosphotyrosine. Given the crucial role of tyrosine phosphorylation in plant embryogenesis, seed germination, and plastid development, this domain may play a role in these processes.
