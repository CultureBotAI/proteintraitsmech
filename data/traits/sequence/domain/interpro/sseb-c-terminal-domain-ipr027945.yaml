identifier: InterPro:IPR027945
label: "SseB, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the SseB protein found in Enterobacteria. SseB appears to be found exclusively in Enterobacteria. SseB enhances serine-sensitivity in Escherichia coli and is part of the Salmonella pathogenicity island 2 (SPI-2) translocon.
