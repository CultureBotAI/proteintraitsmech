identifier: InterPro:IPR044475
label: "Staufen 1, third double-stranded RNA binding domain"
definition: >-
  Staufen 1 may play a role in specific positioning of mRNAs at given sites in the cell by cross-linking cytoskeletal and RNA components, and in stimulating their translation at the site. It binds double-stranded RNA (regardless of the sequence) and tubulin. It also plays a role in virus particles production of many viruses including of HIV-1, HERV-K, ebola virus and influenza virus. This entry represents the third DSRM of Staufen 21.
