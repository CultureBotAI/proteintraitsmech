identifier: InterPro:IPR032514
label: "Glutaminase A, central domain"
definition: >-
  This domain is centrally located in Glutaminase A (GtaA), an enzyme from Aspergillus oryzae that catalyses the hydrolysis of glutamine to glutamic acid and plays a key role in nitrogen metabolism. The function of this domain, previously known as DUF4965, is unknown. It is predicted to adopt a mainly α-helical configuration. Members of this group of proteins are mainly found in fungi and bacteria.
