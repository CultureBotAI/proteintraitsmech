identifier: InterPro:IPR015415
label: "Spastin/Vps4, C-terminal"
definition: >-
  This domain is found at the C-terminal of a group of eukaryotic and archaeal proteins that belong to the AAA ATPase family, including human Spastin and Vacuolar protein sorting-associated protein 4 (Vps4) from Saccharomyces cerevisiae. It forms an α-helix structure and is required for oligomerisation.
