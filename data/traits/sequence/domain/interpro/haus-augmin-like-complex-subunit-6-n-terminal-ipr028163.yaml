identifier: InterPro:IPR028163
label: "HAUS augmin-like complex subunit 6, N-terminal"
definition: >-
  This entry represents the N-terminal domain of the subunit 6 of the HAUS augmin-like complex, involved in mitotic spindle assembly, maintenance of centrosome integrity and completion of cytokinesis. Subunit 6 interacts with the NEDD1-gamma-tubulin complex and recruits this complex to the spindle, which in turn promotes microtubule polymerisation.
