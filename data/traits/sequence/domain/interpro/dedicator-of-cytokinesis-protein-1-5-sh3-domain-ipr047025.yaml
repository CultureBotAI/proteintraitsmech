identifier: InterPro:IPR047025
label: "Dedicator of cytokinesis protein 1/5, SH3 domain"
definition: >-
  DOCK family members are evolutionarily conserved guanine nucleotide exchange factors (GEFs) for Rho-family GTPases. DOCK proteins are required during several cellular processes, such as cell motility and phagocytosis. The N-terminal SH3 domain of the DOCK proteins functions as an inhibitor of GEF, which can be relieved upon its binding to the ELMO1-3 adaptor proteins, after their binding to active RhoG at the plasma membrane. DOCK family proteins are categorised into four subfamilies based on their sequence homology: DOCK-A subfamily (DOCK1/180, 2, 5), DOCK-B subfamily (DOCK3, 4), DOCK-C subfamily (DOCK6, 7, 8), DOCK-D subfamily (DOCK9, 10, 11). All DOCKs contain two homology domains: the DHR-1 (Dock homology region-1), also called CZH1 (CED-5, Dock180, and MBC-zizimin homology 1), and DHR-2 (also called CZH2 or Docker). DOCK1, also called Dock180, and DOCK5 are class A DOCKs and are atypical guanine nucleotide exchange factors (GEFs) that lack the conventional Dbl homology (DH) domain. DOCK1 interacts with the scaffold protein Elmo and the resulting complex functions upstream of Rac in many biological events including phagocytosis of apoptotic cells, cell migration and invasion. DOCK5 functions upstream of Rac1 to regulate osteoclast function. Class A DOCKs also contain an SH3 domain at the N-terminal region and a PxxP motif at the C-terminal; they are specific GEFs for Rac.
