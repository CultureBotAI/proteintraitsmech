identifier: InterPro:IPR063544
label: "ORF2p, PUB domain"
definition: >-
  This domain is found in the human LINE-1 retrotransposable element ORF2 protein and related proteins. Long interspersed element-1 (LINE-1) retrotransposons are the most abundant and the only active autonomous transposable element in humans. During target-primed reverse transcription, the ORF2p, encoded by LINE-1, cleaves the target DNA and reverse transcribes LINE-1 messenger RNA (mRNA) into a new genomic location. The domain represented by this entry is predicted to interact with PCNA.
