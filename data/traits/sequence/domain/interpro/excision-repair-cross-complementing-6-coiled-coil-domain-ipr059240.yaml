identifier: InterPro:IPR059240
label: "Excision Repair Cross Complementing 6, coiled-coil domain"
definition: >-
  This entry represents a coiled-coil domain located near the N terminus of human Excision Repair Cross Complementing 6 (ERCC-6,) and related proteins mainly found in animals. This coiled-coil domain binds magnesium. This entry does not include Saccharomyces cerevisiae RAD26, and Schizosaccharomyces pombe Rhp26. ERCC-6 (also known as Cockayne syndrome group B, CSB) is a DNA-binding protein important in eukaryotic transcription-coupled repair (TCR). TCR is a well-conserved sub-pathway of nucleotide excision repair (NER) that preferentially removes DNA lesions from the template strand blocking translocation of RNA polymerase II (Pol II). In a model for TCR, the processing Pol II encounters the lesion on the transcribed DNA strand and stalls; it is then displaced by the TCR-initiation complex which includes ERCC-6, ERCC-8, UVSSA and USP7; TCR-specific factors then access the lesion for the DNA damage incision process. The N-terminal region, the ATPase domain and the C-terminal region of ERCC-6 all directly contribute to DNA association and catalytic activity. The ATPase domain functions in concert with either the N- or C-terminal region to mediate UV-induced chromatin association. The N-terminal region prevents ERCC-6 from stably associating with chromatin under normal growth conditions, and the C-terminal region of ERCC-6 promotes stable chromatin association in the presence of lesion-stalled transcription. In addition to the coiled-coil domain, the N-terminal region of ERCC-6 includes two lysine residues subject to SUMOylation, a nucleolar localisation signal NoLS1, and a nuclear localisation signal NLS1. ERCC-6 also includes a SWI/SNF-like ATPase domain, a nucleotide-binding domain and a ubiquitin-binding domain.
