identifier: InterPro:IPR048772
label: "ATP-dependent DNA helicase Hel308-like, domain 4"
definition: >-
  This entry represents a conserved region located towards the C-terminal of ATP-dependent DNA helicase Hel308 and similar archaeal helicases. This domain, named domain 4 in, folds into a seven α-helix bundle structure and seems to be unique within this helicase family. The central helix acts as a ratchet and mediates stacking interactions on base moieties of the DNA.
