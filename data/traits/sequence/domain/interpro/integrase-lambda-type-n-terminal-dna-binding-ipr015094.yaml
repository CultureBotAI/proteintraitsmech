identifier: InterPro:IPR015094
label: Integrase, lambda-type, N-terminal DNA-binding
definition: >-
  The amino terminal domain of bacteriophage lambda integrase folds into a three-stranded, antiparallel β-sheet that packs against a C-terminal α-helix, adopting a fold that is structurally related to the three-stranded β-sheet family of DNA-binding domains (which includes the GCC-box DNA-binding domain and the N-terminal domain of Tn916 integrase). This domain is responsible for high-affinity binding to each of the five DNA arm-type sites and is also a context-sensitive modulator of DNA cleavage.
