identifier: InterPro:IPR015245
label: Nuclear RNA export factor Tap, RNA-binding domain
definition: >-
  This domain adopts a structure consisting of an α+β sandwich with an antiparallel β-sheet, arranged in a 2(β-α-β) motif. It is mainly found in mRNA export factors, which mediate the sequence nonspecific nuclear export of cellular mRNAs as well as the sequence-specific export of retroviral mRNAs bearing the constitutive transport element.
