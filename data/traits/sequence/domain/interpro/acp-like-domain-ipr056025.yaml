identifier: InterPro:IPR056025
label: "ACP-like domain"
definition: >-
  This domain, previously known as DUF7606, is found in Neisseria Adhesin Complex Protein (ACP) and in a group of uncharacterised sequences from proteobacteria. It folds into an eight-stranded β-barrel, stabilised by a disulphide bond between the first and last β-strands. Nm-ACP is structurally similar to the MliC/PliC protein family of lysozyme inhibitors. Despite it does not share any conserved MliC/PliC sequence motifs associated with lysozyme recognition, ACP is capable of inhibiting lysozyme.
