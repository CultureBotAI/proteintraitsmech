identifier: InterPro:IPR059775
label: "Spike protein P1, first jelly-roll domain"
definition: >-
  This entry represents the first jelly-roll domain of Spike protein P1 from Pseudoalteromonas phage PM2. The Spike protein P1, also known as Protein I, is a key component of the Pseudoalteromonas phage PM2 (Bacteriophage PM2). This protein is responsible for receptor binding and is located at the fivefold vertices of the viral capsid. It plays a crucial role in the attachment and entry of the phage into its host cell.
