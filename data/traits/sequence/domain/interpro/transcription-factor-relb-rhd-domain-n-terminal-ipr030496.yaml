identifier: InterPro:IPR030496
label: "Transcription factor RelB, RHD domain, N-terminal"
definition: >-
  NF-kappaB is a pleiotropic transcription factor present in almost all cell types. It is the endpoint of a series of signal transduction events that are initiated by a vast array of stimuli related to many biological processes such as inflammation, immunity, differentiation, cell growth, tumorigenesis and apoptosis. NF-kappaB is a homo- or heterodimeric complex formed by the Rel-like domain-containing proteins RelA/p65, RelB, NFKB1/p50, c-Rel and NFKB2/p52. Each individual NF-kappaB subunit, and perhaps each dimer, carries out unique functions in regulating transcription. Dimer-specific functions can be conferred by selective protein-protein interactions with other transcription factors, coregulatory proteins, and chromatin proteins. RelB is a component of the NF-kappa-B RelB-p50 complex and the RelB-p52 complex. It is best known for its roles in lymphoid development and noncanonical signalling, but it seems to be linked to many distinct processes. Among others, RelB may have a role in suppressing inflammation and has been shown to negatively regulate osteoblast differentiation and bone formation. This entry represents the N-terminal sub-domain of the Rel homology domain (RHD) of RelB, a potent transactivator in a heterodimer with NF-kappa B1 (p50) or B2 (p52). It is involved in the regulation of genes that play roles in inflammatory processes and the immune response.
