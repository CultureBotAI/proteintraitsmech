identifier: InterPro:IPR064188
label: LIC11966
definition: >-
  This entry represents LIC11966, a lipoprotein from Leptospira interrogans . LIC11966 has been referred to as an "ErpY-like lipoprotein" based on reported sequence similarity to the outer membrane protein ErpY ( ) from Borrelia ; however, this similarity may reflect a shared compositional bias toward charged amino acids rather than true homology derived from a common ancestral sequence. All members carry some form of signal peptide, although not all are lipoproteins.
