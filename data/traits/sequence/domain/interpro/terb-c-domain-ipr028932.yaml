identifier: InterPro:IPR028932
label: "TerB-C domain"
definition: >-
  The ter gene products constitute chemical stress response and anti-viral defense systems of bacteria. TerB-C occurs in the C terminus of TerB in TerB-N containing proteins. This domain displays multiple conserved acidic residues. The presence of conserved acidic residues in both TerB-N and TerB-C suggests that they, like the TerB domain, might also chelate metals. These two domains might also occur together in the same protein independently of TerB.
