definition: >-
  This entry represents a small protein of approximately 84 amino acids found predominantly in bacteria. The protein is widely distributed across bacterial phyla including Pseudomonadota and Acidobacteriota, with representatives found in Alphaproteobacteria and Terriglobia. The function of this protein remains to be determined. This entry also includes uncharacterised bacteial proteins.
