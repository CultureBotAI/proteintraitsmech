identifier: InterPro:IPR055161
label: "Vanadium-dependent haloperoxidase NapH1-like, second helical-bundle domain"
definition: >-
  This domain is found in Vanadium-dependent haloperoxidase NapH1 from Streptomyces sp. ( ) and similar bacterial sequences. Nahp1 that catalyse stereospecific chlorofunctionalisation reactions on naphthoquinone-based meroterpeneoids. This enzyme contain two similar helical domains composed of five α-helices. This domain harbours the catalytic residues. This domain is also found in vanadium-dependent bromoperoxidases where this domain exist as standalone and contains the residues essential for catalytic activity.
