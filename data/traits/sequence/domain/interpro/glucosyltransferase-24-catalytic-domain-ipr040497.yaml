identifier: InterPro:IPR040497
label: "Glucosyltransferase 24, catalytic domain"
definition: >-
  This is the catalytic domain found in UDP-glucose:glycoprotein glucosyltransferase (UGGT). This domain belongs to glucosyltransferase 24 family (GT24) A-type domain. The GT domain displays the expected glycosyltransferase type A (GT-A) fold.
