identifier: InterPro:IPR049072
label: "Maintenance of Photosystem II under High light 2, C-terminal domain"
definition: >-
  This is a C-terminal helical domain found in chloroplast thylakoid lumenal proteins, including Maintenance of Photosystem II under High light 2 (also known as Thylakoid lumenal 16.5 kDa protein, ) from Arabidopsis thaliana. MPH2 is required for the adaptation of this organism to photo inhibitory light and fluctuating light environments.
