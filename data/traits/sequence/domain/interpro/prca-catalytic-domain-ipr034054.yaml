identifier: InterPro:IPR034054
label: "PrcA catalytic domain"
definition: >-
  This entry includes the peptidase domain of the bacterial members of the peptidase subfamily S8B, which also includes dibasic processing peptidases from eukaryotes. The characterised bacterial peptidases have a trypsin-like specificity, cleaving lysyl or arginyl bonds. PrcA peptidase (MEROPS identifier S08.079) is a calcium-dependent peptidase isolated from Anabaena located in the cytoplasm and synthesised as a precursor. The HreP peptidase from Yersinia enterocolitica (MEROPS identifier S08.043) is also synthesised with a propeptide and processes itself by cleavage of a lysyl bond. It is essential for virulence, and the hreP gene is regulated by three genes, pypA, pypB and pypC. Peptidases S8 (or subtilases serine endo- and exo-peptidase clan) have an Asp/His/Ser catalytic triad similar to that found in trypsin-like proteases, but do not share their three-dimensional structure and are not homologous to trypsin. The stability of subtilases may be enhanced by calcium; some members have been shown to bind up to 4 ions via binding sites with different affinities. Some members of this clan contain disulfide bonds. These enzymes can be intra- and extracellular; some function at extreme temperatures and pH values.
