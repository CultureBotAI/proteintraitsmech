identifier: InterPro:IPR013131
label: Mannitol dehydrogenase, N-terminal
definition: >-
  Mannitol-1-phosphate 5-dehydrogenase catalyses the NAD-dependent reduction of mannitol-1-phosphate to fructose-6-phosphate as part of the phosphoenolpyruvate-dependent phosphotransferase system (PTS). The PTS facilitates the vectorial translocation of metabolisable carbohydrates to form the corresponding sugar phosphates, which are then converted to glycolytic intermediates. Mannitol 2-dehydrogenase catalyses the NAD-dependent reduction of mannitol to fructose. Several dehydrogenases have been shown to be evolutionary related, including mannitol-1-phosphate 5-dehydrogenase (gene mtlD), mannitol 2-dehydrogenase (gene mtlK); mannonate oxidoreductase (fructuronate reductase) (gene uxuB); Escherichia coli hypothetical proteins ydfI and yeiQ; and yeast hypothetical protein YEL070w. This domain has a Rossmann-type fold.
