identifier: InterPro:IPR058933
label: "YMC020W-like, alpha/beta hydrolase domain"
definition: >-
  This entry represents the α/β hydrolase domain in a group of uncharacterised fungal proteins, including YMC020W from Saccharomyces cerevisiae. This domain is predicted to show a core structure composed of a central β-sheet consisting of 5-8 strands, connected by α-helices to form an α/β/α sandwich.
