identifier: InterPro:IPR062549
label: "Surface protein P113, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of surface protein P113 and related proteins in Plasmodium species. The function of this C-terminal domain remains to be determined. P113 is a GPI-anchored membrane receptor that tethers secreted RH5 to the merozoite membrane during invasion of host erythrocytes. The protein forms a complex with RH5 and human basigin that bridges merozoite and erythrocyte membranes. P113 is expressed during asexual blood stages, specifically at the schizont stage and in free merozoites.
