identifier: InterPro:IPR048276
label: "Phage tail-like, C-terminal domain"
definition: >-
  This entry represents a domain found at the C-terminal of mostly uncharacterised proteins from Firmicutes and phages (also referred to as DUF6558_C) of which some members are phage tail-related proteins. Included in this entry is the prophage-derived protein YomH from Bacillus subtilis.
