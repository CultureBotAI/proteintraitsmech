identifier: InterPro:IPR006827
label: "Lantibiotic dehydratase, N-terminal"
definition: >-
  Lantibiotics are ribosomally synthesised antimicrobial agents derived from ribosomally synthesised peptides. They are produced by bacteria of the Firmicutes phylum, and include mutacin, subtilin, and nisin. Lantibiotic peptides contain thioether bridges termed lanthionines that are thought to be generated by dehydration of serine and threonine residues followed by addition of cysteine residues. This family constitutes the N terminus of the enzyme proposed to catalyse the dehydration step via glutamylation of the substrate during lantibiotic biosynthesis. The enzyme dehydrates Ser/Thr residues in the precursor by glutamylation.
