identifier: InterPro:IPR041338
label: "OSBS, enolase-like N-terminal domain"
definition: >-
  This is the N-terminal domain found in o-succinylbenzoate synthase (OSBS) enzymes ( ). Like other members of the enolase superfamily, OSBS enzymes are composed of a C-terminal catalytic (β/α)7β-barrel domain ( ) and an N-terminal capping domain with an α+β fold that is found in the enolase superfamily. This actino-bacterial N-terminal domain lacks the prototypical first two helices of the enolase capping domains. Structural analysis of T. fusca OSBS reveals that this is compensated for with an extra helix appended to the C terminus.
