identifier: InterPro:IPR032415
label: TRPM, tetramerisation domain
definition: >-
  This entry represents a short anti-parallel coiled-coil tetramerisation domain of the transient receptor potential cation channel subfamily M member proteins 1/3/6/7. It is held together by extensive core packing and interstrand polar interactions. Transient receptor potential (TRP) channels comprise a large family of tetrameric cation-selective ion channels that respond to diverse forms of sensory input. The presence of cytoplasmic domains that direct channel assembly appears to be a feature of many voltage-gated ion channel superfamily members.
