identifier: InterPro:IPR013024
label: "Gamma-glutamyl cyclotransferase-like"
definition: >-
  Gamma-glutamyl cyclotransferase (GGCT) catalyzes the formation of pyroglutamic acid (5-oxoproline) from dipeptides containing gamma-glutamyl, and is a dimeric protein. In Homo sapiens, the protein is encoded by the gene C7orf24. The enzyme participates in the gamma-glutamyl cycle, which plays a pre-eminent role in glutathione homoeostasis. The synthesis and metabolism of glutathione (L-gamma-glutamyl-L-cysteinylglycine) ties the gamma-glutamyl cycle to numerous cellular processes; glutathione acts as a ubiquitous reducing agent in reductive mechanisms involved in protein and DNA synthesis, transport processes, enzyme activity, and metabolism. AIG2 (avrRpt2-induced gene) is an Arabidopsis protein that exhibits RPS2- and avrRpt2-dependent induction early after infection with Pseudomonas syringae pv maculicola strain ES4326 carrying avrRpt2. avrRpt2 is an avirulence gene that can convert virulent strains of P. syringae to avirulence on Arabidopsis thaliana, soybean, and bean. This GGCT-like domain is also found in bacterial tellurite-resistance proteins (TrgB), butirosin biosynthesis protein BtrG, and in proteins described as ChaC, involved in a novel pathway for glutathione degradation.
