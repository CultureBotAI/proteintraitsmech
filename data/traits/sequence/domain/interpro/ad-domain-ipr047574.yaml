identifier: InterPro:IPR047574
label: "AD domain"
definition: >-
  This entry represents the AD domain found in a group of eukaryotic proteins that belong to the Lsm12 family, including human Gem-associated protein 6 (Gemin-6) and Protein LSM12. Gemin-6 is a component of the survival of motor neurons (SMN) protein complex, which plays a key role in the biogenesis of spliceosomal small nuclear ribonucleoproteins (snRNPs). LSM12 binds nicotinic acid adenine dinucleotide phosphate (NAADP) that confers NAADP sensitivity to the two pore channel complex (TPCs) by acting as TPC accessory protein necessary for NAADP-evoked Ca2 release. Members of this group consist of an N-terminal Sm domain followed by an AD domain and are involved in RNA metabolism. The AD domain is likely to possess an RNA-binding function given the similarity of its predicted structure to anticodon-binding domains.
