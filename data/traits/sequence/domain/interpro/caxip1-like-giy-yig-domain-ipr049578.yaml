identifier: InterPro:IPR049578
label: "CAXIP1-like, GIY-YIG domain"
definition: >-
  The entry represents the GIY-YIG domain found in CAX-interacting protein-1 (CXIP1)-like proteins and iron-sulfur cluster assembly proteins found in a group of cyanobacteria and some plant sequences. Members of this entry are similar to CAXIP1 from Arabidopsis, a novel PICOT (protein kinase C-interacting cousin of thioredoxin) domain-containing protein, that activates H+/Ca2 exchanger CAX1, and its homologue CAX4, but not CAX2 or CAX3. Iron-sulfur cluster assembly proteins in this family also contain a C-terminal NifU-like domain that corresponds to a common region between the NifU protein from nitrogen-fixing bacteria and rhodobacterial species. The biochemical function of NifU is unknown.
