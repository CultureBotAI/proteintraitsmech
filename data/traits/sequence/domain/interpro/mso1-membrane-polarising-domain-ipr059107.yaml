identifier: InterPro:IPR059107
label: "Mso1, membrane-polarising domain"
definition: >-
  This C-terminal region of Mso1 assists in targeting Sec1 to the sites of polarised membrane transport, the SNARES and Sec4. Mso1p is a component of the secretory vesicle docking complex whose function is closely associated with that of Sec1p. It is a small hydrophilic protein that is enriched in the microsomal membrane fraction. The yeast Sec1p protein functions in the docking of secretory transport vesicles to the plasma membrane. Mso1p and Sec1p interact at sites of exocytosis and the Mso1p-Sec1p interaction site depends on a functional Rab GTPase Sec4p and its GEF Sec2p.
