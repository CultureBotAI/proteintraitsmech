identifier: InterPro:IPR034506
label: "RBM14, RNA recognition motif 1"
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of RBM14. RBM14 (also known as CoAA) is a heterogeneous nuclear ribonucleoprotein (hnRNP)-like protein identified as an activator of the receptor coactivator TRBP (thyroid-hormone-receptor-binding protein). It also regulates mRNA splicing and transcription. RBM14 is a suppressor of ectopic assembly of centriolar protein complexes. It contains two N-terminal RNA recognition motifs (RRMs) and a TRBP-interacting domain.
