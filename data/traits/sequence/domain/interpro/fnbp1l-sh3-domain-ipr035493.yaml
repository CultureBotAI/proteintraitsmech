identifier: InterPro:IPR035493
label: "FNBP1L, SH3 domain"
definition: >-
  This entry represents the SH3 domain of FNBP1L. Formin-binding protein 1-like (FNBP1L, also known as Toca-1) is part of the Toca-1-N-WASP complex that induces the formation of filopodia and endocytic vesicles. CIP4 and FNBP1L contain an F-BAR domain, a HR1 domain and an SH3 domain. FNBP1L belongs to the CIP4 (Cdc42 interacting protein-4) subfamily of the F-BAR (F for FCH, Fer-CIP4 homology domain) protein family. The F-BAR proteins have been implicated in cell membrane processes such as membrane invagination, tubulation and endocytosis. FNBP1L is required for Cdc42-induced actin assembly and is essential for autophagy of intracellular pathogens.
