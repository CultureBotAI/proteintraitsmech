identifier: InterPro:IPR045296
label: ETFRF1, LYR domain
definition: >-
  ETFRF1, also called LYR motif-containing protein 5 (LYRM5), or Ghiso (growth-factor inducible soluble) factor, acts as a regulator of the electron transfer flavoprotein by promoting the removal of flavin from the ETF holoenzyme (composed of ETFA and ETFB). It belongs to the Complex1_LYR-like superfamily that consists of proteins of diverse functions that are exclusively found in eukaryotes and contain the conserved tripeptide 'LYR' close to the N terminus.
