identifier: InterPro:IPR062031
label: "MSC6, C-terminal domain"
definition: >-
  This entry represents the C-terminal tetratricopeptide repeat (TPR) domain of MSC6 (Meiotic sister-chromatid recombination protein 6). MSC6 is a mitochondrial protein involved in the control of meiotic sister-chromatid recombination. The protein is found in fungi and localises to the mitochondrial matrix.
