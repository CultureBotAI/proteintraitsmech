identifier: InterPro:IPR015113
label: "Staphostatin B"
definition: >-
  Staphostatin B inhibits the cysteine protease Staphopain B, produced by Staphylococcus aureus, by blocking the active site of the enzyme. This domain adopts an eight-stranded mixed β-barrel structure, with a deviation from the up-down topology of canonical β-barrels in the amino-terminal part of the molecule.
