identifier: InterPro:IPR005182
label: "YdbS-like, PH domain"
definition: >-
  This domain is found in an uncharacterised family of membrane proteins mainly found in prokaryotes, including UPF0699 transmembrane protein YdbS from Bacillus subtilis. Members of this group contain 1-3 copies of this domain, with each copy flanked by transmembrane helices. It has a PH domain-like structure ( ).
