identifier: InterPro:IPR035006
label: "Ankyrin repeat and LEM domain-containing protein 2, LEM domain"
definition: >-
  Lem4 (also called ANKLE2) and C. elegans orthologue LEM-4L are required for BAF dephosphorylation. Lem4 coordinates BAF dephosphorylation by inhibiting kinase VRK-1 and by supporting PP2A dephosphorylation of BAF during mitotic exit. Barrier-to-autointegration factor (BAF) is an essential protein that binds to dsDNA, chromatin, nuclear lamina proteins, histones and various transcription factors. Members of the vaccinia-related kinase (VRK) family of mitotic kinases phosphorylate BAF in mitosis and meiosis; this modification strongly reduces the affinity of BAF for chromatin and slightly weakens its affinity for LEM proteins. BAF dephosphorylation has been linked to mitotic exit and postmitotic NE formation. ANKLE2 contains an N-terminal LEM domain and an ankyrin repeat region. The LEM domain is known to interact with BAF. The ankyrin repeats are unique motifs mediating protein-protein interactions. This entry represents the LEM domain.
