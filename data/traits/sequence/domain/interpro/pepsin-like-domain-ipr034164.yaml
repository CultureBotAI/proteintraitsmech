identifier: InterPro:IPR034164
label: "Pepsin-like domain"
definition: >-
  This entry represents a domain found in a group of pepsin-like aspartic proteases. They are found in mammals, plants, fungi and bacteria and are classified by MEROPS as members of the peptidase family A1 (pepsin A, clan AA). Proteins containing this domain also include the fungal enzymes mucorpepsin (A01.013), polyporopepsin (A01.019), CtsD peptidase from Aspergillus (A01.077) and CnAP1 peptidase from Cryptococcus neoformans (A01.078); plasmepsins from the malaria parasite Plasmodium (A01.021, A01.022, A01.023, A01.043, A01.059) and shewasin A from the bacterium Shewanella (A01.095).
