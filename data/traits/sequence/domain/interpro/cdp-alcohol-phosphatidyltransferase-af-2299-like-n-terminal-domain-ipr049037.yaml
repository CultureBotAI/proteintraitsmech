identifier: InterPro:IPR049037
label: "CDP-alcohol phosphatidyltransferase AF_2299-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of CDP-alcohol phosphatidyltransferase from Archaeoglobus fulgidus (AF_2299) and similar archaeal proteins. AF_2299 is a member of a family of membrane-embedded enzymes known as CDP-alcohol phosphotransferases (CDP-APs) involved in the formation of polar phospholipids. This integral membrane phosphotransferase is organised into two distinct domains. This entry represents the N-terminal cytoplasmic domain, which has structural similarity to the cytidyltransferases.
