identifier: InterPro:IPR054750
label: "DNA polymerase II small subunit, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of DNA polymerase II small subunit from Pyrococcus horikoshii (PolB) and similar sequences from thermococcales. PolB possesses two activities: a DNA synthesis (polymerase) and an exonucleolytic activity that degrades single-stranded DNA in the 3' to 5' direction. This domain folds into a four α-helix bundle that includes a short parallel β-sheet.
