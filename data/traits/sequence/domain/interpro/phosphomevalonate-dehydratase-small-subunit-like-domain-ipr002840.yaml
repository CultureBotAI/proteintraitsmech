identifier: InterPro:IPR002840
label: "Phosphomevalonate dehydratase small subunit-like domain"
definition: >-
  This entry represents a domain centrally found in Phosphomevalonate dehydratase small subunit from Aeropyrum pernix (PMDh-S) and similar prokaryotic proteins previously annotated as aconitase X subunit 2, the swiveling domain subunit. PMDh-S is a component of a hydro-lyase that catalyses the dehydration of mevalonate 5-phosphate (MVA5P) to form trans-anhydromevalonate 5-phosphate (tAHMP). It is involved in the archaeal mevalonate (MVA) pathway, which provides fundamental precursors for isoprenoid biosynthesis, such as isopentenyl diphosphate (IPP) and dimethylallyl diphosphate (DMAPP). This domain is also found at the N-terminal end of Cis-3-hydroxy-L-proline dehydratase from Agrobacterium fabrum (LhpI) and related eukaryotes, which catalyses the dehydration of cis-3-hydroxy-L-proline (c3LHyp) to Delta1-pyrroline-2-carboxylate (Pyr2C).
