identifier: InterPro:IPR043510
label: "5MP1/2, W2 domain"
definition: >-
  The W2 domain has a globular fold and is exclusively composed out of α-helices. The structure can be divided into a structural C-terminal core onto which the two N-terminal helices are attached. The core contains two aromatic/acidic residue-rich regions (AA boxes), which are important for mediating protein-protein interactions. The structure of this C-terminal W2 domain resembles that of a set of concatenated HEAT repeats eIF5-mimic proteins 1 and 2 5MP1 and 5MP2 (also known as basic leucine zipper and W2 domain-containing proteins 1 and 2 (BZW1 and BZW2)) act as competitors of eIF5 and can inhibit general translation by interaction with eIF2 and inhibiting the tertiary complex binding to the ribosome. These translation regulatory proteins exist in nearly all eukaryotes except in nematodes, yeasts, and some protozoans. 5MP1/2 contain MA3- and W2-type ( ) C-terminal HEAT domains that resemble the HEAT domain of eIF5. They enable cadherin binding activity. The orthologue in Drosophila melanogaster, known as protein krasavietz (kra), is involved in several processes, including behavioural response to ethanol, long-term memory, and positive regulation of filopodium assembly. Kra is located in several cellular components, including the axonal growth cone, filopodium, and neuronal cell body. The elf5-mimic protein family functions as translation initiation regulators. They are known to repress non-AUG-initiated translation and repeat-associated non-AUG (RAN)-initiated translation, acting as competitive inhibitors of eukaryotic translation initiation factor 5 (EIF5). These proteins increase the accuracy of translation initiation by competing with EIF5 for interaction with EIF2S2 within the 43S pre-initiation complex, in a manner dependent on binding to EIF3C. Additionally, so…
