identifier: InterPro:IPR062284
label: "Anti-sigma-X factor RsiX, central domain"
definition: >-
  This entry represents the central domain found in the anti-sigma factor RsiX found in Bacillota. RsiX inhibits and stabilises the extracytoplasmic function (ECF) sigma factor SigX. The protein localises to the cell membrane.
