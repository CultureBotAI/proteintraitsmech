identifier: InterPro:IPR047893
label: "ASHR3-like, SET domain"
definition: >-
  This entry represents the SET domain of a group of plant proteins, including Arabidopsis thaliana ASH1-related protein 3 (ASHR3, also termed protein SET DOMAIN GROUP 4 or protein stamen loss), ASH1 homolog 3 (ASHH3, also termed protein SET DOMAIN GROUP 7) and homolog 4 (ASHH4, also termed protein SET DOMAIN GROUP 24). They all function as histone-lysine N-methyltransferases ( ).
