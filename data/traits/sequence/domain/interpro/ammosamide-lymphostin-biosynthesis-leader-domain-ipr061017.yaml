identifier: InterPro:IPR061017
label: "Ammosamide/lymphostin biosynthesis, leader domain"
definition: >-
  Precursors of the ammosamide (Amm6) and lymphostin family of natural products share both a strongly conserved leader peptide region (represented by this entry) that interacts with natural product biosynthesis enzymes, and a critical Trp residue at or near the C terminus that is incorporated into the small molecule natural product eventually produced - a pyrroloquinoline alkaloid whose core is derived from tryptophan. An additional, shorter homologue, Xan, encoded in a less well understood natural production biosynthesis locus, lacks the critical Trp. It is thought to be a trans-acting leader peptide that does not need to be linked covalently to a core peptide, if that is the substrate of the natural product biosynthesis enzymes, in order to enable them to perform their modifications.
