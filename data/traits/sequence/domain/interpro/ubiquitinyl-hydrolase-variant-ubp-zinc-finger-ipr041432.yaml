identifier: InterPro:IPR041432
label: "Ubiquitinyl hydrolase, variant UBP zinc finger"
definition: >-
  This domain is found at the C terminus of the ubiquitin hydrolases and is related to the UBP-type zinc finger domain. However, it has an altered pattern of zinc binding residues.
