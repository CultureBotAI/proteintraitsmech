identifier: InterPro:IPR021962
label: LipI32
definition: >-
  Lipl32 is an outer membrane surface lipoprotein of Leptospira like bacteria. LipL32 is an extracellular matrix binding protein, interacting with collagens, fibronectin, and laminin.
