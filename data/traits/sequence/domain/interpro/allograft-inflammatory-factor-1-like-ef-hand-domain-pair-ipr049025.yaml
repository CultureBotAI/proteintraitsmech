identifier: InterPro:IPR049025
label: "Allograft inflammatory factor 1-like, EF-hand domain pair"
definition: >-
  This entry represents an EF hand pair domain found in Allograft inflammatory factor 1 (AIF-1), EF-hand domain-containing protein D2 (EFHD2, also known as swiprosin-1) and similar proteins. AIF-1 is an actin-binding protein that enhances membrane ruffling and RAC activation. EFHD2 may regulate B-cell receptor -(BCR) induced immature and primary B-cell apoptosis. It plays a role as negative regulator of the canonical NF-kappa-B-activating branch and controls spontaneous apoptosis through the regulation of BCL2L1 abundance.
