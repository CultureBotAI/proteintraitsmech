identifier: InterPro:IPR054588
label: "Csa3, N-terminal"
definition: >-
  This domain is found at the N-terminal in CRISPR-associated protein Csa3 and related proteins. Csa3 proteins consist of two domains that intertwine to form a homodimer. The N-terminal domain (also known as CARF domain) is a unique variation on the nucleotide-binding domain, and it is essential for dimer formation. It is composed of a mixed β-sheet flanked on both sides with α-helices. This domain contains two conserved sequence motifs [(D/N)-X-(S/T)-X3-(R/K) and L-X(2)-G-h-R] that map to a 2-fold symmetric pocket on the dimer axis. It has been shown that this pocket binds cyclic tetra-adenylate (cA4). The C-terminal domain is structurally similar to MarR-like winged helix-turn-helix domains and is involved in DNA recognition.
