identifier: InterPro:IPR041194
label: "Defective in germ line development protein 3-like, KH5 domain"
definition: >-
  This entry corresponds to KH5 of Defective in germ line development protein 3 from Caenorhabditis elegans (GLD-3) and similar proteins from nematodes. GLD-3 is required maternally for germline survival and embryogenesis. It forms a complex with Gls-1 which promotes the oogenic cell fate by freeing the translational repressor Fbf to repress sperm promoting factors. This protein promotes maturation of primary spermatocytes to mature sperm and is required during hermaphrodite development to promote sperm fate, which is critical for determining the normal number of sperm. It is also required during male development for the continued production of sperm and inhibition of oogenesis. Together with Gld-2, promotes the transition from mitosis to meiosis. GLD-3 contains four K-homology (KH) RNA-binding domains, which are divergent KH domains that lacks the RNA-binding GXXG motif. The four K homology (KH) domains KH2 to KH5 form a proteolytically stable structure.
