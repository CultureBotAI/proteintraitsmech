identifier: InterPro:IPR003613
label: U-box domain
definition: >-
  This entry represents the U-box domain. The molecular mechanism underlying the transfer of ubiquitin (Ub) to a substrate consists of three key enzymatic steps. First, ubiquitin itself is adenylated at its C-terminal glycine residue by an activating enzyme (E1). Second, the adenylated Ub forms a covalent linkage to a conjugating enzyme (E2). Finally, a ligating enzyme (E3) recruits both the Ub-charged E2 species and the target protein. There are three classes of E3 enzymes- HECT, RING, and U-box, which are distinguished on the basis of their E2-recruiting domains.
