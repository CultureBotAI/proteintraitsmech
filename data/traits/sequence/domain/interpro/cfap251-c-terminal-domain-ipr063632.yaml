identifier: InterPro:IPR063632
label: "CFAP251, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain found in cilia- and flagella-associated protein 251 (CFAP251, also known as WDR66). This domain is found in metazoans and ciliates. The full-length protein CFAP251 is a component of the radial spoke complex and is involved in ciliary and flagellar motility. In Tetrahymena thermophila, CFAP251 is required for assembly of radial spoke 3. In humans, mutations in CFAP251 cause spermatogenic failure due to defective sperm flagella. The specific function of this C-terminal domain remains to be determined.
