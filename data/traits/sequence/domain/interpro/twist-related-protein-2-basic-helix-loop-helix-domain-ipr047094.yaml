identifier: InterPro:IPR047094
label: Twist-related protein 2, basic helix-loop-helix domain
definition: >-
  This entry represents the basic helix-loop-helix (bHLH) domain found in Twist2 and related proteins from vertebrates. Twist-related protein 2 (Twist2) is a bHLH transcriptional factor that regulates the development of mesenchymal tissues and plays a critical role in embryogenesis. It binds to the E-box consensus sequence 5'-CANNTG-3' as a heterodimer and inhibits transcriptional activation by MYOD1, MYOG, MEF2A and MEF2C. Twist2 is also involved in cancer progression and is a valuable biomarker for certain cancer types. Mutations in this protein are associated with other human disorders such as ectodermal dysplasias.
