identifier: InterPro:IPR054328
label: "SseL-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal catalytic domain from a group of CE proteases from human pathogens including SseL from Salmonella typhimurium, which are dedicated deubiquitinases (DUBs), proteases that reverse the addition of ubiquitin to substrates, and effectively hijacks the host's ubiquitination processes.
