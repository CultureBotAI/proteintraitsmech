identifier: InterPro:IPR056060
label: "Tal, N-terminal tail tube TT1 domain"
definition: >-
  This domain, previously known as DUF7643, is found N-terminal in the tail-associated lysin (Tal, gp59) and related sequences from phages and bacteriophages. gp59 is comprising the tip of the phage tail. The domain represented by this entry is one of the two tail tube domains (TT1 and TT2) that form a quasi-sixfold adapter to the distal tail protein (Dit, gp58) hexamer. These two domains merge into a continuous eight-stranded β-sheet on one side.
