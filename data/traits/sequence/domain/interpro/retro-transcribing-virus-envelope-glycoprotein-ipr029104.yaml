identifier: InterPro:IPR029104
label: "Retro-transcribing virus envelope glycoprotein"
definition: >-
  This entry represents a group of mammalian proteins that have retroviral origin. They are retrovirus K envelope glycoprotein genes that entry into human ancestral genome millions of years ago. These endogenous envelope proteins have lost their original fusogenic properties.
