identifier: InterPro:IPR063153
label: "Actin filament-associated protein 1, N-terminal domain"
definition: >-
  This entry represents a small N-terminal α-helical hairpin domain of approximately 38 residues found in actin filament-associated proteins (AFAP). The domain is located N-terminal to two PH domains ( ). AFAP family members include AFAP1 (AFAP-110), AFAP1L1, and AFAP1L2 (XB130), which function as adaptor proteins linking signalling molecules such as SRC and PKC to the actin cytoskeleton. This entry is found in vertebrates. The function of this domain remains to be determined.
