identifier: InterPro:IPR011439
label: "Domain of unknown function DUF1542"
definition: >-
  This domain is found in several cell surface proteins, such as extracellular matrix-binding protein ebh. Some members are involved in antibiotic resistance (e.g. and ) and/or cellular adhesion (e.g. ). In some proteins it is repeated more than fifteen times, being the most repeated domain in streptococci. This is a predominantly α-helical domain that forms a long, thin, fibre-like structure and it has been proposed to function as a stalk that helps the adhesive non-repeat region (NRR) of proteins protrude beyond the cell surface.
