identifier: InterPro:IPR021084
label: "Het-s prion-forming domain"
definition: >-
  This entry represents the prion domain of Het-s. Het-s plays a role in heterokaryon incompatibility, which prevents different forms of parasitism. The C terminus of Het-s is unstructured in solution but, in vitro, amyloid fibrils from the prion-forming domain form a structure consisting of a left-handed β-solenoid which contains two windings per molecule.
