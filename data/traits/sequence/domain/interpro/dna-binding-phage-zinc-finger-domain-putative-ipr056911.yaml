identifier: InterPro:IPR056911
label: "DNA-binding phage zinc finger domain, putative"
definition: >-
  This entry represents a large family of zinc binding domains that are found in both phage and bacterial proteins. The phage domains tend to be single domain proteins. The bacterial domains are often found in multidomain proteins. Structure predictions suggest this domain may bind to dsDNA. In about quarter of the proteins this domain is found associated with a resolvase domains found in site specific recombinases.
