identifier: InterPro:IPR021031
label: "Hyphally-regulated cell wall protein, N-terminal"
definition: >-
  This entry represents a conserved domain found at the N-terminal in hyphally-regulated cell wall proteins from fungi and related proteins. These proteins are induced in response to hyphal development. Proteins containing this domain include Hpf1 from budding yeasts and Hyr1 from Candida albicans. Hpf1 can reduce haziness in white wine. Hyr1 is a GPI-anchored hyphal cell wall protein required for hyphal growth and virulence. It is involved in innate immune cell evasion through conferring resistance to neutrophil killing.
