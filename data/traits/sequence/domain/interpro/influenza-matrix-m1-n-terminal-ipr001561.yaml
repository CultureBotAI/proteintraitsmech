identifier: InterPro:IPR001561
label: Influenza matrix M1, N-terminal
definition: >-
  Matrix protein (M1) of influenza virus is a bifunctional membrane/RNA-binding protein that mediates the encapsidation of RNA-nucleoprotein cores into the membrane envelope. It is therefore required that M1 binds both membrane and RNA simultaneously. M1 is comprised of two domains connected by a linker sequence. The N-terminal domain has a multi-helical structure that can be divided into two subdomains. The C-terminal domain also contains an α-helical structure.
