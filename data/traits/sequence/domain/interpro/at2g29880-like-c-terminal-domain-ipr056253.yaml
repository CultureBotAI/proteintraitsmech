identifier: InterPro:IPR056253
label: "At2g29880-like, C-terminal domain"
definition: >-
  This domain is found C-terminal in Uncharacterized protein At2g29880 from Arabidopsis thaliana and related plant proteins. Some proteins containing this domain have also a Myb/SANT-like domain at the N terminus. The function of this domain is unknown.
