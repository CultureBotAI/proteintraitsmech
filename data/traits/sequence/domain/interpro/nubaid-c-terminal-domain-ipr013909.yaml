identifier: InterPro:IPR013909
label: NuBaID, C-terminal domain
definition: >-
  This entry represents the C-terminal zinc finger domain of Zinc finger C3HC-type protein 1 (ZC3HC1, also known as Nuclear-interacting partner of ALK (NIPA)) and mRNA export factor Rsm1 which is a homologue from S. pombe. These proteins contain a C3HC-type zinc finger at the N terminus followed by the domain represented in this entry. These N- and C-terminal zinc finger domains are homologous and both are related to BIR domains. Contrary to the nomenclature, one of the cysteines is evolutionarily not conserved and the zinc ion coordination occurs exclusively via four invariant amino acids (C2HC), in a mode similar to the BIR domains. This domain can harbour a large insert (several hundred residues long) after the first two conserved cysteine residues, which is probably intrinsically disordered. However, some homologues, like Pml39 from S. cerevisiae, harbour only a very short linker between the conserved two cysteines and the histidine-cysteine pair. Rsm1 protein, containing this domain, is involved in mRNA export from the nucleus. Recently, Pml39 was found to be required for the retention of unspliced mRNA. ZC3HC1 was formerly described as Nuclear-interacting partner of ALK (NIPA), with a proposed role in cell cycle regulation as a component of an SCF complex specifically targeting cyclin B1. These findings were recently refuted. In contrast, ZC3HC1 was identified as a nuclear envelope-associated protein residing at the NPC-attached nuclear basket (NB) of Xenopus laevis oocytes and cultured human cells. It was shown that ZC3HC1 is a constituent structural component of the NB essential for recruitment, positioning and linkage of a subpopulation of the NB scaffold protein TPR. Furthermore, it was demonstrated that the Pml39 is a functional homologue of ZC…
