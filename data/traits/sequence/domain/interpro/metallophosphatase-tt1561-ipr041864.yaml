identifier: InterPro:IPR041864
label: "Metallophosphatase TT1561"
definition: >-
  This entry includes bacterial proteins related to TT1561 (also known as Aq1956 in Aquifex aeolicus), an uncharacterised Thermus thermophilus protein. The conserved domain present in members of this family belongs to the metallophosphatase (MPP) superfamily.
