identifier: InterPro:IPR047233
label: "Ureidoglycolate amidohydrolase, cupin domain"
definition: >-
  This entry represents the cupin domain of ureidoglycolate amidohydrolase and related proteins predominantly found in fungi and bacteria. Ureidoglycolate lyase ( ) is involved in the degradation of ureidoglycolate, an intermediate of purine degradation. It breaks down (S)-ureidoglycolate to produce glyoxylate and urea. This family of ureidoglycolate lyases were initially annotated as ureidoglycolate hydrolases, but this has since been corrected.
