identifier: InterPro:IPR035553
label: "Cytokinesis protein 3, SH3 domain"
definition: >-
  Cytokinesis protein 3 (Cyk3) is a component of the actomyosin ring independent cytokinesis pathway in yeast. It interacts with Inn1 and facilitates its recruitment to the bud neck, thereby promoting cytokinesis. Cyk3p contains an N-terminal SH3 domain and a C-terminal transglutaminase-like domain.
