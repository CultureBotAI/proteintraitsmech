identifier: InterPro:IPR058812
label: RhsPI
definition: >-
  This entry represents RhsPI which forms a toxin-immunity pair with RhsP. This proteins is a member of the SUKH superfamily, members of which are known to function as immunity proteins in bacterial toxin systems. RhsPI forms a heterodimer with RhsP and neutralises the RhsP WHH active site via electrostatic interactions.
