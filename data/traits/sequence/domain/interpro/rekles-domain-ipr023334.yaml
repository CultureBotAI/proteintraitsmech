identifier: InterPro:IPR023334
label: "REKLES domain"
definition: >-
  This entry represents the REKLES domain, found at the C-terminal of Bright/Dril1/ARID3a proteins. These proteins are B cell-specific, matrix association (or attachment) region-binding transcriptional regulator of immunoglobulin heavy chain genes and of E2F1-dependent cell cycle progression. The REKLES domain is essential for nuclear import and Crm1-dependent nuclear export of Bright. This domain is also involved in Bright multimerisation, which is necessary for DNA binding. The REKLES domain may be further subdivided into an N-terminal alpha and C-terminal beta subdomains.
