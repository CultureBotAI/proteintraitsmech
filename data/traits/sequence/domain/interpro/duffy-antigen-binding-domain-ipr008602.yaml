identifier: InterPro:IPR008602
label: Duffy-antigen binding domain
definition: >-
  This entry contains several Plasmodium Duffy binding proteins. Plasmodium vivax and Plasmodium knowlesi merozoites invade Homo sapiens erythrocytes that express Duffy blood group surface determinants. The Duffy receptor family is localised in micronemes, an organelle found in all organisms of the phylum Apicomplexa.
