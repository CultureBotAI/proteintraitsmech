identifier: InterPro:IPR020960
label: "Aleutian mink disease parvovirus non-structural protein 1-3"
definition: >-
  This entry represents a domain found in Aleutian mink disease parvovirus (ADV) non-structural protein 1-3 (NS1-3). It is approximately 50 amino acids in length. ADV utilizes caspase activity to cleave its major non-structural protein (NS1), enable the localization of this protein to the nucleus and facilitate virus replication. The smaller NS2/3 are also encoded during viral infection and are essential for the replication of the virus.
