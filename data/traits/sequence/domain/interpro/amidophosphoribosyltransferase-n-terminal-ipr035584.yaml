identifier: InterPro:IPR035584
label: "Amidophosphoribosyltransferase, N-terminal"
definition: >-
  This glutaminase domain is found at the N-terminal of glutamine phosphoribosylpyrophosphate (PRPP) amidotransferase (GPATase), also known as amidophosphoribosyltransferase. The glutaminase domain catalyses amide nitrogen transfer from glutamine to the appropriate substrate. In this process, glutamine is hydrolysed to glutamic acid and ammonia. Purine nucleotides are synthesised both via the de novo pathway and via the salvage pathway and are vital for cell functions and cell proliferation through DNA and RNA syntheses and ATP energy supply. Amidophosphoribosyltransferase is the rate-limiting enzyme in the de novo pathway of purine ribonucleotide synthesis and is regulated by feedback inhibition by AMP and GMP. 5-phospho-beta-D-ribosylamine + diphosphate + L-glutamate = L-glutamine + 5-phospho-alpha-D-ribose 1-diphosphate + H2O This enzyme crystallises as a homotetramer, but can also exist as a homodimer.
