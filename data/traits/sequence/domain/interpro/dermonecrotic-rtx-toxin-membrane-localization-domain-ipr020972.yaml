identifier: InterPro:IPR020972
label: "Dermonecrotic/RTX toxin, membrane localization domain"
definition: >-
  This is a membrane localisation domain found in multiple families of bacterial toxins including some clostridial glucosyltransferase toxins and various MARTX toxins (multifunctional-autoprocessing RTX toxins). In the Pasteurella multocida toxin (PMT, also known as dermonecrotic toxin) C-terminal fragment, structural analysis have indicated that the C1 domain possesses a signal that leads the toxin to the cell membrane. Furthermore, the C1 domain was found to structurally resemble the phospholipid-binding domain of C. difficile toxin B. Functional studies in Vibrio cholerae indicate that the subdomain at the N terminus of RID (Rho-inactivation domain), homologous to the membrane targeting C1 domain of Pasteurella multocida toxin, is a conserved membrane localisation domain essential for proper localisation. The Rho-inactivation domain (RID) of MARTX (Multifunctional Autoprocessing RTX toxin) is responsible for inactivating the Rho-family of small GTPases in Vibrio cholerae. It is a bacterial toxin that self-process by a cysteine peptidase mechanism.
