identifier: InterPro:IPR044106
label: Snx41 /Atg20, PX domain
definition: >-
  The Phox Homology (PX) domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions. Sorting nexins (SNXs) make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds phosphoinositides (PIs) and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway. This entry represents the PX domain found in a group of fungal sorting nexins, including Snx41 and Snx42 (also called Atg20). SNX41 and SNX42 form dimers with SNX4, and are required in protein recycling from the sorting endosome (post-Golgi endosome) back to the late Golgi in yeast.
