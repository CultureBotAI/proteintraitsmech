identifier: InterPro:IPR060760
label: RNA-editing complex protein MP81-like, N-terminal domain
definition: >-
  This entry represents the C2H2 zinc finger domain found at the N-terminal of a group of proteins from Trypanosomatida, including structural subunit MP81 (also known as KREPA1, ) from the RNA editing complex. The editing process is performed by the editosome, a multi-protein complex that catalyses the insertion and deletion of uridylates (U) that occurs during RNA editing. Uridylate insertion/deletion editing, which appears to be unique to these organisms, processes most mitochondrial pre-mRNAs to produce mature mRNAs. Editosomes consist of several components and in Trypanosoma these include: REL1/MP52 and REL2/Mp48 RNA ligases; MP18, MP42, MP63 and MP81 that contain zinc fingers and an OB fold at the C-terminal.
