identifier: InterPro:IPR060337
label: "UbiB, C-terminal domain"
definition: >-
  This entry represents the C-terminal of probable protein kinase UbiB. It shows an α-helical fold. This entry is specific to pseudomonadales. UbiB (also known as as AarF) is required for ubiquinone biosynthesis. It may function in regulating Q8 biosynthesis via its putative kinase activity.
