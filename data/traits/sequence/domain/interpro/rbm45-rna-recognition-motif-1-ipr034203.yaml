identifier: InterPro:IPR034203
label: "RBM45, RNA recognition motif 1"
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of RBM45, also termed developmentally-regulated RNA-binding protein 1 (DRB1), a member of RNA recognition motif (RRM)-type neural RNA-binding proteins, which is expressed under spatiotemporal control. It is encoded by gene drb1 that is expressed in neurons, not in glial cells. RBM45 predominantly localizes in the cytoplasm of cultured cells and specifically binds to poly(C) RNA. It could play an important role during neurogenesis. RBM45 carries four RRMs.
