identifier: InterPro:IPR057825
label: "SEC23-DDH2, WWE domain"
definition: >-
  This entry represents a WWE domain found in the PA-PLA1 proteins including SEC23-interacting protein (Sec23ip) and Triacylglycerol hydrolase DDHD2 (DDHD2). Sec23ip plays a role in the organisation of endoplasmic reticulum exit sites. Specifically binds to phosphatidylinositol 3-phosphate (PI3P), phosphatidylinositol 4-phosphate (PI4P) and phosphatidylinositol 5-phosphate (PI5P). However, current evidence indicates that it does not exhibit actual phospholipase activity. DDHD2 functions as a diacylglycerol (DAG) and triacylglycerol (TAG) lipase, playing a critical role in maintaining lipid homeostasis in the central nervous system. It acts in concert with PNPLA2/ATGL in neuronal TAG catabolism by hydrolysing sn-1,3 DAG downstream of PNPLA2/ATGL. In vitro studies show that DDH2 also exhibits phospholipase activity, preferentially hydrolysing phosphatidic acids such as 1,2-dioleoyl-sn-phosphatidic acid, as well as phosphatidylcholine and phosphatidylethanolamine. Additionally, it specifically binds to phosphoinositides, including phosphatidylinositol 3-phosphate (PI3P), PI4P, PI5P, and possibly PI(4,5)P2. This lipid-binding activity suggests a role in the maintenance of endoplasmic reticulum and Golgi structures, potentially influencing vesicular transport between the Golgi apparatus and the plasma membrane. PA-PLA1 proteins are involved in various cellular processes related to membrane lipid metabolism and organelle structure maintenance. These proteins exhibit phospholipase activity, preferentially hydrolysing phosphatidic acid and phosphatidylethanolamine. They also have specific lipid-binding capabilities, interacting with phosphatidylinositol phosphates such as PI(3)P, PI(4)P, and PI(5)P. This binding is crucial for their role in organising endoplasmic reticulum exit…
