identifier: InterPro:IPR059842
label: "Y4lF, C-terminal domain"
definition: >-
  This entry represents the a domain found in the Y4lF protein from Sinorhizobium fredii. The protein is 323 amino acids in length and contains a TIR domain at the N-terminal. Y4lF is encoded on the symbiotic plasmid pNGR234a and is found in the rhizobial strain NGR234, which forms nitrogen-fixing symbioses with legumes. The specific function of this protein remains to be determined. In some members, this entry is found as a standalone domain.
