identifier: InterPro:IPR059465
label: "Domain of unknown function DUF8421"
definition: >-
  This domain is found in uncharacterised fungal proteins. It contains several highly conserved cysteine and histidine residues that may coordinate a metal ion. These residues come close in space and are predicted to form substructures each of which is reminiscent of treble-clef zinc fingers.
