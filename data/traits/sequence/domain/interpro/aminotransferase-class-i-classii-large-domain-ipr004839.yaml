identifier: InterPro:IPR004839
label: Aminotransferase, class I/classII, large domain
definition: >-
  Aminotransferases share certain mechanistic features with other pyridoxal-phosphate dependent enzymes, such as the covalent binding of the pyridoxal-phosphate group to a lysine residue. On the basis of sequence similarity, these various enzymes can be grouped into class I and class II. This entry includes proteins from both subfamilies, including class I LL-diaminopimelate aminotransferase, chloroplastic from Arabidopsis thaliana (Dap) and class II Histidinol-phosphate aminotransferase from Listeria welshimeri (HisC). Dap consists of two domains, a large domain and a small domain. This entry represents the large domain, which has a 3-layer α/β/α sandwich topology.
