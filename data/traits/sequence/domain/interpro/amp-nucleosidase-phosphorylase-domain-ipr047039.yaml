identifier: InterPro:IPR047039
label: AMP nucleosidase, phosphorylase domain
definition: >-
  AMP nucleosidase (AMN) catalyses the hydrolysis of AMP to form adenine and ribose 5-phosphate. It is only found in prokaryotes, where it plays a role in purine nucleoside salvage and intracellular AMP level regulation. The gene for AMP nucleosidase from Escherichia coli (amn) encodes a protein of 483 amino acids. A comparison of the amino acid sequence for AMP nucleosidase with that for yeast AMP deaminase shows that there is a region where only six out of eight amino acids are identical but there is no other overall homology. AMN also showed little similarity to consensus sequences for adenylate binding sites even though the enzyme is known to have a catalytic site for AMP and regulatory sites for MgATP and phosphate. This entry represents the phosphorylase domain from AMP nucleosidase.
