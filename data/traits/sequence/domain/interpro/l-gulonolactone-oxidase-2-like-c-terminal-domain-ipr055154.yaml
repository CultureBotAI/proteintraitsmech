identifier: InterPro:IPR055154
label: "L-gulonolactone oxidase 2-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of L-gulonolactone oxidase from Arabidopsis thaliana (GULLO2) and similar plant proteins. This enzyme catalyses the oxidation of L-gulono-1,4-lactone to ascorbic acid. This short domain is predicted to contain a β-hairpin and have structural similarity with omega toxins.
