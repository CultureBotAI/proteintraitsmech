identifier: InterPro:IPR055518
label: "Domain of unknown function DUF7092"
definition: >-
  This domain represents a small β-barrel domain that is found at the N terminus of some bacterial peptidase M48 proteins. It has a PH-domain like structure. It likely acts as a chaperone for membrane protein complexes and may interact with members based on AlphaFold predictions.
