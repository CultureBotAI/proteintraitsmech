identifier: InterPro:IPR063359
label: "CST complex subunit CTC1, plants, domain 2"
definition: >-
  This entry represents the second domain of plant CTC1. CTC1 is one of the three components of the CST complex that assists Shelterin to protect the ends of telomeres from attack by DNA-repair mechanisms. This family largely represents sequences from plants species.
