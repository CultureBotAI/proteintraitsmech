identifier: InterPro:IPR045578
label: "Ubiquitin carboxyl-terminal hydrolase 47, C-terminal"
definition: >-
  This entry represents the C-terminal domain of ubiquitin carboxyl-terminal hydrolase 47 (USP47), a ubiquitin-specific protease that de-ubiquitinates monoubiquitinated DNA polymerase beta (Polbeta), and therefore plays a role in DNA base excision repair (BER). USP47 also regulates cell growth and genome integrity. In general, the C-terminal domain of Ubiquitin Specific Proteases (USPs) mediates protein-protein interactions.
