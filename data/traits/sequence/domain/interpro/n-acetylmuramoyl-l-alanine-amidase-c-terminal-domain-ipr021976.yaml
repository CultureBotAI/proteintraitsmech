identifier: InterPro:IPR021976
label: "N-acetylmuramoyl-l-alanine amidase, C-terminal domain"
definition: >-
  This domain is found in bacteria and viruses. This domain is about 50 amino acids in length. This domain is classified with the enzyme classification code . This domain is the C-terminal of the enzyme which hydrolyses the link between N-acetylmuramoyl residues and L-amino acid residues in certain cell-wall glycopeptides.
