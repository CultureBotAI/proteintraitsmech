identifier: InterPro:IPR044049
label: "EccD-like transmembrane domain"
definition: >-
  This domain is found in EccD members from the Type VII secretion system such as EccD2, EccD4 and EccD5, which includes 11 predicted transmembrane α-helices. ESX-1 to ESX-5 gene clusters encode proteins that are either secreted or building blocks of the actinobacterial Type 7 secretion system (T7SS). In Mycobacterium tuberculosis ESX-1 is responsible for secretion of important virulence factors such as EsxA and EsxB as well as other virulence-associated proteins, ESX-3 is involved in metal acquisition being critical for mycobacterial survival. ESX-5 is also important for the secretion of members of the PE/PPE family of proteins that play a role in virulence and cell wall integrity. The function of ESX-2 and ESX-4 is still unknown although ESX-4 seems to be the ancestral system from which ESX systems have evolved. All ESX gene clusters contain three or four ESX conserved components (Ecc), named EccB, EccC, and EccD, with EccE being present in all ESX systems, except of ESX-4. EccC is a member of the FtsK/SpoIIIE-like ATPase family and provides the energy to transport proteins across the mycobacterial membrane; EccB and EccE have N-terminal transmembrane elements and large C-terminal regions predicted to be localised in the periplasm, but their function, molecular function or interacting partners remain unknown. EccD contains an N-terminal cytoplasmic domain followed by 11 predicted transmembrane helices, which is thought to form a cytoplasmic membrane channel through which the proteins are secreted.
