identifier: InterPro:IPR035085
label: "Urocanase, Rossmann-like domain"
definition: >-
  This entry represents the central domain, with a rossmann-like fold, found in Urocanase. It is found also in S-methyl thiourocanate hydratase which cannot use urocanate or thiourocanate as substrate and catalyses the conversion of S-methyl thiourocanate, to S-methyl-thiohydantoin-5-propanoate. Urocanase (also known as imidazolonepropionate hydrolase or urocanate hydratase) is the enzyme that catalyses the second step in the degradation of histidine, the hydration of urocanate into imidazolonepropionate: urocanate + H 2 O = 4,5-dihydro-4-oxo-5-imidazolepropanoate Urocanase is found in some bacteria (gene hutU), in the liver of many vertebrates, and has also been found in the plant Trifolium repens (white clover). Urocanase is a protein of about 60 Kd, it binds tightly to NAD + and uses it as an electrophil cofactor. A conserved cysteine has been found to be important for the catalytic mechanism and could be involved in the binding of the NAD + .
