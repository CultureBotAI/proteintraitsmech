identifier: InterPro:IPR048907
label: "MCM, C-terminal domain"
definition: >-
  This entry represents the conserved truncated winged helix domain of minichromosome maintenance complex (MCM, a replicative DNA helicase) proteins from archaea, which lacks the two typical 'wings' of canonical WH domains.
