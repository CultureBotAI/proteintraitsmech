identifier: InterPro:IPR047294
label: "DENN domain-containing protein 5A, first RUN domain"
definition: >-
  This entry represents the first RUN domain of DENND5A and similar proteins from vertebrates. This domain is required for Rab6-dependent recruitment of DENND5A on Golgi membranes. DENND5A, also called Rab6-interacting protein 1 (Rab6IP1), is present predominantly in developing neuronal tissue, and functions in membrane trafficking at a crossroads between the Golgi and the endosomal system. It is a guanine nucleotide exchange factor (GEFs) that binds Rab6 and Rab11A in their GTP-bound conformation. It is composed of an N-terminal DENN domain ( ) followed by two RUN domains flanking a PLAT domain ( ).
