identifier: InterPro:IPR015216
label: "SANT associated"
definition: >-
  The SANTA domain (SANT associated) is approximately 90 amino acids in length and is conserved in eukaryotes. It is sometimes found in association with the SANT domain ( , also known as the Myb-like DNA-binding domain) implying a putative function in regulating chromatin remodelling. Sequence analysis has showed that the SANTA domain is likely to form four central β-sheets with three flanking α-helices. Many conserved hydrophobic residues are present which implies a possible role in protein-protein interactions.
