identifier: InterPro:IPR032311
label: "Domain of unknown function DUF4982"
definition: >-
  This domain is found towards the C terminus of Beta-glucuronidase from Formosa agariphila (P17_GH2) and similar proteins mainly from bacteria and fungi. P17_GH2 is involved in the degradation of ulvan, the main polysaccharide component of the Ulvales (green seaweed) cell wall. The function of this domain is unknown.
