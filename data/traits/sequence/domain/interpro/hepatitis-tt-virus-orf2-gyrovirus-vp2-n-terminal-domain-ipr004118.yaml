identifier: InterPro:IPR004118
label: "Hepatitis TT virus, Orf2/Gyrovirus Vp2, N-terminal domain"
definition: >-
  This entry represents a domain found in ORF2 from Torque teno virus (TTV) and related viruses. This domain contains a set of conserved cysteine and histidine residues suggesting a zinc binding domain and has been implicated in kinases regulation. TTV, isolated initially from a Japanese patient with hepatitis of unknown aetiology, has since been found to infect both healthy and diseased individuals, and numerous prevalence studies have raised questions about its role in unexplained hepatitis. This domain is also present in the VP2 protein from the chicken anaemia virus which is a gyrovirus. Gyroviruses are small circular single stranded viruses. it is also found in the Protein US1 from Human cytomegalovirus. Torque teno virus (TTV) is a nonenveloped and single-stranded DNA virus that was initially isolated from a Japanese patient with hepatitis of unknown aetiology, and which has since been found to infect both healthy and diseased individuals. Numerous prevalence studies have raised questions about its role in unexplained hepatitis. ORF2 is a 150 residue protein of unknown function.
