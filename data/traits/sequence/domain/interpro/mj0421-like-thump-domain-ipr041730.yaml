identifier: InterPro:IPR041730
label: "MJ0421-like THUMP domain"
definition: >-
  Proteins containing this domain, including MJ0421 from Methanocaldococcus jannaschii, are a group of uncharacterised archaeal proteins that contain an N-terminal THUMP domain and a C-terminal SPOUT RNA methyltransferase domain ( ). The THUMP domain is named after thiouridine synthases, methylases and PSUSs. The domain consists of about 110 amino acid residues. It is predicted to be an RNA-binding domain and probably functions by delivering a variety of RNA modification enzymes to their targets.
