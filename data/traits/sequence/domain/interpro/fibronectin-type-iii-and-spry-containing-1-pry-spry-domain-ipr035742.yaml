identifier: InterPro:IPR035742
label: "Fibronectin type III and SPRY containing 1, PRY/SPRY domain"
definition: >-
  This domain is part of the fibronectin type III and SPRY domain-containing 1 (FSD1) and FSD1-like (FSD1L) proteins. These are centrosome-associated proteins that are characterised by an N-terminal coiled-coil region downstream of B-box (BBC) domain, a central fibronectin type III (FN3) domain, and a C-terminal PRY/SPRY domain. The FSD1 protein associates with a subset of microtubules and may be involved in the stability and organization of microtubules during cytokinesis.
