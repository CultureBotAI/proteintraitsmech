identifier: InterPro:IPR063451
label: "Photosynthetic NDH subunit of subcomplex B 5, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in PNSB5 found in land plants. PNSB5 is a component of the chloroplast NAD(P)H dehydrogenase (NDH) complex, specifically part of subcomplex B along with PnsB1, PnsB2, PnsB3 and PnsB4. The NDH complex shuttles electrons from NAD(P)H to plastoquinone via FMN and iron-sulphur centres in the photosynthetic electron transport chain. The protein is localised to the chloroplast membrane and contains two predicted transmembrane helices. PNSB5 is encoded in the nucleus and imported into the chloroplast via an N-terminal transit peptide.
