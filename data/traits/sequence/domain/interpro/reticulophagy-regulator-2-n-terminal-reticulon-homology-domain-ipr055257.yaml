identifier: InterPro:IPR055257
label: "Reticulophagy regulator 2, N-terminal reticulon-homology domain"
definition: >-
  This entry represents the N-terminal reticulon-homology domain (RHD) of RETREG2/FAM134A, which shows sequence similarity to ADP-ribosylation factor-like 6 binding factor 1 (Arl6IP1 or Arl6ip-1), an endoplasmic reticulum protein that has an important role in cell conduction and material transport. The RHD may function in inducing membrane curvature. Members of this group are specific to vertebrates. Reticulophagy regulator 2 (RETREG2), also called FAM134A (family with sequence similarity 134, member A), interacts with ATG8 family modifier proteins MAP1LC3A, MAP1LC3B, GABARAP, and GABARAPL1
