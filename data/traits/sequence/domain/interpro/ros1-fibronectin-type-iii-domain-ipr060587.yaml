identifier: InterPro:IPR060587
label: "ROS1, fibronectin type III domain"
definition: >-
  This fibronectin type III domain (Fn3) is found in human Proto-oncogene tyrosine-protein kinase ROS (ROS1) and similar animal proteins, including its orthologue Protein roller-3 from Caenorhabditis elegans. ROS1 plays a role in epithelial cell differentiation and regionalisation of the proximal epididymal epithelium.
