identifier: InterPro:IPR062395
label: "XanC domain"
definition: >-
  This entry represents a domain of XanC, a bZIP transcription factor that specifically up-regulates the gene cluster mediating xanthocillin biosynthesis in fungi. XanC is expressed during copper starvation and is regulated by AceA and MacA transcription factors. The protein is localised to the nucleus and contains an N-terminal bZIP domain for DNA binding. Disruption of xanC virtually eliminates production of pathway metabolites including fumiformamide, melanocin E and F, and xanthocillin derivatives. The specific function of this domain remains to be determined.
