identifier: InterPro:IPR063182
label: "Transcription factor, C-terminal domain, fungi"
definition: >-
  This entry represents a C-terminal domain of approximately 160 residues found in fungal transcription factors. The domain is positioned C-terminal to the fungal-specific transcription factor domain. It is found exclusively in Ascomycota fungi including species of Aspergillus, Penicillium, Fusarium and related genera. Some family members additionally contain N-terminal C2H2-type zinc finger domains. The function of this C-terminal domain remains to be determined.
