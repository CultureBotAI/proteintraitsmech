identifier: InterPro:IPR033433
label: "Glutaminase A, N-terminal domain"
definition: >-
  This domain is found towards the N terminus of Glutaminase A (GtaA), an enzyme from Aspergillus that catalyses the hydrolysis of glutamine to glutamic acid and plays a key role in nitrogen metabolism. It was previously known as DUF5127. Members of this group of proteins are mainly found in fungi and bacteria.
