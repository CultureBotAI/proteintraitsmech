identifier: InterPro:IPR013612
label: "Amino acid permease, N-terminal"
definition: >-
  Amino acid permeases are integral membrane proteins involved in the transport of amino acids into the cell. A number of such proteins have been found to be evolutionary related. These proteins appear to contain up to 12 transmembrane segments. The best conserved region in this family is located in the second transmembrane segment. This domain is found to the N terminus of the amino acid permease domain in metazoan Na-K-Cl cotransporters.
