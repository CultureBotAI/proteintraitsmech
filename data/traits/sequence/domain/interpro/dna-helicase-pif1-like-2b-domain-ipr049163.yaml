identifier: InterPro:IPR049163
label: "DNA helicase Pif1-like, 2B domain"
definition: >-
  Pif1 is a DNA helicase conserved from bacteria to humans. It suppresses both G-quadruplex-associated DNA damage and telomere lengthening. In budding yeast, it exists in two forms, nuclear and mitochondrial. Its nuclear form inhibits telomerase, while its mitochondrial is involved in repair and recombination of mitochondrial DNA. These proteins belong to the helicase superfamily 1 (SF1) and contain RecA-like domains (1A and 2A) which, together with two additional domains, 1B and 2B, form the helicase core. This entry represents domain 2B, which adopts a SH3-like fold.
