identifier: InterPro:IPR049566
label: "WDR59/RTC1-like, RING zinc finger domain"
definition: >-
  This entry represents a RIGN zinc finger domain commonly found in the C-terminal region of various animal and fungal proteins, including WDR59, a component of the GATOR complex in vertebrates and the fungal protein RTC1, which is a component of the SEA complex.
