identifier: InterPro:IPR046448
label: "ECSIT, N-terminal"
definition: >-
  This is the N-terminal helical domain which adopts a TPR-like structure. Activation of NF-kappaB as a consequence of signalling through the Toll and IL-1 receptors is a major element of innate immune responses. ECSIT (Evolutionarily conserved signaling intermediate in Toll pathway) plays an important role in signalling to NF-kappaB, functioning as an adapter protein of the Toll-like and IL-1 receptor signalling pathway and an intermediary in the signalling pathways between TRAF-6 and MEKK-1. It is part of the MCIA (mitochondrial complex I intermediate assembly) complex, involved in the assembly of mitochondrial complex I.
