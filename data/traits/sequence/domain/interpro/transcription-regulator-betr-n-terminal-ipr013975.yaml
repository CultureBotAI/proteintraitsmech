identifier: InterPro:IPR013975
label: "Transcription regulator BetR, N-terminal"
definition: >-
  CheY-like phosphoacceptor (or receiver [REC]) domain is a common module in a variety of response regulators of the bacterial signal transduction systems. BetR is one of the many response regulators and is encoded mainly in Burkholderia spp. It is a N-terminal helix-turn-helix domain (HTH) and has been shown to be related to the XRE-type HTH domain, it has been suggested that BetR would have dimerization, protein-protein interaction, and activation/relief-of-inhibition properties.
