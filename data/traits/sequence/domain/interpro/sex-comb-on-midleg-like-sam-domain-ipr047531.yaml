identifier: InterPro:IPR047531
label: "Sex comb on midleg-like, SAM domain"
definition: >-
  This entry represents the SAM (sterile alpha motif) domain of Polycomb-group proteins from the Scm (Sex comb on midleg) subfamily, including Scm from Drosophila melanogaster and human SCML1/2/4. It is a protein-protein interaction domain. Members of this group are found mainly in vertebrates and arthropods. The Scm (Sex comb on midleg) subfamily of Polycomb group includes transcriptional repressors associated with PRC1 complex. Originally the Scm protein was described in Drosophila as a regulator required for proper spatial expression of homeotic genes. It plays a major role during early embryogenesis. SAM domains of Scm proteins can interact with each other, forming homooligomers, as well as with SAM domains of other proteins, in particular with SAM domains of Ph (polyhomeotic) proteins, forming heterooligomers. Homooligomers are similar to the ones formed by SAM Pointed domains of the TEL proteins. Such SAM/SAM oligomers apparently play a role in transcriptional repression through polymerization along the chromosome. Mammalian Scmh1 protein is known be indispensable member of PRC1 complex; it plays a regulatory role for the complex during meiotic prophase of male sperm cells, and is particularly involved in regulation of chromatin modification at the XY chromatin domain of the pachytene spermatocytes.
