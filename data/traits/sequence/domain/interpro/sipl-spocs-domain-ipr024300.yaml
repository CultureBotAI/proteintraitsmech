identifier: InterPro:IPR024300
label: "SipL, SPOCS domain"
definition: >-
  This entry represents the SPOCS domain found in three copies in SipL from Clostridium difficile, N-terminal to the LysM domain. SipL (for SpoIVA-interacting protein) is involved in coat localization and, together with SpoIVA, is a critical spore morphogenetic protein.
