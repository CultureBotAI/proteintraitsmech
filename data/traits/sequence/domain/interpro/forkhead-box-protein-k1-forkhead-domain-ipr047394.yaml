identifier: InterPro:IPR047394
label: "Forkhead box protein K1, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXK1 and similar sequences predominantly found in vertebrates. The FH domain is a winged helix DNA-binding domain. Forkhead box protein K1 (FOXK1) is a transcriptional regulator involved in different processes such as glucose metabolism, aerobic glycolysis, muscle cell differentiation and autophagy. It recognizes the core sequence 5'-(A/C)AA(C/T)A-3' that can both act as a transcription activator or repressor, depending on the context. It acts as a transcriptional regulator that binds to the upstream enhancer region (CCAC box) of myoglobin genes and thus regulates the myogenic progenitor cell population. It positively regulates Wnt/beta-catenin signalling by translocating dishevelled (DVL) proteins into the nucleus. It also reduces virus replication, probably by binding the interferon stimulated response element (ISRE) to promote antiviral gene expression. In addition, FOXK1 plays important roles in multiple human cancers.
