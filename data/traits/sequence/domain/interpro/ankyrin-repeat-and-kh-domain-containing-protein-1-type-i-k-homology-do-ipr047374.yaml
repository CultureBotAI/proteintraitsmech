identifier: InterPro:IPR047374
label: "Ankyrin repeat and KH domain-containing protein 1, type I K homology domain"
definition: >-
  This entry represents the type I KH domain of ANKHD1 and similar animal proteins. ANKHD1, also called HIV-1 Vpr-binding ankyrin repeat protein, or multiple ankyrin repeats single KH domain, or Hmask, is highly expressed in various cancer tissues and is involved in cancer progression, including proliferation and invasion. It acts as a scaffolding protein that may be associated with the abnormal phenotype of leukaemia cells. It may play a role in multiple myeloma cell proliferation and cell cycle progression by regulating expression of p21. ANKHD1 is a component of Hippo signalling pathway. It functions as a positive regulator of YAP1 and promotes cell growth and cell cycle progression through Cyclin A upregulation in prostate cancer cells.
