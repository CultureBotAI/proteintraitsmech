identifier: InterPro:IPR063102
label: "YvlB-like protein, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain of approximately 75 residues found in YvlB-like proteins. These proteins contain an N-terminal SHOCT-like domain followed by this C-terminal domain. This domain is found in Bacillota (including Clostridia and Bacilli), Actinomycetota, and plants. In Bacillus subtilis, YvlB is a membrane protein. The specific function of this domain remains to be determined.
