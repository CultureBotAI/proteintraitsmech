identifier: InterPro:IPR032108
label: "CLIP1, zinc knuckle"
definition: >-
  This zinc knuckle domain is found tandemly repeated at the C terminus of the cytoplasmic linker protein CLIP1 (CLIP170). It forms a complex with the CAP-Gly domain of dynactin.
