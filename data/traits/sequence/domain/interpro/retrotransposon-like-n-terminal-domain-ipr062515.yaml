identifier: InterPro:IPR062515
label: "Retrotransposon-like , N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of retrotransposon-like proteins from worms. These proteins are classified as hydrolases with predicted aspartic protease activity ( ). Retrotransposon-like proteins share sequence similarity with retroviral proteins but are found as chromosomal genes rather than mobile genetic elements. The specific function of this N-terminal domain remains to be determined.
