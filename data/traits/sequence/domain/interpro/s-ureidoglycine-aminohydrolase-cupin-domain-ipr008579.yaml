identifier: InterPro:IPR008579
label: "(S)-ureidoglycine aminohydrolase, cupin domain"
definition: >-
  This is the conserved barrel domain of the 'cupin' superfamily found in (S)-ureidoglycine aminohydrolase (UGlyAH or UGHY) from E.coli, with a conserved jelly roll-like β-barrel fold capable of homodimerization. This enzyme is involved in the anaerobic nitrogen utilization via the assimilation of allantoin and catalyses the second stereospecific hydrolysis reaction (deamination) of the allantoin degradation pathway, producing S-ureidoglycolate and ammonia from S-ureidoglycine. This domain is also present in EutQ family from the eut operon, involved in ethanolamine degradation. EutQ is essential during anoxic growth and has acetate kinase activity. The cupin domain from EutQ does not possess the His residues responsible for metal coordination in other classes of cupins.
