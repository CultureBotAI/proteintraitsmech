identifier: InterPro:IPR057674
label: "RBM22, CCCH zinc finger domain"
definition: >-
  This CCCH-type zinc finger domain is found in human Pre-mRNA-splicing factor RBM22 and similar animal proteins. RBM22 is required for pre-mRNA splicing as component of the activated spliceosome. It is involved in the first step of pre-mRNA splicing. RBM22 binds directly to the internal stem-loop (ISL) domain of the U6 snRNA and to the pre-mRNA intron near the 5' splice site during the activation and catalytic phases of the spliceosome cycle.
