identifier: InterPro:IPR013317
label: "Chromosomal replication initiator protein DnaA, ATPAse domain"
definition: >-
  This entry represents the central domain of bacterial DnaA proteins which play an important role in initiating and regulating chromosomal replication. DnaA is an ATP- and DNA-binding protein. It binds specifically to 9 bp nucleotide repeats known as dnaA boxes which are found in the chromosome origin of replication (oriC). DnaA is a protein of about 50kDa that contains two conserved regions: the first is located in the N-terminal half and corresponds to the ATP-binding domain, the second is located in the C-terminal half and could be involved in DNA-binding. The protein may also bind the RNA polymerase beta subunit, the dnaB and dnaZ proteins, and the groE gene products (chaperonins). This entry also includes DnaA regulatory inactivator Hda (Homologous to DnaA), a protein that helps facilitate the conversion of DnaA-ATP to DnaA-ADP, thus inhibiting the inititation of DNA replication.
