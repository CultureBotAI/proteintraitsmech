identifier: InterPro:IPR044454
label: "ADAD2, double-stranded RNA binding domain"
definition: >-
  Adenosine deaminase domain containing 2 (ADAD2) is phylogenetically related to a family of adenosine deaminases involved in RNA editing. It is a double-stranded RNA binding protein with unclear biological function. ADAD2 contains a double-stranded RNA binding motif (DSRM) and a C-terminal adenosine-deaminase (editase) domain. This entry represents the DSRM of ADAD2.
