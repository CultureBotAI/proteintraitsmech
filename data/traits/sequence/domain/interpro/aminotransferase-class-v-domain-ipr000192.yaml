identifier: InterPro:IPR000192
label: "Aminotransferase class V domain"
definition: >-
  Aminotransferases share certain mechanistic features with other pyridoxal-phosphate dependent enzymes, such as the covalent binding of the pyridoxal-phosphate group to a lysine residue. On the basis of sequence similarity, these various enzymes can be grouped into subfamilies. This entry represents an aminotransferase class-V domain, which is found in amino transferases and other related, though functionally distinct enzymes, including cysteine desulfurase and metallopterin-dependent ergothioneine synthase.
