identifier: InterPro:IPR062093
label: "DjlB/C, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of DjlB and DjlC, J domain-containing proteins from Escherichia coli. DjlC is a regulatory HscC co-chaperone. These proteins contain an N-terminal J domain characteristic of DnaJ co-chaperones, a second domain ( ) and this C-terminal one, the last two may consist of tetratricopeptide repeats (TPRs), suggesting it may be involved in protein-protein interactions. The specific function of this domain remains unknown.
