identifier: InterPro:IPR056410
label: "Cyanophage outer membrane protein-like, beta-barrel domain"
definition: >-
  This entry includes a family of small uncharacterised membrane bound β-barrel-like proteins found in cyanophage. The putative membrane β-barrel is incomplete, composed of only 6 β-strands. However, the proteins form a confident homodimer composed of a flattened 12 stranded β-barrel. The proteins likely contain an N-terminal signal peptide that is cleaved during membrane insertion.
