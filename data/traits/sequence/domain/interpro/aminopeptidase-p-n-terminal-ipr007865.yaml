identifier: InterPro:IPR007865
label: Aminopeptidase P, N-terminal
definition: >-
  This entry represents the N-terminal domain of aminopeptidase P (X-Pro aminopeptidase I,II and III ) and related sequences belonging to the peptidase M24B family. The domain is structurally very similar to the creatinase N-terminal domain.
