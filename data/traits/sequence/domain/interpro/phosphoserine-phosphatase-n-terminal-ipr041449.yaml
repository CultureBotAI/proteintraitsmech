identifier: InterPro:IPR041449
label: "Phosphoserine phosphatase, N-terminal"
definition: >-
  This entry represents the N-terminal domain of phosphoserine phosphatases, which catalyzes the dephosphorylation of phosphoserine (P-Ser). It also catalyzes the hydrolysis of phosphothreonine (P-Thr).
