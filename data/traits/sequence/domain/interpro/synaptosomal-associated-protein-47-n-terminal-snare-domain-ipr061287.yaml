identifier: InterPro:IPR061287
label: "Synaptosomal-associated protein 47, N-terminal SNARE domain"
definition: >-
  This entry represents the N-terminal SNARE domain of SNAP47 (Synaptosomal-associated protein 47), a member of the Qb/Qc subfamily of SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptor) proteins. SNAP47 is a SNARE protein that may play a role in intracellular membrane fusion and is involved in synaptic vesicle priming and exocytosis. The protein associates with the BLOC-1 complex and forms complexes with VAMP2 and STX1A. Qb/Qc SNAREs consist of 2 coiled-coil helices (called SNARE motifs, one belonging to the Qb subgroup and one belonging to the Qc subgroup), which mediate the interactions with other SNARE proteins, and a transmembrane domain. In general, the SNARE complex mediates membrane fusion, important for trafficking of newly synthesised proteins, recycling of pre-existing proteins and organelle formation. SNARE proteins are classified into four groups, Qa-, Qb-, Qc- and R-SNAREs, depending on whether the residue in the hydrophilic centre layer of the four-helical bundle is a glutamine (Q) or arginine (R). Qa-, as well as Qb- and Qc-SNAREs, are localised to target organelle membranes, while R-SNARE is localized to vesicle membranes. They form unique complexes consisting of one member of each subgroup, that mediate fusion between a specific type of vesicles and their target organelle. Their SNARE motifs form twisted and parallel heterotetrameric helix bundles.
