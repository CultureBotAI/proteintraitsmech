identifier: InterPro:IPR019475
label: DNA primase, DnaB-helicase binding domain
definition: >-
  This entry represents the C-terminal region three-helical domain of DNA primase. Primases synthesise short RNA strands on single-stranded DNA templates, thereby generating the hybrid duplexes required for the initiation of synthesis by DNA polymerases. Primases are recruited to single-stranded DNA by helicases - this domain binds DnaB-helicase. It is associated with the Toprim domain , which is the central catalytic core.
