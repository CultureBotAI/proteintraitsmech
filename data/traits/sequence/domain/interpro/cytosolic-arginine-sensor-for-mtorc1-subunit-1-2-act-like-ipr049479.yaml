identifier: InterPro:IPR049479
label: "Cytosolic arginine sensor for mTORC1 subunit 1/2, ACT-like"
definition: >-
  This domain is found in Cytosolic arginine sensor for mTORC1 subunit 1 from humans (CASTOR1) and in similar proteins predominantly from vertebrates. CASTOR1 functions as an intracellular arginine sensor within the amino acid-sensing branch of the TORC1 signaling pathway. This entry represents the third out of the four tandem ACT domains present in this protein. This domain adopts the typical β-α- β-β-α-β configuration of the ACT domain, although it lacks the last β-strand. It folds together with the first ACT domain to form an eight-stranded β-sheet flanked by four α-helices on one side, making up the dimerisation domain.
