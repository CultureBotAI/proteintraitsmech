identifier: InterPro:IPR057284
label: "Rho GTPase-activating protein 35-like, FF domain"
definition: >-
  This domain is found in Rho GTPase-activating protein 35 from Rattus norvegicus (RHG35) and similar animal sequences. RHG35 is involved in cell differentiation, cell adhesion and migration, retinal tissue morphogenesis, neural tube fusion, midline fusion of the cerebral hemispheres and mammary gland branching morphogenesis. This domain is predicted to adopt an all α-helical structure.
