identifier: InterPro:IPR033420
label: "Gammaproteobacterial periplasmic sensor domain GAPES1"
definition: >-
  GAPES1 (GAmmaproteobacterial PEriplasmic Sensor) domain is a periplasmic sensor domain found in diguanylate cyclases and methyl-accepting chemotaxis proteins, including the diguanylate cyclase DgcJ (YeaJ) that regulates biofilm formation and motility in Escherichia coli.
