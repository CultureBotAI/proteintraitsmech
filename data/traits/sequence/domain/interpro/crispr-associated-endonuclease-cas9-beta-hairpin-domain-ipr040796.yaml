identifier: InterPro:IPR040796
label: "CRISPR-associated endonuclease Cas9, beta-hairpin domain"
definition: >-
  This is β-hairpin domain found in Cas9 proteins from Actinobacteria. The β-hairpin domain is not conserved in all type II-C Cas9 proteins. The β-hairpin in Cas 9 from Streptococcus pyogenes blocks the HNH domain active site.
