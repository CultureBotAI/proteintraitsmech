identifier: InterPro:IPR057842
label: "MER3 helicase-like, winged helix domain"
definition: >-
  This entry represents a winged Helix-Turn-Helix domain found in a variety of helicase enzymes, including ATP-dependent DNA helicase MER3, U5 small nuclear ribonucleoprotein 200 kDa helicase (SNRNP200), Pre-mRNA-splicing helicase BRR2 and RQC trigger complex helicase SLH1. SNRNP200 catalyses the ATP-dependent unwinding of U4/U6 RNA duplices, an essential step in the assembly of a catalytically active spliceosome. It plays a role in pre-mRNA splicing as a core component of precatalytic, catalytic and postcatalytic spliceosomal complexes. BRR2 is an RNA helicase that plays an essential role in pre-mRNA splicing as component of the U5 snRNP and U4/U6-U5 tri-snRNP complexes. It is involved in spliceosome assembly, activation and disassembly. It catalyses the ATP-dependent unwinding of U4/U6 RNA duplices, an essential step in the assembly of a catalytically active spliceosome. SLH1 is involved in activation of the ribosome quality control (RQC) pathway, a pathway that degrades nascent peptide chains during problematic translation. It drives the splitting of stalled ribosomes that are polyubiquitinated in a HEL2-dependent manner, as part of the ribosome quality control trigger (RQT) complex. It also represses the translation of non-poly(A) mRNAs together with SKI2.
