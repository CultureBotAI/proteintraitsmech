identifier: InterPro:IPR049321
label: "Tyrosine 3-monooxygenase-like, ACT domain"
definition: >-
  This domain is found in tyrosine 3-monooxygenase (TH) similar proteins from vertebrates. TH catalyses the hydroxylation of tyrosine to form 3,4-dihydroxyphenylalanine in the biosynthesis of the catecholamine neurotransmitters. This entry represents the regulatory domain, which is centrally located between and ). The ACT domain adopts a four stranded antiparallel β-sheet and two α-helices connected by four loops. This domain self-associates to form a dimer. In humans, TH is associated with several disorders.
