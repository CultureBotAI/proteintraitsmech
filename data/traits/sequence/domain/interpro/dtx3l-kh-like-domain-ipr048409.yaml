identifier: InterPro:IPR048409
label: "DTX3L, KH-like domain"
definition: >-
  DTX3L is a RING-domain E3 ubiquitin-protein ligase that regulates endosomal sorting of the G protein-coupled receptor CXCR4 from endosomes to lysosomes. It also regulates subcellular localisation of its partner protein, B aggressive lymphoma (BAL), by a dynamic nucleocytoplasmic trafficking mechanism. This entry represents two copies of a domain found before the Znf domain ( ) in DTX3L. According to structure predictions, it seems to be related to KH domains.
