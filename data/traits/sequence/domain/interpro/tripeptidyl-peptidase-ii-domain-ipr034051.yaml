identifier: InterPro:IPR034051
label: Tripeptidyl-peptidase II domain
definition: >-
  Tripeptidyl-peptidase II (MEROPS identifier S08.090) is a member of the peptidase S8 or subtilase family. Tripeptidyl-peptidase II removes tripeptides from the free N terminus of oligopeptides as well as having endoproteolytic activity. Some tripeptidyl-peptidases have been shown to cleave tripeptides and small peptides, e.g. angiotensin II and glucagon, while others are believed to be involved in MHC I processing. Peptidases S8 (or subtilases serine endo- and exo-peptidase clan) have an Asp/His/Ser catalytic triad similar to that found in trypsin-like proteases, but do not share their three-dimensional structure and are not homologous to trypsin. The stability of subtilases may be enhanced by calcium; some members have been shown to bind up to 4 ions via binding sites with different affinities. Some members of this clan contain disulfide bonds. These enzymes can be intra- and extracellular; some function at extreme temperatures and pH values.
