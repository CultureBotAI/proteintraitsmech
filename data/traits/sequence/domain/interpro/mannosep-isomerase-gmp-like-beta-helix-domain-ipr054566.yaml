identifier: InterPro:IPR054566
label: "MannoseP isomerase/GMP-like, beta-helix domain"
definition: >-
  This entry represents a left-handed β-helix domain found at the C-terminal of Guanosine-diphospho-d-mannose Pyrophosphorylase (GMP) from Thermotoga maritima ( ) and as a linker domain in mannose-1-phosphate guanylyltransferases (ManC), alginate biosynthesis protein AlgA and xanthan biosynthesis protein XanB, among others, located between the nucleotidyl transferase domain at the N-terminal ( ) and the C-terminal isomerase cupin domain ( ). This domain is composed of an α-helix followed by a short left-handed β-helix. GMP forms a dimer in which two molecules associate through a tail-to-tail arrangement of this domain.
