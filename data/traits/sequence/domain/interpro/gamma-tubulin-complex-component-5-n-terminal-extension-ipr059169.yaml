identifier: InterPro:IPR059169
label: "Gamma-tubulin complex component 5, N-terminal extension"
definition: >-
  This entry represents the N-terminal extension in GCP-5, also called TUBGCP5, a component of the gamma-tubulin ring complex (gamma-TuRC), which is necessary for microtubule nucleation at the centrosome. This N-terminal extension is involved in protein-protein interactions. GCP-5 binds Mozart1, a microprotein that regulates subcellular targeting and microtubule formation activity of gamma-TuRC at different cell cycle stages, through this extension. Sequence alignment of human GCPs based on the GCP4 structure helped delineate conserved regions in the N- and C-terminal domains. In addition to the conserved sequences, the N-terminal domains carry specific insertions of various sizes depending on the GCP, i.e. internal insertions or N-terminal extensions. These insertions may equally contribute to the function of individual GCPs as they have been implied in specific interactions with regulatory or structural proteins.
