label: "Domain of unknown function DUF6310"
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001417) is described by MIBiG as an example of the following biosynthetic classes, NRP (non-ribosomal peptide) and polyketide, in particular the myxochromide D biosynthetic gene cluster from Cystobacterineae bacterium. This domain family appears to be predominantly found in Cystobacterineae.
