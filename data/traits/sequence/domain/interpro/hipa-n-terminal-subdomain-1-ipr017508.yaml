identifier: InterPro:IPR017508
label: "HipA, N-terminal subdomain 1"
definition: >-
  HipA is a bacterial serine/threonine protein kinase involved in multidrug tolerance. In HipA, a P loop motif forms a central strand that disrupts the N-terminal β-sheet region, leading to the creation of two N-subdomains. This entry represents subdomain 1, and hits the N-terminal region of HipA and its homologues.
