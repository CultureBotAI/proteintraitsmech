identifier: InterPro:IPR032838
label: "VWA-Hint protein, Vwaint domain"
definition: >-
  VWA-Hint proteins carry this conserved domain of around 300 residues, named the Vwaint domain. Generally, this domain lies between the N-terminal VWA domain and the more C-terminal 'Vint'-type Hint domain. The exact function of this domain is not known.
