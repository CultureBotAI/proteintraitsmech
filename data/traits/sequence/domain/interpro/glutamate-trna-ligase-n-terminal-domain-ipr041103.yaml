identifier: InterPro:IPR041103
label: "Glutamate--tRNA ligase, N-terminal domain"
definition: >-
  This domain is found at the N terminus of Glutamate-tRNA ligase (also known as glutamyl-tRNA synthetase) (GluRS, ). The domain adopts a classical glutathione S-transferase (GST)-like fold and it interacts with tRNA-aminoacylation cofactor ARC1 (Arc1p) N-terminal domain for the formation of aminoacyl-tRNA synthetase (aaRS) complex in yeast.
