identifier: InterPro:IPR048817
label: "Sliding-clamp-loader large subunit, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of Sliding-clamp-loader large subunit from Bacteriophage T4 ( also known as Gp44) and similar proteins from tailed bacteriophages. Gp44 functions as an ATPase enzyme. It also contains an AAA module ( ).
