identifier: InterPro:IPR063218
label: "Genetic interactor of prohibitins 3, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the genetic interactor of prohibitins 3 (GEP3), a mitochondrial protein found in fungi of the Saccharomycotina subphylum. The full-length GEP3 protein contains an N-terminal mitochondrial targeting peptide, a CP-type G GTPase domain ( ), and this C-terminal domain of approximately 200 amino acids. GEP3 interacts genetically with prohibitins and is involved in mitochondrial lipid metabolism. Disruption of GEP3 increases the frequency of mitochondrial genome loss. The specific function of this C-terminal domain remains to be determined.
