identifier: InterPro:IPR057356
label: "ZNF592-like, C2H2 zinc finger"
definition: >-
  This C2H2 zinc finger domain is found in a group of zinc-finger proteins such as ZN532, ZN687, ZN592 and related proteins which are probably involved in transcriptional regulation. A missense mutation in ZNF592 was found associated with CAMOS (Cerebellar Ataxia with Mental retardation, Optic atrophy and Skin abnormalities) syndrome.
