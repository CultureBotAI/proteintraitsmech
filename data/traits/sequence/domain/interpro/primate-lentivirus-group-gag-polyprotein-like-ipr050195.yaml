identifier: InterPro:IPR050195
label: "Primate lentivirus group Gag polyprotein-like"
definition: >-
  The primate lentivirus group gag polyprotein family is involved in the assembly, budding, maturation, and infection stages of the viral replication cycle. These polyproteins form membrane associations and self-associations that result in the budding of an immature virion from the infected cell. They selectively bind and package genomic RNA, encapsulate and protect viral RNA, and act as nucleic acid chaperones during retrotranscription. They also mediate virion assembly by interacting with the plasma membrane and recruiting viral Env proteins. The conical core of the virus, which encapsulates the genomic RNA-nucleocapsid complex, is formed by these polyproteins and is disassembled upon virion entry into the host cell. They contain late-budding domains that recruit host ESCRT machinery for viral particle budding.
