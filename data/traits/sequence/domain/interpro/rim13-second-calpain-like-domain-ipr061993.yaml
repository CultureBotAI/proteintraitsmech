identifier: InterPro:IPR061993
label: "RIM13, second calpain-like domain"
definition: >-
  This entry represents the second calpain-like domain of RIM13 calpain-like protease, found in fungi. RIM13 is required for proteolytic cleavage of the transcriptional repressor RIM101 in response to alkaline ambient pH, which is necessary for sporulation and invasive growth. RIM13 belongs to the peptidase C2 family and contains an N-terminal calpain catalytic domain with active site residues. The protein interacts with SNF7 which may recruit RIM13 to its substrate.
