identifier: InterPro:IPR042733
label: "WDFY1, FYVE domain"
definition: >-
  WDFY1 is a novel single FYVE domain containing protein that binds phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) with high specificity over other phosphoinositides. WDFY1 to early endosomes requires an intact FYVE domain and is inhibited by wortmannin, a PI3-kinase inhibitor. In addition to FYVE domain, WDFY1 harbours multiple WD-40 repeats. This entry represent the FYVE domain of WDFY1.
