identifier: InterPro:IPR044024
label: "Atypical Rib domain"
definition: >-
  This entry represents the atypical Rib (aRib) domain found in a variety of bacterial cell surface proteins. These proteins share a conserved motif with the Rib domain (YPDXXD). The structure of the aRib domain has been solved from two proteins, the SrpA adhesin and the GspB adhesin. In these proteins this domain has been termed the unique domain due to its lack of similarity to any other known structures at the time. The aRib domain from SrpA has been shown to mediate a dimer interaction.
