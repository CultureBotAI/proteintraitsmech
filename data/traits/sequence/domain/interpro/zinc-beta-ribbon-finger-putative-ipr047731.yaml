identifier: InterPro:IPR047731
label: "Zinc beta-ribbon finger, putative"
definition: >-
  This domain of unknown function is predominantly found in uncharacterised proteins from Bacteroidetes. This domain is about 60 amino acids in length and is found N-terminal to that resembles DNA primase core domain. It has four nearly invariant Cys residues, two of which located in unusual motif VGRCxxxxxCGYH. This domain has remote similarity to the zinc-ribbon domain of DNA primase ( ) and it is predicted to adopt the same structure.
