identifier: InterPro:IPR045951
label: "Domain of unknown function DUF6371"
definition: >-
  This domain of unknown function is predominantly found in uncharacterised proteins from Bacteroidetes. This domain is about 150 amino acids in length. This domain has a remote similarity to DNA primase core domain. It is usually preceded by that resembles the zinc-ribbon domain of DNA primase found also in a similar location.
