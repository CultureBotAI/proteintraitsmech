identifier: InterPro:IPR023087
label: "Flagellar motor switch protein FliG, C-terminal"
definition: >-
  The flagellar motor switch in Escherichia coli and Salmonella typhimurium regulates the direction of flagellar rotation and hence controls swimming behaviour. The switch is a complex apparatus that responds to signals transduced by the chemotaxis sensory signalling system during chemotactic behaviour. CheY, the chemotaxis response regulator, is believed to act directly on the switch to induce tumbles in the swimming pattern, but no physical interactions of CheY and switch proteins have yet been demonstrated. This entry represents the C-terminal domain of FliG, the structure of which is known. This domain functions specifically in motor rotation.
