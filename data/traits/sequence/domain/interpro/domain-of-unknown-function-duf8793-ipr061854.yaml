label: "Domain of unknown function DUF8793"
definition: >-
  This domain is found in uncharacterised fungal proteins. It is predicted to fold into four helical bundle composed of helices which are predicted as transmembrane. It contains two highly conserved cyateine residues which are predicted to form a disulfide bond.
