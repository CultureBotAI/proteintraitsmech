identifier: InterPro:IPR035088
label: "Protective antigen, Ca-binding domain"
definition: >-
  This domain is a calcium-binding domain in the anthrax toxin protective antigen (PA). A large group of bacterial exotoxins are referred to as "A/B toxins", essentially because they are formed from two subunits. The "A" subunit possesses enzyme activity, and is transferred to the host cell following a conformational change in the membrane-bound transport "B" subunit. Clostridial species are one of the major causes of food poisoning/gastro-intestinal illnesses. They are Gram-positive, spore-forming rods that occur naturally in the soil. Among the toxins produced by certain Clostridium spp. are the binary exotoxins. These proteins consist of two independent polypeptides, which correspond to the A/B subunit moieties. The enzyme component (A) enters the cell through endosomes produced by the oligomeric binding/translocation protein (B), and prevents actin polymerisation through ADP-ribosylation of monomeric G-actin. Members of the "B" binary toxin family also include the Bacillus anthracis protective antigen (PA) protein, most likely due to a common evolutionary ancestor. B. anthracis, a large Gram-positive spore-forming rod, is the causative agent of anthrax. Its two virulence factors are the poly-D-glutamate polypeptide capsule, and the actual anthrax exotoxin. The toxin comprises three factors: the protective antigen (PA); the oedema factor (EF); and the lethal factor (LF). Each is a thermolabile protein of ~80kDa. PA forms the "B" part of the exotoxin and allows passage of the "A" moiety (consisting of EF and LF) into target cells. PA protein forms the central part of the complete anthrax toxin, and translocates the B moiety into host cells after assembling as a heptamer in the membrane.
