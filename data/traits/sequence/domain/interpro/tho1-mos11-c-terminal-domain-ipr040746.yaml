identifier: InterPro:IPR040746
label: "THO1_MOS11, C-terminal domain"
definition: >-
  This is the C-terminal domain found in THO1 and Modifier of SNC1, 11 (MOS11). THO is a multi-protein complex involved in the formation of messenger ribonucleoproteins (mRNPs) by coupling transcription with mRNA processing and export. Some studies show that Tho1, like Sub2, can assemble onto the nascent mRNA during transcription and that Tho1 and Sub2 can provide alternative pathways for mRNP biogenesis in the absence of a functional THO complex. The C-terminal region of Tho1 from Saccharomyces cerevisiae, adopts a helical fold similar to that of the WHEP RNA-binding domains of metazoan aminoacyl-tRNA synthetases. MOS11 contributes to the transfer of mature mRNA from the nucleus to the cytosol. In Arabidospis, the THO/TREX component TEX1 interacts with MOS11 and modulates mRNA export and alternative splicing events.
