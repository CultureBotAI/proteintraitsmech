identifier: InterPro:IPR063529
label: "Metacaspase, peptidase C14 domain"
definition: >-
  This entry represents the peptidase C14 domain of the Metacaspase family, which comprises cysteine proteases that are involved in programmed cell death in plants and lower eukaryotes. They differ significantly from caspases because they are calcium-activated, arginine-specific peptidases that do not require processing or dimerisation for activity. The structure comprises a core caspase fold, but with an unusual eight-stranded β-sheet that stabilises the protein as a monomer. There are essential aspartic acid residues, in the predicted S1 binding pocket, that delineate the arginine-specific substrate specificity.
