identifier: InterPro:IPR056790
label: "Ribophorin II, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of human Ribophorin II (RPN2, also known as dolichyl-diphosphooligosaccharide--protein glycosyltransferase subunit 2), a subunit of the oligosaccharyl transferase (OST) complex that catalyses the first step in protein N-glycosylation. This domain shows a non-compact all-α configuration and is often found associated to , and .
