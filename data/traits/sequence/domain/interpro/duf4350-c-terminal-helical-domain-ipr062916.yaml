identifier: InterPro:IPR062916
label: "DUF4350, C-terminal helical domain"
definition: >-
  This entry represents a C-terminal helical domain often found in DUF4350 family proteins. In many members, this domain follows the DUF4350 domain and is approximately 85-100 residues in length. The family is found in Bacteroidota. The function of this domain remains to be determined.
