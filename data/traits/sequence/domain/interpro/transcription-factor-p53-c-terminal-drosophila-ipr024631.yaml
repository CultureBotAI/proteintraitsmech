identifier: InterPro:IPR024631
label: "Transcription factor p53, C-terminal, Drosophila"
definition: >-
  The p53 tumour suppressor is a protein found in increased amounts in a wide variety of transformed cells. It is also detectable in many proliferating non-transformed cells, but it is undetectable or present at low levels in resting cells. It is frequently mutated or inactivated in many types of cancer. p53 seems to act as a tumour suppressor in some, but probably not all, tumour types. p53 has been implicated in cell cycle regulation, particularly in the monitoring of genomic DNA integrity prior to replication; for this reason it has been dubbed 'guardian of the genome'. p53 can be divided into different functional domains: an N-terminal transactivation domain, a proline-rich domain, a DNA-binding domain which contains a conserved site, a tetramerisation domain and a C-terminal regulatory region. This entry represents the C-terminal domain of Drosophila transcription factor p53. While the rest of the protein is quite conserved between the different transcription factors such as p53 and p73, the C-terminal domain is highly divergent. The Drosophila p53 structure is characterised by an additional N-terminal β-strand and a C-terminal helix.
