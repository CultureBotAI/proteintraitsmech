identifier: InterPro:IPR037605
label: Sfmbt, SAM domain
definition: >-
  Drosophila Sfmbt (dSfmbt) is part of the Pho repressive complex (PhoRC) responsible for HOX (Homeobox) gene silencing. In this complex, Pho or Pho-like proteins bind DNA and dSfmbt binds methylated histones. dSfmbt contains a SAM (sterile alpha motif) domain and 4 MBT repeats. dSfmbt can interact with mono- and di-methylated histones H3 and H4 through the MBT repeats. It also interacts with the PcG protein Scm, a related MBT-repeat protein with similar methyl-lysine binding activity. This entry represents the SAM domain, which is a putative protein-protein interaction domain.
