identifier: InterPro:IPR061540
label: "Domain of unknown function DUF8470"
definition: >-
  This domain is found at the N-terminal of a group of uncharacterised bacterial sequences and it is predicted to adopt a single-stranded right-handed β-helix with similarity to ice-binding proteins and other adhesive domains. These proteins are usually associated with tandem Ig-like domain, such as which has five Ig-like domains.
