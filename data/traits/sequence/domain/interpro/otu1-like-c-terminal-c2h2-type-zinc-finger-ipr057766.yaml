identifier: InterPro:IPR057766
label: "OTU1-like, C-terminal C2H2-type zinc finger"
definition: >-
  This C2H2-type zinc finger is found at the C-terminal end of human Ubiquitin thioesterase OTU1 and similar eukaryotic proteins. This domain is also found in Arabidopsis thaliana OVARIAN TUMOR DOMAIN-containing deubiquitinating enzyme 2 (OTU2) but is not found in other OVARIAN TUMOR DOMAIN related proteins. The ubiquitin thioesterase OTU1 is a deubiquitinating enzyme, releasing ubiquitin from tagged proteins. It hydrolyses the isopeptide bonds of 'Lys-27'-, 'Lys-29'- and 'Lys-33'-linked polyubiquitin chains. Removal of ubiquitin does not necessarily rescue tagged proteins from degradation, because proteins are often then targeted to endoplasmic reticulum-associated degradation. Removal of the ubiquitin tag may grant access to the VCP/p97 pore, and OTU1 may be a constituent of a complex involved in macroautophagy. OTU1 is also required for endo-lysosomal damage response and is recruited to damaged lysosomes to remove Lys48-linked ubiquitin conjugates to promote autophagosome formation. OTU1 is a cysteine peptidase with a structural fold similar to that of papain; it is a member of MEROPS peptidase family C85.
