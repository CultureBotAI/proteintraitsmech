identifier: InterPro:IPR049802
label: "RhsC-like, type sIX effector domain"
definition: >-
  This entry represents the Found in type sIX effector (FIX) domain of RhsC ( ) from Dickeya dadantii and similar sequences mainly found in proteobacteria. This domain is located N-terminal to known toxin domains and is genetically and functionally linked to type VI secretion system (T6SS), a widespread mechanism used by Gram-negative bacteria to antagonise neighbouring cells. In some members of this group, the FIX domain is found associated with C-terminal nuclease toxin PoNe (Polymorphic Nuclease effector), which is associated with several toxin delivery systems including type V, type VI, and type VII; in others with the C-terminal Ntox15 (Novel toxin 15, ), a predicted RNase toxin that possesses a conserved HxxD motif; and in others with extended RHS repeats ( ).
