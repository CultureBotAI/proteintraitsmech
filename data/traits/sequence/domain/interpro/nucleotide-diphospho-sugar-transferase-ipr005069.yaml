identifier: InterPro:IPR005069
label: "Nucleotide-diphospho-sugar transferase"
definition: >-
  This entry represents a domain found in a group of glycosyltransferases, including Arabidopsis arabinosyltransferase RRA1/2/3/XEG113, beta-arabinofuranosyltransferase RAY1 and UDP-D-xylose:L-fucose alpha-1,3-D-xylosyltransferases. The biosynthesis of disaccharides, oligosaccharides and polysaccharides involves the action of hundreds of different glycosyltransferases. These enzymes catalyse the transfer of sugar moieties from activated donor molecules to specific acceptor molecules, forming glycosidic bonds. A classification of glycosyltransferases using nucleotide diphospho-sugar, nucleotide monophospho-sugar and sugar phosphates ([ec:2.4.1.-]) and related proteins into distinct sequence-based families has been described. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. The same three-dimensional fold is expected to occur within each of the families. Because 3-D structures are better conserved than sequences, several of the families defined on the basis of sequence similarities may have similar 3-D structures and therefore form 'clans'.
