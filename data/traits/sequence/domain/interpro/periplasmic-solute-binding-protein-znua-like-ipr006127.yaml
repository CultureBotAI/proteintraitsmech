identifier: InterPro:IPR006127
label: Periplasmic solute binding protein, ZnuA-like
definition: >-
  This entry represents a domain found standalone in some proteins such as Bacillus subtilis High-affinity zinc uptake system protein ZnuA and N-terminal in multidomain proteins such as Zinc-binding protein AdcA. Members of this family constitute the solute-binding protein component of cluster-9 ABC transporters. This family includes periplasmic solute binding protein TroA from Treponema pallidum, which binds Zn2+ and Mn2+. In Streptococcus suis, TroA is required for manganese acquisition. Related proteins are found in both Gram-positive and Gram-negative bacteria, including manganese-binding lipoprotein MntA and high-affinity zinc uptake system protein ZnuA. ZnuA is part of the bacterial zinc-uptake complex ZnuABC. ZinT acts as a Zn2+-buffering protein that delivers Zn2+ to ZnuA, a high-affinity zinc-uptake protein. In Gram-negative bacteria the ZnuABC transporter system ensures an adequate import of zinc in Zn2+-poor environments, such as those encountered by pathogens within the infected host.
