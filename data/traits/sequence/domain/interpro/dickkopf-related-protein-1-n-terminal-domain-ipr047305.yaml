identifier: InterPro:IPR047305
label: "Dickkopf-related protein 1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Dkk1, which includes the Cys-1 domain and a region to its N terminus that shows similarity to Dickkopf-like protein 1 (Dkkl1). Dickkopf-1 (Dkk1) is a secreted protein which directly binds to LRP5/6 (low-density lipoprotein receptor related protein 5 and 6), and is an inhibitor of Wnt/beta-catenin signalling. Elevated expression of Dkk-1 may serve as a negative regulator for modulating the wnt/beta-catenin signal pathway. Dkk1 is expressed in various human cancers. It has been studied extensively in mouse models of multiple myeloma that results in osteolytic bone lesions. Studies show that Dkk1 levels in bone marrow plasma and serum inhibit the differentiation of osteoblast precursors. Dkk1 belongs to the Dickkopf (Dkk) family that comprises a discrete class of secreted Wnt inhibitors. The Wnt gene family is a large class of secreted proteins that are expressed in a variety of tissues and organs, and are required for many developmental processes, including segmentation, endoderm development, limb polarity, neural crest differentiation, kidney morphogenesis, sex determination and brain development. Dkks 1-4 each possesses an N-terminal signal peptide and contains two conserved cysteine-rich domains (Cys-1 and Cys-2) separated by a linker region. Each domain possesses 10 conserved cysteine residues.
