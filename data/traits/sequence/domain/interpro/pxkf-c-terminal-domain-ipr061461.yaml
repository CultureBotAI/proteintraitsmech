identifier: InterPro:IPR061461
label: "PxKF C-terminal domain"
definition: >-
  This entry represents the PxKF domain at the C-terminal of uncharacterised extracellular proteins. These proteins are usually largely surface-associated proteins, processed and anchored by the type IX secretion system, exosortases, rhombosortases, etc. These proteins are mostly found in Actinobacteria, but also some Firmicutes, Deinococcus, etc. The large size of this domain (over 100 amino acids long) compared to most known N-terminal or C-terminal sorting signals that are recognised but then removed suggests that the domain is retained in the mature protein and has some function involved in surface binding.
