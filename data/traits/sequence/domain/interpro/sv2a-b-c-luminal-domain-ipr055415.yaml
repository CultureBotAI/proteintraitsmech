identifier: InterPro:IPR055415
label: "SV2A/B/C, luminal domain"
definition: >-
  This entry represents the luminal domain found in synaptic vesicle protein 2 A, B and C (SV2A, SV2B and SV2C) from animals. SV2s are specific to vesicles that undergo calcium-regulated secretion and are essential for normal nervous system function, particularly for neurotransmission. SV2s have also been identified as targets for botulinum neurotoxins (BoNTs) serotypes A, D, E and F. In the case of VS2C, this domain interacts directly and allows BoNT/A transport into host cells.
