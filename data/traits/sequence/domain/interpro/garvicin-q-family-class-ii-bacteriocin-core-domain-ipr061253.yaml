identifier: InterPro:IPR061253
label: "Garvicin Q family class II bacteriocin, core domain"
definition: >-
  This entry represents the core (mature) peptide region of GarQ, the class II bacteriocin garvicin (garvieacin) Q, and homologous peptides with similar core regions. Some members, such as GarQ itself, have a classical GlyGly-containing ComC/BlpC-like leader peptide, but others have N-terminal regions (probable leader peptides) of a different type.
