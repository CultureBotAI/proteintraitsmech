identifier: InterPro:IPR015025
label: "PoNi, C-terminal"
definition: >-
  This entry represents the C-terminal domain of the PoNe immunity proteins (PoNi) which antagonise the DNAse toxin PoNe (Polymorphic Nuclease effector). PoNi proteins may directly interact with PoNe.
