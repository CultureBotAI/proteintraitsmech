identifier: InterPro:IPR026816
label: "Flavodoxin domain"
definition: >-
  This entry represents the flavodoxin domain. Proteins with this domain include protoporphyrinogen IX dehydrogenase (HemG). HemG catalyses the 6-electron oxidation of protoporphyrinogen-IX to form protoporphyrin-IX using menaquinone as electron acceptor.
