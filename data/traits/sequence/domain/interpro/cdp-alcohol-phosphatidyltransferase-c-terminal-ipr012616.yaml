identifier: InterPro:IPR012616
label: "CDP-alcohol phosphatidyltransferase, C-terminal"
definition: >-
  This domain is found on CDP-alcohol phosphatidyltransferases. These enzymes catalyse the displacement of CMP from a CDP-alcohol by a second alcohol with formation of a phosphodiester bond and concomitant breaking of a phosphoride anhydride bond.
