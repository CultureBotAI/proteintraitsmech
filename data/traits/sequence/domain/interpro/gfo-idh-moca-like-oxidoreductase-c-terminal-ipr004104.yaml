identifier: InterPro:IPR004104
label: "Gfo/Idh/MocA-like oxidoreductase, C-terminal"
definition: >-
  This entry represents a domain found C-terminal in Gfo/Idh/MocA family of proteins. In general, the Gfo/Idh/MocA protein family members are enzymes that catalyse various different chemical reactions such as oxidation and reduction of carbohydrates, oxidation of trans-dihydrodiols, reduction of biliverdin, and hydrolysation of glycosidic bonds. All the enzymes in this family utilise NAD(P) as a hydride donor or acceptor. However, despite the structural similarities, some member such as the transcriptional repressor Gal80p, does not have enzymatic activity.
