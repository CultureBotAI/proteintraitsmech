identifier: InterPro:IPR025696
label: "Exosome RNA helicase MTR4-like, beta-barrel domain"
definition: >-
  This entry represents the β-barrel of MTR4 and related Ski2-like helicases. Ski2 from yeast has an overall similar structure to MTR4 proteins. However, it does not have the KOW motif and it is not included in this entry. This entry also includes Circadian oscillator component FRH. Exosome RNA helicase Mtr4 is a essential RNA helicase, and is an exosome-activating cofactor. It functions together with the nuclear exosome being involved in processing of structured RNAs, including snRNAs and snoRNAs. It also plays a role in nuclear RNA surveillance pathways involving the so-called TRAMP complex. It contains an arch domain, required for proper 5.8S rRNA processing, and appears to function independently of canonical helicase activity. The arch domain comprises an helical stalk/elbow that flanks a KOW module which adopts a β-barrel fold.
