identifier: InterPro:IPR060241
label: "Intimin, immunoglobulin-like domain"
definition: >-
  This immunoglobulin-like (Ig-like) domain is found in a group of Intimin proteins from proteobacteria, including Eae from Escherichia coli. Eae is an adhesin, which mediates attachment to the human intestine epithelial cells. It functions as an inverse autotransporter.
