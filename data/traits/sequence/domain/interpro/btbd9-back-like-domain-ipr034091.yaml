identifier: InterPro:IPR034091
label: "BTBD9, BACK-like domain"
definition: >-
  BTBD9 contains BTB/POZ, BACK, and two Coagulation factor 5/8 C-terminal (FA58C) domains. Single-nucleotide polymorphisms in the BTBD9 gene have been associated with a higher risk of Restless Legs Syndrome (RLS), a sensory-motor neurological disorder with a circadian component. BTBD9 may be involved in regulating synaptic plasticity and memory.
