identifier: InterPro:IPR060126
label: "N-acetylglucosamine-1-phosphotransferase subunit alpha/beta, Ig-like domain"
definition: >-
  This immunoglobulin-like (Ig-like) domain is found in human N-acetylglucosamine-1-phosphotransferase subunits alpha/beta (GNPTAB) and similar sequences. GNPTAB catalyses the formation of mannose 6-phosphate (MP6) markers on high mannose type oligosaccharides in the Golgi apparatus. M6P residues play a role in the vesicular transport of lysosomal enzymes to the endosomal/prelysosomal compartment.
