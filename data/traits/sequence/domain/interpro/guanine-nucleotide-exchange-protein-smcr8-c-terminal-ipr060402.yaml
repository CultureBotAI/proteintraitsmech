identifier: InterPro:IPR060402
label: "Guanine nucleotide exchange protein SMCR8, C-terminal"
definition: >-
  This domain is found at the C-terminal of human Guanine nucleotide exchange protein SMCR8, a component of the C9orf72-SMCR8 complex, which regulates autophagy and mTORC1 signalling. This domain is predicted to show an α-β configuration.
