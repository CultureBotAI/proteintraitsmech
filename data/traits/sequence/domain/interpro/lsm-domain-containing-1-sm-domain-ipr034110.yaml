identifier: InterPro:IPR034110
label: LSM domain containing 1, Sm domain
definition: >-
  This entry represents the single Sm-like domain of LSM domain containing 1 (LSMD1) and similar eukaryotic proteins. They form heptameric and hexameric ring structures. LSMD1, also known as Mak31 or N-alpha-acetyltransferase 38, NatC auxiliary subunit (Naa38), is the auxillary component of the N-terminal acetyltransferase C (NatC) complex which catalyses acetylation of N-terminal methionine residues.
