identifier: InterPro:IPR057388
label: "UGP3-like, C-terminal hexapeptide repeats"
definition: >-
  This region of hexapeptide repeats is found at the C-terminal end of UTP--glucose-1-phosphate uridylyltransferase 3, chloroplastic from Arabidopsis thaliana (UGP3) and similar plant proteins. UGP3 is involved in the biosynthesis of sulfolipids in the chloroplast. It catalyses the first committed step in sulfolipid biosynthesis.
