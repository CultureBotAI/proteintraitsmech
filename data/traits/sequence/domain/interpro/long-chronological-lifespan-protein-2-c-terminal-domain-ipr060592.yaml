identifier: InterPro:IPR060592
label: "Long chronological lifespan protein 2, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of long chronological lifespan protein 2 (LCL2) and similar sequences found in fungi. LCL2 is a probable component of the endoplasmic reticulum-associated degradation (ERAD) pathway. The protein belongs to the LCL2 family and is synthesised as a precursor with an N-terminal signal peptide that is removed to produce the mature protein. LCL2 proteins are characterised by their small size and cysteine-rich sequences.
