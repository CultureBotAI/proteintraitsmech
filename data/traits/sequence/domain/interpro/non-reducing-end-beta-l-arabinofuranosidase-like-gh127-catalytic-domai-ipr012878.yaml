identifier: InterPro:IPR012878
label: "Non-reducing end beta-L-arabinofuranosidase-like, GH127 catalytic domain"
definition: >-
  This entry represents the catalytic domain of Non-reducing end beta-L-arabinofuranosidase from Bifidobacterium longum (Beta-AFase) and similar proteins widespread among all cellular organisms that belong to the glycoside hydrolase family 127 (GH127). This domain folds into an (α/α)6 barrel. Beta-AFase, an unusual beta-L-arabinofuranosidase enzyme ( ), releases l-arabinose from the l-arabinofuranose (Araf)-beta1,2-Araf disaccharide and also transglycosylates 1-alkanols with retention of the anomeric configuration. Terminal beta-l-arabinofuranosyl residues have been found in arabinogalactan proteins from a number of different plant species. Beta-l-Arabinofuranosyl linkages with 1-4 arabinofuranosides are also found in the sugar chains of extensin and solanaceous lectins, hydroxyproline (Hyp)2-rich glycoproteins that are widely observed in plant cell wall fractions. The critical residue for catalytic activity is Glu-338, in a ET/SCAS sequence context.
