identifier: InterPro:IPR056843
label: "tRNA (32-2'-O)-methyltransferase regulator THADA-like, TPR repeats region"
definition: >-
  This region of predicted of tetratricopeptide-like repeats is found in human tRNA (32-2'-O)-methyltransferase regulator THADA and its homologues in eukaryotes, including tRNA (32-2'-O)-methyltransferase regulator trm732 from Schizosaccharomyces pombe and Saccharomyces cerevisiae. Together with methyltransferase FTSJ1, THADA methylates the 2'-O-ribose of nucleotides at position 32 of the anticodon loop of substrate tRNAs. This entry is often found associated with .
