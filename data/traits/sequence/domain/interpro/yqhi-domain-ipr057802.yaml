identifier: InterPro:IPR057802
label: "YqhI domain"
definition: >-
  This entry describes an uncharacterised domain that covers the whole length of YqhI from Escherichia coli. YqhI is a 47-residue-long protein encoded by a small open reading frame (smORF). This domain also covers the N-terminal of uncharacterised proteins that also contain .
