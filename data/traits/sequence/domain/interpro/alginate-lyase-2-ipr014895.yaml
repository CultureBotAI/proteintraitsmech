label: "Alginate lyase 2"
definition: >-
  Alginate lyases are enzymes that degrade the linear polysaccharide alignate. They cleave the glycosidic linkage of alignate through a beta-elimination reaction. This region forms an all β fold, which is different to the all α fold of .
