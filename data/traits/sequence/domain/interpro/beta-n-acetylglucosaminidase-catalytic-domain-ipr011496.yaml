identifier: InterPro:IPR011496
label: "Beta-N-acetylglucosaminidase, catalytic domain"
definition: >-
  This entry represents the catalytic domain found at the N-terminal of the human protein O-GlcNAcase (OGA), O-GlcNAcase BT_4395 from Bacteroides thetaiotaomicron, Hyaluronoglucosaminidase from Clostridium perfringens (NagH) and similar sequences from eukaryotes and bacteria. OGA and BT_4395 cleave GlcNAc but not GalNAc from O-glycosylated proteins. NagH is involved in pathogenesis and is likely to act on connectivity tissue during gas gangrene. It catalyses the random hydrolysis of 1->4-linkages between N-acetyl-beta-D-glucosamine and D-glucuronate residues in hyaluronate. This domain adopts an (β/α)8-barrel structure (eight-stranded parallel β-sheet core mainly surrounded by eight α-helices).
