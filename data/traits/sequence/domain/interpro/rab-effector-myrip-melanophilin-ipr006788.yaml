identifier: InterPro:IPR006788
label: "Rab effector MyRIP/Melanophilin"
definition: >-
  This is a mostly disordered region, with some α-helices, found in Rab effector MyRIP and melanophilin. They are both Rab effector proteins involved in melanosome transport.
