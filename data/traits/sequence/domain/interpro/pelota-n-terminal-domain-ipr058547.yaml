identifier: InterPro:IPR058547
label: "Pelota, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in Pelota proteins from eukaryotes and bacteria. Pelota (known as DOM34 in yeast) is a conserved protein in eukaryotes and archaea that binds Hbs1, a GTPase related to the EF1-alpha subfamily, and plays a central role in mRNA surveillance during protein synthesis. It is involved in the No-Go Decay (NGD) and Non-Stop Decay (NSD) pathways, which target mRNAs where elongation complexes have stalled. The Pelota-Hbs1 complex promotes the dissociation of stalled ribosomes and the release of intact peptidyl-tRNA in the presence of the ATP-binding cassette protein ABCE1. These proteins are also capable of destabilising mRNA within the ribosome channel, facilitating ribosome disassembly and degradation of aberrant mRNAs. The Pelota-HBS1L complex is critical for these functions in eukaryotes. Beyond cytoplasmic roles, Pelota proteins contribute to mitochondrial quality control through mitophagy, where they are recruited to damaged mitochondria to aid autophagy receptor engagement. Structurally, they are defined by an RNA-binding Sm fold domain with endoribonuclease activity, which is essential for mRNA cleavage and ribosome rescue.
