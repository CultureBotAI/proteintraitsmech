identifier: InterPro:IPR060918
label: "Exosortase-dependent surface protein XDP2"
definition: >-
  All members of this family, here named XDP2 (exosortase-dependent surface protein 2), have an N-terminal signal peptide and a C-terminal sorting signal for recognition and cleavage by exosortase family intramembrane endopeptidases. The sorting signal is typically VPEP-CTERM, but variant forms of the sorting domain such as VPLPA-CTERM do occur in the family.
