identifier: InterPro:IPR041380
label: "Eis-like, acetyltransferase domain"
definition: >-
  N-acetyltransferases catalyse the transfer of acetyl groups from acetyl-CoA to arylamines. This acetyltransferase (GNAT) domain is found in Eis from Mycobacterium and other N-acetyltransferases still uncharacterised.
