identifier: InterPro:IPR015083
label: Polyketide synthase NorB/C/GfsB-E-like, docking domain
definition: >-
  This entry represents the N-terminal docking domain found in modular polyketide synthases, such as Spectinabilin polyketide synthase system protein NorB/C and polyketide synthase GfsB-D and related sequences from actinomycetes, which assumes an α-helical structure, wherein two α-helices are connected by a short loop. Two such N-terminal domains dimerise to form amphipathic parallel α-helical coiled coils: dimerisation is essential for protein function.
