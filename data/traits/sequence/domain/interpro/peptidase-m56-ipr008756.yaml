identifier: InterPro:IPR008756
label: "Peptidase M56"
definition: >-
  This domain is found in a group of metallopeptidases belonging to MEROPS peptidase family M56 (clan M-). The predicted active site residues for members of this family occur in the motif HEXXH. The type example is BlaR1 peptidase from Bacillus licheniformis. BlaR1 is a potential penicillin-binding protein required for induction of beta-lactamase in Bacillus licheniformis.
