identifier: InterPro:IPR021106
label: "Protein Ste5, Fus3-binding domain"
definition: >-
  The Saccharomyces cerevisiae pheromone response pathway involves a cascade of 3 MAP kinases Ste11, Ste7, and Fus3. Ste5 is an essential element of this cascade, acting as a scaffold for each of the MAP kinases prior to signalling. This entry represents the Fus3-binding domain of Ste5, also known as the minimal scaffold domain. It acts as a co-catalyst, binding Fus3 and promoting its phosphorylation by Ste7. In the absence of this domain, Fus3 is an extremely poor substrate for Ste7. The requirement for both Ste7 and this domain in Fus3 activation ensures that Fus3 is selectively activated by the mating pathway and not by other pathways that also utilise Ste7.
