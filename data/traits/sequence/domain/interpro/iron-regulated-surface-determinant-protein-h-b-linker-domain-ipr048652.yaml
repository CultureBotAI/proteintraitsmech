identifier: InterPro:IPR048652
label: "Iron-regulated surface determinant protein H/B, linker domain"
definition: >-
  The bacterial pathogen Staphylococcus aureus uses two closely related receptors located on its surface, IsdH and IsdB, to capture from haemoglobin (Hb) the iron it needs to grow. Both proteins show conserved near iron transporter (NEAT) domains ( ) that function synergistically. These domains, essential for the arrest of iron, are appropriately positioned by an α-helical linker domain (this entry), which does not interact with the heme group. In IsdH, this linker domain forms a three-helix bundle structure that is essential for efficient heme capture.
