label: "FERM adjacent"
definition: >-
  This region is found adjacent to Band 4.1 / FERM domains ( ) in a group of animal FERM containing proteins. The region has been hypothesised to play a role in regulatory adaptation, based on similarity to other protein kinase substrates.
