identifier: InterPro:IPR030537
label: "Synaptotagmin-12, C2B domain"
definition: >-
  Synaptotagmin-12 (Syt12) belongs to the synaptotagmin family, which is a group of membrane-trafficking proteins that contain two C-terminal C2 domains (known as C2A and C2B domains). Most of the synaptotagmins have a unique N-terminal domain that is involved in membrane anchoring or specific ligand binding. However, Syt12 does not have this domain and lacks does not bind Ca2+ or phospholipids. Syt12 colocalises with and binds Syt1 on synaptic vesicles, but regulates spontaneous release independently from Syt1. Syt12 is phosphorylated by cAMP-dependent protein kinase A (PKA) at a single site, and mutation of this site blocks the effect of Syt12 on spontaneous release. Syt12 is not essential for basal synaptic transmission, but is required for cAMP-dependent mossy fibre long-term potentiation (LTP), a presynaptic form of long-term plasticity that is induced by PKA activation. This entry represents the second and C-terminal C2 domain (C2B), responsible for the binding to phosphatidyl-inositol-3,4,5-triphosphate (PIP3) in the absence of calcium ions and to phosphatidylinositol bisphosphate (PIP2) in their presence. It also regulates also the recycling step of synaptic vesicles. This domain folds into an eight-standed β-sandwich with a Type I arrangement that shows a circular permutation involving their N- and C-terminal β-strands.
