identifier: InterPro:IPR040971
label: "Pleurotolysin B, C-terminal"
definition: >-
  This a trefoil C-terminal β-rich domain found in PlyB, one of the components of pleurotolysin (Ply) pore-forming protein. Ply is a membrane attack complex/perforin-like family (MACPF) protein consisting of two components, PlyA and PlyB. PlyB and PlyA act together to form relatively small and regular pores in liposomes. The PlyB C-terminal trefoil sits on top of the PlyA dimer.
