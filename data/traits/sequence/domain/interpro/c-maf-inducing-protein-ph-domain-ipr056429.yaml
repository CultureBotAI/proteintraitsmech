identifier: InterPro:IPR056429
label: "C-Maf-inducing protein, PH domain"
definition: >-
  This entry represents the PH domain found in C-Maf-inducing protein and related proteins from animals. The human C-Maf-inducing protein is involved in T-cell signalling pathways. Proteins containing this domain are implicated in the regulation of immune responses, particularly in the differentiation and function of T-helper cells. The human isoform 2 of C-Maf-inducing protein has a specific role in the T-helper 2 (Th2) signalling pathway, linking T-cell receptor-mediated signals to the activation of the c-Maf transcription factor, which is a key regulator of Th2-specific responses.
