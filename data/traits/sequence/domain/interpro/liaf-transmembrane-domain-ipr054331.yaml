label: "LiaF, transmembrane domain"
definition: >-
  This entry represents the transmembrane region (TM) found at the N-terminal of LiaF ( ), which is thought to be a sensory domain. It may tie into a two-component system to regulate the membrane integrity and permeability in response to the stress signal.
