identifier: InterPro:IPR059099
label: "GMEB1/2/Spe-44-like domain"
definition: >-
  This domain is found in a group of transcription regulators from animals, including Spe-44 from Caenorhabditis elegans, and human Glucocorticoid modulatory element-binding protein 1/2 (GMEB1/2). Spe-44 is a transcription factor which controls spermatogenesis and sperm cell fate by regulation of sperm gene expression. GMEB1/2 act as DNA-binding transcriptional regulator involved in modulating the expression of genes responsive to glucocorticoid signalling. It specifically binds AT-rich DNA motifs known as glucocorticoid modulatory elements (GMEs), repressing or enhancing transcription depending on cellular context. This domain is predicted to adopt a mainly α-helical configuration.
