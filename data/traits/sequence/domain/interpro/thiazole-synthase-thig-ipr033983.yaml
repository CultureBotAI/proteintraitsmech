identifier: InterPro:IPR033983
label: "Thiazole synthase ThiG"
definition: >-
  This entry refers to a domain found in several bacterial thiazole biosynthesis protein G (ThiG) sequences. ThiG, together with ThiF and ThiH, is proposed to be involved in the synthesis of 4-methyl-5-(b-hydroxyethyl)thiazole (THZ) which is an intermediate in the thiazole production pathway. This entry also includes domains found in triosephosphate isomerase and pyridoxal 5'-phosphate synthase subunit PdxS.
