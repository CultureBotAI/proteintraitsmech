identifier: InterPro:IPR057333
label: "Adhesion GPCR Gpr126, SEA domain"
definition: >-
  This entry represents the Sperm protein, Enterokinase and Agrin (SEA) domain found in the adhesion G protein-coupled receptor Gpr126/ADGRG6 from vertebrates. The domain adopts a ferredoxin-like α/β sandwich fold and is located between the PTX and HormR domains in the extracellular region. In human GPR126, this domain contains a furin cleavage site that is conserved in many mammals and birds. After cleavage, the domain remains intact until mechanical force causes separation, similar to SEA domains in other proteins like Mucins and Notch. The SEA domain plays a role in regulating receptor function through proteolytic processing and mechanical force sensing. The mouse member is involved in many biological processes, such as myelination, sprouting angiogenesis, placenta, ear and cartilage development. It also acts as a regulator of body length and bone mass and as a regulator of blood-brain barrier formation in the central nervous system via its association with LRP1 and ITGB1.
