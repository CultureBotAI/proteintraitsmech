identifier: InterPro:IPR054013
label: "CRISPR-associated endonuclease C2c1, first helical domain"
definition: >-
  This entry represents the first helical domain (REC1) of CRISPR-associated endonuclease C2c1 (also known as Cas12b). This domain, together with the second helical domain ( ) forms the α-recognition (REC) lobe, which recognises a 20bp guide:target heteroduplex in RNAs. C2c1 is a class 2 type V-B effector protein that was shown to be active for target DNA cleavage in vivo and in vitro. In contrast to Cpf1, this enzyme cleavage activity requires both crRNA and tracrRNA. The structure of C2c1 consists of an α-helical recognition (REC) lobe, including Helical-I and Helical-II, and a NUC lobe, including OBD, RuvC, and two Nuc domains.
