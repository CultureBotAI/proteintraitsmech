identifier: InterPro:IPR057749
label: "WDR47, cross-over region"
definition: >-
  This entry represents the cross-over region (COR) of the N-terminal domain of WD repeat-containing protein 47 (WDR47). The COR consists of three α-helices that intertwine to form a dimer interface and contains a non-canonical target-binding pocket. This pocket specifically recognises a basic helical motif (WBR) in Calmodulin-regulated spectrin-associated proteins (Camsaps), which is essential for proper central-pair microtubule formation in motile cilia. Unlike typical LisH-CTLH-containing domains, the WDR47 COR is expanded and forms an acidic pocket that binds to a conserved basic motif in target proteins. The WDR47-Camsap interaction mediated by this domain is crucial for the assembly of non-centrosomal microtubules and for maintaining the proper planar beat pattern of mammalian motile multicilia. Mutations in this protein have been related to serious developmental disorders WD40-repeat 47, also known as Nemitin, is a microtubule-associated protein that is essential for brain development. It is involved in microtubule dynamics and regulation of autophagic flux for axonal outgrowth and guidance.
