identifier: InterPro:IPR013980
label: "MANSC domain"
definition: >-
  The MANSC (motif at N terminus with seven cysteines) domain is a module with a well-conserved seven cysteine motif that is present at the N terminus of higher multicellular animal membrane and extracellular proteins. It is possible that some of the cysteine residues in the MANSC domain form structurally important disulphide bridges. All of the MANSC-containing proteins contain predicted transmembrane regions and signal peptides. It has been proposed that the MANSC domain in HAI-1 might function through binding with hepatocyte growth factor activator and matriptase. This domain is also found N-terminal in the human Dyslexia-associated protein KIAA0319 and KIAA0319L. KIAA0319 is involved in neuronal migration during development of the cerebral neocortex. This protein is linked to migrational disturbances during brain development, and growth and differentiation of dendrites. KIAA0319L, is capable of rapid endocytosis from the plasma membrane and trafficking to the trans-Golgi network. This protein directly binds to Adeno-associated virus 2 particles and it is involved in the virus infection
