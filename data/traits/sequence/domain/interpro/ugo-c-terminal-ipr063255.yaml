identifier: InterPro:IPR063255
label: "UGO, C-terminal"
definition: >-
  This entry represents the C-terminal domain of UGO (Unique GC organizer) proteins found in apicomplexan parasites. UGO is required for the cellular trafficking of guanylate cyclase GC to the cell membrane and for GC guanylate cyclase activity. The protein is a multi-pass membrane protein that localises to the apical cap, cytoplasm in disperse foci, and to the residual body in tachyzoites. This C-terminal domain contains multiple transmembrane helices and is essential for the protein's role in regulating guanylate cyclase trafficking and catalytic activity, which is critical for parasite egress, motility and invasion.
