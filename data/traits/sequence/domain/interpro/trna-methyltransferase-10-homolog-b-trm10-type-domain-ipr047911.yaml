identifier: InterPro:IPR047911
label: "tRNA methyltransferase 10 homolog B, TRM10-type domain"
definition: >-
  This entry represents the methyltransferase TRM10-type domain of eukaryotic tRNA m1G9 methyltransferase Trm10 homolog B (Trm10B), which catalyses the N(1) methylation of guanine at position 9 (m(1)G9) of tRNA, which might play a role in the stabilisation of tRNA and in translation termination efficiency. Trm10 is a member of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterised by a deep trefoil knot.
