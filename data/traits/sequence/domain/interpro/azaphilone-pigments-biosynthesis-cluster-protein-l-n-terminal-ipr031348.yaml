identifier: InterPro:IPR031348
label: "Azaphilone pigments biosynthesis cluster protein L, N-terminal"
definition: >-
  This entry represents the N-terminal domain of fungal sequences which were previously described as Helo_like, predicted fungal STAND NTPases. This entry includes Azaphilone pigments biosynthesis cluster protein L (PigL) which is part of the gene cluster that mediates the biosynthesis of azaphilone pigments (MonAzPs), a complex mixture of compounds with a common azaphilone skeleton very widely used as food colorants.
