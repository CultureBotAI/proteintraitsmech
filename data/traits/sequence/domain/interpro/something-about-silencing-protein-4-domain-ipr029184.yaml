identifier: InterPro:IPR029184
label: "Something about silencing protein 4 domain"
definition: >-
  This entry represents a domain found in Sas4 (something about silencing protein 4). SAS4 is a fungal silencing regulator. In S. cerevisiae, Sas4 is a subunit of a histone acetyltransferase complex termed SAS complex, which consists of Sas2, Sas4 and Sas5. The SAS complex acetylates both free histones and nucleosomes and is involved in transcriptional silencing. Both Sas4 and Sas5 are required for optimal Sas2 histone acetyltransferase activity.
