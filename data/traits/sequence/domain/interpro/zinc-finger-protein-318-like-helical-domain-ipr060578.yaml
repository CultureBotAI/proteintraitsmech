identifier: InterPro:IPR060578
label: "Zinc finger protein 318-like, helical domain"
definition: >-
  This entry represents a helical domain found in zinc finger protein 318 (ZNF318) and similar animal proteins. ZNF318 is a transcriptional regulator that acts as either a coactivator or corepressor for androgen receptor-mediated transactivation depending on the isoform. The protein is expressed in endocrine tissues and localises to the nucleus. This helical domain corresponds to a predicted coiled-coil region within the protein and may be involved in protein-protein interactions.
