identifier: InterPro:IPR032435
label: "STML2-like, C-terminal extension"
definition: >-
  This domain is found on a subset of proteins as a C-terminal extension of the Band 7 domain ( ). It is found in proteins from bacteria to fungi, plants and mammals, including stomatin-like protein 2 from humans and its orthologue from S.pombe. STML2 is a mitochondrial protein that probably regulates the biogenesis and the activity of mitochondria.
