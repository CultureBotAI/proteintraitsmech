identifier: InterPro:IPR008542
label: "Bacterial Immunoglobulin-like 21"
definition: >-
  This entry represents the Bacterial Immunoglobulin-like 21 (BIg21) domain found in InvasinE (InvE). Invasins are members of the inverse autotransporter (IAT) family also referred to as type Ve secretion system. In general, they consist of an N-terminal β-barrel-like domain, which is responsible for attachment of invasin to the outer membrane region of bacteria, repetitive Immunoglobulin-like (Ig) domains, which vary significantly in number among all the invasins, and the C-terminal domain/adhesion domain (AD) ) which provides invasins with the specificity to bind to its host target molecules. The overall structure of InvE shows that it comprises of three domain architecture in which the domains BIg20 (Bacterial Immunoglobulin-like 20) and BIg21 adopt two layer β-sandwich fold resembling eukaryotic members of Immunoglobulin-superfamily (IgSF), while the AD is a globular, α/β-domain. The structure of BIg21 belongs to the I2 set of IgSF with a unique modification in the C-E interstrand loop, important for its interaction with AD. BIg21 and AD form a functional super-domain as well, necessary to target the host receptor.
