identifier: InterPro:IPR027200
label: "Adaptin medium chain homologue Apm2, N-terminal domain"
definition: >-
  Adaptin medium chain homolog APM2 from Saccharomyces cerevisiae is homologous to the medium chain of mammalian clathrin-associated protein complex (AP) . It may be involved in a nonclathrin-mediated vesicular transport process. This entry represents the N-terminal longin domain of APM2.
