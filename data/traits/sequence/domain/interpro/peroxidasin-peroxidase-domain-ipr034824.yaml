identifier: InterPro:IPR034824
label: "Peroxidasin, peroxidase domain"
definition: >-
  Peroxidasin is a secreted heme peroxidase which is involved in hydrogen peroxide metabolism and peroxidative reactions in the cardiovascular system. It is a multidomain peroxidase that contain a signal peptide, several (e.g., five in Drosophila or one in Homo sapiens) leucine-rich regions, followed by four immunoglobulin-like domains, a linking region, the peroxidase domain, and a carboxy terminal Willebrand type C protein-protein interaction domain. This entry represents the peroxidase domain of peroxidasin and related proteins. The domain co-occurs with extracellular matrix domains and may play a role in the formation of the extracellular matrix. This entry also includes the human peroxidasin-like protein (PDXNL), a probable oxidoreductase that lacks peroxidase activity. It inhibits the peroxidase activity of PXDN through its interaction.
