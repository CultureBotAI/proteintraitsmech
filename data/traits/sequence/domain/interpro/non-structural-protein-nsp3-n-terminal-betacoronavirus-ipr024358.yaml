identifier: InterPro:IPR024358
label: "Non-structural protein NSP3, N-terminal, betacoronavirus"
definition: >-
  This entry corresponds to the N-terminal domain of NSP3 found in betacoronavirus. This includes the NSP3a domain which has the ubiquitin-like 1 (UB1) and glutamic acid-rich acidic (AC) hypervariable domains. NSP3a interacts with numerous other proteins involved in replication and transcription and may serve as a scaffolding protein for these processes. The N-terminal NSP3a domain interacts with N protein to co-localise genomic RNA with the nascent replicase-transcriptase complex at the earliest stages of infection, essential for the virus. The C-terminal Glu-rich subdomain is best described as a flexible tail attached to the globular UB1 subdomain. The multi-domain non-structural protein NSP3 is the largest protein encoded by the coronavirus (CoV) genome, with an average molecular mass of about 200 kD. While some of the domains differ between CoV genera, eight domains of NSP3 exist in all known CoVs: the ubiquitin-like domain 1 (Ubl1), the Glu-rich acidic domain (also called "hypervariable region"), a macrodomain (also named "X domain"), the ubiquitin-like domain 2 (Ubl2), the papain-like protease 2 (PL2pro), the NSP3 ectodomain (3Ecto, also called "zinc-finger domain"), as well as the domains Y1 and CoV-Y of unknown functions. There are also two transmembrane regions, TM1 and TM2, which exist in all CoVs.
