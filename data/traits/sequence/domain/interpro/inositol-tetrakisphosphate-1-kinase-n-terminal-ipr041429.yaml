label: "Inositol-tetrakisphosphate 1-kinase, N-terminal"
definition: >-
  This entry represents the N-terminal domain of inositol-tetrakisphosphate 1-kinase (ITPK1), which is a kinase that can phosphorylate various inositol polyphosphate such as Ins(3,4,5,6)P4 or Ins(1,3,4)P3.
