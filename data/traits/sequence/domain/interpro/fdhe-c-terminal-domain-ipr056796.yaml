identifier: InterPro:IPR056796
label: "FdhE, C-terminal domain"
definition: >-
  This is the C-terminal domain of FdhE from Escherichia coli and similar proteins necessary for formate dehydrogenase activity. This domain is found associated with and . It shows an α-β configuration. This entry contains formate dehydrogenase accessory protein FdhE and its homologues, found largely in proteobacteria, where the fdhE genes are almost always genetically-linked to the structural genes for formate dehydrogenases. FdhE is required for the assembly of formate dehydrogenase although not present in the final complex. In E.coli, FdhE interacts with the catalytic subunits of the respiratory formate dehydrogenases. FdhE is an iron-binding rubredoxin that can adopt monomeric and homodimeric forms. E.coli FdhE interacts with the catalytic subunits, FdnG and FdoG, of the Tat-dependent respiratory formate dehydrogenases. Site-directed mutagenesis has shown that conserved cysteine motifs are essential for the physiological activity of the FdhE protein and are also involved in Fe(III) ligation. The iron likely is redox active, suggesting that the switch from aerobic to anaerobic conditions may be important in modulating FdhE function. Alternatively, FdhE may be involved in an electron transfer reaction, similar to other rubredoxins.
