identifier: InterPro:IPR057382
label: "Type VI secretion system effector TseH-like"
definition: >-
  This domain is found in the Type VI secretion system effector TseH and related bacterial proteins. TseH structure is significantly similar to papain-like proteases, including the conserved active site architecture ( ). This domain is standalone or combined with. V. cholerae T6SS effector TseH is a PAAR-dependent species-specific effector. It is highly toxic to Aeromonas and Edwardsiella species, bacteria that V. cholerae encounters in natural environments or common hosts.
