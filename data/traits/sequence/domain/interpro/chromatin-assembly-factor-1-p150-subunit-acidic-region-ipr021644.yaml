identifier: InterPro:IPR021644
label: "Chromatin assembly factor 1 p150 subunit, acidic region"
definition: >-
  This entry represents the acidic region of CAF-1 p150 subunit which constitutes part of the histone binding interface. Chromatin assembly factor 1 (CAF-1) consists of three evolutionary conserved subunits, p150, p60, and p48 (yeast homologues Cac1, cac2 and cac3 respectively), and mediates the assembly of nucleosomes onto newly replicated DNA. The p150 subunit (CAF-1_p150, also known as subunit A) is the core component of the CAF-1 histone chaperone complex, which functions in depositing newly synthesised and acetylated histones H3/H4 into chromatin during DNA replication and repair, being essential for cell viability and efficient DNA replication. The p150 subunit contains the interaction regions with proliferating cell nuclear antigen (PCNA), heterochromatin protein 1 (HP1), the CAF-1 p60 subunit among others proteins. It is thought that the DNA association with two histone-bound CAF-1 complexes may promote the formation of the (H3-H4)2 tetramer on DNA.
