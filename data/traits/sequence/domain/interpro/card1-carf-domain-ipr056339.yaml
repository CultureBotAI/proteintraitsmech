identifier: InterPro:IPR056339
label: "Card1, CARF domain"
definition: >-
  This is the CARF domain found at the N-terminal of a set of bacterial proteins, including Card1 (cyclic-oligoadenylate-activated single-stranded ribonuclease and single-stranded deoxyribonuclease 1) from Treponema succinifaciens ( ), a protein that is part of type III CRISPR-Cas immune response system. This protein consists of a CARF (CRISPR-associated Rossmann fold) domain at the N-terminal, an helical hinge domain and a C-terminal endonuclease domain ( ).
