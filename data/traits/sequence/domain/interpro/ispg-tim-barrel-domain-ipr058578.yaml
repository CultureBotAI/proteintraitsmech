identifier: InterPro:IPR058578
label: "IspG, TIM-barrel domain"
definition: >-
  This entry represents the TIM barrel domain of 4-hydroxy-3-methylbut-2-en-1-yl diphosphate synthase (IspG) and homologues. In a variety of organisms, including plants and several eubacteria, isoprenoids are synthesised by the mevalonate-independent 2-C-methyl-D-erythritol 4-phosphate (MEP) pathway. The MEP pathway is an alternative to the mevalonate pathway and is essential in bacteria, plant chloroplasts, some parasites (such as Plasmodium), but not in animals. Although different enzymes of this pathway have been described, the terminal biosynthetic steps of the MEP pathway have not been fully elucidated. IspG (also known as GcpE gene) of Escherichia coli is involved in this pathway. IspG catalyses the conversion of 2-C-methyl-D-erythritol 2,4-cyclodiphosphate (MEcPP) into (E)-4-hydroxy-3-methylbut-2-en-1-yl diphosphate (HMB-PP), using reducing equivalents donated by ferredoxin or flavodoxin proteins. IspG is a [4Fe-4S] iron-sulfur cluster protein, and the presence of this cluster is critical for its catalytic activity.
