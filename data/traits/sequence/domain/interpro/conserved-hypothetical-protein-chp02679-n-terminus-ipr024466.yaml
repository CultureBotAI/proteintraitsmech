identifier: InterPro:IPR024466
label: "Conserved hypothetical protein CHP02679, N terminus"
definition: >-
  This domain is found to the N terminus of bacterial conserved hypothetical proteins which are encoded within a conserved gene four-gene neighbourhood found sporadically in a phylogenetically broad range of bacteria including: Nocardia farcinica, Symbiobacterium thermophilum, and Streptomyces avermitilis (Actinobacteria), Geobacillus kaustophilus (Firmicutes), Azoarcus sp. EbN1 and Ralstonia solanacearum (Beta-proteobacteria).
