identifier: InterPro:IPR047067
label: "Actin-binding protein IPP, BACK domain"
definition: >-
  IPP (also known as Kelch-like protein 27) belongs to the KLHL family. It binds to actin through its kelch repeat domain. It may play a role in organizing the actin cytoskeleton, however, its exact function is not clear. This entry represents the BACK domain.
