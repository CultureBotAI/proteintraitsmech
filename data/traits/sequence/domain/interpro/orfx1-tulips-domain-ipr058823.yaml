identifier: InterPro:IPR058823
label: "Orfx1, TULIPs domain"
definition: >-
  This domain is found in the Orfx1, a protein encoded in the orfX gene cluster from certain strains of Clostridium botulinum, specifically those producing botulinum neurotoxin type E (BoNT/E1). OrfX1 adopts the so-called TULIPs (Tubular lipid binding proteins) domain fold, which is characteristic of a superfamily of lipid-binding proteins known as Aha1/BPI domain-like. This similarity suggests a potential role in lipid binding, which could be important for interactions with host or bacterial membranes during oral intoxication by botulinum neurotoxins. OrfX1 forms a stable complex with another protein from the same cluster, OrfX3. Together, they create a heterodimer with extensive polar and hydrophobic interactions at their interface. This OrfX1-OrfX3 complex closely mimics the structure of the full-length OrfX2 protein.
