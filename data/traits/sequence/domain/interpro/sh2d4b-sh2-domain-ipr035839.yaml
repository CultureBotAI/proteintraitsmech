identifier: InterPro:IPR035839
label: "SH2D4B, SH2 domain"
definition: >-
  SH2D4B contains a single SH2 domain. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites.
