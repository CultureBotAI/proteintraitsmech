identifier: InterPro:IPR035503
label: "IOC4-like, PWWP domain"
definition: >-
  This PWWP domain is found in Loc4 (ISWI one complex protein 4), a component of of the S. cerevisiae ISW1B complex, as well as in S. pombe PWWP domain-containing protein2 (SPBC215.07c). The ISWI (imitation switch) complex acts in chromatin remodelling. SPBC215.07c has also been proposed to bind chromatin.
