identifier: InterPro:IPR037523
label: "Vicinal oxygen chelate (VOC), core domain"
definition: >-
  This entry represents the core domain in Vicinal oxygen chelate (VOC) proteins. The core domain has topological symmetry, being comprised of two β-α-β-β-β units that form an incompletely closed barrel of β-sheet about the metal ion. This domain mediates the reactions via its structure and protein-chelating residues that secure and localise a metal ion. The vicinal oxygen chelate (VOC) family of enzymes is a diverse group of proteins found across all domains of life, including bacteria, archaea, and eukarya. These enzymes catalyse a wide range of chemical reactions through a common mechanistic feature: bidentate coordination to a divalent metal centre via vicinal oxygen atoms in the substrate, intermediate, or transition state. The widespread presence of VOC enzymes across all domains of life highlights their evolutionary significance and critical roles in diverse metabolic pathways and cellular functions. Some members of this family include: Bacillus thuringiensis, Metallothiol transferase FosB Caenorhabditis elegans, 4-hydroxyphenylpyruvate dioxygenase Arabidopsis thaliana, Lactoylglutathione lyase Homo sapiens, Glyoxalase domain-containing protein 5 .
