identifier: InterPro:IPR056872
label: "TTC3/DZIP3-like, helical domain"
definition: >-
  This domain is found in human E3 ubiquitin-protein ligase TTC3, E3 ubiquitin-protein ligase DZIP3 and similar sequences predominantly found in vertebrates. TTC3 catalyses the formation of 'Lys-48'- polyubiquitin chains and regulates Akt signalling, TGFB1-induced epithelial-mesenchymal transition and myofibroblast differentiation, neuronal differentiation and cell proliferation. This domain is predicted to adopt an α-helical configuration.
