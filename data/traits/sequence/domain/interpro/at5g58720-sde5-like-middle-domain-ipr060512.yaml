identifier: InterPro:IPR060512
label: "At5g58720/SDE5-like, middle domain"
definition: >-
  This domain is found in the middle region of putative nuclear RNA export factor SDE5, SMR domain-containing protein At5g58720 from Arabidopsis thaliana and related sequences. SDE5 is involved in sense transgene post-transcriptional gene silencing (S-PTGS) and is an essential component of the trans-acting short interfering RNA (tasiRNA) pathway. Together with SGS3, it cooperatively recruits RDR6 to a specific RNA that serves as a template for dsRNA formation. This domain may adopt a ubiquitin-associated (UBA)-like fold and it is often found associated with .
