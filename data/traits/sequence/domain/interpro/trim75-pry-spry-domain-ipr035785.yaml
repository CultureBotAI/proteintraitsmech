identifier: InterPro:IPR035785
label: "TRIM75, PRY/SPRY domain"
definition: >-
  This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C terminus of TRIM75, also known as Gm794. TRIM proteins are defined by the presence of the tripartite motif RING/B-box/coiled-coil region and are also known as RBCC proteins. TRIM75 is an antiviral candidate gene within the primate TRIM family. It has not yet been characterised.
