identifier: InterPro:IPR053927
label: "Flagellar hook-associated protein FlgK, helical domain"
definition: >-
  This entry represents a mainly helical domain found in flagellar hook-associated protein FlgK (also called Flagellar hook-associated protein 1) and related proteins mostly from bacteria. FlgK is one of three hook associated proteins that form the hook-filament junction. This domain adopts a broken antiparallel helical bundle comprising six helical segments.
