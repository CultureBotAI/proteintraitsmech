identifier: InterPro:IPR061925
label: "Nucleoid occlusion protein, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of nucleoid occlusion proteins from the ParB family found in firmicutes. This protein functions to prevent Z-ring assembly over the bacterial nucleoid, thereby coordinating cell division with chromosome segregation. This domain is located downstream of the central HTH DNA-binding domain and N-terminal ParB domain. This region contributes to the structural integrity and regulatory properties of the nucleoid occlusion protein.
