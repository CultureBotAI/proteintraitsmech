identifier: InterPro:IPR055043
label: "CARDS D2, beta trefoil domain"
definition: >-
  This domain is found at the C-terminal end of ADP-ribosylating toxin CARDS from Mycoplasma pneumoniae, the main virulence factor for this bacteria. CARDS (for Community-Acquired Respiratory Distress Syndrome Toxin) is organised into three domains, an N-terminal and tandem C-terminal β-trefoil domain. This entry represents the second domain (named D2).
