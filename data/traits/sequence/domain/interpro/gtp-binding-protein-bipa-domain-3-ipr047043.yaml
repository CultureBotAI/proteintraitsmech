identifier: InterPro:IPR047043
label: "GTP-binding protein BipA, domain 3"
definition: >-
  BipA (also called TypA) is a highly conserved protein with global regulatory properties in Escherichia coli. Mutants show altered regulation of some pathways. BipA is a 50S ribosomal subunit assembly protein with GTPase activity, required for 50S subunit assembly at low temperatures and it also functions as a translation factor that is required specifically for the expression of the transcriptional modulator Fis. BipA binds to ribosomes at a site that coincides with that of EF-G and has a GTPase activity that is sensitive to high GDP:GTP ratios and is stimulated by 70S ribosomes programmed with mRNA and aminoacylated tRNAs. The growth rate-dependent induction of BipA allows the efficient expression of Fis, thereby modulating a range of downstream processes, including DNA metabolism and type III secretion. This GTPase impacts interactions between enteropathogenic E.coli (EPEC) and epithelial cells and also has an effect on motility. It appears to be involved in the regulation of several processes important for infection, including rearrangements of the cytoskeleton of the host, bacterial resistance to host defence peptides, flagellum-mediated cell motility, and expression of K5 capsular genes. This entry also includes TypA-like SVR3 from Arabidopsis, a putative chloroplastic elongation factor involved in response to chilling stress. It is required for proper chloroplast rRNA processing and/or translation at low temperature and it is also involved in plastid protein homeostasis. This entry represents domain III of BipA/TypA, which adopts an α/β structure.
