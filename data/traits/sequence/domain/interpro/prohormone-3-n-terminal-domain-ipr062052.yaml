identifier: InterPro:IPR062052
label: "Prohormone-3, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of prohormone-3 and related ITG-like peptide precursors found in hymenopteran insects. The domain is located downstream of the bioactive peptide cleavage sites in these prohormone precursors. Prohormone-3 from Apis mellifera contains the brain peptide ITGQGNRIF which has been characterised by mass spectrometry. A similar ITG-like peptide (ITGQGNRIY) has been identified in Camponotus floridanus and is expressed throughout the nervous system. The specific function of this N-terminal domain remains to be determined.
