identifier: InterPro:IPR062062
label: "YOL036W-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of uncharacterised fungal proteins. The domain is approximately 60 amino acids in length and is found in proteins such as YOL036W from Saccharomyces cerevisiae and YIR016W. YOL036W is phosphorylated by CDC28 and has been identified in large-scale proteomic studies. The domain is found in fungi including Saccharomyces cerevisiae, Schizosaccharomyces pombe, and Candida species. The function of this C-terminal domain remains to be determined.
