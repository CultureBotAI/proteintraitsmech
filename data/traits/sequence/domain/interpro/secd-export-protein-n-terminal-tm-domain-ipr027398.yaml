identifier: InterPro:IPR027398
label: "SecD export protein N-terminal TM domain"
definition: >-
  This domain appears to be the fist transmembrane region of the SecD export protein. SecD is directly involved in protein secretion and important for the release of proteins that have been translocated across the cytoplasmic membrane. This domain is also found in modulator protein MzrA, which modulates the activity of the EnvZ/OmpR two-component regulatory system.
