identifier: InterPro:IPR025583
label: "HMG-CoA reductase, N-terminal domain"
definition: >-
  This domain is found at the N terminus of fungal 3-hydroxy-3-methylglutaryl-coenzyme A (HMG-CoA) reductase, which catalyses the conversion of HMG-CoA to mevalonate. There is a well-conserved characteristic HPIH motif, but the function of the domain is not known.
