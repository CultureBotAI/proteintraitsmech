identifier: InterPro:IPR063575
label: "DD3-3, cupredoxin-like domain"
definition: >-
  This entry represents a cupredoxin-like domain found in DD3-3 and related proteins from amoebozoa and animals. DD3-3 is a membrane glycoprotein that may participate in O-glycosylation processes. The protein is a single-pass type I membrane protein with a large extracellular domain and short cytoplasmic tail. DD3-3 is developmentally regulated, with expression appearing at the growth phase and increasing after starvation. The protein is down-regulated by phagocytic stimuli and its disruption affects cAMP-dependent phosphodiesterase regulation. The specific function of this domain remains to be determined.
