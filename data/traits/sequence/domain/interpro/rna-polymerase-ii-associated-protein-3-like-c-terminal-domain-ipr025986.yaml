identifier: InterPro:IPR025986
label: "RNA-polymerase II-associated protein 3-like, C-terminal domain"
definition: >-
  This domain is found at the C terminus of the RNA-polymerase II-associated protein 3 (RPAP3). RPAP3 binds to Monad and is involved in regulating apoptosis. This domain represents the potential Monad-binding region of RPAP3. RPAP3 contains TPR-repeats towards the N terminus. This domain is also found in other proteins with TPR-repeats at the N terminus, like sperm-associated antigen 1, and in proteins without TPR-repeats.
