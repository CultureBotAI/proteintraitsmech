identifier: InterPro:IPR033658
label: "Glutaredoxin, PICOT-like"
definition: >-
  This entry represents a glutaredoxin (GRX) domain found in PICOT (also known as glutaredoxin-3 or PKC-interacting cousin of thioredoxin) and GRX-PICOT-like proteins. The non-PICOT members of this group contain only the GRX-like domain, whereas PICOT contains an N-terminal TRX-like domain followed by one to three GRX-like domains. It is interesting to note that PICOT from plants contains three repeats of the GRX-like domain, metazoan proteins (except for insect) have two repeats, while fungal sequences contain only one copy of the domain. PICOT is a protein that interacts with protein kinase C (PKC) theta, a calcium-independent PKC isoform selectively expressed in skeletal muscle and T lymphocytes. PICOT inhibits the activation of c-Jun N-terminal kinase and the transcription factors AP-1 and NF-kB, induced by PKC theta or T-cell activating stimuli. Both GRX and TRX domains of PICOT are required for its activity. Characterised non-PICOT proteins with this domain include CXIP1, a CAX-interacting protein in Arabidopsis thaliana, and PfGLP-1, a GRX-like protein from Plasmodium falciparum.
