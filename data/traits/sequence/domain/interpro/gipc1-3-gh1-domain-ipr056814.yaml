identifier: InterPro:IPR056814
label: "GIPC1-3, GH1 domain"
definition: >-
  This entry represents the GIPC homology 1 (GH1) domain found in the GIPC proteins (GAIP interacting protein, C terminus) 1-3, PDZ domain-containing proteins, and similar animal sequences. GIPC1-3 may act as scaffold proteins linking heterotrimeric G-proteins to seven-transmembrane-type WNT receptor or to receptor tyrosine kinases. They might play key roles in carcinogenesis and embryogenesis through modulation of growth factor signalling and cell adhesion. GIPCs are proteins with a GIPC homology 1 (GH1) domain, a central PDZ domain and a GH2 domain.
