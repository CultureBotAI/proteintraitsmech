label: "DNA polymerase III, subunit gamma/ tau, C-terminal"
definition: >-
  This domain is found in bacteria, and is approximately 120 amino acids in length. It is found in association with . The proteins in this family are frequently annotated as the gamma and tau subunits of DNA polymerase III, however there is little accompanying literature to back this up.
