identifier: InterPro:IPR028853
label: "ARID4B, ARID/BRIGHT domain"
definition: >-
  This entry represents the AT-rich ARID/BRIGHT DNA binding domain of ARID4B. AT-rich interactive domain-containing protein 4B (ARID4B, also known as RBBP1-like 1 (RBBP1L1)) is homologous to ARID4A (or Retinoblastoma-binding protein 1 (RBBP1)) which are involved in cell cycle control. Together with retinoblastoma protein (RB) and Sin3 they form the Sin3 complex involved in gene regulation and epigenetic regulation functions. They also function as transcriptional coactivators for the androgen receptor (AR) and RB, being important for the AR and RB regulatory pathways, involved in the regulation of Sertoli cell function and male fertility. These proteins share the same domain architecture consisting of an interdigitated double Tudor, PWWP, ARID, chromo barrel and R2 domains, connected by intrinsically disordered regions.
