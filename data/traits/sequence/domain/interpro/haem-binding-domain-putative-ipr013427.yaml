identifier: InterPro:IPR013427
label: "Haem-binding domain, putative"
definition: >-
  This entry represents a protein domain found predominantly in bacterial species. A large number of paralogues exist in some of the species that contain it. For example, more than twenty copies are found in Rhodopirellula baltica SH 1 and Verrucomicrobium spinosum DSM 4136. This domain is approximately 140 amino acids long and contains an absolutely conserved motif CxxCH, which is the cytochrome c family haem-binding site signature.
