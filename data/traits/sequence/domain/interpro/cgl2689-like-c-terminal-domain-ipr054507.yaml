identifier: InterPro:IPR054507
label: "CGL2689-like, C-terminal domain"
definition: >-
  This entry represents the α-helical C-terminal domain of CGL2689 from Corynebacterium glutamicum and similar sequences from actinomycetes. CGL2689 is a putative dehydrogenase that contain an N-terminal Rossmann domain. This domain is involved in dimerisation by swapping of helices along a central long α-helix axis.
