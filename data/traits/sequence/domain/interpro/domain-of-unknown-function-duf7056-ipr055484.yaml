identifier: InterPro:IPR055484
label: "Domain of unknown function DUF7056"
definition: >-
  This is a presumed domain found in a group of uncharacterised sequences from bacteria. According to structure predictions, this domain is found towards the C-terminal, after a glycosyltransferase domain ( ), and it may adopt an α/β structure. In some instances, this domain is followed by and all-β domain at the very C-terminal of the sequences ( ). The function of this domain is unknown.
