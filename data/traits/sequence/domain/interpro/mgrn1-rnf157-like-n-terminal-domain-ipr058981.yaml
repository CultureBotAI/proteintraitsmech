identifier: InterPro:IPR058981
label: "MGRN1/RNF157-like, N-terminal domain"
definition: >-
  This entry describes the N-terminal domain in E3 ubiquitin ligases, including MGNR1, LUL1-4, RNF157 and LOG2. E3 ubiquitin ligase proteins are involved in the ubiquitination process, where ubiquitin is transferred to substrate proteins, marking them for degradation or altering their cellular functions. MGRN1 is involved in endosome-to-lysosome trafficking and negatively regulates signalling pathways like hedgehog signalling. RNF157 is crucial for neuronal survival and dendrite maintenance, acting as a scaffold in signalling pathways that regulate the cell cycle. LOG2 and its subfamily members, including LUL proteins, are involved in amino acid homeostasis and secretion. This domain is usually found N-terminal to the C3HC4 zinc finger ( ). In human RNF157 ( ), the N-terminal domain binds to the second PTB domain of Fe65. This domain is predicted to have an Ig-like fold.
