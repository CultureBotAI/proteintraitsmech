identifier: InterPro:IPR024534
label: "Wadjet protein JetD, C-terminal"
definition: >-
  This is a domain found at the C-terminal of Wadjet protein JetD from Bacillus cereus. JetD is a component of the antiplasmid transformation system Wadjet type I, composed of JetA, JetB, JetC and JetD. Expression of Wadjet type I in B.subtilis (strain BEST7003) reduces the transformation efficiency of plasmid pHCMC05. This domain is structurally similar to DNA topoisomerases, therefore, it may be a DNA-binding domain.
