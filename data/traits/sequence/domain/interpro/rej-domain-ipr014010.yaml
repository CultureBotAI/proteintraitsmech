identifier: InterPro:IPR014010
label: "REJ domain"
definition: >-
  The REJ domain is an extracellular module of ~700 amino acids, which is found associated with other domains, such as EGF, the GPS proteolytic cleavage site, C-type lectin, SUEL-type lectin, LRR, LDL-A, PLAT, PKD. Although its function is unknown, the REJ domain has been shown to be required for cleavage to occur at the GPS. It has been proposed that the REJ domain might function in ion transport homeostasis. REJ domain from Polycystin-1 is required for cleavage at the G-protein coupled proteolytic site (GPS) or the ectodomain, a process that is essential for kidney structure and function.
