identifier: InterPro:IPR035750
label: "Fyn/Yrk, SH3 domain"
definition: >-
  Fyn and Yrk (Yes-related kinase) are members of the Src subfamily of proteins, which are cytoplasmic (or non-receptor) PTKs. Fyn is involved in the control of cell growth and is required in diverse pathways, including T and B cell receptor signalling, integrin-mediated signalling, growth factor and cytokine receptor signalling, platelet activation, ion channel function, cell adhesion, axon guidance, fertilisation, entry into mitosis, and differentiation of natural killer cells, oligodendrocytes and keratinocytes. Fyn, together with Lck, plays a critical role in T-cell signal transduction by phosphorylating ITAM (immunoreceptor tyr activation motif) sequences on T-cell receptors, ultimately leading to the proliferation and differentiation of T-cells. In addition, Fyn is involved in the myelination of neurons, and is implicated in Alzheimer's and Parkinson's diseases. Yrk has been detected only in chickens. It is primarily found in neuronal and epithelial cells and in macrophages. It may play a role in inflammation and in response to injury. Src kinases contain an N-terminal SH4 domain with a myristoylation site, followed by SH3 and SH2 domains, a tyr kinase domain, and a regulatory C-terminal region containing a conserved tyr. They are activated by autophosphorylation at the tyr kinase domain, but are negatively regulated by phosphorylation at the C-terminal tyr by Csk (C-terminal Src Kinase). The SH3 domain of Src kinases contributes to substrate recruitment by binding adaptor proteins/substrates, and regulation of kinase activity through an intramolecular interaction.
