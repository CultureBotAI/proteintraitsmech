identifier: InterPro:IPR021669
label: "Bd37, core domain"
definition: >-
  This entry represents the core domain of Bd37 (also known as Glycosylphosphatidylinositol-anchored merozoite surface protein), a surface antigen of B.divergens which is GPI-anchored at the surface of the merozoite. The structure of the protein consists of mainly α folds and has three sub domains.
