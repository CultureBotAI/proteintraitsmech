identifier: InterPro:IPR063361
label: "Cullin-associated NEDD8-dissociated protein 1 homolog, N-terminal"
definition: >-
  This entry represents the N-terminal domain of a cullin-associated NEDD8-dissociated protein homologue (known also as CAND1 homolog). This domain is found in proteins involved in SCF E3 ubiquitin ligase complex regulation from fungi. CAND1 homolog acts as an assembly factor and F-box protein exchange factor for SCF complexes and interacts with unneddylated cullin CDC53. The domain contains a neddylation site and is involved in longevity assurance. The function of this domain remains to be determined.
