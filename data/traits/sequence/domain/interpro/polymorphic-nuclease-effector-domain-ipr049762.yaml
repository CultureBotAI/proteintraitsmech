identifier: InterPro:IPR049762
label: "Polymorphic Nuclease effector domain"
definition: >-
  The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This entry contains proteins with PoNe domains that co-occur with varied N-terminal domains such as DUF637 ( ), in some instances, predicted to be a hemagglutinin domain.
