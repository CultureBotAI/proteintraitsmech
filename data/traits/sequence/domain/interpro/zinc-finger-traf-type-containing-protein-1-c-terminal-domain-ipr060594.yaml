identifier: InterPro:IPR060594
label: "Zinc finger TRAF-type-containing protein 1, C-terminal domain"
definition: >-
  This entry represents the C-terminal TRAF-type zinc finger domain found in cysteine and histidine-rich protein 1 (CYHR1) and related animal proteins. CYHR1 belongs to the ZFTRAF1 family and contains both RING-type and TRAF-type zinc finger domains. The TRAF domain superfamily has a circularly permuted immunoglobulin-fold topology with an extra β-strand. The protein interacts with ubiquitin-conjugating enzyme UBC4, suggesting involvement in ubiquitin-mediated processes. The specific function of this domain remains to be determined.
