identifier: InterPro:IPR046624
label: "Secreted protein CSS2, C-terminal domain"
definition: >-
  This entry represents a domain found at the C-terminal end of Secreted protein CSS2 from Saccharomyces cerevisiae and in other uncharacterised proteins mainly found in yeast. CSS2 is a protein of unknown function that is secreted when constitutively expressed. It is approximately 130 amino acids in length.
