identifier: InterPro:IPR057323
label: "RHG40/28/18, C-terminal ubiquitin-like domain"
definition: >-
  This domain is found at the C-terminal end of human Rho GTPase-activating protein 40, 28 and 18 (RHG40/28/18) and similar GTPase activators for Rho-type GTPases. This activity plays a crucial role in regulating cellular processes such as actin polymerisation, cell shape, spreading, and migration. This domain is predicted to adopt an ubiquitin-like fold and is usually found associated to .
