identifier: InterPro:IPR057261
label: "Sororin-like, middle region"
definition: >-
  This entry represents the middle region of Sororin and related animal proteins. According to structure predictions, this region is likely disordered. Sororin is an essential, cell cycle-dependent mediator of sister chromatid cohesion. The protein is nuclear in interphase cells, dispersed from the chromatin in mitosis, and interacts with the cohesin complex. This protein protects cohesin from WAPL, which otherwise releases cohesin from DNA. This entry also includes dalmatian, a sororin-related protein from Drosophila melanogaster that combines protein functions of Sororin and Shugoshin to promote and protect cohesion.
