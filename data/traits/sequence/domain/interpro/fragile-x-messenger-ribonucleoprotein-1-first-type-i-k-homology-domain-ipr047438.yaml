identifier: InterPro:IPR047438
label: "Fragile X messenger ribonucleoprotein 1, first type I K homology domain"
definition: >-
  This entry represents the first KH domain of FMR1, also known as KH0, which is a divergent KH domain that lacks the RNA-binding GXXG motif. Fragile X messenger ribonucleoprotein 1 (FMRP/FMR1), and its paralogues, FXR1 and FXR2 (RNA-binding protein FXR1 and 2, respectively), comprise a family of RNA-binding proteins. These are multifunctional polyribosome-associated proteins that play a central role in neuronal development and synaptic plasticity. They are involved in regulation of alternative mRNA splicing, mRNA stability, mRNA dendritic transport and postsynaptic local protein synthesis of a subset of mRNAs. They are highly similar to one another and also retain highly conserved domain architecture comprising two tandem Tudor Agenet-like domains at the N-terminal, three ribonucleoprotein K homology (KH) domains and a cluster of arginine and glycine residues that constitute the RGG box. FMR1 performs nucleocytoplasmic shuttling of mRNA by a non-canonical nuclear localization signal (NLS) and a nuclear export signal. This protein plays a central role in neuronal development and synaptic plasticity and is able to modulate the DNA damage response. It is also required for ovary development and function. FMR1 has also been shown to interact with components of the miRNA pathway. A large expansion of the CGG trinucleotide repeat in the 5'-untranslated region of the FMR1 gene causes Fragile X syndrome (FXS), an inherited developmental disorder that causes a broad range of intellectual and physical challenges.
