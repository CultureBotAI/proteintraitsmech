identifier: InterPro:IPR057755
label: "Netrin receptor UNC5A-D-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal immunoglobulin-like (Ig-like) domain of Netrin receptor UNC5A-D and similar animal proteins. This domain is not present in mice and human UNC5C-like proteins . UNC-5 proteins are transmembrane netrin receptors that play a crucial role in axon guidance and neuronal development. Upon binding to secreted netrins (netrin-1, -3, and -4), these receptors mediate axonal repulsion of neuronal growth cones, contributing to proper nervous system patterning. In addition to axonal guidance, UNC-5 receptors are involved in neuronal migration, blood vessel patterning, cell-cell adhesion, cell migration, and apoptosis. Structurally, they possess an extracellular region comprising two immunoglobulin-like repeats and two thrombospondin type-I modules, along with an intracellular region containing ZU-5, UPA, and death domains (DD), which facilitate downstream signalling.
