identifier: InterPro:IPR044074
label: "Formyltetrahydrofolate deformylase, ACT domain"
definition: >-
  An Escherichia coli gene designated purU has been identified and characterised. The gene codes for a 280-amino-acid protein, PurU ( , ). PurU is an enzyme that catalyses the hydrolysis of 10-formyltetrahydrofolate (formyl-FH4) to FH4 and formate. 10-formyltetrahydrofolate + H(2)O = formate +tetrahydrofolate Formyl-FH4 hydrolase generates the formate that is used by purT-encoded 5'-phosphoribosylglycinamide transformylase for step three of de novo purine nucleotide synthesis. Formyl-FH4 hydrolase, a hexamer of 32kDa subunits, is activated by methionine and inhibited by glycine. Heterotropic cooperativity is observed for activation by methionine in the presence of glycine and for inhibition by glycine in the presence of methionine. These results suggest that formyl-FH4 hydrolase is a regulatory enzyme whose main function is to balance the pools of FH4 and C1-FH4 in response to changing growth conditions. The enzyme uses methionine and glycine to sense the pools of C1-FH4 and FH4, respectively. This entry also includes PurU from Arabidopsis, which is involved in photorespiration. It prevents the excessive accumulation of 5-formyl tetrahydrofolate (THF), a potent inhibitor of the Gly decarboxylase/Ser hydroxymethyltransferase complex. This entry represents the N-terminal ACT domain of formyltetrahydrofolate deformylase.
