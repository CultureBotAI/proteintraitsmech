identifier: InterPro:IPR057316
label: "Rab11-FIP3/4 domain"
definition: >-
  This domain is found in human Rab11 family-interacting protein 3 and 4 (Rab11-FIP3/4) and similar proteins mainly found in animals. Proteins in this family are involved in regulating endocytic trafficking, cytokinesis, and intracellular ciliogenesis by facilitating membrane delivery. This domain is predicted to adopt an α-helical configuration.
