identifier: InterPro:IPR004185
label: Glycoside hydrolase, family 13, N-terminal Ig-like domain
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. E or "early" set domains are associated with the catalytic domain of the cyclomaltodextrinase (CDase) and pullulan-degrading enzymes at the N-terminal end. The N-terminal domain of the CDase and pullulan-degrading enzymes may be related to the immunoglobulin and/or fibronectin type III superfamilies. This domain may be involved in homodimeric/tetrameric/dodecameric interactions. Enzymes containing this domain belong to family 13 ( ) of the glycosyl hydrolases. Members of this subgroup include CDase, maltogenic amylase, and neopullulanase, all of which are capable of hydrolyzing all or two of the following three types of substrates: cyclomaltodextrins (CDs), pullulan, and starch. These enzymes hydrolyze CDs and starch to maltose and pullulan to panose by cleavage of alpha-1,4 glycosidic bonds whereas alpha-amylases essentially lack activity on CDs and pullulan. They also catalyze transglycosylation of oligosaccharides to the C3-, C4- or C6-hydroxyl groups of various acceptor sugar molecules.
