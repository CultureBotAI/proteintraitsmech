identifier: InterPro:IPR022232
label: "Tripeptidyl peptidase II, C-terminal domain, arthropoda"
definition: >-
  This entry represents the C-terminal domain of tripeptidyl peptidase II (TPPII, MEROPS peptidase family S8A). TPPII is a crucial component of the proteolytic cascade acting downstream of the 26S proteasome in the ubiquitin-proteasome pathway. It is an amino peptidase belonging to the subtilase family removing tripeptides from the free N terminus of oligopeptides. It consists of three main parts: the N-terminal subtilisin-like domain, a central domain and a C-terminal domain.
