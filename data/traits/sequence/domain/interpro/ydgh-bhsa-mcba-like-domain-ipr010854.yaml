identifier: InterPro:IPR010854
label: "YdgH/BhsA/McbA-like domain"
definition: >-
  This domain is found in several Enterobacterial proteins of around 90 residues in length, including E. coli YdgH, YhcN, BhsA and McbA, which play a role in stress response, biofilm formation, and pathogenesis. BhsA (also known as ComC) reduces the permeability of the outer membrane to copper and may decrease biofilm formation by repressing cell-cell interaction and cell surface interaction. Members of this entry have one copy of this domain with the exception of YdgH, which has three. The function of this domain is unknown, however, it is suggested to be directly involved in host-pathogen interaction.
