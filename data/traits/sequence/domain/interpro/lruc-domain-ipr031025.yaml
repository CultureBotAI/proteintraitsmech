identifier: InterPro:IPR031025
label: "LruC domain"
definition: >-
  This domain is abundant in the Leptospira, in Bacteroides, and in Vibrio (three widely separated lineages). Most members have plausible lipoprotein signal peptides, including lipoprotein LruC from Leptospira interrogans and BACOVA_00967, from Bacteroides ovatus, with a solved crystal structure. Note that the C-terminal region of an uncharacerised domain ( ) (length 83) matches the N-terminal region of some members of this domain (length 243).
