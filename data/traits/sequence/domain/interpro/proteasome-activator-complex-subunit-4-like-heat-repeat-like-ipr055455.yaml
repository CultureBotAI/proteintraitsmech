identifier: InterPro:IPR055455
label: "Proteasome activator complex subunit 4-like, HEAT repeat-like"
definition: >-
  This domain is found in Proteasome activator complex subunit 4 (PSME4) and in similar sequences from animals and fungi as well as some uncharacterised proteins from plants. PSME4 is an associated component of the proteasome that specifically recognises acetylated histones and promotes ATP- and ubiquitin -independent degradation of core histones during spermatogenesis and DNA damage response. This protein adopts a dome-like structure composed of HEAT repeat-like modules interconnected through three long loops. This entry represents a region of HEAT repeats that contains a long loop. This domain is also found in the yeast Proteasome activator BLM10 which has been structurally and mechanistically characterised as a component of the proteasome complex.
