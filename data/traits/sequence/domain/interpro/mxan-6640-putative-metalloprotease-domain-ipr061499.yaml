label: "MXAN_6640 putative metalloprotease domain"
definition: >-
  Members of this entry are probably metalloproteases with an invariant HExxH motif. The domain may be found as a surface-anchored protein, as various members have the MYXO_CTERM sorting domain, the CFI-box-CTERM domain (NF041770), or the T9SS type A sorting domain. Some proteins are associated with .
