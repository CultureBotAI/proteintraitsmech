identifier: InterPro:IPR062423
label: "ZK643, helical domain"
definition: >-
  This entry represents a helical hairpin domain of ZK643.5-like proteins found in nematodes. ZK643.5 from Caenorhabditis elegans is a 487 amino acid uncharacterised protein with extensive predicted disordered regions. The protein is expressed in pharyngeal muscle cells and other tissues. This domain spans approximately 45 amino acids and follows the large disordered central region of the protein. The domain shows sequence similarity to RRM domain-containing proteins. The specific function of this helical domain remains to be determined.
