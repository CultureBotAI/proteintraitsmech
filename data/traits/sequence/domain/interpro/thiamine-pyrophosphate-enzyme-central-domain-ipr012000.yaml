identifier: InterPro:IPR012000
label: Thiamine pyrophosphate enzyme, central domain
definition: >-
  A number of enzymes require thiamine pyrophosphate (TPP) (vitamin B1) as a cofactor. It has been shown that some of these enzymes are structurally related. This entry represents the DHS-like NAD/FAD-binding domain of TPP enzymes, which contains a 2-fold Rossman fold.
