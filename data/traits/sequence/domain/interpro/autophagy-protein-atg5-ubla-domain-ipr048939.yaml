identifier: InterPro:IPR048939
label: "Autophagy protein ATG5, UblA domain"
definition: >-
  Autophagy protein ATG5 is involved in autophagic vesicle formation. It is conjugated with ATG12, acting as an E3-like ubiquitin enzyme required for lipidation of ATG8 family proteins and their association to the vesicle membranes. This is the N-terminal ubiquitin-like domain, termed UblA, from autophagy protein ATG5. ATG5 comprises two ubiquitin-like domains (UblA and UblB) that flank a helix-rich domain (HBR). Both UblA and UblB comprise a five-stranded sheet and two-helices.
