identifier: InterPro:IPR047337
label: "FYCO1, FYVE domain"
definition: >-
  This entry represents the FYVE domain of FYCO1 and similar proteins predominantly found in vertebrates. FYVE and coiled-coil domain-containing protein 1 (FYCO1) is a multidomain autophagy adaptor protein that interacts with kinesin motor proteins and with the autophagosomal membrane components microtubule-associated protein 1 light chain 3 (LC3), Rab7, and Phosphatidylinositol 3-phosphate (PI3P), to mediate microtubule plus-end-directed autophagosome transport. This protein is associated with congenital cataracts.
