identifier: InterPro:IPR003495
label: "CobW/HypB/UreG, nucleotide-binding domain"
definition: >-
  This domain is found in HypB, a hydrogenase expression/formation protein, and urease accessory protein UreG. Both these proteins contain a P-loop nucleotide binding motif. HypB has GTPase activity and is a guanine nucleotide binding protein. UreG is a GTPase in charge of nucleotide hydrolysis required for activation of the urease enzyme. Both GTPases are involved in nickel binding. HypB can store nickel and is required for nickel dependent hydrogenase expression. UreG is required for functional incorporation of the urease nickel metallocentre. GTP hydrolysis may required by these proteins for nickel incorporation into other nickel proteins. Other proteins containing this domain include P47K ( ), a Pseudomonas chlororaphis protein needed for nitrile hydratase expression, CobW ( ), which may be involved in cobalamin biosynthesis in Pseudomonas denitrificans, and YjiA. Both CobW and YjiA are members of the metal homeostasis-associated COG0523 family of GTPases.
