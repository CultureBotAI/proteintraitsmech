identifier: InterPro:IPR031915
label: "Cryptic loci regulator 2, N-terminal"
definition: >-
  This entry represents a domain carrying the first and second of three regions on Clr2 that are necessary for transcriptional silencing by the protein. Clr2 is part of the SHREC complex, an effector complex for heterochromatic transcriptional silencing.
