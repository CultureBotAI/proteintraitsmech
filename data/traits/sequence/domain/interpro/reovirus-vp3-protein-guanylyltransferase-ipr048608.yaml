identifier: InterPro:IPR048608
label: "Reovirus VP3 protein, guanylyltransferase"
definition: >-
  This domain family is found at the N-terminal end of Turret protein (TP), also known as VP3 ( ), from Reovirus. This guanylyltransferase (GTase) domain, responsible for the catalysis of the first step of RNA capping, consists of two subdomains, which form a deep and narrow cleft. This domain is rich in β-strands and adopts a pentameric assembly.
