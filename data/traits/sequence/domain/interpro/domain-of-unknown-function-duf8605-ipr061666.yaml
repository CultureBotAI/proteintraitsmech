label: "Domain of unknown function DUF8605"
definition: >-
  This is a domain of unknown function found in a group of uncharacterised bacterial sequences. This domain is found at the N-terminal of and may have a fold consisting of three anti-parallel β-strands followed by α-helices of which one is longer than the other two.
