identifier: InterPro:IPR048037
label: "Dimethylamine monooxygenase subunit DmmA-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the dimethylamine monooxygenase subunit DmmA from Methylocella silvestris (Msil_3607, ), Heme-dependent oxidative N-demethylase delta subunit from Ectopseudomonas mendocina, and similar sequences mainly found in proteobacteria and actinomycetes. Dimethylamine (DMA) monooxygenase is required for metabolism of trimethylamine N-oxide (TMAO).
