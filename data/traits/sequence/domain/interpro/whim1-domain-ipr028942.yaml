identifier: InterPro:IPR028942
label: "WHIM1 domain"
definition: >-
  WHIM1 is a conserved α helical motif that along with the WHIM2 and WHIM3 motifs, and the DDT domain comprise an α helical module found in diverse eukaryotic chromatin proteins.Based on the Ioc3 structure, this module is inferred to interact with nucleosomal linker DNA and the SLIDE domain of ISWI proteins. The resulting complex forms a protein ruler that measures out the spacing between two adjacent nucleosomes. The conserved basic residue in WHIM1 is involved in packing with the DDT motif. The module shows a great domain architectural diversity and is often combined with other modified histone peptide recognizing and DNA binding domains, some of which discriminate methylated DNA.
