identifier: InterPro:IPR014786
label: "Anaphase-promoting complex subunit 2, C-terminal"
definition: >-
  This entry represents a domain found in the C-terminal of APC subunit 2 (ANAPC2). ANAPC2 is part of the catalytic component of the anaphase promoting complex/cyclosome (APC/C), a cell cycle-regulated E3 ubiquitin ligase that controls progression through mitosis and the G1 phase of the cell cycle. The anaphase-promoting complex (APC) or cyclosome is a multi-subunit E3 protein ubiquitin ligase that regulates important events in mitosis, such as the initiation of anaphase and exit from telophase. The APC, in conjunction with other enzymes, assembles multi-ubiquitin chains on a variety of regulatory proteins, thereby targeting them for proteolysis by the 26S proteasome.
