label: "CadC, C-terminal domain"
definition: >-
  This entry represents the C-terminal TPR-like domain of CadC which forms the periplasmic domain together with. CadC is a transcriptional activator that regulates the lysine- and pH-dependent expression of the lysine decarboxylase CadA.
