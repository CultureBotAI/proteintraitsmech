identifier: InterPro:IPR001753
label: "Enoyl-CoA hydratase/isomerase-like domain"
definition: >-
  This entry contains a diverse set of enzymes from cellular organisms, including: fatty acid oxidation complex subunit alpha, enoyl-CoA hydratase, 1,4-dihydroxy-2-naphthoyl-CoA synthase (napthoate synthase), carnitinyl-CoA dehydratase (carnitine racemase), 3-hydroxybutyryl-CoA dehydratase and enoyl-CoA delta isomerase (dodecanoyl-CoA delta-isomerase).
