identifier: InterPro:IPR015330
label: "DNA primase/polymerase, bifunctional, N-terminal"
definition: >-
  Members of this family adopt a structure consisting of a core of antiparallel β sheets. They are found in various bacterial hypothetical proteins, and have been shown to harbour both primase and polymerase activities.
