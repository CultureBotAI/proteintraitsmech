identifier: InterPro:IPR035786
label: "TRIM60, PRY/SPRY domain"
definition: >-
  This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C terminus of TRIM60, which is also known as RING finger protein 33 (RNF33) or 129 (RNF129). TRIM proteins are defined by the presence of the tripartite motif RING/B-box/coiled-coil region and are also known as RBCC proteins. It mediates SUMOylation of TAB2 leading to inhibition of NF-kappa-B and MAPK pathways by suppressing the TRAF6/TAB2/TAK1 complex. Based on its expression profile, RNF33 likely plays an important role in the spermatogenesis process, the development of the pre-implantation embryo, and in testicular functions. RNF33 is temporally transcribed in the unfertilized egg and the pre-implantation embryo, and is permanently silenced before the blastocyst stage. Mice experiments have shown that RNF33 associates with the cytoplasmic motor proteins, kinesin-2 family members 3A (KIF3A) and 3B (KIF3B), suggesting possible contribution to cargo movement along the microtubule in the expressed sites.
