identifier: InterPro:IPR049142
label: "Mechanosensitive ion channel, transmembrane helices 2/3"
definition: >-
  This entry includes small conductance mechanosensitive channels (MscS), which assembles to a homoheptameric complex. Each monomer consists of an N-terminal transmembrane region and a large cytoplasmic segment composed of a five-stranded antiparallel β-sheet (middle/second) domain and a C-terminal α/β-domain. The N-terminal region consists of three membrane spanning helices (TM1, TM2 and TM3), TM2 and TM3 are represented in this entry. In the heptamer, the permeation pathway is formed by the packing of TM3s, flanked by TM1-TM2 helical hairpins.
