identifier: InterPro:IPR058401
label: "Domain of unknown function DUF8088"
definition: >-
  This entry represents the N-terminal domain found in a small family of uncharacterised bacillus proteins. Structure prediction suggest this domain might mediate homodimerisation. It is composed of a small three stranded β sheet with an α helix found between strands 1 and 2. This entry includes Uncharacterized protein pXO2-31/BXB0029/GBAA_pXO2_0029.
