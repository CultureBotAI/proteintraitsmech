identifier: InterPro:IPR037714
label: MSK2, N-terminal catalytic domain
definition: >-
  MSK1/2 (Mitogen and Stress-induced Kinase, also known as RSKB) are partially redundant serine/threonine kinases that are phosphorylated downstream of MAPK (Erk and/or p38-mediated) and cAMP signal transduction pathways. They phosphorylate multiple substrates, including CREB and Histone H3 and regulate specific subsets of Immediate Early genes (IEG). They are involved in limiting inflammation in innate immunity and is implicated in neurodegeneration and synaptic plasticity. MSKs contain an N-terminal kinase domain (NTD) from the AGC family and a C-terminal kinase domain (CTD) from the CAMK family, similar to 90kDa ribosomal protein S6 kinases (RSKs). This entry represents the N-terminal catalytic domain of MSK2. MSK2 is also known as ribosomal protein S6 kinase alpha-4 (RPS6KA4).
