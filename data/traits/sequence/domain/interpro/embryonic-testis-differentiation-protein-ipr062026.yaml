identifier: InterPro:IPR062026
label: "Embryonic testis differentiation protein"
definition: >-
  This entry represents embryonic testis differentiation (ETD) proteins found in mammals. ETD proteins are small peptides of approximately 59 amino acids with substantial disordered regions at the N-terminal. The mouse ETD protein is specifically expressed in testis and shows sexually dimorphic expression during gonadal differentiation from 12.5 to 14.5 days post coitum, being expressed in male but not female gonads. Human orthologues include ETDA, ETDB and ETDC located on the X chromosome. The proteins are tissue enriched in testis and may play a role in male gonadal development. The function of these proteins remains to be determined.
