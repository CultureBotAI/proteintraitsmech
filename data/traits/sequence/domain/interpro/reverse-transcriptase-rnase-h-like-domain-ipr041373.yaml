identifier: InterPro:IPR041373
label: "Reverse transcriptase, RNase H-like domain"
definition: >-
  This entry represents an RNase H-like domain found in a group of reverse transcriptases, including those transcribed as part of an enzymatic polyprotein. DNA polymerase and ribonuclease H (RNase H) activities allow reverse transcriptases to convert the single-stranded retroviral RNA genome into double-stranded DNA, which is integrated into the host chromosome during infection. This domain can also be found in animal retrotransposon-like proteins.
