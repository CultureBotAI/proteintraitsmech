identifier: InterPro:IPR047250
label: "TP53-binding protein 1-like, second BRCT domain"
definition: >-
  This entry represents the second BRCT domain of TP53-binding protein 1 (TP53BP1, also known as p53BP1 or 53BP1) and its homologue from C.elegans. TP53BP1 is a double-strand break (DSB) repair protein involved in response to DNA damage, telomere dynamics and class-switch recombination (CSR) during antibody genesis.
