identifier: InterPro:IPR056753
label: "DrmE-like, N-terminal domain"
definition: >-
  This domain is found in DISARM (Defense Island System Associated with Restriction-Modification) protein DrmE and related proteins from Halobacteria. It is predicted to adopt a globular structure composed of a central parallel β-sheet and α-helices packed on both sides of it.
