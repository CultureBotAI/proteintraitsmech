identifier: InterPro:IPR047673
label: "MtrA, receiver domain"
definition: >-
  This is the phosphoacceptor receiver (REC) domain of MtrA. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. This domain adopts a classical α/β fold with Flavodoxin-like topology and its phosphorylation modulates the protein activity. This entry includes the DNA-binding response regulator MtrA, which is a member of MtrA/MtrB, a highly conserved two-component system (TCS) implicated in the regulation of cell division in the actinobacteria, playing a role in secondary metabolism and morphological development. In unicellular Mycobacterium tuberculosis, MtrAB coordinates DNA replication with cell division and regulates the transcription of resuscitation-promoting factor B where MtrA is essential. In filamentous Streptomyces venezuelae, it links antibiotic production to sporulation. MtrA binds to a consensus recognition sequence, composed of a 17-nt sequence containing two direct repeats of six nt, and needs to be phosphorylated to act in regulon expression. In Streptomyces, MtrA has been additionally described as a novel nitrogen metabolism regulator. MtrA belongs to the OmpR family of DNA-binding response regulators that contain N-terminal receiver (REC) domain and C-terminal DNA-binding winged helix-turn-helix effector domains.
