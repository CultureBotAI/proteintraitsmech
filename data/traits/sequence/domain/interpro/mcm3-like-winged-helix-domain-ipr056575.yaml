identifier: InterPro:IPR056575
label: "MCM3-like, winged helix domain"
definition: >-
  This small C-terminal winged helix (WH) domain is found in the human DNA replication licensing factor MCM3 and similar eukaryotic sequences. MCM3 is a minichromosome maintenance (MCM) protein, a component of the MCM2-7 complex (MCM complex) which is the replicative helicase essential for 'once per cell cycle' DNA replication initiation and elongation in eukaryotic cells. The active ATPase sites in the MCM2-7 ring are formed through the interaction surfaces of two neighbouring subunits.
