identifier: InterPro:IPR021934
label: "Sox, C-terminal"
definition: >-
  The Sox transcription factors are members of the Sry-related protein family that play multiple roles, mainly during development. Sox18, together with Sox7 and -17, constitutes the subgroup F within this family. Sox18 contains three major domains:the N-terminal HMG box, the central TAD domain and the C-terminal domain that contains a 9aaTAD motif. This entry represents the C-terminal domain.
