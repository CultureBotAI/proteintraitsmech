identifier: InterPro:IPR048997
label: "Stonustoxin-like, helical domain"
definition: >-
  This entry represents the Stonustoxin helical domain. Stonustoxin is a large pore forming toxin found in stonefish. This entry contains Stonustoxin as well as a variety of other toxin proteins such as Veruccotoxin and Neoverrucotoxin.
