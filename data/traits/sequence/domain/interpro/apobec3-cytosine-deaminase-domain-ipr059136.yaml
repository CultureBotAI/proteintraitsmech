identifier: InterPro:IPR059136
label: "APOBEC3, cytosine deaminase domain"
definition: >-
  This domain is found in APOBEC3 (A/B/C/D/F/G) proteins and is homologous to known CMP/dCMP-type deaminase domains. APOBEC3 proteins are a family of cytidine deaminases that play a crucial role in the host's intrinsic immunity by restricting the replication of viruses - particularly retroviruses like HIV-1 - and inhibiting the transposition of endogenous elements such as LINE-1. In humans, there are seven APOBEC3 genes: A3A, A3B, A3C, A3D, A3F, A3G, and A3H, all located on chromosome 22. Each protein contains one or two zinc-binding domains, which are essential for their catalytic activity - the conversion of cytosine to uracil in single-stranded DNA, and sometimes RNA. Each APOBEC3 member differs in its tissue expression, oligomeric state, and mechanism of action, which influences their distribution and functionality. While some (A3A, A3C) are monomeric, others (A3B, A3D, A3F, A3G, A3H) can form multimeric complexes, which may affect their activity. In addition to viral restriction, some APOBEC3 proteins - especially A3A - can restrict gene transfer and degrade foreign DNA within cells. This may represent a distinct physiological function beyond antiviral defense. The AID/APOBEC are deaminases that function in RNA/DNA editing. The AID/APOBEC family contains several subfamilies: AID, APOBEC1, APOBEC2, APOBEC3, APOBEC4 and APOBEC5. AID/APOBEC deaminases (AADs) convert cytidine to uridine in single-stranded nucleic acids. They are involved in numerous mutagenic processes, including those underpinning vertebrate innate and adaptive immunity. APOBEC were suggested to originate from ancestral AID genes expressed in the lymphocytes of jawless fish over 500 million years ago. Gene duplication and diversification of AID structure and function, probably contributed to the evolut…
