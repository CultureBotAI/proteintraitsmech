label: "Immunity MXAN_0049 protein"
definition: >-
  This entry, previously known as DUF1629, represents a domain found in a group of bacterial proteins, including MXAN_0049 from Myxococcus xanthus ( ), which adopts an α-β structure ( ). This domain covers the whole length of the protein in most members and is found associated with ( ) in others. Some members were identified as immunity proteins.
