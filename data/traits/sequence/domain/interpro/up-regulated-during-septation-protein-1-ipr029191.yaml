identifier: InterPro:IPR029191
label: "Up-regulated during septation protein 1"
definition: >-
  This entry represents a domain found in fungal proteins, including Uds1 (Up-regulated During Septation 1) from Schizosaccharomyces pombe. Uds1 is involved in septation. Many of the uncharacterised proteins with this domain are listed as being involucrin repeat proteins, but this can not be substantiated.
