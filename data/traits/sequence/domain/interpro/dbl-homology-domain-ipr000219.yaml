identifier: InterPro:IPR000219
label: Dbl homology domain
definition: >-
  The Rho family GTPases Rho, Rac and CDC42 regulate a diverse array of cellular processes. Like all members of the Ras superfamily, the Rho proteins cycle between active GTP-bound and inactive GDP-bound conformational states. Activation of Rho proteins through release of bound GDP and subsequent binding of GTP, is catalysed by guanine nucleotide exchange factors (GEFs) in the Dbl family. The proteins encoded by members of the Dbl family share a common domain, presented in this entry, of about 200 residues (designated the Dbl homology or DH domain) that has been shown to encode a GEF activity specific for a number of Rho family members. In addition, all family members possess a second, shared domain designated the pleckstrin homology (PH) domain. Trio and its homologue UNC-73 are unique within the Dbl family insomuch as they encode two distinct DH/PH domain modules. The PH domain is invariably located immediately C-terminal to the DH domain and this invariant topography suggests a functional interdependence between these two structural modules. Biochemical data have established the role of the conserved DH domain in Rho GTPase interaction and activation, and the role of the tandem PH domain in intracellular targeting and/or regulation of DH domain function. The DH domain of Dbl has been shown to mediate oligomerisation that is mostly homophilic in nature. In addition to the tandem DH/PH domains Dbl family GEFs contain diverse structural motifs like serine/threonine kinase, RBD, PDZ, RGS, IQ, REM, Cdc25, RasGEF, CH, SH2, SH3, EF, spectrin or Ig. The DH domain is composed of three structurally conserved regions separated by more variable regions. It does not share significant sequence homology with other subtypes of small G-protein GEF motifs such as the Cdc25 domain a…
