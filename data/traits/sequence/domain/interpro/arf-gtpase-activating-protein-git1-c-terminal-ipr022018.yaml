identifier: InterPro:IPR022018
label: "ARF GTPase-activating protein GIT1, C-terminal"
definition: >-
  This entry represents the C-terminal domain of the ARF GTPase-activating protein GIT1 and GIT2. GIT1 is an ArfGAP and scaffolding protein regulating cell adhesion and migration. To perform this function, it localises p21-activated kinase (PAK) and PAK-interactive exchange factor to focal adhesions. Its activation is regulated by interaction between its paxillin-binding C-terminal and the LD motifs of paxillin. The C-terminal folds into a four helix bundle. This entry includes the orthologues find it C.elegans and Drosophila melanogaster and the fungal proteins SPA2.
