identifier: InterPro:IPR058092
label: "WWWY-motif domain"
definition: >-
  This extremely hydrophobic domain is found in Clostridia and related Gram-positive species, either as the C-terminal portion of a protein with an N-terminal predicted helix-turn-helix (HTH) DNA-binding domain or standalone. This domain includes a highly unusual motif within a strongly hydrophobic stretch, WxxxWxxWxxY, in which all four aromatic residues are invariant.
