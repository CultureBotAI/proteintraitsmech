identifier: InterPro:IPR032368
label: "RPN13, DEUBAD domain"
definition: >-
  This entry represents the DEUBiquitinase ADaptor (DEUBAD) domain from RPN13 (ADRM1), located at its C-terminal, that binds to the UCH37-like domain (ULD) of the deubiquitinase UCH37. This interaction is required for DUB activity activation.
