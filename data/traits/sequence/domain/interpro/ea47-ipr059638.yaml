identifier: InterPro:IPR059638
label: Ea47
definition: >-
  This entry represents the ea47 protein family found in lambda-like bacteriophages. Ea47 is an uncharacterised protein of 410 amino acids (48.1 kDa) found in bacteriophage lambda. This entry also covers the N-terminal domain in uncharacterised bacterial proteins.
