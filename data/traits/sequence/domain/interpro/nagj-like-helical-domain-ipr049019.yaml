identifier: InterPro:IPR049019
label: "NagJ-like, helical domain"
definition: >-
  This domain is located at the C-terminal of proteins predominantly found in actinomicetes and firmicutes that are members of family 84 glycoside hydrolases. These enzymes directly hydrolyse O-GlcNAcylated peptides, including O-GlcNAcase NagJ from Clostridium perfringens. This domain folds into a five helical bundle with up-and-down topology. It may function in substrate binding or recognition.
