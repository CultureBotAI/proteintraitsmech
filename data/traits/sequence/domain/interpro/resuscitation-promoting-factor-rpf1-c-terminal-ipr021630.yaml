label: "Resuscitation-promoting factor Rpf1, C-terminal"
definition: >-
  This entry represents the C-terminal domain of Resuscitation-promoting factor Rpf1 from Corynebacterium glutamicum, a factor that stimulates resuscitation or dormant cells. The function of this domain is not known.
