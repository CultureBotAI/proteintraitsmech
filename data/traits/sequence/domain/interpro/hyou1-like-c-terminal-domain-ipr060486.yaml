identifier: InterPro:IPR060486
label: "HYOU1-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of human Hypoxia up-regulated protein 1 (HYOU1). This domain also covers the C-terminal in Heat shock proteins such as Heat shock protein 105 kDa, Heat shock 70 kDa protein 4 and Heat shock 70 kDa protein 14. This domain may adopt a tri-helical bundle fold. HYOU1 has a pivotal role in cytoprotective cellular mechanisms triggered by oxygen deprivation. It may play a role as a molecular chaperone and participate in protein folding. Heat shock protein 105 kD acts as a nucleotide-exchange factor (NEF) for chaperone proteins HSPA1A and HSPA1B, promoting the release of ADP from HSPA1A/B thereby triggering client/substrate protein release.
