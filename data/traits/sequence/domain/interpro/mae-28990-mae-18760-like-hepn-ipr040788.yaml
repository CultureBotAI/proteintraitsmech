  HEPN-like nuclease. MAE_28990 In operon with a ParB nuclease and DNA methylase genes. MAE_18760-like HEPN found fused to HEPN/RES-NTD1, HEPN/Toprim-NTD1, Schlafen and a novel β rich domain. In operon with ParA/Soj ATPase of SIMIBI-type GTPase fold.
