identifier: InterPro:IPR024726
label: Ferric siderophore reductase, C-terminal
definition: >-
  Ferric siderophore reductase (FhuF) is a siderophore-iron reductase involved in iron removal from the hydroxamate-type siderophores coprogen, ferrichrome and ferrioxamine B after their transport into the cell. It binds both the iron-loaded and the apo forms of ferrichrome. This entry represents the C-terminal domain that contains 4 conserved cysteine residues found to be part of a 2Fe-2S cluster.
