identifier: InterPro:IPR010724
label: "Replication initiator A, N-terminal"
definition: >-
  This entry represents the N terminus (approximately 80 residues) of replication initiator protein A (RepA), a DNA replication initiator in plasmids. Most proteins in this entry are bacterial, but viral members are also included.
