identifier: InterPro:IPR045302
label: "NHL2, NHL repeat domain"
definition: >-
  This entry represents the NHL repeat domain found in NHL2 and related proteins. The NHL repeat domain is found C-terminally of a thioredoxin domain. The NHL (NCL-1, HT2A and LIN-41) repeat is found in multiple tandem copies, typically as 6 instances. It is about 40 residues long and resembles the WD repeat and other β-propeller structures. This domain can also be found in Protein SUPPRESSOR OF QUENCHING 1 (SOQ1) from Arabidopsis. SOQ1 is a chloroplastic protein required to maintain light harvesting efficiency, especially during nonphotochemical quenching (NPQ) recovery, via the regulation of chlorophyll excited-state lifetime probably by preventing the formation of a slowly reversible form of antenna quenching.
