identifier: InterPro:IPR054574
label: "Cgl0159-like domain"
definition: >-
  This domain is found in the uncharacterised protein Cgl0159 from Corynebacterium glutamicum ( ) and its homologues mainly from actinomycetes. It adopts a classical (β/α)8 barrel. Members of this entry share significant similarity with Deoxyribose-phosphate aldolase.
