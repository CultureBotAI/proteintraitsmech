identifier: InterPro:IPR060635
label: "Enhanced level of genomic instability 1 domain"
definition: >-
  This entry represents a domain found in enhanced level of genomic instability 1 (ELG1) from Drosophila melanogaster and similar fly proteins. ELG1 is the large subunit of the heteropentameric Elg1 RFC-like complex that regulates PCNA unloading from DNA during S phase, playing roles in DNA replication and genome integrity maintenance. The protein belongs to the P-loop containing nucleotide triphosphate hydrolase superfamily.
