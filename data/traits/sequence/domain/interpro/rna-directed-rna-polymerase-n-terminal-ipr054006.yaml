identifier: InterPro:IPR054006
label: "RNA-directed RNA polymerase, N-terminal"
definition: >-
  This domain is found at the N terminus of RNA-directed RNA polymerase (RdRP) found in reoviruses. This protein adopts a closed cage-like structure consisting of a central polymerase domain sandwiched between the N-terminal and the C-terminal bracelet domains. This domain adopts a predominantly α-helical configuration.
