identifier: InterPro:IPR059727
label: "Putative rubredoxin, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in putative rubredoxin from Methanothermobacter thermautotrophicus and related proteins found in archaea and bacteria. This domain is found predominantly in methanogenic archaea including Methanobacteriaceae and Methanobacterium, with some members in sulphate-reducing bacteria such as Desulfobulbaceae. The full-length proteins contain an N-terminal rubredoxin domain that binds iron and is involved in electron transport. This C-terminal domain shows structural similarity to cellulose synthase operon protein D (BcsD) ( ). The function of this C-terminal domain remains to be determined.
