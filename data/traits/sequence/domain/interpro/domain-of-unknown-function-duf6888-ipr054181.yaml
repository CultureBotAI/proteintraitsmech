identifier: InterPro:IPR054181
label: "Domain of unknown function DUF6888"
definition: >-
  This family of proteins is found in bacteria. Proteins in this family are approximately 60 amino acids in length. There is a conserved N-terminal MPT sequence motif. AlphaFold predicts that this protein is composed of an N-terminal α-helix followed by a four stranded β-sheet. AlphaFold also predicts the protein forms a strong dimer interface. It shows some weak structural similarity to the N-terminal domain of RnlA toxin.
