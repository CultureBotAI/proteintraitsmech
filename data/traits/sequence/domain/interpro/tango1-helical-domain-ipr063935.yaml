identifier: InterPro:IPR063935
label: "TANGO1, helical domain"
definition: >-
  This entry represents a helical domain found in TANGO1 (transport and Golgi organization protein 1, also known as MIA3). This domain is located in the cytoplasmic region of the protein, between the N-terminal lumenal SH3 domain ( ) and the C-terminal proline-rich domain. This region mediates interaction with MIA2. TANGO1 is an endoplasmic reticulum membrane protein that functions as a cargo receptor for the export of bulky cargo molecules, including collagen VII, that are too large to fit into standard COPII-coated vesicles. TANGO1 localises to endoplasmic reticulum exit sites (ERES) and interacts with COPII coat subunits SEC23A and SEC23B. This domain is found in vertebrates. The protein belongs to the MIA/OTOR family.
