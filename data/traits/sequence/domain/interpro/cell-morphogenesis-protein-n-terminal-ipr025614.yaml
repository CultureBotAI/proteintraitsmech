identifier: InterPro:IPR025614
label: "Cell morphogenesis protein N-terminal"
definition: >-
  This entry represents the conserved N-terminal domain of proteins that are involved in cell morphogenesis. Among these are furry proteins and homologues, and proteins PAG1 and Mor2.
