identifier: InterPro:IPR000836
label: "Phosphoribosyltransferase domain"
definition: >-
  This entry refers to the phosphoribosyl transferase (PRT) type I domain. PRTases catalyze the displacement of the alpha-1'-pyrophosphate of 5-phosphoribosyl-alpha1-pyrpphosphate (PRPP) by a nitrogen-containing nucleophile. The reaction products are an alpha-1 substituted ribose-5'-phosphate and a free pyrophosphate (PP). PRPP, an activated form of ribose-5-phosphate, is a key metabolite connecting nucleotide synthesis and salvage pathways. The type I PRTases are identified by a conserved PRPP binding motif which features two adjacent acidic residues surrounded by one or more hydrophobic residue. This domain is found in a range of diverse phosphoribosyl transferase enzymes and regulatory proteins of the nucleotide synthesis and salvage pathways, including adenine phosphoribosyltransferase , hypoxanthine-guanine-xanthine phosphoribosyltransferase, hypoxanthine phosphoribosyltransferase , ribose-phosphate pyrophosphokinase , amidophosphoribosyltransferase , orotate phosphoribosyltransferase , uracil phosphoribosyltransferase , and xanthine-guanine phosphoribosyltransferase . In Arabidopsis, at the very N terminus of this domain is the P-Loop NTPase domain.
