identifier: InterPro:IPR055352
label: "aECM cysteine-cradle domain"
definition: >-
  This domain is found in nematode proteins that are known to be aECM (apical ExtraCellular Matrice) components. It is predicted to adopt a globular α-helical structure with a cradle-like shape. This domain contains four invariant cysteines which are probably involved in forming two disulfide bonds. The latter likely contribute to the maintenance of the cradle-like shape.
