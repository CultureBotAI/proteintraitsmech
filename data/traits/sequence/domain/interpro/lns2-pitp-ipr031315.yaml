identifier: InterPro:IPR031315
label: LNS2/PITP
definition: >-
  This domain is found in lipins, lipin homologues from Saccharomyces cerevisiae (Smp2, PAH1) and Schizosaccharomyces pombe (Ned1), and in class II phosphatidylinositol transfer proteins (PITP). Lipin proteins are phosphatidate phosphatases which catalyse the dephosphorylation of phosphatidic acid to diacylglycerol, the penultimate step in triacylglycerol synthesis.
