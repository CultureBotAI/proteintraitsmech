identifier: InterPro:IPR019574
label: NADH:ubiquinone oxidoreductase, subunit G, iron-sulphur binding
definition: >-
  This entry represents the iron-sulphur binding domain of the G subunit. This domain consists of just two α-helices separated by a loop region that coordinates a [4Fe-4S] cluster through an unusual H-x(3)-C-x(2)-C-x(5)-C motif that includes one His and three Cys residues. This domain is found in the G subunit (one of 14 subunits, A to N) of the NADH-quinone oxidoreductase complex I which generally couples NADH and ubiquinone oxidation/reduction in bacteria and mammalian mitochondria while translocating protons, but may act on NADPH and/or plastoquinone in cyanobacteria and plant chloroplasts. It is also found in subunits from formate dehydrogenase complexes, in particular, the NADP(+)-dependent formate dehydrogenase subunit alpha which is involved in the NADP-dependent reduction of CO2 to format.
