identifier: InterPro:IPR059207
label: "Fatty acid synthase, SBS domain"
definition: >-
  This entry represents the SBS domain (Six-Stranded Beta Sheet) of Fatty Acid Synthase (FAS) from Mycobacterium smegmatis and related proteins found in Actinomycetes. This domain plays important roles in protein assembly and stability. It is composed of a meander β-sheet decorated with few helices.
