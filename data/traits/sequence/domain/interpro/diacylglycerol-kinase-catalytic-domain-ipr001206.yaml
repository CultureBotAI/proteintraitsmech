identifier: InterPro:IPR001206
label: Diacylglycerol kinase, catalytic domain
definition: >-
  The DAG-kinase catalytic domain or DAGKc domain is present in mammalian lipid kinases, such as diacylglycerol (DAG), ceramide and sphingosine kinases, as well as in related bacterial proteins. Eukaryotic DAG-kinase catalyses the phosphorylation of DAG to phosphatidic acid, thus modulating the balance between the two signaling lipids. At least ten different isoforms have been identified in mammals, which form 5 groups characterised by different functional domains, such as the calcium-binding EF hand (see ), PH (see ), SAM (see ) , DAG/PE-binding C1 domain (see ) and ankyrin repeats (see ).
