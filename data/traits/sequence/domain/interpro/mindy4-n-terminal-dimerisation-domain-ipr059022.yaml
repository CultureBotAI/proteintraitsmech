identifier: InterPro:IPR059022
label: "MINDY4, N-terminal dimerisation domain"
definition: >-
  This domain is found at the N-terminal end of human Probable ubiquitin carboxyl-terminal hydrolase MINDY-4 and similar animal sequences. This domain is predicted to show an all-α structure. This domain is not present in MINDY-3 and MINDY-4B. Deubiquitinating enzymes (DUBs) remove ubiquitin (Ub) from Ub-conjugated substrates to regulate the functional outcome of ubiquitylation. MINDY-3/4 belong to the MINDY (motif interacting with Ub-containing novel DUB) family (peptidase family C121), whose members are deubiquitinating enzymes releasing Lys48-linked ubiquitin.
