identifier: InterPro:IPR041383
label: "RuvC endonuclease subdomain 3"
definition: >-
  Cas9 proteins are abundant across the bacterial kingdom, but vary widely in both sequence and size. All known Cas9 enzymes contain an HNH domain that cleaves the DNA strand complementary to the guide RNA sequence (target strand), and a RuvC nuclease domain required for cleaving the noncomplementary strand (non-target strand), yielding double-strand DNA breaks (DSBs). The crystal structures of type II-A and II-C Cas9 proteins highlight the features in Cas9 enzymes that support their function as RNA-guided endonucleases. Cas9 enzymes adopt a bilobed architecture composed of a nuclease lobe containing juxtaposed RuvC and HNH nuclease domains and a variable α-helical lobe likely to be involved in nucleic acid binding. The RuvC domain is made up of three discontinuous segments (RuvC-I to RuvC-III), with the HNH domain inserted between the second and the third segments. The RuvC domain forms the structural core of the nuclease lobe, a six-stranded β sheet surrounded by four α helices, with all three conserved subdomains (I, II, III) contributing catalytic residues to the active site.
