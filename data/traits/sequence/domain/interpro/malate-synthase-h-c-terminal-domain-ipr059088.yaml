identifier: InterPro:IPR059088
label: "Malate synthase H, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of malate synthase H (MSH) isoform found in halophilic archaea. The C-terminal domain caps the active site of the protein and contributes the catalytic base. This domain is smaller than the corresponding domains in malate synthase isoforms A and G. The MSH isoform lacks an N-terminal domain present in other isoforms and forms trimeric or hexameric assemblies, unlike the monomeric A and G isoforms Malate synthase (MS) catalyses the formation of malate through a two-step process. Initially, they facilitate the reversible condensation of acetyl-coenzyme A (acetyl-CoA) with glyoxylate to produce an intermediate, which is then hydrolysed to yield malate and coenzyme A (CoA). While the enzymes can also condense other CoA derivatives with glyoxylate or acetyl-CoA with pyruvate, the hydrolysis reaction is highly specific for the intermediate formed from acetyl-CoA and glyoxylate. These proteins are part of the HpcH/HpaI aldolase family, indicating a similarity in their structural fold and catalytic mechanism.
