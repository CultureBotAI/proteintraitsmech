identifier: InterPro:IPR057557
label: "SAC9, C8D domain"
definition: >-
  This domain is found in the SAC9 protein from Arabidopsis thaliana. It contains four pairs of highly conserved cysteine residues that are probably involved in metal coordination. SAC9 is a probable phosphoinositide phosphatase that is involved in modulating phosphoinositide signals during the stress response. SAC9 is critical for regulating lipid signaling and endocytic trafficking. SAC9 acts as a lipid "gatekeeper," ensuring PI(4,5)P2 is confined to the plasma membrane to support endocytosis and cellular homeostasis. Its interplay with SH3P2 and clathrin underscores the integration of lipid metabolism and membrane trafficking in plants. SAC9 contains three domains (GBDL) with topology similar to the galactose binding domains (GBD), in particular to the anaphase promoting complex subunit 10. These domains are located in the second half of the protein.
