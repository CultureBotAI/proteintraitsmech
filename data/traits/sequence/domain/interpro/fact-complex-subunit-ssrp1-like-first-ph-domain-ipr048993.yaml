identifier: InterPro:IPR048993
label: "FACT complex subunit SSRP1-like, first PH domain"
definition: >-
  SSRP1 is a component of FACT (facilitator of chromatin transcription), an essential chromatin reorganizing factor. This entry represents the first of two PH-like domains in these proteins. This group of proteins also include its fungal homologue FACT complex subunit POB3.
