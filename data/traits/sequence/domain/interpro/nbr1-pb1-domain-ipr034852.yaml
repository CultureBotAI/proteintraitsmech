identifier: InterPro:IPR034852
label: "Nbr1, PB1 domain"
definition: >-
  The PB1 domain is an essential part of Nbr1 (next to BRCA1) protein, a scaffold protein mediating specific protein-protein interaction with both titin protein kinase and with another scaffold protein p62. A canonical PB1-PB1 interaction, which involves heterodimerization of two PB1 domain, is required for the formation of macromolecular signaling complexes ensuring specificity and fidelity during cellular signaling. The interaction between two PB1 domain depends on the type of PB1. There are three types of PB1 domains: type I which contains an OPCA motif, acidic aminoacid cluster, type II which contains a basic cluster, and type I/II which contains both an OPCA motif and a basic cluster. The Nbr1 protein contains a type I PB1 domain. Nbr1 (next to BRCA1) is an ubiquitin-binding autophagy adapter that participates in different processes including host defense or intracellular homeostasis. Nbr1-like molecules contain an N-terminal PB1 domain, one (animals, plants) or more (fungi) ZZ domains, an FW domain, and a C-terminal UBA domain.
