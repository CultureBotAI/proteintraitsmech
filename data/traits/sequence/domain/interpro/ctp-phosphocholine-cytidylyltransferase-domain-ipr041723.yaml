identifier: InterPro:IPR041723
label: "CTP:phosphocholine cytidylyltransferase domain"
definition: >-
  This entry represents the catalytic domain of CTP:phosphocholine cytidylyltransferase (CCT). It is also found in CTP:phosphoethanolamine cytidylyltransferase (ECT). ECT is composed of two tandem cytidylyltransferase (CT) domains; this entry corresponds the N-terminal CT domain, which is known to contribute to its catalytic activity. CCT catalyzes the condensation of CTP and phosphocholine to form CDP-choline as the rate-limiting and regulatory step in the CDP-choline pathway. Similarly, ECT catalyzes the condensation of CTP and ethanolamine to form CDP-ethanolamine.
