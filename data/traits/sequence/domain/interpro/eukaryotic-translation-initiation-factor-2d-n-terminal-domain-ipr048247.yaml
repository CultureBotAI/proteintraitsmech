identifier: InterPro:IPR048247
label: "Eukaryotic translation initiation factor 2D, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of human Eukaryotic translation initiation factor 2D (eIF2D) and similar eukaryotic proteins. eIF2D (also known as ligatin) is involved in the recruitment and delivery of aminoacyl-tRNAs to the P-site of the eukaryotic ribosome in a GTP-independent manner. This domain co-occurs with a PUA domain.
