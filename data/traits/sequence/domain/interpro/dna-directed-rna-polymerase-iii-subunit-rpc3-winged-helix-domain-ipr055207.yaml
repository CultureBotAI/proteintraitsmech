identifier: InterPro:IPR055207
label: "DNA-directed RNA polymerase III subunit RPC3, winged-helix domain"
definition: >-
  This entry represents the WH-like domain (WH4) found at the C-terminal of the DNA-directed RNA polymerase III subunit RPC3 (POLR3C) from humans (also known as hRPC62). POLR3C exhibits helicase activity. Helicases are enzymes responsible for unwinding DNA or RNA helices, facilitating essential processes such as transcription and DNA replication. RNA polymerase (pol) III is responsible for transcribing tRNAs, 5S RNA, and U6 RNA in eukaryotes. The human Pol III complex consists of a total of 17 subunits.
