identifier: InterPro:IPR054539
label: "Pyrroloquinoline quinone-dependent pyranose dehydrogenase, beta-propeller domain"
definition: >-
  This entry includes homologues of the AA12 (Auxilliary activities family 12) enzyme from Trichoderma reesei (TrAA12, , ), and pyrroloquinoline quinone-dependent pyranose dehydrogenases. TrAA12 is a monodomain protein that adopts six-bladed β-propeller structure. AA12 shows similarities to the global active-site architecture of bacterial glucose dehydrogenases, suggesting their common evolutionary origin. Pyrroloquinoline quinone-dependent pyranose dehydrogenases catalyse the oxidation of various sugars including L-galactose, L-gulose, D-talose, D-arabinose, D-lyxose, L-fucose and D-glucosone and show significant activity toward the reverse-chair conformation of pyranoses. In this proteins, this entry corresponds to the central domain.
