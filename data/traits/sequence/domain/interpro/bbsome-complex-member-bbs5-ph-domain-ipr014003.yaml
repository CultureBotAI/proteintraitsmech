identifier: InterPro:IPR014003
label: "BBSome complex member BBS5, PH domain"
definition: >-
  BBS5 is part of the BBSome complex that may function as a coat complex required for sorting of specific membrane proteins to the primary cilia. Mutations in the BBS5 gene cause Bardet-Biedl syndrome 5. This entry represents the two tandem PH domains found at the N-terminal of BBS5.
