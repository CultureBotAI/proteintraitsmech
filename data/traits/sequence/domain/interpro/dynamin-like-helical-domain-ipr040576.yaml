identifier: InterPro:IPR040576
label: "Dynamin-like helical domain"
definition: >-
  This helical domain is found in bacterial proteins such as labile enterotoxin output A (LeoA), a large GTPase (64.2kDa) with a putative involvement in membrane vesicle (MV) secretion in Escherichia coli. The crystal structure of LeoA reveals a fold with all the hallmarks of a dynamin-like protein (DLP).
