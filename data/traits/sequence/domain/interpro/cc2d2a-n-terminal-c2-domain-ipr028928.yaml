identifier: InterPro:IPR028928
label: "CC2D2A, N-terminal, C2 domain"
definition: >-
  A C2 domain is usually involved in targeting proteins to cell membranes. Ciliary CC2D2A protein has two C2 domains and an inactive transglutaminase-like peptidase domain (CC2D2A-TGL). This entry represents the first C2 domain.
