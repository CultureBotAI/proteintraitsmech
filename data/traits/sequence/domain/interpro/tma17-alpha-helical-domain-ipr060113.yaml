identifier: InterPro:IPR060113
label: "TMA17, alpha-helical domain"
definition: >-
  This entry represents a domain found in Translation machinery-associated protein 17 (TMA17) and related proteins. These proteins function as ATPase-dedicated chaperones, essential for the formation of the RPT6-RPT3 ATPase pair, an early and critical step in proteasome assembly. They play a key role in maintaining homeostatic proteasome levels and help adjust proteasome assembly in response to increased demands, such as during proteasome stress. Their function overlaps with that of RPN14. Additionally, these proteins interact with RPT6 and with the 40S and 60S ribosomal subunits, suggesting a role in ribosomal interactions. This domain adopts a compact, predominantly α-helical structure, consisting of two α-helices arranged in a globular fold, as observed in the crystal structure of fatty acid synthase complex.
