identifier: InterPro:IPR049051
label: "Novel STAND NTPase 2"
definition: >-
  This is an inactive STAND-NTPase domain found in a mobile two-gene bacterial conflict systems. nSTAND2 is fused to various effector molecules. The neighbouring gene is an active STAND domain. These STAND NTPases define a novel family close to CR-ATPases, the mitochondrial apoptotic ribosomal protein S29/Dap3 and the mitochondria-associated STAND NTPase RNA12.
