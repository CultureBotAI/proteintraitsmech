identifier: InterPro:IPR033922
label: NAD(P) binding domain of glutamate dehydrogenase
definition: >-
  Glutamate dehydrogenase (DH) is a multidomain enzyme that catalyzes the reaction from glutamate to 2-oxyoglutarate and ammonia in the presence of NAD or NADP. It is present in all organisms. Enzymes involved in ammonia assimilation are typically NADP+-dependent, while those involved in glutamate catabolism are generally NAD+-dependent. This entry represents the C-terminal domain.
