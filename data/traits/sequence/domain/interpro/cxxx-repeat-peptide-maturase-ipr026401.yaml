identifier: InterPro:IPR026401
label: "CXXX repeat peptide maturase"
definition: >-
  This entry describes a peptide maturase that works with, usually fused to, a radical SAM enzyme in a system that modifies peptides with multiple tandem repeats of CXXX sequences. Some family members have an iron-sulphur cluster binding region associated with peptide modification ( ).
