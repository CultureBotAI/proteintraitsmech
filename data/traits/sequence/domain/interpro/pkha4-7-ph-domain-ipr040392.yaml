identifier: InterPro:IPR040392
label: "PKHA4-7, PH domain"
definition: >-
  This entry represents pleckstrin homology (PH) domain found in the Pleckstrin homology domain-containing family A members 4-7 (PKHA4-7) from humans. This domain is involved in targeting these proteins to appropriate cellular compartments or enabling them to interact with other components of the signal transduction pathways. Some PH domains are responsible for the protein binding to phosphoinositide phosphates (PIPs) with high affinity and specificity, others display strong specificity in lipid binding. Its specificity is usually determined by loop regions or insertions in the N terminus of the domain, which are not conserved across all PH domains. Proteins included in this entry are predominantly found in chordates. Some members also contain WW (also known as WWP) domains, also occurring in proteins involved in signal transduction processes.
