label: "Domain of unknown function DUF8388"
definition: >-
  This domain is found in uncharacterised eukaryotic proteins. It is predicted to fold into an α/β structure composed of a five stranded β-sheet and α-helices packed on one side of it. It is preceded by a transmembrane domain.
