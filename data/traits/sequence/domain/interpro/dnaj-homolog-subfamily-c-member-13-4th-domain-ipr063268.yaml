identifier: InterPro:IPR063268
label: "DnaJ homolog subfamily C member 13, 4th domain"
definition: >-
  DNAJ protein RME-8 (DnaJ homolog subfamily C member 13, receptor-mediated endocytosis-8; Gvr2 in Arabidopsis) is involved in membrane trafficking through early endosomes and in the regulation of endosomal membrane tubulation. It regulates the dynamics of SNX1 (sorting nexin 1) on the endosomal membrane. It coordinates the function of the WASH complex and the retromer SNX dimer through its interaction with FAM21 subunit in WASH complex. This is the α helical fourth domain of RME-8.
