identifier: InterPro:IPR058935
label: "At4g15545-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of Uncharacterized protein At4g15545 from Arabidopsis thaliana and similar proteins mainly found in plants. This domain is predicted to fold into a bundle of four short α-helices. At4g15545 (named NAIP1) a specialised ER body component and is though to play a role in plant responses to environmental conditions.
