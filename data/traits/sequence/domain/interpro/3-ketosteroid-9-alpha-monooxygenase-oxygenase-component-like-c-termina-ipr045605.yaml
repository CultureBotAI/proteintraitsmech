identifier: InterPro:IPR045605
label: 3-ketosteroid-9-alpha-monooxygenase, oxygenase component-like, C-terminal domain
definition: >-
  This entry represents the C-terminal catalytic domain of the 3-ketosteroid-9-alpha-monooxygenase (KshA) from bacteria. KshA is the oxygenase component of the 3-ketosteroid 9-alpha-hydroxylase (KshAB), a two-component Rieske oxygenase involved in the degradation of cholesterol. This domain shares the TBP-like fold found in other Rieske oxygenases. It also appears in Cholesterol 7-desaturase nvd/daf-36, which is involved in cholesterol metabolism in organisms like Xenopus laevis and Drosophila melanogaster.
