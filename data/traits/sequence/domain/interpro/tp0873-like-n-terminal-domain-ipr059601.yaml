identifier: InterPro:IPR059601
label: "TP0873-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of TP0873 and similar uncharacterised proteins mainly found in Spirochaetota. TP0873 protein is approximately 200 amino acids. The specific function of this domain remains to be determined.
