identifier: InterPro:IPR053998
label: "Acyl-CoA dehydrogenase 11-like C-terminal domain"
definition: >-
  Acyl-CoA dehydrogenase 11 (ACDH-11) sequesters C11/C12-chain fatty acids and prevents these fatty acids from activating nuclear hormone receptors and driving fat-7 expression. This enzyme consists of four domains, of which the C-terminal folds into a four-helical up-and-down bundle.
