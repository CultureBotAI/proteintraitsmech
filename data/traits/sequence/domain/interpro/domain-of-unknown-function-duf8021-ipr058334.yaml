label: "Domain of unknown function DUF8021"
definition: >-
  This domain is ubiquitously found in one or multiple tandem copies. It has a detectable similarity to known NTF2-like domains and it is predicted to fold into a similar structure. When found in tandem, two copies pack on each other forming a barrel like structure.
