identifier: InterPro:IPR059548
label: "C2H2-type transcription factor zfpA, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of C2H2-type transcription factor zfpA from Aspergillus fumigatus and similar sequences from actinomycetes. ZfpA is a transcription factor involved in fungal growth and virulence potential. The protein negatively regulates antifungal drug susceptibility via transcriptional inhibition of drug efflux pump expression in a crzA-dependent manner. ZfpA localises to the nucleus upon azole antifungal treatment and coregulates multidrug transporter expression. It contains multiple C2H2-type zinc finger domains for DNA binding. Disruption of zfpA leads to decreased hyphal growth, increased azole susceptibility and attenuated virulence. The specific function of this domain remains to be determined.
