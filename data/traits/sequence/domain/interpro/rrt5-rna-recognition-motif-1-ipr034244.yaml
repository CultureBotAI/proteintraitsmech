identifier: InterPro:IPR034244
label: "Rrt5, RNA recognition motif 1"
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of yeast Rrt5 (regulator of rDNA transcription protein 5). Rrt5 may play roles in the modulation of rDNA transcription. Rrt5 contains two RNA recognition motifs (RRMs).
