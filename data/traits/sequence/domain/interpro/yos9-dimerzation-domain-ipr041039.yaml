identifier: InterPro:IPR041039
label: "Yos9, dimerzation domain"
definition: >-
  This is the dimerization domain (DD) found in Yos9 from yeasts. Structural analysis revealed that this domain contributes to self association of Yos9. The overall fold of the domain can be classified as an α-β-roll architecture, comprising two α-helices and seven β-strands.
