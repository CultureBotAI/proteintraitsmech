identifier: InterPro:IPR034849
label: "Maltogenic alpha-amylase, CBM20 domain"
definition: >-
  This is the C-terminal CBM20 (carbohydrate-binding module, family 20) domain of novamyl (also known as acarviose transferase, ATase, maltogenic alpha-amylase, glucan 1,4-alpha-maltohydrolase, and AcbD). Novamyl has a five-domain structure similar to that of cyclodextrin glucanotransferase (CGTase). It has a substrate-binding surface with an open groove which can accommodate both cyclodextrins and linear substrates.
