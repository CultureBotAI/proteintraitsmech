identifier: InterPro:IPR014866
label: "YfkB-like domain"
definition: >-
  YfkB is adjacent to YfkA in Bacillus subtilis. In other bacterial species, it is fused to this protein. As YfkA contains a Radical SAM domain it suggests this domain is interacts with them.
