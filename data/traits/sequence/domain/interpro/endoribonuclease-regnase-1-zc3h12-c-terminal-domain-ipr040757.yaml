identifier: InterPro:IPR040757
label: "Endoribonuclease Regnase 1/ZC3H12, C-terminal domain"
definition: >-
  This is the C-terminal domain found in regnase-1, an RNase that directly cleaves mRNAs of inflammatory genes such as IL-6 and IL-12p40, and negatively regulates cellular inflammatory responses. The C-terminal domain is composed of three α helices and resembles ubiquitin associated protein 1 in structure.
