identifier: InterPro:IPR038723
label: "ArnR1-like, winged helix-turn-helix domain"
definition: >-
  This domain is found in ArnR1 from Sulfolobus acidocaldarius. ArnR1 is involved in regulation of archaellar gene expression. This winged helix-turn-helix domain contains an extended C-terminal α helix which is responsible for dimerisation of this domain.
