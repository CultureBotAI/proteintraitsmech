identifier: InterPro:IPR060563
label: "Transmembrane protein 88/278 domain"
definition: >-
  This entry represents a domain found in the transmembrane protein 88 (TMEM88), TMEM278 and similar sequences found in vertebrates. TMEM88 proteins are multi-pass membrane proteins localised to the cell membrane and contain multiple transmembrane helical domains. TMEM88 is an inhibitor of the Wnt/beta-catenin signalling pathway and is crucial for heart development, acting downstream of GATA factors in pre-cardiac mesoderm to specify cardiomyocyte development. The protein interacts with DVL1 via its C-terminal region. These proteins are typically 159-173 amino acids in length and contain an helical fold and disordered regions.
