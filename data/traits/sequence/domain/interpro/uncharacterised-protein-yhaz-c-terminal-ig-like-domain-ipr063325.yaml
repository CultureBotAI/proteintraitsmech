identifier: InterPro:IPR063325
label: "Uncharacterised protein YhaZ, C-terminal Ig-like domain"
definition: >-
  This entry represents the C-terminal Ig-like domain of YhaZ and related proteins. These proteins contain an N-terminal DNA alkylation domain followed by this C-terminal domain. In Bacillus subtilis, YhaZ is induced by DNA-damaging agents such as mitomycin C and UV irradiation as part of the RecA-dependent SOS response. The family is found broadly in bacteria, including Pseudomonadota, Actinomycetota, Bacillota and Bacteroidota. The specific function of this C-terminal domain remains to be determined.
