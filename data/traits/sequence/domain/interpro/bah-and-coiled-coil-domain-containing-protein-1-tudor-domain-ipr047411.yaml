identifier: InterPro:IPR047411
label: "BAH and coiled-coil domain-containing protein 1, Tudor domain"
definition: >-
  BAHCC1, also called Bromo adjacent homology domain-containing protein 2 (BAHD2), or BAH domain-containing protein 2, may function as a transcriptional regulator. BAHCC1 contains a Tudor domain, represented in this entry, and a C-terminal BAH domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. This protein specifically recognizes H3K27me3 through its BAH module and enforces silencing of H3K27me3-demarcated genes in mammalian cells.
