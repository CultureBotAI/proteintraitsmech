identifier: InterPro:IPR041689
label: "Gamma-aminobutyric acid type B receptor subunit 2, coiled-coil domain"
definition: >-
  This is the intracellular coiled-coil domain found in Gamma-aminobutyric acid type B receptor subunit 2 (GBR2). The coiled-coil complex between the GABAB receptor subunits GBR1 and GBR2 is responsible for facilitating the surface transport of the intact receptor. Disruption of the hydrophobic coiled-coil interface with single mutations in either subunit impairs surface expression of GBR1, confirming that the coiled-coil interaction is required to inactivate the adjacent ER retention signal of GBR1.
