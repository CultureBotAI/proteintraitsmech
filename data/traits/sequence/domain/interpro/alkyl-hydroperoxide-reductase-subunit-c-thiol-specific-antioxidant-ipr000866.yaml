identifier: InterPro:IPR000866
label: Alkyl hydroperoxide reductase subunit C/Thiol specific antioxidant
definition: >-
  Peroxiredoxins (Prxs) are a ubiquitous family of antioxidant enzymes that also control cytokine-induced peroxide levels which mediate signal transduction in mammalian cells. Prxs can be regulated by changes to phosphorylation, redox and possibly oligomerisation states. Prxs are divided into three classes: typical 2-Cys Prxs; atypical 2-Cys Prxs; and 1-Cys Prxs. All Prxs share the same basic catalytic mechanism, in which an active-site cysteine (the peroxidatic cysteine) is oxidised to a sulphenic acid by the peroxide substrate. The recycling of the sulphenic acid back to a thiol is what distinguishes the three enzyme classes. Using crystal structures, a detailed catalytic cycle has been derived for typical 2-Cys Prxs, including a model for the redox-regulated oligomeric state proposed to control enzyme activity. Alkyl hydroperoxide reductase (Ahp) has two subunits, the small AhpC subunit and the large AhpF subunit. AhpC is responsible for directly reducing organic hydroperoxides in its reduced dithiol form. Thiol specific antioxidant (TSA) is a physiologically important antioxidant which constitutes an enzymatic defence against sulphur-containing radicals and protects the cell against the oxidative stress caused by protein misfolding and aggregation. This entry contains AhpC and TSA, as well as related proteins.
