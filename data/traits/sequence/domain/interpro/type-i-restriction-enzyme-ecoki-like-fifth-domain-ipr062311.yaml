identifier: InterPro:IPR062311
label: "Type I restriction enzyme EcoKI-like, fifth domain"
definition: >-
  This entry represents a domain of approximately 95 residues found in the endonuclease subunit of type I restriction-modification systems in Gammaproteobacteria. This domain is located between the helicase C-terminal domain ( ) and the EcoEI_R_C domain ( ). The function of this domain remains to be determined.
