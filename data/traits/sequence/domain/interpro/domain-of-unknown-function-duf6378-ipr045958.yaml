label: "Domain of unknown function DUF6378"
definition: >-
  This domain of unknown function is found in proteins from bacteria and phages and is functionally uncharacterised. This domain is about 100 amino acids in length. It contains two conserved sequence motifs, KxxR and DxxxDxxGY.
