identifier: InterPro:IPR062517
label: "Glycolytic genes transcriptional activator GCR2, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of glycolytic genes transcriptional activator GCR2 found in fungi. GCR2 is a transcriptional activator required for expression of glycolytic genes that enhances CT box-dependent transcriptional activation of a RAP1- GCR1 complex. The protein forms homodimers via a C-terminal leucine-zipper domain and complexes with GCR1 homodimers. GCR2 is required for GCR1 phosphorylation and localises to the nucleus. The specific function of this N-terminal domain remains to be determined.
