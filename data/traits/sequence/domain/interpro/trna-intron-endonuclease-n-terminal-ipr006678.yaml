identifier: InterPro:IPR006678
label: tRNA intron endonuclease, N-terminal
definition: >-
  This entry represents a 2-layer α/β domain found at the N terminus of the homotetrameric tRNA-intron endonucleases, and as domains 1 (N-terminal) and 3 in the homodimeric enzymes. tRNA-intron endonucleases ( ) remove tRNA introns by cleaving pre-tRNA at the 5'- and 3'-splice sites to release the intron. The products are an intron and two tRNA half-molecules bearing 2',3' cyclic phosphate and 5'-hydroxyl termini. These enzymes recognise a pseudosymmetric substrate in which 2 bulged loops of 3 bases are separated by a stem of 4 bp. Although homotetrameric enzymes contain four active sites, only two participate in the cleavage, and should therefore, be considered as a dimer of dimers.
