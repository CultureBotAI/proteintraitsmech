identifier: InterPro:IPR026683
label: Serine/threonine-protein kinase TOR, catalytic domain
definition: >-
  This entry represents the catalytic domain of Serine/threonine-protein kinase TOR (target of rapamycin), which was first identified by mutations in yeast that confer resistance to the growth inhibitory properties of rapamycin. TOR proteins are structurally and functionally conserved in all eukaryotes examined. However, yeasts contain two Tor proteins (Tor1 and Tor2), while higher eukaryotes such as humans possess a single TOR protein. They are central regulators of cellular metabolism, growth and survival in response environmental signals. The catalytic domain is similar to that of phosphoinositide 3-kinase (PI3K). In budding yeast, the Tor2 protein exists in two distinct multi-component complexes, TORC1 and TORC2. TORC1 regulates cell growth by regulating many growth-related processes and is rapamycin sensitive, while TORC2 regulates the cell cytoskeleton and is rapamycin insensitive. Budding yeast TORC1 consists of either Tor1 or Tor2 in complex with Kog1, Lst8 and Tco89, while TORC2 is composed of Avo1, Avo2, Tsc11, Lst8, Bit61, Slm, Slm2 and Tor2. In both yeast and mammals, FKBP12-rapamycin binds to Tor (Tor1, Tor2, or mTOR) in TORC1, but not to Tor (Tor2 or mTOR) in TORC2. It has been suggested that the architecture of TORC2 or its unique composition might be responsible for the observed rapamycin resistance.
