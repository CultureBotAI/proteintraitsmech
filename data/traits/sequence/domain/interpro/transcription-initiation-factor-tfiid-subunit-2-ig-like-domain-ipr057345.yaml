identifier: InterPro:IPR057345
label: "Transcription initiation factor TFIID subunit 2, Ig-like domain"
definition: >-
  This entry represents the immunoglobulin-like (Ig-like) domain found in transcription factor TFIID subunit 2 (TAF2) from eukaryotes. This domain is inserted between subdomains 2 and 4 of the aminopeptidase-like region of TAF2. The aminopeptidase-like region of TAF2 is involved in downstream promoter recognition and plays an important role in transcription initiation. The specific function of this Ig-like domain within the context of TAF2's role is not yet fully characterised. In yeast, TAF2 functions as a component of the DNA-binding general transcription factor complex TFIID. Its binding to a promoter, whether or not it contains a TATA element, represents the initial step in pre-initiation complex (PIC) formation. TAF2 plays a crucial role in regulating gene expression by RNA polymerase II through various mechanisms, including interaction with transcription activators, recognition and selectivity of core promoters, interactions with TFIIA and TFIIB, chromatin modification via histone acetylation by TAF1, facilitation of DNA unwinding, and initiation of transcription. In mammals, the TAF2 basal transcription factor complex plays a major role in the initiation of RNA polymerase II (Pol II)-dependent transcription. It recognises and binds to promoters with or without a TATA box via its TBP subunit (TATA-box-binding protein), promoting the assembly of the PIC. The complex comprises TBP and TBP-associated factors (TAFs), including TAF1, TAF2, TAF3, TAF4, TAF5, TAF6, TAF7, TAF8, TAF9, TAF10, TAF11, TAF12, and TAF13. TAF2, in particular, forms a promoter DNA-binding subcomplex with TAF7 and TAF1.
