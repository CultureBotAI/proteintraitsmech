identifier: InterPro:IPR053805
label: "Bacteriophage N4 RNA polymerase, helical domain"
definition: >-
  This is a helical domain, also known as 'Fingers subdomain', found in the bacteriophage N4 virion RNA polymerase. This domain possesses two essential functions of the RNAP: the N-terminal part plays a role in the nucleotide addition cycle, whereas the C-terminal part is involved in promoter recognition. A swing motion of the N-terminal part of the fingers is coupled with nucleotide addition, translocation of the DNA-RNA hybrid, and downstream double-strand DNA opening.
