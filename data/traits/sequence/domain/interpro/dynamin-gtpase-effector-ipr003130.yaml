identifier: InterPro:IPR003130
label: Dynamin GTPase effector
definition: >-
  This entry represents the dynamin GTPase effector domain (GED) found in proteins related to dynamin. Its C-terminal region constitutes one of the helices of the bundle signalling element (BSE) or neck together with the N- and C-terminal regions from the GTPase domain, being in close proximity and functionally linked to it. The N-terminal region of GED is part of the stalk domain. Dynamin is a GTP-hydrolysing protein that is an essential participant in clathrin-mediated endocytosis by cells. It self-assembles into 'collars' in vivo at the necks of invaginated coated pits; the self-assembly of dynamin being coordinated by the GTPase domain. Mutation studies indicate that dynamin functions as a molecular regulator of receptor-mediated endocytosis.
