identifier: InterPro:IPR061981
label: "GtfB, third domain"
definition: >-
  GtfB is required for polymorphic O-glycosylation of serine-rich repeat proteins. GtfB, together with GtfA, forms a two-protein enzyme complex that is involved in glycosylation. GtfB stabilises the glycosylation activity of GtfA and forms a heterotetramer complex with GtfA. GtfB is a peripheral membrane protein localised to the cell membrane and is part of the accessory SecA2/SecY2 protein translocation system. This entry represents the third domain which may adopt an α/β fold.
