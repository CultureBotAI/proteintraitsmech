identifier: InterPro:IPR059049
label: "TSEN34, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of human tRNA-splicing endonuclease subunit Sen34 (TSEN34). This domain shows an α-β configuration and is often found associated with . TSEN34 constitutes one of the two catalytic subunits of the tRNA-splicing endonuclease complex, a complex responsible for identification and cleavage of the splice sites in pre-tRNA.
