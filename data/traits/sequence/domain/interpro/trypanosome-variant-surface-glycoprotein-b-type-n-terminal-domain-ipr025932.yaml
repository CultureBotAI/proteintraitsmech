identifier: InterPro:IPR025932
label: "Trypanosome variant surface glycoprotein, B-type, N-terminal domain"
definition: >-
  This entry represents the N-terminal of B-type variant surface glycoproteins (VSG) from trypanosomal parasites. VSG forms a coat on the surface of the parasite. The trypanosome evades the immune response of the host by expressing a series of antigenically distinct VSGs from an estimated 1000 VSG genes.
