identifier: InterPro:IPR006656
label: Molybdopterin oxidoreductase
definition: >-
  This domain is found in a number of molybdopterin-containing oxidoreductases, tungsten formylmethanofuran dehydrogenase subunit d (FwdD), and molybdenum formylmethanofuran dehydrogenase subunit (FmdD); where a single domain constitutes almost the entire subunit. This domain is also found in periplasmic nitrate reductases, trimethylamine-N-oxide reductases, dimethyl sulfoxide reductase DmsA among other dehydrogenases/reductases. The formylmethanofuran dehydrogenase catalyses the first step in methane formation from CO2 in methanogenic archaea and has a molybdopterin dinucleotide cofactor.
