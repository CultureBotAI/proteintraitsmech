identifier: InterPro:IPR063429
label: "Intron-encoded DNA endonuclease aI3, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of intron-encoded DNA endonuclease aI3, found in fungi. The aI3 protein is a mitochondrial DNA endonuclease involved in intron homing. The protein is encoded within intron 3 of the mitochondrial COX1 gene. Some members contain an N-terminal GIY-YIG endonuclease domain. The specific function of this domain remains to be determined. This domain may have a beta/beta/alpha/α/β fold.
