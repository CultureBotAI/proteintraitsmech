identifier: InterPro:IPR061311
label: "Bacteriophage P4, Ash protein, Icd-like domain"
definition: >-
  This entry represents the C-terminal domain of Ash protein and related sequences. This region exhibits a homologous sequence to Icd from temperate phage P1, which inhibits cell division in its host. Many proteins with this domain also have the Ash domain described by , which also occurs in phage.
