identifier: InterPro:IPR002102
label: Cellulosome anchoring protein, cohesin domain
definition: >-
  Cohesin domains interact with a complementary domain, termed the dockerin domain (see ). The cohesin-dockerin interaction is the crucial interaction for complex formation in the cellulosome. The scaffoldin component of the cellulolytic bacterium Clostridium thermocellum is a non-hydrolytic protein which organises the hydrolytic enzymes in a large complex, called the cellulosome. Scaffoldin comprises a series of functional domains, amongst which is a single cellulose-binding domain and nine cohesin domains which are responsible for integrating the individual enzymatic subunits into the complex.
