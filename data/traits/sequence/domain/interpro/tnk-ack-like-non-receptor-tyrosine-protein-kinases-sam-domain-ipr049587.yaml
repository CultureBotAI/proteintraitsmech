identifier: InterPro:IPR049587
label: "TNK(ACK)-like non-receptor tyrosine-protein kinases, SAM domain"
definition: >-
  This entry represents the SAM (sterile alpha motif) domain of TNK-like subfamily of non-receptor tyrosine-protein kinases. This is a putative protein-protein interaction domain. This entry includes TNK1 and TNK2 (also known as ACK1) non-receptor tyrosine-protein kinases. The SAM domain is at the N-terminal, followed by a catalytic domain and a few other domains. Members of this group are involved in the regulation of cell adhesion and growth, receptor degradation, and axonal guidance. Deletion of the SAM domain results in reduction of Ack1 ability to undergo autophosphorylation and dramatically reduces ubiquitination of Ack1 catalysed by HECT E3 ubiquitin ligase (Nedd4-1) during EGF-induced Ack1 degradation. It has been suggested that the lysine-rich region in SAM domain might be a major ubiquitination site. Members of this group are also associated with some cancers. Amplification of the Ack1 gene correlates with prostate and lung cancer progression, and Ack1 overexpression increases invasiveness. Oncogenicity of Tnk1 gene apparently depends on cell context; it may play a role in tumor suppression since Tnk1 knockout mice can develop spontaneous tumors.
