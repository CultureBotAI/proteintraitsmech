identifier: InterPro:IPR026951
label: "Peptidyl-prolyl cis-trans isomerase like 2, U-box domain"
definition: >-
  This entry represents the U-box domain found in peptidyl-prolyl cis-trans isomerase like 2 subfamily members. They are peptidyl-prolyl cis-trans isomerases that accelerate the folding of proteins. They catalyse the cis-trans isomerization of proline imidic peptide bonds in oligopeptides.
