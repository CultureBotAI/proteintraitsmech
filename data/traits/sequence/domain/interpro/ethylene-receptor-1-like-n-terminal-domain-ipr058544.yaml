identifier: InterPro:IPR058544
label: "Ethylene receptor 1-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of Ethylene receptor 1 from Arabidopsis thaliana (ETR1) and similar plant proteins. This domain, which is predicted to adopt an all α structure, is often found associated to . ETR1 acts as a redundant negative regulator of ethylene signalling. It is related to bacterial two-component regulators.
