identifier: InterPro:IPR041400
label: "PARP16 N-terminal domain"
definition: >-
  This is the N-terminal domain of poly ADP-ribose polymerase (PARP16 also known as ARTD15) present in homo sapiens. ARTDs catalyse the formation of branched or unbranched chains of ADP-ribose units on protein side chains. The N-terminal domain of ARTD15 does not share any obvious sequence similarity with the regulatory domains of ARTD1-4. The N-terminal domain arrangement in both ARTD15 and ARTD1-3 suggests a regulatory role through different mechanisms.
