identifier: InterPro:IPR027450
label: "Alpha-ketoglutarate-dependent dioxygenase AlkB-like"
definition: >-
  This superfamily brings together catalytic domains found in Alpha-ketoglutarate-dependent dioxygenase AlkB-like DNA/RNA demethylases. AlkB is a DNA repair enzyme that removes methyl adducts and some larger alkylation lesions from endocyclic positions on purine and pyrimidine bases. It is a dioxygenase that requires molecular oxygen, alpha-ketoglutarate and iron. The catalytic core of AlkB is homologous to other Fe-2OG dioxygenases. Two discrete global conformations have been observed for AlkB, differing in accessibility of a putative oxygen-diffusion tunnel.
