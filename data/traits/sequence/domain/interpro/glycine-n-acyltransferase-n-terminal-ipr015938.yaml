identifier: InterPro:IPR015938
label: Glycine N-acyltransferase, N-terminal
definition: >-
  This entry represents glycine N-acyltransferase (also called aralkyl acyl-CoA:amino acid N-acyltransferase; ). Mitochondrial acyltransferases catalyse the transfer of an acyl group from acyl-CoA to the N terminus of glycine to produce N-acylglycine. These enzymes can conjugate a multitude of substrates to form a variety of N-acylglycines. The CoA derivatives of a number of aliphatic and aromatic acids, but not phenylacetyl-CoA or (indol-3-yl)acetyl-CoA, can act as donor.
