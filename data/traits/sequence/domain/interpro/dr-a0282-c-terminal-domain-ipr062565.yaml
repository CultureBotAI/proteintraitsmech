identifier: InterPro:IPR062565
label: "DR_A0282, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of DR_A0282, a minor subunit of the S-layer deinoxanthin-binding complex (SDBC) from Deinococcus radiodurans. The SDBC is a porin-like channel complex involved in selective ion permeability across the bacterial cell surface layer. DR_A0282 shows sequence similarity to peptidases and is proposed to participate in protein substrate processing. The specific function of this domain remains to be determined.
