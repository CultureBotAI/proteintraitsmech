identifier: InterPro:IPR058369
label: "Domain of unknown function DUF8056"
definition: >-
  This entry represents a family of uncharacterised integral membrane proteins found in halobacteria. These proteins contain four predicted transmembrane helices. These proteins are often found in genomic contexts with a glucose-6-phosphate isomerase family proteins, which is usually diver gently transcribed to the gene in this family. SecD and SecF homologoues are also found in the genomic neighbourhood perhaps suggesting a role in secretion. Additionally members of are found as well.
