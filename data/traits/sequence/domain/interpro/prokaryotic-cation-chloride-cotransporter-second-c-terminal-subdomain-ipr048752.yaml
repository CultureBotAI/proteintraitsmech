identifier: InterPro:IPR048752
label: "Prokaryotic cation-chloride cotransporter, second C-terminal subdomain"
definition: >-
  This entry includes a group of prokaryotic cation-chloride cotransporters (CCCs), such as the Na-K-Cl cotransporter from Methanosarcina acetivorans ( ). These proteins consist of an N-terminal transmembrane transport region ( ) followed by a cytoplasmic regulatory domain. The C-terminal domain adopts a compact trapezoid-shaped elongated structure with a mixed α/β fold and can be divided in two structurally related subdomains. This entry represents the second subdomain, which shows a central five-stranded parallel β-sheet and three α-helices that pack on either face of the sheet.
