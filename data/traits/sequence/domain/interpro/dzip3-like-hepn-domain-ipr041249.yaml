identifier: InterPro:IPR041249
label: "DZIP3-like HEPN domain"
definition: >-
  This entry represents the DZIP3-like HEPN nuclease domain. It has been found fused to TPR, Zn-ribbon, RING, Ankyrin, CARD, NACHT ATPase, DEATH and LRR in various animal lineages. DZIP3 is a RNA-binding ubiquitin-protein ligase that targets H2AK119 (lysine 119 of histone H2A). It interacts with CARM1 (coactivator-associated arginine methyltransferase 1) through its RING domain and may act as a coactivator of ERalpha target gene expression .
