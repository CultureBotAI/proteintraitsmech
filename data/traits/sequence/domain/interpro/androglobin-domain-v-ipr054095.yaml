identifier: InterPro:IPR054095
label: "Androglobin, domain V"
definition: >-
  Androglobin is a protein with a key role in spermatogenesis. It is required for sperm flagellum formation and maturation of elongating spermatids, both essential for male fertility. Androglobin contains an N-terminal cysteine protease domain that lacks the catalytic cysteine, a tandem of three β-sandwich domains (domains II, IV, V) and a circularly permuted globin-like domain (domain III) that is inserted between domain II and IV. This entry represents domain V. This domain is predicted to adopt a jelly-roll topology that is observed in galactose-binding domains. It has a significant sequence similarity to domains found in ciliary protein FAP42 and to domain III in calpains. It is predicted to contain two large, nearly 80 residues long insertions in the loops both of which are likely to be disordered.
