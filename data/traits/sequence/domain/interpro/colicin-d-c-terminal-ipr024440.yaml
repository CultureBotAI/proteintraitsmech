identifier: InterPro:IPR024440
label: Colicin D, C-terminal
definition: >-
  Colicin D is a bacteriocin that kills target cells by cleaving tRNA(Arg). This entry represents a domain found in the C terminus of colicin D, which is responsible for its catalytic activity. The domain is also found in some S-type pyocins, which are also bacteriocins.
