identifier: InterPro:IPR032382
label: "Alternaria alternata allergen 1-like"
definition: >-
  Alt a 1 family proteins (AA1s) have only been observed in the Dothideomycetes and Sordariomycetes classes of fungi. AA1-like proteins are fungal toxins that can induce plant defence responses and cell death. They may contribute to virulence by protecting the cell wall, thus allowing fungal growth to be maintained and preventing the recognition of degraded beta-1,3-glucan by the plant. This entry also includes Small cysteine-rich protein 8 which is a secreted effector that contributes to virulence during cotton plant infection.
