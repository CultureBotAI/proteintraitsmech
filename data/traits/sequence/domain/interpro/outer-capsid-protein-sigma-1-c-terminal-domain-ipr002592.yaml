identifier: InterPro:IPR002592
label: Outer capsid protein sigma-1, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of Outer capsid protein sigma-1 from Reovirus type 1 (S1, also known as Cell attachment protein) and similar proteins from reovirales. This glycoprotein is a minor capsid protein and also determines the serotype-specific humoral immune response. Sigma 1 consist of a fibrous tail and a globular head. The head, a gobular domain that folds into a compact, eight-stranded β-barrel (this entry) has important roles in the cell attachment function of sigma 1 and determinant of the type-specific humoral immune response.
