identifier: InterPro:IPR062219
label: "Uncharacterized oxidoreductase YuxG, second domain"
definition: >-
  This entry represents a second aldolase class II domain found in bifunctional rhamnulose-1-phosphate aldolase/alcohol dehydrogenase proteins (RhaEW), including Uncharacterized oxidoreductase YuxG. This domain is approximately 180 residues in length and is located between the N-terminal Aldolase_II domain and the C-terminal short-chain dehydrogenase/ reductase domain. In Bacillus subtilis, the rhaEW gene (yuxG) is part of the rhaEWRBMA operon involved in L-rhamnose catabolism. These bifunctional enzymes are widespread in bacteria and play roles in rhamnose utilisation pathways.
