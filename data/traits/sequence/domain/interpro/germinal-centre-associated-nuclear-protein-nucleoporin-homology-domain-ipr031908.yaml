identifier: InterPro:IPR031908
label: "Germinal-centre associated nuclear protein, nucleoporin homology domain"
definition: >-
  This entry represents the nucleoporin-homology domain at the N terminus of human GANP or germinal-centre associated nuclear proteins (GANP). GANP is involved in the nuclear export of poly(A)-containing mRNAs by acting as a scaffold for the TREX-2 complex. This domain binds to export factor NXF1. Through this interaction, GANP facilitates the transfer of NXF1-containing mRNPs (messenger ribonucleoproteins) to nuclear pore complexes.
