identifier: InterPro:IPR034205
label: "Nitrous-oxide reductase, C-terminal"
definition: >-
  Nitrous-oxide reductase participates in nitrogen metabolism and catalyzes the last step in dissimilatory nitrate reduction, the two-electron reduction of N2O to N2. It contains copper ions as cofactors in the form of a binuclear CuA centre at the site of electron entry and a tetranuclear CuZ centre at the active site. The C terminus of Nitrous-oxide reductase is a cupredoxin domain.
