identifier: InterPro:IPR046943
label: "Myosin 2/2A, cargo-binding domain, fungi"
definition: >-
  Class V myosins are well studied unconventional myosins. In contrast to three paralogues in vertebrates ( , , ), yeast myosin V travels along actin cables, actin filaments that are bundled by fimbrin, in the presence of tropomyosin. Their C-terminal cargo binding domains (CBDs) are important for the binding of a diverse set of cargos, including membrane vesicles, organelles, proteins and mRNA. They interact with several adaptor proteins, in case of Myo2-CBD, the vacuole-specific cargo adaptor Vac17 and the mitochondria-specific cargo adaptor Mmr1.
