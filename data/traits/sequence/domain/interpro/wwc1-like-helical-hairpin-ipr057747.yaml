identifier: InterPro:IPR057747
label: "WWC1-like, helical hairpin"
definition: >-
  This domain is found in human Protein KIBRA (WWC1) and similar animal proteins. WWC1 is a regulator of the Hippo signalling pathway that negatively regulates cell proliferation and organ growth. This domain is predicted to form an helical hairpin.
