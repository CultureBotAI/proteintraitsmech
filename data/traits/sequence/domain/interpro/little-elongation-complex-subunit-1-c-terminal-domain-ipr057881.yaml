identifier: InterPro:IPR057881
label: "Little elongation complex subunit 1, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of ICE1 mainly in animals. This domain is predicted to adopt an all-α configuration. Little elongation complex subunit 1 (ICE1) acts as a scaffold protein that promotes the LEC complex formation and recruitment and RNA polymerase II occupancy at small nuclear RNA (snRNA) genes in subnuclear bodies.
