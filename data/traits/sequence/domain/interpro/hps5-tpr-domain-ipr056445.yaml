identifier: InterPro:IPR056445
label: "HPS5, TPR domain"
definition: >-
  This entry represents the TPR domain found at the C-terminal of HPS5 protein from vertebrates, a component of the biogenesis of lysosome-related organelles complex-2 (BLOC-2) and which has a role in the endo-lysosomal dynamics of skin fibroblasts. Its mutation or absence has been linked to Hermansky-Pudlak type 5 syndrome (HPS-5) in mammals, a disease characterised by defects in lysosome-related organelles such as melanosomes and platelet dense granules. The specific function of this domain is unknown.
