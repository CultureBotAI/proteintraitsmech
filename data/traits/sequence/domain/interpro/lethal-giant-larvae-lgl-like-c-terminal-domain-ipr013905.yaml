identifier: InterPro:IPR013905
label: "Lethal giant larvae (Lgl)-like, C-terminal domain"
definition: >-
  This domain is found in distinct proteins such as the metazoan homologues of Lethal(2) giant larvae protein homolog 1 and yeast homologues of Exocytosis protein SRO77. The Lethal giant larvae (Lgl) tumour suppressor protein is conserved from yeast to mammals. The Lgl protein functions in cell polarity, at least in part, by regulating SNARE-mediated membrane delivery events at the cell surface. The N-terminal half of Lgl members contains WD40 repeats (see ), while the C-terminal half appears specific to the protein.
