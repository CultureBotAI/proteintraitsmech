identifier: InterPro:IPR063376
label: "ANKFN1, alpha/beta domain"
definition: >-
  This entry represents a conserved domain found in ANKFN1 (ankyrin repeat and fibronectin type-III domain-containing 1) proteins in metazoans. This domain is located downstream of the ankyrin repeat, fibronectin type-III domains and a conserved domain of unknown function. ANKFN1 is required for neurological function including vestibular function, circadian behaviour and fear learning. The domain contains the highly conserved GLYLGYLK peptide motif; a single glycine to alanine substitution within this motif is sufficient to abolish ANKFN1 function in mice. The specific function of this domain remains to be determined.
