identifier: InterPro:IPR044462
label: "RBM46, double-stranded RNA binding domain"
definition: >-
  This entry represents the C-terminal double-stranded RNA binding motif (DSR) of RBM46. RNA-binding motif protein 46 (RBM46), also known as cancer/testis antigen 68 (CT68), is a germ cell-specific RNA-binding protein that is essential for spermatogenesis and male fertility. It is involved in the regulation of gene expression during meiosis. It has been shown to bind to and stabilise Cdx2 mRNA in early mouse embryos. RBM46 contains two well-defined and one degenerated RNA recognition motifs (RRMs) and a C-terminal double-stranded RNA binding motif (DSRM).
