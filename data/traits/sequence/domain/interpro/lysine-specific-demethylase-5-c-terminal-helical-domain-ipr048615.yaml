identifier: InterPro:IPR048615
label: "Lysine-specific demethylase 5, C-terminal helical domain"
definition: >-
  This entry represents the C-terminal helical domain from Lysine-specific demethylase 5A-D (KDM5A-D) and similar eukaryotic sequences. This helical domain is located C-terminal to the Jumonji C (JmjC) domain ( ), which gives it this name, and N-terminal to the C5HC2 zinc finger motif ( ).
