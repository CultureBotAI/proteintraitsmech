identifier: InterPro:IPR044114
label: Bile acid receptor, ligand binding domain
definition: >-
  This entry represents the ligand binding domain found in bile acid receptor NR1H4 (also known as farnesoid X-activated receptor, FXR). NR1H4 is a ligand-activated transcription factor belonging to the nuclear receptor (NR) superfamily. It regulates bile salt, glucose and cholesterol homeostasis by binding to DNA response elements, thereby activating gene expression. It is a receptor for bile acids (BAs) such as chenodeoxycholic acid (CDCA), lithocholic acid, deoxycholic acid (DCA) and allocholic acid (ACA). It also inhibits the immune response via tethering to NF-kappaB.
