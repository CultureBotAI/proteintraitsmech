identifier: InterPro:IPR047967
label: "PolX, PHP domain"
definition: >-
  The bacterial/archaeal X-family DNA polymerases (PolXs) have a PHP domain at their C-terminal, represented in this entry. The bacterial/archaeal PolX core domain and PHP domain interact with each other and together are involved in metal dependent 3'-5' exonuclease activity. PolX is found in all kingdoms, however bacterial PolXs have a completely different domain structure from eukaryotic PolXs. Bacterial PolX has an extended conformation in contrast to the common closed 'right hand' conformation for DNA polymerases. This extended conformation is stabilized by the PHP domain. The PHP domain of PolX is structurally homologous to other members of the PHP family that has a distorted (β/α)7 barrel fold with a trinuclear metal site on the C-terminal side of the barrel.
