identifier: InterPro:IPR048058
label: "rRNA biogenesis protein RRP5, S1 domain, eleventh repeat"
definition: >-
  This entry represents the S1 repeat 11 from Homo sapiens Rrp5 (hs11) and S1 repeat 8 in S. cerevisiae (sc8). Rrp5 has two distinct regions, an N-terminal region containing tandemly repeated S1 RNA-binding domains (12 S1 repeats in Saccharomyces cerevisiae Rrp5 and 14 S1 repeats in Homo sapiens Rrp5) and a C-terminal region containing tetratricopeptide repeat (TPR) motifs thought to be involved in protein-protein interactions. Mutational studies have shown that each region represents a specific functional domain. Deletions within the S1-containing region inhibit pre-rRNA processing at either site A3 or A2, whereas deletions within the TPR region confer an inability to support cleavage of A0-A2. Rrp5 is involved in the biogenesis of rRNA. It is required for formation of both 18S and 5.8S rRNA in budding yeasts. In humans, it is also known as NFBP, which is essential for the generation of 18S rRNA. In Arabidopsis, it is essential for normal development of female gametophytes.
