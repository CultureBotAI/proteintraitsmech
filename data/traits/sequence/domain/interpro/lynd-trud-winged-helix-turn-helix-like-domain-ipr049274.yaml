identifier: InterPro:IPR049274
label: "LynD/TruD, winged helix-turn-helix-like domain"
definition: >-
  This domain is found at the N-terminal of predicted TruD, a protein involved in cyanobactin heterocyclisation. It is also found in the related LynD protein, an ATP-dependent enzyme that heterocycles multiple cysteine residues to thiazolines within peptide substrates. It adopts a winged helix-turn-helix structure. The function of this domain is unclear. This entry also includes putatives YcaO domain-containing proteins.
