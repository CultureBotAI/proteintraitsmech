identifier: InterPro:IPR002073
label: 3'5'-cyclic nucleotide phosphodiesterase, catalytic domain
definition: >-
  This entry represents the catalytic domain of approximately 270 amino acids at the carboxyl terminus in PDEase enzymes. Regulatory domains that vary widely among the PDEase subfamilies flank the catalytic core and include regions that autoinhibit the catalytic domains as well as targeting sequences that control subcellular localization. PDEase catalytic domains adopt a compact α-helical structure consisting of 16 α-helices that can be divided into three subdomains. The active site of PDEases is a deep pocket formed by the three subdomains and can be divided into two major subpockets for binding of divalent metals and substrate/inhibitors, respectively. The active site of all PDEase domains contains two divalent metal ions: zinc and probably magnesium. The cyclic nucleotide phosphodiesterases (PDE) comprise a group of enzymes that degrade the phosphodiester bond in the second messenger molecules cAMP and cGMP. They are divided into 11 families. They regulate the localisation, duration and amplitude of cyclic nucleotide signalling within subcellular domains. PDEs are therefore important for signal transduction. PDE enzymes are often targets for pharmacological inhibition due to their unique tissue distribution, structural properties, and functional properties. Inhibitors include: Roflumilast for chronic obstructive pulmonary disease and asthma, Sildenafil for erectile dysfunction and Cilostazol for peripheral arterial occlusive disease, amongst others. Retinal 3',5'-cGMP phosphodiesterase is located in photoreceptor outer segments: it is light activated, playing a pivotal role in signal transduction. In rod cells, PDE is oligomeric, comprising an alpha-, a beta-and 2 gamma-subunits, while in cones, PDE is a homodimer of alpha chains, which are associated with several sma…
