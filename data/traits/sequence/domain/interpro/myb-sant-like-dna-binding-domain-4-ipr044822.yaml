identifier: InterPro:IPR044822
label: "Myb/SANT-like DNA-binding domain 4"
definition: >-
  This presumed domain appears to be related to other Myb/SANT-like DNA binding domains. In particular seems most related. Proteins containing this domain are greatly expanded in plants and appears in several proteins annotated as transposon proteins.
