identifier: InterPro:IPR034510
label: "SECp43, RNA recognition motif 2"
definition: >-
  This entry represents the RNA recognition motif 2 (RRM2) of SECp43, an RNA-binding protein associated specifically with eukaryotic selenocysteine tRNA [tRNA(Sec)]. It may play an adaptor role in the mechanism of selenocysteine insertion. SECp43 is located primarily in the nucleus and contains two N-terminal RNA recognition motifs (RRMs) and a C-terminal polar/acidic region.
