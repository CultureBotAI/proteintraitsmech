identifier: InterPro:IPR013727
label: "Two-component sensor kinase, N-terminal"
definition: >-
  This domain is found in bacterial two-component sensor kinases towards the N terminus. Proteins containing this domain includes sensor protein QseC, which is a member of a two-component regulatory system QseB/QseC. It recognises Autotinducer 3 (AI-3), epinephrine, norepinephrine and Fe(III) (Matilla et. al., FEMS Microbiology Reviews, fuab043, 45, 2021, 1. https://doi.org/10.1093/femsre/fuab043).
