identifier: InterPro:IPR040747
label: "BILBO1, N-terminal domain"
definition: >-
  This is the N-terminal domain of BIBLO1 present mostly in Trypanosomatidae. BILBO1 is a flagella pocket collar component. Depletion of BIBLO1 prevents flagella pocket and flagella pocket collar biogenesis and leads to cell death. This domain has a ubiquitin-like fold and has a conserved patch of four aromatic residues (Phe-12, Trp-71, Tyr-87, and Phe-89) and three basic residues (Lys-15, Lys-60, and Lys-62).
