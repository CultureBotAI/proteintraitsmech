identifier: InterPro:IPR055234
label: "Pheromone cCF10 receptor-like, TPR region"
definition: >-
  This entry represents the C-terminal tetratricopeptide repeat region (TPR) of the pheromone cCF10 receptor from Enterococcus faecalis (PrgX, ), which serves as a molecular switch controlling expression of conjugation and virulence genes encoded by the conjugative plasmid pCF10. This region includes two domains: a large central dimerisation (and pheromone-binding) domain, and a C-terminal regulatory domain that is important for structural integrity.
