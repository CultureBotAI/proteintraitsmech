identifier: InterPro:IPR028649
label: "Sorting nexin-30, BAR domain"
definition: >-
  Sorting nexin-30 (SNX30) contains a PX (phox homology) domain and belongs to the sorting nexin family. It may be involved in several stages of intracellular trafficking. This entry represents the C-terminal Bin/Amphiphysin/Rvs (BAR) domain of SNX30.
