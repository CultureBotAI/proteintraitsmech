identifier: InterPro:IPR056451
label: "DNA repair protein rhp7, treble clef domain"
definition: >-
  This domain is found in the DNA repair protein rhp7 and related fungal proteins. Rhp7 is involved in nucleotide excision repair. It is forming a complex with Rhp16 which was shown to be essential for global genome repair in S.pombe. The domain represented by this entry is predicted to adopt a treble clef fold. It contains a pair of two highly conserved CxxC sequence motifs.
