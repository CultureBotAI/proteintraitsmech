identifier: InterPro:IPR026679
label: Microtubule-associated protein 10, C-terminal
definition: >-
  This entry represents a C-terminal domain found in microtubule-associated protein 10. Microtubule-associated protein 10 (MAP10, also known as MTR120/KIAA1383) localises to stabilised MTs during interphase and to the mitotic apparatus during mitosis. It may promote microtubule stability and ensures normal progress of cytokinesis.
