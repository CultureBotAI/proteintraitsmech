identifier: InterPro:IPR060120
label: "L-aspartate--L-methionine ligase, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the L-aspartate--L- methionine ligase (LdmS) found in Staphylococcus aureus. While the full-length protein has characterised ligase activity, the specific function of this N-terminal domain remains to be determined. This entry includes L-amino acid ligases that catalyse the ATP-dependent formation of dipeptides, specifically L-aspartyl-L-methionine. They exhibit substrate specificity, showing higher activity with L-aspartate and L-methionine, and reduced activity with other amino acid combinations. These enzymes do not function with L-methionine analogs or when key functional groups on the substrates are modified. They are also nucleotide-specific, requiring ATP and not other nucleoside triphosphates. These proteins play a role in sulfur amino acid metabolism.
