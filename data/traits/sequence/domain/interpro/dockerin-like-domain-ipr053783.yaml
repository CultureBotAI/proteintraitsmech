identifier: InterPro:IPR053783
label: "Dockerin-like domain"
definition: >-
  This entry represents a domain often found at the C-terminal end of a group of bacterial proteins that begins and ends with a near invariant C, and GC, respectively. It shows sequence homology to the type I dockerin domain (see ), which likewise contains an internal repeat and which appears in strictly C-terminal positions of otherwise unrelated proteins. Type I dockerin domains occur in proteins that are organised by interaction with the cohesin domain in order to form the cellulosome. However, the GC-type dockerin domain described here is uncharacterised.
