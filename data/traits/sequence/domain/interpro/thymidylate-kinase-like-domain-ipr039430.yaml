identifier: InterPro:IPR039430
label: "Thymidylate kinase-like domain"
definition: >-
  This entry represents a domain found in thymidylate kinase and mitochondrial UMP-CMP kinase. Thymidylate kinase ( ; dTMP kinase) catalyses the phosphorylation of thymidine 5'-monophosphate (dTMP) to form thymidine 5'-diphosphate (dTDP) in the presence of ATP and magnesium: ATP + thymidine 5'-phosphate = ADP + thymidine 5'-diphosphate Thymidylate kinase is an ubiquitous enzyme of about 25 Kd and is important in the dTTP synthesis pathway for DNA synthesis. The function of dTMP kinase in eukaryotes comes from the study of a cell cycle mutant, cdc8, in Saccharomyces cerevisiae. Structural and functional analyses suggest that the cDNA codes for authentic human dTMP kinase. The mRNA levels and enzyme activities corresponded to cell cycle progression and cell growth stages. From a phylogenetic analysis, human mitochondrial UMP-CMP kinase has been shown to be closer to thymidylate kinase than to cytosolic UMP-CMP kinase. It phosphorylates dUMP, dCMP, CMP, and UMP with ATP as phosphate donor.
