identifier: InterPro:IPR044082
label: "SpaK/NisK-like, Histidine kinase-like ATPase domain"
definition: >-
  This domain is a histidine kinase-like ATPase (HATPase) domain of two-component sensor histidine kinases similar to Bacillus subtilis SpaK and Lactococcus lactis NisK. SpaK is the histidine kinase (HK) of the SpaK-SpaR two-component regulatory system (TCS), which is involved in the regulation of the biosynthesis of lantibiotic subtilin. NisK is the HK of the NisK-NisR TCS, which is involved in the regulation of the biosynthesis of lantibiotic nisin. SpaK and NisK may function as membrane-associated protein kinases that phosphorylate SpaR and NisR, respectively, in response to environmental signals.
