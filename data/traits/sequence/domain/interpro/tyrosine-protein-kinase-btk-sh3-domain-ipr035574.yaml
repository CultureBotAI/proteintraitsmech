identifier: InterPro:IPR035574
label: "Tyrosine-protein kinase BTK, SH3 domain"
definition: >-
  Btk (Bruton tyrosine kinase) is a member of the Tec family, which is a group of nonreceptor tyrosine kinases containing Src homology protein interaction domains (SH3, SH2) N-terminal to the catalytic tyr kinase domain. Btk also contains an N-terminal pleckstrin homology (PH) domain, which binds the products of PI3K and allows membrane recruitment and activation, and the Tec homology (TH) domain with proline-rich and zinc-binding regions. Btk is expressed in B-cells, and a variety of myeloid cells including mast cells, platelets, neutrophils, and dendrictic cells. It interacts with a variety of partners, from cytosolic proteins to nuclear transcription factors, suggesting a diversity of functions. Stimulation of a diverse array of cell surface receptors, including antigen engagement of the B-cell receptor (BCR), leads to PH-mediated membrane translocation of Btk and subsequent phosphorylation by Src kinase and activation. Btk plays an important role in the life cycle of B-cells including their development, differentiation, proliferation, survival, and apoptosis. Mutations in Btk cause the primary immunodeficiency disease, X-linked agammaglobulinaemia (XLA) in humans.
