identifier: InterPro:IPR049487
label: "Beta-galactosidase-like, galactose-binding domain"
definition: >-
  This domain is found in Beta-galactosidase from Streptococcus pneumoniae (BgaA, ) and similar bacterial sequences. BgaA is specific for terminal galactose residues β-1-4 linked to glucose or N-acetylglucosamine. It is involved in pneumococcal growth, resistance to opsonophagocytic killing, and adherence. This entry represents two non-enzymatic carbohydrate-binding modules (CBMs) that mediate adherence to the host cell surface displayed lactose or N-acetyllactosamine. Each of these CBMs folds into a β-sandwich fold comprising opposing sheets of 4- and 5-antiparallel β-strands.
