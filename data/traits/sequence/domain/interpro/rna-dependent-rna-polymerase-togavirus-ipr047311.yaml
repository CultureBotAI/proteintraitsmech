identifier: InterPro:IPR047311
label: "RNA-dependent RNA polymerase, togavirus"
definition: >-
  This entry represents the RNA-directed RNA polymerase of RNA viruses belonging to the family Togaviridae, which is cleaved from polyprotein P1234. Togaviridae is a family of small, enveloped viruses with (+)ssRNA genomes of 10-12 kb, and contains a single genus, Alphavirus. Alphavirus includes a large number of species that are mostly mosquito-borne and pathogenic in their vertebrate hosts. Many are important human and veterinary pathogens (e.g., chikungunya virus, eastern equine encephalitis virus). The genus Alphavirus mainly consists of mosquito-borne viruses although other hematophagous insects, including ticks, lice, and cliff swallow bugs, have been implicated in transmission. Vertebrate hosts include humans, non-human primates, equids, birds, amphibians, reptiles, rodents, and pigs. There are two aquatic alphaviruses, southern elephant seal virus and salmon pancreas disease virus, infecting sea mammals and fish respectively. Interestingly, Eilat virus (EILV) has been shown to only infect insect cells and is incapable of replicating in vertebrate cells. This domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in the fidelity of processes such as correct incorporation and reorganization of nucleotides.
