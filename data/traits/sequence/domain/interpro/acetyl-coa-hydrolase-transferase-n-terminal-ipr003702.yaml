identifier: InterPro:IPR003702
label: Acetyl-CoA hydrolase/transferase, N-terminal
definition: >-
  This entry represents an acetyl-CoA hydrolase/transferase N-terminal domain. This domain is found in several enzymes which take part in pathways involving acetyl-CoA, including acetyl-CoA hydrolase , propionyl-CoA:succinate CoA transferase, succinyl-CoA:coenzyme A transferase (CAT1) and 4-hydroxybutyrate coenzyme A transferase (CAT2) . Acetyl-CoA hydrolase catalyses the formation of acetate from acetyl-CoA, Succinyl-CoA:coenzyme A transferase (CAT1) produces succinyl-CoA, and propionyl-CoA:succinate CoA transferase transfer of coenzyme A from propionyl-CoA to succinate.
