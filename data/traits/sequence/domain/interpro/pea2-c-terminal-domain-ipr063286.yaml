identifier: InterPro:IPR063286
label: "PEA2, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the PEA2 family of proteins found in fungi. PEA2 is localised to sites of polarised growth and is required for efficient mating and bipolar budding in yeast. PEA2 is found at cellular bud sites, bud necks, bud tips and mating projection tips, and is a component of the polarisome complex involved in establishment of cell polarity and actin cytoskeleton organisation. The specific function of this domain remains to be determined.
