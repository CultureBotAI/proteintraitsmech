identifier: InterPro:IPR061183
label: "PLxRFG domain"
definition: >-
  This domain, nearly 700 residues long, begins with a nearly invariant motif YxPLxRFGx[YF]. It occurs as the extreme C-terminal domain of large size proteins mainly found in tailed bacteriophages and bacterial prophages, some over 5000 amino acids long with an average of nearly 3000. The function is unknown.
