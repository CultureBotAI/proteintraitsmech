label: MASE8
definition: >-
  This entry represents the membrane-associated sensor domain MASE8, which is found in association with GGDEF domain ( ), histidine sensor kinases and adenylate cyclase output domain ( ). This domain is widespread among various classes of proteobacteria and is also found in other phyla.
