identifier: InterPro:IPR030570
label: "Kelch-like protein 32, BTB/POZ domain"
definition: >-
  The KLHL (Kelch-like) proteins generally have a BTB/POZ domain, a BACK domain, and five to six Kelch motifs. They constitute a subgroup at the intersection between the BTB/POZ domain and Kelch domain superfamilies. The BTB/POZ domain facilitates protein binding, while the Kelch domain (repeats) form β-propellers. The Kelch superfamily of proteins can be subdivided into five groups: (1) N-propeller, C-dimer proteins, (2) N-propeller proteins, (3) propeller proteins, (4) N-dimer, C-propeller proteins, and (5) C-propeller proteins. KLHL family members belong to the N-dimer, C-propeller subclass of Kelch repeat proteins. In addition to BTB/POZ and Kelch domains, the KLHL family members contain a BACK domain, first described as a 130-residue region of conservation observed amongst BTB-Kelch proteins. Many of the Kelch-like proteins have been identified as adaptors for the recruitment of substrates to Cul3-based E3 ubiquitin ligases. Kelch-like protein 32 (KLHL32), also called BTB and kelch domain-containing protein 5 (BKLHD5), contains a BTB domain and kelch repeats, characteristics of a kelch family protein. Its function remains unclear. Deletion of KLHL32 may be associated with Tourette syndrome and obsessive-compulsive disorder. Its function is not clear. This entry represents the BTB/POZ domain of KLHL32, a common protein-protein interaction module of about 100 amino acids.
