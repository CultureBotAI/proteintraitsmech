identifier: InterPro:IPR058594
label: "PB1-like domain, plants"
definition: >-
  This domain is found in uncharacterised proteins from plants. It has a detectable similarity to known PB1 (Phox and Bem1) domains and is predicted to adopt a similar structure with a β-grasp topology.
