identifier: InterPro:IPR058834
label: "ALG44, beta-barrel domain"
definition: >-
  This domain is found in Alg44 from Pseudomonas aeruginosa and related proteins. The domain represented in this entry folds into a six-stranded closed β-barrel with a greek-key topology which has a structural similarity to the C-terminal domain of alanine racemase. This domain is interrupted by the barrel-sandwich hybrid domain which is inserted after the first β-strand of the barrel. This model does not include the N-terminal strand. Alg44 is a membrane protein that along Alg8 is required in vivo for the polymerisation reaction leading to alginate production.
