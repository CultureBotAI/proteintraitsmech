identifier: InterPro:IPR060030
label: "NEDD4-binding protein 2, UBA domain"
definition: >-
  This ubiquitin-associated (UBA) domain is found in human NEDD4-binding protein 2 (N4BP2), which has as 5'-polynucleotide kinase and nicking endonuclease activity and may play a role in DNA repair or recombination. UBA domains are often involved in ubiquitin binding.
