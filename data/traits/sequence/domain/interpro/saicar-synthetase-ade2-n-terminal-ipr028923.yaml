identifier: InterPro:IPR028923
label: "SAICAR synthetase/ADE2, N-terminal"
definition: >-
  Phosphoribosylaminoimidazole-succinocarboxamide synthase ( ) (SAICAR synthetase) catalyses the seventh step in the de novo purine biosynthetic pathway; the ATP-dependent conversion of 5'-phosphoribosyl-5-aminoimidazole-4-carboxylic acid and aspartic acid to SAICAR. This domain can be found in SAICAR synthetases as a monofunctional protein from the bacteria (purC), fungi (ADE1) and plants (Pur7). In animals, this domain can be found at the N-terminal of a multifunctional enzyme (ADE2) possessing both the SAICAR synthetase and the phosphoribosylaminoimidazole carboxylase (AIR carboxylase) activity.
