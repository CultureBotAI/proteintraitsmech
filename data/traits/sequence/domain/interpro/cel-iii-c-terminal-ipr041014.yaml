identifier: InterPro:IPR041014
label: "CEL-III, C-terminal"
definition: >-
  This is the C-terminal domain found in CEL-III protein which is a lectin that exhibits both hemolytic and hemagglutinating activity. The domain is responsible for oligomerization and insertion of CEL-III into the erythrocyte membrane. The domain is composed of eight stranded β sandwich and two α helices, the latter changes conformation upon binding to the cell surface carbohydrates.
