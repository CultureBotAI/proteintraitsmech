identifier: InterPro:IPR047333
label: "RUN and FYVE domain-containing protein 2, FYVE domain"
definition: >-
  This entry represents the FYVE domain of RUFY2 and similar proteins from vertebrates. RUN and FYVE domain-containing protein 2 (RUFY2) is a novel embryonic factor that contains an N-terminal RUN domain and a C-terminal FYVE domain with two coiled-coil domains in-between. It is present in the nucleus at early stages of embryonic development. It may have both endosomal functions in the cytoplasm and nuclear functions. It is a paralogue of RUFY1.
