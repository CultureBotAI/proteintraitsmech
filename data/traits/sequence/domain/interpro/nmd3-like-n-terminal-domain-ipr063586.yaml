identifier: InterPro:IPR063586
label: "NMD3-like, N-terminal domain"
definition: >-
  The NMD3 protein is involved in nonsense mediated mRNA decay. This amino terminal region contains four conserved CXXC motifs that could be metal binding. NMD3 is involved in export of the 60S ribosomal subunit is mediated by the adapter protein Nmd3p in a Crm1p-dependent pathway. This entry represents a presumed domain found at the N-terminal of these proteins, which may adopt an elongated configuration consisting of four β-strands of which three are relatively long and a short α helix that spaces an additional pair of anti-parallel β-strands.
