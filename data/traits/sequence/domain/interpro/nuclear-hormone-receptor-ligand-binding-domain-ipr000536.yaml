identifier: InterPro:IPR000536
label: "Nuclear hormone receptor, ligand-binding domain"
definition: >-
  Nuclear receptors (NRs), such as the receptors for steroids and thyroid hormones, retinoids and vitamin D3, are one of the most abundant classes of transcriptional regulators in animals (metazoans). They regulate diverse functions, such as homeostasis, reproduction, development and metabolism. The most prominent feature differentiating them from other transcription factors is their capacity to bind small hydrophobic molecules specifically. These ligands constitute regulatory signals, which modify the NR transcriptional activity through conformational changes. Prototypical NRs share a common structural organisation with a variable N-terminal domain that contains a constitutively active activation function (AF)-1, a conserved DNA- binding domain (DBD) consisting of two zinc fingers, a linker region, and a C-terminal ligand-binding domain (LBD), also called HOLI domain. The NR LBD plays a crucial role in ligand-mediated NR activity. In addition to its role is ligand recognition, the LBD also contains a ligand-dependent AF-2. Conformational changes in AF-2 induced by various ligands can modulate interactions with conserved motifs of coregulatory proteins. Specifically, the binding of ligands to the LBD determines the recruiting of transcriptional coregulators which triggers induction or repression of target genes. The coregulators include coactivators like the p160 factors also referred to as the steroid receptor coactivators (SRC) family, and corepressors such as SMART (silencing mediator for retinoid and thyroid hormone receptors) and N-CoR (nuclear corepressor). The overall structure of NR LBD is composed of about 11-13 α-helices that are arranged into a three-layer antiparallel α-helical sandwich with the three long helices (helices 3, 7, and 10) forming the two outer…
