identifier: InterPro:IPR056259
label: "Caspase-8, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of Caspase-8 from Drosophila melanogaster (Dredd) and similar proteins mainly found in insects. Dredd is an effector of the programmed cell death (PCD) activators rpr, grim and hid. It plays a role in the innate immune response and may be involved in apoptosis in the germline as well as soma. It plays a role in the innate immune response, it is required for resistance to Gram-negative bacterial infection. These proteins have a caspase domain ( ) at the C-terminal. This domain is predicted to adopt an all-α configuration.
