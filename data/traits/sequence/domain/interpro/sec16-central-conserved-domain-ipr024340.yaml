identifier: InterPro:IPR024340
label: "Sec16, central conserved domain"
definition: >-
  The yeast protein Sec16 plays a key role in the formation of coat protein II vesicles, which mediate protein transport from the endoplasmic reticulum (ER) to the Golgi apparatus. Mammals have two isoforms of this protein - Sec16A and Sec16B. Sec16A appears to be the primary orthologue as it has the highest sequence similarity to the yeast sequence. Sec16B is involved in export of the peroxisomal membrane biogenesis factor peroxin 16. This entry represents the central conserved domain (CCD) of Sec16, found in all isoforms of this protein. The CCD is necessary for targeting of the protein to the ER.
