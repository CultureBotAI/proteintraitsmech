identifier: InterPro:IPR059729
label: "YonJ, middle domain"
definition: >-
  This entry represents the middle coiled-coil domain of uncharacterised YonJ proteins found in bacteria and viruses. The full-length proteins are distributed across both Bacillati and viruses, including members from Paenibacillus species and Spbetavirus. Members include YonJ from Bacillus subtilis, which is derived from the SPbeta prophage. The full-length proteins contain a predicted coiled-coil region. The function of this coiled-coil domain remains to be determined.
