identifier: InterPro:IPR041227
label: "Mu-like prophage FluMu N-terminal domain"
definition: >-
  Structural analysis of HI1506 (also known as Mu-like prophage FluMu protein gp35) from Haemophilus influenzae showed that HI1506 consists of two structured domains connected by an unstructured 30 amino acid loop. This entry is the N-terminal domain which comprises a three-stranded antiparallel β-sheet packed against an α-helix.
