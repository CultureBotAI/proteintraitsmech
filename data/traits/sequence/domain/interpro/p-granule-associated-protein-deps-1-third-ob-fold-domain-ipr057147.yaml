identifier: InterPro:IPR057147
label: "P-granule-associated protein DEPS-1, third OB-fold domain"
definition: >-
  This domain is found in the P-granule-associated protein DEPS-1 from Caenorhabditis elegans and related proteins from worms. DEPS-1 is predicted to contain six OB-fold-like β-barrel domains. This entry represents the third of these domains. DEPS-1 is a component of the P-granules and is required for their formation and integrity in adult germ cells. This protein is also involved in RNA-mediated silencing (RNAi) of germline-expressed genes.
