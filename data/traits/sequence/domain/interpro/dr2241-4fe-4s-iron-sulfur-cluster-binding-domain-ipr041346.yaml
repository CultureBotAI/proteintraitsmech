identifier: InterPro:IPR041346
label: "DR2241, 4Fe-4S iron-sulfur cluster binding domain"
definition: >-
  This is the C-terminal domain found in Deinococcus radiodurans protein DR2241 (a Ribosomal protein S2-related protein). This domain has been shown to harbour the sequence motifs CxxC and CxxxC which bind a [4Fe-4S] iron-sulphur cluster. Together with the preceding domain, it is heavily involved in the tetramer formation.
