identifier: InterPro:IPR044099
label: mRNA decapping enzyme 2 , NUDIX hydrolase domain
definition: >-
  This entry represents the NUDIX hydrolase domain found in Dcp2. This domain catalyses the mRNA decapping reaction. Dcp2 is the catalytic component of the decapping complex necessary for the degradation of mRNAs, both in normal mRNA turnover and in nonsense-mediated mRNA decay. Dcp2 contains an all-α N-terminal helical domain and a domain which has the Nudix fold. It has been shown that the Nudix domain of both Saccharomyces cerevisiae and S. pombe Dcp2 proteins is sufficient for decapping activity. While decapping is not dependent on the N-terminal of Dcp2, it does affect its efficiency. Dcp1 binds the N-terminal domain of Dcp2 stimulating the decapping activity of Dcp2.
