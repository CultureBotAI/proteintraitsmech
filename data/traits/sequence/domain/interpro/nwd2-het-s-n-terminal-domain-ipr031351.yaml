identifier: InterPro:IPR031351
label: "NWD2, HET-s N-terminal domain"
definition: >-
  STAND proteins are signal transducing ATPases which undergo ligand-induced oligomerisation. Stand proteins typically feature an N-terminal effector domain, a central nucleotide-binding domain (NACHT) and a C-terminal ligand-binding region that is composed of several leucine-rich repeats (LRRs). Homology modelling predicts that the N-terminal region of NWD2, a STAND protein, adopts a HET-s-like fold. This entry represents the N-terminal domain on various fungal STAND proteins. Its function is not known.
