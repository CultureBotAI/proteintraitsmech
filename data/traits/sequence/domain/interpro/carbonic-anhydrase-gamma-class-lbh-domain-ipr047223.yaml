identifier: InterPro:IPR047223
label: "Carbonic anhydrase, gamma-class, LbH domain"
definition: >-
  Carbonic anhydrases (CA) are zinc-containing enzymes that catalyse the reversible hydration of carbon dioxide in a two-step mechanism, involving the nucleophilic attack of a zinc-bound hydroxide ion on carbon dioxide, followed by the regeneration of the active site by ionization of the zinc-bound water molecule and removal of a proton from the active site. They are ubiquitous enzymes involved in fundamental processes like photosynthesis, respiration, pH homeostasis and ion transport. There are three distinct groups of carbonic anhydrases: alpha, beta and gamma, which show no significant sequence identity or structural similarity. CAs are homotrimeric enzymes, with each subunit containing a left-handed parallel β-helix (LbH) structural domain, which is represented in this entry. It is found at the N-terminal the cyanobacterial Carboxysome assembly protein CcmM, while the archaeal Carbonic anhydrase (CAH) only has this domain.
