identifier: InterPro:IPR048712
label: "Tail sheath protein gp29, gp29PR"
definition: >-
  This domain is found in the Tail sheath protein gp29 from the giant Bacteriophage phiKZ and similar proteins mainly found in tailed bacteriophages. This entry represents a protease resistant fragment of this protein, gp29PR, which consists of a single domain showing a seven-stranded β-sandwich with long insertions connecting adjacent β-strands, including a long α-helix.
