identifier: InterPro:IPR044769
label: 1-phosphatidylinositol-3-phosphate 5-kinase, PIPK catalytic domain
definition: >-
  This entry represents the C-terminal catalytic lipid kinase domain related to PtdInsP kinases (PIPKc domain) found in PIKfyve and related proteins. 1-phosphatidylinositol-3-phosphate 5-kinase, also called FYVE finger-containing phosphoinositide kinase (PIKfyve), forms a complex with its regulators, the scaffolding protein Vac14 and the lipid phosphatase Fig4. The complex synthesises phosphatidylinositol 3,5-bisphosphate [PtdIns(3,5)P2] through the phosphorylation of phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) on the fifth hydroxyl of the myo-inositol ring. Then phosphatidylinositol-5-phosphate (PtdIns5P) is generated directly from PtdIns(3,5)P2. PtdIns(3,5)P2 and PtdIns5P regulate endosomal trafficking and responses to extracellular stimuli. It is vital in early embryonic development and plays a role in different pathways, such as receptor tyrosine kinase (RTK) or EGFR degradation, regulation of the glutamate transporters EAAT2, EAAT3 and EAAT4 and the cystic fibrosis transmembrane conductance regulator (CFTR). It is also essential for systemic glucose homeostasis and insulin-regulated glucose uptake/GLUT4 translocation in skeletal muscle. The yeast orthologue of human PIKfyve, Fab1, is required for endocytic-vacuolar pathway and nuclear migration. The plant orthologues such as FAB1A-D from Arabidopsis are important for the maintenance of endomembrane homeostasis and for development of viable pollen. PIKfyve and its orthologues share a similar architecture consisting of a N-terminal FYVE domain, a middle region related to the CCT/TCP-1/Cpn60 chaperonins that are involved in productive folding of actin and tubulin, a second middle domain that contains a number of conserved cysteine residues (CCR) unique to these proteins, and a C-terminal catalytic lipid kin…
