identifier: InterPro:IPR011583
label: Chitinase II/V-like, catalytic domain
definition: >-
  This entry represents the catalytic domain of a group of proteins from the glycoside hydrolase, family 18 . Members of this family belong to the chitinase class II/V and IDGF (Imaginal disk growth factor) groups, which includes chitinase, chitodextrinase and the killer toxin of Kluyveromyces lactis (Yeast) (Candida sphaerica). The chitinases hydrolyse chitin oligosaccharides. However, glycoside hydrolase family 18 also includes chitinase-like proteins, which bind but do not cleave chitin. O-Glycosyl hydrolases are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website.
