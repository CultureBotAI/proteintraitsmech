identifier: InterPro:IPR054610
label: "NACHT N-terminal helical domain"
definition: >-
  This entry represents an helical domain found at the N-terminal of a group of proteins from NACHT conflict systems (named NHH for NACHT N-terminal helical) mainly found in cyanobacteria, including from Rivularia sp. PCC 7116. This position is frequently occupied by an effector domain.
