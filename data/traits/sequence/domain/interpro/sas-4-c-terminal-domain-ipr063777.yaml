identifier: InterPro:IPR063777
label: "SAS-4, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of SAS-4 proteins (Spindle assembly abnormal protein 4). SAS-4 is required for centrosome duplication and plays a central role in determining centrosome size. The protein localises to the centrosome throughout the cell cycle, forming a tiny dot in the centre of the centrosome. SAS-4 is recruited to the centrosome once per cell cycle at the time of organelle duplication and remains stably associated thereafter. SAS-4 proteins are found predominantly in nematodes and contain extensive coiled-coil regions. The specific function of this C-terminal domain remains to be determined.
