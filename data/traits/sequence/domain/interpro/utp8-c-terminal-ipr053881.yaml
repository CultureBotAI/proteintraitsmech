identifier: InterPro:IPR053881
label: "Utp8, C-terminal"
definition: >-
  This domain is found at the C-terminal of U3 small nucleolar RNA-associated protein 8 (Utp8) from Saccharomyces cerevisiae and similar proteins from fungi. Utp8 is an essential component of the nuclear tRNA export machinery in S. cerevisiae. It is a tRNA binding protein that acts at a step between tRNA maturation /aminoacylation, and translocation of the tRNA across the nuclear pore complex. It is also co-purified with the U3 snoRNA containing complex, the small subunit (SSU) processome, which is required for the biogenesis of the 18S rRNA. This entry also includes the C1565.05 protein from Schizosaccharomyces pombe. Its function is not clear. This domain shows an all-α structure.
