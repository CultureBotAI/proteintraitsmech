identifier: InterPro:IPR063947
label: "FAR1, vWA-like domain"
definition: >-
  This entry represents a domain found towards the C-terminal of FAR1 and related cyclin-dependent kinase inhibitors. FAR1 is a key regulator of the G1 cell cycle checkpoint in response to mating pheromones in yeast. This domain is found in FAR1 orthologues across Saccharomycotina yeasts. While the full-length FAR1 protein directly inhibits the CDC28-CLN cyclin-dependent kinase complex and is required for oriented cell polarisation in response to mating pheromones, the specific function of this domain remains to be determined. This domain shows a vWA-like fold.
