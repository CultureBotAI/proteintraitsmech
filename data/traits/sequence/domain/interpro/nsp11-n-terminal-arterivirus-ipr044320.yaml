identifier: InterPro:IPR044320
label: "NSP11, N-terminal, arterivirus"
definition: >-
  This entry represents the N-terminal domain of Nsp11 from arteriviruses. Nidovirus endoribonucleases (NendoUs) are uridylate-specific endoribonucleases, which release a cleavage product containing a 2',3'-cyclic phosphate at the 3' terminal end. They are conserved among this order and a genetic marker of nidoviruses. A feature of these viruses' evolutionary relationship is the organisation and processing of the genome, which is translated in two large precursor polyproteins (pp1a and pp1ab) from the replicase gene, that are proteolytically processed by virus proteases into 13 to 16 nonstructural proteins (NSPs). Proteins containing the NendoU domain include NSP15 from coronaviruses and NSP11 from arteriviruses, both of which participate in the viral replication process and in the evasion of the host immune system. Although they are similar and conserved, they only share 27% identical residues and show structural differences. NSP11 has an N-terminal domain and a C-terminal NendoU catalytic domain. NSP11 functions as a dimer and Mg2 is dispensable for its activity. In Porcine reproductive and respiratory syndrome virus (PRRSV), NSP11 induces STAT2 degradation to inhibit interferon signaling. Mutagenesis studies revealed that the amino acid residue K59 located at the N-terminal domain of NSP11 is indispensable for inducing STAT2 reduction. This domain is not conserved in those nidovirus branches that replicate in invertebrate hosts (Mesoniviridae, Roniviridae), suggesting specific roles in vertebrate hosts.
