identifier: InterPro:IPR032460
label: "Symplekin/Pta1, N-terminal"
definition: >-
  This domain can be found in the symplekin protein from animals and Pta1 protein from budding yeasts. This domain is typically between 239 to 261 amino acids in length. Symplekin is a scaffold protein that functions as a component of a multimolecular complex involved in histone mRNA 3'-end processing. Pta1 is involved in pre-tRNA processing. Pta1 is a subunit of the cleavage and polyadenylation factor (CPF), which plays a key role in polyadenylation-dependent pre-mRNA 3'-end formation and cooperates with cleavage factors including the CFIA complex and NAB4/CFIB.
