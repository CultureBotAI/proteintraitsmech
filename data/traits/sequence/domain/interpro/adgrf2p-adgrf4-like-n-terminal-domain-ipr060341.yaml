identifier: InterPro:IPR060341
label: "ADGRF2P/ADGRF4-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal region of a group of orphan receptors from vertebrates, including human Putative adhesion G protein-coupled receptor F2P (ADGRF2P) and ADGRF4 and similar proteins. Mouse ADGRF2 has been reported to play important roles in enamel formation. This domain is predicted to adopt a mainly β-configuration.
