identifier: InterPro:IPR062242
label: "Dhx29, helical domain"
definition: >-
  This entry represents a helical domain found in uncharacterised fungal sequences described as helicases, such as C15C4.05 ( ) from S. pombe. In PomBase, it is described as the orthologue of human DHX29 and described as ATP-dependent RNA helicase Dhx29. From structure predictions, this domain may be similar to the Small ribosomal subunit protein S15.
