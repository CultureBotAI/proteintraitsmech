identifier: InterPro:IPR048962
label: "E3 ubiquitin-protein ligase ARIH1-like, UBA-like domain"
definition: >-
  This entry represents the UBA-like (UBL) domain from the Human Homologue of Ariadne (HHARI) and its homologues, which are Ariadne subfamily E3 ubiquitin ligase proteins. This domain binds to Ubiquitin and NEDD8.
