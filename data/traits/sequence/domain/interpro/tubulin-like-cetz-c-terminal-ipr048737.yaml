identifier: InterPro:IPR048737
label: "Tubulin-like CetZ, C-terminal"
definition: >-
  This is the C-terminal domain of CetZ proteins, which are tubulin-like proteins involved in control cell shape in archaea and some bacteria. CetZ proteins are related with Tubulin/FtsZ, and has the Tubulin GTPase domain ( ) at the N-terminal. This domain has a two-layer α/β structure with an α-helical extension.
