identifier: InterPro:IPR035665
label: "VcfQ, lectin domain"
definition: >-
  This domain is found in bacterial proteins homologous to the VcfQ (also known as MshQ) bacterial pilus biogenesis protein. VcfQ is encoded by the vcfQ gene of the type IV pilus gene cluster of Vibrio cholerae and is essential for type IV pilus assembly.
