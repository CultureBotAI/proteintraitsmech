identifier: InterPro:IPR001156
label: "Transferrin-like domain"
definition: >-
  Transferrins are eukaryotic iron-binding glycoproteins that control the level of free iron in biological fluids. Evidence suggests that members of the TF family arose from the duplication and fusion of two homologous domains, with each duplicated domain binding one iron atom. Members of the family include blood serotransferrin (siderophilin); milk lactotransferrin (lactoferrin); egg white ovotransferrin (conalbumin); and membrane-associated melanotransferrin. Family members that do not bind iron have also been discovered, including inhibitor of carbonic anhydrase (ICA), which strongly binds to and inhibits certain isoforms of carbonic anhydrase. This entry represents the transferrin-like domain, which can be further divided into two subdomains that form a cleft inside of which the iron atom is bound in iron-transporting transferrin. The iron-coordinating residues consist of an aspartic acid, two tyrosines and a histidine, as well as an arginine that coordinates a requisite anion. In addition to iron and anion liganding residues, the transferrin-like domain contains conserved cysteine residues involved in disulphide bond formation.
