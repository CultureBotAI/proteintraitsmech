identifier: InterPro:IPR013587
label: "Nitrate/nitrite sensing protein"
definition: >-
  The nitrate and nitrite-sensing (NIT) domain is a (~250 aa) sensor domain found in various receptor components of signal transduction pathways from different bacterial lineages. The NIT domain is predicted to be all α-helical in structure.
