identifier: InterPro:IPR060017
label: "Genetic interactor of prohibitins 3, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the genetic interactor of prohibitins 3 (GEP3) and similar proteins from fungi and plants. The specific function of this N-terminal domain remains to be determined. GEP3 is a mitochondrial protein that may be involved in mitochondrial lipid metabolism. The protein belongs to the TRAFAC class YlqF/YawG GTPase family, GEP3 subfamily. The full-length protein contains a CP-type G domain responsible for GTP binding and hydrolysis. GEP3 is found in fungi and contains a mitochondrial transit peptide for targeting to the mitochondrion.
