identifier: InterPro:IPR054601
label: "C2185-like, N-terminal"
definition: >-
  This domain is found at the N-terminal end of the C2185 protein from Clostridium acetobutylicum and uncharacterised bacterial proteins. This domain is found associated with and shows a NAD(P) binding Rossmann fold.
