identifier: InterPro:IPR061985
label: "Outer membrane usher protein EcpC, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the outer membrane usher protein EcpC. EcpC is part of the ecpRABCDE operon, which encodes the E. coli common pilus (ECP). ECP is found in both commensal and pathogenic strains and plays a dual role in early-stage biofilm development and host cell recognition. The operon is negatively regulated by H-NS and positively regulated by IHF and EcpR. Usher proteins facilitate the assembly and secretion of pilus subunits during fimbrial biogenesis. The family is found in Enterobacterales. The specific function of this domain remains to be determined.
