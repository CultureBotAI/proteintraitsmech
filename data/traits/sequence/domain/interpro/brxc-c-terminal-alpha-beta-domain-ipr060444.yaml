identifier: InterPro:IPR060444
label: "BrxC, C-terminal alpha-beta domain"
definition: >-
  This entry represents a small α-β domain found at the C-terminal of BrxC, a core component of the BREX type 1 bacteriophage exclusion system. BrxC is part of a multi-gene system that provides immunity against bacteriophages by preventing phage DNA replication without degrading the phage DNA. The specific function of this domain within the BrxC protein is unknown.
