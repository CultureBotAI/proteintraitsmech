identifier: InterPro:IPR058196
label: "STOP1/2-like, C2H2-type zinc finger"
definition: >-
  This domain is found in Protein STOP 1 and 2 from Arabidopsis thaliana and similar sequences from plants. These proteins are probable transcription factors. This entry represents the C-terminal C2H2 or β-β-α zinc finger DNA-binding domain. STOP1 (sensitive to proton rhizotoxicity 1) regulates transcription of multiple genes critical for tolerance to aluminum (Al) and low pH in Arabidopsis. STOP2 is a physiologically minor isoform of STOP1, but it can activate expression of some genes regulated by STOP1. In rice, ART1 (also known as STAR3) regulates multiple genes implicated in aluminum tolerance.
