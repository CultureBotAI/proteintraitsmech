identifier: InterPro:IPR033814
label: "Carboxypeptidase N, N-terminal domain"
definition: >-
  Peptidase M14 Carboxypeptidase N (CPN, also known as kininase I, creatine kinase conversion factor, plasma carboxypeptidase B, arginine carboxypeptidase, and protaminase; , MEROPS identifier M14.004) is an extracellular glycoprotein synthesized in the liver and released into the blood, where it is present in high concentrations. CPN belongs to the N/E subfamily of the M14 family of metallocarboxypeptidases (MCPs). The M14 family are zinc-binding carboxypeptidases (CPs) which hydrolyze single, C-terminal amino acids from polypeptide chains, and have a recognition site for the free C-terminal carboxyl group, which is a key determinant of specificity. CPN plays an important role in protecting the body from excessive buildup of potentially deleterious peptides that normally act as local autocrine or paracrine hormones. It specifically removes C-terminal basic residues. As CPN can cleave lysine more avidly than arginine residues it is also called lysine carboxypeptidase. CPN substrates include peptides found in the bloodstream, such as kinins (e.g. bradykinin, kalinin, Met-Lys-bradykinin), complement anaphylatoxins and creatine kinase MM (CK-MM). By removing just one amino acid, CPN can alter peptide activity and receptor binding. For example: bradykinin, a nine-residue peptide released from kiningen in response to tissue injury which is inactivated by CPN, anaphylatoxins which are regulated by CPN by the cleaving and removal of their C-terminal arginines resulting in a reduction in their biological activities of 10-100-fold, and creatine kinase MM, a cytosolic enzyme that catalyzes the reversible transfer of a phosphate group from ATP to creatine, and is regulated by CPN by the cleavage of C-terminal lysines. Like the other N/E subfamily members, two surface loops surround…
