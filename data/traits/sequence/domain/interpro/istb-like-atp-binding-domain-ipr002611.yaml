identifier: InterPro:IPR002611
label: IstB-like ATP-binding domain
definition: >-
  Proteins in this entry contain an ATP/GTP binding P-loop motif, including the DNA replication protein DnaC and IS21 transposase regulator IstB, which are close paralogues. DnaC interacts with DnaB and form a primosome complex for DNA replication.
