identifier: InterPro:IPR040554
label: "Peroxisomal membrane protein PEX14-like, KPWE domain"
definition: >-
  This domain, previously known as DUF5572, is found in Peroxisomal membrane protein PEX14 from Arabidopsis thaliana and other eukaryotic proteins including human Peroxisomal biogenesis factor 39 (PEX39). PEX14 is a component of the PEX13-PEX14 docking complex, a translocon channel that specifically mediates the import of peroxisomal cargo proteins bound to PEX5 receptor. This domain carries a highly conserved KPWE sequence at the C-terminal.
