identifier: InterPro:IPR048824
label: "CRISPR-associated Cas3 subtype I-F/YPEST-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of CRISPR-associated nuclease/helicase Cas3 subtype I-F/YPEST from Pseudomonas aeruginosa. Cas3 contains an HD nuclease domain ( ), RecA1, RecA2, a long linker region, and this C-terminal domain. AcrF3, and anti-CRISPR protein, forms a homodimer that locks Cas3 in an ADP-bound form, blocking the entrance of the DNA-binding tunnel in the helicase domain. It masks the linker region and C-terminal domain of Cas3, which prevents the recruitment by Cascade and inhibiting the type I-F CRISPR-Cas system. This domain shows two α-helices and two six-stranded β-blades.
