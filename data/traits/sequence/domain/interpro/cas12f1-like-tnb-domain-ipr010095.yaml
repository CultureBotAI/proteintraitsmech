identifier: InterPro:IPR010095
label: "Cas12f1-like, TNB domain"
definition: >-
  This entry represents a zinc ribbon domain known as the target nucleic acid-binding (TNB) domain of CRISPR-associated endodeoxyribonuclease Cas12f1 and similar sequences found in all domains in life. This domain is also found in bacterial transposases, including putative transposes described by . Some proteins containing this domain, in particular, Cas12m orthologs albeit containing D-E-D, H-D-D and N-D-D motifs in the RuvC active site do not exhibit dsDNA nuclease activity, but efficiently bind to dsDNA targets in a PAM-dependent manner. The DNA-binding activity without cleavage seems is a common feature of the Cas12m effectors.
