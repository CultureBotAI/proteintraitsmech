label: "Alpha-L-rhamnosidase, domain D2"
definition: >-
  This domain is found in Alpha-L-rhamnosidase from Bacillus sp. (RhaB, ), a member of glycoside hydrolase (GH) family 78 that catalyses the hydrolytic release of rhamnose from polysaccharides and glycosides, degrading the bacterial biofilm gellan. RhaB is organised into five domains: , this entry, , and . This domain shows a β-sandwich structure with 13 β-strands and two short helices.
