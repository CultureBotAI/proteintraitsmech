identifier: InterPro:IPR053781
label: "F-box/LRR-repeat protein 13-like, F-box domain"
definition: >-
  This entry includes F-box/LRR-repeat protein 13 (AtARP13) form Arabidopsis thaliana, which belongs to the largest subfamily of plant F-box proteins, F-box/LRR-repeat proteins (FBLs). It contains tandem leucine-rich repeats (LRRs) following the F-box domain at the N-terminal. Like other F-box proteins, they may be components of SCF (Skp1 Cdc53 F-box protein) E3 ubiquitin ligase complexes, which may mediate the ubiquitination and subsequent proteasomal degradation of target proteins. The F-box domain, represented in this entry, has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression.
