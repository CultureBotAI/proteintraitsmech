identifier: InterPro:IPR060597
label: "Nephrocystin-4, second C2-like domain"
definition: >-
  This entry represents the second C2-like domain found near the N-terminal of nephrocystin-4 (NPHP4) and similar animal sequences. NPHP4 is a ciliary protein involved in the organisation of apical junctions and required for building functional cilia. It has multiple established functions including regulation of Wnt signalling and Hippo pathway modulation. The protein localises to ciliary basal bodies, centrosomes and tight junctions. Mutations in NPHP4 cause nephronophthisis type 4 and Senior-Loken syndrome. This domain adopts a C2 fold.
