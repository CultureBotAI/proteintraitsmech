identifier: InterPro:IPR045343
label: "VpsR domain"
definition: >-
  This entry represents a domain found at the N terminus of VpsR from Vibrio cholerae. VpsR appears superficially to be a response regulator, based on extension of its alignment to response regulators AlgB and NrtC all the way to the N terminus. Instead of being a response regulator with a histidine kinase partner, the sigma-54-dependent transcription factor VpsR directly binds to cyclic-di-GMP. Its regulon includes genes for the biosynthesis of the biofilm matrix component called Vibrio polysaccharide (VPS).
