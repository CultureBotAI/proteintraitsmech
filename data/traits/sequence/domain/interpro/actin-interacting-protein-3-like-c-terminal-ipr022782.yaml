identifier: InterPro:IPR022782
label: "Actin interacting protein 3-like, C-terminal"
definition: >-
  This entry represents the C-terminal domain of actin interacting protein 3 (also known as Bud6 in budding yeasts). Bud6 is an actin- and formin-interacting protein. The N-terminal half of Bud6 is a microtubule binding domain required for its localisation and for its function in cortical capture of astral microtubule ends. The C-terminal half (residues 489-788) directly facilitates actin filament assembly by the formin Bni1 and is required for NPF (nucleation-promoting factor) activity. The domain represented in this entry (residues 365-776) is overlapped with the C-terminal half of Bud6 in this study. This entry also includes proteins from animals.
