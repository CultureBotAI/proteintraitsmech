identifier: InterPro:IPR041350
label: "Carbon monoxide dehydrogenase subunit alpha ,N-terminal"
definition: >-
  Acetyl-coenzyme A (CoA) synthase/carbon monoxide dehydrogenase (ACS/CODH) is a bifunctional enzyme that catalyzes the reversible reduction of CO2 to CO (CODH activity). This entry is for the N-terminal domain found in ACS/CODH subunit alpha.
