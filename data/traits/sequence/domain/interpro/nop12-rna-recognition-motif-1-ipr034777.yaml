identifier: InterPro:IPR034777
label: "Nop12, RNA recognition motif 1"
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of Nop12 from Saccharomyces cerevisiae. It is a novel nucleolar protein required for pre-25S rRNA processing and normal rates of cell growth at low temperatures. Nop12 shares high sequence similarity with nucleolar protein 13 (Nop13). Both, Nop12 and Nop13, are not essential for growth. However, unlike Nop13 that localizes primarily to the nucleolus but is also present in the nucleoplasm to a lesser extent, Nop12 is localized to the nucleolus. Nop12 contains two RNA recognition motifs (RRMs).
