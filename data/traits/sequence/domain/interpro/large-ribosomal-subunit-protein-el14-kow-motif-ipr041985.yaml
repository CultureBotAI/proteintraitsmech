identifier: InterPro:IPR041985
label: "Large ribosomal subunit protein eL14, KOW motif"
definition: >-
  Large ribosomal subunit protein eL14 (RPL14) is a component of the large ribosomal subunit in both archaea and eukaryotes with KOW motif at its N terminus. KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4. Although RPL14 is well conserved, it is not found in all archaea, and therefore it is presumably not essential.
