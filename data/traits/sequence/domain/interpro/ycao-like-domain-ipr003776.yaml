identifier: InterPro:IPR003776
label: "YcaO-like domain"
definition: >-
  This domain comprises the whole of a protein in Methanocaldococcus jannaschii and Methanobacterium thermoautotrophicum, all but the N-terminal 60 residues from a protein of Mycobacterium tuberculosis, and all but the C-terminal 180 residues from a protein in Haemophilus influenzae and Escherichia coli, among proteins from published complete genomes. This domain contains a conserved ATP-binding pocket. The domain can be found in Escherichia coli YcaO, which is known to be involved in beta-methylthiolation of ribosomal protein S12. YcaO-like domains have been shown to be catalytically active, and to use ATP to activate amide backbones during peptide cyclodehydrations. It is likely to be involved in post-translational modification (PTM) of amino acid residues. In Methanopyrus kandleri and Methanocaldococcus jannaschii YcaO is involved in thioamidation.
