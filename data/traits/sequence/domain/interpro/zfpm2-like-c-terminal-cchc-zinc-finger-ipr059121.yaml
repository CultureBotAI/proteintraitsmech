identifier: InterPro:IPR059121
label: "ZFPM2-like, C-terminal CCHC zinc finger"
definition: >-
  This domain is found at the C-terminal end of the human zinc finger protein ZFPM2 and related animal proteins, including ZFPM1 and ZNF800. ZFPM2 is a transcriptional regulator that plays a central role in the heart morphogenesis and development of coronary vessels from epicardium, by regulating genes that are essential during cardiogenesis. It forms a heterodimers with transcription factors of the GATA family GATA4, GATA5 and GATA6. The domain represented by this entry contains three highly conserved cysteine residues and a histidine and it is likely a variant of the classical C2H2 zinc finger. Zinger fingers are present in Zinc finger protein ush (Drosophila orthologue), but it is located at the C-terminal.
