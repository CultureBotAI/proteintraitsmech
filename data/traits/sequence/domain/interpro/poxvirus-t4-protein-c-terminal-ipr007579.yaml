identifier: InterPro:IPR007579
label: "Poxvirus T4 protein, C-terminal"
definition: >-
  This entry represents the C-terminal domain of T4 protein from Sheeppox virus, Protein OPG195 from Monkeypox virus, and similar sequences from poxvirus. T4 is thought to be retained in the endoplasmic reticulum. M-T4 of myxoma virus is thought to protect infected lymphocytes from apoptosis and modulate the inflammatory response to virus infection. CPXV203 protein from Cowpox virus binds a wide array of proteins from the major histocompatibility complex class I (MHCI) in a pH dependent manner. The N terminus is represented by .
