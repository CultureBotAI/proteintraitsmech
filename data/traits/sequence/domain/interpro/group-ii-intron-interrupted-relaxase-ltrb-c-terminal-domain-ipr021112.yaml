identifier: InterPro:IPR021112
label: "Group II intron-interrupted relaxase LtrB, C-terminal domain"
definition: >-
  This entry represents the C-terminal helical domain hairpin of Group II intron-interrupted relaxase LtrB from Lactococcus lactis and similar sequences from Lactobacillales. LtrB mediates initiation of the conjugal transfer of the plasmid pRS01 possibly by introducing a single-stranded nick at the potential origin of transfer, to initiate single strand transfer from donor to recipient. Proteins found related to this domain have been previously misannotated as a lantibiotic immunity protein SrtI.
