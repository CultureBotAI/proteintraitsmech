identifier: InterPro:IPR057009
label: "Fimbrial adhesin MrpH, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of fimbrial adhesin MrpH and related proteins from bacteria. This protein is associated with strain virulence and is involved in surface adherence, biofilm formation and autoaggregation, essential for bladder and kidney colonization. This domain binds to surface receptor and coordinates one Zn2+ necessary for attachment and biofilm formation.
