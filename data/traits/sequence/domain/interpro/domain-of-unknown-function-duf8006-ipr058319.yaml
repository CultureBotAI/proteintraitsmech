label: "Domain of unknown function DUF8006"
definition: >-
  This entry represents a family of uncharacterised proteins found in halobacteria. These proteins are predicted to form a small α helical bundle composed of three helices with a fourth perpendicular helix. The three helices are likely to form transmembrane helices.
