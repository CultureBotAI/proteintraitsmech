identifier: InterPro:IPR031589
label: "Shieldin complex subunit 2, C-terminal domain"
definition: >-
  This entry represents the C-terminal OB fold domain found in Shieldin complex subunit 2 (SHLD2, formerly known as FAM35A). SHLD2 is a component of the shieldin complex, which plays an important role in repair of DNA double-stranded breaks (DSBs).
