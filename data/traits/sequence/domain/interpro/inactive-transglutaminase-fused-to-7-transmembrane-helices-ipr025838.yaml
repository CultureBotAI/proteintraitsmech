identifier: InterPro:IPR025838
label: "Inactive transglutaminase fused to 7 transmembrane helices"
definition: >-
  An inactive transglutaminase domain fused to seven transmembrane helices. The transglutaminase domain is predicted to be extracellularly located. Members of this family are associated in gene neighbourhoods with a pepsin-like peptidase and an ATP-grasp of the RimK-family. The ATP-grasp is predicted to modify the 7TM protein or a cofactor that interacts with it.
