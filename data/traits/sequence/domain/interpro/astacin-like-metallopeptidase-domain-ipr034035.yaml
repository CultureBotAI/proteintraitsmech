identifier: InterPro:IPR034035
label: Astacin-like metallopeptidase domain
definition: >-
  This entry includes the peptidase domain of zinc-dependent metalloproteases in the astacin-like subfamily (peptidase subfamily M12A), a group of zinc-dependent proteolytic enzymes with a HExxHxxGxxH zinc-binding site/active site. Members of this family may have an amino terminal propeptide, which is cleaved to yield the active protease domain, which is consequently always found at the N terminus in multi-domain architectures. This family includes: astacin (MEROPS identifier M12.001), a digestive enzyme from crayfish and the sea urchin SPAN protein (MEROPS identifier M12.013), which may also play a role in development.
