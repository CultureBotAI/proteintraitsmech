identifier: InterPro:IPR060891
label: "MHO_1590, C-terminal"
definition: >-
  Members of this family average about 145 amino acids in length, with a signal peptide, a variable length low-complexity region rich in N, D, Q, E, K, and R, and the roughly 80 amino acid C-terminal region described by this entry. A few members of the family have candidate lipoprotein signal peptides. The family is named for member protein MHO_1590 from Metamycoplasma hominis.
