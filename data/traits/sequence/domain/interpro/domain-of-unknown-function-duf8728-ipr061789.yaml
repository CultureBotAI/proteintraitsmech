identifier: InterPro:IPR061789
label: "Domain of unknown function DUF8728"
definition: >-
  This entry represents a C-terminal domain of approximately 110 residues. The domain is found at the C terminus of proteins annotated as RgtA-like glycosyltransferases. This family is found in diverse bacteria including Pseudomonadota (particularly Legionella), Actinomycetota, Myxococcota and Chloroflexota. The function of this domain remains to be determined.
