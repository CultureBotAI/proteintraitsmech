identifier: InterPro:IPR057668
label: "Non-canonical E2 ubiquitin-conjugating enzyme, C-terminal"
definition: >-
  This entry describes a domain found at the C-terminal end in a novel group of non-canonical E2 ubiquitin-conjugating proteins that lack the typical HPN motif found in conventional E2 enzymes, including from Plasmodium falciparum and similar proteins mainly from in Apicomplexan parasites, fungi and some amoeba species. It possesses a highly conserved catalytic cysteine residue, which forms a thioester bond with ubiquitin. The N-terminal region of the members of this group is involved in protein-protein interactions with other components of the ubiquitin pathway, such as Rbx1. It is predicted to adopt an all-helical structure. This domain was previously known as DUF2009.
