identifier: InterPro:IPR046884
label: "tRNA-specific 2-thiouridylase MnmA-like, central domain"
definition: >-
  This entry represents the central PRC-barrel domain of tRNA-specific 2-thiouridylase MnmA and similar proteins from bacteria and eukaryotes. MnmA catalyses the 2-thiolation of uridine at the wobble position (U34) of tRNA, leading to the formation of s2U34.
