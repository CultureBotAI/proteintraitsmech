identifier: InterPro:IPR055878
label: "Domain of unknown function DUF7455"
definition: >-
  This entry represents a family of uncharacterised actinobacterial zinc binding domains. The proteins contain a characteristic CXHH motif. Only the second of those two histidines acts as the zinc ligand according to structure prediction (ipTM = 0.94).
