identifier: InterPro:IPR007298
label: "NlpE-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain in NlpE proteins. This domain also covers the whole length in the 17 kDa lipoprotein from Treponema pallidum. Lipoprotein NlpE is a multifunctional outer membrane lipoprotein implicated in copper homeostasis, potentially contributing to both copper efflux and the delivery of copper to copper-dependent enzymes. It is required for efficient adhesion of stationary-phase cells to hydrophobic surfaces, a key step in biofilm formation. NlpE also functions in envelope stress responses; its overproduction induces the periplasmic protease DegP through activation of the CpxA/CpxR two-component signaling system. This induction appears to depend on membrane anchoring of NlpE, and structural changes in or interactions involving its CXXC motif may trigger Cpx pathway activation.
