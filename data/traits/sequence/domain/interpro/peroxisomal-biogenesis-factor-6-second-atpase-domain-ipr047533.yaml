identifier: InterPro:IPR047533
label: "Peroxisomal biogenesis factor 6, second ATPase domain"
definition: >-
  This entry represents the second of two ATPase domains of Peroxisomal biogenesis factor 6 (PEX6) and similar proteins from eukaryotes. PEX6 and PEX1 form a heterohexameric Type-2 AAA-ATPase complex and are essential for peroxisome biogenesis as they are required for the import of folded proteins into the peroxisomal matrix. This group of proteins belongs to the RecA-like NTPase family.
