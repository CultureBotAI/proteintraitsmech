identifier: InterPro:IPR060541
label: "Probable helicase, winged helix domain"
definition: >-
  This winged helix HTH domain is found in uncharacterised bacterial proteins. Many of these proteins contain P-loop domains with the typical for helicase arrangement. This domain is often found N-terminal to these probable helicase domains.
