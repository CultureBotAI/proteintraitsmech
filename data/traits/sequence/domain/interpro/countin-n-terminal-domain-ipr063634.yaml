identifier: InterPro:IPR063634
label: "Countin, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of countin proteins from Dictyostelium discoideum. This domain corresponds to a Saposin B-type domain and is found in cell-counting factors that regulate aggregate size during multicellular development. Countin-1 limits the maximum size of multicellular structures whilst countin-2 limits the minimum size. The proteins are secreted and belong to the countin family. Countin-1 is a component of the counting factor (CF) complex which includes cf60, cf50, cf45-1 and ctnA. The domain contains characteristic disulphide bonds typical of saposin-like domains. The specific function of this domain remains to be determined.
