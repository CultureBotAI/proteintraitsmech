identifier: InterPro:IPR040380
label: "HAKAI-like, RING finger, HC subclass"
definition: >-
  Hakai is an E3 ubiquitin ligase that disrupts cell-cell contacts in epithelial cells and is upregulated in human colon and gastric adenocarcinomas. It was identified to mediate the posttranslational downregulation of E-cadherin (CDH1), a major component of adherens junctions in epithelial cells and a potent tumour suppressor. It also promotes ubiquitination of several other tyrosine-phosphorylated Src substrates, including cortactin (CTTN) and DOK1.
