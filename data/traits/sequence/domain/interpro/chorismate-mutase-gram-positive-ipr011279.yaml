identifier: InterPro:IPR011279
label: "Chorismate mutase, Gram-positive"
definition: >-
  This entry represents a clade of chorismate mutase proteins/domains from Gram-positive species. The sequence from Enterococcus is fused to the C terminus of an apparent acetyltransferase, and the sequence from Clostridium acetobutylicum (but not perfringens) is fused to the N terminus of shikimate-5-dehydrogenase, another enzyme of the chorismate pathway. All the other members of this clade are mono-functional. Members of this clade from Streptococcus and Lactococcus have been found which represent the sole chorismate mutase domain in their respective genomes which also exhibit evidence of the enzymes of both the upstream and downstream branches of the chorismate pathways.
