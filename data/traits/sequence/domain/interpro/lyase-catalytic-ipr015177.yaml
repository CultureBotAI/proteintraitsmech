identifier: InterPro:IPR015177
label: "Lyase, catalytic"
definition: >-
  This domain is predominantly found in chondroitin ABC lyase I, adopting a helical structure, with fifteen α-helices which are at least two turns long and several short helical turns. The bulk of the domain is formed by ten α-helices forming five hairpin-like pairs and arranged into an incomplete toroid, the (α/α)5 fold. Additionally, two long and two short α-helices at the N terminus of the domain wrap around the toroid. At the C-terminal end of the toroid there is one additional short α-helix. This domain is required for degradation of polysaccharides containing 1,4-beta-D-hexosaminyl and 1,3-beta-D-glucoronosyl or 1,3-alpha-L-iduronosyl linkages to disaccharides containing 4-deoxy-beta-D-gluc-4-enuronosyl groups.
