identifier: InterPro:IPR056808
label: "AAA protein, C-terminal winged helix domain"
definition: >-
  This domain is found at the C-terminal end of a group of uncharacterised fungal proteins that contain the AAA ATPase domain at the N terminus. This domain is predicted to have a winged helix configuration.
