identifier: InterPro:IPR056180
label: "ZPR1, jelly-roll domain"
definition: >-
  This entry represents the jelly-roll domain found in ZPR1 family. This entry consists of zinc finger protein ZPR1 and ZPR1-like proteins. The function of ZPR1 from archaea and eukaryotes is not yet clear. However, Zpr1 from yeast acts as a protein folding chaperone for elongation factor 1-alpha. ZPR1 is present in both the cytoplasm and nucleoplasm and its subcellular distribution changes during proliferation. ZPR1 binds to the cytoplasmic tyrosine kinase domain of the epidermal growth factor receptor (EGFR) and is a component of downstream signalling of both EGFR and FGFR signalling. Upon stimulation by EGF, ZPR1 directly binds the eukaryotic translation elongation factor-1alpha (eEF-1alpha) to form ZPR1/eEF-1alpha complexes, an interaction that is essential for normal cellular proliferation. It has been associated with susceptibility to type 2 diabetes and is downregulated in patients with spinal muscular atrophy. ZPR1 interacts with complexes formed by SMN, and may act as a modifier that affects the severity of SMA.
