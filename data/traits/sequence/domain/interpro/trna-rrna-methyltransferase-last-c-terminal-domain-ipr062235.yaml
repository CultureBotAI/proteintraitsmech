identifier: InterPro:IPR062235
label: "tRNA/rRNA methyltransferase LasT, C-terminal domain"
definition: >-
  This entry represents a small C-terminal helical domain found in the tRNA/rRNA methyltransferase LasT (YjtD) from Gammaproteobacteria (Enterobacterales). LasT belongs to the SpoU/TrmH family of S-adenosyl-L-methionine-dependent RNA methyltransferases. These proteins contain an N-terminal SpoU methylase domain ( ) followed by this C-terminal domain. The specific function of this C-terminal domain remains to be determined.
