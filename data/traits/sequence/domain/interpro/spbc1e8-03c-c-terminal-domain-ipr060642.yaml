identifier: InterPro:IPR060642
label: "SPBC1E8.03c, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of SPBC1E8.03c, an uncharacterised protein from Schizosaccharomyces pombe. This domain adopts a glycosyltransferase fold structure. SPBC1E8.03c is a 550-amino acid glycoprotein localised to the endoplasmic reticulum. The protein contains a signal peptide and two N-linked glycosylation sites. The specific function of this domain remains to be determined.
