label: "TonB-like, single transmembrane helix"
definition: >-
  This entry represents a single transmembrane helix found at the N-terminal end of uncharacterised proteins mainly from gram-negative bacteria. These proteins usually contain at the C-terminal and this resemble TonB proteins.
