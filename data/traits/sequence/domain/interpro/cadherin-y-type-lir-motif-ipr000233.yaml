identifier: InterPro:IPR000233
label: Cadherin, Y-type LIR-motif
definition: >-
  Cadherins (CADHs) are transmembrane glycoproteins vital in calcium-dependent cell-cell adhesion during tissue differentiation. CADHs also have a crucial role in epithelial-to-mesenchymal transition (EMT), involved in migration properties of tumour cells. CADH6 is an EMT marker in thyroid cancer that interacts with the ATG8 family members GABARAP, BNIP3 and BNIP3L restraining autophagy through LIR (LC3 Interacting Regions, also known as ATG8-interacting motifs, AIMs) domains, a common feature among many cadherin family members. LIRs are short-linear motifs (SLiMs) of autophagy receptors and adaptor proteins that facilitates the selective recruitment of autophagy substrates to the autophagosome. They are characterised by degenerated sequences with a four-residue core central sequence involved in ATG8-binding, with the W/Y/FxxL/I/V pattern. Based on the aromatic amino acid in position 1 they can be classified into W-type, Y-type and F-type. This entry includes three conserved LIR motifs of CADHs, which two are Y-type (YDxL/I) and one F-type (FKKL), while a fourth LIR (YGGV) is only present in CADH6 members.
