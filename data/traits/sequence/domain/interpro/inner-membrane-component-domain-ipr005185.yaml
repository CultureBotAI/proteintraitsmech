identifier: InterPro:IPR005185
label: "Inner membrane component domain"
definition: >-
  This domain occurs as one or more copies in bacterial and eukaryotic proteins. These are membrane proteins of four TM regions, two appearing in each of the two copies when both are present. Many of the latter members also carry the sodium/calcium exchanger membrane region ( ), which have multipass membrane regions.
