identifier: InterPro:IPR034225
label: "Nop13/Rnp24, RNA recognition motif 1"
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of Nop13p from Saccharomyces cerevisiae. It shares high sequence similarity with nucleolar protein 12 (Nop12p). Neither Nop12p nor Nop13p are essential for growth. However, unlike Nop12p that is localized to the nucleolus, Nop13p localizes primarily to the nucleolus but is also present in the nucleoplasm to a lesser extent. Nop13p contains two RNA recognition motifs (RRMs). Proteins containing this domain include Rnp24 from S. pombe.
