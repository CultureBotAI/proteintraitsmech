identifier: InterPro:IPR048423
label: "Oxidoreductase DRL-like, catalytic domain"
definition: >-
  This domain is found in DRL (deoxyxylulose-5-phosphate reductoisomerase-like) from Brucella abortus ( ) and other bacterial putative oxidoreductases and homoserine dehydrogenases. DRL is involved in isoprenoid biosynthesis. This protein is organised into three structural domains: N-terminal, central and C-terminal. This is the central, catalytic domain which shows an α/β fold with a central four-stranded mixed β-sheet. The active site lid is formed by a protrusion made of two antiparallel helices connected by a short loop.
