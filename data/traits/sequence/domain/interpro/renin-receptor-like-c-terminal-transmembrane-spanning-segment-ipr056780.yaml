identifier: InterPro:IPR056780
label: "Renin receptor-like, C-terminal transmembrane spanning segment"
definition: >-
  This entry represents the C-terminal region of the human renin receptor, which bears a putative transmembrane spanning segment. The renin receptor is involved in intracellular signal transduction by the activation of the ERK1/ERK2 pathway, and it also serves to increase the efficiency of angiotensinogen cleavage by receptor-bound renin, therefore facilitating angiotensin II generation and action on a cell surface. This domain is also found in the Drosophila homologue, known as dPRR. Renin receptor is a multifunctional protein which functions as a renin, prorenin cellular receptor and is involved in the assembly of the lysosomal proton-transporting V-type ATPase (V-ATPase) and the acidification of the endo-lysosomal system. Through its function in V-type ATPase (v-ATPase) assembly and acidification of the lysosome it regulates protein degradation and may control different signalling pathways important for proper brain development, synapse morphology and synaptic transmission.
