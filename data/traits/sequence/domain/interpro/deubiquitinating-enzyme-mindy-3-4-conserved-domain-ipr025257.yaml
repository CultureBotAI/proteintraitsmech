identifier: InterPro:IPR025257
label: "Deubiquitinating enzyme MINDY-3/4, conserved domain"
definition: >-
  This is a conserved domain found in deubiquitinating enzymes, MINDY-3 and MINDY-4. Deubiquitinating enzymes (DUBs) remove ubiquitin (Ub) from Ub-conjugated substrates to regulate the functional outcome of ubiquitylation. MINDY-3/4 belong to the MINDY (motif interacting with Ub-containing novel DUB) family (peptidase family C121), whose members are deubiquitinating enzymes releasing Lys48-linked ubiquitin.
