identifier: InterPro:IPR054466
label: "Kinase OspG, kinase domain"
definition: >-
  This entry represents the kinase domain of protein kinase OspG, which is involved in down-regulation of the host innate response induced by invasive bacteria. OspG is a an effector kinase that binds host E2 ubiquitin-conjugating enzymes activated with ubiquitin, which enhances its kinase activity, playing a role to suppress the host inflammatory response during invasion and colonisation. Members of this group are mainly found in proteobacteria.
