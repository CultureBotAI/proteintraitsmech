identifier: InterPro:IPR059036
label: "RUFY4-like domain"
definition: >-
  This domain is found in human RUN and FYVE domain-containing protein 4 (RUFY4) and similar animal proteins. RUFY4 positively regulates macroautophagy in primary dendritic cells. This domain is predicted to adopt an α configuration.
