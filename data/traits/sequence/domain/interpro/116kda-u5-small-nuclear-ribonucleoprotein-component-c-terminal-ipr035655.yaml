identifier: InterPro:IPR035655
label: "116kDa U5 small nuclear ribonucleoprotein component, C-terminal"
definition: >-
  This domain is found in the C-terminal portion of the spliceosomal human 116kDa U5 small nuclear ribonucleoprotein (snRNP) protein (U5-116kDa), and its yeast counterpart Snu114p. This domain is homologous to the C-terminal domain of the eukaryotic translational elongation factor EF-2. Yeast Snu114p is a GTPase component of U5 snRNP essential for pre-mRNA splicing.
