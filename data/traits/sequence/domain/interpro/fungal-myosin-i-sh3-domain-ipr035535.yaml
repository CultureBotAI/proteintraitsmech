identifier: InterPro:IPR035535
label: "Fungal myosin-I, SH3 domain"
definition: >-
  Type I myosins (myosin-I) are actin-dependent motors in endocytic actin structures and actin patches. They play roles in membrane traffic in endocytic and secretory pathways, cell motility, and mechanosensing. Saccharomyces cerevisiae has two myosins-I, Myo3 and Myo5, which are involved in endocytosis and the polarization of the actin cytoskeleton. Myosin-I contains an N-terminal actin-activated ATPase, a phospholipid-binding TH1 (tail homology 1) domain, and a C-terminal extension which includes an F-actin-binding TH2 domain, an SH3 domain, and an acidic peptide that participates in activating the Arp2/3complex. The SH3 domain of myosin-I is required for myosin-I-induced actin polymerization.
