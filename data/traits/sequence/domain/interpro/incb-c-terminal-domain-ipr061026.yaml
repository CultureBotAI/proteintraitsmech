identifier: InterPro:IPR061026
label: "IncB, C-terminal domain"
definition: >-
  This entry represents the C-terminal region of IncB , an inclusion membrane protein from Chlamydia. When Chlamydia invades a host cell, it resides within a vacuole whose host-derived membrane is called the inclusion membrane. The chlamydial type III secretion system delivers IncB and other effector proteins into this membrane. IncB proteins from different chlamydial species share a conserved hydrophobic C-terminal region covered by this entry, whereas their N-terminal regions differ markedly in both length and sequence.
