identifier: InterPro:IPR054694
label: "E3 ubiquitin-protein ligase parkin-like, IBR domain"
definition: >-
  This entry represents an IBR (In Between Ring fingers) domain found in human E3 ubiquitin-protein ligase parkin and similar eukaryotic proteins. Parkin functions within a multiprotein E3 ubiquitin ligase complex, catalysing the covalent attachment of ubiquitin moieties onto substrate protein. This domain occurs between pair of ring fingers.
