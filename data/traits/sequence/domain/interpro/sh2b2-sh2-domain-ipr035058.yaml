identifier: InterPro:IPR035058
label: "SH2B2, SH2 domain"
definition: >-
  This entry represents the SH2 domain of SH2B2. SH2B adapter protein 2 (SH2B2, also known as APS) belongs to the SH2B family of adapter proteins. SH2B2 is involved in multiple signalling pathways, including cytokine signalling and insulin receptor signalling. It also binds to Vav3, a member of the vav proto-oncogene family, and increases its activity. SH2B family contains three members of adaptor proteins: SH2B1, 2 and 3. Typical SH2B proteins contain a SH2 (Src homology 2) and a PH (pleckstrin homology) domain. They serve as adaptors involved in signalling by the receptors for growth factors, such as insulin-like growth factor 1, platelet-derived growth factor and nerve growth factor.
