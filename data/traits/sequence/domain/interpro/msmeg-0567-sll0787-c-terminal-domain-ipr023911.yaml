identifier: InterPro:IPR023911
label: "MSMEG_0567/sll0787, C-terminal domain"
definition: >-
  This entry includes the C-terminal domain of MSMEG_0567 from Mycobacterium smegmatis. Members of this entry are found broadly in Cyanobacteria, Proteobacteria, Actinobacteria and has been linked to a nitrogen starvation response in some of those species.
