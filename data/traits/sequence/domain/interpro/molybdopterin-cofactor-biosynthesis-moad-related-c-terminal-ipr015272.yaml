identifier: InterPro:IPR015272
label: "Molybdopterin cofactor biosynthesis MoaD-related, C-terminal"
definition: >-
  In Escherichia coli, the MoaD protein plays a central role in the conversion of precursor Z to molybdopterin (MPT) during molybdenum cofactor biosynthesis. Proteins are found in Thermus thermophilus, including threonine synthase, which catalyses the conversion of O-phospho-L-homoserine to L-threonine and phosphate. MoaD-related proteins have an N-terminal MoaD domain, with a fold similar to that of ubiquitin, and contain a highly conserved C-terminal Gly-Gly motif, which in its active form contains a transferrable sulphur in the form of a thiocarboxylate group. This entry represents the domain found at the C terminus, which consists of a TBP-like fold of β/α/β(4)/α.
