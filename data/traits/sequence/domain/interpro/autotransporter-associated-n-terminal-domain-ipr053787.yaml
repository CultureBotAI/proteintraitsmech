identifier: InterPro:IPR053787
label: "Autotransporter-associated N-terminal domain"
definition: >-
  This domain is found at the N-terminal of a group of large autotransporter proteins from Fusobacteriales. Many members of this group show an autotransporter beta-domain at the C-terminal end. In paralogous families of such proteins, the N-terminal and C-terminal regions are fairly well-conserved, but the repetitive central region is poorly conserved in both length and sequence.
