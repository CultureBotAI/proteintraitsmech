identifier: InterPro:IPR049629
label: "DPY30/SDC1, dimerization/docking domain"
definition: >-
  This entry represents the dimerization/docking domain (DD) of DPY-30 from animals and its homologues SDC1 from yeast. Protein dpy-30 homologue (DPY30) is a component of the MLL1/MLL complex which trimethylates histone H3 at 'Lys-4' as a specific tag for epigenetic transcriptional activation. DPY30 is also a component in MLL2/3 and MLL4/WBP7 methyltransferase-containing complexes and the SET1 complex. DPY30 is found in the nucleus and the trans-Golgi network where it interacts with ARFGEF1 implying a role in endosomal trafficking. This entry also includes C. elegans dpy-30, which is an essential component of the C. elegans dosage compensation machinery that reduces X chromosome transcript levels in hermaphrodites (XX).
