identifier: InterPro:IPR057422
label: "Lambda-carrageenase, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Pseudoalteromonas Lambda-carrageenase (CGLA), a protein that hydrolyses lambda-carrageenan with inversion of anomeric configuration. This domain is predicted to adopt a β-sandwich fold.
