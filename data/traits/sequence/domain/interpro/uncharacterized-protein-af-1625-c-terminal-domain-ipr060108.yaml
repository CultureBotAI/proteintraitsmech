identifier: InterPro:IPR060108
label: "Uncharacterized protein AF_1625, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the uncharacterised protein AF_1625 from Archaeoglobus fulgidus and similar sequences from related archaeal species. The full-length protein is 581 amino acids with a molecular weight of approximately 64.9 kDa and contains an N-terminal signal peptide (residues 1-28) that is cleaved during processing. The specific function of this C-terminal domain remains to be determined. This domain can also be found in other positions in predicted Metallophosphoesterase and other uncharacterised bacterial proteins.
