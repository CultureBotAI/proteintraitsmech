identifier: InterPro:IPR035473
label: "CASK, SH3 domain"
definition: >-
  CASK is a scaffolding protein that is highly expressed in the mammalian nervous system and plays roles in synaptic protein targeting, neural development, and gene expression regulation. CASK interacts with many different binding partners including parkin, neurexin, syndecans, calcium channel proteins, caskin, among others, to perform specific functions in different subcellular locations. Disruption of the CASK gene in mice results in neonatal lethality while mutations in the human gene have been associated with X-linked mental retardation. Drosophila CASK is associated with both pre- and postsynaptic membranes and is crucial in synaptic transmission and vesicle cycling.
