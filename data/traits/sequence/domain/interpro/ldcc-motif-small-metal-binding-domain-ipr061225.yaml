identifier: InterPro:IPR061225
label: "LDCC motif small metal-binding domain"
definition: >-
  This small and previously undescribed domain, just over 30 amino acids in length, occurs primarily in small proteins of unknown function. It is identified as a probable heavy metal-binding domain by its CysCys pair (seen often in mercury resistance proteins), by the presence of metal-binding or transport domains such as , N-terminal or C-terminal to this domain, in longer members of the family, in some cases by local genomic context.
