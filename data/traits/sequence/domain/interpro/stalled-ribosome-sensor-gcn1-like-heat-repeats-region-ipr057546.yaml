identifier: InterPro:IPR057546
label: "Stalled ribosome sensor GCN1-like, HEAT repeats region"
definition: >-
  This region of HEAT repeats is found in human Stalled ribosome sensor GCN1 and similar eukaryotic proteins. GCN1 is a ribosome collision sensor that plays a key role in the RNF14 -RNF25 translation quality control pathway, which occurs when a ribosome has stalled during translation, promoting ubiquitination and degradation of translation factors on stalled ribosomes. The structure of this protein is predicted to be entirely formed by HEAT repeats. This entry also includes CLIP-associating proteins.
