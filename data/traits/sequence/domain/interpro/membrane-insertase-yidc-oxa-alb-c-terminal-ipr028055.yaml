identifier: InterPro:IPR028055
label: "Membrane insertase YidC/Oxa/ALB, C-terminal"
definition: >-
  This entry represents the C-terminal domain of YidC/Oxa1/ALB proteins from some species and full length protein from other species. Members of this group of proteins are found in bacteria and eukaryotes. YidC is a bacterial membrane protein which is required for the insertion and assembly of inner membrane proteins. The well-characterised YidC protein from Escherichia coli and its close homologues contain a large N-terminal periplasmic domain. COX18 is a mitochondrial membrane insertase required for the translocation of the C terminus of cytochrome c oxidase subunit II (MT-CO2/COX2) across the mitochondrial inner membrane. It plays a role in MT-CO2/COX2 maturation following the COX20-mediated stabilization of newly synthesized MT-CO2/COX2 protein and before the action of the metallochaperones SCO1/2. OXA1 is a mitochondrial inner membrane insertase that mediates the insertion of both mitochondrion-encoded precursors and nuclear-encoded proteins from the matrix into the inner membrane. It links mitoribosomes with the inner membrane. Plant ALBINO3-like proteins are required for the insertion of some light harvesting chlorophyll-binding proteins (LHCP) into the chloroplast thylakoid membrane.
