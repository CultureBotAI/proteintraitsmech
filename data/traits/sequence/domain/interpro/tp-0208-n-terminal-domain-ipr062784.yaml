label: "TP_0208, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of uncharacterised protein TP_0208 from Treponema pallidum. The protein is 384 amino acids long and contains a predicted signal peptide. The function of this domain remains to be determined.
