identifier: InterPro:IPR038717
label: "Tc1-like transposase, DDE domain"
definition: >-
  This entry represents the DDE containing domain found in Tc1-like transposases. Tc1-like transposases are composed of three domains, the first two making up a bipartite DNA-binding domain, and the third a catalytic core domain containing a DDE motif. Transposases bind to the inverted terminal repeats (ITRs) of a transposon and catalyze the mobilization of the transposon to new location. Tc1 from C. elegans has been shown to serve as an endonuclease that produce a single strand nick at the 5'-end of the transposon. Tc1 transposases are part of the DD[E/D]-transposase family that contain a characteristic motif of three acidic residues, two of which are aspartic acids and one is either glutamic or, in some cases, a third aspartic acid, a [D, D, (E or D)] motif. DD[E/D]-transposase family members have a common RNase H-like fold that brings three catalytic residues into close proximity for catalysis.
