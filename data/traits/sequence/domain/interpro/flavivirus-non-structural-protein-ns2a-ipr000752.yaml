identifier: InterPro:IPR000752
label: Flavivirus non-structural protein NS2A
definition: >-
  NS2A is a hydrophobic protein about 25kDa in size, which is cleaved from NS1 by a membrane bound host protease. NS2A has been found to associate with the dsRNA within the vesicle packages. It has also been found that NS2A associates with the known replicase components and so NS2A has been postulated to be part of this replicase complex.
