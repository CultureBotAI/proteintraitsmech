identifier: InterPro:IPR048433
label: "YNCE-like beta-propeller"
definition: >-
  This entry includes bacterial YncE proteins which adopt a β-propeller structure (the so-called YVTN β-propeller). This domain is known to bind DNA. The structures of YncE in the free form and complexed with DNA revealed that the surface region of YncE corresponding to the 'canonical' substrate-binding site forms essential contacts with DNA. This domain is also found in hydrazine synthase subunit beta, which is a component of the hydrazine synthase complex that catalyses the condensation of nitric oxide with ammonium to form hydrazine, and in 2,3-diketo-L-gulonate mutase (DkgM), a cyclase involved in an L-ascorbate catabolic pathway that produces 2-oxoglutarate.
