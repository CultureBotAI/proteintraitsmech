identifier: InterPro:IPR046984
label: "Bridging integrator 2, BAR domain"
definition: >-
  Bridging integrator 2 (Bin2) is a BAR domain containing protein that is mainly expressed in hematopoietic cells. It is upregulated during granulocyte differentiation and is thought to function primarily in this lineage. It promotes cell motility and migration, probably via its interaction with the cell membrane and with podosome proteins that mediate interaction with the cytoskeleton. Bin2 modulates membrane curvature, mediates membrane tubulation and it plays a role in podosome formation. It was shown to inhibit phagocytosis. The BAR domain of Bin2 is closely related to the BAR domains of amphiphysins, which function primarily in endocytosis and other membrane remodelling events. Amphiphysins contain an N-terminal BAR domain with an additional N-terminal amphipathic helix (an N-BAR), a variable central domain, and a C-terminal SH3 domain. Unlike amphiphysins, Bin2 does not appear to contain a C-terminal SH3 domain. Some amphiphysin II isoforms, also called Bridging integrator 1 (Bin1), function in intracellular vesicle trafficking. Bin2 can form a stable complex with Bin1 in cells but cannot replace the function of Bin1, and thus, appears to harbour a nonredundant function.
