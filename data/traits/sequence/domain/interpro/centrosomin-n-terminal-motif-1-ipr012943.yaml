identifier: InterPro:IPR012943
label: Centrosomin, N-terminal motif 1
definition: >-
  This domain (Cnn_1N) is a short conserved motif found in the N-terminal of a group of centrosome or spindle pole body (SPB) associated proteins, including Mto1 and Pcp1 from S. pombe, centrosomin from flies and myomegalin/CDK5RAP2 from mammals.
