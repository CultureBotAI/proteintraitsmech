identifier: InterPro:IPR063265
label: "Protein OSB1/2/3/4, PDF repeat"
definition: >-
  This entry represents a repeated region of approximately 50 residues found in Protein OSB1/2/3/4 (organellar single-stranded DNA-binding) proteins from plants (Viridiplantae). The repeat occurs in two to four copies C-terminal to the SSB domain ( ). OSB proteins localise to chloroplasts and mitochondria where they bind preferentially to single-stranded DNA. While the SSB domain is responsible for DNA binding, the specific function of this repeat remains to be determined.
