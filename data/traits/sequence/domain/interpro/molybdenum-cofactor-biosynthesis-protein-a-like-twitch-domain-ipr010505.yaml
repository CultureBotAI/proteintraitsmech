identifier: InterPro:IPR010505
label: Molybdenum cofactor biosynthesis protein A-like, twitch domain
definition: >-
  This entry represents the iron-sulfur cluster-binding twitch domain of GTP 3',8-cyclase, which is also known as molybdenum cofactor biosynthesis protein A (MoaA) in bacteria and archaea, molybdenum cofactor biosynthesis protein 1 (MOCS1) in most eukaryotes, and molybdenum cofactor biosynthesis enzyme CNX2 in plants. They belong to a family of enzymes involved in the synthesis of metallo-cofactors ( ). Each subunit of the MoaA dimer is comprised of an N-terminal SAM domain ( ) that contains the [4Fe-4S] cluster typical for this family of enzymes, as well as an additional [4Fe-4S] cluster in the C-terminal domain that is unique to MoaA proteins, involved in substrate binding. The unique Fe site of the C-terminal [4Fe-4S] cluster is thought to be involved in the binding and activation of 5'-GTP. Mutations in the human MoCF biosynthesis proteins MOCS1, MOCS2 or GEPH cause MoCF Deficiency type A (MOCOD), causing the loss of activity of MoCF-containing enzymes, resulting in neurological abnormalities and death. The majority of molybdenum-containing enzymes utilise a molybdenum cofactor (MoCF or Moco) consisting of a Mo atom coordinated via a cis-dithiolene moiety to molybdopterin (MPT). MoCF is ubiquitous in nature, and the pathway for MoCF biosynthesis is conserved in all three domains of life. MoCF-containing enzymes function as oxidoreductases in carbon, nitrogen, and sulphur metabolism.
