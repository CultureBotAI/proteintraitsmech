identifier: InterPro:IPR034351
label: "CsdA-like, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) in RNA-binding protein csdA, RNA-binding protein involved in heterochromatin assembly dri1 and Putative RNA-binding protein involved in heterochromatin assembly (Nrp1). CsdA is an RNA-binding protein (RBP) that plays a key role in regulating the production of secondary metabolites. Together with the transcription factor LaeB, CsdA forms a novel post-transcriptional control network governing secondary metabolite biosynthesis, whereby CsdA controls the expression of LaeB at the post-transcriptional level by influencing the alternative splicing of its pre-mRNA. Specifically, CsdA mediates LaeB expression by binding to a specific motif, GUCGGUAU, on LaeB pre-mRNA, thereby regulating the stability of intron 2 splicing. This results in the production of normal levels of LaeB protein, which in turn interacts with CsdA to collectively regulate fungal growth, development, and secondary metabolism. NRP1 and dri1 may play a role in chromatin organisation.
