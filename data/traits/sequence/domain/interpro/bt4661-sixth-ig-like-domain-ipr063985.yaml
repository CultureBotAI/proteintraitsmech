identifier: InterPro:IPR063985
label: "BT4661, sixth Ig-like domain"
definition: >-
  This entry represents a domain found in a group of bacterial proteins, including the putative surface glycan binding protein (SGBP) BT4661 from Bacteroides thetaiotaomicron ( ). This protein seem to play a role in the bacterial degrading apparatus of the host glycosaminoglycans heparin (Hep) and heparan sulfate (HS). It shows six discrete domains that adopt an Ig-like fold arranged in an extended, curved conformation. This entry represents the sixth Ig-like domain.
