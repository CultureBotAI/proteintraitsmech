label: "Insertion element IS150 protein InsJ-like, helix-turn-helix domain"
definition: >-
  This entry represents a helix-turn-helix (HTH) domain found in Insertion element IS150 protein InsJ from Escherichia coli and similar sequences from cellular organisms, mainly bacteria. It is likely to be DNA-binding.
