identifier: InterPro:IPR044506
label: "Dual-specificity phosphatase CDC14, C-terminal"
definition: >-
  This entry represents the C-terminal catalytic dual-specificity phosphatase domain of Cdc14. It has the PTP signature motif. The cell division control protein 14 (CDC14) family is highly conserved in all eukaryotes, although the roles of its members seem to have diverged during evolution. Yeast Cdc14, the best characterised member of this family, is a dual-specificity phosphatase that plays key roles in cell cycle control. It preferentially dephosphorylates cyclin-dependent kinase (CDK) targets, which makes it the main antagonist of CDK in the cell. Cdc14 functions at the end of mitosis and it triggers the events that completely eliminates the activity of CDK and other mitotic kinases. It is also involved in coordinating the nuclear division cycle with cytokinesis through the cytokinesis checkpoint, and in chromosome segregation. Cdc14 phosphatases also function in DNA replication, DNA damage checkpoint, and DNA repair. Vertebrates may contain more than one Cdc14 homologues; humans have three (CDC14A, CDC14B, and CDC14C). CDC14 contains a highly conserved N-terminal pseudophosphatase domain that contributes to substrate specificity and a C-terminal catalytic dual-specificity phosphatase domain with the PTP signature motif.
