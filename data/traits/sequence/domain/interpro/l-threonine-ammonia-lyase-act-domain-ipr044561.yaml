identifier: InterPro:IPR044561
label: "L-threonine ammonia-lyase, ACT domain"
definition: >-
  This entry represents the ACT domain found in L-threonine ammonia-lyase from Geobacter sulfurreducens which catalyses the conversion of threonine to 2-oxobutanoate and ammonia. It acts in the threonine-dependent pathway of isoleucine biosynthesis, which is the minor pathway for isoleucine biosynthesis in G.sulfurreducens. This entry also includes the uncharacterized protein MJ1601 from Methanocaldococcus jannaschii.
