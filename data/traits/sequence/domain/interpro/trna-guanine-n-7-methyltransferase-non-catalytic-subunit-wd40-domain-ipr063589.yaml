identifier: InterPro:IPR063589
label: "tRNA (guanine-N(7)-)-methyltransferase non-catalytic subunit, WD40 domain"
definition: >-
  This entry represents the WD40 β-propeller domain found in the tRNA (guanine-N(7)-)-methyltransferase non-catalytic subunit TRM82 and similar sequences from fungi. TRM82 forms a heterodimer with the catalytic subunit TRM8 and is required for the formation of N(7)-methylguanine at position 46 (m7G46) in tRNA. In the complex, TRM82 is required to stabilise and induce conformational changes of the catalytic subunit.
