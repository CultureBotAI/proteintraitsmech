identifier: InterPro:IPR003151
label: PIK-related kinase, FAT
definition: >-
  The FAT domain is a domain present in the PIK-related kinases. Members of the family of PIK-related kinases may act as intracellular sensors that govern radial and horizontal pathways. This domain shows an α-helical structure.
