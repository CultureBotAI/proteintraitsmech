identifier: InterPro:IPR059007
label: "At1g04390, ARM repeat"
definition: >-
  This entry represents a repeat from a set of uncharacterised plant proteins, including At1g04390 from Arabidopsis thaliana. The proteins containing this domain are predominantly found in the eudicotyledons and monocots, specifically within the Magnoliopsida and Liliopsida classes. The At1g04390 protein may act as a substrate-specific adapter of an E3 ubiquitin- protein ligase complex (CUL3-RBX1-BTB) which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. This domain forms an α-solenoid structure composed of repeating pairs of α-helices.
