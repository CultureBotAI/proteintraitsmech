identifier: InterPro:IPR063839
label: "Mediator complex subunit 16, helical domain"
definition: >-
  This entry represents a helical domain found in plant MED16 (Mediator of RNA polymerase II transcription subunit 16), also known as SFR6 (SENSITIVE TO FREEZING 6). The specific function of this domain remains to be determined. MED16 is a component of the Mediator complex, a coactivator involved in regulated transcription of RNA polymerase II-dependent genes. In Arabidopsis thaliana, MED16 is involved in regulation of the circadian clock, control of flowering time, freezing and osmotic stress tolerance, and both salicylic acid and jasmonate-mediated defence gene expression.
