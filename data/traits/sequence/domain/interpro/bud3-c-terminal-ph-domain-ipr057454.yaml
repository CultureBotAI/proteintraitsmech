identifier: InterPro:IPR057454
label: "Bud3, C-terminal PH domain"
definition: >-
  This entry represents a pleckstrin homology (PH) domain found at the C-terminal of Bud3. This PH domain may be involved in membrane targeting of Bud3. The Bud3 is involved in bud site selection and septation processes. It is crucial for proper septum positioning and construction during cell division. It acts as landmarks to mark future septation sites and form part of a scaffold that recruits components of the contractile ring. Additionally, Bud3 co-assembles with Bud4 at bud sites, recognising spatial landmarks during mitosis and establishing the axial budding pattern in the G1 phase. It is not required for determining lateral branch formation sites. Pleckstrin homology (PH) domains are small modular domains that occur in a large variety of proteins and they have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner, enabling them to interact with other components of signal transduction pathways. They share little sequence conservation, but all have a common fold, which is electrostatically polarised. The domains can bind phosphatidylinositol within biological membranes and proteins such as the beta/gamma subunits of heterotrimeric G proteins and protein kinase C. PH domains are distinguished from other PIP-binding domains by their specific high-affinity binding to phosphoinositide phosphates (PIPs) with two vicinal phosphate groups: PtdIns(3,4)P2, PtdIns(4,5)P2 or PtdIns(3,4,5)P3 which results in targeting some PH domain proteins to the plasma membrane. A few display strong specificity in lipid binding. Any specificity is usually determined by loop regions or insertions in the N-terminal of the domain, which are not conserved across all PH domains. PH domains have been fo…
