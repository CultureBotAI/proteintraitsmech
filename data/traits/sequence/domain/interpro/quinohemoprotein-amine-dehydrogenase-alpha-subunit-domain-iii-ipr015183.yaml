identifier: InterPro:IPR015183
label: "Quinohemoprotein amine dehydrogenase, alpha subunit domain III"
definition: >-
  Members of this family, which are predominantly found in the prokaryotic protein quinohemoprotein amine dehydrogenase, adopt an immunoglobulin-like β-sandwich fold, with seven strands arranged into two β sheets; the fold is possibly related to the immunoglobulin and/or fibronectin type III superfamilies. The precise function of this domain has not, as yet, been defined.
