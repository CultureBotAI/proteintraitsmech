identifier: InterPro:IPR013588
label: "MAP2/Tau projection"
definition: >-
  This domain is found in the microtubule-associated protein 2 (MAP2)/Tau family of proteins which includes MAP2, MAP4, Tau, and their homologues. All isoforms contain a conserved C-terminal domain containing tubulin-binding repeats ( ), and a N-terminal projection domain of varying size. This domain has a net negative charge and exerts a long-range repulsive force. This provides a mechanism that can regulate microtubule spacing which might facilitate efficient organelle transport.
