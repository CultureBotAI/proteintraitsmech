identifier: InterPro:IPR041250
label: "ParA helix turn helix domain"
definition: >-
  The accurate segregation of DNA is essential for the faithful inheritance of genetic information. Segregation of the prototypical P1 plasmid par system requires two proteins, ParA and ParB, and a centromere. When bound to ATP, ParA mediates segregation by interacting with centromere-bound ParB, but when bound to ADP, ParA fulfills a different function: DNA-binding transcription autoregulation. ParA consists of an elongated N-terminal α-helix which mediates dimerization, a winged-HTH and a Walker-box containing C-domain. This entry describes the N-terminal α helix domain combined with the winged HTH region.
