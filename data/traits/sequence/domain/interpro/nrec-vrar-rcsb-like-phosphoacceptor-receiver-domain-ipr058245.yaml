identifier: InterPro:IPR058245
label: "NreC/VraR/RcsB-like, phosphoacceptor receiver domain"
definition: >-
  This entry represents phosphoacceptor receiver (REC) domain of Oxygen regulatory protein NreC and Response regulator protein VraR from Staphylococcus aureus, Transcriptional regulatory protein RcsB from Escherichia coli and similar bacterial regulators. NreC is a member of the two-component regulatory system NreB/NreC involved in the control of dissimilatory nitrate/nitrite reduction in response to oxygen. VraR is a member of the two-component regulatory system VraS/VraR involved in the control of the cell wall peptidoglycan biosynthesis. This protein inhibits the host autophagic flux and delays the early stage of autophagosome formation, thereby promoting bacterial survival and facilitates the ability of the bacteria to resist host polymorphonuclear leukocytes-mediated phagocytosis and killing thus contributing to immune evasion. RcsB is a component of the Rcs signalling system, which controls transcription of numerous genes, including those involved in colanic acid capsule synthesis, biofilm formation, cell division and outer membrane proteins synthesis. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays.
