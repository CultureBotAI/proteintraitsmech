identifier: InterPro:IPR045841
label: "E3 ubiquitin-protein ligase UBR4, N-terminal"
definition: >-
  This entry represents the N-terminal domain of E3 ubiquitin-protein ligases UBR4 (POE or PUSHOVER in Drosophila) from animals. UBR4 is a component of the N-rule pathway, identified as noncanonical N-recognins implicated in bulk lysosomal degradation and autophagy. Proteins containing this domain are extraordinarily large proteins that recognise and bind to proteins with N-terminal destabilising residues according to the N-end rule leading them to their ubiquitination and degradation. These proteins share a UBR box with others E3-ligases UBR box proteins, but UBR4 lacks the ubiquitylation domain, suggesting that it may interact with other catalytic proteins.
