identifier: InterPro:IPR013351
label: "Type III secretion system effector delivery regulator TyeA-related"
definition: >-
  This entry represents a sequence region found in both small proteins of about 90 amino acids where it covers the whole sequence, and longer proteins of about 360 residues where it occurs in the C-terminal region. Some of the longer proteins (HrpJ) have N-terminal regions that contain . These proteins belong to bacterial type III secretion systems, and include TyeA from the well-studied Yersinia systems. TyeA appears to be involved in calcium-responsive regulation of the delivery of type III effectors.
