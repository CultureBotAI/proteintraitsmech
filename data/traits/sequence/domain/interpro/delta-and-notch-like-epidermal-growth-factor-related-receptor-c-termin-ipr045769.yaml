identifier: InterPro:IPR045769
label: "Delta and Notch-like epidermal growth factor-related receptor, C-terminal"
definition: >-
  This entry represents the C-terminal region of the Delta and Notch-like epidermal growth factor-related receptor (DNER) containing the transmembrane domain and the short cytoplasmic region, including the AP-1-binding site required for its somatodendritic distribution. This receptor is highly expressed in Purkinje cells taking part in the differentiation and maturation of Bergmann glia via physical contact with Purkinje cells and granular cells. Recently, it has been demonstrated that DNER is induced in lung recruited macrophages after chronic inflammation, in which it induces IFN-gamma expression via a non-canonical Notch NF-kappaB pathway. This receptor has also been related to breast cancer.
