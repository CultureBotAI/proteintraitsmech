identifier: InterPro:IPR058839
label: "DNA helicase B, winged helix domain"
definition: >-
  This entry represents the winged helix domain found in DNA helicase B (HELB). HELB is a 5'-3' DNA helicase that functions in cellular homologous recombination and DNA damage response. It accumulates on chromatin in cells exposed to DNA damage and interacts with RPA. HELB promotes homologous recombination in vivo and stimulates 5'-3' heteroduplex extension during Rad51-mediated strand exchange.
