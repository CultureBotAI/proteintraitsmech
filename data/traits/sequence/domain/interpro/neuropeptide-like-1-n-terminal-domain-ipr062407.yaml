identifier: InterPro:IPR062407
label: "Neuropeptide-like 1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of neuropeptide-like 1 (NPLP1) proteins from diptera. This domain is approximately 80 residues in length and precedes the C-terminal NPLP1_C domain. NPLP1 proteins are neuropeptide precursors that undergo proteolytic processing to generate multiple bioactive peptides including MTYamide, IPNamide, and NAP peptides. The proteins are secreted and expressed in the central nervous system. The specific function of this domain remains to be determined.
