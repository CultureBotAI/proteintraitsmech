identifier: InterPro:IPR049444
label: "TetR/AcrR transcriptional repressor, C-terminal domain"
definition: >-
  TetR/AcrR family transcriptional repressors regulate a wide range of cellular activities, including multidrug resistance, virulence and pathogenicity of bacteria. Members of this family are two domain proteins consisting of N-terminal HTH DNA-binding domain and C-terminal ligand recognition domain. This entry represents the C-terminal domain that besides the ligand recognition, is involved in dimerisation. In contrast to the N-terminal domain, this domain is more diverse allowing different regulators in the TetR/AcrR family to accommodate specific sets of inducing ligands.
