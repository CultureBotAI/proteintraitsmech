identifier: InterPro:IPR058948
label: "ZNF451, sixth C2H2 type zinc finger"
definition: >-
  This entry represents the sixth C2H2 type zinc finger found in E3 SUMO-protein ligase ZNF451 and similar proteins from vertebrates. ZNF451 is a key enzyme involved in the sumoylation process, exhibiting a preference for SUMO2 and SUMO3 over SUMO1. It facilitates the UBE2I/UBC9-mediated sumoylation of target proteins, particularly in response to DNA damage and proteasome inhibitors. ZNF451 is essential for MCM4 sumoylation, and it negatively regulates transcriptional activation mediated by the SMAD4 complex in the context of TGF-beta signalling. Additionally, it inhibits EP300-mediated acetylation of histone H3 at 'Lys-9'.
