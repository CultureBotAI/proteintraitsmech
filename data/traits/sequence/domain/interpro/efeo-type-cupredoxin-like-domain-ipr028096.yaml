identifier: InterPro:IPR028096
label: "EfeO-type cupredoxin-like domain"
definition: >-
  The cupredoxin-like fold consists of a β-sandwich with 7 strands in 2 β-sheets, which is arranged in a Greek-key β-barrel. EfeO is a periplasmic protein with a cupredoxin N-terminal domain from the EfeUOB iron uptake system. This entry represents an EfeO-type cupredoxin-like domain.
