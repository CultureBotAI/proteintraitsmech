identifier: InterPro:IPR060533
label: "YPL277C-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of YPL277C and other uncharacterised proteins in fungi such as YOR389W. YOR389W is an uncharacterised secreted glycoprotein from Saccharomyces cerevisiae that undergoes extensive N-linked glycosylation. The proteins contain signal peptides for secretion and multiple glycosylation sites. YOR389W interacts with myosin proteins MYO3 and MYO5. This N-terminal domain follows the signal peptide and contains some of the N-glycosylation sites. The domain is found in YOR389W homologues across diverse fungal species. The specific function of this domain is unknown.
