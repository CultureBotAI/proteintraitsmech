identifier: InterPro:IPR046474
label: "Domain of unknown function DUF6795"
definition: >-
  This domain, mainly found in bacteria, is functionally uncharacterised. This domain is approximately 100 amino acids in length and, based on structure prediction and overlaps with other families, belongs to the transthyretin superfamily. It is likely to have a seven stranded β-sandwich fold.
