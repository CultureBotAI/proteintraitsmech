identifier: InterPro:IPR029263
label: "Respiratory nitrate reductase beta, C-terminal"
definition: >-
  This domain occurs near the C terminus of the respiratory nitrate reductase beta chain. The nitrate reductase complex is a dimer of heterotrimers each consisting of an alpha, beta and gamma chain. This domain plays a role in the interactions between subunits and shielding of the Fe-S clusters.
