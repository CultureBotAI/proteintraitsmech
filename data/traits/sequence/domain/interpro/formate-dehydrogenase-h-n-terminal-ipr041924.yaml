identifier: InterPro:IPR041924
label: "Formate dehydrogenase H, N-terminal"
definition: >-
  This entry represents the N-terminal domain of formate dehydrogenase H (Formate-Dh-H), which catalyzes the reversible oxidation of formate to CO2 with the release of a proton and two electrons. Formate-Dh-H is a component of the anaerobic formate hydrogen lyase complex. The E. coli formate dehydrogenase H (Fdh-H) is a monomer composed of a single polypeptide chain with a Mo active site region and a [4Fe-4S] centre. This domain is also found at the N-terminal of F420-dependent formate dehydrogenase subunit alpha from Methanobacterium formicicum, which catalyses the oxidation of formate to carbon dioxide, with coenzyme F420 as the electron acceptor. Proteins containing this domain belong to the molybdopterin_binding (MopB) superfamily of proteins.
