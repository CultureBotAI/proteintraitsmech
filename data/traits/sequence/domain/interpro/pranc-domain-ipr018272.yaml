identifier: InterPro:IPR018272
label: "PRANC domain"
definition: >-
  This presumed domain is found at the C terminus of a variety of Pox virus proteins. The PRANC (Pox proteins Repeats of ANkyrin, C-terminal) domain is also found on its own in some proteins. The function of this domain is unknown, but it appears to be related to the F-box domain and may play a similar role.
