identifier: InterPro:IPR048984
label: "Secreted effector protein PipB2, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of Secreted effector protein PipB2 from Salmonella typhimurium and similar sequences from gammaproteobacteria. PipB2 is involved in the reorganisation of late endosome/lysosome compartments in host mammalian cells. It is required for virulence. This domain shows a two-layer α-β structure.
