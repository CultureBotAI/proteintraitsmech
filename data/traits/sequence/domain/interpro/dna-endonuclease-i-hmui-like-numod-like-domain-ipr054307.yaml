label: "DNA endonuclease I-HmuI-like, NUMOD-like domain"
definition: >-
  This entry represents the C-terminal NUMOD1-like DNA-binding HTH domain present in a set of intron-encoded endonucleases (homing endonucleases) such as I-HmuI from Bacteriophage SP01 and similar proteins.
