identifier: InterPro:IPR058610
label: "WIT1/2, N-terminal helical bundle"
definition: >-
  This domain is found at the N-terminal end of WIT1/2 from Arabidopsis thaliana. This domain is predicted to show a three-helical bundle. WIT1 and WIT2 are tail-anchored proteins required for the nuclear envelope anchoring of RANGAP (Ran GTPase activating protein) in root tips in Arabidopsis. They could be involved in determining plant nuclear shape and pollen tube guidance.
