identifier: InterPro:IPR060491
label: "NADPH-dependent oxidoreductase NFRA-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in oxygen-insensitive nitroreductase enzymes. This C-terminal domain follows the main nitroreductase domain and contains residues important for NADPH binding and catalytic activity, including a conserved arginine residue that, when mutated to alanine, causes a strong decrease in activity. Reduced flavins participate in numerous biochemical processes. NAD(P)H-flavin oxidoreductases (flavin reductases) catalyse the reduction of flavin by NAD(P)H. The representative member of this family, Frp (flavin reductase P), is a supplier of reduced flavin mononucleotide (FMNH2) to the bioluminescence reaction in Vibrio harveyi. Oxygen-insensitive NADPH nitroreductase also belongs to this family. It catalyses the reduction of nitroaromatic compounds using NADH. It is a major component of the oxygen-insensitive nitroreductase activity of some bacteria, such as E.coli. Both the reductase and nitroreductase are homodimeric flavoproteins that contain one FMN per monomer as a cofactor.
