identifier: InterPro:IPR028154
label: "AMP-dependent ligase, C-terminal"
definition: >-
  This is a small domain that is found C-terminal to . It has a central β sheet core that is flanked by α helices. Proteins containing this domain include phenylacetate-coenzyme A ligase, which catalyses the activation of phenylacetic acid (PA) to phenylacetyl-CoA (PA-CoA).
