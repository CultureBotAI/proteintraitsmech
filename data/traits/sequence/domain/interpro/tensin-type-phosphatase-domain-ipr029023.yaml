identifier: InterPro:IPR029023
label: "Tensin-type phosphatase domain"
definition: >-
  Tensins constitute a eukaryotic family of lipid phosphatases that are defined by the presence of two adjacent domains: a lipid phosphatase domain and a C2-like domain. The tensin-type C2 lacks the canonical Ca(2+) ligands found in classical C2 domains, and in this respect it is similar to the C2 domains of PKC-type. The tensin-type C2 domain can bind phospholipid membranes in a Ca(2+) independent manner. In the tumour suppressor protein PTEN, the best-characterised member of the family, the lipid phosphatase domain was shown to specifically dephosphorylate the D3 position of the inositol ring of the lipid second messenger, phosphatidylinositol-3,4,5-triphosphate (PIP3). The lipid phosphatase domain contains the signature motif HCXXGXXR present in the active sites of protein tyrosine phosphatases (PTPs) and dual specificity phosphatases (DSPs). Furthermore, two invariant lysines are found only in the tensin-type phosphatase motif (HCKXGKXR) and are suspected to interact with the phosphate group at position D1 and D5 of the inositol ring. The crystal structure of the PTEN tumour suppressor has been solved. The lipid phosphatase domain has a structure similar to the dual specificity phosphatase. However, PTEN has a larger active site pocket that could be important to accommodate PI(3,4,5)P3. The tensin-type C2 domain has a structure similar to the classical C2 domain that mediates the Ca2+-dependent membrane recruitment of several signalling proteins. However the tensin-type C2 domain lacks two of the three conserved loops that bind Ca2+. Proteins known to contain a phosphatase and a C2 tensin-type domain are listed below: Tensin, a focal-adhesion molecule that binds to actin filaments. It may be involved in cell migration, cartilage development and in linking signal tran…
