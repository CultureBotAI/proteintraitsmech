identifier: InterPro:IPR062926
label: "Putative WhiB interacting protein"
definition: >-
  This entry represents a small protein found in Actinomycetes, particularly Streptomycetaceae, Pseudonocardiaceae, and Nocardioidaceae. STRING analysis indicates a strong functional association with the Whib family of transcriptional regulators ( ). The WhiB proteins are iron-sulfur cluster-containing transcription factors involved in sporulation and antibiotic production in Streptomyces. The function of this associated protein remains to be determined. AlphaFold modelling weakly suggests that this protein may interact with the WhiB protein.
