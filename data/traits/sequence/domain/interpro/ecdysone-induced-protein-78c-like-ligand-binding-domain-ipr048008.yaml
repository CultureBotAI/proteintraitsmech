identifier: InterPro:IPR048008
label: "Ecdysone-induced protein 78C-like, ligand binding domain"
definition: >-
  This entry represents the ligand binding domain (LBD) of Drosophila E78 and its homologues. Drosophila ecdysone-induced protein 78 (E78) is a transcription factor belonging to the nuclear receptor superfamily. E78 is a product of the ecdysone-inducible gene found in an early late puff locus at position 78C during the onset of Drosophila metamorphosis. It is expressed throughout the germline during oogenesis, and is important for proper egg production and for the maternal control of early embryogenesis. Two isoforms of E78, E78A and E78B, are expressed from two nested transcription units. An E78 orthologue from the Platyhelminth Schistosoma mansoni (SmE78) has also been identified. It is the first E78 orthologue known outside of the molting animals - the Ecdysozoa. SmE78 may be involved in transduction of an ecdysone signal in S. mansoni ( ), consistent with its function in Drosophila. Like other members of the nuclear receptor (NR) superfamily of ligand-activated transcription factors, E78-like receptors have a central well conserved DNA binding domain (DBD), a variable N-terminal domain, a non-conserved hinge and a C-terminal ligand binding domain (LBD).
