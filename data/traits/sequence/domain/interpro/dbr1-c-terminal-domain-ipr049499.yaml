identifier: InterPro:IPR049499
label: "Dbr1, C-terminal domain"
definition: >-
  Dbr1 (Lariat debranching enzyme) is an eukaryotic intron debranching enzyme that hydrolyses the linkages produced by the spliceosome in RNA for them to be processed into essential cellular factors, such as snoRNA and miRNA. This protein is organized into an N-terminal metallophosphoesterase (MPE) domain and a C-terminal domain which is represented in this entry. This domain consists of four α-helices and three connecting loops. It is located on the posterior of the protein, opposite the active site and is joined to the MPE domain by an extended linker region.
