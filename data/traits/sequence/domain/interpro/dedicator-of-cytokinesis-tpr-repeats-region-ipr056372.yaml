identifier: InterPro:IPR056372
label: "Dedicator of cytokinesis, TPR repeats region"
definition: >-
  This entry corresponds to a TPR-like α-solenoid region in Dedicator of cytokinesis (DOCK) proteins. Dedicator of cytokinesis (DOCK) proteins function as guanine nucleotide exchange factors (GEFs) that activate small GTPases by exchanging bound GDP for free GTP, thus converting them into their active GTP-bound form. These proteins are involved in various cellular processes, including cytoskeletal rearrangements, cell migration, phagocytosis of apoptotic cells, and regulation of adherens junctions between cells. Some family members may also play a role in disease processes such as Alzheimer's disease by interacting with presenilin proteins and affecting Tau phosphorylation. DOCK proteins are characterised by the presence of a conserved DOCKER domain, which is necessary for their GEF activity and interaction with small GTPases like RAC1 and RAC2.
