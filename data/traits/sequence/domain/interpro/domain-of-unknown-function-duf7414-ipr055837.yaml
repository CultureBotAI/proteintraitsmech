definition: >-
  This entry represents an uncharacterised family of proteins. Structure prediction suggests these proteins form a four stranded β sheet with a helix packed on one side. Structure prediction also suggests a confident dimer. The structure shows some weak similarity to large ribosomal subunit protein eL38.
