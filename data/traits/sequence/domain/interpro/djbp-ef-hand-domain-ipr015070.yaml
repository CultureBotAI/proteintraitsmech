identifier: InterPro:IPR015070
label: "DJBP, EF-hand domain"
definition: >-
  This domain is found in DJ binding protein DJBP. This domain is found in DJ binding protein DJBP. DJBP or EF-hand calcium-binding domain-containing protein 6 is a DJ-1-binding protein that negatively regulates the androgen receptor by recruiting the histone deacetylase complex. Protein DJ-1 antagonises this inhibition by abrogation of this complex.
