identifier: InterPro:IPR056173
label: "Sec20, C-terminal"
definition: >-
  Sec20 is a membrane glycoprotein and a SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptor) involved in retrograde transport from the Golgi to the endoplasmic reticulum (ER). It is also required for N- and O-glycosylation in the Golgi. This entry represents the C-terminal region of Sec20 and related proteins such as transport protein BOS1 and AtNPSN11.
