identifier: InterPro:IPR061868
label: "Domain of unknown function DUF8807"
definition: >-
  This entry represents a domain of approximately 100 residues found in bacteria. This domain is typically located at the C terminus of proteins containing DUF1156 ( ). These proteins are often associated with mobile genetic elements, including transposases and site-specific DNA methyltransferases. The function of this domain remains to be determined.
