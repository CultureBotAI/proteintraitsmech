identifier: InterPro:IPR035531
label: "GTP binding protein 1-like, GTP-binding domain"
definition: >-
  This GTP-binding domain is found in mammalian GTP binding protein 1 (GTPBP1), GTPBP2, and nematode homologues AGP-1 and CGP-1. Even though GTPBP1 has a GTP-binding domain, it has not been reported to have GTPase activity. GTPBP1 is thought to modulate mRNA decay by destabilizing the interactions between the RBPs and the cytoplasmic exosome using a GTP-binding-dependent mechanism.
