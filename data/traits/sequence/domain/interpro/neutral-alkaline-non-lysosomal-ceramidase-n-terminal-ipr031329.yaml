identifier: InterPro:IPR031329
label: "Neutral/alkaline non-lysosomal ceramidase, N-terminal"
definition: >-
  This entry represents the N-terminal domain of a group of neutral/alkaline ceramidases found in both bacteria and eukaryotes. The EC classification is. The enzyme hydrolyses ceramide to generate sphingosine and fatty acid. The enzyme plays a regulatory role in a variety of physiological events in eukaryotes and also functions as an exotoxin in particular bacteria. This N-terminal domain carries two metal-binding sites, the first for Zn2+ residing within the domain, and the second, for Mg2+/Ca2+ lying at the interface between the two domains.
