identifier: InterPro:IPR011016
label: Zinc finger, RING-CH-type
definition: >-
  The RING finger is a well characterised zinc finger which coordinates two zinc atoms in a cross-braced manner (see ). According to the pattern of cysteines and histidines three different subfamilies of RING finger can be defined. The classical RING finger (RING-HC) has a histidine at the fourth coordinating position and a cysteine at the fifth. In the RING-H2 variant, both the fourth and fifth positions are occupied by histidines. The RING-CH, which is very similar to the classical RING finger, differs from both of these variants in that it has a cys residue in the fourth position and a His in the fifth. Another difference between the RING-CH and the common RING variants is a somewhat longer peptide segment between the fourth and fifth zinc-coordinating residues. The RING-CH zinc finger has thus the same arrangement of cysteine and histidine (C4HC3) as the PHD zinc finger (see ) but it contains features (spacing between the cysteines and the histidine) characteristic of the genuine RING-finger (C3HC4). The RING-CH-type is an E3 ligase mainly found in proteins associated to membranes. The solution structure of the RING-CH-type zinc finger of the herpesvirus Mir1 protein has shown that it is an outlying relative of the cellular RING finger domain family, with its polypeptide backbone much more closely resembling that of RING domains than PHD domains. The only real difference between the classic and variant RING domains, other than the alteration of zinc ligands, is the loss of the small β-sheet found in RING domains and the replacement of one strand of this sheet with a single turn of helix. Some proteins that contains a RING-CH-type zinc finger are listed below: Yeast Doa10/SSM4. An E3 ligase essential for the endoplasmic reticulum associated degradation (ERAD), an…
