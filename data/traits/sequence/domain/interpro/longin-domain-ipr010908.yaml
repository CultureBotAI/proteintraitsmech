identifier: InterPro:IPR010908
label: "Longin domain"
definition: >-
  VAMPs (and its homologue synaptobrevins) define a group of SNARE proteins that contain a C-terminal coiled-coil/SNARE domain, in combination with variable N-terminal domains that are used to classify VAMPs: those containing longin N-terminal domains (~150 aa) are referred to as longins, while those with shorter N-termini are referred to as brevins. Longins are the only type of VAMP protein found in all eukaryotes, suggesting that their longin domain is essential. The longin domain is thought to exert a regulatory function. Longin domains have been shown to share the same structural fold, a profilin-like globular domain consisting of a five-stranded antiparallel β-sheet that is sandwiched by an α-helix on one side, and two α-helices on the other (β(2)-α-β(3)-α(2)). This domain is also found in phytolongins, non-SNARE longin proteins involved in membrane-trafficking machinery.
