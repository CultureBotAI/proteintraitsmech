identifier: InterPro:IPR037865
label: "Active breakpoint cluster region-related protein, PH domain"
definition: >-
  The active breakpoint cluster region-related protein (ABR) protein contains multiple domains including a RhoGEF domain, a PH domain, a C1 domain, a C2 domain, and a C-terminal RhoGAP domain. It is related to a slightly larger protein, BCR, which is structurally similar, but has an additional N-terminal kinase domain. ABR has GAP activity for both Rac and Cdc42. It promotes the exchange of RAC or CDC42-bound GDP by GTP, thereby activating them.
