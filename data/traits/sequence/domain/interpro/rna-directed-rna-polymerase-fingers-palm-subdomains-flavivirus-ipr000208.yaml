identifier: InterPro:IPR000208
label: RNA-directed RNA polymerase, fingers/palm subdomains, flavivirus
definition: >-
  Flaviviruses produce a polyprotein from the ssRNA genome. The polyprotein is cleaved to a number of products one of which is NS5. Recombinant dengue type 1 virus NS5 protein expressed in Escherichia coli exhibits RNA-dependent RNA polymerase activity. NS5 is the largest mature viral protein and contains a N-terminal methyltransferase (MTase) domain separated by a short linker from the C-terminal RNA-directed RNA polymerase domain (RdRp) that adopts a characteristic right-handed fingers-palm-thumb fold and possesses a number of short regions and motifs homologous to other RNA-directed RNA polymerases. NS5 binds to a the stem loop A (SLA) at the 5' extremity of Flavivirus genome and regulates translation of the viral genome. This entry represents the fingers and palm subdomains of RdRp, which contain the conserved polymerase motifs (A-G) from all RdRps. RNA-directed RNA polymerase (RdRp) is an essential protein encoded in the genomes of all RNA containing viruses with no DNA stage. It catalyses synthesis of the RNA strand complementary to a given RNA template, but the precise molecular mechanism remains unclear. The postulated RNA replication process is a two-step mechanism. First, the initiation step of RNA synthesis begins at or near the 3' end of the RNA template by means of a primer-independent (de novo) mechanism. The de novo initiation consists in the addition of a nucleotide tri-phosphate (NTP) to the 3'-OH of the first initiating NTP. During the following so-called elongation phase, this nucleotidyl transfer reaction is repeated with subsequent NTPs to generate the complementary RNA product.
