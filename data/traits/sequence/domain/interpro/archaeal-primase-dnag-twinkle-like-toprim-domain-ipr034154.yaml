identifier: InterPro:IPR034154
label: "Archaeal primase DnaG/twinkle-like, TOPRIM domain"
definition: >-
  This topoisomerase-primase (TOPRIM) nucleotidyl transferase/hydrolase domain is found in archaeal DnaG-type primases and in mitochondrial twinkle helicase. In archaea, DnaG is tightly associated with the RNA-degrading exosome. DnaG of Sulfolobus solfataricus has been shown to exhibit primase activity in vitro. Twinkle is needed for mitochondrial DNA replication and may be involved in recombinational repair of mitochondrial DNA. The TOPRIM domain has two conserved motifs, one of which centres at a conserved glutamate and the other one at two conserved aspartates (DxD). This glutamate and two aspartates, cluster together to form a highly acid surface patch. The conserved glutamate may act as a general base in nucleotide polymerisation by primases. The DXD motif may co-ordinate Mg 2+ , a cofactor required for full catalytic function.
