identifier: InterPro:IPR022414
label: ATP:guanido phosphotransferase, catalytic domain
definition: >-
  This entry represents the C-terminal catalytic domain of ATP:guanido phosphotransferase that consists of two similar subdomains, the common core of which comprises two β-α-β2-α repeats. The substrate binding site is located in the cleft between N and C-terminal subdomains, but most of the catalytic residues are found in the larger C-terminal subdomain. Eukaryotic phosphagen kinases consist of a small, ~100-residue, α-helical N-terminal domain and a larger, ~250-residue, C-terminal α/β-saddle domain in which many key residues involved in catalysis are found. The N-terminal domain undergoes significant conformational movements during catalysis, closing down on the catalytic pocket. It is involved in dimer formation. Bacterial phosphagen kinases have the large C-terminal domain seen in eukaryotic phosphagen kinases but lack the N-terminal domain. ATP:guanido phosphotransferases are a family of structurally and functionally related enzymes that reversibly catalyse the transfer of phosphate between ATP and various phosphogens. The enzymes belonging to this family include: Glycocyamine kinase, which catalyses the transfer of phosphate from ATP to guanidoacetate. Arginine kinase, which catalyses the transfer of phosphate from ATP to arginine. Taurocyamine kinase, an annelid-specific enzyme that catalyses the transfer of phosphate from ATP to taurocyamine. One member is Smc74, a cercaria-specific enzyme from Schistosoma mansoni. Lombricine kinase, an annelid-specific enzyme that catalyses the transfer of phosphate from ATP to lombricine. Creatine kinase (CK), which catalyses the reversible transfer of high energy phosphate from ATP to creatine, generating phosphocreatine and ADP. Creatine kinase plays an important role in energy metabolism of vertebrates. T…
