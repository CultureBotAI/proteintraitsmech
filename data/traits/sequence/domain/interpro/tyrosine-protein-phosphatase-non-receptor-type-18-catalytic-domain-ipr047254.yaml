identifier: InterPro:IPR047254
label: "Tyrosine-protein phosphatase non-receptor type 18, catalytic domain"
definition: >-
  This entry represents the catalytic domain of PTN18 and similar proteins from vertebrates. This domain blocks lysosomal routing and delays the degradation of HER2 by dephosphorylation. Tyrosine-protein phosphatase non-receptor type 18 (PTPN18) belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs ( ) catalyse the dephosphorylation of phosphotyrosine peptides. PTPN18 regulates HER2-mediated cellular functions through defining both its phosphorylation and ubiquitination states. The C-terminal PEST domain promotes K48-linked HER2 ubiquitination and its destruction via the proteasome pathway.
