identifier: InterPro:IPR063766
label: "Immunoglobulin-like domain, archaea"
definition: >-
  This entry represents an immunoglobulin-like domain found in halophilic archaea, including members of the Haloferacaceae and Haloarculaceae families. Most family members appear to contain this domain as their sole domain. The specific function of this domain remains to be determined.
