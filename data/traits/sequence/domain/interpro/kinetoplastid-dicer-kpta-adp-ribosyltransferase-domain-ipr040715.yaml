identifier: InterPro:IPR040715
label: "Kinetoplastid DICER, KptA ADP-ribosyltransferase domain"
definition: >-
  This is a KptA ADP-ribosyltransferase domain observed in kinetoplastid DICER-like (DCL) enzymes. It appears to have lost most residues required for catalysing phospho-transfer to NAD; however, several positively-charged residues implicated in RNA end recognition remain well-conserved.
