identifier: InterPro:IPR060651
label: "Rho guanine nucleotide exchange factor 40-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal of human Rho guanine nucleotide exchange factor 40 (ARHGEF40), the uncharacterised protein KIAA1755 and similar animal proteins. ARHGEF40 promotes actin stress fibre formation, force-induced stress fibre reinforcement and organisation of KRT8/KRT18 networks via activation of RHOA/ROCK signalling, which is mediated by N terminus KRT18 binding. KIAA1755 is predicted to have guanyl-nucleotide exchange factor activity and to be involved in axon guidance based on sequence analysis. The protein localises to the cytoplasm, plasma membrane and is an extrinsic component of membrane. This domain contains an all-helical fold.
