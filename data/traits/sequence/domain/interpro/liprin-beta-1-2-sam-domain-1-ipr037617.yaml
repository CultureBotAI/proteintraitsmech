identifier: InterPro:IPR037617
label: "Liprin-beta-1/2, SAM domain 1"
definition: >-
  This entry represents the first SAM domain of liprin-beta 1/2. Liprins are a family of scaffold proteins with critical roles in neuronal and cancer biology. They are divided into alpha type (alpha1-alpha4) and beta type (beta1-beta2) subfamilies, characterised by coiled-coil domains for dimerisation and SAM domains for protein interactions. Liprin beta proteins, in contrast to alpha type, lack certain synaptic-specific domains. The N-terminal coiled-coil regions of liprin beta proteins mediate both homodimerisation and heterodimerisation with other liprin family members. The central protease-resistant core of the coiled-coil domain from human liprin beta 2 was structurally characterised and showed parallel homodimer assembly.
