identifier: InterPro:IPR059215
label: "DNA topoisomerase 2-binding protein 1-like, second BRCT domain"
definition: >-
  TopBP1, also termed DNA topoisomerase II-beta-binding protein 1, or DNA topoisomerase II-binding protein 1, functions in DNA replication and damage response. It binds double-stranded DNA breaks and nicks as well as single-stranded DNA. TopBP1 contains six copies of BRCT domain. This entry corresponds to the second BRCT domain.
