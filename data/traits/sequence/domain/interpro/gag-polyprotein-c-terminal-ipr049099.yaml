identifier: InterPro:IPR049099
label: "Gag polyprotein, C-terminal"
definition: >-
  This entry corresponds to the C-terminal region of Gag polyprotein from Spumaviruses, which contains a chromatin binding sequence (CBS) and GR boxes. The Gag polyprotein is a core viral polyprotein that undergoes specific enzymatic cleavages in vivo to yield the mature protein. It is involved in capsid formation and genome binding. Shortly after infection, interaction between incoming particle-associated Gag proteins and host dynein allows centrosomal targeting of the viral genome (associated to Gag), prior to nucleus translocation and integration into host genome.
