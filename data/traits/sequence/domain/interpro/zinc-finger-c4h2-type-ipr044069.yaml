identifier: InterPro:IPR044069
label: "Zinc finger C4H2-type"
definition: >-
  This domain can be found in a conserved family (known as ZC4H2 family) in metazoans. The gene that encodes the human ZC4H2 is located on the X chromosome and has been found to be expressed in various human tissues, particularly fetal brain. ZC4H2 plays an important role during embryonic development of the central and peripheral nervous systems. Alterations of ZC4H2 orthologues in mouse brain and zebrafish affect central nervous system (CNS) embryogenesis, particularly the development and specification of dendritic spines. In humans, defects in ZC4H2 have been found in males affected by severe intellectual disability in variable association with spasticity, hypereflexia and/or pyramidal signs, seizures or CNS abnormalities, muscle weakness, and joint contractures (arthrogryposis multiplex congenital; AMC). The ZC4H2 gene encodes a zinc-finger protein with a C-terminal domain, which includes a putative C4H2 zinc-finger characterised by four cysteine residues and two histidine residues, and a coiled-coil domain. This entry represents the C4H2-type zinc finger domain.
