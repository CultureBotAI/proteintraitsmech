label: "Siroheme synthase, central domain"
definition: >-
  This is the central domain of a multifunctional enzyme which catalyses the biosynthesis of sirohaem. Both of the catalytic activities of this enzyme (precorrin-2 dehydrogenase and sirohydrochlorin ferrochelatase) are located in the N-terminal domain of this enzyme,.
