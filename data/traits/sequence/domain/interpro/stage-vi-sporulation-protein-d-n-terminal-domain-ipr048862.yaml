identifier: InterPro:IPR048862
label: "Stage VI sporulation protein D, N-terminal domain"
definition: >-
  This is the SPOCS (SpoVID-CotE-SipL) domain consisting of a β-strand-rich sandwich fold with long twisted strands found at the N-terminal of Stage VI sporulation protein D (SpoVID) from Bacillus subtilis ( ) and in related proteins primarily found in firmicutes.
