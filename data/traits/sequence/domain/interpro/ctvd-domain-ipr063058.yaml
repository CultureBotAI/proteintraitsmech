identifier: InterPro:IPR063058
label: "CtvD domain"
definition: >-
  This entry represents a membrane-bound terpene cyclase domain found in fungi. The domain is present as a standalone protein in some biosynthetic gene clusters and as the C-terminal domain of FAD-dependent monooxygenases. The prototype protein CtvD from Aspergillus terreus functions as a regioselective hydrolase in the final step of citreoviridin biosynthesis, forming a tetrahydrofuran ring with correct stereochemistry. The domain is characterised by multiple transmembrane helices and belongs to the membrane-bound ascI terpene cyclase family.
