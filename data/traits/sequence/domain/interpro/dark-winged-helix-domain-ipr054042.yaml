identifier: InterPro:IPR054042
label: "Dark, winged-helix domain"
definition: >-
  This entry represents the winged-helix (WH)-like found in Apaf-1/CED-4-related caspase activator Dapaf-1S from Drosophila melanogaster (Dark) and similar Dark (Drosophila Apaf-1-related killer) proteins from insects. Dark protein is part of the apoptosome complex and plays a key role in procaspases activation and apoptosis.
