identifier: InterPro:IPR048428
label: "YobI-like, P-loop NTPase"
definition: >-
  This entry represents a domain found at the N-terminal of uncharacterized membrane protein YobI ( ) and related bacterial proteins. This domain is a P-loop NTPase and probably involved in antiviral immunity in bacteria. Members of this entry have a pair of transmembrane helices inserted into the P-loop NTPase domain.
