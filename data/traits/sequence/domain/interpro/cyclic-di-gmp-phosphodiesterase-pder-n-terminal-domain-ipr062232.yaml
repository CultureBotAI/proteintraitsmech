identifier: InterPro:IPR062232
label: "Cyclic di-GMP phosphodiesterase PdeR, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of cyclic di-GMP phosphodiesterase PdeR, found in bacteria. This enzyme hydrolyses bis-(3'-5') cyclic diguanylic acid (c-di-GMP), a bacterial second messenger involved in biofilm formation and motility regulation.
