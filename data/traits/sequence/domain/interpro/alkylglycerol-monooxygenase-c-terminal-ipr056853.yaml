identifier: InterPro:IPR056853
label: "Alkylglycerol monooxygenase, C-terminal"
definition: >-
  This entry includes Alkylglycerol monooxygenase (AGMO, also known as TMEM195) which is a glyceryl-ether monooxygenase that cleaves the O-alkyl bond of ether lipids. These lipids are essential components of brain membranes. This is the C-terminal domain which may adopt a four helical bundle fold.
