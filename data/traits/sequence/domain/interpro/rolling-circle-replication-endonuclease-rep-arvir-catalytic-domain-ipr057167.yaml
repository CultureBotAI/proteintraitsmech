identifier: InterPro:IPR057167
label: "Rolling-circle replication endonuclease Rep-Arvir, catalytic domain"
definition: >-
  This entry the catalytic domain found at the N-terminal of rolling-circle replication endonucleases (Rep-Arvir), such as ORF19 from temperate pleomorphic virus SNJ2 and it is widespread among viruses and plasmids associated with phylogenetically diverse archaea, including halophiles, methanogens, and hyperthermophiles. This protein is essential for driving autonomous replication. The Rep-Arvir family is distantly related to the bacterial Rep_trans family endonucleases, a relationship not recognisable at the sequence level. This domain contains a conserved catalytic tyrosine, similarly as the Rep_family from bacteria that in SNJ2 ORF19 forms a distinct KHYYM motif. This domain contains a large β sheet composed of 11 β strands with helices packed on the convex face. Following this domain, there is a HTH domain that closely resembles those in MarR family transcriptional regulators and may contribute to DNA binding or structural integrity of the replication complex.
