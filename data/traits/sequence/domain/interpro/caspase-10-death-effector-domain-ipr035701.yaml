identifier: InterPro:IPR035701
label: "Caspase-10, death effector domain"
definition: >-
  Caspase-10 (CASP10) is the initiator of the extrinsic activation pathway. This protein activates Caspase-3, -4, -6, -7, -8, and -9. Activation of executor caspases 3, 6 and 7 leads to apoptosis. Isoform C of human caspase-10 is proteolytically inactive. This entry represents the second repeat of the Death effector domain (DED2) found in CASP10. This domain plays a unique structural role.
