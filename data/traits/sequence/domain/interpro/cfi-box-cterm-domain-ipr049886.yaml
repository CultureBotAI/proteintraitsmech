identifier: InterPro:IPR049886
label: "CFI box-CTERM domain"
definition: >-
  This entry represents the long form of the CFI putative sorting signal, in which the CFI motif occurs at the start of a longer homology domain, named the CFI-box-CTERM domain. The CFI-box motif is a probable protein modification site, first modified on the Cys sidechain and then, most likely cleaved in a manner resembling the CAAX box in eukaryotes. Proteins harbouring this domain are found in prokaryotes. Most members of this group show this domain towards the C-terminal end, while Prepilin-type N-terminal cleavage/methylation domain-containing protein from Desulfatibacillum aliphaticivorans ( ) has the CFI motif as the start of a longer tail region.
