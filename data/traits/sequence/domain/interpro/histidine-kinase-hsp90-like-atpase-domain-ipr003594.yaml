identifier: InterPro:IPR003594
label: "Histidine kinase/HSP90-like ATPase domain"
definition: >-
  This domain is found in several ATP-binding proteins, including: histidine kinase, DNA gyrase B, topoisomerases, heat shock protein HSP90, phytochrome-like ATPases and DNA mismatch repair proteins. The fold of this domain consists of two layers, α/β, which contains an 8-stranded mixed β-sheet.
