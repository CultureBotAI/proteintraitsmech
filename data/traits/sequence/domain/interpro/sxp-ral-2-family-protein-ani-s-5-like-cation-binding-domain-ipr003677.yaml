identifier: InterPro:IPR003677
label: "SXP/RAL-2 family protein Ani s 5-like, cation-binding domain"
definition: >-
  This domain is found in proteins from nematodes, including SXP/RAL-2 family protein Ani s 5 (ANIS5) from Anisakis simplex, and comprises two conserved motifs: SXP1 and SXP2. Although the function of this domain is not clear, structural information from ANIS5 revealed an α helical arrangement with a Calmodulin-like fold. Functional studies indicates that ANIS5 can bind magnesium and calcium, suggesting that this domain plays a role in cation binding. These proteins are interesting targets to develop control strategies against the diseases caused by parasites.
