identifier: InterPro:IPR017733
label: "Type VI secretion system, OmpA-like domain, proteobacteria"
definition: >-
  This entry represents a domain found at the C-terminal end of long forms of TssL, a component of type VI secretion systems (T6SS), although other forms of TssL lack this domain. The domain shares homology with peptidoglycan-associating C-terminal regions of the Gram-negative bacterial outer membrane protein OmpA, the flagellar motor protein MotB, Pal, and other proteins. TssL is related to IcmH/DotU.
