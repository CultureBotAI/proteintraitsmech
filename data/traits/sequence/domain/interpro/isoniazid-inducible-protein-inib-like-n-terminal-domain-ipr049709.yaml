label: "Isoniazid-inducible protein IniB-like, N-terminal domain"
definition: >-
  This entry represents a small domain found N-terminal in a number of low-complexity proteins from Actinomycetes that often bear little or no similarity to each other in a full length, including Isoniazid-induced protein IniB from Mycobacterium tuberculosis ( ).
