identifier: InterPro:IPR048616
label: "Mediator of RNA polymerase II transcription subunit 16 , central helical bridge"
definition: >-
  This entry represents the central helical bridge domain of human Mediator of RNA polymerase II transcription subunit 16 (MED16) and similar proteins from animals. MED16 is one of the subunits of the Tail portion of the Mediator complex and is required for lipopolysaccharide gene-expression.
