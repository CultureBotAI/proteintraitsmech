identifier: InterPro:IPR057306
label: "PelB, C-terminal domain"
definition: >-
  This transmembrane β-barrel domain is found at the C-terminal end of PelB from Pseudomonas aeruginosa and similar proteins from proteobacteria. PelB plays a key role in biofilm formation in this organism.
