identifier: InterPro:IPR063108
label: "Perforin-1, EGF domain"
definition: >-
  This domain is found in human Perforin-1 (PRF1) and similar proteins. PRF1 is a pore-forming protein that plays a key role in granzyme-mediated programmed cell death, and in defence against virus-infected or neoplastic cells. It plays an important role in killing other cells that are recognised as non-self by the immune system. This domain, which is rich in cysteines, is predicted to adopt an EGF fold. EGF domains are thought to perform a structural role.
