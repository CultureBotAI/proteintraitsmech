identifier: InterPro:IPR058807
label: "ScoMcrA-like, N-terminal head domain"
definition: >-
  This entry represents the N-terminal head domain found in the endonuclease ScoMcrA and related type IV restriction enzymes. This domain exhibits substantial positional variance with respect to the other domains of ScoMcrA. It folds into an α/β structure composed of three-stranded antiparallel β-sheet and array of α-helices packed on it. The function of this domain is unknown.
