identifier: InterPro:IPR050048
label: "Trans-2-enoyl-CoA reductase-like, NAD(P)H binding domain"
definition: >-
  This entry represents the N-terminal NAD(P)H binding domain of the enzyme trans-2-enoyl-CoA reductase, . The activity of the enzyme was characterised in Euglena gracilis where an unusual fatty acid synthesis pathway in the mitochondria performs a malonyl-CoA independent synthesis of fatty acids leading to accumulation of wax esters, which serve as the sink for electrons stemming from glycolytic ATP synthesis and pyruvate oxidation. The full enzyme catalyses the reduction of enoyl-CoA to acyl-CoA. The binding site is conserved as GA/CSpGYG, where p is any polar residue.
