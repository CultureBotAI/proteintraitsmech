identifier: InterPro:IPR062434
label: "Predicted GPI-anchored protein 43 domain"
definition: >-
  This entry represents a conserved all-helical domain found in GPI-anchored proteins, exemplified by PGA43 from Candida albicans. The domain is approximately 60-70 amino acids in length and is found in predicted GPI-anchored proteins and extracellular membrane proteins. These proteins are typically localised to the cell membrane via a GPI anchor and may contain multiple N-linked glycosylation sites. The domain is found in fungal species and represents a structural component of GPI-anchored cell surface proteins. The specific function of this domain remains to be determined.
