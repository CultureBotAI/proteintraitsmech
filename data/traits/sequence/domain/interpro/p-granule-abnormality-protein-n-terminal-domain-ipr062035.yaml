identifier: InterPro:IPR062035
label: "P granule abnormality protein, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of P granule abnormality proteins found in Caenorhabditis species. The full-length proteins are guanyl-specific endoribonucleases that localise to P granules and are essential for germline development. The family includes PGL-1, PGL-2 and PGL-3 proteins which function redundantly in P granule assembly and germline development. The specific function of this N-terminal domain remains to be determined.
