identifier: InterPro:IPR045494
label: "Domain of unknown function DUF6436"
definition: >-
  This domain of unknown function is found in uncharacterised bacterial proteins. This domain is about 60 amino acids in length and contains the conserved motifs GPY, GxxC and GCxC. These conserved cysteine residues and the fact that this domain has overlaps with families in Pfam clan CL0172 suggest that proteins containing this domain are related to thioredoxins and are likely to be thiol-disulfide isomerases.
