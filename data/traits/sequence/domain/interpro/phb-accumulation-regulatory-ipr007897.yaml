identifier: InterPro:IPR007897
label: "PHB accumulation regulatory"
definition: >-
  The proteins this domain is found in are typically involved in regulating polymer accumulation in bacteria, for example the production of poly-beta-hydroxybutyrate (PHB) which is formed via the polymerisation of D(-)-3-hydroxybutyryl-CoA. The function of this domain is unknown.
