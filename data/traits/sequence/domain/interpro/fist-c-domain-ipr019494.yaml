identifier: InterPro:IPR019494
label: "FIST, C-domain"
definition: >-
  This entry represents a novel sensory domain, designated FIST_C (short for F-box and intracellular signal transduction, C-terminal), which is present in signal transduction proteins from bacteria, archaea and eukaryotes. The chromosomal proximity of FIST-encoding genes to those coding for proteins involved in amino acid metabolism and transport suggest that FIST domains bind small ligands, such as amino acids.
