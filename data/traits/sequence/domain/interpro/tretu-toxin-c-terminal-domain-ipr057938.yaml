identifier: InterPro:IPR057938
label: "TreTu toxin, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of TreTu from Salmonella enterica and related bacterial proteins. TreTu is a part of the TreTu/TriTu toxin/antitoxin system and is involved in the ADP-ribosylation of the EF-Tu GTP-bound form. The C-terminal domain of TreTu adopts a typical ADP-ribosyltransferase fold. The TreTu activity is neutralised by TriTu immunity protein which acts like a lid that closes the TreTu catalytic site and traps the NAD+.
