identifier: InterPro:IPR049523
label: "HMG box transcription factor BBX, HMG-box domain"
definition: >-
  This entry represents a HMG box domain found in human HMG box transcription factor BBX and similar sequences predominantly found in vertebrates. BBX, also called HBP2 or Bobby sox homolog, is a transcription factor that is necessary for cell cycle progression from the G1 to S phase.
