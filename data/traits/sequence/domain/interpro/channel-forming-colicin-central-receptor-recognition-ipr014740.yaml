identifier: InterPro:IPR014740
label: Channel forming colicin, central receptor recognition
definition: >-
  Colicins are plasmid-encoded polypeptide toxins produced by and active against Escherichia coli and closely related bacteria. Colicins are released into the environment to reduce competition from other bacterial strains. Colicins bind to outer membrane receptors, using them to translocate to the cytoplasm or cytoplasmic membrane, where they exert their cytotoxic effect, including depolarisation of the cytoplasmic membrane, DNase activity, RNase activity, or inhibition of murein synthesis. Channel-forming colicins (colicins A, B, E1, Ia, Ib, and N) are transmembrane proteins that depolarize the cytoplasmic membrane, leading to dissipation of cellular energy. These colicins contain at least three domains: an N-terminal translocation domain responsible for movement across the outer membrane and periplasmic space; a central domain responsible for receptor recognition; and a C-terminal cytotoxic domain responsible for channel formation in the cytoplasmic membrane. This entry represents the central receptor recognition domain, which has an α/β two-layer sandwich structure.
