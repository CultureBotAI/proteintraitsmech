identifier: InterPro:IPR064000
label: "YIPF3, C-terminal domain"
definition: >-
  This entry represents the multi-pass transmembrane domain of protein YIPF3. YIPF3 is involved in the maintenance of Golgi structure and may play a role in hematopoiesis. It localises to the cis-Golgi network membrane and interacts with YIPF4 and YIPF5.
