identifier: InterPro:IPR024973
label: "ESPR domain"
definition: >-
  This conserved domain is called ESPR for Extended Signal Peptide Region. It is present at the N terminus of the signal peptides of proteins belonging to the Type V secretion systems, including the autotransporters (T5aSS), TpsA exoproteins of the two-partner system (T5bSS) and trimeric autotransporters (TAAs). ESPR severely impairs inner membrane translocation, suggesting that it adopts a particular conformation or it interacts with a cytoplasmic or inner membrane co-factor, prior to exportation. Deletion of ESPR causes mis-folding of the TAAs passenger domain in the periplasm , substantially impairing its translocation across the outer membrane.
