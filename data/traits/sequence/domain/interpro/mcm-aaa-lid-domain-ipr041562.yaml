identifier: InterPro:IPR041562
label: "MCM, AAA-lid domain"
definition: >-
  This entry represents the AAA-lid domain found in MCM proteins. MCM proteins are DNA-dependent ATPases required for the initiation of eukaryotic DNA replication. In eukaryotes there is a family of six proteins, MCM2 to MCM7. They were first identified in yeast where most of them have a direct role in the initiation of chromosomal DNA replication by interacting directly with autonomously replicating sequences (ARS). They were thus called minichromosome maintenance proteins, MCM proteins.
