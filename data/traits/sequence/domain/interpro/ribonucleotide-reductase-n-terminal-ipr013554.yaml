identifier: InterPro:IPR013554
label: "Ribonucleotide reductase N-terminal"
definition: >-
  This domain is found at the N terminus of bacterial ribonucleoside-diphosphate reductases (ribonucleotide reductases, RNRs) which catalyse the formation of deoxyribonucleotides. It occurs together with the RNR all-alpha domain and the RNR barrel domain.
