identifier: InterPro:IPR046447
label: "DENR, C-terminal domain"
definition: >-
  This entry includes translation machinery-associated protein 22 (Tma22) from yeasts and density-regulated protein (DENR) from animals. DENR may be involved in the translation of target mRNAs by scanning and recognition of the initiation codon. DENR and MCT-1 form a heterodimer, which binds to the ribosome and is involved in unconventional translation initiation, reinitiation, and recycling. This entry represents the C-terminal domain, which shows an eIF1-like fold (SUI1 in yeast). It is structurally similar to the canonical translation initiation factor eIF1, essential for initiation codon selection and scanning. It is involved in RNA binding.
