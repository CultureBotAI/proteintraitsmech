identifier: InterPro:IPR020051
label: "SagB-type dehydrogenase domain"
definition: >-
  SagB of Streptococcus pyogenes participates in the maturation of streptolysin S from a ribosomally produced precursor polypeptide. Chemically similar systems operate on highly diverse sets of bacteriocin precursors in numerous other bacteria. This entry represents a domain found within SgaB and other proteins, many of which appear to be involved in biosynthesis of secondary metabolites. While some substrates may be intermediates in non-ribosomal peptide syntheses, others are involved in heterocycle-containing bacteriocin biosynthesis, and can be found near SgaC-like (see , cyclodehydratase) and SgaD-like (see ) "docking" proteins. In many cases a partial second copy of the domain is present, though it is not always detected by this entry.
