identifier: InterPro:IPR019497
label: "Sorting nexin protein, WASP-binding domain"
definition: >-
  The C-terminal region of the Sorting nexin group of proteins appears to carry a BAR-like (Bin/amphiphysin/Rvs) domain. This domain is very diverse and the similarities with other BAR domains are few. In the Sorting nexins it is associated with , and in combination with PX appears to be necessary to bind WASP along with p85 to form a multimeric signalling complex.
