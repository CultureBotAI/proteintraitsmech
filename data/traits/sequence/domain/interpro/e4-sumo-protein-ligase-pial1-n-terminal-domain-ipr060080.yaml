identifier: InterPro:IPR060080
label: "E4 SUMO-protein ligase PIAL1, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of E4 SUMO-protein ligase PIAL1 and similar plant proteins. PIAL1 regulates transcriptional gene silencing (TGS) independently of changes in DNA methylation together with MOM1 and PIAL2. It contributes to a pathway for proteolytic removal of sumoylation substrates and is involved in stress responses and sulfur metabolism. This domain is predicted to adopt an all-α configuration.
