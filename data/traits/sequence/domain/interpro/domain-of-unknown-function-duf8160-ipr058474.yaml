identifier: InterPro:IPR058474
label: "Domain of unknown function DUF8160"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in archaea. The domain is found in proteins from various archaeal species, including members of the Haloferacaceae, Haloarculaceae, and Natrialbaceae families. The proteins containing this domain are typically found in halophilic archaea, which are adapted to high-salt environments. The proteins are most conserved towards their C terminus where they contain the motif RHFYPL which may be functionally important.
