identifier: InterPro:IPR024996
label: "pPIWI_RE, RNaseH domain"
definition: >-
  This entry represents the RNaseH domain of the pPIWI_RE PIWI/Argonaute module. pPIWI_RE is found in a conserved three-gene island that also contains a DinG-type helicase and an REase nuclease. This three gene island is predicted to form a conflict system which targets R-loop formation of invasive plasmids during plasmid replication.
