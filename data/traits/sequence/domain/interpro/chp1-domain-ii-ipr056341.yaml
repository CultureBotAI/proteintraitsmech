identifier: InterPro:IPR056341
label: "Chp1, domain II"
definition: >-
  Chp1 is required for RNA interference-dependent heterochromatin formation in fission yeast, and it is a member of the RNA-induced transcriptional silencing (RITS) complex which maintains the heterochromatin regions, playing a role in stabilising microtubules which allows accurate chromosome segregation. This entry represents the second domain (domain II) of Chp1 which resembles eukaryotic phosphatases and receiver domains of bacterial phosphotransferase signalling systems, being part of the Rossmann fold superfamily. This domain makes the interaction surface between Chp1 and Tas3. Chp1 and Tas3 complex solid and versatile platform to recruit both RNAi-dependent and RNAi-independent gene-silencing pathways for locus-specific regulation of heterochromatin.
