identifier: InterPro:IPR055426
label: "Trafficking protein particle complex II-specific subunit 65, IgD2"
definition: >-
  This entry represents the IgD2 domain of Trs65 and similar proteins from Saccharomycetales. This entry includes Trafficking protein particle complex II-specific subunit 65 from Saccharomyces cerevisiae (Trp65), an essential subunit of the TRAPP Golgi trafficking complex. TRAPP subunits are found in three forms-core TRAPP/TRAPPI, TRAPPII, and TRAPPIII and they function in various vesicle trafficking pathways. TRAPPI mediates transport from endoplasmic reticulum to cis-Golgi by tethering COPII-coated vesicles; TRAPPII interacts with COPI-coated vesicles in mammalian cells and aids in endosome-to-Golgi transport, and TRAPPIII plays a unique role in autophagy. TRAPP complexes act as GEFs and play an essential role in catalysing nucleotide exchange for Ypt/Rab GTPase. The three complexes share a core of six different proteins (Bet3, Bet5, Trs20, Trs23, Trs31, and Trs33) that make up core TRAPPI. TRAPPII contains four additional proteins (Trs120, Trs130, Trs65, and Tca17), and TRAPPIII has one additional Trs85 in yeast. While Trp65 has been implicated in cell wall biogenesis and stress response, the role of Trs65 in TRAPPII is supported by the findings that the protein co-localises with Trs130p, and deletion of Trs65 in yeast leads to a conditional lethal phenotype if either one of the other TRAPPII-specific subunits is modified. Trs65 is essential to the formation of TRAPPII dimer and consists of three Ig-like domains (IgD1, IgD2 and IgD3).
