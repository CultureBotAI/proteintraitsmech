identifier: InterPro:IPR011522
label: "Thiamin/hydroxymethyl pyrimidine-binding YkoF, putative"
definition: >-
  This entry represents YkoF-related proteins. YkoF is involved in the hydroxymethyl pyrimidine (HMP) salvage pathway. The domain is found in pairs in these proteins.
