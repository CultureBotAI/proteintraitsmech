identifier: InterPro:IPR014338
label: "Uncharacterised domain CHP02996, repeat-companion domain"
definition: >-
  This entry is found in Myxococcus xanthus (strain DK 1622). Most member proteins have extensive repeats similar to the leucine-rich repeat, or another repeat class or a region of low-complexity sequence. This domain is not repeated, and is usually adjacent to the WGR domain.
