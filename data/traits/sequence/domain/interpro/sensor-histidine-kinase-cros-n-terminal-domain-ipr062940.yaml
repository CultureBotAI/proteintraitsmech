label: "Sensor histidine kinase CroS, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of a group of histidine kinases from firmicutes, including CroS from Enterococcus faecalis, a member of the two-component regulatory system CroR/CroS. This domain is found associated with , and . It is predicted to show an α-helical configuration.
