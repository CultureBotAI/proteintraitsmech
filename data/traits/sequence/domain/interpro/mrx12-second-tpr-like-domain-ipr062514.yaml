identifier: InterPro:IPR062514
label: "MRX12, second TPR-like domain"
definition: >-
  This entry represents the second tetratricopeptide (TPR)-like repeats region of MRX12 proteins found in fungi. MRX12 is a component of MIOREX complexes, which are large expressome-like assemblies of ribosomes with factors involved in all steps of post-transcriptional gene expression in mitochondria. The full-length MRX12 protein associates with the mitochondrial ribosome and localises to mitochondria via an N-terminal transit peptide.
