identifier: InterPro:IPR058852
label: "Winged helix-turn-helix domain 77"
definition: >-
  This entry represents a winged helix-turn-helix domain found in a range of bacterial proteins. These domains are often but not always involved in binding to DNA. Many proteins in this family include a P-loop domain.
