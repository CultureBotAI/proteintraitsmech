identifier: InterPro:IPR010713
label: Xyloglucan endo-transglycosylase, C-terminal
definition: >-
  This entry represents the C terminus (approximately 60 residues) of plant xyloglucan endo-transglycosylases (XET). Xyloglucan is the predominant hemicellulose in the cell walls of most dicotyledons. With cellulose, it forms a network that strengthens the cell wall. XET catalyses the splitting of xyloglucan chains and the linking of the newly generated reducing end to the non-reducing end of another xyloglucan chain, thereby loosening the cell wall.
