identifier: InterPro:IPR047379
label: "Tudor domain-containing protein 3, Tudor domain"
definition: >-
  This entry represents the Tudor domain of TDRD3 and similar proteins from animals. TDRD3 is a scaffolding protein that specifically recognises and binds dimethylarginine-containing proteins. In the nucleus, it acts as a coactivator; it recognizes and binds asymmetric dimethylation on the core histone tails associated with transcriptional activation (H3R17me2a and H4R3me2a) and recruits proteins at these arginine-methylated loci. In the cytoplasm, it may play a role in the assembly and/or disassembly of mRNA stress granules and in the regulation of translation of target mRNAs by binding Arg/Gly-rich motifs (GAR) in dimethylarginine-containing proteins ]. TDRD3 can interact with methylated RNA-binding proteins, such as fragile X messenger ribonucleoprotein 1 (FMRP) and DEAD/H box-3 (also known as DDX3X/Y, DBX/Y, HLP2 and DDX14) which is implicated in human genetic diseases. At this point, TDRD3 may play a central role in RNA processing regulatory pathways involving arginine methylation. TDRD3 contains a Tudor domain, a DUF/OB-fold motif and a ubiquitin-associated (UBA) domain.
