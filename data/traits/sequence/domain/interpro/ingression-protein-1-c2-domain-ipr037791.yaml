identifier: InterPro:IPR037791
label: "Ingression protein 1, C2 domain"
definition: >-
  Saccharomyces cerevisiae Inn1 associates with the contractile actomyosin ring at the end of mitosis and is needed for cytokinesis. The C2 domain of Inn1, located at the N terminus, is required for ingression of the plasma membrane. The C terminus is relatively unstructured and contains eight PXXP motifs that are thought to mediate interaction of Inn1 with SH3 domains in the cytokinesis proteins Hof1 (an F-BAR protein) and Cyk3 (whose overexpression can restore primary septum formation in Inn1Delta cells) as well as recruiting Inn1 to the bud-neck by binding to Cyk3.
