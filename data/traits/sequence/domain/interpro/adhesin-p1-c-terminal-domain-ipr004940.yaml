identifier: InterPro:IPR004940
label: "Adhesin P1, C-terminal domain"
definition: >-
  This entry represents a domain found towards the C-terminal of adhesins from Mycoplasmas, such as adhesin P1, first identified as the major determinant for cytoadherence and gliding motility in M. pneumoniae. P1 forms a transmembrane adhesion complex with P40/P90, called 'Nap', which mediates motility and infectivity in these organisms. The C-terminal domain is smaller than the large N-terminal domain, which is highly variable ( ). It is followed by a transmembrane domain and acts as a stalk connecting the large N-terminal domain with the outer surface of the cell membranes. The C-terminal domain, mostly conserved, acts as a stalk connecting the large N-terminal domain with the outer surface of the cell membranes.
