identifier: InterPro:IPR062459
label: "Type IIS restriction enzyme MboII, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of type IIS restriction enzyme MboII (also called MboIIR), found in Helicobacter species and Campylobacter jejuni. Type IIS restriction enzymes recognise asymmetric DNA sequences and cleave at defined distances outside their recognition sites. MboIIR is encoded by HP1366 in Helicobacter pylori and is part of restriction-modification systems. This domain is found in proteins across Campylobacterota.
