identifier: InterPro:IPR053935
label: "Vitamin K-dependent gamma-carboxylase, lumenal domain"
definition: >-
  Using reduced vitamin K, oxygen, and carbon dioxide, gamma-glutamyl carboxylase (VKGC) post-translationally modifies certain glutamates by adding carbon dioxide to the gamma position of those amino acids. In vertebrates, the modification of glutamate residues of target proteins is facilitated by an interaction between a propeptide present on target proteins and the gamma-glutamyl carboxylase. This entry represents the lumenal domain found in animals and bacteria. This domain is associated with the HTTM domain.
