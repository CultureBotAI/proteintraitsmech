identifier: InterPro:IPR049034
label: "SPI-1 type 3 secretion system secretin, N0 domain"
definition: >-
  SPI-1 type 3 secretion system secretin forms a ring-shaped multimeric structure which is used to inject bacterial effector proteins into eukaryotic host cells. It consists of several N-terminal short domains and a C-terminal secretin domain. This entry represents the N-terminal N0 domain.
