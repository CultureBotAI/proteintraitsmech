identifier: InterPro:IPR032384
label: "Kinesin-like protein Kif23, Arf6-interacting domain"
definition: >-
  This entry represents a C-terminal region of kinesin-like protein Kif23 (also known as MKLP1) that is necessary for the interaction with the small GTPase Arf6. MKLP1 is a Flemming body-localising protein essential for cytokinesis. The Arf6-MKLP1 complex plays a crucial role in cytokinesis by connecting the microtubule bundle and membranes at the cleavage plane.
