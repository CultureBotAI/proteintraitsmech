identifier: InterPro:IPR035788
label: "Rho guanine nucleotide exchange factor 6, SH3 domain"
definition: >-
  Alpha-PIX, also called Rho guanine nucleotide exchange factor 6 (ARHGEF6) or Cool (Cloned out of Library)-2, activates small GTPases by exchanging bound GDP for free GTP. It acts as a GEF for both Cdc42 and Rac1, and is localized in dendritic spines where it regulates spine morphogenesis. It controls dendritic length and spine density in the hippocampus. Mutations in the ARHGEF6 gene cause X-linked intellectual disability in humans.
