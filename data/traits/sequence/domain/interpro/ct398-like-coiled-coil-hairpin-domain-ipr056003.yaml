identifier: InterPro:IPR056003
label: "CT398-like coiled coil hairpin domain"
definition: >-
  This entry, previously known as DUF7581, represents a coiled coil hairpin domain found N-terminal in CT398 from C. trachomatis, MSMEG_4306 M. smegmatis and related bacterial sequences predominantly from actinobacteria. Both CT398 and MSMEG_4306 proteins have been structurally characterised. CT398 protein is involved in several aspects of chlamydial biology and pathogenesis, and is capable of interacting with multiple binding partners. The coiled coil hairpin domain of CT398 engages in interaction with RpoN as well as both T3SS ATPase-regulators FliH and CdsL.
