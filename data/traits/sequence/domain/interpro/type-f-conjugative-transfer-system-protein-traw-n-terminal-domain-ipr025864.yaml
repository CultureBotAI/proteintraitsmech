identifier: InterPro:IPR025864
label: "Type-F conjugative transfer system protein TraW, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of TraW, an essential component of the F-type conjugative transfer system for plasmid DNA transfer. There is a single completely conserved residue G that may be functionally important.
