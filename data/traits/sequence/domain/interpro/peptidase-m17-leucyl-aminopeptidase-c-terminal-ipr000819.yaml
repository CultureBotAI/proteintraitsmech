identifier: InterPro:IPR000819
label: Peptidase M17, leucyl aminopeptidase, C-terminal
definition: >-
  This domain is found in a group of metallopeptidases that belong to the MEROPS peptidase family M17 (leucyl aminopeptidase family, clan MF), including leucyl aminopeptidase, also known as Cytosol aminopeptidase from mammals. Aminopeptidases are exopeptidases involved in the processing and regular turnover of intracellular proteins, although their precise role in cellular metabolism is unclear. Leucine aminopeptidases cleave leucine residues from the N-terminal of polypeptide chains, but substantial rates are evident for all amino acids. The enzymes exist as homo-hexamers, comprising 2 trimers stacked on top of one another. Each monomer binds 2 zinc ions and folds into 2 α/β-type quasi-spherical globular domains, producing a comma-like shape. The N-terminal 150 residues form a 5-stranded β-sheet with 4 parallel and 1 anti-parallel strand sandwiched between 4 α-helices. An α-helix extends into the C-terminal domain, which comprises a central 8-stranded saddle-shaped β-sheet sandwiched between groups of helices, forming the monomer hydrophobic core. A 3-stranded β-sheet resides on the surface of the monomer, where it interacts with other members of the hexamer. The 2 zinc ions and the active site are entirely located in the C-terminal catalytic domain. This entry also includes Crystallomitin S-Lap1-8 from Drosophila melanogaster, which is a structural component of the paracrystalline material found in the major mitochondrial derivative of male germ cells. Although these proteins belong to the peptidase M17 family, they lack the active site Lys and Arg residues and zinc binding sites, suggesting they have no aminopeptidase activity. Over 70 metallopeptidase families have been identified to date. In these enzymes a divalent cation, which is usually zinc but may be cobalt, m…
