identifier: InterPro:IPR044440
label: "Plant glutamate receptor, periplasmic ligand-binding domain"
definition: >-
  This entry represents the periplasmic ligand-binding domain of plant glutamate receptors, which have sequence similarity with animal ionotropic glutamate receptor. Interestingly, despite sharing a common structure, GLRs and iGluRs display major sequence divergences, especially in key domains such as the receptor, the pore, and the 'gate'. Electrophysiological characterisation of PpGLR1, AtGLR3.2, and AtGLR3.3 showed their ligand-independent activity, providing evidence for functional differences between iGluRs and at least these specific GLRs. Animal ionotropic glutamate receptors (iGluRs) function in the nervous system, while plant glutamate receptor-like (GLR) homologues are involved in many plant-specific physiological functions, such as sperm signaling in moss, pollen tube growth, root meristem proliferation, innate immune and wound responses.
