identifier: InterPro:IPR047047
label: "Glutathione S-transferases Omega-like, C-terminal"
definition: >-
  This entry represents the C-terminal domain of Saccharomyces cerevisiae glutathione S-transferase (GST) Omega-like subfamily, which is composed of three Saccharomyces cerevisiae GST omega-like (Gto) proteins, Gto1p, Gto2p (also known as Extracellular mutant protein 4 or ECM4p), and Gto3p. This domain is also found in glutathionyl-hydroquinone reductases YqjG and PcpF from bacteria which are closely related to the Omega-class of GSTs. The three Saccharomyces cerevisiae Gto proteins are omega-class GSTs with low or no GST activity against standard substrates, but have glutaredoxin/thiol oxidoreductase and dehydroascorbate reductase activity through a single cysteine residue in the active site. Gto1p is located in the peroxisomes while Gto2p and Gto3p are cytosolic. The gene encoding Gto2p, called ECM4, is involved in cell surface biosynthesis and architecture. S. cerevisiae ECM4 mutants show increased amounts of the cell wall hexose, N-acetylglucosamine. More recently, global gene expression analysis shows that ECM4 is upregulated during genotoxic conditions and together with the expression profiles of 18 other genes could potentially differentiate between genotoxic and cytotoxic insults in yeast.
