identifier: InterPro:IPR047251
label: "Protein-tyrosine phosphatase non-receptor type-12, catalytic domain"
definition: >-
  This entry represents the catalytic domain of PTN12. Tyrosine-protein phosphatase non-receptor type 12 (PTPN12) belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs ( ) catalyse the dephosphorylation of phosphotyrosine peptides. PTPN12 is characterised as a tumour suppressor and a pivotal regulator of EGFR/HER2 signalling. It regulates various physiological processes, including cell migration, immune response, and neuronal activity, by dephosphorylating multiple substrates including HER2, FAK, PYK2, PSTPIP, WASP, p130Cas, paxillin, Shc, catenin, c-Abl, ArgBP2, p190RhoGAP, RhoGDI, cell adhesion kinase beta, and Rho GTPase.
