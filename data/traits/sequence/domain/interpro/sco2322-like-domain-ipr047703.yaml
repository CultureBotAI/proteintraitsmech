identifier: InterPro:IPR047703
label: "SCO2322-like domain"
definition: >-
  This entry represents a domain is found in a number of uncharacterised proteins from actinomycetes. It is predicted to have a circularly permuted ubiquitin-like fold. In some instances, this domain is followed by the GPS-CTERM domain ( ).
