identifier: InterPro:IPR013685
label: "POTRA domain, FtsQ-type"
definition: >-
  FtsQ/DivIB bacterial division proteins ( ) contain an N-terminal POTRA domain (for polypeptide-transport-associated domain). This is found in different types of proteins, usually associated with a transmembrane β-barrel. FtsQ/DivIB may have chaperone-like roles, which has also been postulated for the POTRA domain in other contexts.
