identifier: InterPro:IPR058982
label: "AprE-like, beta-barrel domain"
definition: >-
  This domain is found in the Alkaline protease secretion protein AprE from Pseudomonas aeruginosa and related bacterial proteins, including Type I secretion system membrane fusion protein PrsE from Rhizobium meliloti. AprE is involved in the secretion of alkaline protease while PrsE mediates secretion of glycanase ExsH. The domain represented by this entry folds into a six-stranded closed β-barrel with a greek-key topology which has a structural similarity to the C-terminal domain of alanine racemase. This domain is interrupted by the barrel-sandwich hybrid domain which is inserted after the first β-strand of the barrel. This model does not include the N-terminal strand.
