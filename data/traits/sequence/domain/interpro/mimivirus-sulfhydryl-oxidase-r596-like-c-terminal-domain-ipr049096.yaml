identifier: InterPro:IPR049096
label: "Mimivirus sulfhydryl oxidase R596-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of the FAD-linked sulfhydryl oxidase R596 from Acanthamoeba polyphaga mimivirus (APMV) and similar proteins predominantly found in giant viruses. This protein is a member of the Erv family of sulfhydryl oxidases. This domain folds into six α-helices forming a compact domain.
