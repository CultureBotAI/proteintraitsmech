identifier: InterPro:IPR007131
label: SLA1 homology domain 1, SHD1
definition: >-
  The SLA1 homology domain (SHD1) is found in the cytoskeleton assembly control protein SLA1, which is responsible for the correct formation of the actin cytoskeleton. SHD1 is responsible for recognition of the NPFxD internalisation signal found in the cytoplasmic domains of transmembrane proteins.
