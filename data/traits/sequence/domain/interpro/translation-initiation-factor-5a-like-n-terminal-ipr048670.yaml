identifier: InterPro:IPR048670
label: "Translation initiation factor 5A-like, N-terminal"
definition: >-
  This entry represents the N-terminal domain of Translation initiation factor 5A from eukaryotes and archaea, which has an SH3-like fold. These proteins are involved in translation elongation and eIF5A is specifically required to promote peptide-bond formation between consecutive proline residues. This entry also includes Woronin body major protein Hex1, which is similar to eIF5A.
