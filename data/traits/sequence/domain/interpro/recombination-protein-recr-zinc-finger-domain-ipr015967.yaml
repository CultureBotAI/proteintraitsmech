identifier: InterPro:IPR015967
label: Recombination protein RecR, zinc finger domain
definition: >-
  This conserved site represents the C4-type zinc finger which contains four strictly conserved cysteine residues that coordinates a zinc ion. Mutations in this domain affects bacterial survival suggesting that it plays an important role, likely in DNA binding. The bacterial protein RecR is an important regulator in the RecFOR homologous recombination pathway during DNA repair. It acts with RecF and RecO forming a complex that facilitates the loading of RecA onto ssDNA. RecR is a zinc metalloprotein consisting of a N-terminal helix-hairpin-helix (HhH) motif, a middle region containing a zinc finger motif and a Toprim domain, and a C-terminal domain comprising a divergent Walker B motif and a C-terminal helix.
