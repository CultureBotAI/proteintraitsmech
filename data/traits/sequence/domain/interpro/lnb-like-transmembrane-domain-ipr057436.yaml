identifier: InterPro:IPR057436
label: "Lnb-like, transmembrane domain"
definition: >-
  This domain is found C-terminal in Lipoprotein N-acyltransferase Lnb from Bacteroides and related uncharacterised bacterial proteins. Lnb functions as a lipoprotein N-acyltransferase in its native cell environment. It is composed of two domains, N-terminal periplasmic domain and C-terminal α-helical transmembrane domain (this entry) which is predicted to contain five transmembrane helices. This domain is often found associated with .
