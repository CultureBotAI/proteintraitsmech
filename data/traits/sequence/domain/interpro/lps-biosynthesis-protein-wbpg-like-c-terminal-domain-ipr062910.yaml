identifier: InterPro:IPR062910
label: "LPS biosynthesis protein WbpG-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of WbpG-like lipopolysaccharide biosynthesis proteins and related N-acetyl sugar amidotransferases. In the archaeon Methanococcus maripaludis, the homologue MMP1081 (AglX, ) is involved in acetamidino group modification of the archaellin N-linked glycan. MMP1081 acts as an amidotransferase that modifies the third sugar residue, receiving ammonia generated by MMP1082 and tunnelled through MMP1083. In bacteria, related proteins are annotated as LPS biosynthesis proteins and are involved in O-antigen and glycan biosynthesis. In Rhizobium leguminosarum, the homologue RL0818 is essential for root colonisation. The specific function of this domain remains to be determined.
