identifier: InterPro:IPR046330
label: "DEAD box protein 17, ATP-binding domain"
definition: >-
  This entry represents the ATP-binding domain of DEAD box protein 17 (DDX17, also known as p72) found in chordates. This protein is a member of the DEAD-box helicase family, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. DDX17 has a wide variety of functions including regulating the alternative splicing of exons exhibiting specific features such as the inclusion of AC-rich alternative exons in CD44 transcripts, playing a role in innate immunity, and promoting mRNA degradation mediated by the antiviral zinc-finger protein ZC3HAV1 in an ATPase-dependent manner.
