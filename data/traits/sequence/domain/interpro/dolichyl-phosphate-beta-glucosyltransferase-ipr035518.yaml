identifier: InterPro:IPR035518
label: "Dolichyl-phosphate beta-glucosyltransferase"
definition: >-
  UDP-glucose:dolichyl-phosphate glucosyltransferase (DolP-glucosyltransferase, DPG synthase) is a transmembrane-bound enzyme of the endoplasmic reticulum involved in protein N-linked glycosylation. This enzyme catalyzes the transfer of glucose from UDP-glucose to dolichyl phosphate.
