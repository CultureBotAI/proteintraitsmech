identifier: InterPro:IPR010801
label: Fibronectin-attachment
definition: >-
  This family contains bacterial fibronectin-attachment proteins (FAP) which are rich in alanine and proline and seem to be restricted to mycobacteria. These proteins contain a fibronectin-binding motif that allows mycobacteria to bind to fibronectin in the extracellular matrix.
