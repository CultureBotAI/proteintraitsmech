identifier: InterPro:IPR060726
label: "Transmembrane cell adhesion receptor mua-3-like, EGF-like domain"
definition: >-
  This EGF-like domain is found in Transmembrane cell adhesion receptor mua-3 from Caenorhabditis elegans, which is involved in cell adhesion and required for organ positioning and attachment. This entry includes Transmembrane matrix receptor MUP-4.
