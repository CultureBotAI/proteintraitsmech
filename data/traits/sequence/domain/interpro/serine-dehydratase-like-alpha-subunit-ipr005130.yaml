identifier: InterPro:IPR005130
label: "Serine dehydratase-like, alpha subunit"
definition: >-
  L-serine dehydratase is found as a heterodimer of alpha and beta chain or as a fusion of the two chains in a single protein. This enzyme catalyses the deamination of serine to form pyruvate. This enzyme is part of the gluconeogenesis pathway. This entry also describes a number of proteins with no known function. Members included in this entry adopt an all-helical structure.
