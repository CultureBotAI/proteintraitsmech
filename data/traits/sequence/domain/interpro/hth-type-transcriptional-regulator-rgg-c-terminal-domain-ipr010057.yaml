identifier: InterPro:IPR010057
label: "HTH-type transcriptional regulator Rgg, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of HTH-type transcriptional regulator Rgg (also called RopB) from Streptococcus gordonii, and similar proteins predominantly found in Firmicutes. Rgg is a peptide pheromone receptor that directly binds pheromones transported to the cytosol. The large C-terminal repeat domain contains five HTH folds and a capping helix that form a right-handed superhelical structure, resembling a TPR domain superhelix. This domain is found associated with the N-terminal helix-turn-helix DNA-binding domain .
