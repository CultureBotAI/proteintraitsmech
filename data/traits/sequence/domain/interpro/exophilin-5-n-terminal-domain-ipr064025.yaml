identifier: InterPro:IPR064025
label: "Exophilin-5, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of exophilin-5, also known as synaptotagmin-like protein homolog lacking C2 domains b (SlaC2-b). This domain corresponds to the Rab-binding domain (RabBD) found at residues 7-63 in human exophilin-5. Exophilin-5 may act as a Rab effector protein and play a role in vesicle trafficking. The protein interacts with RAB27A through this N-terminal region. Mutations in EXPH5 cause epidermolysis bullosa simplex 4, characterised by skin fragility and blistering. The protein is expressed in keratinocytes and the domain spans approximately 91 amino acids in length.
