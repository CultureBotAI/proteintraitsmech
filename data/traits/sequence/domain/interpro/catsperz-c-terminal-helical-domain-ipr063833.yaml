identifier: InterPro:IPR063833
label: "CATSPERZ, C-terminal helical domain"
definition: >-
  This entry represents the C-terminal helical domain found in CATSPERZ (CatSper-zeta), an auxiliary subunit of the CatSper calcium channel complex. This domain consists of two α-helices and is located at the C-terminal region of the protein. CATSPERZ is an essential component of the CatSpermasome complex involved in sperm cell hyperactivation and calcium signalling. The protein is specifically localised to the flagellar membrane of sperm and is required for the proper distribution of CatSper complex nanodomains along the flagellum. Together with EFCAB9, CATSPERZ associates with the CatSper channel pore and is essential for maintaining the structural continuity of sperm calcium signalling domains. The helical domain plays a role in protein-protein interactions within the complex and is found exclusively in mammals. Mutations affecting this domain result in male subfertility due to disrupted sperm motility.
