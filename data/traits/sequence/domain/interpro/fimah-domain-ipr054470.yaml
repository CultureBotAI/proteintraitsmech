identifier: InterPro:IPR054470
label: "FIMAH domain"
definition: >-
  This entry represents a small α-helical bundle domain found in a group of prokaryotic proteins with a large range of different domain architectures, including Alpha-1,2-mannosidase from Neobacillus novalis. The proteins containing these domains are extracellular enzymes often involved in cell wall processes. The domain, named FIMAH (Found In Many Architectures Helical), is usually found at the C-terminal end of the protein. Its precise function is unknown.
