identifier: InterPro:IPR009454
label: Lipid transport, open beta-sheet
definition: >-
  This entry represents a conserved open β-sheet domain found in several lipid transport proteins, including vitellogenin and apolipoprotein B-100. Vitellinogen precursors provide the major egg yolk proteins that are a source of nutrients during early development of oviparous vertebrates and invertebrates. Vitellinogen precursors are multi-domain apolipoproteins that are cleaved into distinct yolk proteins. Different vitellinogen precursors exist, which are composed of variable combinations of yolk protein components; however, the cleavage sites are conserved. In vertebrates, a complete vitellinogen is composed of an N-terminal signal peptide for export, followed by four regions that can be cleaved into yolk proteins: heavy chain lipovitellin (lipovitellin-1), phosvitin, light chain lipovitellin (lipovitellin-2), and a von Willebrand factor type D domain (YGP40). In vitellinogen, this domain is often found as part of the lipovitellin-1 peptide product.
