identifier: InterPro:IPR046481
label: "Domain of unknown function DUF6574"
definition: >-
  This entry represents a domain of unknown function in bacterial proteins, mainly from Firmicutes. Proteins in this family are typically between 116 and 320 amino acids in length. Many members are thought to contain a zinc ribbon domain at the N-terminal. This entry includes Uncharacterized protein YebC from Bacillus subtilis which contains transmembrane helices. This entry shows structural similarity to the Yip1 domain .
