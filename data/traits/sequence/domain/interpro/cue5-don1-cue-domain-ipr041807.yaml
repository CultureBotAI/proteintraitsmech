identifier: InterPro:IPR041807
label: "Cue5/Don1, CUE domain"
definition: >-
  This entry represents the CUE domain found in fungal Cue5 protein and its paralogue, Don1. Cue5 contains a CUE domain which exhibits weak ubiquitin binding properties. Cue5 can function as a ubiquitin-ATG8 adapter and thus mediating autophagic clearance of ubiquitin conjugates under starvation conditions. Don1 is a subunit of the leading edge protein (LEP) complex (Ssp1-Ady3-Don1-Irc10) that forms a ring-like structure at the leading edge of the prospore membrane (PSM) during meiosis II.
