identifier: InterPro:IPR031444
label: "PCNA-associated factor, histone-like domain"
definition: >-
  PCNA-associated factor or p15PAF is a nuclear protein first identified as a proliferating-cell-nuclear-antigen (PCNA)-binding protein. As a direct transcriptional target of activating transcription factor 3 (ATF3) it is involved in maintaining genomic integrity after UV exposure. It is also a direct transcriptional target of the Rb/E2F pathway, playing an essential role in DNA synthesis and cell cycle progression. p15PAF/KIAA0101 is overexpressed in multiple types of human cancer. This domain corresponds to a histone-like fold in p15(PAF).
