identifier: InterPro:IPR056149
label: "ATP-dependent RNA helicase PRP5/DDX46/KHDC4, KH domain"
definition: >-
  This entry represents a likely RNA-binding KH domain found at the C teminus of Pre-mRNA-processing ATP-dependent RNA helicase PRP5 from Saccharomyces cerevisiae, the Probable ATP-dependent RNA helicase DDX46 from human (DDX46) and similar eukaryotic proteins. PRP5 is involved in spliceosome assembly and in nuclear splicing. DDX46 is a component of the 17S U2 SnRNP complex of the spliceosome, a large ribonucleoprotein complex that removes introns from transcribed pre-mRNAs. This domain is also found in the KH homology domain-containing protein 4 (KHDC4) which is an RNA-binding protein involved in pre-mRNA splicing via its interaction with the PRP19C/Prp19 complex/NTC/Nineteen complex.
