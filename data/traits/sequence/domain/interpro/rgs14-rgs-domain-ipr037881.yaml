identifier: InterPro:IPR037881
label: RGS14, RGS domain
definition: >-
  RGS14 is a regulator of G protein signaling (RGS) protein and contains an N-terminal RGS domain, two tandem Ras-binding domains (RBDs) and a G protein regulatory (GPR, also referred to as a GoLoco) motif. It regulates G protein nucleotide exchange and hydrolysis by acting as a GTPase-activating protein (GAP) through its RGS domain, and as a guanine nucleotide dissociation inhibitor (GDI) through its GoLoco motif. Both domains of RGS14 target members of the Gialpha subclass. It is a microtubule-associated protein that may modulate microtubule dynamics and spindle formation and play an essential role during mammalian cell division. RGS14 regulates the activation of alphaMbeta2 integrin during phagocytosis. It is a key regulator of signalling pathways linking synaptic plasticity in CA2 pyramidal neurons to hippocampal-based learning and memory. This entry represents the RGS domain of RGS14.
