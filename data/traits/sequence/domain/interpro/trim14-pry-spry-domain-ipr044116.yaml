identifier: InterPro:IPR044116
label: TRIM14, PRY/SPRY domain
definition: >-
  TRIM14 is a noncanonical TRIM that lacks an E3 ubiquitin ligase RING domain. It is involved in type I IFN signaling in innate immunity. This entry represents the PRY/SPRY domain of TRIM14. TRIM proteins are a family of E3 ubiquitin ligases defined by their N-terminal tripartite motif, also known as RBCC. This motif consists of a RING domain, which confers E3 ligase activity, one or two B-box domains that are zinc-binding motifs, and a coiled-coil region that facilitates protein dimerisation. These proteins play critical roles in various cellular processes, including innate immunity, transcriptional regulation, and protein degradation. The B30.2 domain was first identified as a protein domain encoded by an exon (named B30-2) in the Homo sapiens class I major histocompatibility complex region, whereas the SPRY domain was first identified in a Dictyostelium discoideum kinase splA and mammalian calcium-release channels ryanodine receptors. B30.2 domain consists of PRY and SPRY subdomains. The SPRY domains (after SPla and the RYanodine Receptor) are shorter at the N terminus than the B30.2 domains. The ~200-residue B30.2/SPRY (for B30.2 and/or SPRY) domain is present in a large number of proteins with diverse individual functions in different biological processes. The B30.2/SPRY domain in these proteins is likely to function through protein-protein interaction. The N-terminal ~60 residues of B30.2/SPRY domains are poorly conserved and, as a consequence, a new domain name PRY was coined for a group of similar sequence segments N-terminal to the SPRY domains. The B30.2/SPRY domain contains three highly conserved motifs (LDP, WEVE and LDYE). The B30.2/SPRY domain adopts a highly distorted, compact β-sandwich fold with two additional short β-helices at the N terminus. The β-san…
