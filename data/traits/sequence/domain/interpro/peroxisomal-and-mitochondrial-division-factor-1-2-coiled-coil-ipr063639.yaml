identifier: InterPro:IPR063639
label: "Peroxisomal and mitochondrial division factor 1/2, coiled coil"
definition: >-
  This entry represents the coiled-coil domain found in peroxisomal and mitochondrial division factor proteins. Peroxisomal and mitochondrial division factor 1 (PMD1) and peroxisomal and mitochondrial division factor 2 (PMD2) are tail-anchored membrane proteins involved in the morphogenesis and proliferation of peroxisomes and mitochondria. The coiled-coil domain is essential for protein function. PMD1 and PMD2 form homodimers and can interact with each other through this domain. PMD1 is localised to both peroxisome and mitochondrial outer membranes, whilst PMD2 is specific to mitochondrial outer membrane. This domain is found in plants.
