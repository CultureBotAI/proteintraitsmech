identifier: InterPro:IPR035885
label: "SH2D7, SH2 domain"
definition: >-
  This entry includes the single SH2 domain of SH2D7. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites.
