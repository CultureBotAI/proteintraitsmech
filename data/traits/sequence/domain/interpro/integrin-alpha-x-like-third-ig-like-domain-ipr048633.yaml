identifier: InterPro:IPR048633
label: "Integrin alpha-X-like, third Ig-like domain"
definition: >-
  This entry represents a domain found in Integrin alpha-X from humans (ITGAX) and similar proteins predominantly from vertebrates. ITGAX is a receptor for fibrinogen. This region consists of an immunoglobulin-like domain.
