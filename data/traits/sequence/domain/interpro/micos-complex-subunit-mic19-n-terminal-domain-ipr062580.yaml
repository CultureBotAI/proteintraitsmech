identifier: InterPro:IPR062580
label: "MICOS complex subunit MIC19, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of MICOS complex subunit MIC19 proteins found in nematodes. MIC19 is a component of the mitochondrial contact site and cristae organising system complex that plays a role in maintaining mitochondrial morphology. The protein is localised to the mitochondrial inner membrane and is lipid-anchored on the intermembrane side. Disruption of the gene results in abnormal mitochondrial morphology with localised swellings and tubular extensions. The N-terminal domain precedes the characteristic CHCH domain that contains two disulphide bonds.
