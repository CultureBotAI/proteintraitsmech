identifier: InterPro:IPR047206
label: Centromere-binding protein 1-like, bHLHzip domain
definition: >-
  This entry represents the basic Helix-Loop-Helix-zipper (bHLHzip) domain found in CBF1 from Saccharomyces cerevisiae and similar fungal proteins. This domain is also found in psilocybin cluster transcription regulator (PsiR) from psychedelic mushroom, which is a transcription factor that may regulate the expression of the gene cluster that mediates the biosynthesis of psilocybin, a psychotropic tryptamine-derived natural product. CBP-1, also termed centromere promoter factor 1 (CPF1), or centromere-binding factor 1 (CBF1), is a bHLHzip protein that is required for chromosome stability and methionine prototrophy. It binds as a homodimer to the centromere DNA elements I (CDEI, GTCACATG) region of the centromere that is required for optimal centromere function.
