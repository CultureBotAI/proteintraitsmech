identifier: InterPro:IPR001122
label: Capsid protein C, flavivirus
definition: >-
  Flaviruses are small, enveloped RNA viruses that use arthropods such as mosquitoes for transmission to their vertebrate hosts, and include Yellow fever virus, West Nile virus, Tick-borne encephalitis virus, Japanese encephalitis virus, and Dengue virus 2. Flaviviruses consist of three structural proteins: the core nucleocapsid protein C, and the envelope glycoproteins M ( ) and E. The virion of these viruses is a nucleocapsid covered by a lipoprotein envelope, where the nucleocapsid is a complex of capsid protein C and mRNA. The capsid protein C is a dimeric α-helical protein, and its interaction with RNA is critical for the production of viable virus particles.
