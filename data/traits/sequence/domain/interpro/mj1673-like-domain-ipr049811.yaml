identifier: InterPro:IPR049811
label: "MJ1673-like domain"
definition: >-
  This entry represents a domain found in uncharacterised protein MJ1673 from Methanocaldococcus jannaschii and related prokaryotic proteins. This domain is found mainly standalone. In a number of bacterial CRISPR-associated proteins, it is also found in combination with CRISPR system endoribonuclease Csx1, HEPN domain.
