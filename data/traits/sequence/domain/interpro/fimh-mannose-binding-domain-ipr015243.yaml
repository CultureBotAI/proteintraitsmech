identifier: InterPro:IPR015243
label: "FimH, mannose-binding domain"
definition: >-
  This domain adopts a secondary structure consisting of a β-sandwich, with nine strands arranged in two sheets in a Greek key topology. It is found in FimH, a mannose-specific adhesin of uropathogenic Escherichia coli strains. The domain appears to bind specifically to D-mannose and mediates cellular adhesion to mannosylated proteins, a prerequisite to colonization and subsequent invasion of epithelial tissues.
