identifier: InterPro:IPR024427
label: "Endosialidase, beta-barrel domain"
definition: >-
  This entry represents the β-barrel domain of endosialidases which is nested in a β-propeller domain. This β-barrel domain is approximately 80 amino acids in length and represents one of the two sialic acid binding sites of the enzyme.
