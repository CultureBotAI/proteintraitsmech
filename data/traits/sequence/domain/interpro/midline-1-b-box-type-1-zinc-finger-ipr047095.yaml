identifier: InterPro:IPR047095
label: "Midline-1, B-box-type 1 zinc finger"
definition: >-
  This entry represents the B-box-type 1 (Bbox1) zinc finger of MID1, which is characterised by a C6H2 zinc-binding consensus motif. The microtubule-associated E3 ligase MID1 ( ) contains a type 1 B-box zinc finger domain. MID1 specifically binds Alpha-4, which in turn recruits the catalytic subunit of phosphatase 2A (PP2Ac). This complex is required for targeting of PP2Ac for proteasome-mediated degradation. The MID1 B-box coordinates two zinc ions and adopts a β/β/α cross-brace structure similar to that of ZZ, PHD, RING and FYVE zinc fingers. MID1 is associated with microtubules throughout the cell cycle, co-localising with cytoplasmic fibres in interphase and with the mitotic spindle and midbodies during mitosis and cytokinesis. It has E3 ubiquitin ligase activity towards IGBP1, promoting its monoubiquitination, which results in deprotection of the catalytic subunit of protein phosphatase PP2A, and its subsequent degradation by polyubiquitination.
