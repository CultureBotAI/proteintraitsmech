identifier: InterPro:IPR013904
label: "Transcriptional regulatory protein RXT2, N-terminal"
definition: >-
  The entry represents the N-terminal region of RXT2. RXT2, also known as RAF60, is a component of the Rpd3 histone deacetylase complex (HDAC). Histone deacetylation plays an important role in transcriptional regulation, cell cycle progression and developmental events.
