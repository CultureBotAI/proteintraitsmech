identifier: InterPro:IPR017610
label: tRNA 5-methylaminomethyl-2-thiouridine biosynthesis bifunctional protein MnmC, C-terminal
definition: >-
  In Escherichia coli, the protein previously designated YfcK is now identified as the bifunctional enzyme MnmC. It acts, following the action of the heterotetramer of GidA and MnmE, in the modification of U-34 of certain tRNA to 5-methylaminomethyl-2-thiouridine (mnm5s2U). In other bacteria, the corresponding proteins are usually but always found as a single polypeptide chain, but occasionally as the product of tandem genes. The N-terminal region, or subunit, contains methyltransferase activity and is known as MnmC2. This entry represents the C-terminal region of the multifunctional protein, referred to as MnmC1.
