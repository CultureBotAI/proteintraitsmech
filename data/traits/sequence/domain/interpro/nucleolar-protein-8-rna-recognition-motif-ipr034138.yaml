identifier: InterPro:IPR034138
label: "Nucleolar protein 8, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif of NOP8 (also known as NOP132). In humans, NOP132 associates with proteins involved in ribosome biogenesis and RNA metabolism, including the DEAD-box RNA helicase protein, DDX47. Budding yeast NOP8 is required for 60S ribosomal subunit synthesis.
