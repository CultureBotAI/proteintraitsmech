identifier: InterPro:IPR016019
label: Guanine nucleotide exchange factor SopE, GEF domain
definition: >-
  This entry represents the guanine nucleotide exchange factor domain of SopE. This domain has an α-helical structure consisting of two three-helix bundles arranged in a lamdba shape. The type III secretion system (T3SS) of Gram-negative bacteria transports virulence factors directly from the pathogen into the host cell, and is triggered only upon close contact between bacterium and host. Notably, effector proteins secreted via the T3SS lack conventional secretion signals, a property that distinguishes them from most other secreted proteins. Salmonella spp. secrete an effector protein, SopE, exemplified by , that is responsible for stimulating reorganisation of the host cell actin cytoskeleton and membrane ruffling. SopE acts as a guanine nucleotide exchange factor (GEF) targeting Rho-GTPases such as Cdc42 and Rac. To restore normal host cell architecture, a second effector, the tyrosine phosphatase SptP, rapidly reverses the cytoskeletal changes induced by SopE.
