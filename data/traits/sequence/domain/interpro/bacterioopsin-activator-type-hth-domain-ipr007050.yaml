identifier: InterPro:IPR007050
label: "Bacterioopsin activator-type, HTH domain"
definition: >-
  Numerous bacterial transcription regulatory proteins bind DNA via a helix-turn-helix (HTH) motif. This entry represents the HTH DNA binding domain found in bacterioopsin transcriptional activator from Halobacterium salinarium (Halobacterium halobium) and other proteins, mainly from Halobacteria.
