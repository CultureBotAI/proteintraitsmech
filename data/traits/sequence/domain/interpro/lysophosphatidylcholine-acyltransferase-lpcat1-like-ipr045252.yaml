identifier: InterPro:IPR045252
label: Lysophosphatidylcholine acyltransferase LPCAT1-like
definition: >-
  Proteins containing this domain include lysophosphatidylcholine acyltransferase 1 (LPCAT1) and related proteins. LPCAT1 exhibits acyltransferase activity, and is involved in LD (lipid droplet)-associated lipid metabolism. Proteins containing this domain also includes glycerol-3-phosphate acyltransferases, such as GPAT3 and GPAT4, which are involved in de novo triacylglycerol synthesis.
