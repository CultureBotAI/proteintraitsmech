identifier: InterPro:IPR048538
label: "Rrn7/TAF1B, C-terminal cyclin domain"
definition: >-
  This is the C-terminal cyclin domain of Rrn7 from yeast and the orthologues from animals and plants TAF1B. Rrn7 from yeast and its orthologue TATA box-binding protein-associated factor RNA polymerase I subunit B (TAF1B) from human, are TFIIB-like factors components of RNA polymerase I core factor complex. They contain two cyclin fold domains. In Rrn7, the cyclin domains interact with both Rrn6 and Rrn11 and form the fingers of the core factor which resembles a right hand. N-terminal regions of both Rrn11 and Rrn6 compose the palm, the thumb is composed by the C-terminal of Rrn11 and the knuckles consist of the C-terminal half of Rrn6.
