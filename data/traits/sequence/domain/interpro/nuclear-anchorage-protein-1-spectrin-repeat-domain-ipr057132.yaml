identifier: InterPro:IPR057132
label: "Nuclear anchorage protein 1, spectrin repeat domain"
definition: >-
  This entry represents a region of spectrin repeats found in Nuclear anchorage protein 1 from Caenorhabditis elegans and similar proteins from worms. Nuclear anchorage protein 1 (ANC-1) is a key protein in Caenorhabditis elegans that plays a central role in nuclear and mitochondrial anchoring. ANC-1 has a role in positioning of the cell body of the PVQ lumbar interneuron. It may connect nuclei to the cytoskeleton by interacting with unc-84 at the nuclear envelope and with F-actin in the cytoplasm, creating a bridge across the nuclear envelope between the cytoskeleton and the nucleus. ANC-1 has a complex structure composed of several key domains: actin-binding calponin homology (CH) domains at the N terminus; a long spectrin-like region with multiple repeats, a KASH domain at the C-terminal end and a transmembrane (TM) span near the C terminus.
