identifier: InterPro:IPR006064
label: "Cytokinin glycosidase"
definition: >-
  This domain is found in Cytokinin-beta-glucosidases, Protein-tyrosine phosphatase rolB and related proteins. It is also found N-terminal in Tryptophan 2-monooxygenase. These enzymes correspond to Agrobacterium rolC and were characterised along with rolB. RolB and rolC were originally classified as glycoside hydrolase family 40 and 41 respectively. RolB has subsequently been shown to have tyrosine phosphatase activity.
