identifier: InterPro:IPR063858
label: "FAM237, middle domain"
definition: >-
  This entry represents a middle domain in FAM237 small secreted peptide hormones found in vertebrates, including mammals, birds and fish. In humans there are two paralogues, FAM237A and FAM237B. FAM237A is expressed in the pituitary, testis, heart and brain. The active form of these peptides requires C-terminal amidation and disulphide bond formation. FAM237A and FAM237B were identified as candidate ligands for the orphan G protein-coupled receptor GPR83.
