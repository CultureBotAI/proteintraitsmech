identifier: InterPro:IPR054114
label: "Major tropism determinant, second domain"
definition: >-
  This entry represents the second domain of major tropism determinant (Mtd). Mtd, the receptor-binding protein of Bordetella bacteriophage, varies greatly in sequence. It is the tail fibre protein located at the distal ends of the fibres that binds to the adhesion receptors on the host surface, thereby determining the host range. Variation in Mtd depends on a phage-encoded retroelement that belongs to a family of retroelements implicated in generating sequence diversity in various phage and bacterial genomes. The second domain, represented by this entry, forms a β-sandwich structure ( ).
