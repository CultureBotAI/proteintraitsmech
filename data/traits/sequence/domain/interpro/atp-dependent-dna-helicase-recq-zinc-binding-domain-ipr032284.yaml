label: "ATP-dependent DNA helicase RecQ, zinc-binding domain"
definition: >-
  This domain is the zinc-binding domain of ATP-dependent DNA helicase RecQ, which which unwinds DNA in a 3'-5' direction and plays a role in DNA damage repair and genome stability.
