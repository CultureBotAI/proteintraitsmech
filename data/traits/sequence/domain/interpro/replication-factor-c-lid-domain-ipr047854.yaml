identifier: InterPro:IPR047854
label: "Replication factor C, lid domain"
definition: >-
  Replication factor C (RFC) is five-protein clamp loader complex that forms a stable ATP-dependent complex with the sliding clamp, PCNA, which binds specifically to primed DNA. RFC subunits belong to the clamp loader clade of the AAA superfamily and consist of a ATPase domain, a lid domain and a C-terminal domain. This entry represents the lid domain.
