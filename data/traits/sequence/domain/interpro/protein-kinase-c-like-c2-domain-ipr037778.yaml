identifier: InterPro:IPR037778
label: "Protein kinase C-like, C2 domain"
definition: >-
  Protein kinase C (PKC) is a member of a family of Ser/Thr phosphotransferases that are involved in many cellular signaling pathways. Fungi have only one or two PKCs in contrast to mammals, which have at least 9. Saccharomyces cerevisiae contains a single PKC isozyme, Pkc1p, which contains all of the regulatory motifs found in mammalian PKCs. In addition to its main function in maintaining cell integrity, fungi PKCs have been implicated in the regulation of diverse processes such as the organization of the actin cytoskeleton, autophagy and apoptosis, cell cycle control, cytokinesis and genetic stability. PKC has two antiparallel coiled-coiled regions (ACC finger domain) known as HR1 (PKC homology region 1/ Rho binding domain) upstream of the C2 domain and two C1 domains downstream. The C2 domain was first identified in PKC. C2 domains fold into an 8-standed β-sandwich that can adopt 2 structural arrangements: Type I and Type II, distinguished by a circular permutation involving their N- and C-terminal β strands. Many C2 domains, like those of PKC, are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances including bind phospholipids, inositol polyphosphates, and intracellular proteins. Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1. However, there are a few exceptions to this including RIM isoforms and some splice variants of piccolo/aczonin and intersectin which only have a single C2 domain. C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions. This entry represents the C2 domain of fungal PKC…
