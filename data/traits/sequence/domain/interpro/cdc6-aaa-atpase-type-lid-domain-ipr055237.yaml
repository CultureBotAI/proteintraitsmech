identifier: InterPro:IPR055237
label: "Cdc6, AAA+ ATPase-type lid domain"
definition: >-
  This domain is found in ORC1-type DNA replication protein (also known as Cdc6) and related proteins found mainly in archaea. Cdc6 is a key protein involved in the pre-replication complex assembly. It contains AAA+ ATPase domain that is capped by a lid domain, represented by this entry.
