identifier: InterPro:IPR049320
label: "E3 ubiquitin-protein ligase CARP1/2, FYVE/PHD zinc finger"
definition: >-
  This entry represents the FYVE/PHD zinc finger form E3 ubiquitin-protein ligase RNF34 and RFFL, also known as Caspase regulator 1 and 2 (CARP1/2), respectively. This domain is also found in similar proteins from vertebrates. CARP1 ubiquitinates the caspases CASP8 and CASP10, promoting their proteasomal degradation, to negatively regulate cell death downstream of death domain receptors in the extrinsic pathway of apoptosis. It negatively regulates p53/TP53 through its direct ubiquitination and targeting to proteasomal degradation. CARP2 is a novel caspase regulator that regulates the p53 signalling pathway through degrading 14-3-3 sigma and stabilising MDM2.
