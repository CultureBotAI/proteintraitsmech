identifier: InterPro:IPR041531
label: "Baseplate upper protein, immunoglobulin-like domain"
definition: >-
  This is a β-sandwich immunoglobulin fold domain, which resembles the plexin-A2 C-terminal domain in structure. In baseplate upper protein (BppU, also known as ORF48) trimer, this domain plays part in surrounding the Dit hexameric core.
