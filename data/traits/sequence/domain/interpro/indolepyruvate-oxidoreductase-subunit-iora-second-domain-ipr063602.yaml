identifier: InterPro:IPR063602
label: "Indolepyruvate oxidoreductase subunit IorA, second domain"
definition: >-
  This entry represents a domain of approximately 150 residues found in indolepyruvate ferredoxin oxidoreductases (IOR, ). This domain is located between the N-terminal thiamine pyrophosphate (TPP) binding region ( ) and the TPP_enzyme_C domain ( ). IOR enzymes catalyse the ferredoxin-dependent oxidative decarboxylation of arylpyruvates such as indole-3-pyruvate, forming acyl-CoA derivatives. The enzymes typically function as heterodimers and contain iron-sulphur clusters for electron transfer. This domain is structurally related to the PFOR_II domain ( ) found in pyruvate:ferredoxin oxidoreductases. Members are found predominantly in bacteria.
