identifier: InterPro:IPR061966
label: "AT-rich binding protein, N-terminal C2H2-type zinc finger domain"
definition: >-
  This entry represents N-terminal C2H2-type zinc finger domain in AT-rich binding protein (ATbp) proteins from diptera. Members may function as transcription factors for genes having AT stretches in their promoter and enhancer regions and bind to AT-rich DNA. The proteins are localised to the nucleus and contain multiple C2H2-type zinc finger domains.
