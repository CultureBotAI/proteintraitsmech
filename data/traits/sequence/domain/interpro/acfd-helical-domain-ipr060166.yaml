identifier: InterPro:IPR060166
label: "AcfD, helical domain"
definition: >-
  This domain is found in Accessory colonization factor AcfD from Vibrio cholerae and its homologue from E.coli. AcfD (also known as YghJ) from E.coli is a secreted, cell surface-associated metalloprotease, especially prevalent and highly expressed in pathogenic types. It contains an M60-like metalloprotease domain, enabling it to degrade intestinal mucins. This activity facilitates the colonization of the intestinal epithelium by pathogenic E. coli by breaking down the protective mucus barrier. The domain represented by this entry is found in the first half of the protein and is predicted to adopt an α-helical structure composed of five α-helices. It contains two invariant cysteine residues that are predicted to form a disulfide bond.
