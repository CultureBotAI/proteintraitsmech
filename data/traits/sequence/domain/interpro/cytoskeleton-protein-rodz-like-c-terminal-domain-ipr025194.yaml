identifier: InterPro:IPR025194
label: "Cytoskeleton protein RodZ-like, C-terminal domain"
definition: >-
  This short domain is often found at the C terminus of cytoskeleton RodZ proteins, which contain a helix-turn-helix domain. The function of this domain, previously known as DUF4115, is unknown.
