identifier: InterPro:IPR032430
label: "Proteasome activator Blm10, middle HEAT repeats region"
definition: >-
  This entry represents the middle HEAT repeats region of the yeast Blm10 and its homologues in plants and animals such as PA200 (also known as Proteasome activator complex subunit 4). Blm10 is a proteasome activator that binds the core proteasome and stimulates proteasome-mediated protein degradation by inducing gate opening.
