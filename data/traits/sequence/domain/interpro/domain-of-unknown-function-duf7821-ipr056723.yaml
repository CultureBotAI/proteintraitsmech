identifier: InterPro:IPR056723
label: "Domain of unknown function DUF7821"
definition: >-
  This domain is found N-terminal in the uncharacterised protein PM0657 and its paralogue PM1082 from Pasteurella multocida and related bacterial proteins. It is predicted to adopt a α/β globular structure consisting of a central antiparallel β-sheet and helices packed on both sides.
