identifier: InterPro:IPR061303
label: "Channel accessory protein ArfC, N-terminal domain"
definition: >-
  The three-gene arf (Ammonia Release Facilitator) operon in Mycobacterium tuberculosis encodes proteins called ArfA (or OmpATb), ArfB, and ArfC. Most versions of ArfC, including Rv0901 from M. tuberculosis, contain a spacer region and then a C-terminal 'sunset' domain, but some ArfC lack the spacer region and sunset domain, and are much shorter. This entry describes the region shared by short and long forms of ArfC.
