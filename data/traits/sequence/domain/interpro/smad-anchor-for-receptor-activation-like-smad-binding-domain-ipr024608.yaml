identifier: InterPro:IPR024608
label: "Smad anchor for receptor activation-like, Smad-binding domain"
definition: >-
  This entry represents the Smad-binding domain (SBD) of SARA, which is also known as Zinc finger FYVE domain-containing protein 9. This domain consists of a rigid coil, an α-helix, and a β-strand, and interacts with Smad2. It is found C-terminal to the FYVE zinc finger domain ( ). Smad proteins mediate transforming growth factor-beta (TGF-beta) signalling from the transmembrane serine-threonine receptor kinases to the nucleus. SARA (Smad anchor for receptor activation) recruits Smad2 to the TGF-beta receptors for phosphorylation.
