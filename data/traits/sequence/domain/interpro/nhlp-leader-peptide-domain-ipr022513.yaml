identifier: InterPro:IPR022513
label: "NHLP leader peptide domain"
definition: >-
  This entry represents a domain that is conserved among a large number of putative thiazole/oxazole-modified microcins (TOMM), including PoyA from Bacterium symbiont subsp. Theonella swinhoei. As a leader peptide domain, it is likely to be removed from the mature product. This domain is unusual in several ways. First, it is longer than most previously described RNP leader peptides. Second, most of the domain is homologous to nitrile hydratase alpha subunits. Finally, it appears that this domain correlates with a specific family of cleavage/export proteins while members undergo modifications by different classes of peptide maturase, including cyclodehydratases, lantibiotic synthases, radical SAM peptide maturases. This family is expanded especially in Pelotomaculum thermopropionicum SI.
