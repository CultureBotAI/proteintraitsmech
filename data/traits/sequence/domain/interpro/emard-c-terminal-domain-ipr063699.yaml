identifier: InterPro:IPR063699
label: "EMARD, C-terminal domain"
definition: >-
  This entry represents the multi-pass transmembrane domain of Endoplasmic reticulum membrane-associated RNA degradation protein (EMARD, also known as C6orf70 in human), found at its C-terminal. This protein may play a role in neuronal migration during embryonic development. This protein contains a KEN domain at its N-terminal.
