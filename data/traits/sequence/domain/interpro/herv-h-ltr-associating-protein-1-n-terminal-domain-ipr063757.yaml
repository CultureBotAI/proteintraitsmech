identifier: InterPro:IPR063757
label: "HERV-H LTR-associating protein 1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of HERV-H LTR-associating protein 1 (HHLA1). This domain is found in vertebrate secreted proteins and follows the signal peptide. HHLA1 is a glycoprotein that undergoes alternative splicing, with one isoform (PLA2L) expressed in teratocarcinoma cell lines. The protein may be associated with endogenous retrovirus elements, as suggested by its name referring to HERV-H LTR sequences. The protein contains multiple N-linked glycosylation sites and disordered regions. While HHLA1 is a secreted protein, the specific function of this N-terminal domain remains to be determined.
