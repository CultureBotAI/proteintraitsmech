identifier: InterPro:IPR047501
label: "Ciliogenesis-associated TTC17-interacting protein, dimerization/docking domain"
definition: >-
  This entry represents the dimerization/docking (D/D) domain found at the C-terminal of human CATIP and similar proteins predominantly found in animals. This domain shows high sequence similarity to the dimerization/docking (D/D) domain of regulatory subunit of cAMP-dependent protein kinase (PKA). Ciliogenesis-associated TTC17-interacting protein (CATIP), also called C2orf62, plays a role in primary ciliogenesis by modulating actin polymerization. It interacts with TTC17. Mutations in CATIP contribute to oligoteratoasthenozoospermia through its involvement in actin polymerization and the actin cytoskeleton.
