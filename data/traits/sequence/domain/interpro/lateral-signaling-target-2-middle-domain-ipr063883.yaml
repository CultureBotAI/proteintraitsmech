identifier: InterPro:IPR063883
label: "Lateral signaling target 2, middle domain"
definition: >-
  This entry represents a large middle domain of approximately 600 residues found in LST2/ZFYVE28 (Lateral signalling target protein 2) in metazoans. This domain is positioned between the N-terminal region and the C-terminal FYVE zinc finger domain ( ). LST2 is a negative regulator of EGFR signalling that promotes EGFR degradation in endosomes. In C. elegans, lst-2 functions as a negative regulator of the LET-23 EGFR pathway during vulval development. The specific function of this domain remains to be determined.
