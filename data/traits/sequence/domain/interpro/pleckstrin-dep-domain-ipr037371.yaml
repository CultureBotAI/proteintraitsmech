identifier: InterPro:IPR037371
label: "Pleckstrin, DEP domain"
definition: >-
  Pleckstrin (PLEK) plays a role in cell spreading and reorganization of actin cytoskeleton in platelets and leukocytes. Its activity is highly regulated by phosphorylation, mainly by protein kinase C. Pleckstrin-like proteins contain a central DEP domain, flanked by 2 PH (pleckstrin homology) domains.
