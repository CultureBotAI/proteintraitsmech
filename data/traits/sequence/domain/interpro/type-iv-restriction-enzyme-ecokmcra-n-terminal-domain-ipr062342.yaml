identifier: InterPro:IPR062342
label: "Type IV restriction enzyme EcoKMcrA, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the type IV methyl-directed restriction enzyme EcoKMcrA and related proteins. It precedes the C-terminal HNH nuclease domain ( ). McrA cleaves DNA containing 5-methylcytosine at the sequence 5'-C(me)CGG-3', protecting bacteria from foreign methylated DNA. The N-terminal domain is involved in recognition of methylated DNA substrates. In Escherichia coli, McrA is encoded by the cryptic lambdoid prophage e14. The family is found in Pseudomonadota and Actinomycetota.
