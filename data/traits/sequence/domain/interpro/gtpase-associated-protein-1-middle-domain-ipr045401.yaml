identifier: InterPro:IPR045401
label: "GTPase-associated protein 1, middle domain"
definition: >-
  GTPase-associated protein 1 (GAP1) is part of the GTPase-centric systems, a class of NTP-dependent biological conflict systems. It is comprised of three clearly distinguishable globular domains: GAP1-N, GAP1-M and GAP1-C. GAP1 occurs in two distinct subtypes that are readily distinguished by versions of the GAP1-N domain: GAP1-N1 and GAP1-N2. This entry represents the middle domain (GAP1-M) found in GAP1.
