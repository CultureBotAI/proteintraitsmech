identifier: InterPro:IPR012967
label: Caffeic acid 3-O-methyltransferase-like, dimerisation domain
definition: >-
  This domain is found at the N-terminal in a variety of Caffeic acid 3-O-methyltransferase (COMT) and related O-methyltransferases. It has been shown to mediate dimerisation of these proteins. It is also found in some N-methyltransferases such as Anthranilate N-methyltransferase and 3-aminomethylindole N-methyltransferase which are involved in the biosynthesis of indole and acridine alkaloids. Methyltransferases (EC [ec:2.1.1.-]) constitute an important class of enzymes present in every life form. They transfer a methyl group most frequently from S-adenosyl L-methionine (SAM or AdoMet) to a nucleophilic acceptor such as oxygen leading to S-adenosyl-L-homocysteine (AdoHcy) and a methylated molecule. All these enzymes have in common a conserved region of about 130 amino acid residues that allow them to bind SAM. The substrates that are methylated by these enzymes cover virtually every kind of biomolecules ranging from small molecules, to lipids, proteins and nucleic acids. Methyltransferase are therefore involved in many essential cellular processes including biosynthesis, signal transduction, protein repair, chromatin regulation and gene silencing. More than 230 families of methyltransferases have been described so far, of which more than 220 use SAM as the methyl donor.
