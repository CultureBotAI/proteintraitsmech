identifier: InterPro:IPR057402
label: "BBC1/AIM3, cysteine proteinase-fold domain"
definition: >-
  This entry represents a C-terminal domain that contains a cysteine peptidase-like fold but appears to lack the conserved catalytic residues. It is mainly found in fungal proteins such as myosin tail region-interacting protein MTI1 (BBC1) in Saccharomyces cerevisiae and its orthologue SH3 domain-containing protein C23A1.17 in Schizosaccharomyces pombe. BBC1 is involved in the regulation of actin patch assembly. It interacts with the actin assembly factor Las17p and with the SH3 domains of Type I myosins Myo3p and Myo5p. This domain is also found in altered inheritance of mitochondrial protein 3 (AIM3) protein in Debaryomyces hansenii, which is involved in mitochondrial inheritance, though the specific role of this domain remains to be determined. This domain also represents uncharacterised proteins found in bacteria.
