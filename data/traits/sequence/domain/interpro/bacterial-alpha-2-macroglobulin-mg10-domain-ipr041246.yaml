identifier: InterPro:IPR041246
label: "Bacterial alpha-2-macroglobulin MG10 domain"
definition: >-
  Alpha-2-macroglobulins (A2Ms) are plasma proteins that trap and inhibit a broad range of proteases and are major components of the eukaryotic innate immune system. However, A2M-like proteins were identified in pathogenically invasive bacteria and species that colonize higher eukaryotes. Bacterial A2Ms are located in the periplasm where they are believed to provide protection to the cell by trapping external proteases through a covalent interaction with an activated thioester. This domain is found on the C-terminal region in A2Ms in bacteria. Structure analysis of Salmonella enterica ser A2Ms (SA-A2Ms) show that they are composed of 13 domains, all of which fold as variants of β sandwiches with the exception of the TED, which consists of 14 α helices. Most of the β sandwich domains appear to serve a structural role and are referred to as the macroglobulin-like (MG) domains. This is the MG10 domain. MG10 is markedly different from the other MG domains in that it has more β strands and an α helix. The position of MG10 is stabilized by, in addition to other hydrogen bonds, the formation of a β sheet with MG9.
