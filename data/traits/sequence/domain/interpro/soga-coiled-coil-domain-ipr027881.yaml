identifier: InterPro:IPR027881
label: SOGA, coiled-coil domain
definition: >-
  This entry represents a coiled-coil region of SOGA proteins. The SOGA (suppressor of glucose by autophagy) family consists of proteins SOGA1, SOGA2, and SOGA3 (also known as Microtubule cross-linking factor 1-3). SOGA1 regulates autophagy by playing a role in the reduction of glucose production in an adiponectin-and insulin-dependent manner. SOGA1/2 are required for faithful chromosome segregation during mitosis. Members of this entry contain a long coiled-coil domain that dimerizes and holds two N-terminal domains that bind to microtubules.
