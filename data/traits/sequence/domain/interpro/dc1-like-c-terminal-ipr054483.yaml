identifier: InterPro:IPR054483
label: "DC1-like, C-terminal"
definition: >-
  This entry represents a variation of the protein kinase C1 domain (named DC1 for divergent C1 domain) that is characterised by a rich cysteine content, found at the C-terminal of a group of uncharacterised plant proteins. This domain is involved in binding many ligands, which include diacylglycerol, phorbol esters and zinc. This domain is found in association with .
