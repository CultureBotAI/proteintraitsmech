identifier: InterPro:IPR048733
label: "Cilia- and flagella-associated protein 69, ARM repeats domain"
definition: >-
  This entry represents the ARM repeats domain of CFA69. Cilia- and flagella-associated protein 69 (CFA69) is required for sperm flagellum assembly/stability. Truncating mutations of this protein induce autosomal-recessive MMAF (multiple morphological abnormalities of the flagella) and primary male infertility. In mice, it regulates the speed of activation and termination of the odour response and, thus, contributes to the robustness of olfactory transduction pathways.
