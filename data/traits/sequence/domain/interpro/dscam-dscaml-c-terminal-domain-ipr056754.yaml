identifier: InterPro:IPR056754
label: "DSCAM/DSCAML, C-terminal domain"
definition: >-
  This entry represents a Fn3-like domain found at the C-terminal of DSCAM and DSCAML. DSCAM and DSCAML are cell adhesion molecules that play a role in neuronal self-avoidance. They promote repulsion between specific neuronal processes of either the same cell or the same subtype of cells.
