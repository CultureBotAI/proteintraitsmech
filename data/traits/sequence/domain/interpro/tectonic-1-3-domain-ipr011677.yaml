identifier: InterPro:IPR011677
label: "Tectonic-1-3 domain"
definition: >-
  This is a conserved domain found in tectonic proteins (TCTN1/2/3) which contains a Cys rich N-terminal region. Although its function is currently unknown (this domain is also found as DUF1619), studies in TCTN2 suggest that it is indispensable for normal functions. These proteins form a complex required for hedgehog signaling transduction. TCTN1, TCTN2, and TCTN3 are members of the tectonic protein family that play crucial roles in ciliogenesis and ciliary function. While they share some common functions, each protein also has specific roles in the process of cilia formation and maintenance. These proteins interact with several other ciliopathy proteins, forming a complex known as the Tectonic ciliopathy complex. This complex is required for hedgehog signalling transduction and regulation of ciliary membrane composition.
