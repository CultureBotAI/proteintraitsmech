identifier: InterPro:IPR013750
label: "GHMP kinase, C-terminal domain"
definition: >-
  This domain is found in homoserine kinases, galactokinases and mevalonate kinases. These kinases make up the GHMP kinase superfamily of ATP-dependent enzymes. These enzymes are involved in the biosynthesis of isoprenes and amino acids as well as in carbohydrate metabolism. The C-terminal domain of homoserine kinase has a central α-β plait fold and an insertion of four helices, which, together with the N-terminal fold, create a novel nucleotide binding fold.
