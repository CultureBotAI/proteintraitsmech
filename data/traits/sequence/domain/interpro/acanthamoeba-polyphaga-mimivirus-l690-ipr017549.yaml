identifier: InterPro:IPR017549
label: "Acanthamoeba polyphaga mimivirus, L690"
definition: >-
  This entry is represented by Acanthamoeba polyphaga mimivirus, L690. These proteins are uncharacterised. Members are found with a C-terminal putative exosortase interaction domain, PEP-CTERM, in Nitrosospira multiformis, Rhodoferax ferrireducens, Solibacter usitatus (strain Ellin6076), and Acidobacteria bacterium (strain Ellin345). Some members are found not to have the PEP-CTERM domain in several other species, including Burkholderia ambifaria, Gloeobacter violaceus PCC 7421, and three copies in Acanthamoeba polyphaga mimivirus (APMV).
