identifier: InterPro:IPR060129
label: "Vacoular membrane protein SCY_4732-like, transmembrane segment"
definition: >-
  This entry represents the transmembrane segment of SCY_4732 protein which belongs to the PRM5 family of vacuolar membrane proteins found in ascomycetes. They are regulated by the cell integrity signalling pathway and by pheromone. Members are single-pass membrane proteins localised to the vacuolar membrane and contain a single transmembrane helical region.
