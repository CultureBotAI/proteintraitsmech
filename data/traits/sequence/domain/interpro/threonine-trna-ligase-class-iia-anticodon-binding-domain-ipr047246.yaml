identifier: InterPro:IPR047246
label: "Threonine-tRNA ligase, class IIa, anticodon-binding domain"
definition: >-
  This entry represents the ThrRS Threonyl-anticodon binding domain, which is responsible for specificity in tRNA-binding, so that the activated amino acid is transferred to a ribose 3' OH group of the appropriate tRNA only. Threonine-tRNA ligase (also known as Threonyl-tRNA synthetase) exists as a monomer and belongs to class IIa. The enzyme from Escherichia coli represses the translation of its own mRNA. The crystal structure of the complex between tRNA(Thr) and ThrRS show structural features that reveal novel strategies for providing specificity in tRNA selection. These include an amino-terminal domain containing a novel protein fold that makes minor groove contacts with the tRNA acceptor stem. The enzyme induces a large deformation of the anticodon loop, resulting in an interaction between two adjacent anticodon bases, which accounts for their prominent role in tRNA identity and translational regulation. A zinc ion found in the active site is implicated in amino acid recognition/discrimination. The zinc ion may act to ensure that only amino acids that possess a hydroxyl group attached to the β-position are activated.
