identifier: InterPro:IPR025652
label: "Acyl-CoA thioesterase 2, C-terminal domain"
definition: >-
  Escherichia coli thioesterase 2 (TesB) adopts a 'double hot dog' configuration. It shows two structural repeats connected by a long loop. There is, however, no sequence similarity between the two halves of the molecule. This entry represents the C-terminal pseudo-domain, which is structurally similar to the recently described beta-hydroxydecanoyl thiol ester dehydrase.
