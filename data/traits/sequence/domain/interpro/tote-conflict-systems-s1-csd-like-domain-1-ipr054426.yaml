identifier: InterPro:IPR054426
label: "TOTE conflict systems, S1/CSD-like domain 1"
definition: >-
  This entry represents a presumed ribonucleoprotein complex-forming domain of the TOTE systems, potentially binding ssRNAs derived from hybrid duplexes bound by the systems. It is typically found in a two-domain tandem repeat arrangement, this is the first domain.
