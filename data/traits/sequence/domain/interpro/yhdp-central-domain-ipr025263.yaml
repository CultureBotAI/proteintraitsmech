identifier: InterPro:IPR025263
label: "YhdP, central domain"
definition: >-
  This entry describes the central domain in YhdP and related bacterial proteins. This domain is predicted to span the periplasm. It contains an elongated β-strand groove. This domain represents a region of sequence homology that is collectively conserved amongst all bacterial AsmA-like proteins ( ). Intermembrane phospholipid transporter YhdP is involved in maintaining lipid homeostasis in the outer membrane of Gram-negative bacteria. It likely transports phospholipids between the inner and outer membranes, providing a bridge-like structure that shields the lipids as they traverse the periplasm. Phosphate-containing molecules are thought to be captured along a hydrophobic groove that extends throughout the protein, excluding the extreme N-terminal. YhdP also appears to influence the levels of cyclic enterobacterial common antigen, a soluble molecule located in the periplasm. Along with TamB and YdbH, YhdP performs an essential function in supporting bacterial growth and outer membrane stability, though these proteins are redundant but not functionally equivalent. The transport activity of YhdP is thought to be biased towards phospholipids with saturated fatty acids, whereas TamB may preferentially handle more unsaturated phospholipids. Despite their differences, any one of these three proteins is sufficient to sustain growth under normal conditions. This protein is predicted to be related to AsmA proteins.
