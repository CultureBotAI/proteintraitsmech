identifier: InterPro:IPR057338
label: "Smf/DprA, SAM domain"
definition: >-
  This entry represents the N-terminal domain found in Smf and DprA proteins mainly from Enterobacterales. Smf (Smf homologue) and DprA (DNA processing chain A) proteins are involved in DNA processing and transformation. The domain adopts a SAM-like fold, similar to other domains involved in nucleic acid interactions. DprA is a new member of the recombination-mediator protein family, dedicated to natural bacterial transformation. In Helicobacter pylori, DprA is required for natural chromosomal and plasmid transformation. It has now been shown that DprA binds cooperatively to single-stranded DNA (ssDNA) and interacts with RecA. In the process, DprA-RecA-ssDNA filaments are produced and these filaments catalyse the homology-dependent formation of joint molecules. While the Escherichia coli SSB protein limits access of RecA to ssDNA, DprA alleviates this barrier. DprA has a role not only in ensuring production of transformants via interaction with RecA, it is also involved in competence shut-off via interaction with ComE.
