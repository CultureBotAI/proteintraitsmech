identifier: InterPro:IPR059921
label: "XepA-like domain"
definition: >-
  This entry represents a domain found in XepA proteins from Bacillus and related phage systems. XepA is a protein of approximately 279 amino acids that adopts a jelly roll fold structure. The protein is encoded by the defective prophage PBSX in Bacillus subtilis and related phage elements. XepA does not appear to be involved in host cell lysis despite its prophage location. The protein is found across 28 species including both bacteria and viruses, particularly in Bacillales and Spbetavirus. The protein has been structurally characterised with crystal structures available. The function of this protein remains to be determined. XepA is a monodomain protein, but in some members of this entry, this domain is found in association with other domains.
