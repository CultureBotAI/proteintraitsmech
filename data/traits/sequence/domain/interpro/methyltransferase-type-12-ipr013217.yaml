identifier: InterPro:IPR013217
label: "Methyltransferase type 12"
definition: >-
  Methyl transfer from the ubiquitous donor S-adenosyl-L-methionine (SAM) to either nitrogen, oxygen or carbon atoms is frequently employed in diverse organisms ranging from bacteria to plants and mammals. The reaction is catalysed by methyltransferases (Mtases) and modifies DNA, RNA, proteins and small molecules, such as catechol for regulatory purposes. The various aspects of the role of DNA methylation in prokaryotic restriction-modification systems and in a number of cellular processes in eukaryotes including gene regulation and differentiation is well documented. This entry represents a methyltransferase domain found in a large variety of SAM-dependent methyltransferases including, but not limited to: Fatty acid synthase, a biosynthetic enzyme catalysing the formation of long-chain fatty acids Glycine N-methyltransferase which catalyses the SAM-dependent methylation of glycine to form sarcosine and may play a role in regulating the methylation potential of the cell A polyketide synthase, important for the synthesis of chaetoviridin A and chaetomugilin A in the fungus Chaetomium Fungal non-reducing polyketide synthases, such as ausA and otaA Structural studies show that this domain forms the Rossman-like α-β fold typical of SAM-dependent methyltransferases.
