identifier: InterPro:IPR057276
label: "Thermus phage P23-45 gp39, N-terminal"
definition: >-
  This domain is found at the N-terminal in the protein gp35 from Thermus phage P23-45 and similar sequences from tailed bacteriophages. This protein binds the host's DNA-dependent RNA polymerase (RNAP), inhibiting host gene transcription while allowing transcription of phage genes. Structural studies show this core domain of the protein binds to the RNA beta-flap domain. It consists of a central β sheet and an N-terminal helix.
