identifier: InterPro:IPR062971
label: TP0443
definition: >-
  This entry represents a conserved family of approximately 260-residue proteins found in spirochaetes, including Treponema and Leptospira species. The prototype member is TP0443 from Treponema pallidum, the causative agent of syphilis. This protein has been shown to interact with FliG-2, a component of the flagellar motor rotor, in yeast two-hybrid studies. Spirochaetes possess two FliG paralogs (FliG-1 and FliG-2) that show differential interaction patterns with other flagellar and non-flagellar proteins. TP0443 and several other uncharacterised proteins interact specifically with FliG-2, suggesting possible roles in flagellar motor assembly or regulation. AlphaFold3 supports a direct interaction between this protein and FliG homologues.
