identifier: InterPro:IPR058587
label: "Chaperone protein CcmS"
definition: >-
  This entry represents the chaperone protein CcmS, which is involved in beta-carboxysome assembly and interacts with beta-carboxysome proteins. CcmS specifically interacts with the C-terminal extension of the carboxysome shell protein CcmK1. Upon binding to CcmS, this C-terminal segment of CcmK1 folds into an amphipathic α-helix protruding outward and likely functions as a hinge to crosslink adjacent CcmK1-4 hexamers, thereby facilitating precise assembly of the beta-carboxysome shell.
