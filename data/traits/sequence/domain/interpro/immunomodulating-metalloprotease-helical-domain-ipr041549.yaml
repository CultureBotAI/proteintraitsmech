identifier: InterPro:IPR041549
label: "Immunomodulating metalloprotease, helical domain"
definition: >-
  This entry represents the helical domain found N-terminal to the Ig domain in immunomodulating metalloprotease (impA). ImpA degrades several host immune system proteins, thereby subverting leukocyte-mediated defense mechanisms. It cleaves P-selectin glycoprotein ligand-1 (PSGL-1), a leukocyte cell-surface receptor essential for recruitment to sites of infection, leading to its functional inhibition. The protease also targets CD43 and CD44, which are similarly involved in leukocyte homing. By impairing these receptors, the enzyme prevents neutrophil extravasation, protecting Pseudomonas aeruginosa from neutrophil attack. Additionally, it inhibits decay-accelerating factor (CD55), though it does not affect the cell-surface receptors CD46 or CD31.
