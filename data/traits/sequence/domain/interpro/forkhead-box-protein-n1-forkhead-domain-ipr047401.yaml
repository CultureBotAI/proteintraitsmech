identifier: InterPro:IPR047401
label: "Forkhead box protein N1, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXN1 and similar sequences from vertebrates. The FH domain is a winged helix DNA-binding domain. Forkhead box protein N1 (FOXN1) acts as a transcriptional regulator which regulates the development, differentiation, and function of thymic epithelial cells (TECs), both in the prenatal and postnatal thymus. Loss of function of this transcription factor leads to the human counterpart of the nude mouse characterised by athymia with severe T cell immunodeficiency, congenital alopecia, and nail dystrophy. It has been reported that FOXN1 duplication leads to congenital hypertrichosis. It is also an important factor in controlling the skin wound healing process, as it actively participates in re-epithelialization and is responsible for scar formation.
