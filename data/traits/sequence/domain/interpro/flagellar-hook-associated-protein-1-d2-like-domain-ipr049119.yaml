identifier: InterPro:IPR049119
label: "Flagellar hook-associated protein 1, D2-like domain"
definition: >-
  This entry represents a β-sandwich domain from Flagellar hook-associated protein 1 (FlgK) and related bacterial proteins. The Salmonella typhimurium FlgK has one β-sandwich domain, while FlgK from Burkholderia pseudomallei has two of them protruding from the α-helical core, referred to as D2 and D3 domains in, of which the first one, D2, is covered in this entry. FlgK has cytotoxic effects suggesting an important role in pathogenesis and is highly immunogenic. Domains D2 and D3 from B. pseudomallei have been identified as epitopes with increased immunogenic potential for vaccine development. Flagellar hook-associated protein 1 (FlgK or HAP1) is one of three HAPs that form the hook-filament junction and has structural similarity to flagellin. FlgK is required for normal flagellum assembly. Proteins in this entry have a multidomain fold comprising an elongated α-helical scaffold core, and depending on the bacterial species, a variable number of smaller domains.
