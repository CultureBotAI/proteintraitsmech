identifier: InterPro:IPR040790
label: "Kindlin-2, N-terminal"
definition: >-
  This is the N-terminal domain (K2-N) of Kindlin-2 protein from humans. Kindlin-2 is a regulator for heterodimeric integrin adhesion receptors that promotes integrin activation. Activation depends on binding of the N-terminal domain to the integrin beta cytoplasmic tail (CT), which disrupts the receptors association with alpha-CT and triggers the conformational transitions in the receptor. K2-N contains a conserved positively charged surface that binds to membrane enriched with negatively charged phosphatidylinositol-(4,5)-bisphosphate (PIP2). K2-N is also very similar to the homologous kindlin-1 F0.
