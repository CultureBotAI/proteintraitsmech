identifier: InterPro:IPR037716
label: Rhodopsin kinase, catalytic domain
definition: >-
  This entry represents the catalytic domain of GRK1. Rhodopsin kinase (also known as G-protein-coupled Receptor Kinase 1, GRK1) is a retina-specific kinase involved in the signal turnoff via phosphorylation of rhodopsin (RHO), the G protein- coupled receptor that initiates the phototransduction cascade. Together with recoverin (a Ca2+-binding protein), GRK1 regulates cone phototransduction during photoreceptor light adaptation.
