identifier: InterPro:IPR017505
label: "Sortase B signal domain, NPQTN class"
definition: >-
  This entry represents one of the rare sortase signals, recognised by sortase B (SrtB) rather than by the housekeeping-type SrtA class sortase. This sequence, beginning NPQTN, shows little similarity to several other SrtB substrates.
