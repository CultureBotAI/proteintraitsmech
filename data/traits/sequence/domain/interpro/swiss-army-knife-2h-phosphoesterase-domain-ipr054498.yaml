identifier: InterPro:IPR054498
label: "Swiss Army Knife, 2H phosphoesterase domain"
definition: >-
  The Swiss Army Knife class of proteins features a diverse domain repertoire acting to repair RNA damaged in the wake of RNase attacks. 2H-SAK is one such domain, a phosphatase of the rhodanese-phosphatase superfamily. It is predicted to 'clean' RNA ends by removing phosphate groups, preparing them for ligation by their associating RNA ligases.
