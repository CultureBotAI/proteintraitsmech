identifier: InterPro:IPR057891
label: "KCTD7, BTB domain"
definition: >-
  This entry represents the BTB domain in KCTD7 proteins. KCTD7 is a BTB/POZ domain-containing protein that has an impact on K+ fluxes, neurotransmitter synthesis, and neuronal function. It functions as a regulator of potassium conductance in neurones and is involved in the control of excitability of cortical neurones. KCTD7 may be involved in the control of the excitability of cortical neurones. Mutations in KCTD7 may cause progressive myoclonus epilepsy (PME).
