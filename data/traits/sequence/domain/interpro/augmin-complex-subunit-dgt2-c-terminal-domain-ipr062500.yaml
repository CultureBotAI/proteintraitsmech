identifier: InterPro:IPR062500
label: "Augmin complex subunit dgt2, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in augmin complex subunit dgt2 found in Drosophila species. As part of the augmin complex, dgt2 plays a role in centrosome-independent generation of spindle microtubules. The complex is required for mitotic spindle assembly through its involvement in localising gamma-tubulin to spindle microtubules. The protein binds to microtubules in vitro. This domain contains a coiled-coil that mediates interaction with wac. The protein localises to the cytoplasm, cytoskeleton and spindle pole.
