identifier: InterPro:IPR060012
label: "Clampless protein 1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of CLP1 (Clampless protein 1), found predominantly in basidiomycete fungi. CLP1 is required for developmental progression after cells of opposite mating types fuse and is essential for dikaryotic filament formation and monokaryotic fruiting in Cryptococcus neoformans. The protein is a direct target of transcription factors Sxi1-alpha and Sxi2-a and is expressed abundantly under sexual development conditions. The protein contains N-linked glycosylation sites. The specific function of this C-terminal domain remains to be determined.
