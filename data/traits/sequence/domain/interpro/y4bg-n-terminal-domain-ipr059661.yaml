identifier: InterPro:IPR059661
label: "Y4bG, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Y4bG proteins found in Sinorhizobium and related rhizobia. The full-length protein is 271 amino acids and contains a signal peptide at positions 1-22. Y4bG is encoded on the symbiotic plasmid pNGR234a in Sinorhizobium fredii, a bacterium involved in nitrogen-fixing symbiosis with leguminous plants. The function of this N-terminal domain remains to be determined.
