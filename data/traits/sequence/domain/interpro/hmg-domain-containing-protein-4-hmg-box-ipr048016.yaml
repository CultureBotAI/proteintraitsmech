identifier: InterPro:IPR048016
label: "HMG domain-containing protein 4, HMG-box"
definition: >-
  HMG box-containing protein 4 (HMGXB4), also known as high mobility group protein 2-like 1 (HMG2L1), or protein HMGBCG, is a non-histone chromosomal protein that negatively regulates Wnt/beta-catenin signaling during development. It plays a role in the hematopoietic system. This entry represents the HMG-box of HMGXB4 and closely related proteins.
