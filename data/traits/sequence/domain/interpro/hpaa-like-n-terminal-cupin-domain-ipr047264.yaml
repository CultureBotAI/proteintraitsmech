identifier: InterPro:IPR047264
label: "HpaA-like, N-terminal cupin domain"
definition: >-
  This entry represents the N-terminal cupin domain of the AraC/XylS family of transcriptional regulators similar to Escherichia coli 4-hydroxyphenylacetate catabolism regulatory protein HpaA ( , also known as 4HPA). These proteins recognise aromatic effectors. Members of this group of proteins, which are predominantly found in proteobacteria, also contain a C-terminal AraC/XylS family helix-turn-helix (HTH) DNA-binding domain and belong to the cupin superfamily with a conserved "jelly roll-like" β-barrel fold capable of homodimerization.
