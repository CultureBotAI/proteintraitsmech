identifier: InterPro:IPR022043
label: "Chromatin assembly factor 1 subunit A, dimerization domain"
definition: >-
  The CAF-1 or chromatin assembly factor-1 consists of three subunits, p150, p60 and p48 and this entry includes the largest, p150 or A. Subunit p150 is uniquely required for the progression of S phase in mouse cells, independent of its ability to promote histone deposition but dependent on its ability to interact with HP1 - heterochromatin protein 1-rich heterochromatin domains next to centromeres that are crucial for chromosome segregation during mitosis. It contains a HP1-CAF-1 interaction module that functions as a built-in replication control for heterochromatin, which, like a control barrier, has an impact on S-phase progression in addition to DNA-based checkpoints. p150 plays a key role in embryonic development. This entry represents the dimerization domain of p150.
