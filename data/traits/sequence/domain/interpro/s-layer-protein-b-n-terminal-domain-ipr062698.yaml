identifier: InterPro:IPR062698
label: "S-layer protein B, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of S-layer protein B (SlaB) found in Sulfolobales archaea. SlaB is a component of the surface layer (S-layer) that forms a protective quasi-crystalline protein coat on the archaeal cell surface. The mushroom-shaped unit cells of Sulfolobales S-layers consist of three SlaB subunits and six SlaA subunits. SlaB contains consecutive β-sandwich domains at the N terminus, followed by a coiled-coil domain and a C-terminal transmembrane helix that anchors the complex to the cell membrane. The S-layer plays a role in cell division by flattening the cytokinetic furrow.
