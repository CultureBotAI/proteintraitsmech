identifier: InterPro:IPR064051
label: "UBR7-like, PHD finger"
definition: >-
  UBR7, also termed N-recognin-7, is a UBR box-containing protein that belongs to the E3 ubiquitin ligase family. It recognises N-degrons or structurally related molecules for ubiquitin-dependent proteolysis or related processes through the UBR box domain. In addition to the UBR box, UBR7 contains a PHD domain, represented by this entry. This domain is also found at the N-terminal of human Lysine-specific demethylase 7A (KDM7A), which is required for brain development. Specifically demethylates dimethylated 'Lys-9', 'Lys-27' and 'Lys-36' (H3K9me2, H3K27me2, H3K36me2, respectively) of histone H3 and monomethylated histone H4 'Lys-20' residue (H4K20Me1), thereby playing a central role in histone code.
