identifier: InterPro:IPR053930
label: "RapZ-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal P-loop kinase domain of RNase adapter protein RapZ and related proteins. RapZ plays a central role in RNA-mediated regulation of amino-sugar metabolism. It is a RNA-binding protein that recruits the major endoribonuclease RNase E to sRNAs GlmZ.
