identifier: InterPro:IPR015188
label: "BRCA2, OB3"
definition: >-
  BRCA2 participates in homologous recombination-mediated repair of double-strand DNA breaks. It stimulates the displacement of Replication protein A (RPA), the most abundant eukaryotic ssDNA binding protein. Mutations that map throughout the BRCA2 protein are associated with breast cancer susceptibility. BRCA2 is a large nuclear protein and its most conserved region is the C-terminal BRCA2DBD. BRCA2DBD binds ssDNA in vitro, and is composed of five structural domains, three of which are OB folds (OB1, OB2, and OB3). BRCA2DBD OB2 and OB3 are arranged in tandem, and their mode of binding can be considered qualitatively similar to two OB folds of RPA1, DBD-A and DBD-B (the major DBDs of RPA). This entry represents OB3, which consists of a highly curved five-stranded β-sheet that closes on itself to form a β-barrel. OB3 has a pronounced groove formed by one face of the curved sheet and is demarcated by two loops, one between β1 and β2 and another between β4 and β5, which allows for strong ssDNA binding.
