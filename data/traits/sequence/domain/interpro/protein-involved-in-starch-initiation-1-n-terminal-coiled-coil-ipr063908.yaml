identifier: InterPro:IPR063908
label: "Protein involved in starch initiation 1, N-terminal coiled-coil"
definition: >-
  This entry represents a coiled-coil region found at the N-terminal of protein involved in starch initiation 1 (PII1), also known as myosin-resembling chloroplast protein (MRC) from plants. PII1 contains multiple coiled-coil regions. PII1 is required for the initiation of starch granule biosynthesis in leaf chloroplasts and interacts with PTST2 and SS4 proteins. The protein localises to distinct puncta within chloroplasts and is found in the soluble protein fraction of leaves. While PII1 is involved in starch granule initiation and determining granule number and size, the specific function of this coiled-coil domain remains to be determined.
