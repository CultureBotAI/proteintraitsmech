identifier: InterPro:IPR037943
label: "Nitrate reductase alpha subunit-like, MopB domain"
definition: >-
  This entry represents the C-terminal molybdopterin dinucleotide-binding (MopB) domain of respiratory nitrate reductase A (NarGHI) alpha chain (NarG) and related proteins. Under anaerobic conditions in the presence of nitrate, E. coli synthesizes the cytoplasmic membrane-bound quinol-nitrate oxidoreductase (NarGHI), which reduces nitrate to nitrite and forms part of a redox loop generating a proton-motive force. Found in prokaryotes and some archaea, NarGHI usually functions as a heterotrimer. The alpha chain contains the molybdenum cofactor-containing Mo-bisMGD catalytic subunit.
