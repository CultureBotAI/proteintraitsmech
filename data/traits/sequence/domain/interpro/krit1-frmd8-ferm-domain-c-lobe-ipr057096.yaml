identifier: InterPro:IPR057096
label: "KRIT1/FRMD8, FERM domain C-lobe"
definition: >-
  KRIT1, also known as CCM1, a Rap1-binding protein, is expressed in endothelial cells where it is present in cell-cell junctions and associated with junctional proteins. Together with CCM2/MGC4607 and CCM3/PDCD10, KRIT1 constitutes a set of proteins whose mutations are found in cerebral cavernous malformations, characterised by cerebral hemorrhages and vascular malformations in the central nervous system. KRIT1 localization is mediated by its FERM domain. This entry represents the FERM domain C-lobe (or F3 subdomain). This entry also includes the paralogue of KRIT1, FRMD8, a protein that promotes the cell surface stability of iRhom1/RHBDF1 and iRhom2/RHBDF2 and prevents their degradation via the endolysosomal pathway. By acting on iRhoms, FRMD8 is involved in ADAM17-mediated shedding of TNF, amphiregulin/AREG, HBEGF, and TGFA from the cell surface. This entry also includes some fungal putative FERM-containing proteins. Although there is not yet a characterised FERM-containing protein in fungi, the FERM domain first appeared in the ancestors of todays myosin and talin proteins during the separation of plants and Amorphea (amoebae, fungi, and animals).
