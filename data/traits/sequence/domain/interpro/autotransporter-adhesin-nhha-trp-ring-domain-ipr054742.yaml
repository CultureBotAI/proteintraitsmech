identifier: InterPro:IPR054742
label: "Autotransporter adhesin NhhA, Trp-ring domain"
definition: >-
  This domain is found in autotransporter adhesin NhhA from Haemophilus influenzae (also known as Hia) and similar proteins predominantly from proteobacteria. Hia is a trimeric autotransporter that mediates bacterial adherence to the respiratory epithelium. This protein shows a modular architecture with repeats of structurally distinct domains. This entry represents one of the Trp-ring domains.
