identifier: InterPro:IPR058514
label: "Domain of unknown function DUF8201"
definition: >-
  This entry represents uncharacterised bacterial proteins. These proteins are highly hydrophobic and contain a conserved DxxxY sequence motif. Some proteins have a sequence similarity to members of the Glycosyl transferase GT-C superfamily and are predicted to fold into similar structures, suggesting they may be glycosyltransferases.
