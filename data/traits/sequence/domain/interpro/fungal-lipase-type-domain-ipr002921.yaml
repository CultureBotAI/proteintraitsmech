identifier: InterPro:IPR002921
label: Fungal lipase-type domain
definition: >-
  This entry represents a domain with an α/β hydrolase fold found in a group of proteins from eukaryotes and bacteria, including Feruloyl esterase A from Aspergillus niger, Triacylglycerol lipase OBL1 from Arabidopsis thaliana, human Diacylglycerol lipase-alpha, Toxin TseL from Vibrio cholerae. It is similar to that found in fungal lipases.
