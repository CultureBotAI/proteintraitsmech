identifier: InterPro:IPR040930
label: "AF-9, ANC1 homology domain"
definition: >-
  This entry corresponds to the ANC1 homology domain (AHD) found in AF-9. AF-9 is a chromatin reader component of the super elongation complex (SEC), a complex required to increase the catalytic rate of RNA polymerase II transcription by suppressing transient pausing by the polymerase at multiple sites along the DNA. Proteins containing this domain also include ENL (also known as MLLT1), which is also a component of the super elongation complex.
