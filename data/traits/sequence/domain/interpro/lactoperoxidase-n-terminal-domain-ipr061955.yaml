identifier: InterPro:IPR061955
label: "Lactoperoxidase, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of human Lactoperoxidase (LPO) and similar proteins from vertebrates. LPO is responsible for the inactivation of a wide range of micro-organisms and hence, it is an important component of defence mechanism. This domain, which is usually found associated with , adopts an all-α configuration.
