identifier: InterPro:IPR055012
label: "Tag1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of yeast Tag1 (also known as YLR173W). Tag1 is a vacuolar membrane protein involved in termination of autophagy. It regulates autophagy termination during persistent nitrogen starvation through Atg1p-mediated re-phosphorylation of Atg13p and PAS disassembly. It shows homology to LEA-2 domain, and together with TMEM106B from humans and Vac7 from yeast, are all predicted to be lipid transfer proteins. Tag1 has 3 tandemly repeated LEA-2 domains.
