identifier: InterPro:IPR062917
label: "Iron permease-associated, 4-helix bundle domain"
definition: >-
  This entry represents a 4-helix bundle domain of approximately 115 residues. The domain is found in proteins that often contain the FTR1 iron permease domain ( ). These proteins are involved in high-affinity iron transport. This family is found predominantly in Pseudomonadota. The specific function of this domain remains to be determined.
