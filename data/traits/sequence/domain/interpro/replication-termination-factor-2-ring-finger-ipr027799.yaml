identifier: InterPro:IPR027799
label: "Replication termination factor 2, RING-finger"
definition: >-
  This entry represents the RING-finger domain of Replication termination factor 2 from Schizosaccharomyces pombe (Rtf2) and similar eukaryotic proteins. This RING finger-like structure forms only one functional Zn2+ ion-binding site. The site-specific replication barrier RTS1 terminates replication forks that are moving in the cen2-distal direction while allowing forks moving in the cen2-proximal direction to pass through the region. Rtf2 was thought to stabilise the replication fork stalled at the RTS1 element by preventing replication restart until completion of DNA synthesis by a converging replication fork initiated at a flanking origin. However, this protein has been later reported to be associated with mRNA processing and splicing factors, and essential for the correct splicing of the rtf1 transcript, necessary for a functional Rtf1 protein (Replication Termination Factor 1) and thus for RTS activity. Its human homologue has been reported essential for the ability of cells to manage replication stress.
