identifier: InterPro:IPR027625
label: "Putative 4-mercaptohistidine N1-methyltranferase, OvoA C-terminal domain"
definition: >-
  Ovothiol A is an N1-methyl-4-mercaptohistidine. Ovothiols are efficient scavengers of radicals and peroxides with possible roles in the redox defense of a number of organisms. An ovothiol biosynthetic enzyme (OvoA) has been identified in Erwinia tasmaniensis and Trypanosoma cruzi, with homologous enzymes encoded in more than 80 genomes ranging from proteobacteria to animalia. OvoA has 5-histidylcysteine sulfoxide synthase activity. In the absence of S-adenosylmethione, a methyl donor, the intermediate produced is 4-mercaptohistidine. The enzymes of Erwinia tasmaniensis, Trypanosoma cruzi and most homologues share an additional C-terminal methyltransferase domain. Thus OvoA may be a bifunctional enzyme with 5-histidylcysteine sulfoxide synthase and 4-mercaptohistidine N1-methyltranferase activity. This entry describes the C-terminal putative 4-mercaptohistidine N1-methyltranferase domain.
