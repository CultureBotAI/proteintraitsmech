identifier: InterPro:IPR005309
label: "PapG, chaperone-binding"
definition: >-
  PapG, the adhesin of the P-pili, is situated at the tip and is only a minor component of the whole pilus structure. A two-domain structure has been postulated for PapG; a carbohydrate-binding N-terminal and chaperone binding C-terminal (this domain). The chaperone-binding domain is highly conserved and is essential for the correct assembly of the pili structure when aided by the chaperone molecule PapD. This entry is found in entereobacterales.
