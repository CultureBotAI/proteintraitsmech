identifier: InterPro:IPR046910
label: "E2-E1 middle domain"
definition: >-
  Certain prokaryotic Ubiquitin systems contain this domain between E2 and E1 fusion proteins. Many of these systems are secondary effector modules associating with nucleotide-activated effector systems.
