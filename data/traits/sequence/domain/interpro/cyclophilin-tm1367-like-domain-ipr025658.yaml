identifier: InterPro:IPR025658
label: "Cyclophilin TM1367-like domain"
definition: >-
  This entry represent a TM1367-type cyclophilin-like domain. The crystal structure of protein TM1367 from Thermotoga maritima revealed an atypical cyclophilin (peptidylprolyl isomerase) fold. The catalytic site found in human cyclophilin is not conserved in this domain, suggesting a different function for this domain.
