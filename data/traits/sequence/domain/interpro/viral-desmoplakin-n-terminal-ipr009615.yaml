identifier: InterPro:IPR009615
label: "Viral desmoplakin, N-terminal"
definition: >-
  This entry represents the N terminus of viral desmoplakin. Desmoplakin is a component of mature desmosomes, which are the main adhesive junctions in epithelia and cardiac muscle. Desmoplakin is also essential for the maturation of adherens junctions. Note that many family members are hypothetical.
