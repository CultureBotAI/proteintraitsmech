identifier: InterPro:IPR062949
label: "CdgR-like, three-helical bundle domain"
definition: >-
  This entry represents a three-helical bundle domain that can be found at the N-terminal in CdgR ( ) (cyclic di-GMP receptor) proteins in cyanobacteria. CdgR is a c-di-GMP binding effector that controls cell size in Anabaena; the apo-form of CdgR interacts with the transcription factor DevH to regulate cell size, and this interaction is inhibited by c-di-GMP binding. The crystal structure of the Synechocystis homologue ( ) shows that CdgR forms a dimer with an X-shaped structure; each subunit consists of this flexible N-terminal three-helical bundle connected by a linker to a C-terminal four-helical domain related to ComFB ( ). The c-di-GMP binding pocket is located at the dimer interface formed by the C-terminal domain. This domain can also be found in its own in proteins annotated as Acetylglutamate kinases and at the C-terminal in putative glycosyl transferase proteins.
