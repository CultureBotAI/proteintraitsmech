identifier: InterPro:IPR001962
label: "Asparagine synthase"
definition: >-
  Most family members that contain this domain catalyse the conversion of aspartate to asparagine. Asparagine synthetase [glutamine-hydrolyzing] (ASNS, ) catalyses the assembly of asparagine from aspartate, Mg(2+)ATP, and glutamine. The three-dimensional architecture of the N-terminal domain of asparagine synthetase B is similar to that observed for glutamine phosphoribosylpyrophosphate amidotransferase while the molecular motif of the C-domain is reminiscent to that observed for GMP synthetase. This domain is also found in Asparagine synthetase domain-containing protein 1 from Mus musculus (ASND1), which is associated with a progressive degenerative myopathy.
