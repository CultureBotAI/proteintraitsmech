label: Arterivirus Nsp2, peptidase C33
definition: >-
  Arteriviruses are enveloped, positive-stranded RNA viruses and include pathogens of major economic concern to the swine- and horse-breeding industries: Equine arteritis virus (EAV). Porcine reproductive and respiratory syndrome virus (PRRSV). Mice actate dehydrogenase-elevating virus. Simian hemorrhagic fever virus. The arterivirus cysteine protease (AV CP) is the most carboxyl-terminally located member of the array of three cysteine proteinase domains present in the amino-terminal 500 residues of the replicase polyproteins. The AV CP is located in the amino-terminal region of nsp2 and is highly conserved among arteriviruses. The cleavage of the nsp2|3 junction appears to be the single processing step mediated by the AV CP. For EAV, it has been shown that cleaved nsp2 is an essential co-factor for cleavage of the nsp4|6 site by the nsp4 proteinase domain. The AV CP is an unusual Cys protease with amino acid sequence similarities to both papain-like and chymotrypsin-like proteases. The catalytic dyad is composed of Cys and His residues. The AV CP domain forms MEROPS peptidase family C33. The entire AV CP domain is highly conserved among arteriviruses. Among the conserved residues are a number of cysteines and one aspartate residues. A cysteine peptidase is a proteolytic enzyme that hydrolyses a peptide bond using the thiol group of a cysteine residue as a nucleophile. Hydrolysis involves usually a catalytic triad consisting of the thiol group of the cysteine, the imidazolium ring of a histidine, and a third residue, usually asparagine or aspartic acid, to orientate and activate the imidazolium ring. In only one family of cysteine peptidases, is the role of the general base assigned to a residue other than a histidine: in peptidases from family C89 (acid ceramidase) an a…
