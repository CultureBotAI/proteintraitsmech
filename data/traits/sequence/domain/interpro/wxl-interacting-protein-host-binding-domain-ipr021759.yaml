identifier: InterPro:IPR021759
label: "WxL Interacting Protein, host binding domain"
definition: >-
  This entry represents a domain found in WxL interacting proteins (WxLIP) which play a role in virulence and are widely distributed in firmicutes. The WxL proteins usually occur within a gene cluster that contains two WxL proteins and a WxL interacting protein composed of three domains: peptidoglycan binding domain (PGBD), host binding domain (HBD), and transmembrane helix (TMH). The domain represented by this entry, previously known as DUF3324, is likely to interact with proteins on the surface of eukaryotic host endothelial cells. This HBD domain is frequently found in combination with PGBD domain ( ) and both were shown to function synergistically as a single unit that binds to the peptidoglycan and interacts with the eukaryotic host. The HBD domain is predicted to adopt a β-sandwich with an Ig-like topology.
