identifier: InterPro:IPR003709
label: D-alanyl-D-alanine carboxypeptidase-like, core domain
definition: >-
  This entry represents the common core domain found in D-alanyl-D-alanine carboxypeptidases (DD-CPases) and related proteins from the MEROPS peptidase M15 family mostly found in bacteria. This domain features a central twisted antiparallel β-sheet (β1-β6) flanked by two pairs of three α-helices (α2, α3, α6, and α1, α5, α7) on the two faces of the β-sheet. D-alanyl-D-alanine carboxypeptidases (DD-CPases) are bacterial enzymes crucial for cell wall biosynthesis and peptidoglycan remodelling. DD-CPases catalyse the removal of terminal D-alanine from peptidoglycan precursors, influencing cell wall structure, antibiotic resistance, and spore formation. D-alanyl-D-alanine carboxypeptidase (VanY) from Enterococcus faecium cleaves the C-terminal D-alanine residue of UDP-muramyl-pentapeptide or diacetyl-L-Lys-D-Ala-D-Ala and releases the C-terminal D-lactate from UDP-MurNAc-L-Ala-D-Glu-mDAP-D-Ala-D-lactate, a depsipeptide produced by the vancomycin resistance protein VanA. Carboxypeptidase YodJ, a specific DD-CPase, plays a role in peptidoglycan maturation and spore development. It releases D-Ala from peptidoglycan precursors, affecting substrate availability for crosslinking and modulating spore resistance and germination. The VanX protein, a D-alanyl-D-alanine dipeptidase, is crucial in vancomycin resistance mechanisms. It hydrolyzes D-Ala-D-Ala dipeptides, reducing the availability of vancomycin-binding targets in the cell wall. The bifunctional VanXYC protein combines D-Ala-D-Ala dipeptidase and D-Ala-D-Ala carboxypeptidase activities. This dual functionality allows for efficient modification of peptidoglycan precursors, contributing to vancomycin resistance in some bacterial strains.
