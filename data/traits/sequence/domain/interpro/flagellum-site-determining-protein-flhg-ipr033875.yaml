identifier: InterPro:IPR033875
label: "Flagellum site-determining protein FlhG"
definition: >-
  FlhG (also annotated FleN/YlxH) is an ATPase that regulates location and number of bacterial flagella. FlhG acts antagonistically with FlhF/FleQ to regulate the number of polar flagella, with FlhF promoting flagellar assembly and FlhG inhibiting it. FlhG interacts with FlhF and influences its GTPase activity. FlhG and FlhF are responsible for generating the single polar flagellum of Pseudomonas sps and Vibrio cholerae. In these bacteria, FlhG represses the activity or expression of a master transcriptional regulator, FleQ in the case of Pseudomonas. Campylobacter jejuni FlhG likely influences a flagellar biosynthetic step to control flagellar number, rather than suppressing activators of flagellar gene transcription as in Vibrio and Pseudomonas species. On the peritrichous bacterium Bacillus subtilis, FlhF and FlhG function together to spatially organize flagella in a defined grid-like pattern around the cellular midpoint, but not at polar regions.
