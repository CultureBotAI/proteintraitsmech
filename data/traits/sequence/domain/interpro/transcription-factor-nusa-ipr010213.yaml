identifier: InterPro:IPR010213
label: Transcription factor NusA
definition: >-
  This entry describes NusA. This entry represents a region of NusA shared by all bacterial forms, and includes the S1 ( ) and KH RNA binding domains. Proteobacterial forms have an additional C-terminal region, not included in this entry, with two repeats of 50-residue domain rich in acidic amino acids. NusA is involved in transcriptional pausing, termination and anti-termination. NusA from Thermotoga maritima contains an N-terminal domain and three RNA-binding domains (one S1 domain and two KH domains ). The N-terminal domain consists of a bifurcated coiled β-sheet within an α/β(3)/α/β/α fold, which can be divided into two subdomains: a globular head and a helical body. The globular head subdomain may interact with RNA polymerase, while the helical body displays a similar structure to that of the helical domain in sigma70.
