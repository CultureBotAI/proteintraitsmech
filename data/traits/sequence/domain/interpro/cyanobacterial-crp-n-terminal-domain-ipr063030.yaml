identifier: InterPro:IPR063030
label: "Cyanobacterial CRP, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of CRP family of transcription factors found in cyanobacteria. This domain is always found N-terminal to the HTH_Crp_2 ( ) and Crp ( ) DNA-binding domains. Structural analysis suggests similarity to cyclic nucleotide-binding domains. In Prochlorococcus marinus, the gene PMM0806 encoding this protein shows 44-fold increased expression under CO2 limitation.
