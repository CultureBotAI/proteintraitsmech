identifier: InterPro:IPR002818
label: DJ-1/PfpI-like
definition: >-
  The domain is found in intracellular cysteine peptidase PfpI and other members of the DJ-1/ThiJ/PfpI superfamily. Some of these have been characterised: Pyrococcus horikoshii PH1704, which has both aminopeptidase and endopeptidase activity. Arabidopsis thaliana DJ1D, which has glyoxalase I activity. Candida albicans glyoxalase 3. It is also found in transcriptional regulators in combination with a HTH (araC) domain, such as in Pseudomonas aeruginosa cdhR.
