identifier: InterPro:IPR012893
label: "HipA-like, C-terminal"
definition: >-
  The members of this entry are similar to a region close to the C terminus of the HipA protein expressed by various bacterial species (for example ). This protein is known to be involved in high-frequency persistence to the lethal effects of inhibition of either DNA or peptidoglycan synthesis. When expressed alone, it is toxic to bacterial cells, but it is usually tightly associated with HipB, and the HipA-HipB complex may be involved in autoregulation of the hip operon. The hip proteins may be involved in cell division control and may interact with cell division genes or their products. The domain is also found in the serine/threonine-protein kinase CtkA from Helicobacter pylori which is important in induction of host inflammation by inducing release of cytokines such as TNF-alpha and IL-8 by phosphorylation of NF-kappa-B.
