identifier: InterPro:IPR048657
label: "GREB1-like, circularly permuted SF2 helicase domain"
definition: >-
  This entry represents a circularly-permuted Superfamily 2 helicase found N-terminal to the Glycosyltransferase domain in eukaryotic GREB1-like proteins. Some versions, such as the human GREB1 and GREB1L are predicted to be inactive.
