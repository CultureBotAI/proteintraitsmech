identifier: InterPro:IPR001788
label: RNA-dependent RNA polymerase, alsuviricetes
definition: >-
  This entry represents the C-terminal domain of RNA dependent RNA polymerases found in Alsuviricetes class of positive-strand RNA viruses that infect eukaryotes, including those with a tripartite genome (RNA1, RNA2 and RNA3) and an encapsidated subgenomic RNA (RNA4) from which the coat protein is expressed, such as Cucumber mosaic virus (strain NT9) (CMV). This entry contains the following proteins: Viral RNA-directed RNA polymerase 2A (protein 2A). Replicase large subunit (also known as RNA-directed RNA polymerase) from Tobacco mosaic virus. Polyprotein P1234 (also known as Non structural polyprotein) from Alphavirus. In alphavirus, this region comprises the RdRp domain, which adopts the characteristic right-hand fold of viral RdRps, where fingers-palm-thumb subdomains are sequentially arranged from the amino-to-carboxylic ends.
