identifier: InterPro:IPR013177
label: "Ribosomal protein bS22, C-terminal"
definition: >-
  This domain is found at the C-terminal of small ribosomal subunit protein bS22m (formerly known as mS38; also called COX24 in yeast). The mitochondrial protein bS22m shares sequence homology with bacterial bS22, particularly in the N-terminal region, leading to its renaming to reflect their common evolutionary origin. This domain is also found in the bacterial small ribosomal subunit protein bS22, which occupies a similar position beneath the mRNA channel and interacts with 16S rRNA helix 44 to stabilise the decoding centre. In some proteins this domain convers the whole length of the protein. bS22m is a component of the mitochondrial ribosome (mitoribosome), responsible for the synthesis of mitochondrial genome-encoded proteins, including essential transmembrane subunits of the mitochondrial respiratory chain. Mitoribosomes are attached to the mitochondrial inner membrane, and translation products are cotranslationally integrated into the membrane. In mammals, bS22m preferentially stimulates translation initiation of COX1, COX2, and COX3 mRNAs. In yeast, bS22m is also involved in the splicing of the COX1 mRNA.
