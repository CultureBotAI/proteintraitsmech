identifier: InterPro:IPR048745
label: "Toxin CdiA-like, helical domain"
definition: >-
  This entry represents the helical domain of deoxyribonuclease CdiA (also known as CdiA toxin), a toxin of the Contact-dependent growth inhibition (CDI) system. EC869 appears to function as a Zn2-dependent DNAse degrading the genome of target cells.
