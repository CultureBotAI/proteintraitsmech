identifier: InterPro:IPR037671
label: GPI ethanolamine phosphate transferase 1, N-terminal
definition: >-
  GPI ethanolamine phosphate transferase 1 (also known as PIGN) is an ethanolamine phosphate transferase involved in glycosylphosphatidylinositol-anchor biosynthesis. It catalyzes the transfer of ethanolamine phosphate to the first alpha-1,4-linked mannose of the glycosylphosphatidylinositol precursor of GPI-anchor. It may act as suppressor of replication stress and chromosome missegregation. This entry represents the N-terminal domain of PIGN.
