identifier: InterPro:IPR031717
label: "2-oxoglutarate dehydrogenase E1 component/KDG, C-terminal"
definition: >-
  This domain is found immediately C-terminal to the transketolase-like pyrimidine-binding domain. It is found at the C terminus of 2-oxoglutarate dehydrogenase E1 component (ODO1) and the multifunctional 2-oxoglutarate metabolism enzyme Kgd and it has been described as α/β3 domain.
