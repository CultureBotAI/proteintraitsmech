identifier: InterPro:IPR061585
label: "Domain of unknown function DUF8515"
definition: >-
  This entry represents a conserved domain of unknown function found in the Spirochaetes, including species of Treponema, Borrelia, and Spirochaeta. The domain is approximately 150-200 residues long. Analysis of AlphaFold models reveals this domain is typically followed by a larger C-terminal domain (approximately 200-280 residues) that shares no significant overlap with other Pfam families. The function of this domain remains to be determined.
