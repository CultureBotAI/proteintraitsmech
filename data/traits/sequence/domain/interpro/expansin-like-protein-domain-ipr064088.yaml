identifier: InterPro:IPR064088
label: "Expansin-like protein domain"
definition: >-
  This entry represents a domain found in expansin-like proteins from Dictyostelium discoideum and related amoebas and some plant uncharacterised sequences. Some of these proteins, in which this domain appears at the C-terminal end, belong to the expansin family but are unlikely to encode proteins with typical expansin activity. Expansin-like proteins in Dictyostelium with this domain centrally located are secreted or membrane-associated and may serve to lubricate cellulose microfibril movement during cell growth and wall extension. Some family members are expressed during development, particularly at the migrating slug stage. The specific function of this domain remains to be determined. Some of these proteins also contain a C-terminal domain and/or a N-terminal domain .
