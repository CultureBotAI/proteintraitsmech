identifier: InterPro:IPR030698
label: "Band 4.1-like protein 4B, FERM domain, F1 sub-domain"
definition: >-
  Band 4.1-like protein 4B (EHM2) belongs to the protein 4.1 family. Members of the 4.1 family contain a FERM (4.1/Ezrin/radixin/moesin) domain, which is involved in the linkage of cytoplasmic proteins to the membrane. EHM2 shows highest homology to band 4.1-like protein 4A (NBL4), which may be involved in the cell polarity determination or proliferation. EHM2 is expressed in high-metastatic K1735 murine melanoma cells. The FERM domain of EHM2 is made up of three sub-domains, F1, F2, and F3. This entry represents the N-terminal F1 subdomain.
