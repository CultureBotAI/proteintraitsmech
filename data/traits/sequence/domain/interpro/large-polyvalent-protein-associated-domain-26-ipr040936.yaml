identifier: InterPro:IPR040936
label: "Large polyvalent protein associated domain 26"
definition: >-
  This is a small α-helical domain with two acidic residues conserved in a predicted loop between two of its helices. The domain is mainly found in polyvalent proteins of conjugative elements.
