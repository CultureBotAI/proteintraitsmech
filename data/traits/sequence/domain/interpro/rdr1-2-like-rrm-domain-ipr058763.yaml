identifier: InterPro:IPR058763
label: "RDR1/2-like, RRM domain"
definition: >-
  This RRM domain is found N-terminal in the RNA-dependent RNA polymerase 1 and 2 (RDR1, RDR2) from Arabidopsis thaliana and related plant proteins. RDR1/2 are involved in the production of small interfering RNAs (siRNAs). RDR1 is involved in antiviral silencing, amplifying silencing signals during viral infections. RDR2 binds to single-stranded RNA (ssRNA), engages ssRNAs longer than 7 nucleotides and initiates internal to their 3' ends. RDR2 is non-functional in the absence of associated Pol IV.
