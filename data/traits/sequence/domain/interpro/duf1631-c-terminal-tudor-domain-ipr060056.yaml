identifier: InterPro:IPR060056
label: "DUF1631, C-terminal tudor domain"
definition: >-
  This entry represents the C-terminal domain found in DUF1631 family proteins. This domain structurally resembles a tudor domain. The members of this family are sequences derived from a group of hypothetical proteins expressed by certain beta and gammaproteobacterial species.
