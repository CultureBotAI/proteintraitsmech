identifier: InterPro:IPR047953
label: "Bone morphogenetic protein 2, TGF-beta-like domain"
definition: >-
  This entry represents the transforming growth factor beta (TGF-beta)-like domain found in bone morphogenetic protein 2 (BMP-2) and similar proteins from vertebrates. BMP-2, also termed BMP-2A, induces cartilage and bone formation. It stimulates the differentiation of myoblasts into osteoblasts via the EIF2AK3-EIF2A- ATF4 pathway.
