identifier: InterPro:IPR059092
label: "Cj0371 chemotaxis-regulating polar lipoprotein"
definition: >-
  This entry represents a globular α/β domain found in UPF0323 family lipoproteins including Cj0371 chemotaxis-regulating polar lipoprotein which has a negative influence on C. jejuni chemotaxis. It may occur by adjusting the receiver domain of CheV to influence chemotaxis.
