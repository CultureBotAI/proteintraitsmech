identifier: InterPro:IPR054158
label: "B12-dependent ribonucleotide reductase, insertion domain"
definition: >-
  This entry represents the insertion domain of adenosylcobalamin-dependent ribonucleoside-triphosphate reductases (class II RNRs) from Lactococcus leichmannii and related sequences. RNR's are responsible for the conversion of the ribose sugar of RNA into the deoxyribose sugar of DNA, a rate-limiting step of DNA biosynthesis. RNRs are classified in class I, II and III. Class II RNRs are less complex and function as a monomer in contrast to class I and III RNRs, which controls substrate specificity as efficiently as a multimeric enzymes. This insertion domain provides the interface responsible for effector binding that, in oligomeric RNRs, is formed in the dimer interface.
