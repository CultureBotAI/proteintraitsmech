identifier: InterPro:IPR059454
label: "Domain of unknown function DUF8410"
definition: >-
  This domain is found in a group of uncharacterised proteins mainly found in actinomycetes. This domain, which contains highly conserved W, D, G residues and a conserved motif FxHRHR, is predicted to form an antiparallel β sheet and α helices. Bet_v_1 domains contain a hydrophobic ligand-binding pocket. The specific function of this family is unknown.
