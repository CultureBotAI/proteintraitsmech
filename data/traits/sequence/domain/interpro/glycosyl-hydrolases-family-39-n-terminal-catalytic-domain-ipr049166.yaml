identifier: InterPro:IPR049166
label: "Glycosyl hydrolases family 39, N-terminal catalytic domain"
definition: >-
  This entry represents the N-terminal catalytic domain of Glycoside hydrolase family 39 proteins. Glycoside hydrolase family 39 comprises enzymes with several known activities such as alpha-L-iduronidase, beta-xylosidase, and alpha-1,4-L-rhamnosidase. The most highly conserved regions in these enzymes are located in their N-terminal parts. These contain a glutamic acid residue which, on the basis of similarities with other families of glycosyl hydrolases, probably acts as the proton donor in their catalytic mechanism.
