identifier: InterPro:IPR061190
label: "Bdr, N-terminal domain"
definition: >-
  Bdr (Borrelia direct repeat) proteins have an N-terminal domain, a variable length region of repeats, typically 11 amino acids long with a KID repeat, and a non-repetitive C-terminal domain. This entry represents the conserved N-terminal domain of families other than BdrA, BdrB, and BdrC, which are described by the related entry .
