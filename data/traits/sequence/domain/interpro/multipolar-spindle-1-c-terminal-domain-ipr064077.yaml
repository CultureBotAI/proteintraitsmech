identifier: InterPro:IPR064077
label: "Multipolar spindle 1, C-terminal domain"
definition: >-
  This entry represents the conserved C-terminal domain of multipolar spindle 1 (MPS1) proteins, also known as PRD2 (putative recombination initiation defects 2). MPS1 is mainly found in flowering plants. In Arabidopsis thaliana, MPS1 is involved in meiotic spindle organisation in meiocytes, regulating chromosome segregation. MPS1 is also required for formation of meiotic DNA double-strand breaks during early recombination processes. The protein localises to the nucleus and the spindle. The specific function of this domain remains to be determined.
