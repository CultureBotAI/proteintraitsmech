identifier: InterPro:IPR056631
label: "N4BP1, UBA-like domain"
definition: >-
  This domain is found in the human NEDD4-binding protein 1 (N4BP1) and related proteins. It has a significant sequence and structural similarity to UBA domains. This domain is predicted to adopt a globular structure consisting of a three helical bundle. N4BP1 is a potent suppressor of cytokine production that acts as a regulator of innate immune signalling and inflammation. It acts as a restriction factor against some viruses, such as HIV-1. N4BP1 restricts HIV-1 replication by binding to HIV-1 mRNAs and mediating their degradation via its ribonuclease activity.
