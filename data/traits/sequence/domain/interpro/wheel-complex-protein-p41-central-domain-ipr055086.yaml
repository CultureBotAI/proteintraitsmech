identifier: InterPro:IPR055086
label: "Wheel complex protein P41, central domain"
definition: >-
  This domain is found in the organelle protein Wheel complex protein P41 (MG491) from Mycoplasma genitalium. MG491 plays a key role in the functioning, organisation and stabilisation of the terminal organelle, a protrusion of the bacterial cell membrane responsible for its flask-shaped morphology. This protein is organised into a 60-residue N-terminal, a central three α-helical bundle (this entry) and a C-terminal region.
