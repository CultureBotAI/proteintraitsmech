identifier: InterPro:IPR049154
label: "ExoU toxin, C-terminal domain"
definition: >-
  This domain is found in the toxin ExoU from Pseudomonas aeruginosa ( ) and similar sequences mainly found in Gammaproteobacteria. ExoU, an effector of the type III secretion system of the bacteria, is a patatin-like phospholipase that binds to the host membranes and induces cytotoxic effects leading to rapid necrotic cell death. This protein shows four domains: a putative chaperone binding domain. a patatin-like domain ( ), and two domains that form the membrane localization domain (MLD). This entry represents the C-terminal domain, which folds into a four-helical bundle with a conserved arginine exposed. This residue seems to be essential for localisation.
