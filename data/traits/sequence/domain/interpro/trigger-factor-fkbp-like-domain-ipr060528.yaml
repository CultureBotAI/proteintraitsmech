identifier: InterPro:IPR060528
label: "Trigger factor, FKBP-like domain"
definition: >-
  This domain is found in tigger factor proteins from Chlorobiaceae and related proteins from Bacteroidetes. They are involved in protein export. This entry share similarity to FKBP-like domain and is predicted to adopt similar structure.
