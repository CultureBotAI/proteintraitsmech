identifier: InterPro:IPR009612
label: IcmF-related
definition: >-
  This entry represents a conserved region within several bacterial proteins that resemble IcmF, which has been proposed to be involved in Vibrio cholerae cell surface reorganisation, resulting in increased adherence to epithelial cells and increased conjugation frequency. Note that many entry members are hypothetical proteins. Type VI secretion component TssM1 from Pseudomonas aeruginosa is also a member of this entry. TssM1 plays a role in the release of toxins targeting both eukaryotic and prokaryotic species, plays an essential role in stabilization of assembled TssK1 structure at a fixed perimembrane site and forms part of the tip complex.
