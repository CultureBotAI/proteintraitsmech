identifier: InterPro:IPR021148
label: "Polysaccharide biosynthesis domain"
definition: >-
  This entry includes PBDC1 protein from mammals and its homologues from fungi. Protein PBDC1 homolog from S. cerevisiae also known as Ypl225w (Chp1, Chaperone 1 for eEF1A) functions as a co-translational chaperone by forming dual interactions with the eEF1A G domain nascent chain and the UBA domain of ribosome-bound nascent polypeptide-associated complex. This protein primes the eEF1A nascent chains for binding to GTP as part of a folding mechanism which is tightly coupled to chaperone recycling.
