identifier: InterPro:IPR039511
label: "RBM26-like, RNA recognition motif 2"
definition: >-
  This entry represents the RNA recognition motif 2 (RRM2) of RBM26, also known as cutaneous T-cell lymphoma (CTCL) tumour antigen se70-2, which represents a cutaneous lymphoma (CL)-associated antigen. RBM26 contains two RNA recognition motifs (RRMs), also known as RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). The RRMs may play some functional roles in RNA-binding or protein-protein interactions.
