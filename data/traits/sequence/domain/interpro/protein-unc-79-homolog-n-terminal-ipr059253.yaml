identifier: InterPro:IPR059253
label: "Protein unc-79 homolog, N-terminal"
definition: >-
  This entry represents the N-terminal region of Protein unc-79 homolog from Homo sapiens and related proteins. It is composed of α-helical HEAT repeats in which are inserted two very small α/β substructures. The Protein unc-79 homolog is an auxiliary subunit of the NALCN sodium channel complex which is a voltage-gated ion channel responsible for the resting Na+ permeability that controls neuronal excitability. This complex is activated by neuropeptides substance P, neurotensin. In addition, the channel is inhibited by extracellular Ca2+ through the Ca2+-sensing receptor.
