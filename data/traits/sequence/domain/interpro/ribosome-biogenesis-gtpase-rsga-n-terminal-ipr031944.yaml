identifier: InterPro:IPR031944
label: "Ribosome biogenesis GTPase RsgA, N-terminal"
definition: >-
  This domain has an OB fold and is found at the N terminus of bacterial circularly permutated GTPase RsgA/YloQ. RsgA is a late-stage ribosome biogenesis factor involved in the 30S subunit maturation.
