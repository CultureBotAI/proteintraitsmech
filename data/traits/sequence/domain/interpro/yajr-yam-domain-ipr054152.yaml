identifier: InterPro:IPR054152
label: "YajR, YAM domain"
definition: >-
  This entry represents the C-terminal YAM domain of YajR, an Escherichia coli transporter that belongs to the major facilitator superfamily and similar bacterial proteins. The YAM domain precise regulatory role is not yet known, it may sense environmental changes, such as pH and halogen ion variation.
