identifier: InterPro:IPR030090
label: "SWI/SNF-related matrix-associated actin-dependent regulator of chromatin subfamily D 2, SWIB domain"
definition: >-
  SWI/SNF-related matrix-associated actin-dependent regulator of chromatin subfamily D member (SMARCD1, also known as Brg/Brm-associated factor 60B, BAF60B) is part of the SWI/SNF complex, which is an ATP-dependent chromatin remodelling complex that regulates gene expression through regulating nucleosome remodelling. BAF60B interacts with multiple transcription factors and may bridge transcription factors with SWI/SNF complexes. It can be regulated by ubiquitination controlled by Rac GTPase and the RING finger protein Unkempt. This protein plays a role in the ATM-p53 pathway in sensing chromatin opening by facilitating ATM recruitment to the SWI/SNF complex, as well as ATM activation. It also regulates transcriptional networks controlling differentiation of neutrophil granulocytes. Thus, it acts as a key factor controlling myelopoiesis and is a potential tumour suppressor in leukaemia. This entry represents the SWIB domain of SMARCD2.
