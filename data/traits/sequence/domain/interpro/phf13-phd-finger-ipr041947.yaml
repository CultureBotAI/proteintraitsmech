identifier: InterPro:IPR041947
label: "PHF13, PHD finger"
definition: >-
  PHF13, also termed survival time-associated PHD finger protein in ovarian cancer 1 (SPOC1), is a novel plant homeodomain (PHD) finger-containing protein that shows strong expression in spermatogonia and ovarian cancer cells, modulates chromatin structure and mitotic chromosome condensation, and is important for proper cell division. It is also required for spermatogonial stem cell differentiation and sustained spermatogenesis. The overexpression of PHF13 associates with unresectable carcinomas and shorter survival in ovarian cancer. This entry represents the PHD finger found in PHF13.
