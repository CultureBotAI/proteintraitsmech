identifier: InterPro:IPR039064
label: "Zinc finger protein 750-like, zinc finger"
definition: >-
  This entry represents a zinc finger found in ZNF750 and related proteins. ZNF750 is a transcription factor that controls epithelial homeostasis by inhibiting progenitor genes while inducing differentiation genes. Proteins containing this domain also include proline-rich protein 35. Its function is not clear.
