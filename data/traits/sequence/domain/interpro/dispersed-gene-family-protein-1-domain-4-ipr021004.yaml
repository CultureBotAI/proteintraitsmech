identifier: InterPro:IPR021004
label: "Dispersed gene family protein 1, domain 4"
definition: >-
  Dispersed gene family protein 1 of Trypanosoma cruzi is likely to be highly expressed, and is expressed from the sub-telomeric region. However, its function is not known. This entry represents domain 4 on this protein which is likely disordered.
