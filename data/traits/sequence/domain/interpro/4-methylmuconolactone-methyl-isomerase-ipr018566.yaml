identifier: InterPro:IPR018566
label: "4-Methylmuconolactone methyl-isomerase"
definition: >-
  4-methylmuconolactone methyl-isomerase (MmlI), also known as 4-carboxymethyl-4-methylbutenolide mutase, is a short, approx 115 residue, protein of two α helices and four β strands. It is involved in the catabolism of methyl-substituted aromatics via a modified oxo-adipate pathway in bacteria. The enzyme appears to be monomeric in some species and tetrameric in others. The known structure shows two copies of the protein form a dimeric α β barrel.
