identifier: InterPro:IPR048222
label: "E3 ubiquitin-protein ligase TRIM65, PRY/SPRY domain"
definition: >-
  This entry represent the C-terminal domain of TRIM65, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain. The SPRY/PRY combination is a possible component of immune defence. E3 ubiquitin-protein ligase TRIM65 plays a role in several processes including innate immunity, autophagy or inflammation. It negatively regulates miRNAs by modulating the ubiquitination and stability of TNRC6A, a protein involved in RNA-mediated gene silencing by both micro-RNAs (miRNAs) and short interfering RNAs. This ubiquitination results in the suppressed expression of miR-138-5p leading to increased autophagy. TRIM65 promotes 'Lys-63'-mediated ubiquitination activation of IFIH1/MDA5 which leads to innate signalling cascade upon enteroviral infection. It also plays a role in limitation of inflammation through different mechanisms. First, promotes 'Lys-48'-mediated ubiquitination of VCAM1 leading to its degradation and limitation of LPS-induced lung inflammation. In addition, negatively regulates inflammasome activation by promoting 'Lys48'-linked ubiquitination of NLRP3 which is critical for the inhibition of NLRP3 inflammasome activation in resting macrophages. TRIM65 selectively recognises MDA5 filaments that occur on dsRNAs. MDA5 is a RIG-I-like receptor (RLR) that performs antiviral functions distinct from RIG-I by detecting different groups of viral RNAs.
