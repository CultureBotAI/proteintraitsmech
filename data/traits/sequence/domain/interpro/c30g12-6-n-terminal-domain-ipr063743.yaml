identifier: InterPro:IPR063743
label: "C30G12.6, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in C30G12.6 and related uncharacterised proteins from nematodes. The proteins contain ARM-type fold. The proteins undergo alternative splicing and contain multiple disordered regions. The function of this domain remains to be determined.
