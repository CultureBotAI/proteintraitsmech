identifier: InterPro:IPR057406
label: "Pua-like domain"
definition: >-
  Members of the PUA family play a crucial role in binding and recognising RNA and DNA with modified bases. They are often linked with Calcineurin-CE domains, indicating their function as sensors in prokaryotic antiviral immunity by recognising modified DNA in invasive DNA elements. This entry represents a domain often found at the N-terminal of PUA bacterial proteins.
