identifier: InterPro:IPR063954
label: "Inner kinetochore subunit CTF19, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of CTF19, the budding yeast homologue of CENP-P. CTF19 is a component of the inner kinetochore COMA complex, which consists of AME1, CTF19, MCM21 and OKP1. COMA is part of the constitutive centromere-associated network (CCAN), which serves as a structural platform for outer kinetochore assembly. CTF19 interacts with multiple kinetochore components including the CTF3 complex and centromeric nucleosome protein CSE4.
