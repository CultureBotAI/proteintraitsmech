identifier: InterPro:IPR048454
label: "YetF-like, N-terminal transmembrane domain"
definition: >-
  This entry represents the N-terminal region of the YetF protein from Bacillus subtilis and related bacterial proteins that include the uncharacterised proteins YdfS and YkjA. This domain is composed of three transmembrane helices.
