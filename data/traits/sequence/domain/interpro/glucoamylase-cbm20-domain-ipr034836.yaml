identifier: InterPro:IPR034836
label: Glucoamylase, CBM20 domain
definition: >-
  Glucoamylases are inverting, exo-acting starch hydrolases that hydrolyze starch and related polysaccharides by releasing the nonreducing end glucose. They are mainly active on alpha-1,4-glycosidic bonds but also have some activity towards 1,6-glycosidic bonds occurring in natural oligosaccharides. The ability of glucoamylases to cleave 1-6-glycosidic bonds is called "debranching activity" and is of importance in industrial applications, where complete degradation of starch to glucose is needed. Most glucoamylases are multidomain proteins containing an N-terminal catalytic domain, a C-terminal CBM20 domain, and a highly O-glycosylated linker region that connects the two. This entry also includes Lytic polysaccharide monooxygenases, such as 13A and AA13, which are starch-active polysaccharide monooxygenases that oxidizes the C1 position of starch substrates, but not in cellulose, chitin, polygalacturonan or esterified pectin, nor with Arabidopsis stem cell wall. This entry represents the glucoamylase, starch-binding, C-terminal CBM20 (carbohydrate-binding module, family 20) domain.
