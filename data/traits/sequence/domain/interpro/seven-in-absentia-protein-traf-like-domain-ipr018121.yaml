identifier: InterPro:IPR018121
label: Seven-in-absentia protein, TRAF-like domain
definition: >-
  This entry represents the C-terminal TRAF-like domain found in the seven in absentia (sina). The seven in absentia (sina) is a RING-type E3 ubiquitin ligase first identified in Drosophila. The Drosophila Sina protein is essential for the determination of the R7 pathway in photoreceptor cell development: the loss of functional Sina results in the transformation of the R7 precursor cell to a non-neuronal cell type. The Sina protein contains an N-terminal RING finger domain C3HC4-type, through which it binds E2 ubiquitin-conjugating enzymes (UbcD1). Sina also interacts with Tramtrack (TTK88) via PHYL. Tramtrack is a transcriptional repressor that blocks photoreceptor determination, while PHYL down-regulates the activity of TTK88. In turn, the activity of PHYL requires the activation of the Sevenless receptor tyrosine kinase, a process essential for R7 determination. It is thought that Sina targets TTK88 for degradation, therefore promoting the R7 pathway. The remainder C-terminal part is involved in interactions with other proteins, and consists of two zinc fingers and a TRAF-like domain. Murine and human homologues of Sina have also been identified, namely Siah1 and Siah2. The human homologue Siah-1 also binds E2 enzymes (UbcH5) and through a series of physical interactions, targets beta-catenin for ubiquitin degradation. Siah-1 expression is enhanced by p53, itself promoted by DNA damage. Thus, this pathway links DNA damage to beta-catenin degradation. In addition to the Drosophila protein and mammalian homologues, whose similarity was noted previously, this family also includes putative homologues from Caenorhabditis elegans, Arabidopsis thaliana.
