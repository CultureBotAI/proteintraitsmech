identifier: InterPro:IPR047158
label: "Retinoic acid receptor, ligand-binding domain"
definition: >-
  This entry represents the ligand binding domain (LBD) of retinoic acid receptors (RARs). The retinoic acid receptors (RARs) belong to the large family of ligand responsive gene regulatory proteins that includes receptors for steroid and thyroid hormones. These proteins contain two highly conserved domains that are involved in determining their DNA and ligand-binding activities. RARs (also known as 1B nuclear receptors) mediate the biological effect of retinoids, including both naturally dietary vitamin A (retinol) metabolites and active synthetic analogs. Retinoids play key roles in a wide variety of essential biological processes, such as vertebrate embryonic morphogenesis and organogenesis, differentiation and apoptosis, and homeostasis. RARs function as heterodimers with retinoic X receptors by binding to specific RAR response elements (RAREs) found in the promoter regions of retinoid target genes. In the absence of ligand, the RAR-RXR heterodimer recruits the corepressor proteins NCoR or AMRT, and associated factors such as histone deacetylases or DNA-methyltransferases, leading to an inactive condensed chromatin structure, preventing transcription. Upon ligand binding, the corepressors are released, and coactivator complexes such as histone acetyltransferase or histone arginine methyltransferases are recruited to activate transcription. Three distinct RARs have been identified (termed RAR alpha, beta, and gamma) and are encoded by genes on separate chromosomes. Additional isoforms of the receptors have been described, all of which differ in the N-terminal regions. Comparison of the amino acid sequences of human and mouse RARs indicates that interspecies conservation in members of the RAR subfamily (either alpha, beta or gamma) is much higher than conservation of t…
