identifier: InterPro:IPR060590
label: "POLR1D, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the short isoform of POLR1D, also known as isoform 2, and similar proteins from animals and fungi. The truncated protein of only 122 amino acids contains extensive disordered regions and cannot function as a DNA-dependent RNA polymerase due to the absence of the catalytic RNA polymerase domain, which is present in the full-length isoform 1. POLR1D isoform 2 is generated by alternative splicing, undergoing N-terminal acetylation and phosphorylation modifications. The biological significance and function of this short isoform remain to be determined.
