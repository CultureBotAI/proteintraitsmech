identifier: InterPro:IPR064069
label: "Phage repressor, winged helix-turn-helix"
definition: >-
  This entry represents a winged helix-turn-helix domain found in phage repressors from halophage that infect Halobacterium species and halobacterial prophages. The domain contains the characteristic helix-turn-helix motif with an additional β-hairpin 'wing' structure. The phage repressor binds cooperatively to palindromic operator sequences with the consensus RRGAAG, preventing RNA polymerase access to lytic gene promoters. Despite the high salt environment of the halophilic host, the basic DNA-binding mechanism remains similar to coliphage repressors. The domain functions as a transcriptional repressor that maintains the lysogenic state by blocking expression of lytic cycle genes.
