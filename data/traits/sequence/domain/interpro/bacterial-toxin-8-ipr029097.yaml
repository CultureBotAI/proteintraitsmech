identifier: InterPro:IPR029097
label: "Bacterial toxin 8"
definition: >-
  Prokaryotic polymorphic toxin systems are implicated in intra-specific conflicts. They are characterised by a remarkable diversity of C-terminal toxin domains generated by recombination with standalone toxin-coding cassettes. This entry represents a domain found in a predicted RNase toxin from bacterial polymorphic toxin systems. The toxin possesses an α+β fold and HxR and HxxxH motifs that is usually exported by the type 2 and type 6 secretion system.
