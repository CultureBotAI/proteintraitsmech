identifier: InterPro:IPR047388
label: "Protein fork head-like, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of FKH from Drosophila melanogaster and similar proteins predominantly found in invertebrates, including the homologue Silk gland factor 1 (SGF-1) from the silk moth Bombyx mori. The FH domain is a winged helix DNA-binding domain. Drosophila melanogaster protein fork head (dFKH) promotes terminal as opposed to segmental development. In the absence of dFKH, this developmental switch does not occur. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'.
