identifier: InterPro:IPR006769
label: "Calcium uniporter protein, C-terminal"
definition: >-
  This entry represents the C-terminal domain of MCU, which is a mitochondrial inner membrane calcium uniporter that mediates calcium uptake into mitochondria. This domain can also be found in MCUb, which negatively regulates the activity of MCU. It is also found in Chloroplastic calcium uniporter protein from Arabidopsis thaliana which mediates calcium uptake into chloroplast stroma.
