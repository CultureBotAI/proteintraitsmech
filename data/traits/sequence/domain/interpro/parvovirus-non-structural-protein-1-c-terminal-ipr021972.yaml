identifier: InterPro:IPR021972
label: "Parvovirus non-structural protein 1, C-terminal"
definition: >-
  Parvoviruses are some of the smallest viruses containing linear, non-segmented single-stranded DNA genomes, with an average genome size of 5000 nucleotides. Parvoviruses have been described that infect a wide range of invertebrates and vertebrates and are well known for causing enteric disease in mammals. Genomes contain two large ORFs: NS1 and VP1; other ORFs are found in some sub-types and different gene products can arise from splice variants and the use of different start codons. NS1 protein is essential for viral life cycle stages, including DNA replication, trans-regulation of the two viral promoters, and modulation of heterologous promoters. It exhibits DNA binding, endonuclease and helicase activities and is a major contributor to the toxic effect on host cells. This is the transactivation domain of the parvovirus NS1 protein, located immediately C-terminal to the helicase.
