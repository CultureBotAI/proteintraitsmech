identifier: InterPro:IPR058468
label: "Protein of unknown function DUF8155, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain from a family of uncharacterised proteins from halophilic archaea. The proteins in this entry are predominantly found in the class Halobacteria, which includes families such as Natrialbaceae, Haloferacaceae, and Haloarculaceae. The proteins in this entry are generally around 270-330 amino acids in length. This domain show similarity to the Peptidase M23 proteins suggesting this domain may act as an endopeptidase. These proteins are composed by the N-terminal and C-terminal domain .
