identifier: InterPro:IPR054597
label: "N-acyl amino acid synthase FeeM, catalytic core"
definition: >-
  This entry represents the catalytic core of the N-acyl amino acid synthase FeeM ( , ). This domain folds into a central antiparallel β-sheet packed on both sides with α-helices and closely resembles the conserved core of members of the GNAT superfamily.
