identifier: InterPro:IPR060340
label: "TamB, N-terminal domain"
definition: >-
  This entry represents the N-terminal region of Translocation and assembly module subunit TamB from Escherichia coli and related bacterial proteins. This long region is predicted to show a set of tandem β-sheets. It is also found twice in Uncharacterized protein BU087 from Buchnera aphidicola and related sequences. TamB is an integral inner membrane protein that forms a complex, the translocation and assembly module or TAM, with the outer membrane protein, TamA. TAM facilitates the insertion and assembly of specific β-barrel proteins into the outer membrane. TAM is responsible for the efficient secretion of the adhesin protein Ag43 in E.coli K-12.
