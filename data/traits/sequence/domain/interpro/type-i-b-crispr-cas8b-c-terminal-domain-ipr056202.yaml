identifier: InterPro:IPR056202
label: "Type I-B CRISPR Cas8b, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Type I-B CRISPR Synechocystis Cas8b and related proteins. Type I CRISPR-Cas systems employ multi-subunit effector Cascade and helicase-nuclease Cas3 to target and degrade foreign nucleic acids, representing the most abundant RNA-guided adaptive immune systems in prokaryotes. Cas8b subunit displays very low sequence similarity with the large subunits of any other known type I CRISPR systems. Cas8b N-terminal domain is involved in PAM recognition. The C-terminal domain of Cas8b and three Cas11b small subunits together form the inner 'belly' of the cascade integral complex. They provide support for the non-target strand within the full R-loop state structure.
