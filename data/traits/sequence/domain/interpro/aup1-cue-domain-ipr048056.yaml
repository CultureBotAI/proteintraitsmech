identifier: InterPro:IPR048056
label: AUP1, CUE domain
definition: >-
  Lipid droplet-regulating VLDL assembly factor AUP1 is a component of the HRD1-SEL1L endoplasmic reticulum (ER) quality control complex, playing a role in the translocation of terminally misfolded proteins from the endoplasmic reticulum lumen to the cytoplasm and their degradation by the proteasome.It is also essential for the US11-mediated dislocation of class I MHC heavy chains. It also binds to the membrane-proximal KVGFFKR motif of the cytoplasmic tail of the integrin alphaCTs that plays a crucial role in the inside-out signalling of αΙΙbβ3. AUP1 is found in both the ER and in lipid droplets, in which it plays a role in lipid droplet formation and induces lipid droplet clustering. It recruits the ubiquitin-conjugating enzyme UBE2G2 to lipid droplets which facilitates its interaction with ubiquitin ligases AMFR/gp78 and RNF139/TRC8, leading to sterol-induced ubiquitination of HMGCR and its subsequent proteasomal degradation. AUP1 contains two conserved cytoplasmic domains, an acyltransferase domain, a CUE domain and a C-terminal E2 ubiquitin conjugase G2 (UBE2G2)-binding domain (G2BR), and it is uniquely required to maintain normal levels of UBE2G2. This entry corresponds to the CUE domain of AUP1 which mediates interaction with components in the HRD1 ERAD pathway and misfolded proteins. This domain may also be involved in lipid droplet clustering and in ubiquitination of AUP1 itself.
