identifier: InterPro:IPR055149
label: "Alpha-1,3-glucanase, catalytic domain, D2"
definition: >-
  This entry represents a domain found at the C-terminal end of a group of Alpha-1,3-glucanases, including the members from from Paenibacillus glycanilyticus and Niallia circulans (Bacillus circulans). This domain, found C-terminal in the catalytic domain, folds into a right-handed β-helix fold.
