identifier: InterPro:IPR027841
label: "Interleukin-17 receptor C/E, N-terminal"
definition: >-
  This domain is found at the N terminus (extracellular region) of interleukin-17 receptor C and interleukin-17 receptor E. This is the presumed ligand-binding domain. Human putative interleukin-17 receptor E-like consists only of this domain.
