identifier: InterPro:IPR059793
label: "Fibronectin type III domain"
definition: >-
  This entry represents a fibronectin type III domain found in a family of putative fibrillar adhesins. The domain contains a conserved cystein residue that likely forms a disulphide bond with the domain to the C terminus of this domain.
