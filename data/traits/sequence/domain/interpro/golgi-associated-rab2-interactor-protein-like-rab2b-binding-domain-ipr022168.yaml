identifier: InterPro:IPR022168
label: "Golgi associated RAB2 interactor protein-like, Rab2B-binding domain"
definition: >-
  This domain is found in Golgi-associated RAB2 interactor proteins and it is likely a Rab2B-binding domain. Some members included in this entry, such as GAR1A/B andGAR2, are RAB2B effector proteins required for accurate acrosome formation and normal male fertility. GARIL5 is a Rab2B effector protein which promotes cytosolic DNA-induced innate immune responses and GARI-L4 is a RAB2B effector protein required for the compacted Golgi morphology. This domain is also found in TASOR2, whose function is unknown.
