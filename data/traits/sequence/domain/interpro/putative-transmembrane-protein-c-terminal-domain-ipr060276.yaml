identifier: InterPro:IPR060276
label: "Putative transmembrane protein, C-terminal domain"
definition: >-
  This entry represents the Thioredoxin-like domain at the C-terminal in putative transmembrane proteins and other uncharacterised proteins mostly found in Pseudomonadati. This domain belongs to the Thioredoxin-like superfamily . Members of this superfamily are small redox-active proteins that mediate thiol-disulfide exchange through a conserved active-site disulfide bond. They share a characteristic thioredoxin fold, consisting of a three-layer α/β/α sandwich with a central mixed β-sheet. These proteins typically function in redox regulation by cycling between oxidised and reduced forms.
