identifier: InterPro:IPR044464
label: "Staufen 2, second double-stranded RNA binding domain"
definition: >-
  Staufen 2 is an RNA-binding protein required for the microtubule-dependent transport of neuronal RNA from the cell body to the dendrite. Staufen 2 contains five double-stranded RNA binding motifs (DSRMs). This entry represents the second DSRM of Staufen 2.
