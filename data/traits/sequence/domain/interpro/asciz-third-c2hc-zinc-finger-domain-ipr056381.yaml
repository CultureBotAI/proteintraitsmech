identifier: InterPro:IPR056381
label: "ASCIZ, third C2HC zinc finger domain"
definition: >-
  This domain is found in the human ATM interactor (also known as ATM/ATR-substrate CHK2-interacting zinc finger protein (ASCIZ)) and related proteins from animals. These proteins are transcription factors that are essential for cell survival and the formation of RAD51 foci, a response to methylating DNA damage. They are also involved in the regulation of ATM (ataxia telangiectasia mutated) kinase activity, particularly in the absence of DNA damage, potentially by stabilising ATM. ASCIZ is predicted to contain four zinc finger domains. This entry represents the third zinc finger domain, which is a variant of the classical C2H2 zinc fingers bearing cysteine residue instead of histidine in the fourth zinc ligand position. C2H2-type (classical) zinc fingers (Znf) were the first class to be characterised. They contain a short β-hairpin and an α-helix (β/β/α structure), where a single zinc atom is held in place by Cys(2)His(2) (C2H2) residues in a tetrahedral array. C2H2 Znf's can be divided into three groups based on the number and pattern of fingers: triple-C2H2 (binds single ligand), multiple-adjacent-C2H2 (binds multiple ligands), and separated paired-C2H2. C2H2 Znf's are the most common DNA-binding motifs found in eukaryotic transcription factors, and have also been identified in prokaryotes. Transcription factors usually contain several Znf's (each with a conserved β/β/α structure) capable of making multiple contacts along the DNA, where the C2H2 Znf motifs recognise DNA sequences by binding to the major groove of DNA via a short α-helix in the Znf, the Znf spanning 3-4 bases of the DNA. C2H2 zinc fingers can also bind to RNA and protein targets. Zinc finger (Znf) domains are relatively small protein motifs which contain multiple finger-like protrusions that make tandem…
