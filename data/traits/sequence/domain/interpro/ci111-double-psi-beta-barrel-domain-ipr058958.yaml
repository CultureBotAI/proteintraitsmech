identifier: InterPro:IPR058958
label: "CI111, double-psi beta-barrel domain"
definition: >-
  This entry represents a double-psi β barrel (DPBB) domain found in CI111 protein from Arabidopsis thaliana and related plant proteins. The DPBB domain is a six-stranded β barrel with a pseudo-twofold axis where two psi-loop structures are arranged symmetrically. This fold is shared by several protein families including aspartate-alpha-decarboxylase, formate dehydrogenase, and plant defence protein barwin. In known structures, protein active sites often cluster around the psi loop, indicating its importance in providing a framework for catalysis or binding functions. The specific function of this domain in CI111 remains to be determined.
