identifier: InterPro:IPR049124
label: "TAR DNA-binding protein 43, C-terminal"
definition: >-
  TDP43 is a member of the heterogeneous nuclear ribonucleoprotein (hnRNP) family, which is involved in RNA processing and in stress granule response. It is linked to the pathogenesis of amyotrophic lateral sclerosis (ALS) and frontotemporal dementia (FTD). It is the main component of intraneuronal inclusion bodies (IBs), a pathological hallmark of ALS. This entry represents the C-terminal Gly-rich region of TAR DNA-binding protein 43 (TDP-43), which is an intrinsically disordered prion-like domain, capable of assembling into dynamic oligomers rich in β-sheet structures [(pdbe:7Q3U]), being responsible of TDP-43 aggregation.
