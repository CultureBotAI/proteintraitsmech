identifier: InterPro:IPR030691
label: "Band 4.1-like protein 3, FERM domain, F1 sub-domain"
definition: >-
  Band 4.1-like protein 3, also known as 4.1B or DAL-1, belongs to the protein 4.1 family. Members of the 4.1 family contain a 4.1/ezrin/adixin/moesin (FERM) domain, which is involved in the linkage of cytoplasmic proteins to the membrane. Protein 4.1B has been described to be a growth suppressor. It localises to the cell membrane to sites of cell-cell contact, and functions as an adapter protein, linking the plasma membrane to the cytoskeleton. It is involved in cytoskeleton-associated processes, such as cell motility and adhesion, and also plays a role in the regulation of cell growth, differentiation, and the establishment of epithelial-like cell structures. The FERM domain of Band4.1-L3 is made up of three sub-domains, F1, F2, and F3. This entry represents the N-terminal F1 subdomain.
