identifier: InterPro:IPR021421
label: "Domain of unknown function DUF3071"
definition: >-
  This domain is found at the N-terminal of Septation protein H (SepH), a protein that was firstly characterised in Streptomyces venezuelae, and homologs were identified in Mycobacterium smegmatis (recently renamed to Mycolicibacterium smegmatis). SepH binds directly to cell division protein FtsZ to stimulate the assembly of FtsZ protofilaments. This domain contains a predicted HTH motif.
