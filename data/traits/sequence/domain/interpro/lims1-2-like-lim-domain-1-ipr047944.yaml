identifier: InterPro:IPR047944
label: "LIMS1/2-like, LIM domain 1"
definition: >-
  This is the first LIM (LIM1) domain from LIMS1/2 and its homologues. This domain in LIMS1 interacts with integrin-linked kinase (ILK), thereby mediating focal adhesions via a specific integrin/ILK signaling pathway. This entry includes LIM and senescent cell antigen-like-containing domain protein 1/2 (LIMS1/2, also known as PINCH-1/2) and its homologues LIM domain-containing protein unc-97 and LIM domain-containing protein pin-2 from C.elegans. LIMS1/2 are LIM domain adapter proteins that functions in the integrin and growth factor signal transduction pathway, involved in the regulation of cell survival, cell proliferation and cell differentiation. Unc-97 is part of the integrin containing attachment complex, which is required for muscle development and maintenance; it may also function in adherens junction. These proteins consist of five LIM domains, which function as adaptors or scaffolds to support the assembly of multimeric protein complexes.
