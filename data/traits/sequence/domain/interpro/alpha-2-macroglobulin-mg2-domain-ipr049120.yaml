identifier: InterPro:IPR049120
label: "Alpha-2 macroglobulin, MG2 domain"
definition: >-
  Bacterial alpha-2 macroglobulin (A2M) is located in the periplasm and may protect the cell by trapping external proteases through a covalent interaction with an activated thioester. Macroglobulin (MG) β-sandwich domains appear to play a structural role. This entry represents bacterial MG2 (bMG2) domain which, with MG1, plays the role of a linker associating the main body of A2M to the bilayer.
