identifier: InterPro:IPR057777
label: "Vein, beta-barrel domain"
definition: >-
  This entry includes vein protein from Drosophila, a secreted neuregulin-like EGFR ligand. It may play a role in the global proliferation of wing disc cells and the larval patterning. This entry represents a β-barrel domain found in vein, which is similar to that found in Tissue inhibitors of metalloproteinases (TIMP). Vein is an orthologue of neuregulin 1 (NRG1 ). This domain, however, seems to be specific for vein proteins.
