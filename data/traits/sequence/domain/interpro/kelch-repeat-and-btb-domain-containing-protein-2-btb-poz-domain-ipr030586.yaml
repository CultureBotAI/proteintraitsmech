identifier: InterPro:IPR030586
label: "Kelch repeat and BTB domain-containing protein 2, BTB/POZ domain"
definition: >-
  KBTBD2, also called BTB and kelch domain-containing protein 1 (BKLHD1), plays an essential role in the regulation of insulin-signaling pathway. It is a BTB-Kelch family substrate recognition subunit of the Cullin-3-based E3 ubiquitin ligase, which targets p85alpha, the regulatory subunit of the phosphoinositol-3-kinase (PI3K) heterodimer, causing p85alpha ubiquitination and proteasome-mediated degradation. This entry represents the BTB/POZ domain. The BTB superfamily includes KLHL (Kelch-like), KBTBD (Kelch repeat and BTB domain-containing), and KLHDC (Kelch domain-containing) subfamilies, which encompass structurally related molecules that differ in the types and numbers of their protein domains. The domain composition can appear to vary depending on the protein domain prediction program. For example, KLHL29, KLHL31, KLHL40, and KLHL41 were previously assigned within the KBTBD family as KBTBD9, KBTBD1, KBTBD5, and KBTBD10 respectively. KBTBD proteins have typically one BTB/POZ domain, occasionally a BACK domain, and two to four Kelch motifs.
