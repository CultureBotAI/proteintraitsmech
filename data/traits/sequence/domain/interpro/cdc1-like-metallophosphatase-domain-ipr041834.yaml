identifier: InterPro:IPR041834
label: "Cdc1-like, metallophosphatase domain"
definition: >-
  Cdc1 is an endoplasmic reticulum-localized transmembrane lipid phosphatase with a metallophosphatase domain facing the ER lumen. In budding yeast, the gene encoding CDC1 is essential while nonlethal mutations cause defects in Golgi inheritance and actin polarization. Cdc1 mutant cells accumulate an unidentified phospholipid, suggesting that Cdc1 is a lipid phosphatase. Cdc1 mutant cells also have highly elevated intracellular calcium levels suggesting a possible role for Cdc1 in calcium regulation. The 5' flanking region of Cdc1 is a regulatory region with conserved binding site motifs for AP1, AP2, Sp1, NF-1 and CREB. DNA polymerase delta consists of at least four subunits - Pol3, Cdc1, Cdc27, and Cdm1. Cdc1 belongs to the metallophosphatase (MPP) superfamily.
