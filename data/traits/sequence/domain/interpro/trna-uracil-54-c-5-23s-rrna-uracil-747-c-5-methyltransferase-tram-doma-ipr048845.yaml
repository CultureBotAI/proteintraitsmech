identifier: InterPro:IPR048845
label: "tRNA (uracil(54)-C(5))/23S rRNA (uracil(747)-C(5))-methyltransferase, TRAM domain"
definition: >-
  This domain is found at the N-terminal end of tRNA (uracil(54)-C(5))- methyltransferase (RUMT) and 23S rRNA (uracil(747)-C(5))-methyltransferase (ARLMC) from Pyrococcus abyssi and similar prokaryotic proteins. RUMT catalyses the formation of 5-methyl-uridine at position 54 (m5U54) in tRNA. ARLMC catalyses the formation of 5-methyl-uridine at position equivalent to 747 (m5U747) in 23S rRNA. This domain, a TRAM domain, adopts a five-stranded β-barrel architecture characteristic of an oligosaccharide/ oligonucleotide-binding fold (OB-fold).
