identifier: InterPro:IPR044112
label: "Sulfoquinovosidase YihQ-like, TIM barrel domain"
definition: >-
  YihQ is a sulfoquinovosidase that catalyses hydrolysis of sulfoquinovosyl diacylglycerides (SQDG) to sulfoquinovose (SQ), which is then degraded by E.coli through the SQ Embden-Meyerhof-Parnas (SQ-EMP) sulfoglycolysis pathway as a source of carbon and sulfur. It also exhibits some alpha-glucosidase activity against alpha-glucosyl fluoride in vitro, although natural substrates, such as alpha-glucobioses are scarcely hydrolyzed. Orthologs of YihQ that have not yet been functionally characterised are present in plants and fungi. YihQ has sequence similarity to other GH31 enzymes such as CtsZ, a 6-alpha-glucosyltransferase from Bacillus globisporus, and YicI, an alpha-xylosidase from E. coli.
