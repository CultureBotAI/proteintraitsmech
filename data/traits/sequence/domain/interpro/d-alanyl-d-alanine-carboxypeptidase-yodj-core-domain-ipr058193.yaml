identifier: InterPro:IPR058193
label: "D-alanyl-D-alanine carboxypeptidase/YodJ, core domain"
definition: >-
  This entry represents the common core domain found in D-alanyl-D-alanine carboxypeptidases (DD-CPases) such as VanY and related proteins from the MEROPS peptidase M15B family mostly found in bacteria. This domain features a central twisted antiparallel β-sheet (β1-β6) flanked by two pairs of three α-helices (α2, α3, α6, and α1, α5, α7) on the two faces of the β-sheet. D-alanyl-D-alanine carboxypeptidase (VanY) from Enterococcus faecium cleaves the C-terminal D-alanine residue of UDP-muramyl-pentapeptide or diacetyl-L-Lys-D-Ala-D-Ala and releases the C-terminal D-lactate from UDP-MurNAc-L-Ala-D-Glu-mDAP-D-Ala-D-lactate, a depsipeptide produced by the vancomycin resistance protein VanA. Carboxypeptidase YodJ, a specific DD-CPase, plays a role in peptidoglycan maturation and spore development. It releases D-Ala from peptidoglycan precursors, affecting substrate availability for crosslinking and modulating spore resistance and germination.
