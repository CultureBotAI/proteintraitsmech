identifier: InterPro:IPR054142
label: "AppA, SCHIC domain"
definition: >-
  This domain is found at the C-terminal end of AppA protein from Rhodobacter sphaeroides and similar sequences from alphaproteobacteria. AppA is a light-sensing antirepressor involved in oxygen and light control of photosynthesis-gene expression. This protein senses blue-light via its N-terminal blue-light using FAD (BLUF) domain ( ) and oxygen via its sensor containing heme instead of cobalamin (SCHIC) domain (this entry). This domain has a flavodoxin-like fold.
