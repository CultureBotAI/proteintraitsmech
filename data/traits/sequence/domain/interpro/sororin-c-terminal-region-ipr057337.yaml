identifier: InterPro:IPR057337
label: "Sororin, C-terminal region"
definition: >-
  This entry represents a conserved region found at the C-terminal of sororin from animals and plants ( from Arabidopsis thaliana). Sororin is an essential, cell cycle-dependent mediator of sister chromatid cohesion. The protein is nuclear in interphase cells, dispersed from the chromatin in mitosis, and interacts with the cohesin complex. This protein protects cohesin from WAPL, which otherwise releases cohesin from DNA.
