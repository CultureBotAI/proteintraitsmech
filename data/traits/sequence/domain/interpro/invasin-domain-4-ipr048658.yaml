identifier: InterPro:IPR048658
label: "Invasin, domain 4"
definition: >-
  This domain is found in a group of proteins from Gammaproteobacteria, including Invasin from Yersinia pseudotuberculosis, a protein that allows this enteric bacteria to penetrate cultured mammalian cells by binding several beta-1 chain integrins. This domain is structurally similar to the C1 set of Ig-like domains having two additional β-strands.
