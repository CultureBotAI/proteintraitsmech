identifier: InterPro:IPR040844
label: "Phosphodiesterase 4 upstream conserved regions (UCR)"
definition: >-
  This is the upstream conserved region (UCR) found in Phosphodiesterase 4 (PDE4) enzymes. PDE4 is a contributor to intracellular signalling and an important drug target. The four members of this enzyme family (PDE4A to -D) are functional dimers in which each subunit contains two upstream conserved regions (UCR), UCR1 and -2, which precede the C-terminal catalytic domain. Due to alternative promoters/start sites and variable mRNA splicing, transcription from the four PDE4 genes results in the expression of more than 25 different isoforms of PDE4. Each isoform has a unique N-terminal region that determines its specific subcellular localization by mediating interactions with scaffolding proteins. The isoforms are further classified into long, short, and supershort forms based on the presence or absence of two upstream conserved regions (UCRs, known as UCR1 and UCR2). Long splice variants contain both UCR1 and UCR2, short variants lack UCR1, and the supershort forms of PDE4 additionally lack part of UCR2. The extent to which UCRs are present determines critical functional differences between the isoforms. Phosphorylation by protein kinase A (PKA) at a conserved site on UCR1 activates all long PDE4 isoforms. Mutation and deletion studies have shown that long forms of PDE4 are dimeric, with key dimerization interactions mediated by UCR1 and UCR2, and that the C-terminal half of UCR2 could play a negative regulatory role.
