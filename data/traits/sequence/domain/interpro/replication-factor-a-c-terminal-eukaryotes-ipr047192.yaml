identifier: InterPro:IPR047192
label: "Replication factor A, C-terminal, eukaryotes"
definition: >-
  This entry is found at the C terminus of Replication factor A and similar proteins from eukaryotes and corresponds to ssDNA-binding domain (DBD)-C Replication factor A (RP-A, also known as replication protein A 70kDa DNA-binding subunit) binds and subsequently stabilises single-stranded DNA intermediates and thus prevents complementary DNA from reannealing. It also plays an essential role in several cellular processes in DNA metabolism, including replication, recombination and repair of DNA. RPA also mediates specific interactions between various nuclear proteins. In animals, plants, and fungi, RPA is a heterotrimer with subunits of 70kDa (RPA1), 32kDa (RPA2), and 14kDa (RPA3).
