identifier: InterPro:IPR048719
label: "Complement factor I, KAZAL domain"
definition: >-
  This entry represents the KAZAL domain from CFAI FIMAC domain. Complement factor I (CFAI) is a trypsin-like serine protease that plays an essential role in regulating the immune response by controlling all complement pathways. It cleaves three peptide bonds in the alpha-chain of C3b and two in the alpha-chain of C4b which inactivate these proteins. It consists of an N-terminal FI and membrane attack domain (FIMAC or Factor I-like modules FIM), a scavenger receptor cysteine-rich (SRCR) domain ( ), LDLRA1 and LDLRA2 ( ) and a C-terminal catalytic serine protease domain ( ). FIMs are also present in complement proteins C6 and C7, and participate in protein-protein interactions that critical to the progress of a complement-mediated immune response. In CFAI, the FIMAC domain is important for the ability of FI to degrade C4b and C3b. It consists of a small N-terminal FOLN subdomain ( ) and a larger C-terminal KAZAL domain.
