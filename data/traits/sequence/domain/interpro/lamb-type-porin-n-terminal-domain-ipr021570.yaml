identifier: InterPro:IPR021570
label: "LamB-type porin N-terminal domain"
definition: >-
  This entry represents an N-terminal extension found in some, though not all, of the LamB-type porins. The porin LamB family includes porin BglH, which may be a sugar porin with a broad carbohydrate specificity, and sucrose porin.
