identifier: InterPro:IPR013882
label: DNA endonuclease activator Ctp1, C-terminal
definition: >-
  This entry represents the C-terminal domain of the fission yeast Ctip (Ctp1) protein. Proteins containing this domain include DNA endonuclease RBBP8 (also known as CtBP-interacting protein, CtIP) from animals, protein gamma response 1 (GR1) from Arabidopsis and SAE2 from S. cerevisiae. SAE2 is a protein involved in repairing meiotic and mitotic double-strand breaks in DNA. Although proteins containing this domain were described as endonucleases, it is now known that they actually function as endonuclease activators that cooperates with the MRE11-RAD50-NBN (MRN) complex in processing meiotic and mitotic double-strand breaks (DSBs) by ensuring both resection and intrachromosomal association of the broken ends. This domain contains highly conserved residues at its 15-residue extreme that are indispensable for MRN (Mre11-Rad50-Nbs1) complex activation, through the stimulation of Mre11 endonuclease activity.
