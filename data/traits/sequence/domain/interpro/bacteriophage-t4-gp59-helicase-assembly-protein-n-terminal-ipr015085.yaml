identifier: InterPro:IPR015085
label: "Bacteriophage T4, Gp59, helicase assembly protein, N-terminal"
definition: >-
  The structure of Gp59 helicase assembly protein reveals a novel α-helical bundle fold with two domains of similar size. Surface residues are predominantly basic (pI 9.37) with clusters of acidic residues but exposed hydrophobic residues suggest sites for potential contact with DNA and with other protein molecules. The N-terminal domain shares structural homology with the high mobility group (HMG) proteins from eukaryotic organisms and it has been suggested that it plays a role in duplex DNA binding ahead of the fork. The C-terminal domain interacts with the helicase (T4 gp41) and with SSB (single-stranded binding protein T4 gp32). The Bacteriophage T4 gene 59 helicase assembly protein (Gp59) is required for recombination-dependent DNA replication and repair, which is the predominant mode of DNA replication in the late stage of T4 infection. Gp59 accelerates the loading of the T4 gene 41 helicase during DNA synthesis by the T4 replication system in vitro. This protein binds to both T4 gene 41 helicase and T4 gene 32 single-stranded DNA binding protein, and to single and double-stranded DNA.
