identifier: InterPro:IPR034012
label: "Pol II subunit B9, C-terminal zinc ribbon"
definition: >-
  The C-terminal zinc ribbon domain of subunit B9 in RNA polymerase (Pol) II (RPB9) is involved in intrinsic transcript cleavage. Eukaryote genomes are transcribed by three nuclear RNA polymerases (Pol I, II and III) that share some subunits. RPB9 is homologous to RPA12 of Pol I and RPC11 of Pol III subunits but its intrinsic cleavage activity is weaker for Pol II. RPB9 C-terminal zinc ribbon is homologous to Pol II elongation factor TFIIS domain III. The very weak cleavage activity of Pol II is stimulated by TFIIS. RPB9 has two zinc-binding domains separated by a flexible linker.
