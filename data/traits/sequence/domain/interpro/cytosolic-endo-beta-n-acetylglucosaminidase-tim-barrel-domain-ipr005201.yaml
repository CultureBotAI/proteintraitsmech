identifier: InterPro:IPR005201
label: Cytosolic endo-beta-N-acetylglucosaminidase, TIM barrel domain
definition: >-
  This describes the TIM barrel fold in ENGase, which contains a β/α fold. Endo-β-N-acetylglucosaminidase (ENGase) is a glycosyl hydrolase that cleaves the β-1,4-glycosidic bond within the di-N-acetylchitobiose core of N-glycosylated proteins, leaving one N-acetylglucosamine residue attached to the protein and releasing the remainder of the glycan. It plays a key role in the cytosolic degradation of free oligosaccharides derived from the endoplasmic reticulum, aiding in the recycling of sugars. ENGases possess an eight-stranded α/β barrel structure and belong to glycosyl hydrolase family 85 (GH85), sharing sequence similarity with chitinases. O-Glycosyl hydrolases are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website.
