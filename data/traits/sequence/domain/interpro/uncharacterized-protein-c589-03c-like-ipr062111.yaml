identifier: InterPro:IPR062111
label: "Uncharacterized protein C589.03c-like"
definition: >-
  This entry represents an N-terminal disordered region found in ribosome biogenesis proteins, particularly NOC1, and as standalone uncharacterised proteins in fungi. The region is characterised by extensive intrinsic disorder and compositional bias with enrichment of basic and acidic residues. Proteins containing this region localise to the nucleus and are associated with ribosome biogenesis processes. The prototype protein SPAC589.03c from Schizosaccharomyces pombe consists almost entirely of disordered regions. The specific function of this domain remains to be determined.
