identifier: InterPro:IPR018758
label: "Membrane iron-sulfur containing protein FtrD-like"
definition: >-
  Proteins containing this domain are bacterial membrane proteins associated with the FTR1 protein, an homologous to FtrC in the FtrABCD complex. This complex is a ferric iron transporter in which the ferric iron is generated by ferrous oxidation that requires the electron transfer by iron-sulfur cluster-containing FrtD. Proteins containing this domain are part of the iron-sulfur-containing Rieske superfamily and are likely to have an analogous function to FtrD in iron transport.
