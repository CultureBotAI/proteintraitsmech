identifier: InterPro:IPR032270
label: "AMPK, C-terminal adenylate sensor domain"
definition: >-
  This domain can be found at the C terminus of yeast SNF1 and animal 5'-AMP (adenosine monophosphate)-activated protein kinase (AMPK) subunit alpha. The yeast SNF1 kinase is a prototype of AMPKs that regulate cellular responses to a variety of nutritional and environmental stresses.
