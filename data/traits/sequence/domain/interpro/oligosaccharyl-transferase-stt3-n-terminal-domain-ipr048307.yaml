identifier: InterPro:IPR048307
label: Oligosaccharyl transferase STT3, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the oligosaccharyltransferase STT3 subunit and related proteins. The STT3 subunit is part of the oligosaccharyl transferase (OTase) complex of proteins and is required for its activity. In eukaryotes, OTase transfers a lipid-linked core-oligosaccharide to selected asparagine residues in the ER. In the archaea, STT3 occurs alone, rather than in an OTase complex, and is required for N-glycosylation of asparagines. The N-terminal domain consists of transmembrane helices.
