identifier: InterPro:IPR056948
label: "Peptide N-acetyl-beta-D-glucosaminyl asparaginase amidase A, N-terminal"
definition: >-
  This domain is found at the N-terminal end of almond Peptide-N4-(N-acetyl-beta-glucosaminyl)asparagine amidase A, a protein capable of hydrolysing glycopeptides with an alpha-1,3-fucosylated asparagine-bound N-acetylglucosamine. This domain is related to Peptide-N-glycosidases.
