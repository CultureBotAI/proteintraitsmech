identifier: InterPro:IPR048964
label: "Arginine dihydrolase ArgZ/ArgE-like, C-terminal, first subdomain"
definition: >-
  This domain is found at the C-terminal end of Arginine dihydrolase ArgZ from Synechocystis sp (also known as Sll1336 protein and Ornithine cyclodeaminase), ArgE from Synechocystis sp and similar prokaryotic sequences. ArgZ is involved in an ornithine-ammonia cycle (OAC) in cyanobacteria, which confers substantial adaptability under environmental nitrogen fluctuations. This protein is organised into three domains: a N-terminal domain belonging to the guanidino group-modifying enzyme (GME) family, a middle oxoglutarate reductase/saccharopine dehydrogenase bifunctional enzyme ( ) and a C-terminal uncharacterised region that can be divided in two subdomains. This entry represents the small first subdomain of the C-terminal domain, which folds into β-strands. Its specific function is unknown.
