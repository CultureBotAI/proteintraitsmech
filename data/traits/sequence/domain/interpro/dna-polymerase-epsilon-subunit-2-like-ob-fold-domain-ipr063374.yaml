identifier: InterPro:IPR063374
label: "DNA polymerase epsilon subunit 2-like, OB-fold domain"
definition: >-
  This oligonucleotide/oligosaccharide binding (OB) domain is found in human DNA polymerase epsilon subunit 2 (POLE2) and similar eukaryotic proteins. POLE2 is an accessory component of the DNA polymerase epsilon complex involved in n DNA repair and in chromosomal DNA replication.
