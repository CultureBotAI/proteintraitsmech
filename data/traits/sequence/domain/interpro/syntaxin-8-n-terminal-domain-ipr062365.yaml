identifier: InterPro:IPR062365
label: "Syntaxin-8, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in syntaxin-8 and related t-SNARE proteins from fungi. This domain precedes the characteristic t-SNARE coiled-coil homology domain ( ). Syntaxin-8 is a t-SNARE protein involved in membrane fusion specificity, protein transport and vesicle trafficking within the Golgi and endosomal systems. The protein localises to endosome membranes and interacts with other SNARE complex proteins including PEP12, VTI1 and SNC proteins. The specific function of this N-terminal domain remains to be determined.
