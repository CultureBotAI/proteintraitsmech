identifier: InterPro:IPR043955
label: "Domain of unknown function DUF5746"
definition: >-
  This is a highly conserved domain found in various Platyhelminthes. Its function is currently unknown, with some of the sequences annotated as being Palmitoyltransferase. This highly conserved domain is located at the amino terminus, next to a DHHC domain (named for its signature tetrapeptide Asp-His-His-Cys).
