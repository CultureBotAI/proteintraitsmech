identifier: InterPro:IPR046519
label: "X-Tfes, XVIPCD"
definition: >-
  This conserved domain is found in Xanthomonas VirD4 interacting proteins (XVIPs) and other type IV secretion system (T4SS) specialised in translocating effector proteins (toxic effector proteins, X-Tfes) into competing gram-negative species, leading to target cell death. This domain interacts with the central all-α domain of VirD4. Its structure shows two well ordered N-terminal antiparallel α-helices that pack against a carboxyl-terminal three-stranded antiparallel β-sheet.
