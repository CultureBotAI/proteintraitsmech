identifier: InterPro:IPR022442
label: "SO_2930-like, beta-helix domain"
definition: >-
  This entry represents a domain found in a group of uncharacterised diheme c-type cytochrome proteins that contain repeats associated with the formation of a right-handed helical stack of parallel β-strands, homologous to those found in a number of carbohydrate-binding proteins and sugar hydrolases. Each repeat is expected to consist of three β-strands that form a single turn as they form a right-handed helix of stacked β-structure. Member proteins occur regularly in two-gene pairs along with members of . In some cases, as in SO_2930 from Shewanella putrefaciens ( , ), both this entry and are fused. Both groups of proteins exhibit either lipoprotein or regular signal peptides, suggesting transit through the plasma membrane. Its specific function is unknown.
