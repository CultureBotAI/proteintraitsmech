identifier: InterPro:IPR021819
label: "Far11/STRP, C-terminal"
definition: >-
  This domain can be found in the C terminus of the yeast Far11 protein and the human STRP1/2 proteins. Budding yeast Far11 interacts with the phosphatases Pph21, Pph22, and Pph3 and may be involved in the regulation of autophagy and the DNA damage signaling. STRP1/2 (also known as FAM40A/B) are regulators of cytoskeletal organization, cell morphology and migration.
