identifier: InterPro:IPR049734
label: "NADH pyrophosphatase-like, C-terminal domain"
definition: >-
  NADH pyrophosphatase, also known as NAD-capped RNA hydrolase NudC, is a member of the Nudix hydrolase superfamily. This enzyme catalyses the cleavage of NADH into reduced nicotinamide mononucleotide (NMNH) and AMP and requires a divalent cation, such as Mg2+ or Mn2+ , for activity. Members of this family are also recognised by the Nudix motif, a highly conserved 23-residue block (GX5EX7REUXEEXGU, where U = I, L or V), that functions as a metal binding and catalytic site. A block of 8 conserved amino acids downstream of the Nudix motif is thought to give NADH pyrophosphatase its specificity for NADH.
