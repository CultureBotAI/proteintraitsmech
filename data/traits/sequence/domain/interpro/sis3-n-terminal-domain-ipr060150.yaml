identifier: InterPro:IPR060150
label: "SIS3, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain in E3 ubiquitin-protein ligase SIS3 from Arabidopsis thaliana and related plant proteins. SIS3 functions as a positive regulator of sugar signalling during the early stages of seedling development. It possess E3 ligase activity, which is crucial for the ubiquitination process, a post-translational modification that can alter protein function, localisation, or stability. This activity is essential for regulating various cellular processes, including growth and development in plants. This domain adopts an α-helical fold.
