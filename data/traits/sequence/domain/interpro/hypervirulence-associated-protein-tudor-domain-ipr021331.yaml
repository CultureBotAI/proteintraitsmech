identifier: InterPro:IPR021331
label: "Hypervirulence associated protein, TUDOR domain"
definition: >-
  Proteins containing this domain include HVA1 (hypervirulence-associated protein 1) from Cryptococcus neoformans, whose absence is associated with a hypervirulent phenotype in mice. Metabolomics analysis suggests that when HVA1 is absent there is a block in the citric acid cycle, while structural analysis of the Hva1 protein suggests a potential interaction with NADPH. Its structural architecture bears similarity with Tudor domains. Hva1 may play a role in primary metabolism.
