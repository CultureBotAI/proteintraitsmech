identifier: InterPro:IPR063307
label: "F59B10.3, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of CX domain-containing proteins and related uncharacterised proteins found in nematodes, including F59B10.3 from Caenorhabditis elegans, which is predicted to be a single-pass membrane protein. The domain spans approximately 50 amino acids and is located at the C-terminal end of these proteins. The function of this domain remains to be determined.
