identifier: InterPro:IPR062140
label: "PGA60, trefoil-like domain"
definition: >-
  This entry represents a trefoil-like domain found in PGA60 and related fungal proteins. The domain is approximately 110-120 amino acids in length and can be present in multiple copies within a single protein, with some proteins containing up to 10 repeats. PGA60 is a GPI-anchored cell membrane protein from Candida albicans that is up-regulated upon milbemycin treatment. The proteins containing this domain are found across fungi, particularly in yeasts, and are often associated with cell wall components. The domain shows similarity to trefoil motifs, which are typically involved in protein stability and protein-protein interactions. The specific function of this trefoil-like domain remains to be determined.
