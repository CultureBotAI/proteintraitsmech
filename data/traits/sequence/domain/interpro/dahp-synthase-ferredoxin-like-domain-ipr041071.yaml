identifier: InterPro:IPR041071
label: "DAHP synthase ferredoxin-like domain"
definition: >-
  This domain is found in 3-Deoxy-d-arabino-heptulosonate-7-phosphate synthase (DAHPS) present in Thermotoga maritime. DAHPS catalyzes the first reaction of the aromatic biosynthetic pathway in bacteria, fungi, and plants, the condensation of PEP and E4P with the formation of DAHP. The domain is ferredoxin-like and is thought to play a critical role in feedback regulation of the enzyme.
