identifier: InterPro:IPR033723
label: "PET prickle"
definition: >-
  Prickle has been implicated in regulation of cell movement in the planar cell polarity (PCP) pathway, which requires the conserved Frizzled/Dishevelled (Dsh). Prickle interacts with Dishevelled, thereby modulating the activity of Frizzled/Dishevelled and the PCP signalling. Two forms of prickle have been identified, namely prickle 1 and prickle 2. These are differentially expressed; prickle 1 is found in fetal heart and haematological malignancies, while prickle 2 is expressed in fetal brain, adult cartilage, pancreatic islet, and some types of tumorous cells. Prickle contains an N-terminal PET domain and three C-terminal LIM domains. This entry represents the PET domain of prickle. The PET domain is a protein-protein interaction domain, usually found in conjunction with the LIM domain, which is also involved in protein-protein interactions. The PET containing proteins serve as adaptors or scaffolds to support the assembly of multimeric protein complexes.
