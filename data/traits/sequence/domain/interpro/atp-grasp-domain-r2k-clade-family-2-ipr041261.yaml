identifier: InterPro:IPR041261
label: "ATP-grasp domain, R2K clade family 2"
definition: >-
  This domain can be found in a subfamily of ATP-grasp enzymes belonging to the R2K clade, wherein one of the absolutely-conserved lysine residues has migrated to the RAGYNA domain which is a part of the core ATP-grasp module. Proteins containing this domain are predicted to catalyze peptide ligation reactions on protein substrates in biological conflict contexts, probably between bacteriophages and their hosts.
