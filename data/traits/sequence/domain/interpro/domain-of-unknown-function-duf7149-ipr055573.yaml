label: "Domain of unknown function DUF7149"
definition: >-
  This domain is found in related bacterial proteins. It is predicted to adopt an α/β globular structure and shares significant sequence and structural similarity to members of PD-(D/E)XK nuclease superfamily, in particular, BpuSI N-terminal nuclease domain (Pfam:PF15516).
