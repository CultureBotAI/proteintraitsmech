identifier: InterPro:IPR042068
label: Semaphorin-1A, sema domain
definition: >-
  This entry represents the Sema domain found in Sema1A, which is a transmembrane protein. Sema1A binds to its receptor plexin A (PlexA), which in turn triggers downstream signaling events involving the receptor tyrosine kinase Otk, the evolutionarily conserved flavoprotein monooxygenase molecule interacting with CasL (MICAL), and the A kinase anchoring protein Nervy, leading to repulsive growth-cone response. Sema1A has also been shown to be involved in synaptic formation. Sema1A belongs to the semaphorin family, whose members are regulatory molecules in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module.
