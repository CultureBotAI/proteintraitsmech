identifier: InterPro:IPR035691
label: "ORC ubiquitin ligase 1, RING finger"
definition: >-
  ORC ubiquitin ligase 1 (OBI1, also known as RNF219) is essential for DNA replication origin activation during S phase. It acts as a replication origin selector which selects the origins to be fired and catalyses the multi-mono-ubiquitination of a subset of chromatin-bound ORC3 and ORC5 during S-phase. Common genetic variants at the OBI1 locus had been associated with alterations in lipid metabolism and cognitive performance. This entry represents the C3HC4-type RING-HC finger.
