identifier: InterPro:IPR040819
label: "Rolling Circle replication initiation protein, N-terminal"
definition: >-
  This is the N-terminal domain of the Rolling Circle Replication Initiator Protein (Rep) from Geobacillus stearothermophilus. This protein acts on plasmids from family pT181 to initiate replication, recruit a helicase to the site of initiation and terminate replication after DNA synthesis. These proteins possess a unique active site and a catalytically essential metal ion is bound in a distinct manner from other rolling circle Reps.
