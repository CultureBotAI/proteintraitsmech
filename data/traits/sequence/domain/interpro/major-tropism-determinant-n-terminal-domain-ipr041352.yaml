identifier: InterPro:IPR041352
label: "Major tropism determinant, N-terminal domain"
definition: >-
  This is the N-terminal domain of major tropism determinant (Mtd), a retroelement-encoded receptor-binding protein. Mtd-N forms a three-fold symmetric β-prism. This resembles the pseudo three-fold-symmetric β-prisms of monocot lectins, but lacks residues in these lectins identified as binding carbohydrates. The β-prism and β-sandwich domains reinforce overall trimeric assembly and therefore may have indirect roles in stabilizing the backbone of the variable region.
