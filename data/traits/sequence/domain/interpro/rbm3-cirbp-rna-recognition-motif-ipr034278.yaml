identifier: InterPro:IPR034278
label: "RBM3/CIRBP, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) domain of two structurally related heterogenous nuclear ribonucleoproteins, CIRBP (also known as CIRP) and RBM3, both of which belong to a highly conserved cold shock proteins family, characterised by an N-terminal RNA-binding domain and a C-terminal arginine-glycine-rich (RGG) domain. CIRBP and RBM3 are key factors during early development. They can be induced after exposure to a moderate cold-shock and other cellular stresses such as UV radiation and hypoxia. Despite the similarities between both CIRBP and RBM3 proteins, their biological functions are distinct.
