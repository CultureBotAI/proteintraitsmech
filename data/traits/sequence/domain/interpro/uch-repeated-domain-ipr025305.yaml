identifier: InterPro:IPR025305
label: "UCH repeated domain"
definition: >-
  This is a repeated domain found in de-ubiquitinating proteins. It's exact function is not known, although it is likely to be involved in the binding of the Ubps in the complex with Rsp5 and Rup1.
