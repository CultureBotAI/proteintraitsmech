identifier: InterPro:IPR003481
label: Flagellar hook-associated protein 2, N-terminal
definition: >-
  The flagellar hook-associated protein 2 (HAP2 or FliD) forms the distal end of the flagella, and plays a role in mucin specific adhesion of the bacteria. This entry represents the N-terminal region of this family of proteins.
