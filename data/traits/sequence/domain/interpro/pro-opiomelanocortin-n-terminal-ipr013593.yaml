identifier: InterPro:IPR013593
label: "Pro-opiomelanocortin N-terminal"
definition: >-
  This domain represents the N-terminal peptide of pro-opiomelanocortin (NPP). It is thought to represent an important pituitary peptide, given its high yield from pituitary glands, and exhibits a potent in vitro aldosterone-stimulating activity.
