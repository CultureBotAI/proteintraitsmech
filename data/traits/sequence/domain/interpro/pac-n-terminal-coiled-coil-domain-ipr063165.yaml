identifier: InterPro:IPR063165
label: "PAC, N-terminal coiled-coil domain"
definition: >-
  This entry represents the N-terminal coiled-coil domain found in PAC (Protein PALE CRESS) and related proteins from plants. PAC is a chloroplast-localised protein required for differentiation of chloroplasts from proplastids or etioplasts and is involved in chloroplast mRNA processing and maturation. The protein contains RNA binding activity and is essential for proper leaf development and chloroplast organisation. This coiled-coil domain is located in the N-terminal region following the chloroplast transit peptide. The specific function of this domain remains to be determined.
