identifier: InterPro:IPR039077
label: SNAP25, N-terminal SNARE motif, chordates
definition: >-
  This entry represents the N-terminal SNARE motif of SNAP25 and similar proteins from chordates. SNARE proteins are involved in the fusion of vesicles with their target membranes. Synaptosomal-associated protein 25 (SNAP25) regulates Kv2.1 voltage-dependent K(+) channels in pancreatic beta cells. It may also play a role in neurotansmiiter release form the synapse. It is a component of the SNARE core complex, which also includes VAMP2 and STX1A. In some fish species (goldfish, zebrafish) there are two homologues known as SNAP-25A and SNAP-25B.
