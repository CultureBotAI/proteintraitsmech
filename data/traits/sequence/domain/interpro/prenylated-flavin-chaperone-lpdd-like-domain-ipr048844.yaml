identifier: InterPro:IPR048844
label: "Prenylated flavin chaperone LpdD-like domain"
definition: >-
  This entry represents a domain present in LpdD (Swiss: ), a protein found in the gallate decarboxylase operon. Structurally this protein is closely related to eukaryotic proteasome assembling chaperone 4 (PAC4) . LpdD acts as a prFMNH2-binding chaperone, enabling apo-UbiD activation through enhanced prFMNH2 incorporation and subsequent oxidative maturation. LpdD assembles into homodimer, each protomer composed of a six-stranded mixed β-sheet with two α-helices packed on one side. LpdD contains two highly conserved histidine and an aspartate residues that bind Mn2+ ion ( ). The metal binding, however, is not essential for activity.
