identifier: InterPro:IPR064040
label: "Verrucosidin biosynthesis cluster protein U3, N-terminal domain"
definition: >-
  VerU3 is part of the gene cluster that mediates biosynthesis of verrucosidin, a methylated alpha-pyrone polyketide neurotoxin. This entry represents the helical bundle found at the N-terminal of these protiens.
