identifier: InterPro:IPR061790
label: "Domain of unknown function DUF8729"
definition: >-
  This entry represents an N-terminal domain of approximately 90 residues found in S8 family serine peptidases (subtilisins). The domain is found N-terminal to the Peptidase_S8 catalytic domain. In Bacteroidota members, the proteins often contain a C-terminal T9SS secretion signal. This family is found in bacteria including Pseudomonadota, Actinomycetota and Bacteroidota, as well as fungi (Ascomycota). The function of this domain remains to be determined.
