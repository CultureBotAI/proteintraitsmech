identifier: InterPro:IPR048372
label: "Cell-division protein ZapC, C-terminal"
definition: >-
  This is the C-terminal domain which contains a pocket with a hydrophobic centre surrounded by conserved basic residues, critical for FtsZ binding. This domain is related to Tudor domains ( ), whereas the N-terminal domain of ZapC has similarity to chromo domains ( ). ZapC is one of four FtsZ-binding components of the Z ring in bacteria. Formation of the Z ring on the cytoplasmic surface of the membrane is the starting process for assembly of the cell-division apparatus. It binds directly to the Z ring, and although it is not essential for absolute cell division it contributes to it by enhancing the interactions between the FtsZ protofilaments (or polymers) which aggregate to form the ring conformation in the Z ring.
