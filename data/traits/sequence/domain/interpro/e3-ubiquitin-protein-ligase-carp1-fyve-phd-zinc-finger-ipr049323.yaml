identifier: InterPro:IPR049323
label: "E3 ubiquitin-protein ligase CARP1, FYVE/PHD zinc finger"
definition: >-
  This entry represents the FYVE/PHD zinc finger form E3 ubiquitin-protein ligase RNF34, also known as Caspase regulator 1 (CARP1). This domain is also found in similar proteins from vertebrates. CARP1 ubiquitinates the caspases CASP8 and CASP10, promoting their proteasomal degradation, to negatively regulate cell death downstream of death domain receptors in the extrinsic pathway of apoptosis. It negatively regulates p53/TP53 through its direct ubiquitination and targeting to proteasomal degradation.
