identifier: InterPro:IPR041080
label: "YcaO cyclodehydratase, C-terminal"
definition: >-
  This is the proline-rich C-terminal domain found in ribosomal protein S12 methylthiotransferase accessory factor YcaO. It has been shown to be involved in both C protein recognition and cyclodehydration. The C-terminal domain resembles a tetratricopeptide repeat that mediates dimerization.
