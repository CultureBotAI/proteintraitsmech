identifier: InterPro:IPR054160
label: "MrkD-like, receptor binding domain"
definition: >-
  This entry represents the receptor binding domain of MrkD from Klebsiella pneumoniae and similar sequences. MkrD is an adhesin protein that specifically interacts with type IV and/or V collagen.
