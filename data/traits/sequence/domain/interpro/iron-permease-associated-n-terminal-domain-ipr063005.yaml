identifier: InterPro:IPR063005
label: "Iron permease-associated, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of approximately 240 residues found in FTR1 family iron permease proteins. The domain is found N-terminal to the FTR1 transmembrane domain and possibly comprises two 4-helix bundle subdomains. FTR1 proteins are involved in high-affinity iron transport. This family is found in diverse bacteria including Deinococcota, Bacillota, Chloroflexota, Actinomycetota and Pseudomonadota. The specific function of this domain remains to be determined.
