identifier: InterPro:IPR004337
label: "Astrovirus capsid protein, inner core domain"
definition: >-
  This entry represents the inner core nucleoplasmin-like domain of astrovirus capsid protein. The capsid protein (CP) undergoes proteolytic maturation to generate infectious particles. The CP is composed of several domains, including a highly basic N-terminal domain, a core domain, a spike domain, and a C-terminal acidic domain. The core domain is composed of two domains named inner and outer core domain, respectively . This entry represents the inner core domain. Astroviruses are a leading cause of viral diarrhea in young children, immunocompromised individuals, and the elderly. The astrovirus genome is apparently organised with nonstructural proteins encoded at the 5' end and structural proteins at the 3' end. Proteins in this family are encoded by astrovirus ORF2, one of the three astrovirus ORFs (1a, 1b, 2). The proteins contain a viral RNA-dependent RNA polymerase motif. The 87kDa precursor polyprotein undergoes an intracellular cleavage to form a 79kDa protein. Subsequently, extracellular trypsin cleavage yields the three proteins forming the infectious virion.
