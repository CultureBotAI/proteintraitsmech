identifier: InterPro:IPR058066
label: "pXO2-14/BXB0013/GBAA_pXO2_0013, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain in large, membrane-embedded proteins of mobile elements such as the Bacillus subtilis natto plasmid pLS20. They show distant relationships to better-characterised VirB-like conjugal transfer proteins. These proteins also show homology to the family of Mbov_0396-like transmembrane proteins found in ICE elements of Mycoplasmopsis bovis and related species. The Transporter Classification Database (TCDB) assigns 3.A.7.13.2 to the plasmid pLS20-like conjugation system, whose member proteins include VirB1, VirB4, VirB11, VirD2, and VirD4 homologs. This domain is predicted to contain five transmembrane α-helices.
