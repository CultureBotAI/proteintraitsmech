identifier: InterPro:IPR025155
label: "WxxW domain"
definition: >-
  This domain of unknown function carries a highly conserved WxxW sequence motif and also has at least six well conserved cysteine residues. It is found in variable numbers ranging from a single copy up to 32 consecutive copies, as in , from Branchiostoma floridae.
