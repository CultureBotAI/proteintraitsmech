identifier: InterPro:IPR028904
label: "Tox-REase-5 domain"
definition: >-
  This entry represents a restriction endonuclease fold present in bacterial polymorphic toxin systems. In bacterial polymorphic toxin systems, the toxin is exported by the type 2, type 5, type 6, or PrsW-peptidase dependent secretion system. Versions of this domain are also found in caudoviruses.
