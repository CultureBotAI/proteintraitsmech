identifier: InterPro:IPR040540
label: "Ribonuclease III, N-terminal domain"
definition: >-
  This is the N-terminal domain of eukaryotic ribonuclease 3 (RNase III). Structure analysis of Saccharomyces cerevisiae RNase III (known as Rnt1) revealed specific contacts between the N-terminal domain (NTD) dimer and the 5' end region of the tetraloop. Deletion of the NTD led to cleavage at alternative site(s), suggesting that this region increases the precision of the cleavage site selectivity.
