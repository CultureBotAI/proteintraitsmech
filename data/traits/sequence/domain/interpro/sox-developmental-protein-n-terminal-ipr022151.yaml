identifier: InterPro:IPR022151
label: "Sox developmental protein N-terminal"
definition: >-
  This domain is found in eukaryotes, and is typically between 69 and 88 amino acids in length. It is found in association with . It contains two conserved sequence motifs: YDW and PVR. It is found in Sox8, Sox9 and Sox10 proteins, which have structural similarity. Sox proteins are involved in developmental processes.
