identifier: InterPro:IPR049501
label: "A-ATP synthase, subunit H, N-terminal, archaeal"
definition: >-
  This domain is found at the N-terminal of MJ0223 from Methanocaldococcus jannaschii ( ), the subunit H of an archaeal A-ATP synthase. This entry represents the region that is involved in subunit H and E assembly. It folds into a continuous α-helix with a small kink in the centre of the molecule.
