identifier: InterPro:IPR034213
label: "Vpr-like peptidase, catalytic domain"
definition: >-
  This entry represents a peptidase Vpr-like domain, found in a subgroup of proteins that belong to the peptidase family S8, subfamily S8A (subtilisin). The maturation of the peptide antibiotic (lantibiotic) subtilin in Bacillus subtilis ATCC 6633 includes post-translational modifications of the propeptide and proteolytic cleavage of the leader peptide. Vpr (MEROPS identifier S08.114) was identified as one of the endopeptidases, along with WprA and AprE, that are capable of processing subtilin. Vpr is secreted and synthesized as an auto-processing precursor, and has been shown to be fibrinolytic. This entry also includes the FT peptidase from Bacillus sp. KSM-KP43 (S08.117). The subtilisin family is one of the largest serine peptidase families characterised to date. Over 200 subtilisins are presently known, more than 170 of which have their complete amino acid sequence. It is widespread, being found in eubacteria, archaebacteria, eukaryotes and viruses. The vast majority of the family are endopeptidases, although there is an exopeptidase, tripeptidyl peptidase. Structures have been determined for several members of the subtilisin family: they exploit the same catalytic triad as the chymotrypsins, although the residues occur in a different order (HDS in chymotrypsin and DHS in subtilisin), but the structures show no other similarity. Some subtilisins are mosaic proteins, while others contain N- and C-terminal extensions that show no sequence similarity to any other known protein.
