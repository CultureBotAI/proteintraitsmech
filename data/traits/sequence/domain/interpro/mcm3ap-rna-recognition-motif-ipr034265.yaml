identifier: InterPro:IPR034265
label: "MCM3AP, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of MCM3-associated protein (MCM3AP, also known as GANP), a nuclear protein with multiple domains, which have different functions. GANP serves as the scaffold of the mammalian TREX-2 complex that links transcription with nuclear messenger RNA export. GANP can act as an RNA export factor that interacts with activation-induced cytidine deaminase (AID) and shepherds it from the cytoplasm to the nucleus, and toward the IgV region loci in B cells. GANP contains the Sac3-homology domain, a putative RNA recognition motif, the Nup-homology domain, and the C-terminal histone-acetyltransferase (HAT) domain. Its HAT domain has been shown to regulate minichromosome maintenance protein 3 (MCM3). An alternatively spliced variant of GANP mRNA has been reported in humans. A shorter isoform of GANP (likely to encode an 80kDa protein) is associated with MCM3 of the DNA helicase MCM-complex (composed of MCM2-MCM7) and possesses HAT activity.
