identifier: InterPro:IPR005326
label: "Plectin/eS10, N-terminal"
definition: >-
  This domain is found at the N terminus of some isoforms of the cytoskeletal muscle protein plectin as well as the eukaryotic small ribosomal subunit protein eS10. This domain may be involved in RNA binding.
