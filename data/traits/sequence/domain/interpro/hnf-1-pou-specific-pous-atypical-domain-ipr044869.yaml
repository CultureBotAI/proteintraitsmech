identifier: InterPro:IPR044869
label: "HNF-1, POU-specific (POUs) atypical domain"
definition: >-
  This entry represents the atypical POU-specific domain found in hepatocyte nuclear factor (HNF)-1alpha and HNF-1beta. The POU (pronounced 'pow') domain [1 to 7] is a highly charged 155-162-amino acid region of sequence similarity which has been identified in the three mammalian transcription factors Pit-1, Oct-1, and Oct-2 and in the product of the nematode gene unc-86. The POU domain is a bipartite DNA binding protein module that binds selectively to the DNA octamer motif ATGCAAAT and a subset of derivatives. It consists of two subdomains, a C-terminal homeodomain (POUh) and an N-terminal 75- to 82-residue POU-specific (POUs) region separated by a short non-conserved linker. The POU-specific region or 'box' can be subdivided further into two highly conserved regions, A and B, separated by a less highly conserved segment. The POUs domain is always found in association with a POUh domain, and both are required for high affinity and sequence-specific DNA binding. The POUs domain consists of four α helices packed to enclose an extensive hydrophobic core. The POUs domain contains an unusual HTH structure, which differs from the canonical HTH motif in the length of the first α helix and the turn. The region of hypervariability located between subdomains A and B lies within the sequence corresponding to the C-terminal end of helix 2 and the linker between helices 2 and 3. In the model of the POUs-DNA complex, the C terminus of helix 2 and the turn of the HTH motif project away from the DNA such that sequence variability in this region can be accommodated without adversely affecting DNA binding. HNF1alpha (MODY3 gene product, the most commonly mutated MODY protein) and HNF1beta (hepatocyte nuclear factor 1beta; also known as vHNF1 or TCF2) (MODY5 gene product) are atypical me…
