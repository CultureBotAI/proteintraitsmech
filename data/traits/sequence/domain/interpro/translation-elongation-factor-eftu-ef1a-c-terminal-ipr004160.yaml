identifier: InterPro:IPR004160
label: "Translation elongation factor EFTu/EF1A, C-terminal"
definition: >-
  Elongation factor EF1A (also known as EF-1alpha or EF-Tu) promotes the GTP-dependent binding of aminoacyl-tRNA to the A-site of ribosomes during protein biosynthesis. EF1A consists of three structural domains. Release factor eRF3, which governs translation termination, has a similar overall structure. RF3 has an N-terminal extension and a EF1A-like C-terminal region which comprises a GTP-binding domain (G domain) and two β-barrel domains that are similar to the three respective domains of elongation factor EF-Tu/eEF1A. Archaeal EF1A is both involved in translational elongation and termination, as well as in mRNA surveillance, which explains the lack of an eRF3 orthologue in archaea. This entry represents the C-terminal domain of both EF1A and eRF3, which adopts a β-barrel structure. In EF1A, this domain is involved in binding to both charged tRNA and to EF1B (or EF-Ts, ).
