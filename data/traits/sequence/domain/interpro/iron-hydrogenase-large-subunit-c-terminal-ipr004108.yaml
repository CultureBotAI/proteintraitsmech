identifier: InterPro:IPR004108
label: "Iron hydrogenase, large subunit, C-terminal"
definition: >-
  Proteins containing this domain may be involved in the mechanism of biological hydrogen activation and contain 4FE-4S clusters. They can use molecular hydrogen for the reduction of a variety of substances. This domain consists of two intertwined α/β subdomains with FE-S cluster located at the interface between these subdomains.
