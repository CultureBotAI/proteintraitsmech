identifier: InterPro:IPR049620
label: "CAXIP2, GIY-YIG domain"
definition: >-
  This entry represents the GIY-YIG domain of CAX-interacting protein-2 (CXIP2), also known as CAXIP1-like and AtGRXS16 (bifunctional monothiol glutaredoxin-S16) from Arabidopsis. CAXIP1 (AtGRXS14) is a novel PICOT (Protein Kinase C-interacting Cousin of Thioredoxin) domain-containing Arabidopsis protein that activates H /Ca2 exchanger CAX1, and its homologue CAX4, but not CAX2 or CAX3. The GIY-YIG domain has significant similarity to the N-terminal catalytic domains of GIY-YIG family of intron-encoded homing endonuclease I-TevI and catalytic GIY-YIG domain of nucleotide excision repair endonuclease UvrC.
