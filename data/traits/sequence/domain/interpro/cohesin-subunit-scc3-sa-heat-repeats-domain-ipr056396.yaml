identifier: InterPro:IPR056396
label: "Cohesin subunit SCC3/SA, HEAT-repeats domain"
definition: >-
  This entry includes subunits of the cohesin complex - a protein complex required for sister chromatid cohesion in eukaryotes, including SA-1, SA-2 and SA-3 from vertebrates (STAG1-3), the orthologue from S.pombe Psc3 and the homologue from Arabidopsis, SCC3. This entry represents a central region of these proteins containing HEAT repeats, which may be involved in binding Scc1 subunit and nucleic acids. In STAG3, mutations in this region cause male infertility due to meiotic arrest.
