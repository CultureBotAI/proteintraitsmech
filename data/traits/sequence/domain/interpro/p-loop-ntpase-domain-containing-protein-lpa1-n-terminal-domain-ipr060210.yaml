identifier: InterPro:IPR060210
label: "P-loop NTPase domain-containing protein LPA1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain in LPA1 proteins, also known as LOW PHYTIC ACID 1 proteins. This domain is found in plants and includes multiple splice isoforms. LPA1 is required for the accumulation of phytic acid in seeds. Phytic acid is the primary storage form of phosphorus in cereal grains and other plant seeds. The protein contains a P-loop NTPase domain and is expressed in various tissues including roots, leaf blade shoots, leaf sheath shoots and panicles. Disruption of LPA1 results in strong reduction in seed phytic acid with a molar equivalent increase in inorganic phosphate.
