identifier: InterPro:IPR049160
label: "PI4KB/PIK1, accessory domain"
definition: >-
  Phosphatidylinositol 4-kinase beta (PI4KB) is one of four mammalian PI4K enzymes that phosphorylate phosphatidylinositol to generate phosphatidylinositol 4-phosphate (PI4P). It localizes at the Golgi and is essential for Golgi formation and function. PI4KB consists of two domains, a right-handed helical solenoid at the N-terminal, also referred to as accessory (PIK) domain, and a C-terminal kinase domain. This entry represents the N-terminal PIK domain from mammalian PI4KB and the yeast orthologue Pik1, which may be involved in substrate presentation.
