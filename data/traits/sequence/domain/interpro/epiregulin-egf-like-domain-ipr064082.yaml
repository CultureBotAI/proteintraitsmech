identifier: InterPro:IPR064082
label: "Epiregulin, EGF-like domain"
definition: >-
  Epiregulin is a ligand of the epidermal growth factor receptor (EGFR) and ERBB4, and stimulates their tyrosine phosphorylation. This entry represents the EGF-like domain that is essential for receptor binding. Proteins in this entry are specific to vertebrates.
