identifier: InterPro:IPR032518
label: "Dermatan-sulfate epimerase-like, N-terminal"
definition: >-
  This entry represents the N-terminal of dermatan-sulfate epimerase (DSE) from mammals, and heparin-sulfate lyase (HepB) from bacteria. DSE converts D-glucuronic acid to L-iduronic acid (IdoUA) residues. It plays an important role in the biosynthesis of the glycosaminoglycan/mucopolysaccharide dermatan sulfate. HepB cleaves both heparin and heparan sulfate glycosaminoglycans through a beta-elimination mechanism. It cleaves heparin at alpha-D-GlcNp2S6S(1->4) alpha-L-IdoAp2S and heparan sulfate at alpha-D-GlcNp2Ac(or 2S)6OH(1->4)beta-D-GlcAp. This domain is composed of helical hairpins.
