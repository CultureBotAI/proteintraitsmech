identifier: InterPro:IPR056196
label: "Mmc1, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of Mmc1 from Schizosaccharomyces pombe ( ) and related proteins. Mmc1 functions in concert with the mitochondrial contact site and cristae organizing system (MICOS) complex to promote normal mitochondrial morphology and respiratory function. This domain is predicted to adopt a globular structure composed mainly of α-helices. Some of them are predicted to be transmembrane and as such it is likely that this domain may associates with membrane. It was proposed that Mmc1 stabilises cristae architecture by acting as a scaffold to support cristae ultrastructure on the matrix side of the inner membrane.
