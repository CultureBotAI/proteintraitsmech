identifier: InterPro:IPR058652
label: "VapC50, C-terminal domain"
definition: >-
  This entry represents a domain found at the C-terminal end of putative ribonuclease VapC50 from Mycobacterium tuberculosis and similar bacterial proteins. VapC50 is the toxic component of a type II toxin-antitoxin system. It exhibits ribonuclease activity. Its toxicity is counteracted by their cognate antitoxins, such as VapB50, which neutralise their activity. This interaction is crucial for regulating cellular processes and maintaining cellular homeostasis under stress conditions. This domain is often found adjacent to the PIN domain ( ).
