identifier: InterPro:IPR025497
label: "PatA-like, N-terminal"
definition: >-
  This entry represents the N-terminal domain of Protein PatA from Nostoc sp. and similar bacterial proteins. PatA controls heterocyst pattern formation. It is required for the differentiation of intercalary heterocysts but not for terminal heterocysts. This domain was previously known as DUF4388.
