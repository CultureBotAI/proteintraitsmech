identifier: InterPro:IPR047222
label: "Circadian clock protein kinase KaiC, C-terminal domain"
definition: >-
  KaiC is a circadian clock protein, most studied in cyanobacteria. KaiC, an autokinase, autophosphatase, and ATPase, is part of the core oscillator, composed of three proteins: KaiA, KaiB, and KaiC. The circadian oscillation is regulated via KaiC phosphorylation. This entry represents the C-terminal domain of KaiC and similar bacterial proteins.
