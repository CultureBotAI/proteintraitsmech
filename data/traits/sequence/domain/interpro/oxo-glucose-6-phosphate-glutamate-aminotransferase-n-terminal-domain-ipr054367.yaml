identifier: InterPro:IPR054367
label: "Oxo-glucose-6-phosphate:glutamate aminotransferase, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of 3-oxo-glucose-6-phosphate:glutamate aminotransferase from Bacillus subtilis (NtdA), which is not found in other aminotransferases and consists of two-stranded parallel β-sheet flanked by two α-helices. This domain may be involved in protein-protein interactions. NtdA is a sugar aminotransferase involved in the biosynthesis of kanosamine(3-amino-3-deoxy-D-glucose), which is known to have antibiotic and antifungal properties, and to be a precursor of the antibiotic neotrehalosadiamine (3,3'-diamino-3,3'-dideoxy-alpha,beta-trehalose (NTD)). Members of this group are specific to Bacillales.
