identifier: InterPro:IPR057524
label: "Csa3, HTH domain"
definition: >-
  This is a HTH domain found in CRISPR locus-related putative DNA-binding protein Csa3 from Saccharolobus solfataricus . This entry also includes uncharacterised archaeal and bacterial proteins such as HVO_A0114 from Haloferax volcanii. Csa3 proteins consist of two domains that intertwine to form a homodimer. The N-terminal domain (also known as CARF domain) is a unique variation on the nucleotide-binding domain, and it is essential for dimer formation. It is composed of a mixed β-sheet flanked on both sides with α-helices. This domain contains two conserved sequence motifs [(D/N)-X-(S/T)-X3-(R/K) and L-X(2)-G-h-R] that map to a 2-fold symmetric pocket on the dimer axis. It has been shown that this pocket binds cyclic tetra-adenylate (cA4). The C-terminal domain is structurally similar to MarR-like winged helix-turn-helix domains and is involved in DNA recognition.
