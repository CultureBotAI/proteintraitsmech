identifier: InterPro:IPR032375
label: "Cerebral cavernous malformations 2, harmonin-homology domain"
definition: >-
  This entry represents the C-terminal folded helical region of cerebral cavernous malformations protein 2 (CCM2, also known as malcavernin), a component of the CCM signalling pathway which is a crucial regulator of heart and vessel formation and integrity. This domain is structurally homologous to the N-terminal domain of harmonin, so it is named the harmonin-homology domain (HHD). The structure of this domain has been revealed.
