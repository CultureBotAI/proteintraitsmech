identifier: InterPro:IPR032425
label: "Talin, N-terminal F0 domain"
definition: >-
  This domain (F0), found in the talin head, forms a stable globular structure. The fold is an ubiquitin-like fold joined to the F1 domain in a novel fixed orientation by an extensive charged interface. It is required for maximal integrin-activation.
