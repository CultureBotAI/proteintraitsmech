identifier: InterPro:IPR034352
label: "Rim4/Msa1, RNA recognition motif 1"
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of Rim4, a putative RNA binding protein that is expressed at elevated levels early in meiosis. It functions as a meiotic activator required for both the IME1- and IME2-dependent pathways of meiotic gene expression, as well as early events of meiosis, such as meiotic division and recombination. RIM4 contains two RNA recognition motifs (RRMs). Proteins containing this domain also includes Msa1 from Schizosaccharomyces pombe. It may be involved in the inhibition of sexual differentiation by controlling the expression of Ste11-regulated genes, possibly through the pheromone-signaling pathway. Like Rim4, Msa1 also contains two RRMs, both of which are essential for the function of Msa1.
