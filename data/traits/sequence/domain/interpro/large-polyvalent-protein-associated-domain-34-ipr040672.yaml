identifier: InterPro:IPR040672
label: "Large polyvalent protein associated domain 34"
definition: >-
  This is a predicted enzymatic α and β fold domain with a large, prominent helix with conserved glutamate residue and several additional conserved residues including the motifs HTxN and SN. The domain is associated with polyvalent proteins of firmicute conjugative elements.
