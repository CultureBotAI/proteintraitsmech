identifier: InterPro:IPR035546
label: "Neutrophil cytosol factor 2, SH3 domain 1"
definition: >-
  NADPH oxidase is a multisubunit complex that assembles during phagocytosis to generate reactive oxygen species. Neutrophil cytosol factor 2 (NCF2/p67-phox) and 1 (NCF1/p47-phox) are required for activation of the phagocyte NADPH oxidase. The activators p67phox and p47phox form a ternary complex together with adaptor protein p40phox. P40phox is involved in activation of the phagocyte oxidase by regulating membrane recruitment of p67phox and p47phox. p40phox associates with p67phox via binding of the p40phox PC motif to the p67phox PB1 domain. p67phox contains N-terminal TPR, first SH3 (or N-terminal or central SH3), PB1, and C-terminal SH3 domains. This entry represents the first SH3 domain found in p67phox. The N-terminal SH3 domain increases the affinity of p67phox for the oxidase complex.
