identifier: InterPro:IPR020975
label: "UvsW.1 domain"
definition: >-
  This entry represents the UvsW.1 domain, a small α-helical domain that is typically encoded by the gene adjacent (UvsW.1) to that of phage UvsW-like SF2 helicases. UvsW.1 domain features a trihelical bundle fold that is related to other nucleic acid binding domains such as the HRDC domain of the RecQ helicases.
