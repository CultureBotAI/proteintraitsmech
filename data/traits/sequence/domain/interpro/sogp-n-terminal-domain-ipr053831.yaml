identifier: InterPro:IPR053831
label: "SOGP, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of 1,2-beta oligoglucan phosphorylase (SOGP) and related bacterial proteins. This enzyme catalyses the phosphorolysis of beta-1,2-glucooligosaccharides (sophorooligosaccharides, Sops) with degrees of polymerization (DP) of 3 or more. It consists of four domains: two β-sandwich domains, an (α/α)6 catalytic domain and a β-sheet domain. The N-terminal domain adopts a supersandwich fold in which 18 β-strands define two β-sheets.
