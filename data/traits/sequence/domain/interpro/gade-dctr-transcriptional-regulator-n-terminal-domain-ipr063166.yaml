identifier: InterPro:IPR063166
label: "GadE/DctR transcriptional regulator, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of GadE, DctR (YhiF) and related transcriptional regulators. It precedes the C-terminal HTH LuxR-type DNA-binding domain ( ). GadE is a central regulator of the glutamate-dependent acid resistance system, activating expression of gadA and gadBC by binding to a 20 bp GAD box in their promoters. DctR contributes to bacterial virulence through regulation of type III secretion system 2 expression. Both regulators can form heterodimers with the response regulator RcsB. The family is found in Enterobacterales, including Escherichia and Shigella. The specific function of this N-terminal domain remains to be determined.
