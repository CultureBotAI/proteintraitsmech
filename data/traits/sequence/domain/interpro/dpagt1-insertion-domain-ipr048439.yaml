identifier: InterPro:IPR048439
label: "DPAGT1, insertion domain"
definition: >-
  DPAGT1 catalyses the initial step of dolichol-linked oligosaccharide biosynthesis in N-linked protein glycosylation pathway. This is the insertion domain of animal DPAGT1, a feature absent in prokaryotic counterparts. It referred to as CL9 in; it adopts a mixed α/β fold and it forms part of the substrate recognition site in human DPAGT1.
