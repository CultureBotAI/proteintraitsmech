identifier: InterPro:IPR032557
label: "PIN domain (DUF4935)"
definition: >-
  This domain is found on the N-terminal region of uncharacterised proteins. It shows homology to other PIN-like families and contains several acidic residues critical for chelating metal ions that are conserved in other PIN-like domains.
