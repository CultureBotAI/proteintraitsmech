identifier: InterPro:IPR033422
label: "Gammaproteobacterial periplasmic sensor domain GAPES2"
definition: >-
  GAPES2 (GAmmaproteobacterial PEriplasmic Sensor) domain is a periplasmic sensor domain found in diguanylate cyclases, including the diguanylate cyclase DgcI (YliF) of Escherichia coli. It contains three conserved Cys residues that might participate in thiol-disulfide exchange.
