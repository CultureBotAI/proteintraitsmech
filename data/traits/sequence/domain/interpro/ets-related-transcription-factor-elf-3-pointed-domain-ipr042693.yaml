identifier: InterPro:IPR042693
label: "ETS-related transcription factor Elf-3, pointed domain"
definition: >-
  This entry represents the Pointed domain found in transcriptional regulators Elf-3 (also known as ESE-1). The Pointed domain is a putative protein-protein interaction domain. ETS-related transcription factor Elf-3 (ESE-1) is an epithelium-specific Ets transcription factor. Ets factors are defined by a highly conserved DNA-binding domain called the Ets domain which binds to a purine-rich GGAA/T core motif in enhancer and promoter regions of target genes. Elf-3/ESE-1 has a role in inflammation, epithelial differentiation and cancer development. It has particularly high expression in the gastrointestinal tract, and may promote ulcerative colitis progression via accelerating NF-kappaB activation.
