identifier: InterPro:IPR046976
label: "BCAR1, C-terminal"
definition: >-
  Breast cancer anti-estrogen resistance protein 1 (BCAR1, also known as p130Cas) is a member of the Cas (Crk-associated substrate) family of adaptor proteins, which function as key signalling nodes with important regulatory roles in normal and pathological cells. BCAR1 plays a central coordinating role for tyrosine kinase-based signalling through focal adhesion kinase (FAK). It is readily phosphorylated by FAK and Src. Overexpression of BCAR1 confers anti-estrogen resistance on breast cancer cells. It regulates the tumour suppressor function of TGF-beta during breast cancer progression through regulation of Smad2/3 activity. This entry represents the FAT-like C-terminal domain of BCAR1, which binds to the C-terminal domain of NSPs (novel SH2-containing proteins) to form multidomain signaling modules that mediate cell migration and invasion.
