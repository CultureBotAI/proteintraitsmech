identifier: InterPro:IPR043659
label: "Exolysin-like, DUF5874"
definition: >-
  This domain is found in Exolysin and related sequences found in virus and fungi. Exolysin is involved in the degradation of the host cell wall at the site of attachment during viral entry. The function of this domain is unknown.
