label: "Rv3395c/MT3502-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the Rv3395c and MT3502 proteins found in Mycobacterium tuberculosis and similar proteins from actinomycetes. The specific function of this domain remains to be determined.
