identifier: InterPro:IPR061300
label: "AzlC-like, N-terminal domain"
definition: >-
  This entry represents a domain found at the N-terminal of some uncharacterised bacterial proteins and the branched-chain amino acid transport protein AzlC encoded by azlC gene, which is part of the azl operon, involved in branched-chain amino acid transport. AzlCD is a bipartite histidine exporter consisting of AzlC and AzlD subunits. Overexpression of this gene results in resistance to a leucine analogue, 4-azaleucine.
