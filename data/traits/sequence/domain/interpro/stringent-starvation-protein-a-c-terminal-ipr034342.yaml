identifier: InterPro:IPR034342
label: "Stringent starvation protein A, C-terminal"
definition: >-
  This entry represents the C-terminal GST-like α helical domain of the SspA (stringent starvation protein A) protein. Stringent starvation protein A (SspA) is a RNA polymerase (RNAP)-associated protein required for the lytic development of phage P1 and for stationary phase-induced acid tolerance of E. coli. It is implicated in survival during nutrient starvation. SspA adopts the GST fold with an N-terminal TRX-fold domain and a C-terminal α helical domain, but it does not bind glutathione (GSH) and lacks GST activity. SspA is highly conserved among Gram-negative bacteria. Related proteins found in Neisseria (called RegF), Francisella and Vibrio regulate the expression of virulence factors necessary for pathogenesis.
