identifier: InterPro:IPR045812
label: "DAHL domain"
definition: >-
  The DAHL (Double All-Helical Ligand-binding) domain is a novel periplasmic sensory domain, which is found in major types of bacterial signal transduction proteins: histidine kinases and diguanylate cyclases/phosphodiesterases, and, occasionally in chemoreceptors. The majority of the DAHL domain-containing proteins were found in alpha-, beta-, gamma- and epsilonproteobacteria. It is also present in some cyanobacterial species. Secondary structure prediction suggested that DAHL consists predominantly of α-helical regions. The DAHL domain has been identified in the Tlp10 chemoreceptor from the human pathogen Campylobacter jejuni and in the VirA sensor histidine kinase from a plant pathogen Agrobacterium tumefaciens. This domain recognises Asp, Ile, purine, fumarate, malate, alpha-ketoglutarate, mannose, rhamnose, fucose, sialic acid, Arg, thiamine and galactose.
