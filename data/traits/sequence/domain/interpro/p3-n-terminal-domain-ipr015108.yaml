identifier: InterPro:IPR015108
label: "P3, N-terminal domain"
definition: >-
  This entry represents the N-terminal in P3 major capside protein from Bacteriophage PRD1. P3 adopts a double-barrel structure comprising two eight-stranded viral β-barrels or jelly rolls, each of which contains a 12-residue α-helix. This protein then trimerises through a 'trimerisation loop' sequence, and is incorporated within the viral capsid.
