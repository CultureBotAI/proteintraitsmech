identifier: InterPro:IPR049022
label: "Phosphoacetylglucosamine mutase AMG1, domain III"
definition: >-
  Phosphoacetylglucosamine mutase (AMG1) catalyses the conversion of GlcNAc-6-P into GlcNAc-1-P during the synthesis of uridine diphosphate/UDP-GlcNAc. It consists of four domains, the first three have the same fold of four β-strands between two α-helices. This entry represents domain III of eukaryotic AMG1, which contains the sugar-binding loop.
