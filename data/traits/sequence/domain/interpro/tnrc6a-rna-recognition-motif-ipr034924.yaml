identifier: InterPro:IPR034924
label: "TNRC6A, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of the GW182 autoantigen, also termed trinucleotide repeat-containing gene 6A protein (TNRC6A). Mammals have three GW182 paralogues, TNRC6A, TNRC6B and TNRC6C. They interact directly with Argonaute (Ago) proteins and function downstream as effectors mediating mRNA repression. They repress mRNAs by recruiting the CCR4-NOT complex to the mRNA. They contain the N-terminal effector domain (NED), the middle Q-rich region, and the C-terminal effector domain (CED) containing the poly(A) binding protein (PABP)-interacting motif 2 (PAM2) and the RNA-recognition motif (RRM).
