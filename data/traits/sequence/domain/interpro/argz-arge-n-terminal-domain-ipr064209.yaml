identifier: InterPro:IPR064209
label: "ArgZ/ArgE, N-terminal domain"
definition: >-
  This entry represents the N-teminal domain of the bifunctional arginine dihydrolase/ornithine cyclodeaminase ArgZ (also known as as Sll1336), ArgE from Synechocystis sp and similar sequences specific to cyanobacteriota. ArgZ is involved in an ornithine-ammonia cycle (OAC) in cyanobacteria, which confers substantial adaptability under environmental nitrogen fluctuations. This protein is organised into three domains: a N-terminal domain belonging to the guanidino group-modifying enzyme (GME) family, a middle oxoglutarate reductase/saccharopine dehydrogenase bifunctional enzyme ( ) and a C-terminal region that can be divided in two subdomains ( and ).
