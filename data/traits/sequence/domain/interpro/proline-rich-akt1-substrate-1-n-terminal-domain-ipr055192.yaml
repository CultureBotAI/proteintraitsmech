identifier: InterPro:IPR055192
label: "Proline-rich AKT1 substrate 1, N-terminal domain"
definition: >-
  This entry represents a domain found in the N-terminal of the PRAS (Proline-rich AKT1 substrate 1) family. PRAS is a proline-rich protein that can be phosphorylated by AKT, and in the phosphorylated state binds to 14-3-3. The AKT signalling pathway contributes to regulation of apoptosis after a variety of cell death stimuli, and PRAS is found to be a substrate. PRAS plays an important role in regulating cell survival downstream of the PI3-K/Akt pathway after reperfusion injury after transient focal cerebral ischemia. Copper/zinc-SOD (SOD1), a cytosolic isoenzyme of superoxide dismutase, SOD, is highly protective against ischemia and re-perfusion injury after transient focal cerebral ischemia, and SOD1 thus contributes to the inhibition of direct oxidation of PRAS and the activation of its signalling pathway. PRAS is also an mTOR binding partner, and PRAS phosphorylation by AKT and its association with 14-3-3, a cytosolic anchor protein, are crucial for insulin to stimulate mTOR (mammalian target of rapamycin).
