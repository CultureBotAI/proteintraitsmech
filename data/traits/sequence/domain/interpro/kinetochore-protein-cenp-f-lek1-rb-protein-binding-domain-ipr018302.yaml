identifier: InterPro:IPR018302
label: "Kinetochore protein Cenp-F/LEK1, Rb protein-binding domain"
definition: >-
  This entry represents the Rb protein-binding domain from the centromere protein Cenp-F. Cenp-F is a centromeric kinetochore, microtubule-binding protein consisting of two 1,600-amino acid-long coils, that is involved in chromosome segregation during mitosis and is essential for the full functioning of the mitotic checkpoint pathway. Cenp-F interacts with retinoblastoma protein (RB), CENP-E and BUBR1. This domain is at the very C terminus of the C-terminal coiled-coil region, and binds to the Rb family of tumour suppressors.
