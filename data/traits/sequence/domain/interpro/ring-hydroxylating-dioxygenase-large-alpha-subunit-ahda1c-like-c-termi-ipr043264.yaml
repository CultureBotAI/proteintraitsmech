identifier: InterPro:IPR043264
label: "Ring-hydroxylating dioxygenase, large/alpha subunit AhdA1c-like, C-terminal"
definition: >-
  This entry represents the C-terminal domain of the large/alpha subunit (ahdA1c) of a ring-hydroxylating dioxygenase from Sphingomonas sp. strain P2 and related Rieske-type non-heme iron aromatic ring-hydroxylating oxygenases. In Sphingomonas sp. strain P2, AhdA3A4A2cA1c is one of three known isofunctional salicylate 1-hydroxylase complexes, involved in phenanthrene degradation, which catalyze the monooxygenation of salicylate, the metabolite of phenanthene degradation, to produce catechol. This complex prefers salicylate over other substituted salicylates; the other two salicylate 1-hydroxylases have different substrate preferences. The ring-hydroxylating oxygenase components are oligomers, either (alpha)n or (alpha)n(beta)n. The alpha subunits are the catalytic components and have an N-terminal domain, which binds a Rieske-like 2Fe-2S cluster, and a C-terminal domain which binds the non-heme Fe2. The Fe2 is co-ordinated by conserved His and Asp residues. This entry also includes TPDA1/TPDA2 from Comamonas sp., NAGG from Ralstonia sp., and ANDAC from Burkholderia cepacia.
