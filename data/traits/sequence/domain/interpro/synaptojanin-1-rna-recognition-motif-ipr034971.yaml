identifier: InterPro:IPR034971
label: "Synaptojanin-1, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of synaptojanin-1. Synaptojanin-1 was originally identified as one of the major Grb2-binding proteins that may participate in synaptic vesicle endocytosis. It also acts as an Src homology 3 (SH3) domain-binding brain-specific inositol 5-phosphatase, with a putative role in clathrin-mediated endocytosis. Synaptojanin-1 contains an N-terminal domain homologous to the cytoplasmic portion of the yeast protein Sac1p, a central inositol 5-phosphatase domain followed by a putative RNA recognition motif (RRM), and a C-terminal proline-rich region mediating the binding of synaptojanin-1 to various SH3 domain-containing proteins including amphiphysin, SH3p4, SH3p8, SH3p13, and Grb2.
