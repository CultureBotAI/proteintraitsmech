identifier: InterPro:IPR029144
label: "Threonine synthase, N-terminal"
definition: >-
  This domain is found at the N terminus of many threonine synthase enzymes. Threonine synthases catalyses the gamma-elimination of phosphate from L-phosphohomoserine and the beta-addition of water to produce L-threonine.
