identifier: InterPro:IPR062480
label: "YfbP, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of YfbP, an uncharacterised protein from Escherichia and related bacteria. YfbP from Escherichia coli K12 is a 282 amino acid protein. The function of this domain remains to be determined.
