identifier: InterPro:IPR055505
label: "Domain of unknown function DUF7077"
definition: >-
  This domain is found in a group of uncharacterised proteins mainly from fungi. It shares a weak sequence similarity with the Ig-like domains found in Trs130, particularly the second Ig-like domain, and it is predicted to adopt a structure with a similar topology.
