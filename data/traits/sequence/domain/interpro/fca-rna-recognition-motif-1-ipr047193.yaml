identifier: InterPro:IPR047193
label: "FCA, RNA recognition motif 1"
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of FCA. The flowering time control protein FCA is a RNA-binding protein and a critical component of the autonomous flowering pathway, which induces flowering by suppressing the floral repressor FLOWERING LOCUS C (FLC). It plays a role in alternative polyadenylation of its own pre-mRNA and antisense FLC RNA. It can also serve as a chromatin remodelling factor that mediates histone demethylation of FLC chromatin, causing suppression of FLC expression. FCA contains two RNA recognition motifs (RRMs).
