identifier: InterPro:IPR057508
label: "SHC SH2 domain-binding protein 1-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of SHC SH2 domain-binding protein 1 (SHCBP) and related sequences from animals such as SHCBA-B, SHP1L and NESD. SHCBP is involved in the regulation of multiple signalling pathways, such as FGF, NF-kB, MAPK/ERK, PI3K/AKT, TGF-beta/Smad and beta-catenin signalling. SHCBP participates in T-cell development, the regulation of downstream signal transduction pathways, and cytokinesis during mitosis and meiosis. SHCBP has been demonstrated to correlate with different forms of cancer and other diseases, and may play an important role in tumourigenesis and progression. The N-terminal domain of SHCBP was shown to be pivotal for its binding with RACGAP1, a component of the central spindlin complex in the nucleus with a significant role in oncogenic development and tumour recurrence. This domain might be found in association with a C-terminal β-helix.
