identifier: InterPro:IPR056816
label: "ACT domain-containing protein ACR9/10, N-terminal domain"
definition: >-
  This is the ACT domain found at the N-terminal of ACT domain-containing protein ACR9/10 from Arabidopsis thaliana and similar plant proteins. They may bind amino acids. Plant ACT DOMAIN REPEAT (ACR) proteins may also serve as nutrient sensors. ACR9 might function as a repressor in glucose (Glc) signalling pathways. It is highly expressed in the leaves, and its expression is downregulated by sugars.
