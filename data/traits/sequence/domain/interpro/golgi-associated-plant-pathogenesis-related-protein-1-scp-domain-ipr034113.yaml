identifier: InterPro:IPR034113
label: "Golgi-associated plant pathogenesis-related protein 1, SCP domain"
definition: >-
  This SCP-like extracellular protein domain is found in golgi-associated plant pathogenesis-related protein 1 (GAPR-1).The human GAPR-1 protein has been reported to dimerize, and such a dimer may form an active site containing a catalytic triad. GAPR-1 and GLIPR-2 appear to be synonyms. The SCP domain is also known as CAP domain. The wider family of SCP containing proteins includes plant pathogenesis-related protein 1 (PR-1), CRISPs, mammalian cysteine-rich secretory proteins, which combine SCP with a C-terminal cysteine rich domain, and allergen 5 from vespid venom. It has been proposed that SCP domains may function as endopeptidases.
