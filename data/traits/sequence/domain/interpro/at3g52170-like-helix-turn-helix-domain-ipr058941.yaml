identifier: InterPro:IPR058941
label: "AT3G52170-like, helix-turn-helix domain"
definition: >-
  This entry represents a helix-turn-helix (HTH) DNA-binding domain found at the N-terminal region of plant proteins including Arabidopsis thaliana AT3G52170 ( ) and AT5G58210 ( ). These proteins are annotated as DNA binding proteins and the domain is likely involved in transcriptional regulation. The HTH motif is a common DNA-binding motif in transcription factors. The specific function of this domain in plants remains to be characterised.
