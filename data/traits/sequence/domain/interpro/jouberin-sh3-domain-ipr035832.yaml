identifier: InterPro:IPR035832
label: "Jouberin, SH3 domain"
definition: >-
  Jouberin, also called AHI-1, is expressed in high levels in the brain, gonad tissues, and skeletal muscle. It is an adaptor protein that interacts with the small GTPase Rab8a and regulates its distribution and function, affecting cilium formation and vesicle transport. Mutations in the AHI-1 gene can cause Joubert syndrome, a disorder characterised by brainstem malformations, cerebellar aplasia/hypoplasia, and retinal dystrophy. AHI-1 variation is also associated with susceptibility to schizophrenia and type 2 diabetes mellitus progression. AHI-1 contains WD40 and SH3 domains.
