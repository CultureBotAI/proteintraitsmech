identifier: InterPro:IPR048529
label: "GP38, nairovirus"
definition: >-
  This entry represents the GP38 secreted glycoprotein from nairoviruses, including CCHFV and Dugbe virus. It is encoded in the glycoprotein precursor complex (GPC) from the M segment of nairovirus genome. It has a novel fold composed of a three-helix bundle and a β-sandwich. Although its function is unknown, it is known to be immunogenic in humans and, therefore, an interesting vaccine target.
