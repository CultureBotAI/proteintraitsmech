identifier: InterPro:IPR039447
label: "Urease accessory protein UreH-like, transmembrane domain"
definition: >-
  Urease is a nickel containing metalloenzyme that hydrolyses urea into ammonia. This entry represents a transmembrane domain found in UreH, an urease accessory protein. In Helicobacter pylori, UreH is part of the UreG/UreF/UreH complex that may be responsible for delivery of nickel ions into the urease active site. This entry also includes Chloroplast protein FOR GROWTH AND FERTILITY 1/2 from Arabidopsis, transmembrane proteins essential for supporting female gametogenesis and embryogenesis, probably by securing local energy supply.
