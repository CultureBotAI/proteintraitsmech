identifier: InterPro:IPR033878
label: "Oxygen-insensitive NAD(P)H nitroreductase NfsB-like"
definition: >-
  Nitroreductases are flavin-associated oxidoreductase enzymes that reduce nitro substituents on aromatic rings. They can be divided in two functional classes. Type I nitroreductases are oxygen-insensitive, i.e. can generate nitroso, hydroxylamine and/or amine end-products in the presence of molecular oxygen, whereas type II nitroreductases are oxygen-sensitive and can only generate these products when oxygen is absent. This family includes type I oxidoreductases such as NfsB from Escherichia coli, RdxA and FrxA from Helicobacter pylori, and FRase I in Vibrio fischeri, which reduces FMN into FMNH2 as part of the bioluminescent reaction. This type of nitroreductase can be used in cancer chemotherapy to activate a range of prodrugs.
