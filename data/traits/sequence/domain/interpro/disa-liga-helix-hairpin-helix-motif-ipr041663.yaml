identifier: InterPro:IPR041663
label: "DisA/LigA, helix-hairpin-helix motif"
definition: >-
  This HhH domain is a DNA-binding domain. It can be found in bacterial checkpoint control protein DisA, NAD-dependent DNA ligase LigA, UvrABC system protein C and in the ATP-dependent DNA helicase Hel308 (also known as HelQ). DNA integrity scanning protein (DisA) participates in a DNA-damage check-point that is active prior to asymmetric division when DNA is damaged. DisA forms globular foci that rapidly scan along the chromosomes during sporulation, searching for lesions. When a lesion is present, disA pauses at the lesion site. This triggers a cellular response that culminates in a temporary block in sporulation initiation.
