identifier: InterPro:IPR049442
label: "Thiamin pyrophosphokinase-like, substrate-binding domain"
definition: >-
  This domain is found at the C-terminal end of a group of poorly characterised proteins predominantly found in bacteroidetes and campylobacteria, including Thiamin pyrophosphokinase from Bacteroides thetaiotaomicron. This protein consists of a N-terminal catalytic domain and a C- terminal domain which shows an structure mainly composed of β-strands.
