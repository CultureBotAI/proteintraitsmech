identifier: InterPro:IPR036018
label: "Plant myosin, class XI, motor domain"
definition: >-
  Plant-specific type XI myosins are involved in organelle transport. The catalytic (head) domain has ATPase activity and belongs to the larger group of P-loop NTPases. It is a molecular motor, which utilizes ATP hydrolysis to generate directed movement toward the plus end along actin filaments.
