identifier: InterPro:IPR032630
label: "P-type ATPase, C-terminal"
definition: >-
  This domain is found at the C terminus of a number of phospholipid-translocating ATPases from eukaryotes. It is involved in intracellular trafficking and it seems that it also plays a role in their enzymatic activities.
