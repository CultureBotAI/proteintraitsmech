identifier: InterPro:IPR062412
label: "Trehalase, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain found in trehalase and mannosylglycerate hydrolase enzymes from Spirochaetota. The domain is approximately 60-85 residues in length. Trehalases catalyse the hydrolysis of trehalose into glucose. These enzymes belong to glycoside hydrolase family 63 and contain an N-terminal MGH1-like glycoside hydrolase domain. The specific function of this C-terminal domain remains to be determined.
