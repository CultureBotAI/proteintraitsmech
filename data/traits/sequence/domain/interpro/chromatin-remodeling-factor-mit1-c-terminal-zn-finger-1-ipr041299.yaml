identifier: InterPro:IPR041299
label: "Chromatin remodeling factor Mit1, C-terminal Zn finger 1"
definition: >-
  The Snf2/Hdac Repressive Complex (SHREC) is the fission yeast nucleosome remodeling and deacetylation (NuRD) equivalent and plays a major role in transcriptional gene silencing (TGS) within S. pombe heterochromatin. SHREC consists of the chromatin remodeler Mit1, the HDAC Clr3, and Clr1 and Clr2 proteins. The Mit1 C terminus contains two zinc binding motifs (CCHC zinc fingers) at the C terminus onto which the α helices from both Clr1 and Mit1 pack. The Mit1 chromatin remodeler uses its C-terminal domain to intimately bind to the N-terminal half of Clr1 to integrate into the SHREC complex. This is entry represents the first C-terminal zinc-binding domain found on Mit-1.
