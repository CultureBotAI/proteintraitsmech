identifier: InterPro:IPR012473
label: "Fibritin C-terminal"
definition: >-
  This domain is found at the C terminus of the Bacteriophage T4 protein fibritin ( ). Fibritin is responsible for attachment of long tail fibres to virus particle, and forms the "whiskers" or fibres on the neck of the virion. This domain contains an N-terminal coiled-coil portion and the C-terminal globular "foldon" region (residues 457-486), which is essential for fibritin trimerisation and folding. The foldon region consists of a β-hairpin; three such hairpins come together in a β-propeller-like arrangement in the trimer, which is stabilised by hydrogen bonds, salt bridges and hydrophobic interactions.
