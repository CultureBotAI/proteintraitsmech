identifier: InterPro:IPR044871
label: "Structural accessory protein ORF7a, SARS-CoV-like, X4e domain"
definition: >-
  This entry includes the structural accessory protein ORF7a, also called NS7a, X4 and U122, of Severe Acute Respiratory Syndrome Coronaviruses (SARS-CoV) from betacoronavirus subgenera Sarbecovirus (lineage B), including SARS-CoV-2. ORF7a/NS7a from betacoronavirus in the subgenera Sarbecovirus (B lineage) are not related to NS7a proteins from other coronavirus lineages. The structure of the structural accessory protein ORF7a, shows similarities to the immunoglobulin-like fold with some features resembling those of the Dl domain of ICAM-1 and suggests a binding activity to integrin I domains. In SARS-CoV-infected cells, ORF7a is expressed and retained intracellularly within the Golgi network. ORF7a is thought to play an important role during the SARS-CoV replication cycle. Expression studies of ORF7a have shown that biological functions include induction of apoptosis through a caspase-dependent pathway, activation of the p38 mitogen-activated protein kinase signaling pathway, inhibition of host protein translation, and suppression of cell growth progression. These results collectively suggested that ORF7a protein may be involved in virus-host interactions. Studies in SARS-CoV-2 revealed that ORF7a plays a role as antagonist of host tetherin (BST2), disrupting its antiviral effect. ORF7a binds to BST2 and sequesters it to the perinuclear region, thereby preventing its antiviral function at cell membrane. This entry represents the X4 ectodomain from ORF7a (X4e), which forms a well defined β-sandwich fold. It is built up from seven β-strands, four strands form one β-sheet and the other three strands form a second sheet. The sheets are closely packed or 'sandwiched' against each other. Each sheet is amphipathic with the hydrophobic side facing inward. Two disulfide bonds lin…
