identifier: InterPro:IPR001528
label: "Flavivirus non-structural protein NS4B"
definition: >-
  Flaviviruses encode a single polyprotein. This is cleaved into three structural and seven non-structural proteins. The NS4B protein is small and poorly conserved among the Flaviviruses. NS4B contains multiple hydrophobic potential membrane spanning regions. NS4B may form membrane components of the viral replication complex and could be involved in membrane localisation of NS3 and NS5 (see ).
