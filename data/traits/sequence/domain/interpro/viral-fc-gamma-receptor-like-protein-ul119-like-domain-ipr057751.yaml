identifier: InterPro:IPR057751
label: "Viral Fc-gamma receptor-like protein UL119-like domain"
definition: >-
  This entry represents a viral domain found in Fc-gamma receptor-like protein UL119 (gp68) and similar cytomegalovirus proteins. The domain binds to the Fc part of human IgG and may be involved in interfering with host Ig-mediated immune responses. Unlike host Fc receptors, viral Fc receptors can bind to deglycosylated Fc and interact with the CH2-CH3 interface of immunoglobulin G. The domain contains an immunoglobulin-like fold and binds Fc with nanomolar affinity at a range of pH values.
