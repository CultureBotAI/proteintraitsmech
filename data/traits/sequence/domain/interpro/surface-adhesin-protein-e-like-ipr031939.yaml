identifier: InterPro:IPR031939
label: "Surface-adhesin protein E-like"
definition: >-
  Adhesin E plays a role in pathogenesis. It binds to host proteins including plasminogen, vitronectin and laminin. This entry also includes putative uncharacterised protein YjhD from E. coli.
