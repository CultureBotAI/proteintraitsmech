identifier: InterPro:IPR048488
label: "1,3-alpha-isomaltosidase-like, N-terminal domain"
definition: >-
  This entry represents a domain found at the N-terminal of 1,3-alpha-isomaltosidase from Kribbella flavida (AIMA, also known as Kfla1895) and similar sequences from actinomycetes. AIMA is involved in the intracellular degradation of the cyclic tetrasaccharide cyclobis-1-6-alpha-nigerosyl formed extracellularly from starch. It catalyses the hydrolysis of the alpha-1,3-glucosidic linkage of cyclobis-1-6-alpha-nigerosyl to yield isomaltose via a possible linear tetrasaccharide. This domain folds into an Ig-like β-sandwich.
