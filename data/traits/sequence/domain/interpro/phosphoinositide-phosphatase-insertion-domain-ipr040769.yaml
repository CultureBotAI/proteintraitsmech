identifier: InterPro:IPR040769
label: "Phosphoinositide phosphatase insertion domain"
definition: >-
  This domain is found in the effector protein SidP present in Legionella longbeachae. SidP functions as a Phosphoinositide-3-phosphatase specifically hydrolyzing Phosphoinositide(3)P, referred to as PI(3)P, and PI(3,5)P2. The domain is inserted into the N-terminal portion of the catalytic domain and is referred to as the appendage or insertion (I) domain.
