identifier: InterPro:IPR042061
label: "Peregrin, ePHD domain"
definition: >-
  This entry represents the ePHD finger of Peregrin (also known as BRPF1), which is a multi-domain protein that binds histones, mediates monocytic leukaemic zinc-finger protein (MOZ) -dependent histone acetylation, and is required for Hox gene expression and segmental identity. It is a close partner of the MOZ histone acetyltransferase (HAT) complex and a novel Trithorax group (TrxG) member with a central role during development. BRPF1 is primarily a nuclear protein that has a broad tissue distribution and is abundant in testes and spermatogonia. It contains a plant homeodomain (PHD) zinc finger followed by a non-canonical ePHD finger, a bromodomain and a proline-tryptophan-tryptophan-proline (PWWP) domain. This PHD finger binds to methylated lysine 4 of histone H3 (H3K4me), the bromodomain interacts with acetylated lysines on N-terminal tails of histones and other proteins, and the PWWP domain shows histone-binding and chromatin association properties. BRPF1 may be involved in chromatin remodelling. The extended plant homeodomain (ePHD) zinc finger is characterised as Cys2HisCys5HisCys2His.
