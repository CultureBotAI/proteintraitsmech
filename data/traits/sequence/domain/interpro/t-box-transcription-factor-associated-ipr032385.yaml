identifier: InterPro:IPR032385
label: "T-box transcription factor-associated"
definition: >-
  This domain lies downstream of the T-box in many eukaryotic T-box proteins. Transcription factors of the T-box family are required for early cell-fate decisions, and for differentiation and organogenesis. The exact function of this domain is not known.
