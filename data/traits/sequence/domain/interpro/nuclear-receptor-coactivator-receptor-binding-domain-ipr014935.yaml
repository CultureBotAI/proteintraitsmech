identifier: InterPro:IPR014935
label: "Nuclear receptor coactivator, receptor-binding domain"
definition: >-
  This domain is found in steroid/nuclear receptor coactivators and contains two LXXLL motifs that are involved in receptor binding and includes SRC-1/NcoA-1, NcoA-2/TIF2, pCIP/ACTR/GRIP-1/AIB1.
