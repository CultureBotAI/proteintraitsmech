identifier: InterPro:IPR056788
label: "ABC transporter A family member 2/9/11, C-terminal domain"
definition: >-
  This domain is found towards the C-terminal of ABC transporter A family members 2/9/11 from Arabidopsis thaliana and similar plant proteins. This domain is predicted to adopt a mainly β structure. ABCA9 mediates the transport of acyl-CoAs and/or free fatty acids to the endoplasmic reticulum. It has no effect on the selectivity of fatty acid incorporation into triacylglycerol or further desaturation steps. ABCA2, also known as ATH1, can control Arabidopsis rosette habit when it is induced. ATH1 induction prevents rosette internode elongation by maintaining the shoot apical meristem (SAM) rib zone area inactive and requires inactivation of photomorphogenesis inhibitors, including PHYTOCHROME INTERACTING FACTOR (PIF) proteins.
