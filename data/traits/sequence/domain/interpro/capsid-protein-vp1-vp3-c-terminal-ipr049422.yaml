identifier: InterPro:IPR049422
label: "Capsid protein VP1/VP3, C-terminal"
definition: >-
  This entry represents the C-terminal domain of capsid proteins from reovirales that form the icosahedral capsid through self-assembly (they are also known as inner layer core proteins). The capsid encapsulates and protects the genomic RNA. These viruses encode VP1, VP3 and VP5 as major capsid proteins, encoded by RNA segment 1 and 3 in the case of VP1 and VP3, respectively, whereas RNA segment encoding VP5 is still unclear.
