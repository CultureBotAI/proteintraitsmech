identifier: InterPro:IPR042719
label: "Plexin-D1, sema domain"
definition: >-
  Plexin D1 belongs to the plexin family, whose members cell surface receptors for extracellular signals of the semaphorin family. Plexin D1 is the receptor of Sema3E that regulates axon guidance, angiogenesis, tumour growth, and tumour metastasis. In endothelial cells, Sema3E-PlexinD1 inhibit cell-substrate adhesion and exert an anti-angiogenic function, while in cancer cells they have been shown to have a pro-tumorigenic role. The Sema domain is located at the N terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a ligand-recognition and -binding module.
