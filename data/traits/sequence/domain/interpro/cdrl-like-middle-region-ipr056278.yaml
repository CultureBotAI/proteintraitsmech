identifier: InterPro:IPR056278
label: "CdrL-like, middle region"
definition: >-
  This entry represents a region found in the middle of CdrL (cell division regulator long, HVO_0583, ) from Haloferax volcanii and similar sequences from halobacteria. CdrL has at the N-terminal and at the C-terminal. According to structure predictions, this region may consist of an α-helix followed by a disordered part.
