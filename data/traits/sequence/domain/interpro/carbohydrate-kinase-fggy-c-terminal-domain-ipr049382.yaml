identifier: InterPro:IPR049382
label: "Carbohydrate kinase FGGY, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of Carbohydrate kinase, FGGY from Novosphingobium aromaticivorans ( ) and similar proteins mainly found in proteobacteria and bacteroidetes. This protein may catalyse the transfer of a phosphate group from ATP to their carbohydrate substrates. It contain two large domains, which are separated by a deep cleft. This domain, thought to be responsible for ATP binding, shows an α-β configuration.
