identifier: InterPro:IPR034169
label: "NifX-like domain"
definition: >-
  NifX belongs to a family of iron-molybdenum cluster-binding proteins that includes NifB, and NifY, all of which are involved in the synthesis of an iron-molybdenum cofactor (FeMo-co) that binds the active site of the dinitrogenase enzyme. The protein is part of the nitrogen fixation gene cluster in nitrogen-fixing bacteria and has sequence similarity to other members of the cluster. This domain is also found C-terminal in NifY, which is also part of the nif cluster.
