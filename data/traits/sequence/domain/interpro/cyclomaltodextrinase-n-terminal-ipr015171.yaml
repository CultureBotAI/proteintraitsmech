identifier: InterPro:IPR015171
label: "Cyclomaltodextrinase, N-terminal"
definition: >-
  This domain is found at the N terminus of cyclomaltodextrinase. The domain assumes a β-sandwich structure composed of the eight antiparallel β-strands. A ten residue linker is also present at the C-terminal end, which connects the N-terminal domain to a distal domain in the protein. This domain participates in oligomerisation of the protein, wherein the N-terminal domain of one subunit contacts the active centre of the other subunit, and is also required for binding of cyclodextrin to substrate. Proteins containing this domain also include neopullulanase SusA from Bacteroides thetaiotaomicron. SusA cleaves 1,4-alpha-glucosidic linkages in starch to produce disaccharides or trisaccharides in starch degradation.
