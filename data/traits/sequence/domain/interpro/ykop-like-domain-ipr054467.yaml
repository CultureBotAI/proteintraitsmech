identifier: InterPro:IPR054467
label: "YkoP-like domain"
definition: >-
  This entry represents a domain that covers the whole length of the sequence in the uncharacterised protein YkoP from Bacillus subtilis, whose structure shows similarity to GNAT family acetyltransferases. This domain is found associated with in some sequences.
