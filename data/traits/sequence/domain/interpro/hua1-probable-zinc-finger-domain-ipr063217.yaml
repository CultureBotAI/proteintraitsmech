identifier: InterPro:IPR063217
label: "HUA1, probable zinc finger domain"
definition: >-
  This entry represents a small domain found in HUA1 and related proteins from fungi. HUA1 is a proline-rich protein that may be involved in assembly and disassembly of the actin cytoskeleton. The protein is cytoplasmic and is induced by stress conditions. HUA1 belongs to the HUA1 family and contains extensive disordered regions with low complexity and polar residue composition biases. The specific function of this small domain remains to be determined. This domain is located next to the C-terminal domain.
