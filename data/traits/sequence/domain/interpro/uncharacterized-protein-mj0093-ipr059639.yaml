label: "Uncharacterized protein MJ0093"
definition: >-
  This entry represents the MJ0093, an uncharacterised protein found in Archaea. The protein is 142 amino acids in length. MJ0093 is found in Methanocaldococcus jannaschii and related archaeal species. The function of this protein family remains to be determined.
