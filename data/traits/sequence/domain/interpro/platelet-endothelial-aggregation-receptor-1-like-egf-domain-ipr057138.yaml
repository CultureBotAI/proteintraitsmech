identifier: InterPro:IPR057138
label: "Platelet endothelial aggregation receptor 1-like, EGF domain"
definition: >-
  This domain is found in human Platelet endothelial aggregation receptor 1 (PEAR1L) and related proteins such as Multiple epidermal growth factor-like domains protein 10 and 11 (MEGF10 and MEGF11). Platelet Endothelial Aggregation Receptor 1 (PEAR1) is a type I transmembrane protein that plays a significant role in both platelet and endothelial cell functions. PEAR1 is required for SVEP1-mediated platelet activation, via its interaction with SVEP1 and subsequent activation of AKT/mTOR signaling. PEAR1 influences endothelial cell migration and angiogenesis. Knockdown of PEAR1 enhances endothelial cell proliferation, migration, and tube formation via Akt/PTEN pathways. PEAR1 also plays a role in stabilising platelet thrombi during vascular injury. MEGF10 is a membrane receptor involved in phagocytosis by macrophages and astrocytes of apoptotic cells.
