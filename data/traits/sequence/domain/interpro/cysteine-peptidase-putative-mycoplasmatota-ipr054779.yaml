identifier: InterPro:IPR054779
label: "Cysteine peptidase, putative, mycoplasmatota"
definition: >-
  This entry represents a region about 240 amino acids long with local similarity to C39 and C10 families of cysteine peptidases, including the region of the active site Cys. Members of this group occur in Mycoplasmatota.
