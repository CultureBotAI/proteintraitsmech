identifier: InterPro:IPR001077
label: O-methyltransferase, C-terminal domain
definition: >-
  This domain includes a range of O-methyltransferases (COMT) some of which utilise S-adenosyl methionine as substrate. In prokaryotes, the major role of DNA methylation is to protect host DNA against degradation by restriction enzymes. In eukaryotes, DNA methylation has been implicated in the control of several cellular processes, including differentiation, gene regulation, and embryonic development. O-methyltransferases have a common catalytic domain structure, which might be universal among S-adenosyl-L-methionine (AdoMet)-dependent methyltransferases. Methyltransferases (EC [ec:2.1.1.-]) constitute an important class of enzymes present in every life form. They transfer a methyl group most frequently from S-adenosyl L-methionine (SAM or AdoMet) to a nucleophilic acceptor such as oxygen leading to S-adenosyl-L-homocysteine (AdoHcy) and a methylated molecule. All these enzymes have in common a conserved region of about 130 amino acid residues that allow them to bind SAM. The substrates that are methylated by these enzymes cover virtually every kind of biomolecules ranging from small molecules, to lipids, proteins and nucleic acids. Methyltransferase are therefore involved in many essential cellular processes including biosynthesis, signal transduction, protein repair, chromatin regulation and gene silencing. More than 230 families of methyltransferases have been described so far, of which more than 220 use SAM as the methyl donor.
