identifier: InterPro:IPR054329
label: "ElaD/SseL-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal helical domain found in a group of CE proteases from human pathogens, including ElaD from E.coli and SseL from Salmonella typhimurium, which are dedicated deubiquitinases (DUBs), proteases that reverse the addition of ubiquitin to substrates, and effectively hijacks the host's ubiquitination processes. This domain is structurally similar to VHS domains and it serves to localise the catalytic domain ( ) through an additional Ub binding site.
