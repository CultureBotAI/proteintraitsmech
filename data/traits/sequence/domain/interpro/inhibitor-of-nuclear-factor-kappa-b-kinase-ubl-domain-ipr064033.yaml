identifier: InterPro:IPR064033
label: "Inhibitor of nuclear factor kappa-B kinase, UBL domain"
definition: >-
  This entry represents the ubiquitin-like (Ubl) domain found in the family of IkappaB kinases (IKK) subunits alpha and beta. These proteins play an essential role in the NF-kappa-B signalling pathway which is activated by multiple stimuli such as inflammatory cytokines, bacterial or viral products, DNA damages or other cellular stresses. The IKK-alpha and IKK-beta subunits together are catalytically active whereas the IKK-gamma subunit (the third component of IKK) serves a regulatory function.
