identifier: InterPro:IPR035718
label: "Fungal actin-binding protein 1, second SH3 domain"
definition: >-
  Abp1 is an adaptor protein that functions in receptor-mediated endocytosis and vesicle trafficking. It contains an N-terminal actin-binding module, the actin-depolymerizing factor (ADF) homology domain, a central proline-rich region, and a C-terminal SH3 domain (many yeast Abp1 proteins, such as that from Schizosaccharomyces pombe, contain two C-terminal SH3 domains). Yeast Abp1 also contains two acidic domains that bind directly to the Arp2/3 complex, which is required to initiate actin polymerization. The SH3 domain of yeast Abp1 binds and localizes the kinases, Ark1p and Prk1p, which facilitate actin patch disassembly following vesicle internalization. It also mediates the localization to the actin patch of the synaptojanin-like protein, Sjl2p, which plays a key role in endocytosis. This entry represents the second SH3 domain of Abp1 from fungi such as Schizosaccharomyces pombe.
