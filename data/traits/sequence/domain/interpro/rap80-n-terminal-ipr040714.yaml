identifier: InterPro:IPR040714
label: "RAP80, N-terminal"
definition: >-
  This is the N-terminal domain found in RAP80 protein present in Homo sapiens. RAP80 is fundamental for protein recruitment in the DNA damage response. The N-terminal domain is a ubiquitin-interacting motif (UIM). RAP80 is involved in multivalent recognition of polyUb chains through N-terminal domain.
