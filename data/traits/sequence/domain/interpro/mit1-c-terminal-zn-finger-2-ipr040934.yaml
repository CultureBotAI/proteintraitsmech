identifier: InterPro:IPR040934
label: "Mit1, C-terminal Zn finger 2"
definition: >-
  Mit1 is part of the Snf2/Hdac Repressive Complex (SHREC), the fission yeast nucleosome remodeling and deacetylation (NuRD) equivalent that plays a major role in transcriptional gene silencing (TGS) within heterochromatin. SHREC consists of the chromatin remodeler Mit1, the HDAC Clr3, and Clr1 and Clr2 proteins.
