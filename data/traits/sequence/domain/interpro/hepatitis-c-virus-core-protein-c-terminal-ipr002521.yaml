identifier: InterPro:IPR002521
label: Hepatitis C virus, Core protein, C-terminal
definition: >-
  Although Hepatitis A virus, Hepatitis B virus, and Hepatitis C virus have similar names, because they all cause liver inflammation, these are distinctly different viruses both genetically and clinically. The Hepatitis C virus (HCV) is a small (50-80 nm in diameter), enveloped, single-stranded, positive sense RNA virus. It is member of the family Flaviviridae. There are seven genotypes and a number of subtypes with diverse geographic distributions. The genome of HCV consists of a single open reading frame. At the 5' and 3' ends of the RNA are the UTR regions that are not translated into proteins but are important to translation and replication of the viral RNA. The 5' UTR has a ribosome binding site (IRES - Internal ribosome entry site) that starts the translation of unique polyprotein that is later cut by cellular and viral proteases into 10 active structural and non-structural smaller proteins. The HCV core protein is located at the N terminus of the polyprotein and is followed by the signal sequence located between the core protein and the E1 envelope glycoprotein. This signal sequence targets the nascent HCV polyprotein to the endoplasmic reticulum (ER), allowing the translocation of E1 to the ER lumen. Cleavage by a signal peptidase in the ER lumen releases the N-terminal end of E1, leaving the 191-amino acids (aa) core protein anchored by its C-terminal signal peptide. This 191aa polypeptide, also known as p23, is the immature form of the core protein; p23 is further processed by an intramembrane protease, the signal peptide peptidase (SPP), that removes the ER anchor , releasing p21, the N-terminal 179aa mature form of the core protein. Core protein (p21) is responsible for packaging viral RNA to form a viral nucleocapsid, and it also promotes virion budding. Thi…
