identifier: InterPro:IPR046441
label: RNA-dependent RNA polymerase, coronavirus
definition: >-
  Coronaviruses (CoVs) are enveloped positive-strand RNA viruses that infect many species, including humans, other mammals, and birds. After infection, the host may develop respiratory, bowel, liver, and neurological diseases. CoVs are divided into four genera: Alphacoronavirus, Betacoronavirus, Gammacoronavirus, and Deltacoronavirus. SARS, SARS-CoV-2, BatCoV RaTG13 and Bat-SARS-like coronavirus (BATSL-CoVZXC21 and BAT-SL-CoVZC45) belong to the Sarbecovirus subgenus of Betacoronavirus. The CoV replicase gene encodes two overlapping polyproteins, termed pp1a and pp1ab, which mediate viral replication and transcription. The polypeptides pp1a and pp1ab are processed by the action of a main protease (NSP5) and of one or two papain-like proteases (PLpro) found in NSP3 into non-structural proteins (NSPs) to form the replication/transcription complex (RTC). Among them, the NSP12 RNA-dependent RNA polymerase, that includes an RdRp catalytic domain conserved in all RNA viruses, possesses some minimal activity on its own, but the addition of the NSP7 and NSP8 cofactors greatly stimulates polymerase activity. The NSP12-NSP7-NSP8 subcomplex is thus defined as the minimal core component for mediating coronavirus RNA synthesis. The NSP12 subunit contains an N-terminal NiRAN domain, an interface domain and a C-terminal polymerase domain, represented in this entry, which resembles a right hand, comprising the fingers, palm and thumb subdomains. The active site is located on the palm subdomain and is formed by five conserved NSP12 elements known as motifs A-E.
