identifier: InterPro:IPR015364
label: Rhamnogalacturonase B, N-terminal
definition: >-
  This domain is found in prokaryotic enzyme rhamnogalacturonase B, it adopts a structure consisting of a β-supersandwich, with eighteen strands in two β-sheets. The exact function of the domain is unknown, but a putative role includes carbohydrate-binding.
