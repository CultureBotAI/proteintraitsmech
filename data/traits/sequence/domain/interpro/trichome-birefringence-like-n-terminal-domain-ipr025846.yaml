identifier: InterPro:IPR025846
label: "Trichome birefringence-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal C-rich predicted sugar binding domain found in Trichome birefringence-like (TBL) proteins from streptophytes. This domain is followed by the TBL PC-Esterase (acyl esterase) domain in PMR5 and ESK1.
