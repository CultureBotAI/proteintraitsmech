identifier: InterPro:IPR063291
label: "Trafficking protein particle complex subunit 11, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Trafficking protein particle complex subunit 11 (TRAPPC11), a protein involved in Golgi apparatus trafficking at a very early stage. This domain consists of four β-strands interspersed with four α-helices that forms the surface of interaction with TRAPPC2L (.
