label: Domain of unknown function DUF668
definition: >-
  This entry represents the C-terminal domain of PSI proteins from Arabidopsis. This domain is found associated with DUF3475 ( ). PSI1 was identified as a gene that is co-expressed with the phytosulfokine (PSK) receptor genes PSKR1 and PSKR2 in Arabidopsis thaliana. PSI proteins are plant-specific and promote growth.
