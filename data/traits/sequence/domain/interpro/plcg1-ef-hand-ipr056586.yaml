identifier: InterPro:IPR056586
label: "PLCG1, EF-hand"
definition: >-
  This entry represents an EF-hand like domain found in animal 1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase gamma proteins (PLCG). PLCG1 plays a role in actin reorganisation and cell migration. PLGC1 has a critical role in maintaining immune homeostasis. PLCG2 is a crucial enzyme in transmembrane signalling. This protein has been associated with several disorders. PLCG structure comprises several key domains: an N-terminal PH domain, EF-hand motifs, catalytic X and Y domains forming a TIM-barrel, a C2 domain, a split PH domain, two SH2 domains (N-terminal and C-terminal), and an SH3 domain. This domain is also found in the orthologue from C.elegans 1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase gamma plc-3, which regulates basal and ovulatory sheath cell contractions.
