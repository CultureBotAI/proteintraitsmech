label: "Sll1247, C-terminal helical domain"
definition: >-
  This entry represents the C-terminal helical domain of Sll1247, an uncharacterised protein from the cyanobacterium Synechocystis sp. PCC 6803. The function of this C-terminal helical domain is yet to be determined.
