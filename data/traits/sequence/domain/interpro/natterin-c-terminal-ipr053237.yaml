identifier: InterPro:IPR053237
label: "Natterin, C-terminal"
definition: >-
  This entry represents a domain found in Natterin-1 from Thalassophryne nattereri and similar sequences. This protein shows nociceptive, edema-inducing and kininogenase activity with release of kallidin from low molecular weight kininogen. Its proteolytic activity of these proteins specifically targets Met-Lys bonds.
