identifier: InterPro:IPR012935
label: NuBaID, N-terminal domain
definition: >-
  This entry represents the N-terminal zinc finger domain (formerly ZnF-C3HC) of Zinc finger C3HC-type protein 1 (ZC3HC1, also known as Nuclear-interacting partner of ALK (NIPA)), pre-mRNA leakage protein 39 (Pml39), mRNA export factor Rsm1 and related eukaryotic proteins. Pml39 and Rsm1 are ZC3HC1 homologues from S. cerevisiae and S. pombe, respectively. This domain contains three highly conserved cysteine residues, two of which evolutionarily invariant, followed by an invariant pair of histidine and cysteine residues. This zinc finger domain is often found repeated and the second repeat domain ( ) can harbour a large insert located after the first three cysteine residues. Both domains coordinate zinc ion via two cysteines and the histidine-cysteine pair, in a mode similar to the presumably related BIR domains ( ). Rsm1 protein ( ), containing this domain, is involved in mRNA export from the nucleus. Recently, Pml39 was found to be required for the retention of unspliced mRNA. ZC3HC1 was formerly described as Nuclear-interacting partner of ALK (NIPA), with a proposed role in cell cycle regulation as a component of an SCF complex specifically targeting cyclin B1. These findings were recently refuted. In contrast, ZC3HC1 was identified as a nuclear envelope-associated protein residing at the NPC-attached nuclear basket (NB) of Xenopus laevis oocytes and cultured human cells. It was shown that ZC3HC1 is a constituent structural component of the NB essential for recruitment, positioning and linkage of a subpopulation of the NB scaffold protein TPR. Furthermore, it was demonstrated that the Pml39 is a functional homologue of ZC3HC1 and, similarly, is capable of interconnecting Mlp1 polypeptide, the corresponding homologue of TPR in S. cerevisiae. Both N- (this entry) and C-t…
