identifier: InterPro:IPR063189
label: "COS11, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of COS111 F-box proteins from fungi. The domain is found in COS111 proteins from Debaryomyces hansenii and Candida albicans, as well as related F-box domain-containing proteins from other fungal species. COS111 proteins are F-box proteins involved in the ubiquitin conjugation pathway. The N-terminal domain precedes the characteristic F-box domain found in these proteins. F-box proteins function as substrate recognition components of SCF ubiquitin-protein ligase complexes. The function of this specific domain remains to be determined. These sequences have many disordered regions within the domain and divergence of their sequences, therefore, the coverage in different members may vary.
