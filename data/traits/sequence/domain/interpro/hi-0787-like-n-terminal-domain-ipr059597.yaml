identifier: InterPro:IPR059597
label: "HI_0787-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of HI_0787 found in Haemophilus influenzae and similar uncharacterised proteins. HI_0787 is 201 amino acids encoded by locus HI_0787. The specific function of this domain remains to be determined.
