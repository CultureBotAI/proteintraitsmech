identifier: InterPro:IPR014757
label: "Transcription regulator IclR, C-terminal"
definition: >-
  Many bacterial transcription regulation proteins which bind DNA through a 'helix-turn-helix' motif can be classified into subfamilies on the basis of sequence similarities. One of these subfamilies, called 'iclR', groups several proteins including: gylR, a possible activator protein for the gylABX glycerol operon in Streptomyces. iclR, the repressor of the acetate operon (also known as glyoxylate bypass operon) in Escherichia coli and Salmonella typhimurium. These proteins have a Helix-Turn-Helix motif at the N terminus that is similar to that of other DNA-binding proteins. This entry represents their C-terminal domain, which shares protein structural similarity with the GAF-like domain. This domain binds to regulatory substrates including glyoxylate, allantoin/ate, indole, aromatic hydrocarbons, sugar acids, succinic semialdehyde, benzoate derivatives, ascorbic acid, glycerol-3-phosphate, glyceraldehyde-3-phosphate and pyruvate.
