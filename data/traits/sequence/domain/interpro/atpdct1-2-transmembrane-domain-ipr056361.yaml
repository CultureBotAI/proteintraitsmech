identifier: InterPro:IPR056361
label: "AtPDCT1/2, transmembrane domain"
definition: >-
  This entry represents a domain found in PDCT1/2 from Arabidopsis thaliana, which has a detectable similarity to domains members of the Acid phosphatase/Vanadium-dependent haloperoxidase superfamily and it is predicted to adopt similar structure. This domain is composed of five transmembrane helices. This entry represents a group of proteins predominantly found in plants, including phosphatidylcholine:diacylglycerol cholinephosphotransferase 1 (PDCT1 or ROD1) and 2 (PDCT2) from Arabidopsis thaliana. PDCT1 catalyses the transfer of the phosphocholine headgroup from phosphatidylcholine (PC) to diacylglycerol, a major reaction for the transfer of 18:1 into phosphatidylcholine for desaturation and also for the reverse transfer of 18:2 and 18:3 into the triacylglycerols synthesis pathway. This entry also includes some uncharacterised proteins from bacteria.
