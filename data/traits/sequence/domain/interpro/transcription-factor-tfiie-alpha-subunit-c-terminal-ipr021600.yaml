identifier: InterPro:IPR021600
label: "Transcription factor TFIIE alpha subunit, C-terminal"
definition: >-
  TFIIE is compiled of two subunits, alpha and beta. This entry represents the C-terminal domain of the alpha subunit. The alpha subunit is the largest and contains several functional domains which are important for basal transcription and cell growth. The C-terminal end of the protein binds directly to the amino-terminal PH domain of p62/Tfb1 (of IIH) which is involved in the recruitment of the general transcription factor IIH to the transcription preinitiation complex. p53 competes for the same binding site as TFIIE alpha, which shows their structural similarity. Like p53, the C terminus of TFIIE alpha (residues 336-439) can activate transcription in vivo.
