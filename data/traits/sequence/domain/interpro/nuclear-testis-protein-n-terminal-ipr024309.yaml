identifier: InterPro:IPR024309
label: "Nuclear Testis protein, N-terminal"
definition: >-
  This domain is found in the N-terminal region of Nuclear Testis (NUT) proteins. The NUT gene is found fused to BRD3 or BRD4 genes in some aggressive types of carcinoma, due to chromosomal translocations. The BRD family proteins contain two bromodomains that bind transcriptionally active chromatin through associations with acetylated histones H3 and H4. BRD proteins are crucial for the regulation of cell cycle progression.
