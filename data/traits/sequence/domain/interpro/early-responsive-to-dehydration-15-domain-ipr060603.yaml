identifier: InterPro:IPR060603
label: "Early responsive to dehydration 15 domain"
definition: >-
  This entry represents a domain found in the ERD15 (Early Responsive to Dehydration 15) proteins from plants. These are small transcriptional regulators of approximately 125 amino acids that function as DNA-binding proteins. ERD15 binds to the NRP-B promoter to activate the NRP-B-mediated cell death response and serves as an upstream component connecting endoplasmic reticulum stress with osmotic stress-induced cell death signalling. The protein localises to the nucleus and exhibits transactivation activity. Expression is induced by tunicamycin and osmotic stress.
