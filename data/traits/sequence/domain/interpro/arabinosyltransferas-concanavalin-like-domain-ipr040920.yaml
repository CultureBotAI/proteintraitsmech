identifier: InterPro:IPR040920
label: "Arabinosyltransferas, concanavalin like domain"
definition: >-
  Arabinosyltransferase is involved in arabinogalactan (AG) biosynthesis pathway in mycobacteria. AG is a component of the macromolecular assembly of the mycolyl-AG-peptidoglycan complex of the cell wall. This enzyme has important clinical applications as it is believed to be the target of the antimycobacterial drug Ethambutol. This entry represents the concanavalin like domain found at the N terminus of arabinosyltransferas.
