identifier: InterPro:IPR032050
label: "Domain of unknown function DUF4797"
definition: >-
  This presumed domain is functionally uncharacterised. It is found in insect proteins, and is approximately 40 amino acids in length. There is a conserved SGLPT sequence motif. There are two completely conserved residues (P and G) that may be functionally important.
