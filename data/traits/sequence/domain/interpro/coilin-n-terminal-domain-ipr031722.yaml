identifier: InterPro:IPR031722
label: "Coilin, N-terminal domain"
definition: >-
  Coilin is a nuclear phosphoprotein that serves as an assembly centre in Cajal bodies (CBs) and has a role in small nuclear ribonucleoprotein (snRNP) biogenesis, involved in the modification and assembly of nucleoplasmic snRNPs. Coilin also acts to repress polymerase I activity in response to cisplatin-induced DNA damage, which could indicate a link between the DNA damage response and the inhibition of rRNA synthesis. Conservation at the amino acid level is highest within coilin's N- and C-termini. The first N-terminal 92-amino acid domain have been shown to self-interact and to be essential for proper targeting of coilin to CBs.
