identifier: InterPro:IPR057302
label: "Rrp5, S1 domain"
definition: >-
  This entry represents several divergent S1 domains found in Rrp5 proteins. Rrp5 is involved in the biogenesis of rRNA. It is required for formation of both 18S and 5.8S rRNA in budding yeasts. In humans, it is also known as NFBP, which is essential for the generation of 18S rRNA. In Arabidopsis, it is essential for normal development of female gametophytes.
