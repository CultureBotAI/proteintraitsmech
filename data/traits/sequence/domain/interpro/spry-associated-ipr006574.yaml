identifier: InterPro:IPR006574
label: SPRY-associated
definition: >-
  PRY is a 50-60 amino acids domain associated with SPRY domains, adjacent to its N-terminal. The SPRY domain ( ) is a protein-protein interaction module involved in many important signaling pathways. Distant homologues are domains in butyrophilin/marenostrin/pyrin, evolutionarily more ancient than SPRY/B30.2 counterpart. PRY and SPRY domains are structurally very similar and consist of a β sandwich fold. Ca2+-release from the sarcoplasmic or endoplasmic reticulum, the intracellular Ca2+ store, is mediated by the ryanodine receptor (RyR) and/or the inositol trisphosphate receptor (IP3R). The proteins identified by the PRY domain, clearly fall into 3 sets which can be defined by their combination of signatures: This group contains an immunoglobulin domain N-terminal to the PRY and butyrophilin domains. Butyrophilins are glycoproteins that are expressed on the apical surfaces of secretory cells in lactating mammary tissue and which may function in the secretion of milk-fat droplets. This group contain a RING-finger domain N-terminal to the PRY domain. The RING-finger is a specialised type of Zn-finger of 40 to 60 residues that binds two atoms of zinc, and is probably involved in mediating protein-protein interactions. There are two different variants, the C3HC4-type and a C3H2C3-type, which is clearly related despite the different cysteine/histidine pattern. The latter type is sometimes referred to as 'RING-H2 finger' is not found associated with this group of proteins. This set of proteins are described as TRIM (TRIpartite Motif) family members and are involved in cellular compartmentalisation. The TRIM family sequences are defined by a Ring finger domain, a B-box type1 (B1) and a B-box type 2 (B2) followed by a coiled-coil (CC) region. Genes belonging to this family are…
