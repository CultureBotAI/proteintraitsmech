identifier: InterPro:IPR048801
label: "Structural glycoprotein Gn, nairovirus"
definition: >-
  This entry represents the structural glycoprotein Gn from Nairovirus including CCHFV and Dugbe virus. Gn and Gc (at the C-terminal of M segment) form spikes on the viral surface and mediate virus entry into target cells. The C-terminal cytoplasmic tail contains a pair of tightly arranged dual β-β-α zinc fingers.
