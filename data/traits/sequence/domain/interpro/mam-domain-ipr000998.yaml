identifier: InterPro:IPR000998
label: MAM domain
definition: >-
  MAM is an acronym derived from meprin, A-5 protein, and receptor protein-tyrosine phosphatase mu. The MAM domain consists of approximately 170 amino acids. It occurs in several cell surface proteins and is likely to have an adhesive function. The domain has been shown to play a role in homodimerization of protein-tyrosine phosphatase mu and appears to help determine the specificity of these interactions. It contains four conserved cysteines which probably form two disulfide bridges. It has been reported that certain cysteine mutations in the MAM domain of murine meprin A result in the formation of monomeric meprin, which has altered stability and activity. This indicates that these domain-domain interactions are critical for structure and function of the enzyme. Proteins containing this domain are listed below. Meprin. This cell surface glycoprotein contains a zinc-metalloprotease domain capable of degrading a variety of polypeptides. Meprin is composed of two structurally related subunits (alpha and beta) that form homo- or heterotetramers by the non-covalent association of two disulfide-linked dimers. In both subunits, the MAM domain is located after the catalytic domain. It has also been shown that the MAM domain of meprins is necessary for correct folding and transport through the secretory pathway. Neuropilin (A5 antigen), a calcium-independent cell adhesion molecule that function during the formation of certain neuronal circuits. The sequence contains 2 CUB domains and a MAM domain. Receptor-like tyrosine protein phosphatases Mu, Kappa and PCP-2 ( ). These PTPases have an extracellular region which consists of a MAM domain followed by an Ig-like domain and four fibronectin-type III domains. Vertebrate enteropeptidase ( ), a type II membrane protein of the intesti…
