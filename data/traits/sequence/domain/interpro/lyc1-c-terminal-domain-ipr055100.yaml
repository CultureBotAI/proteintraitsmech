identifier: InterPro:IPR055100
label: "LYC1, C-terminal domain"
definition: >-
  This domain is found C-terminal in Lysine acetyltransferase (LYC1) and other related fungal proteins. LYC1 catalyses the first step the lysine degradation pathway. The domain represented by this entry is predicted to adopt GNAT-like fold. It is found usually upstream Acetyltransferase GNAT domain ( ) suggesting a possible duplication event in these proteins.
