identifier: InterPro:IPR048942
label: "Apoptosis-stimulating of p53 protein 2-like, RA domain"
definition: >-
  This domain is found at the N-terminal of human Apoptosis-stimulating of p53 protein 2 (ASPP2) and similar sequences mainly from vertebrates. ASPP2 plays a central role in regulation of apoptosis and cell growth via its interactions with proteins such as TP53. This domain shows a mixed twisted β-sheet and α-helices that pack on one side of the β-sheet, with similarity to a Ras-association (RA) domain.
