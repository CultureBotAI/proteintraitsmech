identifier: InterPro:IPR044051
label: "Prophage endopeptidase tail, N-terminal"
definition: >-
  This entry represents the N-terminal domain of prophage tail proteins that are probably acting as endopeptidases. This domain has a RIFT related fold. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches.
