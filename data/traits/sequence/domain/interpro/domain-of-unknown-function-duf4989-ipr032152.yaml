identifier: InterPro:IPR032152
label: "Domain of unknown function DUF4989"
definition: >-
  This domain of around 300 residues locates at the N terminus of some uncharacterised proteins in various Bacteroides and Alistipes species. Its function is unknown. It may consist of two tandem domains with a Ig-like fold.
