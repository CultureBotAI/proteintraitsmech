identifier: InterPro:IPR054075
label: "Putative tail fiber protein gp53-like, C-terminal"
definition: >-
  This entry represents a domain found at the C-terminal end of putative tail fiber protein gp53 from Acinetobacter phage AP22 ( , , gp53) and similar uncharacterised sequences from tailed bacteriophages and prophages mainly found in proteobacteria. It shows structural similarities to other phage/virus host cell-binding fibres.
