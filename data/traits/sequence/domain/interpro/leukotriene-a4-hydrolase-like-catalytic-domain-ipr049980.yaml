identifier: InterPro:IPR049980
label: "Leukotriene A4 hydrolase-like, catalytic domain"
definition: >-
  This entry represents the N-terminal catalytic domain of leukotriene A4 hydrolase (LTA4H; ) and close homologues such as cold-active aminopeptidase (Colwellia psychrerythraea-type peptidase, ColAP), which are members of the aminopeptidase M1 family. LTA4H is a bifunctional enzyme, possessing an aminopeptidase as well as an epoxide hydrolase activity. The two activities occupy different, but overlapping sites. The activity and physiological relevance of the aminopeptidase is poorly understood while the epoxide hydrolase converts leukotriene A4 (LTA4) into leukotriene B4 (LTB4), a potent chemotaxin that is fundamental to the inflammatory response of mammals. It accepts a variety of substrates, including some opioid, di- and tripeptides, as well as chromogenic aminoacyl-p-nitroanilide derivatives. The aminopeptidase activity of LTA4H is possibly involved in the processing of peptides related to inflammation and host defense. Kinetic analysis shows that LTA4H hydrolyzes arginyl tripeptides with high efficiency and specificity, indicating its function as an arginyl aminopeptidase. Thermodynamic characterisation using different biophysical methods shows that structurally distinct inhibitors of the LTA4H occupy different regions of the binding site; while some (RB202, ARM1 and SC57461A) bind to the hydrophobic hydrolase side, both bestatin and captopril are located at the hydrophilic peptidase side. LTB4H overexpression is associated with different pathological conditions and diseases such as cystic fibrosis, coronary heart disease, sepsis, shock, connective tissue disease, and chronic obstructive pulmonary disease. It is also overexpressed in certain human cancers, and has been identified as a functionally important target for mediating anticancer properties of resveratrol,…
