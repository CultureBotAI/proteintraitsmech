identifier: InterPro:IPR032570
label: "Splicing factor 1, helix-hairpin domain"
definition: >-
  This helix-hairpin domain can be found in the N-terminal region of mammalian splicing factor 1 (SF1), plant splicing factor-like protein 1 and fungal branchpoint binding proteins (BBP). These proteins are required for pre-spliceosome formation, which is the first step of pre-mRNA splicing. SF1 forms a complex with U2AF65 through the interaction between this domain and the C-terminal U2AF homology motif domain (UHM) of U2AF65. This domain forms a secondary, hydrophobic interface with U2AF65 (UHM) to lock the orientation of the two subunits, which is essential for cooperative formation of the ternary SF1-U2AF65-RNA complex. This domain contains a highly conserved SPSP motif at its C terminus; the phosphorylation of the SPSP motif induces a disorder-to-order transition within a novel SF1/U2AF65 interface.
