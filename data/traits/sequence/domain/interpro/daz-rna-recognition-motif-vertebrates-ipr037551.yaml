identifier: InterPro:IPR037551
label: DAZ, RNA recognition motif, vertebrates
definition: >-
  This entry represents the RRM of DAZ proteins from vertebrates. DAZ family members include BOULE, DAZ-Like (DAZL) and DAZ. They are found almost exclusively in germ cells and are key players for germ cell development. They contain a highly conserved RNA-binding motif (RNA recognition motif; RRM) and a unique DAZ repeat. Their RRM has been shown to bind 3'-UTR sequences of target mRNAs. They may be involved in regulation of mRNA translation.
