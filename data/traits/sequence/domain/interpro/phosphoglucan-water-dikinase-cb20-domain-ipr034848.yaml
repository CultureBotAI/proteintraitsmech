identifier: InterPro:IPR034848
label: Phosphoglucan water dikinase, CB20 domain
definition: >-
  This domain is found in the chloroplast-encoded phosphoglucan water dikinase (PWD), one of two enzymes involved in the phosphorylation of plant starches leading to starch turnover. PWD/GWD3 primarily catalyses phosphorylation at the C-3 position of the glucose unit of preferably pre-phosphorylated amylopectin. In addition to the CBM20 domain, phosphoglucan water dikinase contains a C-terminal pyruvate binding domain.
