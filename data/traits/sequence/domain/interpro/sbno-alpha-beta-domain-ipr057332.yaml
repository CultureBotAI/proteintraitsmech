identifier: InterPro:IPR057332
label: "SBNO, alpha/beta domain"
definition: >-
  This domain is found in the family of Strawberry notch homologue (SBNO 1/2) proteins from animals and includes the plant homologue Protein FORGETTER 1. SBNO2 acts as a transcriptional coregulator exhibiting both coactivator and corepressor functions. It inhibits the DCSTAMP-repressive activity of TAL1 and enhances the access of the transcription factor MITF to the DC-STAMP promoter in osteoclast. Arabidopsis FORGETTER1 mediates stress-induced chromatin memory via nucleosome remodelling. The domain represented by this entry is located toward the C-terminal end. It is predicted to adopt α/β structure with a curved five-stranded antiparallel β-sheet. Towards the C terminus, this domain has three highly conserved cysteine residues and a histidine which may be involved in metal coordination.
