identifier: InterPro:IPR054524
label: "Ssol_1539-like, N-teminal, second subdomain"
definition: >-
  This domain is found in Ssol_1539 from Saccharolobus solfataricus and similar archaeal sequences. Ssol_1539 is organised into two domains . The N-terminal domain contains two subdomains separated by a central helix. This entry represents the second subdomain, which shows an all-α configuration.
