identifier: InterPro:IPR063800
label: "Autotransporter YaiT, N-terminal passenger domain"
definition: >-
  This entry represents the N-terminal passenger domain of the autotransporter protein YaiT and related proteins. YaiT is an outer membrane autotransporter found in Enterobacterales, including Escherichia coli and Salmonella enterica. The passenger domain precedes the C-terminal autotransporter β-barrel domain ( ). In E. coli K12, the yaiT gene is interrupted by an IS3B insertion element, making it a pseudogene. Related autotransporters have been implicated in adhesion and virulence functions. The specific function of this domain remains to be determined.
