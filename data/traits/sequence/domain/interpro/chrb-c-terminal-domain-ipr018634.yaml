identifier: InterPro:IPR018634
label: "ChrB, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in protein ChrB from Cupriavidus metallidurans, a protein involved in the reduction of chromate accumulation and essential for chromate resistance. This domain may carry the metal detection motifs that are important for its function.
