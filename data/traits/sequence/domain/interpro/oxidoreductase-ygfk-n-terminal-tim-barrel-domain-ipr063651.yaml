identifier: InterPro:IPR063651
label: "Oxidoreductase YgfK, N-terminal TIM-barrel domain"
definition: >-
  This entry represents the N-terminal TIM-barrel domain found in YgfK and related oxidoreductases. In Escherichia coli, YgfK is a putative iron-sulphur flavoprotein that is part of the ygfKLMN operon involved in selenate reduction. YgfK was identified as a significant iron-containing protein using metalloproteomics. This domain is followed by a 4Fe-4S ferredoxin domain and a pyridine nucleotide-disulphide oxidoreductase domain. This domain is mainly found in Bacillota and Pseudomonadota.
