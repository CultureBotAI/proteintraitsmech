identifier: InterPro:IPR028155
label: "RPA-interacting protein, central domain"
definition: >-
  This entry represents the middle domain of replication protein A (RPA) interacting protein. RPA interacting protein is involved in the import of RPA into the nucleus. This domain is responsible for interaction with RPA.
