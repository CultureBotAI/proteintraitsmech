identifier: InterPro:IPR015195
label: SLIDE domain
definition: >-
  The SLIDE domain adopts a secondary structure comprising a main core of three α-helices. It has a role in DNA binding, contacting DNA target sites similar to c-Myb repeats or homeodomains.
