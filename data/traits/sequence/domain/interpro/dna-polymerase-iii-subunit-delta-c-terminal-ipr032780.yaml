identifier: InterPro:IPR032780
label: "DNA polymerase III subunit delta, C-terminal"
definition: >-
  This domain lies at the C terminus of the DNA polymerase III subunit delta. Within the clamp loader gamma complex of the DNA polymerase III, several C-terminal domains, of gamma, delta and delta' form a helical scaffold, on which the rest of the subunits are hung. The gamma complex, an AAA+ ATPase, is the bacterial homologue of the eukaryotic replication factor C that loads the sliding clamp (beta, homologous to PCNA) onto DNA.
