identifier: InterPro:IPR061855
label: "Domain of unknown function DUF8794"
definition: >-
  This domain is found in uncharacterised fungal proteins. It is predicted to fold into an α/β structure composed of a four-stranded antiparallel curved β-sheet packed with two α-helices on one side. This domain contains three pairs of conserved cisteine residues that are predicted to form disulfide bonds.
