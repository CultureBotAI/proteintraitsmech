identifier: InterPro:IPR047409
label: "Forkhead box protein O4, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXO4 and similar sequences from vertebrates. The FH domain is a winged helix DNA-binding domain. Forkhead box protein O4 (FOXO4) is a transcription factor involved in the regulation of the insulin signalling pathway. It binds to insulin-response elements (IREs) and can activate transcription of IGFBP1. This protein is involved in increased proteasome activity in embryonic stem cells (ESCs) by activating expression of PSMD11 in ESCs, leading to enhanced assembly of the 26S proteasome, followed by higher proteasome activity. It is involved in the regulation of hypoxia response, controlling HIF-1alpha protein levels. FOXO4 also regulates the cell-cycle and its inactivation plays an important step in oncogenic transformation. Oxidative stress induces monoubiquitination of FOXO4 which stimulates its transactivation leading to activation of an antioxidant defensive program. All FOXOs bind to the consensus sequence 5'-GTAAACAA-3', known as the DAF-16 family member-binding element, which includes the core sequence 5'-(A/C)AA(C/T)A-3' recognised by all FOX family members.
