identifier: InterPro:IPR033900
label: Porin domain, Gram-negative type
definition: >-
  Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane. Individual 16-strand anti-parallel β-barrels form a central pore, and trimerizes through mainly hydrophobic interactions at the interface. Trimers are stabilized by hytrophillic clamping of Loop L2. Loop 3 bends into the pore, creating an elliptical constriction of about 7 x 11 angstroms, large enough to allow passage of a glucose molecule without steric hindrance. Removal of the C-terminal residue (usually Phe) destabilizes the trimer and removal of the 16th β-sheet abolishes trimerization. Unlike typical membrane proteins, porins lack long hydrophobic stretches. Short turns are found at the smooth, periplasmic end, longer irregular loops are found at the rough, extracellular end. The C-terminal residue forms a salt bridge with the N terminus. This entry represents the structural domain found in Gram-negative bacterial porins.
