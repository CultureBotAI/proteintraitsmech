identifier: InterPro:IPR047405
label: "PHD finger protein 20-like protein 1, Tudor domain"
definition: >-
  This entry represents the Tudor domain of PHF20L and similar proteins found in vertebrates. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. PHF20L1 is an active malignant brain tumor (MBT) domain-containing protein that binds to monomethylated lysine 142 on DNA (cytosine-5) Methyltransferase 1 (DNMT1) (DNMT1K142me1) and colocalizes at the perinucleolar space in a SET7-dependent manner. Its MBT domain reads and controls enzyme levels of methylated DNMT1 in cells, thus representing a novel antagonist of DNMT1 proteasomal degradation. In addition to the MBT domain, PHF20L1 also contains a Tudor domain, a plant homeodomain (PHD) finger and putative DNA-binding domains AT hook and C2H2-type zinc finger.
