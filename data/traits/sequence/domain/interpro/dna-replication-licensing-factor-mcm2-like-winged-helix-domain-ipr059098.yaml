identifier: InterPro:IPR059098
label: "DNA replication licensing factor MCM2-like, winged-helix domain"
definition: >-
  This is the winged-helix (WH) domain found at the C-terminal end of human DNA replication licensing factor MCM2 and similar eukaryotic proteins. MCM2 is a component of the MCM2-7 complex, the replicative helicase essential for DNA replication initiation and elongation in eukaryotic cells, and a core component of the CDC45-MCM-GINS (CMG) helicase, the molecular machine that unwinds template DNA during replication, and around which the replisome is built.
