identifier: InterPro:IPR035791
label: "TRIM27, PRY/SPRY domain"
definition: >-
  This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C terminus of TRIM27, also known as RING finger protein 76 (RNF76) or RET finger protein (RFP). TRIM proteins are defined by the presence of the tripartite motif RING/B-box/coiled-coil region and are also known as RBCC proteins. TRIM27 exhibits either nuclear or cytosolic localization depending on the cell type. TRIM27 negatively regulates nucleotide-binding oligomerization domain containing 2 (NOD2)-mediated signaling by proteasomal degradation of NOD2, suggesting that TRIM27 could be a new target for therapeutic intervention in NOD2-associated diseases such as Crohn's. High expression of TRIM27 is observed in several human cancers, including breast and endometrial cancer, where elevated TRIM27 expression predicts poor prognosis. Also, TRIM27 forms an oncogenic fusion protein with Ret proto-oncogene. It is involved in different stages of spermatogenesis and its significant expression in male germ cells and seminomas, suggests that TRIM27 may be associated with the regulation of testicular germ cell proliferation and histological-type of germ cell tumors. TRIM27 could also be a predictive marker for chemoresistance in ovarian cancer patients. In the neurotoxin model of Parkinson's disease (PD), deficiency of TRIM27 decreases apoptosis and protects dopaminergic neurons, making TRIM27 an effective potential target during the treatment of PD.
