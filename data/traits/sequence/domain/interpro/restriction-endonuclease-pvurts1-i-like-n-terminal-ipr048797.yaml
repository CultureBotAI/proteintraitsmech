identifier: InterPro:IPR048797
label: "Restriction endonuclease PvuRts1 I-like, N-terminal"
definition: >-
  This domain is found at the N-terminal end of Restriction endonuclease PvuRts1 I from Proteus vulgaris and similar bacterial sequences. PvuRts1I a modification-dependent endonuclease with high selectivity for 5-hydroxymethylcytosine, an epigenetic marker that is crucial for multiple biological processes, over 5-methylcytosine and cytosine. This protein is organised into a nuclease domain (this entry) and a C-terminal SRA (SET and RING associated) domain. This domain adopts a typical three-layered α-β-α sandwich configuration, with a central five-stranded β-sheet surrounded by three α-helices on one side and one α-helix on the other side.
