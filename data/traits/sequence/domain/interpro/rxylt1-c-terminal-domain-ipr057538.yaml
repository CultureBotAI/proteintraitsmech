identifier: InterPro:IPR057538
label: "RXYLT1, C-terminal domain"
definition: >-
  This domain is found in human Ribitol-5-phosphate xylosyltransferase 1 (RXYLT1) and related proteins. It has a detectable similarity to domains members of Glycosyl transferase clan GT-B and it is predicted to adopt similar structure. RXYLT1 acts as a UDP-D-xylose:ribitol-5-phosphate beta1,4-xylosyltransferase, which catalyses the transfer of UDP-D-xylose to ribitol 5-phosphate (Rbo5P) to form the Xylbeta1-4Rbo5P linkage on O-mannosyl glycan.
