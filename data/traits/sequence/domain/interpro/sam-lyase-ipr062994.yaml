identifier: InterPro:IPR062994
label: "SAM lyase"
definition: >-
  This entry represents a domain found in SAM lyase from Clostridium botulinum and related proteins. SAM lyase degrades SAM-AMP into 5'-methylthioadenosine (MTA)-AMP and homoserine lactone and potentially deactivating the CRISPR-Cas system. SAM lyase is composed of a four-stranded antiparallel β-sheet and α-helices packe don one side of it. SAM lyase forms a triangular trimer.
