identifier: InterPro:IPR045876
label: "Pathogenesis-related homeodomain protein, PHD finger"
definition: >-
  Pathogenesis-related homeodomain protein (PRHA) is a homeodomain protein encoded by a single-copy Arabidopsis thaliana homeobox gene, prha. It shows the capacity to bind to TAATTG core sequence elements but requires additional adjacent bases for high-affinity binding. PRHA contains a plant homeodomain (PHD) finger, a homeodomain, peptide repeats and a putative leucine zipper dimerization domain. This entry represents the PHD finger.
