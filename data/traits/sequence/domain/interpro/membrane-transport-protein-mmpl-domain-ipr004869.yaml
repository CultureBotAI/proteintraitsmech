identifier: InterPro:IPR004869
label: Membrane transport protein MMPL domain
definition: >-
  This entry represents a domain found in the MmpL family of membrane transport proteins. Many of the proteins contain two copies of this aligned region. Some members have been characterised, for instance, Mycobacterium tuberculosis MMPL10 is required for the biosynthesis of polyacyltrehalose (PAT) and the transport of diacyltrehalose (DAT) and possibly PAT to the cell surface, while MMPL4 is a part of an export system required for biosynthesis and secretion of siderophores.
