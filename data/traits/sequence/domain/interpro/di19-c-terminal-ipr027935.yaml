identifier: InterPro:IPR027935
label: "Di19, C-terminal"
definition: >-
  This entry represents the C-terminal domain in Di19 proteins. This domain contains an unstructured region followed by an α-helix. Protein dehydration-induced19 (Di19) increases the sensitivity of plants to environmental stress, such as salinity, drought, osmotic stress and cold. The protein is also induced by an increased supply of stress-related hormones such as abscisic acid ABA and ethylene. Di19 has been found to be strongly expressed in both the roots and leaves of Arabidopsis thaliana during progressive drought. It is phosphorylated by AtCPK11 in a Ca(2+)-dependent manner
