identifier: InterPro:IPR056534
label: "NWD2, C-terminal beta-propeller domain"
definition: >-
  This entry represents the β-propeller domain found at the C-terminal of NACHT and WD repeat domain-containing protein 2 (NWD2) from human and similar proteins. The function of these proteins is not yet known.
