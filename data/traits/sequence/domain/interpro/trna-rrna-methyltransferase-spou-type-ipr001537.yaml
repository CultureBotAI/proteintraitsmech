identifier: InterPro:IPR001537
label: tRNA/rRNA methyltransferase, SpoU type
definition: >-
  This entry represents a domain found in the spoU protein from E. coli that shows strong similarities to previously characterised 2'-O-methyltransferases. The Mrm1 protein of Saccharomyces cerevisiae has been shown to be required for ribose methylation at a universally conserved nucleotide in the peptidyl transferase centre of the mitochondrial large ribosomal RNA (21S rRNA). Cells reduced in this activity were deficient in formation of functional large subunits of the mitochondrial ribosome. The Mrm1 protein catalyses the site-specific formation of 2'-O-methylguanosine on in vitro transcripts of both mitochondrial 21S rRNA and E. coli 23S rRNA providing evidence for an essential modified nucleotide in rRNA.
