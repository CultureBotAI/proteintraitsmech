identifier: InterPro:IPR056593
label: "LRRK2, ANK repeat domain"
definition: >-
  This entry represents the ankyrin repeat (ANK) found towards the N-terminal end of the Leucine-rich repeat serine/threonine-protein kinase 2 (LRRK2) from eukaryotes, between the ARM repeat domain ( ) and the LRR domain ( ). The ANK domain plays a key role in this process, as conserved leucine residues within the ANK domain are required for Rab29 binding, which mediates Golgi recruitment and kinase activation. LRRK2 is a serine/threonine-protein kinase which phosphorylates a broad range of proteins involved in multiple processes such as neuronal plasticity, primary ciliogenesis, autophagy, and vesicle trafficking. Mutations in LRRK2 are the most common genetic cause of Parkinson's disease. LRRK2 phosphorylates a group of Rab GTPase proteins, including Rab29.
