identifier: InterPro:IPR039479
label: "Single CXXC unit"
definition: >-
  This is a solo version of the Znf-CXXC domain with a conserved CXXCXXCX(n)C, zinc-binding motif. Structural comparisons show that the mono-CXXC is homologous to the structural- zinc binding domain of medium chain dehydrogenases. The regular Znf-CXXC domain binds nonmethyl-CpG dinucleotides.
