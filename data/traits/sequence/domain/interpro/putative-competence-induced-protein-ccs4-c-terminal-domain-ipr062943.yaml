identifier: InterPro:IPR062943
label: "Putative competence-induced protein Ccs4, C-terminal domain"
definition: >-
  Competence is the ability of a cell to take up exogenous DNA from its environment, resulting in transformation. It is widespread among bacteria and is probably an important mechanism for the horizontal transfer of genes. DNA usually becomes available by the death and lysis of other cells. Competent bacteria use components of extracellular filaments called type 4 pili to create pores in their membranes and pull DNA through the pores into the cytoplasm. This process, including the development of competence and the expression of the uptake machinery, is regulated in response to cell-cell signalling and/or nutritional conditions. These proteins are part of a set in Streptococcus pneumoniae that undergo late induction by competence pheromone. This protein shows structural similarity to ArnT from Cupriavidus metallidurans. This protein is an integral membrane lipid-to-lipid glycosyltransferase 4-amino-4-deoxy-L-arabinose transferase suggesting a possible function for these proteins represented by . This entry represents the C-terminal domain of these proteins which may adopt an α/β fold consisting of four β-strands decorated with four α-helices.
