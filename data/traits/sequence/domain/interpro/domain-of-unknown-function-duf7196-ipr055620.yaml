identifier: InterPro:IPR055620
label: "Domain of unknown function DUF7196"
definition: >-
  This entry represents an uncharacterised protein domain found in viruses and bacteria, including Mycobacteriophages, Nocardia, Streptomyces and Rhodococcus species. The domain is typically between 50-99 amino acids in length. In some proteins, the domain is found at the C terminus. AlphaFold prediction shows a small domain composed of three β-strands in a sheet with a single α-helix between strands 2 and 3.
