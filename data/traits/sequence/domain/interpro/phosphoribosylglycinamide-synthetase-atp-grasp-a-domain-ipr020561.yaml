identifier: InterPro:IPR020561
label: "Phosphoribosylglycinamide synthetase, ATP-grasp (A) domain"
definition: >-
  Phosphoribosylglycinamide synthetase ( ) (GARS) (phosphoribosylamine glycine ligase) catalyses the second step in the de novo biosynthesis of purine. The reaction catalysed by phosphoribosylglycinamide synthetase is the ATP-dependent addition of 5-phosphoribosylamine to glycine to form 5'phosphoribosylglycinamide: ATP + 5-phosphoribosylamine + glycine = ADP + P i + 5'-phosphoribosylglycinamide In bacteria, GARS is a monofunctional enzyme (encoded by the purD gene). In yeast, GARS is part of a bifunctional enzyme (encoded by the ADE5,7 gene) in conjunction with phosphoribosylformylglycinamidine cyclo-ligase (AIRS). In higher eukaryotes, GARS is part of a trifunctional enzyme in conjunction with AIRS and with phosphoribosylglycinamide formyltransferase (GART), forming GARS-AIRS-GART. This entry represents the A-domain of the enzyme, and is related to the ATP-grasp domain of biotin carboxylase/carbamoyl phosphate synthetase.
