identifier: InterPro:IPR048561
label: "Disabled, phosphotyrosine-binding domain"
definition: >-
  Disabled (Dab) is a cytosolic adaptor protein, which binds to the cytoplasmic tails of lipoprotein receptors, such as ApoER2 and VLDLR, via its phosphotyrosine-binding domain (PTB) domain. The Dab PTB domain has a preference for non phosphorylated tyrosine within an NPxY motif. Additionally, the Dab PTB domain, which is structurally similar to PH domains, binds to phosphatidylinositol phosphate 4,5 bisphosphate in a manner characteristic of phosphoinositide binding PH domains. PTB domains are classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains. This entry is part of the Dab-like subgroup
