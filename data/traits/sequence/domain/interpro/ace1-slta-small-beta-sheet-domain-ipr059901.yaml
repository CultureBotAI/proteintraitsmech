identifier: InterPro:IPR059901
label: "ACE1/SLTA, small beta-sheet domain"
definition: >-
  This entry represents a small β-sheet domain found in ACE1/SLTA transcription factor proteins. ACE1 is a Cys2-His2 zinc finger transcription factor that binds to the promoter of the cbh1 gene and activates transcription. The protein is localised to the nucleus and plays a role in regulation of cellulase gene expression. SLTA is a transcription factor that contributes to azole resistance by coregulating the expression of the drug target erg11A and the drug efflux pump mdr1. This β-sheet domain is found upstream of the zinc finger region and may contribute to protein stability or protein-protein interactions.
