identifier: InterPro:IPR064162
label: "Pneumococcal collagen-like adhesin PclA-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal non-repetitive region of PclA (pneumococcal collagen-like protein A), a virulence factor present in a subset of Streptococcus pneumoniae strains. pclA is encoded divergently from its transcriptional regulator PclR. Full-length PclA is a modular protein; moving from N to C terminus, it comprises a crosswall-targeting YSIRK-type signal peptide, followed by the non-repetitive region captured by this entry, a collagen-like triple helix repeat region ( ), repeats of a 40-residue collagen-flanked surface repeat ( ), and a C-terminal LPXTG-containing sorting signal for sortase-mediated cleavage and anchoring to the peptidoglycan cell wall.
