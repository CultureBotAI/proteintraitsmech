identifier: InterPro:IPR055460
label: "IFT52, central domain"
definition: >-
  This entry represents the central domain of IFT52 homolog from human and related proteins. IFT52 is a core component of the IFT-B complex which is involved in intraflagellar transport (IFT), the bidirectional movement of particles required for the assembly, maintenance and functioning of primary cilia. IFT52 interacts with IFT88 and IFT70 through the central domain, while its C-terminal domain interacts with IFT46 and IFT74.
