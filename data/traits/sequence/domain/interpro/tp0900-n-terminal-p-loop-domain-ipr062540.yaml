identifier: InterPro:IPR062540
label: "TP0900, N-terminal P-loop domain"
definition: >-
  This entry represents the N-terminal domain of Treponema pallidum protein TP0900 and related spirochaete proteins. The domain is approximately 225 residues long and contains a P-loop with an inserted α-helical domain. It is found N-terminal to a PD-(D/E)XK nuclease domain. The function of this domain remains to be determined.
