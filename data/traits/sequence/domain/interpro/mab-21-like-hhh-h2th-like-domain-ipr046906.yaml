identifier: InterPro:IPR046906
label: "Mab-21-like, HhH/H2TH-like domain"
definition: >-
  This entry represents the C-terminal HhH/H2TH-like domain of Mab-21 and Mab-21-like proteins, and related proteins from animals. In Caenorhabditis elegans, these proteins are required for several aspects of embryonic development. This entry also includes inositol 1,4,5-triphosphate receptor-interacting proteins, which are predicted to contain a partial Mab-21 domain.
