identifier: InterPro:IPR048965
label: "Activity-regulated cytoskeleton-associated protein, N-lobe"
definition: >-
  This domain is found in Activity-regulated cytoskeleton-associated protein from humans (Arc), a master regulator of synaptic plasticity that promotes endocytosis of AMPA receptors and a postsynaptic mediator of activity-dependent synapse elimination in the developing cerebellum. This protein is associated with cognitive diseases. This protein has a bi-lobar architecture that is similar to the capsid domain of HIV gag protein consisting of a N-lobe, represented in this entry, and a C-lobe, which have four and five α-helices, connected by a short non-helical segment. This protein was originated from the Ty3/Gypsy retrotransposon family and domesticated in higher vertebrates for synaptic functions.
