identifier: InterPro:IPR063928
label: "Sodium-influx-stimulating peptide"
definition: >-
  This entry represents a conserved domain found predominantly in arthropod proteins, including Sodium-influx-stimulating peptide (SIS) from Lymnaea stagnalis. The domain is found in various uncharacterised proteins across insects and arachnids, including species from Diptera, Lepidoptera, and Araneae. The domain may adopt a helical bundle structure. The specific function of this domain remains to be determined.q
