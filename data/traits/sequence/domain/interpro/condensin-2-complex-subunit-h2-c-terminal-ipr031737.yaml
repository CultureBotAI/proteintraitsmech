identifier: InterPro:IPR031737
label: "Condensin-2 complex subunit H2, C-terminal"
definition: >-
  This entry represents the C-terminal winged Helix-Turn-Helix domain of the H2 subunit of the condensin II complex (Ncaph2), found in eukaryotes but not fungi. Condensin complexes are involved in the restructuring and maintenance of chromatin. Eukaryotes possess two condensins (condensin I and condensin II), each composed of structural maintenance of chromosomes proteins SMC2 and SMC4, with three additional non-SMC condensin-associated proteins (Ncaps) unique to each condensin (condensin I - Ncaph, Ncapd2, and Ncapg; condensin II - Ncaph2, Ncapd3, and Ncapg2).
