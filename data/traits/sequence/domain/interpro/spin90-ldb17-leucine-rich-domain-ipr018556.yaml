identifier: InterPro:IPR018556
label: "SPIN90/Ldb17, leucine-rich domain"
definition: >-
  This is the conserved leucine-rich domain (LRD) within the C-terminal domain of SPIN90 (also known as NCK interacting protein with SH3 domain (NCKIPSD)) from animals, Ldb17 from budding yeasts and Dip1 from fission yeasts. Ldb17 is involved in the regulation of endocytosis in yeast. SPIN90 is an F-actin binding protein that regulates actin polymerization and endocytosis. It associates with and activates the Arp2/3 complex, without requiring a preformed actin filament. This LRD, within the C-terminal armadillo repeat (ARM) domain of SPIN90, is important for activation of Arp2/3 complex.
