identifier: InterPro:IPR035659
label: "Sucrose-phosphate synthase, C-terminal"
definition: >-
  Sucrose phosphate synthase (SPS; ), also known as UDP-glucose-fructose-phosphate glucosyltransferase, catalyzes the transfer of a hexosyl group from UDP-glucose to D-fructose 6-phosphate to form UDP and D-sucrose-6-phosphate, this is the rate limiting step of sucrose synthesis. Several different isozymes of SPS exist in plants. Plant SPSs consist of three domains. The N-terminal region has no clear similarity with any other proteins. The central region contains a glycosyltransferase domain responsible for the catalytic function of SPS. The C-terminal region resembles sucrose phosphate phosphatase. This entry represents the C-terminal domain of SPS from plants.
