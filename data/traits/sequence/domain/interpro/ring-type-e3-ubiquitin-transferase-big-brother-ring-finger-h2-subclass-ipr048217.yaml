identifier: InterPro:IPR048217
label: "RING-type E3 ubiquitin transferase BIG BROTHER, RING finger, H2 subclass"
definition: >-
  E3 ubiquitin-protein ligase BIG BROTHER BB (also known as protein ENHANCER OF DA1-1 or EOD1) is an E3 ubiquitin-protein ligase that limits organ size, and possibly seed size, in a dose-dependent manner. It negatively regulates the duration of cell proliferation in leaves and petals independently of the major phytohormones (e.g. auxin, cytokinin, gibberellin, brassinosteroids, ethylene, abscisic acid, jasmonic acid), probably by targeting growth stimulators for degradation. It limits the proliferation of root meristematic cells. BB activate the latent peptidases DA1, DAR1 and DAR2 by monoubiquitination in multiple sites. It is involved in the promotion of leaf senescence, in addition to its function in restricting plant growth. BB-related is an E3 ubiquitin-ligase probably involved in organ size regulation. This entry represents the C3H2C3-type RING-H2 finger.
