identifier: InterPro:IPR056048
label: "Cysteine repeat modular protein A/B-like, DUF7631"
definition: >-
  This presumed domain is found in Cysteine repeat modular protein A/B from Toxoplasma gondii (CRMPA/B), uncharacterised sequences from Plasmodium falciparum and similar sequences from Apicomplexa. CRMPA/B are required for triggering rhoptry secretion and play a role in host cell invasion. This domain may adopt a TNF receptor-like fold.
