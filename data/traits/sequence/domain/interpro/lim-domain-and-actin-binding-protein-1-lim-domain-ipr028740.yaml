identifier: InterPro:IPR028740
label: "LIM domain and actin-binding protein 1, Lim domain"
definition: >-
  LIM domain and actin-binding protein 1 (LIMA1, also know as EPLIN) is a cytoskeleton-associated protein that regulates actin dynamics by cross-linking and stabilising filaments. It is a tumour suppressor whose expression inversely correlates with cell growth, motility, invasion and cancer mortality. It interacts and stabilizes F-actin filaments and stress fibers, which correlates with its ability to suppress anchorage independent growth. EPLIN was first identified as the product of a gene that is transcriptionally down-regulated or lost in a number of human epithelial tumour cells. In humans, there are two EPLIN isoforms, EPLIN alpha and EPLIN beta, both have a centrally located LIM domain that may mediate self-dimerisation. EPLIN inhibits Arp2/3 complex-mediated branching nucleation of actin filaments and stabilises actin filament networks. EPLIN can be regulated through phophoryltion by extracellular signal-regulated kinase (ERK). This entry represents the Lim domain of EPLIN, which function as an adaptor or scaffold to support the assembly of multimeric protein. This domain shows two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms.
