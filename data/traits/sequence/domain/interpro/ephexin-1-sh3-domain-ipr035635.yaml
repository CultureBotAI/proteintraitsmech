identifier: InterPro:IPR035635
label: "Ephexin-1, SH3 domain"
definition: >-
  Ephexin-1 is a RhoGEF (Rho-type guanine nucleotide exchange factor) that activates RhoA, Tac1, and Cdc42 by exchanging bound GDP for free GTP. It is expressed mainly in the brain in a region associated with movement control. It regulates the stability of postsynaptic acetylcholine receptor (AChR) clusters and thus plays a critical role in the maturation and neurotransmission of neuromuscular junctions. Ephexin-1 directly interacts with the ephrin receptor EphA4 and their coexpression enhances the ability of ephexin-1 to activate RhoA. It is required for normal axon growth and EphA-induced growth cone collapse.
