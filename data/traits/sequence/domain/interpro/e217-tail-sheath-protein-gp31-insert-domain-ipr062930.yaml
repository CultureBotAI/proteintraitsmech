identifier: InterPro:IPR062930
label: "E217 tail sheath protein gp31, insert domain"
definition: >-
  This entry represents an insert domain found in the Pseudomonas bacteriophage E217 tail sheath protein gp31 and related proteins, including phage Pa193 gp32 and Shigella flexneri bacteriophage Sf14 gp39. It folds into a β-sandwich structure.
