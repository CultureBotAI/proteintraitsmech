identifier: InterPro:IPR063231
label: "Ubiquinone biosynthesis accessory factor UbiJ, C-terminal conserved region"
definition: >-
  This entry represents the C-terminal region of ubiquinone biosynthesis accessory factor UbiJ, found in bacteria. This region is composed of two α helices and is approximately 60-80 residues in length. It is located C-terminal to the SCP2 domain ( ). UbiJ is required for ubiquinone (coenzyme Q) biosynthesis under aerobic conditions. The protein binds hydrophobic ubiquinone biosynthetic intermediates via its SCP2 domain and is essential for the stability of the Ubi complex. UbiJ forms part of the Ubi complex metabolon, interacting with UbiK and other ubiquinone biosynthesis proteins. The specific function of this C-terminal region remains to be determined.
