identifier: InterPro:IPR063462
label: "PTAC6, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of PTAC6 (PLASTID TRANSCRIPTIONALLY ACTIVE protein 6), found in land plants. This protein contains a chloroplast transit peptide (residues 1-59) that directs the protein to chloroplasts. PTAC6 is an essential component of the plastid-encoded RNA polymerase complex involved in plastid gene expression and chloroplast biogenesis. The protein exhibits dual localisation between nucleus and chloroplast, linking photomorphogenesis with chloroplast development. The specific function of this C-terminal domain remains to be determined.
