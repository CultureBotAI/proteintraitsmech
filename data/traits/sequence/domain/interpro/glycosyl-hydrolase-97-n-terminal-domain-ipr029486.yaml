identifier: InterPro:IPR029486
label: "Glycosyl-hydrolase 97, N-terminal domain"
definition: >-
  Proteins containing this domain include the aglycoside hydrolase family 97 enzyme, SusB protein, from Bacteroides thetaiotaomicron. SusB has three domains: the N-terminal, catalytic, and C-terminal domains. This entry represents the N-terminal domain that contributes to part of the active site pocket and is important for contact with the catalytic and the C-terminal domains.
