identifier: InterPro:IPR056651
label: "Ras guanine nucleotide exchange factor glfB-like, C-terminal"
definition: >-
  This domain is found at the C-terminal of Ras guanine nucleotide exchange factor glfB from Dictyostelium discoideum and in similar uncharacterised proteins from lower eukaryotes. GflB is a GpaB-activated, rapA-specific guanine nucleotide exchange factor, involved in the regulation of the balance between Ras and Rap signalling at the leading edge of chemotaxing cells. This protein also acts as a key regulator of actin-driven membrane protrusions during processes such as phagocytosis and cytokinesis, possibly by modulating rapA signalling pathways. This domain is predicted to adopt a globular α/β structure.
