identifier: InterPro:IPR054357
label: "Peroxisomal multifunctional enzyme type 2-like, N-terminal domain"
definition: >-
  This entry represents a domain found at the N-terminal of Peroxisomal multifunctional enzyme type 2 (also known as MFE-2 hydratase 2) and related enzymes. This domain is housing the cavity for the aliphatic acyl part of the substrate molecule. The flexibility of region within this domain plays a role in substrate binding in mammalian hydratase 2.
