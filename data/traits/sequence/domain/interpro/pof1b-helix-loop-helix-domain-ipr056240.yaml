identifier: InterPro:IPR056240
label: "POF1B, helix-loop-helix domain"
definition: >-
  This domain is found in human protein POF1B and its homologues. Human POF1B plays a key role in the organization of epithelial monolayers by regulating the actin cytoskeleton. This domain is predicted to adopt a structure consisting of two helices connected by a loop region. The function of this domain is unknown but mutation of a conserved arginine 329 in human is associated with premature ovarian failure. This point mutation reduces the capacity of the mutant protein to bind non-muscle actin filaments.
