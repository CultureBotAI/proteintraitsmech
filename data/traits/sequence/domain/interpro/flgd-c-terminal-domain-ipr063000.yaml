identifier: InterPro:IPR063000
label: "FlgD, C-terminal domain"
definition: >-
  This entry represents a Tudor-like domain found at the C-terminal of FlgD proteins in Spirochaetes including from Treponema denticola. FlgD functions as a flagellar hook assembly scaffolding protein. The domain is approximately 40-55 residues long and is usually associated with ( ). The Tudor fold typically functions in protein-protein interactions involving methylated residues, though the specific role of this domain in flagellar assembly remains to be determined.
