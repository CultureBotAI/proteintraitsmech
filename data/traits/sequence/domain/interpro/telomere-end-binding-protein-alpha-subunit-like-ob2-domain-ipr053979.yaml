label: "Telomere end-binding protein alpha subunit-like, OB2 domain"
definition: >-
  This entry represents the second OB-fold domain (OB2) of the telomere end-binding protein (TEBP) alpha subunit. Similar to the first OB-fold domain (OB1), this domain binds to ssDNA.
