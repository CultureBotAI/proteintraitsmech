identifier: InterPro:IPR058653
label: "Membrane protein NfeD2, N-terminal transmembrane domain"
definition: >-
  This entry represents the N-terminal transmembrane region of NfeD proteins, which typically contains three transmembrane helices. NfeD proteins are characterised by a hydrophobic membrane-spanning region followed by a soluble β-rich domain. NfeD proteins are often found encoded in operons with flotillin-like proteins, suggesting a functional relationship. In Bacillus subtilis, NfeD2 (YuaF) co-localises with FloT in membrane microdomains that resemble lipid rafts. NfeD2 is recruited into FloT assemblies, and the two proteins influence each other's localisation patterns.
