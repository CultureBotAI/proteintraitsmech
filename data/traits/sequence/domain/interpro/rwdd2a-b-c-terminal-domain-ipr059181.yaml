identifier: InterPro:IPR059181
label: "RWDD2A/B, C-terminal domain"
definition: >-
  This entry represents the C-terminal in RWDD2A and RWDD2B which are small proteins that contain an N-terminal RWD domain. The C-terminal domain is predicted to adopt a fold similar to the C-terminal domain of Prp3, an essential U4/U6 di-snRNP-associated protein which plays a role in pre-mRNA splicing. The Prp3 C-terminal domain is a single-stranded RNA-binding domain. This domain is also found at the C-terminal in Phomoidride biosynthesis cluster protein F from fungi.
