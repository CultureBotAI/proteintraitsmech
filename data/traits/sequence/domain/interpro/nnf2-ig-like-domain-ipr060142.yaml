identifier: InterPro:IPR060142
label: "NNF2, Ig-like domain"
definition: >-
  This entry represents an immunoglobulin-like (Ig-like) domain found in NNF2 proteins. NNF2 is a multi-pass membrane protein localised to the endoplasmic reticulum membrane with three transmembrane regions. The protein contains both luminal and cytoplasmic topological domains. This Ig-like domain is located within the large cytoplasmic region of the protein. NNF2 is found across fungi, particularly in Saccharomycetes. The protein shows interaction with SMC1 and other cellular components. The specific function of this domain remains to be determined.
