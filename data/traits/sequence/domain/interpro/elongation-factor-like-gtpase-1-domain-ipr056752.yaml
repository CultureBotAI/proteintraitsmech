identifier: InterPro:IPR056752
label: "Elongation factor-like GTPase 1 domain"
definition: >-
  This domain is found in human Elongation factor-like GTPase 1 (EFL1) and similar eukaryotic proteins, including yeast homologue known as Ribosome assembly protein 1. EFL1 is involved in the biogenesis of the 60S ribosomal subunit and translational activation of ribosomes. Together with SBDS, triggers the GTP-dependent release of EIF6 from 60S pre-ribosomes in the cytoplasm, thereby activating ribosomes for translation competence by allowing 80S ribosome assembly and facilitating EIF6 recycling to the nucleus, where it is required for 60S rRNA processing and nuclear export.
