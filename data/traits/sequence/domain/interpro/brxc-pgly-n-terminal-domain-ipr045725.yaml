identifier: InterPro:IPR045725
label: "BrxC/PglY, N-terminal domain"
definition: >-
  This entry (ex DUF6079) represents the P-loop domain at the N-terminal in Probable ATP-binding protein BrxC and ATPase pglY. BrxC is a core protein of a type 1 BREX system, which provides immunity against bacteriophage. This system allows phage adsorption but prevents phage DNA replication, without degradation of the phage DNA. Methylation of bacterial DNA by PglX probably guides self/non-self discrimination. When the brxA-brxB-brxC-pglX and pglZ-brxL operons are transformed into a susceptible B.subtilis strain (BEST7003) they confer resistance to bacteriophages SPbeta, SP16, Zeta, phi3T and SP02 and partial protection to phages SP01 and SP82G (these include lytic and temperate phages). They do not protect against phages phi105, rho10 or rho14. Additionally, it confers a very slight reduction in the efficiency of plasmid transformation. The ATPase PglY is part of a type 2 BREX system, which provides immunity against bacteriophage infections. It was previously known as the phage growth limitation (Pgl) system and offers protection against bacteriophage phiC31. The system allows one cycle of phage infection, but subsequent cycles are impaired, thereby protecting the original bacterial colony. The BREX system, which includes the pglW-pglX-pglY-pglZ genes, confers resistance to phage phiC31 and phiBT1 when transformed into a susceptible strain. All four genes are necessary for this resistance. PglY hydrolyses ATP but not other nucleotides, and its activity is inhibited by the non-hydrolysable ATP analogue 5-adenylyl beta,gamma-imidodiphosphate.
