identifier: InterPro:IPR056311
label: "TMEM131, second Ig-like domain"
definition: >-
  This entry represents the second Ig-like domain from TMEM131. TMEM131 is a collagen binding transmembrane protein involved in collagen secretion by recruiting the ER-to-Golgi transport complex TRAPPIII. Human TMEM131 is predicted to contain eight Ig-like domains.
