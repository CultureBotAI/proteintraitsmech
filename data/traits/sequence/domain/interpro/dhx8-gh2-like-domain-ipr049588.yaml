identifier: InterPro:IPR049588
label: "DHX8, GH2-like domain"
definition: >-
  DHX8 (the human homologue of yeast Prp22), also called RNA helicase HRH1, is an ATP-dependent RNA helicase involved in pre-mRNA splicing as a component of the spliceosome. It facilitates nuclear export of spliced mRNA by releasing the RNA from the spliceosome. This entry corresponds to the GH2-like (GIPC-homology 2) domain that has high sequence similarity with the GH2 domain found in GIPC (GAIP C-terminal-interacting protein) family of proteins, which mediate endocytosis by tethering cargo proteins to the motor myosin VI.
