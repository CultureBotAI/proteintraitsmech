identifier: InterPro:IPR039473
label: "Cell surface hyaluronidase, PANDER-like domain"
definition: >-
  This entry represents a domain found in cell surface hyaluronidase (also known as TMEM2) and CEMIP. This domain is similar to Pancreatic-derived factor PANDER (also known as FAM3B), and is found C-terminal to a glycine rich G8-domain. The function of the PANDER-like domain in TMEM2 is not clear. TMEM2 is a cell surface hyaluronidase that mediates the initial cleavage of extracellular high-molecular-weight hyaluronan into intermediate-size hyaluronan of approximately 5kDa fragments. CEMIP is a hyaluronan binding protein involved in hyaluronan depolymerisation.
