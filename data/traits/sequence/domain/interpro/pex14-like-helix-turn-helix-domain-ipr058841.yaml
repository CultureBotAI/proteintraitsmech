identifier: InterPro:IPR058841
label: "PEX14-like, helix-turn-helix domain"
definition: >-
  This helix-turn-helix domain is found in one or two copies at the N-terminal of proteins that contain a domain. These proteins are largely found in fungal proteins and annotated as putative Peroxisomal membrane protein PEX14-like KPWE domain-containing proteins.
