identifier: InterPro:IPR025151
label: "ELYS-like domain"
definition: >-
  This domain is found in ELYS (embryonic large molecule derived from yolk sac), which is conserved from fungi such Aspergillus nidulans and Schizosaccharomyces pombe to humans. ELYS is important for the assembly of the nuclear pore complex. The domain is also found in other proteins, such as E3 ubiquitin-protein ligase HOS1.
