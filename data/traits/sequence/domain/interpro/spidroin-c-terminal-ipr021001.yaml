identifier: InterPro:IPR021001
label: "Spidroin, C-terminal"
definition: >-
  Spidroin is spider dragline silk. It is composed of two proteins, major ampullate spidroin 1 (MaSp1) and major ampullate spidroin 2 (MaSp2). MaSp1 contains five α-helices. Spidroins contain repetitive units capped between non-repetitive N-terminal and C-terminal domains, whose composition varies among species and thus determines the variety of mechanical properties of spider silks. The C-terminal domains are conserved among spider silk proteins. This is the C-terminal domain of spidroin.
