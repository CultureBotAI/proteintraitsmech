identifier: InterPro:IPR057624
label: "Telomere ends associated, alpha-helical domain"
definition: >-
  This entry represents a small domain that is present four times in Protein telomere ends associated (Tea) from Drosophila and related fly sequences. This domain may adopt an α-helical fold. Tea protects telomeres from fusion and it likely functions as a component of the MTV complex along with moi and ver. The complex binds single-stranded DNA in a sequence-independent manner and can protect it from DNA degradation.
