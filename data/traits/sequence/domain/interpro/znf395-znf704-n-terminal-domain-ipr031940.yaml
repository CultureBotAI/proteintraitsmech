label: "ZNF395/ZNF704, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain (ex DUF4772) in Zinc finger protein 395 (ZNF395) and Zinc finger protein 704 (ZNF704). ZNF395 plays a role in papillomavirus gene transcription.
