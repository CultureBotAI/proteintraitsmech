identifier: InterPro:IPR040474
label: "Ubiquitin-like protein MDY2, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Ubiquitin-like protein MDY2 from S. cerevisiae (also known as Get5) and related proteins found in Saccharomycetes. It is an homodimerisation domain, responsible for the formation of a heterotetrameric Get4/Get5 complex. This domain folds into helical hairpin that dimerises to form a four helical bundle. Tail-anchored trans-membrane proteins are targeted to membranes post-translationally. The proteins Get4 and Get5 form an obligate complex that catalyses the transfer of tail-anchored proteins destined to the endoplasmic reticulum from Sgt2 to the cytosolic targeting factor Get3.
