identifier: InterPro:IPR025749
label: "Sphingomyelin synthase-like domain"
definition: >-
  This domain is found in sphingomyelin synthase (also known as phosphatidylcholine:ceramide cholinephosphotransferase), and other proteins. Sphingomyelin synthase is a bidirectional lipid cholinephosphotransferase capable of converting phosphatidylcholine (PC) and ceramide to sphingomyelin (SM) and diacylglycerol (DAG) and vice versa. This domain is closely related to the C-terminal a region of phosphatidic acid phosphatase type 2 (PAP2).
