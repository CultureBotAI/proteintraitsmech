identifier: InterPro:IPR059894
label: "KlcB, DNA-binding domain"
definition: >-
  This entry represents the N-terminal domain of KlcB proteins. KlcB proteins are found on IncP plasmids and are involved in transcriptional regulation. This domain is responsible for the DNA-binding activity of the protein. The protein is part of the kilC operon and its expression is negatively regulated by KorA and KorC. KlcB is encoded on promiscuous broad-host-range plasmids such as RK2.
