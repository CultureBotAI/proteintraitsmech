identifier: InterPro:IPR009440
label: "Plasmid segregation protein ParM/StbA, N-terminal"
definition: >-
  This entry represents the N-terminal domain of bacterial plasmid segregation protein ParM, also known as StbA. ParM is involved in the control of plasmid partition and required for the accurate segregation of the plasmid, which forms filaments to drive partition.
