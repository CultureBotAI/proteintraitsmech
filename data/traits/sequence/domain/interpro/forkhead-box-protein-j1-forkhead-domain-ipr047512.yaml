identifier: InterPro:IPR047512
label: "Forkhead box protein J1, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of FOXJ1 and similar proteins from animals. The FH domain is a winged helix DNA-binding domain. Forkhead box protein J1 (FOXJ1), also called Forkhead-related protein FKHL13 or HFH-4, acts as a transcription factor specifically required for the formation of motile cilia. It acts by activating transcription of genes that mediate assembly of motile cilia, such as CFAP157. FOXJ1 binds the DNA consensus sequences 5'-HWDTGTTTGTTTA-3' or 5'-KTTTGTTGTTKTW-3' (where H is not G, W is A or T, D is not C, and K is G or T). It activates the transcription of a variety of ciliary proteins in the developing brain and lung. In humans, FOXJ1 is associated with mucosal inflammation caused by allergen exposure and a form of primary ciliary dyskinesia characterised by chronic inflammation and bronchiectasis due to defects in the respiratory cilia.
