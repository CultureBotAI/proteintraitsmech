identifier: InterPro:IPR057982
label: "NAA35-like, TPR repeats"
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found at the C-terminal end of human N-alpha-acetyltransferase 35, NatC auxiliary subunit (NAA35) and similar sequences. In budding yeasts, NatC N(alpha)-terminal acetyltransferases contain Mak10, Mak31 and Mak3 subunits. All three subunits are associated with each other to form the active complex. Naa35, also known as MAK10, catalyses acetylation of the N-terminal Met of the L-A virus Gag protein. MAK10 has a role in the propagation of L-A and M viruses, perhaps in the viral assembly. It is apparently directly needed for optimum respiration. The N-terminal acetylation protects proteins from ubiquitination and degradation by the N-end rule pathway. In humans, Naa35 is involved in regulation of apoptosis and proliferation of smooth muscle cells.
