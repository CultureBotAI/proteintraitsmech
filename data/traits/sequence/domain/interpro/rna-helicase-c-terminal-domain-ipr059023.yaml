identifier: InterPro:IPR059023
label: "RNA helicase, C-terminal domain"
definition: >-
  This domain is found in a number of DEAD and DExH box RNA helicases. In DExH box RNA helicases, in particular DHX36, this domain is involved in interactions with the HA2 and the OB domains. It is composed of three antiparallel β-strands and three α-helices. This domain is found central in 3'-5' RNA helicase YTHDC2.
