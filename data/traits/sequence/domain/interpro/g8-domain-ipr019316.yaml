identifier: InterPro:IPR019316
label: "G8 domain"
definition: >-
  This entry represents a domain found in disease proteins PKHD1 and CEMIP2 (also known as KIAA1199) and is named G8 after its 8 conserved glycines. It is predicted to contain 10 β-strands and an α-helix. CEMIP2 is an inactive cell surface hyaluronidase that, unlike its mouse orthologue, has no catalytic hyaluronic acid-degrading activity, but acts as a regulator of hyaluronan (HA) metabolism through regulation of expression of CEMIP and HAS2, two enzymes involved in HA depolymerization and HA synthesis, respectively.
