identifier: InterPro:IPR062023
label: "Mediator of RNA polymerase II, transcription subunit 1.1/1.2, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Mediator of RNA polymerase II transcription subunits 1.1 and 1.2 from nematodes, whose specific function remains to be determined. The Mediator complex is a coactivator involved in the regulated transcription of nearly all RNA polymerase II-dependent genes. The complex functions as a bridge to convey information from gene-specific regulatory proteins to the basal RNA polymerase II transcription machinery. The proteins are localised to the nucleus and are components of the Mediator complex.
