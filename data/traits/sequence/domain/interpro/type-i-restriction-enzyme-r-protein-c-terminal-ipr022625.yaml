identifier: InterPro:IPR022625
label: "Type I restriction enzyme R protein, C-terminal"
definition: >-
  EcoR124 is made up of three subunits, HsdR, HsdS and HsdM. The R subunit has ATPase and restriction endonuclease activity. The enzyme has been characterised and shown to belong to a new family of the type I class of restriction and modification enzymes. After locating an unmethylated recognition site, the enzyme complex may serve as a molecular motor that translocates DNA in an ATP-dependent manner until a collision occurs that triggers cleavage. The enzyme undergoes major structural changes to bring the motor domains into contact with DNA, allowing DNA translocation. This prevents DNA access to the catalytic domains of both the R and M subunits, preventing both restriction and methylation. These enzymes are involved in bacterial defence by making double strand breaks in specific double stranded DNA sequences, e.g. that of invading bacteriophages. This entry represents the domain found in the C terminus of Type I restriction and modification enzymes.
