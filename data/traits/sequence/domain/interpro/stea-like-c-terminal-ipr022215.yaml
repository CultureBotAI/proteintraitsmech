identifier: InterPro:IPR022215
label: "SteA-like C-terminal"
definition: >-
  This domain family is found in bacteria, and is approximately 50 amino acids in length. This domain is found at the C-terminal of SteA proteins from Corynebacterium. SteA and SteB are conserved components of the cytokinetic ring among Corynebacterineae that may play a critical role in the final stages of cytokinesis as they probably form a complex to promote cell separation by RipC-FtsEX. They may coordinate peptidoglycan remodeling with the biogenesis of other envelope layers during cell division.
