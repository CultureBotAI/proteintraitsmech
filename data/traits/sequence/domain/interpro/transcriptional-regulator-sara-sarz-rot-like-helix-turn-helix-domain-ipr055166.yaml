identifier: InterPro:IPR055166
label: "Transcriptional regulator SarA/SarZ/Rot-like, helix-turn-helix domain"
definition: >-
  This entry represents a helix-turn-helix (HTH) domain found in bacterial transcriptional regulatory proteins, including SarA, SarZ and Rot from Staphylococcus aureus. Sar is a global regulator with both positive and negative effects that controls expression of several virulence factors and biofilm formation process in a cell density-dependent manner. Rot plays a key role in regulating S. aureus virulence through activation or repression of promoters that control expression of a large number of critical virulence factors.
