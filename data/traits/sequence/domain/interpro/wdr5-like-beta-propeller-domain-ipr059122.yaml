identifier: InterPro:IPR059122
label: "WDR5-like, beta-propeller domain"
definition: >-
  This is the β-propeller domain of WDR5 and its eukaryotic homologues. WDR5 contributes to histone modification; it may position the N-terminal of histone H3 for efficient trimethylation at 'Lys-4'. It is part of the MLL1/MLL complex, being involved in methylation and dimethylation at 'Lys-4' of histone H3. It also part of the NSL complex, in which it may be involved in acetylation of nucleosomal histone.
