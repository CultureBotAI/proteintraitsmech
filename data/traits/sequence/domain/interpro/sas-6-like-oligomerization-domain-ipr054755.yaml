identifier: InterPro:IPR054755
label: "Sas-6-like, oligomerization domain"
definition: >-
  This entry represents the coiled-coil region of Sas-6 from Chlamydomonas reinhardtii, which mediates oligomerisation. In human, Sas-6 is essential for the onset of procentriole formation and accumulates on the torus where Plk4 has focused. This entry is specific to Chlorophyta.
