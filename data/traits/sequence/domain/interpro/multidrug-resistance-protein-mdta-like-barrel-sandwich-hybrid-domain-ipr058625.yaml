identifier: InterPro:IPR058625
label: "Multidrug resistance protein MdtA-like, barrel-sandwich hybrid domain"
definition: >-
  This domain is found in a group of bacterial periplasmic membrane fusion proteins (MFPs) that are components of the RND tripartite drug efflux pumps, including Multidrug resistance protein MdtA and Macrolide export protein MacA. MFPs bridge the outer membrane factor and an inner membrane transporter. The most characterised MFP, Multidrug efflux pump subunit AcrA, connects the outer membrane factor TolC and the resistance-nodulation-division-type efflux transporter AcrB, which is a major multidrug efflux pump in Escherichia coli. Another member MexA, a Pseudomonas aeruginosa homologue of AcrA, is a component of the tripartite multidrug efflux system MexAB-OprM which is a major factor for antibiotic resistance by exporting a large variety of antimicrobial compounds. The barrel-sandwich hybrid domain is an important structural feature found in membrane fusion proteins. This domain plays a crucial role in the assembly and function of tripartite drug efflux systems. It is involved in interactions with the other components of the RND pumps.
