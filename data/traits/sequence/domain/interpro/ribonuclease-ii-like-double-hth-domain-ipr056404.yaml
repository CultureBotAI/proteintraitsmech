identifier: InterPro:IPR056404
label: "Ribonuclease II-like, double HTH domain"
definition: >-
  This entry represents a double HTH domain found in a set of ribonuclease II proteins mainly found in bacteria and plants. RNR1 is a 3'-5' exoribonuclease that catalyses 3' maturation of chloroplast and mitochondrion ribosomal RNAs. It degrades short nucleotidic extensions to generate the mature 3'-ends. It is involved in the maturation of 23S, 16S and 5S rRNAs.
