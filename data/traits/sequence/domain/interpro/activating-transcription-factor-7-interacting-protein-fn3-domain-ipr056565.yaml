identifier: InterPro:IPR056565
label: "Activating transcription factor 7-interacting protein, Fn3 domain"
definition: >-
  This entry represents the Fibronectin type III (Fn3) domain found in Activating transcription factor 7-interacting protein (MCAF) family of proteins. Activating transcription factor 7-interacting protein (MCAF) family consists of MCAF1 and MCAF2. MCAF1 (also known as MBD1-containing chromatin-associated factor 1) is a recruiter that couples transcriptional factors to general transcription apparatus and thereby modulates transcription regulation and chromatin formation. It can both act as an activator or a repressor depending on the context.
