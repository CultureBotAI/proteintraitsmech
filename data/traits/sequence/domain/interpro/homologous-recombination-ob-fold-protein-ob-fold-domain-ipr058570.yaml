identifier: InterPro:IPR058570
label: "Homologous recombination OB-fold protein, OB-fold domain"
definition: >-
  This entry represents the OB fold domain of human Homologous recombination OB-fold protein (HROB) and similar eukaryotic proteins. This domain, located in the C-terminal region, is involved in the stimulation of the helicase activity of MCM8-MCM9 probably by altering its conformation. During homologous recombination, HROB acts by recruiting the MCM8-MCM9 helicase complex to sites of DNA damage to promote DNA repair synthesis.
