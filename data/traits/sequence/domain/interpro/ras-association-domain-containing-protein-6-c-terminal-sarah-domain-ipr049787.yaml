identifier: InterPro:IPR049787
label: "Ras-association domain-containing protein 6, C-terminal SARAH domain"
definition: >-
  This entry represents the C-terminal SARAH (Salvador-RassF-Hippo) domain found in human Ras-association domain-containing protein 6 (RASSF6) and similar sequences from vertebrates. RASSF6 is one of six related proteins, the classical RASSF proteins (RASSF1-6), that contain a conserved RalGDS/AF6 Ras association (RA) domain located towards the C terminus. It acts as a tumour suppressor protein involved in the induction of apoptosis, through both caspase-dependent and caspase-independent pathways. RASSF6 may function as a Ras effector protein. It is ubiquitinated and degraded by interacting with MDM2 to stabilise p53, and it regulates apoptosis and the cell cycle. RASSF6 is expressed as four transcripts via alternative splicing. All transcript variants of RASSF6 contain the RA and SARAH domains. SARAH domains mediate protein-protein interactions crucial in the pathways that induce cell cycle arrest and apoptosis.
