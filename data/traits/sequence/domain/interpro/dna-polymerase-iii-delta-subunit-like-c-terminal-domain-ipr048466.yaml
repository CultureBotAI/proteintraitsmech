identifier: InterPro:IPR048466
label: "DNA polymerase III delta subunit-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the delta subunit from the clamp-loader complex of Bacillus subtilis and similar poorly characterised proteins from other bacteria, which is structurally similar to that of the DNApol3 delta subunit from E.coli (represented in ). This domain interacts with other subunits in the complex (tau and delta') and the nature of these interactions appear to be hydrophilic in contrast with the one observed in Gram-negative bacteria.
