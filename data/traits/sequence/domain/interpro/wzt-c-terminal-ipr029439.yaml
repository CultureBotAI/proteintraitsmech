identifier: InterPro:IPR029439
label: "Wzt, C-terminal"
definition: >-
  This domain is found at the C terminus of O-antigen export proteins, such as Wzt. The N-terminal domain of Wzt is a conventional ABC protein, whereas the C-terminal domain of Wzt (C-Wzt) is a unique structural element that determines the specificity of the transporter for either the O8 or O9a O-antigenic polysaccharides (O-PS). The crystal structure of C-Wzt(O9a) reveals a β sandwich with an immunoglobulin-like topology that contains the O-PS binding pocket.
