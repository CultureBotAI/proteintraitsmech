identifier: InterPro:IPR049528
label: "Venom-like beta-defensin domain"
definition: >-
  This entry represents a region of Venom-like beta-defensin from Ornithorhynchus anatinus (platypus). This peptide was found to display potent antimicrobial activity against Staphylococcus aureus and Pseudomonas aeruginosa. Structurally it resembles the beta defensins.
