identifier: InterPro:IPR047310
label: "RNA-dependent RNA polymerase, virgavirus"
definition: >-
  This entry represents the RdRp of RNA viruses belonging to the family Virgaviridae, order Martellivirales. The Virgaviridae is a family of plant viruses with rod-shaped virions, a (+)ssRNA genome with a 3'-terminal tRNA-like structure and a replication protein similar to those of the alpha-like supergroup. This domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in the fidelity of processes such as correct incorporation and reorganization of nucleotides.
