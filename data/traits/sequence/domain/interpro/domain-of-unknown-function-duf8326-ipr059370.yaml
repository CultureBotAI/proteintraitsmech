identifier: InterPro:IPR059370
label: "Domain of unknown function DUF8326"
definition: >-
  This entry represents a domain of unknown function in putative Ig-domain-containing proteins mainly from animals. This domain contains a Spectrin fold with a conserved three-helix bundle structure that is typically arranged in tandem repeats. These repeats confer mechanical flexibility and structural resilience, allowing the proteins to maintain cell shape and organisation. Spectrin-repeat proteins form elongated scaffolds beneath the plasma membrane and contribute to cytoskeletal integrity and membrane stability.
