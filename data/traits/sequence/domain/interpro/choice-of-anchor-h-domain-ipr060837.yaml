identifier: InterPro:IPR060837
label: "Choice-of-anchor H domain"
definition: >-
  This entry represents the choice-of-anchor H domain. This domain is observed, in from one to four copies, in proteobacterial proteins with a C-terminal protein sorting signal, GlyGly-CTERM, that directs processing by rhombosortase, transport by a type II secretion system (T2SS), and (most likely) covalent attachment to the outer membrane. The domain is also observed occasionally, in up to 13 tandem copies, in proteins sorted and processed instead by a type IX secretion system (T9SS), which also implies transpeptidation and covalent attachment on the cell surface. One member of this entry, Sden_1266 , is toxic if expressed as a transgene in Escherichia coli, as might be expected given the lack of the required processing machinery in that species.
