identifier: InterPro:IPR007890
label: CHASE2
definition: >-
  CHASE2 is an extracellular sensory domain, which is present in various classes of transmembrane receptors that are upstream of signal transduction pathways in bacteria. Specifically, CHASE2 domains are found in histidine kinases, adenylate cyclases, serine/threonine kinases and predicted diguanylate cyclases/phosphodiesterases. The environmental factors that are recognised by CHASE2 domains are not currently known.
