identifier: InterPro:IPR063455
label: "OSW2, middle domain"
definition: >-
  This entry represents the middle domain of OSW2 (outer spore wall protein 2), which is involved in spore wall assembly in yeast. OSW2 and localises to the cytoplasm and prospore membrane during meiosis. The protein is involved in a late step of spore wall assembly and is localised around the prospore membrane during meiosis II.
