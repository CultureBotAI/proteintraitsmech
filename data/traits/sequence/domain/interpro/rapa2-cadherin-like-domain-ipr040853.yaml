label: "RapA2, cadherin-like domain"
definition: >-
  This entry represents the cadherin-like domain found in RapA2, a calcium-binding lectin that interacts specifically in a calcium-dependent manner with the acidic exopolysaccharide (EPS) and capsular polysaccharide produced by R.leguminosarum.
