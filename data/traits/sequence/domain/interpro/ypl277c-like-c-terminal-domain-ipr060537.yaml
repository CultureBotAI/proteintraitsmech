identifier: InterPro:IPR060537
label: "YPL277C-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of YPL277C and other proteins found in ascomycetes such as YOR389W. YOR389W is an uncharacterised secreted glycoprotein from Saccharomyces cerevisiae that undergoes extensive N-linked glycosylation. The proteins contain signal peptides for secretion and multiple glycosylation sites distributed throughout the sequence. YOR389W interacts with myosin proteins MYO3 and MYO5, whilst YPL277C interacts with BZZ1. This C-terminal domain contains several N-glycosylation sites. The specific function of this domain remains unknown.
