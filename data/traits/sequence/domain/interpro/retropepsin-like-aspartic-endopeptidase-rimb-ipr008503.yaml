identifier: InterPro:IPR008503
label: "Retropepsin-like aspartic endopeptidase RimB"
definition: >-
  This entry represents a domain found in retropepsin-like bacterial proteases such as RimB from Pseudomonas fluorescens and the related retropepsin-like osmotic stress tolerance peptidases (Rlo) from Pseudomonas aeruginosa. RimB is involved in rhizosphere colonisation and plant infection. It is a bifunctional retropepsin-like aspartic endopeptidase that uniquely recognises and removes glutamate residues from polyglutamated RpsF and stimulates poly-α-L-glutamate synthesis by RimK. While Rlo proteases are homologous to RimB, they contain N-terminal signal peptides and perform distinct biological functions. Mutants lacking all three secreted Rlo peptidases show defects in antibiotic resistance, biofilm formation, and cell morphology. Rlo peptidases have been structurally characterised, showing structural features characteristic of retroviral pepsins. Similar to RimB, RloA proteins cleave substrates that become polyglutamated post-translationally.
