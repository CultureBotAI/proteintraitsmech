identifier: InterPro:IPR058803
label: "Kinetoplastid PH-like domain"
definition: >-
  This entry represents a small family of domains that are found in a group of uncharacterised kinetoplastid proteins. This domain adopts a PH-like domain fold. It is found in proteins that have an N- and C-terminal (this entry) PH-like domains separated by a non-globular linker. This domain is often found in combination with .
