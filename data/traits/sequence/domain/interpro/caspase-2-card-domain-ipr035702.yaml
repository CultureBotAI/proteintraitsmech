identifier: InterPro:IPR035702
label: "Caspase-2, CARD domain"
definition: >-
  Caspase-2 (CASP2) is involved in the activation cascade of caspases responsible for apoptosis execution. Many cytoplasmic proteins have been identified as substrates for caspase-2. One of these proteins is Bid, which is inactivated by caspase-2 and the serine endopeptidase granzyme B, and which ultimately leads to the release of cytochrome C from the mitochondrion and activation of the executor caspases by caspase-9. This entry represents the Caspase activation and recruitment domain (CARD) of CASP2. It is predicted to consist of six antiparallel α-helices, showing a death domain fold.
