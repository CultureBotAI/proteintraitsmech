identifier: InterPro:IPR047518
label: "Forkhead box protein Q1, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXQ1 and similar sequences mainly found in vertebrates. The FH domain is a winged helix DNA-binding domain. Forkhead box protein Q1 (FOXQ1), also called HNF-3/Forkhead-like protein 1 (HFH-1), or hepatocyte nuclear factor 3 Forkhead homolog 1, plays a role in hair follicle differentiation. It has also been reported to promote epithelial differentiation, inhibit smooth muscle differentiation, activate T cells and autoimmunity, and control mucin gene expression and granule content in stomach surface mucous cells. FOXQ1 is significantly associated with the pathogenesis of various tumour types including gastric, breast, colorectal, pancreatic, bladder and ovarian cancer, and glioma.
