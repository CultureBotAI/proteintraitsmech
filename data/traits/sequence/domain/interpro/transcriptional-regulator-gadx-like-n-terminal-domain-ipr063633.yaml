identifier: InterPro:IPR063633
label: "Transcriptional regulator GadX-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of GadX and related AraC-type transcriptional regulators. It precedes the C-terminal HTH DNA-binding domain. GadX positively regulates the expression of approximately fifteen genes involved in acid resistance, including gadA, gadB and gadC, which encode components of the glutamate-dependent acid resistance system. Depending on growth conditions, GadX can also repress gadW. GadX functions as a homodimer and its expression is activated by RpoS and repressed by CRP, H-NS and GadW. The entry is found in Enterobacterales, including Escherichia, Samonella and Shigella. The specific function of this N-terminal domain remains to be determined.
