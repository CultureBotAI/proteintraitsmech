identifier: InterPro:IPR015042
label: "BPS (Between PH and SH2) domain"
definition: >-
  The BPS (Between PH and SH2) domain, comprised of 2 β strands and a C-terminal helix, is an approximately 45 residue region found in the adaptor proteins Grb7/10/14 that mediates inhibition of the tyrosine kinase domain of the insulin receptor by binding of the N-terminal portion of the BPS domain to the substrate peptide groove of the kinase, acting as a pseudosubstrate inhibitor.
