identifier: InterPro:IPR024680
label: "Ribulose-1,5-bisphosphate carboxylase small subunit, N-terminal"
definition: >-
  This domain is found in the N-terminal region of the small subunit of ribulose-1,5-bisphosphate in plants. It contains a conserved APF sequence motif. There are also two completely conserved residues (L and P) that may be functionally important.
