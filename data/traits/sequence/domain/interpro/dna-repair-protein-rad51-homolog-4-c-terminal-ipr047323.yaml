identifier: InterPro:IPR047323
label: "DNA repair protein RAD51 homolog 4, C-terminal"
definition: >-
  This entry represents the C-terminal region of Rad51D and similar eukaryotic proteins. DNA repair protein RAD51 homolog 4 (RAD51D), a RAD51 paralogue, plays an important role in DNA repair by homologous recombination (HR). HR is an important error-free repair mechanism for chromosomal double-strand break (DSB) which otherwise leads to cell cycle arrest and death. RAD51D, together with the other RAD51 paralogues, RAD51B, RAD51C, XRCC3, and XRCC2, helps recruiting RAD51 to the break site.
