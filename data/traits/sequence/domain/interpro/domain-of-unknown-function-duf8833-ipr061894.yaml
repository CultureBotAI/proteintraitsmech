identifier: InterPro:IPR061894
label: "Domain of unknown function DUF8833"
definition: >-
  This entry represents a domain of approximately 60 amino acids found at the N-terminal of 20.7 kDa protein in NOF-FB from Drosophila melanogaster and as tandem arrays of 10-11 copies in other members of this entry, from insects. The function of this domain remains to be determined.
