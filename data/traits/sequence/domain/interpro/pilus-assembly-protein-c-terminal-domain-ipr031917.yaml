identifier: InterPro:IPR031917
label: "Pilus assembly protein, C-terminal domain"
definition: >-
  This is a highly conserved C-terminal domain on fimbrial outer membrane usher proteins like TcfC or CooC or PapC. CooC is required for CS1 pilus formation.
