identifier: InterPro:IPR004501
label: Phosphotransferase system, EIIC component, type 3
definition: >-
  The phosphoenolpyruvate-dependent sugar phosphotransferase system (PTS) is a major carbohydrate transport system in bacteria. The PTS catalyzes the phosphorylation of incoming sugar substrates concomitant with their translocation across the cell membrane. The general mechanism of the PTS is the following: a phosphoryl group from phosphoenolpyruvate (PEP) is transferred to enzyme I (EI) of PTS which in turn transfers it to a phosphoryl carrier protein (HPr). Phospho-HPr then transfers the phosphoryl group to a sugar-specific permease which consists of at least three structurally distinct domains (IIA, IIB, and IIC), which can either be fused together in a single polypeptide chain or exist as two or three interactive chains, formerly called enzymes II (EII) and III (EIII). The first domain (IIA), carries the first permease-specific phosphorylation site, an histidine which is phosphorylated by phospho-HPr. The second domain (IIB) is phosphorylated by phospho-IIA on a cysteinyl or histidyl residue, depending on the sugar transported. Finally, the phosphoryl group is transferred from the IIB domain to the sugar substrate concomitantly with the sugar uptake processed by the IIC domain. The IIC domain forms the translocation channel and the specific substrate-binding site. An additional transmembrane domain IID, homologous to IIC, can be found in some PTSs, e.g. for mannose. According to sequence analyses, the PTS EIIC domain can be divided in five groups. The PTS EIIC type 1 domain is found in the Glucose class of PTS and has an average length of about 80 amino acids. The PTS EIIC type 2 domain is found in the Mannitol class of PTS and has an average length of about 90 amino acids. The PTS EIIC type 3 domain is found in the Lactose class of PTS and has an average length of a…
