identifier: InterPro:IPR034150
label: "SF3B6, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of SF3B14 (p14), also known as splicing factor 3B subunit 6 (SF3B6), which is part of the SF3B complex that is an integral part of the U2 small nuclear ribonucleoprotein (snRNP) and the U11/U12 di-snRNP. SF3B14 associates directly with another SF3B subunit called SF3B155. SF3B14 can be cross-linked to the branch-point adenosine of pre-mRNA introns within the spliceosome.
