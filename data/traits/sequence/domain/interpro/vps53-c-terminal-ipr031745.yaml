identifier: InterPro:IPR031745
label: "Vps53, C-terminal"
definition: >-
  This entry represents the C-terminal domain of fungal vacuolar protein sorting-associated protein 53 (Vps53), a component of the Golgi-associated retrograde complex (GARP). Budding yeast Vps53 is involved in retrograde transport from early and late endosomes to late Golgi by linking the vesicle through the t-SNARE Tgl1 to the Golgi, leading to the membrane fusion between late Golgi and endosomal vesicles. This domain has a fold consisting of an α-helical bundle known as the CATCHR fold (complexes associated with tethering containing helical rods) which is shared by proteins of other tethering complexes, namely exocyst, COG and Dsl1.
