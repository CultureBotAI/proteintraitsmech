identifier: InterPro:IPR012887
label: GDP-fucose pyrophosphorylase domain
definition: >-
  This entry represents the fucose pyrophosphorylase domain found at the N-terminal of the bifunctional L-Fucokinase/GDP-Fucose Pyrophosphorylase (FKP) enzymes such as FKGP from Arabidopsis and L-fucose kinase from animals. In fucose-1-phosphate guanylyltransferase from human, this is the main domain of the protein, which catalyses the formation of GDP-L-fucose from GTP and L-fucose-1-phosphate and functions as a salvage pathway to reutilise L-fucose arising from the turnover of glycoproteins and glycolipids. In the salvage pathway, cells use fucose from the extracellular or lysosomal sources to synthesise GDP-fucose. First, the fucokinase catalyses the formation of fucose-1-phosphate from fucose, with ATP consumption and then, the GDP-fucose pyrophosphorylase (GFPP) uses fucose-1-phosphate and GTP to synthesise GDP-fucose. I some members, the two independent catalytic reactions in the salvage pathway can be accomplished by a single enzyme, the fucokinase/GDP-fucose pyrophosphorylase (FKP). The structure of the bifunctional enzyme from Bacteroides fragilis have been determined.
