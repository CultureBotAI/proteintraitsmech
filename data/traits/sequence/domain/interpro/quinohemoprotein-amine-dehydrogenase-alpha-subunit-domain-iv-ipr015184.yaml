identifier: InterPro:IPR015184
label: "Quinohemoprotein amine dehydrogenase, alpha subunit domain IV"
definition: >-
  Members of this entry, which are predominantly found in the prokaryotic protein quinohemoprotein amine dehydrogenase, adopt an immunoglobulin-like β-sandwich fold, with seven strands arranged into two β sheets; the fold is possibly related to the immunoglobulin and/or fibronectin type III superfamilies. The precise function of this domain has not, as yet, been defined.
