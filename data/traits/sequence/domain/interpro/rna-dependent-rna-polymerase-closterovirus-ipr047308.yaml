identifier: InterPro:IPR047308
label: "RNA-dependent RNA polymerase, closterovirus"
definition: >-
  This entry represents the catalytic domain RdRp of the RNA-directed RNA polymerase (RdRp) of RNA viruses belonging to the family Closteroviridae, order Martellivirales, which is cleaved from Replicase polyprotein 1ab. Viruses in the family Closteroviridae have a mono-, bi- or tripartite (+)ssRNA genome of 13-19 kb, and non-enveloped, filamentous particles 650-2200 nm long and 12 nm in diameter. They infect plants, mainly dicots, many of which are fruit crops. Members of the family are classified into four genera: Ampelovirus, Closterovirus, Crinivirus and Velarivirus. Their genetic diversity is primarily influenced by strong negative selection and recombination. Closteroviridae viruses are mostly phloem-restricted and induce specific cytoplasmic aggregates of virus particles intermingled with membranous vesicles derived from the endoplasmic reticulum and possibly mitochondria. Their transmission is by aphids, whiteflies, pseudococcid mealybugs or soft scale insects in a semi-persistent manner. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. It contains conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in the fidelity of processes such as correct incorporation and reorganization of nucleotides.
