identifier: InterPro:IPR047523
label: "Crossover junction endonuclease EME2, XPF-like nuclease domain"
definition: >-
  This entry represents the XPF-like nuclease domain of Crossover junction endonuclease EME2 and similar proteins from vertebrates. This domain is a nuclease-like domain which is involved in targeting the MUS81-EME2 heterodimer complex to DNA. Crossover junction endonuclease EME2 interacts with MUS81 to form a DNA structure-specific endonuclease which cleaves substrates such as 3'-flap structures. MUS81-EME2 is responsible for fork cleavage and restart in human cells. The MUS81-EME2 protein, whose actions are restricted to S phase, is also responsible for telomere maintenance in telomerase-negative ALT (Alternative Lengthening of Telomeres) cells.
