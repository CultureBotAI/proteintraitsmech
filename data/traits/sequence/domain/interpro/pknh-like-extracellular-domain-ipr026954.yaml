identifier: InterPro:IPR026954
label: "PknH-like extracellular domain"
definition: >-
  This entry represents the C-terminal extracellular sensor domain of a group of protein kinases found mainly in Mycobacteria, such as PknH. The PknH sensor domain contains six α helices and seven anti-parallel β strands. It is also found in isolation in numerous proteins, for example the lipoproteins lpqQ, lppH and lpqA from Mycobacterium tuberculosis. It contains two completely conserved C residues that are likely to form a disulphide bond. A second pair of cysteines are less well conserved and probably form a second disulphide bond. It seems likely that this domain functions to bind some as yet unknown ligand.
