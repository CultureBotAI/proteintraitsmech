identifier: InterPro:IPR063060
label: "GUX1-5, N-terminal domain"
definition: >-
  The GUX (Glucuronic acid substitution of Xylan) family comprises Golgi-localized glycosyltransferases belonging to the GT8 family that catalyse the addition of glucuronic acid (GlcA) side chains onto xylan backbones in plant cell walls. These enzymes are essential for the synthesis of glucuronoxylan, the major hemicellulose component in dicot secondary cell walls. These proteins have a single-pass membrane anchor at very N-terminal end, before this domain. Some GUX family members (GUX3, GUX5) lack detectable catalytic activity despite high sequence similarity to active members and may function as non-catalytic subunits in multi-protein xylan synthase complexes. This entry represents the N-terminal domain.
