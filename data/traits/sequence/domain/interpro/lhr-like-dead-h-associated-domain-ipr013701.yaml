identifier: InterPro:IPR013701
label: Lhr-like, DEAD/H associated domain
definition: >-
  This domain is found in Lhr DEAD-box RNA helicase and ATP-dependent helicases. This domain is associated with and. It can be found C-terminal in some Lhr proteins. Lhr is a DNA helicase that translocates in a 3'-to-5' direction on single-stranded DNA and is likely involved in DNA repair. It is most active on three- or four-stranded forked DNA structures, while flayed substrates and Holliday junctions are unwound with slightly less efficiency. Lhr can also unwind 3'-tailed duplexes, including RNA:DNA hybrids and double-stranded DNA with a 3'-single-stranded DNA overhang. However, it does not act on blunt-ended double-stranded DNA, and its activity on substrates with a 3'-single-stranded RNA tail, such as DNA:RNA or RNA:RNA, has not been tested. Lhr is probably involved in replication-coupled DNA repair, where it remodels forked DNA to generate single-stranded regions for ATP-dependent translocation.
