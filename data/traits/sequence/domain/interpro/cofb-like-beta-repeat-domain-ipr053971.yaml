identifier: InterPro:IPR053971
label: "CofB-like, beta-repeat domain"
definition: >-
  CofB is a minor pilin involved in type IV pili assembly. It consists of a pilin domain at the N-terminal ( ), followed by a β-repeat hinge-like domain and a C-terminal β-sheet-rich lectin domain. This entry represents the central β-repeat domain which has two three-stranded anti-parallel β-sheets.
