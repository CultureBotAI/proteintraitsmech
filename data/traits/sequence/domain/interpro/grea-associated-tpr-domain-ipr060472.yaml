identifier: InterPro:IPR060472
label: "GreA-associated, TPR domain"
definition: >-
  This entry represents a TPR domain at the C-terminal in Putative GreA-associated domains protein and at the central region in Transcription elongation factor GreA and related GreA-associated domains (GRAD) proteins. This domain is found primarily in spirochaetes, particularly Treponema species. The specific function of this domain remains to be determined.
