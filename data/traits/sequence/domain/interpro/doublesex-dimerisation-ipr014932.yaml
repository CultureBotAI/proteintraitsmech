identifier: InterPro:IPR014932
label: "Doublesex dimerisation"
definition: >-
  Doublesex (DSX) is a transcription factor that regulates somatic sexual differences in Drosophila. The structure has revealed a novel dimeric arrangement of ubiquitin-associated folds that has not previously been identified in a transcription factor.
