identifier: InterPro:IPR056666
label: "DISARM protein DrmE, C-terminal"
definition: >-
  This domain is found at the C-terminal end of DISARM protein DrmE from Bacillus paralicheniformis and similar uncharacterised prokaryotic proteins. DrmE is a component of antiviral defense system DISARM (defense island system associated with restriction-modification), composed of DrmE, DrmA, DrmB, DrmC and DrmMII. DISARM is probably a multi-gene restriction module, but DrmE has an unknown function. Expression of DISARM in B.subtilis (strain BEST7003) confers resistance to phages Nf, phi29, phi105, phi3T, SPO1, SPR and SPP1. DISARM does not interfere with phage adsorption, but instead interferes with (phi3T) DNA replication early in its cycle, preventing replication, circularization and lysogeny and probably causes phage DNA degradation.
