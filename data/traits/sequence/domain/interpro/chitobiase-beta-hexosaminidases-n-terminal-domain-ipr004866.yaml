identifier: InterPro:IPR004866
label: "Chitobiase/beta-hexosaminidases, N-terminal domain"
definition: >-
  This domain is found in the N terminus of chitobiases and beta-hexosaminidases. It is composed of a β sandwich structure that is similar in structure to the cellulose binding domain of cellulase from Cellulomonas fimi, suggesting that it may function as a carbohydrate-binding domain.
