identifier: InterPro:IPR034808
label: "Nop4, RNA recognition motif 3"
definition: >-
  This entry represents the RNA recognition motif 3 (RRM3) of Nop4 from fungi. Nop4 is an essential nucleolar protein involved in processing and maturation of 27S pre-rRNA and biogenesis of 60S ribosomal subunits. Nop4 has four RNA recognition motifs (RRMs).
