identifier: InterPro:IPR056392
label: "Diacylglycerol kinase theta, RNA-binding domain"
definition: >-
  This domain is found in human Diacylglycerol kinase theta (DGKtheta) and similar metazoan proteins. This domain is found between and and is predicted to adopt an RNA-binding domain (RBD)-like fold. DGKtheta converts diacylglycerol/DAG into phosphatidic acid/phosphatidate/PA and regulates the respective levels of these two bioactive lipids. DGK-theta has been shown to be the isoform responsive to alpha-thrombin stimulation that leads to the production of two lipid second messengers in the nucleus. DGKtheta has also been shown to activate the transcription of the cAMP-dependent CYP17 gene in the human adrenal cortex.
