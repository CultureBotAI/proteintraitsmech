identifier: InterPro:IPR056784
label: "DNA replication complex GINS protein PSF2, N-terminal domain"
definition: >-
  This domain is found N-terminal in the human DNA replication complex GINS protein PSF2 and related eukaryotic proteins. PSF2 is an essential component of of the GINS complex, which plays an essential role in the initiation of DNA replication, and progression of DNA replication forks.
