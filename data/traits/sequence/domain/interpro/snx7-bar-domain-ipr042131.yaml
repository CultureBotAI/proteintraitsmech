identifier: InterPro:IPR042131
label: "SNX7, BAR domain"
definition: >-
  Sorting nexin-7 (SNX7) belongs to the sorting nexin family, which contains a conserved PX (phox homology) domain that is responsible for binding to specific phosphoinositides. It may be involved in several stages of intracellular trafficking. This entry represents the BAR domain found in sorting nexin-7. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions.
