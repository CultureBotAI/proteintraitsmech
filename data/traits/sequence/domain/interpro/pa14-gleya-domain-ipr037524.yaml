identifier: InterPro:IPR037524
label: "PA14/GLEYA domain"
definition: >-
  The ~150-amino acid PA14 domain, named after its location in the protective antigen of anthrax toxin, is found in a variety of bacterial and eukaryotic proteins such as glycosidases, glycosyltransferases, proteases, amidases, toxins, adhesins and signaling molecules. The PA14 domain is combined in a mosaic manner with various catalytic or non-catalytic domains directly or indirectly implicated in binding carbohydrate or peptidoglycan. It could be a carbohydrate-binding module. The PA14 domain is a β-barrel structure comprising two β-sheets. The N and C termini of the domain are close together in space, presumably, thereby facilitating the insertion of the PA14 domain into other recognized domains without structural disruption. This entry also recognizes the related GLEYA domain, which is a carbohydrate-binding domain found in fungal adhesins (also referred to as agglutinins or flocculins).
