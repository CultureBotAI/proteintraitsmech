identifier: InterPro:IPR062178
label: "Phytosulfokines 1 precursor"
definition: >-
  This entry represents phytosulfokine 1 (PSK1) precursor proteins found predominantly in grasses, particularly in the Poaceae including Oryza and Triticum species. The precursor undergoes proteolytic processing to generate two bioactive sulphated peptides: phytosulfokine-alpha (5 amino acids) and phytosulfokine-beta (4 amino acids). These peptides function as plant growth factors that promote cell differentiation, organogenesis, somatic embryogenesis and cell proliferation. The sulphation of tyrosine residues is essential for biological activity and receptor binding. PSK1 is secreted and expressed throughout seedlings, with higher levels in proliferating tissues such as shoot and root apexes.
