identifier: InterPro:IPR059179
label: "MLKL-like, MCAfunc domain"
definition: >-
  This entry represents the MCAfunc domain and the N-terminal domain in MLKL. This domain contains a four-helix bundle with an additional helix at the top, which is likely key for MLKL function. It binds directly to phospholipids and induces membrane permeabilisation. MCAfunc domain (MCAfunc) is located in the N-terminal region of a mechanosensitive channel protein MID1-COMPLEMENTING ACTIVITY (MCA). MCAfunc represents the provisionally advocated ARPK domain (Amino-terminal domain of Rice putative Protein Kinases), overlapping with the EF hand-like region at the N-terminal. In MCA proteins, MCAfunc has Ca2 influx activity and is proposed to be a functional domain of MCAs. MCAfunc is exclusively observed in streptophytes and exists not only in MCA but also in E3 ubiquitin ligase-like proteins, ARO3-like proteins and and protein kinases. In the most basal plant lineage, charophytes, MCAfunc is only found in E3 ubiquitin ligase-like proteins and protein of presently unknown function, while MCA proteins are exclusively found in land plants, from bryophytes to angiosperms. Mixed lineage kinase domain-like protein (MLKL) is a pseudokinase that does not have protein kinase activity and plays a key role in tumor necrosis factor (TNF)-induced necroptosis, a programmed cell death process.
