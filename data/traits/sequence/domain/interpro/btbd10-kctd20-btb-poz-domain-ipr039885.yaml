identifier: InterPro:IPR039885
label: "BTBD10/KCTD20, BTB/POZ domain"
definition: >-
  This entry represents the BTB/POZ domain found in BTBD10 and KCTD20 proteins. BTBD10 acts as an activator of AKT family members by inhibiting PPP2CA-mediated dephosphorylation, thereby keeping AKTs activated. KCTD20 is also a positive regulator of Akt.
