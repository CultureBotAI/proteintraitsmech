identifier: InterPro:IPR063323
label: "Regulatory protein ViaA, N-terminal"
definition: >-
  This entry represents the N-terminal domain of regulatory protein ViaA from Gammaproteobacteria. ViaA is a cofactor of the AAA+ ATPase RavA, forming the RavA-ViaA chaperone-like complex. ViaA stimulates the ATPase activity of RavA and together they interact with respiratory chain components including NADH:ubiquinone oxidoreductase I (Complex I) and fumarate reductase. The RavA-ViaA complex modulates aminoglycoside sensitivity through interactions with the inner membrane. This N-terminal domain is followed by a von Willebrand factor type A domain ( ). The specific function of this domain remains to be determined.
