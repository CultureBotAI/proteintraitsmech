identifier: InterPro:IPR054725
label: "Minor extracellular protease Epr, GA-like domain"
definition: >-
  This entry represents a small domain found in bacterial cell surface proteins such as the minor extracellular protease Epr from Bacillus subtilis. It adopts a three helical bundle structure and is often found in several tandem copies. This domain was identified in potential periscope proteins. Epr is a serine protease involved in the production of the competence and sporulation stimulating factor CSF but not essential for growth or sporulation. In addition, is essential for swarming motility.
