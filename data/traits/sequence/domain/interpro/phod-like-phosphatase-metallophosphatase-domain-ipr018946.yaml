identifier: InterPro:IPR018946
label: "PhoD-like phosphatase, metallophosphatase domain"
definition: >-
  Alkaline phosphatase D (PhoD) catalyses the reaction: phosphate monoester + H(2)O = an alcohol + phosphate. PhoD is similar to Ca(2+)-dependent phospholipase D, which catalyses the hydrolysis of the ester bond between the phosphatidic acid and alcohol moieties of phospholipids. PhoD (also known as alkaline phosphatase D/APaseD in Bacillus subtilis) is a secreted phosphodiesterase encoded by phoD of the Pho regulon in Bacillus subtilis. PhoD homologs are found in prokaryotes, eukaryotes, and archaea. PhoD contains a twin arginine (RR) motif and is transported by the Tat (Twin-arginine translocation) translocation pathway machinery (TatAyCy). Proteins containing this domain also includes the Fusarium oxysporum Fso1 protein.
