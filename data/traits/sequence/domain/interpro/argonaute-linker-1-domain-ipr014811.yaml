identifier: InterPro:IPR014811
label: "Argonaute, linker 1 domain"
definition: >-
  ArgoL1 is a region found in argonaute proteins. It normally co-occurs with BAG domain ( ) and Piwi domain ( ). It is a linker region between the N-terminal and the PAZ domains. It contains an α-helix packed against a three-stranded antiparallel β-sheet with two long β-strands (β8 and β9) of the sheet spanning one face of the adjacent N and PAZ domains. L1 together with linker 2, L2, PAZ and ArgoN forms a compact global fold.
