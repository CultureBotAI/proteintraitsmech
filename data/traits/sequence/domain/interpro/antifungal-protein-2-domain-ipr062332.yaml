identifier: InterPro:IPR062332
label: "Antifungal protein 2 domain"
definition: >-
  This entry represents cysteine-rich antifungal proteins found in fungi, exemplified by NFAP2 from Neosartorya fischeri. These small secreted proteins are highly effective against yeasts, particularly Candida species including multidrug-resistant Candida auris. The proteins contain three disulfide bonds and a characteristic gamma-core motif essential for biological activity. NFAP2 functions through pore formation in fungal cell membranes rather than metabolic disruption or apoptosis induction. The lipid-binding region contains a conserved CPNNC motif critical for membrane insertion. These proteins show potential as therapeutic agents with low resistance development in target organisms and applications in both clinical antifungal treatment and agricultural crop protection.
