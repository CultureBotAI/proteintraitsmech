identifier: InterPro:IPR059737
label: MJ0788
definition: >-
  This entry represents MJ0788 and related small uncharacterised proteins found exclusively in methanogenic archaea. The family is found across various methanogenic lineages including Methanobacteriaceae, Methanobrevibacter, Methanobacterium, Methanomicrobiaceae, and Methanocaldococcaceae. The proteins are approximately 79 amino acids in length. The function of this protein family remains to be determined.
