identifier: InterPro:IPR059948
label: "Probable transporter, C-terminal domain"
definition: >-
  This entry represents an C-terminal transmembrane helices of a Probable transporter found in uncharacterised bacterial proteins. This domain is usually found in combination with a probable periplasmic core domain similar to the domain of MacB ABC transporter proteins.
