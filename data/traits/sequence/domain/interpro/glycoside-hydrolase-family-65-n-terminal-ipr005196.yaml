identifier: InterPro:IPR005196
label: Glycoside hydrolase, family 65, N-terminal
definition: >-
  This entry represents the N-terminal domain of the glycoside hydrolase family 65 proteins. The family of glycosyl hydrolases ( ) containing this domain includes vacuolar acid trehalase and maltose phosphorylase. Maltose phosphorylase (MP) is a dimeric enzyme that catalyses the conversion of maltose and inorganic phosphate into beta-D-glucose-1-phosphate and glucose. This domain is believed to be essential for catalytic activity although its precise function remains unknown. O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website.
