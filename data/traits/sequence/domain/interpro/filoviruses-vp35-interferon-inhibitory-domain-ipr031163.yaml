identifier: InterPro:IPR031163
label: "Filoviruses VP35 interferon inhibitory domain"
definition: >-
  The Filoviridae family of viruses, which includes marburgvirus (MARV) and ebolavirus (EBOV), can cause intermittent outbreaks that often result in high fatality rates. The family consists of five species of EBOV, Zaire, Reston, Sudan, Tai Forest, and Bundibugyo; one species of MARV; and a proposed genus Cuevavirus possessing a single species Lloviu cuevavirus. MARV and EBOV share a common genome organisation but show important differences in replication complex formation, cell entry, host tropism, transcriptional regulation, and immune evasion. Filoviruses counteract innate immunity through the multifunctional viral protein (VP) 35 proteins, which perform critical roles in viral RNA synthesis, virus assembly, and virus structure. VP35 contains an N-terminal coiled-coil domain required for its oligomerisation and a C-terminal interferon (IFN) inhibitory domain (IID). Mutations within the VP35 IID result in loss of host immune suppression. The N terminus provides a critical oligomerisation function, which facilitates efficient IFN inhibition through elements located at the C terminus of VP35. The VP35 IID can also bind dsRNA and VP35-mediated IFN antagonism correlates with dsRNA-binding activity. This entry represents the C-terminal interferon inhibitory (IID) domain of VP35, also known as RNA-binding domain (RBD) IID is made of a stretch of about 120 residues that folds independently. The VP35 IID structure is organised into 2 subdomains: an N- terminal α-helical subdomain and a C-terminal β-sheet subdomain. The α-helical subdomain consists of a four helix bundle, while the β-sheet subdomain is formed by four antiparallel β-strands as well as an α-helix and a type II polyproline helix. The VP35 IID structure contains 2 basic patches that are highly conserved among membe…
