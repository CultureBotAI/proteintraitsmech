identifier: InterPro:IPR040973
label: "Inactive serine protease scarface, clip-domain"
definition: >-
  The clip domain is a structural/regulatory unit in many arthropod serine proteases. The clip domain superfamily also includes serine protease homologues (SPHs). This entry describes clip domains in the SPHs (CLIP subfamily A), which belong to group-3. SPHs usually carry between 1 to 5 clip domains. The most prominent family member of carrying this clip domain is Scarface proteins in drosophila, which bear an inactive catalytic site, representing a subgroup of serine protease homologues (SPH). Loss-of-function induces defects in JNK-controlled morphogenetic events such as embryonic dorsal closure and adult male terminalia rotation.
