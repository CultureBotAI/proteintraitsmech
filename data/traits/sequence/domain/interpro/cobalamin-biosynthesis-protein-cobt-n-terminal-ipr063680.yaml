identifier: InterPro:IPR063680
label: "Cobalamin biosynthesis protein CobT, N-terminal"
definition: >-
  This entry represents the N-terminal domain of a family consisting of several bacterial cobalamin biosynthesis (CobT) proteins. CobT is involved in the transformation of precorrin-3 into cobyrinic acid.
