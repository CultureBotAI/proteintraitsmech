identifier: InterPro:IPR006947
label: Alliinase, EGF-like domain
definition: >-
  Allicin is a thiosulphinate that gives rise to dithiines, allyl sulphides and ajoenes, the three groups of active compounds in Allium species. Allicin is synthesised from sulphoxide cysteine derivatives by alliinase, whose C-S lyase activity cleaves C(beta)-S(gamma) bonds. It is thought that this enzyme forms part of a primitive plant defence system. This entry represents the N-terminal EGF-like domain.
