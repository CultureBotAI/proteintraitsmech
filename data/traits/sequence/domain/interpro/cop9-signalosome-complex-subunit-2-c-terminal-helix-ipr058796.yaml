identifier: InterPro:IPR058796
label: "COP9 signalosome complex subunit 2, C-terminal helix"
definition: >-
  This short domain is found at the C-terminal end of human COP9 signalosome complex subunit 2 (COPS2) and similar eukaryotic proteins. COPS2 is an essential component of the COP9 signalosome complex, an essential regulator of the ubiquitin conjugation pathway that is involved in phosphorylation of p53/TP53, c-jun/JUN, IkappaBalpha/NFKBIA, ITPK1 and IRF8/ICSBP as well as in the early stage of neuronal differentiation via its interaction with NIF3L1. This domain folds into an α-helix. This domain seems not to be present in all other fungal orthologues.
