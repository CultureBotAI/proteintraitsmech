identifier: InterPro:IPR035850
label: "Tyrosine-protein kinase Lck, SH2 domain"
definition: >-
  Lck is a member of the Src non-receptor type tyrosine kinase family of proteins. CD4 and CD8 directly couple with Lck, and cross-linking of these receptors leads to Lck activation. The Src non-receptor type tyrosine kinase (SFK) family members have an unique N-terminal domain, an SH3 domain, an SH2 domain, a kinase domain and a regulatory tail. The SH2 domain of SFKs is involved in kinase autoinhibition and T-cell receptor signaling. The binding SH2 domains to phosphotyrosine (pY) sites is critical for the autoinhibition and substrate recognition of the SFKs.
