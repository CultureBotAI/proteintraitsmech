identifier: InterPro:IPR056783
label: "DNA replication complex GINS protein PSF1, C-terminal domain"
definition: >-
  This domain is found C-terminal in the human DNA replication complex GINS protein PSF1 and related proteins. PSF1 is required for correct functioning of the GINS complex, a complex that plays an essential role in the initiation of DNA replication, and progression of DNA replication forks.
