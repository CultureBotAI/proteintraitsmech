identifier: InterPro:IPR063825
label: "RNA polymerase-associated, N-terminal"
definition: >-
  This entry represents a conserved domain found primarily at the N-terminal region of predicted RNA polymerases. The domain is also found at the C-terminal region in some proteins, such as the uncharacterised 33.9 kDa protein from the mitochondrial linear 2.3 KB plasmid of maize ( ). Proteins containing this domain are frequently found in association with RNA polymerase domains ( ). The domain is approximately 160-180 amino acids in length and is found across plant species, particularly in mitochondrial and plasmid-encoded proteins. The specific function of this domain remains to be determined.
