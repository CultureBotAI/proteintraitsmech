identifier: InterPro:IPR037430
label: Sorting nexin-4, BAR domain
definition: >-
  SNX4 is involved in recycling traffic from the sorting endosome (post-Golgi endosome) back to the late Golgi. It shows a similar domain architecture as SNX1-2, among others, containing a Bin/Amphiphysin/Rvs (BAR) domain, which detects membrane curvature, C-terminal to the PX domain. SNX4 is implicated in the regulation of plasma membrane receptor trafficking and interacts with receptors for EGF, insulin, platelet-derived growth factor and the long form of the leptin receptor. This entry represents the BAR domain of SNX4 from Metazoa. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions.
