identifier: InterPro:IPR060313
label: "TP_0752-like, middle domain"
definition: >-
  This entry represents the middle domain of TP_0752, an uncharacterised protein from Treponema pallidum. TP_0752 is a 380 amino acid precursor protein with a signal peptide and contains a C-terminal SPOR domain ( ) involved in peptidoglycan binding. This domain is found exclusively in Spirochaetales. The specific function of this domain remains to be determined.
