identifier: InterPro:IPR059696
label: "YNQ4, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of YNQ4 proteins. YNQ4 is an uncharacterised protein found in the nqo8 5' region of the gene cluster encoding the energy-transducing NADH-quinone oxidoreductase in Paracoccus denitrificans. The protein is predicted to be a lipoprotein based on the presence of a prokaryotic lipoprotein motif. This domain is found exclusively in Paracoccus species within the Alphaproteobacteria. The specific function of this N-terminal domain remains to be determined.
