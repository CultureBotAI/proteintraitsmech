identifier: InterPro:IPR017454
label: Neuromodulin, C-terminal
definition: >-
  This entry represents the C-teminal domain of neuromodulin. Although its function is uncertain, the N-terminal region is well conserved and contains both a calmodulin binding domain, and sites for acylation, membrane attachment and protein kinase C phosphorylation. Structural predictions suggest that this domain may exist as an extended, negatively-charged rod with some similarity to the side arms of neurofilaments, indicating that the biological role of neuromodulin may depend on its ability to form a dynamic membrane-cytoplasm-calmodulin complex. Neuromodulin (also known as growth-associated protein 43 or GAP-43) is a component of the motile growth cones. It is membrane protein whose expression is widely correlated with successful axon elongation. It is a crucial component of an effective regeneration response in the nervous system. Although its function is uncertain, the N-terminal region is well conserved and contains both a calmodulin binding domain, and sites for acylation, membrane attachment and protein kinase C phosphorylation. Structure predictions suggest that the C-terminal region may exist as an extended, negatively-charged rod with some similarity to the side arms of neurofilaments, indicating that the biological role of neuromodulin may depend on its ability to form a dynamic membrane-cytoplasm-calmodulin complex.
