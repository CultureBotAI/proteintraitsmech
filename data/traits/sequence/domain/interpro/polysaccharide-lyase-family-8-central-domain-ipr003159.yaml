identifier: InterPro:IPR003159
label: Polysaccharide lyase family 8, central domain
definition: >-
  Proteins containing this central domain consist of a group of secreted bacterial lyase enzymes capable of acting on a variety of substrates. One such enzyme is hyaluronate lyase, a Streptococcal surface enzyme that degrades hyaluronan and chondroitin, thereby helping to spread the bacteria throughout host tissues. Hyaluronate lyase ( ) is a four-domain enzyme containing an N-terminal carbohydrate-binding domain, a spacer domain, a catalytic domain, and a C-terminal domain that modulates access to the catalytic cleft of the enzyme. The central domain has a β-sandwich topology, with 18 strands in two sheets. Other bacterial enzymes that display this structure include the central domain of chondroitin AC lyase ( ), the central domain of xanthan lyase ( ), and the third domain of chondroitin ABC lyase ( ). This entry represents these domains of hyaluronate lyase, chondroitin AC lyase, xanthan lyase and chondroitin ABC lyase. This domain if almost always associated with the polysaccharide lyase family 8 C-terminal domain ( ).
