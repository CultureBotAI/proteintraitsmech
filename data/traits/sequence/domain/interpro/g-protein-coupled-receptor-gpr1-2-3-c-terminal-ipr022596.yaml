identifier: InterPro:IPR022596
label: "G protein-coupled receptor GPR1/2/3, C-terminal"
definition: >-
  This domain is found in the yeast G protein-coupled receptor GPR1 and related fungal proteins including GPR2 and GPR3. GPR1 associate with GPA2 and acts as G protein-coupled receptor that senses glucose and controls filamentous growth. GPR1 interacts with glucose and sucrose as agonists, while mannose acts as an antagonist. It forms part of a GPCR system with Gpa2 and Rgs2 for glucose sensing. This entry represents the conserved C-terminal domain. GPR2 and GPR3 from the Nematode-trapping fungus Arthrobotrys oligospora are G protein-coupled receptors that sense nematode ascaroside pheromones and signals via adenylate cyclase to positively regulate trap formation for nematode capture.
