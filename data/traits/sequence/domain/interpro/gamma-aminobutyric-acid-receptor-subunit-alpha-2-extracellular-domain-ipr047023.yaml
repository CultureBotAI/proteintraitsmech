identifier: InterPro:IPR047023
label: "Gamma-aminobutyric acid receptor subunit alpha-2, extracellular domain"
definition: >-
  This entry represents the extracellular domain of Gamma-aminobutyric acid receptor subunit alpha-2 (Gabra-2). This protein has a binding site for benzodiazepines (psychoactive drugs known to reduce anxiety) and is a target for treating behavioural disorders including alcohol dependence, and drug use. It is associated with reward behaviour when it activates the insula, the part of the cerebral cortex responsible for emotions, and with GABAergic modulation of prolactin secretion, This domain, which is located towards the N-terminal of the protein, plays a direct role in interactions between the presynaptic and postsynaptic elements.
