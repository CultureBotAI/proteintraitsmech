identifier: InterPro:IPR057157
label: "Domain of unknown function DUF7835"
definition: >-
  This entry represents a small family of uncharacterised proteins found in Halobacteria. They contain two pairs of conserved cysteines that are likely involved in metal coordination. These proteins are predicted to structurally resemble Zinc beta-ribbon domains.
