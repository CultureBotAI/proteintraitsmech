identifier: InterPro:IPR030411
label: "Nuclear body protein Sp140, bromodomain"
definition: >-
  The function of nuclear protein Sp140 is not known, though it contains several chromatin related modules such as plant homeodomain (PHD), bromodomain (BRD) and SAND domain, which suggests a role in chromatin-mediated regulation of gene expression. It also harbours a nuclear localisation signal and a dimerisation domain (HSR or CARD domain). The PHD finger of Sp140 presents an atypical fold which does not bind to histone H3 tails but binds to peptidylprolyl isomerase Pin1. Pin1 catalyses the isomerisation of a phospho-Threonine-Proline bond in Sp140-PHD and thus may modulate Sp140 function. Human Sp140 is an interferon inducible nuclear leukocyte-specific protein that may be involved in the pathogenesis of acute promyelocytic leukemia and viral infection. It localises to LYSP100-associated nuclear dots and is also a component of the promyelocytic leukemia nuclear body (PML-NBs). The Sp140 locus has been identified as a lymphocytic leukemia (CLL) risk locus. This entry also includes protein Sp140-like (SP140L) which acts as an autoantigen in primary biliary cirrhosis patients.
