identifier: InterPro:IPR033738
label: "Asparagine synthase, N-terminal domain"
definition: >-
  This entry includes the N-terminal domain of asparagine synthase. Asparagine synthetase B catalyses the ATP-dependent conversion of aspartate to asparagine. This enzyme is a homodimer, with each monomer composed of a glutaminase domain and a synthetase domain. The N-terminal glutaminase domain hydrolyzes glutamine to glutamic acid and ammonia.
