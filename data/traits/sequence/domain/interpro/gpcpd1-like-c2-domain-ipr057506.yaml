identifier: InterPro:IPR057506
label: "GPCPD1-like, C2 domain"
definition: >-
  This entry represents the C2 domain in GPCPD1 and related proteins such as GDE1 its orthologue in fungi. C2 domains are protein structural domains involved in targeting proteins to cell membranes, often in a calcium-dependent manner. This domain likely helps localise the phosphodiesterase activity to cellular membranes where their glycerophosphocholine substrates are found. The Glycerophosphocholine phosphodiesterase (GPCPG1) proteins are involved in the hydrolysis of intracellular glycerophosphocholine into glycerol-phosphate and choline. This process is crucial for the synthesis of phosphatidylcholine and the utilisation of glycerophosphocholine as a phosphate source. Some of these proteins may also play a role in the negative regulation of skeletal muscle differentiation, independent of their enzymatic activity. Additionally, certain proteins can utilise glycerophosphoinositol as a substrate.
