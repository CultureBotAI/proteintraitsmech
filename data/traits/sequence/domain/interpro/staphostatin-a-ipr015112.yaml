identifier: InterPro:IPR015112
label: "Staphostatin A"
definition: >-
  The staphostatin A polypeptide chain folds into a slightly deformed, eight-stranded β-barrel, with strands β4 through β8 forming an antiparallel sheet while the N terminus forms a ψ-loop motif. Members of this family constitute a class of cysteine protease inhibitors distinct in the fold and the mechanism of action from any known inhibitors of these enzymes.
