identifier: InterPro:IPR041867
label: "CPPED1, metallophosphatase domain"
definition: >-
  CPPED1 (calcineurin-like phosphoesterase domain-containing 1), also known as CSTP1 (complete S-transactivated protein 1), is a protein with a metallophosphatase domain. CPPED1 is involved in glucose uptake in adipocytes. It is transactivated by the complete S protein of hepatitis B virus.
