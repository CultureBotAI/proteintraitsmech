identifier: InterPro:IPR062663
label: "Uncharacterised protein YHR127W domain"
definition: >-
  This entry represents a domain in YHR127W proteins found in fungi. These proteins contain RRM domains and are involved in mitotic spindle elongation. The proteins localise to the nucleus and have nucleic acid binding activity. The function of this domain remains to be determined.
