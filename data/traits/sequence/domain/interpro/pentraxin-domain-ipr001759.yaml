identifier: InterPro:IPR001759
label: "Pentraxin domain"
definition: >-
  This entry represents the pentraxin (PTX) domain, the C-terminal ~200 aa-long conserved domain of pentraxins (earlier also termed pentaxins). This domain contains an 8 aa-long conserved sequence (HxCxS/TWxS, in which x is any amino acid). This domain covers the whole length of the protein in CRP (C-reactive protein) and SAP (serum amyloid P component protein). This entry also includes adhesion G-protein coupled receptors D2 and G6 from humans. Pentraxins (or pentaxins) are a family of proteins which show, under electron microscopy, a discoid arrangement of five noncovalently bound subunits. Proteins of the pentraxin family are involved in acute immunological responses. Three of the principal members of the pentraxin family are serum proteins and Ca 2 dependent: namely, C-reactive protein (CRP), serum amyloid P component protein (SAP), and female protein (FP). CRP binds to ligands containing phosphocholine, SAP binds to amyloid fibrils, DNA, chromatin, fibronectin, C4-binding proteins and glycosaminoglycans. CRP is expressed during acute phase response to tissue injury or inflammation in mammals. The protein resembles antibody and performs several functions associated with host defence: it promotes agglutination, bacterial capsular swelling and phagocytosis, and activates the classical complement pathway through its calcium-dependent binding to phosphocholine. CRPs have also been sequenced in an invertebrate, Limulus polyphemus (Atlantic horseshoe crab), where they are a normal constituent of the hemolymph. SAP is a vertebrate protein that is a precursor of amyloid component P. It is found in all types of amyloid deposits, in glomerular basement menbrane and in elastic fibres in blood vessels. SAP binds to various lipoprotein ligands in a calcium-dependent manner, and i…
