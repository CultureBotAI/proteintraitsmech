identifier: InterPro:IPR032073
label: "Fibronectin type III domain-containing protein 5, C-terminal domain"
definition: >-
  This domain is found in fibronectin type III domain-containing protein 5 (FNDC5). FNDC5 is cleaved into Irisin, a putative myokin that stimulates white-to-brown fat conversion in mice, though this role is disputed in humans. This domain is found C-terminal to the irisin domain.
