identifier: InterPro:IPR026866
label: "Protein CR006, P-loop domain"
definition: >-
  This domain contains a P-loop motif that is characteristic of the AAA superfamily. It is found in P-loop containing proteins such as chromosomal cassette SCCmec type IVc uncharacterised protein CR006 and arcadin-4, an actin-like component of the cytoskeleton of the archaeon Pyrobaculum calidifontis.
