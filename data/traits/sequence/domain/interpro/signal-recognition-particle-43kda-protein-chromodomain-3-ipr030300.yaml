identifier: InterPro:IPR030300
label: "Signal recognition particle 43kDa protein, chromodomain 3"
definition: >-
  This group of proteins includes chloroplast signal-recognition particle 43kDa protein (CpSRP43) and similar plant proteins. In Arabidopsis, CpSRP43 (AT2G47450, CAO) is a component of the chloroplast signal recognition particle pathway that is involved in LHCP (light-harvesting chlorophyll a/b-binding protein) targeting. LHCPs are synthesised in the cytoplasm, and after import into the chloroplast, they are targeted and inserted into the thylakoid membrane. In addition, CpSRP43 functions as a chaperone preventing aggregation of LHCP following import into the chloroplast. This entry represents the chromodomain 3 of SRP43, which appear to play a role in the functional organization of the eukaryotic nucleus. This domain is involved in the binding activity of these proteins to methylated histone tails and maybe RNA.
