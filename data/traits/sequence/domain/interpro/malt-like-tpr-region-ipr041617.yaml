identifier: InterPro:IPR041617
label: "MalT-like TPR region"
definition: >-
  This entry contains a series of TPR repeats found in HTH-type transcriptional regulator MalT and related proteins. MalT contains one HTH LuxR-type DNA-binding domain. MalT activates the maltose regulon, a set of operons involved in the uptake and catabolism of maltose and maltodextrins, by binding to the MalT box DNA motif (5'-GGA[TG]GA-3'). In solution MalT is monomeric, but it oligomerises into its active form in the presence of ATP and maltotriose. Its activity is negatively regulated by MalY, MalK, and Aes, which antagonise maltotriose binding. MalT functions as part of a broader regulatory network that also involves the catabolite activator protein (CAP).
