identifier: InterPro:IPR041475
label: "His-Me finger endonuclease, beta4-alpha2 domain"
definition: >-
  This domain is found in Hpy991 present in Helicobacter pylori. Hpy991 is a β-β-α-Me restriction endonuclease that recognises the CGWCG target sequence and cleaves both DNA strands with a stagger that leads to 5'-recessed ends in the cleavage products. This domain is the first of two beta4-alpha2 repeats found after the N-terminal domain. The two repeats have low overall sequence similarity but readily identified by a structural comparison. Both repeats contain two CXXC motifs that map to the first β-hairpin and the first α-helix. The four cysteine residues coordinate a structurally bound Zn2+ ion tetrahedrally. The major groove is in contact with the first repeat, with the β-hairpin 2 inserting deeply into the groove.
