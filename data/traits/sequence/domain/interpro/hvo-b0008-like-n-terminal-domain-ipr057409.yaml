identifier: InterPro:IPR057409
label: "HVO_B0008-like, N-terminal domain"
definition: >-
  This entry represents a domain found at the N-terminal of uncharacterised proteins from halobacteria, including HVO_B0008 from Haloferax volcanii ( ). This domain is predicted to fold into three β-strands and an α-helix.
