identifier: InterPro:IPR034988
label: "DAZ/BOULE, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) domain of Deleted in AZoospermia (DAZ) homologues from invertebrates. Invertebrates contain a single DAZ homologue, known as BOULE in Drosophila, while vertebrates, other than catarrhine primates, possess both BOULE and DAZL (DAZ-like) genes. The catarrhine primates possess BOULE, DAZL, and DAZ genes.
