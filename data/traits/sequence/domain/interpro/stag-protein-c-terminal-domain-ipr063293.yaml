identifier: InterPro:IPR063293
label: "STAG protein, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of approximately 140 residues found in cohesin subunit SA proteins (STAG1, STAG2, STAG3) in eukaryotes. These proteins also contain the STAG domain and function as components of the cohesin complex required for sister chromatid cohesion after DNA replication. Mutations in STAG genes cause meiotic arrest, premature ovarian failure, and developmental disorders. The precise function of this C-terminal domain remains to be determined.
