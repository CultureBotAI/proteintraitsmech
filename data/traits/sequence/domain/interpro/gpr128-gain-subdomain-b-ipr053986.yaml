identifier: InterPro:IPR053986
label: "GPR128, GAIN subdomain B"
definition: >-
  GRP128, also known as Adhesion G-protein coupled receptor G7 (AGRG7), is an orphan receptor of the adhesion family (subclass B2) that belongs to class B GPCRs. Expression of GPR128 was detected in the mouse intestinal mucosa and is thought to be involved in energy balance. It consists of an N-terminal HormR-like domain ( ), followed by the GAIN domain which consists of a stalk (consisting of subdomains A ( ) and B) and a GPS motif ( ), followed by a C-terminal transmembrane region ( ). This entry represents subdomain B of the stalk from GPR128 GAIN domain. The ~320-residue GAIN domain is an ancient domain that exists in primitive ancestor organisms, and is conserved in all aGPCRs and all PKD1-related proteins. Functionally, the GAIN domain is both necessary and sufficient for autoproteolysis, suggesting an autoproteolytic mechanism whereby the overall GAIN domain fine-tunes the chemical environment. In contrast to most other autoproteolytic domains that cause the release of the cleaved mature protein, autoproteolysis of the GAIN domain does not lead to the dissociation of the cleaved extracellular sequences containing the GAIN domain from the membrane-embedded regions of the protein. The GAIN domain forms a tightly associated heterodimer upon proteolysis. Cleavage at the GAIN domain is not a feature that all GAIN domain-containing receptors possess and the GAIN domain likely has other functions (such as interacting with ligands or transmembrane helices) in addition to the autoproteolysis function.
