identifier: InterPro:IPR023356
label: "Leucyl-tRNA synthetase, domain 3"
definition: >-
  Leucine-tRNA ligase ( ) is an alpha monomer that belongs to class Ia. The crystal structure of leucine-tRNA ligase from the hyperthermophile Thermus thermophilus has an overall architecture that is similar to that of isoleucine-tRNA ligase, except that the putative editing domain is inserted at a different position in the primary structure. This feature is unique to prokaryote-like leucine-tRNA ligases, as is the presence of a novel additional flexibly inserted domain. This entry represents the small inserted domain, found in leucyl-tRNA synthetases from Thermaceae bacteria. It is flexibly linked to the enzyme-core by β-ribbons structures.
