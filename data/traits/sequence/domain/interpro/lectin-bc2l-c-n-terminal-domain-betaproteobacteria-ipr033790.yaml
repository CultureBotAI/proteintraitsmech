identifier: InterPro:IPR033790
label: "Lectin Bc2l-C, N-terminal domain, betaproteobacteria"
definition: >-
  Lectin BC2L-C of Burkholderia cenocepacia is one of several lectins produced by this pathogen. BC2L-C has been shown to bind fucosylated human histo-blood group epitopes H-type 1, Lewis B, and Lewis Y. The C-terminal domain resembles BC2L-A, a calcium dependent mannose-binding protein. This entry describes the N-terminal domain, which trimerizes and binds alpha-MeSeFuc in pockets between the monomeric units. The N-terminal domain has a similar structure to tumour necrosis factor (TNF).
