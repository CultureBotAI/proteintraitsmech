identifier: InterPro:IPR062411
label: "FAF1 ribosome biogenesis protein, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of FAF1 (Forty S assembly factor) proteins found in yeasts. FAF1 is required for pre-rRNA processing and 40S ribosomal subunit assembly. The full-length protein localises to the nucleolus and acts in the processing of 35S rRNA at the A0, A1, and A2 cleavage sites. FAF1 interacts with KRR1, another ribosome biogenesis factor. This N-terminal domain is approximately 40 amino acids in length and is found at the beginning of FAF1 proteins. The domain shows compositional bias with basic and acidic residues. The specific function of this domain remains to be determined.
