identifier: InterPro:IPR032052
label: "CD3 gamma/delta subunit, Ig-like domain"
definition: >-
  This is an immunoglobulin-like domain. It is found on the T-cell surface glycoprotein CD3 gamma/delta chain. CD3delta and CD3epsilon complex together as part of the T-cell receptor complex.
