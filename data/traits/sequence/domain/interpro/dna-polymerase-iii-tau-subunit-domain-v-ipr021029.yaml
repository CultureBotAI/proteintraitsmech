identifier: InterPro:IPR021029
label: DNA polymerase III, tau subunit, domain V
definition: >-
  This domain family is found in bacteria, and is approximately 140 amino acids in length. It is found in association with . Domains I-III are shared between the tau and the gamma subunits, while most of the DnaB-binding Domain IV and all of the alpha-interacting Domain V are unique to tau. The extreme C-terminal region of this domain 5 is the part which interacts with the alpha subunit of the DNA polymerase III holoenzyme.
