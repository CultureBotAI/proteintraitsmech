identifier: InterPro:IPR042949
label: "KBTBD4, BTB/POZ domain"
definition: >-
  This entry represents the BTB/POZ domain found in KBTBD4. The function of Kelch repeat and BTB domain-containing protein 4 (KBTBD4) is not clear. It belongs to a large family of cullin-RING ubiquitin ligase adaptors that facilitate the ubiquitination of target substrates.
