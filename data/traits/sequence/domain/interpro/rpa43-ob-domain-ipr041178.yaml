identifier: InterPro:IPR041178
label: "RPA43, OB domain"
definition: >-
  This entry represents the OB domain found in Rpa43 (also known as A43), which is a component of RNA polymerase I (Pol I) that synthesizes ribosomal RNA precursors. RNA polymerase I subunits A14 and A43 form the heterodimer A14/43, which is distantly related to Rpb4/7 in Pol II and C17/25 in Pol III. A43-A14 heterodimer forms the stalk that provides a platform for initiation factors and interacts with newly synthesized RNA.
