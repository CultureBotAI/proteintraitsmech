identifier: InterPro:IPR058781
label: "AprE-like, long alpha-helical hairpin"
definition: >-
  This domain is found in Alkaline protease secretion protein AprE from Pseudomonas aeruginosa and related proteins including Type I secretion system membrane fusion protein PrsE, Exopolysaccharide production protein ExoF and Proteases secretion protein PrtE. AprE is involved in the secretion of alkaline protease. PrsE mediates the secretion of glycanase ExsH. ExoF is involved in in succinoglycan (EPS I) synthesis while PrtE is involved in the secretion of proteases A, B, C and G. This domain is inserted into the barrel-sandwich hybrid domain.
