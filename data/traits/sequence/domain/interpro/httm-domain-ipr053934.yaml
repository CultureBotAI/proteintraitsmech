identifier: InterPro:IPR053934
label: "HTTM domain"
definition: >-
  This entry represents the HTTM (for horizontally transferred transmembrane) domain found at the N-terminal in metazoan Vitamin K-dependent gamma-carboxylase and in diverse domain architectures in bacterial proteins. This domain contains four transmembrane regions.
