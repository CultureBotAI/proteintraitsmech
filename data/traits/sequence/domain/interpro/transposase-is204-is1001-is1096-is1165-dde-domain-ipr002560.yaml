identifier: InterPro:IPR002560
label: "Transposase IS204/IS1001/IS1096/IS1165, DDE domain"
definition: >-
  This entry represents the DDE domain found in the IS204/IS1001/IS1096/IS116 transposases. Autonomous mobile genetic elements such as transposon or insertion sequences (IS) encode an enzyme, transposase, that is required for excising and inserting the mobile element. Transposases have been grouped into various families. This family includes the IS204, IS1001, IS1096 and IS1165 transposases.
