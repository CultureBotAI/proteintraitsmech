identifier: InterPro:IPR040577
label: "Glutamine synthetase, C-terminal"
definition: >-
  This domain is found in type III glutamine synthetase present in Bacteroides fragilis. Glutamine synthetase (GS) are large oligomeric enzymes that catalyze the condensation of ammonium and glutamate to form glutamine, the principal source of nitrogen for protein and nucleic acid synthesis. This domain is located in the C-terminal end of the protein.
