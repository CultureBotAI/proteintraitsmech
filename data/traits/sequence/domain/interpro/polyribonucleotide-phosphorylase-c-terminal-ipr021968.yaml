identifier: InterPro:IPR021968
label: "Polyribonucleotide phosphorylase, C-terminal"
definition: >-
  PNPase regulates the expression of small non-coding RNAs that control expression of outer-membrane proteins. The enzyme also affects complex processes, such as the tissue-invasive virulence of Salmonella enterica and the regulation of a virulence-factor secretion system in Yersinia. In Escherichia coli, PNPase is involved in the quality control of ribosomal RNA precursors and is required for growth following cold shock. This family contains the C-terminal protomer domain of the PNPase core. The function of the C-terminal protomer is to catalyse phosphorolysis through its two active sites.
