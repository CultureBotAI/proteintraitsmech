identifier: InterPro:IPR024737
label: "Get5, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Get5 from Aspergillus fumigatus and similar proteins found primarily in Ascomycetes. Get5 is a component of the get4/get5/sgt2 sorting complex involved in the GET (guided entry of TA proteins) pathway that leads to the insertion of tail-anchored proteins into the endoplasmic reticulum. Tail-anchored trans-membrane proteins are targeted to membranes post-translationally. The proteins Get4 and Get5 form an obligate complex that catalyses the transfer of tail-anchored proteins destined to the endoplasmic reticulum from Sgt2 to the cytosolic targeting factor Get3.
