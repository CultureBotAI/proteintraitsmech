identifier: InterPro:IPR055472
label: "Domain of unknown function DUF7044"
definition: >-
  This domain is found in a group of uncharacterised metazoan proteins. It is predicted to adopt a globular structure with lipocalin fold. It also contains several highly conserved cysteine residues that are likely involved in the formation of intra-domain disulfide bridges.
