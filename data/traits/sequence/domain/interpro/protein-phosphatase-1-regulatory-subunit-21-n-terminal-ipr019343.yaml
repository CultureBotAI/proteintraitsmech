identifier: InterPro:IPR019343
label: "Protein phosphatase 1 regulatory subunit 21, N-terminal"
definition: >-
  This entry represents a N-terminal 100 residues long domain found in Protein phosphatase 1 regulatory subunit 21, which contains a conserved KLRAQ motif. This domain is found in a family of coiled-coil domain-containing proteins that are conserved from nematodes to humans. These proteins also contain a C-terminal TTKRSYEDQ motif domain ( ). Protein phosphatase 1 regulatory subunit 21 is likely a regulator of protein phosphatase 1 (PP1) activity. It may play a role in the endosomal sorting process or in endosome maturation pathway.
