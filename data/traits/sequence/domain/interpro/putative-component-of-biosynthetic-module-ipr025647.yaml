identifier: InterPro:IPR025647
label: "Putative component of 'biosynthetic module'"
definition: >-
  This is a domain found 2-3 times in the YceG family of bacterial proteins. YceG is an additional gene-product encoded in the Ter operon and might thus be part of a 'biosynthetic module' encoding certain enzymes.
