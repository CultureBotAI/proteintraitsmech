identifier: InterPro:IPR055128
label: "Carbamoyltransferase, Kae1-like domain, second subdomain"
definition: >-
  This domain is found at the C-terminal of Carbamoyltransferase from Caldanaerobacter subterraneus (HypF, ) and similar prokaryotic sequences. HypF is involved in the biosynthesis of the nitrile group as a precursor of the cyano groups of hydrogenases. HypF consists of four domains: the acylphosphatase domain, the Zn finger-like domain, the YrdC-like domain and the Kae1 (kinase-associated endopeptidase 1)-like domain, which is composed of two α-β subdomains ( and this entry).
