identifier: InterPro:IPR054575
label: "Glyoxalase At5g48480-like, C-terminal"
definition: >-
  This entry includes plant sequences that belong to the Lactoylglutathione lyase/glyoxalase I family. They are poorly characterised and contain two characteristic VOC domains. Members of this entry contain conserved metal binding amino acids with the type I extradiol dioxygenases, which shows no domain swapping. This entry represents the C-terminal domain.
