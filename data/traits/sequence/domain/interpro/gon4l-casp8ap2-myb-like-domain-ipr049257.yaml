identifier: InterPro:IPR049257
label: "Gon4l/CASP8AP2, myb-like domain"
definition: >-
  This domain is the DNA-binding SANT/myb-like domain of Caspase 8-associated protein 2 (CASP8AP2) / GON-4 like proteins from vertebrates. CASP8AP2 (also known as Flice-Associated Huge Protein, FLASH) is implicated in numerous gene regulatory roles including roles in embryogenesis, oncogenesis, down-regulation of replication-dependent histone genes, regulation of Caspase 8 activity at the death-inducing signalling complex (DISC), and as a useful marker in leukaemia prognosis. Gon-4 is critical in Caenorhabditis elegans gonadogenesis. These proteins are members of the SANT/myb group. SANT is named after 'SWI3, ADA2, N-CoR and TFIIIB', several factors that share this domain. The SANT domain resembles the three α-helix bundle of the DNA-binding Myb domains and is found in a diverse set of proteins
