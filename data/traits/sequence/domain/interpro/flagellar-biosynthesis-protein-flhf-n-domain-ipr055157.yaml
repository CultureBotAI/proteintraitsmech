identifier: InterPro:IPR055157
label: "Flagellar biosynthesis protein FlhF, N domain"
definition: >-
  This domain is found in Flagellar biosynthesis protein FlhF from Bacillus subtilis, a protein that is necessary for flagellar biosynthesis. FlhF contains a basic N-terminal domain followed by the conserved NG domain, which can be divided into two segments: the N domain (this entry) and the G domain.
