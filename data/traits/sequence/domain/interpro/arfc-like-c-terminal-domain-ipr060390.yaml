identifier: InterPro:IPR060390
label: "ArfC-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in uncharacterised membrane protein ArfC and related bacterial proteins. This protein is required for ammonia secretion and is also required for wild-type expression of ArfA. This entry also represents the C-terminal in Uncharacterized membrane protein YttA, Small ribosomal subunit protein bS16 and Large ribosomal subunit protein uL4.
