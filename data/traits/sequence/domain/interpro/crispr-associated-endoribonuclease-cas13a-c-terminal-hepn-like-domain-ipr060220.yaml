identifier: InterPro:IPR060220
label: "CRISPR-associated endoribonuclease Cas13a, C-terminal HEPN-like domain"
definition: >-
  This entry represents the C-terminal domain of CRISPR-associated endoribonuclease Cas13a. This domain is found in bacteria, particularly in Lachnospiraceae, Clostridia, and various Alphaproteobacteria. Cas13a is part of the type VI-A CRISPR-Cas system and functions as an RNA-targeting endonuclease that cleaves target single-stranded RNA in a crRNA-dependent manner. Activation of these proteins for non-specific RNA degradation, also known as collateral RNA degradation, is triggered by the binding of a viable target RNA. The protein contains two HEPN-like folds that are involved in RNA cleavage activity represented by and . These domains undergo conformational changes upon RNA binding that are critical for their function.
