identifier: InterPro:IPR047538
label: "Activating signal cointegrator 1 complex subunit 1, type I KH domain"
definition: >-
  This entry represents the type I KH RNA-binding domain of ASCC1 from animals. ASCC1, also called ASC-1 complex subunit p50, or Trip4 complex subunit p50, plays a role in DNA damage repair as component of the ASCC complex which consists of ASCC1, ASCC2 and ASCC3 subunits (p50, p100 and p200, respectively). It is part of the ASC-1 complex that enhances NF-kappa-B, SRF and AP1 transactivation. In cells responding to gastrin-activated paracrine signals, it is involved in the induction of SERPINB2 expression by gastrin. ASCC1 may also play a role in the development of neuromuscular junction. This protein has an RNA-binding KH domain fused to a 2H RNA-phosphoesterase and modulates the ASCC3 helicase recruitment to the ASCC complex during alkylation damage.
