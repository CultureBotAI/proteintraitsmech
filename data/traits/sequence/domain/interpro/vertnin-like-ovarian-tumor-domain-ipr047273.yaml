identifier: InterPro:IPR047273
label: "Vertnin-like, ovarian tumor domain"
definition: >-
  This entry represents the OTU (ovarian tumour) domain of Vertnin and similar proteins predominantly found in animals. Vertnin and some subfamily members do not possess the conserved catalytic residues and may not have deubiquitinase activity. Vertnin is reported to be a maternal factor involved in dorsoventral patterning in zebrafish. It is rapidly transported to the animal pole region after fertilisation and binds to a bmp2b regulatory region to prevent its transcription. In mammals, it is associated with variations in vertebral number.
