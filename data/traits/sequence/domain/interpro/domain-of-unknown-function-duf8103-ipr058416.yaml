label: "Domain of unknown function DUF8103"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in the Halobacteria class of Archaea. Proteins containing this domain are found predominantly in the order Halobacteriales, with representatives in families such as Haloferacaceae and Halobacteriaceae. The domain is typically found in proteins ranging from 73 to 103 amino acids in length.
