identifier: InterPro:IPR012940
label: "Nucleic acid binding NABP"
definition: >-
  This domain occurs in some putative nucleic acid binding proteins. One of these proteins has been partially characterised and contains two putative phosphorylation sites and a possible dimerisation / leucine zipper domain.
