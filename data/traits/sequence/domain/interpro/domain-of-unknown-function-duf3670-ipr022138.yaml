identifier: InterPro:IPR022138
label: "Domain of unknown function DUF3670"
definition: >-
  This entry describes a domain of unknown function found in putative ATP-dependent helicase/translocase YwqA and related putative helicases. It is mainly found in bacteria. This domain is often found in association with and . YwqA has not been functionally characterised; it was first identified in Bacillus subtilis (strain 168). According to structure predictions, it acquires a small β-sheet structure, surrounded by α-helices of varying lengths.
