identifier: InterPro:IPR049540
label: "Spt6-like, S1/OB domain"
definition: >-
  This entry represents the S1/OB-fold domain of yeast Spt6 ( ) and other plant and fungal proteins. This domain has structural similarity to S1 domain but lacks the typical S1 binding cleft residues involved in nucleic acid binding, therefore, it may be involved in interactions with other partners.
