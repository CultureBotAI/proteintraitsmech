label: "Acyl-coenzyme A oxidase, N-terminal"
definition: >-
  Acyl-coenzyme A oxidase consists of three domains. An N-terminal α-helical domain, a middle domain and a C-terminal catalytic domain . This entry represents the N-terminal α-helical domain.
