identifier: InterPro:IPR028098
label: "Glycosyltransferase subfamily 4-like, N-terminal domain"
definition: >-
  MshA belongs to the GT-B structural family of glycosyltransferases whose members have a two-domain structure with both domains exhibiting a Rossman-type fold. This entry represents the N-terminal domain found in MshA and the subfamily 4 of glycosyltransferases family 1.
