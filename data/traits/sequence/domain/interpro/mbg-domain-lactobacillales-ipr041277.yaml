identifier: InterPro:IPR041277
label: "MBG domain, Lactobacillales"
definition: >-
  This domain is found in a variety of bacterial extracellular proteins. Although initially described as having a divergent Ig fold this domain has a novel topology that is like a mirror image of the β-grasp fold. Hence the name of Mirror Bη Grasp (MBG) domain.
