identifier: InterPro:IPR060387
label: "Type IV secretion system ATPase VirB4/TrbE, N-terminal"
definition: >-
  This entry represents the N-terminal domain of VirB4 and TrbE proteins, which are components of type IV secretion systems. The domain is found at the N-terminal of VirB4/TrbE proteins, which range from approximately 150 residues to over 800 residues in the full-length proteins. In the complete proteins, this N-terminal domain is followed by the VirB4 C-terminal ATPase domain ( ). Some family members are predicted to have transmembrane segments, with some proteins having a predicted signal peptide. VirB4 is one of three conserved ATPases (along with VirB11 and VirD4) that power type IV secretion systems (T4SSs). It provides energy, via hydrolysis of ATP, for the translocation of virulence proteins or the transfer of T-DNA-protein complexes across the bacterial membrane. VirB4 is essential for both T4SS assembly and substrate transfer, and is the most evolutionarily conserved subunit across all characterised T4SSs. The importance of VirB4 homologues has been demonstrated in several pathogenic bacteria. In Brucella abortus, the virB operon is essential for intracellular survival and constitutes a major determinant of virulence. In Bordetella pertussis, PtlC (a VirB4 homologue) is required for secretion of assembled pertussis toxin through the outer membrane. In Agrobacterium tumefaciens, VirB4 energises translocation of the T-DNA-protein complex into plant cells. Structurally, VirB4 proteins contain a C-terminal domain harbouring the catalytically essential Walker A and Walker B motifs characteristic of RecA-like ATPases, whilst the less conserved N-terminal domain mediates interactions with the inner membrane. CagE ( ) is the ATPase component of the Cag type IV secretion system (Cag-T4SS), encoded by the cag pathogenicity island (PAI). It functions as a molecular motor,…
