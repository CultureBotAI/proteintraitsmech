identifier: InterPro:IPR011748
label: "Uncharacterised protein family, phage tail-like"
definition: >-
  This entry describes a region of sequence similarity shared by a number of uncharacterised proteins in bacterial genomes, including Geobacter sulfurreducens PCA, Rhizobium loti (Mesorhizobium loti), Streptomyces coelicolor (strain A3(2)), Gloeobacter violaceus PCC 7421, and Myxococcus xanthus. In all cases, the genomic region resembles a phage tail region, based on tentative identifications of neighbouring genes. A region of this domain resembles a region of , another phage tail protein model.
