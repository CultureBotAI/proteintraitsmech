identifier: InterPro:IPR059732
label: "TP_0183, C-terminal"
definition: >-
  This entry represents the C-terminal domain of TP_0183 proteins found primarily in Treponema and related spirochaetes. This domain adopts an avidin-like fold structure. The function of this domain remains to be determined. TP_0183 is a protein of approximately 281 amino acids that is processed from a precursor containing an N-terminal signal peptide. Protein-protein interactions of TP0183 of Treponema pallidum with DnaA, with the DNA repair helicase TP0380, and with SbcD, a protein involved in replication restart after DNA repair, suggests a role for TP0183 in DNA metabolism.
