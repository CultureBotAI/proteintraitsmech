label: RNA polymerase recycling, bacterial, C-terminal
definition: >-
  This domain is found in bacteria. This domain is about 360 amino acids in length. This domain is found associated with , . The function of this domain is not known, but structurally it forms an α-β fold in nature with a central β-sheet flanked by helices and loops, the β-sheet being mainly antiparallel and flanked by four α helices, among which the two longer helices exhibit a coiled-coil arrangement.
