identifier: InterPro:IPR003305
label: Carbohydrate-binding, CenC-like
definition: >-
  The 1,4-beta-glucanase CenC from Cellulomonas fimi contains two cellulose-binding domains, CBD(N1) and CBD(N2), arranged in tandem at its N terminus. These homologous CBDs are distinct in their selectivity for binding amorphous and not crystalline cellulose. Multidimensional heteronuclear nuclear magnetic resonance (NMR) spectroscopy was used to determine the tertiary structure of the N-terminal cellulose-binding domain from CenC (represented by this entry). Its tertiary structure is strikingly similar to that of the bacterial 1,3-1,4-beta-glucanases, as well as other sugar-binding proteins with jelly-roll folds. Endo-1,4-beta-xylanase C from Paenibacillus barcinonensis (XynC) and Cellulose 1,4-beta-cellobiosidase from Acetivibrio thermocellus (CelK) are also part of this group.
