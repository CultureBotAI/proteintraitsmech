identifier: InterPro:IPR059233
label: "Serine/threonine protein kinases NdrA/B/Cbk1, Mob-binding domain"
definition: >-
  This entry corresponds to the NTR or Mob-binding domain of the serine/threonine protein kinases NdrA/B and Cbk1. Proteins in this group are involved in regulating many cellular functions including contraction, motility, division, proliferation, apoptosis, morphogenesis, and cytokinesis. These kinases bind to highly conserved Mob (Mps One binder) coactivators, forming regulatory complexes that control a diverse set of in vivo effector proteins, and are essential and evolutionarily conserved components of "Hippo" signalling pathways. Mob association creates a novel binding pocket that participates in the formation of the active state of the kinases. These kinases contain a regulatory domain located N-terminal to the serine/threonine kinase domain (called the N-terminal regulatory (NTR) domain) and an insert within the catalytic domain that contains an auto-inhibitory sequence.
