identifier: InterPro:IPR055093
label: "EPS8, spectrin-like domain"
definition: >-
  This entry represents a spectrin-like domain is the EPS8 proteins. Epidermal growth factor receptor kinase substrate 8 (EPS8) is a signalling adapter that possesses actin binding, bundling, and barbed-end capping activities. It forms a complex with Sos-1, Abi1 and the lipid kinase phosphoinositide 3-kinase (PI3-K) to regulate Rac activation that leads to actin cytoskeletal remodeling. It is critical for dendritic cell migration. It is involved in the initial growth of stereocilia in both inner hair cells and outer hair cells. It also regulates axonal filopodia in hippocampal neurons in response to brain-derived neurotrophic factor (BDNF). It has been linked to proliferation, metastasis and prognosis of many malignant tumours.
