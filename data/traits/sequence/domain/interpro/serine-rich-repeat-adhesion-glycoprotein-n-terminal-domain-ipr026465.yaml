identifier: InterPro:IPR026465
label: "Serine-rich repeat adhesion glycoprotein, N-terminal domain"
definition: >-
  This entry represents a conserved N-terminal domain shared by highly repetitive Streptococcal serine-rich adhesion glycoproteins that may exceed 4000 amino acids in length, consisting largely of long regions in which every second amino acid is Ser. Members of this family normally begin with a KxYKxGKxW motif region ( ) and end with an LPXTG motif region. Members are exported by the accessory secretory system (SecA2 and SecY2). They are highly variable among the Streptococci and may help determine host ranges for pathogenesis. Some of the proteins belonging to this entry are: Platelet binding protein GspB from Streptococcus gordonii, which plays a role in virulence, biofilm formation and host-pathogen interactions; Streptococcal hemagglutinin from Streptococcus gordonii (Hsa), a cell wall protein involved with PadA in host cell interactions required for colonization and pathogensis (Probable); and Fap1 adhesin from Streptococcus parasanguinis, the major structural element of fimbriae, required for adherence to saliva-coated hydroxyapatite beads (SHA), an in vitro tooth model.
