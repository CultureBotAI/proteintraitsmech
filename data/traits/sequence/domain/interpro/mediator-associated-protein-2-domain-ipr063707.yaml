identifier: InterPro:IPR063707
label: "Mediator-associated protein 2 domain"
definition: >-
  This entry represents a domain found in mediator-associated protein 2 (MDA2) in plants. MDA2 proteins are associated with the Mediator complex, which is a large multi-subunit complex that regulates transcription by RNA polymerase II. The proteins localise to the nucleus and are phosphoproteins. The domain is found in plant species and shows alternative splicing. The specific function of this domain remains to be determined.
