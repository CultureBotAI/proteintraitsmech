identifier: InterPro:IPR006171
label: "TOPRIM domain"
definition: >-
  The Toprim (topoisomerase-primase) domain is a structurally conserved domain of ~100 amino acids that is found in bacterial DnaG-type primases, small primase-like proteins from bacteria and archaea, type IA and type II topoisomerases, bacterial and archaeal nucleases of the OLD family and bacterial DNA repair proteins of the RecR/M family. The Toprim domain can be found alone or in combination with several other domains, such as the ASM domain, the superfamily 2 helicase domain, the superfamily 3 helicase domain, the DnaB interaction domain, the C4 'little finger' domain, the CHC2 zinc finger, the ATPase domain of the HSP90-gyrase-histidine kinase superfamily, the S5 domain, the SET domain, the helix-hairpin-helix (HhH) DNA-binding domain, the mobilisation (MOB) domain or the ATPase domain of the ABC transporter/SMC superfamily. The Toprim domain is a catalytic domain involved in DNA strand breakage and rejoining. The Toprim domain has two conserved motifs, one of which centres at a conserved glutamate and the other one at two conserved aspartates (DxD). Both motifs are preceded by conserved hydrophobic regions predicted to form β-strands. The glutamate residue is probably involved in catalysis, whereas the DxD motif is involved in the co-ordination of Mg(2++) that is required for the activity of all Toprim-containing enzymes. The Toprim domain has a compact α/β fold, with four conserved strands and three helices; with the exception of the second helix and the C-terminal strands, each of these elements contains positions that are highly conserved. The Toprim domain contains three regions that can accommodate variable sized inserts, which are particularly prominent in the topoisomerases.
