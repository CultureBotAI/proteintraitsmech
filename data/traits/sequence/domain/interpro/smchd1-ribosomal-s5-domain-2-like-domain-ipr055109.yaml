identifier: InterPro:IPR055109
label: "SMCHD1, ribosomal S5 domain 2-like domain"
definition: >-
  This domain is found in human Structural maintenance of chromosomes flexible hinge domain-containing protein 1 (SMCHD1) protein and its homologues. SMCHD1 is an epigenetic repressor that may participate in structural manipulation of chromatin in an ATP-dependent manner as a part of its role in gene expression regulation. This domain follows the SMCHD1 ATPase module and adopts a globular α/β structure consisting of five-stranded mixed β-sheet with α-helices packed on both sides. This domain is involved in dimerisation. SMC-FH proteins are atypical SMC proteins, characterised by their unique homodimeric arrangement and ATPase activity. SMC-FH plays a crucial role in epigenetic silencing by regulating chromatin architecture and promoting heterochromatin formation on both autosomes and the X chromosome. It is essential for X chromosome inactivation in females, facilitating the spreading of heterochromatin and creating a compartment-less nuclear architecture. Additionally, it is involved in silencing specific autosomal loci and contributes to DNA repair by promoting non-homologous end joining and inhibiting homologous recombination.
