label: "Insecticide toxin TcdB middle/N-terminal"
definition: >-
  This domain family is found in bacteria and archaea, and is typically between 164 and 180 amino acids in length. The family is found in association with . This domain is the N-terminal-sided middle region of the bacterial insecticide toxin TcdB.
