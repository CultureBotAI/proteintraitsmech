identifier: InterPro:IPR047884
label: RPRD1A, CID domain
definition: >-
  Regulation of nuclear pre-mRNA domain-containing protein 1A (RPRD1A, also known as cyclin-dependent kinase inhibitor 2B-related protein or p15INK4B-related protein (P15RS)) is a CID (CTD-Interacting Domain) containing protein that co-purifies with RNA polymerase (Pol) II (RNAP II) and three other RNAP II-associated proteins, RPAP2, GRINL1A and RECQL5, but not with the Mediator complex. CID binds tightly to the carboxy-terminal domain (CTD) of RNAP II. During transcription, RNAP II synthesizes eukaryotic messenger RNA. Transcription is coupled to RNA processing through the CTD. RPRD1A forms homodimers and heterodimers with RPRD1B through their coiled-coil domains. Both RPRD1A and RPRD1B associate directly with RPAP2 phosphatase and serve as CTD scaffolds to coordinate the dephosphorylation of phospho-S5 by RPAP2. RPRD1A regulates cell cycle genes and attenuates Wnt signaling. It has been proposed that RPRD1A may act as an intrinsic transcriptional repressor for Wnt/beta-catenin-mediated gene transcription through the recruiting of histone deacetylase 2 (HDAC2) to maintain deacetylated histone H3 in the promoter region of Wnt-targeted genes. This entry represents the CID domain of RPRD1A.
