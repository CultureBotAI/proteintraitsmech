identifier: InterPro:IPR058694
label: "SaeA, fourth Fn3-like domain"
definition: >-
  This entry represents the fourth Fn3-like domain found in the ESX-1 scaffolding and assembly protein SaeA and similar proteins from actinomycetes. SaeA is involved in assembly of the ESX-1 secretion system (T7SS), which exports several proteins including EsxA and EsxB. The SaeA protein localises to the bacterial cell pole and is required for proper assembly and polar localisation of the ESX-1 complex. Disruption of SaeA affects DNA conjugation in recipient strains and blocks the secretion of EsxB.
