identifier: InterPro:IPR057008
label: "SpoVR-like, C-terminal"
definition: >-
  This entry represents a presumed domain found at the C-terminal of Stage V sporulation protein R from Bacillus subtilis (SpoVR), the uncharacterised protein YcgB from E.coli and related sequences from proteobacteria. SpoVR appears to be involved in spore cortex formation. This region may adopt a fold consisting of four β-strands and an α-helix.
