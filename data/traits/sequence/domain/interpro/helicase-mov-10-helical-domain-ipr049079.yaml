identifier: InterPro:IPR049079
label: "Helicase MOV-10, helical domain"
definition: >-
  Helicase MOV-10 is a 5'-3' RNA helicase required for RNA-mediated gene silencing by the RNA-induced silencing complex (RISC) [1-3]. It is involved in mRNA metabolism and translation, modulation of viral infectivity, inhibition of retrotransposition and regulation of synaptic transmission. It interacts with FMRP1 and regulates miRNA-mediated translational repression by AGO2. This is a presumed helical domain found between and .
