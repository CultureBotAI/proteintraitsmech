identifier: InterPro:IPR054400
label: "Fervidolysin, second beta-sandwich domain"
definition: >-
  This entry represents the C-terminal second β-sandwich domain (SD2) present in Fervidolysin from Fervidobacterium pennivorans, a keratinolytic enzyme that allows this bacterium to grow on native feathers and similar sequences mainly found in Thermotogales. This domain shows a pair of four-stranded β-sheets.
