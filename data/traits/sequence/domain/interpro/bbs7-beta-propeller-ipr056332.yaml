identifier: InterPro:IPR056332
label: "BBS7, beta-propeller"
definition: >-
  This entry represents the BBS7 β-propeller domain. The BBS7 β-propeller interacts with the β-propeller domain of another BBSome protein, BBS1, in order to control access of the membrane-recruiting protein ARL6. Members of this group are mainly found in animals. Bardet-Biedl syndrome 7 (BBS7) forms a part of the BBSome complex, which is required for ciliogenesis. BBS7 is the BBSome subunit responsible for the binding to SMO H8 and plays a role in guanylyl cyclase localisation in the ring-like structures at the base of the finger compartment in AFD sensory neurons. BBS7 and BBS2 form the head of the BBSome via an asymmetric heterodimer formation. BBS2, BBS7, and BBS9 share the same five-domain architecture with an N-terminal β-propeller followed by a heterodimerization α-helix, an immunoglobulin-like GAE domain (GAE), a mixed α/β plaform domain, and an α-helical region composed on two distinct helical hairpins. Bardet-Biedl syndrome is a member of genetic ciliopathies, but the link between cilia/centrosome deficits and metabolic abnormalities is not completely clear. Bardet-Biedl syndrome (BBS) is a heterogeneous genetic disorder characterised by many features, including retinal degeneration, obesity, cognitive impairment, polydactyly, renal abnormalities, and hypogenitalism. BBS genes play an important role in maintaining leptin sensitivity in proopiomelanocortin neurons. A relatively high incidence of BBS is found in the mixed Arab populations of Kuwait and in Bedouin tribes throughout the Middle East, most likely due to the high rate of consaguinity in these populations and a founder effect. Primary cilia are ubiquitous cellular appendages that provide important sensory and signalling functions and their dysfunction underlies numerous human genetic disorders. The prot…
