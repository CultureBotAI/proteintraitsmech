identifier: InterPro:IPR056851
label: "Integrin beta-like protein A-E, immunoglobulin-like domain"
definition: >-
  This immunoglobulin-like domain (Ig-like) is found in Integrin beta-like protein A-E from Dictyostelium discoideum (SibA-E) and similar sequences mainly found in lower eukaryotes and some bacterial species. The SibA (Similar to Integrin Beta) protein is a type I transmembrane protein, and its cytosolic, transmembrane and extracellular domains contain features also found in integrin beta chains. This protein is involved in cellular adhesion to substrate or phagocytic particles. The conserved cytosolic domain of SibA interacts with talin, a well-characterised partner of mammalian integrins. Based on these similarities it was speculated that the cellular adhesion mechanisms are similar in Dictyostelium and in mammalian cells, and that observations in the Dictyostelium model system can be extrapolated to mammalian cells.
