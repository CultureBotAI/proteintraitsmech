label: "Uncharacterized protein AF_1314, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the uncharacterised protein AF_1314 found in Archaea. This domain adopts a Rossmann-fold NAD(P)-binding domain fold. The function of this domain is unknown.
