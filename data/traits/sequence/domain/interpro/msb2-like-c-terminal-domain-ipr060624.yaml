identifier: InterPro:IPR060624
label: "MSB2-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal α-β plait domain found in MSB2 signalling mucins in fungi. Proteins in this group are plasma membrane sensors involved in osmosensing and MAPK activation for filamentous growth and appressorium formation. The specific function of this domain is not known. Yeast cells respond to hyperosmotic stress by activating the high-osmolarity glycerol (HOG) pathway, which consists of two branches, Hkr1/Msb2-Sho1 and Sln1. The Sho1 branch involves two osmosensors, the transmembrane mucin-like glycoproteins Hkr1 and Msb2. Activation of Hog MAPK cascade by Msb2, but not by Hkr1, requires the scaffold protein Bem1 and the actin cytoskeleton, suggesting that Msb2 functions as an osmosensor to integrate the signals from external osmotic conditions with those from internal cytoskeletal conditions.
