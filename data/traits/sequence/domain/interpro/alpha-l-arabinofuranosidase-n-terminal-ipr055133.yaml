identifier: InterPro:IPR055133
label: "Alpha-L-arabinofuranosidase, N-terminal"
definition: >-
  This domain is found central in the Alpha-L-arabinofuranosidase from Bifidobacterium longum which is involved in the type II arabinogalactan (AG) side chains degradation. It releases arabinofuranose (Araf) from alpha-1,3-Araf-substituted beta-1,6-galactooligosaccharides. This domain is also found at the N terminus of BT_3657 from Bacteroides thetaiotaomicron ( ) and similar bacterial sequences. BT_3657 has been reported to be an arabinosidase.
