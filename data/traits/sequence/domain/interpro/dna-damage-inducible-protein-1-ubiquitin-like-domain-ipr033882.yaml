identifier: InterPro:IPR033882
label: "DNA damage inducible protein 1 ubiquitin-like domain"
definition: >-
  DDI1 (DNA damage inducible protein 1) has an amino-terminal ubiquitin-like domain, an retroviral protease-like (RVP-like) domain, and a UBA (ubiquitin-associated) domain. This entry represents the amino-terminal ubiquitin-like domain of DDI1. Ubiquitin is a globular protein, the last four C-terminal residues (Leu-Arg-Gly-Gly) extending from the compact structure to form a 'tail', important for its function. The latter is mediated by the covalent conjugation of ubiquitin to target proteins, by an isopeptide linkage between the C-terminal glycine and the ε-amino group of lysine residues in the target proteins.
