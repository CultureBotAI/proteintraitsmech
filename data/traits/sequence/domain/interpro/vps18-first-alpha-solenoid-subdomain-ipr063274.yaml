identifier: InterPro:IPR063274
label: "VPS18, first alpha-solenoid subdomain"
definition: >-
  This entry represents the first half of the α-solenoid domain of VPS18 proteins. VPS18 proteins are involved in vesicle-mediated protein trafficking to lysosomal compartments, playing a crucial role in endocytic membrane transport and autophagic pathways. They act as a core component of the HOPS and CORVET endosomal tethering complexes, facilitating the conversion of Rab5 to Rab7 endosomes and mediating tethering and docking events during SNARE-mediated membrane fusion. The HOPS complex is recruited to Rab7 on the late endosomal membrane, regulating late endocytic, phagocytic, and autophagic traffic towards lysosomes. The CORVET complex functions as a Rab5 effector, mediating early endosome fusion. These proteins are essential for processes such as vacuolar biogenesis, lysosome biogenesis, and the degradation of apoptotic cells. They also play roles in embryogenesis, root development, and dendrite development in various organisms. These proteins are essential for HOPS complex formation but also also show E3 ligase activity on their own.
