identifier: InterPro:IPR047022
label: "Rabphilin/Doc2, first C2 domain"
definition: >-
  This entry includes Rabphilin and Doc2. Rabphilin and Doc2s share highly homologous tandem C2 domains, although their N-terminal structures are completely different: Rabphilin contains an N-terminal Rab-binding domain (RBD), whereas Doc2 contains an N-terminal Munc13-1-interacting domain (MID). This is the first C2 domain, referred to as C2A, found in Rabphilin and Doc2 proteins. In Doc2 alpha and beta, it exhibits Ca2+-dependent phospholipid-binding activity.
