identifier: InterPro:IPR058751
label: "RDRP, helical domain"
definition: >-
  This entry represents the helical domain in RDRP proteins found in plants and some fungal species. It folds into a four-helical bundle. RNA dependent RNA polymerases (RDRP) enzymes (RDRP; ) are involved in the amplification of regulatory microRNAs during post-transcriptional gene silencing; they are also required for transcriptional gene silencing. Double-stranded RNA has been shown to induce gene silencing in diverse eukaryotes by a variety of pathways. These enzymes also play a role in the RNA interference (RNAi) pathway, which is important for heterochromatin formation, accurate chromosome segregation, centromere cohesion, and telomere function during mitosis and meiosis. RDRP enzymes are highly conserved in most eukaryotes but are missing in archaea and bacteria. The core catalytic domain of RDRP enzymes is structurally similar to the beta' subunit of DNA-dependent RNA polymerases (DDRP); however, the other domains of DDRP show no similarity to those of RDRP.
