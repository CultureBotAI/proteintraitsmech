identifier: InterPro:IPR061969
label: "PQBP1, helical domain"
definition: >-
  This entry represents the small coiled-coil in polyglutamine-binding protein 1 (PQBP1) and similar sequences from vertebrates. PQBP1 is involved in pre-mRNA splicing regulation and mutations in PQBP1 cause X-linked intellectual disability.
