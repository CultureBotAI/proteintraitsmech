identifier: InterPro:IPR031583
label: "PelD, GGDEF domain"
definition: >-
  This degenerate GGDEF domain is found at the C-terminal of PelD, a membrane-bound c-di-GMP-specific receptor. It contains an RXXD motif similar to the allosteric inhibition site found in diguanylate cyclases. In PelD this RXXD motif binds to dimeric c-di-GMP.
