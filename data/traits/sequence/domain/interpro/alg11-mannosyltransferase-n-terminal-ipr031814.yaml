identifier: InterPro:IPR031814
label: "ALG11 mannosyltransferase, N-terminal"
definition: >-
  GDP-Man:Man(3)GlcNAc(2)-PP-Dol alpha-1,2-mannosyltransferase (ALG11) is involved in N-linked oligosaccharide synthesis. It is highly conserved, with homologues in fission yeast, worms, flies, and plants. It catalyses the sequential transfer of two alpha1,2-linked mannose residues from GDP-mannose to Man3GlcNAc2-PP-Dol forming the Man5GlcNAc2-PP-Dol intermediate at the cytosolic side of the ER before flipping to the luminal side. Alg11 contains three hydrophobic transmembrane-spanning helices found in the N-terminal domain.
