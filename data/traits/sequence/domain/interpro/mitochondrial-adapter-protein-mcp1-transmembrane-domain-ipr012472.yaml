identifier: InterPro:IPR012472
label: "Mitochondrial adapter protein MCP1, transmembrane domain"
definition: >-
  This entry represents the transmembrane domains found in Mitochondrial adapter protein MCP1 from yeast, a mitochondrial protein involved in mitochondrial lipid homeostasis. MCP1 recruits the lipid transfer protein Vps13 to mitochondria promoting vacuole-mitochondria contacts.
