identifier: InterPro:IPR044449
label: Rnt1/Pac1, double-stranded RNA binding domain, fungi
definition: >-
  This entry represents the double-stranded RNA binding domain found in Rnt1 from budding yeasts and Pac1 from fission yeasts. They are RNase III homologues. Rnt1 is a dsRNA-specific nuclease that cleaves eukaryotic pre-ribosomal RNA at the U3 snoRNP-dependent A0 site in the 5'-external transcribed spacer (ETS) and in the 3'-ETS. Rnt1 contains a double-stranded RNA binding motif (DSRM) at the C terminus. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. Pac1 converts long double-stranded RNAs into short oligonucleotides and also cleaves a small hairpin RNA substrate.
