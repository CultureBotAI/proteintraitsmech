identifier: InterPro:IPR055871
label: "Domain of unknown function DUF7448"
definition: >-
  This entry represents a conserved viral protein domain of unknown function. The domain is approximately 130-160 amino acids in length and is found in various bacteriophages and large DNA viruses. The alignment shows several conserved residues, including a highly conserved DCC motif. The protein contains a β-sandwich structural domain.
