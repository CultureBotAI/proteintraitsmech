identifier: InterPro:IPR057618
label: "POGZ/Z280C-D-like, double Zinc finger"
definition: >-
  This zinc finger domain is found in several zinc-finger proteins such as Zinc finger protein 280C and 280D as well as protein Pogo transposable element with ZNF domain (POGZ) find in eukaryotes. This domain contains two consecutive zinc fingers that are predicted to adopt structures similar to the classical C2H2 zinc fingers. 280C and 280D are probably involved in transcriptional regulation. POGZ plays a role in mitotic cell cycle progression and is involved in kinetochore assembly and mitotic sister chromatid cohesion. It is an essential protein that links HP1alpha dissociation with Aurora B kinase activation during mitosis. POGZ also promotes the repair of DNA double-strand breaks through the homologous recombination pathway.
