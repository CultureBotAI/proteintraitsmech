identifier: InterPro:IPR033930
label: "FAM43A/B, phosphotyrosine-binding domain"
definition: >-
  This entry refers to the PTB domain found in FAM43A/B. The function of family with sequence similarity 43, member A (FAM43A) is currently unknown. Human FAM43A is located on chromosome 3 at location 3q29. It encodes a 3182 base pair mRNA which possesses one Pleckstrin homology-like domain. The mRNA translates into a hydrophilic protein that is predicted to localise in the nucleus. The FAM43A gene is conserved through a broad range of vertebrates. It is highly conserved from chimpanzees to zebrafish. Proteins encoding phosphotyrosine binding (PTB) domains function as adaptors or scaffolds to organise the signaling complexes involved in wide-ranging physiological processes including neural development, immunity, tissue homeostasis and cell growth. Due to structural differences, PTB domains are divided into three groups represented by phosphotyrosine-dependent IRS-like, phosphotyrosine-dependent Shc-like, and phosphotyrosine-independent Dab-like PTBs. The last two PTBs have been named as phosphotyrosine interaction domain (PID or PI domain). PID domain has an average length of about 160 amino acids.
