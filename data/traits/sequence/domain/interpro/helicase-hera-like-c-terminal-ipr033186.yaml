identifier: InterPro:IPR033186
label: "Helicase HerA-like C-terminal"
definition: >-
  HerA is a DNA helicase able to utilise either 3' or 5' single-stranded DNA extensions for loading and subsequent DNA duplex unwinding. It forms a complex with NurA nuclease, this complex has the 5'-3' DNA end resection activity and is essential for cell viability in the crenarchaeon Sulfolobus islandicus. HerA consists of three domains: an N-terminal β-barrel domain ( ), a central domain comprising a RecA-like catalytic core (ATPase domain) and a four-helix bundle, and the C-terminal domain represented in this entry.
