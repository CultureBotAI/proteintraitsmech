identifier: InterPro:IPR063368
label: "Lymphocyte function-associated antigen 3, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of CD58 (lymphocyte function-associated antigen 3) found in mammals. CD58 is a cell surface glycoprotein that serves as a ligand for the T-lymphocyte CD2 glycoprotein. This C-terminal region follows the N-terminal immunoglobulin-like domain and contains the transmembrane region and cytoplasmic tail in the membrane-bound isoform. The protein undergoes alternative splicing to produce both membrane-bound and GPI-anchored forms. CD58 is important in mediating T-lymphocyte interactions and immune responses.
