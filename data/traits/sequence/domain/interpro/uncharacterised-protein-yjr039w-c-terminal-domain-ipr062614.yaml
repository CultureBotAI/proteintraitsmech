label: "Uncharacterised protein YJR039W, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the uncharacterised protein YJR039W from Saccharomyces cerevisiae. The function of this domain remains to be determined. YJR039W has been detected in the mitochondrion by high-throughput studies. It contains a N-terminal represented by , a middle domain represented by and a C-terminal represented by .
