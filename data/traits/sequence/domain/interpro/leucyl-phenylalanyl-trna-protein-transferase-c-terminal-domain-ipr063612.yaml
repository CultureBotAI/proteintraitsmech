identifier: InterPro:IPR063612
label: "Leucyl/phenylalanyl-tRNA protein transferase, C-terminal domain"
definition: >-
  Leucyl/phenylalanyl-tRNA--protein transferase transfers a Leu or Phe to the amino end of certain proteins to enable degradation. The L/F-transferase adopts a monomeric structure consisting of two domains that form a bilobate molecule. The N-terminal domain forms a small lobe with a novel fold. The large C-terminal domain, this entry, has a highly conserved fold, which is observed in the GCN5-related N-acetyltransferase (GNAT) family.
