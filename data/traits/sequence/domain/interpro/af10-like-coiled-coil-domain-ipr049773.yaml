identifier: InterPro:IPR049773
label: "AF10-like, coiled-coil domain"
definition: >-
  This entry represents the coiled-coil domain from AF10 and its homologues. This entry includes AF10 (ALL1-Fused gene from chromosome 10 protein) from mammals and its homologue from C. elegans, zinc finger protein zfp-1. AF10 is one of mixed-lineage leukemia 1 (MLL1)-fusion partners that function in acute myeloid leukemia (ALL) and plays a key role in the survival of uncommitted hematopoietic cells. Aberration of the mixed-lineage leukemia (MLL) gene is implicated in acute leukemia; chromosomal translocations of MLL1 generate oncogenic chimeric proteins, containing the non-catalytic N-terminal portion of MLL1 fused with many partners such as AF10. The MLL-AF10 fusion oncoprotein recruits DOT1L (disruptor of telomeric-silencing 1-like) to the homeobox A. The aberrant recruitment of DOT1L, a histone methyltransferase that methylates H3 lysine residues (H3K79), by MLL fusions and the resulting H3K79 methylation are thought to affect gene expression by altering chromatin accessibility. AF10 and DOT1L interact through their coiled coil domains. AF-10 also functions as a follistatin-related gene (FLRG)-interacting protein. The interaction with FLRG enhances AF10-dependent transcription. It also interacts with the synovial sarcoma associated protein SYT protein and may play a role in synovial sarcomas and acute leukemias. AF-10 contains an N-terminal plant homeodomain (PHD) finger followed by this non-canonical ePHD finger. C.elegans zpf-1 recruits the histone methyltransferase dot-1.1 to chromatin to methylate 'Lys-79' of histone H3 and activate transcription of target genes. It also recognizes and binds histone H3 methylated at 'Lys-4' (H3K4me) at the promoters of target genes. In response to stress, binds to the pdk-1 promoter to negatively regulate pdk-1 expression, which…
