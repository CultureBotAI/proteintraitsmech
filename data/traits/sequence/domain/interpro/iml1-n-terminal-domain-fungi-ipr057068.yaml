identifier: InterPro:IPR057068
label: "IML1, N-terminal domain, fungi"
definition: >-
  This entry represents the N-terminal double-psi β-barrel domain found in vacuolar membrane-associated IML1 proteins from fungi. In Saccharomyces cerevisiae, Iml1 is a GAP subunit of both the SEA (Seh1-associated) and Iml1 complexes (Iml1-Npr2-Npr3). SEA complex is associated dynamically with the vacuole and is involved in autophagy. Iml1 complex is required for non-nitrogen starvation (NNS)-induced autophagy.
