identifier: InterPro:IPR030942
label: "IgG-blocking virulence domain"
definition: >-
  This entry represents a domain found in Mycoplasma and Ureaplasma proteins. Proteins containing this domain include protein M of Mycoplasma genitalium, MG_281, a virulence protein that binds the IgG light chain to block the binding of antibody to antigen. The crystal structure of the protein M antibody-binding region that includes this domain is solved. Full-length homologues to MG_281 are known in a few other Mycoplasma species, but this domain shows distant homology to many additional proteins with a much wider distribution across the Mollicutes. Proteins in this entry also include paralogous families in some species, such as MCAP_0345, MCAP_0347, MCAP_0349, and MCAP_0351 in Mycoplasma capricolum.
