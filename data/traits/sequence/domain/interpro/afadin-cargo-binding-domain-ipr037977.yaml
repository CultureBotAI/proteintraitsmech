identifier: InterPro:IPR037977
label: "Afadin, cargo binding domain"
definition: >-
  Afadin is an actin filament (F-actin) and Rap1 small G protein-binding protein, found in cadherin-based adherens junctions in epithelial cells, endothelial cells, and fibroblasts. It interacts with cell adhesion molecules and signaling molecules and plays a role in the formation of cell junctions, cell polarization, migration, survival, proliferation, and differentiation. Afadin is a multi domain protein, that contains beside a myosin5-like CBD, two Ras-associated domains, a forkhead-associated domain, a PDZ domain, three proline-rich domains, and an F-actin-binding domain. The myosin5-like cargo binding domain (CBD) includes two helical lobules and C-terminal extension. The second lobule is also known as dilute domain.
