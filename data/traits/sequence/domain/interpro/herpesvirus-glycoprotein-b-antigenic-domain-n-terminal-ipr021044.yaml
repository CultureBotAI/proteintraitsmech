identifier: InterPro:IPR021044
label: "Herpesvirus Glycoprotein B, antigenic domain, N-terminal"
definition: >-
  This domain is found in viruses, and is approximately 40 amino acids in length. The domain is found in association with . There are two conserved sequence motifs: SVS and TSS. This entry represents the N-terminal antigenic domain of glycoprotein B of Human herpesvirus 5. Herpesviruses are enveloped by a lipid bilayer that contains at least a dozen glycoproteins. The virion surface glycoproteins mediate recognition of susceptible cells and promote fusion of the viral envelope with the cell membrane, leading to virus entry.
