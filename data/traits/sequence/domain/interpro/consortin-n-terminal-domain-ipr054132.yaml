identifier: InterPro:IPR054132
label: "Consortin, N-terminal domain"
definition: >-
  Consortin is a trans-Golgi network cargo receptor involved in targeting connexins to the plasma membrane. This entry represents a domain found towards its N-terminal that is predicted to show a helical configuration. Members of this group are mainly found in vertebrates.
