identifier: InterPro:IPR054577
label: "OBP47-like domain"
definition: >-
  This domain is found in the Anopheles gambiae odorant-binding protein AgamOBP47 ( ) and related insect proteins. OBP47 belongs a C-plus class OBP and possesses 13 cysteine residues. It folds into a eight helical structure instead of six as observed in the classical OBPs and no internal cavity.
