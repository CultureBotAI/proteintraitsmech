identifier: InterPro:IPR035489
label: "MYO15B, SH3 domain"
definition: >-
  Myosin XVb, also called KIAA1783, was named based on its similarity with myosin XVa. It is a transcribed and unprocessed pseudogene whose predicted amino acid sequence contains mutated or deleted amino acid residues that are normally conserved and important for myosin function.
