identifier: InterPro:IPR041058
label: "Alpha-(1,3)-fucosyltransferase FucT, N-terminal"
definition: >-
  This is the N-terminal domain of the alpha chain found in Helicobacter pylori Fucosyltransferase protein which is involved in the production of Lewis x trisaccharide, a major component of lipopolysaccharide. The N-terminal domain contains the catalyst base, Glu-95 which is equivalent to the Asp-100 of other members of the glycosyltransferases-B family. The domain contains the pocket where LacNAc binds. The domain is composed of 2-10 heptad repeats and a conserved N-terminal α-β-α motif which has little sequence similarity to the conserved N-terminal motif in other glycosyltransferases.
