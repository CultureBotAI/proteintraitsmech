identifier: InterPro:IPR048248
label: "Eukaryotic translation initiation factor 2D-like, PUA RNA-binding domain"
definition: >-
  This entry represents the RNA-binding PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain of human Eukaryotic translation initiation factor 2D (eIF2D) and similar eukaryotic proteins. eIF2D (also known as ligatin) is involved in the recruitment and delivery of aminoacyl-tRNAs to the P-site of the eukaryotic ribosome in a GTP-independent manner. The fly homologue, Malignant T-cell-amplified sequence 1 homolog from Drosophila melanogaster (MCTS1), regulates translation as part of a complex with DENR (non-canonical initiation factors density regulated protein). The yeast homologue Translation machinery-associated protein 64 (Tma64) from Saccharomyces cerevisiae, which is uncharacterised but also interacts with the 40S ribosomal subunit, is also included in this group of proteins.
