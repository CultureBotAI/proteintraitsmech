identifier: InterPro:IPR033491
label: "Probable E3 ubiquitin-protein ligase MID2, RING finger, HC subclass"
definition: >-
  MID2 shares high structural and functional similarities with MID1, an ubiquitin E3 ligase that regulates the turnover of microtubular protein phosphatase 2Ac. MID2 interacts with Astrin (a microtubule-organizing protein) and regulates Astrin levels to promote cell division. MID1 and MID2 may play roles in regulating tissue remodelling in early development. Mutations in the MID2 gene lead to human X-linked intellectual disability (XLID). This entry represents the HC-RING finger found at the N-terminal of MID2.
