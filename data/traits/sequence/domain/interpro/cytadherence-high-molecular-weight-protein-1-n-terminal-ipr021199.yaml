identifier: InterPro:IPR021199
label: "Cytadherence high molecular weight protein 1, N-terminal"
definition: >-
  This entry describes the N-terminal region of the Mycoplasma cytadherence protein high molecular weight protein 1 (HMW1), up to but not including the first EAGR box domain. The apparent orthologues in different Mycoplasma species differ profoundly in architecture C-terminally to the region described by this entry.
