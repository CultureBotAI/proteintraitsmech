identifier: InterPro:IPR060620
label: "Mediator of RNA polymerase II transcription subunit 33, C-terminal domain"
definition: >-
  This entry represents the C-terminal cullin-like repeats domain of Mediator of RNA polymerase II transcription subunit 33 (MED33) from plants, including MED33A and MED33B. The specific function of this domain remains to be determined. MED33A and MED33B are components of the Mediator complex, a coactivator involved in the regulated transcription of nearly all RNA polymerase II-dependent genes. The Mediator complex functions as a bridge to convey information from gene-specific regulatory proteins to the basal RNA polymerase II transcription machinery and are involved in repression of phenylpropanoid biosynthesis. MED33A and MED33B are involved in the repression of phenylpropanoid biosynthesis and may compete for common binding partners or for occupancy in Mediator. The proteins are localised to the nucleus.
