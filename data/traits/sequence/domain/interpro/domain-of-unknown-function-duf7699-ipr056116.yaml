label: "Domain of unknown function DUF7699"
definition: >-
  This domain of unknown function is found in Zinc finger CCCH domain-containing protein 62 from Oryza sativa (C3H62) and similar proteins from plants. Members of this family also show a SAP domain (Pfam:PF02037). This domain is predicted to adopt a mainly beta configuration.
