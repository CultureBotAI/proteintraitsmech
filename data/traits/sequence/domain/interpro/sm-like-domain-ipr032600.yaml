identifier: InterPro:IPR032600
label: "Sm-like domain"
definition: >-
  This domain, approximately 150 residues, is mainly found in several uncharacterised proteins from various Prochlorococcus and Synechococcus phages. The crystal structure of ECX21941 reveals unexpected similarity to Sm/LSm proteins, which are important RNA-binding proteins, despite no detectable sequence similarity. The specific function of this family is unknown, but the structure analysis of ECX21941 indicates nucleic acid-binding capabilities and suggests a role in RNA and/or DNA processing.
