identifier: InterPro:IPR029010
label: "ThuA-like domain"
definition: >-
  The overall fold of this domain is very similar the class I glutamine amidotransferase (GAT) domain, but the putative active site has a different structure. The structure has been solved for ThuA-like protein from Bacillus Stearothermophilus .
