identifier: InterPro:IPR062932
label: "SNF2-related helicase, N-terminal domain"
definition: >-
  This entry represents an N-terminal domain of approximately 100 residues found in SNF2-related ATP-dependent helicases in Actinomycetes, particularly Microbacteriaceae and Nocardioidaceae. The domain forms a four helix bundle and is located upstream of the SNF2-rel_dom ( ) and Helicase_C ( ) domains.
