identifier: InterPro:IPR049503
label: "HEPN, AbiJ-N-terminal domain 4"
definition: >-
  This entry represents a domain found in a group of prokaryotic proteins. In some proteins, it is found fused to AbiJ-like HEPN and heat repeats. It is predicted to adopt an α β structure.
