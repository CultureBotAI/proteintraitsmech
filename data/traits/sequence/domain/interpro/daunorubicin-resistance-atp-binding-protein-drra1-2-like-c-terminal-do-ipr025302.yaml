identifier: InterPro:IPR025302
label: "Daunorubicin resistance ATP-binding protein DrrA1/2-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of Daunorubicin resistance ATP-binding protein DrrA1/2 from Streptomyces coeruleorubidus, Multidrug efflux system ATP-binding protein Rv1218c from Mycobacterium tuberculosis, some putative ABC transporter proteins and related prokaryotic sequences. DrrA1/2 are part of the ABC transporter complex DrrA3B3 involved in daunorubicin efflux. Rv1218c is probably part of the ABC transporter complex Rv1217c-Rv1218c involved in the resistance to a wide range of structurally unrelated drugs.
