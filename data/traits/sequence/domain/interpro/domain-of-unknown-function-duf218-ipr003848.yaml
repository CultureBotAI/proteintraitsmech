identifier: InterPro:IPR003848
label: "Domain of unknown function DUF218"
definition: >-
  This domain contains several highly conserved charged amino acids, suggesting this may be an enzymatic domain. It is found in Escherichia coli YdcF, which has been shown to bind S-adenosyl-L-methionine (AdoMet), but whose biochemical function has not been identified. It is also found in Escherichia coli SanA and Salmonella typhimurium SfiX ( ), which are involved in vancomycin resistance. SfiX may also be involved in murein synthesis. This domain is also found in envelope biogenesis factor ElyC, which plays a critical role in the metabolism of the essential lipid carrier used for cell wall synthesis.
