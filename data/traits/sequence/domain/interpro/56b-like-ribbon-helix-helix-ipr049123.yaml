label: "56B-like, ribbon-helix-helix"
definition: >-
  This entry includes Sulfolobus virus proteins, including 56B from Sulfolobus virus SIRV1, which have a ribbon-helix-helix fold, very similar to that of bacterial RHH proteins. 56B binds DNA.
