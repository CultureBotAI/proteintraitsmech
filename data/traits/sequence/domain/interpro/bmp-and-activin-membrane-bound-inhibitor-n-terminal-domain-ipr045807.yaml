identifier: InterPro:IPR045807
label: "BMP and activin membrane-bound inhibitor, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the BAMBI proteins. This domain might contain putative extracellular domains. This entry consists of several eukaryotic BMP and activin membrane-bound inhibitor (BAMBI) proteins. Members of the transforming growth factor-beta (TGF-beta) superfamily, including TGF-beta, bone morphogenetic proteins (BMPs), activins and nodals, are vital for regulating growth and differentiation. BAMBI is related to TGF-beta-family type I receptors but lacks an intracellular kinase domain. BAMBI is an essential regulator of cell proliferation and differentiation that represses TGF-beta and enhances Wnt/beta-catenin signalling in various cell types. Thus, it is involved in a high number of physiological and pathological processes. It stably associates with TGF-beta-family receptors and inhibits BMP and activin as well as TGF-beta signalling.
