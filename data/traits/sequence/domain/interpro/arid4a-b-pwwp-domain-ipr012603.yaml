identifier: InterPro:IPR012603
label: "ARID4A/B, PWWP domain"
definition: >-
  This is the PWWD domain which is found N-terminal to the ARID/BRIGHT domain in proteins of the Retinoblastoma-binding protein 1 family. Retinoblastoma-binding protein 1 (RBBP1, also known as (ARID4A) AT-rich interactive domain-containing protein 4A) and RBBP1-like 1 (RBBP1L1, also known as (ARID4B) AT-rich interactive domain-containing protein 4B) are homologous proteins involved in cell cycle control. RBBP1 contributes to suppression of cancers such as leukemia and regulates the epigenetics of several genetic diseases including Prader-Willi's syndrome. Together with retinoblastoma protein (RB) and Sin3, RBBP1 and RBBP1L1 form the Sin3 complex involved in gene regulation and epigenetic regulation functions. They also function as transcriptional coactivators for the androgen receptor (AR) and RB, being important for the AR and RB regulatory pathways, involved in the regulation of Sertoli cell function and male fertility. These proteins contain five domains, namely Tudor, PWWP, ARID, chromobarrel and R2 domains, connected by intrinsically disordered regions.
