identifier: InterPro:IPR053875
label: "Cytochrome c-type protein NrfB-like domain"
definition: >-
  This entry includes Cytochrome c-type protein NrfB and similar proteins, which plays a role in nitrite reduction. These proteins contain several copies of the CXXCH haem-binding motif.
