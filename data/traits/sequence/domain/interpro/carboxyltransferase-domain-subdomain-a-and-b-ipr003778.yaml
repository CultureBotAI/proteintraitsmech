identifier: InterPro:IPR003778
label: "Carboxyltransferase domain, subdomain A and B"
definition: >-
  Urea carboxylase (UC) catalyses a two-step, ATP- and biotin-dependent carboxylation reaction of urea. It is composed of biotin carboxylase (BC), carboxyltransferase (CT), and biotin carboxyl carrier protein (BCCP) domains. The CT domain of UC consists of four subdomains, named A, B, C and D. This domain covers the A and B subdomains of the CT domain. This domain covers the whole length of KipA (kinase A) from Bacillus subtilis. It can also be found in S. cerevisiae urea amidolyase Dur1,2, which is a multifunctional biotin-dependent enzyme with domains for urea carboxylase and allophanate (urea carboxylate) hydrolase activity. KipA forms a complex with KipI, which is covered by the C and D subdomains of the CT. The KipI-KipA complex shares protein structure and sequence similarity with the CT domain of urea amidolyase from K. lactis, but residues that are important for CT catalysis are not conserved in KipA and KipI. Therefore, the KipA-KipI complex is unlikely to have CT activity.
