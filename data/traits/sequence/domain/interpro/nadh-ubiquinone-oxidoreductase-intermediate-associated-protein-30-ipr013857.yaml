identifier: InterPro:IPR013857
label: "NADH:ubiquinone oxidoreductase intermediate-associated protein 30"
definition: >-
  Mitochondrial complex I intermediate-associated protein 30 (CIA30) is present in human and mouse, and also in Schizosaccharomyces pombe (Fission yeast) which does not contain the NADH dehydrogenase component of complex I, or many of the other essential subunits. This means it is not directly involved in oxidative phosphorylation. In Drosophila it has been shown to be a chaperone required for assembly complex I.
