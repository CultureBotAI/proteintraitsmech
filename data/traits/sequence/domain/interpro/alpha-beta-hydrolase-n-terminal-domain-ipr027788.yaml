identifier: InterPro:IPR027788
label: "Alpha/beta-hydrolase, N-terminal domain"
definition: >-
  This is the N-terminal transmembrane domain of a family of α/β hydrolases which may function as lipases. The C-terminal domain is the catalytic domain.
