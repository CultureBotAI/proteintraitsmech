identifier: InterPro:IPR024163
label: "Aerotolerance regulator, N-terminal"
definition: >-
  The Batl operon appears to be important in pathogenicity and aerotolerance. BatA ( ) ensures bacterial survival in the early stages of the infection process, when the infected sites are aerobic, and is produced under conditions of oxidative stress. Proteins produced by the Batl operon share a highly-conserved sequence at their N terminus and the full length proteins carry multiple membrane-spanning domains. This entry represents the conserved N-terminal domain, which is also found in some uncharacterised proteins.
