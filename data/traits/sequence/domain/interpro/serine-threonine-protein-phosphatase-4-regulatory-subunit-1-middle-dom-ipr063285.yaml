identifier: InterPro:IPR063285
label: "Serine/threonine-protein phosphatase 4 regulatory subunit 1, middle domain"
definition: >-
  This entry represents the middle domain of protein phosphatase 4 regulatory subunit 1 (PPFR-1). The full-length protein is a regulatory subunit of serine/threonine-protein phosphatase PP4 that plays a role in meiosis and embryonic mitosis. PPFR-1 regulates microtubule severing during oocyte meiosis II by dephosphorylating and activating MEI-1, a component of the katanin microtubule severing complex. The protein associates with catalytic subunit PPH-4.1 and interacts with MEL-26 via its C-terminal region. PPFR-1 is found in nematodes and localises to the cytoplasm during meiosis and mitosis.
