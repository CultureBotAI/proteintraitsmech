identifier: InterPro:IPR040610
label: "SNRNP25, ubiquitin-like domain"
definition: >-
  This domain has a ubiquitin-like fold found in a diverse range of proteins including RNP25. RNP25 is a component of the U11/U12 snRNPs that are part of the U12-type spliceosome. It contains a conserved ubiquitin-like (Ubl) domain with a β-grasp Ubl fold, a common structure involved in protein-protein interactions.
