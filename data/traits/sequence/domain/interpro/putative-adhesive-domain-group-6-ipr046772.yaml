identifier: InterPro:IPR046772
label: "Putative adhesive domain (group 6)"
definition: >-
  This entry represents a domain that resembles the SdrG_C_C adhesive domain, known to bind within a supra-domain with the SDR-like Ig domain ( ) to fibrinogen. It is found N-terminal to repeating stalk domains in bacterial surface proteins.
