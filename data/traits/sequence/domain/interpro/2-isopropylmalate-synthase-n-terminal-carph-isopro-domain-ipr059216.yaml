identifier: InterPro:IPR059216
label: "2-isopropylmalate synthase, N-terminal carph-isopro domain"
definition: >-
  The carph-isopro domain, which is about 60 amino acids long, is found at the N-terminal end of 2-isopropylmalate synthase Neisseria gonorrhoeae and similar proteins from tailed bacteriophages and bacterial proteins. LeuA catalyses the condensation of the acetyl group of acetyl-CoA with 3-methyl-2-oxobutanoate (2-ketoisovalerate) to form 3-carboxy-3-hydroxy-4-methylpentanoate (2-isopropylmalate). This domain is predicted to be composed mostly of α-helical structure, and contains a near-invariant Trp residue.
