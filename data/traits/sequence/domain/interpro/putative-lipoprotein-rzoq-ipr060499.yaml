identifier: InterPro:IPR060499
label: "Putative lipoprotein RzoQ"
definition: >-
  This entry represents the putative lipoprotein RzoQ found in Escherichia coli. This small protein of 84 amino acids is predicted to be a lipoprotein localised to the cell membrane via an N-terminal lipid anchor. The gene rzoQ is entirely encoded within the coding sequence of rzpQ ( ) on the same strand but in a different reading frame. The function of this protein remains to be determined. This entry also includes some uncharacterised viral proteins.
