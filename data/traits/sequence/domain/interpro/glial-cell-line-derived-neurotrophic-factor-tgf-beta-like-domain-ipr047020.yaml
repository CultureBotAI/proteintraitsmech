identifier: InterPro:IPR047020
label: "Glial cell line-derived neurotrophic factor, TGF-beta-like domain"
definition: >-
  This group represents glial cell line-derived neurotrophic factor (GDNF). This is a neurotrophic factor that enhances survival and morphological differentiation of dopaminergic neurons and increases their high-affinity dopamine uptake. Defects in GDNF are a cause of congenital central hypoventilation syndrome (also known as Ondine's curse) and are also linked with Hirschsprung disease. This entry represents the transforming growth factor beta (TGF-beta)-like domain of GDNF.
