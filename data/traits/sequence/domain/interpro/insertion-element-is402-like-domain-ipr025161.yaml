identifier: InterPro:IPR025161
label: "Insertion element IS402-like domain"
definition: >-
  This entry represents a domain found in Insertion element IS402 from Burkholderia cepacia and similar sequences mainly found in prokaryotes. Members of this group are putative transposases of the IS4/IS5 family.
