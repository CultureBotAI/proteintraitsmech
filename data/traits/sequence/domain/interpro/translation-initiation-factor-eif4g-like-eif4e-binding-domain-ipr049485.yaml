identifier: InterPro:IPR049485
label: "Translation initiation factor eIF4G-like, eIF4E-binding domain"
definition: >-
  This domain is found in proteins from insects and fish, including Translation initiation factor eIF4G (eIF4G1) from Drosophila melanogaster ( ). This domain shows a canonical helix, a linker and an elbow loop. It contains a conserved sequence motif YXR/KXXLXXXR/K/Q that plays a role in the interaction with eIF4E.
