identifier: InterPro:IPR047071
label: "Kelch-like protein 24, BACK domain"
definition: >-
  The KLHL (Kelch-like) proteins generally have a BTB/POZ domain, a BACK domain, and five to six Kelch motifs. They constitute a subgroup at the intersection between the BTB/POZ domain and Kelch domain superfamilies. The BTB/POZ domain facilitates protein binding, while the Kelch domain (repeats) form β-propellers. The Kelch superfamily of proteins can be subdivided into five groups: (1) N-propeller, C-dimer proteins, (2) N-propeller proteins, (3) propeller proteins, (4) N-dimer, C-propeller proteins, and (5) C-propeller proteins. KLHL family members belong to the N-dimer, C-propeller subclass of Kelch repeat proteins. In addition to BTB/POZ and Kelch domains, the KLHL family members contain a BACK domain, first described as a 130-residue region of conservation observed amongst BTB-Kelch proteins. Many of the Kelch-like proteins have been identified as adaptors for the recruitment of substrates to Cul3-based E3 ubiquitin ligases. Kelch-like protein 24 (KLHL24, also known as kainate receptor-interacting protein for GluR6 (KRIP6) or protein DRE1) belongs to the KLHL family. is necessary to maintain the balance between intermediate filament stability and degradation, a process that is essential for skin integrity. KLHL24 is a component of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex that mediates ubiquitination of KRT14 and controls its levels during keratinocyte differentiation [ , , , , . KLHL24 binds to and regulates the GluR6a kainate receptor. It also modulates the interaction of PICK1 with GluR6 kainate receptors. Kainate receptors (KAR) are ionotropic receptors that respond to the neurotransmitter glutamate and have been implicated in epilepsy, stroke, Alzheimer's and neuropathic pain. This entry represents the BACK domain.
