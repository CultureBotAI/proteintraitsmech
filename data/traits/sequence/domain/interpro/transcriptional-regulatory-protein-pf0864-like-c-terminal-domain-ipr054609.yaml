identifier: InterPro:IPR054609
label: "Transcriptional regulatory protein PF0864-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the Transcriptional Regulatory Protein PF0864 from Pyrococcus furiosus and similar prokaryotic proteins. PF0864 is 162 amino acids long and contains an N-terminal HTH asnC-type domain responsible for DNA binding. The crystal structure of PF0864 reveals a dimeric α-β barrel structure of this region which is related to . The function and specific role of PF0864 in transcriptional regulation remains unknown.
