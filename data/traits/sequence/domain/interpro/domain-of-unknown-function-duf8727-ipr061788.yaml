identifier: InterPro:IPR061788
label: "Domain of unknown function DUF8727"
definition: >-
  This entry represents a C-terminal α-helical domain of approximately 130 residues. The domain is found at the C terminus of proteins that typically contain an AAA_5 domain and sometimes an MrcB_N domain. These proteins are often annotated as restriction endonucleases or dynein-related ATPases. This family is found in bacteria including Bacillota, Pseudomonadota and Bacteroidota. The function of this domain remains to be determined.
