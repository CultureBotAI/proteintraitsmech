identifier: InterPro:IPR062097
label: "GANP, MCM3AP C-terminal domain"
definition: >-
  This is the helical domain found at the C-terminal of Germinal-center associated nuclear protein (GANP), a component of the TREX-2 complex, involved in the export of mRNAs to the cytoplasm through nuclear pores. Through the acetylation of histones, it affects the assembly of nucleosomes at immunoglobulin variable region genes and promotes the recruitment and positioning of transcription complex to favour DNA cytosine deaminase AICDA/AID targeting, hence promoting somatic hypermutations. This domain is found after and together have been described as the MCM3AP domain that is required to recruit ENY2.
