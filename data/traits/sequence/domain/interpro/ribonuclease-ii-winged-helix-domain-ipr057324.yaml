identifier: InterPro:IPR057324
label: "Ribonuclease II, winged helix domain"
definition: >-
  This entry represents a winged helix domain found in ribonuclease II (RNR1) from Arabidopsis thaliana and similar sequences from plants, cyanobacteria and some proteobacterial species. RNR1 is a 3'-5' exoribonuclease that catalyses 3' maturation of chloroplast and mitochondrion ribosomal RNAs. It degrades short nucleotidic extensions to generate the mature 3'-ends. It is involved in the maturation of 23S, 16S and 5S rRNAs.
