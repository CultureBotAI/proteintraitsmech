identifier: InterPro:IPR061785
label: "Domain of unknown function DUF8724"
definition: >-
  This entry represents a bacterial domain of approximately 220 residues. The domain is predominantly found in Actinomycetes, particularly Streptomycetaceae and related species, as well as in Pseudomonadota. In some proteins, this domain is found N-terminal to the MZB domain. The function of this domain remains to be determined.
