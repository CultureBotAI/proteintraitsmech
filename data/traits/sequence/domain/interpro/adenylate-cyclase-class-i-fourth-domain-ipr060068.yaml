identifier: InterPro:IPR060068
label: "Adenylate cyclase, class-I, fourth domain"
definition: >-
  This entry represents the fourth domain of class-I adenylate cyclases. It is predicted to contain anti-parallel β-sheets and α-helices. Adenylate cyclase is the enzyme responsible for the synthesis of cAMP from ATP. On the basis of sequence similarity, it has been proposed that there are three different classes of adenylate cyclases. Class I cyclases are found in enterobacteria and related Gram-negative bacteria.
