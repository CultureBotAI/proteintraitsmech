identifier: InterPro:IPR048414
label: Histone-lysine N-methyltransferase PRDM9-like, C2H2 zinc finger-like
definition: >-
  This C2H2 zinc finger is found in human Histone-lysine N-methyltransferase PRDM9 ( ) and related proteins. PRDM9 sequentially mono-, di-, and tri-methylates both 'Lys-4' (H3K4) and 'Lys-36' (H3K36) of histone H3 and is a key determinant of the localisation of meiotic recombination hot spots in humans and mice. This zinc finger is also found in Zinc finger proteins ZNF589, ZNF875 and ZNF343 that are though to be involved in transcriptional regulation. Members of this group of proteins are usually found in vertebrates.
