identifier: InterPro:IPR056285
label: "CdsD, PD1 domain"
definition: >-
  This domain is found in CdsD from Chlamydia trachomatis ( ) and similar sequences. CdsD is a structural contact-dependent secretion (Cds) protein that forms part of the basal body of the type III secretion system (T3SS) injectisome of the bacteria. The periplasmic part of this protein contains 3 domains: PD1 (represented in this entry), PD2 ( ) and PD3 ( ), all of them sharing the same α-β-β-α-β topology, known as the BON fold.
