label: "Synaptotagmins 15/17, C2A domain"
definition: >-
  Synaptotagmins (Syts) are membrane-trafficking proteins characterised by a N-terminal transmembrane region, a linker, and 2 C-terminal C2 domains. They have been widely studied for their role in the trafficking and exocytosis of secretory vesicles. All Syts contain two C2 domains separated by a short flexible linker. Previously, all synaptotagmins were thought to be calcium sensors in the regulation of neurotransmitter release and hormone secretion, but it has been shown that not all of them bind calcium. Human synaptotagmin 15 (Syt-15) has 2 alternatively spliced forms that encode proteins with different C-terminal. The larger, SYT15a, contains a N-terminal TM region, a putative fatty-acylation site, and 2 tandem C-terminal C2 domains. The smaller, SYT15b, lacks the C-terminal portion of the second C2 domain. Unlike most other synaptotagmins, it is nearly absent in the brain and rather is found in the heart, lungs, skeletal muscle, and testis. Synaptotagmin 17 is located in the brain, kidney, and prostate and is thought to be a peripheral membrane protein. It is an unusual Syt isoform that lacks an N-terminal transmembrane domain, rather, it associates with membranes via a string of fatty-acylated cysteine residues near the N-terminal of the protein, and it does not bind calcium. In hippocampal neurons, it is localized to the Golgi complex, where it mediates the import of vesicles from the endoplasmic reticulum to support neurite outgrowth and facilitate axon regrowth after injury. There is a second pool of Syt-17 on early endosomes in neurites. These two pools control two crucial, independent membrane trafficking pathways in neurons and loss of this protein disrupts endocytic trafficking, resulting in the accumulation of excess postsynaptic AMPA receptors and defecti…
