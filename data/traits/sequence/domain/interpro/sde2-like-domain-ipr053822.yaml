identifier: InterPro:IPR053822
label: "SDE2-like domain"
definition: >-
  SDE2 (silencing defective 2) is a ubiquitin-fold-containing splicing regulator that supports splicing of selected pre-mRNAs in an intron-specific manner in Schizosaccharomyces pombe. This splicing regulator is conserved among intron-rich eukaryotes up to humans, but is absent in intron-poor organisms such as S. cerevisiae. SDE2 is important in pre-mRNA splicing in mammalian cells. Human SDE2 is a regulatory component of the fork protection complex (FPC) at active and stalled replication forks. SDE2 is translated as an inactive precursor harbouring an ubiquitin-fold at its N-terminal that is processed by deubiquitinating enzymes (DUBs, Ubp5 and Ubp15 in S.pombe) in a conserved GG-K motif to form activated K-Sde2-C, which is necessary to get incorporated into the spliceosome. SDE2 is both an RNA-binding protein and also a trans-acting adaptor protein that functions to regulate RNA splicing and ribosome biogenesis. This entry represents the SDE2 domain, a coiled-coil domain required for the interaction of SDE2 with TIMELESS (TIM), which promotes stable association of the FPC at active replication forks.
