identifier: InterPro:IPR015131
label: Killer toxin, Kp4
definition: >-
  Killer toxins are polypeptides secreted by some fungal species that kill sensitive cells of the same or related species, often functioning by creating pores in target cell membranes. The fungal killer toxin KP4 from the corn smut fungus, Ustilago maydis (Smut fungus), is encoded by a resident symbiotic double-stranded RNA virus, Ustilago maydis P4 virus (UmV4), within fungal cells. Unlike most killer toxins, KP4 is a single polypeptide. KP4 inhibits voltage-gated calcium channels in mammalian cells, which in turn inhibits cell growth and division by blocking calcium import. KP4 adopts a structure consisting of a two-layer α/β sandwich with a left-handed crossover.
