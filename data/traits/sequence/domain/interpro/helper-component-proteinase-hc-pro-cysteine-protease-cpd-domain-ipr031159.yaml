identifier: InterPro:IPR031159
label: "Helper-component proteinase (HC-Pro) cysteine protease (CPD) domain"
definition: >-
  This entry represents the CPD domain of the HC-Pro protein. Potyviruses form one of the most numerous groups of plant viruses and are a major cause of crop loss worldwide. The helper-component proteinase (HC-Pro) is an indispensable, multifunctional protein of members of the genus Potyvirus and other viruses of the family Potyviridae. It is directly involved in diverse steps of viral infection, such as aphid plant-to-plant transmission, polyprotein processing, and suppression of host antiviral RNA silencing. HC-Pro is generally divided into three functional domains: a N-terminal domain, a central region, and a cysteine protease domain (CPD) in the C-terminal region. The HC-Pro CPD domain has a protease activity that autocatalytically cleaves a Gly-Gly dipeptide at its own C terminus to release HC-Pro from the rest of the viral polyprotein. Cysteine and histidine residues form the catalytic dyad at the active site. The HC-Pro CPD domain constitutes the peptidase family C6 of the CA clan. The HC-Pro CPD domain adopts a compact oval-shaped α/β fold. The secondary structure elements include four α-helices (alpha1-alpha4) and two short β-strands (beta1 and beta2) arranged in the order alpha1-alpha2-alpha3-beta1-beta2-alpha4. In addition, two 3(10) helices are located between alpha3 and beta1 and downstream of alpha4. The four helices form a helix bundle packed against one face of a short β-hairpin formed by strands beta1 and beta2. The catalytic residue Cys is located at the N terminus of helix alpha1, and the other catalytic residue His is located on strand beta2. The substrate binding cleft is lined by the loop connecting helices alpha2 and alpha3 and the N-terminal region of helix alpha1 on one side and by strand beta2 on the other side.
