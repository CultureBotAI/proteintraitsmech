identifier: InterPro:IPR060641
label: "SPBC1E8.03c, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of SPBC1E8.03c, an uncharacterised protein from Schizosaccharomyces pombe. This domain adopts a Rossmann fold structure. SPBC1E8.03c is a 550-amino acid glycoprotein localised to the endoplasmic reticulum. The protein contains a signal peptide and two N-linked glycosylation sites. The specific function of this domain remains to be determined.
