identifier: InterPro:IPR033423
label: "Gammaproteobacterial periplasmic sensor domain GAPES4"
definition: >-
  GAPES4 (GAmmaproteobacterial PEriplasmic Sensor) domain is a periplasmic sensor domain found in various GGDEF- and EAL-containing proteins. In Escherichia coli, GAPES4 forms the N-terminal domain of the regulatory protein CsrD (YhdA), which contains enzymatically inactive GGDEF and EAL domains and controls the degradation of two non-coding RNAs, CsrB and CsrC. In Vibrio cholerae, GAPES4-containing protein MshH inhibits biofilm formation, apparently acting through the glucose-specific enzyme IIA.
