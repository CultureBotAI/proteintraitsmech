identifier: InterPro:IPR023128
label: "Protein N-terminal glutamine amidohydrolase, alpha beta roll"
definition: >-
  This entry represents a structural domain found in the N-terminal glutamine amidohydrolase (Nt Q -amidase) family of proteins. These proteins contain a region of approximately 200 residues carrying several distinctive motifs including a WDYHV motif and one of three cysteines. Protein N-terminal glutamine amidohydrolase is responsible for degradation of N-terminal glutamine.
