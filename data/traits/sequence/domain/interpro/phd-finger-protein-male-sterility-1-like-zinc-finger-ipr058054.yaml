identifier: InterPro:IPR058054
label: "PHD finger protein MALE STERILITY 1-like, Zinc finger"
definition: >-
  This entry represents the PHD (homeodomain) zinc finger domain in MS1, PTC1 and similar proteins found in plants. PHD finger protein MALE STERILITY 1 (MS1) is a nuclear transcriptional activator essential for anther and post-meiotic pollen development and maturation. It plays a key role in tapetal development, pollen wall biosynthesis, and may also influence inflorescence branching and floral development. MS1 contains both a leucine zipper-like domain and a plant homeodomain (PHD) finger motif, which are critical for its function. MMD1, encoded by the DUET gene, is another PHD finger protein expressed specifically in male meiocytes. It is required for proper male meiotic chromosome organisation and progression, and is thought to regulate gene expression during meiosis. Loss-of-function mutations in MMD1 lead to cell death in male meiocytes, highlighting its essential role in male gametophyte development. PHD finger protein PERSISTENT TAPETAL CELL 1 from Oryza sativa (PTC1) also belongs to this group. PTC1 is thought to be a transcriptional activator required for tapetal programmed cell death and degeneration, and pollen development in anthers.
