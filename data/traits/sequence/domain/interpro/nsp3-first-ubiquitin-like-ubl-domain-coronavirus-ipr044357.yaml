identifier: InterPro:IPR044357
label: "NSP3, first ubiquitin-like (Ubl) domain, coronavirus"
definition: >-
  Nsp3 comprises various domains of functional and structural importance for virus replication, the organization of which differs between CoV genera, due to duplication or absence of some domains. Two ubiquitin-like domains, Ubl1 and Ubl2 (Nsp3a and the N-terminal domain of Nsp3d), exist within Nsp3 of all CoVs. The known functional roles of Nsp3a Ubl in CoVs are related to single-stranded (ssRNA) binding and interacting with the nucleocapsid (N) protein. Nsp3d Ubl is immediately adjacent to the N terminus of the PLpro (or PL2Pro) domain in CoV polyproteins, and it may play a critical role in protease regulation and stability as well as in viral infection. In addition to the four β-strands and two α-helices that are common to ubiquitin-like folds, the Nsp3a Ubl domain contains two short helices. The Nsp3d Ubl domain comprises five β-strands, one α-helix, and one 3(10)-helix. This entry represents a domain covering the entire CoV Nsp3a and Nsp3d first Ubl domain. NSP3a interacts with numerous other proteins involved in replication and transcription and may serve as a scaffolding protein for these processes. The Ubl1 domain interacts with N protein to co-localise genomic RNA with the nascent replicase-transcriptase complex at the earliest stages of infection, essential for the virus. This Ubl1 domain may bind ssRNA with AUA patterns. The C-terminal Glu-rich subdomain is best described as a flexible tail attached to the globular UB1 subdomain. Non-structural protein NSP3 is a multi-domain protein, the largest product of coronavirus ORF1a which encodes the poyprotein 1a/1ab (pp1a/1ab). NSP3 is released from pp1a/1ab by the papain-like protease domain(s), which is (are) part of NSP3 itself. NSP3 plays many roles in the viral life cycle. It can act as a scaffold protein to int…
