identifier: InterPro:IPR023226
label: Glycoside hydrolase, family 49, N-terminal domain
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. Dextranase ( ) and isopullulanase ( ) are members of glycoside hydrolase family 49 ( ). Dextranase hydrolyses alpha-1,6-glycosidic bonds in dextran polymers. The N-terminal domain of these enzymes forms a β-sandwich structure that is similar to the immunoglobulin fold but contains two extra strands..
