identifier: InterPro:IPR014911
label: "Type 4 secretion system, PilS, N-terminal"
definition: >-
  Type IV pili are bacterial virulence-associated adhesins that promote bacterial attachment to host cells. In Salmonella typhi, the structural pilin protein PilS interacts with the cystic fibrosis transmembrane conductance regulator. Mutagenesis studies suggest that residues on an α-β loop and the C-terminal disulphide-bonded region of PilS might be involved in binding specificity of the pilus.
