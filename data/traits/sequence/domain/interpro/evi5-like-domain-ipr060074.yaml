identifier: InterPro:IPR060074
label: "EVI5-like domain"
definition: >-
  This entry represents a domain found in human Ecotropic viral integration site 5 protein homolog (EVI5), the uncharacterised protein DDB_G0272194 from Dictyostelium discoideum, and similar sequences predominantly found in vertebrates that also have a Rab-GAP-TBC domain ( ). EVI5 functions as a regulator of cell cycle progression by stabilising the FBXO5 protein and promoting cyclin-A accumulation during interphase. It may play a role in cytokinesis.
