identifier: InterPro:IPR007689
label: A-alpha-Y mating type-dependent binding domain
definition: >-
  Mating-type protein A-alpha specifies the A-alpha-Y mating type. The A-alpha-Y protein binds to the AalphaZ protein of another mating type in Schizophyllum commune and may also regulate gene expression of the homokaryotic cell.
