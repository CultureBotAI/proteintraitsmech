identifier: InterPro:IPR064054
label: "Intraflagellar transport protein 70, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of intraflagellar transport protein 70 (IFT70), also known as tetratricopeptide repeat protein 30 (TTC30). The domain contains tetratricopeptide repeats (TPRs). IFT70 is a component of the intraflagellar transport complex B (IFT-B) and is required for polyglutamylation of axonemal tubulin. The protein plays a role in anterograde intraflagellar transport, the process by which cilia precursors are transported from the base of the cilium to the tip. In C. elegans, the orthologue DYF-1 is specifically required for kinesin OSM-3 to dock onto and move IFT particles. This group of proteins is found in metazoans.
