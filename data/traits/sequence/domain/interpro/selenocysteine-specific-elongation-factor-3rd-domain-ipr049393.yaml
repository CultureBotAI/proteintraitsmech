identifier: InterPro:IPR049393
label: "Selenocysteine-specific elongation factor, 3rd domain"
definition: >-
  This domain is found in Selenocysteine-specific elongation factor from humans (eEFSec) and similar sequences mainly found in animals. eEFSec is a translation factor necessary for the incorporation of selenocysteine into proteins. This protein adopts a chalice-like structure composed of four domains. This entry represents the third domain, which shows seven antiparallel β-strands and a long α-helix.
