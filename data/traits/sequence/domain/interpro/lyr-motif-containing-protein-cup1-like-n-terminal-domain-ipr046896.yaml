identifier: InterPro:IPR046896
label: "LYR motif-containing protein Cup1-like, N-terminal domain"
definition: >-
  This entry represents a domain found at the N-terminal end of fungal LYR domain-containing proteins, including Cup1 (caffeine unstable phenotype 1, previously known as uncharacterised protein C17G9.13c) from S. pombe. Cup1 is a mitochondrial protein whose silencing by heterochromatin island formation results in caffeine resistance. LYR-motif containing proteins are basic polypeptides carrying a conserved tripeptide L-Y-R (leucine/tyrosine/arginine) sequence close to the N terminus in addition to some basic arginine/lysine residues and a highly-conserved phenylalanine downstream of the LYR motif.
