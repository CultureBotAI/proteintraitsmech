identifier: InterPro:IPR027907
label: "BTB/POZ domain-containing protein 8, C-terminal"
definition: >-
  This domain is found in vertebrates. It is found at the C terminus of BTB/POZ domain-containing protein 8 (BTBD8, also known as AP2-interacting clathrin-endocytosis protein). BTBD8 is involved in clathrin-mediated endocytosis at the synapse and plays a role in neuronal development and in synaptic vesicle recycling in mature neurons, a process required for normal synaptic transmission. This domain contains a conserved ELET sequence motif and two completely conserved residues (S and E) that may be functionally important.
