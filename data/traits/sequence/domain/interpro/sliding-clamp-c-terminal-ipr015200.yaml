identifier: InterPro:IPR015200
label: Sliding clamp, C-terminal
definition: >-
  This domain is essential for the interaction of the sliding clamp (also known as gp45) with the corresponding polymerase. It adopts a DNA clamp fold, consisting of two α-helices and two β-sheets - the fold is duplicated and has internal pseudo two-fold symmetry.
