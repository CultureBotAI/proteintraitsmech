label: "Domain of unknown function DUF6834"
definition: >-
  This presumed domain is found at the C terminus of uncharacterised protein AF_2093 from Archaeoglobus fulgidus ( ) and similar proteins of unknown function mainly from archaea. This domain has structural similarity to type II restriction endonucleases ( ).
