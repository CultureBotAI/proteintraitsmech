identifier: InterPro:IPR055645
label: "DeoxyPurine in DNA protein A"
definition: >-
  This entry, previously known as DUF7221, represents the DpdA family of proteins, which are involved in the insertion of deazapurine modifications in bacterial and phage DNA. DpdA proteins are paralogues of tRNA-guanine transglycosylases (TGT), but have evolved to act on DNA rather than RNA. They catalyze the incorporation of 7-deazaguanine derivatives such as dADG (7-amido-7- deazaguanine) and dpreQ0 (7-cyano-7-deazaguanine) into DNA, which is thought to function as a protection mechanism against endonucleases. The dpdA gene is typically part of a genomic island, along with dpdB, dpdC and dpdD genes, and is proposed to be part of a restriction/ modification system that protects bacteria from foreign DNA.
