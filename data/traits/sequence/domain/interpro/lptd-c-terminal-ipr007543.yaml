identifier: InterPro:IPR007543
label: LptD, C-terminal
definition: >-
  Lipopolysaccharide (LPS) is essential for most Gram-negative bacteria and has crucial roles in protection of the bacteria from harsh environments and toxic compounds, including antibiotics. LptD is an essential outer membrane protein that mediates the final transport of lipopolysaccharide (LPS) to outer leaflet. Structural analysis indicates that LptD forms a novel 26-stranded β-barrel. It interacts with LptE where LptE adopts a roll-like structure located inside the barrel of LptD. The LPS translocon LptD is unable to fold properly in the absence of LptE and the two proteins form a unique barrel and plug architecture for LPS transport and insertion. It has been suggested that LptD is a promising target for the development of effective vaccines and antibody-based therapies to control Vibrio infection. LptD comprises a C-terminal β-barrel domain embedded in the outer membrane and an N-terminal domain that sits in the periplasm. This entry represents the C-terminal domain.
