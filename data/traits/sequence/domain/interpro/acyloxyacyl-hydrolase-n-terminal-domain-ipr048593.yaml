identifier: InterPro:IPR048593
label: "Acyloxyacyl hydrolase, N-terminal domain"
definition: >-
  This entry represents a saposin-like domain found at the N-terminal of some SGNH hydrolase enzymes such as Acyloxyacyl hydrolase (AOAH). In this enzyme, the substrate's lipid moiety is accommodated in a large hydrophobic pocket formed by the saposin and catalytic domains with a secondary acyl chain inserted into a narrow lateral hydrophobic tunnel at the active site.
