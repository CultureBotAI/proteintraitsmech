identifier: InterPro:IPR048888
label: "BibA adhesin-like, stalk domain"
definition: >-
  BibA, a group B streptococcus (GBS) surface protein, has been shown to protect the pathogen from phagocytic killing by sequestering a complement inhibitor: C4b-binding protein (C4BP). This entry represents a three helical repeated domain in this protein.
