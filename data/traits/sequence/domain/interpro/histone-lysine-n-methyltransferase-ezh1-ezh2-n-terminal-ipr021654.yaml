identifier: InterPro:IPR021654
label: Histone-lysine N-methyltransferase EZH1/EZH2, N-terminal
definition: >-
  The Polycomb Repressive Complex 2 (PRC2) is a chromatin modifying complex that consists of three core components: EED, SUZ12 and one of the two histone H3K27 methyltransferases, EZH1 or EZH2. The PRC2 complex catalyses di- and trimethylation of histone H3 lysine 27 (H3K37me2/3), which has a repressive role. Even though EZH1 and EZH2 form similar PRC2 complexes, they exhibit contrasting repressive roles. In terms of their expression in mice, EZH1 is more abundant in nonproliferative adult organs, while EZH2 expression is tightly associated with proliferation. This entry represents a short conserved helix found at the N-terminal.
