identifier: InterPro:IPR048654
label: "RHA1_ro05818, N-terminal helical domain"
definition: >-
  This domain is found at the N terminus of the RHA08564 protein from Rhodococcus jostii ( ) and similar sequences from actinomycetes. This protein is thought to be a thioesterase involved in the metabolism of cholate. This protein has a 4HBT domain ( ) at the C-terminal. The N-terminal domain shows an helical fold.
