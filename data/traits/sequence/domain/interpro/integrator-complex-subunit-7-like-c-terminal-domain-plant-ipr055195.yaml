identifier: InterPro:IPR055195
label: "Integrator complex subunit 7-like, C-terminal domain, plant"
definition: >-
  This entry represents a C-terminal domain found in the putative Integrator complex subunit 7 (INTS7) from plants. INTS7 is a component of the integrator complex, a complex that is recruited to the U1 and U2 snRNA genes and mediates the snRNAs' 3' end processing. The integrator complex interacts with the C-terminal tail of the largest subunit of RNA-polymerase II to promote 3'-snRNA processing.
