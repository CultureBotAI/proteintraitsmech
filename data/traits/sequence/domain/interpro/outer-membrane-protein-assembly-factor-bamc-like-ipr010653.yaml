identifier: InterPro:IPR010653
label: "Outer membrane protein assembly factor BamC-like"
definition: >-
  Outer membrane protein (OMP) assembly factor BamC is part of the outer membrane protein assembly Bam complex (composed of the outer membrane protein BamA, and four lipoproteins BamB, BamC, BamD and BamE), which is involved in assembly and insertion of β-barrel proteins into the outer membrane. E. coli BamC is a nonessential member of the Bam complex that stabilises the interaction between the essential proteins BamA and BamD. This entry also includes NMB0928 from Neisseria meningitidis whose function is unknown.
