identifier: InterPro:IPR029150
label: "Double Cache domain 3"
definition: >-
  Cache is an extracellular domain that is predicted to have a role in small-molecule recognition in a wide range of proteins, including the animal dihydropyridine-sensitive voltage-gated Ca2 channel alpha-2delta subunit, and various bacterial chemotaxis receptors. The name Cache comes from CAlcium channels and CHEmotaxis receptors. This entry represents the double Cache domain 3 (dCache_3), which may be a result of single Cache domain 3 (sCache_3) duplication.
