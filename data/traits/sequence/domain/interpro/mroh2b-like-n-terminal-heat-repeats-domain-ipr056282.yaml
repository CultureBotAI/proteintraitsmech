identifier: InterPro:IPR056282
label: "MROH2B-like, N-terminal HEAT-repeats domain"
definition: >-
  This entry represents a region of HEAT repeats found at the N-terminal end of maestro heat-like repeat-containing proteins, including Maestro heat-like repeat -containing protein family member 2B from mouse (MROH2B, also known as SPIF), which may play a role in the process of sperm capacitation.
