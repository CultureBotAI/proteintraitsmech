identifier: InterPro:IPR018076
label: "Type II secretion system protein GspF domain"
definition: >-
  A number of bacterial proteins, some of which are involved in a general secretion pathway (GSP) for the export of proteins (also called the type II pathway), have been found to be evolutionary related. These are proteins of about 400 amino acids that are highly hydrophobic and which are thought to be integral protein of the inner membrane. Proteins with this domain form a platform for the type II secretion machinery, as well as the type IV pili and the archaeal flagellae.
