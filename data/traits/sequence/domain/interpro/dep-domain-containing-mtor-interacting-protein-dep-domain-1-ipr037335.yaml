identifier: InterPro:IPR037335
label: DEP domain-containing mTOR-interacting protein, DEP domain 1
definition: >-
  DEP domain-containing mTOR-interacting protein (DEPTOR) is an mTOR inhibitor that plays pivotal roles in the pathogenesis and progression of many tumours. This entry represents the first DEP domain of DEPTOR. Its function is not clear.
