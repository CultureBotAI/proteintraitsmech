identifier: InterPro:IPR058087
label: "XAC2610 domain"
definition: >-
  This entry represents a central domain in Xanthomonas Type IV Secretion System related protein and related proteins. This domain is formed by two β-sheets. This group of proteins includes XAC2610 , an immunity protein that neutralises the peptidoglycan hydrolase activity of the effector protein X-Tfe (XAC2609) and protects the cells against self-intoxication (suicide or cis-intoxication).
