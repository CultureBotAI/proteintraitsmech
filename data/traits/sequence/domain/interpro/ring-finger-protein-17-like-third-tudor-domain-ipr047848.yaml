identifier: InterPro:IPR047848
label: "RING finger protein 17-like, third Tudor domain"
definition: >-
  This entry represents the third Tudor domain identified in RING finger protein 17 (RNF17) and similar proteins from chordates. TDRD4, also known as RING finger protein 17 (RNF17), is a component of the mammalian germ cell nuage and is essential for spermiogenesis. TDRD4 also acts as a potential cancer/testis antigen in breast and liver cancers. TDRD4 contains a RING finger and five Tudor domains.
