identifier: InterPro:IPR042132
label: "Ribosomal protein S6 kinase delta-1, PX domain"
definition: >-
  This entry represents the PX domain found in ribosomal protein S6 kinase delta-1. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions such as cell signaling, vesicular trafficking, protein sorting, and lipid modification, among others. Ribosomal protein S6 kinase delta-1, also known as RPK118, binds sphingosine kinase-1, a key enzyme in the synthesis of the lipid messenger sphingosine 1 phosphate (SPP). It may be involved in transmitting SPP-mediated signaling into the cell. RPK118 specifically binds to phosphatidylinositol 3-phosphate. RPK118 also binds peroxiredoxin-3 and may be involved in transporting peroxiredoxin-3 from the cytoplasm to its mitochondrial site of function via endosome trafficking. The C terminus of RPK118 consist of a domain with conserved Ser/Thr protein kinase residues, specially resembling human ribosome protein S6 kinase.
