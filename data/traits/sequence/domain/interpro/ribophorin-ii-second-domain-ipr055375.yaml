identifier: InterPro:IPR055375
label: "Ribophorin II, second domain"
definition: >-
  This entry represents the second domain of Ribophorin II (RPN2, also known as dolichyl-diphosphooligosaccharide--protein glycosyltransferase subunit 2) proteins, which adopts a β-sandwich fold. The mammalian oligosaccharyltransferase (OST) is a protein complex that effects the cotranslational N-glycosylation of newly synthesised polypeptides, and is composed of the following proteins: ribophorins I and II (RI and RII), OST48, and Dadl, N33/IAP, OST4, STT3.
