identifier: InterPro:IPR061285
label: "Rho GTPase-activating protein 18-like, RhoGAP domain"
definition: >-
  This entry represents the RhoGAP (GTPase-activator protein [GAP] for Rho-like small GTPases) domain of Rho GTPase-activating protein 18/28 (ARHGAP18/28) and similar animal proteins. ARHGAP18 suppresses F-actin polymerisation by inhibiting Rho. It plays a key role in tissue tension and 3D tissue shape by regulating cortical actomyosin network formation.
