identifier: InterPro:IPR005548
label: "Cell division protein FtsQ/DivIB, C-terminal"
definition: >-
  FtsQ is an essential cell division protein. It may link together the upstream cell division proteins, which are predominantly cytoplasmic, with the downstream cell division proteins, which are predominantly periplasmic. FtsQ may control the correct divisome assembly. DivIB is a cell division protein from Gram-positive bacteria, probably homologous to Escherichia coli FtsQ. DivIB interacts with FtsL, DivIC and PBP-2B. DivIB plays an essential role in division at high temperatures, maybe by protecting FtsL from degradation or by promoting formation of the FtsL-DivIC complex. It is also required for efficient sporulation at all temperatures. FtsQ and DivIB have a short N-terminal cytoplasmic domain and a larger C-terminal periplasmic domain. This entry represents the C-terminal region.
