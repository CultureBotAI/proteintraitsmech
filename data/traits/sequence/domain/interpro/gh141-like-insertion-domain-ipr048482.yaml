identifier: InterPro:IPR048482
label: "GH141-like, insertion domain"
definition: >-
  This domain is found in bacterial proteins that belong to Glycoside hydrolase family 141 (GH141). This domain consists of two subdomains: a β-sandwich and a partly open β-barrel that are inserted into the catalytic domain comprising a right-handed parallel β-helix domain.
