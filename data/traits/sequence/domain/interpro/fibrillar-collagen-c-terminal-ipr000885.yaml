identifier: InterPro:IPR000885
label: Fibrillar collagen, C-terminal
definition: >-
  This entry represents the C-terminal non-collagenous domain of animal fibrillar collagens, also named C-propeptide, which is highly conserved from invertebrates to vertebrates (types I-III, V, XI, XXIV and XXVII). This domain is involved in both intracellular molecular assembly and extracellular formation of collagen fibrils. It is found associated with triple helical repeats .
