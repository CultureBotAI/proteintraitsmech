identifier: InterPro:IPR034151
label: "Bacterial DnaG primase, TOPRIM domain"
definition: >-
  This topoisomerase-primase (TORPIM) nucleotidyl transferase/hydrolase domain is found in proteins similar to Escherichia coli DnaG. The active site of the primase is located within the TOPRIM domain. Primases synthesize RNA primers for the initiation of DNA replication. DnaG type primases are often closely associated with DNA helicases in primosome assemblies. The TOPRIM domain has two conserved motifs, one of which centres at a conserved glutamate and the other one at two conserved aspartates (DxD). This glutamate and two aspartates, cluster together to form a highly acid surface patch. The conserved glutamate may act as a general base in nucleotide polymerization by primases. The DXD motif may co-ordinate Mg2+, a cofactor required for full catalytic function. E. coli DnaG is a single subunit enzyme.
