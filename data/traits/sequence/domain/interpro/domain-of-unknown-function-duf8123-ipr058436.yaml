identifier: InterPro:IPR058436
label: "Domain of unknown function DUF8123"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in halophilic archaea. The proteins are primarily found in the class Halobacteria, which includes families such as Halobacteriaceae and Haloarculaceae. The domain is approximately 65-75 amino acids in length and is predicted to contain two transmembrane helices.
