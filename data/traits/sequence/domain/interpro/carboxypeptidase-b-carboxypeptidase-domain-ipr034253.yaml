identifier: InterPro:IPR034253
label: "Carboxypeptidase B, carboxypeptidase domain"
definition: >-
  This entry represents the carboxypeptidase domain found in carboxypeptidase B-like peptidases. Carboxypeptidase B (CPB; MEROPS identifier M14.003) belongs to subfamily M14A (A/B subfamily) of the M14 family of metallocarboxypeptidases (MCPs). Carboxypeptidase B (CPB) releases the basic residues lysine or arginine. A/B subfamily enzymes are normally synthesized as inactive precursors containing a signal peptide, followed by a globular N-terminal pro-region linked to the enzyme; these proenzymes are called procarboxypeptidases. Procarboxypeptidase B (PCPB) is produced by the exocrine pancreas and stored as a stable zymogen in the pancreatic granules until secretion into the digestive tract occurs where it is activated by trypsin. PCPB has been reported to be a good serum marker for the diagnosis of acute pancreatitis and graft rejection in pancreas transplant recipients. The carboxypeptidase A family can be divided into four subfamilies: M14A (carboxypeptidase A or digestive), M14B (carboxypeptidase H or regulatory), M14C (gamma-D-glutamyl-L-diamino acid peptidase I) and M14D (AGTPBP-1/Nna1-like proteins). Members of subfamily M14B have longer C-termini than those of subfamily M14A, and carboxypeptidase M (a member of the H family) is bound to the membrane by a glycosylphosphatidylinositol anchor, unlike the majority of the M14 family, which are soluble. The zinc ligands have been determined as two histidines and a glutamate, and the catalytic residue has been identified as a C-terminal glutamate, but these do not form the characteristic metalloprotease HEXXH motif. Members of the carboxypeptidase A family are synthesised as inactive molecules with propeptides that must be cleaved to activate the enzyme. Structural studies of carboxypeptidases A and B reveal the propepti…
