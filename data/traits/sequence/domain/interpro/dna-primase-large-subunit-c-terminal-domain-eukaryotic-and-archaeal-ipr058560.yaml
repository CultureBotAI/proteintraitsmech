identifier: InterPro:IPR058560
label: "DNA primase, large subunit C-terminal domain, eukaryotic and archaeal"
definition: >-
  This entry represents the C-terminal α-helical domain of eukaryotic and archaeal DNA primases. DNA primase is a heterodimer of two subunits. The large subunit of DNA primase forms interactions with the small subunit and the structure implicates that it is not directly involved in catalysis, but plays roles in correctly positioning the primase/DNA complex, and in the transfer of RNA to DNA polymerase. DNA primase is the polymerase that synthesises small RNA primers for the Okazaki fragments made during discontinuous DNA replication. Primases are grouped into two classes, bacteria/bacteriophage and archaeal/eukaryotic. The proteins in the two classes differ in structure and the replication apparatus components. Archaeal/eukaryotic core primase is a heterodimeric enzyme consisting of a small catalytic subunit (PriS or Pri1) and a large subunit (PriL or Pri2). In the yeast Saccharomyces cerevisiae the small subunit is 48kDa and the large subunit 58kDa. In eukaryotic organisms, a heterotetrameric enzyme formed by DNA polymerase alpha, the B subunit and two primase subunits has primase activity. Although the catalytic activity and the the ATP binding site reside within PriS, the PriL subunit is essential for primase function as disruption of the PriL gene in yeast is lethal. PriL is composed of two structural domains. Several functions have been proposed for PriL such as stabilization of the PriS, involvement in synthesis initiation, improvement of primase processivity, determination of product size and transfer of the products to DNA polymerase alpha. Primase function has also been demonstrated for human and mouse primase subunits.
