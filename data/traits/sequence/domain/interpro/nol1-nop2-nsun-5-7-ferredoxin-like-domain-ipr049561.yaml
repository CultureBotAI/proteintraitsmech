identifier: InterPro:IPR049561
label: "NOL1/NOP2/NSUN 5/7, ferredoxin-like domain"
definition: >-
  This entry represents the ferredoxin-like domain of NOL1/NOP2/Sun domain family members 5 and 7 from eukaryotes. NSUN5 is a SAM-dependent methyltransferase that specifically methylates the C(5) position of cytosine 3782 in 28S rRNA, which promotes protein translation without affecting ribosome biogenesis and fidelity. It is associated with the Williams-Beuren syndrome (WBS). Its inactivation is a hallmark of glioma. NSUN7 may have S-adenosyl-L-methionine-dependent methyl-transferase activity. It undergoes cancer-specific epigenetic transcriptional silencing in liver tumours. This domain is found N-terminal of the methyltransferase domain ( ).
