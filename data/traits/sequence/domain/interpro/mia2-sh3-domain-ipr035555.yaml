identifier: InterPro:IPR035555
label: "MIA2, SH3 domain"
definition: >-
  MIA2 is expressed specifically in hepatocytes and its expression is controlled by hepatocyte nuclear factor 1 binding sites in the MIA2 promoter. It inhibits the growth and invasion of hepatocellular carcinomas (HCC) and may act as a tumour suppressor. A mutation in MIA2 in mice resulted in reduced cholesterol and triglycerides. Since MIA2 localizes to ER exit sites, it may function as an ER-to-Golgi trafficking protein that regulates lipid metabolism. MIA2 contains an N-terminal SH3-like domain, similar to MIA. MIA (melanoma inhibitory activity) family members include MIA, MIAL, MIA2, and MIA3 (also called TANGO). MIA was found to be strongly expressed and secreted by malignant melanomas. It contains a domain that adopts a Src Homology 3 (SH3) domain-like fold; however, it contains an additional antiparallel β sheet and two disulfide bonds compared to classical SH3 domains. Unlike classical SH3 domains, MIA does not bind proline-rich ligands.
