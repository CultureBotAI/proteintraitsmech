identifier: InterPro:IPR015274
label: "CD4, extracellular"
definition: >-
  This domain adopts an immunoglobulin-like β-sandwich with seven strands in 2 β sheets, in a Greek key topology. It is predominantly found in the extracellular portion of CD4 proteins, where it enables interaction with major histocompatibility complex class II antigens.
