identifier: InterPro:IPR000673
label: Signal transduction response regulator, chemotaxis, protein-glutamate methylesterase
definition: >-
  This entry represents the signal transduction response regulator CheB involved in chemotaxis. CheB methylesterase is responsible for removing the methyl group from the gamma-glutamyl methyl ester residues in the methyl-accepting chemotaxis proteins (MCP). The enzyme catalyses the reaction: protein L-glutamate O-methyl ester and water is converted to protein L-glutamate and methanol. CheB is regulated through phosphorylation by CheA. The N-terminal region of the protein is similar to that of other regulatory components of sensory transduction systems. The Myxococcus xanthus FrzG protein also belongs to this family, and is required for the normal aggregation of cells during fruiting body formation. Two-component signal transduction systems enable bacteria to sense, respond, and adapt to a wide range of environments, stressors, and growth conditions. Some bacteria can contain up to as many as 200 two-component systems that need tight regulation to prevent unwanted cross-talk. These pathways have been adapted to response to a wide variety of stimuli, including nutrients, cellular redox state, changes in osmolarity, quorum signals, antibiotics, and more. Two-component systems are comprised of a sensor histidine kinase (HK) and its cognate response regulator (RR). The HK catalyses its own auto-phosphorylation followed by the transfer of the phosphoryl group to the receiver domain on RR; phosphorylation of the RR usually activates an attached output domain, which can then effect changes in cellular physiology, often by regulating gene expression. Some HK are bifunctional, catalysing both the phosphorylation and dephosphorylation of their cognate RR. The input stimuli can regulate either the kinase or phosphatase activity of the bifunctional HK. A variant of the two-component…
