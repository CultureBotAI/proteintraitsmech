identifier: InterPro:IPR059041
label: "Deleted in lung and esophageal cancer protein 1, Ig-like domain"
definition: >-
  This domain is found in the human DLEC1 and other animal proteins. It is predicted to fold into a β-sandwich with an Ig-like topology. It shares significant sequence similarity with Ig-like domains found in Cep192 and hydin. This domain is not present in rat homologues. Deleted in lung and esophageal cancer (DLEC1) is a tumour suppressor that is frequently silenced by promoter methylation in various kinds of cancer. However, in head and neck squamous cell carcinoma, DLEC1 is not silenced solely by promoter methylation. It has been shown to repress NF-kB signalling in prostate cancer. DLEC1 is essential for spermatogenesis and male fertility and plays an important role in sperm head and tail formation
