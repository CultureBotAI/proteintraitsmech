identifier: InterPro:IPR049421
label: "Inner capsid protein VP1, small protrusion domain"
definition: >-
  This domain is found in Inner capsid protein VP1 from Cytoplasmic polyhedrosis virus (CPV). VP1, one of the three major capsid proteins of CPV, has an overall thin-plate-like shape similar to its counterparts in other reoviruses except for a protrusion domain on the outer capsid surface, which is unique in single-layered cypoviruses.
