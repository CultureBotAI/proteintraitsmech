identifier: InterPro:IPR001543
label: "Flagellar motor switch protein FliN-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal region of Flagellar motor switch proteins FliN and FliM and similar proteins mainly found in bacteria. This domain seems to play a key role in flagellation. The flagellar motor switch in Escherichia coli and Salmonella typhimurium regulates the direction of flagellar rotation and hence controls swimming behaviour. The switch is a complex apparatus that responds to signals transduced by the chemotaxis sensory signalling system during chemotactic behaviour. The switch complex comprises at least three proteins - FliG, FliM and FliN. It has been shown that FliG interacts with FliM, FliM interacts with itself, and FliM interacts with FliN. The proteins are not particularly hydrophobic and may be peripheral to the membrane, possibly mounted on the basal body M ring. Proteins of the surface presentation of antigen (SpoA) group are involved in a secretory pathway responsible for the surface presentation of invasion plasmid antigen needed for the entry of Salmonella and other species into mammalian cells.They could play a role in preserving the translocation competence of the IPA antigens and are required for secretion of the three IPA proteins.
