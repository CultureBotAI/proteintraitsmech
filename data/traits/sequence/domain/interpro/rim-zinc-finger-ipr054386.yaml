identifier: InterPro:IPR054386
label: "RIM, zinc finger"
definition: >-
  This entry represents the zinc finger domain of Regulating synaptic membrane exocytosis protein 1/2 (RIM1/2) and related proteins. This domain alone is responsible for the interaction with Munc13-1 by engaging with the Munc13-1 C2A domain. Structurally, this domain is similar to FIVE zinc fingers. RIM proteins are scaffolding proteins at the active zone which bind to several other presynaptic proteins. The long isoforms of RIM proteins, which contain N-terminal Rab3 and Munc13 interacting domains, as well as a central PDZ domain and two C-terminal C2 domains, are encoded by two genes, Rim1 and Rim2. They have multiple isoforms (alpha, beta, gamma) diverging in their structural composition, which mediate overlapping and distinct functions. These isoforms are involved in determining Ca2+ channel density and vesicle docking at the presynaptic active zone.
