identifier: InterPro:IPR012301
label: Malic enzyme, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of the NAD(P)-dependent malic enzyme and related proteins from bacteria, eukaryotes and archaea. Malic enzymes (malate oxidoreductases) catalyse the oxidative decarboxylation of malate to form pyruvate, a reaction important in a number of metabolic pathways - e.g. carbon dioxide released from the reaction may be used in sugar production during the Calvin cycle of photosynthesis. There are 3 forms of the enzyme: an NAD-dependent form that decarboxylates oxaloacetate; an NAD-dependent form that does not decarboxylate oxalo-acetate; and an NADPH-dependent form. Other proteins known to be similar to malic enzymes are the Escherichia coli scfA protein; an enzyme from Zea mays (Maize), formerly thought to be cinnamyl-alcohol dehydrogenase; and the hypothetical Saccharomyces cerevisiae protein YKL029c. Studies on the duck liver malic enzyme reveals that it can be alkylated by bromopyruvate, resulting in the loss of oxidative decarboxylation and the subsequent enhancement of pyruvate reductase activity. The alkylated form is able to bind NADPH but not L-malate, indicating impaired substrate or divalent metal ion-binding in the active site. Sequence analysis has highlighted a cysteine residue as the point of alkylation, suggesting that it may play an important role in the activity of the enzyme, although it is absent in the sequences from some species. Malic enzyme is a tetramer comprised of subunits with four domains each.
