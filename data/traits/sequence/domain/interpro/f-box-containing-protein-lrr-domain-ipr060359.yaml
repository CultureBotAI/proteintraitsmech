identifier: InterPro:IPR060359
label: "F-box-containing protein, LRR domain"
definition: >-
  This entry represents a Leucine-rich domain in putative F-box proteins and other uncharacterised proteins mainly from animals. Each Leucine Rich Repeat is composed of a β-α unit. These units form elongated non-globular structures. Leucine Rich Repeats are often flanked by cysteine rich domains.
