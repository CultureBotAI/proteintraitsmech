identifier: InterPro:IPR059967
label: "Probable glycosyl hydrolase, catalytic domain"
definition: >-
  This entry represents probable glycosyl hydrolases found in uncharacterised prokaryotic proteins, including uncharacterized protein SSO3021 ( ). They probably share similar domain composition to BsGH164 as well as to other members of GH42 family. The active site composition is different suggesting that these proteins may be functionally distinct. This domain is predicted to adopt TIM barrel fold.
