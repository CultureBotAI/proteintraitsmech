identifier: InterPro:IPR041742
label: Sec24-like, trunk domain
definition: >-
  COPII (coat protein complex II)-coated vesicles carry proteins from the endoplasmic reticulum (ER) to the Golgi complex. COPII-coated vesicles form on the ER by the stepwise recruitment of three cytosolic components: Sar1-GTP to initiate coat formation, Sec23/24 heterodimer to select SNARE and cargo molecules, and Sec13/31 to induce coat polymerisation and membrane deformation. Sec23 p and Sec24p are structurally related, folding into five distinct domains: a β-barrel, a zinc-finger ( ), an α/β trunk domain, an all-helical region ( ), and a C-terminal gelsolin-like domain ( ). This entry describes the Sec23/24 α/β trunk domain, which is formed from a single, approximately 250-residue segment plugged into the β-barrel between strands β1 and β19. The trunk has an α/β fold with a vWA topology, and it forms the dimer interface, primarily involving strand β14 on Sec23 and Sec24; in addition, the trunk domain of Sec23 contacts Sar1. This entry describes the trunk domain of Sec24, as well as some Sec24-related proteins.
