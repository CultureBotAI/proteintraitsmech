identifier: InterPro:IPR041712
label: "Methanocaldococcus jannaschii dihydropteroate synthase-like, MBL-fold metallo hydrolase domain"
definition: >-
  Proteins containing this domain includes Methanocaldococcus jannaschii 7,8-dihydropterin-6-methyl-4-(beta-D-ribofuranosyl)-aminobenzene-5'-phosphate synthase (EC 2.5.1.15), a folate biosynthetic enzyme also known as dihydropteroate synthase and 7,8 dihydropteroate synthase. Proteins containing this domain also include Thermoanaerobacter tengcongensis Tflp, which is a ferredoxin-like protein. These proteins belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions.
