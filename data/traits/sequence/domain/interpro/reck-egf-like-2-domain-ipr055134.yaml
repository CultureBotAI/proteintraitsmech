identifier: InterPro:IPR055134
label: "RECK, EGF-like 2 domain"
definition: >-
  This domain is found in human Reversion-inducing cysteine-rich protein with Kazal motifs (RECK) and similar proteins mainly from vertebrates. RECK is a membrane-anchored glycoprotein that plays a role in Wnt7-specific responses in the central nervous system angiogenesis and in the blood-brain barrier regulation. This domain is usually found in association with several copies of . RECK consists of five repeats of an uncommon domain with six cysteines (the CC domain,, , ), a Frizzled-likee cysteine-rich domain (Fz-like CRD, ), two epidermal growth factor-like domains (EGF-like 1, , and EGF-like 2, represented by this entry), and three Kazal-like motifs (Kazal-like 1 to 3,).
