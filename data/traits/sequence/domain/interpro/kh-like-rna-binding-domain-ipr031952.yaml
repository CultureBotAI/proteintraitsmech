identifier: InterPro:IPR031952
label: "KH-like RNA-binding domain"
definition: >-
  This entry represents a KH-like RNA-binding motif found in MOEP19 (also known as Ooep19 or Floped), Filia (also known as Ecat or KH domain-containing protein 3), and related proteins. MOEP19 is a mammalian protein expressed during early embryogenesis. Filia is expressed in oocytes and embryo. RNA-binding domain may mediate RNA transcript regulation in oogenesis and embryogenesis.
