identifier: InterPro:IPR056227
label: "ABC transporter, TMD0 domain"
definition: >-
  This transmembrane domain is found N-terminal in a number of ATP-binding cassette (ABC) transporters from animals and fungi. It is composed of four or five helices arranged in a bundle.
