label: "Plasmodium host cell traversal SPECT1"
definition: >-
  This domain is found in SPECT1 (sporozoite microneme protein essential for cell traversal). It is formed of a four α-helix bundle with a 'hook'-like feature at one end. These helices in parallel or antiparallel alignment.
