identifier: InterPro:IPR048804
label: "Decoration protein, N-terminal domain"
definition: >-
  Bacteriophage capsids constitute icosahedral shells of exceptional stability that protect the viral genome. Many capsids display on their surface decoration proteins whose structure and function remain largely unknown. Decoration protein of phage T5 (also known as pb10) binds at the centre of the 120 hexamers formed by the major capsid protein. This protein consists of an N-terminal α-helical capsid-binding domain (this entry) and an Ig-like domain ( ).
