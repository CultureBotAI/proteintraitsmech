identifier: InterPro:IPR048659
label: "GREB1-like, second domain"
definition: >-
  GREB1 (gene regulated by estrogen in breast cancer 1) was first identified as an estrogen-regulated gene expressed in breast cancer. Its exact function is not known but its expression is regulated by the coordinated binding of estrogen-receptors to distal sites interacting with Pol II to activate gene transcription from core promoters located at a considerable distance from the greb1 gene. It acts as a regulator of hormone-dependent cancer growth in breast, ovarian and prostate cancers. This is a presumed domain found adjacent the N-terminal domain of GREB1 and GREB1-like proteins. Structure predictions suggest that it may adopt an α/β fold.
