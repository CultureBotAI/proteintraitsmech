identifier: InterPro:IPR043652
label: "Crescentin, coiled-coil domain"
definition: >-
  This entry represents the coiled-coil region of crescentin found in alphaproteobacteria. The coiled coil domain prives structural stability to crescentin filaments, allowing them to maintain their shape and function. CreS is the bacterial equivalent to Intermediate Filament (IF) proteins from eukaryotes. Its cytoskeletal function is required for the vibrioid and helical shapes of Caulobacter crescentus in which it was seen that without CreS, the cells adopt a straight-rod morphology. This protein, similarly to IF proteins, can assemble itself into filaments in vitro with no need of energy or additional cofactors. In vivo, it forms a helical structure that colocalises with the inner cell curvatures beneath the cytoplasmic membrane. CreS possesses the typical tripartite IF-like domain architecture found in IF proteins, which contains a coiled-coil rod domain with short head (N-terminal) and tail (C-terminal) domains.
