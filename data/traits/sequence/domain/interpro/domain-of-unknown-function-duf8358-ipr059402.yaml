identifier: InterPro:IPR059402
label: "Domain of unknown function DUF8358"
definition: >-
  This domain is found in uncharacterised proteins mainly from Agaricales lineage. It is predicted to fold into an α/β structure composed of a small three-stranded β-sheet and array of α-helices. This domain contains a highly conserved FGCWY sequence motif that may be important for function.
