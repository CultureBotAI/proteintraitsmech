identifier: InterPro:IPR043637
label: Spo16 protein, N-terminal domain
definition: >-
  This entry represents a nuclease-like domain of Spo16, similar to that in ERCC1. This entry represents proteins related to budding yeast Spo16, which belongs to a conserved meiosis-specific group of proteins known as ZMM (Zip, Msh, Mer), which are critical for the control and crossover formation during gametogenesis. Spo16 forms a complex with Zip2 and Zip4. Zip2 and Spo16, form a meiosis-specific XPF-ERCC1-like complex. The recombinant Zip2 XPF domain together with Spo16 preferentially binds branched DNA structures, such as D loops and HJs. It is suggested that Zip2-Spo16 forms a 'nuclease-inactive' heterodimer that recognises DNA junctions during meiotic homologous recombination and then recruits other factors for DNA repair. Moreover, together with Zip2 and Zip4, Spo16 also plays a key role in synaptonemal complex assembly. The Spo16 protein contains a C-terminal HHH motif.
