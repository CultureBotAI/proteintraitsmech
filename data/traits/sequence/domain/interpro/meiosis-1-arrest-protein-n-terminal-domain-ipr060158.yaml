identifier: InterPro:IPR060158
label: "Meiosis 1 arrest protein, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the meiosis 1 arrest protein (M1AP). This domain adopts a von Willebrand factor type A (VWA) fold. The specific function of this N-terminal domain remains to be determined. Meiosis 1 arrest protein (M1AP), also known as spermatogenesis-associated protein 37 (Spata37), is required for meiosis I progression during spermatogenesis. The full-length protein is expressed in male germ cells from spermatogonia to spermatids during testicular development. Mutations in M1AP cause spermatogenic failure 48 (SPGF48), an autosomal recessive disorder resulting in severe oligozoospermia and male infertility due to meiotic arrest.
