identifier: InterPro:IPR029088
label: "Immunity protein 12"
definition: >-
  This entry represents a predicted immunity protein with an α+β fold and several conserved charged and hydrophobic residues. Proteins containing this domain are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a domain of the Tox-URI2 family. The protein is also found in heterogeneous polyimmunity loci.
