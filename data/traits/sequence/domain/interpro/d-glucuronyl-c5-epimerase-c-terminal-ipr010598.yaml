identifier: InterPro:IPR010598
label: "D-glucuronyl C5-epimerase, C-terminal"
definition: >-
  This entry represents the C terminus conserved region of known or predicted D-glucuronyl C5-epimerases. D-glucuronyl C5-epimerase converts D-glucuronic acid residues adjacent to N-sulfate sugar residues to L-iduronic acid residues, both in maturing heparan sulfate (HS) and heparin chains.
