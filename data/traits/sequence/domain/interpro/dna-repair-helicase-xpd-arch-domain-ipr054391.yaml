identifier: InterPro:IPR054391
label: "DNA repair helicase XPD, arch domain"
definition: >-
  This domain is found in DNA repair helicase XPD from Sulfurisphaera tokodaii ( ) and similar archaeal proteins. XPD, which functions as a 5'-3' DNA helicase, shows three major domains. This entry represents the central domain, called arch domain, which folds into a mixed α/β topology with a four-stranded antiparallel β-sheet and four α-helices. The other two canonical motor domains are represented by at the N-terminal end and at the C-terminal end.
