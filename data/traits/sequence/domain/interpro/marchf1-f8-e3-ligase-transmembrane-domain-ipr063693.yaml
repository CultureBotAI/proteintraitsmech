identifier: InterPro:IPR063693
label: "MARCHF1/F8 E3 ligase, transmembrane domain"
definition: >-
  This entry represents a of approximately 85 residues found in MARCH (Membrane-Associated RING-CH) E3 ubiquitin ligases (MARCHF1, MARCHF8) in vertebrates. This domain is located C-terminal to the RINGv (RING-CH-type zinc finger) domain and contains two transmembrane helices. The C-terminal cytoplasmic region following the transmembrane helices is involved in the down-regulation of CD86 and MHC class II cell surface expression. MARCH proteins have short half-lives, and the N-terminal region preceding the RINGv domain is responsible for this instability. The E3 ligase activity that ubiquitinates MHC class II proteins and other transmembrane substrates is conferred by the RINGv domain.
