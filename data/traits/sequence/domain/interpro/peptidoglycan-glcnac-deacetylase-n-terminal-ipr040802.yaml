identifier: InterPro:IPR040802
label: "Peptidoglycan GlcNAc deacetylase, N-terminal"
definition: >-
  This is the N-terminal and middle domain found in Streptococcus pneumoniae peptidoglycan GlcNAc deacetylase (SpPgdA). PgdA protects the Gram-positive bacterial cell wall from host lysozymes by deacetylating peptidoglycan GlcNAc residues. It is a member of the family 4 carbohydrate esterases (CE-4).
