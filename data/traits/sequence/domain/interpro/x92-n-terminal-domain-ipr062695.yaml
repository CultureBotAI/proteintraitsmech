identifier: InterPro:IPR062695
label: "X92, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in X92 and related proteins from trypanosomatids. X92 is a protein that shares epitopes with the major structural protein of the paraflagellar rod and most likely represents a silent open reading frame in the Trypanosoma brucei genome.
