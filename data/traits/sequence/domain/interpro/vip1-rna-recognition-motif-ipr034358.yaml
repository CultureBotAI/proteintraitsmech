label: "Vip1, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) found in Vip1 from Schizosaccharomyces pombe. Its biological role remains unclear. Vip1 contains an N-terminal RNA recognition motif (RRM).
