identifier: InterPro:IPR060258
label: "TP_0855, C-terminal"
definition: >-
  This entry represents the C-terminal domain of TP_0855 proteins found primarily in Treponema and related spirochaetes. TP_0855 is a large protein of approximately 1127 amino acids that is processed from a precursor containing an N-terminal signal peptide. The function of this domain remains to be determined.
