identifier: InterPro:IPR063933
label: "Biosynthesis protein PigD, C-terminal domain"
definition: >-
  This entry represents the C-terminal (fourth) domain of biosynthesis protein PigD and related multi-domain proteins. Members are found in actinomycetes and proteobacteria. PigD is a thiamine diphosphate-dependent enzyme catalysing steps in prodigiosin biosynthesis. The specific function of this domain remains to be determined.
