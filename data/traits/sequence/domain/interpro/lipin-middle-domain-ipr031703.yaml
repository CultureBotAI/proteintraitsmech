identifier: InterPro:IPR031703
label: "Lipin, middle domain"
definition: >-
  This is a middle domain of lipins. Overall the enzyme acts as a magnesium-dependent phosphatidate phosphatase enzyme that catalyses the conversion of phosphatidic acid to diacylglycerol during triglyceride, phosphatidylcholine and phosphatidylethanolamine biosynthesis ( ).
