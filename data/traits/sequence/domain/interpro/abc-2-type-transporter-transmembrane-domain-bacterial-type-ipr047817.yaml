identifier: InterPro:IPR047817
label: "ABC-2 type transporter, transmembrane domain, bacterial-type"
definition: >-
  ABC transporters are minimally constituted of two conserved regions: a highly conserved ATP binding cassette (ABC) and a less conserved transmembrane domain (TMD). These regions can be found on the same protein (mostly in eukaryotes and bacterial exporters) or on two different ones (mostly bacterial importers). But in a subgroup of exporters, the transmembrane region is encoded by a separated polypeptide, described as the ABC-2 type transport system integral membrane protein. A number of bacterial transport systems have been found to contain integral membrane components that have similar sequences: these systems fit the characteristics of ATP-binding cassette transporters. The proteins form homo- or hetero-oligomeric channels, allowing ATP-mediated transport. Hydropathy analysis of the proteins has revealed the presence of 6 possible transmembrane regions. This entry represents the transmembrane region of a subgroup of ABC-2 type transporters found mainly in bacteria.
