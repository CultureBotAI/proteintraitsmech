label: "MoxR-vWA-beta-propeller ternary system domain bpX4"
definition: >-
  This domain is known as bpX4, predominantly found in bacteroidetes. This entry represents an uncharacterised domain found in the MoxR-vWA-β-propeller ternary system, a class of NTP-dependent biological conflict systems.
