identifier: InterPro:IPR041017
label: "DipZ, thioredoxin-like C-terminal domain"
definition: >-
  This is the C-terminal thioredoxin like domain found in DipZ/Rv2874 in the pathogenic bacterium Mycobacterium tuberculosis. Structure analysis of Rv2874-C shows the presence of a C-terminal domain formed by the 128 residues Thr568-Gly695. These residues form a jelly-roll structure in which two antiparallel β-sheets sandwich a hydrophobic core. This domain is combined with a second domain with a carbohydrate-binding module (CBM) fold.
