identifier: InterPro:IPR062682
label: "YomV, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of YomV, a 236 amino acid uncharacterised protein from the SPbeta prophage of Bacillus subtilis. YomV contains two domains: this N-terminal region and a C-terminal domain ( ). The protein is found in SPbeta phage and related prophages from firmicutes. The function of this domain remains to be determined.
