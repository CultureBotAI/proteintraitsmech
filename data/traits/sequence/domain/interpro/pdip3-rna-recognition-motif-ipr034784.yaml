identifier: InterPro:IPR034784
label: "PDIP3, RNA recognition motif"
definition: >-
  This entry represents the RRM of PDIP3. Polymerase delta-interacting protein 3 (PDIP3), also termed SKAR or 46kDa DNA polymerase delta interaction protein (PDIP46), belongs to the Aly/REF family of RNA binding proteins that have been implicated in coupling transcription with pre-mRNA splicing and nucleo-cytoplasmic mRNA transport. PDIP3 is widely expressed and localizes to the nucleus. It may be a critical player in the function of S6K1 in cell and organism growth control by binding the activated, hyperphosphorylated form of S6K1 but not S6K2. Furthermore, PDIP3 functions as a protein partner of the p50 subunit of DNA polymerase delta. In addition, PDIP3 may have particular importance in pancreatic beta cell size determination and insulin secretion. PDIP3 contains a well conserved RNA recognition motif (RRM).
