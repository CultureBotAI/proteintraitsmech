identifier: InterPro:IPR037949
label: Acetylene hydratase, MopB domain
definition: >-
  The acetylene hydratase of Pelobacter acetylenicus is a tungsten iron-sulfur protein involved in the fermentation of acetylene to ethanol and acetate. This entry represents the molybdopterin-binding C-terminal domain of acetylene hydratase.
