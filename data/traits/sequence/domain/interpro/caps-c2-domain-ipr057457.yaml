identifier: InterPro:IPR057457
label: "CAPS, C2 domain"
definition: >-
  This entry represents the C2 domain found in CAPS proteins, which are essential regulators of dense-core vesicle exocytosis. This domain has a typical C2 superfamily fold consisting of an eight-stranded β-sandwich but lacks calcium-binding capacity. Instead, it works together with the adjacent PH domain through a conserved hydrophobic interface to bind PI(4,5)P2. A polybasic patch (K457, K459, R477) in the C2 domain cooperates with the PH domain's PI(4,5)P2 binding site to enhance membrane binding. The tight association between the C2 and PH domains is essential for CAPS function in neurotransmitter release. The calcium-dependent secretion activator proteins (CAPS) facilitate the exocytosis of neurotransmitter- and neuropeptide-filled vesicles. These proteins likely act upstream of membrane fusion, contributing to the biogenesis or maintenance of mature secretory vesicles. They specifically mediate calcium-dependent exocytosis of large dense-core vesicles and other dense-core vesicles. Some members also regulate neurotrophin release and catecholamine loading and may participate in the exocytosis of small clear synaptic vesicles. These proteins are characterised by a PH domain ( ), which is essential for regulated exocytosis and phospholipid binding. Additionally, they interact with dopamine receptors and are involved in multiple signalling pathways.
