identifier: InterPro:IPR033414
label: "Periplasmic sensor domain"
definition: >-
  This is a conserved periplasmic sensor domain found in histidine kinases, diguanylate cyclases/phosphodiesterases and methyl-accepting chemotaxis proteins. In Pseudomonas aeruginosa, this is the sensor domain in the c-di-GMP phosphodiesterase BifA that regulates biofilm formation and in sensor kinase AruS that regulates arginine degradation pathways. These results suggest that this domain might bind arginine or a related compound.
