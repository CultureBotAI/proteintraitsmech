identifier: InterPro:IPR010482
label: "TECPR1-like, DysF domain"
definition: >-
  This entry represents the DysF domain found twice in human Tectonin β-propeller repeat-containing protein 1 (TECPR1) and similar animal sequences. TECPR1 is a tethering factor involved in autophagy, autophagosome maturation and selective autophagy against bacterial pathogens. This protein has two 5-bladed β-propeller domains ( ). The DysF domain lies inserted between the first and second blades of each propeller. It consists of a central pair of antiparallel β-strands connected via a long loop that wraps around the β-sheet and covers large parts of the elongated finger-shaped domain surface. The N-terminal DysF domain of TECPR1 detects and binds sphingomyelin. This domain is also found towards the N-terminal of Pex23 from Drosophila melanogaster, which shows structural similarity with Tectonin beta-propeller repeat-containing proteins but is involved in peroxisome biogenesis. Yeast peroxisomal proteins of the PEX28-32 family and at the N-terminal of Meiotically up-regulated gene 65 protein from Schizosaccharomyces pombe (Mug65) are also members of this group. PEX28/29 are involved in the regulation of peroxisome number, size and distribution. Mug65 has a role in meiosis.
