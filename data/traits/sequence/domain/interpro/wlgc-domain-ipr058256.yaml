identifier: InterPro:IPR058256
label: "WLGC domain"
definition: >-
  This domain is found in uncharacterised proteins mainly from Oomycetes. It is predicted to fold into a three-stranded antiparallel β-sheet with a small α-helix packed on it and a C-terminal α-helical extension. This domain contains six highly conserved cysteine residues which are predicted to form disulfide bonds. At its C-terminal end it contains conserved WLGC sequence motif after which it was named.
