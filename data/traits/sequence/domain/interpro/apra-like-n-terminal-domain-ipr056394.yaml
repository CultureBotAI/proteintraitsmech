identifier: InterPro:IPR056394
label: "AprA-like, N-terminal domain"
definition: >-
  This entry represents a domain found N-terminal in AprA Methyltransferase 1 from Moorena bouillonii and similar bacterial sequences. AprA is an S-adenosylmethionine and Fe3+-dependent dimethyltransferase that acts in the initiation steps of apratoxin A biosynthesis. This domain has similarity to winged helix domains. This domain is also found in SxtA Methyltransferase from Cylindrospermopsis raciborskii which is involved in the saxitoxin biosynthetic pathway. SxtA MT, and AprA MT1 differ in their metal selectivity (Mn2+ and Fe3+, respectively) and extent of methylation (one and two methyl transfers, respectively). The structures of these enzymes, and , reveal the structural basis for the difference in the control of methylation extent.
