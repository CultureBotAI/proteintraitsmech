label: "DDB_G0285495-like, middle domain"
definition: >-
  This entry represents the middle domain of the uncharacterised protein DDB_G0285495 from Dictyostelium discoideum. The protein is 495 amino acids in length and contains a disordered region. The function of this domain remains to be determined.
