identifier: InterPro:IPR041379
label: "Collagenase ColG-like, catalytic helper subdomain"
definition: >-
  This is the catalytic helper subdomain found in collagenase G from Clostridium histolyticum. This domain is indispensable for proper folding and full peptidase activity.
