identifier: InterPro:IPR011628
label: "Cleaved adhesin"
definition: >-
  This conserved region is found in a group of haemagglutinins and peptidases, e.g. , that, in Porphyromonas gingivalis (Bacteroides gingivalis), form components of the major extracellular virulence complex RgpA-Kgp - a mixture of proteinases and adhesins. These domains are cleaved from the original polyprotein and form part of the adhesins.
