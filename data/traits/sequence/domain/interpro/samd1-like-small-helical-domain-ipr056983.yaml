identifier: InterPro:IPR056983
label: "SAMD1-like, small helical domain"
definition: >-
  This domain is found in the human Sterile alpha motif domain-containing protein 1 (SAMD1) and its homologues from vertebrates. SAMD1 directly recognises and binds unmethylated CpG-containing DNA via simultaneous interactions with both the major and the minor groove. SAMD1 acts as a transcriptional repressor and chromatin regulator.
