identifier: InterPro:IPR049961
label: "ThiI, N-terminal"
definition: >-
  This entry covers the THUMP and AANH domains found at the N terminus of ThiI proteins. tRNA sulfurtransferase ThiI catalyses the ATP-dependent transfer of a sulfur to tRNA to produce 4-thiouridine in position 8 of tRNAs, which functions as a near-UV photosensor. In some bacteria, ThiI is a bifunctional enzyme required for the synthesis of both the 4-thiouridine modification in tRNA and the thiazole moiety in the thiamine biosynthesis pathway. Three domains of ThiI are essential for the thiolation of tRNA: a THUMP domain that binds tRNA (see ), an AANH domain ( ) that activates the uridine residue by adenylylation, and a rhodanese-like domain ( ) that transfers sulfur to the activated uridine residue. Neither the THUMP nor the AANH domain of ThiI are essential for thiamine synthesis, only the rhodanese domain is necessary for synthesis of the thiazole moiety of thiamine.
