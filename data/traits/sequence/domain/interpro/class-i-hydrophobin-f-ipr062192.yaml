identifier: InterPro:IPR062192
label: "Class I hydrophobin F"
definition: >-
  This entry represents Class I hydrophobins F, small amphipathic proteins secreted by filamentous fungi. These proteins can self- assemble into an outermost layer of rodlet bundles on aerial cell surfaces, conferring cellular hydrophobicity that supports fungal growth, development and dispersal. The proteins contain four disulphide bonds and are secreted to the cell wall. Hydrophobins are involved in aerial growth, conidiation and dispersal. The family includes proteins such as HYD3 and Hyd1F from entomopathogenic fungi.
