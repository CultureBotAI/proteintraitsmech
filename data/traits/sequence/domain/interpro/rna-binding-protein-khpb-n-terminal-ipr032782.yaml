identifier: InterPro:IPR032782
label: "RNA-binding protein KhpB, N-terminal"
definition: >-
  This entry includes the RNA-binding protein KhpB, also known as RNA-binding protein Jag/EloR, a RNA chaperone that forms a complex with KhpA and binds to cellular RNA, controlling its expression. It plays a role in peptidoglycan (PG) homeostasis and cell length regulation, cell division and maintenance of cell shape. Bacillus subtilis KhpB/Jag is associated with SpoIIIJ, a gene necessary for the third stage of sporulation. This domain is found at the N terminus of the KhpB/Jag proteins, whose function is unknown.
