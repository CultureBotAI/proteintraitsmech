identifier: InterPro:IPR048929
label: "DNA-binding protein Rap1, C-terminal, S.pombe"
definition: >-
  DNA-binding protein Rap1 is involved in protecting chromosome ends in fission yeast and its C-terminal domain (RCT) structurally resembles the first 3-helix bundle found in yeast and human RAP1 RCT. S. pombe RAP1 lacks direct DNA-binding activity and is localised to telomeres via Taz1. This entry represents the C-terminal domain of Rap1 from S. pombe.
