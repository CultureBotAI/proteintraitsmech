identifier: InterPro:IPR055487
label: "Domain of unknown function DUF7059"
definition: >-
  This domain is found N-terminal in a group of uncharacterised bacterial proteins. These proteins are probably distantly related to Aeronamide N-methyltransferases AerE. They share two similar domains that are predicted in the same arrangement. This domain is found N-terminal to the methyltransferase domain and has a weak sequence similarity to various HTH domains.
