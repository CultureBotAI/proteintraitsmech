identifier: InterPro:IPR047078
label: "Inositol polyphosphate 5-phosphatase OCRL, RhoGAP"
definition: >-
  OCRL1 (oculocerebrorenal syndrome of Lowe 1)-like proteins contain a PH-domain at the N-terminal, a central inositol polyphosphate 5-phosphatase domain and a C-terminal Rho GAP domain. OCRL-like proteins are type II inositol polyphosphate 5-phosphatases that can hydrolyse lipid PI(4,5)P2 and PI(3,4,5)P3 and soluble Ins(1,4,5)P3 and Ins(1,3,4,5)P4, but their individual specificities vary. OCRL regulates traffic in the endosomal pathway by regulating the specific pool of phosphatidylinositol 4,5-bisphosphate that is associated with endosomes and is involved in primary cilia assembly. This protein is associated with the oculocerebrorenal syndrome of Lowe and Dent disease 2. This entry represents the RhoGAP (GTPase-activator protein [GAP] for Rho-like small GTPases) domain present in OCRL1-like proteins. This GAP domain lacks the catalytic residue and therefore maybe inactive. The functionality of the RhoGAP domain is still unclear.
