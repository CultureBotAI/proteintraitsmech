identifier: InterPro:IPR033825
label: "FACT complex subunit Spt16, peptidase M24-like domain"
definition: >-
  Spt6 (also known as cdc68) is a component of the FACT complex, a general chromatin factor that acts to reorganize nucleosomes. Spt16 is a non-peptidase homologue in peptidase family M24.
