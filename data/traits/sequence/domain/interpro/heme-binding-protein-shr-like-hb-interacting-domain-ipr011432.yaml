identifier: InterPro:IPR011432
label: "Heme-binding protein Shr-like, Hb-interacting domain"
definition: >-
  This entry represents the Hb-interacting domain (HID), which is found duplicated in Heme-binding protein Shr from Streptococcus pyogenes, a potentially lethal human pathogen, and in one to six copies in other uncharacterised bacterial proteins. Shr is a virulence factor that captures Hb and binds to the oxidized form of heme through an N-terminal region that contains two copies of this domain. HID shows a β-sandwich-type fold in which two antiparallel β-sheets are flanked by an α-helix.
