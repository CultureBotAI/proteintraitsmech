identifier: InterPro:IPR049330
label: "Topoisomerase I, zinc finger"
definition: >-
  This entry represents a zinc ribbon domain found at the C terminus of topoisomerase I from gammaproteobacteria (it corresponds to D6 described in. Topoisomerase I has an essential function in preventing hypernegative supercoiling of DNA. The C-terminal domains bind ssDNA to recognise the accumulation of negative supercoils in duplex DNA.
