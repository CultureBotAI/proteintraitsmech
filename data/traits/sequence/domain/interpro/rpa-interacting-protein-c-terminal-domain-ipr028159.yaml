identifier: InterPro:IPR028159
label: "RPA-interacting protein, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of replication protein A (RPA) interacting protein (RIP). RPA is a single stranded DNA-binding protein involved in DNA replication, repair, and recombination. RPA interacting protein is involved in the import of RPA into the nucleus. The C-terminal domain contains a putative zinc finger.
