identifier: InterPro:IPR033721
label: "Prolyl-tRNA synthetase, catalytic domain"
definition: >-
  This entry consists of the the Prolyl-tRNA synthetase (ProRS) class II core catalytic domain. ProRS is a homodimer. It is responsible for the attachment of proline to the 3' OH group of ribose of the appropriate tRNA. This domain is primarily responsible for ATP-dependent formation of the enzyme bound aminoacyl-adenylate. Class II assignment is based upon its structure and the presence of three characteristic sequence motifs in the core domain. This entry contains the core domain of ProRS from archaea, the cytoplasm of eukaryotes and some bacteria.
