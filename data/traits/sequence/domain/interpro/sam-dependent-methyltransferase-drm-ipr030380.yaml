identifier: InterPro:IPR030380
label: "SAM-dependent methyltransferase DRM"
definition: >-
  Domains Rearranged Methylases (DRM1 and DRM2) are de novo cytosine methyltransferases from plants involved in the initial methylation of unmethylated DNA sequences. Plant DNA is frequently methylated in three different sequence contexts: CG, CHG, and CHH (H = A, T, or C). In Arabidopsis thaliana, the maintenance of CHH methylation is controlled by DRM2. This entry represents the methyltransferase domain of DRM. The overall structure retains a classic class I methyltransferase fold.
