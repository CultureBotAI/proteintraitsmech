identifier: InterPro:IPR005212
label: dTDP-4-dehydro-6-deoxy-alpha-D-glucopyranose 2,3-dehydratase
definition: >-
  This domain occurs in a range of proteins from antibiotic production pathways. These include the gra-ORF27 product that probably functions at an early step, most likely as a dTDP-4-keto-6- deoxyglucose-2,3-dehydratase. Its homologues include dnmT from the daunorubicin biosynthetic gene cluster in S. peucetius, a similar gene from the daunomycin biosynthetic cluster in Streptomyces sp. (strain 5), eryBVI from the erythromycin cluster in S. erythraea and snoH from the nogalamycin cluster in S. nogalater. This domain is a 200 amino acid long region, which may be a structural unit, that occurs twice within the proteins that contain it. This entry also includes sugar 2,3-dehydratase, EvaA, that belongs to the "Nudix" hydrolase family, members of which often function as "housekeeping" enzymes. EvaA is organised as a dimer, each subunit of the dimer folds into two domains, which are related by a 2-fold rotational axis and which arose via gene duplication. Two binding sites for the dTDP-sugar ligands, pockets A and B, have been identified in each subunit. Site-directed mutagenesis experiments and activity assays strongly suggest that pocket A represents the active site and pocket B is a vestige of the gene duplication event.
