identifier: InterPro:IPR024975
label: "Protein NO VEIN, C-terminal"
definition: >-
  This domain of unknown function is found at the C-terminal of Protein NO VEIN from Arabidopsis, a protein essential for cell fate determination during embryogenesis. It mediates this process through an auxin-dependent pathway. It is also found in some restriction endonucleases.
