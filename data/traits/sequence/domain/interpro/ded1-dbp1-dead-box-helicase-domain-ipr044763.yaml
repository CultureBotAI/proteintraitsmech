identifier: InterPro:IPR044763
label: Ded1/Dbp1, DEAD-box helicase domain
definition: >-
  This entry represents the DEAD/DEAH box helicase domain found in Ded1 and its paralog, Dbp1, from yeasts, which contains the ATP-binding region. Ded1 and Dbp1 are ATP-dependent DEAD-box RNA helicases involved in eIF4F-dependent 48S translation preinitiation complex (PIC) assembly. This entry also includes Drosophila melanogaster Vasa, which is essential for development.
