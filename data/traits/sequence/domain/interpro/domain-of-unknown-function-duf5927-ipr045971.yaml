identifier: InterPro:IPR045971
label: "Domain of unknown function DUF5927"
definition: >-
  This entry represents a presumed domain that is functionally uncharacterised. This domain is primarily found in Rhodobacterales, and is approximately 300 amino acids in length. It is found to the C terminus of PF02485 and so is likely to have a role in carbohydrate modification.
