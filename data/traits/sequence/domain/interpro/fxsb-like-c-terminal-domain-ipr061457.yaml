identifier: InterPro:IPR061457
label: "FxsB-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal extension domain with inactivated beta-hydroxylase, in which the HEXXH motif usually seen is missing. While that motif is well known to occur widely in different families of zinc-dependent metalloproteases, the HEXXH motif in was shown instead to bind a non-heme iron in a peptide-modifying alpha-ketoglutarate-dependent beta-hydroxylase. In this group, the beta-hydroxylase ('H') domain is inactive, the presumptive metal-binding motif, shared by many metallo-proteases, has been been lost. The domain appears as a C-terminal extension for some of the radical SAM enzyme family FxsB proteins, involved in post-translational modification of the 60-amino acid long RiPP precursor proteins, collectively named FxsA.
