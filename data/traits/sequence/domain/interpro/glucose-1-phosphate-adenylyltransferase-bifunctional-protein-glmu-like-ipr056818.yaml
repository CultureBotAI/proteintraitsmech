identifier: InterPro:IPR056818
label: "Glucose-1-phosphate adenylyltransferase/Bifunctional protein GlmU-like, C-terminal hexapeptide"
definition: >-
  This domain is found at the C-terminal end of bacterial and plant glucose-1-phosphate adenylyltransferases (GlgC) and Bifunctional protein GlmU, including GlmU from Streptococcus pneumoniae. This domain is responsible for the transfer of acetyl group from acetyl coenzyme A to glucosamine-1-phosphate (GlcN-1-P) to produce N-acetylglucosamine-1-phosphate (GlcNAc-1-P). It consists of hexapeptide repeats that form a left-handed β-helix.
