identifier: InterPro:IPR057630
label: "Terminase small subunit, actinomycetes phage-type"
definition: >-
  The small subunit of terminase, a DNA packaging enzyme of bacteriophages, plays a role in binding and cutting the phage DNA during packaging into the capsid. This entry represents diverse small subunits from a wide range of actinobacteriophages and some Bacillota phages. The domain is often found at the N-terminal of proteins, followed by a disordered or low-complexity region at the C-terminal. In some larger proteins, additional C-terminal domains may also be present.
