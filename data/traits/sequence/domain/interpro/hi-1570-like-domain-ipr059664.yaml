identifier: InterPro:IPR059664
label: "HI_1570-like domain"
definition: >-
  This entry represents a small domain of approximately 40 residues found in uncharacterised proteins from Pasteurellales and Neisseriales. In the 169 amino acid protein HI_1570 from Haemophilus influenzae strain Rd, this domain is located at the N-terminal. However, in many other proteins this domain occupies a central position within larger multi-domain architectures. The function of this domain remains to be determined.
