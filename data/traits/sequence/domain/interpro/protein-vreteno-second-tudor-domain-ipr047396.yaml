identifier: InterPro:IPR047396
label: "Protein vreteno, second Tudor domain"
definition: >-
  This entry represents the second Tudor domain of Protein vreteno from Drosophila and similar sequences from insects. Protein vreteno from Drosophila is a gonad-specific protein, essential for germline development to repress transposable elements and preventing their mobilization, which is essential for germline integrity. It acts via the piRNA metabolic process in both germline and somatic gonadal tissues by mediating the repression of transposable elements during meiosis. Vreteno contains two Tudor domains.
