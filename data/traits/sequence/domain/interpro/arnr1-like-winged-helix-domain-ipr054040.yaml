identifier: InterPro:IPR054040
label: "ArnR1-like, winged-helix domain"
definition: >-
  This entry represents a WH-like domain present in ArnR1-like putative DNA binding protein. ArnR1-like transcription factors have been implicated in regulating the expression of components found in both the archaeal adhesive pilus and UV-inducible pili systems. This domain is also found in many uncharacterised bacterial sequences.
