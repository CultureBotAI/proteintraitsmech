identifier: InterPro:IPR049512
label: "Double jelly roll-like domain"
definition: >-
  This entry represents a domain found in a family of proteins mainly from arthropods containing a jelly-roll domain, which has similarity to domains otherwise found in a variety of large dsDNA virus capsid proteins.
