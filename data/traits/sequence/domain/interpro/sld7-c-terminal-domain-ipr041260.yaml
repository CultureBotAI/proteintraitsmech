identifier: InterPro:IPR041260
label: "Sld7 C-terminal domain"
definition: >-
  This is an α helical domain found at the C-terminal region of Sld7 proteins. Yeast Sld3 and its metazoan counterpart treslin are the hub proteins mediating protein associations critical for formation of the replicative helicase at the replication origins of chromosomes. Sld7 forms a complex with Sld3 throughout the cell cycle, and associates with and dissociates from origins in an Sld3-dependent manner and is thought to regulate the function of Sld3. Structural analysis of S. cerevisiae Sld7 indicates that two Sld7 molecules form a homodimer using their C-terminal domains.
