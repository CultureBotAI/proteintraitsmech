identifier: InterPro:IPR063565
label: "YAL037W, N-terminal domain"
definition: >-
  This entry represents an N-terminal domain found in uncharacterised proteins from fungi. The domain adopts a β-sheet structure. Family members include YAL037W and YOR342C from Saccharomyces cerevisiae, along with orthologues from other fungal species. The proteins containing this domain are uncharacterised and their function remains to be determined.
