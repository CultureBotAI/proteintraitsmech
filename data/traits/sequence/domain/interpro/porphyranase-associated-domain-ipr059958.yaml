identifier: InterPro:IPR059958
label: "Porphyranase-associated domain"
definition: >-
  This entry represents a domain of approximately 90 residues found in marine bacterial proteins involved in polysaccharide degradation. The domain is found C-terminal to glycoside hydrolase domains in porphyranases such as PorD from Zobellia galactanivorans. This domain frequently occurs in multiple tandem copies, with up to three copies observed in some proteins. It is often associated with glycoside hydrolase family 16 domains ( ), ricin-type beta-trefoil lectin domains ( ), and T9SS sorting signals ( ). The proteins containing this domain are typically secreted or periplasmic enzymes that degrade sulfated polysaccharides such as porphyran from red algae. The function of this domain remains to be determined but may be involved in substrate binding or protein stability.
