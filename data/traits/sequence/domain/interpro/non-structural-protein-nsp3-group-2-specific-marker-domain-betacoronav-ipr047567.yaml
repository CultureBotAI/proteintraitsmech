identifier: InterPro:IPR047567
label: "Non-structural protein NSP3, group 2-specific marker domain, betacoronavirus"
definition: >-
  This entry represents the group 2-specific marker (G2M) domain, also known as betacoronavirus-specific marker (bCoV-SM), that is found in the nonstructural protein NSP3 from betacoronavirus. This domain is absent in alpha- and deltacoronaviruses. NSP3 is the largest protein encoded by the coronavirus genome and plays various roles in the viral life cycle. It is an essential component of the replication/transcription complex. It consists of several distinct domains, the organisation of which differs between coronavirus genera, due to duplication or absence of some domains. The G2M domain adopts a globular structure with segregated α-helices and β-strands .
