identifier: InterPro:IPR033656
label: Histidyl-anticodon-binding
definition: >-
  Histidyl-tRNA synthetase (HisRS) belongs to class II aminoacyl-tRNA synthetases (aaRS). This entry represents the anticodon binding domain, which is responsible for specificity in tRNA-binding, so that the activated amino acid is transferred to a ribose 3' OH group of the appropriate tRNA only.
