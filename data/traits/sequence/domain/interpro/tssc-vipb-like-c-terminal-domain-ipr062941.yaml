label: "TssC/VipB-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of TssC-like proteins represented by . This domain shares similarity to domains members of the GpW/Gp25-like domain superfamily. This domain can also be found in its own in uncharacterised bacterial proteins.
