identifier: InterPro:IPR049808
label: "CONSTANS-like, B-box-type 1 zinc finger"
definition: >-
  This entry includes a group of plant sequences which belong to the BBX family, a group of zinc finger transcription factors that contain one or two B-box motifs, and sometimes also feature a CCT (CONSTANS, CO-like, and TOC1) domain. They play important roles in plant growth and development, including seedling photomorphogenesis, photoperiodic regulation of flowering, shade avoidance, and responses to biotic and abiotic stresses. Their B-box motifs show high sequence similarity with B-Box-type 1 zinc finger found in tripartite motif-containing proteins (TRIMs) and are involved in mediating transcriptional regulation and protein-protein interaction in plant signaling. The type 1 B-box (Bbox1) zinc finger is characterised by a C6H2 zinc-binding consensus sequence motif. This family adopts a canonical B-box fold and coordinates two zinc atoms but contains a modified motif, C3XC2H2, where X can be D, E, C or H.
