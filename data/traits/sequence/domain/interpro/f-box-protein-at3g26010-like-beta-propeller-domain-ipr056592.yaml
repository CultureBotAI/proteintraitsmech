identifier: InterPro:IPR056592
label: "F-box protein At3g26010-like, beta-propeller domain"
definition: >-
  This entry represents the C-terminal β-propeller domain of F-box protein At3g26010 from Arabidopsis thaliana and similar plant proteins. It has been shown that this domain has a strong specificity for ASK13. Members of this family contain an F-box domain ( ).
