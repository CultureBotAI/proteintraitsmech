identifier: InterPro:IPR040449
label: "LD-carboxypeptidase, N-terminal"
definition: >-
  This entry includes proteins belonging to the MEROPS peptidase family S66, such as muramoyl-tetrapeptide carboxypeptidase and the microcin c7 self-immunity protein . The structure of Pseudomonas aeruginosa LD-carboxypeptidase showed that the enzyme consists of an N-terminal β-sheet and a C-terminal β-barrel domain. This entry represents the N-terminal domain.
