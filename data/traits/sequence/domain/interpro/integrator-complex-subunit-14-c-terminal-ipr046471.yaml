identifier: InterPro:IPR046471
label: "Integrator complex subunit 14, C-terminal"
definition: >-
  This entry represents the C-terminal α-helical domain of Integrator complex subunit 14 (IntS14), a component of the integrator complex which is involved in the transcription of small nuclear RNAs (snRNA) and their 3'-box dependent processing. This complex is also involved in the 3'-end processing of the U7 snRNA, and the spliceosomal snRNAs U1 and U5. IntS14 interacts with IntS13; both of them consist of an N-terminal VWA domain ( ) followed by a central β-barrel domain ( ) and a C-terminal α-helical domain, which are connected through a linker devoid of secondary structure elements. This domain contribute to binding by packing against the β-barrel of IntS13.
