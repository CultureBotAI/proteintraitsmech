identifier: InterPro:IPR064086
label: "TasA, anchoring/assembly domain"
definition: >-
  This entry represents the anchoring/assembly domain found in TasA from Bacillus and related Bacillales. TapA is a secreted protein essential for biofilm formation and serves as an accessory protein required for proper anchoring and polymerisation of TasA amyloid fibres at the cell surface. The domain comprises residues 78-186 of the mature protein and forms the structured core containing β strands critical for fibre assembly. TapA is a minor component of the amyloid fibres and is part of the tapA- sipW-tasA operon. Expression is repressed by the master biofilm regulator SinR and activated by RemA.
