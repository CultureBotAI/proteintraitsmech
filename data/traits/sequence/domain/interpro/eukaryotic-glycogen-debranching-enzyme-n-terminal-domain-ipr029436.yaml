identifier: InterPro:IPR029436
label: "Eukaryotic glycogen debranching enzyme, N-terminal domain"
definition: >-
  This domain is found at the N terminus of the eukaryotic variant of the glycogen debranching enzyme (GDE), where it is immediately followed by the aldolase-like domain. The eukaryotic GDE performs two functions: 4-alpha-glucanotransferase ( ) and amylo-alpha-1,6-glucosidase ( ), performed by the N- and C-terminal halves of the enzyme respectively.
