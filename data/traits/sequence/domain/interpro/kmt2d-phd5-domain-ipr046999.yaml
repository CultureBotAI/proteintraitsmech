identifier: InterPro:IPR046999
label: "KMT2D, PHD5 domain"
definition: >-
  Histone-lysine N-methyltransferase 2D (KMT2D, also known as MLL2; ) is a catalytic component of the MLL2/3 complex (also named ASCOM complex) and methylates 'Lys-4' of histone H3 (H3K4me). H3K4me represents a specific tag for epigenetic transcriptional activation. KMT2D is recruited by ESR1 and acts as a coactivator of the oestrogen receptor alpha. It functions as a scaffold protein for association with WRAD (WDR5, RbBP5, ASH2L, and DPY30), NCOA6, PTIP, PA1, and H3K27 demethylase UTX, being responsible for maintaining the stability of UTX. KMT2D plays critical roles in regulating development, differentiation, metabolism, and tumour suppression. KMT2D contains the catalytic domain SET, five plant homeodomain (PHD) fingers, two extended PHD (ePHD) fingers, a RING finger, an HMG (high-mobility group)-binding motif, and two FY-rich regions. This entry represents the fifth PHD domain of KMT2D.
