identifier: InterPro:IPR047492
label: "STAM1, non-canonical GAT domain"
definition: >-
  This entry represents the non-canonical GAT domain of STAM1 and similar proteins from vertebrates. Signal transducing adapter molecule 1 (STAM1) is part of the endosomal sorting complex required for transport (ESCRT-0) and is involved in sorting ubiquitinated cargo proteins from the endosome. It may also be involved in the regulation of IL2 and GM-CSF mediated signalling, and has been implicated in neural cell survival. STAM1, together with another GAT domain-containing protein Hrs, forms a Hrs/STAM1 core complex that consists of two intertwined GAT domains, each consisting of two helices from one subunit, and one from the other subunit. The two GAT domains are connected by a two-stranded coiled-coil. The Hrs/STAM1 complex, an intertwined GAT heterodimer, is a scaffold for binding of ubiquitinated cargo proteins and coordinating ubiquitination and deubiquitination reactions that regulate sorting. It plays an important role in Dengue virus entry. STAMs were discovered as proteins that are highly phosphorylated following cytokine and growth factor stimulation. They function in cytokine signalling and surface receptor degradation, as well as regulate Golgi morphology. They associate with many proteins including Jak2 and Jak3 tyrosine kinases, Hrs, AMSH, and UBPY. STAM adaptor proteins contain VHS, ubiquitin interacting (UIM), and SH3 domains.
