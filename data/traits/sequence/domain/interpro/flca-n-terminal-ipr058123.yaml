identifier: InterPro:IPR058123
label: "FlcA, N-terminal"
definition: >-
  This entry represents the N-terminal region in FlcA. In spirochetes, flagella are located within the periplasm. FlcA is one of several structural proteins involved in the formation of the flagellar collar. The conserved N-terminal domain of about 40 amino acids and the C-terminal region domain of about 650 amino acids are separated by a long and variable-length stretch of low-complexity sequence.
