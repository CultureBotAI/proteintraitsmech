identifier: InterPro:IPR041234
label: "RavJ-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of proteins mainly from Legionella, including RavJ (lpg0944) from Legionella pneumophila, which is thought to be an effector of the Icm/Dot translocation system from this bacteria. This domain folds into an all-α structure. This domain was previously known as DUF5617.
