identifier: InterPro:IPR044472
label: "STRBP, first double-stranded RNA binding domain"
definition: >-
  Spermatid perinuclear RNA-binding protein (STRBP, SPNR) is a microtubule-associated RNA-binding protein that localises to the manchette, a rod-like structure composed of microtubules, in developing spermatids. It plays an important role in normal spermatogenesis and sperm function. SPNR is highly expressed in testis, ovary, and brain. It contains two dsRNA binding domains (DRBDs) toward its carboxyl terminus as well as a putative leucine zipper motif. This entry represents the first double-stranded RNA binding domain of STRBP.
