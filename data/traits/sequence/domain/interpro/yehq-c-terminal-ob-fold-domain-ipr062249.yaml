identifier: InterPro:IPR062249
label: "YehQ, C-terminal OB-fold domain"
definition: >-
  This entry represents a C-terminal OB-fold domain found in YehQ-like proteins from bacteria, predominantly Actinomycetes and Gammaproteobacteria. YehQ proteins contain two N-terminal SWIM-type zinc finger domains followed by this C-terminal domain. YehQ is classified under COG4715. The function of this domain remains to be determined.
