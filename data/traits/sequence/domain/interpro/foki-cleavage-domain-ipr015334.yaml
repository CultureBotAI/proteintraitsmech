identifier: InterPro:IPR015334
label: FokI, cleavage domain
definition: >-
  Type IIS restriction endonuclease FokI is a member of an unusual class of bipartite restriction enzymes that recognises the double-stranded DNA sequence 5'-GGATG-3' and cleave DNA phosphodiester groups 9 base pairs away on this strand and 13 base pairs away on the complementary strand. FokI contains amino- and carboxy-terminal domains corresponding to the DNA-recognition and cleavage functions, respectively. The recognition domain is made of three smaller subdomains (D1, D2 and D3) which are evolutionarily related to the helix-turn-helix-containing DNA-binding domain of the catabolite gene activator protein CAP. This entry represents the C-terminal cleavage domain of FokI, which adopts a structure consisting of an α/β/α core containing a five-stranded β-sheet.
