identifier: InterPro:IPR049406
label: "Zinc transporter ZIP4/12, EF-hand"
definition: >-
  This entry represents an EF-hand-like domain found in a group of Zip zinc transporters from vertebrates, including human Zinc transporter ZIP4/12. ZIP12 may play a role in neurulation and neurite extension. It may also be involved in maintaining intracellular zinc content at levels that reduce the inhibitory effects of rises in oxidative stress on spermatogonia and spermatozoa viability during spermatogenesis.
