identifier: InterPro:IPR057020
label: "Follistatin-related protein 1, EF-hand domain pair"
definition: >-
  This is the EF-hand domain pair found in human Follistatin -like protein 1 (FSTL1), a secreted glycoprotein involved in angiogenesis, regulation of the immune response, cell proliferation and differentiation. EF-hands tend to occur in pairs or higher copy numbers.
