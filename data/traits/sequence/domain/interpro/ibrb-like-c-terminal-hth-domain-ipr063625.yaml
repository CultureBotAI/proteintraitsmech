identifier: InterPro:IPR063625
label: "IbrB-like, C-terminal HTH domain"
definition: >-
  This entry represents the C-terminal helix-turn-helix domain found in Transcriptional regulator IbrB and Uncharacterized protein YbdM. The domain is approximately 50 residues in length and is found downstream of a ParB/Sulfiredoxin domain ( ). IbrB together with IbrA activates immunoglobulin-binding eib genes in Escherichia coli. The ParB/Sulfiredoxin superfamily includes diverse DNA-binding proteins involved in chromosomal and plasmid segregation, transcriptional regulation, and proteins with ATPase and DNase activities. The E. coli K12 protein YbdM contains this domain architecture but its function has not been experimentally determined.
