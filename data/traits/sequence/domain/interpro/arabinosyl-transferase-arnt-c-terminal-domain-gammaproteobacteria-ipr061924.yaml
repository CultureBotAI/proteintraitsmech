identifier: InterPro:IPR061924
label: "Arabinosyl transferase ArnT, C-terminal domain, gammaproteobacteria"
definition: >-
  This entry represents a C-terminal domain found in the 4-amino-4-deoxy-L-arabinose lipid A transferase ArnT. ArnT catalyses the transfer of L-Ara4N from undecaprenyl phosphate-alpha-L-Ara4N to lipid A. This modification confers resistance to polymyxin and cationic antimicrobial peptides. The full-length ArnT protein contains an N-terminal transmembrane region with a PMT domain, followed by this C-terminal domain which is located in the periplasm. This domain is distantly related to . Members of this group are mainly found in gammaproteobacteria, particularly in enterobacterales and pseudomonadales.
