identifier: InterPro:IPR057617
label: "PML, C-terminal domain"
definition: >-
  This domain is found at the C-terminal in human and mice Protein PML and its orthologues in animals. TRIM19, also known as PML, acts in association with PML-nuclear bodies (PML-NBs) in a wide range of important cellular processes, such as tumour suppression, transcriptional regulation, apoptosis, senescence, DNA damage response, and viral defence mechanisms. It acts as the scaffold of PML-NBs allowing other proteins to shuttle in and out, a process which is regulated by SUMO-mediated modifications and interactions. PML exhibits antiviral activity as it stimulates the SUMOylation of a viral protein, which is supposed to serve as a cellular mechanism to compromise specific functions of the viral effector IE1p72.
