identifier: InterPro:IPR030220
label: Activated CDC42 kinase 1, UBA domain
definition: >-
  Activated CDC42 kinase 1 (Ack1) is a non-receptor tyrosine kinase (NRTK) that is implicated in metastatic behaviour, cell spreading and migration, and epidermal growth factor receptor (EGFR) signalling. It interacts with a number of transmembrane receptor tyrosine kinases and is involved in several cell signalling pathways. Its activation has been linked to cancer progression. This entry represents the C-terminal ubiquitin-association (UBA) domain of ACK1.
