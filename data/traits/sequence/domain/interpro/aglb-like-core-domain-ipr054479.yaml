identifier: InterPro:IPR054479
label: "AglB-like, core domain"
definition: >-
  This entry represents the core domain of archaeal oligosaccharyltransferase AglB that transfers oligosaccharide chain from a lipid-linked oligosaccharide (LLO) donor to the asparagine residues in the N-glycosylation sequon, Asn-X-Ser/Thr (X=Pro). In the archaea AlgB, it occurs alone, rather than in complex as the animal homologue STT3, also included in this entry. This domain adopts a mixed α/β fold and contains a highly conserved WWDYG motif that may be of functional relevance.
