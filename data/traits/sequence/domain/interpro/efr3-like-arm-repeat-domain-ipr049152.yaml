identifier: InterPro:IPR049152
label: "EFR3-like, ARM-repeat domain"
definition: >-
  This entry represents the N-terminal domain of a group of animal, plant and fungal EFR3-like proteins, which consists of armadillo repeats. EFR3 protein form a complex with Ypp1/TTC7 which is required to localise phosphatidylinositol 4-kinase (PI4K) to the plasma membrane. EFR3 acts as a regulator of the Stt4p phosphatidylinositol 4-kinase at contact sites between the endoplasmic reticulum and the plasma membrane. EFR3 consists of armadillo repeats at its N terminus, which act as a scaffold and a basic patch binds acidic phospholipids that anchors the complex to the plasma membrane.
