identifier: InterPro:IPR063803
label: "Mycolysin-like, C-terminal"
definition: >-
  This entry represents the peptidase C-terminal domain of mycolysin, a metalloprotease found in Actinomycetes, particularly Streptomyces and Pseudonocardiaceae species. The full-length mycolysin contains an N-terminal domain and a middle domain. This domain is also found at the C-terminal of Uncharacterized protein AF_1944.
