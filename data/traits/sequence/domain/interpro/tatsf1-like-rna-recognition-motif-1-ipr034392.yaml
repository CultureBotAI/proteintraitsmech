identifier: InterPro:IPR034392
label: TatSF1-like, RNA recognition motif 1
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of Tat-SF1, which interacts with components of both the transcription and splicing machineries. It has been shown to be a cofactor for human immunodeficiency virus-type 1 (HIV-1) Tat, which stimulates transcription elongation of HIV-1 through a series of events termed Tat transactivation. It contains two RNA recognition motifs (RRMs) and a highly acidic carboxyl-terminal half.
