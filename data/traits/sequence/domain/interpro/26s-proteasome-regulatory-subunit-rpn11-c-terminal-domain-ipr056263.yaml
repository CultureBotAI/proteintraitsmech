identifier: InterPro:IPR056263
label: "26S proteasome regulatory subunit RPN11, C-terminal domain"
definition: >-
  This entry represents the C-terminal helical domain of Ubiquitin carboxyl-terminal hydrolase RPN11 from Saccharomyces cerevisiae, its animal homologue 26S proteasome non-ATPase regulatory subunit 14 (also named RPN11) and similar eukaryotic 26S proteosomal subunits. This region is involved in forming a helical bundle with other RPN subunits to help with assembly of the proteosome lid.
