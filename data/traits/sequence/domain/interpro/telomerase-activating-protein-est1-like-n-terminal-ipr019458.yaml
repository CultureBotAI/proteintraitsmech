identifier: InterPro:IPR019458
label: "Telomerase activating protein Est1-like, N-terminal"
definition: >-
  Est1 is directly involved in telomere replication. It associates with telomerase and, during its interaction with CDC13, telomerase activity is promoted. This entry also includes Est1 homologues, such as human EST1A (also known as SMG6), which is essential for the replication of chromosome termini and also plays a role in nonsense-mediated mRNA decay.
