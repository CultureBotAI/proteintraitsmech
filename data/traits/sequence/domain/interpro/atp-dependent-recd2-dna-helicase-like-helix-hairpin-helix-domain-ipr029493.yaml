identifier: InterPro:IPR029493
label: "ATP-dependent RecD2 DNA helicase-like, helix-hairpin-helix domain"
definition: >-
  This presumed domain contains at least one helix-hairpin-helix motif. This domain is found in ATP-dependent RecD2 DNA helicase from Bacillus subtilis and similar bacterial sequences. RecD2 may favor replication restart by preventing RecA from binding to blocked replication forks, avoiding unnecessary recombination during replication restart. It acts as a negative modulator of the RecA-ssDNA filament, and it may disassemble RecA threads. It can act as both a positive and negative regulator of strand exchange.
