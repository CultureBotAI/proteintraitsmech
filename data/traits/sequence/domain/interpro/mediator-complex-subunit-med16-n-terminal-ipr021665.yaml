identifier: InterPro:IPR021665
label: Mediator complex, subunit Med16, N-terminal
definition: >-
  This entry represents the N-terminal β-propeller domain of human Mediator of RNA polymerase II transcription subunit 16 (MED16) and similar proteins from fungi and animals. Mediator is a large complex of up to 33 proteins that is conserved from plants through fungi to humans - the number and representation of individual subunits varying with species. It is arranged into four different sections, a core, a head, a tail and a kinase-activity part, and the number of subunits within each of these is what varies with species. Overall, Mediator regulates the transcriptional activity of RNA polymerase II but it would appear that each of the four different sections has a slightly different function. Med16 is one of the subunits of the Tail portion of the Mediator complex and is required for lipopolysaccharide gene-expression. Several members including the human protein, , have one or more WD40 domains on them.
