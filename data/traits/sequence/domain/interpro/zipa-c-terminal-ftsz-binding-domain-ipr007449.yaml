identifier: InterPro:IPR007449
label: ZipA, C-terminal FtsZ-binding domain
definition: >-
  This entry represents the ZipA C-terminal domain. ZipA, a membrane-anchored protein, is an essential cell division protein involved in septum formation. FtsA and the C-terminal domain of ZipA bind FtsZ, a homologue of eukaryotic tubulins and a major component of the bacterial septal ring, at the prospective division site. This is followed by the sequential addition of FtsK, FtsQ, FtsL, FtsW, FtsI, and FtsN. ZipA contains three domains: a short N-terminal membrane-anchored domain, a central P/Q domain that is rich in proline and glutamine and a C-terminal domain, which comprises almost half the protein. The structure of the C-terminal domain is an α-β fold with three α helices and a β sheet of six antiparallel β strands. The major loops protruding from the β sheet surface are thought to form a binding site for FtsZ.
