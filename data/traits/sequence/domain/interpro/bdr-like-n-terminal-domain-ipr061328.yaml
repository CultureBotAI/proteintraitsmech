identifier: InterPro:IPR061328
label: "Bdr-like, N-terminal domain"
definition: >-
  Bdr (Borrelia direct repeat) proteins have an N-terminal domain, a variable length region of repeats, typically 11 amino acids long with a KID repeat, and a non-repetitive C-terminal domain. This entry describes the conserved N-terminal domain of families designated BdrA, BdrB, and BdrC. A related but non-overlapping model, , describes the N-terminal domain of additional Bdr families.
