identifier: InterPro:IPR026361
label: "Extracellular matrix-binding protein Ebh domain"
definition: >-
  Staphylococcal protein Ebh (extracellular matrix-binding protein homolog) is a giant protein, sometimes over 10,000 amino acids long. Ebh from Staphylococcus aureus promotes bacterial attachment to both soluble and immobilised forms of fibronectin (Fn), in a dose-dependent and saturable manner. This entry represents a non-repetitive amino-terminal domain of about 2400 amino acids found in Ebh proteins.
