identifier: InterPro:IPR058633
label: "Multidrug export protein EmrA/FarA, alpha-helical hairpin domain"
definition: >-
  This domain is found in the Multidrug export protein EmrA and related proteins, including its paralogue ErmK and Fatty acid resistance protein FarA. EmrA is a crucial component of the EmrAB-TolC efflux system in Escherichia coli, which plays a significant role in conferring resistance to various antibiotics and toxic compounds. This protein bridges the inner membrane transporter EmrB and the outer membrane channel TolC and thus facilitates the export of substances across both membranes. FarA mediates resistance to long-chained antibacterial fatty acids.
