identifier: InterPro:IPR044140
label: "Proline--tRNA ligase, anticodon binding domain"
definition: >-
  This entry represents the short version of anticodon binding domain found predominantly in bacteria. This domain can be found in proline--tRNA ligase ProRS, which belongs to class II aminoacyl-tRNA synthetase. This domain is responsible for specificity in tRNA-binding, so that the activated amino acid is transferred to a ribose 3' OH group of the appropriate tRNA only. Prolyl-tRNA synthetase belongs to class IIa. Prolyl-tRNA synthetase ( ) exists in two forms, which are loosely related. The first form is present in the majority of eubacteria species. The second one, present in some eubacteria, is essentially present in archaea and eukaryota. This entry contains the first form of prolyl-tRNA synthetase. Aminoacyl-tRNA synthetases (also known as aminoacyl-tRNA ligases) catalyse the attachment of amino acids to their cognate transfer RNA molecules through a highly specific two-step reaction. These enzymes vary widely in size and oligomeric state, and share limited sequence homology. The 20 aminoacyl-tRNA synthetases are divided into two classes. Class I synthetases contain a characteristic Rossmann fold catalytic domain and are predominantly monomeric. Class II synthetases feature an antiparallel β-sheet fold flanked by α-helices and are mostly dimeric or multimeric, with at least three conserved regions. Despite these structural differences, both classes share a conserved α-helical structure involved in tRNA binding. The two classes also differ in their catalytic mechanisms: class I synthetases couple the aminoacyl group to the 2'-hydroxyl of the tRNA, whereas class II synthetases preferentially use the 3'-hydroxyl site. Class I includes synthetases specific for arginine, cysteine, glutamic acid, glutamine, isoleucine, leucine, methionine, tyrosine, tryptophan, valine, a…
