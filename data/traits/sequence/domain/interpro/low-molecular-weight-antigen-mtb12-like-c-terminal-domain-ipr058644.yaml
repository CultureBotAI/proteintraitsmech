identifier: InterPro:IPR058644
label: "Low molecular weight antigen MTB12-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of Low molecular weight antigen MTB12 from Mycobacterium tuberculosis, which may play a role in the development of protective immune responses. It shows a unique tertiary structure that consists of four β-strands and four α-helices. This group is specific to actinomycetes.
