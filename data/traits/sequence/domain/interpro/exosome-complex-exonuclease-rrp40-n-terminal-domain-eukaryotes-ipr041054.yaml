identifier: InterPro:IPR041054
label: "Exosome complex exonuclease Rrp40, N-terminal domain, eukaryotes"
definition: >-
  This is the N-terminal domain of Rrp40, an non-catalytic component of the RNA exosome complex from budding yeasts. The RNA exosome complex is responsible for degrading RNA molecules in the 3' to 5' direction. Rrp40 is a 'cap' protein and binds the RNase PH barrel on the opposite side from the S1/KH ring. The N-terminal domain of Rrp44 forms a long β-hairpin that is wedged in between Rrp41-Rrp42 and approaches the N terminus of the cap protein Rrp4.
