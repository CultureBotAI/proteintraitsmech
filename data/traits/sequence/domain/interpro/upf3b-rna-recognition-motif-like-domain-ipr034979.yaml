identifier: InterPro:IPR034979
label: "UPF3B, RNA recognition motif-like domain"
definition: >-
  This entry represents the RNA recognition motif (RRM)-like domain in Upf3B (also known as Regulator of nonsense transcripts 3B), a human orthologue of yeast Upf3p and Caenorhabditis elegans SMG-4. It derives from X-linked gene UPF3B and is required for nonsense-mediated mRNA decay (NMD) in human. Upf3B is a nucleocytoplasmic shuttling protein that associates selectively with spliced beta-globin mRNA in vivo. Like other Upf3 proteins, Upf3B contains nuclear import and export signals, and a conserved domain with some similarity to an RNA recognition motif (RRM), indicating that it may be an RNA binding protein.
