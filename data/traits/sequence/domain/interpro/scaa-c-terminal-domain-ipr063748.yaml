identifier: InterPro:IPR063748
label: "ScaA, C-terminal domain"
definition: >-
  This entry represents a TPR (tetratricopeptide repeat) domain found in ScaA, the Sca1 complex scaffold protein from Dictyostelium discoideum. ScaA contains four TPR repeats that contribute to its scaffolding function within the Sca1 complex. The Sca1 complex regulates cell motility, chemotaxis and signal relay by controlling RasC activation and the TORC2-Akt pathway. ScaA acts as a molecular scaffold bringing together gefA, gefH, phr and PP2A subunits within the complex. This TPR domain is found in amoebozoan species and contributes to protein-protein interactions essential for complex assembly and function.
