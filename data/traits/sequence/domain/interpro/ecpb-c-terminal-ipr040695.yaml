identifier: InterPro:IPR040695
label: "EcpB, C-terminal"
definition: >-
  This is an immunoglobulin like domain found at the C-terminal region of EcpB. It is a periplasmic chaperone which along with EcpE help assemble the E. coli common pilus (ECP) EcpA and EcpD subunits. The C-terminal domain is predicted to contain residues that might be involved in binding a C-terminal carboxylate anchor.
