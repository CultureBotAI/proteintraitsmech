identifier: InterPro:IPR005101
label: "Cryptochrome/DNA photolyase, FAD-binding domain"
definition: >-
  This entry represents a multi-helical domain found in the C terminus of the cryptochrome proteins and DNA photolyases. It acts as a FAD-binding domain. The cryptochrome and photolyase families consist of structurally related flavin adenine dinucleotide (FAD) proteins that use the absorption of blue light to accomplish different tasks. The photolyasess use the blue light for light-driven electron transfer to repair UV-damaged DNA, while the cryptochromes are blue-light photoreceptors involved in the circadian clock for plants and animals.
