identifier: InterPro:IPR053905
label: "Elongation factor G-like, domain II"
definition: >-
  This entry represents a domain found in the bacterial group of Elongation factor G (EF-G) proteins, which catalyse the translocation step of translation. It consists of five structural domains, this entry represents the second domain which adopts a β-barrel structure. This entry also includes other translation factors such as translation initiation factor IF-2, peptide chain release factor 3 (RF3), mitochondrial ribosome-releasing factor 2 (also known as EFG2 mitochondrial), among others.
