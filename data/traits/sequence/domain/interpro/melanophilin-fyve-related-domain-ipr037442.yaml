identifier: InterPro:IPR037442
label: "Melanophilin, FYVE-related domain"
definition: >-
  Melanophilin, also termed SlaC2-a, or exophilin-3, is a GTP-bound form of Rab27A-, myosin Va-, and actin-binding protein present on melanosomes. It is involved in the control of transferring of melanosomes from microtubules to actin filaments. It also functions as a melanocyte type myosin Va (McM5) binding partner and directly activates the actin-activated ATPase activity of McM5 through forming a tripartite protein complex with Rab27A and an actin-based motor myosin Va.
