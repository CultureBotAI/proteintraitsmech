identifier: InterPro:IPR028660
label: "Sorting nexin-1, BAR domain"
definition: >-
  Sorting nexin-1 (SNX1) belongs to the sorting nexin family, which contains a conserved PX (phox homology) domain ( ) that is responsible for binding to specific phosphoinositides. SNX1 and SNX2 are orthologues of yeast Vps5, which is a component of retromer complex that is essential in endosome-to-Golgi retrograde transport. The mammalian retromer complex is composed of the SNX1/SNX2 alternative heterodimer or homodimer and the Vps26-Vps29-Vps35 obligate heterotrimer. Like SNX2, SNX1 also has an additional C-terminal BAR domain. SNX1 and SNX2 play interchangeable but essential roles in retromer structure and function. SNX1 may have a role in sensing membrane curvature and inducing the formation of tubules. This entry represents the Bin/Amphiphysin/Rvs (BAR) domain of SNX1. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions.
