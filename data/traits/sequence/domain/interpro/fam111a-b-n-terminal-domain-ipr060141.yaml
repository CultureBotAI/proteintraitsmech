identifier: InterPro:IPR060141
label: "FAM111A/B, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in human paralogues FAM111A and FAM111B and related proteins mainly from mammals. This domain has been shown to be essential for autoinhibition and dimerisation, both of which are critical for regulating the protease activity. FAM111 proteins are serine proteases involved in maintaining genomic integrity by cleaving covalent DNA-protein cross-links (DPCs) during DNA synthesis. These cross-links are toxic lesions that can interfere with replication and transcription, and are induced by agents such as UV light or formaldehyde. FAM111 proteins protect replication forks from stalling by removing DPCs, including those involving topoisomerase 1 and PARP1-DNA complexes. They are essential for PCNA loading at replication sites and promote S-phase entry and DNA synthesis. Additionally, FAM111 proteins act as restriction factors against certain viruses, affecting nuclear barrier function during viral replication and interacting with viral proteins to promote their degradation. FAM111A plays a critical role in DNA replication and replication fork stabilization, thereby contributing to the preservation of genomic integrity. Beyond its function in DNA metabolism, FAM111A exhibits antiviral activity against both DNA and RNA viruses. Its paralog, FAM111B, shares structural similarity with FAM111A but engages in distinct cellular functions. FAM111B mediates cell cycle regulation and apoptosis by modulating the expression of anti-apoptotic factors and cell cycle-associated proteins. In addition, the interaction of FAM111B with nucleoporins implicates it in nucleo-cytoplasmic transport and the maintenance of telomere homeostasis. Although FAM111A and FAM111B execute specialized roles within the cell, they demonstrate partial functional o…
