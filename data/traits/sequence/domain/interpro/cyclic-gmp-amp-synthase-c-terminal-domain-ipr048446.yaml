identifier: InterPro:IPR048446
label: "Cyclic GMP-AMP synthase, C-terminal domain"
definition: >-
  This domain is found Cyclic GMP-AMP synthase from Vibrio cholerae (DncV), a prokaryotic cGAS-like enzyme that synthesises cyclic GMP- AMP (c-GAMP) and stimulates intestinal colonisation. DncV adopts a structure and topology that are typical of the nucleotidyltransferase superfamily. It is organised into two domains: an N-terminal domain that contains the catalytic loop ( ) and a C- terminal helix bundle that consists of eight helices and one pair of antiparallel β-sheets, represented in this entry.
