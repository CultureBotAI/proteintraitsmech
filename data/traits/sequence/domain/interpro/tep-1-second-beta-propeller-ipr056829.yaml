identifier: InterPro:IPR056829
label: "TEP-1, second beta-propeller"
definition: >-
  This entry represents the second of three presumed β-propeller domains found at the C-terminal of Telomerase protein component 1 (TEP1), a component of the telomerase ribonucleoprotein complex that is essential for the replication of chromosome termini. It is also a component of the ribonucleoprotein vaults particle, a multi-subunit structure involved in nucleo-cytoplasmic transport.
