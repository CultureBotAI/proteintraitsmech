identifier: InterPro:IPR048851
label: "Stability determinant domain"
definition: >-
  This entry represents a domain that covers most of the protein sequence in Stability determinant from Escherichia coli (PaaA2, ) and similar proteins predominantly found in proteobacteria. PaaA2 is an antitoxin from prokaryotic type II toxin-antitoxin three- component module paaR2-paaA2-parE2 that belongs to the RelB- antitoxin family but lacks a DNA-binding domain. It shows two α-helices and adopts defined loop conformations when it wraps itself around the toxin ParE2. This domain is also found associated with in some uncharacterised proteins.
