identifier: InterPro:IPR040674
label: "PvuRts1 I-like, SET and RING associated domain"
definition: >-
  This is the C-terminal domain found in the restriction endonuclease PvuRts1 I from Proteus vulgaris ( ) and similar bacterial sequences. PvuRts1I a modification-dependent endonuclease with high selectivity for 5-hydroxymethylcytosine, an epigenetic marker that is crucial for multiple biological processes, over 5-methylcytosine and cytosine. This protein is organised into a nuclease domain (this entry) and a C-terminal SRA (SET and RING associated) domain ( ). This domain has the typical SRA domain fold.
