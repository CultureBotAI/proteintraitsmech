identifier: InterPro:IPR056309
label: "CGL160/ATPI domain"
definition: >-
  This domain is found in Protein CONSERVED ONLY IN THE GREEN LINEAGE 160 from Arabidopsis thaliana (CGL160), ATP synthase protein I (ATPI) from cyanobacteria and similar proteins. CGL160 facilitates the assembly of the membrane proton channel of the chloroplastic F-type ATPase. ATPI may guide the assembly of the membrane sector of the ATPase enzyme complex.
