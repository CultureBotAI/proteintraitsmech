identifier: InterPro:IPR058804
label: "SpaO, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Surface presentation of antigens protein SpaO from Salmonella typhimurium and related proteins. This domain is predicted to structurally resemble the N-terminal domain of FliM. It is followed by two repeats that have similarity to the C-terminal domain of FliM and FliN which are predicted to assemble as the FliM and FliN heterodimer. SpaO is involved in a secretory pathway responsible for the surface presentation of determinants needed for the entry of Salmonella species into mammalian cells.
