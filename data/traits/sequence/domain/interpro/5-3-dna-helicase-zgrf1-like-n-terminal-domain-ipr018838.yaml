identifier: InterPro:IPR018838
label: "5'-3' DNA helicase ZGRF1-like, N-terminal domain"
definition: >-
  This domain can be found at the N-terminal end of human 5'-3' DNA helicase ZGRF1 and similar eukaryotic proteins. ZGRF1 promotes repair of replication-blocking DNA lesions through stimulation of homologous recombination (HR). This domain can also be found in Mte1 (Mph1-associated telomere maintenance protein 1) from Saccharomyces cerevisiae (also known as YGR042W), which is involved in telomere maintenance and in and fission yeast Dbl2 (C553.01c), involved in in meiotic chromosome segregation. Mte1 is a D-loop-binding protein that interacts and stimulates the helicase and fork regression activities of Mph1 while inhibiting the ability of Mph1 to dissociate recombination intermediates. Mph1 and Mte1 interdependently colocalise at DNA damage-induced foci and dysfunctional telomeres. Mte1 is indicated to play a role in regulation of crossover recombination, response to replication stress, and telomere maintenance. The fission yeast, Dbl2 is needed for cellular resistance to the topoisomerase I poison camptothecin, forms DNA damage-induced foci, and is needed for the optimal recruitment of Fml1 to DNA damage, while the human ZGRF1 protein has been linked to DNA cross-link repair and mutations of it have been found in a variety of human tumours. Having said that, there is no evidence to suggest that this domain, which is predicted to adopt an all-β structure, is implicated in DNA damage resistance or nuclear focus formation.
