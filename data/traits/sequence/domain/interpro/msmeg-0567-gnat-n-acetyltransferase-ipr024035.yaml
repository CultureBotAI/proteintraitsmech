identifier: InterPro:IPR024035
label: "MSMEG_0567 GNAT N-acetyltransferase"
definition: >-
  This entry includes proteins that belong to the GNAT family ( ), in which numerous characterised examples, though not all, are shown to be N-acetyltransferases or to interact with acetyl-CoA. In some instances, this is the N-terminal GNAT domain while in other members represents the full length, such as in sll0787 from Synechocystis sp. PCC 6803 ( ). This domain occurs in a sparsely distributed biosynthetic cluster that occurs in Actinobacteria, Cyanobacteria, and Proteobacteria.
