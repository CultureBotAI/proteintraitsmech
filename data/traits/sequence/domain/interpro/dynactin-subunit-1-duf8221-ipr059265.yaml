identifier: InterPro:IPR059265
label: "Dynactin subunit 1, DUF8221"
definition: >-
  This entry represents a long α-helical region found in dynactin-like proteins from animals and fungi, including human Dynactin subunit 1 (DCTN1) and Dynactin and 150 kDa isoform from Neurospora crassa (DAP-150). This region may mediate oligomerisation forming a coiled-coil. Human DCTN1 plays a key role in dynein-mediated retrograde transport of vesicles and organelles along microtubules. It binds to both dynein and microtubules providing a link between specific cargos, microtubules and dynein. It can also act as a brake to slow the dynein motor during motility along the microtubule and plays a role in primary cilia formation. Besides, this protein is able to regulate microtubule stability by promoting microtubule formation, nucleation and polymerisation and by inhibiting microtubule catastrophe in neurons, plays a role in metaphase spindle orientation, in centriole cohesion and subdistal appendage organisation and function and is also required for microtubule anchoring at the mother centriole. DAP-150 is required for the cytoplasmic dynein-driven retrograde movement of vesicles and organelles along microtubules.. Dynein-dynactin interaction is a key component of the mechanism of axonal transport of vesicles and organelles.
