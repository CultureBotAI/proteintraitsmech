identifier: InterPro:IPR003150
label: DNA-binding RFX-type, winged-helix domain
definition: >-
  The RFX family of transcription factors is characterised by a unique approximately 75-residue DNA-binding domain. RFX genes have been isolated in yeasts, nematode and vertebrates. The characteristic RFX-type HTH DNA binding domain has been recruited into otherwise very divergent regulatory factors functioning in a diverse spectrum of unrelated systems, including regulation of the mitotic cell cycle in fission yeast, the control of the immune response in mammals and infection by human hepatitis B virus.
