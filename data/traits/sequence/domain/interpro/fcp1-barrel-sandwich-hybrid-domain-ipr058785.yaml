identifier: InterPro:IPR058785
label: "FCP1, barrel-sandwich hybrid domain"
definition: >-
  This domain is found in the human RNA polymerase II subunit A C-terminal domain phosphatase, also known as Fcp1, and related animal proteins. This barrel-sandwich hybrid domain is found at the N-terminal end of Fcp1. This domain contains a large insertion that is likely disordered. Fcp1 catalyses the dephosphorylation of the C-terminal domain of the largest RNA polymerase (RNAP) II and plays a role in polymerase recycling. Fcp1 preferentially dephosphorylates serine 2 residues within the CTD RNAP II heptads repeats YSPTSPS, although it can also act on serine 5 under certain conditions
