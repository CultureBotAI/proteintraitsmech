identifier: InterPro:IPR049135
label: "TEP1, second CUB domain"
definition: >-
  Thioester-containing protein 1 (TEP1) is a central component in the innate immune response of Anopheles gambiae to Plasmodium infection. TEP1 has a series of eight macroglobulin (MG) domains and the β-sheet CUB domain which is flanking the α-helical TED domain. The CUB domain can be divided in two sections, one at the N-terminal and the second at the C-terminal of the TED domain. This entry represents the second part of the CUB domain.
