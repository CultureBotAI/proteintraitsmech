identifier: InterPro:IPR041808
label: "CUE domain-containing protein 3, CUE domain"
definition: >-
  This entry represents the CUE domain found in fungal Cue3 proteins. Cue3 may be involved in the intramolecular monoubiquitination. This domain can also be found in uncharacterised proteins from invertebrates.
