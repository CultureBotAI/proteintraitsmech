identifier: InterPro:IPR048876
label: "TypA/BipA, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the TypA/BipA protein. The C-terminal domain of BipA forms a unique motif with two crossed β-sheets (comprising of two and four β-strands, respectively) wrapped by three short α-helices forming a nearly equilateral triangle. This family includes the GTP-binding protein BipA or TypA (Tyrosine phosphorylated protein A (TypA), also known as 50S ribosomal subunit assembly factor BipA) from bacteria and its homologue from Arabidopsis (putative elongation factor TypA-like SVR3). BipA is a 50S ribosomal subunit assembly protein with GTPase activity, required for 50S subunit assembly at low temperatures, also functions as a translation factor that is required specifically for the expression of the transcriptional modulator Fis. BipA binds the 70S ribosome at a site that coincides with that of EF-G and has a GTPase activity that is sensitive to high GDP:GTP ratios and is stimulated by 70S ribosomes programmed with mRNA and aminoacylated tRNAs. The growth rate-dependent induction of BipA allows the efficient expression of Fis, thereby modulating a range of downstream processes, including DNA metabolism and type III secretion. This GTPase impacts interactions between enteropathogenic E.coli (EPEC) and epithelial cells and also has an effect on motility. It appears to be involved in the regulation of several processes important for infection, including rearrangements of the cytoskeleton of the host, bacterial resistance to host defence peptides, flagellum-mediated cell motility, and expression of K5 capsular genes. TypA-like SVR3 is a putative chloroplastic elongation factor involved in response to chilling stress. It is required for proper chloroplast rRNA processing and/or translation at low temperature and it is also involved in pl…
