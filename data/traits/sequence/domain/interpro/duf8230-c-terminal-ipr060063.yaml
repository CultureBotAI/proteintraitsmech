identifier: InterPro:IPR060063
label: "DUF8230, C-terminal"
definition: >-
  This entry represents the C-terminal domain of a group of uncharacterised putative enzymes mainly found in archaea. It shows structural similarity to the C-terminal domain of enolase and has a TIM barrel fold.
