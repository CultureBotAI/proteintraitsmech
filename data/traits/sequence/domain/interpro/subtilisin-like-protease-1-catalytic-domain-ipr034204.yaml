identifier: InterPro:IPR034204
label: "Subtilisin-like protease 1, catalytic domain"
definition: >-
  This entry represents the catalytic domain in Subtilisin-like protease 1 from Plasmodium sp. and related proteins in bacteria. Included in this entry are: PfSUB1 from the malaria parasite Plasmodium (MEROPS identifier S08.012), which activates the merozoite surface protein MSP1 allowing it to bind spectrin in the host erythrocyte membrane prior to egress; perkinsin from the pathogenic marine protozoan Perkinsus (S08.041); and MCP-01 peptidase from the deep-sea bacterium Pseudoalteromonas (S08.130), which degrades insoluble collagen. The subtilisin family is one of the largest serine peptidase families characterised to date. Over 200 subtilisins are presently known, more than 170 of which have their complete amino acid sequence. It is widespread, being found in eubacteria, archaebacteria, eukaryotes and viruses. The vast majority of the family are endopeptidases, although there is an exopeptidase, tripeptidyl peptidase. Structures have been determined for several members of the subtilisin family: they exploit the same catalytic triad as the chymotrypsins, although the residues occur in a different order (HDS in chymotrypsin and DHS in subtilisin), but the structures show no other similarity. Some subtilisins are mosaic proteins, while others contain N- and C-terminal extensions that show no sequence similarity to any other known protein.
