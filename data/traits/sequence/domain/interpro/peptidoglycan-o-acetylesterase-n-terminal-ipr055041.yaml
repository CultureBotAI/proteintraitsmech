identifier: InterPro:IPR055041
label: "Peptidoglycan O-acetylesterase, N-terminal"
definition: >-
  This domain is found at the N-terminal end of peptidoglycan O-acetylesterases Ape1 from Neisseria meningitidis and similar sequences mainly found in proteobacteria. Ape1, which occurs in bacteria that O-acetylate their peptidoglycan, has an SGNH catalytic domain ( ) at the C-terminal end. This entry represents the N-terminal canonical β-sandwich that consists of two antiparallel β-sheets. It is likely to interact with a specific carbohydrate moiety.
