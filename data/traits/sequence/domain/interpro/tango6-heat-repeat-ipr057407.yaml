identifier: InterPro:IPR057407
label: "TANGO6, HEAT repeat"
definition: >-
  This region is found in the human Transport and Golgi organization protein 6 homolog (TANGO6) and similar proteins predominantly from animals and fungi. It is predicted to form HEAT repeats and is often found N-terminal to and . TANGO6 associates with COPI vesicles. Cytoplasmic TANGO6 tethers to COPI vesicle via a signal anchor and two transmembrane domains. Its N- and C-terminal cytoplasmic domains capture RNA polymerase II subunit B (RPB) 2 in the cis-Golgi during the G1 phase. TANGO6 is also observed in the nucleus where it enters via the COPI-SNARE-ER pathway. The nuclear entry of TANGO6 is assisted by KPNB1.
