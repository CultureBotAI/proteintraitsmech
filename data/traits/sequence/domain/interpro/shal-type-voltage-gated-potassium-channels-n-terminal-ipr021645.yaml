identifier: InterPro:IPR021645
label: "Shal-type voltage-gated potassium channels, N-terminal"
definition: >-
  This entry represents the N-terminal helical region of the Shal-type voltage-gated potassium channels. This domain interact with Kv channel-interacting proteins to modulate cell surface expression and function of Kv4 channels. The interaction of the Shal-type protein Kv4.2 and the Kv interacting protein KChiP1 forms a structure which is like the structure between calmodulin and its target peptides when they interact. Interactions of an N-terminal α helix in Kv4.2 and a C-terminal α helix in KChIP1 are essential for the modulation of Kv4.2 by KChIPs.
