identifier: InterPro:IPR049905
label: "Potassium channel tetramerization domain-containing protein 12, H1 domain"
definition: >-
  Potassium channel tetramerization domain-containing protein 12 (KCTD12), also called predominantly fetal expressed T1 domain (Pfetin), is a BTB/POZ domain-containing protein that is an auxiliary subunit of gamma-aminobutyric acid type B (GABA-B) receptors associated with mood disorders. It regulates agonist potency and kinetics of GABA-B receptor signalling. It promotes tumorigenesis by facilitating CDC25B/CDK1/Aurora A-dependent G2/M transition. It also regulates colorectal cancer cell stemness through the ERK pathway. KCTD12 consists of an N-terminal BTB domain followed by a region called the H1 domain. The BTB domain mediates interaction with the receptor. The H1 domain, which possesses a β-propeller-like fold, engages in interactions with G-protein β and γ subunits and is responsible for desensitisation. This entry corresponds to the H1 domain.
