identifier: InterPro:IPR049363
label: "RMI1, N-terminal domain"
definition: >-
  The N-terminal domain of RecQ-mediated genome instability protein 1 carries an oligo-nucleotide-binding domain or OB-fold, and forms a stable complex with Bloom syndrome protein BLM and DNA topoisomerase 3-alpha. At the very N-terminal, it has a three α-helical bundle, represented in this entry, which protrudes to one side of the structure and makes extensive hydrophobic contacts with the convex side of the β-barrel.
