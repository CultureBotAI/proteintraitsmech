identifier: InterPro:IPR061719
label: "Domain of unknown function DUF8658"
definition: >-
  This entry represents a family of small proteins of approximately 70 residues found in Cyanobacteriota, predominantly in Synechococcales. One member is also found in Paulinella, a cercozoan amoeba that possesses a cyanobacterium-derived chromatophore. The function of this family remains to be determined.
