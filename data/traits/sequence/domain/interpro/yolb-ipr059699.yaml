identifier: InterPro:IPR059699
label: YolB
definition: >-
  This entry represents YolB proteins derived from SPbeta prophage and related bacteriophages. YolB is a small protein of approximately 118 amino acids found in the SPbeta prophage of Bacillus subtilis and related systems. The protein is found across 32 species including both bacteria and viruses, particularly in Bacillales and Spbetavirus. YolB proteins are associated with prophage elements integrated into bacterial genomes. The function of this protein remains to be determined.
