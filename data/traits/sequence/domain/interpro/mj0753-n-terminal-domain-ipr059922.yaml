identifier: InterPro:IPR059922
label: "MJ0753, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the MJ0753 family of proteins found predominantly in methanogenic archaea and some bacteria. The full-length proteins are approximately 210 amino acids and contain predicted signal peptides, suggesting they are secreted proteins. This N-terminal domain contains a conserved pattern of cysteine and histidine residues that suggests zinc-binding capability. The function of this domain remains to be determined.
