identifier: InterPro:IPR062424
label: "PF3D7_1205000, helical domain"
definition: >-
  This entry represents a helical domain of the uncharacterised protein PF3D7_1205000 from Plasmodium falciparum. The protein is localised to membranes and is a multi-pass membrane protein. A peptide fragment N-terminal to this region (residues 263-292) has been identified as a possible candidate malaria epitope showing response in sera. The function of this domain remains to be determined.
