identifier: InterPro:IPR056383
label: "Diacylglycerol kinase iota-like domain"
definition: >-
  This domain is found in Diacylglycerol kinase iota (DGKI), zeta (DGKZ) and in DGK2. Diacylglycerol kinase converts diacylglycerol/DAG into phosphatidic acid/phosphatidate/PA and regulates the respective levels of these two bioactive lipids. This domain is found C-terminal to the catalytic ( ) and accessory ( ) domains.
