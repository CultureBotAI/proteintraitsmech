identifier: InterPro:IPR045455
label: "NrS-1 polymerase-like, helicase domain"
definition: >-
  This entry represents a helicase domain predominantly found in bacteria, but spread over all domains of life. This domain is found in putative P4-specific DNA primase from the Bacteriophage P4, a protein that acts as a DNA primase and DNA helicase and it has been characterised in NrS-1 polymerase from Nitratiruptor phage NrS-1, the first known phage that can infect Epsilonproteobacteria, one of the predominant primary producers in the deep-sea hydrothermal vent ecosystems. NrS-1 polymerase is a multidomain enzyme and is a key component of the phage replisome.
