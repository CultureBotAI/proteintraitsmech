identifier: InterPro:IPR064067
label: "Angiopoietin-like protein 3/8, helix-hairpin domain"
definition: >-
  This entry represents a helix-hairpin domain that covers the whole protein length in angiopoietin-like protein 8 (ANGPTL8), also known as betatrophin, lipasin, or refeeding-induced fat and liver protein (RIFL). ANGPTL8 is a secreted hormone that regulates serum triglyceride levels and acts as a blood lipid regulator. The protein is predominantly expressed in liver and adipose tissues and is induced by feeding and insulin stimulation. ANGPTL8 interacts with ANGPTL3 and may regulate its cleavage. Knockout studies demonstrate reduced serum triglyceride levels and disrupted lipid metabolism without affecting glucose homeostasis. The protein contains an N-terminal signal peptide and is subject to proteolytic cleavage. ANGPTL8 belongs to the angiopoietin-like protein superfamily but lacks the characteristic angiopoietin domain structure. This domain is also found N-terminal in Angiopoietin-related protein 3, which is involved in regulation of lipid and glucose metabolism.
