identifier: InterPro:IPR062258
label: "Protein GAMETE EXPRESSED 2 domain"
definition: >-
  This domain is found in Protein GAMETE EXPRESSED 2 from Arabidopsis thaliana (GEX2), a sperm-expressed protein required for gamete attachment, in the absence of which double fertilisation is compromised. This protein has several immunoglobulin-like domains. The domain represented by this entry is predicted to show an α-β configuration.
