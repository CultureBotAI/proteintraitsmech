identifier: InterPro:IPR045548
label: "MoxR-vWA-beta-propeller ternary system domain bpX5"
definition: >-
  This domain is known as bpX5, mainly found in proteobacteria. This entry represents an uncharacterised domain found in the MoxR-vWA-β-propeller ternary system, a class of NTP-dependent biological conflict systems.
