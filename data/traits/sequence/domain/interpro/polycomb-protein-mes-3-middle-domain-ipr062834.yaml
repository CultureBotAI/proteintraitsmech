identifier: InterPro:IPR062834
label: "Polycomb protein MES-3, middle domain"
definition: >-
  This entry represents the middle domain of the Polycomb protein MES-3 (maternal-effect sterile protein 3) found in nematodes. MES-3 is a component of Polycomb Repressive Complex 2 (PRC2) together with MES-2 and MES-6. The MES-2/MES-3/MES-6 complex is involved in maintaining transcriptional repression and participates in X chromosome inactivation in germline cells, acting via methylation of histone H3 Lys-27. Mutation of a conserved cysteine residue within this domain results in a temperature- sensitive phenotype affecting germline development. The specific function of this domain within the complex remains to be determined.
