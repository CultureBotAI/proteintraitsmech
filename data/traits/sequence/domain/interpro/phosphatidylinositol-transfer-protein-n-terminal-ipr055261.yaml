identifier: InterPro:IPR055261
label: "Phosphatidylinositol transfer protein, N-terminal"
definition: >-
  This entry represents the N-terminal domain of phosphatidylinositol transfer proteins (PITPs) which catalyse the transfer of phosphatidylinositol (PI) or phosphatidylcholine (PC) between membranes. There are three sub-families - all share an N-terminal PITP-like domain, whose sequence is highly conserved. It is described as consisting of three regions. The N-terminal region is thought to bind the lipid and contains two helices and an eight-stranded, mostly antiparallel β-sheet. An intervening loop region, which is thought to play a role in protein-protein interactions, separates this from the C-terminal region, which exhibits the greatest sequence variation and may be involved in membrane binding. PITP alpha (PIPNA, ) has a 16-fold greater affinity for PI than PC. Together with PITP beta (PIPNB, ), it is expressed ubiquitously in all tissues.
