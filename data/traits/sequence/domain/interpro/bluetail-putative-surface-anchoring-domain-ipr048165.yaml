identifier: InterPro:IPR048165
label: "Bluetail putative surface-anchoring domain"
definition: >-
  This entry represents a short domain named Bluetail that is found primarily in Cyanobacteria (blue), at the extreme C terminus of proteins (tail), that otherwise may differ in length and domain content. This pattern of occurrence suggests a role in anchoring proteins on the cell surface, although bluetail does not have the tripartide structure of signature motif, then transmembrane α-helix, then cluster of Arg residues like the sorting domains PEP-CTERM, Gly-Gly-CTERM and MYXO-CTERM. S-layer protein from Synechocystis sp., which has been seen to play a supportive but not a critical role in the function of the cyanobacterium.
