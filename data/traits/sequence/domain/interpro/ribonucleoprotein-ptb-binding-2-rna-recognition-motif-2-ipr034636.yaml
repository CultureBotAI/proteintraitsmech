identifier: InterPro:IPR034636
label: "Ribonucleoprotein PTB-binding 2, RNA recognition motif 2"
definition: >-
  This entry represents the RNA recognition motif 2 (RRM2) of RAVER2. Ribonucleoprotein PTB-binding 2 (RAVER2) has a similar domain structure to RAVER1: three N-terminal RRMs and a Pro-rich C terminus. Similar to RAVER1, RAVER2 binds to PTB, an important regulator of alternative splicing.
