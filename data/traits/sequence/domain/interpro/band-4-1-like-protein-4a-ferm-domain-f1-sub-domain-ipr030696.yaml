identifier: InterPro:IPR030696
label: "Band 4.1-like protein 4A, FERM domain, F1 sub-domain"
definition: >-
  Band 4.1-like protein 4A (also named NBL4) belongs to the protein 4.1 family. Members of the 4.1 family contain a FERM (4.1/Ezrin/radixin/moesin) domain, which is involved in the linkage of cytoplasmic proteins to the membrane. NBL4 is an important component of the Wnt/beta-catenin pathway and may be involved in the cell polarity determination or proliferation. It might have a role in embryogenesis. The FERM domain of NBL4 is made up of three sub-domains, F1, F2, and F3. This entry represents the N-terminal F1 subdomain.
