identifier: InterPro:IPR015371
label: "Endonuclease VIII-like 1, DNA binding"
definition: >-
  This domain is predominantly found in Endonuclease VIII-like 1 proteins and adopts a glucocorticoid receptor-like fold. Structural analysis reveals a zincless finger motif that is required for glycosylase activity.
