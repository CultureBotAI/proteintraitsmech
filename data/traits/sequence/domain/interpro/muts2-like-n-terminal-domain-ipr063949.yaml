identifier: InterPro:IPR063949
label: "MutS2-like, N-terminal domain"
definition: >-
  This entry represents an N-terminal domain of approximately 220 residues found in uncharacterised bacterial sequences related to MutS2 proteins. This domain is located N-terminal to the MutS_V domain ( ). MutS2 proteins are distinct from canonical MutS mismatch repair proteins and function as endonucleases involved in DNA recombination. The specific function of this N-terminal domain remains to be determined.
