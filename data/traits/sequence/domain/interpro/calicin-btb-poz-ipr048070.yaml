identifier: InterPro:IPR048070
label: "Calicin, BTB/POZ"
definition: >-
  Calicin is a basic cytoskeletal protein involved in the formation and maintenance of the highly regular organization of the postacrosomal perinuclear theca, the calyx of mammalian spermatozoa. It contains BTB and BACK domains at the N-terminal region and kelch repeats at the C-terminal region. This entry represents the BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids.
