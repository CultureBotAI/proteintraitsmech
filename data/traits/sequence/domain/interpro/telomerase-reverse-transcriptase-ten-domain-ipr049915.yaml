identifier: InterPro:IPR049915
label: "Telomerase reverse transcriptase, TEN domain"
definition: >-
  This entry represents the N-terminal domain of Telomerase reverse transcriptase from Tetrahymena thermophila (TERT), named the TEN domain. TERT is the catalytic component of the telomerase, a reverse transcriptase that adds simple sequence repeats to chromosome ends by copying a template sequence within the RNA component of the enzyme. The TEN domain is able to bind both RNA and telomeric DNA and contributes towards telomerase catalysis. Its structure consists of a core β-sheet surrounded by seven α-helices and a short β-hairpin.
