identifier: InterPro:IPR015162
label: "CheY binding"
definition: >-
  The CheY binding domain is found in the response regulator histidine kinase CheA. It adopts a secondary structure consisting of an open-face β/α sandwich, with four antiparallel β-strands and two α-helices. It binds to a corresponding domain on CheY, with subsequent phosphorylation of the CheY Asp57 residue, and activation of CheY, which then affects flagellar rotation.
