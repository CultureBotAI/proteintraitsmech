identifier: InterPro:IPR049394
label: "Selenocysteine-specific elongation factor, C-terminal RIFT domain"
definition: >-
  This entry represents the C-terminal RIFT β barrel domain found in human Selenocysteine-specific elongation factor (eEFSec) ( ) and similar sequences mainly found in animals. Selenocysteine is the only proteinogenic amino acid encoded by a recoded in-frame UGA codon that does not operate as the canonical opal stop codon. A specialised translation elongation factor, eEFSec in eukaryotes and SelB in prokaryotes, promotes selenocysteine incorporation into selenoproteins.
