identifier: InterPro:IPR034090
label: "BPM, C-terminal BACK domain"
definition: >-
  This entry represents the C-terminal domain of the plant BTB/POZ and MATH domain-containing (BPM) proteins. Proteins in this entry include Arabidopsis BPM1-6. Arabidopsis BPM proteins may act as a substrate-specific adapter of an E3 ubiquitin-protein ligase complex (CUL3-RBX1-BTB) which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. BPM proteins have also been shown to interact with members of the ethylene response factor/Apetala2 (ERF/AP2) transcription factor family and may play an important role in plant development and stress tolerance.
