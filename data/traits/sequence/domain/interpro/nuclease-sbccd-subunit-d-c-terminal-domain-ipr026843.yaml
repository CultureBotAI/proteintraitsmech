identifier: InterPro:IPR026843
label: "Nuclease SbcCD subunit D, C-terminal domain"
definition: >-
  SbcD works in complex with SbcC. SbcCD is a nuclease that cleaves DNA hairpin structures stopping the progress of the replication fork and allowing homologous recombination. It plays an important role in DNA repair and in the maintenance of genome stability. In Staphylococcus aureus, it is involved in the repression of type 5 capsule production as part of the SOS response by down-regulating cap5 genes via arl-mgr pathway. This entry represents the C-terminal domain of SbcD. This domain is found in bacteria and archaea.
