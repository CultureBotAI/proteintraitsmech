identifier: InterPro:IPR033716
label: "Nudix motif 17 domain"
definition: >-
  This Nudix domain is found in nucleoside diphosphate-linked moiety X motif 17 proteins, which are uncharacterised proteins that probably hydrolyse nucleoside diphosphate derivatives. The Nudix superfamily is widespread among eukaryotes, bacteria, archaea and viruses and consists mainly of pyrophosphohydrolases that act upon substrates of general structure NUcleoside DIphosphate linked to another moiety, X (NDP-X) to yield NMP plus P-X. Such substrates include (d)NTPs (both canonical and oxidised derivatives), nucleotide sugars and alcohols, dinucleoside polyphosphates (NpnN), dinucleotide coenzymes and capped RNAs. However, phosphohydrolase activity, including activity towards NDPs themselves, and non-nucleotide substrates such as diphosphoinositol polyphosphates (DIPs), 5-phosphoribosyl 1-pyrophosphate (PRPP), thiamine pyrophosphate (TPP) and dihydroneopterin triphosphate (DHNTP) have also been described. Some superfamily members, such as Escherichia coli MutT, have the ability to degrade potentially mutagenic, oxidised nucleotides while others control the levels of metabolic intermediates and signalling compounds. In procaryotes and simple eukaryotes, the number of Nudix genes varies from 0 to over 30, reflecting the metabolic complexity and adaptability of the organism. Nudix hydrolases are typically small proteins, larger ones having additional domains with interactive or other catalytic functions.
