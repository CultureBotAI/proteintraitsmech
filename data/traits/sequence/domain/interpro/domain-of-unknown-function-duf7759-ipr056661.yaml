identifier: InterPro:IPR056661
label: "Domain of unknown function DUF7759"
definition: >-
  This domain is found in uncharacterised proteins mainly from Trypanosomatidae lineage. It has detectable similarity to known PDZ domains and it is predicted to adopt similar structure. It is frequently found in multiple tandem copies.
