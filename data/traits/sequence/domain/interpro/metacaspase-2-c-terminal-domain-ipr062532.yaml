identifier: InterPro:IPR062532
label: "Metacaspase-2, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of metacaspase-2 from Plasmodium species. Metacaspase-2 is a cysteine protease that cleaves specifically after arginine or lysine residues and may play a role in parasite growth and development. The protein is expressed during the blood stage, specifically in schizonts and gametocytes, and is up-regulated by oxidative stress. The specific function of this C-terminal domain remains to be determined.
