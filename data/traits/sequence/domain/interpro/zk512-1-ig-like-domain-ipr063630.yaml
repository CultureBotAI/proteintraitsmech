identifier: InterPro:IPR063630
label: "ZK512.1, Ig-like domain"
definition: >-
  This entry represents an immunoglobulin-like domain found in nematode proteins including the uncharacterised protein ZK512.1 from Caenorhabditis elegans. The proteins containing this domain are glycoproteins. The function of this domain remains to be determined. This domain is found at the C-terminal of ZK512.1.
