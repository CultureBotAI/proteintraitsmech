label: "Domain of unknown function DUF8626"
definition: >-
  This entry represents a C-terminal domain of approximately 50 residues found in bacterial proteins containing an RNase_T-like exonuclease domain ( ). It is found in Bacillota and Pseudomonadota. The function of this domain remains to be determined.
