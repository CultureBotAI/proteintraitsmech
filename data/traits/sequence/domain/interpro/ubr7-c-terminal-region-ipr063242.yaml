identifier: InterPro:IPR063242
label: "UBR7, C-terminal region"
definition: >-
  This entry represents the C-terminal helical region of approximately 60 residues found in UBR7 (E3 ubiquitin-protein ligase) and related proteins in eukaryotes. These proteins also contain the UBR zinc finger domain ( ) and function as E3 ubiquitin ligases in the N-end rule pathway. Mutations in UBR7 cause Li-Campeau syndrome, a neurodevelopmental disorder with epilepsy, ptosis, and hypothyroidism. The precise function of this C-terminal region remains to be determined.
