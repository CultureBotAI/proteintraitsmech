identifier: InterPro:IPR022100
label: "WDHD1/CFT4, second beta-propeller"
definition: >-
  This entry represents the second β-propeller domain found in the middle region of WDHD1 (also known as AND-1) from human and at the C-terminal of its orthologues from yeast, CFT4 and minichromosome loss protein 1 (Mcl1) [[28381552]]. This domain, together with the helical bundle forms the SepB domain, which mediates the homotrimer formation of these proteins [[28381552]]. WDHD1 is an adaptor molecule crucial for DNA replication. It is a core replisome component that acts as a replication initiation factor. It binds directly to the CMG complex and functions as a hub to recruit additional proteins to the replication fork. CTF4 is an accessory factor for DNA replication that plays a role in accurately duplicating the genome in vivo.
