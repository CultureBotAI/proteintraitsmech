identifier: InterPro:IPR046829
label: "Calmodulin binding protein, C-terminal domain"
definition: >-
  Members of this family include putative or actual calmodulin binding proteins and other transcription factors expressed by various plant species. Some members (for example, ), are known to be involved in the induction of plant defence responses. However, their precise function in this regards is as yet unknown. This entry represents de C-terminal domain.
