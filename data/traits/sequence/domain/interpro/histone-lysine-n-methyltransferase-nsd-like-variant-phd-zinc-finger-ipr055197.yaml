identifier: InterPro:IPR055197
label: "Histone-lysine N-methyltransferase NSD-like, variant PHD zinc finger"
definition: >-
  This domain is found in the NSD (nuclear receptor SET domain- containing) family of histone-lysine N-methyltransferase such as NSD1, NSD2, NSD3 and other related proteins. It is a variant of the classical PHD zinc finger containing a C4HC2H zinc finger-like motif which is distinct from the typical C4HC3 motif.
