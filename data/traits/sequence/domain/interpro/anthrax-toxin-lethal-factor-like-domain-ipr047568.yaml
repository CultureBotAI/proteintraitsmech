identifier: InterPro:IPR047568
label: "Anthrax toxin lethal factor-like domain"
definition: >-
  This entry represents a domain mainly found in proteins from firmicutes, including Lethal factor from Bacillus anthracis (LF), the endopeptidase component of the anthrax toxin, which is able to trigger rapid cell death in macrophages. This domain is composed of a four-stranded β-sheet and a helical bundle backing the β-sheet ( ). All catalytically active ATLF-like domains contain conserved sequence motif HEXXH, where the two histidines ligate the catalytic zinc ion, and the glutamic acid acts as catalytic base activating a zinc-bound water molecule for nucleophilic attack on the scissile peptide bond. It is also found in Edema factor from B. anthracis (EF), also called Calmodulin-sensitive adenylate cyclase; in Toxin Certhrax from Bacillus cereus, a putative ADP-ribosyltransferase; and in Pro-Pro endopeptidase from Clostridioides difficile (PPEP-1).
