identifier: InterPro:IPR064073
label: "C6orf89, C-terminal domain"
definition: >-
  This is the C-terminal domain of Bombesin receptor-activated protein C6orf89 and its homologues. This protein exhibits histone deacetylase enhancer properties and plays roles in cell cycle progression and wound repair.
