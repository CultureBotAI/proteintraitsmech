identifier: InterPro:IPR037961
label: "SH3PXD2, PX domain"
definition: >-
  This entry represents the PX domain of SH3PXD2A and SH3PXD2B. The PX domain is involved in targeting of proteins to phosphoinositide-enriched membranes, and may also be involved in protein-protein interaction. SH3PXD2A, also known as Fish or Tks5, is a scaffold protein with five SH3 domains and one PX domain. It is required for podosome formation, for degradation of the extracellular matrix, and for invasion of some cancer cells. SH3PXD2A binding partners include ADAM-family metalloproteases and Nck adaptor proteins. SH3 and PX domain-containing protein 2B (SH3PXD2B, also known as Fad49 or Tks4) is an adaptor protein required for functional podosome formation. It binds matrix metalloproteinases (ADAMs), NADPH oxidases (NOXs) and phosphoinositides. It regulates epidermal growth factor-dependent cell migration and has been linked to cancer. Mutations in the SH3PXD2B gene cause Frank-ter Haar syndrome, a rare disease characterised by abnormalities that affect bone, heart, and eye development. It contains an N-terminal Phox homology (PX) domain and four SH3 domains.
