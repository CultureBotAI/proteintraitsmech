identifier: InterPro:IPR036016
label: "TBC1D8, PH-GRAM domain 2"
definition: >-
  TBC1D8 may act as a GTPase-activating protein for Rab family protein(s). TBC1D8 contains two N-terminal PH-GRAM domains and a C-terminal Rab-GTPase-TBC (Tre-2, BUB2p, and Cdc16p) domain. This entry represents the second repeat of the PH-GRAM domain. The GRAM domain is found in glucosyltransferases, myotubularins and other putative membrane-associated proteins. The GRAM domain is part of a larger motif with a pleckstrin homology (PH) domain fold.
