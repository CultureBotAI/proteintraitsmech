identifier: InterPro:IPR037967
label: ZMYND8, Bromo domain
definition: >-
  MYND-type zinc finger-containing chromatin reader ZMYND8 (also called human protein kinase C-binding protein (PRKCBP1) and RACK7) was identified as a potential tumour suppressor gene. It shares domain architecture with BS69/ZMYND11; both have been implicated in the regulation of cellular proliferation. ZMYND8 is a chromatin reader that recognises dual histone modifications. It acts as a transcriptional corepressor for KDM5D and EZH2. ZMYND8 recognizes acetylated histone H4 and recruits the NuRD chromatin remodeling complex to damaged chromatin for transcriptional repression and double-strand break repair by homologous recombination. ZMYND8 also plays a role in neuronal development. This protein suppresses breast cancer, and prostate cancer cell invasion and metastasis. It has been proposed as a suitable epigenetic tool that can re-sensitize the chemo-refractory breast carcinoma. This entry represents the bromodomain of ZMYND8. Bromodomains are 110 amino acid long domains, that are found in many chromatin associated proteins. Bromodomains can interact specifically with acetylated lysine.
