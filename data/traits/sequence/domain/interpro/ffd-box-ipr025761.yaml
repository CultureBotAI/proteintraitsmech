identifier: InterPro:IPR025761
label: "FFD box"
definition: >-
  Sm and Sm-like proteins of the RNA-binding Lsm (like Sm) domain family are found in all domains of life and are generally involved in important RNA- processing tasks. Lsm13-16 homologues share a domain organisation consisting of a divergent N-terminal Lsm domain and a central or C-terminal consensus motif DFDF-x(7)-F. In few other sequences, the DFDF box is replaced by a DYDF or EFDF box. The FFD box and TFG box are two other strongly conserved sequence motifs(Y-x-K-x(3)-FFD-x-[IL]-S and [RKH]-x(2,5)-E-x(0-2)-[RK]-x(3,4)-[DE]-TFG respectively) contained in Lsm13-15, but not Lsm16, homologues. They succeed the DFDF-x(7)-F motif and are also predicted to be of helical nature. This entry represents the FFD box.
