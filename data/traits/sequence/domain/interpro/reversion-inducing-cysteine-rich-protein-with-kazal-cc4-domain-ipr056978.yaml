identifier: InterPro:IPR056978
label: "Reversion-inducing cysteine-rich protein with Kazal, CC4 domain"
definition: >-
  This domain is found in Reversion-inducing cysteine-rich protein with Kazal motifs from Mus musculus (RECK) and similar proteins from animals. This entry represents the fourth and fifth CC4 domains, each consisting of four short α-helices stabilised by three disulfide bonds. RECK consists of five repeats of an uncommon domain with six cysteines (the CC domain, represented by and two copies of ), a Frizzled-like cysteine-rich domain (Fz-like CRD, ), two epidermal growth factor-like domains (EGF-like 1, , and 2, ), and three Kazal-like motifs (Kazal-like 1 to 3, ). Reck is a GPI-anchored membrane protein that negatively regulates matrix metalloproteinase-9 (MMP-9) by suppressing MMP-9 secretion and by direct inhibition of its enzymatic activity. It also regulates two other MMPs, MMP-2 and MT1-MMP, known to be involved in cancer progression. Reck and the orphan receptor Gpr124 interact to activate Wnt7a/Wnt7b signalling in CNS vascular development. Reck interacts specifically with the disordered linker region of Wnt7, which confers ligand selectivity for Wnt7.
