identifier: InterPro:IPR063146
label: "TNF receptor grnd, cysteine-rich domain"
definition: >-
  This entry represents the extracellular cysteine-rich domain of TNF receptor proteins, found in arthropods. This domain is approximately 120 residues in length and contains four disulphide bonds that stabilise its structure. The domain is responsible for binding to TNF ligands, specifically the Eiger protein in Drosophila. In the Grindelwald (grnd) TNF receptor, this domain forms heterohexamers when three receptor copies associate with Eiger trimers. The domain contains critical residues for ligand binding and is subject to N-linked glycosylation which regulates receptor affinity. Structural studies have revealed the detailed architecture of this ligand-binding domain. The function of this domain is to mediate TNF signalling through ligand recognition and receptor activation.
