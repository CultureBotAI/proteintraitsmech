identifier: InterPro:IPR063259
label: "SPHKAP-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain in A-kinase anchor protein SPHKAP. SPHKAP is an anchoring protein that binds preferentially to the type I regulatory subunit of c-AMP-dependent protein kinase (PKA type I) and targets it to distinct subcellular compartments. It also may act as a converging factor linking cAMP and sphingosine signaling pathways. It plays a regulatory role in the modulation of SPHK1. This domain is also found in the A-kinase anchor protein 11.
