identifier: InterPro:IPR027903
label: "C6orf62 domain"
definition: >-
  This entry represents a domain covering the whole length in Uncharacterized protein C6orf62 from metazoa. C6orf62 is ubiquitously expressed, including in brain tissue, which led to its inclusion in neurogenetic linkage studies, particularly in the region associated with developmental dyslexia. Though C6orf62 itself was not confirmed as causal, it lies adjacent to dyslexia-associated genes such as KIAA0319 and DCDC2, both of which are involved in neuronal migration and axonal growth. This domain covers other regions in related proteins.
