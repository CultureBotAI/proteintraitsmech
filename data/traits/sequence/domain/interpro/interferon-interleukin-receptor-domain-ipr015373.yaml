identifier: InterPro:IPR015373
label: "Interferon/interleukin receptor domain"
definition: >-
  Proteins with this domains have a secondary structure consisting of seven β-strands arranged in an immunoglobulin-like β-sandwich, in a Greek-key topology. They include interferon receptors, tissue factor proteins and interleukin receptors.
