identifier: InterPro:IPR024312
label: "TACC, C-terminal, fungi"
definition: >-
  This entry represents a conserved region predicted as coiled-coil and located toward the C terminus of TACC proteins. TACC proteins are present in different organisms, ranging from yeasts to mammals. Schizosaccharomyces pombe has one TACC protein, known as Alp7 or Mia1p. Alp7/TACC consists of two domains: the N-terminal half that contains the nuclear localization signal (NLS) and has no homology to the other TACC members, and the C-terminal half, which consists of the conserved coiled-coil TACC domain. Alp7/TACC forms a complex with Alp14/TOG and localizes to microtubules, SPBs and kinetochores. This complex is necessary for mitotic and meiotic spindle assembly and proper chromosome segregation. The homologue from S. cerevisiae, Slk19, also has a role in spindle assembly and stability, and it is required for proper chromosome segregation.
