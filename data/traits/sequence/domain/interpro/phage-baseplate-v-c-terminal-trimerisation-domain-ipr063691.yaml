identifier: InterPro:IPR063691
label: "Phage baseplate V, C-terminal trimerisation domain"
definition: >-
  This entry represents a C-terminal domain of approximately 65 residues found in phage baseplate and type VI secretion system (T6SS) proteins. The domain is found C-terminal to the phage baseplate V domain. It forms a β-meander fold that mediates trimerisation. This entry is found in bacteria including Actinomycetota, Pseudomonadota and Bacteroidota.
