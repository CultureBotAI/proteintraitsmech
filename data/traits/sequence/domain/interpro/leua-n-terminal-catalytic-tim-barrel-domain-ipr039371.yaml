identifier: InterPro:IPR039371
label: "LeuA, N-terminal catalytic TIM barrel domain"
definition: >-
  Alpha-isopropylmalate synthase (LeuA), a key enzyme in leucine biosynthesis, catalyzes the first committed step in the pathway, converting acetyl-CoA and alpha-ketoisovalerate to alpha-isopropyl malate and CoA. Although the reaction catalyzed by LeuA is similar to that of the Arabidopsis thaliana IPMS1 protein, the two fall into phylogenetically distinct families within the same superfamily. LeuA has and N-terminal TIM barrel catalytic domain, a helical linker domain, and a C-terminal regulatory domain. LeuA forms a homodimer in which the linker domain of one monomer sits over the catalytic domain of the other, inserting residues into the active site that may be important for catalysis. Homologues of LeuA are found in bacteria as well as fungi, such as alpha-isopropylmalate synthases I (LEU4) and II (LEU9) from Saccharomyces cerevisiae.
