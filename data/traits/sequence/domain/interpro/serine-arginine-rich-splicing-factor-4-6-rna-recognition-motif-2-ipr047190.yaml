identifier: InterPro:IPR047190
label: "Serine/arginine-rich splicing factor 4/6, RNA recognition motif 2"
definition: >-
  This is the RNA recognition motif 2 (RRM2) in serine/arginine (SR) proteins serine/arginine-rich splicing factor 4 (SRSF4 or SRp75 or SFRS4), 6 (SRSF6, also known as pre-mRNA-splicing factor SRP55) and related proteins. SRSF4 plays an important role in both constitutive and alternative, splicing of many pre-mRNAs. It can shuttle between the nucleus and cytoplasm. Members in this family contain two N-terminal RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), followed by a C-terminal RS domains rich in serine-arginine dipeptides. SRSF6 plays a role in constitutive splicing and modulates the selection of alternative splice sites. It plays a role in the alternative splicing of MAPT/Tau exon 10. It binds to alternative exons of TNC pre-mRNA and promotes the expression of alternatively spliced TNC. SRSF6 plays a role in wound healing and in the regulation of keratinocyte differentiation and proliferation via its role in alternative splicing.
