identifier: InterPro:IPR000620
label: EamA domain
definition: >-
  EamA (named after the O-acetyl-serine/cysteine export gene in E. coli) domain is found in a wide range of proteins including the Erwinia chrysanthemi PecM protein, which is involved in pectinase, cellulase and blue pigment regulation, the Salmonella typhimurium PagO protein (function unknown), some eukaryotic members of the solute carrier family group 35 (SLC35) nucleoside-sugar transporters and the bacterial Probable 4-amino-4-deoxy-L-arabinose-phosphoundecaprenol flippase subunit ArnE. Many members of this group, found in all cellular organisms, are classed as drug/metabolite transporters and have no known function. They are predicted to be integral membrane proteins and many of the proteins contain two copies of this domain.
