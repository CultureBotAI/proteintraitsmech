identifier: InterPro:IPR060914
label: "Phage tail assembly chaperone GT, C-terminal domain"
definition: >-
  A common motif in phage that rely on a tape measure protein to control the length of the tail tube is to have two tandem ORFs, with protein biosynthesis that makes the upstream protein, but a small percentage of the time undergoes a -1 frameshift at a slippery site near the C terminus and then continues through the downstream ORF to make a long version of the protein. The short form is referred to as gpG, and the long form as gpGT. This entry represents the coding region C-terminal to that frameshift, present in gpGT but not in gpG. However, some member proteins, represent the long form, gpGT, encoded with no frameshift. The region upstream of the frameshift is represented by .
