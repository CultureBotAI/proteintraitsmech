identifier: InterPro:IPR047404
label: "Forkhead box protein N3, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXN3 and similar sequences found in animals. The FH domain is a winged helix DNA-binding domain. Forkhead box protein N3 (FOXN3) acts as a transcriptional repressor that may be involved in DNA damage-inducible cell cycle arrests (checkpoints). It displays transcriptional inhibitory activity, and is involved in cell cycle regulation and tumorigenesis. FOXN3 is a tumor suppressor with the ability to decrease the malignancy of tumors, including in liver cancer, lung cancer, colon cancer and certain hematological malignancies. Alterations in FOXN3 are found in a variety of cancers including melanoma, osteosarcoma, and hepatocellular carcinoma. FOXN3 also regulates hepatic glucose utilization/metabolism by regulating gluconeogenic substrate selection.
