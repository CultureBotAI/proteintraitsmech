identifier: InterPro:IPR034182
label: "Kexin/furin catalytic domain"
definition: >-
  This entry represents the catalytic domain of kexin, furin and related proteins. Protein convertases, whose members include furin (MEROPS identifier S08.071) and kexin (S08.070), are members of the peptidase S8 or subtilase family of peptidases. Kexins are involved in the activation of peptide hormones, growth factors, and viral proteins. Furin cleaves cell surface vasoactive peptides and proteins involved in cardiovascular tissue remodeling in the TGN, at cell surface, or in endosomes but rarely in the ER. Furin also plays a key role in blood pressure regulation though the activation of transforming growth factor (TGF)-beta. High specificity is seen for cleavage after dibasic (Lys-Arg or Arg-Arg) or multiple basic residues in protein convertases. The subtilisin family is one of the largest serine peptidase families characterised to date. Over 200 subtilisins are presently known, more than 170 of which have their complete amino acid sequence. It is widespread, being found in eubacteria, archaebacteria, eukaryotes and viruses. The vast majority of the family are endopeptidases, although there is an exopeptidase, tripeptidyl peptidase. Structures have been determined for several members of the subtilisin family: they exploit the same catalytic triad as the chymotrypsins, although the residues occur in a different order (HDS in chymotrypsin and DHS in subtilisin), but the structures show no other similarity. Some subtilisins are mosaic proteins, while others contain N- and C-terminal extensions that show no sequence similarity to any other known protein.
