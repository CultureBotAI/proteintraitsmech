identifier: InterPro:IPR056637
label: "Domain of unknown function DUF7735"
definition: >-
  This domain is found in uncharacterised proteins mainly from fungi. It is predicted to form a globular structure consisting of α-helices. It contains a set of conserved cysteine residues which are predicted to form disulfide bridges.
