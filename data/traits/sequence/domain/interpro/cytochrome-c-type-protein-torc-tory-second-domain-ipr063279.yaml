identifier: InterPro:IPR063279
label: "Cytochrome c-type protein TorC/TorY, second domain"
definition: >-
  This entry represents the second domain of TorC-type cytochrome c proteins found in bacteria. TorC from Escherichia coli is part of the anaerobic respiratory chain of trimethylamine-N-oxide reductase. The apocytochrome form negatively autoregulates the torCAD operon, probably by inhibiting TorS kinase activity. This domain is also found in TorY which is a part of the anaerobic respiratory chain of trimethylamine-N-oxide reductase TorZ. It is required for electron transfer to the TorZ terminal enzyme.
