identifier: InterPro:IPR024756
label: "Protocatechuate 3,4-dioxygenase beta subunit, N-terminal"
definition: >-
  This entry represents the N-terminal domain of the beta subunit of protocatechuate 3,4-dioxidase. Protocatechuate 3,4-dioxidase utilises a mononuclear, non-heme Fe3+ centre to catalyse metabolic cellular reactions. This domain is found in bacteria, and is approximately 40 amino acids in length. It is found in association with . There are two completely conserved residues (Y and R) that may be functionally important.
