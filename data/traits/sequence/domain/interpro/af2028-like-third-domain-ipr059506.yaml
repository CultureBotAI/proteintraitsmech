identifier: InterPro:IPR059506
label: "AF2028-like. third domain"
definition: >-
  This entry represents the third domain of AF2028-like proteins found in methanogenic and hyperthermophilic archaea. The proteins are predicted to be membrane-associated, containing multiple transmembrane helices. Its function remains to be determined.
