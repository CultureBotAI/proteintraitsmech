identifier: InterPro:IPR055179
label: "Tex-like, central region"
definition: >-
  This domain is found in the transcriptional accessory protein Tex protein from Bordetella pertussis, in the human and yeast transcription elongation factor SPT6 and in similar sequences maily from bacteria and eukaryotes. Tex belongs to a family of prokaryotic transcriptional accessory factors that likely function in a variety of transcriptional processes. SPT6 binds histone H3 and plays a key role in the regulation of transcription elongation and mRNA processing. It enhances the transcription elongation by RNA polymerase II (RNAPII) and is also required for the efficient activation of transcriptional elongation by the HIV-1 nuclear transcriptional activator, Tat. This domain is mainly α-helical, showing a number of small helices that wrap around a long central helix. It is often found immediately N-terminal to .
