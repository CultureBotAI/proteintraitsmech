identifier: InterPro:IPR054715
label: "Digeranylgeranylglycerophospholipid reductase, catalytic domain"
definition: >-
  This entry represents the catalytic domain of a group of geranylgeranyl reductases (GGR) mainly found in prokaryotes, including Digeranylgeranylglycerophospholipid reductase from from Sulfolobus acidocaldarius. This domain contains the PxxYxWxFP sequence motif, which defines a specificity pocket in the structure, providing a structural basis for the substrate specificity of GGRs.
