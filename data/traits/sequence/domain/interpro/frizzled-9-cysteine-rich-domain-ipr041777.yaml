identifier: InterPro:IPR041777
label: "Frizzled 9, cysteine-rich domain"
definition: >-
  The cysteine-rich domain (CRD) is an essential extracellular portion of the frizzled 9 (Fz9) receptor, and is required for binding Wnt proteins, which play fundamental roles in many aspects of early development, such as cell and tissue polarity, neural synapse formation, and the regulation of proliferation. Fz proteins serve as Wnt receptors for multiple signal transduction pathways, including both beta-catenin dependent and -independent cellular signaling, as well as the planar cell polarity pathway and Ca(2+) modulating signaling pathway. CRD containing Fzs have been found in diverse species from amoebas to mammals. 10 different frizzled proteins are found in vertebrata. Fz9 plays an important role in hippocampal development. Mutation of the Fz9 gene has been linked to Williams-Beuren Syndrome, a genetic neurodevelopmental disorder characterised by an uncommon hypersociability and a mosaic of retained and compromised linguistic and cognitive abilities.
