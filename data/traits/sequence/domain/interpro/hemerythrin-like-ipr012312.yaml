identifier: InterPro:IPR012312
label: Hemerythrin-like
definition: >-
  This entry represents a hemerythrin cation-binding domain that occurs in hemerythrins, myohemerythrin and related proteins. This domain binds iron in hemerythrin, but can bind other metals in related proteins, such as cadmium in a Nereis diversicolor protein ( ). This domain is also found in Repair of iron centres or Ric proteins.
