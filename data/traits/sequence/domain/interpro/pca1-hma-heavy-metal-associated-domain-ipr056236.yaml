identifier: InterPro:IPR056236
label: "PCA1, HMA heavy metal-associated domain"
definition: >-
  This domain is found in the yeast P-type cation-transporting ATPase (PCA1) and similar fungal proteins. PCA1 is a cadmium transporting P-type ATPase which plays a critical role in cadmium resistance by extruding intracellular cadmium. This domain has a detectable similarity to heavy-metal-binding domains and it is predicted to adopt similar structure.
