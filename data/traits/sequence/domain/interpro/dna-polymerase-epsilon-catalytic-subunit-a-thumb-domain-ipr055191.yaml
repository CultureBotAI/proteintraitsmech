identifier: InterPro:IPR055191
label: "DNA polymerase epsilon ,catalytic subunit A, thumb domain"
definition: >-
  This entry represents the thumb domain of DNA polymerase epsilon catalytic subunit A from Saccharomyces cerevisiae (POL2) and its homologues from eukaryotes. This domain, which makes contacts in the DNA minor groove, shows a mainly α-helical structure. The catalytic component of the DNA polymerase epsilon complex is involved in chromosomal DNA replication where it has been shown to participate in leading-strand synthesis.
