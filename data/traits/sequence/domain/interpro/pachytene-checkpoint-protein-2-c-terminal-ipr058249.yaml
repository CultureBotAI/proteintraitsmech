identifier: InterPro:IPR058249
label: "Pachytene checkpoint protein 2, C-terminal"
definition: >-
  This domain is found at the C-terminal end of Pch2 and similar eukaryotic proteins. It is normally found associated to and is predicted to show an α-helical configuration. Pachytene checkpoint protein 2 (Pch2, also known as TRIP13) is a member of the AAA-ATPase family, predicted to have ATP binding and ATP hydrolysis activity. Pch2 is required for the meiotic checkpoint that prevents chromosome segregation when recombination and chromosome synapsis are defective. In humans it is linked to Mosaic variegated aneuploidy syndrome 3 (MVA3).
