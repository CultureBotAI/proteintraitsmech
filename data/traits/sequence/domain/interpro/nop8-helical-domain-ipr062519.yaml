identifier: InterPro:IPR062519
label: "NOP8, helical domain"
definition: >-
  This entry represents a small helical domain in NOP8 (nucleolar protein 8) and related proteins found in fungi. NOP8 is a 60S ribosome subunit biogenesis protein required for ribosomal subunit synthesis and involved in assembly reactions occurring within late pre-ribosomal particles. NOP8 localises to the nucleolus and forms an RNA-independent complex with DBP6, URB1, URB2 and RSA3, which is required during early maturation of nascent 60S ribosomal subunits. The protein also contains an N-terminal RRM domain, this domain is located next to this N-terminal.
