identifier: InterPro:IPR028274
label: "TerY-C metal binding domain"
definition: >-
  TerY-C is found C-terminal to TerY-like vWA domains in some proteins. It has 8 conserved metal chelating cysteines or histidines. It occasionaly occurs as solos.
