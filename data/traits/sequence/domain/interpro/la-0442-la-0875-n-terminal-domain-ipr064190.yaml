identifier: InterPro:IPR064190
label: "LA_0442/LA_0875, N-terminal domain"
definition: >-
  This entry represents a conserved N-terminal region of approximately 65 amino acids found predominantly in the genus Leptospira . This region is shared by seven otherwise unrelated proteins in the model strain Leptospira interrogans serovar Lai str. 56601: LA_0442 , LA_0875 , LA_1192 , LA_1904, LA_2672, LA_3334 and LA_3681. The region comprises a signal-anchor-like sequence followed by the most strongly conserved motif within the domain, [LVI][LVI][LF]KXG.
