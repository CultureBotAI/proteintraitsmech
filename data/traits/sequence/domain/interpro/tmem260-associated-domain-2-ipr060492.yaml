identifier: InterPro:IPR060492
label: "TMEM260-associated domain 2"
definition: >-
  This entry represents a conserved domain found in TMEM260 and related O-mannosyltransferases. In TMEM260, this domain spans approximately residues 421-479 in human and is located in the luminal portion of the protein, between the N-terminal transmembrane region ( ) and the C-terminal. While the specific function of this domain is not established, it is essential for enzyme activity as truncations removing this region abolish function. The domain is found predominantly in metazoans and some Bacteroidota species. Pathogenic variants in this region are associated with structural heart defects and renal anomalies syndrome (SHDRA). TMEM260 is an O-mannosyltransferase that transfers mannosyl residues to serine or threonine residues of target proteins. TMEM260 belongs to the glycosyltransferase 117 (GT117) family.
