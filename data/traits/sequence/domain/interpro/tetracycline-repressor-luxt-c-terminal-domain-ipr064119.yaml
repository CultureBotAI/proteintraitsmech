identifier: InterPro:IPR064119
label: "Tetracycline repressor LuxT, C-terminal domain"
definition: >-
  This is the C-terminal domain of LuxT. LuxT is a tetracycline repressor family regulator identified in Vibrio alginolyticus which may play a role in the fine-tuning of the virulence via quorum sensing (QS).
