identifier: InterPro:IPR019273
label: "Lunapark zinc ribbon domain"
definition: >-
  This domain, found mainly in the eukaryotic lunapark proteins, has no known function. It is predicted to fold into a structure typical for zinc ribbon domains. C. elegans lunapark-1, containing this domain, plays a role in synaptogenesis by regulating vesicular transport or localization.
