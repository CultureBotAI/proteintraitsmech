identifier: InterPro:IPR057736
label: "PseI/NeuA/NeuB, SAF domain"
definition: >-
  This entry represents the SAF domain at the C-terminal in acid synthases such as PseI, NeuA, NeuB and related proteins. NeuB is the prokaryotic N-acetylneuraminic acid synthase. It catalyses the direct formation of N-acetylneuraminic acid (Neu5Ac), the most common sialic acid, by condensation of phosphoenolpyruvate (PEP) and N-acetylmannosamine (ManNAc). Mammals synthesise the 9-phosphate form, Neu5Ac-9-P, and utilise ManNAc-6-P instead of ManNAc. The bacterial and mammalian enzymes share 30%-40% sequence identity and are composed of two distinct domains. The N-terminal domain (NeuB domain, ) consists of ~250 amino acid residues, and is considered to bind the sugar substrates. The C-terminal domain consists of ~75 amino acid residues, and is called the antifreeze-like (AFL) domain, since it is similar to those observed in a variety of functional type III antifreeze proteins (AFPs). Also included in this group are spore coat polysaccharide biosynthesis proteins (SpsE), while AFPs are not included.
