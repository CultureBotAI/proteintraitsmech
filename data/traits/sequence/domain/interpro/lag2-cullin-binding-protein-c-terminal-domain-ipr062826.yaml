identifier: InterPro:IPR062826
label: "LAG2 cullin-binding protein, C-terminal domain"
definition: >-
  This entry represents the C-terminal TPR domain of LAG2, a cullin- associated NEDD8-dissociated protein homologue. This domain is found in proteins involved in SCF E3 ubiquitin ligase complex regulation from fungi. LAG2 acts as an assembly factor and F-box protein exchange factor for SCF complexes and interacts with unneddylated cullin CDC53. The C-terminal region of this protein contains a neddylation site and is involved in longevity assurance. The function of this domain remains to be determined.
