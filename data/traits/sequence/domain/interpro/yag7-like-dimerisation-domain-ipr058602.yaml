identifier: InterPro:IPR058602
label: "YAG7-like, dimerisation domain"
definition: >-
  This entry represents a domain found in Uncharacterized protein C12G12.07c and YAG7 protein from S. pombe and similar proteins from ascomycetes. This domain is structurally related to the dimerisation domain in caprin-1 and PAN3 and likely has a role as dimerisation domain.
