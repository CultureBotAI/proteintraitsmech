identifier: InterPro:IPR033609
label: E3 ubiquitin-protein ligase RNF152, RING finger domain
definition: >-
  RING finger protein 152 (RNF152) has E3 ligase activity involved in lysosome-related apoptosis. It is a negative regulator of the mTORC1 pathway by targeting RagA for K63-linked ubiquitination. RNF152 contains an N-terminal C3HC4-type RING-HC finger and a C-terminal transmembrane domain, both of which are responsible for its E3 ligase activity. This entry represents the RING-type zinc finger.
