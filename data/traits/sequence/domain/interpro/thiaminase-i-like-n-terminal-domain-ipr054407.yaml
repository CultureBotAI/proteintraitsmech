identifier: InterPro:IPR054407
label: "Thiaminase I-like, N-terminal domain"
definition: >-
  This entry represents a domain found at the the N-terminal end of Thiaminase I from the amoeba Naegleria gruberi ( ) and similar sequences from lower eukaryotes. This enzyme catalyse the elimination of the thiazole ring moiety from thiamin through substitution of the methylene group. This domain has thiaminase I activity by itself. It consists of a seven-stranded β-sheet surrounded by eight α-helices.
