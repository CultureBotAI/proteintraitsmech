identifier: InterPro:IPR027130
label: TNF receptor-associated factor 5, C3HC3D-type RING-HC finger
definition: >-
  TNF receptor-associated factor 5 (TRAF5) is an adapter protein and signal transducer that links members of the tumor necrosis factor receptor family to different signaling pathways by association with the receptor cytoplasmic domain and kinases. TRAF5 mediates activation of NF-kappa-B and probably JNK. TRAF5 contains an N-terminal domain with a modified C3HC3D-type RING-HC finger (this entry), several zinc fingers, and a C-terminal TRAF domain that comprises a coiled coil domain and a conserved TRAF-C domain.
