identifier: InterPro:IPR048311
label: "Antiactivator protein ExsD, helical hairpin domain"
definition: >-
  This entry represents the central helical hairpin domain of ExsD. The antiactivator protein ExsD represses the transcriptional activator ExsA. ExsA activates expression of type III secretion system genes. ExsD inhibits the DNA-binding and self-association properties of ExsA. Repression of ExsA by ExsD is relieved by the secretion chaperone ExsC.
