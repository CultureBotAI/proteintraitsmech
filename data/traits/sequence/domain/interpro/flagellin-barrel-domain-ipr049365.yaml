identifier: InterPro:IPR049365
label: "Flagellin, barrel domain"
definition: >-
  This entry represents a barrel domain of flagellins FliC and FljB from enterobacterales, which have a boomerang-shape with one arm composed of domain D1 and the other formed by D2 and D3. This entry corresponds to to subdomain D2b described in.
