identifier: InterPro:IPR058825
label: "MDM34, N-terminal domain"
definition: >-
  This domain is found N-terminal in the Mitochondrial distribution and morphology protein 34 and related proteins. MDM34 is a component of the ERMES/MDM complex, which serves as a molecular tether to connect the endoplasmic reticulum and mitochondria. MDM34 is required for the interaction of the ER-resident membrane protein MMM1 and the outer mitochondrial membrane-resident β-barrel protein MDM10.
