label: WH2 domain
definition: >-
  The WH2 (WASP-Homology 2, or Wiskott-Aldrich homology 2) domain is an ~18 amino acids actin-binding motif. This domain was first recognised as an essential element for the regulation of the cytoskeleton by the mammalian Actin nucleation-promoting factor WAS (also known asWiskott-Aldrich syndrome protein, WASP). WH2 proteins occur in eukaryotes from yeast to mammals, in insect viruses, and in some bacteria. The WH2 domain is found as a modular part of larger proteins; it can be associated with the WH1 or EVH1 domain and with the CRIB domain , and the WH2 domain can occur as a tandem repeat. The WH2 domain binds actin monomers and can facilitate the assembly of actin monomers into newly forming actin filaments. Some proteins known to contain a WH2 domain: Mammalian Actin nucleation-promoting factor WAS (WASP), a possible regulator of lymphocyte and platelet function. Defects in WASP are the cause of Wiskott- Aldrich syndrome (WAS), an X-linked recessive disease characterised by immune dysregulation and microthrombocytopenia. WASP proteins bind the actin nucleating protein complex Arp2/3. Mammalian N-WASP/WASL and WASF/SCAR/WAVE1-3, and yeast LAS17, which are also proteins from the WASP family that participate in the transduction of signals from the cell surface to the actin cytoskeleton. WAS protein family homologue 1 (WASH1), acts as a nucleation-promoting factor at the surface of endosomes, where it recruits and activates the Arp2/3 complex to induce actin polymerisation. Baker's yeast Verprolin, a protein involved in cytoskeletal organisation and cellular growth. Human WASP interacting protein (WASPIP/WIP), a WASP-, profilin- and actin-binding protein which induces actin polymerisation and redistribution. Nuclear polyhedrosis virus (NPV) P61/78/83 capsid protein, whic…
