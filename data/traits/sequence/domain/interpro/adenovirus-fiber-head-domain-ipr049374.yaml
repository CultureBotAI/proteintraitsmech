identifier: InterPro:IPR049374
label: "Adenovirus fiber, head domain"
definition: >-
  This domain is found at the C-terminal end of proteins from adenovirus, including Fiber from Bovine adenovirus 4 (BAdV-4), which is essential for host cell interaction. This domain shows a β-sandwich with two four-stranded β-sheets and an α-helix in a loop.
