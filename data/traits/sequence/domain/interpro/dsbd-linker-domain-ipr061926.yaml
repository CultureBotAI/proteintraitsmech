identifier: InterPro:IPR061926
label: "DsbD, linker domain"
definition: >-
  This entry represents a small linker domain found between the main transmembrane domain ( ) and the C-terminal thioredoxin domain in DsbD proteins from gammaproteobacteria. DsbD is a thiol:disulfide interchange protein that transfers electrons from cytoplasmic thioredoxin to periplasmic oxidoreductases, facilitating correct disulfide bond formation and cytochrome c biogenesis. This linker region contains two transmembrane helices and connects the eight-helix transmembrane core to the catalytic thioredoxin domain. The specific function of this linker domain remains to be determined.
