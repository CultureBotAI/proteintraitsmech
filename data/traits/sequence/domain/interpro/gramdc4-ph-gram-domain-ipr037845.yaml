identifier: InterPro:IPR037845
label: "GRAMDC4, PH-GRAM domain"
definition: >-
  GRAMDC4, also known as DIP, is a pro-apoptotic protein that mimics p53 and mediates the apoptotic function of p73 at mitochondria. It contains a single PH-GRAM domain at its C terminus. The GRAM domain is found in glucosyltransferases, myotubularins and other putative membrane-associated proteins. The GRAM domain is part of a larger motif with a pleckstrin homology (PH) domain fold.
