label: LIC10012-like
definition: >-
  This entry epresents a group of uncharacterised proteins from Leptospira, including LIC10012 ( ) from Leptospira interrogans. Members of this family of putative surface-exposed proteins are found broadly throughout the genus Leptospira, and appear to have a VWA (von Willibrand factor type A) domain.
