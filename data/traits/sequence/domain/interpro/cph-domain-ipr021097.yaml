identifier: InterPro:IPR021097
label: "CPH domain"
definition: >-
  The CPH domain is found in the Cullin-7, PARC and HERC2 proteins, which are all components of known or predicted E3-ubiquitin ligases. The CPH domain is a protein-protein interaction module that binds the teramerisation domain of the tumour suppressor protein p53. Structurally it forms a β-barrel fold similar to the SH3, Tudor and KOW and domains. Unlike the SH3 and Tudor domains, which bind to small peptides, the CPH domain appears to bind to an extended surface on p53.
