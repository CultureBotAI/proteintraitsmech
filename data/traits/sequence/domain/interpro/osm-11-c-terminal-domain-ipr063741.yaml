identifier: InterPro:IPR063741
label: "OSM-11, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in OSM-11, its homologue DOS-1 from Caenorhabditis elegans and related proteins from nematodes. OSM-11 is a secreted Notch ligand that facilitates LIN-12/Notch signalling during vulval development in C.elegans. OSM-11 acts redundantly with DSL-1 and LAG-2 in vulval precursor cell fate determination and is required for normal octanol avoidance response. The protein localises to the apical cell membrane and is expressed in vulval precursor cells, hypodermal cells, and coelomocytes. DOS-1 is a related protein that shares sequence similarity with OSM-11. The specific function of this C-terminal domain remains to be determined.
