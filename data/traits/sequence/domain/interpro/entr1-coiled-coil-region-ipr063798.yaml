identifier: InterPro:IPR063798
label: "ENTR1, coiled coil region"
definition: >-
  This entry represents a coiled-coil region of ENTR1 endosome-associated trafficking regulator proteins. ENTR1 is an endosome-associated protein that plays a role in membrane receptor sorting, cytokinesis and ciliogenesis. The protein is involved in endosome-to-plasma membrane trafficking and recycling of SNX27-retromer-dependent cargo proteins such as GLUT1. ENTR1 is involved in the regulation of cytokinesis and plays a role in the formation of cilia. The protein localises to cytoplasm, early endosomes, recycling endosomes, midbody, centrosome and cilium basal body. ENTR1 contains a large coiled coil region and multiple phosphorylation sites. The N-terminal domain is necessary and sufficient for basal body localisation and ciliogenesis. This entry is found in metazoans and some protists.
