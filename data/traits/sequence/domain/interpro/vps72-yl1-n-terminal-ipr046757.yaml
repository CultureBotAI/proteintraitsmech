identifier: InterPro:IPR046757
label: "Vps72/YL1, N-terminal"
definition: >-
  This entry include a group of proteins involved in chromatin remodelling, including Vps72 (vacuolar protein sorting-associated protein 72) from budding yeasts. Vps72 is a Htz1-binding component of the SWR1 complex, which is required for the incorporation of the histone variant H2AZ into chromatin. It is also required for vacuolar protein sorting in budding yeasts. The Vps72 homologue from animals, YL-1, is a deposition-and-exchange histone chaperone specific for H2AZ1, specifically chaperones H2AZ1 and deposits it into nucleosomes. It is component of the SRCAP and Tip60 complexes, and mediates the ATP-dependent exchange of histone H2AZ1/H2B dimers for nucleosomal H2A/H2B, leading to transcriptional regulation of selected genes by chromatin remodeling. This is the N-terminal region from Vps72/YL1, which covers the aspartate- and glutamate-rich N-terminal domain and the central DNA-binding domain.
