identifier: InterPro:IPR002816
label: "TraB/PrgY/GumN, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Tiki1/2 from humans, TraB/PrgY from the gut flora Enterococcus faecalis and gumN from the plant pathogen Xanthomonas. Tiki1 is homologous to TraB/PrgY. They have a pair of widely spaced GX2H motifs and a conserved glutamate. From the structural study, this group of proteins have been identified as an ancient metalloprotease clan with a common protein architecture -cobbled from the folds of the EreA/ChaN/PMT group- that mediates proteolytic activities. Tiki1 is a membrane-associated protease that inhibits Wnt via the cleavage of its amino terminus, diminishing Wnt's binding to receptors. TraB/PrgY is an inhibitor peptide that may act as a protease to inactivate the mating pheromone.
