identifier: InterPro:IPR047368
label: "A-kinase anchor protein 1, type I K homology domain"
definition: >-
  This is the type-I KH RNA-binding domain of AKAP1. AKAP1, also called A-kinase anchor protein 149 kDa (AKAP 149), dual specificity A-kinase-anchoring protein 1 (D-AKAP-1), protein kinase A-anchoring protein 1 (PRKA1), is found in mitochondria and in the endoplasmic reticulum-nuclear envelope, where it anchors protein kinases, phosphatases, and a phosphodiesterase. It regulates multiple cellular processes governing mitochondrial homeostasis and cell viability. AKAP1 binds to type I and II regulatory subunits of protein kinase A and anchors them to the cytoplasmic face of the mitochondrial outer membrane. AKAP1 is also involved in mitochondrial-mediated antiviral innate immunity.
