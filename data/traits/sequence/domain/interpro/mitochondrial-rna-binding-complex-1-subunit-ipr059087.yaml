identifier: InterPro:IPR059087
label: "Mitochondrial RNA binding complex 1 subunit"
definition: >-
  This domain is found in RESC10 ( ). RESC10 is predicted to adopt an all-helical structure with a disordered N-terminal region (of about 118 amino acids) that is predicted with low confidence. The rest of the protein is predicted with high confidence and shows a helical repeat structure that resembles proteins containing Armadillo (ARM)/β-catenin-like repeats and tetratricopeptide (TPR) repeats. Both ARM and TPR repeats are implicated in mediating protein-protein interactions. RNA-editing substrate-binding complex 10 protein (RESC10) is a component of RESC which, together with RECC forms the editosome that orchestrates guide RNA (gRNA)-programmed editing to recode cryptic mitochondrial transcripts into messenger RNAs. RESC stabilises gRNAs and engages mRNAs. The RNA-editing catalytic complex (RECC) fulfills gRNA-programmed mRNA cleavage, uridine insertion or deletion, and religation reactions. RESC is a heterogenous assembly of ~18 proteins that enclose gRNAs and mRNAs. RESC10 is composed of HEAT repeats. RESC10 is integral to maintaining the structural and functional integrity of RESC, acting upstream of other RESC proteins to orchestrate their organisation and interactions. Besides, the gRNA 3' nucleotides interact with RESC10.
