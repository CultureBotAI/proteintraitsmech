identifier: InterPro:IPR048337
label: "FAM50A/XAP5, C-terminal domain"
definition: >-
  This entry represents a domain found at the C-terminal of FAM50A and XAP5 homologues from a wide range of eukaryotes. These are nuclear proteins previously suggested to be DNA binding but recent studies suggest that they play a role in the spliceosome complex. In plants, these proteins are essential for correct circadian clock functioning by acting as a light-quality regulator coordinating the activities of blue and red light signalling pathways during plant growth-inhibiting growth in red light but promoting growth in blue light. The AlphaFold prediction of this domain shows structural similarity to the RA domain ( ).
