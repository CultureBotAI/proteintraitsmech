identifier: InterPro:IPR029341
label: "FAM21/CAPZIP domain"
definition: >-
  This domain is found on WASH complex subunits FAM21 and CAP-ZIP proteins. Proteins containing this domain are eukaryotic proteins that are typically between 305 and 1321 amino acids in length. The exact function of this domain is not known.
