identifier: InterPro:IPR060307
label: "Zinc finger transcription factor Trps1, third C2H2 zinc finger"
definition: >-
  This entry represents the third C2H2 zinc finger found in human Zinc finger transcription factor Trps1 and related proteins mainly from animals. Trps1 functions primarily as a transcriptional repressor. It binds specifically to GATA sequences and plays a crucial role in repressing the expression of GATA-regulated genes during specific stages of vertebrate development. Trps1 is involved in regulating chondrocyte proliferation and differentiation, executing multiple functions in proliferating chondrocytes. It expands the region of distal chondrocytes, activates proliferation in columnar cells, and supports the differentiation of columnar into hypertrophic chondrocytes. Trps1 also interacts with other proteins, such as RNF4, to regulate its repressor activity, and specifically interacts with the activator form of GLI3.
