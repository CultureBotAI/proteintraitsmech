identifier: InterPro:IPR058639
label: "YknX-like, barrel-sandwich hybrid domain"
definition: >-
  This domain is found in the putative efflux system component YknX from Bacillus subtilis and related proteins. YknX is a component of an unusual four-component transporter YknWXYZ, which is required for protection against the killing factor SdpC (sporulation-delaying protein). YknX interacts with YknYZ. This barrel-sandwich hybrid domain is interrupted by an α-helical hairpin domain which is inserted into it.
