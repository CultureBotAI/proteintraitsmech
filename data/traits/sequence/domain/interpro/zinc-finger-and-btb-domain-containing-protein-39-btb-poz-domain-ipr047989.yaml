identifier: InterPro:IPR047989
label: "Zinc finger and BTB domain-containing protein 39, BTB/POZ domain"
definition: >-
  This entry represents the BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in human Zinc finger and BTB domain-containing protein 39 (ZBTB39) and similar proteins from vertebrates. ZBTB39 may be involved in transcriptional regulation. Its specific function is as yet unknown. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids.
