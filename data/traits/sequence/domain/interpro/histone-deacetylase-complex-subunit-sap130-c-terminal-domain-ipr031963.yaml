identifier: InterPro:IPR031963
label: "Histone deacetylase complex subunit SAP130, C-terminal domain"
definition: >-
  SAP130 (Sin3-associated protein 130) is a component of the histone deacetylase-dependent co-repressor complex mSin3A that acts as a transcriptional repressor. It may function in the assembly and/or enzymatic activity of mSin3A or in mediating interactions between the complex and other regulatory complexes. This entry represents the C-terminal domain of SAP130.
