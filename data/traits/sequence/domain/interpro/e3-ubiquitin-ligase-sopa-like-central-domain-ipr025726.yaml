identifier: InterPro:IPR025726
label: "E3 ubiquitin ligase SopA-like central domain"
definition: >-
  This domain is found in the E. coli Type III secretion effector protein SopA and related sequences. These proteins have been shown to act as E3 ubiquitin ligase enzymes.
