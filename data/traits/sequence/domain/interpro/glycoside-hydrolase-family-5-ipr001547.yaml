identifier: InterPro:IPR001547
label: Glycoside hydrolase, family 5
definition: >-
  Glycoside hydrolase family 5 comprises enzymes with several known activities; endoglucanase ( ); beta-mannanase ( ); exo-1,3-glucanase ( ); endo-1,6-glucanase ( ); xylanase ( ); endoglycoceramidase ( ). The microbial degradation of cellulose and xylans requires several types of enzymes. Fungi and bacteria produces a spectrum of cellulolytic enzymes (cellulases) and xylanases which, on the basis of sequence similarities, can be classified into families. One of these families is known as the cellulase family A or as the glycosyl hydrolases family 5. One of the conserved regions in this family contains a conserved glutamic acid residue which is potentially involved in the catalytic mechanism. O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website.
