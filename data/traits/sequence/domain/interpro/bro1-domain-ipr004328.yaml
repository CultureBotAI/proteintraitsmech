identifier: InterPro:IPR004328
label: "BRO1 domain"
definition: >-
  The BRO1 domain is a protein domain of ~390 residues in length. It occurs in a number of eukaryotic proteins, such as yeast BRO1 and human PDCD6IP/Alix, which are involved in protein targeting to the vacuole or lysosome. The BRO1 domain of fungal and mammalian proteins binds with multivesicular body components (ESCRT-III proteins) such as yeast Snf7 and mammalian CHMP4b, and can function to target BRO1 domain-containing proteins to endosomes. The BRO1 domain has a boomerang shape composed of 14 α-helices and 3 β-sheets. It contains a TPR-like substructure in the central part. The C terminus is less conserved.
