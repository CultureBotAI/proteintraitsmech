identifier: InterPro:IPR064030
label: "Dihydromethanophenazine:CoB--CoM heterodisulfide reductase subunit E"
definition: >-
  This entry represents Dihydromethanophenazine:CoB--CoM heterodisulfide reductase subunit E (HdrE) which is part of a complex that catalyses the reversible reduction of CoM-S-S-CoB to the thiol-coenzymes H-S-CoM (coenzyme M) and H-S-CoB (coenzyme B). HdrE forms membrane-bound HdrED complex that is found exclusively in members of the order Methanosarcinales whereas the cytoplasmic HdrABC enzyme complex is found in most methanogens. The hdrED1 operon is constitutively expressed and required for viability under all growth conditions suggesting that it is the primary Hdr (Coenzyme B-Coenzyme M heterodisulfide (CoB-S-S-CoM) reductase.
