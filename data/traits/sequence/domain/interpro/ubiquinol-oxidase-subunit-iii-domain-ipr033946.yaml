identifier: InterPro:IPR033946
label: "Ubiquinol oxidase subunit III domain"
definition: >-
  Ubiquinol oxidase is a multi-chain transmembrane protein located in the cell membrane and one of several aerobic bacterial terminal oxidases. This complex couples oxidation of reduced quinones to the reduction of molecular oxygen to water, and the pumping of protons to form the proton gradient utilised for ATP production. aa3-type oxidases contain two haem A cofactors as well as copper atoms at the active site. Quinone oxidases feature four subunits in contrast to the 13 subunit bovine cytochrome c oxidase (CcO). Subunits I, II and III of ubiquinol oxidase are homologous to the corresponding subunits in bovine CcO. Although not required for catalytic activity, subunit III appears to be involved in assembly of the multimer complex. This entry represents a domain found in ubiquinol oxidase subunit III. While this signature predominantly matches the ubiquinol oxidase version of the domain, it also includes some cytochrome c oxidase homologues.
