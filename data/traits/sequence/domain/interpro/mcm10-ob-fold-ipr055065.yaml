label: "MCM10, OB-fold"
definition: >-
  MCM10 is an essential eukaryotic DNA replication protein required for assembly and progression of the replication fork. This entry represents the OB fold domain from the internal domain (ID) which also contains a C3H-type zinc finger ( ).
