identifier: InterPro:IPR042667
label: "E3 ubiquitin-protein ligase TRIM63, RING finger, HC subclass"
definition: >-
  Tripartite motif-containing protein 63 (TRIM63), also known as MURF-1 is an E3 ubiquitin-protein ligase involved in ubiquitin-mediated muscle protein turnover. It is predominantly fast (type II) fibre-associated in skeletal muscle and can bind to many myofibrillar proteins, including titin, nebulin, the nebulin-related protein NRAP, troponin-I (TnI), troponin-T (TnT), myosin light chain 2 (MLC-2), myotilin, and T-cap. The early and robust upregulation of MuRF-1 is triggered by disuse, denervation, starvation, sepsis, or steroid administration resulting in skeletal muscle atrophy. It also plays a role in maintaining titin M-line integrity. It associates with the periphery of the M-line lattice and may be involved in the regulation of the titin kinase domain. It also participates in muscle stress response pathways and gene expression.
