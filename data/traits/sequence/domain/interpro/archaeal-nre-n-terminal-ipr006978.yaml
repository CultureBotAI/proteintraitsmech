identifier: InterPro:IPR006978
label: "Archaeal Nre, N-terminal"
definition: >-
  This conserved region is found in the N-terminal region of archaeal Nre proteins. While most archaeal organisms encode only a single Nre protein, some encode two, NreA and NreB.
