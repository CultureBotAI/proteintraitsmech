identifier: InterPro:IPR049473
label: "CRISPR-associated endonuclease Cas9, PI domain, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of CRISPR-associated endonuclease Cas9 from Staphylococcus aureus (Cas9) and similar sequences mainly found in Staphylococcus. Cas9 adopts a bilobed architecture consisting of a REC lobe and a NUC lobe connected by an arginine-rich bridge helix and a linker loop. The C-terminal region, known as the PI domain, can be divided into a Topoisomerase-homology (TOPO) domain ( ) and a C- terminal domain (this entry). This domain forms a twisted six-stranded anti-parallel β-sheet.
