identifier: InterPro:IPR060327
label: "MHP1/GIP3/HER1, C-terminal domain"
definition: >-
  This entry represents the C-terminal region of MAP-homologous protein 1 (MHP1), HER1 and GIP3 from yeast and related fungal sequences. The specific function of this region remains to be determined. MHP1 is essential for the formation and stabilisation of microtubules, binds to microtubules in vitro, and localises to cytoplasmic microtubules and mitotic spindles. The protein contains leucine-rich repeat regions and extensive disordered regions, with a Tau/MAP repeat-like region at the C-terminal end. MHP1 undergoes extensive phosphorylation and ubiquitination modifications. The protein belongs to the GIP3/HER1 family and is found in fungi.
