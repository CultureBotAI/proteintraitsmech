identifier: InterPro:IPR055483
label: "Domain of unknown function DUF7055"
definition: >-
  This is a presumed domain found in a group of uncharacterised sequences from bacteria. According to structure predictions, this domain is found at the C-terminal and may adopt an all-β structure consisting of eight anti-parallel β-sheets. These proteins also have a glycosyltransferase domain at the N-terminal.
