label: "YMR265C-like, C-terminal"
definition: >-
  This is the presumed C-terminal domain of the uncharacterised yeast protein YMR265C, which has a HAD domain ( ) at the N-terminal, found in Swiss Army Knife RNA repair proteins. The function of this domain is unknown.
