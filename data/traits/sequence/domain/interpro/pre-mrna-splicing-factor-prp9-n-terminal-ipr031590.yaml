identifier: InterPro:IPR031590
label: "Pre-mRNA-splicing factor Prp9, N-terminal"
definition: >-
  This is the N-terminal domain of pre-mRNA-splicing factor Prp9. mRNA splicing factors, PRP9, PRP11, and PRP21, are necessary for binding of the U2 snRNP to the pre-mRNA in an early step of spliceosome assembly.
