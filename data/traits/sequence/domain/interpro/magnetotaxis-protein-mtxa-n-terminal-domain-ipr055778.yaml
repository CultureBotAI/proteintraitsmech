identifier: InterPro:IPR055778
label: "Magnetotaxis protein MtxA, N-terminal domain"
definition: >-
  This domain is found in at the N-terminal of Magnetobacterial protein MtxA from Magnetospirillum gryphiswaldense and similar sequences from magnetotactic aquatic proteobacteria. Magnetotaxis is believed to direct the swimming of cells toward growth-favoring microoxic zones in natural waters.
