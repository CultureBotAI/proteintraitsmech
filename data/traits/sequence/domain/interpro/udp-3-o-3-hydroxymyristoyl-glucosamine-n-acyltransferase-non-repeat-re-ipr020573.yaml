identifier: InterPro:IPR020573
label: UDP-3-O-[3-hydroxymyristoyl] glucosamine N-acyltransferase, non-repeat region
definition: >-
  This entry represents the non-repeating region of the enzyme. UDP-3-O-[3-hydroxymyristoyl] glucosamine N-acyltransferase ( ) catalyses an early step in lipid A biosynthesis: UDP-3-O-(3-hydroxytetradecanoyl)glucosamine + (R)-3-hydroxytetradecanoyl- [acyl carrier protein] = UDP-2,3-bis(3-hydroxytetradecanoyl)glucosamine + [acyl carrier protein] This enzyme contains several hexapeptide repeats and forms part of the wider bacterial transferase hexapeptide repeat family.
