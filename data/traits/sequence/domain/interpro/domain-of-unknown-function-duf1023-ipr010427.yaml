identifier: InterPro:IPR010427
label: "Domain of unknown function DUF1023"
definition: >-
  This entry represents a domain found in uncharacterised proteins mainly from Actinobacteria. It covers the full length of the protein in some sequences such as MT0992 and is found associated with in others like MT2140 from Mycobacterium tuberculosis. Computational analysis suggests that they may belong to the α-β hydrolase family of enzymes, as they are predicted to form the core secondary structures and catalytic machinery common to these proteins. Genomic context suggests that they may function as lipases, controlling the concentration of their putative phospholipid substrates.
