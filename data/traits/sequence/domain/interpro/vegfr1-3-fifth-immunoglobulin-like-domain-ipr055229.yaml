identifier: InterPro:IPR055229
label: "VEGFR1-3, fifth immunoglobulin-like domain"
definition: >-
  This is the fifth immunoglobulin-like domain of human Vascular endothelial growth factor receptor 1, 2 and 3 (VEGFR1-3) and similar sequences mainly found in animals. VEGFR-1 is a cell-surface receptor for VEGFA, VEGFB and PGF. It is a tyrosine-protein kinase that plays an essential role in the development of embryonic vasculature, the regulation of angiogenesis, cell survival, cell migration, macrophage function, chemotaxis, and cancer cell invasion. VEGFR2 is a receptor for VEGFA, VEGFC or VEGFD, and plays an essential role in the regulation of angiogenesis, vascular development, vascular permeability, and embryonic hematopoiesis. VEGFR3 is a cell-surface receptor for VEGFC and VEGFD, and plays an essential role in adult lymphangiogenesis and in the development of the vascular network and the cardiovascular system during embryonic development.
