identifier: InterPro:IPR062508
label: "Taste receptor cell protein 1 middle domain"
definition: >-
  This entry represents the middle domain of taste receptor cell protein 1 (Trcg1). Trcg1 is selectively expressed in taste receptor cells and is restricted to circumvallate papillae in mouse. While the complete protein contains a signal peptide and is produced as a precursor, the specific function of this middle domain remains to be determined. This domain contains a SEA-like fold.
