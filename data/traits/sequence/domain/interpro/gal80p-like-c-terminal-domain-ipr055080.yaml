identifier: InterPro:IPR055080
label: "Gal80p-like, C-terminal domain"
definition: >-
  This domain is found in Gal80p and its homologues from fungi and bacteria. Gal80p is a yeast regulatory protein closely related to glucose-fructose oxidoreductase. In Gal80p, this domain is likely involved in the binding of Gal4p.
