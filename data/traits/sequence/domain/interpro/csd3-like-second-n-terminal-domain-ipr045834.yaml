identifier: InterPro:IPR045834
label: "Csd3-like, second N-terminal domain"
definition: >-
  This entry represents the second N-terminal domain from the Csd3 peptidase (also known as HdpA), a bi-functional enzyme with delta, delta-endopeptidase activity and delta, delta-carboxypeptidase activity. This domain has a similar structure to despite low sequence similarity.
