label: "DIP0205-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of DIP0205 from Corynebacterium diphtheriae and other putative phage capsid proteins from tailed bacteriophages and bacterial prophages. This domain adopts an α-helical structure. It is often found associated to .
