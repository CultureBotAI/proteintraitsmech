identifier: InterPro:IPR053823
label: "CLIC, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of chloride ion channels CLIC and related sequences. The chloride intracellular channel (CLICs) belong to the glutathione-S-transferase (GSTs) superfamily, highly conserved in vertebrates which usually possess six distinct paralogues (CLIC1-CLIC6). They are auto-inserting, self-assembling intracellular anion channels involved in a wide variety of functions including regulated secretion, cell division and apoptosis. CLIC proteins can exist as both soluble globular proteins and integral membrane proteins with ion channel function. Membrane insertion is redox-regulated and has a strong pH dependence; the N-terminal domain of CLIC1 undergoes a structural change to form a non-covalent dimer stabilized by the formation of an intramolecular disulfide bond between two cysteines that are far apart in the reduced form. This redox-controlled structural rearrangement exposes a large hydrophobic surface that may represent the docking interface of CLIC1 in its membrane-bound state. The two cysteines in CLIC1 that form the disulfide bond in oxidizing conditions are essential for dimerization and chloride channel activity.
