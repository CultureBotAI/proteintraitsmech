identifier: InterPro:IPR041538
label: "ATPase RavA-like, AAA lid domain"
definition: >-
  This entry represents the α-helical AAA+ lid domain that is found to the C terminus of AAA domains. Proteins containing this domain include RavA, which functions as an ATPase.
