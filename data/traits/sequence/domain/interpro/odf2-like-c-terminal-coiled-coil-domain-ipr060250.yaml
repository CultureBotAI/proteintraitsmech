identifier: InterPro:IPR060250
label: "ODF2-like, C-terminal coiled coil domain"
definition: >-
  This entry represents the C-terminal coiled coil domain of human outer dense fiber protein 2 (ODF2), its homologue Protein BCAP, and similar proteins mainly found in animals. The function of this domain remains to be determined. ODF2 is a major component of the outer dense fibres in mammalian sperm tails and plays a crucial role in cytoskeletal organisation. The protein exhibits self-association properties, forming fibrillar structures that are intimately linked to the microtubule network. These structures are strategically positioned on the exterior of the axoneme in both the midpiece and principal piece of the sperm tail, where they contribute to maintaining the passive elastic properties and elastic recoil necessary for effective sperm motility. Beyond its role in sperm, ODF2 is widely localised to centrosomes, centrioles, cilia and flagella throughout vertebrates. The protein functions as a general scaffold component, with specific localisation at the distal and subdistal appendages of mother centrioles, where it may exert a modulating influence on ciliary and flagellar motility.
