identifier: InterPro:IPR055480
label: "NAD-dependent glutamate dehydrogenase, N-terminal domain"
definition: >-
  This domain is found in yeast NAD-specific glutamate dehydrogenase (GDH2, also known as DHE2) and similar fungal proteins. GDH2 is involved in the degradation of glutamate to ammonia and alpha-ketoglutarate. This domain is found at the N terminus of GDH2 and is predicted to adopt a globular structure composed of four α-helices.
