identifier: InterPro:IPR048521
label: WipA-like, phosphatase domain
definition: >-
  This entry represents the phosphatase domain of WipA from Legionella pneumophila ( ) and related bacterial proteins. WipA is one of the effector proteins involved in pathogenesis and targets tyrosine-phosphorylated peptides. The structure of WipA consists of two domains, an N-terminal coiled-coil and a C-terminal catalytic phosphatase domain ( ). The latter has a serine/threonine phosphatase fold that unexpectedly targets tyrosine-phosphorylated peptides.
