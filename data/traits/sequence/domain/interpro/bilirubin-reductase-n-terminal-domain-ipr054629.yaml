identifier: InterPro:IPR054629
label: "Bilirubin reductase, N-terminal domain"
definition: >-
  This entry includes bilirubin reductase from Clostridioides difficile (BilR), as found in the gut microbiome, and similar sequences mainly found in firmicutes. While BilR fom Clostridioides difficile is a monodomain protein, some members of this entry are longer and this constitutes the N-terminal domain, such as in BilR form Mediterraneibacter gnavus. Bilirubin, a haem breakdown product excreted in bile into the human gut, is converted to urobilinogen by gut bacteria, in a process protective against jaundice from bilirubin reabsorption. This process is catalysed by BilR. Urobilinogen oxidizes to urobilin, which gives urine its yellow colour.
