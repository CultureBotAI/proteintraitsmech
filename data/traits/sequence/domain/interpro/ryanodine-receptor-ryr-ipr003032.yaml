identifier: InterPro:IPR003032
label: "Ryanodine receptor Ryr"
definition: >-
  This domain is called RyR for Ryanodine receptor. The domain is found in four copies in the ryanodine receptor. A single copy of this domain encodes an unknown protein from Bacteroides thetaiotamicron, and and suggests that the repeats in RyRs may have a prokaryotic origin. The function of this domain is unknown.
