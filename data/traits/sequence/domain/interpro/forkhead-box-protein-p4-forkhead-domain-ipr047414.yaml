identifier: InterPro:IPR047414
label: "Forkhead box protein P4, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXP4, and similar sequences from vertebrates. The FH domain is a winged helix DNA-binding domain. Forkhead box protein P4 (FOXP4) is a transcriptional repressor that represses lung-specific expression. It is not required for T cell development, but is necessary for normal T cell cytokine recall responses to antigen following pathogenic infection. FOXP4 is expressed specifically in migrating and mature Purkinje cells of cerebellum from embryonic stages to adulthood, being dispensable for the early PC dendrite outgrowth, but essential for the maintenance of Purkinje cells dendritic arborization and subsequent association with Bergmann glial fibers.
