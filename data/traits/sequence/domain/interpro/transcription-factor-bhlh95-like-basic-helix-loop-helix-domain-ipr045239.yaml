identifier: InterPro:IPR045239
label: "Transcription factor bHLH95-like, basic helix-loop-helix domain"
definition: >-
  bHLH proteins are the second largest class of plant transcription factors that regulate transcription of genes that are involved in many essential physiological and developmental process. bHLH proteins are transcriptional regulators that are found in organisms from yeast to humans. This entry represents the basic helix-loop-helix domain found in a group of plant bHLH proteins, including BHLH95 from Arabidopsis. BHLH95 is an endosperm-specific transcription factor necessary for endosperm degradation, embryo growth, embryo-endosperm separation, and normal embryo cuticle formation.
