identifier: InterPro:IPR015327
label: Smaug, PHAT analogous topology
definition: >-
  The PHAT (pseudo-HEAT analogous topology) domain assumes a structure consisting of a layer of three parallel helices packed against a layer of two antiparallel helices, into a cylindrical shaped five-helix bundle. It is found in the RNA-binding protein Smaug, where it is essential for high-affinity RNA binding. Smaug is a translation regulator that binds to the 3'-UTR of specific mRNAs such as nanos (nos) and prevents their translation.
