identifier: InterPro:IPR054528
label: "TcaA protein NTF2-like domain"
definition: >-
  This entry represents the C-terminal domain of the TcaA protein. TcaA plays a major role in decreasing resistance to glycopeptide antibiotics. This domain has an NTF2-like fold. This suggests this domain could have an enzymatic function.
