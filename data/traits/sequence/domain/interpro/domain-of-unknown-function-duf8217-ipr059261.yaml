label: "Domain of unknown function DUF8217"
definition: >-
  This domain is found in uncharacterised proteins from Alphaproteobacteria. It is predicted to adopt a beta- sandwich with unique topology. It contains four highly conserved cysteine residues that are predicted to form disulfide bonds.
