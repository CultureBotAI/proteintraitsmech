identifier: InterPro:IPR048969
label: "FACT complex subunit SPT16, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of SPT16, which wraps around the DNA binding surface of H2A-H2B. SPT16 is a component of the FACT (facilitator of chromatin transcription) complex, a general chromatin factor that acts to reorganise nucleosomes. In budding yeasts, the N-terminal domain (NTD) of SPT16 includes a smaller N-terminal lobe (residues 1-175) and a larger C-terminal lobe (residues 176-447).
