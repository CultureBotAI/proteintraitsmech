identifier: InterPro:IPR039187
label: "Strawberry notch, AAA domain"
definition: >-
  This entry represents the AAA domain found in Strawberry notch protein. Strawberry notch proteins carry DExD/H-box groups and helicase C-terminal domains. These proteins promote the expression of diverse targets, potentially through interactions with transcriptional activator or repressor complexes. Strawberry notch was first identified in Drosophila where functions downstream of Notch and regulates gene expression during development.
