identifier: InterPro:IPR000172
label: Glucose-methanol-choline oxidoreductase, N-terminal
definition: >-
  The glucose-methanol-choline (GMC) oxidoreductases are FAD flavoproteins oxidoreductases. These enzymes include a variety of proteins, including choline dehydrogenase (CHD), methanol oxidase (MOX) and cellobiose dehydrogenase which share a number of regions of sequence similarities. One of these regions, located in the N-terminal section, corresponds to the FAD ADP-binding domain. The function of the other conserved domains is not yet known.
