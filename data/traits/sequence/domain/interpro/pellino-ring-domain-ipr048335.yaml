identifier: InterPro:IPR048335
label: "Pellino, RING domain"
definition: >-
  Pellino proteins are E3 ubiquitin ligases that play an important role in immunity, being involved in Toll-like signalling pathways, and associates with the kinase domain of the Pelle Ser/Thr kinase. Mammalian pellinos have been shown to mediate polyubiquitination of interleukin-1 receptor-associated kinase (IRAK). These proteins consist of an N-terminal forkhead-associated (FHA) domain and a C-terminal RING domain. This entry represents the RING domain, which is not required for interaction with phosphorylated IRAK1.
