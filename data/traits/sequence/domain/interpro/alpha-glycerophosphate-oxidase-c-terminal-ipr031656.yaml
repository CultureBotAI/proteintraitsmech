identifier: InterPro:IPR031656
label: "Alpha-glycerophosphate oxidase, C-terminal"
definition: >-
  This entry represents the C-terminal cap domain of alpha-glycerophosphate oxidase, also known as glycerol-3-phosphate oxidase. This domain shows an overall negative electrostatic surface, thought to be involved in substrate recognition.
