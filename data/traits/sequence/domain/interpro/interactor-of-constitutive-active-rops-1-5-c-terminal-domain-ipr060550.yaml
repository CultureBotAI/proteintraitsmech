identifier: InterPro:IPR060550
label: "Interactor of constitutive active ROPs 1-5, C-terminal domain"
definition: >-
  This entry represents the C-terminal coiled-coil domain found in plant ICR1-5 proteins (Interactor of constitutive active ROPs 1-5). ICR proteins are involved in ROP-regulated polar growth and cortical microtubule organisation. The coiled-coil structure of this domain likely mediates protein-protein interactions.
