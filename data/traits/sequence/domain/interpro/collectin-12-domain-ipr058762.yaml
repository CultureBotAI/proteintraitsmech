identifier: InterPro:IPR058762
label: "Collectin-12 domain"
definition: >-
  This domain is found in human Collectin-12 (COLEC12) and similar sequences from vertebrates. This domain, which is often found associated with and , is predicted to adopt an α-helical configuration. COLEC12 is a Scavenger receptor that displays several functions associated with host defence. It promotes binding and phagocytosis of gram-positive, gram-negative bacteria and yeast and mediates the recognition, internalisation and degradation of oxidatively modified low density lipoprotein by vascular endothelial cells. In humans, his protein may play a role in the clearance of amyloid-beta in Alzheimer disease.
