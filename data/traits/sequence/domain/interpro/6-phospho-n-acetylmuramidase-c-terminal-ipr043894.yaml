identifier: InterPro:IPR043894
label: "6-phospho-N-acetylmuramidase, C-terminal"
definition: >-
  This entry represents the C-terminal domain of 6-phospho-N-acetylmuramidase found in bacteria. MupG is involved in the recycling pathway of the cell wall turnover product MurNAc-GlcNAc in S. aureus. It catalyses the hydrolysis of MurNAc 6-phosphate-GlcNAc, the disaccharide product of MurP-uptake and phosphorylation, yielding MurNAc 6-phosphate and GlcNAc. These proteins appear to consist of two structural subdomains as it can be seen in the two available crystal structures of Enterococcus faecalis ( ) and Bacillus cereus ( ). The larger N-terminal domain has a TIM-barrel like structure, while this C-terminal domain is similar to the cyclophilin family.
