identifier: InterPro:IPR013953
label: "FACT complex subunit SPT16, middle domain"
definition: >-
  This entry represents a domain found in the central region of Spt16 from diverse eukaryotes. This entry covers the dimerization domain (DD), which straddles nucleosomal DNA at the H2A-H2B dyad. SPT16 is a component of the FACT (facilitator of chromatin transcription) complex, a general chromatin factor that acts to reorganise nucleosomes. In budding yeasts, the N-terminal domain (NTD) of SPT16 includes a smaller N-terminal lobe (residues 1-175) and a larger C-terminal lobe (residues 176-447).
