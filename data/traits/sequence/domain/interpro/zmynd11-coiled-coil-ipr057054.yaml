identifier: InterPro:IPR057054
label: "ZMYND11, coiled-coil"
definition: >-
  This entry represents a coiled-coil domain that self associates to form a dimeric arrangement found in animal ZMYND11 proteins. This domain is adjacent to a MYND zinc finger. The Zinc finger MYND domain-containing protein 11 family functions as a chromatin reader, specifically recognising and binding to histone H3.3 trimethylated at Lys-36 (H3.3K36me3). It plays a role in regulating RNA polymerase II elongation, acting as a transcription corepressor by modulating the polymerase during the elongation stage. The family's PWWP domain adopts a five-stranded β-barrel fold and binds to H3.3K36me3 via a conserved aromatic cage. This group of proteins is involved in the specific recognition of H3.3 histone by encapsulating the Ser 31 residue of H3.3 in a composite pocket formed by tandem bromo-PWWP domains. Additionally, members have a role in tumour suppression by repressing transcriptional programs essential for tumour cell growth and can bind non-specifically to dsDNA. In the context of microbial infection, it can inhibit viral-mediated transcriptional activation and host cell proliferation.
