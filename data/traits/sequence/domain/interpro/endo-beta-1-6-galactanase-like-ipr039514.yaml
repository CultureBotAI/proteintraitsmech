label: Endo-beta-1,6-galactanase-like
definition: >-
  This entry represents a domain found in endo-beta-1,6-galactanase (6GAL) and related proteins. In Trichoderma viride, 6GAL hydrolyzes galactooligomers with a degree of polymerization higher than 3.
