identifier: InterPro:IPR041953
label: "YdeP, molybdopterin-binding oxidoreductase-like domain"
definition: >-
  YdeP is a putative oxidoreductase involved in acid resistance. This entry represents a molybdopterin-binding oxidoreductase-like domain with a putative molybdopterin cofactor binding site found in YdeP and related bacterial proteins. These members belong to the molybdopterin_binding (MopB) superfamily of proteins.
