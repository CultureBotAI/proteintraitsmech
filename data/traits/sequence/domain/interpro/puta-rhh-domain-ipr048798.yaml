identifier: InterPro:IPR048798
label: "PutA, RHH domain"
definition: >-
  This domain is found in the Bifunctional protein PutA from Escherichia coli and similar sequences mainly found in proteobacteria. PutA is both a bifunctional proline catabolic enzyme that oxidises proline to glutamate for use as a carbon and nitrogen source and an autogenous transcriptional repressor of the put operon. This entry represents the N-terminal ribbon-helix-helix (RHH) domain, which consists of a β-strand and two α-helices. This domain has a Lys at the end of the β-strand that interacts directly with DNA bases through the major groove, contributing to transcriptional regulation.
