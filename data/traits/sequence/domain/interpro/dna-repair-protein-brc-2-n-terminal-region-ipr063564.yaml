identifier: InterPro:IPR063564
label: "DNA repair protein brc-2, N-terminal region"
definition: >-
  This entry represents the N-terminal region of BRC-2 (DNA repair protein brc-2), found in Caenorhabditis species. This region is mostly disordered and contains a BRCA2 repeat-like segment that mediates interaction with RAD-51, BRC-2 functions by targeting RAD-51 to DNA damage sites and blocking ATP hydrolysis by RAD-51, thereby promoting homologous recombination. BRC-2 is a BRCA2- related protein required for homologous recombination repair of DNA double-strand breaks and chromosome integrity. The protein contains an N-terminal BRCA2 repeat-like region that mediates interaction with RAD-51 and stabilisation of RAD-51-DNA filaments, a central domain, and this C-terminal domain that is required for single-stranded DNA binding. BRC-2 functions by targeting RAD-51 to DNA damage sites and blocking ATP hydrolysis by RAD-51, thereby promoting homologous recombination.
