identifier: InterPro:IPR021949
label: "Domain of unknown function DUF3566, transmembrane domain"
definition: >-
  The proteins in this entry are functionally uncharacterised, found in bacteria. They are typically between 136 to 304 amino acids in length. This region represents a transmembrane region found at the C terminus of the proteins.
