label: "Prepilin peptidase dependent protein C-like, C-terminal domain"
definition: >-
  This entry represents a domain found al proteins mainly found in Enterobacterales, including Prepilin peptidase-dependent protein C from Escherichia coli (PpdC). PpdC is predicted to be a bitopic inner membrane protein. This domain is found in association with . There are two completely conserved C residues that may be functionally important.
