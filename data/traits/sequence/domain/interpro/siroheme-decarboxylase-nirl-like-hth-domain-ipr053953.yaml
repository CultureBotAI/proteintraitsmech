identifier: InterPro:IPR053953
label: "Siroheme decarboxylase NirL-like, HTH domain"
definition: >-
  This entry represents the helix-turn-helix (HTH) domain found in siroheme decarboxylase NirdL from Hydrogenobacter thermophilus and related sequences, from bacteria and archaea. NirdL is involved in heme d1 biosynthesis. It catalyses the decarboxylation of siroheme into didecarboxysiroheme.
