identifier: InterPro:IPR034934
label: "F-BAR and double SH3 domains protein 2, F-BAR domain"
definition: >-
  F-BAR proteins have been identified as important coordinators for membrane curvatures, which regulate cellular processes such as endocytosis, phagocytosis, adhesion and migration. They bind to cell membrane via a N-terminal F-BAR domain, which associates with membrane phospholipids. F-BAR and double SH3 domains protein 2 (FCHSD2), also known as carom, contains an N-terminal F-BAR domain and two SH3 domains at the C terminus. It may mediate receptor endocytosis and transport. This entry represents the N-terminal F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain of FCHSD2.
