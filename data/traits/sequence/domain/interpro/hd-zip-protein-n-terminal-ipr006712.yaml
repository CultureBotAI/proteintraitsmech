identifier: InterPro:IPR006712
label: HD-ZIP protein, N-terminal
definition: >-
  Homeodomain leucine zipper (HDZip) genes encode putative transcription factors that are unique to plants. This observation suggests that homeobox-leucine zipper genes evolved after the divergence of plants and animals, perhaps to mediate specific regulatory events. This domain is the N-terminal of plant homeobox-leucine zipper proteins. Its function is unknown.
