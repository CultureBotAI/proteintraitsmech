identifier: InterPro:IPR016071
label: "Staphylococcal nuclease (SNase-like), OB-fold"
definition: >-
  Staphylococcus aureus nuclease (SNase) homologues, previously thought to be restricted to bacteria and archaea, are also in eukaryotes. Staphylococcal nuclease has a multi-domain organisation. The human cellular coactivator p100 contains four repeats, each of which is a SNase homologue. These repeats are unlikely to possess SNase-like activities as each lacks equivalent SNase catalytic residues, yet they may mediate p100's single-stranded DNA-binding function. A variety of proteins including many that are still uncharacterised belong to this group. SNase domains have an OB-fold consisting of a closed or partly open β-barrel with Greek key topology.
