identifier: InterPro:IPR041631
label: "Alpha-dystroglycan N-terminal domain 2"
definition: >-
  This is the second N-terminal domain found in alpha-Dystroglycan (DG). The murine skeletal muscle N-terminal alpha-DG region, contains two autonomous domains; the first identified as an Ig-like and the second resembling ribosomal RNA-binding proteins. This domain is similar to the small subunit ribosomal protein S6 of Thermus thermophilus (S6 domain). It is suggested that the S6 domain may be of functional relevance for LARGE (like-acetylglucosaminyltransferase) recognition along the alpha-DG maturation pathway.
