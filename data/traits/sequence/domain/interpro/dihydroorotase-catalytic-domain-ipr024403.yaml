identifier: InterPro:IPR024403
label: "Dihydroorotase, catalytic domain"
definition: >-
  This entry represents the catalytic domain found in the family of bacterial dihydroorotases. It also includes domains which are found in the multifunctional proteins r and pyr1-3 from Drosophila melanogaster and Dictyostelium discoideum, possessing dihydroorotase activity.
