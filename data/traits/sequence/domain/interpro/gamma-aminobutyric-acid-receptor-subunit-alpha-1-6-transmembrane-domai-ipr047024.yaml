identifier: InterPro:IPR047024
label: "Gamma-aminobutyric acid receptor subunit alpha 1-6, transmembrane domain"
definition: >-
  This entry represents the transmembrane domain (TM) of the six alpha subunits of Gamma-aminobutyric acid receptor (Gabra-1-6). A decline in the function of this complex, which acts as an anionic channel that mediates fast inhibitory synaptic transmission, triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. This domain consists of four transmembrane-spanning α-helical segments that are linked by loops. The intracellular loop that links the first two α-helical segments determines the ion selectivity of the channel.
