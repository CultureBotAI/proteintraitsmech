identifier: InterPro:IPR041208
label: "CD-NTase-associated protein 15"
definition: >-
  This entry includes CD-NTase-associated protein 15 (Cap15), an effector protein of a CBASS antivirus system that provides immunity against bacteriophages. Structure determination of Cap15 revealed that it has a compact 8-stranded β-barrel scaffold that forms a cyclic dinucleotide receptor domain that oligomerizes upon activation. Activated Cap15 binds the cyclic nucleotide second messenger 3',3'-cGAMP, relocalizes throughout the cell and specifically induces rupture of the inner membrane. These proteins have two transmembrane segments (TM) at the N-terminal, which is essential for phage protection.
