identifier: InterPro:IPR028319
label: Apoptosis-stimulating of p53 protein 1, RA domain
definition: >-
  ASPP1 (apoptosis-stimulating of p53 protein) is a member of the ASPP protein family (Apoptosi-Stimulating Protein of p53) that activates the p53-mediated apoptotic response. It functions as a tumour suppressor and coordinates with p53 to protect haematopoietic stem cell (HSC) pool integrity, guarding against haematological malignancies. The ASPP family of proteins may be a target for cancer therapy. This entry represents the RA domain present at the N terminus of ASSP1, which is a ubiquitin-like domain.
