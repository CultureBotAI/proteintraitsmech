identifier: InterPro:IPR049593
label: "LIM/homeobox protein Lhx3, LIM domain 1"
definition: >-
  This entry represents the first LIM domain of human LIM/homeobox protein Lhx3 (Lhx3) and similar sequences specific to vertebrates. Lhx3 is a member of LHX protein family, which features two tandem N-terminal LIM domains and a C-terminal DNA binding homeodomain. Members of LHX family are found in the nucleus and act as transcription factors or cofactors. The lhx3 gene is expressed in the ventral spinal cord, the pons, the medulla oblongata, and the pineal gland of the developing nervous system during mouse embryogenesis, and transcripts are found in the emergent pituitary gland. Lhx3 functions in concert with other transcription factors to specify interneuron and motor neuron fates during development. As in other LIM domains, this domain is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes.
