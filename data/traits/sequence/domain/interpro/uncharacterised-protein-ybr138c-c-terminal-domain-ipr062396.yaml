identifier: InterPro:IPR062396
label: "Uncharacterised protein YBR138C, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of uncharacterised protein YBR138C from Saccharomyces cerevisiae. This domain spans approximately residues 331-508 and contains a mixture of structured helical regions and disordered segments. The full-length protein is localised to the cytoplasm and is present at approximately 195 molecules per cell during log phase growth. The protein is conserved across fungal species. The specific function of this domain remains to be determined.
