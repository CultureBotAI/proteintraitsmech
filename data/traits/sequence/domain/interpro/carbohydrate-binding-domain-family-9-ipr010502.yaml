identifier: InterPro:IPR010502
label: Carbohydrate-binding domain, family 9
definition: >-
  This entry represents the family 9 carbohydrate-binding module (CBD9), which exhibit an immunoglobulin-like β-sandwich fold, with an additional β-strand at the N terminus. Bacterial extracellular cellulases and hemicellulases are involved in the hydrolysis of the major structural polysaccharides of plant cell walls. These are usually modular enzymes that contain catalytic and non-catalytic domains. The CBD9 domain binds to cellulose, xylan, as well as to a range of soluble di- and mono-saccharides, and is found in cellulose- and xylan-degrading enzymes, such as endo-1,4-beta-xylanase ( ).
