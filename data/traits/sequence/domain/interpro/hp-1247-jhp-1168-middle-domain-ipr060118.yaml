identifier: InterPro:IPR060118
label: "HP_1247/jhp_1168, middle domain"
definition: >-
  This entry represents the middle domain of HP_1247 and Protein jhp_1168 from Helicobacter pylori. HP_1247 is a 340 amino acid protein that may function as the equivalent of DNA polymerase III delta subunit (HolA). While the full-length protein contains a P-loop nucleotide triphosphate hydrolase domain and shows interaction with HolB protein, the specific function of this middle domain remains to be determined. This domain contains an all α-helical fold.
