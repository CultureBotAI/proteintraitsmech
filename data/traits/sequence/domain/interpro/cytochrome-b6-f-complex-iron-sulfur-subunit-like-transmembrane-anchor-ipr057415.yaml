identifier: InterPro:IPR057415
label: "Cytochrome b6-f complex iron-sulfur subunit-like, transmembrane anchor"
definition: >-
  This transmembrane domain, consisting of a single transmembrane helix, is found in Cytochrome b6-f complex iron-sulfur subunit (PetC) and related proteins. PetC, is a crucial component of the cytochrome b6f complex, which plays a central role in oxygenic photosynthesis. PetC contains a [2Fe-2S] cluster, which is is essential for the electron transfer process within the complex. PetC interacts with other subunits to form the functional cytochrome b6f complex. The complex functions as a dimer, with each monomer composed of eight subunits in total.
