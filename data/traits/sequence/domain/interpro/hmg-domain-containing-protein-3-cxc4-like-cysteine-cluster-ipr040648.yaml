identifier: InterPro:IPR040648
label: "HMG domain-containing protein 3, CxC4 like cysteine cluster"
definition: >-
  This entry represents a predicted Zinc chelating domain found in HMGXB3 (HMG-box containing 3), a protein involved in a range of cellular processes including cell migration and proliferation. This domain is N-terminal to the KDZ transposase domain.
