identifier: InterPro:IPR060295
label: "TRS130-like, first Ig-like domain"
definition: >-
  This is the first immunoglobulin-like (Ig-like) domain found in Trafficking protein particle complex II-specific subunit 130 homolog from Arabidopsis thaliana (TRS130) and similar proteins. TRS130 is an specific subunit of the TRAPP II complex, a highly conserved vesicle tethering complex that is required for the proper transport of proteins in post-Golgi trafficking pathways to the growing cell plate in mitotic active cells. This domain is usually found associated with and .
