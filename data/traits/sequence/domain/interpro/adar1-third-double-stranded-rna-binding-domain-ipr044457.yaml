identifier: InterPro:IPR044457
label: "ADAR1, third double-stranded RNA binding domain"
definition: >-
  Adenosine-to-inosine (A-to-I) editing is a post-transcriptional modification of RNA which changes its sequence, coding potential and secondary structure. A-to-I editing occurs at approximately 50 000-150 000 sites in mice and into the millions of sites in humans. This reaction is catalysed by the adenosine deaminase acting on RNA (ADAR) proteins, ADAR1 and ADAR2. ADAR1 and ADAR2 can edit both viral and cellular RNAs and can edit RNAs at multiple sites (hyper-editing) or at specific sites (site-specific editing). ADAR1 contains three double-stranded RNA binding motifs (DSRMs). This entry represents the third DSRM of ADAR1 (also known as DRADA).
