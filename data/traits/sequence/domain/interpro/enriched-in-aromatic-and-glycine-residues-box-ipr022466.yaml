identifier: InterPro:IPR022466
label: "Enriched in aromatic and glycine residues box"
definition: >-
  The EAGR box, Enriched in Aromatic and Glycine Residues, is found in three different proteins of the Mycoplasma genitalium terminal organelle, which acts in both cytadherence and gliding motility. The presence of this domain in a genome predicts the Mycoplasma-type terminal organelle structure, gliding motility, and cytadherence. The EAGR box may occur from one to nine times in a protein.
