identifier: InterPro:IPR046893
label: "MutS2 and Smr-associated SH3 domain"
definition: >-
  This entry represents a SH3-like domain associated with the MutS-like ABC ATPase and Smr domains. It has been predicted to play a role in lesion recognition or alternatively in mediating contacts with RNA primers or misincorporated ribonucleotides during DNA repair or interacting with the ribosome at the intersection between DNA repair and ribosome rescue. It is found in several proteins from plants and bacteria, including Endonuclease MutS2.
