identifier: InterPro:IPR000988
label: "Large ribosomal subunit protein eL24-related, N-terminal"
definition: >-
  This entry represents a domain found N-terminal in large ribosomal subunit protein eL24 and related proteins. A number of eukaryotic and archaeabacterial ribosomal proteins can be grouped on the basis of sequence similarities. One of these families consists of mammalian ribosomal protein eL24; yeast ribosomal protein eL24A/B; Kluyveromyces lactis ribosomal protein eL24; Arabidopsis thaliana ribosomal protein eL24y/z; Haloarcula marismortui ribosomal protein eL24; and Methanocaldococcus jannaschii protein eL24. These proteins have 60 to 160 amino-acid residues. The crystal structure of the eL24 protein from Halobacterium marismortui (Haloarcula marismortui) has been determined. The protein is composed of a single structural domain which forms an α/β zinc-binding fold. Ribosomal protein eL24/L24 is a ribosomal protein found in eukaryotes (L24) and in archaea (eL24, distinct from archaeal L24). eL24/L24 is located on the surface of the large subunit, adjacent to proteins L14 and L3, and near the translation factor binding site. eL24/L24 appears to play a role in the kinetics of peptide synthesis, and may be involved in interactions between the large and small subunits, either directly or through other factors. In mouse, a deletion mutation in L24 has been identified as the cause for the belly spot and tail (Bst) mutation that results in disrupted pigmentation, somitogenesis and retinal cell fate determination. L24 may be an important protein in eukaryotic reproduction: in shrimp, L24 expression is elevated in the ovary, suggesting a role in oogenesis, and in Arabidopsis, L24 has been proposed to have a specific function in gynoecium development. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed o…
