identifier: InterPro:IPR007737
label: "Mga helix-turn-helix domain"
definition: >-
  This domain is found in a group of positive transcriptional regulators, such as M regulator protein trans-acting positive regulator (Mga), a DNA-binding protein that activates the expression of several important virulence genes in group A streptococcus in response to changing environmental conditions. This domain is found in the centre of the Mga proteins. This domain is also found in a number of bacterial RofA transcriptional regulators that seem to be largely restricted to streptococci. These proteins have been shown to regulate the expression of important bacterial adhesins. This domain is also found in the transcriptional regulator MtlR from Bacillus subtilis which positively regulates the expression of the mtlAFD operon involved in the uptake and catabolism of mannitol. This is presumably a DNA-binding domain.
