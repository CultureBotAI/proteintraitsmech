identifier: InterPro:IPR057993
label: "HD-Zip IV, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in transcription factors of the class IV homeodomain-leucine zipper (HD-Zip IV) including GLABRA2, ANTHOCYANINLESS2 (ANL2), ARABIDOPSIS THALIANA MERISTEM LAYER1 (ATML1), PROTODERMAL FACTOR2 (PDF2), ROC1-9 and HDG1-12, found in plants. This domain is predicted to fold into a central β-sheet with α-helices on both sides. GLABRA2 regulates the frequency of trichome initiation and determines trichome spacing. ANL2 is involved in anthocyanin distribution and root development. PDF2 and ATML1 are involved in shoot epidermal cell differentiation. ATML1 and PDF2 function redundantly as positive regulators of shoot epidermal cell differentiation, and at least one copy of these genes is essential for embryo development. HDG5 is involved, together with PDF2, in the regulation of flower organ development by promoting the expression of APETALA 3 (AP3) in the epidermis and internal cell layers of developing flowers. ROC1 may be involved in protoderm differentiation and radial pattern formation during early embryogenesis.
