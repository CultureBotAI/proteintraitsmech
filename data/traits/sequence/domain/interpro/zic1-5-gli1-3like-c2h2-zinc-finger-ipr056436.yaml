identifier: InterPro:IPR056436
label: "ZIC1-5/GLI1-3like, C2H2 zinc finger"
definition: >-
  This entry represents the C2H2 zinc finger. This class is described approximately by the motif CXWXXCXnHXRXHTGEK. This entry includes a group of zinc finger transcription regulators, including GLI1-3, GLIS1-3 and ZIC1-5 from humans. GLI1-3 are central effectors of the Hedgehog (Hh) pathway in vertebrates. GLI1 is an obligatory activator, whereas GLI2 and GLI3 carry activator and repressor functions. The full-length GLI3 form, after phosphorylation and nuclear translocation, acts as an activator (GLI3A) while its C-terminally truncated form acts as a repressor (GLI3R). GLI3 participates in the patterning and growth of many organs, including the central nervous system (CNS) and limbs. ZIC1-5 are transcriptional activators that control several developmental processess. ZIC3 is required in the earliest stages in both axial midline development and left-right (LR) asymmetry specification. It binds to the minimal GLI-consensus sequence 5'-GGGTGGTC-3'. ZIC4/5 show DNA-binding activity to the Gli-binding sequence (GLIS), similar to ZIC1-3 proteins ]. ZIC5 is essential for neural crest development, converting cells from an epidermal fate to a neural crest cell fate. GLIS1-3 play key roles in the regulation of a number of physiological processes and have been implicated in several pathologies. Glis1-3 share a highly homologous zinc finger domain (ZFD) containing five Cys2-His2-type zinc finger (ZF) motifs with members of the Gli and Zic family.
