label: "Lipocalin-like domain"
definition: >-
  The lipocalin fold is dominated by eight β-strands which together form a cup-shaped antiparallel β-barrel that encloses an internal ligand-binding site. This entry represents domains with a fold that is related to the to the lipocalin fold.
