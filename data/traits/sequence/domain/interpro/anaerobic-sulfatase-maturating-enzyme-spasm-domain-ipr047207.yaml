identifier: InterPro:IPR047207
label: Anaerobic sulfatase maturating enzyme, SPASM domain
definition: >-
  This entry represents the iron-sulfur cluster-binding SPASM domain of anSME and similar proteins from prokaryotes. Anaerobic sulfatase maturating enzyme (anSME) is a radical S-adenosylmethionine (SAM) enzyme that catalyses, under anaerobic conditions, the co- or post-translational modification of arylsulfatases to form a catalytically essential formylglycine (FGly) residue to perform their hydrolysis function, removing sulfate groups from a wide array of substrates. Radical SAM enzymes are characterised by a conserved CxxxCxxC motif, which coordinates the conserved iron-sulfur cluster that is involved in the reductive cleavage of SAM and generates a 5'-deoxyadenosyl radical, which in turn abstracts a hydrogen from the appropriately positioned carbon atom of the substrate. Radical SAM (RS) enzymes with a C-terminal SPASM domain contain at least one other iron-sulfur cluster; anSME contains two auxillary 4Fe-4S clusters in its SPASM domain.
