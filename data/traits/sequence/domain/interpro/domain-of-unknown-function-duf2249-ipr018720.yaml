label: "Domain of unknown function DUF2249"
definition: >-
  This domain is found in a number of hypothetical bacterial and archaeal proteins with no known function. It is also found in proteins described as cupin 2 and hemerythrin. It represents a conserved region that shows distant similarity to the SirA protein (see ).
