identifier: InterPro:IPR015189
label: "Translation elongation factor SelB, winged helix, type 1"
definition: >-
  This entry represents a domain with a winged helix-type fold, which consists of a closed 3-helical bundle with a right-handed twist, and a small β-sheet wing. Different winged helix domains share a common structure, but can differ in sequence. This entry is designated "type 1".
