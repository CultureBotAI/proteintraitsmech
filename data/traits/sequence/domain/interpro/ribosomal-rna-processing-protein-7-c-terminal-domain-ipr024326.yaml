identifier: InterPro:IPR024326
label: "Ribosomal RNA-processing protein 7, C-terminal domain"
definition: >-
  Ribosomal RNA-processing protein 7 (RRP7) is an essential protein in yeast that is involved in pre-rRNA processing and ribosome assembly. It is speculated to be required for correct assembly of rpS27 into the pre-ribosomal particle. This entry represents the C-terminal domain of RRP7.
