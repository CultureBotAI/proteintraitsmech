identifier: InterPro:IPR055432
label: "STING, ligand-binding domain"
definition: >-
  This entry represents the ligand-binding domain (LBD) of Transmembrane protein 173 which binds to c-di-GMP. Cyclic dinucleotides induce a conformational change to the STING LBD, leading to high-order oligomerization of STING that is essential for triggering the downstream signalling pathways. Transmembrane protein 173, also known as stimulator of interferon genes protein (STING), is a transmembrane adaptor protein which is involved in innate immune signalling processes. It induces expression of type I interferons (IFN-alpha and IFN-beta) via the NF-kappa-B and IRF3, pathways in response to non-self cytosolic RNA and dsDNA. It consists of an N-terminal transmembrane (TM) and a C-terminal ligand-binding (LBD) domains.
