identifier: InterPro:IPR056559
label: "Nodulin homeobox, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of NDX, and it has a detectable partial sequence similarity to PUA domains but it is predicted to adopt a β-barrel with SH3 topology. This entry represents a group of plant proteins, including nodulin homeobox protein (NDX) from Arabidopsis. AtNDX associates with single-stranded DNA and inhibits COOLAIR transcription, which in turn modifies FLC (FLOWERING LOCUS C) expression. It is a key heterochromatin regulator that functions in pericentromeric regions to control siRNA production and non-CG methylation.
