identifier: InterPro:IPR059953
label: "AcrB ubiquitination network protein, Ig-like domain"
definition: >-
  This entry represents the Ig-like domain in Probable ubiquitination network signaling protein acrB from fungi. The acrB proteins are involved in the regulatory network that controls carbon source utilisation through processes of ubiquitination and deubiquitination. They interact with other components such as creA, creB, creC, and creD. These proteins play a role in resistance to acriflavine and are essential for normal growth on various sole carbon sources, including fructose, cellobiose, raffinose, and starch. Additionally, they affect the utilisation of certain amino acids, such as GABA and beta-alanine, as sole carbon and nitrogen sources.
