identifier: InterPro:IPR062821
label: "PGIP-inactivating effector protein, C-terminal region"
definition: >-
  This entry represents a C-terminal domain found in PINE1 (PGIP-inactivating effector protein 1) from ascomycetes. PINE1 is a secreted effector protein required for full virulence of plant pathogenic fungi. The protein directly interacts with and functionally inactivates plant polygalacturonase-inhibiting proteins (PGIPs) by enhancing dissociation of PGIPs from polygalacturonases.
