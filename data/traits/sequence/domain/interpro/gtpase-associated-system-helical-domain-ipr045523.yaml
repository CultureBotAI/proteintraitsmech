identifier: InterPro:IPR045523
label: "GTPase-associated system helical domain"
definition: >-
  This entry represents a helical domain observed in the GAP1-N1 type of GTPase-centric ternary systems, a class of NTP-dependent biological conflict systems. GASH is one component of the GTPase-activated complex in these systems, potentially involved in the sensing of invasive elements.
