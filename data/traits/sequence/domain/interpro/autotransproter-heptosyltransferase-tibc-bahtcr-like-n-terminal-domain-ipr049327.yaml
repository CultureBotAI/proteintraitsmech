identifier: InterPro:IPR049327
label: "Autotransproter heptosyltransferase TibC/BAHTCr-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of autotransproter heptosyltransferases TibC ( ) from Escherichia coli, BAHTCr from Citrobacter rodentium and similar bacterial sequences. TibC is an autotransporter adhesin heptosyltransferase (AAH) homologue that catalyses the heptosylation of the autotransporters AIDA-I/TibA and confers AIDA-I-mediated bacterial adhesion to host cells. BAHTCr glycosylates the autotransporter CARC which is involved in the colonization of the mouse host gastrointestinal tract. This domain adopts a β-barrel fold with two four-stranded sheets that pack against each other. This domain is also found in BimC, an inactive autotransporter that lacks heptosyltransferase activity.
