identifier: InterPro:IPR008638
label: "Filamentous haemagglutinin FhaB/tRNA nuclease CdiA-like, TPS domain"
definition: >-
  This entry represents a conserved TPS (two-partner secretion) transport domain found near the N terminus of a number of large, repetitive bacterial proteins, including tRNA nuclease CdiA from Escherichia coli, Filamentous hemagglutinin from Bordetella pertussis (FhaB) and Hemolysin from Proteus mirabilis (HpmA). CdiA is a toxic component of a toxin-immunity protein module, which functions as a cellular contact-dependent growth inhibition (CDI) system. CDI modules allow bacteria to communicate with and inhibit the growth of closely related neighbouring target bacteria in a contact-dependent fashion. FhaB is one of the most efficiently secreted proteins in Gram-negative bacteria. It plays a role in host-cell binding and infection. HpmA is a exotoxin that attack blood cell membranes and cause cell rupture. This domain, essential for secretion, folds into a β-helix.
