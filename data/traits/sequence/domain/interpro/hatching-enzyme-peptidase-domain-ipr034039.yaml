identifier: InterPro:IPR034039
label: "Hatching enzyme, peptidase domain"
definition: >-
  This entry represents the peptidase domain of the zinc-dependent metalloprotease hatching enzyme. Hatching enzymes are secreted by embryos to digest the egg envelope or chorion. In some teleosts, the hatching enzyme may be a system consisting of two evolutionary related metalloproteases, choriolysin H (high choriolytic enzyme, HCE; MEROPS identifier M12.007) and choriolysin L (low choriolytic enzyme, LCE; MEROPS identifier M12.006), which may have different substrate specificities and cooperatively digest the chorion. Other embryonic hatching enzymes included in this entry are from quail (MEROPS identifier M12.324), Xenopus and crayfish (MEROPS identifier M12.014). Also included in this entry is nephrosin (MEROPS identifier M12.008) from the carp whose function is unknown but has been isolated from kidney.
