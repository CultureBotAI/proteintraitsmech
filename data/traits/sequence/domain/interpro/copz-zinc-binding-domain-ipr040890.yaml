identifier: InterPro:IPR040890
label: "CopZ, zinc binding domain"
definition: >-
  This entry represents the N-terminal domain of the copper chaperone CopZ protein, which delivers Cu+ directly to the transmembrane transport sites of copper-exporting P-type ATPase A (CopA). This domain contains a mononuclear metal centre for zinc binding.
