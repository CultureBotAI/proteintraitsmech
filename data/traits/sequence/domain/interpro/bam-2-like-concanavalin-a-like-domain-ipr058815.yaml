identifier: InterPro:IPR058815
label: "BAM-2-like, concanavalin A-like domain"
definition: >-
  This entry represents a concanavalin A-like domain widely distributed in proteins from nematodes, including Neurexin-related protein bam-2 (BAM-2) from Caenorhabditis elegans. BAM-2 is a neurexin-related transmembrane protein that functions in the development of neural circuits. It is specifically required for proper axonal branch termination in VC motoneurons and acts as a branch termination cue. BAM-2 interacts with CASY-1/calsyntenin to promote axon-axon fasciculation in the male-specific mating circuit. Unlike canonical neurexin (NRX-1) in C. elegans, BAM-2 has been shown to bind specifically to calsyntenin, suggesting a distinct molecular mechanism for neural wiring.
