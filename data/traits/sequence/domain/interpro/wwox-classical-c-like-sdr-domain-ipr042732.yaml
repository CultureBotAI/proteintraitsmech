identifier: InterPro:IPR042732
label: "WWOX, classical (c)-like SDR domain"
definition: >-
  This entry represents the classical-like SDR domain of human WWOX and related proteins. Proteins in this entry share the glycine-rich NAD-binding motif of the classical SDRs, have a partial match to the canonical active site tetrad, but lack the typical active site Ser.
