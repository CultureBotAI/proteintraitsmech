identifier: InterPro:IPR044443
label: Large ribosomal subunit protein mL44, dsRNA binding domain, fungi
definition: >-
  Large ribosomal subunit protein mL44 (also known as MRPL3 for 54S ribosomal protein L3) is a component of the mitochondrial ribosome (mitoribosome), a dedicated translation machinery responsible for the synthesis of mitochondrial genome-encoded proteins, including at least some of the essential transmembrane subunits of the mitochondrial respiratory chain. mL44 contains a RNase III-like domain and a double-stranded RNA binding motif (DSRM). DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. This entry represents the DSRM of mL44 from fungi.
