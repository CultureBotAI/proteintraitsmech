identifier: InterPro:IPR025256
label: "TM7S3/TM198-like domain"
definition: >-
  This domain is found at the C-terminal end of human Transmembrane 7 superfamily member 3 (TM7SF3), towards the N terminus of human Transmembrane protein 198 (TM198), and in similar proteins mainly found in animal, fungi and bacteria. TM7SF3 is involved in the inhibition of cytokine-induced death of pancreatic beta cells. The protein acts as a pro-survival homeostatic factor that attenuates the development of cellular stress. TM198 promotes LRP6 phosphorylation by casein kinases and thereby plays a role in Wnt signalling.
