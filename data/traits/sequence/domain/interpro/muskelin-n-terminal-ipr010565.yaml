identifier: InterPro:IPR010565
label: "Muskelin, N-terminal"
definition: >-
  This entry represents the N-terminal region of muskelin and is found in conjunction with several repeats. Muskelin is an intracellular, kelch repeat protein that is needed in cell-spreading responses to the matrix adhesion molecule, thrombospondin-1.
