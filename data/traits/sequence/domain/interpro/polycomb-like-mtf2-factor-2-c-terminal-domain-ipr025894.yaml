identifier: InterPro:IPR025894
label: "Polycomb-like MTF2 factor 2, C-terminal domain"
definition: >-
  Mammalian Polycomb-like gene MTF2/PCL2 forms a complex with Polycomb repressive complex-2 (PRC2) and collaborates with PRC1 to achieve repression of Hox gene expression. The human MTF2 gene is expressed in three splicing variants, each of them contains the short C-terminal domain defined here.
