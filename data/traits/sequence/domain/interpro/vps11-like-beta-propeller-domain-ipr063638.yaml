label: "VPS11-like, beta-propeller domain"
definition: >-
  This is the β-propeller domain found at the N-terminal of Vacuolar protein sorting-associated protein 11 homolog (VPS11) from plants, which is involved in regulating membrane fusion at the tonoplast and the prevacuolar compartment.
