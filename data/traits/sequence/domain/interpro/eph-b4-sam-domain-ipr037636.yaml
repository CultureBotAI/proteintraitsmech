identifier: InterPro:IPR037636
label: "EPH-B4, SAM domain"
definition: >-
  The SAM domain of EPH-B4 is a potential protein-protein interaction domain. This domain is located in the cytoplasmic region of EPH-B4 receptors and appears to mediate cell-cell initiated signal transduction. EPH-B4 regulates blood vessel morphogenesis and patterning of the postnatal vascular systems. It has been implicated in human cancers.
