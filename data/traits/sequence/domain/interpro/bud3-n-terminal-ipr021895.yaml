identifier: InterPro:IPR021895
label: "Bud3, N-terminal"
definition: >-
  This domain is found in the N-terminal of the yeast Bud3 protein. Bud3 is involved in bud-site selection in budding yeasts. This domain has a conserved ENL sequence motif.
