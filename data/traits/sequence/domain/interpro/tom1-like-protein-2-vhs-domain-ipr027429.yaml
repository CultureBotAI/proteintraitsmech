identifier: InterPro:IPR027429
label: "TOM1-like protein 2, VHS domain"
definition: >-
  Target of Myb1 (TOM1)-like 2 (TOM1L2) has a probable role in protein transport. It acts as a negative regulator of growth factor-induced Src mitogenic signaling. This entry represents the N-terminal VHS (Vps27p/Hrs/Stam) domain of TOM1L2, which is found next to the GAT domain. The VHS domain has a superhelical structure similar to the structure of the ARM repeats.
