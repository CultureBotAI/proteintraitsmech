identifier: InterPro:IPR001150
label: Glycine radical domain
definition: >-
  Glycyl radical enzymes are involved in a great variety of functions, including nucleotide, pyruvate and toluene metabolism. A glycyl radical is formed by the removal of a hydrogen from a glycine and the resulting radical is located on the protein main chain. Escherichia coli formate C-acetyltransferase ( ) is a key enzyme of anaerobic glucose metabolism; it converts pyruvate and CoA into acetyl-CoA and pyruvate. It is posttranslationally interconverted, under anaerobic conditions, from an inactive to an active form that carries a stable radical localised to a specific glycine at the C terminus. Such a glycine radical is also present in E. coli (gene nrdD) and Bacteriophage T4 (gene nrdD or sunY) anaerobic ribonucleoside-triphosphate reductases ( ). In these enzymes the glycyl radical is located at the C-terminal part of the enzyme. An autonomous glycyl radical cofactor also exists in Escherichia coli and bacteriophage T4 (gene grcA). This entry represents a domain covering the conserved region around the glycine radical.
