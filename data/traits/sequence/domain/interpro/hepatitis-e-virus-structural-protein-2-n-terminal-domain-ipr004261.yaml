identifier: InterPro:IPR004261
label: Hepatitis E virus structural protein 2, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of structural protein 2 of the hepatitis E virus. The high basic amino acid content of this protein has lead to the suggestion of a role in viral genomic RNA encapsidation. The Hepatitis E virus (HEV) structural protein 2 (also known as ORF2) is a major viral capsid protein that encapsidates the viral genome. It has been shown to bind to the 5' end of the genomic RNA. Interestingly, ORF2 has an secreted isoform that inhibits antibody-mediated neutralization from the host.
