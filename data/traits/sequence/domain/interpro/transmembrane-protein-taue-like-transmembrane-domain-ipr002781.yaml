identifier: InterPro:IPR002781
label: Transmembrane protein TauE-like, transmembrane domain
definition: >-
  This entry includes integral membrane proteins containing transmembrane helices. This entry used to be known as DUF81. The TauE proteins are involved in the transport of anions across the cytoplasmic membrane during taurine metabolism as an exporter of sulfoacetate.
