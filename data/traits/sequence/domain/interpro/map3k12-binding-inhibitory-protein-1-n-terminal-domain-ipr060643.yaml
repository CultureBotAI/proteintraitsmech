identifier: InterPro:IPR060643
label: "MAP3K12-binding inhibitory protein 1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of MAP3K12-binding inhibitory protein 1 (MBIP) and similar proteins from vertebrates. MBIP inhibits MAP3K12 activity and thereby prevents activation of the JNK/SAPK pathway. It is a component of the ATAC complex, which has histone acetyltransferase activity on histones H3 and H4. The ATAC complex comprises KAT14, KAT2A, TADA2L, TADA3L, ZZ3, MBIP, WDR5, YEATS2, CCDC101 and DR1. MBIP localises to the nucleus and cytoplasm. The specific function of this domain remains to be determined.
