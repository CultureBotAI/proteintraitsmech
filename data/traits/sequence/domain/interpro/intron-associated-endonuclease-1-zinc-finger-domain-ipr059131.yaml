identifier: InterPro:IPR059131
label: "Intron-associated endonuclease 1, zinc finger domain"
definition: >-
  This entry represent the unusual zinc finger domain present in the -ntron-associated endonuclease 1 (I-TevI), which comprises the unusual sequence CXCX10CXXC. The Zn finger interacts with the DNA through two hydrogen bonds, between the main chain nitrogen atoms of residues Tyr162 and Ser165. I-TevI is a site-specific endonuclease that belongs to the GIY-YIG family that shows a catalytic domain and a DNA-binding domain, which is organised into three DNA recognition subdomains: a Zn finger (this entry), an elongated subdomain that includes a minor groove-binding α-helix and a helix-turn-helix subdomain.
