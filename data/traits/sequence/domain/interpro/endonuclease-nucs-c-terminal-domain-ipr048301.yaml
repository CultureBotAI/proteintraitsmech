identifier: InterPro:IPR048301
label: Endonuclease NucS, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of endonuclease NucS, which adopts an α/β structure with a five-stranded central β-sheet and four flanking α-helices, representing a minimal-endonuclease fold. This domain contains an active site with a sequence motif conserved in the family of RecB-like nucleases. NucS cleaves both 3' and 5' ssDNA extremities of branched DNA structures and it binds to ssDNA.
