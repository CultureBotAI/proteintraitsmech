identifier: InterPro:IPR048731
label: "DNA polymerase III subunit delta', AAA+ ATPase lid domain, gammaproteobacteria"
definition: >-
  DNA polymerase III subunit delta' is part of the beta sliding clamp loading complex, which hydrolyses ATP to load the beta clamp onto primed DNA to form the DNA replication pre-initiation complex. It consists of three domains, of which the N-terminal domain contains a nonfunctional nucleotide binding site. This entry represents the lid domain (or domain 2 in).
