identifier: InterPro:IPR015789
label: "Twist-related, basic helix-loop-helix domain"
definition: >-
  The bHLH (basic Helix-Loop-Helix) proteins contain the bHLH domain that is approximately 60 amino acids long and consists of a DNA-binding basic region followed by two α-helices separated by a variable loop region (HLH). The HLH domain promotes dimerisation, allowing the formation of homo- or heterodimeric complexes between different family members. Many bHLH proteins have been shown to act as transcriptional regulators. Twist was first identified in Drosophila melanogaster as a gene crucial for proper gastrulation and mesoderm formation. Twist is a basic helix-loop-helix transcription factor that acts in a signalling cascade that initiates mesoderm development during gastrulation when it is involved in regulating the process of epithelial-mesenchymal transition (EMT). This entry represents the basic helix-loop-helix (bHLH) domain found in Twist and related proteins mainly from invertebrates.
