identifier: InterPro:IPR028754
label: Serine/threonine-protein kinase PAK5, catalytic domain
definition: >-
  Serine/threonine-protein kinase PAK 5 (PAK5, also known as PAK7) belongs to the mammalian p21-activated kinase (PAK) family of serine/threonine kinases that plays a role in a variety of different signaling pathways including cytoskeleton regulation, cell migration, proliferation or cell survival.
