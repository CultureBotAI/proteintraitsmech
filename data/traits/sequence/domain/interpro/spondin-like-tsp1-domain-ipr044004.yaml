identifier: InterPro:IPR044004
label: "Spondin-like TSP1 domain"
definition: >-
  This entry represents a sub-type of TSP1 domain that have an alternative disulphide binding pattern compared to the canonical TSP1 domain. This domain is found in Spondin and related proteins.
