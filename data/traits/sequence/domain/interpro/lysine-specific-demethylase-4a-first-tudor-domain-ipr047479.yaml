identifier: InterPro:IPR047479
label: "Lysine-specific demethylase 4A, first Tudor domain"
definition: >-
  This entry represents the first tudor domain of KDM4A, which is a methyl-lysine reader domain. Lysine-specific demethylase 4A (KDM4A), also known as JMJD2A or JmjC domain-containing histone demethylation protein 3A (JHDM3A), catalyses the demethylation of di- and trimethylated histone H3, specifically at 'Lys-9' and 'Lys-36' positions (H3K9 and H3K36). It is involved in carcinogenesis and functions as a transcription regulator that may either stimulate or repress gene transcription. It associates with nuclear receptor corepressor complex or histone deacetylases. Moreover, JMJD2A forms complexes with both the androgen and estrogen receptor (ER), and plays an essential role in growth of both ER-positive and -negative breast tumours. It is also involved in prostate, colon, and lung cancer progression. JMJD2A contains jmjN and jmjC domains in the N-terminal region, followed by a canonical plant homeodomain (PHD) domain, a noncanonical extended PHD domain, and tandem Tudor domains.
