identifier: InterPro:IPR048351
label: "SOSEKI, DIX-like domain"
definition: >-
  This entry represents the DIX-like domain found in a group of plant proteins, including protein SOSEKI1-5 from Arabidopsis thaliana and Physcomitrium patens. SOK1-5 integrate apical-basal and radial organismal axes to localise to polar cell edges and contain a DIX oligomerization domain that resembles that in the animal Dishevelled polarity regulator.
