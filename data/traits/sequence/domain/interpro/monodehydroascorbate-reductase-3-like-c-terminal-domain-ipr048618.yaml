identifier: InterPro:IPR048618
label: "Monodehydroascorbate reductase 3-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of Monodehydroascorbate reductase 3 (MDHAR3) from Oryza sativa and similar plant sequences. MDHAR3 transfers an electron directly to its substrate, monodehydroascorbate (MDHA), which binds to its active site pocket. It consists of three domains: an NAD(P)-binding domain, an FAD-binding domain, and a C-terminal domain (this entry). This domain shows an α-β structure.
