identifier: InterPro:IPR063214
label: "Uncharacterized protein pXO2-05/BXB0004/GBAA_pXO2_0004, Ig-like domain"
definition: >-
  This entry represents an Ig-like domain found in uncharacterised proteins of Gram-positive bacteria, including Uncharacterized protein pXO2-05/BXB0004/GBAA_pXO2_0004 from Bacillus anthracis. The proteins containing this domain are predicted to be cell membrane-associated. The function of this domain remains to be determined.
