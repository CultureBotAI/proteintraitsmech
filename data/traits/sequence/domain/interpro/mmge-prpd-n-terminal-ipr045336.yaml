identifier: InterPro:IPR045336
label: "MmgE/PrpD, N-terminal"
definition: >-
  This entry represents the N-terminal domain of 2-methylcitrate dehydratase PrpD. PrpD is required for propionate catabolism, catalysing the third step of the 2-methylcitric acid cycle. This enzyme consists of two domains: a large domain with an all-helical fold and a smaller domain that folds into an α/β domain. Cis-aconitic acid decarboxylase (CAD) shares high identity with proteins of the MmgE/PrpD family. CAD is essential for itaconic acid production in Aspergillus terreus. Citrate/2-methylcitrate dehydratase from Bacillus subtilis is involved in the tricarboxylic acid (TCA) and methylcitric acid cycles as it has both 2-methylcitrate dehydratase and citrate dehydratase activities.
