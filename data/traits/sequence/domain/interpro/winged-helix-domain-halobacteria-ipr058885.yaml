identifier: InterPro:IPR058885
label: "Winged helix domain, halobacteria"
definition: >-
  This entry represents a winged helix domain (WHD) found in a family of uncharacterised proteins in halobacteria. The domain is typically found in proteins ranging from approximately 580 to 660 amino acids in length. These domains are found C-terminal to a P-loop domain found in these proteins.
