identifier: InterPro:IPR056560
label: "Nodulin homeobox, homeobox-like domain"
definition: >-
  This domain is found towards the C-terminal of NDX. It has a detectable sequence similarity to known homeobox domains, and it is predicted to adopt similar structure. This entry represents a group of plant proteins, including nodulin homeobox protein (NDX) from Arabidopsis. AtNDX associates with single-stranded DNA and inhibits COOLAIR transcription, which in turn modifies FLC (FLOWERING LOCUS C) expression. It is a key heterochromatin regulator that functions in pericentromeric regions to control siRNA production and non-CG methylation.
