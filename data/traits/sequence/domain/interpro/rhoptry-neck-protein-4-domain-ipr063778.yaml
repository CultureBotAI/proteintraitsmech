identifier: InterPro:IPR063778
label: "Rhoptry neck protein 4 domain"
definition: >-
  This entry represents a domain found in the Rhoptry neck protein 4 found in Toxoplasma gondii. This protein is located prominently at the junction of the body and neck portion of the rhoptry organelle in tachyzoites and bradyzoites. Upon infection, it associates with the parasitophorous vacuolar membrane.
