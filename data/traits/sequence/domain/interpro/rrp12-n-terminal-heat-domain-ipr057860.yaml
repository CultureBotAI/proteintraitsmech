identifier: InterPro:IPR057860
label: "RRP12, N-terminal HEAT domain"
definition: >-
  This entry represents the N-terminal region of human RRP12-like protein, which consists of HEAT repeats. This domain is often found associated with . Ribosomal RNA-processing protein 12 (RRP12) proteins are members of pre-ribosome-associated HEAT repeats-containing proteins. They are involved in the maturation and nuclear export of both pre-40S and pre-60S ribosomal subunits. They are required for the processing of RNA components within pre-ribosomes, which is a critical step in the assembly of functional ribosomes. They are associated with the late maturation of the 18S and 5.8S rRNA of the pre-40S ribosomes and for maturation of the 25S and 5.8S rRNA of the pre-60S ribosomes.
