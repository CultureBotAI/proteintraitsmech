identifier: InterPro:IPR031662
label: "GTP binding protein, second domain"
definition: >-
  This entry represents a domain located C-terminal to in a group of GTP binding proteins. In Ribosome-interacting GTPase 1 from Saccharomyces cerevisiae (Rgb1) this entry represents a region of the G domain that contains the G3 and G4 motifs and folds as an independent domain emerging from the G domain, with an α/β configuration. It is essential for the full activity of the proteiin.
