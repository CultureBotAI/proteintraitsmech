identifier: InterPro:IPR056745
label: "TYW2, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of tRNA wybutosine-synthesizing protein 2 homolog (TWY2) and similar sequences from vertebrates. TWY2 is a SAM-dependent transferase that acts as a component of the wybutosine biosynthesis pathway. This domain may consist of three β-sheets and two α-helices.
