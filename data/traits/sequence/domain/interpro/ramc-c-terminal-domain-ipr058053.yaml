identifier: InterPro:IPR058053
label: "RamC, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of RamC and similar proteins mainly found in actinomycetes. Probable SapB synthase from Streptomyces coelicolor (RamC) is required for aerial hyphae formation. It is probably involved in processing the precursor of SapB to its mature form. It shows an α-β configuration. This protein is part of the LanC-like protein superfamily represented by .
