identifier: InterPro:IPR056541
label: "Nucleoporin POM152, Ig-like domain"
definition: >-
  This entry includes the third and sixth Ig-like domains found in Nucleoporin POM152 from yeast, a component of the nuclear pore complex (NPC). POM152 functions as a component of the nuclear pore complex (NPC). This protein consists of an N-terminal transmembrane domain (TMD) and an extended C-terminal domain (CTD) with tandem repeats of Ig-like domains.
