identifier: InterPro:IPR055439
label: "EML-like, first beta-propeller domain"
definition: >-
  This entry represents the first β-propeller domain of echinoderm microtubule-associated protein (EMAP)-like (EML) proteins. This model completes the first β-propeller of the TAPE pair in EMLs. In some members, such as EML5 and EML6, there are three TAPE pairs. This entry also includes Cilia- and flagella-associated protein 44, EMAP and Ciliary WD repeat-containing protein ctxp80. EML proteins contribute to the formation of the mitotic spindle and interphase microtubule network. In these proteins, the β-propellers are intimately associated as a pair, which was defined as a tandem atypical propeller in EMLs (TAPE) domain. There is a hydrophobic core between the propellers, which corresponds to the HELP motif that contributes blades 1 and 14 buried at the interface and joins them.
