identifier: InterPro:IPR063389
label: "Ponticulin, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of ponticulin proteins found in Dictyostelium discoideum (social amoeba). Ponticulins are glycosylphosphatidylinositol (GPI)-anchored membrane proteins that bind F-actin and nucleate actin assembly. While the full-length ponticulin proteins are localised to the plasma membrane via GPI-like anchors, the specific function of this N-terminal domain remains to be determined.
