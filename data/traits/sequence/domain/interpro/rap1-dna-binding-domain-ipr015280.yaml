identifier: InterPro:IPR015280
label: Rap1, DNA-binding domain
definition: >-
  Members of this entry, which are predominantly found in the yeast protein Rap1, assume a secondary structure consisting of a three-helix bundle and an N-terminal arm. They contain an Arg-Asp-Arg-Lys sequence that interacts with an ACAregion in the 3, region of the DNA-binding site.
