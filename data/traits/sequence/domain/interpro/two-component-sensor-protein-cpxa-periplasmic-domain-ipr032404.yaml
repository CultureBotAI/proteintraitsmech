identifier: InterPro:IPR032404
label: "Two-component sensor protein CpxA, periplasmic domain"
definition: >-
  This entry represents the periplasmic domain (also known as the VpCpxA-peri domain) of CpxA from Vibrio parahaemolyticus, Klebsiella pneumoniae, and similar proteins from gammaproteobacteria. The VpCpxA-peri domain possesses a PAS fold that play a role in sensing envelope stress signals. It recognises KCl and RbCl. The Cpx system is one of extracytoplasmic stress response systems (ESR) found in Gram-negative bacteria. ESRs are operated by a two-component signalling system which consists of a sensory histidine kinase (HK) and a response regulator (RR) as basal elements. In the Cpx system, CpxA is the inner membrane-spanning, sensory HK.
