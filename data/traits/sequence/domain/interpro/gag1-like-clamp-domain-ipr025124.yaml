identifier: InterPro:IPR025124
label: "Gag1-like, clamp domain"
definition: >-
  This entry represents a domain found in a group of sequences from fungi and plants, including Gag1 from Saccharomyces cerevisiae (YLR407W), which interacts with Cka2, the fourth subunit of the eukaryotic kinase CK2. Gag1 is organised into three domains: lock, Gag and Clap (this entry). This domain, previously known as DUF4050, has three regions: rear, hinge and front. It contains two conserved sequence motifs: IPL and FLVD.
