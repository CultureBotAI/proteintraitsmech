identifier: InterPro:IPR031778
label: "Sortilin, N-terminal"
definition: >-
  Sortilin, also known in mammals as neurotensin receptor-3, is the archetypical member of the vacuolar protein sorting 10 protein domain (Vps10-D) receptor family that binds neurotrophic factors and neuropeptides. This entry represents a domain that constitutes the entire luminal part of Sortilin and is activated in the trans-Golgi network by enzymatic propeptide cleavage. The structure of the domain has been determined as a ten-bladed propeller, with up to 9 BNR or β-hairpin turns in it. The mature receptor binds various ligands, including its own propeptide (Sort-pro), neurotensin, the pro-forms of nerve growth factor-beta (NGF)-6 and brain-derived neurotrophic factor (BDNF)-7, lipoprotein lipase (LpL), apo lipoprotein AV14 and the receptor-associated protein (RAP)1.
