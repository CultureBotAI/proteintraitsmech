identifier: InterPro:IPR056736
label: "Sucrose synthase, EPBD domain"
definition: >-
  This entry represents the EPBD domain (ENOD40 peptide binding domain, also referred to as SSN2) of sucrose synthases, which corresponds to the second domain and together with the N-terminal one ( ), referred to as the cellular targeting domain (CTD) have regulatory functions in plant species, however, the function of these domains in bacteria is not yet clear. Sucrose synthases are sucrose-cleaving enzymes that provides UDP-glucose and fructose for various metabolic pathways. Members of this group are found in plants and cyanobacteria.
