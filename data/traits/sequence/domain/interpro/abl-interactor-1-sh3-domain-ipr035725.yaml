identifier: InterPro:IPR035725
label: "Abl Interactor 1, SH3 domain"
definition: >-
  Abi1, also called e3B1, is a central regulator of actin cytoskeletal reorganization through interactions with many protein complexes. It is part of WAVE, a nucleation-promoting factor complex, that links Rac 1 activation to actin polymerization causing lamellipodia protrusion at the plasma membrane. Abi1 is a target of alpha4 integrin, regulating membrane protrusions at sites of integrin engagement. Abi proteins are adaptor proteins serving as binding partners and substrates of Abl tyrosine kinases. They are involved in regulating actin cytoskeletal reorganization and play important roles in membrane-ruffling, endocytosis, cell motility, and cell migration. Abi proteins contain a homeobox homology domain, a proline-rich region, and a SH3 domain. This entry represents the SH3 domain of Abi1.
