identifier: InterPro:IPR054403
label: "RNA-dependent RNA polymerase, palm domain, ribovirus"
definition: >-
  This entry represents predicted palm domain of RdRp from viruses. The replicase has a non-canonical arrangement in the palm sub-domain of the RNA-dependent RNA polymerase (RdRP), with a sequence permutation where the active site is anchored that is also found in Birnaviridae.
