identifier: InterPro:IPR048854
label: "p55, C-terminal domain"
definition: >-
  This entry corresponds to the C-terminal domain of the p55 protein of emaraviruses (plant-infecting bunyaviruses), a highly conserved domain found in all p55 proteins. The function of these proteins is unknown, but in Rose rosette virus, p55 proteins were dispensable for transcription of a minireplicon [ , , https://doi.org/10.3390/f13111868]. Structure prediction using AlphaFold colab tool, suggests that this domain may have three α-helices.
