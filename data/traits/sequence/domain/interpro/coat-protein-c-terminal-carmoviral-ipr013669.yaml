identifier: InterPro:IPR013669
label: "Coat protein, C-terminal, Carmoviral"
definition: >-
  This domain is found to the C terminus of the domain in Carmoviruses. The coat protein of the Turnip crinkle virus (TCV; Tombusviridae) is a suppressor of RNA silencing and is required for cell to cell movement in its host. The plant cellular trafficking machinery could hijack functional viral proteins to permit cell-to-cell movement of RNA silencing. The 3'-proximal coat protein is coded by ORF4.
