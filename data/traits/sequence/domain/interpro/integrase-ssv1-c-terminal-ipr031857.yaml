identifier: InterPro:IPR031857
label: "Integrase SSV1, C-terminal"
definition: >-
  This entry represent the C-terminal catalytic domain of an integrase, SSV1, from Sulfolobus shibatae. This domain is capable of DNA cleavage and ligation, but at efficiencies significantly lower than those of the full-length protein.
