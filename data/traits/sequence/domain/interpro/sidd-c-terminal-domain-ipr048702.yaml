identifier: InterPro:IPR048702
label: "SidD, C-terminal domain"
definition: >-
  SidD from Legionella pneumophila is a virulence effector that plays a role in hijacking the host vesicular trafficking by recruiting the small guanosine triphosphatase (GTPase) Rab1 to the cytosolic face of the Legionella-containing vacuole (LCVs). This entry represents the C-terminal α-helical domain, which targets SidD to the Golgi and critical for membrane localisation within host cells. A two-helix bundle at the very C terminus determines SidD specificity.
