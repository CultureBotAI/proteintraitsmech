identifier: InterPro:IPR056994
label: "Activating signal cointegrator 1, N-terminal"
definition: >-
  This entry represents a presumed domain found at the N-terminal of Activating signal cointegrator 1 (TRIP4, also known as ASC-1) from human and related animal sequences. The function of this domain is unknown. According to structure predictions, this domain may adopt a four helical bundle fold. TRIP4 is the orthologue of yeast RQT4 and is part of the RQC trigger (RQT) complex that activates the ribosome quality control (RQC) pathway, a pathway that degrades nascent peptide chains during problematic translation. TRIP4 has also been described as a transcription coactivator which associates with nuclear receptors and transcriptional coactivators including EP300, CREBBP and NCOA1, and basal transcription factors like TBP and TFIIA to facilitate nuclear receptors-mediated transcription.
