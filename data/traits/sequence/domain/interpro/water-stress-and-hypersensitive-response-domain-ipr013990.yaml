identifier: InterPro:IPR013990
label: Water stress and hypersensitive response domain
definition: >-
  Water Stress and Hypersensitive response (WHy) domain is a region of unknown function found in several plant proteins involved in either the response to water stress or the response to bacterial infection. It is also found in some bacterial and archaeal proteins whose functions are not currently known. This domain is approximately 100 amino acids long and is composed of alternating hydrophobic and hydrophilic residues, with an almost invariant NPN motif at the N terminus. The predicted secondary structure is a novel fold consisting mostly of β strands and a C-terminal α helix.
