identifier: InterPro:IPR059513
label: "XisA/XisC, N-terminal domain"
definition: >-
  This entry represents an N-terminal domain found in XisA/XisC excisase proteins from cyanobacteria, particularly within the order Nostocales. These site-specific recombinases are essential for DNA excision during heterocyst differentiation in nitrogen-fixing cyanobacteria. XisA is necessary for excision of the nifD element, whilst XisC is required for excision of the hupL element. The proteins contain a C-terminal tyrosine recombinase domain with multiple active sites, whilst this N-terminal domain precedes the catalytic region. These excisases enable programmed DNA rearrangements that are crucial for heterocyst development and nitrogen fixation. The function of this domain remains to be determined.
