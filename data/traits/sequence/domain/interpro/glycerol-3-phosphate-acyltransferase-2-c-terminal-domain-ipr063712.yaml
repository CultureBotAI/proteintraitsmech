identifier: InterPro:IPR063712
label: "Glycerol-3-phosphate acyltransferase 2, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of glycerol-3-phosphate O-acyltransferases (GPATs) found in fungi and apicomplexa. In Saccharomyces cerevisiae, GPATs SCT1 and GPT2 catalyse the first step in glycerophospholipid and triacylglycerol biosynthesis. These enzymes localise to the endoplasmic reticulum membrane. In GPT2, the C-terminal region contains regulatory phosphorylation sites that control enzyme activity and triacylglycerol metabolism. The specific function of this C-terminal domain remains to be determined.
