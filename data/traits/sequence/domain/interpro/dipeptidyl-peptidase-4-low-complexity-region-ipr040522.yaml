identifier: InterPro:IPR040522
label: "Dipeptidyl peptidase 4, low complexity region"
definition: >-
  Dipeptidyl peptidase IV includes a helical region, the N-terminal domain and the catalytic domain. This entry represents a sequence that can be repeated in the low complexity region between the helical N terminus and the N-terminal domain.
