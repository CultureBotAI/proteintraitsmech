identifier: InterPro:IPR057926
label: "QRICH1-like domain"
definition: >-
  This domain is found in human Transcriptional regulator QRICH1 and similar proteins, mainly found in animals, including ZMYM2/3/4. This domain is predicted to adopt a mainly α-structure. QRICH1 acts as a mediator of the integrated stress response through transcriptional control of protein homeostasis under conditions of ER stress. Zinc finger MYM-type proteins 2, 3, and 4 (ZMYM2, ZMYM3, ZMYM4) are nuclear proteins involved in chromatin regulation, transcriptional repression, and DNA repair. ZMYM2 participates in retrotransposon silencing and DNA double-strand break repair by interacting with chromatin-modifying complexes and DNA-PK, and is targeted for degradation by cereblon-modulating drugs. ZMYM3 functions as a scaffold protein in gene silencing and DNA repair, facilitating BRCA1 recruitment to damaged chromatin through H2AX binding. ZMYM4 interacts with the transcription factor B-MYB, undergoes SUMOylation, and is essential for early cranial gene expression and craniofacial development. These proteins collectively highlight the importance of MYM-type zinc finger proteins in genome maintenance and developmental processes.
