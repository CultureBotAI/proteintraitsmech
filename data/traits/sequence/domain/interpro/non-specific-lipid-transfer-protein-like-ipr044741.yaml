identifier: InterPro:IPR044741
label: "Non-specific lipid-transfer protein-like"
definition: >-
  This domain is present in a subgroup of non-specific lipid-transfer proteins (nsLTPs), including MtN5 from Medicago truncatula, FIL1 from Antirrhinum majus, LIM3 from Lilium longiflorum and DIR1 from Arabidopsis. MtN5 is involved in root nodule development and is required for successful rhizobial symbiosis. FIL1 may be important in petal and stamen formation. The LIM3 gene is induced during the early prophase stage of meiosis in lily microsporocytes. DIR1 is required for systemic acquired resistance (SAR) long distance signalling.
