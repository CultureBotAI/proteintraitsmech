identifier: InterPro:IPR040828
label: "REase associating with pPIWI, RE domain"
definition: >-
  This entry represents the restriction endonuclease (REase) domain found in a conserved three-gene island that also contains a DinG-type helicase and the pPIWI_RE module. This three gene island is predicted to form a conflict system which targets R-loop formation of invasive plasmids during plasmid replication.
