identifier: InterPro:IPR054510
label: "Tm0771-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Tm0771 from Thermotoga maritima, a DNA polymerase III, gamma subunit-related protein. This domain consists of a five α-helix bundle. Members of this entry are specific to Thermotogales.
