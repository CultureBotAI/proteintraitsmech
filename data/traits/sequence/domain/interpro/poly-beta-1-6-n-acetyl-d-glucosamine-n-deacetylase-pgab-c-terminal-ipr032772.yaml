label: "Poly-beta-1,6-N-acetyl-D-glucosamine N-deacetylase PgaB, C-terminal"
definition: >-
  This entry represents the C-terminal domain of PgaB, a polysaccharide de-N-acetylase involved in biofilm formation. PgaB contains an N-terminal domain that has deacetylase activity.
