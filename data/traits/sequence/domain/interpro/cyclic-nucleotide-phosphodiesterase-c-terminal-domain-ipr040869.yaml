identifier: InterPro:IPR040869
label: "Cyclic nucleotide phosphodiesterase, C-terminal domain"
definition: >-
  This is the C-temrinal domain found in Listeria monocytogenes, Lmo2642 cyclic nucleotide phosphodiesterase. The auxiliary C-terminal domain, consists of five α-helices forming a long helical bundle, and is connected to the catalytic domain ( ) by two loop segments. It is suggested that this auxiliary domain of Lmo2642 might confer functional specificity to the protein through the interactions with unknown factors or involving the substrate recognition.
