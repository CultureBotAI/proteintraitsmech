identifier: InterPro:IPR060430
label: "VOPP1 domain"
definition: >-
  This entry represents a domain found in VOPP1 (WW domain binding protein VOPP1), also known as ECOP (EGFR-coamplified and overexpressed protein). It is adjacent. VOPP1 is a single-pass type I membrane protein that localises to cytoplasmic vesicle membranes, late endosomes and lysosomes. It increases the transcriptional activity of NFKB1 and interacts with WWOX via WW domains. The domain is conserved within the VOPP1/ECOP family across vertebrates.
