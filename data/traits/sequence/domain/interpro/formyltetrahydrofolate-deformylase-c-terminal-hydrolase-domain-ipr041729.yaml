identifier: InterPro:IPR041729
label: Formyltetrahydrofolate deformylase, C-terminal hydrolase domain
definition: >-
  Formyl-FH4 Hydrolase catalyzes the hydrolysis of 10-formyltetrahydrofolate (formyl-FH4) to FH4 and formate. Formate is the substrate of phosphoribosylglycinamide transformylase for step three of de novo purine nucleotide synthesis. Formyl-FH4 hydrolase has been proposed to regulate the balance of FH4 and C1-FH4 in the cell. The enzyme uses methionine and glycine to sense the pools of C1-FH4 and FH4, respectively.
