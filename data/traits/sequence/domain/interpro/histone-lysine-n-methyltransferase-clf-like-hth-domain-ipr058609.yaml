identifier: InterPro:IPR058609
label: "Histone-lysine N-methyltransferase CLF-like, HTH domain"
definition: >-
  This domain is found towards the N-terminal end of Histone-lysine N-methyltransferase CLF from Arabidopsis thaliana and similar proteins found in plants. CLF is the catalytic subunit of some polycomb group protein complexes, which methylates 'Lys-27' of histone H3, leading to transcriptional repression of the affected target genes. Together with ATX1, it modulates the flower homeotic AG nucleosome methylation statement. This domain is predicted to adopt an helix-turn-helix (HTH) configuration.
