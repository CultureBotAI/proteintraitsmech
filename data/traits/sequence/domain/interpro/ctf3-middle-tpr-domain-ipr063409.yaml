identifier: InterPro:IPR063409
label: "CTF3, middle TPR domain"
definition: >-
  This entry represents the middle tetratricopeptide repeat (TPR) domain found in the CTF3 (CENP-I) protein. CTF3 is a component of the constitutive centromere-associated network (CCAN), which forms the inner kinetochore platform for outer kinetochore assembly. The protein forms a heterotrimeric complex with MCM16 and MCM22. The full-length CTF3 protein is required for establishing bipolar spindle-microtubule attachments and proper chromosome segregation. CTF3 contains an N-terminal HEAT repeat domain and this middle TPR domain region. This family is found in fungi, particularly within the Saccharomycetaceae.
