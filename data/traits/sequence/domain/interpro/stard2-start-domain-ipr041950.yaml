identifier: InterPro:IPR041950
label: "STARD2, START domain"
definition: >-
  This entry represents the steroidogenic acute regulatory protein (StAR)-related lipid transfer (START) domain of STARD2 (also known as phosphatidylcholine transfer protein/PC-TP) and related proteins. STARD2 is a cytosolic phosphatidycholine (PtdCho) transfer protein, which traffics PtdCho, the most common class of phospholipids in eukaryotes, between membranes. It represents a minimal START domain structure. STARD2 plays roles in hepatic cholesterol metabolism, in the development of atherosclerosis, and may have a mitochondrial function.
