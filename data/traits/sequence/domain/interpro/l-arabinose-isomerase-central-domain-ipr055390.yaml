identifier: InterPro:IPR055390
label: "L-arabinose isomerase, central domain"
definition: >-
  This entry represents a domain found central in L-arabinose isomerases, AraA. The domain represented by this entry is composed of a central parallel β-sheet packed with α-helices on both sides and with topology similar to the topology of the N-terminal domain. This entry includes L-arabinose isomerases, AraA, ( ). These enzymes catalyse the reaction: L-arabinose => L-ribulose. This reaction is the first step in the pathway of L-arabinose utilisation as a carbon source after entering the cell L-arabinose is converted into L-ribulose by the L-arabinose isomerases enzyme.
