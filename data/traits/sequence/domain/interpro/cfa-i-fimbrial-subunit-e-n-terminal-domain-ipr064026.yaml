identifier: InterPro:IPR064026
label: "CFA/I fimbrial subunit E, N-terminal domain"
definition: >-
  This domain is found in a family consisting of several minor pilin proteins including CfaE. CfaE is the minor, tip-localized adhesive subunit of colonisation factor antigen I fimbriae (CFA/I) of enterotoxigenic Escherichia coli and is thought to be essential for the attachment of enterotoxigenic E. coli to the human small intestine early in diarrhea pathogenesis. CfaE contains two homologous domains with Ig-like topology. This entry represents the first of these domains.
