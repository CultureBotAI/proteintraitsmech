identifier: InterPro:IPR035551
label: "Boi1/2, SH3 domain"
definition: >-
  This entry represents the N-terminal SH3 domain found in the Saccharomyces cerevisiae proteins Boi1 and Boi2 (BEM1-interacting protein 1/2) and similar fungal proteins. Besides the N-terminal SH3 domain, they contain a Sterile alpha motif (SAM, ), and a Pleckstrin homology (PH) domain at the C terminus. Boi1 and Boi2 interact with the SH3 domain of Bem1, a protein involved in bud formation. They promote polarized cell growth and participates in the NoCut signalling pathway, which is involved in the control of cytokinesis, and promote the fusion of secretory vesicles with the plasma membrane at sites of polarized growth.
