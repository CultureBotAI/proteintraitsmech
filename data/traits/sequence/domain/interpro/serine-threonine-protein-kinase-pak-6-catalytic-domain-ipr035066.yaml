identifier: InterPro:IPR035066
label: "Serine/threonine-protein kinase PAK 6, catalytic domain"
definition: >-
  PAK6 may play a role in stress responses through its activation by the mitogen-activated protein kinase (MAPK) p38 and MAPK kinase 6 (MKK6) pathway. PAK6 is highly expressed in the brain. It is not required for viability, but together with PAK5, it is required for normal levels of locomotion and activity, and for learning and memory. Increased expression of PAK6 is found in primary and metastatic prostate cancer. PAK6 belongs to the group II PAKs, which contain a PBD (p21-binding domain) and a C-terminal catalytic domain, but do not harbor an AID (autoinhibitory domain) or SH3 binding sites. PAKs are Rho family GTPase-regulated kinases that serve as important mediators in the function of Cdc42 (cell division cycle 42) and Rac. This entry represents the C-terminal catalytic domain of PAK6.
