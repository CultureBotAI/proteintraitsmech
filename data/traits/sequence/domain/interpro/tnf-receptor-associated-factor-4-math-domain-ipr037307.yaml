identifier: InterPro:IPR037307
label: TNF receptor-associated factor 4, MATH domain
definition: >-
  TNF receptor-associated factor 4 (TRAF4) is an adapter protein and signal transducer that links members of the tumor necrosis factor receptor (TNFR) family to different signaling pathways. TRAF4 plays a role in the activation of NF-kappa-B and JNK, and in the regulation of cell survival and apoptosis. It regulates activation of NF-kappa-B in response to signaling through Toll-like receptors. TRAF4 modulates TRAF6 functions. In mouse, it has been shown to be required for normal skeleton development, and for normal development of the respiratory tract. TRAF4 contains a RING finger domain, seven zinc finger domains, and a TRAF domain. The TRAF domain can be divided into a more divergent N-terminal α helical region (TRAF-N), and a highly conserved C-terminal MATH subdomain (TRAF-C) with an eight-stranded β-sandwich structure. TRAF-N mediates trimerization while TRAF-C interacts with receptors.
