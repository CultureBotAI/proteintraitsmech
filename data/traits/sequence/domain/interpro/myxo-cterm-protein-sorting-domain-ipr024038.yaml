label: "MYXO-CTERM protein-sorting domain"
definition: >-
  This entry describes MYXO-CTERM, a C-terminal putative protein sorting domain, analogous to LPXTG and PEP-CTERM. It is largely restricted to the Myxococcota, a division of the Deltaproteobacteria.
