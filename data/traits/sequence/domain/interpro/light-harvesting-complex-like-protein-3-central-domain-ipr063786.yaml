identifier: InterPro:IPR063786
label: "Light-harvesting complex-like protein 3, central domain"
definition: >-
  This entry represents a domain found in the central region of light-harvesting complex-like protein 3 (LIL3) family members. This domain is found in land plants. LIL3 proteins are chloroplast thylakoid membrane proteins that are required for biosynthesis of phytylated chlorophylls and alpha-tocopherol. They function by anchoring geranylgeranyl reductase (GGR) in the thylakoid membrane, stabilising GGR activity. LIL3 proteins bind chlorophyll a and form homo- and heterodimers. This domain contains GGR-interacting residues. The specific function of this domain remains to be determined.
