identifier: InterPro:IPR062087
label: "Rap guanine nucleotide exchange factor 1, N-terminal domain"
definition: >-
  This entry represents a helical segment found at the N-terminal of RAPGEF1 (also known as C3G) proteins from metazoans. This domain precedes the proline-rich SH3-binding region, the RasGEF_N domain and the RasGEF catalytic domain, as these proteins have a large unstructured segment after this helices. RAPGEF1 is a guanine nucleotide exchange factor that binds the SH3 domains of CRK and GRB2 and transduces signals to activate RAS and RAP1, playing roles in cell adhesion and neurite outgrowth. This domain is predicted to fold into a four-helical up-and-down bundle with similarity to members of the VBS-like superfamily. The specific function of this N-terminal domain remains to be determined.
