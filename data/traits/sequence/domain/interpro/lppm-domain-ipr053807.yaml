identifier: InterPro:IPR053807
label: "LppM domain"
definition: >-
  This domain is found in LppM, a bacterial effector implicated in the early steps of Mycobacterium tuberculosis infection. LppM is anchored to the mycobacterial cell wall by a C-terminal membrane domain. An isoform that lacks the latter is secreted. This domain has unusual fold consisting of a β-sandwich in which one of the β-sheets is extended with three β-strands packed with a α-helix. LppM is capable of binding phosphatidylinositol mannosides (PIM) derivatives.
