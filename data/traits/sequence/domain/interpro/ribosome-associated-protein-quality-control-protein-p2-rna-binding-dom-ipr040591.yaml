identifier: InterPro:IPR040591
label: "Ribosome-associated protein quality control protein P2, RNA-binding domain"
definition: >-
  This domain adopts an RRM like fold and is found in the B. subtilis Ribosome-associated protein quality control protein P2 (RqcP2, also known as YlmH). RqcP2 is a component of the ribosome quality control system (RQC), a ribosome-associated complex that mediates the extraction of incompletely synthesized nascent chains from stalled ribosomes and their subsequent degradation.
