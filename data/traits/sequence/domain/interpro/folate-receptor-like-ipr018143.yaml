identifier: InterPro:IPR018143
label: "Folate receptor-like"
definition: >-
  This entry represents a domain found in folate receptors and at the N terminus of hedgehog-interacting proteins. Folate receptors bind to folate and reduced folic acid derivatives and mediate delivery of 5-methyltetrahydrofolate to the interior of cells. These proteins are attached to the membrane by a GPI-anchor. A riboflavin-binding protein required for the transport of riboflavin to the developing oocyte in chicken also included in this entry.
