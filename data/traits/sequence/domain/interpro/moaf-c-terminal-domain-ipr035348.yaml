identifier: InterPro:IPR035348
label: "MoaF, C-terminal domain"
definition: >-
  MoaF protein is essential for the production of the monoamine-inducible 30kDa protein in Klebsiella. It is necessary for reconstituting organoautotrophic growth in Ralstonia eutropha. It is conserved in Proteobacteria and some lower eukaryotes. The operon regulating the Moa genes is responsible for molybdenum cofactor biosynthesis. This entry corresponds to the C-terminal domain.
