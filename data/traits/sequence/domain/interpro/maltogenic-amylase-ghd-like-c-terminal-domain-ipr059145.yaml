identifier: InterPro:IPR059145
label: "Maltogenic amylase, GHD-like C-terminal domain"
definition: >-
  This entry represents the C-terminal GHD-like domain present in Staphylothermus marinus maltogenic amylase (SMMA, ) and related proteins. SMMA is an extreme thermophile maltogenic amylase with an optimal temperature of 100 C, which hydrolyses alpha(1-4)glycosyl linkages in cyclodextrins and in linear malto-oligosaccharides. SMMA comprises four domains: the N, catalytic, and C domains, which are observed in most CD-hydrolysing enzymes, and an additional novel N-terminal domain, located before the N-terminal domain, the N' domain.
