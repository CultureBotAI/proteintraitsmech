identifier: InterPro:IPR029546
label: Astrocytic phosphoprotein PEA-15, death effector domain
definition: >-
  Astrocytic phosphoprotein PEA-15 is a multifunctional protein that is involved in different biological processes and regulates several signalling pathways. It contains N-terminal death effector domain (DED) and a C-terminal tail with irregular structure. Expression of PEA-15 oscillates throughout the cell cycle, and the loss of PEA15 accelerates cell cycle progression. PEA-15 blocks Ras-mediated inhibition of integrin activation and modulates the ERK MAP kinase cascade. It inhibits both TNFRSF6- and TNFRSF1A-mediated CASP8 activity and apoptosis. It also functions as a tumour suppressor by triggering the DNA damage-induced G2/M checkpoint and inhibiting RAS-mediated transformation. In humans PEA-15 is regarded as an important target for type 2 diabetes. PEA-15 overexpression impairs insulin regulation of glucose transport, and this is mediated by its interaction with the C-terminal D4 domain of phospholipase D1 (PLD1) and the consequent increase of protein kinase C-alpha activity. This entry represents the Death Effector Domain (DED) of PEA15.
