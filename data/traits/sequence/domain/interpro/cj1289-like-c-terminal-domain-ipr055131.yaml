label: "Cj1289-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of the possible periplasmic protein from Campylobacter jejuni (Cj1289) and similar sequences mainly found in epsilonproteobacteria. This domain is normally associated to . It shows an α-β configuration. Its specific function is unknown.
