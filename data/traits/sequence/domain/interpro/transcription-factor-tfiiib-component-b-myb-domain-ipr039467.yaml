identifier: InterPro:IPR039467
label: "Transcription factor TFIIIB component B'', Myb domain"
definition: >-
  This entry represents the Myb domain found in transcription factor TFIIIB component B''. Transcription by RNA polymerase III (pol III) is a complex molecular process orchestrated by the two main transcription factors, TFIIIB and TFIIIC. The TFIIIB complex can be recruited by TFIIIC to upstream DNA and form an exceptionally kinetically stable TFIIIB-DNA complex, which then recruits the Pol III enzymatic complex and helps maintain it for multiple transcription cycles in a process called facilitated recycling. Saccharomyces cerevisiae TFIIIB is a complex of three subunits, the TATA box-binding protein TBP, the TFIIB-related factor BRF, and the beta'' protein. The myb-type HTH domain is a DNA-binding, helix-turn-helix (HTH) domain of approximately 55 amino acids, typically occurring in a tandem repeat in eukaryotic transcription factors. The domain is named after the retroviral oncogene v-myb, and its cellular counterpart c-myb, which encode nuclear DNA-binding proteins that specifically recognise the sequence YAAC(G/T)G.
