identifier: InterPro:IPR063764
label: "CaTX-A toxin, N-terminal"
definition: >-
  This entry represents a domain found at the N-terminal of CaTX-A and related marine toxins. The domain is characteristic of toxins found in jellyfish and related cnidarian organisms. CaTX-A from the Hawaiian box jellyfish Carybdea alata is the prototypical member, exhibiting potent haemolytic activity and lethality to various organisms. These toxins function as pore-forming proteins that disrupt normal transmembrane ion concentration gradients in target cells. They are localised in nematocysts and are secreted upon jellyfish stinging. This domain can be found in other positions. The proteins containing this domain cause membrane disruption and cytolysis in prey organisms and contribute to the venomous effects of jellyfish stings.
