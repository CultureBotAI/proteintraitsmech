identifier: InterPro:IPR063183
label: "YchO, Ig-like domain"
definition: >-
  This entry represents an Ig-like domain found at the C-terminal of YchO and related inverse autotransporter proteins from Gammaproteobacteria. These proteins belong to the intimin/invasin family and contain an N-terminal inverse autotransporter β-domain ( ) followed by this Ig-like domain. In some family members, additional domains are found C-terminal to this domain. Inverse autotransporters are involved in bacterial adhesion. The specific function of this domain remains to be determined.
