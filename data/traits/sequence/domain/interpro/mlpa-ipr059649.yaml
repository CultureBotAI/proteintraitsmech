identifier: InterPro:IPR059649
label: MlpA
definition: >-
  This entry represents MlpA lipoproteins found in Myxococcus and related bacteria. MlpA is a lipoprotein of approximately 236 amino acids that is processed from a precursor containing an N-terminal signal peptide. The mature protein is anchored to the cell membrane via lipid modifications at the N-terminal cysteine residue. The function of this protein remains to be determined.
