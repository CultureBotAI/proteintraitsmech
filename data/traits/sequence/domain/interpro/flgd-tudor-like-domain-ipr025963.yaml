identifier: InterPro:IPR025963
label: "FlgD Tudor-like domain"
definition: >-
  This domain consists of a tudor-like β barrel fold. It is found in FlgD, a flagellar-hook capping protein. The structure for this domain shows that it contains a nested Ig-like domain within it. However, in some firmicute proteins this inserted domain is absent, such as Q67K21.
