identifier: InterPro:IPR060267
label: "ELMO, N-terminal ubiquitin-like domain"
definition: >-
  This entry represents the N-terminal domain found in ELMO proteins. It has an ubiquitin-like fold. The Engulfment and Cell Motility (ELMO) protein family is involved in cytoskeletal rearrangements essential for the phagocytosis of apoptotic cells and cell motility. Members of this family function in association with DOCK1 and CRK proteins. They are proposed to be crucial in activating Rac Rho small GTPases, potentially enhancing the guanine nucleotide exchange factor (GEF) activity of DOCK1. ELMO proteins interact with the SH3-domain of DOCK1 and form complexes with RAC1, facilitating cellular processes related to movement and engulfment.
