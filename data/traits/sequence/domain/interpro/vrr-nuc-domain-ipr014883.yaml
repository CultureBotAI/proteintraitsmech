identifier: InterPro:IPR014883
label: VRR-NUC domain
definition: >-
  This entry contains proteins with the VRR-NUC domain, such as FAN1, a structure-selective DNA repair nuclease with 5' flap endonuclease activity, involved in the repair of interstrand DNA crosslinks. FAN1 is the only eukaryotic protein with a VRR-NUC domain. This domain is a member of the PD-(D/E)XK nuclease superfamily, that also includes type III restriction modification enzymes. This domain is found in TseVs antibacterial effectors secreted by the type VI secretion system (T6SS). TseVs are evolutionary related to Holliday junction resolvases and enzymes involved in DNA interstrand crosslink repair.
