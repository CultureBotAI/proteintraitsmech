identifier: InterPro:IPR058130
label: "Phosphoethanolamine transferase, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of phosphoethanolamine (PEA) transferases mainly found in proteobacteria. The enzyme EptA (also known as LptA, ) promotes phosphoethanolamine (PEA) decoration of lipid A, which promotes resistance to innate defence systems. In addition to lipid A PEA transferases, many Gram-negative bacteria have modifications on different sites of LPS that are catalysed by different PEA transferases. EptB and EptC (CptA) can modify 3-deoxy-d-manno-oct-2-ulosonate (Kdo II) of the inner core and O-6 of L-glycero-D-manoheptose I of LPS, respectively. Some phosphatidylethanolamine transferases, such as Mcr-1, are plasmid-encoded.
