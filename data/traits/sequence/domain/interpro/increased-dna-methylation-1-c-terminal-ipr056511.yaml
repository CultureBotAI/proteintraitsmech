identifier: InterPro:IPR056511
label: "Increased DNA methylation 1, C-terminal"
definition: >-
  This domain is found at the C-terminal end of Increased DNA methylation 1 (IDM1) from Arabidopsis thaliana and similar plant proteins. IDM1 is a histone H3 acetyltransferase that binds methylated DNA at chromatin sites lacking histone H3K4 di- or trimethylation and catalyses H3K18 and H3K23 acetylation. It is also required for ROS1-mediated DNA demethylation.
