identifier: InterPro:IPR034166
label: "Npl3, RNA recognition motif 1"
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of Npl3p. Npl3p is a major yeast RNA-binding protein that competes with 3'-end processing factors, such as Rna15, for binding to the nascent RNA, protecting the transcript from premature termination and coordinating transcription termination and the packaging of the fully processed transcript for export. It specifically recognizes a class of G/U-rich RNAs. Npl3p is a multi-domain protein containing two central RNA recognition motifs (RRMs), separated by a short linker and a C-terminal domain rich in glycine, arginine and serine residues.
