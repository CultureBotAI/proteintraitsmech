label: "Domain of unknown function DUF8136"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in archaea. The proteins are predominantly found in the Stenosarchaea group, including members of the Haloferacaceae, Natrialbaceae, and Methanomicrobiales. The domain is approximately 90 amino acids in length.
