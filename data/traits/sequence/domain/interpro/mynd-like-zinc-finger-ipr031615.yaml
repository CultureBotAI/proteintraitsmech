identifier: InterPro:IPR031615
label: "MYND-like zinc finger"
definition: >-
  This entry represents an unusual zinc-finger similar to Zfn-MYND, . This zinc-finger is found in the N-terminal of methionine aminopeptidase 1, but it is missing in prokaryotic methionine aminopeptidases. It consists of a C2-C2 zinc-finger motif similar to the RING finger family followed by a C2H2 motif similar to zinc-fingers involved in RNA-binding. In yeast the domain chelates zinc in a 2:1 ratio. The domain is found in yeast, plants and mammals. The domain is necessary for the association of the methionine aminopeptidase with the ribosome and the normal processing of the peptidase.
