identifier: InterPro:IPR029125
label: "TBP-interacting protein, N-terminal"
definition: >-
  This entry represents the N-terminal restriction endonuclease-like domain found in several archaeal TATA-binding protein (TBP)-interacting proteins. The N-terminal domain forms an α/β structure, in which three α-helices enclose the central β-sheet.
