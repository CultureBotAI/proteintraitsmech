identifier: InterPro:IPR057290
label: "Cation/H(+) antiporter, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of the CHX family of plant Cation/H(+) antiporters, including Cation/H(+) antiporter 17 from Arabidopsis thaliana (CHX17). Plant Cation/H+ antiporters, also known as CHX-type antiporters, are involved in exchanging K+ or Na+ ions with protons (H+) across membranes. These transporters play crucial roles in various physiological processes, including ion homeostasis, pH regulation, and plant stress responses. These transporters belong to the monovalent cation proton antiporter (CPA) superfamily. CHX17 functions as a K+/H+ antiporter that controls K+ acquisition and homeostasis. This protein has a highly hydrophobic N-terminal domain ( ) and a C-terminal region predicted to be non cytoplasmic that is organised into two domains thought to have a similar α-β configuration.
