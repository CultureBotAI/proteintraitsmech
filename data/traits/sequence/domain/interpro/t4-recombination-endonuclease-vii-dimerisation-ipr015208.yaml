identifier: InterPro:IPR015208
label: "T4 recombination endonuclease VII, dimerisation"
definition: >-
  This entry represents a dimerisation domain predominantly found in Bacteriophage T4 recombination endonuclease VII. It adopts a helical secondary structure, with three α helices oriented parallel to each other. As well as mediating dimerisation of the protein, this domain is also involved in binding to the DNA major groove.
