identifier: InterPro:IPR019050
label: "FDF domain"
definition: >-
  The FDF domain, so called because of the conserved FDF at its N termini, is an entirely α-helical domain with multiple exposed hydrophilic loops. It is found at the C terminus of Scd6p-like SM domains. It is also found with other divergent Sm domains and in proteins such as Dcp3p and FLJ21128, where it is found N-terminal to the YjeF-N domain, a novel Rossmann fold domain.
