identifier: InterPro:IPR049763
label: "Rabankyrin-5,BTB and C-terminal Kelch domain"
definition: >-
  This entry represents the BACK (BTB and C-terminal Kelch) domain found in human Rabankyrin-5 (ANFY1) and similar animal proteins. This domain is usually found associated with and . Rabankyrin-5, also called ankyrin repeat and FYVE domain-containing protein 1 (ANKFY1), or ankyrin repeats hooked to a zinc finger motif (ANKHZN), a Rab5 effector that regulates and coordinates different endocytic mechanisms. It is ubiquitously expressed in a spatiotemporal-specific manner and is located on endosomes. ANFY1 contains an N-terminal coiled-coil region and a BTB/POZ domain, followed by a BACK domain, several ankyrin (ANK) repeats in the middle, and a C-terminal FYVE domain.
