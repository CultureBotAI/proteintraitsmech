identifier: InterPro:IPR058402
label: "Domain of unknown function DUF8089"
definition: >-
  This entry represents a small family of uncharacterised proteins that have a 6 stranded β-barrel fold. This domain is usually found next to a C-terminal PilZ domain. This domain appears to share structural similarity to the PilZ domain suggesting this may be a divergent PilZ domain.
