identifier: InterPro:IPR058788
label: "D-apionate lactonase, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain in ApnL proteins. D-apionate lactonase (ApnL) hydrolyses D-apionolactone to D-apionate. The protein is involved in D-apiose catabolism pathways in bacteria. D-apiose is a branched pentose found in the cell walls of higher plants.
