identifier: InterPro:IPR034335
label: "Prostaglandin E synthase 2, C-terminal"
definition: >-
  This entry represents the C-terminal domain of prostaglandin E synthase 2 (also known as membrane-associated prostaglandin E synthase-2, or mPGES2). mPGES2 is a membrane-anchored dimeric protein containing a CXXC motif which catalyzes the isomerization of PGH2 to PGE2. Unlike cytosolic PGE synthase (cPGES) and microsomal PGES Type 1 (mPGES1), mPGES2 does not require glutathione (GSH) for its activity, although its catalytic rate is increased two- to four-fold in the presence of DTT, GSH, or other thiol compounds. PGE2 is widely distributed in various tissues and is implicated in the sleep/wake cycle, relaxation/contraction of smooth muscle, excretion of sodium ions, maintenance of body temperature, and mediation of inflammation. mPGES2 contains an N-terminal hydrophobic domain which is membrane associated and a C-terminal soluble domain with a GST-like structure. The C-terminal GST-like domain contains two structural domains, an N-terminal thioredoxin-fold domain and a C-terminal α helical domain. The GST active site is located in a cleft between the two structural domains.
