identifier: InterPro:IPR005300
label: Lytic transglycosylase MltA, domain B
definition: >-
  Escherichia coli MltA is a membrane-bound lytic transglycosylase comprised of two domains separated by a large groove, where the peptidoglycan strand binds. Domain A is made up of an N-terminal and a C-terminal portion, which correspond to the 3D domain, named for 3 conserved aspartate residues. Domain B is inserted within the linear sequence of domain A. MltA is a membrane-bound, murein degrading transglycosylase enzyme that plays an important role in the controlled growth of the stress-bearing sacculus of E. coli.
