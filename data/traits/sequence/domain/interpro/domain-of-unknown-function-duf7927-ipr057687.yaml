identifier: InterPro:IPR057687
label: "Domain of unknown function DUF7927"
definition: >-
  This domain of unknown function is found in multiple copies in a number of bacterial proteins. It is closely related to domains represented by DUF11. Similarly to DUF11, this domain contains a conserved N-terminal lysine and a C-terminal asparagine with central aspartate/glutamate residues suggesting that it may contain an isopeptide bond.
