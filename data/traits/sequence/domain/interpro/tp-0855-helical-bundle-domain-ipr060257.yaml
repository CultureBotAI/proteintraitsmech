identifier: InterPro:IPR060257
label: "TP_0855, helical bundle domain"
definition: >-
  This entry represents a helical bundle domain found in TP_0855 proteins from Treponema and related spirochaetes. This domain forms a small helical bundle structure. TP_0855 is a large protein of approximately 1127 amino acids that is processed from a precursor containing an N-terminal signal peptide and contains a coiled-coil region towards the C-terminal. The function of this domain remains to be determined.
