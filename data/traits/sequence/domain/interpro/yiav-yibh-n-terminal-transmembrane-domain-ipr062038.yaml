identifier: InterPro:IPR062038
label: "YiaV/YibH, N-terminal transmembrane domain"
definition: >-
  This entry represents an N-terminal transmembrane domain found in YiaV and YibH inner membrane proteins from Gammaproteobacteria. The domain contains two transmembrane helices that anchor these proteins to the inner membrane. YiaV and YibH belong to the membrane fusion protein (MFP) family and contain additional periplasmic domains including a β-sandwich domain. The function of YiaV and YibH remains to be determined.
