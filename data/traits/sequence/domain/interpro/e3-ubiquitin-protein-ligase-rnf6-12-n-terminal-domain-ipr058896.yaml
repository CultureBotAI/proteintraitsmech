identifier: InterPro:IPR058896
label: "E3 ubiquitin-protein ligase RNF6/12, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of human E3 ubiquitin-protein ligase RNF6, RNF12 (also known as RLIM) and similar proteins mainly found in vertebrates. It is predicted to show an all-helical structure. RNF6 mediates 'Lys-6' and 'Lys-27'-linked polyubiquitination of AR/androgen receptor thereby modulating its transcriptional activity. RLIM acts as a negative coregulator for LIM homeodomain transcription factors by mediating the ubiquitination and subsequent degradation of LIM cofactors LDB1 and LDB2 and by mediating the recruitment the SIN3a/histone deacetylase corepressor complex.
