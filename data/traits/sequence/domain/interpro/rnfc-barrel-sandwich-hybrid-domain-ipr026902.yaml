identifier: InterPro:IPR026902
label: "RnfC Barrel sandwich hybrid domain"
definition: >-
  This domain is part of the barrel sandwich hybrid superfamily. It is found at the N-terminal of the RnfC Electron transport complex protein. It appears to be most related to the N-terminal NQRA domain ( ).
