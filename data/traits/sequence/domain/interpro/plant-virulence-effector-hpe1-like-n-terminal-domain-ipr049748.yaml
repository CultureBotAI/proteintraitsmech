identifier: InterPro:IPR049748
label: "Plant virulence effector HPE1-like, N-terminal domain"
definition: >-
  This entry describes a domain found N-terminal in a family bacterial proteins mainly from order Hyphomicrobiales. Most members of this family have some form of additional C-terminal domain of similar length. However, the best-studied members of this family, such as the virulence effector HPE1 ("hypothetical protein effector 1") from Candidatus Liberibacter solanacearum, are shorter proteins. Members of this family begin with an N-terminal signal peptide, for apparent Sec-mediated secretion, and nearly all share a common CxxC sequence motif.
