identifier: InterPro:IPR045463
label: "Collagen type XV/XVIII, trimerization domain"
definition: >-
  Collagens XV and XVIII are members of the multiplexin family and are homo-trimers comprising a single alpha-chain with a central highly interrupted collagenous domain flanked by N- and C-terminal non collagenous domains (NC). Type XVIII is a heparan sulfate proteoglycan that localizes in epidermal and vascular basement membrane, whereas type XV can carry chondroitin/dermatan sulfate alone or chondroitin/dermatan sulfate and heparan sulfate chains which localizes to areas peripheral to basement membranes and associates directly with collagen fibers/fibrils in a manner consistent with other chondroitin sulfate proteoglycans. The highest level of sequence homology between these two types of collagens lies in their NC1 domain, organized into a trimerization domain, a hinge region and an endostatin domain. This entry represents the small trimerization domain from Collagens type XV and XVIII, which has high structural conservation, despite low sequence identity.
