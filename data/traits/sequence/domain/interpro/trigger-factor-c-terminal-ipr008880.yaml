identifier: InterPro:IPR008880
label: Trigger factor, C-terminal
definition: >-
  In the Escherichia coli cytosol, a fraction of the newly synthesised proteins requires the activity of molecular chaperones for folding to the native state. The major chaperones implicated in this folding process are the ribosome-associated Trigger Factor (TF), and the DnaK and GroEL chaperones with their respective co-chaperones. Trigger Factor is an ATP-independent chaperone and displays chaperone and peptidyl-prolyl-cis-trans-isomerase (PPIase) activities in vitro . It is composed of three domains, an N-terminal ribosome-binding domain (RBD) which mediates association with the large ribosomal subunit, a central PPIase domain with homology to FKBP proteins, and a C-terminal substrate-binding domain (SBD) which forms the central body of the protein and has two helical arms that create a cavity. The association between its N-terminal domain with the ribosomal protein L23 located next to the peptide tunnel exit is essential for the interaction with nascent polypeptides and its in vivo function. This entry represents the C-terminal domain of bacterial TF proteins, which has a multi-helical structure consisting of an irregular array of long and short helices. This domain is structurally similar to the peptide-binding domain of the bacterial porin chaperone SurA.
