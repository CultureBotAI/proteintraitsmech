identifier: InterPro:IPR060405
label: "CCDC17, middle coiled-coil domain"
definition: >-
  This entry represents the middle coiled-coil region of CCDC17 (coiled- coil domain-containing protein 17) found in animals. The specific function of this middle coiled-coil domain remains to be determined. CCDC17 contains multiple coiled-coil regions, with this middle domain representing the largest coiled-coil region in the protein. The full-length protein interacts with various cellular proteins including GOLGA2, keratins, and cytoskeletal components. CCDC17 shows tissue-enriched expression in fallopian tube.
