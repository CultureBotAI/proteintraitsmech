identifier: InterPro:IPR010383
label: "Glycosyl hydrolase 94, supersandwich domain"
definition: >-
  This entry represents a β-supersandwich domain found in the superfamily of enzymes referred to as GH94, formerly known as glycosyltransferase family GT36. Family 94 of glycoside hydrolases exclusively contains phosphorylases that cleave beta-glycosidic bonds. The substrate specificities found in this family are: cellobiose phosphorylase, cellodextrin phosphorylase, and N,N'-diacetyl chitobiose phosphorylase. Many members of this family contain two copies of the domain represented in this entry.
