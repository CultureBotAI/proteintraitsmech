identifier: InterPro:IPR062184
label: "PID-4/PID-5, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain found in the PID-4 and PID-5 proteins from Caenorhabditis elegans. Both proteins work together in gene silencing mediated by piRNAs and are required for the biogenesis of secondary and tertiary 22G-siRNAs. The proteins localise to the perinuclear region of the cytoplasm and P-bodies, where they co-localise at P granules in germ cells. They play roles in transgenerational epigenetic inheritance and the formation of Z granules. The proteins are expressed in germ cells of L4 larvae. The specific function of this C-terminal domain remains to be determined. This domain is structurally similar to SH3 domains.
