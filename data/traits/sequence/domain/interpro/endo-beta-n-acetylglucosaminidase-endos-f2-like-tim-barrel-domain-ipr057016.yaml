identifier: InterPro:IPR057016
label: "Endo-beta-N-acetylglucosaminidase EndoS/F2-like, TIM-barrel domain"
definition: >-
  This entry represents the TIM barrel domain found in Endo-beta-N-acetylglucosaminidase EndoS from Streptococcus spp., Endo-beta-N-acetylglucosaminidase F2 from Elizabethkingia meningoseptica and similar bacterial proteins. This domain binds to complex-type N-glycans and has an enzymatic activity. EndoS is a secreted protein that catalyses the hydrolysis of the N-linked oligosaccharides on opsonising immunoglobulin G, thus contributing to immune response evasion and increased survival of the bacteria in patients.
