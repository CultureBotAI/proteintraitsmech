identifier: InterPro:IPR047418
label: "Fanconi anemia group M protein, XPF-like nuclease domain"
definition: >-
  This entry represents the XPF-like nuclease domain of FANCM and similar sequences from vertebrates. Fanconi anemia group M protein (FANCM) is a DNA-dependent ATPase component of the Fanconi anemia (FA) core complex. It is required for the normal activation of the FA pathway, leading to monoubiquitination of the FANCI-FANCD2 complex in response to DNA damage, cellular resistance to DNA cross-linking drugs, and prevention of chromosomal breakage. In complex with CENPS and CENPX, it binds double-stranded DNA (dsDNA), fork-structured DNA (fsDNA) and Holliday junction substrates. In complex with FAAP24, it efficiently binds to single-strand DNA (ssDNA), splayed-arm DNA, and 3'-flap substrates. In vitro, on its own, FANCM strongly binds ssDNA oligomers and weakly fsDNA, but does not bind to dsDNA. Bi-allelic loss-of-function variants in FANCM have been associated with male infertility.
