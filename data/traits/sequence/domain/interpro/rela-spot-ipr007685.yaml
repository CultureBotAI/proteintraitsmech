identifier: InterPro:IPR007685
label: RelA/SpoT
definition: >-
  This entry includes the catalytic domains of Escherichia coli ppGpp synthetase (RelA), ppGpp synthetase/hydrolase (SpoT), and related proteins. The functions of Escherichia coli RelA and SpoT differ somewhat. RelA ( ) produces pppGpp (or ppGpp) from ATP and GTP (or GDP) in response to amino-acid starvation and in association with ribosomes. SpoT ( ) degrades ppGpp, but may also act as a secondary ppGpp synthetase under carbon limitation in a ribosome-independent manner. Gram-negative bacteria have two enzymes involved in (p)ppGpp metabolism while most Gram-positive organisms have a single Rel-Spo enzyme (Rel), which both synthesizes and degrades (p)ppGpp. The Arabidopsis thaliana Rel-Spo proteins, At-RSH1, At-RSH2, and At-RSH3 appear to regulate a rapid (p)ppGpp-mediated response to pathogens and other stresses. This catalytic domain is found in association with an N-terminal HD domain and a C-terminal metal dependent phosphohydrolase domain (TGS). Some Rel-Spo proteins also have a C-terminal regulatory ACT domain. This subgroup belongs to the Pol beta-like NT superfamily. In the Pol beta-like NT superfamily, the majority of enzymes have two carboxylates, Dx[D/E], together with a third more distal carboxylate, which coordinate two divalent metal cations involved in a two-metal ion mechanism of nucleotide addition. These carboxylate residues are fairly well conserved in this family.
