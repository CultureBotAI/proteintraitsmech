identifier: InterPro:IPR048404
label: "DYN1, AAA+ ATPase lid domain"
definition: >-
  This entry includes dynein heavy chain (DYN1) from S.cerevisiae, which is a cytoplasmic dynein that acts as a motor for intracellular retrograde motility of vesicles and organelles along microtubules. This entry represents the AAA ATPase lid domain.
