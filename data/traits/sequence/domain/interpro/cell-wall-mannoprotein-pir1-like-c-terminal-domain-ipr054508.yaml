identifier: InterPro:IPR054508
label: "Cell wall mannoprotein PIR1-like, C-terminal domain"
definition: >-
  This entry represents a presumed domain found at the C-terminal of fungal cell wall mannoproteins, including PIR1, CIS3 and PIR5 from S.cerevisiae. These proteins are part of the outer cell wall layer, required for stability of the cell wall and for optimal growth. This domain may have a trefoil fold. This domain is also found at the N-terminal end of Small cysteine-rich protein 1 from Verticillium dahliae, a putative secreted effector that affects plant immune responses.
