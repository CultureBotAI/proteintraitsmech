identifier: InterPro:IPR042599
label: "Vertebrate ubiquitin-conjugating enzyme E2 K, UBA domain"
definition: >-
  Ubiquitin-conjugating enzyme E2 K (UBE2K) is a multi-ubiquitinating enzyme with the ability to synthesize Lys48-linked polyubiquitin chains which is involved in the ubiquitin (Ub)-dependent proteolytic pathway. It interacts with the frameshift mutant of ubiquitin B and functions as a crucial factor regulating amyloid-beta neurotoxicity. It has also been characterised as Huntingtin-interacting protein that modulates the neurotoxicity of Amyloid-beta (Abeta), the principal protein involved in Alzheimer's disease pathogenesis. Moreover, E2-25K increases aggregate the formation of expanded polyglutamine proteins and polyglutamine-induced cell death in the pathology of polyglutamine diseases. UBE2K and its yeast homologue UBC1 are unique class II E2 conjugating enzymes, both of which contain a C-terminal ubiquitin-associated (UBA) domain in addition to an N-terminal catalytic ubiquitin-conjugating enzyme E2 (UBCc) domain.
