identifier: InterPro:IPR037461
label: CtCE2-like domain
definition: >-
  This entry represents a domain found in a group of bacterial carbohydrate esterases known as CE2 (family CE2 in the CAZy classification), including CjCE2A, CjCE2B and CjCE2C from Cellvibrio japonicus. In Clostridium thermocellum, this domain (CtCE2) is linked to the cellulase, CtCel5C; therefore, it is known as CtCel5C-CE2 modular protein. The enzyme also contains a type I dockerin module that, by binding to cohesin modules in the scaffoldin protein, incorporates CtCel5C-CE2 into the multienzyme plant cell-wall-degrading complex known as the cellulosome. CtCE2 displays acetyl esterase activity that is spatially coupled to a noncatalytic cellulose-binding function.
