identifier: InterPro:IPR007084
label: "BRICHOS domain"
definition: >-
  The BRICHOS domain is found in a variety of proteins implicated in dementia, respiratory distress and cancer, including BRI-2, chondromodulin-I (ChM-I), CA11, and surfactant protein C. Its exact function is unknown; roles that have been proposed for it include (a) targeting the protein to the secretory pathway, (b) an intramolecular chaperone-like function, and (c) assisting the specialised intracellular protease processing system.
