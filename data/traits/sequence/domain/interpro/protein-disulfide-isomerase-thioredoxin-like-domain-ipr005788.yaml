identifier: InterPro:IPR005788
label: Protein disulfide-isomerase, thioredoxin-like domain
definition: >-
  This entry represents a domain found in eukaryotic protein disulphide isomerases (PDI), multifunctional proteins that catalyse the formation, breakage and rearrangement of disulfide bonds. PDI generally shows four thioredoxin-like domains. This entry represents the two redox active domains, which are located at the N-and C-terminal ends.
