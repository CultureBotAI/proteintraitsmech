identifier: InterPro:IPR057588
label: "NWD1/2-like, winged helix-turn-helix domain"
definition: >-
  This domain is found in human NACHT domain- and WD repeat-containing protein 1/2 (NWD1/2), the orthologue Protein qui-1 from Caenorhabditis elegans and similar animal proteins. This domain is predicted to adopt a winged helix-turn-helix fold. NWD1 may play a role in the control of androgen receptor protein steady-state levels. Qui-1 is involved in the avoidance response to the noxious chemicals and repellents, such as quinine, in ASH and ADL sensory neurons. In response to the noxious chemical quinine, it promotes dauer formation induced by pheromones.
