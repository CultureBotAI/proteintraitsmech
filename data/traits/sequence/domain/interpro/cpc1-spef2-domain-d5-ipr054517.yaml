identifier: InterPro:IPR054517
label: "CPC1/SPEF2 domain D5"
definition: >-
  This domain is found in the axoneme central apparatus (CA) associated proteins such as Chlamydomonas Central pair complex 1 (CPC1, ) and its mammalian orthologues Sperm flagellar protein 2 (SPEF2). CPC1 is located at C1 microtubule. Most of the distal components of the C1b projection bind CPC1 and its correct recruitment and positioning is critical to the formation of the C1b projection, and ciliary motility in Chlamydomonas and humans. CPC1 serves as the rachis of the entire C1b arm and this domain contributes to this function. It folds into a single long α-helix.
