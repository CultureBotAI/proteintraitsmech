identifier: InterPro:IPR034084
label: "Thermitase-like, domain"
definition: >-
  This entry represents an S8 family domain found in thermitase as well as other thermostable subtilisin homologues, all of which are stablized by calcium ions. Thermitase (MEROPS identifier S08.007) is a calcium-dependent, non-specific, serine protease from the thermophilic bacterium Thermoactinomyces vulgaris. The peptidase is maximally active between pH 7.5 and 9.5, and at 85 degrees Celsius. It cleaves a wide variety of proteins including native collagen and elastin. The tertiary structure of thermitase is similar to that of subtilisin BPN'. Mesentericopeptidase (MEROPS identifier S08.002) is from the mesophilic bacterium Bacillus mesentericus and has been crystallized. Subtilisin Ak1 (MEROPS identifier S08.009) from Geobacillus stearothermophilis is stable at 70 degrees Celsius and maximally active at pH 7.5. From the crystal structure, subtilisin Ak1 possesses three calcium ions, only two of which correspond to positions in other thermostable subtilisins, and it is this third calcium that provides the greater thermostability. Halolysin R4 (MEROPS identifier S08.102) from the halophilic archaean Haloferax mediterranei is also included in this entry, but unlike its bacterial relatives, its protein sequence has a long C-terminal extension which if removed abolishes peptidase activity. This domain is part of a family of domains found in serine peptidases belonging to the MEROPS peptidase families S8 (subfamilies S8A (subtilisin) and S8B (kexin)) and S53 (sedolisin), both of which are members of clan SB. Members of the peptidases S8 (subtilisin and kexin) and S53 (sedolisin) clan include endopeptidases and exopeptidases. The S8 family has an Asp/His/Ser catalytic triad similar to that found in trypsin-like proteases, but do not share their three-dimensional structure an…
