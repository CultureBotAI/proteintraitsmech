identifier: InterPro:IPR057595
label: "TopBP1/SLF1, BRCT domain"
definition: >-
  This entry represents a BRCT domain found in TopBP1 and SLF1. It corresponds to the eight BRCT domain of TopBP1 and the second one in SLF1. TopBP1, also known as DNA topoisomerase II-beta-binding protein 1, or DNA topoisomerase II-binding protein 1, functions in DNA replication and damage response, acting as a scaffold protein. It binds double-stranded DNA breaks and nicks as well as single-stranded DNA. It has been shown to activate the ATR-ATRIP complex. TopBP1 contains eight copies of BRCT domain which specifically recognise and bind phosphorylated proteins, bringing proteins together into functional combinations. SMC5-SMC6 complex localization factor protein 1 (SLF1) plays a role in the DNA damage response (DDR) pathway by regulating postreplication repair of UV-damaged DNA and genomic stability maintenance.
