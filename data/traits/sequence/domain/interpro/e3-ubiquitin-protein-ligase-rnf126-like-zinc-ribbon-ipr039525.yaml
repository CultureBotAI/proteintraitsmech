label: E3 ubiquitin-protein ligase RNF126-like, zinc-ribbon
definition: >-
  This entry represents the zinc-ribbon domain found in RNF126 and related proteins. RNF126 is a E3 ubiquitin-protein ligase that mediates ubiquitination of target proteins.
