identifier: InterPro:IPR060347
label: "AllF, heavy metal-associated domain"
definition: >-
  This heavy metal-associated (HMA) domain is found at the N-terminal end of Oxamate carbamoyltransferase subunit AllF from Escherichia coli, a component of a carbamoyltransferase involved in the anaerobic nitrogen utilisation via the assimilation of allantoin that catalyses the conversion of oxalurate (N-carbamoyl-2-oxoglycine) to oxamate and carbamoyl phosphate. This domain shows a β-sheet with α-helices in both sides.
