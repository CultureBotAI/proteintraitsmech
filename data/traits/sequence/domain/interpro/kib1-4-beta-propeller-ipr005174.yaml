identifier: InterPro:IPR005174
label: "KIB1-4, beta-propeller"
definition: >-
  This entry, previously known as DUF295, represents the β-propeller domain found in F-box proteins KIB1-4, from Arabidopsis thaliana, and similar plant proteins. This domain adopts a β-propeller structure with 6 blades and is often found in association with F-box domain. KIB1-4 are ubiquitin ligases that act as essential positive regulators in brassinosteroid signalling, mediating the ubiquitination, substrate interaction and degradation of GSK3 kinase BIN2. This domain is also found in Protein UNUSUAL FLORAL ORGANS (UFO), likely a meristem identity factor required for normal growth of the young floral meristem. It acts together with LEAFY to positively regulate the B class floral homeotic genes APETALA3 and PISTILLATA. Protein PHOTOPERIODIC CONTROL OF HYPOCOTYL 1 also contain this domain. This protein regulates growth and development adaptation to the ambient environment by controlling negatively phytochrome B (phyB) dark reversion, a temperature-dependent thermal relaxation process during which phyB reverts from the active to the inactive state.
