identifier: InterPro:IPR005702
label: "Tyrosine-protein kinase Wzc-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Tyrosine-protein kinase wzc from Escherichia coli and similar bacterial sequences. Wzc in required for the extracellular polysaccharide colanic acid synthesis. It is probably involved in the export of colanic acid from the cell to medium. This domain covers the whole length of the protein in Tyrosine-protein kinase CpsD from Streptococcus agalactiae, which is involved in the regulation of capsular polysaccharide biosynthesis. Wzc is an integral cytoplasmic membrane protein that belonds to the bacterial tyrosine kinase (BY-kinase) family. This enzyme is essential for extracellular polysaccharide colanic acid synthesis and export in Escherichia coli. The protein undergoes autophosphorylation at multiple tyrosine residues through a cooperative two-step mechanism involving both intra- and intermolecular phosphorylation events. Paradoxically, whilst the autophosphorylated form is required for colanic acid assembly, it is inactive for its actual production. The enzyme phosphorylates UDP-glucose dehydrogenase (Ugd), stimulating its activity and connecting colanic acid biosynthesis with polymer export from the cell to the medium. Wzc functions as a master regulator of polysaccharide assembly through the formation and dissociation of octameric complexes, driven by changes in the phosphorylation status of its C-terminal tyrosine-rich tail..
