identifier: InterPro:IPR004954
label: "Putative mucin/carbohydrate-binding domain"
definition: >-
  This entry represents a putative binding domain for the substrates of enhancin, and other similar metallopeptidases. This is not the enzymatically active (peptidase) part of the proteins. The baculovirus enhancin protein, or enhancing factor, is involved in disruption of the peritrophic membrane and fusion of nucleocapsids with mid-gut cells. This metallopeptidase belongs to the MEROPS peptidase family M60 (enhancin family, clan MA(E)).
