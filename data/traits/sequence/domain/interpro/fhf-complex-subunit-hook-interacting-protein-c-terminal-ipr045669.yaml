identifier: InterPro:IPR045669
label: "FHF complex subunit HOOK-interacting protein, C-terminal"
definition: >-
  This entry represents a short presumed domain located close at the C terminus of the FHF complex subunit HOOK-interacting protein (also known as FTS and Hook-interacting protein, FHIP). The FHF complex may function to promote vesicle trafficking and/or fusion via its interaction with the homotypic vesicular protein sorting complex (the HOPS complex). The function of this domain is still unknown.
