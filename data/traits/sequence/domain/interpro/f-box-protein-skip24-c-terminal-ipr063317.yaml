identifier: InterPro:IPR063317
label: "F-box protein SKIP24, C-terminal"
definition: >-
  This entry represents the C-terminal domain of the SKIP24 protein found in plants. SKIP24 is an F-box protein that functions as a component of SCF ubiquitin E3 ligase complexes. The complete protein contains an N-terminal F-box domain that interacts with SKP1 proteins and central coiled-coil regions. The full-length SKIP24 protein mediates ubiquitination and subsequent proteasomal degradation of target proteins. This C-terminal region contains both disordered sequences and shows alternative splicing that affects the protein's C-terminal sequence. The specific function of this C-terminal domain remains to be determined.
