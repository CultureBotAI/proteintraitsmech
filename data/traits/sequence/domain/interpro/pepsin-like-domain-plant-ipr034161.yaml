identifier: InterPro:IPR034161
label: "Pepsin-like domain, plant"
definition: >-
  This entry represents a domain found in aspartic endopeptidases from plants including nepenthesin (MEROPS identifier A01.040), a digestive enzyme from the pitcher of the carnivorous pitcher plant Nepenthes; CDR1 endopeptidase (=Constitutive Disease Resistance 1; MEROPS identifier A01.069) from the Arabidopsis apoplast involved in disease resistance signalling and which is not inhibited by pepstatin; PCS1 peptidase (MEROPS identifier A01.074) which is important for protecting cells from apoptosis during embryo development; and S5 peptidases (MEROPS identifier A01.086), which exist as homo- and hetero- dimers and formation of heterodimers leads to embryo-sac abortion resulting in sterility. Proteins containing this domain belong to the aspartic peptidase A1 family (peptidase family A1, subfamily A1B). Aspartyl proteases (APs), also known as acid proteases, ([ec:3.4.23.-]) are a widely distributed family of proteolytic enzymes known to exist in vertebrates, fungi, plants, retroviruses and some plant viruses. APs use an Asp dyad to hydrolyze peptide bonds. APs found in eukaryotic cells are α/β monomers composed of two asymmetric lobes ("bilobed"). Each of the lobes provides a catalytic Asp residue, positioned within the hallmark motif Asp-Thr/Ser-Gly, to the active site. The N- and C-terminal domains, although structurally related by a 2-fold axis, have only limited sequence homology except the vicinity of the active site. This suggests that the enzymes evolved by an ancient duplication event. The enzymes specifically cleave bonds in peptides which have at least six residues in length with hydrophobic residues in both the P1 and P1' positions. The active site is located at the groove formed by the two lobes, with an extended loop projecting over the cleft to form an 11-res…
