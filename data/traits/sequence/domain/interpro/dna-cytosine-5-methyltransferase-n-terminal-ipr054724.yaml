identifier: InterPro:IPR054724
label: "DNA (cytosine-5)-methyltransferase, N-terminal"
definition: >-
  This entry represents the N-terminal region of DNA (cytosine-5)-methyltransferase 3A (DNMT3A) from mouse and its homologues, a protein that is required for genome-wide de novo methylation and is essential for the establishment of DNA methylation patterns during development. The dimethylation of lysine 44 (K44) in this region, contained in the conserved TARK tetrapeptide sequence, represents a molecular link between the mechanisms that establish DNA methylation and H3K9 methylation.
