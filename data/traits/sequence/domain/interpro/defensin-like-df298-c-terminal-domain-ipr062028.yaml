identifier: InterPro:IPR062028
label: "Defensin-like DF298, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in plant defensin-like proteins from the DEFL family. These proteins belong to a large family of more than 300 defensin-like genes in Arabidopsis thaliana. DEFL proteins are secreted antimicrobial peptides involved in plant defence responses, particularly against fungal pathogens. They are characterised by multiple disulphide bonds that stabilise their structure, though some family members contain six disulphide bonds instead of the typical four. The proteins are found in the extracellular region where they function in killing cells of other organisms and defence against fungi. The specific function of this C-terminal domain remains to be determined.
