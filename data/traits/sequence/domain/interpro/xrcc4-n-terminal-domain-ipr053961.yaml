identifier: InterPro:IPR053961
label: "XRCC4, N-terminal domain"
definition: >-
  This represents the N-terminal β-sandwich domain of a family consisting of several eukaryotic DNA double-strand break repair and V(D)J recombination protein XRCC4 sequences. In the non-homologous end joining pathway of DNA double-strand break repair, the ligation step is catalysed by a complex of XRCC4 and DNA ligase IV. It is thought that XRCC4 and ligase IV are essential for alignment-based gap filling, as well as for final ligation of the breaks. DNA repair protein XRCC4 is a DNA non-homologous end joining (NHEJ) core factor, required for double-strand break repair and V(D)J recombination. It acts as a scaffold protein that regulates recruitment of other proteins to DNA double-strand breaks. XRCC4 plays a key role in the NHEJ ligation step of the broken DNA during DSB repair via direct interaction with DNA ligase IV (LIG4): the LIG4-XRCC4 subcomplex reseals the DNA breaks after the gap filling is completed.
