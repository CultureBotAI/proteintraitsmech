identifier: InterPro:IPR060005
label: "Aconitase X, second domain"
definition: >-
  This entry represents the second domain of aconitase X (AcnX, also known as Phosphomevalonate dehydratase large subunit), which corresponds to domain 3 in the canonical four-domain architecture of the aconitase superfamily. This domain contains a central parallel β-sheet linked by α-helices and shows the closest structural similarity to corresponding domains in other aconitase family members. The AcnX subfamily catalyses distinct dehydration reactions compared to classical aconitases: Type I enzymes from bacteria and fungi dehydrate cis-3-hydroxy-L-proline, whilst Type II enzymes from archaea dehydrate mevalonate 5-phosphate. This domain contributes to the substrate-binding site and contains residues involved in substrate recognition, though it does not directly coordinate the iron-sulphur cluster that distinguishes AcnX enzymes from other aconitase family members.
