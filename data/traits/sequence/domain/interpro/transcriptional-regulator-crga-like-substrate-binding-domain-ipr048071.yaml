identifier: InterPro:IPR048071
label: "Transcriptional regulator CrgA-like, substrate binding domain"
definition: >-
  This entry represents the substrate binding domain of the LysR-type transcriptional regulator CrgA and similar proteins from proteobacteria. This entry includes the LysR-type transcriptional regulator (LTTR) CrgA from Neisseria meningitidis and similar proteins, such as the uncharacterised HTH-type transcriptional regulator YafC from E.coli. In contrast to the tetrameric form of other LTTRs, CrgA from Neisseria meningitidis assembles into an octameric ring, which can bind up to four 63-bp DNA oligonucleotides. Phylogenetic cluster analysis further showed that the CrgA-like regulators form a subclass of the LTTRs that function as octamers. The CrgA is an auto-repressor of its own gene and activates the expression of the mdaB gene, which coding for an NADPH-quinone reductase, and its action is increased by MBL (alpha-methylene-gamma-butyrolactone), an inducer of NADPH-quinone oxidoreductase. CrgA consists of an N-terminal HTH-domain and a C-terminal substrate binding domain whose structural topology is most similar to that of the type 2 periplasmic binding proteins (PBP2), which are responsible for the uptake of a variety of substrates such as phosphate, sulfate, polysaccharides, lysine/arginine/ornithine, and histidine. The PBP2 bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. After binding their specific ligand with high affinity, they can interact with a cognate membrane transport complex comprised of two integral membrane domains and two cytoplasmically located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energised by ATP hydrolysis.
