identifier: InterPro:IPR060671
label: "EVI2B, conserved region"
definition: >-
  This entry covers the most highly conserved region of the proteins. It includes a potential transmembrane helix. EVI2B is a gene lying within an intron of the neurofibromatosis type 1 (NF1) gene. As NF1, it might be involved in differentiation of melanocytes and keratinocytes.
