identifier: InterPro:IPR043257
label: "Ring-hydroxylating dioxygenase large subunit NdoB-related protein, N-terminal Rieske domain"
definition: >-
  This entry represents the Rieske domain found at the N-terminal of some uncharacterised proteins from bacteria. Proteins containing this domain also contain a C-terminal domain found in the NDO-like alpha subunit of the ring-hydroxylating dioxygenase. However, the characterised naphthalene 1,2-dioxygenase large subunit NdoB from Pseudomonas sp. is not included in this entry.
