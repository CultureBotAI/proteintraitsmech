identifier: InterPro:IPR014838
label: Poliovirus 3A protein-like
definition: >-
  The 3A protein is found in positive-strand RNA viruses. It is a critical component of the poliovirus replication complex, and is also an inhibitor of host cell ER to Golgi transport.
