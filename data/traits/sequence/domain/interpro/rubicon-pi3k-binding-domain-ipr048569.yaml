identifier: InterPro:IPR048569
label: "Rubicon, PI3K-binding domain"
definition: >-
  This is the PI3K-binding domain (PIKBD) localised in the middle region of Rubicon, rubicon-like proteins such as PACER and homologues from animals. Rubicon is a potent negative regulator of autophagy through the interaction with Rab7-GTP. This domain is predicted to have disordered and helical regions.
