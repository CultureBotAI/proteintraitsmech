identifier: InterPro:IPR025891
label: "Developmental pluripotency-associated protein 2/4, C-terminal domain"
definition: >-
  This domain has been characterised in the finding of a developmental pluripotency associated gene (Dppa) in the lower vertebrate Xenopus laevis. Previous to this discovery, Dppa genes were known only in higher vertebrates.
