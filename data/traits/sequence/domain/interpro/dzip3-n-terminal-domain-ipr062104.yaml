identifier: InterPro:IPR062104
label: "DZIP3, N-terminal domain"
definition: >-
  This is a domain found at the N-terminal of E3 ubiquitin-protein ligase DZIP3 from human and similar sequences. DZIP3 is a RNA-binding ubiquitin-protein ligase that targets H2AK119 (lysine 119 of histone H2A). It interacts with CARM1 (coactivator-associated arginine methyltransferase 1) through its RING domain and may act as a coactivator of ERalpha target gene expression.
