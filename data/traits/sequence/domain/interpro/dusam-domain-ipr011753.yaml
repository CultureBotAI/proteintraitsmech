identifier: InterPro:IPR011753
label: "DUSAM domain"
definition: >-
  This domain is found in at least eight paraloguous proteins in Myxococcus xanthus and six in Stigmatella aurantiaca DW4/3-1, both members of Myxococcales order within the Deltaproteobacteria. The function is unknown. Some proteins consist of two copies of the domain. This domain is hereby named DUSAM, DUplication in Stigmatella And Myxococcus.
