identifier: InterPro:IPR059024
label: "Synergin gamma, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of human SYNRG and similar proteins. This domain is predicted to adopt a mainly α configuration. Synergin gamma (SYNRG) plays a role in endocytosis and/or membrane trafficking at the trans-Golgi network. It is a component of clathrin-coated vesicles and of the aftiphilin/p200/gamma-synergin complex, which plays roles in AP1G1/AP-1-mediated protein trafficking.
