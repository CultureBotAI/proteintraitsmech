identifier: InterPro:IPR019477
label: "Rhodopsin, N-terminal"
definition: >-
  Rhodopsin is the archetypal G-protein-coupled receptor. Such receptors participate in virtually all physiological processes as signalling molecules. They utilise heterotrimeric guanosine triphosphate (GTP)-binding proteins to transduce extracellular signals to intracellular events. Rhodopsin is important because of the pivotal role it plays in visual signal transduction. It is a dimeric transmembrane protein whose intradiskal surface consists of an N-terminal domain and three loops connecting six of the seven transmembrane helices. The N-terminal domain is a compact α-helical region with breaks and bends at proline residues outside the membrane. This entry represents the N-terminal domain. The N-terminal domain is extracellular is and is necessary for successful dimerisation and molecular stability.
