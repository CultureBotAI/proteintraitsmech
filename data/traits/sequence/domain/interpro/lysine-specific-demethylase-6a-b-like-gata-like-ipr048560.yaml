identifier: InterPro:IPR048560
label: "Lysine-specific demethylase 6A/B-like, GATA-like"
definition: >-
  This entry represents the Zn-coordinated GATA-like (GATAL) domain of human Lysine-specific demethylase 6A/B and similar animal sequences. This region seems to be sensitive to redox environment. It is involved in substrate binding. Histone lysine (K) demethylases (KDMs) catalyse the demethylation of lysine residue from histone tails. This entry includes KDM6 subfamily that contains a conserved catalytic Jumonji C (JmjC) domain and includes KDM6A (also known as UTX), KDM6B (also known as JMJD3) and the related histone demethylase UTY (also known as KMD6C).
