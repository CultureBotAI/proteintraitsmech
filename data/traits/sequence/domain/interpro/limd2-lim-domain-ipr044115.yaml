identifier: InterPro:IPR044115
label: "LIMD2, LIM domain"
definition: >-
  In general, LIM domains coordinate one or more zinc atoms, and are named after the three proteins (LIN-11, Isl1 and MEC-3) in which they were first found. They consist of two zinc-binding motifs that resemble GATA-like Znf's, however the residues holding the zinc atom(s) are variable, involving Cys, His, Asp or Glu residues. LIM domain-containing proteins have diverse cellular roles such as regulators of gene expression, cyto-architecture, cell adhesion, cell motility, and signal transduction. LIM domain-containing proteins have been shown to be key molecules in a wide variety of human cancers. LIMD2 binds directly to the kinase domain of integrin-linked kinase (ILK) near the active site and strongly activated ILK kinase activity. Its LIM-domain structure is highly related to LIM1 of PINCH1, a core component of the integrin-linked kinase-parvin-pinch complex.
