identifier: InterPro:IPR046673
label: "Dermonecrotic toxin, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of bacterial proteins, such as the dermonecrotic toxin (ToxA, also known as PMT) from Pasteurella multocida, an osteolytic toxin that induces bone resorption. It is a potent mitogen. This toxin is associated with the severe progressive form of the atrophic rhinitis, a major respiratory disease in pigs. This domain contributes to the membrane localization of its C-terminal domains.
