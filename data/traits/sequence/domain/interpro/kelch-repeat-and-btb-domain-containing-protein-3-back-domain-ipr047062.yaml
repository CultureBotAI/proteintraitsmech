identifier: InterPro:IPR047062
label: "Kelch repeat and BTB domain-containing protein 3, BACK domain"
definition: >-
  The BTB superfamily includes KLHL (Kelch-like), KBTBD (Kelch repeat and BTB domain-containing), and KLHDC (Kelch domain-containing) subfamilies, which encompass structurally related molecules that differ in the types and numbers of their protein domains. The domain composition can appear to vary depending on the protein domain prediction program. For example, KLHL29, KLHL31, KLHL40, and KLHL41 were previously assigned within the KBTBD family as KBTBD9, KBTBD1, KBTBD5, and KBTBD10 respectively. KBTBD proteins have typically one BTB/POZ domain, occasionally a BACK domain, and two to four Kelch motifs. KBTBD3, also termed BTB and kelch domain-containing protein 3 (BKLHD3), is a BTB-Kelch family protein. Its function remains unclear. This entry represents the BACK domain.
