identifier: InterPro:IPR035044
label: "SHF, SH2 domain"
definition: >-
  This entry represents the SH2 domain of SHF. SHF (SH2 domain-containing adapter protein F) is an adapter protein which may play a role in the regulation of apoptosis in response to PDGF. It contains four putative tyrosine phosphorylation sites and an SH2 domain.
