identifier: InterPro:IPR041276
label: "Vacuolar ATPase subunit I, N-terminal proximal lobe"
definition: >-
  This domain is found in the cytoplasmic N-terminal domain of vacuolar ATP synthase subunit I present in Meiothermus ruber. Subunit I is a homologue of subunit A which associates with the membrane-bound complex of eukaryotic vacuolar H+-ATPase (V-ATPase) acidification machinery. The domain forms the proximal lobe that caps one end of the α helix bundle, with the distal lobe capping the other end. Although the two lobes exhibit a similar motif, the molecular nature of the coupling with the identical stalks is thought to be dissimilar.
