identifier: InterPro:IPR060287
label: "Centrosomal protein of 295 kDa-like"
definition: >-
  This entry represents the N-terminal region of the Centrosomal protein of 295 kDa and the full-length CEP295 N-terminal-like protein (CEP295NL), also known as differential display clone 8 (DDC8). CEP295 was originally identified as a gene expressed during spermatogenesis. CEP295NL localises to motile cilia in mature spermatozoa and is expressed during postmeiotic stages of spermatogenesis. The protein is detected in various tissues including retina, lung, kidney and brain regions, with expression patterns that change during development. CEP295NL contains coiled coil domains and multiple disordered regions. Expression is up-regulated following brain injury. The protein shows similarity to the N-terminal region of CEP295, a centriole-enriched microtubule-binding protein involved in centriole biogenesis [ , , cite:27185865], ]. It is also required for centriole-to-centrosome conversion during mitotic progression, but is dispensable for cartwheel removal or centriole disengagement.
