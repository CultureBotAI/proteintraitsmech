identifier: InterPro:IPR010166
label: Transcriptional regulator SarA/Rot domain
definition: >-
  This entry represents a domain found in a family of transcriptional regulatory proteins in Staphylococcal species, including SarA and Rot. Some members contain two tandem copies of this region. This family is related to the MarR transcriptional regulator family, . SarA is a global regulator with both positive and negative effects that controls expression of several virulence factors and biofilm formation process in a cell density-dependent manner.
