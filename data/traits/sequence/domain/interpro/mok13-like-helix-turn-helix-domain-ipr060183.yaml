identifier: InterPro:IPR060183
label: "Mok13-like, helix-turn-helix domain"
definition: >-
  This presumed HTH domain is found in the family of fungal cell wall alpha-1,3-glucan synthase enzymes such as Mok11, Mok12, Mok13, Mok14 and Ags1. These enzymes are involved in the biosynthesis of alpha-1,3-glucan, a key structural polysaccharide in fungal cell walls. They play critical roles in maintaining cell integrity, morphology, and virulence. Mok12 and Mok13 are involved in the synthesis of the greater part of alpha-glucan in the spores envelope, a polymer that is mainly digested with mutanase.
