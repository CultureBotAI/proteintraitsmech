identifier: InterPro:IPR057614
label: "Serine/threonine-protein kinase PKH3, C-terminal PH domain"
definition: >-
  This entry represents a pleckstrin homology (PH) domain found at the C-terminal of PKH3 protein kinases. The domain is found C-terminal to a protein kinase catalytic domain (Pkinase, ). PKH3 kinases are involved in serine/threonine phosphorylation. Eukaryotic protein kinases are enzymes that belong to a very extensive family of proteins which share a conserved catalytic core common with both serine/threonine and tyrosine protein kinases. There are a number of conserved regions in the catalytic domain of protein kinases. In the N-terminal extremity of the catalytic domain there is a glycine-rich stretch of residues in the vicinity of a lysine residue, which has been shown to be involved in ATP binding. In the central part of the catalytic domain there is a conserved aspartic acid residue which is important for the catalytic activity of the enzyme.
