identifier: InterPro:IPR062606
label: "RNA end formation protein REF2, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of RNA end formation protein REF2. Members are found in Saccharomycetaceae yeasts. REF2 is an RNA-binding component of the cleavage and polyadenylation factor complex involved in mRNA and snoRNA 3'-end formation. The protein is localised to the nucleus and acts as a negative regulator of poly(A) synthesis. The specific function of this domain remains to be determined.
