identifier: InterPro:IPR048823
label: "CRISPR-associated nuclease/helicase Cas3, I-F/YPEST, Cas2 domain"
definition: >-
  This is the N-terminal domain of CRISPR-associated nuclease/helicase Cas3 subtype I-F/YPEST from Pseudomonas aeruginosa and similar sequences predominantly found in proteobacteria. In the type I-F CRISPR-Cas system, Cas3 is fused with Cas2 at the N terminus. This entry represents the Cas2 domain of Cas3, which shows a four-stranded β-sheet and two α-helices, in a structure that resembles that of Cas2 from the Escherichia coli. It appears N- terminal to the histidine-aspartate (HD)-type nuclease domain.
