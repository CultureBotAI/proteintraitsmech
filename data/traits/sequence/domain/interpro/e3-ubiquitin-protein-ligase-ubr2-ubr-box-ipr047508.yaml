identifier: InterPro:IPR047508
label: "E3 ubiquitin-protein ligase UBR2, UBR-box"
definition: >-
  This entry represents the UBR-box of human UBR2 and similar proteins found in vertebrates. E3 ubiquitin-protein ligase UBR2 ( ), also called ubiquitin-protein ligase E3-alpha-II (E3alpha-II), or N-recognin-2, is a RING-type E3 ubiquitin ligase of the Arg/N-end rule degradation pathway. It recognises and binds to proteins bearing specific N-terminal residues that are destabilising according to the N-end rule, leading to their ubiquitination and subsequent degradation. UBR2 is associated with chromatin and controls chromatin dynamics and gene expression in both germ cells and somatic cells. It plays an important role in spermatogenesis.
