identifier: InterPro:IPR060263
label: "Thioredoxin-like domain, plants"
definition: >-
  This entry represents a Thioredoxin-like domain at the N-terminal in putative Thioredoxin-domain containing proteins and other uncharacterised proteins mostly found in plants. This domain belongs to the Thioredoxin-like superfamily . Members of this superfamily are small redox-active proteins that mediate thiol-disulfide exchange through a conserved active-site disulfide bond. They share a characteristic thioredoxin fold, consisting of a three-layer α/β/α sandwich with a central mixed β-sheet. These proteins typically function in redox regulation by cycling between oxidised and reduced forms. This domain is usually found associated with .
