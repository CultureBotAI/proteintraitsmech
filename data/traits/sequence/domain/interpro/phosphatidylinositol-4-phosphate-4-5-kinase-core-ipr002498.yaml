identifier: InterPro:IPR002498
label: Phosphatidylinositol-4-phosphate 4/5-kinase, core
definition: >-
  This entry represents a conserved region from the common kinase core found in the type I phosphatidylinositol-4-phosphate 4 and 5-kinases (PIP4K/PIP5K) family as described in. This region is found in I, II and III phosphatidylinositol-4-phosphate 5-kinases (PIP5K enzymes). PIP5K catalyses the formation of phosphoinositol-4,5-bisphosphate via the phosphorylation of phosphatidylinositol-4-phosphate a precursor in the phosphoinositide signalling pathway. This domain is also found in 1-phosphatidylinositol-3-phosphate 5-kinases, such as FAB1 from yeast and Drosophila, and FAB1A-D from Arabidopsis which catalyses the phosphorylation of phosphatidylinositol 3-phosphate on the fifth hydroxyl of the myo-inositol ring, to form phosphatidylinositol 3,5-bisphosphate. FAB1C from Arabidopsis is predicted to act as a phosphatidylinositol-3P 5-kinase, but, because it lacks a FYVE domain, it is unlikely to be efficiently targeted to membranes containing the proposed phosphatidylinositol-3P substrate. Therefore, its molecular function remains unknown.
