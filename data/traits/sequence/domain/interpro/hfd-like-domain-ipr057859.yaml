identifier: InterPro:IPR057859
label: "HFD-like domain"
definition: >-
  This entry represents the C-terminal domain of the head fibre dimeric protein (HFD) found in crassviruses from the order Crassvirales. This entry also contains a small number of other non-phage proteins that share this domain; in these proteins, this domain is not at the C-terminal. In the crAss001 virus, this protein (gp29) forms dimers that bind to winged hexon pockets at the capsid surface. The N-terminal domain (residues 1-58) interacts with the major capsid protein, while the C-terminal domain (residues 58-118) forms a β-sandwich with structural similarity to the immunoglobulin-like fold. This protein is likely involved in host recognition and binding, with the two different fibre proteins (dimeric and trimeric) providing different binding specificities to external molecules. Homologues of this protein are present primarily in the Steigviridae (beta) and Crevaviridae (gamma) groups of crassviruses. This entry also contains some other non-phage proteins that share this domain; in these proteins, this domain is not at the C-terminal.
