identifier: InterPro:IPR035754
label: "SPRY domain-containing SOCS box protein 3, SPRY domain"
definition: >-
  The SPRY domain-containing SOCS box protein family (SPSB1-4, also known as SSB-1 to -4) is composed of a central SPRY protein-interaction domain and a C-terminal SOCS box. All four SPSB proteins interact with c-Met, the hepatocyte growth factor receptor. This entry represents the the SPRY domain of SPSB3.
