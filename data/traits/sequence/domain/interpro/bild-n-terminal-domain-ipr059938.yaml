identifier: InterPro:IPR059938
label: "BilD, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of BilD proteins found in bacteria. BilD is a bacterial E1-like protein that functions as a component of the Bil antiviral defence system. The full-length BilD protein activates ubiquitin-like BilA by adenylating its C-terminal glycine residue with ATP and conjugating it to bacteriophage proteins. The specific function of this N-terminal domain remains to be determined.
