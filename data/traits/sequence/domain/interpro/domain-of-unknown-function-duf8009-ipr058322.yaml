label: "Domain of unknown function DUF8009"
definition: >-
  This entry represents a family of uncharacterised proteins found in halobacteria. The proteins in this family adopt a six stranded barrel like topology with several inserted α helices. The barrel shows incomplete hydrogen bonding between strands.
