identifier: InterPro:IPR015293
label: "1,4-alpha-glucan branching enzyme, C-terminal"
definition: >-
  This entry represents the C-terminal domain found in bacterial 1,4-alpha-glucan branching enzymes ( ), such as TTHA1902 from Thermus thermophilus and TK1436 from Thermococcus kodakarensis, which belong to the glycoside hydrolase family 57 . These enzymes catalyse the formation of branch points in alpha-glucans by cleavage of an alpha-1,4 glycosidic bond and subsequent transfer of the cleaved-off oligosaccharide to a new alpha-1,6 position. This is an α-helical domain composed of a four α-helical bundle and plays a role in the formation of the active-site cleft, being essential for substrate binding and catalysis.
