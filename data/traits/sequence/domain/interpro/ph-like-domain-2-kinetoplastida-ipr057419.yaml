identifier: InterPro:IPR057419
label: "PH-like domain 2, kinetoplastida"
definition: >-
  This entry represents a domain found centrally in a small group of uncharacterised kinetoplastid proteins. This domain adopts a PH-like fold. It is found in proteins that have an α-helical solenoid N-terminal domain, a central PH domain (this entry) and a long α helix at the C terminus that presumably forms a coiled-coil.
