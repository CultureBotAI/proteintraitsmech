identifier: InterPro:IPR037841
label: Histone-lysine N-methyltransferase SETD1A/B-like, SET domain
definition: >-
  In animals, SETD1A/B are histone methyltransferases that produce mono-, di-, and trimethylated histone H3 at 'Lys-4. However, if 'Lys-9' residue is already methylated, 'Lys-4' will not be. The 'Lys-4' methylation is a tag for epigenetic transcriptional activation. The animal COMPASS complex is composed of at least the catalytic subunit (SETD1A or SETD1B), WDR5, WDR82, RBBP5, ASH2L/ASH2, CXXC1/CFP1, HCFC1 and DPY30. ATXR7, the Arabidopsis homologue to Set1, is required for the expression of the flowering repressors FLC and MADS-box genes of the MAF family. ATXR7 is also involved in the control of seed dormancy and germination. This entry represents the SET domain found in SETD1A/B and its homologues.
