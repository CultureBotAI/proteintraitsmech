identifier: InterPro:IPR058155
label: "Skg3/CAF120-like, PH-like domain"
definition: >-
  This entry represents the second pleckstrin homology (PH) domain found in fungal proteins including Skg3 and components of the CCR4-NOT complex such as CAF120 in Saccharomyces cerevisiae. SKG3 may play a role in cell wall integrity. This domain is found C-terminal to another PH domain.
