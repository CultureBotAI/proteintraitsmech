identifier: InterPro:IPR014774
label: "KaiC-like domain"
definition: >-
  This entry represents a domain found in KaiC, which is a core component of the KaiBC clock oscillator complex that constitutes the main circadian regulator in cyanobacteria. The Circadian clock oscillator protein KaiC, is encoded in the kaiABC operon that controls circadian rhythms and may be universal in Cyanobacteria. Each member contains two copies of this domain, which is also found in other proteins. KaiC performs autophosphorylation and acts as its own transcriptional repressor. This entry also includes FlaH, a component of the archaella motility machinery. The FlaH adopts a P-loop NTPase fold ( , ) that binds ATP which is essential for its interaction with FlaI and for archaellum assembly. FlaH interacts with the C terminus of FlaX, which is essential for FlaX ring formation and to mediate interaction with FlaI. This domain is also found in DNA repair protein RadA from Brucella abortus, a DNA-dependent ATPase involved in processing of recombination intermediates that play a role in repairing DNA breaks. This group of proteins also include uncharacterised archaeal proteins that belong to the UPF0273 family.
