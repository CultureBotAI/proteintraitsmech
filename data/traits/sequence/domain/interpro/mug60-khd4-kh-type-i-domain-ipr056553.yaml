identifier: InterPro:IPR056553
label: "Mug60/KHD4, KH type I domain"
definition: >-
  This is a type I KH domain found in Meiotically up-regulated gene 60 protein (Mug60) from Schizosaccharomyces pombe and KHD4 from Ustilago maydis. KHD4 is a RNA-binding protein that recognises the sequence AUACCC. It plays an essential role in filamentous growth and virulence. Mug60 plays a role in meiosis.
