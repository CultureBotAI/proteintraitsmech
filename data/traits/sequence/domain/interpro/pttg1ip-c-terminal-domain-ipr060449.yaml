identifier: InterPro:IPR060449
label: "PTTG1IP, C-terminal domain"
definition: >-
  This entry represents the C-terminal cytoplasmic domain of animal PTTG1IP (pituitary tumor-transforming gene 1 protein-interacting protein). PTTG1IP is is a single-pass type I membrane protein that interacts with PTTG1 and may facilitate PTTG1 nuclear translocation. This cytoplasmic domain contains a predicted coiled-coil region and a nuclear localisation signal. The protein is ubiquitously expressed and undergoes phosphorylation at tyrosine residues. The function of this domain remains to be determined.
