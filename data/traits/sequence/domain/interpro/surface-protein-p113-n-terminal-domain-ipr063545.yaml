identifier: InterPro:IPR063545
label: "Surface protein P113, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of surface protein P113 and related proteins in Plasmodium species. This domain contains a galactose/rhamnose binding lectin-like fold. Due to the lack of rhamnose-binding key residues, the galactose/rhamnose-binding lectin-like domains of P113 do not form a binding pocket for rhamnose. Therefore, P113 is unlikely to act as a rhamnose-binding lectin. P113 is a GPI-anchored membrane receptor that tethers secreted RH5 to the merozoite membrane during invasion of host erythrocytes. The protein forms a complex with RH5 and human basigin that bridges merozoite and erythrocyte membranes. P113 is expressed during asexual blood stages, specifically at the schizont stage and in free merozoites.
