identifier: InterPro:IPR013225
label: "Transcriptional repressor PaaX-like, C-terminal"
definition: >-
  This entry represents the C-terminal domain of the Transcriptional repressor PaaX from Escherichia coli and similar bacterial proteins. PaaX is involved in metabolism of phenylacetic acid. This protein is involved in the regulation of expression of a group of proteins known to participate in the metabolism of phenylacetic acid.
