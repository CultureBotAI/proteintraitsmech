identifier: InterPro:IPR044441
label: Dicer, double-stranded RNA-binding domain
definition: >-
  This entry represents the DRSM domain found in Dicer and related proteins. Dicer has been linked to human cancers. Dicer endoribonuclease plays a central role in short dsRNA-mediated post-transcriptional gene silencing. It cleaves naturally occurring long dsRNAs and short hairpin pre-microRNAs (miRNA) into fragments of twenty-one to twenty-three nucleotides with 3' overhang of two nucleotides, producing respectively short interfering RNAs (siRNA) and mature microRNAs. Dicer shows two N-terminal helicase domains, a dimerisation domain, a platform domain, a PAZ domain, two RNase III a/b domains and a dsRNA-binding domain in its C-terminal region.
