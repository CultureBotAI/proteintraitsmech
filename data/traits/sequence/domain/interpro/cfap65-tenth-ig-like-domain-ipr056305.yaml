identifier: InterPro:IPR056305
label: "CFAP65, tenth Ig-like domain"
definition: >-
  This entry represents the tenth Ig-like domain located towards the C-terminal in human Cilia- and flagella-associated protein 65 (CFAP65) and similar animal sequences. Cilia-Flagella-Associated Protein 65 (CFAP65) is involved in the structural and functional integrity of cilia and flagella. This protein is implicated in the process of flagellar formation and is essential for proper sperm motility, suggesting a role in reproductive biology. CFAP65's function in flagellar assembly indicates its importance in the motility and sensory functions of cilia and flagella across different species.
