identifier: InterPro:IPR056827
label: "Agd3, CBM87"
definition: >-
  This entry represents the carbohydrate binding module (CBM) domain found at the N-terminal of the exopolysaccharide deacetylase Agd3 from Aspergillus fumigatus, a protein required for biofilm formation. This is the founding member of CBM family 87.
