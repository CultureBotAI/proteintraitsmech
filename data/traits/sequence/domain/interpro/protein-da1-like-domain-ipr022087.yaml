identifier: InterPro:IPR022087
label: "Protein DA1-like domain"
definition: >-
  Proteins containing this domain include protein DA1 and its homologues. In Arabidopsis thaliana, DA1 is a ubiquitin-activated endopeptidase that limits final seed and organ size by restricting the period of cell proliferation. DA1 is activated by the RING E3 ligases Big Brother and DA2, both of which are then inactivated by cleavage by the active peptidase. DA1 also cleaves and inactivates deubiquitinase UBP15 and transcription factors TCP15 and TCP22, all of which promote cell proliferation. Presence of an HEXXH motif, which when mutated leads to inactivity, suggests that DA1 is a metalloendopeptidase.
