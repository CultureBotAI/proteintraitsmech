identifier: InterPro:IPR034325
label: S-100
definition: >-
  This entry represents the S-100 domain. Proteins containing this domain are belonging to the largest family within the superfamily of proteins carrying the Ca-binding EF-hand motif. S100 proteins are expressed exclusively in vertebrates, and are implicated in intracellular and extracellular regulatory activities. Intracellularly, S100 proteins act as Ca-signaling or Ca-buffering proteins. Many S100 proteins have been found to bind transition metals, such as Zn2+ and Cu2+.
