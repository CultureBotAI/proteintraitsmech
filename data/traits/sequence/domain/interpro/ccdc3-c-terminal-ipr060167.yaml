identifier: InterPro:IPR060167
label: "CCDC3, C-terminal"
definition: >-
  This entry represents the C-terminal coiled-coil domain of coiled-coil domain-containing protein 3 (CCDC3). CCDC3 is found across vertebrate species and forms homodimers through this coiled-coil region. The full-length CCDC3 protein negatively regulates TNF-alpha-induced pro-inflammatory responses in endothelial cells and positively regulates lipid accumulation in adipose cells. CCDC3 is secreted and expressed in adipose tissue, endothelial cells and aorta. The specific function of this C-terminal coiled-coil domain remains to be determined.
