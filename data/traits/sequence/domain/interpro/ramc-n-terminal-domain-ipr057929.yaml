identifier: InterPro:IPR057929
label: "RamC, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of RamC. Probable SapB synthase from Streptomyces coelicolor (RamC) is required for aerial hyphae formation. It is probably involved in processing the precursor of SapB to its mature form. It shows an α-β configuration. This protein is part of the LanC-like protein superfamily represented by .
