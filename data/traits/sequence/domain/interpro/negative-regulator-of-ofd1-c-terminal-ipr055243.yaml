identifier: InterPro:IPR055243
label: "Negative regulator of ofd1, C-terminal"
definition: >-
  This entry represents the C-terminal region of fission yeast Negative regulator of ofd1 (Nro1), whose α-helices are grouped in six helical hairpins. This protein is a positive regulator of the stability of the N-terminal transcription factor domain (Sre1N) of sre1 which is released from the membrane and enters the nucleus to activate hypoxic gene expression. It also fuctions as a direct inhibitor of ofd1, probably by inhibiting the ability of the ofd1 to accelerate Sre1N degradation in absence of oxygen.
