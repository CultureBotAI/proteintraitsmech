identifier: InterPro:IPR063754
label: "At5g19025-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the uncharacterised At5g19025 family of plant proteins. The N-terminal region of these proteins is represented by . The full-length proteins are predicted to be multi-pass membrane proteins with three transmembrane helices located between the N-terminal and C-terminal domains. The function of this domain remains to be determined.
