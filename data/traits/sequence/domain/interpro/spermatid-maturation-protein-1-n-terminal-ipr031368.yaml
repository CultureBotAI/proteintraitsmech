identifier: InterPro:IPR031368
label: "Spermatid maturation protein 1, N-terminal"
definition: >-
  This entry represents the N-terminal of Spem1. This domain can also be found in human uncharacterised protein C17orf74. Spem1 is exclusively expressed in the cytoplasm of spermatids during the last three steps of spermiogenesis in the mouse testis, and male mice deficient in Spem1 are completely infertile because of deformed sperm.
