identifier: InterPro:IPR059829
label: "EspK, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of EspK, an ESX-1 secretion- associated protein from Mycobacterium tuberculosis. EspK is a 729 amino acid protein (gene Rv3879c) that may act as a chaperone facilitating EspB secretion through interaction with EccCb1. The protein is localised to the cytoplasm and interacts with EspB and EccCb1 as part of the ESX-1 type VII secretion system. EspK contains disordered regions and is annotated as COG4932. The specific function of this C-terminal domain remains to be determined.
