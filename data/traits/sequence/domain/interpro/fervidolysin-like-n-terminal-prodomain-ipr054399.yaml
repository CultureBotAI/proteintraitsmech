identifier: InterPro:IPR054399
label: "Fervidolysin-like, N-terminal prodomain"
definition: >-
  This entry represents the N-terminal prodomain of Fervidolysin from Fervidobacterium pennivorans, an extracellular subtilisin-like serine protease able to degrade keratin into peptides. This domain folds into a globular α/β structure consisting of four-stranded antiparallel β-sheet and two α-helices packed on one side of it. The prodomain is proteolytically cleaved and removed from the proenzyme. Members of this group are found in bacteria.
