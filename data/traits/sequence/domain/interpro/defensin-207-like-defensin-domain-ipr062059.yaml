identifier: InterPro:IPR062059
label: "Defensin 207-like, defensin domain"
definition: >-
  This entry represents the defensin domain found in Defensin 206, 207 and 208 proteins. These proteins are small secreted peptides involved in plant defence against fungi and other pathogens. The domain is characterised by a conserved pattern of cysteine residues that form disulphide bonds, typically three disulphide bonds in most family members. However, some members of this proteins lack one of the four conserved disulphide bonds. The proteins are synthesised as precursors with an N-terminal signal peptide for secretion. This domain is found across plants, particularly in the Brassicaceae, and includes over 300 genes in Arabidopsis thaliana alone. The defensin domain confers antimicrobial and fungicidal activity.
