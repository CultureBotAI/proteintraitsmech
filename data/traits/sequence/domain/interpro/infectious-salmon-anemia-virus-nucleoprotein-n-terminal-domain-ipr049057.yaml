identifier: InterPro:IPR049057
label: "Infectious salmon anemia virus nucleoprotein, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the salmon anemia virus nucleoprotein which has an α/β fold consisting of three antiparallel β-strands and two α-helices in an extended shape and interacts with the rest of the structure. This domain may regulate the dynamics of the NP RNA binding.
