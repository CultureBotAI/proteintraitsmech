identifier: InterPro:IPR022106
label: "Paired box protein 7, C-terminal"
definition: >-
  This domain is found in the C-terminal region of Pax7, which is a transcription factor playing a role in myogenesis through regulation of muscle precursor cells proliferation. Proteins containing this domain also include Pax3.
