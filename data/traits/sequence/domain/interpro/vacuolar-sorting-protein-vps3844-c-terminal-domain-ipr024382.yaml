identifier: InterPro:IPR024382
label: "Vacuolar sorting protein Vps3844, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain (previously known as DUF3844) of the uncharacterised endoplasmic reticulum membrane protein C1709.03 from S. pombe, which was renamed to vacuolar sorting protein Vps3844. This domain contains 8 largely conserved cysteine residues and the region comprising amino acids 354 to 380 is important for protein trafficking to the vacuole. This protein is conserved in fungi, particularly S. pombe, but lacks representation in S. cerevisiae.
