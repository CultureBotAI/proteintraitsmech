identifier: InterPro:IPR063611
label: "Vitellogenin, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain from Vitellogenin, Microsomal triglyceride transfer protein and apolipoprotein B-100. These proteins are all involved in lipid transport. This domain folds into an open β-barrel composed of an antiparallel β-sheet wrapped around a central α-helix. This domain is responsible for receptor binding.
