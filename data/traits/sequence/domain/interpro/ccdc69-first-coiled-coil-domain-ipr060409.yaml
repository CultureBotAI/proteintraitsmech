identifier: InterPro:IPR060409
label: "CCDC69, first coiled-coil domain"
definition: >-
  This entry represents the first coiled-coil in CCDC96 proteins found in animals. CCDC69 acts as a scaffold to regulate the recruitment and assembly of spindle midzone components. CCDC69 is required for the localisation of AURKB and PLK1 to the spindle midzone. During cell division, CCDC69 localises along overlapping interpolar microtubules in early anaphase, concentrates at the spindle midzone centre during late anaphase, and accumulates at the midbody during telophase. CCDC69 contains an N-terminal myristoylation site for membrane association.
