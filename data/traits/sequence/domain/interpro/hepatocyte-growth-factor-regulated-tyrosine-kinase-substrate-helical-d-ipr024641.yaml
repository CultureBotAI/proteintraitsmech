identifier: InterPro:IPR024641
label: "Hepatocyte growth factor-regulated tyrosine kinase substrate, helical domain"
definition: >-
  This domain comprises the helical region of hepatocyte growth factor-regulated tyrosine kinase substrate (HRS). It is approximately 100 amino acids in length. Hrs, together with signal transducing adaptor molecule (STAM), forms the ESCRT-0 complex, which sorts ubiquitinated cell surface receptors to lysosomes for degradation.
