identifier: InterPro:IPR047052
label: "Zinc finger ZZ-type and EF-hand domain-containing protein 1, APC10/DOC1-like domain"
definition: >-
  This group of proteins is found in animals and includes Zinc finger ZZ-type and EF-hand domain-containing protein 1 (ZZEF1). ZZEF1 is a histone H3 reader which may act as a transcriptional coactivator for KLF6 and KLF9 transcription factors. This entry represents the APC10/DOC1-like domain of ZZEF1. It is homologous to the APC10 subunit/DOC1 domains present in E3 ubiquitin ligases ( ), which mediate substrate ubiquitination (or ubiquitylation), and are components of the ubiquitin-26S proteasome pathway for selective proteolytic degradation.
