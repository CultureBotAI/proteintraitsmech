identifier: InterPro:IPR057974
label: "NUA/TPR/MLP1-2-like domain"
definition: >-
  This domain is found in human Nucleoprotein TPR, Nuclear-pore anchor from Arabidopsis thaliana (NUA), yeast Protein MLP1/2 and similar eukaryotic proteins. This domain is often found associated with and is predicted to adopt an all-α structure. TPR is a component of the nuclear pore complex (NPC), a complex required for the trafficking across the nuclear envelope. NUA, a component of the nuclear pore complex, acts as a docking site for activities required for desumoylation and mRNA export. It is required for the proper expression or localisation of a subset of miRNAs. MLP1/2 are involved in the structural and functional organisation of perinuclear chromatin.
