identifier: InterPro:IPR055383
label: "Tip attachment protein J, Fn3-1 domain"
definition: >-
  This entry represents the first Fibronectin type III (Fn3) of Tip attachment protein J from Escherichia phage lambda (GpJ) and similar bacterial and viral proteins. It is often found in association with and . The Tip attachment protein J (GpJ) from Escherichia phage lambda is a crucial tail fibre protein responsible for recognising and binding the host cell's LamB receptor, thereby initiating infection. Structurally, GpJ forms the central tail fibre at the phage tip and undergoes conformational changes upon receptor engagement, which are essential for triggering DNA injection into the host. It interacts with other tail proteins during assembly, serving as a scaffold for tail tube formation and coordinating with the tape measure protein to regulate genome delivery. Mutations in GpJ can alter host specificity and affect phage stability, while its exposed position makes it a target for neutralising antibodies.
