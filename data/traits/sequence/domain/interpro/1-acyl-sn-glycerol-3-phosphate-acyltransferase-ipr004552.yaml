identifier: InterPro:IPR004552
label: 1-acyl-sn-glycerol-3-phosphate acyltransferase
definition: >-
  This domain describes the core homologous region of a collection of related proteins, several of which are known to act as 1-acyl-sn-glycerol-3-phosphate acyltransferases ( ). Proteins scoring above the trusted cut-off are likely to have the same general activity, which is to convert acyl-CoA and 1-acyl-SN-glycerol 3-phosphate to CoA and 1,2-diacyl-SN-glycerol 3-phosphate. However, there is variation among characterised members as to whether the acyl group can be donated by acyl carrier protein or coenzyme A, and in the length and saturation of the donated acyl group. 1-acyl-sn-glycerol-3-phosphate acyltransferase is also called 1-AGP acyltransferase, lysophosphatidic acid acyltransferase, and LPA acyltransferase.
