identifier: InterPro:IPR060684
label: "Regulatory protein RecX, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of regulatory protein RecX. This N-terminal domain precedes the HTH domains. This domain is mainly found in Bacillati, including Listeria and Staphylococcus species. This domain is not present in all RecX proteins. RecX functions as a regulator of DNA recombination and repair pathways in bacterial cells. RecX protein is known to inhibit the activity of RecA protein in DNA recombination. It contains three HTH-like domains, first represented by this entry, second ( ) and third ( ).
