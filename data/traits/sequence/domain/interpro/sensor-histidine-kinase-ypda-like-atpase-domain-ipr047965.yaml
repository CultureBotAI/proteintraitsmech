identifier: InterPro:IPR047965
label: "Sensor histidine kinase YpdA-like, ATPase domain"
definition: >-
  This entry represents the histidine kinase-like ATPase (HATPase) domain of various two-component sensor histidine kinase (HKs) such as Escherichia coli YpdA, a HK of the two-component system (TCS) YpdA-YpdB that is involved in a nutrient sensing regulatory network with YehU-YehT. Proteins having this HATPase domain also contain a histidine kinase domain (His-kinase).
