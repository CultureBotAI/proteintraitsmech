identifier: InterPro:IPR035364
label: "Glycosyl hydrolase 101, beta-sandwich domain"
definition: >-
  Virulence of pathogenic organisms such as the Gram-positive Streptococcus pneumoniae is largely determined by the ability to degrade host glycoproteins and to metabolise the resultant carbohydrates. Endo-alpha-N-acetylgalactosaminidase ( ) belongs to the GH101 family of glycoside hydrolases, and specifically cleaves Gal-beta-1,3-GalNAc-alpha-Ser/Thr (T-antigen, galacto-N-biose), the core 1 type O-linked glycan common to mucin glycoproteins. This entry represents a β-sandwich domain in GH101 family proteins.
