identifier: InterPro:IPR060251
label: "Cytidine deaminase-like, bacterial"
definition: >-
  This entry represents a cytidine deaminase-like (CDL) domain found in bacterial proteins. CDL enzymes catalyse the deamination of cytidine and 2'-deoxycitidine with similar efficiencies. The canonical CD domain consists of an α-β(2) -(α-β)2 that folds into three layers. This domain displays a similar fold.
