identifier: InterPro:IPR057367
label: "Transmembrane protein PVRIG, immunoglobulin-like domain"
definition: >-
  This domain is found towards the N-terminal end of PVRIG and similar animal proteins. The human transmembrane protein (PVRIG) is a cell surface receptor for NECTIN2. It may act as a coinhibitory receptor that suppresses T-cell receptor-mediated signals. It competes with CD226 to bind to CD112
