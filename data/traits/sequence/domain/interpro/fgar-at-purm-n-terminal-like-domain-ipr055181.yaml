identifier: InterPro:IPR055181
label: "FGAR-AT, PurM N-terminal-like domain"
definition: >-
  This entry represents the PurM_N-like domain of Phosphoribosylformylglycinamidine synthase from Schizosaccharomyces pombe (FGAR-AT) and related proteins from eukaryotes and bacteria. FGAR-AT catalyses the ATP-dependent conversion of formylglycinamide ribonucleotide (FGAR) to formylglycinamidine ribonucleotide (FGAM) in the fourth step of the purine biosynthetic pathway. This domain consists of an antiparallel β-sheet with two α-helices packed on one side.
