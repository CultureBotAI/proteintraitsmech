identifier: InterPro:IPR047383
label: "Tudor domain-containing protein 8, Tudor domain"
definition: >-
  This entry represents the Tudor domain of TDRD8 and similar proteins mainly found in chordates, which binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. TDRD8, also called serine/threonine-protein kinase ( ) 31 (STK31), serine/threonine-protein kinase NYD-SPK, or Sugen kinase 396 (SgK396), is a germ cell-specific factor expressed in embryonic gonocytes of both sexes, and in postnatal spermatocytes and round spermatids in males. It acts as a cell-cycle regulated protein that contributes to the tumorigenicity of epithelial cancer cells. TDRD8 contains a Tudor domain and a serine/threonine kinase domain.
