identifier: InterPro:IPR049292
label: "Dot/Icm T4SS effector Lem25 domain"
definition: >-
  This domain is found in Dot/Icm T4SS effector Lem25, the hypothetical protein lpg2422 from Legionella pneumophila and related proteins from Legionella species. It adopts an α-helical structure consisting of a four-helical bundle. This domain is found C-terminal to and usually in three tandem copies. Its function is unknown.
