identifier: InterPro:IPR062598
label: "ELG1, middle domain"
definition: >-
  This entry represents the middle domain of telomere length regulation protein ELG1. ELG1 is involved in the negative control of telomere length and in telomeric silencing through a replication-mediated pathway. The protein may have a role in Okazaki fragment maturation and is required for S-phase progression. ELG1 is a component of the RFC-like ELG1-RFC complex which appears to have a role in DNA replication, replication fork re-start, recombination and repair. The C-terminal domain contains a P-loop containing nucleotide triphosphate hydrolase fold and contributes to the assembly of the ELG1-RFC complex with RFC2, RFC3, RFC4 and RFC5. This domain contains helices and disordered regions and is next to the C-terminal domain.
