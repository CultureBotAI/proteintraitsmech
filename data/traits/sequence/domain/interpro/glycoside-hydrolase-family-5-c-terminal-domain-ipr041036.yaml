identifier: InterPro:IPR041036
label: "Glycoside hydrolase family 5, C-terminal domain"
definition: >-
  This is the C-terminal domain found in endo-glycoceramidases (EGC) and glucosylceramidase (an EGC homologue), membrane-associated family 5 glycosidases. The C-terminal domain assumes a β-sandwich fold, which resembles that of many carbohydrate-binding modules.
