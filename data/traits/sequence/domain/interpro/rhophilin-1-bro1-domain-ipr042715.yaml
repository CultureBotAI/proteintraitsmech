identifier: InterPro:IPR042715
label: "Rhophilin-1, BRO1 domain"
definition: >-
  This entry represents the Bro1-like domain of Rhophilin-1, which binds both GDP- and GTP-bound RhoA. Bro1-like domains are boomerang-shaped, and part of the domain is a tetratricopeptide repeat (TPR)-like structure. In addition to this Bro1-like domain, Rhophilin-1 contains an N-terminal Rho-binding domain and a C-terminal PDZ (PS.D.-95, Disc-large, ZO-1) domain. It is a key regulator of the podocyte cytoskeleton and is essential for glomerular filtration. The isolated Bro1-like domain of Rhophilin-1 binds human immunodeficiency virus type 1 (HIV-1) nucleocapsid. Rhophilin-1 lacks the V-shaped (V) domain found in many members of the BRO1_Alix-like superfamily.
