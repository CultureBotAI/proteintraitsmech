identifier: InterPro:IPR045711
label: "Glycoside hydrolase 123-like, N-terminal domain"
definition: >-
  This entry, formerly known as DUF6067, represents a domain found at the N-terminal of some glycoside hydrolase family 123 (GH123) proteins. This domain folds into a twisted β-sandwich that consists of two 5-stranded β-sheets, two small β-strands and four small α-helices.
