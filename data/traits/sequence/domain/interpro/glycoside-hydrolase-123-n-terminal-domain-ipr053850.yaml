identifier: InterPro:IPR053850
label: "Glycoside hydrolase 123, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of a group of glycoside hydrolases 123, from bacteria, including N-acetylgalactosaminidase from Clostridium perfringens. This enzyme removes specific terminal N-D-acetylgalactosamine from glycosphingolipids. This domain folds into a twisted β-sandwich that consists of two 5-stranded β-sheets, two small β-strands and four small α-helices.
