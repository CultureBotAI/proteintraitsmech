identifier: InterPro:IPR025725
label: E3 ubiquitin-protein ligase SopA, catalytic domain
definition: >-
  This domain is found in the Escherichia coli Type III secretion effector proteins SopA. These proteins have been shown to act as E3 ubiquitin ligase enzymes. This domain contains the active site cysteine residue.
