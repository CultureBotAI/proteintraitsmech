identifier: InterPro:IPR034186
label: "Pin4-like, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) in Pin4, a novel phosphothreonine (pThr)-containing protein that specifically interacts with the pThr-binding site of the Rad53 FHA1 domain. Pin4 is involved in normal G2/M cell cycle progression in the absence of DNA damage and functions as a novel target of checkpoint-dependent cell cycle arrest pathways. It contains an N-terminal RRM, a nuclear localization signal, a coiled coil, and a total of 15 SQ/TQ motifs. In S. pombe, Cip1 (Csx1-interacting protein 1) and Cip2 (Csx1-interacting protein 2) are novel cytoplasmic RRM-containing proteins that counteract Csx1 function during oxidative stress. They are not essential for viability in S. pombe. Both cip1 and cip2 contain one RRM. Like Pin4, Cip2 also possesses an R3H motif that may function in sequence-specific binding to single-stranded nucleic acids.
