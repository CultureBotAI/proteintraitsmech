identifier: InterPro:IPR056496
label: "Dynein axonemal assembly factor 11-like, CS domain"
definition: >-
  This domain is found at the C-terminal end of human Dynein axonemal assembly factor 11 (DNAAF11), TilB from Drosophila melanogaster and similar tilB family proteins mainly found in animals. DNAAF11 is involved in dynein arm assembly. It is important for expression and transporting outer dynein arm (ODA) proteins from the cytoplasm to the cilia. TilB is required for cilia structures in Johnston's sensory organ. It plays a role in motility of cilia and flagella. This domain is predicted to fold into a β-sandwich domain and shows structural similarity to the CS domain ( ).
