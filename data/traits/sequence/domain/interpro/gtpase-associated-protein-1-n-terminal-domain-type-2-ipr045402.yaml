identifier: InterPro:IPR045402
label: "GTPase-associated protein 1, N-terminal domain type 2"
definition: >-
  GTPase-associated protein 1 (GAP1) is part of the GTPase-centric systems, a class of NTP-dependent biological conflict systems. It is comprised of three clearly distinguishable globular domains: GAP1-N, GAP1-M and GAP1-C. GAP1 occurs in two distinct subtypes that are readily distinguished by versions of the GAP1-N domain: GAP1-N1 and GAP1-N2. This entry represents the N2 domain (GAP1-N2) found in GAP1. This domain is predicted to mediate effector-GAP1 interactions.
