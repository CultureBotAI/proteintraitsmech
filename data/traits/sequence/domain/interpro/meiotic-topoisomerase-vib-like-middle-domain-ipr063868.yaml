identifier: InterPro:IPR063868
label: "Meiotic topoisomerase VIB-like, middle domain"
definition: >-
  This entry represents the middle domain of MTOPVIB from plants. MTOPVIB is a component of a topoisomerase VI-like complex specifically required for meiotic recombination. The full-length protein interacts with SPO11 proteins to mediate DNA cleavage that forms double-strand breaks initiating meiotic recombination. MTOPVIB retains structural features of the ancestral archaeal Top6B subunit, including a transducer domain and ATP-binding GHKL fold. MTOPVIB is essential for proper chromosome synapsis and formation of bivalents during meiosis. The specific function of this middle domain remains to be determined.
