identifier: InterPro:IPR033835
label: Protein Z-dependent peptidase inhibitor, serpin domain
definition: >-
  Protein Z-dependent protease inhibitor (ZPI; MEROPS identifier I04.005) is a member of the serpin superfamily of proteinase inhibitors, corresponding to clade A10. ZPI inhibits coagulation factor Xa, dependent on protein Z (PZ), a vitamin K-dependent plasma protein. ZPI also inhibits factor XIa in a process that does not require PZ. In general, SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms.
