identifier: InterPro:IPR063188
label: "Phosphotransferase RcsD, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of phosphotransferase RcsD, found in bacteria. RcsD is a component of the Rcs signalling system, which controls transcription of numerous genes. RcsD is a phosphotransfer intermediate between the sensor kinase RcsC and the response regulator RcsB. The system controls expression of genes involved in colanic acid capsule synthesis, biofilm formation and cell division. The protein is localised to the cell inner membrane.
