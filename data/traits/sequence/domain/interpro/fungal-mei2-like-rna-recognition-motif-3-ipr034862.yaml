identifier: InterPro:IPR034862
label: "Fungal Mei2-like, RNA recognition motif 3"
definition: >-
  This entry represents the RNA recognition motif 3 (RRM3) of fungal Mei2-like proteins. The Mei2 protein is an essential component of the switch from mitotic to meiotic growth in the fission yeast Schizosaccharomyces pombe. It is an RNA-binding protein that contains three RNA recognition motifs (RRMs). In the nucleus, S. pombe Mei2 stimulates meiosis upon binding a specific non-coding RNA through its C-terminal RRM motif (RRM3).
