identifier: InterPro:IPR021977
label: D domain of beta-TrCP
definition: >-
  This entry represents the D domain of beta-TrCP, which is a member of the WD40 class of F box proteins, and functions as a ubiquitin ligase. The D domain of these F box proteins is involved in mediating dimerisation of the protein. Dimerisation is necessary to polyubiquitinate substrates, so this D domain is vital in directing substrates towards the proteasome for degradation.
