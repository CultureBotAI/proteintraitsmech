identifier: InterPro:IPR045811
label: MTP large subunit, lipid-binding domain
definition: >-
  Microsomal triglyceride transfer protein large subunit (MTTP) catalyses the transport of triglyceride, cholesteryl ester, and phospholipid between phospholipid surfaces, and is required for the secretion of plasma lipoproteins that contain apolipoprotein B. It is a heterodimer consisting of a large MTP alpha-subunit and a protein disulfide isomerase (PDI) beta-subunit. Mutations in microsomal triglyceride transfer protein (MTP) cause abetalipoproteinemia. The MTP large subunit has and N-terminal β-barrel domain, a central α-helical domain and a C-terminal 2-β-sheet domain. This is the highly conserved MTP C-terminal domain involved in lipid-binding and transfer activity, with preference of neutral 3 chain-containing lipids. The β-sheets are named A and C and form a sandwich comprising the lipid-binding site between them. Half of the A-sheet interacts with the β-barrel. This domain also interacts with a' and b' domains of PDI.
