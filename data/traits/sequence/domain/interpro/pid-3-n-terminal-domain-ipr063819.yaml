identifier: InterPro:IPR063819
label: "PID-3, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of PID-3 (piRNA-induced silencing defective protein 3), found in nematodes. PID-3 is a component of the PETISCO complex required for 21U-RNA biogenesis and embryonic viability. The domain is located at the N-terminal region of the protein, but can be found in another positions in larger similar proteins. PID-3 interacts with PID-1, TOFU-6, TOST-1 and ERH-2 within the PETISCO complexes and is involved in piRNA maturation and chromosome segregation. The protein localises to the cytoplasm and nucleus during early embryogenesis. The specific function of this N-terminal domain remains to be determined.
