identifier: InterPro:IPR025713
label: "Motility protein B-like, N-terminal domain"
definition: >-
  This domain is found in MotB, a component of the Escherichia coli MotA/MotB proton-channel complex that forms the stator of the bacterial membrane flagellar motor. Key residues in MotB act as a plug to prevent premature proton flow. The plug is in the periplasm just C-terminal to the MotB TM (transmembrane helix), consisting of an amphipathic α-helix flanked by Pro-52 and Pro-65, eg in . In addition to the Pro residues, Ile-58, Tyr-61, and Phe 62 are also essential for plug function. This domain is also found in ZorB, a distant homologue of MotB. ZorB is a component of the antiviral defense system Zorya type I, composed of ZorA, ZorB, ZorC and ZorD. ZorA and ZorB may assemble in the cell inner membrane.
