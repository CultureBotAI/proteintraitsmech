identifier: InterPro:IPR031726
label: "Protein glycosylation ligase domain"
definition: >-
  This pilin glycosylation ligase domain found in Gram-negative bacteria. PglL O-oligosaccharyltransferases differ from WaaL O-antigen ligases, , in its substrate-specificity. PglL O-oligosaccharyltransferases (O-OTase) transfer oligosaccharide to serine or threonine in a protein. A further indication that the genes identified by this domain are PglL rather than WaaL homologues is that they are not located within lipopolysaccharide biosynthetic loci. The specific pilin glycosylation ligases are a subset of the more general bacterial protein o-oligosaccharyltransferases.
