identifier: InterPro:IPR063152
label: "Penicillin-binding protein 1B, C-terminal domain"
definition: >-
  This entry represents a small C-terminal domain found in penicillin-binding protein 1B (PBP1b) from Gammaproteobacteria. PBP1b is a bifunctional enzyme with transglycosylase ( ) and transpeptidase ( ) activities essential for peptidoglycan biosynthesis. This domain is located immediately C-terminal to the transpeptidase domain. The specific function of this C-terminal domain remains to be determined.
