identifier: InterPro:IPR063541
label: "Putative glycosyltransferase domain"
definition: >-
  This entry represents a domain of approximately 226 residues found in putative glycosyltransferases predominantly from Alphaproteobacteria. This domain shows structural similarity to glycosyltransferases in the GT-B superfamily (CL0110), including Glyco_transf_24 ( ), Mannosyl_trans3 ( ) and Glyco_transf_8 ( ). The specific substrate and function of these enzymes remains to be determined.
