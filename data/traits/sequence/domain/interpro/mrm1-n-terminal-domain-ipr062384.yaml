identifier: InterPro:IPR062384
label: "MRM1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of MRM1 (rRNA methyltransferase 1, mitochondrial) proteins. MRM1 proteins are S-adenosyl-L-methionine-dependent 2'-O-ribose methyltransferases that catalyse the formation of 2'-O-methylguanosine at position 2270 in the 21S mitochondrial large subunit ribosomal RNA. This N-terminal domain is found preceding the SpoU substrate-binding domain and SpoU methylase domain in MRM1 proteins. The domain is conserved across fungi and contains helical structures. The specific function of this N-terminal domain remains to be determined.
