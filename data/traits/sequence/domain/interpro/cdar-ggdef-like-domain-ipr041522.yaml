identifier: InterPro:IPR041522
label: "CdaR, GGDEF-like domain"
definition: >-
  This domain is distantly related to the GGDEF domain. This domain can be found in carbohydrate diacid regulator (CdaR), PutR and related proteins. PutR is a transcriptional activator.
