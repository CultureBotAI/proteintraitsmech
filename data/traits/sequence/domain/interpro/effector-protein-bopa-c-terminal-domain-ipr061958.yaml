identifier: InterPro:IPR061958
label: "Effector protein BopA , C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of BopA from Burkholderia mallei, which plays a role in mediating bacterial evasion from the host autophagic. It may adopt a four-helical bundle fold.
