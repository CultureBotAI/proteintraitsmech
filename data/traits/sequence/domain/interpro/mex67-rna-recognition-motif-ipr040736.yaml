identifier: InterPro:IPR040736
label: "Mex67, RNA recognition motif"
definition: >-
  The Mex67-Mtr2 complex (TAP-p15 or NXF1-NXT1 in metazoans) is the principal mRNA export factor in Saccharomyces cerevisiae. Mex67 is a member of the NXF family of proteins and has conserved homologs through eukaryotes from yeasts to humans. Although sequence conservation is poor between S. cerevisiae Mex67 and Homo sapiens NXF1, they do show functional complementarity. Mex67 and TAP/NXF1 are modular proteins that contain four structural domains: an N-terminal RNA recognition motif (RRM), a leucine rich repeat (LRR) domain, a nuclear transport factor 2-like domain (NTF2L) and an ubiquitin-associated domain (UBA). This entry describes the N-terminal RNA recognition motif (RRM) found in Mex67 proteins.
