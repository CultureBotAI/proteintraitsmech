identifier: InterPro:IPR054339
label: "GMT-like, wHTH domain"
definition: >-
  This entry represents a rapidly-evolving wHTH domain C-terminally fused to Rossmann fold methylase specifically related to the guanine methylase (GMT). Often co-occurs on the genome across a broad range of bacterial phylogenies with a further gene encoding a RADICAL SAM enzyme ( ). This two-gene island is predicted to catalyse a DNA/RNA guanine modification comparable to the precursors of Wybutosine. This wHTH domain could be a sensor that recognises a rapidly-evolving nucleic acid sequence, implicating the gene pair in a conflict response to an invasive genic element.
