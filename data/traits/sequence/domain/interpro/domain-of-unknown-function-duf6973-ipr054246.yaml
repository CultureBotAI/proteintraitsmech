identifier: InterPro:IPR054246
label: "Domain of unknown function DUF6973"
definition: >-
  This domain is found in uncharacterised bacterial proteins including the Putative protein RhsE . It is predicted to adopt a globular structure consisting of five α-helices. It is probably distantly related to Wnt domains.
