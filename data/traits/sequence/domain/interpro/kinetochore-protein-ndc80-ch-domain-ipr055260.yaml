identifier: InterPro:IPR055260
label: "Kinetochore protein Ndc80, CH domain"
definition: >-
  This entry represents the calponin homology (CH) domain found towards the N terminus of Ndc80 proteins, a component of the NMS (Ndc80-MIND-Spc7) super complex which has a role in kinetochore function during late meiotic prophase and throughout the mitotic cell cycle. This complex is required for chromosome segregation and spindle checkpoint activity. It has been shown that Ndc80 from yeast is part of a complex called the Ndc80p complex. The four Ndc80 complex subunits associate as two rod-like heterodimers (Ndc80:Nuf2 and Spc24:Spc25). This protein is required for kinetochore integrity and the organisation of stable microtubule binding sites in the outer plate of the kinetochore. Moreover, the NDC80 complex synergistically enhances the affinity of the SKA1 complex for microtubules and may allow the NDC80 complex to track depolymerising microtubules. The CH domains of Ndc80 and Nuf2 pair at one end and form a microtubule-attachment module.
