identifier: InterPro:IPR055255
label: "Reticulophagy regulator 1, N-terminal reticulon-homology domain"
definition: >-
  This entry represents the N-terminal reticulon-homology domain (RHD) of RETREG1/FAM134B, which shows sequence similarity to ADP-ribosylation factor-like 6 binding factor 1 (Arl6IP1 or Arl6ip-1), an ER protein that has an important role in cell conduction and material transport. This domain may function in inducing membrane curvature. Members of this group are specific to vertebrates. Reticulophagy regulator 1 (RETREG1), also called FAM134B (family with sequence similarity 134, member B), is an endoplasmic reticulum (ER)-anchored autophagy receptor that regulates the size and shape of the ER. It regulates turnover of the ER by selective phagocytosis, mediating ER delivery into lysosomes through sequestration into autophagosomes. It promotes membrane remodelling and ER scission through its membrane bending activity, and targets the fragments into autophagosomes by interacting with ATG8 family modifier proteins such as MAP1LC3A, MAP1LC3B, GABARAP, GABARAPL1 and GABARAPL2. Loss of function of FAM134B is associated with diseases and cancer, including hereditary sensory and autonomic neuropathy type IIB (HSAN IIB), colorectal adenocarcinoma, and oesophageal squamous cell carcinoma, and other progressive neuronal degenerative diseases. FAM134B is also implicated in the suppression of viral replication during Ebola, Dengue, Zika, and West Nile viral infections.
