identifier: InterPro:IPR049074
label: "Acetyl-CoA carboxylase, BT domain"
definition: >-
  This is the BC-CT interaction domain (BT) which is between the BC (biotin carboxylase, which catalyses the MgATP-dependent carboxylation of N1' atom of biotin) and BCCP (biotin carboxyl carrier protein) domains of acetyl-CoA carboxylase. This domain helps to mediate interactions between the BC and CT (carboxyltransferase) domains.
