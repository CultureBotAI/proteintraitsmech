identifier: InterPro:IPR035059
label: "SH2B3, SH2 domain"
definition: >-
  This entry represents the SH2 domain of SH2B3. SH2B adapter protein 3 (SH2B3) belongs to the SH2B family of adapter proteins. It is involved in the homeostasis of hematopoietic stem cells and lymphoid progenitors, and plays a tumour suppressor role in the acute lymphoblastic leukemia. SH2B3 (Lnk) may also influence inflammatory immune responses in peripheral lymphoid tissues. A link has been established between polymorphism in this adaptor protein and autoimmune diseases, including type 1 diabetes and celiac disease. SH2B family contains three members of adaptor proteins: SH2B1, 2 and 3. Typical SH2B proteins contain a SH2 (Src homology 2) and a PH (pleckstrin homology) domain. They serve as adaptors involved in signalling by the receptors for growth factors, such as insulin-like growth factor 1, platelet-derived growth factor and nerve growth factor.
