identifier: InterPro:IPR010465
label: "DRF autoregulatory"
definition: >-
  This domain is found in Diaphanous-related formins (Drfs) from vertebrates and arthopods. It binds the N-terminal GTPase-binding domain; this link is broken when GTP-bound Rho binds to the GBD and activates the protein. The addition of diaphanous activating domains (DAD) to mammalian cells induces actin filament formation, stabilises microtubules, and activates serum-response mediated transcription.
