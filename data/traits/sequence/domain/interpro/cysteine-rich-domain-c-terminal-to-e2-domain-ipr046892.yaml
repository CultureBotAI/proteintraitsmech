identifier: InterPro:IPR046892
label: "Cysteine-rich domain, C-terminal to E2 domain"
definition: >-
  This is a cysteine-rich domain observed C-terminal to certain E2 domains which are part of prokaryotic ubiquitin systems found as secondary effector modules in nucleotide-activated effector conflict systems.
