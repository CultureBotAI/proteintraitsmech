identifier: InterPro:IPR058951
label: "Rad26/CSB-like, winged helix DNA-binding domain"
definition: >-
  This entry represents a DNA-binding winged helix domain (WHD) found in the transcription-coupled repair protein Rad26/CSB and similar eukaryotic proteins. This domain is critical for enabling Rad26/CSB to bind to DNA and stalled RNA polymerase II in transcription-coupled repair. Rad26 (in yeast), its human orthologue CSB (ERCC6) and the plant orthologue CHR8 play a central role in recognising and repairing DNA lesions encountered during transcription. Mutations in human CSB cause Cockayne syndrome, a disorder characterised by photosensitivity, growth failure, and premature ageing.
