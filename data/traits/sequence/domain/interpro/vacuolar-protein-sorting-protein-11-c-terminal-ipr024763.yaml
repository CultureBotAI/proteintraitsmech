identifier: InterPro:IPR024763
label: "Vacuolar protein sorting protein 11, C-terminal"
definition: >-
  This entry represents the C-terminal domain of vps11 and its orthologues in Saccharomyces cerevisiae known as E3 ubiquitin-protein ligase PEP5. It also represents RING finger protein PFE0100w found in Plasmodium falciparum, a malaria-causing parasite. Vacuolar protein sorting protein 11 (vps11) aggregates with other Vps proteins to form the homotypic fusion and protein sorting complex (HOPS), which promotes the fusion of late endosomes and autophagosomes with lysosomes. Pep5 (also known as Vps11) was initially isolated as a protease deficient mutant and shown to be involved in protein trafficking and vacuole biogenesis pathways.
