identifier: InterPro:IPR040506
label: "RACo linker region"
definition: >-
  Proteins containing this domain include reductive activator of CoFeSP (RACo, ) proteins. This entry represents to the linker region. The linker region is only present in RACE (reductive activases for corrinoid enzymes) protein sequences with the N-terminal [2Fe-2S] cluster and it is absent in the RamA-like RACE proteins, suggesting that the linker domain and the N-terminal domain form one functional unit. Structure analysis of RACo indicate that it contains 4 regions: N-terminal region (residues 3-94) binding the [2Fe-2S] cluster, a linker region (residues 95-125) , the middle region (residues 126-206) , and the large C-terminal domain (residues 207-630) .
