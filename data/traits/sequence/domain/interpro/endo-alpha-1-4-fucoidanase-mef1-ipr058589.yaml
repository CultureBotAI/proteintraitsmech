identifier: InterPro:IPR058589
label: "Endo-alpha(1,4)-fucoidanase Mef1"
definition: >-
  This entry represents the Endo-alpha(1,4)-fucoidanase Mef1 and related bacterial proteins mainly from Pseudomonadati kingdom. Mef1 catalyses the cleavage of alpha(1,4)-linkages between fucose residues sulfated on C2 in fucoidan. It folds into a classical TIM β-barrel fold. The active site of this enzyme is located in an extended, positively charged groove that accommodates the binding of the negatively charged, sulfated fucoidan substrate. This domain is usually found associated with .
