label: "PaaX-like, ferredoxin-like domain"
definition: >-
  This entry represents a ferredoxin-like domain in PaaX-like protein from Jannaschia sp.. PaaX-like is a putative transcriptional regulator. Members of this group are specific to Rhodobacterales.
