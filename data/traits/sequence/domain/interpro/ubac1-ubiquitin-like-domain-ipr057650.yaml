identifier: InterPro:IPR057650
label: "UBAC1, ubiquitin-like domain"
definition: >-
  This domain is found in human UBAC1 (Ubiquitin-associated domain-containing protein 1) and related animal proteins. This domain shares significant sequence similarity with ubiquitin-like domains, and it is predicted to adopt a similar structure with ubiquitin fold topology. Ubiquitin-associated domain-containing protein 1 (UBAC1) proteins include non-catalytic components of the KPC complex, a specific type of E3 ubiquitin-protein ligase complex. Members of this group function as adaptors within the KPC complex, facilitating the transfer of polyubiquitinated target proteins to the 26S proteasome for degradation. These proteins are involved in the polyubiquitination of key regulatory proteins such as CDKN1B, which plays a role in cell cycle control, and NFKB1, a component of the NF-kappa-B signalling pathway. The ubiquitin-associated (UBA) domains present in these proteins are responsible for recognising and binding polyubiquitinated substrates, indicating a role in targeting proteins for proteasomal degradation, which is essential for various cellular processes, including cell cycle progression and signal transduction.
