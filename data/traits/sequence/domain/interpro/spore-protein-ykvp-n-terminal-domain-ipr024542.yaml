identifier: InterPro:IPR024542
label: "Spore protein YkvP, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of Spore protein YkvP from Bacillus subtilis and similar sequences from firmicutes. Its specific function is not known. YkvP is a spore protein that contains a motif conserved among cell wall binding proteins. Its expression is dependent on both SigK and GerE transcription factors. YkvP is intrinsic to mature spores. The conserved motif in YkvP is thought to function as a kind of signal sequence involved in protein assembly to forespores during sporulation.
