identifier: InterPro:IPR035650
label: "Tetracycline resistance protein, C-terminal"
definition: >-
  This domain is found in the C terminus of ribosomal protection proteins Tet(M) and Tet(O), and related proteins. This domain has homology to the C-terminal domains of the elongation factors EF-G and EF-2. Tet(M) and Tet(O) catalyze the release of tetracycline (Tc) from the ribosome in a GTP-dependent manner, thereby mediating Tc resistance. Tcs are broad-spectrum antibiotics. Typical Tcs bind to the ribosome and inhibit the elongation phase of protein synthesis, by inhibiting the occupation of site A by aminoacyl-tRNA.
