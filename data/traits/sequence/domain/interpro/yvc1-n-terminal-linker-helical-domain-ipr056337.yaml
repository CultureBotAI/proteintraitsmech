identifier: InterPro:IPR056337
label: "YVC1, N-terminal linker helical domain"
definition: >-
  This domain is found N-terminal in the yeast calcium channel YVC1 (also known as TRPY1) and similar fungal proteins. YVC1 is a transient receptor potential (TRP) channel that acts as a mechanosensitive osmoregulator. It is non-selective Ca2+ permeable and polymodal cation channel that function similarly to other TRP channels. YVC1 forms a domain-swapped homotetramer with each subunit composed of an N-terminal cytosolic linker helical domain (LHD, represented by this entry) and a transmembrane domain. The LHD domain is composed of eight closely packed α-helices and may harbour the docking site for binding partners in the cytosol.
