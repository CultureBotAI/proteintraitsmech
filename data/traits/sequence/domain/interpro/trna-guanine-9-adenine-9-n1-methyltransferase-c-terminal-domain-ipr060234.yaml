identifier: InterPro:IPR060234
label: "tRNA (guanine(9)-/adenine(9)-N1)-methyltransferase, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of archaeal tRNA (guanine(9)-/adenine(9)-N1)-methyltransferase (TRM10) found in hyperthermophilic archaea. The domain is found in Thermococcaceae, particularly Thermococcus, and Archaeoglobaceae including Archaeoglobus. TRM10 proteins are approximately 370 amino acids and catalyse the S-adenosyl-L-methionine-dependent formation of either N(1)-methyladenine or N(1)-methylguanine at position 9 (m1A9 or m1G9) in tRNA. The protein contains three domains, with the central domain (residues 87-292) containing the SAM-dependent methyltransferase activity.
