identifier: InterPro:IPR004170
label: "WWE domain"
definition: >-
  The WWE domain is named after three of its conserved residues and is predicted to mediate specific protein-protein interactions in ubiquitin and ADP ribose conjugation systems. This domain is found as a tandem repeat at the N-terminal of Deltex, a cytosolic effector of Notch signalling thought to bind the N-terminal of the Notch receptor. It is also found as an interaction module in protein ubiquination and ADP ribosylation proteins.
