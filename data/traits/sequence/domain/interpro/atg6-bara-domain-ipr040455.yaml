identifier: InterPro:IPR040455
label: "Atg6, BARA domain"
definition: >-
  In yeast, 15 Atg proteins coordinate the formation of autophagosomes. Autophagy is a bulk degradation process induced by starvation in eukaryotic cells. Atg6/Vps30 has two distinct functions in the autophagic process, either associated with the membrane or in a retrieval step of the carboxypeptidase Y sorting pathway. This entry is the β-α repeated, autophagy-specific (BARA) domain.
