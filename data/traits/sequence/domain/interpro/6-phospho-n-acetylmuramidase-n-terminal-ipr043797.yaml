identifier: InterPro:IPR043797
label: "6-phospho-N-acetylmuramidase, N-terminal"
definition: >-
  This entry represents the N-terminal domain of 6-phospho-N-acetylmuramidase from bacteria. MupG is involved in the recycling pathway of the cell wall turnover product MurNAc-GlcNAc in S.aureus. It catalyses the hydrolysis of MurNAc 6-phosphate-GlcNAc, the disaccharide product of MurP-uptake and phosphorylation, yielding MurNAc 6-phosphate and GlcNAc. These proteins appear to consist of two structural subdomains as it can be seen in the two available crystal structures of Enterococcus faecalis ( ) and Bacillus cereus ( ). This is the larger N-terminal domain with a TIM-barrel like structure and the C-terminal domain is similar to the cyclophilin family.
