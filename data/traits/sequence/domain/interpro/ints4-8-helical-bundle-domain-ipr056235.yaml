identifier: InterPro:IPR056235
label: "INTS4, 8 helical bundle domain"
definition: >-
  This domain is found in human Integrator complex subunit 4 (INTS4) and its animal homologues. The domain represented by this entry makes extensive contacts with INTS7 and stabilise the beta-CASP domain of INTS9 in the cleavage module. It folds into an eight α-helical bundle. INTS4 is a component of the Integrator complex which plays essential roles in snRNA 3' end processing and transcription termination. INTS4 along with INTS9 and INTS11 constitute the Integrator cleavage module, which contains endonuclease activity and resembles the cleavage module of the cleavage and polyadenylation specific factor required for 3' processing of mRNA transcripts.
