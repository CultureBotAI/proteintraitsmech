identifier: InterPro:IPR045357
label: "Aminopeptidase N-like , N-terminal domain"
definition: >-
  Aminopeptidase N from Escherichia coli is a broad specificity zinc exopeptidase belonging to aminopeptidase clan MA, family M1. The enzyme is composed of four domains: an N-terminal β-domain, a catalytic domain, a middle β-domain and a C-terminal α-domain.
