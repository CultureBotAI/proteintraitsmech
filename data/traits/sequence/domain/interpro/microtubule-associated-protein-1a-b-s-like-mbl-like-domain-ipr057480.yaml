identifier: InterPro:IPR057480
label: "Microtubule-associated protein 1A/B/S-like, MBL-like domain"
definition: >-
  This domain is found in the Microtubule-associated proteins MAP1B, MAP1A, MAP1S and related animal proteins. MAP1B is required for proper microtubule dynamics and plays a role in the cytoskeletal changes that accompany neuronal differentiation and neurite extension. MAP1S mediates aggregation of mitochondria resulting in cell death and genomic destruction. The domain represented by this entry has a weak sequence similarity to members of the metallo-beta-lactamase superfamily and is predicted to adopt a very similar structure.
