identifier: InterPro:IPR029501
label: Bacterial EndoU nuclease
definition: >-
  This EndoU nuclease domain is a bacterial version of eukaryotic EndoU nuclease. It is found at the C-terminal region of polymorphic toxin proteins. Nucleases are widely used as toxins for defence, offense or addiction of selfish elements.
