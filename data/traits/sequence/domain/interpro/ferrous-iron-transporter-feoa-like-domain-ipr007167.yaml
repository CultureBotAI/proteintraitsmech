identifier: InterPro:IPR007167
label: Ferrous iron transporter FeoA-like domain
definition: >-
  This entry represents the core domain of the ferrous iron (Fe2+) transport protein FeoA found in bacteria. This domain also occurs at the C terminus in related proteins. This suggests that this domain may be metal-binding. In most cases this is likely to be either iron or manganese. The transporter Feo is composed of three proteins: FeoA a small, soluble SH3-domain protein probably located in the cytosol which is composed of a β-barrel with two α-helices; FeoB, a large protein with a cytosolic N-terminal G-protein domain and a C-terminal integral inner-membrane domain containing two 'Gate' motifs which likely functions as the Fe2+ permease; and FeoC, a small protein apparently functioning as an [Fe-S]-dependent transcriptional repressor. Feo allows the bacterial cell to acquire iron from its environment.
