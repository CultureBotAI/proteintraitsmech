identifier: InterPro:IPR032634
label: "Gef2/Nod1 domain"
definition: >-
  This domain can be found in Gef2 and Nod1 from S. pombe. Nod1 co-localises with Gef2 - RhoGEF - in the contractile ring and its precursor cortical nodes. Nod1 and Gef2 interact through this C-terminal region of each, this interaction being important for their localisation.
