identifier: InterPro:IPR047077
label: "Regulator of G protein signaling 9, RGS domain"
definition: >-
  This entry represents the RGS (Regulator of G-protein Signaling) domain of Regulator of G-protein signaling 9 (RGS9), a member of the R7 subfamily of the RGS protein family (Neuronal RGS). RGS is a diverse group of multifunctional proteins that regulate cellular signalling events downstream of G-protein coupled receptors (GPCRs). As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. RGS9 forms constitutive complexes with G-beta-5 subunit and controls such fundamental functions as vision and behaviour. RGS9 exists in two splice isoforms: RGS9-1 which regulates phototransduction in rods and cones and RGS9-2 which regulates dopamine and opioid signalling in the basal ganglia. In addition, RGS9 was found to bind many other proteins outside of G protein signalling pathways including: mu-opioid receptor, beta-arrestin, alpha-actinin-2, NMDAR, polycystin, spinophilin, and guanylyl cyclase, among others.
