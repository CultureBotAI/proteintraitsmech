identifier: InterPro:IPR032714
label: "Cilium assembly protein DZIP1, N-terminal"
definition: >-
  This entry represents the N-terminal region of the cilium assembly protein DZIP1, which acts as a molecular adapter that recruits protein complexes required for cilium assembly and function to the cilium basal body. It also recruits the BBSome, a complex involved in cilium biogenesis, by bridging it to PCM1 at the centriolar satellites of the cilium. DZIP1 is involved in spermatogenesis through its role in organization of the basal body and assembly of the sperm flagellum and it is also indirectly involved in heart development through its function in ciliogenesis. Zebrafish Dzip1 acts as a permissive factor that is required for the proper regulation of Hedgehog (Hh) target genes in response to Hh signals. It is required for establishment of left-right asymmetry during embryogenesis and has a role in primary cilium formation.
