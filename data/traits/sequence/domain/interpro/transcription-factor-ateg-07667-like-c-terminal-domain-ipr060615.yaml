identifier: InterPro:IPR060615
label: "Transcription factor ATEG_07667-like, C-terminal domain"
definition: >-
  This entry represents a C-terminal helical domain found in transcription factor ATEG_07667 from Aspergillus terreus and similar fungal proteins. ATEG_07667 regulates both the azasperpyranone A biosynthesis clusters A and B. The protein up-regulates expression of cluster-specific transcription factors ATEG_03638 and ATEG_07666, which in turn activate expression of their respective clusters. The protein contains a DNA-binding Zn(2)-C6 fungal-type domain. Disruption results in significant down-regulation of both azasperpyranone A biosynthesis clusters. The function of this domain remains to be determined.
