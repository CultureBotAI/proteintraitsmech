identifier: InterPro:IPR060419
label: "TRM44, N-terminal bet v1-like domain"
definition: >-
  This domain is found at the N-terminal of yeast tRNA (uracil-O(2)-)-methyltransferase (TRM44) and similar fungal proteins. TRM44 catalyses the formation of O2-methyluracil at position 44 (Um44) in tRNA(Ser). This domain is predicted to form an antiparallel β-sheet and two α-helices. Bet_v_1 domains contain a hydrophobic ligand-binding pocket.
