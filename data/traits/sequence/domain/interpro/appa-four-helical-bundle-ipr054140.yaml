identifier: InterPro:IPR054140
label: "AppA, four helical bundle"
definition: >-
  This domain is found in AppA protein from Rhodobacter sphaeroides and similar sequences from alphaproteobacteria. AppA is a light-sensing antirepressor involved in oxygen and light control of photosynthesis-gene expression. This protein senses blue-light via its N-terminal sensor of blue-light using FAD (BLUF) domain and oxygen via its sensor containing heme instead of cobalamin (SCHIC) domain. This entry represents the domain that is located in between them, which folds as a four helical bundle (4HB) and acts as a binding platform for the adjacent domains.
