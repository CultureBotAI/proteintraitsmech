identifier: InterPro:IPR041216
label: "Yeast SAGA-associated factor 11, N-terminal domain"
definition: >-
  The SAGA (Spt-Ada-Gcn5-Acetyltransferase) transcriptional co-activator is a protein complex that regulates inducible yeast genes by performing multiple functions including acetylating core histones, recruiting the RNA polymerase II preinitiation complex, and deubiquitinating histone H2B. The deubiquitinating activity of SAGA resides in a distinct sub-complex called the deubiquitinating module (DUBm), which consists of four proteins that are conserved across eukaryotes: Ubp8, Sgf11, Sus1 and Sgf73. The DUBm proteins are organized into two lobes around the globular domains of Ubp8. In SAGA, Sus1 binds to Sgf11 by wrapping around this N-terminal domain of Sgf11, forming a stable dimer.
