identifier: InterPro:IPR056288
label: "Centrosomal protein of 76 kDa, C-terminal"
definition: >-
  This entry represents a domain found at the C-terminal of centrosomal protein of 76 kDa, a protein involved in regulation of centriole duplication to limit centriole duplication to once per cell cycle by preventing centriole reduplication. This domain may adopt a fold similar to the CAP domain. This entry also includes CC2D2A/B from human. CC2D2A is a component of the tectonic-like complex, a complex localised at the transition zone of primary cilia and acting as a barrier that prevents diffusion of transmembrane proteins between the cilia and plasma membranes. It is required for ciliogenesis and sonic hedgehog/SHH signalling. This domain is also found in C2 domain-containing proteins TgDOC22 and PfDOC21 from T. gondii and P. falciparum, respectively, which regulate the microneme secretion.
