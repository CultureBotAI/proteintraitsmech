identifier: InterPro:IPR059157
label: "WDR36/Utp21, N-terminal domain"
definition: >-
  This entry represents the first β-propeller domain, found at the N-terminal in WDR36 and Utp21. Utp21 from yeast and WDR36 its orthologue in animals are part of the small subunit (SSU) processome, the first precursor of the small eukaryotic ribosomal subunit. They are involved in the nucleolar processing of SSU 18S rRNA.
