identifier: InterPro:IPR004010
label: "Double Cache domain 2"
definition: >-
  Cache is an extracellular domain that is predicted to have a role in small-molecule recognition in a wide range of proteins, including the animal dihydropyridine-sensitive voltage-gated Ca2 channel alpha-2delta subunit, and various bacterial chemotaxis receptors. The name Cache comes from CAlcium channels and CHEmotaxis receptors. This entry represents the double Cache domain 2 (dCache_2), which may be a result of single Cache domain 2 (sCache_2) duplication.
