identifier: InterPro:IPR034356
label: "Slt11, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of Slt11 (also known as Ecm2), a splicing factor required for spliceosome assembly in yeast. It contains a conserved RNA recognition motif (RRM). Slt11 can facilitate the cooperative formation of U2/U6 helix II in association with stem II in the yeast spliceosome by utilizing its RNA-annealing and -binding activities.
