identifier: InterPro:IPR057485
label: "Moderate conductance mechanosensitive channel YbiO-like, transmembrane helix 1"
definition: >-
  This entry represents the first transmembrane helix (TM1) domain of Moderate conductance mechanosensitive channel YbiO from Moderate conductance mechanosensitive channel YbiO and similar small conductance mechanosensitive channels (MscS) found in proteobacteria. YbiO protects cells against hypoosmotic stress when highly overexpressed. Members of this group of proteins assemble to a homo-heptameric complex. Each monomer consists of a N-terminal transmembrane region and a large cytoplasmic segment composed of a five-stranded antiparallel β-sheet (middle/second) domain and a C-terminal α/β-domain. The N-terminal region consists of three membrane spanning helices (TM1, TM2 and TM3). In the heptamer, the permeation pathway is formed by the packing of TM3s, flanked by TM1-TM2 helical hairpins.
