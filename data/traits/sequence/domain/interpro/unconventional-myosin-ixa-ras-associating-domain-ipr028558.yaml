identifier: InterPro:IPR028558
label: Unconventional myosin-IXa, Ras-associating domain
definition: >-
  Unconventional myosin-IXa (MYO9A) belongs to class IX myosin and contains a Ras-associating (RA) domain, a motor domain, a protein kinase C conserved region 1 (C1), and an extra Rho GTPase activating domain (RhoGAP) in the tail region. In mice, MYO9A homologue, Myr7 regulates Rho by stimulating its GTPase activity in neurons and has a role in the regulation of neuronal morphology and function. In humans, there are two proteins in class IX, MYO9A and MYO9B. Class IX myosins may carry its own Rho-GAP tail using its motor head domain to sites that require down-regulation of Rho-dependent signalling. Myosin-IXa binds the alpha-amino-3-hydroxy-5-methyl-4-isoxazole propionic acid receptor (AMPAR) GluA2 subunit, and plays a key role in controlling the molecular structure and function of hippocampal synapses [ . Moreover, Myosin-IXa functions in epithelial cell morphology and differentiation such that its knockout mice develop hydrocephalus and kidney dysfunction. Myosin-IXa regulates collective epithelial cell migration by targeting RhoGAP activity to cell-cell junctions. Myosin-IXa negatively regulates Rho GTPase signaling, and functions as a regulator of kidney tubule function. This entry represents the RA domain of MYO9A, which is located at its head domain and has the β-grasp ubiquitin-like fold with unknown function.
