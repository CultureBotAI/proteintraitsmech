identifier: InterPro:IPR025745
label: "Restriction system protein Mrr-like N-terminal domain"
definition: >-
  This domain is found N-terminal to the catalytic domain in Mrr restriction endonucleases. It is also found in other proteins, including predicted methyltransferases and ATPases. Fold recognition analysis predicts that it is a diverged member of the winged helix variant of helix turn helix proteins. It may play a role in DNA sequence recognition.
