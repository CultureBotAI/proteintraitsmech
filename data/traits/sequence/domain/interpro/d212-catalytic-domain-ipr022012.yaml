identifier: InterPro:IPR022012
label: "D212, catalytic domain"
definition: >-
  This family of proteins represented by Sulfolobus spindle-shaped virus (Ragged Hills) ORF D212; the structure of which has been reported. The structure of D212 clearly reveals a type II restriction endonuclease fold and identifies the hallmark PD-(D/E)XK catalytic motif that is spatially conserved in this nuclease superfamily. This fold and its associated catalytic residues are also found in nucleases, where they play roles in DNA replication, repair, recombination, and other processes requiring nuclease activity. The function of D212 in the phage replication cycle remains unknown, it is speculated to be a Holliday junction cleavage.
