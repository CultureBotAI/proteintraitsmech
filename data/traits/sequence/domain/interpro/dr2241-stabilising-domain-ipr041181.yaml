identifier: InterPro:IPR041181
label: "DR2241 stabilising domain"
definition: >-
  This is the middle domain found in DR2241, a multi-domain protein with an N-terminal cobalamin (vitamin B12) chelatase domain. DR2241 is found in D. radiodurans. The middle domain has four α-helices (α7-α10) in contact with the N-terminal domains and C-terminal domain and five anti-parallel β-strands with strand order 12354 at the outer side of one monomer. The middle domain, as well as the C-terminal domain, are heavily involved in the tetramer stabilisation.
