identifier: InterPro:IPR063328
label: "Mu-like transposase, middle domain"
definition: >-
  This entry represents a middle domain found in Mu-like transposases and IS21-type insertion sequence elements. This domain is located between the N-terminal HTH domain and the C-terminal Mu transposase domain. The domain is approximately 55-65 residues in length. This family is found in diverse bacteria including Bacillota and Pseudomonadota. The function of this domain remains to be determined.
