identifier: InterPro:IPR055087
label: "Gliding motility protein GldL-like, N-terminal domain"
definition: >-
  This entry represents a domain found N-terminal in Gliding motility protein GldL from Capnocytophaga canimorsus and similar proteins mainly found in bacteroidetes. GldL is a component of the motor complex used by the T9SS and the gliding motility apparatus to transport proteins and gliding adhesin movement at the outer membrane. This motor complex consists of five copies of GldL surrounding two copies of GldM. GldL consists of two transmembrane helices (this entry) and a cytoplasmic domain.
