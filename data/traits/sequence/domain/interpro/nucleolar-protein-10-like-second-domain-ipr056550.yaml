identifier: InterPro:IPR056550
label: "Nucleolar protein 10-like, second domain"
definition: >-
  This domain is found in human Nucleolar protein 10 (NOL10) and similar eukaryotic sequences including the orthologue from yeast, Ribosome biogenesis protein (ENP2). This domain is normally found N-terminal to . It is predicted to adopt an α-β configuration. NOL10 (also known as Polyglutamine binding protein 5 (PQBP5)) binds to polyglutamine tract sequences and is expressed in the nucleolus. It makes up the skeletal structure of the nucleolus, constituting the granule meshwork in the granular component area, and functions as an anchor for reassembly of other nucleolar proteins. ENP2 was identified in a set of proteins involved in rRNA-processing and ribosome biosynthesis.
