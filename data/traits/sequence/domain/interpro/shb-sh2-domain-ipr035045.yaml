identifier: InterPro:IPR035045
label: "SHB, SH2 domain"
definition: >-
  This entry represents the SH2 domain of SHB. SHB (SH2 domain-containing adapter protein B) functions as an adapter protein which regulates several signal transduction cascades by linking activated receptors to downstream signaling components. It transmits signals from receptor tyrosine kinases regulating diverse processes such as apoptosis and differentiation. It regulates normal oocyte and follicle development and is required for appropriate hematopoietic and vascular differentiation in embryos.
