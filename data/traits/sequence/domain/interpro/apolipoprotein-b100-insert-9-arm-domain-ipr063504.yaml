identifier: InterPro:IPR063504
label: "Apolipoprotein B100, insert 9 arm domain"
definition: >-
  This domain is found in the human Apolipoprotein B100 and related proteins. Apolipoprotein B100 (apoB100), one of the largest proteins in the genome, is the primary structural and functional component of the Low-density lipoprotein (LDL). ApoB100 functions as a recognition signal for the cellular binding and internalization of LDL particles by the apoB/E receptor. The domain represented by this entry is described as insert 9 and defines three helical arms. The insert 9 is the main structural domain of the L-face, and the smaller inserts are positioned strategically to mediate long-range interactions with the three arms. This region is probably related to members of the Apolipoprotein superfamily.
