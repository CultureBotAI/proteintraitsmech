identifier: InterPro:IPR056475
label: "Hemicentin/VWA7, galactose-binding domain-like"
definition: >-
  This entry represents a galactose-binding domain-like found in Hemicentin and Willebrand factor A domain-containing protein 7 (VWA7). HMCN1 is involved in transforming growth factor beta-mediated rearrangement of the podocyte cytoskeleton which includes reduction of F-actin fibres and broadening, flattening and elongation of podocytes. HMCN1 is also implicated in the organisation of the basement membrane and may contribute to cleavage furrow maturation during cytokinesis in embryos. VWA7 is found in the major histocompatibility complex class III region and it is likely implicated in lung cancers
