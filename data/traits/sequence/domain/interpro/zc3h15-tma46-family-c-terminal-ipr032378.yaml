identifier: InterPro:IPR032378
label: "ZC3H15/TMA46 family, C-terminal"
definition: >-
  This entry represents the C-terminal domain of the translation machinery-associated protein 46 (Tma46), a binding partner for the highly conserved developmentally regulated GTP-binding (DRG) GTPases. The interaction between Tma46 and Rbg1 GTPase (a DRG protein) modulates the function of the GTPase. This domain is also found in ZC3H15 (zinc finger CCCH domain-containing protein 15), also known as DFRP1 (DRG family regulatory protein 1).
