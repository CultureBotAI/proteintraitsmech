identifier: InterPro:IPR061595
label: "Domain of unknown function DUF8525"
definition: >-
  This entry represents a C-terminal helical domain of approximately 100 residues found in spirochaetes, particularly Treponema species. The domain adopts an α-helical hairpin structure and is predicted to contain transmembrane helices. It is typically found at the C terminus of proteins that also contain multiple N-terminal domains. The function of this domain remains to be determined.
