label: "Surface layer protein, bacterial Ig-like domain"
definition: >-
  This entry represents bacterial domains that are structurally similar to an immunoglobulin-like domain of intimins (bacterial Ig-like domains, Big-like). Members of this group include Surface layer protein from Geobacillus stearothermophilus.
