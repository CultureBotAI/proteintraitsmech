identifier: InterPro:IPR059410
label: "Domain of unknown function DUF8366"
definition: >-
  This domain is found in uncharacterised proteins mainly from Ochrophyta lineage. It is predicted to fold into a structure with a shape of a double barrel. It contains a highly conserved APQFxSxGVGYxRLGDD sequence motif that probably defines an interaction interface. In some proteins, it is found in combination with SAM domain .
