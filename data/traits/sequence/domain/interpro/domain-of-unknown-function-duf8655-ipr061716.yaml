definition: >-
  This entry represents an N-terminal domain of approximately 85 residues found in Cyanobacteriota, predominantly in Synechococcales. The proteins containing this domain also possess a smaller C-terminal domain of approximately 40 residues. The function of this domain remains to be determined.
