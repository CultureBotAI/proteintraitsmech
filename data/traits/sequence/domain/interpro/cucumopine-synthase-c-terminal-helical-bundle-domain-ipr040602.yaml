identifier: InterPro:IPR040602
label: "Cucumopine synthase, C-terminal helical bundle domain"
definition: >-
  McbB from Marinactinospora thermotolerans is an enzyme that catalyzes the Pictet-Spengler (PS) reaction of L-tryptophan and oxaloacetaldehyde to produce the betaC scaffold of marinacarbolines. This is the C-terminal domain composed of 5 bundled α helices. It is weakly similar to the signal transduction histidine-protein kinase BarA from E. coli and the DNA endonuclease I-MsoI from Monomastix sp.
