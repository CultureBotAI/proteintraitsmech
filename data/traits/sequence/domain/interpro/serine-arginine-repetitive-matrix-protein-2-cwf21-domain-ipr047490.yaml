identifier: InterPro:IPR047490
label: "Serine/arginine repetitive matrix protein 2, cwf21 domain"
definition: >-
  This entry represents the cwf21 domain of SRRM2 and similar proteins from vertebrates. This domain is involved in mRNA splicing. It binds directly to the spliceosomal protein Prp8. Serine/arginine repetitive matrix protein 2 (SRRM2) is also called 300 kDa nuclear matrix antigen, serine/arginine-rich splicing factor-related nuclear matrix protein of 300 kDa, SR-related nuclear matrix protein of 300 kDa, or Tax-responsive enhancer element-binding protein 803 (TaxREB803). It is required for pre-mRNA splicing as component of the spliceosome. It contains a cwf21 domain at the N-terminal.
