identifier: InterPro:IPR060057
label: "Epidermal growth factor-like protein, EGF domain"
definition: >-
  This Cysteine rich repeat is found in Epidermal growth factor-like protein from Holotrichia diomphalia (EGF-like) and related insect proteins. EGF-like binds to lipopolysaccharides (LPS) present on the cell walls of Gram-negative bacteria, behaving as a pattern recognition receptor (PRR).
