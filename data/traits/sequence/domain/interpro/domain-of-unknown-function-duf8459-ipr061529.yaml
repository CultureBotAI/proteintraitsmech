identifier: InterPro:IPR061529
label: "Domain of unknown function DUF8459"
definition: >-
  This entry represents a domain of unknown function found in diverse proteins across Bacteria. The domain is around 95-100 residues in length and is found in mechanosensitive channel proteins, where it is located N-terminal to the mechanosensitive channel second transmembrane helix domain, and in endolytic peptidoglycan transglycosylases such as RlpA, where it precedes the double-psi β-barrel domain. The domain is found across Cyanobacteriota, Bacteroidota and Pseudomonadota. The function of this domain remains to be determined.
