identifier: InterPro:IPR056498
label: "DAAF9, N-terminal domain"
definition: >-
  This domain is found N-terminal in human DAAF9 and related proteins. It shares similarity with the aminopeptidase P domain of Spt16, a core component of the histone chaperone FACT. These domains likely share the same α/β fold with Ribonuclease H-like motif. Dynein axonemal assembly factor 9 DNAAF9 (Shulin) is a dynein axonemal assembly factor that regulates the transport and activation of outer dynein arms (ODAs) in cilia. It binds and inhibits ODAs in the cytoplasm, maintaining them in a closed conformation until they are delivered to cilia. It may interact with ARL-3. This GTP-dependent interaction might ensure spatiotemporal control of dynein function, critical for proper ciliary beating in multiciliated cells such as airway epithelia. Dysregulation of DNAAF9 is linked to primary ciliary dyskinesia (PCD), characterised by impaired mucociliary clearance and respiratory defects.
