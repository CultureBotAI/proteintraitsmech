identifier: InterPro:IPR033784
label: SidM, Rab1-activation domain, Legionella pneumophila
definition: >-
  Effector protein DrrA (also known as SidM) of Legionella pneumophila, an intracellular pathogen, is a potent guanine nucleotide-exchange factor (GEF) specific for the host Rab1 GTPase. It competes with endogenous exchange factors to recruit and activate Rab1 on plasma membrane-derived organelle, therefore effectively hijacking the host's vesicle trafficking to avoid phagosome-lysosome fusion.
