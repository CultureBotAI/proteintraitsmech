identifier: InterPro:IPR021771
label: Triacylglycerol lipase, N-terminal
definition: >-
  This is an N-terminal domain that is found adjacent to the patatin/phospholipase A2-related domain (see ) in a group of proteins. Proteins containing this domain include Tgl3/4/5 from Saccharomyces cerevisiae. Tgl3 is a bifunctional triacylglycerol lipase and lysophospholipid acyltransferase. Tgl4/5 are multifunctional lipase/hydrolase/phospholipases. They are generally involved in triacylglycerol mobilisation and localized to lipid particles. This entry also includes plant sugar-dependent 1 (SDP1) protein, which is a triacylglycerol lipase that initiates storage oil breakdown in germinating Arabidopsis seeds.
