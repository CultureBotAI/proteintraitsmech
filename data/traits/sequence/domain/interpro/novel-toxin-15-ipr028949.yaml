identifier: InterPro:IPR028949
label: "Novel toxin 15"
definition: >-
  Prokaryotic polymorphic toxin systems are implicated in intra-specific conflicts. They are characterised by a remarkable diversity of C-terminal toxin domains generated by recombination with standalone toxin-coding cassettes. This entry represents a predicted RNase toxin found in bacterial polymorphic toxin systems. The toxin possesses a most all-α helical fold and a conserved HxxD motif. In bacterial polymorphic toxin systems, the toxin is usually exported by the type 2, type 6, type 7 or Photorhabdus virulence cassette (PVC)-type secretion systems. This is shown to be a type IV secretion system protein that behaves as DNase.
