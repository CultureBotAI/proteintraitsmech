identifier: InterPro:IPR060308
label: "C3orf18/SIM29 domain"
definition: >-
  This entry represents an helical domain found in human Uncharacterized protein C3orf18, Small integral membrane protein 29 (SIM29) and similar animal proteins. These proteins contain an N-terminal disordered region and this helical domain which includes the transmembrane helix. The function of this domain remains to be determined.
