identifier: InterPro:IPR047054
label: "Kalirin/Triple functional domain protein, pleckstrin homology (PH) domain 1"
definition: >-
  This entry represents the first pleckstrin homology (PH) domain present in Kalirin and TRIO. This entry includes a group of RhoGEFs, including Kalirin and Triple functional domain protein (TRIO) from mammals. Kalirin and TRIO are encoded by separate genes in mammals and by a single one in invertebrates. Kalirin and TRIO share the same complex multidomain structure and display several splice variants. They are implicated in secretory granule (SG) maturation and exocytosis. The longest Kalirin and TRIO proteins have a Sec14 domain, a stretch of spectrin repeats, a RhoGEF(DH)/PH cassette (also called GEF1), an SH3 domain, a second RhoGEF(DH)/PH cassette (also called GEF2), a second SH3 domain, Ig/FNIII domains, and a kinase domain. The first RhoGEF(DH)/PH cassette catalyses exchange on Rac1 and RhoG while the second RhoGEF(DH)/PH cassette is specific for RhoA. Kalirin and TRIO are closely related to p63RhoGEF and have PH domains of similar function. PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. TRIO contains a protein kinase domain and two guanine nucleotide exchange factor (GEF) domains. These functional domains suggest that it may play a role in signalling pathways controlling cell proliferation. TRIO may form a complex with LAR transmembrane protein tyrosine phosphatase (PT-Pase), which localises to the ends of focal adhesions and plays an important part in coordinating cell-matrix and cytoskeletal rearrangements necessary for cell migration. Its expression is associated with invasive tumour growth and rapid tumour cell proliferation in urinary bladder cancer. Kalirin ( ) promotes the exchange of GDP by GTP and stimulates the activity of specific Rh…
