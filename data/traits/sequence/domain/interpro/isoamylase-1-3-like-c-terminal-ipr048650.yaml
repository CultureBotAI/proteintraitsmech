identifier: InterPro:IPR048650
label: "Isoamylase 1-3-like, C-terminal"
definition: >-
  This entry represents the C-terminal β-sandwich domain from ISOA1-3 and similar proteins from plants and bacteria. In ISOA1 from Chlamydomonas reinhardtii ( ), this domain is involved in dimerisation of homodimers and suggests a similar interaction to form ISOA1-ISOA2 heterodimers. Isoamylases (ISOAs) are starch debranching enzymes, including ISOA1, ISOA2 and ISOA3. ISOA1-2 are known to form a large complex and being involved in the biosynthesis and crystallization of starch. ISOA3 is involved in starch catabolism and removes different branches than ISA1-ISA2, namely short chains that prevent amylopectin crystallization.
