identifier: InterPro:IPR029137
label: "Putative RNase-like toxin, toxin1"
definition: >-
  Prokaryotic polymorphic toxin systems are implicated in intra-specific conflicts between related strains. Toxin proteins of these systems are as a rule multi-domain and display a remarkable diversity of C-terminal toxin domains generated by recombination with standalone toxin-coding cassettes. This entry represents a predicted RNase toxin found in bacterial polymorphic toxin systems. The toxin possesses an α+β fold and conserved cysteine, histidine and glutamate residues that is usually exported by the Photorhabdus virulence cassette (PVC)-type export system.
