identifier: InterPro:IPR059660
label: Cgl2226
definition: >-
  This entry represents Cgl2226 proteins found in Corynebacterium and related actinobacteria. The proteins are typically around 180 amino acids in length with a disordered C-terminal region rich in glycine residues. Cgl2226 has been detected in a cytochrome bc1-aa3 supercomplex in C. glutamicum, though its deletion does not affect complex activity. The protein is also known as P24. The function of this protein remains to be determined.
