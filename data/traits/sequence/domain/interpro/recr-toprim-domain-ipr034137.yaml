identifier: InterPro:IPR034137
label: "RecR, TOPRIM domain"
definition: >-
  This topoisomerase-primase (TOPRIM) nucleotidyl transferase/hydrolase domain is found in RecR. RecR participates in the RecFOR pathway of homologous recombinational repair in prokaryotes. This pathway provides a single-stranded DNA molecule coated with RecA to allow invasion of a homologous molecule. The RecFOR system directs the loading of RecA onto gapped DNA coated with single-strand DNA binding-protein. The TOPRIM domain has two conserved motifs, one of which centres at a conserved glutamate and the other one at two conserved aspartates (DxD). In RecR sequences this glutamate in the first turn of the TOPRIM domain is semiconserved, the DXD motif is not conserved.
