label: "Domain of unknown function DUF5698"
definition: >-
  DUF5698 can be found at the N terminus of a group of proteins from bacteria and archaea. Their C-terminal transmembrane helix contains a GXXXGXXXG motif which is characteristic of transmembrane helices that dimerise.
