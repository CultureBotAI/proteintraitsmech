identifier: InterPro:IPR062806
label: "Colossin-D, first immunoglobulin-like domain"
definition: >-
  This entry represents the first immunoglobulin-like domain of Colossin-D. Colossin-D is a secreted protein found in Dictyostelium discoideum that belongs to the serine-aspartate repeat-containing protein (SDr) family. The protein contains multiple N-linked glycosylation sites.
