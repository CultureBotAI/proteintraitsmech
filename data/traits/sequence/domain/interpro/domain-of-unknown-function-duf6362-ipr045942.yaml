label: "Domain of unknown function DUF6362"
definition: >-
  This domain of unknown function is found in uncharacterised proteins predominantly from Proteobacteria. It has a conserved WP motif and it may contain a helix-turn-helix motif as it overlaps with members in the Pfam clan CL0123.
