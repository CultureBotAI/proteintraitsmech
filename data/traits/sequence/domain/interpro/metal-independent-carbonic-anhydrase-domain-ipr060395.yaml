identifier: InterPro:IPR060395
label: "Metal-independent carbonic anhydrase domain"
definition: >-
  This entry represents a domain that covers most of the sequence in metal-independent carbonic anhydrase (MICAH) and similar bacterial sequences. This protein catalyses the hydration of carbon dioxide (CO2) to bicarbonate (HCO3-). It has only very low bicarbonate dehydration activity and may function even in metal-poor environments. This domain is also found in uncharacterised proteins from lower eukaryotes, sometimes repeated in tandem in longer sequences.
