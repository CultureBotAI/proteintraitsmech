identifier: InterPro:IPR035795
label: "E3 ubiquitin-protein ligase SH3RF1, second SH3 domain"
definition: >-
  Plenty of SH3 domains protein 1 (POSH1, also known as POSH or E3 ubiquitin-protein ligase SH3RF1) is an SH3 domain containing protein that has been shown to act as an E3 ubiquitin ligase. It belongs to the POSH family, which includes POSH1, POSH2 and POSH3. It contributes to Rac-induced signal transduction such as JNKs (MAPK8 and MAPK9) activation and induces apoptosis. It plays an essential role in the targeting of HIV-1 Gag to the plasma membrane. This entry represents the second SH3 domain of SH3RF1.
