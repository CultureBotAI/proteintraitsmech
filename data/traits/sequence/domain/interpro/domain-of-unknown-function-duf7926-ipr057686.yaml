identifier: InterPro:IPR057686
label: "Domain of unknown function DUF7926"
definition: >-
  This domain is found in uncharacterised bacterial proteins mainly from Actinomycetes. It is predicted to fold into a β-sandwich with topological similarity to domains members of the adhesin superfamily. Most members contain conserved lysine aspartate and asparagine residues that are likely to form an isopeptide bond. This domain is frequently found in combination with DUF5979.
