identifier: InterPro:IPR060539
label: "OTUD7A/B, UBA domain"
definition: >-
  This ubiquitin-associated (UBA) domain is found at the N-terminal of human OTU domain-containing protein 7A/B (OTUD7A/B) and related proteins. OTUD7A is a deubiquitinase that cleaves Lys-11-linked polyubiquitin chains and might be required for PA28-20S proteasome assembly. OTUD7B is a negative regulator of the non-canonical NF-kappa-B pathway that acts by mediating deubiquitination of Lys-48-linked polyubiquitin chains of TRAF3, an inhibitor of the NF-kappa-B pathway, thereby acting as a negative regulator of B-cell responses. UBA domains are often involved in ubiquitin binding.
