label: "PG_1098 ferredoxin-like domain"
definition: >-
  This entry represents a ferredoxin-like domain found in a group of poorly characterised sequences, including the putative methyltransferase PG_1098 from Porphyromonas gingivalis ( , ). Members of this entry contain a THUMP-like domain at the C-terminal ( ), following this domain.
