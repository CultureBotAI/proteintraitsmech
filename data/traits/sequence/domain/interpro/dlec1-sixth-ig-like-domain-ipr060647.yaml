identifier: InterPro:IPR060647
label: "DLEC1, sixth Ig-like domain"
definition: >-
  This domain is found in Deleted in lung and esophageal cancer protein 1 DLEC1 from human and related proteins. This protein is essential for spermatogenesis and male fertility and may play a role in the sperm head and tail formation. This entry represents the 6th Ig-like domain of human DLEC1.
