identifier: InterPro:IPR063382
label: "VLP4 domain"
definition: >-
  This entry represents a β sheet domain found in multiple copies within VLP4 (Vacuole-localised protein 4) from Beauveria bassiana. In VLP4, this domain appears three times in tandem within the protein sequence and contains the conserved motif CAAPGDYDD-GRYSCNPAHQYPNGQSCK. VLP4 is localised to vacuoles and is required for aerial conidiation, conidial maturation, blastospore production and virulence. The specific function of this repeated β sheet domain remains to be determined.
