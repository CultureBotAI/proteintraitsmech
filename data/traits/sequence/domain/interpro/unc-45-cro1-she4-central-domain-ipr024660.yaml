identifier: InterPro:IPR024660
label: "UNC-45/Cro1/She4, central domain"
definition: >-
  The UNC-45 protein contain an NH2-terminal domain with three tetratricopeptide repeat motifs, a unique central domain, and a COOH-terminal domain homologous to CRO1 and She4. This entry represents the central domain of the UNC-45 protein.
