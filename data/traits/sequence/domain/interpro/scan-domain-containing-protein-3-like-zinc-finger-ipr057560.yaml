label: "SCAN domain-containing protein 3-like, zinc finger"
definition: >-
  This zinc finger domain is found in human SCAN domain-containing protein 3 (SCAND3) and similar animal proteins. SCAND3 is a candidate prognostic marker for non-small cell lung cancer.
