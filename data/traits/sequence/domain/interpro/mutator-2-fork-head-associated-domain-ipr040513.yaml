identifier: InterPro:IPR040513
label: "Mutator 2, fork head associated domain"
definition: >-
  This is the N-terminal forkhead-associated (FHA) domain found in Drosophila mutator 2 (MU2) protein. FHA domains are generally phosphothreonine (pThr) specific-binding domains and are present in DNA repair and checkpoint proteins. However, phosphothreonine binding is not conserved in the MU2 active site pocket due to the absence of three key residues needed for pThr binding. Dimerization, is conserved between FHA domains of Drosophila MU2 and human MDC1 albeit through different interfaces. The MU2 FHA domain dimerizes via the β-sheet 2, the MDC1 FHA domain dimerizes via the opposite β-sheet 1.
