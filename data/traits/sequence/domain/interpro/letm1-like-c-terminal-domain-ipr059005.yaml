identifier: InterPro:IPR059005
label: "LETM1-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of human Mitochondrial proton/calcium exchanger protein (LETM1) and similar animal proteins. LETM1 plays an important role in maintenance of mitochondrial morphology and in mediating either calcium or potassium/proton antiport. This domain seems to be exclusive for LETM1 proteins in animals.
