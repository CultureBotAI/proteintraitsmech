identifier: InterPro:IPR055238
label: "VEGFR1-3-like, N-terminal Ig-like domain"
definition: >-
  This entry represents the N-terminal Ig-like domain of Vascular endothelial growth factor receptor 1-3 (VEGFR1-3) from vertebrates. Members are tyrosine kinase receptors with seven Ig-like domains in its extracellular portion. This entry also includes Platelet-derived growth factor receptor alpha, a tyrosine-protein kinase that acts as a cell-surface receptor for PDGFA, PDGFB and PDGFC and plays an essential role in the regulation of embryonic development, cell proliferation, survival and chemotaxis.
