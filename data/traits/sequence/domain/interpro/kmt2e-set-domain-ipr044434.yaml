identifier: InterPro:IPR044434
label: "KMT2E, SET domain"
definition: >-
  This entry represents the SET domain found in KMT2E. The protein known as histone-lysine N-methyltransferase 2E (KMT2E, mixed-lineage leukemia 5 or MLL5) has been shown to lack key residues and an essential loop in the the SET-I subdomain required for binding substrate and cofactors. MLL5 had been thought to be specific for mono- and dimethylation of 'Lys-4' of histone H3 (H3K4me1 and H3K4me2; which are specific tags for epigenetic transcriptional activation), and a component of an MLL5 complex, but the paper describing this alleged complex has been retracted by the authors. MLL5 mediates hematopoietic cell homeostasis, spermatogenesis, cell cycle progression, and survival. It is recruited to gene-rich euchromatic regions via the interaction of its plant homeodomain finger with the histone mark H3K4me3. Overexpression of the MLL5 gene induced cell cycle arrest in G(1) phase.
