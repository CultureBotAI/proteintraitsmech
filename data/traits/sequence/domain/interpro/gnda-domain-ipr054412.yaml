identifier: InterPro:IPR054412
label: "GndA domain"
definition: >-
  This domain covers the whole protein sequence in GndA from Escherichia coli, a small open reading frame (smORF)-encoded heat shock protein contained entirely within the 6-phosphogluconate dehydrogenase Gnd that is predicted to form a transmembrane helix. It is also found in combination with other domains in other proteins from Enterobacterales.
