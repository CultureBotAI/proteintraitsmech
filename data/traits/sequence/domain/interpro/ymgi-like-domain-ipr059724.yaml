identifier: InterPro:IPR059724
label: "YmgI-like domain"
definition: >-
  This entry represents the YmgI domain found in bacteria. This domain is found in Escherichia coli (gene ymgI, locus b4593) and related bacterial proteins. The function of this domain remains to be determined.
