label: "PFE-CTERM domain"
definition: >-
  PFE-CTERM is a PEP-CTERM-like C-terminal short tripartite protein-sorting signal, found in cyanobacteria. PFE_CTERM domain-containing proteins often are often encoded close to cyanoexosortase A.
