identifier: InterPro:IPR062131
label: "J domain-containing protein 1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of J domain-containing protein 1 (JID1) and related proteins found in fungi. JID1 is a mitochondrial membrane protein that functions as a probable chaperone and belongs to the DnaJ protein group. The protein contains an N-terminal J domain and a transmembrane helix region, with this C-terminal domain located downstream. JID1 is localised to the mitochondrial inner membrane as a single-pass membrane protein. The specific function of this C-terminal domain remains to be determined.
