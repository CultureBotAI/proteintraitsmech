identifier: InterPro:IPR028933
label: "Lebercilin domain"
definition: >-
  This entry represents a domain found in lebercilin (LCA5) and lebercilin like proteins. LCA5 might be involved in minus end-directed microtubule transport. Defects in LCA5 are the cause of Leber congenital amaurosis type 5 (LCA5). LCA designates a clinically and genetically heterogeneous group of childhood retinal degenerations, generally inherited in an autosomal recessive manner. LCA represents the most common genetic cause of congenital visual impairment in infants and children.
