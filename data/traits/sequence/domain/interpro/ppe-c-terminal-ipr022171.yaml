identifier: InterPro:IPR022171
label: "PPE, C-terminal"
definition: >-
  This region is found at the C-terminal of bacterial proteins from the PPE family, and is approximately 90 amino acids in length. The region is found in association with . There is a conserved SVP sequence motif. There is a single completely conserved residue W that may be functionally important. The proteins in this family are PE/PPE proteins implicated in immunostimulation and virulence. The human pathogen Mycobacterium tuberculosis harbours a large number of genes that encode proteins whose N-terminals contain the characteristic motifs Pro-Glu (PE) or Pro-Pro-Glu (PPE). These proteins are exported to the bacterial surface via type VII secretion systems known as ESX. A subgroup of the PE proteins contains polymorphic GC-rich sequences (PGRS), while a subgroup of the PPE proteins contains major polymorphic tandem repeats (MPTR). The function of most of these proteins remains unknown. However, the PE_PGRS proteins from Mycobacterium marinum are secreted by components of the ESX-5 system that belongs to the recently defined type VII secretion systems. It has also been reported that the PE_PGRS family of proteins contains multiple calcium-binding and glycine-rich sequence motifs GGXGXD/NXUX. This sequence repeat constitutes a calcium-binding parallel β-roll or parallel β-helix structure and is found in RTX toxins secreted by many Gram-negative bacteria. PPE51 member has been described as a small molecule-selective channel required for the uptake of nutrients across the outer mycomembrane. This protein transports glycerol and glucose as well as maltose and lactose disaccharides. It is involved in sensitivity to M.tuberculosis growth inhibitory agrichemical 3,3-bis-di(methylsulfonyl)propionamide (3bMP1) and sensitivity to bactericidal thio-disaccharide T-6 compound.
