identifier: InterPro:IPR060029
label: "MutS5, N-terminal domain"
definition: >-
  This entry represents the N-terminal in MutS5 proteins mostly found in animals, fungi and plants. This domain contains a RNaseH-like fold. MutS5 (or MSH5) is involved in DNA mismatch repair and meiotic recombination processes. It plays a crucial role in facilitating crossovers between homologous chromosomes during meiosis, which is essential for proper chromosome segregation. The family promotes homologous recombination by facilitating chiasma formation during prophase I and is involved in controlling class I crossover formation. Additionally, in some organisms, it participates in the activation of DNA damage-dependent apoptosis at the DNA damage checkpoint in pachytene cells. The heterodimer composed by MSH4-MSH5 is involved in the resolution of Holliday junctions during meiosis. It forms sliding clamps, and recognition of specific DNA structures or lesions results in ADP/ATP exchange.
