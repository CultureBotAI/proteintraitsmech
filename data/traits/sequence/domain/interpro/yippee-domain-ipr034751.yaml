identifier: InterPro:IPR034751
label: "Yippee domain"
definition: >-
  The Yippee-like (YPEL) family proteins share homology to drosophila Yippee, a zinc finger binding protein. YPEL proteins are found in essentially all the eukaryotes and hence they must play important roles in the maintenance of life. Subcellular localisation of all YPEL proteins to the centrosomes and the mitotic apparatus suggest their role in the mitosis-associated function. YPEL proteins contain a Yippee domain, which is a putative zinc-finger-like, metal-binding domain. The Yippee domain contains two cysteine pairs that are fifty-two amino acids apart (C-X(2)-C-X(52)-C-X(2)-C) and could be part of a metal (zinc) binding pocket.
