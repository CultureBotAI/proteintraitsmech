identifier: InterPro:IPR056237
label: "ANKLE2, third alpha/beta domain"
definition: >-
  This domain is found in the human Ankyrin repeat and LEM domain-containing protein 2 (ANKLE2) and related proteins. Human ANKLE2 is involved in mitotic nuclear envelope reassembly by promoting dephosphorylation of BAF/BANF1 during mitotic exit. The domain represented by this entry is predicted to adopt a globular α/β structure consisting of a five-stranded antiparallel β-sheet and helices packed on one side of it.
