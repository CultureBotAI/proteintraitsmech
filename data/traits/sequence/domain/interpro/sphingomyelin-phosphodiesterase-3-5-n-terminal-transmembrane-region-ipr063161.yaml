identifier: InterPro:IPR063161
label: "Sphingomyelin phosphodiesterase 3/5, N-terminal transmembrane region"
definition: >-
  This entry represents the N-terminal transmembrane region of neutral sphingomyelinases (nSMases), including SMPD3 and SMPD5. This region contains intramembrane helices that anchor these enzymes to cellular membranes. In SMPD3, this region contains anionic phospholipid binding domains that bind phosphatidylserine and phosphatidic acid, which modulate enzymatic activity and subcellular localisation. SMPD3 localises to the Golgi and plasma membrane, while SMPD5 localises to the mitochondrial inner membrane. This domain is found N-terminal to the catalytic Exo_endo_phos domain ( ) and is restricted to vertebrates.
