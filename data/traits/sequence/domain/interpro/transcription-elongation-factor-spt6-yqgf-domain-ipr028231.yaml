identifier: InterPro:IPR028231
label: "Transcription elongation factor Spt6, YqgF domain"
definition: >-
  The YqgF domain of Spt6 proteins is homologous to the E.coli Holliday junction resolvase RuvC, but its putative catalytic site lacks the carboxylate side chains critical for coordinating magnesium ions that mediate phosphodiester bond-cleavage.
