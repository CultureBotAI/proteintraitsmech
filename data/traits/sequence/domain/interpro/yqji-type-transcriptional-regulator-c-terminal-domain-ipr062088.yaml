identifier: InterPro:IPR062088
label: "YqjI-type transcriptional regulator, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in YqjI-type transcriptional regulators from bacteria. YqjI from Escherichia coli is a metal-responsive transcriptional repressor that regulates expression of the ferric reductase gene yqjH under conditions of excess nickel. The full-length YqjI protein also autorepresses its own expression and forms oligomers as the predominant functional state. The protein contains an N-terminal DNA-binding domain with a PadR-type fold and this C-terminal domain. Divalent metals such as nickel and iron negatively affect the DNA-binding activity of the full-length protein. The specific function of this C-terminal domain remains to be determined.
