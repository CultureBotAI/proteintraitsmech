identifier: InterPro:IPR056279
label: "Aip3p/Bud6, N-terminal domain"
definition: >-
  This domain is commonly located at the N-terminal end of Aip3p/Bud6 from fungi. This region is essential for its proper localisation on the plasma membrane and to bind to the microtubule (+) end binding protein Bim1. Its absence results in altered localisation patterns, although the secretory pathway remains functional. The N-terminal region of Bud6 contains the major binding site for Aip5, which is required for the formation of actin cables. This domain may adopt a four-helix bundle fold.
