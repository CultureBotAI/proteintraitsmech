identifier: InterPro:IPR056740
label: "Dihydroxy-acid/6-phosphogluconate dehydratase, C-terminal"
definition: >-
  This is the C-terminal domain of Ilv/ED dehydratase protein family which includes dihydroxy-acid/6-phosphogluconate dehydratases, and pentonate dehydratases. This domain is composed of a β-sheet consisting of six parallel and two anti-parallel β-strands that are arranged like a β-barrel. Members of this entry are involved in various biosynthetic and carbohydrate metabolic pathways. Dihydroxy-acid dehydratase catalyses the fourth step in the biosynthesis of isoleucine and valine, the dehydration of 2,3-dihydroxy-isovaleic acid into alpha-ketoisovaleric acid. 6-Phosphogluconate dehydratase catalyses the first step in the Entner-Doudoroff pathway, the dehydration of 6-phospho-D-gluconate into 6-phospho-2-dehydro-3-deoxy-D-gluconate. They consist of two domains, N- and C-terminal, the latter contains residues (Ser490 and Thr492) that participate in the formation of the substrate binding site.
