identifier: InterPro:IPR047548
label: E3 ubiquitin-protein ligase RNF14, Rcat domain
definition: >-
  This entry represents the Rcat domain of RNF14 and similar eukaryotic proteins. This domain is essential for RBR E3 ligase activity and adopts the same fold as the BRcat domain. Ring Finger Protein 14 (RNF14, ARA54, Triad2) belongs to the ring between ring fingers (RBR) family. It is an E3 ubiquitin ligase that acts on unknown substrates and has autoubiquitination activity. It is an enhancer of the Wnt-dependent transcriptional outputs acting at the level of the TCF/LEF-beta-catenin complex, crucial for colon cancer cell survival. Its differential localization may play an important role in testicular development and spermatogenesis in humans. RNF14 functions as a transcriptional regulator of mitochondrial and immune function in muscles. It is a ligand-dependent AR co-activator that enhances AR-dependent transcriptional activation. It may also participate in enhancing cell cycle progression and cell proliferation via induction of cyclin D1. It may function as an AR (androgen receptor) coactivators to induce AR target gene expression. RNF14 may play a regulatory role in mitochondrial and immune gene expression. RNF14 contains an N-terminal RWD domain, and a C-terminal RBR domain. The RBR domain was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)]] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase function to facilitate the ubiquitination reaction. E3 ubiquitin-protein ligase itt1, the homologu…
