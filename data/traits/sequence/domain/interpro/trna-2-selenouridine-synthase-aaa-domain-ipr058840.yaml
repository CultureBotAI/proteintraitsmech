identifier: InterPro:IPR058840
label: "tRNA 2-selenouridine synthase, AAA domain"
definition: >-
  This entry represents the AAA domain in SelU proteins. tRNA 2-selenouridine synthase (SelU) is a monomeric enzyme involved in the post-transcriptional modification of uridine at the wobble position (U34) of tRNA\textsuperscript{Lys}, tRNA\textsuperscript{Glu}, and tRNA\textsuperscript{Gln}, where it catalyses the two-step conversion of 2-thiouridine (S2U-RNA) to 2-selenouridine (Se2U-RNA). This process begins with the geranylation of 2-thiouridine to form S-geranyl-2-thiouridine (geS2U), followed by selenation to produce 2-selenouridine within the tRNA molecule. SelU contains both a rhodanese domain and a P-loop domain, the latter likely binding geranyl diphosphate. The presence of 2-selenouridine at the wobble position enhances the ability of tRNA to recognise multiple synonymous codons that differ at the third nucleotide, thereby expanding decoding capacity.
