identifier: InterPro:IPR056855
label: "IQCH-like, ATP-grasp"
definition: >-
  This domain is found in human IQ domain-containing protein H (IQCH) and similar eukaryotic and bacterial sequences. IQCH may play a regulatory role in spermatogenesis. IQCH contains an IQ motif (a short calmodulin-binding motif containing conserved Ile and Gln residues). It also contains a PreATP-grasp domain, an ATP-grasp domain (this entry) and an α/β-Hammerhead-like C-terminal domain in an arrangement very similar to the one found in PGM1 and Human glycinamide ribonucleotide synthetase .
