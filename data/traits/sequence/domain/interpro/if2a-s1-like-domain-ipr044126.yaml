identifier: InterPro:IPR044126
label: IF2a, S1-like domain
definition: >-
  Eukaryotic and archaeal Initiation Factor 2 (e- and aIF2, respectively) are heterotrimeric proteins with three subunits (alpha, beta, and gamma). The IF2a subunit is a major site of control of the translation initiation process, via phosphorylation of a specific serine residue. This alpha subunit is well conserved in eukaryotes and archaea but is not present in bacteria. This entry represents the S1-like domain found in alpha subunit of both eukaryotic and archaeal translation initiator factor 2. The S1 domain is a RNA binding domain identified in Escherichia coli polynucleotide phosphorylase.
