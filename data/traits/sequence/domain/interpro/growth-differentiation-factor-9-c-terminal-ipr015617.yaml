identifier: InterPro:IPR015617
label: "Growth differentiation factor-9, C-terminal"
definition: >-
  Growth differentiation factor-9 (GDF-9) is a cysteine knot-containing hormone oocyte-derived growth factor and a member of the transforming growth factor-beta (TGF-beta) superfamily that includes TGF-beta, activin, and bone morphogenetic proteins (BMPs). GDF-9 is a growth factor secreted by oocytes in growing ovarian follicles. Recombinant GDF-9 enhances growth and differentiation of cultured ovarian follicles. GDF-9 signalling is mediated by the type I receptor ALK5. Transgenic mice with deletion of the GDF-9 gene are characterised by the arrest of ovarian follicle development at the primary stage, Recombinant growth of GDF-9 enhances growth and differentiation of cultured early ovarian follicles. This entry represents the C-terminal domain of GDF-9.
