identifier: InterPro:IPR003115
label: "ParB-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of ParB proteins, predominantly found in bacteria. Proteins containing this domain include Escherichia coli plasmid protein ParB and mammalian Sulfiredoxin-1 (Srx). This domain is characterised by a highly conserved arginine motig, RRXR, known as the arginine patch, which is crucial for ParB DNA binding activity. Mutations in the corresponding ParB residues lead to loss of function and sub-cellular localisation defects in Bacillus subtilis. This pocket in ParB binds ribonucleotide cytidine triphosphate (CTP). CTP binding is necessary to stabilise the domain in a conformation that facilitates its interaction with ParA. CTP binding modulates the parS-binding affinity of ParB, whereas specific recognition of a parS motif stimulates CTP hydrolysis. ParB plays a vital role in chromosome partitioning and nucleoid occlusion. These proteins are essential for ensuring proper chromosome segregation during cell division by binding to the DNA origin of replication and localising to both poles of the predivisional cell following DNA replication. ParB proteins share significant sequence and structural similarity with Sulfiredoxin (Srx), a sulfinic acid reductase identified in eukaryotes. Sequence comparison and phylogenetic analysis of the Srx and ParB protein families suggest that Srx evolved via truncation of ParB, resulting in the removal of the entire C-terminal half of the protein including the HTH domain. ParB comprises three highly conserved domains: an N-terminal nucleotide-binding domain (NBD) , a central helix-turn-helix parS-binding domain , non-structured linker region, and a C-terminal dimerisation domain that tightly links the two subunits of the ParB dimer.
