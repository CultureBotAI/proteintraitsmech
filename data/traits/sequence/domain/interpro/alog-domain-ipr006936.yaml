identifier: InterPro:IPR006936
label: "ALOG domain"
definition: >-
  The 125-residue ALOG (Arabidopsis LSH1 and oryza G1) domain is rich in basic amino acids, especially arginine, and is highly conserved among land plants. Members of the ALOG family of proteins function as key developmental regulators. It has been proposed that the ALOG domain originated from the N- terminal DNA-binding domains of integrases belonging to the tyrosine recombinase superfamily encoded by a distinct type of DIRS1-like LTR retrotransposon found in several eukaryotes. Secondary structure predictions revealed an all-α helical domain with four conserved helices. Some proteins known to contain an ALOG domain are listed below: Arabidopsis thaliana LIGHT_DEPENDENT SHORT HYPOCOTYLS1 (LSH1), involved in phytochrome-dependent light signalling. Oryza G1, involved in the specification of sterile lemma identity. Plant defence proteins.
