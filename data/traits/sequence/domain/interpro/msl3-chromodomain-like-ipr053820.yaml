identifier: InterPro:IPR053820
label: "MSL3 chromodomain-like"
definition: >-
  This domain is found in Male-specific lethal-3 (MSL3) and other related proteins such as MRG1/2 transcription factors. MSL3 resides in the MSL (male-specific lethal) complex, which upregulates transcription by spreading the histone H4 Lys16 acetyl mark. The MSL3 chromo domain implicated in chromatin targeting and its deletion leads to the disruption of MSL targeting. This domain consists of a SH3-like β-barrel and a long α-helix.
