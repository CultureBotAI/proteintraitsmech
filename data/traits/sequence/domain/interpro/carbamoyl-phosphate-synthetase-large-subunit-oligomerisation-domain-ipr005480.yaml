identifier: InterPro:IPR005480
label: "Carbamoyl-phosphate synthetase, large subunit oligomerisation domain"
definition: >-
  This entry represents the oligomerisation domain found in the large subunit of carbamoyl phosphate synthases as well as in certain other carboxy phosphate domain-containing enzymes. This domain forms a primarily α-helical fold.
