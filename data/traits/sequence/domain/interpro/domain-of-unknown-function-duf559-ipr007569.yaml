identifier: InterPro:IPR007569
label: "Domain of unknown function DUF559"
definition: >-
  This entry represents a domain of unknown function found in Type II nicking enzyme V.HpaIIP from Haemophilus parainfluenzae, an endonuclease that may nick HpaII sequences that contain GT mismatches resulting from m5C-deamination and play a role in the very short patch (VSP) repair process, counteracting mutations. GT mismatches can lead to C-to-T transition mutations if not repaired. VSR repairs the mismatches in favour of the G-containing strand. In Escherichia coli, this endonuclease nicks double-stranded DNA within the sequence CT(AT)GN or NT(AT)GG next to the thymidine residue, which is mismatched to 2'-deoxyguanosine. The incision is mismatch-dependent and strand specific. The structure of VSR is similar to the core structure of restriction endonucleases, which have a 3-layer α/β/α topology. Several catalytic residues from VSR endonucleases are conserved in this domain and form the composite sequence motif EDxHD. This domain can also be found in some uncharacterised proteins, such as HI_0925 from Haemophilus influenzae.
