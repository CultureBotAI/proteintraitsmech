identifier: InterPro:IPR035509
label: "Stac2, SH3 domain"
definition: >-
  Stac proteins are putative adaptor proteins that contain a cysteine-rich C1 domain and one or two SH3 domains at the C terminus. There are three mammalian members (Stac1, Stac2, and Stac3) of this family. Stac2 contains a single SH3 domain at the C terminus unlike Stac1 and Stac3, which contain two C-terminal SH3 domains. Stac1 and Stac2 have been found to be expressed differently in mature dorsal root ganglia (DRG) neurons. Stac1 is mainly expressed in peptidergic neurons while Stac2 is found in a subset of nonpeptidergic and all trkB+ neurons. This entry represents the SH3 domain of Stac2.
