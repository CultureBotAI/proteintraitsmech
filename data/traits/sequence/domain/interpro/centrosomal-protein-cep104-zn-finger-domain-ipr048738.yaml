identifier: InterPro:IPR048738
label: "Centrosomal protein CEP104, Zn finger domain"
definition: >-
  This entry represents the zinc finger domain of CEP104, which interacts with kinase Nek1 which competes with CP110. This domain is also found in the uncharacterised protein C40H1.3 from Caenorhabditis elegans. Centrosomal protein CEP104 localises to the distal end of centrioles that interacts through its N- and C-terminal region, respectively, with the distal end proteins Cep97 and CP110. It is required for ciliogenesis and for structural integrity at the ciliary tip, being involved in regulating microtubule length in cilia. This is a multidomain protein that consists of an N-terminal all-β domain, a central all α-helical HEAT repeat domain and a C-terminal array of four zinc finger domains.
