identifier: InterPro:IPR032174
label: "RNA helicase aquarius, N-terminal domain"
definition: >-
  This entry represents the ARM repeats domain found at the N-terminal of RNA helicase aquarius (also known as intron-binding protein aquarius) and its orthologue from S.pombe cwf11. Aquarius is a splicing factor which links excision of introns from pre-mRNA with snoRP assembly.
