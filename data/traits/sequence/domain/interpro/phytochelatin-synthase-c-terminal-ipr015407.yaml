identifier: InterPro:IPR015407
label: Phytochelatin synthase, C-terminal
definition: >-
  This entry represents the C-terminal region of plant phytochelatin synthases (also known as glutathione gamma-glutamylcysteinyltransferase; ), which is involved in the synthesis of phytochelatins (PC) and homophytochelatins (hPC), the heavy-metal-binding peptides of plants. This enzyme is required for detoxification of heavy metals such as cadmium and arsenate. The N-terminal region of phytochelatin synthase contains the active site, as well as four highly conserved cysteine residues that appear to play an important role in heavy-metal-induced phytochelatin catalysis. The C-terminal region is rich in cysteines, and may act as a metal sensor, whereby the Cys residues bind cadmium ions to bring them into closer proximity and transferring them to the activation site in the N-terminal catalytic domain. The C-terminal region displays homology to the functional domains of metallothionein and metallochaperone.
