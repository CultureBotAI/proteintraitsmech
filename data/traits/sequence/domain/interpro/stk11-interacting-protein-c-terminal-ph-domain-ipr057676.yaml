identifier: InterPro:IPR057676
label: "STK11-interacting protein, C-terminal PH domain"
definition: >-
  This entry represents a pleckstrin homology (PH) domain found in human STK11-interacting protein (S11IP) and related proteins. STK11IP interacts with the serine/threonine kinase 11 (STK11), also known as liver kinase B1 (LKB1). This interaction is important for several cellular processes, including protein localisation and kinase activity regulation.
