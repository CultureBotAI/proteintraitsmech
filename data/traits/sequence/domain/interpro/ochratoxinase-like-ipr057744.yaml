identifier: InterPro:IPR057744
label: Ochratoxinase-like
definition: >-
  This entry describes Ochratoxinase and uncharacterised proteins from bacteria and fungi which are likely Metallo-dependent hydrolases. Proteins represented by this entry have a conserved metal binding site, involving four histidines and one aspartic acid residue. Ochratoxinase is a carboxypeptidase that catalyses the release of C-terminal amino acids, showing specific catalytic activity towards aromatic amino acids such as phenylalanine. This protein is capable of degrading ochratoxin A, one of the five major mycotoxins most harmful to humans and animals, which is produced by Aspergillus and Penicillium species and found in a wide range of agricultural products. The enzymes possess a characteristic two-domain architecture comprising a TIM-barrel and a β-sandwich domain. The activity of some members of this group is known to be inhibited by Zn(2+)-specific chelators, suggesting a dependence on metal ions for catalytic function.
