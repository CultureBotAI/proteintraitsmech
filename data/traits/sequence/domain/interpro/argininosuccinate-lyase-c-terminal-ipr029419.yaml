identifier: InterPro:IPR029419
label: "Argininosuccinate lyase, C-terminal"
definition: >-
  This domain is found at the C terminus of argininosuccinate lyase. Argininosuccinate lyase (ASL, ) participates in arginine synthesis in all organisms catalysing the reversible breakdown of argininosuccinate to arginine and fumarate. The reaction is also part of the urea cycle. The crystal structures of ASLs from several species have been studied, in particular the duck delta1 and delta2 eye lens crystallins, which are inactive and active homologues of ASL, respectively.
