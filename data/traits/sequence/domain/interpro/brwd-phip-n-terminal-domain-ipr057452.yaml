identifier: InterPro:IPR057452
label: "BRWD/PHIP, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of Bromodomain and WD repeat-containing protein (BRWD) and WD repeat-containing proteins (BRWD) and PH-interacting protein (PHIP). It is found in BRWD1, BRWD3 and PHIP proteins, which are involved in transcriptional regulation. BRWD1 and BRWD3 proteins contain multiple bromodomains and WD40 repeats, while PHIP contains WD40 repeats and a PH domain. Bromodomain and WD repeat-containing proteins are involved in the regulation of cell morphology and cytoskeletal organisation, playing a key role in maintaining and controlling cell shape. These proteins may also act as transcriptional activators and participate in chromatin remodelling. Additionally, some members are believed to regulate insulin and insulin-like growth factor signalling pathways, promoting cell proliferation and exhibiting anti-apoptotic activity through AKT1 phosphorylation and activation. They include proteins that bind to acetylated lysine residues on histones, as well as others that interact with key signalling proteins such as SMARCA4, IRS1, and IRS2, indicating a broader involvement in complex protein interactions and regulatory pathways.
