identifier: InterPro:IPR062058
label: "RNF183, C-terminal transmembrane domain"
definition: >-
  This entry represents the C-terminal domain of RNF183, an E3 ubiquitin- protein ligase localised to the endoplasmic reticulum membrane. The domain encompasses the transmembrane region and a short lumenal tail that anchors the protein as a type IV membrane protein. RNF183 is involved in ER stress-induced apoptosis through ubiquitination of BCL2L1 and is found in mammals. The protein is highly expressed in kidney and testis and can undergo autoubiquitination. The transmembrane region is essential for proper subcellular localisation to the ER membrane, cis-Golgi network and lysosomal membranes.
