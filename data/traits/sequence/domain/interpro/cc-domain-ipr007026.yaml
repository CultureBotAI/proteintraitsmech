identifier: InterPro:IPR007026
label: "CC domain"
definition: >-
  This short domain contains four conserved cysteines that are probably required for the formation of two disulphide bonds. The domain is found in Chtb-1 from Caenorhabditis elegans and similar nematode proteins. The domain is named after the characteristic CC motif. Chitin binding domain (ChtBD2) containing chtb-1 (chtb-1) is predicted to enable chitin binding activity. It is also predicted to be located in the extracellular region.
