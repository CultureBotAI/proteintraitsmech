identifier: InterPro:IPR048680
label: "Conserved oligomeric Golgi complex subunit 4, N-terminal"
definition: >-
  This is the N-terminal coiled-coil of COG4. COG4 is a component of the conserved oligomeric Golgi (COG) complex which mediates the proper glycosylation of proteins trafficking through the Golgi apparatus. It is a member of the CATCHR (complexes associated with tethering containing helical rods) family, which includes components of the exocyst, COG, GARP, and Dsl1 complexes, sharing structural and functional features: the α-helical bundles at the middle/C-terminal and a N-terminal coiled-coil region.
