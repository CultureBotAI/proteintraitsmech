identifier: InterPro:IPR060088
label: "PRD1-like, TPR repeat domain"
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found in Protein PUTATIVE RECOMBINATION INITIATION DEFECT 1 from Arabidopsis thaliana (PRD1) and similar plant sequences. PRD1 is involved in DNA cleavage that forms the double-strand breaks (DSB) that initiate meiotic recombination.
