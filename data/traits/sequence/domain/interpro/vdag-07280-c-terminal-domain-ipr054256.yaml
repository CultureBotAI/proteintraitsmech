label: "VDAG_07280, C-terminal domain"
definition: >-
  This α-helical domain is found in Virulence-associated protein VDAG_07280. It is usually found at the C-terminal of proteins containing repeats of . VDAG_07280 is required for conidiation, mycelium production and full virulence. It is also involved in osmotic stress response.
