identifier: InterPro:IPR014821
label: "Inositol 1,4,5-trisphosphate/ryanodine receptor"
definition: >-
  This domain corresponds to the ligand binding region on inositol 1,4,5-trisphosphate receptor, and the N-terminal region of the ryanodine receptor. Both receptors are involved in Ca2+ release. They can couple to the activation of neurotransmitter-gated receptors and voltage-gated Ca2+ channels on the plasma membrane, thus allowing the endoplasmic reticulum to discriminate between different types of neuronal activity.
