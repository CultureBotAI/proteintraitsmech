identifier: InterPro:IPR029205
label: "Aftiphilin, clathrin-binding box"
definition: >-
  Aftiphilin forms a stable complex with p200 and gamma-synergin. It may play a role in membrane trafficking. Aftiphilin contains a clathrin box, with two identified clathrin-binding motifs.
