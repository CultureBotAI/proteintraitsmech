identifier: InterPro:IPR017671
label: "Methanogenesis marker domain 9"
definition: >-
  The exact function of this protein is unknown, but likely is linked to methanogenesis or a process closely connected to it. A 69-amino acid core region of this 110-amino acid domain contains eight invariant Cys residues, including two copies of a motif [WFY]CCxxKPC. These motifs may be metal-binding transcription factor. Some members of this family have an additional N-terminal domain of about 250 amino acids from the nifR3 family of predicted TIM-barrel proteins.
