identifier: InterPro:IPR059180
label: "YorM, 3D domain"
definition: >-
  This entry represents the 3D domain in SPbeta prophage-derived uncharacterized protein YorM which is encoded by the yorM gene within the SPbeta prophage region of Bacillus subtilis (strain 168). This short presumed domain contains three conserved aspartate residues, hence the name 3D. This conservation is suggestive of a cation binding function. The central aspartate is found in a DTG motif that is suggestive of a peptidase like active site.
