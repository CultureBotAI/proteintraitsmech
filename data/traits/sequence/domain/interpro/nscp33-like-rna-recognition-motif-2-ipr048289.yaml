identifier: InterPro:IPR048289
label: "NsCP33-like, RNA recognition motif 2"
definition: >-
  The entry includes the second RRM motif of NsCP33 ( ), Arabidopsis thaliana chloroplastic 31 kDa ribonucleoprotein (CP31A) ( ), glycine-rich RNA-binding protein 2 (AtGR-RBP2) ( ) and related plant and fungal proteins. This entry also includes uncharacterised bacterial sequences. NsCP33 may be involved in splicing and/or processing of chloroplast RNA's. AtCP31A, also called RNA-binding protein 1/2/3 (AtRBP33), or RNA-binding protein CP31A, or RNA-binding protein RNP-T, or RNA-binding protein cp31, is required for specific RNA editing events in chloroplasts and stabilizes specific chloroplast mRNAs, as well as for normal chloroplast development under cold stress conditions by stabilizing transcripts of numerous mRNAs under these conditions. CP31A may modulate telomere replication through RNA binding domains. AtGR-RBP2, also called AtRBG2, or glycine-rich protein 2 (AtGRP2), or mitochondrial RNA-binding protein 1a (At-mRBP1a), plays a role in RNA transcription or processing during stress. It binds RNAs and DNAs sequence with a preference to single-stranded nucleic acids. AtGR-RBP2 displays strong affinity to poly(U) sequence. It exerts cold and freezing tolerance, probably by exhibiting an RNA chaperone activity during the cold and freezing adaptation process.
