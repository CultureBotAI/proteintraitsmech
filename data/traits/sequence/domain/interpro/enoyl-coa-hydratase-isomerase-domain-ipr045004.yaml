identifier: InterPro:IPR045004
label: "Enoyl-CoA hydratase/isomerase domain"
definition: >-
  This entry represents a domain found in enoyl-CoA hydratase/isomerase HIBYL-CoA-H and related proteins. The enoyl-CoA hydratase/isomerase family contains a diverse set of enzymes including: enoyl-CoA hydratase, napthoate synthase, carnitate racemase, 3-hydroxybutyryl-CoA dehydratase and dodecanoyl-CoA delta-isomerase. This entry represents a subset of the enoyl-CoA hydratase/isomerase family. Proteins in this entry includes 3-hydroxyisobutyryl-CoA hydrolases (HIBYL-CoA-H) from eukaryotes and their homologues from bacteria. The EHD3 protein, found in Saccharomyces cerevisiae, has been recognised as a constituent of the mitochondrial ribosome. Hence, it is alternatively referred as small ribosomal subunit mS47.
