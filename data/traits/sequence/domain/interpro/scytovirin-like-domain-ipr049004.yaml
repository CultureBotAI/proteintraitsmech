identifier: InterPro:IPR049004
label: "Scytovirin-like domain"
definition: >-
  Scytovirin ( ) is a protein from the cyanobacteria Scytonema varium with anti cytopathic activity against some strains of HIV. It binds to HIV gp120, HIV gp160 and to a lesser extent HIV gp41. The protein, which adopts a monomeric assembly, has two repeats that form similarly structured domains ( ). Remarkably, it has a high percentage of cysteine residues, all participating in disulfide bonds. This domain is also found in proteins from a few proteobacteria species and plants.
