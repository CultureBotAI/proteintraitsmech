identifier: InterPro:IPR055034
label: "Mu Gam/Sipho_Gp157-like domain of the TOTE conflict systems"
definition: >-
  This entry represents a DNA/RNA hybrid duplex binding domain found in the TOTE (TPR, OB, TBP, Effector) conflict systems. This domain occasionally displaces the more widely observed TOTE-TPR domain.
