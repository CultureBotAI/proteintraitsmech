identifier: InterPro:IPR000095
label: "CRIB domain"
definition: >-
  This entry represents the CRIB domain. Many putative downstream effectors of the small GTPases Cdc42 and Rac contain a GTPase binding domain (GBD), also called p21 binding domain (PBD), which has been shown to specifically bind the GTP bound form of Cdc42 or Rac, with a preference for Cdc42. The most conserved region of GBD/PBD domains is the N-terminal Cdc42/Rac interactive binding motif (CRIB), which consists of about 16 amino acids with the consensus sequence I-S-x-P-x(2,4)-F-x-H-x(2)-H-V-G. Although the CRIB motif is necessary for the binding to Cdc42 and Rac, it is not sufficient to give high-affinity binding. A less well conserved inhibitory switch (IS) domain responsible for maintaining the proteins in a basal (autoinhibited) state is located at the C-terminal of the CRIB-motif. GBD domains can adopt related but distinct folds depending on context. Although GBD domains are largely unstructured in the free state, the IS domain forms an N-terminal β-hairpin that immediately follows the conserved CRIB motif and a central bundle of three α-helices in the autoinhibited state. The interaction between GBD domains and their respective G proteins leads to the formation of a high-affinity complex in which unstructured regions of both the effector and the G protein become rigid. CRIB motifs from various GBD domains interact with Cdc42 in a similar manner, forming an intermolecular β-sheet with strand β2 of Cdc42. Outside the CRIB motif, the C-terminal of the various GBD domains are very divergent and show variation in their mode of binding to Cdc42, perhaps determining the specificity of the interaction. Binding of Cdc42 or Rac to the GBD domain causes a dramatic conformational change, refolding part of the IS domain and unfolding the rest. Some proteins known to contain a…
