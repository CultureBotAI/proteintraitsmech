identifier: InterPro:IPR013677
label: "Non-toxic nonhaemagglutinin, C-terminal"
definition: >-
  The domain described here is found at the C-terminal of the NTNH component. Bacteria of the Clostridium genus produce protein neurotoxins, which are complexes consisting of neurotoxin (NT), haemagglutinin (HA), non-toxic nonhaemagglutinin (NTNH), and RNA. BoNT is always encoded together with associated non-toxic proteins (ANTPs) that are co-produced with it and form a complex that protects the toxin. Often, NTNH is one of these ANTPs, with the ntnh gene lying immediately upstream of the bont gene.
