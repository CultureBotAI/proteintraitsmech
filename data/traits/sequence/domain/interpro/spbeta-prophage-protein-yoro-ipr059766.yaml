identifier: InterPro:IPR059766
label: "SPbeta prophage protein YorO"
definition: >-
  This entry represents a family of small uncharacterised proteins derived from the SPbeta prophage and Bacillales. The prototype member YorO from Bacillus subtilis strain 168 is a 65 amino acid protein of unknown function. SPbeta is a temperate bacteriophage that integrates into the B. subtilis chromosome, and this protein is encoded within the prophage region. The function of this protein family remains unknown.
