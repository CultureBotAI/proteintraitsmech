identifier: InterPro:IPR055433
label: "Pre-mRNA-splicing factor Syf1-like, N-terminal HAT-repeats domain"
definition: >-
  This entry includes a group of pre-mRNA-processing factors that are components of the spliceosome, involved in pre-RNA splicing, including Syf1 from human and its homologues from fungi, CFL1. These proteins contain HAT (Half A TPR) repeats which have a repetitive pattern characterised by three aromatic residues with a conserved spacing. They are structurally and sequentially similar to TPRs. The HAT repeats in these proteins can be divided in three segments, N-terminal, central and C-terminal. This entry represents the N-terminal HAT repeats that in Syf1 and Syf3 contact the U2 core domain via the U2' protein.
