identifier: InterPro:IPR044142
label: "AhpF, N-terminal domain, N-terminal TRX-fold subdomain"
definition: >-
  Alkyl hydroperoxide reductase subunit F (AhpF) is a homodimeric flavoenzyme which catalyzes the NADH-dependent reduction of the peroxiredoxin AhpC, which then reduces hydrogen peroxide and organic hydroperoxides. AhpF contains an NTD containing two contiguous TRX-fold subdomains similar to Pyrococcus furiosus protein disulfide oxidoreductase (PfPDO). It also contains a catalytic core similar to TRX reductase containing FAD and NADH binding domains with an active site disulfide. The NAD(P)H binding domain of AhpF may act to resolve the disulphide which forms after oxidation of the active site cysteine in AphC. This protein contains two paired conserved cysteine motifs, CxxC and CxHCDGP. This entry represents the N-terminal TRX-fold subdomain. It is redox inactive, but is proposed to contain an important residue that aids in the catalytic function of the redox-active CXXC motif contained in the C-terminal TRX-fold subdomain.
