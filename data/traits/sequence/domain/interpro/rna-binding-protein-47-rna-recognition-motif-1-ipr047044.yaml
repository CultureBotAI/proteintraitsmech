identifier: InterPro:IPR047044
label: "RNA-binding protein 47, RNA recognition motif 1"
definition: >-
  RBM47 is a putative RNA-binding protein that shows high sequence homology with heterogeneous nuclear ribonucleoprotein R (hnRNP R) and heterogeneous nuclear ribonucleoprotein Q (hnRNP Q). Like hnRNP R and hnRNP Q, RBM47 contains two well-defined and one degenerated RNA recognition motifs (RRMs). RBM47 is necessary for Cytidine to Uridine RNA editing. This entry represents the RNA recognition motif 1 (RRM1) of RBM47.
