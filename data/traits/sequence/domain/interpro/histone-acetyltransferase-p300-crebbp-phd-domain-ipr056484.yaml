identifier: InterPro:IPR056484
label: "Histone acetyltransferase p300/CREBBP, PHD domain"
definition: >-
  This domain is found in human Histone acetyltransferase p300 (EP300), Histone lysine acetyltransferase CREBBP and similar animal proteins. EP300 functions as a histone acetyltransferase and regulates transcription via chromatin remodelling. Histone lysine acetyltransferase CREBBP acetylates histones, giving a specific tag for transcriptional activation. It mediates acetylation of histone H3 at 'Lys-18' and 'Lys-27' (H3K18ac and H3K27ac, respectively). CREBBP also acetylates non-histone proteins, like DDX21, FBL, IRF2, MAFG, NCOA3, POLR1E/PAF53 and FOXO1. This entry represents the PHD domain, which forms a module with the bromodomain and the RING domain that associates intimately with the HAT domain through numerous conserved contacts.
