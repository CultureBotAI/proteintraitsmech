identifier: InterPro:IPR033927
label: "WASP family, EVH1 domain"
definition: >-
  The entry refers to the EVH1 domain found in WASP family proteins. The EVH1 (WH1, RanBP1-WASP) domain is found in multi-domain proteins implicated in a diverse range of signalling, nuclear transport and cytoskeletal events. This domain of around 115 amino acids is present in species ranging from yeast to mammals. Many EVH1-containing proteins associate with actin-based structures and play a role in cytoskeletal organisation. EVH1 domains recognise and bind the proline-rich motif FPPPP with low-affinity, further interactions then form between flanking residues. WASP family proteins contain an EVH1 (WH1) in their N-terminals which bind proline-rich sequences in the WASP interacting protein. Proteins of the RanBP1 family contain a WH1 domain in their N-terminal region, which seems to bind a different sequence motif present in the C-terminal part of RanGTP protein. The actin nucleation-promoting factor WAS (WASP; also called Bee1p) and its homologue N (neuronal)-WASP are signal transduction proteins that promote actin polymerisation in response to upstream intracellular signals. Wiskott-Aldrich Syndrome (WAS) is an X-linked recessive disease, characterised by eczema, immunodeficiency, and thrombocytopenia. The majority of patients with WAS, or a milder version of the disorder, X-linked thrombocytopenia (XLT), have point mutations in the EVH1 domain of WASP. WASP is an actin regulatory protein consisting of an N-terminal EVH1 domain, a basic region (B), a GTP binding domain (GBP), a proline rich region, a WH2 domain, and a verprolin-cofilin-acidic motif (VCA) which activates the actin-related protein (Arp)2/3 actin nucleating complex. The B, GBD, and the proline-rich region are involved in autoinhibitory interactions that repress or block the activity of the VCA. Yeast memb…
