identifier: InterPro:IPR015259
label: "Methylene-tetrahydromethanopterin dehydrogenase, N-terminal"
definition: >-
  Prokaryotic methylene-tetrahydromethanopterin dehydrogenase catalyses the dehydrogenation of methylene-tetrahydromethanopterin during growth on one-carbon compounds such as methanol. It can also catalyse the reversible dehydrogenation of methylene-tetrahydrofolate, though at much lower efficiency. The pterin domain of this protein is composed of two α-β segments found at the N- and C-terminal ends of the polypeptide respectivly. This entry represents the N-terminal segment of the pterin domain, with a core comprising three α/β/α layers in which each sheet contains four strands.
