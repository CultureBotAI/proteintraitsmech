identifier: InterPro:IPR013572
label: Transcription regulator MAATS, C-terminal
definition: >-
  This entry is named after the various transcriptional regulatory proteins that it contains, including MtrR, AcrR, ArpR, TtgR and SmeT. These are members of the TetR (tetracycline resistance) family of transcriptional repressors, that are involved in the control of expression of multidrug resistance proteins.
