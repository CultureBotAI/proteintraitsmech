identifier: InterPro:IPR017625
label: "Allantoinase PuuE"
definition: >-
  Allantoinase ([ec:]3.5.2.5) can hydrolyze allantoin((2,5-dioxoimidazolidin-4-yl)urea), one of the most important nitrogen carrier for some plants, soil animals, and microorganisms, to allantoate. DAL1 gene from Saccharomyces cerevisiae encodes an allantoinase. However, some organisms possess allantoinase activity but lack DAL1 allantoinase. In those organisms, a defective allantoinase gene, named puuE (purine utilization E), encodes an allantoinase that specifically catalyzes the hydrolysis of (S)-allantoin into allantoic acid. PuuE allantoinase is related to polysaccharide deacetylase (DCA), one member of the carbohydrate esterase 4 (CE4) superfamily, that removes N-linked or O-linked acetyl groups of cell wall polysaccharides, and lacks sequence similarity with the known DAL1 allantoinase that belongs to the amidohydrolase superfamily. PuuE allantoinase functions as a homotetramer. Its monomer is composed of a 7-stranded barrel with detectable sequence similarity to the 6-stranded barrel NodB homology domain of DCAs. It appears to be metal-independent and acts on a small substrate molecule, which is distinct from the common features of DCAs that are normally metal ion dependent and recognize multimeric substrates.
