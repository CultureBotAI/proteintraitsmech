identifier: InterPro:IPR056157
label: "IFT80/172/WDR35, TPR domain"
definition: >-
  This entry represents the tetratricopeptide-like repeats (TPRs) domain found in proteins comprising the intraflagellar transport (IFT) complexes B2 and A, which are found in nematodes and mammals, including IFT80, IF172, WDR35, DYF2 and other eukaryotic proteins. The IFT complex is required for retrograde ciliary transport and entry of G protein-coupled receptors (GPCRs) into cilia, and it is involved in ciliogenesis.
