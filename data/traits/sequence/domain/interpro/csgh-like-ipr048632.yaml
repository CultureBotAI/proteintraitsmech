identifier: InterPro:IPR048632
label: CsgH-like
definition: >-
  CsgH is a Curli-like protein found in proteobacteria. These proteins adopt a seven stranded β-sandwich fold. CsgH is a functional homologue of CsgC and is a potent inhibitor of CsgA amyloid formation.
