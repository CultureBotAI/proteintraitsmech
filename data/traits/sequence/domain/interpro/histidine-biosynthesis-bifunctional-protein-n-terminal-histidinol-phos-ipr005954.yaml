identifier: InterPro:IPR005954
label: Histidine biosynthesis bifunctional protein, N-terminal histidinol-phosphatase domain
definition: >-
  This entry describes a histidinol phosphatase domain. This domain occurs in Histidine biosynthesis bifunctional protein HisB at the N-terminal region, followed by an imidazoleglycerol-phosphate dehydratase domain ( ). These enzymatic domains catalyse the ninth and seventh steps, respectively, of histidine biosynthesis.
