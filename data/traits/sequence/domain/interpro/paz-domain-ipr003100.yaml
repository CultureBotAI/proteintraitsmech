identifier: InterPro:IPR003100
label: PAZ domain
definition: >-
  This domain is named after the proteins Piwi Argonaut and Zwille. It is also found in the CAF protein from Arabidopsis thaliana. This domain has been found in the middle region of a number of members of the Argonaute protein family, which also contain the Piwi domain in their C-terminal region. Several members of this family have been implicated in the development and maintenance of stem cells through the RNA-mediated gene-quelling mechanisms associated with the protein DICER. The PAZ (Piwi/Argonaute/Zwille) domain was identified from structure-function studies as a RNA-binding module, with subsequent structure-function studies on RNA-bound complexes defining the principles underlying recognition of a 2-nt overhang at the 3' end of double-stranded RNA (dsRNA), as well as recognition of the 3' end of single-stranded RNA (ssRNA). PAZ domain of mouse Piwi-like protein 1 was shown to recognise 2'-O-methylated RNA at its 3'-end.
