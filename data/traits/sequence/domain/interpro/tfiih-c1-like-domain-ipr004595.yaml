identifier: InterPro:IPR004595
label: TFIIH C1-like domain
definition: >-
  The carboxyl-terminal region of TFIIH is essential for transcription activity. This regions binds three zinc atoms through two independent domains. The first contains a C4 zinc finger motif, whereas the second is characterised by a CX(2)CX(2-4)FCADCD motif. The solution structure of the second C-terminal domain revealed homology with the regulatory domain of protein kinase C.
