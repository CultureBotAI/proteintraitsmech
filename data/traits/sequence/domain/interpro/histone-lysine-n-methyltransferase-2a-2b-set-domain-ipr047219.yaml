identifier: InterPro:IPR047219
label: "Histone-lysine N-methyltransferase 2A/2B, SET domain"
definition: >-
  This entry represents the SET domain of Histone-lysine N-methyltransferase 2A/B (KMT2A/B) and KMT2B. Both act as histone methyltransferases that methylate 'Lys-4' of histone H3 (H3K4me), which represents a specific tag for epigenetic transcriptional activation. Abnormal expression of KMT2B has been associated with early-onset generalized dystonia. The homologue of KMT2A in Drosophila melanogaster is also named Histone-lysine N-methyltransferase trithorax.
