identifier: InterPro:IPR053955
label: "Csm6, CARF domain"
definition: >-
  This entry represents the CARF domain of CRISPR system endoribonuclease Csm6 from Enterococcus italicus and similar bacterial sequences. Csm6 is a Cas (CRISPR-associated) protein from type III-A CRISPR-Cas system. It consists of a CARF domain at the N-terminal, a six-helix domain and a C-terminal HEPN domain at the C-terminal ( ). This domain is a ring nuclease.
