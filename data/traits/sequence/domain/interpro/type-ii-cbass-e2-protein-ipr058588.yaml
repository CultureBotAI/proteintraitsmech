identifier: InterPro:IPR058588
label: "Type II CBASS E2 protein"
definition: >-
  E2-CBASS is a subtype of the bacterial CBASS (Cyclic oligonucleotide-Based Anti-Phage Signaling System), which is an innate immune system found in bacteria and archaea that protects against phage infections. CBASS systems work by detecting phage infection and triggering a form of programmed cell death (abortive infection) to prevent phage replication and protect the bacterial population. The E2-CBASS operon encodes a cGAS, an enzyme which synthesizes cyclic oligonucleotides such as 3',2'-cGAMP. Upon phage infection, the activated cGAS activates downstream effectors, often resulting in membrane disruption and cell death. E2 regulates cGAS. It cleaves the C-terminal of cGAS or the isopeptide bond, conjugates cGAS to a cysteine residue, and ligates cGAS to a lysine residue. cGAS is processes directly without any cofactors. E2-CBASS adopts the fold typical for Ubiquitin-conjugating enzymes.
