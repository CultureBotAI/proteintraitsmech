identifier: InterPro:IPR055156
label: "Formimidoylglutamate deiminase, N-terminal domain"
definition: >-
  This entry represents a small domain found at the N-terminal end of Formimidoylglutamate deiminase from Pseudomonas aeruginosa (also known as N-formimino-L-Glutamate Iminohydrolase, HutF, , ), N-acetylgalactosamine-6-phosphate deacetylasefrom Escherichia coli (AgaA) and similar proteins predominantly found in proteobacteria. This domain shows an all-β structure. HutF catalyses the hydrolysis of N-formimino-L-glutamate to N-formyl-L-glutamate and ammonia. AgaA catalyses the deacetylation of N-acetyl-D-galactosamine 6-phosphate to D-galactosamine 6-phosphate. Can probably also catalyze the deacetylation of N-acetyl-D-glucosamine 6-phosphate to D-glucosamine 6-phosphate.
