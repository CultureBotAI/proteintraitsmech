identifier: InterPro:IPR041127
label: "PET hydrolase/cutinase-like"
definition: >-
  This entry includes Poly(ethylene terephthalate) hydrolase which is involved in the degradation and assimilation of the plastic poly(ethylene terephthalate) (PET). It also includes cutinases which catalyse the hydrolysis of cutin, a polyester that forms the structure of plant cuticle. They show esterase activity towards p-nitrophenol-linked aliphatic esters (pNP-aliphatic esters). These proteins share a PET hydrolase fold similar to that found in chlorophyllases.
