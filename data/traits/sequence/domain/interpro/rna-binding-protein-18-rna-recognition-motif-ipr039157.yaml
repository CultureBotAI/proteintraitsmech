identifier: InterPro:IPR039157
label: "RNA-binding protein 18, RNA recognition motif"
definition: >-
  This entry represents the RRM (RNA recognition motif) of RBM18, a putative RNA-binding protein containing a well-conserved RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain). The biological role of RBM18 remains unclear.
