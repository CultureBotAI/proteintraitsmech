identifier: InterPro:IPR055413
label: "Matrix protein, C-terminal, Paramyxoviridae"
definition: >-
  This entry represents the C-terminal domain found in a variety of paramyxoviruses such as morbillivirus, paramyxovirus, pneumovirus M proteins. The C-terminal domain of the NDV matrix protein, similar to the N-terminal domain, adopts a β-sandwich fold with β-strands in the opposing β-sheets arranged approximately orthogonal to each other. The C-terminal domain is also decorated with several surface-exposed α-helices. It is connected to the N-terminal domain by a ~16 amino acid linker. The C-terminal domain contributes to the formation of the physiologically relevant matrix protein dimer, with the two domains related by an approximate fourfold rotation axis aligned with the dimer twofold axis. Key residues in helix α9 of the C-terminal domain participate in hydrogen bonding and electrostatic interactions across the dimer interface. The C-terminal domain also contains a positively charged surface that faces the viral membrane, facilitating association with the negatively charged membrane.
