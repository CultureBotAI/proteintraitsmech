identifier: InterPro:IPR060427
label: "Ninein-like, coiled-coil domain"
definition: >-
  This entry represents a coiled-coil domain found in Ninein and similar proteins from vertebrates. Ninein is required for the positioning and anchorage of microtubule minus-ends at centrosomes. The protein contains multiple EF-hand calcium-binding domains at the N-terminal region and extensive coiled-coil regions that facilitate protein-protein interactions. It localises to the pericentriolar matrix and subdistal appendages of the mother centriole. The protein undergoes alternative splicing to produce multiple isoforms with distinct subcellular localisations and functions. Mutations in human ninein (NIN) are associated with Seckel syndrome, a form of microcephalic primordial dwarfism. The protein interacts with gamma-tubulin ring complexes and is phosphorylated by various kinases including Aurora A and protein kinase A.
