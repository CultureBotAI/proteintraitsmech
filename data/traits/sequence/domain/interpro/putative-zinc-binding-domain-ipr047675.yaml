identifier: InterPro:IPR047675
label: "Putative zinc-binding domain"
definition: >-
  This entry represents a small (~40 residues in length) domain that is found in a group of uncharacterised proteins. This domain contains three conserved cysteines and a histidine that could potentially bind to zinc. This putative zinc-finger is very likely to adopt structure similar to GATA-like zinc-fingers.
