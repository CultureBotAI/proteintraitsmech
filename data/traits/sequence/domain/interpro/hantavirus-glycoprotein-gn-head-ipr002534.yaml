identifier: InterPro:IPR002534
label: Hantavirus glycoprotein Gn, head
definition: >-
  This entry represents the Gn glycoprotein in which, the N-terminal two-thirds has been denoted as 'head' (Gn-H) interacts with Gc ectodomain. Release of Gn-H at acid pH induces a further conformational change of the Gc domain II tip which exposes non-polar side chains for insertion into the endosomal membrane. The C-terminal region of the Gn ectodomain is denoted as Gn base (Gn-B), which contributes the most to the intra-spike tetrameric contacts. The medium (M) genome segment of Hantaviruses (family Bunyaviridae) encodes the two virion glycoproteins, Gn and Gc (also known as G1 and G2, respectively) as a polyprotein precursor. Gn and Gc forms homotetramers at the surface of the virion, which attach the virion to host cell receptors including integrin beta3/ITGB3 and induce internalization, predominantly through clathrin-dependent endocytosis.
