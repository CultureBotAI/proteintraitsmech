identifier: InterPro:IPR025867
label: "MnmE, helical domain"
definition: >-
  The tRNA modification GTPase MnmE consists of three domains. An N-terminal domain, a helical domain and a GTPase domain which is nested within the helical domain. This entry represents the helical domain.
