identifier: InterPro:IPR062503
label: "CRISPR-associated endonuclease/helicase Cas3, fourth domain"
definition: >-
  This entry represents the C-terminal domain of the CRISPR-associated endonuclease/helicase Cas3. Cas3 is a key component of Type I CRISPR-Cas systems, which provide adaptive immunity against foreign genetic elements in bacteria and archaea. The protein possesses endonuclease, 3'-5' exonuclease and ATP-dependent dsDNA helicase activities, and functions together with the Cascade complex to degrade target DNA. The full-length protein contains an N-terminal HD nuclease domain, followed by a DEAD-box helicase domain and a Cas3-like C-terminal domain. The specific function of this domain remains to be determined.
