identifier: InterPro:IPR018864
label: Nucleoporin Nup188, N-terminal
definition: >-
  This protein folds into an extended stack of helices where the N-terminal forms a closed ring (subdivided into subdomains I-III in) and the C-terminal forms a more regular, superhelical structure. This entry represents the N-terminal helical repeats from Nup188. Nup188 is one of the many peptides that make up the nucleoporin complex (NPC), and is found across eukaryotes. The Nup188 subcomplex (Nic96p-Nup188p-Nup192p-Pom152p) is one of at least six that make up the NPC, and as such is symmetrically localised on both faces of the NPC at the nuclear end, being integrally bound to the C terminus of Pom34p.
