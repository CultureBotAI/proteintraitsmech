identifier: InterPro:IPR058993
label: "DUF7961, C-terminal domain"
definition: >-
  This domain is found C-terminal to a restriction endonuclease-like domain . Many members of this group of uncharacterised proteins from halobacteria contain two copies of this domain. The structure of the domain is predicted to fold into a SH3-like β barrel.
