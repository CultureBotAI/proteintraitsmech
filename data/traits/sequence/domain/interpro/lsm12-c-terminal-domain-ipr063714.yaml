identifier: InterPro:IPR063714
label: "LSM12, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of LSM12, found in Trypanosomatidae. LSM12 is a PBP1-interacting protein involved in post-transcriptional regulation of gene expression. The protein forms complexes with MKT1 or MKT1L, PBP1 and XAC1. The N-terminal region contains an Sm domain while this C-terminal domain interacts directly.
