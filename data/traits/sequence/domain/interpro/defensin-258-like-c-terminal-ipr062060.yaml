identifier: InterPro:IPR062060
label: "Defensin 258-like, C-terminal"
definition: >-
  This entry represents defensin-like protein 258 and similar proteins. This protein contains conserved cysteine residues that form disulfide bonds. Members are found in Arabidopsis thaliana and are secreted to the extracellular region. Some members lack one of the four disulfide bonds that are typically conserved features of the family.
