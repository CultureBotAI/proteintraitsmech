identifier: InterPro:IPR056522
label: "Uncharacterized bromodomain-containing protein 10, helical domain"
definition: >-
  This entry represents an helical domain found in the uncharacterised bromodomain-containing protein 10 (BRD10, also known as KIAA2026) humans and similar sequences, whose function is currently unknown. This domain is found towards the N-terminal end and may adopt an all-helical structure.
