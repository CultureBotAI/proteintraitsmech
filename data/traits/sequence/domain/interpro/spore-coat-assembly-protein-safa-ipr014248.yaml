identifier: InterPro:IPR014248
label: "Spore coat assembly protein SafA"
definition: >-
  This entry represents a subset of the LysM domain of about 40 residues long which is found in a variety of enzymes involved in bacterial cell wall degradation, and which may have a general peptidoglycan binding function. Proteins containing this domain include SafA of Bacillus subtilis, which is a protein found at the interface of the spore cortex and spore coat, and which is dependent on SpoVID for its localization. This domain is generally found towards the N terminus of these proteins. The C-terminal region of these proteins are more variable and may contain blocks of 12-residue and 13-residue repeats, or an SCP-like domain ( ).
