identifier: InterPro:IPR054144
label: "TcdA1, receptor binding domain 1"
definition: >-
  This domain is found in TcdA1 from Photorhabdus luminescens and similar sequences from proteobacteria. TcdA1 is one of the three subunits of the Tc toxins. TcdA1 acts as an injecting device responsible for translocating the actual toxic component into host cells. TcA has four receptor-binding domains. This domain is one of 4 receptor binding domains found in TcA. All four domains have an immunoglobulin (Ig)-like β-sandwich fold of two sheets with antiparallel β-strands.
