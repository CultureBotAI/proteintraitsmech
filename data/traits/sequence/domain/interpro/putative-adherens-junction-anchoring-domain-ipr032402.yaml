identifier: InterPro:IPR032402
label: "Putative adherens-junction anchoring domain"
definition: >-
  This is a domain lying between the LIM actin-binding and the vilin-head domains of actin-binding LIM proteins (abLIMs). It is likely that this domain is involved in anchoring abLIMs to circumferential actin bundles in specific cell types. It is also found in Dematin, an actin-binding protein originally identified in the junctional complex of the erythrocyte plasma membrane.
