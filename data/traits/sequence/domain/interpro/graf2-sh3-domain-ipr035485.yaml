identifier: InterPro:IPR035485
label: "GRAF2, SH3 domain"
definition: >-
  GRAF2, also called Rho GTPase activating protein 10 (ARHGAP10) or PS-GAP, is a GAP with activity towards Cdc42 and RhoA. It regulates caspase-activated p21-activated protein kinase-2 (PAK-2p34). GRAF2 interacts with PAK-2p34, leading to its stabilization and decrease of cell death. It is highly expressed in skeletal muscle, and is involved in alpha-catenin recruitment at cell-cell junctions. This entry represents the SH3 domain of GRAF2.
