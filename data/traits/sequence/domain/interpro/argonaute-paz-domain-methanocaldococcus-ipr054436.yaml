identifier: InterPro:IPR054436
label: "Argonaute, PAZ domain, methanocaldococcus"
definition: >-
  This entry represents the PAZ domain of Protein argonaute from Methanocaldococcus jannaschii (Ago,) and similar sequences. Ago is a DNA-guided ssDNA endonuclease that may play a role in defence against invading genetic elements that uses short ssDNA sequences as guides (gDNA) to bind complementary target strands resulting in slicing of the target DNA (tDNA).
