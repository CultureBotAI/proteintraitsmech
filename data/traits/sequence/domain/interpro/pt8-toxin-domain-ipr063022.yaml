identifier: InterPro:IPR063022
label: "PT8 toxin domain"
definition: >-
  This domain is found in the toxin protein PT8 from Leptospira interrogans and related proteins. PT8 was shown to possess antibacterial and antifungal activity. It is predicted to fold into a five-stranded β-meander and contains two highly conserved aspartates and histidine residues. PIM8 is its immunity protein.
