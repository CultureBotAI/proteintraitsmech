identifier: InterPro:IPR047338
label: "RUN domain-containing protein 3A, RUN domain"
definition: >-
  This entry represents the RUN domain of RUNDC3A and similar proteins from vertebrates. RUN domain-containing protein 3A (RUNDC3A), also called Rap2-interacting protein 8 (RPIP8), may act as an effector of Rap2A GTPase in neuronal cells.
