identifier: InterPro:IPR057318
label: "Renin receptor, N-terminal domain"
definition: >-
  This domain is found N-terminal in the human renin receptor and related proteins, including the Drosophila homologue, known as dPRR. The domain represented by this entry is predicted to adopt an α/β structure with topological similarity to alkaline phosphatase. Renin receptor is a multifunctional protein which functions as a renin, prorenin cellular receptor and is involved in the assembly of the lysosomal proton-transporting V-type ATPase (V-ATPase) and the acidification of the endo-lysosomal system. Through its function in V-type ATPase (v-ATPase) assembly and acidification of the lysosome it regulates protein degradation and may control different signalling pathways important for proper brain development, synapse morphology and synaptic transmission.
