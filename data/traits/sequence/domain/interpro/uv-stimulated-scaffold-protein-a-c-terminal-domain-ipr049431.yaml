identifier: InterPro:IPR049431
label: "UV-stimulated scaffold protein A, C-terminal domain"
definition: >-
  This entry represents a domain found at the C-terminal end of UVSSA and similar eukaryotic proteins. UV-stimulated scaffold protein A (UVSSA) is part of a UV-induced ubiquitinated protein complex involved in transcription-coupled nucleotide excision repair (TC-NER) in response to UV damage. It stabilise the TC-NER master organising protein ERCC6 (also known as CSB) by delivering the deubiquitinating enzyme USP7 to TC-NER complexes.
