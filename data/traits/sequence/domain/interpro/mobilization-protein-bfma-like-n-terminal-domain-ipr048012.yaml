identifier: InterPro:IPR048012
label: "Mobilization protein BfmA-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the mobilisation protein BfmA from Bacteroides fragilis and similar sequences mainly found in bacteroidetes. BfmA was identified as a mobilisation protein for a pathogenicity island that includes fragilysin (Bacteroides fragilis toxin, or BFT) and the fragilysin family metalloproteinase MP-II. BfmA has partner proteins BfmB (a member of ) and BfmC. The distantly related protein BtgA, also found in Bacteroides fragilis, is a mobilisation factor for antibiotic resistance.
