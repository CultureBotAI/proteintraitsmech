identifier: InterPro:IPR054751
label: "NBAS subunit of NRZ tethering complex, C-terminal"
definition: >-
  This domain is found towards the C-terminal of human NBAS subunit of NRZ tethering complex (NBAS) and similar sequences mainly found in vertebrates. NBAS (also known as Neuroblastoma-amplified sequence) is involved in Golgi-to-endoplasmic reticulum (ER) retrograde transport. This domain is predicted to adopt an all-α structure.
