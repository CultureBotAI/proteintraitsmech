identifier: InterPro:IPR048469
label: "YchJ-like, middle NTF2-like domain"
definition: >-
  This entry represents the NTF2-like domain found in the functionally uncharacterised YchJ protein from Psychrobacter arcticus and related proteins. This domain is usually found flanked by either and at the N and C-terminal or flanked on both sides by. The structure of YchJ shows that this domain adopts a structure typical for NFT2 that consists of a curved three-stranded β-sheet and an array of α-helices packed on one side of it. The function of this domain is unknown.
