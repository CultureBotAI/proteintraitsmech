identifier: InterPro:IPR061186
label: "P110/LppT-like adhesin, N-terminal domain"
definition: >-
  This entry represents a domain found at the N-terminal end of the multifunctional adhesin P110 from Mycoplasma hyopneumoniae and homologues presumed also to be adhesins, including LppT (lipoprotein T), which despite its name seems to lack the signal peptide region Cys residue required for conversion into a lipoprotein, and paralogs MHP683 and MHP684 from Mycoplasma hyopneumoniae.
