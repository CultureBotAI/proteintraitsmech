identifier: InterPro:IPR037709
label: Serine/threonine-protein kinase Sgk3, catalytic domain
definition: >-
  SGKs are serine/threonine-protein kinases involved in the regulation of transport, hormone release, neuroexcitability, cell proliferation, and apoptosis. There are three SGK isoforms: SGK1/2/3. SGK3 regulates many transporters, ion channels, and receptors. It plays a critical role in hair follicle morphogenesis and hair cycling.
