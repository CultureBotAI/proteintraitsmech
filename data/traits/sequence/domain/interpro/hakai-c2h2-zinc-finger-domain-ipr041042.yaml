identifier: InterPro:IPR041042
label: "Hakai, C2H2 zinc finger domain"
definition: >-
  This is the C2H2 zinc finger domain found in E3 ubiquitin ligase Hakai. Hakai targets tyrosine-phosphorylated E-cadherin. It carries a Tyr(P)-binding domain, coined the HYB domain for Hakai phosphotyrosine (Tyr(P)) binding. HYB domain structure illustrates that it forms a zinc-coordinated homodimer in an antiparallel, intertwined configuration, utilizing residues from the Tyr(P)-binding region of two Hakai monomers. The C-terminal region of the HYB domain, which harbors the atypical zinc-coordination motif and key residues involved in the Tyr(P) interaction, plays an important role in the dimerization observed in the HYB domain.
