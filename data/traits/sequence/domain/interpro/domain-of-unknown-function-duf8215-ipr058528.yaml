identifier: InterPro:IPR058528
label: "Domain of unknown function DUF8215"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in the class Halobacteria. The proteins containing this domain are predominantly found in various genera within the Halobacteriales order. The domain is typically found in proteins ranging from 129 to 225 amino acids in length. These proteins are predicted to be integral membrane proteins, as suggested by the presence of two transmembrane helices.
