identifier: InterPro:IPR054300
label: "DNA polymerase alpha subunit B, OB domain"
definition: >-
  This entry represents the OB domain of DNA polymerase alpha subunit B. B subunits of DNA polymerases stabilize the catalytic subunit, playing a role in regulation of the DNA synthesis in a cell cycle-dependent manner and act as scaffolds mediating interactions with other components of the replication machinery.
