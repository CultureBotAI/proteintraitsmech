identifier: InterPro:IPR049894
label: "Coronavirus NSP3, 3Ecto domain"
definition: >-
  This entry represents the Nsp3 ectodomain (3Ecto) from coronaviruses. The CoV 3Ecto domain is a glycosylated domain and it is predicted to be located on the lumenal side of the membrane. The transmembrane regions plus the 3Ecto are important for the PL2pro to process the Nsp3-4 cleavage site; a possible reason is that the transmembrane part could bring the PL2pro close to the cleavage site between the membrane-associated proteins Nsp3 and Nsp4. Asparagine (N)-linked glycosylation has been found in 3Ecto domains. It is unclear if the N-glycan modification affects the 3Ecto conformation or stability. Frequently, N-linked glycans serve as recognition points for partner molecules. It has been shown that interaction of the 3Ecto domain with the large lumenal loop of Nsp4 is essential for the endoplasmic reticulum (ER) rearrangements and double-membrane vesicles (DMVs) formation occurring in cells infected by SARS-CoV or mouse hepatitis virus (MHV). The CoV 3Ecto domain is predicted to mostly contain α-helices and to form two disulphide bonds between C1 and C4 as well as C2 and C3. Coronaviruses (CoVs) are enveloped positive-strand RNA viruses that infect many species, including humans, other mammals, and birds. After infection, the host may develop respiratory, bowel, liver, and neurological diseases. Coronaviruses are divided into four genera: Alphacoronavirus, Betacoronavirus, Gammacoronavirus, and Deltacoronavirus. SARS, SARS-CoV-2, BatCoV RaTG13 and Bat-SARS-like coronavirus (BATSL-CoVZXC21 and BAT-SL-CoVZC45) belong to the Sarbecovirus subgenus of Betacoronavirus [E1]. The CoV replicase gene encodes two overlapping polyproteins, termed pp1a and pp1ab, which mediate viral replication and transcription. The polypeptides pp1a and pp1ab are processed by the action of a mai…
