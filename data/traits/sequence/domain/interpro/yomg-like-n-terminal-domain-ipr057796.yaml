identifier: InterPro:IPR057796
label: "YOMG-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of SPbeta prophage-derived uncharacterised protein YomG from Bacillus subtilis (strain 168). This domain adopts a β-barrel fold and is usually found in association with a neighbour prophage endopeptidase tail domain.
