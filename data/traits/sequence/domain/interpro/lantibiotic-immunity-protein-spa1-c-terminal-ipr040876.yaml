identifier: InterPro:IPR040876
label: "Lantibiotic immunity protein Spa1, C-terminal"
definition: >-
  This is the C-terminal domain found in SpaI from Bacillus subtilis. SpaI is an immunity lipoprotein that protects the Gram-positive bacteria against their own lantibiotics, in this case subtilin. SpaI together with the ABC transporter SpaFEG protects the membrane from subtilin insertion.
