identifier: InterPro:IPR018306
label: "Bacteriophage T5, Orf172 DNA-binding"
definition: >-
  This entry represents a DNA-binding domain found in bacteriophage T5, ORF172, the probable helicase A859L. The domain is related to the Bro-N and KilA-N domains that are widespread in large-DNA viruses infecting bacteria and eukaryotes.
