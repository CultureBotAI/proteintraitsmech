identifier: InterPro:IPR005543
label: "PASTA domain"
definition: >-
  The PASTA domain (for penicillin-binding protein and serine/threonine kinase associated domain) is an extracellular module of ~70 residues that is found in the C-termini of eukaryotic-like serine/threonine kinases (PSTKs) and high molecular weight penicilin-binding proteins (PBPs). The PASTA domain is distributed mainly in the GRAM-positive bacteria, most notably among species of the genera Bacillus and Clostridia. It is not found in eukaryotes. The PASTA domain occurs both singly and in multiple copies, which suggests that it is a domain rather than a structural repeat. It is found in association with other domains, such as transpeptidase, protein kinase or transglycolase. The PASTA domain is a small globular fold consisting of three β strands and an α helix, with a loop region of variable length between the first and second β strands.
