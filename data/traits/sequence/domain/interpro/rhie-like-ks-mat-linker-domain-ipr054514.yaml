identifier: InterPro:IPR054514
label: "RhiE-like, KS-MAT linker domain"
definition: >-
  This entry represents a linker domain found in polyketide synthases from ascomycetes and bacteria. This domain connects the N-terminal domains with the B-domain as described in RhiE ( ).
