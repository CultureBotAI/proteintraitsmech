identifier: InterPro:IPR063881
label: "SHOC1, PDDEXK domain, plants"
definition: >-
  This entry represents the PDDEXK domain found in SHOC1 and related proteins in plants. SHOC1 is an XPF family protein essential for the formation of class I meiotic crossovers. The protein interacts with PTD and ZIP4 to form multiprotein complexes that regulate crossover formation during meiosis. SHOC1 localises to chromosome foci from leptotene to early pachytene, with maximal localisation at zygotene. The protein is highly expressed in reproductive tissues during meiosis and is essential for male and female fertility. While the full-length SHOC1 protein is critical for meiotic recombination, the specific function of this domain remains to be determined.
