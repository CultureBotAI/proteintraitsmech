identifier: InterPro:IPR044767
label: "Phytochrome A/B/C/D/E-like, histidine-kinase-related domain"
definition: >-
  Canonical phytochromes have a conserved N-terminal photosensory core and a C-terminal regulatory region which typically includes a histidine-kinase-related domain (HKRD, also known as the HATPase domain). This entry represents the histidine-kinase-related domain found in Arabidopsis thaliana phytochrome phyA-phyE. Following red light absorption, biologically inactive forms of phytochromes convert to active forms, which rapidly convert back to inactive forms upon far-red light irradiation. Phytochromes control the expression of a number of nuclear genes including those encoding the small subunit of ribulose-bisphosphate carboxylase, chlorophyll A/B binding protein, protochlorophyllide reductase or rRNA, and they also regulate temperature responses by associating with the promoters of key target genes in a temperature-dependent manner and subsequently repressing their expression probably in a PIF4-dependent manner. Phytochromes can be considered as having an N-terminal photosensory region to which a bilin chromophore is bound, and a C-terminal output region, which includes the HATPase domain, and is involved in dimerisation and presumably contributes to relaying the light signal to downstream signalling events.
