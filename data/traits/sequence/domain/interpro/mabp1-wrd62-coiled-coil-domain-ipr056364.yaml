identifier: InterPro:IPR056364
label: "MABP1/WRD62, coiled-coil domain"
definition: >-
  This entry represents the coil-coiled domain of WDR62, which is required for its dimerization. This domain is also found in MABP1. MABP1 (Mitogen-activated protein kinase-binding protein 1) is a negative regulator of NOD2 function, leading to the down-regulation of NOD2-induced processes such as activation of NF-kappa-B signalling, IL8 secretion and antibacterial response. WDR62 is a microcephaly-related, microtubule (MT)-associated protein (MAP) that localises to the spindle pole and regulates spindle organisation by recruiting katanin to the spindle pole by forming a complex with TPX2/Aurora A. The microtubule-binding (MT) affinity of WDR62 is autoinhibited through JNK phosphorylation-induced intramolecular interaction. Additionally, WRD62 is implicated in the development of the cerebral cortex influencing both the proliferation and migration of neurons. The WD40 domains of WDR62 mediate the interaction with Aurora A and (MT binding).
