identifier: InterPro:IPR059025
label: "STB6-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of Protein STB2 and STB6 from Saccharomyces cerevisiae, which interacts with SIN3. This domain is predicted to adopt an α-β configuration.
