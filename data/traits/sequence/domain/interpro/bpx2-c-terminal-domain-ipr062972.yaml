identifier: InterPro:IPR062972
label: "BpX2, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in bpX2. Most members of this entry belong to the phylum Bacteroidetes. This entry represents an uncharacterised domain found in the MoxR-vWA-β-propeller ternary system, a class of NTP-dependent biological conflict systems.
