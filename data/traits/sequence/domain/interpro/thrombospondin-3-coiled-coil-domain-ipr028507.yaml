identifier: InterPro:IPR028507
label: Thrombospondin-3, coiled-coil domain
definition: >-
  Thrombospondins are multimeric multidomain glycoproteins that function at cell surfaces and in the extracellular matrix milieu. They act as regulators of cell interactions in vertebrates. They are divided into two subfamilies, A and B, according to their overall molecular organisation. The subgroup A proteins TSP-1 and -2 contain an N-terminal domain, a VWFC domain, three TSP1 repeats, three EGF-like domains, TSP3 repeats and a C-terminal domain. They are assembled as trimer. The subgroup B thrombospondins, designated TSP-3, -4, and COMP (cartilage oligomeric matrix protein, also designated TSP-5) are distinct in that they contain unique N-terminal regions, lack the VWFC domain and TSP1 repeats, contain four copies of EGF-like domains, and are assembled as pentamers. EGF, TSP3 repeats and the C-terminal domain are thus the hallmark of a thrombospondin. TSP3 may be involved in the regulation of skeletal maturation. This entry represents the N-terminal coiled coil region of TSP3. It forms a pentameric left-handed coiled coil with a channel that is a unique carrier for lipophilic compounds. The pentamer is stabilized by inter-subunit disulfide bonds formed between cysteine residues adjacent to the C-terminal end of the coiled coil region.
