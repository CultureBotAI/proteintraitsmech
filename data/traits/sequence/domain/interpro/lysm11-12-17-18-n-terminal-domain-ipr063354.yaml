identifier: InterPro:IPR063354
label: "LysM11/12/17/18, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of LysM11 from Penicillium expansum (also known as PeLysM11) and related fungal proteins. PeLysM11 was shown to play a regulatory role in the fungal virulence. This domain is also found in LysM12, 17 and 18. In LysM17 is located in the middle region of the sequence, while in LysM12/18 is towards the N-terminal. This domain may adopt an α/β structure with a topology similar to that found in type III secretory system chaperones.
