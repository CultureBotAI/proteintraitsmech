identifier: InterPro:IPR035459
label: "Bzz1, SH3 domain 1"
definition: >-
  Bzz1 is a WASP/Las17-interacting protein involved in endocytosis and trafficking to the vacuole. It physically interacts with type I myosins and functions in the early steps of endocytosis. Together with other proteins, it induces membrane scission in yeasts. Bzz1 contains an N-terminal F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs), a central coiled-coil, and two C-terminal SH3 domains. This entry represents the first SH3 domain.
