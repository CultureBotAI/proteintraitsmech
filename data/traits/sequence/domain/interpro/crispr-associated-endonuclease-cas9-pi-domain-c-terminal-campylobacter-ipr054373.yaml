identifier: InterPro:IPR054373
label: "CRISPR-associated endonuclease Cas9, PI domain, C-terminal, campylobacterales"
definition: >-
  In the type II CRISPR-Cas system, the Cas9 effector nuclease associates with dual guide RNAs (crRNA and trans-activating crRNA (tracrRNA)) and cleaves double-stranded DNA targets complementary to the crRNA guide. Cas9 is composed of multiple domains. This entry represents the C-terminal lobe of the so-called PAM-interacting (PI) domain found in Campylobacter jejuni CRISPR-associated endonuclease Cas9, one of the smallest Cas9 orthologues, and similar proteins specific to Campylobacterales. The PI domain is involved in the recognition of PAM-containing duplex formed by the target and non-target DNA strands. This domain facilitates the target DNA unwinding and the heteroduplex formation. The region represented in this entry adopts a partly open six-stranded β-barrel with a SH3-like topology.
