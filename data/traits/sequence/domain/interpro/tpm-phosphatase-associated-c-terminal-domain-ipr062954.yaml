identifier: InterPro:IPR062954
label: "TPM phosphatase-associated, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain of approximately 90 residues found in cyanobacteria and photosynthetic eukaryotes. The domain follows an N-terminal TPM phosphatase domain ( ). In Synechocystis, sll1071 is localised to the thylakoid membrane and is regulated by the redox-responsive transcription factor RpaB. In Synechococcus elongatus, Synpcc7942_1090 clusters with photosystem proteins, suggesting an association with photosynthesis. Homologues are conserved throughout the photosynthetic lineage including Chlamydomonas and Arabidopsis. The specific function of this C-terminal domain remains to be determined.
