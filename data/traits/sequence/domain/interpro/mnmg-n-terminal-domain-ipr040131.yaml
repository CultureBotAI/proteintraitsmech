identifier: InterPro:IPR040131
label: "MnmG, N-terminal domain"
definition: >-
  MnmG (also known as GidA) is a tRNA modification enzyme found in bacteria and mitochondria. MnmG forms a complex with MnmE which is involved in the formation of methyluridine derivatives at the wobble uridine base in some tRNAs. This domain is also found in the MnmG paralogue TrmFo, a folate/FAD-dependent methyltransferase that catalyzes the methylation of the C5-uridine 54 in the T-loop of tRNAs of most Gram-positive bacteria and some Gram-negative bacteria. TrmFO lacks a C-terminal helical domain present in MnmG. This entry represents the N-terminal domain of MnmG and related domains. This domain does not include the C-terminal region of MnmG, which contains a sterile alpha motif domain and is responsible for tRNA-protein and protein-protein interactions including association with MnmE.
