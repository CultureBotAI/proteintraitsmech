identifier: InterPro:IPR049319
label: "Tip pilin GBS104-like, Ig-like domain"
definition: >-
  This domain is found in Streptococcus agalactiae tip pilin GBS104 and similar proteins. It is usually associated with von Willebrand factor type A domain (e.g. ), which inserts into the domain core composed of two sequentially segregated fragments. Members of this entry are likely to contain an intramolecular isopeptide bond. This domain does not include the two N-terminal strands that precede the inserted von Willebrand factor type A domain.
