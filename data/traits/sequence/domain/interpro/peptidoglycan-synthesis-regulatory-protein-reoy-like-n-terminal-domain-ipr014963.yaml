identifier: InterPro:IPR014963
label: "Peptidoglycan synthesis regulatory protein ReoY-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Peptidoglycan synthesis regulatory protein ReoY ( ) which is involved in the PASTA kinase-mediated signalling pathway regulating peptidoglycan synthesis to maintain cell wall integrity. It modulates peptidoglycan (PG) synthesis pathway committed-step enzyme MurA. ReoY positively modulates ClpCP-dependent proteolysis of MurA, thereby regulating PG synthesis and inhibiting intrinsic cephalosporin resistance.
