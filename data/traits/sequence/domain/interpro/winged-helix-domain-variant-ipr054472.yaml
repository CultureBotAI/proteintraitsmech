identifier: InterPro:IPR054472
label: "Winged helix domain, variant"
definition: >-
  This domain is found mainly in uncharacterised bacterial proteins. It is predicted to adopt a globular structure with similarity to MarR family of transcription factors ( ). This domain is found usually in combination with AAA+ ATPase domains ( ).
