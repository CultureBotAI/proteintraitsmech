identifier: InterPro:IPR033461
label: "Putative WW-binding domain and destruction box"
definition: >-
  This short conserved region is a putative destruction-box, with its RxxLxxI sequence motif, though the homology is not absolute. The domain occurs on a number of tumourigenic proteins, on some RNA-binding proteins and serine-threonine regulatory proteins. The second less well-conserved motif, WITPS, is a potential WW domain ligand-binding motif for recruiting proteins to their substrates. WW domains bind tightly to short proline-containing peptides that are typically in regions of native disordered polypeptide, as this domain is as it lies between a PIN domain and a zinc-binding domain.
