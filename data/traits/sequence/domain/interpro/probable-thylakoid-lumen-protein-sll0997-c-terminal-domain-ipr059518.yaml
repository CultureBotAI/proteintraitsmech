identifier: InterPro:IPR059518
label: "Probable thylakoid lumen protein sll0997, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Probable thylakoid lumen protein from Synechocystis sp., which is also found in the uncharacterised protein y4bJ from Sinorhizobium fredii and similar bacterial proteins. Y4bJ is a multi-pass membrane protein that belongs to the peptidase S1C family. Peptidase S1C proteins are serine-type endopeptidases involved in proteolysis. The specific function of this domain remains to be determined.
