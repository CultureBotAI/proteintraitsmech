identifier: InterPro:IPR062040
label: "Apolipoprotein B100, insert 6"
definition: >-
  This domain is found in the human Apolipoprotein B100 and related proteins. Apolipoprotein B100 (apoB100), one of the largest proteins in the genome, is the primary structural and functional component of the Low-density lipoprotein (LDL). ApoB100 functions as a recognition signal for the cellular binding and internalization of LDL particles by the apoB/E receptor. The domain represented by this entry is described as insert 6. This is an R-face insert that occupies the space near the ApoB100 N-terminal domain. Insert 6 contains the only other disulfide bond outside the N-terminal domain, which links the ascending and descending strands near the base of the domain. It is dynamic, poorly folded and/or loosely associated with the lipid surface.
