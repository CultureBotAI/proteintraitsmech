identifier: InterPro:IPR045473
label: "Sphingomyelin phosphodiesterase, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in acid sphingomyelin phosphodiesterases mostly from eukaryotes. Human sphingomyelin phosphodiesterase converts sphingomyelin to ceramide and plays an important role in the export of cholesterol from the intraendolysosomal membranes. When secreted, modulates cell signaling and, upon infection, takes an important part in the host defense. Its three-dimensional structure has been resolved, and it has been linked to the Niemann-Pick disease.
