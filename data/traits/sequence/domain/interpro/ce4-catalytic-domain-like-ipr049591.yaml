identifier: InterPro:IPR049591
label: "CE4 catalytic domain-like"
definition: >-
  This entry includes a group of uncharacterised bacterial proteins with high sequence similarity to the catalytic domain of the six-stranded barrel rhizobial NodB-like proteins, which remove N-linked or O-linked acetyl groups from cell wall polysaccharides and belong to the larger carbohydrate esterase 4 (CE4) superfamily.
