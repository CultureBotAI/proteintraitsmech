identifier: InterPro:IPR064032
label: "Transcriptional regulator RcsA, N-terminal dimerisation domain"
definition: >-
  This entry represents the N-terminal domain of the transcriptional regulator RcsA from Enterobacterales. This domain mediates heterodimerisation with the receiver domain of RcsB, and the RcsA-RcsB heterodimer requires RcsB phosphorylation for activity. RcsA is an auxiliary regulator of the Rcs phosphorelay system, which controls transcription of genes involved in capsular polysaccharide biosynthesis and other functions. RcsA is an unstable protein that is rapidly degraded by the Lon protease. Together with RcsB, RcsA binds to the RcsAB box to regulate gene expression. This N-terminal domain is followed by a C-terminal LuxR-type helix-turn-helix DNA-binding domain . This entry also includes Transcriptional regulatory protein EntR.
