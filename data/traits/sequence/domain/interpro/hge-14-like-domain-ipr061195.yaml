identifier: InterPro:IPR061195
label: "HGE-14-like domain"
definition: >-
  Anaplasma phagocytophilum (Ehrlichia phagocytophila) is a tick-borne intracellular pathogen that causes disease called anaplasmosis, human granulocytic anaplasmosis (HGA), or human granulocytic ehrlichiosis (HGE). A type IV secretion system (T4SS) secretes HGE-14 and paralogs that share this N-terminal domain of about 400 amino acids. HGE-14 itself ( ) has a C-terminal region with a repeat region highly similar to that of a human host protein, mediator of DNA damage checkpoint protein 1 (NFBD1/MDC1), which is involved in responses to DNA damage and can help prevent apoptosis.
