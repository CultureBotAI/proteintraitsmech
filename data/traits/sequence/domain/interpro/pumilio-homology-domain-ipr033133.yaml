identifier: InterPro:IPR033133
label: Pumilio homology domain
definition: >-
  Members of the Pumilio family of proteins (Puf) regulate translation and mRNA stability in a wide variety of eukaryotic organisms including mammals, flies, worms, slime mold, and yeast. Pumilio family members are characterised by the presence of eight tandem copies of an imperfectly repeated 36 amino acids sequence motif, the Pumilio repeat, surrounded by a short N- and C-terminal conserved region. The eight repeats and the N- and C-terminal regions form the Pumilio homology domain (PUM-HD). The PUM-HD domain is a sequence-specific RNA binding domain. Several Puf members have been shown to bind specific RNA sequences mainly found in the 3' UTR of mRNA and repress their translation. Frequently, Puf proteins function asymmetrically to create protein gradients, thus causing asymmetric cell division and regulating cell fate specification. Crystal structure of Pumilio repeats has been solved. The PUM repeat with the N- and C-terminal regions pack together to form a right-handed superhelix that approximates a half doughnut structurally similar to the Armadillo (ARM) repeat proteins, beta-catenin and karyopherin alpha. The RNA binds the concave surface of the molecule, where each of the protein's eight repeats makes contacts with a different RNA base via three amino acid side chains at conserved positions. This entry represents the PUM-HD domain.
