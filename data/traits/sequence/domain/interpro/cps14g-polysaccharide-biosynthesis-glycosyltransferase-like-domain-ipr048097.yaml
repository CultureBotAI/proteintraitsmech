identifier: InterPro:IPR048097
label: "Cps14G polysaccharide biosynthesis glycosyltransferase-like domain"
definition: >-
  This entry represents a glycosyltransferase-like domain found in a group of proteins that are homologous to Cps14G from Streptococcus pneumoniae. Gps14G is a beta-1,4-galactosyltransferase that is responsible for the second step in oligosaccharide subunit synthesis, the transfer of galactose to lipid-linked glucose.
