identifier: InterPro:IPR047969
label: "Synaptic vesicle 2-related protein-like, major facilitator superfamily domain"
definition: >-
  This entry represents the major facilitator superfamily domain of Synaptic vesicle 2-related protein (SVOP), a transporter-like nucleotide binding protein that localises to neurotransmitter-containing vesicles in the brain. Like Synaptic vesicle 2 (SV2), SVOP is expressed in all brain regions, with highest levels in cerebellum, hindbrain and pineal gland. Studies with knockout mice suggest that SVOP may perform a subtle function that is not necessary for survival under normal conditions, since mice lacking SVOP are viable, fertile, and phenotypically normal. SVOP shares structural similarity to the solute carrier family 22 (SLC22), a large family of organic cation and anion transporters. This family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement.
