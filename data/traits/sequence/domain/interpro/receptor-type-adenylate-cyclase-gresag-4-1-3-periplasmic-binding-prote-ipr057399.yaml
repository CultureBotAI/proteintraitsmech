identifier: InterPro:IPR057399
label: "Receptor-type adenylate cyclase GRESAG 4.1/3, periplasmic binding protein-like domain 1"
definition: >-
  This entry represents the first periplasmic binding protein-like domain found in receptor-type adenylate cyclase GRESAG 4.1/3 and its homologues, mainly found in trypanosoma. Receptor-type adenylate cyclase GRESAG 4.1/3 are class II adenylate cyclases (ACs) ( ) that occur as multiple isozymes in Trypanosoma brucei. GRESAG 4.1 likely acts as a receptor for an unknown ligand and is involved in cyclic AMP (cAMP) production. cAMP is a critical signalling molecule in T. brucei, playing a role in processes such as differentiation and adaptation to environmental changes. GRESAG 4.1 is expressed in both bloodstream and procyclic forms of the parasite, suggesting it has a role across multiple life stages. Its localisation on the flagellum indicates it may be involved in sensing extracellular signals and transmitting them via cAMP signalling pathways, which are essential for parasite survival and development.
