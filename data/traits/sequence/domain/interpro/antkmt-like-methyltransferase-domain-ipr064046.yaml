identifier: InterPro:IPR064046
label: "ANTKMT-like, methyltransferase domain"
definition: >-
  This entry represents the methyltransferase domain of Adenine nucleotide translocase lysine N-methyltransferase (ANTKMT) mainly from animals and bacteria. ANTKMT is a mitochondrial protein-lysine N-methyltransferase that trimethylates adenine nucleotide translocases ANT2/SLC25A5 and ANT3/SLC25A6, thereby regulating mitochondrial respiration. The enzyme contains a methyltransferase domain that uses S-adenosyl-L-methionine as a cofactor to perform lysine trimethylation. The proteins are localised to the mitochondrial membrane.
