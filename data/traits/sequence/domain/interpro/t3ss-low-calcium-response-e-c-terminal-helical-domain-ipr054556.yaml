identifier: InterPro:IPR054556
label: "T3SS, low calcium response E, C-terminal helical domain"
definition: >-
  This domain is found at the C-terminal of Low calcium response E from Chlamydia pneumoniae (CopN, also known as LcrE, ) and similar bacterial sequences. CopN is involved in the regulation of type III secretion systems (T3SSs). This protein contains three repetitions of a helical motif flanked by disordered N- and C-terminal extensions.
