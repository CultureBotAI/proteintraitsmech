identifier: InterPro:IPR063384
label: "Uncharacterised Treponema protein TP_0763"
definition: >-
  This entry represents a conserved domain found in an uncharacterised protein (TP_0763) from Treponema pallidum and related spirochaete bacteria. The full-length protein contains two predicted transmembrane helices (residues 42-64 and 74-96) and is predicted to be a multi-pass membrane protein. The domain is approximately 68 amino acids in length. The function of this domain remains to be determined.
