identifier: InterPro:IPR041718
label: "IS607-like transposase, catalytic domain"
definition: >-
  Proteins containing this domain often also contain a DNA binding domain with homology to MerR/SoxR located N-terminal to the catalytic domain. Proteins containing this domain catalyze the transposition of insertion sequence (IS) elements such as IS607 from Helicobacter and IS1535 from Mycobacterium, and similar proteins from other bacteria and several archaeal species. IS elements are DNA segments that move to new sites in prokaryotic and eukaryotic genomes causing insertion mutations and gene rearrangements. This domain belongs to a larger group of catalytic domains found in serine recombinases, which catalyze site-specific recombination of DNA molecules by a concerted, four-strand cleavage and rejoining mechanism which involves a transient phosphoserine linkage between DNA and the enzyme. They are functionally versatile and include resolvases, invertases, integrases, and transposases.
