identifier: InterPro:IPR060529
label: "Protein downstream neighbor of Son domain"
definition: >-
  This entry represents a domain found in Downstream neighbor of Son (DONSON), a replisome component that maintains genome stability by protecting stalled or damaged replication forks. DONSON is required for stabilisation of stalled replication forks, efficient activation of intra-S-phase and G2/M cell-cycle checkpoints, and maintenance of genome stability. The protein is a component of the replisome complex and localises at DNA replication sites. This protein contains disordered segments and is found in DONSON homologues across eukaryotes from Drosophila to mammals.
