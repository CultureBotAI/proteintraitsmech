identifier: InterPro:IPR063364
label: "COP1-interacting protein 7, middle helical domain"
definition: >-
  This entry represents a helical domain found in the middle region of COP1-interacting protein 7 (CIP7) and related proteins in plants. CIP7 is a nuclear protein that interacts with COP1 (constitutive photomorphogenic 1) and exhibits transcriptional activation activity. CIP7 is a positive regulator of light-regulated genes and is induced by light while being repressed by COP1 in darkness. Disruption of CIP7 leads to defects in light-dependent anthocyanin and chlorophyll accumulation. The specific function of this middle helical domain remains to be determined.
