identifier: InterPro:IPR063276
label: "VAB2, coiled coil domain"
definition: >-
  This entry represents the coiled-coil domain of VAB2 BLOC-1 complex subunits found in fungi. VAB2 is a component of the biogenesis of lysosome-related organelles complex-1 (BLOC-1) which is involved in endosomal cargo sorting. The complex is composed of at least six subunits including BLI1, BLS1, CNL1, KXD1, SNN1 and VAB2. VAB2 contains a coiled coil domain and interacts with VAC8 protein. The protein localises to cytoplasmic vesicles, vacuoles and the cytoplasm. VAB2 was originally identified as a VAC8-binding protein and is involved in endosome organisation and regulation of protein localisation.
