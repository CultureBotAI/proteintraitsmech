identifier: InterPro:IPR049191
label: Transcriptional regulator SutA, RNAP-binding domain
definition: >-
  This domain (previously known as DUF6813) is found in the transcriptional regulator SutA from Pseudomonas aeruginosa ( ) and similar proteins mainly from gammaproteobacteria. In Pseudomonas aeruginosa, SutA adapts bacteria to hypoxia and nutrition-limited environment during chronic infection by increasing transcription activity of an RNA polymerase (RNAP) holoenzyme comprising the stress-responsive sigma factor sigma-S (RNAP-sigma-S). SutA interacts with both RNAP-sigma-A and RNAP-sigma-S holoenzymes and the RNAP-β protrusion is its primary anchor site. This domain, known as RNAP-binding domain of SutA (SutA-RBD), comprises an α-helix and a β-strand and is responsible for interaction with RNAP-β protrusion. It contains a conserved FLxxGG sequence motif that appears to be located near the C-terminal helix cap. The SutA-RBD α-helix binds to hydrophobic groove on RNAP-β protrusion.
