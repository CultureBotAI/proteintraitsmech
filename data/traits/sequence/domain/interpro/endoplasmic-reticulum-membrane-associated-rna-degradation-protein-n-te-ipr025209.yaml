identifier: InterPro:IPR025209
label: "Endoplasmic reticulum membrane-associated RNA degradation protein, N-terminal"
definition: >-
  This entry represents a conserved domain found at the N-terminal of Endoplasmic reticulum membrane-associated RNA degradation protein (EMARD), described as KEN domain, which contains the highly conserved RxxxxHG sequence motif from HEPN domains superfamily. This domain may be a RNase that is involved in the degradation of rRNAs, mRNAs associated with the endoplasmic reticulum membrane. EMARD may play a role in neuronal migration during embryonic development.
