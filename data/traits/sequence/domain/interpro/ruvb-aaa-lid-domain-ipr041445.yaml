identifier: InterPro:IPR041445
label: "RuvB, AAA lid domain"
definition: >-
  The RuvB protein makes up part of the RuvABC revolvasome which catalyses the resolution of Holliday junctions that arise during genetic recombination and DNA repair. Branch migration is catalysed by the RuvB protein that is targeted to the Holliday junction by the structure specific RuvA protein. This entry contains the AAA lid domain that is found to the C terminus of the AAA domain.
