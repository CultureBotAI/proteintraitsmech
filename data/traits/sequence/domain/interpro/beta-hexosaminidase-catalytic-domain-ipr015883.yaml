identifier: InterPro:IPR015883
label: Beta-hexosaminidase, catalytic domain
definition: >-
  This entry represents the glycoside hydrolase family 20 catalytic domain. This domain has a TIM barrel fold. Glycoside hydrolase family 20 comprises enzymes with several known activities; beta-hexosaminidase; lacto-N-biosidase; beta-1,6-N-acetylglucosaminidase); and beta-6-SO3-N-acetylglucosaminidase. Carbonyl oxygen of the C-2 acetamido group of the substrate acts as the catalytic nucleophile/base in this family of enzymes.
