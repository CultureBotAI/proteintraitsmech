identifier: InterPro:IPR006431
label: "Bacteriophage tail tape measure, C-terminal"
definition: >-
  This entry represents a domain found near the C terminus of bacteriophage tape measure proteins. Long-tailed bacteriophages possess a large gene encoding a tape measure protein (TMP). TMP is important for assembly of phage tails and involved in tail length determination. Mutated forms of TMP cause tail fibres to be shortened. This protein is also found in bacteria, particularly Enterobacteriaceae, suggesting prophage matches occur in addition to the phage matches. This entry includes a domain found near the C terminus of Bacteriophage lambda tail measure protein, GpH.
