identifier: InterPro:IPR055194
label: "E3 ubiquitin-protein ligase UBR1-like, winged-helix domain"
definition: >-
  This entry represents the winged-helix domain of E3 ubiquitin-protein ligase UBR1/2/3 and the plant homologue PRT6. These E3 ubiquitin-protein ligases recognise and bind to proteins bearing specific N-terminal residues that are destabilising according to the N-end rule, leading to their ubiquitination and subsequent degradation. This domain participates in the protein-protein interactions, e.g interaction with the donor ubiquitin.
