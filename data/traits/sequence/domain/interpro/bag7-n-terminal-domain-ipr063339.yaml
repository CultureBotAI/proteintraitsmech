identifier: InterPro:IPR063339
label: "BAG7, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in BAG7 and related proteins in plants. BAG7 is a molecular chaperone regulator localised to the endoplasmic reticulum that is involved in the unfolded protein response and stress tolerance. The protein contains an IQ domain for calmodulin binding and a C-terminal BAG domain for interaction with HSP70 chaperones. BAG7 is necessary for proper maintenance of the unfolded protein response during heat and cold tolerance, and disruption results in susceptibility to temperature stress. While the full-length BAG7 protein functions as a co-chaperone regulating cellular stress responses, the specific function of this N-terminal domain remains to be determined.
