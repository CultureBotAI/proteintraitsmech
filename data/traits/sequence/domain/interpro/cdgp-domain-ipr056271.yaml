identifier: InterPro:IPR056271
label: "CDGP domain"
definition: >-
  This entry represents a domain found in a family of small lipoproteins found in mycobacteriophage and some mycobacteria. These proteins contain a highly conserved motif CDGPXXPDG that is likely to be functionally important. The domain has been named after part of this motif. The structure of the proteins consists of a four stranded β-meander.
