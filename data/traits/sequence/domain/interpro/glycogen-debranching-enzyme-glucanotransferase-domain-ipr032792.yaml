identifier: InterPro:IPR032792
label: "Glycogen debranching enzyme, glucanotransferase domain"
definition: >-
  This is a glucanotransferase catalytic domain of the glycogen debranching enzyme AGL. AGL is a multifunctional enzyme acting as 1,4-alpha-D-glucan:1,4-alpha-D-glucan 4-alpha-D-glycosyltransferase and amylo-1,6-glucosidase in glycogen degradation. This glucanotransferase domain is predicted to have a structure of a 8 stranded α/β barrel (TIM barrel) where strands are interrupted by long loops and additional mini-domains.
