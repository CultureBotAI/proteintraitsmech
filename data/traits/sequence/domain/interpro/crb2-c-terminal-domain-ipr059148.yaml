identifier: InterPro:IPR059148
label: "Crb2, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain which contains a BRCT-like fold present in Crb2 from Schizosaccharomyces pombe. Crb2 relies on the BRCT-like domain for its dimerisation. Crb2 is a checkpoint mediator required for the cellular response to DNA damage.
