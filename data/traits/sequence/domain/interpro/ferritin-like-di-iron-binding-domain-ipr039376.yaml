identifier: InterPro:IPR039376
label: "Ferritin-like, di-iron-binding domain"
definition: >-
  This domain present in an uncharacterised family of proteins found in bacteria and archaea. These proteins also have a C-terminal CCC1-like transmembrane domain and are thought to be involved in iron and/or manganese transport. This domain has the conserved residues of a di-iron centre found in other ferritin-like proteins.
