identifier: InterPro:IPR057536
label: "APX 1, N-terminal C2 domain"
definition: >-
  This entry represents the N-terminal C2 domain found in anterior pharynx excess (APX) proteins. C2 domains typically function as calcium-dependent membrane-targeting modules. This specific C2 domain is found at the N-terminal of APX1 from Caenorhabditis elegans, a protein involved in the mediation of Notch signalling and in establishing left-right asymmetry during intestinal organogenesis. The domain is specific to nematodes.
