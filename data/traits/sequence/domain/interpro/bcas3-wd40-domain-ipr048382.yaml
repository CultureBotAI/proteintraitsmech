identifier: InterPro:IPR048382
label: "BCAS3, WD40 domain"
definition: >-
  This is the WD40 repeat domain of BCAS3, which directly binds phosphatidylinositol-3-phosphate. This domain is also found in ATG18-like proteins from Arabidopsis. BCAS3 microtubule associated cell migration factor (BCAS3, also known as Rhudira in mice) is involved in angiogenesis and metastasis. It participates in the regulation of cell polarity and directional endothelial cell migration by mediating both the activation and recruitment of CDC42 and and the reorganisation of the actin cytoskeleton at the cell leading edge. BCAS3 plays a regulatory role in autophagic activity; it forms a complex with PHAF1 (C16orf70) which associates with the preautophagosomal structure during both non-selective and selective autophagy.
