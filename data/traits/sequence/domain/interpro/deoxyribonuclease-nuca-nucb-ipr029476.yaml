identifier: InterPro:IPR029476
label: "Deoxyribonuclease NucA/NucB"
definition: >-
  This entry represents a group of nucleases, including NucA (also known as DNA-entry nuclease) and NucB (also known as sporulation-specific extracellular nuclease) from Bacillus subtilis. NucB is a non-specific endonuclease, which can hydrolyse both single- and double-stranded DNA substrates, in a divalent cation-dependent manner and to be expressed in late stage II of sporulation. NucB and NucA show structural similarity with other His-Me finger nucleases which are characterised by a common β-β-α motif. The β-β-α motif contains a central pair of anti-parallel β-strands flanked by a conserved distal α-helix that sits in the major groove of DNA; the loop connecting the two β-strands is variable in length and conformation. Direct magnesium co-ordination is highly conserved in NucB sequences in DRDE and DNRG (DD) motifs. The conserved Glu94 in B.subtilis NucB, corresponds to the conserved His in the His-Me finger family. Mutation of individual amino acids in these motifs in B. subtilis-NucB (Asp93 and Glu94 from motif 1, and Asn117 from motif 2) abrogates enzyme activity completely.
