identifier: InterPro:IPR041615
label: "Desmoplakin, SH3 domain"
definition: >-
  This entry represents the SH3 domain found in Desmoplakin and related proteins. Desmoplakin (DP) is an integral part of desmosomes, where it links desmosomal cadherins to the intermediate filaments. The N-terminal region of DP contains a plakin domain common to members of the plakin family. Plakin domains contain multiple copies of spectrin repeats (SRs). Spectrin repeats (SRs) consist of three α-helices (A, B, and C) that form an antiparallel triple-helical bundle.
