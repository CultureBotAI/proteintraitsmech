identifier: InterPro:IPR056813
label: "GIL1/IRKI, C-terminal domain"
definition: >-
  This domain is found in the Protein GRAVITROPIC IN THE LIGHT 1 (GIL1), its paralogue IRK-interacting protein (IRKI) from Arabidopsis thaliana and related plant proteins. This domain is predicted to fold into a structure similar to head domain of nucleotide exchange factor GrpE. GIL1 is essential for light-dependent randomisation of hypocotyl growth orientation.
