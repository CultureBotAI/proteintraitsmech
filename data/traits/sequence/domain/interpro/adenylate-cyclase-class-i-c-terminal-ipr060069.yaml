identifier: InterPro:IPR060069
label: "Adenylate cyclase, class-I, C-terminal"
definition: >-
  This entry represents the C-terminal domain of class-I adenylate cyclases. It is predicted to contain anti-parallel β-sheets and an α-helix. Adenylate cyclase is the enzyme responsible for the synthesis of cAMP from ATP. On the basis of sequence similarity, it has been proposed that there are three different classes of adenylate cyclases. Class I cyclases are found in enterobacteria and related Gram-negative bacteria.
