identifier: InterPro:IPR057855
label: "WDR19, first beta-propeller"
definition: >-
  This entry represents the first β-propeller of WRD19 (also known as IFT144) from animals and the orthologue from C.elegans DYF2. This domain is also found in the WD repeat-containing protein 39-A/B from Salmo salar. WDR19 is a core component of the IFT complex A (IFT-A, together with IFT140 and IFT122), a complex required for retrograde ciliary transport and entry into cilia of G protein-coupled receptors (GPCRs), being involved in cilia function and/or assembly. IFT-A polymerises interacts with IFT-B, and uses an array of β-propeller and TPR domains to create 'carriages' of the IFT train that engage TULP adaptor proteins.
