identifier: InterPro:IPR035716
label: "Cortactin, SH3 domain"
definition: >-
  Cortactin was originally identified as a substrate of Src kinase. It is an actin regulatory protein that binds to the Arp2/3 complex and stabilizes branched actin filaments. It is involved in cellular processes that affect cell motility, adhesion, migration, endocytosis, and invasion.
