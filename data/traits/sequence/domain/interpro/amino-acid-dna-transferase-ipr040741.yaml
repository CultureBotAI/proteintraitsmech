identifier: InterPro:IPR040741
label: "Amino acid:DNA transferase"
definition: >-
  This entry represents the α-helical domain of the glycinyl, putrescine and serinyltransferases (grouped as amino acid:DNA transferases, formerly known as alpha-putrescinyl/glutamylthymidine pyrophosphorylases (aGPT-Pplases)) which catalyse thymidine hypermodifications in the viral genome, transferring glycine, putrescine or serine to 5-phosphomethyl-2'-deoxyuridine (5-PmdU) to produce Nalpha-GlyT, Nalpha-PutT and O-SerT, respectively. These modifications probably prevent degradation of viral genome by the host restriction-modification antiviral defense system.
