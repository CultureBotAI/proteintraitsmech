identifier: InterPro:IPR020807
label: "Polyketide/metazoan fatty acid synthase-like, dehydratase domain"
definition: >-
  This entry represents the dehydratase domain (DH) found in polyketide synthases, fatty acid synthase and some nodulation proteins. The fundamental polymers of biology proteins, DNA, and RNA are products of repetitive condensation of simple amino acid or nucleotide building blocks and are comparatively easy to assemble. However, other biomolecules require additional reactions beyond condensation of building blocks. Examples are the fatty acids and the polyketide and nonribosomal peptide secondary metabolites. These molecules are produced by complex enzyme assembly lines that include multiple catalytic domains. Modular polyketide synthases (PKSs) systems are thought to share a common ancestor with metazoan fatty acid synthases (mFAS). Both have multifunctional polypeptide chains with catalytic domains for elongation and modification of intermediate products, which are covalently attached to an acyl carrier protein (ACP) domain via a thioester linkage. In the mFAS and modular PKS pathways, intermediate compounds are extended by the action of two elongation domains: the acyltransferase (AT) and ketosynthase (KS). The beta-keto product of the elongation reactions may be altered by the sequential actions of ketoreductase (KR), dehydratase (DH), and enoylreductase (ER) modifying domains, which form a hydroxyl group, double bond and single bond, respectively. Although fatty acids are synthesized in an iterative fashion, with the intermediate chain extended and modified within the same polypeptide, modular PKS systems operate in an assembly-line fashion, in which intermediates are passed to successive modules in a megacomplex. Dehydratase domains catalyse formation of an α,β-double bond in the nascent polyketide intermediate. The mFAS and PKS dehydratase domains are evident pro…
