identifier: InterPro:IPR049028
label: "Baseplate structural protein gp6, C-terminal domain II"
definition: >-
  This entry represents the second part of domain II, which is found in the C-terminal of gp6 from bacteriophage T4 ( ). This domain adopts a β-barrel fold. Baseplate structural protein gp6 is located next to the tail tube and is an intermediate (or inner) baseplate protein involved in tail assembly. Two molecules of gp6 form a complex with gp25 and gp7 which is involved sheath contraction.
