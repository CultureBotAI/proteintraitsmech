identifier: InterPro:IPR047302
label: "Dickkopf-related protein 2, second cysteine-rich domain"
definition: >-
  This entry represents the second cysteine-rich (Cys-2) domain of Dkk2 and similar proteins from vertebrates. This domain is closely similar to those in the colipase family; it has been suggested that the Cys-2 domain of Dkks may enable interaction with lipids in order to regulate Wnt function. Dickkopf 2 (Dkk2) is a secreted protein which directly binds to LRP5/6 (low-density lipoprotein receptor related protein 5 and 6), and is an inhibitor of Wnt/beta-catenin signalling. Dkk2 expression is modulated by expression of micro RNA-221 (miRNA-221) in esophageal cancer, and inactivation of Dkk2 may increase Wnt activity with accelerating tumour progression. Dkk2 belongs to the Dickkopf (Dkk) family that comprises a discrete class of secreted Wnt inhibitors. The Wnt gene family is a large class of secreted proteins that are expressed in a variety of tissues and organs, and are required for many developmental processes, including segmentation, endoderm development, limb polarity, neural crest differentiation, kidney morphogenesis, sex determination and brain development. Dkks 1-4 each possesses an N-terminal signal peptide and contains two conserved cysteine-rich domains (Cys-1 and Cys-2) separated by a linker region. Each domain possesses 10 conserved cysteine residues.
