identifier: InterPro:IPR054353
label: "Transposase for insertion sequence element IS21-like, C-terminal domain"
definition: >-
  This entry represents a domain found towards the C-terminal end of Transposase for insertion sequence element IS21 from Pseudomonas aeruginosa (IstA) and similar prokaryotic integrases and transposases. This region adopts a β-barrel structure with Greek-key topology.
