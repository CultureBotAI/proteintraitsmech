identifier: InterPro:IPR006364
label: Precorrin-2 C(20)-methyltransferase domain
definition: >-
  This entry represents a domain found in precorrin-2 C(20)-methyltransferase, one of several closely related S-adenosylmethionine-dependent methyltransferases, which introduces a methyl group at C-20 on precorrin-2 to produce precorrin-3A during cobalamin (vitamin B12) biosynthesis. This reaction is key to the conversion of a porphyrin-type tetrapyrrole ring to a corrin ring. This domain covers full length of cobI, cbiL. In Mycobacterium this domain fuses with the precorrin-3B C17-methyltransferase domain ( ) into a bifunctional enzyme known as cobIJ.
