identifier: InterPro:IPR034420
label: "Probable RNA-binding protein 19, RNA recognition motif 4"
definition: >-
  This entry represents the RNA recognition motif 4 (RRM4) of RBM19. RBM19 (also known as RBD-1), a nucleolar protein conserved in eukaryotes. It is involved in ribosome biogenesis by processing rRNA and is also essential for preimplantation development in mice. RBM19 has a unique domain organization containing 6 conserved RNA recognition motifs (RRMs).
