identifier: InterPro:IPR010316
label: "DNA-3-methyladenine glycosylase AlkA, N-terminal"
definition: >-
  AlkA (DNA-3-methyladenine glycosylase II) is a base excision repair glycosylase from Escherichia coli. It removes a variety of alkylated bases from DNA, primarily by removing alkylation damage from duplex and single stranded DNA. AlkA is similar in fold and active site location to the bifunctional glycosylase/lyase endonuclease III. This suggests that the two may use similar mechanisms for base excision. The structural analysis of the AlkA and AlkA-hypoxanthine structures indicate that free hypoxanthine binding in the active site may inhibit glycosylase activity. The AlkA protein consists of three domains: an N-terminal mixed α-β structure, a central seven-helix bundle, and a C-terminal domain of four a helices. This entry represents the N-terminal domain.
