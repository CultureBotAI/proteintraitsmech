label: Pyridoxamine 5'-phosphate oxidase, Alr4036 family, FMN-binding domain
definition: >-
  This entry represents Pyridoxamine 5'-phosphate oxidase 2 from Arabidopsis thaliana and its homologues from yeast, which catalyses the oxidation of pyridoxamine-5-P (PMP) and pyridoxine-5-P (PNP) to pyridoxal-5-P (PLP).
