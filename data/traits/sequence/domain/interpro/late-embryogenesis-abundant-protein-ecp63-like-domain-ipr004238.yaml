identifier: InterPro:IPR004238
label: "Late embryogenesis abundant protein ECP63-like domain"
definition: >-
  This entry represents a domain found in Late embryogenesis abundant protein ECP63 from Arabidopsis thaliana and similar plant proteins. ECP63, a member of the LEA family, is though to be involved in the BHLH109-mediated regulation of somatic embryogenesis. LEA (late embryogenesis abundant) proteins were first identified in land plants. Plant LEA proteins have been found to accumulate to high levels during the last stage of seed formation (when a natural desiccation of the seed tissues takes place) and during periods of water deficit in vegetative organs. Later, LEA homologues have also been found in various species. They have been classified into several subgroups in Pfam and according to Bray and Dure.
