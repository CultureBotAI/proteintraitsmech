identifier: InterPro:IPR062584
label: "SRP-independent targeting protein 1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain in SRP-independent targeting protein 1 (SND1). SND1 functions in the SND pathway, a signal recognition particle and GET independent pathway for targeting a broad range of substrate proteins to the endoplasmic reticulum. The SND pathway functions in parallel to the GET pathway in targeting proteins with downstream hydrophobic motifs. SND1 is localised to the cytoplasm and interacts with ENV10 and SND2. The protein contains multiple disordered regions, a coiled coil region and undergoes phosphorylation at serine residues and ubiquitination.
