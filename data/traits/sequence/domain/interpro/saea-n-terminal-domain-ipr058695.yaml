identifier: InterPro:IPR058695
label: "SaeA, N-terminal domain"
definition: >-
  This entry represents the N-terminal in SaeA proteins from actinomycetes. This domain shows structural similarity to the HRDC domain ( ). SaeA is involved in assembly of the ESX-1 secretion system (T7SS), which exports several proteins including EsxA and EsxB. The SaeA protein localises to the bacterial cell pole and is required for proper assembly and polar localisation of the ESX-1 complex. Disruption of SaeA affects DNA conjugation in recipient strains and blocks the secretion of EsxB.
