identifier: InterPro:IPR041368
label: "Dam-replacing protein, HTH domain"
definition: >-
  Dam-replacing protein (DRP) is an restriction endonuclease that is flanked by pseudo-transposable small repeat elements. The replacement of Dam-methylase by DRP allows phase variation through slippage-like mechanisms in several pathogenic isolates of Neisseria meningitidis. This domain represents the C-terminal HTH domain.
