identifier: InterPro:IPR047032
label: "Gamma-aminobutyric acid receptor subunit pi, transmembrane domain"
definition: >-
  Type-A gamma-aminobutyric acid receptor (GABAAR) is an anionic channel, mediating fast inhibitory synaptic transmission. The Pi subunit of GABAAR is expressed mainly in non-neuronal tissues such as the mammary gland, prostate gland, lung, thymus, and uterus. It is also highly expressed in certain types of cancer such as basal-like breast cancer and pancreatic ductal adenocarcinoma. It has been suggested that polymorphisms in its gene may be associated with the susceptibility to systemic lupus erythematosus (SLE). This entry represents the transmembrane (TM) domain of the pi subunit of GABAAR, which consists of four transmembrane-spanning α-helical segments that are linked by loops.
