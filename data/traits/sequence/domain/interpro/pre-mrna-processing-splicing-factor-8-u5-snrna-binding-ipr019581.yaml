identifier: InterPro:IPR019581
label: Pre-mRNA-processing-splicing factor 8, U5-snRNA-binding
definition: >-
  The essential spliceosomal protein Prp8 interacts with U5 and U6 snRNAs and with specific pre-mRNA sequences that participate in catalysis. This close association with crucial RNA sequences, together with extensive genetic evidence, suggests that Prp8 could directly affect the function of the catalytic core, perhaps acting as a splicing cofactor.
