identifier: InterPro:IPR001135
label: NADH-quinone oxidoreductase, subunit D
definition: >-
  This entry represents the subunit D (NuoD) of NADH-quinone oxidoreductase ( ) and the subunit H (NdhH) of NAD(P)H-quinone oxidoreductase ([ec:1.6.5.-]). NADH-quinone (Q) oxidoreductase is a large and complex redox proton pump, which utilises the free energy derived from oxidation of NADH with lipophilic electron/proton carrier Q to translocate protons across the membrane to generate an electrochemical proton gradient. Subunit D (NuoD) is a 49kDa polypeptide that appears to be evolutionarily important in determining the physiological function of complex I/NDH-1.
