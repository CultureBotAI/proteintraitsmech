identifier: InterPro:IPR035629
label: "Nebulin, SH3 domain"
definition: >-
  Nebulin is a giant filamentous protein (600-900 kD) that plays a role in numerous cellular processes including regulation of muscle contraction, Z-disc formation, and myofibril organization and assembly in skeletal muscle. It contains an N-terminal LIM domain, many nebulin repeats/super repeats, and a C-terminal SH3 domain. The N terminus of nebulin is located near the pointed end of the thin filament and contains a binding site for the actin filament capping protein tropomodulin (Tmod). The super repeat region of nebulin has been shown to interact with kelch-like family member 40 (KLHL40). The C terminus of nebulin is located within the highly specialized boundary of the sarcomere (Z-disc), and plays an important role in myofibril assembly, mechanosensing, signaling, force generation and transmission, and sarcolemmal resilience. The SH3 domain of nebulin interacts with multiple proteins, such as alpha-actinin, XIRP2 and titin. Mutations in nebulin can cause nemaline myopathy, characterised by muscle weakness which can be severe and can lead to neonatal lethality.
