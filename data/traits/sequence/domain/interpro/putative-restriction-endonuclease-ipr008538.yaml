identifier: InterPro:IPR008538
label: "Putative restriction endonuclease"
definition: >-
  This entry includes a group of putative nuclease, including hypothetical protein TT1808 (also known as Uma2 or TTHA1514), an AT-rich DNA-binding protein from Thermus thermophilus. This domain has a 3-layer α/β/α topology similar to that found in restriction endonucleases. The nuclease domain is ubiquitously found in enzymes involved in metabolism of nucleic acids, mostly in nucleases with diverse biological functions.
