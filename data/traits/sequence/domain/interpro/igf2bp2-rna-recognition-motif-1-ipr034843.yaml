identifier: InterPro:IPR034843
label: "IGF2BP2, RNA recognition motif 1"
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of IGF2BP2. Insulin-like growth factor 2 mRNA-binding protein 2 (IGF2BP2, also known as IMP-2) is a ubiquitously expressed RNA-binding protein that recruits target transcripts to cytoplasmic protein-RNA complexes (mRNPs). It is involved in the stimulation of insulin action and has a role in metabolic homeostasis. SNPs in IGF2BP2 gene are implicated in susceptibility to type 2 diabetes. IGF2BP2 also plays an important role in cellular motility; it regulates the expression of PINCH-2, an important mediator of cell adhesion and motility, and MURF-3, a microtubule-stabilizing protein, through direct binding to their mRNAs. IGF2BP2 may be involved in the regulation of mRNA stability through the interaction with the AU-rich element-binding factor AUF1.
