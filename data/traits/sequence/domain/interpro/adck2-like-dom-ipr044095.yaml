identifier: InterPro:IPR044095
label: "ADCK2-like dom"
definition: >-
  Proteins containing this domain include aarF domain containing kinase 2 (ADCK2) from humans, YPL109C from budding yeasts and SPBC21C3.03 from fission yeasts. Eukaryotes contain at least three ABC1-like proteins; in humans, these are ADCK3 and the putative protein kinases named ADCK1 and ADCK2. YPL109C and SPBC21C3.03 are uncharacterised mitochondrial proteins.
