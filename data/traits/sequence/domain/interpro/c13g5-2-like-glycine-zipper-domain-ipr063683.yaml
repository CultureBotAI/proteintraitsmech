identifier: InterPro:IPR063683
label: "C13G5.2-like, glycine zipper domain"
definition: >-
  This entry represents a glycine zipper domain found towards the C-terminal of uncharacterised protein C13G5.2 and in related sequences. These uncharacterised proteins are found predominantly in nematodes, particularly in Caenorhabditis species and related Rhabditidae. The function of this protein family and the specific role of this domain remain to be determined.
