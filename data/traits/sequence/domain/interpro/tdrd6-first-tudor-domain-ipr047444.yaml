identifier: InterPro:IPR047444
label: "TDRD6, first Tudor domain"
definition: >-
  This is the first Tudor domain of TDRD6 and similar proteins mainly from mammals. TDRD6, also called antigen NY-CO-45 or cancer/testis antigen 41.2 (CT41.2), is a testis-specific expressed protein that was localised to the chromatoid bodies in germ cells, and is involved in spermatogenesis, chromatoid body formation, and for proper precursor and mature miRNA expression. Mutations in TDRD6 may be associated with human male infertility and early embryonic lethality. TDRD6 contains seven Tudor domains.
