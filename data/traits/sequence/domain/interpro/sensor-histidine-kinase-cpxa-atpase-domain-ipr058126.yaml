identifier: InterPro:IPR058126
label: "Sensor histidine kinase CpxA, ATPase domain"
definition: >-
  This entry represents the histidine kinase-like ATPase (HATPase) domain of Sensor histidine kinase CpxA from Vibrio parahaemolyticus, Klebsiella pneumoniae, Escherichia coli and similar proteins mainly from gammaproteobacteria. These proteins may function in acid stress and in cell wall stability. Proteins having this HATPase domain often contain as well a periplasmic domain, an histidine kinase dimerisation and phosphoacceptor domain (HisKA, ) and a HAMP sensor domain; some also contain a CpxA family periplasmic domain. The Cpx system is one of extracytoplasmic stress response systems (ESR) found in Gram-negative bacteria. ESRs are operated by a two-component signalling system which consists of a sensory histidine kinase (HK) and a response regulator (RR) as basal elements. In the Cpx system, CpxA is the inner membrane-spanning, sensory HK.
