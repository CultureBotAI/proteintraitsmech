identifier: InterPro:IPR048036
label: "Tlg1p-like, N-terminal domain"
definition: >-
  Tlg1p (t-SNARE affecting a late Golgi compartment protein 1) from yeast, also called syntaxin TLG1, is a soluble NSF attachment protein receptor (SNARE) protein (of Qc type) involved in membrane fusion, probably in retrograde traffic of cytosolic double-membrane vesicles derived from both, early and possibly late endosomes/PVC (prevacuolar compartment) back to the trans-Golgi network (TGN or late Golgi). It has been reported to function both as a (target membrane) t-SNARE and as a (vesicle) v-SNARE. This entry represents the N-terminal domain of Tlg1p, which consists of a three α-helical bundle ( ).
