identifier: InterPro:IPR013968
label: "Polyketide synthase-like, ketoreductase domain"
definition: >-
  This entry represents the ketoreductase domain in polyketides synthase-like and fatty acid related enzymes in fungi and bacteria. The ketoreductase (KR) domain is a conserved catalytic domain that belongs to the short-chain dehydrogenase/reductase (SDR) superfamily and contains a Rossmann fold, which is crucial for binding the NADPH cofactor. Its primary function is to catalyse the NADPH-dependent reduction of beta-keto groups to beta-hydroxy groups during the biosynthesis of fatty acids, polyketides, and related compounds. The specific substrates and products can vary depending on the enzyme. Polyketide synthases (PKSs) are large, multifunctional enzyme complexes that catalyse the biosynthesis of diverse secondary metabolites known as polyketides. These enzymes operate in an assembly line-like manner, utilising multiple domains such as acyltransferase (AT) , and acyl carrier protein (ACP) to perform stepwise condensation of simple carboxylic acid units. PKSs can be classified into three main types: type I (modular), type II (iterative), and type III, each with distinct structural and functional characteristics. The modular type I PKSs, in particular, contain additional domains like ketoreductase (KR) , dehydratase (DH) , and enoylreductase (ER) that modify the growing polyketide chain.
