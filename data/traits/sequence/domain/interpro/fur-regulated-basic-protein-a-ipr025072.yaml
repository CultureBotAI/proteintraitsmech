identifier: InterPro:IPR025072
label: "Fur-regulated basic protein A"
definition: >-
  This entry represents Uncharacterized protein YebD which is regulated by the ferric uptake regulator protein Fur. This protein does not regulate the lutABC operon encoding iron-sulphur-containing enzymes necessary for growth on lactate.
