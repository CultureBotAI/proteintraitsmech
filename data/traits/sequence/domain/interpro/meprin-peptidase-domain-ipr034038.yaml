identifier: InterPro:IPR034038
label: "Meprin peptidase domain"
definition: >-
  This entry includes the peptidase domain of the zinc-dependent metalloprotease meprin. Meprin can be either membrane-bound or secreted, and cleaves a variety of targets, including peptides such as parathyroid hormone, gastrin, and cholecystokinin, cytokines such as osteopontin, and proteins such as collagen IV, fibronectin, casein and gelatin. Meprin may also be able to release proteins from the cell surface. Closely related meprin alpha- (MEROPS identifier M12.002) and beta-subunits (MEROPS identifier M12.004) form homo- and hetero-oligomers; these complexes are found on epithelial cells of the intestine, for example, and are also expressed in certain cancer cells.
