identifier: InterPro:IPR063927
label: "Surface membrane glycoprotein GP46/M-2, beta-sheet domain"
definition: >-
  This entry represents a small β-sheet domain found in GP46-like proteins in lower eukaryotic organisms including Moneuplotes species (ciliates) and Leishmania species (trypanosomatids). The domain forms repeating units in some proteins. In Moneuplotes proteins, it appears as multiple tandem repeats, with up to 29 copies observed in some sequences ( ). GP46 is a surface membrane glycoprotein in Leishmania amazonensis that is GPI-anchored and immunologically protective. The function of this domain remains to be determined.
