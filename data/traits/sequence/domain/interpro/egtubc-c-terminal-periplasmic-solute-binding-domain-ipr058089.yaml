identifier: InterPro:IPR058089
label: "EgtUBC, C-terminal periplasmic solute-binding domain"
definition: >-
  This entry represents the C-terminal periplasmic solute-binding domain (SBD) of Probable ergothioneine transporter EgtUBC from Staphylococcus aureus and similar proteins predominantly found in firmicutes. EgtUBC is part of an ABC transporter complex EgtU required for the uptake of ergothioneine (EGT), a natural low-molecular weight (LMW) thiol antioxidant. This domain binds to EGT with sub-micromolar affinity.
