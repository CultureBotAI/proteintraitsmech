identifier: InterPro:IPR063960
label: "Gigasin-like, second EGF-like domain"
definition: >-
  This entry represents the second EGF domain of gigasin-2, a protein component of the organic matrix in calcified shell layers of bivalves, particularly oysters within the Ostreidae family. Gigasin-2 is found in molluscs and is involved in shell biomineralisation processes. The protein is secreted and localises to the shell matrix, where it contributes to the structural organisation of calcium carbonate deposition during shell formation. Shell matrix proteins like gigasin-2 are essential for proper shell development and maintenance in marine bivalves. This entry also includes EGF-like domain-containing protein 2 from related animals.
