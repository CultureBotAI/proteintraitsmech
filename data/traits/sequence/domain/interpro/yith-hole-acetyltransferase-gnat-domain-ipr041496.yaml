identifier: InterPro:IPR041496
label: "YitH/HolE, acetyltransferase (GNAT) domain"
definition: >-
  This domain can be found in YitH, a putative N-acetyltransferase from Bacillus subtilis and HolE, an acyltransferase that catalyses the formation of pseudomonic acid C-holothin (PAC-holothin), a thiomarinol analogue, from pseudomonoyl-CoA C (PAC-CoA) and holothin.
