identifier: InterPro:IPR003323
label: "OTU domain"
definition: >-
  This entry also includes OTU-like domain from UDP-N-acetylglucosamine transferase subunit ALG13. This domain, however, despite containing a complete catalytic triad, do not react with Ub propargylamide and has no deubiquitinase activity. An homology region containing four conserved motifs has been identified in proteins from eukaryotes, several groups of viruses and the pathogenic bacteria Chlamydia pneumoniae. None of these proteins has a known biochemical function but low sequence similarity with the polyprotein regions of arteriviruses has lead to suggest that it could possess cysteine protease activity. In this case, the conserved cysteine and aspartate in motif I and the histidine in motif IV could be the catalytic residues. Motifs II and III have a more limited sequence conservation and could be involved in substrate recognition. It has been proposed that the eukaryotic proteins containing an OTU domain could mediate proteolytic events involved in signalling associated with the modification of chromatin structure and control of cell proliferation. In viruses proteins containing this domain are annotated as replicase or RNA-dependent RNA polymerase. The eukaryotic sequences are related to the Ovarian Tumour (OTU) gene in Drosophila, cezanne deubiquitinating peptidase and tumor necrosis factor, alpha-induced protein 3 (MEROPS peptidase family C64) and otubain 1 and otubain 2 (MEROPS peptidase family C65). Cysteine peptidases with a chymotrypsin-like fold are included in clan PA, which also includes serine peptidases. Cysteine peptidases that are N-terminal nucleophile hydrolases are included in clan PB. Cysteine peptidases with a tertiary structure similar to that of the serine-type aspartyl dipeptidase are included in clan PC. Cysteine peptidases with an intein-li…
