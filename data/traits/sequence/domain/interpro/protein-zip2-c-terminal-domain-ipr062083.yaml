identifier: InterPro:IPR062083
label: "Protein ZIP2, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of ZIP2 (zipping up meiotic chromosomes protein 2), found in Saccharomycetaceae. ZIP2 is a meiosis-specific protein required for initiation of chromosome synapsis during meiosis. The protein is involved in synaptonemal complex formation, a structure that tethers homologous chromosomes and plays a central role in recombination and homologue segregation. ZIP2 localises to the synaptonemal complex during meiotic prophase and interacts with ZIP3. The protein contains a domain ( ) upstream this C-terminal domain whose function is not yet known.
