identifier: InterPro:IPR059511
label: "Glycine zipper containing PH domain"
definition: >-
  This entry represents a PH-like domain that is found in phage and prophage proteins, including Immunity protein from Bacillus phage SPbeta. It is unusual because it contains an inserted transmembrane domain containing a glycine zipper motif. These motifs usually mediate dimerisation of membrane helices. This TM helix might localise the domain to the membrane, but would likely require a proteolytic cleavage to release it. The function of this domain is unknown.
