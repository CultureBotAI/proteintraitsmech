identifier: InterPro:IPR064126
label: "UVSSA-type zinc finger"
definition: >-
  This entry covers the entire UVSSA-type zinc finger. UV-stimulated scaffold protein A (UVSSA) contains a zinc (Zn)-finger that docks on the RNAPII jaw: both knuckles of the finger insert their residues into a shallow groove formed by helix 1, consecutive β-strand and helix 3 of the jaw domain. UVSSA homologues are present across the eukaryotic kingdoms including unicellular eukaryotes like Dictyostelium. In metazoans, the protein is observed in primitive metazoans like Hydra vulgaris and C. elegans to non-vertebrates and vertebrate species. Surprisingly, the UVSSA homologues are missing in a few insect species including Drosophila. In plants, UVSSA homologues are present in algae species like Chlamydomonas to early vascular system plants like Selaginella to higher order land plants. In fungal genomes, it is present in Zygomycota and Chytridiomycota, including common bread mould Mucor and Rhizopus. However, it is not observed in Ascomycota and Basidiomycota. Transcription is an essential cellular process in which RNA polymerase II(RNAPII) synthesizes complementary copies of protein-coding and non-coding genes. Lesions on the template DNA strand cause stalling of elongating RNAPII and trigger a genome-wide transcriptional arrest. Transcription-coupled repair (TCR) is a dedicated pathway for the preferential repair of bulky transcription-blocking DNA lesions. These lesions stall the elongating RNAPII triggering the recruitment of TCR proteins at the damaged site. UV-stimulated scaffold protein A (UVSSA) is a cofactor which is involved in stabilisation of the TCR complex, recruitment of DNA-repair machinery and removal/restoration of RNAPII from the lesion site.
