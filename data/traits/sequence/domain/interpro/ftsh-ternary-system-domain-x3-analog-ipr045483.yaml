identifier: InterPro:IPR045483
label: "FtsH ternary system domain X3-analog"
definition: >-
  This is an uncharacterised domain found in the FtsH ternary system, a class of NTP-dependent biological conflict systems. This domain is positionally-equivalent and mutually-exclusive to the fvmX3 domain in gene neighbourhoods.
