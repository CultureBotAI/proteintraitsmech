identifier: InterPro:IPR010499
label: "Bacterial transcription activator, effector binding"
definition: >-
  This domain is found in the probable effector binding domain of a number of different bacterial transcription activators and is also present in some DNA gyrase inhibitors. The absence of a HTH motif in the DNA gyrase inhibitors is thought to indicate the fact that these do not bind DNA. It is also found in Transcriptional regulator Rob which binds to regulatory regions and represses transcription of genes belonging to the flagellar regulon, including flhD, flhB and fliC.
