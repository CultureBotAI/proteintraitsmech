identifier: InterPro:IPR000982
label: Matrix protein, N-terminal domain
definition: >-
  This entry represents the N-terminal domain found in a variety of paramyxoviruses such as Morbillivirus, paramyxovirus, pneumovirus M proteins. The N-terminal domain of the NDV matrix protein adopts a β-sandwich fold in which the β-strands in the opposing β-sheets are approximately orthogonal to each other. Several α-helices are situated mostly on the surface of this β-sandwich domain. The N-terminal domain is connected to a C-terminal domain with similar fold via a 16 amino acid linker. The two domains are related by an approximate fourfold rotation axis coincident with the twofold axis of the matrix protein dimer. The matrix protein dimer represents the physiologically relevant assembly unit. The N-terminal domain contributes to the highly positively charged surface that faces the viral membrane, enabling association with the negatively charged membrane. The matrix protein plays a crucial role in virus assembly, and interacts with the RNP complex as well as with the viral membrane. It is found in Morbillivirus, Paramyxovirus, Pneumovirus.
