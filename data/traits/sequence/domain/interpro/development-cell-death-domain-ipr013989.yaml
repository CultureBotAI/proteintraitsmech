identifier: InterPro:IPR013989
label: "Development/cell death domain"
definition: >-
  The DCD (Development and Cell Death) domain is found in plant proteins involved in development and cell death. The DCD domain is an ~130 amino acid long stretch that contains several mostly invariable motifs. These include a FGLP and a LFL motif at the N terminus and a PAQV and a PLxE motif towards the C terminus of the domain. The DCD domain is present in proteins with different architectures. Some of these proteins contain additional recognizable motifs, like the KELCH repeats or the ParB domain. Biological studies indicate a role of these proteins in phytohormone response, embryo development and programmed cell death by pathogens or ozone. The predicted secondary structure of the DCD domain is mostly composed of β strands and confined by an α-helix at the N- and at the C terminus. Proteins known to contain a DCD domain are listed below: Carrot B2 protein. Pea Gda-1 protein. Soybean N-rich protein (NRP).
