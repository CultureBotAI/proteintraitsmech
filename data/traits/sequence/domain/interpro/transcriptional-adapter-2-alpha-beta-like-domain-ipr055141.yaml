identifier: InterPro:IPR055141
label: "Transcriptional adapter 2-alpha/beta-like domain"
definition: >-
  This domain is found in human Transcriptional adapter 2-alpha (TADA2A), Transcriptional adapter 2-beta (TADA2B) and similar eukaryotic proteins. TADA2A is a component of the ATAC complex that plays a role in chromatin remodelling. TADA2B differs both biochemically and functionally from TADA2A. TADA2B interacts selectively, but not stably, with the Gcn5-containing histone acetylation complex TFTC/STAGA. In addition, TADA2B interacts with Baf57 (a component of the human Swi/Snf complex) and can coordinate the targeting of both histone acetylation and chromatin remodelling activities. This domain is predicted to adopt an α/β structure.
