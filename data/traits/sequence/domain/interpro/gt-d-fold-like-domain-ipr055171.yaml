identifier: InterPro:IPR055171
label: "GT-D fold-like domain"
definition: >-
  This domain is related to the GT-D fold glycosyltransferase domain ( ). These protein domains share a common sequence motif R[VIL]GDGE, significant structural similarity based on the predicted AF2 model, but low sequence similarity. This domain is found standalone and in combination with other domains in a number of proteins from bacteria.
