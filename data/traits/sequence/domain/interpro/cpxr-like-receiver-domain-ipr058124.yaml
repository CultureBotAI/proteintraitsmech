identifier: InterPro:IPR058124
label: "CpxR-like, receiver domain"
definition: >-
  This entry represents the N-terminal receiver (REC) domain of Transcriptional regulatory protein CpxR from Klebsiella pneumoniae and similar proteins mainly from gammaproteobacteria. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. CpxR is a member of the two-component regulatory system CpxA/CpxR which responds to envelope stress response by activating or, in some cases, repressing expression of downstream genes.
