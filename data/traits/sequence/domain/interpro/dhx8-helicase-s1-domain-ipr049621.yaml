identifier: InterPro:IPR049621
label: "DHX8 helicase, S1 domain"
definition: >-
  This entry represents the S1 domain found in human ATP-dependent RNA helicase DHX8 (also known as HRH1) and its homologues, such as PRP22 from yeast. DHX8 is a DEAH (Asp-Glu-Ala-His) box polypeptide. The DEAH-box RNA helicases are thought to play key roles in pre-mRNA splicing and DHX8 facilitates nuclear export of spliced mRNA by releasing the RNA from the spliceosome.
