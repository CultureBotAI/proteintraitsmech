identifier: InterPro:IPR060498
label: "Tail fiber assembly protein, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of tail fibre assembly proteins found in bacteriophages and prophage regions. These chaperone proteins act in the assembly of long tail fibres. The tail fibre assembly protein is necessary for the maturation of the tail fibre structural subunit to its dimeric form. This N-terminal domain precedes the main Caudo_TAP domain in these proteins. The proteins form homodimers and are found in T-even-type bacteriophages and related prophages.
