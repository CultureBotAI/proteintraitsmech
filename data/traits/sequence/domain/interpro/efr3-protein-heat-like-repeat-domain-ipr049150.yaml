identifier: InterPro:IPR049150
label: "EFR3 protein, HEAT-like repeat domain"
definition: >-
  This entry represents the HEAT-like repeat domain found in a group of fungal sequences, including the EFR3 protein. Protein EFR3 homologue A (EFR3A) is a component of a phosphatidylinositol 4-kinase (PI4K) complex, composed of PI4KA, EFR3 (EFR3A or EFR3B), TTC7 (TTC7A or TTC7B) and FAM126 (FAM126A or FAM126B). This complex is required for the attachment of phosphatidylinositol 4-kinase (PI4K) to the plasma membrane. EFR3A is palmitoylated at its N terminus, anchoring the protein to the plasma membrane, and probably acts as the membrane-anchoring component in the complex. In yeast, the Efr3p protein is a main regulator of the Stt4p phosphatidylinositol 4-kinase at contact sites between the endoplasmic reticulum and the plasma membrane.
