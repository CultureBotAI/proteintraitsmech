identifier: InterPro:IPR049433
label: "Virion DNA-directed RNA polymerase, plug insertion domain"
definition: >-
  This domain is found in Virion DNA-directed RNA polymerase from Bacteriophage N4 (vRNAP, ), responsible for the transcription of the early region of the double-stranded linear DNA genome of the lytic coliphage. This entry represents a short insertion that forms a globular module named plug, which blocks the activity of the protein.
