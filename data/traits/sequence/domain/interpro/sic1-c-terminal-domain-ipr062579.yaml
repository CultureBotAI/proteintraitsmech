identifier: InterPro:IPR062579
label: "SIC1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of protein SIC1, a cyclin-dependent kinase inhibitor found in Saccharomycetes. The full-length SIC1 protein functions as both a substrate and inhibitor of the cyclin-dependent protein kinase CDC28, playing a crucial role in cell cycle regulation and chromosome segregation. SIC1 is phosphorylated by cyclin-dependent kinases CDC28 and PHO85, which promotes its degradation and exit from G1 phase. The protein also interacts with HOG1 and mediates cell-cycle arrest in G1 phase. The function of this C-terminal domain remains to be determined.
