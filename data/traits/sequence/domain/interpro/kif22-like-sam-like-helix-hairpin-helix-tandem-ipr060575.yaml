identifier: InterPro:IPR060575
label: "KIF22-like, SAM-like, helix-hairpin-helix tandem"
definition: >-
  This entry represents a SAM-like helix-hairpin-helix (HhH) domain found in proteins with diverse functions such as Kinesin-like protein KIF22, Transcription elongation factor (TEFM), ComE operon protein 1 and similar sequences. The HhH motif is known to recognise DNA in a sequence independent manner.
