identifier: InterPro:IPR028698
label: Rabphilin-3A, FYVE domain
definition: >-
  In humans, Rabphilin-3A (RPH3A) is an effector protein that binds to the GTP-bound form of Rab3A, which is one of the most abundant Rab proteins in neurons and predominantly localized to synaptic vesicles. It contains an N-terminal Rab3A effector domain (RabBD (Rab-binding) domain), a proline-rich linker region, and two tandem C2 domains. The effector domain binds specifically to the activated GTP-bound state of Rab3A and harbors a conserved FYVE zinc finger. The C2 domains are responsible for the binding of phosphatidylinositol-4,5-bisphosphate (PIP2) , a key player in the neurotransmitter release process. RPH3A may interact with the SNARE complex and regulate synaptic vesicle exocytosis and Ca2+-triggered neurotransmitter release. It has been linked to neurodegenerative diseases, such as Huntington's disease, Lewy body disease and Alzheimer's disease. This entry represents the FYVE domain of Rabphilin-3A, which resembles a FYVE-related domain that is structurally similar to the canonical FYVE domains but lacks the three signature sequences: an N-terminal WxxD motif (x for any residue), the central basic R(R/K)HHCRxCG patch, and a C-terminal RVC motif.
