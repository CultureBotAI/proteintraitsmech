identifier: InterPro:IPR026001
label: "Abortive infection protein-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of the Lactococcus lactis abortive infection protein Abi-859, and shows structural similarity to the HEPN domain. This protein confers bacteriophage resistance.
