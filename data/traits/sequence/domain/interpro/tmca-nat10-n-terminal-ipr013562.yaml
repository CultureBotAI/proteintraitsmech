identifier: InterPro:IPR013562
label: "TmcA/NAT10, N-terminal"
definition: >-
  This entry represents a domain found at the N-terminal of TmcA from bacteria and NAT10 from eukaryotes. The bacterial tRNA(Met) cytidine acetyltransferase (TmcA) catalyses the formation of N(4)-acetylcytidine (ac4C) at the wobble position of tRNA(Met), by using acetyl-CoA as an acetyl donor and either ATP or GTP. This modification is thought to ensure precise recognition of the AUG codon by strengthening C-G base-pair interaction and also prevent misrecognition of the near cognate AUA codon. RNA cytidine acetyltransferas (NAT10) are RNA cytosine acetyltransferases with specificity toward both 18S rRNA and tRNAs and contain additional putative nuclear and nucleolar localisation signals (NLS and NoLS respectively).
