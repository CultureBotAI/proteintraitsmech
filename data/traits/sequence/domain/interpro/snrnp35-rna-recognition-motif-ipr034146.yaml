identifier: InterPro:IPR034146
label: "snRNP35, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of snRNP35 (also known as U11/U12-35K), which is one of the components of the U11/U12 snRNP, a spliceosome required for splicing U12-type nuclear pre-mRNA introns. U11/U12-35K is highly conserved among bilateria and plants, but is lacking in some organisms, such as Saccharomyces cerevisiae and Caenorhabditis elegans. Moreover, U11/U12-35K shows significant sequence similarity to U1 snRNP-specific 70kDa protein (U1-70K or snRNP70).
