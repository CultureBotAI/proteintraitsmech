identifier: InterPro:IPR056212
label: "T2SS substrate NttA"
definition: >-
  This entry represents the type II secretion system substrate NttA from Legionella pneumophila and related proteins found mainly in Legionellales species. Homologues of NttA are also found outside Legionella genus. NttA contains and N-terminal disordered region followed by a globular all-α helical domain consisting of four α-helices. NttA was shown to interact with phosphoinositides with a clear preference for phosphatidylinositol -3,5-biphosphate [PtdIns(3,5)P2]. NttA is likely targeted to host organelles, such as the Legionella containing vacuole, during intracellular infection.
