identifier: InterPro:IPR055032
label: "Class 2 C-terminal docking domain"
definition: >-
  This short domain is found at the C-terminal end of the polyketide synthase module CurG from the cyanobacteria Moorena producens. It consists of two α-helices connected by a sharp bend.
