identifier: InterPro:IPR054056
label: "ESX-1 secretion-associated protein EspB, PPE domain"
definition: >-
  This entry represents the PPE domain of ESX-1 secretion-associated protein EspB, a member of the PE/PPE family and the only one described to date to form higher-order oligomers. It contains PE (Pro-Glu) and PPE (Pro-Pro-Glu) domains, and a C-terminal domain, which is processed by MycP1 protease during secretion. EspB oligomerises into a cylinder-like heptamer through its N-terminal domain, that form channel-like structures.
