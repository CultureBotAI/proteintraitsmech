label: "Domain of unknown function DUF8602"
definition: >-
  This entry represents the N-terminal zinc binding domain found in bacteriophage and bacterial proteins. These proteins typically contain this N-terminal zinc binding domain, a C-terminal HNH domain with likely nuclease activity ( ). The specific function of this N-terminal zinc binding domain remains to be determined.
