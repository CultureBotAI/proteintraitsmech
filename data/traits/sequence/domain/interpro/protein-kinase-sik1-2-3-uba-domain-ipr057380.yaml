identifier: InterPro:IPR057380
label: "Protein kinase SIK1/2/3, UBA domain"
definition: >-
  This domain is found in the human Serine/threonine-protein kinase (salt-inducible kinase) SIK1, SIK2, SIK3 and related proteins, including Sperm motility kinase Y. The domain represented by this entry has a significant sequence similarity to UBA domains, and it is predicted to adopt a similar structure consisting of a three-helical bundle. Salt-inducible kinases (SIKs) are serine/threonine protein kinases that regulate gene expression in response to extracellular cues, particularly those that increase intracellular cAMP levels. The characterised salt-inducible kinases (SIKs) are SIK1, SIK2, and SIK3. SIK1 is a regulator of p53-dependent anoikis. Inactivation of SIK1 compromised p53 function in anoikis and allowed cells to grow in an anchorage-independent manner. SIK2 was identified as key upstream regulators of Carbohydrate-responsive element-binding protein (ChREBP) activity. SIK2 inhibits p300 HAT activity by direct phosphorylation, which results in decreased ChREBP-mediated lipogenesis in hepatocytes. SIK3 is a positive regulator of mTOR signaling that functions by triggering the degradation of DEPTOR, an mTOR inhibitor. This protein is involved in the dynamic regulation of mTOR signaling in chondrocyte differentiation during skeletogenesis.
