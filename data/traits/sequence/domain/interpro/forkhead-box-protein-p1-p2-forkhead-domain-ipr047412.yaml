identifier: InterPro:IPR047412
label: "Forkhead box protein P1/P2, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXP1 and FOXP2, and similar sequences from vertebrates, arthropods and nematodes. The FH domain is a winged helix DNA-binding domain. Forkhead box protein P1 (FOXP1) is a transcription factor that is widely expressed and has a broad range of functions. It has been shown to have a role in cardiac, lung, and lymphocyte development. Deregulation of FOXP1 is an important contributor to the pathogenesis of diffuse large B-cell lymphoma (DLBCL), suggesting it may function as an oncogene. Loss of FOXP1 expression in breast cancer is associated with a worse outcome, suggesting that FOXP1 may function as a tumor suppressor in some tissues. Haploinsufficiency of the FOXP1 gene leads to a neurodevelopmental disorder termed FOXP1 syndrome, characterised by developmental delay, intellectual disability, autism spectrum disorder, speech delay, and dysmorphic features. Forkhead box protein P2 (FOXP2) is a transcriptional repressor that may play a role in the specification and differentiation of lung epithelium. It may also play a role in developing neural, gastrointestinal, and cardiovascular tissues. An arginine-to-histidine missense mutation (R553H) in the FOXP2 Forkhead domain has been linked to a severe speech and language disorder.
