identifier: InterPro:IPR047450
label: "TDRD15, first Tudor domain"
definition: >-
  This entry represents the first Tudor domain of human TDRD15 and similar sequences mainly found in vertebrates. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. TDRD15 is an uncharacterised Tudor domain-containing protein that contains seven Tudor domains.
