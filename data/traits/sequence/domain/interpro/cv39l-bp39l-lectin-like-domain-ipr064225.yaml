identifier: InterPro:IPR064225
label: "CV39L/BP39L lectin-like domain"
definition: >-
  This entry represents a domain that spans full length BP39L and CV39L lectins from Burkholderia pseudomallei and Chromobacterium violaceum , respectively. These lectins have a characteristic seven-bladed β-propeller fold, and their three-dimensional structures have been determined and . This domain is also found in combination with other domain in some uncharacterised proteins. Burkholderia pseudomallei and Chromobacterium violaceum are bacteria of tropical and subtropical soil and water that occasionally cause fatal infections in humans and animals. Microbial lectins mediate the adhesion of organisms to host cells, which is the first phase in the development of infection. Functional studies conducted on a series of oligo- and polysaccharides confirmed the preference of BP39L for mannosylated saccharides and CV39L for rather more complex polysaccharides with a monosaccharide preference for β-l-fucose.
