identifier: InterPro:IPR019557
label: "Aminotransferase-like, plant mobile domain"
definition: >-
  This entry represents a conserved plant aminotransferase-like domain which is similar to a DNA binding motif found in transposases. This domain is found in Protein MAINTENANCE OF MERISTEMS (MAIN) and its three homologues MAIN-like 1/2/3 from Arabidopsis, which are thought to be encoded by transposon-derived genes, involved in maintaining genomic stability and function, possibly by controlling heterochromatic elements.
