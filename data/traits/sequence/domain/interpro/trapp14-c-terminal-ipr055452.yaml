identifier: InterPro:IPR055452
label: "TRAPP14, C-terminal"
definition: >-
  This entry includes Trafficking protein particle complex subunit 14 (TRAPP14), which is a specific subunit of the TRAPP (transport protein particle) II complex, a conserved vesicle tethering complex that functions in late Golgi trafficking as a membrane tether. This entry represents the C-terminal domain which is predicted to adopt an Ig-like fold.
