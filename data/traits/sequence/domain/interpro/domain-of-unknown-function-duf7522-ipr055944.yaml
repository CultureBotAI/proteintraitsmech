label: "Domain of unknown function DUF7522"
definition: >-
  This entry represents a domain found in a group of uncharacterised proteins from Archaea. This domain adopts an α/β fold consisting of a central five-stranded β-sheet enveloped by four α-helices, similar to that found in profilin.
