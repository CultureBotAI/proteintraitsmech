identifier: InterPro:IPR015007
label: Nuclear pore complex, NUP2/50/61
definition: >-
  This entry represents a domain found in Nup2, 50 and 61, which are components of the nuclear pore complex. NUP2 encodes a non-essential nuclear pore protein that has a central domain similar to those of Nsp1 and Nup1. Transport of macromolecules between the nucleus and the cytoplasm of eukaryotic cells occurs through the nuclear pore complex (NPC), a large macromolecular complex that spans the nuclear envelope. The structure of the vertebrate NPC has been studied extensively; recent reviews include. The yeast NPC shares several features with the vertebrate NPC, despite being smaller and less elaborate. Many yeast nuclear pore proteins, or nucleoporins, have been identified by a variety of genetic approaches. nup2 mutants show genetic interactions with nsp1 and nup1 conditional alleles. Nup1 interacts with the nuclear import factor Srp1 and with the small GTPase Ran (encoded by GSP1).
