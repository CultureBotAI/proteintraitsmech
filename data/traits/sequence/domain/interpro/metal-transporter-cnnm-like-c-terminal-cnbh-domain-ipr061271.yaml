identifier: InterPro:IPR061271
label: "Metal transporter CNNM-like, C-terminal CNBH domain"
definition: >-
  This CNBH domain (cyclic nucleotide-binding homology domain) is found towards the C-terminal of human Metal transporter CNNM2 and similar proteins predominantly found in animals. CNNM2 is a divalent metal cation transporter. This domain does not bind cyclic nucleotides; instead, it mediates a flat-shaped dimerisation involving hydrophobic residues and is required for Mg2+ efflux activity. This domain folds into an eight-stranded antiparallel β-roll that is capped by an α-helical bundle on the side.
