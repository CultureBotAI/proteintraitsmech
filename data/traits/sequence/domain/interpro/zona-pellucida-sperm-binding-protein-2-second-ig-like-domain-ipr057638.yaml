identifier: InterPro:IPR057638
label: "Zona pellucida sperm-binding protein 2, second Ig-like domain"
definition: >-
  This entry represents the second Ig-like domain at the N-terminal in Zona pellucida sperm-binding protein 2 (ZP2) from mouse and similar proteins from vertebrates. ZP2 is a component of the zona pellucida, an extracellular matrix surrounding oocytes which mediates sperm binding and induction of the acrosome reaction and prevents post-fertilisation polyspermy.
