identifier: InterPro:IPR063945
label: "CEP152, second coiled-coil region"
definition: >-
  This entry represents the second coiled-coil region found in CEP152 (centrosomal protein of 152 kDa) family members. This domain is located between the first coiled-coil region ( ) and the C-terminal CEP63-binding coiled-coil ( ). CEP152 is a scaffold protein essential for centrosome duplication, acting to recruit PLK4 and CPAP during centriole formation. Mutations in CEP152 cause primary microcephaly and Seckel syndrome. This domain is found in metazoan species. The specific function of this region remains to be determined.
