identifier: InterPro:IPR053809
label: "Cell wall binding protein Cwp8, domain 3"
definition: >-
  This entry represents the third domain (D3) of cell wall protein Cwp8, found in C. difficile. This domain folds into an α/β structure consisting of a four-stranded antiparallel β-sheet packed on one side with α-helices. This domain is related to domain 1 (D1) of the cell wall protein Cwp2 from the same organism.
