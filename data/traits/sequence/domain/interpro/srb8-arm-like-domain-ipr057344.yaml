identifier: InterPro:IPR057344
label: "SRB8, ARM-like domain"
definition: >-
  This entry represents an ARM-like domain found in the Mediator of RNA polymerase II transcription subunit 12/SRB8 proteins from fungi. These proteins are components of the Mediator complex, which is a coactivator involved in the regulated transcription of nearly all RNA polymerase II- dependent genes. ARM-like domains typically form a right-handed superhelix of α-helices and are often involved in protein-protein interactions.
