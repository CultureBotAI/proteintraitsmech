identifier: InterPro:IPR039556
label: ICL/PEPM domain
definition: >-
  Proteins containing this domain are members of the ICL/PEPM enzyme family and catalyze either P-C or C-C bond formation/cleavage. Known members are phosphoenolpyruvate mutase (PEPM), phosphonopyruvate hydrolase (PPH), carboxyPEP mutase (CPEP mutase), oxaloacetate hydrolase (OAH), isocitrate lyase (ICL), and 2-methylisocitrate lyase (MICL). ICL catalyzes the conversion of isocitrate to succinate and glyoxylate, the first committed step in the glyoxylate pathway. This carbon-conserving pathway is present in most prokaryotes, lower eukaryotes and plants, but has not been observed in vertebrates.
