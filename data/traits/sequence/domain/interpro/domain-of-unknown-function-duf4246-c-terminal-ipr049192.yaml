label: "Domain of unknown function DUF4246, C-terminal"
definition: >-
  This domain is functionally uncharacterised, found mainly in fungi and bacteria. Proteins in this family are typically between 392 and 644 amino acids in length. According to structure predictions, this domain may have a cupin-like fold.
