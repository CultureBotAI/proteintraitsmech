identifier: InterPro:IPR056542
label: "Nucleoporin POM152, first Ig-like domain"
definition: >-
  This is the first immunoglobulin-like (Ig-like) domain found in Nucleoporin POM152 from yeast and similar fungal proteins. POM152 functions as a component of the nuclear pore complex (NPC). This protein consists of an N-terminal transmembrane domain (TMD) and an extended C-terminal domain (CTD) with tandem repeats of Ig-like domains.
