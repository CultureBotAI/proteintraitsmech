identifier: InterPro:IPR039736
label: "RNA-directed RNA polymerase L, C-terminal"
definition: >-
  This entry represents a common C-terminal region shared by paramyxovirus-like RNA-dependent RNA polymerases. These are often called L protein (large polymerase protein). Capping of mRNA requires RNA triphosphatase and guanylyl transferase activities, demonstrated for the rinderpest virus L protein.
