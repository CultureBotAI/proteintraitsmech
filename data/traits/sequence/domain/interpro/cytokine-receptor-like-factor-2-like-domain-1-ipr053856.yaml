identifier: InterPro:IPR053856
label: "Cytokine receptor-like factor 2-like, domain 1"
definition: >-
  Cytokine receptor-like factor 2 also known as TSLPR is a receptor for thymic stromal lymphopoietin. It contains two ectodomains with Ig-like topology. This family represents the first of these domains. This entry also includes cytokine receptor common subunit gamma, also known as IL2RG, that is known to bind with low affinity to interleukin-2, interleukin-4, interleukin-15, interleukin-21 while in complex with their high affinity cytokine receptors
