identifier: InterPro:IPR041191
label: "pPIWI_RE three-gene island domain Y"
definition: >-
  This is a poorly-understood domain observed N-terminal to restriction endonuclease (REase) domain, which is part of a conserved three-gene island also containing a DinG-type helicase and the pPIWI_RE module. This three gene island is predicted to form a conflict system which targets R-loop formation of invasive plasmids during plasmid replication.
