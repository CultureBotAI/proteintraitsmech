identifier: InterPro:IPR054134
label: "Protein PAXX, N-terminal domain"
definition: >-
  Protein PAXX (also known as Paralog of XRCC4 and XLF) is a paralog of X-ray repair cross-complementing protein 4 (XRCC4) and XRCC4-like factor (XLF) that is involved in non-homologous end joining (NHEJ), a major pathway to repair double-strand breaks (DSBs) in DNA. It may act as a scaffold required to stabilise the DSB-repair protein Ku heterodimer, composed of XRCC5/Ku80 and XRCC6/Ku70, at double-strand break sites in cells. It functions with XRCC4 and XLF to bring about DSB repair and cell survival in response to DSB-inducing agents. Similar to XRCC4 and XLF, PAXX monomers are comprised of an N-terminal globular head domain, a centrally located coiled-coil, and a C-terminal region. These monomers homodimerize through two homodimerization domains, the N-terminal globular head domain and long extended α-helical coiled-coil regions. This entry represents the N-terminal head domain of PAXX, which is structurally related to other XRCC4-superfamily members.
