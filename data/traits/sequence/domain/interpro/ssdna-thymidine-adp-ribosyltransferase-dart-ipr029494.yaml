identifier: InterPro:IPR029494
label: "ssDNA thymidine ADP-ribosyltransferase, DarT"
definition: >-
  Proteins containing this domain can be found in bacteria, archaea and eukaryotes. Proteins containing this domain are distantly similar to ( ). Studies in search for novel ADP-ribosylation systems in bacterial genomes have identified an operon that encodes a conserved protein containing a distinct type of macrodomain associated with this domain. This led to the identification of a toxin-antitoxin (TA) system, with DarT acting as the toxin. It is an enzyme that specifically modifies thymidines on single-stranded DNA in a sequence-specific manner by a nucleotide-type modification called ADP-ribosylation. This modification in turn can be removed by DarG, the antitoxin macrodomain protein. In addition, it was illustrated that substitution of the single completely conserved glutamate residue resulted in attenuation of function where DarT was non-toxic.
