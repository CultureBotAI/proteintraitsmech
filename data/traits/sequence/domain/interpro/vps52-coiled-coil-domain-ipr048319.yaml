identifier: InterPro:IPR048319
label: "Vps52, coiled-coil domain"
definition: >-
  Vps52 complexes with Vps53 and Vps54 to form a multi-subunit complex, the Golgi-associated retrograde protein (GARP) complex that is involved in retrograde transport from early and late endosomes to the trans-Golgi network, regulating membrane trafficking events. It is also part of the EARP (Endosome-Associated Recycling Protein) complex, involved in endocytic recycling. GARP complex is part of the family of evolutionarily related complexes associated with tethering containing helical rods (CATCHR), which includes the conserved oligomeric Golgi (COG), Dsl1 and exocyst complexes. They share structural features consisting of an α-helical bundle at the C terminus and usually a coiled-coil (CC) region at the N terminus. This entry represents the CC region found at the N terminus of Vps52.
