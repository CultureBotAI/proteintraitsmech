identifier: InterPro:IPR063540
label: "HAUS augmin-like complex subunit 8, coiled coil domain"
definition: >-
  This coiled coil domain is found in human HAUS augmin-like complex subunit 8 (HAUS8) and related sequences. HAUS8 contributes to mitotic spindle assembly, maintenance of centrosome integrity and completion of cytokinesis as part of the HAUS augmin-like complex.
