identifier: InterPro:IPR059397
label: "Domain of unknown function DUF8353"
definition: >-
  This domain is found in uncharacterised proteins mainly from Ascomycota. It is predicted to adopt a globular structure composed of array of α-helices. It contains a semi-conserved CxxYPNH sequence motif which may have a functional importance.
