identifier: InterPro:IPR057248
label: "Alsin-like, PH-like domain"
definition: >-
  This entry represents the Pleckstrin Homology (PH) domain found in Alsin (ALS2) proteins and ALS2-like proteins. The PH domain is likely involved in membrane targeting through phospholipid binding. Alsin functions as a guanine nucleotide exchange factor (GEF) for Rho family GTPases, particularly Rac1, in addition to its role as a Rab5 GEF. It contains a DH domain and a PH domain. This dual GEF activity links endocytic processes (via Rab5) and actin cytoskeleton remodelling (via Rac1), critical for neuronal membrane transport and motor neurone maintenance. Alsin's dysfunction is implicated in amyotrophic lateral sclerosis (ALS), where impaired GEF activity disrupts intracellular trafficking and cytoskeletal dynamics, contributing to neurodegeneration.
