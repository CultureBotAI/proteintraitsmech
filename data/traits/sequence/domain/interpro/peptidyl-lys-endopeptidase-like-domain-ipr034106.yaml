identifier: InterPro:IPR034106
label: "Peptidyl-Lys endopeptidase-like domain"
definition: >-
  This entry includes a presumed extracellular domain of uncharacterised homologues of peptidase family M35. Some members in this entry are non-peptidase homologues because one or more of the zinc ligands and/or the catalytic glutamic acid in the HExxH motif have been replaced. Peptidase family M35 contains metalloendopeptidases known as Asp-zincins, in which a single catalytic zinc ion is ligated by two histidines in an HExxH motif and an aspartic acid in a GTXDXXYG or similar motif C-terminal to the HExxH motif. The glutamic acid in the HExxH motif is a catalytic residue.
