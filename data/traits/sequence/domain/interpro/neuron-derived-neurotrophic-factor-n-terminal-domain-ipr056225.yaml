identifier: InterPro:IPR056225
label: "Neuron-derived neurotrophic factor, N-terminal domain"
definition: >-
  This domain is found N-terminal in human Neuron-derived neurotrophic factor (NDNF) and similar animal proteins. NDNF is a secretory protein that plays a role in various cellular processes. It acts as a chemorepellent on gonadotropin-releasing hormone expressing neurons regulating their migration to the hypothalamus. It also promotes neuron migration, growth and survival as well as neurite outgrowth and is involved in the development of the olfactory system. The domain represented by this entry is predicted to fold into a β-sandwich that has some similarity to Nucleoplasmin-like fold.
