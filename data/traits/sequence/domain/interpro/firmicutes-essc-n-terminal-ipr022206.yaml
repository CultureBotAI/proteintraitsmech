identifier: InterPro:IPR022206
label: "Firmicutes EssC, N-terminal"
definition: >-
  This entry represent the N-terminal domain of the proteins EssC from Firmicutes. EssC contains the FtsK domains and is typically between 107 and 121 amino acids in length. It is required for secretion of EsxA and EsxB. It is related to the FtsK/SpoIIIE proteins, which are DNA transporters responsible for translocating missegregated chromosomes after the completion of cell division.
