identifier: InterPro:IPR054324
label: "McpB, first HAMP domain"
definition: >-
  This entry represents the first of five HAMP domains of Methyl-accepting chemotaxis protein McpB from Pseudomonas aeruginosa and similar sequences mainly from gammaproteobacteria. McpB, also known as Aerotaxis transducer Aer2, is a chemoreceptor that plays a critical role in the virulence and pathogenesis of the bacteria in a variety of hosts. This domain consists of a monomeric unit of two parallel α-helices joined by an elongated connector of 12-14 residues. The three N-terminal are likely to be required for dimerisation.
