identifier: InterPro:IPR017732
label: "Type IV / VI secretion system, DotU"
definition: >-
  At least two distinct groups of proteins, often encoded by adjacent genes, show sequence similarity due to homology between type IV secretion systems and type VI secretion systems. One is the IcmF family ( ). The other group is the DotU family, which includes DotU from the Legionella pneumophila type IV secretion system. Many members of this protein family from type VI secretion systems have an additional C-terminal domain with OmpA/MotB homology .
