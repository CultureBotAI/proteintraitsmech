identifier: InterPro:IPR060175
label: "Uncharacterised protein FLJ43738-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of uncharacterised protein FLJ43738. This domain is found in proteins of approximately 570 amino acids present across eukaryotic species. The N-terminal region contains a disordered region enriched in basic residues. The protein is expressed in human testis and has been identified by proteomics analyses. Orthologues are found across eukaryotes, suggesting evolutionary conservation. The function of this domain remains to be determined.
