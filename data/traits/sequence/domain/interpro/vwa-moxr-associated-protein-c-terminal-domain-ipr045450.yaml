identifier: InterPro:IPR045450
label: "vWA-MoxR associated protein, C-terminal domain"
definition: >-
  This domain represents the C-terminal region of the VMAP protein of the classical ternary system (vWA-MoxR-VMAP) in NTP-dependent conflict systems, which is the most conserved part. It is predicted to adopt a mixed α+β domain with no apparent structural similarity to known protein folds. It contains several, nearly universally polar residues, suggesting a conserved interaction interface. Even though VMAP-C is possible to have enzymatic function, but it appears unlikely. Sensing of invasive elements by VMAP-Ms are predicted to trigger a sequence of conformational changes, which is communicated to the switch-component (MoxR) of the system via the more constant VMAP-C.
