identifier: InterPro:IPR059986
label: "DjlB/C, second domain"
definition: >-
  This entry represents the second domain found in DjlB and DjlC, J domain-containing proteins from Escherichia coli. DjlC is a regulatory HscC co-chaperone. These proteins contain an N-terminal J domain characteristic of DnaJ co-chaperones. This second domain shows some resemblance to α-solenoid repeats such as tetratricopeptide repeats (TPRs), suggesting it may be involved in protein-protein interactions. The specific function of this domain remains unknown.
