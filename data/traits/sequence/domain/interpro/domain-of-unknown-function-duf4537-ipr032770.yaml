identifier: InterPro:IPR032770
label: "Domain of unknown function DUF4537"
definition: >-
  The function of this domain is unknown. It is found in eukaryotes, and is typically between 119 and 141 amino acids in length. In humans, it is found in the uncharacterised protein C11orf16 and at the C-terminal of von Willebrand factor A domain-containing protein 3B (VWA3B). Mutations in VWA3B have been identified to cause cerebellar ataxia.
