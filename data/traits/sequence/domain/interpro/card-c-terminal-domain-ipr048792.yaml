identifier: InterPro:IPR048792
label: "CarD, C-terminal domain"
definition: >-
  This entry represents the C-terminal helical domain of CarD from Mycobacterium tuberculosis and similar sequences. CarD is a RNAP-binding protein that regulates transcription and essential processes. This domain binds DNA in a non-specific manner.
