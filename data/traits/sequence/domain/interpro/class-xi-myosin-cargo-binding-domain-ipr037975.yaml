identifier: InterPro:IPR037975
label: Class XI myosin, cargo binding domain
definition: >-
  Class XI myosins are a plant specific group, homologous to class V myosins. They have roles in cell expansion, organelle motility and F-actin organization. The C-terminal domain of Arabidopsis myosin XI has been shown to be homologous to the cargo-binding domain (CBD) of yeast myosin V myo2p, which targets myosin to vacuole- and mitochondria, as well as secretory vesicle.
