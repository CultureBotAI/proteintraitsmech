identifier: InterPro:IPR056421
label: "Gem-associated protein 5, TPR domain"
definition: >-
  This entry represents the TPR domain found towards the C-terminal of Gem-associated protein 5 (GEMI5) from animals and related eukaryotic sequences. The TPR domain in GEMI5 mediates the dimerisation of the protein. This is possible thanks to the helical repeats stretched in an α-solenoid rod that provides an extensive flat surface for self-dimerisation. Mutations in this domain have been shown to cause a neurodevelopmental disorder characterised by cerebellar atrophy, intellectual disability (ID), and motor dysfunction. Also included in this entry is protein rigor mortis (RIG), the orthologue from Drosophila melanogaster. RIG, apart from being a component of the survival motor neuron (SMN) complex, it is a nuclear receptor-interacting protein required for the response to steroid hormone ecdysone during larval development. GEMI5 is a component of the survival of motor neurons (SMN) complex, that binds small nuclear RNAs (snRNAs). The SMN complex assembles the heptameric Sm protein core on snRNAs playing a critical role in the biogenesis of small nuclear ribonucleoproteins (snRNPs). GEMI5 is also implicated in translation control, and gene expression reprogramming. GEMI5 from animals share a domain architecture consisting of two N-terminal β-propellers followed by a TPR domain and a C-terminal RNA-binding domain.
