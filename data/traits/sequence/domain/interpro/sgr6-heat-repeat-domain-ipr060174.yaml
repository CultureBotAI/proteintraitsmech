identifier: InterPro:IPR060174
label: "SGR6, HEAT repeat domain"
definition: >-
  This is a region of HEAT repeats found in Protein SHOOT GRAVITROPISM 6 from Arabidopsis thaliana (SGR6) and similar proteins. SGR6 is involved in inflorescence stems gravitropism, by modulating vacuolar membrane dynamics in gravity-sensing cells during the amyloplast sedimentation process.
