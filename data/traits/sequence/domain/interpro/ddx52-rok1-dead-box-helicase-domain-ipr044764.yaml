identifier: InterPro:IPR044764
label: DDX52/Rok1, DEAD-box helicase domain
definition: >-
  This entry represents the DEAD-box helicase domain found in DDX52 from animals and Rok1 from yeasts. This domain contains the ATP-binding region. Rok1 is an RNA helicase involved in pre-rRNA processing and in control of cell cycle progression. In humans, DDX52 is ubiquitously expressed in testis, endometrium, and other tissues. DDX52 from Drosophila has been identified as part of a translational control module, also containing pths/DDX47 and ath/DHX33, which coordinates germline stem cell differentiation with ribosome biogenesis during oogenesis. This module allows for coregulation of ribosomal proteins and non1/GTPBP4, a p53 repressor, preventing p53 stabilization, cell cycle arrest and loss of stem cell differentiation.
