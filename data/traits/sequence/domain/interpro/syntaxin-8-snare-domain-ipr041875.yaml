identifier: InterPro:IPR041875
label: "Syntaxin-8, SNARE domain"
definition: >-
  Syntaxin 8 forms a complex with syntaxin 7 (Qa), Vti1b (Qb) and either VAMP7 or VAMP8 (R-SNARE) and is involved in the transport from early endosomes to the lysosome. Syntaxin 8 is a member of the Qc subgroup of SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptor) proteins, which consist of coiled-coil helices (called SNARE motifs) that mediate the interactions between SNARE proteins, and a transmembrane domain.
