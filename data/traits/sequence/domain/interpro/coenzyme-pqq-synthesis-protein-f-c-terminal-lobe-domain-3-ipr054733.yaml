identifier: InterPro:IPR054733
label: "Coenzyme PQQ synthesis protein F, C-terminal lobe, domain 3"
definition: >-
  This entry represents domain 3 from the C-terminal lobe of Coenzyme PQQ synthesis protein F (PqqF), a protein required for coenzyme pyrroloquinoline quinone (PQQ) biosynthesis. It consists of four structurally similar domains organised in N-terminal (domain 1 represented by and domain 2) and C-terminal (domain 3 represented by this entry and domain 4 by ) lobes. Members of this group are mainly found in Pseudomonadales.
