identifier: InterPro:IPR044066
label: "TRIAD supradomain"
definition: >-
  This entry represents the TRIAD supradomain found in a number of proteins with different functions, such as Ariadne (ARI) proteins, implicated in the regulation of translation, cellular proliferation, and developmental processes; TRIAD proteins, associated with the regulation of myeloid progenitors proliferation, NF-kappaB signalling, and membrane trafficking or Parkin, implicated in a range of biological processes, including autophagy of damaged mitochondria (mitophagy), cell survival pathways, and vesicle trafficking. This supradomain is also present in heme-oxidised IRP2 ubiquitin ligase 1L (HOIL-1L) and HOIL-1L interacting protein (HOIP) which form the two linear ubiquitin chain assembly complex (LUBAC), associated with B-cell function, regulation of apoptosis, oncogenesis, and diverse autoimmune diseases. The TRIAD (Two RING fingers and a DRIL, double RING finger linked) or RBR (RING-BetweenRING-RING) family of zinc finger proteins contains a tripartite motif of three double zinc fingers, the first of which, RING1, is a typical RING finger with a C3HC4 signature of conserved cysteine and histidine residues. The second (In-Between-Ring, IBR, BetweenRING or DRIL) and third (RING2) are dissimilar to RINGs but share notable similarity, as they have similar spacing of cysteines and some conserved residues. The cysteine and histidine rich TRIAD domain architecture is highly conserved and found mostly in eukaryotes. TRIAD E3 ligases (E3s) are complicated multi-domain enzymes that contain a variety of domains in addition to their TRIAD supradomain. The three fingers that define the TRIAD supradomain always appear in the same order RING1-IBR-RING2, but the position of the supradomain itself relative to other domains varies. All characterised proteins containing the TRIAD s…
