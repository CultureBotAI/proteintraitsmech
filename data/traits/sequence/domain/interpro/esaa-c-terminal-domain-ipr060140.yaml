identifier: InterPro:IPR060140
label: "EsaA, C-terminal domain"
definition: >-
  EsaA is a component of the type VII secretion system (Ess) found in Staphylococcus aureus and other bacterial species that is involved in bacterial secretion and virulence. EsaA is a multi-pass membrane protein with six transmembrane helices that provides a secretion platform across the cytoplasmic membrane. EsaA forms homodimers and interacts with EssB protein. This entry represents the multi-pass membrane domain found at the C-terminal domain of the EsaA.
