identifier: InterPro:IPR063658
label: "Thionin-like protein 1/2, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of thionin-like proteins 1/2 found in land plants, particularly in the Brassicaceae family. This domain contains the signal peptide that directs the protein for secretion to the extracellular region. Thionin-like proteins belong to the plant thionin family and may be involved in plant defence responses. The specific function of this N-terminal domain remains to be determined.
