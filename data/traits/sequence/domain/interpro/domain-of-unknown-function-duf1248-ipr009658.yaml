label: "Domain of unknown function DUF1248"
definition: >-
  This entry represents a conserved region within a number of proteins of unknown function that seem to be specific to Caenorhabditis elegans. Note that some proteins in the entry contain more than one copy of this region. Structurally related to Gcn5-related N-acetyltransferase (GNAT) family.
