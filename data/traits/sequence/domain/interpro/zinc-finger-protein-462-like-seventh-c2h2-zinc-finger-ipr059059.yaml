identifier: InterPro:IPR059059
label: "Zinc finger protein 462-like, seventh C2H2 zinc finger"
definition: >-
  This domain is found in the human Zinc finger protein 462 and related proteins. This protein is involved in transcription by regulating chromatin structure and organisation. ZNF462 is a multidomain protein that contains a number of classical C2H2 zinc fingers. This entry represents one of them. This domain is also found in Zinc finger protein ush from D. melanogaster which modulates expression mediated by transcription factors of the GATA family such as pnr and srp. Zinc finger (Znf) domains are relatively small protein motifs which contain multiple finger-like protrusions that make tandem contacts with their target molecule. Some of these domains bind zinc, but many do not; instead, they bind other metals, such as iron, or no metal at all. For example, some family members form salt bridges to stabilise the finger-like folds. They were first identified as a DNA-binding motif in transcription factor TFIIIA from Xenopus laevis (African clawed frog); however, they are now recognised to bind DNA, RNA, protein and/or lipid substrates. Their binding properties depend on the amino acid sequence of the finger domains and of the linker between fingers, as well as on the higher-order structures and the number of fingers. Znf domains are often found in clusters, where fingers can have different binding specificities. There are many superfamilies of Znf motifs, varying in both sequence and structure. They display considerable versatility in binding modes, even between members of the same class (e.g., some bind DNA, others protein), suggesting that Znf motifs are stable scaffolds that have evolved specialised functions. For example, Znf-containing proteins function in gene transcription, translation, mRNA trafficking, cytoskeleton organisation, epithelial development, cell adhesion…
