identifier: InterPro:IPR058056
label: "TANC1/2-like, winged helix domain"
definition: >-
  This presumed winged helix-turn-helix domain is found in Protein TANC1, TANC2 and similar proteins mainly found in animals. This domain is often found associated to a long region of ankyrin repeats ( ). TANC proteins function as scaffolding components in the postsynaptic density and dendritic spines. These proteins are involved in the organisation and stabilisation of synaptic structures. TANC1 proteins are likely involved in the postsynaptic density, interacting with various synaptic proteins such as DLG1, DLG4, and HOMER1, and may play a role in synaptic signalling and plasticity. TANC2 proteins act as immobile postsynaptic posts in dendritic spines, recruiting KIF1A-driven dense core vesicles, which are crucial for synaptic function and vesicle trafficking. The interaction of TANC2 with KIF1A is modulated by calcium levels, indicating a role in calcium-dependent synaptic processes.
