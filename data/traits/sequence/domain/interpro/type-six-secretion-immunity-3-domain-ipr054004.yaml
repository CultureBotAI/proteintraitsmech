identifier: InterPro:IPR054004
label: "Type six secretion immunity 3 domain"
definition: >-
  This entry represents the Tsi3 domain. Tsi3 immunity protein prevents early activation of toxin Tse3. Three loops of Tsi3 deeply insert into the groove of Tse3, fully blocking its active site. This interaction serves as the structural basis for Tse3 inactivation.
