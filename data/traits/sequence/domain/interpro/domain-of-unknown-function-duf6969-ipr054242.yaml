identifier: InterPro:IPR054242
label: "Domain of unknown function DUF6969"
definition: >-
  This domain is found in uncharacterised proteins mainly from Proteobacteria. It is predicted to adopt an α/β globular structure. It has three highly conserved histidines that are predicted to cluster together in space and are likely involved in metal coordination.
