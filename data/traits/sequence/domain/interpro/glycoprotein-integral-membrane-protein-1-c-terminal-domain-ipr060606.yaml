identifier: InterPro:IPR060606
label: "Glycoprotein integral membrane protein 1, C-terminal domain"
definition: >-
  This entry represents the C-terminal cytoplasmic domain of the uncharacterised glycoprotein integral membrane protein 1 (GINM1) and similar sequences from vertebrates. GINM1 protein interacts with FATE1. This domain is located on the cytoplasmic side of the membrane and includes the single transmembrane helix. It shows conservation across species and may be involved in intracellular signalling or protein interactions.
