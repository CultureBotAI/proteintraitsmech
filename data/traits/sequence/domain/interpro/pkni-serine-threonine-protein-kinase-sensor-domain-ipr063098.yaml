identifier: InterPro:IPR063098
label: "PknI serine/threonine-protein kinase, sensor domain"
definition: >-
  This entry represents the C-terminal extracellular sensor domain of the serine/threonine-protein kinase PknI from Mycobacterium tuberculosis and related species. The domain adopts a twisted β-barrel fold composed of ten β-strands and five large loops. PknI is the first bacterial STPK identified whose sensor domain exists in a monomer-dimer equilibrium. Dimerisation occurs via domain swapping of an N-terminal arm region, with a proline-rich hinge loop controlling the conformational switch between states. Sensor domain dimerisation activates kinase autophosphorylation activity of the cytoplasmic kinase domain ( ), which is connected via a single-pass transmembrane helix. PknI plays a role in slowing mycobacterial growth within host macrophages, particularly under acidic conditions.
