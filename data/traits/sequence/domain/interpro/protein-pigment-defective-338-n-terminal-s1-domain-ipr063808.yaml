identifier: InterPro:IPR063808
label: "Protein PIGMENT DEFECTIVE 338, N-terminal S1 domain"
definition: >-
  This entry represents an N-terminal S1 domain region found in Protein PIGMENT DEFECTIVE 338 from Arabidopsis thaliana and related proteins from plants. This domain is found N-terminal to other S1 motifs ( ). These chloroplastic RNA-binding proteins act as RNA chaperones that modulate translation and stability of plastid-encoded mRNAs including rbcL, petA, petB, petD and Ycf1, regulating biogenesis of photosynthetic complexes.
