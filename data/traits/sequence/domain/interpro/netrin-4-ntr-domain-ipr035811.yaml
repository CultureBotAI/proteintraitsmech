identifier: InterPro:IPR035811
label: "Netrin-4, NTR domain"
definition: >-
  This is the C-terminal netrin (NTR) domain of netrin-4 (beta-netrin). Netrins are secreted proteins that function as tropic cues in the direction of axon growth and cell migration during neural development. Netrin-4 is a basement membrane component that is important in neural, kidney and vascular development. It may also be involved in regulating the outgrowth and shape of epithelial cells during lung branching morphogenesis.
