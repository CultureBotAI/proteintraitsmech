identifier: InterPro:IPR032268
label: "Capsid polyprotein VP90, C-terminal"
definition: >-
  This entry represents a domain found at the C terminus of the capsid polyprotein VP90 from Turkey astrovirus. This is a globular domain found on the surface of the viral capsid that forms the capsid projections or spikes. Astroviruses cause diarrhoea in a variety of mammals and birds, and are small, non-enveloped, single-stranded RNA viruses. The spike carries three conserved patches on its surface which could be candidates for avian receptor-binding sites.
