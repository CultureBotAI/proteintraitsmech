identifier: InterPro:IPR058704
label: "Osteocalcin-like, C-terminal domain"
definition: >-
  This domain is the GLA domain found at the C-terminal end of bovine Osteocalcin (BGLAP) and similar short sequences mainly found in animals such as Matrix Gla protein. The carboxylated form of BGLAP is one of the main organic components of the bone matrix. The uncarboxylated form acts as a hormone secreted by osteoblasts, which regulates different cellular processes, such as energy metabolism, male fertility and brain development. This domain is predicted to show an all α-configuration. The GLA (gamma-carboxyglutamic acid-rich) domain contains glutamate residues that have been post-translationally modified by vitamin K-dependent carboxylation to form gamma-carboxyglutamate (Gla). All glutamic acid (Glu) residues present in the GLA domain are potential carboxylation sites; in coagulation proteins, all Gu residues are modified to Gla, while in osteocalcin and matrix Gla proteins only some Glu residues are modified to Gla.
