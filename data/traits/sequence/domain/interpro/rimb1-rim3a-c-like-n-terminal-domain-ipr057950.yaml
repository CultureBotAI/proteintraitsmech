identifier: InterPro:IPR057950
label: "RIMB1/RIM3A-C-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of human Peripheral-type benzodiazepine receptor-associated protein 1 (RIMB1), RIMS-binding protein 3A-C (RIM3A-C) and similar proteins mainly found in animals. RIMB1 is required for synaptic transmission regulation and probably controls the recruitment of voltage-gated calcium channels to the presynaptic membrane, and modulates neurotransmitter release. RIM3A-C are thought to be components of the manchette, a microtubule-based structure which plays a key role in sperm head morphogenesis during late stages of sperm development. This domain is predicted to adopt an α-helical configuration and is usually found associated to and . RIMs binding proteins (RBPs, RIM-BPs) associate with calcium channels present in photoreceptors, neurons, and hair cells; they interact simultaneously with specific calcium channel subunits, and active zone proteins, RIM1 and RIM2. RIMs are part of the matrix at the presynaptic active zone and are associated with synaptic vesicles through their interaction with the small GTPase Rab3. RIM-BPs play a role in regulating synaptic transmission by serving as adaptors and linking calcium channels with the synaptic vesicle release machinery. RIM-BPs contain three SH3 domains ( ) and two to three fibronectin III repeats ( ). Invertebrates contain one, while vertebrates contain at least two RIM-BPs, RIM-BP1 and RIM-BP2. RIM-BP1 is also called peripheral-type benzodiazapine receptor associated protein 1 (PRAX-1). Mammals contain a third protein, RIM-BP3. RIM-BP1 and RIM-BP2 are predominantly expressed in the brain where they display overlapping but distinct expression patterns, while RIM-BP3 is almost exclusively expressed in the testis and is essential in spermiogenesis. The SH3 domains of RIM-BPs bind to the Pxx…
