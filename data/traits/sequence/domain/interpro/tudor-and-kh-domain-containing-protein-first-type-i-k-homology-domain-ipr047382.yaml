identifier: InterPro:IPR047382
label: "Tudor and KH domain-containing protein, first type I K homology domain"
definition: >-
  KH domains are involved in binding to RNA or single-strand DNA. This entry represents the first KH RNA-binding domain of TDRD2 and similar proteins from chordates. TDRD2, also called Tudor and KH domain-containing protein (TDRKH), is a mitochondria-anchored RNA-binding protein that is required for spermatogenesis and participates in the primary piwi-interacting RNA (piRNA) biogenesis pathway. It specifically recruits MIWI, but not MILI, to engage the piRNA pathway. It is required during spermatogenesis to repress transposable elements and prevent their mobilization, which is essential for germline integrity. These proteins contain two KH domains and one Tudor domain.
