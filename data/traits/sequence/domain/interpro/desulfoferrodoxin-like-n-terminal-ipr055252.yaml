identifier: InterPro:IPR055252
label: "Desulfoferrodoxin-like, N-terminal"
definition: >-
  This short domain is found at the N-terminal of class III superoxide reductase from Treponema pallidum (SOR, ), a small protein that catalyses the one-electron reduction of superoxide to hydrogen peroxide, having rubredoxin as their putative electron donor. It is organised into two distinct domains: an N-terminal domain that shows four β-strands and a C-terminal one that harbours the catalytic site and displays an immunoglobulin-like fold.
