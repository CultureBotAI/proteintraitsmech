identifier: InterPro:IPR054008
label: "Csm6 6H domain"
definition: >-
  This entry represents the six-helix domain (6H) of CRISPR system endoribonuclease Csm6 from Thermus termophilus and related sequences. Csm6 is a ssRNA-specific endoribonuclease that provides an auxiliary RNA-targeting interference mechanism in type III-A CRISPR-Cas systems, working together with the RNA- and DNA-targeting endonuclease activities of the Csm effector complex. Csm6 consists of a CARF domain at the N-terminal, a 6H central domain and the HEPN domain ( ) at the C-terminal.
