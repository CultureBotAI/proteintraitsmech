identifier: InterPro:IPR046468
label: "Spt20-like, SEP domain"
definition: >-
  This entry represents the SEP domain found in Spt20 from yeast and human. This domain interacts with LisH motif helices of Taf5. This entry represents the Spt20 transcription factors in eukaryote organisms. The Spt20 protein is a subunit of the SAGA (Spt-Ada-Gcn5-acetyltransferase) complex, a large multiprotein complex involved in transcriptional regulation. In yeast, Spt20 plays a crucial role in maintaining the structural integrity of the SAGA complex, as no intact SAGA complex could be purified in Spt20 deletion strains. It is involved in chromatin organisation, histone acetylation, and IRE1-mediated unfolded protein response. The human homologue of Spt20 (hSPT20) has been identified as a bona fide subunit of the human SAGA complex and is required for its integrity. Functionally, Spt20 has been shown to participate in the regulation of specific genes. In yeast, it is required for the transcriptional elongation of PDR5 and the activation of seripauperin genes upon hypoxic stress exposure. In human cells, hSPT20 and other hSAGA subunits are specifically recruited to genes induced by endoplasmic reticulum (ER) stress.
