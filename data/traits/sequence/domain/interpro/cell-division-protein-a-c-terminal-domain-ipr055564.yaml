identifier: InterPro:IPR055564
label: "Cell division protein A, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of CdpA (Cell division protein A, HVO_0739, ) from Haloferax volcanii and similar archaeal proteins. CdpA is a ring assembly and anchor protein. It forms part of an anchor complex linked to FtsZ2 and other cell division proteins. This protein consists of of three main regions: a conserved N-terminal transmembrane domain, a less conserved cytoplasmic disordered linker region, and a small cytoplasmic C-terminal domain (this entry). This domain plays a significant role in cell division but its specific function is currently unknown. AlphaFold prediction for this region, which is likely to be a zinc-binding domain, shows a structure forming 2-3 β-strands.
