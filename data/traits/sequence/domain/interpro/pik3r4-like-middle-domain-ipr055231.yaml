identifier: InterPro:IPR055231
label: "PIK3R4-like, middle domain"
definition: >-
  This entry represents a TPR-like domain found in diverse eukaryotic kinases and phosphatases. The domain is present in phosphoinositide 3-kinase regulatory subunit 4 (PIK3R4), serine/threonine-protein kinase VPS15, protein phosphatase 2A regulatory subunits, and protein phosphatase 4 regulatory subunit 1. The domain shows strong conservation across mammals, plants, fungi and other eukaryotes. VPS15 is involved in autophagy and vacuolar protein sorting pathways. Protein phosphatase 2A regulatory subunits are essential components of the PP2A holoenzyme complex. The specific function of this TPR-like domain remains to be determined.
