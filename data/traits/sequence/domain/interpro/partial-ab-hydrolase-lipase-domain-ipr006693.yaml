identifier: InterPro:IPR006693
label: Partial AB-hydrolase lipase domain
definition: >-
  The alpha/beta hydrolase fold is common to several hydrolytic enzymes of widely differing phylogenetic origin and catalytic function. The core of each enzyme is similar: an α/β sheet, not barrel, of eight β-sheets connected by α-helices. This entry represents the N-terminal part of an alpha/beta hydrolase domain found in a number of lipases.
