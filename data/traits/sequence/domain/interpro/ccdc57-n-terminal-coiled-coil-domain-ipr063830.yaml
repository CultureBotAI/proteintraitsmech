identifier: InterPro:IPR063830
label: "CCDC57, N-terminal coiled-coil domain"
definition: >-
  This entry represents the N-terminal coiled-coil domain found in CCDC57 (Coiled-coil domain-containing protein 57) in vertebrates. CCDC57 is a pleiotropic regulator of centriole duplication, mitosis and ciliogenesis. The N-terminal region of CCDC57 contains the centrosomal targeting domain required for recruitment of CEP63, CEP152 and PLK4 to the centrosome. The protein localises to the proximal end of centrioles and to spindle microtubules during metaphase. While the specific function of this N-terminal domain has been mapped to centrosomal targeting, the C-terminal region of CCDC57 mediates microtubule binding.
