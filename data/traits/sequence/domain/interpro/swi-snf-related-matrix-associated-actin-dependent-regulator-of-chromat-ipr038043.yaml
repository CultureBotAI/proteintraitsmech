identifier: InterPro:IPR038043
label: "SWI/SNF-related matrix-associated actin-dependent regulator of chromatin subfamily D 3, SWIB domain"
definition: >-
  SWI/SNF-related matrix-associated actin-dependent regulator of chromatin subfamily D member 3 (SMARCD3 or BAF60C) is a component of several complexes that remodel chromatin, a mechanism by which selected genes are transcriptionally activated or repressed. The complexes are SWI/SNF, which changes chromatin structure by altering DNA-histone contacts within a nucleosome in an ATP-dependent manner; BAF; and the npBAF and nBAF, which are neuron-specific. SMARCD3 is known to interact with a number of proteins, including SMARCA4/BRG1/BAF190A and the homeobox protein PBX1. This entry represents the SWIB domain of SMARCD3.
