identifier: InterPro:IPR042156
label: "UNC5B, death domain"
definition: >-
  This entry represents the death domain (DD) found in Uncoordinated-5B (UNC5B), which is a receptor for the secreted netrin-1 and plays a role in axonal guidance, angiogenesis, and apoptosis. UNC5B signaling is involved in the netrin-1-induced proliferation and migration of renal proximal tubular cells. It is also required for vascular patterning during embryonic development, and its activation inhibits sprouting angiogenesis. It belongs to the UNC-5 family. UNC5 proteins are transmembrane proteins with an extracellular domain consisting of two immunoglobulin repeats, two thrombospondin type-I modules and an intracellular region containing a ZU-5 domain, UPA domain and a DD. DDs (Death domains) are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes.
