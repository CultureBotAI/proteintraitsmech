identifier: InterPro:IPR034454
label: "MEI2-like, RNA recognition motif 3"
definition: >-
  This entry represents the RNA recognition motif 3 (RRM3) of Mei2-like proteins. Mei2-like proteins represent an ancient eukaryotic RNA-binding proteins family. Their corresponding Mei2-like genes appear to have arisen early in eukaryote evolution, been lost from some lineages such as Saccharomyces cerevisiae and metazoans, and diversified in the plant lineage. The plant Mei2-like genes may function in cell fate specification during development, rather than as stimulators of meiosis. Members of the Mei2-like family contain three RNA recognition motifs (RRMs). The C-terminal RRM (RRM3) is unique to Mei2-like proteins and it is highly conserved between plants and fungi.
