identifier: InterPro:IPR048802
label: "Structural protein 2, second domain"
definition: >-
  This entry represents the second domain, also known as domain M, of structural protein 2 (PORF2) of the hepatitis E virus. This domain folds into a β-barrel structure that has structural similarity to domains of RIFT-like fold. The high basic amino acid content of this protein has lead to the suggestion of a role in viral genomic RNA encapsidation. This domain is found in related proteins from Hepeviridae and Astroviridae.
