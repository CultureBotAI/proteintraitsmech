identifier: InterPro:IPR056574
label: "MAP kinase-activating death domain protein, death domain"
definition: >-
  This entry represents the death domain found in MAP kinase-activating death domain (MADD) proteins. MADD proteins function as guanyl-nucleotide exchange factors that regulate small GTPases of the Rab family, facilitating the conversion of GDP-bound inactive forms to GTP-bound active forms. Their targets include RAB27A, RAB27B, RAB3A, RAB3C, and RAB3D, which are crucial for synaptic vesicle exocytosis and secretion. MADD proteins are involved in synaptic vesicle formation, vesicle trafficking at neuromuscular junctions, and up-regulating synaptic exocytosis in central synapses. They may interact with motor proteins like KIF1B and KIF1A for vesicle transport to presynaptic terminals. Additionally, they play roles in TNFA-mediated MAPK pathway activation, potentially linking TNFRSF1A with MAP kinase activation, and may regulate TNFA-induced apoptosis. In Caenorhabditis elegans, they are implicated in presynaptic activity regulation, dense-core vesicle trafficking, body muscle contractions, and fatty acid uptake by intestinal cells during the defecation motor program.
