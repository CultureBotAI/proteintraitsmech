identifier: InterPro:IPR028764
label: Kelch repeat and BTB domain-containing protein 8, BTB/POZ domain
definition: >-
  The BTB superfamily includes KLHL (Kelch-like), KBTBD (Kelch repeat and BTB domain-containing), and KLHDC (Kelch domain-containing) subfamilies, which encompass structurally related molecules that differ in the types and numbers of their protein domains. The domain composition can appear to vary depending on the protein domain prediction program. For example, KLHL29, KLHL31, KLHL40, and KLHL41 were previously assigned within the KBTBD family as KBTBD9, KBTBD1, KBTBD5, and KBTBD10 respectively. KBTBD proteins have typically one BTB/POZ domain, occasionally a BACK domain, and two to four Kelch motifs. Kelch repeat and BTB domain-containing protein 8 (KBTBD8) belongs to the BTB-kelch protein family. KBTBD8 localises in the Golgi apparatus and translocates to the spindle apparatus during mitosis. It acts as a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex that acts as a regulator of neural crest specification. The BCR(KBTBD8) complex monoubiquitylates NOLC1 and its paralog TCOF1, the mutation of which underlies the neurocristopathy Treacher Collins syndrome. This entry represents the BTB/POZ domain.
