identifier: InterPro:IPR049102
label: "Gp67, N-terminal domain"
definition: >-
  Gp67 from Staphylococcus virus G1 ( , also known as ORF067) binds to the sigma(A)-subunit of the RNA polymerase (RNAP) of its host to block cell growth by inhibiting transcription. This protein is organized in two domains, an N-terminal β-sheet-rich domain (this entry) and a C-terminal α-helical domain, which are connected by a linker-α-helix on the surface of gp67 opposite the interaction surface.
