identifier: InterPro:IPR020045
label: DNA polymerase I-like, H3TH domain
definition: >-
  This entry represents the H3TH (helix-3-turn-helix) domain of the 5'-3' exonuclease (53EXO) of mutli-domain DNA polymerase I and single domain protein homologues. Taq (Thermus aquaticus) DNA polymerase I contains a polymerase domain for synthesizing a new DNA strand and a 53EXO domain for cleaving RNA primers or damaged DNA strands. Taq's 53EXO recognizes and endonucleolytically cleaves a structure-specific DNA substrate that has a bifurcated downstream duplex and an upstream template-primer duplex that overlaps the downstream duplex by 1 bp.
