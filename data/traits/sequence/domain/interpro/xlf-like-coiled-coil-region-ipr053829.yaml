identifier: InterPro:IPR053829
label: "XLF-like, coiled-coil region"
definition: >-
  This entry represents the coiled-coil region of Xrcc4-like factor 1 from Schizosaccharomyces pombe (XLF) and similar sequences from animals and fungi. XLF (also called Cernunnos) is involved in DNA nonhomologous end joining (NHEJ) required for double-strand break (DSB) repair and V(D)J recombination. XLF and XRCC4 form long helical protein filaments suitable for DNA end protection and alignment to facilitate DNA double strand break repair. It directly interacts with the XRCC4-Ligase IV complex and siRNA-mediated downregulation of XLF in human cell lines leads to radio-sensitivity and impaired DNA non-homologous end-joining. XLF is the human orthologue of fission yeast Xrcc4-like factor 1.
