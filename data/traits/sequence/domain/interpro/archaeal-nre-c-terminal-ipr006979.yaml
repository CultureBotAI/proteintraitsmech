identifier: InterPro:IPR006979
label: "Archaeal Nre, C-terminal"
definition: >-
  This conserved region is found in the C-terminal region of archaeal Nre proteins. While most archaeal organisms encode only a single Nre protein, some encode two, NreA and NreB.
