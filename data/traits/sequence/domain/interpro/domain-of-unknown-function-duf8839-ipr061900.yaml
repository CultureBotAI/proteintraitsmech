identifier: InterPro:IPR061900
label: "Domain of unknown function DUF8839"
definition: >-
  This entry represents a family of small proteins of approximately 50 residues found in Actinomycetes, predominantly in Streptomyces. The function of this family remains to be determined. Members are predicted to fold into a simple structure composed of a small three stranded antiparallel β-sheet and an α-helix connecting the first and the second β-strand.
