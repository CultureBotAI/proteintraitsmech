identifier: InterPro:IPR059886
label: "Glucan 1,3-beta-glucosidase 3, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Glucan 1,3- beta-glucosidase 3 (Exg3) and related proteins from fungi. This domain adopts a helix bundle fold and is found in glycoside hydrolases such as glucan 1,3-beta-glucosidase and uncharacterised glycosyl hydrolases. The proteins containing this domain belong to the glycosyl hydrolase 5 (cellulase A) family and are classified as CAZy GH5 enzymes. The full-length proteins containing this domain are involved in glucan catabolic processes, with some showing glucan endo-1,6-beta-glucosidase activity ({ec:3.2.1.-]) and glucan exo-1,3-beta-glucosidase activity ( ). The specific function of this C-terminal domain remains to be determined.
