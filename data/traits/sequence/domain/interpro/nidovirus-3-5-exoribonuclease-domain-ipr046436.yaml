label: Nidovirus 3'-5' exoribonuclease domain
definition: >-
  The largest RNA virus genomes currently known are found in the order Nidovirales, an order of positive-stranded RNA (RNA) viruses, which includes the family Coronaviridae. One of the postulated drivers of the expansion of nidovirus genomes is the presence of a proofreading 3'-5' exoribonuclease (ExoN) belonging to the DEDDh family, which also includes the proofreading domains of many DNA polymerases as well as other eukaryotic and prokaryotic exonucleases. ExoN may enhance the fidelity of RNA synthesis by correcting nucleotide incorporation errors made by the RNA-dependent RNA polymerase. Among nidoviruses, 3'-5' ExoN activity is found in all large genome nidoviruses (coronaviruses, CoVs), toroviruses. and roniviruses), as well as in mesoniviruses. Short genome nidoviruses (arteriviruses) lack such ExoN activity. Acquisition of such ExoN activity might have allowed nidoviruses to evolve larger genomes. In CoVs, ExoN resides in a bifunctional replicase subunit (NSP14) whose C-terminal has (N7-guanine)-methyltransferase (N7-MTase) activity. NSP14 is a modular protein composed of the two functional domains, bordered on their N terminus by two other structural domains. These four regions are organized as follows: (i) a flexible N terminus forming the major bifunctional part of contacts with the Nsp10 ExoN/MTase coactivator domain, followed by (ii) the ExoN domain, (iii) a flexible hinge region formed by a loop and three strands, and (iv) the C terminus N-MTase domain. The bifunctional ExoN/N7-MTase organisation is conserved in most nidovirus families but the N7-MTase domain is lacking in, e.g., toroviruses, bafiniviruses and several recently discovered nidoviruses. The ExoN domain is an α/β fold constituted of six α-helices and nine strands, organized into three distinct β…
