identifier: InterPro:IPR056906
label: "Replication-associated protein ORF2/G2P domain"
definition: >-
  This entry represents a domain found in a group of Replication-associated proteins including ORF2 from Spiroplasma virus 4 (SpV4) and G2P from phages such as Xanthomonas phage phiLf and Bdellovibrio phage phiMH2K. These proteins play an essential role in viral DNA replication; they bind the origin of replication and cleaves the dsDNA replicative form I (RFI) and becomes covalently bound to it via phosphotyrosine bond, generating the dsDNA replicative form II (RFII). After one round of rolling circle synthesis, protein G2P is linked to the newly synthesized ssDNA and joins the ends of the displaced strand to generate a circular single-stranded molecule ready to be packed into a virion.
