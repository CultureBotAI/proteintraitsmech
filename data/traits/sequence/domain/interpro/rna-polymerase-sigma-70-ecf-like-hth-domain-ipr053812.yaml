identifier: InterPro:IPR053812
label: "RNA polymerase sigma-70 ECF-like, HTH domain"
definition: >-
  This entry represents a HTH domain at the C-terminal found in uncharacterised YagL from Escherichia coli and probable RNA polymerase sigma-70 ECF-like proteins. Sigma factors are able to regulate ECF. Eubacteria display considerable genetic diversity between ECF-sigma factors, but all retain two features: the ability to respond to extra-cytoplasmic functions; and regulation by anti-sigma and anti-anti-sigma factors.
