identifier: InterPro:IPR037612
label: "Tumour protein p73, SAM domain"
definition: >-
  Tumour protein p73 shares protein sequence similarity with the tumour suppressor p53. It is involved in the apoptotic response to DNA damage. Human p73 has two isoforms, TA-isoforms that act as tumour-suppressors and DN-isoforms that behave as proto-oncogenes. p73 also plays a role in neuronal development and neurodegeneration. This entry represents the SAM domain of tumour protein p73. The SAM domain of p73 has been shown to bind membrane lipids, and structural rearrangements in SAM are necessary to accomplish the binding.
