identifier: InterPro:IPR056940
label: "PEX18/20/21, C-terminal domain"
definition: >-
  This domain is found C-terminal in Peroxisomal membrane proteins PEX18, PEX20 and PEX21 from Saccharomyces cerevisiae. PEX18/20/21 are involved in peroxisome biogenesis and import of peroxisomal matrix proteins that contain the peroxisomal targeting sequence PTS2. The crystal structure of the heterotrimeric PTS2-recognition complex from S. cerevisiae revealed the molecular mechanism of PTS2 recognition. It showed that the C-terminal domain of PEX21 directly covers the hydrophobic surfaces of both PEX7 and PTS2, and the resulting hydrophobic core is the primary determinant of the stable complex formation.
