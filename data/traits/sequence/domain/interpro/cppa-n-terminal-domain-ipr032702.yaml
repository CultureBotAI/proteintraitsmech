identifier: InterPro:IPR032702
label: "CppA, N-terminal domain"
definition: >-
  This is the N-terminal domain of the CppA protein found mainly in species of Streptococcus . CppA is a putative C3-glycoprotein degrading proteinase, involved in pathogenicity. This entry also includes other uncharacterised bacterial proteins. This domain is associated with . Some proteins have a Glyoxalase/Bleomycin resistance protein/Dihydroxybiphenyl dioxygenase fold.
