identifier: InterPro:IPR010624
label: KaiC domain
definition: >-
  This entry represents a domain found in bacterial proteins related to Circadian clock oscillator protein KaiC and archaeal uncharacterised sequences belonging to the UPF0273 family. More than one copy is sometimes found in each protein in this group. KaiC is one of the Kai proteins among which direct protein-protein association may be a critical process in the generation of circadian rhythms in cyanobacteria. The circadian clock protein KaiC, is encoded in the kaiABC operon that controls circadian rhythms and may be universal in Cyanobacteria. KaiC performs autophosphorylation and acts as its own transcriptional repressor.
