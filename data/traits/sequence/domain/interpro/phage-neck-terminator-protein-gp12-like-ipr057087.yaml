identifier: InterPro:IPR057087
label: "Phage neck terminator protein gp12-like"
definition: >-
  This entry represents the neck terminator protein gp12 from cyanophage Pam3. Six gp12 subunits form a hexameric ring that terminates neck assembly and links to the tail tube/sheath. Each subunit has an N-terminal loop, a conserved globular domain, and a protruding β-sheet domain.
