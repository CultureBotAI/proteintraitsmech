identifier: InterPro:IPR035939
label: "FGD1, N-terminal PH domain"
definition: >-
  This entry represents the N-terminal PH domain of FGD1. In general, FGDs (including FGD1, FGD2, FGD3 and FGD4/Frabin) have a RhoGEF (DH) domain, followed by an N-terminal PH domain, a FYVE domain and a C-terminal PH domain. All FGDs are guanine nucleotide exchange factors that activates the Rho GTPase Cdc42, an important regulator of membrane trafficking. The RhoGEF domain is responsible for GEF catalytic activity, while the N-terminal PH domain is involved in intracellular targeting of the DH domain. Mutations in the FGD1 gene are responsible for the X-linked disorder known as faciogenital dysplasia (FGDY). Both FGD1 and FGD3 are targeted by the ubiquitin ligase SCF(FWD1/beta-TrCP) upon phosphorylation of two serine residues in its DSGIDS motif and subsequently degraded by the proteasome. However, FGD1 and FGD3 induced significantly different morphological changes in HeLa Tet-Off cells and while FGD1 induced long finger-like protrusions, FGD3 induced broad sheet-like protrusions when the level of GTP-bound Cdc42 was significantly increased by the inducible expression of FGD3. They also reciprocally regulated cell motility in inducibly expressed in HeLa Tet-Off cells, FGD1 stimulated cell migration while FGD3 inhibited it. FGD1 and FGD3 therefore play different roles to regulate cellular functions, even though their intracellular levels are tightly controlled by the same destruction pathway through SCF(FWD1/beta-TrCP). PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. They share little sequence conservation, but all have a common fold, which is electrostatically polarised. Less than 10% of PH domains bind phosphoinositide phosphates (PIPs) with high aff…
