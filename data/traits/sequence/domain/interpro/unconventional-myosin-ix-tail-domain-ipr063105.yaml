identifier: InterPro:IPR063105
label: "Unconventional myosin-IX tail domain"
definition: >-
  This entry represents a domain of approximately 110 residues found in unconventional myosin-IXa (MYO9A) proteins in vertebrates. This domain is located in the tail region between the IQ motifs and the C1 phorbol-ester/DAG-binding domain ( ), preceding the RhoGAP domain ( ). MYO9A regulates Rho by stimulating its GTPase activity in neurons and is required for neurite branching and motor neuron axon guidance. Mutations cause congenital myasthenic syndrome type 24 (CMS24).
