identifier: InterPro:IPR054420
label: "RAE1/2 domain I, C-terminal region"
definition: >-
  This entry represents the C-terminal region of domain I from Rab escort proteins 1/2 (RAE1/2, also known as Rab proteins geranylgeranyltransferase component A 1/2) which are the substrate-binding subunit of the Rab geranylgeranyltransferase (GGTase) complex. These proteins bind unprenylated Rab proteins and presents the substrate peptide to the catalytic component B, remaining bound to it after the geranylgeranyl transfer reaction.Members of this entry are mainly found in vertebrates and some species of arthropods.
