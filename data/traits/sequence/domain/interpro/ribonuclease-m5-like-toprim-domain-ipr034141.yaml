identifier: InterPro:IPR034141
label: "Ribonuclease M5-like, TOPRIM domain"
definition: >-
  This topoisomerase-primase (TOPRIM) nucleotidyl transferase/hydrolase domain is found in Ribonuclease M5 (RNase M5) and other small primase-like proteins from bacteria and archaea. RNase M5 catalyzes the maturation of 5S rRNA in low G+C Gram-positive bacteria. The TOPRIM domain has two conserved motifs, one of which centres at a conserved glutamate and the other one at two conserved aspartates (DxD). The conserved glutamate may act as a general base in nucleotide polymerization by primases. The DXD motif may co-ordinate Mg2+, a cofactor required for full catalytic function.
