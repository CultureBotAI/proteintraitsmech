identifier: InterPro:IPR049013
label: "MxiC, C-terminal"
definition: >-
  This entry represents the domain found at the C-terminal of Shigella flexneri type III secretion protein MxiC and similar sequences from Enterobacterales. It is composed of three domains, each possessing a four-helix X-bundle fold.
