identifier: InterPro:IPR046775
label: "Cyclin-D-binding Myb-like transcription factor 1, N-terminal"
definition: >-
  This domain is found at the N-terminal of Cyclin-D-binding Myb-like transcription factor 1 (DMTF1), which is rich in acidic residues, adjacent . DMTF1 is a tumour suppressor that interacts with and activates CDKN2A/ARF in response to Ras-Raf signalling, thus inducing p53-dependent cell cycle arrest.
