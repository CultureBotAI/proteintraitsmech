identifier: InterPro:IPR032715
label: "Nuclear receptor coactivator 6, TRADD-N domain"
definition: >-
  This entry represents the TRADD-N domain found in nuclear receptor coactivator 6 (NCOA6). NCOA6 is involved in the coactivation of different nuclear receptors, such as steroid receptors (GR and ERs), retinoid receptors (RARs and RXRs), thyroid hormone receptors (TRs), vitamin D3 receptor (VDR) and prostanoid receptors (PPARs).
