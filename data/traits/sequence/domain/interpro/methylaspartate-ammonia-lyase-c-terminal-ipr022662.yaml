identifier: InterPro:IPR022662
label: "Methylaspartate ammonia-lyase, C-terminal"
definition: >-
  Methylaspartate ammonia-lyase catalyses the second step of fermentation of glutamate. It is a homodimer. This domain represents the C-terminal region of methylaspartate ammonia-lyase and contains a TIM barrel fold similar to the . This domain represents the catalytic domain and contains a metal binding site.
