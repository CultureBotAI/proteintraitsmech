identifier: InterPro:IPR008757
label: Peptidase M6-like, domain
definition: >-
  This group of metallopeptidases belong to MEROPS peptidase family M6 (immune inhibitor A family, clan MA(M)). The predicted active site residues for members of this family and thermolysin, the type example for clan MA, occur in the motif HEXXH. InhA of Bacillus thuringiensis (an entomopathogenic bacterium) specifically cleaves antibacterial peptides produced by insect hosts. B. thuringiensis is highly resistant to the insect immune system due to its production of two factors, inhibitor A (InhA or InA) and inhibitor B (InhB or InB), which selectively block the humoral defence system developed by insects against Escherichia coli and Bacillus cereus. B. thuringiensis is especially resistant to cecropins and attacins, which are the main classes of inducible antibacterial peptides in various lepidopterans and dipterans,. InhA has been shown to specifically hydrolyze cecropins and attacins in the immune hemolymph of Hyalophora cecropia (Cecropia moth) in vitro. However, it has been suggested that the role of InhA in resistance to the humoral defence system is not consistent with the time course of InhA production. B. thuringiensis has two proteins belonging to this group (InhA and InhA2), and it has been shown that InhA2 has a vital role in virulence when the host is infected via the oral route. The B. cereus member has been found as an exosporium component from endospores. B. thuringiensis InhA is induced at the onset of sporulation and is regulated by Spo0A and AbrB. Vibrio cholerae PrtV is thought to be encoded in the pathogenicity island. However, PrtV mutants did not exhibit a reduced virulence phenotype, and thus PrtV is not an indispensable virulence factor. Annotation note: due to the presence of PKD repeats in some of the members of this group (e.g., V. cholerae VCA…
