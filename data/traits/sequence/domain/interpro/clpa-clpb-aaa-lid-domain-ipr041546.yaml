identifier: InterPro:IPR041546
label: "ClpA/ClpB, AAA lid domain"
definition: >-
  This entry represents the α-helical AAA+ lid domain that is found to the C terminus of AAA domains. Proteins containing this domain include ClpA/B. These proteins are thought to protect cells from stress by controlling the aggregation and denaturation of vital cellular structures. They vary in size, but share a domain which contains an ATP-binding site.
