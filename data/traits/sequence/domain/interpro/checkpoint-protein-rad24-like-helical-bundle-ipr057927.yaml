identifier: InterPro:IPR057927
label: "Checkpoint protein RAD24-like, helical bundle"
definition: >-
  This domain is found in Checkpoint protein RAD24 from Saccharomyces cerevisiae, its orthologue in Schizosaccharomyces pombe Rad17, and similar sequences mainly found in fungi. RAD24 participates in checkpoint pathways arrest of the cell cycle, a mechanism that allows the DNA repair pathways to act to restore the integrity of the DNA prior to DNA synthesis or separation of the replicated chromosomes. This domain folds into a five-helical bundle.
