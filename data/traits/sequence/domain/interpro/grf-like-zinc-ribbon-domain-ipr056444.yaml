identifier: InterPro:IPR056444
label: "GRF-like, zinc ribbon domain"
definition: >-
  This domain is found in a group of uncharacterised proteins mainly from fungi. It is predicted to adopt a zinc ribbon fold and it is closely related to GRF type zinc fingers ( ).
