identifier: InterPro:IPR054067
label: "SSO1120-like, N-terminal thioredoxin-like domain"
definition: >-
  This entry represents a thioredoxin domain found at the N-terminal of a group of archaeal proteins, including the protein disulfide oxidoreductase (PDO) SSO1120 from the hyperthermophilic archaeon Sulfolobus solfataricus ( ). This domain, a non-canonical thioredoxin fold, is composed of four β-strands and three α-helices, with a well-defined disulfide bond between Cys24 and Cys45. The domain does not contain any active site but is part of the larger structure that comprises the C-terminal unit with the CTKC active site motif. The N-terminal domain shows unexpected similarity with the N-terminal domain of the alkyl hydroperoxide reductase F component from Salmonella typhimurium, and a possible involvement of this atypical PDO in a new antioxidant system of S. solfataricus has been proposed.
