identifier: InterPro:IPR040752
label: "DNA mismatch repair protein HSM3, C-terminal domain"
definition: >-
  Hsm3 is a proteasome-dedicated chaperone that forms a base precursor, Hsm3-Rpt1-Rpt2-Rpn1. Hsm3 consists of 23 α-helices forming 11 repeats similar to HEAT repeats. This entry include the last 5 repeats at the C terminus.
