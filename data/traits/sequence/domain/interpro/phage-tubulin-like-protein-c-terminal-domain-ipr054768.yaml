identifier: InterPro:IPR054768
label: "Phage tubulin-like protein, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of phage tubulin-like protein from the Pseudomonas phage phiKZ (PhuZ, also known as TubZ) and similar viral sequences. TubZ is a tubulin-like GTPase that forms filaments, which are required for positioning viral DNA and capsids in the middle of the host cell for optimal replication. This protein adopts a tubulin/FtsZ protein family fold organised into two domains, a canonical N-terminal GTP-binding domain, and a C-terminal GTPase activation domain (this entry). This domain shows an α-β structure.
