identifier: InterPro:IPR047834
label: "Ovarian tumor domain-containing protein 1, OTU domain"
definition: >-
  This entry represents the OTU domain of the OTU domain-containing protein 1 (OTUD1), also known as DUBA-7 in humans. OTUD1 is a deubiquitinating enzyme/ubiquitinyl hydrolase , that specifically hydrolyzes 'Lys-63'-linked polyubiquitin to monoubiquitin; this specificity is facilitated by the C-terminal Ub-interacting motif (UIM) of OTUD1. It interacts and promotes the deubiquitination of myeloid cell leukaemia 1 (MCL1), a pro-survival Bcl-2 family protein that plays important roles in cell survival, proliferation, differentiation and tumorigenesis. OTUD1 also deubiquitinates IFN regulatory factor 3 (IRF3) and attenuates its function; IRF3 is critical for the transcription of type I IFNs in defending virus and promoting inflammatory responses. Loss-of-function mutations of OTUD1 associated with multiple autoimmune diseases including systemic lupus erythematosus (SLE), rheumatoid arthritis (RA), ulcerative colitis (UC) and Hashimoto's thyroiditis (HT). OTUD1 belongs to the OTU family of cysteine proteases.
