identifier: InterPro:IPR007119
label: "Phage tail spike protein, N-terminal domain"
definition: >-
  This entry represents the conserved N-terminal domain found in Tail spike protein from Bacillus phage SPP1 (Gp21) and similar sequences from tailed bacteriophages and bacterial prophages. Gp21 binds to the host entry receptor YueB and triggers viral DNA ejection. This interaction initiates a cascade of conformational changes at the C terminus of the protein, causing disassembly of the tail spike organisation and opening of the cap region formed by the N-terminal.
