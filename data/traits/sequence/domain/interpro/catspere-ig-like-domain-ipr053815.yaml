identifier: InterPro:IPR053815
label: "CATSPERE, Ig-like domain"
definition: >-
  The CatSper (cation channel of sperm) complex is a tetrameric complex consisting of CATSPER1, CATSPER2, CATSPER3 and CATSPER4, it functions as an alkalinisation-activated calcium channel. This complex is involved in sperm cell hyperactivation, a process needed for sperm motility, which is essential late in the preparation of sperm for fertilisation. This complex requires four auxiliary subunits (beta, gamma, delta and epsilon), which play a role in channel assembly. These are multidomain proteins which share a similar domain organisation. This entry represents the Ig-like domain of CATSPERE (epsilon subunit).
