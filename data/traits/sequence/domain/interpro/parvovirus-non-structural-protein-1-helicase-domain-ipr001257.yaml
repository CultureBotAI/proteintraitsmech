identifier: InterPro:IPR001257
label: Parvovirus non-structural protein 1, helicase domain
definition: >-
  Parvoviruses are some of the smallest viruses containing linear, non-segmented single-stranded DNA genomes, with an average genome size of 5000 nucleotides. Parvoviruses have been described that infect a wide range of invertebrates and vertebrates and are well known for causing enteric disease in mammals. Genomes contain two large ORFs: NS1 and VP1; other ORFs are found in some sub-types and different gene products can arise from splice variants and the use of different start codons. This entry represents the helicase domain of the Parvovirus NS1 protein; which is required for viral DNA replication. This domain contains the ATP/GTP-binding site motif A (P-loop). Parvoviral NS1 also regulates host gene expression through histone acetylation.
