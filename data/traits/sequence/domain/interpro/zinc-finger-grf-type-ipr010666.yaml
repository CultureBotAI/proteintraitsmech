identifier: InterPro:IPR010666
label: Zinc finger, GRF-type
definition: >-
  This entry represents Glycine-arginine-phenylalanine (GRF)-type zinc fingers (GRF-ZFs), 45- to 50-residue domains with a conserved GRxF motif. GRF-ZFs are widely distributed throughout eukaryotes in proteins that are involved in DNA damage response (DDR), transcriptional regulation, and RNA metabolism. GRF-ZFs are nucleic acid interaction modules and in several cases these motifs have been shown to enhance enzymatic activity. Some members of this group of proteins are rRNA N6-adenosine-methyltransferase ZCCHC4, a 28S rRNA-specific N6-adenosine-methyltransferase; DNA-(apurinic or apyrimidinic site) endonuclease 2 (APE2, known as Apn2 in yeast); DNA topoisomerase 3 and Transcription termination factor 2. This domain comprises a three-stranded anti-parallel β-sheet that folds into a crescent-shaped claw-like structure ( ). A single bound Zn(2+) ion plays a central structural role in this domain, and is coordinated with tetrahedral geometry by a "CHCC" sequence motif. Zinc finger (Znf) domains are relatively small protein motifs which contain multiple finger-like protrusions that make tandem contacts with their target molecule. Some of these domains bind zinc, but many do not; instead, they bind other metals, such as iron, or no metal at all. For example, some family members form salt bridges to stabilise the finger-like folds. They were first identified as a DNA-binding motif in transcription factor TFIIIA from Xenopus laevis (African clawed frog); however, they are now recognised to bind DNA, RNA, protein and/or lipid substrates. Their binding properties depend on the amino acid sequence of the finger domains and of the linker between fingers, as well as on the higher-order structures and the number of fingers. Znf domains are often found in clusters, where fingers can h…
