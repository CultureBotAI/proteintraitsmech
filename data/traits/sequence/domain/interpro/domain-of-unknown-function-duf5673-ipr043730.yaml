label: "Domain of unknown function DUF5673"
definition: >-
  This presumed domain is functionally uncharacterised. Proteins containing this domain can be found in bacteria and archaea, and is approximately 90 amino acids in length. The domain is usually found C-terminal to a pair of transmembrane helices.
