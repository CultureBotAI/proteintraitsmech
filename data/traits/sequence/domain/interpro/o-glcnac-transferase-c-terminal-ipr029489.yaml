identifier: InterPro:IPR029489
label: "O-GlcNAc transferase, C-terminal"
definition: >-
  This entry represents the C-terminal domain of the O-linked beta-N-acetylglucosamine transferase (OGT, also known as UDP-N-acetylglucosamine--peptide N-acetylglucosaminyltransferase), which catalyses the transfer of a single GlcNAc to the Ser or Thr of nucleocytoplasmic proteins. OGTs have two known domains: the N-terminal tetratricopeptide repeat domain and the C-terminal glycosyltransferase domain. Deletions of the C-terminal domain result in a complete loss of the enzyme activity.
