identifier: InterPro:IPR056135
label: "Domain of unknown function DUF7718"
definition: >-
  This domain is found in uncharacterised prokaryotic proteins. It is predicted to adopt α/β structure consisting of a meander β-sheet and a kinked α-helix. It contains several conserved aspartate and histidine residues that are predicted to come close in space and may constitute a metal binding site.
