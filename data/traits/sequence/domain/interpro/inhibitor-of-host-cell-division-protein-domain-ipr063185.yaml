identifier: InterPro:IPR063185
label: "Inhibitor of host cell division protein domain"
definition: >-
  This domain covers most of the length of the protein in Inhibitor of host cell division protein from Bacteriophage SP01 (Gp56) and is found at the N-terminal end of a group of uncharacterised proteins mainly found in actinobacteria that also contain . Gp56 inhibits host cell division leading to filamentation. This domain is predicted to form an α-helix.
