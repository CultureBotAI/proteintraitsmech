identifier: InterPro:IPR049873
label: "Glutamate [NMDA] receptor subunit 1-like, N-terminal LIVBP-like domain"
definition: >-
  This entry represents N-terminal leucine-isoleucine-valine-binding protein (LIVBP)-like domain of Glutamate [NMDA] receptor subunit 1 from Drosophila melanogaster (NMDA1), also known as the NR1 subunit of ionotropic NMDA (N-methyl-D-aspartate) glutamate receptor, and similar animal proteins. NMDA1, a member of the type 2 periplasmic binding fold protein superfamily, is an essential channel-forming subunit of the NMDA receptor. This protein plays a key role in synaptic plasticity, synaptogenesis, excitotoxicity, memory acquisition and learning. It mediates neuronal functions in glutamate neurotransmission. It plays a role in associative learning and in long-term memory consolidation. The functional NMDA receptor is a heterotetramer composed of two NR1 and two NR2 (A, B, C, and D) or of NR3 (A and B) subunits. NR1/NR3 receptors are calcium-impermeable and unaffected by ligands acting at the NR2 glutamate-binding site. These proteins serve critical functions in neuronal development, functioning, and degeneration in the mammalian central nervous system.
