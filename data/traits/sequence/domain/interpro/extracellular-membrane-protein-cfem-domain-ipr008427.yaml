label: "Extracellular membrane protein, CFEM domain"
definition: >-
  The CFEM domain is a fungal-specific domain that contains eight cysteines and is found in some proteins with proposed roles in fungal pathogenesis. The structure of the CFEM domain containing protein 'Surface antigen protein 2' from Candida albicans ( ) has been solved. The CFEM (Common in Fungal Extracellular Membrane) protein domain is unique to fungi, but it is not found in all fungi. Many CFEM domain proteins have been found exclusively from Ascomycota and Basidiomycota, and they were found to be enriched in pathogenic fungi. The CFEM domain is found primarily in glycosylphosphatidylinositol (GPI)-anchored cell-wall proteins, and present in one or more copies, normally with one copy near the N terminus of proteins. CFEM-containing proteins are involved in differentiation, stress response and pathogenicity. CFEM-containing proteins systematically contribute to iron acquisition during saprotrophic and pathogenic growth in filamentous mycopathogens as well as inter-species competition. CFEM proteins have been shown to bind haem and to play crucial roles in extracting it from the host haemoglobin, as well as in mediating its delivery to the fungal cel. The CFEM domain is predominantly comprised of hybrophobic residues. CFEM domains contain eight characteristically spaced cysteine residues with the consensus sequence P-x-C-[AG]-x(2)-C-x(8,12)-C-x(1,4)-D-x(2,5)-C-x-C-x(9,14)-C-x(3,4)-C-x(15,16) (where x is any residue with its range shown). The CFEM domain adopts a helical-basket fold that consists of six α-helices, the third of which is perpendicular to a central bundle of five antiparallel helices. Overall, the shape of the helical portion resembles a basket that is 'capped' from the top by Helix 3, whereas the long N-terminal loop appears as its 'handle'. The uniquene…
