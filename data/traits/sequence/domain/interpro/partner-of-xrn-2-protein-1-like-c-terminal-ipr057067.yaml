identifier: InterPro:IPR057067
label: "Partner of xrn-2 protein 1-like, C-terminal"
definition: >-
  This domain is found at the C-terminal end of Partner of xrn-2 protein 1 from Caenorhabditis elegans (Paxt-1) and similar sequences from worms. Paxt-1 plays a role in maintenance of steady-state concentration and turnover of microRNAs (miRNA) by degradation of mature miRNA in complex with the exoribonuclease xrn-2. This domain is found associated with and is predicted to be organised into two similar α-β structures. The Partner of xrn-2 protein 1 family is involved in the regulation of microRNA (miRNA) levels within the cell. Members of this family are characterised by the presence of an XTBD domain, which is essential for their interaction with the exoribonuclease xrn-2. The primary function of the family is to play a role in the maintenance of steady-state concentrations and turnover of miRNAs by facilitating the degradation of mature miRNA in complex with xrn-2. Additionally, the family stabilises and enhances the accumulation and activity of xrn-2, thereby contributing to the miRNA turnover process.
