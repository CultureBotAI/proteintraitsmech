identifier: InterPro:IPR005168
label: "Bunyavirus glycoprotein G2"
definition: >-
  Bunyavirus has three genomic segments: small (S), middle-sized (M), and large (L). The S segment encodes the nucleocapsid and a non-structural protein. The M segment codes for two glycoproteins, G1 and G2, and another non-structural protein (NSm). The L segment codes for an RNA polymerase. This entry represents the polyprotein region forming the G2 glycoprotein, which interacts with the G1 glycoprotein.
