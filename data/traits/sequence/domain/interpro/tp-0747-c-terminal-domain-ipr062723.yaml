identifier: InterPro:IPR062723
label: "TP_0747, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of TP_0747, an uncharacterised protein from Treponema pallidum. TP_0747 is 344 amino acids in length and contains a disordered region. This domain is found predominantly in Spirochaetota, particularly within Spirochaetales including Treponemataceae, Spirochaetaceae and Breznakiellaceae. The full-length protein also contains an N-terminal domain. The function of this domain remains to be determined.
