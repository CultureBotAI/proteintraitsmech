identifier: InterPro:IPR040768
label: "Vid27, PH-like domain"
definition: >-
  This region has been predicted to contain a PH-like domain. It is found in Vid27, a cytoplasmic protein that possibly regulates import of fructose-1,6-bisphosphatase into Vacuolar Import and Degradation (Vid) vesicles, but is not essential for proteasome-dependent degradation of fructose-1,6-bisphosphatase (FBPase).
