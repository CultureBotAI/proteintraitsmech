identifier: InterPro:IPR017805
label: "EasF-like, SAM-dependent methyltransferase domain"
definition: >-
  This entry represents a domain found across the full length of 4-dimethylallyltryptophan N-methyltransferase (EasF) and related fungal proteins. The domain is homologous to S-adenosylmethionine (SAM)-dependent methyltransferases . This domain can also be found covering the N-terminal region. EasF is involved in the biosynthesis of ergot alkaloids, a class of fungal secondary metabolites. In Neotyphodium lolii, EasF functions as an AdoMet:dimethylallyltryptophan N-methyltransferase, catalysing the methylation step that follows the reaction of tryptophan dimethylallyltransferase (DMATS) in the ergot alkaloid biosynthetic pathway. This entry also includes mug158 (meiotically up-regulated gene 158 protein) from Schizosaccharomyces pombe, which contains an additional uncharacterised domain.
