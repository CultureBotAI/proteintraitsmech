identifier: InterPro:IPR063517
label: "Arsenite methyltransferase, C-terminal domain"
definition: >-
  This domain is found C-terminal in the human Arsenite methyltransferase (AS3MT) and related eukaryotic proteins. AS3MT catalyses the transfer of a methyl group from AdoMet to trivalent arsenicals, producing methylated and dimethylated arsenicals. The domain represented by this entry contains two of the three known exonic single-nucleotide polymorphisms (SNPs) in human. Each of these appears to have an effect on enzyme stability. The precise function of this domain is unknown.
