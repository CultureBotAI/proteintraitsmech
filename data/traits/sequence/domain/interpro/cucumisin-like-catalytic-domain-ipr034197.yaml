identifier: InterPro:IPR034197
label: "Cucumisin-like catalytic domain"
definition: >-
  This entry represents a peptidase cucumisin-like domain, found in a subgroup of proteins that belong to the members of the peptidases S8 (subtilisins), predominantly from plants. This peptidase domain has a protease-associated (PA) domain nested within it. Some members, such as cucumisin, have an extra C-terminal fibronectin-III-like domain. Cucumisin (MEROPS identifier S08.092) is an extracellular glycoprotein that is a major allergen from melon. It is synthesized as a precursor with the C-terminal of the propeptide binding to the active site cleft in a substrate-like manner. Other proteins included in this entry are the ALE1 peptidase (abnormal leaf shape 1; S08.014) from Arabidopsis which is expressed in the developing embryo and absence of which leads to a defective cuticle; and phytaspase (S08.150) which have a caspase-like specificity and play a similar role in programmed cell death. The subtilisin family is one of the largest serine peptidase families characterised to date. Over 200 subtilisins are presently known, more than 170 of which have their complete amino acid sequence. It is widespread, being found in eubacteria, archaebacteria, eukaryotes and viruses. The vast majority of the family are endopeptidases, although there is an exopeptidase, tripeptidyl peptidase. Structures have been determined for several members of the subtilisin family: they exploit the same catalytic triad as the chymotrypsins, although the residues occur in a different order (HDS in chymotrypsin and DHS in subtilisin), but the structures show no other similarity. Some subtilisins are mosaic proteins, while others contain N- and C-terminal extensions that show no sequence similarity to any other known protein.
