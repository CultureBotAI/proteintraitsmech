identifier: InterPro:IPR056791
label: "Mcm10, C-terminal zinc binding motif"
definition: >-
  This is the C-terminal zinc binding motif of Mcm10, an eukaryotic DNA replication factor that regulates the stability and chromatin association of DNA polymerase alpha. This motif is structurally similar to the zinc-ribbon domain found in the N-terminal domain of eukaryotic and archaeal MCM helicases.
