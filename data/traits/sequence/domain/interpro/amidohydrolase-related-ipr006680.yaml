identifier: InterPro:IPR006680
label: Amidohydrolase-related
definition: >-
  Proteins containing this domain are enzymes from a large metal-dependent hydrolase superfamily. The family includes adenine deaminase ( ) that hydrolyses adenine to form hypoxanthine and ammonia. This reaction is important for adenine utilisation as a purine and also as a nitrogen source. The entry also includes dihydroorotase and N-acetylglucosamine-6-phosphate deacetylases ( ). The domain is also found in the urease alpha subunit, where it is the catalytic domain.
