identifier: InterPro:IPR006123
label: Staphylococcal/Streptococcal toxin, beta-grasp domain
definition: >-
  Staphylococcal enterotoxins and streptococcal pyrogenic exotoxins constitute a family of biologically and structurally related toxins produced by Staphylococcus aureus and Streptococcus pyogenes. These toxins share the ability to bind to the major histocompatibility complex proteins of their hosts. A more distant relative of the family is the S. aureus toxic shock syndrome toxin, which shares only a low level of sequence similarity with this group. All of these toxins share a similar two-domain fold (N and C-terminal domains) with a long α-helix in the middle of the molecule, a characteristic β-barrel known as the "oligosaccharide/oligonucleotide fold" at the N-terminal domain and a β-grasp motif at the C-terminal domain. Each superantigen possesses slightly different binding mode(s) when it interacts with MHC class II molecules or the T-cell receptor. The β-grasp domain has some structural similarities to the β-grasp motif present in immunoglobulin-binding domains, ubiquitin, 2Fe-2 S ferredoxin and translation initiation factor 3 as identified by the SCOP database.
