identifier: InterPro:IPR040573
label: "Tail specific protease, N-terminal domain"
definition: >-
  Tail specific proteases are involved in cleaving the C termini of specific protein substrates. The N-terminal domain of tail specific proteases has a novel fold composed of 10 α helices.
