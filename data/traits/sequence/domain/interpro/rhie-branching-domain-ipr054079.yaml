identifier: InterPro:IPR054079
label: "RhiE, branching domain"
definition: >-
  This entry represents the branching domain of RhiE, part of a non-canonical polyketide synthase (PKS) module found in Mycetohabitans rhizoxinica ( , ), and in similar sequences from proteobacteria. Unlike typical PKS modules, RhiE catalyses a Michael-type acetyl addition to generate a branch in the carbon chain, expanding the biosynthetic scope of polyketide biosynthesis. The module consists of a ketosynthase domain, an acyl carrier protein domain, and a cryptic branching ('B') domain in between, featuring a double hot dog (DHD) fold that is structurally homologous to the product template domain of a fungal PKS. The RhiE B domain alone is not sufficient to catalyse the Michael addition, and mutagenesis experiments revealed a crucial role of the ketosynthase domain in branching the carbon chain.
