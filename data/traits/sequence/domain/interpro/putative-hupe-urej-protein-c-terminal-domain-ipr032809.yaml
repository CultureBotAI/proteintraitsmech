identifier: InterPro:IPR032809
label: "Putative HupE/UreJ protein, C-terminal domain"
definition: >-
  This entry represents the C-terminal in a group of putative HupE/UreJ proteins mostly from bacteria. These proteins contain many conserved histidines that may be involved in nickel binding. This domain contains transmembrane helices.
