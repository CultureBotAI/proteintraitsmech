identifier: InterPro:IPR057441
label: "At2g24240-like, C-terminal beta-propeller"
definition: >-
  This is the β-propeller found at the C-terminal end of BTB/POZ domain-containing protein At2g24240 from Arabidopsis thaliana and similar plant proteins. The function of At2g24240 remains uncharacterised. However, given the presence of a BTB/POZ domain and a C-terminal β-propeller, it is likely to be involved in ubiquitin-mediated protein degradation or chromatin remodelling. Specifically, it may function as a substrate-specific adaptor within an E3 ubiquitin-protein ligase complex (CUL3-RBX1-BTB), facilitating the ubiquitination and subsequent proteasomal degradation of target proteins.
