identifier: InterPro:IPR047949
label: Dual specificity protein phosphatase PPS1, dual specificity phosphatase domain
definition: >-
  This entry represents the catalytic dual specificity phosphatase domain found at the C-terminal of fungal proteins, including dual specificity protein phosphatase PPS1 from Saccharomyces cerevisiae, which has a role in the DNA synthesis phase of the cell cycle. As a dual specificity protein phosphatase, PPS1 functions as a protein-serine/threonine phosphatase ( ) and a protein-tyrosine-phosphatase ( ).
