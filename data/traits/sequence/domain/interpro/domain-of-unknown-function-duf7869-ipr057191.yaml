identifier: InterPro:IPR057191
label: "Domain of unknown function DUF7869"
definition: >-
  This domain is found in uncharacterised eukaryotic proteins. It is predicted to adopt a globular structure composed of a curved β-sheet and helices packed on it. It contains conserved histidine and aspartate residues some of which cluster in space.
