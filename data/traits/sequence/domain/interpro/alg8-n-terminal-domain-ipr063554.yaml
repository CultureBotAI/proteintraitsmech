identifier: InterPro:IPR063554
label: "Alg8, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the Alg8 protein which is a component of the extracellular contractile injection system. Three intertwined copies of Alg8 form the spike. The domain represented by this entry is homologous to the gp27-like domain and functions as a 3-to-6-fold symmetry adaptor ( ).
