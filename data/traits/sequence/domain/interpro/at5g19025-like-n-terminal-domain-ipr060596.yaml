identifier: InterPro:IPR060596
label: "At5g19025-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal helical region of the uncharacterised protein At5g19025 from Arabidopsis thaliana and similar plant sequences. At5g19025 is a 259 amino acid multi-pass membrane protein with three predicted transmembrane helical regions. It is localised to cellular membranes.
