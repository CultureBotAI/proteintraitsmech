identifier: InterPro:IPR056689
label: "Domain of unknown function DUF7787"
definition: >-
  This domain is found in uncharacterised plant proteins. It contains the so-called HeH motif (helix-extended loop-helix). This motif is known to engage in protein-protein and/or nucleic acid interactions. Some proteins contain two copies of this domain.
