identifier: InterPro:IPR059990
label: "TP_0454, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of TP_0454, an uncharacterised protein from Treponema pallidum. This domain adopts a glycosyltransferase fold, suggesting structural similarity to glycosyltransferases, though no enzymatic activity has been demonstrated. The function of this domain remains to be determined.
