identifier: InterPro:IPR055204
label: "Heterogeneous nuclear ribonucleoprotein L, RRM domain"
definition: >-
  This entry represents the fourth RRM domain found at the C-terminal of human Heterogeneous nuclear ribonucleoprotein L (HNRNPL), an splicing factor binding to exonic or intronic sites and acting as either an activator or repressor of exon inclusion. It is also found in the Polypyrimidine tract-binding protein 1/2/3 that play a role in pre-mRNA splicing and in the regulation of alternative splicing events.
