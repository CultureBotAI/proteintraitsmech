identifier: InterPro:IPR007024
label: BLUF domain
definition: >-
  The BLUF domain (named for sensors of Blue-Light Using FAD) is an FAD-binding protein domain. BLUF domains are present in various proteins, primarily from bacteria. For example a BLUF domain is found at the N terminus of the AppA protein from Rhodobacter sphaeroides. BLUF domains are involved in sensing blue-light (and possibly redox) using FAD, and are similar to the flavin-binding PAS domains and cryptochromes. Their predicted secondary structure reveals that the BLUF domains have a novel FAD-binding fold.
