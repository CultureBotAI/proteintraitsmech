identifier: InterPro:IPR063932
label: "Biosynthesis protein PigD, third domain"
definition: >-
  This entry represents the third domain of biosynthesis protein PigD and related multi-domain proteins. Members are found in actinomycetes and proteobacteria. The domain spans approximately 170 amino acids and is part of multi-domain proteins involved in secondary metabolite biosynthesis. PigD is a thiamine diphosphate-dependent enzyme catalysing steps in prodigiosin biosynthesis. The specific function of this domain remains to be determined.
