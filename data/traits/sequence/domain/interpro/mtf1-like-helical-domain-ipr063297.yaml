identifier: InterPro:IPR063297
label: "MTF1-like, helical domain"
definition: >-
  This entry represents a helical domain found in MTF1-like proteins. MTF1 is a putative transcription factor that may be involved in transcriptional activation. The domain is approximately 175 amino acids in length and it has a predicted α-helical structure. This helical domain is found primarily in fungi, particularly in species from the Mucoromycota and other fungal taxa. The domain is located in the C-terminal region of these proteins but can be found in another positions in related proteins. While MTF1 proteins are involved in transcriptional regulation, the specific function of this helical domain remains to be determined.
