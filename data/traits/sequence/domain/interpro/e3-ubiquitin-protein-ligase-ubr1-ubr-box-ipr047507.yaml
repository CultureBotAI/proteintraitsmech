identifier: InterPro:IPR047507
label: "E3 ubiquitin-protein ligase UBR1, UBR-box"
definition: >-
  This entry represents the UBR-box of human UBR1 and similar proteins found in vertebrates. E3 ubiquitin-protein ligase UBR1, also called ubiquitin-protein ligase E3-alpha-I (E3alpha-I), or N-recognin-1, is a RING-type E3 ubiquitin ligase of the Arg/N-end rule degradation pathway. It recognises and binds to proteins bearing specific N-terminal residues that are destabilising according to the N-end rule, leading to their ubiquitination and subsequent degradation. Deficiency of UBR1 causes Johanson-Blizzard syndrome.
