identifier: InterPro:IPR049813
label: "Echinoderm microtubule-associated protein-like elp-1, trimerization domain"
definition: >-
  This entry corresponds to a conserved trimerization domain located at the N-terminal of Elp-1 and similar sequences. This entry includes the echinoderm microtubule-associated protein-like elp-1 from C.elegans and related sequences mainly from nematodes and arthropods. Elp-1 belongs to the echinoderm microtubule-associated protein (EMAP)-like (EML) family which is involved in the modulation of the assembly and organization of the microtubule cytoskeleton, probably playing a role regulating the orientation of the mitotic spindle and the orientation of the plane of cell division. It is required for normal proliferation of neuronal progenitor cells in the developing brain and for normal brain development.
