identifier: InterPro:IPR034425
label: "GRSF-1, RNA recognition motif 1"
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of G-rich sequence factor 1 (GRSF-1). GRSF-1 is a cytoplasmic poly(A)+ mRNA binding protein which interacts with RNA in a G-rich element-dependent manner. It regulates RNA processing in mitochondrial RNA granules. It also mediates vial mRNA translation in infected cells. GRSF-1 contains three potential RNA recognition motifs (RRMs), which are responsible for the RNA binding. In addition, GRSF-1 has two auxiliary domains, an acidic α-helical domain and an N-terminal alanine-rich region, that may play a role in protein-protein interactions and provide binding specificity.
