identifier: InterPro:IPR005537
label: "CRISPR type III-associated protein"
definition: >-
  This entry represents a group of CRISPR-associated proteins belonging to the type III RAMP (Repair Associated Mysterious Proteins) family. Members including in this family are Csm3, Csm5, Cmr6, Cmr4 and Cmr1. The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
