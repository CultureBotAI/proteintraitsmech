identifier: InterPro:IPR059862
label: "YonD, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the YonD protein found in Bacillus subtilis. The protein contains a coiled coil region at the C-terminal. YonD is encoded by the yonD gene (locus tag BSU21130) in Bacillus subtilis strain 168. The specific function of this N-terminal domain remains to be determined.
