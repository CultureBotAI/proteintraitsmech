identifier: InterPro:IPR033467
label: "Tesmin/TSO1-like CXC domain"
definition: >-
  This entry represents a CXC domain found in proteins such as Tesmin and TSO1. These proteins have two copies of a cysteine rich motif as follows: C-X-C-X4-C-X3-YC-X-C-X6-C-X3-C-X-C-X2-C.
