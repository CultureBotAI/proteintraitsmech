identifier: InterPro:IPR063302
label: "SWIFT domain"
definition: >-
  This entry represents the SWI/SNF Ig-Fold for Transcription Factor Interactions (SWIFT) domain found in SMARCD1, SMARCD2 and SMARCD3 from humans and its homologues. This domain is both necessary and sufficient for binding diverse transcription factors. It is an evolutionarily conserved domain that serves as a universal binding platform for diverse transcription factors, that can modulate cell type and disease-specific transcription. It adopts an Ig-like fold that is interrupted by the SWIB domain after six anti-parallel β-strands, and the two additional β-strands are formed from the C-terminal amino acids.
