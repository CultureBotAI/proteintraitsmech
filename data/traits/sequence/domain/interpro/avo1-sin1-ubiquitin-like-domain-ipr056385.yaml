identifier: InterPro:IPR056385
label: "AVO1/Sin1, ubiquitin-like domain"
definition: >-
  This domain is found in the Target of rapamycin complex 2 subunit AVO1, subunit sin1 and related proteins from fungi. AVO1 is a component of TORC2, which regulates cell cycle-dependent polarisation of the actin-cytoskeleton and cell wall integrity. Sin1 is a component of the SAPK pathway and the mechanistic target of rapamycin complex 2 (mTORC2). Within the mTORC2 complex, sin1 acts as a substrate adapter which recognises and binds AGC protein kinase family members for phosphorylation by tor1. This domain shares a significant sequence similarity with ubiquitin-like domains and it is predicted to adopt similar structure.
