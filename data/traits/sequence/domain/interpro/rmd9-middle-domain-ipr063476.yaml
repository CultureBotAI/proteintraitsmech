identifier: InterPro:IPR063476
label: "RMD9, middle domain"
definition: >-
  This entry represents the middle domain found in members of RMD9 proteins from ascomycetes. RMD9 proteins are mitochondrial RNA-binding proteins that bind the 3'-UTR of mitochondrial mRNAs and are involved in the processing or stability of mitochondrial mRNAs. The proteins are localised to the mitochondrial inner membrane as peripheral membrane proteins on the matrix side. The function of this domain remains to be determined. Iis predicted to consist of tetratricopeptide (TPR)-like repeats.
