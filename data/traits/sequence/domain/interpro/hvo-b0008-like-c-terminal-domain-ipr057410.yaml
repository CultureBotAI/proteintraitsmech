label: "HVO_B0008-like, C-terminal domain"
definition: >-
  This entry represents a domain found at the C-terminal of uncharacterised proteins from halobacteria, including HVO_B0008 from Haloferax volcanii ( ). This domain is predicted to show a helix-turn-helix (HTH) fold.
