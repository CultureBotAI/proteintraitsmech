identifier: InterPro:IPR058908
label: "Broad-specificity ulvan lyase, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of of Broad-specificity ulvan lyase from Formosa agariphila P29) and similar prokaryotic sequences. P29 is involved in the degradation of ulvan, a major cell wall polysaccharide from green seaweeds of the genus Ulva. The C-terminal domain adopts a β-sandwich structure. In ulvan lyases, this domain works in conjunction with the N-terminal (α/α)6 toroid domain ( ) to enable the endolytic cleavage of ulvan. The combination of these domains contributes to the broad substrate specificity of these enzymes, which can degrade not only ulvan but also glycosaminoglycans like chondroitin sulfate and heparan sulfate.
