identifier: InterPro:IPR059547
label: "Type II restriction enzyme NmeDI, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of type II restriction enzyme NmeDI from Neisseria meningitidis and related bacteria. NmeDI is approximately 350 amino acids and functions as a P subtype restriction endonuclease that recognises the double-stranded DNA sequence 5'-N(12)RCCGGYN(12)-3' and cleaves on both sides of the recognition sequence to generate specific double-stranded fragments with terminal 5'-phosphates. It is part of restriction-modification systems that provide defence against foreign DNA in bacteria. The protein contains an N-terminal catalytic domain and this C-terminal domain whose specific function remains to be determined.
