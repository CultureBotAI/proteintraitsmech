identifier: InterPro:IPR063956
label: "CRN52_02910-like, protease effector domain"
definition: >-
  This entry represents the protease effector domain (PED) in Multifunctional-autoprocessing repeats-in-toxin (CRN52_02910), Toxin Afp18, Toxin PAU_02230, Makes caterpillars floppy 1 (Mcf1) toxin and similar sequences. At the cellular level, activity of Mcf1 leads to apoptotic blebbing of membranes and fragmentation of nuclei. Such apoptosis in the insect midgut cells leads to a rapid loss of body turgor and the characteristic 'floppy' phenotype of the intoxicated insect and subsequent death. After translocation into target cells, Mcf1 interacts with the host cell ADP-ribosylation factor 3 (Arf3) that allosterically activates the PED using a distinct pulling mechanism. Mcf1 undergoes three autocleavage reactions. The PED domain is responsible for the cleavage of Mcf1 by autoproteolysis. CRN52_02910 is a precursor of a multifunctional toxin that causes destruction of the actin cytoskeleton by covalent cross-linking of actin and inactivation of Rho GTPases when translocated into the host cytoplasm. Upon entry into the host cell, it undergoes autocatalytic processing in cis mediated by the peptidase C80 domain (also known as the CPD domain). This protease activity is activated upon binding to inositol hexakisphosphate (InsP6), which is present at the host cell membrane, leading to the release of the cysteine protease domain-containing toxin F3 chain into the host cytosol. The F3 chain subsequently cleaves and releases additional effector toxin chains that promote disassembly of the actin cytoskeleton and enhance V. vulnificus colonisation of the small intestine, possibly by facilitating evasion of phagocytic cells.
