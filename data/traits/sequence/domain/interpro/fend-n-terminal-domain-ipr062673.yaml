identifier: InterPro:IPR062673
label: "Fend, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the transmembrane protein fend (forked end) found in arthropods. Fend is a single-pass type I membrane protein involved in motor neuron axon guidance and neuromuscular specificity in Drosophila melanogaster. The protein is required for normal targeting of ventral muscle 12 by motoneurons and may function as an axon guidance molecule. This N-terminal domain is located in the extracellular region of the protein, upstream of the transmembrane helix. The specific function of this domain remains to be determined.
