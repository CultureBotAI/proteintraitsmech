identifier: InterPro:IPR032190
label: "Niemann-Pick C1, N-terminal"
definition: >-
  This is the N-terminal domain of Niemann-Pick C1 family proteins, which mediate transport of cholesterol from the intestinal lumen to enterocytes. This domain contains a cholesterol-binding pocket.
