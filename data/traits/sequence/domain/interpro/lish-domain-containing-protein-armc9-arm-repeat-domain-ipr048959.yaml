identifier: InterPro:IPR048959
label: "LisH domain-containing protein ARMC9, ARM repeat domain"
definition: >-
  ARMC9 is localised to the basal body of a cilium and is upregulated during ciliogenesis. It is required for appropriate acetylation and polyglutamylation of ciliary microtubules, and regulation of cilium length. This entry represents a domain consisting of armadillo repeats found towards the C-terminal of ARMC9.
