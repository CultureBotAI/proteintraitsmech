identifier: InterPro:IPR030497
label: "Nuclear factor NF-kappa-B, p100 subunit, RHD domain, N-terminal"
definition: >-
  NF-kappaB is a pleiotropic transcription factor present in almost all cell types. It is the endpoint of a series of signal transduction events that are initiated by a vast array of stimuli related to many biological processes such as inflammation, immunity, differentiation, cell growth, tumorigenesis and apoptosis. NF-kappaB is a homo- or heterodimeric complex formed by the Rel-like domain-containing proteins RelA/p65, RelB, NFKB1/p50, c-Rel and NFKB2/p52. Each individual NF-kappaB subunit, and perhaps each dimer, carries out unique functions in regulating transcription. Dimer-specific functions can be conferred by selective protein-protein interactions with other transcription factors, coregulatory proteins, and chromatin proteins. NF-kB1 and NF-kB2 are synthesised as large precursors, called p105 and p100, which undergo processing to generate the NF-kB subunits p50 and p52, respectively. The processing of p105 and p100 is mediated by the ubiquitin/proteasome pathway, and involves selective degradation of their C-terminal regions containing ankyrin repeats. Unlike RelA, RelB and c-Rel, p50 and p52 do not contain transactivation domains in their C-termini. Nevertheless, they play critical roles in modulating the specificity of NF-kB function. This entry represents the N-terminal sub-domain of the Rel homology domain (RHD) of NF-kappaB subunit precursor p100, which can be processed to produce a 52kDa protein (p52). p52 can form homodimers. It can also form heterodimers with different NF-kappaB family members, such as RelB, p65 and c-Rel. p100 inhibits c-Rel and reduces the expression of IL-23 in dendritic cells.
