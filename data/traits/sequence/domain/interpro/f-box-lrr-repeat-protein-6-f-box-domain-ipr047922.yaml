identifier: InterPro:IPR047922
label: F-box/LRR-repeat protein 6, F-box domain
definition: >-
  FBXL6, also called F-box and leucine-rich repeat protein 6, or F-box protein FBL6 (FBL6A), is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression.
