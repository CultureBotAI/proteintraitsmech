identifier: InterPro:IPR048755
label: "Alpha-amylase SusG, CBM58 domain"
definition: >-
  This entry includes alpha-amylase SusG from Bacteroides thetaiotaomicron, a member of the glycoside hydrolase family 13 (GH13). It is located on the outer membrane of the cell, and cleaves starch into oligosaccharides before internalisation for degradation. Typically, GH13 members show three domains A, B and C. In addition to these, SusG includes the insertion of a unique carbohydrate binding module family 58 (CBM58), represented in this entry, which gives the protein an elongated shape. CBM58 is approximately 120 residues in length and folds into a β-sandwich that adopts an immunoglobulin-like topology with a flat five-stranded antiparallel β-sheet opposing a four-stranded antiparallel β-sheet which features three protruding loops. Y260, W287, and W299 form the starch-binding site.
