identifier: InterPro:IPR026533
label: "Non-canonical purine NTP phosphatase/PRRC1"
definition: >-
  This entry represents a domain found in non-canonical purine NTP phosphatases and in PRRC1 (proline-rich and coiled-coil-containing protein 1). These phosphatases hydrolyse non-canonical purine nucleotides such as XTP and ITP to their respective diphosphates derivatives. PRRC1 is a Golgi-associated protein of unknown function.
