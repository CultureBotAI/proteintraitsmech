identifier: InterPro:IPR058822
label: "Major fimbrium tip subunit FimD, third Ig-like domain"
definition: >-
  This entry represents the third domain found in Major fimbrium tip subunit FimD protein from Porphyromonas gingivalis and similar proteins from bacteroidales. FimD is though to be a component of the fimbrium tip, which mediate biofilm formation, adhesion onto host cells and onto other bacteria that are part of the oral microbiome, play an important role in invasion of periodontal tissues and are major virulence factors. It adopts an Ig-like β-sandwich fold.
