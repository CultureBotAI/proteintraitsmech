identifier: InterPro:IPR031761
label: "Folded gastrulation, N-terminal domain"
definition: >-
  This is the N-terminal domain of the folded gastrulation protein. Folded gastrulation is required for morphogenic movements during gastrulation and nervous system development. It may act as a secreted signal and activate the G protein alpha subunit. This domain may be the G protein-coupled receptor ligand.
