identifier: InterPro:IPR059599
label: "CBUA0006-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the CBUA0006 protein found in Coxiella burnetii and similar sequences from legionellales. CBUA0006 is 341 amino acids and is encoded on plasmid pQpH1 (locus CBUA0006). The protein contains a coiled coil region at residues 153-179 and a C-terminal disordered region (this entry) with polar residue compositional bias. The specific function of this domain remains to be determined.
