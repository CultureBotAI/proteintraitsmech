identifier: InterPro:IPR060392
label: "PABIR, helical domain"
definition: >-
  This entry represents the helical domain of the PABIR (formerly FAM122) animal proteins. In humans, this group includes PABIR1, PABIR2, and PABIR3 (also known as FAM122A, FAM122B, and FAM122C respectively). PABIR1 functions as an inhibitor of serine/threonine-protein phosphatase 2A (PP2A) activity. PABIR3 has been shown to interact with multiple proteins including ABCD3, calreticulin, DYNC1H1, and TAF7 through protein-protein interaction studies. The specific function of this helical domain remains to be determined.
