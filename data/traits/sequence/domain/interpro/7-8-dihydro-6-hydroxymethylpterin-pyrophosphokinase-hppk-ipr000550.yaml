identifier: InterPro:IPR000550
label: 7,8-Dihydro-6-hydroxymethylpterin-pyrophosphokinase, HPPK
definition: >-
  All organisms require reduced folate cofactors for the synthesis of a variety of metabolites. Most microorganisms must synthesise folate de novo because they lack the active transport system of higher vertebrate cells which allows these organisms to use dietary folates. Enzymes involved in folate biosynthesis are therefore targets for a variety of antimicrobial agents such as trimethoprim or sulphonamides. 7,8-dihydro-6-hydroxymethylpterin-pyrophosphokinase ( ) (HPPK) catalyses the attachment of pyrophosphate to 6-hydroxymethyl-7,8-dihydropterin to form 6-hydroxymethyl-7,8-dihydropteridine pyrophosphate. This is the first step in a three-step pathway leading to 7,8 dihydrofolate. Bacterial HPPK (gene folK or sulD) is a protein of 160 to 270 amino acids. In the lower eukaryote Pneumocystis carinii, HPPK is the central domain of a multifunctional folate synthesis enzyme (gene fas).
