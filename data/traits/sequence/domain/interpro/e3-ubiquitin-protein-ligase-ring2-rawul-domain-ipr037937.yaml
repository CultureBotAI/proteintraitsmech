identifier: InterPro:IPR037937
label: "E3 ubiquitin-protein ligase RING2, RAWUL domain"
definition: >-
  E3 ubiquitin-protein ligase RING2 ( ) mediates monoubiquitination of 'Lys-119' of histone H2A (H2AK119Ub), which is a specific tag for epigenetic transcriptional repression and participates in X chromosome inactivation of female mammals. RING2 is a component of the PRC1 complex, and other chromatin-associated Polycomb (PcG) complexes such as BCOR. It is also a component of the MLL1/MLL complex. This entry represents the RING finger- and WD40-associated ubiquitin-like (RAWUL) domain of RING2 and similar proteins from vertebrates.
