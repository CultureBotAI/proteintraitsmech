identifier: InterPro:IPR020954
label: "Antigenic heat-stable 120 kDa protein, N-terminal domain"
definition: >-
  This domain is found in Antigenic heat-stable 120 kDa protein. Sca4 (surface cell antigen 4 or Antigenic heat-stable 120 kDa protein) is a surface protein of Rickettsia (intracellular pathogens) that mediates protrusion from an infected cell and engulfment by the adjacent cell in order to mediate spreading.
