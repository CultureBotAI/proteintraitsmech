identifier: InterPro:IPR003502
label: Interleukin-1 propeptide
definition: >-
  The N-terminal of Interleukin-1 is approximately 115 amino acids long, it forms a propeptide that is cleaved off to release the active interleukin-1. This entry represents the propeptide. Interleukin-1 alpha (IL-1 alpha) and interleukin-1 beta (IL-1 beta) are cytokines that participate in the regulation of immune responses, inflammatory reactions and haematopoiesis. Two types of IL-1 receptor have been cloned from mouse and human cell lines, each with three extracellular immunoglobulin (Ig)-like domains, limited sequence similarity (28%) and different pharmacological characteristics, termed type I and type II receptors. Both receptors exist in transmembrane and soluble forms, the latter thought to arise from post-translational cleavage of the extracellular portion of the membrane receptor. The receptors are well conserved in evolution, map to the same chromosomal location, and can both bind all three forms of IL-1 (IL-1 alpha, IL-1 beta and IL-1RA). The crystal structures of IL-1 alpha and IL-1 beta have been solved, revealing a shared 12-stranded β-sheet structure also found in heparin-binding growth factors and Kunitz-type soybean trypsin inhibitors. The β-sheets are arranged in three similar lobes around a central axis, with six strands forming an antiparallel β-barrel. Several regions, particularly the loop between strands 4 and 5, have been implicated in receptor binding. The Vaccinia virus genes B15R and B18R each encode proteins related to the Ig superfamily, with the highest degree of similarity to human and murine IL-1 receptors. It has been proposed that the products of one or both genes may bind IL-1 and/or IL-6, preventing these cytokines from reaching their natural receptors as a mechanism of viral immune evasion. A related gene product from Cowpox virus h…
