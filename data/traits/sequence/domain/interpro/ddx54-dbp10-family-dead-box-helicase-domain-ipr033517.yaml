identifier: InterPro:IPR033517
label: "DDX54/DBP10 family, DEAD-box helicase domain"
definition: >-
  This group of DEAD-box RNA helicases includes Dbp10 from fungi and DDX54 (also known as DP97) from mammals. DDX54 interacts in a hormone-dependent manner with nuclear receptors. It plays an important role in central nervous system myelination. Dbp10 has a role in ribosome biogenesis. This entry represents the DEAD-box helicase domain of DDX54 and similar eukaryotic proteins. This domain contains the ATP-binding region.
