identifier: InterPro:IPR054714
label: "GPR158/179, extracellular domain"
definition: >-
  This entry represents the extracellular domain of GPR158 (also known as metabotropic glycine receptor, mGlyR), GRP179 and similar animal sequences. GPR158 is a metabotropic receptor for glycine that controls synapse formation and function in the brain. It functions in cognition, stress-induced mood control, and synaptic development. GRP179 is an orphan receptor involved in vision that is required for signal transduction through retinal depolarizing bipolar cells. This domain has a Cache-like fold which participates in ligand recognition and also mediates dimerisation and stability of the dimer.
