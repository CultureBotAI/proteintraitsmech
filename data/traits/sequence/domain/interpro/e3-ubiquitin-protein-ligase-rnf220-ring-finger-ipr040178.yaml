identifier: InterPro:IPR040178
label: E3 ubiquitin-protein ligase RNF220, RING finger
definition: >-
  RNF220 is an E3 ubiquitin-protein ligase that promotes the ubiquitination and proteasomal degradation of Sin3B, a scaffold protein of the Sin3/HDAC (histone deacetylase) corepressor complex. It can also bind E2 and mediate auto-ubiquitination of itself. Moreover, RNF220 specifically interacts with beta-catenin, and enhances canonical Wnt signaling through ubiquitin-specific protease 7 (USP7)-mediated deubiquitination and stabilization of beta-catenin, which is independent of its E3 ligase activity. RNF220 is critical for nuclear lamina regulation and its mutations are implicated in leukodystrophy with ataxia and sensorineural deafness. RNF220 contains a characteristic C3HC4-type RING-HC finger at its C terminus.
