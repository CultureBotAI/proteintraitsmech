identifier: InterPro:IPR044334
label: "Accessory protein NS7, porcine deltacoronavirus (PDCoV)"
definition: >-
  This entry includes the accessory protein NS7 found in Porcine coronavirus HKU15. Porcine deltacoronavirus (PDCoV) encodes three accessory proteins, NS6, NS7 and NS7a. NS7a is a 100 amino-acid polypeptide identical to the C-terminal of NS7; it remains unclear whether their functions are redundant. PDCoV HKU15, an emerging swine enteric coronavirus that causes diarrhea in neonatal piglets, has also been found in the respiratory tract of pigs and may be able to cause respiratory infections, thus possibly spreading through the respiratory route. NS7-specific mAbs that recognised cells transfected with an NS7 expression construct or infected with PDCoV also recognized NS7a, which is encoded by a separate subgenome mRNA with a non-canonical transcription regulatory sequence. The NS7 protein is extensively distributed in the mitochondria and may be involved in various cellular processes such as cytoskeleton networks and cell communication, metabolism, and protein biosynthesis. NS7-expressing and PDCoV-infected cells also show a substantial down-regulation of alpha-actinin-4.
