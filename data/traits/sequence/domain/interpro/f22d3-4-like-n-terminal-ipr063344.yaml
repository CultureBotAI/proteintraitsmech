identifier: InterPro:IPR063344
label: "F22D3.4-like, N-terminal"
definition: >-
  This entry represents an N-terminal domain found in uncharacterised proteins from nematodes, exemplified by Caenorhabditis elegans protein F22D3.4. The domain spans approximately 150 amino acids and shows similarity to immunoglobulin-like domains. The function of this domain remains to be determined.
