identifier: InterPro:IPR049368
label: "Chorismatase FkbO/Hyg5-like, N-terminal"
definition: >-
  This domain is found at the N-terminal region of Chorismatase (FkbO) (SwissProt: ) and 3-hydroxybenzoate synthase (Hyg5) (SwissProt: ) from Streptomyces hygroscopicus and in similar bacterial proteins. These enzymes catalyse the hydrolysis of chorismate into pyruvate and (dihydro)benzoic acid derivatives and are involved in the biosynthetic pathways forming polyketidic immunosuppressants such as ascomycin (FK520) and tacrolimus (FK506), which prevent T-cell proliferation through initial binding to the immunophilin FKBP12. FkbO is organised into three domains: N-terminal, central and C-terminal. This entry represents the N-terminal and central domains of FkbO, which show two β-sheets and three α-helices. This fold is also found in Hyg5, which employ a fundamentally different reaction mechanism than the typical hydrolysis seen in FkbO
