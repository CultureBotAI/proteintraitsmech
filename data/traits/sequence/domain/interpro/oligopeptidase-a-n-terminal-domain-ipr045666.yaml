identifier: InterPro:IPR045666
label: "Oligopeptidase A, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Oligopeptidase A (OpdA, ), which belongs to the M3A family of peptide-degrading metalloproteases. This enzyme may play a specific role in the degradation of signal peptides after they are released from precursor forms of secreted proteins. In Arabidopsis, it localizes both to mitochondria and chloroplasts.
