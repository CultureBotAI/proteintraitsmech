identifier: InterPro:IPR054697
label: "Nuclear pore complex interacting protein, N-terminal"
definition: >-
  This entry includes a series of nuclear pore complex-interacting protein (NPIP) sequences from vertebrates. This entry represents helical segments that in some members constitute almost the full length of the sequence, while in others they are found at the N-terminal. In those cases, they are associated to a β-solenoid repeat ( ). NPIP are not considered one of the core structural nucleoporins that form the main scaffold of the nuclear pore complex (NPC), but it is classified as a nucleoporin-associated protein. This family is well conserved from African apes to humans.
