identifier: InterPro:IPR049738
label: "BTB/POZ domain-containing protein 6, BTB/POZ domain"
definition: >-
  This entry represents the BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB/POZ domain-containing protein 6 from Xenopus laevis (BTBD6) and similar sequences from vertebrates. BTBD6 is required for proper embryogenesis and plays an essential evolutionary conserved role during late neuronal development and muscle formation. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids.
