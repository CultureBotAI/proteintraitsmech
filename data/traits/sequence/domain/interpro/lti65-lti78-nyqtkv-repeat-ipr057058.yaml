identifier: InterPro:IPR057058
label: "LTI65/LTI78, NYQTKV repeat"
definition: >-
  This entry represents a disordered region found in LTI78 and LTI65 from Arabidopsis and related plant proteins. This region consists of repeats containing the conserved sequence NYQTKV. It is found N-terminal of the CAP160 repeat ( ). LTI78 and LTI65 are involved in responses to abiotic stress.
