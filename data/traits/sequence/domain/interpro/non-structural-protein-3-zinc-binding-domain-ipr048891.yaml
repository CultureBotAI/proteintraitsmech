identifier: InterPro:IPR048891
label: "Non-structural protein 3, zinc-binding domain"
definition: >-
  This domain is found in Non-structural protein 3 (nsP3) from Chikungunya virus (CHIKV) and similar proteins from Alphavirus. nsP3, one of the four products of the polyprotein P1234, displays mono-ADP-ribosylhydrolase activity. This protein consists of three domains: an N-terminal Macro domain ( ), a central zinc-binding domain (ZBD, this entry), and a hypervariable-sequence carboxyl terminus. ZBD is essential for viral replication. It has two cysteines in a loop between α-helices and the other two cysteines at the end of two parallel β-strands, which represent a structural scaffold for zinc-ion coordination.
