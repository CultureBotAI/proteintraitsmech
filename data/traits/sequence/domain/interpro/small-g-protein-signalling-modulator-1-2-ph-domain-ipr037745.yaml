identifier: InterPro:IPR037745
label: Small G protein signalling modulator 1/2, PH domain
definition: >-
  Small G-protein signalling modulator 1/2 (also known as RUTBC2/1) bind to Rab9A via their Pleckstrin homology (PH) domain. RUTBC1 stimulates GTP hydrolysis by Rab32 and Rab33B, while RUTBC2 appears to be a GAP for Rab36, Rab9A and associated proteins controling the recycling of mannose-6-phosphate receptors from late endosomes to the trans-Golgi. This entry represents the PH domain of RUTBC1/2.
