identifier: InterPro:IPR048587
label: "Conserved virulence factor B, third S1 domain"
definition: >-
  This domain is found in the virulence regulatory factor CvfB from Streptococcus pneumoniae and in similar proteins predominantly found in Firmicutes. CvfB is composed of three consecutive S1 RNA-binding domains and a winged-helix (WH) domain (Pfam:PF17783). This entry represents the third S1 domain, an RNA-binding module that adopts the typical S1 fold that consists of a five-stranded, antiparallel β-sheet forming a β-barrel.
