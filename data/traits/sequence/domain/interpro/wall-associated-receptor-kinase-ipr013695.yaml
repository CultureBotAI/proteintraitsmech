identifier: InterPro:IPR013695
label: Wall-associated receptor kinase
definition: >-
  This domain is found together with the eukaryotic protein kinase domain in plant wall-associated receptor kinases (WAKs) and related proteins. WAKs are serine-threonine kinases which might be involved in signalling to the cytoplasm and are required for cell expansion.
