identifier: InterPro:IPR047270
label: "Ephexin-like, PH domain"
definition: >-
  This is the PH domain of ephexins, which is believed to act with the DH domain in mediating protein-protein interactions. This entry includes ephexin family members which comprises ephexin-1 to 5 and related animal proteins, such as ARHGEF26, also called SGEF (SH3 domain-containing GEF) which shows structural similarities with ephexins. ARHGEF26 is highly expressed in liver and may play a role in regulating membrane dynamics. A common feature of this proteins, apart from their high sequence homology, is that they are the direct downstream proteins of Eph receptors, a large subfamily of receptor tyrosine kinases that is activated by Ephrins and involved in various cellular processes such as axon guidance, formation of tissue boundaries, long-term potentiation, angiogenesis, and cancer. The are essential for normal function of neurons and their development. Ephexin-1 (also called NGEF/neuronal guanine nucleotide exchange factor) plays a role in the homeostatic modulation of presynaptic neurotransmitter release and plays crucial roles in axon guidance. Literature data about Ephexin-2 (also known as RhoGEF19) is limited, however, its intrinsic role to function as a GEF for RhoA seems to be clear. It is involved in convergent extension, a developmental step of anterior-posterior axis extension in Xenopus gastrulation through RhoA activation and it also participates in pronephric tubulogenesis of Xenopus and zebrafish. Elevated levels of Ephexin-2 results in the increased activity of RhoA which causes higher cancer proliferation, migration, and invasion. Ephexin-3 (also called Rho guanine nucleotide exchange factor 5/RhoGEF5) is ubiquitously expressed in many tissues, such as colon, kidney, trachea, prostate, liver, and pancreas, with tendency to be highly expressed in tissu…
