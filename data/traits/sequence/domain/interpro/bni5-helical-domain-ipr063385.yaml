identifier: InterPro:IPR063385
label: "BNI5, helical domain"
definition: >-
  This entry represents a helical domain found in BNI5 and related proteins across fungi. BNI5 is required for normal septin function and cytokinesis in Saccharomyces cerevisiae. The protein localises to the bud neck and interacts with septins CDC11, CDC12 and SHS1. While the full-length BNI5 protein is involved in septin scaffold organisation and myosin-II localisation, the specific function of this helical domain remains to be determined.
