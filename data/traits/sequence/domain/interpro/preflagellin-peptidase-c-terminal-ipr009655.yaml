identifier: InterPro:IPR009655
label: "Preflagellin peptidase, C-terminal"
definition: >-
  This region is of unknown function and is found at the C-terminal of archaeal preflagellin peptidase. The preflagellin peptidase is a membrane-bound enzyme topologically similar to its counterpart in the type IV pilus system (prepilin peptidase); the two enzymes utilise the same catalytic mechanism. The preflagellin peptidase is required for the removal of the leader peptide from archaeal flagellin.
