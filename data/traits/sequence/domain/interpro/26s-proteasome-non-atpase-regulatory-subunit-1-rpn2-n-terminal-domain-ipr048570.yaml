label: "26S proteasome non-ATPase regulatory subunit 1/RPN2, N-terminal domain"
definition: >-
  This entry represents the N-terminal helical domain of 26S proteasome non-ATPase regulatory subunit 1 (PSMD1) and 26S proteasome regulatory subunit RPN2. It adopts a rod-like structure.
