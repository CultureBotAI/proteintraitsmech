identifier: InterPro:IPR064089
label: "Expansin, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of expansin and expansin-like proteins mainly found in amoebozoa. This domain is found in proteins also containing , which belong to the expansin family but are unlikely to encode proteins with typical expansin activity. It is also found in longer proteins containing expansin middle ( ) and C-terminal domains ( ), which may serve to lubricate cellulose microfibril movement during cell growth and wall extension. Some family members are expressed during development, particularly at the migrating slug stage. The specific function of this N-terminal domain remains to be determined.
