identifier: InterPro:IPR046777
label: "GvpD, basic region 2"
definition: >-
  This entry represents the C-terminal domain of GvpD, which contains the second basic region (bR2, arginine-rich) that may be important for its function. GvpD is involved in the regulation of gas vesicle formation through the interaction and breakdown induction of the transcriptional activator GvpE.
