identifier: InterPro:IPR059854
label: "Uncharacterized protein YfdP"
definition: >-
  This entry represents the YfdP protein family found in Escherichia coli and related enterobacteria. YfdP is a small protein of approximately 120 amino acids with similarity to bacteriophage T4 protein y06Q. The function of this protein family remains to be determined.
