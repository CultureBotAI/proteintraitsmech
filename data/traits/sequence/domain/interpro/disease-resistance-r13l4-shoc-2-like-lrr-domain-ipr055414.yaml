identifier: InterPro:IPR055414
label: "Disease resistance R13L4/SHOC-2-like, LRR domain"
definition: >-
  This entry represents a region containing leucine-rich repeats found mainly in plants, including a variety of plant resistance proteins, such as disease resistance RPP13-like protein 4 (R13L4) from Arabidopsis. R13L4 is a CC-NB-LRR receptor-like protein required for recognition of pathogenic bacteria type III effectors (T3E) such as Pseudomonas syringae HopZ1a and HopF2a and Xanthomonas campestris pv. campestris (Xcc) XopAC/AvrAC. This recognition requires ZED1-related kinases (e.g. PBL2, ZRK3 and ZED1/ZRK5). Arabidopsis LRR receptor-like serine/threonine-protein kinase GHR1 is also included in this entry, a receptor kinase acting as an early component in abscisic acid (ABA) signalling. GHR1 is required for darkness, ABA, high CO2 and hydrogen peroxide (H2O2) induction of S-type anion currents in guard cells leading to stomatal closure, possibly via the phosphorylation and activation of the anion channel SLAC1 and as a scaffolding component. This entry also includes several proteins from animals, such as Leucine-rich repeat protein SHOC-2 from human and its orthologue from Drosophila melanogaster. It is a core component of the SHOC2-MRAS-PP1c (SMP) holophosphatase complex that regulates activation of the MAPK pathway, acting as a scaffolding protein.
