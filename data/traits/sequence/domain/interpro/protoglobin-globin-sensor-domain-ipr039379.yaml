identifier: InterPro:IPR039379
label: "Protoglobin, globin sensor domain"
definition: >-
  This entry represents the globin sensor domain found in protoglobin from Archaea. Protoglobin has specific loops and an amino-terminal extension which leads to the burying of the haem within the matrix of the protein. Protoglobin-specific apolar tunnels allow the access of O 2 , CO and NO to the haem distal site. This domain is also found in the N-terminal regions of HemAT from the archaeon Halobacterium salinarum (HemAT-Hs) and from the Gram-positive bacterium Bacillus subtilis (HemAT-Bs). It contains a myoglobin-like motif, displays characteristic heme-protein absorption spectra, and binds oxygen reversibly.
