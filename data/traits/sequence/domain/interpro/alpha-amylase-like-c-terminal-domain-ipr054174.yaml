identifier: InterPro:IPR054174
label: "Alpha-amylase-like, C-terminal domain"
definition: >-
  This is the C-terminal domain of Anoxybacillus alpha-amylase ( ) and related enzymes. This domain follows the catalytic β/α domain. It folds into a β-sandwich with a greek key topology ( ).
