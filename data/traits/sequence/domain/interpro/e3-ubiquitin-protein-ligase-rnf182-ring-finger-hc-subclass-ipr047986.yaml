identifier: InterPro:IPR047986
label: "E3 ubiquitin-protein ligase RNF182, RING finger, HC subclass"
definition: >-
  This entry represents the C3HC4-type RING-HC finger of RNF182. RNF182 is a brain-enriched E3 ubiquitin-protein ligase that stimulates E2-dependent polyubiquitination in vitro. It is upregulated in Alzheimer"s disease (AD) brains and neuronal cells exposed to injurious insults. It interacts with ATP6V0C and promotes its degradation by the ubiquitin-proteosome pathway, suggesting a very specific role in controlling the turnover of an essential component of the neurotransmitter release machinery. It also plays a role in the inhibition of TLR-triggered innate immune response by mediating 'Lys'-48-linked ubiquitination and subsequent degradation of NF-kappa-B component RELA. RNF182 contains an N-terminal C3HC4-type RING-HC finger, and a C-terminal transmembrane domain.
