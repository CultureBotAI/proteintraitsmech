identifier: InterPro:IPR047956
label: "LIM/homeobox protein Lhx4, LIM domain 1"
definition: >-
  This entry represents the first LIM domain of LIM/homeobox protein Lhx4 and similar proteins from vertebrates. LHX4 belongs to the LHX protein family, which features two tandem N-terminal LIM domains and a C-terminal DNA binding homeodomain. Members of LHX family are found in the nucleus and act as transcription factors or cofactors. LHX proteins are critical for the development of specialised cells in multiple tissue types, including the nervous system, skeletal muscle, the heart, the kidneys, and endocrine organs, such as the pituitary gland and the pancreas. LHX4 plays essential roles in pituitary gland and nervous system development. In mice, the lhx4 gene is expressed in the developing hindbrain, cerebral cortex, pituitary gland, and spinal cord. As in other LIM domains, this domain family is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein.
