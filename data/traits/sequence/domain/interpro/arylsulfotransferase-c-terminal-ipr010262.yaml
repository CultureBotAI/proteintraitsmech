label: Arylsulfotransferase, C-terminal
definition: >-
  This entry represents a group of arylsulphotransferase (ASST) mostly from bacteria. It transfers a sulfate group from a phenyl sulfate ester to phenolic and non-phenolic compounds as acceptor molecules.
