identifier: InterPro:IPR053984
label: "GPR128, N-terminal domain"
definition: >-
  GRP128, also known as Adhesion G-protein coupled receptor G7 (AGRG7), is an orphan receptor of the adhesion family (subclass B2) that belongs to class B GPCRs. Expression of GPR128 was detected in the mouse intestinal mucosa and is thought to be involved in energy balance. This entry represents the N-terminal domain of GPR128, which, according to structure prediction and comparison using Foldseek, it adopts a fold similar to the hormone receptor domain (HormR, ) which is usually found preceding the stalk region of the GAIN domain in cell-adhesion GPCRs.
