identifier: InterPro:IPR024910
label: "Trans-2-enoyl-CoA reductase catalytic domain, putative"
definition: >-
  This entry represents a putative catalytic domain of trans-2-enoyl-CoA reductases ( ). In Euglena where the enzyme has been characterised it catalyses the reduction of enoyl-CoA to acyl-CoA in an unusual fatty acid pathway in mitochondria. The whole path performs a malonyl-CoA independent synthesis of fatty acids leading to accumulation of wax esters, which serve as the sink for electrons stemming from glycolytic ATP synthesis and pyruvate oxidation.
