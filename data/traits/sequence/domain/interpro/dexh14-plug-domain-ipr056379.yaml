identifier: InterPro:IPR056379
label: "DExH14, plug domain"
definition: >-
  This entry represents the plug domain of DExH-box ATP-dependent RNA helicase DExH14 from Arabidopsis, an RNA helicase that plays an essential role in pre-mRNA splicing as component of the U5 snRNP and U4/U6-U5 tri-snRNP complexes. This is a small α-helical bundle domain related to the plug domain of BRR2 proteins ( ). Members of this group are specific to plants.
