identifier: InterPro:IPR046953
label: "Spore germination GerAC-like, C-terminal"
definition: >-
  The GerAA, -AB, and -AC proteins of the Bacillus subtilis spore are required for the germination response to L-alanine as the sole germinant. Members of GerAC family are thought to be located in the inner spore membrane. Although the function of this family is unclear, they are likely to encode the components of the germination apparatus that respond directly to this germinant, mediating the spore's response. This entry represents the C-terminal domain of spore germination proteins predominantly found in firmicutes, including GerAC (also known as spore germination protein A3, -KC, and -AC from Bacillus subtilis.
