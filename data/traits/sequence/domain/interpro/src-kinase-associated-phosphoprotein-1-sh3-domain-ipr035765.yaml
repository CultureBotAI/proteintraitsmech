identifier: InterPro:IPR035765
label: "Src kinase-associated phosphoprotein 1, SH3 domain"
definition: >-
  SKAP1 (also known as SKAP55) is an immune cell-specific adaptor protein that plays an important role in T-cell adhesion, migration, and integrin clustering. It is expressed exclusively in T-lymphocytes, mast cells, and macrophages. Binding partners include ADAP (adhesion and degranulation-promoting adaptor protein), Fyn, Riam, RapL, and RasGRP.
