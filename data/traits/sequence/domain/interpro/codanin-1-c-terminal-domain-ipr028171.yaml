identifier: InterPro:IPR028171
label: "Codanin-1, C-terminal domain"
definition: >-
  This domain is found near to the C terminus of codanin-1. Codanin-1 may act as a negative regulator of histone chaperone anti-silencing function 1 (ASF1) in chromatin assembly. Proteins containing this domain also include the protein disks lost (dlt, also known as protein vanaso) from Drosophila. dlt regulates cell proliferation and cell survival of differentiated cells independent of cell division. Mutations in the codanin-1 gene cause congenital dyserythropoietic anemia 1 (CDA1), which is an autosomal recessive blood disorder characterised by morphological abnormalities of erythroblasts, ineffective erythropoiesis, macrocytic anemia and secondary hemochromatosis.
