identifier: InterPro:IPR034773
label: "CPSF7, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif of CPSF7. CPSF7 (or CFIm59) is a component of the Cleavage Factor Im complex (CFIm) which plays a key role in pre-mRNA 3'-cleavage and polyadenylation, it activates directly the mRNA 3'-processing machinery. CPSF7 contains an N-terminal RNA recognition motif (RRM), a central proline-rich region, and a C-terminal RS-like domain. The N-terminal RRM of CPSF7 mediates the interaction with CPSF5 (or CFIm25). It also serves to enhance RNA binding and facilitate RNA looping.
