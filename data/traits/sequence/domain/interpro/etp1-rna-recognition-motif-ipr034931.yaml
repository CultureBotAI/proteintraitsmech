identifier: InterPro:IPR034931
label: "ETP1, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of ETP1, the yeast homologue of BRCA1-associated protein (BRAP2) found in vertebrates. It may be involved in ethanol and salt-induced transcriptional activation of the NHA1 promoter and heat shock protein genes (HSP12 and HSP26), and participate in ethanol-induced turnover of the low-affinity hexose transporter Hxt3p. ETP1 contains an N-terminal RNA recognition motif (RRM), followed by a C3HC4-type ring finger domain and a UBP-type zinc finger.
