identifier: InterPro:IPR056917
label: "TRAPPC10, Ig-like domain"
definition: >-
  This domain is found in human TRAPPC10 and similar proteins specific to animals. TRAPPC10 is a subunit of the TRAPP (transport protein particle) II complex, a highly conserved vesicle tethering complex that functions in late Golgi trafficking as a membrane tether. This domain is predicted to adopt an Immunoglobulin-like (Ig-like) fold. The trafficking protein particle complex TRAPP is a multi-protein complex needed in the early stages of the secretory pathway. To date, two kinds of TRAPP complexes have been studied, TRAPPI and TRAPP II. These complexes differ in subunit composition. TRAPP I binds vesicles derived from the endoplasmic reticulum bringing them closer to the acceptor membrane. TRAPPII activates GTPase Ypt31/Ypt32 as the guanine nucleotide exchange factor in the trans-Golgi network to determine the maturation of Golgi cisternae into post-Golgi carriers in yeast. The TRAPPC10/Trs130 subunit of the TRAPP II complex functions in late Golgi trafficking as a membrane tether. TRAPPII binds the Ypt1 GTPase and probably uses the TRAPPI catalytic core to promote guanine nucleotide exchange. TRS130 plays a role in the YPT GEF activity of TRAPP II.
