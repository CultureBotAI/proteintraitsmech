identifier: InterPro:IPR031757
label: "Lgt1, glycosyltransferase domain"
definition: >-
  This is the glycosyltransferase domain of type A glycosyltransferases found in Legionella. L. pneumophila glucosyltransferase, also known as Lgt1, belongs to Glycosyltransferase Family 88 and acts as a virulence factor by the glucosylation of EF1A (elongation factor 1A) thereby blocking protein synthesis in the host cell.
