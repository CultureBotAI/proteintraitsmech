identifier: InterPro:IPR010950
label: "Chorismate mutase, archaeal"
definition: >-
  This entry represents archaeal chorismate mutases. Chorismate mutase catalyses the conversion of chorismate into prephenate which is subsequently converted into either phenylalanine or tyrosine. In Sulfolobus solfataricus this gene is found as a fusion with prephenate dehydrogenase ( ) which is the next enzyme in the tyrosine biosynthesis pathway. The Archaeoglobus fulgidus gene contains an N-terminal prephenate dehydrogenase domain and a C-terminal prephenate dehydratase domain ( ) followed by a regulatory amino acid-binding ACT domain ( ).
