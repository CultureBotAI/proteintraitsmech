identifier: InterPro:IPR009590
label: Protein Gp5, N-terminal OB-fold domain
definition: >-
  This domain is found at the N-terminal of the Gp5 baseplate protein of Bacteriophage T4. The baseplate is located at the end of the phage tail. Gp5 is a lysozyme essential for localised hydrolysis of bacterial cell walls, which is necessary for viral DNA injection. This domain binds to the Gp27 protein. It has the common OB fold.
