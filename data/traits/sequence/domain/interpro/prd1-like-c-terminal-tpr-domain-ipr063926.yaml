identifier: InterPro:IPR063926
label: "PRD1-like, C-terminal TPR domain"
definition: >-
  This is a domain found found at the C-terminal of Protein PUTATIVE RECOMBINATION INITIATION DEFECT 1 from Arabidopsis thaliana (PRD1) and similar sequences, which consists of tetratricopeptide (TPR)-like repeats. PRD1 is involved in DNA cleavage that forms the double-strand breaks (DSB) that initiate meiotic recombination.
