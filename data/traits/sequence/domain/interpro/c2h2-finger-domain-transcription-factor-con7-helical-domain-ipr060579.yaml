identifier: InterPro:IPR060579
label: "C2H2 finger domain transcription factor CON7, helical domain"
definition: >-
  This entry represents a helical domain found in C2H2 finger domain transcription factor CON7 from the rice blast fungus Pyricularia oryzae and other transcription factor from fungi. CON7 plays a central role in appressorium formation and pathogenicity. The protein is required for expression of genes involved in membrane metabolism, ergosterol biosynthesis, and pathogenic development. This helical domain corresponds to a predicted coiled-coil region. Its specific function remains to be determined.
