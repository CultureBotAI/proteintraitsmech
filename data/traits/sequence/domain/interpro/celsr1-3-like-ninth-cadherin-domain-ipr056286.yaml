identifier: InterPro:IPR056286
label: "CELSR1-3-like, ninth cadherin domain"
definition: >-
  This entry represents the last of 9 tandem cadherin domains occurring in human Cadherin EGF LAG seven-pass G-type receptor 1-3 (CELSR1-3), its orthologue form Drosophila stan/Flamingo and similar proteins predominantly found in animals. CELSR2 is a receptor that may have an important role in cell/cell signalling during nervous system formation, involved in planar cell polarity. Stan is involved in the fz signalling pathway that controls wing tissue polarity. It also mediates homophilic cell adhesion and it may play a role in initiating prehair morphogenesis. Stan may play a critical role in tissue polarity and in formation of normal dendrite fields. During planar cell polarity, stabilises asymmetric PCP domains together with ATP6AP2. The orthologue from C. elegans, fmi-1, promotes motorneuron development by positively regulating the extension of the anterior neurite of ventral D-type GABAergic motorneurons along the anterior-posterior axis of the ventral nerve cord. It plays a role in synaptogenesis by regulating synaptic vesicle accumulation at GABAergic and cholinergic neuromuscular junctions. The N-terminal cadherin domains are represented by .
