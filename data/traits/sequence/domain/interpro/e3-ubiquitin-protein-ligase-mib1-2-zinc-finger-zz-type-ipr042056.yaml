identifier: InterPro:IPR042056
label: "E3 ubiquitin-protein ligase MIB1/2, zinc finger, ZZ-type"
definition: >-
  This entry represents the Zinc finger found in the mammalian MIB1/2 protein and Drosophila Mind bomb (D-mib) protein. The ZZ motif coordinates two zinc ions and most likely participates in ligand binding or molecular scaffolding. MIB1 and MIB2 are E3 ubiquitin-protein ligases. Mind bomb is an E3 ubiqitin ligase that has been shown to regulate signaling by the Notch ligand Delta in Drosophila melanogaster.
