identifier: InterPro:IPR057320
label: "RESC1/2, CYTH-like domain"
definition: >-
  This domain is found in the RNA-editing substrate-binding complex protein 1 and 2 (RESC1, , and RESC2, ) from Trypanosoma brucei and related proteins. In Trypanosoma, the editosome, composed of RNA-editing substrate-binding complex (RESC) and RNA-editing catalytic complex (RECC) is involved in guide RNA (gRNA)-programmed editing to recode cryptic mitochondrial transcripts into messenger RNAs. RESC1 and RESC2 are paralogs that are essential components of the RESC complex and the RESC1/2 dimer stabilises gRNAs and most other proteins bind mRNAs. This domain has detectable similarity to members of the CYTH-like phosphatase superfamily and adopts similar structure.
