identifier: InterPro:IPR058799
label: "Crocagin biosynthetic protein CgnE/B"
definition: >-
  This entry represents Crocagin biosynthetic protein CgnE and its paralogue CgnB from Chondromyces crocatus and related proteins. CgnE and CgnB are both part of a cluster CgnBCDE which is involved in the biosynthesis of tetracyclic crocagin. Of these four proteins, CgnE and CgnB were identified as unusual peptide-binding proteins. CgnE shares a detectable simialrity with members of the Thermophilic metalloprotease (M29) family. In CgnE one of the metal binding site lacks metal coordinating residues and its structure revealed no density for metal ions. CgnE appears to recruit the substrate peptide CgnA to CgnC and assist in catalysis, either by presenting the core peptide in a specific conformation or by ensuring appropriate timing of the hydroxylation reactions. CgnE does not seem to possess catalytic activity itself in contrast to CgnB which appears to be catalytically active.
