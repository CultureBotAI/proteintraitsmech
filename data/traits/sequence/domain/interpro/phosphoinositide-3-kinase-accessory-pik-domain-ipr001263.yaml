identifier: InterPro:IPR001263
label: "Phosphoinositide 3-kinase, accessory (PIK) domain"
definition: >-
  Phosphatidylinositol 3-kinase (PI3K) is an enzyme that phosphorylates phosphoinositides on the 3-hydroxyl group of the inositol ring. The role of the accessory domain of phosphoinositide 3-kinase (PI3-kinase) is unclear. It may be involved in substrate presentation.
