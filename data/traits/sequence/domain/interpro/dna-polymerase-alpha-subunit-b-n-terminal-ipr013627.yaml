identifier: InterPro:IPR013627
label: "DNA polymerase alpha, subunit B, N-terminal"
definition: >-
  This entry represents the N-terminal domain of subunit B of DNA polymerase alpha-primase, an enzyme which is essential for DNA replication in higher eukaryotes as it initiates synthesis on both leading and lagging strand single-stranded DNA templates. It consists of a primase heterodimer that synthesises RNA primers, a DNA polymerase that extends them, and a fourth subunit, p68 (also termed B-subunit), which is believed to regulate the whole complex. This domain docks on the SV40 helicase and activates the viral primosome. This domain adopts an α-helical fold.
