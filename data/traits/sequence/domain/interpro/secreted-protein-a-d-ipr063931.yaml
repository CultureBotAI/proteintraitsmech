identifier: InterPro:IPR063931
label: "Secreted protein A-D"
definition: >-
  This entry represents a conserved domain found in secreted proteins A, C, and D from Dictyostelium discoideum. These proteins are localised to secreted pycnosomes, which are condensed endosomal structures continuously secreted by the amoeba. The proteins contain N-terminal signal peptides and multiple N-glycosylation sites. SctA is the most abundant protein in secreted pycnosomes and is also found in multilamellar bodies of lysosomal origin. This domain can cover the entire protein, as in secreted proteins A and D, or only the C-terminal region, as in secreted protein C.
