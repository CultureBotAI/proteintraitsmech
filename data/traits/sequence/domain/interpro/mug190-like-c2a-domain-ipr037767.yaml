identifier: InterPro:IPR037767
label: "Mug190-like, C2A domain"
definition: >-
  Meiotically up-regulated gene 190 protein (Mug190) from Schizosaccharomyces pombe derives its name from a study to identify genes essential for meiosis. It is thought to correspond to tricalbin 2 in Saccharomyces cerevisiae. Tricalbins are C2 domain proteins involved in ER-plasma membrane tethering. C2 domains fold into an 8-standed β-sandwich that can adopt 2 structural arrangements: type I and type II, distinguished by a circular permutation involving their N- and C-terminal β strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances including bind phospholipids, inositol polyphosphates, and intracellular proteins. C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions. This entry represents the first C2 repeat of Mug190, C2A, and has a type-II topology.
