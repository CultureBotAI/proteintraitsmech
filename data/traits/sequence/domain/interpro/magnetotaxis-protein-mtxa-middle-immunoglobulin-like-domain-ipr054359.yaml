identifier: InterPro:IPR054359
label: "Magnetotaxis protein MtxA, middle immunoglobulin-like domain"
definition: >-
  This immunoglobulin-like domain is located centrally in the Magnetotaxis protein MtxA from Magnetospirillum gryphiswaldense and similar sequences from magnetotactic aquatic proteobacteria. Magnetotaxis is believed to direct the swimming of cells toward growth-favoring microoxic zones in natural waters.
