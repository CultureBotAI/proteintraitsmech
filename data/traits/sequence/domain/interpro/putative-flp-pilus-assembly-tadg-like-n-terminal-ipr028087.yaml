identifier: InterPro:IPR028087
label: "Putative Flp pilus-assembly TadG-like, N-terminal"
definition: >-
  This is an N-terminal domain on a family of putative Flp pilus-assembly proteins. The exact function is not known. The Flp-pilus biogenesis genes include the Tad genes, and some members of this family are putatively assigned as being TadG.
