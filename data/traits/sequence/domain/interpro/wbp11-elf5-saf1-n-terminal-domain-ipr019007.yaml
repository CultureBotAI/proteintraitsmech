identifier: InterPro:IPR019007
label: Wbp11/ELF5/Saf1, N-terminal domain
definition: >-
  This entry represents WW domain-binding protein 11 (or Saf1 in Schizosaccharomyces pombe), which may play a role in the regulation of pre-mRNA processing and EARLY FLOWERING 5, which acts as a repressor of flowering in Arabidopsis thaliana. The WW domain is a short conserved region in a number of unrelated proteins, which folds as a stable, triple stranded β-sheet. This short domain of approximately 40 amino acids, may be repeated up to four times in some proteins. The name WW or WWP derives from the presence of two signature tryptophan residues that are spaced 20-23 amino acids apart and are present in most WW domains known to date, as well as that of a conserved Pro. The WW domain binds to proteins with particular proline-motifs, [AP]-P-P-[AP]-Y, and/or phosphoserine- phosphothreonine-containing motifs. It is frequently associated with other domains typical for proteins in signal transduction processes. A large variety of proteins containing the WW domain are known. These include; dystrophin, a multidomain cytoskeletal protein; utrophin, a dystrophin-like protein of unknown function; vertebrate YAP protein, substrate of an unknown serine kinase; Mus musculus (Mouse) NEDD-4, involved in the embryonic development and differentiation of the central nervous system; Saccharomyces cerevisiae (Baker's yeast) RSP5, similar to NEDD-4 in its molecular organisation; Rattus norvegicus (Rat) FE65, a transcription-factor activator expressed preferentially in liver; Nicotiana tabacum (Common tobacco) DB10 protein, amongst others.
