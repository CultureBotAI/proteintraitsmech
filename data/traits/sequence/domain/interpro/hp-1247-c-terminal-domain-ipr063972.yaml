identifier: InterPro:IPR063972
label: "HP_1247, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of HP_1247 from Helicobacter pylori, a protein that may function as the equivalent of DNA polymerase III delta subunit (HolA). This domain may consist of six α-helices.
