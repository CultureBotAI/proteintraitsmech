identifier: InterPro:IPR039462
label: "Nucleoporin Nup159/Nup146, N-terminal"
definition: >-
  This entry represents the N-terminal domain of nucleoporin Nup146 from Schizosaccharomyces pombe and Nup159 from Saccharomyces cerevisiae. These are components of the nuclear pore complex (NPC), which is the only means by which macromolecules enter and exit the nucleus. Nup146 and Nup159 contain Phe-Gly (FG) repeats. Nup159 is part of the Nup82 subcomplex required for mRNA export. Nup159 is important for nuclear export of poly(A)+ RNA, pre-ribosome, and proteins. The N-terminal domain of Nup159 has a seven-bladed, β-propeller structure which functions in mRNA export by tethering the helicase Dbp5 to the nuclear pore. This domain is also found in Nuclear pore complex protein Nup214 from animals which is part of the nuclear pore complex and has a critical role in nucleocytoplasmic transport.
