identifier: InterPro:IPR048526
label: WipA, alpha-helical hairpin
definition: >-
  This entry represents the α-helical hairpin of WipA protein, from Legionella pneumophila ( ) and related bacterial proteins, which adopts a coiled-coil structure. WipA is one of the effector proteins that is involved in its pathogenicity. This domain interacts with the phosphatase domain of another WipA molecule to form a dimer ( ). It has been suggested that it mediates protein-protein interactions with a tyrosine- phosphorylated host target.
