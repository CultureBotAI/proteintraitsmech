identifier: InterPro:IPR041124
label: "Sensor histidine kinase (AbfS), sensor domain"
definition: >-
  This is the sensor domain of sensor histidine kinase (AbfS) present in Cellvibrio japonicus ( ). AbfS forms part of the AbfR/S two-component system, which is needed to activate the expression of the suite of enzymes that remove the numerous side chains from xylan. The overall fold of the sensor domain is that of a classical Per Arndt Sim domain. This domain binds xylotriose and xylobiose.
