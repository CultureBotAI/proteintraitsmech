identifier: InterPro:IPR007959
label: "Dinoflagellate luciferase, N-terminal"
definition: >-
  Proteins in this entry belong to a family of dinoflagellate luciferase and luciferin binding proteins. Luciferase is involved in catalysing the light emitting reaction in bioluminescence and luciferin binding protein (LBP) is known to bind to luciferin (the substrate for luciferase) to stop it reacting with the enzyme and therefore switching off the bioluminescence function. The expression of these two proteins is controlled by a circadian clock at the translational level, with synthesis and degradation occurring on a daily basis. This entry consists of a presumed N-terminal domain that is conserved between dinoflagellate luciferase and luciferin binding proteins. This domain is not, however, the catalytic part of the protein. It has been suggested that this region may mediate an interaction between LBP and Luciferase or their association with the vacuolar membrane.
