identifier: InterPro:IPR062870
label: "Myeloma-overexpressed gene protein, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of MYEOV (myeloma- overexpressed gene protein), found in primates. MYEOV is a proto-oncogene overexpressed in multiple myeloma cells and also associated with gastric adenocarcinoma, colon cancer and non-small cell lung cancer progression. The protein has been implicated in promoting cancer cell invasion, proliferation and migration. However the specific function hasn't been determined yet.
