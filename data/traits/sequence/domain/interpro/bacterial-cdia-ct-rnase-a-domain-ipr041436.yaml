identifier: InterPro:IPR041436
label: "Bacterial CdiA-CT RNAse A domain"
definition: >-
  Contact-dependent growth inhibition (CDI) is an important mechanism of inter-bacterial competition found in many Gram-negative pathogens. CDI+ cells express cell-surface CdiA proteins that bind neighbouring bacteria and deliver C-terminal toxin domains (CdiA-CT) to inhibit target-cell growth. Structure analysis of CdiA-CT shows that it adopts the same fold (with two β-sheets forming an overall kidney shape) as angiogenin and other RNase A paralogs, but the toxin does not share sequence similarity with these nucleases and lacks the characteristic disulfide bonds of the superfamily. Furthermore, structural comparison analysis identified human angiogenin, Rana pipiens protein P-30 (onconase) and mouse pancreatic ribonuclease (RNase 1) as the closest structural homologs of CdiA-CT.
