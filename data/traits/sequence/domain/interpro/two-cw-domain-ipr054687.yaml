identifier: InterPro:IPR054687
label: "Two-CW domain"
definition: >-
  The two-CW domain is a bacterial domain of up to 81-residues in its long form that shows strongly conserved motifs with six invariant Cys residues. A shorter form exists, with gaps at both sides of the motifs, that includes the third invariant Cys. The domain is named for CW dipeptides in the two strongest motifs, the N-terminal NCWEWxxCGREP and the central GRxCW. The domain may comprise the full length of a protein, or it may appear in much longer proteins. The function is unknown.
