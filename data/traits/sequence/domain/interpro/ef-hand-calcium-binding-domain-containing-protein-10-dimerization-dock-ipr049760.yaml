identifier: InterPro:IPR049760
label: "EF-hand calcium-binding domain-containing protein 10, dimerization/docking domain"
definition: >-
  This entry represents the N-terminal dimerization/docking (D/D) domain found in human EF-hand calcium-binding domain-containing protein 10 (EFCAB10, ) and similar sequences mainly from animals. This domain has a high sequence similarity to the dimerization/docking (D/D) domains of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1.
