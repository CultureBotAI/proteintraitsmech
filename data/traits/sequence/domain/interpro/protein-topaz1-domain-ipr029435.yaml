identifier: InterPro:IPR029435
label: "Protein TOPAZ1 domain"
definition: >-
  This domain is found in protein TOPAZ1, which may play an important role in germ cell development. Homology suggests that it is a putative aspartate racemase. Protein TOPAZ1 was previously called testis and ovary-specific PAZ domain-containing protein 1, but the name was changed to Protein TOPAZ1 as it does not contain a PAZ domain.
