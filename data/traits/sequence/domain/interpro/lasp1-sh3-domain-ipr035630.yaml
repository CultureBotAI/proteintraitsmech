identifier: InterPro:IPR035630
label: "Lasp1, SH3 domain"
definition: >-
  Lasp1 (LIM and SH3 domain protein 1) is a cytoplasmic protein that binds focal adhesion proteins and is involved in cell signaling, migration, and proliferation. It is overexpressed in several cancer cells, including breast, ovarian, bladder, and liver. In some cancer cells, it can be found in the nucleus; its degree of nuclear localization correlates with tumour size and poor prognosis. Lasp1 is a 36kDa protein containing an N-terminal LIM domain, two nebulin repeats, and a C-terminal SH3 domain.
