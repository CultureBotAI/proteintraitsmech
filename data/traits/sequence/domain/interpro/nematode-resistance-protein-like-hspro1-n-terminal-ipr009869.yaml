identifier: InterPro:IPR009869
label: Nematode resistance protein-like HSPRO1, N-terminal
definition: >-
  This entry represents the N terminus (approximately 180 residues) of plant HSPRO1, which is believed to confer resistance to nematodes. Proteins containing this domain also include HSPRO2, which is involved in basal resistance.
