identifier: InterPro:IPR004080
label: Foot-and-mouth disease virus VP1 coat
definition: >-
  The complete nucleotide sequence of cDNA coding for the structural capsid polypeptides of Foot-and-mouth disease virus (FMDV) has been determined. The FMDV capsid is composed of 60 icosahedral units, each of which comprises one copy each of proteins VP1, VP2, VP3 and VP4. Specific enzymatic cleavages in vivo yield mature proteins. The VP1 coat protein contains the main antigenic determinants of the virion, and hence changes in its sequence must be responsible for the high antigenic variability of the virus. The structure of FMDV has been determined to 2.9A resolution by means of X-ray diffraction. The virus shares similarities with other picorna-viruses, but also reveals unique features. The canyon found in other picornaviruses is absent, which has important implications for cell attachment. The most immunogenic portion of the capsid, which acts as a potent peptide vaccine, forms a disordered protrusion on the virus surface.
