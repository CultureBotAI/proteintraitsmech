label: "TraH, VirB8-like domain"
definition: >-
  This entry represents the VirB8-like domain present in TraH from Enterococcus faecalis ( ) and similar sequences from Bacilli. TraH is part of the type IV secretion system (T4SS). This domain shows structural similarity to the VirB8 domain ( ).
