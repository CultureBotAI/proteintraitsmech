identifier: InterPro:IPR060161
label: "Receptor-type tyrosine-protein phosphatase O, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of human receptor-type tyrosine protein phosphatase O (PTPRO) and related proteins from vertebrates. PTPRO is characterised by its tyrosine phosphatase activity. It plays a crucial role in regulating the relationship between glomerular pressure and filtration rate, which is achieved through its impact on podocyte structure and function. This protein is part of the protein-tyrosine phosphatase family, specifically within the receptor class 3 subfamily. These proteins, when phosphorylated, interact with proteins such as FYN and GRB2, indicating their involvement in signaling pathways.
