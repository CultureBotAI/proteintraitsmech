identifier: InterPro:IPR061996
label: "IHD1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the IHD1 family of GPI-anchored cell wall proteins found in Candida species. Family members include IHD1 (induced during hyphae development protein 1) and several PGA (predicted GPI-anchored) proteins. IHD1 was identified in the cell wall proteome of Candida albicans and is part of a core filamentation response network induced during the yeast-to-hyphal transition. Members contain a signal peptide, this N-terminal domain, a disordered region and a C-terminal GPI-anchor signal. The specific function of this domain remains to be determined.
