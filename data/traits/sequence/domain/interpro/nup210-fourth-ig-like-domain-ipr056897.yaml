identifier: InterPro:IPR056897
label: "NUP210, fourth Ig-like domain"
definition: >-
  This is the fourth Ig-like domain of NUP210 and its homologues. NUP210 is essential for nuclear pore assembly and fusion, nuclear pore spacing, as well as for its structural integrity. NUP210 is composed of multiple immunoglobulin-like (Ig-like) domains and forms a ring around the NPC within the NE lumen. There are eight copies of NUP210 per spoke. NUP210 is the only NUP that primarily resides in the NE lumen. This protein is not required for faithful NPC assembly.
