identifier: InterPro:IPR013173
label: DNA primase DnaG, DnaB-binding domain
definition: >-
  Eubacterial DnaG primases interact with several factors to form the replisome. One of these factors is DnaB, a helicase. This domain has been demonstrated to be responsible for the interaction between DnaG and DnaB. This domain has a multi-helical structure that forms an orthogonal bundle.
