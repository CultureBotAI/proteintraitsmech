identifier: InterPro:IPR032799
label: "Xylanase inhibitor, C-terminal"
definition: >-
  This entry represents a domain found C-terminal in some aspartic proteinases and in xylanase inhibitors. The activity of these proteins is vital for plant-survival as xylanase produced by phytopathogens destroys plant cells. In TAXI-type inhibitors, this domain is important for the differences in xylanase specificity.
