label: "Rv2993c-like, N-terminal"
definition: >-
  This entry represents the N-terminal 50 amino acids of a group of bacterial proteins, including protein Rv2993c from Mycobacterium tuberculosis. Some members of this entry are annotated as fumarylacetoacetate hydrolase-containing enzymes.
