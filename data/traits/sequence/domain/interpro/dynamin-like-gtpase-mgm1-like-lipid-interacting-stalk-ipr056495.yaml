identifier: InterPro:IPR056495
label: "Dynamin-like GTPase MGM1-like, lipid interacting stalk"
definition: >-
  This is the lipid-interacting stalk (LIS) domain of Dynamin-like GTPase MGM1, mitochondrial from Saccharomyces cerevisiae and similar fungal sequences. MGM1 is essential for normal mitochondrial morphology by mediating fusion of the mitochondrial inner membranes. This domain has been shown to be implicated in lipid binding with several key lysine residues.
