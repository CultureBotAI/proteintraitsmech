identifier: InterPro:IPR034841
label: DPE2, CBM20 domain 2
definition: >-
  DPE2 is a transglucosidase that is essential for the cytosolic metabolism of maltose in plant leaves at night. Maltose is an intermediate on the pathway from starch to sucrose and DPE2 is thought to metabolize the maltose that is exported from the chloroplast. DPE2 has two N-terminal CBM20 starch binding domains as well as a C-terminal amylomaltase (4-alpha-glucanotransferase) catalytic domain. DPE1, the plastid version of this enzyme, has a transglucosidase domain that is similar to that of DPE2 but lacks the N-terminal carbohydrate-binding domains.
