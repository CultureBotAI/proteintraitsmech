identifier: InterPro:IPR059008
label: "ABTB2/3, histone-like domain"
definition: >-
  This entry represents a histone-like domain found towards the N-terminal of Ankyrin repeat and BTB (POZ) domain containing proteins (ABTB2/3). The Ankyrin repeat and BTB/POZ domain-containing protein family is characterised by the presence of ankyrin repeats and a BTB/POZ domain. These proteins may play a role in cellular processes such as the initiation of hepatocyte growth, as suggested by some members of the family. The ankyrin repeats are known for mediating protein-protein interactions, while the BTB/POZ domain is involved in protein complex formation and transcriptional regulation. The combination of these domains suggests that these proteins may be involved in regulatory functions within the cell, potentially influencing cell growth and development.
