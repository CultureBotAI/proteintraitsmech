identifier: InterPro:IPR039686
label: FANCM/Mph1-like, insert domain
definition: >-
  This entry includes a group of evolutionarily conserved ATP-dependent DNA helicases/translocases including human FANCM (Fanconi anemia group M protein) and its homologues, such as Mph1 from S. cerevisiae and Fml1/2 from S. pombe. FANCM is part of the FA complex that repair the interstrand cross-linking (ICL) lesions and coordinates activities of the downstream DNA repair pathway including nucleotide excision repair, translesion synthesis, and homologous recombination. It also plays a critical role in the replication stress response. Mph1 can unwind Rad51 D-loops and extended D-loops. It has been shown to be regulated by the Smc5/6 complex. This entry represents the insert domain (ID) of FANCM and related proteins. This domain, which shows an α-helical structure, is located in the N-terminal SF2 helicase domain, which contains three parts.
