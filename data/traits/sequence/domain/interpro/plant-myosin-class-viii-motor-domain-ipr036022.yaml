identifier: InterPro:IPR036022
label: "Plant myosin class VIII, motor domain"
definition: >-
  These plant-specific type VIII myosins has been associated with endocytosis, cytokinesis, cell-to-cell coupling and gating at plasmodesmata. The catalytic (head) domain has ATPase activity and belongs to the larger group of P-loop NTPases.
