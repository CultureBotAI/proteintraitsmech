identifier: InterPro:IPR034214
label: "Ba3-like heme-copper oxidase subunit II, C-terminal"
definition: >-
  The ba3 family of heme-copper oxidases are transmembrane protein complexes in the respiratory chains of prokaryotes and some archaea, which catalyze the reduction of O 2 and simultaneously pump protons across the membrane. It has been proposed that archaea acquired heme-copper oxidases through gene transfer from Gram-positive bacteria. The ba3 family contains oxidases that lack the conserved residues that form the D- and K-pathways in CcO and ubiquinol oxidase. Instead, they contain a potential alternative K-pathway. Additional proton channels have been proposed for this family of oxidases but none have been identified definitively. The ba3-oxidase contains three subunits. This entry represents the C-terminal domain of subunit II.
