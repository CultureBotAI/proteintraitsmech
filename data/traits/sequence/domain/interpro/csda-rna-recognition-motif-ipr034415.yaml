identifier: InterPro:IPR034415
label: CsdA, RNA recognition motif
definition: >-
  This entry represents the C-terminal RRM homology domain of E. coli CsdA (also knwon as DeaD or W2), a member of the DbpA subfamily of prokaryotic DEAD-box rRNA helicases that have been implicated in translational regulation, ribosome biogenesis and the regulation of mRNA stability and degradation. In vitro, CsdA exhibits helicase activities which unwind RNA duplexes, provided they have a 5' or 3' single-stranded extension or a hairpin structure attached to them. It contains two N-terminal ATPase catalytic domains and a C-terminal RNA binding domain, an atypical RNA recognition motif (RRM). The catalytic domains bind to nearby regions of RNA to stimulate ATP hydrolysis and disrupt RNA structures. The C-terminal domain is responsible for the high-affinity RNA binding.
