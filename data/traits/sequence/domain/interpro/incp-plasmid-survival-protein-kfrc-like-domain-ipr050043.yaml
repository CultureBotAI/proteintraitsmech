identifier: InterPro:IPR050043
label: "IncP plasmid survival protein KfrC-like domain"
definition: >-
  This entry represents a domain found at the C-terminal of Protein TraN from Escherichia coli and Pseudomonas aeruginosa and in similar proteins from proteobacteria. It is also found in KfrC proteins, which along with KfrA and KfrB is encoded in plasmid R751, and are all found to be essential for its survival. These proteins seem to form a complex KfrABC complex that may be an important component in the organisation and control of the plasmid clusters that seem to form the segregating unit in bacterial cells. Some members of this group have an additional phosphoribosyltransferase-like N-terminal domain ( ).
