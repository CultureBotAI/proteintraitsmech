label: "NEDD4-binding protein 2, DUF7816"
definition: >-
  This domain is found towards the C terminus of human NEDD4-binding protein 2 (N4BP2), which has 5'-polynucleotide kinase and nicking endonuclease activity and may play a role in DNA repair or recombination. This domain is predicted to adopt an α configuration. Its specific function is unknown. It is normally found N-terminal to .
