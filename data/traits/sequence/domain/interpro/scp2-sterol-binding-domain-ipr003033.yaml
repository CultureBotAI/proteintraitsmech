identifier: InterPro:IPR003033
label: "SCP2 sterol-binding domain"
definition: >-
  This domain is involved in binding sterols, and is found in proteins such as SCP2. This domain has a 3-layer α/β/α fold, composed of α/β(3)/(crossover)/β/(α)/β.
