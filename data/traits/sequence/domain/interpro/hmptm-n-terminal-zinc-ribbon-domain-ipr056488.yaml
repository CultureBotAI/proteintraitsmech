identifier: InterPro:IPR056488
label: "HMPTM, N-terminal zinc ribbon domain"
definition: >-
  This domain is found in 7,8-dihydro-6-hydroxymethylpterin dimethyltransferase (HMPTM) and related proteins from bacteria and archaea. HMPTM is involved in catalysing the methylation at C-7 and C-9 of 7,8-dihydro-6-hydroxymethylpterin, a common intermediate in both folate and MPT biosynthesis. The domain represented by this entry is predicted to adopt a zinc β-ribbon fold. It contains three invariant cysteines and one histidine arranged in two CxxC and CxxH sequence motifs.
