identifier: InterPro:IPR032733
label: "HAUS augmin-like complex subunit 3, N-terminal"
definition: >-
  This domain is found in the HAUS augmin-like complex subunit 3 (HAUS3). The HAUS-augmin complex (made up of eight subunits) interacts with gamma-TuRC, and attenuation of this interaction severely impairs spindle MT generation. The HAUS complex is required for mitotic spindle assembly and for maintenance of centrosome integrity.
