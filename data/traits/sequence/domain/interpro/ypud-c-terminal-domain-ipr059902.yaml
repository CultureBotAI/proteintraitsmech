identifier: InterPro:IPR059902
label: "YpuD, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of YpuD proteins. The domain is a putative DNA-binding domain found in bacteria, predominantly in Bacillota with representatives in Bacilli class, including Bacillaceae. The function of this domain remains to be determined.
