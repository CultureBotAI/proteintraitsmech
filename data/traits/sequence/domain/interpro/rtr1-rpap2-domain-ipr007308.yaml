identifier: InterPro:IPR007308
label: "Rtr1/RPAP2 domain"
definition: >-
  This entry represents a domain found in RPAP2 (RNAP II associated polypeptide) protein and the yeast Rtr1 proteins. It has been suggested that this family of proteins are regulators of core RNA polymerase II function.
