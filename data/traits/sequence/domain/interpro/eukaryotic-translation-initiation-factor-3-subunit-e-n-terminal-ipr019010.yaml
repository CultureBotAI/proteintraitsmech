identifier: InterPro:IPR019010
label: "Eukaryotic translation initiation factor 3 subunit E, N-terminal"
definition: >-
  This entry represents the N-terminal domain of the eukaryotic translation initiation factor 3 subunit E. EIF3 is required in protein synthesis in mammalian cells and, together with other initiation factors, stimulates binding of initiator methionyl-tRNAi and mRNA to the 40S ribosomal subunit to form the 48 S initiation complex. The eIF3 complex also prevents premature association of the 40 and 60 S ribosomal subunits and interacts with other initiation factors involved in start codon selection. EIF3 has at least 13 protein components (eIF3a-m or 1-13), where subunits h, i, k, and m are likely to be on the periphery of the complex. Subunit 6 is produced by the int6 gene, one of the frequent integration sites for mouse mammary tumor viruses.
