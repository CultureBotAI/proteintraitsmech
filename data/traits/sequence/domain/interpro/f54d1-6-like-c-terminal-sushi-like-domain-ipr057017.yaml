identifier: InterPro:IPR057017
label: "F54D1.6-like, C-terminal Sushi-like domain"
definition: >-
  This domain is found towards the C-terminal end of the uncharacterised protein F54D1.6 from Caenorhabditis elegans and similar sequences from worms. It is often found associated to . This domain has a detectable similarity to Sushi domains and is predicted to adopt a similar structure.
