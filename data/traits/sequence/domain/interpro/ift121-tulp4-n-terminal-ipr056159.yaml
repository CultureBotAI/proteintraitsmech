identifier: InterPro:IPR056159
label: "IFT121/TULP4, N-terminal"
definition: >-
  This entry represents a β-propeller domain found at the N-terminal of IFT121 (which corresponds to the first one) and TULP4 proteins. TULP4 may be a substrate-recognition component of a SCF-like ECS (Elongin-Cullin-SOCS-box protein) E3 ubiquitin ligase complex. IFT-A polymerises and interacts with IFT-B, and uses an array of β-propeller and TPR domains to create 'carriages' of the IFT train that engage TULP adaptor proteins. Proteins in this entry are part of the non-core subcomplex, together with IFT43 and IFT139. IFT121 (also known as WDR35) is a component of the IFT complex A (IFT-A), which is required for retrograde ciliary transport and entry into cilia of G protein-coupled receptors that is involved in ciliogenesis and ciliary protein trafficking. This protein plays a role in cilia assembly and maintenance. IFT121 contains a zinc finger with rubredoxin-like fold. Knock-out IFT121 cells showed defective retrograde trafficking within cilia.
