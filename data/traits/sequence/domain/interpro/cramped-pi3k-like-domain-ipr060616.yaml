identifier: InterPro:IPR060616
label: "Cramped, PI3K-like domain"
definition: >-
  This entry represents a domain with a phosphatidylinositol 3-kinase (PI3K) catalytic subunit-like fold found in cramped and cramped-like animal proteins. Members of this group are nuclear proteins involved in chromatin binding and DNA binding. Human CRAMP1 is a 1269 amino acid protein with a SANT domain at positions 161-224 and multiple disordered regions. Drosophila cramped is involved in Polycomb group gene regulation and can act as a modifier of position effect variegation. The proteins are expressed during development and are involved in transcriptional regulation. The domain contains a large disordered region. Its specific function is unknown.
