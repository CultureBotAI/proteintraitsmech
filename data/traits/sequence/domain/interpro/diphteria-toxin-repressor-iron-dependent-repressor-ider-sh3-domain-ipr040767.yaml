identifier: InterPro:IPR040767
label: "Diphteria toxin repressor/Iron-dependent repressor IdeR, SH3 domain"
definition: >-
  This is an SH3 domain which can be found in diphtheria toxin repressor (DtxR) and the closest homologue Iron-dependent repressor IdeR, iron-responsive metalloregulators that control iron uptake. DtxR from Corynebacterium diphtheriae regulates the expression of the gene on corynebacteriophages that encodes diphtheria toxin (DT). Other genes regulated by DtxR include those that encode proteins involved in siderophore-mediated iron uptake.
