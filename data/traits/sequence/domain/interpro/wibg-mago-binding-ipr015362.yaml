identifier: InterPro:IPR015362
label: "WIBG, Mago-binding"
definition: >-
  Partner of Y14 and mago (PYM, also known as WIBG) is a key regulator of the exon junction complex (EJC), a multiprotein complex that associates immediately upstream of the exon-exon junction on mRNAs and serves as a positional landmarks for the intron exon structure of genes and directs post-transcriptional processes in the cytoplasm such as mRNA export, nonsense-mediated mRNA decay (NMD) or translation. The N-terminal domain of PYM adopts a small globular all-β-domain structure, with a three-stranded β-sheet and a contiguous β-hairpin. It binds to both Mago and Y14.
