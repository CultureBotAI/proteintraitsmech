identifier: InterPro:IPR020980
label: "Menbrane protein HflK, N-terminal"
definition: >-
  HflK is a bacterial membrane protein which is thought, together with the HflC protein, to form a membrane protease complex whose activity is modulated by the GTPase HflX. This entry represents the N-terminal, membrane-spanning, region of of HflK responsible for anchoring the protein in the bacterial membrane. It is often found in association with .
