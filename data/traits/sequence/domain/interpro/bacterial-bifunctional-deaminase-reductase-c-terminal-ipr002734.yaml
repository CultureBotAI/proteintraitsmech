identifier: InterPro:IPR002734
label: Bacterial bifunctional deaminase-reductase, C-terminal
definition: >-
  This domain is found in the C terminus of the bifunctional deaminase-reductase of Escherichia coli, Bacillus subtilis and other bacteria in combination with that catalyses the second and third steps in the biosynthesis of riboflavin, i.e., the deamination of 2,5-diamino-6-ribosylamino-4(3H)-pyrimidinone 5'-phosphate (deaminase) and the subsequent reduction of the ribosyl side chain (reductase). The domain is also present in some HTP reductases from archaea and fungi.
