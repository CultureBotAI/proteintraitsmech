identifier: InterPro:IPR042934
label: "B(0)AT2, solute-binding domain"
definition: >-
  B(0)AT2 (also called SBAT1, v7-3, NTT7-3) is a high-affinity Na(+)-dependent transporter for large neutral amino acids, including leucine, isoleucine, valine, proline and methionine. Human SBAT1 is encoded by the SLC6A15 gene, a susceptibility gene for major depression. SBAT1 is expressed in brain, and may have a role in transporting neurotransmitter precursors into neurons. B(0)AT2 belongs to the solute carrier 6 (SLC6) transporter family.
