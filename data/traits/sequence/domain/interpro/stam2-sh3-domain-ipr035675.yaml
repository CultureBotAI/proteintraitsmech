identifier: InterPro:IPR035675
label: "STAM2, SH3 domain"
definition: >-
  This entry represents the SH3 domain of STAM2. Signal transducing adapter molecule 2 (STAM2), a subunit of the ESCRT-0 complex, is an endosomal protein acting as a regulator of receptor signaling and trafficking. It contains an N-terminal VHS domain, UIM (ubiquitin-interacting motif), SH3, coiled-coil (CC), SSM (STAM-specific motif) and C-terminal ITAM (immunoreceptor tyrosine-based activation motif) domains. It may play a regulatory role in the endosomal sorting of ubiquitinated membrane proteins. It is highly expressed in neurons, where it is localized in the nucleus. STAMs were discovered as proteins that are highly phosphorylated following cytokine and growth factor stimulation. They function in cytokine signalling and surface receptor degradation, as well as regulate Golgi morphology. They associate with many proteins including Jak2 and Jak3 tyrosine kinases, Hrs, AMSH, and UBPY. STAM adaptor proteins contain VHS, ubiquitin interacting (UIM), and SH3 domains.
