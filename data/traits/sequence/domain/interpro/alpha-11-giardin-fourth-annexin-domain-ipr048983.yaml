identifier: InterPro:IPR048983
label: "Alpha-11 giardin, fourth annexin domain"
definition: >-
  This entry represents the fourth annexin domain of Alpha-11 giardin, an unusual annexin from Giardia lamblia. Alpha-11 giardin is a member of the multi-gene alpha-giardin family in the intestinal protozoan, Giardia lamblia. This gene family shares an ancestry with the annexin superfamily, whose common characteristic is calcium-dependent binding to membranes that contain acidic phospholipids.
