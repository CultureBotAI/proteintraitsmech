identifier: InterPro:IPR057255
label: "P5A-ATPase, transmembrane helical hairpin"
definition: >-
  This entry represents a domain found in homologues of endoplasmic reticulum P5A-ATPase (Spf1 in yeast; ATP13A1 in humans). It consists of two transmembrane helices that form a helical hairpin. This domain seems to be loosely associated with the core transmembrane domain. P5A-ATPase acts as a dislocase that mediates the ATP-dependent extraction of mislocalized mitochondrial transmembrane proteins from the endoplasmic reticulum membrane. It interacts directly with the TM of the mitochondrial tail-anchored proteins.
