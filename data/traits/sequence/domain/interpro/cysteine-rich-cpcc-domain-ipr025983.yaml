identifier: InterPro:IPR025983
label: "Cysteine-rich CPCC domain"
definition: >-
  This domain is functionally uncharacterised. It is found in bacteria, archaea, eukaryotes and viruses. It contains six conserved cysteines and a conserved CPCC sequence motif.
