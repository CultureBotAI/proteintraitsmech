identifier: InterPro:IPR048035
label: "Dual specificity protein phosphatase 8, dual specificity phosphatase domain"
definition: >-
  This entry represents the dual specificity phosphatase domain of Dual specificity protein phosphatase 8 (DUSP8), also called DUSP hVH-5 or M3/6, which functions as a protein-serine/threonine phosphatase ( ) and a protein-tyrosine-phosphatase ( ). Like other mitogen-activated protein kinase (MAPK) phosphatases (MKPs), it deactivates its MAPK substrates by dephosphorylating the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing in their activation sites. It belongs to the class III subfamily and is a JNK/p38-selective cytoplasmic MKP. DUSP8 controls basal and acute stress-induced ERK1/2 signalling in adult cardiac myocytes, which impacts contractility, ventricular remodelling, and disease susceptibility. It also plays a role in decreasing ureteric branching morphogenesis by inhibiting p38MAPK. DUSP8 contains an N-terminal Cdc25/rhodanese-like domain ( ), which is responsible for MAPK-binding, and a C-terminal catalytic dual specificity phosphatase domain.
