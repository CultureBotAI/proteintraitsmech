identifier: InterPro:IPR054243
label: "Domain of unknown function DUF6970"
definition: >-
  This domain is found in uncharacterised proteins from bacteria and protostome animals. It is predicted to fold into a curved meander β-sheet. It contains four highly conserved cysteine residues, two of which are predicted to cluster together in space and are likely to be involved in disulfide bond formation.
