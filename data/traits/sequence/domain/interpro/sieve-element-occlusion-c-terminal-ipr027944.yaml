identifier: InterPro:IPR027944
label: "Sieve element occlusion, C-terminal"
definition: >-
  This entry represents the C terminus of the sieve element occlusion (SEO) proteins (also known as forisomes), which are phloem proteins accumulated during sieve element differentiation. This domain seems to be non-essential for dimerisation during forisome assembly.
