identifier: InterPro:IPR060259
label: "Thioredoxin-like domain, nematodes"
definition: >-
  This entry represents a Thioredoxin-like domain at the C-terminal in uncharacterised Thioredoxin-domain containing proteins mostly found in nematodes. This domain belongs to the Thioredoxin-like superfamily . Members of this superfamily are small redox-active proteins that mediate thiol-disulfide exchange through a conserved active-site disulfide bond. They share a characteristic thioredoxin fold, consisting of a three-layer α/β/α sandwich with a central mixed β-sheet. These proteins typically function in redox regulation by cycling between oxidised and reduced forms.
