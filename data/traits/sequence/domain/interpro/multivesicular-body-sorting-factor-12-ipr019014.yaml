identifier: InterPro:IPR019014
label: Multivesicular body sorting factor 12
definition: >-
  Mvb12 is a subunit of the ESCRT-I core complex involved in ubiquitin-dependent sorting of proteins into the endosome. Mvb12 may regulate the interactions of ESCRT-I with cargo and other proteins of the ESCRT machinery to efficiently coordinate cargo sorting and release of ESCRT-I from the multivesicular body. The multivesicular body (MVB) protein-sorting pathway targets transmembrane proteins either for degradation or for function in the vacuole/lysosomes. The signal for entry into this pathway is monoubiquitination of protein cargo, which results in incorporation of cargo into luminal vesicles at late endosomes. Another crucial player is phosphatidylinositol 3-phosphate (PtdINS(3)P), which is enriched on early endosomes and on the luminal vesicles of MVBs. ESCRT (endosomal sorting complex required for transport)-I, -II and -III complexes are critical for MVB budding and sorting of monoubiquitinated cargo into the luminal vesicles. Various Ub-binding domains (UBDs), such as UIM, UEV and NZF are found in such machineries.
