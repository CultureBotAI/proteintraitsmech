identifier: InterPro:IPR035743
label: "PACSIN1/PACSIN2, SH3 domain"
definition: >-
  PACSIN1 and PACSIN2 belong to the PACSIN family that contains a N-terminal F-BAR (FCH-BAR) domain and a C-terminal SH3 domain. They are cytoplasmic phosphoproteins that play a role in vesicle formation and transport. PACSIN1 (also known as Syndapin-1) is upregulated upon differentiation into neuronal cells. The SH3 domain of PACSIN1 mediates activation of neural WASP (N-WASP), which is required to regulate actin polymerisation and is essential for proper neuromorphogenesis and cellular motility. Two phosphorylation sites within the F-BAR domain of PACSIN1 are used for membrane tubulation regulation.
