identifier: InterPro:IPR049366
label: "Rhamnogalacturonan lyase family 11, C-terminal domain"
definition: >-
  This is the eight-bladed β-propeller domain found at the C-terminal of Rhamnogalacturonan endolyase YesW and Rhamnogalacturonan exolyase YesX from Bacillus subtilis and other bacterial polysaccharide lyases from family 11 (RGL11). These proteins are responsible for an initial cleavage of the RG type I (RG-I) region of plant cell wall pectin. Additionally to this domain, they have a β-sheet domain at the N-terminal.
