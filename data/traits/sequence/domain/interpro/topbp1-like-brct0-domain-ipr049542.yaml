identifier: InterPro:IPR049542
label: "TopBP1-like, BRCT0 domain"
definition: >-
  Human TopBP1 consists of multiple copies of BRCT domains, with a triple tandem BRCT domains at the N-terminal (designated BRCT0, BRCT1 and BRCT2), also observed in ECT2 that may represent a new type of consecutive BRCT domains. This entry represents the first BRCT domain (BRCT0) of TopBP1. BRCT1/2 are included in . Although ECT2 and TopBP1 share a similar cylinder-like crystal structure and distribution of secondary structure, some α-helices exhibit different orientations, especially in the BRCT0 domain. TopBP1, also known as DNA topoisomerase II-beta-binding protein 1, or DNA topoisomerase II-binding protein 1, functions in DNA replication and damage response, acting as a scaffold protein. It binds double-stranded DNA breaks and nicks as well as single-stranded DNA. It has been shown to activate the ATR-ATRIP complex. TopBP1 contains eight copies of BRCT domain which specifically recognise and bind phosphorylated proteins, bringing proteins together into functional combinations.
