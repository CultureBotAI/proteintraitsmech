identifier: InterPro:IPR043916
label: "Minor capsid protein P8, central region"
definition: >-
  This entry, previously known as DUF5761, represents the central region of the minor capsid protein P8 found in PBCV-1 and related viruses. The central region of P8 folds into a wedge-shaped structure that consists of three short α-helices wrapped around a long α-helix. P8 and other minor capsid proteins contribute to the stability of the pentasymmetrons of the viral capsid.
