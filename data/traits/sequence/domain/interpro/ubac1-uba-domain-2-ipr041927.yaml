identifier: InterPro:IPR041927
label: "UBAC1, UBA domain 2"
definition: >-
  UBAC1 (also known as KPC2, or glialblastoma cell differentiation-related protein 1) is one of two subunits of Kip1 ubiquitination-promoting complex (KPC), a novel E3 ubiquitin-protein ligase that also contains KPC1 subunit and regulates the ubiquitin-dependent degradation of the cyclin-dependent kinase (CDK) inhibitor p27 at G1 phase. KPC2 contains a ubiquitin-like (UBL) domain and two ubiquitin-associated (UBA) domains. This entry represents the second UBA domain.
