label: "STAS domain"
definition: >-
  The STAS (Sulphate Transporter and AntiSigma factor antagonist) domain is found in the bacterial anti-sigma factor antagonists (ASA) and the C-terminal region of SLC26 (SulP) anion transporters. The activity of bacterial sigma transcription factors is controlled by a regulatory cascade involving an antisigma-factor, the antisigma-factor antagonist (ASA) and a phosphatase. The antisigma-factor binds to sigma and holds it in an inactive complex. The ASA can also interact with the anti-sigma-factor, allowing the release of the active sigma factor. As the antisigma-factor is a protein kinase, it can phosphorylate the antisigma antagonist on a conserved serine residue of the STAS domain. This phosphorylation inactivates the ASA that can be reactivated through dephosphorylation by a phosphatase. The STAS domain of the ASA SpoIIAA binds GTP and ATP and possesses a weak NTPase activity. Strong sequence conservation suggests that the STAS domain could possess general NTP-binding activity, and it has been proposed that the NTPs are likely to elicit specific conformational changes in the STAS domain through binding and/or hydrolysis. Resolution of the solution structure of the ASA SpoIIAA from Bacillus subtilis has shown that the STAS domain consists of a four-stranded β-sheet and four α-helices. The STAS domain forms a characteristic α-helical handle-like structure. The STAS domain of E. coli YchM protein, a SLC26 (SulP) family member, has been shown to interact with acyl carrier protein (ACP), which is an activated thiol ester carrier of acyl intermediates during fatty acid biosynthesis (FAB) and other acylation reactions. Malfunctions in members of the SLC26A family of anion transporters are involved in three human diseases: diastrophic dysplasia/achondrogenesis type 1B (DTDST…
