identifier: InterPro:IPR057311
label: "GreAB-C-like domain"
definition: >-
  This is a GreAB-C-like domain found mostly in the N-terminal of uncharacterised bacterial proteins. This domain has been found in antiviral immunity systems, where it forms a circular permuted domain embedded in TPR repeats. In these proteins, the GreAB-C domain is located at the C-terminal followed, usually, by a PIN domain with a variable N-terminal domain often harbouring effector domains. GreA and GreB are prokaryotic transcript cleavage factors that play a crucial role in regulating RNA polymerase (RNAP) transcript elongation. They have several key functions in preventing elongation arrest, improving transcription accuracy, and facilitating the transition from transcription initiation to elongation. They have a similar structural organisation and consist of two domains: a C-terminal globular and an extended N-terminal coiled-coil domain. Their structural features, particularly the coiled-coil domain, are essential for modifying the RNAP active site to perform these cleavage reactions.
