label: "Gp49, pectin lyase-like domain"
definition: >-
  This entry represents the β-helix repeats from the catalytic domain of tailspike Gp49 from phage LKA1 ( ). Gp49 binds and cleaves B-band LPS of Pseudomonas aeruginosa, reducing its virulence.
