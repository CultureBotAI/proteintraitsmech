identifier: InterPro:IPR028502
label: "E3 ubiquitin-protein ligase SH3RF3, RING finger, HC subclass"
definition: >-
  SH3RF3 (or POSH2) is a scaffold protein that function as an E3 ubiquitin-protein ligase. It contains an N-terminal RING finger domain and four SH3 domains. It belongs to the POSH family, which includes POSH1, POSH2 and POSH3. This entry represents the N-terminal C3HC4-type RING-HC finger of SH3RF3.
