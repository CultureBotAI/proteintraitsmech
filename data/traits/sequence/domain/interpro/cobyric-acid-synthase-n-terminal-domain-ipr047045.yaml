identifier: InterPro:IPR047045
label: "Cobyric acid synthase, N-terminal domain"
definition: >-
  Cobyric acid synthase (CobQ) plays a role in the cobalamin (vitamin B12) biosynthesis pathway. This enzyme catalyses amidations at positions B, D, E, and G on adenosylcobyrinic A,C-diamide in the biosynthesis of cobalamin. NH(2) groups are provided by glutamine, and one molecule of ATP is hydrogenolysed for each amidation. This entry represents the N-terminal domain of CobQ.
