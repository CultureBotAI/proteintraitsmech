identifier: InterPro:IPR062210
label: "HGL1/2, fifth domain"
definition: >-
  This entry represents a presumed domain found towards the C-terminal of Galactose/N-acetyl-D-galactosamine lectin heavy subunit 1/2 (HGL1/2) from Entamoeba histolytica and related sequences. HGL2 is a lectin which binds galactose and N-acetyl-D-galactosamine of host glycoproteins and thus mediates adhesion to host cells. It may mediate adherence to host colonic mucins, an essential step for pathogenic tissue invasion. This domain may have a structure consisting of five β-strands and two short α-helices (three antiparallel β-strands followed by a short α-helix and then a β/α/β fold).
