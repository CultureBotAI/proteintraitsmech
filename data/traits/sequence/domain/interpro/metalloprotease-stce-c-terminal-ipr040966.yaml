identifier: InterPro:IPR040966
label: "Metalloprotease StcE, C-terminal"
definition: >-
  This is the C-terminal domain found in mucin glycoproteins such as secreted protease of C1 esterase inhibitor from EHEC (StcE). This domain adopts a beta/gamma crystallin fold and has been shown to be dispensable for substrate binding. Furthermore, deletion analysis suggest that lack of the C-terminal resulted in impaired association with the cell surface.
