identifier: InterPro:IPR039899
label: "BET1, SNARE domain"
definition: >-
  This entry represents the SNARE domain of BET1-like protein. BET1-like protein (also known as Golgi SNARE with a size of 15kDa, GS15 or GOS-15) is a protein required for movement of vesicles with the Golgi. In one hypothesis of how proteins move through the Golgi, vesicles containing proteins are budded from one cisterna and then fuse with the next cisterna in the stack. The fusion of the vesicle to the cisterna membrane requires N-ethylmaleimide-sensitive factor attachment protein receptors (SNAREs). SNAREs on a transport vesicle are known as v-SNAREs, and those on the target compartment are known as t-SNAREs; the v-SNARE and a t-SNARE form a trans-SNARE complex. GS15 is a v-SNARE protein found in the medial-cisternae of the Golgi apparatus and it forms a complex with three t-SNAREs (Syntaxin5, GS28, and Ykt6) to form a distinct GS15/Syn5/GS28/Ykt6 SNARE complex. This complex is required for endoplasmic reticulum to Golgi transport and intra-Golgi transport.
