identifier: InterPro:IPR046453
label: Phage terminase large subunit GpA, ATPase domain
definition: >-
  This entry consists of several phage terminase large subunit proteins, including GpA (also known as TerL) from Bacteriophage lambda and from Enterobacteria phage P21, as well as related sequences from several bacterial species. The DNA packaging enzyme of Bacteriophage lambda, terminase, is a heteromultimer composed of a small subunit, gpNu1 involved in DNA recognition, and a large subunit, gpA involved in late stages of packaging, products of the Nu1 and A genes, respectively. Terminase is involved in the site-specific binding and cutting of the DNA in the initial stages of packaging. This large subunit is an ATPase required for viral DNA translocation into empty capsids and also acts as an endonuclease that cuts the viral genome from the concetamer to initiate and to end the packaging reaction. This entry represents the N-terminal domain, which shows DNA translocase (packaging) and ATPase activities.
