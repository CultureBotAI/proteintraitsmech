identifier: InterPro:IPR014874
label: "Staphylocoagulase, N-terminal, subdomain 1"
definition: >-
  This entry represents the N-terminal domain of staphylocoagulase. The C terminus contains a tandem repeat which does not seem to be required for the procoagulant activity. Staphylococcus aureus secretes a cofactor called staphylocoagulase. Staphylocoagulase is an extracellular protein that forms a complex with human prothrombin, and activates it without the usual proteolytic cleavages. The resulting complex directly initiates blood clotting.
