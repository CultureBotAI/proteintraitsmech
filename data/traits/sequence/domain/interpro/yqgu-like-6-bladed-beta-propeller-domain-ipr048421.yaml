identifier: InterPro:IPR048421
label: "YqgU-like, 6-bladed beta-propeller domain"
definition: >-
  This entry represents a β-propeller domain found in YqgU from B. subtilis ( ) and related bacterial proteins. The proteins containing this domain usually possess an N-terminal lipid attachment motif suggesting they are lipoproteins. The function of this domain is unknown.
