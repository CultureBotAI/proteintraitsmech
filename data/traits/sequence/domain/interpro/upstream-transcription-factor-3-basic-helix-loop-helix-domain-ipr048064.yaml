identifier: InterPro:IPR048064
label: "Upstream transcription factor 3, basic helix-loop-helix domain"
definition: >-
  This entry represents the basic helix-loop-helix (bHLH) domain found in USF3, also known as Basic helix-loop-helix domain-containing protein USF3, which is involved in the negative regulation of epithelial-mesenchymal transition, the process by which epithelial cells lose their polarity and adhesion properties to become mesenchymal cells with enhanced migration and invasive properties.
