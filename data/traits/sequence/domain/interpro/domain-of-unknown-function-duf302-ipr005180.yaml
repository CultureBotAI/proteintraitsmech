identifier: InterPro:IPR005180
label: "Domain of unknown function DUF302"
definition: >-
  This domain is found in poorly characterised set of proteins, including the putative fluoride ion transporter CrcB 1 and CrcB 2 (also known as FluC 1 and FluC 2) from Brucella sp. It normally occurs uniquely within a sequence, but is found as a tandem repeat ( ). It has an interesting phylogenetic distribution with the majority of examples in bacteria and archaea, but it is also found in some fungal proteins. The hypothetical protein TT1751 from Thermus thermophilus has a β-α-β(4)-α structural fold.
