identifier: InterPro:IPR058191
label: "Centrosome and spindle pole-associated protein 1, C-terminal"
definition: >-
  This domain is found at the C-terminal end of human Centrosome and spindle pole-associated protein 1 (CSPP1), which may play a role in cell-cycle-dependent microtubule organisation. This domain is predicted to show an α-helical configuration. This entry is specific to animal proteins.
