identifier: InterPro:IPR046986
label: "Growth factor receptor-bound protein 7, RA domain"
definition: >-
  Grb7 (growth factor receptor bound protein 7) is an adapter protein mediating signal transduction from multiple cell surface receptors to diverse downstream pathways. It contains a Ras-associating (RA) domain, a pleckstrin-homology (PH) domain, a family-specific BPS (between PH and SH2) region and a C-terminal SH2 domain. This entry represents the Ras-associating (RA) domain of Grb7.
