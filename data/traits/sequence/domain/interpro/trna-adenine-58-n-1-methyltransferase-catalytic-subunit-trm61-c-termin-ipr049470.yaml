identifier: InterPro:IPR049470
label: "tRNA (adenine(58)-N(1))-methyltransferase catalytic subunit TRM61, C-terminal"
definition: >-
  This entry represents the C-terminal domain of yeast tRNA (adenine(58)-N(1))-methyltransferase catalytic subunit TRM61 and similar proteins widespread among all cellular organisms. TRM61, also known as GCD14, catalyses the formation of N1-methyladenine at position 58 (m1A58) in initiator methionyl-tRNA. It is also required for repression of GCN4 mRNA translation by the upstream open reading frames (uORFs) under conditions of amino acid sufficiency. This domain adopts a class I MTase fold that consists of a seven-stranded mixed β-sheet sandwiched by helices.
