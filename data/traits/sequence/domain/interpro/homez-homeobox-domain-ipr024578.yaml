identifier: InterPro:IPR024578
label: "Homez, homeobox domain"
definition: >-
  Homez contains three atypical homeobox domains, two leucine zipper-like motifs and an acidic domain and belongs to the superfamily of homeobox-containing proteins. The presence of leucine zippers suggests that Homez can function as a homo or heterodimer in the nucleus. It is thought that the first leucine zipper and homeodomain 1 (HD1) of Homez is responsible for dimerisation and HD2 has a specific DNA-binding activity. Homez is also thought to function as a transcriptional repressor due to the acidic region in its C-terminal domain. Homez is involved in a complex regulatory network. This entry represents a homeobox domain found in Homez (HD3).
