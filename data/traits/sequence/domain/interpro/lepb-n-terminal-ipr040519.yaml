identifier: InterPro:IPR040519
label: "LepB, N-terminal"
definition: >-
  Rab GTPases constitute the largest family of small GTP-binding proteins that act as molecular switches in regulating vesicular transport in eukaryotic cells. LepB is a Rab GTPase-activating protein (GAP) effector found in Legionella pneumophila. This entry represents the N-terminal domain which is followed by a GAP domain.
