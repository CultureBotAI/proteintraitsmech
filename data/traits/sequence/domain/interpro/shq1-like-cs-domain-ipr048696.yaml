identifier: InterPro:IPR048696
label: "SHQ1-like, CS domain"
definition: >-
  This domain is found at the N-terminal of SHQ1 from yeast and its homologue from animals, including human SHQ1. SHQ1 is a factor required for the biogenesis and assembly of H/ACA small nucleolar ribonucleoparticle (snoRNP), which are essential for ribosomal RNA and telomerase RNA processing and metabolism. This protein contains two domains: an N-terminal CS (named after CHORD-containing proteins and SGT1) or HSP20-like domain and a C-terminal region called the Shq1 domain ( ). This entry represents the CS domain, which folds into a compact antiparallel β-sandwich made of two β-sheets with four and three β-strands, respectively, and a short α-helix.
