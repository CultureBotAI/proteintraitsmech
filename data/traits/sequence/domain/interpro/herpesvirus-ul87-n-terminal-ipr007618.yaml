identifier: InterPro:IPR007618
label: "Herpesvirus UL87, N-terminal"
definition: >-
  This domain is found at the N termini of some human herpesvirus U58 proteins, and some cytomegalovirus UL87 proteins. This region is always found N-terminal to the UL87, which has no known function.
