identifier: InterPro:IPR057259
label: "Ribosomal protein L19e, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of the large ribosomal subunit protein eL19 found in eukaryotes and archaea. This is an α-helical domain that assumes an orthogonal bundle topology.
