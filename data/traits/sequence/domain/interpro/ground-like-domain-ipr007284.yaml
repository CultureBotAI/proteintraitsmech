identifier: InterPro:IPR007284
label: "Ground-like domain"
definition: >-
  This group of proteins contain one or more copies of the ground-like domain, which are specific to C. elegans and C. briggsae. It has been proposed that the ground-like domain containing proteins may bind and modulate the activity of Patched-like membrane molecules, reminiscent of the modulating activities of neuropeptides.
