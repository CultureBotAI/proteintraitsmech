identifier: InterPro:IPR031740
label: "Cell division control protein 4, dimerisation domain"
definition: >-
  This is the dimerisation domain (D domain) of fungal cell division control protein 4 (Cdc4). Budding yeast Cdc4 is a substrate recognition component of a SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins.
