identifier: InterPro:IPR022174
label: "Nuclear receptor coactivator 4, N-terminal"
definition: >-
  This entry represents a region found towards the N-terminal of NCOA4 which according to structure predictions it may consist of a long helix combined with disordered segments. Nuclear receptor coactivator 4, also known as ARA70, is a coactivator for the androgen receptor (AR) and can function as a ligand-enhanced coactivator of PPARgamma. AR can suppress PPARgamma-ARA70 transactivation, suggesting cross-talk between PPARgamma- and AR-mediated responses in adipocytes. NCOA4 has been identified as a selective cargo receptor for the autophagic turnover of ferritinin, a critical process for regulation of iron homeostasis. This entry also includes Nuclear receptor coactivator 4-B from Xenopus laevis which inhibits activation of DNA replication origins, possibly by obstructing DNA unwinding via interaction with the MCM2-7 complex. This protein binds chromatin before initiation of DNA replication and detaches during replication.
