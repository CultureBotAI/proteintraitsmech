identifier: InterPro:IPR033798
label: "Uncharacterised protein, LodA-like"
definition: >-
  This domain is found in uncharacterised proteins similar to L-lysine epsilon-oxidase from Marinomonas mediterranea (see ). However, proteins containing this domain, such as Marme_1655, have been shown to possess glycine oxidase (GO) activity instead of lysine oxidase activity.
