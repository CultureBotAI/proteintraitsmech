identifier: InterPro:IPR053879
label: "HYDIN/VesB/CFA65-like, Ig-like domain"
definition: >-
  VesB is a serine protease that is secreted by the type II secretion system (T2S) in Vibrio cholerae. It efficiently cleaves a trypsin substrate, but not chymotrypsin and elastase substrates. It has been suggested to contribute to intestinal growth or pathogenesis, although is not the only factor required for intestinal survival. VesB can cleave the A subunit of cholera toxin, a process important for cholera toxin activation. It consists of a protease domain followed by a Ig-like domain, represented in this entry, which may be involved in one or more different functions such as stabilizing the protease domain, co-defining substrate specificity, binding to the bacterial surface and being part of a yet undefined secretion motif of the T2S system. This protein belongs to the chymotrypsin subfamily A (which includes mostly eukaryotic proteases), having a structure and specificity profile resembling that of eukaryotic trypsin-like proteases. This domain is also found in some eukaryotic protein, such as HYDIN and CFA65 from human (which contain repeated Ig-like domains).
