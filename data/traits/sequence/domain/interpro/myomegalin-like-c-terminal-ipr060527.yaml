identifier: InterPro:IPR060527
label: "Myomegalin-like, C-terminal"
definition: >-
  This domain is found towards the C-terminal end of human Myomegalin (PDE4DIP) and CDK5RAP2, and similar animal sequences. This domain is predicted to adopt an all-α configuration. PDE4DIP functions as an anchor sequestering component of the cAMP-dependent pathway to Golgi and/or centrosomes. It may participate in microtubule dynamics, promoting microtubule assembly, in an isoform-specific manner. CDK5RAP2 is a potential regulator of CDK5 activity via its interaction with CDK5R1. It plays a role in the spindle checkpoint activation by acting as a transcriptional regulator of both BUBR1 and MAD2 promoter. It regulates centrosomal maturation by recruitment of the gamma-tubulin ring complex (gTuRC) onto centrosomes.
