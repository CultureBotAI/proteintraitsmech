identifier: InterPro:IPR063191
label: "HNH endonuclease-associated, N-terminal domain"
definition: >-
  This entry represents an N-terminal domain of approximately 60 residues found in HNH endonuclease family proteins. The domain is found N-terminal to HNH nuclease domains ( , ). Many of these proteins are annotated as 5-methylcytosine-specific restriction endonucleases belonging to the McrA family, which are components of Type IV restriction-modification systems. Some members are annotated as CRISPR-associated endonucleases. This entry is found in bacteria, predominantly Actinomycetota and Pseudomonadota, with some plant members. The function of this domain remains to be determined.
