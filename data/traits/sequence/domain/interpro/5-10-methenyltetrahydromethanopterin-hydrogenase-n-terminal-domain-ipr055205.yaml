identifier: InterPro:IPR055205
label: "5,10-methenyltetrahydromethanopterin hydrogenase, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of 5,10-methenyltetrahydromethanopterin hydrogenase (HMD) and related proteins, an enzyme of the methanogenic energy metabolism. HMD is an iron-sulphur-cluster-free enzyme that contains an intrinsic CO ligand bound to iron. This domain has a Rossmann fold-like structure that contains a mononucleotide-binding site, which could harbour the GMP moiety of the cofactor.
