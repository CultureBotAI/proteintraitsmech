identifier: InterPro:IPR055209
label: "RsiG-like domain"
definition: >-
  This entry represents a domain found in the anti-sigma factor RsiG from Streptomyces and its homologues. RsiG binds and sequesters the sporulation-specific sigma factor WhiG in a fashion dependent on 3',5'-cyclic diguanylic acid (c-di-GMP). This domain adopts an α-helix and in Streptomyces self associates to form a dimer. This dimer binds c-di-GMP via two E(X)3-S(X)2-R(X)3-Q(X)-D repeat motifs, one on each helix. The complex RsiG-(c-di-GMP) binds to the sporulation-specific sigma factor, WhiG. Some homologues of RsiG contain a second helix and hence two c-di-GMP binding motifs.
