identifier: InterPro:IPR033880
label: "SPFH domain, YdjI-like"
definition: >-
  This is found in an uncharacterised family of proteins similar to stomatin, prohibitin, flotillin, HflK/C (SPFH) and podocin. The conserved domain common to the SPFH superfamily has also been referred to as the Band 7 domain.
