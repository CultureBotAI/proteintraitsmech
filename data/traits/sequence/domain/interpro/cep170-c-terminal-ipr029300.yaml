identifier: InterPro:IPR029300
label: "CEP170, C-terminal"
definition: >-
  This entry represents the C terminus of centrosomal protein of 170kDa (CEP170). Centrosomal protein of 170kDa (Cep170) plays a role in microtubule organisation. Human Cep170 is constantly expressed throughout the cell cycle, but phosphorylated during mitosis. Cep170 is a substrate of Polo-like kinase 1 (Plk1). It is associated with the mature mother centriole. Cep170 is also required for Kif2b-induced microtubule depolymerisation.
