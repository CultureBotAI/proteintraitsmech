identifier: InterPro:IPR054423
label: "Replitron, C-terminal domain"
definition: >-
  This entry represents a presumed domain found adjacent to the HUH endonuclease domain ( ) of the eukaryotic transposase encoded by Replitron, a fourth independent group of DNA transposons encoding HUH endonuclease that are found in genomes of green algae and plants, diverse stramenopiles including brown seaweeds and likely also cryptophytes and haptophytes, which suggests an ancient origin and broad eukaryotic distribution. According to structure predictions from AlphaFold DB, and structural similarities with related Rep HUH endonucleases ( ), this may be an oligomerisation domain.
