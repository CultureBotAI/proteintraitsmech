identifier: InterPro:IPR044416
label: PRDM6, PR/SET domain
definition: >-
  This entry represents the PR/SET domain found in PR domain zinc finger protein 6 (PRDM6, also known as PRISM). PRDM6 has been shown to co-localized with histone H4 and methylates H4-K20. It has also been shown to act as a transcriptional repressor by interacting with class I histone deacetylases and the G9a histone methyltransferase. It promotes the transition from differentiated to proliferative smooth muscle by suppressing differentiation and maintaining the proliferative potential of vascular smooth muscle cells. It also plays a role in endothelial cells by inhibiting endothelial cell proliferation, survival and differentiation. Mutations in the PRDM6 gene have been linked to nonsyndromic patent ductus arteriosus (PDA), which is a common congenital heart defect (CHD) with both inherited and acquired causes. The PRDM family members are characterised by the presence of a N-terminal PR (PRDI-BF1 and RIZ1 homology) domain followed by multiple zinc fingers which confer DNA binding activity. PR domains are only distantly related to the classical SET methyltransferase domains. They are involved in epigenetic regulation of gene expression through their intrinsic histone methyltransferase activity or via interactions with other chromatin modifying enzymes.
