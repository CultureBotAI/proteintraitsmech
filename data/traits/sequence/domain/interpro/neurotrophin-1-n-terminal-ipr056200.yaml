identifier: InterPro:IPR056200
label: "Neurotrophin 1, N-terminal"
definition: >-
  This domain is found N-terminal in fruit fly Neurotrophin 1 (NT) and related proteins from arthropods. NT binds to Toll-7 and probably acts as its ligand in promoting motor axon targeting and neuronal survival in the central nervous system (CNS). In larvae, NT is involved in the negative regulation of the tracheal immune response to bacterial infection by acting as a ligand for the Toll-related receptor Tollo. This domain is predicted to fold into a globular structure consisting of α-helices. It is frequently found N-terminal to .
