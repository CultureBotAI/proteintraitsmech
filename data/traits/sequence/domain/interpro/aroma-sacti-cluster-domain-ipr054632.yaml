identifier: InterPro:IPR054632
label: "Aroma-sacti cluster domain"
definition: >-
  The aroma-sacti cluster domain appears to be found exclusively in biosynthetic gene clusters (BGC) that include both a radical SAM/SPASM domain peptide maturase and RiPP precursor peptide. In some cases, the domain occurs in the N-terminal region of RiPP precursors with known sulfur-to-alpha-carbon (sacti) bonds formed between a Cys and a Gly residue (sequences included in ). Other members of the family (e.g. ) lack the critical Cys residues, but instead have an aromatic C-terminal residue, either Phe or Trp. Strangely, however, some members of the family have long N-terminal extensions with domain content suggesting MFS transporter activity.
