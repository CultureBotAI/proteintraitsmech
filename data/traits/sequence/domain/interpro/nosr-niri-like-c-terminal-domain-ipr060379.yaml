label: "NosR/NirI-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in Regulatory protein NosR and Protein NirI, found in bacteria. NosR is a transcriptional activator of the nitrous-oxide reductase gene NosZ.
