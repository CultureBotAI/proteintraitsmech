identifier: InterPro:IPR013728
label: "BT_3987-like, N-terminal domain"
definition: >-
  This domain, previously known as DUF1735, is found in a number of proteins mainly found in firmicutes, including BT_3987 and BT_3044 from Bacteroides thetaiotaomicron. BT_3987 displays hydrolytic activity against Hy-type N-glycans, probably initiating the degradation of this type of glycan in the human gut. BT_3044 is a glycan binding enzyme that could degrade oligosaccharides or even large molecular size glycans. This domain adopts a β-sandwich fold.
