identifier: InterPro:IPR039382
label: "Protease Do-like 1/8, PDZ domain"
definition: >-
  This entry represents the PDZ domain of Arabidopsis thaliana DEGP1 (also known as protease Do-like 1, chloroplastic, protein DEGRADATION OF PERIPLASMIC PROTEINS 1, DEGP PROTEASE 1 and DEG1) and DEGP8. DEGP1 is a serine protease that is required at high temperature and may be involved in the degradation of damaged proteins. DEGP8/Do-like 8 (chloroplastic), is a probable serine protease. It forms a hexamer with DEG5 in the thylakoid lumen and it is involved in the cleavage of photodamaged D2 protein of photosystem II (PSII). PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs).
