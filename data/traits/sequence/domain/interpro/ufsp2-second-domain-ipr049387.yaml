identifier: InterPro:IPR049387
label: "UFSP2, second domain"
definition: >-
  This domain is found in UFSP1 and UFSP2. It can be located N-terminal or in the middle (second) in UFSP2 proteins. UFM1-specific isopeptidase 1 and 2 (UFSP1 and UFSP2) are cysteine peptidases essential for both the processing and activation of ubiquitin-fold modifier 1 (Ufm1, ) and for releasing Ufm1 from conjugated cellular proteins. They belong to the MEROPS peptidase family C78, clan CA, and are 217 and 461 amino acids in length, respectively. UFSP2 contains an N-terminal extension featuring one or more C2H2-type zinc finger domains, which are implicated in protein-protein interactions. This protease is broadly conserved across multicellular organisms, including plants, nematodes, flies, and mammals, whereas UFSP1 is absent from plants and nematodes. As a cysteine protease, UFSP2 specifically recognises and hydrolyses the peptide bond at the C-terminal glycine of Ufm1, a ubiquitin-like modifier. It comprises two main structural regions: a catalytic C-terminal domain ( ) and an N-terminal domain characterised by a six-stranded β-sheet and five α-helices. Both UFSP1 and UFSP2 activate Ufm1 by cleaving its precursor to expose the conserved terminal glycine required for substrate conjugation and can also remove Ufm1 from conjugated substrates. In Caenorhabditis elegans, UFSP comprises three domains: an MPN domain, an N-terminal domain, and a catalytic domain.
