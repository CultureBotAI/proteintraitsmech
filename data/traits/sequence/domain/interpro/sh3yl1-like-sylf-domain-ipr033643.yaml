identifier: InterPro:IPR033643
label: "SH3YL1-like, SYLF domain"
definition: >-
  This subfamily is composed of yeast Ysc84 (also called LAS17-binding protein 4, Lsb4p) and Lsb3p proteins, vertebrate SH3YL1 (SH3 domain containing Ysc84-like 1), and similar proteins. They contain an N-terminal SYLF domain and a C-terminal SH3 domain. SH3YL1 localizes to the plasma membrane and is required for dorsal ruffle formation. Ysc84p localizes to actin patches and plays an important role in actin polymerization during endocytosis. A study of the yeast SH3 domain interactome predicts that Lsb3p and Lsb4p may function as molecular hubs for the assembly of endocytic complexes. The SYLF domain of SH3YL1 binds phosphoinositides with high affinity, while the N-terminal SYLF domains of both Ysc84p and Lsb3p have been shown to bind and bundle actin filaments, as well as bind liposomes with high affinity.
