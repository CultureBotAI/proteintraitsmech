identifier: InterPro:IPR004312
label: "Arabidopsis retrotransposon Orf1, C-terminal"
definition: >-
  ATHILA is a group of Arabidopsis thaliana retrotransposons belonging to the Ty3/gypsy family of the long terminal repeat (LTR) class of eukaryotic retrotransposons. The central region of ATHILA retrotransposons contains two or three open reading frames (ORFs). This entry represents the C-terminal domain of the ORF1 product. The function of ORF1 is unknown.
