identifier: InterPro:IPR048045
label: "DNA topoisomerase I, DNA-binding domain"
definition: >-
  This entry represents the N-terminal DNA-binding domain found in DNA topoisomerase (topo) I from animals and fungi. Topo I relaxes superhelical tension in duplex DNA by creating a single-strand nick, the broken strand can then rotate around the unbroken strand to remove DNA supercoils and, the nick is relegated, liberating topo I. These enzymes regulate the topological changes that accompany DNA replication, transcription and other nuclear processes. Human topo I is the target of a diverse set of anticancer drugs including camptothecins (CPTs). CPTs bind to the topo I-DNA complex and inhibit religation of the single-strand nick, resulting in the accumulation of topo I-DNA adducts.
