identifier: InterPro:IPR062401
label: "Clr-1, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of Receptor-type tyrosine-protein phosphatase from Caenorhabditis elegans, which regulates egl-15 activity and is required for hypodermis-mediated fluid homeostasis and protein degradation in muscle. This domain is predicted to adopt an α-β configuration.
