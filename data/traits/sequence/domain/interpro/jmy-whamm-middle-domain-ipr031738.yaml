identifier: InterPro:IPR031738
label: "JMY/WHAMM, middle domain"
definition: >-
  JMY (junction-mediating and -regulatory protein) and WHAMM (WASP homologue-associated protein with actin, membranes and microtubules) are two nucleation-promoting factors (NPFs) with similar domain architecture. JMY was originally identified as a transcriptional co-factor in the p53-response to DNA damage. Aside from this nuclear function, JMY is involved in cytoskeleton remodelling and trans-Golgi transport. WHAMM binds microtubules and is involved in ER to cis-Golgi transport. JMY and WHAMM show similar localisation and could be involved in similar processes.
