identifier: InterPro:IPR041787
label: "Shewanella-like phosphatase, metallophosphatase domain"
definition: >-
  Shewanella-like protein phosphatase (SLP phosphatase) is highly conserved in all plants, mosses, and green algae, with members also found in select fungi, protists, and bacteria. This entry includes nucleus-encoded Arabidopsis SLP phosphatases, AtSLP1 and AtSLP2. This entry also includes cold-active protein-tyrosine phosphatase (CAPTPase) from Shewanella sp..
