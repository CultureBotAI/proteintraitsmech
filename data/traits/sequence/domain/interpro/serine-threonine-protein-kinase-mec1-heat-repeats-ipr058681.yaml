identifier: InterPro:IPR058681
label: "Serine/threonine-protein kinase MEC1, HEAT repeats"
definition: >-
  This region of HEAT repeats is found at the N-terminal end of the yeast Serine/threonine-protein kinase MEC1 and similar proteins from ascomycetes. MEC1 activates checkpoint signalling upon genotoxic stresses such as ionising radiation (IR), ultraviolet light (UV), or DNA replication stalling, thereby acting as a DNA damage sensor.
