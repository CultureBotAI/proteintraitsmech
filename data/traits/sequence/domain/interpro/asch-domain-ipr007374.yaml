identifier: InterPro:IPR007374
label: "ASCH domain"
definition: >-
  The ASCH domain adopts a β-barrel fold similar to that of the PUA domain. It is thought to function as an RNA-binding domain during coactivation, RNA-processing and possibly during prokaryotic translation regulation.
