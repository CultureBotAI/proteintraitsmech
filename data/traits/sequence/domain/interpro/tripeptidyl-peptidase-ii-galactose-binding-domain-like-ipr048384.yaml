identifier: InterPro:IPR048384
label: "Tripeptidyl-peptidase II, galactose-binding domain-like"
definition: >-
  Tripeptidyl peptidase II (TPP II) is a large eukaryotic protease that acts downstream of the 26S proteasome and releases N-terminal tripeptides from polypeptides. It consists of three main parts: the N-terminal subtilisin-like domain, a central domain and a C-terminal domain. According to the structures, the central domain can be subdivided into two Ig-like domains ( and ) and a galactose-binding domain-like (GBD). This entry represents the GBD segment of TPPII central domain.
