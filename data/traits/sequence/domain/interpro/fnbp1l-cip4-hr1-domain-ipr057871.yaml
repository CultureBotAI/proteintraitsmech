identifier: InterPro:IPR057871
label: "FNBP1L/CIP4, HR1 domain"
definition: >-
  This entry represents the HR1 domain in FBP1L and CIP4 proteins which are a subset of TOCA proteins. CIP4 and FNBP1L are Cdc42 effectors that bind Wiskott-Aldrich syndrome protein (WASP) and function in endocytosis. Formin-binding protein 1-like (FNBP1L, also known as Toca-1) is part of the Toca-1-N-WASP complex that induces the formation of filopodia and endocytic vesicles. CIP4 and FNBP1L contain an F-BAR domain ( ), a HR1 domain ( ) and an SH3 domain ( ). FNBP1L belongs to the CIP4 (Cdc42 interacting protein-4) subfamily of the F-BAR (F for FCH, Fer-CIP4 homology domain) protein family. The F-BAR proteins have been implicated in cell membrane processes such as membrane invagination, tubulation and endocytosis. FNBP1L is required for Cdc42-induced actin assembly and is essential for autophagy of intracellular pathogens. CIP4 may also play a role in phagocytosis. It functions downstream of Cdc42 in PDGF-dependent actin reorganization and cell migration, and also regulates the activity of PDGFRbeta. It uses Src as a substrate in regulating the invasiveness of breast tumor cells.
