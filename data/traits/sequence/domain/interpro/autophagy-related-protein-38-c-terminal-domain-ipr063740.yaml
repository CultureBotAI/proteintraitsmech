identifier: InterPro:IPR063740
label: "Autophagy-related protein 38, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of PtdIns3K complex I subunit atg38 (ATG38) from fungi. ATG38 is a component of the autophagy-specific VPS34 PI3-kinase complex I, which is essential for autophagy and cytoplasm to vacuole transport. The C-terminal domain is involved in interactions with the PI3-kinase complex I, localisation to the pre-autophagosomal structure, and homodimerisation. The domain contains a coiled-coil region and is required for maintaining the integrity of the active PI3-kinase complex.
