identifier: InterPro:IPR011105
label: Cell wall hydrolase, SleB
definition: >-
  These enzymes have been implicated in cell wall hydrolysis, most extensively in Bacillus subtilis. For instance is expressed during sporulation in an inactive form and deposited on the cell outer cortex. During germination the enzyme is activated and hydrolyses the cortex. A similar role is carried out by the partially redundant.
