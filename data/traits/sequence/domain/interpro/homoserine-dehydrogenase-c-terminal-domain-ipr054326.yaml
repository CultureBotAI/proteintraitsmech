identifier: InterPro:IPR054326
label: "Homoserine dehydrogenase, C-terminal domain"
definition: >-
  Homoserine dehydrogenase (HSD) coordinates a critical branch point of the metabolic pathway that leads to the synthesis of bacterial cell-wall components such as L-lysine and m-DAP in addition to other amino acids such as L-threonine, L-methionine and L-isoleucine. The enzyme structure consists of three domains. This entry represents the C-terminal domain of staphylococcal homoserine dehydrogenases, which folds into a four-stranded antiparallel β-sheet with two α-helices packed on one side.
