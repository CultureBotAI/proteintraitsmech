identifier: InterPro:IPR060385
label: "UvrC/Cho excinuclease, middle domain"
definition: >-
  This entry represents a domain found in UvrC and Cho excinucleases involved in nucleotide excision repair. This domain is positioned between the N-terminal GIY-YIG endonuclease domain and the UVR domain, typically spanning approximately residues 95-200 in UvrC proteins and 115-210 in Cho proteins. In the multi-domain architecture of these excinucleases, this domain likely serves as a linker or scaffolding region that connects the catalytic domains and may contribute to substrate recognition or protein-protein interactions during DNA repair. UvrC is the nuclease component of the UvrABC nucleotide excision repair system, making both 5' and 3' incisions around DNA lesions. Cho (UvrC homolog) acts as an alternative nuclease that can make 3' incisions when UvrC cannot, broadening the substrate range of the repair system. Most of the lesions in the cell are repaired by the action of UvrC alone. The remaining damages, that obstruct the 3' incision by UvrC, are repaired by the combined action of Cho (for 3' incision) and UvrC (for 5' incision). The specific function of this middle domain remains to be fully characterised.
