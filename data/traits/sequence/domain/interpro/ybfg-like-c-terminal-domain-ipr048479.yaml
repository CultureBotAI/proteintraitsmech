identifier: InterPro:IPR048479
label: "Ybfg-like, C-terminal domain"
definition: >-
  This is the presumed C-terminal domain found the uncharacterised protein YbfG from Bacillus subtilis. This domain may adopt an α/β structure. YbfG has a peptidoglycan-binding domain at the N terminus ( ) and a central catalytic glycosyl hydrolase family 25 (GH25) domain ( ). YbfG has a significant degree of similarity to BacA from E. faecalis, which together with BacL1, show cell wall lytic activity.
