identifier: InterPro:IPR021764
label: Enterochelin esterase, N-terminal
definition: >-
  This entry represents the N-terminal domain of enterochelin esterase. The activity of the enzyme has been characterised. Fes catalyses the hydrolysis of the 2,3-dihydroxy-N-benzoyl-L-serine trimer, enterochelin, forming 2,3-dihydroxybenzoylserine. It also catalyses hydrolysis of free enterobactin and ferric enterobactin. Upon hydrolysis of ferric enterobactin by Fes, released iron is probably reduced by a second enzyme.
