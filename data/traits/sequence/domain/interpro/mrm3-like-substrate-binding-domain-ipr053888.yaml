identifier: InterPro:IPR053888
label: "MRM3-like, substrate binding domain"
definition: >-
  MRM3 catalyses the formation of 2'-O-methylguanosine at position 1370 Gm1370) in the 16S mitochondrial large subunit ribosomal RNA (mtLSU rRNA), a conserved modification in the peptidyl transferase domain of the mtLSU rRNA. This entry represents the substrate binding domain of MRM3 from animals and related sequences from bacteria.
