identifier: InterPro:IPR006856
label: Mating-type protein MAT alpha 1, HMG-box
definition: >-
  This entry represents the MAT Alpha1 domain, which is diverged from the MATA HMG-box domain. All ascomycete MAT idiomorphs encode proteins with confirmed or putative DNA-binding motifs. The HMG-box domain can be found in a wide variety of DNA-binding proteins.
