identifier: InterPro:IPR044094
label: "AtsA-like, MBL-fold"
definition: >-
  Pseudoalteromonas carrageenovora arylsulfatase AtsA may function as a glycosulfohydrolase involved with desulfation of sulfated polysaccharides, which catalyses hydrolysis of the arylsulfate ester bond, producing the aryl compounds and inorganic sulfate. Proteins containing this domain also include some sequences annotated as Ribonuclease Z.
