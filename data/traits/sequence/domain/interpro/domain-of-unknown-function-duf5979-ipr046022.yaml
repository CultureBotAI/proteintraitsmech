label: "Domain of unknown function DUF5979"
definition: >-
  This domain is found as tandem repeats in bacterial cell surface proteins, associated with TED adhesive domains. This domain contains a conserved lysine, glutamic acid and asparagine diagnostic of an intradomain thioester bond.
