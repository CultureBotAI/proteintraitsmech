identifier: InterPro:IPR057281
label: "REST-like, C2H2-type zinc finger"
definition: >-
  This entry represents a C2H2-type zinc finger found in human RE1-silencing transcription factor (REST) and similar sequences from vertebrates. REST is a transcriptional repressor which binds neuron-restrictive silencer element (NRSE) and represses neuronal gene transcription in non-neuronal cells.
