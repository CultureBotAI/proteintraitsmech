identifier: InterPro:IPR055492
label: "Domain of unknown function DUF7064"
definition: >-
  This is a domain of unknown function found in fungi, bacteria and archaea, which, according to structure predictions it adopts a lipocalin-like fold. This domain is found as a pair of two flattened, orthogonally packed, β-barrels. This entry represents the C-terminal barrel of the pair.
