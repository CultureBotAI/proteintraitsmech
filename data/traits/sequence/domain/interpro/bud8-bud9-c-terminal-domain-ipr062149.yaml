identifier: InterPro:IPR062149
label: "BUD8/BUD9 C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of BUD8 and BUD9 proteins found in fungi, particularly Saccharomycetales. BUD8 and BUD9 are transmembrane glycoproteins involved in positioning distal and proximal bud pole signals respectively during bipolar budding in yeast. Both proteins are localised to the cell membrane and are found at presumptive bud sites, bud tips, and the distal poles of daughter cells. The proteins interact with RAX1 and RAX2 at the proximal or distal pole in unbudded cells. The proteins are N- and O-glycosylated and belong to the BUD8/9 protein family. The specific function of this domain remains to be determined.
