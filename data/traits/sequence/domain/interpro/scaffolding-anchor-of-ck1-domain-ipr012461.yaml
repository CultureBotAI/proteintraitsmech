identifier: InterPro:IPR012461
label: "Scaffolding anchor of CK1 domain"
definition: >-
  This entry represents the scaffolding anchor of CK1 domain (SACK1 domain) found at the N-terminal of FAM83 proteins, which includes FAM83A-H. This domain was formerly known as DUF1669 and it has been identified as a CK1 binding domain, which allows the correct subcellular localisation of both FAM83 proteins and the CK1 binding partners and their function. These proteins are involved in diverse biological processes, depending on their subcellular localisation and binding partners. FAM83A-H interact with the alpha and alpha-like isoforms of CK1, while FAM83A, B, E, and H also interact with the delta and epsilon isoforms of CK1. FAM83 members have been described as oncogenes that function as intermediaries in EGFR/RAS signalling. They activate both the EGFR itself and downstream RAS/MAPK and PI3K/AKT/TOR signalling cascades. FAM83D has been reported to localize to the mitotic spindle and interact with the chromokinesin kinesin family member 22 (KIF22, also called Kid), the microtubule-binding protein hyaluronan-mediated motility receptor (HMMR), and the light chain of the motor protein dynein (DYNLL1) to correctly orient the metaphase plate in mitosis. FAM83G, also known as PAWS1 [protein associated with suppressor of mothers against decapentaplegic 1 (SMAD1)] interacts with the transcription factor SMAD1 and promotes the transcription of non-canonical bone morphogenetic protein (BMP) target genes. FAM83H mutations have been reported in both familial and spontaneous cases of amelogenesis imperfecta (AI).
