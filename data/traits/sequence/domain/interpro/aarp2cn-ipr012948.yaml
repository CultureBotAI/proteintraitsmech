identifier: InterPro:IPR012948
label: AARP2CN
definition: >-
  This domain is the central domain of AARP2 (asparagine and aspartate rich protein 2). It is weakly similar to the GTP-binding domain of elongation factor TU. PfAARP2 is an antigen from Plasmodium falciparum of 150kDa, which is encoded by a unique gene on chromosome 1. The central region of Pfaarp2 contains blocks of repetitions encoding asparagine and aspartate residues.
