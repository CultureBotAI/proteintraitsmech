identifier: InterPro:IPR048780
label: "Receptor-binding protein, N-terminal shoulder domain"
definition: >-
  Caudo_bapla_RBP is a family of proteins expressed from ORF18 of the Lactococcus P2-like phage. RBP shows three domains that form the phage tail base-plate: the N-terminal shoulder domain which is attached to the phage, the neck domain ( ) and the C-terminal receptor-recognition head domain ( ). This entry represents the shoulder domain, found at the N-terminal of RBP. This domain contains a β-sandwich fold.
