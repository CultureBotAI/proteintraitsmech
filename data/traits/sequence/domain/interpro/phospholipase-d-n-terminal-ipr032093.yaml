identifier: InterPro:IPR032093
label: "Phospholipase D, N-terminal"
definition: >-
  This domain can be found in the N-terminal of Phospholipase D (PLD). PLD catalyses the hydrolysis of the ester bond between the phosphatidic acid and alcohol moieties of phospholipids.
