identifier: InterPro:IPR058241
label: "Lysostaphin, N-terminal domain"
definition: >-
  This entry represents a domain found toward the N-terminal end of lysostaphin from Staphylococcus simulans, an extracellular glycylglycine endopeptidase that lyses staphylococcal cells by hydrolysing the polyglycine interpeptide bridges of the peptidoglycan. This domain contains a repeated semi-conserved SHxxV[ED] sequence motif usually separated by 7-8 amino acid residues. This entry also includes uncharacterised eukaryotic proteins that contain only this domain.
