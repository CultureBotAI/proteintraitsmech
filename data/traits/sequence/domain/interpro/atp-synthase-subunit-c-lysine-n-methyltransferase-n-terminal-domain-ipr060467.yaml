identifier: InterPro:IPR060467
label: "ATP synthase subunit C lysine N-methyltransferase, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of ATP synthase subunit C lysine N-methyltransferases (ATPSCKMT/FAM173B) and similar animal sequences. ATPSCKMT is a mitochondrial protein-lysine N-methyltransferase that trimethylates ATP synthase subunit C, specifically ATP5MC1 and ATP5MC2. This N-terminal region contains a transmembrane helix and includes a mitochondrial targeting sequence required for mitochondrial localisation.
