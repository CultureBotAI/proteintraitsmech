identifier: InterPro:IPR005542
label: PBX, PBC domain
definition: >-
  Pbx proteins are members of the TALE (three-amino-acid loop extension) family of atypical homeodomain proteins, whose members are characterised by a three-residue insertion between helix 1 and 2 and plays essential roles during embryonic development by participating in interactive TF networks. The heterodimerization of TALE proteins serves as a trigger for precise execution of developmental programs. Examination of Pbx1 has shown that, in addition to the homeodomain, a short 16-residue C-terminal tail is essential for maximal cooperative interactions with Hox partners as well as for maximal monomeric binding of Pbx1 to DNA.
