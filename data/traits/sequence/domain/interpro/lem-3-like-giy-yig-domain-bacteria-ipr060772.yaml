identifier: InterPro:IPR060772
label: "LEM-3-like, GIY-YIG domain, bacteria"
definition: >-
  This entry represents the GIY-YIG domain of a group of functionally uncharacterised proteins from bacteria that are homologues of eukaryotic LEM-3 proteins. These proteins might have nuclease activities and possibly be engaged in DNA repair or recombination, since they share sequence homology with the catalytic GIY-YIG domain of bacterial UvrC DNA repair proteins.
