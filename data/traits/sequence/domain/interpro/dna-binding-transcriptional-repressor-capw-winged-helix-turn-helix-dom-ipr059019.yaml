identifier: InterPro:IPR059019
label: "DNA-binding transcriptional repressor CapW, winged helix-turn-helix domain"
definition: >-
  This entry represents the N-terminal winged helix-turn-helix (wHTH) DNA-binding domain of BrxR family of transcriptional regulators including CapW and BrxR. This domain (approximately residues 1-94 in the prototypical BrxR from Escherichia fergusonii) is responsible for binding to inverted DNA repeats, enabling BrxR to function as a transcriptional repressor that controls expression of diverse phage defense systems. The R17 residue is critical for DNA binding, making bidentate hydrogen bonds with the DNA phosphate backbone. BrxR is a three-domain protein that regulates phage defense systems. The C-terminal domain (residues 200-295 in the prototypical BrxR from Escherichia fergusonii) is responsible for dimerization. BrxR functions as a transcriptional repressor that controls expression of diverse phage defense systems such as BREX and Type IV restriction enzymes. The BrxR protein typically consists of an N-terminal winged helix-turn-helix domain , a central WYL domain , and this C-terminal dimerisation domain .
