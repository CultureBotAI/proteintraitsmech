identifier: InterPro:IPR034842
label: "IGF2BP1, RNA recognition motif 2"
definition: >-
  This entry represents the RNA recognition motif 2 (RRM2) of IGF2BP1 (insulin-like growth factor 2 mRNA-binding protein 1 or IMP-1). IGF2BP1 (also known as ZBP-1 or IMP1) is a multi-functional regulator of RNA metabolism that has been implicated in the control of aspects of localization, stability, and translation for many mRNAs. It is predominantly located in cytoplasm and was initially identified as a trans-acting factor that interacts with the zipcode in the 3'- untranslated region (UTR) of the beta-actin mRNA, which is important for its localization and translational regulation. IGF2BP1 also acts as human immunodeficiency virus type 1 (HIV-1) Gag-binding factor that interacts with HIV-1 Gag protein and blocks the formation of infectious HIV-1 particles. It has also been linked to tumour growth.
