label: "Domain of unknown function DUF8302"
definition: >-
  This entry represents a domain of unknown function mostly found in SAR organisms which includes stramenopiles, alveolates and rhizarians. It contains a similar fold to large ribosomal subunit proteins mL53 (MRPL44) which contains a β-sheet connected to two α-helices.
