identifier: InterPro:IPR038745
label: AT4G37440-like
definition: >-
  This domain contains an extensive protein sequence fragment that appears conserved in a number of plant proteins, including the gene product of Arabidopsis thaliana locus AT4G37440. The homologue from white cabbage cultivars has been identified in transcriptional profiling as expressed at different levels.
