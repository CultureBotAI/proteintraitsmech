identifier: InterPro:IPR062007
label: "PEPCK-like, middle domain"
definition: >-
  This entry represents a phosphoenolpyruvate carboxykinase-like domain found in PPi-type phosphoenolpyruvate carboxykinases. The full-length proteins catalyse the reaction: oxaloacetate + diphosphate = phosphoenolpyruvate + phosphate + CO2 ( ). These enzymes regulate carbon flow in central metabolism by fixing CO2 to phosphoenolpyruvate to produce oxaloacetate. The proteins can form monomers and trimers, and are capable of forming heterotrimers with other PEPCK family members. The specific function of this domain remains to be determined.
