identifier: InterPro:IPR034104
label: Sm-like protein Lsm1
definition: >-
  This entry represents Sm-like protein Lsm1. It can be found in the cytoplasmic Lsm1-7 complex, which associates with deadenylated mRNA and promotes decapping in the 5'-3' mRNA decay pathway. The Sm and the Lsm proteins, characterised by the Sm-domain, have RNA-related functions. The Sm heptamer ring associates with four (U1, U2, U4, U5) snRNPs, while Lsm2-8 heptamer is part of the U6 snRNP. Another Lsm heptameric complex, Lsm1-7, which differs from Lsm2-8 by one Lsm protein, functions in mRNA decapping, a crucial step in the mRNA degradation pathway.
