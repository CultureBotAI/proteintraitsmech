identifier: InterPro:IPR007249
label: "DOP1, N-terminal"
definition: >-
  Dop1 is the founding member of the Dopey family and is required for correct cell morphology and spatiotemporal organisation of multicellular structures in the filamentous fungus Emericella nidulans (Aspergillus nidulans). Dop1 homologues are found in mammals, where they may play a role in regulating membrane trafficking of cargo proteins. Together with ATP9A and MON2, it regulates SNX3 retromer-mediated endosomal sorting of WLS away from lysosomal degradation. In Saccharomyces cerevisiae, Dop1 is essential for viability and, affects cellular morphogenesis. Loss of Dop1 activity affects endosome to Golgi transport and causes a severe perturbation of the organization of the endoplasmic reticulum; Mon2, a relative of large Arf exchange factors, recruits Dop1 to the Golgi apparatus.
