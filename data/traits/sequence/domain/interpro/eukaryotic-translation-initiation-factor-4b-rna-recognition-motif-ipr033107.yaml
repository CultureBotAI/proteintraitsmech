identifier: InterPro:IPR033107
label: "Eukaryotic translation initiation factor 4B, RNA recognition motif"
definition: >-
  Eukaryotic translation initiation factor 4B (eIF-4B) is a multi-domain RNA-binding protein that promotes association of messenger RNA to the 40S ribosomal subunit during translation initiation. eIF-4B can form a complex with eIF4F and can modulate the helicase activity of eIF4A. It has also been shown to interact specifically with the internal ribosome entry sites (IRES) of several picornaviruses which facilitate cap-independent translation initiation. This entry represents the RNA recognition motif (RRM) of eIF-4B and similar proteins.
