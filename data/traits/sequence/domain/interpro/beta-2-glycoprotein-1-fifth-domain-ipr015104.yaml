identifier: InterPro:IPR015104
label: "Beta-2-glycoprotein-1 fifth domain"
definition: >-
  The fifth domain of beta-2-glycoprotein-1 (b2GP-1) is composed of four well-defined anti-parallel β-strands and two short α-helices, as well as a long highly flexible loop. It plays an important role in the binding of b2GP-1 to negatively charged compounds and subsequent capture for binding of anti-b2GP-1 antibodies.
