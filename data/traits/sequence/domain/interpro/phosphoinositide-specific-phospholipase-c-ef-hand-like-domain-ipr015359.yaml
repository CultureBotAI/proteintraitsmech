identifier: InterPro:IPR015359
label: "Phosphoinositide-specific phospholipase C, EF-hand-like domain"
definition: >-
  This domain is predominantly found in the enzyme phosphoinositol-specific phospholipase C. It adopts a structure consisting of a core of four α-helices, in an EF like fold, and is required for functioning of the enzyme.
