identifier: InterPro:IPR049549
label: "26S proteasome regulatory subunit RPN7/PSMD6, C-terminal helix"
definition: >-
  RPN7/PSDM6 are regulatory subunits from the 26S proteasome. This entry represents the C-terminal helix. The 26 proteasome is a multiprotein complex involved in the ATP-dependent degradation of ubiquitinated proteins. This complex plays a key role in the maintenance of protein homeostasis by removing misfolded or damaged proteins, which could impair cellular functions, and by removing proteins whose functions are no longer required. Therefore, the proteasome participates in numerous cellular processes, including cell cycle progression, apoptosis, or DNA damage repair.
