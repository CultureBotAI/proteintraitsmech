identifier: InterPro:IPR062495
label: "Putative defensin-like protein 263, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the putative defensin-like protein 263 and related proteins from the DEFL family in plants. The protein is a secreted protein from Arabidopsis thaliana that belongs to a large family of more than 300 defensin-like genes. The mature protein contains multiple disulphide bonds and is predicted to have antimicrobial and antifungal activities. The specific function of this domain or this protein remains to be determined.
