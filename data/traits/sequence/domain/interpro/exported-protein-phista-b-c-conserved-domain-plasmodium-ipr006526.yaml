identifier: InterPro:IPR006526
label: "Exported protein, PHISTa/b/c, conserved domain, Plasmodium"
definition: >-
  This entry represents a conserved domain of about 60 amino acids that is found in several paralogues from Plasmodium falciparum, the apicomplexan parasite that causes the most severe form of malaria in humans. This domain is not currently found elsewhere, even in closely related Plasmodium species. Proteins that contain this domain include PHIST (for Plasmodium helical interspersed subtelomeric family) export proteins.
