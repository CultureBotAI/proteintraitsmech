label: "Domain of unknown function DUF5666"
definition: >-
  This presumed domain is functionally uncharacterised. Proteins containing this domain can be found in bacteria and archaea, including Mi43 from Mycobacterium intracellulare. It is approximately 60 amino acids in length. This domain is likely to adopt an OB-fold based on similarity to other families.
