identifier: InterPro:IPR025889
label: "General stress protein 17M-like domain"
definition: >-
  This domain is found in stress induced proteins, mainly from Bacilli. General stress protein 17M or YflT is induced by heat shock, salt stress, oxidative stress, glucose limitation and oxygen limitation. This domain is also found at the N terminus of stress response protein YsnF, induced by phosphate starvation, via the alternative sigma factor sigma-B.
