identifier: InterPro:IPR060109
label: "CLIP1/2, coiled-coil domain"
definition: >-
  This entry represents a coiled-coil domain found in the middle region in CLIP1 (CAP-Gly domain-containing linker protein 1) and at the C-terminal of CLIP2 from animals. CLIP1 binds to the plus end of microtubules and regulates the dynamics of the microtubule cytoskeleton. CLIP2 may link microtubules to dendritic lamellar body (DLB), a membranous organelle predominantly present in bulbous dendritic appendages of neurons linked by dendrodendritic gap junctions. May operate in the control of brain-specific organelle translocations
