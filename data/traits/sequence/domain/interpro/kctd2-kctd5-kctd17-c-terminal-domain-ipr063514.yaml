identifier: InterPro:IPR063514
label: "KCTD2/KCTD5/KCTD17, C-terminal domain"
definition: >-
  This domain is found C-terminal in the homologues of human KCTD2, KCTD5 and KCTD17 proteins that are members of the KCTD family. Genetic alternations in KCTD family members have been associated with neurodevelopmental disorders, epilepsy, autism, schizophrenia, movement disorders, obesity, and several cancers. KCTD2, KCTD5, and KCTD17 are closely related BTB/POZ-domain proteins that act as adaptors in ubiquitin ligase complexes and modulators of neuronal signaling, particularly dopaminergic and cAMP pathways. They are expressed broadly but have especially important functions in the brain, where they help control neuronal excitability, movement, and cellular growth. They define a phylogenetic subgroup of KCTD with highly similar BTB and C-terminal domains. This domain adopts a simple structure composed of three-stranded antiparallel β-sheet and α-helix which connects the first and second strand. Using its C-terminal domain, KCTD5 forms a central pentameric scaffold that simultaneously engages five Gbeta/gamma substrates.
