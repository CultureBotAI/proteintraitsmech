identifier: InterPro:IPR054016
label: "FKBP26, IF domain"
definition: >-
  This domain is centrally located in Long-type peptidyl-prolyl cis-trans isomerase from Methanocaldococcus jannaschii (FKBP26) and similar archaeal sequences. FKBP26 catalyses the cis-trans isomerisation of peptidyl prolyl bonds and exhibits chaperone-like activity. The latter activity requires a 50-residue insertion (IF domain, for 'Insert-in-Flap', this entry) in the catalytic FKBP domain. It resembles a fractured four-stranded β-barrel with the first and second strands connected by a helix that partially covers the fracture. It shows a highly hydrophobic surface.
