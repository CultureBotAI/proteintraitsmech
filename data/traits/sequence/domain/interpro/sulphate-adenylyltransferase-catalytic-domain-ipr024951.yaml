identifier: InterPro:IPR024951
label: Sulphate adenylyltransferase catalytic domain
definition: >-
  This domain is the catalytic domain of ATP-sulfurylase or sulphate adenylyltransferase ( ). ATP-sulfurylase catalyses the synthesis of adenosine-phosphosulphate (APS) from ATP and inorganic sulphate. Sometimes is found as part of a bifunctional polypeptide chain associated with adenylylsulphate kinase ( ). Both enzymes are required for PAPS (phosphoadenosine-phosphosulphate) synthesis from inorganic sulphate.
