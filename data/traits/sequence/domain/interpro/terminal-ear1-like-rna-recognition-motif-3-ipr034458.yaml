identifier: InterPro:IPR034458
label: "Terminal EAR1-like, RNA recognition motif 3"
definition: >-
  This entry represents the RNA recognition motif 3 (RRM3) of terminal EAR1-like proteins, including terminal EAR1-like protein 1 and 2 (TEL1 and TEL2) found in land plants. They may play a role in the regulation of leaf initiation. The terminal EAR1-like proteins are putative RNA-binding proteins carrying three RNA recognition motifs (RRMs), and TEL characteristic motifs that allow sequence and putative functional discrimination between the terminal EAR1-like proteins and Mei2-like proteins.
