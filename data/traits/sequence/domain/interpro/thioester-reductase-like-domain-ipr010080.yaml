identifier: InterPro:IPR010080
label: "Thioester reductase-like domain"
definition: >-
  This domain includes the C-terminal domain from the fungal alpha aminoadipate reductase enzyme (also known as aminoadipate semialdehyde dehydrogenase) which is involved in the biosynthesis of lysine, as well as the reductase-containing component of the myxochelin biosynthetic gene cluster, MxcG. The mechanism of reduction involves activation of the substrate by adenylation and transfer to a covalently-linked pantetheine cofactor as a thioester. This thioester is then reduced to give an aldehyde (thus releasing the product) and a regenerated pantetheine thiol; in myxochelin biosynthesis this aldehyde is further reduced to an alcohol or converted to an amine by an aminotransferase. This is a fundamentally different reaction than beta-ketoreductase domains of polyketide synthases which act at a carbonyl two carbons removed from the thioester and forms an alcohol as a product. The majority of bacterial sequences containing this domain are non-ribosomal peptide synthetases in which this domain is similarly located proximal to a thiolation domain. In some cases this domain is found at the end of a polyketide synthetase enzyme, but is unlike ketoreductase domains which are found before the thiolase domains. Exceptions to this observed relationship with the thiolase domain include three proteins which consist of stand-alone reductase domains (from Mycobacterium leprae, Anabaena and from Streptomyces coelicolor) and one protein (from Nostoc) which contains N-terminal homology with a small group of hypothetical proteins but no evidence of a thiolation domain next to the putative reductase domain. This family consists of a short-chain dehydrogenase/reductase (SDR) module of multidomain proteins identified as putative polyketide sythases fatty acid synthases (FAS), and nonribosoma…
