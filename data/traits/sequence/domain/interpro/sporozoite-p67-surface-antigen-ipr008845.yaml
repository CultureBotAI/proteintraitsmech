identifier: InterPro:IPR008845
label: "Sporozoite P67 surface antigen"
definition: >-
  This entry consists of several Theileria P67 surface antigens. A stage specific surface antigen of Theileria parva, p67, is the basis for the development of an anti-sporozoite vaccine for the control of East Coast fever (ECF) in Bos taurus. The antigen has been shown to contain five distinct linear peptide sequences recognised by sporozoite-neutralising murine monoclonal antibodies. The immunisation with the C-terminal fragment of P67 ( ) alone is capable of eliciting protection.
