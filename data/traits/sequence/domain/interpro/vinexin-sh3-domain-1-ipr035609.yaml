identifier: InterPro:IPR035609
label: "Vinexin, SH3 domain 1"
definition: >-
  This entry represents the first SH3 domain of vinexin. Vinexin belongs to a family of adaptor protein containing two other members, ArgBP2 and CAP (c-Cbl associated protein)/ponsin. It has an N-terminal sorbin homology (SoHo) domain and three C-terminal SH3 domain (Src homology domain 3). There are two vinexin isoforms in humans - vinexin alpha, which contains a SoHo domain and three SH3 domains, and vinexin beta, which contains only three SH3 domains. Its SH3 domains are associated with vinculin, WAVE2, DLG5/lp-dlg, Abl, and Cbl, while the SoHo domain is associated with flotillin and the estrogen receptor. The interaction between vinexin and vinculin is essential for recruiting vinexins to focal adhesions. Its interaction with vinculin can enhance actin cytoskeletal organisation and cell spreading.
