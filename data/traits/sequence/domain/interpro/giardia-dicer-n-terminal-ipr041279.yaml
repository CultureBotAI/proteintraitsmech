identifier: InterPro:IPR041279
label: "Giardia dicer, N-terminal"
definition: >-
  This is the N-terminal domain found in dicer proteins from Giardia intestinalis. The N-terminal region (i.e. the platform domain) forms a flat surface composed of antiparallel β sheet and three α helices. This surface contains a large positively charged region that could interact directly with the negatively charged phosphodiester backbone of the modeled dsRNA helix. Dicer is involved in cleaving double-stranded RNA in the RNA interference (RNAi) pathway. It produces 21 to 23 bp dsRNAs (siRNAs) which target the selective destruction of homologous RNAs.
