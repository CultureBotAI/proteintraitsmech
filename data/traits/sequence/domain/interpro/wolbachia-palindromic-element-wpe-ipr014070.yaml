identifier: InterPro:IPR014070
label: "Wolbachia palindromic element (WPE)"
definition: >-
  This domain conceptually resembles , the Rickettsial palindromic element (RPE) domain. In both cases, a protein-coding palindromic element spreads through a genome, inserting usually in protein-coding regions. The additional protein coding sequence is thought to allow function of the host protein because of location in surface-exposed regions of the protein structure.
