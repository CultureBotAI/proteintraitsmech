identifier: InterPro:IPR056403
label: "Ribonuclease II-like, barrel domain"
definition: >-
  This domain is found at the N-terminal of ribonuclease II (RNR1) from Arabidopsis thaliana and similar sequences from plants and cyanobacteria. This domain may have an RNA-binding activity. RNR1 is a 3'-5' exoribonuclease that catalyses 3' maturation of chloroplast and mitochondrion ribosomal RNAs. It degrades short nucleotidic extensions to generate the mature 3'-ends. It is involved in the maturation of 23S, 16S and 5S rRNAs.
