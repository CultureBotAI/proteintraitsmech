identifier: InterPro:IPR055236
label: "PP4R3, EVH1-like domain"
definition: >-
  The Serine/threonine-protein phosphatase 4 regulatory subunits 3 (PPP4R3) contain a conserved N-terminal Enabled/VASP Homology 1 (EVH1) domain. EVH1 domains are found in numerous proteins and bind to proline-rich sequences that adopt a left-handed PPII polyproline helix. Common to all EVH1 domains is a conserved tryptophan residue interacting with a proline residue in the ligand. This domain has been shown to bind an FXXP motif.
