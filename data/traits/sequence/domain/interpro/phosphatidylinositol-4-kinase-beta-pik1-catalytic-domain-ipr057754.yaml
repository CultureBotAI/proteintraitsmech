identifier: InterPro:IPR057754
label: "Phosphatidylinositol 4-kinase beta/PIK1, catalytic domain"
definition: >-
  This entry represents the catalytic domain in mammal Phosphatidylinositol 4-kinase beta, its yeast homologue Phosphatidylinositol 4-kinase PIK1 and similar eukaryotic sequences. Phosphatidylinositol 4-kinase (PI4-kinase) ( ) is an enzyme that acts on phosphatidylinositol (PI) in the first committed step in the production of the secondary messenger inositol-1,4,5-trisphosphate. This domain is also present in a wide range of protein kinases, involved in diverse cellular functions, such as control of cell growth, regulation of cell cycle progression, a DNA damage checkpoint, recombination, and maintenance of telomere length. Despite significant homology to lipid kinases, no lipid kinase activity has been demonstrated for any of the PIK-related kinases. Human Phosphatidylinositol 4-kinase beta phosphorylates phosphatidylinositol (PI) in the first committed step in the production of the second messenger inositol-1,4,5-trisphosphate (PIP). This protein may regulate Golgi disintegration/reorganisation during mitosis, possibly via its phosphorylation and is involved in Golgi-to-plasma membrane trafficking. It may also play an important role in the inner ear development.
