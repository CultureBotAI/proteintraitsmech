identifier: InterPro:IPR048564
label: "Cyanate hydratase, N-terminal domain"
definition: >-
  Cyanate hydratase (also known as cyanate lyase) catalyses the reaction of cyanate with bicarbonate to produce ammonia and carbon dioxide, allowing the host organisms to overcome the toxicity of environmental cyanate. It consists of an N-terminal five-helix bundle domain that shows structural similarity to DNA-binding HTH domains and a C-terminal catalytic domain, which has a unique fold. This entry represents the N-terminal domain.
