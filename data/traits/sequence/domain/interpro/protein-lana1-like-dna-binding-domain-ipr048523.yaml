identifier: InterPro:IPR048523
label: "Protein LANA1-like, DNA-binding domain"
definition: >-
  Latency-associated nuclear antigen (LANA) is a multifunctional protein that plays a role in the replication and long-term persistence of the viral episomal genome in dividing cells. It binds to mitotic chromosomes via its N-terminal region and to a 16-bp imperfect palindrome within the origin of replication (oriP) located in the viral terminal repeat (TR) through its C-terminal. It also plays a role in the repression of host NF-kappa-B activity upon TNF-alpha stimulation by promoting the proteasomal degradation of host RELA. This entry represents the DNA-binding domain of LANA from murine gammaherpesvirus 68, which is homologous to that of Kaposi's sarcoma-associated herpesvirus (KSHV).
