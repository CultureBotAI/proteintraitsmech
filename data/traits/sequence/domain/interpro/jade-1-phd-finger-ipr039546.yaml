identifier: InterPro:IPR039546
label: "Jade-1, PHD finger"
definition: >-
  Jade-1 is a novel binding partner of von Hippel-Lindau (VHL) tumour suppressor Pvhl, a key regulator of the cellular oxygen sensing pathway. It is highly expressed in renal proximal tubules. Jade-1 functions as an essential regulator of multiple cell signaling pathways. It may be involved in the serine/threonine kinase AKT/AKT1 pathway during renal cancer pathogenesis and normally prevents renal epithelial cell proliferation and transformation. It also acts as a pro-apoptotic and growth suppressive ubiquitin ligase to inhibit canonical Wnt downstream effector beta-catenin for proteasomal degradation, and as a transcription factor associated with histone acetyltransferase activity and with increased abundance of cyclin-dependent kinase inhibitor p21. Moreover, Jade-1 is required for ING4 and ING5 to associate with histone acetyltransferase (HAT) HBO1 and Eaf6 to form a HBO1 complex, and plays a role in epithelial cell regeneration. It has also been identified as a novel component of the nephrocystin protein (NPHP) complex and interacts with the ciliary protein nephrocystin-4 (NPHP4).
