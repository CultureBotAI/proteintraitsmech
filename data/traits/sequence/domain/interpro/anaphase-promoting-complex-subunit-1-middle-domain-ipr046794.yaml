identifier: InterPro:IPR046794
label: "Anaphase-promoting complex subunit 1, middle domain"
definition: >-
  Apc1 is the largest of the subunits of the anaphase-promoting complex or cyclosome. The anaphase-promoting complex is a multiprotein subunit E3 ubiquitin ligase complex that controls segregation of chromosomes and exit from mitosis in eukaryotes. Apc1 consists of a N-terminal WD40 β-propeller domain, followed by the middle domain (Mid-N), a PC domain and the C-terminal domain (MidC). This entry represents the middle domain of Apc1, MidN (also referred to as the first helical domain), that coalesced with the C-terminal domain to form Apc1Mid that connects Apc1WD40 with Apc1PC. Apc1Mid consists of an α-solenoid capped by a β-sandwich.
