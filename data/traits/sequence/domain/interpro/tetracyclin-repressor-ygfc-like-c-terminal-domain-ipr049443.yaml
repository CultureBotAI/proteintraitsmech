identifier: InterPro:IPR049443
label: "Tetracyclin repressor YgfC-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of Transcriptional regulator from Lactococcus lactis (YgfC, also known as heme-regulated transporter regulator, HrtR ) and similar proteins predominantly from firmicutes. YgfC senses and binds a heme molecule to regulate the expression of the heme-efflux system responsible for heme homeostasis in this bacteria. This member of the TetR family of transcriptional regulators shows two helical domains and adopts a dimeric configuration. This entry represents the heme-sensing (heme-binding) domain, which contains the α-helices that form the four-helix bundle that constitutes a dimer interface.
