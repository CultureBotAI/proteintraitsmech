identifier: InterPro:IPR058661
label: "Scaffold protein FimL, second domain"
definition: >-
  This entry represents the second domain of Scaffold protein FimL from Pseudomonas aeruginosa and similar proteins from proteobacteria. FimL is involved in the regulation of various virulence functions in bacteria, including the assembly of type IV pili (T4P) and twitching motility. It plays a crucial role in controlling intracellular cyclic AMP (cAMP) levels by activating adenylate cyclase CyaB. Additionally, FimL acts as a scaffold protein, linking FimV and PilG at the bacterial pole, facilitating interactions between T4P, the Chp chemosensory system, and CyaB adenylate cyclase.
