identifier: InterPro:IPR048630
label: "Exocyst complex component Sec8, middle helical bundle"
definition: >-
  Sec8 is a component of the exocyst complex, composed of Sec3, Sec5, Sec5, Sec6, Sec8, Sec10, Sec15, Exo70 and Exo84, which mediates the tethering of post-Golgi secretory vesicles to the plasma membrane. The exocyst promotes the assembly of SNARE complex for membrane fusion and it is also involved in many cellular processes such as cell polarisation, primary ciliogenesis, cytokinesis, pathogen invasion, tumorigenesis and metastasis. Subunits of the exocyst have a rod structure which is a shared feature for the Complex Associated with Tethering Containing Helical Rods (CATCHRs) proteins such as those of the Conserved Oligomeric Golgi complex (COG) and Golgi-Associated Retrograde Protein complex (GARP), consisting of a N-terminal long coiled-coil followed by a region of antiparallel short helical bundle units. This entry represents a domain found in the middle region of Sec8 subunit, consisting of α-helical bundles.
