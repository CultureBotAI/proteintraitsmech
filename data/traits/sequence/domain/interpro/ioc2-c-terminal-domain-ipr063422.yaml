identifier: InterPro:IPR063422
label: "IOC2, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in IOC2 (ISWI one complex protein 2) and related proteins. IOC2 functions as a component of the ISW1B chromatin remodelling complex in yeast, which catalyses ATP-dependent alterations in nucleosomal DNA structure. The ISW1B complex controls RNA polymerase II elongation and coordinates transcription termination with pre-mRNA processing. This domain is located after the N-terminal domain. The specific function of this domain remains to be determined. This domain is predicted to contain a Zinc finger, FYVE/PHD-type.
