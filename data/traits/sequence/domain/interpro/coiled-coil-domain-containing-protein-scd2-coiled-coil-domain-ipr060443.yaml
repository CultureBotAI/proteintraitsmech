identifier: InterPro:IPR060443
label: "Coiled-coil domain-containing protein SCD2, coiled-coil domain"
definition: >-
  This entry represents a coiled-coil domain of SCD2 from Arabidopsis thaliana and similar plant sequences. The specific function of this helical domain remains to be determined. SCD2 is involved in growth and development through its role in cytokinesis and polarised cell expansion. It is required for plasma membrane internalisation and functions in clathrin-mediated membrane trafficking, including plasma membrane endocytosis. SCD2 localises to the cell membrane as a peripheral membrane protein and to clathrin-coated vesicles. The protein contains predicted coiled-coil regions and disordered regions.
