identifier: InterPro:IPR057832
label: "ZNF462, C2H2 zinc finger 2"
definition: >-
  This entry represents the second C2H2 zinc finger in the human ZNF462 and related proteins. This domain can be found in a different position in other ZNF462 proteins. Zinc finger protein 462 (ZNF462) is involved in transcription by regulating chromatin structure and organisation. ZNF462 is a multidomain protein that contains a number of classical C2H2 zinc fingers.
