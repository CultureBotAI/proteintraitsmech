identifier: InterPro:IPR048367
label: "Transposable element P transposase-like, RNase H, C-terminal domain"
definition: >-
  This domain represents the C-terminal segment of the RNase H domain from Drosophila melanogaster transposable element P transposase (TNP) and its homologue from human, DNA transposase THAP9. The catalytic RNase H domain of these proteins is interrupted by the GTP-binding insertion domain (GBD, ). The N-terminal segment of the RNase H domain is represented in . TNP specifically mediates transposition of P-elements, being involved in both precise and imprecise excision. It has unique features such as the requirement for a guanosine triphosphate cofactor and the generation of long staggered DNA breaks during transposition. TNP structure revealed that it consists of several domains: THAP at the N-terminal, followed by a dimerisation domain, a HTH domain, the catalytic RNase H domain is interrupted by a GTP-binding insertion domain (GBD) and a C-terminal one. The HTH, GBD and C-terminal domains are involved in protein-DNA interactions. THAP9 specifically recognises the bipartite 5'-TXXGGGX(A/T)-3' consensus motif and mediates transposition.
