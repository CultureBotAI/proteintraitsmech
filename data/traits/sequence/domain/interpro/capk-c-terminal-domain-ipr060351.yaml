identifier: InterPro:IPR060351
label: "CapK, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of CapK,and similar prokaryotic proteins. CapK is required for the biosynthesis of type 1 capsular polysaccharide. This domain has an AMP-binding fold.
