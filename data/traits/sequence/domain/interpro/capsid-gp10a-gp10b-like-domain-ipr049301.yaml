identifier: InterPro:IPR049301
label: "Capsid Gp10A/Gp10B-like domain"
definition: >-
  This entry describes a domain found in capsid proteins, such as Gp10A (also known as Major capsid protein, ) and Gp10B (also known as Minor capsid protein, ) from bacteriophage T7 and T3. Gp10A subunits adopt an HK97-like conformation to form the viral shell. This domain is also found in other tailed bacteriophages and bacterial prophages.
