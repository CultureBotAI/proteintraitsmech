identifier: InterPro:IPR040959
label: "Cellulose-binding protein CttA, N-terminal"
definition: >-
  "This entry represents the X-module, a putative carbohydrate-binding domain found in the N-terminal region of cellulose-binding protein CttA from Ruminococcus flavefaciens. CttA mediates bacterial attachment to substrate via two carbohydrate-binding modules, and may be a component of the Ruminococcus cellulosome system. The X-module sits N-terminal to a dockerin repeat and lacks a true hydrophobic core. Unlike X-modules in other CohE-XDoc complexes, it does not contribute to the binding surface; instead, it appears to serve as an extended spacer separating the cellulose-binding modules at the N-terminal of CttA from the bacterial cell wall. The domain does not share structural similarity with other known X-modules from cellulolytic bacteria, but shows similarity to the G5-1 module of StrH from S. pneumoniae.
