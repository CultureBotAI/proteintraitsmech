identifier: InterPro:IPR042774
label: "UBXN6, PUB domain"
definition: >-
  This entry represents the PUB domain found in p97 adaptor protein UBXD6 (also called UBXD1). It functions as a p97 (also known as valosin-containing protein or VCP) adaptor by interacting with the D1 and/or D2 ATPase domains. The type II AAA ATPase p97 is involved in a variety of cellular processes such as the deglycosylation of ERAD substrates, membrane fusion, transcription factor activation and cell cycle regulation through differential binding to specific adaptor proteins.
