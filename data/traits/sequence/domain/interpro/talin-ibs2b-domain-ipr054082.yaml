identifier: InterPro:IPR054082
label: "Talin, IBS2B domain"
definition: >-
  Talin is an adaptor protein that activates integrin family of cell adhesion molecules and couples them to the actin cytoskeleton. The integrin activation is known to involve binding of the Talin FERM domain to membrane proximal sequences in the cytoplasmic domain of the integrin beta-subunit. IBS2 is a second integrin-binding site that has been identified near the C-terminal end of the Talin rod. The crystal structure of IBS2 reveals two five-helix bundles, IBS2A and IBS2B, connected by a continuous helix. The Talin IBS2B domain, represented in this entry, is essential for integrin binding, binding to acidic phospholipids, and targeting to focal adhesions. The domain comprises a tandem pair of five-helix bundles with the same topology, comprising five antiparallel α-helices.
