identifier: InterPro:IPR057945
label: "ZSWIM8, TPR repeats"
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found in human Zinc finger SWIM domain-containing protein 8 (ZSWIM8) and similar proteins mainly found in animals. ZSWIM8 is a substrate recognition component of a SCF-like E3 ubiquitin-protein ligase complex that promotes target-directed microRNA degradation (TDMD), a process that mediates degradation of microRNAs (miRNAs).
