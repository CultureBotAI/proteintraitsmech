identifier: InterPro:IPR009563
label: "ZNRD2-like, N-terminal domain"
definition: >-
  This entry represents a domain found at the N-terminal of ZNRD2. It is thought that the potential association of ZNRD2 with anti-centromere antibodies suggests that this protein might play a role in mitosis.
