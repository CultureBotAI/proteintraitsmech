identifier: InterPro:IPR056512
label: "Putative E3 ubiquitin-protein ligase LIN, N-terminal domain"
definition: >-
  This region is found towards the N-terminal end in a group of plant proteins, including the putative E3 ubiquitin-protein ligase LIN from Medicago truncatula. This domain is predicted to consist of ARM-like repeats. E3 ubiquitin-protein ligase LIN is involved in the rhizobial infection process. This protein plays an important role in the early steps of bacterial symbiont thread formation in roots, and in growth, differentiation and maintenance of nodules.
