identifier: InterPro:IPR036125
label: "Class XXI myosin, motor domain"
definition: >-
  Myosins are present in all eukaryotes including protozoan parasites. Myosins are characterised by three domains: an N-terminal motor or head domain that binds ATP and filamentous actin, a neck domain which binds light chains or calmodulin, and a C-terminal tail which is highly divergent. Class XXI myosins are found in trypanosomatids. They are preferentially localised in the proximal region of the flagellum; this localisation is determined by the myosin tail. This entry represents the motor or head domain of class XXI myosins.
