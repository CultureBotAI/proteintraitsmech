identifier: InterPro:IPR063788
label: "Mitosis initiation protein fs(1)Ya, N-terminal zinc finger"
definition: >-
  This entry represents the N-terminal domain of fs(1)Ya (female sterile Ya) mitosis initiation proteins found in insects, particularly Diptera, Lepidoptera, Hymenoptera and Coleoptera. The fs(1)Ya protein is a cell cycle-dependent nuclear envelope component required for embryonic mitosis. The full-length protein localises to the nuclear envelope during interphase to metaphase and to the nucleoplasm and cytoplasm during anaphase and telophase. This N-terminal domain is approximately 30 amino acids in length and is found at the beginning of the fs(1)Ya protein. The specific function of this N-terminal domain remains to be determined. This domain contains a C2H2-like fold.
