identifier: InterPro:IPR059495
label: "CRLF3, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of cytokine receptor-like factor 3 (CRLF3) animal proteins. CRLF3 proteins may play a role in the negative regulation of cell cycle progression. The proteins are localised to the cytoplasm and contain an N-terminal coiled-coil domain and a central fibronectin type-III domain in addition to this C-terminal region. The function of this specific C-terminal domain remains to be determined. This domain contains a SPYR fold.
