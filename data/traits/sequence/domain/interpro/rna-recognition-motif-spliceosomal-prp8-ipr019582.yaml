identifier: InterPro:IPR019582
label: RNA recognition motif, spliceosomal PrP8
definition: >-
  The large RNA-protein complex of the spliceosome catalyses pre-mRNA splicing. One of the most conserved core proteins is the pre-mRNA-processing-splicing factor 8 (PrP8) which occupies a central position in the catalytic core of the spliceosome, and has been implicated in several crucial molecular rearrangements that occur there, and has recently come under the spotlight for its role in the inherited human disease, Retinitis Pigmentosa. The RNA-recognition motif of PrP8 is highly conserved and provides a possible RNA binding centre for the 5-prime SS, BP, or 3-prime SS of pre-mRNA which are known to contact with Prp8. The most conserved regions of an RNA- recognition-motif (RRM) are defined as the RNP1 and RNP2 sequences. Recognition of RNA targets can also be modulated by a number of other factors, most notably the two loops beta1-alpha1, beta2-beta3 and the amino acid residues C-terminal to the RNP2 domain.
