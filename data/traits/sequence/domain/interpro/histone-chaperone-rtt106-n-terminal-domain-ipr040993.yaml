identifier: InterPro:IPR040993
label: "Histone chaperone Rtt106, N-terminal domain"
definition: >-
  This is the N-terminal domain of Rtt106 in Saccharomyces cerevisiae. Rtt106 is a histone chaperone that contributes to the deposition of newly synthesized acetylated Histone 3 Lysine 56 (H3K56ac) carrying H3-H4 complex on replicating DNA. The N-terminal domain of Rtt106 homodimerizes and interacts with H3-H4 independently of acetylation.
