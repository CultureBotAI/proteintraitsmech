identifier: InterPro:IPR001665
label: Norovirus peptidase C37
definition: >-
  Noroviruses (NVs, formerly "Norwalk-like viruses"), which belong to the Caliciviridae, are the major causative agents of nonbacterial acute gastroenteritis in humans. The NV genome, which consists of positive-sense, single-stranded RNA, contains three open reading frames (ORFs). The first ORF produces a polyprotein that is processed by the viral 3C-like protease into six nonstructural proteins. The six NV ORF1 nonstructural proteins are homologous to picornaviral nonstructural proteins and are named accordingly: N-terminal protein, 2C-like nucleoside triphosphatase, 3A-like protein, 3B VPg (genome-linked viral protein), 3C-like protease, and a 3D RNA- dependent RNA polymerase. NV 3C-like proteases are the key enzymes for ORF1 polyprotein processing and also cleave the poly(A)-binding protein, causing cellular translation inhibition. NV 3C-like proteases belong to the chymotrypsin-like protease family, in that they appear to have chymotrypsin-like folds. Whether the 3C-like protease domain has a catalytic dyad of composed of histidine and cysteine or tryad of histidine, glutamate and cysteine remains controversial. The NV 3C-like protease domain forms MEROPS peptidase family C37. The NV 3C-like protease domain adopts a serine protease-like fold that consists of two β-barrels separated by a cleft within which lie the active site catalytic residues. The N-terminal β barrel has two α-helices and seven β-strands. The β-strands form a twisted antiparallel beta- sheet resembling an incomplete β-barrel. The core of the incomplete β- barrel contains hydrophobic residues. The active site histidine residue is found in the N-terminal β-barrel, as well as the glutamate. The C-terminal six-stranded antiparallel β-barrel contains the active site cysteine. The catalytic site formed is…
