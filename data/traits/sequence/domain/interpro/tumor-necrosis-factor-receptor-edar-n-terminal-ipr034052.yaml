identifier: InterPro:IPR034052
label: "Tumor necrosis factor receptor EDAR, N-terminal"
definition: >-
  Ectodysplasin A receptor (EDAR, also known as DL, ED3, ED5, ED1R, EDA3, HRM1, EDA1R, ECTD10A, ECTD10B, EDA-A1R) binds the soluble ligand ectodysplasin A and can activate the nuclear factor-kappaB, JNK, and caspase-independent cell death pathways. It is required for the development of hair, teeth, and other ectodermal derivatives. Mutations in this gene result in autosomal dominant and recessive forms of hypohidrotic ectodermal dysplasia. Patients present defects in the development of ectoderm-derived structures resulting in sparse hair, too few teeth (oligodontia), the absence or reduction in the ability to sweat as well as problems with mucous and saliva and the production and formation of pigment cells. This entry represents the N-terminal domain of EDAR.
