identifier: InterPro:IPR048892
label: "Nrd1/Seb1, domain 2"
definition: >-
  Nrd1 is a heterogeneous nuclear ribonucleoprotein (hnRNP)-like RNA-binding protein, part of the Nrd1-Nab3-Sen1 (NNS) complex which is involved in the termination and processing of short RNA polymerase II transcripts. Seb1 is the Nrd1 homologue from S. pombe that is essential for cell viability and binds directly to Rpb7 subunit of RNA polymerase II. It functions in terminating all classes of Pol II-transcribed genes genome-wide. These proteins have a RNA-recognition motif (RRM, ) fused to a second α/β domain described as domain 2 (represented by this entry and also referred to as the split domain, SD, in) from Nrd1 and Seb1. This domain is essential and forms a rigid body with the canonical RRM that interacts with RNA.
