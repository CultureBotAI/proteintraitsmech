identifier: InterPro:IPR047100
label: "Contactin-1, Ig-like domain 3"
definition: >-
  This entry represents the third immunoglobulin (Ig) domain of contactin-1. Contactin-1 (CNTN1) is expressed by a diversity of neurons and contributes to the formation and function of neuronal connections. Contactin-1 regulates both myelin formation and organisation of nodal and paranodal domains in the central and peripheral nervous system. It plays a relevant role in cerebellar ontogenesis and cerebral cortex development. Contactin-1 contributes to the invasion and metastasis of several tumours. It is comprised of six immunoglobulin domains followed by four fibronectin type III (FnIII) domains anchored to the membrane by glycosylphosphatidylinositol. Contactins are cell adhesion molecules that belong to the immunoglobulin superfamily and are involved in neural development. They usually consist of six N-terminal Ig domains, four fibronectin type III domains, and a C-terminal glycophosphatidylinositol (GPI)-anchor to the extracellular part of the cell membrane.
