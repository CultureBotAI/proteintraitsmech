identifier: InterPro:IPR025748
label: "PrcB C-terminal domain"
definition: >-
  This domain is found at the C terminus of Treponema denticola PrcB ( ). PrcB interacts with the PrtP protease (dentilisin) and is required for the stability of the protease complex. Dentilisin has been suggested to be an important virulence factor of T. denticola with a role in epithelial cell layer penetration.
