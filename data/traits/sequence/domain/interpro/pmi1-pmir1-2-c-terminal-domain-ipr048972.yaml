identifier: InterPro:IPR048972
label: "PMI1/PMIR1-2, C-terminal domain"
definition: >-
  This entry represents a presumed domain found towards the C-terminal of plant proteins, such as PMI1 (PLASTID MOVEMENT IMPAIRED 1 and PMIR1/2 (PMI1 related 1 and 2) from Arabidopsis. PMI1 and PMIR1 are required for efficient chloroplast photorelocation movement, while PMIR2 seems not necessary for this. PMI1 is a mobile signal that initiates coordinated changes in protein-protein and protein-plasma membrane interactions for chloroplast movement in response to light, which determines where in the cell chloroplasts are able to anchor o the plasma membrane. PMI1 has been found to mediate ABA sensitivity during germination.
