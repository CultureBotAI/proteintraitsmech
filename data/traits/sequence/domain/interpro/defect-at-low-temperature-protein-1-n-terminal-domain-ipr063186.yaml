identifier: InterPro:IPR063186
label: "Defect at low temperature protein 1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of DLT1 (Defect at low temperature protein 1) found in yeasts of the Saccharomycetaceae family. This domain encompasses the two transmembrane helices and a short extracellular loop of DLT1. The full-length DLT1 protein is required for growth under high-pressure and low-temperature conditions. In Saccharomyces cerevisiae, DLT1 deletion mutants show sensitivity to 6-azauracil and mycophenolic acid. The domain spans approximately 80 residues and contains the membrane-spanning regions of the protein. The specific function of this N-terminal domain remains to be determined.
