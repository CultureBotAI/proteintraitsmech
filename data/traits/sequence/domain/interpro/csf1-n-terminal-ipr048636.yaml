identifier: InterPro:IPR048636
label: "Csf1, N-terminal"
definition: >-
  This entry represents the N-terminal region of Csf1. This entry includes Csf1 protein from yeast, which is the orthologue of human BLTP1. These are tube-forming lipid transport proteins which provide phosphatidylethanolamine for glycosylphosphatidylinositol (GPI) anchor synthesis in the endoplasmic reticulum. They belong to the repeating β-groove (RBG) superfamily which are conserved lipid transfer proteins containing long hydrophobic grooves consisting of multiple repeating modules made of five β-sheets followed by a loop.
