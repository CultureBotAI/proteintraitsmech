identifier: InterPro:IPR063192
label: "TPLATE, immunoglobulin-like domain"
definition: >-
  This entry represents an immunoglobulin-like domain found in TPLATE and related proteins in plants. TPLATE is an adaptin-like protein that functions in vesicle-trafficking events required for site-specific cell wall modifications during pollen germination and cytokinesis. The protein localises to the forming cell plate and cortical division zone during cytokinesis and interacts with clathrin components CLC2 and CHC2. TPLATE is essential for proper pollen development and disruption results in male sterility due to production of non-viable pollen. While the full-length TPLATE protein is critical for cytokinesis and vesicle trafficking, the specific function of this immunoglobulin-like domain remains to be determined.
