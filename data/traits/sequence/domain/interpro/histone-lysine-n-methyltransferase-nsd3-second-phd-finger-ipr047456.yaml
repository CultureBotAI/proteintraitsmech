identifier: InterPro:IPR047456
label: "Histone-lysine N-methyltransferase NSD3, second PHD finger"
definition: >-
  This entry represents the second PHD finger found in NSD3 and similar sequences from vertebrates. Nuclear receptor-binding SET domain-containing protein 3 (NSD3), also called histone-lysine N-methyltransferase NSD3 or Wolf-Hirschhorn syndrome candidate 1-like protein 1 (WHSC1L1), is a lysine methyltransferase encoded by gene NSD3, which is amplified in human breast cancer cell lines. Moreover, translocation resulting in NUP98 fusion to NSD3 leads to the development of acute myeloid leukaemia. NSD3 contributes to tumourigenesis by interacting with bromodomain-containing protein 4 (BRD4), the bromodomain and extraterminal (BET) protein, which is a potential therapeutic target in acute myeloid leukaemia. NSD3 contains a SET, two PWWP domains, five plant-homeodomain (PHD) zinc finger motifs, and an NSD-specific Cys-His rich domain (C5HCH). The SET domain is responsible for histone methyltransferase activity. The PWWP and PHD domains are involved in protein-protein interactions.
