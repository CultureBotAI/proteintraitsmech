identifier: InterPro:IPR031910
label: "Germinal-centre associated nuclear protein, CID domain"
definition: >-
  CID is a domain found in higher eukaryotic germinal-cent associated nuclear protein (GANP) that binds to the transcription and mRNA export factor ENY2. The complex of these two proteins forms part of the TREX-2 complex that links transcription with nuclear messenger RNA export.
