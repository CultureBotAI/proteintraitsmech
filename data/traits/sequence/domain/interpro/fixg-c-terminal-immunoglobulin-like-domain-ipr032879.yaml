identifier: InterPro:IPR032879
label: "FixG, C-terminal immunoglobulin-like domain"
definition: >-
  This domain is part of a transmembrane protein, FixG, itself part of the FixGHIS operon closely associated with the FixNOPQ operon that is the symbiotically essential cbb3-type haem-copper oxidase complex. FixG expression is induced by oxygen-deprivation. This C-terminal domain adopts an E-set Ig-like fold.
