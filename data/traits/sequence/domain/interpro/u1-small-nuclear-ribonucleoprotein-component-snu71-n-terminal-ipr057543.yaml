identifier: InterPro:IPR057543
label: "U1 small nuclear ribonucleoprotein component SNU71, N-terminal"
definition: >-
  This entry represents the N-terminal domain of U1 small nuclear ribonucleoprotein component SNU71 from yeast, which is a component of the U1 snRNP particle that recognises and binds the 5'-splice site of pre-mRNA. This domain is involved in protein cross-linking and binds between Prp42 N-terminal and the Snu56 KH-like fold.
