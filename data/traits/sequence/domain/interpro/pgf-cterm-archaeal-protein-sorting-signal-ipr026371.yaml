identifier: InterPro:IPR026371
label: "PGF-CTERM archaeal protein-sorting signal"
definition: >-
  This entry represents a strictly archaeal putative protein-sorting motif, PGF-CTERM. It is the (predicted) recognition sequence for an exosortase homologue, archaeosortase. In some archaea, up to fifty proteins have this domain as their C-terminal region, usually preceded by a Thr-rich region that typically is heavily glycosylated. The sorting signal removal depends on ArtA, a cysteine peptidase, in a process shown to be required for a C-terminal prenyl group attachment in the halobacterial major cell surface glycoprotein, an S-layer protein. However, it remains unclear if ArtA acts as a transpeptidase, like the analogous though unrelated sortase enzyme SrtA, or if lipid attachment is mediated by a separate protein.
