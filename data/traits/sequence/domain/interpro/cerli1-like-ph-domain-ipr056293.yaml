identifier: InterPro:IPR056293
label: "CERLI1-like, PH domain"
definition: >-
  This entry represents a PH domain that is found in the Rhoptry Surface Protein CERLI1 family. The Rhoptry Surface Protein CERLI1 family is essential for merozoite invasion of host cells, a critical step in the life cycle of the parasite Plasmodium falciparum. Members of the family control rhoptry secretion, which is pivotal for the successful invasion of host erythrocytes. The family proteins bind to specific lipids, including phosphatidic acid (PA) and phosphatidylinositol 4,5-bisphosphate (PIP2), suggesting a role in assembling the machinery that docks or primes the rhoptry to the parasite cell membrane prior to fusion with the host cell membrane. The cooperation between the C2 domain, which does not bind calcium, and the PH domain within these proteins is crucial for lipid binding and function.
