identifier: InterPro:IPR063033
label: "Picocyanobacterial DnaJ chaperone, middle domain"
definition: >-
  This entry represents a middle domain of approximately 115 residues found in DnaJ-related chaperone proteins from marine picocyanobacteria. These proteins contain this domain followed by a C-terminal DnaJ domain. DnaJ proteins are molecular chaperones that function as co-chaperones with DnaK/Hsp70, stimulating its ATPase activity. Some family members are annotated as cyanobacteria-specific chaperones. This entry is restricted to Prochlorococcus, Synechococcus, and Cyanobium species (Synechococcales). The specific function of this domain remains to be determined.
