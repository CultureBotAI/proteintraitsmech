identifier: InterPro:IPR004435
label: Molybdopterin-guanine dinucleotide biosynthesis protein B (MobB) domain
definition: >-
  The MobB domain is similar to that of the urease accessory protein UreG and the hydrogenase accessory protein HypB, both GTP hydrolases involved in loading nickel into the metallocentres of their respective target enzymes. It is involved in the final step of molybdenum-cofactor biosynthesis. While its precise function has not been identified it is thought to be involved in the transfer of a guanine dinucleotide moiety to molybdopterin, as it shows GTP-binding and weak GTPase activity. The MobB protein from Escherichia coli, which is comprised of this domain, is a homodimer. Each molecule is composed of two distinct regions - an outer region comprised of 6 β-strands and three α helices, and an inner region comprised of a two-strand β hairpin followed by an α helix. These regions require interaction with the second monomer to allow proper folding to occur. The two monomers are intertwined and form an extensive 16-stranded β-sheet. While the active site could not be positively identified, the presence of highly conserved residues suggests the substrate binding site occurs in the central solvent channel. The majority of molybdenum-containing enzymes utilise a molybdenum cofactor (MoCF or Moco) consisting of a Mo atom coordinated via a cis-dithiolene moiety to molybdopterin (MPT). MoCF is ubiquitous in nature, and the pathway for MoCF biosynthesis is conserved in all three domains of life. MoCF-containing enzymes function as oxidoreductases in carbon, nitrogen, and sulphur metabolism.
