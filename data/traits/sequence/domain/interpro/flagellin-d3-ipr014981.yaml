identifier: InterPro:IPR014981
label: "Flagellin D3"
definition: >-
  This domain is found in the central portion bacterial flagellin FliC, it contains a structural motif called a β-folium fold. Although no specific function is assigned its deletion leads to a reduction in filament stability.
