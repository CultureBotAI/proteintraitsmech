identifier: InterPro:IPR018977
label: "NurA domain"
definition: >-
  This domain is found in several uncharacterised proteins and in NurA, a nuclease exhibiting both single-stranded endonuclease activity and 5'-3' exonuclease activity on single-stranded and double-stranded DNA from the hyperthermophilic archaeon Sulfolobus acidocaldarius.
