identifier: InterPro:IPR040997
label: "IL-7Ralpha, fibronectin type III domain"
definition: >-
  This domain is found in Interleukin-7 receptor subunit alpha (IL-7Ralpha), which together IL-7 form a complex crucial to several signalling cascades leading to the development and homeostasis of T and B cells. IL-7Ralpha carries a 219 residue ectodomain on the N-terminal region which is crucial for T and B-cell development. Mutations in the IL-7Ralpha ectodomain inhibits T and B cell development, resulting in patients with a form of severe combined immunodeficiency (SCID). The ectodomain folds into two fibronectin type III (FNIII) domains connected by a 310-helical linker. This entry comprises the first of the two FNIII domains, D1. In the D1 domain of IL-7Ralpha, a disulfide bond (C22R-C37R) conserved among cytokine receptor class I (CRH I) family members bridges two β strands.
