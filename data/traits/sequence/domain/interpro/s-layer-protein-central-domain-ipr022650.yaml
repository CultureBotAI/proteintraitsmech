identifier: InterPro:IPR022650
label: "S-layer protein, central domain"
definition: >-
  This entry represents the central domain of archaeal S-layer proteins. Members of this family are found in (for example) Pyrococcus horikoshii (split into two tandem reading frames), Methanocaldococcus jannaschii (Methanococcus jannaschii), and related species. Some local similarity can be found to other S-layer protein families. This domain is found inserted in the outer domain.
