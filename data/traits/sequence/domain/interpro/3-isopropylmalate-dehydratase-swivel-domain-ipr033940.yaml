identifier: InterPro:IPR033940
label: "3-isopropylmalate dehydratase, swivel domain"
definition: >-
  3-isopropylmalate dehydratase (or isopropylmalate isomerase; IPMI; ) catalyses the stereo-specific isomerisation of 2-isopropylmalate and 3-isopropylmalate, via the formation of 2-isopropylmaleate. This enzyme performs the second step in the biosynthesis of leucine, and is present in most prokaryotes and many fungal species. The prokaryotic enzyme is a heterodimer composed of a large (LeuC) and small (LeuD) subunit, while the fungal form is a monomeric enzyme. Both forms of isopropylmalate are related and are part of the larger aconitase family. This entry represents the aconitase-like swivel domain of 3-isopropylmalate dehydratase small subunit, which is believed to undergo swivelling conformational change in the enzyme mechanism.
