identifier: InterPro:IPR041393
label: "Sld3, N-terminal"
definition: >-
  This entry represents the N-terminal domain of Sld3 which is shown to bind to the N-terminal domain of Sld7. It adopts a Ku70-like β-barrel fold that in this protein is truncated, containing five β-strands.
