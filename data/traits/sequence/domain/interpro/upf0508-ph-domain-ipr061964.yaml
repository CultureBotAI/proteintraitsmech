identifier: InterPro:IPR061964
label: "UPF0508, PH domain"
definition: >-
  This entry represents the PH (pleckstrin homology) domain found in UPF0508 proteins, uncharacterised sequences found in yeasts. The full-length proteins range from approximately 540-850 amino acids in length and contain disordered regions and low-complexity sequences. The proteins were initially identified through genome sequencing projects of Saccharomyces cerevisiae and related yeasts. Some UPF0508 members in S. cerevisiae are truncated due to transposon insertion events. UPF0508 proteins are conserved across different fungal species within the Saccharomycetaceae family. The specific function of this domain remains to be determined.
