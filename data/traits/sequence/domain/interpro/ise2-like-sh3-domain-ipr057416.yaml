identifier: InterPro:IPR057416
label: "ISE2-like, SH3 domain"
definition: >-
  This predicted SH3 domain is found in DExH-box ATP-dependent RNA helicase DExH15 chloroplastic from Arabidopsis thaliana (ISE2) and similar plant proteins. ISE2 is involved in group II intron splicing. It is required during embryogenesis and is involved in post-transcriptional gene silencing.
