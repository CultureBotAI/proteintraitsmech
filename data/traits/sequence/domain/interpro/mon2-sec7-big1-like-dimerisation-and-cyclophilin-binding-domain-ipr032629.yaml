identifier: InterPro:IPR032629
label: "Mon2/Sec7/BIG1-like, dimerisation and cyclophilin-binding domain"
definition: >-
  This is the N-terminal domain of Mon2-, Sec7- and BIG1-like proteins, the dimerisation and cyclophilin-binding domain (DCB). The N terminus of Mon2 (Ysl2) binds to Arf-Like small GTPase Arl1, and shows homology to brefeldin A-inhibited guanine-exchange factor (BIG) domains. Mon2 and BIG1-like proteins play an important role in membrane traffic and Golgi homeostasis. This domain is sufficient for targeting BIG1 to the Golgi.
