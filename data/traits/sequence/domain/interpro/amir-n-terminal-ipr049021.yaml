identifier: InterPro:IPR049021
label: "AmiR, N-terminal"
definition: >-
  This is the N-terminal domain of Aliphatic amidase regulator (AmiR), which acts as a transcriptional antitermination factor. It positively controls AmiE, the gene for aliphatic amidase.
