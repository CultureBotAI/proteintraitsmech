identifier: InterPro:IPR047214
label: "Pyruvate decarboxylase/indolepyruvate decarboxylase-like, PP-binding domain"
definition: >-
  The thiamine pyrophosphate (TPP) family has a thiamin diphosphate-binding fold consisting of two different functional modules, the pyridine-binding (Pyr) and pyrophosphate-binding (PP) modules. This entry represents the PP-binding module found at the C-terminal of pyruvate decarboxylase (PDC), indolepyruvate decarboxylase (IPDC) and related proteins from the thiamine pyrophosphate (TPP) family. TPP binds in the cleft formed by a PYR domain and a PP domain. The PYR domain, binds the aminopyrimidine ring of TPP, the PP domain binds the diphosphate residue. The PYR and PP domains have a common fold, but do not share strong sequence conservation. Most TPP-dependent enzymes have the PYR and PP domains on the same subunit although these domains can be alternatively arranged in the primary structure. TPP-dependent enzymes are multisubunit proteins, the smallest catalytic unit being a dimer-of-active sites, for many the active sites lie between PP and PYR domains on different subunits.
