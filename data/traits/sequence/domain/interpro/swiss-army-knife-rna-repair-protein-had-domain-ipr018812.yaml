identifier: InterPro:IPR018812
label: "Swiss Army Knife RNA repair protein, HAD domain"
definition: >-
  This entry represents the HAD domain found in the so-called 'Swiss Army Knife' (SAK) repair protein, which is predicted to play a role in RNA repair. SAK may be involved in phosphate group removal during RNA re-ligation. There are two characteristic sequence motifs, GGWW and TGR.
