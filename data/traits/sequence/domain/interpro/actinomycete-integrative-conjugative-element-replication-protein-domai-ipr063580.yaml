identifier: InterPro:IPR063580
label: "Actinomycete integrative conjugative element replication protein domain"
definition: >-
  This entry represents a domain found in ATP-binding replication initiation protein (RepA) of approximately 230 residues found in actinomycete integrative and conjugative elements (AICEs). The prototype is SCO4617 from the SLP1 element of Streptomyces coelicolor. These proteins function in replication initiation of circular and linear plasmids. The domain is structurally related to AAA ATPases. This domain is found predominantly in Actinomycetota, Pseudomonadota and Bacillota.
