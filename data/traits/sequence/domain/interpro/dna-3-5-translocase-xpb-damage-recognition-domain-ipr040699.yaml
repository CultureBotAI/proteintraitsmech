identifier: InterPro:IPR040699
label: "DNA 3'-5' translocase XPB, damage recognition domain"
definition: >-
  This domain is found in the N-terminal region of DNA 3'-5' translocase XPB helicase present in Archaeoglobus fulgidus. XPB is essential for transcription, nucleotide excision repair, and TFIIH functional assembly. The domain is a damage recognition domain (DRD) which allows XPB to unwind damaged DNA as needed for nucleotide excision repair.
