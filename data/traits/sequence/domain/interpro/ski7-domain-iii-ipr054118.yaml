identifier: InterPro:IPR054118
label: "Ski7, domain III"
definition: >-
  This entry represents the third domain (domain III) of the Superkiller protein 7 (Ski7), a cofactor of the cytoplasmic exosome that functions in mRNA turnover and non-stop decay (NSD). The C-terminal region of these proteins is organised into three domains, with domain I adopting the α/β fold of GTP-binding domains, and domains II and III each adopting the structure of a closed β-barrel. Domains II and III appear to form a single unit and interact with the G domain, and the three domains interact intra-molecularly not only via their globular folds but also via extended segments. The Ski7 domain II shares overall sequence similarity with the translational GTPase (trGTPase) Hbs1, but unlike other trGTPases, Ski7 might function as a GTP-binding protein rather than a GTP-hydrolyzing enzyme.
