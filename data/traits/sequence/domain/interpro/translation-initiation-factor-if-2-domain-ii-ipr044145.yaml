identifier: InterPro:IPR044145
label: "Translation initiation factor IF-2, domain II"
definition: >-
  Initiation factor 2 (IF-2) (gene infB) is one of the three factors required for the initiation of protein biosynthesis in bacteria. IF-2 promotes the GTP-dependent binding of the initiator tRNA to the small subunit of the ribosome. IF-2 is a protein of about 70 to 95 Kd which contains a central GTP-binding domain flanked by a highly variable N-terminal domain and a more conserved C-terminal domain. Bacterial IF-2 is structurally and functionally related to eukaryotic mitochondrial IF-2 (IF-2(mt)) as well as to algal and plants chloroplast IF-2 (IF-2(chl)). Both IF-2(mt) and IF-2(chl) are encoded by nuclear genes and are produced as precursor proteins with a transit peptide. An exception are red algae where IF-2(chl) is encoded by the plastid genome. This entry represents the domain II of bacterial Initiation Factor 2 (IF2) and its eukaryotic mitochondrial homologue mtIF2.
