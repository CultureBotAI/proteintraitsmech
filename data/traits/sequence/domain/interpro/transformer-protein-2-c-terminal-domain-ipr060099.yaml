identifier: InterPro:IPR060099
label: "Transformer protein 2, C-terminal domain"
definition: >-
  This entry represents the C-terminal intracellular domain of the transformer protein 2 (TRA-2) from Caenorhabditis elegans and proteins from related species. This domain contains the MX regulatory region, which is required for binding to the TRA-1 transcription factor and mediates post-translational regulation essential for hermaphrodite spermatogenesis. The domain also contains a region involved in interaction with FEM-3 protein. The C-terminal domain is produced as a separate isoform (TRA-2B) through cleavage by TRA-3 protease, which generates a feminising cytoplasmic form lacking the N-terminal membrane-spanning regions. TRA-2 is a multi-pass transmembrane protein that plays a major role in controlling sexual cell fates. The full-length protein contains multiple transmembrane helical regions and is localised to the membrane. TRA-2 promotes female development by sequestering FEM proteins to the membrane, thereby allowing TRA-1 to enter the nucleus and promote female development.
