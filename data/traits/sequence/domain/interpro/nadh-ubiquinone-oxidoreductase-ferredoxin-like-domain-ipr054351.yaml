identifier: InterPro:IPR054351
label: "NADH-ubiquinone oxidoreductase, ferredoxin-like domain"
definition: >-
  This entry represents the second ferredoxin-like domain found in proteins from the complex I 75 kDa subunit family, including human NADH-ubiquinone oxidoreductase 75 kDa subunit , mitochondrial, NADH-quinone oxidoreductase subunit G from Escherichia coli and NADH dehydrogenase [ubiquinone] iron-sulfur protein 1, mitochondrial from Arabidopsis thaliana. This domain contains a Fe4-S4 cluster, one of the redox centres of the complex. This domain is also found in related proteins such as NAD-reducing hydrogenase HoxS subunit gamma that along with subunit alpha exhibits NADH:oxidoreductase activity. It is also found in the NADP(+)-dependent formate dehydrogenase subunit alpha which is involved in the NADP-dependent reduction of CO2 to format.
