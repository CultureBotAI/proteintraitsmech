label: "Phosphoethanolamine N-methyltransferase 2, N-terminal"
definition: >-
  This is the N-terminal vestigial domain found in Haemonchus contortus phosphoethanolamine N-methyltransferases 2 (PMT2). Structural analysis reveal changes leading to loss of function in the vestigial domains of the nematode PMT.
