identifier: InterPro:IPR048604
label: "Reovirus core-spike protein lambda-2-like, ferredoxin-like domain"
definition: >-
  Reovirus core-spike protein VP1/lambda-2 (VP1/L2) forms a pentamer that mediates enzymatic reactions in 5' capping of the viral plus-strand transcripts. It forms a hollow cylinder with projecting turrets. Each VP1/L2 monomer consists of eight domains with the most N-terminal domain at the base of the turret and the most C-terminal domain at the top. This entry represents the fourth domain, which adopts a ferredoxin-like fold consisting of four β-strands protected by α-helices that probably functions as a structural support for the three enzymatic domains (two methyltransferases and GTase domains).
