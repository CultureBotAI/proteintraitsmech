identifier: InterPro:IPR053868
label: "Pel9A-like, right handed beta-helix region"
definition: >-
  This region is found in Pectate lyase L from Erwinia chrysanthemi (Pel9A) and similar bacterial and fungal proteins. Pel9A shows endo-cleaving activity on polygalacturonate or partially methylated pectin and has an important role in soft-rot disease. This region forms a parallel β-helix domain.
