identifier: InterPro:IPR018712
label: "T6SS, Phospholipase effector Tle1-like, catalytic domain"
definition: >-
  This entry represents a domain found in the type VI secretion system (T6SS) Phospholipase effector Tle1 from Pseudomonas aeruginosa and similar bacterial and fungal sequences. Tle1, which hydrolyse membrane phospholipids, is organised into two distinct parts, the phospholipase catalytic module (this entry) and the putative membrane-anchoring module. This domain adopts a compact conformation with a classical mixed α/β-hydrolase fold that shows of seven central parallel β-sheets and 13 α-helices.
