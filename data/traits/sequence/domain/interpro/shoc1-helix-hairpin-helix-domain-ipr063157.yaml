identifier: InterPro:IPR063157
label: "SHOC1, helix-hairpin-helix domain"
definition: >-
  This entry represents the Helix-hairpin-helix tandem domain of SHOC1 (Shortage In Chiasmata 1) proteins found in plants. SHOC1 is an XPF endonuclease-related protein essential for the formation of class I meiotic crossovers. The full-length SHOC1 protein forms complexes with PTD and interacts with ZIP4 to regulate crossover formation during meiosis. SHOC1 localises to meiocyte chromosomes from leptotene to early pachytene, with maximal foci at zygotene. The protein is highly expressed in young buds where male meiosis occurs and in anthers and pistils during meiosis. SHOC1-deficient plants show impaired fertility due to reduced meiotic crossovers. The protein contains multiple disordered regions and belongs to the XPF family.
