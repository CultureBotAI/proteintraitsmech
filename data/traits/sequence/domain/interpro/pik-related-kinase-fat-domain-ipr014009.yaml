identifier: InterPro:IPR014009
label: "PIK-related kinase, FAT domain"
definition: >-
  Phosphatidylinositol kinase (PIK)-related kinases participate in meiotic and V(D)J recombination, chromosome maintenance and repair, cell cycle progression, and cell cycle checkpoints, and their dysfunction can result in a range of diseases, including immunodeficiency, neurological disorder and cancer. The catalytic kinase domain is highly homologous to that of phosphatidylinositol 3- and 4-kinases. Nevertheless, members of the PIK-related family appear functionally distinct, as none of them has been shown to phosphorylate lipids, such as phosphatidylinositol; instead, many have Ser/Thr protein kinase activity. The PI-kinase domain of members of the PIK-related family is wedged between the ~550-amino acid-long FAT (FRAP, ATM, TRRAP) domain and the ~35 residue C-terminal FATC domain. It has been proposed that the FAT domain could be of importance as a structural scaffold or as a protein-binding domain, or both.
