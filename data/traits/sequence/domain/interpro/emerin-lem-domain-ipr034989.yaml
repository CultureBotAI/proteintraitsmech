identifier: InterPro:IPR034989
label: "Emerin, LEM domain"
definition: >-
  Emerin is an inner nuclear membrane protein with roles in nuclear "lamina" structure, nuclear assembly, chromatin tethering, gene regulation, mitosis, development and signaling. Emerin is absent from the inner nuclear membrane in most patients with X-linked muscular dystrophy. BAF recruits emerin to chromatin and regulates higher-order chromatin structure during nuclear assembly. Emerin interacts with A-type lamins. It contains an N-terminal LEM domain followed by a poly-serine segment, a region rich in hydrophobic amino acids comprising the nuclear localization signal (NLS) followed by another poly-serine segment, and a C-terminal transmembrane region. The LEM domain of Emerin is involved in interaction with the DNA binding protein barrier-to-autointegration factor (BAF).
