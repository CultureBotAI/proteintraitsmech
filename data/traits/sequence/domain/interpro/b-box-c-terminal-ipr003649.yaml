identifier: InterPro:IPR003649
label: "B-box, C-terminal"
definition: >-
  The B-box C-terminal domain is a coiled coil region C-terminal to (some) B-Box domains ( ). It is found in Tripartite motif-containing protein 2/3/67/66, E3 ubiquitin-protein ligase TRIM9/TRIM33/TRIM23/TRIM45/TRIM37, Fibronectin type III and similar proteins.
