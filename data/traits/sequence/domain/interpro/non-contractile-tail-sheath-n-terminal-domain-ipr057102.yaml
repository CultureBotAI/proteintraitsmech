identifier: InterPro:IPR057102
label: "Non-contractile tail sheath, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in the non-contractile tail sheath protein (NCTSP) from Bacteriophage N4 (BPN4). This protein is essential for BPN4 infectivity and it is hypothesized that it mediates binding with target cell receptors. The function of this domain is unknown. This entry also includes sequences from bacteria, predominantly from Sphingobium spp.
