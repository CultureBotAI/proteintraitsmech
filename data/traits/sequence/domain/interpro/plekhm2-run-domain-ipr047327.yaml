identifier: InterPro:IPR047327
label: "PLEKHM2, RUN domain"
definition: >-
  This entry represents the RUN domain of PLEKHM2 and similar animal proteins. Pleckstrin homology domain-containing family M member 2 (PLEKHM2), also called Salmonella-induced filaments A (SifA) and Kinesin-Interacting Protein (SKIP), is the lysosome, melanosome and lytic granule cargo adaptor that controls lysosome positioning using a composite kinesin-1 heavy and light chain-binding domain. In addition to kinesin-1, it also interacts with several Rabs to affect endosomal trafficking.
