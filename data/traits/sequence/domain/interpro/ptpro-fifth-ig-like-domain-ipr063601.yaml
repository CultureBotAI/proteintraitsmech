identifier: InterPro:IPR063601
label: "PTPRO, fifth Ig-like domain"
definition: >-
  This entry represents the fifth Ig-like domain of receptor-type tyrosine protein phosphatase O (PTPRO). PTPRO is characterised by its tyrosine phosphatase activity. It plays a crucial role in regulating the relationship between glomerular pressure and filtration rate, which is achieved through its impact on podocyte structure and function. This protein is part of the protein-tyrosine phosphatase family, specifically within the receptor class 3 subfamily. These proteins, when phosphorylated, interact with proteins such as FYN and GRB2, indicating their involvement in signalling pathways.
