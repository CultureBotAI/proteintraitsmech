identifier: InterPro:IPR018290
label: "MULE transposase, N-terminal all-beta domain"
definition: >-
  This entry represents a domain with an all-β structure that is found in Mutator-like elements (MULE)-encoded tranposases, some of which also contain a zinc-finger motif. This domain is found associated with the WRKY domain.
