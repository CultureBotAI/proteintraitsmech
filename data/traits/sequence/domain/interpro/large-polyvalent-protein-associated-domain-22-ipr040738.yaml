identifier: InterPro:IPR040738
label: "Large polyvalent protein associated domain 22"
definition: >-
  This is a predicted enzymatic α-helical domain with highly conserved aspartate residues. The domain is found in polyvalent proteins of phage and prophage genes and is often the immediate neighbour of a lysozyme gene.
