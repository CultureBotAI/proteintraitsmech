identifier: InterPro:IPR058767
label: "MCM8, N-terminal domain"
definition: >-
  This domain is found N-terminal in the DNA helicase MCM8 and related proteins. Minichromosome maintenance 8 (MCM8) is a member of the minichromosome maintenance family, which possesses helicase and ATPase activity. It interacts with MCM9 and participates in homologous recombination repair and (HR) repair pathway. MCM8/9 dysfunction can cause genome instability. MCM8/9 complex forms a 3:3 hetero-hexamer in an alternating pattern.
