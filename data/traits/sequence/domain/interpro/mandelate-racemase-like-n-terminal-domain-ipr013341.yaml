identifier: InterPro:IPR013341
label: "Mandelate racemase-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain in mandelate racemase enzymes, including L-rhamnonate dehydratase, D-galactonate dehydratase and related proteins. These enzymes share a bidomain structure containing a capping domain and a C-terminal barrel domain. The N-terminal domain forms part of the capping domain. L-rhamnonate dehydratase (RhamD; ) catalyses the Mg2+-dependent dehydration of L-rhamnonate (6-deoxy-L-mannonate) to 2-keto-3-deoxy-L-rhamnonate (KDR) via a syn-dehydration mechanism. The enzyme displays promiscuous substrate specificity, also accepting L-mannonate, L-lyxonate, and D-gulonate as substrates, though with lower efficiency. RhamD belongs to the mandelate racemase (MR) subgroup of the enolase superfamily. Like other members, the enzyme contains an N-terminal α+β capping domain and a C-terminal (β/α)7β-barrel (modified TIM-barrel) catalytic domain, with the active site located at the interface between the two domains. The enzyme binds one Mg2+ ion per subunit, coordinated by three carboxylate residues (Asp, Glu, Glu) at the ends of the third, fourth, and fifth β-strands. A conserved His-Asp dyad functions as the catalytic machinery: the His residue acts as both the general base (abstracting the C2 proton to form a Mg2+-stabilised enediolate intermediate) and general acid (facilitating departure of the 3-OH group and delivering a proton to C3 with retention of configuration).
