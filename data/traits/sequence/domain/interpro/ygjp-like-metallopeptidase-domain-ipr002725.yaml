identifier: InterPro:IPR002725
label: "YgjP-like, metallopeptidase domain"
definition: >-
  This is a conserved domain containing the catalytic zinc-metallopeptidase (HExxH) catalytic motif. Proteins containing this domain are found in some archaebacteria, as well as Helicobacter pylori. The proteins are 190-240 amino acids long, with the C terminus being the most conserved region, containing three conserved histidines. This domain is found in YgjP from E. coli, a predicted metal-dependent hydrolase that hydrolyses UTP to UMP and diphosphate in vitro; and in MJ0123 from Methanocaldococcus jannaschii (also referred to as projannalysin).
