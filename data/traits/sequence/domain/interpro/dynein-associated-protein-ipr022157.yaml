identifier: InterPro:IPR022157
label: "Dynein associated protein"
definition: >-
  This domain is found in eukaryotes, and is approximately 280 amino acids in length. The family is found in association with . There is a single completely conserved residue E that may be functionally important. Dynactin has been associated with Dynein, a kinesin protein which is involved in organelle transport, mitotic spindle assembly and chromosome segregation. Dynactin anchors Dynein to specific subcellular structures.
