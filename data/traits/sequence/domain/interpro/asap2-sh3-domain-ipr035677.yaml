identifier: InterPro:IPR035677
label: "ASAP2, SH3 domain"
definition: >-
  This entry represents the SH3 domain of ASAP2 (Arf-GAP with SH3 domain, ANK repeat and PH domain-containing protein 2). ArfGAPs are a protein family containing the ArfGAP domain. There are 31 genes encoding ArfGAPs in human. They catalyse the hydrolysis of GTP that is bound to Arf, thereby converting Arf-GTP to Arf-GDP.
