identifier: InterPro:IPR042761
label: CDK15, catalytic domain
definition: >-
  STKs (serine/threonine-protein kinases) catalyse the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. CDK15 (also known as PFTAIRE-2) is also referred to as ALS2CR7 (amyotrophic lateral sclerosis 2 (juvenile) chromosome region candidate 7). It has been shown to confer TRAIL (tumor necrosis factor-related apoptosis-inducing ligand) resistance to cancer cells via phosphorylation of survivin. It may be associated with amyotrophic lateral sclerosis 2 (ALS2), an autosomal recessive form of juvenile ALS. It shares sequence similarity with Cyclin-Dependent Kinases (CDKs), which belong to a large family of STKs that are regulated by their cognate cyclins. In general, CDKs and cyclins are involved in the control of cell-cycle progression, transcription, and neuronal function.
