identifier: InterPro:IPR060110
label: "FAM120A/B/C, helical domain"
definition: >-
  This entry represents a domain in Constitutive coactivator of PPAR-gamma-like protein 1 (FAM120A), FAM120B, FAM120C and similar proteins found in animals, including the Drosophila homologue protein asteroid. This domain is predicted to show an all α-configuration. FAM120A is a component of the oxidative stress-induced survival signalling. It may regulate the activation of SRC family protein kinases. It could act as a scaffolding protein enabling SRC family protein kinases to phosphorylate and activate PI3-kinase. It binds IGF2 RNA and promotes the production of IGF2 protein.
