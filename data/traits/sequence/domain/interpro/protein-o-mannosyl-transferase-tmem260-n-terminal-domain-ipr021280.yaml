identifier: InterPro:IPR021280
label: "Protein O-mannosyl-transferase TMEM260, N-terminal domain"
definition: >-
  This entry represents the transmembrane region of human Protein O-mannosyl-transferase TMEM260 and similar sequences from bacteria and metazoans. TMEM260 is an O-mannosyltransferase that transfers mannosyl residues to serine or threonine residues of target proteins. TMEM260 belongs to the glycosyltransferase 117 (GT117) family.
