identifier: InterPro:IPR062198
label: "HGL1/2, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Galactose/N-acetyl-D-galactosamine lectin heavy subunit 2 (HGL2) from Entamoeba histolytica and related sequences. HGL2 is a lectin which binds galactose and N-acetyl-D-galactosamine of host glycoproteins and thus mediates adhesion to host cells. It may mediate adherence to host colonic mucins, an essential step for pathogenic tissue invasion. This domain may adopt a mostly all-β fold.
