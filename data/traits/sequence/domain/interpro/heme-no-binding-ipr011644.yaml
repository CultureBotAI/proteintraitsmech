identifier: InterPro:IPR011644
label: Heme NO-binding
definition: >-
  The HNOB (Haem NO Binding) domain is a predominantly α-helical domain and binds heme via a covalent linkage to histidine. This domain is found in soluble guanylate cyclases, which are nitric oxide-responsive signaling proteins. It is predicted to function as a haem-dependent sensor for gaseous ligands and to transduce diverse downstream signals in both bacteria and animals. In Clostridium botulinum displays femtomolar affinity for nitrous oxide (NO).
