identifier: InterPro:IPR060451
label: "Y4rL, C-terminal three-helical bundle"
definition: >-
  This entry represents a small C-terminal three-helical bundle domain found in Y4rL, a putative uncharacterised protein from Sinorhizobium fredii. The protein is encoded on the symbiotic plasmid pNGR234a and belongs to the COG2801 functional category. However, the protein could be the product of a pseudogene. The specific function of this C-terminal domain is unknown.
