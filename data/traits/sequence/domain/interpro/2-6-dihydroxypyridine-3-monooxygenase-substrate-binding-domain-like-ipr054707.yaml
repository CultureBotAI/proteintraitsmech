identifier: InterPro:IPR054707
label: "2,6-dihydroxypyridine 3-monooxygenase, substrate binding domain-like"
definition: >-
  This domain is found in a number of FAD-binding enzymes from bacteria and eukaryotes including 2,6-dihydroxypyridine 3-monooxygenase from Paenarthrobacter nicotinovorans (DhpH), which catalyses the conversion of 2,6-dihydroxypyridine into 2,3,6-trihydroxypyridine in the nicotine degradation pathway. This protein is organised into three domains: an N-terminal FAD binding domain, an all-antiparallel β-sheet domain harbouring the substrate-binding site (represented by this entry) and a third forming connections between these domains.
