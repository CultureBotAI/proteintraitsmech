identifier: InterPro:IPR025913
label: Cep57 centrosome localisation domain
definition: >-
  The CLD or centrosome localisation domain of Cep57 is found at the N terminus, and lies approximately between residues 58 and 239. This region lies within the first α-helical coiled-coil segment of Cep57, and localises to the centrosome internally to gamma-tubulin, suggesting that it is either on both centrioles or on a centromatrix component. This N-terminal region can also multimerise with the N terminus of other Cep57 molecules.
