label: "DNA polymerase II large subunit DP2, central domain"
definition: >-
  This entry represents the central domain of DNA polymerase II large subunit from Pyrococcus abyssi (PolC) and similar sequences mainly found in archaea. This domain, which is found adjacent , shows an α-β configuration.
