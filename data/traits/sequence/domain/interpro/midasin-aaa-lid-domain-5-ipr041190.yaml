identifier: InterPro:IPR041190
label: "Midasin AAA lid domain 5"
definition: >-
  This entry represents the α helical AAA+ lid domain that is found to the C terminus of AAA domains. This lid domain is found in midasin, which is a nuclear chaperone required for maturation and nuclear export of pre-60S ribosome subunits.
