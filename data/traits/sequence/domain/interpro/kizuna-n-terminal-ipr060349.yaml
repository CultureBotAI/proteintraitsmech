identifier: InterPro:IPR060349
label: "Kizuna, N-terminal"
definition: >-
  This entry represents the N-terminal helical region of centrosomal protein kizuna. This N-terminal region contains a predicted coiled-coil domain and its specific function remains to be determined. Kizuna (is a Japanese word meaning "bond") is a centrosomal protein required for establishing a robust mitotic centrosome architecture that can endure the forces that converge on the centrosomes during spindle formation. It is required for stabilising the expanded pericentriolar material around the centriole. It can be regulated through phosphorylation by polo-like kinase 1 (Plk1).
