identifier: InterPro:IPR060397
label: "MNM1/HMG9-like, small beta-sheet domain"
definition: >-
  This entry represents a small β-sheet domain found in metabolic network modulator 1 (MNM1) and High mobility group B protein 9 (HMG9) from Arabidopsis thaliana and similar plant sequences. MNM1 is a lineage-specific modulator of primary metabolism. The protein is approximately 286 amino acids in length and contains AT-hook motifs. MNM1 influences flowering time, with disruption mutants showing slightly earlier flowering under both short and long-day conditions and altered metabolite profiles. The protein is mainly observed in young seedlings and emerging leaves, with expression in the vasculature of roots and cotyledons that later fades while remaining high in emerging leaves. MNM1 binds to transcription cis-regulatory regions. The protein contains multiple disordered regions and areas enriched in basic and acidic residues. HMG9 binds preferentially DNA with A/T-rich content and is required for karyogamy during female gametophyte development, when the two polar nuclei fuse to form the diploid central cell nucleus.
