identifier: InterPro:IPR047056
label: "Whirlin, harmonin_N-like domain 1"
definition: >-
  Whirlin (also known as DFNB31) is a PDZ-scaffold protein that plays an indispensable role in the cochlea and retina. It is involved in vestibular and auditory hair cell transduction, and is also expressed by proprioceptive sensory neurons (pSNs) in dorsal root ganglia in mice. It has been shown to act as a cytoskeletal linker to ensure proper paranodal compaction and stabilization of the axonal cytoskeleton in myelinated axons. Mutations in the whirlin gene cause retinal degeneration and hearing loss in Usher syndrome type II (USH2) and non-syndromic deafness, DFNB31. This entry represents the first harmonin_N-like domain of the long isoform of Whirlin, which is not present in the short isoform. It is thought to have a protein-binding role.
