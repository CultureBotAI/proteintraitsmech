identifier: InterPro:IPR039412
label: "Cathepsin C"
definition: >-
  Cathepsin C (also known as Dipeptidyl Peptidase I or DPPI MEROPS identifier C01.070) is an atypical papain-like cysteine peptidase with chloride dependency and dipeptidyl peptidase activity, resulting from its tetrameric structure which limits substrate access. Each subunit of the tetramer is composed of three peptides: the heavy and light chains, which together adopts the papain fold and forms the catalytic domain; and the residual propeptide region, which forms a β barrel and points towards the substrate's N terminus. The subunit composition is the result of the unique characteristic of procathepsin C maturation involving the cleavage of the catalytic domain and the non-autocatalytic excision of an activation peptide within its propeptide region. By removing N-terminal dipeptide extensions, cathepsin C activates granule serine peptidases (granzymes) involved in cell-mediated apoptosis, inflammation and tissue remodelling. Loss-of-function mutations in cathepsin C are associated with Papillon-Lefevre and Haim-Munk syndromes, rare diseases characterised by hyperkeratosis and early-onset periodontitis.
