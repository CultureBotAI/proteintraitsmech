identifier: InterPro:IPR005556
label: "Secreted beta-glucosidase SUN1-like domain"
definition: >-
  This entry represents the conserved domain of Sun family from fungi. In budding yeasts there are four identified members: Nca3, Sim1, Sun4 and Uth. They hey share a common C-terminal domain of 258 amino acids bearing 75-85% identity. These C-terminal regions comprise a putative Fe-binding domain consisting in Cys residues organised in a Cys-X5-Cys-X3-Cys-X24-Cys motif. Despite this remarkable homology, the SUN family members have been linked to various, often unrelated cellular processes such as those connected to mitochondrial and cell wall functions. Interestingly, they seem to be involved in the remodelling of the yeast cell wall during the various phases of yeast culture development and under various environmental conditions.
