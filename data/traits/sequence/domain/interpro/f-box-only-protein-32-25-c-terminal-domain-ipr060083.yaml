identifier: InterPro:IPR060083
label: "F-box only protein 32/25, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of F-box only protein 32/25 (FBXO32/25). This domain follows the F-box domain and is involved in protein-protein interactions, particularly with beta-actin through its N-terminal region. This domain may play a role in regulating. These proteins are substrate-recognition components of SCF E3 ubiquitin ligase complexes. FBXO32 mediates cyclin D1 protein stabilisation via 'Lys-27'-linked ubiquitination. FBXO25 is predominantly expressed in brain tissue. The protein is localised to the nucleus where it associates with subnuclear dot-like structures. The protein is specifically expressed in cardiac and skeletal muscle and shuttles between cytoplasm and nucleus.
