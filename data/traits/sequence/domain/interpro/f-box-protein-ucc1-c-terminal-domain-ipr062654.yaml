identifier: InterPro:IPR062654
label: "F-box protein UCC1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of UCC1 and related F-box proteins from fungal species. This domain is responsible for substrate recognition and binding within the SCF(UCC1) ubiquitin ligase complex. UCC1 specifically recognises and binds to CIT2 protein, leading to its ubiquitination and subsequent proteasomal degradation. The domain acts as a metabolic switch for the glyoxylate cycle by controlling CIT2 protein levels to maintain citrate homeostasis. This region is essential for the substrate specificity of the SCF complex.
