identifier: InterPro:IPR060435
label: "XisA/XisC excisase, second domain"
definition: >-
  This entry represents the second domain found in XisA and XisC excisases from Nostoc sp. PCC 7120 and related cyanobacteria. These proteins are site-specific recombinases essential for DNA excision during heterocyst differentiation. XisA is necessary for excision of the 11 kb nifD element, while XisC is required for excision of the 10.5 kb hupL element. The proteins contain a C-terminal tyrosine recombinase catalytic domain and this second domain located in the N-terminal region. The function of this second domain is unknown.
