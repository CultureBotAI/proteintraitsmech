identifier: InterPro:IPR060389
label: "Meteorin-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of human meteorin (METRN), meteorin-like protein (METRNL, also known as subfatin) and similar animal sequences. This domain is located between the signal peptide and the main structural domain. This N-terminal region contains conserved cysteine residues that form disulphide bonds. The specific function of this domain, which contains a CUB fold, remains to be determined. METRNL is a secreted hormone induced following exercise or cold exposure that promotes energy expenditure and browning of white adipose tissue. The protein stimulates eosinophil-dependent IL4 expression and promotes alternative activation of adipose tissue macrophages, leading to increased thermogenic gene expression.
