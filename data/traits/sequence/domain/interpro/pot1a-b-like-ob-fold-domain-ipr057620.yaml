identifier: InterPro:IPR057620
label: "POT1A/B-like, OB fold domain"
definition: >-
  This domain is found towards the C-terminal end of Protection of telomeres protein 1a/b from Arabidopsis thaliana (POT1A) an similar proteins mainly found in plants. This domain is predicted to adopt an OB fold. POT1A is a component of the telomerase ribonucleoprotein complex that is essential for the positive regulation of telomere length. POT1B negatively regulates telomerase activity and participates in chromosome end protection.
