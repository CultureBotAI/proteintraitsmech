identifier: InterPro:IPR044130
label: Iron transport multicopper oxidase Fet3-like, the second Cupredoxin domain
definition: >-
  Fet3 is a multicopper-containing glycoprotein localised to the yeast plasma membrane that catalyses the oxidation of Fe(II) to Fe(III). The periplasmic produced Fe(III) is transferred to the permease Ftr1 for import into the cytosol. The four copper ions are inserted post-translationally and are essential for catalytic activity, thus linking copper and iron homeostasis. Like other related multicopper oxidases (MCOs), Fet3 is composed of three cupredoxin domains that include one mononuclear and one trinuclear copper centre. The copper ions are bound in several sites: Type 1, Type 2, and/or Type 3. The ensemble of types 2 and 3 copper is called a trinuclear cluster. MCOs oxidize their substrate by accepting electrons at a mononuclear copper centre and transferring them to the active site trinuclear copper centre. The cupredoxin domain 2 of 3-domain MCOs has lost the ability to bind copper. This entry represents the the second Cupredoxin domain of Fet3. This domain can also be found in Fet5, Gmc1 from budding yeasts and Fio1 from fission yeasts.
