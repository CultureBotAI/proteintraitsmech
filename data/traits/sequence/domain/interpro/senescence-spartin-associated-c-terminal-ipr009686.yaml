identifier: InterPro:IPR009686
label: "Senescence/spartin-associated, C-terminal"
definition: >-
  This is the AAA ATPase domain found at the C-terminal of plant senescence-associated proteins and spartin. In Hemerocallis, petals have a genetically based program that leads to senescence and cell death approximately 24 hours, after the flower opens, and it is believed that senescence proteins produced around that time have a role in this program. This domain is also found at the C-terminal of Spartin, a protein from higher vertebrates associated with endosomal trafficking and microtubule dynamics. Spartin functions presynaptically with endocytic adaptor Eps15 to regulate synaptic growth and function. Mutations in human spartin gene cause Troyer syndrome, a hereditary spastic paraplegia. This AAA ATPase domain similar to other AAA proteins contain an α/β nucleotide-binding domain (NBD) and a smaller four-helix bundle domain (HBD). Uniquely among AAA structures, spastin has two helices (N-terminal α1 and C-terminal α11) that embrace the NBD.
