identifier: InterPro:IPR030887
label: "YaiO, beta-barrel domain"
definition: >-
  Proteins in this entry share a domain of bacterial outer membrane β-barrel, up to the protein C-terminal residue (usually Phe or Trp). The member YaiO was experimentally shown to be localised to the outer membrane.
