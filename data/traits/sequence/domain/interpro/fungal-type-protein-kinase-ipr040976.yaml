identifier: InterPro:IPR040976
label: "Fungal-type protein kinase"
definition: >-
  This domain is a variant of the protein kinase domain that is found in fungi (mostly in Basidiomycota and Ascomycota). Proteins containing this domain include CRN8 (crinkler effector protein 8) from Phytophthora infestans. CRN8 is a secreted effector and a kinase that induces cell death when expressed in host plants.
