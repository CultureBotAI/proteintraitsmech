identifier: InterPro:IPR046881
label: "Divergent DnaB-like ATPase"
definition: >-
  This domain is found in a divergent DnaB-like helicase of the RecA-ATP-synthase superfamily of P-loop NTPases found in phages, which is characterised by a modified ATP-binding Walker B motif.
