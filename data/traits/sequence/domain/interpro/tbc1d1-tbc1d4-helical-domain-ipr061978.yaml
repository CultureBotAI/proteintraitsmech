identifier: InterPro:IPR061978
label: "TBC1D1/TBC1D4, helical domain"
definition: >-
  This entry represents a small helical domain of approximately 70 residues found in TBC1 entry members TBC1D1 and TBC1D4 (also known as AS160, Akt substrate of 160 kDa). This domain is located between the PTB/PID domains and the DUF3350 domain. TBC1D1 and TBC1D4 are Rab GTPase-activating proteins that regulate the trafficking and translocation of GLUT4-containing vesicles in response to insulin signalling. Insulin-stimulated phosphorylation by AKT and AMPK promotes GLUT4 translocation to the plasma membrane, increasing glucose uptake. Variants in TBC1D4 are associated with type 2 diabetes mellitus. Members are found in metazoans. The function of this domain remains to be determined.
