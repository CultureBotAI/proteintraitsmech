identifier: InterPro:IPR058805
label: "SpaO, FliM/N C-terminal related"
definition: >-
  This entry represents a domain found central in Surface presentation of the antigen protein SpaO from Salmonella typhimurium and related proteins. This domain is homologous to FliM/N C-terminal domain ( ) and has probably originated via a duplication event. SpaO contains two of these domains towards the C-terminal that swap in a similar fashion as the FliM and FliN C-terminal domains. SpaO is involved in a secretory pathway responsible for the surface presentation of determinants needed for the entry of Salmonella species into mammalian cells.
