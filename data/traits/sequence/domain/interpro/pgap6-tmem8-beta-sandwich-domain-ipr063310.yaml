identifier: InterPro:IPR063310
label: "PGAP6/TMEM8, beta-sandwich domain"
definition: >-
  This entry represents a β-sandwich domain found in PGAP6/TMEM8A and TMEM8B/NGX6 proteins in metazoans. This domain is located in the extracellular region before the EGF-like domain and transmembrane regions. PGAP6 is a GPI processing phospholipase A2 that removes acyl chains from GPI-anchored proteins, during the remodeling of GPI. It is required for shedding of the GPI-AP CRIPTO. TMEM8B/NGX6 has been identified as a candidate tumour suppressor that is downregulated in nasopharyngeal carcinoma. The domain represented by this entry contains a pair of highly conserved cysteine residues that are presicted to form disulfide bond. The specific function of this domain remains to be determined.
