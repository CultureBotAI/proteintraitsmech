identifier: InterPro:IPR031160
label: "F-BAR domain"
definition: >-
  All eukaryotic cells are surrounded by a plasma membrane, and they also contain multiple membrane-based organelles and structures inside cells. Thus membrane remodeling is likely to be important for most cellular activities and development. The Bin-Amphiphysin-Rvs (BAR) domain superfamily of proteins has been found to play a major role in remodeling cellular membranes linked with organelle biogenesis, membrane trafficking, cell division, cell morphology and cell migration. The BAR domain superfamily of proteins is evolutionarily conserved with representative members present from yeast to man. Currently there are three distinct families of BAR domain proteins: classical BAR, F-BAR (FCH-BAR e.g., Fes/CIP4 homology BAR e.g., Toca-1) and I- BAR (inverse-BAR e.g., IRSp53). The classical BAR, F-BAR, and I-BAR domains are structurally similar homodimeric modules with antiparallel arrangement of monomers. The F-BAR domain is emerging as an important player in membrane remodeling pathways. F-BAR domain proteins couple membrane remodeling with actin dynamics associated with endocytic pathways and filopodium formation. F-BAR domain containing proteins can be categorized into five sub-families based on their phylogeny which is consistent with the additional protein domains they possess, for example, RhoGAP domains, Cdc42 binding sites, SH2 domains, SH3 domains and tyrosine kinase domains. The N-terminal part (about one third) of the F-BAR domain was previously characterised as an FCH (FER-CIP4 homology) domain. However, the region of sequence similarity extends to an adjacent region with a coiled-coil (CC) structure. Hence, the F-BAR domain (FCH+CC, ~300 amino acids) has also been called extended FC (EFC) domain. The F-BAR domain plays a role in dimerization and membrane phospholi…
