identifier: InterPro:IPR035514
label: "SPIN90, SH3 domain"
definition: >-
  SPIN90, also known as NCK interacting protein with SH3 domain (NCKIPSD), is an F-actin binding protein that regulates actin polymerization and endocytosis. It associates with the Arp2/3 complex near actin filaments and determines filament localization at the leading edge of lamellipodia. SPIN90 is expressed in the early stages of neuronal differentiation and plays a role in regulating growth cone dynamics and neurite outgrowth. It also interacts with IRSp53 and regulates cell motility by playing a role in the formation of membrane protrusions. SPIN90 contains an N-terminal SH3 domain, a proline-rich domain, and a C-terminal VCA (verprolin-homology and cofilin-like acidic) domain. This entry represents the SH3 domain of SPIN90.
