identifier: InterPro:IPR011100
label: Glycosyl hydrolase family 67, catalytic domain
definition: >-
  Alpha-glucuronidases, components of an ensemble of enzymes central to the recycling of photosynthetic biomass, remove the alpha-1,2 linked 4-O-methyl glucuronic acid from xylans. This family represents the central catalytic domain of alpha-glucuronidase.
