identifier: InterPro:IPR049594
label: LIM/homeobox protein Lhx3/4-like, LIM domain 2
definition: >-
  This entry represents the second LIM domain of human LIM/homeobox protein Lhx3 and Lhx4 and similar animal proteins. Lhx3 and Lhx4 belong to the LHX protein family, which features two tandem N-terminal LIM domains and a C-terminal DNA binding homeodomain. Members of LHX family are found in the nucleus and act as transcription factors or cofactors. The Lhx3 and Lhx4 LIM-homeodomain transcription factors play essential roles in pituitary gland and nervous system development. As in other LIM domains, this domain family is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes.
