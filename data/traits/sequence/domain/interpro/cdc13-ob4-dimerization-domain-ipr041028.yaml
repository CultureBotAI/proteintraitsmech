identifier: InterPro:IPR041028
label: "Cdc13, OB4 dimerization domain"
definition: >-
  This domain is found in Cdc13 proteins in budding yeasts. The Cdc13-Stn1-Ten1 complex is crucial for telomere protection. This domain is the C-terminal OB4 domain and is responsible for dimerization. Dimerization of Cdc13 is important for high-affinity DNA binding.
