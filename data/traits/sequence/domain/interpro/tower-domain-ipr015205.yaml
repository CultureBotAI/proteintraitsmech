identifier: InterPro:IPR015205
label: "Tower domain"
definition: >-
  This domain adopts a secondary structure consisting of a pair of long, antiparallel α-helices (the stem) that support a three-helix bundle (3HB) at their end. The 3HB contains a helix-turn-helix motif and is similar to the DNA binding domains of the bacterial site-specific recombinases, and of eukaryotic Myb and homeodomain transcription factors. The Tower domain has an important role in the tumour suppressor function of BRCA2, and is essential for appropriate binding of BRCA2 to DNA.
