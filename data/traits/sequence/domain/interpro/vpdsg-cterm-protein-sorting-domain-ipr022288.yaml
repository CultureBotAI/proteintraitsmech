identifier: InterPro:IPR022288
label: "VPDSG-CTERM protein sorting domain"
definition: >-
  The PEP-CTERM/exosortase system has been previously identified through in silico analysis. This entry describes a PEP-CTERM-like variant C-terminal protein sorting signal, as found at the C-terminal of twenty otherwise unrelated proteins in Verrucomicrobiae bacterium DG1235. The variant motif, VPDSG, seems an intermediate between the VPEP motif ( ) of typical exosortase systems and the classical LPXTG of sortase in Gram-positive bacteria.
