identifier: InterPro:IPR040750
label: "eIF3 subunit M, C-terminal helix domain"
definition: >-
  This is the C-terminal helix domain found in Eukaryotic translation initiation factor 3 subunit M (eIF3m). In mammalian eIF3a, the C-terminal helix following the PCI domain is involved in interactions with other core subunits.
