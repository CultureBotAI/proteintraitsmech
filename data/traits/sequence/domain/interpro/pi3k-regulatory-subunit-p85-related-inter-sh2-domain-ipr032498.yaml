identifier: InterPro:IPR032498
label: "PI3K regulatory subunit p85-related , inter-SH2 domain"
definition: >-
  This is the inter SH2 (iSH2) domain found in phosphatidylinositol 3-kinase regulatory subunit p85alpha, p85beta and p55gamma. Phosphoinositide 3-kinases (PI3Ks) are essential for cell growth, migration, and survival. Class IA PI3Ks are heterodimers of a p110 catalytic (C) subunit and a p85-related regulatory (R) subunit. p110 is composed of an adaptor-binding domain, a Ras-binding domain, a C2 domain, a helical domain, and a kinase domain. p85 is composed of an SH3 domain, a RhoGap domain, a N-terminal SH2 (nSH2) domain, a inter SH2 (iSH2) domain, and C-terminal (cSH2) domain. There are two inhibitory interactions between p110alpha and p85 of P13K: 1) p85 nSH2 domain with the C2, helical, and kinase domains of p110alpha and 2) p85 iSH2 domain with C2 domain of p110alpha. There are three inhibitory interactions between p110beta and p85 of P13K: 1) p85 nSH2 domain with the C2, helical, and kinase domains of p110beta, 2) p85 iSH2 domain with C2 domain of p110beta, and 3) p85 cSH2 domain with the kinase domain of p110beta.
