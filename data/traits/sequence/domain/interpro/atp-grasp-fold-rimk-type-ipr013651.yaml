identifier: InterPro:IPR013651
label: "ATP-grasp fold, RimK-type"
definition: >-
  This ATP-grasp domain is found in the ribosomal S6 modification enzyme RimK. It has an unusual nucleotide-binding fold referred to as palmate, or ATP-grasp fold. This domain is found in a number of enzymes of known structure as well as in urea amidolyase, tubulin-tyrosine ligase, and three enzymes of purine biosynthesis.
