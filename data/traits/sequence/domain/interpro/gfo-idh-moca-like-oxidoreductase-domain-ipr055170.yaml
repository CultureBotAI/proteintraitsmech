label: "GFO/IDH/MocA-like oxidoreductase domain"
definition: >-
  This entry includes a domain found in a set of oxidorecuctases from GFO/IDH/MocA family, including Inositol 2-dehydrogenase from Streptomyces coelicolor, human Trans-1,2-dihydrobenzene-1,2-diol dehydrogenase, 1,5-anhydro-D-fructose reductase from Rhizobium meliloti and Levoglucosan dehydrogenase from Pseudarthrobacter phenanthrenivorans.
