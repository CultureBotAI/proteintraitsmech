identifier: InterPro:IPR047539
label: "E3 ubiquitin-protein ligase RNF31, UBA domain"
definition: >-
  This entry represents the UBA domain of RNF31 and similar proteins from vertebrates. This domain is responsible for the interaction with the N-terminal ubiquitin-like domain (UBL) of HOIL-1L. RING finger protein 31 (RNF31, also known as HOIP, HOIL-1L interacting protein HOIP) is a component of the linear ubiquitin chain assembly complex (LUBAC, also known as E3-ligase complex). It has been shown that RNF31 interacts with the muscle-specific kinase (MuSK) in mice. In addition, RNF31 can interact with the atypical mammalian orphan receptor DAX-1, trigger DAX-1 ubiquitination and stabilization, and participate in repressing steroidogenic gene expression. HOIP contains three Npl4 zinc fingers, a central ubiquitin-associated (UBA) domain, an RBR domain, and a C-terminal linear chain determining domain (LDD). The RBR domain was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR (RING1-BRcat-Rcat) domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. LUBAC catalyses the formation of linear ubiquitin chains and regulates immune and apoptotic signalling pathways. LUBAC consists of SHARPIN, HOIL-1 (also known as RBCK1) and RNF31 (HOIP).
