identifier: InterPro:IPR032392
label: "SATB, ubiquitin-like oligomerisation domain"
definition: >-
  This entry represents the N-terminal oligomerisation domain, also known as ULD domain, of the SATB (special AT-rich sequence-binding) protein. SATBs are global chromatin organisers and regulators of gene expression that are essential for T-cell development, breast cancer tumour growth and metastasis. SATBs assemble into a tetramer via the ULD (ubiquitin-like) domain, and the tetramerisation of SATBs is essential for recognising specific DNA sequences (such as multiple AT-rich DNA fragments). Thus, SATBs may regulate gene expression directly by binding to various promoters and upstream regions and thereby influencing promoter activity.
