identifier: InterPro:IPR061276
label: "Afadin, PDZ domain"
definition: >-
  This entry represents the PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of afadin (AFDN, also known as ALL1-fused gene from chromosome 6 protein (AF6) and MLLT4), and related animal proteins. The AFDN PDZ domain interaction partners include poliovirus receptor-related protein PRR2/nectin, the junctional adhesion molecule (JAM), the breakpoint-cluster-region protein (BCR), connexin36 (Cx36), and a subset of Eph-related receptor tyrosine kinases; it can also bind low molecular weight ligands, in competition with a natural peptide ligand. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). This domain is a canonical PDZ domain containing six β-strands A-F and two α-helices (α-helix 1 and 2). Afadin, also termed ALL1-fused gene from chromosome 6 protein (AF-6), is involved in many fundamental signalling cascades in cells. In addition, it is involved in oncogenesis and metastasis. AFDN belongs to the adhesion system, probably together with the E-cadherin-catenin system, that plays a role in the organisation of homotypic, interneuronal, and heterotypic cell-cell adherens junctions. Afadin has multiple domains: from the N terminus to the C terminus it has two Ras-associated (RA) domains, a forkhead-associated domain, a dilute domain, a PDZ domain, three proline-rich domains, and an F-actin binding domain. RA domain-containing proteins function by interacting with Ras proteins directly or indirectly and are involved in several different functions ranging from tumor suppression to being oncoproteins. Ras proteins are small GTPases that are involved in cellular signal transduction. The RA domain has…
