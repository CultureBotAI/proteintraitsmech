identifier: InterPro:IPR002705
label: Peptidase C30/C16, Betacoronavirus
definition: >-
  This entry represents a domain found in betacoronavirus cysteine endopeptidases that belong to MEROPS peptidase families C30 (clan PA) and C16 (subfamiles C16A and C16B, clan CA). These peptidase are involved in viral polyprotein processing. All coronaviruses encodes between one and two accessory cysteine proteinases that recognise and process one or two sites in the amino-terminal half of the replicase polyprotein during assembly of the viral replication complex. MHV, HCoV and TGEV encode two accesssory proteinases, called coronavirus papain-like proteinase 1 and 2 (PL1-PRO and PL2-PRO). IBV and SARS encodes only one called PL-PRO. Coronavirus papain-like proteinases 1 and 2 have restricted specificities, cleaving respectively two and one bond(s)in the polyprotein. This restricted activity may be due to extended specificity sites: Arg or Lys at the cleavage site position P5 are required for PL1-PRO, and Phe at the cleavage site position P6 is required for PL2-PRO. PL1-PRO releases p28 and p65 from the N terminus of the polyprotein; PL2-PRO cleaves between p210 and p150. A cysteine peptidase is a proteolytic enzyme that hydrolyses a peptide bond using the thiol group of a cysteine residue as a nucleophile. Hydrolysis involves usually a catalytic triad consisting of the thiol group of the cysteine, the imidazolium ring of a histidine, and a third residue, usually asparagine or aspartic acid, to orientate and activate the imidazolium ring. In only one family of cysteine peptidases, is the role of the general base assigned to a residue other than a histidine: in peptidases from family C89 (acid ceramidase) an arginine is the general base. Cysteine peptidases can be grouped into fourteen different clans, with members of each clan possessing a tertiary fold unique to the cl…
