identifier: InterPro:IPR060484
label: "CLU5d, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of pathogenicity cluster 5 protein d (CLU5d) found in plant pathogenic fungi. This C-terminal domain follows the central region of the protein and is found in CLU5d homologues across Colletotrichum species and related plant pathogens. The specific function of this C-terminal domain in appressorial penetration is unknown. CLU5d is a secreted protein required for appressorial penetration of intact host epidermal cells and for pathogenicity. The protein is among the most highly expressed genes in appressoria and biotrophic hyphae in planta. CLU5d contains N-linked glycosylation sites and disordered regions.
