identifier: InterPro:IPR063251
label: "Stationary phase-inducible protein CsiE, C-terminal"
definition: >-
  This entry represents the C-terminal domain of the stationary phase- inducible protein CsiE and related proteins. CsiE contains two N-terminal PRD (PTS regulatory) domains ( ) followed by this C-terminal domain. CsiE belongs to the BglG family of antiterminator proteins, which regulate gene expression through phosphorylation-dependent mechanisms. The C-terminal domain shows structural similarity to response regulator receiver domains according to CATH. The family is restricted to Enterobacterales, including Enterobacteriaceae, Erwiniaceae and Yersiniaceae. The specific function of this C-terminal domain remains to be determined.
