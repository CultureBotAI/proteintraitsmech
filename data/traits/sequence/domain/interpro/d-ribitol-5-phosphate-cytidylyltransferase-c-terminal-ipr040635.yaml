identifier: InterPro:IPR040635
label: "D-ribitol-5-phosphate cytidylyltransferase, C-terminal"
definition: >-
  This domain is located at the C-terminal region of ISPD (isoprenoid synthase domain containing protein). Structural homologs can be found in two distinct alpha/beta protein families including the seven-stranded NAD(P) (H)-dependent short-chain dehydrogenases/reductases and five-stranded response regulator proteins involved in bacterial sensing systems.
