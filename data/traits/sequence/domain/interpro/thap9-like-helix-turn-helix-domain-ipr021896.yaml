identifier: InterPro:IPR021896
label: "THAP9-like, helix-turn-helix domain"
definition: >-
  This entry represents the DNA-binding helix-turn-helix domain (HTH) of human DNA transposase THAP9, which specifically recognises the bipartite 5'-TXXGGGX(A/T)-3' consensus motif and mediates transposition.
