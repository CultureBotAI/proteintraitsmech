label: "ADAMTS/ADAMTS-like, Spacer 1"
definition: >-
  This entry represents the Spacer-1 domain found in ADAM-TS and ADAM-TS-like proteins. Proteolysis of the extracellular matrix plays a critical role in establishing tissue architecture during development and in tissue degradation in diseases such as cancer, arthritis, Alzheimer's disease and a variety of inflammatory conditions. The proteolytic enzymes responsible for this process are members of diverse protease families, including the secreted zinc metalloproteases (MPs). ADAM-TS (A Disintegrin and Metalloproteinase with Thrombospondin Motifs) is closely related to the ADAM family (A Disintegrin and Metalloproteinase) and is a subfamily of the MP family, consists of at least 20 members sharing a high degree of sequence similarity and conserved domain organisation. The defining domains of the ADAM-TS family are (from N- to C-termini) a pre-pro metalloprotease domain of the reprolysin type, a snake venom disintegrin-like domain, a thrombospondin type-I (TS) module, a cysteine-rich region, and a cysteine-free (spacer) domain. Domain organisation following the spacer domain C terminus shows some variability in certain ADAM-TS members, principally in the number of additional TS domains. These enzymes have a wide-spectrum role in vascular biology and cardiovascular pathophysiology. Members of the ADAM-TS family have been implicated in a range of diseases. For instance, members of this family have been found to participate directly in processes in the central nervous system (CNS) such as the regulation of brain plasticity. ADAM-TS1 is reported to be involved in inflammation and cancer cachexia, whilst recessively inherited ADAM-TS2 mutations cause Ehlers-Danlos syndrome type VIIC, a disorder characterised clinically by severe skin fragility. ADAM-TS4 is an aggrecanase involve…
