identifier: InterPro:IPR063080
label: "Iron-sulfur cluster protein, N-terminal domain"
definition: >-
  This entry represents an approximately 70-80 residue N-terminal domain found in iron-sulfur cluster proteins, predominantly in Actinomycetota. The domain is commonly located upstream of NifU domains ( ) and sometimes Rieske domains. Several family members, including HhyE ( ) and HucE ( ), have been reported to be putative iron-sulfur proteins required for atmospheric hydrogen oxidation in mycobacteria, likely mediating electron transfer between hydrogenase catalytic subunits and the respiratory chain. The specific function of this N-terminal domain remains to be determined.
