identifier: InterPro:IPR006583
label: "PAN-3 domain"
definition: >-
  PAN domains have significant functional versatility fulfilling diverse biological functions by mediating protein-protein or protein-carbohydrate interactions. These domains contain a hair-pin loop like structure, similar to knottins, but the pattern of disulphide bonds differs. The PAN-3 or CW is a domain associated with a number of Caenorhabditis elegans hypothetical proteins.
