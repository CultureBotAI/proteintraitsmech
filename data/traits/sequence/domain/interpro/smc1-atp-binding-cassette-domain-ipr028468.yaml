identifier: InterPro:IPR028468
label: Smc1, ATP-binding cassette domain
definition: >-
  This entry represents the ATP-binding cassette domain of eukaryotic Smc1 proteins. Smc1 (Structural maintenance of chromosomes protein 1) is involved in chromosome cohesion during cell cycle and in DNA repair. In eukaryotes, the Smc1-Smc3 heterodimer is part of the cohesin complex, which is required for the cohesion of sister chromatids after DNA replication.
