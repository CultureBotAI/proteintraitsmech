identifier: InterPro:IPR046778
label: "UPF0758, N-terminal"
definition: >-
  This domain is functionally uncharacterised, found at the N-terminal of the uncharacterised UPF0758 proteins from bacteria and archaea, and is approximately 90 amino acids in length. UPF0758 was previously known as the radC family, a name that was assigned according to the radC102 mutant of E. coli which was later demonstrated to be an allele of the transcription-repair-coupling factor recG. UPF0758 has been described as a putative JAMM-family deubiquitinating enzyme, but its function remains to be determined. Structure prediction using Colab notebook from AlphaFold DB suggests that it has an α-bundle fold. It may contain two helix-hairpin-helix (HhH) motifs. This domain is found in association with.
