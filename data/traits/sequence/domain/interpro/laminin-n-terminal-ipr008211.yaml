identifier: InterPro:IPR008211
label: "Laminin, N-terminal"
definition: >-
  Laminin is a large molecular weight glycoprotein present only in basement membranes in almost every animal tissue. It is thought to mediate the attachment, migration and organisation of cells into tissues during embryonic development by interacting with other extracellular matrix components. Each laminin is a heterotrimer assembled from alpha, beta and gamma chain subunits, secreted and incorporated into cell-associated extracellular matrices.
