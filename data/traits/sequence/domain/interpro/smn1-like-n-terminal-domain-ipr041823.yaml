identifier: InterPro:IPR041823
label: "SMN1-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain in 5'-nucleotidase SMN1 and related fungal proteins. This domain contains a phosphoesterases-like fold. 5'-nucleotidase SMN1 catalyses the hydrolysis of nucleotide monophosphates, releasing inorganic phosphate and the corresponding nucleoside. This enzyme is thought to play a role in the adaptive response to phosphate limitation, enabling cells to scavenge phosphate from nucleotide substrates when environmental phosphate is scarce.
