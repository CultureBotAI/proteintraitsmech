identifier: InterPro:IPR060456
label: "CSTPP1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of centriolar satellite-associated tubulin polyglutamylase complex regulator 1 (CSTPP1), mainly found in vertebrates. CSTPP1 is a regulator of the tubulin polyglutamylase complex that controls cytoskeletal organisation, nuclear shape, and cilium disassembly by balancing microtubule and actin assembly. The protein localises to centriolar satellites and cytoskeleton, associated with microtubules. This N-terminal region is involved in the interaction with PCM1, while the full protein also interacts with TTLL1, TPGS1, TPGS2 and LRRC49.
