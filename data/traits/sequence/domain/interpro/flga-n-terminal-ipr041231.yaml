identifier: InterPro:IPR041231
label: "FlgA, N-terminal"
definition: >-
  This entry represents a presumed domain found N-terminal to the SAF-like domain in FlgA proteins. FlgA is essential for flagellar biosynthesis and motility, and plays a significant role in biofilm formation in Campylobacter. It functions as a flagellar chaperone in P-ring assembly.
