identifier: InterPro:IPR035827
label: "TRIM22, PRY/SPRY domain"
definition: >-
  This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C terminus of TRIM22, also known as RING finger protein 94 (RNF94) or STAF50 (Stimulated trans-acting factor of 50kDa). TRIM proteins are defined by the presence of the tripartite motif RING/B-box/coiled-coil region and also known as RBCC proteins. TRIM22 is an interferon-induced protein, predominantly expressed in peripheral blood leukocytes, in lymphoid tissue such as spleen and thymus, and in the ovary. TRIM22 plays an integral role in the host innate immune response to viruses; it has been shown to inhibit the replication of a number of viruses, including HIV-1, hepatitis B, and influenza A. TRIM22 inhibits influenza A virus (IAV) infection by targeting the viral nucleoprotein for degradation; it represents a novel restriction factor up-regulated upon IAV infection that curtails its replicative capacity in epithelial cells. Altered TRIM22 expression has also been associated with multiple sclerosis, cancer, and autoimmune disease. A large number of high-risk non-synonymous (ns)SNPs have been identified in the highly polymorphic TRIM22 gene, most of which are located in the SPRY domain and could possibly alter critical regions of the SPRY structural and functional residues, including several sites that undergo post-translational modification. TRIM22 is a direct p53 target gene and inhibits the clonogenic growth of leukemic cells. Its expression in Wilms tumors is negatively associated with disease relapse. It is greatly under-expressed in breast cancer cells as compared to non-malignant cell lines; p53 dysfunction may be one of the mechanisms for its down-regulation.
