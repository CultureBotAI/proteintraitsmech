identifier: InterPro:IPR005533
label: "AMOP domain"
definition: >-
  This entry represents the AMOP domain found in ISM1/2, Mucin-4, Susd2 and related proteins. The AMOP domain (for adhesion-associated domain in MUC4 and other proteins) is a ~100-residue-long extracellular domain that contains eight invariant cysteine residues that are predicted to be involved in disulphide bonds. The AMOP domain is found associated with extracellular domains involved in cell adhesion, such as NIDO, sushi, somatomedin B, VWFD, EGF, IPT, or TSP1. The presence of the AMOP domain in cell adhesion molecules could be indicative of a role for this domain in adhesion. This domain contains an initial region rich in α helix followed by four β strands. Isthmin-1 (ISM1) is a secreted 60 kDa protein first identified in the Xenopus brain isthmus that functions as an endogenous angiogenesis inhibitor. ISM1 binds to cell surface glucose-regulated protein 78 (GRP78) and αvβ5 integrin receptors, inducing endothelial cell apoptosis through both clathrin-dependent endocytosis and direct mitochondrial translocation. It exhibits potent antitumour activity by selectively targeting tumour endothelium and cancer cells overexpressing cell-surface GRP78. Sushi domain-containing protein 2 (Susd2) is a possible cytokine receptor for GPR15LG. May be a tumour suppressor; together with GPR15LG has a growth inhibitory effect on colon cancer cells, which includes G1 cell cycle arrest. It is known as Defecation cycle abnormal dec-7 (dec-7) in Caenorhabditis elegans and Protein mesh in Drosophila melanogaster.
