identifier: InterPro:IPR063859
label: "CCDC178, second coiled-coil region"
definition: >-
  This entry represents the second coiled-coil region of coiled-coil domain-containing protein 178 (CCDC178) and simialr sequences from animals. The full-length CCDC178 protein localises to the ciliary basal body and is highly expressed in testis and spermatids. The specific function of this coiled-coil region remains to be determined.
