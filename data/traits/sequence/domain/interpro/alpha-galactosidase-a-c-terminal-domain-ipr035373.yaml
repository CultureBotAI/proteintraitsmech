identifier: InterPro:IPR035373
label: "Alpha galactosidase A, C-terminal domain"
definition: >-
  Alpha-galactosidase (melibiase) catalyses the hydrolysis of melibiose into galactose and glucose. Alpha-N-acetylgalactosaminidase catalyses the hydrolysis of terminal non-reducing N-acetyl-D-galactosamine residues in N-acetyl-alpha-D-galactosaminides. This entry represents the C-terminal domain of these enzymes.
