identifier: InterPro:IPR059416
label: "Domain of unknown function DUF8372"
definition: >-
  This domain is found in uncharacterised fungal proteins. It is predicted to fold into an α/β structure composed of an open β-barrel with α-helices packed on one side. It contains highly conserved G[FWY][DE] sequence motif that may be important for function.
