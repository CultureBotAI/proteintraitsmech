identifier: InterPro:IPR059803
label: "Anti-sigma factor RsgI4, sensor domain"
definition: >-
  This domain is found in the Anti-sigma factor RsgI4 from Pseudobacteroides cellulosolvens. It represents a novel carbohydrate-binding module that binds to a wide range of polysaccharide types.
