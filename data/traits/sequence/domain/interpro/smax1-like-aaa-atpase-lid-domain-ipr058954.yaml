identifier: InterPro:IPR058954
label: "SMAX1-like, AAA+ ATPase lid domain"
definition: >-
  This AAA+ ATPase lid domain is found at the C-terminal end of Protein SUPPRESSOR OF MAX2 1 from Arabidopsis thaliana (SMAX1) and similar plant sequences. SMAX1 is thought to be a component of a transcriptional corepressor complex that acts downstream of MAX2 to negatively regulate karrikins /strigolactone responses.
