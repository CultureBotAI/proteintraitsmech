identifier: InterPro:IPR048262
label: "BRCA2, OB2 domain"
definition: >-
  This entry corresponds to the second OB fold domain (OB2) of BRCA2 (breast cancer susceptibility gene 2) protein. BRCA2 participates in homologous recombination-mediated repair of double-strand DNA breaks. It stimulates the displacement of Replication protein A (RPA), the most abundant eukaryotic ssDNA binding protein. It also facilitates filament formation. Mutations that map throughout the BRCA2 protein are associated with breast cancer susceptibility. BRCA2 is a large nuclear protein and its most conserved region is the C-terminal. This region binds to ssDNA in vitro, and is composed of five structural domains, three of which are OB folds (OB1, OB2, and OB3). OB2 contains a large insertion, named tower domain that is represented separately by but included in this entry.
