identifier: InterPro:IPR057021
label: "STRA8, bHLH domain"
definition: >-
  This bHLH domain is found in the family of Stimulated by retinoic acid gene 8 protein (STRA8). This protein is required for the transition into meiosis for both female and male germ cells. In female germ cells, it acts as a key effector of the meiotic program and is required for premeiotic DNA replication and subsequent events in meiotic prophase.
