identifier: InterPro:IPR029369
label: "Domain of unknown function with conserved HDNR motif"
definition: >-
  This domain is found in a group of animal proteins that are typically between 117 and 219 amino acids in length, including Ciliary microtubule inner protein 7 and Testis-expressed protein 36 from humans. There is a conserved HDNR sequence motif.
