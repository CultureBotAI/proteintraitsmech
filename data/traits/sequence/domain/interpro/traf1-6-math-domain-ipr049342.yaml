identifier: InterPro:IPR049342
label: "TRAF1-6, MATH domain"
definition: >-
  Intracellular TRAFs and extracellular meprins share a conserved region of about 180 residues, the meprin and TRAF homology (MATH) domain which adopts a β-sandwich structure. This is the MATH domain of TNF receptor-associated factors 1-6 (TRAF1-6). In TRAFS, this domain is essential for self-association and receptor interaction.
