identifier: InterPro:IPR056558
label: "LAMB1/2/3/4, helical domain"
definition: >-
  This domain is found in human Laminin subunit beta-1/2/3/4 (LAMB1-4) and related proteins from animals. LAMB1 is thought to mediate the attachment, migration and organisation of cells into tissues during embryonic development by interacting with other extracellular matrix components. This domain, which is located C-terminal to multiple Laminin EGF domains ( ), is predicted to adopt a mainly α-helical fold.
