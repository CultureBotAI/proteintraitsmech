identifier: InterPro:IPR042155
label: "UNC5A, death domain"
definition: >-
  This entry represents the death domain (DD) found in Uncoordinated-5A (UNC5A), which is a receptor for the secreted netrin-1 and plays a critical role in neuronal development and differentiation, as well as axon-guidance. It also plays a role in regulating apoptosis in non-neuronal cells as a downstream target of p53. It belongs to the UNC-5 family. UNC5 proteins are transmembrane proteins with an extracellular domain consisting of two immunoglobulin repeats, two thrombospondin type-I modules and an intracellular region containing a ZU-5 domain, UPA domain and a DD. DDs (Death domains) are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes.
