identifier: InterPro:IPR016147
label: Pili assembly chaperone, N-terminal
definition: >-
  Most Gram-negative bacteria possess a supramolecular structure - the pili - on their surface, which mediates attachment to specific receptors. Many interactive subunits are required to assemble pili, but their assembly only takes place after translocation across the cytoplasmic membrane. Periplasmic chaperones assist pili assembly by binding to the subunits, thereby preventing premature aggregation. Pili chaperones are structurally, and possibly evolutionarily, related to the immunoglobulin superfamily: they contain two globular domains, with a topology identical to an immunoglobulin fold. This entry represents the N-terminal domain which consists of seven β-strands (A1-G1) arranged in two sheets of four and three strands each. There is a cleft between the N- and C-terminal domains containing conserved hydrophobic residues that are critical to subunit binding.
