identifier: InterPro:IPR047191
label: "Stimulator of interferon genes protein, C-terminal"
definition: >-
  This entry represents the C-terminal domain of STING proteins from chordates. STING (stimulator of interferon genes, also known as MITA, ERIS, MPYS and TMEM173) is a master regulator that mediates cytokine production in response to microbial invasion by directly sensing bacterial secondary messengers such as the cyclic dinucleotide bis-(3'-5')-cyclic dimeric GMP (c-di-GMP) and leading to the activation of IFN regulatory factor 3 (IRF3) through TANK-binding kinase 1 (TBK1) stimulation. STING is also a signalling adaptor in the IFN response to cytosolic DNA. This detection of foreign materials is the first step to a successful immune responses. STING is localised in the ER and comprised of an predicted N-terminal transmembrane region and a C-terminal c-di-GMP binding domain.
