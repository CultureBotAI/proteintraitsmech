identifier: InterPro:IPR048897
label: "Nucleolar protein 11, C-terminal domain"
definition: >-
  This α-solenoid repeat is found at the C-terminal of human nucleolar protein 11 (NOL11) and similar animal proteins. NOL11 is a ribosome biogenesis factor. It may be required for both optimal rDNA transcription and small subunit (SSU) pre-rRNA processing at sites A', A0, 1 and 2b.
