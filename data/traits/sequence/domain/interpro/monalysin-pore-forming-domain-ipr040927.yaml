identifier: InterPro:IPR040927
label: "Monalysin, Pore-forming domain"
definition: >-
  This domain is found in Monalysin Pore-forming Toxin which is a type of β-barrel pore-forming toxin protein found in Pseudomonas entomophila. Monalysin forms a stable doughnut-like 18-mer complex composed of two disk-shaped nonamers to form a pore. The domain is composed of a central twisted β-sheet composed of three antiparallel β-strands (β3, β6, and β8/9) and flanked by the pore-forming segment and the C-terminal region on either side. The pore-forming domain (residues 102-170) is located between strands β3 and β6, and is formed from two antiparallel β-strands connected by three α-helices, α3, α4, and α5. The C-terminal region forms a long α-helix followed by a small hairpin and a short α-helix.
