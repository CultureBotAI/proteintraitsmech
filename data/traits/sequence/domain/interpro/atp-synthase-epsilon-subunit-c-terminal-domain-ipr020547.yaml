identifier: InterPro:IPR020547
label: "ATP synthase epsilon subunit, C-terminal domain"
definition: >-
  This entry represents the C-terminal long α-helix domain of ATPase subunit epsilon (in bacteria or chloroplast ATPase) from bacteria and plants. The interaction site of subunit C of the F0 complex with the delta or epsilon subunit of the F1 complex may be important for connecting the rotor of F1 (gamma subunit) to the rotor of F0 (C subunit). In bacterial species, the delta subunit is the equivalent of the Oligomycin sensitive subunit (OSCP, ) in metazoans. The C-terminal domain of the epsilon subunit appears to act as an inhibitor of ATPase activity.
