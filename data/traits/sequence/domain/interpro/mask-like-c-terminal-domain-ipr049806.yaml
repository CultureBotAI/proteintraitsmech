identifier: InterPro:IPR049806
label: "MasK-like, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain identified in the Tyrosine-protein kinase MasK and related bacterial proteins. Proteins containing this domain also include the adventurous gliding motility proteins AgmX (GltJ) and PglI. This domain spans approximately 92 amino acids and contains a pair of Cys residues frequently separated by about 45 amino acids.
