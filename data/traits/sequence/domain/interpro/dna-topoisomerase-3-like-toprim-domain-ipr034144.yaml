identifier: InterPro:IPR034144
label: "DNA topoisomerase 3-like, TOPRIM domain"
definition: >-
  This topoisomerase-primase (TOPRIM) domain is found in members of the type IA family of DNA topoisomerases (Topo IA) similar to topoisomerase III. Type IA DNA topoisomerases remove (relax) negative supercoils in the DNA by cleaving one strand of the DNA duplex, covalently linking to the 5' phosphoryl end of the DNA break, and allowing the other strand of the duplex to pass through the gap. Esherichia coli harbours two type IA enzymes: topoisomerase I and III. Topoisomerase III functions as the principal cellular decatenase and participates in efficient chromosome segregation. The TOPRIM domain has two conserved motifs, one of which centres at a conserved glutamate and the other one at two conserved aspartates (DxD). For topoisomerases the conserved glutamate is believed to act as a general base in strand joining and, as a general acid in strand cleavage. The DXD motif may co-ordinate Mg2+, a cofactor required for full catalytic function.
