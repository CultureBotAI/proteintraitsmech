identifier: InterPro:IPR049038
label: "ADAM10, cysteine-rich domain"
definition: >-
  Disintegrin and metalloproteinase domain-containing protein 10 (ADAM10) is a transmembrane endopeptidase responsible for the proteolytic release of several cell-surface proteins, including the membrane-bound precursor of TNF-alpha, ligands and receptors of the Notch, Eph, and erbB families, thereby activating signaling pathways critical for tumour initiation and maintenance. This entry represents the cysteine-rich domain which mediates non-catalytic interactions with the substrate that are key for effective cleavage. This domain, together with disintegrin domain ( ), plays an important modulatory role.
