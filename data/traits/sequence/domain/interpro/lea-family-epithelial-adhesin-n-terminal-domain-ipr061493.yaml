identifier: InterPro:IPR061493
label: "LEA family epithelial adhesin, N-terminal domain"
definition: >-
  LEA (Lactobacillus epithelium adhesin) is a large, repetitive protein with an N-terminal YSIRK-type signal peptide and a C-terminal LPXTG site for processing by sortase and attachment to the cell surface. Family members contain variable numbers of repeats similar to Lactobacillus Rib/alpha-like repeats. This entry describes the N-terminal region upstream of the repeat region.
