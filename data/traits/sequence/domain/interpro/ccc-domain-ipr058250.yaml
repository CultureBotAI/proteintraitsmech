identifier: InterPro:IPR058250
label: "CCC domain"
definition: >-
  This domain is found in uncharacterised insect proteins. It contains highly conserved cysteine residues, including some arranged in CCC sequence motif after which this domain was named. This CCC-motif is usually repeated twice. These residues are predicted to form disulfide bonds.
