identifier: InterPro:IPR034502
label: "Raly, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of Raly, an RNA-binding protein that may play a critical role in embryonic development. It is encoded by raly, a ubiquitously expressed gene of unknown function. Raly shows a high degree of identity with the 5' sequences of p542 gene encoding autoantigen, which can cross-react with EBNA-1 of the Epstein Barr virus. Raly contains two distinct domains, an N-terminal RNA recognition motif (RRM), and a C-terminal auxiliary domain that includes a unique glycine/serine-rich stretch.
