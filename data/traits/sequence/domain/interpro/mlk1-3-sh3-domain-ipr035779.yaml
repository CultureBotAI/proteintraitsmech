identifier: InterPro:IPR035779
label: "MLK1-3, SH3 domain"
definition: >-
  MLKs 1, 2, and 3 are Serine/Threonine Kinases (STKs), catalyzing the transfer of the gamma-phosphoryl group from ATP to S/T residues on protein substrates. MLKs act as mitogen-activated protein kinase kinase kinases (MAP3Ks, MKKKs, MAPKKKs), which phosphorylate and activate MAPK kinases (MAPKKs or MKKs or MAP2Ks), which in turn phosphorylate and activate MAPKs during signaling cascades that are important in mediating cellular responses to extracellular signals.
