identifier: InterPro:IPR037968
label: "Protein polybromo-1, Bromodomain 5"
definition: >-
  The human protein polybromo-1 (PBRM1, also known as BAF180) is part of a SWI/SNF chromatin-remodeling complex. It was shown that polybromo bromodomains bind to histone H3 at specific acetyl-lysine positions. Bromodomains are found in many chromatin-associated proteins and in nuclear histone acetyltransferases. They interact specifically with acetylated lysine, but not all the bromodomains in polybromo may bind to acetyl-lysine.
