identifier: InterPro:IPR059029
label: "FAM13A-like domain"
definition: >-
  Several copies of this domain are found in human Protein FAM13A and similar sequences. This domain is predicted to show an all-α structure. The function of FAM13 family members is not clear. They contain a bipartite nuclear-localisation signal and two coil-coiled domains. FAM13A and FAM13B (but not FAM13C) each contains a Rho-GAP (Rho GTPase-activating protein) domain. FAM13A plays a role in the regulation of adipocyte differentiation and contribute to changes in body fat distribution.
