identifier: InterPro:IPR037639
label: SMOC-1, extracellular calcium-binding domain
definition: >-
  SMOC-1 is predominantly localized in basement membranes. It acts as a regulator of osteoblast differentiation and is involved in the transforming growth factor-beta (TGF-beta) signaling. It also plays an essential role in ocular and limb development and functions as a regulator of bone morphogenic protein (BMP) signaling. Mutations of the SMOC-1 gene cause Waardenburg anophthalmia syndrome, a rare disorder presenting with ocular anomalies, ranging from mild microphthalmia to true anophthalmia, and limb anomalies..
