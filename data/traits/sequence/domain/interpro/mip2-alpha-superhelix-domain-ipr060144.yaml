identifier: InterPro:IPR060144
label: "MIP2, alpha-superhelix domain"
definition: >-
  This entry represents an all-α domain found in MAG2-interacting protein 2 (MIP2) protein from Arabidopsis thaliana and related plant proteins. This domain is structurally similar to Sec39 domain ( ). MIP2 is essential for the proper maturation of seed storage proteins in plants. It forms a complex on the endoplasmic reticulum with MAG2, ZW10/MIP1, and MIP3. This complex is likely involved in the efficient transport of seed storage proteins, ensuring their correct processing and delivery within the cell. The coordinated action of these proteins is crucial for the development and storage of nutrients in seeds, which are vital for plant reproduction and growth.
