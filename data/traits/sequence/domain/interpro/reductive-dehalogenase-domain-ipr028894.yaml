identifier: InterPro:IPR028894
label: "Reductive dehalogenase domain"
definition: >-
  This domain is most frequently associated with a Fer4 iron-sulfur cluster towards the C-terminal region. It is found in reductive dehalogenases and 4Fe-4S dicluster domain proteins, such as Trichloroethene reductive dehalogenase and Chloroethene reductive dehalogenase.
