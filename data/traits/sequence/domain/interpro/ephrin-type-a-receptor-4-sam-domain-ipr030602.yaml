identifier: InterPro:IPR030602
label: "Ephrin type-A receptor 4, SAM domain"
definition: >-
  This entry represents the SAM domain of EPH-A4. It is a C-terminal potential protein-protein interaction domain. Ephrin receptors (Ephs) are a group of receptor tyrosine kinases that are activated in response to binding ephrin ligands residing on adjacent cells, leading to contact-dependent bidirectional signalling into neighbouring cells. Ephrin type-A receptor 4 (EphA4) is highly promiscuou; it has the unique property among Eph receptors to bind and to be physiologically activated by both GPI-anchored ephrin-A and transmembrane ephrin-B ligands. It is involved in development, supporting spine maturation, axon guidance and assembly of neuronal locomotor circuits. EphA4 is the most abundant ephrin receptor in the nervous system. Mice lacking the EphA4 exhibit pronounced axonal regeneration and functional recovery following spinal cord injury. In humans EphA4 has been proposed to be a key actor in neurodegenerative diseases, such as Alzheimer's disease (AD) and amyotrophic lateral sclerosis (ALS). Inhibition of the EphA4-ephrin interaction has been considered as a useful strategy for promoting axon regeneration in the nervous system and a pharmacological tool to treat neurodegenerative disease patients.
