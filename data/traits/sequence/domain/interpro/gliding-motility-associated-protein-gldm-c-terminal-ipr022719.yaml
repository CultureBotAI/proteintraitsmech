identifier: InterPro:IPR022719
label: "Gliding motility-associated protein GldM, C-terminal"
definition: >-
  This domain is found a at the C terminus of GldM and its homologue, PorM. This entry represents the Type IX secretion system motor protein PorM/GldM, that was first named as GldM for the member from Cytophaga johnsonae (Flavobacterium johnsoniae), which is required for a type of rapid gliding motility found in certain members of the Bacteriodetes. However, members of this protein family are found also in several members of the Bacteriodetes that appear not to be motile. The best conserved region, toward the N terminus, is centred on a highly hydrobobic probable transmembrane helix. Two paralogues are found in Cytophaga hutchinsonii. PorM is a major component of the trans-periplasmic core complex and is believed to connect the outer membrane component with the inner membrane component. Structural studies have revealed that the periplasmic region of GldM, a PorM homologue of a gliding bacterium, consist of four domains and forms a dimer with a straight rod shape. PorM is made up of four domains and forms a unique dimeric structure with an asymmetric, kinked-rod shape. The kink between the D1 and D2 domains is stabilised by R204 which is essential for gingipains secretion, suggesting that the kinked structure of PorM is important for the functional T9SS formation.
