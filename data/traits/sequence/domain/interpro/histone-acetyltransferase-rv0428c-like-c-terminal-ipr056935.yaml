identifier: InterPro:IPR056935
label: "Histone acetyltransferase Rv0428c-like, C-terminal"
definition: >-
  This entry represents the GNAT (GCN5-related N-acetyltransferase) domain found at the C terminus of Rv0428c from Mycobacterium tuberculosis and Cgl2740 from Corynebacterium glutamicum (cg3035, ), in association with . Rv0428c is a probable histone acetyltransferase that may be involved in survival under stress conditions. Cgl2740 uses acetyl-CoA for acetylation of glutamate, the first step of arginine biosynthesis. This domain is also found covering the full length of the protein in the Uncharacterized N-acetyltransferase YobR from Bacillus subtilis.
