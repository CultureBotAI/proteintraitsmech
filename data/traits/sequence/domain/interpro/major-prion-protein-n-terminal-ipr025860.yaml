identifier: InterPro:IPR025860
label: "Major prion protein N-terminal"
definition: >-
  This entry represents the N-terminal region of major prion protein. The proteins consist of mainly α helices found at the C-terminal. Bovine prion has been shown to form a stable helix which inserts in a transmembrane location in the bilayer, with the N -terminal functioning as a cell-penetrating peptide.
