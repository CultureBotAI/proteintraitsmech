identifier: InterPro:IPR054449
label: "Nonstructural protein, WIV domain"
definition: >-
  This domain is found in Nonstructural protein from Lake Sinai virus and similar sequences from arthropod-infecting viruses and lower eukaryotes. It has been named 'Widespread, Intriguing, Versatile' (WIV) domain. This region is likely to play a role in viral infection of arthropods.
