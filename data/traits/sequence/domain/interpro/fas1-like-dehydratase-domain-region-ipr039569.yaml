identifier: InterPro:IPR039569
label: "FAS1-like, dehydratase domain region"
definition: >-
  This entry represents a region of the dehydratase domain found in Fatty acid synthase subunit beta from Saccharomyces cerevisiae (FAS1,) and similar sequences predominantly found in eukaryotes and bacteria. FAS1 catalyses the formation of long-chain fatty acids from acetyl-CoA, malonyl-CoA and NADPH. This entry is often found associated to .
