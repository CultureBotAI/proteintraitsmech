identifier: InterPro:IPR015093
label: "Card1, endonuclease domain"
definition: >-
  This entry represents the endonuclease domain found in a set of proteins mainly found in bacteria, including Card1 (cyclic-oligoadenylate-activated single-stranded ribonuclease and single-stranded deoxyribonuclease 1) from Treponema succinifaciens, a protein that is part of type III CRISPR-Cas immune response system. This protein consists of a CARF (CRISPR-associated Rossman fold) domain at the N terminus, an helical hinge domain and a C-terminal endonuclease domain. This group of proteins was previously known as DUF1887.
