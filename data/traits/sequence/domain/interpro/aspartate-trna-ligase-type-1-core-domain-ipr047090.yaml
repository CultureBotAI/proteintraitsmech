identifier: InterPro:IPR047090
label: "Aspartate-tRNA ligase, type 1, core domain"
definition: >-
  This entry represents the catalytic core domain found in a group of aspartate-tRNA ligases from mostly bacteria, eukaryotes and some archaeal species. This domain is primarily responsible for the ATP-dependent formation of the enzyme bound aminoacyl-adenylate. Aspartate tRNA ligase (also known as Aspartyl-tRNA synthetase, AspRS) is an alpha2 dimer that belongs to class IIb. Structural analysis combined with mutagenesis and enzymology data on the yeast enzyme point to a tRNA binding process that starts by a recognition event between the tRNA anticodon loop and the ligase anticodon binding module. In some species, this enzyme aminoacylates tRNA for both Asp and Asn; Asp-tRNA(asn) is subsequently transamidated to Asn-tRNA(asn).
