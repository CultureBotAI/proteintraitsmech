identifier: InterPro:IPR041746
label: "Lysine-sensitive aspartokinase catalytic domain"
definition: >-
  This entry includes the N-terminal catalytic aspartokinase (AK) domain of the lysine-sensitive AK isoenzyme found in higher plants. The lysine-sensitive AK isoenzyme is a monofunctional protein. It is involved in the overall regulation of the aspartate pathway and can be synergistically inhibited by S-adenosylmethionine. Also included in this entry is an uncharacterised LysC-like AK found in Euryarchaeota and some bacteria. AK catalyses the conversion of aspartate and ATP to aspartylphosphate and ADP.
