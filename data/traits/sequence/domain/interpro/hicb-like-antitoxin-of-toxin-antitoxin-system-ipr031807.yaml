identifier: InterPro:IPR031807
label: "HicB-like antitoxin of toxin-antitoxin system"
definition: >-
  This entry includes HicB-like antitoxins of bacterial and archaeal toxin-antitoxin systems. The HicAB module is a novel toxin-antitoxin system that functions via RNA-binding and, possibly, cleavage.
