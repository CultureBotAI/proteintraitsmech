identifier: InterPro:IPR038033
label: "Chromobox protein homologue 3, chromo domain"
definition: >-
  Chromobox protein homologue 3 (CBX3, also known as HP1 gamma) is a component of heterochromatin that binds histone H3 tails methylated at 'Lys-9' which leads to epigenetic repression. By interacting with MIS12 complex, it is involved in the formation of a functional kinetochore. It recruits NIPBL to sites of DNA damage at double-strand breaks. It is a component of the E2F6.com-1 and PER complexes. The PER complex controls the circadian clock. This entry represents the CHRomatin Organization Modifier (chromo) domain of CBX3.
