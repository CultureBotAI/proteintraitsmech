identifier: InterPro:IPR062339
label: "L-aspartate--L-methionine ligase, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of L-aspartate--L-methionine ligase (LdmS, ), found in Staphylococcus aureus and related bacteria. LdmS catalyses the formation of L-aspartyl-L-methionine dipeptide from L-aspartate and L-methionine in the presence of ATP. The enzyme is involved in sulfur amino acid metabolism. The function of this domain remains to be determined.
