identifier: InterPro:IPR063408
label: "COG3, C-terminal cap domain"
definition: >-
  This entry represents a C-terminal cap domain of approximately 145 residues found in conserved oligomeric Golgi complex subunit 3 (COG3) proteins in eukaryotes. This domain is located after the COG3_N ( ) and COG3_C ( ) domains. COG3 is a component of the conserved oligomeric Golgi (COG) complex, which is involved in intra-Golgi protein trafficking and retrograde Golgi-to-ER vesicular transport. Mutations in human COG3 cause congenital disorder of glycosylation type 2BB (CDG2BB), characterised by developmental delay and neurological abnormalities. The specific function of this C-terminal domain remains to be determined.
