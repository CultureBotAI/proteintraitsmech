identifier: InterPro:IPR060584
label: "CUEDC2, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of CUEDC2 animal proteins. CUEDC2 control progesterone receptor and oestrogen receptor alpha protein levels through their targeting for ubiquitination and subsequent proteasomal degradation. The proteins are located in both the cytoplasm and nucleus. The specific function of this domain remains to be determined.
