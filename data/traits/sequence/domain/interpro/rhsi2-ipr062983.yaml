identifier: InterPro:IPR062983
label: RhsI2
definition: >-
  This entry represents the Immunity protein RhsI2 from Pseudomonas aeruginosa and related proteins. RhsI2 is a component of a toxin/antitoxin system in which RhsP2 is an ART toxin delivered between competing bacteria by a type VI secretion system of Pseudomonas aeruginosa. RhsP2 ADP-ribosylates 2'-hydroxyl groups of double-stranded RNA. RhsI2 blocks the active site of RhsP2 and thus inhibiting its activity.
