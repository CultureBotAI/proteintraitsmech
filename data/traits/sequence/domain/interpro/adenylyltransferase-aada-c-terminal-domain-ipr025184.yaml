identifier: InterPro:IPR025184
label: "Adenylyltransferase AadA, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of Aminoglycoside adenylyltransferase from Salmonella typhimurium (AadA) and other proteins associated with methicillin-resistant bacteria. AadA adenylates the 3''-hydroxyl group of the streptomycin glucosamine ring and the 9-hydroxyl group of the spectinomycin actinamine ring, mediating bacterial resistance to these antibiotics. This enzyme is organised into two domains: a N-terminal domain with a nucleotidyltransferase fold and a C-terminal domain. This domain consists of five α-helices forming an up-and-down α-helical bundle. It undergoes small conformational changes upon binding of ATP and magnesium that play a key role in the binding of the antibiotic compounds. This entry also includes Spectinomycin 9-adenylyltransferase from Enterococcus faecalis (Aad9), which only mediates bacterial resistance to the antibiotic spectinomycin. This protein shows an overall and structure similar to AadA.
