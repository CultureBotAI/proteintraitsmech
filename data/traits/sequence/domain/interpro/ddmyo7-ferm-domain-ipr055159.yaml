identifier: InterPro:IPR055159
label: "DdMyo7, FERM domain"
definition: >-
  This entry represents the C-terminal FERM domain found in Myo7 from Dictyostelium discoideum, a protein that is essential for the extension of filopodia, plasma membrane protrusions filled with parallel bundles of F-actin similarly as metazoan Myo10, which suggests a high degree of functional conservation throughout evolution.
