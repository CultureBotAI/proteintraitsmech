identifier: InterPro:IPR062771
label: "Extracellular serine/threonine protein kinase four-jointed, N-terminal"
definition: >-
  This entry represents a domain found in Extracellular serine/threonine protein kinase four-jointed (fj) from Drosophila. This protein is a functional Golgi-resident serine/threonine kinase that phosphorylates cadherin domains of Fat and Dachsous proteins during their transit through the Golgi apparatus.
