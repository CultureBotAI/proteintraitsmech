identifier: InterPro:IPR060348
label: "Rv3395c/MT3502-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the uncharacterised protein MT3502 and Uncharacterized protein Rv3395c from Mycobacterium tuberculosis and similar proteins mainly from actinomycetes. MT3502 has a P-loop containing nucleotide triphosphate hydrolase fold . This domain is also found in predicted recombinase bacterial proteins.
