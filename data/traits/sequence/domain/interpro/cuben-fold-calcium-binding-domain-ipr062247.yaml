identifier: InterPro:IPR062247
label: "Cuben fold calcium-binding domain"
definition: >-
  This domain is found at the C terminus of noncanonical aromatic amino acid decarboxylases (ncAAADs) in fungi. The domain adopts a novel double-β-barrel fold, termed the Cuben fold, consisting of two perpendicularly stacked six-stranded β-barrel repeats with Greek-key topology. Each repeat contains six β-strands followed by a helix-containing loop. The domain contains two metal-binding sites formed cooperatively between the repeats and between this domain and the catalytic domain. Calcium binding at these sites increases enzyme catalytic rate over 300-fold and enhances thermal stability. This domain is essential for ncAAAD activity; the catalytic domain alone shows little decarboxylase activity.
