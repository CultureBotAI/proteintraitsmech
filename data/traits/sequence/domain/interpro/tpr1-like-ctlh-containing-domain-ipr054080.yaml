identifier: InterPro:IPR054080
label: "TPR1-like, CTLH-containing domain"
definition: >-
  This domain is found in Protein TPR1 from Oryza sativa, also known as Topless-related protein 1/2, and in similar sequences predominantly found in plants and some fungal species. TPR1 is thought to be a downstream regulator of strigolactones signalling. This entry represents the second part of the N-terminal domain of TPR1, which contains the C-terminal to LisH (CTLH) motif, responsible for the binding to the auxin-responsive protein 12 (IAA12). This domain shows an all-alpha configuration.
