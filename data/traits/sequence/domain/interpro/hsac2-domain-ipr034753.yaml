identifier: InterPro:IPR034753
label: "hSac2 domain"
definition: >-
  Sac2 is an evolutionary conserved protein in multicellular organisms from nematode to human. Sac2 orthologues are also found in fungi genera such as Aspergillus species and Yarrowia lipolytica, but is absent in Saccharomyces cerevisiae. Sac2 is a phosphatidylinositol (PI) 4-phosphatase that specifically hydrolyzes phosphatidylinositol 4-phosphate (PI(4)P) to phosphatidylinositol. Besides the conserved N-terminal Sac1 domain, Sac2 contains a unique homology domain, homology Sac2 (hSac2), followed by a proline-rich C-terminal portion with various lengths in different species. The hSac2 domain plays a role in Sac2 dimerization and intracellular localization. The hSac2 domain is also found in proteins encoded by the transformation-related protein 63 regulated 1 (TPRG1) and the tumor protein p63 regulated gene 1-like genes (TPRG1L). The hSac2 domain has a PH domain-like fold and consists of a core of two perpendicularly apposed β sheets with a C-terminal α helix that seals the gap between the two sheets. In addition to the core, hSac2 has an extra N-terminal α helix and a short β strand in the C-terminal end.
