identifier: InterPro:IPR047348
label: "DNA repair protein XRCC3-like, C-terminal"
definition: >-
  This entry represents the C-terminal region of XRCC3 and its eukaryotic homologues, including DNA repair protein RAD57 from Saccharomyces cerevisiae. DNA repair protein XRCC3 (X-ray repair complementing defective repair in Chinese hamster cells 3), a RAD51 paralogue, plays an important role in DNA repair by homologous recombination (HR). HR is an important error-free repair mechanism for chromosomal double-strand break (DSB) which otherwise leads to cell cycle arrest and death. XRCC3, together with the other RAD51 paralogues, RAD51B, RAD51C, RAD51D, and XRCC2, helps recruit RAD51 to the break site. It is involved in HJ resolution and thus in processing HR intermediates late in the DNA repair process. XRCC3 plays a role in regulating mitochondrial DNA copy number under conditions of oxidative stress in the presence of RAD51 and RAD51C.
