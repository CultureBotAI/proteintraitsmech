identifier: InterPro:IPR021985
label: "RNA polymerase Rpo13 subunit HTH domain"
definition: >-
  This domain is found in archaea, and is about 40 amino acids in length. It has a single completely conserved residue E that may be functionally important. The domain is a 'helix-turn-helix' (HTH) domain in the Rpo13 subunit of the archaeal RNA polymerase. This domain is involved in downstream DNA binding, and the entire subunit has also been implicated in contacting transcription factor II B.
