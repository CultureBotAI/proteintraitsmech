label: "Domain of unknown function DUF6924"
definition: >-
  This domain of unknown function is found in bacterial and fungal proteins, either standalone or in combination with other domains. It is probably remotely related to the anticodon binding domain observed in histidyl, glycyl, threonyl and prolyl tRNA synthetases.
