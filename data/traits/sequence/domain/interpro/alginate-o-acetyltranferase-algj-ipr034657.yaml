identifier: InterPro:IPR034657
label: Alginate O-acetyltranferase AlgJ
definition: >-
  The alginate biosynthesis protein AlgX appears to be directly involved in the O-acetylation of alginate, an exopolysaccharide that is associated with the formation of persistent biofilms. Its N-terminal catalytic domain resembles SGNH hydrolases, though with a permuted topology. The active site matches that of the SGNH hydrolases, is well conserved, and has been verified experimentally. AlgJ closely resembles AlgX in sequence and function, although it lacks the C-terminal carbohydrate binding domain of AlgX. AlgJ is part of an alginate biosynthetic gene cluster which is required for alginate O acetylation. AlgJ exhibits acetylesterase activity that is mediated through the Ser-His-Asp catalytic triad similar to that of the SGNH hydrolase-like enzyme AlgX.
