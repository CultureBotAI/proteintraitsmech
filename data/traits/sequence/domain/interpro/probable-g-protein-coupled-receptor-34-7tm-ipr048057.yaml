identifier: InterPro:IPR048057
label: "Probable G protein-coupled receptor 34, 7TM"
definition: >-
  This entry represents the seven-transmembrane segments of the probable G-protein coupled receptor 34 (GPR34), an orphan receptor primarily expressed in the immune system, particularly in microglia and macrophages, which suggests its involvement in immune regulation and inflammatory responses. GPR34 is a member of the rhodopsin-like, class A GPCRs, a widespread protein family that includes the light-sensitive rhodopsin as well as receptors for biogenic amines, lipids, nucleotides, odorants, peptide hormones, and a variety of other ligands. All GPCRs have a common structural architecture comprising of seven-transmembrane (TM) α-helices interconnected by three extracellular and three intracellular loops. A general feature of GPCR signalling is agonist-induced conformational changes in the receptors, leading to activation of the heterotrimeric G proteins, which consist of the guanine nucleotide-binding G-alpha subunit and the dimeric G-beta-gamma subunits. The activated G proteins then bind to and activate numerous downstream effector proteins, which generate second messengers that mediate a broad range of cellular and physiological processes..
