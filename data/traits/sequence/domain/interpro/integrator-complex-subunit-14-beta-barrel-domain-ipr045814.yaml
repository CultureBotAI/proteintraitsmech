identifier: InterPro:IPR045814
label: "Integrator complex subunit 14, beta-barrel domain"
definition: >-
  This entry represents the central β-barrel domain of Integrator complex subunit 14 (IntS14), a component of the integrator complex which is involved in the transcription of small nuclear RNAs (snRNA) and their 3'-box-dependent processing. This complex is also involved in the 3'-end processing of the U7 snRNA, and the spliceosomal snRNAs U1 and U5. IntS14 interacts with IntS13, both of them consist of an N-terminal von-Willebrand type A like domain (VWA, ), followed by a central β-barrel domain (this entry) and a C-terminal α-helical domain ( ) connected through a linker. The interface involves all domains of both proteins, both β-barrel domains form the centre of the complex and contribute to the major contact between Ints13-IntS14.
