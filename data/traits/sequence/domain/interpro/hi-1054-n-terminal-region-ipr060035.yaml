identifier: InterPro:IPR060035
label: "HI_1054, N-terminal region"
definition: >-
  This entry represents the N-terminal domain of HI_1054, an uncharacterised protein from Haemophilus influenzae. This N-terminal region does not fold into a compact domain according to structure predictions. This entry also covers the same domain in different bacterial proteins.
