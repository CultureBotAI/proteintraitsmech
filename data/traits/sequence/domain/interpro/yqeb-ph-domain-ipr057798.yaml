identifier: InterPro:IPR057798
label: "YqeB, PH domain"
definition: >-
  This entry represents a PH domain in YqeB from Bacillus subtilis and related bacterial proteins. These proteins contain 2 transmembrane helices and a bacterial PH domain that includes an unusual α/β/β/α subdomain. The function of these proteins is unknown. They contain a C-terminal domain related to an anticodon binding domain found in cysteinyl tRNA ligases. This suggests these proteins may have a role in translation, it is predicted to be located at the plasma membrane.
