identifier: InterPro:IPR045810
label: "eIF3h, C-terminal"
definition: >-
  This entry represents a C-terminal helical region present in eukaryotic initiation factor 3 chain H. Eukaryotic translation initiation factor 3 subunit H (eIF3h) is a component of the eukaryotic translation initiation factor 3 (eIF-3) complex, which is involved in protein synthesis and, together with other initiation factors, stimulates binding of mRNA and methionyl-tRNAi to the 40S ribosome. It is a non-peptidase homologue in peptidase family M67 (MEROPS identifier M67.971). Results suggest that eIF3h regulates cell growth and viability, and that over-expression of the gene may provide growth advantage to prostate, breast, and liver cancer cells.
