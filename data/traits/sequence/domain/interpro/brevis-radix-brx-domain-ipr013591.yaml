identifier: InterPro:IPR013591
label: "Brevis radix (BRX) domain"
definition: >-
  This is a short domain, approximately 35 residues in length that is found near the C terminus in a number of plant proteins, being repeated in some members. It is found in Brevis radix-like proteins. These may act as a regulator of cell proliferation and elongation in the root. It is also found in proteins annotated as involved in disease resistance and in the regulation of chromosome condensation, which also contain other domains with varied functions, such as TIR ( ) and FYVE ( ) respectively.
