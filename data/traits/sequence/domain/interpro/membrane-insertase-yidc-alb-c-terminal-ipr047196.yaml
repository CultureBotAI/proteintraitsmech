identifier: InterPro:IPR047196
label: "Membrane insertase YidC/ALB, C-terminal"
definition: >-
  This entry represents the C-terminal domain of membrane insertase YidC from bacteria, ALBINO3-like proteins from plants and similar proteins. YidC is a bacterial membrane protein which is required for the insertion and assembly of inner membrane proteins. The well-characterised YidC protein from Escherichia coli and its close homologues contain a large N-terminal periplasmic domain. This protein interacts with SecYEG protein-conducting channel and the accessory proteins SecDF-YajC to form the bacterial holo-translocon (HTL).
