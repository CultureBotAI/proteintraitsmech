identifier: InterPro:IPR034733
label: "Acetyl-coenzyme A carboxylase carboxyl transferase subunit beta"
definition: >-
  All of the members in this family are biotin dependent carboxylases. The carboxyl transferase domain carries out the following reaction; transcarboxylation from biotin to an acceptor molecule. There are two recognised types of carboxyl transferase. One of them uses acyl-CoA and the other uses 2-oxoacid as the acceptor molecule of carbon dioxide. All of the members in this family utilise acyl-CoA as the acceptor molecule. In bacteria, the acetyl coenzyme A carboxylase (ACC) is a complex consisting of two subunits: alpha and beta. This domain also recognizes the bacterial ACC beta-subunit.
