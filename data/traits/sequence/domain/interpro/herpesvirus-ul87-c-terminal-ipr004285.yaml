identifier: InterPro:IPR004285
label: "Herpesvirus UL87, C-terminal"
definition: >-
  This entry represents the C-terminal domain found in protein UL87 from human cytomegalovirus and related proteins members of herpesviridae UL87 family. The function of this domain is unknown. It is also found in Epstein-Barr virus (EBV) early protein BcRF1 that is a viral factor crucial for the activation of late gene transcription following viral DNA replication during the productive cycle. BcRF1 forms a complex with the TATT motif, present in the promoter of most EBV late genes, and that this interaction is required for activation of late viral gene expression.
