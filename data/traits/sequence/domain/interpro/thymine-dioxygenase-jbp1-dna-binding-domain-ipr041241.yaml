identifier: InterPro:IPR041241
label: "Thymine dioxygenase JBP1, DNA-binding domain"
definition: >-
  The J-binding protein 1 (JBP1) is essential for biosynthesis and maintenance of DNA base-J (beta-d-glucosyl-hydroxymethyluracil). Base-J and JBP1 are confined to some pathogenic protozoa and are absent from higher eukaryotes, prokaryotes and viruses. JBP1 recognizes J-containing DNA (J-DNA) through the DNA-Binding JBP1 domain (DB-JBP1), which binds to J-DNA with approximately the same affinity and specificity as full-length JBP1. Structure analysis of DB-JBP1 revealed a helix-turn-helix variant fold, a 'helical bouquet' with a 'ribbon' helix encompassing the amino acids responsible for DNA binding. Mutation of a single residue (Asp525) in the ribbon helix abrogates specificity toward J-DNA.
