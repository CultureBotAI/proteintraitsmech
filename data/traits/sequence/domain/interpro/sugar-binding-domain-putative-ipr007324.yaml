identifier: InterPro:IPR007324
label: Sugar-binding domain, putative
definition: >-
  This probable domain is found in bacterial transcriptional regulators such as DeoR, SorC and CggR. One of these proteins, , has an N-terminal helix-turn-helix that binds to DNA. This domain is probably the ligand regulator binding region. SorC is regulated by sorbose and other members of this family are likely to be regulated by other sugar substrates. CggR regulates the gapA operon in B. subtilis. It is worth noting that the DeoR in this entry is represented by the protein, UniProt P39140, from Bacillus subtilis. Not the DeoR, UniProt P0ACK5, from E. coli. Despite sharing the same name, these two proteins do not share protein sequence similarity.
