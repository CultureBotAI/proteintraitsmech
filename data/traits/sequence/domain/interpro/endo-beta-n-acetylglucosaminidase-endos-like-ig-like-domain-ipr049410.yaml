identifier: InterPro:IPR049410
label: "Endo-beta-N-acetylglucosaminidase EndoS-like, Ig-like domain"
definition: >-
  This domain is found in Endo-beta-N-acetylglucosaminidase EndoS from Streptococcus pyogenes and similar sequences predominantly found in firmicutes. EndoS is an immunomodulatory enzyme secreted by the bacteria to remove carbohydrates from IgG antibodies in a highly specific manner, which gives the pathogen a survival advantage over its host. This protein is composed of five distinct protein domains. The domain located at the base of the V-shaped EndoS structure (this entry), also named hybrid Ig domain, is composed of two subdomains. The smaller one is inserted within the loop that connects the LRR domain to the second and third β-strands of the larger subdomain. The latter is a typical Ig domain structurally similar to the interleukin-4 receptor.
