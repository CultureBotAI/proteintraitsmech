identifier: InterPro:IPR061903
label: "Domain of unknown function DUF8842"
definition: >-
  This entry represents a domain of unknown function frequently found C-terminal in proteins from Actinomycetota. This domain is distantly related to (DUF5949). The gene SCO1756 encoding a protein with this domain was found to be more abundant in bacterioferritin mutants during morphological differentiation, although the specific function of this domain remains to be determined.
