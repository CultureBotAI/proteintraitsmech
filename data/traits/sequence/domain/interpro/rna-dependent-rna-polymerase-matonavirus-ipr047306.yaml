identifier: InterPro:IPR047306
label: "RNA-dependent RNA polymerase, matonavirus"
definition: >-
  This entry represents the catalytic core domain of the RNA-directed RNA polymerase p90 of RNA viruses belonging to the family Matonaviridae, which is cleaved from the C-terminal region of Non-structural polyprotein p200. Members of the family Matonaviridae have a (+)ssRNA genome enclosed by an icosahedral capsid. Matonaviridae has a single genus, Rubivirus, which contains three species: Rubivirus rubella (commonly called rubella virus), Rubivirus ruteetense (commonly called ruhugu virus), and Rubivirus strelense (commonly called rustrela virus). Rubella virus (RuV) is the etiologic agent of the disease rubella (also called German measles). RuV is transmitted only between humans via the respiratory route, and is the main cause of congenital rubella syndrome (severe congenital birth defects, miscarriage, and stillbirth) when infection occurs during the first trimester of pregnancy. In vitro studies with cell lines showed that RuV has an apoptotic effect on certain cell types; there is evidence for a p53-dependent mechanism. The catalytic RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in the fidelity of processes such as correct incorporation and reorganization of nucleotides.
