identifier: InterPro:IPR062975
label: "Flagellar collar protein C, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of flagellar collar protein C (FlcC), found in spirochaetes. The flagellar collar is a spirochaete-specific multiprotein complex of the periplasmic flagellum, essential for flagellar assembly, stator recruitment, and spirochaete motility. FlcC (BB0624 ( ) in Borrelia burgdorferi) forms part of the central collar structure, positioned between FlbB at the base and FlcA at the periphery. The collar exhibits remarkable structural plasticity, accommodating the highly curved membrane at the cell tip and enabling the high torque generation necessary for spirochete movement through viscous environments. Deletion of flcC in B. burgdorferi results in severely impaired motility.
