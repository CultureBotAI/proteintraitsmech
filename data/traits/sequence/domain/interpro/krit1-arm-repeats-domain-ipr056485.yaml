identifier: InterPro:IPR056485
label: "KRIT1, ARM-repeats domain"
definition: >-
  KRIT1, also known as CCM1, a Rap1-binding protein, is expressed in endothelial cells where it is present in cell-cell junctions and associated with junctional proteins. Together with CCM2/MGC4607 and CCM3/PDCD10, KRIT1 constitutes a set of proteins whose mutations are found in cerebral cavernous malformations, characterised by cerebral hemorrhages and vascular malformations in the central nervous system. KRIT-1 localization is mediated by its FERM domain. This entry represents an ARM-repeats domain found in the central region of KRIT1.
