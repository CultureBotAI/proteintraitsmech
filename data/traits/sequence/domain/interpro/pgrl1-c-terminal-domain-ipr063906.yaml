identifier: InterPro:IPR063906
label: "PGRL1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in PGRL1 (PGR5-like protein 1) proteins. The domain is found in plants. PGRL1 is a chloroplast thylakoid membrane protein that functions as a ferredoxin-plastoquinone reductase involved in cyclic electron flow around photosystem I. The C-terminal region is required for ferredoxin binding and contains conserved cysteine residues involved in disulfide bond formation with PGR5 and binding of an iron-containing cofactor.
