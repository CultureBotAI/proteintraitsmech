identifier: InterPro:IPR006343
label: "DnaB/C, C-terminal domain"
definition: >-
  This entry describes the C-terminal domain in DnaB, DnaD and related bacterial proteins. This domain is α-helical. DnaB is a key component of the bacterial DNA replication machinery, involved in both initiation and replication restart. It functions in coordination with DnaI to assist in loading the replicative helicase DnaC onto single-stranded DNA. During initiation at the chromosomal origin of replication, oriC, DnaB acts downstream of DnaA and requires the prior action of DnaD. Beyond its role at oriC, DnaB is also a component of the replication restart primosome, enabling helicase reloading at alternative chromosomal sites, possibly through a PriA-independent pathway. DnaB and DnaD work cooperatively to enable DnaB access to single-stranded DNA, and they are essential for helicase loading at the oriN of the repN plasmid. DnaB is believed to mediate replication initiation at the inner face of the cell membrane and is critical for anchoring the origin region of both chromosomal DNA and plasmids to the membrane. It binds weakly to single-stranded DNA, shows a preference for double-stranded DNA and replication fork-like substrates, and remodels DNA by laterally compacting supercoiled and linear plasmid DNA, forming bead-like structures along double-stranded DNA. Together with DnaD, DnaB forms bipolar complexes on plasmid DNA, highlighting its central role in DNA replication and structural organisation. The DnaD protein is a component of the PriA primosome. The PriA primosome functions to recruit the replication fork helicase onto the DNA. Members, both chromosomal or phage-associated, are found in the Bacillus/Clostridium group of Gram-positive bacteria. DnaD consists of two domains with distinct activities: an N-terminal domain with oligomerisation activity and a C-te…
