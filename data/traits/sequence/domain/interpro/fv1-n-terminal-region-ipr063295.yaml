identifier: InterPro:IPR063295
label: "Fv1, N-terminal region"
definition: >-
  This entry represents the N-terminal region of Fv1 retroviral restriction factor found in mammals, particularly rodents and primates. The region spans approximately 110 amino acids and prevents infection by gammaretroviruses through interaction with the viral capsid protein after viral entry. This interaction disrupts the capsid, inactivating the viral genome and preventing nuclear entry and genomic integration. The region is found primarily in Muridae and some primate species as part of the antiviral defence system.
