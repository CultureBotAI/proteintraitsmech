identifier: InterPro:IPR029531
label: "Calpain-3, penta-EF-hand"
definition: >-
  This entry represents the Ca2 -binding penta-EF-hand (PEF) domain of CAPN3. Calpain-3 (CAPN3) belongs to the calpain family, which consists of a group of Ca2+ dependent cysteine proteases that regulate functions of substrates by proteolysis. Calpain-3 is a calcium-dependent cysteine protease mainly expressed in skeletal muscle. It is involved in sarcomere maintenance and remodelling. It interacts with myospryn, which is a muscle-specific protein that functions in vesicular trafficking and protein kinase A signalling.
