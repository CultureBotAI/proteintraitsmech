identifier: InterPro:IPR061535
label: "Domain of unknown function DUF8465"
definition: >-
  This entry represents a small SH3-like β-barrel domain found N-terminal to the Smr domain ( ) in DNA mismatch repair proteins from Bacteroidota. The domain is approximately 50 residues in length and is found predominantly in Flavobacteriaceae, Sphingobacteriaceae and Cytophagales families. The Smr domain itself is involved in DNA mismatch repair processes. The specific function of this N-terminal domain remains to be determined.
