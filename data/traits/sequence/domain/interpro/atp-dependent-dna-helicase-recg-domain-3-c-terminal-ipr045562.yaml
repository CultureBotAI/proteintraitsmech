identifier: InterPro:IPR045562
label: "ATP-dependent DNA helicase RecG, domain 3, C-terminal"
definition: >-
  This domain is found at the C-terminal of Domain 3 of the ATP-dependent DNA helicase RecG and also includes the around 50 residues that extend from Domain 3 end that cross back to Domain 1 forming a hook that wraps around the extended α-helix. This interaction provides a link between Domain 1 and 3 and it is likely that these residues are involved in conformational changes associated with domain movements arising from ATP binding and hydrolysis. The ATP-dependent DNA helicase RecG plays a critical role in recombination and DNA repair. It helps to process Holliday junction intermediates to mature products by catalysing branch migration. This entry includes RecG from bacteria the homologue from Arabidopsis, which has a critical role in recombination and DNA repair. RecG has DNA unwinding activity characteristic of a DNA helicase with 3' to 5' polarity. RecG unwind branched duplex DNA (Y-DNA) and has a role in constitutive stable DNA replication (CsdR) and R-loop formation. It is genetically synergistic to RadA and RuvABC. RecG comprises three structural domains, the largest N-terminal Domain 1 which interacts with DNA junctions, and Domains 2 and 3 at the C-terminal which contain the characteristic motifs that identify RecG as an SF2 helicase.
