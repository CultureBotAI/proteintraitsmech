identifier: InterPro:IPR047407
label: "E3 ubiquitin-protein ligase UHRF2, first Tudor domain"
definition: >-
  This entry represents the first Tudor domain of UHRF2 and similar sequences from vertebrates. The tandem Tudor domain directs binding of UHRF to the heterochromatin mark histone H3K9me3. E3 ubiquitin-protein ligase UHRF2, also called Np95/ICBP90-like RING finger protein (NIRF) or Np95-like RING finger protein, was originally identified as a ubiquitin ligase acting as a small ubiquitin-like modifier (SUMO) E3 ligase that enhances zinc finger protein 131 (ZNF131) SUMOylation but does not enhance ZNF131 ubiquitination. It also ubiquitinates PCNP, a PEST-containing nuclear protein. UHRF2 also functions as a nuclear protein involved in cell-cycle regulation and has been implicated in tumorigenesis. It interacts with cyclins, CDKs, p53, pRB, PCNA, HDAC1, DNMTs, G9a, methylated histone H3 lysine 9, and methylated DNA. It interacts with the cyclin E-CDK2 complex, ubiquitinates cyclins D1 and E1, induces G1 arrest, and is involved in the G1/S transition regulation. Furthermore, UHRF2 is a direct transcriptional target of the transcription factor E2F-1 in the induction of apoptosis. It recruits HDAC1 and binds to methyl-CpG. UHRF2 also participates in the maturation of Hepatitis B virus (HBV) through interacting with HBV core protein and promoting its degradation. UHRF2 contains an N-terminal ubiquitin-like domain (UBL), a tandem Tudor domain (TTD), a plant homeodomain (PHD) domain, a SET- and RING-associated (SRA) domain, and a C-terminal RING finger domain.
