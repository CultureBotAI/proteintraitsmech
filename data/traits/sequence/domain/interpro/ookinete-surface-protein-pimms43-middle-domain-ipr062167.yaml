identifier: InterPro:IPR062167
label: "Ookinete surface protein PIMMS43, middle domain"
definition: >-
  This entry represents the middle domain of ookinete surface protein PIMMS43 and related proteins in Plasmodium species. PIMMS43 is involved in ookinete evasion of the mosquito complement-like response, oocyst maturation, sporozoite development and infectivity. The protein is localised to the extracellular side of membranes and is expressed in female gametes, zygotes, ookinetes and sporozoites. The family is found across Plasmodium species. The function of this middle domain remains to be determined.
