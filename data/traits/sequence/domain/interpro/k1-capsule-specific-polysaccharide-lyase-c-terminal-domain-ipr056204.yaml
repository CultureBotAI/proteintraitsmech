identifier: InterPro:IPR056204
label: "K1 capsule-specific polysaccharide lyase, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of K1 capsule-specific polysaccharide lyase from Klebsiella phages and related proteins. This domain adopts a β-sandwich fold. K1-lyase functions as a receptor binding protein (RBP) and mediates the attachment to the host capsular exopolysaccharides. This enzyme possesses a lyase activity that specifically degrades the K1-type polysaccharides of Klebsiella pneumoniae capsule.
