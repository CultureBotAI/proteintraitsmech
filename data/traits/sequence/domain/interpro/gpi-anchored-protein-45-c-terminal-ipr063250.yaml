identifier: InterPro:IPR063250
label: "GPI-anchored protein 45, C-terminal"
definition: >-
  This entry represents a conserved C-terminal domain found in GPI-anchored proteins, including Predicted GPI-anchored protein 45 (PGA45) from Candida albicans. The domain is approximately 340-360 amino acids in length and is found in predicted GPI-anchored proteins that are localised to the cell membrane and cell wall. These proteins contain multiple N-linked glycosylation sites and are attached to the cell surface via a GPI anchor. PGA45 expression is regulated by stress responses, being induced by HOG1 and during biofilm formation, and repressed by caspofungin. The domain is found in fungal species, particularly in the Candida/Lodderomyces clade. The specific function of this C-terminal domain remains to be determined.
