identifier: InterPro:IPR054522
label: "Cadherin-related hmr-1, C-terminal"
definition: >-
  This entry represents the C-terminal region of Cadherin-related hmr-1 from Caenorhabditis elegans and similar sequences from nematodes. Hmr-1 is a calcium-dependent cell adhesion protein required for adherens junction assembly and connecting adherens junctions to the cytoskeleton. This domain is homologous to the beta-catenin binding region of E-cadherin.
