identifier: InterPro:IPR040473
label: "NusG, additional domain"
definition: >-
  This domain is found in Thermotoga maritima NusG, which interacts with RNA polymerase and other proteins to form multi-component complexes that modulate transcription. This domain is referred to as Domain II and is an additional domain inserted into the N-terminal domain.
