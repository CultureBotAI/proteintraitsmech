identifier: InterPro:IPR047739
label: "Growth-regulating ATPase SCO5717-like, N-terminal domain"
definition: >-
  This entry represents the short N-terminal domain of the tyrosine-phosphorylated protein SCO5717 from Streptomyces coelicolor ( ) and similar sequences from actinomycetes. SCO5717 seems to be involved in the regulation of bacterial growth. Members of this unusual protein family usually have a long, low-complexity, typically Pro-rich region, then a AAA+ family ATPase domain, and then another region of low-complexity sequence.
