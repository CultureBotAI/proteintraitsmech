identifier: InterPro:IPR060160
label: "TP_0781 domain"
definition: >-
  This entry represents a domain covering the full length of TP_0781 proteins found in Treponema and related spirochaetes. The proteins are typically around 150 amino acids in length and adopt an immunoglobulin-like fold. TP_0781 is found in Treponema pallidum, the causative agent of syphilis. This domain is also found C-terminal in putative M23ase β-sheet core domain-containing and other uncharacterised bacterial proteins.
