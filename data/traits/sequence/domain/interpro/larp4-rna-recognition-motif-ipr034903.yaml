identifier: InterPro:IPR034903
label: "LARP4, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) in LARP4 mainly from mammals. LARP4 binds to the poly-A tract of mRNA molecules and plays a role in the regulation of mRNA translation and in the regulation of cell morphology and cytoskeletal organisation. This domain is not present in other La-related proteins. It is found next to .
