identifier: InterPro:IPR045688
label: "Ets1, N-terminal flanking region of Ets domain"
definition: >-
  Ets1 is a member of the Ets family of transcription factors in which the DNA-binding activity is in an autoinhibited state. The autoinhibition of Ets1 is mediated by structural coupling of the regions flanking the Ets domain. The inhibitory regions are folded as helices HI1 and HI2 N-terminal to the ETS domain and as H4 C-terminal to the ETS domain, which are packed together to form an inhibitory module. This domain represents the N-terminal flanking region of Ets domain which contains the residues forming HI1 and HI2 helices and additional residues (244-301) N-terminal to HI1. HI1 and HI2 exert the autoinhibitory function by directing the inhibitory residues N-terminal to HI1 to mask the Ets domain DNA-binding surface. These residues are flexible and function by masking the DNA-binding surface of the Ets domain. Phosphorylation of serine residues present in this region enhances autoinhibition dramatically. These inhibitory sequences are required for cooperative DNA binding. Members of this entry are found among chordates.
