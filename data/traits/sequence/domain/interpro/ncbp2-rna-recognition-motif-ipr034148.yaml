identifier: InterPro:IPR034148
label: "NCBP2, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of CBP20 (also known as NCBP2). CBP20 is the small subunit of the nuclear cap binding complex (CBC), which is a conserved eukaryotic heterodimeric protein complex binding to 5'-capped polymerase II transcripts and plays a central role in the maturation of pre-mRNA and uracil-rich small nuclear RNA (U snRNA). CBP20 is most likely responsible for the binding of capped RNA. It contains an RNA recognition motif (RRM) and interacts with the second and third domains of CBP80, the large subunit of CBC.
