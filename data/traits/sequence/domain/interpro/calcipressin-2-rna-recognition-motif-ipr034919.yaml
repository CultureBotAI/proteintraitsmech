identifier: InterPro:IPR034919
label: "Calcipressin-2, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of RCAN2. RCAN2 (regulator of calcineurin 2, also known as calcipressin-2) is encoded by a novel thyroid hormone-responsive gene ZAKI-4 that is abundantly expressed in human brain, heart and muscles. It Inhibits calcineurin-dependent transcriptional responses by binding to the catalytic domain of calcineurin A.
