identifier: InterPro:IPR063086
label: "IML1, small domain"
definition: >-
  This entry represents a small domain found in Vacuolar membrane-associated protein IML1 from fungi and its orthologue from animals, GATOR1 complex protein DEPDC5. In Saccharomyces cerevisiae, Iml1 is a subunit of both the SEA (Seh1-associated) and Iml1 complexes (Iml1-Npr2-Npr3). SEA complex is associates dynamically with the vacuole and is involved in autophagy. Iml1 complex is required for non-nitrogen-starvation (NNS)-induced autophagy. DEPDC5 is a component of the GATOR1 complex and functions as an inhibitor of the amino acid-sensing branch of the mTORC1 pathway. This entry represents a small domain, consisting of eight β-strands, found near the N-terminal of these proteins. It is adjacent , and after in animals.
