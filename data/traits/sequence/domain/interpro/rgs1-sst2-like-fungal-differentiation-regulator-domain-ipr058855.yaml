identifier: InterPro:IPR058855
label: "RGS1/SST2-like, Fungal-Differentiation Regulator domain"
definition: >-
  This entry represents the Fungal-Differentiation Regulator (Fungal-DR) domain, a winged helix domain found in fungal regulators of G-protein signalling (RGS) that regulate differentiation pathways, such as Aspergillus nidulans FlbA, Schizosaccharomyces pombe Rgs1 and Saccharomyces cerevisiae Sst2, where it plays a critical role in their regulatory function in differentiation and mating processes. The domain is required for function and is present in the N-terminal region of these proteins, followed typically by a DEP domain ( ) and a C-terminal RGS domain ( ).
