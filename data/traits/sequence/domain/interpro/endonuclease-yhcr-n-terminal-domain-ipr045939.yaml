identifier: InterPro:IPR045939
label: "Endonuclease YhcR, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Bacillus subtilis YhcR endonuclease and related bacterial proteins. YhcR is a Bacillus subtilis sugar-nonspecific endonuclease. It cleaves endonucleolytically to yield nucleotide 3'-monophosphate products, similar to Staphylococcus aureus micrococcal nuclease. YhcR appears to be located in the cell wall, and is thought to be a substrate for a Bacillus subtilis sortase. YhcR is the major calcium-activated nuclease of B. subtilis. The N-terminal domain includes the NYD domain.
