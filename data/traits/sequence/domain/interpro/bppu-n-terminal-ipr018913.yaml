identifier: InterPro:IPR018913
label: "BppU, N-terminal"
definition: >-
  This is the N-terminal domain of baseplate upper proteins (BppU, also known as ORF48) which is found in bacteriophages. The N-terminal domain exhibits a β-sandwich immunoglobulin fold.
