identifier: InterPro:IPR049326
label: "Rhodopsin domain, fungi"
definition: >-
  This entry describes the fungal rhodopsin domain, found in a wide range of fungi. This domain typically consists of seven transmembrane helices that form an interior pocket for the all-trans-retinal chromophore, which is covalently bound to a lysine residue in helix-G via a protonated Schiff base. While the core structure of the fungal rhodopsin domain shares similarities with other microbial rhodopsins, there are distinct differences. For instance, some fungal rhodopsins, like those found in Leptosphaeria, have an elongated extracellular loop 1 (ECL1) domain and an N-terminal β-strand, which appear to be signatures of a specific subfamily of fungal rhodopsins. Fungal rhodopsins are membrane-embedded photoreceptors characterised by seven transmembrane helices and a retinal chromophore. They are widely distributed across fungal species, forming large multigene families. These proteins exhibit diverse functions, including light-driven proton pumping, green light sensing, and involvement in signalling pathways. Fungal rhodopsins are particularly prevalent in plant-associated and phytopathogenic fungi.
