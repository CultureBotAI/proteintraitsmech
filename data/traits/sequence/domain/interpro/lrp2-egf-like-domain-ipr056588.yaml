identifier: InterPro:IPR056588
label: "LRP2, EGF-like domain"
definition: >-
  This EGF-like domain is found in human Low-density lipoprotein receptor-related protein 2 (LRP2) and similar animal proteins. LRP2 is a multi-ligand endocytic receptor. It acts together with CUBN to mediate endocytosis of high-density lipoproteins. In the kidney, LRP2 mediates the tubular uptake and clearance of leptin.
