identifier: InterPro:IPR049559
label: "Rrp6-like, 3'-5' exonuclease domain"
definition: >-
  This entry represents the DEDDy-type DnaQ-like 3'-5' exonuclease domain possessing three conserved sequence motifs termed ExoI, ExoII and ExoIII, with a specific YX(3)D pattern at ExoIII. The motifs are clustered around the active site and contain four conserved acidic residues that serve as ligands for the two metal ions required for catalysis. PM/Scl-100, an autoantigen present in the nucleolar compartment of the cell, reacts with autoantibodies produced by about 50% of patients with polymyositis-scleroderma overlap syndrome. Rrp6 is a nuclear-specific catalytic component of the RNA exosome complex which has 3'->5' exoribonuclease activity and participates in a multitude of cellular RNA processing and degradation events. In animals is also known as exosome complex component 10 (EXOSC10). In contrast to yeast and humans where Rrp6 is encoded by a single gene, plants such as Arabidopsis thaliana, rice, and polar, have three homologues of Rrp6.
