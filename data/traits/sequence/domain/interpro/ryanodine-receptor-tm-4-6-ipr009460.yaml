identifier: InterPro:IPR009460
label: Ryanodine Receptor TM 4-6
definition: >-
  The release of Ca 2+ ions from intracellular stores is a key step in a wide variety of cellular functions. In striated muscle, the release of Ca 2+ from the sarcoplasmic reticulum (SR) leads to muscle contraction. Ca 2+ release occurs through large, high-conductance Ca 2+ release channels, also known as ryanodine receptors (RyRs) because they bind the plant alkaloid ryanodine with high affinity and specificity. This region covers TM regions 4-6 of the ryanodine receptor 1 family.
