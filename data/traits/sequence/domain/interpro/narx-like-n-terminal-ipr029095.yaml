identifier: InterPro:IPR029095
label: "NarX-like, N-terminal"
definition: >-
  This domain is found N-terminal in histidine kinase NarX and other sensor proteins, as well as in type IV pilin, PilJ. This domain recognises nitrate and nitrite.
