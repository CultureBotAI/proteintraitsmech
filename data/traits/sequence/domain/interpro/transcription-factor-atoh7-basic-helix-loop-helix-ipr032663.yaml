identifier: InterPro:IPR032663
label: Transcription factor ATOH7, basic helix-loop-helix
definition: >-
  The bHLH (basic Helix-Loop-Helix) proteins contain the bHLH domain that is approximately 60 amino acids long and consists of a DNA-binding basic region followed by two α-helices separated by a variable loop region (HLH). The HLH domain promotes dimerisation, allowing the formation of homo- or heterodimeric complexes between different family members. Many bHLH proteins have been shown to act as transcriptional regulators. Transcription factor ATOH7 (previously known as Protein atonal homologue 7, Atoh7, and Math5) is a basic helix-loop-helix transcription factor that is involved in early stages of retinal neurogenesis. It is specifically expressed in the embryonic neural retina and is required for the genesis of retinal ganglion cells (RGCs) and optic nerves. This entry represents the bHLH domain of ATOH7 and similar proteins from chordates.
