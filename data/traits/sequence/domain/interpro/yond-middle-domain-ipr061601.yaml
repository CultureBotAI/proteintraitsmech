identifier: InterPro:IPR061601
label: "YonD, middle domain"
definition: >-
  This entry represents a domain found in the YonD protein from Bacillus subtilis and related proteins. It is predicted to fold into a curved β-sheet enclosing an α-helix. The function of this domain is unknown.
