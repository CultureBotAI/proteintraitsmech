identifier: InterPro:IPR045293
label: "LYRM2, LYR domain"
definition: >-
  LYRM2 is an uncharacterised LYR motif-containing protein that belongs to the Complex1_LYR-like superfamily which consists of proteins of diverse functions that are exclusively found in eukaryotes; these proteins contain the conserved tripeptide 'LYR' close to the N terminus.
