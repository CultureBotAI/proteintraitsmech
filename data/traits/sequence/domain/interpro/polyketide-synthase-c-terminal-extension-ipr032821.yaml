identifier: InterPro:IPR032821
label: "Polyketide synthase, C-terminal extension"
definition: >-
  This entry represents the very C terminus of a group of polyketide synthases. Polyketide synthases (PKSs) polymerise simple fatty acids into a large variety of different products, called polyketides, by successive decarboxylating Claisen condensations. Proteins containing this domain can be found in proteins ranging from bacteria to human.
