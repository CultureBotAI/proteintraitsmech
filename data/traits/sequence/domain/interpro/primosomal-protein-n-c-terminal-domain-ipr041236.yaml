identifier: InterPro:IPR041236
label: "Primosomal protein N, C-terminal domain"
definition: >-
  This is the C-terminal domain found in PriA DNA helicase. The C-terminal domain (CTD) bears similarity to the S10 subunit which binds branched rRNA within the bacterial ribosome. The C-terminal domain is part of the helicase domain of PriA proteins. It acts together with the 3' DNA-binding domain to form a site for binding ssDNA-binding protein (SSB). Primosomal protein N', also known as ATP-dependent helicase PriA, is a component of the primosome, which is involved in replication, repair, and recombination. PriA serves as a sensor/stabiliser for an arrested replication fork, which is lethal in bacteria if left unrepaired and eventually promotes restart of DNA replication through the assembly of a primosome. It also serves as a checkpoint protein that prevents the replicase from advancing in a strand displacement reaction on forks that do not contain a functional replicative helicase. This protein shows a modular arrangement in which its central helicase core is surrounded by several DNA-binding elements, including a 3'DNA-binding domain at the N-terminal. This domain is usually followed by a circularly permuted winged helix (WH) domain . At the C-terminal, there is a Cys-rich region (CRR) domain , which is embedded within the C-terminal helicase lobe , followed by the C-terminal domain (CTD) .
