identifier: InterPro:IPR063453
label: "YDR476C-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in YDR476C and related uncharacterised proteins from fungi. The domain is approximately 100 residues in length and is commonly found in association with the DUF2470 domain ( ). YDR476C from Saccharomyces cerevisiae is an uncharacterised protein localised to the endoplasmic reticulum. The protein is a glycoprotein with multiple N-linked glycosylation sites and is present at approximately 2120 molecules per cell during log phase growth. The domain is conserved across various fungal species including members of the Saccharomycetaceae and Pichiaceae families. The specific function of this C-terminal domain remains to be determined.
