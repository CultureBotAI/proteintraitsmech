identifier: InterPro:IPR039054
label: "Int12, PHD finger"
definition: >-
  Int12 is a component of integrator, a multi-protein mediator of small nuclear RNA processing. The integrator complex directly interacts with the C-terminal domain of RNA polymerase II (RNAPII) largest subunit and mediates the 3' end processing of small nuclear RNAs (snRNAs) U1 and U2. Different from other components of integrator, Int12 contains a PHD finger, which is not required for snRNA 3' end cleavage. Instead, Int12 harbors a small microdomain at its N terminus which is necessary and sufficient for Int12 function; this microdomain facilitates Int12 binding to Int1 and promotes snRNA 3' end formation. This entry represents the PHD finger of Int12.
