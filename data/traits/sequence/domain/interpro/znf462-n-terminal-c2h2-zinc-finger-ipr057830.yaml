identifier: InterPro:IPR057830
label: "ZNF462, N-terminal C2H2 zinc finger"
definition: >-
  This entry represents a C2H2 zinc finger at the N-terminal in the human ZNF462 and related proteins. Zinc finger protein 462 (ZNF462) is involved in transcription by regulating chromatin structure and organisation. ZNF462 is a multidomain protein that contains a number of classical C2H2 zinc fingers.
