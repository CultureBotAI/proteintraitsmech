identifier: InterPro:IPR061710
label: "Domain of unknown function DUF8649"
definition: >-
  This entry represents an N-terminal domain of approximately 200 residues found in Cyanobacteriota. The proteins containing this domain also possess a C-terminal domain of approximately 275 residues. Some proteins containing this domain are annotated as histidine ammonia-lyase, though this has not been experimentally verified. The function of this domain remains to be determined.
