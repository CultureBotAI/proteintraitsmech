identifier: InterPro:IPR057379
label: "Prospore membrane adapter protein SPO71, PH domain"
definition: >-
  This domain is found in the budding yeast prospore membrane adapter protein SPO71, including its orthologue Mug56 from fission yeasts. The domain represented by this entry has weak sequence similarity to PH domains, and it is predicted to adopt a similar structure. SPO71 is predicted to contain a tandem of three PH domains. This domain is the first in the tandem. SPO71 is involved in the recruitment of the lipid transfer protein VPS13 to the prospore membrane during sporulation. It plays an important role in the prospore membrane development. MUG56 is required for meiosis.
