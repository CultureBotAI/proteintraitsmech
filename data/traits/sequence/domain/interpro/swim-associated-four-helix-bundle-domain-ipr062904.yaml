identifier: InterPro:IPR062904
label: "SWIM-associated, four-helix bundle domain"
definition: >-
  This entry represents a four-helix bundle domain of approximately 105 residues found C-terminal to SWIM zinc finger domains in bacteria. The function of this domain remains to be determined.
