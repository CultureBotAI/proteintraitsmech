identifier: InterPro:IPR049314
label: "Endo-alpha-N-acetylgalactosaminidase, domain 5"
definition: >-
  Endo-alpha-N-acetylgalactosaminidase is a member of glycoside hydrolase (GH) family 101 and hydrolases the O-glycosidic bonds in mucin-type O-glycan between alpha-GalNAc and Ser/Thr. It is a multidomain protein. It contains a distorted (α/β)8 barrel catalytic domain (referred to as domain 3) flanked by four additional domains, which are mainly made of β-sheets (domains 2, 4, 5 and 6). This entry represents domain 5 which is part of the carbohydrate binding module.
