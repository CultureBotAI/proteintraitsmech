identifier: InterPro:IPR064058
label: "Lysyl endopeptidase-like, C-terminal domain"
definition: >-
  This is the peptidase domain found at the C-terminal of Lysyl endopeptidase from Pseudomonas aeruginosa and related sequences. The mature enzyme is a virulence factor involved in corneal infections.
