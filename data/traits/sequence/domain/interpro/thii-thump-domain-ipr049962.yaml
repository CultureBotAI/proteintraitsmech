identifier: InterPro:IPR049962
label: "ThiI, THUMP domain"
definition: >-
  This entry represents the THUMP domain found at the N terminus of ThiI, which has been implicated in the recognition of the acceptor-stem region. The THUMP domain is named after thiouridine synthases, methylases and PSUSs. The domain consists of about 110 amino acid residues. It is predicted to be an RNA-binding domain and probably functions by delivering a variety of RNA modification enzymes to their targets. tRNA sulfurtransferase ThiI catalyses the ATP-dependent transfer of a sulfur to tRNA to produce 4-thiouridine in position 8 of tRNAs, which functions as a near-UV photosensor. In some bacteria, ThiI is a bifunctional enzyme required for the synthesis of both the 4-thiouridine modification in tRNA and the thiazole moiety in the thiamine biosynthesis pathway. Three domains of ThiI are essential for the thiolation of tRNA: a THUMP domain that binds tRNA (see ), an AANH domain ( ) that activates the uridine residue by adenylylation, and a rhodanese-like domain ( ) that transfers sulfur to the activated uridine residue. Neither the THUMP nor the AANH domain of ThiI are essential for thiamine synthesis, only the rhodanese domain is necessary for synthesis of the thiazole moiety of thiamine.
