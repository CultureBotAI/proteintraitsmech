identifier: InterPro:IPR057732
label: "UBE2O, N-terminal SH3-A domain"
definition: >-
  This domain is found at the N-terminal in the human E3-independent E2 ubiquitin-conjugating enzyme (UBE2O) and related proteins. The domain represented by this entry folds into an open β-barrel with a typical SH3-like topology. This domain contains a large unstructured region with a high content of glycine residues. UBE2O is involved in the monoubiquitination of diverse targets to mediate important processes such as targeting proteins for quality control, regulation of nuclear trafficking of chromatin-associated proteins and clearing ribosomes during erythropoiesis. UBE2O is a multidomain protein composed of several SH3-like domains ( , , , ), UBC domain ( ) and a CR3 helix. The CR3 helix is a conserved region that is part of a non-canonical extension to the typical E2 fold. It forms the curved edge of the hook, together with the UBC domain, which is critical for UBE20 function.
