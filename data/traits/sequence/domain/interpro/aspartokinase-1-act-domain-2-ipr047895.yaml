identifier: InterPro:IPR047895
label: "Aspartokinase 1, ACT domain 2"
definition: >-
  This entry represents the second of two ACT domains located C-terminal to the catalytic domain of a monofunctional, lysine-sensitive, plant aspartate kinase 1 (AK1), which can be synergistically inhibited by S-adenosylmethionine (SAM). This isoenzyme is found in higher plants, Arabidopsis thaliana and Zea mays , and also in Chlorophyta. In its inactive state, Arabidopsis AK1 binds the effectors lysine and SAM (two molecules each) at the interface of two ACT1 domain subunits. The second ACT domain (ACT2), this entry, does not interact with an effector. Members of this entry belong to the superfamily of ACT regulatory domains.
