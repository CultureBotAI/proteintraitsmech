identifier: InterPro:IPR048919
label: "Bride of doubletime-like, TPR domain"
definition: >-
  This domain is found at the C-terminal of Bride of doubletime from Drosophila melanogaster (Bdbt, ) and similar proteins predominantly from arthropods. Bdbt is a mediator of the effects of the kinase doubletime on the key circadian transcriptional regulator period. This entry represents the α-helical TPR domain. It is normally found associated with .
