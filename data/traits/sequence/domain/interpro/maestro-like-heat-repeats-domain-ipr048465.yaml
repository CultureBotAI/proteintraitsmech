identifier: InterPro:IPR048465
label: "Maestro-like, HEAT-repeats domain"
definition: >-
  This entry represents a domain consisting of HEAT repeats from maestro heat-like repeat-containing proteins. Maestro (Male-specific Transcription in the developing Reproductive Organs (MRO)) is expressed in human granulosa cumulus cells and in testicular germ cells. SPIF (also known as MRO2B) may play a role in the process of sperm capacitation.
