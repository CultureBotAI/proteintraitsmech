identifier: InterPro:IPR060225
label: "DCAF1, helical domain 2"
definition: >-
  This entry represents a helical domain found in human DDB1- and CUL4-associated factor 1 (DCAF1) and similar proteins from animals and plants, including protein mahjong, the Drosophila orthologue. DCAF1 is a component of the CUL4-RBX1-DDB1-DCAF1 E3 ubiquitin-protein ligase complex, where it may function as the substrate recognition module. The protein contains multiple functional regions including WD40 repeats, DWD boxes required for DDB1 interaction, and a LisH domain . Mahjong is a probable substrate recognition component of CUL4-RBX1-DDB1-DCAF1 E3 ubiquitin ligase complexes and plays a key role in cell competition via its interaction with l(2)gl. Loss of mahjong function leads to delayed development and lethality at the pupal stage. Cells deficient in mahjong undergo apoptosis when surrounded by wild-type cells in wing disc epithelia.
