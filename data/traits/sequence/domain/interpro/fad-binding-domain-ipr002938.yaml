identifier: InterPro:IPR002938
label: FAD-binding domain
definition: >-
  This domain is involved in FAD binding in a number of enzymes, including human Kynurenine 3-monooxygenase (KMO), which is related to neuroinflammatory conditions, archaeal Digeranylgeranylglycerophospholipid reductase (GGR), involved in the biosynthesis of archaeal membrane lipids and bacterial 3-(3-hydroxy-phenyl)propionate/3-hydroxycinnamic acid hydroxylase (MhpA).
