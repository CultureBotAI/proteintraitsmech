identifier: InterPro:IPR056232
label: "Nuclear pore complex protein GP210, Ig-like domain 15"
definition: >-
  This domain is found in the Nuclear pore complex protein GP210 from Arabidopsis thaliana and related plant proteins. GP210 is predicted to contain 16 Ig-like domains. This entry represents the 15th of these domains.
