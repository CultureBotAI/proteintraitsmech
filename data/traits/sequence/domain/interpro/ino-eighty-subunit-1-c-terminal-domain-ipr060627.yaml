identifier: InterPro:IPR060627
label: "Ino eighty subunit 1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Ino eighty subunit 1 (Ies1) and similar sequences from Saccharomycetales. Ies1 is a component of the chromatin-remodelling INO80 complex, which is involved in transcription regulation. The INO80 complex in yeast comprises at least ARP4, ARP5, ARP8, RVB1, RVB2, TAF14, NHP10, IES1, IES3, IES4, IES6, ACT1, IES2, IES5 and INO80. Ies localises to the nucleus and contains regions of predicted coiled coil structure and disordered regions. The specific function of this domain remains to be determined.
