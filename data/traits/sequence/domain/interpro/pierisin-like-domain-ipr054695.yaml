identifier: InterPro:IPR054695
label: "Pierisin-like domain"
definition: >-
  This entry represents a domain found in a group of ADP-ribosyltransferases from bacteria and eukaryota, including Pierisin from the butterfly Pieris rapae and the smaller protein scabin ( ), a novel DNA-targeting enzyme from the plant pathogen Streptomyces scabiei.
