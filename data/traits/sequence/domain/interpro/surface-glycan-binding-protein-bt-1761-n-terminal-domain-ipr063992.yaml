identifier: InterPro:IPR063992
label: "Surface glycan-binding protein BT_1761, N-terminal domain"
definition: >-
  This entry represents two tandem Ig-like domains found at the N-terminal of Surface glycan-binding protein BT_1761. BT_1761 is part of the fructo-oligosacchaides (FOSs) transport-competent system and is thought to recruit levan at the cell surface. This domain can also be found once in related bacterial proteins.
