identifier: InterPro:IPR060932
label: "Lmo1799-like Asp-Ala repeat surface protein, N-terminal domain"
definition: >-
  Members of this family, including Lmo1799 from Listeria monocytogenes ( ), are sortase-dependent (LPXTG motif-containing) surface proteins of L.monocytogenes, present in some lineages only, and thought to contribute to stress survival and to virulence. A notable feature of this family is a variable length run of Asp-Ala (DA) repeats averaging over 300 amino acids in length. Lmo1799 has often been called a putative peptidoglycan-binding protein. This entry represents a non-repetitive region from the N terminus to the start of the start of the DA repeats. Lmo1799 is encoded downstream of LipA (Lmo1800).
