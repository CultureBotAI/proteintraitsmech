identifier: InterPro:IPR013527
label: "Endoribonuclease YicC-like, N-terminal"
definition: >-
  This entry represents the N-terminal region of Endoribonuclease YicC from Escherichia coli and similar bacterial sequences. YicC has been shown to be important for cells in the stationary phase, and essential for growth at high temperatures. This protein contributes to degradation of the small RNA (sRNA) RhyB by 3' to 5' exoribonuclease PNPase. It seems to generate a 3'-OH and a 5'-phosphate group. This entry also includes the Endoribonuclease YloC from Bacillus subtilis that cleaves ssRNA, preferentially at U residues, generating a 3'-OH and a 5'-phosphate group, with no activity on dsRNA or dsDNA. YloC was found to act similarly to YicC in an Escherichia coli in vivo assay that assesses decay of the small RNA, RyhB.
