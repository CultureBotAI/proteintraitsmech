identifier: InterPro:IPR025313
label: "ATP-dependent rRNA helicase SPB4-like, C-terminal extension"
definition: >-
  This short domain is found towards the C-terminal of many eukaryotic helicases, including some DEAD box helicases such as ATP-dependent rRNA helicase SPB4 from Saccharomyces cerevisiae. The DEAD box helicases are involved in various aspects of RNA metabolism, including nuclear transcription, pre mRNA splicing, ribosome biogenesis, nucleocytoplasmic transport, translation, RNA decay and organellar gene expression. SPB4 is organised into four domains: dual RecA domains (D1 and D2, and ), a C-terminal extension (CTE, represented by this entry) and a C-terminal tail (CTT). This domain packs closely onto the catalytic core of Spb4 and engages the four nucleotides immediately 5' to those within the RNA binding pocket. It shows a mainly α-helical structure.
