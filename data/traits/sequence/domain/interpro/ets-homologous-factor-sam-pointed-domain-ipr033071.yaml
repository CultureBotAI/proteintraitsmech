identifier: InterPro:IPR033071
label: "ETS homologous factor, SAM Pointed domain"
definition: >-
  This entry represents the Sterile alpha motif (SAM)/Pointed domain of EHF, a putative protein-protein interaction domain. Members of this group of proteins are potential targets for cancer therapy. ETS homologous factor (EHF, ESE-3) is an epithelial-specific transcriptional activator that plays a role in regulating epithelial cell differentiation and proliferation. It also regulates gene pathways critical for epithelial response to injury. It regulates the expression of a variety of genes by binding to the GGAA/T core sequence in cooperation with other transcription factors and co-factors.
