identifier: InterPro:IPR038748
label: "DNA replication complex GINS protein, N-terminal domain"
definition: >-
  This entry includes Gins23 from Sulfolobus solfataricus. The GINS complex is involved in the replication of archaeal and eukaryotic genomes. The archaeal DNA replication system is a simplified version of that of the eukaryotes. Like its eukaryotic counterpart, the archaeal GINS complex is tetrameric, but instead of four different subunits (Sld5, Psf1, Psf2 and Psf3) it consists of two different proteins named Gins51 and Gins23. All GINS subunits are homologues, and they can be classified into two groups. One group (the eukaryotic Sld5 and Psf1, as well as the archaeal Gins51) has the α-helical (A) domain at the N terminus and the β-strand domain (B) at the C-terminal (this arrangement is called ABtype). The arrangement of the A and B domains is reversed in the second group (eukaryotic Psf2 and Psf3 and archaeal Gins23, also referred to as BAtype). The overall fold of each archaeal subunit and the overall tetrameric assembly of GINS are similar, but the relative locations of the C-terminal small domains are different concerning the α helical domain characterised by this model, resulting in different subunit contacts in the archaeal GINS complex. Some archaea may have a homotetrameric GINS complex (four copies of an AB-type module).
