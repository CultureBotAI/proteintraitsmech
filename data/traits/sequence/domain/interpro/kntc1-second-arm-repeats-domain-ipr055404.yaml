identifier: InterPro:IPR055404
label: "KNTC1, second ARM-repeats domain"
definition: >-
  This entry represents the second segment of ARM repeats present in KNTC1 (Kinetochore-associated protein 1, also known as ROD), following the β-propeller domain. KNTC1 is a crucial component of the mitotic checkpoint, ensuring cells do not exit mitosis prematurely. KNTC1 is required for the assembly of essential complexes onto kinetochores, such as dynein-dynactin and MAD1-MAD2. KNTC1 is the major subunit of the RZZ (ROD-Zwilch-ZW10) complex, which plays a significant role in spindle assembly, kinetochore-microtubule attachment, and spindle pole separation.
