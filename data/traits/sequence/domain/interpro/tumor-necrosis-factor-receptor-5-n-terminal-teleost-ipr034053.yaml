identifier: InterPro:IPR034053
label: "Tumor necrosis factor receptor 5, N-terminal, teleost"
definition: >-
  Tumor necrosis factor receptor superfamily member 5 (TNFRSF5), commonly known as CD40 and also as CDW40, p50 or Bp50, is widely expressed in diverse cell types including B lymphocytes, dendritic cells, platelets, monocytes, endothelial cells, and fibroblasts. It is essential in mediating a wide variety of immune and inflammatory responses, including T cell-dependent immunoglobulin class switching, memory B cell development, and germinal centre formation. Its natural immunomodulating ligand is CD40L, and a primary defect in the CD40/CD40L system is associated with X-linked hyper-IgM (XHIM) syndrome. It is also involved in tumorigenesis. The CD40/CD40L system serves as a link between tumorigenesis, atherosclerosis, and the immune system, and offers a potential target for drug therapy for related diseases, such as cancer, atherosclerosis, diabetes mellitus, and immunological rejection. TNFRSF5/CD40 homologues have been identified in teleosts. The zebrafish CD40 is a type I membrane-bound protein with a sequence pattern of four cysteine-rich domains in its extracellular N-terminal region. The consensus TNFR-associated factor (TRAF)2- and TRAF6-binding motifs in mammalian CD40 are found in the cytoplasmic tail of zebrafish CD40, which indicates similar signal transduction mechanisms to higher vertebrates. Salmon CD40 and CD40L are widely expressed, particularly in immune tissues, and their importance for the immune response is indicated by their relatively high expression in salmon lymphoid organs and gills. This entry represents the N-terminal domain of TNFRSF5 from teleosts.
