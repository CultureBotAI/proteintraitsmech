identifier: InterPro:IPR009466
label: Non-structural protein 14, coronavirus
definition: >-
  The unique coronavirus (CoV) transcription/replication machinery comprised of multiple virus-encoded non structural proteins (NSP) plays a vital role during initial and intermediate phases of the viral life cycle. This entry represents NSP14, encoded as part of polyprotein pp1ab and excised by NSP5. Its N-terminal exoribonuclease (ExoN) domain plays a proofreading role for prevention of lethal mutagenesis, and the C-terminal domain functions as an S-adenosyl methionine (SAM)-dependent (guanine-N7) methyl transferase (N7-MTase) for mRNA capping. NSP14 forms the nsp14-nsp10 complex involved in RNA viral proofreading.
