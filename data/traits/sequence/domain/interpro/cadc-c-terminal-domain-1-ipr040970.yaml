identifier: InterPro:IPR040970
label: "CadC, C-terminal domain 1"
definition: >-
  This is the N-terminal subdomain of the C-terminal periplasmic domain. It is composed of five-stranded β-sheets. CadC is an integral membrane protein of 512 amino acids comprising an N-terminal cytoplasmic DNA-binding domain , a transmembrane helix, and a C-terminal periplasmic domain. It belongs to the ToxR-like regulators, a family of biochemically unmodified one-component systems with similar topology that includes several low pH-induced transcription regulators. Structural analysis indicates that the C-terminal periplasmic domain resembles the sensory domain of pH-activated ToxR-like regulators and consists of two subdomains with an interfacial cavity suited to accommodate cadaverine, the feedback inhibitor of the Cad system. CadC regulates the lysine- and pH-dependent expression of the lysine decarboxylase CadA and the cadaverine-lysine antiporter CadB. Under conditions of low external pH and in the presence of exogenous lysine, CadC activates transcription of the cadBA operon by binding directly to two sites, Cad1 and Cad2, within the cadBA promoter region, with preferential binding to AT-rich sequences in Cad1.
