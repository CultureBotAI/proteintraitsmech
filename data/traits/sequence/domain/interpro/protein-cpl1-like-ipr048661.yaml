identifier: InterPro:IPR048661
label: "Protein CPL1-like"
definition: >-
  This domain is found in CPL1 from Cryptococcus neoformans and similar fungal proteins. CPL1 is a virulence factor which promotes fungal virulence by enhancing type 2 inflammation in the mouse host.
