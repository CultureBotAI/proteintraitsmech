identifier: InterPro:IPR057862
label: "Glycoprotein Q2/Q1/105"
definition: >-
  This entry represents the Glycoprotein Q1, Q2 and 105 of human herpesvirus-6 (HHV-6). Glycoprotein Q2 (gQ2) forms a tetrameric complex with glycoproteins gH, gL, and gQ1 that is essential for viral entry. In HHV-6A, this complex binds to the cellular receptor CD46, while in HHV-6B the complex has different receptor specificity. Both HHV-6A gQ1 and gQ2 are critical for CD46 binding, and their interaction is important for receptor specificity. In long proteins, this entry is only found at the C-terminal, while in shorter proteins it covers the full length.
