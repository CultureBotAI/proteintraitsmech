identifier: InterPro:IPR031481
label: "Fucosyltransferase, N-terminal"
definition: >-
  This is the N-terminal domain of a family of fucosyltransferases, known as glycosyltransferase family 10. This enzyme transfers fucose from GDP-Fucose to GlcNAc in an alpha1,3 linkage. The N-terminal domain folds as a Rossmann-like domain and is involved in sugar donor interactions.
