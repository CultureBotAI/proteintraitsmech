identifier: InterPro:IPR004823
label: "TATA box binding protein associated factor (TAF), histone-like fold domain"
definition: >-
  The TATA box binding protein associated factor (TAF) is part of the transcription initiation factor TFIID multimeric protein complex. TFIID plays a central role in mediating promoter responses to various activators and repressors. It binds tightly to TAFII-250 and directly interacts with TAFII-40. TFIID is composed of TATA binding protein (TBP) and a number of TBP-associated factors (TAFS). TAF proteins adopt a histone-like fold. The DNA-binding general transcription factor complex TFIID is central to the initiation of DNA-dependent RNA polymerase II transcription. TFIID is the only general transcription initiation factor that bind to the TATA box. The binding of TFIID to the TATA-box is the first step in the formation of a complex able to initiate transcription. TFIID consists of the TATA binding protein (TBP) and 14 TBP-associated factors (TAFs). One copy of each TAF1, TAF2, TAF3, TAF7, TAF8, TAF11, TAF13, two copies of each TAF4, TAF5, TAF6, TAF9, TAF10, TAF12, and three copies of TAF14.
