identifier: InterPro:IPR034404
label: MSSP-1, RNA recognition motif 1
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of MSSP-1 (also known as RBMS1), a double- and single-stranded DNA binding protein that belongs to the c-myc single-strand binding proteins (MSSP) family. It specifically recognizes the sequence CT(A/T)(A/T)T, and stimulates DNA replication in the system using SV40 DNA. MSSP-1 is identical with Scr2, a human protein which complements the defect of cdc2 kinase in Schizosaccharomyces pombe. MSSP-1 has been implied in regulating DNA replication, transcription, apoptosis induction, and cell-cycle movement, via the interaction with C-MYC, the product of protooncogene c-myc.
