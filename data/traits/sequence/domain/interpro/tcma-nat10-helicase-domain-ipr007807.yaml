identifier: InterPro:IPR007807
label: "TcmA/NAT10, helicase domain"
definition: >-
  This domain contains a P-loop (Walker A) motif, suggesting that it has ATPase activity, and a Walker B motif. It is found in NAT10 from eukaryotes and TmcA from prokaryotes. In NAT10, this domain catalyses the formation of N4-acetylcytidine (ac4C) modification on mRNAs, 18S rRNA and tRNAs. In TmcA, it may function as an RNA helicase motor (driven by ATP hydrolysis) which delivers the wobble base to the active centre of the GCN5-related N-acetyltransferase (GNAT) domain. The bacterial tRNA(Met) cytidine acetyltransferase (TmcA) catalyses the formation of N(4)-acetylcytidine (ac4C) at the wobble position of tRNA(Met), by using acetyl-CoA as an acetyl donor and either ATP or GTP. This modification is thought to ensure precise recognition of the AUG codon by strengthening C-G base-pair interaction and also prevent misrecognition of the near cognate AUA codon. RNA cytidine acetyltransferas (NAT10) are RNA cytosine acetyltransferases with specificity toward both 18S rRNA and tRNAs and contain additional putative nuclear and nucleolar localisation signals (NLS and NoLS respectively).
