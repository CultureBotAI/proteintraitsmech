identifier: InterPro:IPR055339
label: WD repeat and HMG-box DNA-binding protein 1, HMG-box
definition: >-
  This entry represents the HMG-box found at the C-terminal of WDHD1, which binds DNA. WDHD1, also called acidic nucleoplasmic DNA-binding protein 1 (AND-1), acts as a replication initiation factor that brings together the MCM2-7 helicase and the DNA polymerase alpha/primase complex in order to initiate DNA replication..
