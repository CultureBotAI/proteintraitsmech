identifier: InterPro:IPR048998
label: "STPR domain"
definition: >-
  The silkgland-specific transcription factor FMBP-1 from the silkworm Bombyx mori contains a unique DNA-binding domain of four tandem STPRs, namely the Score and Three amino acid Peptide Repeats. In the presence of target DNA, STPRs adopts a zig-zag structure of three or four tandem α-helices that run along the major groove of DNA.
