identifier: InterPro:IPR044091
label: Nei, N-terminal
definition: >-
  This entry represents the N-terminal domain of Nei (also known as Endonuclease 8) from E. coli. Nei is a bacterial enzyme with DNA N-glycosylase and abasic site lyase (AP1 lyase) activities, participates in base excision repair of oxidatively generated DNA damage. Nei removes oxidatively damaged pyrimidines from substrate DNA and serves as a back-up for endonuclease III. It belongs to the FPG family and contains 1 FPG-type zinc finger.
