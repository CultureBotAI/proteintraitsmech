identifier: InterPro:IPR005604
label: "Bacteriophage T7 tail fibre protein-like, N-terminal domain"
definition: >-
  The bacteriophage T7 tail complex consists of a conical tail-tube surrounded by six kinked tail-fibres, which are oligomers of the viral protein gp17. The tail spike protein of bacteriophage K1F is important for the initial absorption of the phage into its host bacterium by hydrolysing the alpha-sialosyl linkages in the polysialic acid capsule. This entry represents the N-terminal domain of gp17 and similar phage proteins.
