identifier: InterPro:IPR055031
label: "Colicin S4, translocation domain"
definition: >-
  This entry represents the N-terminal translocation domain of Colicin S4 from Escherichia coli (Csa, ), a polypeptide toxin produced and active against E.coli. This protein consists of four distinct domains, this domain, two receptor-binding domains and the C-terminal pore-forming domain ( ). This domain shows an antiparallel β-sheet formed by three strands, an extended, glycine-rich loop structure and a short helix.
