identifier: InterPro:IPR059542
label: "YTH3-like, third C-terminal helical domain"
definition: >-
  This entry represents the third small helical C-terminal domain found in YTH3 and related proteins mainly found in actinomycetes. The domain is located at the C terminus of proteins that are approximately 437 amino acids in length. The YTH3 protein is encoded upstream of the thcA gene in Rhodococcus erythropolis, which is involved in the degradation of the thiocarbamate herbicide EPTC. The gene cluster includes an inducible cytochrome P-450 system and aldehyde dehydrogenase for herbicide degradation and biosafening. The specific function of this third C-terminal helical domain remains to be determined.
