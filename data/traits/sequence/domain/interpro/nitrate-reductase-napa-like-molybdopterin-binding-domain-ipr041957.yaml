identifier: InterPro:IPR041957
label: "Nitrate reductase NapA-like, molybdopterin-binding domain"
definition: >-
  Nitrate reductases catalyze the reduction of nitrate to nitrite. Nitrate reductases are classified into three distinct types: periplasmic nitrate reductase (Nap), membrane-bound respiratory nitrate reductase (Nar) and assimilatory nitrate reductase (Nas). The soluble nitrate reductases are present in either the periplasm (Nap) or the cytoplasm (Nas). The catalytic subunit (NapA) from periplasmic nitrate reductase can be monomeric or heterodimeric, in a complex with a di-c-haem subunit (NapB). This entry represents the conserved molybdopterin-binding C-terminal domain found in NapA, NasA, and NarB.
