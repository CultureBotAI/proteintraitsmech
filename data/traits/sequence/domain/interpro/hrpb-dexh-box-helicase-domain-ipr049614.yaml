identifier: InterPro:IPR049614
label: "HrpB, DEXH-box helicase domain"
definition: >-
  This entry represents the DEAD-box helicase domain found in HrpB proteins. HrpB is part of the HrpB-HrpA two-partner secretion (TPS) system, a secretion pathway important to the secretion of large virulence-associated proteins. HrpB belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region.
