identifier: InterPro:IPR046842
label: "Stage IV sporulation protein A, ATPase domain"
definition: >-
  The stage IV sporulation protein A ( ) is an ATPase that has a role at an early stage in the morphogenesis of the spore coat and is required for proper coat localisation to the forespore. A comparative genome analysis of all sequenced genomes of Firmicutes shows that the proteins are strictly conserved among the sub-set of endospore-forming species. This protein contains an ATPase domain at the N-terminal, a structural middle domain and a C-terminal domain that is key for targeting SpoIVA to the outer forespore membrane. This entry represents the ATPase domain located at the N-terminal of SpoIVA. It contains a conserved 'sensor' threonine residue that is involved in coordinating a Mg 2 ion.
