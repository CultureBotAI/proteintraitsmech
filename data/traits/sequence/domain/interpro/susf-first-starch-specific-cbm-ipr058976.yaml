identifier: InterPro:IPR058976
label: "SusF, first starch specific CBM"
definition: >-
  This domain is found in the Outer membrane protein SusF from Bacteroides thetaiotaomicron and related proteins from bacteroidales. This entry represents the first of the tandem CBMs. SusF is a multidomain protein and contains three starch specific carbohydrate binding modules (CBMs). Each of this CBMs differ in the way it binds starch. Each binding site has a unique starch preference that probably enable these proteins to interact with different regions of starch or its breakdown products. This CBMs are represented by and which are common to SusE as well. The SusF N-terminal is represented by .
