identifier: InterPro:IPR047995
label: "Choice-of-anchor K domain"
definition: >-
  The choice-of-anchor K is a rather uncommon extracellular domain of about 170 amino acid residues long. Several proteins containing this domain have C-terminal regions that target them for sorting to the cell surface, including PEP-CTERM and its variant VPLPA-CTERM. The domain is found occasionally in RTX toxin-like proteins.
