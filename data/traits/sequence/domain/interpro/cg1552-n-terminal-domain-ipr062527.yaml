identifier: InterPro:IPR062527
label: "CG1552, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of uncharacterised CG1552 from Drosophila and similar proteins from diptera. CG1552 is secreted and undergoes alternative splicing to produce two isoforms. The protein is also subject to RNA editing at position 121, where it is partially edited and is a target of Adar. The protein is expressed in various tissues including brain and reticular neuropil-associated glial cells. The specific function of this domain remains to be determined.
