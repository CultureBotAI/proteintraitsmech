identifier: InterPro:IPR024361
label: "Bacteroidetes-Associated Carbohydrate-binding Often N-terminal"
definition: >-
  The BACON (Bacteroidetes-Associated Carbohydrate-binding Often N-terminal) domain is an all-β domain found in diverse architectures, principally in combination with carbohydrate-active enzymes and proteases. These architectures suggest a carbohydrate-binding function, which is also supported by the nature of BACON's few conserved amino-acids. The phyletic distribution of BACON and other data tentatively suggest that it may frequently function to bind mucin. Further work with the characterised structure of a member of glycoside hydrolase family 5 enzyme, , has found no evidence for carbohydrate-binding for this domain.
