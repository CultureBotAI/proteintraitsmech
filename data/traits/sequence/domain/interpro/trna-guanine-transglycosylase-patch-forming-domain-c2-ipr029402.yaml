identifier: InterPro:IPR029402
label: "tRNA-guanine transglycosylase, patch-forming domain C2"
definition: >-
  Domain C2 of tRNA-guanine transglycosylase is formed by a four-stranded anti-parallel β-sheet lined with two α helices. It has conserved basic residues on the surface of the β-sheets as does the C-terminal domain PUA. The catalytic domain of TGT has conserved basic residues on the outer surface of the N-terminal three-stranded β sheet, which closes the barrel. It is postulated that these basic residues from the three domains form a continuous, positively charged patch to which the tRNA binds.
